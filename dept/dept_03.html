été comblés mais se devinent par endroits.","habitants":"Famille de Charles de Biotières\"","divers":"Château de Chassincourt  à Saint-Marcel en Murat","gps":"","images":["../../jctruffet.com/image/image_03/03_Chassincourt_1.jpg","../../jctruffet.com/image/image_03/03_Chassincourt_2.jpg"]},"Consult_chateau_formulaire834d":{"id":"Consult_chateau_formulaire834d","dept":"03","canton":"Lurcy-Levis","commune":"Château-sur-Allier","nom":"Chateau_sur_Allier","type":"Château","periode":"XVIII","histoire":"Deux châteaux à Château-sur-Allier;  la Barre du XIXe siècle et de St-Augustin du XVIIIe siècle.                       BARRE, deux mottes féodales jumelées existent encore à la Barre. Elles sont les traces d'une seigneurie primitive  peut-être de Saint-Augustin proche, ou alors de La Barre, puisque les premiers seigneurs connus portent le nom  du lieu,  en 1503 c'est damoiselle Marie de Bar qui fait aveu à la duchesse de Bourbon de \"sa maison.                  St-AUGUSTIN, les Cadier remontent au XIIIe siècle. C'est une des plus anciennes familles du Bourbonnais. Les Cadier  étaient seigneurs de la Brosse et de l'hôtel Cadier à Moulins qui appartient aujourd'hui à la ville et que l'on nomme  l'hôtel de Mora,  château appartenant à la même famille depuis 700 ans, aujourd'hui chambres d'hôtes.     Messire Michel Cadier, chevalier, baron de Veauce a acheté à son cousin Claude de la Souche, la seigneurie de Saint-Augustin en 1692. Ses ancêtres étaient déjà Barons de Veauce et Seigneurs de St Augustin au XIVe siècle. Aujourd'hui   toujours  dans la descendance. Son fils aîné, Messire Gilbert Cadier, chevalier, baron de Veauce a détruit le château familial et fit construire, en 1730, le château actuel, suivant son dessin. Au XIXe siècle,  le comte Chaillon de Jonville fit une campagne de gros travaux.","architecture":"La Barre, le château actuel a été construit au XIXe siècle, à côté de bâtiments plus anciens. L'ensemble est situé sur une  esplanade, au dessus d'un étang, dans un parc boisé. Le bâtiment principal est à double corps rectangulaire. En  façade, un logis à deux niveaux et niveau de comble. Les grandes ouvertures du rez-de-chaussée sont à arc en  plein cintre. Le second corps de logis, en forme de grand pavillon, est en retour d'équerre. Il est à trois niveaux  et niveau de comble, couvert  d'un toit aigu. Harpages et encadrements d'ouvertures  sont faits de briques et de  pierre en alternance. A l'arrière, existe une longue construction, flanquée d'une tour d'angle.                                 St-Augustin, on voyait à Souvigny, dès  1286 une tour, dite \"Tour Cadier\", qui faisait partie du nombre des 12 qui avaient été bâties par les 12 gentilhommes  attachés au service des ducs de Bourbon, le château fut  construit  en 1730, en briques  polychromes, c'est un joyau  de l'architecture  bourbonnaise, travaux du  XIXe siècle, de l'escalier d'honneur à double révolution avec décor à la grec, vestibule palladien, et salle à manger à l'italienne, corps de logis rectangulaire central a deux niveaux avec fronton saillant en façade  accolé de deux ailes  qui se prolonge de chaque côté jusqu'à une tour ronde point de renvoi des dépendances qui forme la cour d'honneur.","habitants":"Famille de Marie de Bar                Famille de Gilbert Cadier\"","divers":"Château de la Barre et de St-Augustin à château sur Allier.","gps":"","images":["../../jctruffet.com/image/image_03/03_Chateau_sur_Allier_1.jpg","../../jctruffet.com/image/image_03/03_Chateau_sur_Allier_2.jpg","../../jctruffet.com/image/image_03/03_Chateau_sur_Allier_3.jpg","../../jctruffet.com/image/image_03/03_Chateau_sur_Allier_4.jpg","../../jctruffet.com/image/image_03/03_Chateau_sur_Allier_5.jpg","../../jctruffet.com/image/image_03/03_Chateau_sur_Allier_6.jpg","../../jctruffet.com/image/image_03/03_Chateau_sur_Allier_7.jpg","../../jctruffet.com/image/image_03/03_Chateau_sur_Allier_8.jpg"]},"Consult_chateau_formulaire123a":{"id":"Consult_chateau_formulaire123a","dept":"03","canton":"Le Montet","commune":"Chatel-de-Neuvre","nom":"Chatel_de_Neuvre","type":"Château","periode":"XIV-XV","histoire":"Cinq  châteaux à Chatel de Neuvre;  Logères du XVI-XIXe siècle avec tourelles, de Saint-Laurent  du XVe siècle tour ronde et carrée, tour du  Moulins neuf  XIVe siècle et de la  Grillière du XIXe siècle (voir article).  CHATEL de NEUVRE depuis l'an 700 sous la juridiction des Aymon  et des Aymard jusqu'à l'une de ces descendantes épouse au XIIIe siècle Robert de Clermont sixième fils de Saint-Louis.              LOGERES  Vers la fin du XVe siècle, Logères appartenait à Gilbert Pointet, dont la famille le possédait a  Châtel-de-Neuvre dès 1300. En 1513, il obtint de la duchesse de Bourbon le droit de justice haute, moyenne   et basse sur la terre de Logères. L'année suivante, elle lui accorda l'autorisation de fortifier sa maison. Celle-ci passa par  mariage en 1594, à François de Velard. La dernière représentante des Velard, Geneviève, vendit  Logère en 1717  à Jacques Hugon, seigneur de Givry. En 1809, ses descendants vendirent  Logères à Gilbert  Barthelat, originaire de Varennes-sur-Allier, qui devint maire  de Châtel, et fit d'importants travaux au château. Par mariage, la terre passa ensuite aux Durieu de Lacarelle puis aux de Chasseval.                            TOUR du MOULIN NEUF,   Possession des seigneurs de Montaigu-le-Blin au début du XIVe siècle construit au milieu d'un étang depuis remblayé  en partie, le grand donjon sera édifié dans la seconde moitié de ce siècle, après qu'une première construction eut été occupée par les anglais vers 1365.  Béatrice de Montaigu qui hérita du fief en 1494, le porta par mariage à François Dugué. Ce dernier rend   hommage pour \"sa maison et place forte de Moulin Neuf,  Puis se succédèrent à la tête , qui était alors \"terre, chastel fort et justice\" Jean  Ripoud en 1569, Claude de Balarre en 1601, qui le vendit en 1622 à Jean Roussel avocat au parlement de  Moulins. La fille de ce dernier le passa par mariage aux Semyn de St-Sernin en 1648. Il fut vendu en 1725  à un autre Jean Ripoud. Ses descendants le firent passer par mariage aux Sicaud de Mariol. Il fut acquis   dans la seconde moitié du XIXe par le comte Achille Vemin d'Aigrepont, ancêtre des propriétaires actuels du château construit dans le parc.           SAINT-LAURENT, pas d'information historiques.","architecture":"Logères, le château bâti au début du XVIe siècle est encore entouré de fossés, partiellement comblé. C'est un édifice de  plan rectangulaire à un étage coiffé d'un haut toit à croupe qui fut percé de lucarnes au XIXe siècle. Il lui est  accolée une tour d'escalier carrée sur la façade antérieure. La porte d'entrée qui y était percée fut murée, elle  est surmontée d'un arc en accolade et d'un blason écartelé. Une tourelle rectangulaire tronquée est engagée  sur  l'autre façade. C'est sans doute au XIXe siècle  que fut bâti sur ce même côté un appendice bas couvert  en terrasse.       St-Laurent, c'est un édifice relativement modeste, composé d'un corps de logis unique flanqué vers la rivière d'une tour circulaire, et d'une tour carrée à l'opposé. Le pittoresque de l'ensemble typiquement bourbonnais est augmenté par la présence d'une   grosse tour circulaire servant de colombier, et d'une abondante végétation. Ces lieux sont évoqués par Valéry Larbaud dans son roman Allen.                                  Tour du Moulins Neuf, haute de presque 25 mètres, la tour est de plan carré de 10 mètres  de côté et divisé primitivement en quatre niveaux. Une tourelle quadrangulaire contenant un escalier à vis éclairé par de petites fenêtres rectangulaires, est accolée à la façade ouest. Des ouvertures furent percées  au rez-de-chaussée de la façade est à la période moderne, alors que le côté sud a conservé en état les meurtrières qui l'éclairaient. Le sommet des murs est\r\n couronné de hourds que recouvre la toiture. L'intérieur fut très modifié, les étages étaient divisés à l'origine en deux pièces. On y a installé des cloisons supplémentaires et même supprimé le plancher du quatrième niveau.","habitants":"Famille de Robert de Clermont        Famille de Gilbert Pointet              Famille de Jean  Ripoud \"","divers":"Château de la Logères, d'Aigrepont, manoir de Saint-Laurent et la tour du Moulins neuf et son château à Chatel de Neuvre.","gps":"","images":["../../jctruffet.com/image/image_03/03_Chatel_de_Neuvre_1.jpg","../../jctruffet.com/image/image_03/03_Chatel_de_Neuvre_2.jpg","../../jctruffet.com/image/image_03/03_Chatel_de_Neuvre_3.jpg","../../jctruffet.com/image/image_03/03_Chatel_de_Neuvre_4.jpg","../../jctruffet.com/image/image_03/03_Chatel_de_Neuvre_5.jpg","../../jctruffet.com/image/image_03/03_Chatel_de_Neuvre_6.jpg","../../jctruffet.com/image/image_03/03_Chatel_de_Neuvre_7.jpg","../../jctruffet.com/image/image_03/03_Chatel_de_Neuvre_8.jpg"]},"Consult_chateau_formulaire244b":{"id":"Consult_chateau_formulaire244b","dept":"03","canton":"Jaligny-sur-Besbre","commune":"Chatelperron","nom":"Chatelperron","type":"Maison forte","periode":"XV-XVIII","histoire":"Deux châteaux à Chatelperron dont celui de Chatelperron féodal du XII-XIVe siècle et de Chassimpierre du XV-XVIIIe siècles avec donjon.                 CHATELPERON,  premier possesseur connu, est Guichard de Castro Petri qui reconnaît  détenir du seigneur de Beaujeu la seigneurie en 1132. En 1215, Étienne, fils de Régnier de Chastel-Perron est homme lige du sire de Bourbon. En 1220, Vilhelmus de Castro Petri ou Castropertis, est, en 1220, seigneur de Saint-Léon, Vaumas, Liernolles et Lenax. En 1329, le fief est rattaché, par le mariage d'Isabeau de Châtelperron à Robert Dauphin de Jaligny, à la terre de Jaligny. Il le restera jusqu'au début du XVe siècle et, après avoir été quelques années propriété de Claude Montaigu, il sera vendu à Jacques Ier de Chabannes, seigneur de La Palice, le 17 mai 1443. Marie de Meulun, veuve de Charles de Chabannes, s'installera à Châtelperron où elle décédera en 1553.  À l'extinction des Chabannes, le fief revient, comme le reste de leurs biens, à la famille de Tournon puis, en 1571, à la famille de La Guiche. Châtelperron sera vendu en 1682 puis, de nouveau en 1685 à Gabrielle de Marmande. Après avoir été en possession d'Antoine de Charry des Gouttes,  le château, qui sera racheté, en 1803, par Jean-Baptiste Collas, qui réussira à reconstituer presque entièrement l'ancienne terre.               CHASSIMPIERRE, du XVe et XIXe siècle, cet arrière fief relevant de Châtelperron est présent dans le dénombrement des fiefs du Bourbonnais  en 1503. Il est alors détenu en coseigneurie par demoiselle Marguerite de la Trolière, veuve de Jehan Dorvalet  qui fait   aveu à la duchesse de Bourbon de \"la moitié du domaine et  maison appelé Chasseing, Pierre, mouvant de  Chatel  Perron. Le fief appartenait  en 1601 à Claude Dinet, frère de l'archevêque de Mâcon. Des Dinet, la propriété passa par la suite aux Huguet et en 1768, à  Jean François Croizier, puis en 1809  Chassimpierre  fut acheté par Jean Baptiste Collas, à la famille  duquel il appartient toujours.   Seigneurs des Escures qui possédaient une maison forte  pied-à-terre de Jean II le Bon.","architecture":"Châtelperron, Jean II Le Bon (personnage célèbre), édifice du XVe siècle ayant conservé presque toutes ses fenêtres d'époque. Leur encadrement rectangulaire est orné de moulures, les plus importantes sont refendues par des meneaux cruciformes. La grande salle conserve une cheminée du XVe siècle aux montants garnis de colonnettes, un écu décore le centre du manteau orné de moulures. La chapelle, de style Renaissance, conserve des peintures sur la voûte en forme de coupole. Ce château servait de pied-à-terre à Jean II Le Bon.                         Chassimpierre, cette maison édifiée au XVIIIe siècle  fut réhaussée d'un étage  sous la Restauration, le corps de logis de plan rectangulaire à deux niveaux, coiffé d'un toit d'ardoise  est flanqué sur la façade principale d'une tour polygonale hors-oeuvre en grès rouge de Liernolles.","habitants":"Jean II Le Bon                           Famille de La Guiche                 Famille de Claude Dinet\"","divers":"Château de Chatelperron et de Chassimpierre","gps":"","images":["../../jctruffet.com/image/image_03/03_Chatelperron_1.jpg","../../jctruffet.com/image/image_03/03_Chatelperron_2.jpg","../../jctruffet.com/image/image_03/03_Chatelperron_3.jpg","../../jctruffet.com/image/image_03/03_Chatelperron_4.jpg","../../jctruffet.com/image/image_03/03_Chatelperron_5.jpg","../../jctruffet.com/image/image_03/03_Chatelperron_6.jpg"]},"Consult_chateau_formulaired1d5":{"id":"Consult_chateau_formulaired1d5","dept":"03","canton":"Montmarault","commune":"Chavenon","nom":"Chavenon","type":"Château","periode":"XIII-XV","histoire":"Trois châteaux à Chaveron, celui de Montgeorges du XIII-XVIe siècle de style gothique et le  manoir de Sceauve et de la Jaunerie du XV-XVIIIe siècles.        MONTGEORGES, au XIVe siècle  fief des Murat, famille des anciens viguiers de Murat. En 1408, Merlin de Rochedragon, alias Martin, rend hommage au duc de Bourbon de sa seigneurie de Montgeorges. Diverses familles nobles lui succédèrent, les du Peschin jusqu'au début du XVIe siècle. En 1503,  damoiselle d'Augerolles, veuve de feu Jacques du Peschin, reconnait pour elle et ses enfants, tenir le fief de la duchesse de Bourbon. Ensuite les Rodillon, les Gaulmin ont occupés Montgeorges. Gilbert Gaulmin, comte de Montgeorges  meurt en 1735,  après lui, les éléments du fief sont dispersés, mais rapidement récupérés par Gilbert Daubertes, fermier de la seigneurie.                               SCEAUVE, dès le haut Moyen-Age, un propriétaire de \"l'ostel de Sauve\" fit donation de ses biens aux bénédictins de Souvigny. En 1447, le premier possesseur connu, Jehan de Saint-Haubin, écuyer, reconnaît  divers cens en nature aux religieux \"à cause de leur dicte maison Beçay\". Le fief s'étend sur de nombreux domaines voisins: Lonlaigue, La Fay,   Les Falliers, Les Vaux.  Au début du XVIIe siècle, la seigneurie passe  par mariage à Claude d'Apchon, écuyer,   sieur des Echevennes, puis, en 1624, à Jehan de Beaufort, d'origine auvergnate, et à la maison de Chabannes, marquis de Lapalisse. Elle ne tarde pas à tomber aux mains des Gaulmain, famille de l'intendant de Moulins.  La seigneurie est démembrée à la Révolution.      Manoir de Saint-Hubert, XIXe siècle parc Treyve réalisé par les établissements Treyve-Marie des architectes paysagistes Joseph Marie et François-Marie Treyve.","architecture":"Montgeorges assis sur un plateau, domine la profonde et large vallée de l'Aumance. La construction du XVIe siècle a remplacé un château plus ancien, dont il a conservé quelques restes. La tour carrée de façade abrite un bel escalier à  vis et présente sur la porte en anse de panier un écusson martelé et un cadran solaire. A l'arrière reste une tour à meurtrière bien conservée. De larges fossés aujourd'hui comblés entouraient l'enceinte dont il restait encore une tour au début du XXe siècle. La chapelle a été démolie et son Saint-Georges  transporté en l'église de Chavenon.       Sceauve, rénové avec  gout, est composé d'un corps de logis du XVe et XVIe siècles, reposant  sur des soubassements anciens. Sa façade présente  une large fenêtre Renaissance, et cachées à l'arrière, plusieurs baies à accolades. Des constructions plus tardives ont occulté certaines de ces ouvertures. Les   fossés ont disparu, mais non le grand étang. Au XVIIIe siècle, le château est occupé par des fermiers.","habitants":"Famille de  Jacques du Peschin          Famille de Claude d'Apchon\"","divers":"Château de Montgeorges  de Sceauve  et de la Jaunerie à Chavenon","gps":"","images":["../../jctruffet.com/image/image_03/03_Chavenon_1.jpg","../../jctruffet.com/image/image_03/03_Chavenon_2.jpg","../../jctruffet.com/image/image_03/03_Chavenon_3.jpg"]},"Consult_chateau_formulaire73a5":{"id":"Consult_chateau_formulaire73a5","dept":"03","canton":"Jaligny-sur-Besbre","commune":"Chavroches","nom":"Chavroches","type":"Château","periode":"XIII-XIV","histoire":"Trois châteaux à Chavroches dont celui de Chavroches du XIII-XVe siècle avec donjon, de la Pouge du XIVe siècle et du Verger du XVIe siècle donjon ruiné.       CHAVROCHES, pas d'éléments historiques à part que  cet édifice était l'ancien siège d'une des châtellenies les plus prospères du Bourbonnais.               La POUGE, pas d'éléments historiques.\r\nVERGER, rien n'est connu avant 1509, date à laquelle Le Verger appartient à Jacques de Montjournal,  écuyer, ayant   droit, cédé de Hugues de la Fin. Dans la première moitié du XVIIe siècle, ce fief sans justice passe par mariage à François de Ballore  qui vend Le Verger en 1645 à Jean François Champropin de Chambord. En 1668, il appartient  à Gabriel de Saint-Julien qui le tient de sa femme, Gilberte de Rochefort, sans enfant, ils lèguent Le Verger à leur neveu Gaspard de Rochefort dont la fille le porte en dot à Édouard de Pierrepont en 1692, cette famille restera au Verger jusqu'à la Révolution. Au XIXe siècle, il devient la propriété de Louis Jacquelot de Chantemerle, sénateur  de l'Allier.","architecture":"Chavroches, le château est construit sur une colline escarpée, sur une plateforme autrefois entourée de murailles dont il ne reste plus qu'une faible portion. La masse principale du château est constituée par le donjon rectangulaire  du  XIIIe siècle, et par un bâtiment oblong transformé en habitation. L'enceinte subsiste par une courtine et deux tours ruinées, paraissant dater du XIVe siècle. La poterne d'entrée se présente comme une tour rectangulaire percée d'une porte en plein cintre avec archivolte décorée de motifs floraux. Cette poterne est un des rares exemples d'architecture militaire de la fin du XIIe ou du début du XIIIe siècle.\r\nVerger, le vieux château avait été délaissé au XIXe siècle pour une construction moderne . Il se présente encore  sous la forme d'un édifice rectangulaire, auquel est accolée, à l'angle droit  de la façade antérieure, une tour carrée  plus haute, alors qu'à l'angle  opposé de l'autre face est suspendue une échauguette. Les ouvertures ont presque toutes été refaites au XIXe siècle.                                   La Pouge est dominé par un haut donjon rectangulaire dont le sommet est tronqué. L'enceinte  épouse le tracé  allongé du sommet de la colline sur laquelle elle se dresse. L'entrée en était protégée par un pont  levis encadré  de deux tours circulaires. A l'opposé de l'enceinte, le logis seigneurial s'adosse aux courtines, qui ont  été percées de plusieurs fenêtres à l'époque moderne.","habitants":"Famille de Jacques de Montjournal         Louis Jacquelot  sénateur\"","divers":"Château de Chavroches, de la Pouge et du Verger dit de Chantemale.","gps":"","images":["../../jctruffet.com/image/image_03/03_Chavroches_1.jpg","../../jctruffet.com/image/image_03/03_Chavroches_2.jpg","../../jctruffet.com/image/image_03/03_Chavroches_3.jpg","../../jctruffet.com/image/image_03/03_Chavroches_4.jpg","../../jctruffet.com/image/image_03/03_Chavroches_5.jpg","../../jctruffet.com/image/image_03/03_Chavroches_6.jpg"]},"Consult_chateau_formulaire4ba6":{"id":"Consult_chateau_formulaire4ba6","dept":"03","canton":"Huriel","commune":"Chazemais","nom":"Chazemais","type":"Château","periode":"XV-XIX","histoire":"Deux châteaux à Chazemais, la Bouchatte du XIXe siècle et le Chauvières du XV-XVIe siècles.  BOUCHATTE, cest le général Louis Henri dAuvergne qui fait construire le château de la Bouchatte vers 1875. Il est  habité ensuite  par ses descendants.  Cette propriété a été acquise en 1931 par la ville de Montluçon pour en faire une colonie de vacances et une école de plein air. Revendu le 27 novembre 2003, le château est à nouveau une propriété privée.\r\nCHAUVIERES. On ignore les noms des propriétaires avant 1457, date ou la   terre est commune  entre messire Léonard Maulvoisin, seigneur de La Forêt Mauvoisin, Chatard de Bramont,  écuyer et Rolin Bertrand, écuyer, seigneur de Paslières. En 1458 elle est vendue à Antoine Jannot, bourgeois et marchand en la ville de Montluçon. En 1554, Chauvières joint à La Crête, est intégré dans les possessions des familles de Beaucaire, puis d'Allègre, et suit le sort des terres-baronnies de Vaux, Saint-Désiré, La Crête et Nassigny. En 1741, le château, fief et baronnie de Chauvières consiste en un pavillon,  justice haute, moyenne et basse.","architecture":"Bouchatte,  cette maison de maître de style néo-classique se présente sous la forme dun long corps de logis principal rectangulaire de sept travées de fenêtres dont le rez de chaussée surélevé est  accessible par un large escalier de pierre. Deux pavillons en retour d'équerre flanquent les angles, eux mêmes épaulés par deux petites constructions à trois pans et à un seul niveau. Les deux ailes ont été construites en 1934. L'ensemble des toits est réalisé à la Mansart et permet l'utilisation d'un niveau de comble, grâce à une série de grandes lucarnes-fenêtres, d'apparence néo-classique, est constitué d'un corps de logis principal à deux niveaux, couvert d'une toiture à la Mansart, avec deux pavillons octogonaux aux extrémités. Chauvieres, il ne reste que la base d'une grosse tour carrée, un donjon, en moellons de   grès rouges, qui peut dater des Xe et XIe siècles. Un ancien chemin creux et un abreuvoir peuvent marquer  l'emplacement d'anciens fossés. Mais il aurait existé, tout à côté, d'autres constructions, dans la parcelle ou  abondent des tuiles et pierraille. La photo aérienne y laisse apparaître des anomalies en particulier un grand  carré qui évoque une enceinte.","habitants":"Général Louis Henri dAuvergne           Famille de Beaucaire\"","divers":"Château de Bouchatte à Chazemais","gps":"","images":["../../jctruffet.com/image/image_03/03_Chazemais_1.jpg"]},"Consult_chateau_formulairec01f":{"id":"Consult_chateau_formulairec01f","dept":"03","canton":"Varennes-sur-Allier","commune":"Varennes-Sur-Allier","nom":"Chazeuil_Varenne","type":"Château","periode":"XVII","histoire":"CHAZEUIL, les personnages en lien avec Varennes sur Allier : Charles VII qui pris Varennes en juin 1437.  Louis XI qui sinstalle à Varennes pour tenter de prendre Moulins.  Le château dépend  d'un  fief considérable, appelé Le fief de La Besche. Il y a toute justice, haute, moyenne et basse. Aujourd'hui  utilise son parc pour  camping.        VARENNE,  le château,  à la fin du Moyen-Age appartenait à la famille de La Souche. En 1377, Jean de la Souche, seigneur de Salvert  à Doyet, époux d'Isabelle de Rochedragon, dame de La Varenne, rend foi et hommage de la \"terre et hostel de la Varenne\", en même temps que pour un droit d'usage en la forêt de Lespinasse. La famille de la Souche resta pendant plusieurs siècles en possession de cette terre.  Au début du XVIIe siècle elle était aux de Bonneval et fut vendue, en 1700, à Nicolas Luylier, conseiller procureur du  roi en la châtellenie de Montluçon, dont la fille épousa Claude Antoine Deschamps. Depuis 1818, la Varenne est restée  dans la famille  des comtes d'Agoult. Entré dans la famille d'Agoult à la Restauration, il passe dans la famille Séguier descendants d'Antoine-Louis Séguier et de Pierre-Armand Séguier par le mariage de Clémentine d'Agoult avec Antoine, baron Séguier.             A quelques kilomètres au nord à Saint-Loup le château  d'Aurelle du général Louis d'Aurelle de Paladines.","architecture":"Chazeuil,  se dresse sur une hauteur dominant la vallée de l'Allier, sur laquelle, existait dès le Moyen-Age, une construction qui fut remplacée au XVIIe siècle par un édifice de style Louis XIII. Il ne subsiste que les  cuisines  et le pavillon Nord. Le reste fut démoli  pour faire place au château actuel, oeuvre de l'architecte Jean Moreau dans la seconde moitié du XIXe siècle. Egalement de style Louis XIII, il comporte un corps de logis  rectangulaire à un étage plus combles, et trois pavillons quadrangulaires, coiffés de hauts toits d'ardoises. La façade ouest, élevée en pierre blanche et brique rouge à losange noir, est flanquée au Nord d'un gros pavillon carrée. Le côté Est se trouve encadré par deux autres pavillons.   Il est recouvert d'un enduit seulement rythmé par deux pilastres d'ordre colossal délimitant une travée centrale   Une description de la fin du siècle donne l'organisation, devant l'une des faces du château  une terrasse   magnifique.                               Varenne L'ensemble, des XVIIe et XVIIIe siècles, de plan rectangulaire, est encadré de douves en eau. Le corps de logis à deux niveaux est coiffé d'un toit à croupes, et prolongé par deux pavillons qui donnent sur les ailes encadrant la cour, à laquelle on accède par un pont dormant. Deux autres pavillons surmontés d'un lanterneau octogonal encadrent la porte. Cet ensemble de constructions symétriques est des plus harmonieux.","habitants":"Seigneurs locaux\"","divers":"Château de Chazeuil et de Varennes à Varennes sur Allier.","gps":"","images":["../../jctruffet.com/image/image_03/03_Chazeuil_Varenne_1.jpg","../../jctruffet.com/image/image_03/03_Chazeuil_Varenne_2.jpg","../../jctruffet.com/image/image_03/03_Chazeuil_Varenne_3.jpg","../../jctruffet.com/image/image_03/03_Chazeuil_Varenne_4.jpg","../../jctruffet.com/image/image_03/03_Chazeuil_Varenne_5.jpg","../../jctruffet.com/image/image_03/03_Chazeuil_Varenne_6.jpg"]},"Consult_chateau_formulaire6afa":{"id":"Consult_chateau_formulaire6afa","dept":"03","canton":"Souvigny","commune":"Chemilly","nom":"Chemilly","type":"Château","periode":"XV-XVII","histoire":"Plusieurs châteaux à Chemilly dont celui de Chemilly du XVIIe siècle avec tour, de Ramillons du XV-XIXe siècle avec grosse tour ronde, de Previa du XIXe siècle avec tour, de Soupaize classique, les Foucauds.                                 CHEMILLY, le château faisait partie du système défensif longeant la vallée supérieure de la Saône dès le  Moyen-Age. Le château a été très remanié depuis le XIIIe siècle.                            SOUPAIZE a été le siège d'une paroisse et probablement d'une seigneurie, car en 1100, dans un acte  de  restitution de biens ecclésiastiques, apparait un Gilbert Soupezio. Le seigneur du lieu a obtenu, l'autorisation de  fortifier sa demeure en 1475. L'écuyer Jehan du Boys, en 1503 reconnaît tenir en fief de la duchesse de Bourbon.en 1614, Pierre  Bardon et Marie Girard,  sa femme. En 1619 Pierre Bardon possédait également la seigneurie du Méage. Son fils, Jean, qualifié d'écuyer, était conseiller au présidial de Moulins. Philippe Bardon était sieur de Bellesme et des Moquets.   Le FOUCAUDS, en 1560, le \"château et seigneurie des Foucaults\" appartenaient au capitaine de Montcoquier, famille originaire   de Monétay, qui en resta très longtemps  propriétaire. en 1602, le sieur de Montcoquier, Renaud, chevalier, mourut à Bourbon Lancy. La  seigneurie fut  confiée à des fermiers. La famille de la Souche, après avoir vendu sa seigneurie de Saint-Augustin  aux Cadier,  s'installa aux Foucauds en 1733, monsieur l'abbé de la Souche de St-Augustin maria  messire Gilbert de la Souche, seigneur des Foucaux, mousquetaire du Roi, à mademoiselle d'Albon, à Paris, en la paroisse de St-Paul.  Lors du mariage, à Chemilly, de sa fille avec un comte,  le 24 septembre 1748,  il se prévalait  du titre de seigneur-marquis d'Abrest.","architecture":"Chemilly, aux Moquets  on peut voir une gentilhommière en forme de U avec une tour ronde en  façade du corps central, daté du XVIIe siècle. Les communs sont complétés d'un pigeonnier circulaire, surmonté d'un campanile.                  Foucauds est doté de deux tours, une grosse tour ronde et une seconde à canonnières en façade qui date du XIVe siècle, le reste est du XVIIe siècle; importants communs.                 Previa,  château  construction du début du XIXe siècle, dans le style classique. Un grand corps de bâtiment à rez-de-chaussée sur terrasse et niveau de comble, reçoit aux angles deux pavillons carrés en retour d'équerre, à toits à\r\nquatre pans. Des lucarnes éclairent les combles et celles des pavillons sont surmontées d'un linteau triangulaire. Du côté du val d'Allier, la terrasse est bordée d'une longue rampe à balustres. La façade principale, flanquée d'une tour centrale, s'ouvre sur un joli parc arboré.                             Ramillons, il reste de l'ancienne seigneurie une grosse tour ronde, de la fin du Moyen-Age. Les bâtiments actuels logis et communs, sont de forme rectangulaire, relativement peu élevés. A l'un d'eux est adossée une chapelle seigneuriale. Un pavillon rectangulaire  à quatre niveaux est adossé à l'un des pignons. Il   se termine par un étage en forme d'oriol, largement ouvert sur l'extérieur.                              Soupaize, les bâtiments sont encore importants et distribués autour d'une cour fermée par des murs, des grilles et un portail tenu par des piliers de pierre. Le logis quadrangulaire est accosté d'une tour ronde à clocheton et une tour carrée en façade. Un joli porche à toit  impérial est intégré dans les communs.","habitants":"Fief de Gilbert Soupezio           Capitaine de Montcoquier\"","divers":"Château des Foucauds,  de Previa, de Ramillons et de Soupaize à Chemilly.","gps":"","images":["../../jctruffet.com/image/image_03/03_Chemilly_1.jpg","../../jctruffet.com/image/image_03/03_Chemilly_2.jpg","../../jctruffet.com/image/image_03/03_Chemilly_3.jpg","../../jctruffet.com/image/image_03/03_Chemilly_4.jpg","../../jctruffet.com/image/image_03/03_Chemilly_5.jpg","../../jctruffet.com/image/image_03/03_Chemilly_6.jpg","../../jctruffet.com/image/image_03/03_Chemilly_7.jpg","../../jctruffet.com/image/image_03/03_Chemilly_8.jpg"]},"Consult_chateau_formulaire0532":{"id":"Consult_chateau_formulaire0532","dept":"03","canton":"Chevagnes","commune":"Chevagnes","nom":"Chevagnes_Pavillons","type":"Château","periode":"XVII","histoire":"Plusieurs châteaux à Chevagnes, le château de Boube du XVIIe siècle, de Chassaigne du XVI-XVIIe siècles avec tours carrées, des Millets du XVIe siècle, de la Rouillére  et du  Pavillon du XVIIe siècle.                CHASSAIGNE, une demeure avec des tours carrées en briques décoratives date des XVIe et  XVIIe siècles: il s'agit du château de La Chassagne. Une construction précédente existait, puisqu'en 1503, l'écuyer Anthoine de Thony fait aveu à la duchesse de Bourbon de son \"hostel, terre, domaine,  de la Chassaigne. Il appartenait au XVIIIe siècle à la famille de la Fosse dont   quelques membres nous sont connus par les registres paroissiaux. À la veille de la Révolution,  le 23 janvier 1787 se maria en son château de la Chassagne, Charles, fils de Pierre de la Fosse, ancien fournisseur de la marine pour le roi.    PAVILLON, l'édifice  a appartenu à Jean Duret Lieutenant  pour le Roi en Bourbonnais, puis à la famille Perrotin. Cette bâtisse a une  certaine histoire elle fut l'abri clandestin de l'état civil religieux de Chevagnes durant la Terreur.                                 MILLETS aujourd'hui exploitation agricole Le dénombrement des fiefs de 1503 mentionne trois frères, Damas, Jacques et Benoit Milletz, membres  de   la communauté familiale des Milletz, qui reconnaissent tenir de la duchesse de Bourbon, un mas et ténement, appelé  le ténement des Milletz, ou sont leurs maisons, granges, vacherie, une chapelle et coulombier. Leur   mas était donc, à cette époque un lieu noble, auquel a succédé un château plus récent.","architecture":"Boube,  l'ensemble qui s'organise autour de la cour a perdu son caractère au siècle dernier. Seul le porche conserve un intérêt. Il se situe entre deux bâtiments de communs, fermant une cour au fond de laquelle se trouve le corps de logis. C'est une construction d'époque Louis XIII se composant d'un encadrement appareillé à crossettes, sous   lequel ouvre un arc en anse de panier.  Deux pilastres de chaque côté, au relief peu accentué, soutiennent un entablement formé d'une frise nue et d'une corniche moulurée. Sur celle ci, repose une niche rectangulaire contenant la statue de St-Blaise, encadrée de deux consoles très étirées et surmontée d'un fronton curviligne mouluré. La porte piétonne a été bouchée.  Le portail présente toutes les caractéristiques décoratives  du XVIIe siècle ainsi qu'un aspect baroque rare dans la région.               Millets Le dénombrement des fiefs de 1503 le mas était donc, à cette époque un lieu noble, auquel a succédé un château plus récent.                                   Pavillon, gentilhommière du XVIIe siècle à harpages de brique et encadrements de pierre conçue par  Viollet le Duc,  Le Pavillon est composé de deux ensembles  auxquels on accède par un porche construit en 1716, la  maison de   maître et les communs transformés en maison bourgeoise, le bâtiment principal  constitué de  deux corps de logis   disposés en équerre, dont les étages sont desservis  par l'escalier d'une tourelle d'angle. Les deux corps sont à deux niveaux de deux travées et  un niveau, sous comble élevé, éclairé  de belles lucarnes.  Les hautes toitures en pavillon reposent sur des entablements de brique et supportent de monumentales cheminées. La maison longue et basse qui a transformé les communs est à 6 travées, coiffée d'un toit à croupe et à jet d'eau.                                    Chassaigne, c'est une haute maison anglée de tours carrées en briques décoratives du XVIe et XVIIe siècles qui fut un ancien petit fief au Moyen-Age.","habitants":"Famille Perrotin                          Famille de Damas\"","divers":"Château de Boube, de Millets, du Pavillon, la Rouillére et de Chassaigne à Chevagnes","gps":"","images":["../../jctruffet.com/image/image_03/03_Chevagnes_Pavillons_1.jpg","../../jctruffet.com/image/image_03/03_Chevagnes_Pavillons_2.jpg","../../jctruffet.com/image/image_03/03_Chevagnes_Pavillons_3.jpg"]},"Consult_chateau_formulaire3c4c":{"id":"Consult_chateau_formulaire3c4c","dept":"03","canton":"Ebreuil","commune":"Chouvigny","nom":"Chouvigny","type":"Château-fort","periode":"XIII","histoire":"CHOUVIGNY, le castrum fut édifié par un officier gallo-romain dont on sait peu de choses, si ce nest quil sappelait Calvinius, donnant son nom à son domaine quon a appelé Calviniacum et Fondis Calvini. A cette époque, le rôle du bâtiment était de maintenir la paix entre les peuples des Arvernes et des Biturgies, qui occupaient respectivement les terres situés au Sud et au Nord de la Sioule, à la demande de Guillaume Ier de Chauvigny, dans sa descendance directe se crée la branche des Seigneurs de Chouvigny, qui conservera cette propriété jusquen 1460. Ainsi, les Seigneurs de Chouvigny se sont dabord appelés Seigneurs de Calviniaco, de Chouvignet et de Chauvigny avant de prendre le nom quon connaît aujourdhui. Jusquà labolition des privilèges le 4 août 1789, les Seigneurs de Chouvigny ont toujours eu droit de haute, moyenne et basse justice sur leurs terres. Ce château appartint aux familles de Montmorin, de Vienne, de Montaigu-Listenois, Daillon du Lude, La Trémoille,  c'est la fille d'isabeau de Chouvigny, dames de Nades et de Pierre de Montmorin qui apporta le château en dot quand elle épousa Jean Motier de La Fayette , est resté pendant trois siècles à la famille de la Fayette, aprés l'acquisition par Ignace Le Noir secrétaire de Louis XV en 1734, Chouvigny tomba en ruine. En 1853 racheté par le duc de Morny, demi frère de Napoléon III le fit reconstruire il fut ensuite vendu aux enchères racheté par les de Vienne, de Montaigu-Listenois, Daillon du Lude, La Trémoille abandonné ensuite et en 1960 acquit par monsieur de Groslière qui fait revivre son passé aujourd'hui acceuillit par Mr et Mme Séverac.","architecture":"Chouvigny, construit en 1250  est lun des rares fleurons de larchitecture militaire médiévale que lon peut encore admirer aujourdhui. Plus de 750 ans après quon lui a donné sa forme actuelle, perché sur un piton rocheux qui domine de 87 mètres le cours de la rivière. Le premier édifice fortifié construit à cet endroit fut un castrum gallo-romain, à lépoque de la Rome Antique, ce qui fait de Chouvigny un des plus anciens lieux fortifiés de France, dassurer le passage dans les gorges et de maintenir lordre sur la voie romaine qui reliait les provinces du Lyonnais et de la Combraille. Cette voie existe encore aujourdhui et passe à flanc de colline juste au-dessus du château,  les tours du donjon (dont la Tour du Trésor) et du guet, un salon Henri III, un oratoire, une salle d'honneur (salle d'armes) à voûtes d'arêtes. C'est l'un des rares spécimens de l'architecture militaire du Moyen-Age. Les autres parties du château furent restaurées au cours du XXe siècle.","habitants":"Famille de Montmorin                  Famille de la Fayette                     Duc de Morny\"","divers":"Vestiges du château de Chouvigny","gps":"","images":["../../jctruffet.com/image/image_03/03_Chouvigny_1.jpg","../../jctruffet.com/image/image_03/03_Chouvigny_2.jpg","../../jctruffet.com/image/image_03/03_Chouvigny_3.jpg","../../jctruffet.com/image/image_03/03_Chouvigny_4.jpg","../../jctruffet.com/image/image_03/03_Chouvigny_5.jpg","../../jctruffet.com/image/image_03/03_Chouvigny_6.jpg","../../jctruffet.com/image/image_03/03_Chouvigny_7.jpg","../../jctruffet.com/image/image_03/03_Chouvigny_8.jpg"]},"Consult_chateau_formulaire319c":{"id":"Consult_chateau_formulaire319c","dept":"03","canton":"Jaligny-sur-Besbre","commune":"Cindre","nom":"Cindre","type":"Château","periode":"XV-XVII","histoire":"Plusieurs châteaux à Cindré, dont celui de Cindré du XIII-XVIIIe siècle tour carrée, de Fontaine du XVI-XVIIe siècle, du Gd-Montet du XVIIIe siècle, de Grouge du XVIIe siècle, du petit-Chambord du XVIIe siècle et de Puyfol du XV-XVIIe siècle donjon avec deux tours rondes.    CINDRE fait partie des fiefs pour lesquels Hervé, comte de Nevers, rend hommage en 1217 à l'évêque de Clermont.  GROUGE, construit   au XVIIe siècle par la famille Bergeron. Au XVIIIe siècle, le château   de Grouge passera par mariage aux Ménudel, et ensuite aux Prevéraux-Bertucat qui le vendent vers 1750 à G. Joulle, seigneur de Chambord, dont les descendants le conservent jusqu'au début du XXe siècle.   \r\nGRAND-MONTET, cette terre est une dépendance de l'abbaye de Sept-Fons. Les archives de Gayette (Montoldre) font  apparaître  que les religieux de cet hospice devaient, au XVIIIe siècle, plusieurs cens à ceux de Sept-Fons pour les terres qui dépendaient du fief du Grand Montet.\r\nPETIT CHAMBORD a été le siège d'une seigneurie primitive. La demeure a été acquise en 1642 par Jean-François de Chambord,  ce qui lui vaut certainement l'appellation de Petit Chambord. La famille a conservé les lieux jusqu'à la fin du  XVIIIe siècle, où l'on rencontre Claude Devaulx de Chambord, en 1779.  Aujourd'hui  ferme et chambres d'hôtes de Véronique et François Léval. PUYFOL, au XIIIe siècle,  appartient à Jean de Villars, vassal du seigneur de Montaigu le Blin. Le  château sera ruiné par les anglais en 1367, lorsque ceux-ci seront chassés par le duc de Bourbon après son retour de captivité. Regnaude de Villars porte Puyfol par mariage à la famille Saulnier, au XVe siècle, le conserveront jusqu'au début du XVIe siècle, puisqu'en 1503 ce sont Aymé et maître Jacques Saunier  qui font aveu à la duchesse de Bourbon. On trouve ensuite Jean de Breules, chambellan du duc d'Alençon, habitant à Puyfol. Puis, à partir de 1606 et  jusqu'à 1700, passe aux d'Albost qui le vendent à Claude de  Chazerat. Il est acheté en 1730 par M. Hautier de Villemontée, seigneur de Trezelle. Par mariage il revient l'année  suivante à la famille de Viry du Coude qui le cède en 1776, à J. P. de Fontaines de Trocézard, guillotiné en 1794, Puyfol saisi et vendu comme bien national. Le château est revendu à de nombreuses reprises, et est acquis en 1923  par la famille Ispenian.","architecture":"Cindre, datant du XVIIIe siècle. Le donjon (XIIe siècle) s'est écroulé le 8 août 1908. C'était cependant un édifice remarquable qu'il convient de signaler.   Grand-Montet, bâtiment du XVIIIe siècle au plan en U. Le rez-de-chaussée est  posé sur une base assez haute et fortement tallutée. Depuis le Sud, l'impression d'élévation est importante. Grouge est un bâtiment de  plan rectangulaire, flanqué d'une tour-pigeonnier circulaire à l'angle Nord-Ouest, et en façade d'une tour  rectangulaire d'escalier.         Fontaine, le château de la fin du Moyen-Age, fût remanié de style Renaissance,  flanquée de deux tours circulaires, fermé sur le côté d'une cour à laquelle on accède par un portail  d'ordre dorique daté de 1691.  \r\nPetit Chambord, détruit par les anglais pendant la guerre de Cent Ans, le château sera reconstruit à la fin du XIVe siècle sur l'éminence naturelle qu'il occupait déjà. Probablement ancienne maison forte, installé sur l'emplacement d'une motte  féodale. Les bâtiments anciens, qui ont été restaurés, forment   un long corps de logis à rez de chaussée et combles élevés, auquel sont adossés deux appentis. Un second  de bâtiment, construit au XVIIe, a été disposé  en équerre, c'est une sorte de gros pavillon rectangulaire, à   deux niveaux, coiffé d'un toit à croupes.                Puyfol, Détruit par les Anglais pendant la guerre de Cent Ans, le château sera reconstruit à la fin du XIVe siècle sur l'éminence naturelle qu'il occupait déjà, les bâtiments qui restent se regroupent autour d'une cour rectangulaire présentant deux niveaux différents. Les plus anciens comprennent le donjon et sa tourelle d'escalier et deux tours rondes, le bâtiment du XVe siècle  comprend au 1er étage une salle voûtée en arête sur fortes nervures. L'escalier  à vis avec marches  en pierre tracées  sur un diamètre assez grand, une petite tourelle d'angle reposant sur un joli  cul-de-lampe le continue par des degrés plus étroits.","habitants":"Famille Bergeron\"","divers":"Château de Cindré, de la pouge, de Fontaine, le Petit Chambord et Puyfol","gps":"","images":["../../jctruffet.com/image/image_03/03_Cindre_1.jpg","../../jctruffet.com/image/image_03/03_Cindre_2.jpg","../../jctruffet.com/image/image_03/03_Cindre_3.jpg","../../jctruffet.com/image/image_03/03_Cindre_4.jpg","../../jctruffet.com/image/image_03/03_Cindre_5.jpg","../../jctruffet.com/image/image_03/03_Cindre_6.jpg","../../jctruffet.com/image/image_03/03_Cindre_7.jpg"]},"Consult_chateau_formulairebadf":{"id":"Consult_chateau_formulairebadf","dept":"03","canton":"Herisson","commune":"Louroux-Hodement","nom":"Civrais","type":"Château","periode":"XVI","histoire":"CIVRAIS, en 1098, Hamon Palazeis donne aux moines  de La Chapelaude le Manse de Civray. En 1301, un aveu de Renaud de Moulins, damoiseau, pour ce qu'il tient  en fief de monseigneur Robert comte de Clermont, seigneur de Bourbonnais. En 1468, Jehan d'Hérisson, écuyer, seigneur de Civray rend foi et hommage pour  son hostel, terre et seigneurie. La famille d'Hérisson est encore présente en 1503, lorsque Guillaume de Hérisson reconnait tenir en fief de la duchesse de Bourbon, pour lui et pour ses frères. A la fin du XVIIe siècle, Gilbert de Rochebut, chevalier, est seigneur de Civrais. Au XVIIIe siècle, la terre est en possession d'une famille  de la Bruyère, et appartient actuellement à la famille de Colasson.","architecture":"Civrais, le château actuel est une bâtisse à étage pouvant dater du XVIe siècle, avec tour ronde. La partie basse  du logis présente un tympan armorié et à l'angle, une autre tour du XVIIIe siècle. De vastes communs ferment la cour. D'une ancienne chapelle, reste une pierre datée  de 1832.","habitants":"Seigneur Gilbert de Rochebut\"","divers":"Château de Civrais","gps":"","images":["../../jctruffet.com/image/image_03/03_Civrais_1.jpg","../../jctruffet.com/image/image_03/03_Civrais_2.jpg","../../jctruffet.com/image/image_03/03_Civrais_3.jpg"]},"Consult_chateau_formulairec2b1":{"id":"Consult_chateau_formulairec2b1","dept":"03","canton":"Herisson","commune":"Estivareilles","nom":"Cluzeau","type":"Château","periode":"XVII","histoire":"CLUZEAU, le château situé dans le Bourg présente une tour construite vers 1880, accolée à des bâtiments datant des  XVIe, XVIIe siècles. Dès cette époque, il est le logis principal des Penot d'Estivareilles, également seigneurs de Thizon. Vers 1774, la propriété passe par mariage à la famille de Montaignac, puis au XIXe siècle, à celle des  Mairesse et des Brivezac. On ne sait rien du château de cette époque, le  premier seigneur connu est, en 1503, Jehan des Champettes, écuyer, lorsqu'il fait aveu à la duchesse de Bourbon de sa maison du Cluzeau. Puis il appartient à la famille Alamargot, branche de Fontbouillant dont les membres, écuyers s'intitulaient également  du Rincey, Châteauvieux, Quinssaines. Sa fille épouse le comte  Jean de Lambertye, d'une famille périgourdine qui comptait parmi ses ancêtres nombre d'officiers au service du roi. Cette tradition millitaire continue jusqu'à la Révolution, époque où certains des Lambertye émigrent, tandis que reste au Cluzeau, Emmanuel, sous-lieutenant aux gardes du corps. Le  château appartient encore aux descendants de cette famille.                                                                    ESTIVAREILLES, le château situé dans le Bourg présente une tour construite vers 1880, accolée à des bâtiments datant des   XVIe, XVIIe siècles. Dès cette époque, il est le logis principal des Penot d'Estivareilles, également seigneurs de  Thizon. Vers 1774, la propriété passe par mariage à la famille de Montaignac, puis au XIXe siècle, à celle des Maitresse et des Brivezac.","architecture":"Cluzeau, château édifié en 1705 comme maison de plaisance et centre d'une exploitation agricole. L'édifice présente une architecture classique caractérisée par sa symétrie et son ouverture vers l'extérieur. Un fronton triangulaire délimite les travées centrales. Le grès rose bariolé de Vallon-en-Sully est utilisé pour les éléments appareillés. Les deux vastes ailes de communs ont été réalisées en 1782 de part et d'autre de la cour, selon le modèle bourbonnais. Ce domaine est représentatif des maisons de maîtres du XVIIIe siècle.                 Dans la commune les tours du château de la Marandière.","habitants":"Famille de Penot d'Estivareilles                            Comte Jean de Lambertye                                              Famille de Montaignac\r\n        \r\n        \"","divers":"Château de Cluzeau, de la Marandière à Estivareilles","gps":"","images":["../../jctruffet.com/image/image_03/03_Cluzeau_1.jpg","../../jctruffet.com/image/image_03/03_Cluzeau_2.jpg","../../jctruffet.com/image/image_03/03_Cluzeau_3.jpg"]},"Consult_chateau_formulaire1d2d":{"id":"Consult_chateau_formulaire1d2d","dept":"03","canton":"Commentry","commune":"Commentry","nom":"Commentry","type":"Château","periode":"XV-XIX","histoire":"Trois châteaux à Commentry, des Forges du du XV-XIXe siècle, de Montasiège  et du Bois de  Colombier du XIXe siècle.       FORGES,  l'origine de la seigneurie des Forges remonte au XIIe siècle. On connait mal les possesseurs de  cette  époque. En 1467, un Monestay épousa Jeanne de La Faye, dame des Forges. En 1503, c'est Extache Monestay, écuyer, qui  reconnait tenir en fief de la duchesse de Bourbon, dans la châtellenie de Murat, sa maison et place forte des Forges  avec grange. En 1611 Gilbert de Monestay  épouse Claude de Chazeron. Au XVIIIe siècle, Hugues de Monestay prend le titre de comte de Chazeron, baron   des Forges, de Malicorne, seigneur de Commentry, sa veuve devint concessionnaire des mines qu'elle rétrocéda à l'industriel Rambourg. Les Forges  passèrent ensuite à la famille de Fontanges.  Aujourd'hui chambres d'hôtes.\r\nBOIS de COLOMBIER, ce château fut construit entre 1815 et 1820 par monsieur Aupetit Durand, député.           MONTASIEGE pas d'information historique. sur ce manoir du XIXe siècle.","architecture":"Forges avait grand air, avec ses très hautes murailles couronnées de mâchicoulis et de créneaux et ses  douves en eau. Il a été très remanié, mais cette demeure à trois étages a conservé  ses deux tours d'angle en façade. Le  nom des Forges, semble attester une activité métallurgique à Commentry.\r\nBois de Colombier, le château a servi pendant quelques années de centre de vacances. Rejoindre la « Torche » où vous pourrez découvrir un lavoir en faisant un petit crochet à gauche de 100 mètres environ.","habitants":"Famille de Gilbert de Monestay\"","divers":"Château des Forges, du Bois du Colombier et le manoir de Montasiège à Commentry","gps":"","images":["../../jctruffet.com/image/image_03/03_Commentry_1.jpg","../../jctruffet.com/image/image_03/03_Commentry_2.jpg","../../jctruffet.com/image/image_03/03_Commentry_3.jpg","../../jctruffet.com/image/image_03/03_Commentry_4.jpg","../../jctruffet.com/image/image_03/03_Commentry_5.jpg","../../jctruffet.com/image/image_03/03_Commentry_6.jpg","../../jctruffet.com/image/image_03/03_Commentry_7.jpg"]},"Consult_chateau_formulairead34":{"id":"Consult_chateau_formulairead34","dept":"03","canton":"St-Pourcain-sur-Sioule","commune":"Contigny","nom":"Contigny","type":"Château","periode":"XVII","histoire":"Deux châteaux à Contigny; la cour du XIXe siècle  et la commanderie de la Racherie. COUR, cet ancien fief fut successivement la propriété de Renault de La Cour, de Jean de Bos, frère de St-Jean  de  Jérusalem, des Nory, des Popillon, du comte de Nancy, et en 1649, de François  de la Croix. Il changea encore plusieurs fois de main  avant d'être acquis en 1714  par Pierre Imbert. Dans la seconde moitié  du XIXe siècle,  les de Ballore firent construire l'édifice actuel sur l'emplacement du château féodal. Commanderie de la Racherie, c'est aux sires de Bourbon qui en furent les principaux bienfaiteurs que l'on doit l'établissement de la commanderie de la Racherie à Contigny. Elle a appartenu, dès son origine, aux hospitaliers de Saint-Jean-de-Jérusalem, au début du XIIIe siècle. De la commanderie au sud où il ne reste comme vestige qu'un pigeonnier à pans de bois, dont la restauration exemplaire lui valut de recevoir le prix Emile-Mâle.","architecture":"Cour, édifice actuel sur l'emplacement du château féodal. Entouré d'un grand parc, c'est un corps de logis rectangulaire à un étage couvert d'un toit d'ardoise, flanqué de  courtes ailes en retour, entre lesquelles s'étend au rez de chaussée une galerie surmontée d'une terrasse  bordée de balustre. Un étroit pavillon en légère saillie occupe le centre de la façade, il est surmonté d'un   fronton triangulaire brisé ou figure les armes des Ballore. Le corps de logis fut augmenté, dans l'alignement   à droite, d'un bâtiment à toit brisé. Dans le grand parc boisé s'élève également une chapelle castrale, de style  néo-renaissance.                            Commanderie de La Racherie Architecture et ornementation,  de la commanderie au sud où il ne reste comme vestige qu'un pigeonnier, du hameau de la Racherie au milieu duquel subsiste une maison du XVIe siècle, pourvue d'un toit à quatre pans et d'une tour carrée non saillante. Selon la tradition locale, cette construction serait un reste de l'hôpital.","habitants":"Famille de Ballore \"","divers":"Château de Cour et la Commanderie de la Racherie à Contigny","gps":"","images":["../../jctruffet.com/image/image_03/03_Contigny_1.jpg","../../jctruffet.com/image/image_03/03_Contigny_2.jpg","../../jctruffet.com/image/image_03/03_Contigny_3.jpg","../../jctruffet.com/image/image_03/03_Contigny_4.jpg","../../jctruffet.com/image/image_03/03_Contigny_5.jpg","../../jctruffet.com/image/image_03/03_Contigny_6.jpg"]},"Consult_chateau_formulaire4abd":{"id":"Consult_chateau_formulaire4abd","dept":"03","canton":"Le Donjon","commune":"Loddes","nom":"Coudes","type":"Château","periode":"XV","histoire":"COUDES, ce fief sans justice appartenait, au XVe siècle, à la famille de Lorry, originaire de la région de Rongères en Bourbonnais. En 1461, Jacques de Lorry est seigneur du Coude et de Presles. Il est encore cité en 1496 parmi les  témoins de l'acte de fondation du chapitre voisin de Montaigut. A la mort de Jean de Lorry en 1519, le domaine  passe aux mains des Servajan qui le portent en mariage en 1624 aux d'Obeilh. En 1652, à nouveau par mariage,   le Coude passe aux Viry qui le conservent jusqu'à la Révolution. Le château sera vendu par leurs héritiers en 1811 à Antoine Godin, armateur et commissaire du gouvernement en Angleterre. En 1822 acheté par Louis  le Lorgne baron d'Ideville, député  de La Palisse, s'en rend acquéreur et le fait entièrement reconstruire. Actuellement, cette propriété est dans la famille des descendants de Jean Baptiste Méplain, ancien bailli du Donjon, branche des Méplain du Coude.","architecture":"Coudes, de caractère Restauration, c'est une bâtisse de plan rectangulaire à deux étages, couvert d'un toit en croupe.  Ses longues façades ne présentent aucune décoration. Un très beau parc boisé du XVIIe siècle entoure le château et lui   confère l'essentiel de son charme.","habitants":"Baron Louis  le Lorgne\"","divers":"Château de Coudes à Loddes","gps":"","images":["../../jctruffet.com/image/image_03/03_Coudes_1.jpg","../../jctruffet.com/image/image_03/03_Coudes_2.jpg","../../jctruffet.com/image/image_03/03_Coudes_3.jpg"]},"Consult_chateau_formulaire7809":{"id":"Consult_chateau_formulaire7809","dept":"03","canton":"Moulins","commune":"Coulandon","nom":"Coulandon","type":"Château","periode":"XVIII","histoire":"Deux châteaux à Coulandon dont celui de La Chassagne du XVIIIe siècle et de Presles XVIIIe siècle.            CHASSAGNE, en mai 1495 concernant une fondation de Philippe de Toury, écuyer, seigneur à La Chassagne,   puisqu'en 1503, l'écuyer Anthoine de Thony fait aveu à la duchesse de Bourbon, Il appartenait au XVIIIe siècle à la famille de la Fosse , le sieur de La Chassagne était Jean Esgrin, écuyer, qui mourut à Souvigny, le 29 mars 1601. Le fils aîné du seigneur de La Chassagne se faisait appeler Charles de Bonnefont. 50 ans plus tard, elle était entre les mains d'un homme de loi, Jacques Janet, avocat au Parlement, fils d'un conseiller du roi en la châtellenie de Moulins.  Etienne Roussaut, lieutenant général civil et criminel en l'élection de Moulins, \"sieur de La Chassagne\", mentionné en février 1685. Son fils Pierre en hérita. Etienne de Nesmond, sieur de La Chassagne en 1702, reste inconnu. En 1777, son propriétaire était Jacques Dumont, docteur en médecine. A la veille de la Révolution, le 23 Janvier 1787, se maria en son château, Charles, fils de Pierre de la Fosse, ancien fournisseur de la marine du roi.                    PRESLES  Au XVe siècle,  Guillaume Lapelin, secrétaire d'Agnès de Bourgogne, possédait le fief de La Presle. En 1639, Henri de Lapelin  était seigneur et son fils, Jean Nicolas, seigneur de Lapelin. La Presle fut acquise ultérieurement   par Pierre Louis Perron, seigneur de Montgarnaud à Neuvy, qui avait été officier de duc de Berry. Sa fille,  Jeanne épousa en 1725 le frère du baron de Veauce, Simon Cadier, écuyer et seigneur de Ponsut. Au 8 juin 1779, date du mariage de Louis François Plouvyé, seigneur de La Presle et lieutenant du roi à Souvigny. A la veille de la Révolution le domaine a été acheté par Jean-Baptiste Durand, La Presle est passée à son frère Honoré dont la petite fille, Isaure, a épousé le comte de Las Cases,  parlementaire, fils   du compagnon de l'empereur qui l'a suivi à Ste Hélène.  L'actuel propriétaire est le comte Gabriel de Bellescize  diplomate, qui a épousé une descendante de la comtesse de Las Cases. Celle-ci, avant d'habiter au château  de La Presle, a vécu au château de Grossouvre.","architecture":"La Chassagne  une maison avec des tours carrées en briques décoratives date des XVIe et XVIIe siècles, cette gentilhommière consiste en un logis rectangulaire avec deux pavillons en retour d'équerre terminés par deux tours rondes à lanternon. Les communs et le portail d'entrée datent de la fin du XVIIIe siècle. Il existe encore des traces de douves sèches.\r\nPresles, sur la route de Bourbon, est un logis en briques bicolores dans un grand parc. La cour d'honneur est limitée par deux rangées de communs  du XVIIIe siècle, avec à l'extrémité de chacun, une tour ronde à lanternon. Le pavillon et la chapelle néo-romane à clocheton sont du XIXe siècle.","habitants":"Famille de Guillaume Lapelin\"","divers":"Château de Chassagnes et de Presles à Coulandon","gps":"","images":["../../jctruffet.com/image/image_03/03_Coulandon_1.jpg","../../jctruffet.com/image/image_03/03_Coulandon_2.jpg","../../jctruffet.com/image/image_03/03_Coulandon_3.jpg","../../jctruffet.com/image/image_03/03_Coulandon_4.jpg","../../jctruffet.com/image/image_03/03_Coulandon_5.jpg","../../jctruffet.com/image/image_03/03_Coulandon_6.jpg","../../jctruffet.com/image/image_03/03_Coulandon_7.jpg"]},"Consult_chateau_formulaire0c38":{"id":"Consult_chateau_formulaire0c38","dept":"03","canton":"Dompierre-sur-Besbre","commune":"Coulanges","nom":"Coulanges","type":"Château","periode":"XVI-XVIII","histoire":"Trois châteaux à Coulanges, celui de Mortillon du XVIe siècle avec tours et de Vesvres du XVIIIe siècle et de Prats du XIXe siècle.                      VESVRES, dès le XIVe siècle le fief de Vesvres appartenait à la famille Chambon et en 1335, la  veuve d'Hugues du Chambon, seigneur de  Vesvres,   demoiselle Béatrice de Molles, fit aveu du fief au nom de ses deux fils mineurs. En 1411 c'est Hugues de la Varenne   qui portait le titre de seigneur de Vesvres et le transmit à ses descendants  jusqu'à la fin du XVIe siècle. Après avoir  été, au  XVIIe siècle, la propriété  de la famille d'Isserpent, le château passa  aux mains des Lévis Château Morand.    Vendues en 1714 à Antoine Préveraud, Les Vesvres restèrent dans cette famille jusqu'au XXe siècle.               Mortillon et Prats pas d'information historique.","architecture":"Vesvres, sur un bombement du relief qui domine la vallée de la Loire, le fief de Vesvres disposait d'un important  moulin, installé sous la chaussée d'un étang. L'ancienne motte féodale et ses fossés ont disparus, ainsi que l'ancien château, sous des transformations récentes. La demeure actuelle appelée château, est une construction du XVIIIe siècle. Elle est composée d'un logis principal de plan rectangulaire avec deux ailes en retour d'équerre.                                Mortillon construction  du  XVe siècle  est à l'origine un manoir féodal dont la motte est encore visible dans le pré, à l'est du château. Le remaniement de l'ancien édifice fut engagé au début du XVIe siècle. Le corps de logis, de plan rectangulaire, à deux niveaux, fut l'objet de premières transformations au XVIIe siècle mais il convient de noter que la restauration de la toiture est d'époque récente. Deux grosses tours rondes, vestiges de la maison forte du XVe siècle, ont cependant été conservées, en façade du bâtiment. Faiblement éclairées de modestes ouvertures, elles se distinguent par leurs toits coniques élancés.","habitants":"Famille d'Isserpent\"","divers":"Château  de Mortillon  de Vesvres et de Prats à Coulanges.","gps":"","images":["../../jctruffet.com/image/image_03/03_Coulanges_1.jpg","../../jctruffet.com/image/image_03/03_Coulanges_2.jpg","../../jctruffet.com/image/image_03/03_Coulanges_3.jpg","../../jctruffet.com/image/image_03/03_Coulanges_4.jpg","../../jctruffet.com/image/image_03/03_Coulanges_5.jpg","../../jctruffet.com/image/image_03/03_Coulanges_6.jpg"]},"Consult_chateau_formulaire0614":{"id":"Consult_chateau_formulaire0614","dept":"03","canton":"Neuilly-le-Réal","commune":"Chapeau","nom":"Cour_Chapeau","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux à Chapeau celui de Cour-en-Chapeau  du XV-XVIe siècle et de Chevennes du XVII-XIXe siècles.          COUR, en 1462, le fief devient propriété de Hugues de  Chaval dit Buyat qui fait construire le château sur deux mottes contigues, l'une portant l'habitation, l'autre les dépendances. Le château actuel remplace une ancienne forteresse médiévale, qui appartenait à la famille de Vichy. Seigneurie de Pierre Bertrand, puis à Jehan Aubry et sa sur damoiselle Claude Buyard rendent hommage à la duchesse de Bourbon pour leur hostel de la Cour. Michel Cadier seigneur de La Brosse Cadier, trésorier général du Bourbonnais, fut propriétaire du fief de La Cour qui, en 1585, passa par mariage à Antoine Verne, conseiller du roi et trésorier général des finances royales en Languedoc et c'est lui qui apporte, en 1595, les principales transformations a la construction primitive. La propriété, après  diverses mutations, fut vendue aux Mégret fonctionnaires royaux à Moulins, auxquels succédèrent les Feydeau, jusqu'en 1758. François Bernard des Crots d'Estrées fut le dernier seigneur de la Cour en Chapeau, son fils s'en dessaisit en 1811, au profit  d'un industriel lyonnais, M. Merlat, qui la revendit en 1823 aux Tortel. Toujours dans   la famille Tortel.                         CHEVENNES, pas d'information historique.","architecture":"La cour en chapeau,  construction  du XVe siècle étaient isolées par des fossés. Le château se compose d'une habitation formée de deux corps de logis perpendiculaires, inscrite à l'intérieur d'un quadrilatère aux angles garnis de tours circulaires.  Située dans un site remarquable, la Cour se compose d'un corps de logis  et de communs entourant une grande cou, dans laquelle on pénètre en passant sous un pavillon carré auquel est accolée une seconde tour plus petite contenant l'escalier. Les angles de la cour conservent des tours circulaires  à l'ouest. Le bâtiment principal fut construit à la fin du XVe siècle, remanié au siècle suivant. Il comporte un corps de logis rectangulaire à deux niveaux, flanqué de quatre  tours, l'une d'elles carrée, contenant l'escalier. Comme aux châteaux de L'Écluse et du Frêne tout proches, l'intérêt de l'ensemble provient de la beauté des matériaux (brique polychrome à appareil losangé) et des volumes ( hautes  toitures animées de cheminées, de clochetons et de girouettes ). Au sud est s'étend un jardin à la française et au nord-ouest la cour d'entrée où l'on pénètre par la guette et que limitent, au nord-ouest  au sud ouest.\r\nChevennes,  construction du  XVIIe siècle, occupant une motte entourée de douves en eau et sans doute édifié à l'emplacement d'un édifice médiéval, complété au XIXe siècle de communs et dépendances. Autour d'une cour quadrangulaire accessible par un pont, est disposé un ensemble de bâtiments caractéristiques de l'architecture bourbonnaise par les matériaux et leur mise en oeuvre. La porterie, en briques à motifs bruns losangés, se compose d'un portail accosté de deux pavillons. Le logis, également en briques losangées, est constitué d'une aile basse allongée. L'intérieur a conservé ses aménagements d'origine.","habitants":"Famille d'Hugues de  Chaval\"","divers":"Forteresse de la Cour en Chapeau et le château  de Chevennes.","gps":"","images":["../../jctruffet.com/image/image_03/03_Cour_Chapeau_1.jpg","../../jctruffet.com/image/image_03/03_Cour_Chapeau_2.jpg","../../jctruffet.com/image/image_03/03_Cour_Chapeau_3.jpg","../../jctruffet.com/image/image_03/03_Cour_Chapeau_4.jpg","../../jctruffet.com/image/image_03/03_Cour_Chapeau_5.jpg","../../jctruffet.com/image/image_03/03_Cour_Chapeau_6.jpg","../../jctruffet.com/image/image_03/03_Cour_Chapeau_7.jpg","../../jctruffet.com/image/image_03/03_Cour_Chapeau_8.jpg","../../jctruffet.com/image/image_03/03_Cour_Chapeau_9.jpg"]},"Consult_chateau_formulaire7118":{"id":"Consult_chateau_formulaire7118","dept":"03","canton":"Huriel","commune":"Courçais","nom":"Courcais","type":"Maison forte","periode":"","histoire":"COURCAIS, pas d'information historique.  FORET-MONVOISIN, siège d'une seigneurie dépendant de la chatellenie d'Hérisson, avec toutes justices, s'étendant sur Courçais et une partie de Viplaix. Au XVIIe  siècle, par alliance il devint la possession des Louan. Ainsi ce château, fait rare dans  l'histoire  du Bourbonnais, est  il resté en possession de la même famille pendant neuf siècles. Depuis 1960, il s'est complètement dégradé et n'est plus qu'une ruine.      A quelques kilomètres au nord le château de  Bussières les Nonains sur la commune de Saint-Désiré au conflent de la Gueugne et de la Queuille, le couvent fut fondé en 1189 pour des religieuses de l'ordre de Citeaux, par Ebbes de Déals et sa femme Guiberge de Bourbon. En 1625, elle furent transférés à Bourges.","architecture":"Courçais comprenait trois grand corps de logis  reliés par trois   tours et un grand donjon carré. Lors des guerres de religions, en 1594, il fut pris puis détruit en partie. Des souterrains servaient communément de refuge dans toute la région lors des invasions et des pillages. Ainsi, un souterrain-refuge est découvert en bon état en 1950 sur la commune. La galerie daccès forme un couloir de 1 m 40 de haut. Elle communique avec un autre couloir par une sorte de chatière circulaire située à 50 cm du sol. La galerie aboutit dans une grande salle au sol en terre battue où sont alignés le long de la paroi des bancs de pierre ou de terre. Le château le plus important de la commune est celui du château de Mauvoisin, composé initialement de 3 grands corps de logis reliés par 3 tours et dun grand donjon, il est pris et en partie détruit lors des guerres de religion en 1594. La dernière tentative de restauration date de 1815 mais est abandonnée.  Depuis 1960 Le château tombe alors progressivement en ruines.                           Bussières les Nonains  grande maison bourgeoise encadrée de tours rondes aux angles et une autre en façade remanié au XIXe siècle en style château.","habitants":"Famille  des Louan\"","divers":"Château de Monvoisin  et Chârtreuse de Bussières les Nonains à Courçais","gps":"","images":["../../jctruffet.com/image/image_03/03_Courcais_1.jpg","../../jctruffet.com/image/image_03/03_Courcais_2.jpg","../../jctruffet.com/image/image_03/03_Courcais_3.jpg","../../jctruffet.com/image/image_03/03_Courcais_4.jpg"]},"Consult_chateau_formulaire1874":{"id":"Consult_chateau_formulaire1874","dept":"03","canton":"Varennes-sur-Allier","commune":"Crechy","nom":"Crechy","type":"Château","periode":"XVII","histoire":"Quatre châteaux à Créchy  dont celui de Créchy du XIII-XVIIIe siècle, de Barrière du XIXe siècle de Sauvage du XVIIe siècle et de la Toulle du XIXe siècle.           CRECHY, pas d'élément historique.\r\nSAUVAGE, de constitution récente la terre du Sauvage appartient au XVIIe  siècle à la famille Fauconnet.  Elle passe ensuite  par mariage à  Jacques Delaire en 1694. En 1744, Elle  appartient à Cluade Marnier, dont les descendants    la conservent jusqu'au XXe siècle. \r\nBARRIERE ,Pas d'éléments historiques\r\nTOULLE, au début du XVIIIe siècle, Claude Bardonnet, fermier de la seigneurie de Chazueil, vint se fixer  à Toulle et qui en prend le nom. En 1808, Anne Bardonnet de la Toulle apporte cette terre en mariage à Félix de Conny, sous préfet de La Palisse. Leurs descendants, les Barral, feront reconstruire au XIXe siècle le château, qu'ils vendirent  en 1946 à M. Fosse.","architecture":"Barrière la petite construction de la Barrière est récente, érigée dans un style néo classique. Le corps de bâtiment de forme quadrangulaire est à deux niveaux, mais le niveau de comble, éclairé    par les demi fenêtres, manque d'aisance. La petite tourelle centrale, cylindrique et la toiture en poivrière, sert de hall d'entrée alors que son premier étage est éclairé d'une grande baie ouvrant sur la cour. L'ordre et l'harmonie  du XIXe siècle règnent dans cette construction couverte d'ardoises, il subsiste de l'ancienne maison seigneuriale  un pigeonnier à base circulaire avec piste d'envol à l'étage, le toit conique est surmonté d'un petit lanternon.                                Créchy, ce petit manoir consiste en un bâtiment bas, à rez-de-chaussée et combles élevés, éclairés d'une petite lucarne. Alors que les communs enferment une cour intérieure, un pigeonnier de plan carré, couvert d'un toit à quatre pans, surmonté d'un lanternon, marque le privilège seigneurial.\r\nSauvage, cette terre, qui semble n'avoir jamais été fief indépendant, abrite tout de même une ancienne motte  fossoyée,  et un petit château en partie XVIIIe siècle, très modifié au XIXe siècle. Une tour circulaire a été  adjointe à l'édifice   quadrangulaire  initial. Une extension tangente à la tour a reçu, comme  cette dernière, un couronnement de faux   créneaux.                                 la Toulle, de style Louis XIII, le château est de plan rectangulaire, flanqué sur la   façade ouest d'une tour semi-circulaire, et sur le côté opposé d'une tour rectangulaire, le bâtiment comporte   deux niveaux plus les combes, sur un soubassement de pierres, les murs sont appareillés de briques rouges   et noires en losanges, alternant avec un enduit gris. Aux angles, aux piédroits des ouvertures et aux linteaux  une pierre blonde  alterne avec la brique. Le toit en ardoise est éclairé  par douze lucarnes en pierre, coiffées  d'un fronton ondé.","habitants":"Famille Fauconnet\"","divers":"Château de Créchy, de Barrière, de Sauvage, et de Toulle à Créchy","gps":"","images":["../../jctruffet.com/image/image_03/03_Crechy_1.jpg","../../jctruffet.com/image/image_03/03_Crechy_2.jpg","../../jctruffet.com/image/image_03/03_Crechy_3.jpg","../../jctruffet.com/image/image_03/03_Crechy_4.jpg","../../jctruffet.com/image/image_03/03_Crechy_5.jpg"]},"Consult_chateau_formulaire39b3":{"id":"Consult_chateau_formulaire39b3","dept":"03","canton":"Montet","commune":"Cressanges","nom":"Cressanges","type":"Château","periode":"XV-XIX","histoire":"Quatre châteaux à Cressanges, celui de Charnay du XV-XIXe siècle, de Dreuille du XIXe siècle néo-gothiques, des Bois Granges et la Noix.           CRAISSANGES, le bourg, composé de deux châteaux féodaux, propriétés de familles nobles : le château des Noix,  du XVIIe siècle. le plus ancien, est occupé avant l'an 1400 par la famille de Mareschal, et le château de Dreuille dont l'actuel bâtiment fait suite à d'autres constructions fortifiées appartenant à la famille de Dreuille depuis le XIIIe siècle. En 1300, c'est la veuve de Jehan   de Breuil, Brune de Bayet, qui reconnait tenir le fief. En 1503 Claude de Dreulhe fait aveu à la  duchesse de Bourbon. \r\nCHARNAY, déjà au XIVe siècle le fief est constitué, car en septembre 1336, Perrin et Hugues de la Charnée, avec leur sur Agnès, femme de Simonin à La Douce, vendent à Guillaume Mareschal de Cressanges, leurs trois parts du  grand étang de la Charnée, alors qu'en 1503, c'est Jehan de Bongy qui reconnaît tenir son \"hostel et domicile de La Charnaye\", en fief   de la duchesse   de Bourbon. Aujourdhui exploitation agricole. Bois-Granges pas d'informations historiques.","architecture":"Charnay, aujourd'hui le domaine est constitué de plusieurs bâtiments, le corps de logis est une grande maison de plan rectangulaire, à pavillon et à combles élevés, éclairés  de lucarnes triangulaires. Dans la cour un pigeonnier carré, surmonté d'un toit à quatre pans et d'un petit lanternon           Dreuille, l'ancien manoir, qui existe toujours, fut abandonné au régisseur  sous le Second Empire, lorsque fut bâti le château actuel par l'architecte Jean Moreau. De style néo-gothique, l'édifice se compose  d'un corps de logis rectangulaire à  rez de chaussée surélevé, un étage et  toit d'ardoise à croupe, percé de lucarnes. La façade antérieure est flanquée  au centre d'une tour octogonale en pierre de taille, coiffée d'un toit terminé par un clocheton, et elle est éclairée de baies étroites à traverses, et  d'une porte précédée d'un perron. Celle-ci est surmontée d'un tympan armorié  inscrit  dans  un gable en accolade à choux frisés, entre deux pinacles. La façade postérieure  est encadrée par deux tours rondes, la travée centrale est décorée de blasons.                               les Noix, deux grosses tours rondes marquent encore l'emplacement de cette forteresse, qui existait déjà au XIVe siècle.","habitants":"Famille de Mareschal                Famille de Claude de Dreulhe\"","divers":"Château de Charnay,  de Dreuille  et de la Noix à Cressanges","gps":"","images":["../../jctruffet.com/image/image_03/03_Cressanges_1.jpg","../../jctruffet.com/image/image_03/03_Cressanges_2.jpg","../../jctruffet.com/image/image_03/03_Cressanges_3.jpg","../../jctruffet.com/image/image_03/03_Cressanges_4.jpg","../../jctruffet.com/image/image_03/03_Cressanges_5.jpg","../../jctruffet.com/image/image_03/03_Cressanges_6.jpg"]},"Consult_chateau_formulaired7c5":{"id":"Consult_chateau_formulaired7c5","dept":"03","canton":"Cusset","commune":"Creuzier-le-Vieux","nom":"Creuzier_le_Vieux","type":"Maison forte","periode":"XV","histoire":"CREUZIER le Vieux,  la seigneurie de Creuzier-le-Vieux appartenait au XVIe siècle à la famille de Montmorillon,  elle passe aux Bourbon-Busset, par le mariage, le 21 juin 1588, de Louise de Montmorillon avec César de Bourbon, comte de Busset. La famille de Bourbon-Busset resta propriétaire à Creuzier-le-Vieux jusqu'au milieu du XIXe siècle.          LAUDEMANIERE, pas d'information historique.","architecture":"Laudemanière, le domaine n'est pas un ancien fief. L'ancienne construction du XVe siècle a disparu sous les transformations, et particulièrement celles du XIXe siècle, hormis le plan qui en a été conservé. Le bâtiment central, de plan rectangulaire, à deux niveaux  et niveau de comble, est flanqué  d'un pavillon carré en retour d'équerre et  d'une haute tourelle ronde coiffée d'un toit conique Les documents ne nous ont livrés aucun renseignement sur les seigneurs de ce lieu , fortement remanié au XIXe siècle.                     Manoir de la Saigne à  Creuzier le Vieux du XVIIIe siècle transformé en gites de France .  Le bâtiment s'élève sur deux niveaux, avec une aile en tour d'équerre. Il possède un pigeonnier carré et deux grandes portes cochères.                 A Creuzier du XVe siècle, accolée à l'église contre le mur Nord subsiste un pavillon qui est le dernier vestige du château du Lauzet. Elle a succédé à un château plus ancien, dont il reste quelques vestiges. À cet endroit était le siège de la seigneurie de Creuzier-le-Vieux.                                 Maison forte de La Viala. et Palabost  à Creuzier le Neuf.","habitants":"Famille de Montmorillon\"","divers":"Manoir de la Saigne, château de laudemarière, maison forte de Viala et de Palabost à Creuzier le Vieux","gps":"","images":["../../jctruffet.com/image/image_03/03_Creuzier_le_Vieux_1.jpg","../../jctruffet.com/image/image_03/03_Creuzier_le_Vieux_2.jpg","../../jctruffet.com/image/image_03/03_Creuzier_le_Vieux_3.jpg","../../jctruffet.com/image/image_03/03_Creuzier_le_Vieux_4.jpg","../../jctruffet.com/image/image_03/03_Creuzier_le_Vieux_5.jpg"]},"Consult_chateau_formulaire0057":{"id":"Consult_chateau_formulaire0057","dept":"03","canton":"Cusset","commune":"Cusset","nom":"Cusset","type":"Château","periode":"XV","histoire":"Deux châteaux à Cusset, de la Barrière et de la Motte du XVIIe siècle          BARRIERE, pas d'élément historique.     CUSSET, anobli par Louis XI, Jean de Doyat est nommé bailli de Montferrand et gouverneur dAuvergne en 1480. Il dirige les « Grands jours dAuvergne » à Montferrand en 1481, ce qui lui attire bien des haines. Un couvent des capucins est fondé à Cusset, peu après celui de Vichy, et restera en activité 176 ans jusquau 21 septembre 1790. Henri Duriez, dernier maire nommé par la royauté, finit de remblayer les fossés. La Révolution interdit lAbbaye dont les bâtiments sont rachetés par la Mairie. Marguerite de La Saigne de Saint-Georges fut la dernière abbesse, de 1786 à 1792.\r\nMOTTE, au XVe siècle, la Motte semble avoir perdu sa qualité de fief noble et ses propriétaires sont soumis au droit de rachat, puisqu'en 1415, le seigneur de La Motte est un Péronnet de la Motte qui exerce la profession de notaire. Au cours du XVe siècle, la famille Bonvin  de Randan s'installe sur la seigneurie de la Motte, pour y rester   jusqu'au milieu du XVIe siècle. À la fin du XVIIe siècle, la Motte appartient à Claude Guérin,  seigneur de Champagnat. Dès lors, la terre de La Motte suivra la destinée du fief  de Champagnat, d'abord propriété de l'hôpital de Cusset, puis vendu à Joseph de la Chaise, seigneur d'Ussau.","architecture":"Cusset,  enceinte fortifié, du  XVe siècle. L'essentiel des ouvrages est enterré depuis le comblement des fossés au XVIIIe siècle. La tour Prisonnière est le seul élément subsistant en élévation.  Propriété de la commune,   l'enceinte de forme polygonale  comprenant la citadelle, la tour de la Paille, la porte Saint-Antoine, la tour du Bateau, la porte de la Barge, la tour Saint-Jean, la porte de la Mère, la tour Prisonnière, la porte de Doyat et les courtines souterraines qui les relient à la maison de Louis XI du XVe siècle,  avec un pignon constitué par une ferme de tête portée en encorbellement sur des corbeaux accouplés. Les murs sont enduits et les fenêtres, tout en ayant gardé leurs encorbellements moulurés, ont perdu leurs meneaux et croisillons. Cet édifice comprend deux ailes. L'aile de gauche est engoncée dans une bâtisse qui en masque la façade ; l'aile en profondeur a brûlé au début du XXe siècle, mais il reste la tourelle d'escalier avec sa porte encadrée de colonnettes surmontées de chapiteaux à double rangée de feuillages. La tradition rapporte que dans cette maison, en juillet 1440, eut lieu entre Charles VII et son fils le dauphin Louis, l'entrevue qui mit fin à la révolte dite \"la Praguerie\".                     Motte, située sur le bord du Sichon, la Motte contrôlait la voie de pénétration par la vallée, en direction de la montagne. Ce point stratégique explique l'installation précoce d'une fortification. Le château est une construction du  XVIIe siècle. Elle se compose de 2 pavillons massifs en guise de tours qui flanquent le corps de logis central de plan rectangulaire  à deux niveaux, mais la fortification primitive est encore présente par l'appareillage défensif des fossés pleins d'eau.","habitants":"Famille d'Henri Duriez                Famille Bonvin  de Randan \"","divers":"Cusset ville fortifiée et château de la Mothe","gps":"","images":["../../jctruffet.com/image/image_03/03_Cusset_1.jpg","../../jctruffet.com/image/image_03/03_Cusset_2.jpg","../../jctruffet.com/image/image_03/03_Cusset_3.jpg","../../jctruffet.com/image/image_03/03_Cusset_4.jpg","../../jctruffet.com/image/image_03/03_Cusset_5.jpg","../../jctruffet.com/image/image_03/03_Cusset_6.jpg","../../jctruffet.com/image/image_03/03_Cusset_7.jpg","../../jctruffet.com/image/image_03/03_Cusset_8.jpg"]},"Consult_chateau_formulaireaad7":{"id":"Consult_chateau_formulaireaad7","dept":"03","canton":"Montet","commune":"Deux-Chaises","nom":"Deux_Chaises","type":"Château","periode":"XV-XVII","histoire":"Quatre châteaux au deux chaises; celui de Bouillet du XV-XVIIe siècle, de la Chapette du XV-XVIIe siècle avec tours, de Longeville du XIXe siècle chambres d'Hôtes et des Manteaux vestiges du château médiéval.                    BOUILLET, pas d'information historique   CHAPETTE,  il existait au XVe siècle une construction fortifiée à Chapette pour laquel les seigneurs de ce nom firent aveu  en 1443.  En 1503,  c'est à nouveau un André de Chapette qui reconnaît tenir en fief de la duchesse de Bourbon sa maison.                                 LONGEVILLE, pas d'information historique, transformé en chambres d'hôtes.           MANTEAUX, pas d'informations historiques","architecture":"Bouillet, château du XVe siècle, quadrilatère, corps de logis rectangulaire  à deux niveaux flanqué d'une tour carrée et tourelle à l'opposé. Chapette, un bâtiment quadrangulaire à un étage et sans décor, de la fin du XVIIe siècle, a remplacé la demeure médiéval  dont subsiste une tour ronde percée de  petites meurtrières pour le tir à feu à l'angle nord est. A celle ci est accolée à une tourelle d'escalier. Les parties hautes des deux tours ont été refaites au XIXe siècle, la plus grosse est couronnée de mâchicoulis. L'angle sud-est de la façade est fl
