ion. Aujourd'hui propriété  de la fondation Saint-Louis.","architecture":"Vieux château de Bourbon l'Archambault,  un ensemble imposant composé de quinze tours dont la fameuse \"Quiquengrogne\". Un premier château, détruit par Pépin, est remplacé par une construction au IXe siècle. Le château représente une des ruines féodales les plus imposantes de France. Du château reconstruit à partir du XII-XVe siècle, subsiste un pan de mur près de la tour de l'Admiral construction du XII-XIIIe siècle.  L'ouvrage était utilisé comme prison et la salle du premier étage a conservé les anneaux scellés dans le mur pour attacher les prisonniers. Le sous-sol, avec ses murs de cinq mètres d'épaisseur, ne comportait qu'un petit réduit central sur lequel donnait trois meurtrières. L'accès s'effectuait par un escalier donnant sur la cour intérieure. Le rez-de-chaussée comprend une salle rectangulaire. Un escalier à vis permettait l'accès aux courtines. Le plan d'ensemble était celui d'une tour circulaire fermée vers le chemin de ronde. Restaurations au cours du XIVe siècle. A la fin du XVe siècle, Jean II fait bâtir la Sainte Chapelle dont il reste la partie intérieure du chevet (en partie détruite par des orages en 1589 et 1641). En 1793, la Sainte Chapelle est saccagée et les vitraux détruits. La décision est alors prise de démolir les tours, hormis les trois du nord et celle appelée \"Qui-qu'en-grogne\" que le prince de Condé l'agrémente d'une horloge au début du XVIIIe siècle.","habitants":"Famille de Robert de Clermont,           Famille des Ducs de Bourbon\"","divers":"Forteresse de Bourbon l'Archambault.","gps":"","images":["../../jctruffet.com/image/image_03/03_Bourbon_Archambault_1.jpg","../../jctruffet.com/image/image_03/03_Bourbon_Archambault_2.jpg","../../jctruffet.com/image/image_03/03_Bourbon_Archambault_3.jpg","../../jctruffet.com/image/image_03/03_Bourbon_Archambault_4.jpg","../../jctruffet.com/image/image_03/03_Bourbon_Archambault_5.jpg","../../jctruffet.com/image/image_03/03_Bourbon_Archambault_6.jpg","../../jctruffet.com/image/image_03/03_Bourbon_Archambault_7.jpg","../../jctruffet.com/image/image_03/03_Bourbon_Archambault_8.jpg","../../jctruffet.com/image/image_03/03_Bourbon_Archambault_9.jpg"]},"Consult_chateau_formulaire2e7b":{"id":"Consult_chateau_formulaire2e7b","dept":"03","canton":"Bourbon-l`Archambault","commune":"Bourbon-l`Archambault","nom":"Bourbon_Archambault_II","type":"Château","periode":"XV-XIX","histoire":"Cinq châteaux dans la commune de Bourbon l'Archambault, Bignon du XVI-XIXe siècle, Chancelaire du XIX-XVIIIe siècle, la Tour du XVI-XIXe siècle avec deux tourelles rondes, Vesvres du XV-XVIIIe siècle et Ruzière.                                  BIGNON, construit au XVIe siècle, porte le nom de son dernier propriétaire, Jean Bignon, maire de Bourbon-l'Archambault de 1905 à 1935. Propriété de la commune depuis 1937,  aujourd'hui hôtel restaurant.  \r\nCHANCELAIRE,Pas d'information historique. \r\nRUZIERE, le foyer Thérapeutique de Ruzière fut créé en 1984 ; il s'est donné pour tâche de réunir les conditions permettant à de jeunes adultes en difficulté de se construirent en tant que personne individuelle et sociale.\r\nVESVRES,  La seigneurie est  connue dès 1503, date à laquelle elle fait l'objet d'un aveu et dénombrement à la duchesse de Bourbon, par   l'écuyer Jehan d'Anlezy, qui reconnaît tenir son hostel fort.  Vesvres   recensait quatre seigneuries en 1560:  Brond, La Tour, Les Vesvres et Maltaverne, seules La Tour et Les Vesvres ont laissé leur nom à un lieu dit. Si les seigneurs de La Tour  nous demeurent inconnus,  ceux de Vesvres jouèrent un rôle dans la vie publique locale au XVIIIe siècle.","architecture":"La tour Qui-qu'en-grogne, cette tour d'angle sud-est de l'ancienne enceinte du château, fut élevée par Louis II pour surveiller la ville. Elle est surmontée d'un beffroi du XVIIIe siècle. Son curieux nom fait allusion au mécontentement des habitants, contraints par Louis II de Bourbon d'élever une défense au prix d'augmentation de la dîme. Tour  époque de construction du XIII au XIVe siècles.                Bignon cette gentilhommière en équerre  et tour carré  flanqué à l'arrière du bâtiment ancien a été  modernisée et agrandie au XIXe siècle par l'adjonction d'un nouveau corps de bâtiment, puis elle a subi d'importants  travaux en 2003 et 2004 après un grave incendie.  Situé dans un parc de 16 ha l'édifice abrite la salle du conseil municipal. Le château permet d'accueillir réunions  et manifestations officielles dans un cadre attrayant.                                Chancelaire, maison forte du XIVe siècle, voire du XVe siècle, Chancelaire a, malgré les transformations, conservé ses  anciennes structures, surmonté d'un clocheton. La façade arrière est flanquée d'une tour hexagonale au centre  et d'une tour ronde d'angle. L'accès, dans la cour des communs, passe par un portail à piliers de pierre.                  Château de Vesvres, il reste un donjon en grès du XVe siècle. L'ancien corps de logis a été remanié au XVIIIe siècle mais a conservé    une tour ronde d'angle et des fenêtres à meneaux, ainsi qu'une tour tronquée à l'angle de  l'enceinte. \r\nRuzières, quadrangulaire avec corps de logis rectangulaire à deux niveaux flanqués de pavillons carrés à deux niveaux toitures en pointes.","habitants":"Famille de Jean Bignon               Famille de Jehan d'Anlezy\"","divers":"Divers château à Bourbon l'Archambault; Bignon, Chancelaire, de Vesvres, le Moulins, Ruzières, les ets thermal, le château du Haras et la tour Qui-qu'en-grogne.","gps":"","images":["../../jctruffet.com/image/image_03/03_Bourbon_Archambault_II_1.jpg","../../jctruffet.com/image/image_03/03_Bourbon_Archambault_II_2.jpg","../../jctruffet.com/image/image_03/03_Bourbon_Archambault_II_3.jpg","../../jctruffet.com/image/image_03/03_Bourbon_Archambault_II_4.jpg","../../jctruffet.com/image/image_03/03_Bourbon_Archambault_II_5.jpg","../../jctruffet.com/image/image_03/03_Bourbon_Archambault_II_6.jpg","../../jctruffet.com/image/image_03/03_Bourbon_Archambault_II_7.jpg","../../jctruffet.com/image/image_03/03_Bourbon_Archambault_II_8.jpg","../../jctruffet.com/image/image_03/03_Bourbon_Archambault_II_9.jpg"]},"Consult_chateau_formulaired130":{"id":"Consult_chateau_formulaired130","dept":"03","canton":"Chantelle","commune":"Target","nom":"Boussac","type":"Château","periode":"XVI","histoire":"BOUSSAC, le premier seigneur de Boussac n'apparait qu'en 1653, lorsque Alexandre Rousseau lieutenant général de la prévôté de Moulins, marié à Françoise Guillomier, porte le titre de seigneur de Boussat, et aussi celui de seigneur de Verzun, seigneurie proche. La famille Lapelin succéda aux Rousseau sur la terre de Boussac, dès la seconde moitié du XVIIe siècle et en resta propriétaire jusqu'au début  du XVIIIe siècle ou nous voyons le vicomte de la Ferronnays, Pierre Jacques Ferron, devenir le nouveau Seigneur de Boussac. Ce n'est qu'en 1816 que la terre passa, par alliance d'une fille du vicomte de la Ferronnays, à Gérard Antoine Louis de Champflour comte, une de leurs filles  épousa le comte de Charbonnel de Betz et en 1856, la fille de ce dernier épousa Aymar-Alfred  marquis de Longueil  grand-père du propriétaire actuel qui, aujourd'hui encore, possède cette belle demeure  de Boussac. Transformé en chambres d'hôtes. Dans la commune de Target le château de Verzun transformé en hôtel restaurant.","architecture":"le château primitif de Boussac, de plan barlong, flanqué aux angles de quatre tours rondes tallutées, était entouré  de large fossés pleins d'eau  que l'on franchissait au moyen d'un pont-levis. Il avait été édifié au XIIIe siècle. Au XVe siècle, les tours et les murs d'enceinte reçoivent quelques canonnières pour les tirs de   flanquement, en direction des douves, alors que le corps de logis s'ouvre des fenêtres  au niveau des combles. Les siècles suivants  ont contribué aux transformations de cet ancien château-fort en  une demeure confortable.  Le style Renaissance du XVIe siècle a laissé son empreinte sur la façade, alors que le XVIIe siècle transformait radicalement l'ensemble en ouvrant sur le parc et donnant au château l'allure d'une construction  de style Louis XIII.  L'accès au château est guidée  par une allée  seigneuriale, bordée d'arbres  centenaires. Le pont-levis a été remplacé par un pont dormant sur les douves, la cour s'ouvre sur le bâtiment. Une belle tour porche centrale abrite l'entrée principale. Elle est marquée, au fronton de l'ouverture en plein cintre, des armes des de Longueil, \"d'azur à trois roses d'argent en chef d'or, chargé de trois roses de gueules\"  Cette tour d'entrée est d'un bel effet, percée de deux baies, l'une à traverse, l'autre à meneaux; elle est recouverte d'un toit en dôme à 4 pans et bords relevés et surmontée d'un joli lanterneau coiffé à l'identique.   Une petite tourelle d'escalier de forme carrée, accolée à la tour porche, dessert les deux étages du bâtiment, malgré l'ancienneté des lieux.","habitants":"Famille d'Alexandre Rousseau \"","divers":"Le château de Boussac, de Verzun à Target","gps":"","images":["../../jctruffet.com/image/image_03/03_Boussac_1.jpg","../../jctruffet.com/image/image_03/03_Boussac_2.jpg","../../jctruffet.com/image/image_03/03_Boussac_3.jpg","../../jctruffet.com/image/image_03/03_Boussac_4.jpg"]},"Consult_chateau_formulaire54e6":{"id":"Consult_chateau_formulaire54e6","dept":"03","canton":"Souvigny","commune":"Bresnay","nom":"Bresnay","type":"Maison forte","periode":"XV","histoire":"Quatre châteaux à Bresnay,  les Ecossais du XVe siècles, de Givry gothiques renaissance, des Perignons du XVe siècle et de Pierredons du XIV-XVe siècles avec deux tours.                               GIVRY, en 1411 à Jehan de Saligny,écuyer. Situé au sud-est du village, le  château fort de Givry appartenait, en 1560, au sieur de Fougis. En 1625, la  seigneurie était réunie à Fourchaud, à Besson, à Le Breuil et La Fourstilhe. La famille Hugon de Fourchaud s'en  dessaisit  au profit de ses cadets. L'un d'eux, Pierre, était en 1683 seigneur de Givry, mais aussi de Pouzy, et maître d'hôtel ordinaire de la Dauphine. Cette branche la garda au moins jusqu'en 1725. Aux XVIIe et XVIIIe  siècles, les seigneurs de Givry paraissent avoir été bien intégrés à la communauté et furent des bienfaiteurs de l'église. Transformé en hôtel restaurant\r\nECOSSAIS .  Guy de Bouquetraud  était en 1357 seigneur d'Escoussay, le fief portait ce nom jusqu'à la fin du XVe siècle, puisque Jehan et  Charles d'Escoussay possèdent une terre avec justice dans les paroisses de Lucenay-sur-Allier  et Bresnay, en 1443 un Pierre d'Ecossais, mais c'est Jehan Breschart qui, en 1503, détient en fief la \"place  forte d'Escousses,  puis en 1540 un Gilbert de Serre. Passe  au  XVIIe siècle par alliance à Jacques Préault, puis  dans la seconde moitié du XVIIe siècle, ses propriétaires étaient des Meaulne: Louis Meaulne, avocat à Moulins, en 1654, était à la fois sieur des Écossais et de Champagnat. Après sa mort, Antoine Ferrand, lui aussi   écuyer, commissaire provincial  de l'artiflerie de France et  commandant à Pignerol, prit ces titres, ensuite les  Delageneste qui le cèderont aux de la Vauvre. En 1686, lui  avait succédé François Burand. Marie Françoise Burand apporta par mariage la seigneurie d'Écossais à Michel Grangier de Boisdechamp ancien garde du corps,  la dernière famille fut les  Monzat de St-Julien restaurateur. aujourd'hui à mademoiselle d'Aligny.             PERIGONS, pas d'information historique.   PIERREDONS, Jacques Hugon, seigneur de Givry  était  en 1693 seigneur de  Pierredons. Il avait succédé à des membres  de la famille Heulhard, Jean Heulhard    était seigneur des \"Pierdons\" en 1652 est François Heulhard, sieur des Pierdons et des Celliers, en 1662.","architecture":"Givry en équerre, doté d'une tour ruinée en façade et d'une seconde tour à lanternon a été remanié à la Renaissance, ainsi que l'attestent ses hautes fenêtres.                              Ecossais,  classiques des manoirs bourbonnais de moyenne importance, corps de logis de plan rectangulaire, à deux niveaux,  en façade doté d'une tour octogonale refermant l'escalier  et  deux tours rondes aux angles de la façade  occidentale. On voit encore les douves, qui sont sèches.  La cour intérieure est délimitée par des communs, lesquels sont pourvus d'un pigeonnier  L'ensemble date de la fin du XVe siècle.  \r\nPierredons ou Piardons, manoir des XIVe et XVe siècles. Le bâtiment central, à rez-de-chaussée et comble élevé couvert d'une haute toiture, est flanqué de deux tours d'angle, l'une couverte d'un toit conique, et l'autre tronquée couverte d'un toit en appentis.\r\nPerigons,  le château actuel avec ses vastes communs a gardé bien des caractères de la fin du Moyen-Age. Le logis  principal est un corps de bâtiment rectangulaire à rez-de-chaussées surélevé, étage et niveau de comble, avec  pavillon en léger retour d'équerre. La toiture élevée reçoit cheminées et lucarnes. Enfin, un pigeonnier à pans de bois et briques, marque l'importance du propriétaire.","habitants":"Famille de  Jacques Préault               Famille Heulhard \"","divers":"Château de Givry, des Ecossais, de Pirredons, et de Perigons à Bresnay","gps":"","images":["../../jctruffet.com/image/image_03/03_Bresnay_1.jpg","../../jctruffet.com/image/image_03/03_Bresnay_2.jpg","../../jctruffet.com/image/image_03/03_Bresnay_3.jpg","../../jctruffet.com/image/image_03/03_Bresnay_4.jpg","../../jctruffet.com/image/image_03/03_Bresnay_5.jpg","../../jctruffet.com/image/image_03/03_Bresnay_6.jpg"]},"Consult_chateau_formulaire494b":{"id":"Consult_chateau_formulaire494b","dept":"03","canton":"Moulins","commune":"Bressolles","nom":"Bressolles","type":"Château","periode":"XV-XVII","histoire":"Dans la commune trois châteaux dont celui  d'Aigrepont (voir article) de Bressolles du XIII transformé néo-gothiques,  de Piroir  du XVIIe siècle et de Lys du XV-XIXe siècle.       BRESSOLLES, les Archambaud furent sans doute les premiers  seigneurs  si l'on en croit un jugement du XVIIe siècle portant sur les \"preuves de noblesse\" des descendants des Bréchard, et qui signale  qu'en 1206, Raoul Bréchard échangea  au baron de Bourbon la vicomté de Moulins contre la baronnie de Bressolles qui appartint dès lors à cette famille surnommée Bréchard. Il y eu sans doute trois  ou quatre Raoul successifs, en 1295, le seigneur de Bressolles portait encore ce prénom. A la Révolution, le propriétaire était  un receveur général des finances; ses terres furent mises sous séquestre.  \r\nPIROIR il appartenait à cette époque à Charles de la Mure, grenetier de Moulins, mort à Piroir en septembre 1651 et qui avait épousé une des nombreuses filles d'Antoine le Laval.  Son fils fut avocat au parlement. Le possesseur suivant de Piroir fut son gendre, Jean  Rouher, lui aussi avocat au parlement et  conseiller au présidial de Moulins. Le château fut vendu  en 1698 à  Jean Taillefer, fils d'un marchand moulinois. Jean Véron, qui en 1724 , avait épousé Guberte Taillefer et était boulanger ordinaire du Roi  et le la Reine d'Espagne. En 1750, le fiancé de Marie Véron était   musicien de la reine douairière d'Espagne. Pendant la Révolution, les  propriétaires étaient des roturiers nommés Marion.             LYS, date, semble-t-il, du XVIe siècle (il reste une tour).  Pierre de Lys était censitaire du duc de Bourbon en 1466. Les propriétaire des XVIIe et XVIIIe siècles   affermèrent la seigneurie; en 1644 Louis Semyn la bailla à Jean Bergerat et en 1647, Marguerite Feydau à Jacques Galapière. Antoine Lomet acheta la propriété en 1730; il avait épousé la soeur du curé de Bressolles. En 1789, Lys  était la propriété de François Lomet, député du tiers état aux états généraux, actuellement  chambres d'hôtes de Sophie Coulboy.","architecture":"Bressolles, il ne reste plus de  sa splendeur passée qu'une tour ronde du XIIIe siècle, une tour carrée avec des meneaux du XVe siècle et des douves en eau. La façade à l'est  est classique, le reste néo gothique  fin XIXe siècle.   Le château eut apparemment  beaucoup à souffrir  de la chasse aux prêtres réfractaires  menée en 1792. Il fut restauré au XIXe siècle.            Piroir, comporte deux bâtiments formant un L, avec un rez-de-chaussée élevé et un   pigeonnier carré, son style date du XVIIe siècle.\r\nLys; à l'origine une maison forte constituée d'un pavillon flanqué de deux tours rondes du XIIIe siècle, accolées à un corps de logis à un seul niveau , une tour carrée avec des meneaux du XVe siècle et des douves en eau. La façade à l'est est classique, le reste néo gothique (fin XIXe siècle).  A partir de cette époque le château subit plusieurs remaniement qui transforment complètement son aspect primitif.  A partir du XVIIIe siècle, restaurations  et transformations ont complètement modifié  l'édifice primitif.  Aujourd'hui, c'est un long corps de bâtiment  rectangulaire à deux niveaux accosté  au pignon de deux larges pavillons   légèrement débordants en façade, les toits couverts d'ardoises sont agrémentés d'un ensemble de belles lucarnes.","habitants":"Famille des Bréchard                 Famille de  Charles de la Mure            Famille de François Lomet\"","divers":"Château d'Aigrepont, de Bressolles, de Piroir et de Lys","gps":"","images":["../../jctruffet.com/image/image_03/03_Bressolles_1.jpg","../../jctruffet.com/image/image_03/03_Bressolles_2.jpg","../../jctruffet.com/image/image_03/03_Bressolles_3.jpg","../../jctruffet.com/image/image_03/03_Bressolles_4.jpg","../../jctruffet.com/image/image_03/03_Bressolles_5.jpg"]},"Consult_chateau_formulaire9d1a":{"id":"Consult_chateau_formulaire9d1a","dept":"03","canton":"Montmarault","commune":"St-Bonnet-le-Four","nom":"Brosse","type":"Château","periode":"XV","histoire":"BROSSE, autrefois la Brousse, est devenu également La Brosse-Morlay, pour le distinguer d'autres châteaux du même nom. Il fut édifié à l'origine par de petits propriétaires terriens  des XVe et XVIe siècles, et surtout par Jean de la Brosse, archevêque de Vienne. Il prend de l'importance sous l'impulsion de  certains de ses seigneurs appelés à la vie militaire. Dans le dénombrement des fiefs du Bourbonnais, en 1503, Pierre de la Brousse, écuyer reconnaît tenir de la duchesse de Bourbon sa maison, place forte. En 1505, Pierre de la Brosse fait hommage à la duchesse de Bourbon, Anne de France, pour sa maison forte de La Brosse et ses dépendances. En 1686, fief des d'Argouges.  Le plus connu de ces seigneurs est Jacques de la Brosse, l'un des fameux hommes de guerre du XVIe siècle, haut personnage, ami et conseiller du duc de Guise. Avant la Révolution, la terre passe aux Michault de Granville.","architecture":"Ce château fort avait un haut donjon carré du même type que celui de La Souche ou de Noyant, défendu par une enceinte fortifiée et des fossés. Le plan de 1831 montre encore  le quadrilatère s'appuyant sur 4 tours d'angle. Il reste encore  deux tours rondes isolées, percées de canonnières, et le donjon réaménagé en habitation. Bien que  la position stratégique de la Brosse soit médiocre on peut remarquer son encadrement par des étangs protecteurs au sud et au nord. Lors de la période révolutionnaire, le château est démantelé et ses fossés en partie comblés, afin de se conformer à la loi qui devait faire disparaitre les marques de l'ancien régime","habitants":"Famille de Michault de Granville\"","divers":"Château de la Brosse à Saint-Bonnet le Four","gps":"","images":["../../jctruffet.com/image/image_03/03_Brosse_1.jpg"]},"Consult_chateau_formulaireb535":{"id":"Consult_chateau_formulaireb535","dept":"03","canton":"Escurolles","commune":"Brout-Vernet","nom":"Brout_Vernet","type":"Château","periode":"XV-XIX","histoire":"Une douzaine de châteaux dans cette commune, Aubeterre du XIXe siècle, Chaussecourte du XIXe siècle, d'Escolles du XVe siècle tour ronde, de Fouranges du XVIIIe siècle, de Gaillots du XIXe siècle, de Lafont du XIXe siècle, de Marmagne du XVe siècle, de Morelles du XVI-XVIIIe siècle, de la Motte du XVe siècle, du Pointet du XIXe siècle, du Poirier du XVe siècle, du Verger du XVIIIe siècle, du Vernet du XIXe siècle et des Vieilles Morelles du XVe siècle.   AUBETERRE, vendu par la famille de Rochefort vers 1840  Après avoir appartenu aux Duvert le château est  actuellement la propriété de la famille Delais.                                   ESCOLLES. Un édifice, plus récent, édifié au XIXe siècle, dans un joli parc, porte le nom de château d'Escolles. Il appartient à la famille Burelle.          FOURANGES, à la fin du XVIe siècle avec la famille Chamalet, puisqu'en 1634, Babrielle Chamalet possède la terre de Fouranges qu'elle a hérité de son père, Antoine Chamalet, seigneur de Fouranges. Elle la transmet, par son  mariage, à Pierre de Constant, seigneur de Fontviolant à Saint-Germain de Salles.   GAILLOTS, du XIXe siècle  pas d'information historique.          MARMAGNE,du XIXe siècle pas d'information historique.                               MORELLES, au XVIe siècle la seigneurie appartenait aux de Milles, en 1582 Françoise de Milles la transporta par alliance à Achilles Combes et la conservèrent jusqu'au XIXe siècle. Jacques-Antoine Combe de Morelles  né en 1750 fut le premier maire de Brout-Vernet, à la guerre de 1940 transformé en maison d'enfant et acceuilli de nombreux enfants juifs.","architecture":"Aubeterre, récent, le corps principal  rectangulaire à deux niveaux, de style classique, agrandi et restauré au début  du XXe siècle, par l'adjonction, à l'angle ouest, d'un pavillon à deux niveaux et des combles et à deux ouvertures par niveau. Le toit brisé à la Mansart de cette dernière construction lui donne une allure un peu massive.      Escolles, installée sur une motte féodale,  appelée le château  était plutôt une maison forte du XVe siècle, remaniée.  De la construction primitive, il reste une partie du corps de logis flanqué d'une petite tour ronde, couverte d'un toit conique et  abritant un escalier à vis. L'édifice du XIXe siècle,  corps  de plan carré, à deux niveaux et   comble, a une allure un peu massive, rompue par le toit qui s'éclaire de lucarnes de style néo-Renaissance.     Fouranges, le château actuel a remplacé une construction plus ancienne qui avait ses seigneurs au XVIIe siècle.    Gaillots, l'édifice se compose d'un sous sol, d'un étage carré et d'un étage\r\n de comble distribués par un escalier intérieur, le gros-oeuvre en enduit, élévation ordonnancé surmonté de toit à longs pans, croupe et terrasse, recouverts de tuiles plates.       Marmagne, une habitation plus ancienne, puisque  dans les communs subsiste un joli pigeonnier carré, du XVe siècle, sur piliers. Le corps de logis construit vers 1860, est à deux niveaux et niveau de comble, le toit brisé à la Mansart, soutenu par un encorbellement mouluré, est orné de  cinq lucarnes à pieds droits saillants et à arcs surbaissés.          Morelles, un château du XIXe siècle accolé au premier, probablement à la fin du XVIIIe siècle. Postérieurement alignement de la façade sud  par destruction de bâtiments, actuellement occupé par une ferme. Le  premier château à cour fermée, escalier à vis, second  château avec un ornement animal sur console supportant le balcon de l'élévation antérieure.","habitants":"Famille Delais                       Famille Burelle                           Famille Chamalet\"","divers":"Château de Vernet, d'Aubeterre, d'Escolles, de Fouranges, de Gaillots, de Marmagne et de Morelles à Brout-Vernet","gps":"","images":["../../jctruffet.com/image/image_03/03_Brout_Vernet_1.jpg","../../jctruffet.com/image/image_03/03_Brout_Vernet_2.jpg","../../jctruffet.com/image/image_03/03_Brout_Vernet_3.jpg","../../jctruffet.com/image/image_03/03_Brout_Vernet_4.jpg","../../jctruffet.com/image/image_03/03_Brout_Vernet_5.jpg"]},"Consult_chateau_formulaire9cf7":{"id":"Consult_chateau_formulaire9cf7","dept":"03","canton":"Escurolles","commune":"Brout-Vernet","nom":"Brout_Vernet_II","type":"Château","periode":"XV-XIX","histoire":"MOTTE  le château actuel est une ancienne maison forte  du XVe siècle, remaniée au XIXe siècle pas d'information historique.                              POINTET agrandi et restauré à la fin du XIXe siècle, pas d'information historique.                               VERGER, le château actuel a été élevé au XVIIIe siècle, pas d'information historique.                               VERNET,dès le XIIIe siècle, les seigneurs du Vernet ont pris le nom du fief comme patronyme et, en 1233, Odin  du Vernet reconnaît tenir en fief du sire de Bourbon, Archambaud III, la maison de Vecenat, en augmentation   de son premier fief. En 1288, Dalmas du Vernet  reçoit une indemnité  pour dépense faite dans son hôtel. La  famille de Rollat devint plus tard propriétaire et seigneur du Vernet, il existe donc au Vernet dès le XIIIe siècle  un château aujourd'hui disparu. Il est toutefois possible de distinguer, ceinturée par les voies d'accès. Le château  Vernet actuel, la présence d'une ancienne motte artificielle, élevé vers 1830,  conserve l'ordonnance classique du XVIIIe siècle. Il se compose d'un grand bâtiment rectangulaire à 3 niveaux, formant un corps central légèrement en retrait et de deux avant-corps sur les ailes, en forme de pavillons engagés.","architecture":"Motte, le corps principal   de bâtiment du XVe siècle de plan barlong, à deux niveaux, était flanqué de deux tours rondes crénelées aux angles sud et est. Elles sont aujourd'hui recouvertes de toits coniques. Le premier étage de l'une d'elles a été transformé en pigeonnier. Le XIXe siècle a été complètement reconstruit, vers 1325, la façade ouest, par l'ajout  d'un avant-corps central, en forme de tour carrée, prise en uvre. Il abrite la porte d'entrée couverte d'un arc  en plein cintre. Le toit en pavillon de cette tourelle est orné d'une lucarne au fronton néo-renaissance. La   façade en retrait  s'éclaire, sur les 2 niveaux, de fenêtres à arcs surbaissés, alors que les  lucarnes et cheminées agrémentent  le toit. L'ensemble est anglé d'une haute tour ronde, à chaînages intermédiaires, couverte d'un toit conique, et d'une échauguette ronde, reposant au niveau  du second étage sur un culot mouluré. \r\nPointet, est entouré d'un parc superbe. La construction  étonne par sa grande façade de brique, en forme de corps central, et ses deux pavillons pris en oeuvre, flanqués de deux tourelles; l'une en pendentif, l'autre hexagonale, à l'angle est, qui s'élève  au   dessus de l'ensemble avec son toit élancé surmonté d'un clocheton ajouré, l'architecte a animé la façade par des colombages, et donné une note originale à cette construction qui a rompu avec le style Napoléon III.                         Verger, le château actuel a été élevé au XVIIIe siècle, sur l'emplacement d'une ancienne motte féodale et a remplacé   une construction primitive, peut être au lieu proche du château-fort. Le corps principal du bâtiment, de plan rectangulaire, est élancé avec ses trois niveaux et son toit en pavillon. Sur sa face ouest, une petite tour carrée est accolée en retrait alors que sur la face est, un long bâtiment à deux niveaux, couvert d'un toit en pavillon, déséquilibre un peu l'ensemble, qui a été agrandi et restauré vers 1875.","habitants":"Famille de Rollat \"","divers":"Château de la Motte, du Pointet, du Verger et de Vernet à Brout-Vernet","gps":"","images":["../../jctruffet.com/image/image_03/03_Brout_Vernet_II_1.jpg","../../jctruffet.com/image/image_03/03_Brout_Vernet_II_2.jpg","../../jctruffet.com/image/image_03/03_Brout_Vernet_II_3.jpg","../../jctruffet.com/image/image_03/03_Brout_Vernet_II_4.jpg","../../jctruffet.com/image/image_03/03_Brout_Vernet_II_5.jpg","../../jctruffet.com/image/image_03/03_Brout_Vernet_II_6.jpg","../../jctruffet.com/image/image_03/03_Brout_Vernet_II_7.jpg"]},"Consult_chateau_formulaireb562":{"id":"Consult_chateau_formulaireb562","dept":"03","canton":"Escurolles","commune":"Brout-Vernet","nom":"Brout_Vernet_III","type":"Château","periode":"XV-XIX","histoire":"CHAUSSECROUTE;  constitué par deux grands corps de  bâtiments. Le château fut restauré vers 1890 et agrandi par un grand bâtiment à l'est de la première construction, une famille de Chaucecourte. était connue en Bourbonnais dès 1240, où Raoul de Chaucecourte, damoiseau, possède le domaine de Chambon, peut-être à Saint-Rémy-en-Rollat.        LAFONT,propriété de la famille d'Alégre au XVIe siècle, Gabrielle d'Alègre épouse Charles de Cappôni, ce dernier devient baron et seigneur de Fort Saint-Mageran en 1842, Lafont est la propriété d'André de Bonneval, agronome qui s'est intéressé à la mise en valeur des Landes de Gascogne et qui expérimenta des techniques modernes d'exploitation sur son domaine, il servit de ferme école dite institut agricole du centre de 1842 à 1844. Par la suite, le château a appartenu à la famille Villot de Boisluisant. Il est aujourd'hui la propriété de l'éditeur Christian Chalmin.                                  POIRIER, une vieille maison du XVe siècle pas d'information historique.","architecture":"Chaussecourte, de plan barlong, bâtiment est remarquable par l'association de la brique rose et de la pierre blanche qui marque les angles et les embrasures des ouvertures. Une tour hexagonale flanque l'angle nord est. Son toit à 6 pans qui domine l'ensemble est soutenu par un bel entablement où se marient la pierre et la brique en damiers. La face sud, plus ancienne, est une belle  construction du XVIIIe. Elle est constituée  par un corps de logis à deux niveaux, flanqué d'une tour en poivrière  a culot mouluré. Quatre ouvertures  à chaque niveau éclairent  la façade principale. Une aile en retour d'équerre.\r\nLafont, château néo-classique édifié au centre d'un jardin à l'anglaise, dans la première moitié du XIXe siècle, composé d'un corps central de 1817 et de deux ailes latérales datant des années 1830-1840. Les quatre entrées du jardin sont matérialisées par des pavillons jumeaux. Façade ordonnancée par un avant corps central surmonté d'un fronton. A l'intérieur, le hall est marqué par un portique colossal à colonnes cannelées et chapiteaux ioniques portant le palier supérieur de l'escalier. La charpente à la Phillibert De l'Orme est assemblée à lamelles chevillées formant des formes courbes, ce type de modèle est très rare dans la région.\r\nPoirier, couverte d'un toit en pavillon et, à quelque distance, une tour carrée, à moitié rasée et couverte d'un toit en appentis, qui a été aménagé en pigeonnier. abandonné et, au XVIIIe siècle, un petit château a été édifié, dans un parc boisé à 500 m. La façade du bâtiment à deux niveaux est marquée par un chaînage de pierre moulurée. Le toit en pavillon est animé par un fronton central d'inspiration classique, qui prend appui sur l'entablement et  par deux lucarnes au niveau des combles qui encadrent le fronton.","habitants":"Famille d'André de Bonneval \"","divers":"Château de Chaussecourte, de Lafond et de Poirier à Brout-Vernet","gps":"","images":["../../jctruffet.com/image/image_03/03_Brout_Vernet_III_1.jpg","../../jctruffet.com/image/image_03/03_Brout_Vernet_III_2.jpg","../../jctruffet.com/image/image_03/03_Brout_Vernet_III_3.jpg","../../jctruffet.com/image/image_03/03_Brout_Vernet_III_4.jpg"]},"Consult_chateau_formulaire8b2a":{"id":"Consult_chateau_formulaire8b2a","dept":"03","canton":"Escurolles","commune":"Brugheas","nom":"Brugheas","type":"Château","periode":"XV-XVIII","histoire":"Quatre châteaux  à  Brughéas, dont celui de Brughéas du  XVIIIe siècle, de Fourneaux du XV-XVIIIe siècles, de Maussangs du XVe siècle avec tour carrée, et de Verneuilles du XIXe siècles.        BRUGHEAS, il est fait mention de l'hôtel fort de la famille de Rollat en 1443,  il est vendu comme bien national en 1794  et la municipalité en achète une partie en 1975.                                     FOURNEAUX,  le château a constamment appartenu, de son origine à la Révolution, à la famille de Pons, qui a laissé ses armes sur l'arc de la porte cochère, donnant accès à la cour intérieure. Une plaque de fonte du foyer de la cuisine porte la date de 1773. C'est en effet au XVIIIe siècle que des réparations ont transformé l'ancien château en une demeure de style classique. Confisqué à la Révolution, le fief des Fourneaux fut vendu comme bien national.\r\nMAUSSANGES, pas d'information historique.\r\nVERNEUILLES,  c'est M. de Champrobert qui, propriétaire de chevaux de course, fait construire, vers 1867, dans le pur   style de l'époque, cette petite résidence à allure de castel. À la fin du XIXe siècle, la vicomtesse de Chabanne  Clerton de la Palice, achète le château et y fait pratiquer des transformations.","architecture":"Brugheas  du XVIIIe siècle, mentionnée en 1300. comprenant un corps de logis avec, en retour sur la cour, deux ailes qui prolongent des communs terminés par des colombiers. Les baies conservent leurs menuiseries d'époque et un balcon en fer forgé sur console au-dessus de l'entrée sur cour. A l'intérieur, rampes en fer forgé sur deux grands escaliers, l'un dans le corps de logis, l'autre dans l'aile est. La cour intérieure est fermée sur le côté sud par un mur de clôture et un grand portail à deux battants.  La construction de l'actuel château de Brugheas date du XVe siècle, il fut remanié au XVIIe siècle, le nouveau château est sans doute construit à cette époque., en plan en U, deux bâtiments agricoles parallèles séparés du château par la route et terminés par deux tours rondes à usage de colombier. Devenu ferme, le château se dégrade; il est ensuite partagé en deux.         Maussanges, il subsiste dans les bâtiments à l'abandon de ce grand domaine, enfermant une vaste cour rectangulaire, une tour carrée couverte d'un toit en pavillon. Cette tour à deux niveaux flanque un bâtiment dont une partie a été construite au XVe siècle, subsiste dans les bâtiments à l'abandon de ce grand   domaine, enfermant une vaste cour rectangulaire, une tour carrée couverte d'un toit en pavillon. Cette tour à  deux   niveaux flanque un bâtiment dont une partie a été construite au XVe siècle.                   Fourneaux, Verneuilles","habitants":"Famille de Pons                       Famille de de Champrobert\"","divers":"Château de Fourneaux, de Maussangs,  de Verneuilles à Brughéas","gps":"","images":["../../jctruffet.com/image/image_03/03_Brugheas_1.jpg","../../jctruffet.com/image/image_03/03_Brugheas_2.jpg","../../jctruffet.com/image/image_03/03_Brugheas_3.jpg","../../jctruffet.com/image/image_03/03_Brugheas_4.jpg","../../jctruffet.com/image/image_03/03_Brugheas_5.jpg","../../jctruffet.com/image/image_03/03_Brugheas_6.jpg"]},"Consult_chateau_formulaireed46":{"id":"Consult_chateau_formulaireed46","dept":"03","canton":"Cusset","commune":"Busset","nom":"Busset","type":"Château","periode":"XIII-XVIII","histoire":"BUSSET, au XIIIe siècle abrite une commanderie des Templiers tenu par une puissante  de famille de Vichy, dont un descendant, Delmas apparait comme seigneur des lieux en 1260, un siècle plus tard Guillaume de Vichy et Isabelle de Saligny marièrent leur fille Smaragde au fondateur  de la seconde maison d'Alègre, Morinot de Tourzel  le fief passa  aux Tourzel d'Alègre  en 1387, en 1498  Marguerite de Tourzel épouse Pierre de Bourbon chambellan de Louis XII. La génération suivante Philippe de Bourbon épouse Louise de Borgia duchesse du Valentinois et dame de Châlus, fille de César Borgia et de Jeanne d'Albret. En 1586 Claude de Busset nommé comte, le château de Busset contenait jusque dans les années 90 une très importante collection de tableaux, mobilier, tapisseries, livres et objets dart ainsi que de très nombreux souvenirs historiques quavaient constituées quatorze générations successives de Bourbon-Busset. Malheureusement, celle-ci a été dispersée presque en quasi totalité au cours de ventes aux enchères successives par son dernier propriétaire, le comte François de Bourbon-Busset (1917-2003) en raison de sérieux revers de fortune avant quen 1997, le château ne soit, lui aussi, finalement vendu. Aujourdhui, transformé en hôtel, lintérieur du château ne conserve plus que quelques rares vestiges de son ameublement dorigine.  La comtesse  de Bourbon-Busset y réside, même s'il appartient à un Suisse-Allemand qui y a fait installer six chambres d'hôtes.","architecture":"Busset, du XIII-XIXe siècle, château associant les époques médiévale et Renaissance, dominant la vallée de l'Allier, le château de Busset était une demeure féodale bâtie pour repousser les attaques, défendre sa souveraineté et s'abriter. L'enceinte, dont le côté le plus long présente de face, les murs rectilignes protégés par des douves, le gros donjon couronné de mâchicoulis et de créneaux,  la très élégante mais très imposante Tour d'Orion, témoigne d'un passé guerrier. Deux corps de logis un au sud l'autre à l'est de la cour d'honneur se coupent d'équerre trois puissantes tours rondes. L'édifice est construit sur un plan en L auquel s'ajoute les communs, la porterie et la chapelle, utilisée comme église paroissiale. Les travaux du XIXe siècle, effectués par l'architecte Hode, ont remanié les façades, avec ajout de tourelles, mâchicoulis, échauguettes et pinacles.","habitants":"Familles des Delmas                  Famille du comte Claude de Busset\"","divers":"Château de Busset","gps":"","images":["../../jctruffet.com/image/image_03/03_Busset_1.jpg","../../jctruffet.com/image/image_03/03_Busset_2.jpg","../../jctruffet.com/image/image_03/03_Busset_3.jpg","../../jctruffet.com/image/image_03/03_Busset_4.jpg","../../jctruffet.com/image/image_03/03_Busset_5.jpg","../../jctruffet.com/image/image_03/03_Busset_6.jpg","../../jctruffet.com/image/image_03/03_Busset_7.jpg"]},"Consult_chateau_formulaire936d":{"id":"Consult_chateau_formulaire936d","dept":"03","canton":"Bourbon-l`Archambault","commune":"Buxières-les-Mines","nom":"Buxieres_les_Mines","type":"Château","periode":"XIV-XVII","histoire":"Trois châteaux à Buxières les Mines, de  Condemine du XIVe siècle, de la Ditière du XII-XVIe siècle et de Saragousse du XIV-XVIe siècles. \r\nCONDEMINE, au Moyen-Age, on trouve sur le territoire de la commune plusieurs fiefs, dépendant de la châtellenie de Bourbon ou de celles d'Hérisson ou de Murat; Biotière, qui a donné son nom à une importante famille bourbonnaise. Sous la Fronde, le château de La Condemine, aux mains du prince de Condé, est assiégé et pris par le gouverneur du Bourbonnais, Saint-Géran la noblesse bourbonnaise réunissait une douzaine  de domaines,  la Condemine, des Montmorin, des Urfé, des Chauvigny de Blot, des Chabanne, des Rouet d'Avaux,  était devenue une sorte de cité ouvrière, où le propriétaire, M. Rondeleux, logeait  quelques familles en son usine de Plat-Mort.  Aujourd'hui propriété de Monsieur Patrick Boeri.\r\nDITIERE, cette seigneurie dépendait de la châtellenie  de Hérisson. En 1656, Nicolas Maillet, seigneur  de Charendon, Ditière et La Mouillère, était l'époux  de Marie de la Loère, fille d'Aymon, seigneur de La Trolhière. La terre fut revendue à Valette de Rochefort seigneur de Ditière, qui la céda à bail à Léonard de Villard marchand  fermier à Bouan. En 1696, Claude Coiffier, seigneur de Nonette et Demoret, acquiert le fief de Ditière.                                  SARAGOUSSE, à la date de 1322, Hugues de Saint-Aubin, damoiseau, est qualifié de seigneur de Saragousse ainsi qu' un Hodonet de Saint-Aubin. En 1503 la terre est encore aux mains de la famille de Saint-Aulbin   et l'écuyer Caulmin de Saint-Aulbin, seigneur de Sarregousse, reconnaît tenir de la duchesse de Bourbon \"son hostel, place forte avec pont-levis et seigneurie au lieu-dit. En 1569, un seigneur de ce lieu était   possesseur de la paroisse et du château de Neuville.","architecture":"Condemine du XIVe siècle de plan polygonal entouré de profonds fossés  modifié ultérieurement, siège de la justice ducale, puis de la justice royale. A la veille de la Révolution, La Condemine est une vaste propriété de douze domaines réunis.   A la fin du XIXe siècle, cette vieille demeure féodale, qui avait abrité les grands noms de la noblesse bouronnaise L'entrée du château s'effectuait par la basse-cour qui aboutissait au pont-levis, devant la première tour de défense. Une salle de défense occupe le rez-de-chaussée, s'ouvrant sur le pont-levis par un arc en tiers point. Les corbeaux du plancher primitif subsistent. L'aile gauche conserve une pièce qui devait être la grande salle, avec ses bancs de pierre dans l'épaisseur des murs. Dans une pièce voisine, présence d'une cheminée du XVIe siècle. Il en reste une fenêtre géminée surmontée de chapiteaux à feuillage.      Ditière, qui fut aussi Guittière, est un lieu d'ou l'on guette, a gardé ses tours de la fin du XIIe siècle, ainsi que ses douves. Les bâtiments actuels sont d'époque récente, mais un écusson porterait la date de 1586 indiquant plusieurs phases de reconstruction. Saragousse, le château fort primitif a disparu et a été remplacé en 1654 par une construction composée d'un rez de chaussée  sur cave et d'un étage  auquel on accède par un escalier logé dans une tour carrée de la façade. A la Révolution,  il est décrit comme une espèce de pavillon à plusieurs chambres dont certaines servant de grenier, et sont  dénommées \"galtas\". On pense qu'il resterait des vestiges de la construction première dans le château actuel.","habitants":"Famille de M. Rondeleux                 Famille de  Nicolas Maillet\"","divers":"Château de la Condamine à Buxières les Mines, Ditière et Saragouse pas de gravures","gps":"","images":["../../jctruffet.com/image/image_03/03_Buxieres_les_Mines_1.jpg","../../jctruffet.com/image/image_03/03_Buxieres_les_Mines_2.jpg","../../jctruffet.com/image/image_03/03_Buxieres_les_Mines_3.jpg","../../jctruffet.com/image/image_03/03_Buxieres_les_Mines_4.jpg","../../jctruffet.com/image/image_03/03_Buxieres_les_Mines_5.jpg","../../jctruffet.com/image/image_03/03_Buxieres_les_Mines_6.jpg","../../jctruffet.com/image/image_03/03_Buxieres_les_Mines_7.jpg"]},"Consult_chateau_formulaire6542":{"id":"Consult_chateau_formulaire6542","dept":"03","canton":"Cerilly","commune":"Cerilly","nom":"Cerilly","type":"Château","periode":"XV-XIX","histoire":"quatre châteaux à Cerilly, les Assences du XIXe siècle avec échauguettes rondes,   des Bruyères-Laubespin  vestiges, la Pierre du XV-XIXe siècle chambres d'hôtes et du Point du Jour du XIXe siècle                      ASSENCES, hôtel restaurant pas dinformations historique.                La BRUYERE-L'AUBESPIN en 1445, le duc de Bourbon vendit à Jacques Cur  la terre et seigneurie de La Bruyère. En 1456,  elle fut rachetée par le duc. En 1469, le château se compose d'une salle appelée salle verte, d'un donjon  garni de tourelles, lequel chastel  est entouré de fossés. La ruine de La Bruyère fut achevée en 1598.                        La PIERRE  fut la résidence des seigneurs de Cérilly qui au XVIe siècle, jouissaient des droits d'usage  en forêt de Tronçais et de droits de four banal, conjointement avec les princes de Condé.  Au XVe  siècle ses membres,  écuyers, s'intitulaient seigneurs de Valigny, la Feuille, la Cour, entre autres lieux.  En 1459  Barthélémy Gardet vend  à Jehan de Charenton écuyer, seigneur de Chezelles. En 1503 Charles du Chasteau, écuyer, avoue tenir son hostel de La Pierre avec domaines.  En 1771,  est acquis  par la famille Lhuylier, dont une héritière épouse un Dumas Primbault. Les descendants de ces nouveaux possesseurs, originaires de la région de Treignat, résident à la Pierre, aux XVIIIe et XIXe siècles, la demeure étant mal entretenue par des propriétaires  parfois désargentés, l'édifice sera  remplacé en 1870-1875 par l'actuel château. Aujourd'hui, le domaine appartient à la famille Thayse.","architecture":"L'aubespin  achève de s'écrouler au nord de la bourgade, au lieu dit La Breure. Cette forteresse, fut le siège d'une petite châtellenie  qui étendait sa juridiction sur les seigneuries entourant la forêt de Tronçais. Du château féodal, il ne reste que quelques vestiges de murailles, une tour et  l'emplacement des fossés circulaires. En 1309, le duc de Bourbon en fit améliorer les défenses. Assiégé en 1369 par les routiers, le château fut incendié puis repris par les Bourbonnais.   Assences de construction récente, sur un ancien manoir,  consiste en un corps de logis quadrangulaire à deux niveaux couvert d'un toit à pans carrés et à lucarne. Des fenêtres à meneaux éclairent  la façade. Une tour carrée à galerie, à laquelle est accolée une échauguette ronde, flanqué a un angles. Devenu centre équestre.         La Pierre,  est un corps de logis rectangulaire à deux étages surmonté de mansardes. Elle est encadrée par deux tours l'une carrée, l'autre ronde, et se continue par une aile perpendiculaire et plus ancienne. Une autre partie, bâtie en 1910, complète cet ensemble.      \r\nPoint du Jour, au hameau, à la fin du XIXe siècle, à été édifié un château moderne qui a pu succéder  à une construction plus ancienne, étant donnée la situation particulière du lieu. corps de logis rectangulaire à deux niveaux et attiques, tour carré sur côté Est et tourelles rondes  à l'opposée en façade avant corps saillant.","habitants":"Famille de Jacques Cur               Famille Lhuylier\"","divers":"Vestiges du château de La Bruyère l'Aubespin, manoir des Essences, château de la Pierre, manoir de Mazières et château du Point du Jour.","gps":"","images":["../../jctruffet.com/image/image_03/03_Cerilly_1.jpg","../../jctruffet.com/image/image_03/03_Cerilly_2.jpg","../../jctruffet.com/image/image_03/03_Cerilly_3.jpg","../../jctruffet.com/image/image_03/03_Cerilly_4.jpg","../../jctruffet.com/image/image_03/03_Cerilly_5.jpg","../../jctruffet.com/image/image_03/03_Cerilly_6.jpg","../../jctruffet.com/image/image_03/03_Cerilly_7.jpg","../../jctruffet.com/image/image_03/03_Cerilly_8.jpg"]},"Consult_chateau_formulairee46d":{"id":"Consult_chateau_formulairee46d","dept":"03","canton":"St-Pourcain-sur-Sioule","commune":"Cesset","nom":"Cesset_Chenillat","type":"Tour","periode":"XV","histoire":"A Cesset le Fort de Lariot vestiges du château du XIV-XVIe siècle  et de Chenillat château du XVe siècle.         CHENILLAT,  il existait dès le début du XIVe siècle, une famille de Chenillat, également dénommée des Aix. Dans le  courant de ce siècle, on vit la fille de Pierre, seigneur de Chenillat et de Jehanne de Veauce, épouser Hugues Le Long, qui rend hommage en 1377, pour une terre à Villennes, dans une châtellenie de Moulins. Un de ses descendants, Hugues Le Long, écuyer, est seigneur de Chenillat et de Fourilles. Il laisse en 1443 une veuve, Luque Boirot,  leur fils Hugues était, en 1495, seigneur de Chenillat et de Fougis, en même temps qu'il était grand prévôt de la vénerie du duc de Bourbon. Anthoine Le Long lui succède et reconnait tenir en fief, en 1503, de la duchesse de Bourbon, \"ses chastel et maison de Chenillat et Bostz\". Fille d'Anthoine Le Long et de Gabrielle de  Lévis-Châteaumorand, Diane le Long de Chenillat est plus connue sous le nom de Diane de Châteaumorand. Héroïne de l'Astrée, elle épousa successivement les deux frères, Anne et Honoré d'Urfé. Ces derniers   conservèrent Chenillat  jusqu'à la fin du XVIIe siècle. En 1697 Claude Brisson originaire de Chantelle, acheta le fief de Chenillat. Ensuite la terre passa  par mariage aux Aumaistre et  vers 1743 à  Jacques de Jadon qui le défendit assidûment contre la démolition à la Révolution. Depuis le début  du XIXe siècle, le château a changé de nombreuses fois.","architecture":"Chenillat, édifice fortifié avec donjon,  ouvrage  servant, au rez-de-chaussée, de passage voûté avec portes en tiers point aux deux extrémités. Il comporte trois étages dont l'accès s'effectue par un escalier à vis construit dans une tourelle. Chaque étage se compose d'une salle éclairée par une fenêtre et chauffée par une grande cheminée disparue. A une époque indéterminée, le donjon a été découronné et la couverture refaite. Les créneaux et mâchicoulis ont été supprimés et la toiture implantée plus bas. L'accès au donjon s'effectuait par un pont-levis. Vestiges d'anciennes fortifications ruinées autour de l'ouvrage. A la fin du XVIIe siècle, le château fut abandonné et converti en ferme. Le pont-levis débouchait dans un passage vouté sous la tour percée de part en part. Une seule salle à chaque étage, auxquels on accède par un escalier aménagé dans une tour ronde accolée à un angle du donjon, et percée d'une porte du   côté de l'ancienne cour, le troisième étage fut presque supprimé lorsqu'on a abaissé la tour et refait la toiture. Les cheminées ont été démolies.  \r\nFort de Lariot. Un petit hameau s'est constitué autour de ce château de Lariot, dont les vestiges laissent deviner un  édifice   d'une certaine importance au Moyen-Age: les restes d'un porche, défendu par deux larges canonnières, une enceinte quadrangulaire, les ruines d'une chapelle castrale, un site artificiellement terrassé, sont dominés  par une haute tour carrée, coiffée d'un toit à l'impériale du XVIIe siècle, à laquelle sont accolés une tour ronde tronquée et un petit bâtiment haut et carré.","habitants":"Famille de Chenillac\"","divers":"Château fort de Chenillat","gps":"","images":["../../jctruffet.com/image/image_03/03_Cesset_Chenillat_1.jpg","../../jctruffet.com/image/image_03/03_Cesset_Chenillat_2.jpg","../../jctruffet.com/image/image_03/03_Cesset_Chenillat_3.jpg"]},"Consult_chateau_formulairea52b":{"id":"Consult_chateau_formulairea52b","dept":"03","canton":"Ebreuil","commune":"Lalizolle","nom":"Chalouze","type":"Château","periode":"XIX","histoire":"Deux châteaux à Lalizolle;  Chalouze du XIXe siècle style féodal et Nades du XVIIe siècle.                    CHALOUZE, il a été construit à l'emplacement d'un château plus ancien, dont le propriétaire, \"sieur de Chalouze\" est signalé en 1664.  Au milieu du XIXe siècle, le Duc de Morny, demi-frère de I 'empereur Napoléon III chamboula la vie de Lalizolle. Il possédait une immense propriété sur Lalizolle et une ferme sur Nades. Il fit construire un château, un corps de ferme dans un immense parc. Cet homme modifia les comportements et améliora la qualité de vie en ouvrant des routes, et offrant du travail, en créant des entreprises (moulin de l'Etang Roux). Le Duc de Morny créa l'Hôtel de la Poste, appelé Tournebride, réservé au personnel d'accompagnement des visiteurs de marque du château, et fut la demeure du célèbre professeur Alajouanine.                 NADES a été au XVIIe siècle un lieu de villégiature de madame de La Fayette. Il fut racheté en 1854 par le duc de Morny,  celui-ci le fit reconstruire et le dota d'une ferme-modèle, qui subsiste dans l'actuel parc. Il y reçut fastueusement Jacques Offenbach, Ludovic Halévy, Alphonse Daudet, qui séjournèrent et chassèrent sur les 2 000 ha du domaine. La ferme-modèle témoigne de l'implication du duc de Morny pour favoriser de nouvelles techniques agricoles, mais aussi pour promouvoir les bienfaits de l'Empire auprès du monde paysan, électorat important à cette époque. Il est aujourd'hui considérablement ruiné.  Voilà comment l'auteur de La Princesse de Clèves décrivait dans ses correspondances la maison qui porte aujourd'hui son nom. Désormais Henry et Marie Dechambre sont propriétaires des lieux.","architecture":"Chalouze, l' actuel château du XIXe siècle remplaça un château médiéval, qui, aujourd'hui, est surmonté d'un donjon à échauguettes d'angles, La terre devait être dans la dépendance des seigneurs voisins du Châtelard ou de Veauce. Le corps de logis de plan barlong à deux niveaux et niveau de comble reçoit deux ailes en retour d'équerre en forme  de pavillons. Il est agrémenté en avant corps d'une tour carrée prise en oeuvre au centre de la façade recouverte d'un toit élancé en pavillon  et surmonté  de paratonnerres  et frises de faitage. Elle est anglée  de deux fines et longues échauguettes. Ce château, avec sa tour centrale chapeauté de son toit en tuiles de châtaignier, a été restauré avec beaucoup de goût ainsi que ses abords et bâtiments d'élevage.                  Nades corps de logis  du XIXe siècle à deux niveaux avec pavillons en saillit aux extrémités.","habitants":"célèbre professeur Alajouanine Henry et Marie Dechambre\"","divers":"Château de Chalouze et de Nades.","gps":"","images":["../../jctruffet.com/image/image_03/03_Chalouze_1.jpg","../../jctruffet.com/image/image_03/03_Chalouze_2.jpg","../../jctruffet.com/image/image_03/03_Chalouze_3.jpg","../../jctruffet.com/image/image_03/03_Chalouze_4.jpg"]},"Consult_chateau_formulaire22e3":{"id":"Consult_chateau_formulaire22e3","dept":"03","canton":"Chantelle","commune":"Chantelle","nom":"Chantelle","type":"Forteresse","periode":"XI-XV","histoire":"CHANTELLE, les sires de Bourbon s'en emparèrent à la fin du XIe siècle et les Ducs, leurs héritiers  y conservèrent un point d'appui et un arsenal,  en 1214, le seigneur de Bourbon passa accord, avec l'archevêque de Bourges, par lequel Guy de Dampierre jouirait des droits  d'usage dans les bois de Vèvre, pour les réparations et le chauffage du château de Chantelle.  C'est sous Pierre II et Anne de France que Chantelle resté forteresse devient Palais Ducal.  Après le départ  du duc  de Bourbon, en 1523, le château fut pillié, ses meubles confisqués par le chancelier Duprat, et livré aux démolisseurs. Richelieu acheva sa destruction à l'exclusion de la grosse tour qui domine la Bouble  et abrite actuellement les pieuses moniales (couvent des bénédictines). A la chute du connétable Charles de Bourbon, le château entra donc dans le domaine royal.         CHARBOULAT, est une ancienne seigneurie et métairie qui fut donnée aux chanoines d'Évaux,  siège de la seigneurie.","architecture":"Chantelle, dominant le ravin de la Bouble d'une cinquantaine de mètres, Une forteresse a   pu  être construite pour remplacer  le château primitif. Le donjon carré, caractéristique des fortifications du XIe siècle, fut élevé  sur l'ancienne motte féodale. Les fortifications de l'enceinte suivirent le château a été bâti pour former un poste  avancé, face au puissant voisin d'Auvergne, et asseoir l'autorité de son seigneur, la forteresse avait  encore fière allure, et c'est un autre cardinal, celui de Richelieu  qui dans sa lutte contre la puissance de la noblesse, après l'édit de 1621, fit détruire les forteresses. Ainsi, le château de Chantelle  fut démoli et rasé en 1638. Il ne reste de toutes  ces épreuves que les imposantes  murailles qui surplombent le ravin du côté de la Bouble  et deux tours, dont une intégrée dans l'enceinte. Charboulat, maison d'habitation et tour\", il   subsiste aujourd'hui une petite demeure du XVe siècle qui a été le siège de la seigneurie et une ancienne tour  transformée en pigeonnier, dans les murs  de laquelle  est encastré  un blason rudimentaire, sculpté en deux  panneaux: l'un représentant la crosse abbatiale, le livre et le calice, l'autre un lion affronté à droite.","habitants":"Duc de Bourbon\"","divers":"Forteresse de Chantelle et vestiges de Charboulat.","gps":"","images":["../../jctruffet.com/image/image_03/03_Chantelle_1.jpg","../../jctruffet.com/image/image_03/03_Chantelle_2.jpg","../../jctruffet.com/image/image_03/03_Chantelle_3.jpg","../../jctruffet.com/image/image_03/03_Chantelle_4.jpg","../../jctruffet.com/image/image_03/03_Chantelle_5.jpg","../../jctruffet.com/image/image_03/03_Chantelle_6.jpg","../../jctruffet.com/image/image_03/03_Chantelle_7.jpg"]},"Consult_chateau_formulaire422c":{"id":"Consult_chateau_formulaire422c","dept":"03","canton":"Montmarault","commune":"Chappes","nom":"Chappes","type":"Maison forte","periode":"XV","histoire":"Quatre châteaux à Chappes; le Coudray du XV-XVIIe siècle avec tour, le Grand-Coudray   du XV-XVIIe siècle avec douves, de  Marcais du XVe siècle et de la Roche du XVe siècle.                    COUDRAY, la seigneurie du Coudray est attestée dès le XIIe siècle, appartenait, au XIVe siècle aux Brun du  Peschin. En 1416, Bertrand de la Tour, comte d'Auvergne et de Boulogne, devient seigneur haut-justicier du Coudray et fait aveu, à cause de sa femme Jacquette du Peschin, de la motte, terre et seigneurie du Peschin  et Banassat, avec le fief du Coudray qui resta longtemps en possession de la famille de la Tour. Le fief du Coudray passe de 1461 à 1615 aux du Boys (Deneuille), puis au notaire Damer de Chappes et à la famille Perret qui devient du Coudray.            MARCAIS, Gilbert de Biotière épouse Gabrielle   de Marsay et en reçoit le fief. En 1569, maison seigneuriale comme en témoigne cette date gravée à l'étage, ce premier château connu fut restauré en 1677, date où Martin de Rollat, chevalier, époux d'Anne Elisabeth de Biotière, rend foi et hommage au roi pour les fiefs de Marçais, Petit Puy et Beaucaire. En 1686  il renouvelle cet hommage pour le fief de Marsay en la paroisse de Chappes. Un siècle plus tard en 1760,  Marçay  est aux mains de Jean-Louis de Rollat. Au début du XXe siècle, Marsais appartenait à la famille de Bourbon-Busset,  est aujourd'hui  une exploitation agricole.             ROCHES,  ou La Roche des Fontaines est ce \"lieu seigneurial des Fontaines, dans la châtellenie de Murat, et qui est qualifié par Grégoire de gentilhomnière, il fut bâti   par François de la Roche des Fontaynes, châtelain et lieutenant général, au XVe  siècle la famille de la Roche possédait également Chassincourt et le château de Venas. Ce château est resté  propriété de la même famille du XVe siècle jusqu'à la Révolution.","architecture":"Coudray, les douves de l'ancien château existent encore, le nouveau, édifié au début  du XVIIe siècle, sur l'ancienne construction, en a conservé une tour. Deux appentis dont l'un a un toit à clocheton fit fonction de chapelle et complètent cet ensemble de fort belle allure.  \r\nGrand coudray, de l'édifice primitif du XVe siècle subsistent trois tours rondes. Le reste de l'édifice a été reconstruit au XVIIe siècle et remanié au XIXe siècle. Le château se développe sur trois côtés d'une cour ouverte, le corps de bâtiment de gauche servant de communs. Du corps de bâtiment de droite ne reste qu'un mur. De chaque côté de la façade principale, datant probablement du XVIIe siècle, deux tours rondes rappellent les origines médiévales du lieu. La tour gauche a vu son lanternon fermé au début du XXe siècle. Ayant servi de pigeonnier, elle présente des orifices pour oiseaux. Ensemble de fort belle allure.\r\nMarçais est constitué  d'un grand corps de bâtiment rectangulaire,  avec 2 ailes à l'avant, qui paraissent avoir été deux anciennes tours carrées, et dont l'une a abrité une chapelle, le tout entouré de fossés bien conservés, les encadrements des ouvertures sont constitués de blocs alternés, les uns sans sculpture, les autres ornés de blasons  de familles nobles anciennes.                   Roches, il semble   plutôt une forteresse rurale  avec un grand bloc de base carrée, trapu, énorme donjon  auquel est accolé, au   milieu de la façade, une tour carrée  pour l'escalier à vis, et une autre  à l'arrière. Quelques meurtrières et fenêtres étroites. Il est couvert d'une toiture à quatre pans. On voit autour  du château  des restes de fosses qui indiquent toute une organisation défensive.","habitants":"Famille de la Tour                    Famille de Bourbon-Busset            Famille de François de la Roche des Fontaynes\"","divers":"Château de Coudray petit et Grand, de Marçais et de la Roches à Chappes.","gps":"","images":["../../jctruffet.com/image/image_03/03_Chappes_1.jpg","../../jctruffet.com/image/image_03/03_Chappes_2.jpg","../../jctruffet.com/image/image_03/03_Chappes_3.jpg","../../jctruffet.com/image/image_03/03_Chappes_4.jpg","../../jctruffet.com/image/image_03/03_Chappes_5.jpg","../../jctruffet.com/image/image_03/03_Chappes_6.jpg","../../jctruffet.com/image/image_03/03_Chappes_7.jpg"]},"Consult_chateau_formulaire779b":{"id":"Consult_chateau_formulaire779b","dept":"03","canton":"St-Pourcain-sur-Sioule","commune":"Bransat","nom":"Charandon","type":"Maison forte","periode":"XV","histoire":"CHARANDON, l'histoire de l'édifice  n'est pas connue; en 1508 est attestée a une famille Mallet, puis en 1702 en fait mention  de Jean Cousin, seigneur de Charendon.","architecture":"Le château de Charandon, dont l'essentiel apparaît avoir été construit à la fin du Moyen-Age au XVe siècle, domine la vallée du Gaduet et l'ancien bourg de Bransat. Il est constitué d'une enceinte rectangulaire cantonnée de quatre tours  circulaires. L'entrée est percée à l'est sous un porche moderne. La tour qui le protège au sud est aménagée en chapelle au 1er étage. Passé le porche, on entre  dans une cour bordée par le logis sur les côtés nord et ouest. La courtine sud a été en partie démolie pour laisser entrer la lumière sur cette terrasse.","habitants":"Famille Mallet\"","divers":"La maison forte de Charandon à Bransat","gps":"","images":["../../jctruffet.com/image/image_03/03_Charandon_1.jpg"]},"Consult_chateau_formulaire86c7":{"id":"Consult_chateau_formulaire86c7","dept":"03","canton":"Chantelle","commune":"Chareil-Cintrat","nom":"Chareil_Cintrat","type":"Château","periode":"XV-XVII","histoire":"Quatre châteaux à Chareil-Cintrat, celui d'Artangues du XVIIe siècle avec tours, de Blanzat du XVe siècle, de la Rivière du XIV-XVIIe siècles maison forte avec tours et celui de  Chareil.              CHAREIL qui à l'origine est un des fiefs de la maison de Bourbon, par  succession, au XVIe siècle  à Claude Morin, contrôleur ordinaire des guerres, pour qui furent effectués les décors peints inspirés de l'antique. Au XVIIIe siècle il appartient aux Langlois de la Ramentière qui le conservent jusqu'à la fin du XIXe siècle.  En 1958, l'État se porte acquéreur du château et entreprend des travaux de restauration.            BLANZAT, édifiée  par la famille de Rouher. En 1506, Bienvenue Pille, veuve de Guillaume de Les Vaux, le possède, avec Regnaud de Les Vaux et Glaude Charlys,  En 1615 encore, lors de la saisie du château de Blanzat et de la Rivière, c'est Gilbert Rouher qui était seigneur de Blanzat.   Acheté vers 1620  par François Chrétien, il appartenait  au marquis d'Ussel au moment de la Révolution,  et fut vendu comme bien national.                                 BAS-CHAREIL, du Moyen-Age  au  XVIe siècle, quelques aménagements de style  Renaissance. Au XVIIIe siècle, construction d'une partie des communs. Pendant la Révolution, le domaine est vendu comme bien national. L'Etat l' achète en  1958.                        La RIVIERE,   une branche cadette  des seigneurs de Chareil, était seigneurs de la Rivière, mais il est probable  que, dès la fin du XVIe siècle, les deux terres de Blanzat et de La Riviere  ont été réunies, et qu'ainsi le château devint  le siège de la nouvelle seigneurie. Après la confiscation de Blanzat et de La Rivière sur Gilbert Rouher, elles furent acquises en 1620 par François Chrestien, et au moment de la Révolution elles appartenaient au marquis d'Ussel.","architecture":"Chareil, édifié au XVIe siècle, le château de Chareil-Cintrat présente un décor intérieur sculpté marqué par la seconde Renaissance Française.           Blanzat  L'ancienne maison forte  existe encore avec son bâtiment flanqué de deux tours rondes. Le château actuel, qui s'élève à proximité de l'ancienne maison forte, est une construction des XVIe et XVIIe siècles, une motte ou était le grenier du duc de Bourbon, en laquelle y a édifié une grange. en  1615, il est probable qu'à cette époque, l'ancienne maison forte de Blanzat avait été délaissée et que seuls les droits seigneuriaux subsistaient. Dès lors, les deux terres de Blanzat et de la Rivière ne furent plus séparées.               Artangues édifice remanié et en partie reconstruit au XVIIe siècle sur des bases médiévales, présente un ensemble complexe de bâtiments servant d'habitation. Le mur d'enceinte à l'intérieur duquel se trouve la plupart des édifices est encore visible. A l'intérieur de ce mur cantonné de deux tours, se trouvent deux maisons et un petit château, ainsi qu'une tour. Hors de l'enceinte se trouvent une troisième maison et un deuxième petit château. Le portail d'entrée témoigne des anciennes fortifications, s'ouvrant sous un arc en plein cintre appareillé. La tour est située à l'angle nord de l'enceinte .\r\nLa Rivière, cette maison forte du XIVe siècle s'est installée sur une ancienne motte féodale, de la rive droite de la   Bouble. Le corps de bâtiment à deux niveaux et combles élevés est d'allure assez massive et flanqué de tours rondes ou carrées aujourd'hui surbaissées. Le toit en pavillon d'une grande hauteur, écrase encore un peu plus  la construction. Les transformations du XVIe siècle ont voulu égayer un peu  cette sévère demeure, et les murs se sont éclairés de fenêtres a meneaux. La grande pièce a reçu le confort  d'une cheminée monumentale, aux  armes des Chareil, qui signe ainsi cette période d'aménagements.","habitants":"Famille de Langlois de la Ramentière    Famille de François Chrétien\"","divers":"Château de Chareil  de Blanzat,  d'Artanges  et de la Rivière","gps":"","images":["../../jctruffet.com/image/image_03/03_Chareil_Cintrat_1.jpg","../../jctruffet.com/image/image_03/03_Chareil_Cintrat_2.jpg","../../jctruffet.com/image/image_03/03_Chareil_Cintrat_3.jpg","../../jctruffet.com/image/image_03/03_Chareil_Cintrat_4.jpg","../../jctruffet.com/image/image_03/03_Chareil_Cintrat_5.jpg","../../jctruffet.com/image/image_03/03_Chareil_Cintrat_6.jpg","../../jctruffet.com/image/image_03/03_Chareil_Cintrat_7.jpg","../../jctruffet.com/image/image_03/03_Chareil_Cintrat_8.jpg"]},"Consult_chateau_formulaire130f":{"id":"Consult_chateau_formulaire130f","dept":"03","canton":"Escurolles","commune":"Charmeil","nom":"Charmeil","type":"Château","periode":"XVIII-XIX","histoire":"Trois  châteaux à Charmeil, de Charmeil du XVIIIe siècle, de Chassaings du XIXe siècle et de Tourillon du XIX-XXe siècle. CHARMEIL, a été au XVIIe siècle, la propriété de la famille Douet, dont Gabriel était gouverneur pour le roi en la ville de Vichy, et seigneur de Saint-Germain, du Chambon et autres lieux.   qui fut la résidence d'été du maréchal Philippe Pétain en 1943 et où a eu lieu notamment une rencontre secrète entre Pierre Laval et le ministre conseiller d'ambassade allemand Rudolf Rahn en août 1942.  Charmeil où notamment a eu lieu une rencontre secrète entre Pierre Laval et le ministre conseiller d'ambassade allemand Rudolf Rahn en août 1944.      CHASSAINGS, château probablement construit dans la première moitié du XIXe siècle, a été la propriété de Jehan Dorvalet. Par la suite il fut transformé en hôtel puis servit en 1939-1940 de bureaux à des services du ministère de l'air. \r\nTOURILLON, pas d'information historique, château construit, pour J.J. Breynat de Saint-Véran, toujours habité.","architecture":"Charmeil, restaurée en 1770, la façade est éclairée sur les deux niveaux, par de nombreuses fenêtres. Elle est dotée d'un perron permettant, par un escalier en fer à cheval, l'accès à la porte d'entrée. En 1818, la toiture fut transformée, on supprima les mansardes et la ceinture de frise qui ornait la façade, du niveau supérieur de fenêtres à l'entablement. Après avoir été aménagé à la fin du XIXe siècle en rendez vous de promenade et restaurant il a été abandonné quelques années, avant qu'un nouveau propriétaire en fasse sa demeure.\r\nChassaings, château probablement construit dans la première moitié du XIXe siècle. Le parc   comprend un logement de domestiques, des communs, une grange et une étable.\r\nTourillon, à la fin du XIXe siècle, vendu dans la seconde moitié du XXe siècle. L'édifice se compose d'un sous-sol, d'un étage carré et étage  de comble. Le gros-oeuvre en pierre  pisé et  enduit, élévation à travées surmontée d'un toit conique, toit à longs pans brisés et toit en pavillon recouverts d'ardoise.","habitants":"Famille Douet,                            maréchal Philippe Pétain \"","divers":"Château de Charmeil, de Chassaings et de Tourillon","gps":"","images":["../../jctruffet.com/image/image_03/03_Charmeil_1.jpg","../../jctruffet.com/image/image_03/03_Charmeil_2.jpg","../../jctruffet.com/image/image_03/03_Charmeil_3.jpg","../../jctruffet.com/image/image_03/03_Charmeil_4.jpg","../../jctruffet.com/image/image_03/03_Charmeil_5.jpg"]},"Consult_chateau_formulairebc70":{"id":"Consult_chateau_formulairebc70","dept":"03","canton":"Gannat","commune":"Charmes","nom":"Charmes","type":"Château","periode":"XV-XVIII","histoire":"Trois châteaux à Charmes; le Chezelles-Bassignat maison forte du XVe siècle, le Maimouche maison forte du XVe siècle tour et le Montluisant du XV-XIXe siècles.  CHEZELLES-BASSIGNAT, le premier seigneur connu de Bassignat est Louis de Thierry, chevalier, dont la veuve, Daulphine de Vernet, rend hommage, en 1472, pour sa terre et  seigneurie de Bassignat, à Michel Bayard, qui est seigneur de Bassignat en 1502. Mais il n'a pas gardé la terre longtemps car en 1506, le nouveau seigneur de Bassignat est François de la Pauze,  écuyer, seigneur de Chezelles et de Néronde, qui reconnaît tenir en fief, directement du roi, sa terre de Bassignat. En 1569, dans la Générale description du Bourbonnais on apprend que \"la terre, château et justice de Bassignat appartient à demoiselle Gabrielle de Cordebuf\". La terre appartient aujourd'hui à la famille Brizard.                              MONTLUISANT,  Montluisant semble avoir, dès l'origine, appartenu à la famille de Bort. En 1450, Louis de Bort, seigneur de Montluisant, rend hommage de  son fief de Montluisant au comte de Montpensier. Vers 1550, Marguerite de Bort, dame de Montluisant, épouse Antoine de la Roche. veuve en seconde noce  d'Etienne de Lestranges, elle fait don, en 1588, de ses biens à Toussaint de la Roche son fils, écuyer. Celui-ci, seigneur des lieux nobles de la Ribe et de Montluisant, réside à  Montluisant et épouse Gabrielle Brosson, le 28 novembre 1592. La propriété fut dispersée en 1781. MALMOUCHES, pas d'information historique seigneuriale.","architecture":"Chezelles-Bassignat, maison forte du XVe siècle sinon des fossés encore visibles et en partie remplis d'eau, un corps de bâtiment surbaissé sur la face est, faisant partie d'une enceinte quadrangulaire, et les structures d'une tour ronde. Le corps de bâtiment qui subsiste porte les traces du XVe siècle, par des canonnières, d'une tour en poivrière. Une grosse tour ronde, ouverte de canonnières, était engagée a l'angle nord-est du corps de bâtiment. L'entrée, qui était défendue par un pont-levis, a conservé un joli pigeonnier-porche, s'ouvrant sur deux granges étables. De forme carrée, il est couvert d'un toit en pavillon, surmonté d'un beau lanterneau.  Malmouche, ancienne maison forte du XVe siècle, dont l'enceinte enfermait une cour carrée. Le bâtiment principal, de forme rectangulaire à deux étages se complète d'une aile en retour d'équerre, l'angle extérieur  était flanqué d'une tour ronde engagée, plus haute que les bâtiments.  Un ruisseau alimentait en eau les fossés, franchis au moyen d'un pont-levis qui a disparu. Seul le porche d'entrée remanié subsiste. Malgré les réparations successives les traces du XVe siècle sont nombreuses, en particulier dans les ouvertures bords droits et arcs moulurés.\r\nMontluisant, maison forte du XVe siècle, avec colombier et puits, dont l'enceinte délimitait une cour rectangulaire. Le corps principal de bâtiment, à deux niveaux et niveau de comble, est constitué d'une longue habitation de plan barlong, orientée nord-sud, qui était flanquée, côté jardin, à l'angle est, d'une tour ronde engagée, avec une  chapelle  au premier étage. La tour a été démolie  il y a une cinquantaine d'années. La maison d'habitation est complétée  d'une aile en retour d'équerre. Malgré les transformations au XVIIe siècle, de nombreuses ouvertures du  XVe siècle  à angles moulurés subsistent, ainsi que les caves voutées. Le colombier, appuyé sur l'enceinte, est  installé dans une cour et couvert d'un toit en pavillon surmonté d'un lanterneau.","habitants":"Famille de François de la Pauze          Famille d'Antoine de la Roche\"","divers":"Château de Chezelles-Bassignat, de Maimouches et de Montluisant.","gps":"","images":["../../jctruffet.com/image/image_03/03_Charmes_1.jpg","../../jctruffet.com/image/image_03/03_Charmes_2.jpg","../../jctruffet.com/image/image_03/03_Charmes_3.jpg","../../jctruffet.com/image/image_03/03_Charmes_4.jpg"]},"Consult_chateau_formulairee316":{"id":"Consult_chateau_formulairee316","dept":"03","canton":"Chantelle","commune":"Charroux","nom":"Charroux","type":"Maison forte","periode":"XIII-XV","histoire":"Trois châteaux à Charroux, le Beaulieu  maison forte du XIVe siècle, de la Marche maison forte du XIIIe siècle et la petite Varenne du XV-XIXe siècle tour ronde.     CHARROUX, Charroux-en-Bourbonnais fut, du XIIe au XVIe siècle, une importante place affranchie et fortifiée par les sires de Bourbon, devenus par la suite ducs de Bourbonnais et d'Auvergne.        BEAULIEU, la seigneurie de Beaulieu, proche de la maison des Templiers de la Marche, semble constituée dès le XIVe siècle. En 1457, la terre de Beaulieu est donnée  à Pierre Marchant redevable au duc de Bourbon.                      MARCHE, en 1251, Émery, prieur de Chantelle et Guillaume, précepteur de la milice du Temple de la Marche, concluent un échange par lequel le couvent de La Marche donne des cens à  Taxat et Sare, contre une dîme à La Clote, aujourd'hui La Flotte, et Eschiat. La Marche était alors une seigneurie ecclésiastique, dont la chapelle et les bâtiments ont été fortifiés et enfermés dans une enceinte. Après la disparition de l'ordre des Templiers,  la Marche fut attribuée à l'ordre des Hospitaliers de Saint-Jean de Jérusalem. Les structures subsistent encore  aujourd'hui, mais les bâtiments sont occupés par une exploitation agricole.                                 La PETITE VARENNE, pas d'information historique.","architecture":"Charroux, ancienne place forte Charroux fut une ville fortifiée et un important carrefour d'échanges au Moyen Age.  Sur un plateau rocheux protégeait par trois  enceintes le donjon de bois qui se tenait sur son centre, la cour des dames ou l'on rentré par les portes d'Orient ou de l'Occident.                              Beaulieu, les bâtiments, dont  quelques traces marquent  encore l'origine, ont été installés en position  fortifiée, sur le rebord d'un plateau dominant le passage de Chantelle à Jenzat.          La Marche, les structures subsistent encore aujourd'hui, mais les bâtiments sont occupés par une exploitation agricole, la chapelle et les bâtiments ont été fortifiés et enfermés dans une enceinte.\r\nLa Petite Varenne, blotti dans un épais bosquet d'arbres, ce petit château a conservé le style des maisons fortes du XVe siècle, mais il a été entièrement remanié au XIXe siècle. Il se compose d'un corps de bâtiment de plan rectangulaire, à trois étages, flanqué d'une tour ronde à l'angle nord. Les ouvertures de la façade, symétriques autour d'un axe central, sont surmontées au niveau du toit d'un bel ensemble de fenêtres de comble en encorbellement, dans le style maison de plaisance. L'installation de la Petite Varenne provient d'un dédoublement du grand domaine de La Varenne au cours du XVe siècle.","habitants":"Famille de Pierre Marchant              Ordre des Hospitaliers\"","divers":"Ville fortifié de Charroux  avec bâtiment de Beaulieu de la Marche et château de la petite Varenne","gps":"","images":["../../jctruffet.com/image/image_03/03_Charroux_1.jpg","../../jctruffet.com/image/image_03/03_Charroux_2.jpg","../../jctruffet.com/image/image_03/03_Charroux_3.jpg","../../jctruffet.com/image/image_03/03_Charroux_4.jpg","../../jctruffet.com/image/image_03/03_Charroux_5.jpg","../../jctruffet.com/image/image_03/03_Charroux_6.jpg","../../jctruffet.com/image/image_03/03_Charroux_7.jpg"]},"Consult_chateau_formulaireb2f3":{"id":"Consult_chateau_formulaireb2f3","dept":"03","canton":"Le Donjon","commune":"Chassenard","nom":"Chassenard","type":"Château","periode":"XV-XVII","histoire":"Trois châteaux à Chassenard, Beugnet du XIV-XXe siècle maison forte avec tour, des Blancs du XXe siècle et de la Croix du XVII-XIXe siècle.              BEUGNET,  était une ancienne commanderie de l'ordre de Saint-Jean de Jérusalem. Cette seigneurie   ecclésiastique était organisée autour d'une maison forte  construite au XIVe siècle, au début du XXe siècle, la propriété des Capelin.     \r\nBLANCS construit au XXe siècle pas d' information historique.\r\nla CROIX, actuellement siège de la Mairie de Chassenard a été acquis par la commune en 1978. Il était auparavant  la propriété de M. Alain de La Celle. A lorigine, cette demeure appartenait depuis le XVIIe siècle à la famille Gay et sest transmise par héritages directs.","architecture":"Beugnet, cette seigneurie   ecclésiastique était organisée autour d'une maison forte  construite au XIVe siècle, car quelques moulures de  cette époque subsistent dans le château actuel. Le château de la commanderie \"était protégé par une grande  palissade d'ais, vulgairement appelée bangy, avec un pont-levis, le tout entouré de doubles fossés en eau\".  L'élégante construction moderne flanquée  d'une petite tour, rien ne subsiste des fortifications, ni   des doubles fossés, encore mentionnés dans les aveux du XVIIe siècle.          Blancs, la construction actuelle du début du XXe siècle. Elle a pu remplacer un édifice plus ancien mais qui, apparemment, n'a laissé aucune trace, tant sur le sol que dans les archives. Cette belle maison bourgeoise  prend l'allure d'un petit château avec ses pavillons et sa cour d'entrée.           la Croix, dans le dernier quart du XVIIIe siècle, la maison bourgeoise a été transformée en château par le rajout des deux ailes, lune côté nord et lautre côté sud et de la tour-escalier côté ouest, pour devenir le « Château de la Croix ». en 1896.  Un seul corps de bâtiment, au cours de la  seconde moitié   du XIXe siècle. Deux pavillons en retour d'équerre, à deux niveaux et  niveau de comble, sont  bâtis aux angles,ainsi qu'une tourelle octogonale engagée au centre de la façade. L'ensemble décore un fond de briques roses, est construit en briques, à la mode de la Sologne bourbonnaise ou les losanges de briques noires surhaussé par  des  chaînages d'angles et de niveaux en pierre calcaire blanche. Ce bâtiment appartient à la municipalité.","habitants":"Famille des Capelin                     Famille Gay \"","divers":"Château de Beugnet , de Blancs et de la Croix à Chassenard","gps":"","images":["../../jctruffet.com/image/image_03/03_Chassenard_1.jpg","../../jctruffet.com/image/image_03/03_Chassenard_2.jpg","../../jctruffet.com/image/image_03/03_Chassenard_3.jpg","../../jctruffet.com/image/image_03/03_Chassenard_4.jpg"]},"Consult_chateau_formulairebdc9":{"id":"Consult_chateau_formulairebdc9","dept":"03","canton":"Monimarault","commune":"St-Marcel-en-Murat","nom":"Chassincourt","type":"Château","periode":"XVII","histoire":"CHASSINCOURT, vers 1400, la famille de la Roche est seigneur de Chassincourt. En 1569, la maison seigneuriale de Chassincourt est citée comme dépendant de la châtellenie de Murat. Au début du XVIIe siècle, Charles de Biotières, écuyer, seigneur  de Pochonnière, acquiert par échange la seigneurie de Chassincourt. Il était capitaine châtelain de Murat. En 1648, Gilbert de Biotières, écuyer, seigneur de Chassincourt, Pochonnière, Buxières  comte de la châtellenie de Murat, épouse Madeleine de Bayard, fille de Thomas, écuyer, Seigneur de Neuville et de Gabrielle le Rogue.","architecture":"Chassincourt est un grand bâtiment rectangulaire avec une tour accolée à la façade, renfermant un escalier  à vis,. Au-dessus de la porte d'entrée, on remarque deux écussons ovales surmontés d'une couronne de marquis et d'une devise \"Tarn foras quam nobilis\". Près du château, la chapelle seigneuriale de plan  carré, surmontée d'un clocheton hexagonal, et qui abrite des armoiries des de Blotière. Les fossés ont
