const FULL={"Consult_chateau_formulaireaa90":{"id":"Consult_chateau_formulaireaa90","dept":"03","canton":"Cusset","commune":"Abrest","nom":"Abrest","type":"Château","periode":"XIV-XV","histoire":"Abrest possède trois châteaux; Abrest du XIVe siècle, des Chaussins  du XV-XVIe siècle, et de Quinssat du XVIIe siècle(voir article).                         ABREST, en 1208  Bouchard de Vichy reconnait tenir le château et la seigneurie. Les membres de sa famille s'y succèdent jusqu'au milieu du XIVe siècle.                             CHAUSSINS, continuité de la seigneurie d'Abrest, en 1208  Bouchard de Vichy reconnait aussi tenir le château et la seigneurie, en 1377, passe au duc de Berry et d'Auvergne.  C'est à cette époque  qu'Aliénor de Vichy, qui avait épousé  Jean de Vendat,  vivait à Abrest avec sa petite-fille Alips de Vendat, fille de Guillaume de Vendat et de dame Phelippe de Veauce. Alips fut enlevée par Agne de la  Tour, seigneur d'Olliergues. Leur fille porta par son mariage la seigneurie d'Abrest à la famille de Bourbon Carency, et en 1503, c'est Catherine d'Allègre, veuve de Charles de Bourbon-Carency, qui fait aveu de son château, terre, seigneurie et juridiction. Passe à Barthezard de Séneret,  chevalier, seigneur du Chossaing, qui était devenu seigneur d'Abrest et de Vendat, cède ses droits sur ces deux fiefs en 1547 à François des Cars, chevalier, seigneur de Vaulguyon. Celui-ci épouse Isabeau de Bourbon-Carency et fait transformer le château selon le goût de la  Renaissance. Après avoir appartenu  aux Stuart, aux Saint Mesgrin, puis aux d'Apchon, au XVIIIe siècle la  terre d'Abrest fait partie de l'héritage de la famille de la Souche et fut confisquée en 1792 comme bien  national. En 1794, Louis Justin Marie, dernier marquis de Talaru ayant émigré, les propriétés des Talaru sont vendues aux enchères, en mauvais état, il est acheté par la famille de Taya, pour être acquis par de nouveaux  propriétaires au XIXe siècle.","architecture":"Abrest la construction de la forteresse était déjà réalisée entre le XIIe et XIIIe siècle, le château occupait une situation stratégique. De l'ancien château, au XIXe siècle, il restait   une grosse tour d'angle ronde d'une dizaine de mètres de diamètre et couverte d'un toit conique, le donjon  carré avec ses créneaux, et une bretèche à mâchicoulis  et créneaux qui défendait l'entrée, le bâtiment actuel conserve une tour carrée du XIVe siècle.                    Chaussins la construction de la forteresse était déjà réalisée entre le XIIe et  XIIIe siècle, le  château est constitué de divers bâtiments disposés autour d'une cour quadrangulaire, flanqué de tours et entouré de douves. Le corps de logis en L forme l'élément le plus ancien. Un donjon de plan hexagonal à l'intérieur, circulaire à l'extérieur, le bâtiment actuel conserve une tour carrée du XIVe siècle Les autres bâtiments datent du XVIe siècle. La majorité des baies a été agrandie ou repercée au XVIIIe siècle. Le crénelage de la tour sud-ouest date du XIXe siècle. Du côté nord, le corps de logis dépourvu de toiture serait resté inachevé en 1573, à la suite de l'assassinat du propriétaire.","habitants":"Famille Bouchard de Vichy\"","divers":"Château  de Chaussins avant renovation, le château d'Abrest .","gps":"","images":["../../jctruffet.com/image/image_03/03_Abrest_1.jpg","../../jctruffet.com/image/image_03/03_Abrest_2.jpg","../../jctruffet.com/image/image_03/03_Abrest_3.jpg","../../jctruffet.com/image/image_03/03_Abrest_4.jpg","../../jctruffet.com/image/image_03/03_Abrest_5.jpg","../../jctruffet.com/image/image_03/03_Abrest_6.jpg"]},"Consult_chateau_formulaire01a7":{"id":"Consult_chateau_formulaire01a7","dept":"03","canton":"Souvigny","commune":"Agonges","nom":"Agonges","type":"Château","periode":"XV-XVI","histoire":"AGONGES, treize châteaux sur la commune d'Agonges;   Beaumont ( voir article), de l'Epine ( voir Article), Breuil,  Castel   de Praingy  du XIXe siècle, Monceau; le grand et le petit, de Laugère ( voir article),  Pommeraye, gentilhommière du XVIIIe siècle, des Echardons (Voir article), de la Tuilerie, des Sacrots (voir article). Logis de Vieux-Brosses du XVI-XVIIe siècle.                                      BREUIL, le Breuil et Beaumont connurent les mêmes propriétaires aux XVIIe et XVIIIe siècles. Le Breuil  était une ancienne paroisse, dont on connait les noms des curés. En 1300, aveu fut rendu par Perrien de Murat, damoiseau, qui y possédait  un hôtel et détenait la justice. En 1631 Jean Esmé de Fonglatié, écuyer, était sieur du Breuil. En 1649 c'était Claude de Troussebois qui détenait la  seigneurie.         TUILERIE, pas d'information historique.   PETIT-MONCEAU, c'était la maison de repos des religieuses de Saint-Menoux ainsi que le châtelet à Marigny. C'est en 1905 que fut bâti  le logis néogothique du grand Monceau. Les religieuses avaient confié l'exploitation du Monceau à des fermiers,  on connaît  Claude Couppery en 1682 et Jean Carron en 1700.             POMMERAIE, appartenait, en 1443, à Pierre de la Pomerie qui fait aveu au duc de Bourbon de son hostel de La Pomerie à Agonges, en la châtellenie de Bourbon. Le seigneur de Laugère, nouveau propriétaire de La Pommeraie, fait aveu par Loys de Laugère, écuyer, de \"sa maison de La Pommerie de Baudereu\", il fut autorisé à se fortifier en 1489.  Il fut remanié à la fin du XVIIe siècle puis en ce qui concerne sa façade sud, au XIXe siècle, qui est l'uvre de  l'architecte Moreau, commandée par la famille Moulins, alors propriétaire.","architecture":"Le Breuil est actuellement une maison bourgeoise, cet ancien logis sur motte, du XVIIIe siècle, fut remanié à la fin du XIXe siècle, long corps de logis de forme rectangulaire, flanqué au centre par un avant-corps en pavillon. Les deux niveaux et  comble sont largement éclairés par de nombreuses fenêtres et lucarnes. L'avant-corps du XIXe siècle est orné d'un fronton en arc de cercle à la fenêtre du premier étage et d'un fronton triangulaire à la fenêtre des combles.\r\nPommeraye,  sur les  restant d'un manoir du XVe siècle, présente dans un parc une gentilhommière du XVIIIe siècle munie de tours rondes, C'est aujourd'hui  une grande demeure à deux niveaux, le bâtiment central de forme rectangulaire est accosté  de deux pavillons carrés en retour d'équerre, et tour ronde à l'arrière.  \r\nEpine, y compris les douves deuxième moitié XVe siècle. vestiges du château, trois tours d'angle du XVIe siècle       Praingy est encore aujourd'hui désigné comme château mais la construction au XIXe siècle est plus une  gentilhommière, c'est-à-dire une maison de maître installée sur ses terres. Le lieu a cependant été le siège d'une   seigneurie puisque la Motte-Varenne était une motte féodale située au même endroit que le château de Praingy.                     Petit Monceau est une maison forte à tour carrée et logis du XVIe siècle, elle possède  deux tours rondes et une chapelle de style roman, du XVIIIe siècle.                          Tuilerie, ensemble de constructions basses, les bâtiments de La Tuilerie sont disposés en   L  autour d'une cour ouverte, des transformations récentes ont surélevés le logis principal d'un étage, alors que d'importants communs nécessaires  à l'exploitation rurale sont  plus anciens. Le château  a été achetée par un fermier au XVIIIe  siècle, mais certaines structures semblent antérieures à cette date.","habitants":"Famille de Pierre de la Pommeraye         Famille de Claude de Troussebois\"","divers":"Château du Breuil, du Vieux-Monceau, des Brosses, de la Jacquinerie, de Monceau et de la Pommeraye.","gps":"","images":["../../jctruffet.com/image/image_03/03_Agonges_1.jpg","../../jctruffet.com/image/image_03/03_Agonges_2.jpg","../../jctruffet.com/image/image_03/03_Agonges_3.jpg","../../jctruffet.com/image/image_03/03_Agonges_4.jpg","../../jctruffet.com/image/image_03/03_Agonges_5.jpg","../../jctruffet.com/image/image_03/03_Agonges_6.jpg","../../jctruffet.com/image/image_03/03_Agonges_7.jpg","../../jctruffet.com/image/image_03/03_Agonges_8.jpg"]},"Consult_chateau_formulairec08a":{"id":"Consult_chateau_formulairec08a","dept":"03","canton":"Moulins","commune":"Bressolles","nom":"Aigrepont","type":"Château","periode":"XVII","histoire":"AIGREPONT, appartenait, en 1442, à Jean de Pont, écuyer, et consistait en une motte et maison,  entourées de fossés. Ses enfants vendirent vers 1480 l'essentiel du fief   à Jean Daignet, conseiller et maître des comptes du duc de Bourbonnais. C'est en 1506 qu'apparut  pour la première fois le nom d'Aigrepont, qui appartenait alors à  Martin des Naulx, valet de chambre de la duchesse de Bourbon et greffier de l'élection de Clermont en Beauvais, qui avait épousé Anne, fille de Jean Daignet. Quand il mourut en 1519, ses enfants et leur tuteur, Nicolas Giraudeau  devaient encore plaider contre Jean de Pont, écuyer, à cause d'une vente litigieuse effectuée 40 ans auparavant.   Aigrepont fut achetée en 1587 par Gilbert Charbon, marchand moulinois, à Nicolas  Giraudeau  procureur  au présidial de Moulins, descendant du tuteur  des enfants Daignet. Mathieu Charbon  la revendit en  1631 à Jean Harel, conseiller du roi et fils d'un marchand moulinois lui-même prénommé Jean.   Jean Harel conseiller au présidial de Moulins et premier échevin. Gabriel Giraud, fils d'Elisabeth Harel, racheta les terres, ce docteur en théologie, chanoine de Notre-Dame de Moulins, jouissait d'une belle fortune. Vers 1680, il était official de Moulins pour le compte de l'évêque d'Autun.  Sa nièce et héritière avait épousé Jacques Vernin, lieutenant criminel et assesseur civil au présidial de Moulins, et maire de cette ville  de 1715 à 1717. Il acheta la charge de trésorier de France, fit bâtir une nouvelle chapelle en 1753. Ils avaient eu quatre enfants. Les deux filles, Marie Gervaise et Madeleine, qui habitaient Moulins, furent guillotinées à Paris le 12 décembre 1793.","architecture":"Aigrepont  édifice fortifié du   XIVe siècle,  vieille construction féodale située à l'entrée de la vallée, consistait en une motte et maison, entourées de fossés, sur le chemin de Vallières à Bressolles. Les ouvertures présentent une disposition particulière; une des parois est taillée perpendiculairement au mur, l'autre est oblique, la propriété construite dans le parc  par sa famille vers 1640, quEdith et sa famille vous accueillent dans leurs chambres dhôtes, elles  sont aménagées dans un bâtiment du XVIIe siècle.","habitants":"Famille de Jean de Pont             Famille de Gabriel Giraud\"","divers":"Le château d'Aigrepont, et le domaine d'Aigrepont chambres d'hôtes  de Mr. De Contenson","gps":"","images":["../../jctruffet.com/image/image_03/03_Aigrepont_1.jpg","../../jctruffet.com/image/image_03/03_Aigrepont_2.jpg","../../jctruffet.com/image/image_03/03_Aigrepont_3.jpg"]},"Consult_chateau_formulaire0c3d":{"id":"Consult_chateau_formulaire0c3d","dept":"03","canton":"Cerilly","commune":"Ainay-le-Château","nom":"Ainay_le_Chateau","type":"Château","periode":"XIII-XIX","histoire":"Ainay le château; Vieux-Ainay, ville fortifiée avec tour, six châteaux dans cette commune, des Barres du XIII-XIXe siècle, tour pentagonale, des Brosses du XIII-XIXe siècle tour, de Chandon,  de Pontcharrault (voir article), de Vougon XV-XVIIe siècle tour.             BARRES,  au XIIIe siècle la seigneurie était aux mains d'une famille éponyme et, en 1216, Pierre des Barres   possédait  des droits sur Cérilly. En 1220, Pierre des Barres  reconnait tenir en fief de son parent Archambault   de Bourbon  la place forte du Breuil, qu'il vient de bâtir près d'Ainay et  qu'il promet de lui livrer.  \r\nBROSSES, en 1266, Gauthier d'Argen, damoiseau, agissant en son nom et en celui de son épouse Jeanne, veuve  d'Odin de Troussebois, rendit hommage au sire de Bourbon pour l'hôtel et terre seigneuriale de Broces qu'il   tenait en la châtellenie d'Ainay, l'écuyer Pierre de Grassay se constitue,  par achats successifs, un fief important autour des Brosses, il acquiert, en 1482,   de plusieurs copropriétaires portant le nom des Brousses, \"la part qu'ils ont en l'hostel de feu Berthomier  des Brousses. La même année, il achète à Jehan Guiart,  bourgeois de Cérilly, du Coing du Roy, l'ostel et manoir des Brosses, qui fut à Durand des Brosses, enclos et fermé de murailles avec le courtillage et  son hostel.\r\nVOUGON, elle a appartenu à Gilbert Bonnet, seigneur de Vougan, président du grenier à sel de Saint-Amand. En 1503 Jacques de Saint-Aulbin écuyer, en fait aveu à la duchesse  de Bourbon.","architecture":"Ainay le château,  près du château moderne des Barres, se dressent les ruines d'une fortification qui a sans doute succédé à un ancien château sur motte. Sont encore visibles des encadrements de portes et de fenêtres moulurés et  une  tour pentagonale dans la cour, un large fossé en eau protégeait  l'édifice. On accède encore à la motte par un   vieux pont. Survivance de l'ancien château ou maison forte indépendante, ce corps de logis, de plan rectangulaire à deux  niveaux, est flanqué en façade d'une haute tour circulaire à terrasse, plus ancienne dernière porte sur les quatre subsistant de la vieille place forte et du château d'Ainay. Les portes étaient situées sur des fossés bordant l'enceinte fortifiée. Elles avaient ponts-levis et herses, et étaient chacune flanquées de tours pour en défendre les abords. Les deux tours de la porte de l'Horloge ont été rehaussées et couvertes d'un toit au centre duquel s'élève un campanile. Elle conserve des traces de herse et de meurtrières, vestiges du XVe siècle. A une époque, l'une des deux tours servait de prison.   Brosses est d'époque récente, avec une tour ronde sur la cour intérieure et  une tour d'angle écrêtée à la fin du XVe siècle.                                   Vougon  du XVe et remanié au XVIIe siècles,  est une ancienne maison forte qui a conservé son corps de bâtiment rectangulaire avec toit à la Mansart et une tour ronde d'angle du XVIIe siècle.","habitants":"Famille de Pierre des Barres        Famille de Durand des Brosses             Famille de Pierre de la Roche\"","divers":"Porte d'enceinte, château d'Ainay, de Vougon et de la Brosses.","gps":"","images":["../../jctruffet.com/image/image_03/03_Ainay_le_Chateau_1.jpg","../../jctruffet.com/image/image_03/03_Ainay_le_Chateau_2.jpg","../../jctruffet.com/image/image_03/03_Ainay_le_Chateau_3.jpg","../../jctruffet.com/image/image_03/03_Ainay_le_Chateau_4.jpg","../../jctruffet.com/image/image_03/03_Ainay_le_Chateau_5.jpg","../../jctruffet.com/image/image_03/03_Ainay_le_Chateau_6.jpg"]},"Consult_chateau_formulaire0cd7":{"id":"Consult_chateau_formulaire0cd7","dept":"03","canton":"Lapalisse","commune":"Andelaroche","nom":"Andelaroche","type":"Château","periode":"XV-XIX","histoire":"Deux châteaux à Andelaroche; Gléné du XVe siècle avec tours rondes et le château de Gajun du XIXe siècle.               GLENE, dès 1343,la seigneurie appartenait à une famille de Villars, que l'on   retrouve encore au XVIe siècle en possession du fief. Au XIVe siècle, Tachon de  Gléné figurait parmi les compagnons du duc  Louis II de Bourbon. En 1490, François de Gléné, écuyer, seigneur , avait épousé Charlotte de Mortillon. Ce sont ses descendants qui vendirent la seigneurie de Gléné à Antoine de Lévis Châteaumorand archevêque d'Embrun. Gléné fut vendue en 1525 à Antoine de Chabannes, évêque du Puy et frère du Maréchal.  En 1531, l'évêque donna la terre à son neveu par alliance, Pierre de Martinières seigneur d'Isserpent. En 1548  Pierre de Martinières  la vendit à un cousin, Charles de Chabannes  que ses descendants conservèrent jusqu'à   la fin du XVIe siècle. Après plusieurs changements de propriétaires le nouveau seigneur de Gléné, Melchior de Servajan, écuyer, vendit la terre à l'écuyer Toussaint de Chantelot. Le 12 février 1630, Toussaint de Chantelot obtint le titre de sa terre de Gléné en vicomté, qu'il augmenta en 1637 du domaine de Cossonnier. Au XVIIe siècle, Gléné revint à la famille de Villars avant d'être une nouvelle  fois revendue aux Nepveu, seigneurs de la Tour Pourçain. Après avoir appartenu aux Morigny, Gléné échut à Jaques Amable Rollet d'Avaux, premier président  du présidial de Riom. Le couple de châtelains  fut arrêté à  la Révolution, jugé et guillotiné le 15 mai 1794. Gléné fut alors confisquée et vendue comme bien national. Les  Maridet s'en rendirent acquéreurs et l'a conservèrent jusqu'à la fin du XIXe siècle.  Peu avant la Grande Guerre, Gléné fut vendue au comte Jaquelot de Potier,  le château appartient quant à lui au chercheur suisse Andreas Muller.               GAJUN, pas d'informations historiques.","architecture":"Gléné,   la maison forte est une construction du XVe siècle. Elle a remplacé une fortification plus  ancienne.  Constituée d'un beau corps de logis à trois niveaux, de plan rectangulaire, elle est flanquée d'une grosse tour   ronde, couverte d'un toit conique. Avec ses deux grosses tours du XIVe siècle, malgré des retouches, Gléné est assurément un des plus jolis spécimens des gracieuses constructions qui remplacèrent les vieux nid féodaux. Les remaniements du   XVIIIe firent disparaître les anciennes ouvertures, pour les remplacer  par de larges baies. Le château de Gléné  s'agrémente d'une tourelle, d'une salle basse élégante et au sommet de la tour sud, d'une salle de guet.                                     Gajun est une construction surprenante qui mêle le style néo-gothique en façade avant et le style néo-renaissance en façade arrière. La demeure s'est voulue romantique, elle est l'oeuvre de l'architecte Henri Bietrix   à la fin du XIXe siècle. Les bâtiments sont en général bas, à un étage et disposés en équerre, à l'intérieur d'un   beau parc avec un petit lac et bois. Les pignons aux toits effilés qui s'intercalent dans la façade, les nombreuses  fines tourelles et élancées qui dominent, ainsi qu'un portique crénelé composent un décor de théâtre à la   romantique des châteaux allemands qu'admirait l'architecte, réalisateur du projet.","habitants":"Famille de Villars                        Mr Andreas Muller\"","divers":"Château de Gajun et de Gléné","gps":"","images":["../../jctruffet.com/image/image_03/03_Andelaroche_1.jpg","../../jctruffet.com/image/image_03/03_Andelaroche_2.jpg","../../jctruffet.com/image/image_03/03_Andelaroche_3.jpg","../../jctruffet.com/image/image_03/03_Andelaroche_4.jpg"]},"Consult_chateau_formulaire3a03":{"id":"Consult_chateau_formulaire3a03","dept":"03","canton":"Huriel","commune":"Archignat","nom":"Archignat","type":"Château","periode":"XV","histoire":"Trois châteaux à Archignat; du XVe siècle, à Melleret ruines d'enceintes et  château de  Longbost.                    LONGBOST est connu dès 1354, lorsque Louis de Brosse fait aveu de sa terre d'Huriel au duc de Bourbon,  pour  son vassal Philippe de Lombost, qui détient en arrière fief sa seigneurie de Lombost. En 1503, Jehan de Longboz, écuyer, reconnait par son procureur  François de la Croix, curé de Tronger, tenir en fief du seigneur de Ponthièvre, de sa châtellenie d'Huriel. Le fief confortable assure  son seigneur, la même année, damoiselle Marguerite de Lombost tient elle aussi en fief du seigneur de Penthièvre.   La maison forte de Lombost  est en 1663, le fief de Gilbert de la Gastine écuyer, qui donne 300 livres de rente au  au curé d'Archignat, pour fonder une messe par semaine. Mais dès la fin du XVIIe siècle Longbost appartient  avec la terre de Frontenat et autres fiefs,  à la famille des Jehannot de Bartillat.","architecture":"La maison forte  de Longbost était construite à l'emplacement de la ferme actuelle. Elle a été démolie il y a un siècle environ. Aujourd'hui un manoir bâti au XIXe siècle garde encore l'appellation de château. Le corps de logis, flanqué d'une tour hexagonale, est installé dans le grand parc boisé. A proximité, un pigeonnier avec harpages de briques marquait le privilège seigneurial.","habitants":"Famille des Jehannot de Bartillat\"","divers":"Château d'Archignat et de Longbost","gps":"","images":["../../jctruffet.com/image/image_03/03_Archignat_1.jpg","../../jctruffet.com/image/image_03/03_Archignat_2.jpg"]},"Consult_chateau_formulaire0405":{"id":"Consult_chateau_formulaire0405","dept":"03","canton":"Ebreuil","commune":"Vicq","nom":"Arcon","type":"Château","periode":"XV","histoire":"ARCON  au XIVe siècle, fief de  Gilles ou Gilbert de Montchaurit, alias d'Arçon,damoiseau, marié à Marguerite Quotin de Charroux. En 1449, les descendants  ne portèrent plus leur nom mais celui de leur terre. Deux frères, Guillaume et Berthon d'Arson, le  tenaient en fief. En 1503, Jean d'Arson, écuyer, serviteur du Louis XI, qui vivait encore en 1504, avait bénéficié des largesses du Roi, ce qui lui permit de se parer  du titre de chevalier et  d'agrandir ses terres d'Arçon. N'ayant  que des filles comme héritières, la terre passa, par alliance, dans la famille de Laudan qui porta le nom d'Arson de Laudan et conserva Arçon jusqu'au XVIIe siècle, puisque François d'Arson de Laudan ne laissant que des filles lui aussi, sa terre fut portée à Gabriel de Marcelanges, par son mariage. Celui ci donna une nouvelle lignée de seigneurs d'Arçon qui ne  fut interrompue qu'à la Révolution avec la confiscation des biens des Marcelanges et leur dispersion. Vendu à plusieurs reprises, en 1868 aux Tardif qui firent remettre le château en état, en 1910 à monsieur Echégut huissier à Ebreuil puis en 1920 au comte de Maigret, Arçon est aujourd'hui la propriété de mademoiselle Boudet.","architecture":"Arçon château primitif a subi d'importantes transformations. Le bâtiment principal à trois niveaux et niveau de  comble est flanqué aux angles sud de deux tours rondes couvertes de toits coniques. Du côté cour une tour hexagonale  prise en oeuvre au milieu de la façade abrite un escalier à vis. Elle a été construite sur les fossés au XVe siècle, à  l'emplacement de l'ancien pont levis. L'angle du bâtiment, en retour d'équerre sur le mur ouest, est marqué par  l'adjonction d'une petite tour carrée, couverte d'un toit à quatre pans. Au XVIe siècle la façade sud s'est éclairée de deux belles fenêtres à meneaux et à l'intérieur, d'une cheminée monumentale. A la fin du XVIIe siècle, la maison  et seigneurie noble d'Arson, consistait en deux corps de logis, tous bâtis de pierre,  Le corps de logis a été complètement transformé à la fin du XIXe siècle, par son nouveau  propriétaire Gabriel Alexandre Tardif. Un étage a été ajouté au corps principal, de nouvelles ouvertures éclairent les  façades et les toitures refaites sont recouvertes d'ardoises.","habitants":"Famille de Berthon d'Arson           Mademoiselle Boudet\"","divers":"Château d'Arçon","gps":"","images":["../../jctruffet.com/image/image_03/03_Arcon_1.jpg","../../jctruffet.com/image/image_03/03_Arcon_2.jpg","../../jctruffet.com/image/image_03/03_Arcon_3.jpg"]},"Consult_chateau_formulaire481a":{"id":"Consult_chateau_formulaire481a","dept":"03","canton":"Souvigny","commune":"Autry-Issards","nom":"Ardennes_Boucheron","type":"Château","periode":"XVII","histoire":"ARDENNES, le seigneur  en 1559, Jacques de Montassiégé, . En 1557, Geoffroy Aubery, maire de Moulins, achète la seigneurie d'Ardennes. en lien avec Godefroy de Bouillon,  jeu de mot sur Ardennes. Son fils Hugues Aubery, grainetier du grenier à sel de Moulins en 1578 devient et  donne naissance à la branche d'Ardennes. Il est représenté enfant sur le Vitrail des Croisades vers  1550 à la cathédrale de Moulins, et âgé, accompagné de sa femme Anne Rouher, de ses deux fils et de ses trois filles. L'actuel logis a été bâti  d'une pièce en 1623 (la date gravée au dessus de la porte d'entrée). En 1690 Jacques de Dreuille, seigneur d'Issards, possède  Ardennes Mais G. Aubery les racheta en ses lieux et place,  avant d'acquérir, en janvier 1557, la maison d'Ardaine. Selon les registres paroissiaux, en 1597 existait une \"confrérie de Monsieur Saint-Hubert, d'Ardaine\". Les Aubery    possédèrent cette terre, en 1646, Hugue Aubery était sieur d'Ardennes. Puis ce bien fut transmis par Marie  Aubery à son mari Jacques de Dreuille, écuyer, seigneur d'Issards, possède  Ardennes. En 1682 il a réuni Issard et Ardennes. Cette deuxième propriété fut affermée aux frères Bernard en novembre 1690. Des Chérion furent également fermiers d'Ardennes en 1770,et au Plessis en 1782  BOUCHERON, la seigneurie de Boucheron dépendait de la châtellenie de Souvigny. Le manoir est situé sur une colline dominant la vallée de l'Ours. Au début du XVIIIe siècle, le Boucheron appartenait à François-Antoine-Gilbert Aubery, écuyer, seigneur du Plessis. Il était le fils de Rémi Aubery, procureur du Roi et lui succéda dans ses fonctions.","architecture":"Ardennes, la maison, en rez-de-chaussée surélevé, comporte une cave, le toit à deux croupes est orné de trois lucarnes d'origine, le logis est composé de deux pièces au rez-de-chaussée, une belle chambre à gauche et la cuisine-salle commune à droite. Au centre, couloir transversal avec escalier de pierre menant à l'étage. La porte d'entrée à ouverture en plein cintre et encadrement de pierre de taille est surmontée d'un oculus. A l'arrière de la maison, l'ancienne porte, cloutée et ornée de ferrures anciennes, a été conservée. Une barre transversale de bois située à l'intérieur renforce le dispositif de fermeture. Plafonds à la française. Cheminées datant de 1623 à hotte droite qualifiée en 1690 de maison, terre et seigneurie d'Ardaine, est un logis datant du début  du XVIIe siècle. En 1722, la maison seigneuriale  est composée d'un grand logis, nommé pavillon, d'une grange, d'une étable. Les bâtiments du domaine de la seigneurie consistent en une maison.   La seigneurie possède une garenne, un bois de haute futaie, un taillis et un étang.                                   Boucheron  remonte au  XVe siècle se compose d'un corps de bâtiment rectangulaire allongé d'ouest en est, couvert d'un toit à longs pans et cantonné deux tours circulaires à toits coniques. Escalier intérieur dans l'angle nord-est. Toiture en tuile plate. Le long du logis, à l'est, un conduit dallé draine la cour. La cour, fermée, est entourée par les bâtiments d'habitation et les bâtiments agricoles. A l'ouest, le jardin est clos de murs.  La partie nord du corps de logis à été surélevée et repercée de larges baies vers l'ouest. En 1832 présence d'une grosse tour ronde au centre de la cour, sans doute un pigeonnier aujourd'hui arasé.","habitants":"Famille de Jacques de Dreuille           Famille de François-Antoine-Gilbert Aubery\"","divers":"Château d'Ardennes et de Boucheron","gps":"","images":["../../jctruffet.com/image/image_03/03_Ardennes_Boucheron_1.jpg","../../jctruffet.com/image/image_03/03_Ardennes_Boucheron_2.jpg","../../jctruffet.com/image/image_03/03_Ardennes_Boucheron_3.jpg","../../jctruffet.com/image/image_03/03_Ardennes_Boucheron_4.jpg","../../jctruffet.com/image/image_03/03_Ardennes_Boucheron_5.jpg"]},"Consult_chateau_formulaire6a3a":{"id":"Consult_chateau_formulaire6a3a","dept":"03","canton":"Domerat","commune":"Vaux","nom":"Argentieres","type":"Château","periode":"XIX","histoire":"ARGENTIERES, au XVIIe siècle, elle  était  la propriété de Gilbert Alamargot.","architecture":"Près de l'ancienne église d'Argentières, dans la vallée de la Meuzelle, une plateforme quadrangulaire   entourée de fossés en eaux était, au siècle dernier, l'assise de l'ancienne maison forte  de ce lieu. Elle a disparu à la suite d'un tracé routier, mais on remarque encore son emplacement dans la prairie. Le nouveau Château, sur la colline, est une construction néo-gothique du  XIXe siècle, en briques  rouges, avec des fenêtres à meneaux et  une grosse tour ronde à lanternon. La chapelle est éclairée par une baie gothique.","habitants":"Famille de Gilbert Alamargot\"","divers":"Château de l'Argentières à Vaux","gps":"","images":["../../jctruffet.com/image/image_03/03_Argentieres_1.jpg","../../jctruffet.com/image/image_03/03_Argentieres_2.jpg","../../jctruffet.com/image/image_03/03_Argentieres_3.jpg"]},"Consult_chateau_formulaire37ac":{"id":"Consult_chateau_formulaire37ac","dept":"03","canton":"Moulins","commune":"Aubigny","nom":"Aubigny","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux à Aubigny des Roches du XVII-XIXe siècle et du Réray  du XVIIIe siècle.                                  RERAY, vers 1260, Jean Breschard, dit de Bressolles, fils de Raoul, auquel il est fait allusion  dans la charte de franchises de Moulins, chevalier, était seigneur du Réray et avait épousé  l'héritière du château de Toury, Catherine. En 1374, Goussaut, dit de Toury et seigneur du Réray, fut  un des 4 premiers membres de la nouvelle chambre ducale des Comptes. Il avait occupé la charge de maître des  Eaux et Forêts du Bourbonais, pour le compte du duc Jean 1er.   A la suite d'une succession difficile,   leurs parents ayant tenté de déshériter partiellement l'un des deux frères, Jean, seigneur de Bressolles,  céda en 1493 la seigneurie du Réray  à son frère Gilbert. En effet, en 1503, l'écuyer Gilbert Bressolles, seul   seigneur du Réray,  Après avoir appartenu aux Saconnyn, la seigneurie du Réray  fut possédée, de 1630 à 1686 par les Culant,   de la branche Langère-Saint-Marc d'Agonges. Au cours du XVIIe siècle, les Farjonel l'intégrèrent dans leur seigneurie d'Aubigny. Ce fut la seconde  fille de Jean Baptiste Farjonel, Louise qui la porta par mariage à la famille de Neuchèze, avant qu'elle n'appartienne, à partir de 1776, aux Bonnay, puis  aux Chavagnac qui la vendit en 1887 au baron d'Aubigny. Ce dernier en fit don  au diocèse de Moulins. En 1894, Mgr Dubourg,   évêque de Moulins installa le petit séminaire dans les bâtiments neufs. À la confiscation des biens du clergé  en 1907, Le Réray devint  propriété d'une société civile. Les religieux bénédictins de Saint-Wandrille y trouvèrent refuge pendant la guerre de 1914-1918.  \r\nROCHES,  le premier seigneur connu et son bâtisseur fut Jean Prévost, dont  le père avait été maire de Moulins. La seigneurie resta dans cette famille jusqu'en 1678, où Anne Prévost épousa Thomas Jolly seigneur de Chamardon, gentilhomme ordinaire  de monsieur, duc d'Orléans. Leur fils Claude Joseph en hérita et en décembre 1789, sa fille Marie Gilberte, veuve de Jacques Champfeu, vendit la terre à Charles-Eloy Tiersonnier,  ancien avocat au Parlement, qui fut maire d'Aubigny  sous le Premier Empire.","architecture":"Réray, doté d'une chapelle néo gothique daté de 1884. Le pigeonnier rond et les communs, plus anciens, sont du XVIIe siècle. Le manoir antérieur fut détruit en 1883.\r\n les Roches est une gentilhommière du XVIIe siècle, flanquée de communs de chaque côté de la cour  et  pourvue d'une grange à pans de bois. Le corps de logis est un long bâtiment à un seul niveau de comble,  flanqué  sur un pignon d'un pavillon rectangulaire plus récent, aligné en façade; de l'autre côte, une petite  construction est installée en retour d'équerre.","habitants":"Famille de Neuchèze                 Famille de Jean Prévost\"","divers":"Château de Reray et de la Roches à Aubigny","gps":"","images":["../../jctruffet.com/image/image_03/03_Aubigny_1.jpg","../../jctruffet.com/image/image_03/03_Aubigny_2.jpg","../../jctruffet.com/image/image_03/03_Aubigny_3.jpg","../../jctruffet.com/image/image_03/03_Aubigny_4.jpg","../../jctruffet.com/image/image_03/03_Aubigny_5.jpg","../../jctruffet.com/image/image_03/03_Aubigny_6.jpg"]},"Consult_chateau_formulaire60a0":{"id":"Consult_chateau_formulaire60a0","dept":"03","canton":"Herisson","commune":"Audes","nom":"Audes","type":"Château","periode":"XV-XIX","histoire":"Deux châteaux à Audes, Crêtes du XV-XIXe siècle  et le château de Preuille du XIXe siècle.                                   CRETE, le personnage le plus connu parmi les propriétaires du château est François de Beaucaire de Péguillon, évêque de Metz (1555-1568), qui y est né le 15 avril 1514 et qui y est mort le 14 février 1591. En 1490, Georgette de Culan devenue veuve vend les terres de la Creste  et Saint Désiré  à Jean de Blanchefort. En 1554,  Marie de Créqui épouse de Gilbert de Blanchefort  vend les terres de la Creste  à Jean de Beaucaire. Celui ci  revendit les terres à son frère François en 1558. François Evêque de Metz, fait parti des personnes illustres qui sont  nés où ont vécus à la Creste. Il décède en 1591, en léguant ses terres à sa nièce Marie de Beaucaire. A sa mort les  biens sont vendues comme biens communaux. En 1820 par succession d'Antoine Lepescheux à sa fille, les terres entrent,   pour ce qui en reste après la vente en biens communaux pour certaines  le creusement du canal du Berry, dans la   famille de  Jean-Baptiste Aufrère de Lapreugne,  son mari. En 1836,  date de son décès,  son fils Léonce hérite des  terres et du château de La Creste. En 1871, par donation et partage Léonce de Lapreugne et son épouse lèguent le domaine à leur fille Blanche qui a   épousé Hildebert de la Celle. Hildebert de la Celle lèguent le château de la Creste et une partie des terres à leur fils  Leonce, une autre partie des terres est léguées à leurs petites filles,  leurs héritiers les possèdent encore en partie  à ce jour. Léonce de la Celle lègue château et terres à son fils Anet. L'ensemble est vendu le 8 juillet 1960.","architecture":"Crêtes du XVe siècle, on pense que la construction de la première forteresse se situe en 1275 . Elle est édifiée au fond d'un profond  ravin et dans une boucle du ruisseau de la Forêt, sur un escarpement rocheux. Une autre enceinte protégeait la basse cour située au dessus du plateau. Ces murailles  étaient défendues par des bastions (il en reste des vestiges). Un pont doublé d'un pont levis permettait l'accès à la  forteresse, l'édifice était constitué de deux corps de logis en L, flanqués de tours rondes ou carrées et disposés, selon la typologie des châteaux-cours, autour d'une cour fermée par une courtine. L'ancien château, aujourd'hui en ruine, a été habité jusqu'à la Révolution.  Dans la basse cour de la vielle forteresse, on construit entre 1895 et 1905 un nouvel édifice de style Renaissance. Il   comprend des bâtiments encadrant une cour centrale, avec un porche d'où saillent tours,  tourelles et pigeonnier de    style néogothique avec fenêtres à meneaux. Dans cette cour on aperçoit une chapelle dont la structure, le clocher, les ouvertures datent de l'origine de la construction au XIVe.\r\nPreuille  il existe deux châteaux à Preuille, néo-renaissance . L'un est une maison bourgeoise  du XIXe siècle, l'autre une résidence ruinée du milieu de ce même siècle, dont restent deux tours d'angle et une autre en façade.  Le château construit au XIXe siècle dans le style néo-renaissance, est    un corps de logis rectangulaire à deux niveaux. Le rez-de-chaussée surélevé repose sur des pièces basses.    Son accès se fait par un escalier à rampe de pierre. Un niveau de comble peut être utilisé grâce à des lucarnes  à linteaux en ogive et colombetes. Deux tourelles à toits coniques élancés  flanquent les angles de la façade,   alors qu'un avant-corps à fenêtres géminées, arc en accolade et pinacles met en valeur escalier et entrée.","habitants":"Famille d'Antoine Lepescheux\"","divers":"Vestiges du château féodal  de Crête, et nouveau château de Crête,  de Preuille et de Beaufranchet.","gps":"","images":["../../jctruffet.com/image/image_03/03_Audes_1.jpg","../../jctruffet.com/image/image_03/03_Audes_2.jpg","../../jctruffet.com/image/image_03/03_Audes_3.jpg","../../jctruffet.com/image/image_03/03_Audes_4.jpg","../../jctruffet.com/image/image_03/03_Audes_5.jpg","../../jctruffet.com/image/image_03/03_Audes_6.jpg","../../jctruffet.com/image/image_03/03_Audes_7.jpg","../../jctruffet.com/image/image_03/03_Audes_8.jpg","../../jctruffet.com/image/image_03/03_Audes_9.jpg"]},"Consult_chateau_formulairea2cc":{"id":"Consult_chateau_formulairea2cc","dept":"03","canton":"Souvigny","commune":"Agonges","nom":"Augere_Echardons","type":"Château","periode":"XV","histoire":"L'AUGERE, St-Marc, les anglais, pendant la guerre de 100 ans, auraient détruit le château qui  aurait été reconstruit en 1441 à la place actuelle par François de Culan, ancêtre  de la famille de Laforcade, le château aurait toujours été dans la famille, mais transmis souvent par  les femmes et a, de ce fait, souvent changé de nom de propriétaire.. Dès 1301, à en croire les noms  féodaux, un certain Jean de lAugère  rendait hommage pour sa  maison , en la châtellenie de Belleperche.   Cest une branche cadette de cette famille, à en croire Tiersonnier et des Gozis,  qui se serait fixée à Agonges, en adoptant pour sa nouvelle installation, le même nom de Laugères. Le château de lAugère fut construit vers la fin de la guerre  de 100 ans sous Charles VIII, petit roi de Bourges, gentil  dauphin dont le royaume se situe au sud de la Loire. Au nord  et à louest dominent les gens de lAngleterre qui ravagent les  provinces et qui, en 1429 assiègent la ville dOrléans (seule  ville au nord de la Loire tenue par Charles VII.  En 1503, l'écuyer Guillemin de Laugère fait hommage à la duchesse de Bourbon. En mars 1647, le sieur de Laugère était François de Culant avocat au parlement.  La terre était  vers 1750 dans les mains de Pierre Gaspard Hugon, qui avait épousé  Elisabeth Geneviève Guillouet  d'Orvilliers. Encore à  notre époque : de Montbel, de Vélard de Châteauvieux, de Gaudart dAllaines, de  Laforcade, et aujourdhui, Madame Agnès de Chatelperron née de Laforcade descent de la famille de Jeanne  dArc par Jehann son frère, écuyer et seigneur de Vaucouleurs dont la fille  Madame Crespire de Vaucouleurs épousa le 16 octobre 1558 le chevalier  Espérant de Godart, seigneur de Marteau de Montereau de Maurepart dAllaines,  ancêtre de la famille de Laforcade. aujourd'hui  propriété de monsieur Yves Challas.                ECHARDONS  Dans la nomenclature des lieux-dits, Les Echardons sont portés sur la commune de Souvigny, proche mais  non limitrophe. La  maison a appartenu à la famille Saulnier de Praingy et a été entièrement  transformée au XVIIIe siècle. Le 2 septembre 1784, Claude Parfait Amyot, écuyer ancien officier d'artillerie,  décédait à l'age de 84 ans dans sa maison des Echardons.","architecture":"L'Augère date de 1441. était pourvu d'un donjon carré, donjon médiéval coiffé d'un toit et agrandi d'un bâtiment néogothique au XIXe siècle a conservé ses douves en eau, d'une tourelle en façade et de douves en eau. L'enceinte était   conçue pour abriter les nouvelles armes à feu: canons ou couleuvrines. Doté au cours du XIXe siècle de toitures dues à l'architecte Jean Moreau, le donjon médiéval de Laugèrea été agrandi à la fin du siècle par l'adjonction d'un corps de bâtiment construit dans le style néo-gothique par  René Moreau et terminé en 1901. Les communs furent construits  juste avant 1914  par l'entrepreneur Charles Joseph de Souvigny. L'ensemble présente une silhouette équilibrée  et assez homogène, au milieu de douves en eau.                                       Echardons,  a été reconstruit en 1792 et il ne reste des bâtiments antérieurs que deux tours et un pigeonnier,  édifice reconstruit à l'époque moderne,  le château  dispose des bâtiments sur les trois côtés d'une cour intérieure, l'entrée sur   le quatrième côté  est marquée par un portail à piliers carrés, coiffés de pyramides tronquées et  boules de pierre,  le bâtiment  central à un niveau et  comble, éclairé par des lucarnes, est accosté par une petite tour ronde, précédé d'une cour entourée sur trois côtés de bâtiments de communs. Au sud-ouest de cet ensemble, présence d'une tour qui a été coiffée au XVIIIe siècle d'un dôme à lanternon, accolée au pignon nord d'un bâtiment en rez-de-chaussée couvert d'un toit mansardé. Subsistent également une seconde tour ancienne, ainsi qu'un pigeonnier. Ces bâtiments représentent un bon exemple de l'architecture rurale du XVIIIe siècle.","habitants":"Famille de Laforcade\r\n        \"","divers":"Château de la l'Augère et d'Echardons.","gps":"","images":["../../jctruffet.com/image/image_03/03_Augere_Echardons_1.jpg","../../jctruffet.com/image/image_03/03_Augere_Echardons_2.jpg","../../jctruffet.com/image/image_03/03_Augere_Echardons_3.jpg","../../jctruffet.com/image/image_03/03_Augere_Echardons_4.jpg","../../jctruffet.com/image/image_03/03_Augere_Echardons_5.jpg","../../jctruffet.com/image/image_03/03_Augere_Echardons_6.jpg","../../jctruffet.com/image/image_03/03_Augere_Echardons_7.jpg"]},"Consult_chateau_formulaireab80":{"id":"Consult_chateau_formulaireab80","dept":"03","canton":"Yzeure","commune":"Aurouer","nom":"Aurouer","type":"Château","periode":"XIV-XV","histoire":"AUROUER, du château fort d'Arizol, élevé à la fin du XIVe siècle par Lorin de Pierrepont. Laurent ou Lorin de Pierrepont vint du Beauvaisis comme page du duc Louis II. Il devint  trésorier général du Bourbonnais,  secrétaire du duc et en 1374  fut un des 4 premiers membres  de la chambre des comptes de Bourbonnais,  nouvellement créée avec Goussaut de Thoury et les doyens des chapitres collégiaux de Hérisson et de  Montluçon. Il fit construire le château d'Arizolles  auquel furent rattachés  tous les droits seigneuriaux de la motte d'Arizolles qu'il avait achetée. Lorin de Pierrepont  épousa l'héritière  d'une famille de bourgeois moulinois, Jacquette Bertine, qui en 1393, alors  qu'elle était veuve,  se vit confirmer  sa noblesse par le Roi ainsi que celle de ses enfants et leur  postérité. La motte d'Arizolles ou d'Aurouer, qu'il ne faut pas confondre avec le château d'Arizolles, figurait en  1269, parmi les possessions des seigneurs  de  Toury-sur-Allier.  Le dernier seigneur du lieu, Andrault de Langeron, émigre en Russie à la Révolution, devient gouverneur d'Odessa.                              Deux autres châteaux à Aurouer; Dammariens et de la Motte-Ponay dont je n'ai pas d'informations historiques.","architecture":"Du château fort d'Arizol, élevé à la fin du XIVe siècle par Lorin de Pierrepont sur une motte dont les fossés sont encore en eau, ne subsiste plus qu'une tour d'angle  ainsi qu'une seconde lui faisant écho. le château est alors détruit par  la municipalité met en vente ses moellons et divers matériaux. Il ne reste plus de cette seigneurie que des traces de fossés. Un logis bourbonais y fut bâti en 1777.","habitants":"Famille de Lorin de Pierrepont\"","divers":"Château de Dammariens et de la Motte-Ponay","gps":"","images":["../../jctruffet.com/image/image_03/03_Aurouer_1.jpg","../../jctruffet.com/image/image_03/03_Aurouer_2.jpg","../../jctruffet.com/image/image_03/03_Aurouer_3.jpg"]},"Consult_chateau_formulaire26de":{"id":"Consult_chateau_formulaire26de","dept":"03","canton":"Souvigny","commune":"Autry-Issards","nom":"Autry_Issards","type":"Château","periode":"XVI","histoire":"Autry-Issards, plusieurs châteaux; dont celui d'Ardennes (voir article), de Boucheron du XV-XXe siècle avec deux tours circulaires (voir article),  du Plessis (voir article), de  Rimazoir (Voir Article), de la Trolière du XVe siècle enceintes colombier vestiges (voir article) et de Bigut du XVIIIe siècle (voir article).                         ISSARDS, vers 1280, Jean de Dreuille, damoiseau, seigneur de Dreuille et d'Issards épouse Brune de Bayet. Depuis cette date, les Dreuille sont seigneurs d'Issards durant tout le Moyen-Age. Parallèlement, le fief a d'autres seigneurs: en 1346, Jean de Verri, puis vers 1370 sa petite fille, Jeanne de la Laye, qui porte en mariage une partie de la terre et maison forte d'Issards à Jean de Murat. En 1458, Pierre de Murat, époux de Marguerite de Chari, est seigneur d'Issards.  les Dreuille et les Murat construisent  deux logements distincts. Jean de Dreuille pourrait être le commanditaire du logis neuf dont il ne reste que l'escalier d'honneur et la tour. En 1586, le mariage de Jacques de Dreuille et Marguerite de Murat reconstitue la seigneurie dans son entier. Jean de Murat aurait quant à lui fait moderniser l'ancien corps de bâtiment. Le logis raffiné d'époque Louis XI semble construit d'un seul jet, alors que l'autre mêle des constructions d'âges différents. Le soleil de Louis XIV et la devise dans l'escalier témoignent du passage de Mme de Montespan et du roi.  En 1862, Louis Gabriel Carré d'Aligny épouse Marie Geneviève de Gaulmyn, qui lui apporte Issards en dot. Entre 1862 et 1870, ils font reconstruire le château par l'architecte Jean Moreau, à l'exception de la tour noble et de l'escalier d'honneur. La guerre de 1870 interrompt le chantier. En 1924, le comte d'Aligny demande à l'architecte Mitton d'achever le perron d'entrée.","architecture":"château  des Issards du XVe siècle, était composé d'une tour ronde médiévale desservie par une tourelle d'escalier gothique du XVe siècle, complété aux XVIIe siècle par un logis et une chapelle. En 1862, Jean Moreau y exécuta d'importants travaux d'agrandissement. Les bâtiments de cette période furent abattus et remplacés par un logis rectangulaire et une poterie, l'ensemble entouré de douves.  Construit en pierre de taille, le château est couvert d'ardoise.  Du XVe siècle ne subsistent que la tour noble et l'escalier d'honneur accolé. La base de la tour est renflée sous un talus et percée de trois canonnières. A l'intérieur, trois étages superposés ont chacun une salle, un cabinet et un judas surveillant l'escalier. Les fenêtres de ce corps de bâtiment sont à appui saillant, décors sculptés, croisée et encadrement de moulures. La porte d'entrée comporte un galbe en accolades et un tympan à décor armorié martelé. L'escalier se termine par une colonne centrale d'où rayonnent les huit nervures d'une voûte en parapluie reçues, sur l'extérieur, sur des culots de feuillages et personnage grotesque. En 1777, le château, entouré de fossés, comprenait chambres, tours.  Le château du XIXe siècle comprend un porche d'entrée à toit en pavillon surmonté d'une chapelle, une tourelle d'angle, et, accolé à la partie ancienne, un logis presque carré double en profondeur, desservi par un escalier central et traversé par un couloir.","habitants":"Famille de Jacques de Dreuille\"","divers":"Le château d'Autry-Issards","gps":"","images":["../../jctruffet.com/image/image_03/03_Autry_Issards_1.jpg","../../jctruffet.com/image/image_03/03_Autry_Issards_2.jpg"]},"Consult_chateau_formulaire1926":{"id":"Consult_chateau_formulaire1926","dept":"03","canton":"Moulins","commune":"Avermes","nom":"Avermes","type":"Château","periode":"XV-XIX","histoire":"Deux château a Avermes, Seganges du XVe siècle  et Champfeu du XIXe siècle,      SEGANGE, en 1495, ce manoir reçoit la reine Anne de Bretagne,  qui, pendant le séjour du roi Charles VIII en Italie,  passe quinze mois chez sa belle sur, Anne de Beaujeu, à Moulins. Le seigneur de Seganges est Nicolas Petitdé, argentier du duc Pierrre II de Bourbon.  la fille de Nicolas Jeanne épouse Claude de Lyon et Segange passe en 1579 à Jehan Mareschal, son gendre Gilbert, son fils  le vend vers 1619 à Jean Feydeau conseiller du roi, son frères Jacques en hérita. En 1630 sa fille  Antoinette  épousa  Claude Chrestien qui l'échangea en 1677 avec d'autres propriétés de la dame Marie Philippes, veuve du baron Bianki, Marie Catherine fille de cette dernière, le laissa  à sa nièce Catherine qui épousa François du Broc devient seigneur de Segange par son mariage en mars 1737. Ses descendants resteront propriétaires du château jusquen 1973 dont Louis le Broc de Segange connu pour ses ouvrages d'histoire bourbonnaise. Il est actuellement la propriété de la famille de Tracy.\r\nCHAMPFEU du  XVIII- XIXe siècle de style Louis XIII. La Grange-Champfeu est une construction  de style Louis XIII.  Au XVe siècle, ce lieu était dénommé la Grange-Cadier et appartenait sans doute à une exploitation agricole dépendant de La Brosse-Cadier, la seigneurie voisine. Le 22 août 1444, Jean Cadier, écuyer, racheta les cens qu'y prélevait le chapitre Notre Dame de Moulins: une terre \"franche\" était en effet de meilleur aloi si l'on voulait la faire passer pour noble. De 1635 à 1684, elle apparteint à  une famille Chacaton et fut connue sous le nom de Grange Chacaton, ce furent sans doute eux qui firent édifier la demeure, acquise en 1701  par le maire perpétuel de Moulins, Bernard de Champfeu, qui lui laissa son nom.","architecture":"Segange, le bâtiment  fût construit entre la fin du XV et XVIe siècle. Sans doute maison fortifiée à lépoque féodale, puis château renaissance au XVIe siècle, détérioré  pendant la Révolution, Segange prend son aspect actuel au XIXe siècle.  subsistent les communs et une tourelle d'escalier englobée dans les constructions Renaissance, se compose d'une aile en retour, à l'extrémité de laquelle s'ouvrait un porche, à l'arc surbaissé, dont les médaillons ont été martelés au cours de la Révolution. Témoignage de la Renaissance Française.   La façade sud-est, avec sa haute toiture en ardoise, est ornementée dans le style Renaissance. A lextrémité droite du corps de logis, un arceau de pierre marque lemplacement dune porte cochère jadis le centre dune façade restée inachevée. La tourelle à encorbellement construite au milieu de la façade  renferme une chapelle. De chaque  côté de cette tourelle, deux bas reliefs portent des traces décussons probablement détériorés pendant la Révolution.\r\nChampfeu, c'est un beau bâtiment de plan rectangulaire à deux niveaux et niveau de comble  au pignon duquel est bâtie une tour ronde à entablement pour soutenir un toit conique. La façade est percée de fenêtres disposées\r\n symétriquement à la porte centrale. Le toit couvert en ardoise a reçu des lucarnes à la mode Renaissance.","habitants":"Famille de François du Broc             Famille de Bernard de Champfeu\"","divers":"Château de Champfeu et de Segange.","gps":"","images":["../../jctruffet.com/image/image_03/03_Avermes_1.jpg","../../jctruffet.com/image/image_03/03_Avermes_2.jpg","../../jctruffet.com/image/image_03/03_Avermes_3.jpg","../../jctruffet.com/image/image_03/03_Avermes_4.jpg","../../jctruffet.com/image/image_03/03_Avermes_5.jpg","../../jctruffet.com/image/image_03/03_Avermes_6.jpg"]},"Consult_chateau_formulaire1cee":{"id":"Consult_chateau_formulaire1cee","dept":"03","canton":"Yzeure","commune":"Trevol","nom":"Avrilly","type":"Château","periode":"XV-XVII","histoire":"AVRILLY,  Guillot Constans, trésorier général du Bourbonnais reçoit en 1436 du Duc de Bourbon Charles 1er l'autorisation  d'édifier un château, et basse-cour entourée de fossés . Par le mariage de sa fille Anne, Avrilly passe à Jean Cordier, conseiller et avocat fiscal du Duc de Bourbon Pierre II, époux d'Anne de France, fille de Louis XI. En 1629, à la suite de difficultés financières chroniques pour ses propriétaires successifs aux Filhol, aux Gaudon et aux Popillon,  et d'une mise en vente forcée en 1629, Avrilly est adjugé à François Garnier, Président-Trésorier de France à Moulins, et conseiller du roi Louis XIII, son fils Jean fut maire de Moulins de 1676 à 1682. Très riche, il entreprend d'importants travaux à Avrilly où il obtient d'Anne d'Autriche le droit de faire tenir justice. Il construit à cette époque le porche sur lequel se voit ses armoiries et son chiffre, ainsi que les deux pavillons. Les pilastres et les chaînes d'angle sont constitués de pierres à bossage. Le pavillon porche à deux niveaux possède une voûte en berceau.  Saisi en 1688, Avrilly n'est adjugé qu'en 1707 à Claude du Ligondès, capitaine des vaisseaux du roi, puis est vendu au vicomte de Bar avant de passer en 1784 à Antoine de Pontgibaud, les Goyets de Livron  en 1800 à Pierre Allier,  puis en 1803 au comte Etienne des Roys, membre du Conseil d'Etat en même temps que Camille de Tournon, et maire de Moulins de 1805 à 1816. Son fils épouse la fille du général Hoche et reçoit en 1845 à Avrilly son ami Adolphe Thiers;   il devient pair de France sous Louis-Philippe. En 1873, Avrilly est vendu au Comte de Tournon, le fils de Camille de Tournon, préfet de Rome sous Napoléon, et père de la Comtesse Jean de Chabannes. Depuis cette date, Avrilly est resté dans la famille et il appartient  aujourd'hui à la famille de Chabannes-Tournon.","architecture":"Avrilly, se compose de différents bâtiments: le château des XVe et XIXe siècles, le pavillon-porche du XVIIe, l'orangerie, les dépendances et les pavillons du XIXe siècle-La façade Est date de cette époque, fortifiée à chaque angle par une échauguette, au milieu par un donjon coiffé d'un comble assez élevé et garni de mâchicoulis à linteaux, reposant sur trois assises en quart de rond. Chacun des linteaux est orné de l'arc en accolade, caractéristique du XVe siècle. La tour Nord, également du XVe, possède deux contreforts entre les-quel se logeait un pont-levis. Chaque contrefort est surmonté d'un clocheton et d'une niche destinée à recevoir une statue. Au-dessous, un écusson laisse deviner des vestiges d'armoiries. Le rez de chaussée de cette tour est voûté d'ogives : on accédait jadis aux étages supérieurs par un escalier à vis. La façade Ouest, démolie au XIXe siècle, était semblable à celle de l'Est et comportait une cour intérieure,  deux pavillons. Les pilastres et les chaînes d'angle sont constitués de pierres à bossage. Le pavillon porche à deux niveaux possède une voûte en berceau. Des travaux considérables sont entrepris au XIXe et au XXe siècle.","habitants":"Famille de François Garnier            Famille de Chabannes\"","divers":"Château d'Avrilly","gps":"","images":["../../jctruffet.com/image/image_03/03_Avrilly_1.jpg","../../jctruffet.com/image/image_03/03_Avrilly_2.jpg","../../jctruffet.com/image/image_03/03_Avrilly_3.jpg","../../jctruffet.com/image/image_03/03_Avrilly_4.jpg","../../jctruffet.com/image/image_03/03_Avrilly_5.jpg"]},"Consult_chateau_formulaire8c59":{"id":"Consult_chateau_formulaire8c59","dept":"03","canton":"Yzeure","commune":"Villeneuve-sur-Allier","nom":"Balaine","type":"Château","periode":"XIV","histoire":"BALAINE,  dans la seconde moitié du XIVe siècle, Baleine était propriété de Pierre et Étienne Célerier, chevaliers.  Mais la propriété est liée au nom des Pierrepont. Lorin Pierrepont, trésorier général du duc Louis II, à qui avait été tout d'abord  donné le domaine  du Colombier, à Saint Bonnet les Moulins, fit bâtir en 1375 deux châteaux  identiques, rectangulaires  à quatre tours rondes, l'un à La Motte sur Aurouer, l'autre  à Latays, qui devint Baleine.    Les Pierrepont servirent toujours fidèlement  les pouvoirs en place : en 1443, Pierre était capitaine et châtelain   de Souvigny, puis Gilbert fut chambellan du roi Charles VII. Les registres paroissiaux nous permettent de    connaître René, gendarme de monsieur le prince  en 1636, qui cumulait les seigneuries de Baleine, Lucenay, la Grange et  divers autres lieux. En 1664, il avait cédé son titre à son fils, Gilbert. Il avait épousé Esmée de Paris qui lui donna au moins huit enfants. En 1700 Edouard de Pierrepont est le dernier membre connu de cette famille de seigneurs de Baleine et Lucenay.  En 1783, le propriétaire était Etienne de Chabre, chevalier, ancien lieutenant de vaisseau chevalier de Saint-Louis. . Après une vie mondaine bien remplie  sous le consulat, le directoire et l'empire, la belle Aglaé Adanson âgée de 30 ans et fille du célèbre naturaliste Michel Adanson, se retire à  Balaine dans la propriété que lui lègue en 1812 un ami de la famille.","architecture":"Balaine; un château typiquement bourbonnais toujours habité en forme de U à deux niveaux et attiques côté cour en façade central fronton saillant, l'ensemble cantonné de tourelles aux angles de trois niveaux toitures en poivrières. C'est le plus ancien parc botanique et floral privé de France et est classé jardin remarquable. Ce parc à l'anglaise, créé en 1804 par Aglaë Adanson, Il associe l'architecture des jardins à l'anglaise du XIXe aux collections d'essences exotiques.","habitants":"Famille de Lorin Pierrepont             Aglaé Adanson pour le parc\"","divers":"Château de Balaine","gps":"","images":["../../jctruffet.com/image/image_03/03_Balaine_1.jpg","../../jctruffet.com/image/image_03/03_Balaine_2.jpg","../../jctruffet.com/image/image_03/03_Balaine_3.jpg","../../jctruffet.com/image/image_03/03_Balaine_4.jpg"]},"Consult_chateau_formulaire71b0":{"id":"Consult_chateau_formulaire71b0","dept":"03","canton":"Ebreuil","commune":"Chirat-l`Eglise","nom":"Banassat","type":"Château","periode":"XIII","histoire":"BANASSAT, le fief de Banassat dépendait de la châtellenie de Chantelle, vers 1050,  Les sires de Bourbon s'en emparèrent à la fin du XIe siècle, leurs héritiers  y conservèrent un point d'appui et un arsenal,  en 1214, le seigneur de Bourbon passa accord avec l'archevêque de Bourges, par lequel Guy de Dampierre jouirait des droits  d'usage.","architecture":"Banassat, construction du  XIIIe siècle remanié  fortement  au XVIe siècle. Il se compose de deux corps de bâtiments principaux reliés entre eux par un mur d'enceinte. Au nord-ouest du corps de bâtiment nord est accolé un porche. Ces deux corps de bâtiment délimitent une cour intérieure, et sont reliés entre eux par les restes d'un mur d'enceinte dont le caractère défensif reste marqué par la porte fortifiée. Le porche fortifié s'ouvre dans une tour entre deux contreforts, surmonté d'une échauguette en partie ruinée. La porte s'ouvrait sous un arc en tiers point, appareillé avec un double chanfrein. Un couronnement défensif avait été édifié à l'extérieur, en partie écroulé en son centre. Sur les murs, voisinent des percements d'époque gothique, Renaissance et des temps modernes.","habitants":"Famille de Guy de Dampierre \"","divers":"Château fort de Banassat","gps":"","images":["../../jctruffet.com/image/image_03/03_Banassat_1.jpg","../../jctruffet.com/image/image_03/03_Banassat_2.jpg"]},"Consult_chateau_formulaireadba":{"id":"Consult_chateau_formulaireadba","dept":"03","canton":"Chantelle","commune":"Barberier","nom":"Barberier","type":"Château","periode":"XIV-XIX","histoire":"Deux châteaux à Barberier, Bompré  du XVe siècle  et Percenat du XIVe siècle.       BOMPRE, les premiers seigneurs connus  furent, au XVe siècle, les Menudel,  puis les Mareschal qui devaient posséder les deux terres de Barberier et de Bompré. La terre de Bompré fut portée, par alliance, aux Revanger, aux Demastre, puis aux Thoisy, il est actuellement la propriété de la famille Loizel.                  PERCENAT, au XVIe siècle, le château  appartient à la famille Eschaloux, aussi seigneur de Cueillat, ou   encore des Eschaloux à Bayet. Au milieu du XVe siècle, Agnès d'Eschaloux, fille d'Hugonin, transmet, par son   mariage, la terre de Percenat  à son époux  Guillaume Blanchart, écuyer. Il a successivement appartenu aux   familles du Gué, de Chambon et de Chaumejean, aussi seigneur de Fourilles avant de tomber aux mains des  seigneurs de la terre voisine de Bompré.  Il ne reste rien de l'ancienne construction, remplacée par un château moderne près de la route de Bayet. Edifié en 1855-1856  par la famille Yvon, l'actuel château de Percenat  est teinté de romantisme.","architecture":"Bompré, le bâtiment existant est une ancienne maison forte du XVe siècle, où un corps de logis massif, à deux niveaux et niveau de comble, est flanqué, côté cour, d'une grosse tour ronde, couverte d'un toit conique et surmontée d'un lanternon hexagonal. Les transformations y ont été nombreuses, et les traces d'aménagements au XVIe siècle,  comme de modifications plus apparentes au XVIIIe siècle, par le percement de fenêtres à arc surbaissé donnent à l'ancienne demeure l'allure  d'un beau manoir. À l'intérieur, l'escalier Renaissance présente  une voûte intéressante caissonée  dans la pierre sculptée. Il se présente comme un vaste corps de logis orienté d'est en ouest, avec une tour d'angle circulaire au sud-est. Ce château est de style de la seconde Renaissance et ne présente aucun décor sculpté  à lextérieur.\r\nPercenat, Edifié en 1855-1856, le corps de logis principal, à deux niveaux et niveau sous comble, est adossé, en pignon, par deux pavillons carrés et en  façade, par deux tourelles d'angle, de plan carré à pans coupés. La toiture d'ardoises, à lucarnes et  clocheton effilés, est encadrée par les hautes flèches à paratonnerre des  tourelles.","habitants":"Famille des de  Menudel              Famille Eschaloux                         Famille Yvon\"","divers":"Maison forte de Bompré et  château de Percenat","gps":"","images":["../../jctruffet.com/image/image_03/03_Barberier_1.jpg","../../jctruffet.com/image/image_03/03_Barberier_2.jpg","../../jctruffet.com/image/image_03/03_Barberier_3.jpg","../../jctruffet.com/image/image_03/03_Barberier_4.jpg","../../jctruffet.com/image/image_03/03_Barberier_5.jpg"]},"Consult_chateau_formulaire38f3":{"id":"Consult_chateau_formulaire38f3","dept":"03","canton":"Lapalisse","commune":"Barrais-Bussolles","nom":"Barrais_Bussolles","type":"Château","periode":"XIV-XVII","histoire":"Six châteaux à Barais-Busolles,  Barrais du XVIIIe siècle, Bruyère du XIV-XIXe siècle, Bussolles gothiques restauré XIXe siècle, Quirelle XIV-XVe siècle Logis tours aux angles, Villette XV-XIXe siècle et le fort de Montjournal vestiges du XIVe siècle.                             BARRAIS  En 1302, Chatard Marcenat  reconnait tenir en  fief du duc Bourbon  la motte et le bois  de Bar. En 1443, Louis de Lavieu, chevalier, époux de Catherine de  Lespinasse  fit aveu à son tour de la motte, terre et seigneurie de Barrais. Famille Campionnet , fondateur et maître des Forges.            BUSSOLLES, le 19 juin 1375, Jean Albert fit aveu du fief de  Bussolles au seigneur de La Palisse. A la fin du siècle, la famille Obeilh prit le titre de seigneur de Bussolles et racheta, en 1455, la justice de la terre  à Jean d'Orvalet, écuyer. En 1503, Jehan Obeilh, écuyer, reconnaît tenir  en fief de la duchesse de Bourbon sa maison et domaine de Bussolles. Les Obeilh  conservent la terre jusqu'au milieu du XVIIe siècle.  Au XIXe siècle, elle fut acquise par Pierre de La Faige et resta dans cette famille jusqu'à la fin de XIXe siècle.    MONTJOURNAL, vestiges, mais on devine le plan primitif. Au milieu du XIIe siècle, une fille de la famille de Montjournal, Perronne, est citée parmi les  relieuses de Marcigny, ce n'est qu'à partir de 1375 qu'un seigneur de Montjournal est connu conme détenteur du fief du lieu. En mars 1461, Pierre de Montjournal racheta à Jacques de Rollat la justice de son fief, alors qu'en   1503 François de Montjournal possédait la justice de Bussolles et tenait en arrière fief de la duchesse de Bourbon  sa \"maison où y a mothe, fossée, pont-levis. Au début du XVIIe siècle, la terre passa aux Obeilh et,en 1612, Louis d'Obeilh était seigneur de Bussolles et de  Montjournal.         VILLETTE,  Villette au XVIe siècle, la maison de Villette appartenait à Robert Desset, probablement issu de la communauté voisine des Desserts, puis fut possédée par une famille Martin, originaire aussi de Barrais. Au début du XVIIIe   siècle, Gilbert Jacquelot, ancien curé d'Huillaux, fit réparer et agrandir  la vieille construction de Villette, pour y   établir  un refuge de filles repenties. Vendue aux carmélites de Moulins, la maison de Villette passa au  milieu  du XIXe siècle à la famille de Riberolles, venue de Joze, dans le Puy-de-Dôme.","architecture":"Barrais, le domaine seigneurial de Bagneux, bordé d'un parc et d'un plan d'eau, se niche au creux d'un vallon, le château fut construit en 1224. La restauration effectuée au début du XVIIIe siècle lui a apporté ses parquets,  boiseries, plafonds à caissons et cheminées en pierre.                Bruyère la maison actuelle, qui a remplacé la maison forte du XIVe siècle, a été entièrement reconstruite au début du XIXe siècle.                  Bussolles était une forteresse de plan quadrangulaire, cantonnée de quatre tours carrées massives et d'une tour ronde, en appareil défensif de la porte d'entrée, a conservé quelques   éléments qui semblent dater du XIVe siècle, mais a été profondément remanié. Le corps de logis, de plan  barlong, à deux niveaux, a conservé une belle tour qui flanque la façade en avant-corps. L'autre angle est    flanqué d'une tour ronde un peu basse, couverte d'un toit conique. Dès le XVIe siècle, des ouvertures, souvent anarchiques, ont éclairé la façade et les toits.                                  Montjournal,  ruines du château. De plan carré, flanqué de tours à ses quatre angles,  est édifié sur une butte dominant la Têche. Grâce à un système de digues, ce ruisseau alimentait un étang qui enserrait le château. On raconte qu'un jeu de quilles en or y est caché. Installée sur un étroit promontoire au fond d'un ravin, la Tour Pourçain se dresse tout contre un vieux chemin. Autrefois appelée la \"Motte des Pousins\", cet édifice fortifié fut édifié par les sires de Bar au XIVe siècle,  elle fut plusieurs fois remaniée au cours des XVe et XVIe siècles. L'édifice comprenait primitivement trois étages munis chacun d'une cheminée. Le rez-de-chaussée est voûté. Une croisée à meneaux permet d'éclairer l'intérieur qui comprend une cheminée sculptée en grès et un four à pain. Le dernier étage était sans doute surmonté d'une terrasse crénelée. En partie rasé, il fut remplacé par une toiture qui s'effondra en 1920.","habitants":"Famille de Pierre de La Faige           Famille de Montjournal\"","divers":"Châteaux de Barrais, de Bussolles,  de Vilette  er vestiges de Montjournal.","gps":"","images":["../../jctruffet.com/image/image_03/03_Barrais_Bussolles_1.jpg","../../jctruffet.com/image/image_03/03_Barrais_Bussolles_2.jpg","../../jctruffet.com/image/image_03/03_Barrais_Bussolles_3.jpg","../../jctruffet.com/image/image_03/03_Barrais_Bussolles_4.jpg","../../jctruffet.com/image/image_03/03_Barrais_Bussolles_5.jpg"]},"Consult_chateau_formulaire335b":{"id":"Consult_chateau_formulaire335b","dept":"03","canton":"Huriel","commune":"St-Martinien","nom":"Bartillat","type":"Château","periode":"XVIII","histoire":"BARTILLAT, en 1503, Bernardin Rabeau, écuyer, seigneur de Dibedojon, tient en fief du seigneur de Culan son hostel  noble de La Tour de Berthollat. Au début du XVIIe siècle, la terre de Barthillat est acquise par une vieille famille locale, les Jehanot, dont la lignée est mentionné, dès 1328, avec un Guillaume Jehanot, noble et damoiseau. En  1457, Pierre Jehanot, chevalier, est seigneur de Bonnefont et Maussat. Au cours des siècles, cette famille étend son domaine par des acquisitions considérables, et ses membres portent en premier lieu le titre de seigneur de  Barthillat. Ils y ajoutent par la suite celui de baron, puis de marquis d'Huriel. Ils sont également possesseurs du  château voisin de Laage. Aujourd'hui transformé en hôtel restaurant","architecture":"Barthillat, bâti au XVIIIe siècle, semble n'avoir été  qu'un pied à terre qui fut réaménagé au XIXe siècle, dans le goût de l'époque, c'est un pastiche de demeure médiévale avec un donjon crénelé. Restent du XVIIIe siècle, la chapelle et les vastes dépendances. Mais il semble qu'il faille chercher le château primitif de Barthillat aux Taviots, lieu-dit proche, sur un plateau protégé et qui fut également un site gallo romain.","habitants":"Famille de Guillaume Jehanot\"","divers":"Château de Bartillat.","gps":"","images":["../../jctruffet.com/image/image_03/03_Bartillat_1.jpg"]},"Consult_chateau_formulaireb4a7":{"id":"Consult_chateau_formulaireb4a7","dept":"03","canton":"St-Pourcain-sur-Sioule","commune":"Bayet","nom":"Bayet","type":"Château","periode":"XV-XVIII","histoire":"Quatre châteaux à Bayet, Châtelus du XVIIe siècle, Deffand du XVII-XIX siècle avec pavillons et tour, Edelin du XIXe siècle avec tourelles  et Martilly du XV-XIXe siècle.   Chambon et Beauverger.\r\nCHATELUS,  Florent d'Argouges, dans son procès-verbal de la généralité de Moulins, signale, à Bayet, le fief de  Châtelus, largement répandu, indique la présence d'un site défensif. Ce bâtiment devint, à partir de 1650, propriété du curé de la paroisse qui percevait pour son propre compte les dîmes, impôts en nature ou en argent au profit du clergé.\r\nLa maison des Dimes, datant des XIIe, XVe siècles, est aujourdhui la demeure du peintre Jean-Gabriel Jonin.\r\nEDELIN, château de chasse depuis sa création, a été fondé en 1638 pour accueillir des hôtes. aujourd'hui hôtel restaurant.                               MARTILLY; seigneurs résidant à Bayet, Martilly ou Nérignet, le Sieur de Martilly. Le Sieur de Molles, en la paroisse de Nérignet et le Sieur de la Coudre en la paroisse de Bayet; le Sieur des Echaloux également en la paroisse de Bayet. D´Argouges mentionne quant à lui, pour Bayet, le fief de Chastelus. Il semble également que d´autres fiefs aient existé à Deffand, Chambon et Beauverger fut rattachée à la commune de Bayet au XIXe siècle. Le fief existe  dès  la fin du XIIIe siècle, car Amblard Golefer, alias Golfier, damoiseau, fait aveu, en 1300,  de sa maison forte, domaine et seigneurie de Martillat. En 1321, sa fille Marguerite Golfère, alors veuve de Jehan de  Barberey, rend le même aveu au seigneur de Bourbon.  Aujourd'hui  hôtel restaurant.\r\nDEFFAND, possession en 1662 de Claude Panay,  grand prévôt d'Auvergne, la terre du Deffand a   appartenu ensuite, de 1702 jusqu'à  la Révolution, aux Cathol du Deffand.   Dans la seconde moitié du XIXe siècle, ce pavillon fut agrandi par Achille Farjas. A lorigine, cette propriété appartenait au marquis du Deffand de Lalande marié à Marie de Vichy Champrond. Madame du Deffand quitta rapidement le château pour devenir une des personnalités de la cour de Louis XIV, son salon littéraire fut couru par le tout Paris.","architecture":"Châtelus maison des dimes, corps de garde de l'ancien château fort sur la butte féodale du XII au XVe siècle.  Aujourd'hui, une haute  maison   bourgeoise, avec pavillon en retour, a remplacé les anciennes  constructions. L'ordonnancement classique de ce bâtiment du XVIIe siècle s'intègre dans un grand parc boisé.                             Deffand, le site du Deffand, une motte castrale, encore visible aujourd'hui, a précédé la construction actuelle. L'édifice comprend  l'ancien pavillon de chasse, carré à un étage, coiffé d'un  toit pyramidal en tuiles, que surmonte un campanile. Une haute tour étroite en brique couronnée de créneaux décoratifs, percée de croisées a meneaux et précédée au rez de chaussée d'un porche en pierre blanche, relie le bâtiment ancien avec la construction du XIXe siècle. Elle présente un plan rectangulaire et une élévation d'un  étage couvert d'un toit à croupes, en ardoise, percé de lucarnes en bois à pignon aigu. Sur l'autre façade en  saillie, vient s'accoler une tour-porche carrée en brique,à trois niveaux.  Edelins, Depuis sa fondation en 1638, cet ancien château de chasse est traditionnellement un lieu daccueil. Après rénovation cette bâtisse a retrouvé sa fonction principale. Située dans un cadre naturel, à proximité des vignobles de Saint-Pourçain. Aujourd'hui chambres dhôtes.                                  Martilly qui domine la vallée de la Sioule remplace sans doute une fortification plus ancienne en contrebas du coteau, ou on observe encore la présence d'une motte castrale. Le bâtiment est rejeté au fond d'une cour bordée de communs. Il affecte un plan quadrangulaire flanqué de deux tours aux angles de la façade sud, et coiffé d'un toit à croupes.","habitants":"Famille de Amblard Golefer           Marquis du Deffand de Lalande\"","divers":"Château de Chatelus, de Deffand, d'Edelin, de Martilly  et de Villebret","gps":"","images":["../../jctruffet.com/image/image_03/03_Bayet_1.jpg","../../jctruffet.com/image/image_03/03_Bayet_2.jpg","../../jctruffet.com/image/image_03/03_Bayet_3.jpg","../../jctruffet.com/image/image_03/03_Bayet_4.jpg","../../jctruffet.com/image/image_03/03_Bayet_5.jpg","../../jctruffet.com/image/image_03/03_Bayet_6.jpg","../../jctruffet.com/image/image_03/03_Bayet_7.jpg"]},"Consult_chateau_formulairef48d":{"id":"Consult_chateau_formulairef48d","dept":"03","canton":"Chevagnes","commune":"Beaulon","nom":"Beaulon","type":"Château","periode":"XV-XIX","histoire":"Plusieurs châteaux à Beaulon, château de Treffoux du XVIII-XIXe siècle (article dans Beaulon II),  de Chezelles du XVIe siècle( Idem article dans Beaulon II). de Hautmoucheron du XVIIe siècle  et de Meuble du XIIIe siècle.  \r\nBEAULON, c'est vers 1480 que la famille de Vinsons fait construire le château qui prendra le nom de Beaulon en 1510, lorsque la seigneurie de Saint-Dizant est acquise par la famille de Beaulon. Au début du XVIIe siècle, monseigneur de Nesmond, évêque de Bayeux et conseiller de Louis XIV, devient par héritage le seigneur de Beaulon (La famille de Nesmond en sera propriétaire jusqu'en 1712) et le droit de haute justice est donné à la seigneurie en 1635. Il fut au XVIIe siècle, la résidence d'été des évêques de Bordeaux.  Par la suite, par alliance, le château de Beaulon sera, après la famille de Nesmond, la propriété des familles de Bigot, de Brémond d'Ars, de la Porte. En 1965, le château de Beaulon devient la propriété de Christian Thomas.                                   MEUBLE doit aussi son nom à ses anciens propriétaires; les Charbonnier qui occupaient des postes importants à la cour des Ducs de Bourbon. Marie Litaudon, auteur de plusieurs ouvrages sur l'histoire régionale y vécut. Château du Marquis de Monspey aujourd'hui hôtel restaurant                                Il est mentionné dans un acte de vente de 1267 par lequel Isabelle de Bourbon, veuve de Geoffroy de Blacfossés, vendit à Guillaume de Maizières diverses terres dont le Meuble. Au siècle suivant, une famille que l'on retrouve jusque vers 1556 avec Jean du Meuble, écuyer, prit le nom du fief.  C'est en 1366 que l'on rencontre Claire, dame de Dompierre et Chazelles et de la terre du Meuble. En 1367 dame Marguerite du Meuble  fait aveu pour la \"motte, fossés et hôtel du Meuble\". En 1603 et pendant une  bonne partie du XVIIe siècle, les seigneurs du Meuble furent les Lanty. Le dernier seigneur, nommé Paperel de Vitry, émigra à la Révolution et le château fut confisqué  le 22 floréal an II. Au XIVe, vendu suite à un partage.","architecture":"Beaulon du XVIIIe siècle,   caractéristique du goût de l'époque restauration, mêlant en parti architecture Renaissance et façades de style Louis XVI. Le château est formé d'un corps de logis aux extrémités duquel font retour deux ailes symétriques. A chacun des angles du quadrilatère s'élève une tour circulaire coiffée d'une poivrière,  le corps de logis du XIVe siècle  est surmonté d'une haute toiture d'ardoise munie de rampants à crochets. La façade nord est très intéressante car elle présente deux lucarnes de style très différent. Celle de gauche est un témoignage médiéval d'inspiration florale alors que celle de droite est de style Renaissance, flamboyante à colonnes torses. Cette dissymétrie architecturale n'enlève rien au charme de cette bâtisse qui témoigne de ses cinq siècles d'existence. L'escalier du XVIe siècle remplace sans doute une tour d'escalier polygonale  à l'italienne, s'il a été rénové, a toujours fait partie de la tour originale qui est toujours présente aujourd'hui. Le pigeonnier, une tour cylindrique datée de 1740, présente un toit conique recouvert de tuiles plates de terre cuite et percé de lucarnes à frontons de pierre.                  Meuble, est le seul château qui ai gardé son aspect médiéval  qui fut construit en 1466.","habitants":"Famille de Beaulon                   Famille du Marquis de Monspey\"","divers":"Château d Beaulon,  de Hautmoucheron et Meuble.","gps":"","images":["../../jctruffet.com/image/image_03/03_Beaulon_1.jpg","../../jctruffet.com/image/image_03/03_Beaulon_2.jpg","../../jctruffet.com/image/image_03/03_Beaulon_3.jpg","../../jctruffet.com/image/image_03/03_Beaulon_4.jpg","../../jctruffet.com/image/image_03/03_Beaulon_5.jpg"]},"Consult_chateau_formulaire79f2":{"id":"Consult_chateau_formulaire79f2","dept":"03","canton":"Chevagnes","commune":"Beaulon","nom":"Beaulon_II","type":"Château","periode":"XVI","histoire":"CHEZELLES est séparé de Jaligny. Pendant la guerre de Cent Ans, cette seigneurie est jointe à Dompierre, mais aussi à Bourbon-Lancy. Puis, vont se succéder les Chateauvillain, les Mello, La Trémoilleet les  Vergy. Mais, Guillemette de Vergy  vend Chézelles, lacquéreur est Geoffroy de Chabanne, dont les descendants conserveront la propriété durant deux siècles. Parmi eux, on peut citer monsieur de Lapalice (Jacques II), né vers 1470 et maréchal de France sous Louis XII.  Au milieu du XVIIe siècle, les Chabanne cèdent leur droit de justice sur les terres de Chevagnes quils viennent de vendre au seigneur de Fonverne. En 1679, le seigneur de La Palisse, endetté, vend Chézelles et Dompierre à Jean des Gallois de la Tour. Chézelles devient alors une simple métairie. En 1713, Jean de Gallois achète la propriété des Trochereau de la Voûte. En 1730, Charles Jean Baptiste des Gallois de la Tour, étant également seigneur de Saint-Aubin, y fait construire un grand château tandis que le vieux manoir de Chézelles, déserté, nest plus quun rendez-vous de chasse.\r\nTREFFOUX,  seigneurie dont le domaine était très important, aux limites des communes de Beaulon et de Thiel sur Acolin, la terre a pu être démembrée en 4 parties: les Treffoux, les Petits Treffoux, le château des Treffoux et  la réserve des Treffoux, c'est donc dans une région de mise en valeur du sol que s'était installée la seigneurie primitive des Treffoux, autour du XIIIe siècle.     HAUTMOUCHERON, Pas d'information historiques. Aujourd'hui hôtel restaurant.","architecture":"Maison Charbonnier, gentilhommière qui fut construite en 1466 et doit aussi son nom à ses anciens propriétaires; les Charbonnier qui occupaient des postes importants à la cour des Ducs de Bourbon. Marie Litaudon, auteur de plusieurs ouvrages sur l'histoire régionale y vécut. \r\nChezelles, un document du XVIe siècle nous décrit Chézelles. Ce lieu comprend  un château, une motte et des fossés, un pont levant, une basse-cour, une maison des fours, une grange, des jardins, un colombier, un verger et un portail, le tout entouré dautres fossés remplis deau.\r\nTreffoux,  La construction actuelle, plus gentilhommière  que château, date des XVIII-XIXe siècles.\r\nHautmoucheron, est une gentilhommière, dont le logis principal a été construit au XVIIe siècle. D'aspect modeste, il s'organise en cinq travées sur deux niveaux. Un avant corps en forme de  tour carrée  est pris en façade et s'élève  d'un étage au dessus du logis. Aujourd'hui hôtel restaurant.","habitants":"Famille de Geoffroy de Chabanne\"","divers":"Château de Chezelles, de Treffoux, de Hautmoucheron et la maison de Charbonnier","gps":"","images":["../../jctruffet.com/image/image_03/03_Beaulon_II_1.jpg","../../jctruffet.com/image/image_03/03_Beaulon_II_2.jpg","../../jctruffet.com/image/image_03/03_Beaulon_II_3.jpg","../../jctruffet.com/image/image_03/03_Beaulon_II_4.jpg","../../jctruffet.com/image/image_03/03_Beaulon_II_5.jpg","../../jctruffet.com/image/image_03/03_Beaulon_II_6.jpg"]},"Consult_chateau_formulaire7efb":{"id":"Consult_chateau_formulaire7efb","dept":"03","canton":"Souvigny","commune":"Agonges","nom":"Beaumont_","type":"Château","periode":"XVIII","histoire":"BEAUMONT  à Agonges, de ses origines anciennes, le château de Beaumont a conservé une tour ronde et un pigeonnier. Le reste fut reconstruit au XVIIIe siècle. Edifice d'ordonnance classique, reconstruit en 1740 à l'emplacement d'un château fort médiéval. Au début du XIXe siècle, Beaumont appartenait à François Dalphonse, député de l'Allier, qui mourut le 24 septembre 1821 Sachez que la famille propriétaire des lieux fut à lorigine de lintroduction de la race charolaise en terres bourbonnaises.","architecture":"Beaumont, a été reconstruit en 1740 sur l'emplacement d'un château fort médiéval, ce château n'a pas subi de modifications depuis le XVIIIe siècle, hormis la disparition des lucarnes côté jardin. Edifié sur une terrasse, il se compose d'un corps de bâtiment longitudinal s'appuyant
