, gouverneur de Bourges. En 1601, La Baume appartenait à Charles d'Aubrun, écuyer, le reste de la terre et de la seigneurie fut vendu en 1618  à Jacques d'Aubrun. En 1682, et en 1779,  les fief, passa à  Marie Thérèse Alarose qui épousa l'année suivante Jean Baptiste de la Quassière,   vicomte de Chalus capitaine au régiment d'infanterie d'Orléans. Leur fils, François Dorothée fit bâtir un four à chaux. La terre et le château de la Beaume furent mis en vente et adjugés au propriétaire d'un café-restaurant parisien, originaire de Hérisson, qui fit élever un jardin d'hiver et procéder à des améliorations de l'habitat. En 1860 le vend à Jules Bignon. C'est au château de la Beaume, le 16 juin 1912, qu'Eugène Le Brun, correspondant de la société des antiquaires de France, acheva la rédaction de ce superbe ouvrage consacré à l'histoire du Veurdre.          CHARNEE, fief attesté dès le XIIIe siècle. Il est acquis en 1667 par Gilbert Alarose et passe par mariage à la famille Jourdier au XVIIIe siècle. Joseph Jourdier fait construire le château actuel, complété au XIXe siècle siècle par des ailes en retour. Aujourd'hui hôtel restaurant.","architecture":"Beauregard, a été édifié en 1778, à partir des matériaux provenant  de la démolition du fourneau à fonte de la forge voisine, elle-même construite en 1760 avec les matériaux de l'ancien château. Le domaine de Beauregard se compose  d'une maison de maître  avec jardin en terrasse, et trois bâtiments agricoles, étable, remise, grange, à l'arrière,  s'ordonnent autour d'une cour  dans laquelle on pénètre en franchissant deux grosses piles circulaires. La maison a conservé la quasi totalité des menuiseries, boiseries et cheminées d'origine. Beauregard constitue  un exemple de maison de maître entourée de ses dépendances agricoles de la seconde moitié du XVIIIe siècle. Les volumes, l'organisation de l'espace et les détails architecturaux n'ont pas été altérés.                                  Baume, subsiste une tour du XVe siècle en remplacement d'une ancienne, le pavillon et les communs sont du XVIIIe siècle, construit sur le bord de l'Allier sur un monticule, suite à un incendie au XIIIe siècle les matériaux ont été récupéré pour construire le nouveau château.  Le premier château  de la Beaume avait été construit sur un à-pic et dominait le cours de l'Allier, ruiné par un incendie au XIIIe siècle, puis reconstruit pour la troisième fois en 1746-1752, augmenté d'un étage vers 1834  des communs des XIVe, XVe et XVIIIe siècles. Cette grande construction rectangulaire de style Louis XV est située au coeur d'un parc dont certains arbres sont tricentenaires. Une tour en fut  découverte en 1902 lors de la destruction d'une ancienne écurie, elle contenait dans sa maçonnerie un étrier du XIIe siècle. Il fut incendié au XIIIe siècle et on bâtit avec les matériaux de récupération un nouvel édifice dans l'emplacement de l'ancienne basse-cour, au bas du rocher.","habitants":"Famille de Gilbert Le Blanc\"","divers":"Château La Baume, Beauregard, la Charné et Moulins à le Veurdre","gps":"","images":["../../jctruffet.com/image/image_03/03_Veurdre_1.jpg","../../jctruffet.com/image/image_03/03_Veurdre_2.jpg","../../jctruffet.com/image/image_03/03_Veurdre_3.jpg","../../jctruffet.com/image/image_03/03_Veurdre_4.jpg","../../jctruffet.com/image/image_03/03_Veurdre_5.jpg","../../jctruffet.com/image/image_03/03_Veurdre_6.jpg","../../jctruffet.com/image/image_03/03_Veurdre_7.jpg","../../jctruffet.com/image/image_03/03_Veurdre_8.jpg"]},"Consult_chateau_formulaire1aa8":{"id":"Consult_chateau_formulaire1aa8","dept":"03","canton":"Vichy","commune":"Vichy","nom":"Vichy","type":"Patrimoine","periode":"XVIII","histoire":"Pludieurs châteaux à Vichy.  Le manoir Sévigné, Castel-Franc et les thermes. VICHY en  1344, le seigneur Jean II cède la châtellenie de Vichy au duc Pierre 1er de Bourbon. En 1374-1384, Louis II de Bourbon acquiert la dernière part du château de Vichy au cur de la ville fortifiée. Vichy est alors rattaché au Bourbonnais. En1410, Louis II édifie des fortifications et fonde le couvent des Célestins.\r\nSEVIGNE, la marquise curiste en 1676 et 1677, qui popularisera la description des prises d'eaux et bains dans ses lettres. Les eaux de Vichy, la guérissant d'une fâcheuse paralysie des mains, lui permettent en effet de retrouver l'usage de sa brillante et précieuse plume. elle y fit construire un pavillon.\r\nLes THERMES, en 1761 et 1762, Adélaïde et Victoire de France, filles de Louis XV viennent une première fois à Vichy, puis reviennent en 1785. L'établissement de bains leur paraît fort incommode avec ses abords boueux et insuffisant pour le grand nombre de curistes. À leur retour à Versailles, elles demandent à leur neveu Louis XVI de faire édifier des thermes plus spacieux et plus agréables, construits en 1787.\r\nCASTEL-FRANC,  a pu être la résidence du prévôt de Vichy. Ce manoir a été édifié sur les anciens remparts de la ville à la fin du XVe siècle, il abritait sans doute le bailli en 1523 . La famille Gravier du Monceau, qui est devenue propriétaire des lieux, qui meurt le 29 novembre 1928 à presque 102 ans, il servira de musée à la Compagnie fermière pendant 47 ans, de 1937 à 1984. Il appartient depuis 1997 à la mairie de Vichy.  Le CASINO dorigine est construit par Charles Badger, larchitecte du Chalet de la Compagnie en 1857, dont il reste aujourdhui la Galerie Napoléon III) en 1858.   En  1799,   Letizia Bonaparte, mère de Napoléon, fait une cure en compagnie de son fils Louis. 1900-1901, le Casino est agrandi. Une salle dOpéra, de style art nouveau, est inaugurée en 1901. Lensemble est baptisé  Grand Casino  et accueille désormais tous les plus grands noms de la scène internationale. 1940-1944 : Vichy, capitale du pays, abrite tous les ministères et les services annexes dans ses hôtels et ses villas. \r\nSuite à l'armistice signé le 22 juin 1940, le gouvernement s'installe à Vichy.","architecture":"Vichy,1821 la duchesse dAngoulême, fidèle habituée de la station, pose la 1ère pierre du nouvel établissement Thermal qui conserve quelques installations de lancienne Maison du Roy. Peu à peu, le vieux Vichy fait place au Vichy moderne. En 1848, la porte de France, dernier vestige des anciennes fortifications, est démolie.         Castel-Franc, ce manoir a été édifié sur les anciens remparts de la ville à la fin du XVe siècle, le bâtiment a conservé des traces du XVe siècle,  dans son corps principal à combles élevés et dans une belle porte à pieds droits et linteaux moulurés. À partir du XVIe siècle d'importants travaux, adjonction d'un bâtiment supplémentaire et ouverture de nombreuses baies, dans le style Renaissance.  Aujourd'hui l'édifice est constitué d'un double corps de  bâtiment de forme rectangulaire à 3 niveaux, flanqué de deux tourelles carrées et  d'une petite tourelle ronde en poivrière sur culot mouluré. Au XIXe  siècle, le bâtiment a été utilisé comme hôtel de ville de 1801 à 1822. Actuellement, il abrite un musée de la ville.            Les thermes et son hippodrome donnent à Vichy un air charmant de  French Riviera  continentale, d'oasis hédoniste ayant bien digéré la fin de son âge d'or thermal.                                 Vichy, l'architecture antérieure au XIXe siècle se concentre dans la vieille ville avec quelques édifices à façades de pierre ou à pans de bois dans le quartier construit sur le rocher des Célestins. A partir de 1861, avec la naissance de la station thermale moderne, l'architecture se renouvelle et introduit une échelle différente avec des édifices de grande hauteur.","habitants":"Famille Gravier du Monceau\"","divers":"Le pavillon de Mme Sévigné, le Castel-Franc, le Guerinets, le Chancelaire, le Casino,  les thermes, le châlet de l'empereur et l'hôtel de ville de Vichy.","gps":"","images":["../../jctruffet.com/image/image_03/03_Vichy_1.jpg","../../jctruffet.com/image/image_03/03_Vichy_2.jpg","../../jctruffet.com/image/image_03/03_Vichy_3.jpg","../../jctruffet.com/image/image_03/03_Vichy_4.jpg","../../jctruffet.com/image/image_03/03_Vichy_5.jpg","../../jctruffet.com/image/image_03/03_Vichy_6.jpg","../../jctruffet.com/image/image_03/03_Vichy_7.jpg","../../jctruffet.com/image/image_03/03_Vichy_8.jpg","../../jctruffet.com/image/image_03/03_Vichy_9.jpg"]},"Consult_chateau_formulaire3a7f":{"id":"Consult_chateau_formulaire3a7f","dept":"03","canton":"Ebreuil","commune":"Vicq","nom":"Vicq","type":"Château","periode":"XV-XVII","histoire":"Six châteaux à Vicq, la Mothe (voir article), Arçon( voir article), Dacq du XIXe siècle dans un grand parc, de Luth du XV-XIXe siècle,  la Ruas du XVIII-XIXe siècle et de Vodot du XVIIe siècle.       DACQ, après avoir longtemps appartenu aux Rothschild, le château est  la propriété de la famille Carly, hôtel restaurant.   LUTH,les premiers seigneurs sont cité au début du XVIe siècle mais il est probable que très tôt, cette maison forte importante  dépendait des seigneurs de Veauce ou des abbés d'Ebreuil, voire des seigneurs du Châtelard ou des seigneurs de Monclar encore plus proche. En 1503 Anthoine Breschart, écuyer, reconnait tenir de la duchesse de Bourbon sa maison de luxe, avec le domaine, en toute seigneurie.  Hôtel restaurant.           RUES, est longtemps resté la propriété des Boirot de Laruat, famille aux armoiries d'azur au chevron d'or, accompagné  de trois étoiles de même, les deux en chef, semées de deux oiseaux affrontés d'argent. Au  XIXe siècle, la seignerie de Laruas vint par alliance dans la famille de Sereys qui fit  construire  le logis actuel, et dont les descendants en étaient encore propriétaires.                       VODOT,  la terre de Vodot était un fief noble qui, en 1311, appartenait à Bonnet de Hulme qui fit aveu de son fief de Vodot à Perrin, seigneur de Veauce. Vers 1460, la seigneurie appartenait à Louis Soulas, écuyer. Après la mort de ce dernier, Vodot passa à son neveu Henry Soulas, écuyer lui aussi, et qui porta le titre de seigneur de Vodot. En 1503, la famille Soulas a cédé son fief  à Gabriel et Magdeleine de  Paray qui sont seigneurs de Vauldot les Ebreille et qui reconnaissent tenir en fief de la duchesse de Bourbon  leur terre de Vaudot composée d'une maison, garenne, moulin et colombier.","architecture":"Dacq, très agréablement installé à l'intérieur d'un grand parc arboré, ce château est une construction du XIXe siècle. C'est un corps de logis de plan rectangulaire à deux niveaux et cinq travées de fenêtres, ce qui en fait une résidence spacieuse. Un toit à croupes couvert d'ardoises est ouvert de rares lucarnes.                             Luth, au début du XVIIe siècle, au Lucq, il y a une belle tour carrée fort élevée, ou il y a une plate forme au dessus, dans laquelle  la tour servit de prisons pour ladite justice, avec une petite maison tout à côté et un beau colombier aussi dans le même lieu des vergers y joignant vignes et terres. Aujourd'hui la tour a été démolie, mais le colombier subsiste, ainsi que le corps de logis qui a reçu d'importantes transformations au XVe siècle,  par des ouvertures à angles moulurés et par une belle cheminée monumentale.                              Rues,  il ne reste plus grand chose de la construction initiale, si ce n'est un pigeonnier carré à lanterneau, inséré dans de vastes communs du XVe siècle. Le corps de logis actuel est une construction du XIXe siècle à deux  niveaux, recouverte en ardoises, ou les encadrements des ouvertures et les angles  sont en pierre de taille blanche. L'accès de la demeure est conduit par une allée seigneuriale  bordée de beaux arbres.                                 Vodot, au début du XVIIe siècle, la maison et un  lieu noble de Veaudot consistait en maison avec deux chambres basses, deux chambres hautes, le tout joignant et tenant avec une pièce de terre appelée le mas de Veaudot, la maison de Vodot est installée sur un terre plein dont le talus forme une déclivité de plusieurs mètres et dont l'accès est défendu par le mur  d'enceinte ou le mur aveugle des constructions qui couronnent le talus.","habitants":"Famille Carly                             Famille d'Anthoine Breschart           Famille de Bonnet de Hulme\"","divers":"Château de Dacq, de Luth, de Rues et de vodot à Vicq","gps":"","images":["../../jctruffet.com/image/image_03/03_Vicq_1.jpg","../../jctruffet.com/image/image_03/03_Vicq_2.jpg","../../jctruffet.com/image/image_03/03_Vicq_3.jpg"]},"Consult_chateau_formulaire9a4d":{"id":"Consult_chateau_formulaire9a4d","dept":"03","canton":"Bourbon-l`Archambault","commune":"Vieure","nom":"Vieure","type":"Château","periode":"XIX","histoire":"Deux châteaux à Vieuren la Salle du XIV-XIXe siècle avec tour et Chaussière du XIXe siècle.                       CHAUSSIERE, château construit par Théodore Riant vers 1875, bâti en briques et en pierres, avec une toiture d'ardoises, a remplacé l'ancien château du XIVe siècle, dont il reste des ruines dans le parc. Une chapelle complète l'ensemble. Le vieux château était une résidence des ducs de Bourbon et le siège d'une châtellenie ducale, il fut ruiné par les guerres de religion et la Fronde. LA-SALLE, en 1382 Pierre de Vieure  époux de Jeanne de la Salle,  en 1473 Jean de Vieure conseiller du duc de Bourbon transforma le château en demeure agréable, en 1685 il fut saisi et adjugé  au profit d'Isabelle de Chamborant  la Clavière, une riche héritière du Bourbonnais, ensuite Il a souvent changé de mains, confisqué à la Révolution, il est vendu comme bien national et appartient successivement aux familles Michelon, Daubertès et Riant. Le château conserve le souvenir  de la légende de Loïse de Vieure, l'unique fille du seigneur de la Salle mourut le jour de son mariage.","architecture":"Chaussière, le château a été construit entre 1876 et 1878 dans un style mêlant néo-gothique et néo-Renaissance.  Un corps de bâtiment unique allongé, avec la partie sud-ouest légèrement élargie, et l'abside pentagonale de la chapelle, à l'opposé,  sur la partie gauche de la façade latérale. Sur la façade principale, une échauguette forme  l'angle avec la façade latérale. Elle se termine en encorbellement vers le bas est coiffée d'un toit en poivrière.  La  partie décorative adopté pour la façade est le même que celui des châteaux dits \"Louis XIII\", un jeu de couleurs   entre la brique,  la pierre et l'ardoise. La partie droite de cette façade est occupée en son rez-de-chaussée par la chapelle. L'abside s'orne d'un balcon  aux balustres séparés par des arcs gothiques. Aux 4 angles supérieurs de   ce balcon s'élèvent quatre pinacles, et aux quatre angles inférieurs quatre gargouilles.  Cet édifice est un pastiche à la fois du style gothique et du style Louis XIII sa construction en fait un témoignage de l'architecture romantique en Bourbonnais.                         La salle, il a l'apparence d'un château fort transformé par la suite en résidence,  château de structure médiévale du XIVe siècle, traces de pont-levis, douves profondes grande cour médiévale, grosses tours rondes à mâchicoulis. Agrandi vers 1875  par l'architecte Moreau. La  partie nord le donjon rectangulaire et tours rondes d'angles fut conservée tandis que les ailes en retour furent  dotées de nouveaux percements et de nouvelles  toitures. Pour les relier, une autre aile fut édifiée, flanquée  d'une tour carrée de style néogothique et néo-Louis XIII. Vastes communs du XVIIIe siècle.","habitants":"Famille de Théodore Riant              Famille de Pierre de Vieure \"","divers":"Château de Chaussière et de la Salle à Vieure","gps":"","images":["../../jctruffet.com/image/image_03/03_Vieure_1.jpg","../../jctruffet.com/image/image_03/03_Vieure_2.jpg","../../jctruffet.com/image/image_03/03_Vieure_3.jpg","../../jctruffet.com/image/image_03/03_Vieure_4.jpg","../../jctruffet.com/image/image_03/03_Vieure_5.jpg","../../jctruffet.com/image/image_03/03_Vieure_6.jpg","../../jctruffet.com/image/image_03/03_Vieure_7.jpg"]},"Consult_chateau_formulaire712f":{"id":"Consult_chateau_formulaire712f","dept":"03","canton":"Huriel","commune":"Treignat","nom":"Villebouche","type":"Forteresse","periode":"XIII","histoire":"VILLEBOUCHE, en 1142,  le Groing fonde l'abbaye des Pierres. En 1376, Guillaume le Groing, seigneur de Villebouche, accepte le don que lui fait son suzerain, Pierre de Brosse, de la haute justice de Villebouche, en récompense de services rendus. Il fonde une chapelle et la dote de  revenus. Louis de Brosse, seigneur de Ste-Sévère et de Boussac, lui permet de fortifier Villebouche. En 1461  Aubert et Jacques le Groing achètent  la haute justice et terre d'Herculat  et se partagent les biens de leurs  parents. Aubert reçoit de son suzerain  l'autorisation de construire  tours, tourelles, pont levis, archères et pont dormant, boulevards, fossés, murailles, mâchicoulis. Jean le Groing, seigneur de Villebouche et d'Herculat, le membre le mieux connu de cette famille, prend part à la bataille de Marignan en 1515 et meurt à Pavie en 1525, comme  l'atteste l'épitaphe  de son tombeau, en l'église de Treignat. Ses descendants et ceux des branches collatérales occupent de hautes fonctions sacerdotales et militaires au cours des siècles suivants. C'est que la famille étend son influence et ses relations par des alliances vers l'Auvergne, le Berry ainsi que localement. En 1721, Jean Baptiste le Groing épouse Thérèse de Courtais, fille de Gilbert et Marguerite de Beausson. Déjà possesseur des terres et seigneuries de Treignat, Recullet et du Boueix il rend, par ce mariage, aveu de la seigneurie de Montebras. Ainsi, cette famille, issue d'un enracinement géographique restreint, parvient-elle, au cours des siècles, à  étendre ses possessions et à accumuler les plus hautes fonctions et les bénéfices. Le dernier des le Groing de Villebouche, émigré, fut fusillé par les républicains, et selon la légende mourut en criant \"Vive le roi\". Le blason des le Groing de la Romagère peut se voir à la Mothe-au-Groing (Leyrat, Creuse).","architecture":"Le château de Villebouche, situé à la limite du département, semble avoir succédé à la vaste villa gallo-romaine voisine. Il est bâti sur une motte entourée de fossés, motte d'un ancien château dont il reste une tour ronde du XIIe siècle,  il aurait joué un rôle important lors de la guerre de cent ans. Le manoir actuel date du XVe siècle, avec donjon à mâchicoulis et fenêtres à meneaux. Des aménagements ultérieurs du  XIIe siècle sont à noter. C'est de cette zone de confins qu'est originaire la famille le Groing installée sur les fiefs locaux de Tregnat et de Saint-Sauvier.","habitants":"Famille de  Pierre de Brosse\"","divers":"Château de Villebouche à Treignat","gps":"","images":["../../jctruffet.com/image/image_03/03_Villebouche_1.jpg"]},"Consult_chateau_formulaireedac":{"id":"Consult_chateau_formulaireedac","dept":"03","canton":"Montmarault","commune":"Villefranche-d`Allier","nom":"Villefranche_Allier","type":"Château","periode":"XII-XVII","histoire":"deux châteaux à Neuville du XII-XIVe siècle de St-Moeurs du XVIIe siècle et Vergnais                                 SAINT-MOEURS,  en 1322, Robin de Culan, damoiseau, avoue tenir en fief du seigneur de Bourbon , en la chastellenie de Murat. En 1445, c'est Denis de la Marche qui prête foi et hommage pour son hostel de Stetmur. A la génération suivante, c'est Jacques de Nury, écuyer, qui, en 1503, reconnaît tenir en fief  de la duchesse de Bourbon sa maison, appelé l'hostel et seigneurie de Septmur,  Après avoir été acquis par Loys de la Grave, écuyer, en 1656, puis par Isabelle de Chamborand de la Clavière en 1663, le château  passe, en 1686, à Gilbert de Courtais, seigneur de la Guierche et possesseur de Neuville. Il appartient actuellement à la famille Cluzeau qui en a achevé la restauration.            NEUVILLE, Le château comprend une chapelle qui était autrefois église paroissiale avant de devenir propriété privée suite à la construction du château de 1852 à 1857.","architecture":"Neuville, du XIIe siècle, et au XIVe siècle , le château comprend une chapelle qui était autrefois église paroissiale avant de devenir propriété privée. deux corps de logis en forme de L  à deux niveaux et attiques   flanquée de tours rondes en angles.                     Saint-Moeurs.  On accède à la première cour du château par un pont au dessus d'un fossé en eau. Les communs et le logis au nord-ouest sont disposés autour de cette cour. L'extérieur est agrémenté de tourelles et échauguettes,  à l'ouest une tour ronde au toit surmonté d'un clocheton, abrite la chapelle. Le château actuel a dû être précédé d'autres constructions d'époque féodale dont on peut penser qu'elles furent un lieu ceint de murs.","habitants":"Famille de  Jacques de Nury\"","divers":"Château  de Neuville, de Saint-Murs  de Vergnais et de Boussac à Villefranche sur Allier.","gps":"","images":["../../jctruffet.com/image/image_03/03_Villefranche_Allier_1.jpg","../../jctruffet.com/image/image_03/03_Villefranche_Allier_2.jpg","../../jctruffet.com/image/image_03/03_Villefranche_Allier_3.jpg","../../jctruffet.com/image/image_03/03_Villefranche_Allier_4.jpg","../../jctruffet.com/image/image_03/03_Villefranche_Allier_5.jpg"]},"Consult_chateau_formulaire87a9":{"id":"Consult_chateau_formulaire87a9","dept":"03","canton":"Yzeure","commune":"Villeneuve-sur-Allier","nom":"Villeneuve_Villars","type":"Château","periode":"XVI","histoire":"VILLARS, tout proche des bords de l'Allier, à moins d'un kilomètre de Villeneuve, se trouvait le château de Villars,   dont subsistait, à l'époque  où écrivait Aubert de la Faige, une motte fossoyée. L'hôtel, lieu et seigneurie de Villars appartenait au XIIIe siècle à une branche de la famille des Breschards. C'est là que naquit vers 1230,  Pierre Breschard de Villars, plus connu  sous le nom de Pierre de Belleperche, et qui fonda une ville neuve  sur ses terres patrimoniales. Il mourut en 1308, laissant à   son frère, Guillaume, la collation de huit vicairies qu'il avait fondées dans la chapelle de sa maison. Ce dernier   s'en dessaisit en 1311 au profit  de Louis, fils aîné de Robert de Clermont, seigneur de Bourbon. On connaît un certain nombre de ses successeurs grâce aux aveux et dénombrements, Guillaume et Jean de Villars, puis  à nouveau un Guillaume, en 1443, Archambaud de Villars, écuyer, en 1449, Armand, en 1505, François, en   1531 Jean de Villars. Nicolas Popillon, seigneur du Riau, acquit Villars. En 1624 le seigneur de Villars était un médecin, Michel Ravateau, en 1649 c'était André Roy, président au présidial de Moulins, succédant à Claude Roy, lieutenant général en la sénéchaussée du Bourbonnais en 1645 et à Jean Roy en 1646.  Leur domaine se composait en outre des sireries de Salonnet et du Tremblay. La seigneurie passa par la suite aux mains  de la famille Heldin, en la personne de Louis, secrétaire de madame de la Vallière, gouvernante  du Bourbonnais, en 1682 puis Louis, capitaine des gardes du Bourbonnais en 1692. Les Heldin, comme les  Roy, possédaient la sirerie du Tremblay, cédée à Louis le troisième fils du précédent, avocat au parlement à cette même date. Au milieu du XVIIIe siècle, Joseph, marquis d'Allègre, prince d'Orange, maître de camp de cavalerie, ancien exempt des gardes du corps du roi, chevalier, devint seigneur de Baron, en même temps que de Villars et autres lieux.   Gites de France et chambres d'hôtes.","architecture":"Villars, un château entouré d'une petite agglomération. En forme de L, ce magnifique château, du XVIe et XIXe siècle en briques polychrome losangées, appartient à la même famille depuis 1804. Tout proche de l'Allier, Villars fut certainement à son origine, un château de défense. La cour intérieure a conservé les douves asséchées et les anciens fossés n'ont été comblés que sur l'aile Est pour ajouter un pavillon d'entrée en façade à la fin du XIXe. Elle imite celle des hôtels particuliers de la place des Vosges à Paris, qui forme avec lui un gracieux ensemble intégré dans un grand parc aux essences plusieurs fois centenaires, rares et gigantesques.","habitants":"Famille des Breschards\"","divers":"Château de Villars et de Damarians  à Villeneuve sur Allier","gps":"","images":["../../jctruffet.com/image/image_03/03_Villeneuve_Villars_1.jpg","../../jctruffet.com/image/image_03/03_Villeneuve_Villars_2.jpg","../../jctruffet.com/image/image_03/03_Villeneuve_Villars_3.jpg","../../jctruffet.com/image/image_03/03_Villeneuve_Villars_4.jpg","../../jctruffet.com/image/image_03/03_Villeneuve_Villars_5.jpg","../../jctruffet.com/image/image_03/03_Villeneuve_Villars_6.jpg"]},"Consult_chateau_formulaired427":{"id":"Consult_chateau_formulaired427","dept":"03","canton":"Chantelle","commune":"Voussac","nom":"Voussac","type":"Maison forte","periode":"XV","histoire":"Trois châteaux à Voussac, le château de Chirat-Guerin , de Marzat et de la Motte Verger.                                MOTTE-VERGER, la maison forte, construite   par Regnaud de La  Motte. Elle est flanquée  de deux tours rondes d'angle, à toits coniques. C'est une famille de damoiseaux, les de la Mote qui, dès le XIV siècle, possédait La Motte Verger.  En 1411 Guibert de la Motte reconnaissait tenir des cens et rentes en la paroisse de Voussac. La famille de Louan  posséda La Motte Verger du XVIIe au XVIIIe siècle. Elle s'en dessaisit au profit des Gardien vers 1750. Au début   du XXe siècle, le domaine appartenait à la famille Besson.  MARZAT, le fief existait déjà au milieu du XIVe siècle, il appartenait  à la famille d'Avenières, dont  les membres étaient  dans   la région, et à Chirat-Guérin en particulier. Au cours des XVIIe et XVIIIe siècles,  la famille de Rollat  qui, en 1770, cède Marsat à la famille Boucaumont, dont les descendants sont propriétaires au  début du   XXe siècle. Après avoir appartenu au sénateur Jean Beaumont, Marzat fut acheté en 1981 par la famille Belair.                    CHIRAT-Guerin,  en 1300, Jehan de Murat, damoiseau, seigneur d'Avenières fief du sire de Bourbon. appartenait depuis longtemps à la famille   Bonnefoy, Les seigneurs d'Avenières, possessionnés aussi  à Etroussat, à Douzon, et au Pleix à Fleuriel, étaient encore seigneurs de Chirat-Guérin en 1414. Ils transmirent le fief par   alliance aux Blanc de Saulzet.  Jehan de Bellenaves seigneur de Chirat-Guérin en 1569. C'est aussi par alliances   successives que Marguerite de Bellenaves transmet à Guillaume de Vignacourt et sa descendance aux Bonneval, aux de Langlade puis aux Aumaîstre. Jean François Aumaistre porte la seigneurie en 1743, à son petit-fils Jean François de Bonnefoy et ce n'est qu'en 1896 qu'un de ses descendants, sans héritier,  en fit don à son neveu le vicomte Jean de Saint-Genys.  Chirat Guérin appartient à la famille d'Ussel qui, par alliance passe aux Saint-Genys. la famille de Bonnefoy qui le conserva jusqu'à la fin du XIXe siècle, cette famille a donné plusieurs maires à Voussac.","architecture":"Motte-Verger, du  XVIe siècle a remplacé cet ancien château très tôt abandonné,  le château actuel  a conservé les structures  de la maison forte. C'est un long corps de logis à rez de chaussée surélevé et étage, couvert d'un toit à croupe. Il est flaqué  de deux tours rondes d'angle, à toits coniques.     Marzat,  maison forte du XVe siècle apparaît encore dans le plan du bâtiment principal, flanqué d'un donjon  carré, dont l'accès était défendu par des fossés pleins d'eau. Un corps de bâtiment disposé en retour d'équerre,   permettant d'enfermer une petite cour intérieure, y a été adjoint au XVIIIe siècle. Le fief de Marzat existait déjà au milieu du XIVe siècle. \r\nChirat, au XIVe siècle, magnifique résidence. Privilèges seigneuriaux qui montrent l'importance de la place. Le château primitif était   déjà construit au début du XIIIe siècle,  du château de cette époque, il ne reste que quelques substructures ennoyés dans la construction actuelle  et trois tours rondes, dont la plus importante, couronnée de créneaux, domine de ses quatre étages les dépendances et surveille la vallée. Le château actuel  est composé d'un grand  corps de bâtiment de plan rectagulaire, il est flanqué, côté cour, de deux tours carrées en forme de pavillons, l'ensemble inspirée du XVIIIe siècle, est donnée par les ouvertures en façades Sud et Est, sur deux niveaux et niveau de comble, éclairé  par une série de lucarnes en toiture. Le château de Chirat-Guérin est situé à 3 km au sud-est du bourg, dont il est séparé par la forêt de Vacheresse.","habitants":"Famille de  Guibert de la Motte,         Famille d'Avenières\"","divers":"Châtreau de Chirat-Guerrin,  de Marzat et de la Motte-Verger à Voussac.","gps":"","images":["../../jctruffet.com/image/image_03/03_Voussac_1.jpg","../../jctruffet.com/image/image_03/03_Voussac_2.jpg","../../jctruffet.com/image/image_03/03_Voussac_3.jpg","../../jctruffet.com/image/image_03/03_Voussac_4.jpg"]},"Consult_chateau_formulaired119":{"id":"Consult_chateau_formulaired119","dept":"03","canton":"St-Pourcain-sur-Sioule","commune":"Ygrande","nom":"Ygrande","type":"Château","periode":"XV-XIX","histoire":"Trois châteaux à Ygrande ,Ygrande du XIXe siècle, la Forêt du XV-XIXe siècle chemin de rondes et tour  (Voir article Ygrande II), Pont-Lung du XV-XIXe siècle avec tours d'angles  et le manoir de Groslière du XVIIe siècle.                  YGRANDE, anciennement nommé  du Mont, fut construit en 1836 par le comte Eugène de la Roche. La famille et descendants de la Roche y vécurent jusquen 1910. Dès la fin de la première guerre mondiale, le nouveau propriétaire, Lemaire de Marne, entreprit des travaux importants. En 1925, le château fut acheté par la famille Souchard de la Voreille, riches propriétaires de grands vignobles bourguignons à Santenay et Pommard. Après le décès des parents de la Voreille en 1969, la fille cadette Chantal céda le château à  M. Bizet. Bizet vendit le domaine en 1983 à Roger Bardot, éleveur de chevaux islandais. Le château du Mont, son haras et ses 40 Ha restant furent finalement rachetés par monsieur et madame Tissier-Malergue afin dy ouvrir un château-hôtel, rebaptisé château dYgrande, du nom du village voisin. Des aménagements importants furent alors entrepris afin de mettre létablissement aux normes. Le château dYgrande, entièrement redécoré et remeublé, fut ouvert au public le 24 avril 1999 en hôtel restaurant.                       BELLEVUE, construit en 1881-1882, le château de Bellevue était à lorigine un établissement denseignement privé dirigé par les pères Jésuites. Il servira dhôpital pendant la première guerre mondiale. En 1946, il devient la propriété du département de lAllier.","architecture":"Ygrande au milieu dun parc et à côté du vieux château fortifié aujourdhui en ruines. A cette époque, le château était un corps de bâtiment moderne orné sur les côtés par des ailes élevées dun simple rez-de-chaussée recouvert dune terrasse. Des aménagements importants furent alors entrepris afin de mettre létablissement aux normes.  Demeure entièrement rénovée entreprit des travaux importants avec en particulier ladjonction des étages et toitures des deux ailes et des lucarnes de létage de service qui donnent au château son aspect actuel, et  aménagée avec raffinement, comprenant 16 chambres très confortables avec salles de bain individuelles modernes, meublé et décoré avec des objets anciens conservant son charme romantique,","habitants":"Famille de la Roche \"","divers":"Château des Mont à Ygrande","gps":"","images":["../../jctruffet.com/image/image_03/03_Ygrande_1.jpg","../../jctruffet.com/image/image_03/03_Ygrande_2.jpg","../../jctruffet.com/image/image_03/03_Ygrande_3.jpg","../../jctruffet.com/image/image_03/03_Ygrande_4.jpg"]},"Consult_chateau_formulaire989e":{"id":"Consult_chateau_formulaire989e","dept":"03","canton":"St-Pourcain-sur-Sioule","commune":"Ygrande","nom":"Ygrande-II","type":"Maison forte","periode":"XV","histoire":"GROLIERE, armoiries des De Bron et des Saint-Hilaire.                       FORET, les premiers seigneurs connus sont des la Forest ou Fourrest. Mais en raison d'une dette impayée, le fief est saisi à Guillaume la Forest par Louis, duc de Bourbon, en 1325, et vendu à un bourgeois de Paris Pierre Rény, trésorier du Roi. Vers 1367, les de la Forest reprennent possession de leur fief. En 1411, c'est Plotard de la Fourest, écuyer,  qui fait aveu, au duc de Bourbon, du lieu et hostel de La Fourest. La famille de la Fourest possède toujours le fief   en 1503 et c'est Jehan de la Fourest, écuyer, qui fait foi et hommage, à la duchesse de Bourbon, de son hostel et maison forte de La Fourest. Il appartiendra ensuite aux Esgrin de 1518 à 1614, puis de Bar, de la Souche, et aux Sarre, à la veille de la Révolution.  PONT-LUNG  De nombreuses familles nobles,  de la Faye, de Cluys,  des Barres, de Civray dit Chieux Agon,  de Giac, de Montfan et de Beaucaire, se partagèrent   jusqu'au début du XVIe siècle des fermes sur les terres de Rouri et de Pontlung. C'est  vers cette époque que les Racquet construisirent l'actuel château. En 1505,  Gilbert Racquet, licencié en droit, fit aveu des terres seigneuriales de Pontlung et de Fredde. Pontlung passa ensuite à d'autres familles bourbonnaises : les Crozet, de Bron, de Marcellange, de Saint-Georges, de Ligneris,et de Renon.","architecture":"Grolière, gentilhommière représentative des constructions de ce genre en Bourbonnais au début du XVIIe siècle. L'édifice se compose d'un corps de logis rectangulaire dont le rez-de-chaussée, élevé sur cave, est surmonté d'un étage, et qui possède une tour circulaire en saillie à l'angle. Sur la façade Est, les deux portes ont conservé des éléments de leurs anciens piédroits. Elles ont, comme les fenêtres, reçu des linteaux en arc surbaissé. Sur la moitié gauche de la façade, apparaît l'encadrement mouluré d'un tore de la porte primitive, dont le linteau est surmonté d'un bloc de calcaire sculpté d'un cartouche à enroulements, chargé d'un médaillon où sont figurées les armoiries des De Bron et des Saint-Hilaire. La tour circulaire présente, sous la fenêtre de l'étage, une pierre sculptée d'armoiries. Près du château se dresse le colombier carré qui a conservé quelques éléments d'encadrements anciens, ainsi qu'un vieux puit dont la margelle possède un appui mouluré.                             Fôret, bâtisse du XIXe siècle ayant remplacé un édifice médiéval dont il ne subsiste des fortifications qu'une tour et un mur la reliant au château. Cette tour circulaire, date du XVe siècle, est percée d'une porte et d'une meurtrière au sol, d'une porte de communication avec le chemin de ronde et d'une baie en plein cintre à l'étage.                Pontlung, de plan rectangulaire, à étage et grenier, est flanqué de quatre tours d'angle avec  une tour de façade à six pans, pour l'escalier. Les deux tours rondes de l'ouest ont été arasées pour aménager une terrasse. Au nord-est  du château, subsiste une curieuse construction à 2 tours qui paraît être le reste d'un château plus ancien qui était flanqué de plusieurs tours crénelées.","habitants":"Famille de la Fourest               Famille de Gilbert Racquet\"","divers":"Château de Grolière,  de la Forêt et de Pontlung à Ygrande","gps":"","images":["../../jctruffet.com/image/image_03/03_Ygrande_II_1.jpg","../../jctruffet.com/image/image_03/03_Ygrande_II_2.jpg","../../jctruffet.com/image/image_03/03_Ygrande_II_3.jpg","../../jctruffet.com/image/image_03/03_Ygrande_II_4.jpg"]},"Consult_chateau_formulairec1b7":{"id":"Consult_chateau_formulairec1b7","dept":"03","canton":"Yzeure","commune":"Yzeure","nom":"Yzeure","type":"Château","periode":"XVII","histoire":"Cinq châteaux à Yzeure;  châteaux  de Marcelange du XVII-XIXe siècle enceintes et tours, du Parc du XIXe siècle, de Joulet du XVIIe siècle, du Pouzeux du XVIe siècle avec tourelles et de Panloup pour ces trois deniers (voir article Panloup-Pouzeux).                    PARC, au XVe siècle une simple maison champêtre, relevant des bénédictines d'Yzeure, appelée Beaumanoir. En 1470, André  Brinon, successeur de Jean de la Goutte, l'acquit, mais ses enfants vendirent le domaine, en 1493, à Anne de  France. En mai 1505, c'est à Beaumanoir que Suzanne de Bourbon épousa son cousin Charles de Bourbon-Montpensier. Résidence accueillante, elle reçut à plusieurs reprises  François 1er lors de ses séjours à Moulins. Le château fut bien entretenu par ses capitaines-gouverneurs, jusqu'à ce que  le Bourbonnais entre dans les biens des princes de Condé qui laissèrent Beaumanoir péricliter au même titre que l'ancien château ducal de Moulins. Il fut acquis en 1740, par un imprimeur du Roi, Pierre Vernoy. Après avoir pris, au XVIe siècle le nom de Parc-lez-Moulins, le  château du Parc a remplacé celui de Beaumanoir, dont il ne reste plus que la base d'une tour qui flanquait à l'ouest le logis principal. BELLEVUE,  construit en 1881-1882, le château de Bellevue était à lorigine un établissement denseignement privé dirigé par les pères Jésuites. Il servira dhôpital pendant la première guerre mondiale. En 1946, il devient la propriété du département de lAllier, maison départementale des personnes handicapées.\r\nMARCELANGE, pas d'information historique à part qu'à la fin du XVe siècle Pierre Filhol était un descendant de la famille de Marcelange.","architecture":"Yzeure, au Moyen-Age, il y avait une maison forte, disparue, dite de « Pré Puttet » ou le « Champ Putet » datant du XIVe siècle et qui fut occupée jusqu'à la fin du XVIIe siècle. En 1633, est cité Antoine des Essars, sieur de Putay. La maison forte se trouvait au fond d'un vallon, le côté nord s'appuyant sur le ruisseau de la Rigollée. Elle se dressait sur une plate-forme rectangulaire fossoyée surélevée de 28 × 30 m10 construite à partir des matériaux de creusement des fossés. Les fossés en forme de U ont une largeur de 9 m et sont profonds de 1,60 m. Son organisation, nous est connu, des fouilles ont mis au jour, un mur d'enceinte de 0,80 m de large épousant le tracé de la plate-forme, une cour d'une superficie de 250 m2, qui s'étendait devant la maison forte et la présence d'une tour ronde de 5 m de diamètre. Un puits se trouvait au centre de la cour.                       Château; ancien château de Joulet, tour  du XVIIe siècle vestige d'un château. Ses briques sont appareillées en gros losanges tracés en briques noires sur briques rouges.","habitants":"Famille de  Jean de la Goutte\"","divers":"Château de Croissance, de Plaisance, du Parc, et du Marcelange à Yzeure","gps":"","images":["../../jctruffet.com/image/image_03/03_Yzeure_1.jpg","../../jctruffet.com/image/image_03/03_Yzeure_2.jpg","../../jctruffet.com/image/image_03/03_Yzeure_3.jpg","../../jctruffet.com/image/image_03/03_Yzeure_4.jpg","../../jctruffet.com/image/image_03/03_Yzeure_5.jpg","../../jctruffet.com/image/image_03/03_Yzeure_6.jpg","../../jctruffet.com/image/image_03/03_Yzeure_7.jpg","../../jctruffet.com/image/image_03/03_Yzeure_8.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','03 — Allier'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
</script></body></html>
