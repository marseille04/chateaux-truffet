ses boiseries et éléments de marbre qui sont classés historiques. Le parc a été redessiné à la même époque dans le même esprit.  Grand escalier de style Renaissance en marbre rose de 1895, les grands et petits salons sont séparés par des colonnes à chapiteaux corinthiens et décorés de stucs et de boiseries dans l'esprit du XVIIIe siècle.","habitants":"Famille de  Eustache de Monestay          Famille de Jacques Philippe de Lacôdre\"","divers":"Château de la Grillière","gps":"","images":["../../jctruffet.com/image/image_03/03_Grilliere_1.jpg","../../jctruffet.com/image/image_03/03_Grilliere_2.jpg","../../jctruffet.com/image/image_03/03_Grilliere_3.jpg","../../jctruffet.com/image/image_03/03_Grilliere_4.jpg"]},"Consult_chateau_formulaire85fb":{"id":"Consult_chateau_formulaire85fb","dept":"03","canton":"Escurolles","commune":"Hauterive","nom":"Hauterive_Allier","type":"Château","periode":"XIX","histoire":"Quatre châteaux  à Hauterives, des Cours du XIXe siècle, des Husseaux du XIXe siècle, du Grand-Domaine du XIXe siècle et Hauterives du XVIIIe siècle.      COURS, le commandant Gabriel Romon, officier des transmissions, ancien élève de l'École Polytechnique depuis 1925, dirige de 1940 à 1944 le principal centre du groupement des contrôles radio-électriques (GCR), installé au château des Cours à Hauterive, actuellement mairie d'Hauterives.              HAUTERIVES,  château du XVIIIe siècle   à l'origine une école d'officiers  de Cavalerie  vendu comme bien national à la Révolution , acheté en 1870 par Jacques de Chacaton et de madame   Cornubert de Saint-Aubin.                     HUSSEAUX, Le château semble avoir, dès sa construction, appartenu au marquis de Bouillé, mais fait comte en 1760, celui ci délaisse les Husseaux pour Rilhat.    Le GRAND-DOMAINE, pas d'élément historique.","architecture":"Cours, construit en 1849, converti en mairie en 1950.                         Grand-Domaine  mentionné en 1823,  bâtiments et deux maisons autour de deux  cours parallèles; de 1851 à 1860 destruction et transformation des maisons en château et communs par adjonction de corps de bâtiments. La façade principale nord-ouest se compose de bordure décorative formée de 4 rangs de briques rouges et noires avec des fenêtres rectangulaires à appuis rectilignes saillants et feuillures, une porte centrale  dans l'axe à encadrement de claveaux saillants. Toit d'ardoise et épis de faîtage. Témoignage de l'architecture bourgeoise  du XIXe siècle, cette demeure présente surtout de l'intérêt dans la mesure ou elle pourra s'insérer dans une étude concernant  les constructions de cette époque.    Husseaux, château construit après 1839, dans un domaine agricole mentionné comme ferme, après 1856, création d'un parc et d'un étang. Les deux maisons en rez-de-chaussée au sud-ouest du château  sont en pisé, matériau que l'on retrouve aussi partiellement et irrégulièrement sur les façades latérales de la grande grange-étable au sud-ouest. Le corps de logis principal est constitué de deux espaces rectangulaires  avec formes emboîtées, à deux niveaux et niveau de comble, épaulés en pignon par des pavillons de pieds carrés.  Les ouvertures ont suivies l'ordonnancement classique, rythmé au centre de la façade  par un avant-corps. Celui-ci, de forme rectangulaire, se termine par une terrasse entourée d'une balustrade de pierre.","habitants":"Famille de Jacques de Chacaton\"","divers":"Château de Cours, du Grand-Domaine, et de Husseaux à Hauterive sur Allier","gps":"","images":["../../jctruffet.com/image/image_03/03_Hauterive_Allier_1.jpg","../../jctruffet.com/image/image_03/03_Hauterive_Allier_2.jpg","../../jctruffet.com/image/image_03/03_Hauterive_Allier_3.jpg","../../jctruffet.com/image/image_03/03_Hauterive_Allier_4.jpg","../../jctruffet.com/image/image_03/03_Hauterive_Allier_5.jpg"]},"Consult_chateau_formulairee004":{"id":"Consult_chateau_formulairee004","dept":"03","canton":"Herisson","commune":"Herisson","nom":"Herisson","type":"Vestiges","periode":"XII","histoire":"Deux châteaux à Hérisson  dont les vestiges d'Hérisson et le château de la Roche Othon du XVIIe siècle, pas d'informations historiques.       HERISSON, la mission du château consistait à contrôler le gué de l'Aumance et à tenir en respect les auvergnats. Sous Archambault VII  au XIIe siècle, le château servit de refuge aux pillards de la région. Après la mise à sac du prieuré de La Chapelaude, Vulgrain, évêque de Bourges, interdit la célébration des offices dans la ville. Pendant la période anglaise, Henri Plantagenêt, vassal devenu Duc d'Aquitaine par son mariage avec Aliénor, puis Roi d'Angleterre, se livra à de multiples incursions dans le royaume de France et en Bourbonnais.  La libération du château eu lieu vers 1190, grâce à Guy de Dampierre, sire de Bourbon, et de son suzerain, le Roi de France, Philippe Auguste. En 1327 la baronnie fut érigée en duché. Le successeur du duc fut Pierre Ier, tué au cours de la bataille de Poitiers en 1356. Son fils Jean, lui succéda mais à la défaite d'Azincourt (1415), il fut fait prisonnier par les Anglais et emmené en Grande-Bretagne. Libéré en 1429, il mourut dans son Duché en 1434. A la restauration, le prince de Condé, étant  en sa possession, le légua au duc d'Aumale, son neveu. Par les Dreux-Brézé, puis les comtes  d'Irisson. Il vint entre les mains de M. Bignon restaurateur parisien, qui le légua au Touring-Club de France.              ROCHE-OTHON, en 1300 Jehans Troseboys tient le fief racheté au anglais en 1362 par les ducs de Bourbon le cèdent à Bertrand de la Bret sire de Malemort . En 1375 Pierre de Villelume, pris le nom de Roche-Othon au XVIIe siècle et il y fut installé les gascons de la famille d'Albret, il fut apporté par alliance à Antoine de Boitière chevalier en 1696 et passa en 1751 au comte de Fougières.  La propriété fut vendu comme bien national à la Révolution, devenu exploitation agricole.","architecture":"Hérisson, la cité existait déjà depuis le Ve siècle, mais ne devint une châtellenie qu'au XIIe siècle,  la forteresse  fut construite par les ducs de Bourbon entre les XIe et XVe siècles. Cette propriété des ducs de Bourbon fut prise par Louis XI au XVe siècle, puis reprise par les princes deux siècles plus tard, avant d'être démantelée par Mazarin. les imposantes ruines du château d'Hérisson surplombent la vallée de l'Aumance et l'ancien bourg fortifié. Les tours, les courtines, le donjon et le reste  du logis remontent au XIVe siècle. Le château fut démantelé en 1652.          La Roche Othon,  au XIVe siècle, le château fut le théâtre d'un épisode de la Guerre de cent-ans dont témoigne une inscription  dans la cour. L'édifice, remanié au XVIIe siècle sur une structure médiévale en partie conservée, est constitué par   un corps de logis,  avec deux bâtiments de communs entourant une cour intérieure,  le corps de logis est flanqué   d'un petit pavillon, l'ancien donjon arasé  au XVIIe siècle. Une tour carrée est engagée  à l'angle du bâtiment. La  façade nord et sa galerie en charpente a été plaquée sur le corps de logis au XVIIe siècle, les tours ont été arasées.   A l'intérieur le rez de chaussée et le 1er étage conservent plusieurs cheminées d'époque gothique ayant conservé leur polychromie, la porte de l'ancienne enceinte relie deux bâtiments d'exploitation. Du côté extérieur les restes d'une tour de flanquement rappellent la destination défensive de l'endroit.","habitants":"Duc de Bourbon Archambault II\"","divers":"Château de Herisson et la Roche Othon","gps":"","images":["../../jctruffet.com/image/image_03/03_Herisson_1.jpg","../../jctruffet.com/image/image_03/03_Herisson_2.jpg","../../jctruffet.com/image/image_03/03_Herisson_3.jpg","../../jctruffet.com/image/image_03/03_Herisson_4.jpg","../../jctruffet.com/image/image_03/03_Herisson_5.jpg","../../jctruffet.com/image/image_03/03_Herisson_6.jpg","../../jctruffet.com/image/image_03/03_Herisson_7.jpg","../../jctruffet.com/image/image_03/03_Herisson_8.jpg","../../jctruffet.com/image/image_03/03_Herisson_9.jpg"]},"Consult_chateau_formulairebaa7":{"id":"Consult_chateau_formulairebaa7","dept":"03","canton":"Huriel","commune":"Huriel","nom":"Huriel","type":"Forteresse","periode":"XV","histoire":"HURIEL, donjon de la Toque  sa construction  fût entreprise par la famille Humbaud d'Huriel.  Ses premiers seigneurs portent le nom  de leur terre, vassaux des sires de Bourbons, suite à l'alliance la seigneurie passe à Marguerite des Déols laquelle épouse Roger de Brosse  seigneur de Boussac, cette famille se distingue au service du roi, en 1390  Louis II de Brosse trouve la mort à Gênes, le fief passe à son fils Pierre, et reste dans cette famille jusqu'en 1512 vend à Jacques Hurault seigneur de Cheverny et de Vibraye, sa descendance cède en 1615 la seigneurie au marquis de Fourilles capitaine des gardes des  du corps de Louis XIII, en 1647 la seigneurie passe à Thomas  Lelièvre président du grand conseil qui le transmet à son tours en 1673 à Etienne  Jehannot de Bartillat érigée en Marquisat pour les descendants de cette famille Louis-François de Bartillat maréchal de camp et armée du roi, émigré en 1791, les biens  sous séquestre seront restitués à la famille qui s'en sépareront en 1843 au profit  de M. Delaunoy, puis laissé à l'abandon et depuis 1879 l'édifice propriété de la commune. Il est classé depuis 1885 Huriel est une ancienne ville close qui fut, autrefois, un lieu militaire stratégique qu'utilisèrent les Bourbons.","architecture":"Huriel, un donjon seigneurial  dernier vestiges du château fort de Humbaud,  date du XIIe siècle e siècle de forme rectangulaire de 12 m sur 6.  Ayant essentiellement une vocation défensive, c'est au XVe siècle, à la fin de la guerre de cent ans, que le donjon fût aménagé par Jean II de Brosse  pour devenir un lieu habitable.  Quatre tourelles sont construites  et reliées par un mur d'enceinte.  Le donjon est  bâti dans le granit dur de la région, il a une hauteur de 33 mètres , quatre étages  supérieurs. Au fur  et à mesure des années  et des changements de propriétaires,  les dépendances du château et l'enceinte seront laissées à l'abandon. A partir de 1770 et jusqu'en 1845, les fossés seront comblés peu à peu en raison des fièvres mortelles qu'ils entraînaient, le donjon fût classé monument historique en 1885. En 1903, d'importants travaux de restauration feront disparaître le toit à quatre pans. Il sera remplacé par une terrasse  qui permet d'admirer le paysage après avoir monté les quelques 105 marches qui y mènent. Des quatre tours d'angle, deux ont été restaurées, deux ont disparu. Plus connu sous le nom populaire de \"la Toque\", en raison de son ancienne toiture en forme de toque pointue, le donjon d'Huriel est un des rares donjons quadrangulaires français, vestige de l'ancien château des seigneurs, entouré de fossés jusqu'au milieu du siècle dernier, il est entièrement construit en blocs de granit régional. Quatre campagnes de construction seront nécessaires pour parvenir à ce que sera le château d'Huriel au temps de sa splendeur .","habitants":"Famille Humbaud d'Huriel\"","divers":"Forteresse d'Huriel.","gps":"","images":["../../jctruffet.com/image/image_03/03_Huriel_1.jpg","../../jctruffet.com/image/image_03/03_Huriel_2.jpg","../../jctruffet.com/image/image_03/03_Huriel_3.jpg","../../jctruffet.com/image/image_03/03_Huriel_4.jpg"]},"Consult_chateau_formulaire534f":{"id":"Consult_chateau_formulaire534f","dept":"03","canton":"Lapalisse","commune":"Isserpent","nom":"Isserpent","type":"Château","periode":"XVI-XIX","histoire":"Trois  châteaux à Isserpent,  de Beauplan du XIXe siècle, de Chateauroux du XIV-XVIIe siècles, et de Roux du XVIe siècle,  et à quelques kilomètres à l'ouest à St-Christophe le château de Belfait du XVIIIe siècle. Manoir de Chandan  du XIXe siècle. Les Brigauds, logis à toit à la Mansart, XVIIe siècle. Beauplan, maison bourgeoise avec parc du XIXe siècle.   LEchauguette est située à Isserpent, cette demeure du XIX° siècle chambres d'hôtes.                     BEAUPLAN, dans Beauplan, il existe encore une motte dite de la Grande Borne qui était certainement intégrée dans le  système défensif de la seigneurie d'Isserpent.  En 1503 l'écuyer Jacques Cluys, fait aveu à la duchesse de Bourbon de \"sa maison et grange des Botz Pleins. La demeure actuelle est une construction  du XIXe siècle due à M.Henri qui vendit le manoir en 1868 au Comte Thiollière. CHATEAUROUX, cette fortification du bas Moyen-Age a été précédée par une motte castrale circulaire, était un point stratégique suffisamment important pour avoir appartenu dès le début du XIVe siècle, à la puissante famille d'Isserpent, qui en fit aveu dès 1307. En 1468 le Seigneur de Chateauroux était Pierre de Mars, écuyer, membre de la famille des seigneurs de Balenne à Bost.  BELFAIT à Saint-Christophe, cette petite maison forte flanquée d'une tour carrée a probablement remplacé un établissement primitif. Le premier seigneur rencontré est, en 1300, Hugues Mit, damoiseau, marié à Catherine d'Isserpent, qui fit l'aveu de   sa terre au sire de Bourbon. Les descendants de cette famille conservèrent la terre et la seigneurie de Bellefaye tout  au long du XIVe siècle. Après avoir appartenu à la famille de Mars, elle fut vendue  en 1633 par Albert de Mars à  Jean de Bournat, écuyer, seigneur de Vinzelles. En 1791, l'alliance de Marie de Vaux à Pierre Jacques Forestier, ce dernier la laissa en viager  à François Givois, dont la famille la possédait encore au XIXe siècle.                              ROUX, pas d'information historique.","architecture":"Beauplan, cette fortification de terre de forme circulaire, entourée de fossés,  est d'un diamètre d'environ 30 mètres au niveau de la plateforme le logis s'est voulu néo-classique et sobre. Il consiste en un corps principal de plan   rectangulaire à deux niveaux, flanqué de deux pavillons d'angle à pignon et en retour d'équerre,  chaque   niveau est marqué depuis le rez-de-chaussée par un double bandeau de pierre, la toiture couverte d'ardoises est    éclairée de trois lucarnes et surmontée d'un petit clocheton.                           Châteauroux, cette maison forte est une construction du XIVe siècle. Elle se compose d'un corps de logis de plan rectangulaire élevé sur trois niveaux. Deux tours rondes deux tours tronquées et  le reste de logis en granit rose, XIIIe siècle, rebâti fin XVIe siècle, remanié au XVIIe. poivrières, flanquent la façade principale, l'une d'elles d'un diamètre plus réduit abrite un escalier à vis pour l'accès aux étages. L'ensemble était entouré de fossés, alimentés par un ruisseau   descendant  des collines. Des aménagements de la fin du XVe siècle et du début du XVIe siècle ont laissé 2 petites  échauguettes en tourelles d'angle, remaniées dans les transformations postérieures et quelques ouvertures à meneaux.","habitants":"Famille d'Isserpent\"","divers":"Château de Beauplan, de Châteauroux de Roux et l'Echauguette à Isserpent.","gps":"","images":["../../jctruffet.com/image/image_03/03_Isserpent_1.jpg","../../jctruffet.com/image/image_03/03_Isserpent_2.jpg","../../jctruffet.com/image/image_03/03_Isserpent_3.jpg","../../jctruffet.com/image/image_03/03_Isserpent_4.jpg"]},"Consult_chateau_formulairebdf8-2":{"id":"Consult_chateau_formulairebdf8-2","dept":"03","canton":"Jaligny-sur-Besbre","commune":"Jaligny-sur-Besbre","nom":"Jaligny_Lonzat","type":"Château","periode":"XIII-XVI","histoire":"Deux châteaux à Jaligny sur Besbre dont celui de Jaligny du XIII-XVIe siècles avec tours et de Lonzat du XIII-XVe siècle.                                   JALIGNY, en 1289 à Robert III comte de Clermont, le petit fils de ce dernier gouverneur du dauphin, le futur Charles VI est à l'initiative de la reconstruction  du château en 1403. A la mort du second fils Guichard dauphin  tué à la bataille d'Azincourt en 1415 le fief échoit  à Blanche Dauphine épouse de Jean de l'Espinasse grand conseille du duc de Bourbon, Guyon seigneur de Ravel époux de Françoise de l'Espinasse qui porte le fief à son mari  Gui d'Amboise qui construisit le logis central sera poursuivie par les La Rochefoucault Barbezieux héritiers de Jaligny au début du XVIe siècle, et en 1545 Charles de Chabannes  récupère  le fief qui passe ensuite à la famille  de Tournon et de la Guiche de Saint-Géran et en 1682 Bernard de la Guiche s'en sépare au profit de Jean-Baptiste Larchier conseiller à la cour, lui succède trois ans après Marie de Marmande veuve de Charles Guillaud de la Motte lieutenant général des armées  sa petite-fille Marie Séraphine Guillaud de la Motte  épouse Pierre-François Montlaur de Barral  marquis de la Bastie d'Arvillard en 1764, puis au début du siècle aux de Montlaur par le mariage de Marie Emma Augustine de Barral avec le comte Georges de Villardi de Montlaur. Il appartient toujours à cette famille.\r\nLONZAT, nombreux furent les propriétaires. En 1918, Albert Advenier s'en porta acquéreur et il restera dans la famille jusqu'en 1996. il appartient maintenant à M.et Mme Joël Poix.","architecture":"Jaligny, avec ses tours de pierres blanches , son porche fortifié, sa cour intérieure aux tourelles polygonales, ses fenêtres et ses lucarnes à meneaux de pierres, demeure du XVe siècle ayant subi d'importantes restaurations au XIXe siècle, l'édifice est constitué par un corps de bâtiments flanqué à l'ouest de deux grosses tours rondes qui représentent, comme la poterne, une partie des vestiges de la forteresse et à l'est de deux tours polygonales du XVe siècle contenant les escaliers à vis. Celle du  sud est surmontée d'un palmier d'ogives. Un avant-corps au sud-est de la demeure marque l'emplacement d'une ancienne chapelle  construite au XVIIe, lorsque celle du château  devint église paroissiale. La poterne se compose  de 2 tours à 3 niveaux  précédant un châtelet dans lequel montait et descendait une herse. Un petit pont à balustrade remplace l'encorbellement sur mâchicoulis entre les deux tours percées d'archères, les ouvertures ont été agrandies au XVe siècle. \r\nLonzat, la Gentilhommière à été construite à la fin du XVIe siècle. surfaces des cours  et jardins forment un ensemble équilibré et harmonieux. Bâtiments  et décors furent complétés  au XIXe siècle dans l'esprit  du siècle précédent. Le rajout des tourelles angulaires  sur la façade postérieure donne au Lonzat une originalité de composition unique dans la région. Il comprend deux tours carrées en chicane, aux petites ouvertures et au toit à pavillon, deux rangées de communs au toit brisé à la Mansart qui mènent au perron du logis à deux niveaux dont les fenêtres ont été élargies au XVIIIe siècle. A l'arrière de ce corps de logis, placées en quinconce aux angles, s'élèvent deux tours carrées au toit à croupes. Au milieu, une tour carrée est coiffée d'un toit à croupes en ardoise, refait au XIXe siècle.","habitants":"Famille de Charles de Chabannes \"","divers":"Château de Jaligny et de Lonzat  à Jaligny.","gps":"","images":["../../jctruffet.com/image/image_03/03_Jaligny_Lonzat_1.jpg","../../jctruffet.com/image/image_03/03_Jaligny_Lonzat_2.jpg","../../jctruffet.com/image/image_03/03_Jaligny_Lonzat_3.jpg","../../jctruffet.com/image/image_03/03_Jaligny_Lonzat_4.jpg","../../jctruffet.com/image/image_03/03_Jaligny_Lonzat_5.jpg","../../jctruffet.com/image/image_03/03_Jaligny_Lonzat_6.jpg","../../jctruffet.com/image/image_03/03_Jaligny_Lonzat_7.jpg","../../jctruffet.com/image/image_03/03_Jaligny_Lonzat_8.jpg"]},"Consult_chateau_formulaire0dc6":{"id":"Consult_chateau_formulaire0dc6","dept":"03","canton":"Gannat","commune":"Jenzat","nom":"Jenzat","type":"Château","periode":"XIII","histoire":"JENZAT, au Xe siècle, fief des comtes d'Auvergne passa au XIe siècle au Chatard, aux Gannat, ce fief fut ensuite réuni à la seigneurie des Bourbon. Les premiers seigneurs de Jenzat sont mentionnés dès le XIIe   siècle, ils vendirent leurs droits et domaines  en 1241 à Archambaud VIII de Bourbon puis Pierre de Bourbon l'échangea  avec la moitié de la châtellenie de Vichy en 1344, après plusieurs scissions et regroupements,  par mariage, le château arriva à la famille d'Aubigny  qui reconstruisit une nouvelle demeure  au milieu du XVe siècle  qui le conserve jusqu'en 1651, racheté en deux parties par Gilbert de Champfeu et par alliance dans sa descendance passa aux Montmorin, aux Chabannes  dans la seconde moitié du XVIIIe siècle. En 1744 Jenzat est vendu à la famille de Jouhannel, Jean-Baptiste de Jouhannel chevalier, conseiller au parlement de Paris fit construire le deuxième château en 1760  est aussi de sa descendance  les du Corail et les Roquefeuil qui l'habitent toujours.","architecture":"Jenzat,  Trois châteaux successifs : château primitif du XIIIe siècle avec tour ronde, second château des XIVe et XVe siècles,  château classique seconde moitié du XVIIIe siècle, château entre 1760  et 1780. Fermant le jardin à la française,  le château classique  offre un plan massif  avec deux avant-corps latéraux, à deux niveaux, il est coiffé d'un toit à la Mansart abritant un étage de combles et percée d'élégantes ouvertures il  a conservé son jardin à la Française.","habitants":"Famille d'Aubigny\"","divers":"Château de Jenzat","gps":"","images":["../../jctruffet.com/image/image_03/03_Jenzat_1.jpg","../../jctruffet.com/image/image_03/03_Jenzat_2.jpg","../../jctruffet.com/image/image_03/03_Jenzat_3.jpg","../../jctruffet.com/image/image_03/03_Jenzat_4.jpg"]},"Consult_chateau_formulaire3632":{"id":"Consult_chateau_formulaire3632","dept":"03","canton":"Lapalisse","commune":"Lapalisse","nom":"La_Palice","type":"Château","periode":"XII-XVIII","histoire":"LA PALICE, Le château et la seigneurie de la Palice appartenaient en 1230 à Roger de la Palice, damoiseau. En 1257 à Guillaume de la Palice qui était marié à Arembord de Chazeul. En 1293, le seigneur était Pierre de la Palice. Sa veuve, Isabeau de Ternant, se remaria avec Philippe de Malleval, chevalier, et Marguerite de l'Espinasse, épouse de Jean de Châtillon. La fille de cette dernière Jeanne de Châtillon marié en seconde noce  à Louis de Culan amiral de France  vendit la Palice  en 1429, à Charles de Bourbon comte de Clermont,  qui gérait le duché en l'absence de son père fait prisonnier à la bataille d'Azincourt, vendit, le 18 mars 1430, le château et la châtellenie de la Palice à Jacques Ier de Chabannes, conseiller et chambellan du roi Charles VII. Son fils Geffroy Maréchal de la Palice.  Ce château  est habité aujourd'hui par  la même famille. A la mort de Chabannes.  Jacques II en 1525 passa le château à sa veuve  Marie de Melun, le fils du maréchal Charles meurt au siège de Metz en 1552, le château passe à sa fille Eléonore qui épouse Just de Tournon comte de Roussillon en 1564 puis Philibert de la Guiche en 1571, seigneur de Saint-Gérand, sa première fille  épousa Jean-François de la Guiche maréchal de France,  le château restera dans cette famille jusqu'au XVIIIe siècle. En 1695 Le dernier  de la Guiche lègue le château à ses cousins Rohan-Soubise qui le vendirent en 1715 à l'intendant des finances  Gilles Brunet d'Evry, qui le fit passer en Marquisat  et en   1731 s'en sépare au profit de François-Antoine comte de Chabannes-Poinsat  descendant d'une branche cadette de la famille, officier du roi. le château est la propriété aujourd'hui de la comtesse Etienne de Chabannes la Palice.","architecture":"La Palice,  en 1461, construction de la chapelle sur un édifice plus ancien (XIIIe siècle), avec remploi de la courtine et de la tour d'un ancien rempart. Le grand logis Renaissance à parements de briques relie la chapelle et le château primitif; son portail, également de style Renaissance, est un pastiche du XIXe siècle. Le château féodal, remanié au XIXe siècle, a conservé trois de ses tours ainsi que les courtines qui les relient à l'ouest et au nord. Les remparts, de la première moitié du XIIIe siècle, ont été complétés au XIVe siècle. A l'intérieur, le salon du rez-de-chaussée a conservé un très beau plafond à caissons carrés, chacun inscrit dans un losange, décorés de fleurons et enroulements végétaux. Le grand salon, au sud du précédent, est également décoré d'un plafond à caissons. Au premier étage, la salle des tapisseries possède un plafond Renaissance formé de caissons en étoile.  A une centaine de mètres du château, se trouvent les communs et les anciennes écuries datant du XVIe siècle.  \r\nle maréchal fit construire au début du XVIe siècle l'aile Renaissance en briques roses qui allie la sobriété à l'élégance. Elle remplaçait ainsi la muraille qui reliait le château fort à la chapelle de style gothique, bâtie elle-même vers 1470. Cette chapelle devait par la suite servir de tombeau aux membres de la famille Chabannes.","habitants":"Famille de Roger de la Palice\"","divers":"Château de la Palice à Lapalisse","gps":"","images":["../../jctruffet.com/image/image_03/03_La_Palice_1.jpg","../../jctruffet.com/image/image_03/03_La_Palice_2.jpg","../../jctruffet.com/image/image_03/03_La_Palice_3.jpg","../../jctruffet.com/image/image_03/03_La_Palice_4.jpg","../../jctruffet.com/image/image_03/03_La_Palice_5.jpg","../../jctruffet.com/image/image_03/03_La_Palice_6.jpg","../../jctruffet.com/image/image_03/03_La_Palice_7.jpg"]},"Consult_chateau_formulaire94c1":{"id":"Consult_chateau_formulaire94c1","dept":"03","canton":"Huriel","commune":"Mesples","nom":"Laleuf","type":"Château","periode":"XVI","histoire":"LALEUF, en 1503, Guillaume des Aiges, écuyer, fait aveu à la duchesse de Bourbon de \"sa maison  de Laleu, à pont-Levys. Le fief est important. Au XVIe siècle, le fief passe à la famille de  Louan de Courçais. En 1723,  il est vendu  à Vincent Soumars, puis aux  Catherineau de Barmont. Au XIXe  siècle, en est possesseur le maître-verrier montluçonnais  Alexandre Duchet qui le cède aux La Tour Fondue.","architecture":"Laleuf, un château primitif a dû exister, comme en témoigne la toponymie, avec un Bois de la Motte.  Des canaux au carré sont encore visibles dans un bosquet à proximité du château actuel. Laleuf est un manoir  de la fin  du XVe siècle, avec deux tours rondes aux angles et  des fenêtres à meneaux. La cour intérieure est limitée vers le sud-est par un autre bâtiment et une grosse tour d'angle.","habitants":"Famille de  Louan de Courçais\"","divers":"Château de Laleuf à Mesples","gps":"","images":["../../jctruffet.com/image/image_03/03_Laleuf_1.jpg"]},"Consult_chateau_formulairea534":{"id":"Consult_chateau_formulairea534","dept":"03","canton":"Montet","commune":"Le Montet","nom":"Laly","type":"Maison forte","periode":"XV","histoire":"LALY, dans la tradition locale, Laly a conservé l'appellation de château, mais il semble bien que ce lieu soit la maison forte du Montet, confirmé en mars 1505 par Gaspard le Bret, seigneur de Bellabre, de Gramont et du Montet dont il détient la justice haute, moyenne et basse. Cependant Gaspard le Bret ne paraît pas être le seul seigneur du Montet, puisqu'en 1503, Françoise de Rousset, rend hommage de la moitié, par indivis, de la terre et seigneurie du Montet, en maisons. Ses plus anciens propriétaires connus, les Gaulmyn, appartenaient à l'entourage des ducs de Bourbon, qui s'appuyaient  de  leur pouvoir, sur des juristes qu'ils récompensaient par des dons de terres. Le château de Laly a appartenu, pendant de longues années, à la famille Gaulmin. une ancienne chapelle conserve le souvenir du mariage de M.Th Gaulmyn avec le seigneur de la Motte d'Aspremont en 1744. La beauté de la situation et des volumes des bâtiments fait de cet ensemble un des plus remarquables du canton du Montet.","architecture":"Laly, les bâtiments, restaurés au XIXe siècle, sont constitués d'un corps de logis de plan rectangulaire, à deux niveaux et niveau de comble, flanqué aux angles  de deux pavillons carrés en retour  d'équerre. Les ouvertures, qui se  veulent symétriques, sont ornées  de linteaux à arc surbaissé, alors que les combles, couverts d'un toit à croupes, s'éclairent de quelques lucarnes. Plutôt qu'un château, ainsi qu'il est nommé habituellement, Laly constitue une maison bourgeoise entourée de dépendances agricoles. Au surplus de ces informations nous pouvons ajouter que le château de Laly avait un pavillon de chasse à l'époque où il appartenait à la famille Camus. Celui-ci était situé dans l'ancien Bois de Sceauve sur la commune de Chavenon. Ce pavillon de chasse appelé Saint-Hubert a été séparé par partage  du château de Laly au XIXe siècle. Par agrandissement et adjonction d'un parc Treyve, il est devenu lui aussi au XIXe siècle un manoir qui est occupé depuis 2006 par un monastère orthodoxe.","habitants":"Famille de Gaspard le Bret\"","divers":"Château de Laly à le Montet","gps":"","images":["../../jctruffet.com/image/image_03/03_Laly_1.jpg","../../jctruffet.com/image/image_03/03_Laly_2.jpg"]},"Consult_chateau_formulaire0630":{"id":"Consult_chateau_formulaire0630","dept":"03","canton":"Herisson","commune":"Le Brethon","nom":"Le_Brethon","type":"Château","periode":"XV-XVI","histoire":"Trois châteaux à le Brethons, des Gouts du XVIIIe siècle trois tours, de Mazières du XIIIe siècle et du Montais du XV-XVIIIe siècle avec tours.            GOUTS, pas d'historiques Transformé en hôtel restaurant.                MAZIERES, en 1268, Agnès de Bourbon fait donation à Hugueni le Morgat du mas de Mazières en accroissement du fief qu'il tient déjà d'elle.  A la fin du XVe siècle, il appartenait à noble Pierre Dubouys, écuyer. En 1503, la terre a encore changée de  mains et c'est Loys de Chiez, écuyer, qui reconnait tenir de la duchesse de Bourbon le lieu noble de Mazières. La situation en limite de forêt du château et les comportements de l'un de ses possesseurs, un sieur des Mazières. Salonne au XVIe siècle, est un hydronyme pur.                      MONTAIS, les seigneurs de la Pierre et de Valigny à Meaulne étaient également  seigneurs du Montais. La terre fut longtemps le fief des familles Château, Descout et de la Grange. En 1697, le Montais est la propriété de Denis de la Grange, écuyer, qui laissa une succession si embrouillée  que la terre fut saisie.","architecture":"Gouts, l'accès à cet ensemble rural ceint de murailles entourées de fossés, avec trois tours à toits tronqués, dont l'une servait  de chapelle, se fait par un porche daté de 1603. Il était autrefois entouré de fossés et possédait sa propre chapelle. Mais la maison d'habitation est moderne. A côté s'élève une autre grande maison bourgeoise d'époque récente.      Mazières, château féodal  était à l'origine entouré de fossés qui ont subsisté jusqu'au XIXe siècle.  Le château fut endommagé  lors des guerres de Cent Ans, de Religions et de la Fronde.  Au cours des XVIe et XVIIe siècles, le vieux château fut transformé en demeure plus agréable. Le corps de  bâtiment fut agrandi de deux ailes perpendiculaires  servant de communs et de logements pour le personnel.   A chaque angle extérieur des pavillons, se levait une tour ronde avec meurtrière à arquebuse. Le donjon et   une partie des bâtiments ont été détruits à la fin du XIXe siècle, et il ne reste  que deux tours à toit tronqué.                  Montais,  du XV au XVIe siècle, eut à subir bien des épreuves au cours de son histoire. Une forteresse médiévale  à double enceinte s'élevait en ces lieux sur une motte fossoyée. Elle fut saccagée lors de la Ligue, détruite par des incendies, et elle resta longtemps à l'abandon.  Le château fut reconstruit  au XVIIIe siècle. On peut voir encore aujourd'hui, autour d'une cour à puits octogonal, l'ancien manoir pourvu de tours d'angle à meurtrières, les bâtiments d'une maison  typiquement bourbonnaise, le donjon en partie restauré et sauvé de la ruine par des propriétaires amoureux de vieilles pierres. Le porche est daté de 1625. Gites de France.","habitants":"Famille de Pierre Dubouys             Famille de Denis de la Grange\"","divers":"Château du Gouts, de Mazières et de Montais à le Brethon","gps":"","images":["../../jctruffet.com/image/image_03/03_Le_Brethon_1.jpg","../../jctruffet.com/image/image_03/03_Le_Brethon_2.jpg","../../jctruffet.com/image/image_03/03_Le_Brethon_3.jpg","../../jctruffet.com/image/image_03/03_Le_Brethon_4.jpg","../../jctruffet.com/image/image_03/03_Le_Brethon_5.jpg","../../jctruffet.com/image/image_03/03_Le_Brethon_6.jpg"]},"Consult_chateau_formulaire11aa":{"id":"Consult_chateau_formulaire11aa","dept":"03","canton":"Lurcy-Lévis","commune":"Lurcy-Lévis","nom":"Levis_Neureux","type":"Château","periode":"XV-XVII","histoire":"LEVIS, les châteaux et maisons des sires de Poligny, Béguin et Neureux, passe aux La Porte seigneur de Bannegon  en indivis à deux filles, dont l' une épouse des de Barres , l'autre , Jean de Châteaumorand réuni le fief qui en 1422 passe  aux Levis par alliance d'Agnès fille de Jean avec Brémond de Lévis, prit le nom et titre de baron de Charlus et de Poligny, restera dans cette famille jusqu'en 1723   date à laquelle Levis est érigée en Duché-Pairie, Le dernier mâle des Levis décède en 1734 l'héritage revient à l'une de ses filles  qui épouse en 1738 le marquis de Castries  et qui le revent en 1752 à Jacques de Hardouin Mansards de Sagonne, le château est saisi en 1759 adjugé à  André de Sinety  gouverneur des enfants de France et a  madame Greffulhe aux Castellane  il fut acheté par monsieur Fould dont la fille épousa monsieur Thuret, puis par alliance avec la fille de Mr Thuret passa au comte  Waldner de Freundstein, par cette famille Levis entra dans une famille noble d'Alsace.  \r\nNEUREUX, ancienne propriété du Roi Louis XV, En 1301, Guillaume d'Aubigny  en rendit aveu. La famille le conserva  jusqu'au XVIIe siècle. Il passa ensuite  de main en main  jusqu'à sa confiscation, en 1751, par le Roi et devint la résidence d'officiers des finances.  En 1783, André de Sinety se porta acquéreur du château et des terres et les réunit à son domaine. Aujourd'hui hôtel restaurant, chambres d'hôtes Ce couple de hollandais  Roland Kerbosch est un ancien producteur de cinéma et Valérie une ancienne danseuse étoile d'Amsterdam  a eu le coup de foudre pour cette propriété, acquit en 2008.","architecture":"Levis, c'était une véritable forteresse, avec un grand nombre de tours et  tourelles. Une seule subsiste au niveau de l'enceinte. Après un incendie en 1744, le château fort fut  reconstruit  par Mansart de Jouy. Les deux pavillons d'angle datent de cette époque. Le pavillon central et les escaliers des deux façades ont été construits vers 1880. Aujourd'hui, c'est une grande construction à l'ordonnance classique, aux nombreuses fenêtres et lucarnes. L'entrée se fait par un escalier à double révolution, accolé au pavillon central, demeure du XVIIe siècle édifiée à l'emplacement de l'ancienne forteresse de Poligny, dont l'intérêt tient à la composition de l'ensemble, constitué d'une grande cour précédant le château avec des communs de chaque côté, les deux pavillons d'entrée, la chapelle, le château, le pont d'entrée franchissant des douves sur plan semi-circulaire, ainsi que les plantations de tilleuls. Le château se compose d'un corps central flanqué de deux ailes. A l'intérieur, quelques cheminées d'époque et une tapisserie d'époque François Ier.    Neureux  château avec tours aux angles dont deux ont été arasées, est le bâtiment le plus ancien de la commune de Lurcy. Ses domaines s'étendaient également sur Couleuvre. Il a entièrement été transformé au XVIIIe siècle.  C'est aujourd'hui un grand bâtiment à deux niveaux et niveau de comble,deux tours rondes aux angles de la façade. Les nombreuses ouvertures sur les deux façades, disposées symétriquement, selon l'ordre néo-classique, sont   à linteaux  à arc surbaissé. Autant de lucarnes à jambages et  frontons de pierre éclairent les combles.","habitants":"Famille de Brémond de Lévis            Famille d'André de Sinety\"","divers":"Château de Levis et de Neureux à Lurcy-Levis","gps":"","images":["../../jctruffet.com/image/image_03/03_Levis_Neureux_1.jpg","../../jctruffet.com/image/image_03/03_Levis_Neureux_2.jpg","../../jctruffet.com/image/image_03/03_Levis_Neureux_3.jpg","../../jctruffet.com/image/image_03/03_Levis_Neureux_4.jpg","../../jctruffet.com/image/image_03/03_Levis_Neureux_5.jpg","../../jctruffet.com/image/image_03/03_Levis_Neureux_6.jpg","../../jctruffet.com/image/image_03/03_Levis_Neureux_7.jpg","../../jctruffet.com/image/image_03/03_Levis_Neureux_8.jpg"]},"Consult_chateau_formulaire268e":{"id":"Consult_chateau_formulaire268e","dept":"03","canton":"Jaligny-sur-Besbre","commune":"Liernolles","nom":"Liernolles","type":"Château","periode":"XV-XVIII","histoire":"Trois châteaux à Liernolles, Foret de Viry du XVe siècle, Mithiers vestiges du XVIIIe siècle et de Valtan du XIXe siècle de style gothique.                     FORET de VIRY,  en 1350 Oudry de la Forêt époux de Jeanne de Vichy et seigneur de la Motte en Chapeau, son petit fils  en 1411, le seigneur de La Forêt, Adrien de la Forêt, est uni avec une demoiselle Champropin de Chambord.  A sa mort  en 1428, La Forêt passe à sa fille Catherine, épouse de Philippe de Putay. Leur fille Jeanne en hérita. Elle était mariée à Guillaume de Viry, la  terre fut élevée au rang de baronnie en 1450. Cinquante années plus tard, en 1503, c'est Loys de Viry, écuyer, qui est seigneur de la Forêt. Il fait aveu à la duchesse de Bourbon de sa seigneurie de la Fourest. En 1612, Jean de Viry laissant douze enfants, le fief revient à l'aînée, Claudine, mariée à Jean Turpin de Laya. Il en fut saisi en 1635 au profit de Jean Riquier. En 1657, il le vendit à Gilbert Vialet, président trésorier de France à Moulins. La Forêt changea par la suite de propriétaires, elle passa successivement par alliance aux le Gendre, marquis de Saint-Aubin-sur-Loire, et en 1727 après avoir été occupé pendant plusieurs années par Alexis Robert, seigneur de la Motte-Mourgon, aux Pâris de Montmartel issu d'une famille de financiers et après la mort d'Adrien Pâris marquis de Brunoy la Forêt revient à l'un de ses cousins Jean Micault de Courbeton, ensuite plusieurs changements et il fut finalement acheté en 1832 par Henri de Sampigny qui le détient pendant un siècle est acquis par les propriétaires actuel les Jacquelot de Chantemerle de Vilette.                   MITHIERS, en 1503, un Martin Bouer, dit Frétis, fait aveu à la duchesse de Bourbon des trois pars du fief de  Frétis des Mithiers et des Vernois et du boys de la Grolière. Siège d'une communauté, les Mithiers appartenaient en 1721 à Charles Meilheurat. \r\n VALTAN Sur une colline au-dessus du Roudon, M. Joanny Clayeux a fait construire, au milieu du XIXe siècle.","architecture":"Forêt de Viry, édifice composé d'un corps de bâtiment principal flanqué vers l'ouest de deux tours rondes et vers l'est de deux tours carrées prises dans de courtes ailes en retour.  \r\nMithiers, Il ne reste de l'ancienne maison forte  qu'un pigeonnier du XVe siècle, de plan carré. Aujourd'hui transformée en logement annexe, la tour à deux niveaux est coiffée d'un toit à quatre pans. Dans la cour, une maison à pavillon a remplacé les anciennes constructions. Au sud de la maison d'habitation, il  subsiste un tertre de plan quadrangulaire de 40 mètres de côté, qui servait de base à l'ancienne maison forte, il était protégé par un fossé de neuf mètres de largeur.            Valtan, un petit château moderne composé d'un logis quadrangulaire, flanqué aux angles de la façade principale de   deux tours circulaires. Au centre de cette même façade, un avant corps rectangulaire s'élève au dessus de la corniche et forme une tour engagée dans la toiture. Les chaînages d'angles, les encadrements de portes, des fenêtres, les lucarnes sont en pierres rouges de la région.","habitants":"Famille de Loys de Viry                Famille de Frétis des Mithiers          Monsieur  Joanny Clayeux\"","divers":"Château de la Fôret de Viry, de Mithiers et de Valtan à Liernolles","gps":"","images":["../../jctruffet.com/image/image_03/03_Liernolles_1.jpg","../../jctruffet.com/image/image_03/03_Liernolles_2.jpg","../../jctruffet.com/image/image_03/03_Liernolles_3.jpg","../../jctruffet.com/image/image_03/03_Liernolles_4.jpg","../../jctruffet.com/image/image_03/03_Liernolles_5.jpg","../../jctruffet.com/image/image_03/03_Liernolles_6.jpg","../../jctruffet.com/image/image_03/03_Liernolles_7.jpg"]},"Consult_chateau_formulaire90c4":{"id":"Consult_chateau_formulaire90c4","dept":"03","canton":"Moulins","commune":"Montilly","nom":"Logeres","type":"Château","periode":"XIX","histoire":"LOGERES, l'augère  était suzerain d'une dizaine d'arrière vassaux. La famille de Laugère paraît s'être installée ensuite à Agonges au château duquel elle donna son nom.  Laugère à Montilly entra en possession d'une famille d'Aubigny, dont la dernière représentante avait  épousé Simonin  Guérillon qui prêta hommage en son nom en 1350  puis en 1367.   Un avocat moulinois y habitait en 1666. A la Révolution, le seigneur de Laugère était Pierre Legros, également propriétaire de La Queune à Neuvy, guillotiné comme ses voisins le 31 décembre 1793 à Lyon.","architecture":"Laugère se présentait alors comme une maison de plaisance   sur motte fortifiée et entourée de douves en eau. Le château actuel fut construit au XIXe siècle et agrémenté d'une chapelle néoromane, il est constitué d'un corps de logis à deux niveaux  et niveau de comble, avec rez de chaussée surélevé. Deux tours rondes à trois niveaux flanquent les angles de la façade, toits en poivrières.","habitants":"Famille de Laugère\"","divers":"Château de la Logères à Montilly","gps":"","images":["../../jctruffet.com/image/image_03/03_Logeres_1.jpg","../../jctruffet.com/image/image_03/03_Logeres_2.jpg"]},"Consult_chateau_formulaire280c":{"id":"Consult_chateau_formulaire280c","dept":"03","canton":"Montluçon","commune":"Marcenat","nom":"Lonzat","type":"Château","periode":"XII-XIX","histoire":"Dans la commune de Marcenat deux châteaux Lonzat du XIXe siècle et Rondet du XIXe siècle.                                  LONZAT, le château du XIIe siècle, possession des d'Arfeuilles fut démoli en 1880, à l'exception de la tour nord très remaniée. Sur son emplacement, le comte d'Arfeuilles fit construire la demeure actuelle dans le style néo gothique, sur les plans  de Jean Moreau. Bâtie sur  une éminence, la façade ouest domine la vallée de l'Allier.                  RONDET, pas d'information historique.","architecture":"Lonzat,  le château présente un plan en L, à un étage et  combles aménagés en surcroît. Il est flanqué à l'angle nord est de la tour circulaire du XIIe siècle, couronnée d'un chemin de ronde sur mâchicoulis et coiffée d'une    poivrière terminée d'un lanternon. L'angle nord-ouest  est occupé par une tourelle ronde contenant, au rez de chaussée, la première travée d'une chapelle qui se poursuit vers le nord par un chevet à pans. L'entrée  s'ouvrait primitivement au centre de la façade ouest mais elle fut reportée au XXe siècle au pied d'un pavillon carré accolé à l'angle sud du château. La façade postérieure est animée par une aile en retour terminée par  un mur pignon; elle forme un angle rentrant dans lequel est logé un porche surmonté d'une terrassé a garde corps ajouré. Dans l'autre angle, formé par la jonction de cette aile et du pavillon sud, s'élève une tourelle.                        Rondet; du XIXe siècle.","habitants":"Famille des Arfeuilles\"","divers":"Château de Lonzat à Marcenat","gps":"","images":["../../jctruffet.com/image/image_03/03_Lonzat_1.jpg","../../jctruffet.com/image/image_03/03_Lonzat_2.jpg","../../jctruffet.com/image/image_03/03_Lonzat_3.jpg","../../jctruffet.com/image/image_03/03_Lonzat_4.jpg","../../jctruffet.com/image/image_03/03_Lonzat_5.jpg"]},"Consult_chateau_formulaire4f91":{"id":"Consult_chateau_formulaire4f91","dept":"03","canton":"St-Pourcain-sur-Sioule","commune":"Louchy-Montfand","nom":"Louchy_Montfand","type":"Château","periode":"XV-XIX","histoire":"Trois châteaux à Louchy-Montfand dont celui de Montfand du XV-XVIIIe siècle, de la Motte- Baudreuil du XVI-XIXe siècles ( Voir Article) et celui de la Croix XVIIIe siècle.                                MONTFAND, pas d'information historique, Musée de la Vigne et du Terroir          La CROIX, au XVIIIe siècle, le domaine de la Croix était la propriété de la famille Raffier, dont un membre, conseiller du Roi fut lieutenant général de la châtellenie de Verneuil.","architecture":"Montfand, édifice fortifié  du XVe siècle, édifié à l'époque romane, rassemble les différents styles qui se sont succède dans le Bourbonnais, se dresse sur un lieu qui fut peut-être voué aux dieux celtiques. L'entrée du château était défendue par deux tours, les murailles étaient garnies de créneaux, mais l'aspect militaire de l'édifice a été effacé. Seul les bâtiments d'habitation ont été conservés. Trois corps de bâtiments s'ordonnent autour d'une cour intérieure. L'ancien donjon est prolongé par une aile remaniée au XVIIIe siècle. Dans l'aile parallèle à celle-ci se trouve une cuisine romane. Le donjon est accessible par une porte en plein cintre accostée de deux pilastres supportant un entablement formé de deux corniches moulurées encadrant une frise nue, pouvant dater du XVIIe siècle.","habitants":"Familles d'Avenière                 Famille Raffier\"","divers":"Château de Montfand à Louchy-Montfand","gps":"","images":["../../jctruffet.com/image/image_03/03_Louchy_Montfand_1.jpg","../../jctruffet.com/image/image_03/03_Louchy_Montfand_2.jpg","../../jctruffet.com/image/image_03/03_Louchy_Montfand_3.jpg","../../jctruffet.com/image/image_03/03_Louchy_Montfand_4.jpg","../../jctruffet.com/image/image_03/03_Louchy_Montfand_5.jpg","../../jctruffet.com/image/image_03/03_Louchy_Montfand_6.jpg","../../jctruffet.com/image/image_03/03_Louchy_Montfand_7.jpg","../../jctruffet.com/image/image_03/03_Louchy_Montfand_8.jpg"]},"Consult_chateau_formulairee37c-2":{"id":"Consult_chateau_formulairee37c-2","dept":"03","canton":"Chevagnes","commune":"Chezy","nom":"Louteaux","type":"Gentilhommière","periode":"XVIII","histoire":"LOUTEAUX,  gentilhommière a été construite au milieu du XVIIIe siècle à l'instigation de François le Tailleur, seigneur des terres voisines, Elle appartient ensuite à  Sébastien Alarose de la Bresne, ancien trésorier de France, premier procureur syndic de la commune, guillotiné le 9 thermidor an II. Propriété de madame G. de Clermont.   Après des péripéties nombreuses au cour de la Révolution, les Louteaux  passèrent aux de Chacaton, puis à l'amiral de Rigny qui en 1831, vendit le domaine au marquis de Chabannes de la Palice grand-père de la dernière propriétaire avant la vente à monsieur Jean Terrade en 1961.","architecture":"Louteaux, au nord de Chézy, les Louteaux  gentilhommière avec cour d'honneur en hémicycle délimitée  par deux pavillons octogonaux de briques bicolores  et toit à l'impériale, datant du milieu du XVIIe siècle. La façade sur la cour d'honneur étale les deux étages de son corps de logis principal, percées chacun de sept ouvertures, flanqués  de chaque côté d'une aile  à rez-de-chaussée amorçant celle en retour.","habitants":"Famille de François le Tailleur\"","divers":"Château de Louteaux à Chezy","gps":"","images":["../../jctruffet.com/image/image_03/03_Louteaux_1.jpg","../../jctruffet.com/image/image_03/03_Louteaux_2.jpg","../../jctruffet.com/image/image_03/03_Louteaux_3.jpg"]},"Consult_chateau_formulaire8d14":{"id":"Consult_chateau_formulaire8d14","dept":"03","canton":"Lurcy-Lévis","commune":"Lurcy-Lévis","nom":"Lurcy_Levis","type":"Château","periode":"XV-XIX","histoire":"Quatre châteaux à Lurcy-Levis , de Genetais,  de Levis (voir article), de Neureux du XVIII-XIXe siècle (voir article avec Levis) et de Beguin du XV-XIXe siècles  bureau de poste.      BEGUIN, Dom Pierre de Béguin qui, devenu prieur, préside, en 1489, la cérémonie d'investiture du duc Pierre II. En 1504, après l'assassinat du seigneur de Béguin, la terre fut acquise par la famille de Lévis. Après avoir été, pendant un temps, tenue par les Villars, elle revint à nouveau aux Lévis en 1647 et ils rachetèrent Béguin et Blancs-Fossés à leur seigneurie de Lévis, abandonnant l'ancien château de Béguin.  Ce n'est qu'en 1834, que Béguin fut racheté par les Turet  et passa par mariage, à Edouard Fould, en 1853, lequel fut maire de Moulins. Aujourd'hui le château de Béguin abrite les services du bureau de la poste. Une seule allusion y est faite dans les registres paroissiaux  quand y décéda, en 1712, Louise d'Ardenne. Dans l'église de Couleuvre se trouve la dalle funéraire de Jean de Villars, seigneur du Béguin, tué en avril 1504, à l'age de 25 ans. Aujourd'hui hôtel restaurant.  GENNETAIS, l'ancien fief des Gennetais était un fief noble justicier. En 1501 Gounot des Barres, seigneur en partie de Lurcy,  est aussi seigneur de Gennetais. Au XVIIe siècle, la seigneurie est aux mains de la famille Ganache.","architecture":"Béguin, date du milieu du XIXe siècle, il subsiste néanmoins une tour de l'ancien manoir du XVe siècle. C'était un château fort, auquel on a adjoint, au cour du XIXe siècle, une grande construction de brique et de pierre. Le long corps de logis principal est à deux niveaux et niveau de comble. On accède au rez-de-chaussée surélevé par un escalier sur perron. 3 pavillons, de tailles inégales, sont accolés en façade, deux en angle, en retour d'équerre, le troisième en avant corps, recevant une porte d'entrée monumentale.                              Gennetais  est un ensemble rural aujourd'hui, que ces derniers ont conservé un pavillon porche d'accès à la cour et un bâtiment massif, en forme de tour, surmonté d'un clocheton, coiffé à l'impériale.","habitants":"Famille de Lévis                    Famille Ganache\"","divers":"Château de Beguin et de Gennetais à Lurcy-Levis","gps":"","images":["../../jctruffet.com/image/image_03/03_Lurcy_Levis_1.jpg","../../jctruffet.com/image/image_03/03_Lurcy_Levis_2.jpg","../../jctruffet.com/image/image_03/03_Lurcy_Levis_3.jpg","../../jctruffet.com/image/image_03/03_Lurcy_Levis_4.jpg"]},"Consult_chateau_formulaired403":{"id":"Consult_chateau_formulaired403","dept":"03","canton":"Chevagnes","commune":"Lusigny","nom":"Lusigny_Allier","type":"Château","periode":"XVII-XIX","histoire":"Quatre châteaux à Lusigny, de Fougis du XXe siècle, des Laurents du XVIIIe siècle avec tours, d'Orvalet du XVIIe siècle et de Pomay du XVIIe siècle avec tours et douves.                              FOUGIS Ancienne propriété d'une communauté agricole installée pour la mise en valeur de la région, Les Fougis ont été construits à la fin du XIXe siècle. Une importante maison de maître a remplacé les anciens bâtiments.\r\nLAURENTS, construite vers la fin du XIXe siècle, appartenait à la communauté éponyme des Laurents.             ORVALET, de 1654 à 1682, la terre fut possession d'une famille Bourderel. Pierre,  écuyer, était en 1654 conseiller du roi et son maître d'hôtel ordinaire. Puis succède Pierre du Buisson, fondateur en l'église de Saint-Pourçain Malchère en 1688. André du Boisson le vendit à Annet Mignot,  procureur audit Présidial. C'est le trésorier de France à Moulins, Jean Jacques Pierre de Saincy, qui   le possédait en 1731, il mourut à l'age de 90 ans. Son fils occupa la même charge et fut guillotiné le 31 décembre 1793 à Lyon. Sa fille resta cependant en possession du château.\r\nPOMAY, en 1430 appartenait à Jean Cordier qui le tenait de Gérard de Pomay bourgeois de Moulins passa au début du XVIIe siècle entre les mains de François II de la Croix, puis à son fils François III qui le vendit en 1669 à la veuve d'Antoine Alexandre. C'est de cette dernière que devait l'acquérir, en 1671 la femme du surintendant Fouquet retiré à Montluçon avec sa belle-mère, elles y restèrent sept ans en 1683 fut célébré le mariage de Madeleine Fouquet avec le chevalier de Crussol d'Uzès, puis le château passa  aux de Montmain, les Lenoir, les de Launay, les de Livron ainsi de suite pour terminer à J. de Bartillat qui le revendit en 1832 à M. Marchand des Marans ascendant du marquis de Noblet et du comte Bernard de Durat.","architecture":"Fougis,  cette gentilhommière a succédé à des bâtiments plus anciens qui appartenaient à la communauté éponyme des Laurents, dont le corps de logis principal est flanqué de deux tours rondes aux angles. Une belle grille de clôture délimite la propriété, dont un joli portail permet l'accès.  \r\nPomay  du XVe siècle, était un domaine  sur la forêt. Accès à la demeure Louis XIII par une longue avenue dont le portail est fermé par une ferronnerie du XVIIIe. Une première cour est bordée au nord et au sud par les communs. Un large mur la sépare de la cour d'honneur encadrée par deux tours de briques terminées par des campaniles octogonaux. Dans le fond, le château se compose d'un corps central à rez-de-chaussée et premier étage, encadré de deux pavillons.  \r\nOrvalet, était un manoir dont subsistent deux tours rondes à lanternon, rappelant le tracé d'une ancienne enceinte. Le colombier, le pavillon et le corps de logis actuellement visibles sont cités dans un texte de 1619. A cette époque consiste ledit fief en un château composé d'un grand  pavillon et de deux tours situées dans une motte entourée de fossés. du XVIe siècle et surtout le château de «Pomay», aux briques bicolores, angle de tours rondes du XVIIe siècle, avec un ensemble de communs bien disposés. Cette gentilhommière, une des plus typiques de la région, abrita Mme de Sévigné en 1676.","habitants":"Famille Bourderel                       Femme du surintendant Fouquet\"","divers":"Château  des Fougis, des Laurents  de Pomay et Orvalet à Lusigny","gps":"","images":["../../jctruffet.com/image/image_03/03_Lusigny_Allier_1.jpg","../../jctruffet.com/image/image_03/03_Lusigny_Allier_2.jpg","../../jctruffet.com/image/image_03/03_Lusigny_Allier_3.jpg","../../jctruffet.com/image/image_03/03_Lusigny_Allier_4.jpg","../../jctruffet.com/image/image_03/03_Lusigny_Allier_5.jpg","../../jctruffet.com/image/image_03/03_Lusigny_Allier_6.jpg","../../jctruffet.com/image/image_03/03_Lusigny_Allier_7.jpg"]},"Consult_chateau_formulaire9460-2":{"id":"Consult_chateau_formulaire9460-2","dept":"03","canton":"Herisson","commune":"Maillet","nom":"Maillet","type":"Château","periode":"XVII","histoire":"Trois châteaux à Maillet, Beauregard  du XVIIe siècle, la Bourse du XIXe siècle, et Champigny.                   CHAMPIGNY, il existe aussi à Maillet d'autres manoirs qualifiés de châteaux, ou plutôt de maison de maître; on  retrouve des réemplois de frontons datés ou de montants chanfreinés dans les fermes actuelles, par exemple La Breure ou le Piray. Aujourd'hui hôtel restaurant par la famille Bouille-Ribier            BEAUREGARD, Près de l'église de Maillet, le château ferme de Beauregard, a sans doute remplacé un château plus ancien, dont on avait conservé une tour aujourd'hui démolie. Une famille Baudeau, au XVIIe siècle, se déclarait sieur de Beauregard Villeneuve, alors qu'en 1686 c'est le sieur de la Fauconnière qui possède le fief de Beauregard.          La BOURSE, en position dominante, La Bourse occupe un site d'éperon et pourrait avoir été occupée anciennement. En 1503, François de Chaslus, écuyer, fait aveu à la duchesse de Bourbon  Aujourd'hui, une maison de maître construite au XIXe siècle occupe les lieux.","architecture":"Champigny, sur une terrasse de la vallée du Cher.  de style néo gothique. Le château consiste en un grand corps de logis rectangulaire à 2 niveaux,agrémenté de deux ailes en léger retour d'équerre. Si l'on accède à l'entrée principale par un large escalier à l'avant du bâtiment, la façade arrière reçoit un joli avant-corps central de plan carré, couvert d'un toit à quatre pans, avec épis et frise de faîtage.          Maillet, il existe aussi à Maillet d'autres manoirs qualifiés de châteaux, ou plutôt de maison de maître.                         Beauregard, c'était ici le château primitif, autour duquel s'est constitué le  bourg, un \"pré du canal\" semble indiquer qu'il fut aussi entouré de fossés.","habitants":"Famille Bouille-Ribier                  Famille Baudeau\"","divers":"Château de Champigny, de Maillet et de Beauregard à Maillet","gps":"","images":["../../jctruffet.com/image/image_03/03_Maillet_1.jpg","../../jctruffet.com/image/image_03/03_Maillet_2.jpg","../../jctruffet.com/image/image_03/03_Maillet_3.jpg","../../jctruffet.com/image/image_03/03_Maillet_4.jpg"]},"Consult_chateau_formulaire1d47-2":{"id":"Consult_chateau_formulaire1d47-2","dept":"03","canton":"Huriel","commune":"St-Palais","nom":"Maison_Neuve","type":"Maison forte","periode":"XVI","histoire":"MAISON-NEUVE, en 1503, dans le dénombrement des fiefs du Bourbonnais, messire Geoffroy Baltrin, chevalier seigneur de la Maison Neuve. Il fait aveu à la duchesse de Bourbon.                 BORDES,  au XVIIe siècle, par Nicolas Menudel, qui était, en 1612, lieutenant en la sénéchaussée du Bourbonnais.","architecture":"Maison-Neuve, des XVIe et XVIIe siècles, est une bâtisse rectangulaire trapue, flanquée de deux tourelles demi-rondes sur chaque face, l'ensemble est garni de créneaux et de meurtrières. La construction occupe toute la partie centrale d'une motte d'une quarantaine de mètres de diamètre, taillée dans le plateau, et  entourée de larges fossés de 4 à 5 m de profondeur, et d'une dizaine de mètres de largeur. Cette structure est  bien conservée, et  les fossés sont encore parés. Ils étaient alimentés par un réservoir supérieur et  par un vaste étang qui devait protéger ce manoir à caractères archaïques sur la moitié ouest. Comme son nom l'indique, il a pu succéder à une construction antérieure.   Bordes, du XIXe siècles  une ancienne maison seigneuriale a été transformée en habitation plus confortable, c'est un bel ensemble avec maison de maître et communs à lucarnes de bois et belvédère, installé dans un grand parc arboré, ou l'on découvre une petite chapelle néo-romane.","habitants":"Messire Geoffroy Baltrin\"","divers":"Maison forte à Maison_Neuve","gps":"","images":["../../jctruffet.com/image/image_03/03_Maison_Neuve_1.jpg","../../jctruffet.com/image/image_03/03_Maison_Neuve_2.jpg","../../jctruffet.com/image/image_03/03_Maison_Neuve_3.jpg"]},"Consult_chateau_formulaire29d7-2":{"id":"Consult_chateau_formulaire29d7-2","dept":"03","canton":"Marcillat-en-Combraille","commune":"Marcillat-en-Combraille","nom":"Marcillat_Combraille","type":"Château","periode":"XV-XVII","histoire":"Trois châteaux à Marcillat, de Ludaix du XVIIe siècle, Courtioux du XIXe siècle et Marcillat du XIII-XVe siècle donjon et hôtel de ville.\r\nMARCILLAT, à l'origine, le siège primitif de la seigneurie de Marcillat était le château St-Georges. En 1503, le fief de Marcillat est détenu en coseigneurie par Michel de Rochedragon, écuyer, et Jacques de Rochedragon, écuyer. Tous  deux seigneurs en partie de Marcillat, reconnaissent tenir en fief de la duchesse de Bourbon la terre, justice et  seigneurie de Marcillat et autres.   En 1398, Pierre de Ruppedagulpho,  alias Malbert, est seigneur de Marcillat. Il avait épousé damoiselle  Marguerite de Montluçon. Vers 1456, la seigneurie fut partagée entre les frères Bidaud  et Chatard de Rocheragon , actuelle mairie, sur la partie haute du bourg, le donjon a conservé des fenêtres en accolade et moulures du XVe siècle.\r\nCOURTIOUX, plus manoir que château,  fût construit en 1885 en plein cur de Marcillat en Combraille par André Regnard, déjà propriétaire du domaine de Charagiet. André Regnard était conseiller darrondissement et adjoint au maire de Marcillat. Aujourd'hui hôtel restaurant.  LUDAIX,  en 1258, le seigneur du Ludaix est un Guillaume de Rochedragon de Biollet. En 1350, cette terre appartenait aux héritiers de Guillaume du Mont, dont un Jean de Laval, seigneur du Ludaix, qui était originaire du lieu dit Lavaud à Château sur Cher. Vers 1615, le château du Ludaix appartient à Antoine de Montagnac. Aujourd'hui hôtel Restaurant.","architecture":"Marcillat, cette vieille forteresse était construite sur une esplanade circulaire protégée au nord et au levant par une forte déclivité au-dessus de la Tartasse, et au midi et au couchant  par des fossés encore en eau. On connaît mal cependant l'aspect de la forteresse des Rochedragon, car en 1456, un nouveau château remplaça le fort médiéval. Le bâtiment actuel date des années 1820 et n'a gardé que peu de souvenirs des constructions antérieures  sauf peut-être la vieille tour croulante et les fossés en eau. Aménagée au XVe siècle, la forteresse du Bourg couronnait le point culminant du plateau. Elle comprenait une partie ancienne du XIIIe siècle, et un donjon carré du XVe siècle  sur la partie haute du bourg, le donjon a conservé des fenêtres en accolade et des moulures du XVe siècle. Elle était munie de trois ponts levis sur fossés qui donnaient accès à la grande salle d'accueil dite des Chevaliers.                      Courtioux,  fût construit en 1885 en plein cur de Marcillat en Combraille. \r\nLudaix,  au bourg, Le Ludeix ou Ludès est un château moderne, à tours rondes à campanile et tours carrées à mâchicoulis, construit au début du XIXe siècle à l'emplacement  d'une gentilhommière du XVe siècle, qui avait elle-même remplacé une construction plus ancienne.  Ce château du XVIIe siècle à conservé son donjon médiéval.","habitants":"Famille de Pierre de Ruppedagulpho        Famille d'André Regnard                 Famille d'Antoine de Montagnac\"","divers":"Château de Marcillat, de Courtioux et de Ludaix à Marcillat en Combraille","gps":"","images":["../../jctruffet.com/image/image_03/03_Marcillat_Combraille_1.jpg","../../jctruffet.com/image/image_03/03_Marcillat_Combraille_2.jpg","../../jctruffet.com/image/image_03/03_Marcillat_Combraille_3.jpg","../../jctruffet.com/image/image_03/03_Marcillat_Combraille_4.jpg","../../jctruffet.com/image/image_03/03_Marcillat_Combraille_5.jpg","../../jctruffet.com/image/image_03/03_Marcillat_Combraille_6.jpg"]},"Consult_chateau_formulaire639e":{"id":"Consult_chateau_formulaire639e","dept":"03","canton":"Souvigny","commune":"Marigny","nom":"Marigny_Allier","type":"Château","periode":"XVI","histoire":"Trois châteaux à Marigny, de Charnes du XVI-XVIIe siècle avec douves   des Guilleminots du XVIIe siècle et des Préaux du XVI-XIXe siècle.          CHARNES, en 1696, Jean-Baptiste Legros, maître des eaux et forêts en la maîtrise de Moulins, achète Charnes. La propriété passe à sa fille, puis à la petite-fille de celle-ci, Gabrielle Rogier, qui épouse en 1801 à Moulins Jean Baptiste Alexandre de Froment, officier, fils de François, baron de Froment, lieutenant-colonel au bataillon de Montluçon, et de Marie Dorothée Alarose. Depuis 1696, la propriété est ainsi restée dans la même famille.\r\nGUILLEMINOTS, ce n'est qu'en 1702 qu'on en trouve note dans les registres paroissiaux quand mourut au château Claude agé de 5 ans, fils de Claude Béraud, sieur des Guilleminots, avocat en Parlement  et dont le frère, prénommé Sébastien, était sieur du domaine voisin des Rondars. En 1659, on trouvait à   Marigny un autre Claude Béraud, grainetier du grenier à sel de Moulins et sieur des Margartz.                PREAUX, en 1503, Jehanne, alors veuve de Jacques Lemaire, fait aveu de son chastel, grange.","architecture":"Charnes, château du début du XVIIe siècle, agrandi en 1812 (aile est, porte ouest, remises sud), entouré de diverses dépendances. L'édifice est précédé d'une cour d'honneur autour de laquelle s'articulent communs, chapelle de 1720  et pigeonnier. Le château se compose d'un corps de logis quadrangulaire flanqué par des tourelles carrées coiffées de toits à l'impériale amortis par des lanternons polygonaux. Dans la tourelle nord un escalier à vis est le vestige du logis primitif, du XVIe siècle. La façade postérieure donne sur un jardin à la Française en terrasse. Au nord s'étend un verger enclos de murs. Au nord de l'étang se trouve un  pavillon en pans de bois, datant du XVe ou du XVIe siècle.          Les Guilleminots, gentilhommière avec deux pavillons carrés aux extrémités, possède encore des douves en eau. La tour carrée à haut lanternon est une ancienne chapelle. Certaines parties sont  date du XVIe siècle. \r\nPréaux, appelés château, Les Préaux est une très belle gentilhommière installée dans un parc arboré, dont les transformations principales datent du XIXe siècle. La demeure a succédé a une construction primitive, connue a la  fin du Moyen-Age.","habitants":"Famille de Jean-Baptiste Legros          Famille Béraud\"","divers":"Château de Charnes, de Guilleminots et de Préaux à Marigny.","gps":"","images":["../../jctruffet.com/image/image_03/03_Marigny_Allier_1.jpg","../../jctruffet.com/image/image_03/03_Marigny_Allier_2.jpg","../../jctruffet.com/image/image_03/03_Marigny_Allier_3.jpg","../../jctruffet.com/image/image_03/03_Marigny_Allier_4.jpg","../../jctruffet.com/image/image_03/03_Marigny_Allier_5.jpg","../../jctruffet.com/image/image_03/03_Marigny_Allier_6.jpg","../../jctruffet.com/image/image_03/03_Marigny_Allier_7.jpg","../../jctruffet.com/image/image_03/03_Marigny_Allier_8.jpg"]},"Consult_chateau_formulaire1759":{"id":"Consult_chateau_formulaire1759","dept":"03","canton":"Cusset","commune":"Mariol","nom":"Mariol","type":"Château","periode":"XVIII","histoire":"MARIOL, ancienne et importante baronnie, la terre de Mariol est, dès la fin du XIIe siècle, aux mains des chevaliers qui en portent le nom. La famille Mariol est restée propriétaire du fief  jusqu'à la fin du XVIe siècle. Au début du  XVIIe siècle, la baronnie de Mariol appartient  à messire François de Chabannes Blanchefort. Son descendant, Anne-Marie de Chabannes Blanchefort porte, en 1699, le titre de comte de Mariol. Après plusieurs successions  difficiles, le château fut vendu le 12 septembre 1765 à Sicaud de La Motte.  Il resta dans cette famille jusqu'à la Révolution.","architecture":"Mariol,  de l'ancienne forteresse, ne restent que l'emplacement des fossés, encore en partie remplis d'eau, autour de la motte artificielle, et une ancienne chapelle qui fut église paroissiale. Une construction du XVIIIe siècle a  remplacé le château primitif. Elle est formée d'un corps de bâtiment à trois niveaux, de plan rectangulaire,  flanqué aux angles de deux pavillons carrés en avant-corps et d'un troisième pavillon carré, en façade Est, en  guise d'entrée. Les toitures ont été remaniées au XXe siècle et les six lucarnes ouvragées qui éclairent la face  ouest donnent une allure tout à fait particulière à cette construction moderne.","habitants":"Famille de François de Chabannes Blanchefort.\"","divers":"Château de Mariol","gps":"","images":["../../jctruffet.com/image/image_03/03_Mariol_1.jpg","../../jctruffet.com/image/image_03/03_Mariol_2.jpg","../../jctruffet.com/image/image_03/03_Mariol_3.jpg"]},"Consult_chateau_formulaire7776":{"id":"Consult_chateau_formulaire7776","dept":"03","canton":"Gannat","commune":"Mazerier","nom":"Mazerier","type":"Maison forte","periode":"XV","histoire":"Deux châteaux à Mazerier, fort de La Motte (voir article) et  Langlard du XVe siècle.                               LANGLARD, au XVe siècle, Langlard appartient à la famille de Montmorin. Agnès de Montmorin, fille de Jacques, seigneur d'Auzon, chambellan des rois Charles VII et Louis XI et bailli de Saint-Pierre-le-Moûtier, le reçoit en dot à l'occasion de son mariage, vers 1540, avec Gilbert de Toucy-Bazerne, seigneur de Champroux. Le château est vendu à Antoine Bayard, trésorier général des finances en Languedoc, Beaujolais, Lyonnais et Forez, puis en Roussillon et Cerdagne, qui en rend hommage le 30 août 1489. Le château reste dans cette famille jusque dans la deuxième moitié du XVIIe siècle. L'épisode le plus connu de l'histoire du château de Langlard est la visite qu'y fit, en 1667, la marquise de Sévigné, qui prenait les eaux à Vichy, à son ami l'abbé Jacques Bayard, seigneur de Langlard, abbé de Bellaigue, visite qu'elle raconte dans une lettre à sa fille. Elle y reveint quelques années plus tard. L'abbé Bayard était aussi un ami de Madame de La Fayette. Pendant la Révolution, Langlard reçut la visite d'Antoine Cariol, commissaire désigné par le directoire du district de Gannat pour veiller à l'application de la loi du 31 janvier 1794, sur la destruction des signes de féodalité. À la suite de cette visite, les quatre tours perdirent leurs combles et furent arasées à hauteur des murailles.   Demeure de Mme de La Fayette et de Mme de Sévigné. En 1880  le château est partagé par deux propriétaires.","architecture":"château  de Langlard  XVe siècle. Suite à l'ordre de \"déféodalisation\" du château, daté de l'an II de la République, il ne reste du château que le corps de logis, avec la saillie d'une tourelle d'escalier polygonale et celle d'un pavillon rectangulaire.  La maison forte du XIVe siècle a succédé à un château plus ancien, installé sur une motte féodale entourée de fossés. Le bâtiment principal, de plan carré, à trois étages et combles élevés, est couvert d'un toit en pavillon.  Une tour ronde, engagée au milieu de la façade, contient  l'escalier à vis pour desservir les étages, alors que la porte d'entrée, du XVe siècle, est surmontée d'une voussure de style ogival. Accolé à ce 1er bâtiment, un petit corps annexe est  flanqué d'une tourelle hexagonale, côté cour. Au XVIe siècle, le style Renaissance  a ouvert la façade de larges baies à meneaux qui éclairent la construction un peu massive à l'origine. Lors de la Révolution,  vers 1793, c'était un château entouré de fossés  de peu d'étendue, en partie à sec, mais également d'une mare d'eau stagnante  au nord et  au couchant. Il y eut probablement  au XIe siècle, une seigneurie primitive, dont le siège était la motte castrale ceinturée par un fossé en eau.L'intérieur conserve, au premier étage, une salle voûtée d'arêtes.","habitants":"Famille d'Antoine Bayard\"","divers":"Château de langlard à Mazerier","gps":"","images":["../../jctruffet.com/image/image_03/03_Mazerier_1.jpg","../../jctruffet.com/image/image_03/03_Mazerier_2.jpg","../../jctruffet.com/image/image_03/03_Mazerier_3.jpg","../../jctruffet.com/image/image_03/03_Mazerier_4.jpg","../../jctruffet.com/image/image_03/03_Mazerier_5.jpg"]},"Consult_chateau_formulaireb749":{"id":"Consult_chateau_formulaireb749","dept":"03","canton":"Varennes-sur-Allier","commune":"Rongères","nom":"Meage","type":"Maison forte","periode":"XV","histoire":"MEAGE, on connaît, dès 1272, Raymondin du Mayage, dont les descendants font aveu de ce fief jusqu'en 1375. Au XVe siècle, il est englobé  dans les possessions de puissants seigneurs de Gayette  et reconstruction du château par les Bardon qui l'apporte en mariage à Thomas Feydau seigneur de Néoux, le fief revient àson fils Michel. Au XVIe siècle, il est aux mains de la famille Burelle, et en 1534, honorable homme Gilbert Burelle est seigneur du Méage. Lors du partage de cette terre en 1598 le Méage fait partie du lot revenant avec Boucé à Jean de Thomassin époux de Louise de Bourbon Busset. Puis à François Boucé seigneur de la Gayette,   le Méage en 1617  fait retour aux Bardon, Pierre originaire de Rongères et procureur de la sénéchaussée de Moulins. Le petit-fils de Pierre François  capitaine des cent suisses de la garde du roi  meurt en 1691 son frère Jean Claude hérite  qui reste à son décès à sa veuve Catherine de Vicq de Pontgibaud avant de faire retour aux Bardon qui le conservent   jusqu'au XIXe siècle,  Après la Révolution Godefroy Bardon ancien officier le cédera en 1807  à monsieur  Goyet de Livron, puis passe par alliance aux Chantemerle de Villette, puis aux Trinclade et aux d'Aubergy vendu en 1960 à un banquier qui le  revend en 1963  au comte Christian de Chavagnac. Lorsque le père de lactuel propriétaire, ingénieur paysagiste, sinstalle au château en 1964, il y crée un jardin, la propriété servait  dexploitation agricole.                             Dans la commune la maison forte de Prenat pas d'infos.","architecture":"Méage, est une maison forte de la fin du Moyen-Age ses origines sont plus anciennes, à l'emplacement d'un château fort, construction à la fin du XVe ou au début du XVIe siècle de la demeure actuelle. Le château est constitué par un corps de logis rectangulaire flanqué sur une face de deux tours rondes et sur celle d'entrée d'un pavillon carré(escalier à vis dans la tour carrée) et entouré de douves, maintenant asséchées. Il a été modifié à l'époque classique par le percement de hautes baies rectangulaires. Le portail principal date de la fin du XVIe siècle.  Il a été modifié à l'époque classique  par le percement de hautes baies rectangulaires. Le portail principal  date de la fin du XVIe siècle. Le château est situé dans un bel écrin d'arbres et son avant cour bordée de communs est fermée par un beau portail en fer forgé.","habitants":"Famille Burelle\"","divers":"Château de Méage et la maison forte de Prenat à Rongères","gps":"","images":["../../jctruffet.com/image/image_03/03_Meage_1.jpg","../../jctruffet.com/image/image_03/03_Meage_2.jpg","../../jctruffet.com/image/image_03/03_Meage_3.jpg","../../jctruffet.com/image/image_03/03_Meage_4.jpg","../../jctruffet.com/image/image_03/03_Meage_5.jpg","../../jctruffet.com/image/image_03/03_Meage_6.jpg"]},"Consult_chateau_formulaireb8b9":{"id":"Consult_chateau_formulaireb8b9","dept":"03","canton":"Cerilly","commune":"Meaulne","nom":"Meaulne","type":"Château","periode":"XVII-XIX","histoire":"Quatre châteaux à Meaulne; les Alliers du XVIIe siècle, de Bellevue du XIXe siècle, de Dagourets du XIVe siècle et de Plaix du XVIIe siècle.                          ALLIERS, le château a appartenu au général Georges Chevalier (1854-1938), père du philosophe et ministre Jacques Chevalier.  Au XIXe siècle une dame du Taillant y recevait ses amis dont le Duc de Morny et le Duc d'Harpigny. Les parents  maternels du philosophe Jacques Chevalier y résidèrent à la fin du siècle, ainsi que, récemment la romancière Jacqueline Pelletier-Doisy. BELLEVUE, construit en 1882, et qui fut résidence de la famille de La Tour Fondue.                                  DAGOURETS, en 1301, Jean de Ginçay, damoiseau, reconnait tenir le fief  de très haut et très noble monseigneur de Bourbon,  en châtellenie d'Hérisson ses hommes de Villène, du Plaix, de La Garde, de Dagoroes (Meaulne) et des Seignes (Vallon). Dans tous ces lieux, on relève la tradition d'un château.\r\nPLAIX, transformé en hôtel restaurant, pas d'information historique.","architecture":"Alliers, le corps de bâtiment central date du XVIIe siècle ; il a été complété plus tard par deux ailes à toiture en pavillon.  La demeure, entourée d'une vaste propriété, a longtemps été laissée à l'abandon, elle est aujourd'hui totalement remise en état et entretenue par ses propriétaires, le bâtiment central était au XVIIe siècle, un rendez vous de chasse. Il s'agrandit ultérieurement de deux  ailes terminées par des pavillons d'angle. La construction actuelle est ce qui reste d'un ensemble comprenant de vastes communs  encadrant une cour centrale,  plutôt une résidence de plaisance qu'une grande seigneurie.               Bellevue   dans la même  situation que le château des Alliers, se remarque par sa haute terrasse.                    Dagourets, existe une \"maison de maître\" reconnaissable à des réemplois de linteaux à écusson.                   Plaix du XVIIe siècle, composé d'un corps de logis central prolongé par une aile de commun en retour et un petit corps de bâtiment côté est. La cour est bordée à l'est par un second commun et close par un mur comportant le portail d'entrée. La façade sur cour du château a été déparée par l'adjonction d'un escalier en ciment au début du XXe siècle. Cette façade porte, sur le blason sculpté, la date de 1660. La façade sur jardin donne sur une ancienne douve. Le rez-de-chaussée en est enterré et un pont permet d'accéder de la porte-fenêtre au jardin. C'est un petit édifice néo-gothique à nef unique, d'une travée, terminée par une abside à cinq pans, surmonté d'un clocher.","habitants":"Général Georges Chevalier                 Famille de La Tour Fondue\"","divers":"Château  de Bellevue  des Dagurets  de Plaix à Meaulnes d'Allier.","gps":"","images":["../../jctruffet.com/image/image_03/03_Meaulne_1.jpg","../../jctruffet.com/image/image_03/03_Meaulne_2.jpg","../../jctruffet.com/image/image_03/03_Meaulne_3.jpg","../../jctruffet.com/image/image_03/03_Meaulne_4.jpg","../../jctruffet.com/image/image_03/03_Meaulne_5.jpg"]},"Consult_chateau_formulairedfc1":{"id":"Consult_chateau_formulairedfc1","dept":"03","canton":"Montet","commune":"Meillard","nom":"Meillard_Aix","type":"Château","periode":"XV-XVIII","histoire":"Deux châteaux à Meillard, Le Vert du XV-XVIIIe siècle et la forteresse médiévale dit des Aix du XIV-XVIIe siècles,      AIX, édifiée déjà au XIIIe siècle, les seigneurs les Chenillat, qui reconnaissent, par Pierre, damoiseau, le fief des Aées en 1301. Leur descendante\" Ysabeau, veuve  de Guillaume des Ays, damoiseau. Mais en 1392 la seigneurie est passée  par alliance à la famille de Montjournal  car en 1411, c'est Jeanne de Chenilhat, veuve du  chevalier Pierre de Montjournal. À la fin du Moyen-Age, le fief est devenu la propriété des la Condamine,  mais la famille ayant marqué  le plus le château des Aix  est celle des du Buisson des Aix, naissance au château de Charles-François du Buysson possesseurs de divers  fiefs dans le Bourbonnais, et dont certains occupèrent des fonctions importantes au XVIIIe siècle auprès du roi. Au décès des derniers des du Buysson les biens reviennent à un neveu Aimable-Charles Vicomte, puis à sa petite fille la comtesse d'Esclainbes, puis vendu en 1897 à Mr Guerrin-Languille. Le château changea constamment de mains, menacé de ruine, le sauvetage monumental, de Françoise et Jean-Francis Gorce  au début des années 1990, toujours dans la famille.                                VERT, pas d'information historique. Aujourd'hui hôtel restaurant.","architecture":"Aix,  édifice médiéval développant à l'origine un plan carré de 30 mètres de côté fermé par une enceinte flanquée de tours. Au XVIIe siècle, la courtine sud fut abattue, ouvrant sur une cour d'honneur sur laquelle fut élevée une façade ordonnancée, accostée de deux tourelles couvertes à l'impériale, corps de logis principal s'encadrant entre deux tourelles d'angle coiffées de lanternons, coiffé d'un haut toit en croupes. est probablement l'un des édifices les plus attachants que nous ait laissés le XVIIe siècle dans la campagne bourbonnaise. Entouré de douves indiquant ses origines médiévales.   La porte d'entrée donnant sur la terrasse a reçu un encadrement à bossage issu du traité  d'architecture de Serlio, tout comme les pilastres doriques soutenant une frise de même ordre, elle-même surmontée d'un fronton triangulaire, en cours de restauration.   Vert, maison forte de la fin du Moyen-Age, la construction actuelle est le résultat d'une restauration complète au XVIIIe siècle. de plan rectangulaire est à un niveau et niveau de comble. Des ouvertures à arc surbaissé ornent l'ensemble des portes et fenêtres, ainsi que les lucarnes. Une grosse tour circulaire subsiste dans la cour de cette habitation.","habitants":"Famille de Montjournal \"","divers":"Château des Vert et des Aix à Meillards","gps":"","images":["../../jctruffet.com/image/image_03/03_Meillard_Aix_1.jpg","../../jctruffet.com/image/image_03/03_Meillard_Aix_2.jpg","../../jctruffet.com/image/image_03/03_Meillard_Aix_3.jpg","../../jctruffet.com/image/image_03/03_Meillard_Aix_4.jpg","../../jctruffet.com/image/image_03/03_Meillard_Aix_5.jpg","../../jctruffet.com/image/image_03/03_Meillard_Aix_6.jpg","../../jctruffet.com/image/image_03/03_Meillard_Aix_7.jpg"]},"Consult_chateau_formulairec9c1":{"id":"Consult_chateau_formulairec9c1","dept":"03","canton":"Souvigny","commune":"Meillers","nom":"Meillers","type":"Château","periode":"XIII-XIX","histoire":"Trois châteaux à Meillers, de Pravier du XIXe siècle, de la Salle du XIIIe siècle avec douves et des Salles du XIXe siècle style médiéval.                    PRAVIER, en 1390, le fief appartenait à Jean de Sarre, écuyer, il était toujours dans
