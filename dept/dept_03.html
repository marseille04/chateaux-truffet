mage/image_03/03_Taxat_Senant_1.jpg","../../jctruffet.com/image/image_03/03_Taxat_Senant_2.jpg","../../jctruffet.com/image/image_03/03_Taxat_Senant_3.jpg","../../jctruffet.com/image/image_03/03_Taxat_Senant_4.jpg","../../jctruffet.com/image/image_03/03_Taxat_Senant_5.jpg","../../jctruffet.com/image/image_03/03_Taxat_Senant_6.jpg"]},"Consult_chateau_formulaire82a1":{"id":"Consult_chateau_formulaire82a1","dept":"03","canton":"Montluçon","commune":"Teillet-Argenty","nom":"Teillet_Argenty","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux à Teillet celui de Neuville du XVIe siècle et le fort du Mas  du XVe siècle, tours  et vestiges.               NEUVILLE, il existe deux châteaux à Neuville. Le plus récent, bâti vers 1840 par les Bosredon, utilise la brique, ce  qui lui donne  un cachet peu commun dans la région. Le vieux château, situé à proximité, édifié aux XVIe et XVIIe siècles, est une vaste bâtisse à étage et toit à quatre pans dans laquelle on remarque de nombreux encadrements  de fenêtres en réemploi, il était complété à l'arrière par deux ailes latérales aujourd'hui disparues. Il semble avoir  été édifié sur des soubassements plus anciens, avec une cave aux murs épais. L'emprise des deux châteaux dans   leur parc affecte une forme circulaire. Neuville joua un rôle important dans l'histoire du Bourbonnais ducal. En 1523,  Hugues, fils  se retira hors du royaume de France, avec le connétable. François 1er fit abattre les maisons de de Montbardon et de Neuville et saisir  tous les biens. Le vieux manoir actuel a sans doute été édifié sur celui que  le roi fit détruire. Le château de Neuville appartient à la famille de Rochefort.    MAS, en 1443 Robert Arnoux, seigneur du Mas, rend foi et hommage pour sa femme de ses métairies de Mas-Chenu et Chabaud, dépendant  de la ferme du Mas, en la paroisse de Theillet, châtellenie de Montluçon. En  1449, il obtient  l'autorisation de se fortifier. Dans le dénombrement des fiefs de 1503, Anthoine Arnoux, écuyer, fait aveu à la duchesse de Bourbon des lieux de Max et Lisseret, avec cens et devoirs. Un aveu de 1505 précise que la famille Arnoux est possesseur du Mas et de Maison Rouge. Différentes familles se succéderont au Mas, des Montflour, des  Maistre, des Bois de Beauchêne.","architecture":"Neuville,  utilise la brique, ce  qui lui donne  un cachet peu commun dans la région. Le vieux château, situé à proximité, édifié aux XVIe et XVIIe   siècles, est une vaste bâtisse à étage et toit à quatre pans dans laquelle on remarque de nombreux encadrements  de fenêtres en réemploi, il était complété à l'arrière par deux ailes latérales aujourd'hui disparues. Il semble avoir  été édifié sur des soubassements plus anciens, avec une cave aux murs épais. L'emprise des deux châteaux dans   leur parc affecte une forme circulaire.     Mas ou Max, édifié sur un éperon protégé par des étangs, s'écroule lentement. Il avait fière allure avec ses quatre tours d'angle pleines encadrant la bâtisse rectangulaire flanquée sur la façade d'une haute  tour ronde permettant l'accès aux étages, avec des murs de 1,40 m d'épaisseur. À l'intérieur, restaient de vastes cheminées.","habitants":"Famille de Rochefort\"","divers":"Châteaux de Neuville et de Mas à Teillet Argenty","gps":"","images":["../../jctruffet.com/image/image_03/03_Teillet_Argenty_1.jpg","../../jctruffet.com/image/image_03/03_Teillet_Argenty_2.jpg","../../jctruffet.com/image/image_03/03_Teillet_Argenty_3.jpg"]},"Consult_chateau_formulaire372b":{"id":"Consult_chateau_formulaire372b","dept":"03","canton":"Montet","commune":"Le-Theil","nom":"Theil_Fontariol","type":"Château","periode":"XV-XVIII","histoire":"Trois châteaux à Le Theil, Fontariol du XVe siècle avec tourelles, Grande Velatte du XVIIe siècle et du Max du  XIIIe et XVe siècles.                    FONTARIOL, son premier propriétaire connu est Vigier, son successeur Gilbert de Mars gouverneur, son fils François qui tient Fontariol ainsi que d'autres seigneuries, capitaine à la chambre du roi, en 1602 sa fille Antoinette hérite  et apporte par alliance à Anthoine Forget seigneur de la Quairie, Paul sera capitaine du roi et commissaire principal cède Fontariol à Pierre Louan écuyer et le revend quelques années après en 1649 à François de Saulnier seigneur de l'Escure, à sa mort les héritiers s'en séparent au profit d'un autre Pierre de Louan écuyer et seigneur de Persat, la petite fille de Pierre Elisabeth-Marguerite en fait donation  contre une rente à l'un de ses cousins Charles de Biotière de Chassincour marquis de Tilly époux de Marie-Anne de Durfort, leur fils  vend le château à la veille de la Révolution à Gilbert Boucomont des Garennes avocat lieutenant. Le château changera plusieurs fois de mains deviendra une exploitation agricole dont les métayers achèteront le domaine en 1956 mais laisseront le château à l'abandon, mais racheté en 1987 par la famille Pince qui le restaure et le transforme en chambres d'hôtes.\r\nGRANDE-VELATTE   Pas d'information historique.                           MAX, en 1230, les seigneurs du Max, Jehan Nicolas du Max, cédèrent leurs droits de justice du Theil à Archambaud VII.  En 1492, le fief du Max appartient à la famille Rolland, originaire de Saint-Pourçain-sur-Sioule. Martin Rolland devient le seigneur du Max. Par la suite, ses biens sont saisis et, en 1528, le château est adjugé par la cour des aides de Paris à Jacques de Gouzolles, seigneur du Ludaix et des Granges, écuyer du roi François Ier. Gaumin de Montgeorges achète le château en 1663. La demeure reste dans la famille de Montgeorges jusqu'en 1735. Le Max change souvent de propriétaires. Depuis 1994, les actuels propriétaires du château font des chambres d'hôtes.\r\nPESSAR-MAZET, pas d'information historique transformé en  chambres d'hôtes.","architecture":"Fontariol, ce château du XVe siècle est un exemple caractéristique de petit manoir bourbonnais, château rustique autrefois habité par les petits nobles campagnards. Découverte des salles meublées et aménagées, des coutumes de la vie au XVe siècle, remanié aux XVIIIe et XIXe siècles, est bâti sur le flanc d'une butte et entouré de divers bâtiments agricoles ordonnés autour d'une cour close. L'édifice se compose d'un corps de logis rectangulaire flanqué par une tour ronde d'escalier demi hors-uvre au sud, et d'une tour circulaire hors-uvre à l'angle nord-est. Les façades Sud et Est conservent quelques meurtrières et deux fenêtres à croisées de pierre, et destruction des cheminées médiévales au XIXe siècle.                         Grande Velatte, cette maison  forte dispose d'un corps de logis, de plan rectangulaire, en façade de deux tours rondes aux angles, à la mode  de certaines fortifications de la fin du Moyen-Age.                             Max, entouré de douves, le château est précédé d'un pont dormant qui a remplacé un pont levis que l'on manoeuvrait depuis le châtelet d'entrée. Passé le porche à gauche  s'étendent des communs bas, dont un des angles  est flanqué d'une échauguette  construite au XVIII  siècle. Face à l'entrée,  un haut logis rectangulaire  est accolé à une grosse tour ronde  du XVe percée  de meurtrières.  A droite, un pavillon s'appuie au corps de logis. Il est éclairé par des fenêtres à pilastres et chapiteaux ioniques. En retour d'équerre,  une galerie supportée  par trois arcs en plein cintre, conduit à un bâtiment quadrangulaire occupant l'angle droit de la terrasse, et percé d'une porte dorique à frise de triglyphes et fronton triangulaire.","habitants":"Famille Gilbert de Mars               Famille Rolland\"","divers":"Château de Fontariol, de Max  et de la Grande-Velatte à Le Theil","gps":"","images":["../../jctruffet.com/image/image_03/03_Theil_Fontariol_1.jpg","../../jctruffet.com/image/image_03/03_Theil_Fontariol_2.jpg","../../jctruffet.com/image/image_03/03_Theil_Fontariol_3.jpg","../../jctruffet.com/image/image_03/03_Theil_Fontariol_4.jpg","../../jctruffet.com/image/image_03/03_Theil_Fontariol_5.jpg","../../jctruffet.com/image/image_03/03_Theil_Fontariol_6.jpg","../../jctruffet.com/image/image_03/03_Theil_Fontariol_7.jpg"]},"Consult_chateau_formulairec1b2":{"id":"Consult_chateau_formulairec1b2","dept":"03","canton":"Chevagnes","commune":"Theil-sur-Ascolin","nom":"Theil_sur_Ascolin","type":"Château","periode":"XV-XIX","histoire":"Trois châteaux à Theil sur Ascolin de la Fin du XVe siècle de la Pierre du XIXe siècle et de la Varenne du XIXe siècle.   FIN, la seigneurie appartenait en partie, en 1343, à Pierre Calbrun, chevalier, conseiller du duc de Bourbon. En 1435, Jean de Bertine, issu des seigneurs  de La Fin, laissa la seigneurie à sa fille Alix,  qui l'abandonna à  Jean Mareschal, écuyer, seigneur de Fourchaud et des Noix. La motte de La Fin-Rabotin fut la plus importante et une famille de chevaliers s'y installa dès le XIIIe siècle, mais elle n'avait conservé  qu'une partie du domaine et vivait le plus souvent dans son château de Beauvoir ou à Cindré.  En 1503 damoiselle Loyse de La Fin, veuve de Jehan d'Isserpens, écuyer, seigneur de Vaumas, fait aveu d'un fief très éclaté  comprenant le tiers de la \"mothe aux Fourniers\", les domaines  des hôtels de Chambort et de Vaumas et plusieurs autres revenus. A sa mort, la seigneurie échoua à son fils Jean, chanoine de Lyon et à sa fille Madeleine. Vers 1523, Pierre Mareschal, écuyer, fils de Jean, seigneur de La Fin-Fourchaud, regroupa les deux terres de Fourchaud  et de Rabotin. Au début  du XVIe siècle, Louis de Montalban poursuivit l'oeuvre  et laissa son fils Regnaud, un fief qui avait regroupé les droits seigneuriaux de La Fin. Au début du XVIIIe siècle la famille de Champfeu transmet  à l'écuyer Michel de la Barre, dont les descendants étaient encore propriétaires à la veille de la Révolution.\r\nLA PIERRE, élégant château du XIXe siècle a été réalisé en 1880 par l'architecte Jean Moreau qui établit les plans de l'édifice. Propriété de la famille du comte de la Roche jusqu'en 1939, le domaine devint alors un rendez-vous de chasse.                           VARENNE, la  maison forte existait à la fin du XVe siècle, puisque le seigneur de Thiel, Lancelot de la Varenne, écuyer, en fait aveu en 1503 à la duchesse de Bourbon, il tient du fief de Châtel Perron sa maison forte de la Varenne.","architecture":"Fin , les maisons seigneuriales  abandonnées depuis longtemps furent, au XIXe siècle, remplacées  par un château moderne, ou l'alternance de la brique rose et de la pierre blanche souligne angles et encadrements. Le corps de logis de plan rectangulaire à deux niveaux et niveau de comble, reçoit sur les angles deux pavillons carrés dissymétriques  en retour d'équerre. Le plus important, à quatre niveaux, écrase par son volume l'ensemble de la construction. Le second, plus petit, à 3 niveaux, pris en oeuvre, forme avant-corps. L'autre façade, côté jardin reçoit elle aussi un pavillon de plan carré.                             La Pierre,  après la guerre, le château fût restauré, le parc dessiné et planté par le paysagiste François Treyve. Aujourd'hui, les propriétaires de ce beau domaine ouvrent leur demeure et proposent 5 chambres chaleureuses.            Varenne, porte encore aujourd'hui le nom de château, mais il s'agit plutôt d'une gentilhommière, construite au XIXe siècle qui a remplacé le château ou plus exactement la maison forte primitive. Il subsiste  cependant un logis dans les communs, une grange du XVe siècle, à pans de bois et motifs à écharpes.","habitants":"Famille de Pierre Mareschal               Famille du comte de la Roche \"","divers":"Château de la Fin , de la Pierre et de Varenne à le Theil sur Ascolin","gps":"","images":["../../jctruffet.com/image/image_03/03_Theil_sur_Ascolin_1.jpg","../../jctruffet.com/image/image_03/03_Theil_sur_Ascolin_2.jpg","../../jctruffet.com/image/image_03/03_Theil_sur_Ascolin_3.jpg","../../jctruffet.com/image/image_03/03_Theil_sur_Ascolin_4.jpg","../../jctruffet.com/image/image_03/03_Theil_sur_Ascolin_5.jpg","../../jctruffet.com/image/image_03/03_Theil_sur_Ascolin_6.jpg"]},"Consult_chateau_formulaireb66a":{"id":"Consult_chateau_formulaireb66a","dept":"03","canton":"Cerilly","commune":"Theneuille","nom":"Theneuille","type":"Château","periode":"XII-XVI","histoire":"Quatre châteaux à Theneuille, celui du Bouis du XIVe siècle vestiges, de Ginçais du XIIe siècle donjon et Vestiges, de Gozinière du XVIIe siècle, de la Croix du XIXe siècle et de Trollière du XVIe siècle.                                GINCAIS, en 1301, nous rencontrons  trois membres de cette famille, qui rendent hommage au seigneur de Bourbon pour des fiefs différents: Renaudin de Gençay,  damoiseau, pour ce qu'il tient  à Maillet, et  Jehan de Gençay, pour ce qu'il tient  à Maillet, Meaulne, Theneuille et  le Vilain, Guillaume de Gençay damoiseau, pour ce qu'il tient à Cérilly. Le sieur de Ginçais avait des droits dans les forêts de Tronçais et de Civrais. En 1443 c'est Pierre de Grassay, chevalier, qui est alors seigneur de Ginçais et qui fait l'aveu. Entre 1482 et 1490, la seigneurie de Ginçais s'agrandit de l'hôtel et manoir des Brosses.         GOZINIERE,  construit au XVIIe siècle et remanié en 1884 par François Anselme Thibault de Beauregard,  docteur en médecine  mais n'exerça jamais son art. En 1906, ses deux filles se partagent le patrimoine familial. L'ainée, Marie,  en hérite. La châtelaine mène   une vie assez austère, elle peignait et écrivait. Après le décès de Marie, en 1939, ses neveux ont hérité de l'ensemble. Ils y venaient que durant les vacances et le vendent en 1992. En 1999, la demeure est cédée à  un couple d'Anglais, qui décide de restaurer le château de Gozinière en lui redonnant  sa configuration d'antan ainsi l'intérieur est réaménagé,   Aujourd'hui chambres d'hôtes par Catherine Barroit.               TROLLIERE, en 1357, Jocien Mulatier, damoiseau, avouait tenir en fief tes terriers et seigneuries de Vallenivaut et de La Trollière. Son fils sera possesseur de La Trollière et des  Bordes. En 1503, Jehan du Moustier, écuyer, seigneur de La Troullière reconnaît tenir en fief  du seigneur d'Orval, et arrière-fief de la duchesse de Bourbon, sa mestairie de La Troulhière restant son domaine. La Trollière restera dans la famille Mulatier pendant près de cinq siècles.","architecture":"Le vieux château fort de Ginzay ou Ginçay dresse encore, sur une esplanade carrée ceinte de murailles   les vestiges de son haut donjon que l'on aperçoit de loin. Des douves de 15 à 20 mètres de large isolent cette sombre forteresse rurale. Le château eut beaucoup à souffrir des guerres de religion, et fut ruiné lors de la   Fronde. Comme un bon nombre de ces vieilles bâtisses, il est devenu dépotoir d'une exploitation agricole. Il reste encore une bonne partie du donjon ainsi que du mur d'enceinte, deux pièces dont une qui semble-t-il était la chapelle. Il se situe sur le domaine appelé \"le vieux château\" où en tout se trouve 3 maisons et le château, l'une d'elle est toujours habitée.                              Gozinière,  le château est construit au XVIIe siècle et remanié en 1884.  Le bâtiment est alors largement transformé de l'intérieur  en aménageant des chambres d'hôtes mais les résultats s'avèrent décevants.                L'ancien château féodal de La Trollière, encore ceinturé de douves, et assorti de tours fortifiées, ne pouvait assurer qu'une protection d'appoint près du puissant château du Bouis. Le château actuel a conservé un long corps de logis à rez-de-chaussée,  coiffé d'un toit pentu, qui permet, grâce à des lucarnes, l'utilisation d'un niveau de comble. Une tour ronde à  un des angles. À l'autre angle de la façade a été construit  plus récemment un pavillon rectangulaire à deux niveaux, en  retour d'équerre.       La Croix  corps de logis rectangulaire a deux niveaux.","habitants":"Famille de Jehan de Gençay         François Anselme                         Thibault de Beauregard\"","divers":"Château et Vestiges de Ginçais, de la Gozinièrede trolière  et de la Croix à Theneuille.","gps":"","images":["../../jctruffet.com/image/image_03/03_Theneuille_1.jpg","../../jctruffet.com/image/image_03/03_Theneuille_2.jpg","../../jctruffet.com/image/image_03/03_Theneuille_3.jpg","../../jctruffet.com/image/image_03/03_Theneuille_4.jpg"]},"Consult_chateau_formulairee19c":{"id":"Consult_chateau_formulairee19c","dept":"03","canton":"Jaligny-sur-Besbre","commune":"Thionne","nom":"Thionne","type":"Château","periode":"XIV-XVII","histoire":"Deux châteaux à Thionne; Fougis du XIVe siècle et des Gouttes  du XVIIe siècle.   FOUGIS, le premier seigneur du lieu semble être Hugonin le Long, écuyer et grand prévôt de la vénerie du duc Pierre II de Bourbon, soit cent ans auparavant.  On retrouve  les armoiries des Le Long  dans la région de Louchy Montfand ainsi qu'à Neuilly en Donjon.  A la Révolution le bâtiment n'échappe pas au vandalisme  alors même que ses décorations de pierre taillée honorent moins le roi  et son pouvoir Divin, que la nature elle même,  et l'art de leur sculpteur. C'est une vieille famille très puissante de la région qui l'acquit sous le nouveau régime en 1800, les Clayeux qui l'occupera encore plus de 200 ans, acheta le magnifique château des Gouttes.  L'un des descendants entreprendra au début du siècle  des transformations spectaculaires, perçant des jacobines dans les toitures et des galeries avec colonnades dans le style italien sur les façades de la cour intérieure.           GOUTTES, pas d'information historique.","architecture":"Fougis se dresse depuis plus de 400 ans sur les plaines autrefois boisées qui s'étendent jusqu'à  Saint-Léon et les premiers monts d'Auvergne. Les historiens font remonter la construction de cet édifice de la Sologne Bourbonnaise,  situé à 3 Km du bourg de  Thionne,  vers 1580, mais il est probable  que les tours fassent  même partie  d'une construction  plus archaïque  laquelle aurait été remanié après un incendie. Le nom du site évoque celui des Fougères.                Gouttes, partie la plus ancienne du château est constituée d'un logis donjon flanqué d'une tourelle d'escalier demi  hors-oeuvre et a été élevée à la fin de l'époque médiévale. Ce bâtiment, entouré d'une enceinte extérieure dont il ne subsiste que le tracé fut prolongé vers l'ouest au début du XVIIe siècle. Certains décors intérieurs datent du XVIIe siècle.    Vers 1870 l'architecte Moreau fut chargé de l'agrandissement du château,  de la construction de communs et d'un  pavillon d'entrée. Ces nouveaux bâtiments sont réalisés dans un style néo-médiéval  permettant leur intégration  avec les parties anciennes. Le parc des XVIIe et XVIIIe a été remplacé au XIXe siècle par un jardin à l'anglaise.","habitants":"Famille des Clayeux \"","divers":"Château de Fourgis et des Gouttes à Thionne","gps":"","images":["../../jctruffet.com/image/image_03/03_Thionne_1.jpg","../../jctruffet.com/image/image_03/03_Thionne_2.jpg","../../jctruffet.com/image/image_03/03_Thionne_3.jpg","../../jctruffet.com/image/image_03/03_Thionne_4.jpg","../../jctruffet.com/image/image_03/03_Thionne_5.jpg","../../jctruffet.com/image/image_03/03_Thionne_6.jpg","../../jctruffet.com/image/image_03/03_Thionne_7.jpg","../../jctruffet.com/image/image_03/03_Thionne_8.jpg"]},"Consult_chateau_formulaire192a":{"id":"Consult_chateau_formulaire192a","dept":"03","canton":"Dompierre","commune":"St-Pourcain-sur Besbre","nom":"Thoury","type":"Forteresse","periode":"XII-XIV","histoire":"THOURY, ils fut construit par les seigneurs de Thoury, d'où son nom. Le premier seigneur de Thoury dont on ait connaissance est Rodolphe de Thoury, chevalier, cité en 1164 dans une bulle du pape Alexandre III pour une donation a l'abbaye de Sept-Fons, et serait selon la tradition, l'un des premiers seigneurs du Bourbonnais participant à une croisade,  Goussaut de Thoury, son descendant, fit d'ailleurs enfermer dans le château son ennemi personnel, Renaud de la Motte, en 1336. Au début du XVe siècle, le château passa par mariage de Guicharde de Thoury, dame dudit lieu, à Jean de l'Espinasse,  le château connut alors beaucoup de remaniements architecturaux. En 1501 Jean de l'Espinasse vendit Thoury à Charles Soreau, seigneur de Saint-Gérand-de-Vaux et neveu d'Agnès Sorel, maîtresse du roi Charles VII. Il y a alors coseigneurie jusqu'en 1503. À cette époque, une galerie à l'italienne est construite. Marguerite Soreau, fille de Charles Soreau, apporta cette terre à son mari, Bertrand de Rollat, en 1542. Une centaine d'années plus tard, en 1636, Pierre Roussaut, seigneur de la Chassaigne, acquit Thoury. Puis il passa successivement par alliance à Philippe de Brinon en 1653, auquel succéda son fils Antoine contrôleur et receveur général de Villeneuve les Avignon, son gendre et en 1715, Jean-François Valette de Rochevert cède le  château  à Clément Conny écuyer seigneur de la Motte. Cette famille fut anoblie en 1767 et acquit le rang de vicomte en 1816  la famille en est encore propriétaire aujourd'hui.","architecture":"Le château de Thoury, dès le XIIe siècle, une fortification surveillait déjà la circulation le long de la rivière, c'est une construction féodale du XIVe siècle sous forme d'enceinte pentagonale fortifiée qui se dresse au milieu d'un parc, ce château du XIIe siècle fut bien remanié au cours des XIVe et XVe siècles, se dressant au milieu dun parc, il affiche orgueilleusement ses deux corps de logis reliés par de hautes courtines. La porte daccès est surmontée de mâchicoulis et de deux tourelles en toit à poivrière.  la cour intérieure avec galerie à litalienne datant du XVIe siècle, la tour de garde aménagée en petit musée de la chasse et la tour de guet qui elle renferme les souvenirs d'une famille dont l'amiral de Kerguelen, qui découvrit en 1772 cet archipel du bout du monde, perdu au sud de locéan Indien. L'origine de ce plan pourrait provenir d'une ancienne motte féodale fossoyée, entourée de palissades qui furent, ultérieurement, remplacées par un mur. Puis des constructions habitables seraient venues s'appuyer sur l'enceinte.","habitants":"Famille de Rodolphe de Thoury\"","divers":"Château de Thoury à St Pourçain sur Besbre","gps":"","images":["../../jctruffet.com/image/image_03/03_Thoury_1.jpg","../../jctruffet.com/image/image_03/03_Thoury_2.jpg","../../jctruffet.com/image/image_03/03_Thoury_3.jpg","../../jctruffet.com/image/image_03/03_Thoury_4.jpg","../../jctruffet.com/image/image_03/03_Thoury_5.jpg","../../jctruffet.com/image/image_03/03_Thoury_6.jpg","../../jctruffet.com/image/image_03/03_Thoury_7.jpg"]},"Consult_chateau_formulaire8e99":{"id":"Consult_chateau_formulaire8e99","dept":"03","canton":"Herisson","commune":"Tortezais","nom":"Tortezais","type":"Maison forte","periode":"XIII-XVIII","histoire":"Quatre  châteaux à Tortezais, de la Brosse-Raquin du XIII-XIVe siècles, de la Girardière du XVIIIe siècle, de Saint-Romain du XIXe siècle et la maison forte de la salle.                         BROSSE-RAQUIN  les Raquin connus en 1490 depuis Louis fils  présumé de Gilbert, maître d'hôtel de Charles VIII, prévôt des maréchaux. Au Raquin succèdent les Villars vieille famille possédant divers fiefs de Chatellenie de Chaveroche. En 1664 le domaine devient en indivis entre les Villard et les Billard, les droits du domaine ayant passer à Pierre Le Gendre époux d'Antoinette de Champfeu laquelle le tient de sa mère Elisabeth Billard. En 1688, leur fils Louis meurt sans postérité en 1730 le domaine passe au Champfeu, laissant leur domaine  à leur oncle Bernard de Champfeu, maire  de Moulins. Les Champfeu céderont sous Charles X au sieur Daubertet, ascendant collatéral du baron Bertraind Fain actuel propriétaire.                             GIRARDIERE.  Pas d'information historique.\r\nSAINT-ROMAIN, il existe à Saint-Romain une grande maison, construite vers 1913 et dénommée Le château. L'appellation  a  pu subsister d'un système défensif précédent. En effet, la tradition voudrait que Jeanne d'Arc ait couché au château de Saint-Romain. Une famille de Thélis était au début du XVIe siècle, seigneur de St-Romain mais nous ne savons   pas s'il existait encore une maison seigneuriale. Une fille, Gilberte Thélis, se maria en seconde noce avec Paul  Antoine Forget, seigneur de Fontariol.","architecture":"La Brosse-Raquin, château du XVe siècle comprenant un corps de logis flanqué de deux tours au nord, encadrant les  trois pièces de chaque étage. Au sud tourelle polygonale abritant l'escalier. Une tourelle ronde a été ajoutée pour un second escalier. Il reste encore quelques cheminées à manteaux sur colonnettes à   bases moulurées. Sur l'une d'elles sont sculptées les armoiries à trois faces mortaisées, reproduites sur un linteau de porte,  l'ensemble est encore entouré de douves avec un pont vers le potager et flanqué de deux tourelles arasées encadrant l'entrée. L'avant-cour est limité à l'ouest par un mur percé de meurtrières. A l'extrémité sud subsiste un ancien bâtiment dit corps de garde sur lequel s'appuie le portail élevé au XVIIe siècle. Deux autres tours isolées reliées entre elles au château et au corps de garde par des murs, protègent   la propriété vers l'ouest. Propriété vendue comme bien national en 1793, \r\nGirardière,  grosse maison basse de plan rectangulaire, La Girardière est une construction du XVIIIe siècle, qui a pu succéder à un habitat plus ancien. La façade est flanquée d'une tour ronde d'escalier, alors que le toit à la Mansart s'ouvre de grandes lucarnes à toits débordants, ce qui permet l'utilisation d'un niveau de comble.","habitants":"Famille de  Pierre Le Gendre              Famille de Thélis\"","divers":"Château de la Brosse-Raquin, de la Girardière, de St-Romain et la maison forte de la Salle à Tortezais","gps":"","images":["../../jctruffet.com/image/image_03/03_Tortezais_1.jpg","../../jctruffet.com/image/image_03/03_Tortezais_2.jpg","../../jctruffet.com/image/image_03/03_Tortezais_3.jpg","../../jctruffet.com/image/image_03/03_Tortezais_4.jpg","../../jctruffet.com/image/image_03/03_Tortezais_5.jpg","../../jctruffet.com/image/image_03/03_Tortezais_6.jpg"]},"Consult_chateau_formulaire72ee":{"id":"Consult_chateau_formulaire72ee","dept":"03","canton":"Moulins","commune":"Toulon-sur-Allier","nom":"Toulon_Allier","type":"Château","periode":"XVIII-XIX","histoire":"Trois châteaux à Toulon sur Allier, le Colombier du XIXe siècle,  de la Forêt du XVIIIe siècle  et de Montchenin du XVIIIe siècle.                                COLOMBIER, le premier propriétaire connu est  en 1657 François Febvrier, seigneur de la Motte du Colombier.                 La FORET, fief  avant  le XVe siècle, époque à laquelle elle fut érigée en seigneurie pour  Jean de la Goutte, déjà  seigneur de l'Ecluse à Neuilly-le-Réal. Ce fut le 14 septembre 1474 qu'il obtint, l'autorisation  d'y édifier une maison forte. En 1642, Jacques Roques, écuyer, sieur de la Forêt, était également des Modières et de Fourchault.  En 1767  J.B. Moreau,  épousa  Elisabeth Moreau, fille de feu Antoine. Dans les années 1770, le seigneur de La Forêt   était Benjamin Michel Priolo, directeur des fermes du roi à Moulins qui fit reconstruire le château. Son propriétaire émigre, la terre de La Forêt fut confisquée en avril  1794, puis vendue comme bien national.                              MONTCHENIN,  en 1462 château de  Pierre Gouat.  En 1594, elle appartient à Jehan de Garnault qui le vend à  Yves Brinon, conseiller du roi. En 1618 elle appartenait à J. B. Brinon, sieur de  Montchenin, conseiller du Roi. En 1628  vendu à Charles de Mure, sieur de Montchenin. En 1652, la seigneurie  vendue ensuite à Jean Talon,  habité  que par des fermiers, Pierre Huart en 1681, Pierre Meilheurat, homme  d'affaires  de monsieur de La Tour, en 1723. L'initiateur du nouveau château fut maître François Louis Rabouine, seigneur, receveur général des fermes du  Roy, mourut   sans enfants, il fit donation à un de ses neveux, noble François Pierre Le Brun, d'une famille parisienne, régisseur  des domaines. Il mourut en son château le 6 avril 1784, laissant une fille Elisabeth, qui avait épousé le 30 mai 1780 maître Hubert Collot, avocat, d'ou Catherine qui épouse Mayeul Chabot, fils de Gilbert Bon magistrat  et de Marie Catherine Bonnand de Montaret, seigneur du château de Fromenteau à Toulon sur Allier. Au début du XVIIIe siècle, Montchenin rentre dans le patrimoine de Jean-Baptiste des Gallois de La Tour, qui fut premier président du parlement d'Aix-en-Provence. Aujourd'hui Montchenin est toujours dans leurs descendances.","architecture":"Colombier, château du XIXe siècle d'inspiration médiévale, avec parc, allée et pièce d'eau. Disposés dans un joli parc, les bâtiments ont remplacé une première demeure de style Louis XVI. De plan en équerre  où le corps du logis, de style néo-gothique, est accosté de deux belles tours à mâchicoulis, l'une carrée, complétée par des créneaux et  une guette, l'autre ronde, surmontée d'un haut toit conique, sur la partie arrière  est installé un haut  pavillon du XIXe siècle.                                  Fôret,  au sud du village, on trouve un logis en U, en briques bicolores. La Fôret ne parait pas avoir été un fief avant   le XVe siècle. Le  château était doté d'une chapelle, pavillon carré à clocheton.                                Montchenin,  est une gentilhommière à haut toit construite sous le règne de Louis XV, selon le principe des Folies du XVIIIe siècle, côté est, le château est inséré dans une cour fermée par des communs datant des XVIe et XVIIIe siècles, où se situe une magnifique grange à colombages construite sous limpulsion dHenri IV. Côté ouest, la façade d'un très pur style Louis XV donne sur un ancien parc à la Française, conçu en terrasse par un élève de Le Nôtre. Des tours typiquement bourbonnaises font ceinture au parc qui se prolonge par une belle allée de platanes, dotée de communs, et à l'avant une enceinte à trois tours rondes, fut construit à la veille de la Révolution, mais il succédait à un château sur motte encore repérable.","habitants":"Famille de Jacques Roques               Famille de Charles de Mure\"","divers":"Château du Colombier, de la Forêt, de Montchenin, de fromenteau, de la Vermillière, et de Boulaize à Toulon sdur Allier","gps":"","images":["../../jctruffet.com/image/image_03/03_Toulon_Allier_1.jpg","../../jctruffet.com/image/image_03/03_Toulon_Allier_2.jpg","../../jctruffet.com/image/image_03/03_Toulon_Allier_3.jpg","../../jctruffet.com/image/image_03/03_Toulon_Allier_4.jpg","../../jctruffet.com/image/image_03/03_Toulon_Allier_5.jpg","../../jctruffet.com/image/image_03/03_Toulon_Allier_6.jpg","../../jctruffet.com/image/image_03/03_Toulon_Allier_7.jpg","../../jctruffet.com/image/image_03/03_Toulon_Allier_8.jpg"]},"Consult_chateau_formulaireea64":{"id":"Consult_chateau_formulaireea64","dept":"03","canton":"Moulins","commune":"Neuvy","nom":"Toury_Neuvy","type":"Château","periode":"XIX","histoire":"TOURY appartient tout d'abord à une famille de ce nom vers 1260, la seigneurie était en   indivis entre Catherine dame de Thory sur Allier et son frère. Catherine avait épousé Jean Breschard, dit de Bressolles, chevalier et seigneur du Réray à Aubigny, un des sergents  et le fils de Raoul,  baron de Bressolles. Les seigneuries de Toury  et du Réray connurent longtemps  un sort commun, à la fin   du XIIIe siècle, Guy de Toury, damoiseau, et sa femme reconnurent tenir en fief de Guillaume de  Dampierre, seigneur de Saint-Just  et Belleperche, et terre sur Aurouer  et Aubigny. Goussaut de  Toury , en 1374, et ce fut la Chambre des Comptes elle-même qui le traduisit   en justice pour malversations, il avait, avec l'argent de la recette des Eaux et Forêts, acheté sur son compte personnel des biens dans les châtellenies de Verneuil et de Hérisson. En 1377 Louis II lui laissa néanmoins  l'usufruit des biens détournés. Goussaut de Toury se comportait comme un grand seigneur et maintenait les traditions féodales. En 1381, Jeanne de Thoury épousa un autre Jean de Bressolles; leur petit fils,  Antoine,   eut 3 enfants. L'aîné entra en religion, ce qui l'exclut de la succession, mais les deux cadets se disputèrent l'héritage. Gilbert se vit attribuer Le Réray et Jean reçut Toury, qu'il vendit dans des conditions assez obscures à Anne de France. Cette dernière dut faire intervenir un sergent royal de la prévôté de Saint-Pierre-le-Moûtier pour entrer en possession de son acquisition. Le roi Charles VII y avait séjourné en 1457 ainsi que l'atteste une lettre en date du 26 août dressée de Thoury près de Moulins à ces gens du parlement.  Vendu à une famille d'officiers ducaux, les le Tailleur. En 1729, il appartenait à un chanoine de Moulins, le sieur Provost de Ruelle. Le dernier propriétaire de Toury, Pierre Legros, propriétaire de la Queune, émigra au cours de la Révolution; il était le frère de Charles Legros de Laugère à Montilly, exécuté le 21 nivôse an II. Gilbert Tortel l'acquit et se fait appelé seigneur de Melays, il vendit les Melays à un Champfeu qui fit construire le château moderne, le baron des Michels mort en 1913.","architecture":"Dés le début du XIIIe siècle,  reconstruit au XIXe siècle, Toury est considéré comme château fort et l'une des quatre principales baronnies du Bourbonnais. La façade est a été considérablement moins remaniée que la façade ouest, mais perd néanmoins son caractère de forteresse lorsque Anne de Beaujeu devient propriétaire des lieux. C'est dans cette demeure que Jean de Meung a composé une partie du roman de la rose, oeuvre très populaire au Moyen-Age.","habitants":"Famille de Jean de Bressolles\"","divers":"Château de Thoury à Neuvy","gps":"","images":["../../jctruffet.com/image/image_03/03_Toury_Neuvy_1.jpg","../../jctruffet.com/image/image_03/03_Toury_Neuvy_2.jpg","../../jctruffet.com/image/image_03/03_Toury_Neuvy_3.jpg"]},"Consult_chateau_formulaire8a49-2":{"id":"Consult_chateau_formulaire8a49-2","dept":"03","canton":"St-Pourcain-sur-Sioule","commune":"Loriges","nom":"Tout_y_Fault","type":"Château","periode":"XIX","histoire":"TOUT-Y-FAULT, vers 1880, Jean Baptistes Larzat fit construire le château à proximité d'une maison du XVIIIe siècle. La propriété passa, en 1946, aux Chambon qui la vendirent en 1955. transformé en hôtel restaurant.","architecture":"Tout-y-Fault, élevé en bordure de la forêt de Marcenat   et entouré d'un parc, le corps de logis  de plan rectangulaire à un étage, coiffé d'un grand toit d'ardoise percé de lucarnes, offre un décor néo-gothique et néo-renaissance. La façade antérieure est animée d'un mur pignon en légère saillie, dans lequel est aménagée la porte d'entrée. Elle est flanquée d'une tour ronde couronnée de mâchicoulis et couverte d'une poivrière, et d'un pavillon hors-uvre orné d'un oriel et de fenêtres encadrées de  pilastres  cannelés. L'autre façade  est dotée d'une  échauguette rectangulaire  et d'une tourelle. Au centre est   accolé un pavillon dans l'angle duquel s'élève un porche carré, couvert d'une terrasse à garde-corps.","habitants":"Famille de Jean Baptisters Larzat\"","divers":"Château de Tout-y-Fault à Loriges","gps":"","images":["../../jctruffet.com/image/image_03/03_Tout_y_Fault_1.jpg","../../jctruffet.com/image/image_03/03_Tout_y_Fault_2.jpg","../../jctruffet.com/image/image_03/03_Tout_y_Fault_3.jpg","../../jctruffet.com/image/image_03/03_Tout_y_Fault_4.jpg"]},"Consult_chateau_formulaire23af":{"id":"Consult_chateau_formulaire23af","dept":"03","canton":"Jaligny-sur-Besbre","commune":"Treteau","nom":"Treteau","type":"Forteresse","periode":"XIV-XVIII","histoire":"Trois châteaux à Tréteau, de Belleau du XVIIIe siècle, de la Motte Vesset du XIVe siècle et du Vieux Chambord du XIV-XIXe siècle.                               BELLEAU, on doit à la famille Ménudel, déjà possessionnée dans la région, la construction de cette maison de  plaisance à la fin du XVIIe siècle.       VIEUX-CHAMBORD dit aussi Grand Chambord   a appartenu aux Champropin de Chambord, puis habité par leur descendants Delvaux de Chambord depuis 1276.             MOTTE-VESSET. Pas d'information historique,  transformé en gite de France.","architecture":"Vieux-CHambord dit aussi le\" Grand Chambord\" Le lieu est cité dès 1276. Chambord paraît être une forteresse conservée de la guerre de Cent ans et constitue  un bon exemple d'architecture civile fortifiée dans le Bourbonnais au XIIIe et XIVe siècle. Construction de la fin du XIVe siècle (vers 1370-1390), hormis le pavillon de la cuisine et l'escalier à vis  du XIXe siècle. Les canonnières ainsi que le logis ont été remaniés au XVe siècle. Le grand toit qui recouvre les créneaux du logis date du XVIIe siècle. Celui du donjon a été remanié au XIXe siècle. De nombreuses fenêtres ont été ouvertes au XVIe siècle. L'entrée actuelle au sud dans l'enceinte a remplacé, au XIXe siècle, l'ancienne entrée bouchée à l'ouest.          \r\nBelleau, maison de  plaisance à la fin du XVIIe siècle. Le corps principal est un bâtiment, bas sans étage, construit  en briques rouges, flanqué de deux tours circulaires coiffées d'un lanternon, elles communiquent au niveau des combles par de petites galeries à des bâtiments agricoles fermant la cour de part et d'autres de l'habitation. Ayant été transformé en ferme école au XIXe siècle par le baron de Veauce, l'intérieur a perdu son caractère.                  Motte-Vesset, fut bâti au XIVe siècle et a conservé de cette époque une tour fortifiée dans   laquelle est  percée l'entrée donnant accès à une cour fermée, face à cette poterie, le logis de plan rectangulaire était autrefois flanqué sur la façade arrière de tours circulaires détruites. L'entrée se fait par la porte à arc brisé, percée d'une tour quadrangulaire accolée au logis et munie d'une  bretèche surmontant la porte. La restauration  au XIXe siècle a beaucoup altéré le caractère de l'édifice.","habitants":"Famille Ménudel                        Famille de Champropin de Chambord\"","divers":"Château du Vieux Chambord, de Belleau, de la Motte-Vesset à Treteau","gps":"","images":["../../jctruffet.com/image/image_03/03_Treteau_1.jpg","../../jctruffet.com/image/image_03/03_Treteau_2.jpg","../../jctruffet.com/image/image_03/03_Treteau_3.jpg","../../jctruffet.com/image/image_03/03_Treteau_4.jpg","../../jctruffet.com/image/image_03/03_Treteau_5.jpg","../../jctruffet.com/image/image_03/03_Treteau_6.jpg","../../jctruffet.com/image/image_03/03_Treteau_7.jpg","../../jctruffet.com/image/image_03/03_Treteau_8.jpg","../../jctruffet.com/image/image_03/03_Treteau_9.jpg"]},"Consult_chateau_formulairee1d4":{"id":"Consult_chateau_formulairee1d4","dept":"03","canton":"Yzeure","commune":"Trevol","nom":"Trevol","type":"Château","periode":"XIV-XVII","histoire":"Cinq châteaux à Trévol; Avrilly (voir article) de Bédaures du XIXe siècle agence immobilière , de Démoret du XIV-XIXe siècle néo-gothiques, de Demoux du XVIIe siècle et de Mirabeau du XVIIe siècle.                                 DEMORET, était au XIVe siècle le fief d'une famille de ce nom. Jean Demoret, chevalier, fut procureur général du Bourbonnais. En 1482, le seigneur de Demoret était Antoine de  Montjournal, écuyer, conseiller et  premier chambellan du cardinal de Bourbon. Il ne conserva pas longtemps le fief puisqu'en 1503, le nouveau seigneur en est Pierre de Bonnay, également seigneur de Bessat et de Bonnay. En 1682 Claude Coiffier était seigneur des Nonettes et de Demoret. Le 7 février 1790, Jean Louis Coiffier de Demoret, chevalier de St Louis, fut élu maire de la nouvelle municipalité par les citoyens actif de la paroisse.       DEMOUX, en 1631 est mentionné Antoine,  en 1687 Jean Feydeau . Les Feydeau y résidèrent longtemps puis Pierre en 1741. En 1782 c'était Louis Guériot, écuyer, \"capitaine d'ouvriers\" au corps royal  d'artillerie, qui était seigneur de Demoux.                          MIREBEAU, en 1367 Guot remanié l'ensemble  et au XVIe siècle habité par la famille Mirebeau, passa en 1603  à Jean de l'Aubespin trésorier de France, puis à François Dubuisson écuyer . En 1741 Pierre de Freydeau chevalier seigneur de Mirebeau  et en 1781 Antoine Chevret seigneur fermier épousa Marguerite Fiolin  fille de feu Antoine et gardèrent la propriété jusqu'à la Révolution.","architecture":"Demoret, est un logis néo-gothique, pourvu de douves, au XIXe siècle, l'ancien château dont la façade était située au Nord fut reconstruit sur le même emplacement, la façade orientée à l'Ouest.  Pour son édification qui s'échelonna sur quinze années, le château a subi les affres d'un incendie le 25 avril 1975, le feu anéantissant la magnifique charpente en châtaignier, la totalité du deuxième étage et les combles qui comportaient en façade, outre un campanile sur la tour centrale, quatre lucarnes en bois sculpté. La hauteur de la toiture a dû être réduite de quatre mètres.                               Demoux est une gentilhommière au toit à la Mansart. La cour est délimitée par des communs. La pierre porte les initiales de Jean Feydeau et date de 1687. Les fossés sont encore en eau.               Mirabeau est un domaine constitué du château, de la chapelle, de la cuisine, d'une grange autour d'une cour, d'une basse-cour  entourée de bâtiments agricoles sur trois côtés et un parc avec étang. Le château est constitué d'un corps de logis  unique du XVIe ou XVIIe siècle auquel ont été ajoutés au XIXe siècle un pavillon à base carré à chaque extrémités. Ces pavillons, imitant les constructions du début du XVIIe, sont édifiés en briques polychromes et comportent trois niveaux. La porte d'entrée  des deux édifices ouvre vers le château. Le décor des portes témoigne  des tendances  baroques du début du XVIIe siècle. Le bâtiment nord est une ancienne cuisine.","habitants":"Famille de Jean Demoret             Famille de Jean Feydeau\"","divers":"Château de Bédaures, de Démoret, de Démoux, de Mirabeau et le pavillon d'Avrilly à Trévol","gps":"","images":["../../jctruffet.com/image/image_03/03_Trevol_1.jpg","../../jctruffet.com/image/image_03/03_Trevol_2.jpg","../../jctruffet.com/image/image_03/03_Trevol_3.jpg","../../jctruffet.com/image/image_03/03_Trevol_4.jpg","../../jctruffet.com/image/image_03/03_Trevol_5.jpg","../../jctruffet.com/image/image_03/03_Trevol_6.jpg","../../jctruffet.com/image/image_03/03_Trevol_7.jpg","../../jctruffet.com/image/image_03/03_Trevol_8.jpg"]},"Consult_chateau_formulaire9497-2":{"id":"Consult_chateau_formulaire9497-2","dept":"03","canton":"Jaligny-sur-Besbre","commune":"Trezelles","nom":"Trezelles","type":"Château","periode":"XV-XVI","histoire":"Quatre châteaux à Trezelles dont celui de Trezelles du XVe siècle deux tours, de Quillets du XVIIe siècle, de Trezubie du XVe siècle et de Villard du XVIe siècle.  TREZELLES, en 1569, au XIe siècle, la ville est tenue en fief par les sires de Jaligny. En 1217 les comtes de Nevers rendent hommage à l'évêque  de Clermont, jusqu'en 1278. Puis on voit au début du XVe  siècle, un bourgeois de Barrais faire aveu de sa maison forte de Trezelles, qui pourrait être le château de cette ville.   En 1508, les Morels sont dits Seigneurs de Trezelles. Cette famille, originaire de Jaligny, sera anoblie en 1669. Elle   achètera, en 1682, à Bernard de la Guiche, Comte de St-Gérand et La Palisse, la justice de Trezelles. En 1779, Jean Baptiste Morel cède ses biens à J. B. Hautier de Villemontée, qui ayant émigré en 1792 eut ses biens confisqués et  le château divisé entre 2 acquéreurs fut en partie ruiné. Le côté ouest du château est encore partiellement visible.      TREZUBIE, les premiers possesseurs en sont les enfants de feu Hugonet Humbert. On trouve ensuite, en 1322, la famille de Barreys et un siècle plus tard en 1453, apparait à Trezuble Jean le Blyer mais, en 1503, c'est François de Gléné, écuyer, seigneur de Gléné, qui fait aveu à la dame de Listenois. La famille conservera la terre jusqu'en 1670. A cette date elle passe par mariage à François de la Chaux, bourgeois de  Trezelles. En 1711, on voit un Dominique de la Chaux, qu'on   peut supposer être le fils du précédent, vendre Trezuble à Jean Lefebvre, fermier de Précord. Mais en 1761 la  terre est saisie au profit de Gilbert Joulle de Chambon. À la mort de ce dernier en 1785, Trezuble revient à sa fille Gabrielle, mariée à M. Minard de St Gérand le Puy, dont les descendants, alliés aux Devaulx, détiendront le château jusqu'à la fin du XIXe siècle.                     QUILLETS,  manoir dépendant des Villars, propriété privée appartenant à la famille Tiersonnier, avec hébergement Gites de France.                           VILLARD, pas d'information historique.","architecture":"Trezelles, semble avoir été autrefois une ville close, comme il se voit par de vieux vestiges. Le côté ouest du château est encore partiellement visible. Deux des quatre tours qui flanquaient les angles sont conservées ainsi que 2 des pavillons qui les prolongeaient en façade. Au centre l'entrée s'ouvre par un porche en plein cintre datant du XVIIe siècle. Des meurtrières dont il reste  un exemplaire à gauche de la porte, protégeaient l'entrée.            Trezuble le fief est connu dès le XIVe siècle. Il  fut jamais  important, mais  plutôt d'une simple maison forte. Les fossés qui l'entouraient ont presque entièrement disparus, et la construction  ne se distingue plus que par une tour  dans un angle corps de logis quadrangulaire à   un étage, construit à colombages.                               Quillets,  c'est dans la première moitié du XVIIe siècle que l'édifice de style Louis XIII,  précédée d'une cour encadré de deux tours rondes, l'habitation est composée d'un pavillon central rectangulaire, augmenté dans le prolongement des façades  des deux ailes plus basses en retrait. Vers 1660, il  fut ajouté au centre de la façade une tour circulaire et on y construisit un pigeonnier.                              Villard, en partie construite au début du XVIe siècle, cette demeure fut cependant très remaniée au XIXe siècle. De  plan rectangulaire, elle présente une façade cantonnée aux angles de deux tours circulaires dont l'une a un diamètre inférieur à l'autre. A proximité se trouve une forte tour ronde coiffée d'un toit à lanternon, à usage de pigeonnier.","habitants":"Famille des  Morels                 Famille de Barreys                       Famille Tiersonnier,\"","divers":"Château de Quillets, de Villard, de Trézuble et de Pouge à Trezelles.","gps":"","images":["../../jctruffet.com/image/image_03/03_Trezelles_1.jpg","../../jctruffet.com/image/image_03/03_Trezelles_2.jpg","../../jctruffet.com/image/image_03/03_Trezelles_3.jpg","../../jctruffet.com/image/image_03/03_Trezelles_4.jpg","../../jctruffet.com/image/image_03/03_Trezelles_5.jpg","../../jctruffet.com/image/image_03/03_Trezelles_6.jpg"]},"Consult_chateau_formulairec909-2":{"id":"Consult_chateau_formulairec909-2","dept":"03","canton":"Souvigny","commune":"Autry-Issards","nom":"Troliere","type":"Château","periode":"XV","histoire":"TROLIERE, fief dépendant de la châtellenie de Bourbon, situé sur le rebord du plateau qui domine à l'est le vallon où coule l'Ours. En 1484, Jean II de Bourbon donne à Pierre de la Trolière.  En 1489, Pierre de La Trolière et de Saint-Maurice, possédant un hôtel à Souvigny, y reçoit le duc Pierre II. En 1513, il épouse une dame d'atour d'Anne de France. Il fait donc partie de la cour ducale. Ce personnage est le commanditaire du manoir actuel. Le 11 août 1677, Antoine Aubery achète La Trolière. Le 17 novembre 1765, l'inventaire des meubles de La Trolière en montre la modestie. A une époque indéterminée, le château est transformé en ferme et se dégrade.  Vers 1927, le comte de Bourbon-Busset rachète deux des cheminées de La Trolière, alors en ruine, et les installe au château de Busset. La statue de la Vierge en faïence qui ornait la façade du logis de ferme du XVIIIe siècle a été emportée par les précédents propriétaires. Lors de la grande tempête de l'hiver 1999, le pigeon de faïence polychrome qui couronnait le toit du pigeonnier est tombé. Il est conservé dans les bâtiments situés au nord.","architecture":"Du château de la Trolière de la fin du XVe siècle, le bâtiment consiste alors en un corps de logis de six chambres basses ou hautes avec greniers  au dessus, cave, cuisine et boulangerie chapelle, il ne reste que peu de choses. D'abord, un ancien corps de logis de plan rectangulaire, à rez-de-chaussée surmonté d'un étage, situé dans la cour, côté gauche en entrant. Les encadrements de la porte d'entrée donnant dans l'escalier, de la porte de la salle haute et d'une fenêtre de l'escalier, ainsi que les vestiges d'une baie à appui saillant au premier étage, témoignent de la qualité de construction d'origine. Un escalier à vis de grès dessert les deux salles hautes et basses, qui communiquent chacune avec un garde-manger attenant en contrebas, auquel on accède par quelques marches. Vestiges de l'ancienne galerie extérieure de desserte. Au sud ouest, colombier circulaire à toit conique, pris dans l'enceinte ruinée, ouvert de deux fenêtres rectangulaires face au sud, de deux portes face au nord, et d'archères. Un boulet de pierre trouvé sur place récemment est conservé au château. La basse-cour était située au nord.","habitants":"Famille de Pierre de la Trolière\"","divers":"Château de la Trolière à Autry_Issards","gps":"","images":["../../jctruffet.com/image/image_03/03_Troliere_1.jpg"]},"Consult_chateau_formulaireb7de":{"id":"Consult_chateau_formulaireb7de","dept":"03","canton":"Le Montet","commune":"Tronget","nom":"Tronget","type":"Château","periode":"XVIII","histoire":"Trois châteaux à Tronget, des Bérauds du XVIII-XIXe siècle, des Gougnons du XVIe siècle et de la Sauvatte du XVIIIe siècle.                            TRONGET, une motte féodale, le manoir des BERAUDS est de l'époque du Moyen-Age. Les hommes de la région ont eu beaucoup à souffrir au cours de la guerre de cent ans. En 1378, après le départ des Anglais, les habitants de Tronget et des communes voisines qui aidèrent de leurs deniers et de leurs mains à relever les ruines des remparts du château du Montet. En retour, ils purent y trouver encore asile avec leur avoir et leurs troupeaux lors des nombreuses attaques d'armées ennemies ou de bandes de pillards.\r\nGOUGNONS, pas d'information historique.   SAUVATTE, construite dans les années 1830 à la place dune seigneurie, le château de la Sauvatte est situé dans le nord de lAuvergne, dans le Bourbonnais.    Aujourd'hui chambres d'hôtes.","architecture":"Bérauds, appelé château, la construction basse des Bérauds date de la fin du Moyen-Age. Le corps de logis, de plan rectangulaire, est à un seul niveau et  niveau de comble. Les ouvertures y sont peu nombreuses et de petites dimensions aussi bien pour les combles élevés  qui sont ouverts de petites lucarnes. La maison prend un peu  d'ampleur grâce  à l'adjonction, à chaque pignon, d'une tour carrée à toit pyramidal. Des communs, eux aussi à combles élevés, délimitent la cour principale.\r\nSauvatte, la chapelle a été construite en 1848 juste à côté du château de la Sauvatte. Ses bonnes proportions et son style néogothique témoignent dun architecte de qualité. En 1878 les vitraux dorigine ont été remplacés par des vitraux de couleurs. Le petit cloché sur le toit de la chapelle complète son image.\r\nGougnons,  petite maison forte de la fin du Moyen-Age, Les Gougnons en ont conservé le corps de logis principal de  plan rectangulaire, flanqué d'une tour ronde à l'arrière. Aujourd'hui restaurée, la maison prend l'allure d'une petite  gentilhommière.","habitants":"Seigneurs locaux\"","divers":"Château des Bérauds, de Gougnons et de la Sauvatte à Tronget.","gps":"","images":["../../jctruffet.com/image/image_03/03_Tronget_1.jpg","../../jctruffet.com/image/image_03/03_Tronget_2.jpg","../../jctruffet.com/image/image_03/03_Tronget_3.jpg","../../jctruffet.com/image/image_03/03_Tronget_4.jpg"]},"Consult_chateau_formulaire7e5d":{"id":"Consult_chateau_formulaire7e5d","dept":"03","canton":"Souvigny","commune":"Autry-Yssards","nom":"Tuiliere","type":"Château","periode":"XVII","histoire":"TUILIERE,  forteresse médiévale, berceau de la dynastie des Bourbons, protégée par la Tour Qui Qu'en Grogne, le long de l'étang municipal. Ses trois donjons laissent imaginer les trames qui s'y sont déroulées au fil des siècles. Une visite ultérieure par voie terrestre permet de remonter au Moyen-Age et de s'initier aux arts courtois, à la chevalerie et autres philosophies perdues que des guides en costume d'époque tentent de perpétuer. Bourbon-l'Archambault est également une cité thermale qui fut, au XVIIe siècle, la reine des villes d'eaux du royaume de France.","architecture":"La Tuilière entre Moulins et Bourbon-l'Archambault,  sur la commune d'Autry-Issards. En plein bocage Bourbonnais,  reprend les limites géographiques de l'ancien Duché de Bourbon, ou Bourbonnais, province de confluence entre l'Oc, l'Oil et le Franco-Provençal. Un endroit un peu hors du temps qui semble comme pétrifié dans un calme arrosé par les Rau de la Rose ou du Chameron, les rivières de l'Ours ou de la Burge et rafraîchi par les forêts des Prieurés Gros-Bois ou Moladier, du massif de Messarges qui borde au Sud la piste de la Tuilière. D'où qu'on vienne, on doit respecter les espaces aériens qui entourent ou surplombent le point de destination.. Le mieux consiste à se la couler douce en dessous de ces zones blablateuses pour profiter du paysage. Du coup, on en profite pour repérer les lieux. Château de la Tuilière forteresse à deux étages et attiques en équerres accolé d'un donjon à trois étages avec plate forme crénelée flanquée d'une échauguette à l'opposée une tour ronde accollée de tourelle et échauguettes.","habitants":"Dynastie des Bourbons\"","divers":"Château de la Tuilliere à Autry-Yssards","gps":"","images":["../../jctruffet.com/image/image_03/03_Tuilliere_1.jpg","../../jctruffet.com/image/image_03/03_Tuilliere_2.jpg"]},"Consult_chateau_formulaire289d":{"id":"Consult_chateau_formulaire289d","dept":"03","canton":"Cerilly","commune":"Urcay","nom":"Urcay","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux  à Urçay; Beaumont du XVI-XVIIe siècle et Urçay du XVIIe siècle. BEAUMONT, au XVIe siècle, on ne notait à Urçay que la maison seigneuriale de Beaumont et celle de Vaux, dépendance  de la châtellenie d'Hérisson. Alors que Vaux a disparu. En 1353, Louis d'Aglan, chevalier, seigneur de Beaumont, rend foi et hommage en son château avec les domaines et droits  en dépendant. Au XVe siècle, une famille de la Souche possède Beaumont. Aussi, en 1503, Jehan de la Souche reconnait tenir en fief et arrière fief de la duchesse de Bourbon sa maison,  En 1694, Louise Catherine de Favières est dame d'Urçay et de Vaux.     URCAY pas d'information historique.","architecture":"Beaumont, reste un château bien conservé avec fenêtres à meneaux, grosse tour et tourelle d'angle, terrasse et colombier. La présence sur le plan cadastral ancien d'un canal en arc de cercle aujourd'hui disparu peut laisser penser qu'une maison forte primitive a précédé le  château actuel. L'emplacement du château est occupé par  une exploitation agricole, mais on remarque encore une cave voutée, reste de l'ancienne construction.","habitants":"Famille de la Souche\"","divers":"Château d'Urcay de Beaumont et Igny la Perche à Urcay","gps":"","images":["../../jctruffet.com/image/image_03/03_Urcay_1.jpg","../../jctruffet.com/image/image_03/03_Urcay_2.jpg","../../jctruffet.com/image/image_03/03_Urcay_3.jpg"]},"Consult_chateau_formulaireef48":{"id":"Consult_chateau_formulaireef48","dept":"03","canton":"Herisson","commune":"Vallon-en-Sully","nom":"Vallon_Sully","type":"Château","periode":"XVIII","histoire":"Quatre châteaux à Vallon en Sully, du Creux du XVIIIe siècle, de la Lande du XVI-XVIIIe siècle, du Peufeilhoux du XVIe siècle et de Prugnes du XIXe siècle. Champigny et Frémont pas d'information historique.                         CREUX, composition générale du XVIIIe siècle inspirée du modèle versaillais. Reconstruit de 1775 à 1785  pour le comte de Fougières sous gouverneur des enfants de France , à l'emplacement d'une maison forte connue dès le XIVe siècle. A la fin du XIXe siècle,  restauration du château confiées à l'architecte Duthoit   par la marquise de Nicolay nièce de Fougières, grand mère du propriétaire actuel.    LANDE Pas d'information  historique.    PRUGNES, en 1642 Jean Denys est  sieur des Prugnes, à la terre de la paroisse de Vallon. La terre passa ensuite  aux   Alexandre de Beausson, puis fut vendue  au XVIIIe siècle à Jean Baptiste Villatte. Ce château fut la résidence de l'écrivain naturaliste Villatte des Prugnes.                            PEUFEILHOUX, fut un fief non justicier des XVIe et XVIIe siècle, possédé par la famille de Pierrebrune.   Vers 1675, il passa à Gilbert Jehannot seigneur de Pallières, époux de Catherine de Murat. Il semble être resté  pendant  plus de deux siècle  dans la même famille, puisqu'en 1914, il est la propriété de Villatte de Peufeilhoux,  comte d'Oultremont. Cet élégant château, édifié en grès coloré jaune et rouge des carrières proches de La Grave, dresse sa silhouette élancée sur le sommet d'une colline boisée de conifères.  Le modeste manoir des Villatte fut  entre les 2 guerres, modifié et surélevé par un architecte de talent, sous les ordres de M. Machard, riche banquier et  inspecteur des finances.   Depuis juillet 2013, M.  Claude Thevenin a décidé en reprenant ce château de lui rendre son luxe d'antan. Avec son fils, et sans aucune subvention, ils font un travail titanesque.","architecture":"Creux, corps de logis rectangulaire à trois niveaux pavillons en saillie couvert à la Mansard. Intérieur des communs situés  dans l'avant-cour, intérieur du château les bâtiments entourant la cour d'honneur ainsi que les communs bordant l'avant cour et l'orangerie, allée d'accès nord, sols de l'avant-cour et de la cour d'honneur. Intérieur du château, escalier et sa rampe, ensemble des jardins et du parc avec leurs aménagements hydrauliques.     Lande, édifié au XVIe siècle, modifié au XVIIIe, le château a conservé son caractère d'origine plus agricole que résidentiel. C'est un exemple très homogène et complet d'habitation ferme bourbonnaise sous l'ancien régime. De plan en U,  l'édifice est entouré de douves. Le château comporte un corps de bâtiment rectangulaire encadré  de deux ailes en retour. Les ailes servaient autrefois de communs,  hormis l'extrémité Est  de l'aile nord utilisée comme chapelle, les douves existent encore au sud et à l'ouest. Au nord sont situés les bâtiments agricoles.               Prugnes, de style néo-gothique, a été édifié sur des fondations du XIIIe siècle, que l'on remarque dans l'aile sud-ouest. A l'entrée, on note un beau pavillon à pans de bois et des communs de la fin  du XIXe siècle\r\nPeufeilhoux comprend une façade de style renaissance avec double rangée de fenêtres  à meneaux, des tours, des tourelles, des cheminées et à l'angle sud ouest la chapelle. Elle est coiffée d'un toit à croupe pentu, surmonté d'un clocheton à échauguette en encorbellement, avec une grande ouverture ogivale  à trois colonnettes.  Restauré et remeublé, la cour d'honneur refaite et la promenade des remparts ouverte.","habitants":"Famille d'Alexandre de Beausson         Famille Pierrebrune                 Famille de Murat\"","divers":"Château de  Creux, de Peufelhioux, de Prugnes, de Champigny, de Lande et de Frémont à  Vallon de Sully.","gps":"","images":["../../jctruffet.com/image/image_03/03_Vallon_Sully_1.jpg","../../jctruffet.com/image/image_03/03_Vallon_Sully_2.jpg","../../jctruffet.com/image/image_03/03_Vallon_Sully_3.jpg","../../jctruffet.com/image/image_03/03_Vallon_Sully_4.jpg","../../jctruffet.com/image/image_03/03_Vallon_Sully_5.jpg","../../jctruffet.com/image/image_03/03_Vallon_Sully_6.jpg","../../jctruffet.com/image/image_03/03_Vallon_Sully_7.jpg","../../jctruffet.com/image/image_03/03_Vallon_Sully_8.jpg","../../jctruffet.com/image/image_03/03_Vallon_Sully_9.jpg"]},"Consult_chateau_formulairef6c2":{"id":"Consult_chateau_formulairef6c2","dept":"03","canton":"Jaligny-sur-Besbre","commune":"Varennes sur Tèche","nom":"Varennes","type":"Château","periode":"XVI","histoire":"PRECORD, la seigneurie de Précord est lune des plus anciennes et des plus considérables de la région. Son premier seigneur connu est Jean de Montpalein, cité dès 1312. Jusquen 1415, le fief englobe  les Vessets. Au début du XVe siècle, il passe par alliance aux Montjournal. Lun des membres de cette famille, prénommé Jean, doit à la charge quil occupe auprès du maréchal de La Palice de ne pas suivre le connétable de Bourbon auprès de Charles Quint. Il devient alors très puissant et fonde un chapitre de chanoines. Les Montjournal séteignent à la fin XVIe siècle et le fief passe successivement dans plusieurs familles. Les derniers seigneurs du lieu sont le vicomte et la vicomtesse de Grassin, exécutés à la Révolution. En 1809, leurs enfants vendent le château à Claude Delvaux de Chambord. Le domaine, plusieurs fois démembré, est cédé en 1855 à une certaine Mme de Houdetot, dont un ancêtre est mentionné comme ayant pris part à la prise de Jérusalem en 1107.","architecture":"La seigneurie de Précord Ce château ne se visite pas.\r\nMaison forte de Trézuble, de plan rectangulaire à deux niveaux et attiques pavillon d'entré saillant en façade avec toiture pointue.","habitants":"Famille des de Montjournal\"","divers":"Châtea de Precord et de Trezuble à Varennes","gps":"","images":["../../jctruffet.com/image/image_03/03_Varennes_1.jpg"]},"Consult_chateau_formulaire9875":{"id":"Consult_chateau_formulaire9875","dept":"03","canton":"Dompierre","commune":"Vaumas","nom":"Vaumas","type":"Château","periode":"XVI","histoire":"Trois châteaux à Vaumas; la Berlière du XVe siècle, du Breuil du XVIe siècle deux tours carrées et Préreal  du XVe siècle  gothiques donjon et tours.           BERLIERE, à l'origine, était une maladrerie qu'avaient fondée les sires de Chatelperron et qu'ils continuèrent  de possèder jusqu'au début du XIVe siècle. Puis il passa à la famille de Chapeau vers 1320. En 1485, Guillaume de Montjournal est seigneur de La Berlière, de Beaurepaire et de Vivant, grace sa femme Faulque de Gayette. La  famille de Montjournal le conserva jusqu'au milieu du XVIe siècle. Elle appartenait alors à Jacques de Villeneuve en 1559. A la fin du XVIIIe siècle, elle entra dans les possessions  d'une famille Jacob, originaire de Saint-Léon. Puis par héritages successifs, elle passa aux Valleton, Burelle et de Quirielle.       BREUIL dès le XIIIe siècle, la seigneurie du Breuil  est aux mains  des seigneurs de Vaumas, les d'Isserpent, qui possèdent le   Breuil en 1239, alors qu'en 1352, Guillaume du Breuil tient sa vieille maison du  Breuil, de Jehan d'Isserpent, seigneur de Chitaing. A partir de 1388 ou Annette le Long avoue tenir de Louis d'Isserpent, seigneur de Chitaing et de Vaumas, mais ce seigneur n'en détient pas la justice, en 1399  Jehan, chevalier, seigneur de Bellenaves, peut vendre à Jehan de Chastelmorand, chevalier, seigneur de Poligny, la haute, moyenne et basse justice de Breuil les Saint-Pourçain.  En 1447, Annette le Long, alors veuve de Robert de la Creuse, vend la seigneurie du Breuil à Anne de Bonnay, veuve  de Joseph d'Isserpent. Les Bonnay conservèrent le Breuil  jusqu'au XVIIe siècle, ou le domaine passe, par mariage à André Amyot, puis fut vendu, en 1720, à Jean André, conseiller et secrétaire du roi. La terre fut acquise, en 1748, par Pierre Préveraud, seigneur de l'Aubépierre. Les nouveaux propriétaires associèrent désormais les deux seigneuries du Breuil et de Vaumas.\r\nPREREAL, le fief de Préréal fut la propriété d'une famille de ce nom dès le XIVe siècle. En 1503, c'est Anthoine de Préréal, écuyer, qui fait aveu à la duchesse de Bourbon.","architecture":"Berlière, le château de plan en U, composé d'un corps de logis rectangulaire  complété de 2 ailes en retour d'équerre  vers l'est, flanquées aux angles à l'est de 2 tourelles circulaires  dont les parties hautes ont été tronquées. L'angle sud-ouest est aussi pourvu d'une tour ronde tronquée mais d'un diamètre plus grand.  Des latrines en surplomb se voient encore sur la courtine nord ainsi que des meurtrières ajourant les tours. L'aile nord présente, côté cour, un bâtiment à pans de bois.                      Breuil, le château primitif du Breuil a disparu. Il a été remplacé, au XVIe siècle, par un corps de logis, flanqué de deux tours carrées aux angles. Au XVIIIe siècle, des modifications ajoutent, à l'arrière, un logis sans étage, en grès rose,  les transformations du XIXe siècle sont plus importantes elles concernent le corps de logis principal et la tour d'angle  nord. Les communs sont situés au lieu-dit la Réserve et possèdent une belle grange-étable de briques polychromes à décors losangés.     Préréal, La construction qui existait n'a pas résisté aux occupations anglaises  pendant la guerre de cent ans. Installé sur les rives de la Besbre, le château est composé  d'un logis à l'étage coiffé d'un toit en bâtière, dont le mur pignon, côté Besbre, est cantonné aux angles de deux tours circulaires.  Sur le côté opposé est accolé un haut logis rectangulaire couvert d'un toit en pavillon.","habitants":"Famille Jacob                           Famille de Jehan de Chastelmorand\"","divers":"Château de Berlière, du Breuil, et de Preréal à Vaumas.","gps":"","images":["../../jctruffet.com/image/image_03/03_Vaumas_1.jpg","../../jctruffet.com/image/image_03/03_Vaumas_2.jpg","../../jctruffet.com/image/image_03/03_Vaumas_3.jpg","../../jctruffet.com/image/image_03/03_Vaumas_4.jpg","../../jctruffet.com/image/image_03/03_Vaumas_5.jpg"]},"Consult_chateau_formulaire23c7":{"id":"Consult_chateau_formulaire23c7","dept":"03","canton":"Ebreuil","commune":"Veauce","nom":"Veauce","type":"Forteresse","periode":"XIII-XVIII","histoire":"VEAUCE, le château fut construit vers l'an 808 à l'époque où Charlemagne délimitait le royaume d'Aquitaine. Dès le début du IXe siècle, un sire de Veauce possédait un droit de justice sur un territoire assez vaste, Ebreuil, Vicq,  le Mercurol, la Lizolle. En 1080,  Aimon ou Arnauld de Veauce fait don de l'église de Saint Loup de  Veauce aux moines  de l'abbaye bénédictine Saint Léger d'Ebreuil. En 1400,  la seigneurie de Veauce fut érigée en baronnie  par le roi Louis II de Bourbon en faveur de Robert Dauphin,  chevalier, seigneur de Royne et de Veauce.  Après la mort de Charles de Bourbon,  le château releva directement de la couronne et, depuis,  plusieurs familles  illustres s'y sont succédé; les Chauvigny de Blot, les Le Loup, les  du Buysson et, de 1700 à 1970,  les de Cadier de Veauce, une de plus anciennes familles  du Bourbonnais, Charles-Eugène  de Cadier de Veauce grand-père de l'actuel propriétaire et qui restaura le château lui donnera l'aspect qu'il a aujourd'hui, Charles-Eugène siégea au corps Législatif de 1852 à 1870 et devient sénateur de l'Allier en 1876 . En 1973,  le baron Eugène de Cadier a vendu le château à monsieur Tagori  de la Tour. Madame Elisabeth Mincer, propriétaire actuelle, l'a acquis en 2002 de la famille Tagori de la Tour.","architecture":"Veauce, défensif formé d'un ensemble de bâtiments et de courtines entourant complètement une cour. Les bâtiments sont d'époques différentes et montrent le passage du château militaire à l'habitation de plaisance, du XIIIe au XIXe siècle. Au XVe, une partie des fortifications a été abattue pour faire place à un logis en bordure du  ravin. Au XVIIIe siècle, les communs ont été édifiés dans le périmètre de l'enceinte et une vaste terrasse a été édifiée  au nord-est, hors des murailles. Au XIXe siècle, un nouveau corps de logis a été édifié au nord est, dans le style   Renaissance,  sans doute à l'emplacement  d'un autre logis datant de la Renaissance. Les trois tours datent des  XIIIe et XIVe siècles. Le logis du XVe siècle présente  des fenêtres à croisées de pierre,  avec une tourelle d'escalier et  une chapelle,  le pont actuel, situé entre le tournebride  et l'église, envelopperait  la maçonnerie d'un pont médiéval. La terrasse du XVIIe siècle est cantonnée d'échauguettes et accessible par un escalier monumental.","habitants":"Famille d'Arnauld de Veauce\"","divers":"Château de Veauce","gps":"","images":["../../jctruffet.com/image/image_03/03_Veauce_1.jpg","../../jctruffet.com/image/image_03/03_Veauce_2.jpg","../../jctruffet.com/image/image_03/03_Veauce_3.jpg","../../jctruffet.com/image/image_03/03_Veauce_4.jpg","../../jctruffet.com/image/image_03/03_Veauce_5.jpg","../../jctruffet.com/image/image_03/03_Veauce_6.jpg","../../jctruffet.com/image/image_03/03_Veauce_7.jpg","../../jctruffet.com/image/image_03/03_Veauce_8.jpg"]},"Consult_chateau_formulaire3e40":{"id":"Consult_chateau_formulaire3e40","dept":"03","canton":"Herisson","commune":"Venas","nom":"Venas","type":"Maison forte","periode":"XIII","histoire":"VENAS, depuis le XVIe siècle, il n'a cessé d'appartenir à la même famille de la Roche des Fontaines, originaire de la Roche de Chappes, et dont  l'histoire reste  surtout locale, ces seigneurs  ne briguant, d'après C. Gagnon, ni les honneurs, ni les alliances, ni  les chevauchées aventureuses. Leurs descendants, Mme la marquise de Tracy et  Mme du Bellocq, ont restauré la demeure avec goût et en ont respecté les caractères architecturaux anciens.","architecture":"Venas, ancienne protection avancée d'Hérisson, le château est édifié sur une vaste esplanade carrée entourée de douves en eau de 3 côtés, et à laquelle on accède par un pont dormant. Encore pourvu de tours en échauguette  et de meurtrières, ce manoir à corps rectangulaire  fut à l'origine destiné à la défense. Les communs, du XVIIIe siècle, délimitent la cour intérieure.","habitants":"Famille de la Roche des Fontaines\"","divers":"Château de Venas et de Balufière à Venas","gps":"","images":["../../jctruffet.com/image/image_03/03_Venas_1.jpg","../../jctruffet.com/image/image_03/03_Venas_2.jpg","../../jctruffet.com/image/image_03/03_Venas_3.jpg"]},"Consult_chateau_formulairea55e-2":{"id":"Consult_chateau_formulairea55e-2","dept":"03","canton":"Escurolles","commune":"Vendat","nom":"Vendat","type":"Vestiges","periode":"XIII","histoire":"deux châteaux à Vendat dont celui de Vendat du XVe siècle vestiges et des Parroix du XIXe siècle de style médiéval avec deux tours.                     VENDAT La famille de Vendat est connue dès le XIIIe siècle, ou Roger, seigneur de Vendat, accorde, en 1235, des droits d'usage dans son bois de Montoys, aux moines de Neufontaines ; en 1237, à nouveau, Roger, seigneur de Vendat, délaisse sa terre de Lonzat au sire de Bourbon. À la fin du XVe siècle la famille de Vendat ne possède plus le fief qui, en 1495, appartient au chevalier Jacques de Bourbon,   seigneur d'Aubigny. A la fin du XVIe siècle, le nouveau seigneur  de Vendat est le sire de la Vauguyon, maréchal et sénéchal du Bourbonais, François des Cars, qui rachète les seigneuries d'Abrest et de Vendat, en février 1547. Le château est habité au XVIIIe siècle par  la puissante famille des Laqueuille de Châteaugay qui le font aménager en salon d'apparat, vendu comme bien national en 1793.  Château fort du moyen âge, appartenant aux sires de Vendat, peut-être construit en brique comme celui de Rollat.         PARROIX pas d'information historique, transformé en hôtel restaurant.","architecture":"Vendat, en 1793 il perd une partie de ses fortifications, la partie sud en mauvais état  disparaît, puis en 1904, démolition de la partie ouest  abritant le salon. Les vestiges ont été ensuite remaniés et dénaturés.","habitants":"Famille de Vendat\"","divers":"Vestige de Vendat","gps":"","images":["../../jctruffet.com/image/image_03/03_Vendat_1.jpg"]},"Consult_chateau_formulaire0937":{"id":"Consult_chateau_formulaire0937","dept":"03","canton":"St-Pourcain-sur-Sioule","commune":"Verneuil-en-Bourbonnais","nom":"Verneuil_Allier","type":"Maison forte","periode":"XVI","histoire":"Quatre châteaux à Verneuil en Bourbonnais, Chaumejean du XIXe siècle avec tour carrée, des Garennes du XVe siècle tours en angles, de Vaux du XVIIe siècle et de Vousset du XVIe siècle.      VERNEUIL  est au Moyen-Age une des dix-sept châtellenies du Bourbonnais, elle est dotée d'un collège de chanoines, 60 à l'origine, établis en la collégiale Saint-Pierre. Le duc Louis II de Bourbon y construisit un château. Verneuil devient ensuite châtellenie royale dont Jean de Cuzy, capitaine châtelain de Verneuil.  \r\nCHAUMEJEAN, cette terre connue depuis la fin du XVe siècle était détenue par une famille éponyme. Colas de Chaumejean est mentionné parmi les gentilshommes bourbonnais dans l'Armorial de Guillaume Revel.                                   GARENNES, au début du XVIe siècle, est mentionné pour la première fois un seigneur des Garennes en la personne de Jean de Cuzy, capitaine châtelain de Verneuil, dont la famille était signalée en cette paroisse dès le XVe siècle. Vers 1554, des Garennes passèrent à la famille Charlet dont les membres ne s'installèrent au château que vers 1689. Mais en 1699, à la mort de Guillaume Charlet, les Garennes échouèrent  à l'une de ses filles, Madeleine, mariée depuis 1682 à Charles de Saisbut, maire perpétuel de Saint-Pourçain. La famille Sainsbut des Garennes possède encore la terre et le château dont elle a pris le nom. Dès le XIVe siècle, existait une motte fortifiée au  lieu-dit des Garennes, mais les constructions actuelles semblent dater du XVe siècle.                                VOUSSET, le premier propriétaire connu du Vousset est Sébastien Féraud, mentionné dans les années 1563-1575, puis aux Billard dès la fin du XVIe siècle et jusqu'au début du XVIIIe siècle. En 1713, Le Vousset est vendu à François  de Barbancois marchand de Saint-Pourçain qui est désigné sieur du Vousset. Par la suite, la propriété, passe aux Sainsbut des Garennes, puis aux Imbert de Ballore.","architecture":"Chaumejean, bâti au XIXe siècle en briques polychromes appareillées. Un logis presque carré composé de deux niveaux, présente des fenêtres, chaînages d'angles et corniches en pierres blanches dans le style Louis XIII; il est augmenté d'une aile plus étroite placée en retrait et dont la façade est formée de pans de bois aux formes variées remplis d'un appareil de briques rouges à motifs losangés noirs.   Une tour carrée plus haute que l'ensemble du logis, et légèrement débordante, complète le pignon. Cette tour, sans chaînage d'angle en pierre, contient une chapelle à l'étage.                                  Garennes, le corps de logis principal, bordé au sud par une cour délimitée par deux ailes de communs, était entouré de  fossés qui furent comblés. Il présente un plan rectangulaire  flanqué aux angles de la façade Ouest de 2 tours circulaires, et à ceux de la face est de deux tourelles plus petites entre lesquelles fut construite, au XIXe siècle, une avancée en terrasse. L'intérieur fut refait à la fin du XVIIe siècle. Au siècle suivant,  on aménagea la tour nord-ouest en chapelle alors que la tour opposée au sud-ouest fut utilisée dans sa partie haute comme pigeonnier.\r\nVaux est un ensemble de bâtiments installé dans un joli parc boisé. Le corps de logis principal, de plan rectangulaire, date du XVIIe siècle. Il est agrandi par deux pavillons carrés accolés aux pignons. A quelque distance, un pigeonnier carré complète l'ensemble.  Verneuil, entourée de remparts  est l'une des villes les plus importantes du duché de Bourbon.  La ville est prise en 1465 par Louis XI, qui fait démanteler les remparts et le château.                 Vousset, cette maison forte se trouvait en ruine au début du XXe siècle.   Cette demeure, au corps de logis carré percé de fenêtres à meneaux et flanquée de tours circulaires à lanternon,   a été sauvé de la ruine à la fin du XXe siècle.","habitants":"Le duc Louis II de Bourbon          Famille Sainsbut des Garennes  \"","divers":"Château de Verneuil, de Vousset, de Garennes, de Chaumejean et de Vaux à Verneuil","gps":"","images":["../../jctruffet.com/image/image_03/03_Verneuil_Allier_1.jpg","../../jctruffet.com/image/image_03/03_Verneuil_Allier_2.jpg","../../jctruffet.com/image/image_03/03_Verneuil_Allier_3.jpg","../../jctruffet.com/image/image_03/03_Verneuil_Allier_4.jpg","../../jctruffet.com/image/image_03/03_Verneuil_Allier_5.jpg","../../jctruffet.com/image/image_03/03_Verneuil_Allier_6.jpg","../../jctruffet.com/image/image_03/03_Verneuil_Allier_7.jpg"]},"Consult_chateau_formulaire9fec":{"id":"Consult_chateau_formulaire9fec","dept":"03","canton":"Lapalisse","commune":"St-Etienne-de-Vicq","nom":"Verseilles","type":"Maison forte","periode":"XV","histoire":"VERSEILLES, maison forte,  Les premiers seigneurs de Verseilles sont connus  et Jean de Verseilles, seigneur de la Ramas, est mentionné comme vassal de la dame d'Albret. Au milieu du XVe siècle, la maison forte de Verseilles était aux mains des Montmorillon, puis en 1490, les Josien entrèrent  en possession de Verseilles par lettre royale, datée de Gannat. Aussi, en 1503, Jozien de Verseilles rend-il aveu  à la duchesse de Bourbon pour sa maison et place forte de Verseilles, en toute justice, haute, moyenne et  basse. En 1578, Madeleine de  Josien porta la seigneurie de Verseilles à son époux Pierre du Vernet, écuyer.  Après avoir plusieurs fois changé de propriétaires, soit par vente, soit par alliance, la  terre de Verseilles arriva en 1630 à Philibert Badier, seigneur de La Motte Bonvin à Cusset. Les Badier, étendant leur domaine par achats  successifs des seigneuries voisines, Cérézat, Chazeuil, obtinrent, en 1725, la nomination de leur terre de Verseilles en marquisat.","architecture":"Verseilles  construit au milieu du XVe siècle, le château se présente comme une maison forte dont les dispositions architecturales n'ont pas subi de modifications notables, hormis quelques percements du XVIe siècle. Elle est constituée d'un corps de bâtiment  à deux niveaux,Il se compose d'un logis rectangulaire flanqué de deux tours rondes aux d'angle et d'une tourelle d'escalier demi hors-oeuvre, au centre de la façade principale  abrite un escalier à vis. A l'intérieur, un ensemble de pièces ont conservé leurs cheminées gothiques, leurs plafonds à la Française, leurs sols en tomettes et leurs portes à plis de serviette. Des restes de peintures murales du XVIIe siècle décorent certaines pièces du premier étage. Une embrasure de fenêtre du second étage contient un dessin gravé représentant un personnage en pied.","habitants":"Famille des Jozien de Verseilles\"","divers":"Château de Verseilles","gps":"","images":["../../jctruffet.com/image/image_03/03_Verseilles_1.jpg","../../jctruffet.com/image/image_03/03_Verseilles_2.jpg","../../jctruffet.com/image/image_03/03_Verseilles_3.jpg","../../jctruffet.com/image/image_03/03_Verseilles_4.jpg","../../jctruffet.com/image/image_03/03_Verseilles_5.jpg"]},"Consult_chateau_formulaire9777":{"id":"Consult_chateau_formulaire9777","dept":"03","canton":"Lurcy-Lévis","commune":"Le Veurdre","nom":"Veurdre","type":"Château","periode":"XVIII","histoire":"Trois châteaux à le Veurdre, la Beaume, la Charnée  et Beauregard.      BEAUREGARD, fief mentionné dès le Moyen-Age. En 1340, Jean Troussebois, chevalier, seigneur de Chanteloup, rendit foi et hommage au comte  de Nevers pour le château de Beauregard. La famille le posséda jusqu'en 1370. En 1406 Jean de Murat  seigneurs de Beaumont à Agonges, et du Breuil, époux de la demoiselle d'Issart à Autry. Marie Murat ayant épousé en 1543 François Daubrun, la seigneurie entra dans cette famille. de 1611 à 1777, les propriétaires de Beauregard  furent ceux de la Baume. C'est Philibert Alarose, fils de Gilbert de la Baume, qui avait partagé ses biens, que l'on doit l'actuel château. En janvier 1789, il le vend à son frère Claude seigneur de la Charnée. Gilbert Le Blanc, docteur en médecine dit marquis de Beauregard.                               La BAUME, en 1301 a Perrin-Blanc. Le château resta dans la famille Blanc jusqu'en  1570, puis en 1589 la destruction fut achevée par Claude de la Châtre
