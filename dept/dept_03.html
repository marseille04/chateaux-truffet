e paraît héréditaire, car son fils Pierre, seigneur de Sarre et de  Noyant, est maître d'hôtel de madame  la duchesse du Bourbonnais  et d'Auvergne. C'est lui qui fait construire le château du XVe siècle. En 1682 messire Sébastien de Chambon, sieur de Tallavat et de Serre, vend les fiefs de Sarre et de Vieilleville à  M. Mathieu Aumaistre, bourgeois et échevin de la ville de Lyon. Au XVIIe siècle, la seigneurie sera achetée par la  famille de Barthillat.                          Le Vieux Sarre est sans doute à l'origine de la seigneurie: un Robert de Sarre est mentionné, en 1160   L'histoire des seigneurs de Sarre est celle de familles nobles  qui ont bénéficié des faveurs ducales ou royales,   accaparant charges, fiefs et biens, arrondissant leur patrimoine par héritages, mariages ou achats.","architecture":"Le vieux Sarre fut édifié sur un éperon barré de confluence du Venant et du ruisseau dit la Courtine,  éperon dominant les talwegs d'une quarantaine de mètres, sur ce plateau, s'est dressé une forteresse appelée  Le Châtelard ou Le Fort, chargée de la surveillance  d'une vieille voie  et du gué du Venant. Ce château primitif   était fermé vers le plateau par une levée longue de 80 mètres et haute d'une dizaine de mètres, précédée d'un  large ensellement.  Au XVe siècle est construit aux portes de Montmarault, donc sur la hauteur, un château de  Sarre, remplacé plus  tard par une nouvelle construction, il en reste un remarquable puits à panneaux d'écussons et armoiries.  Un nouveau château de Sarre en briques rouges sera édifié à quelque distance, en 1857, près de Blomard  assiste ainsi  à une pérégrination du toponyme qui, au cours des siècles, se déplacera de plusieurs kilomètres sur la même commune. Sarre en vieux parler  désigne un lieu où l'on se serre, au sens  de se protéger, de se fermer.","habitants":"Famille de Guillaume de Sarre \"","divers":"Château de Blomard, de Sarre, de Bouille, de Montmarault et Sallebrune à Blomard","gps":"","images":["../../jctruffet.com/image/image_03/03_Sarre_Montmarault_1.jpg","../../jctruffet.com/image/image_03/03_Sarre_Montmarault_2.jpg","../../jctruffet.com/image/image_03/03_Sarre_Montmarault_3.jpg","../../jctruffet.com/image/image_03/03_Sarre_Montmarault_4.jpg","../../jctruffet.com/image/image_03/03_Sarre_Montmarault_5.jpg","../../jctruffet.com/image/image_03/03_Sarre_Montmarault_6.jpg"]},"Consult_chateau_formulairefba9":{"id":"Consult_chateau_formulairefba9","dept":"03","canton":"Escurolles","commune":"Serbannes","nom":"Serbannes","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux à Serbannes,  château du Jaunet du XVI-XIXe siècles, château à Pouzat, du XIXe siècle.                 JAUNET,  siège d'une importante seigneurie mentionné en 1501. Au XVIIe  siècle, il est habité par la puissante famille des Beaufort Canillac. On a peu de renseignements sur les seigneurs du lieu, sinon qu'au XVIIIe siècle, le seigneur du Jaunet était en même temps seigneur du Montet.                 POUZAT, la présence d'une chapelle plaide en faveur d'une maison seigneuriale.  En 1569, la maison noble de Pousat, comme  justice et maison seigneuriale, vassale de la châtellenie de Billy.","architecture":"Jaunet, du XVIe siècle,  indique un château ayant peu d'ouvertures,  bâti sur un plan en U avec deux tours rondes aux extrémités sud des ailes est et ouest, avec   pièce d'eau ou douves au nord. Après cette date, modification importante du plan initial par destruction du corps  central et de l'aile ouest et construction d'un nouveau corps central plus au sud entre les deux tours, construction d'un pigeonnier et comblement des douves.               Pouzat, château dont les dernières transformations datent du XIXe siècle,    Le Château actuel avec  ses communs fut construit entre 1839 et 1844, dans le cadre d'un jardin à la Française, déjà aménagé et figurant  sur le cadastre de 1839, et cinq maisons et leurs bâtiments  qui furent raséeS pour céder leurs places au château de Pouzat. Celui ci possède  une cheminée du XVIIIe siècle provenant de Bourgogne.","habitants":"Famille des Beaufort Canillac\"","divers":"Château de Jaunet à Serbannes","gps":"","images":["../../jctruffet.com/image/image_03/03_Serbannes_1.jpg","../../jctruffet.com/image/image_03/03_Serbannes_2.jpg","../../jctruffet.com/image/image_03/03_Serbannes_3.jpg","../../jctruffet.com/image/image_03/03_Serbannes_4.jpg"]},"Consult_chateau_formulaire1455":{"id":"Consult_chateau_formulaire1455","dept":"03","canton":"Lapalisse","commune":"Servilly","nom":"Servilly","type":"Maison forte","periode":"XIV-XVI","histoire":"Trois châteaux à Servilly dont celui de Servilly du XIII-XVIIIe siècle avec deux tours rondes, des Gadins du XVI-XVIIe siècle et de Gléné du XIV-XVIIIe siècle deux tours.                          GADINS, le premier seigneur connu des Gadins est, en 1491, Henri Gadins, seigneur. La famille conserva le seigneurie jusqu'à la fin du XVIIe siècle et donna de nombreux officiers seigneuriaux. En 1676, Geoffroy Gadins était lieutenant général en la châtellenie de Billy, c'est sa fille qui par son mariage, fit passer  la seigneurie des Gadins aux Blanchardon. A la fin du XVIIIe, la famille Virotte en devint  propriétaire jusqu'en 1872, date à laquelle le Château-Gadin fut acquit par la comtesse de Dienne. et en 1920 acquis par monsieur Jaclot du Potier qui le possède toujours.\r\nGLENE, en 1343, la seigneurie  appartenait à une famille de Villars, que l'on retrouve encore au XVIe siècle en possession du fief. En 1503, François de Gléné, écuyer, fit aveu au seigneur de Châteaumorand. Gléné fut vendue en 1525 à Antoine de Chabannes, évêque du Puy.  En 1531, l'évêque donna la terre à son neveu  à  Pierre de Martinières seigneur d'Isserpent. En 1548 ce dernier le vendit à un cousin, Charles de Chabannes  que ses descendants conservèrent jusqu'à  la fin du XVIe. Au XVIIe siècle, Gléné revint à la famille de Villars, puis revendue aux Neveu, seigneurs de la Tour Pourçain. Après avoir appartenu aux Morigny, Gléné échut à Jacques Amable Rollet d'Avaux, premier président  du présidial de Riom. Gléné fut alors confisquée et vendue comme bien national. Les Maridet, se rendit acquéreurs  du château et le  conservèrent jusqu'à la fin du XIXe siècle. Peu avant la Grande Guerre, Gléné fut vendu à monsieur Andréas Muller, De nos jours, les anciennes terres dépendant de Gléné appartiennent,  au chercheur suisse Andreas Muller.\r\nSERVILLY en 1217, les comtes de Nevers le tenaient en fief de l'évêque de Clermont. Au XIVe siècle, la seigneurie de Servilly appartenait   à la famille d'Isserpent, qui en fit aveu, d'abord en 1301 avec Jehan d'Isserpent, au seigneur de Bourbon, pour tout ce qu'il possédait à Servilly, à savoir, sa maison et les appartenances de ladite maison. En, 1386, Henri d'Isserpent renouvelle l'aveu.","architecture":"Gadins, Cette ancienne maison forte a pris le nom de Château-Gadin. Construite au XVe siècle, et aménagée aux siècles suivants, elle est formée d'un corps de logis rectangulaire à deux niveaux et niveau de comble, flanqué de deux tours rondes couvertes de toits coniques.      Glene, avec ses deux grosses tours du XIVe siècle, malgré des retouches fâcheuses, Gléné est assurément un des plus jolis spécimens des gracieuses constructions. Les remaniements du XVIIIe firent disparaitre les anciennes ouvertures, pour les remplacer  par de larges baies. Le château de Gléné s'agrémente d'une svelte tourelle, d'une salle basse élégante et au sommet de la tour sud, d'une salle de guet bien conservée.  \r\nServilly, Près du domaine des Pérards, la route de Montaigu coupe en deux une ancienne motte féodale, dont on aperçoit encore les fossés. Au début du XIXe siècle, on pouvait y voir des murailles entourées de \"fossés pleins d'eau et larges de huit pieds\". Cette fortification de terre portait l'ancien château fort de Servilly qu'en 1217, les comtes de Nevers tenaient en fief de l'évêque de Clermont. Aujourd'hui, une maison basse flanquée de deux tours rondes tient lieu de château.","habitants":"Famille des  Gradins                                                                                        Famille de Villar                                                               Famille d'Isserpent\r\n        \r\n        \r\n        \"","divers":"Château  de Glené, de Gadins et de la Palisse à Servilly","gps":"","images":["../../jctruffet.com/image/image_03/03_Servilly_1.jpg","../../jctruffet.com/image/image_03/03_Servilly_2.jpg","../../jctruffet.com/image/image_03/03_Servilly_3.jpg","../../jctruffet.com/image/image_03/03_Servilly_4.jpg","../../jctruffet.com/image/image_03/03_Servilly_5.jpg"]},"Consult_chateau_formulaire7976":{"id":"Consult_chateau_formulaire7976","dept":"03","canton":"Souvigny","commune":"Souvigny","nom":"Souvigny","type":"Château","periode":"XV-XIX","histoire":"Sept châteaux à Souvigny , le château des Bourbons du XIVe siècle vestiges(Voir Article ), des Chaulets du XVIIIe siècle, de Chery du XVIe siècle, d'Embourg du XV-XIXe siècles  (Voir Article ), de Matray (Voir Article ) de Montaret du XIIIe siècle vestiges (Voir Article ) et de la Vivayre du XVIe siècle.                   SOUVIGNY, En lan 916, Aimard, premier ancêtre connu des Bourbons, fait don à labbé Bernon de Cluny de sa « villa » de Souvigny et de léglise qui sy trouve, consacrée à Saint-Pierre. Ainsi, une dizaine dannées après la fondation de labbaye de Cluny. Souvigny ne cessera daccroître son influence sur le Bourbonnais. Son église prieurale deviendra un centre de pèlerinage fréquenté au Moyen-Age, et la capitale spirituelle des Bourbons. Pendant plusieurs siècles, le rayonnement de Souvigny et la puissance des Bourbons vont se développer conjointement, permettant létablissement en Bourbonnais de nombreux prieurés et églises romanes.  CHAULETS, pas d'information historique. CHERY, dés 1271 un accord entre le prieuré de Souvigny et le seigneur de Bourbon mentionne l'appartenance à  Simon de Cherry, en 1300 le fief divisé entre Guillaume et son frère Bartholomé, sa soeur qui échangea sa part moyenant une propriété de même valeur. En 1500 c'est Gilbert de Cherry  écuyer qui en est  le seigneur  et en 1569 passe à Jean de Bigue écuyer.                            VIVAYRE, le premier  connu, en 1593, était Charles de Bigue, inhumé en 1598 en la \"grand esglise des Moines\". Le 25 décembre 1601, Hilaire de Bigue, dame de La Vivière, épousa Claude des Escures, sieur de  Pontcharault. La famille comptait  un second fils, illégitime, le \"bâtard de La Vivère\", Gilbert de Bigue, qui devint prieur de Chantenay. La propriété resta entre les mains de la famille des Escures, qui compta un chevalier de St-Jean de Jérusalem, Louis des Escures de la Vivère, décédé en 1691 à l'âge de 45 ans, et mentionné dès 1676 comme   chevalier de Malte  dans les registres paroissiaux de Noyant. Esmé des Escures, seigneur de la Vivère, qui lui succéda, mort en 1694, était également signalé comme seigneur de Franchesse dans un acte en 1676. Le dernier membre connu de la famille décéda à l'âge de 84 ans, en 1719, il s'agissait de Jean des Escures de la  Vivère. En 1735,   Reclesne de Lyonne, chevalier, seigneur de La Vivère, capitaine de cavalerie au Royal-Roussillon.","architecture":"Souvigny, est un ensemble architectural avec musée et jardin,  plus vaste réalisation romane du Bourbonnais, l'ensemble architectural comprend également des jardins à la Française et des granges médiévales qui abritent un musée. Saint-Mayeul, l'abbé de Cluny, fut enterré en 994 dans l'église originelle. La découverte de son tombeau a relancé des fouilles                        Chaulets, le château a été construit de 1780 à 1789 comprenant un long corps de logis, à rez-de-chaussée et niveau de comble de forme rectangulaire, couvert d'une toiture a pans coupes en pignons et des communs à l'est. Un avant corps central rompt la monotonie de la rigueur classique par sa surélévation à trois fenêtres et il-de-buf et son chaînage de pierres moulurées avec des encadrements de pierre. Les travaux des communs ont été arrêtés par la Révolution puis repris de 1800 à 1807. La cour d'entrée communique au nord avec le parc par un portail ouvert dont les pilastres sont surmontés de motifs sculptés en \"pomme de pin\".                     Chery, édifié au  XVIe siècle sur des constructions plus anciennes, modifié aux XVIIe et XVIIIe. A l'est, la partie la plus ancienne (fin XVe siècle) a  l'aspect d'un petit manoir, une tourelle d'escalier à vis en desservant les parties.  Aujourd'hui musée du prieuré, lhistoire des moines Clusiens et des Bourbons.","habitants":"Les ducs de Bourbons\"","divers":"Château de Chaulets d'Embourg, des Vieux murs, de Vivayre et de Chery à Souvigny","gps":"","images":["../../jctruffet.com/image/image_03/03_Souvigny_1.jpg","../../jctruffet.com/image/image_03/03_Souvigny_2.jpg","../../jctruffet.com/image/image_03/03_Souvigny_3.jpg","../../jctruffet.com/image/image_03/03_Souvigny_4.jpg","../../jctruffet.com/image/image_03/03_Souvigny_5.jpg","../../jctruffet.com/image/image_03/03_Souvigny_6.jpg","../../jctruffet.com/image/image_03/03_Souvigny_7.jpg","../../jctruffet.com/image/image_03/03_Souvigny_8.jpg","../../jctruffet.com/image/image_03/03_Souvigny_9.jpg"]},"Consult_chateau_formulaire8157":{"id":"Consult_chateau_formulaire8157","dept":"03","canton":"Escurolles","commune":"St-Didier-en-Foret","nom":"St_Didier_en_Foret","type":"Château","periode":"XVI-XIX","histoire":"Quatre châteaux en Saint-Didier en Forêt; La Brosse du XVIIe siècle , la Chaume du XIXe siècle, des Ecures du XVIIIe siècle et de Jaulnay du XVI-XIXe siècles.        BROSSES, Fut le siège de la milice dans la seconde guerre, et  ce domaine est actuellement utilisé pour l'élevage de Chevaux. pas d'information historique CHAUME,  pas d'information historique.   \r\nECURES pas d'information historique.  JAULNAY, les fiefs et seigneuries du Jaulnay relevaient de la châtellenie de Billy. La terre a été acquise en 1755  par Jean Berger,  conseiller au présidial de Lyon.","architecture":"Brosses,   maison-forte de plan rectangulaire avec aile en retour d'équerre, flanqué aux angles de deux tourelles d'escalier. Entre 1839 et 1987, la maison est amputée  d'une partie de sa longueur, pigeonnier et décrochements de la grange étable détruits, canaux et pièces d'eau comblés et construction d'un hangar et d'un bâtiment d'exploitation.  Actuellement ensemble dénaturé.      Chaume, construit à partir de 1860 dans le jardin d'un domaine dont les bâtiments agricoles furent modifiés et augmentés d'une grange remise portant la date de 1868. Cette construction du XIXe siècle, à deux niveaux et niveau de comble, est composée  d'un bâtiment principal  de plan rectangulaire, auquel  est accolé, à l'angle sud est, un petit pavillon carré en avant-corps. Pierres d'angle, chaînages et entablements moulurés soulignent la façade alors que le toit en pavillon s'éclaire de deux lucarnes néo-renaissance à arc en plein cintre.    Ecures, du  XVIIIe siècle, toiture en tuile plate et génoise ; maison de plan rectangulaire avec ailes en retour d'équerre, en rez-de-chaussée, toit à pente raide percé de lucarnes  ferme construite en 1876, une partie de l'aile gauche du château a été détruite par un incendie au cours du XIXe siècle.   Jaulnay, château du XVIe siècle, deux autres bâtiments et une pièce d'eau en demi cercle au sud est, peut être des douves et une ferme à l'ouest. Entre 1872 et 1879, agrandissements des bâtiments existants de la ferme et construction d'un nouveau bâtiment. En 1880 la construction du château actuel est effectuée sur l'emplacement de l'ancien, la pièce d'eau est comblée. Le château est couvert en ardoise et la ferme en tuile plate. Château de plan carré avec une tour ronde d'angle et corps principal à élévation ordonnancée.","habitants":"Seigneurs locaux\"","divers":"Château des Brosses, de Chaume, des Ecures et de Jaulnay à Saint-Didier en Foret.","gps":"","images":["../../jctruffet.com/image/image_03/03_St_Didier_en_Foret_1.jpg","../../jctruffet.com/image/image_03/03_St_Didier_en_Foret_2.jpg","../../jctruffet.com/image/image_03/03_St_Didier_en_Foret_3.jpg","../../jctruffet.com/image/image_03/03_St_Didier_en_Foret_4.jpg","../../jctruffet.com/image/image_03/03_St_Didier_en_Foret_5.jpg","../../jctruffet.com/image/image_03/03_St_Didier_en_Foret_6.jpg"]},"Consult_chateau_formulaire5b3f":{"id":"Consult_chateau_formulaire5b3f","dept":"03","canton":"Huriel","commune":"Saint-Eloi-d`Allier","nom":"St_Eloi_Allier","type":"Vestiges","periode":"XII","histoire":"Deux châteaux à St-Eloi d'Allier le Malvaux  du XIXe siècle Pastiche féodale et la Roche Guillebaud.                MALVAUX, pas d'information historique.   La ROCHE-GUILLEBAUD dresse ses ruines romantiques : un donjon et quelques tours abandonnés depuis le XVIIe s. Construit au XIIe siècle  par Guillaume de Châteauroux, il passa en 1218  aux Humbault d'Huriel.  Il fut plusieurs fois pris et repris par les Anglais, les Français et les Routiers, il est à l'état de ruines. Pas d'information historique.","architecture":"Malvaux,  construction de plan rectangulaire avec un haut donjon à machicoulis et une tour ronde d'angle, daterait de 1830, mais a dû remplacer un château plus ancien.                     la Roche Guillebaud dresse ses ruines romantiques à la frontière de l'allier et du Cher, à une dizaine de kilomètres de Culan. Le cadre de vie dans ce château est austère et sinistre. George Sand n'est pas restée indifférente à la sombre beauté de ces ruines, Sur les confins de la Merche et du Berry, dans le pays qu'on appelle La Varenne et qui n'est qu'une vaste lande coupée de chênes et de châtaigniers, on trouve, au plus fourré et au plus désert de la contrée, un petit château en ruine, tapi dans un ravin et dont on ne découvre les tourelles ébréchées qu'à environ cent pas de la herse principale. Les arbres séculaires qui l'entourent et les roches éparses qui le dominent l'ensevelissent dans une perpétuelle obscurité et c'est tout au plus si, en plein midi, on peut franchir le sentier abandonné qui y mène sans se heurter contre les troncs noueux et les décombres qui l'obstruent à chaque pas. Ce sombre ravin et ce triste castel, c'est la roche Mauprat. Ces lignes ont été écrites dans son roman « Mauprat » en 1837.","habitants":"Guillaume de Châteauroux\"","divers":"Vestiges de la Roche-Guillebaud et château de Malvaux à Saint-Eloi d'Allier.","gps":"","images":["../../jctruffet.com/image/image_03/03_St_Eloi_Allier_1.jpg","../../jctruffet.com/image/image_03/03_St_Eloi_Allier_2.jpg","../../jctruffet.com/image/image_03/03_St_Eloi_Allier_3.jpg","../../jctruffet.com/image/image_03/03_St_Eloi_Allier_4.jpg"]},"Consult_chateau_formulaire64f4":{"id":"Consult_chateau_formulaire64f4","dept":"03","canton":"Yzeure","commune":"St-Ennemond","nom":"St_Ennemond","type":"Château","periode":"XVI-XVIII","histoire":"Deux châteaux à Saint-Ennemond, château des Beau-Chevrier  du XVIIIe siècle et le manoir des Prots .                       BEAU-CHEVRIER était autrefois connu sous le nom de château des Prosts ou des Beaux Chevrais, du nom du bois  du Bost Chevrier, c'est à dire bois des chèvres que portait un domaine voisin. Le 24 mai 1620, un   hôtel des Prostz  fut mis en vente et  adjugé à Jean Fouchier, procureur en la sénéchaussée de Moulins. Un siècle après, en 1731, le lieu des Prosts et de Beauchevrier fut vendu avec le pré de réserve à \"noble\" c'est à dire \"notable\" Louis Charbon, sieur de la Maison Neuve.                           Prosts ou des Prots, est un ensemble de type bourbonnais, même seigneureie que Beau-Chevrier.","architecture":"Beau-Chevrier Il est constitué d'un logis en briques  bicolores, de communs  du XVIIIe siècle, d'une grange à pans de bois et de restes de fossés.         Prots, en briques bicolores. Le corps de logis rectangulaire, à 2 niveaux et niveau de comble, est flanqué aux angles de 2 tourelles carrées, coiffées de toits en pyramide. Les combles élevés s'éclairent de petites lucarnes.","habitants":"Famille de Louis Charbon\"","divers":"Château de Beau-Chevrier et de Prots à Saint-Ennemond.","gps":"","images":["../../jctruffet.com/image/image_03/03_St_Ennemond_1.jpg","../../jctruffet.com/image/image_03/03_St_Ennemond_2.jpg","../../jctruffet.com/image/image_03/03_St_Ennemond_3.jpg"]},"Consult_chateau_formulairec579":{"id":"Consult_chateau_formulairec579","dept":"03","canton":"Varennes-sur-Allier","commune":"St-Felix","nom":"St_Felix","type":"Maison forte","periode":"XVII","histoire":"Deux châteaux à Saint-Félix, de Rax  du XVII-XVIIIe siècle  et du Tremblay  du XVIIe siècle.                          RAY ou RAX, le premier seigneur connut concernant le fief en  1300, est Etienne Sapin, chevalier, rend hommage pour son hostel, terre et seigneurie de la Rax.  Après avoir appartenu au XVIe siècle à Pierre de Villars, la terre de Rax est vendue en 1636 à Emmanuel du Sauzay, écuyer, seigneur des Fontaines. Confisqués  comme bien national, le château  et la terre de Rax  devient à la famille Fradel qui le possédait encore à la fin du XIXe siècle.            TREMBLAY, pas d'information historique.","architecture":"le Rax fut, à la fin du XVe siècle, une des terres les plus importantes de la paroisse de Saint-Félix, ayant  regroupé les fiefs de Sapinière et du Tremblay. Le château fut reconstruit au XVIIIe siècle, mais totalement délaissé au XXe siècle, il était en ruine dans les années 1960. Il fut alors presque entièrement démoli, et les  matériaux servirent de remblais ou furent éparpillés au gré des acquéreurs. Il ne reste plus aujourd'hui  qu'un bâtiment sans caractère servant d'exploitation agricole.           Tremblay, est une construction relativement massive du XVe siècle, le corps de bâtiment de plan barlong, à deux niveaux, est flanqué aux angles de deux tours rondes, couvertes de toits coniques, cette  première construction est doublée d'un second corps de logis plus imposant, à deux niveaux et niveau de comble, qui a été profondément remanié au XVIIIe siècle.","habitants":"Famille de Pierre Villars\"","divers":"Maison forte de Rax et de Tramblay à st-Felix","gps":"","images":["../../jctruffet.com/image/image_03/03_St_Felix_1.jpg","../../jctruffet.com/image/image_03/03_St_Felix_2.jpg"]},"Consult_chateau_formulaire034a":{"id":"Consult_chateau_formulaire034a","dept":"03","canton":"Varennes-sur-Allier","commune":"St-Gérand-le-Puy","nom":"St_Gerand_le_ Puy","type":"Château","periode":"XV-XIX","histoire":"Trois châteaux à Saint-Gérand le Puy dont celui de St-Gérand du XV-XVIIIe siècle, le Gondailly du XV-XIXe siècle et le Payratons du XXe siècle aujourd'hui auberge.                                 GONDAILLY , cette terre appartient au XIIIe siècle à la famille de Vichy. Au XIVe siècle, le fief a changé de mains : Pierre de Chantemerle en est dit le seigneur en 1367. Gondailly reste dans cette famille jusqu'au XVIe siècle, puis on   voit se succéder en 1521 Antoine de Chabannes, évêque du Puy, en 1587, Marc de la Grave, en 1619, Jean de Villard, seigneur de la Brosse-Raquin à Tortezais, puis en 1629, Philibert de Chazerat. Pendant un siècle, les Chazerat se succèdent à Gondailly. En 1670 Gilbert de Chazerat, ingénieur des fortifications, participe aux côtés de Vauban à la remise en état des défenses du nord. Ils vendent Gondailly en 1731 à Claude Barbonnet, dont l'un des descendants, Bonnet, sera maire de Moulins  en 1777. Le fief est revendu au XIXe siècle à M. Richard d'Aubigny, puis à M. de Saint-Gilles, et en 1872 à M. Bichard qui fit détruire  le château médiéval, et construire la haute et massive bâtisse actuelle. Les terres de Gondailly ont été rachetées par l'entreprise Vicat pour y  exploiter une carrière ; la maison, isolée sur son tureau calcaire, a été totalement pillée et certainement vouée à une disparition  prochaine.                                ST-GERAND Au XVIIe, la prospérité est manifeste : les officiers de la Chatellenie de Billy y avaient installé leurs demeures et prirent l'habitude d' y rendre leurs jugements. Des droits de péages sur les marchandises qui passaient par le grand chemin y étaient perçus, au profit du chatelain de Billy.   Pas d'information historique.        PAYRATONS, pas d'information historique,  maison bourgeoise  de caractère de la fin XVIIIe siècle aujourd'hui gites de France par la famille Poulet.","architecture":"Saint-Gerand, situé à l'extrémité d'un plateau dominant la vallée du Redan, le château édifié au XVIe siècle remplace une construction plus ancienne. Il affecte un plan rectangulaire allongé, flanquée d'une tour d'escalier ronde à l'ouest  et de deux tours circulaires aux angles nord-est et sud-est, le côté sud fut prolongé d'un pavillon  étroit, de même hauteur que le logis.       Gendailly, corps de logis rectangulaire allongé à deux niveaux et attiques  flanqué de trois tours rondes à toitures en poivrières, une en angle l'autre en façade, la troisième plein cintre en façade à l'opposé.                     Payratons maison de caractère de la fin XIXe siècle à deux niveaux toiture en croupe, balcon sur la partie arrière.","habitants":"Famille de Pierre de Chantemerle \"","divers":"Château de St-Gérand, de Gendailly et de Payratons à  Saint-Gérand le Puy.","gps":"","images":["../../jctruffet.com/image/image_03/03_St_Gerand_le_Puy_1.jpg","../../jctruffet.com/image/image_03/03_St_Gerand_le_Puy_2.jpg","../../jctruffet.com/image/image_03/03_St_Gerand_le_Puy_3.jpg","../../jctruffet.com/image/image_03/03_St_Gerand_le_Puy_4.jpg"]},"Consult_chateau_formulairedc8f":{"id":"Consult_chateau_formulairedc8f","dept":"03","canton":"Neuilly-le-Réal","commune":"St-Gerand-de-Vaux","nom":"St_Gerand_Vaux","type":"Château","periode":"XVI","histoire":"Plusieurs châteaux à St-Gérand;  du Vaux, de Guichardots du XIXe siècle, d'Hauterives du XVIIIe siècle, de Royer du XVIIe siècle et de St-Gérand du XVI-XVIIIe siècle.                                                          St-GERAND, le fief de St-Gérand est connu depuis le XIIIe siècle par sa taille de 1350 mètres carré x 2 sans doute le premier  par son comté de 135000 hectare au XVIIe siècle et ses propriétaires; Coeur, Soreau, Lévis-Ventadour, Tour d'Auvergne, Rohan, Orry et Bertin. EN 1351 par Blayn de Chouvigny dont le fils Philippe sera chambellan du duc Louis II de Bourbon au XVe siècle sera cédé au célèbre Jacques Coeur et après la confiscation des biens de ce dernier, le domaine revient à Catherine de Maignelay, veuve  de Jean Sureau et mère d'Agnès Sorel la favorite de Charles VII, son arrière petite-fille Anne Sureau héritière épouse Gabriel de la Guiche gouverneur de la Bresse, Jean-François de la Guiche (1569-1632),  maréchal de France et gouverneur du Bourbonnais  épousa Anne de Tournon héritière de Chabannes seigneur de la Palice veuf il convole avec Suzanne, la fille du premier lit, Suzanne de Longaunay, épouse Maximilien de la Guiche, leur fils  Bernard à son décès en 1696 sans descendance, les biens reviennent à Marie de la Guiche duchesse de Ventadour. La petite fille de la duchesse en 1717 cède St-Gérand à un financier périgourdin Louis Mathieu de Bertin, passe ensuite à Philibert Orry contrôleur des finances, en 1763 passa à la famille Causabon qui l'habité encore à la Révolution, le château aliéné plusieurs fois  appartient aujourd'hui à M.Marc -Eric Chambon.\r\nHAUTERIVES était au début une école d'officiers de Cavalerie, vendu comme bien nationale à la Révolution habité de nouveau qu'en 1870 est demeure depuis dans la même famille, une restauration s'imposé elle fut réalisée de 1981 à 1993 par les actuels propriétaire M. Jacques de Chacaton et Mme Cornubert de Saint-Aubin.                                    GUICHARDOTS, château construit en 1875.  Edifice représentatif de la vie mi-mondaine mi-champêtre menée par certaines familles aisées avant la guerre de 1914. ROYER, château datant du XVIIe, XIXe siècle. Royer est un ancien domaine appartenant à la terre de Bel Air, reconstruit en maison de plaisance au XVIIIe siècle sans doute par les Michel, famille de fonctionnaires royaux dont est issu le poète moulinois Théodore de Banville. La propriété changea de main au cours des XVIIIe  et XIXe siècles; en 1874  s'y installa une colonie de fouriéristes, groupés sous la direction de Hardy, ingénieur des Ponts et Chaussées.   Malgré les efforts de chacun, l'expérience tourna court et Hardy  mourut ruiné à Lyon, non sans avoir participé aussi à la Commune.","architecture":"St-Gerand,  grand château Renaissance du XVIe et XVIIIe siècle, composé d'un logis central encadré de deux ailes en retour, il présente l'aspect d'une demeure classique, en briques et pierre. L'aile de gauche conserve un magnifique escalier à quatre volées droites. L'édifice se présente comme un ensemble de bâtiments situés au milieu d'un parc clos. Un superbe portail d'ordre dorique à bossages permettait d'accéder à l'intérieur de la propriété. \r\nHauterives, château édifié de 1600 à 1610 puis remanié aux XIXe siècle. Composé d'un logis encadré de deux ailes en retour, il présente l'aspect d'une demeure classique, en briques et pierre, des communs. Le logis noble, de style néo-classique, est percé de travées régulières et comporte un ensemble d'appartements ornés de décors, grand salon à dessus-de-porte peint,  les communs, de style bourbonnais traditionnel, en retour d'équerre sur la cour d'honneur, présentent un appareil de briques losangées polychromes de grande qualité. \r\nGuichardots,édifice de style néogothique comprenant un corps de logis carré cantonné de tours rondes et un grand pavillon carré. principe de l'asymétrie pondérée, emploi du mur pignon, utilisation du jeu des matériaux à des fins décoratives.                   Royer, ancien domaine appartenant à la terre de Bel Air, reconstruit en maison de plaisance au XVIIIe siècle, assez vaste, comporte un corps de bâtiment unique à un seul niveau, couvert d'un toit   à croupe percé de lucarnes, flanqué de deux tours circulaires. La travée centrale, où est ouverte la porte d'entrée,  est surmontée d'un mur pignon à fronton triangulaire. La cour d'honneur, en regard de la façade, est bordée de  communs dont les angles nord-ouest et sud-ouest sont flanqués de deux tours polygonales.","habitants":"Famille Causabon\r\n        \"","divers":"Château de saint-Gèran, de hauterives, des Guichardots et de Royer à Saint-Gérand de Vaux.","gps":"","images":["../../jctruffet.com/image/image_03/03_St_Gerand_Vaux_1.jpg","../../jctruffet.com/image/image_03/03_St_Gerand_Vaux_2.jpg","../../jctruffet.com/image/image_03/03_St_Gerand_Vaux_3.jpg","../../jctruffet.com/image/image_03/03_St_Gerand_Vaux_4.jpg","../../jctruffet.com/image/image_03/03_St_Gerand_Vaux_5.jpg","../../jctruffet.com/image/image_03/03_St_Gerand_Vaux_6.jpg","../../jctruffet.com/image/image_03/03_St_Gerand_Vaux_7.jpg"]},"Consult_chateau_formulaire10a2":{"id":"Consult_chateau_formulaire10a2","dept":"03","canton":"Chantelle","commune":"St-Germain-de-Salles","nom":"St_Germain_de_Salles","type":"Manoir","periode":"XV-XIX","histoire":"Quatre châteaux à saint-Germain la Salles, celui de Bel-Air du XIXe siècle plaisance, de Céron du XVe siècle, des Joyeux  du XIXe siècle Plaisance,  et de la salles,  et à quelques kilomètres au sud à Mayet d'Ecole le manoir de Bel-Air. SALLES, du XVIe siècle  Terre mentionnée dès le XIIIe siècle, qui appartient aux Bourbons et fut confisquée en 1523 par François Ier. La famille Du Peschin fait édifier un château.                 CERON, ce château était installé sur l'ancienne paroisse de Saint Cyprien. En 1569 \"la  maison noble de Céron alias de Daume\" qui, vers 1600, est portée par Marie de Céron, dernière de sa lignée, à Michel Menudel seigneur de Chassignat à Chareil Cintrat. Après avoir appartenu à la famille de la Roche, en 1694,  la seigneurie de Céron fut acquise par messire Gilbert Simon Roussaut, écuyer, seigneur de Boussat à Target, la terre resta dans cette famille  jusqu'au XIXe siècle et ce n'est qu'en 1840 que le château et le domaine de Céron furent vendus à la famille Desgranges.      JOYEUX, les Joyeux étaient à l'origine une seigneurie détenue par les Chauvigny de Blot, seigneurs de Salles. Au XVIIIe siècle, la terre était aux mains d'une famille Lucas alliée aux Loisel de Douzon à Etroussat. C'est une de leurs descendantes qui porta Joyeux au vicomte de Rambourg, originaire de Troyes et qui, sans enfant, fit de M.de Horts, avocat à Gannat, son légataire universel. M. d'Hombre ancien officier de la cavalerie, marié à une fille des Horts, hérita de la terre  des Joyeux  toujours dans la  descendance.","architecture":"Bel-Air, le château de bel-air présente toutes les caractéristique de l'architecture de plaisance,  imitant l'architecture classique.d'un corps de logis rectangulaire à trois niveaux avec fronton en toitures.\r\nCeron, la demeure a conservé, en partie seulement, ses caractères de  la fin du moyen age, à travers  les restaurations du XVIIIe siècle. Logis principal de plan rectangulaire allongé, à deux niveaux, la façade avant reçoit en son centre, une tour ronde, coiffée d'un toit conique. A l'arrière, une tour  ronde, aménagée en pigeonnier, surmontée d'un lanterneau, a été intégrée dans les constructions postérieures.                         Joyeux, le château qui s'est voulu d'un  style néo-gothique, est une construction du XIXe siècle. Composé d'un corps de bâtiment  rectangulaire, de deux  niveaux  sur terrasse, flanqué aux angles d'une tour ronde, à trois niveaux et d'une échauguette sur culot. Ces   deux tours ou tourelles, coiffées de toits coniques, dominent la construction.      La Salles; corps de logis rectangulaire en équerre à deux niveaux flanqué d'une grosse tour ronde toiture en poivrière avec clocheton et d'une tour carré en façade sur angle à toit pointu.","habitants":"Famille Du Peschin                  Famille de la Roche                    Famille Lucas\"","divers":"Château de la Salles, de Bel-Air, de Céron, de Mayet et de Joyeux à Saint-Germain la Salles","gps":"","images":["../../jctruffet.com/image/image_03/03_St_Germain_de_Salles_1.jpg","../../jctruffet.com/image/image_03/03_St_Germain_de_Salles_2.jpg","../../jctruffet.com/image/image_03/03_St_Germain_de_Salles_3.jpg","../../jctruffet.com/image/image_03/03_St_Germain_de_Salles_4.jpg","../../jctruffet.com/image/image_03/03_St_Germain_de_Salles_5.jpg","../../jctruffet.com/image/image_03/03_St_Germain_de_Salles_6.jpg","../../jctruffet.com/image/image_03/03_St_Germain_de_Salles_7.jpg","../../jctruffet.com/image/image_03/03_St_Germain_de_Salles_8.jpg","../../jctruffet.com/image/image_03/03_St_Germain_de_Salles_9.jpg"]},"Consult_chateau_formulaire06b9-3":{"id":"Consult_chateau_formulaire06b9-3","dept":"03","canton":"Varennes-sur-Allier","commune":"St-Germain des Fossés","nom":"St_Germain_des_Fossés","type":"Château","periode":"XVII","histoire":"St-GERMAIN, le vieux manoir féodal remontait à une époque fort ancienne. Le premier document authentique qui en révèle l'existence, est une bulle du Pape Alexandre III, en 1165. Mais bien auparavant sans doute, les possesseurs du fief avaient bâti la maison forte qui commandait le passage de l'Allier et le pont primitif qui existait en cet endroit. Le manoir du Haut Moyen-Age fut restauré au XVIe siècle par le Maréchal de Saint-André qui en avait fait une des plus belles demeures du Bourbonnais. Le 26 mars 1566, le château eut l'honneur de recevoir le roi Charles IX et sa mère Catherine de Médicis au cours de leur voyage aux provinces du midi.     CHERMONT; pas d'information historique.","architecture":"Saint-Germain, Le manoir fut abandonné et détruit au cours du XVIe siècle, les ruines furent livrées aux démolisseurs en 1772. Les déblais et démolitions sont restés sur place, comblant les cours et les fossés. Des pierres sculptées ont été enfouies pêle-mêle. Au coin d'une petite rue, appelée « rue du Mouton », se trouve, placé dans le mur d'une maison, un « Agnus Dei »que l'on a fait voisiner, en toute irrévérence, avec une statue de femme dont on ignore la provenance.      Château de Chermont, manoir des Epigeards et à 2km le château de la Gerbe hôtel restaurant.","habitants":"Maréchal de Saint-André\"","divers":"Château de Chermont,de Gerbe et prieuré à Saint-Germain des fossés","gps":"","images":["../../jctruffet.com/image/image_03/03_St_Germain_des_Fosses_1.jpg","../../jctruffet.com/image/image_03/03_St_Germain_des_Fosses_2.jpg","../../jctruffet.com/image/image_03/03_St_Germain_des_Fosses_3.jpg","../../jctruffet.com/image/image_03/03_St_Germain_des_Fosses_4.jpg","../../jctruffet.com/image/image_03/03_St_Germain_des_Fosses_5.jpg"]},"Consult_chateau_formulairea27f":{"id":"Consult_chateau_formulairea27f","dept":"03","canton":"Bourbon-l`Archambault","commune":"St-Hilaire","nom":"St_Hilaire_Allier","type":"Château","periode":"XVIII","histoire":"Trois châteaux à St-Hilaire dont celui de St-Hilaire du XVIIIe siècle, de Maltaverne du XIXe siècle, et de la Verpillière du XVIIIe siècle;  autres châteaux de Clavières, des Carterons (2 tours) et des Troches.                   St-HILAIRE, au XIIe siècle la paroisse fut le siège d'une commanderie de l'ordre de Saint-Jean-de-Jérusalem. Au XVe siècle, une autre commanderie d'hospitaliers  s'est installée à quelques kilomètres du bourg, au monastère de Beauchassin. Le premier seigneur de Saint-Hilaire de la fin du XIVe siècle est issu de la famille de Saint-Aignan possédant le château du Pleix à Ygrandeau au Moyen-Age,  est une étape obligée entre Bourbon l'Archambault et Le Montet.  Au XIVe siècle, les 1er seigneurs, les Seguin, sont établis à Maltaverne et deviennent rapidement seigneurs de Saint-Hilaire, vassaux des ducs de Bourbon. Au XIXe siècle, les descendants cèdent le bâtiment au Baron de la Rochetaillée, acquéreur des biens des Saint-Hilaire. \r\nMALTAVERNE,  semble avoir été une des résidences primitives des seigneurs de Saint Aubin, ou ils possédaient une forteresse, pour contrôler l'accès au bourg. Au XVIIe siècle, les seigneurs quittent Maltaverne pour un manoir construit au milieu du bourg Il est probable qu'à la fin du Moyen-Age, ils conservèrent les droits seigneuriaux du fief et abandonnèrent la place forte qui tomba en ruines. Au XIXe siècle, la terre de Maltaverne fut achetée par un roturier, qui fit construire une maison dans le style des maisons fortes.  Au XIXe siècle, les descendants cèdent le bâtiment au Baron de la Rochetaillée, acquéreur des biens des Saint-Hilaire. \r\nVERPILLIERE pas d'information historique.","architecture":"Saint-Hilaire fut une ancienne ville close et bourg fortifié au Moyen-Age, doté d'un château féodal en ruines dès le XVIe siècle. La résidence de sa descendance fut le château-fort de Maltaverne jusqu'à la fin du XVIIe siècle. Comme Buxières-les-Mines, Saint-Hilaire a vécu l'essor industriel grace aux mines de charbon de son sous-sol.   Le château du XVIIIe siècle, construit à l'emplacement du château médiéval, forme un U.  Le château possède encore sa porte d'entrée composée d'un passage piéton et un accès pour les attelages. La clef de l'arc est cernée de claveaux représentant des têtes grinçantes de style Renaissance.\r\nMaltaverne du XIXe siècle, implanté sur l'ancienne forteresse des seigneurs de Saint-Hilaire défendant la route accédant au bourg, cette grande demeure bourgeoise est de plan rectangulaire. La partie centrale est encadrée de 2 pavillons dont l'entrée est abritée par un porche. C'est un grand corps de logis à deux niveaux et niveau de comble, à ouvertures symétriques par rapport à l'entrée. Une tour carrée, prise en oeuvre  en façade, à fronton et toit  à quatre pans, permet l'accès  au bâtiment, par une arcade en plein cintre. Le château du XVIIIe siècle, construit à l'emplacement du château médiéval, forme un U. Le château possède encore sa porte d'entrée composée d'un passage piéton ainsi qu'un accès pour les attelages. La clef de l'arc est cernée de claveaux représentant des têtes grinçantes de style Renaissance.","habitants":"Baron de la Rochetaillée\"","divers":"Château de Saint-Hilaire, de Malataverne, de Verpillières et de Clavières","gps":"","images":["../../jctruffet.com/image/image_03/03_St_Hilaire_Allier_1.jpg","../../jctruffet.com/image/image_03/03_St_Hilaire_Allier_2.jpg","../../jctruffet.com/image/image_03/03_St_Hilaire_Allier_3.jpg","../../jctruffet.com/image/image_03/03_St_Hilaire_Allier_4.jpg","../../jctruffet.com/image/image_03/03_St_Hilaire_Allier_5.jpg"]},"Consult_chateau_formulaire9943":{"id":"Consult_chateau_formulaire9943","dept":"03","canton":"Jaligny-sur-Besbre","commune":"St-Léon","nom":"St_Leon","type":"Château","periode":"XV-XIX","histoire":"Deux châteaux à Saint-Léon , de Marcellange, du XVIe siècle et de Montperroux du XIXe siècle gothiques  et le manoir de Coulon.                COULON, manoir  Jusqu'à la fin du XVIe siècle, Coulon n'est qu'une simple terre, divisée entre plusieurs familles et relevant des seigneurs de la Varenne à Saligny. Le premier à prendre le titre de Seigneur de Coulon est en 1631 jean de Molles. Cette terre passe ensuite à son neveu, François des Escures, seigneur de Cindré, sur lequel il est saisi et acquis par Jacques Bourguignon. Puis il passe par alliance à la famille Mallet qui le vendit vers 1770 à jean Deguet. Le manoir échut au milieu du XIXe siècle à un de ses petits-neveux, M. Clayeux. MARCELLANGE,   en 1357, Perrin de Marcellange rend aveu de ses possessions au sire de Châtelperron. Puis le fief est porté par mariage à la famille des Molles à la fin du XVIe siècle. Légué en 1666 à François des Escures, il fut ensuite  acquis en 1693 par Jean Feydeau. Marcellange changea par la suite plusieurs fois de propriétaires. Vendu en 1848 à M. de la Bouteresse des Quillets, il échu à son gendre, le comte des Ulmes de Torcy, qui le fit restaurer vers 1895 dans le style néogothique. \r\nMONTPERROUX, a été acquis au XIXe siècle par le docteur Picard de Grandchamp, médecin et chercheur, qui lui a donné sa forme actuelle, après de nombreux remaniements. Aujourd'hui chambres d'hôtes.","architecture":"Marcellange, s'élève  sur une légère éminence. C'est un corps de logis rectangulaire à 3 niveaux,  plus les combles éclairés par des lucarnes à fronton triangulaire. Il est flanqué sur la façade antérieure d'une  tour d'angle circulaire  et d'une tour d'escalier polygonale  bâtie en grès rouge avec chaînage de pierre blanche, et dont la partie supérieure carrée repose sur des culs-de-lampe ornés. La façade opposée, encadrée par deux tours rondes, est précédée d'un perron à escalier tournant  à 3 volées droites,  conduisant à une porte d'entrée surmontée d'un entablement à frise ornée de triglyphes, et coiffée d'un fronton percé de deux petites fenêtres.                               Le manoir de Coulon,  est une construction du XIXe siècle, comportant un corps de logis rectangulaire à un étage, plus combles éclairés par des lucarnes à pignon aigu et terminé par deux avant corps en légère saillie, fermés par des murs pignons. L'entourage des fenêtres, ainsi que les chaînages et les angles, sont en grès rouge de Liernolles. \r\nMontperroux, corps de logis quadrangulaire à deux niveaux et attiques flanqué en angles de tours rondes et de tourelles à toits en poivrières, une Tour Glacière dont les exemplaires sont rares en France, St-Bonnet, source deau claire, dont on dit quelle a des propriétés bénéfiques pour les yeux.","habitants":"Famille de François des Escures\"","divers":"Château de Marcellange, de Coulon  et de Montperroux à Saint-Léon","gps":"","images":["../../jctruffet.com/image/image_03/03_St_Leon_1.jpg","../../jctruffet.com/image/image_03/03_St_Leon_2.jpg","../../jctruffet.com/image/image_03/03_St_Leon_3.jpg","../../jctruffet.com/image/image_03/03_St_Leon_4.jpg","../../jctruffet.com/image/image_03/03_St_Leon_5.jpg"]},"Consult_chateau_formulaire968c":{"id":"Consult_chateau_formulaire968c","dept":"03","canton":"Lurcy-Lévis","commune":"St-Léopardin-d`Augny","nom":"St_Leopardin _Augny","type":"Maison forte","periode":"XIV-XVIII","histoire":"Deux châteaux  du Bois du XVIIe siècle et du Pléssis du XIVe siècle.           BOIS, du lieu-dit Le Bois s'élève un petit manoir du XVe siècle pourvu d'une tour ronde sur la façade arrière. Cette  tour ronde coiffée d'un toit conique, est accostée à l'angle du logis principal. Celui-ci, de plan rectangulaire, est  à un étage sous comble, couvert d'un toit pentu à croupe. Des communs importants subsistent dans la cour et désignent la fonction domaniale  de cette maison forte. En 1503, dans la châtellenie d'Ainay, un écuyer, Jehan  de Moussier fait aveu à la duchesse de Bourbon de son lieu de Boy, avec maison.             PLESSIS, le domaine du Plessis est mentionné pour la première fois en 1323, comme fief et manoir appartenant à Hugues ou Huguenin d'Anlezy. Pierre de Nuchèze mort le 16 novembre 1702 dans son château du Plessis  est un manoir à trois tours rondes, dont les archères-canonnières datent des XIVe et XVe siècles. Le corps central carré  est de 1616. Une chapelle le jouxte. Un acte de 1322  nous apprend  que la seigneurie fut divisée entre Humbert de Chains et sa soeur Marguerite. Dès l'année suivante, il appartenait   à Huguenin d'Anlezy, dont la famille le posséda jusqu'à la fin du XVe siècle. En 1483, Louis d'Anzely  rend hommage au duc de Bourbon  pour son hostel fort du Plessis. En 1569, Nicolas de Nicolay cite Le Plessis  comme terre, château, seigneurie et justice, vassale  de la châtellenie de Bourbon. A la fin du XVIIe siècle, fut élevé un nouveau corps de logis par Pierre de Neuchèze, cette famille est encore présente  au XVIIIe siècle et s'allia aux Farjonel, seigneurs du fief voisin d'Aubigny.","architecture":"Plessis du XVe siècle et XVIIe siècle. Le domaine du Plessis est mentionné pour la première fois en 1323, comme  manoir, un nouveau corps de logis est construit  à la fin du XVIIe siècle. il est composé d'un bâtiment rectangulaire flanqué de quatre tours reliées par des courtines. Le corps de logis comprenait une cave, une vaste et unique pièce au rez de chaussée, une autre à l'étage et un grenier .                                 Bois, du XVIIe siècle au XIXe siècle. Ce petit manoir comporte aussi plusieurs bâtiments d'exploitation.\r\nAutry, du XIXe siècle. Manoir ou maison bourgeoise construite dans le style néo-gothique.\r\nL'ancien Prieuré. Les moines l'ont quitté bien avant la Révolution. Les bâtiments ont été remaniés par les différents propriétaires. On y trouve encore une grande cour quadrangulaire. Un donjon, haut de 4 niveaux, date du XIe siècle.","habitants":"Famille de Jehan   de Moussier            Famille de Huguenin d'Anlezy\"","divers":"Château du Plessis, de Bois et d'Autry à Léopardin d'Augny.","gps":"","images":["../../jctruffet.com/image/image_03/03_St_Leopardin_Augny_1.jpg"]},"Consult_chateau_formulaire1c1d":{"id":"Consult_chateau_formulaire1c1d","dept":"03","canton":"Chevagnes","commune":"St-Martin-des-Lais","nom":"St_Martin_Lais","type":"Gentilhommière","periode":"XVII","histoire":"SAINT-MARTIN des Lais, est une gentilhommière en U du XVIIe siècle avec des douves, remanié après la Seconde Guerre mondiale. La motte de Saint Martin fut sans doute le siège d'une ancienne seigneurie   d'abord bourguignonne, puis bourbonnaise  à la fin du XIVe siècle, puisqu'en 1321, Renaud de St-Martin rendit  aveu de sa maison forte, terre et seigneurie  des Lais à Louis 1er de Bourbon. Déjà en 1300  Perronin Gauterin fait aveu au seigneur de Bourbon du fief qu'il tient à Saint-Martin-des-Lays et que son père possédait déjà. On  n'entend plus parler de la seigneurie de Saint-Martin avant 1733, quand M. Méritte vit tout ce qu'il possédait au bourg, soit six corps de bâtiments qui avec l'église composaient l'intégralité du village détruit par un incendie  déclenché  par le maréchal-Ferrand. Son fils   Pierre se faisait  appeler \"de Rochepierre\" en 1734, du nom de madame sa mère,  il entra dans les ordres, fut curé à Bourges et  prieur de Lucenay-les-Aix. La seigneurie de St-Martin passa donc au mari de sa sur, Pierre  René Tirot, directeur  des domaines du Roi en la généralité de Moulins. Le château actuel fut construit par Jean  Labrousse de Veyraset, conseiller au parlement de Toulouse et guillotiné à Lyon le 11 nivôse an II.","architecture":"Saint-Martin des Lais, est une gentilhommière en U du XVIIe siècle avec des douves, remanié après la seconde guerre mondiale et vestiges du premier château fort.","habitants":"Famille de Jean  Labrousse de Veyraset\"","divers":"Gentilhommière à St-Martin des lais","gps":"","images":["../../jctruffet.com/image/image_03/03_St_Martin_Lais_1.jpg"]},"Consult_chateau_formulaire517c":{"id":"Consult_chateau_formulaire517c","dept":"03","canton":"Souvigny","commune":"St-Menoux","nom":"St_Menoux","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux à Saint-Menoux; Clusors du XVe siècle et de Souys du  XVIe siècle.   CLUSORS château de Clusors  dans la même famille depuis 1844.                 SOUYS, le château aurait été bâti par Jules Hardouin Mansart, pour recevoir Louis XIV, la marquise de Montespan y séjournant lors de ses cures à Bourbon l'Archambault.  Il devient la propriété de notables à partir de 1849 avant d'être acquis, vers le milieu du XXe siècle, par une commune du département de la Seine-Saint-Denis pour être un lieu de vacances d'enfants.","architecture":"Clusors, du XVe siècle, comprend un logis, une tourelle d'escalier carrée ainsi qu'une enceinte extérieure flanquée de tours rondes. Des transformations ultérieures sont réalisées:  nouveaux percements, réaménagement de l'intérieur et agrandissement du bâtiment avec l'ajout d'une aile ouest de style Néo-Gothique. La cour comporte  notamment une maison à arcades, l'étable-remise dont une partie remonte au XIXe siècle, et un pigeonnier.  \r\nSouys, du XVIIe siècle , composé d'un corps de bâtiment flanqué de deux ailes formant avant-corps sur chaque façade. Chaque corps de bâtiment est couvert d'une toiture en ardoises, indépendante, en pavillon. Les façades sont ornées de chaines d'angles traitées en gros bossages à fort relief, disposé au fond d'une cour d'honneur dont l'accès s'effectue par un portail en plein cintre encadré d'une ordonnance ionique également traitée en forts bossages. De chaque côté de l'entrée s'élève un pavillon dans le style du château abritant, à gauche, des dépendances, à droite, une chapelle établie sur plan en rotonde et couverte d'une coupole retombant sur une ordonnance classique.","habitants":"la marquise de Montespan \"","divers":"Château de Clusors et de Souys à Saint-Menoux","gps":"","images":["../../jctruffet.com/image/image_03/03_St_Menoux_1.jpg","../../jctruffet.com/image/image_03/03_St_Menoux_2.jpg","../../jctruffet.com/image/image_03/03_St_Menoux_3.jpg","../../jctruffet.com/image/image_03/03_St_Menoux_4.jpg","../../jctruffet.com/image/image_03/03_St_Menoux_5.jpg","../../jctruffet.com/image/image_03/03_St_Menoux_6.jpg","../../jctruffet.com/image/image_03/03_St_Menoux_7.jpg","../../jctruffet.com/image/image_03/03_St_Menoux_8.jpg"]},"Consult_chateau_formulaire578e":{"id":"Consult_chateau_formulaire578e","dept":"03","canton":"Lapalisse","commune":"St-Pierre-Laval","nom":"St_Pierre_Laval","type":"Château","periode":"XV-XVII","histoire":"Trois châteaux à Saint-Pierre Laval, de  Beauvert du XVe siècle, la Feige du XVIIe siècle style Louis XIII et la Tour (voir article)                                 BEAUVERT, au Moyen-Age, le fief de Bost Vert dépendait, avec la terre de Mauvernet, de la seigneurie de Châtelus.  Dès le XVe siècle, la famille Montjournal est installée à Beauvert et, en novembre 1443, Ploton de Montjournal, écuyer, rend hommage  pour son hostel de Bonvert à Ande, dans les chatellenies de Billy et de  Vichy. En 1503, Hugues de Montjournal reconnaît tenir en fief de  madame la duchesse de Bourbon  sa terre et seigneurie de Bost Vert,  en toute justice.  Le château de Beauvert appartient aujourd'hui à la famille Nouvellet.                             FEIGE les premiers membres de la famille de la Faige sont signalés dès 1261. En 1382, Stévenin de la Faige  était bailli de Bosvert. Au XVe siècle, la famille de la Faige  était encore propriétaire des lieux, mais en février 1526, c'est Jean Louis de Châteaumorand qui vendit à  Antoine des Brosses, archer  de la garde du roi, et  capitaine, la terre  et seigneurie de la Faige. En 1610, le fief  était aux mains  de Jean le Long de Chenilhat, capitaine  de la compagnie des gardes  de Châteaumorand, alors qu'en 1625, Antoinette de Montcorbier était demoiselle de la Faige. Cette famille  Montcorbier  la Feige jusqu'au début du XVIIIe siècle, et la vendit aux Reignier en 1720. A leur tour, en 1831, les Reignier vendent la Feige aux Mulatier de la Trolière.\r\nTOUR, en 1353 Guillaume de la Tour, damoiseau, était vassal de Jean de  Châtillon, seigneur du Griffier et de La Palisse. Il était seigneur de La Mothe et de La Tour Chalabran. Vendue en  1569 par Louise de Verseilles à l'écuyer Charles d'Apvrillon, la terre et seigneurie de La Tour fut revendue par  ce dernier, en 1598, à la famille des Gallois. En 1848, le château appartenait  aux Millon, aujourd'hui La Tour est la propriété de la famille Darodes.","architecture":"Beauvert, la demeure actuelle est une belle construction  du XIXe siècle, qui marie avec bonheur la pierre blanche et la brique rose pour des angles et des encadrements polychromes. Deux corps de logis, disposés en T, montrent l'importance de l'édifice, le corps principal à deux niveaux et niveau de comble est flanqué d'une tour de plan  barlong à quatre niveaux, coiffée d'un toit élancé  qui s'élève au dessus de l'ensemble. Prise en oeuvre dans toute la largeur du corps de logis, elle forme un avant corps au centre de la façade sud, . Le second corps de bâtiment, plus élevé, à trois niveaux et niveau de comble, est orné de trois belles fenêtres à lucarnes, à pieds-droits et frontons néo renaissance. Le toit en pavillon de ce corps de logis, comme celui de la tour. \r\nFeige  a été édifié à partir d'une construction plus ancienne    dont on aperçoit encore quelques murs, à l'entrée  surtout. Un grand corps de bâtiment rectangulaire, de style classique, domine l'ensemble  avec ses trois niveaux. Dans la cour, faisant bloc  avec les communs, une tour  carrée a été, au premier étage, aménagée  en pigeonnier avec  lanterneau. Le mur d'enceinte est franchi par   un porche d'entrée qui donne accès à la cour intérieure.                               Tour, maison forte a été édifiée au XVe siècle, entourée de fossés. Le corps de logis à deux niveaux et niveau de comble est flanqué à l'est d'une tour ronde couverte d'un toit conique élancé. Quelques ouvertures du XVe siècle subsistent, mais les façades  se sont éclairées  de baies symétriques sur les 2 niveaux, et de 4 lucarnes  en toiture, ainsi  que d'une entrée néo-Renaissance. Des communs importants  enferment une vaste cour, dont l'accès est commandé par un beau porche d'entrée du XVe siècle, et dont l'entablement est orné de croisillons en colombage garni de briques.","habitants":"Famille Montjournal                  Famille  Montcorbier \"","divers":"Château de Beauvert , de la Feige et de la Tour à Saint-Pierre-Laval","gps":"","images":["../../jctruffet.com/image/image_03/03_St_Pierre_Laval_1.jpg","../../jctruffet.com/image/image_03/03_St_Pierre_Laval_2.jpg","../../jctruffet.com/image/image_03/03_St_Pierre_Laval_3.jpg"]},"Consult_chateau_formulaire8efd":{"id":"Consult_chateau_formulaire8efd","dept":"03","canton":"Escurolles","commune":"St-Pont","nom":"St_Pont","type":"Château","periode":"XVIII","histoire":"Deux châteaux à Saint-Pont dont celui de,Saint-Pont du XVIIIe siècle et de Bellevue du XVIIIe siècle.           BELLEVUE, avant la construction actuelle, il existait un ancien château, voire une maison forte, siège de la première seigneurie de Saint Pont.            SAINT-PONT, construit au XVIIe siècle sur l'emplacement d'un ancien château fortifié l'actuel château fut remanié en 1754 par l'architecte parisien Clément pour la marquise Begon de la Rouzière.","architecture":"Saint-Pont, du XVIIe siècle ; XVIIIe siècle  Façades et toitures du château à l'impériale et façades de briques rouges, construit sur les terrasses d'où l'on a une très belle vue sur la Limagne et la chaîne des puys. La cour du château est délimitée  par 2 pigeonniers. Le parc comprend également d'importants communs, mur d'enceinte, pigeonniers, éléments intérieurs suivants,  au rez-de-chaussée, escalier.\r\nBellevue, en sont pour preuve les caves voutées et les encadrements des portes que l'on peut dater du XIIIe siècle. Des traces de transformations du XVe siècle subsistent aussi dans les pigeonniers installés aux  angles de la cour principale. Le château actuel, construit selon l'ordonnancement classique du XVIIIe siècle, se  présente avec un corps principal de plan rectangulaire, à deux niveaux et niveau de comble. Une grosse tour exagonale, prise en oeuvre et éclairée sur les 3 faces, sert d'avant-corps assez imposant, deux fines échauguettes rondes, sur culots moulurés, épaulent les angles de la façade. Les toitures élancées, couvertes en ardoises, reçoivent une belle série de lucarnes à auvents décorés.","habitants":"seigneurie de Saint Pont\"","divers":"Château de St-Pont et de Bellevue","gps":"","images":["../../jctruffet.com/image/image_03/03_St_Pont_1.jpg","../../jctruffet.com/image/image_03/03_St_Pont_2.jpg","../../jctruffet.com/image/image_03/03_St_Pont_3.jpg"]},"Consult_chateau_formulairea06c":{"id":"Consult_chateau_formulairea06c","dept":"03","canton":"St-Pourcain-sur-Sioule","commune":"St-Pourcain-sur-Sioule","nom":"St_Pourcain_Sioule","type":"Château","periode":"XVII","histoire":"Deux châteaux à Saint-Pourcain sur Sioule, de Briailles du XVIIe siècle et de Guénégauds du XVIIe siècle.      BRIAILLES  dépendait autrefois de la paroisse de Paray sous Briailles, et sa situation élevée laisse supposer que l'édifice actuel a été précédé d'une maison-forte. Il changea souvent de mains, à la fin de l'ancien régime, il appartenait  à Messire Crétien, puis aux de Falaya, et  à Marc Antoine Strada, marquis d'Arosemberg. Henri IV fit appel à eux et  également à d'autres gentilhommes hollandais, pour assécher les marais de Limagne. A la veille de la Révolution, Marc Antoine vendit Briailles à Jean Jacques Pierre de Saincy. Au  XIXe- XXe siècles le château de Briailles connut encore diverses mutations. Aujourd'hui chambres d'hôtes et glof.     GUENEGAUDS, il est fait mention des Guénégauds dès 1300, date à laquelle Béatrix de Verneuil reconnaît tenir en fief la terre   et seigneurie. Ce fief existait avant 1243, car un damoiseau du nom de Galvaynetus, reconnaît tenir en fief de noble  homme  des Archambaud de Bourbon tout ce qu'il a à Guinesgaux.  Sur la tour nord-ouest  sont sculptées les armes  des constructeurs,  Louis René Marie de La Cadre de Montpansin et  son épouse née de Bard.Après 1682 Le château est vendu à une famine Parent dont une fille le fait passer par mariage a la famille de la Cadre, dans laquelle il reste jusqu'au XXe siècle.","architecture":"Saint-Pourcain sur Sioule, le beffroi du XIIIe siècle occupe l'une des tours de l'ancienne enceinte du quartier monastique. Les archères qui en percent la muraille peuvent être datées du XIIIe siècle. Cette tour existait en 1456. Il semble qu'au Moyen-Age l'une des tours d'enceinte du prieuré bénédictin ait été affectée à usage de guet pour les habitants. L'horloge y est sans doute installée en 1480, attestée avec certitude en 1487. Sous la Révolution ou l'Empire, l'horloge est installée dans le clocher de l'ancienne église prieurale devenue paroissiale. En 1838, il fut décidé de revenir à la situation antérieure. L'architecte Vollet fut chargé de reconstruire le campanile, dont les travaux se poursuivirent jusqu'en 1842.                                     Brailles se dresse sur le flanc Est d'une colline, comportant un  grand pigeonnier, une chapelle et un château d'eau, accompagnés de diverses maisons de vignerons, l'ensemble  forme un repère visible depuis de nombreux points de la vallée de l'Allier. Il s'élève sur une terrasse à laquelle  on y accède à l'est par  un escalier muni d'une rampe à balustres. C'est un grand corps de logis rectangulaire qui date probablement du milieu du XVIIe siècle, comportant deux niveaux et couvert par un toit en croupe très élevé.                    Guénégauds,  reconstruit au XIXe siècle, le château est accompagné d'un important domaine agricole, construction quadrangulaire dont la façade principale sud est flanquée d'une tour circulaire,  à l'arrière, une autre tour circulaire avec un niveau en encorbellement sur faux mâchicoulis fait retour sur le pignon nord. Elle est également flanquée d'une tour ronde plus fine et plus haute. L'ensemble est couvert de toitures en ardoises, percées de lucarnes à hauts frontons triangulaires.","habitants":"Famille de  Messire Crétien               Famille de la Cadre\"","divers":"Château de Brailles, de Guénégauds, de Chantelle  et autres à Saint-Pourçain sur Sioule","gps":"","images":["../../jctruffet.com/image/image_03/03_St_Pourcain_Sioule_1.jpg","../../jctruffet.com/image/image_03/03_St_Pourcain_Sioule_2.jpg","../../jctruffet.com/image/image_03/03_St_Pourcain_Sioule_3.jpg","../../jctruffet.com/image/image_03/03_St_Pourcain_Sioule_4.jpg","../../jctruffet.com/image/image_03/03_St_Pourcain_Sioule_5.jpg","../../jctruffet.com/image/image_03/03_St_Pourcain_Sioule_6.jpg","../../jctruffet.com/image/image_03/03_St_Pourcain_Sioule_7.jpg","../../jctruffet.com/image/image_03/03_St_Pourcain_Sioule_8.jpg","../../jctruffet.com/image/image_03/03_St_Pourcain_Sioule_9.jpg"]},"Consult_chateau_formulaire21da":{"id":"Consult_chateau_formulaire21da","dept":"03","canton":"Gannat","commune":"St-Priest-d`Andelot","nom":"St_Priest_Andelot","type":"Maison forte","periode":"XV","histoire":"ST-PRIEST, en 1503 Sébastien de Vernières reconnait tenir en fief de  la duchesse de Bourbon sa terre de Saint-Priest, il parle de maison forte à quatre tours, paroisse de St-Priest, avec grange, maison, garenne, prés et terre. Le fief est de peu d'importance, car estimé à 4 livres de revenu  annuel seulement. En 1569, château fort tenu en fief du roi, à cause de sa châtellenie de Gannat, alors qu'en 1686, c'est le marquis d'Effiat qui en est le seigneur.","architecture":"Saint-Priest, bâti sur une motte entourée de fossés, le château de Saint-Priest, malgré l'espace réduit qu'il occupe, donne l'impression de puissance, par ses quatre tours d'angle, reliées par quatre courtines de plus de 12 m de  haut, par son allure de donjon rectangulaire accosté de tours rondes. L'ensemble était encore plus élevé, crénelé mais les tours ont été écrêtées et couvertes de toits inclinés à une seule pente. Quoique impressionnante, la construction actuelle ne semble dater que du XVe siècle, car les tours ne sont pas talutées et ne présentent aucune meurtrière.","habitants":"marquis d'Effiat\"","divers":"Château de St-Priest d'Andelot","gps":"","images":["../../jctruffet.com/image/image_03/03_St_Priest_Andelot_1.jpg","../../jctruffet.com/image/image_03/03_St_Priest_Andelot_2.jpg"]},"Consult_chateau_formulaire66b9":{"id":"Consult_chateau_formulaire66b9","dept":"03","canton":"Montmarault","commune":"St-Priest-de-Murat","nom":"St_Priest_de_Murat","type":"Maison forte","periode":"XVI","histoire":"Trois châteaux à St-Priest de Murat le château du Bouis du XVII siècle, de Chaumont  féodal vestiges  et de Virfobier du XVIe siècle.           BOUIS, le Bouis a constitué à l'origine, un fief unique avec Virlobier. Il a été démembré au profit d'un cadet de la famille Breschart et fut la propriété au XVIIIe siècle de la famille Chacaton.    CHAUMONT, cette commune est formée de trois anciennes paroisses : Saint Priest, Chaumont et Rongères. Chaumont a possédé son château. En 1232, Raoul de Chaumont vend à perpétuité au prieur  et au chapitre de Montcenoux un droit sur diverses dîmes sises autour de la ville de Chaumont.  En 1350, Jean Dacbert, seigneur de Boisrond, rend aveu pour Chaumont, mais ses descendants ne conserveront pas ce fief qui se retrouve, en 1575, en possession de noble Claude des Fontaynes, écuyer, seigneur de Chaumont. En 1727 le fief appartient à Jacques Rodillon de Chappette, époux de Marguerite des Fontaines, et qui sera inhumé en 1758 en l'église de Chaumont.                       VIRFOBIER, dès 1300, l'on rencontre Perronin de Ville Lobet, qui rend hommage  au seigneur de Bourbon. En 1375, Jean de la Peyrouse  est seigneur de Cornassat,  Le Theil et Virlobier. Sa fille épouse avant 1397 un seigneur de Beaucaire. En 1481 Colas Déperet, bourgeois  de Montluçon et seigneur de Bien-Assis, achète  les bois, garennes, prés, étangs et terres labourables situé    à Virloubie. Dès 1485, Jacques de Breschard rend foi et hommage pour Virlobier. Il renouvelle l'aveu en 1503 à la duchesse de Bourbon, pour sa maison, hostel de Villelobier, alias La Tour avec les maisons, plus en arrière-fief du seigneur de Chaulmont. En 1569, le château  et seigneurie de Virelobier dépend de la châtellenie de Murat. Il devait toujours appartenir a cette famille Breschard, seigneur de La   Motte Virlobier. Vers 1600, Pierre Chacaton semble être devenu propriétaire des seigneuries de Virlobier et des Bouis, qui passèrent à son fils Philibert, conseiller du roi et lieutenant général civil. La terre resta longtemps dans cette famille.","architecture":"Bouis,  une entrée en porche à écussons permet d'accéder à la grande cour intérieure à puits central, autour de laquelle s'alignent les bâtiments d'habitation et d'exploitation, car en fait, il s'agit d'un château ferme. Deux angles possèdent une tour à campanile bien conservée bien que l'une ai perdu sa toiture. Des restes de fossés se remarquent encore.                        Chaumont, du XVe siècle en  partie ruiné, actuellement à usage agricole, n'a gardé qu'une tour à canonnière et une porte à accolade, d'un ensemble quadrilatéral flanqué de quatre tours d'angle. Près de la tour restante qui menace de s'écrouler, se dresse une butte de quelques mètres de hauteur, le champ de la Chapelle, sur laquelle se dressait l'église.  Cette motte de forme circulaire est l'emplacement du donjon primitif, qui jouissait d'une vue remarquable sur  un vaste horizon. Le plan cadastral montre que Chaumont est un bel exemple de conservation de structures anciennes.                        Virlobier, est édifié sur l' éperon de confluence du Reuillon, au sud, et d'un ravin profondément encaissé,  à l'ouest, pouvant avoir été aménagé en étang. L'actuel château, très remanié des XVIe et XVIIe siècles, a conservé une tour carrée accolée  à sa façade, 2 tours rondes d'angle, munies de meurtrières. Une chapelle archaïque  garde des restes de peintures. Il ne reste aucune trace apparente de fossés. Le nom du château  proviendrait de villa Orbata, la construction en rond qui a pu être l'aspect premier du castrum, à l'intérieur  d'une enceinte circulaire dont les indices sont encore décelables.","habitants":"Famille Breschart\"","divers":"Château du Bouis, de Chaumont et de Villorbier à Saint-Priest de Murat.","gps":"","images":["../../jctruffet.com/image/image_03/03_St_Priest_de_Murat_1.jpg","../../jctruffet.com/image/image_03/03_St_Priest_de_Murat_2.jpg","../../jctruffet.com/image/image_03/03_St_Priest_de_Murat_3.jpg"]},"Consult_chateau_formulairefa62":{"id":"Consult_chateau_formulairefa62","dept":"03","canton":"Escurolles","commune":"St-Rémy-de-Rollat","nom":"St_Remy_Rollat","type":"Château","periode":"XIV-XVI","histoire":"Deux châteaux à St-Rémy de Rollat, Chambon du XIVe siècle tours et de  Gerbe du  XVIe siècle.                  CHAMBON, le siège de la seigneurie du Chambon était constitué d'une petite maison forte. La terre fut l'objet d'un fief connu  dès le XIIIe siècle tenu en 1240 par Raoul de Chaussecourte qui fait aveu au seigneur de Bourbon de son domaine du Chambon, paroisse de Villaine (rattachée à Marcenat). En 1314, c'est Jehan de Vessenat qui hérite la maison du  Chambon, de sa mère Jehanne de St Martin. Puis les seigneurs du Chambon porteront le nom de la terre jusqu'au  début du XVe siècle, en 1444, Antoine de la Motte Mazerier rend hommage pour la terre et seigneurie du Chambon.  Après avoir appartenu à noble Jacques de la Forest, écuyer seigneur du Chambon en 1482 le fief passe a la famille Régnier, bourgeois de Saint Pourçain qui le garderont jusqu'en 1634, ou le nouveau seigneur du Chambon est Paul Orget.  Mais la terre vint rapidement à la puissante famille d'Apchon. Après celle-ci, la terre  et la seigneurie changea souvent de mains, possédées par la famile de Foudras, de Coutanson, et après avoir appartenu aux Douet puis aux Mascrony, les biens du Chambon furent saisis à la Révolution sur les Mascrony et vendus comme biens nationaux.  Les nouveaux propriétaires, Michel Laurent et sa femme Anne Bergeron, y marièrent leurs fils en 1798 avec mademoiselle du Peroux des Escures. En 1816, Le chambon appartenait au marquis d'Hautpoul.\r\nGERBE,  le château devenu chambres d'hôtes et ses locations de salles pour réceptions, mariages, séminaires et autres. Créée au XVI siècle, la seigneurie de Gerbe fût agrandie au XVIIIe siècle par Claude de Guerin de Clermont, écuyer, conseiller du roi, président trésorier de France à Moulins.Cette seigneurie fût à la fin du XVIIIe siècle la propriété du haut et puissant Messire de Racault, comte de Reuilly, maître de camp de dragons, chevalier de l'Ordre de St-Louis, et ancien Lieutenant des gardes de monseigneur le comte d'Artois.","architecture":"Chambon, du XIVe siècle et XVIIe siècle,  maison noble fortifiée  et ayant conservé ses dispositions d'origine, bâtie au XVe siècle, sur une motte entourée de fossés. Le corps de bâtiment de plan barlong, un corps de logis carré flanqué de tourelles aux quatre angles, couvert d'un toit en pavillon, est une maison à un niveau et niveau de comble, cantonné de quatre tours rondes, tours couvertes de toits coniques, sont à  peine éclairées de petites ouvertures. La tour sud-est  est aménagée en chapelle. Seules les portes et fenêtres Est et ouest ont été agrandies au XVIIe siècle. La toiture surmontant chaque façade du corps de logis présente la particularité d'un toit à deux pentes créant un creux au point de rencontre des façades, au milieu du bâtiment. Cet édifice témoigne de l'architecture seigneuriale médiévale.  \r\nGerbe, se compose d'un corps de logis carré à deux niveaux plus attiques relié sur la gauche d'une construction inférieure reliant un donjon carré  à deux niveaux avec tourelle accolée, exagonales sur angle à toit pointu.","habitants":"Famille Régnier\"","divers":"Château de Chambon et de Gerbe à Saint-Rémy en Rollat","gps":"","images":["../../jctruffet.com/image/image_03/03_St_Remy_Rollat_1.jpg","../../jctruffet.com/image/image_03/03_St_Remy_Rollat_2.jpg","../../jctruffet.com/image/image_03/03_St_Remy_Rollat_3.jpg","../../jctruffet.com/image/image_03/03_St_Remy_Rollat_4.jpg"]},"Consult_chateau_formulaire6b64":{"id":"Consult_chateau_formulaire6b64","dept":"03","canton":"Montluçon","commune":"St-Victor","nom":"St_Victor_Allier","type":"Château","periode":"XV","histoire":"Deux châteaux à Saint-Victor celui de Passat du XVe siècle et de Thizon  du XIIIe siècle vestiges.                   PASSAT, le château de Passat s'élève sur le rebord du plateau, au dessus de la vallée du Cher. Le fief de Passat  porte le nom de la première famille propriétaire, au Moyen-Age, une charte de 1367, nous donne le nom d'un chevalier nommé Gaucher de Passat et en 1376, le titre qui lui est accordé : Sénéchal du Limousin. Dès 1518, Passat passe  aux mains de la famille de Lyon. Antoine de Lyon, riche bourgeois accède à la noblesse en devenant officier du grenier à sel. Il semble que c'est Antoine de Lyon qui ait fait reconstruire le château. En 1720, passat aux de la Dure et Barassier  sont acquis par le marquis Jehannot  de Bartillat baron d'Huriel. Non confisqué à la Révolution comme bien national, le château est vendu en 1806  à M. Dequieraux, seigneur de Chassignolle, greffier en chef de la juridiction des gabelles et dépôts dAuzance  et Mainsat. La restauration récente ne le met pas en valeur. Les lions de pierre que l'on peut voir à l'une des entrées et les écussons sont le symbole de la famille de Lyon. THIZON, dès 1171, dans un acte passé au prieuré de La Chapelle-Aude, on trouve la signature de Pierre de Tizon. En 1248, Archambaud VII donne, par testament, sa maison de Tizon à un certain Borbonius, que l'on  pense être son fils naturel. En 1398, Louis, duc du Bourbonnais, donne à son écuyer, Robinet de Vendat, sa\"tour et maison forte de Tizon en la chatellenie de Hérisson\". En 1457, Gilbert de Chaslus reçoit la place,   titre, châtel et châtellenie de Tizon, avec justice, juridiction et appartenance. Le fief est important et c'est le  chevalier, messire Guy Dubuz qui, en 1503, rend hommage à la duchesse de Bourbon, pour son chastel de Thisan.","architecture":"Passat, s'élève sur le rebord du plateau, au dessus de la vallée du Cher depuis le XIe siècle, permettant d'assurer la surveillance des voies antiques. Sa construction féodal daprès les fouilles du XIXe siècle,a subi de nombreuses modifications au cours des siècles. Subsistent de vastes caves voûtées sur lesquelles Antoine de Lyon, officier du grenier à sel de Montluçon et propriétaire du château, fait reconstruire le bâtiment dans le style renaissance. Lédifice pourvu d'un donjon carre à échauguette et de deux tours rondes, est bâti à léquerre. Le rez-de-chaussée s'ouvre de plein-pied sur la cour par une triple arcade.Au début du XIX émé siècle, il est en partie détruit par un incendie.\r\n Thizon, le château devait avoir fière allure, protégé par un précipice et de larges fossés, ceint de hautes murailles,  défendu par un donjon emmotté. Blotti au pied des monts, il surveillait à la fois le chemin remontant vers le plateau, et surtout la vallée du Cher et les approches de la seigneurie de Montluçon.  Il devait dater d'une époque où les sires de Bourbon montaient bonne garde à leurs limites. En 1530, le château est environné et circuit de toutes parts de fossés et de murs. À l'entrée est  un pont-levis et d'un  vieux portail. Il possède sa chapelle et son gibet au champ dit de la Potence. Du château il ne reste que quelques ruines rescapées de la destruction des tours à la fin du siècle dernier, et de celle du donjon vers 1930. Des mouvements de terrain, au large, signalent que Thizon fut une place forte étendue et importante. Légendes et souterrains sont attachés à ces vestiges qui ont beaucoup perdu de leur pittoresque avec leur mutilation.","habitants":"Famille de Lyon\"","divers":"Vestiges du château féodal de Thizon château de Passat à Saint-Victor","gps":"","images":["../../jctruffet.com/image/image_03/03_St_Victor_Allier_1.jpg","../../jctruffet.com/image/image_03/03_St_Victor_Allier_2.jpg","../../jctruffet.com/image/image_03/03_St_Victor_Allier_3.jpg","../../jctruffet.com/image/image_03/03_St_Victor_Allier_4.jpg","../../jctruffet.com/image/image_03/03_St_Victor_Allier_5.jpg"]},"Consult_chateau_formulairebca4":{"id":"Consult_chateau_formulairebca4","dept":"03","canton":"Neuilly-le-Réal","commune":"St-Voir","nom":"St_Voir","type":"Manoir","periode":"XIX","histoire":"St-VOIR, avant la construction du château de Saint Voir, c'est Sevré qui était le   siège d'un fief  important. Au XIIIe siècle, la majeure partie du domaine et tous les droits seigneuriaux furent acquis   par les seigneurs des Gouttes à Thionne, qui prirent alors le titre de seigneurs de Saint-Voir. Au sommet d'un coteau,  en face de l'ancien fief de Sevré.","architecture":"St-Voir, à la fin du XIXe siècle, un grand château inspiré du style Louis XIII a été bâti en briques et  en pierres avec de hautes toitures en ardoises. le château s'élève sur un soubassement en pierre percé de fenêtres. Au dessus, un  logis quadrangulaire, composé d'un rez-de-chaussée, d'un étage, et  d'un toit à croupe éclairé de lucarnes et oeil de buf, est encadré par deux pavillons débordant des façades, qui dominent le logis par un étage supplémentaire. Ils présentent un plan polygonal sur la façade ouest et rectangulaire du côté est.","habitants":"Seigneurs des Gouttes \"","divers":"Château de Saint-Voir","gps":"","images":["../../jctruffet.com/image/image_03/03_St_Voir_1.jpg","../../jctruffet.com/image/image_03/03_St_Voir_2.jpg","../../jctruffet.com/image/image_03/03_St_Voir_3.jpg","../../jctruffet.com/image/image_03/03_St_Voir_4.jpg"]},"Consult_chateau_formulaire25d2":{"id":"Consult_chateau_formulaire25d2","dept":"03","canton":"Cusset","commune":"St_Yorre","nom":"St_Yorre","type":"Château","periode":"XIX","histoire":"St-YORRE, la paroisse de Saint-Yorre  semble être née d'un moulin au lieu-dit \"Villa Moulin\", à l'époque romaine. L'existence d'un important moulin dans cette région de Limagne n'est pas surprenante, en raison de la fertilité de cette vallée qui devait produire du blé. A la Villa Moulin, fut d'abord érigée une chapelle près de la source Guerrier. C'est là qu'ensuite fut construit un prieuré de bénédictins dépendant de l'Abbaye de Cusset. Il sera entièrement détruit par une crue de l'Allier en 1739. Saint-Yorre dépendait à l'époque du canton de Busset.                    Source Château-Robert, est une délicieuse eau de table hygiénique et curative qui prévient et combat les affections de l'estomac , du foie , des reins , et désintoxique l'organisme, jaillit froide, elle conserve ses propriétés thérapeutiques bue à domicile. Le gaz naturel dont elle est saturée au moment de son embouteillage rend plus assimilables ses sels bienfaisants. Le captage et l'embouteillage sont effectués suivant les derniers procédés de l'hygiène, de manière à éviter tout contact, même celui de l'air. La pureté rigoureuse de l'eau est ainsi assurée.","architecture":"Ce château Robert à St-Yorre caractéristique de l'engouement néo-gothique du XIXe siècle comporte une façade à pans de bois et deux tourelles en briques. Maintenant il sert à un  centre de loisirs pour l'été.","habitants":"industriel local\"","divers":"Château Robert à Saint-Yorre","gps":"","images":["../../jctruffet.com/image/image_03/03_St_Yorre_1.jpg","../../jctruffet.com/image/image_03/03_St_Yorre_2.jpg","../../jctruffet.com/image/image_03/03_St_Yorre_3.jpg","../../jctruffet.com/image/image_03/03_St_Yorre_4.jpg","../../jctruffet.com/image/image_03/03_St_Yorre_5.jpg"]},"Consult_chateau_formulairea7c3":{"id":"Consult_chateau_formulairea7c3","dept":"03","canton":"Chantelle","commune":"Taxat_Senant","nom":"Taxat_Senant","type":"Château","periode":"","histoire":"GRANGES, maison forte, les premiers seigneurs connus des Granges sont les d'Aubigny. En 1574, la terre des Granges était venue, par son mariage avec   Jaquette des Chapettes, à Gabriel d'Aubigny, capitaine-châtelain de Chantelle. La seigneurie passa  ensuite aux mains des Bonnelat. Après avoir appartenu aux Bourgougnon, puis aux Raynaud, la terre des Granges  fut rattachée à la seigneurie de Mont et devint,  au XIXe siècle, la propriété de la famille Le Brun, puis au XXe siècle à celle de la famille Allier.          MONT, pas d'information historique.","architecture":"La maison forte des Granges est une construction du XVe siècle, à quelques centaines de mètres du château du  Mont. Cette maison forte dispose de deux corps de bâtiments, disposés en équerre, délimitant une cour intérieure. Le premier,  de plan rectangulaire, est à deux niveaux.  Il est flanqué d'une fine tourelle contenant l'escalier à vis pour l'accès aux étages. Le second, aussi de plan rectangulaire à deux niveaux sous toiture, dans des combles élevés, éclairés par des lucarnes.","habitants":"Famille Le Brun\"","divers":"Château du Mont et de la maison forte de la Grange à Taxat-Senant","gps":"","images":["../../jctruffet.com/i
