ois Etienne Baraba vers 1760.       NEUVILLE   Le premier seigneur de Neuville est connu en 1466 par le terrier de Bressolles, et en 1503, l'écuyer Jehan de Maignons reconnaît tenir de la duchesse de Bourbon. En 1579, la seigneurie appartient à Guillaume  Ollivier qui épouse en seconde noce Christine de Beaucaire, c'est le frère de celle ci, Rodolphe de Beaucaire, qui lui succède et fait transformer, en 1604, la maison forte,  des bâtiments neufs ont été construits et le château abrite le centre de formation professionnelle agricole pour adultes crée en 1973.   ORIGNY, pas d'information historique.     VALLIERES, il succédait à un château appartenant au XIVe siècle à Jean Cordier, écuyer et seigneur de Vallières. Parmi les Cordier, on trouve un trésorier ducal, un Conseiller du duc et plusieurs Consuls de Moulins. Le dernier Cordier  seigneur de Vallières, fut Jean, écuyer, qui possédait aussi Droussy, La Motte et Chapeau. Maître d'hôtel d'Anne de France, châtelain de Moulins en 1510, il  mourut sans postérité en 1526. À la fin du XVIIe et au début du XVIIIe siècle, le château resta une cinquantaine d'années aux mains de la famille de Genestoux. Claude de Bouys, avocat au présidial de Moulins, puis receveur général des assignations en la sénéchaussée de Moulins, l'acheta en 1776. Sa fille Marie Eulalie, qui en hérita et  le possédait à la Révolution, avait épousé Gabriel de Bonand qui fut deux fois maire de Neuvy.","architecture":"Montgarnaud, est une gentilhommière du début du XVIIIe siècle avec deux tours rondes aux angles, une tour du XIIIe siècle.                                   Neuville, les deux pavillons qui flanquent le corps de logis principal sont datés de 1600 environ. Le bâtiment principal à un seul niveau  et niveau de comble a été construit au XIXe siècle, dans un style néo-Renaissance avec ses grandes ouvertures à  meneaux et son avant corps à deux niveaux, pris en uvre dans la façade. Les deux pavillons en retour d'équerre aux angles sont plus anciens et ont été édifiés au XVIIe siècle.                               Vieux Melay, de style néo-Renaissance est construit en 1840, date à laquelle le petit corps de logis du XVIIe siècle. Le domaine comprend un petit château, ses dépendances agricoles et la chapelle, le tout clos par un mur avec portail. Le bâtiment ne présente qu'un seul niveau avec un rez-de-chaussée. La porte de la façade principale ouvre sur un arc en plein cintre dont l'agrafe porte une tête féminine. Deux pilastres ioniques non cannelés encadrent cette porte.\r\nOrigny se présente actuellement comme un logis carré néo-gothique, qui fut construit en 1875. Les douves, sèches, entouraient l'ancien manoir.          Neuvy le château de Toury, véritable sentinelle chargée de surveiller la vallée de lAllier, était considéré dès le XIIIe siècle comme un château fort et une des quatre principales baronnies du Bourbonnais. Le château de La Queune fut bâti en pleine vallée de lAllier qui, lors des grandes crues, venait envahir ses caves et son rez-de-chaussée. Le château de Melays, souvent désigné sous le nom de Vieux Melays, fut racheté par le baron des Michels. Son fils embrassa la carrière militaire dès le début de la Grande Guerre.","habitants":"Famille d'Antoine Minard            Famille Guillaume  Ollivier\"","divers":"Château de Montgarnaud  de Neuville  du Vieux-Melay  et de la Vallières à Neuvy","gps":"","images":["../../jctruffet.com/image/image_03/03_Neuvy_1.jpg","../../jctruffet.com/image/image_03/03_Neuvy_2.jpg","../../jctruffet.com/image/image_03/03_Neuvy_3.jpg","../../jctruffet.com/image/image_03/03_Neuvy_4.jpg","../../jctruffet.com/image/image_03/03_Neuvy_5.jpg","../../jctruffet.com/image/image_03/03_Neuvy_6.jpg"]},"Consult_chateau_formulaire1a50":{"id":"Consult_chateau_formulaire1a50","dept":"03","canton":"Souvigny","commune":"Noyant-d`Allier","nom":"Noyant_Allier","type":"Forteresse","periode":"XIV","histoire":"NOYANT, fief connu à partir du XIVe siècle,  le château de Noyant est une construction du XVIe siècle, mais a du exister beaucoup plus tôt. en 1503, Anne de Chareilh fait aveu de son fief à la duchesse de Bourbon comprenant le logis et seigneurie de Noyant, fief estimé à 100 livres de rente annuelle. En 1569, le seigneur de Noyant était Blaise de la Souche, la maison seigneuriale de Noyant consistait en une grosse et forte tour carrée, non fossoyée, sans justice. En 1673, François Emé des Rochers, écuyer en 1700, Jacques de la Motte, également écuyer, furent seigneurs  de Noyant. Le domaine était confié à des fermiers  en 1715, le curé de Noyant inscrivit à cette date, le fermier de la seigneurie de Noyant  était un singulier homme, dangereux pour son orgueil, insupportable aux gens de bien, le tarquin des laboureurs .","architecture":"Noyant d'Allier,   du  XVI siècle,  appartient à la typologie des hautes tours donjons quadrangulaires, flanquées d'une tourelle contenant un escalier à vis et surmontées d'un couronnement défensif autour d'un chemin de ronde. Vers 1850, des travaux de restauration destinés à le rendre habitable; toitures, percement de baies néogothiques, décors intérieur. L'enceinte médiévale qui entourait le donjon a conservé son tracé, une partie de ses murs et trois tours de guet carrées. Différents bâtiments de communs ont été bâtis au XVIIIe siècle, maison de gardien, grand pavillon ouest et au début du XXe grange et hangar au nord-est, dépendances à l'est. Un parc a été aménagé par le paysagiste Treyve.  L'ensemble des bâtiment enferme  une cour intérieure, on compte trois tours quadrangulaires et un donjon dans le système défensif. Les tours  hautes de quatre niveaux, sont couvertes  d'un toit en pavillon, alors que le donjon, une grosse et forte tour carrée, est desservi  par un escalier à vis, abrité dans une tour circulaire accolée. Le donjon et le logis ont été entièrement transformés au XVIe siècle par des fenêtres à meneaux de style Renaissance  et le donjon surmonté de crénelage et mâchicoulis décoratifs.","habitants":"Famille de Blaise de la Souche\"","divers":"Château de Noyant d'Allier","gps":"","images":["../../jctruffet.com/image/image_03/03_Noyant_Allier_1.jpg","../../jctruffet.com/image/image_03/03_Noyant_Allier_2.jpg","../../jctruffet.com/image/image_03/03_Noyant_Allier_3.jpg","../../jctruffet.com/image/image_03/03_Noyant_Allier_4.jpg"]},"Consult_chateau_formulaire2e3d-2":{"id":"Consult_chateau_formulaire2e3d-2","dept":"03","canton":"Marcillat-en-Combraille","commune":"Sainte-Thérence","nom":"Ours","type":"Vestiges","periode":"XII","histoire":"Deux châteaux à Sainte-Thérence, l'Ours XI-XIIe siècle et la Busière du XVIIIe siècle.                                 OURS pourrait être le nom de la première famille noble qui occupa le château. L'occupation première du site pourrait remonter à la naissance de la féodalité, aux IX-Xe siècles, époque à laquelle certains individus ont subjugué les populations locales par leur puissance relative et cherché à asseoir leur sécurité en des lieux  protégés.\r\n il est toutefois plus vraisemblable de penser que c'est à cette époque que le site fut fortifié dans le cadre d'une politique défensive du Bourbonnais menée par Philippe Auguste et son fidèle vassal Guy de Dampierre contre la menace anglaise venue d'Aquitaine. En récompense de ses loyaux services, Guy de Dampierre reçut alors la châtellenie de Montluçon en augmentation de fief et étendit  ses terres vers l'ouest; il lui fallait des défenses solides dans la région de Marcillat, zone limite avec l'Aquitaine; il fit donc construire vers 1210 sans doute le château de l'Ours et celui de Ronnet, places fortes d'un ensemble fortifié s'étendant de Montaigut-en-Combraille à Nouhant, on peut imaginer que la forteresse fut construite par le sire de Bourbon à la demande des moines de Menat et pour leur protection; ils étaient en effet établis en aval, à Saint-Genest-Vieux-Bourg, à Polier et à Lavault-Sainte-Anne: le fond de la vallée conduisait tout droit à leurs prieurés.Le château de l'Ours appartint dès le XIIIe siècle à la famille noble de la Voreille (Mazirat), puis passa par mariage en 1350 à la famille du Betz, propriétaire d'une seigneurie dont le siége primitif se tenait en face, sur Saint-Genest, entre Pégut et Rillat. Il passa à la couronne avec le rattachement du Bourbonnais à la France (1531) aujourd'hui propriété de la commune de Sainte-Thérence, BUSIERES pas d'information historique.","architecture":"Toutefois la situation du château de l'Ours au fond d'une vallée étroite. Le donjon datant du début du XIIIe siècle.   La plate-forme occupée par la forteresse s'étend du sud au nord sur une cinquantaine de mètres et douze mètres au plus large, bien conservé par endroits dans sa partie basse, le mur d'enceinte pouvait mesurer un mètre de largeur. Du côté sud, à droite de l'entrée du château, s'élèvent les vestiges des bâtiments d'habitation  faisant corps avec le rocher sur lequel ils ont été ancrés. Séparés par des planchers, les étages étaient éclairés par des fenêtres s'évasant  vers l'extérieur et visibles en arrivant au château. A demi taillée dans le roc, une cave exiguë  est aérée par un conduit de section carrée .Le donjon  est le vestige essentiel de cet ensemble fortifié. On en remarque la maçonnerie soignée, les rares ouvertures aux jambages et linteaux taillés, les chaînages de pierres équarries séparant les trois niveaux de la tour, Le donjon  est le vestige essentiel de cet ensemble fortifié, il était coiffée de hourds en bois débordant.","habitants":"Famille de Guy de Dampierre\"","divers":"Vestiges du château des Ours à Sainte- Thérence","gps":"","images":["../../jctruffet.com/image/image_03/03_Ours_1.jpg","../../jctruffet.com/image/image_03/03_Ours_2.jpg"]},"Consult_chateau_formulairecd51":{"id":"Consult_chateau_formulairecd51","dept":"03","canton":"Cerilly","commune":"Braize","nom":"Pacaudiere","type":"Manoir","periode":"XIX","histoire":"PACAUDIERE, la  famille de Peyroux semble avoir possédé ce château depuis cette époque. La tradition lui attribue une origine  diabolique. Il aurait été bâti par le diable lui-même pour tenter un pèlerin revenu de Palestine et qui menait là   une vie de sainteté. Les seigneurs du lieu, pour éviter d'être tourmentés, payaient une rente. Il faut dire que les environs  du Vieux Braize, localité chargée d'histoire depuis l'Antiquité, sont l'objet de bien d'autres légendes.  En 1350, Pierre Buchepot, damoiseau, membre d'une famille  qui a essaimé sur l'ensemble  de la région, rend  hommage  au duc de Bourbon, comme tuteur de son neveu Guillaume Chambellain, pour la moitié de l'hostel et domaine de La Pecaudière, en la Châtellenie de Bourbon. D'après le curé de Saint Bonnet Hérault, après la Révolution de 1789, une panique générale incita les habitants à quitter leurs demeures pour se réfugier dans la forêt; cette peur, partie de Ruffec le 28 juillet 1789, atteignit le Bourbonnais le 30 juillet. Le 24 mars 1790, puis le lundi de Pentecôte, fut livrée à La Pacaudière une sanglante bataille, suivie de ravage et pillage abominables. transformé aujourd'hui en hôtel restaurant et hôtel de ville.","architecture":"La seigneurie de La Pacaudière est citée comme dépendant de la châtellenie d'Ainay-le-Château. L'ancien manoir a été remplacé par un château de style Renaissance avec deux tours rondes à toits en poivrière. A côté,  les communs, autour d'une cour centrale, sont disposés en carré et sont flanqués de deux tours également.","habitants":"Famille de Peyroux \"","divers":"Château de la Pacaudière","gps":"","images":["../../jctruffet.com/image/image_03/03_Pacaudiere_1.jpg","../../jctruffet.com/image/image_03/03_Pacaudiere_2.jpg"]},"Consult_chateau_formulaire3563":{"id":"Consult_chateau_formulaire3563","dept":"03","canton":"Yzeure","commune":"Yzeure","nom":"Panloup_Pouzeux","type":"Château","periode":"XVI","histoire":"PANLOUE, résidence d'officiers moulinois, mais fut occupé sur une plus longue période. Le 1er propriétaire de  Panloup connu  fut Louis de Launay, médecin, en 1550, puis  l'on trouve Jacques Bodinat, avocat au parlement vers  1639 son fils François, lieutenant en la châtellenie de Bessav et Pougny gendarme du Roi, devint  sieur de la motte d'Arizolles,  était qualifié  d'écuyer. Pierre Maquin, sieur de Panloup, de La Ronde et autres lieux, en 1684, mérite d'être mentionné : l'assemblée des propriétaires fonciers  de la paroisse d'Yzeure l'élut, le  3 février 1709, responsable  des réparations projetées au clocher, au chapiteau et la clôture du cimetière de la paroisse. Il refusa cette charge le 5 février, arguant qu'il était âgé de 75 ans, était infirme et possédait un   privilège d'officier militaire. Au XVIIIe siècle, Panloup appartenait aux Roy: Gilbert Roy, écuyer, était en 1722 également sieur de Bouchaine et  de La Brosse. Un acte daté du 27 août 1753 passé à Chevagnes, nous apprend que Joseph, chevalier, seigneur de Panloup, qui était capitaine de grenadiers du roi au régiment de Cambis, épousa Marie Anne Batissier.                               POUZEUX, le premier seigneur connu était au début du XIVe siècle, Perrin de Pozoux qui rendit aveu de sa maison de Pouzoux. En 1411, c'est l'écuyer Jehan de Saligni qui détient la seigneurie de Pouzeux.  Le château a servi de lieu de séjour à Honoré d'Urfé, gouverneur du Bourbonnais, époux de Gabrielle de Lévis, dame de Châteaumorand, laquelle acquiert le château en 1569. Honoré d'Urfé en fit don à la ville de Moulins en 1604, pour la création d'un collège de Jésuites. Ce legs n'ayant pu se réaliser, Jean-Claude de Lévis vendit le château aux Jésuites en 1634.","architecture":"Pouzeux, du XVIe siècle, d'après un dessin de 1675, le château comprenait deux corps de logis d'équerre, accompagnés de deux petits pavillons. Un des deux corps de logis a disparu. Il reste un fronton Renaissance à l'ouest, une porte moulurée sur la face sud ainsi qu'une tourelle. \r\nPanloue,  ancienne possession des Templiers. Le château, d'époque Louis XIII, se compose d'un corps de bâtiment central, à rez-de-chaussée et étage sous comble, calé par deux autres corps de bâtiments couverts en pavillon, l'un au nord et l'autre au sud. Sur la façade Est, faisant saillie sur le bâtiment central, une construction rectangulaire flanquée d'une tour ronde qui, de même que l'autre tour lui faisant pendant, a sa partie supérieure couronnée par un campanile. Sur la façade nord, un fronton curviligne tronqué témoigne sans doute d'une ancienne porte. La maçonnerie de briques et de pierres et les toitures en tuiles plates contribuent au style régionale de l'ensemble. \r\nAncien château de Joulet, tour  construction du XVIIe siècle vestige d'un château. Ses briques sont appareillées en gros losanges tracés en briques noires sur briques rouges.","habitants":"Famille de  Perrin de Pozoux\"","divers":"Château du Pouzeux, de Panloue et du Joulet à Yzeure","gps":"","images":["../../jctruffet.com/image/image_03/03_Panloup_Pouzeux_1.jpg","../../jctruffet.com/image/image_03/03_Panloup_Pouzeux_2.jpg","../../jctruffet.com/image/image_03/03_Panloup_Pouzeux_3.jpg","../../jctruffet.com/image/image_03/03_Panloup_Pouzeux_4.jpg","../../jctruffet.com/image/image_03/03_Panloup_Pouzeux_5.jpg"]},"Consult_chateau_formulairec48b":{"id":"Consult_chateau_formulairec48b","dept":"03","canton":"St-Pourcain-sur-Sioule","commune":"Paray-sous-Braille","nom":"Paray_Braille","type":"Château","periode":"XV-XIX","histoire":"Plusieurs châteaux à Paray sous Brailles;  Cordeboeuf du XV-XIXe siècle  et Châteauvert  du XIXe siècle de style renaissance.                      CHATEAUVERT   Antoine de la Roche possédait le fief de Châteauvert en 1513, puis vers 1560, il appartenait à Jean   Dinet. Par la suite, il changea de nombreuses fois  de propriétaires. Propriété de la famille de Crozat sous la Restauration,   Château-Vert échut ensuite à Philippe Chambon dont le fils, Julien, fit édifier le château actuel de 1885 à   1892 par l'architecte Lagoutte. En 1963, un incendie détruisit le haut toit d'ardoise qui fut remplacé par un toit  à pente douce.            CORDEBOEUF Le château de Cors de Buf appartient aux Dubreuil puis aux Reynaud de Cordebuf. Il servit contre les Anglais. Le connétable de Bourbon, parti de Gayette pour se rendre à Chantelle, avant de fuir vers l'Italie, passa le bac à Cors de Buf et y fit étape. En 1503, c'est l'écuyer Blaise de Chareil  qui tient en fief  de la duchesse de Bourbon sa maison et place forte de Cordeboeuf, en toute justice haute, moyenne,basse.","architecture":"Châteauvert, de plan rectangulaire à rez de chaussée surélevé et  un étage, l'édifice est animé par   divers renforcements et avancés,  la façade intérieure est pourvue  d'un avant corps en saillie abritant la porte d'entrée au fond d'un porche  vouté en berceau. L'angle à droite est flanqué  d'un pavillon avec tourelle d'escalier octogonale, alors que le côté gauche est terminé par une tour carrée, la façade postérieure comporte une haute tour ronde qui a  conservé  sa poivrière d'ardoise  surmontée d'un clocheton. Elle est agrémentée  d'un avant-corps  de trois travées, et d'une véranda à pans coupés.  Cors-de-Buf, se présente comme un corps de logis unique et massif, de plan rectangulaire, flanqué  de 4 tours rondes, autrefois entouré de fossés. Il fut construit au milieu du XVe siècle, et comporte trois niveaux percés de fenêtres, remaniées au cours  des siècles. Le côté Est  a gardé ses mâchicoulis, endommagés par une  canonnade  ayant occasionné une brèche. Les façades ouest et nord  ont conservé une grande austérité. Au sud, un perron, sans doute de l'époque romantique, a été rajouté, donnant ainsi un aspect plus accueillant à l'ensemble.","habitants":"Famille de Crozat                         Famille de Reynaud de Cordebuf\"","divers":"Château de Châteauvert, de Cordeboeuf et de Villemouze à Paray sous Braille.","gps":"","images":["../../jctruffet.com/image/image_03/03_Paray_Braille_1.jpg","../../jctruffet.com/image/image_03/03_Paray_Braille_2.jpg","../../jctruffet.com/image/image_03/03_Paray_Braille_3.jpg","../../jctruffet.com/image/image_03/03_Paray_Braille_4.jpg"]},"Consult_chateau_formulaireecae":{"id":"Consult_chateau_formulaireecae","dept":"03","canton":"Chevagnes","commune":"Paray-le-Fresil","nom":"Paray_Fresil","type":"Château","periode":"XVI-XVIII","histoire":"Deux châteaux à Paray le Fresil;  Paray du XVI-XVIIIe siècle et Positots du XVIIIe siècle.                      PARAY, une maison fortifiée du XIIIe siècle qui se transforma en château, au fur et à mesure des successions et en particulier  en 1260 par la famille  des Pétronille de  Bothez, et les   de Thianges et en 1487  les de Popillon famille de  conseillers du connétable Charles de Bourbon dont une descendante des Popillon Claudine de Villars le donna à sa fille  d'un second mariage, Edmée de la Platrière qui en 1640 François Destut  seigneur de Tracy, dans cette famille en 1793  Antoine représenté la noblesse aux états généraux et s'unit ensuite aux Tiers-Etat, commandant de Cavalerie sous les ordres de la Fayette, il fut emprisonné, puis sénateur inamovible jusqu'en 1814 et fit partie de l'Académie Française. L'une de ses filles épousa le fils de la Fayette et son fils Victor de Destut, marquis de Tracy militaire et député de l'Allier et nommé ministre de la Marine en 1848  il épousa Sarah Newton  petite-nièce du mathématicien, leur fille  qui fut la mère de Jacques Stall de Magnoncourt reprit le nom de marquis de Tracy. Transformé en hôtel restaurant.                          POSITOTS Pas d'information historique.","architecture":"Paray, demeure de la fin du XVIe siècle, flanquée de tours, remaniée au XVIIIe siècle. Une aile est ajoutée au XIXe siècle, détruite ensuite par un incendie en 1668. Le château actuel se présente comme un corps de bâtiment unique auquel a été ajouté un petit corps de bâtiment plus bas. Une tour carrée et une tour ronde marquent les extrémités sud-est et sud-ouest. Une autre tour ronde marque la limite entre le corps de bâtiment principal et le corps de bâtiment plus petit sur la façade Est. Les maçonneries sont en briques polychromes rouges et bleues. A droite, se dresse une tour carrée, vestige de l'ancien donjon médiéval. A l'intérieur du château, un salon bibliothèque orné de boiseries a échappé à l'incendie. Ce château est un bon exemple de l'architecture civile bourbonnaise.                          Positots,  ensemble de bâtiments composites, le logis principal des Positots, restauré au XVIIIe siècle, est un bâtiment  plus ancien, aux combles élevés et éclairé de lucarnes non identiques. A proximité, une grosse tour carrée, en forme de pavillon, est surmontée d'un joli clocheton, coiffé à l'impériale. le domaine est a vocation d'élevage.","habitants":"Famille de François Destutt \"","divers":"Château de Paray","gps":"","images":["../../jctruffet.com/image/image_03/03_Paray_Fresil_1.jpg","../../jctruffet.com/image/image_03/03_Paray_Fresil_2.jpg","../../jctruffet.com/image/image_03/03_Paray_Fresil_3.jpg"]},"Consult_chateau_formulaired9f5":{"id":"Consult_chateau_formulaired9f5","dept":"03","canton":"Huriel","commune":"Chamberat","nom":"Paslieres","type":"Maison forte","periode":"XV","histoire":"PASLIERES, Charles Bertrand,  avec sa bannière, prit Charenton, et fit bâtir Pallière. En 1354, Hector Bertrand tient la motte et le village de  Paslières en fief de Louis de Brosse, lequel en fait aveu au duc de Bourbon. Le sieur de Paslières est cité en 1569 comme seigneur vassal de la châtellenie d'Hérisson.  L'aveu et dénombrement du marquisat  d'Huriel  Barthillat, en 1777, cite encore la motte et village de Paslières. La ruine de cette bâtisse s'achève rapidement.","architecture":"Le vieux château fort de Paslières n'est plus qu'une ruine au toit à quatre pans, crevé, avec une tour   tronquée en façade. Des douves en eau l'entourent encore, larges et profondes. À l'arrière, des mouvements   de terrain sont des restes  de l'enceinte extérieure. Ce château fort a une longue histoire, Pascellarias est cité   dès l'époque mérovingienne comme villa dépendant  de l'abbaye de Saint-Denis. Un château primitif fut bâti   vers 1200 par un seigneur de la maison de Bertrand.","habitants":"Famille d'Huriel  Barthillat\"","divers":"Maison forte de Paslières à  Chamberat","gps":"","images":["../../jctruffet.com/image/image_03/03_Paslieres_1.jpg","../../jctruffet.com/image/image_03/03_Paslieres_2.jpg"]},"Consult_chateau_formulairee459":{"id":"Consult_chateau_formulairee459","dept":"03","canton":"Herisson","commune":"Cosne-d`Allier","nom":"Petit_Bois","type":"Manoir","periode":"XVII","histoire":"PETIT-BOIS, en 1350, Jean Brandon, seigneur de Gouttières, avoue tenir dans la châtellenie d'Hérisson le fief de Bosc-lès-Cosne, mention qui confirme l'existence d'un château primitif du Petit-Bois.  Gites de France par  Marie Paule CURDY.","architecture":"Petit-Bois, le château actuel du Petit Bois, d'aspect gothique flamboyant, mais d'époque récente, est assis sur une esplanade entourée de cernes. C'est une construction élégante et quelque peu romantique qui associe les briques rouges des murs, les encadrements et les harpages de pierre blanche, avec le bleu des ardoises de la toiture. Le  corps de logis de plan rectangulaire à deux niveaux est flanqué d'un pavillon en forme d'avant-corps,et d'une tourelle en poivrière. Des fenêtres à meneaux et des lucarnes à pinacles décorent la façade. À l'un des pignons est accolée une tour octogonale à faux mâchicoulis et toit en flèche élancée, surmonté d'un clocheton à belvédère.","habitants":"Famille de Jean Brandon\"","divers":"Château du Petit-Bois à Cosne d'Allier","gps":"","images":["../../jctruffet.com/image/image_03/03_Petit_Bois_1.jpg","../../jctruffet.com/image/image_03/03_Petit_Bois_2.jpg","../../jctruffet.com/image/image_03/03_Petit_Bois_3.jpg","../../jctruffet.com/image/image_03/03_Petit_Bois_4.jpg"]},"Consult_chateau_formulaire9392":{"id":"Consult_chateau_formulaire9392","dept":"03","canton":"St-Pourcain-sur-Sioule","commune":"Monetay-sur-Allier","nom":"Petit_Bressolles","type":"Château","periode":"XVI","histoire":"PETIT-BRESSOLLES, la baronnie de Bressolles est aux mains d'un Brechard en 1295. Raoul Brechard se succèdent entre 1174 et 1308. Raoul I est vicomte de Moulins. Son fils Raoul II épouse en 1233 Isabeau de Culant et sera le père de Raoul III et Aymon Brechard, seigneur.  Sa descendance Jean Regnault  vers 1372  avait pour femme, Blanche de Montmorillon, laquelle lui apportait la terre de Monestay qu'elle tenait de sa mère Aqnès de Vendat. C'est donc par les Montmorillon que Monestay est entré dans la possession des Brechard-Bressolles, devenant sans doute à ce moment le \"Petit-Bressolles\". Dans la famille jusqu'en 1510 l'unique fille  héritière épouse  Samphorien de Sacconyn, garderont la seigneurie jusqu'en 1660, au mains d'Antoine le Tailleur du Thonin écuyer en difficulté  vend la seigneurie à maître Cordier dont la fille  par son mariage en 1692 apporte le Petit Bressolles à Jacques Hugon de Givry. En 1698 François Cordier, lui aussi avocat au Parlement, Au début du XVIIIe siècle le Petit Bressolles est à Etienne Mercier, conseiller au Présidial de Moulins. La fille de celui-ci, Marguerite, épouse en 1797 Gilbert Farjonel, procureur du Roi.  En 1783, le Petit Bressolles appartient à Gilles de Saint-Quentin des Mures officier pensionné du Roi. Il le donne en dot à sa fille Catherine Elisabeth lors de son mariage avec Jean Baptiste Gueriots des Ruets, capitaine d'artillerie. Ils en sont propriétaires pendant la Révolution. Entre 1820 et 1830 monsieur Morignat en est propriétaire. Au XIXe siècle fut sans conteste Pierre Antoine Philippe Joseph Meilheurat magistrat. Sa fille adoptive, en 1850 Pétronille épouse Jean louis Auguste JOLY, Inspecteur des Eaux et Forêts.  Vers la fin du siècle dernier, les descendants JOLY vendent le Petit Bressolles à madame Bardinat, mère de François Bardinat maire de Monetay 1897 à 1911. Vendut a monsieur Sevat, toujours dans la famille.","architecture":"Petit Bressolles plus ferme que château corps de logis à un niveau et attiques flanqué d'une tour carrées à trois niveaux  dépendances sur cour arrière.","habitants":"Famille de Gilles de Saint-Quentin des Mures \"","divers":"Château du petit-Bressolle à Monetay sur Allier","gps":"","images":["../../jctruffet.com/image/image_03/03_Petit_Bressolles_1.jpg"]},"Consult_chateau_formulaireeb84":{"id":"Consult_chateau_formulaireeb84","dept":"03","canton":"Dompierre","commune":"Pierrefite-sur-Loire","nom":"Pierrefite_Loire","type":"Château","periode":"XVIII-XIX","histoire":"Trois châteaux à Pierrefite sur Loire; Launays du XIXe siècle, Morant du XVIIIe siècle ruine et des Saulnières du XXe siècle.                                LAUNAYS  à appartenu à une puissante  famille les Guerry.                     MORANT, Diane de Château Morant surnommée \"La Folle Marquise\" aurait été enfermée dans une aile du château.       SAULNIERES, pas d'information historique.","architecture":"Launays, belle demeure de la fin du XIXe siècle, est accosté de plusieurs tours carrées ou rondes, le corps de logis principal, de plan rectangulaire, est à deux niveaux, aux ouvertures symétriques. Un second corps de logis, accolé à un angle, domine l'ensemble  de ses trois niveaux. Les toitures d'ardoises sont percées de belles lucarnes, dans le style impérial. Ce château à remplacé  une ancienne maison  avec toit à la  Mansart. Longtemps emblème de Pierrefitte, le château Les Launays (fin du XIX), en plein centre du bourg et donnant sur la vallée de la Loire, est remarquable par ses multiples tours carrés ou rondes. Tout près, lancienne maison dite « de la marquise » a été  restaurée et le porche dentrée est remarquable.\r\nMorant,    le val ligérien facilitait beaucoup les invasions. Pour se défendre, les habitants de la fin de XIe et du XIIe siècle construisaient des surélévations de terre, les mottes entourées de fossés, souvent surmontées dune tour en bois et en torchis qui font ensuite place à des maisons fortes, construites en pierre. Le château, incendié, fût reconstruit au XVIe et XVIIe siècles puis à nouveau détruit. La vue  circulaire depuis la cour, propriété privée donne une bonne idée de limportance de ce château seigneurial.                              Saulnières, reconstruction cossue et composite de 1920 organisée autour d'un corps de logis de plan quadrangulaire, flanqué de tours rondes à toits coniques. A l'arrière, un pavillon carré et couvert d'un toit à l'impériale, pris en oeuvre, forme avant corps, au milieu de la façade, les deux niveaux sont percés de plusieurs fenêtre hautes tout comme la toiture. Des harpages de briques soulignent les angles.","habitants":"Famille les Guerry\"","divers":"Château de Launay, de Saulnière, de  Morant et du Breuil à Pierrefite  sur Loire.","gps":"","images":["../../jctruffet.com/image/image_03/03_Pierrefite_Loire_1.jpg","../../jctruffet.com/image/image_03/03_Pierrefite_Loire_2.jpg","../../jctruffet.com/image/image_03/03_Pierrefite_Loire_3.jpg","../../jctruffet.com/image/image_03/03_Pierrefite_Loire_4.jpg","../../jctruffet.com/image/image_03/03_Pierrefite_Loire_5.jpg","../../jctruffet.com/image/image_03/03_Pierrefite_Loire_6.jpg","../../jctruffet.com/image/image_03/03_Pierrefite_Loire_7.jpg"]},"Consult_chateau_formulairea6e1":{"id":"Consult_chateau_formulairea6e1","dept":"03","canton":"Souvigny","commune":"Autry-Issards","nom":"Plessis_Combrée","type":"Manoir","periode":"XV","histoire":"PLESSIS, depuis 1357 au moins, fief des La Tour, en 1497, date où Pierre II, duc de Bourbon, accorde à Jehan-Nicolas du Plessis, docteur et official d'Orléans. Vers 1553 ou 1554, Geoffroy Aubery, maire de Moulins, achète le Plessis. Vers 1630, le poète jésuite Jean Aubery décrit ces lieux, alors splendides. Le château, décoré à la gloire de Geoffroy Aubery. Quant au jardin, Antoine et Jean Aubery, seigneurs du lieu et cousins du poète. Puis le château, partagé entre trois frères Aubery constamment en procès, se dégrade. Entre 1726 et 1729, charmille et jardins sont dévastés. En 1772, les cuisines et les communs s'écroulent. A la fin du XIXe siècle, le château est racheté et sauvé de la ruine.","architecture":"Plessis édifié en 1497, couvert d'un toit de tuile plate à 2 croupes et bâti en pierre de taille, a été entièrement construit d'un bloc en 1497. L'ensemble est caractérisé par un système défensif austère. Au nord, une tour carrée aux petites pièces voûtées d'ogives comporte deux chemins de ronde intérieurs éclairés d'archères à trou central. Un glacis protège le bas des murs. Au sud, la tour d'escalier se termine par une pièce de défense : des mâchicoulis couverts sur consoles forment un chemin de ronde intérieur. S'y ajoutent de fausses couleuvrines dissuasives, des archères, de nombreux trous de visée de canonnières. Des contreforts ronds en forme d'échauguette protègent les angles du logis du tir des canons. De l'enceinte extérieure, il ne reste que les deux tours de défense qui flanquaient le pont-levis. Ce manifeste souci de défense s'allie au confort.  les deux tours d'enceinte de pigeonnier et de chapelle. Toutes les cheminées, à hottes droites et de style gothique flamboyant, sont conservées. Les Aubery ont fait placer  une porte en fer d'un travail très soigné à l'étage de la tour carrée.","habitants":"Famille de Loïs de Villard                                                              Famille de Jehan-Nicolas du Plessis\r\n        \r\n        \r\n        \r\n        \"","divers":"Château et pigeonnier du plessis à Autry-Issards","gps":"","images":["../../jctruffet.com/image/image_03/03_Plessis_Combr%c3%a9e_1.jpg","../../jctruffet.com/image/image_03/03_Plessis_Combr%c3%a9e_2.jpg","../../jctruffet.com/image/image_03/03_Plessis_Combr%c3%a9e_3.jpg","../../jctruffet.com/image/image_03/03_Plessis_Combr%c3%a9e_4.jpg","../../jctruffet.com/image/image_03/03_Plessis_Combr%c3%a9e_5.jpg"]},"Consult_chateau_formulaire3b06":{"id":"Consult_chateau_formulaire3b06","dept":"03","canton":"Cerilly","commune":"Ainay-le-Château","nom":"Pontcharreau_Chandon","type":"Maison forte","periode":"XV","histoire":"CHANDON, en 1342, Philippe des Moulins, chevalier. En 1449, Philippe et Guillaume des Moulins sont seigneurs de Chandonet de Bois Farnoux. En 1500, le fief est aux mains de Pierre de la Roche, par son épouse de Beaupoirier, près du bourg du Breuil. En 1503, c'est Phelippe des Moulins qui est seigneur de Chandon. Il fait aveu, à la duchesse de Bourbon de sa maison de Chandon . En 1671 Claude Barbarin écuyer, lieutenant au régiment de  Saint-Aubin, devient  seigneur de Chandon puis à son fils René en 1676. en 1672 Charles Asse écuyers capitaine du régiment de Picardie, fait aveu de ce fief au sire de Theurault. En cette fin du XVIIe siècle, le fief est morcelé et les revenus de  ses terres sont versés à l'hôpital de Moulins. De 1754 à 1798, le château est propriété de la famille Béraud qui vend Chandon à Louis Dominique Mazérat, juge de paix, lequel y meurt en 1841.                                   PONTCHARREAU, en 1301, un aveu de Guy de Montgarnaud, chevalier, pour ce qu'il tenait en fief du seigneur de Bourbon. En 1350, Johanis Franz, fit aveu des terres de Pontcharraut. En 1396, c'est le seigneur d'Issertieux, Jehan de la Porte, qui fait aveu  au duc de Bourbon de la  motte de Pontcharrault. En 1410, Vézien de  Blasson rendit hommage  pour son hospicium avec motte. Quelques années plus tard, la seigneurie a encore changé de mains  et Guillaume Grozieux rend hommage, en 1427, des hostels, manoir et demorance de Pontcharrault. Lui même  ne reste pas très longtemps sur la terre et, dès 1444, c'est Pierre d''Orgère, écuyer, qui rend hommage de Pontcharraud pour sa femme. Au début du XVIe siècle, Jehan de la Halle, écuyer, est en 1503 devenu seigneur   du domaine, probablement par mariage, puisqu'il fait alors aveu à la duchesse de Bourbon, avec damoiselle Françoise, de son hostel, maison forte. Par la suite, le   château passa à diverses familles: les Villelume, les Biotière,et les de Rolland.","architecture":"Chandon, sur une motte fossoyée, a gardé quelques aspects du passé avec ses tours, tourelles, hautes cheminées et sa toiture, le tout dominant un étang récemment remis en eau. Ce manoir des XIV-XVe siècles présente une tour carrée à fenêtres moulurées et des tours d'angle à toit tronqué, on remarque une porte à pinacles et une échauguette ornée d'un personnage couché.  Au cours des siècles, Chandon a subi bien des vicissitudes, notamment lors des guerres de religions et a souffert du vandalisme de certains de ses propriétaires. Mais actuellement, le château est parfaitement restauré. Pontcharreau, La motte existe encore, dans  l'étang qui, vidé en 1995, a livré un important matériel réparti de l'époque gallo-romaine a la période moderne.   Du château reste, outre la chapelle, un donjon carré du XVIe siècle, l'ensemble des bâtiments est très remanié.","habitants":"Famille de  Pierre d'Orgère\"","divers":"Château de Pontcharreau et Chandon à Ainay le Vieux","gps":"","images":["../../jctruffet.com/image/image_03/03_Pontcharreau_Chandon_1.jpg","../../jctruffet.com/image/image_03/03_Pontcharreau_Chandon_2.jpg","../../jctruffet.com/image/image_03/03_Pontcharreau_Chandon_3.jpg","../../jctruffet.com/image/image_03/03_Pontcharreau_Chandon_4.jpg"]},"Consult_chateau_formulaire1cfc":{"id":"Consult_chateau_formulaire1cfc","dept":"03","canton":"Lurcy-Lévis","commune":"Pouzy-Mésangy","nom":"Pouzy_Mesangy","type":"Château","periode":"XV-XIX","histoire":"Trois châteaux à Pouzy Masangy, des Beaumont du XIXe siècle, de Champroux XIIIe siècle avec vestiges et de Pouzy du XV-XVIIIe siècles.                BEAUMONT Une famille de Beaumont est connue dès le XIIIe siècle. En effet, Guillaume de Beaumont, fils de Jehan,  reçoit d'Archambaud seigneur de Bourbon. En mai 1441, l'écuyer Simon du Fraigne,   seigneur de Golon, vend à messire Regnaud de Balfame, chevalier, seigneur de Champroux, la terre  de Beaumont. A la fin du XVe siècle, le nouveau seigneur de Beaumont est Anthoine Cordier, reconnait tenir de la duchesse de Bourbon.         CHAMPROUX,  la première mention du château date de 1212, ou Hugues, chatelain de Campo Petroso donne, à titre viager à Hugues, fils d'Ermengart Chardon, ses dîmes dans les paroisses de Couleuvre, Pouzy et St-Plaisir. En 1312,le seigneur du lieu  est Jehan de Baserne, mais en 1438, c'est l'écuyer  Jehan de la Porte, dit Champerroux, qui obtient du duc de Bourbon, faculté et licence  de pouvoir bâtir et édifier un hostel fort, en son hostel qu'il a en la châtellenie, assis à Champerroux. Après avoir appartenu en 1441 au chevalier Regnaud de Balfame, la seigneurie de Champroux appartient, en 1503, à damoiselle  Ysabeau de Ternant, qui rend aveu à la duchesse  de Bourbon, en son nom et comme tutrisse de ses enfants, Jacques, Jehan, Marie, Françoise et Catherine, de sa maison et place forte de Champerroux ,  Cinq années plus tard, Jacques de Grassay fait réaliser l'inventaire de Champroux, contre messire Jehan de Baraton, en 1571 la forteresse est achetée par la famille Gadagne, banquiers italiens.\r\nPOUZY, à partir du XVIIIe siècle, le lieu n'est plus occupé que pas des fermiers.","architecture":"POUZY à l'origine du  XVe siècle, le vieux château se compose des restes de fortification ceinturant une motte sur laquelle se trouve l'ancienne chapelle, devenue église paroissiale, un bâtiment d'habitations et les communs. Le sommet de la butte est occupée dès l'époque romaine par la villa Posiacum. Le château-fort  et profondément remanié au XVe. C'est un bâtiment rectangulaire, comportant une tour d'escalier carrée à l'avant de la façade sud, et une grosse tour à base circulaire au nord-ouest. A l'intérieur, le corps de logis forme une seule pièce avec un plafond à la française, et deux cheminées, une de style gothique à l'ouest ; une du XVIIIe siècle à l'est. Les communs ont été édifiés au XVIIIe siècle, lors de la destruction des fortifications. Le bâtiment Est semble avoir conservé un reste de rôle défensif . Le bâtiment sud servait d'écurie et de garage  le bâtiment ouest d'habitat pour les domestiques.\r\nBeaumont, est une construction du XIXe siècle dans le style néo-classique. Le  corps de logis de plan rectangulaire, à deux niveaux et niveau de comble, est flanqué aux angles de 2 pavillons  en  retour d'équerre, de dimensions différentes. Les harpages de pierre, les cordons horizontaux, les lucarnes à  frontons et les toits élevés donnent un ensemble harmonieux.             Champroux, il reste des vestiges importants. La motte du château, haute d'une dizaine de mètres, de forme circulaire, était ceinte  d'une épaisse muraille  de blocs soigneusement assemblés. La motte de la basse-cour est séparée de la motte du donjon par un fossé, large d'une trentaine de mètres. Cette motte est elle-même précédée d'une levée de défense, l'ensemble était isolé dans l'ancien étang de Champroux.","habitants":"Famille de Beaumont                 Famille Gadagne\"","divers":"Château de Pouzy,  de Beaumont, de Champroux et de Pouzy à Pouzy-Mesangy","gps":"","images":["../../jctruffet.com/image/image_03/03_Pouzy_Mesangy_1.jpg","../../jctruffet.com/image/image_03/03_Pouzy_Mesangy_2.jpg","../../jctruffet.com/image/image_03/03_Pouzy_Mesangy_3.jpg","../../jctruffet.com/image/image_03/03_Pouzy_Mesangy_4.jpg","../../jctruffet.com/image/image_03/03_Pouzy_Mesangy_5.jpg","../../jctruffet.com/image/image_03/03_Pouzy_Mesangy_6.jpg","../../jctruffet.com/image/image_03/03_Pouzy_Mesangy_7.jpg"]},"Consult_chateau_formulaire5b4b":{"id":"Consult_chateau_formulaire5b4b","dept":"03","canton":"Montmarault","commune":"Sazeret","nom":"Prugnes","type":"Maison forte","periode":"XV","histoire":"Maisons fortes à Sazeret de la Prugnes  du XV-XVIe siècle et du Montais du XVIe siècle cantonné de tours.             PRUGNES, vers 1314, Robert de Clermont, fils de Louis IX, concède aux parents  de Pierre Micault, dit \"Pierre de Chappes\", soit Péronnelle et   Jean Micault, le mas des Prugnes en la paroisse de Sazeret. Pierre de Chappes, haut et puissant personnage, est connu sous le nom de cardinal des Prugnes. Après la famille des Chappes le manoir passe aux de Forest à la fin du XVIe siècle. En 1670, il est acquis par Denys Aumaistre possesseur de nombreux autres fiefs de la région de Montmarault. Il est vendu, en 1749, par de Saint-Mesmin  au fermier Claude Malley qui entreprend  une remise en état de cette vieille demeure. En 1860, il revient par mariage à la famille Pradon-Vallancy qui  en est encore propriétaire, transformé en domaine agricole par Jacques Hubert et Jeanie Pradon Vallancy. Cest dans ce lieu-dit, proche du bourg, que se dresse le château aujourdhui occupé par Jean-Pierre Haussmann.  MONTAIS Sazeret et Le Montais, ont dû, à l'origine, constituer le même système castral, de type  motte-basse-cour. Le fief de Sazeret était possédé, en 1446, par Blanche le Loup de Beauvoir, épouse de Jean d'Althon, damoiseau, seigneur de Bellenaves. Par la suite, il fut  la propriété des famille du Buysson et Boutet. En 1686, le sieur de la ville  possède en   justice le château, et  l'on y tient audience tous les 15 jours. Après les du Buysson, la famille Boutet conservera la seigneurie jusqu'en 1740. A cette époque le nouveau seigneur est  Jean-Baptiste des Bouis de   Villar, écuyer, président  trésorier de France, en la généralité de Moulins. Dix années plus tard, sa fille porte par son mariage le fief à Antoine Lenoir d'Espinasse. Leur fille transmet elle aussi la terre à son époux, Jacques-François Ferron de la Ferronaye.","architecture":"Prugnes, de plan rectangulaire, le manoir des Prugnes, ancienne maison forte, a conservé une seule des tours de son enceinte dont les douves ont été comblées. Une tour médiane, abritant un escalier à vis, a été démolie. Grâce à une restauration parfaite il a retrouvé ses fenêtres à meneaux datées de 1480 et ses belles lucarnes de toiture. Il est assis près d'un grand étang, dans un cadre bien bourbonnais. Aujourd'hui, douves et tours originelles n'existent plus. Plus habité noblement depuis le XVII e siècle, le château est aujourd'hui une résidence principale.          Montais, l'actuel château a perdu  tout caractère de son ancienne noblesse, linteaux sculptés  ou écus armoriés, pour ne devenir qu'une vaste exploitation agricole avec granges et étables disposées autour de la cour.","habitants":"Famille des Chappes                 Famille Boutet\"","divers":"Château de Prugnes et Montais à Sazeret","gps":"","images":["../../jctruffet.com/image/image_03/03_Prugnes_1.jpg","../../jctruffet.com/image/image_03/03_Prugnes_2.jpg","../../jctruffet.com/image/image_03/03_Prugnes_3.jpg"]},"Consult_chateau_formulairec235":{"id":"Consult_chateau_formulairec235","dept":"03","canton":"Montmarault","commune":"Bezenet","nom":"Puy_Chatonin","type":"Maison forte","periode":"XV","histoire":"PUY-CHATONIN, ce fief  est signalé en 1646. L'ancien château fait partie, à la fin  du XVIe siècle, des fiefs  des seigneurs de la Brosse  de Saint Bonnet de Four, puis passe à  Pierre Charles de Loyre, seigneur du Salis. En 1784 Jean Siramy achète à Messire François de Rolland le fief de   Puy Châtonin, comprenant château, domaine. Des fiefs  des seigneurs de la Brosse  de Saint-Bonnet de Four, puis passe à  Pierre Charles de Loyre, seigneur du Salis.","architecture":"Puy Chatonin,   reste d'une  maison de fermier avec deux tours, dénommée le château, ainsi qu'une tour ruinée dans le jardin, reste possible d'une enceinte.","habitants":"Famille de Pierre Charles de Loyre\"","divers":"Château du Puy-Chatonin à Bezenet","gps":"","images":["../../jctruffet.com/image/image_03/03_Puy_Chatonin_1.jpg","../../jctruffet.com/image/image_03/03_Puy_Chatonin_2.jpg"]},"Consult_chateau_formulaired523":{"id":"Consult_chateau_formulaired523","dept":"03","canton":"Montmarault","commune":"Vernusse","nom":"Puy_Guillon","type":"Château","periode":"XII-XIX","histoire":"PUY-GUILLON, du XII-XIXe siècle, le fief de Puy Guillon tel un immortel guerrier, fier de son passé, la citadelle, vieille de sept siècles, solidement  implantée sur son \"podium\" comme lécrivaient les Romains, a vaillamment traversé lhistoire. la  famille de Beaucaire prend possession du château  dès 1398. Certains de ses membres sont devenus célèbres. François de Beaucaire fut évêque de Metz puis nommé cardinal en 1545, au moment du concile de Trente,  dont il  fut le rapporteur.  Jean de Beaucaire,  le troisième du nom,  dont la pierre tombale est  déposée dans léglise, fut chevalier de lordre du Roi, premier maître dhôtel de la reine dEcosse. Marie de Beaucaire, dame dhonneur de la  dauphine,  se maria en deuxième noce avant 1563  à Sébastien de Luxembourg,  duc de Penthièvre, ce qui fait delle une ancêtre de Louis XV et de plusieurs famille royales européennes.   Par les femmes, le château passa ensuite à la famille dAlègre puis à la famille de Rollat jusquen 1832.","architecture":"Le château de Puyguillon fut érigé au XVe siècle sur un terre-plein constituant  la terrasse et se composait d'un gros donjon carré défendu par une courtine de forme quadrangulaire, flanquée d'une grosse tour ronde et, à l'ouest en contrebas, par une basse-cour entourée d'une enceinte. Au XVIIe siècle, une nouvelle bâtisse fut construite longeant l'enceinte supérieure. Son édification face aux jardins ordonnancés et récemment aménagés côté sud offrait ainsi un lieu de vie plus appréciable. Au XVIIe et XVIIIe siècles, des communs firent également leur apparition le long de la basse-cour. Vers 1870, de nouveaux bâtiments furent construits dans le but de rallier les différents corps de logis. Ainsi, les communs formaient désormais un front continu. Cet élément fut édifié en prenant modèle sur le bâtiment XVIIe siècle. Enfin, un petit corps de bâtiment prolongeait cette nouvelle aile jusqu'au donjon et se distinguait sur le plan architectural par des références médiévales, notamment avec ses baies cintrées et sa tour d'escalier crénelée.","habitants":"Famille de Beaucaire \"","divers":"Château de Puy-Guillon à Vernusse","gps":"","images":["../../jctruffet.com/image/image_03/03_Puy_Guillon_1.jpg","../../jctruffet.com/image/image_03/03_Puy_Guillon_2.jpg","../../jctruffet.com/image/image_03/03_Puy_Guillon_3.jpg","../../jctruffet.com/image/image_03/03_Puy_Guillon_4.jpg","../../jctruffet.com/image/image_03/03_Puy_Guillon_5.jpg"]},"Consult_chateau_formulaire5b7a":{"id":"Consult_chateau_formulaire5b7a","dept":"03","canton":"Cusset","commune":"Abrest","nom":"Quinssat","type":"Maison forte","periode":"XIV","histoire":"QUINSSAT, en 1243, le fief  appartenait à une famille qui en avait pris le nom. En 1354, ce sont deux frères de la famille de Vichy, Oudin et Dalmas, qui en sont  les coseigneurs, alors qu'au milieu du XVe siècle, c'est   Jean de Boucé qui, à l'occasion de son mariage  avec Péronnelle de l'Espinasse, reçoit la terre et seigneurie   de Quinssat. Vendu en 1495, à Guichard d'Albon Saint-André, Quinssat resta dans cette famille jusqu'au  milieu du XVIIe siècle. Après avoir appartenu à la famille d'écuyers de la Richardie aussi seigneurs du Vernet,   la terre de Quinssat fut acquise en 1717 par le vicomte de Chalmazel, Louis de Talaru, seigneur du Chaussin et brigadier des armées du roi et sera réunie à la terre des Chaussin. Confisquée à son fils sous la Révolution, la terre fut vendue comme bien national en 1792.","architecture":"Quinssat, il reste de cette maison forte  du XIVe siècle une belle tour carrée à trois niveaux, qui flanque un corps   de bâtiment ou quelques restaurations du XVIe siècle sont apparentes, en particulier par de grandes baies à meneaux. La maison est modeste, formée d'un corps principal  à deux niveaux et niveau de comble, épaulé par deux tours carrées inégales en retour d'angle. D'importantes transformations y ont été apportées par les Talaru Chalmazel, au cours du XVIIIe siècle.","habitants":"Famille de Vichy\"","divers":"Château de Quinssat à Abrest","gps":"","images":["../../jctruffet.com/image/image_03/03_Quinssat_1.jpg","../../jctruffet.com/image/image_03/03_Quinssat_2.jpg","../../jctruffet.com/image/image_03/03_Quinssat_3.jpg"]},"Consult_chateau_formulaire7d2a":{"id":"Consult_chateau_formulaire7d2a","dept":"03","canton":"Gannat","commune":"Poézat","nom":"Raynand_Poezat","type":"Château","periode":"XV","histoire":"RAYNAND,la famille Raynaud  semble avoir, dès l'origine, possédé la seigneurie de Raynand et  l'avoir conservée  jusqu'au XVIe siècle. Les Raynaud  sont  dans la région dès 1351 et l'aveu que fait en 1503 à la duchesse de Bourbon, Isabeau Aysbépine de sa Mothe de Regnant, a dû être fait au nom d'une veuve d'un membre de la famille Raynaud. Avant la  Révolution, Raynand était la propriété d'une famille Filhastre qui portait le titre de sieur de Raynand.  Aujourd'hui, l'ancienne maison forte et une partie des terres appartiennent à la famille Faure. Transformé aujourd'hui en chambres d'hôtes.","architecture":"Cette maison forte de Raynand du XVe siècle avait une enceinte, protégée par fossés et pont-levis, enfermant une vaste   cour carrée. Le bâtiment principal est construit sur le mur nord, avec une aile en retour d'équerre sur le mur Est.    Une grosse tour ronde, crénelée et percée de meurtrières, était accolée à l'angle nord-est. Aujourd'hui à moitié rasée, elle est recouverte  d'un toit à une seule pente, incliné côté cour. Le corps de logis à un niveau surélevé    sur caves et  niveau de comble, était agrémenté  d'une galerie à auvent, côté cour. Dans  cette construction un  peu massive, le XVIe siècle a apporté quelques aménagements, par de larges baies à meneaux et une belle cheminée monumentale, dans la salle principale. L'accès de la cour est commandé par un pigeonnier-porche  de plan carré, recouvert  d'un toit en pavillon surmonté d'un lanternon.  Au XIXe siècle, un nouveau château  est installé, à proximité de la maison forte, dans un joli parc ombragé. Il est composé   d'un bâtiment central à deux niveaux et niveau de comble, orné d'un avant-corps en forme de tour carrée de  trois niveaux et lucarne sur un toit en pavillon élancé avec paratonnerre et frise, l'aile accolée à l'est en retour d'équerre et couverte d'un toit élancé, est flanquée d'une petite tourelle en poivrière, à culot mouluré et toit conique en flèche.","habitants":"Famille Raynaud\"","divers":"Château de Poézat","gps":"","images":["../../jctruffet.com/image/image_03/03_Raynand_Poezat_1.jpg","../../jctruffet.com/image/image_03/03_Raynand_Poezat_2.jpg"]},"Consult_chateau_formulaire4444":{"id":"Consult_chateau_formulaire4444","dept":"03","canton":"Yzeure","commune":"Villeneuve-sur-Allier","nom":"Riau","type":"Château","periode":"XV","histoire":"RIAU,le premier seigneur connu du Riau  et de la famille de Ryaul. en 1300 Pierre de Puychevalin, damoiseau. Après les  Breschard et les  Guyot de la Périne était  seigneur , en 1435 ; il avait épousé Marguerite de Blasson qui, veuve en  1444, en rendit hommage pour ses deux enfants Jean et Jeanne.  Le 22 juin 1476 Charles Popillon, argentier du duc  Jean II, s'en porta acquéreur.  En 1487, il était seigneur du Riau et de Paray le Frésil. Le duc Pierre II octroya aux Popillon les droits de haute,   moyenne et basse justice sur leurs terres du Riau.  La famille y resta jusqu'à la fin du XVIIe siècle.  En 1675, François, baron du Riau, se faisait appeler de Popillon  en 1698 Jean Charles de Popillon cède le domaine à sa tante Paule de Cherizy qui le  revend à Marie Guillaud de la Motte veuve d'Antoine de Charry des Gouttes le domaine  rentre dans cette famille  qui le garderont jusqu'en 1800, puis les Boigues de Decize.  Dès 1826 , M. René Le Roy de Chavigny préfet de l'Allier l'acquit,le château se transmet à son fils  Charles lieutenant colonel, pendant la guerre de 1870 le lègue à son décès à son épouse  née Augustine Gaillard de Senislhac qui se remarie à M.Behaguel sans postérité qui trasmet le domaine au baron Henry Durye,fils de Marie Matilde le Roy de Chavigny, le château appartient toujours à la famille Durye.","architecture":"Riau au XVe siècle  vieille maison forte transformé  en un petit château fortifié entouré de douves. Les bâtiments représentent tous les types civils et militaires d'architecture Bourbonnaise qu'il était possible d'édifier pour créer un petit château fort défendant le nord du Bourbonnais, et, en même temps, chef lieu d'exploitation agricole toujours conservé, construite sur une motte carrée d'environ 25 mètres de large, dont le château actuel occupe encore l'emplacement avec ses communs des XVIe et XVIIe siècles, son pigeonnier et sa tour d'entrée du XVe siècle, percés de fenêtres à meneaux, coiffé d'ardoise, est tout entier entouré de douves;  seule en dehors de l'enceinte se dresse la grange aux dîmes, une des plus curieuses de France, bâtie en colombages de bois et en briques polychromes par Nicolas Roger qui a signé son uvre comme charpentier en 1584.","habitants":"Famille de Jean Charles de Popillon \"","divers":"Château de Riau à Villeneuve sur Allier","gps":"","images":["../../jctruffet.com/image/image_03/03_Riau_1.jpg","../../jctruffet.com/image/image_03/03_Riau_2.jpg","../../jctruffet.com/image/image_03/03_Riau_3.jpg","../../jctruffet.com/image/image_03/03_Riau_4.jpg","../../jctruffet.com/image/image_03/03_Riau_5.jpg"]},"Consult_chateau_formulaire0056":{"id":"Consult_chateau_formulaire0056","dept":"03","canton":"Escurolles","commune":"Cognat-Lyonne","nom":"Rilhat","type":"Maison forte","periode":"XV","histoire":"Deux châteaux à Cognat-Lyonne;  de Rilhat du XV-XVIIIe siècle avec tour et de Lyonne du XVIIIe siècle.\r\nLYONNE,  construit par Robert de Lyonne, maison seigneuriale ou hôtel, reconstruite par Reclesne en 1569 - 1570, après son incendie en 1568 lors de  la bataille de Cognat, probablement agrandie aux XVIIe et XVIIIe siècles, aujourd'hui hôtel restaurant.\r\nRILHAT, pas d'information historique, aujourd'hui hôtel restaurant.","architecture":"Rilhat du  XVe siècle, manoir de plan classique pour la région, avec un corps de logis rectangulaire flanqué au sud de deux tours rondes. Une tour carrée s'élève devant la façade nord, seul reste des défenses du château, une autre tour en vis-à-vis s'étant écroulée au début du XXe siècle. Ces deux tours carrées devaient fermer et défendre la cour et la porte d'entrée, qui était surmontée de mâchicoulis et défendue par quatre canardières. A l'extérieur, une ancienne tour carrée appartenant à l'enceinte défensive, a été transformée en pigeonnier. Ce château est le seul édifice d'aspect fortifié restant dans ce secteur où se déroula en 1568 la bataille de Cognat-Lyonne entre catholiques et protestants, qui ravagea la région. Lors de la bataille de Cognat en 1568, il subit des déprédations qui entraînèrent des remaniements.\r\nLyonne, maison seigneuriale agrandie aux XVIIe et XVIIIe siècles, figure un plan en U  avec le château et deux importants bâtiments de communs, en 1846 restauration du château, façades en décor Renaissance, les toitures refaites, construction de la serre  et de la chapelle avec remploi de statues provenant du château de Vendat et d'une ferme modèle autour d'une cour parallèle à la cour d'honneur du château, après  la vente en 1976, dégradation de l'ensemble.","habitants":"Famille de Robert de Lyonne\"","divers":"Château de Rilhat et de Lyonne à Cognat-Lyonne.","gps":"","images":["../../jctruffet.com/image/image_03/03_Rilhat_1.jpg","../../jctruffet.com/image/image_03/03_Rilhat_2.jpg","../../jctruffet.com/image/image_03/03_Rilhat_3.jpg","../../jctruffet.com/image/image_03/03_Rilhat_4.jpg"]},"Consult_chateau_formulaire7c23":{"id":"Consult_chateau_formulaire7c23","dept":"03","canton":"Souvigny","commune":"Autry-Issards","nom":"Rimazoir","type":"Château","periode":"XVII-XIX","histoire":"RIMAZOIR, et  Le Plessis appartenait sans doute  aux seigneurs d'Issards, les de Laye, et échut à la famille de Murat par mariage. Dans la seconde moitié du XVe siècle, leurs descendants  prirent le nom du fief, en 1497 Jean Nicolas du Plessis fut autorisé par le duc Pierre II à faire fortifier sa maison  ainsi qu'à y faire construire un colombier. Disposer d'un colombier est donc symbole de notoriété à la fin du XVe siècle. Vers 1520, il appartenait à un forézien venu faire une carrière au service du duc, Jacques Tavard,   lieutenant général  du baillage de Forez à Montbrison, maître des requètes  en l'hôtel du duc de Bourbon, était devenu  à cette époque, lieutenant  de la châtellenie de Chantelle. Jean Aubery, voulant asseoir sa position sociale par l'achat d'une  demeure noble, qui en devint propriétaire. Jean d'Aubery, qui hérita du château, fut médecin du roi. A sa mort, en 1625, un inventaire disait assez la splendeur du château. A la Révolution, l'occupant était un avocat au présidial de Moulins, François Lomet, déjà seigneur du Lys à Bressolles et député  à l'Assemblée Constituante. Mais il fut taxé de lourdes contributions volontaires , accusé d'incivisme et arrêté en 1793. Le Plessis fut mis sous séquestre; François Lomet échappa  à la guillotine et fut libéré à la mort de Robespierre. Ses mésaventures ne l'avaient pas dégouté des affaires publiques; il se présenta et fut élu conseiller général  de l'Allier, tout comme son fils Claude, aussi avocat et qui obtint des lettres d'anoblissement en 1815. La famille garda le Plessis  jusqu'à la fin du siècle. En 1890, Le Plessis devint la propriété du docteur Petit. Sa descendance habite toujours le château.","architecture":"Le château de Rimazoir du XVIIe siècle, a tous les attributs  d'une véritable forteresse, avec son donjon  aux murs épais, percé de nombreuses\r\n meurtrières, des mâchicoulis  pour défendre l'entrée et de fines et longues tourelles qui renforcent les angles de la tour-escalier et du corps principal du bâtiment à deux niveaux et attiques.","habitants":"Famille de Jean d'Aubery\"","divers":"Château de Rimazoir à Autry -Issards","gps":"","images":["../../jctruffet.com/image/image_03/03_Rimazoir_1.jpg","../../jctruffet.com/image/image_03/03_Rimazoir_2.jpg","../../jctruffet.com/image/image_03/03_Rimazoir_3.jpg"]},"Consult_chateau_formulaireff3b":{"id":"Consult_chateau_formulaireff3b","dept":"03","canton":"Mayet-de-Montagne","commune":"Mayet-de-Montagne","nom":"Roche_Mayet","type":"Manoir","periode":"XV","histoire":"ROCHE, le  château actuel est de construction récente, mais  réutilisé pour un site où était installée une maison forte de la seigneurie. En 1488, une représentante de la famille de la Roche s'allie à la famille Chantelot. En août 1587 Gilbert de Chantelot, écuyer, qui est seigneur de la Roche, en la paroisse du  Mayet-de-Montagne. En 1616, Toussaint Chantelot  et Marguerite Gacon, sa femme achètent  la terre de Gléné  d'Ande et la réunissent à celle de La Roche. En 1730, La Roche fut vendue au marquis de Saulx Tavannes et fut le château de St-Didier en donjon alors incorporée à la baronnie de Montgilbert et à la seigneurie du Mayet, pour ne plus en être séparée.","architecture":"Le château de la Roche du XVe siècle, corps de logis rectangulaire à deux niveaux accolée en façade de deux tours rondes enfermant un avant-corps.","habitants":"Famille de la Roche \"","divers":"Château de la Roche à Mayet en Montagne","gps":"","images":["../../jctruffet.com/image/image_03/03_Roche_Mayet_1.jpg","../../jctruffet.com/image/image_03/03_Roche_Mayet_2.jpg","../../jctruffet.com/image/image_03/03_Roche_Mayet_3.jpg"]},"Consult_chateau_formulaired501":{"id":"Consult_chateau_formulaired501","dept":"03","canton":"Gannat","commune":"St-Bonnet-de-Rochefort","nom":"Rochefort_Allier","type":"Forteresse","periode":"XII-XV","histoire":"ROCHEFORT,  les seigneurs successifs depuis Archambaud VI dit le Grand jusqu'à Jean, bâtard  de Bourbon mort en 1375, en passant par Mahaut de Bourbon, Guy de Dampierre, Agnès  de Bourbon Dampierre épouse en première noce Jean de Bourgogne et en seconde noce Robert de France comte d'Artois, leur fille Béatrice de Bourbon Dampierre marié à Robert de France, comte de Clermont sixième fils de Saint-Louis, leur fils les ducs Louis Ier et Pierre Ier. Le château resta dans cette famille jusqu'en 1401, il fut donné par Louis II  à François  d'Auberchicourt, sans héritier en 1455 le château rentra dans le domaine ducal  et fut concédé à divers membres de la branche des Bourbon-Carency  avant de faire retour au connétable de Bourbon  et échut au aux Beaujeu , puis aux d' Escars, les Apchon, les Girard et les Rouvignac, Jeanne de Rouvignac  l'apporte par alliance en 1632 à Jean de Ligondès, ancêtre des propriétaires  actuels le comte de Ligondès.                                 Dans la commune la maison forte de Montgrond.","architecture":"Rochefort, du  XIIe siècle remanié XVe siècle ; XVIIIe siècle ; XIXe siècle   Les restaurations de cette époque,  concernent la surélévation de la courtine ouest pour cacher des toitures et un crénelage dans le style du XVe siècle. Le château s'ouvre par l'ancienne basse-cour, limitée au nord par les communs, à l'est par un haut mur sur lequel s'adossent les restes d'une chapelle  ainsi qu'une tour à chaque extrémité reliées par de solides courtines. A l'ouest, la cour s'étrangle pour former la cour d'honneur du château, limitée, à l'ouest et au sud, par des bâtiments formant l'ensemble des pièces dites de réception. Ces pièces sont décorées d'une cheminée Louis XIII, de tapisseries d'Aubusson du XVIIe siècle et de peintures de la même époque. L'ensemble des murs et des bâtiments est flanqué de quatre tours. Au sud, sur les fondations du XIIe siècle, une terrasse domine les rives de la Sioule.","habitants":"Les ducs de Bourbons\"","divers":"Château de Rochefort et de à St-Bonnet de Rochefort.","gps":"","images":["../../jctruffet.com/image/image_03/03_Rochefort_Allier_1.jpg","../../jctruffet.com/image/image_03/03_Rochefort_Allier_2.jpg","../../jctruffet.com/image/image_03/03_Rochefort_Allier_3.jpg","../../jctruffet.com/image/image_03/03_Rochefort_Allier_4.jpg","../../jctruffet.com/image/image_03/03_Rochefort_Allier_5.jpg","../../jctruffet.com/image/image_03/03_Rochefort_Allier_6.jpg"]},"Consult_chateau_formulaire1529":{"id":"Consult_chateau_formulaire1529","dept":"03","canton":"Montet","commune":"Rocles","nom":"Rocles","type":"Château","periode":"XV-XVII","histoire":"Trois  châteaux à Rocles, de la Busserie du XVIIe siècle, de Franchesse et de la Lande du XVe avec douves.           LANDE  du  XIVe siècle, dépendait de la châtellenie de Murat. Jean Béraud, écuyer, seigneur de Givry, fils d'un autre Jean Béraud, damoiseau, qui rend aveu en 1357 et 1367 pour différents fiefs du Bourbonnais, comprend dans ses dénombrements  Marguerite de Neuville. La Lande appartenait en 1484 à Jean de Givry écuyer. Il passa par alliance dans la maison de la Souche.  En décembre 1538, Anne de la Souche, épouse Jean d'Aubigny. Vers 1645-1650, Jacques de Dreuille était qualifié de seigneur de La Lande. En 1754, La Lande relevait toujours de la châtellenie de Murat et fut apportée par mariage aux vicomtes de Lichy. En 1775, François fils de Gilbert de Dreuille écuyer, en rendit hommage, en même temps que de la seigneurie de Franchesse, dans la châtellenie de Murat. François-Senneterre de Dreuille, écuyer, époux de Perrette de La Barre, était reconnu comme seigneur de La Lande. \r\nBUSSERIE,  la Busserie appartient à la famille Thonier, depuis qu'un  de leurs ancêtres, Gilbert Thonier, maître clerc de La châtellenie de Murat et  fermier de la seigneurerie du Montet en fit l'acquisition en 1595.            FRANCHESSE, le dénombrement des fiefs de 1503 fait mention de deux aveux à la duchesse de Boubon, concernant Franchesse, dans la châtellenie de Murat. D'une part, Etienne Loyau, seigneur de Franchesse. D'autre part, Jehan de Franchesse, écuyer, et son frère, messire  Gilbert de Franchesse, ce qui est  peu probable.  Au cours du XVIIe siècle, le château de Franchesse appartenait aux de Breuil, dans le bourg proche de Cressanges, avant la période révolutionnaire, on distingue deux seigneuries, celle de la Condemine dont subsiste encore le château et celle qui avait pour siège le château de Saragousse où ont résidé la famille Saint-Aubin, puis la famille de Chabannes et enfin celle de Villaine.","architecture":"Lande, du  XVe siècle,  donjon couronné d'un chemin de ronde en pans de bois sur encorbellement, la Lande apparaît comme un élément intéressant d'une série de châteaux médiévaux bourbonnais du XVe siècle. Présence de douves et d'une tour plus ancienne aux dispositifs de défense.  On dit que la Lande aurait été une ancienne commanderie de Templiers et il est possible que, sous Louis XI, elle ait pu servir de prison d'état. De par son aspect, ses douves (aujourd'hui asséchées), son chemin de ronde, l'épaisseur de ses murs et son architecture puissante et austère, cette construction féodale prend assurément l'allure d'une maison forte. Mais, la particularité du donjon  tient à la présence d'une galerie de bois en croix de Saint-André qui le couronne, reposant sur une série de corbeaux et rappelant l'existence d'anciens hourds. (Le corbeau de l'angle ouest est chargé d'un écu aux armes des Bourbons). Le toit en pavillon accuse une forte pente.           Busserie Gentilhommière à deux niveaux  flanquée aux extrémités d'une tour ronde et d'une tour carrée,  du premier château, il ne reste que l'appellation et un pigeonnier de plan carré, surmonté d'un lanternon. La demeure actuelle a pris l'allure d'une gentilhommière quadrangulaire, ou des communs du XIXe siècle servent à l'exploitation rurale. Franchesse,  est aujourd'hui une belle maison forte qui a perdu son allure de château, bien qu'elle en  garde l'appellation. La population de cette époque était regroupé soit en communautés paysannes, soit en familles traditionnelles. Au XIXe et XXe siècle fut extrait du sous-sol de cette commune le charbon, la dernière mine devant être exploitée jusqu'en 2001.","habitants":"Famille de Jean de Givry               Famille Thonier\"","divers":"Château  des Landes , de Busserie et de Franchesse à Rocles","gps":"","images":["../../jctruffet.com/image/image_03/03_Rocles_1.jpg","../../jctruffet.com/image/image_03/03_Rocles_2.jpg","../../jctruffet.com/image/image_03/03_Rocles_3.jpg","../../jctruffet.com/image/image_03/03_Rocles_4.jpg"]},"Consult_chateau_formulairea261":{"id":"Consult_chateau_formulairea261","dept":"03","canton":"Huriel","commune":"St-Sauvier","nom":"Romagere","type":"Château","periode":"XV","histoire":"ROMAGERE, appartenait au début du XVe siècle, à Juihaume des Aiges, seigneur de  Frontenat, et originaire  des Aiges d'Archignat. Dès le XVIIe siècle, la Romagère fut la propriété de la famille le  Groing, de la Motte au Groing de Viersat. Les le Groing restaurent et embellissent la Romagère, remplaçant le manoir féodal, siège d'une seigneurie justicière, par un château plus confortable. Dans cette construction en équerre, on remarque  la tour d'angle tronquée, ainsi que  le porche du XVIe siècle. C'est dans les bois  de la Romagère que, d'après la tradition, fut exterminée une bande de routiers, en 1183,  les Paillards qui ravageaient le pays.","architecture":"Romagère, dans cette construction en équerre, on remarque  la tour d'angle tronquée, ainsi que  le porche du XVIe siècle.","habitants":"Famille le  Groing\"","divers":"Château de Romagère à st-Sauvier","gps":"","images":["../../jctruffet.com/image/image_03/03_Romagere_1.jpg","../../jctruffet.com/image/image_03/03_Romagere_2.jpg"]},"Consult_chateau_formulaire3f09":{"id":"Consult_chateau_formulaire3f09","dept":"03","canton":"Marcillat-en-Combraille","commune":"Ronnet","nom":"Ronnet","type":"Château","periode":"XIII-XIV","histoire":"Deux châteaux à Ronnet, dont celui de Ronnet et Frétaise.                   FRETAISE, était autrefois un grand et fort château. La famille des Forges fait hommage en 1444, de son hostel de Fréteze et ses dépendances. Aussi, en 1503,   l'écuyer Jehan des Forges  qui reconnait tenir en fief  de la duchesse de Bourbon, sa maison, lieu et  domaine de Froteize, avec garennes, plus la maison et domaine. Vers l'an 1600, Jean de Chaslus, écuyer, s'intitule seigneur de La Brosse, de  Ronnet et  de Frétaise. En 1820, Frétaise n'est plus  qu'un vieux château ruiné, avec ses tours, ses écuries, sa boulangerie, le tout enfermé par une cour entourée de fossés, comme bien des châteaux féodaux, il est passé du rang de forteresse à celui d'habitat, puis d'exploitation agricole. Aujourd'hui  en ruines.                                   RONNET,  c'est un des fils d'Archambaud le Grand (VII) l'ecclésiastique Guy de Bourbon,  doyen de Rouen qui, à sa mort, en 1266, lègue à ses neveux, ducs de Bourbon, son fief de Ronnet. Aussi, en  1359, le duc peut autoriser Goussaut de Toury à acheter à  Jehan de Repenti, un manoir appelé Ronnet, en la chastellenie d'Hérisson, appartient depuis longtemps à la famille de Féligonde.  Bien conservée et a été restaurée par M. Louis Laville.","architecture":"Frétaize était autrefois un grand et fort château fossoyé, qui fut remanié aux XIVe et XVe siècles. Avec son donjon imposant  et ses deux grosses tours, quoique en ruines, cette forteresse médiévale  fait encore impression. On remarquait encore, il y a peu, une fenêtre à meneaux, un escalier tournant et une cheminée monumentale de la Renaissance  qui a été vendue. Le château est assis sur une terrasse  à mi-pente de la colline, dominant une vallée transformée en étang. Ronnet, la Tour Bourbon de Ronnet est le donjon d'une forteresse sur motte du début du XIIIe siècle. La motte  est située sur un éperon barré, aux extrêmes limites du Bourbonnais de l'époque. Si l'enceinte, ses tours et ses fossés ont disparu, en revanche, la tour, haute initialement de 100 pieds. Le château de Ronnet  était inclus dans une organisation défensive.  Il est aussi près du bourg  une gentilhommière du XVIIe siècle, logis auquel est accolée une tour ronde d'angle, avec un petit bâtiment à tour ronde également et toit tronqué. Le château donne sur  une terrasse et un beau parc.","habitants":"Famille des Forges                        Famille de Féligonde\"","divers":"Château de Frétaize et Ronnet à Ronnet","gps":"","images":["../../jctruffet.com/image/image_03/03_Ronnet_1.jpg","../../jctruffet.com/image/image_03/03_Ronnet_2.jpg"]},"Consult_chateau_formulaireda08":{"id":"Consult_chateau_formulaireda08","dept":"03","canton":"Souvigny","commune":"Agonges","nom":"Sacrots","type":"Château","periode":"XVII","histoire":"SACROTS, gentilhommière avec deux tourelles d'angle, bâtie au XVIIe siècle  par un  membre de la famille Guillouet. Claude Guillouet s'intitulait en 1661 sieur des Sacrots. Un fermier s'occupait du domaine  en 1658, sans doute simple exploitation agricole. Jean était qualifié en 1670 de sieur d'Orvilliers et des Sacrots. Le 9 septembre 1674 se déroulèrent à Agonges les cérémonies du baptême de Claude, né le 11  juin 1668, en l'Île de St-Christophe, où Rémy Guillouet son père  avait été appelé. Lors du mariage de sa fille   avec Antoine Gaudon, fils de Pierre, seigneur de Louis, gentilhomme ordinaire de la maison du roi, il pouvait   se prévaloir d'un titre d'écuyer, et de ses charges de lieutenant général pour le roi à Cayenne et de capitaine au  régiment de la marine. Claude Guillouet suivit la voie  ouverte par son père. D'abord lieutenant de vaisseau, il devint capitaine de frégate  et gouverneur de Cayenne. Les Sacrots avaient dû échoir  à un de ses frères ou à   une de ses surs,  en janvier 1758 la fille d'Élisabeth Geneviève Guillouet d'Orvilliers et du seigneur de Laugère  orpheline de père et de mère, qui demeurait au château d'Orvilliers, se maria dans la chapelle des Sacrots. La tradition de servir  dans la marine fut reprise par Louis, chevalier, et  seigneur du château Chesnel, parrain en   1761, d'une des filles de Paul Guillouet d'Orvilliers, chevalier et seigneur des Sacrots.","architecture":"Château de Sacrots du XVIIe siècle, constitué d'un logis flanqué de deux tours carrées à lanternon et percé de baies régulières à bossages vermiculés. Avec ses dépendances agricoles, il s'inscrit dans un enclos fermé par un portail monumental avec deux pavillons d'entrées.","habitants":"Famille Guillouet d'Orvilliers\"","divers":"Château de Sacrots à Agonges","gps":"","images":["../../jctruffet.com/image/image_03/03_Sacrots_1.jpg"]},"Consult_chateau_formulaire55b3":{"id":"Consult_chateau_formulaire55b3","dept":"03","canton":"Dompierre","commune":"Saligny-sur-Roudon","nom":"Saligny","type":"Château","periode":"XV-XIX","histoire":"Deux châteaux à Saligny du XIXe siècle et la Varennes du XVe siècle deux tours.  SALIGNY, est un ancien fief qui paraît avoir appartenu à une famille éponyme, aux Lourdin de Saligny. Au XIIIe siècle  passe à la famille de Chatelperron,  leur héritière épousa Hugues de Chastel seigneur de Randan, que l'on voit en 1249 recueillir l'hommage lige d'Archambaud du Tremblay sur \"une dîme et un cens\" à la mesure de Dompierre, et leur petit-fils, Jean, prit le surnom de Lourdin dont une fille Catherine épousa  en 1437  Guillaume de Coligny.  Les seigneurs de Coligny-Saligny étaient  seigneurs de La Motte Saint-Jean, en Bourgogne. En 1503, c'est l'écuyer Lourdin de Saligny, qui fait aveu à la duchesse de Bourbon de son chastel le Salligny, Marc Lourdin de Coligny-Saligny, né en 1524, fut responsable d'une partie des travaux d'agrandissement  de la forteresse médiévale. En 1604 Gaspard II époux de Jacqueline de Montmorin Saint-Hérem ont contribué aux amènagements du corps de logis. En 1665 Elisabeth épousa  un palatin de Dyo de Montpéroux, l'une des fille Marie-Elisabeth fut mariée en 1701 à Louis Antoine de Damas  comte d'Anlezy. Le château demeura dans la famille jusqu'en 1756, date à laquelle  il fut vendu à Jean Pâris de Montmartel, mais n'y résida pas, son fils le marquis de Brunoy passa ensuite  à  des cousins  Micault de Courbeton qui le vendirent à monsieur de Veyrac, ensuite à monsieur de Saint-Georges,  puis en 1834  dans la famille Collas ancêtres des propriétaires actuels aux  d'Huriel de Bartillat.      VARENNES, pas d'information historique.","architecture":"Saligny, comporte un donjon du XIVe siècle, un corps de logis du XVe surmonté de lucarnes Renaissance (1566) lui-même flanqué d'une tour  et d'une tourelle d'escalier  et d'adjonctions du début  du XVIIe siècle. Le château est entouré de douves. La façade sur cour résulte  d'un élargissement du début  du XVIIe siècle,  en avant de la façade gothique,  les baies sont encore visibles  à l'intérieur. Le pavillon  d'entrée conserve les passages  des bras du pont-levis, et est suivi à l'est par un logis du XVIIe siècle. Au nord, prolongeant le corps de logis principal,  se situe le bâtiment des communs datant  de 1604. Les couronnements de la tour sud ouest et de la tourelle d'escalier sur cour ont été modifiés à l'époque moderne.\r\nVARENNES, ce manoir de la Renaissance, entouré de larges douves, présente deux tours d'angle, un gros donjon à mâchicoulis du XVe siècle, réparé en 1604,  de nombreuses dépendances ainsi qu'un pigeonnier témoignent la demeure d'un gentilhomme, campagnard vivant sur ces terres en chassant le cerf ou le loup dans les bois des  voisins.","habitants":"Famille de Chatelperron\"","divers":"Château de Jaligny et de Varennes à Jaligny sur Roudon","gps":"","images":["../../jctruffet.com/image/image_03/03_Saligny_1.jpg","../../jctruffet.com/image/image_03/03_Saligny_2.jpg","../../jctruffet.com/image/image_03/03_Saligny_3.jpg","../../jctruffet.com/image/image_03/03_Saligny_4.jpg","../../jctruffet.com/image/image_03/03_Saligny_5.jpg","../../jctruffet.com/image/image_03/03_Saligny_6.jpg","../../jctruffet.com/image/image_03/03_Saligny_7.jpg","../../jctruffet.com/image/image_03/03_Saligny_8.jpg","../../jctruffet.com/image/image_03/03_Saligny_9.jpg"]},"Consult_chateau_formulairef035-2":{"id":"Consult_chateau_formulairef035-2","dept":"03","canton":"Varennes-sur-Allier","commune":"Sanssat","nom":"Sanssat","type":"Château","periode":"XIII-XVII","histoire":"deux châteaux à Sanssat dont celui de St-Alyre et de Theillat.         St-ALYRE, occupe l'emplacement de l'ancien château de Jarry dont Gui des Brosses rend aveu en 1300. sculpté aux armes des Desmaroux de Gaulmin.  Le château est occupé aujourd'hui par un institut médico-professionnel.  THEILLAT,  longtemps resté à l'abandon, le château de Theillat  a été acheté aux enchères en février 2011 par une SCI dirigée par Bruno Thevenoux. La riche décoration et l'ameublement superbe renforçaient l'impression de luxe qui se dégageait de l'ensemble, pour témoigner aux visiteurs de la prospérité de son propriétaire. En 1960, le château fut vendu par les héritiers de la famille Noailly et devint un établissement pour enfants handicapés. Puis cette activité cessa et, plus récemment, le château est devenu un hôtel de luxe, avec piscine de plein air ouverte sur le parc splendide, hélas désormais fermé. Lors de la vente du château, les tableaux qui ornaient les murs furent laissés en place et quittèrent donc aussi les possessions familiales. C'est ainsi que le portrait d'Ernest Noailly, le fondateur, se perdit. Il reste à le retrouver pour connaitre le visage de l'homme qui transforma tant ce lieu.","architecture":"St-Alyre,  l'édifice médiéval construit à la fin du XVe siècle fut très restauré au XVIIIe siècle, Il est accosté à  un  pavillon plus étroit  qui assure la transition  avec le vieux logis, et que flanque, sur la façade principale, une tour d'escalier ronde percée d'une porte  puis à nouveau remanié à la fin  du XIXe siècle. C'est un corps de logis rectangulaire  à un étage, flanqué d'une tour circulaire  sur la façade postérieure et sur l'autre face, d'une tour d'escalier percée d'une petite porte surmontée d'un écusson aux armes de Chouvigny, et au dessus duquel font toujours saillie les trois corbeaux d'une ancienne bretèche. Le bâtiment  du XIXe siècle, de style  néo-gothique, comporte un gros pavillon  à trois niveaux plus combles. On dit que le bâtiment compte 365 ouvertures, chiffre symbolique.       Theillat-Sanssat,  l'intérieur fut aménagé avec les meilleurs matériaux et les techniques les plus évoluées pour l'époque afin de donner le plus grand confort. Bâti en pierre blonde du Nivernais, et couvert d'une toiture d'ardoises, il est entouré d'un vaste parc arboré où se voient une pièce d'eau ainsi qu'une orangerie et des écuries spacieuses.","habitants":"Famille Noailly                           Famille de Gui des Brosses            Famille de Chouvigny\"","divers":"Château de  Aint-Alyre, de Teillat et de la Grange à Sanssat.","gps":"","images":["../../jctruffet.com/image/image_03/03_Sanssat_1.jpg","../../jctruffet.com/image/image_03/03_Sanssat_2.jpg","../../jctruffet.com/image/image_03/03_Sanssat_3.jpg","../../jctruffet.com/image/image_03/03_Sanssat_4.jpg","../../jctruffet.com/image/image_03/03_Sanssat_5.jpg","../../jctruffet.com/image/image_03/03_Sanssat_6.jpg","../../jctruffet.com/image/image_03/03_Sanssat_7.jpg","../../jctruffet.com/image/image_03/03_Sanssat_8.jpg"]},"Consult_chateau_formulaire1d8b":{"id":"Consult_chateau_formulaire1d8b","dept":"03","canton":"Montmarault","commune":"Blomard","nom":"Sarre_Montmarault","type":"Château","periode":"XVII","histoire":"Château de Montmarault (château Camus) qui servit en 1940-44 d'état-major au groupement 39 (le Foucaud) des chantiers de jeunesse.                          Sallebrune XVIIe siècle classé monument historique chambres d'hôtes de Jean-Paul Pelletier.                                A quelques kilomètres au sud-est le château de Blomard   dit de Sarre.       SARRE, en 1317, Guillaume de Sarre achète une terre provenant de la famille de Beaucaire. En 1381, Jean Jehannot est seigneur de Sarre. A sa mort en 1398, il était possesseur de biens immenses. Son fils Jean, écuyer, est \"mestre  d'hostel  de Mgr le duc du Bourbonnais\". La charg
