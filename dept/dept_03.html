 de chaque côté sur deux anciennes tours. Vers 1850, la façade sur jardin fut modifiée par l'adjonction de deux avant corps à un niveau dont le dessus, en terrasse, est accessible depuis les pièces. De chaque côté de la cour se trouvent deux petits pavillons rectangulaires, symétriques, visiblement contemporains du château dont-il subsiste la tour ronde au sud-ouest et un pigeonnier, le pavillon de gauche constitue la chapelle. Le pavillon de droite contient une ancienne salle de billard. Au nord, présence d'un pigeonnier de plan circulaire. En contre bas de la terrasse deux bâtiments à un seul niveau abritent les communs. Contemporains du château, ces édifices ont conservé leur caractère d'origine. Enfin un petit pavillon hexagonal, cité sous l'appellation pavillon chinois dans un inventaire de 1843, est édifié sur une terrasse, sur l'allée menant au château. Un mobilier spécialement conçu pour ce bâtiment au moment de sa construction. Outre le château de Beaumont, on peut aussi observer les silhouettes élégantes dautres demeures seigneuriales.","habitants":"Famille de  François Dalphonse\r\n        \"","divers":"Château de Beaumont à Agonges","gps":"","images":["../../jctruffet.com/image/image_03/03_Beaumont_1.jpg","../../jctruffet.com/image/image_03/03_Beaumont_2.jpg","../../jctruffet.com/image/image_03/03_Beaumont_3.jpg","../../jctruffet.com/image/image_03/03_Beaumont_4.jpg","../../jctruffet.com/image/image_03/03_Beaumont_5.jpg"]},"Consult_chateau_formulairecad1":{"id":"Consult_chateau_formulairecad1","dept":"03","canton":"Montmarault","commune":"Beaune-d`Allier","nom":"Beaune_Allier","type":"Château","periode":"XV-XVIII","histoire":"Plusieurs châteaux à la Beaune d'Allier, la Faye du XV-XVIIe siècle, les Guillaumets du XIV-XIXe siècle cantonné de tours, de Mazeau du XVIIe siècle tour vestiges, de Salbrune du XIII-XVe siècle avec tour, et de Villars du XV-XIXe siècle.                                   La FAYE,siège d'une justice seigneuriale, les premières mentions connues des sieurs de la Faye concernent, en 1443, un Jean d'Avenier, puis un Antoine Roussin, écuyer, dans un document testamentaire daté de 1498. En 1599 Jean Louis de la Mousse est seigneur de la Faye. Au dernier membre de la lignée de la Mousse succède son gendre, Amable de Montaignac, en 1759.                             SALLEBRUNE;  au XVe siècle possession de la famille de Beaucaire, en 1595 Isaac de Beaucaire seigneurs écuyer. La seigneurie est acquise par  César de Bressolles qui  épouse en 1640 Françoise de Chateaubodeau  et la revend en 1680 à la famille Dubouis, qui passera ensuite aux Colasson.                        GUILLAUMETS; Les Guillaumets furent la résidence de fonctionnaires d'Octroi et de Gabeloux.                           VILLARS, la seigneurie comprenait le castel fort, dressé sur un rocher, trois domaines et le bois de  Villard. En 1322, Hugonin de Moulins tient le fief de Villers, châtellenie de Murat. De nombreux aveux postérieurs concernent  l'hostel, terre et seigneurie de Villards. En 1548, Geoffroy de Mollins, écuyer, seigneur de Villards, signe une  reconnaissance par laquelle il s'engage à payer, une redevance  de cens au membre de Bussières Jérusalem, pour sa terre du Soupt, paroisse de Beaune, dépendant de l'hôpital et chapelle d'Augières. Vers  1650, le domaine de Villars est acquis par René de Saint-Martin, seigneur du Mazeau, terre voisine. Au XVIIIe siècle Villards appartient à la famille Desbouis de Sallebrune. Il est à cette époque, très dégradé et occupé par des métayers. Ses vestiges passeront ensuite à la famille Siramy.","architecture":"la Faye  a   gardé, de son aspect médiéval, une tour en ruine flanquée à l'angle d'un bâtiment. Les  constructions étaient   installées sur une plateforme rocheuse située en position dominante.  une  seconde tour, une large pièce d'eau, des bâtiments dispersés et la maison de maître. \r\nSallebrune du  XVe siècle, à l'origine, ensemble de bâtiments fortifiés ordonnés autour d'une cour quadrangulaire et entourés de fossés en eau. Cette disposition initiale transparaît encore, mais l'enceinte médiévale a quasiment disparu. Le fossé sud est franchi par un pont maçonné qui donne accès à la cour d'honneur autour de laquelle s'ordonne divers bâtiments : une tour ronde du XVe siècle ; un corps de logis du XVIIe; en retour d'équerre, et une aile de communs en partie ruinée. La tour  possède un escalier en vis . Le couronnement conserve ses corbeaux formant mâchicoulis. Le corps de logis, barlong, se compose d'un rez-de-chaussée légèrement surélevé, d'un étage  et de combles. Une travée en léger retrait raccorde l'aile du logis à la tour. La tour médiévale correspond à un style peu représenté en Bourbonnais.  Il est remarquable par son donjon; une large et haute tour ronde des XIIIe et XVe siècles.                     Guillaumets,  deux châteaux: celui de Sainte Foy, centre primitif  d'un terroir rayonnant et circulaire, et qui paraît être  un ancien château fort réaménagé. Il a conservé deux tours d'angle des XIVe et XVe siècles et reste couvert   d'un toit à la Mansart. On y remarque une belle clé de porte et un fronton de lucarne armorié. Celui de la Celle,   à constructions compliquées, adjointes  à une tour carrée  que l'on pense dater du XIIIe siècle. L'ensemble des constructions  a été largement réaménagé  aux XVIIe et XVIIIe siècles.\r\nVillars Le château est le reste d'une vieille construction féodale à solides appareillages d'angle, aux murs épais,  semblable à un donjon carré, et entourée d'un jardin clos de murs d'enceinte, les fossés ont disparu.","habitants":"Famille de  Geoffroy de Mollins\"","divers":"Château de la Faye,  de Guillermets,   de  Mazeau,   de Salbrune et de Villars","gps":"","images":["../../jctruffet.com/image/image_03/03_Beaune_Allier_1.jpg","../../jctruffet.com/image/image_03/03_Beaune_Allier_2.jpg","../../jctruffet.com/image/image_03/03_Beaune_Allier_3.jpg","../../jctruffet.com/image/image_03/03_Beaune_Allier_4.jpg","../../jctruffet.com/image/image_03/03_Beaune_Allier_5.jpg","../../jctruffet.com/image/image_03/03_Beaune_Allier_6.jpg","../../jctruffet.com/image/image_03/03_Beaune_Allier_7.jpg","../../jctruffet.com/image/image_03/03_Beaune_Allier_8.jpg","../../jctruffet.com/image/image_03/03_Beaune_Allier_9.jpg"]},"Consult_chateau_formulaire33a4":{"id":"Consult_chateau_formulaire33a4","dept":"03","canton":"Lapalisse","commune":"Le Breuil","nom":"Beaupoirier","type":"Château","periode":"XIV","histoire":"BEAUPOIRIER,  en 1301, Hugues de Putay, chevalier, fit aveu au sire de Bourbon de sa maison de Beaupoirier, en la paroisse du Breuil. Mais, dès 1342, c'est  une famille de La Roche, seigneur de La Motte Mourgon à Magnet, qui devint seigneur de Beaupoirier. La terre resta dans cette famille  jusqu'au début du XVIe siècle, puisqu'en 1503, nous trouvons que Pierre de La  Roche, écuyer, reconnaît  tenir le fief  de la duchesse de Bourbon. Sa fille transporta  la terre de Beaupoirier à   son époux, Gilbert de Chantelot, seigneur de la Chaise. Leurs descendants conservèrent Beaupoirier jusqu'au XVIIe siècle, époque à laquelle  la seigneurie passa aux mains de la famille des Cimetière de la Bazole, puis aux Chambon de Beaupoirier qui en étaient encore propriétaire au XIXe siècle.  Transformé en société de location de terrains et d'autres biens immobiliers.","architecture":"Beaupoirier, Il ne reste plus grand chose de l'ancien château, sinon quelques vieux murs. Le Beaupoirier actuel est une gentilhommière du XVIIe siècle, composée d'un corps principal de bâtiment relativement bas à deux niveaux  et de forme rectangulaire. La façade est flanquée d'un petit pavillon carré à l'Ouest et d'une tour ronde à   l'angle Est couverte d'un toit conique.","habitants":"Famille de La Roche\"","divers":"Château de Beaupoirier à le Breuil","gps":"","images":["../../jctruffet.com/image/image_03/03_Beaupoirier_1.jpg","../../jctruffet.com/image/image_03/03_Beaupoirier_2.jpg","../../jctruffet.com/image/image_03/03_Beaupoirier_3.jpg","../../jctruffet.com/image/image_03/03_Beaupoirier_4.jpg"]},"Consult_chateau_formulaire8d28":{"id":"Consult_chateau_formulaire8d28","dept":"03","canton":"Marcillat-en-Combrailles","commune":"Terjat","nom":"Beausson","type":"Château","periode":"XV","histoire":"BEAUSSON, de la  famille Charnizay, l'ensemble est d'une grande élégance dans un beau jardin où l'on remarque une orangerie à pignon armorié.","architecture":"Beausson, sur la hauteur de Beausson aurait été primitivement édifiée une tour de guet mérovingienne, puis une forteresse que l'on dit contemporaine du château de l'Ours. C'est bien là un château fort,  Il couronnait la butte  ou motte dominant deux étangs, le grand étang  et une pièce d'eau allongée qui a dû servir de fossé de défense. Du côté du plateau, une remise à niveau a pu remplacer les fosses primitives.  La construction actuelle se compose d'un corps de bâtiment des XVe et XVIe siècles, à deux étages flanqué aux  angles, du côté nord, de deux tours  dont une serait des XIIe et XIIIe siècles, et donc un vestige de l'enceinte médiévale. Vers l'ouest, est accolée une aile d'époque plus récente. La façade a été remaniée XIXe siècle, avec   une tour sur laquelle  ont été sculptés armoiries et blasons des possesseurs du château.","habitants":"Famille Charnizay\"","divers":"Château de Beausson à Terjat","gps":"","images":["../../jctruffet.com/image/image_03/03_Beausson_1.jpg","../../jctruffet.com/image/image_03/03_Beausson_2.jpg"]},"Consult_chateau_formulaire9491":{"id":"Consult_chateau_formulaire9491","dept":"03","canton":"Gannat","commune":"Saulzet","nom":"Beauverger","type":"Château","periode":"XV-XIX","histoire":"BEAUVERGER, ce château appartenait en 1760 à messire Claude Hector de Longueil, chevalier, capitaine au régiment dAquitaine,  fils de messire Joseph Gilbert, chevalier seigneur haut justicier de Beauverger. Aujourd'hui transformé en hôtel restaurant par monsieur Susini d'Arinchi.               Dans la commune de Saulzet le château de la Motte.","architecture":"Beauverger du  XVe siècle  édifice fortifié en 1449, constitué par un grand logis rectangulaire flanqué aux angles de quatre tours rondes avec avant-becs à angle droit formant bastion. Au centre d'une façade s'élève la tourelle d'escalier. Sur la face opposée, à l'angle, s'ouvre une ancienne porte défendue par une herse, ancien accès de la demeure. En arrière de la porte, se trouve un couloir conduisant aux pièces, à un escalier à vis et à des latrines. Le rez-de-chaussée et le premier étage sont occupés par deux salles inégales, et des petites salles dans les tours. Le bâtiment est surmonté de mâchicoulis avec parapet à meurtrières et couronné de hauts combles. Des fenêtres à meneaux et à encadrements moulurés éclairent les pièces. Au milieu du XIXe siècle, le propriétaire a fait démolir deux tours d'angle, abaisser le plancher haut du premier étage, diviser la grande salle en deux et modifier les couronnements des mâchicoulis.","habitants":"Famille de Claude Hector de Longueil\"","divers":"Château de Beauverger et de la Motte","gps":"","images":["../../jctruffet.com/image/image_03/03_Beauverger_1.jpg","../../jctruffet.com/image/image_03/03_Beauverger_2.jpg","../../jctruffet.com/image/image_03/03_Beauverger_3.jpg","../../jctruffet.com/image/image_03/03_Beauverger_4.jpg"]},"Consult_chateau_formulaire0f27":{"id":"Consult_chateau_formulaire0f27","dept":"03","canton":"Dompierre","commune":"Saint-Pourçain sur Besbre","nom":"Beauvoir_Allier","type":"Maison forte","periode":"XIV","histoire":"BEAUVOIR,  place forte dès le  XIIIe siècle, prise par les Anglais au cours de la guerre de Cent Ans, reprise en 1367-1369  par les troupes de Louis II de Bourbon. Fortement endommagé par l'occupation anglaise,  Beauvoir est une place forte dès le XIIIe siècle,   le premier château a appartenu à la famille Breschard,  il est rebâti en grande partie à la fin du XVe siècle par les seigneurs de La Fin, dont les armoiries sont sculptées à l'intérieur de la tour sud-est,  propriétaire  jusquen 1663 Il est vendu au XVIIIe siècle, sans doute pour dettes, au financier Sébastien Zamet, et change plusieurs fois de mains avant d'être racheté par les Gaulmin, qui font ériger la seigneurie en comté en 1762. Après avoir de nouveau changé de propriétaires, Beauvoir est acheté en 1890 par l'industriel Emile Puzenat, dont les descendants possèdent toujours le château.","architecture":"Beauvoir, est à l'origine une maison forte du XIVe siècle est situé au sommet d'une colline surplombant le Val de Besbre, Un beau jardin à la Française est l'écrin de ce château du XIVe siècle aménagé au XVe siècle, sur un site qui a livré au XIXe siècle des statuettes en terre cuite gallo-romaines conservées aujourd'hui au dépôt diocésain de l'Allier. Le château était autrefois entouré de douves, asséchées au XXe siècle. Un pont surplombant un large fossé dernier témoignage des douves du Moyen-Age, permet laccès au château, la tour de guet carrée entre les deux corps de logis a été surélevée au XVIIIe siècle et couronnée dun campanile couvert en bardeaux, très commun en  Bourbonnais.  Il se compose de deux bâtiments placés en équerre joints par une tour de guet carrée et eux-mêmes terminés par des tours circulaires aux angles nord-ouest et au sud-est. Le bâtiment sud est ceint d'un chemin de ronde. La plupart des ouvrages défensifs (pont-levis, tour ronde dite de l'Enfer, barbacane) ont disparu; il  reste qu'une petite tour avancée au nord-est. Devant la façade ouest s'étend un jardin à la française dessiné par le paysagiste Joseph Treyve en 1928.","habitants":"Seigneurs de La Fin\"","divers":"Château de Beauvoir à Saint-Pourçain sur Besbre","gps":"","images":["../../jctruffet.com/image/image_03/03_Beauvoir_Allier_1.jpg","../../jctruffet.com/image/image_03/03_Beauvoir_Allier_2.jpg","../../jctruffet.com/image/image_03/03_Beauvoir_Allier_3.jpg","../../jctruffet.com/image/image_03/03_Beauvoir_Allier_4.jpg","../../jctruffet.com/image/image_03/03_Beauvoir_Allier_5.jpg","../../jctruffet.com/image/image_03/03_Beauvoir_Allier_6.jpg","../../jctruffet.com/image/image_03/03_Beauvoir_Allier_7.jpg","../../jctruffet.com/image/image_03/03_Beauvoir_Allier_8.jpg"]},"Consult_chateau_formulaire758b-2":{"id":"Consult_chateau_formulaire758b-2","dept":"03","canton":"Ebreuil","commune":"Echassières","nom":"Beauvoir_Echassieres","type":"Château","periode":"XV","histoire":"BEAUVOIR, la seigneurie et le château de Beauvoir appartiennent du XIIe siècle au début du XVIe siècle à la famille Le Loup, importante famille du Bourbonnais, puis passe par mariage à la famille d'Alègre qui le conserve jusqu'en 1775. Le château change ensuite plusieurs fois de propriétaires. Sci  de M. Pierre Imhof, en tant que gérant, est dirigeant de la société. Actuellement siège de la Société des kaolins de Beauvoir.","architecture":"Beauvoir,  forteresse défensive qui occupait une situation importante sur les confins du Bourbonnais. Des constructions du XVe siècle, restent le mur d'enceinte flanqué de deux tours, une tour isolée et une tourelle, le tout relié par  des constructions modernes. La porte fortifiée comprend  deux meurtrières  à l'ouverture amovible. L'ouverture extérieure est bouchée par un ovoïde qui porte en son milieu un trou par lequel le guetteur pouvait tirer. Son tracé en équerre le différencie des autres châteaux de la région et l'ancienne tour de guet est typiquement de facture bourbonnaise. A gauche du château, un chemin longe les anciennes douves et débouche sur de très  beaux jardins.\r\n Eléments protégés MH : Parties du XIVe et XVe siècles  comprenant le mur d'enceinte Nord avec ses deux tours  et son corps de pont-levis, la tourelle d'escalier et la grosse tour Sud-Ouest.","habitants":"Famille Le Loup\"","divers":"Château de Beauvoir","gps":"","images":["../../jctruffet.com/image/image_03/03_Beauvoir_Echassieres_1.jpg","../../jctruffet.com/image/image_03/03_Beauvoir_Echassieres_2.jpg","../../jctruffet.com/image/image_03/03_Beauvoir_Echassieres_3.jpg","../../jctruffet.com/image/image_03/03_Beauvoir_Echassieres_4.jpg"]},"Consult_chateau_formulaire08c3":{"id":"Consult_chateau_formulaire08c3","dept":"03","canton":"Jaligny-sur-Besbre","commune":"Bert","nom":"Beches","type":"Château","periode":"XV","histoire":"BECHE, le fief se serait appelé primitivement \"La Villette\", mais dès 1451, il appartient à Jean et Stevenin de la Bêche, qui en rendent hommage à Charles Chabanne à cause de sa seigneurie de Châtelperron. En 1512,   Bêche est aux mains de la famille Vichy, également seigneur du fief voisin disparu de Blénière. Thomas Vichy  vend ses terres en 1674 à Pierre Josse, dont les descendants conservèrent la Bêche jusqu'à la Révolution.","architecture":"Béche qui était  pourvu de sept tours, dut être en partie détruit  durant cette période. Ce   n'est plus aujourd'hui qu'un simple bâtiment rectangulaire à deux niveaux et attiques,  flanqué de deux tours rondes aux angles d'une façade toitures en poivrières. Le château garde cependant le souvenir plutôt désagréable, du séjour qu'y fit avec ses troupes en juin 1632,  Gaston d'Orléans, frère de Louis XIII, lors de son passage dans la région et que relate le curé du Donjon dans  son registre paroissial.","habitants":"Famille de Stevenin de la Bêche\"","divers":"Château de Béches à Bert","gps":"","images":["../../jctruffet.com/image/image_03/03_Beches_1.jpg","../../jctruffet.com/image/image_03/03_Beches_2.jpg"]},"Consult_chateau_formulaire5e61":{"id":"Consult_chateau_formulaire5e61","dept":"03","canton":"Gannat","commune":"Begues","nom":"Begues","type":"Château","periode":"XV","histoire":"Deux châteaux à Bégues dont celui de Bégues et la Serre.                 BEGUES,  bien qu'une famille de Bègues soit connue dès 1296, ce n'est qu'en 1326 que nous rencontrons le premier  seigneur de Bègues, Jean de Bègues, damoiseau, qui reconnait obtenir du duc de Bourbon  sa maison forte de Bègues, des vignes et un moulin. Fin XVe siècle, la famille de Bègues est toujours propriétaire de la seigneurie. Après avoir appartenu à Philippe Larquier, puis aux familles Raynaud et de Goy, la terre de Bègues est passée, en 1686, aux mains de la famille du Ligondès, puis plus récemment  aux de Grivel et aux de Bernard.  Aujourd'hui, le château est utilisé comme colonie de vacances.                                 SERRE,  ce château ne semble pas avoir succédé à un siège  de seigneurie, cependant le hameau de La Serre avait une certaine importance au Moyen-Age, mais il devait  dépendre  du seigneur de Bègues. Une communauté agricole semble en avoir exploité la terre, avec Jacques et  Gilbert Daurat, ainsi  que trois membres de la  famille Marohan, en 1487. Au XVIe siècle, la famille Marohan est  majoritaire dans la communauté, mais dès 1528, les droits seigneuriaux portant sur les sept feux de La Serre  sont accaparés par le seigneur de la Faulconnière.  Aujourd'hui, le château de La Serre appartient à la famille Rousselon.","architecture":"Bégues consistait en une enceinte rectangulaire, tours rondes aux angles, entourée de fossés. C'était une construction du XIIe siècle. Aujourd'hui, il ne reste de l'ancien château qu'une tour ronde tronquée,  à l'entrée  du bâtiment actuel, couverte d'un toit conique  surmonté d'un lanternon ajouré.   A la fin du XIXe siècle, les anciens murs d'enceinte ont été rasés et le parc aménagé de bosquets et d'arbres.  Serre, au sommet d'un mamelon et entouré d'un grand parc, s'élève le petit château de La Serre. C'est une   construction du XIXe siècle, de forme quadrangulaire, à deux échauguettes d'angle sur culots moulurés, coiffées    de toits coniques élancés. On accède à l'entrée  par un escalier à deux rampes, ornées de balustres, alors que le  perron s'élève sur cave. Les deux niveaux du logis suivent l'ordonnance classique et la pierre blanche utilisée donne un  bel effet avec les toitures couvertes d'ardoises bleues.","habitants":"Famille de  Philippe Larquier             Famille Marohan\"","divers":"Château de Bègues","gps":"","images":["../../jctruffet.com/image/image_03/03_Begues_1.jpg","../../jctruffet.com/image/image_03/03_Begues_2.jpg","../../jctruffet.com/image/image_03/03_Begues_3.jpg"]},"Consult_chateau_formulaire04cd":{"id":"Consult_chateau_formulaire04cd","dept":"03","canton":"Montluçon","commune":"Chamblet","nom":"Bellechassagne","type":"Maison forte","periode":"XVI","histoire":"BELLECHASSAGNE, Chamblet dépendait de la châtellenie de Murat avec trois fiefs principaux : Chavroche, Bellechassagne et Le Plaix, château du XVIIIe siècle logis cantonné de tours.                      Le fief de Bellechassagne était formé, à la fin du XVe siècle, des biens et cens contenus dans l'aveu de  François du Bois, seigneur du Bouis de Marcillat, en 1477. Il fut acquis par noble homme Marc Coppin, bourgeois de Chamblet, et donné à sa fille Marie, épouse de Jacques Lebel, en 1515. Philippe, écuyer, est seigneur de Bellechassagne et  de Boischâtelet en 1548, capitaine châtelain de Tizon. En 1569, maison forte vassale de la châtellenie de Murat. Les descendants Lebel restent seigneurs de Bellechassagne jusqu'au milieu du XIXe siècle, date ou le château est vendu à M. Verge.         PLAIX, dans le dénombrement des fiefs du Bourbonnais, en 1503, Antoine de Vueillan, écuyer, seigneur du Plex, fait aveu à la duchesse de Bourbon, de \"sa maison et place du Plex, paroisse de Chamblet. En 1569, la maison   seigneuriale du Plaix est signalée comme dépendant de la châtellenie de Murat. Elle appartient depuis longtemps à la famille de Montaignac.  Transformé en chambres d'hôtes.","architecture":"Bellechassagne est un manoir de la fin du XVe siècle avec tour ronde et porte à accolade. Le cadastre ancien montre une organisation du terrain de forme ovalaire sur le principe motte-basse-cour avec des restes de fossés encore visibles. Il est possible que la motte voisine du Bois de la Motte soit le siège d'une seigneurie plus ancienne.                            Plaix  La gentilhommière actuelle édifiée   en 1773 est une construction de forme rectangulaire à deux niveaux, anglé en façade de deux  tours rondes à toit pointu.","habitants":"seigneur de Bellechassagne             Famille de Montaignac\"","divers":"Château de la plaix","gps":"","images":["../../jctruffet.com/image/image_03/03_Bellechassagne_1.jpg"]},"Consult_chateau_formulaire792f":{"id":"Consult_chateau_formulaire792f","dept":"03","canton":"Varennes-sur-Allier","commune":"Seuillet-Magnet","nom":"Bellecour_Noally","type":"Maison forte","periode":"XV","histoire":"Deux châteaux à Seuillet, Bellecourt  et de la Roche.                     BELLECOUR, fut la propriété de la famille le Brun, dont l'un des membres en 1789, Jean Baptiste, fut député de l'Assemblée constituante.Ils ne sont alors mentionnés que comme simples bourgeois de Seuillet, de quoi on peut conclure que Bellecour n'avait plus qualité de fief au XVIIIe siècle.                                  La ROCHE, pas d'information historique. A queques kilomètres à l'Est à Magnet , château de Noally .                NOALLY, ce fief, sans justice, est connu à partir du XIVe siècle. Le damoiseau Jehan de Villefort en était seigneur en 1342. Il rend hommage au duc de Bourbon pour son \"hostel, domaine et seigneurie de Noalhe\". Sa fille porta le fief  par mariage, à Robert de Grezolles qui fait aveu pour sa maison de Noalhe en 1350. Apres avoir appartenu en 1378  à Guillaume Rechain, puis de 1405 à 1446 à la famille de Bosredon, le fief fut acquis, dans la seconde moitié du XVe siècle, par la famille Girard de Girardière. Par alliance, Noally appartiendra successivement à la famille du Saix, et au  XVIIe siècle aux la Queille de Châteaugay,  confisqué en 1792.","architecture":"Bellecourt, la façade principale est percée d'une entrée à laquelle on accède par un escalier à double volée en fer à cheval. Le premier étage d'un seul niveau est accolé à la tour  d'entrée. L'ensemble de ses bâtiments atteste de plusieurs reprises de constructions, sur une base du XVIIIe siècle peut-être. Un pigeonnier carré est présent dans les communs. Couvert d'un toit à quatre pans, il est surmonté d'un  lanternon.        Noally, construction  du  XVe siècle,   manoir comprenant un corps de logis rectangulaire flanqué d'une tourelle d'escalier et de deux tours rondes. Château de plan quadrangulaire flanqué  de deux tours dans les angles de la façade nord et  d'une tour ronde contenant un escalier en vis contre la face sud. L'angle sud est du château s'étant effondré, il laisse voir des cheminées sur 3 niveaux, les étages étaient  séparés en deux pièces ouvrant  chacune par une porte sur l'escalier. Sans créneaux ni mâchicoulis, le château était cependant défendu par de nombreuses meurtrières très soignées adaptées pour le tir à feu. Subsistent quelques fenêtres à meneaux. A l'intérieur, grandes cheminées à larges manteau timbré d'un écusson, sur faisceau de colonnettes.","habitants":"Famille le Brun                      Famille Girard de Girardière   \"","divers":"Château de Bellecour, de Noally,  de Roche  à Seuillet","gps":"","images":["../../jctruffet.com/image/image_03/03_Bellecour_Noally_1.jpg","../../jctruffet.com/image/image_03/03_Bellecour_Noally_2.jpg","../../jctruffet.com/image/image_03/03_Bellecour_Noally_3.jpg","../../jctruffet.com/image/image_03/03_Bellecour_Noally_4.jpg","../../jctruffet.com/image/image_03/03_Bellecour_Noally_5.jpg","../../jctruffet.com/image/image_03/03_Bellecour_Noally_6.jpg","../../jctruffet.com/image/image_03/03_Bellecour_Noally_7.jpg","../../jctruffet.com/image/image_03/03_Bellecour_Noally_8.jpg"]},"Consult_chateau_formulaire25ee":{"id":"Consult_chateau_formulaire25ee","dept":"03","canton":"Ebreuil","commune":"Bellenaves","nom":"Bellenaves","type":"Maison forte","periode":"XIII","histoire":"A Bellenaves cinq châteaux Bellenaves (voir article), de Beyrat du XIVe-XVIIIe siècles ( voir article), de la Cave du XVe siècle avec tour, de Fognat du XIVe siècle, de Graveron du XV-XIXe siècle avec grosses tours rondes, de Tizon du XIVe siècle avec tours imposantes  et de la Presles du XV-XIXe siècle.           BELLENAVES, mariage en 1196 de Guy II de Dampierre avec Mathilde, dame de Bourbon, les sires de Bourbon sont des proches du roi. En 1227  le château actuel a été construit à partir du XIIIe siècle  par les seigneurs du lieu, les Jehan de Bellenaves.  Archambaud VIII de Bourbon passa un accord avec Roger Jehan sur la seigneurie de Bellenaves qui serait commune entre eux par moitié. Louis Ier Jean accompagne le roi Charles VIII dans sa campagne italienne. Le roi le cite dans sa correspondance. Il en fit son chambellan et  lui présenta Madeleine d'Anjou, fille naturelle légitimée du roi René. Louis Ier Jehan se maria en 1496, en présence du roi et de la reine, avec Madeleine d'Anjou. La famille Jehan a conservé la seigneurie de Bellenaves jusqu'au XVIe siècle. En 1564, Louis Jehan est seigneur de Bellenaves. À la fin du XVIe siècle, Charlotte de Bellenaves est la seule héritière. Elle apporta la seigneurie par mariage à Blain Loup, seigneur de Pierrebrune, Montfand et autres lieux. En 1646, la seigneurie passa par mariages dans la famille des Rochechouart, barons de La Tour d'Auvergne, puis en 1675 à la famille de Gillier, marquis de Clérambaud, en 1696, aux Montmorency-Luxembourg, en 1722, aux Pardaillan, ducs d'Épernon. Le château est acheté par la famille Dutour de Salvert en 1771. La terre devint alors un marquisat. vendu ensuite en 1956 à un marchand de grains qui installa un silo dans les communs et conserva ce qui restait de la décoration intérieure,  Il est racheté en 1979 par la famille Arisolli qui s'est employée à le restaurer. Aujourd'hui Philippe Alfonsi, grand reporter, propriétaire du château de Bellenaves, également gites de France depuis 2014.","architecture":"Bellenaves, le château actuel a été construit à partir du XIIIe par les seigneurs du lieu de construction médiévale agrandie à l'époque classique. Une importante campagne de travaux permit au XVIIIe siècle de réunir au gros donjon carré des XIVe - XVe siècles un long bâtiment englobant  l'ancien logis à tourelle dont il était séparé. Le donjon a conservé l'essentiel de ses dispositions et de son décor. Le nouveau logis fut doté de larges ouvertures et de décors intérieurs dignes d'une demeure de plaisance. Parc à l'anglaise aménagé dans l'ancienne enceinte,  Ce château est l'une des plus ancienne maison féodale du Bourbonnais. Pendant la Révolution, une tour est brûlée. Une partie des remparts et le donjon sont encore en place. On peut y voir des éléments sculptés  des XIIIe et XVe siècles, une porte romane et un ensemble de fenêtres à meneaux du XVe siècle et une façade du XVIIe siècle.","habitants":"Famille de Jehan de Bellenaves\"","divers":"Château de Bellenaves","gps":"","images":["../../jctruffet.com/image/image_03/03_Bellenaves_1.jpg","../../jctruffet.com/image/image_03/03_Bellenaves_2.jpg","../../jctruffet.com/image/image_03/03_Bellenaves_3.jpg","../../jctruffet.com/image/image_03/03_Bellenaves_4.jpg","../../jctruffet.com/image/image_03/03_Bellenaves_5.jpg","../../jctruffet.com/image/image_03/03_Bellenaves_6.jpg","../../jctruffet.com/image/image_03/03_Bellenaves_7.jpg"]},"Consult_chateau_formulaire23b9":{"id":"Consult_chateau_formulaire23b9","dept":"03","canton":"Ebreuil","commune":"Bellenaves","nom":"Bellenaves_II","type":"Maison forte","periode":"XV","histoire":"FOGNAT,  Fognat étaient, au début du XVIe siècle, des membres de la famille le François, en 1534 l'héritière, Marguerite le François, porta la terre de Fognat à son époux Jean du Buysson. En 1626, c'était  le baron de Veauce, Nicolas du Buysson, chevalier, qui portait le titre  de seigneur de Fognat. La  descendance conserva Fognat jusqu'en 1732, Gilberte du Buysson épousa Jean Nicolas Lapelin et lui transmit la  seigneurie. Saisi pour dettes sur Claude Amable Lapelin, Fognat fut vendu , en 1821, aux époux   Mangin. Après de nombreux propriétaires successifs au XIXe puis au XXe siècle, Fognat appartient depuis 1975 à la famille Hébrard.                    CAVE,  le lieu même de la Cave a disparu, ou bien a changé de nom. Au XVe siècle, le fief appartenait à la famille de Moriat, seigneur de Talayat à Louroux de Bouble, et en 1486, Louise de Moriat, dame de la Cave, transmet la terre à Mathieux du Buisson son mari, auquel succéda Philibert du Boisson, écuyer, et lui aussi seigneur de la  Cave. En 1577, André du Buisson, avocat au parlement de Moulins, est seigneur de la Cave, mais également de Fognat, Montchoisy, Montcelat et Moret. \r\nGRAVERON, cet ancien fief en 1503, lorsque deux frères, Antoine et Odin de Villelume, écuyers, reconnaissaient  tenir en fief de madame la duchesse de Bourbon leur domaine de Graveron, ainsi que la maison de Saulzay dans la châtellenie de Murat. En 1523, Antoine de Villelume, époux de Marguerite d'Arçon, était encore seigneur de Graveron et maria sa fille Françoise  au seigneur de St-Germain,  Gabriel Foucault. La famille de Villelume  possédait déjà Graveron  à la fin du XIVe siècle, car Guy de Villème   portait en 1399 le titre de seigneur du Graveron, Montbardon et de La Roche Alion. Au XVIIe siècle, le fief  était passé dans la propriété de la famille Monestay, dont un descendant s'en dessaisit  vers 1700. En 1760,  Graveron  est affermé à Jean Baptiste Roux, commissaire aux  droits seigneuriaux  à Bellenaves, par Gilbert  Cousin de Jeu.","architecture":"Fognat la maison a été entièrement restructurée au XVe siècle, par un grand bâtiment rectangulaire à deux niveaux et niveau de comble ou dominent les plafonds à la française. Le XVIIIe siècle a modifié la façade en l'éclairant de nouvelles ouvertures. A quelque distance, un pigeonnier porche de forme carrée servait de portail d'entrée dans la cour. Cave, la construction date de la fin du Moyen-Age, c'est un petit corps de logis de plan rectangulaire à rez-de-chaussée surélevé et étage sous comble. Une tour ronde, qui s'élève au dessus du bâtiment avec son toit conique éffilè, abrite un escalier à vis et sert d'entrée principale. Deux larges fenêtres à meneaux ont été ouvertes au début  du XVIe siècle.                          Graveron, maison forte était installé dès le XVe siècle, entièrement  transformée, a conservé sa grosse tour ronde, percée de canonnières basses, elle a été écrêtée et couverte d'un toit en appentis.","habitants":"Fognat; Famille le François              Cave; Famille de Moriat             Graveron; famille d'Antoine de Villelume\"","divers":"Château  de Fognat, de Cave, de Graveron et de Presles.","gps":"","images":["../../jctruffet.com/image/image_03/03_Bellenaves_II_1.jpg","../../jctruffet.com/image/image_03/03_Bellenaves_II_2.jpg","../../jctruffet.com/image/image_03/03_Bellenaves_II_3.jpg","../../jctruffet.com/image/image_03/03_Bellenaves_II_4.jpg","../../jctruffet.com/image/image_03/03_Bellenaves_II_5.jpg","../../jctruffet.com/image/image_03/03_Bellenaves_II_6.jpg","../../jctruffet.com/image/image_03/03_Bellenaves_II_7.jpg"]},"Consult_chateau_formulaire0f79":{"id":"Consult_chateau_formulaire0f79","dept":"03","canton":"Escurolles","commune":"Bellerives-sur-Allier","nom":"Bellerives","type":"Château","periode":"XIV-XVII","histoire":"Quatre châteaux à Bellerives sur Allier, le Bost du XIV-XVe siècles avec douves, des Brosses du XIXe siècle, de la Rama du XIVe reconstruit XIXe siècle en gothique et de la Rigon du XVIII-XIXe siècle.      BOST, la seigneurie du Bost  est attestée depuis le début du XVe siècle, possessions dune famille qui portait le nom du lieu, fut ensuite la propriété successive de la famille de La Mer de Matha, Chapus, François Givoi. Ernest-Léon-Alfred Sanhard vicomte de Choumouroux. Vendu comme bien national en 1794,la ville de Bellerive acheta en 1956  la propriété aux héritiers du comte Couret de Villeneuve et de son épouse Marie-Rose Serraillier. Transformé en maison de retraite en 1956 jusquen 1995.                              BROSSES, aujourd'hui utilisés pour un élevage de chevaux. Lors de la seconde guerre mondiale les Brosses étaient devenues le siège de la milice. Jean Zay y fut détenu les 19 et 20 juin 1944, avant d'être assassiné.              RAMA, le fief de Las Ramas était important et comprenait, au XIVe siècle, plus de quinze domaines répartis sur   plusieurs paroisses. En 1503, Jehan de Tournebise, écuyer, reconnaît tenir en fief de la duchesse de Bourbon. Il semble que très tôt les 2 fiefs de La Rama et de Bost  furent regroupés et appartient   au même seigneur, c'est à dire à la famille Lamer de Matha. Confisquée à la Révolution, la terre de La Rama  fut vendue comme bien national. Un écusson sculpté dans la pierre, porte les armes de M. Fournier de Tony qui, en 1787, acheta la seigneurie de La Rama.         RIGON, le château sert de centre de brouillage à Radio Vichy  en 1942.","architecture":"Bost, château construit au  XVe siècle, porte la date  de 1411 sur une plaque apposée en 1958 à droite de la porte d'entrée ouest. quatre bâtiments de communs en bord de route, le château est entouré d'eau, avant 1895 construction d'un bâtiment joignant les corps sud-est  et est du château. Remaniement du bâtiment nord, après 1899, avec construction d'une tour à l'ouest et d'une aile à l'est, le château présente un plan régulier en U. Belle bâtisse réaménagée au XIXe siècle,        Brosses, a tous les attributs  d'une construction du XVe siècle. Le bâtiment principal est composé d'un logis rectangulaire, flanqué aux angles de deux tourelles  d'escalier. Les vastes communs, entièrement rénovés, ont conservé  un joli pigeonnier carré  couvert d'un toit à quatre rampants et surmonté d'un lanternon.               Rama Il subsiste de l'ancien château un joli pigeonnier du XVe siècle. La construction actuelle s'organise autour d'un   logis rectangulaire avec une aile épaulée d'une tour ronde et une aile en retour d'équerre, de style néo-gothique du XIXe siècle. Au centre, un avant-corps est surmonté d'un fronton triangulaire avant 1895 seront ajoutés deux tours à l'ouest et un pavillon au nord, actuellement le château est divisé en deux.                                    Rigon une ferme avec maison de maître, logements de domestiques et bâtiments agricoles. Vers  le milieu du XIXe siècle le logis est transformé en château par  adjonction d'un corps de bâtiment, ordonnance adossé à la façade nord-est, par la construction de deux pavillons  d'entrée en bord de route, d'une serre, d'un pigeonnier et par l'aménagement d'un parc.   Les pavillons d'entrée en pierres et briques.","habitants":"Comte Couret de Villeneuve                M. Fournier de Tony\"","divers":"Château du Bost, des Brosses, de Rama et de Rignon","gps":"","images":["../../jctruffet.com/image/image_03/03_Bellerives_1.jpg","../../jctruffet.com/image/image_03/03_Bellerives_2.jpg","../../jctruffet.com/image/image_03/03_Bellerives_3.jpg","../../jctruffet.com/image/image_03/03_Bellerives_4.jpg","../../jctruffet.com/image/image_03/03_Bellerives_5.jpg","../../jctruffet.com/image/image_03/03_Bellerives_6.jpg","../../jctruffet.com/image/image_03/03_Bellerives_7.jpg"]},"Consult_chateau_formulairedf7b":{"id":"Consult_chateau_formulairedf7b","dept":"03","canton":"Neuilly-le-Réal","commune":"Bessay-sur-Allier","nom":"Bessay_Allier","type":"Château","periode":"XV-XVII","histoire":"Cinq châteaux à Bessay sur Allier, Chaugy du XVIIe siècle, l'Hermitage du XV-XIXe siècle hôtel de ville tours, Moutiers du XVII-XVIII avec tours et pavillons, Paray du XVIIe siècle et des Robinats  du XVIIIe siècle avec échauguettes carrées.  CHAUGY, du XVIIe siècle de 1852 à 1862, le domaine est occupé par le prince Adam Czartoryski, noble polonais aujourd'hui propriété de Mr et Mme F.Rimaud.   HERMITAGE, pas d'information historique.  MOUTIERS, ou Moustier, du château féodal de Bessay. Vers 1450, plusieurs familles bourgeoises de Moulins et en particulier les Pietre du Moustier.  A la famille Du Moustier, se succédèrent deux familles dont l'argentier de la Duchesse Anne de Boubon qui transforma le logis et l'agrandit dans de vastes proportions.  Ensuite le château devint la propriété du Receveur Général qui fit édifier un château flanqué de tourelles et précédé d'une vaste cour fermée.           ROBINATS, nom donné par une communauté mentionnée dès 1337 qui défricha une partie du bois de bord.  Aux Robinats, il y a une maison de maître et des communs des XVIIIe et XIXe siècles avec, à l'angle de  cour,  une échauguette carrée datant de 1924. Les registres paroissiaux de l'ancienne paroisse de Neuglise rappellent le souvenir de Françoise Chevalier, dame des Robinats, qui parraina des enfants du village du même nom.   Cette maison fut sans doute  la résidence d'une famille bourgeoise. La seconde mention qu'on en a nous informe  d'une catastrophe consécutive à la chute de la foudre en 1780.               PARAY, ce château passa aux mains de plusieurs familles, dont le premier président au Présidial d'Auvergne à Riom; Jacques Amable Rollet D'Avaux, riche seigneur. Il fut en butte à l'envie et à la haine et en 1793, signalé comme accapareu. L'instruction révéla qu'il était en correspondance avec des émigrés, qu'il pourvoyait aux besoins des prêtres, recevait et faisait connaître les Bulles pontificales et les manifestes des princes. Conduit à Paris, il fut traduit devant le Tribunal révolutionnaire sur les réquisitions de Fouquier-Tinville le 14 floréal an II (13 mai 1794). Il fut condamnés à mort et exécuté. Les propriétés furent confisquées et vendues comme biens nationaux.","architecture":"Chaugy  du XV, Initialement, présence d'une motte féodale, reconstruit au XVIIe siècle ne subsiste que la porterie. Vers 1780, une aile neuve est construite. Le domaine se compose d'une cour rectangulaire bordée de bâtiments, avec les accès symétriques. Présence d'un colombier relié à la porterie par un bâtiment bas. Le domaine présente une architecture caractéristique du Bourbonnais.  \r\nHermitage est une construction du XVe siècle, avec ses combles élevés. Le bâtiment principal a un niveau et comble, de forme  quadrangulaire, transformé au XVIIIe siècle, accueille les services de l'hôtel de ville. La toiture en croupe a reçu  au XIXe siècle un joli lanternon central qui abritait la cloche de la ville.   A quelque  distance, deux petites tours carrées, couvertes d'un toit pyramidal, donnent sa marque de noblesse  à la demeure.                Moutier, le portail, la clôture du parc et les pavillons qui les encadrent sont les seuls vestiges du château disparu. En 1517  le château se présentait sous la forme d'un corps de logis flanqué de deux pavillons carrés. Le château  actuel a été reconstruit à l'époque moderne. L'ancienne cour est fermée à l'est par un mur de clôture percé en son centre par un portail d'entrée, et qui joint de part et d'autre un pavillon rectangulaire à l'angle du quadrilatère.   A chacun des deux angles opposés, à l'ouest, s'élève une tour rectangulaire.              Paray, édifice du XVIIe siècle composé d'un corps central quadrangulaire flanqué de deux avant-corps carrés sur les angles nord. La porte d'entrée à un vantail est encadrée de 2 pilastres aux chapiteaux ornés d'une petite tête. Le château illustre le type de château bourbonnais à cour intérieure bordée de communs, cantonné de tours pavillons ainsi que celui des constructions en briques à croisillons de la Sologne bourbonnaise. Les détails sculptés qui encadrent les portes, les lucarnes et les cheminées monumentales, en font l'exemple d'une gentilhommière du début du XVIIe siècle dans la région. Aujourd'hui transformé en hôtel.","habitants":"Chaugy; prince Adam Czartoryski          Famille Du Moustier                    Robinats; Françoise Chevalier\"","divers":"Château de Chaugy, de l'Hermitage, de Moustier, de Bessonat, les robinats et de Paray","gps":"","images":["../../jctruffet.com/image/image_03/03_Bessay_Allier_1.jpg","../../jctruffet.com/image/image_03/03_Bessay_Allier_2.jpg","../../jctruffet.com/image/image_03/03_Bessay_Allier_3.jpg","../../jctruffet.com/image/image_03/03_Bessay_Allier_4.jpg","../../jctruffet.com/image/image_03/03_Bessay_Allier_5.jpg","../../jctruffet.com/image/image_03/03_Bessay_Allier_6.jpg","../../jctruffet.com/image/image_03/03_Bessay_Allier_7.jpg","../../jctruffet.com/image/image_03/03_Bessay_Allier_8.jpg"]},"Consult_chateau_formulaire872c":{"id":"Consult_chateau_formulaire872c","dept":"03","canton":"Souvigny","commune":"Besson","nom":"Besson_Bostz_Ris","type":"Château","periode":"XVI","histoire":"Quatre châteaux à Besson, le château du Bostz du XVI-XVIIe siècle, de Ristz , de Rochefort (voir article) et de Fourchaud (Voir article).                     BOSTZ, au Xe siècle, il appartenait au chevalier Aymar, sire de Souvigny et de Bourbon. Au XIVe siècle possession de Pierre  Mareschal, Petronille maréchal héritière épouse en 1476 Antoine le Long seigneur de Fougis. Le fief sera vendu en 1578  à Nicolas Chaumas, après son décés en 1585 sera transmis par sa veuve à un neveu, Paul  Delaunay, le fils de ce dernier Jean  lieutenant le cède en 1668 à son gendre Rémy Roussel sieur de Tilly lieutenant au grenier du sel à Moulins, le fils de Rémy Jean-Baptiste hérite de Bostz en 1674 , son fils ainé Charles prendra le titre de marquis de Tilly, page du duc d'Orléans prend le grade de Maréchal des camps et armée du roi et conseiller d'état par Louis XV de 1740 à 1753. C'est son quatrième frére Henri chevalier de Tilly qui hérite de Bostz aprés le décés de son père mort à la bataille de Fontenoy en 1745, Le château passera par alliance de la fille d'Henri, Elisabeth qui épousa  Nicolas-Charles de Biotère de Chassicourt lieutenant des gardes  de la  reine d'Espagne. En 1802 l'unique petite-fille du dernier membre de la famille, Marguerite de Lordat épousa Louis-Antoine-Paul Vicomte de Bourbon-Busset gouverneur de Bourgogne, Eugéne de Bourbon-Busset hérite de Bostz. Construction du nouveau château sur le domaine le Vieux Bostz n'est plus habité  par la famille et qui passe par héritage à Madelaine de Bourbon-Parme et par héritage au prince Charles-Henri de Lobkowicz.                                RITZ, terre inféodée en 1274 à Berthomer  des Noes qui le reçoit d'Agnès , dame de Bourbon en échange des terres de Beaumont, en 1368  Arnold des Noes, écuyer bailli du bourbonnais, sa fille Jeanne héritière épouse Jean de Troussebois seigneur d'Aurouer et de Champaigne, cette famille conservera quatre siècles le domaine. En 1737 rachat du domaine par le marquis de Brotière-Tilly seigneur de Bostz passe par héritage aux Lordat, puis aux Bourbon-Busset et aux Bourbon-Parme. Longtemps utilisé comme ferme agricole fut acquis au XXe siècle par le docteur Vallois qui en a fait un musée  de l'outillage du matériel agricole et artisanat et hôtel de ville.","architecture":"Bostz,  dit  du Vieux Bostz qui date du XI- XV et XVIe siècle siècle et celui plus récent dit « le Nouveau Bostz » construit dans les années 1870. Le vieux Bostz était autrefois entouré de douves, du XV et XVIe siècle, le château était alors une maison forte destinée à protéger ses habitants. Cest ici, à la limite du vignoble de Saint-Pourçain et du bocage bourbonnais que se situent les deux châteaux de Bostz,  Le château est situé au fond d'une cour d'honneur fermée sur un côté par un bâtiment de commun et sur le quatrième par la chapelle prolongée par une grille en fer forgé. Au-delà de la chapelle s'étend un autre bâtiment de commun. La grille présente des éléments décoratifs d'inspiration militaire (canons, trompettes, drapeaux) et semble dater du XVIIIe siècle. Le château est un édifice de plan rectangulaire flanqué de tours carrées sur la façade sur cour, et de deux tours rondes sur la façade sur parc. Du côté des communs, une petite tour ronde vient se placer entre la tour ronde et la carrée. La façade sur cour semble dater du XVIe siècle avec des remaniements au siècle suivant.                      Ritz,  du XVe siècle; XVIe siècle  petit château féodal  de plan barlong  entourée de douves possédait au nord et au sud deux tours aujourd'hui disparues    composé d'un corps de logis du XVe siècle à trois niveaux avec de vastes pièces à cheminées,  d'une tourelle d'escalier. Porte d'entrée avec tympan à crochets et pinacles. Une tour octogonale en façade avec escalier à vis et sur l'angle de cette façade une tourelle carrée à trois niveaux.","habitants":"Famille de Paul  Delaunay             Famille d'Arnold des Noes\"","divers":"Château de Besson Bostz, de Gardais et de Ristz","gps":"","images":["../../jctruffet.com/image/image_03/03_Besson_Bostz_Ris_1.jpg","../../jctruffet.com/image/image_03/03_Besson_Bostz_Ris_2.jpg","../../jctruffet.com/image/image_03/03_Besson_Bostz_Ris_3.jpg","../../jctruffet.com/image/image_03/03_Besson_Bostz_Ris_4.jpg","../../jctruffet.com/image/image_03/03_Besson_Bostz_Ris_5.jpg","../../jctruffet.com/image/image_03/03_Besson_Bostz_Ris_6.jpg","../../jctruffet.com/image/image_03/03_Besson_Bostz_Ris_7.jpg","../../jctruffet.com/image/image_03/03_Besson_Bostz_Ris_8.jpg"]},"Consult_chateau_formulaire7cba":{"id":"Consult_chateau_formulaire7cba","dept":"03","canton":"Ebreuil","commune":"Bellenaves","nom":"Beyrat","type":"Château","periode":"XIV","histoire":"BEYRAT,  le  premier seigneur  portant comme patronyme  le nom du lieu est connu  en 1322. Il s'agit  du chevalier Jehan  d'Aubeyrat qui reconnaissait tenir du duc de Bourbon, son hôtel du Beyrat, avec domaines et devoirs qui en  dépendaient, plus les droits d'usage  dans la forêt  de Tronceon (Les Colettes). En 1351, l'aveu fut renouvelé par Robert d'Aubayrat, puis par Jean d'Aubayrat en 1391. Mais à partir du milieu du XVe siècle Alips du Boyrat a transporté par son mariage la terre de sa famille  à Jacques de Montchory dit d'Arçon, écuyer, qui devenait ainsi le nouveau seigneur du Beyrat.  En 1479, Berthon d'Arson, écuyer, porta le titre de seigneur du Boyrat, lorsqu'il obtint le droit d'usage, des forêts de la Brosse et de Tronceon. Cela laisse supposer que des transformations ont été, au XVe siècle, effectuées au château du Beyrat. Avant 1580, la branche des Laudan d'Arson s'installa sur cette terre. À cette époque, Gabriel de Laudan, seigneur du Beyrat, est mentionné dans le contrat de mariage de son frère,  Jean d'Arçon de Laudan. Son fils Jean, seigneur  lui aussi, se maria  à Bénigne Alexandre de Rouzat. En 1618, François de Laudan du Beyrat, endetté, dut vendre le château  qui fut, quelques années plus tard, acquis par la famille du Buisson. Cette famille conserva la seigneurie  jusqu'à la fin du XVIIIe siècle. Aujourd'hui, le château appartient à la famille de Laplanche.","architecture":"Beyrat du XIVe-XVIIIe siècles,  une maison forte, sinon un château, existe déjà au XIIIe siècle en 1749, ce  château était une forteresse à l'antique, d'une grosseur et d'une élévation prodigieuse, plus  considérable,  mieux bâtie et beaucoup plus logeable que Montaigu le Blain, le logement est même  beau et commode, il y faudrait trente domestiques  pour être bien servi\", dans son état actuel, semble être le dernier reste d'un château-fort du XIIe siècle. Remanié au XVe siècle. Dans sa partie ancienne, l'édifice est constitué de deux tours, celle du nord contenant un escalier, celle du sud comprend des chambres dont l'une abrite une vaste cheminée. S'y ajoute un corps de bâtiment central à trois niveaux.  A l'étage, la salle est voûtée d'ogives. Au nord, une tourelle contenant un petit escalier et un autre corps de bâtiment accolé furent ajoutés au début du XXe siècle.","habitants":"Famille de Berthon d'Arson\"","divers":"Château de Beyrat à Bellenaves","gps":"","images":["../../jctruffet.com/image/image_03/03_Beyrat_1.jpg","../../jctruffet.com/image/image_03/03_Beyrat_2.jpg"]},"Consult_chateau_formulaire614b":{"id":"Consult_chateau_formulaire614b","dept":"03","canton":"Montluçon","commune":"Montluçon","nom":"Bien_Assis_Louviere","type":"Château","periode":"XV","histoire":"LOUVIERE, construit  en 1927 par Mr François-Joseph Toubat héritier d'une importante fortune  qu'il tenait de son père Pierre, créateur en 1872 de la socièté Générale des cires françaises, industriel montluçonnais au début du siècle, le château deviendra un musée que la famille Troubat offrit à la ville en 1976 après le décés de Germaine Troublat. En 2003, le château fut rénové  et mit aux normes. Des sculptures et des volières ornent le site.                BIEN-ASSIS,  appartenait aux seigneurs Colas de Peret, également nommé Nicolas Dupeyret en 1481, ils passa dans différentes familles avant d'être loué à des fermiers, puis récupéré par la ville de Montluçon qui le cède à la société  d'équipement du Bourbonnais  qui est chargée de la démolition du château dans le cadre de la construction d'un nouveau quartier, c'est en 1970 que l'association  des amis de Montluçon  le récupèrent et évitent la démolition , obtiennent en 1993 le prix Emile Mâle, il est utilisé pour des expositions  et une bibliothèque.","architecture":"Louvière, Inspiré du petit Trianon de Versailles, ce château, de style néo-classique construit en 1927, en 1953 ajout des ailes latérales, 1960 construction d'une galerie d'exposition, Le corps de logis  en pierre appareillée et en brique rose, le  rez-de-Chaussée surélevé et un étage couvert à toit plat, précédé par un escalier. La décoration intérieure est baroque. On y trouve entre autre la copie du bureau à rouleau de Louis XIV et la collection de peintures présente des pièces de maîtres de lâge classique. On accède au château, par un remarquable portail de fer forgé.  La villa est agrandie en 1953 par l'architecte P. Bougerolle, les deux nouvelles ailes en rotonde servant de salles d'exposition. L'ensemble est légué à la ville pour devenir un musée en 1976. Bien-Assis, demeure féodale du XVe siècle, le corps de logis comprend deux pièces à chaque étage. Sur un long côté, présence d'une tour carrée d'escalier flanquée d'une tourelle circulaire.   Bâti sur une cave voûtée en berceau (où se trouve une source), il comporte à chacun des 2 premiers niveaux deux pièces d'environ 7,60 m de long  sur 6,80 m de large. Lescalier  à vis donne accès aux étages Le château de Bien-Assis  a heureusement conservé presque intactes ses dispositions d'origine. Les encadrements des portes et des fenêtres (à croisillons) sont sculptés dans un grés local d'une chaude couleur ocre irrégulière, les  planchers sont d'origine,  à l'exception de celui de la salle d'exposition du premier étage,  et de celui de la grande salle du deuxième étage, on distingue encore nettement dans une partie de la salle du rez-de-chaussée à gauche, les peintures qui ornaient le plafond. Condamné à la démolition lors de lurbanisation du quartier, il a été sauvé par \"Les Amis de Montluçon\", il abrite les collections et la bibliothèque de la société.","habitants":"Seigneurs Colas de Peret\"","divers":"Château de la Louvière et de Bien-Assis à Montluçon","gps":"","images":["../../jctruffet.com/image/image_03/03_Bien_Assis_Louviere_1.jpg","../../jctruffet.com/image/image_03/03_Bien_Assis_Louviere_2.jpg","../../jctruffet.com/image/image_03/03_Bien_Assis_Louviere_3.jpg","../../jctruffet.com/image/image_03/03_Bien_Assis_Louviere_4.jpg","../../jctruffet.com/image/image_03/03_Bien_Assis_Louviere_5.jpg"]},"Consult_chateau_formulaire5444":{"id":"Consult_chateau_formulaire5444","dept":"03","canton":"Lurcy-Lévis","commune":"Château-sur-Allier","nom":"Billy","type":"Vestiges","periode":"XIII","histoire":"BILLY, du  XIIIe au XIVe siècle  d'une forteresse primitive par Archambaud VII sire de Bourbon, fut très longtemps le  patrimoine des Bourbons  de 1356 à 1410  Louis II duc de Bourbon. Linfluence des Bourbons dans la région participa, dune part, à la constitution dun bourg castral puis à la ville franche et fortifiée sur le site,  à accroître la prospérité de la châtellenie de Billy jusquau début du XVIe siècle, le contrôle des ducs sur le territoire se percevait aisément par lintermédiaire des capitaines-châtelains, officiers et représentants ducaux placés à la tête des différentes circonscriptions. Le château fut très tôt le siège dun bailliage royal, puis celui dune châtellenie liée au futur duché de Bourbon. lédifice et toutes ses dépendances avaient été vendus par le seigneur Hugues Colombi au sire Archambaud VIII (famille de Bourbon) qui étendait alors son territoire jusquaux portes de lAuvergne. Fort logiquement, le site fut avant tout stratégique du fait des rivalités qu'entretenaient les seigneurs de Bourbon avec les puissants comtes dAuvergne. Aujourd'hui propriété de la commune de Billy.           GAILLARD, du château, il reste plus que le souvenir du nom du lieu. \"Château Gaillard\", qualificatif répandu pour   désigner une forteresse, a pu être un ouvrage avancé du château des seigneur de Bourbon, voire d'un premier château, avant la construction, au XIIe siècle, du château de Billy.   Aujourd'hui un manoir édifié au XVIIe siècle dans le style classique, occupe l'emplacement de l'ancien. Cette construction aux allures de maison bourgeoise est placée à la sortie nord de Billy, à côté de l'étang. Transformé en hôtel restaurant par Constantin Françoise-Jeanne.","architecture":"Billy, avant lapparition de ce \"castrum\", il est possible détablir une ère chronologique qui implique la constitution dun édifice fortifié proche de celui qui existe aujourdhui. En effet, létude de larchitecture (philippienne) et du contexte historique (conquête de lAuvergne par le roi de France Philippe-Auguste jusquen 1213) conjuguée aux quelques sources textuelles et données archéologiques sur Billy laisse penser que la forteresse a été construite dès le début du XIIIe siècle subissant probablement, par la suite (et notamment après 1232), de plus ou moins grandes modifications. Après les guerres de religion en 1562-1598 le château tomba en ruines constitué de pierres grossièrement taillées;  la forteresse est protégée au nord et à l'Est, là où l'escarpement de la colline la met hors d'atteinte, les courtines  et la base des tours sont percées de longues archères et le châtelet d'entrée est protégé par un pont levis.  Restes du XIIIe siècle qui étaient liés à l'enceinte fermant la basse-cour du château.  L'enceinte principale est remarquable par sa forme ovoïde et surtout par sa tour de guet hexagonale, La Guette qui domine les maisons du bourg et les rues médiévales qui serpentent autour des murs du château. Le châtelet qui abrite l'entrée est toujours aussi imposant et une promenade aménagée sur la courtine sud offre un magnifique panorama.","habitants":"Duché de Bourbon\"","divers":"Vestiges du château féodal de Billy et portail du château Gaillard","gps":"","images":["../../jctruffet.com/image/image_03/03_Billy_1.jpg","../../jctruffet.com/image/image_03/03_Billy_2.jpg","../../jctruffet.com/image/image_03/03_Billy_3.jpg","../../jctruffet.com/image/image_03/03_Billy_4.jpg","../../jctruffet.com/image/image_03/03_Billy_5.jpg","../../jctruffet.com/image/image_03/03_Billy_6.jpg","../../jctruffet.com/image/image_03/03_Billy_7.jpg"]},"Consult_chateau_formulairef194":{"id":"Consult_chateau_formulairef194","dept":"03","canton":"Gannat","commune":"Biozat","nom":"Biozat","type":"Château","periode":"XV-XVII","histoire":"Deux châteaux à Biozat;  Fontnoble du XVIIIe siècle et Versannes du XIXe siècle néo-gothiques.                        FONT-NOBLE, pas d'information historique.\r\nVERSANNES, ce bel édifice, dans les années 50, était une maison de retraite pour les anciens combattants, une plaque a été trouvé: \"Au président Jean Volvey, fédération nationale des APG\".","architecture":"Fontnoble, cet ensemble, constitué d'une maison de maître du XVIIIe siècle et d'une exploitation rurale attenante, remplace une ancienne maison forte du XVe siècle dont il subsiste une tour ronde. Une porte moulurée à accolade remonte à la fin du XV siècle. Le logis actuel est un pavillon carré, attenant aux communs.  Les communs ont été aménagés en habitation au XVIIIe et ont conservé des vestiges de décors de rocaille. Vers 1860, l'ancien jardin à la française a été remplacé par un parc à l'anglaise.   Versannes,  C'est dans un grand et beau parc arboré que s'est installé le château des Versannes. La construction de briques date du XIXe siècle. Elle se compose d'un grand corps de bâtiment à deux niveaux dans le style néo-gothique. Deux échauguettes octogonales sur culot mouluré encadrent la porte d'entrée dont le linteau est en accolade et à laquelle on accède par un perron surélevé de quelques marches. Cette demeure serait pillée, abandonnée et en très mauvais état.","habitants":"Président Jean Volvey\"","divers":"Château de Versannes et de Font-Noble à Biozat","gps":"","images":["../../jctruffet.com/image/image_03/03_Biozat_1.jpg","../../jctruffet.com/image/image_03/03_Biozat_2.jpg","../../jctruffet.com/image/image_03/03_Biozat_3.jpg","../../jctruffet.com/image/image_03/03_Biozat_4.jpg","../../jctruffet.com/image/image_03/03_Biozat_5.jpg","../../jctruffet.com/image/image_03/03_Biozat_6.jpg"]},"Consult_chateau_formulaire340d":{"id":"Consult_chateau_formulaire340d","dept":"03","canton":"Montluçon","commune":"Lavault-Ste-Anne","nom":"Bisseret","type":"Château","periode":"XV","histoire":"BISSERET, à Lavault de Sainte-Anne, en plein cur du Bourbonnais, le château est habité par la même famille depuis près de quatre cent ans. Aujourd'hui  transformé  pour salle de de réception banquet etc.  par Mme Véronique de Place.","architecture":"Bisseret,   château formé d'un corps de bâtiment avec deux ailes en retour de dimensions inégales et deux bâtiments de  communs. Le château est entouré de douves en eau, et possède quatre tours d'angle sensiblement orientées aux  quatre points cardinaux. A l'entrée du pavillon central, ancien donjon, existait un pont levis supprimé en 1840, lors  de la surélévation de la toiture de cette façade et a été remplacé par un pont à deux arches. La façade orientée ouest possède une porte d'entrée pouvant être d'époque Renaissance. Elle s'ouvre sous un arc cintré et agrafé,  encadré de deux pilastres reposant sur une base élevée, et surmontés  de chapiteaux moulurés supportant  un entablement orné  de moulures. Sous le pavillon d'entrée s'ouvre un passage voûté en plein cintre conduisant au pont.  La tour sud possède une grille en fer forgé du XVIIIe siècle,  servant de rampe à l'escalier donnant accès à une porte du premier étage.","habitants":"Mme Véronique de Place.\"","divers":"Château de Bisseret à Lavault Ste-Anne","gps":"","images":["../../jctruffet.com/image/image_03/03_Bisseret_1.jpg","../../jctruffet.com/image/image_03/03_Bisseret_2.jpg","../../jctruffet.com/image/image_03/03_Bisseret_3.jpg","../../jctruffet.com/image/image_03/03_Bisseret_4.jpg","../../jctruffet.com/image/image_03/03_Bisseret_5.jpg"]},"Consult_chateau_formulaire1510":{"id":"Consult_chateau_formulaire1510","dept":"03","canton":"Herisson","commune":"Bizeneuille","nom":"Bizeneuille","type":"Château","periode":"XVIII","histoire":"Trois châteaux à Bizeneuille, de Bagnard du XVIIIe siècle chambres d'hôtes,  de Grand-Champs du XIXe siècle, et de la Mauvaisinière du XVI-XVIIIe siècle.       MAUVAISINIERE, dans un cabinet, à l'intérieur, se voient des restes d'un décor maçonnique. A peu   de distance, sur un autre éperon à possibilité défensive bien meilleures, et appelé la Tourlot ou Tourlu, existent   les vestiges d'un tombeau d'un Marsilly ancien possesseur du château de la Mauvaisinière, on peut se demander   si le château primitif ne se situait pas sur cette hauteur.                  GRANDCHAMPS, le château occupe un site médiéval fortifié avec des douves en eau. Aménagé en maison de plaisance sous le Premier Empire et embelli sous le Second Empire par l'adjonction d'un fronton sculpté par Valette en 1858.  Pas d'information d'historique.","architecture":"Bagnard,  corps de logis rectangulaire avec une tour ronde crénelée, et une autre, récente, hexagonale, Bagnard est situé sur une légère hauteur à l'emplacement d'un château beaucoup plus ancien. Ce dernier a été remanié au XVIIIe siècle et transformé en château d'agrément. Tout le bois à l'est du château et au sud de Grand Champ se dénomme Les   Mottes, appellation qui peut désigner ce château entouré de son fossé et installé sur sa motte.      Grand-Champ,   construction du XIXe siècle  véritable forteresse à l'origine, Grand-champ, de plan quadrangulaire, possède des tours carrées et crénelées, entourées d'une haute enceinte crénelée et soutenu de tours rondes. Un édifice avancé complétait le système défensif des douves et protégeait l'accès . C'est un grand logis de plan rectangulaire, à 2 niveaux de six travées, réparties symétriquement par rapport à la porte d'entrée quatre tours, 3 tours rondes à toits coniques élancés et une carrée accostent les angles du logis. Des lucarnes éclairent  les combles et un beau fronton triangulaire sculpté décorent, avec quelques cheminées de brique, toiture et façade.  L'ancien château , a lui-même succédé a une motte castrale, aujourd'hui disparue.\r\nMauvaisinière, est tapie au fond d'un ravin sauvage, cette maison forte des XVIe et   XVIIe siècles présente des bâtiments d'époques différentes et une tour ronde tardive. Les communs s'ordonnent autour de la première cour à laquelle on accède  par un beau porche daté de 1714, à voute à anse de panier, et  sur lequel est gravée une inscription  du \"maître masson Philippe Mandon\". Au-dessus de la porte piétonne est  représentée une clé armoriée.","habitants":"Seigneurs locaux\"","divers":"Château Bagnard, de Grand-Champs et de la Mauvaisière à Bizeneuille","gps":"","images":["../../jctruffet.com/image/image_03/03_Bizeneuille_1.jpg","../../jctruffet.com/image/image_03/03_Bizeneuille_2.jpg","../../jctruffet.com/image/image_03/03_Bizeneuille_3.jpg","../../jctruffet.com/image/image_03/03_Bizeneuille_4.jpg","../../jctruffet.com/image/image_03/03_Bizeneuille_5.jpg","../../jctruffet.com/image/image_03/03_Bizeneuille_6.jpg"]},"Consult_chateau_formulaire03ac":{"id":"Consult_chateau_formulaire03ac","dept":"03","canton":"Lurcy-Lévis","commune":"Couleuvre","nom":"Blancs_Fosses","type":"Château","periode":"XIV","histoire":"BLANCS-FOSSES,  fut intégrée aux terres des Bourbon, peut-être, suite du mariage d'Isabelle de Bourbon avec Geoffroy de Blancs-Fossés, chevalier. Devenue veuve en 1267 elle aliéna une partie des terres qu'elle vendit. En 1301 on rencontre une dame de Blansfossés, qui tient son  fief de Jehan de la Porte. En 1410 c'est Philippe de la Palice, chevalier, qui tient en fief du seigneur de Bourbon   le lieu fort et hostel de Blansfossés, avec la métairie  dudit lieu, à cause de sa femme, dame Agnete de la Pierre.  Toujours est il qu'en 1429, Charles comte de Clermont, donna à Jean Villars dit Barilhet, son écuyer d'écurie, à la suite des services rendus, le \"lieu, chastel et  forteresse de Blans-Foussés,   dame Annette de la Pierre, femme du seigneur de Chaseul et après elle Anthoine de  Lespinasse seigneur du dit Chaseul, son fils. En  1645, c'était Gabrielle de Villars qui s'intitulait dame de Blancs-Fossés. En 1621 les terres de Blancs-Fossés réunies à  celles de Champroux, étaient gouvernées par le lieutenant châtelain nommé  Gaspard Berthelon. En 1623, il était également  châtelain de Couleuvre. En 1665, Julien Thomas, sieur de Dumie, lui avait succédé à ces divers offices, Les Dumys. Blancs-Fossés  et Béguin  furent rattachés à la  seigneurie de Lévis.","architecture":"Blancs-Fossés, au nord-ouest, on trouve les ruines d'un château féodal sur motte du XIVe siècle. L'occupation du site est ancienne, puisque lors de fouilles en 1865, on a trouvé des restes de  bains avec des hypocaustes, des  tuyaux, des briques brûlées. Étaient enfouies des poteries et des médailles. Assis sur sa motte, le château était défendu par un large fossé en eau et au XIXe siècle, il avait encore l'allure d'une forteresse, avec des ponts-levis, des herses et  des tours mystérieusement menaçantes, trouées seulement de barbacanes et de créneaux.","habitants":"Famille de Philippe de la Palice         lieutenant Gaspard Berthelon\"","divers":"Château de Blancs-Fossées à Couleuvre","gps":"","images":["../../jctruffet.com/image/image_03/03_Blancs_Fosses_1.jpg","../../jctruffet.com/image/image_03/03_Blancs_Fosses_2.jpg"]},"Consult_chateau_formulairefe31":{"id":"Consult_chateau_formulairefe31","dept":"03","canton":"Lurcy-Lévis","commune":"Couzon","nom":"Bordes","type":"Château","periode":"XV","histoire":"BORDES, à appartenu à la famille de Montchevrin vers 1350, Marguerite, dame des Bordes  de Tillay 1350-1370, à la fin du XIVe siècle aux Ruffin, aux  de Beaucaire XVe siècle. Le bâtisseur du château avait sans doute été l'un de ses proches  ancêtres. En 1402, il était entre les mains de Pierre de Beaucaire  il resta dans cette famille jusqu'au début du XVIe siècle, en  1404 André de Beaucaire était l'époux de Bienvenue des Naulx ou des Noix, de Souvigny. C'est également à la cour de Souvigny, résidence favorite d'Anne Dauphine, qu'on retrouve un Bleynet de Beaucaire. En 1503 le \"sire des Bordes\" était l'un des quatre privilégiés à qui avait échu l'honneur de porter l'un des \"quatre coingts du  grand drap d'or\" du catafalque de Pierre II.  Passa aux Dernos en 1506.  En 1721, le fief était aux mains de Charles Machoudeau, avocat au parlement et à la Révolution, c'était le baron d'Aubigny ancien zouave pontifical, qui en était propriétaire, et en 1737 aux de Lagre. Aujourd'hui  propriété de la comtesse Jean de Chavagnac d'origine auvergnate descendue en Bourbonnais depuis la Révolution.","architecture":"les Bordes est un donjon composé d'une tourelle polygonale sur une face et d'une tour carrée sur l'autre. Il date sans doute de la fin  du XIVe siècle,  est un exemple caractéristique des petits châteaux du XVe siècle qui subsistent dans le Bourbonnais. Il est composé d'un donjon corps de logis de 16m sur 10m  à quatre étages, auxquels on accède par un escalier à vis, situé au nord  d'une tourelle octogonale. Des bâtiments sont situés  à droite et à gauche du donjon  et forment les ailes encadrant une cour. Deux tours sont situées à l'extrémité de ces ailes, celle de droite abrite une chapelle, celle de gauche, effondrée, un pigeonnier. A l'intérieur, les cheminées du XVe siècle ont été presque toutes revêtues au XVIIe siècle de boiseries peintes.","habitants":"Famille de Pierre de Beaucaire \"","divers":"Château de Bordes à Couzon","gps":"","images":["../../jctruffet.com/image/image_03/03_Bordes_1.jpg","../../jctruffet.com/image/image_03/03_Bordes_2.jpg","../../jctruffet.com/image/image_03/03_Bordes_3.jpg"]},"Consult_chateau_formulairec339":{"id":"Consult_chateau_formulairec339","dept":"03","canton":"Cusset","commune":"Bost","nom":"Bost","type":"Maison forte","periode":"XV","histoire":"BALEINE; A l'origine propriété d'une famille  portant le nom du lieu, Baleyne paraît  avoir été en possession de la famille de Mars. Déjà en 1298, Guichard de Mars possède des droits seigneuriaux dans la région, puisqu'il   achète à Guichard de Beaujeu des droits de justice et des terres dans la vallée du Mourgon et le territoire de Bost. En 1393, grâce à son mariage avec Marguerite de Baleyne, Guillaume de Mars peut porter le titre de seigneur de Baleyne. Mais en 1503 la famille de Mars a laissé la seigneurie à Gilbert de Pierrepont, écuyer, qui fait aveu à la duchesse de Bourbon pour sa \"maison et place forte de Balenne, tant en maisonnage, basse-cour, mouthe,  foussez que justice, haute, moyenne et basse\". Mais à partir du XVIIe siècle, nous retrouvons la famille de  Mars,     puis de Mars-Beaumont  comme nouveaux  seigneurs de Baleyne. Au XIXe, Baleine appartenait, avec Beaumont,   au marquis de Ribains.                       BEAUMONT, la Seigneurie de Beaumont fut possédée au XVIe siècle par la famille de Thil puis au début du XVIIe par Jacques de Mars frère du seigneur de Baleyne. Au début du XIXe siècle Beaumont  était la propriété du chevalier d'Orsay, puis fut acheté en 1850 par Colas de Chatelperron et passa par mariage au marquis de Ribains.  Les deux seigneuries, Baleyne et Beaumont appartenaient à la famille Mars.  C'est dans le manoir de Baleyne que Louis XI aurait séjourné le 16 juillet 1440 à la veille de la signature de la Paix de Cusset, mettant fin à la guerre de la Praguerie. Transformé en hôtel restaurant.","architecture":"Baleine se composait autrefois de deux pavillons flanqués de tours et reliés par des   bâtiments où s'ouvrait la porte d'entrée. L'un d'eux a disparu, sauf à l'angle ouest, quelques vieux pans de murs qui marquent peut-être l'emplacement de l'ancien donjon; le second a été remanié et seule la porte d'entrée,   avec  son énorme verrou, sa salle de veilleurs et les traces  de l'ancien pont-levis, conserve encore son caractère d'autrefois.                              Beaumont,  l'ancien château  a disparu. Il a été remplacé au début du XIXe siècle par une gentilhommière que fit construire le comte d'Orsay. Cette demeure a été  transformée en un petit château dans le style  des maisons fortes du XVe siècle. Le corps de logis, de plan rectangulaire et flanqué d'une petite tour en poivrière  et d'une tour ronde à encorbellement.  Le corps de logis de plan rectangulaire, se compose de deux étages. L'ensemble est recouvert de  toitures effilées qui lui confèrent une allure gracieuse et allègent la construction.","habitants":"Famille de Thil\"","divers":"Château de Beaumont, de Baleine à Bost","gps":"","images":["../../jctruffet.com/image/image_03/03_Bost_1.jpg","../../jctruffet.com/image/image_03/03_Bost_2.jpg","../../jctruffet.com/image/image_03/03_Bost_3.jpg","../../jctruffet.com/image/image_03/03_Bost_4.jpg"]},"Consult_chateau_formulaired0b7":{"id":"Consult_chateau_formulaired0b7","dept":"03","canton":"St-Pourcain-sur-Sioule","commune":"Laféline","nom":"Bouchat","type":"Maison forte","periode":"XIV","histoire":"BOUCHAT, au début du XIVe siècle, le fief est tenu par Pierre de Puychevalin damoiseau, auquel succédera  en 1353 son petit-fils prénommé Guillaume et peu après passe à la famille de la Condemine est restera  trois siècles, Hugues de la Condemine, seigneur des Aix, rendit hommage en 1375 pour son \"hostel fort\" du Bouchat. Ses descendants sont encore mentionnés seigneurs de ce fief vers 1550, mais un siècle plus tard, on voit Henri et son frère François de Salers vendre la seigneurie du Bouchat à Jean des Fontys qui en rend hommage pour le fief en 1652;  Charles qui lui succède est en 1664 capitaine et gouverneur des villes et château de Bourbon l'Archambaud, le passera à son fils André  officier dans l'armée royale comme capitaine  au régiment du Piémont, meurt sans postérité sa veuve convole avec Jean-Baptiste Gérondelle écuyer apporte le fief en dot.  La fille de celui-ci en hérita et la porta en mariage vers 1700  à Gilbert Boutet, seigneur de Sazeret. Ils la vendirent en 1708 à Antoine Thonier, curé du Theil.  À sa mort en 1723, il légua Le Bouchat a son neveu, Claude Thonnier qui sera le dernier seigneur du lieu. Une dernière vente consentie en 1864 par Saturnin Tavernier, notaire à Gannat, époux de Sophie Thonier, le fit passer aux mains du comte de St-Genys, ancêtre du propriétaire, le dernier propriétaire  le baron de Laître.","architecture":"Un château fort  de Bouchat existait en 1375. Au XVe siècle, le château devait être constitué d'un quadrilatère de bâtiments flanqués de tours et encadrant une petite cour. Il n'en reste que le corps d'entrée et ses deux tours, reliées par une ligne de mâchicoulis.  On accède à la cour intérieure  par un pont à trois arches qui a remplacé le pont-levis au siècle dernier. Une aile a été reconstruite sur un second côté du quadrilatère. A l'intérieur de la partie ancienne, quatre cheminées ornent les salles et les chambres, dont certaines portent des traces d'un décor peint.","habitants":"Famille de Hugues de la Condemine\"","divers":"Château de Bouchat à Lafeline","gps":"","images":["../../jctruffet.com/image/image_03/03_Bouchat_1.jpg","../../jctruffet.com/image/image_03/03_Bouchat_2.jpg","../../jctruffet.com/image/image_03/03_Bouchat_3.jpg","../../jctruffet.com/image/image_03/03_Bouchat_4.jpg","../../jctruffet.com/image/image_03/03_Bouchat_5.jpg","../../jctruffet.com/image/image_03/03_Bouchat_6.jpg"]},"Consult_chateau_formulairea11d":{"id":"Consult_chateau_formulairea11d","dept":"03","canton":"Montet","commune":"Treban","nom":"Boucherolles","type":"Maison forte","periode":"XVI","histoire":"BOUCHEROLLES,  est une seigneurie connue au XIV siècle, puisqu'en 1380, le damoiseau Pierre de Chamberlain rend  hommage, au seigneur de Bourbon pour son hostel, avec les domaines et les droits qui en dépendent.  Au XVIe siècle, un sieur de Boucherolles, en la paroisse de Tréban, comme  seigneur justicier  et vassal de la châtellenie de Verneuil.  Dans la commune le château dit de Zeros, aujourd'hui haras et élevage de Chevaux.  Château du Roc, pas d'information historique.","architecture":"Boucherolles; maison forte de la fin du XVIe siècle,  le château présente un corps de logis rectangulaire flanqué, côté ouest, de deux tours rondes et accompagné d'un bâtiment de communs et d'un pigeonnier. Le commun consiste en un corps de bâtiment rectangulaire avec une tour d'angle nord-ouest et une autre à l'angle sud-est. La construction actuelle remplace, à la fin du Moyen-Age, la forteresse primitive, mais a conservé les deux tours rondes, à toits coniques, qui flanquaient, aux angles, le corps de logis. Au sud-ouest, sétend un jardin à la Française du XVIe siècle.","habitants":"Famille de Pierre de Chamberlain\"","divers":"Château de Boucherolles et de Zeros à Treban","gps":"","images":["../../jctruffet.com/image/image_03/03_Boucherolles_1.jpg","../../jctruffet.com/image/image_03/03_Boucherolles_2.jpg","../../jctruffet.com/image/image_03/03_Boucherolles_3.jpg","../../jctruffet.com/image/image_03/03_Boucherolles_4.jpg","../../jctruffet.com/image/image_03/03_Boucherolles_5.jpg","../../jctruffet.com/image/image_03/03_Boucherolles_6.jpg","../../jctruffet.com/image/image_03/03_Boucherolles_7.jpg","../../jctruffet.com/image/image_03/03_Boucherolles_8.jpg"]},"Consult_chateau_formulaire194d":{"id":"Consult_chateau_formulaire194d","dept":"03","canton":"Bourbon-l`Archambault","commune":"Franchesse","nom":"Bouquetraud","type":"Château","periode":"XIX","histoire":"BOUQUETRAUD, Franchesse fut le siège d'une importante seigneurie, celle de Bouquetraud.  en  1300,  Guillaume de Bosctureau, \" chevalier \" et de Jaufray de Bosctureau, aussi chevalier, cette famille seigneuriale primitive disparut sans doute à la mort de Hugues de Bosquotoraul. Il fut, en 1366, victime d'une guerre féodale: il se rendait à Moulins en compagnie de sa femme et d'un ami, Renaud de la  Monte écuyer, quand leur petite troupe fut attaquée par Goussault de Thoury, Arpin d'Origny et Pierre Troussebois. En 1370, c'était Pierre de Giac, chevalier, chancelier du Bourbonnais qui portait le titre de sieur de Bouquetraut. La succession de ce dernier, qui possédait des terres en Nivernais, fort convoitées, fut difficile. En 1482 c'est encore Pierre de Giac qui est seigneur de Bousquetural et de Joy, mais à la fin du XVe, Bouquetraud était dans les mains d'une famille Mareschal, qui la conserva jusqu'à la Révolution. En février 1631 Gilbert Desboraux, écuyer, seigneur de Beaulon et Torcy, et  de Franchesse. Au XVIIIe, Honorat Mareschal mort en 1716, était toujours seigneur de Franchesse. A la fin du XVIIIe siècle on ne trouve plus mention que des fermiers de la seigneurie de Bouquetraud.                       Dans la commune le château de Vary.","architecture":"Bouquetraud, situé au nord est, le château féodal fut remanié à la fin du XIXe siècle. Les douves subsistent. Corps de logis rectangulaire à deux niveaux et attiques flanqués de deux pavillons rectangulaires aux extrémités.","habitants":"Famille de Bouquetraud \"","divers":"Château de Bouquetraud et de Vary à Franchesse","gps":"","images":["../../jctruffet.com/image/image_03/03_Bouquetraud_1.jpg","../../jctruffet.com/image/image_03/03_Bouquetraud_2.jpg","../../jctruffet.com/image/image_03/03_Bouquetraud_3.jpg","../../jctruffet.com/image/image_03/03_Bouquetraud_4.jpg"]},"Consult_chateau_formulairecb7c":{"id":"Consult_chateau_formulairecb7c","dept":"03","canton":"Bourbon-l`Archambault","commune":"Bourbon-l`Archambault","nom":"Bourbon_Archambault","type":"Vestiges","periode":"XIII","histoire":"BOURBON-l'Archambault, château des ducs de Bourbon est le fief premier berceau de la dynastie des Bourbons, au Moyen-Age, en 1272 mariage de Béatrice de Bourgogne  avec Robert de Clermont, fils de Saint-Louis, qui fait reconstruire le château en 1288, ce château était une importante forteresse dont la construction s'est échelonnée du XII-XVe siècle. Il servit, autrefois, essentiellement à la défense militaire. Les constructions subsistantes remontent à la fin du XIIIe siècle. Les travaux furent poursuivis sous les ducs Louis Ier, Pierre Ier, Louis II et Pierre II. Le duché de Bourbon est réuni à la couronne, en 1589 Henri de Bourbon, roi de Navarre, devient roi de France sous le nom d'Henry IV. Après le XVIe siècle le château fut abandonné et tomba progressivement en ruines, bien qu'un chapitre veillat  à la conservation des saintes reliques apportées à Bourbon par Robert de France, sixième fils  de Saint-Louis.  Le bâtiment fut confisqué durant la Révolution de 1789 et fut revendu comme bien national vers 1794. En 1832, le poète régional, Achille Allier  écrivain bourbonnais, sauva de la destruction les trois tours du nord et la salle qui les précède, seuls témoignages actuels. Bourbon l'Archambault est aussi une station thermale moderne, dont les eaux sont efficaces pour les rhumatismes. Le \" Logis du Roy \" et le grand établissement thermal ont été rénovés. Un nouveau centre du mouvement soigne selon les techniques allemandes de rééducat
