anqué d'une chapelle rectangulaire. Une dernière tour médiévale sud,  elle est munie de meurtrière largement ébrasées vers l'extérieur.                     Longeville, du XVIIIe siècle, corps de logis rectangulaire à deux niveaux toitures en croupes avec attiques.","habitants":"Seigneurs  locaux\"","divers":"Château de Bouillet, de la Chapette  et de Longeville au Deux-Chaises","gps":"","images":["../../jctruffet.com/image/image_03/03_Deux_Chaises_1.jpg","../../jctruffet.com/image/image_03/03_Deux_Chaises_2.jpg","../../jctruffet.com/image/image_03/03_Deux_Chaises_3.jpg","../../jctruffet.com/image/image_03/03_Deux_Chaises_4.jpg"]},"Consult_chateau_formulaire0104":{"id":"Consult_chateau_formulaire0104","dept":"03","canton":"Montluçon","commune":"Domerat","nom":"Domerat","type":"Château","periode":"XVII-XIX","histoire":"Trois châteaux à Domérat,  Brignat du XIXe siècle, Pérelle et Vignoux du XVIIe siècle.                                   BRIGNAT, reconstruit au XIXe siècle par la famille Guilhomet et passé ensuite par alliance aux familles d'Horrer et de Maussion de Candé, qui s'en séparent dans les années 1960. Actuel centre Jean-Nègre, appartenant à la ville de Montluçon. La terre de Brignat semble avoir appartenu assez longtemps à la famille de Culant jusquà la fin du XVIIe siècle ou au début du XVIIIe où en est possesseur noble François de Culant, sieur de Brignat, et demoiselle Marie de Brignat son épouse. Leur fille et seule héritière, Françoise de Culant, veuve de Pierre du Cluzier, écuyer, vend  en novembre 1698, à Nicolas Berthet, greffier en chef au bureau des traites foraines de Montluçon lhéritière des Berthet, Anne Cornereau, épouse de Pierre Estopy des Vignets, procureur  à Moulins, vendit , la terre de Brignat à Jean-Baptiste Guilhomet, marchand-fermier, et à son épouse Anne Frestier. Ayant pris possession de Brignat le 12 juin 1773, Jean-Baptiste Guilhomet agrandit son domaine par lacquisition aux même  Estopy des Vignets. C'est vers 1856-1859 que le château actuel de Brignat fut construit par Léonce Jean-Baptiste Guilhomet. Après le décès de sa fille Marie, veuve du comte Arsène d'Horrer, la propriété fut vendue au XXe siècle par les héritiers, les familles d'Horrer et de Maussion de Candé.                     PERELLE, petit musée doutillage viti-vinicole local retraçant la vie rurale du Bourbonnais et ayant comme thème principal, les vignobles des environs de Montluçon. Une grande diversité de matériels et d'outillages de travail est présentée dans les anciennes écuries du château de la Pérelle.  Centre de loisirs et chambres d'hôtes.              VIGNOUX, pas d'information historique, aujourd'hui transformé en hôtel restaurant.","architecture":"Brignat, construit  en remplacement de l'ancienne demeure détruite par un incendie, demeure plus petite et située un peu en avant de l'actuelle.       Vignoux édifié  à l'emplacement d'une forteresse plus ancienne, remontant au XIIIe siècle, le château  a été modifié au cours du XVIIIe siècle par l'agrandissement des baies. Seule l'aile des communs a conservé ses proportions d'origine, le château se compose d'un corps de bâtiment allongé avec deux petites ailes en retour sur  le côté cour. Deux tours circulaires encadrent  le corps de logis principal  qui témoignent de l'ancienne destination défensive de l'édifice.  A l'intérieur la chambre d'Hercule conserve une cheminée en bois et des boiseries, le grand salon est entièrement   recouvert de boiseries  dans un style rappelant celui du XVIIIe siècle. A l'est,  une vaste terrasse est plantée d'un jardin créé au début du XXe siècle, inspiré du goût italien, ce bâtiment présente une forme d'habitation rurale dont il est rare de trouver des exemples aussi bien conservés.","habitants":"Famille Guilhomet                      Famille de Culant \"","divers":"Château de Brignat, de Vignoux  et de Perelle à Domerat","gps":"","images":["../../jctruffet.com/image/image_03/03_Domerat_1.jpg","../../jctruffet.com/image/image_03/03_Domerat_2.jpg","../../jctruffet.com/image/image_03/03_Domerat_3.jpg"]},"Consult_chateau_formulaire4171":{"id":"Consult_chateau_formulaire4171","dept":"03","canton":"Dompierre-sur-Besbre","commune":"Dompierre-sur-Besbre","nom":"Dompierre","type":"Château","periode":"XVI-XIX","histoire":"Trois châteaux à Dompierre sur Besbre château de la  Bergerie du XIXe siècle, de Chambonnet du XVIe siècle  et de la Croix du XIXe siècle hôtel de ville.                           BERGERIE, dominant les confluents de la Besbre et du Roudon, La Bergerie est un château construit au XIXe siècle, par M. Delvaux sur une propriété où les moines élevaient des moutons. Cet édifice a remplacé un ancien domaine  dépendant  de l'abbaye de Sept Fons.   En 1503 déjà, La Bergerie était le siège d'un fief et Claude Conchon, écuyer, est dit seigneur de La Bergerie. Il  fait alors aveu à la duchesse de Bourbon d'un petit fief contenant  en la châtellenie de Belleperche. Dommage que le château ne soit plus entretenu et tombe petit à petit en ruines.                 CHAMBONNET, le fief de Chambonnet est connu depuis la fin du XIVe siècle. En 1396, Perrin Brocal est dit seigneur de Chambonnet. En 1439, la seigneurie appartient à Jehan le Bastard de l'Espinasse et en août  1501 Gilbert de Lespinasse donne foi et honneur pour Chambonnet, au duc de Bourbon.  Dès 1556, Chambonnet  entra dans les possessions  de la famille des Marcellanges,   déjà connus dans le Bourbonnais.   En mars 1573, René de Marcellanges participa à une expédition meurtrière connue par ailleurs, avec trois gentilhommes, il se rendit au château de Chausssin à Abrest pour assassiner le seigneur du lieu, François de Senneret, qui avait, quelque temps auparavent, lui même assassiné son épouse Anne d'Augerond.\r\nLa CROIX, maison bourgeoise construite en 1879, par Edouard Defaye, notaire de Dompierre, le château de La Croix  reçoit   aujourd'hui les services de l'hôtel de ville.","architecture":"Bergerie, cette demeure comporte un long corps de logis rectangulaire flanqué de  deux tours rondes  aux angles de la façade sud-est, et deux petites tours carrées  à peine saillantes dominent l'autre face, les murs sont recouverts d'un enduit sur lequel se détache le harpage des ouvertures et des angles ainsi que la corniche en pierre blanche.  Chambonnet  est une grosse tour, bâtie en briques, aux murs assez minces et n'eut probablement jamais de but défensif et rappelle par ses proportions et son décor la tour de Couffour , dont elle doit être sensiblement contemporaine (seconde moitié du XVIe siècle). La tour qui servait d'habitation,  était desservie par un petit escalier à vis  logé dans sa propre tourelle, accolée à la tour principale. L'ensemble comporte quatre niveaux, couronnés par des toitures en poivrière. Le dernier étage de la grosse tour est occupé par une galerie ouverte sur l'extérieur, formée de simples piliers de briques. Faut-il voir dans cet espace un lien de surveillance de la campagne environnante, ou une pièce d'agrément rappelant les loggias italiennes,  peut-être les deux à la fois. Chaque niveau est occupé par une pièce circulaire et au premier étage, des vestiges de peintures murales se rattachent nettement au type de décor conservé au château de Chareil Cintrat, nous y  retrouvons les mêmes vers latins concernant les dieux de la mythologie, transcrits au-dessus de scènes   difficilement lisibles dans les deux cas. \r\nLa Croix,   c'est un long bâtiment rectangulaire, à rez de chaussée surélevé, éclairé de larges fenêtres. Deux pavillons carrés en légère saillie, sont accolés aux angles de la façade. Le jardin avait été dessiné par Treyve de  Moulins.","habitants":"Famille de  M. Delvaulx                                                            Famille d'Edouard Defaye\r\n        \"","divers":"Château de la Bergerie,  de Chambonnet et de la Croix à Dompièrre sur Besbre","gps":"","images":["../../jctruffet.com/image/image_03/03_Dompierre_1.jpg","../../jctruffet.com/image/image_03/03_Dompierre_2.jpg","../../jctruffet.com/image/image_03/03_Dompierre_3.jpg","../../jctruffet.com/image/image_03/03_Dompierre_4.jpg","../../jctruffet.com/image/image_03/03_Dompierre_5.jpg","../../jctruffet.com/image/image_03/03_Dompierre_6.jpg"]},"Consult_chateau_formulairede24":{"id":"Consult_chateau_formulairede24","dept":"03","canton":"Le Donjon","commune":"Le Donjon","nom":"Donjon","type":"Château","periode":"XV-XVI","histoire":"Trois châteaux à  le Donjon;  Contresol du XIXe siècle, du Plessis du XVI-XIXe siècles et du Plantais du XV-XIXe siècles.                           CONTRESOL, entra au milieu du XVIe siècle dans les possessions de la famille Jacquelot par le mariage,  en 1543, de Loys Jacquelot avec Anna Maréchal. Elle appartient toujours a cette famille. PLANTAIS, ce  fief de Guillaume Broutaing en 1435, le château passa au début du XVIe siècle, par héritage, aux Chanciaulx. En 1538, Jean de Damas rend aveu de la seigneurie des Plantais, En 1594, elle passe aux Buffevent et en 1618,par mariage, aux d'Augerolles. C'est à ces derniers qu'Antoine Préveraud (ancêtre de l'actuel propriétaire) acheta les Plantais en 1684. Vendus en 1792, les Plantais furent rachetés en 1810 par une dame de la Boutresse, qui les réintégra dans la famille Préveraud. L'édifice du XVe siècle, remanié au XVIIIe, fut restauré dans le style néo-gothique par l'architecte moulinois Jean Moreau, vers 1875 , ici naquit Honoré Préveraud, compagnon d'exil de Victor Hugo.\r\nPLESSIS , édifié en 1497,  Geoffroy Aubery, propriétaire du château vers 1553, cette belle construction   appartenait à la famille Gantheret. Elle est aujourd'hui siège de la mairie.","architecture":"Contresol se composait de quatre corps de logis formant carré, entourant une cour où donnaient cinq tours d'escalier et eux mêmes enceints de fossés sur lesquels était jeté à l'ouest, un pont-levis. Le Vieux Contresol, ancien manoir remanié vers 1750 est composé de trois corps  de logis entourant  une petite cour carrée dont  le quatrième côté est formé par  une bâtisse du XIXe siècle. Le château neuf   de style néogothique, construit entre 1881 et 1891 s'inspirant principalement de l'aile Louis XII du château de Blois. Le plan en L  présente une tour porche dans l'angle et un donjon circulaire. Chaque aile,  délimitée par des murs pignons,  est dotée de parements polychromes à décor flamboyant.  Le décor sculpté est dû  à Joseph Génermont. Le parc possède  une glacière à voûte inversée.                              Plessis  au château s'ajoute un système défensif avec une tour carrée comportant deux chemins de ronde intérieurs éclairés d'archères ; la tour d'escalier au sud se termine par des mâchicoulis couverts sur consoles formant un chemin de ronde intérieur. Des contreforts ronds en forme d'échauguette protègent les angles du logis. A l'extérieur, subsistent les deux tours qui flanquaient le pont-levis.  Le corps de bâtiment, à deux niveaux et niveau de comble, est assis sur une terrasse, bordée de balustres et coiffé  de toits à la Mansart, l'accès par l'escalier central s'ouvre sur un avant corps en forme de tour hexagonale, engagée dans la maçonnerie et surmontée d'une terrasse à balustres. \r\nPlantais, l'édifice du XVe siècle, remanié au XVIIIe siècle, fut restauré dans le style néo-gothique , vers 1875. C'est un corps de logis rectangulaire à rez de chaussée surélevé, étage et niveau de comble. Il est éclairé par de belles fenêtres à meneaux et coiffé d'un toit d'ardoise, éclairé par des lucarnes à pignon, encadrées de pinacles. La façade postérieure est flanquée dans les angles de deux grosses tours rondes, alors que la façade principale est encadrée de deux fines tourelles dont une moitié seulement repose sur le sol, l'autre étant en surplomb. Un escalier à deux volées courbes convergentes et garde corps ajouré donne accès à deux portes fenêtres.","habitants":"Famille Jacquelot                       Famille Préveraud                       Famille Gantheret.\"","divers":"Château de Contresol, du Plessis  et du Plantais à le Donjon","gps":"","images":["../../jctruffet.com/image/image_03/03_Donjon_1.jpg","../../jctruffet.com/image/image_03/03_Donjon_2.jpg","../../jctruffet.com/image/image_03/03_Donjon_3.jpg","../../jctruffet.com/image/image_03/03_Donjon_4.jpg","../../jctruffet.com/image/image_03/03_Donjon_5.jpg","../../jctruffet.com/image/image_03/03_Donjon_6.jpg","../../jctruffet.com/image/image_03/03_Donjon_7.jpg"]},"Consult_chateau_formulaire31d8":{"id":"Consult_chateau_formulaire31d8","dept":"03","canton":"Chantelle","commune":"Etroussat","nom":"Douzon","type":"Château","periode":"XV-XVIII","histoire":"Deux châteaux à Etroussat, Douzon du XV-XVIIIe siècle et Ceuillat.          DOUZON  au XIVe siècle la famille d'Avenières possèdait un château fort, Jean d'Avenières  chevalier, par alliance passa au Châteauneuf qui le posséda avec les  Rochedragon qui en deviennent propriétaire et seigneurs de Puymaisignat en Combraille. toujours par alliance passa aux Chaussecourte avant de venir, par Gasparde de Chaussecourte, à Jean de la Buissière, écuyer seigneur du Chalard, leur fille  Peronnelle de la Bussière apporte par alliance à Jean Paul Audier de la Chazotte seigneur de Bidignat et de la Chazotte leur petite fille Madeleine Aimée Audier de Bidignat épouse en 1625 Symphorien  Morin d'Arfeuille, écuyer, à la mort du dernier en 1700 la fille Jeanne épouse  Philibert de Buysson, conseiller du roi qui fait reconstruire le nouveau château l'ancienne demeure féodale  ravagée quelques années plus tôt par un incendie, et le domaine passe en comté en faveur de François Sénétaire  du Buysson mousquetaire du roi. En 1774 le domaine est acquis par Louis Girard de Charbonnière seigneur de Rozet capitaine  aide-major aux grenadiers royaux  de Charbonnières, de nouveau acquis en 1803 par Jacques Loizel conseiller général de l'Allier, ancêtre des propriétaires actuels la famille de la Vicomtesse de Thoisy.                                 CUEILLAT, dont une famille porte le nom dès cette époque. En 1332, Jean de Culhat, damoiseau, seigneur de Culhat, rendit foi et hommage au comte de Forez,   pour ses maisons de Culhat et d'Ussel, ainsi que pour la prévôté d'Étroussat, avec mottes, fossés, terres et autres profits.  En 1351 Perrin de Moyenpuy,  nouveau seigneur de Cueillat,  fit aveu des mêmes fiefs.  En 1503 ce sont deux frères, Anthoine et Georges Desniers, qui reconnaissaient   tenir en fief   de la duchesse de Bourbon, leur maison de Culhant en la paroisse d'Étroussat.  Les Audin d'Eschaloux leur succédèrent comme seigneurs de Cueillat, et en 1507, Hugonin d'Eschaloux, écuyer, a donné à cens son \"hostel de  Culhat\" aux surs Blanchard mariées avec Jacques et Pierre Rolland, écuyers. En 1506, cette terre de Cueillat était, semble-t-il, rattachée à la seigneurie de Douzon, car les Chaussecourte en étaient alors propriétaires.","architecture":"Douzon édifié en 1730 comprend deux châteaux distincts. Des vestiges de l'ancien château du XIVe siècle subsistent le donjon et une tour ronde. Suite à l'incendie du précédent, un château est édifié au XVIIIe siècle sur les plans de l'architecte Clément. Il se compose d'un corps de logis rectangulaire comportant deux niveaux et d'une toiture à versants droits percés d'oeil-de-boeuf, et de deux ailes en retour comprenant un rez-de-chaussée et un comble à la Mansart. Autrefois,  présence de parterres à la Française.  Ce logis du XVIIIe siècle  présente un donjon carré à guette  (tourelle construite au sommet d'un édifice où se tenait un guetteur)  du XIIe siècle, typique de l'architecture militaire bourbonnaise, ainsi qu'une esplanade encadrée de tilleuls.   Cueillat maison forte du XIVe siècle avec motte et fossés, et certainement pont-levis  comprenant une bâtisse de forme rectangulaire accolée à un donjon  carrée à deux niveaux de toitures en croupes prolongement d'une aile jusqu'à une tour carrée.","habitants":"Famille d'Avenières\"","divers":"Château de Douzon, de Cueillat, de Pacauds à Etroussat","gps":"","images":["../../jctruffet.com/image/image_03/03_Douzon_1.jpg","../../jctruffet.com/image/image_03/03_Douzon_2.jpg","../../jctruffet.com/image/image_03/03_Douzon_3.jpg","../../jctruffet.com/image/image_03/03_Douzon_4.jpg","../../jctruffet.com/image/image_03/03_Douzon_5.jpg","../../jctruffet.com/image/image_03/03_Douzon_6.jpg","../../jctruffet.com/image/image_03/03_Douzon_7.jpg","../../jctruffet.com/image/image_03/03_Douzon_8.jpg","../../jctruffet.com/image/image_03/03_Douzon_9.jpg"]},"Consult_chateau_formulaire631a":{"id":"Consult_chateau_formulaire631a","dept":"03","canton":"Montmarault","commune":"Doyet","nom":"Doyet","type":"Maison forte","periode":"XV","histoire":"A Doyet quatre châteaux  d'Ancinet du XVe siècle, de Chassignole du XV-XIXe siècles avec donjon, de la Souche du XVe siècle donjon enceinte et de  Bord-Pechins du XVe siècle.              ANCINET, le sieur d'Ancinet était  vassal de la châtellenie d'Hérisson, le plus ancien possesseur connu serait un Raoul d'Ancinet. Au début du XVe siècle, le château passe à la famille de Chers, puis au XVIIe siècle, à Gilbert du Bois, écuyer seigneur d'Ancinet, du Coudray, du Bois. En 1697, Gilbert de Villars est seigneur d'Ancinet.  A la révolution, ses tours et ses murs d'enceinte sont détruits, racheté en 1970 par M. Delbard il est maintenant  restauré avec chambres d'hôtes.                                  BORD-PECHINS, du XVe siècle,était le centre d'une seigneurie qui englobait plusieurs domaines et métairies. CHASSIGNOLE. Outre Gilbert de Courtais, le représentant le plus connu de cette famille est le fameux général du peuple, qui résida et finit ses jours à La Chassignole. inquiété sous le règne de Napoléon pour ses idées libérales, il devint maire de Doyet. A sa mort, ses biens passèrent à son neveu le vicomte Pailloux qui les légua à des établissements de charité.               La Chassignole reveint à son parent, le Comte de Bodinat, dont les descendants sont les actuels propriétaires du lieu.   SOUCHE, mariage d'Isabelle de La Souche avec Gilbert de Courteix. fief des ducs de Bourbon tenu par un damoiseau de ce nom qui passera par alliance à Jean de Murat seigneur de Beaumont et fait retour à la famille de la Souche. En 1505  Charles et Jean de la Souche et de Varennes entre dans la famille par une alliance avec les La Roche-Raoul. Au XVIIe siècle Isabeau de la Souche épouse en 1624 Gilbert de Courtais fils d'un gentilhomme  de Charles de Lorraine, duc de Guise. Restera dans cette famille jusqu'à la fin du XIXe siècle, à la mort du dernier des cette lignée , la Souche passe par héritage au comte de Bodinat capitaine de cavalerie et le cède en 1900 à l'hospice de Lavault Sainte-Anne, et aujourd'hui la famille Roche mène à bien la restauration du château.","architecture":"Ancinet,  au XVe siècle, se dresse sur un monticule rocheux dominant la vallée de l'Oeil. Manoir  de plan rectangulaire, flanqué de deux tours à l'angle nord et à l'angle ouest, et d'une tour d'escalier au milieu de la façade sud-est.       Bord-Pechins,  du  XVe siècle, l'édifice d'architecture militaire est constitué de deux corps de logis enfermant une cour carrée, elle-même entourée de douves.  pont-levis remplacé par un pont en dur. Une seconde série de douves enfermait l'ensemble à environ cent mètres du château. La tour d'entrée, aboutissement du pont, marque une séparation entre les deux parties du château. La partie nord comporte le corps de logis. Son extrémité ouest est formée par une tour rectangulaire. Accolée au sud-est du bâtiment  une grosse tour carrée .  \r\nChassignoles, au Moyen-Age,  premier château sur la motte, système fortifié le château fort est cité en 1569, il n'en reste que quelques vestiges. L'actuelle résidence est constituée d'un corps de logis rectangulaire à deux étages, coiffé d'une haute toiture à quatre pans et complété par un bâtiment en retour d'équerre.                         Souche, du  XVe siècle système fortifié complexe, englobant une enceinte extérieure flanquée de tours, ceignant une basse-cour et creusée d'une mare pavée circulaire servant de réserve d'eau au Moyen-Age. Cette enceinte était garnie à l'origine d'une entrée à pont-levis. Le château-donjon est doté d'une première enceinte plus réduite, flanquée de quatre tours circulaires entourant une braie et défendue par des douves à l'origine franchies par un pont-levis remplacé aujourd'hui par un ouvrage maçonné. En façade, une tourelle carrée demi hors oeuvre contient l'escalier à vis.","habitants":"Famille de Chers                     Famille de Gilbert de Courtais\"","divers":"Château d'Ancinet, de Bord Peschins, de Chassignoles et de la Souche à Doyet.","gps":"","images":["../../jctruffet.com/image/image_03/03_Doyet_1.jpg","../../jctruffet.com/image/image_03/03_Doyet_2.jpg","../../jctruffet.com/image/image_03/03_Doyet_3.jpg","../../jctruffet.com/image/image_03/03_Doyet_4.jpg","../../jctruffet.com/image/image_03/03_Doyet_5.jpg","../../jctruffet.com/image/image_03/03_Doyet_6.jpg","../../jctruffet.com/image/image_03/03_Doyet_7.jpg"]},"Consult_chateau_formulaireb9b8":{"id":"Consult_chateau_formulaireb9b8","dept":"03","canton":"Ebreuil","commune":"Ebreuil","nom":"Ebreuil","type":"Château","periode":"XV-XVIII","histoire":"Trois  châteaux à Ebreuil, le Chatelard du XII-XV-XIXe siècle, la Grave du XVII-XVIIIe siècle, et Marcillat. A quelques Kilomètres au nord le château de l'Ormet à Volignat chambres d'hôtes, du XVIIIe siècle.                           CHATELARD qui appartient à la famille du Châtelard,  bâti au XIVe siècle, remanié à plusieurs reprises depuis lors, il est acquis par Jacques Pelissier de Féligonde en 1768, il est toujours la propriété de la famille de Féligonde. Gites de France.\r\nLa GRAVE, en 1369 Jean batard de Bourbon, chevalier seigneur de Rochefort, possédait le château d'Ebreuil. Il avait reçu de Louis, duc de Bourbon, \"le chastel et chastellenie de Rochefort, avec toute justice, haute, moyenne et basse et aussi  le chastel et manoir de Esbreille. Car en 1443, c'est l'abbé Pierre de la Rochebriand qui détenait la ville,  lequel, à l'époque, appartient à la famille de Veauce. Une famille de la Grave apparait au cours du XVIe siècle et possédait la terre de La Grave au XVIIe siècle. En 1755, l'abbé d'Ebreuil, Aldonce de Sade, acheta le château et le domaine de La Grave à Suzanne de la Grave. Acquit par  Edouard Potrolot de Grillon devint alors propriétaire de La Grave en 1762 et il fut désigné maire d'Ebreuil en 1790. Acheté en 1968, le château de La Grave est actuellement la propriété du docteur Boucomont.\r\nORMET à Volignat dit le Castel ferrovière  du XVIIIe siècle, trois réseaux de trains réduit dans le parc . Transformé en chambres d'hôtes par la famille Laederich, pas d'informations historiques.","architecture":"Chatelard, du XIV-XVe siècle, le  château primitif a disparu  et a été remplacé par une construction du XVIIIe siècle. Le château avec des communs importants, se compose d'un corps de logis de plan barlong, à trois niveaux et niveau de comble. La façade, un peu sévère, est percée de trois  ouvertures à chaque niveau et de trois lucarnes en toiture. Deux avant-corps en forme de tours carrées, prises en oeuvre aux angles sud et couvertes de toits élancés en pavillon, lui donnent l'allure d'un petit château. Les communs et un second logement qui occupent   un grand bâtiment rectangulaire accolé à la façade ouest du corps principal, sont enfermés dans une vaste  cour rectangulaire.  Il s'agit d'une construction à chevet plat et à charpente apparente, qui s'appuie contre une tour ronde, certainement très antérieure, dérasée à la Révolution, vestige de l'ancien système défensif qui entourait le château. Un élément de chemin de ronde perpendiculaire à la façade nord-ouest du château et se terminant par une tour carrée, remonte au Moyen-Age. La façade sud-est du château a été entièrement refaite au XIXe siècle, mais elle conserve à l'angle sud une tour ronde d'époque médiévale et au nord-est d'une tour carrée.                      La Grave, le château avec des communs importants, se compose d'un corps de logis de plan barlong, à trois niveaux et  niveau de comble. La façade, un peu sévère, est percée de trois ouvertures à chaque niveau et de trois lucarnes en toiture. Deux avant-corps en forme de tours carrées, prises en oeuvre aux angles sud et couvertes de toits élancés en pavillon, lui donnent l'allure d'un petit château. Les communs et un second logement qui occupent   un grand bâtiment rectangulaire accolé à la façade ouest du corps principal, sont enfermés dans une vaste  cour rectangulaire.  \r\nOrmet, corps de logis rectangulaire à deux niveaux et attiques toiture à la mansard tour carrée.","habitants":"Famille du Châtelard                  Famille de Veauce\"","divers":"Château du Chatelard, de Marcillat et de la Grave à Ebreuil  et d'Ormet à Volognat.","gps":"","images":["../../jctruffet.com/image/image_03/03_Ebreuil_1.jpg","../../jctruffet.com/image/image_03/03_Ebreuil_2.jpg","../../jctruffet.com/image/image_03/03_Ebreuil_3.jpg","../../jctruffet.com/image/image_03/03_Ebreuil_4.jpg","../../jctruffet.com/image/image_03/03_Ebreuil_5.jpg","../../jctruffet.com/image/image_03/03_Ebreuil_6.jpg","../../jctruffet.com/image/image_03/03_Ebreuil_7.jpg"]},"Consult_chateau_formulairec782":{"id":"Consult_chateau_formulairec782","dept":"03","canton":"Souvigny","commune":"Souvigny","nom":"Embourg_Matray","type":"Château","periode":"XVIII","histoire":"EMBOURG, il fut la propriété de la famille Milles, une famille de juristes de Souvigny.  Jean Milles est cité en 1430  dans une information  du château de Souvigny  en 1471. Jean, magistrat, naquit à Souvigny à la fin du XVe siècle, et mourut en 1553. Vers 1644, le château appartenait à Jean de Ninerolles, écuyer, seigneur d'Embourg et de Le Treul, fondateur de collège de Souvigny dont la cloche fut bénite sous le nom de Jeanne. La famille de Ninerolles  parait anciennement implantée à Souvigny, en 1593, ce fut au tour de Philippe de Ninerolles, receveur général du taillon de la généralité de Moulins. Le 10 décembre 1655, ce furent  Claude Feydeau, chevalier, seigneur de Bompré et Ambourg, et Suzanne Feydeau, sa femme. Au siècle suivant, Embourg appartenait à Henri Jacques Pierre Renaud, seigneur de Bois Renaud, chevalier de   Saint Louis et capitaine au régiment de Lévy.           MATRAY, en 1386, Jean Seguin, trésorier et secrétaire du duc, possédait la seigneurie de La Materée. En 1599, c'était le lieutenant général en la vice sénéchaussée du Bourbonnais, nommé Jean Boudet, écuyer, qui était sieur du Mas et de La Materée. Lui succèda le receveur général des finances de Moulin puis de Bourges, Jean Breuyllet. Gabriel Breuyllet, écuyer, seigneur  de la Materée, était en 1668, encore trésorier de France et  quand il mourut en 1680, premier président trésoriers de France. En 1738, le seigneur de La Materée était Jean Jacques Béraud, conseiller au présidial  de Moulins, Louis Pierre François Philippe  de la Mothe, écuyer, et seigneur de La Materée en 1767, était gendarme de la garde du roi et gentilhomme servant de la reine. Il mourut en 1785 à l'hôpital général de Moulins.","architecture":"Embourg,  en forme de U à deux niveaux à toits élevés flanqué de tours carrées en angles intérieures  et  possède encore une tour ronde à archères du XVe siècle, mais le château est du XIXe siècle. Les communs datent du XVIIIe siècle.          La Matray  a remplacé l'ancienne maison forte. Elle est le résultat des travaux d'aménagement et d'agrandissement menés  au cours XVIIe siècle. Le bâtiment principal, de plan rectangulaire à deux niveaux et combles perdus, reçoit 2 bâtiments secondaires  mais importants, en retour d'équerre, sur un plan en U, alors qu'une tourelle carrée à quatre niveaux, prise en uvre  dans un angle, dessert les logements  par un escalier à vis. L'ensemble est entouré  de douves en eau et franchies  par un pont dormant. Autour du château, délimitant un parc arboré, l'enceinte garde les vestiges de deux tours circulaires.","habitants":"Famille Milles                            Famille de Ninerolle\"","divers":"Château d'Embourg et de Matray à Souvigny","gps":"","images":["../../jctruffet.com/image/image_03/03_Embourg_Matray_1.jpg","../../jctruffet.com/image/image_03/03_Embourg_Matray_2.jpg","../../jctruffet.com/image/image_03/03_Embourg_Matray_3.jpg","../../jctruffet.com/image/image_03/03_Embourg_Matray_4.jpg","../../jctruffet.com/image/image_03/03_Embourg_Matray_5.jpg","../../jctruffet.com/image/image_03/03_Embourg_Matray_6.jpg"]},"Consult_chateau_formulairee21e":{"id":"Consult_chateau_formulairee21e","dept":"03","canton":"Souvigny","commune":"Agonges","nom":"Epine","type":"Maison forte","periode":"XVI","histoire":"EPINE, en 1413, Guillaume de Roux  dit Montjoie, \"roy darmes des Français, sire de l'Épine à cause de damoiselle Marguerite Bouttefeu\" rend hommage au duc de Bourbon. Il y avait deux vassaux, Guillon de Seaulx et Jean Esmorin de Vigne. Au milieu du XVe siècle, Pierre et Antoine de Saint-Aubin se qualifièrent seigneurs de Lespine tous les deux. Ils étaient fils de Pierre de Saint-Aubin et de Jacquette de Saligny. En 1444, Pierre de Saint-Aubin, écuyer, un autre Pierre de Saint-Aulbin, écuyer, en 1503. La famille de Saint-Aubin possédera lÉpine jusquà la seconde moitié du XVIIe siècle. En 1651, Claude de Saint-Aubin, seigneur de Lépine, épouse Catherine de Sacconin, fille du seigneur de Bressolles, le ménage habite toujours lÉpine, mais afferme la seigneurie à Jean Duchatel et fait rendre la justice par Jean Viguier qui est également châtelain En 1685, le fermier est Jean Aujouannet et à cette époque le seigneur nhabite plus lÉpine. Ainsi, entre 1662 et 1685, les seigneurs cessent de résider à lÉpine  En 1688 , Charles Legendre, époux de Marguerite de Vialet, chevalier et seigneur de Saint-Aubin-sur-Loire, de Saligny et de lÉpine. Le fils de ce couple, Gilbert-Charles Legendre, chevalier, marquis de Saint-Aubin,  plaça des millions de livres dans le fameux système de Law, il fut ruiné placée sous bail judiciaire Gilbert-Charles, resté célibataire. En 1775, le domaine était aux mains d'un fermier, Pierre Daumin. Aujourd'hui chambres d'hôtes.","architecture":"Epine, la première mention de la seigneurie date de 1322. Edifice de plan carré, formé par une enceinte entourant  une cour fermée, avec tours défensives et douves. L'enceinte se compose de corps de bâtiments reliés sur certaines parties par une courtine  s'ouvrant au sud par une poterne.  Les bâtiments sont constitués d'une partie d'habitation (aile nord) entourée de communs, grange (aile est), écuries (ailes ouest et sud) remises (aile ouest). Une chapelle  et un pigeonnier  occupent la tour sud-ouest.  Les corps de bâtiments  ont très peu d'ouvertures  de par leur nature  défensive.  Seules des meurtrières avaient été percées  avant l'ouverture plus tardive de baies  pour l'éclairage des  intérieurs. A l'intérieur,  granges et écuries ont conservé leurs aménagements et charpente. Conçu selon un modèle très répandu dans le Bourbonnais, le domaine représente un exemple de fermes fortifiées de plan carré, entourées de douves et organisées autour d'une cour intérieure autour de laquelle s'ouvrent les communs.  Cet édifice des XVe et XVIe siècles a conservé des douves en eaux et présente trois tours d'angles du XVe siècle. La partie la plus ancienne est l'ensemble que forment la tour Sud-ouest, à gauche de l'entrée, et un petit bâtiment y attenant, ce dernier possède encore une fenêtre à meneaux en pierre et une ouverture plus ancienne côté route.  Le rez-de-chaussée de la tour devait servir de chapelle, avec sa pièce voûtée, la seule de la maison, percée de cinq petites fenêtres et d'une porte en plein cintre.","habitants":"Famille de Pierre de Saint-Aulbin\"","divers":"Maison forte de l'Epine à Agonges","gps":"","images":["../../jctruffet.com/image/image_03/03_Epine_1.jpg","../../jctruffet.com/image/image_03/03_Epine_2.jpg","../../jctruffet.com/image/image_03/03_Epine_3.jpg","../../jctruffet.com/image/image_03/03_Epine_4.jpg"]},"Consult_chateau_formulairebdcd":{"id":"Consult_chateau_formulairebdcd","dept":"03","canton":"Escurolles","commune":"Escurolles","nom":"Escurolles","type":"Château","periode":"XV-XIX","histoire":"Deux châteaux à Escurolles dont celui d'Escurolles du XV-XIXe siècle et des Granges du XVe siècle.          ESCUROLLES construit dans la seconde moitié du XVe siècle, est l'oeuvre de Jean bâtard de Bourbon alors évêque du Puy. Le château et  la ville d'Escurolles appatenait au doyenné  de l'ordre de Cluny. Vers 1500, la fonction  est assurée par noble homme Dinet Bogaret, écuyer, habitant dans ladite ville d'Escurolles, alors q'en 1620, c'est Jean de Fradel, Seigneur du jeu et des forges, gentilhomme de la chambre du Roi, qui est capitaine général du chastel et de la ville d'Escurolles.\r\nGRANGES, construit   au XVe siècle par Durand Fradet écuyer , conseiller et maître d'Hostel de Louis XI   Dès la constitution du fief, vers 1450, Durand Fradel, écuyer, prend le titre de seigneur des Granges, il est en même temps écuyer d'écurie de Mgr le duc, puis fut conseiller et maitre d'hôtel de Louis XI, ce qui lui valut d'obtenir la justice sur sa terre des Granges. Son fils, Théaude, écuyer puis son petit fils Gilbert, élevé à la dignité de chevalier, lui succédèrent comme seigneurs des Granges. La politique d'acquisition menée par Gilbert des Granges permit à son fils, autre Gilbert, chevalier, de porter les titres de seigneur des Granges, de Lailhat, d'Idogne, de La Bâtisse, de Pouzeux... mais endetté, Gilbert II Fradel dut vendre, en août 1586, sa terre des Granges à Charles de Cappony, écuyer, seigneur d'Ambérieu, baron de La Font Saint Mageran à Broût-Vernet. La seigneurie des Granges, que la famille Cappony conserva jusqu'au XVIIIe siècle, fut vendue en 1714 à Marie Benoît de Reclesnes, écuyer, sieur de Lyonne. Après la révolutionnaire, le château a appartenu à la Comtesse Charles d'Erceville. Restauré, il est aujourd'hui la propriété de la famille Roustan. En 1981, le château est racheté,appartient aujourd'hui à la famille Roustan qui restaure les bâtiments  pour installé un atelier de menuiserie.","architecture":"Escurolles, il a été édifié  sur un château plus ancien dont on trouve les traces dans quelques murs de soubassement et dans l'entrée, jadis fortifiée d'un pont-levis. Les bâtiments actuels sont organisés selon un plan  rectangulaire, autour d'une cour intérieure. L'entrée principale est protégée par deux tours géminées, prises en oeuvre dans le mur d'enceinte, le portail nord  est flanqué de  deux tours rondes, deux autres tours rondes plus  conséquentes  défendaient  le mur d'enceinte à l'est, l'une d'elles a disparu, et l'autre a été  en partie rasée. Les  fossés qui protégeaient l'enceinte ont été comblés et le pont-levis a disparu. Les transformations du XVe siècle   ont apporté deux belles tours d'angle hexagonales, la mieux entretenue à l'angle des bâtiments en retour d'équerre s'ouvre  par une porte en arc à accolade, sur un escalier qui dessert  les étages. Une galerie  des blasons, abritée au 1er étage  d'un bâtiment à balcon dont les croisillons du colombage sont du plus bel effet.                                                               Granges maison forte du XVe siècle, de plan carré, était protégé de hautes murailles cantonnées de quatre tours rondes. Des douves profondes, remplies d'eau, ceinturaient la forteresse et défendaient l'accès de la porte principale. Le pont dormant a remplacé le pont-levis primitif, flanqué de canonnières installées en ligne. Deux tours subsistent de la maison forte du XVe siècle, une à l'angle ouest qui a conservé ses canonnières, mais qui a été en partie rasée, pour être recouverte par un toit faisant corps avec celui des communs qui lui sont accolés; la seconde, à l'angle nord du corps de logis, a été couverte d'un toit conique et transformée en pigeonnier, dans son étage supérieur. Le bâtiment principal à deux niveaux, desservi par un escalier intérieur à vis, se compose d'un corps de plan barlong et d'une aile en retour d'équerre.","habitants":"Famille Jean de Fradel,                                                                Famille Roustan \r\n        \r\n        \"","divers":"Château d'Escurolles et Maison forte de la Grange à Escurolles","gps":"","images":["../../jctruffet.com/image/image_03/03_Escurolles_1.jpg","../../jctruffet.com/image/image_03/03_Escurolles_2.jpg","../../jctruffet.com/image/image_03/03_Escurolles_3.jpg","../../jctruffet.com/image/image_03/03_Escurolles_4.jpg","../../jctruffet.com/image/image_03/03_Escurolles_5.jpg","../../jctruffet.com/image/image_03/03_Escurolles_6.jpg"]},"Consult_chateau_formulaire2a9b":{"id":"Consult_chateau_formulaire2a9b","dept":"03","canton":"Escurolles","commune":"Espinasse-Vozelle","nom":"Espinasse_Vozelle","type":"Château","periode":"XVII","histoire":"Deux châteaux à Espinasse-Vozelle, la Chaise du XVI et le Puy-Vozelle du XIXe siècle.                                   la CHAISE,  le fief appartenant à la famille de Reclesne a été vendu, en 1655, au seigneur d'Espinasse, François de Lafayette, dont les descendants l'ont conservés jusqu'au XVIIIe siècle.  En 1850, les bâtiments furent aménagés par M. Grangier, vétérinaire à Gannat, qui installa dans l'ancien château une ferme école  pour une quarantaine d'élèves. La Chaise appartenait récemment à la famille Soucachet de Saint-Pont.\r\nPUY-VOZELLE, élevé en 1898 par Percilly architecte à Vichy, pour le docteur Bignon médecin à Vichy, sur un plan en croix grecque avec pièce à l'italienne. Agrandi ensuite par Paul Martin, architecte à Vichy, en 1906, pour former un plan en croix latine.","architecture":"Vieux château d'Espinasse peut-être du XIVe ou XVe siècle, incendié, mais probablement pas totalement détruit lors de la bataille de Cognat en 1568, il ne reste actuellement que quelques bâtiments avec fenêtres chanfreinées, corbeaux de pierre, cheminée du XIVe ou XVe siècle ainsi qu'une pièce d'eau, alimentée par une source; reste probable des douves.\r\n La Chaise, il ne reste plus de l'ancienne maison forte que des bâtiments transformés en bâtiments d'exploitation qui enferment une vaste cour rectangulaire. Seule la tour carrée du colombier, couverte d'un toit à quatre pans.                                   Le château de Puy Vozelle, de style composite, à larges ouvertures à arcs en plein cintre, à galeries, tourelles et clochetons, a plus l'allure d'un petit palais colonial que d'un véritable château; originalité de  l'édifice  inspiré de demeures russes de cette époque, cheminées en marbre, et onyx, portes incrustées de nacre ou sculptées concourent à sa richesse intérieure.  Il est situé au milieu d'un parc, sur une colline qui domine la plaine d'Espinasse.","habitants":"Famille de François de Lafayette\"","divers":"Château de la Chaise et du Puy-Vozelle à Espinasse-Vozelle","gps":"","images":["../../jctruffet.com/image/image_03/03_Espinasse_Vozelle_1.jpg","../../jctruffet.com/image/image_03/03_Espinasse_Vozelle_2.jpg","../../jctruffet.com/image/image_03/03_Espinasse_Vozelle_3.jpg","../../jctruffet.com/image/image_03/03_Espinasse_Vozelle_4.jpg"]},"Consult_chateau_formulairea22f":{"id":"Consult_chateau_formulairea22f","dept":"03","canton":"Mayet-de-Montagne","commune":"Ferrières-sur-Sichon","nom":"Ferrieres_Sichon","type":"Château","periode":"XV","histoire":"Trois châteaux à Ferrières sur Sichon; celui de Ferrières  du XVIe siècle avec donjon, de Chappes du XI-XVIIe siècle avec douves et de Montgilbert (Vestiges voir article).                          CHAPPES, les plus anciens propriétaires du fief furent Pierre et Philippe de Terrières, écuyers. Etait en indivis entre Anne de Terrières, avocat au parlement, et Claude de Chalençon de Rochebaron, en 1659 il est aux mains d'Antoinette Arnoux de Saint-Simon, passe à son fils Charles de Chandieu, puis à Paul de Loriol qui le vend  en 1720 à la famille de Manissy. Par la suite; les Sicard de Rama, les Sauret, les Rollat, les Degeorges, les La Code d'Aigueperse. il est actuellement à la famille Barge qui l'habite et l'entretient.             FERRIERE  occupait au Moyen-Age une position stratégique. Le premier seigneur connu de Ferrières est en  1249, Gaucher de Châtillon connétable de France. Les Châtillons, seigneurs de Ferrières. En 1454, ce sont Louis de Beaufort et Jehanne de Norry, sa femme, qui possèdent les  terres et châteaux de Gaffier et Ferrières. Le fief de Ferrières fut vendu à plusieurs reprises au début du XVIIIe  siècle, en 1720, au seigneur de Châteldon pour l'acquérir, mais il est revendu en   1756 à Jean Claude Douet, fermier général. Au cours du XIXe siècle  devenu la propriété du vicomte le Jeans.","architecture":"Chappes, cette demeure féodale  du XVe siècle   comprend un quadrilatère de trois étages plus comble, contourné à l'origine de quatre tours rondes à toit pointu au Nord-Est et au Sud-Est et de celle de l'escalier à l'Ouest, les deux tours ouest ayant disparu, le tout entouré de douves pleines d'eau que l'on franchit par un pont dormant accès à la cour intérieure sur laquelle s'ouvre la porte d'entrée  encadrée de fines moulures ogivales.                Ferrières-sur-Sichon possède un donjon  qui occupait au Moyen-Age une position stratégique, en limite des territoires du Bourbonnais, de lAuvergne et du Forez, que les Bourbons ont acquis petit à petit, ce qui explique la construction des châteaux forts de Pyramont, de Montgilbert, de Chappes en plus de celui édifié au centre du bourg. Ferrières-sur-Sichon était très peuplée jusquen 1880, date à laquelle furent créés les bourgs de Lavoine et de La Guillermie.    Dans la commune maison forte  de la Roche ou château, date du XVe siècle, il fut érigé lors des constructions défensives dans le Bourbonnais, sur un plan rectangulaire, avec des combles hauts et une tourelle d'escalier à demi à l'extérieur, distribuant les 2 salles des étages.\r\nLes salles sont équipées de cheminées en pierre à manteau mouluré, et de fenêtres qui lui donnent son caractère résidentiel.","habitants":"Famille de Manissy\"","divers":"Château de Ferrière sur Sichon, de Chappes et la maison forte de la Roche","gps":"","images":["../../jctruffet.com/image/image_03/03_Ferrieres_Sichon_1.jpg","../../jctruffet.com/image/image_03/03_Ferrieres_Sichon_2.jpg","../../jctruffet.com/image/image_03/03_Ferrieres_Sichon_3.jpg","../../jctruffet.com/image/image_03/03_Ferrieres_Sichon_4.jpg","../../jctruffet.com/image/image_03/03_Ferrieres_Sichon_5.jpg","../../jctruffet.com/image/image_03/03_Ferrieres_Sichon_6.jpg","../../jctruffet.com/image/image_03/03_Ferrieres_Sichon_7.jpg","../../jctruffet.com/image/image_03/03_Ferrieres_Sichon_8.jpg"]},"Consult_chateau_formulaire1027":{"id":"Consult_chateau_formulaire1027","dept":"03","canton":"Neuilly-le-Réal","commune":"La-Ferté-Hauterive","nom":"Ferte_Hauterive","type":"Château","periode":"XVI","histoire":"A la Ferté-Hauterives le château  des Echerolles du XVII-XIXe siècle,  La Tour des Moines du XVe siècle.            FERTE-HAUTERIVES, le port de La Ferté et celui de la Corde aux Echerolles sont cédés au Bénédictins de Souvigny au XI° siècle. en décembre 1442, le duc Charles de Bourbon donne au prieuré de Souvigny lautorisation de construire une forteresse pour sy retirer en temps de guerre et de péril, doù son nom de la Ferté aux Moines. La paroisse compte dès le XIVe siècle plusieurs seigneuries, comme celle dHauterive doù le nom actuel de La Ferté-Hauterive, celle de Roche devenue La Rochette ou celle des Echerolles.  le château du Vigier et la demeure dHauterive.                  TOUR des MOINES au début du XIe siècle, le seigneur de la province du Bourbonnais donne ce morceau de terre à l'abbaye Bénédictine de Souvigny.               ECHEROLLES, Propriété de Jacques Coeur au XVe siècle, puis  plusieurs grandes familles s'y succèdent, pour finir par les Giraud des Echerolles, Alexandrine écrivit un livre sur sa famille pendant la Terreur et servit d'héroïne à Lamartine. Le château primitif  fut remanié  vers 1880 par  l'architecte Emile Dadolle.  Aujourd'hui propriété de monsieur Fradin  qui l'a transformé en hôtel restaurant.","architecture":"Hauterives du XIXe siècle de style sologne bourbonnaise, transformé en chambres d'hôtes par la famille Lefebvre. Tour des Moines  comporte quatre niveaux habitables d'ailleurs des fenêtres ont été percées  pour améliorer le confort d'une tour médiévale de défense. La tour possède un chemin de ronde et elle est coiffée par un haut toit à pavillon. Ce sommet est intéressant car il montre la technique de construction des mâchicoulis et la qualité des parements d'angle. Au début du XIXe siècle, des ouvertures sont faites dans les murs. Au XXIe siècle, le donjon et les bâtiments annexes sont une propriété privée non visitable.   Echerolles, le château est représentatif du domaine bourbonnais classique à la composition ordonnancée: pavillon d'entrée,  allée d'accès, cour d'honneur fermée par le château et deux ailes de bâtiments de communs flanqués de tours rondes. La structure primitive, un logis central et  un pavillon carré, fut surélevée et percée de baies régulières,  la façade fut dotée d'une terrasse couverte par une marquise, et ornée d'un décor de style éclectique (baies néo gothiques et néo Renaissance, du XVIIIe siècle). possède écurie ronde, les deux belles tours à lanternons, les entourages de fenêtres sculptés et les échauguettes, les rambardes en plomb des deux grandes tours.","habitants":"Famille d'Echerolles\"","divers":"Château d'Hauterive, la tour aux Moines château de Viguier et d'Echerrolles à la Ferté Hauterive.","gps":"","images":["../../jctruffet.com/image/image_03/03_Ferte_Hauterive_1.jpg","../../jctruffet.com/image/image_03/03_Ferte_Hauterive_2.jpg","../../jctruffet.com/image/image_03/03_Ferte_Hauterive_3.jpg","../../jctruffet.com/image/image_03/03_Ferte_Hauterive_4.jpg","../../jctruffet.com/image/image_03/03_Ferte_Hauterive_5.jpg","../../jctruffet.com/image/image_03/03_Ferte_Hauterive_6.jpg","../../jctruffet.com/image/image_03/03_Ferte_Hauterive_7.jpg","../../jctruffet.com/image/image_03/03_Ferte_Hauterive_8.jpg","../../jctruffet.com/image/image_03/03_Ferte_Hauterive_9.jpg"]},"Consult_chateau_formulaireaf85":{"id":"Consult_chateau_formulaireaf85","dept":"03","canton":"Chantelle","commune":"Fleuriel","nom":"Fleuriel","type":"Château","periode":"XIX","histoire":"Plusieurs châteaux à Fleuriel, du Colombier du XIXe siècle, de l'Eguillons du XIXe siècle, de Tronçais du XIXe siècle, de Vauvre du XIXe siècle et du Plaix du XIXe siècle .                 PLAIX, construit au XIXe siècle par la famille Roÿet qui en est encore propriétaire. Dès 1301, la seigneurie appartenait à la famille d'Avenières, qui était aussi seigneur de Douzon à Etroussat. Après avoir appartenu aux Saint-Aubin à la fin du XIVe siècle et au XVe siècle, c'est Christophe Hernoys, en 1503, qui reconnaissait tenir en fief de la duchesse de Bourbon, sa maison. Il y a certainement au XIVe siècle un deuxième fief au Plaix, dont était titulaire la famille  Prévost. En 1354 Guillaume Prévost, damoiseau, rend hommage, au duc de Bourbon. En 1398, nous rencontrons son successeur Jehan Prévost, aussi seigneur  du Plaix pour le même aveu. Après les de Louan aux XVIIe et XVIIIe siècles, ce furent les Guy qui possédèrent le fief avant que les Roÿet ne transforment l'édifice devenu inconfortable.      \r\nEGUILLONS, pas d'information historique.                            COLOMBIER  Construction caractéristique du XIXe siècle, le château fut construit en 1857 par Henri Guy, de la famille   des Guy, seigneurs du Plaix. C'est par alliance avec les Guy que les Hutteau d'Origny en devinrent propriétaires, et le sont encore aujourd'hui.             la VAUVRE, les premiers propriétaires de la terre de La Vauvre étaient connus dès le XVe siècle. À cette époque, elle était la propriété du prévôt du lieu. En 1773, le sieur de la Vauvre était Gilbert François Guy, conseiller du roi, et ce n'est que par alliance au XIXe siècle avec les Guy, que la terre passa aux Thonier qui y firent bâtir un château moderne.","architecture":"Plaix,  l'ancien château fort a aujourd'hui disparu, il n'en reste que la chapelle romane et le base d'une tour. Il a été remplacé par un château moderne, construit au XIXe siècle    mais  qui a conservé une tour ronde de l'ancien château fort et des restes de douves.     Colombier, évolue entre les styles néogothique et néoclassique, le logis principal, de plan rectangulaire, est à deux niveaux et niveau de comble. L'entrée se fait par un perron semi-circulaire à balustre. La lucarne en toiture est l'occasion de mettre en valeur l'horloge, surmontée d'un petit clocheton. Deux pavillons carrés, en retour  d'équerre  aux angles, sont agrémentés chacun de 2 échauguettes rondes sur culot, accolées au dernier niveau   et coiffées de toits pointus.    Eguillons, comme beaucoup d'édifice construit au XIXe siècle, Les Éguillons ont cédé au style composite, évoluant entre le néo-gothique et le néo-Renaissance. Le corps de logis, de plan rectangulaire est à deux niveaux, éclairés  de fenêtres à meneaux alors que les larges lucarnes fenêtres éclairent les combles. Un pavillon en retour d'équerre masque un peu la façade, alors qu'un des pignons reçoit une fine tourelle d'angle, bâtie de briques polychromes, à  l'instar des châteaux au nord du Bourbonnais.             Tronçais, plus qu'un château, La Tronçais est une belle demeure, bâtie au XIXe siècle, dans le style des villas résidentielles. Le corps de logis principal, de plan rectangulaire est à deux niveaux sur perron et niveau de comble, éclairé par des  lucarnes. Un pavillon carré en retour d'équerre, reçoit portes fenêtres et balcons à chaque étage. En façade un avant corps, de plan quadrangulaire, domine le bâtiment de ses deux étages et de son toit élevé.  \r\nLa Vauvre, demeure, édifiée sous le Second Empire en 1869, est installée dans un grand parc planté d'arbres. Le style est composite, il évolue entre le néo-gothique et  le néo-Renaissance, agrémenté de tourelles. A quelque distance de la Vieille Vauvre a conservé un manoir caractéristique des maisons bourbonnaises du XVIIe siècle, s'agirait-il de l'ancienne seigneurie de Vernelle qui appartenait aussi au seigneur de La Vauvre.","habitants":"Famille  Prévost                       Famille de Gilbert François Guy\"","divers":"Château de Plaix, du Colombier, d'Eguillons de Tronçais et de la Vauvre à Fleuriel","gps":"","images":["../../jctruffet.com/image/image_03/03_Fleuriel_1.jpg","../../jctruffet.com/image/image_03/03_Fleuriel_2.jpg","../../jctruffet.com/image/image_03/03_Fleuriel_3.jpg","../../jctruffet.com/image/image_03/03_Fleuriel_4.jpg"]},"Consult_chateau_formulaire3316":{"id":"Consult_chateau_formulaire3316","dept":"03","canton":"Herisson","commune":"St-Caprais","nom":"Fougeres","type":"Maison forte","periode":"XVII","histoire":"FOUGERES, la seigneurie de Fougères  avait son siège sur le flanc sud du massif du Point-de-Vue, sur  un plateau entouré de plusieurs étangs. L'abbé Bordelles en citait trois, dits de Lava, du Milieu et du Moulin.  Le premier possesseur connu  de la terre de Fougières  serait Thierry Billard, écuyer, époux de Péronnelle de Culant, qui en fait aveu en 1498. Vers 1520 Gilbert de Fougières s'implante au Creux de Vallon, par mariage avec l'héritière Jeanne de la Faye. A la fin du XVIe siècle, Jacques de Fougières, capitaine chatelain d'Hérisson et de la Bruyère-Laubespin, maître des eaux et forêts pour Tronçais, époux d'Isabeau de Chauvigny de Blot, est seigneur de Fougières et du Trait. Lors de la Fronde, il défend Hérisson contre les partisans de Condé, mais son château sera détruit. Une descendante de monsieur du Creux, Claire de Fougières, épouse Jean de la Rochedragon, seigneur de La Vaureille qui avoue, en 1719 tenir le fief à cause de sa femme. Pendant près de cinq cents ans, le sort de Fougières est lié à celui de la seigneurie du Creux. Il reste encore quelques vestiges de l'ancien château du Trait.","architecture":"Fougères, c'est à l'extrémité de l'étang du Milieu qui lui servait de douves  que se trouvait la double motte, assise du château primitif. On peut se l'imaginer comme une \"sombre forteresse\" médiévale flanquée de plusieurs  tours et destinée au combat et à la défense. Cette structure, quoique détruite, marque encore le parcellaire du cadastre ancien, on peut retrouver les vestiges de cette implantation dans un taillis au nord des parcelles dites le châtelet, et au bord du chemin des Matilots. La destruction de cette forteresse rurale date de la Fronde. Devenues irréparables, on arasa ces ruines et ont construisit un nouveau château à proximité, celui-ci comprend un long corps de bâtiment à étage flanqué de deux tours en bout. La cour est encadrée de deux pavillons dont l'un servait de chapelle.    De vastes communs sont groupés sur le côté droit. Le château actuellement en ruines, fut habité pendant la seconde guerre mondiale.","habitants":"Famille de Gilbert de Fougières\"","divers":"Fougères","gps":"","images":["../../jctruffet.com/image/image_03/03_Fougeres_1.jpg"]},"Consult_chateau_formulaire6a8f":{"id":"Consult_chateau_formulaire6a8f","dept":"03","canton":"Souvigny","commune":"Besson","nom":"Fourchaud_Rochefort","type":"Maison forte","periode":"XIV-XVI","histoire":"FOURCHAUD, en 1551 aux de Chazeron, Antoine  premier maître d'hôtel du roi Henri II. Au début du XVIIe siècle, les Chazeron cèdent la place aux Hugon de Givry. Pierre Hugon, écuyer, était en 1625 sieur de Fourchaud, Givry, le Breuil et la Fouresthile. Ses descendants possèdent encore le château en 1741.  Après la mort du dernier des Hugon, sa soeur épouse de Denis Robert Bruneau baron de Vitry   vendra le domaine en 1775 à Charles Biotière de Chassincourt,  marquis de Tilly, seigneur de Bostz, devient aussi seigneur de Fourchaud.  Le château passera aux descendants des Bourbon-Parme, lointains héritiers de la famille Roussel de Tilly. Son abandon depuis plus d'un demi-siècle menace de lui réserver le sort du château de Rochefort, à quelques kilomètres de là, voué aux pillages et à l'altération du temps.                                    ROCHEFORT, en 1503 date à laquelle damoiselle Marie de Francierez   reconnait, pour elle et  ses enfants, tenir en fief  de la duchesse de Bourbon  sa maison, granges, situés en la terre de Rochefort . Elle appartenait  en 1560 à maistre Jean Feydeau, chastelain de Moulins, l'un des nobles du Bourbonnais acquis à la cause protestante. L'édifice appartenait  encore à cette même famille en 1646 quand  Aimée Feydeau épousa, Claude de Berthelas, écuyer, seigneur de Saint-Haon et exempt des gardes du roi. Quinze ans plus tard, le lieutenant général au domaine de Bourbonnais, François Baugy, écuyer, était à son tour seigneur de Rochefort. Son fils Etienne fut trésorier de France à Moulins et sa fille épousa en 1709 Pierre Hugon, écuyer et seigneur de Pouzy, fils du seigneur voisin de Fourchaud. L'exploitation des revenus fut confiée aux soins d'un fermier en 1673, il s'agissait de Claude Giraud, chirurgien, et de 1760 à 1770, successivement Pierre puis Jean Colas.","architecture":"Fourchaud   du  XVe siècle, cet édifice devait être une forteresse comprenant, outre le château, une cour rectangulaire fermée par de hautes courtines dont les angles étaient flanqués de tours rondes. La courtine ouest a conservé la porte d'entrée primitive qui était défendue par un pont-levis. Le corps de logis, accompagné d'une tour, comporte deux étages sur rez-de-chaussée. Chaque étage se compose de deux pièces. Les pavillons d'avant-corps ont perdus leurs machicoulis. Le château constitue une des forteresses féodales les mieux conservées du Bourbonnais, était autrefois entouré de douves sèches,  comblées au XVIIIe siècle. Le Petit Fourchaud, à moins de 100 mètres du Grand Fourchaud, est un donjon à colombages dont la haute toiture percée de toutes parts laisse envisager un triste sort. La situation très proche de ces deux donjons massifs serait due au XVIe siècle siècle, à deux frères qui, suite à une dispute, auraient voulu se séparer. Une raison plus logique est que la présence du Petit Fourchaud sur un piton rocheux plutôt élevé en fait une tour de guet qui devait communiquer autrefois avec la tour du couvent de Besson (disparue) et le château de Rochefort.                                Rochefort, le nom du lieu évoque  cependant une forteresse médiévale  qui aurait pu être construite au XIIIe siècle du point de vue architectural, Rochefort présente des éléments antérieurs au XVe siècle, date de la construction du logis. Le château est actuellement très ruiné. Il reste cependant de l'ancienne forteresse un donjon circulaire avec une imposante tour de guet à contreforts, surmontée d'un clocheton et une porte de la courtinelle. Elle est constituée d'un corps de logis flanqué de tours et de communs.","habitants":"Famille de Mareschal                     Famille de Pierre Hugon\"","divers":"Château de Fourchaud et de Rochefort à Besson","gps":"","images":["../../jctruffet.com/image/image_03/03_Fourchaud_Rochefort_1.jpg","../../jctruffet.com/image/image_03/03_Fourchaud_Rochefort_2.jpg","../../jctruffet.com/image/image_03/03_Fourchaud_Rochefort_3.jpg","../../jctruffet.com/image/image_03/03_Fourchaud_Rochefort_4.jpg","../../jctruffet.com/image/image_03/03_Fourchaud_Rochefort_5.jpg","../../jctruffet.com/image/image_03/03_Fourchaud_Rochefort_6.jpg","../../jctruffet.com/image/image_03/03_Fourchaud_Rochefort_7.jpg","../../jctruffet.com/image/image_03/03_Fourchaud_Rochefort_8.jpg"]},"Consult_chateau_formulaireb540":{"id":"Consult_chateau_formulaireb540","dept":"03","canton":"Chantelle","commune":"Fourilles","nom":"Fourilles","type":"Gentilhommière","periode":"XVI","histoire":"FOURILLES, en 1411 on rencontre Pierre Boirot, damoiseau, qui donne aveu  au duc de Bourbon, pour son fief dans les paroisses de Fourilles de Chantelle, comprenant les terres, il semble  que la lignée des Boirot de Fourilles se soit éteinte vers 1458. Après les Lelong ou les Boirot, le  château appartenait à la famille chevaleresque des Aubert. La seigneurie de Fourilles  fut érigée en châtellenie sous Henri IV, et l'érection confirmée en 1648, en faveur de messire Thomas le Lièvre, baron d'Huriel, marquis de la Grange et de Fourilles, Louis XIII ayant déclaré vouloir que la justice soit exercée dans le ressort de la châtellenie de Fourilles, tant en matière civile que criminelle. Fourilles, au XVIe siècle la famille la Rochedragon, dont la branche principale était possessionnée dans la châtellenie d'Aunay essaima une branche, probablement par alliance, sur la seigneurie de Fourilles. En 1642 Fourilles était aux mains  des Chaumejean que l'on rencontre aussi dans la châtellenie de Verneuil. Lors de la saisie de la terre de Fourilles, Michel de Chaumejean ne pouvant faire face à sa situation financière vendit le château à la famille le Lièvre de la Grange, qui en était encore propriétaire à la fin  du XIXe siècle.","architecture":"Fourilles, le vieux château dont on distingue les fossés est encore présent par deux grosses tours rondes qui encadrent   une maison bourgeoise, souvent remanié, et une tour d'enceinte.","habitants":"Famille des Aubert                      Famille la Rochedragon\"","divers":"Château de Fourilles","gps":"","images":["../../jctruffet.com/image/image_03/03_Fourilles_1.jpg","../../jctruffet.com/image/image_03/03_Fourilles_2.jpg","../../jctruffet.com/image/image_03/03_Fourilles_3.jpg"]},"Consult_chateau_formulaire0242":{"id":"Consult_chateau_formulaire0242","dept":"03","canton":"Montluçon","commune":"Verneix","nom":"Fragne","type":"Château","periode":"XVI","histoire":"FRAGNE, en 1300 Jean de la Mousse chanoine du chapitre d'Hérisson, rend foi et hommage au duc de Bourbon pour son hostel, terre et seigneurie de Fraigne. En 1386, Marguerite de la Mousse, damoiselle, femme de Louis de Saint-Aubin dit de Sarregoce, fait hommage au duc pour l'hostel de Fraigne, alors qu'en 1394, l'hostel de Fraigne,  est aux mains  de Jehan de Fraigne. En 1405, Jean du Peschin, écuyer, seigneur de Montfand, et le procureur du duc de Bourbon transigent  avec Jean de Fraigne, seigneur dudit lieu. Concernant les lieux de Fraigne et du mas de Lonzet. Dans le \"dénombrement des fiefs du Bourbonnais\" en 1503, Estienne Fraigne, écuyer, reconnait tenir de la duchesse de Bourbon son hostel  place forte avec pont-levis. En 1569,  le sieur de Fraigne, non justicier, comme vassal de la châtellenie d'Hérisson.","architecture":"Fragne, l'ensemble architectural de Fragne, daté du XVIIIe siècle, a subi des remaniements. Il se compose d'un corps de bâtiment à trois niveaux, dont un de comble, à de nombreuses ouvertures. Il donne sur une terrasse à balustrade à laquelle on accède par deux escaliers latéraux symétriques, tout est d'ailleurs symétrie dans ce  château. La partie centrale est surmontée d'un haut campanile, tandis que deux ailes en avancée déforme l'alignement de la façade. Du haut du toit, surgissent lucarnes et cheminées élancées. Ce bâtiment central est  prolongé sur ses pignons par deux porches suivis de pavillons latéraux, dont l'un, à gauche, sert de chapelle.   Au centre du parc on remarque une vieille tour rénovée à archères, reste possible d'un ancien château. Fragne est l'un des châteaux les plus élégants de la région.","habitants":"Famille Estienne Fraigne\"","divers":"Château de Fragne à Verneix","gps":"","images":["../../jctruffet.com/image/image_03/03_Fragne_1.jpg","../../jctruffet.com/image/image_03/03_Fragne_2.jpg","../../jctruffet.com/image/image_03/03_Fragne_3.jpg","../../jctruffet.com/image/image_03/03_Fragne_4.jpg"]},"Consult_chateau_formulaire3e46":{"id":"Consult_chateau_formulaire3e46","dept":"03","canton":"Gannat","commune":"Gannat","nom":"Gannat","type":"Château fort","periode":"XIII-XVI","histoire":"Plusieurs châteaux à Gannat, le Fort de gannat du XII-XIIIe siècle avec enceintes, le Chazoux du XVIe siècle vestiges, le Chiroux vestiges du château médiéval et le Cavillons maison forte du XVI-XVIIIe siècle (voir article dans Gannat II), de la Fauléonnières (Pas d'informations).                          GANNAT, il pourrait avoir été bâti alors que les bourgeois de Gannat, déjà organisés, ont obtenu, en 1236, leur charte de franchise. Au milieu du XIIIe siècle, Archambaud VII, le dernier des Archambaud Bourbon,  Au XVe siècle. La châtellenie de Gannat fait partie, en 1629, d'un échange entre Louis XIII et la princesse de Conti, Marguerite de Lorraine,  Après avoir appartenu au marquis d'Effiat, au milieu du XVIIe siècle, le château fut acheté par John Law en 1720. À la faillite du système la famille de Fontanges en devint propriétaire pour le céder au marquis de Villemont en 1739. C'est au cours d'un procès avec la ville de Gannat  que ce dernier propriétaire fut définitivement dépossédé de son bien après la Révolution. Depuis 1812, le corps du château a été couvert de tuiles plates, comme une immense grange. Au sud se trouve une cour spacieuse. En 1833, quelques années avant que le procès concernant le château entre la ville et la famille de Villemont ne prenne fin, le château est transformé en maison d'arrêt. Fermée en 1926, la maison d'arrêt attire l'attention du ministère  des Beaux-Arts et de  l'instruction publique qui cette même année, classe l'enceinte du château et les 4 tours à l'inventaire des monuments historiques.","architecture":"Château de Gannat, la construction du fort en son site actuel, au nord de la ville, pourrait dater de la fin du XIIe siècle, ou au début du XIIIe siècle. Au XVe siècle, le château fut sérieusement endommagé, par les troupes anglaises, et particulièrement  lors des passages du Prince Noir et du duc de Lancastre. Cependant, il fut  restauré en même temps que les fortifications de la ville. Au début du XVIe siècle c'était un château beau et fort, à quatre grosses tours rondes bien percées, crénelées, grands fossés pleins d'eau. Mais vers 1566, le château était \"ruiné , sans compter qu'il eut encore à souffrir des guerres de religion.  Le château fort  est devenu une prison au XIXe siècle; sous le régime de Vichy, des prisonniers politiques y furent enfermés. Il abrite aujourd'hui le musée Yves-Machelon.","habitants":"Banquier John Law                   Famille de Fontanges\"","divers":"Château  de Gannat","gps":"","images":["../../jctruffet.com/image/image_03/03_Gannat_1.jpg","../../jctruffet.com/image/image_03/03_Gannat_2.jpg","../../jctruffet.com/image/image_03/03_Gannat_3.jpg","../../jctruffet.com/image/image_03/03_Gannat_4.jpg","../../jctruffet.com/image/image_03/03_Gannat_5.jpg"]},"Consult_chateau_formulaire1dd8":{"id":"Consult_chateau_formulaire1dd8","dept":"03","canton":"Gannat","commune":"Gannat","nom":"Gannat_II","type":"Château","periode":"XVI","histoire":"CAVILLONS, les premiers propriétaires  sont pas connus, à moins qu'il ne s'agisse d'une famille de Cavillons.      CHAZOUX, en 1248, le fief  existe, mais ne semble pas encore bâti, puisque les deux frères, Pierre et Stéphane Cellerier, confessent tenir seulement la terre de Chazoux. La maison-forte de Chazoux existait donc, déjà,  au milieu du XVe siècle. En 1499 c'est Jean Terris d'une famille bourgeoise de Gannat, qui possède la terre de Chazoux avant 1530, la famille porte le nom de la terre comme patronyme. Les héritiers de feu Jehan Terris, probablement celui de 1499, possèdent, dans leur fief de Chazoux, une maison et un moulin à Gannat, avec une tour en fer à cheval de l'enceinte, dite  tour Terris et qui, actuellement porte le nom de Calixte Loulin. Au milieu du XVIIe siècle la terre de Chazoux est aux mains de la famille Faure, dont Pierre Faure, écuyer,  est sieur de la Combe et de Chazoux. Sa femme, demoiselle Marie de Lormet de Valignat, veuve en 1653, demeurait à Chazoux. Leur fille, Charlotte Faure de Chazoux, mariée une première fois à François Champagnat, porte la terre de Chazoux à son mari en seconde noce, Gaspard du Peyroux, mais il devait y avoir co-seigneurie, puisqu'en 1660, l'on rencontre Pierre de Faure, écuyer, donc anobli, comme seigneur de Chazoux et de La Combe, près d'Ebreuil. Au XVIIIe siècle, la famille se pare du titre de comte et en 1761, c'est le comte Louis de Faure, écuyer, qui est seigneur des lieux. Elle franchit un pas de plus en 1789 avec le comte Louis de Faure qui est alors chevalier de l'ordre royal et militaire de Saint-+Louis.\r\nCHIROUX Le premier seigneur mentionné de Chiroux est, en 1301, Barthélémy de Chiroux, damoiseau, qui habite alors la paroisse Sainte Croix de Gannat et qui reconnait tenir en fief  du sire de Bourbon \"l'estang et les molins de Chiroux\".","architecture":"Cavillons; proche du centre ville, la maison forte des Cavillons était installée hors les murs. Elle consiste en un grand  corps de logis, de plan rectangulaire, avec pavillon d'angle carré, en retour d'équerre. A l'arrière, une haute tour circulaire contient l'escalier, qui dessert l'étage et le niveau de comble. Des transformations du XVIIIe siècle ont ouvert des fenêtres à encadrement de pierre. Des communs importants s'organisent autour d'une  tour fermée, dont l'accès est possible par un grand portail.             Chiroux, les constructions de l'ancien château ont aujourd'hui disparus, mais d'après les ruines qui existaient encore au XXe siècle, le château semble avoir été considérable et portait un énorme donjon. Il ne parait donc pas y avoir,  à cette époque, de château, à moins qu'il n'y ai eu une co-seigneurie, non signalée.   Il s'agit alors d'une tour habitable, grange, maisons, étangs et moulins. Une seule tour est mentionnée, elle était  de forme  hexagonale, édifiée  au XVe siècle, par la famille Chiroux, ce qui laisse penser  à une maison forte qui  aurait remplacé l'ancienne forteresse devenue inutilisable. L'enceinte était entourée de profonds fossés. Frappé  par la foudre, le château fut incendié et détruit en juillet 1828.\r\nChazoux,  il ne reste de cette maison-forte du XVe siècle, de plan rectangulaire, protégée par une enceinte,  qu'une   tour ronde, rasée au niveau du premier étage et recouverte d'un toit incliné à une seule pente.","habitants":"Ffamille de Cavillon.               Famille de Pierre de Faure\"","divers":"Château de Cavillons, de Chiroux, de Chazoux, de Fauléonnières et de Langlard à Gannat","gps":"","images":["../../jctruffet.com/image/image_03/03_Gannat_II_1.jpg","../../jctruffet.com/image/image_03/03_Gannat_II_2.jpg","../../jctruffet.com/image/image_03/03_Gannat_II_3.jpg","../../jctruffet.com/image/image_03/03_Gannat_II_4.jpg","../../jctruffet.com/image/image_03/03_Gannat_II_5.jpg"]},"Consult_chateau_formulaireb710":{"id":"Consult_chateau_formulaireb710","dept":"03","canton":"Chevagnes","commune":"Garnat-sur-Engièvre","nom":"Garnat_Engievre","type":"Château","periode":"XIX","histoire":"Deux châteaux à Garnat, la Brerotte du XIXe siècle  et de Torcy du XIXe siècle.  TORCY, c'est à Torcy que Louis VII et Henri Plantagenêt auraient accueilli  le pape Alexandre III qui se rendait à Souvigny. La motte entourée de fossés  n'a été nivelée qu'en 1840. En 1503, Phelibert de Torcy, écuyer et  ses enfants, Lays de Torcy, chevalier et  Jehan de  Torcy, sont seigneurs en partie de Beaulon et du Deffend. En 1527, on signale l'existence de Jean de Torcy, seigneur  du lieu : il semble donc qu'une famille portant le nom du fief l'a possédé  plusieurs siècles durant. En 1567, un Torcy rallié au parti protestant  sévissait en Bourgogne et fut assassiné dans son château en décembre de la même année.  Marie-Anne d'Estut était dame de Torcy. A la Révolution, le château appartenait à Claude Amable des Ulmes, qui y mourut  le 16 février 1790, mais son fils ayant   émigré, une partie des biens fut vendue et l'autre mise sous séquestre. Les héritiers purent quand même rentrer en  possession du château familial. En 1821, Torcy fut vendu au propriétaire du Deffend.             BREROTTE, pas d'information historique.","architecture":"Torcy est un grand logis du milieu du XIXe siècle, les deux pavillons d'entrée en briques datent des XVIIe et XVIIIe siècles. Le logis principal est un long bâtiment, de plan rectangulaire à deux niveaux, percé de nombreuses  fenêtres, avec un avant-corps carré à fronton triangulaire, pour accueillir la porte d'entrée.","habitants":"Famille de Phelibert de Torcy\"","divers":"Château de Torcy et de Brerotte à Garnat sur Engièvre","gps":"","images":["../../jctruffet.com/image/image_03/03_Garnat_Engievre_1.jpg","../../jctruffet.com/image/image_03/03_Garnat_Engievre_2.jpg","../../jctruffet.com/image/image_03/03_Garnat_Engievre_3.jpg"]},"Consult_chateau_formulaire187c-2":{"id":"Consult_chateau_formulaire187c-2","dept":"03","canton":"Varennes-sur-Allier","commune":"Montoldre","nom":"Gayette","type":"Château","periode":"XV","histoire":"Dans la commune de Montoldre deux châteaux; la Gayette du XV-XVIII siècle avec son donjon  et les Echelettes  du XIV-XVIe siècle avec tours.               La GAYETTE, il fut  construit dans la première moitié du XVe siècle par les frères Nesmond, dont les descendants prendront le nom de cette terre. En 1490, Magdeleine de Gayette va apporter  le fief par mariage  à François de Bouge, à sa mort sa veuve  va  accueillir Charles III de Bourbon au début de septembre 1523, à la veille de sa fuite en Italie. Par la suite Gayette changea plusieurs fois de main pour être finalement acquis vers 1663 par les époux Pingre de Farainvilliers, puis ces derniers en font don à l'ordre de la Charité de Saint-Jean-de-Dieu qui en prend possession le 11 juin 1695. Les religieux y entretiennent  une douzaine de lits et soignent les malades et indigents des alentours. A la Révolution,  les frères de Saint-Jean sont remplacés  par les surs de Saint-Vincent-de-Paul, qui officient toujours à la Gayette,  alors que l'établissement  est devenu aujourd'hui  une maison de retraite.                             ECHELETTES,  siège d'un ancien fief, rapidement englobé dans les dépendances des seigneurs de Gayette,  une famille\"les de Gabard\" ayant possédé les Echelettes au XVIe siècle.","architecture":"Gayette, le château occupe le sommet d'une faible colline, autrefois entourée d'étangs sur trois côtés. Il fut  construit dans la première moitié du XVe siècle, puissant donjon carré flanqué d'une tour d'escalier quadrangulaire est toujours couronné de ses créneaux et mâchicoulis. Donné en 1694 à l'ordre de Saint-Jean de Dieu de la Charité pour y fonder un hôpital. Les frères y restèrent jusqu'en 1790. Les grands bâtiments pour malades, la chapelle et le jardin furent créés au XVIIIe siècle. L'établissement s'est agrandi au XVIIIe siècle et de nouveaux bâtiments furent construits autour du donjon, dernier vestige du château des Nesmond. Donjon et puits du XVe siècle, couronné de ses hourds et mâchicoulis.  \r\nLes Echelettes; devaient posséder quelques fortifications au Moyen-Age comme l'atteste la présence dans les bâtiments actuels d'une tour carrée, défendue par une meurtrière, éclairée par un oculus à remplage en forme de quadrilobe, et   percée d'une porte dont les bases sont à moulures prismatiques. Le site conserve un pigeonnier carré sur lequel sont figurées les armes d'une famille ayant possédé les Echelettes au XVIe siècle, les Gabard.","habitants":"Famille des Nesmond\"","divers":"Château de la Gayette et des Echelettes à Montoldre.","gps":"","images":["../../jctruffet.com/image/image_03/03_Gayette_1.jpg","../../jctruffet.com/image/image_03/03_Gayette_2.jpg","../../jctruffet.com/image/image_03/03_Gayette_3.jpg","../../jctruffet.com/image/image_03/03_Gayette_4.jpg","../../jctruffet.com/image/image_03/03_Gayette_5.jpg","../../jctruffet.com/image/image_03/03_Gayette_6.jpg","../../jctruffet.com/image/image_03/03_Gayette_7.jpg"]},"Consult_chateau_formulairef045":{"id":"Consult_chateau_formulairef045","dept":"03","canton":"Yzeure","commune":"Gennetines","nom":"Gennetines","type":"Château","periode":"XVII-XIX","histoire":"Quatre châteaux à Gennetines, Bordes du XVII-XIXe siècles, Breuil du XVIII-XIXe siècles, Panessière du XIXe siècle et de Peschins du XIXe siècle avec tour carrée. BORDES, une ancienne maison seigneuriale a été transformée en habitation plus confortable, au XVIIe siècle, par  Nicolas Menudel, qui était, en 1612, lieutenant en la vice sénéchaussée du Bourbonnais. propriétaire des Bordes, monsieur de Chavagnac.\r\nBREUIL, en 1599, maître Jean  Berthomier, avocat en la sénéchaussée de Bourbonnais, se présentait comme sieur du Breuil. Les Berthomier,  bourgeois moulinois, y résidèrent longtemps  et la transformèrent en maison de plaisance au XVIIe siècle.                  PANESSIERES, le château du XIIIe siècle  à été remplacé par la construction de maître Jehan Berthomier  en 1599, on succédé les Chauvin, famille de médecins et de militaires, dont une descendante Anne Chauvin épousa   Jean-Baptiste  Sallé,  écuyer, conseiller, secrétaire du roi, exécuté à Paris pendant la Révolution, dont la descendance François  reconstruisit le château au XVIIIe siècle, leur petite fille  Delphine-Pétronille se marie en 1809 avec Philibert Alarose, devenue veuve  eut de son second mariage avec Jean , Baron de la Brousse, une fille qui porta  le domaine  à un Larminat dont la fille épousa le comte Henri de Sampigny.  PESCHINS, on rencontre une famille du Peschin au XIVe siècle. En 1452, les coseigneurs du Peschin étaient Jacques du Peschin, écuyer, et son oncle, Pierre du Peschin, curé de Lucenay  en Avallet. En 1598, la seigneurie était  aux mains de Jean Breugnon. Le seigneur de Peschin était en 1611  Antoine Cadier, seigneur  de la Brosse-Cadier. La  dernière héritière, Marie Anne Cadier, épousa Simon Coiffier de Demoret et fut la mère de l'historien du  Bourbonnais. Comme Simon Coiffier avait émigré, Le Peschin fut confisqué en 1792 en même temps que ses autres biens; l'hôtel  Babute, Demoret, La Brosse, etc.","architecture":"Bordes, c'est un bel ensemble avec maison de maître et communs à lucarnes de bois et belvédère, installé dans un grand parc arboré, ou l'on découvre une petite chapelle néo-romane.                 Breuil,  avait pour centre un château sur une motte entourée de fossés Ce bâtiment fut détruit  après 1830, sur les ordres de M. de Mora, un réfugié espagnol, qui utilisa  les matériaux   pour faire édifier une \" maison plus moderne \" à quelque distance de là, c'est une demeure basse et longue,  à un seul niveau mais qui a conservé des combles élevés, probablement vestiges du XVe siècle, percés de deux lucarnes.      Pannessières, demeure du XVIIIe siècle, caractéristique de l'architecture civile du Bourbonnais de l'époque.  L'édifice se compose d'un corps de bâtiment à un étage, flanqué sur les côtés de deux ailes à un seul niveau auxquelles des constructions agricoles ont été adjointes sur les façades opposées à la cour d'honneur. Les communs ont été très remaniés, et l'élément le plus intéressant en est la bergerie en pan de bois.                              Péchins, une maison bourgeoise avec tour carrée en façade, construite en briques rouges au XIXe siècle, porte le nom  de château-Péchins.","habitants":"Famille de Nicolas Menudel              Famille de Jehan Berthomier         Famille d'Antoine Cadier\"","divers":"Château de Bordes, de Breuil, de la Panessières et de Péchins à Gennetines","gps":"","images":["../../jctruffet.com/image/image_03/03_Gennetines_1.jpg","../../jctruffet.com/image/image_03/03_Gennetines_2.jpg","../../jctruffet.com/image/image_03/03_Gennetines_3.jpg","../../jctruffet.com/image/image_03/03_Gennetines_4.jpg","../../jctruffet.com/image/image_03/03_Gennetines_5.jpg"]},"Consult_chateau_formulaire2ea9-2":{"id":"Consult_chateau_formulaire2ea9-2","dept":"03","canton":"Montet","commune":"Chatel-de-Neuvre","nom":"Grilliere","type":"Château","periode":"XIX","histoire":"GRILLIERE, Eustache de Monestay, chevalier, seigneur des Forges et de la Grillière, épouse en premières noces Gabrielle de Saint-Han, le 5 février 1500,  leur fils, Jehan de Monestay, gouverneur de Montluçon, tient le fief de la Grellière. Il épouse en 1579 Louise de Rochefort, fille de François et de Jeanne de Courtenay. Après lui, la Grillière passe à son fils Gaspard,  de ce mariage, naît Jean-François, Il vend sa terre de la Grillière, le 3 Avril 1661, à Antoine de Rives. Leur fille mineure, Catherine. Elle épousera en 1723 François de Lacôdre, Jacques Philippe de Lacôdre, fils de Gabriel et de Anne Mayat du Morat qui a résidé à la Grillière e de 1810 à 1830  qui firent construire le château actuel  qui sera vendut  à Augustin Leclerc, riche bourgeois serviteur de l'Etat  a épousé Elisabeth Pauline de Fussey d'une grande et illustre famille noble de Bourgogne de la région de Beaune, famille apparentée aux Montmorancy et aux Bourbon-Condé. Le fils de son épouse herite, vend la propriété  à monsieur Jean Marie Durieu. La propriété revient au comte  Stephen Durieu de Lacarelle. Ensuite, la propriété passe à leur fils Etienne Raymond comte Durieu de Lacarelle. Suite aux héritages de Barthelats et de son grand-oncle Achille Vernin d'Aigrepont en 1925 et à de nombreux achats, la propriété  est à son apogée et s'étend sur plusieurs communes. Sa fille Anne-Marie-Gabrielle Durieu de Lacarelle épouse du vicomte Augustin-Léon-Marie-Gabriel du Chemin de Chasseval (1905-1964), hérite de la propriété. Aujourd'hui, leur fils Hugues du Chemin de Chasseval et son épouse Florence de Galbert, héritiers, habitent le château.","architecture":"la Grillière,  édifice  en brique rouge,  le château actuel est une construction néo-gothique-écossaise datant des années 1895-98. Lorsque les propriétaires, revenant d'un voyage d'Angleterre, décident d'abandonner leur château de Logère pour construire un bâtiment d'inspiration écossaise. Ce château comporte de luxueu
