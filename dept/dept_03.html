 les mains de cette famille en 1479. Quelques années plus tard, c'était un officier du duc de Bourbonnais, Jean Delorme, procureur du duc qui   détenait le seigneurie du Pravier. Il fut réuni par des membres de la famille de la Souche aux seigneuries de St-Augustin, Noyant et Chaumont. La veuve de Claude de la Souche, Jeanne de Troussebois, y habitait en 1679. Leur fille Madeleine avait épousée François de Saint Aubin, qui devint ainsi seigneur du Pravier, ils n'eurent pas de postérité et Madeleine, veuve, parraina le fils de sa soeur Jeanne, en 1696. Celle-ci avait épousé Victor Deschamps, écuyer, qui succéda à son beau-frère comme seigneur du Pravier. Les Deschamp restèrent jusqu'à la Révolution au Pravier, et ils entretienent le bâtiment et la chapelle, pour laquelle  ils firent fondre une cloche neuve, bénite en 1674. Joseph Deschamps, chevalier en 1764, était écuyer en 1765, son fils, en faveur duquel il s'était dessaisi de ses biens de son vivant, n'était plus qualifié que d'écuyer en 1787. Aujourd'hui hôtel restaurant                                Les SALLES, on ne connaît pas la relation de ce lieu des Salles avec le château de la Salle, mais il a pu être un fief secondaire de la même famille.","architecture":"Salle, ce château du XIIIe siècle, agrandi à la fin du XVe siècle, présente une réelle homogénéité, une grande authenticité et certaines dispositions architecturales originales,  des corps de bâtiments disposés selon un plan en croix, avec murs pignons et contreforts circulaires disposés à chaque angle. Il a conservé ses baies à encadrements gothiques, notamment la porte d'entrée, ainsi que ses douves. A l'intérieur, cheminées monumentales, plafonds et cloisons à pans de bois.                  Le Pravier est un logis rectangulaire à deux niveaux et attiques avec  deux tours rondes d'angle à toits en poivrière très pointus , du XIXe siècle, qui a remplacé le château plus ancien. De beaux jardins à la française l'agrémentent, la demeure actuelle fut construite pour le compte d'un Heullard du Bouys est orné de ses armoiries.","habitants":"Famille de Victor Deschamps\"","divers":"Château de la Salle et du Pradier à Meillers","gps":"","images":["../../jctruffet.com/image/image_03/03_Meillers_1.jpg","../../jctruffet.com/image/image_03/03_Meillers_2.jpg","../../jctruffet.com/image/image_03/03_Meillers_3.jpg","../../jctruffet.com/image/image_03/03_Meillers_4.jpg"]},"Consult_chateau_formulaire28cf":{"id":"Consult_chateau_formulaire28cf","dept":"03","canton":"Le Donjon","commune":"St-Didier-en-Donjon","nom":"Millets","type":"Château","periode":"XV","histoire":"MILLETS, appartient d'abord à une famille de ce nom qui est signalée dans  les textes du XIVe siècle.  Le dernier seigneur des Millets, le baron François Jacques d'Estrées, émigra à la Révolution. L'édifice vendu comme bien national, changea plusieurs fois de mains aux XIXe et XXe siècles.","architecture":"Millets, maison-forte de la fin du XVe siècle, est un édifice, représentant plusieurs périodes de l'histoire de l'architecture   dans le département. Il se compose d'un corps de logis unique flanqué de deux pavillons  de plan rectangulaire sur cour, et   de deux tours circulaires sur le jardin, sur une base médiévale, il fut remanié en 1563. La porte d'entrée sur cour   et la fenêtre qui la surmonte sont encadrées de pilastres cannelés d'ordre dorique aux proportions un peu incertaines, mais qui montrent comment les règles de l'architecture classique pouvaient être interprétées à cette époque au confins du Bourbonnais.  Aux Millets se trouvent de nombreux communs aux volumes rappelant par leurs hautes toitures la silhouette du château proprement dit.","habitants":"Famille de Millets\"","divers":"Château de Millets","gps":"","images":["../../jctruffet.com/image/image_03/03_Millets_1.jpg"]},"Consult_chateau_formulairef17e-2":{"id":"Consult_chateau_formulairef17e-2","dept":"03","canton":"Marcillat-en-Combraille","commune":"Villebret","nom":"Modieres","type":"Château","periode":"XVII","histoire":"MODIERES,  autrefois Maudières, à la limite de Villebret et de Lavault Sainte-Anne, est le siège d'un ancien fief datant au moins du XIIe siècle. A l'ancienne maison seigneuriale dépendant de la châtellenie de Murat. Dès 1300, la seigneurie appartenait à Jean de la Faye, seigneur des Modières,  Humes et Saint-Genest. Avant 1490, François de Chaslus, seigneur de la Brosse  en est propriétaire, puis elle  passe aux Rogues, famille montluçonnaise qui possédait de nombreux biens aux alentours de la ville. En 1664, cette terre, mise en vente, est adjugée à Guillaume de Saint-Mesmin, puis, en 1699, elle passe à la famille  Pérot  d'Estivareilles qui la garde pendant un siècle. Au XIXe siècle, elle était en possession de la famille Michel.","architecture":"Modières, à l'ancienne maison seigneuriale dépendant de la châtellenie de Murat, a  succédé un élégant château. Il se compose d'un corps de bâtiment central  encadré de deux tourelles carrées.  A gauche, on note un logis du XVIIe siècle, et à droite, un autre logis à tour ronde de la fin du XIXe siècle. Le porche est daté de 1784.","habitants":"Famille  Pérot d'Estivareilles\"","divers":"Château de la Modières","gps":"","images":["../../jctruffet.com/image/image_03/03_Modieres_1.jpg","../../jctruffet.com/image/image_03/03_Modieres_2.jpg","../../jctruffet.com/image/image_03/03_Modieres_3.jpg"]},"Consult_chateau_formulaire9490-2":{"id":"Consult_chateau_formulaire9490-2","dept":"03","canton":"Dompierre","commune":"Molinets","nom":"Molinets","type":"Château","periode":"XIX","histoire":"Deux châteaux à Molinets;  château d'Estrées du XVII et le Parisien manoir du XIXe siècle.                         ESTREES, parce que c'est une très grande maison qui constituait une caserne idéale pour les armées allemandes. Après avoir franchi la Loire, ce qui n'était pas prévu puisque normalement ils devaient s'arrêter au fleuve, les allemands occupèrent donc notre rive. Molinet s'est retrouvé en zone occupée, la ligne de démarcation se trouvait à proximité, les douaniers étant aux manoir le Parisiens. Ils sont arrivés à Estrées en mai 1940, se sont présentés en expliquant leur intention de réquisitionner la maison, ce qu'ils firent immédiatement en demandant à la propriétaire de quitter les lieux sous 48 heures.","architecture":"Estrées, on peut situer le bâtiment actuel fin XVIIe, étant entendu qu'au XVIIIe, à partir de 1760, il a subi d'importantes transformations. Le bâtiment, disent les experts, a un très beau volume avec son corps de logis à deux étages et attiques dont les proportions sont des multiples du nombre d'or. C'est-à-dire correspond à une proportion considérée comme particulièrement esthétique.             Manoir le Parisien à deux niveaux  avec pavillons et donjon de forme carré en briques et  pierres.","habitants":"Seigneurs locaux\"","divers":"Châteu d'Estrées et manoir le Parisien au Molinets.","gps":"","images":["../../jctruffet.com/image/image_03/03_Molinets_1.jpg","../../jctruffet.com/image/image_03/03_Molinets_2.jpg","../../jctruffet.com/image/image_03/03_Molinets_3.jpg","../../jctruffet.com/image/image_03/03_Molinets_4.jpg"]},"Consult_chateau_formulaire9cbc":{"id":"Consult_chateau_formulaire9cbc","dept":"03","canton":"St-Pourcain-sur-Sioule","commune":"Monetay-sur-Allier","nom":"Monetay_Allier","type":"Château-Vestiges","periode":"XII","histoire":"Trois châteaux à Monétay;  le Montcoquet du XII-XIIIe siècle donjon et vestiges, la Chaise  et le petit Bressolles du XVIe siècle (voir article).                CHAISE, ce château s'appelait autrefois Le Riau, puis il a pris le nom de La Chaise, La Chaise est connue dans le passé en raison de son port fluvial, Pendant l'ancien régime l'édifice appartenait à la famille de Roys,  occupant d'importantes charges administratives et judiciaires à Moulins. En 1848, quand Emmanuel Roy de Lachaise hérite  de la propriété, son état général  est pitoyable. Emmanuel et son épouse s'attellent alors à  restaurer leur nouvelle maison.  Au XIXe siècle, le château de la Chaise devint la propriété de la famille de l'Etoile qui la possède toujours.                                MONTCOQUET,  situé à l'ouest de la commune de Monétay, le château s'élève sur une butte calcaire, c'est sans doute  un des plus anciens château d'Allier. En 1300, la veuve de Galet de Moncoquier épouse  Jean du Bet. Par la suite, Hugues de Bet est signalé seigneur de Montcoquier. En 1366, Jean du Colombier est   dit seigneur de Montcoquier, que sa femme Isabelle de Montfan lui a apporté en dot.  A la veille de la Révolution, il appartenait à Pierre de Champfeu qui mourut en 1789 sans postérité. A partir du  XVIIIe siècle, le château fut abandonné et passa pour avoir servi de refuge à Gilbert de Barthelat pendant la  Révolution.   Au XIXe siècle, il échappa à la restauration que projetaient ses propriétaires, les Girard. Donjon et logis furent   abandonnés, seuls les communs de la basse-cour continuèrent d'être occupés jusqu'en 1952.","architecture":"La Chaise, édifice composite sur une base médiévale, des adjonctions eurent lieu aux XVIIe et XVIIIe siècles, avec quelques remaniements  au XIXe siècle. La variété des matériaux (pierre, pisé, enduits divers, tuiles, ardoises) ainsi que la fantaisie des volumes, donnent à ce monument beaucoup de charme, accentué encore par la végétation abondante dans laquelle il semble surgir, la vue est particulièrement belle pour le promeneur descendant du bourg de Monétay.       Montcoquet, on peut ainsi dire que le château de Montcoquier n'a pas subi de transformations majeures depuis les travaux  du début du XVe siècle. Le château est dominé au sud par une colline qui descend en pente jusqu'à un fossé   sec. Une plateforme artificielle précède encore de ce côté le pied du donjon. La première enceinte formant basse cour au nord est occupée par des communs agricoles. Un colombier,, est situé un peu plus au nord sur les derniers contreforts de l'éminence rocheuse. Le donjon ne présente pas d'éléments de défense active hormis peut-être les créneaux et hourds aux sommets des murs. Mais des recherches dans l'efficacité de la défense passive sont attestées par l'adoption des angles de murs arrondis à l'extérieur, ces solutions visant à amoindrir l'effet des projectiles contre les murailles se mettent en place à partir de la fin du XIe siècle. Elles permettent d'envisager que la tour date pour ses parties hautes de la fin du XIIe siècle, les parties basses pouvant être un peu antérieures.","habitants":"Famille de Roys                        Famille Pierre de Champfeu \"","divers":"Vestiges de Montcoquet et château de la Chaise à Monetay sur Allier.","gps":"","images":["../../jctruffet.com/image/image_03/03_Monetay_Allier_1.jpg","../../jctruffet.com/image/image_03/03_Monetay_Allier_2.jpg","../../jctruffet.com/image/image_03/03_Monetay_Allier_3.jpg","../../jctruffet.com/image/image_03/03_Monetay_Allier_4.jpg","../../jctruffet.com/image/image_03/03_Monetay_Allier_5.jpg","../../jctruffet.com/image/image_03/03_Monetay_Allier_6.jpg","../../jctruffet.com/image/image_03/03_Monetay_Allier_7.jpg"]},"Consult_chateau_formulaire7e57":{"id":"Consult_chateau_formulaire7e57","dept":"03","canton":"Dompierre-sur-Besbre","commune":"Monetay-sur-Loire","nom":"Monetay_Loire","type":"Château","periode":"XVII","histoire":"Deux châteaux à Monétay sur Loire, Champouret du XVIIe siècle avec deux donjons, des Guérrauds du XVIIe siècle.   MONETAY  Hugues, chevalier, eut pour fille: Agnès, dame de Monestay, qui s'est mariée à Jehan de Montmorillon.Vers 1353, apparaît Hugues de Monestay. En 1405, à cette date, Jehan de Monestay achéte au duc Louis II,  une terre située au lieu dit \"l'Estang de la Greslière\".Vers 1507, la propriétaire est Marguerite d'Arson, dame des Forges, du Graveron et de la Greslière. En 1513, lui succède Jehanne de Maulvoisin, veuve d'Octavien de Monnestay. En 1518 et 1520, des reconnaissances de cens sont faites au profit de messire Eustache de Monestay, chevalier, seigneur des Forges et de la Grillière.                             CHAMPOURET  est une ancienne communauté agricole à la tête de laquelle on trouve, à la fin du XVIe siècle, Gilbert Champouret. Cette terre passa aux Regnaud, puis au début du XVIIIe siècle, par mariage, à François Meilheurat. En  1776 Champouret revint aux Regnaud par le mariage de deux frères de ce nom avec les filles de Claude Meilheurat.  La même famille possède encore Champouret.       GUERRAUDS, posession de la famille Regnaud depuis le début du XVIIe siècle, cette terre dépendait de la chapelle Sainte-Marie Madeleine d'Augerolles.","architecture":"Champouret,  édifié sur une éminence qui lui permet d'avoir un étage semi-enterré du côté de la pente, au nord-est, c'est un logis quadrangulaire à un étage, couvert d'un toit brisé éclairé de lucarnes. Les murs sont couverts d'un enduit gris sur lequel se détachent les entourages de pierre blanche des ouvertures.                       Guerrauds,  le château fut construit dans la seconde moitié du XIXe siècle, simple, composé d'un corps de logis rectangulaire à un étage et  toit en ardoise, flanqué sur chacun des petits côtés  de deux pavillons carrés  à trois niveaux  qui débordent  en hauteur le logis principal. Il reçoit en   façade un avant corps triangulaire. Un beau parc arboré sert de cadre à ce château du XIXe siècle.","habitants":"Famille d'Eustache de Monestay            Famille de Gilbert Champouret\"","divers":"Château de Champouret et des Guerrauds à Monetay sur Loire.","gps":"","images":["../../jctruffet.com/image/image_03/03_Monetay_Loire_1.jpg","../../jctruffet.com/image/image_03/03_Monetay_Loire_2.jpg"]},"Consult_chateau_formulaire08fb":{"id":"Consult_chateau_formulaire08fb","dept":"03","canton":"Varennes-sur-Allier","commune":"Montaigu-le-Blin","nom":"Montaigu_Blin","type":"Vestiges","periode":"XII","histoire":"Plusieurs châteaux à Montaigu le Blain dont le fort XIV-XVe siècle vestiges, le Boulaize du XVIIIe siècle, le Ciernat du XIXe siècle, le Fejard du XIXe siècle , le Jarousse du XVI-XVIIIe siècle, le Poncenat du XIVe siècle, le Puydigon du XVIe siècle et le Boucé du XVe siècle à quelques kilomètres au Nord.     MONTAIGU, à la fin du XIIe siècle,  appartient aux Saint-Julien de Saint Gérand. Il la cèdent au siècle suivant à un membre de leur famille qui le premier prend le titre de seigneur de Montaigu vers 1220. Pierre de Montaigu rend hommage en 1226 à Robert, évêque de Clermont, pour son château de Montaigu. A la fin du XIIIe siècle, la famille Aycelin s'est installée sur le fief et en 1309, c'est Gilles Aycelin de Montaigu qui est seigneur de Montaigu et du Breuil, de par sa mère Alix du Breuil. Il est vendu en 1439  à Jacques 1er de Chabannes, futur seigneur de Lapalisse. Mais il ne  le paiera jamais et les enfants des anciens seigneurs de Montaigu essaieront en vain de se faire dédommager. En 1503, Montaigu est tenu en coseigneurie, l'écuyer Jehan de Bar fait aveu  à la duchesse de Bourbon pour la neuvième partie, par indivis, en toute justice, du chasteau. Le fief passa ensuite aux de la Guiche. Henriette de la Guiche le porte en seconde noce à Louis de Valois en 1627. Ensuite, il est la propriété de Louis de Lorraine, puis de François de Rohan qui le cède en 1717 à son frère Hercule Mériadec, baron de Montbazon. Mais le château n'est plus habité depuis cette date et il est vendu en 1741 à François Senetaire du Buisson, seigneur de Douzon. Celui ci habite à Poncenat en raison de l'état d'abandon du château. Son fils sera arrêté et guillotiné à la Révolution et ses biens vendus en 1794. Depuis 1925, Montaigu, racheté par quelques personnes, se relève peu à peu de sa ruine.","architecture":"Montaigu le Blin du  XIVe au XV siècle,   occupe le sommet d'une butte dominant le village. Le château est endommagé pendant la guerre de Cent Ans, remis en état grâce à  l'aide du duc de Bourbon  Il se compose d'une enceinte flanquée, aux angles, du côté du pont-levis, de deux grosses tours et trois petites. Les murs d'enceinte et ces tours formaient le système de défense au XIVe siècle. Au centre s'élevait le donjon. A la Renaissance, d'importantes modifications furent faites par Jacques de Chabannes. Un corps de logis situé à gauche du pont-levis date de cette époque. Un portail  du XVe siècle, avec moulures donne accès à ce bâtiment, aujourd'hui vestiges.  \r\nBoulaize, corps de logis rectangulaire à deux niveaux haute toiture à la Mansart accolées de chaque côté de deux pavillons de même niveau.","habitants":"Famille de Jehan de Bar\"","divers":"Vestiges de Montaigu le Blin et château de Boulaize.","gps":"","images":["../../jctruffet.com/image/image_03/03_Montaigu_Blin_1.jpg","../../jctruffet.com/image/image_03/03_Montaigu_Blin_2.jpg","../../jctruffet.com/image/image_03/03_Montaigu_Blin_3.jpg","../../jctruffet.com/image/image_03/03_Montaigu_Blin_4.jpg","../../jctruffet.com/image/image_03/03_Montaigu_Blin_5.jpg","../../jctruffet.com/image/image_03/03_Montaigu_Blin_6.jpg","../../jctruffet.com/image/image_03/03_Montaigu_Blin_7.jpg","../../jctruffet.com/image/image_03/03_Montaigu_Blin_8.jpg","../../jctruffet.com/image/image_03/03_Montaigu_Blin_9.jpg"]},"Consult_chateau_formulaire6ec2":{"id":"Consult_chateau_formulaire6ec2","dept":"03","canton":"Varennes-sur-Allier","commune":"Montaigu-le-Blin","nom":"Montaigu_Blin_II","type":"Château","periode":"XVII-XIX","histoire":"BOULAIZE, cette construction du XVIIe siècle est le siège d'un fief qui semble avoir toujours été tenu par des capitaines ou officiers du château de Montaigu. En 1439, il est la propriété de Jean de la Boulaize, écuyer, capitaine de Montaigu. Au début du XVIIe siècle, il appartient à la famille Treille, dont une héritière, Madeleine, le portera par mariage en 1745 à Jean François Delaire. Leurs descendants le conserveront jusqu'au XXe siècle. La Boulaise : habitation dont les propriétaires sous le 1er empire prirent le nom de Delaire de la Boulaise au lieu de Delaire de Cambacérès (et ceci après avoir été fait baron d'empire).                         CIERNAT,construit, dans la deuxième moitié du XIXe siècle, un édifice moderne.                             FEJARD, au pied des remparts du château de Montaigu la famille Fréjard fit construire à lextrême fin du XIXe siècle  un château moderne  dinspiration néogothique, nous avons donné à cette maison le nom de château Mabru, bien  quelle semble navoir jamais porté de nom particulier.                     JAROUSSE,  Aubert de la Faige signale un plan ancien qui montre un édifice quadrangulaire, flanqué de quatre  tours circulaires, plus une carrée où était percée la porte d'entrée. Le bâtiment actuel consiste en un logis quadrangulaire  auquel est accolé une tour circulaire ancienne.        PONCENAT, au XIV siècle, par mariage, la famille Poncenat cède le château aux Boucé. Au XVIe siècle, le vieux château fort est en ruine. En 1568, François de Boucé, capitaine de Poncenat, perd la vie durant les guerres de religions. En 1632, la fille de François de Boucé vend le château à Balthazar Bayle. Il prend ainsi le titre de Baron de Poncenat. Au XVIIe siècle, le château est rebâti. En 1730, par mariage, le château est cédé à la famille de Maubranches. En 1745, le château est vendu à François Senetaire du Buysson, seigneur de Montaigu. Vers 1791, le député Philibert du Buysson de Douzon se retire dans son château de Poncenat. Vers 1792, les révolutionnaires séquestrent le citoyen Buysson de Douzon et pillent le château.","architecture":"Ciernat, un édifice moderne,  composé d'un logis quadrangulaire de trois niveaux surmonté d'un toit à croupe en ardoise, percé de lucarnes. La façade principale est augmentée au centre d'un avant-corps en saillie,  flanqué au troisième niveau, d'échauguettes en surplomb, le toit de cette tourelle se dresse haut au dessus du bâtiment. Le style néo-gothique de l'édifice est encore renforcé par les moulures qui souligne les linteaux des fenêtres du troisième niveau.                 Fejard,  un logis quadrangulaire étroit de trois niveaux, ouvert dun  toit à croupe en ardoise, percé de lucarnes, est encadré par 2 pans de ces pavillons sont perpendiculaires à celle du logis. Un escalier à 2 volées courbes, donnant accès  à une terrasse, est logé entre les pavillons. Laustérité de cette demeure  est cassée par ladjonction heureuse  dune tourelle polygonale en briques, en surplomb au milieu de la façade  de logis. Percée de fentes déclairage, couronnée dune corniche de pierres et surmontée dun toit en  ardoise, elle donne un peu délégance et castellise cette maison bourgeoise.               Poncenat, du XIIIe siècle , château fort. A la fin du XXe siècle, le château en ruine retrouve un nouveau propriétaire qui le reconstruit et l'aménage en habitation. Construit sur une motte naturelle terrassée, ruiné à la fin du XVIe siècle. Il fut rebâti au XVIIe siècle, pour être à nouveau pillé et démantelé après la Révolution, subsiste une tour semi-circulaire avec un  côté plat et quelques pans de mur, ainsi qu'une partie du porche d'entrée, sa porte charretière a perdu son arche, mais il a conservé  une porte piétonnière à fort bossage.                             Puydigon deux tours carrées l'une d elles présente des ouvertures à moulures prismatiques terminées par un arc en accolade.","habitants":"Famille Treille                     Famille Fréjard\"","divers":"Château de Ciernat, de Féjard, de Poncenat, de Puydigon, de Morets et de Jarousse à Montaigu le Blin","gps":"","images":["../../jctruffet.com/image/image_03/03_Montaigu_Blin_II_1.jpg","../../jctruffet.com/image/image_03/03_Montaigu_Blin_II_2.jpg","../../jctruffet.com/image/image_03/03_Montaigu_Blin_II_3.jpg","../../jctruffet.com/image/image_03/03_Montaigu_Blin_II_4.jpg","../../jctruffet.com/image/image_03/03_Montaigu_Blin_II_5.jpg","../../jctruffet.com/image/image_03/03_Montaigu_Blin_II_6.jpg","../../jctruffet.com/image/image_03/03_Montaigu_Blin_II_7.jpg"]},"Consult_chateau_formulaire1d10":{"id":"Consult_chateau_formulaire1d10","dept":"03","canton":"Le Donjon","commune":"Montaiguet-en-Forez","nom":"Montaiguet_Forez","type":"Maison forte","periode":"XV","histoire":"Trois châteaux à Montaiguet en Forez, le Montaiguet, le Grand-Cour et le Boirots.  MONTAIGUET, le château du XVe siècle de Montaiguet est un petit château fort  imposant, fief de  Pierre de la Fin. Les travaux et les fondations du château allaient transformer le bourg lui-même en une cité moitié militaire, moitié ecclésiastique d'un  aspect particulier et très intéressant,  \r\nManoir du GRAND-COUR, du XVIIe siècle transformé  en gites  de France.          A quelques kilomètres au nord à Lenax châteaux de BOIROTS aucune information sur la seigneurie de Boirots  peut être celui d'une communauté anoblie. Seuls les bâtiments  nous permettent de parler du château.","architecture":"Montaiguët-en-Forez  du XVe siècle  est un bon exemple des petits châteaux fortifiés construits dans le Centre, Ce château se compose d'un corps de logis rectangulaire, flanqué de quatre tours d'inégale grosseur, orientées aux  quatre points cardinaux et percées de meurtrières. Les fossés ont été comblés. Tours et corps de logis s'élèvent à la même hauteur et comportent trois étages au-dessus de salles basses voûtées,et a une pièce à chaque niveau, chacune comprenant une grande cheminée. Occupant le rez-de-chaussée de la tour est du château, la chapelle castrale est une pièce circulaire voûtée d'ogives. Porte dont la toiture en tuiles domine deux grosses tours découronnées. La façade est ornée d'une niche avec, en-dessous, les armoiries de l'abbé dans un cartouche. La porte était surmontée d'une chambre, aujourd'hui à usage de mairie, autrefois utilisée pour la manoeuvre d'une herse et d'un pont-levis dont les emplacements sont demeurés visibles. L'une des tours contient l'escalier de pierre en spirale conduisant à cette chambre haute. La porterie a conservé sa toiture primitive couverte de tuiles vernissées polychromes.                           Grand-Cour,  manoir avec corps de logis rectangulaire à deux niveaux  flanqués de tours carrées à toits pointus.           Boirots , seuls les bâtiments  nous permettent de parler du château. Le corps massif du bâtiment  central, à deux niveaux et à niveau de comble, est accosté  de deux tourelles circulaires  d'angle à toit conique  éffilé.","habitants":"Abbé Pierre de la Fin.\"","divers":"Château fort de Montaiguet  et le manoir de Grand cour à Montaiguet en Forez.","gps":"","images":["../../jctruffet.com/image/image_03/03_Montaiguet_Forez_1.jpg","../../jctruffet.com/image/image_03/03_Montaiguet_Forez_2.jpg","../../jctruffet.com/image/image_03/03_Montaiguet_Forez_3.jpg","../../jctruffet.com/image/image_03/03_Montaiguet_Forez_4.jpg","../../jctruffet.com/image/image_03/03_Montaiguet_Forez_5.jpg","../../jctruffet.com/image/image_03/03_Montaiguet_Forez_6.jpg"]},"Consult_chateau_formulaire98eb":{"id":"Consult_chateau_formulaire98eb","dept":"03","canton":"Souvigny","commune":"Souvigny","nom":"Montaret","type":"Forteresse","periode":"XIII","histoire":"MONTARET, fut bâti pour la famille d'Entraigues. Jean, capitaine-châtelain de Souvigny, obtint en 1449 l'autorisation de faire fortifier son hôtel de Montaré. En 1503 c'est toujours un membre de la famille d'Entraigues qui possède Montaret et damoiselle Jehanne d'Entraigues  fait aveu à la duchesse de Bourbon de son \"hostel et  place de Montaret avec  le domaine en métairie.  En 1595, le château était possession de la famille de Montmorin. Jacques de Montmorin  était sieur , en même temps  que de Montaret  et du Chatelard. La dernière héritière fut, vers 1670, Françoise de Montmorin, dame de Chatelard et Montaret, qui avait épousé Frédéric de Gamache.  En 1734, c'était Antoine Bonand, contrôleur des guerres  à la suite de la première compagnie des mousquetaires  du roi, qui était le seigneur. La propriété resta  dans la famille  jusqu'à la Révolution, un  Bonand épousa une Mathieu de Noyant. Le château a brulé en 1929 et il ne reste plus que des ruines.","architecture":"Montaret, de style féodal quadrilataire,avec  donjon carrée à mâchicoulis sur un angle, corps de logis en équerre à deux niveaux  tourelles carrée sur un angle et tourelle circulaire à l'opposée avec mâchicoulis et une tourelle de guet  surplombant le tout.","habitants":"Famille d'Entraigues\"","divers":"Château de Montaret à Souvigny","gps":"","images":["../../jctruffet.com/image/image_03/03_Montaret_1.jpg","../../jctruffet.com/image/image_03/03_Montaret_2.jpg","../../jctruffet.com/image/image_03/03_Montaret_3.jpg"]},"Consult_chateau_formulairef740":{"id":"Consult_chateau_formulairef740","dept":"03","canton":"Chantelle","commune":"Chezelle","nom":"Montchoisy","type":"Maison forte","periode":"XV","histoire":"MONT-CHOISY, un fief est attesté dès le XIVe siècle, il appartient à la famille de Montchorit, qui porte l'ancien nom de ce fief, surtout liée à la famille du Buysson, famille originaire du Livradois, qui s'installe en ce lieu à la fin du XVe siècle, en la personne d'Antoine du Buysson (1458-1526), chambellan du duc de Bourbon, lequel épouse le 29 février 1496 Louise de Mauriac de La Balancière, dame de La Cave. De ce couple descend une nombreuse lignée, qui s'est illustrée dans la magistrature à Moulins mais aussi dans les fonctions militaires et qui était richement possessionnée dans tout le sud du Bourbonnais. Leur arrière-petit-fils, Philibert du Buysson, né à Montchoisy le 20 juillet 1578 et mort le 6 mars 1670, président en la sénéchaussée de Bourbonnais et siège présidial de Moulins, maire de Moulins, transforme  la demeure. Au XIXe siècle, Montchoisy passe à la famille Dutour de Salvert marquis de Bellenave. Le château connaîtra ensuite différents propriétaires, dont Me Barge, notaire à Thiers. Le château passe ensuite en 2006 aux propriétaires actuels qui sacharnent à redonner vie à ce lieu trop longtemps laissé a labandon.","architecture":"Château de Montchoisy, en 1322  l'édifice se composait dun long bâtiment  appelé par  les gens de la région le vieux Monchorit. En fait, le château était le plus vieux fief  de la région et cette propriété était dune telle importance, quelle pouvait vivre delle-même. Lemplacement de construction du château   avait été choisi par les seigneurs de lépoque, pour sont climat tempéré, sans doute lun des plus doux dAuvergne. Cest en 1496 que le château change de forme, de nom et de famille. Le long bâtiment existant deviendra laile  nord dun quadrilatère formant une cour fermée. Une tour descalier sera érigée au centre de la façade du bâtiment  central, il permettait de relier les cuisines situées dans les caves, aux appartements du seigneur basés à létage.  Laile nord conserve ses cheminées du XIVe siècle.","habitants":"Famille de Philibert du Buysson\"","divers":"Château de Montchoisy à Chezelle.","gps":"","images":["../../jctruffet.com/image/image_03/03_Montchoisy_1.jpg","../../jctruffet.com/image/image_03/03_Montchoisy_2.jpg"]},"Consult_chateau_formulaire15a8":{"id":"Consult_chateau_formulaire15a8","dept":"03","canton":"Le Donjon","commune":"Montcombroux-les-Mines","nom":"Montcombroux","type":"Château","periode":"XVII","histoire":"Deux châteaux a Montcombroux dont celui de Moncombroux et de Pruneaux. MONTCOMBROUX, au XIIIe siècle, est le siège d'une prévoté qui appartient à Jean de Bourgogne, époux d'Agnès, dame de Bourbon. Mais la circonscription judiciaire fut transformée en seigneurie. Aussi en 1301, Jean de Montcombroux reconnait tenir en fief ses terres de Montcombroux et autres lieux. Après avoir appartenu à la famille Grutel au XIVe siècle, puis aux Maréchal au XVe siècle, le fief est, en 1587, aux  mains d'Adrien Gerbe, aussi seigneur de Gléné d'Ande. En 1629, le nouveau propriétaire est Jacques de James,  l'ancienne demeure seigneuriale ne devait plus être très confortable, son fils Henri, époux de Louise de Ramas. Saisie en 1691, la terre de Montcombroux changea plusieurs fois de propriétaires et, à la veille de la Révolution, elle appartenait à la famille Meilheurat, seigneur de Grosbois.   Aujourd'hui transformé en chambres d'hôtes.                          PRUNEAUX, demeure construite au XIXe siècle par la famille Meilheurat, mais la seigneurie des Prureaux est attestée anciennement. Le château est occupé aujourd'hui par l'association \"Le Créneau\", qui organise des chantiers internationaux et des ateliers d'insertion. Création par l'association des Gueules Noires, en partenariat avec la municipalité, d'un chevalement rappelant le travail des mineurs.","architecture":"Montcombroux en 1649,  transformation  la maison paternelle  en une agréable demeure en forme de pavillon, avec tour carrée à clocheton.              Pruneaux  Corps de bâtiment rectangulaire à trois niveaux, avec une tour hexagonale engagée au centre de la façade et tours rondes sur le parc.","habitants":"Famille Meilheurat\"","divers":"Château de Moncombroux et de Pruneaux à Moncombroux les Mines.","gps":"","images":["../../jctruffet.com/image/image_03/03_Montcombroux_1.jpg","../../jctruffet.com/image/image_03/03_Montcombroux_2.jpg","../../jctruffet.com/image/image_03/03_Montcombroux_3.jpg","../../jctruffet.com/image/image_03/03_Montcombroux_4.jpg"]},"Consult_chateau_formulaire2583-2":{"id":"Consult_chateau_formulaire2583-2","dept":"03","canton":"Gannat","commune":"Monteignet-les-Andelot","nom":"Monteignet_Andelot","type":"Château","periode":"XVI-XIX","histoire":"Deux châteaux à Monteignet, d'Idogne du XVIII-XIXe siècle  et et Fontorte XVIIe siècle chambres d'hôtes,  ce dernier  au milieu d'un parc agréable.               FONTORTE fut construit sous  Louis XIII, par le maréchal, marquis d'Effiat, et  devint la propriété de son fils, le marquis de Cinq-Mars. Après l'exécution de ce dernier, en 1642, la terre de Fontorte, confisquée, fut vendue à la famille Ferrand qui en est restée propriétaire jusqu'en 1883. Achetée à cette date par le baron Peyroux, Fontorte fut, en 1901, acquis par la famille Verdillon. Aujourd'hui transformé en hôtel restaurant.                  IDOGNE, c'est probablement la famille Coiffier  qui est à l'origine de la construction Renaissance  du château d'Idogne. En  1564 la seigneurie d'Idogne est vendue au chevalier Guillaume Fradel qui est également seigneur des Granges à Escurolles. Mais ce dernier, ayant des difficultés financières, revendit Idogne en 1575, à Antoine Forget, écuyer et  officier royal.   Au début  du XVIIe siècle, la terre d'Idoigne passa par alliance à la famille Goy, qui ne s'en sépara qu'en octobre  1781, par une donation à Joseph Chevarrier de Gannat. Ce dernier ayant été dépossédé sous la Révolution, Idogne vint aux mains des Rudel de Mirail et, au début du siècle il appartenait à la famille Kemlin.","architecture":"Fonforte, au milieu d'un parc agréable, le château de Fontorte déploie sa construction dans le pur style Louis XIII. Le bâtiment à deux niveaux et niveau de comble est constitué d'un corps central flanqué de deux pavillons en saillie sur la façade principale. L'escalier d'accès monte à une vaste terrasse, bordée de balustres, qui s'étend  entre les deux pavillons sur toute la longueur de la façade. Le toit est ornementé de lucarnes à frontons de pierres. Les murs, construits de briques appareillées et de pierre de Volvic, avec assises de pierre blanche, ont été  recouverts  d'un enduit de mortier.       Idogne, existait encore, au XVIIe siècle, la motte d'Idogne, ou était installé le château primitif. Le château actuel est une construction de XVIe siècle. Le grand corps de bâtiment en a tous les caractères, avec son toit brisé à la Mansart, qui se retrouve d'ailleurs dans les communs, et un fronton aux armes des Rudel du Mirail, en guise de lucarne.","habitants":"Marquis de Cinq-Mars                Famille d'Antoine Forget \"","divers":"Château de Fonforte et de Idogne à Monteignet les Andelot","gps":"","images":["../../jctruffet.com/image/image_03/03_Monteignet_Andelot_1.jpg","../../jctruffet.com/image/image_03/03_Monteignet_Andelot_2.jpg","../../jctruffet.com/image/image_03/03_Monteignet_Andelot_3.jpg","../../jctruffet.com/image/image_03/03_Monteignet_Andelot_4.jpg","../../jctruffet.com/image/image_03/03_Monteignet_Andelot_5.jpg"]},"Consult_chateau_formulaireea42":{"id":"Consult_chateau_formulaireea42","dept":"03","canton":"Mayet-de-Montagne","commune":"Ferrières-sur-Sichon","nom":"Montgilbert","type":"Vestiges","periode":"XIII","histoire":"MONTGILBERT, construit par la famille de Saint-Gérand, vers 1250. Vers 1280, il est acheté par la famille Aycelin de Montaigu. Par mariage, le château passe à la famille de Vienne. Toutefois, de 1434 à 1439, pendant la guerre de Cent Ans, il est confisqué au profit de Rodrigue de Villandrando, mercenaire espagnol à la solde du roi Charles VII. Des modifications importantes, bastion, enceinte extérieure,  y sont effectuées. Pendant la Renaissance, Montgilbert devient de moins en moins un lieu de résidence pour ses propriétaires, la famille de Saulx-Tavannes. Les guerres de religion ensanglantent le pays, et le Bourbonnais est définitivement rattaché à la France. Sous Louis XIV, les propriétaires habitent à la cour. Certaines parties du château sont abandonnées et sa ruine commence. Vers 1770, le dernier héritier, Jean Baptiste Bravard d'Eyssat Duprat, revient à Montgilbert avec sa mère qui, pour l'obliger à quitter ce château démodé, aurait fait décheviller la toiture. En 1793, le château est vendu comme bien national. Au XIXe siècle, il sert de carrière de pierres aux habitants des alentours, ce qui ne fait qu'accélérer sa ruine. Il a été inscrit monument historique le 11 octobre 1930. Une association de sauvegarde du site a été créée en 1974 après quelques premiers travaux effectués. Cette association est toujours active (2013) et organise chaque année des chantiers de jeunes bénévoles. Cette association est affiliée à lUnion Rempart.","architecture":"Montgilbert  bâti au XIIIe siècle est situé au sommet d'une butte rocheuse. Il est composé de deux enceintes, lenceinte extérieure, adaptée au terrain, renforce la défense (tours, archères) à l'ouest et au sud, du côté de la plus faible pente et délimite une cour basse où vivaient les serviteurs. Cette enceinte a été remaniée au XVe siècle pour l'adapter à l'artillerie naissante, des canonnières, un bastion aux murs épais condamnant l'entrée d'origine trop exposée. L'enceinte haute, de plan carré, comporte des tours rondes aux angles, où se voient encore de belles voûtes, et comportait des tours carrées au centre des courtines qui ont pour la plupart disparues. Cette enceinte était couronnée d'un chemin de ronde. Une porte avec herse, encadrée de deux tours, châtelet d'entrée, donne accès à la cour haute où se trouvaient les logis seigneuriaux avec la salle d'apparat, les communs avec la cuisine et sa grande cheminée, ainsi que de nombreuses réserves : citerne pour l'eau, silo pour le blé et caves sous les logis avec leur escalier d'accès. Une galerie couverte longeait les bâtiments du côté de la cour haute. A partir du XVe siècle, ces bâtiments sont modifiés pour les rendre plus confortables, ouverture de fenêtres, pose denduits muraux, construction dune rampe d'accès à la poterne située dans les logis seigneuriaux. Le château est ensuite délaissé, des salles abandonnées, des fenêtres murées, jusqu'à l'abandon complet à la fin du XVIIIe siècle, peu avant la Révolution.","habitants":"Famille de Saulx-Tavannes\"","divers":"Vestiges de Montgilbert à Ferrières sur Sichon.","gps":"","images":["../../jctruffet.com/image/image_03/03_Montgilbert_1.jpg","../../jctruffet.com/image/image_03/03_Montgilbert_2.jpg","../../jctruffet.com/image/image_03/03_Montgilbert_3.jpg","../../jctruffet.com/image/image_03/03_Montgilbert_4.jpg"]},"Consult_chateau_formulaire35df":{"id":"Consult_chateau_formulaire35df","dept":"03","canton":"Montluçon","commune":"Montluçon","nom":"Montlucon_Ducs","type":"Château","periode":"XI-XV","histoire":"DUCS de MONTLUCON, au XIe-XVe siècle, il héberge un régiment d'infanterie, bien que Montluçon  n'ait jamais été la résidence habituelle des ducs de Bourbon, ils y eurent pourtant une demeure que Louis II se plut d'embellir, c'est  en 1070 Guillaume, fils d'Archambaud IV de Bourbon devient seigneur de Montluçon. Les seigneurs  unissent leur destinée aux sires de Bourbon en 1215 à l'occasion du mariage de Béatrix, fille d'Archambaud de Montluçon avec Archambaud de Bourbon. Beatrix, héritière s'allira en 1272 à un prince capétien, Robert de Clermont. Fin XIVe début  Louis II de Bourbon hérite et ses fils édifient progressivement un ensemble dont ne subsiste plus aujourdhui que le logis principal, Jean Ier  y résida peu, Charles Ier y séjourna à plusieurs reprises, Charles VII y vint et Louis XI pour des motifs de Guerre en 1465. Pierre II et Anne de France y vinrent fort peu. Rapidement déserté, le château de Montluçon  connaît une longue période de déshérence et doccupations diverses. Au début du XVIe siècle, après une lutte qui opposé  Charles le Connétable à François Ier le château fut abandonné, fortement endommagé, saccagé à la Révolution, il est restitué à la Ville  en 1913 et restauré durant l'entre deux guerres, en particulier la galerie couverte qui a été reconstituée afin d'accueillir le musée.","architecture":"Le château des ducs de Bourbon à Montluçon Castrum Montis Lucii est mentionné pour la première fois dans lencyclique des religieux de Souvigny en 1049 est une forteresse médiévale qui surplombe la ville. Construit au XIe siècle,  ce n'est qu'au XIVe qu'il devient une véritable place forte entourée de remparts et la résidence principale de la famille des Bourbons.  Remanié au XVe siècle. Au XIIIe siècle, des tours sont adjointes à lenceinte polygonale il en reste encore neuf des trente trois tours qui le ponctuaient,   le logis principal, vaste bâtiment  encadré dun beffroi et dune tour carrée couronnée de créneaux, agrémentée sur sa façade  Est dune galerie à colombages couverte.  Le château se présente comme un imposant corps de logis sur deux étages, flanqué d'une tour rectangulaire, d'une tourelle, de la tour de l'Horloge, le logis a gardé sa galerie boisée à l'italienne au XVe siècle .","habitants":"Ducs de Bourbon\"","divers":"Château des Ducs à Montluçon","gps":"","images":["../../jctruffet.com/image/image_03/03_Montlucon_Ducs_1.jpg","../../jctruffet.com/image/image_03/03_Montlucon_Ducs_2.jpg","../../jctruffet.com/image/image_03/03_Montlucon_Ducs_3.jpg"]},"Consult_chateau_formulaire97dd":{"id":"Consult_chateau_formulaire97dd","dept":"03","canton":"Montluçon","commune":"Montlucon","nom":"Montlucon_II","type":"Château","periode":"XV","histoire":"Plusieurs châteaux à Montlucon, du Bien-Assis du XVe siècle avec tour carrée(voir article), des  ducs de Bourbon ( voir article), des Etourneaux du XVe siècle , de la Louvière (voir article avec Bien-Assis) et de Saint-Jean  du XVe siècle transformé en restaurant. Autres châteaux dont je n'ai pas d'information historique, château de l'Argentières, de Bisseret, de Goutières le Château, de Magnoux, manoir en Teillet-Argenty, de Mazeri,  le château de Moulins.   ETOURNEAUX,  château construit au XVe siècle par le duc Jean II de Bourbon qui en fit don à l'un de ses enfants illégitimes en 1484. De plan rectangulaire, la maison forte comprend, à chacun de ses deux niveaux, deux grandes salles ayant conservé  leur cheminée à hotte, flanquant la façade ouest,  une tour, cantonnée d'une tourelle,  sert de cage à l'escalier en colimaçon. Au sud, un appentis voûté à rez-de-chaussée servait autrefois de chapelle.  La façade sur rue, à l'est, bouche à feu  et de deux archères. L'intérieur présente un fragment de peinture murale  dans la pièce nord du rez-de-chaussée.                      SAINT-JEAN -Entre-Les-Vignes, comme on le désignait jadis, fut jusqu'à la Révolution un établissement de la Commanderie des Chevaliers de l'Ordre de Malte, de Saint-Jean de Jérusalem, origine de son nom. Transformé en hostellerie en 1925,le domaine château Saint-Jean est un hôtel 4 étoiles membre des Châteaux et Hôtels collection, avec un restaurant abrité dans une chapelle romane du XIIe siècle. La cuisine du chef Thierry Douault et de son équipe repose sur une gastronomie à base de produits régionaux.","architecture":"Etourneaux,  maison forte    XVe siècle, de plan rectangulaire, la maison forte comprend, à chacun de ses deux niveaux, deux grandes salles ayant conservé leur cheminée à hotte. Flanquant la façade ouest, une tour carrée, cantonnée d'une tourelle, sert de cage à l'escalier en colimaçon. Au sud, un appentis voûté à rez-de-chaussée servait autrefois de chapelle. La façade sur rue, à l'est, est percée de fenêtres moulurées et repose sur un soubassement taluté percé d'une bouche à feu et de deux archères. L'intérieur présente un fragment de peinture murale dans la pièce nord du rez-de-chaussée. \r\nSaint-Jean, blottie dans les frondaisons d'un parc verdoyant et centenaire, orné de magnifiques arbres séculaires, notre demeure est située à Montluçon, au centre de la France, entre la rivière le Cher et le grand chemin de l'Auvergne. Saint-Jean-Entre-Les-Vignes, comme on le désignait jadis, fut jusqu'à la Révolution un établissement de la commanderie des chevaliers de l'Ordre de Malte, de Saint-Jean de Jérusalem, origine de son nom. Transformé en hostellerie en 1925.","habitants":"Seigneurs locaux\"","divers":"Château de St-Jean, des Etourneaux, de l'Argentière, de Bisseret, de  Magnoux,  de Mazeri, des Goutières à Montluçon.","gps":"","images":["../../jctruffet.com/image/image_03/03_Montlucon_II_1.jpg","../../jctruffet.com/image/image_03/03_Montlucon_II_2.jpg","../../jctruffet.com/image/image_03/03_Montlucon_II_3.jpg","../../jctruffet.com/image/image_03/03_Montlucon_II_4.jpg","../../jctruffet.com/image/image_03/03_Montlucon_II_5.jpg","../../jctruffet.com/image/image_03/03_Montlucon_II_6.jpg","../../jctruffet.com/image/image_03/03_Montlucon_II_7.jpg"]},"Consult_chateau_formulaire60cc":{"id":"Consult_chateau_formulaire60cc","dept":"03","canton":"Lapalisse","commune":"Arfeuilles","nom":"Montmorillon","type":"Vestiges","periode":"XIII","histoire":"A Arfeuilles deux châteaux, des Charbonniers du XV-XVIe siècle et vestiges de Montmorillon.         MONTMORILLON  en 1256 fief de Guillaume de Montmorillon. Se succédèrent  un certain nombre de seigneurs parmi lesquels Regnault de Bressolles qui obtint en dot cette seigneurie de son épouse Blanche de Montmorillon. Passa ensuite dans  la famille de Chauvigny qui le confie vers 1449 à un certain Jousselin du Bois, lequel le revendit à Roffec II de Balzac dEntragues. Originaire de Balzac prés de Brioude, Jean de Balzac dEntragues, époux dAgnès de Chabannes, fille du Maréchal de La Palice, Jean, son fils Roffec II avait épousé en 1454 Jeanne dAlbon. Il était un des favoris du Roi; et cest lui qui acheta Montmorillon et Saint-Clément.  Geoffroy étant décédé en instituant Claude comme seule héritière, celle-ci se remaria en 1516 avec Jean de Chabannes frère du célèbre maréchal Jacques de Chabannes-Lapalisse. Jean fut tué à la bataille de Rebec en avril 1524. Il laissait ses biens à son frère Jacques, y compris ceux hérités de son épouse Claude dont Montmorillon. Jacques fut tué à la célèbre bataille de Pavie en 1525. Son fils Charles épousa en secondes noces Catherine de la Rochefoucault. En 1568 était seule possesseur des terres dArcy, de Montmorillon  Saint-Clément ainsi que du fief de Bellecour que le Cardinal de Tournon. Elle avait été mariée avec André de Guillard, conseiller du Roi Henri II. Marie de Guillard se réfugia avec son fils Louis dans la forteresse de Montmorillon. Leurs situations financières étant désastreuses, ils vendirent à André Popillon, Baron de Châtel-Montagne leur portion des grandes dîmes dArfeuilles. Elle mourut vers 1617, son fils Louis layant précédée, le premier novembre 1616, en laissant quatre enfants sous la tutelle de leur mère, Marie Raguier: Philippe, Marie, Suzanne et Louis.","architecture":"Charbonniers,  au XVe siècle,  Charbonnier fut le siège d'un bailli, le lieu est situé à la limite de l' Auvergne et du Bourbonnais, et le toponyme voisin, Les Mirandons, peut signaler un ancien poste de surveillance, ancien château des Charbonniers est encore un solide bloc cubique des XVe et XVIe siècles, adossé a un  promontoire rocheux à vue ouverte  vers l'ouest et le nord. Sur le sommet de la colline, la photo aérienne permet de distinguer des anomalies de terrain qui pourraient marquer la situation d'un château plus ancien.            Montmorillon , le premier seigneur de la forteresse, qui commandait le passage de cette région montagneuse, Le Roi fit embellir Montmorillon et en particulier édifier le donjon dont il reste les ruines contenant une salle basse, où on retrouve à la clef de voûte les armes des Balzac. Montmorillon Seize mètres de côté, cinq étages, cétait bien plus quune simple forteresse,  cétait un lieu sûr où les châtelains ont aimé séjourner jusqu'en 1715.  Le château dArcy fut pris et pillé ainsi que celui dArfeuilles. le château de Montmorillon aux troupes de Richelieu et quil réussit à senfuir par des souterrains. Richelieu en profita pour faire démanteler lédifice. Une lézarde dans le donjon reste le témoin de lopération. Les ruines de Montmorillon ont encore belles allures, sur le site escarpé d'un éperon de confluence.   L'imposant donjon dresse ses murs carrés de plus  de 15 m de côté, sur une vingtaine de mètres de hauteur. Son accès était protégé par une solide enceinte, appuyée de plusieurs tours rondes à meurtrières.            Arfeuilles possède son château lieu de vacances gites de France et restaurant.","habitants":"Famille de Chauvigny\"","divers":"Vestiges de Montmorillon et château de Charbonniers à Arfeuilles","gps":"","images":["../../jctruffet.com/image/image_03/03_Montmorillon_1.jpg","../../jctruffet.com/image/image_03/03_Montmorillon_2.jpg","../../jctruffet.com/image/image_03/03_Montmorillon_3.jpg","../../jctruffet.com/image/image_03/03_Montmorillon_4.jpg"]},"Consult_chateau_formulaire0f39":{"id":"Consult_chateau_formulaire0f39","dept":"03","canton":"Ebreuil","commune":"Vicq","nom":"Mothe_Vicq","type":"Maison forte","periode":"XV","histoire":"MOTHE (la), le premier seigneur connu au XIIIe siècle est Guibert de Vic, chevalier et chambellan de Guillaume de Bourbon, en 1305. Étienne de Vic  dit Hugolin épouse Alasie de Vichy, leur fils Raoul de Vichy, homme d'armes du duc de Bourbon, épouse Edmée de Semur. La construction du château sur les bases de l'ancien existant par la famille d'Arçon en 1449, Bertrand d'Arçon, écuyer et seigneur de la Motte d'Arçon, reconstruit le château en pierre. Louis d'Arçon, chevalier, épouse Marie de Chouvigny de Blot en 1506 . En 1516, il est nommé capitaine de Lay en Beaujolais. Il était très attaché à la cour de Chantelle, où il avait des fonctions auprès d'Anne de Beaujeu, fille ainée du Louis XI. le château passe à la famille de Murol puis aux d'Aulzon de Montravel. au XVIIe siècle aux de  Louet de Cauvisson, en 1632, acquit  par Antoine Montrognon de Salvert, maréchal des logis dans la compagnie des gardes de la marine. Son petit-fils Claude, seigneur de la Mothe d'Arçon, écuyer,  Mme la Dauphine en 1689, puis écuyer ordinaire de la duchesse de Bourgogne, devient ensuite gouverneur des pages de la Grande-Écurie du roi en 1705. Il épouse en août 1705  Marie-Andrée Bréveau de Rédemont, nièce d'André Le Nôtre, son fils François, écuyer de la reine Marie-Antoinette de 1775 à 1790, épouse en mai 1771 Angélique-Victoire de Vaucanson, fille de Jacques de Vaucanson. En novembre 1788, François et son frère vendent le château à Antoinette de La Chaussée qui le transmet a sa fille lorsqu'elle épouse Gilbert de Ponthenier. Pour éviter la ruine monsieur Louis Imbert  architecte l'acquit en 1919 , le restaure et les travaux se continuent par le nouveau propriétaire monsieur  Houdebert qui le transforme en gite d'étape.","architecture":"La Mothe, ancienne motte castrale artificielle, avec une tour en bois entourée de profonds fossés  avec un pont levis , puis une palissade en bois, une seconde palissade protégeant les communs (la ferme). Mme de la Chaussée reçoit le 21 juin 1794, la visite du citoyen Cariol, commissaire de la République, suite à une mission par le directoire du district de Gannat, afin d'inspecter les châteaux susceptibles d'être privés de leurs signes de féodalité. Elle réussit à sauver les douves du château, grâce à une petite source qui coule dans les douves et qui alimentait un moulin en contrebas. Le châtelet d'entrée du château fut amputé de deux étages, ainsi que les tours à lintérieur de la cour dhonneur. Le château resta au mains des métayers pendant quatre-vingts ans. Le manque de soin fit plus de mal que la Révolution, le château était pratiquement ruiné. Aujourd'hui, il est ouvert aux visites par les nouveaux propriétaires, avec des salles animées par des mannequins reconstituant la vie du seigneur de Vicq et de sa famille au quotidien, ceci pour les salles du XVe siècle et du XVIIIe siècle.","habitants":"Famille de  Guibert de Vic\"","divers":"Château de la Mothe à Vicq","gps":"","images":["../../jctruffet.com/image/image_03/03_Mothe_Vicq_1.jpg","../../jctruffet.com/image/image_03/03_Mothe_Vicq_2.jpg","../../jctruffet.com/image/image_03/03_Mothe_Vicq_3.jpg","../../jctruffet.com/image/image_03/03_Mothe_Vicq_4.jpg","../../jctruffet.com/image/image_03/03_Mothe_Vicq_5.jpg","../../jctruffet.com/image/image_03/03_Mothe_Vicq_6.jpg"]},"Consult_chateau_formulaire7c3f":{"id":"Consult_chateau_formulaire7c3f","dept":"03","canton":"St-Pourcain-sur-Sioule","commune":"Louchy-Montfand","nom":"Motte_Beaudreuil","type":"Château","periode":"XVI-XIX","histoire":"MOTTE-BAUDREUIL, la famille chevaleresque d'Avenières, connue depuis 1300, possédait des terres sur Louchy et Montfan et on voit Jean d'Avenières, chevalier, seigneur du Plex, faire aveu de la terre et seigneurie de Louchy en 1322. Guillaume d'Avenières possède en 1350 l'hôtel, domaine et seigneurie de Louchy, seize ans après, c'est Hugues d'Avenières, damoiseau, sire du Plex. Il est permis de croire que l'emplacement de cet hôtel de Louchy était près de l'église, sur celui où nous trouverons le château de la Motte appelé aussi  jadis  la Motte-Baudreuil. Au XVe siècle, la Motte-Baudreuil était la propriété de Durand Baudreuil, écuyer seigneur de Fontaillier, près de Saint-Pierre le Moutier,  et de  Baudereuilles. Son fils Jehan de Baudreuil et Marie de Bar n'eurent qu'un fils nommé Pierre, né en 1496. De son second mariage Pierre eut  trois fils et trois filles; l'un d'entre eux Louis fut seigneur de la Motte-Baudreuil qui lui avait été donnée par son grand père dans un testament de 1531 et qui lui fut reconnue dans un acte passé à Louchy le 27 Septembre 1578. Louis eut pour fille Madeleine de Baudreuil qui donna naissance à Gilberte Rouer qui épousa le 11 Juillet 1620 Jacques de Montbrun. Les armes de Jacques de Montbrun nous sont données par la pierre tombale de ce personnage dans l'église de Louchy et par la pierre sculptée qui décore la tour octogonale du château de la Motte. Il mourut en 1628. Au fil des siècles, le château a connu de nombreux changements  de propriétaires, certains de nos concitoyens se souviennent encore d'un des derniers, le comte de Pardieu grâce à qui l'historique détaillé de sa demeure a pu être établi. Actuellement, le château est la propriété de la communauté de Commune.","architecture":"Le château-fort de la Motte-Baudreuil ou Motte de Louchy, du XVI-XIXe siècle a été presque  entièrement démoli, de l'origine il reste qu'une tour octogonale d'escalier sur lequel est un écusson bien sculpté timbré d'un casque avec ses lambrequins. Corps de logis rectangulaire à trois niveaux et attiques flanqué de tourelles rondes en angles à toits en poivrières.","habitants":"Comte de Pardieu\"","divers":"Château de la Motte Beaudreuil","gps":"","images":["../../jctruffet.com/image/image_03/03_Motte_Beaudreuil_1.jpg","../../jctruffet.com/image/image_03/03_Motte_Beaudreuil_2.jpg","../../jctruffet.com/image/image_03/03_Motte_Beaudreuil_3.jpg","../../jctruffet.com/image/image_03/03_Motte_Beaudreuil_4.jpg","../../jctruffet.com/image/image_03/03_Motte_Beaudreuil_5.jpg"]},"Consult_chateau_formulairedd78":{"id":"Consult_chateau_formulairedd78","dept":"03","canton":"Gannat","commune":"Mazerier","nom":"Motte_Mazerier","type":"Château","periode":"XIX","histoire":"MOTTE-MAZERIER, le premier seigneur connu est, en 1250, Imbert de Sauzet, dont le fief  s'étend de sa villa à la Sioule. Dès le XIVe siècle, les seigneurs du lieu portent le nom de La Motte. Ainsi en 1366, Regnaud de la Mothe Mazerier, écuyer, est propriétaire de la terre et seigneurie de la Motte.  En 1450 c'est Antoine de la Motte qui est seigneur du lieu, avec maison forte et fossés. Marié à Louise de la Grange de Châlus. En 1454 leurs deux fils, Jacques, écuyer, seigneur de Fontaines et Pierre, écuyers, sont seigneurs  de La Motte. Ils en font hommage, en 1488, au duc de Bourbon. En 1503, c'est un membre de la même famille, Jacques de la Mothe, écuyer, qui fait aveu à la duchesse de Bourbon. Jacques de Mothe  est  décédé quelques années plus tard, puisque le même aveu est renouvelé, en avril 1506, par  son fils Anthoine, lui aussi écuyer. Après 1506, le fief était  aux mains de Gilbert Coiffier, contrôleur de la maison du duc de Bourbon, dont la famille était  à Gannat et à Effiat. En 1525, le 8 janvier, Guillaume Terris achète le fief de La Motte à Agnès Jayot, veuve de Gilbert Coiffier, bourgeois de Gannat,  seigneur de la Motte-Mazerier. Après avoir appartenu à la famille Trellet, à partir de 1680, la seigneurie de la Motte  vint, par alliance, aux mains des Bonneval, chevaliers, seigneurs de Langle au milieu du XVIIIe siècle.","architecture":"La maison forte du XIVe siècle a succédé à un château plus ancien, installé sur une motte féodale entourée de fossés. Le bâtiment principal, de plan carré, à trois étages et combles élevés, est couvert d'un toit en pavillon.  Une tour ronde, engagée au milieu de la façade, contient  l'escalier à vis pour desservir les étages, alors que la  porte d'entrée, du XVe siècle, est surmontée d'une voussure de style ogival. Accolé à ce 1er bâtiment, un petit  corps annexe est  flanqué d'une tourelle hexagonale, côté cour. Au XVIe siècle, le style Renaissance  a ouvert la  façade de larges baies à meneaux qui éclairent la construction un peu massive à l'origine. Lors de la Révolution,  vers 1793, c'était un château entouré de fossés  de peu d'étendue, en partie à sec, mais également d'une mare d'eau stagnante  au nord et  au couchant. Il y eut probablement  au XIe siècle, une seigneurie primitive, dont le siège était la motte castrale ceinturée par un fossé en eau.","habitants":"seigneurs  de La Motte\"","divers":"Château de la Motte à Mazerier","gps":"","images":["../../jctruffet.com/image/image_03/03_Motte_Mazerier_1.jpg","../../jctruffet.com/image/image_03/03_Motte_Mazerier_2.jpg","../../jctruffet.com/image/image_03/03_Motte_Mazerier_3.jpg"]},"Consult_chateau_formulaire91a3":{"id":"Consult_chateau_formulaire91a3","dept":"03","canton":"Moulins","commune":"Moulins","nom":"Moulins_Ducs","type":"Château","periode":"XV-XVII","histoire":"Plusieurs châteaux à Moulins, dont celui des ducs de Bourbon du XV-XVIe siècle musée et de Nomazy du XVIIe siècle (voir article suivant).                    MOULINS, en 1206, la famille de Breschard, seigneur de Moulins, l'échange contre la baronnie de Bressolles qui appartient aux sires de Bourbon. Ceux-ci le conserveront jusqu'en 1527. En 1366, le duc Louis II, de retour de captivité d'Angleterre, engage la reconstruction du château endommagé lors de la guerre de Cent Ans. Le palais ducal, fini vers 1375, est agrandi et transformé en une résidence agréable. A partir de 1497, le duc Pierre II et son épouse Anne de Beaujeu dit de France entreprennent, en prévision des séjours du roi Charles VIII  frère d'Anne, la construction du \"bâtiment neuf\". Une première phase de construction, en style gothique flamboyant, prolonge le palais vers le nord. La seconde phase (1500) relève du style Renaissance, tant par sa galerie que par son décor raffiné. Après 1527 et le rattachement du Bourbonnais à la couronne de France, le château est attribué aux reines-mères pour constituer leur douaire. Catherine de Médicis l'habite fréquemment et y reçoit, de janvier à mars 1566, son fils le roi Charles IX et sa cour.  Lorsqu'en 1661 le château devient la propriété du prince de Condé, il est transformé en appartements et loué à des particuliers. Faute d'entretien, un corps de bâtiment s'écroule en 1684  et un second en 1751. Quatre ans plus tard, un incendie ravage le reste du château.  A la Révolution, le château en ruine est vendu puis démantelé. L'ancien palais ainsi que la chapelle sont rasés. En 1852, une partie des bâtiments restants est démolie pour agrandir la cathédrale. En 1907, la gendarmerie quitte le pavillon Renaissance qui sera transformé en musée (en 1986). La prison \" libère \" la tour, édifiée par Louis II, en 1985. Depuis quelques années, le château fait l'objet de restaurations : travaux sur les fortifications basses, restauration des parements du donjon.","architecture":"Ducs de Bourbons;  construit  vers 1340,  et y firent des séjours de plus en plus fréquents et prolongés, si bien qu'à la fin du XVe siècle la ville nouvelle se substitua peu à peu aux autres résidences et à la capitale du duché, Bourbon-l'Archambault. De l'ancien château des ducs de Bourbon ne subsiste qu'une grosse tour carrée du XIVe siècle connue sous le nom de la Mal Coiffée, quelques pans de mur et un pavillon Renaissance qui abrite aujourd'hui le musée Anne de Beaujeu.  De la construction primitive, seule subsiste la façade sur laquelle on peut apercevoir les emblèmes des Bourbons. Le donjon  est une tour-résidence rectangulaire. Elle comporte sept niveaux (composés chacun de deux salles) dont deux en sous-sol. Château incendié en 1755 qui en détruisit une grande partie. Dans son prolongement, au nord, subsiste un pan de l'ancienne façade du palais ducal. Au pied de celle-ci, une terrasse sans doute établie à la Renaissance. Accolés au sud de la tour s'élèvent une tour carrée utilisée comme une annexe et le grand escalier, desservant autrefois les appartements du palais. Au nord du site, la galerie aux gracieuses arcades décorées aux emblèmes des ducs,  reliant les pavillons, rappelle que ce bâtiment fut l'un des premiers témoignages en France de la Renaissance italienne.","habitants":"Sires de Bourbon\"","divers":"Château des ducs à Moulins","gps":"","images":["../../jctruffet.com/image/image_03/03_Moulins_Ducs_1.jpg","../../jctruffet.com/image/image_03/03_Moulins_Ducs_2.jpg","../../jctruffet.com/image/image_03/03_Moulins_Ducs_3.jpg","../../jctruffet.com/image/image_03/03_Moulins_Ducs_4.jpg","../../jctruffet.com/image/image_03/03_Moulins_Ducs_5.jpg","../../jctruffet.com/image/image_03/03_Moulins_Ducs_6.jpg","../../jctruffet.com/image/image_03/03_Moulins_Ducs_7.jpg","../../jctruffet.com/image/image_03/03_Moulins_Ducs_8.jpg"]},"Consult_chateau_formulaire9258":{"id":"Consult_chateau_formulaire9258","dept":"03","canton":"Moulins","commune":"Moulins","nom":"Moulins_II","type":"Château","periode":"XVIII-XIX","histoire":"A Moulins plusieurs châteaux  plus ou moins transformés en demeures administratives, le château de Nomézy, de Vanant, de la Palisse et bien d'autres  dont je n'ai pas d'information historique.                              le château de La Palice et ses célèbres plafonds à caissons Renaissance, le château de Bourbon l'Archambault,\"berceau des Bourbons\", le Grand Casino de Vichy, le beffroi Jacquemart de Moulins.  Musées, le Centre national du costume de scène (CNCS), le musée de la Visitation et de la Vie bourbonnaise, le musée Anne-de-Beaujeu, le musée de l'illustration Jeunesse(MIJ), le musée du Bâtiment et la Maison Mantin à Moulins.","architecture":"Nomazy,  château du début du 17e siècle, dont la maison d'habitation remonte au 18e siècle dans sa forme actuelle. Le portail d'accès, présente des piédroits et un arc au tracé en anse de panier, formés d'une suite de bossages vermiculés en grès, alternés, en refend, de bandeaux de calcaire. De chaque côté des piédroits s'élèvent des assises aux bossages sculptés d'un rinceau végétal. Le portail est surmonté d'un entablement formé d'une plate-bande et d'une corniche profilée d'un quart de rond au-dessus d'un filet et d'un bandeau. Cette corniche forme la base d'un fronton coupé dont la partie centrale est sculptée d'un cartouche au cadre formé de crosses végétales. Cette partie centrale se termine par une corniche horizontale au-dessus de laquelle s'élève, en couronnement, une boule polyédrique hérissée de saillies.","habitants":"Duc de Bourbon l'Archambault\"","divers":"Divers châteaux à Moulins","gps":"","images":["../../jctruffet.com/image/image_03/03_Moulins_II_1.jpg","../../jctruffet.com/image/image_03/03_Moulins_II_2.jpg","../../jctruffet.com/image/image_03/03_Moulins_II_3.jpg","../../jctruffet.com/image/image_03/03_Moulins_II_4.jpg","../../jctruffet.com/image/image_03/03_Moulins_II_5.jpg","../../jctruffet.com/image/image_03/03_Moulins_II_6.jpg","../../jctruffet.com/image/image_03/03_Moulins_II_7.jpg","../../jctruffet.com/image/image_03/03_Moulins_II_8.jpg","../../jctruffet.com/image/image_03/03_Moulins_II_9.jpg"]},"Consult_chateau_formulaire48c7":{"id":"Consult_chateau_formulaire48c7","dept":"03","canton":"Montmarault","commune":"Murat","nom":"Murat","type":"Vestiges","periode":"XII","histoire":"Trois châteaux à Murat, le Chatignoux du XVe siècle,  de Robinière du XIXe siècle  et le fort de Murat.               CHATIGNOUX  en 1301 Johanz de Chategnol tient le fief du seigneur de Bourbon, en 1569  passe au seigneur de Sanssat capitaine de la ville de Bourbon-l'Archambault. Passe à Jean de Fradel de la Grange connu pour avoir défendu Saint-Pourçain contre les ligueurs, passera ensuite aux de la Souche qui vendent le fief au XVIIe siècle à la famille Gaulmin, puis au Dumoncel, ensuite à Antoine Lenoir d'Espinasse en 1753 qui le vend à François Ferron de la Ferronnaye en 1765, en 1774 acheté par Charles de la Botière marquis de Tilly, l'actuel propriétaire est monsieur Eygun.\r\nMURAT,  en 1204, Guillaume de Murat. En 1272, Béatrice de Bourgogne, dame de Bourbon, épouse Robert Ier de France, Comte de Clermont. C'est le 6e fils du Roi Louis IX . En 1310, Louis Ier, fils aîné, épouse Marie de Hainaut. En 1317, à la mort de Robert Ier, son fils Louis Ier Comte de Clermont de la Marche et de Castres devient le nouveau seigneur. En 1327, Louis Ier devient le premier Duc de Bourbon. En 1342, Louis Ier meurt. Son fils Louis II est le nouveau Duc de Bourbon. En 1354, Marie de Hainaut décède au château.  En 1358, Isabeau de Valois. Au début du XVIe siècle, le Bourbonnais est une province très puissante. Charles III est le  Duc de Bourbon mais aussi, Comte de Montpensier, Comte de Forez, Comte de Clermont, Comte de Mercoeur, Duc d'Auvergne.   En 1521, la femme de Charles III qu'il avait épousée en 1505 meurt sans avoir donné d'héritier. La mère de François Ier revendique le Bourbonnais comme petite fille de Charles Ier de Bourbon. Durant ces 6 années, Charles III se rebelle et entre en guerre contre le Royaume de France aux cotés des Italiens. En 1527, Charles III meurt au siège de Rome. Conséquence, le Bourbonnais est rattaché au Royaume de France.\r\nROBINIERES La Robinière constitue un bel exemple de ce type de résidence . L'actuelle grande maison remplace un vieux château du XVIe siècle.","architecture":"Chatignoux, du XVe siècle, remanié au XVIIe siècle. Grande maison de plan carré avec, au centre de sa façade principale, une tourelle d'escalier octogonale. A l'avant de cette façade, une terrasse bordée d'une balustrade en fer forgé a été édifiée  au XIXe siècle. A l'intérieur,  chaque niveau comporte 4 pièces symétriques par rapport à   l'axe transversal du bâtiment. Au centre, se trouvent deux grandes salles et sur les côtés deux pièces allongées. Au premier étage, les pièces ont été redistribuées par des galandages au XIXe siècle. De l'édifice primitif ne subsistent que cette tourelle d'escalier, les deux portes  qui l'encadrent et deux des cheminées. Les abords du château comprennent des douves, des terrasses sur plusieurs niveaux et des jardins.     Murat, vestiges du fort  (élevé  sur l'emplacement d'un poste fortifié de la défense romaine) Le château est construit sur un promontoire escarpé, avec des défenses de sept tours, dont six ronde. L'entrée devait se trouver à l'est, avec accès par pont levis. A la suite se trouvait une porte fortifiée avec couloir voûté. Deux cours intérieures : la basse cour et celle du donjon.  Vers 1343, le château Ducal, par sa superficie, la longueur des courtines et la puissance de sa tour, impose le respect de assaillants potentiels. Mais ce n'est pas qu'une forteresse, son habitat est très confortable pour l'époque. Ce château dût être démantelé après la défection du Connétable. Peu de temps après François Ier fait démolir plusieurs châteaux dans la région dont celui de Murat.  En 1569, un rapport demandé par le roi Charles IX fait état de l'abandon du château, et des ruines qui le composent. En 1792, les révolutionnaires brûlent les archives de la commune.","habitants":"Duc de Bourbon\"","divers":"Vestiges de Murat et château de Chatignoux et de la Robinière à Murat","gps":"","images":["../../jctruffet.com/image/image_03/03_Murat_1.jpg","../../jctruffet.com/image/image_03/03_Murat_2.jpg","../../jctruffet.com/image/image_03/03_Murat_3.jpg","../../jctruffet.com/image/image_03/03_Murat_4.jpg","../../jctruffet.com/image/image_03/03_Murat_5.jpg","../../jctruffet.com/image/image_03/03_Murat_6.jpg","../../jctruffet.com/image/image_03/03_Murat_7.jpg"]},"Consult_chateau_formulaire8d69":{"id":"Consult_chateau_formulaire8d69","dept":"03","canton":"Herisson","commune":"Nassigny","nom":"Nassigny","type":"Maison forte","periode":"XIV-XV","histoire":"Deux châteaux à Nassigny dont Nassigny du XIV-XIXe siècle et la Guerche du XVe siècle.                                 NASSIGNY, dépendant de l'abbaye de Saint-Denis avant d'être vendu à des particuliers en 1570. A cette époque, un incendie dû aux guerres de Religion détruit une partie du château qui fut alors réédifiée dans le style de l'époque.                            GUERCHE pas d'informations historiques sinon qu'un incendie l'a en partie détruit.","architecture":"Guerche, du XVIIIe siècle Ancienne forteresse médiévale dont il subsiste d'importants vestiges, donjon carré, tours et qui a été entièrement remaniée à l'époque classique. Le château actuel  est formé de deux corps de bâtiments perpendiculaires délimitant une cour rectangulaire, un corps de logis et un commun. La cour est fermée par un mur percé d'un porche face à un pont surmontant des douves. Cette façade est encadrée de deux tours. La cour intérieure comprend également le second commun, la chapelle et le porche du XVIIIe siècle. Ce porche se compose d'un petit pavillon rectangulaire à deux niveaux. Au rez-de-chaussée, il est traversé par un passage voûté en plein cintre. Du côté extérieur, l'ornementation de la porte comporte deux pilastres non cannelés surmontés de chapiteaux reliés entre eux par un bandeau orné en son centre d'un cartouche comportant une date encadrée de deux petits triangles. Sous le toit court une corniche de briques polychromes ornée de modillons.  Incendie de la toiture. \r\nNassigny, château construit vers la fin du XIVe siècle, l'édifice est un quadrilatère partiellement flanqué de deux tours polygonales. La façade comprend une tour d'escalier. Vers 1850, restaurations intérieures. Ne subsiste du XVIe siècle que l'escalier à vis, le plafond du salon sud, et sans doute la cheminée monumentale de style gothique, hormis le foyer. Le salon et le hall d'entrée sont tapissés d'une toile de jute peinte par l'un des propriétaires au XIXe siècle, et représentant des scènes bucoliques ou florales.","habitants":"Seigneurs locaux\"","divers":"Château de la Guerche et de Nassigny","gps":"","images":["../../jctruffet.com/image/image_03/03_Nassigny_1.jpg","../../jctruffet.com/image/image_03/03_Nassigny_2.jpg","../../jctruffet.com/image/image_03/03_Nassigny_3.jpg","../../jctruffet.com/image/image_03/03_Nassigny_4.jpg","../../jctruffet.com/image/image_03/03_Nassigny_5.jpg"]},"Consult_chateau_formulaire9168":{"id":"Consult_chateau_formulaire9168","dept":"03","canton":"Ebreuil","commune":"Naves","nom":"Naves_Allier","type":"Vestiges","periode":"XI","histoire":"NAVES,  c'est à la fin du XIe ou au début du XIIe siècle que fut bâti le château en dehors du contrôle de l'archevêque de Bourges à qui appartenait la paroisse. Il existe une famille de Naves dès le XIe siècle. Avant 1160 Hugues de Naves  détenait ces terres et la forteresse de Naves. Dans sa politique d'expansion en direction de l'Auvergne,  Archambaud V  attaqua le seigneur de Naves pour le faire entrer dans sa vassalité, confisqua le château et les terres.L'archevêque de Bourges qui, lui aussi étendait sa domination dans la région, intervint en faveur d'Hugues de Naves et obligea le seigneur de Bourbon à faire amende honorable.","architecture":"Naves, remodelé au XIIIe siècle, le château prenait l'allure d'une forteresse à quatre tours rondes et hautes courtines crénelées, fossés et pont-levis. Le château, aux ruines encore imposantes,  a été transformé à la fin du XVe siècle par l'archevêque Jean Cur, fils de l'argentier du roi Charles VII. Le château, dont quelques pièces ont été restaurées, était la propriété du docteur Reverzi au XXe siècle.   Ruines d'une ancienne forteresse que la légende locale attribue à Jacques Cur, dont les armoiries étaient visibles sur une porte ogivale disparue. D'après la tradition, le château aurait été reconstruit en 1424.","habitants":"Famille d'Hugues de Naves \"","divers":"Vestiges à Naves","gps":"","images":["../../jctruffet.com/image/image_03/03_Naves_Allier_1.jpg","../../jctruffet.com/image/image_03/03_Naves_Allier_2.jpg","../../jctruffet.com/image/image_03/03_Naves_Allier_3.jpg"]},"Consult_chateau_formulaire167a":{"id":"Consult_chateau_formulaire167a","dept":"03","canton":"Montlucon","commune":"Néris-les-Bains","nom":"Neris_les_Bains","type":"Château","periode":"XV-XIX","histoire":"Quatre châteaux à Néris , celui de Cerclier du XVIe siècle, de Montassiège du XIX avec quatre tours, de Perassier du XV Chambres d'hôtes et de Bellevue office du tourisme.                           CERCLIER,  est la résidence de la famille de Peufeilhoux depuis plusieurs générations. En parcourant le parc, on peut observer quelques végétaux exotiques rapportés du Japon par un aïeul, tels que  les ginkgos, les sophoras,   les kerrias, les exochordas, les cydonias. Aujourd'hui chambres d'hôtes.     MONTASSIEGE, bâti vers 1830 par Paul Rambourg. Il était un chastel et seigneurie dépendant de la châtellenie de Murat, alors que la maison seigneuriale, paroisse de Néris dépendait de celle de Montluçon, on n'en connait pas l'aspect, mais il devait se situer près du château de Rambourg.                    PERASSIER, pas d'information historique, aujourd'hui, chambres d'hôtes","architecture":"Cerclier, aux abords d'une voie d'origine antique, présente deux tours d'angle rondes sur façade qui s'ouvre sur une terrasse et une tour carrée à l'arrière. La chapelle à clocheton est datée de 1640. En dehors de la  chapelle et  des communs, l'édifice présente un aspect compact  qui ne manque pas  de cachet avec ses couvertures  de tuiles plates et ses tours surmontées de bardeaux de châtaignier si caractéristiques de larchitecture régionale.            Montassiège, à quatre tours d'angle rondes, a remplacé   un château beaucoup  plus ancien, d'origine féodale, édifié sur un promontoire allongé bordé de deux profondes dépressions de terrain.         Perassier, construit sur un ancien site gallo-romain, est entouré aux trois quarts de douves moyenâgeuses. La tour ronde du XVe siècle et la tour carrée du XVIe siècle ancrée au fond de leau sont les vestiges de cet ancien lieu de péage qui na pas encore livré tous ses secrets. Ses tours, ses douves, sa légende et les péripéties de ces célèbres occupants depuis le Moyen-Age ont toujours inspiré les artistes de passage. Pérassier est ainsi souvent représenté dans liconographie Bourbonnaise.","habitants":"Famille de Peufeilhoux\"","divers":"Château  de Cerclier,  de Montassiège,  de Perassier,  de Bellevue,et du Colombier à Néris les Bains.","gps":"","images":["../../jctruffet.com/image/image_03/03_Neris_les_Bains_1.jpg","../../jctruffet.com/image/image_03/03_Neris_les_Bains_2.jpg","../../jctruffet.com/image/image_03/03_Neris_les_Bains_3.jpg","../../jctruffet.com/image/image_03/03_Neris_les_Bains_4.jpg","../../jctruffet.com/image/image_03/03_Neris_les_Bains_5.jpg","../../jctruffet.com/image/image_03/03_Neris_les_Bains_6.jpg","../../jctruffet.com/image/image_03/03_Neris_les_Bains_7.jpg","../../jctruffet.com/image/image_03/03_Neris_les_Bains_8.jpg"]},"Consult_chateau_formulaire04f9":{"id":"Consult_chateau_formulaire04f9","dept":"03","canton":"Neuilly-le-Réal","commune":"Neuilly-le-Réal","nom":"Neuilly_Real","type":"Château","periode":"XVI-XIX","histoire":"Quatre châteaux à Neuilly le Réal, de l'Ecluse du XVIe siècle, du Frêne , des Places du XVIIe siècle rendez vous de chasse et des Vayots du XIXe siècle enceintes et tours du XVIIe siècle.       LECLUSE, le fief de l'Écluse est connu depuis le XIVe siècle, et  comme le château voisin  du Frêne, il devint la propriété  de fonctionnaires royaux ou  de magistrats habitant Moulins. C'est ainsi qu'au XVIIIe siècle, il était en possession de la famille Roy, dont les descendants le possèdent toujours. Transformé  en hôtel restaurant.     FRENE, appartenait, au début du XVe siècle, aux frères Duéville, originaires de Thionne (Allier). Il passa  ensuite aux La Fin de Beauvoir, qui le vendirent, en 1598, à Antoine Verne,  fut vendu en 1620 aux Mégret, dont les descendants le  cédèrent en 1693 aux Berroyer, qui le vendirent à leur tour à Bernard de Barcacère qui ruiné dut s'en dessaisir. Après avoir changé fréquemment de propriétaires le château appartient aujourd'hui  à la famille d'Aboville.     VAYOTS, il existait au XVe  siècle une famille des Vayaux, propriétaire des lieux. À partir du XVIIe siècle le fief est utilisé par des officiers de Moulins : François Sénétaire Tridon, garde-marteau  des Eaux et Forêts  du Burbonnais en 1655,  Mayeul Maquin, seigneur de Panloup, puis à une famille  de verriers, originaires  de Normandie, les Brossard, cette famille augmenta considérablement les dépendances des Vayaux en y adjoignant les terres voisines de  Fourchaud, des Gris. A la fin du XIXe siècle, il a été remplacé, à l'initiative de M. Bruel, par une nouvelle construction.","architecture":"Lécluse,  forme, avec ses douves et ses communs, un ensemble pittoresque, bien intégré  dans son cadre de verdure, et très caractéristique  du bourbonnais. Le château proprement dit, entouré de ses douves, et un corps de logis a deux niveaux, de plan rectangulaire, flanqué de quatre tours rondes. Un pavillon carré et une petite tour circulaire sont également édifiés en bordure de l'eau, porte et tours du XVe siècle.             Le Frêne, se compose d'une demeure et d'un bâtiment de communs délimitant une vaste cour carrée. La majorité de ces constructions sont bâties en brique polychrome, matériau typique du Bourbonnais, le château comporte un corps de logis rectangulaire à deux niveaux  flanqué de tours à l'est et de pavillons inégaux à l'ouest, celui du nord étant plus étroit et plus élancé que celui du sud.                                      Vayots   est un logis de la fin du XIXe siècle, situé dans un parc  boisé, mais le portail de pierre du XVIIe siècle témoigne de l'ancienneté de cette propriété.   Un porche en plein cintre composé de pierres à bossage alternativement en grès rouge et en calcaire blanc, est surmonté  d'un fronton triangulaire. De part et  d'autre le mur de clôture est construit en briques polychromes  à appareillage losangé, c'est tout ce qu'il reste  de l'ancien château du XVIIe siècle  des Vayaux.","habitants":"Famille Roy                         Famille des frères Duéville         Famille des Vayaux\"","divers":"Château de l'Ecluse, de Frene et de Vayots à Neuilly le Réal","gps":"","images":["../../jctruffet.com/image/image_03/03_Neuilly_Real_1.jpg","../../jctruffet.com/image/image_03/03_Neuilly_Real_2.jpg","../../jctruffet.com/image/image_03/03_Neuilly_Real_3.jpg","../../jctruffet.com/image/image_03/03_Neuilly_Real_4.jpg"]},"Consult_chateau_formulairef461":{"id":"Consult_chateau_formulairef461","dept":"03","canton":"Moulins","commune":"Neuvy","nom":"Neuvy","type":"Château","periode":"XVI-XVIII","histoire":"Plusieurs châteaux à Neuvy, Montgarnaud du XVIII avec tours médiévals, Neuville du XV-XVIe siècles style néo-renaissance, d'Origny  du XIXe siècle, de Vallières  du XIV-XIXe siècles, Vieux Mélay du XVII-XVIIIe siècles et le fort de Toury du XV-XIXe siècle.                    MONTGARNAUD, les premiers détenteurs du fief étaient des seigneurs de Breschard, Confay, Beauvoir, Clusor, en même temps  que de Montgarnaud, et baron de Bressolles. Le seigneur  de Montgarnaud était en 1412 Jean de Thory. Il y avait une large ceinture de fossés qui enserrait une forteresse sans doute plus importante que le château actuel. Le propriétaire le plus célèbre fut Antoine Minard né à Moulins à la fin du XVe siècle, d'un trésorier général. Montgarnaud comta parmi ses propriétaires  des conseillers au présidial de Moulins, Toussaint Brirot en 1670 et Jean Perron vers 1730, des avocats en parlement Jean Lequin de Saint-Ange vers 1765 et un notaire Moulin
