 des requêtes, qui le revend juste avant 1789, à Jean-Baptiste Martin-Ducouret, ancien avocat au Parlement, dont la famille le gardera jusqu'en 1840 et sera ensuite vendu au comte de Villemote qui va disperser, en 1843-1843, une admirable collection de meubles et d'objets d'art. En 1854, il est acheté par le comte Honorati qui fait tracer le parc anglais. En 1860, il est acheté par M. Berthomier qui fera déblayer les douves et organisera sa restauration presque complète.  Aujourd'hui propriété d'un couple de nationnalité britanique, Il est classé M.H. le 9-05-1946.  Des visiteurs célèbres sont passés par ce château : Henri IV roi de France, Anne-Marie-Louise dOrléans dite la Grande Mademoiselle etc.","architecture":"ST-GERMAIN, un château féodal fut dabord édifié en 1182, probablement sur les ruines dune motte castrale. Le château a été édifié au XVIe siècle pour Gabriel Foucault. Il trouve ses origines en 1533. Il fut édifié à lemplacement de la forteresse du XIIe siècle, elle-même reconstruite entre 1407 et 1409. Ce château fut restauré à la fin du XVIe siècle, aux frais, dit-on, de dAumont, qui lavait ravagé à deux reprises à la tête dune troupe de Ligueurs.  Le château de Saint-Germain-Beaupré est construit sur un plan pentagonal, avec un corps de logis d'un étage sur rez-de-chaussée et de grosses tours circulaires aux angles. Il ne reste que le pavillon d'entrée, le corps de logis, trois grosses tours et une petite. Les fortifications consistent en de larges douves entourant la plate-forme du château et des mâchicoulis en briques sur corbeaux en granit. Le portique en briques et pierre à l'entrée du château est dû à une restauration au XVIIe siècle. L'escalier voûté intérieur qui date du XVIe siècle et a été inscrit M.H. le 7 août 1941.","habitants":"Famille de Foucault \r\n        \r\n        \"","divers":"St-Germain GPS : 46° 18' 45\" Nord et 1° 32' 44\" Est","gps":"46° 18' 45\" Nord et 1° 32' 44\" Est","images":["../image/image_23/23_St_Germain_Beaupr%c3%a9_1.jpg","../image/image_23/23_St_Germain_Beaupr%c3%a9_2.jpg","../image/image_23/23_St_Germain_Beaupr%c3%a9_3.jpg","../image/image_23/23_St_Germain_Beaupr%c3%a9_4.jpg","../image/image_23/23_St_Germain_Beaupr%c3%a9_5.jpg","../image/image_23/23_St_Germain_Beaupr%c3%a9_6.jpg"]},"Consult_chateau_formulaireb0d3":{"id":"Consult_chateau_formulaireb0d3","dept":"23","canton":"Ahun","commune":"Saint-Hilaire du Château","nom":"St_Hilaire_Chassagne","type":"Château","periode":"XVI","histoire":"Quatre châteaux à Saint-Hilaire le Château, celui de la Chassagne, de Liège,de Puychaumeix et de Sussac.                                                                        La CHASSAGNE,  Saint-Hilaire-Château était dans l'ancien archiprêtré de Bénévent. Pépin donna cette église à Mauzac. Il y avait un prieuré sous le patronage de Saint-Hilaire de Poitiers et de Saint-Gervais. L'abbé de Mauzac, diocèse de Clermont, y nommait un titulaire en 1670  et en 1710.  Jean Potin était prieur de Saint-Hilaire-Château au XVIe siècle. N.  Mercier en 1783. La cure avait les mêmes patrons que le prieuré. Aujourd'hui la Chassagne  appartient à monsieur  L. Dubois de Belair                              LIEGE, Hugues du Liège, écuyer, était à une revue passée à Cognac le 13 février 1378. Ses armes sont de gueules, à l'épée d'urgent, posée en bande. Sous le règne de Louis XII, la seigneurie du Liège passa, par une vente, dans la famille de Chastenet.\r\nPUYCHAUMEIX, aussi  détruit, appartenait à la famille du Liège, qui l'habita  jusqu'en 1791.\r\nSUSSAC, placé sur la limite de la commune de La Pouge, à laquelle il appartient en partie.","architecture":"CHASSAGNE, flanqué d'une tour ronde et de deux contreforts, le bâtiment rectangulaire remontant au XVIe siècle a gardé sa galerie de mâchicoulis sur corbeaux et trois bretèches.                                  LIEGE (Le), aujourd'hui détruit, avait 20 mètres de façade sur 10 de profondeur 11 avait deux étages et un grand escalier en pierre, la toiture, à croupe très élevée et couverte de tuiles plates, était supportée par un entablement. Au nord, il y avait une vaste cour où se trouvait un jet d'eau alimenté par une conduite qui prenait l'eau à   Puychaumeix ; au midi, une terrasse qui existe encore et de laquelle on a une très belle vue.","habitants":"Chassagne Famille de Chastenet                                 Famille de Liège.\r\n        \"","divers":"Chassagne 91528682,45.9679680             Liege grav 4","gps":"","images":["../image/image_23/23_St_Hilaire_Chassagne_1.jpg","../image/image_23/23_St_Hilaire_Chassagne_2.jpg","../image/image_23/23_St_Hilaire_Chassagne_3.jpg","../image/image_23/23_St_Hilaire_Chassagne_4.jpg"]},"Consult_chateau_formulaire00cb":{"id":"Consult_chateau_formulaire00cb","dept":"23","canton":"Bourganeuf","commune":"Saint-Junien la Bregère","nom":"St_Junien_Bregère","type":"Château","periode":"XVI-XVII","histoire":"quatre châteaux à saint-Junien le Bregère celui de la Faye,    la Vilatte et celui de La Grillère   et à  une quinzaine de Km à l'ouest à Auriats le château de Baconaille, pas d'information  historique pour ces châteaux.                                                                         FAYE, il y a peu de renseignements sur ce château. Il nest pas visible que de lextérieur.                     VILATTE il y a peu de renseignements sur ce château. Il est peu visible de lextérieur.                                 GRILLERE  il comporte une tour ancienne datant probablement du XVIe siècle.                    BACONAILLE, il y a peu dinformation sur ce château du XVIIe siècle.","architecture":"FAYE, il se compose dun corps de logis quadrangulaire, dune tour carrée, et de deux tours rondes en angle.                                                        VILATTE, il se compose dun corps de logis quadrangulaire et de deux ailes, donc lune avec une tour ronde toit en poivrières.                                           GRILLERE, il comporte une tour ancienne datant probablement du XVIe siècle. Un corps de logis quadrangulaire a été rénové aux XVIIIe et XIXe siècles.                                                                             BACONAILLE, il y a peu dinformation sur ce château du XVIIe siècle. A part la chapelle à lentrée, il est peu visible de lextérieur.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Baconaille grav-1, la Faye grac 2-3, de Grillère grav 4-5, valatte grav 6-7","gps":"","images":["../image/image_23/23_St_Junien_Breg%c3%a8re_1.jpg","../image/image_23/23_St_Junien_Breg%c3%a8re_2.jpg","../image/image_23/23_St_Junien_Breg%c3%a8re_3.jpg","../image/image_23/23_St_Junien_Breg%c3%a8re_4.jpg","../image/image_23/23_St_Junien_Breg%c3%a8re_5.jpg","../image/image_23/23_St_Junien_Breg%c3%a8re_6.jpg","../image/image_23/23_St_Junien_Breg%c3%a8re_7.jpg"]},"Consult_chateau_formulaire702a":{"id":"Consult_chateau_formulaire702a","dept":"23","canton":"Aubusson","commune":"St-Maixant","nom":"St_Maixant","type":"Château","periode":"XV","histoire":"A quelques Km au sud, la Chaussade, le château de Baboneix maison forte.                                           Saint-MAIXANT dit  de l'Étang, fut dabord une seigneurie ayant haute, moyenne et basse justice, dépendant de la châtellenie dAubusson, bâti à Saint-Maixant, La construction  date du XIVe siècle, l'édifice a été, une première fois, restauré, en 1860, et récemment. Philibert de La Roche-Aymon (1613-1652), marquis de Saint-Maixant dit \"le grand diable de Saint-Maixant\", célèbre par ses excentricités, sa cruauté et sa vie dissolue, défraya la chronique marchoise et bourbonnaise, confisqué à la Révolution puis adjugé avec ses terres à un ancien fermier.  Il est classé au M.H. depuis 1992. Le château de Saint-Maixant se loue pour fêter un évènement ou se visite, ouvert au public et privatisable pour des réceptions, il possède aussi un gîte et des chambres dhôtes. Propriété de monsieur Louis Dubourjal.           BABONEIX, dépendant de ce château, lobservatoire astronomique créé par M. Judlin est très envahi par la végétation. Il était constitué dune tour ronde à trois étages avec une plate forme au sommet. Les premiers instruments étaient :  une lunette Bardou de 88 millimètres, sur pieds en bois ;  une lunette de 135 millimètres, objectif Viennet, montée équatorialement, sans mouvement dhorlogerie.","architecture":"SAINT-MAIXANT, date du XIVe siècle, donne une impression de puissance et délégance. Cette forteresse  prend une nouvelle dimension lorsque la nuit arrive. Son propriétaire, la en effet doté dune illumination digne des plus remarquables monuments historiques. Le château du XVe siècle est caractéristique de larchitecture militaire de la Marche à cette époque. Lédifice a été une première fois restauré en 1860, et tout récemment.  Son plan reprend celui de la plupart des châteaux de la Haute Marche, quadrilatère comprenant, à chacun des angles de la façade Est, deux tours rondes. La façade ouest sappuie sur une tour carrée en saillie, plus élevée que le corps de logis et renfermant un escalier à vis de 120 marches. Un chemin de ronde commande toutes les murailles du logis et défend les tours, il possède meurtrières et mâchicoulis. Les douves subsistent en partie, à lest. A louest, le château est précédé dune cour dhonneur souvrant par une grille du XVIIe siècle. La tour sud renferme une chapelle qui a été transformée. Quelques pièces ont conservé leurs cheminées de pierre et leurs boiseries du XVIIIe siècle.                                                                          BABONEIX est un manoir féodal du XIIIe siècle. Il se compose dun bâtiment central quadrangulaire flanqué dune tour ronde descalier. Il a été remanié à de nombreuses reprises. Il est peu visible de lextérieur.","habitants":"Philibert de La Roche-Aymon\r\n        \"","divers":"St-Maixant  GPS : 45° 59' 40\" Nord, 2° 12' 29\" Est       Baboneix grav 6","gps":"45° 59' 40\" Nord, 2° 12' 29\" Est       Baboneix grav 6","images":["../image/image_23/23_St_Maixant_1.jpg","../image/image_23/23_St_Maixant_2.jpg","../image/image_23/23_St_Maixant_3.jpg","../image/image_23/23_St_Maixant_4.jpg","../image/image_23/23_St_Maixant_5.jpg","../image/image_23/23_St_Maixant_6.jpg"]},"Consult_chateau_formulaire6380":{"id":"Consult_chateau_formulaire6380","dept":"23","canton":"Aubusson","commune":"St-Marc de Frongier","nom":"St_Marc_Frongier","type":"Château","periode":"XV","histoire":"SAINT-MARC, a été construit au XVe siècle et la seigneurie appartint primitivement à la famille d'Aubusson. En 1460, Jacquette, dame de Saint-Marc, la porta à Louis, baron de Saint-Julien. Le terrier de cette seigneurie fut rédigé de 1565 à 1571 à la demande du seigneur de Saint-Marc, Jean de Saint-Julien. En 1691, Marie-Constance de Saint-Julien Saint-Marc épousa Charles de Saint-Chamans, seigneur, comte du Pescher, et c'est cette dernière famille qui posséda la terre de Saint-Marc jusqu'à la Révolution.","architecture":"SAINT-MARC de plan rectangulaire à trois niveaux toit en croupes recouvert de tuiles  accolés d'une tour carrée mâchicoulis toit  à quatre pans.","habitants":"Famille d'Aubusson\r\n        \"","divers":"St-Marc GPS : 45° 55' 51\" Nord et 2° 07' 18\" Est","gps":"45° 55' 51\" Nord et 2° 07' 18\" Est","images":["../image/image_23/23_St_Marc_Frongier_1.jpg","../image/image_23/23_St_Marc_Frongier_2.jpg","../image/image_23/23_St_Marc_Frongier_3.jpg","../image/image_23/23_St_Marc_Frongier_4.jpg"]},"Consult_chateau_formulaire663b":{"id":"Consult_chateau_formulaire663b","dept":"23","canton":"Le Grand-Bourg","commune":"Saint-Pierre de Fursac","nom":"St_Pierre_Fursac","type":"Château","periode":"XIV","histoire":"ST-PIERRE de FURSAC, Le château féodal appartenant à la seigneurie de Chabannes-Guerguy a été vendu comme Bien National à cette époque, il fut ainsi rapidement détruit.                                              La Chataigne Dorée, château chambres d'hôtes de charmes.","architecture":"Il y a peu de renseignement sur ce bâtiment. Il est appelé château de Fursac, il sagirait plutôt dun maison bourgeoise. La tour fait penser à celle du château Migout de Bénévent. Elle est largement visible de loin, le reste du bâtiment est un peu visible de lextérieur.","habitants":"Seigneurie de Chabannes-Guerguy \r\n        \"","divers":"St-Pierrede Fursac 51100421,46.1462957","gps":"","images":["../image/image_23/23_St_Pierre_Fursac_1.jpg","../image/image_23/23_St_Pierre_Fursac_2.jpg","../image/image_23/23_St_Pierre_Fursac_3.jpg","../image/image_23/23_St_Pierre_Fursac_4.jpg"]},"Consult_chateau_formulairec163":{"id":"Consult_chateau_formulairec163","dept":"23","canton":"Guéret-1","commune":"Sainte Feyre","nom":"Ste_Feyre","type":"Château","periode":"XV-XVIII","histoire":"Deux châteaux à Sainte-Feyre celui  de Sainte-Feyre et le manoir de Rampnat 7 km au sud de Guéret.      Ste-FEYRE à l'origine la seigneurie appartenait en 1390 au Piédieu,  en 1439, le dauphin, (futur Louis XI), logea au château de Sainte Feyre, lorsque son père Charles VII était à Guéret. En 1439, le dauphin, (futur Louis XI), loge au château de Sainte-Feyre, lorsque son père Charles VII est à Guéret.  La construction  date du XVIIIe siècle   bâti à Sainte Feyre. A la demande du marquis de Sainte-Feyre, pour accueillir sa jeune épouse fille du marquis de Soudeille en Corrèze. Acquis par Mathurin Mérigot  en 1609 il est reconstruit entre 1758 et 1762  par la famille Mérigot et par larchitecte Joseph Brousseau sur les bases de l'ancienne forteresse, au XVIII e siècle érigé en marquisat, puis passe aux Malézieu, aux Bony   et aux Ligondès et en 1960 à la famille Defressigne avant de devenir la propriété de la famille Galland,  est inscrit en partie, aux M.H., depuis le 18.05.1967, et hôtel restaurant de Mme Odile Doret.                               RAMPNAT,  construit par un marquis  pour accueillir son épouse, sauvé de la ruine en 1960, puis abandonné pendant quinze ans et racheté en 1998 par la famille Galland.","architecture":"Sainte-FEYRE, demeure bâtie au XVIIIe siècle  sur lemplacement dun château féodal et dune forteresse. En 1439, le dauphin, futur Louis XI y logea. La chapelle Saint-Hubert est mentionnée dès 1518. A droite se dresse le pavillon du gardien. Une cour dhonneur précède le château. le corps de logis grande façade est organisée autour d'une travées centrale à fronton triangulaire armorié, balcon mouvementé et escalier en fer à cheval.    De part et dautre de cette cour sélève deux pavillons carrés au-delà desquels  une tour, entre ces pavillons et le château, de chaque côté de la cour, se trouvent les communs de plan en U, au fond un escalier accède à la terrasse sur laquelle se trouve le corps de logis, en contre-bas de la terrasse, les ruines de lorangerie, sur cave voûtée. A lintérieur, le château conserve en sous-sol des pièces voûtées en berceau dont lune possède une cheminée de la fin de lépoque gothique, reste du précédent édifice.  On peut aussi signaler la présence dun pigeonnier.                                                               RAMPNAT, manoir à trois niveaux flanqué d'échauguettes sur encorbellement sur les angles, toit en croupe recouvert de tuiles.","habitants":"Ste Feyre Famille Mérigot                                   Marquis de Rampnat\r\n        \"","divers":"Ste-Feyre  GPS : 46° 8' 28,52\" Nord, 1° 55' 0,07\" Est château de Rampnat grav 6","gps":"46° 8' 28,52\" Nord, 1° 55' 0,07\" Est château de Rampnat grav","images":["../image/image_23/23_Ste_Feyre_1.jpg","../image/image_23/23_Ste_Feyre_2.jpg","../image/image_23/23_Ste_Feyre_3.jpg","../image/image_23/23_Ste_Feyre_4.jpg","../image/image_23/23_Ste_Feyre_5.jpg","../image/image_23/23_Ste_Feyre_6.jpg"]},"Consult_chateau_formulaire3b79":{"id":"Consult_chateau_formulaire3b79","dept":"23","canton":"Evaux les Bains","commune":"Tardes","nom":"Tardes_Montflour","type":"Château","periode":"XVI","histoire":"MONTFLOUR,  du XVIe-XVIIe siècles et fin XIXe siècle. Inscrit MH partiellement.      Ancien siège d'une seigneurie de la Combraille datant en partie des XVIe et XVIIe siècles,  agrandie en forme de château-fort entre 1880 et 1895 par Ludovic Souchard  avocat à Montluçon.","architecture":"MONTFLOUR, la construction et les remaniements de ce château vont du XVIe au XIXe siècle, se compose d'un château  de dépendances avec une écurie, une étable, une maison de gardien avec un haut corps central en pignon et deux ailes basses latérales, un pigeonnier et une porcherie, a été agrandie au XVIIe siècle d'un avant corps formant pavillon. Une tourelle carrée a été ajoutée en 1883. A l'emplacement de bâtiments anciens démolis en 1883 a été élevé en 1895 un château fort de style néo gothique, composé d'un pavillon en forme de donjon crénelé flanqué d'un faux châtelet à deux tourelles et d'une tour d'escalier. Le château a été désaffecté entre les deux guerres. L'intérieur est totalement vide de mobilier et présente un décor, style néo-gothique (salle à manger, salon et vestibule décorés de lambris).","habitants":"seigneurie de la Combraille\r\n        \"","divers":"Montflour 33075648,46.1266742","gps":"","images":["../image/image_23/23_Tardes_Montflour_1.jpg","../image/image_23/23_Tardes_Montflour_2.jpg","../image/image_23/23_Tardes_Montflour_3.jpg"]},"Consult_chateau_formulaired784":{"id":"Consult_chateau_formulaired784","dept":"23","canton":"Guéret-1","commune":"La Saunière","nom":"Théret","type":"Château","periode":"XV","histoire":"THERET, bâti à La Saunière, date du XVe siècle et continuellement transformés jusqu'au XVIIe siècle.   En 1305, il appartenait à la puissante famille de la Chapelle-Taillefert, avant de passer par alliance aux Chamborand qui construisirent le château, puis, en 1608, à un seigneur de la Seiglière, dont on voit encore les armes au-dessus de la porte du donjon, à la mort  d'Alexandre de la Séglière, le domaine passe à sa fille Jeanne épouse de Nicolas Alexandre de Beausson trésorier royal à Montluçon, devenu veuf  ce dernier cède le domaine en 1738 à Jean Fricon de Parsac, ce châtelain fait quelques transformations relie l'aile des dépendances au corps de logis et dote la tour carrée  d'un toit galbé surmonté d'un clocheton. Après la Révolution, les descendants se défont du Théret qui passe par alliance aux Maulmont puis aux Bony qui laisse le domaine se dégrader, sous le second Empire le domaine passe à  Marc Bonhomme de Lajaumont, après de grandes transformations internes reviendra aux Reynal de Saint-Michel qui retaurent les jardins.","architecture":"THERET, à quelques kilomètres de La Charse, sur la route de la Saunière, bien protégé par ses douves et son étang,  du XVe siècle. Le château actuel succèdant à une maison forte dans une enceinte  rectangulaire flanqué sur sa face de deux tours aux angles extérieurs. Au centre de la courtine s'ouvre l'entrée, encadrée par deux tours cylindriques. Au fond de la cour s'élève le corps de logis sur lequel une tour d'escalier fait saillie. En retrait se dressent deux tours coiffées de toits en poivrière, la présence d'un chemin de ronde sur mâchicoulis ceinturant l'étage supérieur du corps de logis, ainsi que celle de meurtrières rappellent les préoccupations défensives. Une aile de dépendances percées d'ouverture à été rajoutées sommées de lucarnes à fronton triangulaire  à demi engagées dans les combles.   Inscrit au M.H. par arrêté du 12 janvier 1931. Puis lensemble des façades et des toitures ont été inscrits par arrêté du 22 octobre 1965.  Cest au château du Théret que fut tourné, en 2002, le téléfilm « Lenfant des lumières », avec Nathalie Baye, daprès luvre de Françoise Chandernagor.","habitants":"Famille de la Chapelle-Taillefert\r\n        \r\n        \"","divers":"Théret  GPS : 46° 7' 27,47\" Nord, 1° 56' 13,73\" Est","gps":"46° 7' 27,47\" Nord, 1° 56' 13,73\" Est","images":["../image/image_23/23_Th%c3%a9ret_1.jpg","../image/image_23/23_Th%c3%a9ret_2.jpg","../image/image_23/23_Th%c3%a9ret_3.jpg","../image/image_23/23_Th%c3%a9ret_4.jpg","../image/image_23/23_Th%c3%a9ret_5.jpg"]},"Consult_chateau_formulaire0bc9":{"id":"Consult_chateau_formulaire0bc9","dept":"23","canton":"Aubusson","commune":"Aubusson","nom":"Vallenet","type":"Patrimoine","periode":"XIV","histoire":"VALLENET, la famille Vallenet était originaire d'Étampes et comptait dans ses rangs des consuls d'Aubusson, des militaires (dont certains furent au service de la République de Venise), des religieux, des seigneurs ainsi qu'un grand nombre de tapissiers d'Aubusson. Par leur aïeule Marie de Saint-Julien de Peyrudette qui aurait eu, dit-on, au début du XVIIe siècle, une vingtaine d'enfants, les Vallenet aubussonnais avaient aussi des origines à Bellegarde-en-Marche, ville dans laquelle des tapisseries étaient également fabriquées. C'est une petite-fille de Marie de Saint-Julien de Peyrudette, Louise Vallenet, qui vend la maison des Vallenet, en 1690. On trouvait encore à Aubusson, au XIXe siècle, quelques Vallenet commerçants, hommes de loi ou tapissiers.","architecture":"À Aubusson, dans la Rue Grande, face à la Place de la Libération, la maison dite des Vallenet tire son nom d'une famille noble de la Marche installée dans cette province depuis le XIVe siècle. La construction de cette maison a en partie été réalisée par des membres de cette famille, à partir de la fin du XVe siècle. Plusieurs parties de la maison des Vallenet ont été réalisées au XVIe siècle, puis au XVIIe siècle, partiellement avec des matériaux récupérés après la destruction, commanditée en 1632 par Richelieu, du château dit Le Chapitre. Les derniers travaux notables sur cette maison seront effectués au XVIIIe siècle. Une fontaine, dite Fontaine des Vallenet, est située immédiatement devant la maison. Cette fontaine, à bassin polygonal, porte les armes de la ville et celles de la famille des vicomtes d'Aubusson. L'hôtel  forme deux corps de logis à deux étages, attenant ensemble et assez exactement orientés. Le côté nord, le plus étroit, avec deux fenêtres seulement à chaque étage, est parallèle à la Grande Rue. Le côté couchant est la partie la plus remarquable de l'édifice. Au centre, fait saillie la tour de l'escalier de forme hexagonale. La porte à arc surbaissé et la toiture en poivrière donnent à cette tour un aspect à la fois civil et militaire très pittoresque. À l'angle et au midi, est une tourelle moins élevée avec un toit en forme de dôme. La fontaine voisine  porte la date de 1718, et elle contribue à former, avec la maison des Vallenet, un ensemble très décoratif.","habitants":"Marie de Saint-Julien de Peyrudette\r\n        \"","divers":"Aubusson GPS : 45° 57' 23\" Nord et 2° 10' 18\" Est","gps":"45° 57' 23\" Nord et 2° 10' 18\" Est","images":["../image/image_23/23_Vallenet_1.jpg","../image/image_23/23_Vallenet_2.jpg"]},"Consult_chateau_formulaire3392":{"id":"Consult_chateau_formulaire3392","dept":"23","canton":"Felletin","commune":"Vallière","nom":"Vallière","type":"Château","periode":"XV-XVII","histoire":"A Vallière le château de Ganne, du Plat, ancien centre de vacances de la R.A.T.P.  Le château de Sourliavou et le château de la Villeneuve.\r\nVILLENEUVE  était dans la vicomté d'Aubusson. Depuis Ramnulfe d'Aubusson, en 1255 des membres de cette famille se sont titrés seigneurs de La Villeneuve. Mais c'est Antoine d'Aubusson qui a été la tige des seigneurs de La Villeneuve, ayant eu cette terre en apanage par acte de partage de juillet 1440. Il s'y établit la même année. Mort vers 1418, son fils Louis qui lui succéda, mourut en 1534. Ce fut ensuite Pierre d'Aubusson, mort vers 1550, et enfin autre Pierre d'Aubusson qui testa en 1557. La fille de ce dernier, Rose d'Aubusson, dame de La Villeneuve, porta cette terre à François-Jacques du Pouget de Nadaillac, en l'épousant  le 9 mai 1568. Aubusson porte les armes d'or à la croix ancrée de gueules, et Pouget de  ce château nest pas visible de lextérieur.\r\nVALLIERE, Louise du Pouget de Nadaillac, fille de François IV du Pouge, marquis de Nadaillac et de Françoise de Douhet, baronne de Saint-Pardoux, épouse de Joseph de La Roche-Aymon, seigneur de la Farge, est enterrée dans l'église de Vallière le 21 février 1730.","architecture":"VILLENEUVE,  a été la propriété de la famille dAubusson. Il a été en grande partie rebâti au XVIIe siècle. Il a servi à une époque décole dagriculture. Corps de logis en équerre à deux niveaux avec série de lucarnes sur toit en croupe à l'opposée côté gauche  une tour ronde toit en poivrière. La Nadaillac : d'or au chevron d'azur, accompagné en pointe d'un mont de six coupeaux de sinople. Le château de La Villeneuve en 1475 avait une grande tour qui comptait cinq étages. Il fut rebâti en 1606, vendu par M. de Nadaillac après 1770, il devint plus tard la propriété de M. Francisque Rudel du Miral, né à Clermont-Ferrand en 1812, qui y établit une ferme-école. Elle n'existe plus de nos jours.                                                   PLAT de plan rectangulaire à deux niveaux sur soubassement et série de lucarnes sur comble flanqué aux extrémitées de pavillons saillants rectangulaires et pavillons central d'entrée de trois travées toit à l'impérial avec escalier en fer à cheval.","habitants":"Famille dAubusson\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Vallière-Plat grav 1-2-3  plat  02544271,45.9059346 Villeneuve- grav 4-5-6","gps":"","images":["../image/image_23/23_Valli%c3%a8re_1.jpg","../image/image_23/23_Valli%c3%a8re_2.jpg","../image/image_23/23_Valli%c3%a8re_3.jpg","../image/image_23/23_Valli%c3%a8re_4.jpg","../image/image_23/23_Valli%c3%a8re_5.jpg"]},"Consult_chateau_formulaire5429":{"id":"Consult_chateau_formulaire5429","dept":"23","canton":"La Souterraine","commune":"Vareilles","nom":"Vareilles","type":"Château","periode":"XIX","histoire":"A Vareilles trois châteaux, Fontvieille, Marchat et Montlebeau.                                                                      FONTVIEILLE, cest un château transformé en hôtel restaurant. Il est fermé actuellement. Il a été construit au XIXe siècle. Ce château est composé de deux corps de logis rectangulaires. Le corps principal est flanqué de deux tours rondes couvertes en poivrière aux angles nord-ouest et sud-ouest et une tour au nord-est.                                                                   MARCHAT,  le château est construit vers 1865 pour Jean-Baptiste Maisonneuve, gros propriétaire terrien, natif et maire de Saint Agnant-de-Versillat de 1853 à 1866. « Jean-Baptiste était né à Saint-Agnant-de-Versillat en 1802, fils de Jean Maisonneuve et Marie Aumasson  vivait avec lui son neveu Jean-Baptiste Justinien Maisonneuve, né le 6 juin 1826. Marié à deux reprises, ses deux épouses décédées prématurément et sans postérité, il hérite de la propriété au décès de son oncle vers 1869, il fut également maire de la commune de Saint-Agnant de 1888 à 1896.  A son décès, son frère Sylvain Prosper Maisonneuve, hérite du domaine et le délaisse. Le château décline et se retrouve abandonné au milieu du XXe siècle, peu après la seconde guerre mondiale. Le domaine est racheté par un gros propriétaire haut-viennois pour enrichir le décor de sa propriété de Saint-Sulpice-les-Feuilles :  Les propriétaires se succèdent, dont en 1996 le groupement foncier agricole du Marchat qui exploite les bois. \r\nMONTLEBEAU  Il sagit dune des rares demeures nobles subsistantes des vassaux de la vicomté de Bridiers.","architecture":"MONTLEBEAU  Il est indiqué sur la carte IGN en ruines. Il est en fait en cours de restauration. Il est décrit dans le lien joint. Il est relativement visible de lextérieur. Ce manoir était précédé dun étang aujourdhui comblé. La construction sélevait sur trois niveaux. Le plan est celui dun château marchois classique, avec deux pièces à chaque niveau, deux tours dangle et une tour descalier en vis partageant la façade principale en deux. A lintérieur, disparition des planchers avec traces dencadrement des poutres et des planchers. Cheminées, dont celle du premier étage ornée de chapiteaux.\r\nMARCHAT, sa construction a été particulièrement soignée.  Le logis, à un étage carré et étage de comble, est construit en calcaire et en brique sur un soubassement en granite. Il est flanqué de quatre élégantes tourelles couvertes par de petits bulbes, couronnés par un épi de faîtage en zinc et une boule de verre. Ces tourelles sont éclairées par des baies en arc brisé, dans le style néogothique, certaines sont en trompe l'oeil afin de respecter la symétrie.","habitants":"Seigneur locaux                                                         Marchat Jean-Baptiste Maisonneuve\r\n        \"","divers":"Fontvieille de 1à 5 grav45793104,46.3104856    Montlebeau 6-7 46697008,46.2993310          Marchat grav 8","gps":"","images":["../image/image_23/23_Vareilles_1.jpg","../image/image_23/23_Vareilles_2.jpg","../image/image_23/23_Vareilles_3.jpg","../image/image_23/23_Vareilles_4.jpg","../image/image_23/23_Vareilles_5.jpg","../image/image_23/23_Vareilles_6.jpg","../image/image_23/23_Vareilles_7.jpg","../image/image_23/23_Vareilles_8.jpg"]},"Consult_chateau_formulaire7ae8":{"id":"Consult_chateau_formulaire7ae8","dept":"23","canton":"Guéret-1","commune":"Royère de-Vassivière","nom":"Vassivières","type":"Château","periode":"XVII","histoire":"VASSIVIERES, de la famille, Léonard Louis Vassivière a fait ajouter entre 1871 et 1888 deux tours carrées et deux corps de bâtiment. Cette nouvelle bâtisse néo-gothique sinscrit, par le réemploi de pierres sculptées, dans la mode romantique du XIXme siècle et dans lesprit des restaurations médiévales de Viollet-le-Duc. Dans les années 1930, Jeanne Pascal-Vassivière, la fille de Léonard Louis Vassivière, entreprend de grands travaux de transformation du château. Elle fait ajouter le décor de salamandre au-dessus de la porte dentrée et limposante tour carrée crénelée qui prolonge laile gauche du château.\r\nEn 1948, la famille Vassivière doit céder une grande partie de ses terres pour la construction du barrage, mais elle conserve lîle et son château jusquen 1977. Christian Cotte, descendant de la famille Vassivières.","architecture":"VASSIVIERES,le château regroupe des styles architecturaux de différentes époques. A la maison bourgeoise du XVIIe siècle avec  deux tours carrées et deux corps de bâtiment. Cette nouvelle bâtisse néo-gothique  dont le corps de logis central de plan rectangulaire à deux niveaux  intercalé sur les façades par deux tours carrées et une tour style donjon sur l'arrière avec mâchicoulis et créneaux, un deuxième corps de logis en retour d'équerre plus imposant d'un étage englobe la tourelle carrée, sinscrit, par le réemploi de pierres sculptées, dans la mode romantique du XIXe siècle et dans lesprit des restaurations médiévales de Viollet-le-Duc.","habitants":"Famille de Vassivière\r\n        \"","divers":"Vassivières 45° 50' 31? nord, 1° 54' 43? est","gps":"","images":["../image/image_23/23_Vassivi%c3%a8res_1.jpg","../image/image_23/23_Vassivi%c3%a8res_2.jpg"]},"Consult_chateau_formulairec9a4":{"id":"Consult_chateau_formulairec9a4","dept":"23","canton":"Auzances","commune":"Le Compas","nom":"Vauchaussade","type":"Château","periode":"XVI","histoire":"VAUCHAUSSADE, Mme de Bonnevie-Steinhagen, propriétaire de Vauchaussade. Pas d'autre information historique.","architecture":"VAUCHAUSSADE, le grand corps de logis présente une tour descalier en façade et deux ailes inégales, perpendiculaires, à larrière. Une terrasse à mur de soutènement crénelé et terminé par une tour circulaire, ainsi quun pavillon, précède lédifice, flanqué à droite dune longue écurie agrandie dune grange en retour. A lintérieur, le corps de logis conserve des restes de décor peint au premier étage.","habitants":"Mme de Bonnevie-Steinhagen\r\n        \"","divers":"Vauchaussade 46°0' 23,22\" Nord et 2°25'16,31\" Est","gps":"","images":["../image/image_23/23_Vauchaussade_1.jpg","../image/image_23/23_Vauchaussade_2.jpg","../image/image_23/23_Vauchaussade_3.jpg"]},"Consult_chateau_formulaire5274":{"id":"Consult_chateau_formulaire5274","dept":"23","canton":"Auzances","commune":"Saint-Maurice près Crocq","nom":"Vergnes","type":"Château","periode":"XIX","histoire":"VERGNES, la construction en mai 1823, à l'initiative de Jean Auboux de Steveny, propriétaire du château. Le 12 février 1610, Léonard Auboux rendait hommage à la seigneurie des Vergnes devant Euverte Galois, trésorier général des finances, commissaire député pour recevoir les hommages dus à sa majesté à cause de son duché d'Auvergne. En 1634, Jehan et Gilbert Auboux, fils du précédent étaient seigneurs des Vergnes.","architecture":"VERGNES, de ce château, il subsiste pour lessentiel la porte fortifiée et les fossés. Cest visible de lextérieur. Construction sur l'emplacement des communs d'un château dont la démolition commença le 21 avril 1823, le corps de bâtiment sest écroulé en 1824. Ancien château décrit dans un aveu et dénombrement de 1698 \"élégante construction, couverte en tuile plate\" et dans un rôle de 1791: \"château à quatre étages\". Avait \"deux tourelles qui formaient les coins de la façade\". Subsistent le fossé et la porte fortifiée de cet ancien château, Elément de décoration intérieure (peinture attribuée à Jean Auboux de Steveny)","habitants":"Famille Arboux de Steveny\r\n        \"","divers":"Vergnes 2.31998506,45.8568351          St Maurice grav 5_6","gps":"","images":["../image/image_23/23_Vergnes_1.jpg","../image/image_23/23_Vergnes_2.jpg","../image/image_23/23_Vergnes_3.jpg","../image/image_23/23_Vergnes_4.jpg","../image/image_23/23_Vergnes_5.jpg","../image/image_23/23_Vergnes_6.jpg"]},"Consult_chateau_formulaire84bb":{"id":"Consult_chateau_formulaire84bb","dept":"23","canton":"Saint-Vaury","commune":"Saint-Sulpice le Quérétois","nom":"Villatte_Billon","type":"Château","periode":"XVI","histoire":"VILLATTE-BILLON, appartenait en 1550 à René Brachet,  seigneur de Montaigut, qui en commença le démembrement en 1554, en vendant à Etienne Dorien, seigneur de Villepreaux, des rentes et des droits qu'il y possédait; puis en 1556 il vendit le fief lui-même à Jean Messager et à Jean Hagard. Annet du Rieu, écuyer, était  seigneur de la Villette-Billon en 1656,    La famille Chorllon était originaire de Guéret et y vivait au XVIIe siècle. En 1669 Isaac Chorllon était greffier en lélection de Guéret. II possédait les seigneuries de Rioux, de La Villatte et de Cherdemont, et N... Guillonen 1780.","architecture":"VILLATTE-BILLON, cest un château remarquable par son architecture, il est en très bon état dentretien. Plus forteresse que château avec sa tour carré  crénelé à mâchicoulis et lucarnes qui supporte un chemin de ronde et un toit à quatre pans qui sert de porte d'entrée accolé de sa tourelle crénellée à mâchicoulis, le corps de logis encadré de tours rondes sur les angles et échauguettes sur encorbellement.","habitants":"Famille de  René Brachet\r\n        \"","divers":"Vilatte-Billon 85003231,46.1868891","gps":"","images":["../image/image_23/23_Villatte_Billon_1.jpg","../image/image_23/23_Villatte_Billon_2.jpg","../image/image_23/23_Villatte_Billon_3.jpg","../image/image_23/23_Villatte_Billon_4.jpg","../image/image_23/23_Villatte_Billon_5.jpg","../image/image_23/23_Villatte_Billon_6.jpg","../image/image_23/23_Villatte_Billon_7.jpg"]},"Consult_chateau_formulaire17ee-2":{"id":"Consult_chateau_formulaire17ee-2","dept":"23","canton":"Felletin","commune":"Sainte-Feyre la montagne","nom":"Villefort","type":"Château","periode":"XVI","histoire":"VILLEFORT  bâti à Sainte-Feyre-la-Montagne, sa construction date du XVIe siècle. Pas d'information historique","architecture":"VILLEFORT, cest un château du XVIe siècle, est formé dun corps de logis rectangulaire, flanqué dune tour circulaire à chacun des angles ouest, et dune échauguette sur cul-de-lampe à chacun des angles Est. La façade principale souvre sur une cour ornée dun bassin central. A gauche du portail dentrée se trouve une construction rectangulaire servant de chapelle. Il est partiellement visible de lextérieur.Les constructions des communs, refaites en presque totalité, s'étendent vers l'Est jusqu'à une tour circulaire. Cet édifice de la fin du XVIe siècle succède à un château plus ancien. Le château de Villefort est inscrit aux M.H. depuis 1964.","habitants":"Seigneurs locaux\r\n        \"","divers":"Villefort  GPS : 45° 54' 24\" Nord et 2° 13' 48\" Est","gps":"45° 54' 24\" Nord et 2° 13' 48\" Est","images":["../image/image_23/23_Villefort_1.jpg","../image/image_23/23_Villefort_2.jpg","../image/image_23/23_Villefort_3.jpg","../image/image_23/23_Villefort_4.jpg","../image/image_23/23_Villefort_5.jpg"]},"Consult_chateau_formulaire40c8":{"id":"Consult_chateau_formulaire40c8","dept":"23","canton":"Gouzon","commune":"Saint-Pardoux-les Cards","nom":"Villemonteix_Orgnat","type":"Forteresse","periode":"XV","histoire":"VILLEMONTEIX, bâti à Saint-Pardoux-les-Cards et non à Chénérailles, date du XVe siècle,  la seigneurie  relevait des comtes de la  Marche, était au XVe siècle en possession de la famille Du Bois qui entreprenne après la guerre de cent ans la reconstruction du château sur les bases d'un édifice du XIIIe siècle, au XVIIe siècle le domaine passe par alliance  à la famille de Rièges. Le château verra naître René-Joseph du Peyroux (1763-1835)  futur général et baron  d'Empire, fils   d'Amable-Antoine du Peyroux et de Marie-Thérèse  des Rièges. A la Révolution  le domaine appartient au marquis de Biencourt puis échout en 1803 à Charles de la Barre vicomte de Bridiers et acquis en 1888 par madame Aubert veuve du notaire de Boussac, il fut un temps après  à la famille de Sallendrouze possesseur d'une manufacture d'Aubusson puis abandonné jusqu'en 1982. Acquis par Pierre Lajoix  qui s'attache à le remettre en état.  A l'intérieur, se trouvent de belles tapisseries d'Aubusson et des Flandres qui datent du XVIe siècle au XVIIIe siècle, du mobilier et des porcelaines de Sèvres également du XVIIIe siècle. Un accueil agréable est assuré par ses propriétaires.  inscrit aux M.H. en 1932, 1946 et 2010.\r\nORGNAT  a deux Km au nord le château d'Orgnat Il y a peu de renseignements sur ce château. Il est peu visible de lextérieur et semble en travaux. Georges Sarre a eu des ancêtres qui ont travaillé dans ce château.","architecture":"VILLEMONTEIX, archétype de la fin du Moyen-âge avec son donjon central, entouré de douves son chemin de ronde et ses tours en poivrières,  est à la fois puissant et élégant grâce aux discrets aménagements extérieurs du XVIIIe siècle, aux gargouilles sculptées, au pigeonnier. Et au goût de ses actuels propriétaires qui ont redonné vie au château après une période d'abandon, comportant un corps de logis rectangulaire flanqué de tours rondes aux angles de sa façade ouest et, sur la façade opposée, une tour d'escalier carrée. Deux des angles sont couronnés d'échauguettes en encorbellement. Un chemin de ronde domine les murailles et de petites ouvertures en accolade décorent l'intervalle des corbeaux supportant des mâchicoulis. Dans la cour, un puits hexagonal à panneaux assemblés, présente une décoration de quadrilobes.  Une douzaine de pièces sont présentes sur les 4 niveaux du château. Il abrite  un exceptionnel Pleyel double de Béatrice de Camondo et une riche collection de tapisseries des XVIe, XVIIe et XVIIIe siècles, d'Aubusson, Felletin, Flandres, Beauvais et Gobelins On peut y admirer entre autres des tapisseries d'Aubusson dont les modèles sont de Isaac Moillo.                                                                             ORGNAT, forteresse avec un corps de logis à trois niveaux et attiques plus lucarnes sur combles, ce corps est encastré entre tours à mâchicoulis et donjon, et prolongement sur les extrémités de bâtiments en corps de logis à deux niveaux et à l'opposé de dépendances  à un niveau.","habitants":"Famille Du Bois\r\n        \"","divers":"Villemonteix GPS : 46° 06' 29\" Nord et 2° 08' 35\" Est                                               Orgnat2.14105467,46.1265062 Grav de 6 à 9","gps":"46° 06' 29\" Nord et 2° 08' 35\" Est","images":["../image/image_23/23_Villemonteix_Orgnat_1.jpg","../image/image_23/23_Villemonteix_Orgnat_2.jpg","../image/image_23/23_Villemonteix_Orgnat_3.jpg","../image/image_23/23_Villemonteix_Orgnat_4.jpg","../image/image_23/23_Villemonteix_Orgnat_5.jpg","../image/image_23/23_Villemonteix_Orgnat_6.jpg","../image/image_23/23_Villemonteix_Orgnat_7.jpg","../image/image_23/23_Villemonteix_Orgnat_8.jpg","../image/image_23/23_Villemonteix_Orgnat_9.jpg"]},"Consult_chateau_formulairea5da":{"id":"Consult_chateau_formulairea5da","dept":"23","canton":"Gouzon","commune":"Peyrat les Nonières","nom":"Voreille","type":"Château","periode":"XV","histoire":"VOREILLE, le premier propriétaire connu est Christophe Barthon de Montbas, seigneur de Peyrat en 1500. Sa fille Marguerite épousa en 1515 Jean de Rochedragon, seigneur de la Villat, Marcillat, Puy-Malsignat et autres lieux. Sébastien de Rochedragon, petit-fils de Jean, acheta la seigneurie de Haute-Serre en 1614 puis La Chassagne en 1620. Ce nest quen 1776 que Marie Odile, veuve de Claude de Pouthe du Chiroux, vendit le domaine de Chaux à Françoise de Gamaches, veuve de Jean-Joseph de Rochedragon. Au début du XVIIe, Sébastien et son fils Geoffroy y logea. Ce Jean-François, marquis de Rochedragon, qui avait plusieurs propriétés à Montluçon et dans le Berry, vendit le château de La Voreille en 1812   à François Jean de Courthille de Saint-Avit, marquis lui aussi, colonel de cavalerie et chevalier de Saint-Louis.  Nommé par le préfet en 1816, François Jean occupa le poste jusquà sa mort en 1830. Son fils Charles Constantin fit de même entre 1847 et 1870. Mais le plus illustre de la famille est sans aucun doute Charles Félix Edgar, petit fils de François Jean par sa fille Constance, qui fit une brillante carrière dans la marine, jusquau grade de vice-amiral, mais qui décéda subitement en 1903 à bord du Masséna dans le port de La Pallice. Sa petite fille Odile, née à Peyrat en 1905, épousa en 1930 le baron Paul de Lamberterie du Cros mais cest un prénom qui vient immédiatement à lesprit : celui de Guy, maire de la commune de 1977 à 2010, mais aussi  conseiller régional, infatigable défenseur de la ruralité.","architecture":"Château du Mazeau inscrit au titre des monuments historiques en 1932.\r\nChâteau du Chiroux inscrit au titre des monuments historiques en 1932 et 2010.\r\nVOREILLE, cette très belle et immense demeure dominant létang cache bien ses origines. Pas facile en effet dimaginer quil y avait là un véritable château-fort, avec 2 corps de logis entourés de hautes murailles crénelées, douves, pont-levis et tour de défense de 4 étages.  Nous avons la description faite en 1669 lorsque Sylvain de Rochedragon rendit hommage au roi de son fief de La Vaureille.  De ces hautes murailles crénelées, subsistent sur la façade Ouest une rangée de corbeaux et de mâchicoulis qui devaient soutenir un chemin de ronde , juste à côté de la fameuse tour carrée maintenant intégrée à la dite façade. Les parties les plus anciennes, dont la tour ronde, sont  du XVe siècle. Les transformations les plus importantes, avec la construction de laile Nord-Est, furent réalisées au XIXe siècle par la famille de Courthille.","habitants":"Famille  de Rochedragon\r\n        \"","divers":"Montlebeau  GPS : 46° 17' 58\" Nord et 1° 28' 01\" Est","gps":"46° 17' 58\" Nord et 1° 28' 01\" Est","images":["../image/image_23/23_Voreille_1.jpg","../image/image_23/23_Voreille_2.jpg","../image/image_23/23_Voreille_3.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','23 — Creuse'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
