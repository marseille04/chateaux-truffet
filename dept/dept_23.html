. La partie ancienne comportait deux pièces par niveau. Certains encadrements de baies présentent des linteaux en accolade et des meneaux qui ne semblent pas tous d'origine ; au rez-de-chaussée les appuis de fenêtres sont moulurés d'un cavet, alors qu'à l'étage les appuis sont saillants. Sur le pignon nord on note une fenêtre élargie, probablement lors des travaux de rénovations, et qui conserve deux petits chapiteaux sculptés anciens. Le jardin d'hiver, à colonnettes en fonte, englobe la tour d'escalier. Le pigeonnier circulaire possède un toit conique couvert en ardoise.","habitants":"Famille d'Antoine Jorrand \r\n        \"","divers":"A Saint-Amand, Fot GPS : 45° 58' 57\" Nord et 2° 12' 32\" Est       Grav 1 à 3  Noth grav -4 Jartourdeix_Grav-5               Fot grav 6-7","gps":"45° 58' 57\" Nord et 2° 12' 32\" Est       Grav 1 à 3  Noth gr","images":["../image/image_23/23_Fot_St_Amand_1.jpg","../image/image_23/23_Fot_St_Amand_2.jpg","../image/image_23/23_Fot_St_Amand_3.jpg","../image/image_23/23_Fot_St_Amand_4.jpg","../image/image_23/23_Fot_St_Amand_5.jpg","../image/image_23/23_Fot_St_Amand_6.jpg","../image/image_23/23_Fot_St_Amand_7.jpg"]},"Consult_chateau_formulaire6495":{"id":"Consult_chateau_formulaire6495","dept":"23","canton":"Aubusson","commune":"Champagnat","nom":"Fournoux","type":"Château","periode":"XIII-XVI","histoire":"FOURNOUX,  Hugues de Fournoux, chevalier, est cité en 1194.  siècles.  Une famille Fournoux a bien existé, Hugues de Fournoux chevalier, est cité en 1194. Au XVIe siècle, il semblerait que la seigneurie fut divisée. Marguerite des Escots apporta par mariage, sa part à Oradour de Beaufort seigneur de Secondat et du Monteil, en 1576. Mais Jean de Durat, seigneur de la Cellette et des Portes, se qualifiait seigneur de Fournoux au XVIIe siècle. Sans doute, Fournoux relevait-il des terres de Mainsat. Jean II de la Roche Aymon donna cette terre à son fils naturel.  François nayant pas eu d'héritier, cest Gilbert de la Roche Aymon, seigneur de la Serre qui en devient seigneur. Il mourut vers 1630 également sans enfants. Après 1630, le fief de Fournoux est tombé dans l'apanage principal des sires de Saint-Julien qui n'y résidaient pas, et qui avaient plusieurs autres co-partageants. En 1817, c'est Françoise Puy, de Lyon, qui acheta le domaine à la barre du tribunal. Depuis, il est toujours resté dans la même famille, transmis par héritages successifs.  Jean Guitton n'a pas été élevé au château de Fournoux, mais à Saint-Etienne où il est né en 1901 ; il venait y passer un mois de vacances estivales chez son grand-père maternel Henri Bertrand, magistrat à la cour d'appel de Riom, avec son frère Henri. Héritier de la chaumière et du domaine chez Paillard,  et ses cousins Jean et Raymond Desthieux.","architecture":"FOURNOUX, bâti à Champagnat. Le domaine de Fournoux, était, autrefois, une ancienne villa mérovingienne, connue depuis 636. Le château de Fournoux est une propriété privée en direction de Mainsat. C'est au château que le philosophe et académicien Jean Guitton passa son enfance. Le bâtiment actuel se compose de deux corps de logis en retour d'équerre. La grosse tour ronde date du XIIe et XIIIe siècle. C'est devenu aujourd'hui un haras. A langle intérieur se trouve une tour octogonale à quatre pans engagés comprenant un escalier à vis. La porte dentrée est blasonnée. Au Sud-Ouest  la tourelle a été restaurée au XIXe siècle.  Au Nord-Ouest, la grosse tour ronde talutée est la plus ancienne du château.","habitants":"Famille Fournoux\r\n        \"","divers":"Fournoux   GPS : 46° 01' 10\" Nord, 2° 17' 03\" Est","gps":"46° 01' 10\" Nord, 2° 17' 03\" Est","images":["../image/image_23/23_Fournoux_1.jpg","../image/image_23/23_Fournoux_2.jpg","../image/image_23/23_Fournoux_3.jpg","../image/image_23/23_Fournoux_4.jpg","../image/image_23/23_Fournoux_5.jpg"]},"Consult_chateau_formulairee3cf":{"id":"Consult_chateau_formulairee3cf","dept":"23","canton":"Evaux les Bains","commune":"Nouhant","nom":"Fréssinaud","type":"Château","periode":"XVII","histoire":"FRESSINAUD, les premiers seigneurs du Fressinaud connus appartiennent à une famille berrichonne, les Brandon, Jean Brandon avait épousé, en 1341, Isabelle de Saint-Domet, Dame de Combor dans la paroisse de Peyrat La Nonière. Jean IV, épousa en 1672, Diane Françoise de Lauzanne, fille aînée de Geoffroy, seigneur de l'Etang, appartenait en 1770 à monsieur de Belair. Le 4 frimaire an IV \"la société populaire républicaine de Lépaud\" considérant que  le château appartenait ci-devant aux deux frères Robin-Bélair émigrés.","architecture":"FRESSINAUD, le château construit vers 1379 est composé dun corps de logis rectangulaire, flanqué de quatre tours rondes et dun donjon. Les ouvertures nont été que très peu modifiées depuis le XIVe  siècle. De cette époque, il subsiste les archères et les bouches canonnières. Entouré de douves, le château nest accessible que par un pont,  ce dernier formé dun manteau reposant sur des arches, a été reconstruit. Le château, classé demeure en péril il y a plus de 30 ans, a retrouvé, grâce aux efforts de son propriétaire, son allure d'antan. Il est lun des seuls châteaux en Creuse à possèder un corps de logis flanqué de cinq tours. Le château du Fressinaud est un château bâti à Nouhant, date du XVIIe siècle. Le château comporte 5 tours, percées par des meurtrières.  Après avoir été longtemps utilisé comme bâtiment agricole, a été restauré. Il est classé.","habitants":"Monsieur de Belair\r\n        \"","divers":"Fréssinaud  GPS : 46° 17' 06\" Nord, 2° 23' 29\" Est","gps":"46° 17' 06\" Nord, 2° 23' 29\" Est","images":["../image/image_23/23_Fr%c3%a9ssinaud_1.jpg","../image/image_23/23_Fr%c3%a9ssinaud_2.jpg"]},"Consult_chateau_formulaire91b2":{"id":"Consult_chateau_formulaire91b2","dept":"23","canton":"Saint-Vaury","commune":"Gartempe","nom":"Gartempe","type":"Château","periode":"XV","histoire":"GARTEMPE, bâti au lieu-dit Le Bourg, à Gartempe. Il est inscrit aux M.H. depuis 2002. La construction date de 1470 à 1480,  Le château de Gartempe a bénéficié d'une restauration au début du XXe siècle, lui apportant quelques aménagements modernes.","architecture":"GARTEMPE, ce château est décrit dans le lien joint. Ce château est le seul monument historique classé du village de Gartempe, il date du milieu du XVe siècle, avec tour d'angle et coursière à mâchicoulis.  L'agrément résidentiel semble avoir prédominé dès l'origine. Le bâtiment est constitué de deux ailes en équerre, avec tour d'escalier dans l'angle rentrant, dont une comprenant deux étages d'appartements. Ce plan distingue l'édifice des châteaux marchois de la même époque.","habitants":"Seigneur local\r\n        \"","divers":"Gartempe GPS : 46° 08' 52\" Nord et 1° 44' 09\" Est","gps":"46° 08' 52\" Nord et 1° 44' 09\" Est","images":["../image/image_23/23_Gartempe_1.jpg","../image/image_23/23_Gartempe_2.jpg"]},"Consult_chateau_formulaireb02b":{"id":"Consult_chateau_formulaireb02b","dept":"23","canton":"Le Grand-Bourg","commune":"Le Grand-Bourg","nom":"Grand_Bourg","type":"Château","periode":"XII-XVI","histoire":"GRAND-BOURG, cinq villages possèdent des châteaux : l'Âge au Seigneur (privé), le Masgelier (privé), Collonges (privé), la Ribbe (institut médico-éducatif), Salagnac (vestiges).                              Château de Chabannes à Saint-Pierre-de-Fursac.  Château de Chaumont à Mainsat.  Château du Theil à Saint-Agnant-près-Crocq.  Château Le Masgelier à Le Grand-Bourg                                                                    AGE-au SEIGNEUR,  COLLONGES, pas d'information pour ses deux châteaux.                                                 MASGELIER,   est surtout connu pour son histoire pendant la guerre, le château du Masgelier fut un refuge pour les enfants juifs grâce à lorganisation de Félix Chevrier. Lavocat Serge Klarsfeld et le comique Popeck  y séjournèrent plusieurs mois. Le lien donne dautre précisions. Il est devenu un gite dirigé par Hélène et Jacques Bloch.","architecture":"AGE-au SEIGNEUR, son origine remonte au début du XIIe siècle. La façade et laile droite sont XVIIe, laile gauche est  du XVIIIe siècle. Les caves seraient dorigine. Curieusement, il est marqué en ruine  Il est très peu visible de lextérieur.                            COLLONGES est du XVIIIe siècle, les tours et la poterne sont dorigine médiévale. Il est peu visible de lextérieur.","habitants":"Famille Bloch\r\n        \r\n        \"","divers":"Grand-Bourg 46° 09' 39? nord, 1° 38' 43? est.           A Grand-Bourg le château  de Laribe grav 1, de l'Age du seigneur grav 1-2, de Colonges grav 4-5-6, des Masgelier grav 7- 8-9","gps":"","images":["../image/image_23/23_Grand_Bourg_1.jpg","../image/image_23/23_Grand_Bourg_2.jpg","../image/image_23/23_Grand_Bourg_3.jpg","../image/image_23/23_Grand_Bourg_4.jpg","../image/image_23/23_Grand_Bourg_5.jpg","../image/image_23/23_Grand_Bourg_6.jpg","../image/image_23/23_Grand_Bourg_7.jpg","../image/image_23/23_Grand_Bourg_8.jpg","../image/image_23/23_Grand_Bourg_9.jpg"]},"Consult_chateau_formulairee4ea":{"id":"Consult_chateau_formulairee4ea","dept":"23","canton":"Guéret-1","commune":"Guéret","nom":"Guéret","type":"Château","periode":"XV-XVI","histoire":"Châteaux région de Guéret le monument de Saint-Fiel,  de Sainte-Feyre (voir article), de Saint-Sulpice-le-Guérétois de La Saunière (Voir article Théret ).   COMTES de la MARCHE, bâti à Guéret,  Il est devenu l'hôtel des Moneyroux, dans la Creuse. dit  des comtes de la Marche date du XVe, XVIe et XVIIe siècle.  Construit  en 1447 par Antoine Alard, trésorier du comté seigneur de Moneyroux,  une deuxième partie de la construction en 1510 à 1522. En 1612 change de propriétaire, devient couvent en 1636.  mais est racheté en 1642 par Etienne Tournyol futur président du présidial de Guéret. Et finalement acquis en 1892 par le département pour installer les services de la préfecture.   Il a été contruit en grande partie au XVe siècle sur l'ordre d'Antoine Allard. On y reconnaît le style gothique flamboyant qui annonce la Renaissance, fenêtres à meneaux. Au XVIe siècle, des aménagements ont été ajoutés (cheminées monumentales à décor peint). Appelé improprement \" château des comtes de la Marche\", l'hôtel particulier est devenu le siège du conseil Général en 1962. Il ne se visite donc qu'avec un guide et sur rendez-vous.","architecture":"Hotel MONEYROUX, de style gothique flamboyant, une tourelle polygonale occupe l'angle  formé par les deux ailes perpendiculaires de la fin du XVe siècle,  l'escalier surmonté d'un gracieux lanternon  prend son départ dans la galerie. Les façades, les toitures et les cheminées de cet édifice majestueux sont inscrites à linventaire supplémentaire des M.H. Les baies et les différents niveaux sont délicatement ourlés par des modénatures de pierre. Construit au XVe siècle,   l'hôtel des Moneyroux est inscrit au titre des M.H. par arrêté du 15 juin 1926, à l'exception des éléments suivants : les façades et toitures depuis l'escalier circulaire à l'est, la chapelle des Pénitents, les salles et les cheminées de l'ancien donjon et l'escalier sur plan carré de l'aile ouest classés au titre des M.H. par arrêté du 27 octobre 1941.","habitants":"Famille d'Etienne Tournyol \r\n        \"","divers":"Comtes de la Marche   GPS : 46° 10' 17\" Nord 1° 52' 09\" Est","gps":"46° 10' 17\" Nord 1° 52' 09\" Est","images":["../image/image_23/23_Gu%c3%a9ret_1.jpg","../image/image_23/23_Gu%c3%a9ret_2.jpg","../image/image_23/23_Gu%c3%a9ret_3.jpg","../image/image_23/23_Gu%c3%a9ret_4.jpg"]},"Consult_chateau_formulaireada9":{"id":"Consult_chateau_formulaireada9","dept":"23","canton":"Guéret-2","commune":"Guéret","nom":"Guéret_Chateaux","type":"Château","periode":"XVI-XVIII","histoire":"GUERET, les châteaux de la  région de Guéret le monuments de Saint-Fiel,  de Sainte-Feyre (voir article). de Saint-Sulpice-le-Guérétois, Nozières à quelques Km au nord de Guéret\r\nde La Saunière (Voir article Théret ).  Château de Cholet, de Cher du Prat Cette maison bourgeoise du XIX e siècle, la maison de Renabec de Fernand  Maillaud.                                                                       CHER du PRAT  Il avait été le fief de la famille Laroche, dont un membre, Paul, fut maire de la ville, du 4 mars 1878 au 21 février 1886.  aujourd'hui est à vendre. Cette maison bourgeoise du XIX e siècle, découpée en deux appartements T5 et flanqué d'une tour à mâchicoulis qui lui donne des airs de château, abritait jusqu'à présent des agents municipaux.","architecture":"GUERET, le musée de la Sénatorerie, musée d'art et d'archéologie, avec différents départements : sciences naturelles, armes, tapisseries, sculpture, peinture, émaux, pièces archéologiques. En partie édifié au XVIIIe siècle, l'hôtel de la Sénatorerie servait de résidence aux sénateurs sous Napoléon. Dès 1832, la société des sciences naturelles et archéologiques de la Creuse, l'une des plus vieilles sociétés savantes de France, y réunit des collections d'histoire naturelle et d'uvres d'art. En 1907, l'hôtel de la Sénatorerie devient un musée,    le Présidial du XVIIe siècle. Les parties du XVIIe siècle (portail sur la place du Marché, façades en retour d'équerre en granit et décorées de pilastres et cartouches, escalier en pierre et salle au rez-de-chaussée de l'aile en avancée) sont inscrits au titre des M.H.  par arrêté du 26 juillet 1934.             CHOLET,  corps de logis de plan rectangulaire  à trois niveaux avec pour le troisième étages  ouvertures  des fenêtres à galbes triangulaires, deux pavillons de même niveau à toit impérial.                                          LA RHODES, château de  la Rhode, petit château dans lequel fut créé une école primaire de garçons en 1956, devint ensuite maison des Jeunes.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"A Guéret le château des Comtes grav 1, de Cher du Prat grav 2, de Cholet grav 3-4, de Renabec grav-5, de la Rodhe-6, Nozières grav-8","gps":"","images":["../image/image_23/23_Gu%c3%a9ret_Chateaux_1.jpg","../image/image_23/23_Gu%c3%a9ret_Chateaux_2.jpg","../image/image_23/23_Gu%c3%a9ret_Chateaux_3.jpg","../image/image_23/23_Gu%c3%a9ret_Chateaux_4.jpg","../image/image_23/23_Gu%c3%a9ret_Chateaux_5.jpg","../image/image_23/23_Gu%c3%a9ret_Chateaux_6.jpg","../image/image_23/23_Gu%c3%a9ret_Chateaux_7.jpg","../image/image_23/23_Gu%c3%a9ret_Chateaux_8.jpg"]},"Consult_chateau_formulaire8c43":{"id":"Consult_chateau_formulaire8c43","dept":"23","canton":"Saint-Vaury","commune":"Jouillat","nom":"Jouillat","type":"Forteresse","periode":"XIV","histoire":"JOUILLAT, en 1497, le jugement dun procès engagé par Imbert de Chamborant permet à Pierre de Chamborant dacquérir les terres de Jouillat « château et manoir »   Ce procès avait été intenté en 1490 par Imbert de Chamborant, oncle de Pierre de chamborant contre le Baron Pierre De Brion.  Ce jugement est noté dans le second volume des extraits de registres du parlement dAndré du Chesne coté A. Il semble fort probable que ces biens aient été donnés à un ascendant de Pierre de Brion, seigneur de Sainte-Sévère, Pérouse, Huriel et Genouillac, par sa belle-sur la Baronne Marguerite de Malval épouse  de Pierre II de Brosse.  De Pierre Brion passa au Chamborant, à Guillaume d'Aubusson,  à Louis de Boéry, Denys Michel de Montboisier-Beaufort-Canillac (16951760), au Madot, Jean-Baptiste Le Groing (1749-1817),  l e 15 avril  Anne Marie Lejeune (1727-1796)  veuve de Jean Antoine Garaud , Philippe Thomas Garaud (1769- 1816), Pierre et François Lamoureux ; Jean Baptiste Desheraud (1797 - 1877),   le 13 Août - Joseph Louis Léopold Chassinat (1842 1890) , le 5 Août - Pierre Dufour (1848-1930) jusqu'en  1945 Jean Félix Chevereau (1897- ?) actuellement à la famille Chevereau .","architecture":"JOUILLAT, date du XIVe siècle. C'était initialement une simple tour de défense militaire et non pas un château seigneurial, comme en témoigne son escalier en vis inversé. Cette tour aurait eu pour vocation de protéger deux châteaux. Cette tour a ensuite connu une période d'abandon au cours de laquelle de nombreuses pierres ont été enlevées par les paysans pour construire leurs habitations. Les cheminées ont alors disparu. Il a été réhabilité en habitation au XIXe siècle. Les plateaux constituant les trois niveaux ont alors été divisés pour créer des pièces à vivre et les cheminées ont été reconstruite anachroniquement, façon XIXe. Depuis la fin du XIXe siècle, les piles de son portail sont surmontées de deux statues figurant chacune un lion mangeant un homme. Ces sculptures viennent du château de Bretouilly situé également sur la commune.   Il est atypique avec sa construction en un seul donjon et son important volume de base rectangulaire. Le donjon est immédiatement protégé avec quatre tours d'angles rondes. Il est couronné de mâchicoulis crénelés, situés sous un chemin de ronde.","habitants":"Famille de Chamborant \r\n        \"","divers":"Jouillat  GPS : 46° 15' 26\" Nord et 1° 56' 09\" Est","gps":"46° 15' 26\" Nord et 1° 56' 09\" Est","images":["../image/image_23/23_Jouillat_1.jpg","../image/image_23/23_Jouillat_2.jpg","../image/image_23/23_Jouillat_3.jpg"]},"Consult_chateau_formulaireaea8":{"id":"Consult_chateau_formulaireaea8","dept":"23","canton":"Gouzon","commune":"Ladapeyre","nom":"Ladapeyre","type":"Château","periode":"XIV-XV","histoire":"DAUGE, bâti La Dauge, à Ladapeyre château de La Chassagne, médiéval, pas dinformation sur ce château, il est entièrement restauré, il est relativement visible de lextérieur.\r\nChâteau du Coudart pas de renseignements sur ce château, il est visible de lextérieur.\r\nChâteau de La Côte, médiéval, entièrement détruit (il ne reste que les bases).\r\nA 6 Km au nord à Jalesches le château de la TERRADE, il comporte des parties datant du XVe siècle, ainsi que la chapelle, il est un peu visible de lextérieur.","architecture":"CHASSAGNE, de style maison forte encerclé de trois tours rondes toit en poivrière, l'édifice à deux niveaux avec lucarnes sur un toit en croupe recouvert de tuiles. COUDART,  pas de renseignements sur ce château, il est visible de lextérieur. Il est constitué dun bâtiment avec retour dangle, et une grande tour en façade.        DAUGE, bâti La Dauge, à Ladapeyre, c'est un château de style médiéval, dont la construction date de la fin du XIVe siècle au début du XVe siècle. Il ne reste que les douves et le pavillon d'entrée du château, il avait un système de défense, avec son pont-levis, ses murs épais à la base des couloeuvrines, et son chemin de ronde sur machicoulis percés d'archères. En 1830, l'ancien château est démoli. Il fut remplacé par une construction sur un plan classique, qui date du XVIIe siècle, avec son corps de logis flanqué de 2 avant-corps. Le château de la Dauge a son pavillon d'entrée inscrit aux M.H depuis 1931,  visible vu de l'extérieur.","habitants":"Seigneur locaux\r\n        \"","divers":"La Chassagne   grav 1-2, Coudart grav 3                     Dauge  GPS : 46° 15' 01\" Nord et 2° 03' 05\" Est  Grav 4-5                                                                                 Terrade grav 6-7-8","gps":"46° 15' 01\" Nord et 2° 03' 05\" Est  Grav 4-5","images":["../image/image_23/23_Ladapeyre_1.jpg","../image/image_23/23_Ladapeyre_2.jpg","../image/image_23/23_Ladapeyre_3.jpg","../image/image_23/23_Ladapeyre_4.jpg","../image/image_23/23_Ladapeyre_5.jpg","../image/image_23/23_Ladapeyre_6.jpg","../image/image_23/23_Ladapeyre_7.jpg","../image/image_23/23_Ladapeyre_8.jpg"]},"Consult_chateau_formulaired21c":{"id":"Consult_chateau_formulaired21c","dept":"23","canton":"Bonnat","commune":"Champsanglard","nom":"Lasvy","type":"Château","periode":"XIX","histoire":"LASVY, il y a peu de renseignement sur ce château. Il est un peu visible de lextérieur. Due sénateur Chagnaud Léon,  Joli chateau simple et ancien ; une véritable histoire avec lentrepreneur Chagnaud et lépopée des grands maçons creusois montés à Paris à la fin du XIXe siècle, toujours propriété de la famille Chagnaud, habité toute lannée.\r\nChagnaud Léon, né le 12 mars 1866 à Bourg d'Hem , mort le 31 juillet 1930 au château de Lasvy, commune de Champsanglard. Sénateur de la Creuse de 1921 à 1930.\r\nLe père de Léon Chagnaud, entrepreneur, désirant voir entrer son fils dans l'affaire qu'il dirigeait, le poussa à préparer l'école des arts et métiers. Ayant terminé avec succès ses études, le jeune homme collabora à l'entreprise familiale et fit rapidement preuve d'aptitudes surprenantes. Ses conceptions se révélèrent hardies, ses procédés constructifs et nouveaux.","architecture":"LASVY de plan rectangulaire  à deux niveaux  et lucarnes sur combles, toit en croupes recouvert de tuiles accolés d'une tour carrée, l'ensemble est dans un parc  avec batisse d'entrée avec porche à fronton triangulaire.","habitants":"Famille Chagnaud\r\n        \"","divers":"Lasvy 87103669,46.2945848","gps":"","images":["../image/image_23/23_Lasvy_1.jpg","../image/image_23/23_Lasvy_2.jpg","../image/image_23/23_Lasvy_3.jpg"]},"Consult_chateau_formulairebb16":{"id":"Consult_chateau_formulairebb16","dept":"23","canton":"Boussac","commune":"Lavaufranche","nom":"Lavaufranche","type":"Commanderie-Château","periode":"XII-XV","histoire":"LAVAUFRANCHE, au départ  commanderie bâti à Lavaufranche,  commanderie hospitalière du XIIe siècle et XVe siècle, de l'ordre de Saint-Jean de Jérusalem, parmi les commandeurs de Lavaufranche, on trouve le nom de Guy de Blanchefort, qui devint le grand maître de l'ordre des hospitaliers. La commanderie de Lavaufranche est classée aux M.H. depuis 1963.","architecture":"LAVAUFRANCHE,  fut fondée vers 1180. Le donjon carré date probablement de cette époque, le reste des bâtiments datent du XVe siècle. Dans la chapelle, on peut voir le tombeau du commandeur Jehan Grimau (mort vers 1480) ainsi que de belles fresques du XVe siècle récemment mises à jour, au XVe siècle fut agrandie par deux corps de bâtiments rectangulaires, l'un reliant le donjon à la chapelle , l'autre avec une tour d'escalier prolongeant le donjon à l'ouest.  Ils construisent une longue chapelle fortifiée et, un peu à part, un puissant donjon carré. Au XIVe siècle, leurs successeurs construisent deux corps de logis autour du donjon et ajoutent des tours rondes. Le tout forme un puissant et grand ensemble fermé, couronné par un chemin de ronde. Là, dans cette enceinte militaro-religieuse, les Hospitaliers peuvent accueillir, soigner et protéger les voyageurs et les pélerins de passage. Autour, s'étendent les terres agricoles qui leur sont confiées et qu'ils mettent soigneusement en valeur. Tout va pour le mieux donc, les 2 corps de logis et le puissant donjon. Lorsque survient la Révolution, ce dernier est à son tour raboté.","habitants":"Guy de Blanchefort\r\n        \"","divers":"Lavaufranche  GPS : 46° 19' 02\" Nord et 2° 16' 09\" Est","gps":"46° 19' 02\" Nord et 2° 16' 09\" Est","images":["../image/image_23/23_Lavaufranche_1.jpg","../image/image_23/23_Lavaufranche_2.jpg","../image/image_23/23_Lavaufranche_3.jpg"]},"Consult_chateau_formulaire4c4a":{"id":"Consult_chateau_formulaire4c4a","dept":"23","canton":"Evaux les Bains","commune":"Chambonchard","nom":"Ligondès","type":"Forteresse","periode":"XIV","histoire":"LIGONDES, bâti à Chambonchard, Il est inscrit aux M.H. . La construction du château de Ligondès date du XIVe au XVe siècle.  Il se situe à proximité de Pont-de-Rameau.","architecture":"LIGONDES, médiéval, lédifice est formé dun corps de logis quadrangulaire auquel est accolé, à louest, un autre corps de bâtiment en retour déquerre. A lest, une tour carrée formant un  donjon flanque le bâtiment central. Le corps de logis central est la partie la plus ancienne du XIVe siècle. A langle nord se trouve une tourelle percée dune cannonière et portée sur cinq corbeaux. Au niveau du troisième étage, une bretèche est portée sur trois corbeaux séparés par des arcs en accolade. En sous-sol, la cave voûtée en berceau est éclairée par une meurtrière. Le troisième étage, sous la charpente, est défendu par léchauguette et la bretèche, contemporaines de la reprise doeuvre du XVe siècle. Cette construction paraît avoir été primitivement le donjon quadrangulaire à éperon du château dorigine. Le bâtiment en retour déquerre serait de la même date que le corps central. Une tourelle flanquait langle sud. La tour carrée, donjon du XVe siècle, possède quatre étages et est flanquée dune tourelle accolée. Louvrage est couronné, sur trois faces, dune galerie de mâchicoulis sur encorbellement. Un premier escalier à vis occupe la plus grande partie de la tour, jusquau deuxième étage. Au deuxième étage, il est remplacé par un petit escalier à vis logé dans une tourelle accolée. Le troisième étage est occupé par une salle voûtée en berceau, ornée dune cheminée à accolade. Laccès primitif de la tour seffectuait au premier étage par larrière. Lentrée première du château, avec son pont-levis, devait se trouver vers lextrémité sud du bâtiment en retour déquerre.","habitants":"Seigneurs locaux\r\n        \"","divers":"Ligondès GPS : 46° 10' 00\" Nord, 2° 32' 12\" Est","gps":"46° 10' 00\" Nord, 2° 32' 12\" Est","images":["../image/image_23/23_Ligond%c3%a8s_1.jpg","../image/image_23/23_Ligond%c3%a8s_2.jpg","../image/image_23/23_Ligond%c3%a8s_3.jpg","../image/image_23/23_Ligond%c3%a8s_4.jpg","../image/image_23/23_Ligond%c3%a8s_5.jpg"]},"Consult_chateau_formulaire122b-2":{"id":"Consult_chateau_formulaire122b-2","dept":"23","canton":"Bonnat","commune":"Lourdouaix Sain-Pierre","nom":"Lourdoueix_Vost","type":"Château","periode":"XIV","histoire":"LOURDOUEIX, le premier seigneur connu est Podard de Vincent qui fit en 1405 une donation à l'abbaye d'Aubpierre sur sa terre de Lourdoueix et qui lui accorda de plus les dixmes, terrage et charriage sur Chatellus et Pédeon. Dès 1515, cette terre appartenait à la famille de Saint-Maur, qui la posséda plus de deux siècles. François de Saint-Maur, sieur de Lourdoueix, épousa Gilberte de Châlus; Marie-Sylvie de Saint-Maur, dame de Lourdoueix, épousa en 1654 Etienne du Breuil et lui porta la seigneurie de Lourdoueix.  ils laissèrent Marie-Sylvie, Robert de Saint-Maur, écuyer, sieur de Lourdoueix-Saint-Pierre et de Verne, épousa le 2 décembre 1676 Léonarde de La Marche. Leur fils, Joseph du Breuil, seigneur de Lourdoueix, né en 1656, gendarme de la garde du roi,  épousa en 1694 Anne André. Ils laissèrent: 1° François du Breuil, seigneur de Lourdoueix et la Béraudière, qui épousa en 1733 Marie-Raymond de Lussat; 2° Georges du Breuil, qui était curé de Lourdoueix en 1733. En 1750, M. de Chauvelin était seigneur en partie de Lourdoueix, et M. Blondel en 1780.\r\nVOST, cet ancien fief fortifié dont l'origine remonte à 1236, se présente sous la forme d'un plan carré, cerné de doubles douves. L'accès, commandé par un châtelet aux deux tours à toit en poivrière a été édifié en 1450 par Yvain de Tiont, seigneur du Breuil  et des Marches d'Orsennes. Le logis date des XVIIe et XVIIIes siècles.","architecture":"VOST, possédait justice haute, moyenne et basse, qui s'étendait jusqu'aux faubourgs d'Aigurande, à la rue appelée d'Aigurande-en-Marche. En 1610, Gabriel d'Ajasson, seigneur de Vost, eut, au sujet de la dixme qu'il levait dans cette rue, un procès avec Mademoiselle de Montpensier, la grande Mademoiselle, dame d'Aigurande et d'Aigurandette.\r\nDès la fin du XII°siècle, ces Aiaczo, ou Ajassons, dont le nom ce trouve à chaque page de l'histoire des commencements d'Aubepierre, possédaient les seigneuries de Nouzerolles, de Vost, d'Estignières et de Champvillan. Le premier que l'on connaisse comme seigneur de Vost est Étienne Ajasson, qui vivait au milieu du XIIIe siècle. Guilgaud, son frère, signa l'acte de fondation du couvent des cordeliers de Boisferrut, en l'an 1400. Henri Ajasson, qui vivait au XVe siècle, épousa Marie de La Marche, laquelle apporta aux Ajasson la seigneurie de Grandsaigne. C'est seulement au XVIIIe siècle que Vost cessa d'appartenir à la famille Ajasson. Henri Ajasson qui avait épousé Jacqueline d'Aubusson  sans enfant fit en 1654, donation de la terre et seigneurie de Vost à Henri Bertrand de Beaumont, son neveu et son filleul.  Vost fut vendu à Guéret le 5 septembre 1774 à Jean Blondet, qui mourut sans enfant. Il eut pour héritiers ceux de son frère Sylvain: François Blondet, seigneur de Vost, fut père de Julie qui porta Vost à Joseph Barbuat en l'épousant en 1806; Laure, fille de ces derniers, épousa en 1836  Edmond Hocquart. dont le fils Arthur est le propriétaire actuel de  Vost.","habitants":"Famille de Saint-Maur   Vost                                           Famille Étienne Ajasson\r\n        \r\n        \"","divers":"Lourdouneix 84961692,46.4025321                            Lalande grav 1, Vost grav 2-3-4, Brodièregrav-5","gps":"","images":["../image/image_23/23_Loudoueix_Vost_1.jpg","../image/image_23/23_Loudoueix_Vost_2.jpg","../image/image_23/23_Loudoueix_Vost_3.jpg","../image/image_23/23_Loudoueix_Vost_4.jpg","../image/image_23/23_Loudoueix_Vost_5.jpg"]},"Consult_chateau_formulaire901a":{"id":"Consult_chateau_formulaire901a","dept":"23","canton":"Evaux les Bains","commune":"Lussat","nom":"Lussat","type":"Château","periode":"XVII-XIX","histoire":"A Lussat, le châteaux du XIXe siècle et de Puy-Haut du XVIIIe siècle.                                                             LUSSAT qui date du XIXe siècle, situé au centre du bourg et celui de Puy-Haut qui date du XVIIIe siècle, est un ancien site seigneurial de la fin du XIIIe Siècle.  Il fut réédifié au XVIIe siècle en demeure bourgeoise entièrement restauré et aménagé en chambres d'hôtes par Nadine et Claude Ribbe vous accueillent dans cette belle demeure aux paysages pittoresques et sauvages avec un superbe point de vue dans un environnement naturel et préservé.","architecture":"C'est à Puy-haut que nous vous souhaitons la bienvenue dans notre accueillante demeure restaurée dans le respect des vieilles pierres, en pleine campagne Creusoise. Cinq chambres d'hôtes de charme sont aménagées toutes avec salle de bain privative,","habitants":"Famille Ribe\r\n        \r\n        \"","divers":"Lussat grav 1-2    46° 11' 01? nord, 2° 20' 33? est,                       Puy-Haut grav 3-4","gps":"","images":["../image/image_23/23_Lussat_1.jpg","../image/image_23/23_Lussat_2.jpg","../image/image_23/23_Lussat_3.jpg","../image/image_23/23_Lussat_4.jpg"]},"Consult_chateau_formulaire9f99":{"id":"Consult_chateau_formulaire9f99","dept":"23","canton":"Evaux les Bains","commune":"Lépaud","nom":"Lépaud","type":"Château","periode":"XVII","histoire":"LEPAUD, mandement de Lépaud aux XVIIe et XVIIIe siècles.\r\nContrôle de Chambon en 1665. Ressort du dépôt et contrôle de Chambon depuis novembre 1667. Lépaud était le siège d'une châtellenie royale ressortissant à la sénéchaussée de Riom, ancienne demeure du duc de Montpensier, c'était une des cinq châtellenies du pays de Combraille. À la fin de l'ancien régime, son siège fut transféré à Chambon-sur-Voueize                              CLAUD, pas d'information historique.","architecture":"LEPAUD deux châteaux, un de plan rectangulaire à trois niveaux dont le toit à deux pans assez prononcé avec lucarnes et accolé d'une tour héxagonale côté gauche et dépendance côté droit. L'autre  de plan rectangulaire à quatre niveaux le premier rénové avec toit en ardoise lucarnes  et tour héxagonale également mais à crénaux à l'opposé une tour ronde, toit en poivrière avec clocheton.                                          CLAUD de plan rectangulaire à deux niveaux trois pavillons saillant dont un central.","habitants":"Duc de Montpensier\r\n        \"","divers":"Lépaud 46° 14' 24? nord, 2° 23' 17? est  grav 1à 3 Claud grav 4","gps":"","images":["../image/image_23/23_L%c3%a9paud_1.jpg","../image/image_23/23_L%c3%a9paud_2.jpg","../image/image_23/23_L%c3%a9paud_3.jpg","../image/image_23/23_L%c3%a9paud_4.jpg"]},"Consult_chateau_formulairea7cf":{"id":"Consult_chateau_formulairea7cf","dept":"23","canton":"Auzances","commune":"Magnat-L","nom":"Magnat_Etrange","type":"Château","periode":"XVII-XV","histoire":"A Magnat l'Estrange le châteaux de Magnat, le Bost et à cinq Km au sud-Est à la Mailleret  le château de Beaufort.                                                                            MAGNAT,  bâti à Magnat-l'Etrange, sa construction date du XIIe siècle, fut agrandi au XVIIe siècle, il servait de défense et de résidence. Le premier propriétaire du château fut le marquis de Maignac et comte de l'Estrange.  Vers 1760, le marquis de Lestrange, baron de Magnat, lors dun séjour en Russie remarque dans les jardins de Saint-Pétersbourg,                                                                BOST, le château du Bost a été construit vers 1300 par Laurent du Plantadis. Grande restauration vers  1900 par le marquis d'Ussel. 1579: inscrit au dessus de la porte d'entrée . Vers 1550, Jacques de Rochedragon, seigneur de Vissart, près de Montmorillon, époux de Marguerite de Chaslus, était seigneur du Bost. Le 16  novembre 1550, ses héritiers vendirent la seigneurie à Gabriel de Plantadis.   En 1661, Yves Meusnier, seigneur du Bost, marie sa fille Anne, à Nicolas Tixier, écuyer, qui devient plus tard seigneur du Bost. En 1750, Marguerite Tixier, dame du Bost, épousa François de Fressanges. Au début du XIXe siècle, le château devint propriété de la famille d'Ussel par mariage de Melle Fressanges et du marquis Marien d'Ussel, grand-père de la propriétaire actuelle.","architecture":"BEAUFORT, le château est constitué dun corps de logis quadrangulaire avec deux ailes et deux grosses tours à chaque angle. Il nest pas visible de lextérieur. Il y a à proximité les vestiges dun camp romain.   MAGNAT, le château date du XVIIe siècle, le donjon, construit en 1248, fut démoli par les Anglais puis reconstruit en 1360. Différentes campagnes postérieures du  XIIIe, aux XVIe siècles achèvent lévolution de cette demeure, transformée au XIXe siècle (modification des ouvertures, crépi, établissement de lucarnes...). Lancien château est formé dun corps de logis de deux étages, allongé entre deux pavillons en légère saillie aux extrémités de la façade méridionale, où ils forment ailes en retour. Au centre de la façade nord est accolé un pavillon rectangulaire renfermant lescalier desservant les étages, dont les montées droites sont limitées par une balustrade en fer forgé dépoque Louis XIII.  Depuis 2012 sa restauration s'organise sous la forme d'un chantier de bénévoles. Le château est devenu un chantier de restauration ouvert aux jeunes, salle de réception, visites, résidence d'artistes, lieu de rencontres. Il est inscrit aux M.H. depuis 1946.","habitants":"Magnat Marquis de Lestrange                                        Bost Famille François de Fressanges\r\n        \"","divers":"Magnat   27885162,45.7939203  GPS : 45° 47' 38\" Nord et 2° 16' 44\" Est                    Etrange  grav 1                  Beaufort grav 2-3-4                 Bost grav 5-6-7-8","gps":"45° 47' 38\" Nord et 2° 16' 44\" Est                    Etrang","images":["../image/image_23/23_Magnat_Etrange_1.jpg","../image/image_23/23_Magnat_Etrange_2.jpg","../image/image_23/23_Magnat_Etrange_3.jpg","../image/image_23/23_Magnat_Etrange_4.jpg","../image/image_23/23_Magnat_Etrange_5.jpg","../image/image_23/23_Magnat_Etrange_6.jpg","../image/image_23/23_Magnat_Etrange_7.jpg","../image/image_23/23_Magnat_Etrange_8.jpg"]},"Consult_chateau_formulaire71c1":{"id":"Consult_chateau_formulaire71c1","dept":"23","canton":"Aubusson","commune":"Mainsat","nom":"Mainsat_Chaumont","type":"Château","periode":"XIV-XIX","histoire":"A Mainsat le château de Mainsat, de Chaumont et de Portes.                                                                           À CHAUMONT, létablissement est dirigé par Lotte Schwarz qui y met dailleurs en place une pédagogie nouvelle et active. Parmi ces enfants, le jeune Judka Herpstu connu bien plus tard sous le nom de Popeck : en 1995, lhumoriste reviendra dailleurs sur les lieux pour linauguration du mémorial érigé en lhommage « à la population creusoise qui a aidé et sauvé des familles juives ». Ou bien encore la petite Fanny Ben-Ami, héroïne du Voyage de Fanny, un film de Lola Doillon, adapté de louvrage autobiographique de la jeune Fanny et sorti en mai 2016.    À la mort dEugénie Bardet, ses héritiers décident de vendre le château. En 1967, Jean-François Mironnet, valet de chambre de Coco Chanel, lachète par adjudication. Il y vivra plus ou moins régulièrement avec son épouse et son fils. Jusquà ce quun incendie ravage la demeure une nuit de février 1986.    \r\nMAINSAT, fief de l'illustre famille de la Roche Aymon, Guillaume de la Roche-Aymon fut au XIIIe siècle l'artisan du premier donjon. Charles-Antoine cardinal en 1771 à Reims maria et sacra le roi Louis XVI. A la Révolution le château est confisqué à ses propriétaires. La duchesse de Narbonne née Antoinette de la Roche-Aymon parvient à le racheter en 1816 à sa mort le domaine revient par legs  à son neveu Renaud de la Roche-Aymon dont l'épouse Marie de Monville, petite fille du maréchal de Lannes. Sera transmit au XIXe siècle au marquis de Kernier qui créa un merveilleux jardin gothique.","architecture":"MAINSAT, bâti à Mainsat, sa construction a eu lieu du XIVe se composait  d'un corps de logis à deux pièces par étage, flanqué en façade par une tour carrée d'escalier. Un donjon  du XIIe siècle tour de gué carré relié par une courtine fut édifié au nord-Est, le tout réuni par un parapet sur console, le donjon fut entouré sur ses faces sud et ouest par d'autres bâtiments, très remanié au XIXe siècle.                                                  CHAUMONT, sur la commune de Mainsat, qui avait recueilli des enfants juifs, parmi lesquels Popeck, « Ce château, je lai acheté à une vente aux enchères il y a trois ans, confie Patrick Surget. Je lavais surtout acheté pour ses huit hectares de bois et sa maison de gardien que je souhaite rénover. Il est inscrit aux M.H. depuis 1997.                                                          PORTES, le château des Portes date du XIIe et XIXe siècle. Lhistoire raconte que le château a appartenu pendant 400 ans a une grande famille : celle de Durat, donc de nombreux membres sont reconnus pour leurs carrières militaires. Ensuite, cest la marquise de Beaucaire qui fit réaménager le parc du château dans un style pittoresque, passa aux Bonnevie de Pognat Le château a ensuite été racheté par plusieurs familles et appartient à la mairie depuis 1974.","habitants":"Famille de la Roche Aymon                                     Judka Herpstu dit Popeck\r\n        \"","divers":"Mainsat  GPS : 46° 03' 07\" Nord et 2° 23' 12\" Est Grav 1-2                                    Chaumont grav 3-4             Portes grav 5-6-7","gps":"46° 03' 07\" Nord et 2° 23' 12\" Est Grav 1-2","images":["../image/image_23/23_Mainsat_Chaumont_1.jpg","../image/image_23/23_Mainsat_Chaumont_2.jpg","../image/image_23/23_Mainsat_Chaumont_3.jpg","../image/image_23/23_Mainsat_Chaumont_4.jpg","../image/image_23/23_Mainsat_Chaumont_5.jpg","../image/image_23/23_Mainsat_Chaumont_6.jpg","../image/image_23/23_Mainsat_Chaumont_7.jpg"]},"Consult_chateau_formulaireb608":{"id":"Consult_chateau_formulaireb608","dept":"23","canton":"Bonnat","commune":"Malval","nom":"Malval","type":"vestiges","periode":"XI-XIV","histoire":"MALVAL, bâti à Malval, c'est un ancien château fort du XIVe siècle. Un prieuré d'hommes fut fondé à Malval le 13 février 1038, grâce à une fondation effectuée par Albert de Chambon, seigneur de Malval. Il était issu de celui de Chambon-sur-Voueize, et fut placé sous le patronage de Sainte-Valérie. Une place forte existait sans doute dès cette époque à Malval.  Selon Froissart, Du Guesclin y aurait séjourné en 1370. Jean de Brosse, mort en 1433, avait dans son testament désigné son proche parent, l'amiral de Culant, comme tuteur de ses enfants. Marguerite de Malval, leur grand-mère maternelle, entendait les soustraire à l'autorité de l'amiral. Elle les installa d'autorité dans son château de Malval. Après quelques démarches infructueuses, l'amiral fut contraint de mettre le siège devant le château pour obtenir la restitution des enfants.","architecture":"MALVAL, les ruines que l'on voit aujourd'hui sont celles du château de Malval du XIIe siècle restauré au XIVe après l'attaque de 1365, château fort XIVe siècle  dont il ne reste que les ruines du donjon et d'une tour. Un troupeau de chèvres récemment installé autour des ruines évite à celles-ci d'être totalement envahies par les ronces et la végétation. L'édifice est inscrit au titre des M.H. en 2005.","habitants":"Albert de Chambon\r\n        \"","divers":"Malval GPS : 46° 21' 02\" Nord et 1° 53' 10\" Est","gps":"46° 21' 02\" Nord et 1° 53' 10\" Est","images":["../image/image_23/23_Malval_1.jpg","../image/image_23/23_Malval_2.jpg","../image/image_23/23_Malval_3.jpg","../image/image_23/23_Malval_4.jpg"]},"Consult_chateau_formulaire57a6":{"id":"Consult_chateau_formulaire57a6","dept":"23","canton":"Gouzon","commune":"Puy-Malsignat","nom":"Margeleix","type":"Vestiges -Châteaux","periode":"XVIII","histoire":"MARGELEIX,  bâti à Puy-Malsignat, au XVIIIe siècle il fut la demeure de monsieur de Margelay,  précepteur de La Fayette. Le héros de la guerre d'indépendance d'Amérique qui a passé une partie de son enfance en ces lieux. C'est lui qui le premier rédigera la déclaration des droits de l'homme. L'ancienne chapelle du château  restaurée est devenue en 2010 \"Mémoire de toutes les déportations\". De remarquables \"vitraux-tapisserie\" ont été créés sur ce thème en 2009 par Jean Fourton, Jean François Guinot, Bernard Battu et Michel Cancalon. Le château a appartenu au précepteur de La Fayette, Antoine Foureton.","architecture":"MARGELEIX se présente sous la forme dun plan rectangulaire avec escalier droit central. La grande salle du rez de chaussée possède des poutres offrant un décor peint,  en plus du corps de bâtiment principal on trouve sur le site une laiterie, un fournil, des greniers mansardes : ensemble du XVIIe siècle inscrit au titre des M.H. dont deux pièces classées pour leurs décors peints et leurs boiseries,  oubli et citoyenneté.","habitants":"Monsieur de Margelay\r\n        \"","divers":"Margeleix 23546101,46.0373401","gps":"","images":["../image/image_23/23_Margeleix_1.jpg","../image/image_23/23_Margeleix_2.jpg","../image/image_23/23_Margeleix_3.jpg"]},"Consult_chateau_formulairecf63":{"id":"Consult_chateau_formulairecf63","dept":"23","canton":"Le Grand-Bourg","commune":"Marsac","nom":"Marsac_Sazeirat","type":"Château","periode":"XV","histoire":"Deux châteaux à Marsac celui de Marsac et à deux Km au sud le château Sazeirat à Arrénes.          . MARSAC, de 1852 à 1871 propriété de Henri Tardeau de Marsac ancien officier et maire de Marsac.   SAZEIRAT, le château de Sazeirat, la famille Marlin ,   ce château date du XVe XVIe siècle.","architecture":"MARSAC de plan rectangulaire corps de logis central, à deux niveaux toit en croupe grandes fenêtres jumenées sur façade, l'édifice est accolée de deux pavillons en retour d'équerre d'un niveau du type oblong toit en croupe, l'ensemble est recouvert de tuiles.                                                                                SAZEIRAT, il est constitué dun corps de logis en L à deux niveaux toit à deux pans avec trois tours sur les angles.","habitants":"Henri Tardeau de Marsac\r\n        \"","divers":"Marsac 46° 05' 55? nord, 1° 35' 26? est     Grav1-2-3     Sazeirat  Grav  4-5-6 1.56476860,46.0841335","gps":"","images":["../image/image_23/23_Marsac_Sazeirat_1.jpg","../image/image_23/23_Marsac_Sazeirat_2.jpg","../image/image_23/23_Marsac_Sazeirat_3.jpg","../image/image_23/23_Marsac_Sazeirat_4.jpg","../image/image_23/23_Marsac_Sazeirat_5.jpg","../image/image_23/23_Marsac_Sazeirat_6.jpg"]},"Consult_chateau_formulaire1c43":{"id":"Consult_chateau_formulaire1c43","dept":"23","canton":"Aubusson","commune":"Mautes","nom":"Mautes","type":"Château","periode":"XV","histoire":"Plusieurs châteaux à Mautes ou environ Boisqueyreau, au sud-Est à Saint-Bards le château Rocher, Chazelpeau, la Combe, et la Villetelle pas d'information historique pour ces châteaux.","architecture":"au sud-ouest à la VILLETELLE,  le vieux château avec donjon à mâchicoulis pas d'information historique;   donjon à trois étages carrés construit au XIIIe siècle; reprise des parties hautes au XVe siècle avec adjonction du principal corps de logis, d'un portail, des écuries; arrachement d'une tour d'angle des écuries et construction de la tour circulaire sud-ouest de la fin du troisième quart du XVIIe siècle, en même temps que l'aménagement du principal corps de logis, porte d'entrée ; ensemble en mauvais état en 1880; aménagement divers fin XIXe ou début XXe, notamment de la toiture du donjon; restauration au cours du troisième quart du XXe siècle.     BOISQUEYREAU, ou Boiquéraud, Il sagit dun château relativement récent. Il faut signaler une tour plus ancienne en ruine à proximité. Le tout nest visible que de loin.   Plus au  sud à Saint-Bard le château de CHAZELPAU hôtel restaurant de classe il a servi notamment de location de prestige. Il est en vente, son avenir nest pas connu. Il est un peu visible en partie de lextérieur.                                                               La COMBE,  est inscrit au titre des monuments historiques en 2011.","habitants":"Seigneurs locaux\r\n        \"","divers":"Boisqueyrau grav 1-2-3 41543070,45.9347840, vieille tour à Saint-Bards le château Rocher grav 8, Chazelpeau grav  3-4, la Combe grav 5-6, de Maleichard  grav 7 et la Villetelle grav 9.","gps":"","images":["../image/image_23/23_Mautes_1.jpg","../image/image_23/23_Mautes_2.jpg","../image/image_23/23_Mautes_3.jpg","../image/image_23/23_Mautes_4.jpg","../image/image_23/23_Mautes_5.jpg","../image/image_23/23_Mautes_6.jpg","../image/image_23/23_Mautes_7.jpg","../image/image_23/23_Mautes_8.jpg","../image/image_23/23_Mautes_9.jpg"]},"Consult_chateau_formulaireef11":{"id":"Consult_chateau_formulaireef11","dept":"23","canton":"Gouzon","commune":"Peyrat la Nonière","nom":"Mazeau","type":"Château","periode":"XVI","histoire":"MAZEAU, Jean V de Saint-Avit, abbé commandataire résidant au Mazeau, fit alors construire vers 1560 une extension dite \"Château Neuf \".  La famille Brandon, seigneurs du Chiroux, ayant acquis lensemble vers 1580.   A la fin du XVIe siècle fief de Léonard de Durat qui un peu plus tard, cet ensemble revient à sa descendance la famille de La Saigne Saint-Georges qui loccupa sans faire de travaux jusquà la Révolution, a la fin du XVIe siècle fief de Léonard de Durat. Mis en vente en tant que bien national, cest un bourgeois de Chénérailles, Gilles Etienne Gerbaud de Malgane, avocat au parlement et notaire, qui acheta le chateau. Aujourd'hui les derniers acquéreurs, Mr et Mme Terraz ont eux franchi le pas, et à partir de plans dépoque ont  amélioré lesthétique, notamment en rajoutant une tour à la galerie italienne et en 1990 acquit par monsieur Pierre Lajoix : inscrit au titre des M.H. en 1932.","architecture":"MAZEAU,  sur ce petit promontoire en bordure de Voueize occupé depuis lantiquité, il y eut certes une enceinte fortifiée,  le premier logis seigneurial dit \"Château Vieux\" ne fut probablement édifié quà la fin du XVe  siècle, et ne devient résidence des abbés de Bonlieu quau milieu du XVIe siècle,   toute en pierres de taille, avec une porte et des fenêtres finement sculptées. Il faut dire quà lépoque labbé avait à sa disposition les revenus dune abbaye extrêmement riche. La famille Brandon,  fit construire à son tour la galerie à litalienne, remarquable par ses médaillons en terre cuite et datée de 1620,  de dimension modeste demeure seigneurile, se compose  d'un corps de logis principal relié par un bâtiment plus bas et une aile en retour dont la partie inférieure est occupée par une galerie ouverte reposant sur deux piliers. Le corps principal, dont la toiture à deux pans s'appuie sur des pignons latéraux, adossé au corps de logis s'éléve un massif pavillon carré en légère saillie par rapport à un bâtiment rectangulaire allongé, ferme du château.","habitants":"Famille Brandon\r\n        \"","divers":"Mazeau GPS : 46° 4' 52,46\" Nord, 2° 16' 4,09\" Est","gps":"46° 4' 52,46\" Nord, 2° 16' 4,09\" Est","images":["../image/image_23/23_Mazeau_1.jpg","../image/image_23/23_Mazeau_2.jpg","../image/image_23/23_Mazeau_3.jpg","../image/image_23/23_Mazeau_4.jpg"]},"Consult_chateau_formulaire94a5-2":{"id":"Consult_chateau_formulaire94a5-2","dept":"23","canton":"Boussac","commune":"Bétête","nom":"Moisse_Bétète","type":"Château-Vestiges","periode":"XV-XVII","histoire":"MOISSE. Claude Amable de Beaufranchet, s'installe discrètement, en 1816, dans la Creuse au petit château du Puy sur la commune de Tercillat. Il achète ensuite quelques fermes en vente à Moisse et s'y construit en 1843 une nouvelle résidence, il l'assura à son fils Ernest en 1854.\r\nSous le Second Empire, Ernest de Beaufranchet consolide sa fortune, non pas grâce à sa parenté avec Napoléon III,mais plutôt par son travail de rénovation de l'agriculture, qu'il avait entrepris et poursuivi  dans la région. Il acquiert à Moisse de nouvelles terres pour finalement devenir propriétaire de 1100 ha d'un seul tenant. En  1877, trois ans après le mariage de Fernand qui disait que le château de son père le faisait penser à une caserne ou à un monastère, il conçut le projet de l'agrandir. Il fit appel à l'architecte Jean Bélizaire Moreau, de Moulins.  Les travaux entrepris en juin 1878 durèrent jusqu'en décembre 1884. Entre temps, Ernest mourut accidentellement, le 1er juillet 1882 et Fernand acheva le projet de son père.","architecture":"MOISSE,  cette construction corps de logis rectangulaire à deux niveaux avec lucarnes sur combles, accolé plein cintre d'une tour à trois étages mis hord oeuvre toit en poivrière et sur les flancs droit et gauche pavillon à trois niveaux arrondies sur façades avant toit à l'impérial , toute simple était une copie agrandie de celle du Puy. L'architecte s'inspirant des châteaux d'agrément du début du XVIIe siècle, style Louis XIII, y ajoute les deux ailes et les tours et nous a laissé un bien beau bâtiment.   Du château dÉcosse du XVIIe siècle, il reste pour lessentiel les deux tours qui sont visibles de lextérieur.","habitants":"Famille de Beaufranchet\r\n        \"","divers":"Ecosse grav 4-5-6-7 02987839,46.3718711               Genouillat grav 1-2-3","gps":"","images":["../image/image_23/23_Moisse_B%c3%a9t%c3%a8te_1.jpg","../image/image_23/23_Moisse_B%c3%a9t%c3%a8te_2.jpg","../image/image_23/23_Moisse_B%c3%a9t%c3%a8te_3.jpg","../image/image_23/23_Moisse_B%c3%a9t%c3%a8te_4.jpg","../image/image_23/23_Moisse_B%c3%a9t%c3%a8te_5.jpg","../image/image_23/23_Moisse_B%c3%a9t%c3%a8te_6.jpg","../image/image_23/23_Moisse_B%c3%a9t%c3%a8te_7.jpg"]},"Consult_chateau_formulaire5b02":{"id":"Consult_chateau_formulaire5b02","dept":"23","canton":"Felletin","commune":"le Monteil au Vicomte","nom":"Monteil_au_Vicomte","type":"Vestiges","periode":"XII","histoire":"MONTEIL le VICOMTE, où se trouve ses superbes ruines, depuis plusieurs siècles est la propriété des seigneurs d'Aubusson quand, en 1365 au début de la guerre de cent ans il est pris par les troupes anglaises. Redevenu français, il voit naître Pierre d'Aubusson en 1423. En 1476, le vicomte Pierre d'Aubusson y devient grand maître des hospitaliers.  Il sombre ensuite dans l'oubli et disparaît peu à peu sous de denses broussailles. Puis, feu Pierre d'Aubusson le sauve de l'oubli. En effet, à l'approche de l'anniversaire des 500 ans de la mort du fameux vicomte, le château est nettoyé et \"cristalisé\" en vue d'une grandiose commémoration, prévue en 2003.  Ce jour là, des membres de l'Ordre de Malte (lequel a pris la succession de l'ordre des chevaliers hospitaliers) viennent tout spécialement assister à la célébration de cet anniversaire. Trois ans plus tard, la communauté de communes Bourganeuf-Royère de Vassivière devient officiellement propriétaire des ruines.","architecture":"MONTEIL, le château forme un vague carré, défendu par 4 tours et de solides remparts. Après la mort de Pierre d'Aubusson, une de ses descendantes épouse un d'Arpajon et la famille d'Aubusson en perd alors la propriété. A la fin de la période féodale, comme il n'est plus entretenu, il se dégrade. Il est déjà passablement abimé lorsque survient la Révolution française, qui ne l'arrange pas plus. Mais le pire se produit après : pendant tout le XIXe siècle (et au début du XXe), les habitants du Monteil puisent allègrement dans les pierres du château pour construire, ou simplement améliorer, leurs maisons. Elle entreprend alors l'excellent travail de restauration de ce château qui  a été construit il y a plus de 1000 ans ! Au cours d'une visite libre, des panneaux informent le visiteur qui le souhaite sur l'historique du lieu.","habitants":"Famille  des seigneurs d'Aubusson \r\n        \"","divers":"Monteil  GPS : 45° 55' 45\" Nord et 1° 56' 19\" Est","gps":"45° 55' 45\" Nord et 1° 56' 19\" Est","images":["../image/image_23/23_Monteil_au_Vicomte_1.jpg","../image/image_23/23_Monteil_au_Vicomte_2.jpg","../image/image_23/23_Monteil_au_Vicomte_3.jpg","../image/image_23/23_Monteil_au_Vicomte_4.jpg","../image/image_23/23_Monteil_au_Vicomte_5.jpg","../image/image_23/23_Monteil_au_Vicomte_6.jpg","../image/image_23/23_Monteil_au_Vicomte_7.jpg"]},"Consult_chateau_formulaire5729":{"id":"Consult_chateau_formulaire5729","dept":"23","canton":"Bonnat","commune":"Bonnat","nom":"Mornay_Bonnat","type":"Château","periode":"XIII-XVI","histoire":"MORNAY, existe encore, mais complètement restauré; il appartenait en 1770 à M. de Brade Le château appartenait à la famille de Mornay. Sylvain de Mornay était seigneur de Bonnat. Au début du XIXe siècle, il fut acheté par le comte de Jules Henri Beaufranchet. Son neveu le fit restaurer en 1855.     GRANDSAGNE, le fief de Grandsagne est connu depuis le XIIe siècle. Dabord à la famille de la Marche, il passe aux Ajasson au milieu du XVe siècle, déjà Eudes de la Marche possédait ce fief en 1211. Son descendant, le puissant seigneur de la Marche vicomte de Grandsagne, était à la bataille de Bouvines. En 1476, Marie de la Marche fit don du fief à Jacqueline de Barbançois épouse de Guyot d'Ajasson, fils d'henry d'ajasson époux en secondes noces de Marie de la Marche. Depuis lors le château de Grandsagne avec la vicomté de Chateauclos est resté dans la famille d'Ajasson jusqu'au vingtième siècle.","architecture":"GRANDSAGNE,  le château plusieurs fois brûlé pendant la guerre de 100 ans a été refortifié pendant les guerres de religion, puis a pris son aspect actuel en 1597. Le jardin aurait été dessiné par Le Nôtre au siècle suivant. Vers 1820, la tour de gauche (vue du côté du parc) sest effondrée . Elle a été reconstruite en 1926 à la demande de Michel Ajasson par larchitecte Albert Laprade.                                      MORNAY Construit au  XVIe siècle le château de Mornay se compose dun corps de logis en retour déquerre, il est flanqué de deux tours carrées en avant-corps. Les deux tours rondes sont en prolongation de bâtiments plus récents. On peut remarquer aussi la présence dun pigeonnier.","habitants":"Famille de Mornay.                                                  Grandsagne Seigneur de la Marche.\r\n        \"","divers":"Mornay 92899386,46.3221842","gps":"","images":["../image/image_23/23_Mornay_Bonnat_1.jpg","../image/image_23/23_Mornay_Bonnat_2.jpg","../image/image_23/23_Mornay_Bonnat_3.jpg","../image/image_23/23_Mornay_Bonnat_4.jpg","../image/image_23/23_Mornay_Bonnat_5.jpg","../image/image_23/23_Mornay_Bonnat_6.jpg","../image/image_23/23_Mornay_Bonnat_7.jpg"]},"Consult_chateau_formulairec504":{"id":"Consult_chateau_formulairec504","dept":"23","canton":"Auzances","commune":"Mérinchal","nom":"Mothe_Mérinchal","type":"Château","periode":"XII-","histoire":"A deux Km au nord à Chard un château.                  MOTHE-MERINCHAL, il accueille entre autres le secrétariat de la mairie, mais également de la famille Le Loup qui fut propriétaire d'une partie des terres de Mérinchal et du château de Beauvais.  C'est le blason de la famille De Villelume qui provenait d'un drapeau gagné sur les murs de Jérusalem par Guillaume De Villelume, aux côtés de Godefroy De Bouillon. Ce drapeau fut conservé jusqu'en 1793. Il fut ensuite brûlé par les révolutionnaires au château de Barmontel, situé près d'Herment. la famille Desaix qui fit construire le château de la Mothe au XIIe siècle.  C'est le blason de la famille De la  Roche Aymon. Le marquis et la marquise De La Roche-Aymon furent les derniers seigneurs du château de la Mothe,  La terre et seigneurie de Villelume restée dans la descendance agnatique passa par mariage du 30 mai 1685 à Jean-François de Bosredon dont la fille Jeanne de Bosredon dame de Villelume épouse le 8 novembre 1704 Étienne Dougnon.  En 1789. Ils furent aussi le parrain et la marraine de la cloche de l'église en 1748. Leur fils Maximilien épouse Marguerite Aymée Deneufvy en 1743: de cette union naît Marguerite Dougnon, dame de Villelume qui épouse le 5 mars 1764 François Reynouard et dont la descendance conservera la terre de Villelume jusqu'au 26 janvier 1917.","architecture":"MOTHE-MERINCHAL, au Moyen-Age, les bourgades voisines de Maresches et Breulh possèdent toutes les deux un château féodal, une église et des fossés. Elles vont donner naissance à Mérinchal. Seul le château de la Motte, construit au XIIe siècle par les Templiers, est toujours debout. Le château de la Mothe a été construit au XIIe siècle. Une tour dangle pentagonale avec escalier à vis a été rajoutée au XVe siècle. Cette tour souvre à lextérieur par une porte ogivale. Ce château était entouré dun fossé qui plus tard fut comblé.  CHARD Le château de Chard a été construit en 1450. Il comporte un escalier à tourelle et des cheminées en bois sculpté. Il est peu visible de lextérieur.","habitants":"Famille Le Loup                                                               Famille De Villelume \r\n        \"","divers":"Chard grav 1 47796258,45.9449076             Mothe  grav de 2 à 5","gps":"","images":["../image/image_23/23_Mothe_M%c3%a9rinchal_1.jpg","../image/image_23/23_Mothe_M%c3%a9rinchal_2.jpg","../image/image_23/23_Mothe_M%c3%a9rinchal_3.jpg","../image/image_23/23_Mothe_M%c3%a9rinchal_4.jpg","../image/image_23/23_Mothe_M%c3%a9rinchal_5.jpg"]},"Consult_chateau_formulaire007e":{"id":"Consult_chateau_formulaire007e","dept":"23","canton":"Gouzon","commune":"Peyrat la Noniere","nom":"Peyrat_Noniere","type":"Château","periode":"XV","histoire":"A Peyrat-la-Nonière; château du Mazeau inscrit au titre des M.H. en 1932 ( voir article). Château du Chiroux inscrit au titre des M.H. en 1932 et 2010.  Château de Voreille (voir article).\r\nCHIROUX Françoise de Chalus, fille de Jeanne issue dun premier mariage, assura lavenir du château en sy installa en 1622 avec son troisième mari, François Pouthe, seigneur de Fromental. Après François , il y eut André puis Antoine, Jean-Joseph, Pierre Claude, Amable Gaspard, Amable Joseph Gaspard et enfin Gaspard Louis Amable. Tous se disaient seigneurs du Chiroux et de la Ville du Bois, château de la commune de Sannat ayant appartenu aux La Roche Aymon. Cest dailleurs là quils résidaient le plus souvent. Après la Révolution de 1789 la propriété fut vendue à de riches bourgeois de Chénérailles, Nicolas Vertadier et sa belle-mère Anne Bussière. Rachetée à la fin du XIXe siècle par Jean-Louis Masfrand, elle est restée dans cette famille jusquà aujourdhui. Cétait un \"chef doeuvre en péril\" et le dernier propriétaire Jean-Jacques Masfrand fut primé par cette émission pour la rénovation effectuée notamment sur les toitures. est devenu un Musée, ouvert au public.","architecture":"CHIROUX,  bâti à Peyrat-la-Nonière,  comprend  une tour carrée de 10 m de côté ayant des murs de 2 m dépaisseur, format que lon peut dater du XIIe siècle,,  Il y a 3 niveaux reliés par un bel escalier à vis et seulement 4 petites ouvertures sur le côté Est. Les deux échauguettes rajoutées à lédifice au cours de la guerre de cent ans.","habitants":"Famille de la Roche Aymon                                       \r\n        \r\n        \"","divers":"Chiroux  GPS : 46° 05' 18\" Nord, 2° 15' 26\" Est","gps":"46° 05' 18\" Nord, 2° 15' 26\" Est","images":["../image/image_23/23_Peyrat_Noni%c3%a8re_1.jpg","../image/image_23/23_Peyrat_Noni%c3%a8re_2.jpg","../image/image_23/23_Peyrat_Noni%c3%a8re_3.jpg","../image/image_23/23_Peyrat_Noni%c3%a8re_4.jpg","../image/image_23/23_Peyrat_Noni%c3%a8re_5.jpg"]},"Consult_chateau_formulaire1ef3":{"id":"Consult_chateau_formulaire1ef3","dept":"23","canton":"Ahun","commune":"Pontarion","nom":"Pontarion","type":"Château","periode":"XV","histoire":"PONTARION, placé sur la rive gauche du Thaurion,  Pontarion a été bâti par Antoine dAubusson. Les vicomtes dAubusson furent seigneurs de Pontarion en 1249. A cette époque, Raymond dAubusson épouse Seguine de Pierre Buffière qui lui apporte en dot la seigneurie de Pontarion. En 1364, Guy Aubert, seigneur des Monts, de la famille du pape Innocent VI, acheta les terres de Pontarion. Il avait épousé Ennonde de Bulbon, Dame deThor. Vers le milieu du XV siècle, Antoine dAubusson hérite du fief de  Pontarion, il fait élever le château actuel. Il combattit au siège de Rhodes comme capitaine général. Il était à la tête dune troupe de gentilshommes de  la Marche et du Limousin. Il avait été, auparavant, bailli dAnjou, de Touraine et du pays de Cau. Il fut chambellan du roi Charles VII, quil servit contre les Anglais et les Bourguignons. En 1470, Jeanne soeur dAntoine dAubusson apporte la terre de Pontarion, en dot, à son époux Foucaud de Pierre Buffière, il mourut en 1510. Jean Geoffroy de Pierre Buffière, avait épousé Marguerite de Bourbon Buffet. Il fut condamné, en 1556, pour avoir fait payer trop cher le droit de guet. Le 2 mars 1608, Marguerite de Pierre-Buffière vendit Pontarion à Jean du Chemin, évêque de Condom qui le laissa à son neveu Théophile du Chemin. En octobre 1655, Jeande Biron dArmagnac vendit le fief à Joseph de Chastagnac de Maléon. Michel de Corbier épousa au château, en 1743, Marie de Chastagnac, dame de Pontarion. La famille de Corbier conserva l'édifice jusquen 1836.","architecture":"PONTARION, des constructions du XVe siècle reste un corps de logis rectangulaire à trois étages, conservant son couronnement de mâchicoulis. Si deux tours d'angle   sont en ruines, la tour ronde engagée possède l'escalier à vis  avec porte au linteau en accolade garnit la façade sur cour et une échauguette. Deux tours, dont il ne reste que la base et les amorces, flanquent le logis du côté de la rivière. Un corps de bâtiment limite la cour côté route, conservant également son couronnement de mâchicoulis. A l'opposé, un pan de mur avec des restes d'échauguette sont en ruine, ainsi qu'une porte flanquée de tours. Des constructions du XVe siècle  il reste un corps de logis rectangulaire, à trois étages, conservant son couronnement de mâchicoulis.","habitants":"Famille d'Antoine dAubusson\r\n        \"","divers":"Pontarion  GPS : 45° 59' 54\" Nord, 1° 51' 02\" Est","gps":"45° 59' 54\" Nord, 1° 51' 02\" Est","images":["../image/image_23/23_Pontarion_1.jpg","../image/image_23/23_Pontarion_2.jpg","../image/image_23/23_Pontarion_3.jpg","../image/image_23/23_Pontarion_4.jpg","../image/image_23/23_Pontarion_5.jpg"]},"Consult_chateau_formulaire1996":{"id":"Consult_chateau_formulaire1996","dept":"23","canton":"Dun le Palestel","commune":"Frésselines","nom":"Puy_Guillon_23","type":"Château","periode":"XIV","histoire":"PUY-GUILLON,  bâti à Fresselines. La construction du château de Puy-Guillon a été construit au XIVe siècle. Il appartenait à Antoine de La Marche, signé dans un acte notarial du 11.02.1634, auprès de Paslin, notaire, déclare et confesse tenir et posséder en fiefs et hommage franc et ligue du  roi, à cause de son comté de la Marche et de sa châtellenie de Crozant plusieurs objets immeubles, domaines, etc.","architecture":"PUY-GUILLON ,  le château est formé dun corps de logis  rectangulaire, langle nord est flanqué dune grosse tour circulaire surmontée de trois lucarnes, supportées par trois corbeaux. Langle sud est flanqué dune tour ronde, plus petite. Au milieu de la façade, on trouve une tour descalier en saillie. La porte, placée au nord, à un linteau en accolade, timbré de lécusson de la famille de la Marche. Cette tour présente, au deuxième étage, une petite fenêtre en accolade. A à la moitié de sa façade, se trouve une tour descalier en saillie. La légende raconte que le peintre Claude Monet hante encore le village de Fresselines.","habitants":"Antoine de La Marche\r\n        \r\n        \"","divers":"Puy-Guillon  GPS : 46° 23' 01\" Nord, 1° 40' 58\" Est","gps":"46° 23' 01\" Nord, 1° 40' 58\" Est","images":["../image/image_23/23_Puy_Guillon_23_1.jpg","../image/image_23/23_Puy_Guillon_23_2.jpg","../image/image_23/23_Puy_Guillon_23_3.jpg","../image/image_23/23_Puy_Guillon_23_4.jpg"]},"Consult_chateau_formulaire8fa7":{"id":"Consult_chateau_formulaire8fa7","dept":"23","canton":"Boussac","commune":"Tercillat","nom":"Puy_Tercillat","type":"Château","periode":"XVIII","histoire":"PUY-TERCILLAT,  en 1395, Pierre II de Brosse ratifia la vente ainsi faite, le samedi 24 janvier après la fête de Saint-Antoine. On retrouve le fief du Puy aux mains de  demoiselle Marguerite, femme de Loys de la Vigne, seigneur de Maransagnes en 1509. Le Puy fut réuni à la seigneurie de Tercillat par Jean de Noblet. Puis le fief passa à dame Sylvie-Claire de la Chapelle, femme de Claude de Vaussadade, seigneur de Brousse. Par procuration son fermier Jean-Baptiste Porcher en fit hommage à Germain de Flexelles, seigneur de Sainte-Sévère.  Agnès de Noblet fournit en 1736 un aveu détaillé du fief du Puy Claude de Vachassade le vendit à Claude-Bertrand de Beaumont seigneur de Tercillat qui lui-même en fit hommage en 1750.   Après la mort d'Antoine d'Aubusson en 1506, la seigneurie passe aux mains de la famille d'Arpajon, originaire de Rouergue, puis à celle de Pierre Buffière, avant d'être acquise par les Seiglières. Plusieurs propriétaires se succèdent au XVIIe siècle. Il est vendu comme bien national à la Révolution. La seigneurie du Puy-Tercillat et passa avec elles en 1816 dans la famille de Beaufranchet et leurs descendants, les barons de Wildemberg.","architecture":"PUY-TERCILLAT, le château du Puy actuel a été construit au XVIIIe siècle avec les pierres de l'ancien château féodal. En 1645, le château est presque inhabitable, mais d'importantes réparations effectuées dans les années 1660 permettent de lui redonner vie avec l'installation sur place du vicomte Denys de Gédoyn. Il sera habité jusqu'au début du XVIIIe siècle mais ne connaîtra ensuite que des réparations ponctuelles. Au niveau architectural,  maison seigneuriale à deux corps de logis renfermés dans une cour à l'entrée de laquelle se trouvait un portail et sur celui un colombier ». Le château du Puy et ses 3000 costumes, site labellisé est ouvert au public et aux écoles depuis 1989. Aujourd'hui, les vestiges cristallisés du château persistent et restent librement accessibles au public.","habitants":"Vicomte Denys de Gédoyn\"","divers":"Puy-Tercillat  GPS : 46° 24' 43\" Nord et 2° 02' 59\" Est","gps":"46° 24' 43\" Nord et 2° 02' 59\" Est","images":["../image/image_23/23_Puy_Tercillat_1.jpg","../image/image_23/23_Puy_Tercillat_2.jpg","../image/image_23/23_Puy_Tercillat_3.jpg"]},"Consult_chateau_formulairee5d5":{"id":"Consult_chateau_formulairee5d5","dept":"23","canton":"Gouzon","commune":"Gouzon","nom":"Réville_Gouzon","type":"Maison forte","periode":"XV","histoire":"REVILLE,  entre Guéret, Aubusson.  Dans la châtellenie de Montluçon, le seigneur de Reuille (Reville), l'écuyer Philibert de Follet, possède à la fin du XVe siècle \"une place fort et foussez alentour d'icelle, et hors foussez, une maison à four avec jardins et pourpris\", une grange,   des près et \"une autre grange estable et maison à feu en laquelle demeure un mestayer qui laboure à moitié les terres du domaine de la dicte seigneurie\". Le 18 mars 1520, assemblée tenue à Moulins pour les coutumes du Bourbonnais, parmi les présents, le fils de Philibert de Follet : messire Anthoine de Follet, chevalier, seigneur de Reville, en personne, ainsi qu'entre autres : le seigneur de Puynault (Puyhault à Gouzon) et M. François Rapault pour le seigneur de Gouzon. En 1569, Nicolas de Nicolay, géographe du roi, dans sa générale description du Bourbonnais écrit : s'ensuivent les noms des seigneurs qui ont justice dans tout le ressort et chastellenie de Montluçon : le sieur de Guzon, le sieur de Reuille. François de Panevinon, écuyer, était seigneur de Reville en 1550.  J.B. Noël de Chaussecourte né en 1757, était seigneur de Reville en 1771.","architecture":"REVILLE, de style maison forte, corps de logis à trois niveaux de plan rectangulaire toit à deux pans encadrés de trois tours rondes toit en poivrières, l'ensemble recouvert de tuiles.","habitants":"Messire Anthoine de Follet\r\n        \"","divers":"Réville 28641213,46.2052092","gps":"","images":["../image/image_23/23_R%c3%a9ville_Gouzon_1.jpg","../image/image_23/23_R%c3%a9ville_Gouzon_2.jpg","../image/image_23/23_R%c3%a9ville_Gouzon_3.jpg","../image/image_23/23_R%c3%a9ville_Gouzon_4.jpg","../image/image_23/23_R%c3%a9ville_Gouzon_5.jpg","../image/image_23/23_R%c3%a9ville_Gouzon_6.jpg","../image/image_23/23_R%c3%a9ville_Gouzon_7.jpg"]},"Consult_chateau_formulaireb0f3":{"id":"Consult_chateau_formulaireb0f3","dept":"23","canton":"Auzances","commune":"Sermur","nom":"Sermur_Brousse","type":"Vestiges Château","periode":"XII-XV","histoire":"A Sermur vestiges et château de Montel pas d'informaton, à  l'Est de Sermur à un Km Brousse.\r\nBROUSSE,   bâti à Brousse, la construction du château date du XVe siècle,  est classé aux M.H. depuis 1978.                                                       SERMUR, dans la descendance de cette famille apparu au XIe siècle à Durât (Pionsat), Jean de Durât, 2e du nom, qualifié puissant  seigneur des Portes,  chevalier de l'ordre du Roi, Lieutenant de cinquante hommes d'armes de ses ordonnances, bailli de Combrailles et capitaine des châteaux de Sermur. Jean de Durât, 1er du nom,  puissant seigneur et chevalier, seigneur des Portes et de Saint-Mion, fut bailli du pays de Combrailles, et capitaine du château d'Auzances, écuyer et chambellan de Charles de Bourbon connétable de France, capitaine de la ville d'Aigueperse et du château de Sermur dans le pays de Combrailles, dont il obtint des Lettres de confirmation de Louise de Savoie, mère du roi François Ier, le 22 octobre 1528, tant à cause de ses sens, noblesse. François de Durât, 2e du nom, seigneur des Portes et de Chazeaux, bailly des châtellenies de Chambon, d'Evaux, pourvu le 4 février 1522, est qualifié puissant seigneur et Bailly de Combraille et obtint d'autres provisions le 21 février 1525 pour l'office de capitaine du château d'Auzance, et fut encore pourvu le 22 décembre de la même année de celui de capitaine de la châtellenie de Sermur.","architecture":"BROUSSE, il possède un corps de logis rectangulaire avec tourelle ronde descalier. Le corps de logis est surmonté dune galerie de mâchicoulis. La tourelle est également couronnée de mâchicoulis en encorbellement, les façades et les toitures du château et de lancien colombier et lescalier intérieur à vis sont protégés.                                                         SERMUR,  tour de guet du Moyen-Age qui sincluait dans un système de défense et de surveillance rattaché à lhistoire de la Marche, datée du XIe siècle et située à 712 mètres d'altitude,  il ne reste aujourd'hui que les ruines de cette tour, seule vestige d'une forteresse féodale détruite au début de la guerre de cent ans. Elle est désormais haute d'environ 10 mètres et composée de blocs taillés de granite bleu. Vers 1740, cette tour servit d'observatoire à l'astronome César-François Cassini et, en 1797, un autre astronome, Jean-Baptiste Joseph Delambre, donc la préservation et la restauration de ce monument historique est une responsabilité pour la commune de Sermur, qui cependant manque de fonds pour rétablir l'élévation originale de la tour. Létage inférieur ne comporte aucune ouverture. Le plan est approximativement carré, lappareil formé de moellons rectangulaires. Les murs ont une épaisseur de 1, 50m à la base. Inscrit au M.H.en 1958.","habitants":"Sermur  Jean de Durat\r\n        \"","divers":"Brousse  GPS : 45° 58' 22\" Nord, 2° 27' 24\" Est             45288284,45.9748003           Montel grav 7","gps":"45° 58' 22\" Nord, 2° 27' 24\" Est             45288284,45.974","images":["../image/image_23/23_Sermur_Brousse_1.jpg","../image/image_23/23_Sermur_Brousse_2.jpg","../image/image_23/23_Sermur_Brousse_3.jpg","../image/image_23/23_Sermur_Brousse_4.jpg","../image/image_23/23_Sermur_Brousse_5.jpg","../image/image_23/23_Sermur_Brousse_6.jpg","../image/image_23/23_Sermur_Brousse_7.jpg"]},"Consult_chateau_formulaire2baf":{"id":"Consult_chateau_formulaire2baf","dept":"23","canton":"La Souterraine","commune":"La Souterraine","nom":"Souterraine","type":"Vestiges Château","periode":"XII-XV","histoire":"A la Souterraine  vestiges des fortifications, des portes , du château de Lezat (voir article bridiers) , de Montelbeau, de Marchat et le manoir de St-Maurice  de Querrois (voir article)                                                 La SOUTERRAINE, la porte Saint-Jean est, avec la courtine adjacente, classée M.H. par arrêté du 30 juillet 1920. Elle est un monument emblématique de La Souterraine.                                                                ST-MAURICE,  château de la Clairière , manoir de la Maison-Rouge : ancienne demeure du XVIe siècle remaniée au XIXe siècle, le fief était autrefois appelé Chabannes-Bertrand, mentionné dès 1406. il a longtemps appartenu à la famille Mondin.\r\nManoir du QUEROY : ancien domaine des Blanchard de Maffe. on en retrouva la trace dès le XVe siècle.  Manoir du XIIe siècle, \r\nMaison-Rouge. Ce lieu s'appelait autrefois Chabannes-Bertrand. Son nom actuel vient sans doute de l'aspect rougeâtre des tourelles de l'ancienne maison seigneuriale construite en briques.","architecture":"SOUTERRAINE, nommée selon les époques porte de Breith, de Lavaud, de Notre-Dame ou de la prison, elle a été construite au XIIIe siècle, puis a été remaniée plusieurs fois et  surélevée à la fin du XVe siècle.\r\nConstruction rectangulaire de 25 mètres de hauteur, la porte Saint-Jean présente trois niveaux délévations et flanquée de deux tourelles dangle en encorbellement. Elle est couronnée de créneaux et de mâchicoulis supportés par des corbeaux triples. La façade extérieure présente également trois meurtrières cruciformes qui encadrent une niche triangulaire. Laccès à lintérieur de lenceinte se fait par une ouverture en arc brisé côté extérieur et en plein cintre côté intérieur. Une rainure montre lemplacement de la herse et des poutres qui supportaient le pont-levis. Plus haut, au milieu de la façade, un autre corbeau triple devait lui aussi supporter un appareil défensif.  Le premier étage est accessible par un escalier menant au chemin de ronde.  au dernier niveau : une plateforme abritée par une toiture en tuiles plates. Les créneaux découpés dans la muraille offrent une vue unique sur la ville. Les grilles et les chaînes des portes furent vendues aux enchères afin de payer les rénovations de léglise.  La porte Saint-Jean a servi de prison jusquen 1860, mais son dernier occupant aurait été un prisonnier allemand. Elle est, avec la porte du Puycharraud, gardienne de la mémoire des fortifications de la ville.","habitants":"seigneurs locaux\r\n        \"","divers":"A la souterraine   GPS : 46° 14' 32,38\" Nord et N 1° 30' 49,58\" Est  vestiges des fortifications Grav 1-2-3, des portes , de Montelbeau grav 5, de Marchat grav 4 et le manoir de St-Maurice  de Querrois grav 6-7-8","gps":"46° 14' 32,38\" Nord et N 1° 30' 49,58\" Est  vestiges des for","images":["../image/image_23/23_Souterraine_1.jpg","../image/image_23/23_Souterraine_2.jpg","../image/image_23/23_Souterraine_3.jpg","../image/image_23/23_Souterraine_4.jpg","../image/image_23/23_Souterraine_5.jpg","../image/image_23/23_Souterraine_6.jpg","../image/image_23/23_Souterraine_7.jpg","../image/image_23/23_Souterraine_8.jpg"]},"Consult_chateau_formulaire1edc":{"id":"Consult_chateau_formulaire1edc","dept":"23","canton":"Aubusson","commune":"Saint-Avit de Tardes","nom":"St_Avit_Tardes","type":"Château","periode":"XV","histoire":"CHET du BARMONT, bâti à Saint-Avit de Tardes,  château de défense dont la construction a débuté en 1423, en pleine Guerre de 100 ans, modifié par la famille de la Roche-Aymon dès le milieu du XVIe siècle et jusquau XVIIe siècle, et acquis après la Révolution par le général dEmpire Jean-Louis-Brigitte Espagne vers 1800.  À la mort du général, elle fut achetée par sept familles successives dont lune la possédée jusquen 2009, soit pendant deux siècles. Le général dEspagne l'avait lui-même acquis, en 1800, un bâti qui avait été négligé tout au long du XVIIIe siècle. Il lavait donc fait restaurer à sa façon. Il y demeura jusquen 1805.  Château en cours de restauration par ses propriétaires depuis 2010.« Nous avons acheté le château mais aussi lensemble des meubles de lépoque ainsi que les documents relatifs à la vie du Chet qui, jusquà la Révolution était une enclave bourbonnaise, ce qui nous ramène à la famille de La Roche-Aymon ». dernier propriétaire Christian Malveau.     PUIDS du CLOS, cest dans le parc de ce château quil y avait le circuit automobile du Mas du Clos. Il y avait aussi une magnifique collection de voitures Ferrari . Le circuit nest plus accessible, ni visible. Le château est peu visible de lextérieur","architecture":"CHET du BARMONT, la bâtisse primitive date au moins du XVe siècle. Elle a été remaniée au XVIe siècle (la chapelle est de cette époque), puis au XVIIe siècle et enfin au début du XIXe siècle par son plus illustre propriétaire, le général dEmpire Jean Louis Brigitte d'Espagne qui trouva la mort à Essling, il  mutila le château du Chet en le privant de son chemin de ronde quil fit remplacer par un simple chaînage, il ouvrit de nombreuses fenêtres. Le Chet, naguère château de défense, devint ainsi une demeure de plaisance.                                                                       PUIDS du CLOS, de plan retangulaire à trois niveaux et lucarnes sur comble, l'édifice est accolée de deux tours rondes l'une centre droite l'autre centre gauche toit en poivrière, l'ensemble recouvert  d'ardoises.","habitants":"Famille de la Roche Aymon\r\n        \"","divers":"St-Avit 30252153,45.9283659     Mas du clos grav 1_ 2-3                Chets de Barmont grav 4-5","gps":"","images":["../image/image_23/23_St_Avit_Tardes_1.jpg","../image/image_23/23_St_Avit_Tardes_2.jpg","../image/image_23/23_St_Avit_Tardes_3.jpg","../image/image_23/23_St_Avit_Tardes_4.jpg","../image/image_23/23_St_Avit_Tardes_5.jpg"]},"Consult_chateau_formulairea762":{"id":"Consult_chateau_formulairea762","dept":"23","canton":"Dun le Palestel","commune":"Saint-Germain-Beaupré","nom":"St_Germain_ Beaupré","type":"Château","periode":"XVI","histoire":"ST-GERMAIN,  bâti à Saint Germain-Beaupré, de style Renaissance a été édifié au XVIe siècle, à l'emplacement d'une ancienne forteresse datant du XIIe siècle  pour Gabriel Foucault, seigneur de Saint-Germain-Beaupré. Sa construction a débuté au XVIe siècle et fut achevée à XVIIe siècle. Il appartenait à la famille Foucault de Saint Germain-Beaupré. En 1768, Anne-Françoise Foucault de Saint-Germain-Beaupré va cèder son château à Anne-Nicolas Doublet, marquis de Persan, maître
