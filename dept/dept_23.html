e_Billon","commune":"Saint-Sulpice le Quérétois","type":"Château","img":"../image/image_23/23_Villatte_Billon_1.jpg"},{"id":"Consult_chateau_formulaire17ee-2","nom":"Villefort","commune":"Sainte-Feyre la montagne","type":"Château","img":"../image/image_23/23_Villefort_1.jpg"},{"id":"Consult_chateau_formulaire40c8","nom":"Villemonteix_Orgnat","commune":"Saint-Pardoux-les Cards","type":"Forteresse","img":"../image/image_23/23_Villemonteix_Orgnat_1.jpg"},{"id":"Consult_chateau_formulairea5da","nom":"Voreille","commune":"Peyrat les Nonières","type":"Château","img":"../image/image_23/23_Voreille_1.jpg"}];const FULL={"Consult_chateau_formulaire49c1":{"id":"Consult_chateau_formulaire49c1","dept":"23","canton":"Ahun","commune":"Ahun","nom":"Ahun_Chezotte","type":"Château","periode":"XV-XX","histoire":"A Ahun, le château de Chantemille (Voir article suivant), de Chezotte de Messenon (Voir article ) et plus au sud le château de Chambéraud gravure mais pas d'historique.                             AHUN, CHAUSSADIS; en 1921, Alphonse Defumade, président du conseil général de la Creuse, fit donation au département dun ensemble foncier de 145 hectares comprenant un château et des terres agricoles. Cette donation était consentie à la condition express  quune école dagriculture soit édifiée sur le domaine. Sur le plan architectural, lécole dagriculture de Neuvic dUssel servit de source dinspiration. Outre le bâtiment scolaire, un pavillon et des ateliers furent ajoutés. Les portes de lécole dagriculture dAhun ouvrirent en octobre 1925. En 1956, un arrêté du ministère de lagriculture annonça la transformation de lécole pratique dagriculture dAhun en école régionale dagriculture qui allait dorénavant délivrer le diplôme national du second degré, à lissue de 3 années de formation. La demeure dite de Louis du XXe siècle gîtes de france. Selon les vux et le testament du sénateur Alphonse Defumade, son château fut affecté à la formation des filles dagriculteurs :            CHEZOTTE, en 1569,  a pour seigneur Martial Lesvesque ! Jean-Paul Audier, seigneur de la Cassière, en devient propriétaire en 1582. La famille Audier en gardera la possession  jusqu'en 1630, date à laquelle Simphorien d'Arfeuille épouse Aymée Audier, fille de Jean-Paul Audier, seigneur de La Chezotte. Ce même Simphorien d'Arfeuille devait avoir pris possession du domaine puisqu'en 1640, il signe un bail de fermage à un dénommé Moynard sur une partie des terres de La Chezotte.","architecture":"CHEZOTTE, un des exemples restés complets de maison-forte du XVe siècle dans la Marche. Entre deux tours rondes a été bâtie une tour carrée portant, à son sommet, une bretèche soutenue par trois corbeaux. Deux autres bretèches, posées sur deux corbeaux, existent sur la tour circulaire nord-est. Le chemin de ronde aux mâchicoulis posés sur corbeaux profilés, entre deux quart de rond d'un cavet dégagé par des filets, est interrompu entre les deux tours rondes. Sur la façade opposée, la tour carrée, d'une hauteur supérieur au bâtiment principal, a son chemin de ronde à mi-hauteur du toit de ce dernier. Certaines des ouvertures primitives ont été remplacées par des baies plus vastes.  L'ensemble est entouré de douves en eau ayant conservé leur tracé primitif, ces douves sont franchies par un pont précédé d'un pavillon porche fortifié, ouvrant par un portail et une porte chanfreinés surmontés d'une rangée de corbeaux. Ce portail, mouluré d'un cavet, est surmonté d'un chemin de ronde porté sur une rangée de corbeaux et percé de créneaux et de petites bouches à feu circulaires ouvrant sur une galerie. Dans l'angle intérieur formé par ce portail et le pavillon, se trouve une construction dont le caractère défensif est attesté par la présence de plusieurs bouches à feu. A l'intérieur, se trouvent six cheminées en pierre dont une ornée de sculptures.","habitants":"Ahun,sénateur Alphonse Defumade                        Chezotte  Jehan l'Evesque                           \r\n        \r\n        \r\n        \"","divers":"Chaussadis grav  1-2 Chezotte grav 3-4-5 Maison de Louis grav 6 Chezotte : 46° 05' 19\" Nord et 2° 00' 49\" Est","gps":"","images":["../image/image_23/23_Ahun_Chezotte_1.jpg","../image/image_23/23_Ahun_Chezotte_2.jpg","../image/image_23/23_Ahun_Chezotte_3.jpg","../image/image_23/23_Ahun_Chezotte_4.jpg","../image/image_23/23_Ahun_Chezotte_5.jpg","../image/image_23/23_Ahun_Chezotte_6.jpg"]},"Consult_chateau_formulaire7128":{"id":"Consult_chateau_formulaire7128","dept":"23","canton":"Ahun","commune":"Ahun","nom":"Ahun_II","type":"Château","periode":"XV-XVI","histoire":"A Ahun CHANTEMILLE,  il appartenait à Bospon II. Le château de Chantemille actuel a été construit en 1470 sur un ancien site fortifié datant du Xe siècle qui appartenait aux chevaliers de Chantemille. Il changera de mains, plusieurs fois, par des mariages, dans plusieurs familles de chevaliers dont les La Chapelle Taillefer, les Le Fort des Ternes, Pierre Buffière et aussi un neveu de Grégoire XI, Guillaume de Besse. Le bâtiment actuel a été construit pour Louis du Puy sénéchal de la Marche et resta dans cette famille pendant 5 générations avant de passer par mariage à Louis Chasteigner de La Rocheposay, gouverneur de la Marche. Il fut vendu pour la première fois en 1609 à la famille Mérigot de Sainte Feyre qui le conservera jusqu'en 1845.   Scaliger y séjourna.\r\nMASSENON  Il date du XVe siècle. Son premier propriétaire était Mathurin Barton de Montbas, a été construit en 1482, avec la permission de Pierre de Bourbon, comte de la Marche, pour Mathurin Barton de Montbas, seigneur du château de la Roche-Nozil. La famille Barton a été propriétaire du château jusqu'à la Révolution Française.","architecture":"CHANTEMILLE, l'emplacement du château permettait de contrôler le passage de la Creuse.   Corps de logis flanqué de tours d'angles rondes et d'une tour d'escalier carrée,  le tout couronné d'un chemin de ronde, fut accolée postérieurement une aile en retour d'équerre.                                                                        MASSENON, il date du XVe siècle, sa construction a débuté au XVe siècle et s'est achevée au XVIe siècle, il  est précédé par un porche fortifié couronné de mâchicoulis, est flanqué de deux tours rondes aux angles et dune tour carrée descalier couronnée de mâchicoulis. Un vaste bâtiment du XVIIIe siècle se greffe au château du XVe siècle. On peut remarquer aussi la présence dun pigeonnier.","habitants":"Chantemille, famille de Louis du Puy.                         Massenon Famille Barton de Montbas\r\n        \r\n        \"","divers":"Chantemille GPS : 46° 06' 37\" Nord et 2° 02' 30\" Est Grav 1-2-3                                                                Massenon   GPS : 46° 03' 41\" Nord, 2° 02' 14\" Est  Grav 4-5","gps":"46° 06' 37\" Nord et 2° 02' 30\" Est Grav 1-2-3","images":["../image/image_23/23_Ahun_II_1.jpg","../image/image_23/23_Ahun_II_2.jpg","../image/image_23/23_Ahun_II_3.jpg","../image/image_23/23_Ahun_II_4.jpg","../image/image_23/23_Ahun_II_5.jpg"]},"Consult_chateau_formulaire3c1c":{"id":"Consult_chateau_formulaire3c1c","dept":"23","canton":"Felletin","commune":"Felletin","nom":"Arfeuille","type":"Château","periode":"XV","histoire":"A Felletin, le château d'Arfeuille, celui de Chatain (voir article) et de la Faye. Et à cinq km à l'est à St-Frion le maison forte de Bas Bouteix.                             ARFEUILLE, date du XVe siècle, construit par la famille Mourins d'Arfeuille, il est à ce jour, l'un des 5 derniers châteaux français, à avoir été transmis de père en fils, dans la famille du même nom depuis sa construction. Il est issu de Jean Mourins d'Arfeuille, qui sauva de la mort, le roi Philippe Le Bel, lors de la bataille de Mons en Puelle, le 18 août 1304,  le 26 novembre 1791, Yves Mourins d'Arfeuille émigre avec son jeune fils Victorin. En 1792, ils rejoignent la coalition des gentilshommes d'Auvergne et se mettent sous les ordres du frère de Louis XVI. Quatre cardinaux d'Arfeuille ont vécu au XIVe siècle sous la papauté à Avignon. À la Révolution, Yves d'Arfeuille émigra et combattit sous les ordres des frères du roi Louis XVI. Il ne rentrera en France qu'en 1809.  En mars 1793, avec les troupes du duc de Condé, Yves Mourins prend les armes contre la jeune République française. Le comité de surveillance de Felletin fait alors emprisonner Mayeule, son épouse, et Adélaïde, sa fille, dans la pièce située au rez-de-chaussée de la tour ronde du château. Ensuite, tous les biens de la famille Mourins sont confisqués. Il appartient toujours à la famille d'Arfeuille.","architecture":"ARFEUILLE, du XVe siècle, excepté pour une aile et le parc créés 3 siècles plus tard. Le donjon qui a perdu son chemin de ronde et ses mâchicoulis, actuellement la Mairie de Felletin Henriette de Duras, érudite et passionnée de sciences, finança de nombreuses sociétés savantes et réunit dans son salon tous les notables de la région. Edifice  en forme de T avec une tour carrée toit à quatre pans sur mâchicoulis, le corps de logis à deux niveaux  avec série de lucarnes  sur comble en tuile, accolée dans le prolongement d'une tour ronde toit en poivrière.                                           BAS-BOUTEIX, date de 1362. Maison rurale de nobles felletinois du début du XVIIe siècle, remaniée aux XIXe et  XXe siècles, avant-corps de 1900,  corps de logis barlong avec tours et tourelles en encorbellement aux angles, et escalier droit central dans oeuvre. Des éléments défensifs, mâchicoulis et meurtrières à mousqueterie servaient contre les attaques de petits groupes armés et les troubles dus aux guerres de religion, qui persistèrent jusqu'en 1640 en Bas Limousin. L'intérieur est divisé en deux pièces principales, de chaque côté d'un escalier tournant à deux volées droites avec repos et palier.                CHATAIN à Arfeuille  le château date du XIIe siècle, il a été largement remanié au XVe et XVIIIe siècle. Il sert de maison de repos pour personnes âgées. Il a été la résidence dété des princes Galitzine. Il subsiste une cheminée de lépoque Loubens de Verdalle et une autre de la période des princes Galitzine","habitants":"Famille Mourins d'Arfeuille\r\n        \r\n        \"","divers":"Arfeuille GPS : 45° 52' 56\" Nord et 2° 12\" 23\" Est   grav -1-2-3-4                                                                Bas-Bouteix grav 5-6                                                     Chatain grav 7-8","gps":"45° 52' 56\" Nord et 2° 12\" 23\" Est   grav -1-2-3-4","images":["../image/image_23/23_Arfeuille_1.jpg","../image/image_23/23_Arfeuille_2.jpg","../image/image_23/23_Arfeuille_3.jpg","../image/image_23/23_Arfeuille_4.jpg","../image/image_23/23_Arfeuille_5.jpg","../image/image_23/23_Arfeuille_6.jpg","../image/image_23/23_Arfeuille_7.jpg","../image/image_23/23_Arfeuille_8.jpg"]},"Consult_chateau_formulairea400":{"id":"Consult_chateau_formulairea400","dept":"23","canton":"Aubusson","commune":"Aubusson","nom":"Aubusson_Chapitre","type":"vestiges","periode":"XI-XIII","histoire":"AUBUSSON,  on peut admirer les ruines imposantes du château des Vicomtes d'Aubusson, appelé aussi Le Chapitre dont l'entretien demeure un véritable problème en raison d'un coût important.  De la fin du IXe siècle au XIIIe siècle, le patronyme d'Aubusson est celui des vicomtes d'Aubusson, l'une des branches de la maison de Limoges. Au XIIIe siècle, la vicomté d'Aubusson passe entre les mains de la maison de Lusignan dont étaient issus les comtes de la Marche. À partir du XVIe siècle, ce sont des membres de la famille royale qui porteront le titre de comte de la Marche. Depuis le Moyen-Âge, dans toutes les communes du département, beaucoup d'hommes allaient tous les ans dans les grandes villes, sur les chantiers du bâtiment, pour se faire embaucher comme maçon, charpentier, couvreur... C'est ainsi que les maçons de la Creuse (terme récent, le département de la Creuse étant issu de la Révolution) devinrent bâtisseurs de Cathédrales. En 1624, ils construisirent la digue de La Rochelle. Au XIXe siècle, ils participèrent à la construction du Paris du baron Haussmann. On retrouve dans le livre de Martin Nadaud, Mémoires de Léonard, la description de cet exode qui marqua fortement les modes de vie.","architecture":"Aubusson dit aussi le CHAPITRE,  bâti à Aubusson. Il ne reste, que des ruines imposantes aujourd'hui. Le site du Chapitre permet d'avoir un très beau point de vue sur la ville d'Aubusson. Il fut construit entre le Xe et le XIIIe siècles par les vicomtes d'Aubusson et était l'un des plus remarquables château fort du Moyen-Age. La forteresse était protégée par une enceinte ovale, cinq tours rondes et un pont-levis qui enjambait un large fossé. Sur ordre de Richelieu, et afin d'enlever aux Huguenots tout moyen de résistance, le château fut détruit en 1632. Ses pierres servirent à constuire une partie des maisons d'Aubusson ainsi que le pont de la Terrade. Il ne reste aujourd'hui qu'un pan de donjon rectangulaire, la muraille attenante et la base de la tour carrée du XIIIe siècle. Accès libre aux ruines du château, est inscrit aux M.H. depuis 1964. \r\nPATRIMOINE;  TOUR DE L'HORLOGE   Autrefois appelée « Tour blanche », en raison de lenduit de chaux dont elle était couverte, la Tour de lHorloge est un vestige des anciennes fortifications de la ville. Lensemble se composait de tours, de poternes et de portes, qui ont été détruites au XVIIIe siècle, au cours dun plan de modernisation de la ville.\r\nLa tour est bâtie selon un plan circulaire. Son toit en poivrière, cest-à-dire en forme de cône, est couvert en bardeaux de châtaigner taillés en pointe à la bordure.","habitants":"Vicomtes d'Aubusson\r\n        \r\n        \"","divers":"Patrimoine gra-5 et l'horloge grav 6                            Aubusson GPS : 45° 57' 23\" Nord et 2° 10' 18\" Est     Chapitre GPS : 45° 57' 25\" Nord et 2° 10' 06\" Est     Fort d'Aubusson grav 1-2-3","gps":"45° 57' 23\" Nord et 2° 10' 18\" Est     Chapitre GPS : 45° 57","images":["../image/image_23/23_Aubusson_Chapitre_1.jpg","../image/image_23/23_Aubusson_Chapitre_2.jpg","../image/image_23/23_Aubusson_Chapitre_3.jpg","../image/image_23/23_Aubusson_Chapitre_4.jpg","../image/image_23/23_Aubusson_Chapitre_5.jpg"]},"Consult_chateau_formulaire9993":{"id":"Consult_chateau_formulaire9993","dept":"23","canton":"Aubusson","commune":"Aubusson","nom":"Aubusson_chateaux","type":"Château","periode":"XVI-XVIII","histoire":"A Chabassière le château de La Foret pas d'info,  Sallendrouze,   Grand Siècle de ce qui fut la demeure du plus grand manufacturier d'Aubusson. St-Jean, Séglières et de Rozier du XVIe siècle.  Divers manoir, pas d'information historique, pour ces châteaux.           CHABASSIERE vient de partir en fumée.    Alfred Roseleur, chimiste, doreur et argenteur, est aussi très connu dans les milieux colombophiles ou postaux à cause des \"ballons de Gravilliers\", ballons quil envoyait journellement à son épouse restée à Aubusson dans leur chateau de Chabassière. Alfred était en effet resté enfermé dans Paris lors du siège de la Capitale en 1870. Dans la cour,  il y a un bien curieux colombier.                                                        SAINT-JEAN, sur lemplacement dun ancien château de 1780 dont ne subsiste que le portail dentrée, en 1818, est un ancien logement patronal de la famille Sallandrouze;   Charles Sallandrouze a bâti en 1902 la demeure appelée « Château Saint Jean ». Après un incendie survenu en 1914, les toitures sont modifiées. Sur le pavillon central, le pignon surmonté dun clocheton a été remplacé par une queue de geai, lui conférant un style villégiature plus prononcé.\r\nSALLENDROUZE, nouvel hôtel à Aubusson, est le lieu de rendez-vous le plus cosmopolite du département. Propriété dune famille de Sud Africains originaires du Cap tombés amoureux de la Creuse lors dun séjour en Limousin, il a ouvert ses portes à la clientèle début août, restauré par larchitecte Wynand Wilsenach, du Cap.  Le nouveau propriétaire, Jean Dingreville,","architecture":"CHABASSIERE  Le château est très délabré. Il y a peu dinformation sur ce domaine, car il y a beaucoup de bâtiments en ruines autour. \r\n SAINT-JEAN, ce bâtiment de style éclectique porte linfluence de lArt Nouveau. Aucune symétrie, la façade sanime de jeux de pleins et de vides, comme si la paroi prenait vie. Le château produit une grande impression de liberté : les toitures sétagent avec des formes variées, aucune fenêtre nest identique ; les lucarnes ont des dessins différents. Lédifice sinspire également de larchitecture locale, doù la présence dune tourelle en surplomb. Il intègre aussi des références à larchitecture fortifiée, est aujourdhui devenu maison de retraite. Pour cela, il a été doté dune nouvelle aile et dune salle de restaurant. En contrebas du château, un parc avait été aménagé selon les désirs de Charles Sallandrouze. Il appartient désormais à la municipalité et a été transformé en roseraie.        .","habitants":"Famille Sallandrouze \r\n        \r\n        \"","divers":"Aubusson GPS : 45° 57' 23\" Nord et 2° 10' 18\" Est  Châteaux de st Jean grav 1-2,                                       de Foret grav 3, de Rozier grav 4,                                   de Chabassière grav 5                                          Sallendrouse grav-6-7                                                    de Séglières grav 8-9","gps":"45° 57' 23\" Nord et 2° 10' 18\" Est  Châteaux de st Jean grav","images":["../image/image_23/23_Aubusson_Chateaux_1.jpg","../image/image_23/23_Aubusson_Chateaux_2.jpg","../image/image_23/23_Aubusson_Chateaux_3.jpg","../image/image_23/23_Aubusson_Chateaux_4.jpg","../image/image_23/23_Aubusson_Chateaux_5.jpg","../image/image_23/23_Aubusson_Chateaux_6.jpg","../image/image_23/23_Aubusson_Chateaux_7.jpg","../image/image_23/23_Aubusson_Chateaux_8.jpg","../image/image_23/23_Aubusson_Chateaux_9.jpg"]},"Consult_chateau_formulairecd76":{"id":"Consult_chateau_formulairecd76","dept":"23","canton":"Felletin","commune":"La Noaille","nom":"Banizette","type":"Château","periode":"XV-XVII","histoire":"BANIZETTE, au XVe Jean Antoine de Bonneval, seigneur de Banizette et époux de Catherine Gabrielle de Lestrange, n'a pas d'enfants. Il fait alors don de tous ses biens à son neveu Guy de Lestrange. Ce dernier devient ainsi seigneur de Banizette, en plus d'être seigneur de Mareuges, Monvert, Magnac et Durat. sa fille cadette Françoise épouse François de la Mothe écuyer Sinon, le neveu fait gentilhomme de Louis XII, puis de François Ier  appartenait, en 1626, à Léonard Rousseau, fils d'un notaire.  Transmis par alliance à la famille des Miomandre, anoblie en 1638 . Au XVIIIe siècle, Joseph de Miomandre d'Espies, marquis de Châteauneuf-la-Fôret, est seigneur de Banizette, mais également un des gardes du corps de Louis XVI. Au cours d'une émeute, en octobre 1789, ses collègues de travail et lui sauvent la vie à Marie-Antoinette. Quelques mois plus tard, chassés par la Révolution, les membres de la famille Miomandre de Loubard se réfugient en  Belgique. En 1776 le domaine est la seigneurie sont acquis par un bourgeois de Felletin Joseph-Tixier-Dubreuil, après avoir connu divers propriétaires au XIXe siècle le domaine est acquis e n 1901, par Victor Barbin, avocat au Barreau de Paris aieul de François-Robert Gorsse, depuis, est resté dans  la descendance  de la famille.","architecture":"BANIZETTE, le domaine de Banizette est un manoir bâti  au XVIe siècle à la Nouaille, agrandi au XVIIe siècle et XVIIIe siècle, qualifié de lieu noble au début du XVIIe siècle,  le château de Banizette faisait partie de ces petites seigneuries rurales de la Marche, parfois limitées à un village, que des bourgeois et des officiers de l'administration comtale ou royale avaient constituées en acquérant des fractions de droits fonciers ou de justice. Il est représentatif des grandes exploitations agricoles de la région Limousine. Il comporte 7 bâtiments implantés à la périphérie de la cour rectangulaire, où ils s'ouvrent. Le domaine de Banizette est inscrit aux M.H. le 8.10.1992.  D'autres éléments sont inscrits à l'inventaire supplémentaire des M.H.  dont les 2 pavillons du jardin, la cour, le jardin, le bief du moulin, le pont et le puits. Il est ouvert au public et se visite sur RV.","habitants":"Famille de Miomandre\r\n        \r\n        \"","divers":"Bazinette GPS : 45° 51' 59,7\" Nord, 2° 4' 8,4\" Est","gps":"45° 51' 59,7\" Nord, 2° 4' 8,4\" Est","images":["../image/image_23/23_Banizette_1.jpg","../image/image_23/23_Banizette_2.jpg","../image/image_23/23_Banizette_3.jpg","../image/image_23/23_Banizette_4.jpg","../image/image_23/23_Banizette_5.jpg","../image/image_23/23_Banizette_6.jpg","../image/image_23/23_Banizette_7.jpg"]},"Consult_chateau_formulairea499":{"id":"Consult_chateau_formulairea499","dept":"23","canton":"Felletin","commune":"St-Yreix les Bois","nom":"Beaumont_Creuse","type":"Château","periode":"XV","histoire":"BEAUMONT, le fief de Beaumont  appartenait au XVe siècle à Jean de la Seiglière. Damoiseau, il était seigneur de Beaumont. Dès la fin du XVIe siècle et jusquau XVIIIe siècle, les membres de la famille de la Seiglière ont été vice-sénéchaux de la Marche. Le château passa ensuite à la famille Rougier. Ceux-ci étaient seigneurs de Beaumont, la Valette, de Fayolle.... Pierre Rougier, seigneur de Beaumont épousa Claude Fayolle en 1605. Jean Pardoux Rougier fut docteur en médecine en 1600. Jean Rougier seigneur de Beaumont épousa Gabrielle Midre en 1653. Il fut capitaine de la milice bourgeoise de Guéret en 1696.","architecture":"BEAUMONT, ce château est mentionné avant 1452.  se compose dun corps de logis en retour déquerre, qui est flanqué dune tour carrée descalier, coiffée dun lanternon. deux tours circulaires de taille inégales flanquent la façade Est. Lune dentre elles a conservé son chemin de ronde sur mâchicoulis et ses archères. Un bâtiment en accolade a été ajouté au XVIIe siècle.","habitants":"Famille Jean de la Seiglière\r\n        \r\n        \"","divers":"Beaumont 94480280,46.1079879","gps":"","images":["../image/image_23/23_Beaumont_Creuse_1.jpg","../image/image_23/23_Beaumont_Creuse_2.jpg","../image/image_23/23_Beaumont_Creuse_3.jpg","../image/image_23/23_Beaumont_Creuse_4.jpg"]},"Consult_chateau_formulaire7943":{"id":"Consult_chateau_formulaire7943","dept":"23","canton":"Evaux les Bains","commune":"St-Priest-Creuse","nom":"Beauregard_Creuse","type":"Maison forte","periode":"XVII","histoire":"BEAUREGARD, le château de Beauregard est un château bâti à Saint-Priest en Creuse, date des XVIIe et XVIIIe siècles. Il fut remanié au XIXe siècle. En 1770, il était habité par le marquis de Lentilhac. Puis en 1789, il appartenait à V.B. Grellet, député aux états généraux puis au baron de Baillet. Aux XIXe et XXe siècles, Beauregard possédait un équipage de chasse à courre. En 1917, le baron de Baillet était le seul habitant de la commune à être abonné au téléphone.","architecture":"BEAUREGARD,  date des XVIIe et XVIIIe siècles et a été remanié au XIXe siècle. De plan en U  à deux niveaux toit en deux pans accolés en angle de la façade de droite d'une tour octogonale.","habitants":"Marquis de Lentilhac\r\n        \r\n        \"","divers":"Beauregard GPS : 46° 05' 20\" Nord et 2° 20' 39\" Est","gps":"46° 05' 20\" Nord et 2° 20' 39\" Est","images":["../image/image_23/23_Beauregard_Creuse_1.jpg"]},"Consult_chateau_formulairee57f":{"id":"Consult_chateau_formulairee57f","dept":"23","canton":"Bonnat","commune":"Bonnat","nom":"Beauvais_Bonnat","type":"Château","periode":"XV","histoire":"BEAUVAIS,   ce fief a appartenu à la famille dAygurande, en Berry, de 1438 à 1718. En 1651, le château appartenait à Gilberte de la Court. Son fils François dAygurande était, écuyer, seigneur de Beauvais. En 1659, le fief était en possession de Charlotte de Saint-Maur. En 1770 le château passa à la famille de Saint-julien, dont Gilbert était baron de Saint-Vaury, vicomte de Bernage. Jeanne Bertrand dame de Beauvais, porta la baronnie à Etienne de la Celle. Celui-ci la donna à son neveu Valéry dArgier baron de Saint-Vaury, Malval, vicomte de Bernage. Cest Anne de Saint-Maur qui va régner sur Beauvais suite à un héritage. A la Révolution, son époux sexile, mais il revient en France pour rejoindre son épouse. Malheureusement, il est reconnu, puis arrêté et jugé à Guéret en qualité démigré revenu en France, il est déclaré coupable et guillotiné le 27 août 1793.","architecture":"BEAUVAIS  appelé aussi le château de Beauvais-les-Lions, car il possède deux sculptures antiques représentant des lions. \r\n Il nest pas visible de lextérieur, sauf en contrebas de lautre coté de la Creuse et de très loin, mais cest un ensemble de bâtiments remarquables avec un corps de logis en L avec une grosse tour, et deux plus petites aux angles. Le corps de logis est en retour déquerre flanqué de trois tours circulaires. Lune, à langle extérieur, donne sur une cour. Les deux autres sont placées à larrière du bâtiment.  Les façades recouvertes de lierre, sont ouvertes, sur lune des façades, dune galerie darcades. Cette ancienne dépendance du château de Malval possède encore un souterrain les reliant, visible de lextérieur.","habitants":"Famille dAygurande\r\n        \r\n        \"","divers":"Beauvais 46° 19' 43? nord, 1° 54' 20? est","gps":"","images":["../image/image_23/23_Beauvais_Bonnat_1.jpg","../image/image_23/23_Beauvais_Bonnat_2.jpg","../image/image_23/23_Beauvais_Bonnat_3.jpg","../image/image_23/23_Beauvais_Bonnat_4.jpg"]},"Consult_chateau_formulairea6d5":{"id":"Consult_chateau_formulairea6d5","dept":"23","canton":"Boussac","commune":"Soumans","nom":"Bellefaye","type":"Château","periode":"XV","histoire":"BELLEFAYE, était une cure qui avait pour patron l'apôtre Saint-André. L'abbé du Bourg-Dieu y nommait le curé en 1481, 1482. Ce fut le prévôt d'Evaux qui fit cette nomination en 1647, et enfin l'évéque de Limoges en 1698.  N... Beaufils fut nommé curé de Bellefaye en 1749. N... Desbordes en 1765.  Guillaume Crosnier, bachelier en théologie, en 1770 .  Claude-Pierre Bozon en 1786; il prêta d'abord le serment de la constitution civile du clergé en faisant quelques réserves, ce qui  lui permit de rester avec ses paroissiens; mais sous le Directoire  il fut arrêté et conduit à l'ile de Ré pour être déporté à Cayenne;  il fut du nombre de ceux qu'on ne put pas faire partir.\r\nIl y avait dans cette paroisse un hôpital fondé par Jean Dupuy baron  de Bellefaye, mort le 26 août 1513.\r\nLa commune de Bellefaye a existé jusqu'au 20 mai 1829, qu'une ordonnance la réunit à celle de Soumans. \r\nEn 1770 le château de Bellefaye appartenait à M. de Caze.","architecture":"BELLEFAYE est un château bâti à Soumans, se visite, en extérieurs, durant les Journées du Patrimoine. Il est composé dun corps de logis en L, à trois niveaux série de lucarnes en comble sur cour intérieure flanqué de 3 tours rondes et une autre isolée, toit en poivrière.","habitants":"Monsieur de Caze\r\n        \r\n        \"","divers":"Bellefaye  GPS : 46° 18' 07\" Nord, 2° 18' 27\" Est","gps":"46° 18' 07\" Nord, 2° 18' 27\" Est","images":["../image/image_23/23_Bellefaye_1.jpg","../image/image_23/23_Bellefaye_2.jpg","../image/image_23/23_Bellefaye_3.jpg","../image/image_23/23_Bellefaye_4.jpg"]},"Consult_chateau_formulaire93ab":{"id":"Consult_chateau_formulaire93ab","dept":"23","canton":"Aubusson","commune":"Blessac","nom":"Blessac","type":"Château-Prieuré","periode":"XVI","histoire":"BLESSAC,  avait un prieuré de filles de lordre de Fontevraud, sa fête était lAssomption de la sainte Vierge. La prieure était élective et triennale. Ramnulphe Ille du nom, Vicomte dAubusson donna, en 1049, la terre de Blessac à sa fille qui y était supérieure dune maison de lordre de saint Benoît. Au commencement du XIIe siècle, Raymond IV du nom, Vicomte dAubusson, remplaça ces religieuses par des moines de Saint-Augustin. Mais sa mère, alors prieure de Tusson, vint le voir et obtint de lui et des moines, que la communauté de Blessac accepta les modifications apportées par le bienheureux Robert à la règle de Saint-Augustin et se donnât à Fontvraud. Il prit lui-même lhabit de Fontevraud en 1120. Cette communauté dhommes fut ensuite supprimée, et les religieuses fontevristes sy sont consacrées jusquau moment de la Révolution à linstruction et à léducation des jeunes filles.\r\n  Honoré Martinon (1854-1947), député de la Creuse de 1889 à 1898, né et mort au château de Blessac.","architecture":"BLESSAC Il reste encore quelques bâtiments du prieuré; ils datent des XVIe et XVIIe siècles, composé de deux  bâtiments rectangulaires positionnés en équerre à quatre niveaux toit en croupe, tour ronde sur l'extérieur.","habitants":"Vicomte dAubusson\r\n        \r\n        \"","divers":"Blessac 12711495,45.9576084","gps":"","images":["../image/image_23/23_Blessac_1.jpg","../image/image_23/23_Blessac_2.jpg","../image/image_23/23_Blessac_3.jpg","../image/image_23/23_Blessac_4.jpg","../image/image_23/23_Blessac_5.jpg","../image/image_23/23_Blessac_6.jpg"]},"Consult_chateau_formulaire1f58":{"id":"Consult_chateau_formulaire1f58","dept":"23","canton":"Gouzon","commune":"Pionnat","nom":"Bosgenet","type":"Château","periode":"XVIII","histoire":"BOSGENET, cette propriété de 17 hectares a été léguée en 1979 et se situe sur la commune de Pionnat. Elle comprend le château de Bosgenet, des prairies, un bois, trois étangs et l'annexe de Chassogne. On peut voir à l'intérieur une immense cheminée avec sa plaque aux armes de la famille Dissandes, longtemps propriétaire des lieux à la suite des Martin de Biencourt et des Lejeune de Fressanges.","architecture":"BOSGENET, édifice costruit en équerre à deux niveaux  flanqué de lucarnes en façades et cour intérieure, deux tours rondes aux angles de la façade toit en poivrières, pavillon saillant sur la droite du bâtiment et abrit  balconné de la porte d'entrée déporté  d'une  travée sur la gauche,  est devenu une maison pour enfants et adolescents de 6 à 21 ans confiés sur décision administrative ou ordonnance du juge des enfants. La maison denfants est habilitée par le département de la Creuse, elle est ouverte toute lannée.","habitants":"Famille Dissandes\r\n        \r\n        \"","divers":"Bosgenet 02584038,46.1815985","gps":"","images":["../image/image_23/23_Bosgenet_1.jpg","../image/image_23/23_Bosgenet_2.jpg","../image/image_23/23_Bosgenet_3.jpg","../image/image_23/23_Bosgenet_4.jpg"]},"Consult_chateau_formulaire8624":{"id":"Consult_chateau_formulaire8624","dept":"23","canton":"Bourganeuf","commune":"Bourganeuf","nom":"Bourganeuf","type":"Château","periode":"XII-XV-XVII","histoire":"A Bourganeuf la tour Zizim, Le château de la Chaume, le château de Mansat, le Mas de la Fille, le Verger , la Voie-Dieu.                                                          BOURGANEUF,  au coeur de la cité médiévale, bâtie au XIIe siècle par les chevaliers hospitaliers de l'Ordre de Saint-Jean de Jérusalem, s'élève la tour Zizim qui a été construite entre 1484 et 1486 pour accueillir, en résidence forcée le Prince Ottoman Djem Sultan Zizim.   En effet, il résida au château de Bourganeuf entre 1486 et 1489. Mais avant de 1484 à 1486, le prince réside dans le château de Bois-Lamy chez Guy de Blanchefort chargé de la construction de la tour Zizim de Bourganeuf. Donjon de l'ancien château de Bois-Lamy, qui appartint jadis à la famille de Blanchefort.  Au XVe siècle elle fut la prison du prince Djem, fils de l'empereur Ottoman Mehmet II. A deux kilomètres à l'Est à Mansat la Courière   le château  Mansat, acquis par Isembert alors abbé de saint-Martial de Limoges                                                       MAS DE LA FILLE, actuellement sous la direction de monsieur Laurent Fayette, qui a le statut de gérant, la société  est spécialisée dans la location et l'exploitation de terrains et d'immeubles non résidentiels.        MANSAT, à deux kilomètres à l'Est à Mansat la Courière,   le château  Mansat  acquis par Isembert alors abbé de Saint-Martial de Limoges.","architecture":"BOURGANEUF, la tour dite de Zizim  de forme ronde, elle présente sept étages voûtés. Les murs de la tour sont dune épaisseur de 2,80 mètres. Un escalier en colimaçon conduit aux 7 étages jusquau sommet de l'édifice coiffé d'une superbe charpente. La Tour Zizim est inscrite aux M.H. depuis 1911.  Donjon de l'ancien château de Bois-Lamy , \r\nLa tour Zizim de Bourganeuf est célèbre. Ces deux années denfermement dans ce lieu si retiré ont lieu pendant la construction de la tour Zizim de Bourganeuf.\r\nCétait un château ou lon accédait par un pont-levis. Il était édifiée sur un tertre quadrangulaire entouré de larges fossés alimentés en eau par un étang. Des quatre tours dalors, la seule encore existante, propriété privée, difficilement accessible au milieu de la forêt a fait lobjet récemment de travaux, notamment au niveau de la toiture. Les fossés existent encore.\r\nMANSAT, Il est constitué dun corps de logis bâti sur plan rectangulaire, flanqué aux angles de 2 tours rondes. Une tour carrée peut se voir sur la façade principale, un porche d'entrée des tourelles en encorbellement.","habitants":"le Prince Ottoman Djem Sultan Zizim\r\n        \r\n        \"","divers":"Bourganeuf   GPS : 45° 57' 14\" Nord 1° 45' 24\" Est Grav 1-2-3                                                              Mainsat grav 4-5                                                           la courière grav-6,                                              Chaume grav 7,                                                        Voie Dieu grav-8                                                        Mas la fille grav-9","gps":"45° 57' 14\" Nord 1° 45' 24\" Est Grav 1-2-3","images":["../image/image_23/23_Bourganeuf_1.jpg","../image/image_23/23_Bourganeuf_2.jpg","../image/image_23/23_Bourganeuf_3.jpg","../image/image_23/23_Bourganeuf_4.jpg","../image/image_23/23_Bourganeuf_5.jpg","../image/image_23/23_Bourganeuf_6.jpg","../image/image_23/23_Bourganeuf_7.jpg","../image/image_23/23_Bourganeuf_8.jpg","../image/image_23/23_Bourganeuf_9.jpg"]},"Consult_chateau_formulaire9f3e":{"id":"Consult_chateau_formulaire9f3e","dept":"23","canton":"Boussac","commune":"Boussac","nom":"Boussac_Creuse","type":"Forteresse","periode":"XV","histoire":"Plusieurs châteaux à Boussac dont je n'ai pas d'information, celui des Creusette chambres d'hôtes de  Louis Jansen et de Poissouze camping .       BOUSSAC, En 1255 par alliance passe à la famille de Brosse,  le neveu de Louis de Brosse,  Jean n'est autre que le célébre maréchal de Boussac , échangée par César de Bourbon à un membre de la famille de Loménie, puis vendue à un gentilhomme auvergnat, Jean De Rilhac, la seigneurie de Boussac demeurera dans la postérité de ce dernier jusqu'à la veille de la Révolution. Jean-Charles, vicomte de Carbonnières, fils de Françoise-Armande de Rilhac, est alors le propriétaire de la seigneurie et du château.  Vendu en 1833 à la municipalité de Boussac par Pauline de Carbonnières, fille de Charles Henri, devenue comtesse de Ribereix, racheté par le département, le château abrite, à partir de 1838, le siège de la sous-préfecture de Boussac. Cest Prosper Mérimée, lors d'une inspection dans la région, et George Sand qui y découvrent les six panneaux de « La Dame à la Licorne », célèbres tapisseries fabriquées dans les Flandres, aujourdhui pièces maîtresses du musée du Moyen-Âge à Paris. George Sand y réside à plusieurs reprises, notamment pendant une épidémie qui l'oblige à s'éloigner de Nohant et durant la guerre de 1870. Elle y écrit Journal d'un voyageur pendant la guerre. Puis, après 1926, une caserne de gendarmerie s'installe dans le château.  Le château est acquis en 1965 par M. et Mme Blondeau qui le restaurent et le meublent. M. Blondeau s'intéresse aussi à la tapisserie d'Aubusson. Il rachète la manufacture de Saint-Jean à Aubusson.","architecture":"BOUSSAC, reconstruit en 1420 à Boussac, date des XVe, XVIe et XVIIIe siècles, est classé aux M.H. depuis 1930. Construit sur un éperon rocheux, dans un site exceptionnel, il est bordé de vallées abruptes. Les traces de George Sand et de Pierre Leroux imprègnent encore ce lieu. Détruit plusieurs fois, le château de Boussac a été habité et fut superbement restauré, à partir de 1967. On peut visiter plusieurs salles du château de Boussac, ses salons et ses combles. Des expositions temporaires de tapisseries réalisées contemporains y sont abritées.  Très abîmé pendant la guerre de cent ans, Jean de Brosse (1375-1433), compagnon de Jeanne d'Arc (1412-1431) surnommé \"le maréchal de Boussac\", le restaura au début du XVe siècle.","habitants":"Famille de Brosse\r\n        \r\n        \"","divers":"Boussac   GPS : 46° 20' 53\",16 Nord et 2° 12' 39,96\" Est Grav 1 à 4,                                                            Creuzette grav 5,                                                        Poinsouze grav -6                                                           Leyrat grav-7","gps":"46° 20' 53\",16 Nord et 2° 12' 39,96\" Est Grav 1 à 4,","images":["../image/image_23/23_Boussac_Creuse_1.jpg","../image/image_23/23_Boussac_Creuse_2.jpg","../image/image_23/23_Boussac_Creuse_3.jpg","../image/image_23/23_Boussac_Creuse_4.jpg","../image/image_23/23_Boussac_Creuse_5.jpg","../image/image_23/23_Boussac_Creuse_6.jpg","../image/image_23/23_Boussac_Creuse_7.jpg"]},"Consult_chateau_formulaire4eaf":{"id":"Consult_chateau_formulaire4eaf","dept":"23","canton":"Felletin","commune":"St-Frion-Mas-Laurent","nom":"Bouteix_Croze","type":"Manoir","periode":"XVII","histoire":"A quelques Km à l'ouest de Saint-Frion le château de Croze  au Mas-Laurent.                                                  BAS-BOUTEIX, la plus ancienne mention du site date de 1362,  visible de l'extérieur, de la famille Roche     \r\nCROZE-MAS-LAURENT, au village du Mas Laurent, se trouve un château. Longtemps colonie de vacances de la RATP, il appartient désormais à des particuliers. Dans le parc de château est érigée une chapelle, inscrite sur la liste des M.H. depuis le 21/10/1932, cette chapelle date du XVe siècle  de  Saint-Antoine, du village de Saint-Antoine sur la commune de Saint-Frion (Creuse), elle a été remontée en 1886 dans le parc du château du Mas Laurent. En 1591, pendant les guerres de Religion. Les affrontements entre Ligueurs et Huguenots se succèdent dans la région limousine. Ainsi une bataille sanglante vient d'avoir lieu à Ahun, bataille au cours de laquelle le seigneur de Saint-Germain-Beaupré, chef des Huguenots, a été tué par les Ligueurs conduits par le sieur de Toirac. Ces derniers, après l'affrontement, se replient sur Croze et se réfugient  au château du Maslaurent, propriété de Toirac.  Le descendant des seigneurs du Maslaurent, Claude-Joseph-Alexandre marquis de Brachet et lieutenant général de la Marche, doit émigrer et ses biens lui sont confisqués. En 1793, la société populaire de Felletin fait démolir les tours du château, les bâtiments et les terres sont vendus à  Jean-Baptiste Guillon.","architecture":"BOUTEIX, la plus ancienne mention du site date de 1362. Maison rurale de nobles felletinois du début du XVIIe siècle, remaniée aux XIXe et XXe siècles, avant-corps de 1900. On y retrouve un plan commun à de nombreux  bâtiments de la région : corps de logis barlong avec tours et tourelles en encorbellement aux angles, et escalier droit central dans oeuvre. Des éléments défensifs  mâchicoulis et meurtrières à mousqueterie servaient contre les attaques de petits groupes armés et les troubles dus aux guerres de religion, qui persistèrent jusqu'en 1640 en Bas Limousin. L'intérieur est divisé en deux pièces principales, de chaque côté d'un escalier tournant à deux volées droites avec repos et palier. Il ne subsiste aucun élément de décor intérieur. Éléments protégés MH : les façades et les toitures du château : inscription par arrêté du 20 mai 1994.","habitants":"Famille Roche \r\n        \r\n        \"","divers":"Bas-Bouteix st-Frion 45° 51' 53? nord, 2° 13' 45? est  grav de1 à 3, Bouteix Croze  grav 5-6-7, Mas-Laurent-grav-8","gps":"","images":["../image/image_23/23_Bouteix_Croze_1.jpg","../image/image_23/23_Bouteix_Croze_2.jpg","../image/image_23/23_Bouteix_Croze_3.jpg","../image/image_23/23_Bouteix_Croze_4.jpg","../image/image_23/23_Bouteix_Croze_5.jpg","../image/image_23/23_Bouteix_Croze_6.jpg","../image/image_23/23_Bouteix_Croze_7.jpg","../image/image_23/23_Bouteix_Croze_8.jpg"]},"Consult_chateau_formulairebd10":{"id":"Consult_chateau_formulairebd10","dept":"23","canton":"La Souterraine","commune":"La Souterraine","nom":"Bridiers_Lezat","type":"Vestiges","periode":"XII","histoire":"BRIDIERS, bâti dans la commune de La Souterraine.  Au XVe siècle, le château appartient à Hugues de Chamborande. Ce personnage, accompagné du chef des gens d'armes Jean de Blanchefort, pillent et rançonnent les campagnes aux alentours. A la fin du XVe siècle, avec l'arrivée de la Renaissance, le vieux château fort n'est plus une résidence seigneuriale. Il n'est habité que par des soldats. A partir de 1758, Henriette Boucher, née De La Grange, fait réaliser plusieurs travaux d'entretien durant 15 ans. A la fin du XVIIIe siècle, le château appartient à Madame Rochechouart-Pontville. Vers 1790, réquisitionné par les révolutionnaires comme bien national, le château est vendu à un marchand qui le dépèce de ses pierres pour faire du profit. En 1794, \"la Citoyenne\"  Rochechouart-Pontville est guillotinée. Au XXe siècle, la commune achète la ruine qui est envahie par la végétation. Le chateau de Bridiers est mis en vente.\r\nLEZAT est un château bâti à La Souterraine. Sa construction date de 1901. C'est lancienne demeure de Francois Chenieux  (1845-1910), qui fut un médecin de grande renommée et un chirurgien de talent dont la clinique existe toujours à Limoges. Il a été l'ancien maire de Limoges. Le château de Lézat vous propose ses chambres d'hôtes. Sara et Serge feront de votre séjour au château Lézat un passage agréable de détente confortable.","architecture":"BRIDIERS,  sa tour est inscrite à l'inventaire supplémentaire des M.H.  Ses douves sont remplies d'eau. Il date du XVIe, XVIIe, et XIXe siècle. Le château des Bridiers date des XVe, XVIIe, et XIXe siècle. Entouré d'eau et d'un parc de 17 hectares,  Restauré, il s'étend sur près de 1500 m² et dispose de 20 pièces. Le chateau possède une vaste cuisine, une salle à manger immense, un salon orné de boiseries, une bibliothèque et un bureau,  le domaine possède des écuries, des granges, une maison de gardien, ainsi que deux lacs, situés en amont et en aval des douves.","habitants":"Famille de Hugues de Chamborande et Madame Rochechouart-Pontville\r\n        \r\n        \"","divers":"Bridiers  GPS : 46° 14' 32,38\" Nord et N 1° 30' 49,58\" Est   Vestiges grav 1 à 5                                              Lezat grav 6-7","gps":"46° 14' 32,38\" Nord et N 1° 30' 49,58\" Est   Vestiges grav 1","images":["../image/image_23/23_Bridiers_Lezat_1.jpg","../image/image_23/23_Bridiers_Lezat_2.jpg","../image/image_23/23_Bridiers_Lezat_3.jpg","../image/image_23/23_Bridiers_Lezat_4.jpg","../image/image_23/23_Bridiers_Lezat_5.jpg","../image/image_23/23_Bridiers_Lezat_6.jpg","../image/image_23/23_Bridiers_Lezat_7.jpg"]},"Consult_chateau_formulaireee10":{"id":"Consult_chateau_formulaireee10","dept":"23","canton":"La Souterraine","commune":"Noth","nom":"Cazines","type":"Château","periode":"XVI","histoire":"CAZINES,  bâti à Noth, c'est un château-hôtel-restaurant de renom.  Son propriétaire est Robin Barrasford concède que les travaux ont pris beaucoup de retard : \"Une partie de l'explication c'est qu'on a changé le projet, on s'est lancé dans un complexe beaucoup plus grand que ce qu'on envisageait à l'origine. On a dû faire toute la planification pour les 200 appartements, pour le spa, et pour le golf, installation qui devrait comporter 18 trous au lieu des 9 initialement annoncés.","architecture":"Manoir de Cazines, bâti au XVIe siècle, fut agrandi à la fin du XIXe siècle par l'adjonction d'une aile perpendiculaire à l'élévation,  de plan rectangulaire, corps de logis central de trois niveaux, sur  soubassement à sept travées avec lucarnes sur le tour du bâtiment, toit en croupes flanqué à droite comme à gauche de pavillon de même niveau, toit également en croupes l'ensemble recouvert  d'ardoises. Après 1900 la partie supérieure et la toiture de la tour rectangulaire Est, abritant l'escalier, ont été démolis, et vers 1922 un petit pavillon a été accolé contre le rez-de-chaussée, au niveau de la porte d'entrée.  En 1987, le manoir et le château ont été vendus et transformé en hôtel. A la même époque, des appartements ont été construits le long de la façade sud. Le pigeonnier subsiste mais les dépendances agricoles, sont mentionnées sur le cadastre de 1825.                                                        La FOT , plusieurs fermes isolées, construites aux alentours vers 1900 dépendaient également du château et participaient à l'économie du domaine. En 1987, le château et son domaine ont été vendus et le château a été transformé en hôtel.","habitants":"Robin Barrasford\r\n        \r\n        \r\n        \"","divers":"Cazine GPS : 46° 14' 08\" Nord, 1° 35' 12\" Est","gps":"46° 14' 08\" Nord, 1° 35' 12\" Est","images":["../image/image_23/23_Cazines_1.jpg","../image/image_23/23_Cazines_2.jpg","../image/image_23/23_Cazines_3.jpg","../image/image_23/23_Cazines_4.jpg"]},"Consult_chateau_formulaire86ee":{"id":"Consult_chateau_formulaire86ee","dept":"23","canton":"Evaux les Bains","commune":"Chambon sur Voueize","nom":"Chambon_Voueize","type":"Château","periode":"XII-XVI","histoire":"A Chambon sur Voueize le château Guillaume, le fort de Leyrat, de Marsat et de Villemoleix.                                                            GUILLAUME est un ancien château bâti à Chambon-sur-Voueize . Le fortin fut détruit au XIIe siècle. Le château Guillaume se situe sur les bords de la Tarde, en face du village de Thaury.\r\nVestiges du château-fort de LEYRAT est un château bâti à Chambon-sur-Voueize,  Les ruines du château fort de Leyrat, dit de Barbe-Bleue, sur un promontoire dominant les gorges de la Voueize, au nord de Chambon. Détruit à la fin du XIIe siècle, il est l'un des derniers édifices, représentatif du style de construction militaire, du Haut Moyen Age.                                 MARSAT, bâti à Chambon-sur-Voueize,. \r\nVILLEMOLEIX  Il y a peu dinformation sur ce château, il est privé et très peu visible de lextérieur, sa construction date du XVe siècle au XVIe siècle. Le colombier du château est inscrit par arrêté du 4 octobre 2010 (un peu visible).","architecture":"GUILLAUME, les vestiges de château-Guillaume, fortin détruit au XIIe siècle, situé sur les bords de la Tarde, en face du village de Thaury, corps de logis oblong entre tour ronde. LEYRAT,  le château que lon date des Xe et XIe siècles était ceint dun fossé. Les restes des murailles de pierre apparaissent derrière la végétation, en surplomb de la rivière. Au sujet de ce château, les légendes ont couru, nombreuses. Un souterrain menant à la Voueize aurait longtemps abrité le cadavre dun adepte de magie noire. Il en fallait peu alors pour que, progressivement, le château soit associé à la terrifiante figure de Barbe-Bleue. Il sagit des ruines du château fort de Leyrat dans les gorges de la rivière Voueize. Il sera très difficile de trouver le lieu exact et peu de ruines apparentes car fortement envahi par la végétation.  VILLEMOLEIX de plan en T avec deux  donjons gros pavillon toit à quatre pans  et celui de la façade crénelé.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Leyrat    GPS : 46° 11' 24\" Nord, 2° 25' 33\" Est    Grav 1-2                                                                     Marsat  GPS : 46° 11' 24\" Nord, 2° 25' 33\" Est grav 3-4                                                                               Guillaume  GPS : 46° 11' 24\" Nord, 2° 25' 33\" Est  Grav 5-6-7                                                                       Villemoleix Grav 8","gps":"46° 11' 24\" Nord, 2° 25' 33\" Est    Grav 1-2","images":["../image/image_23/23_Chambon_Voueize_1.jpg","../image/image_23/23_Chambon_Voueize_2.jpg","../image/image_23/23_Chambon_Voueize_3.jpg","../image/image_23/23_Chambon_Voueize_4.jpg","../image/image_23/23_Chambon_Voueize_5.jpg","../image/image_23/23_Chambon_Voueize_6.jpg","../image/image_23/23_Chambon_Voueize_7.jpg","../image/image_23/23_Chambon_Voueize_8.jpg"]},"Consult_chateau_formulaire064e":{"id":"Consult_chateau_formulaire064e","dept":"23","canton":"Le Grand-Bourg","commune":"Chamborand","nom":"Chamborand","type":"Vestiges","periode":"XII-XV","histoire":"CHAMBORAND, la famille de Chamborant est connue depuis Aymoin de Chamborant qui vivait au XIe siècle. Elle tire son nom du bourg  où elle avait son château, actuellement ruiné, et où elle vécut jusqu'au XVIe siècle. Parmi les personnages les plus célèbres de cette famille on note Humbert de Chamborant, tué à la bataille de Poitiers en 1356, et André-Claude, marquis de Chamborant, qui acheta en 1761 la charge de colonel du deuxième régiment de hussards, unité avec laquelle il fit les dernières campagnes de la guerre de Sept Ans. La maison de Chamborant s'est divisée en plusieurs branches : celle des seigneurs de Lavaud, éteinte en 1569, celle des seigneurs du Theret , éteinte au début du XVIIe siècle, celle des seigneurs de Droux, éteinte à la fin du XVIIIe siècle, celle des seigneurs de Perissat , éteinte au XIXe siècle et celle des seigneurs de La Clavière éteinte en 1805. La fille du dernier Chamborant de La Clavière épousa le baron de Belloc lequel fut autorisé en 1808 à joindre ses armes à celles des Chamborant. Leur fils obtint par décret impérial de 1864 l'autorisation d'ajouter à son patronyme celui de Chamborant. Les Belloc de Chamborant ont plusieurs descendants en 2008.","architecture":"CHAMBORAND bâti à Chamborand, fut pris et détruit au XIVe siècle, par les Anglais. Il fut reconstruit au XVe siècle, sur les ruines de l'ancien château. Le seigneur de la 1ère baronnie du Vicomté de Bridiers était le Baron de Chamborant. La Famille des Barons gardera le château jusqu'en 1566 puis sera vendu, eut plusieurs propriétaires, qui criblés de dettes, le laissèrent, pour finir comme carrière de pierres. Il ne reste que le donjon du château comme vestige, inscrit aux M.H. le 9.02.1939. Le donjon du château  est privé, fermé au Public.","habitants":"Famille de Chamborant \r\n        \r\n        \"","divers":"Chamborand GPS : 46° 9' 12,29\" Nord, 1° 34' 15,01\" Est","gps":"46° 9' 12,29\" Nord, 1° 34' 15,01\" Est","images":["../image/image_23/23_Chamborand_1.jpg","../image/image_23/23_Chamborand_2.jpg","../image/image_23/23_Chamborand_3.jpg"]},"Consult_chateau_formulaire9ba7":{"id":"Consult_chateau_formulaire9ba7","dept":"23","canton":"Aubusson","commune":"Champagnat","nom":"Champagnat","type":"Château","periode":"XIV","histoire":"Le BROUCHY, c'est Alphonse Puvis de Chavannes qui en ordonna la construction en 1851. C'est en ce lieu que Pierre Puvis de Chavannes réalisa en 1855 des fresques pour orner la salle à manger de son frère. Porté par mariage en 1897 à la famille de Truchis de Lays, leurs descendants résident encore dans cette belle demeure. Ce château, classé M.H. en 1992 (château, murs extérieurs des communs, fresques, toitures et parc), est une demeure privée, tout comme celui de la Croix d'Arrignat                                         PEYRUDETTE, La seigneurie  était dans la mouvance du comté de la Marche et dépendait de la châtellerie d'Aubusson. Elle possédait une justice seigneuriale. De 1380 jusqu'au 14/10/1786, la famille de Saint-Julien résida au château. Les éléments protégé par les M.H. sont les façades et toitures de l'ensemble des bâtiments, la fontaine, les murs de soutènement des terrasses. A l'intérieur du château , sont protégés la salle à manger et ses boiseries, la cheminée du salon qui sont inscrits aux M.H. depuis le 2/01/1989.","architecture":"BROUCHY, au centre d'un grand parc, la demeure de style néo-gothique est de plan quadrangulaire dont chacun des angles est marqué par la présence d'une fine échauguette coiffée d'une poivrière.       PEYRUDETTE,  l'origine de la construction du château, qui a remplacé l'édifice antérieur, remonte probablement à la fin du XVe siècle. A cette époque, le château devait se composer d'un corps de logis rectangulaire cantonné, à l'est, de deux tours rondes. Le porche, dont le linteau porte la date de 1480, la chapelle et les deux tours qui délimitent la cour, appartiennent à la même campagne d'édification. La demeure a été remaniée aux XVIIe, XVIIIe et XIXe siècles, au fur et à mesure, en habitation de plaisance. L'intérieur a été remanié depuis le XVIIe siècle, les pièces se distribuent le long d'un couloir longeant la façade sur cour. Des boiseries et des plafonds à poutrelles décorent les pièces. Le salon du rez-de-chaussée renferme une cheminée recouverte de boiseries sculptées du XIXe siècle, et décorées de guirlandes de fruits et de feuillages. La chapelle est voûtée d'ogives dont les nervures sont moulurées d'un tore et retombent sur des culots sculptés.","habitants":"Famille de Saint-Julien\r\n        \r\n        \"","divers":"Peyrudette  GPS : 46° 01' 10\" Nord, 2° 17' 03\" Est  Grav 1-2                                                                      Brouchy grav 3","gps":"46° 01' 10\" Nord, 2° 17' 03\" Est  Grav 1-2","images":["../image/image_23/23_Champagnat_1.jpg","../image/image_23/23_Champagnat_2.jpg","../image/image_23/23_Champagnat_3.jpg"]},"Consult_chateau_formulaire3840":{"id":"Consult_chateau_formulaire3840","dept":"23","canton":"Dun le Palestel","commune":"La Chapelle-Balloue","nom":"Chapelle_Baloue","type":"Château","periode":"XVI","histoire":"CHAPELLE-BALOUE, le château ou la « Grande Maison », propriété privée appartenant à la même famille depuis neuf générations, de la Révolution à nos jours. En 1828, Jean-Baptiste Beauvais (nom dun lieu-dit proche de La Souterraine), acquiert le château, et relève les bâtiments en ruine.  Son fils Jean Beauvais, continue à agrandir le domaine,  et dessine le parc. La fille de Jean, Henriette, épouse Maximilien Thouvenin en 1836. Ils agrandissent le domaine : De leur union naîtra Camille en 1840.  Camille se mariera en 1867 avec Mr Jautrou des Ormeaux, ils auront 3 filles : Camille, Suzanne et Marie.\r\nLe domaine reviendra à Suzanne, après un tirage au sort entre les trois filles. Après la première guerre mondiale, la propriété subit de profondes transformations. Suzanne dirige la propriété. Elle décède en 1954 ; ses enfants André et Fanny lui succèdent. André (1902-1973) va moderniser lexploitation et son épouse Colette installe les sanitaires à létage, restaure les salons puis les toitures des communs. En 1976, Denis et Gérard, les fils dAndré et de Colette, prennent la succession et sont les propriétaires actuels. Leurs enfants et petits-enfants jouissent de ce domaine quils espèrent préserver dans le respect des traditions familiales. le plus longtemps possible.","architecture":"La CHAPELLE-BALOUE château: une importante construction à 2 étages avec lucarnes sur combles en équerre est accolée à la partie ancienne, puis plus tard sont construites des remises, des écuries, formant une cour.","habitants":"Famille de Beauvais\r\n        \r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_23/23_Chapelle_Baloue_1.jpg","../image/image_23/23_Chapelle_Baloue_2.jpg"]},"Consult_chateau_formulaire66f3":{"id":"Consult_chateau_formulaire66f3","dept":"23","canton":"Auzances","commune":"Rougnat","nom":"Chateaubodeau","type":"Forteresse","periode":"XV","histoire":"ROUGNAT, CHATEAUBODEAU, en 1626 la Duchesse de Montpensier, dame du pays de Combrailles et d'Auzances, épousa Gaston de France, duc d'Orléans et frère du Roi Louis XIII. Auzances et Rougnat eurent, à partir de cette date, les princes d'Orléans comme seigneurs dominants. En 1693, le pays de Combrailles fut laissé, par testament, à Philippe Ie d'Orléans, fils de Louis XIII qui fut régent, à la mort de Louis XIV, pendant la minorité de Louis XV. À la fin du XVIIe siècle Gaspard de Ligondés, brigadier des armées du Roi et seigneur de Châteaubodeau avait des troupes casernées à Chateaubodeau. le château de Rougnat appelé château Bodeau,  est la propriété de Mme C. Dumont-van Dam, dont l'époux est José van Dam, chanteur vedette à l'opéra de Paris. Il a servi de cadre au film dAlain Corneau : Tous les matins du monde.    José Van Dam (né en 1940). L'un des plus grands chanteurs lyriques de sa génération (baryton-basse). Il a été propriétaire pendant plusieurs années du  Château-Bodeau.","architecture":"Le Château-Bodeau est du XVe siècle. Il a servi de cadre au film dAlain Corneau : Tous les matins du monde.   Peu de parties du château sont visibles de lextérieur.  La construction du château Bodeau date du XVe siècle. Il se trouve à proximité du village du Courtioux, au bord du Cher. Il reste encore une partie du mur denceinte, les mâchicoulis et le  pont-levis. A l'intérieur du Château Bodeau se trouve une splendide cheminée en bois, sculptée, qui daterait de 1650.  Dans le château se trouve une splendide cheminée en bois, sculptée vers 1650.","habitants":"la Duchesse de Montpensier                                        Mme Christiane Dumont-Van-Dam. \r\n        \r\n        \r\n        \"","divers":"Chateaubodeau               52971918,46.0632753    Rougnat  GPS : 46°3' 48,16\" Nord et 2°31'46,99\" Est","gps":"46°3' 48,16\" Nord et 2°31'46,99\" Est","images":["../image/image_23/23_Chateaubodeau_1.jpg","../image/image_23/23_Chateaubodeau_2.jpg","../image/image_23/23_Chateaubodeau_3.jpg","../image/image_23/23_Chateaubodeau_4.jpg","../image/image_23/23_Chateaubodeau_5.jpg","../image/image_23/23_Chateaubodeau_6.jpg"]},"Consult_chateau_formulaire456c":{"id":"Consult_chateau_formulaire456c","dept":"23","canton":"Evaux les Bains","commune":"Viersat","nom":"Chatel_Guyon","type":"Manoir","periode":"XV","histoire":"CHATEL-GUYON, la clinique a vu le jour dans les murs du château sous la présidence du docteur Guy Martinat, qui en fut le fondateur.  A un kilomètre au sud de St-Coust, la butte du calvaire constitue une motte féodal naturelle, un site défensif. Ce relief se situe sur un chemin reliant Riom et Manzat, sans que l'on sache avec précisions si ce chemin préexiste, ou il va se constituer à l'abri du château. Sur cette butte, Guy II comte d'auvergne décide à la fin du XIIe siècle, de construire un château pour surveiller la plaine de la Limagne, plus particulièrement sa bordure nord-ouest.","architecture":"CHATEL-GUYON, c'est un château quadrangulaire de 23m sur 20, avec quatre tours d'angle défensives; rondes et massives, que relient des courtines renforcées par une enceinte extérieure, crénelée. Le château est dépourvue de donjon comme celui de Yèvre dans le Loiret. Cette forteresse prend le nom de \"Castrum Guidomis\" mentionné en 1209 puis en 1255, le château de Gui.  Le château, vu du sud, occupe le sommet d'une butte tronçonique. Un toit à deux pentes de petites dimensions dépasse au-dessus de la courtine méridionale: des bâtiments s'élevaient donc à l'intérieur de ces murs. Une enceinte extérieure court à flanc de côteau, des bâtiments dont on aperçoit les toits sont adossés à la face interne et occupent une grande partie de la surface de la basse-cour. Une porte s'ouvre dans la face orientale de la butte, une première aile fut construite en 1966. Les demandes affluant, il a fallu réaliser une deuxième aile en 1972.","habitants":"Seigneur local\r\n        \r\n        \"","divers":"Chatel Guyon 42568436,46.2714159","gps":"","images":["../image/image_23/23_Chatel_Guyon_1.jpg","../image/image_23/23_Chatel_Guyon_2.jpg","../image/image_23/23_Chatel_Guyon_3.jpg"]},"Consult_chateau_formulaire6eaa":{"id":"Consult_chateau_formulaire6eaa","dept":"23","canton":"Auzances","commune":"Crocq","nom":"Crocq","type":"Château-Vestiges","periode":"XII-XVII","histoire":"A Crocq vestiges, château de Cornudet  et de Saint-Maurice. CROCQ, date du XIIe siècle, pour Robert Ier Dauphin d'Auvergne, domine la cité médièvale,  démantelé vers 1630  à la demande de Richelieu, est en cours de restauration grace à une association,   Le château de Crocq, aujourd'hui reconverti en chambres d'hôtes, ouvre ses portes à l'occasion des Journées du Patrimoine.  Aujourd'hui  a Jacques et Mary Lemaître.   CORNUDET  Il a appartenu depuis leXVIIe siècle à la famille Cornudet des Chaumettes pendant trois siècles, famille de magistrats et de politiciens originaire de Chambon-sur-Voueize venue s'installer à Crocq aux alentours de 1700 et qui a fait don à la commune de Crocq des tours du XIIe siècle et de la chapelle de la visitation.   Ce château a été vendu en 2012 à la famille Lemaitre qui lexploite en chambres dhôtes.                                                                            St-Maurice le château est du XVIIIe et XIXe siècle. Il est un peu visible de lextérieur.","architecture":"CROCQ, il ne reste que deux tours du XIIe siècle reliées par une courtine. l'ancien dispositif composéd'une cour intérieure avec quatre tours à chaque angles et le corps de logis plus tardif du XVe siècle. Des cheminées de la fin du XVIe siècle ont été remployées dans des maisons du village. Les tours, en moellons de granite vestiges du château, ont été inscrites aux M.H.  le 15 juin 1926. Les fortifications comportaient trois rangs de murailles et des fossés. Un souterrain rejoignait les pentes de Crouville. L'intérieur de la tour gauche (vue de l'arrière) sert actuellement de lieu d'exposition. La tour droite permet lascension, en la rejoignant, au sommet de la tour gauche ou un panorama a été mis en place.                                 CORNUDET, cest un château des XVIIe et XVIIIe siècles construit sur des bases beaucoup plus anciennes,  le château date de l'époque médiévale, il a été agrandi au XVIIIe siècle et modifié sous Viollet-le-Duc au XIXe siècle, il abrite une collection unique de tentures murales en cuir doré provenant des Pays-Bas et datant du XVIIe siècle.  Un modèle de ces tentures est exposé au musée Metropolitan de New-York.","habitants":"Famille Cornudet des Chaumettes\r\n        \r\n        \r\n        \"","divers":"Crocq   GPS : 45° 52' 10\" Nord et 2° 22' 04\" Est   grav 1-2                                                                              Cornudet grav 3-4-5                                                                           ST-Maurice  grav  6-7 32781383,45.8725198","gps":"45° 52' 10\" Nord et 2° 22' 04\" Est   grav 1-2","images":["../image/image_23/23_Crocq_1.jpg","../image/image_23/23_Crocq_2.jpg","../image/image_23/23_Crocq_3.jpg","../image/image_23/23_Crocq_4.jpg","../image/image_23/23_Crocq_5.jpg","../image/image_23/23_Crocq_6.jpg","../image/image_23/23_Crocq_7.jpg"]},"Consult_chateau_formulairedbf8":{"id":"Consult_chateau_formulairedbf8","dept":"23","canton":"Guéret-1","commune":"St-Laurent","nom":"Cros_Creuse","type":"Maison forte","periode":"XV","histoire":"CROS, il y a un petit château féodal en ce lieu. La famille Taquenet a possédé les seigneuries de Saint-Laurent, des Cros, de Saint Léger-Bridereix, etc. Gilbert Taquenet, président en lélection de Guéret, seigneur de Saint-Laurent, épousa Marie dAubusson vers 1615.  Sylvain Taquenet, seigneur du Cros était capitaine aide-major au régiment dAgenais en 1711.","architecture":"La maison forte de Cros, corps de logis rectangulaire à deux niveaux toit en croupe l'ensemble est fermé dans un enclos par des mur flanqué de tours rondes aux angles dont une avec clocheton sur leur toit en poivrières et tour carrée à mâchicoulis sur angles de droite, l'ensemble recouvert en tuiles seul la tour carrée en ardoise.","habitants":"Famille Taquenet\r\n        \r\n        \"","divers":"Cros 96817557,46.1676908","gps":"","images":["../image/image_23/23_Cros_Creuse_1.jpg","../image/image_23/23_Cros_Creuse_2.jpg","../image/image_23/23_Cros_Creuse_3.jpg","../image/image_23/23_Cros_Creuse_4.jpg"]},"Consult_chateau_formulaireaa26":{"id":"Consult_chateau_formulaireaa26","dept":"23","canton":"Dun le Palestel","commune":"Crozant","nom":"Crozant","type":"Vestiges","periode":"X-XII-XV","histoire":"A Crozant les vestiges de la forteresse et le château des Places. CROZANT, date du Xe au XVe siècle. Il est en ruines. Mais c'est au XIIIe siècle que le château-fort prendra la forme que nous lui connaissons aujourd'hui. Une des tours subsistantes porte le nom d'Isabelle d'Angoulême, veuve de Jean sans Terre, épouse de Hugues X de Lusignan, qui l'aurait fait construire. Au XIIe siècle, l'édifice prit de l'ampleur, un siècle plus tard quand le comte de la Marche Hugues X de Lusignan décida de  le faire fortifié, les capitaines qui occupèrent le château furent les Foucauld, seigneurs de Saint-Germain-Beaupré. Ce lieu vit passer de 1100 à 1890 des personnages célèbres tels qu'Isabelle d'Angoulême, Jean Sans Terres, George Sand et Frédéric Chopin ainsi qu'un grand nombre de peintres qui firent la renommée de l'école de Crozant.\r\n   PLACES, elle porte les armoiries de la famille Foucault de Saint-Germain-Beaupré. Quand Sylvain de la Marche, seigneur de Puyguillon, devint propriétaire de la seigneurie en 1786, il élabora un projet de château neuf, connu par des archives privées.","architecture":"CROZANT, forteresse médiévale a été édifiée entre 997 et 1018  et ancien fief de la famille des Lusignans, qui firent construirent les  remparts tours et le corps de logis, résista durant la guerre de cent ans. Pourtant elle sera délaissée au XVe siècle et tombera en ruine au début du XVIIe siècle à cause d'un tremblement de terre.  Les ruines de la citadelle couvrent une bonne partie de l'éperon rocheux : plusieurs enceintes successives, un donjon carré du XVe siècle et deux tours XIIIe siècle, auxquels s'ajoutent une chapelle et la « Tour de l'eau » qui permettait d'aller chercher l'eau, à la rivière, tout en restant à couvert.         PLACES,  château  bâti à Crozant, les deux tourelles forment le portail,  date du XVe siècle,  corps de bâtiment dun étage carré et un demi-étage en attique, flanqué de deux avant-corps en pavillons. Les pierres préparées pour ces travaux furent dérobées au cours des années mouvementées de la Révolution : restituées, elles auraient été employées pour la construction de la petite habitation moderne. Le pavillon est en réalité une entrée à pont-levis du XVe siècle, transformée à la fin du XVIIe ou au début du XVIIIe siècle par ladjonction de deux tours circulaires coiffées dun petit dôme à lanternon. La chapelle Notre-Dame des Places, datée de 1686, est de style classique, ornée dune porte à fronton sur pilastres et de grandes fenêtres cintrées qui percent la façade nord, est inscrit aux M.H. depuis 2002","habitants":"Famille des Lusignans                                                    Famille Foucault\r\n        \r\n        \"","divers":"Crozant  GPS : 46° 23' 45,24\" Nord, 1° 37' 13,08\" Est        grav 1-2                                                      Places GPS : 46° 22' 56\" Nord et 1° 36' 20\" Est grav 3-4-5","gps":"46° 23' 45,24\" Nord, 1° 37' 13,08\" Est        grav 1-2","images":["../image/image_23/23_Crozant_1.jpg","../image/image_23/23_Crozant_2.jpg","../image/image_23/23_Crozant_3.jpg","../image/image_23/23_Crozant_4.jpg","../image/image_23/23_Crozant_5.jpg"]},"Consult_chateau_formulaire2ed2":{"id":"Consult_chateau_formulaire2ed2","dept":"23","canton":"Dun le Palestel","commune":"Dun de Palestel","nom":"Dun_Palestel","type":"Château","periode":"XVI","histoire":"A cinq Km à l'Est de Saint-Sulpice le Dunois  le chateau de Souvolle et le manoir de Barde.                 DUN de PALESTEL, le château aujourd'hui est le bureau de postes.  Des chartes de 1274 et 1285 du cartulaires d'Aubignac nous apprennent qu'Hugues, vicomte de Brosses était à ces dates, seigneur de Dun et de Châteauclos. A ces maisons succédèrent celles de Chauvigny, de Maillé de la Tour-Landry et d'Aumont. Jean sire d'Aumont, épousa, en 1480, Françoise de Maillé, dame en partie de Dun-le-Palleteau, fille de  Hardouin de Maillé, dit de La Tour-Landry, et d'Antoinette de Chauvigny, dame de Chateauroux. Le chevalier Jacques d'Aumont, en 1601 devient  seigneur de Dun-le-Palleteau. En 1639, le roi engageait les seigneuries de Dun et de Crozant à Gabriel Foucaud, seigneur de Saint-Cermain-Beaupré, en 1766, les héritiers d'Anne-Françoise Foucault, la dernière de sa lignée, vendirent ces deux comtés à Nicolas Doublet de Persan. En 1786, le château existait et était affermé  aux fermiers généraux.    SOUVOLLE, ce château appartient en 1369 à Jean de La Celle. La dernière de sa branche, Anne de la Celle, dame de Souvolle, épousa en 1708 Charles du Breuil, chevalier, qui devint seigneur de Sonvolle. Ses armes sont d'argent à la face vivrée de gueules bordée de sable, accompagnée de deux jumelles aussi de gueules bordées de sable.","architecture":"DUN, ce bâtiment était une dépendance du château de Dun, qui a servi de prison sous lancien régime. De caserne à la maréchaussée, jusquen 1790, puis de gendarmerie de 1791 à 1847. Ce \"château\" a été utilisé pour la mairie depuis lorigine municipale, décole et de maison de justice de paix, jusquen 1883 date de la construction de la mairie-école. En 1894, la municipalité décida daffecter le batiment à ladministration des P.T.T.                                          BARDE, le château de La Barde, dans sa construction actuelle, date environ de 1831 . Cest dans lancien château, appartenant alors à Léon-Jean-Marie Merle de la Brugière, son oncle, que Silvain François Jules a passé des moments de son enfance. François, son père, ayant sa résidence au « Chef lieu », cest-à-dire dans le Bourg.                                                     SOUVOLLE, un dénombrement de 1626 nous apprend que le château de Souvolle consiste en un grand corps de logis, aux quatre coins duquel il y a  une tour, une carrée et trois rondes, et en l'une desquelles il y a en haut un colombier. Les dites tours garnies de canonnière, créneaux, machicoulis pour la défense, il y a des girouettes ainsi qu'une chapelle.","habitants":"Léon-Jean-Marie Merle de la Brugière.                        Souvolle Charles du Breuil\r\n        \"","divers":"Dun 46° 18' 22? nord, 1° 40' 00? est  Grav 1 à 3          Barde Grav 5","gps":"","images":["../image/image_23/23_Dun_Palestel_1.jpg","../image/image_23/23_Dun_Palestel_2.jpg","../image/image_23/23_Dun_Palestel_3.jpg","../image/image_23/23_Dun_Palestel_4.jpg","../image/image_23/23_Dun_Palestel_5.jpg"]},"Consult_chateau_formulaire4ef5":{"id":"Consult_chateau_formulaire4ef5","dept":"23","canton":"Gouzon","commune":"Saint-Chabrais","nom":"Etangsannes","type":"Château","periode":"XV","histoire":"ETANGSANNES ou ETANSANNES,  bâti à Saint-Chabrais. Il date du XVe siècle. Le château d'Etansannes  qui fut le fief des Montaignac, a été édifié au XIIe siècle. Il appartenait alors à la famille Potet, puis ira, par mariage, aux Montaignac, dont une branche a porté son nom. A Gabriel succédère son fils Silvain, puis son petit-fils Gabriel-Nicolas, comte d'Etangsannes, lieutenant général, gouverneur du Berry, marié en 1743 à Charlotte de Gaucourt. Il  eut trois enfants, Charles, capitaine en 1779, mort en émigration ; le comte Edme-Henri, premier page de la reine, et souche de la branche de Montagnac de Cluis, et Alberte, mariée en 1770 au marquis de Lestrange. Il a ensuite été acquis par François-Philippe Loisel au début du XXe siècle, avant d'être cédé par ses fils, à une institution privée, dans les années 1950. Il fut la propriété de la famille Petit jusqu'en 2010 et appartient désormais à la famille de Mesmay. Le château d'Etangsannes est depuis devenu un musée ouvert au public. Se visite aujourdhui la grange fortifiée et le manoir marchois, en particulier les charpentes et le premier étage.","architecture":"ETANGSANNES, Au sud d'Etangsannes  à Hautefaye   Issoudun-Letrieix  Ce château date du XVe XVIe siècle, il nest pas visible de lextérieur. Il comporte un corps de logis en L avec une petite tour au centre, et une grosse tour en extrémité, a conservé la tour carrée du château primitif du XIIe siècle, le corps de logis du XVe siècle. Actuellement, le château proprement dit consiste en un corps de logis long de 25 m et large de 8 m, murs compris, flanqué d'une tour carrée de 7 m. de côté à l'Ouest, d'une tour ronde de 8 m. de diamètre à l'Est et d'une tour d'escalier également ronde, au milieu de la façade sud. L'épaisseur des murs, très grande au rez-de-chaussée (1 m. 60 dans la grosse tour ronde), diminue à chaque étage et n'est plus que de 1 m. au 5e étage de la tour carrée. Le plan était le même pour le rez-de-chaussée, les deux étages et les combles ; deux grandes salles ouvrant directement dans la tour d'escalier, et donnant chacune dans une petite pièce logée dans une des grosses tours. Le corps de logis rectangulaire et une autre tour ronde, qui a gardé ses machicoulis sur corbeaux, ont été construits au XVe siècle. La tour ronde d'escalier qui fait saillie sur la façade ouest possède une porte ornée du blason des armes de la famille de Montaignac.","habitants":"Famille de François-Philippe Loisel\r\n        \"","divers":"Estangsannes   GPS : 46° 06' 02\" Nord et 2° 11' 17\" Est","gps":"46° 06' 02\" Nord et 2° 11' 17\" Est","images":["../image/image_23/23_Etangsannes_1.jpg","../image/image_23/23_Etangsannes_2.jpg","../image/image_23/23_Etangsannes_3.jpg","../image/image_23/23_Etangsannes_4.jpg","../image/image_23/23_Etangsannes_5.jpg","../image/image_23/23_Etangsannes_6.jpg","../image/image_23/23_Etangsannes_7.jpg"]},"Consult_chateau_formulaire4a61":{"id":"Consult_chateau_formulaire4a61","dept":"23","canton":"Evaux les Bains","commune":"Evaux les Bains","nom":"Evaux_les_Bains","type":"Château","periode":"XVII","histoire":"A Evaux les Bains; chateau de Relibert, de Monterolles, la Gaité, de Budelle-Mairie et la ville aux Bois.                                                                              EVAUX LES BAINS, au XVIIIe siècle est chef-lieu d'élection au sein de la généralité de Moulins. À la Révolution elle fut chef-lieu de district entre 1790 et 1800 au XXe siècle, L'hôpital bénévole 50 bis de l'ancien ordre du Verbe incarné fut installé pendant la première guerre mondiale dans le couvent attenant à l'église d'Évaux. Il va recevoir 1 740 patients, six vont y décéder ; le premier en janvier 1915 et le dernier en juin 1918, cinq sont enterrés dans le carré militaire du cimetière d'Évaux. L'ancien couvent du Verbe incarné, devenu hôpital, sera détruit par un incendie accidentel le 12 septembre 1942. \r\nL'établissement thermal a été réquisitionné par les autorités de Vichy de 1942 à 1944. De nombreuses personnalités de la Troisième République furent détenues dans le grand hôtel, parmi lesquelles : Édouard Herriot et Léon Jouhaux ainsi que des généraux, des députés, des juifs et des personnalités diverses. Gardées par un groupe mobile de réserve, elles furent libérées le 8 juin 1944.","architecture":"BUDEILLE ou Budelle  Mairie d'Evaux                         EVAUX LES BAINS, vestiges des portes de la ville : lion sculpté roman.\r\nRuines du château de la Roche-Aymon (au bord du Chat-Cros) : berceau de la famille de La Roche. Lancien château de la Roche Aymon est totalement ruiné. Sur place, il est possible de trouver quelques vestiges et la plate forme de la construction. Cest fortement envahi pas la végétation, et particulièrement dangereux.\r\nChâteaux : Relibert gîte de France; Monterolle. Pas d'information historique sur ses deux derniers.","habitants":"Famille de La Roche\r\n        \"","divers":"A Evaux les Bains; chateau de Relibert grav 2-3, de Monterolles grav 4, la Gaité grav-6, de Budelle-Mairie  grav-1 et la Ville aux Bois grav-7. Château hotel grav 6et 8","gps":"","images":["../image/image_23/23_Evaux_les_Bains_1.jpg","../image/image_23/23_Evaux_les_Bains_2.jpg","../image/image_23/23_Evaux_les_Bains_3.jpg","../image/image_23/23_Evaux_les_Bains_4.jpg","../image/image_23/23_Evaux_les_Bains_5.jpg","../image/image_23/23_Evaux_les_Bains_6.jpg","../image/image_23/23_Evaux_les_Bains_7.jpg","../image/image_23/23_Evaux_les_Bains_8.jpg"]},"Consult_chateau_formulaire1a87":{"id":"Consult_chateau_formulaire1a87","dept":"23","canton":"Auzances","commune":"Flayat","nom":"Flayat","type":"Château","periode":"XVIII","histoire":"FLAYAT,  Ayron de La Roche est seigneur de Flayat en 1250 et 1281. Guichard de Malleret devient seigneur de Flayat en 1533. Louise de Lestrange, femme de Jean de Malleret devint héritière du château de Flayat. Elle épousa en 1560 Jean de Saint-Julien. La famille de Saint-Julien garda la seigneurie de Flayat jusqu'en 1732. Marguerite de Saint Julien, épousa en 1732 Guy marquis d'Ussel et baron du Château-Vert.  Marie Louise Hyacinthe d'Ussel, née en 1772, a porté Flayat en dot à Jean Baptiste, marquis de Cosnac. La demeure a subi un incendie à la fin du XVIIe siècle ; au rez-de-chaussée est visible  une peinture sur bois montrant le château en feu. A la fin du premier quart du XVIIIe siècle, construction ou réfection des parties agricoles. Leur petite-fille, Marie-Louise-Émilienne de Cosnac, a épousé, en 1849, le comte Sigismond-Gustave de Bridon qui est devenu propriétaire de Flayat.","architecture":"FLAYAT, premier château, une partie datant du XVIIIe siècle ; adjonction d'une aile entre 1903 et 1905 ; logis de ferme portant la date de 1837 sur le linteau de la porte.                                                                                Deuxième château ,  porte la date de 1638 ; a subi un incendie fin XVIIe siècle ; au rez-de-chaussée est visible une peinture sur bois montrant le château en feu ; construction ou réfection des parties agricoles fin 1er quart du XVIIIe siècle ; grange portant l'inscription de 1723.","habitants":"Comte Gustave de Brinon\r\n        \"","divers":"Flayat 45° 46' 30? nord, 2° 22' 54? est","gps":"","images":["../image/image_23/23_Flayat_1.jpg","../image/image_23/23_Flayat_2.jpg"]},"Consult_chateau_formulaire50f4":{"id":"Consult_chateau_formulaire50f4","dept":"23","canton":"Aubusson","commune":"St-Amand","nom":"Fot_St_Amand","type":"Forteresse","periode":"XIV","histoire":"A St-Amands le chateau de Fot et de Poux du XIVe siècle.                                                                             FOT  bâti à Saint-Amand,  le vicomte Paul de Curel acheta vers 1890 le manoir de La Fot, des fermes, l'étang de la Grande Cazine, il fit construire en 1894 un château et ses dépendances par les architectes parisiens Louis Chauvet et Alfred Coulomb. Plusieurs fermes isolées, construites aux alentours vers 1900 dépendaient également du château et participaient à l'économie du domaine. En 1987, le château et son domaine ont été vendus et le château a été transformé en hôtel, Antoine Jorrand (1864-1933), Manufacture des Tapisserie Croc-Jorrand, fut le propriétaire du château du Fôt. Il le fit restaurer de 1900 à 1921, est devenu aujourd'hui un hôtel-restaurant haut de gamme et un Spa 5 Etoiles.                                                        Chateau de Beauvais à Saint-Amant de Jartoudeix chambres d'hôtes","architecture":"FOT à  La FOT , plusieurs fermes isolées, construites aux alentours vers 1900 dépendaient également du château et participaient à l'économie du domaine. En 1987, le château a été transformé en hôtel.   Logis très remanié, à un étage carré et à un étage de comble éclairé par des  lucarnes, flanqué de deux tourelles aux angles nord-ouest et nord-est et d'une tour d'escalier en vis sur la façade Est. Sur une photographie prise vers 1900 cette tour semble couverte par un dôme, aujourd'hui elle est couverte par une terrasse
