n":"Mortagne-sur-Sèvre","commune":"les Landes Génusson","nom":"Landes_Génusson","type":"Château","periode":"XVII","histoire":"Plusieurs châteaux à Landes-Genusson dont celui des Boucheries , de la Godelinière  la tour de la Chambrette à été détruite.                                                                                                    BOUCHERIE, le premier propriétaire du château s'appelait Paul Lambert  vers 1613 ; avant lui, les archives mentionnent le seigneur de la Boucherie, mais sans le nommer. En 1563, l'église paroissiale des Landes-Génusson fut détruite par les Huguenots qui, sous les ordres des seigneurs de la Boucherie et de Montaigu, désolaient le pays. On dit qu'un curé de la paroisse fut emmené pieds et poings liés dans le château. Etait donc très redouté, d'autant plus qu'il relevait de celui de Montaigu, occupé par les Huguenots.  Des tensions avec les curés des Landes-Génussons   longtemps, les curés seigneurs des Landes-Génusson ont eu des différends avec les propriétaires de la demeure seigneuriale, mais le plus souvent sans heurt. Il s'agissait surtout de la dîme collectée par les châtelains, mais qui devait revenir aux prêtres. Nombreux furent les procès et les transactions. Pas moins de sept curés successifs ont essayé de récupérer cette redevance. Les choses s'arrangèrent dans les années 1740. En 1834, le château fut habité par la famille Demangeat, qui donna deux maires à la commune et une école à la paroisse.","architecture":"BOUCHERIE, se rattache aussi une histoire de trésor. Lors des guerres de Vendée, en mars 1793, les propriétaires enfermèrent leurs richesses dans une barrique cerclée de fer. Cette barrique fut enterrée entre le château et le moulin des Landes « à un vol de chapon ». Une domestique nommée Testaud aida ses maîtres pour cette opération. Le trésor ne fut jamais trouvé ; les différents contrats de vente attestent de son existence. Cette même femme, Testaud, avait la garde d'un jeune enfant du propriétaire du château, nommé Chesneau, depuis que le bourg des Landes-Génusson fut cerné et incendié le 7 février 1794 par une des colonnes infernales. Alors que plus de 80 victimes allaient être fusillées, la vieille domestique obtint sa grâce et celle de l'enfant, qui deviendra adjoint au conseil municipal de Nantes, à la fin du Second Empire.","habitants":"Paul Lambert\r\n        \"","divers":"Château à la Landes Génusson le château de Chambreteaux grav-1 et de la Boucherie 2 à 5.","gps":"","images":["../image/image_85/85_Landes_G%c3%a9nusson_1.jpg","../image/image_85/85_Landes_G%c3%a9nusson_2.jpg","../image/image_85/85_Landes_G%c3%a9nusson_3.jpg","../image/image_85/85_Landes_G%c3%a9nusson_4.jpg","../image/image_85/85_Landes_G%c3%a9nusson_5.jpg"]},"Consult_chateau_formulaire7c5a-2":{"id":"Consult_chateau_formulaire7c5a-2","dept":"85","canton":"Montaigu","commune":"Les Brouzils","nom":"Ligny_Brouzils","type":"Château","periode":"XIX","histoire":"LIGNY, l'époque moderne est marquée par l'émergence de quelques familles qui vont dominer la vie sociale des Brouzils. Parmi elles, les Sajot dont Charles Antoine s'exile en Angleterre à la fin du XVIIe siècle. Il était sans doute protestant. Les Forestier, les Buet, les Gourraud, vont fournir des conseillers municipaux et des maires au XIXe siècle, voire des conseillers généraux. Le 11 janvier 1794, en pleine guerre de Vendée, la bataille de Gralas a lieu entre les Républicains et les Vendéens. La forêt de Grasla, principalement sur la commune des Brouzils, servit de refuge aux habitants du pays en 1793-1794 ; ces populations fuyaient les combats et la terreur menée par les colonnes infernales de Turreau. Le 22 février 1794, environ 100 personnes sont massacrées aux Brouzils par la colonne du général Cordellier. Le 26 avril 1964, plusieurs habitants de la partie septentrionale de la commune réclament leur rattachement à lhébergement. Malgré une délibération du 19 juillet suivant dans laquelle le conseil municipal des Brouzils soppose à ce projet, le conseil général de la Vendée, conduit à se prononcer sur le sujet en raison de la modification des limites entre deux cantons (Rocheservière et Saint-Fulgent).","architecture":"LIGNY; la commune est parsemée de châteaux, pour la plupart reconstruit au XIXe siècle mais dont certains gardent la trace - comme à La Duranderie, de leur édification ancienne. La Duranderie date de la fin des guerres de Religion (fin XVIe siècle). Le Ligny, en centre-bourg, est bâti au XIXe siècle à l'emplacement d'une maison agricole. Tout près de l'église, le logis de La Colle marque l'emprise de la famille Gourraud sur la commune et l'ensemble du canton de Saint-Fulgent au cur du XIXe siècle (voir géographie et histoire). La Thébline, qui s'est nommée L'Hervédière durant quelques années au XXe siècle, est le fruit de constructions successives depuis le XVe siècle.                                                                                  La COLLE, au XVIe et fin du XXe siècles Le toponyme de La Colle se rapporte à une élévation, le logis étant bâti sur le point le plus élevé du bourg, au centre de celui-ci. Cette position explique que son nom soit rarement utilisé. La Colle est cependant cité dans un acte de décès, en 1784. Avant la Révolution, la propriété a des liens de suzeraineté avec La Jarnigandière, situé à la limite extérieure du bourg de l'époque.","habitants":"Famille de Sajot Famille Gourraud\r\n        \"","divers":"Brouzils château de Ligny-46° 53' 16\" nord, 1° 19' 46\" ouest","gps":"","images":["../image/image_85/85_Ligny_Brouzils_1.jpg","../image/image_85/85_Ligny_Brouzils_2.jpg"]},"Consult_chateau_formulaire291b":{"id":"Consult_chateau_formulaire291b","dept":"85","canton":"Luçon","commune":"Luçon","nom":"Lucon_Palais_Evéché","type":"Palais","periode":"XIV","histoire":"EVECHE, le diocèse est fondé en 1317 par le pape Jean XXII par démembrement du vaste et ancien diocèse de Poitiers. Deux nouveaux diocèses résultent alors de la transformation en évêché des abbayes de Maillezais et de Luçon, celle-ci entrée d'ailleurs en compétition avec celle de Saint-Michel-en-lHerm. Le diocèse de Luçon correspond alors aux 2/3 de l'actuel. L'évêque : jusqu'à l'époque actuelle 46 évêques se sont succédé sur le siège épiscopal de Luçon. Le plus illustre d'entre-eux est Richelieu (1606-1623). L'activité pastorale de l'évêque s'exerce en particulier par la visite périodique des paroisses de son diocèse.  Sous l'ancien régime, l'évêque est aussi seigneur laïc (baron) de Luçon (depuis le XVe siècle). Pendant les guerres de religion, la cathédrale est dévastée à plusieurs reprises (1568, 1570, 1622). A la Révolution le diocèse disparaît et le clergé est exilé. Rétabli en 1821 le diocèse s'identifie désormais au département et l'évêque est confronté aux luttes politiques de l'époque qui s'apaisent après la Grande Guerre (1914-1918).A la révolution, le chapitre est dissous, ses biens vendus et les chanoines exilés. Au rétablissement de l'évêché (1821), le chapitre est restauré dans ses seules fonctions éclésiastiques.","architecture":"LUCON, château de Mille-Souris (actuelle maison de retraite des missionnaires de la Plaine) ; anciennement hôtel de Mauras, cette maison a probablement été construite à la fin du XVIIe siècle. Sa porte principale s'inspire de la façade baroque de la cathédrale.                                                                                                       EVECHES, la cathédrale dont l'évolution a été complexe ;  le transept Nord -Est du XIIe et date de l'abbaye primitive. La nef est de la fin du XIIIe siècle,  le coeur du XVe siècle. (vers 1481), la sacristie du XVe siècle. les chapelles Nord du XVIIIe siècle.  les chapelles Sud ont été prises sur le cloître du XVIe siècle.  la façade de la fin du XVIIe siècle,   le cloître du XVIe siècle. l'évêché du XIIIe XIXe siècle.                                                                          VOUREUILS  à Chasnais   date de la fin du XVe ou au début du XVIe siècle pour ses parties les plus anciennes, il a été remanié aux XVIIe et XVIIIe siècles. Ce vaste logis, au bout de son allée boisée, se compose dun long corps (sur deux niveaux) flanqué de part et dautre, de deux tours rondes aux toitures dardoise défendues par une couronne de bretèches qui lui donnent un aspect médiéval. Deux pavillons carrés dentrée terminent les extrémités des ailes en retour déquerre.","habitants":"Les Evêques\r\n        \"","divers":"Luçon 46° 27' 20\" nord, 1° 09' 53\" ouest palais grav 1 à 4","gps":"","images":["../image/image_85/85_Lucon_Palais_Ev%c3%a9ch%c3%a9_1.jpg","../image/image_85/85_Lucon_Palais_Ev%c3%a9ch%c3%a9_2.jpg","../image/image_85/85_Lucon_Palais_Ev%c3%a9ch%c3%a9_3.jpg","../image/image_85/85_Lucon_Palais_Ev%c3%a9ch%c3%a9_4.jpg"]},"Consult_chateau_formulaire638a":{"id":"Consult_chateau_formulaire638a","dept":"85","canton":"La Châtaigneraie","commune":"Vouvant","nom":"Lésignan_Vouvant","type":"Vestiges","periode":"XII","histoire":"A Vouvant les vestiges de la Tour Mélusine et le château des Loges.                                                                                                               VOUVANT, bâti à Vouvant, dont seuls les remparts et la tour font parti de la légende de Mélusine. La porte de la poterne du vieux château fut construit par Géoffroy le Grand Deni au XIVe siècle. La Tour Mélusine est inscrite à linventaire supplémentaire des M.H. depuis le 12/02/1927.                                                                                          TOUR-MELUSINE, apportée en dot en 1190 par Eustache Chabot, la seigneurie passe dans la mouvance d'une des plus anciennes et des plus illustres lignées poitevines les Lusignan. Leur empreinte marquera à jamais le site puisqu'on leur doit la reconstruction du château sur l'emplacement du château-fort voulu par Guillaume V. Cette tour de guet qui date de 1242, est le seul vestige du château des Lusignan, elle se dresse sur un éperon rocheux dominant l'enceinte fortifiée encore bien conservée. La légende attribue sa construction à la fée serpent (Mélusine) qui aurait construit en une nuit le château de Vouvant, puis ceux de Mervent, Tiffauges et Pouzauges. Au Moyen-Age, l'accès au premier étage se faisait par une échelle mobile retirée en cas de danger. A lintérieur on peut admirer deux salles voûtées en coupole et du sommet de la Tour, la belle vue panoramique sur le bocage vendéen et la forêt souligne l'intérêt stratégique de la cité.","architecture":"VOUVANT, bâti à Vouvant, dont seuls les remparts et la tour font parti de la légende de Mélusine. La tour Mélusine, donjon circulaire date de la fin du XIIe et du début du XIIIe siècle. C'est le seul vestige de l'ancien château-fort des Lusignan, qui était séparé du bourg fortifié de Vouvant par un fossé. Selon la légende, elle fut construite, comme le reste de la forteresse, en une nuit, par la fée Mélusine de « trois d'ornées de pierre et dune goulée dÈve ». Cette tour est inédite pour l'époque, de par sa hauteur exceptionnelle (45 m depuis le bas du fossé) et par sa forme cylindrique. La plupart des donjons de la région et de l'époque sont de style « niortais », carrés, avec des tours ou contreforts pleins à chaque angle. La petite salle du rez-de-chaussée est actuellement utilisée par la municipalité en tant qu'espace de stockage. Elle était, initialement, utilisée pour stocker des denrées alimentaires. .                                       TOUR Mélusine, son propriétaire initial était la Maison de Lusignan. Le début de sa construction date du XIIIe siècle. Cette tour de guet est ce qui reste de l'ancienne Forteresse des Seigneurs de Lusignan qui est date de 1242. Elle est de style médiéval. Comme pour tous les châteaux des Lusignan. La Tour Mélusine est classée aux M.H depuis 1927.","habitants":"Eustache Chabot\r\n        \"","divers":"Vestiges,Tour Mélusine : 46° 34' 25\" Nord et 0° 46' 20\" Ouest                             Vouvant; 46° 34' 25\" nord, 0° 46' 20\" ouest","gps":"","images":["../image/image_85/85_L%c3%a9signan_Vouvant_1.jpg","../image/image_85/85_L%c3%a9signan_Vouvant_2.jpg","../image/image_85/85_L%c3%a9signan_Vouvant_3.jpg","../image/image_85/85_L%c3%a9signan_Vouvant_4.jpg","../image/image_85/85_L%c3%a9signan_Vouvant_5.jpg"]},"Consult_chateau_formulairea09c":{"id":"Consult_chateau_formulairea09c","dept":"85","canton":"Fontenay le Comte","commune":"Saint-Pierre Maillezais","nom":"Maillezais","type":"Château-fort","periode":"XIII-XV","histoire":"MAILEZAIS, le château du Gué est une ancienne maison protestante, dont les premiers bâtiments ont été érigés au XIIe siècle. Jean Girouart en était le seigneur. Cette vieille maison dépendait de la chapellenie de Boissé, qui disputait la responsabilité du passage du gué de la Longève à l'autorité du château des évêques de Maillezais, situé un peu plus haut sur la colline d'en face. On peut voir sur le plus ancien bâtiment une gargouille en forme de canon dirigée vers le château des évêques de Maillezais. De cette période, il reste une vieille fuie et une magnifique cave voûtée. Le château fut démoli et reconstruit en 1648, par Nicolas de Morienne. Celui-ci, accablé de dettes, le cède à Claude de Thurin. La famille de Thurin en fut propriétaire jusqu'en 1729, date à laquelle Cyprien de Thurin le vend à Jean Rampillon.  Le 1er janvier 1589, pendant les guerres de Religion, Maillezais est prise par le protestant Agrippa d'Aubigné, qui en devient gouverneur, il y résidera  a été chargé de la surveillance, à partir du mois daoût, du cardinal de Bourbon, emprisonné à Fontenay-le-Comte.\r\nEn 1648, Maillezais perd son siège épiscopal au profit de l'évêché de La Rochelle nouvellement créé.","architecture":"MAILLEZAIS;  bâti sur l'emplacement du palais des évêques de Maillezais, le protestant d'Aubigné en fit un donjon lorsqu'il détenait l'abbaye. Il reste du palais épiscopal du XIIIe siècle des sous-sols, des caves et une salle ronde  voûtée, dite salle du  conseil. Dans le mur de fortification des petites fenêtres éclairant un sous-sol. l'édifice à deux niveaux avec baies jumelées terrasse et échauguette sur angle et tour d'entrée à l'opposée avec porte d'entrée à fronton rotondant.","habitants":"cardinal de Bourbon\r\n        \"","divers":"A Saint-Pierre Maillezais le château de Maillezais","gps":"","images":["../image/image_85/85_Maillezais_1.jpg","../image/image_85/85_Maillezais_2.jpg","../image/image_85/85_Maillezais_3.jpg","../image/image_85/85_Maillezais_4.jpg"]},"Consult_chateau_formulaire2f44":{"id":"Consult_chateau_formulaire2f44","dept":"85","canton":"","commune":"Mareuil sur Lay-Disay","nom":"Mareuil_Lay_Disay","type":"Château","periode":"XVI-XVIII","histoire":"A Mareuil; le château St-André, le Beaulieu, le Bredurière, du Bessay, la Folie, le Guibert, le  Marie-fou , le Salidieu, St-André  et Dissay  tous ses châteaux ont une activité viticole ou chambres d'hôtes.                                                                                         MAREUIL, pendant la guerre de Cent Ans, Bertrand du Guesclin reprend Mareuil en août 1372, qui était tombée aux mains des Anglais à la suite du traité de Brétigny-Calais. En 1431, le fils de Marguerite de Clisson, Jean de Blois, met le siège devant le château qui était à nouveau retombé dans le camp anglais. Le château étant quasi imprenable, les Anglais résistent aux sièges jusqu'en 1438, lorsqu'un certain Geoffroy de Mareuil, capitaine du Roi, réussi à chasser les Anglais, qui ne reviendront plus à Mareuil. Au XVe siècle cette ancienne seigneurie était rattachée à la vicomté de Thouars qui appartenait à la famille d'Amboise.                                                                    MARIE DU FOU,  Le domaine appartient aujourdhui au viticulteur Mourat qui détient également le caveau. Le château sert désormais de vitrine à leur activité.","architecture":"MAREUIL, au Moyen-Âge, pour les mêmes raisons de position stratégique, un château fort est bâti sur la butte rocheuse où se situe l'actuel château de Marie du Fou, tout près de l'église. On peut voir la forme de ces fortifications sur un plan de 1704 intitulé \" plan de Maroeuil\". Ce château, fait d'une enceinte presque circulaire, comprenait un donjon quadrangulaire, un châtelet d'entrée et quelques tours rondes et carrées renforçant les courtines. Le châtelet était presque en vis-à-vis du pont enjambant le Lay, pour surveiller et contrôler tout passage. Un profond fossé le séparait du reste du plateau rocheux où se situait le village et un prieuré, et cet ensemble était peut-être entouré d'une enceinte fortifiée. Mais avant cette forteresse, il y avait très probablement une motte castrale, comme le laisse supposer ce plan de 1704 où on voit une colline entourée d'un fossé en direction de la Roche sur Yon et légendé « ancien fort ». À noter, sur ce même plan, une certaine \"vieille tour\" qui était implantée sur le pic rocheux où se trouve actuellement le calvaire de la route des Pineaux. Cette tour était sans doute une fortification avancée complémentaire au château.                                                  MARIE DU FOU, construit entre le XIIe et le XVIe siècle, le château comportait deux enceintes de 400 mètres environ avec des tours carrées et rondes, un donjon et des logements seigneuriaux. Durant la première partie du XVe siècle, le château primitif servait de base dactivité militaire au seigneur.","habitants":"Famille d'Amboise\r\n        \"","divers":"A Mareuil sur Lay-Disay, château de  Folie grav 2, Marie-Fou grav 3, Salidieu grav_5,  St -André grav-6, Bessay -9, Beaulieu 7-8","gps":"","images":["../image/image_85/85_Mareuil_Lay_Disay_1.jpg","../image/image_85/85_Mareuil_Lay_Disay_2.jpg","../image/image_85/85_Mareuil_Lay_Disay_3.jpg","../image/image_85/85_Mareuil_Lay_Disay_4.jpg","../image/image_85/85_Mareuil_Lay_Disay_5.jpg","../image/image_85/85_Mareuil_Lay_Disay_6.jpg","../image/image_85/85_Mareuil_Lay_Disay_7.jpg","../image/image_85/85_Mareuil_Lay_Disay_8.jpg","../image/image_85/85_Mareuil_Lay_Disay_9.jpg"]},"Consult_chateau_formulaire01fd":{"id":"Consult_chateau_formulaire01fd","dept":"85","canton":"Pouzauges","commune":"Tillay","nom":"Meilleraie_Tillay","type":"Château","periode":"XVII","histoire":"MEILLERAIE , La (1827 - 1827),  réunion des communes de La Meilleraie et de Tillay, par ordonnance royale du 11 juin 1827, pour en former une seule qui prend le nom de La Meilleraie-Tillay et dont le chef-lieu est fixé à La Meilleraie. Vers 1195 \"de Mesleria : château de la Motte Roger-Marie Roussel, comte de Courcy, propriétaire au château de la Mothe et maire de la commune, château de la Mothe de Tillay on trouvait au XVIe siècle une branche dune  famille hautement connue en Vendée, les Texier  de  la Mothe-Tillay, descendants de Jacques Texier séteignirent par les hommes en 1847. Lautre branche, issue dAntoine Texier donnera les Texier de Courlay, si fameux par leur courage. Tout le monde connaît bien entendu les  grenadiers de Lescure.","architecture":"Meilleraie de plan en L à deux niveaux et série de lucarnes sur combles, cet édifice est accolé de pavillon avec échaugettes sur les angles interne à l'opposé d'une tour polygonale  à quatre niveaux et autre tours rondes dont une crénelée  à toit en poivrière avec chemin de ronde à l'angle de la façade","habitants":"Famille de  Roger-Marie Roussel\r\n        \"","divers":"Château de Meilleraie à Tillay","gps":"","images":["../image/image_85/85_Meilleraie_Tillay_1.jpg","../image/image_85/85_Meilleraie_Tillay_2.jpg","../image/image_85/85_Meilleraie_Tillay_3.jpg","../image/image_85/85_Meilleraie_Tillay_4.jpg","../image/image_85/85_Meilleraie_Tillay_5.jpg"]},"Consult_chateau_formulairee5f9":{"id":"Consult_chateau_formulairee5f9","dept":"85","canton":"Chantonnay","commune":"La Merlatière","nom":"Merlatière","type":"Château","periode":"XVI","histoire":"MERLATIERE, l'origine du nom de La Merlatière viendrait du latin merus (pur), et lateria (terre à brique). La Merlatière, Merlateria, était autrefois une châtellerie associée au château des Gâts, et sa juridiction s'étendait sur la majeure partie des paroisses de La Merlatière. Les seigneurs du lieu, issus de la famille de Resay, sont déliés par le roi de France de tout devoir envers le baron des Essarts, leur souverain, pour ne relever désormais que de la couronne,.  daprès une étude de Benjamin Fillon publiée en 1856, Guilleri, déshérité et maudit par son père, se mit au service de Henri IV en 1597 dans la guerre qu'il faisait au duc de Savoie. Une fois la paix revenue, n'ayant plus d'autres ressources que son épée, il se retirera avec deux cents de ses soldats dans les forêts du Bas-Poitou où il rançonna les riches et aida les pauvres. Le principal théâtre de ses exploits fut le pays situé entre Fontenay, Niort et La Rochelle.  En homme habile il avait plus d'une retraite. C'est ainsi qu'il possédait un repaire à la Merlatière, dans le vieux logis du Bois-Potuyau selon la tradition populaire. Après 10 années de larcins, Guilleri avait amassé dimmenses richesses. Ayant perdu plusieurs de ses camarades, il fit le partage de ses trésors et se retira non loin de Bordeaux                                                                                                                 Château de BOIS POTUYAU ou poteau du XIXe siècle pas d'image","architecture":"MERLATIERE,  manoir  de plan quadrangulaire à deux niveaux sur soubassement, les corps de logis toit en croupes  avec lucarnes  pavillon  d'entrée saillant avec corniche double simplifié à l'arrière du bâtiment, flanqué de tours rondes aux angles  sur façade toits en poivrières.","habitants":"famille de Resay\r\n        \"","divers":"Château de la Merlatière  46° 46' 09\" nord, 1° 17' 59\" ouest","gps":"","images":["../image/image_85/85_Merlati%c3%a8re_1.jpg","../image/image_85/85_Merlati%c3%a8re_2.jpg","../image/image_85/85_Merlati%c3%a8re_3.jpg"]},"Consult_chateau_formulairee304":{"id":"Consult_chateau_formulairee304","dept":"85","canton":"Fontenay-le-Comte","commune":"Mervent","nom":"Mervent","type":"Château","periode":"XIV-XVI","histoire":"Deux châteaux dans cet article de Mervent celui de la Citardière et celui de Cornelière.                                                                                           CITARDIERE, au XIVe siècle appelé la Rodeguelière à pour dame Pérette de Fonteniou qui épousa André Masse, puis Jean de Saint-Maixent portèrent le nom de Frondeboeuf leur fils Pierre rend aveu pour le fief en 1492, le fief échoit à sa fille Catherine veuve de François Gentet, passe à son fils René  qui hérite en 1556. Appelé ensuite la Citardière acquis par Jean Dejean, sa fille Marie épouse  en 1610 Jacques Pager  propriétaire de la métairie et de la maison de la Citardière décède en 1625 peu après le domaine passe à sa fille Gabrielle par alliance passe à Jacques de Morienne, receveur des Tailles de Fontenay, en 1693 acquis par Charles Moriceau sieur de Cheuses, sénéchal de Fontenay, son fils Charles-Nicolas revend le domaine, et en 1740 passe par héritage au Sabourin et échappe à la vente des biens sous la Révolution, il à connu plusieurs  propriétaires entre le XIXe et le XXe siècle et en 1983 acquis par la famille Coutand.                                                                     CORNELIERE, petite seigneurie qui appartenait en 1616 à Jean Bodin, écuyer, qui a sans doute fait construire les bâtiments organisés en cour fermée. Situé au milieu de la forêt de Mervent-Vouvant, ce logis vendéen traditionnel fut construit du XVIe au XVIIe siècle. Pour pénétrer dans la cour intérieure, fermée de quatre corps de bâtiments, il faut emprunter une large allée bordée d'arbres et franchir une porte archée.\r\nChambres d'hôtes  par Lise et Jean-Raymond de Laroque Latour.","architecture":"CITARDIERE, par manque de moyens, seuls le porche d'entrée et la première enceinte seront élevés. On peut le considérer comme l'ultime réalisation de l'architecture de la Renaissance en bas Poitou. La Citardière évoque plus, par son aspect massif et ses douves, lépoque médiévale que la Renaissance. La demeure actuelle présente un corps de logis dominé par trois pavillons et terminé par deux ailes en retour déquerre, constitue aujourd'hui le logis. Le château possède une salle voûtée en anse de panier, une salle à pendentifs de Valence et des gargouilles de part et dautre de lancien pont-levis.                                                CORNELIERE, la construction du logis de la Cornelière date du XVIIIe siècle. Vous y trouverez des chambres d'hôtes.","habitants":"Citardière Jacques de Morienne                                              Cornelière Famille de  Jean Bodin\r\n        \"","divers":"A MerventCitardière grav de 1 à 5 ; 46° 32' 03\" nord, 0° 44' 24\" ouest         Cornelière grav de 6 à 9 : 46° 31' 23\" Nord 0° 45' 19\" Ouest","gps":"","images":["../image/image_85/85_Mervent_1.jpg","../image/image_85/85_Mervent_2.jpg","../image/image_85/85_Mervent_3.jpg","../image/image_85/85_Mervent_4.jpg","../image/image_85/85_Mervent_5.jpg","../image/image_85/85_Mervent_6.jpg","../image/image_85/85_Mervent_7.jpg","../image/image_85/85_Mervent_8.jpg","../image/image_85/85_Mervent_9.jpg"]},"Consult_chateau_formulaire42fc":{"id":"Consult_chateau_formulaire42fc","dept":"85","canton":"Montaigu","commune":"Mesnard-la-Barotière","nom":"Mesnard","type":"Château","periode":"XVI-XIX","histoire":"MESNARD, dit la Barotière, Christophe Mesnard en fait l'acquisition en 1640, et  enterré dans l'église en 1665. La Châtellenie de la Barotière est érigée en comté en 1768. Durant les guerres de Vendée, le château des Mesnard est incendié par deux soldats républicains du Camp des Quatre-Chemins-de-l'Oie. Le château de Mesnard est reconstruit en 1810 sur les ruines de l'ancien château. La duchesse de Berry visite en 1828, La Barotière et le château de son premier écuyer le comte de Mesnard, qui était près du Duc, lorsque celui-ci fût assassiné par Louvel en 1820. Le comte suivra la Duchesse dans toutes ces pérégrinations, jusqu'à Blaye où ils seront tous les deux emprisonnés. Il comparaîtra devant les assises de Montbrison pour avoir participé à l'expédition du \"Carlo-Alberto\". Acquitté, il ne cessera de s'occuper des intérêts de celle-ci. Sa mort en 1842 la privera d'un soutien efficace. La propriété des Mesnard passe par alliance à la vieille famille bretonne des Le Péletier de Rosambo, qui fait construire l'église actuelle de Mesnard-la-Barotière en 1871.  Location chambres d'hôtes par Fabien de Vion.","architecture":"MESNARD,ancien château dont la chapelle est inscrite au titre des M.H. par arrêté du 16 mars 1987. Cette chapelle du XVIe siècle fut dévastée pendant la Révolution. Après restauration, elle fut rendue au culte par Louis Charles Bonaventure Pierre, comte de Mesnard, en mémoire de son Altesse Royale M. le Duc de Berry. Ces deux personnages sont représentés sur les deux vitraux derrière l'autel. Les murs de la chapelle restaurée à la fin du XIXe, en style flamboyant, sont entièrement recouverts de peintures murales : coquilles et fleurs de lys.","habitants":"Comte de Mesnard,\r\n        \"","divers":"Mesnard; 46° 51' 35\" Nord, 1° 05' 55\" Ouest","gps":"","images":["../image/image_85/85_Mesnard_1.jpg","../image/image_85/85_Mesnard_2.jpg"]},"Consult_chateau_formulaire0017":{"id":"Consult_chateau_formulaire0017","dept":"85","canton":"Montaigu","commune":"Montaigu","nom":"Montaigu_Chateau","type":"Château","periode":"XV-XVIII-XIX","histoire":"Quatre châteaux à Montaigu, celui de Bois-Corbeau, de la Rochette , de Barillères et de la Lande.                                                  BOIS-CORBEAU Georges de Villebois-Mareuil du 22 mars 1847  est un militaire français. Il passe sa jeunesse au château familial du Bois-Corbeau.  Jean de Lattre de Tassigny y rencontra, au cours d'une garden-party chez la baronne Taylor, au château de Bois-Corbeau, Simonne Calary de Lamazière, en septembre 1926. Ils s'épouseront le 22 mars 1927- Le baron Olivier de Wismes, 1814-1887 : exposition du 12 mai au 31 juillet 1995, musée vendéen de Fontenay-le-Comte par la conservation départementale des musées de Vendée,  Wismes, Héracle Olivier Jean Baptiste.                                                                        ROCHETTES Fayau, autrefois, était souvent appelé le \"château Fayau\", du nom de son constructeur puis de ses propriétaires successifs. Aujourdhui et depuis 1981, il est parfois appelé \"maison\" des Rochettes, ou encore \"maison des associations\". \r\n GRANDE-BERNERIE  Il existe 6 petits châteaux privés, dans le village, témoignages des seigneuries d'autrefois, toujours présentes à Saint-Hilaire-de-Loulay. Il y a le château de la Preuille,  de la Lande, de Bois-Corbeau, de la Peinerie, de la Grande Bernerie et de la Mussetière.","architecture":"LA LANDE , dans le cadre de la 29e Journée européenne du patrimoine, ce sont 240 personnes qui ont pu visiter le château de La Lande, à Saint-Hilaire. Une visite exceptionnelle, puisque la famille De Durat a accepté d'ouvrir les extérieurs du château aux visiteurs : certains sont venus de Saint-Hilaire, de Saint-Georges, mais aussi de La Roche, comme Joël et Nadine, et même de Marignan, pour Serge et Michèle en vacances dans le secteur. Pendant une heure, Alexandre Marchand, responsable du patrimoine à Montaigu, a commenté la visite du domaine qui appartient à la même famille Buor.  La Lande depuis le XIIIe siècle. La façade principale néoclassique en granit et en pierre calcaire porte l'écusson de Guillaume Buor ; il a participé à la 8e croisade avec Saint-Louis, comme l'attestent les trois coquilles saint-jacques de son blason. Les deux blasons de Louis-Auguste de Cornulier (une tête de cerf et une hermine) et celui de sa femme Marie Richard de la Pervencherie à six losanges rappellent leur mariage en 1876 et ornent la façade arrière.","habitants":"baron Olivier de Wismes,                                                          famille Buor \r\n        \"","divers":"Montaigu;    46° 58' 27,12\" Nord et 1° 18' 49,32\" Ouest. Château des Lande grav 1 . Rochette grav 2. Boissière grav 3                Barillières grav 4  Grande Bernerie;  47° 00' 13\" Nord, 1° 19' 47\" Ouest grav-5. Bois corbeau grav-6","gps":"","images":["../image/image_85/85_Montaigu_Chateau_1.jpg","../image/image_85/85_Montaigu_Chateau_2.jpg","../image/image_85/85_Montaigu_Chateau_3.jpg","../image/image_85/85_Montaigu_Chateau_4.jpg","../image/image_85/85_Montaigu_Chateau_5.jpg","../image/image_85/85_Montaigu_Chateau_6.jpg"]},"Consult_chateau_formulairebb5c":{"id":"Consult_chateau_formulairebb5c","dept":"85","canton":"Montaigu","commune":"Montaigu","nom":"Montaigu_Fort","type":"Vestiges","periode":"XII-XVI","histoire":"A Montaigu, vestiges                                                                                                MONTAIGU, cependant, sa structure générale avec sa haute cour et sa basse cour, son donjon, la protection des plans d'eau formés par les chaussées sur la Maine et sur l'Asson, les importantes \"Douves intérieures\" le séparant de la Ville, remonte  à sa première famille seigneuriale qui le détient du milieu du XIe siècle au milieu du XIIIe siècle. Après 1241, les successeurs des Montaigu furent les Belleville, puis les Harpedanne, les La Trémoille, les La Lande de Machecoul, les de Crux et, enfin, les Juigné au moment de la Révolution. En 1473, Louis XI l'acquit momentanément dans la perspective d'en finir avec l'indépendance de la Bretagne. Durant les différentes guerres de Religion, le château fut un enjeu majeur entre protestants et catholiques: il changea huit fois de mains entre 1563 et 1588. En 1580 à la paix du Fleix, pour mettre fin à la menace qu'il constituait pour eux, les Nantais obtinrent qu'il fût démantelé, ce qu'ils réalisèrent en 1586. Pendant la Révolution, les bâtiments qu'il abritait servirent de casernement aux troupes de Kléber chargées, par le gouvernement révolutionnaire, de pratiquer la politique de répression dans la région. De mai 1800 à janvier 1809, son logis hébergea la sous-préfecture de Montaigu.  En 1843, il fut acquis par la ville . Dans les années qui suivirent, le maire fit raser l'essentiel des constructions anciennes qui y subsistaient et y fit construire un hôtel de ville.","architecture":"MONTAIGU Il en reste encore des vestiges visibles. A l'origine, il y avait une enceinte de forme ovoïde et flanquée d'une dizaine de tours et d'un châtelet d'entrée, situé au Nord-Est. La ville fortifiée était située au Nord de la forteresse et se prolongeait un peu à l'Est. Un fossé sec séparait la ville fortifiée de la forteresse. Une barbacane permettait de protéger le châtelet d'entrée. Un donjon roman de type niortais, avec sa cour et sa petite enceinte, était situé dans la cour du château, à peu près au milieu dans le sens Nord-Sud et situé Ouest.\r\nLa ville fortifiée s'étendait de la rue de Gaulle, une porte se situait au niveau du Carré de l'Europe la porte de Nantes, puis les remparts continuaient rue de la Place du Champ de Foire, puis redescendaient l'Esplanade des Olivettes, où une porte était située vers le rond-point des la rue des Jardins porte de Tiffauges puis les remparts longeaient l'Asson pour remonter rue du Pont Jarret et contourner la barbacane non loin du presbytère. Les douves sèches entourant la ville étaient profondes de 16 mètres au XVe siècle.","habitants":"Famille des Bezlleville\r\n        \"","divers":"Château fort de Montaigu sur motte","gps":"","images":["../image/image_85/85_Montaigu_Fort_1.jpg","../image/image_85/85_Montaigu_Fort_2.jpg","../image/image_85/85_Montaigu_Fort_3.jpg","../image/image_85/85_Montaigu_Fort_4.jpg"]},"Consult_chateau_formulairedd39":{"id":"Consult_chateau_formulairedd39","dept":"85","canton":"Les Herbiers","commune":"Montournais","nom":"Montournais","type":"Maison forte","periode":"XVI","histoire":"Deux châteaux à Montournais celui de la Maison-Neuve et de la Tourtelière.                                                                                                                               MAISON-NEUVE, ancienne maison-forte au bord d'un lac artificiel qui actionnait un moulin. Le logis entrepris vers 1480 fut achevé au début du XVIe siècle. Jardin à la Française créé vers 1670 après comblement partie du plan d'eau. Construction ou agrandissement des communs au XVIe siècle ; restauration de la chapelle et du salon au XVIIe siècle ; décor de boiseries du XVIIIe siècle. La construction du château de la Maison-Neuve date du XVe siècle de Montournais est un logis datant du XVe siècle. Cette ancienne maison forte entourée d'un Jardin à la Française est bordée d'un lac artificiel, a été le lieu de tournage du film \"La Ferme du pendu\" de Jean Dréville, en 1945, avec, comme acteurs principaux, Charles Vanel et Bourvil.                                                                                                                 TOURTELIERE, l'imposant château de la Tourtelière a  été construit au XIXe siècle. Jusqu'en 1997 il a abrité l'école normale libre de Vendée dite  de la Tourtelière.","architecture":"MAISON-NEUVE, est un logis datant du XVe siècle, ancienne maison forte entourée d'un jardin à la française et bordée d'un lac artificiel. Peu d'ouvertures sur l'extérieur : deux porches permettaient d'accéder dans la vaste cour. Le porche du Nord Ouest, double, possède des éléments d'ornementation : fronton, pilastres. Le granit étant moins facile à travailler que le calcaire, cette décoration reste sobre. On aperçoit, dans le prolongement du porche, la porte menant à la chapelle du logis. A l'extrémité opposée de la cour, le deuxième porche qui servait aux usages agricoles n'est pas décoré. Les deux porches constituaient des éléments essentiels de la protection de la Maison Neuve et des ses habitants. \r\n TOURTELIERE du XIXe siècle : ce château a abrité jusqu'en 1997 . L'institution a ensuite été déplacée à Pouzauges, et se nomme désormais le lycée Notre-Dame-de-la-Tourtelière de Pouzauges.","habitants":"Seigneurs locaux\r\n        \"","divers":"A Montournais Maison-Neuve; 46° 44' 33\" Nord, 0° 45' 43\" Ouest                   Tourtelière grav 4","gps":"","images":["../image/image_85/85_Montournais_1.jpg","../image/image_85/85_Montournais_2.jpg","../image/image_85/85_Montournais_3.jpg","../image/image_85/85_Montournais_4.jpg"]},"Consult_chateau_formulairef9f7":{"id":"Consult_chateau_formulairef9f7","dept":"85","canton":"Luçon","commune":"Moreilles","nom":"Moreilles","type":"château","periode":"XVII","histoire":"MOREILLES-ABBAYE, avant de devenir un château, la maison avait déjà une vocation d'accueil : la propriété est une ancienne abbaye,  La famille Renard est propriétaire du château de l'Abbaye.","architecture":"MOREILLES, la propriété est une ancienne abbaye, l'église a été rasée, mais le château et les dépendances, en particulier la porterie, datent du XVIIe. C'est au cours du même siècle que le château est construit pour l'abbé principal. Une nouvelle abbaye est érigée. Pendant la Révolution et les guerres de Vendée, le carré monastique est détruit. Le château et ses dépendances, dont la porterie, hôtel dite \"Le Portail\", sont vendus comme bien nationaux. Le parc, rare dans le marais, est planté en 1848, la grille est érigée la même année. Ses piliers sont peut-être les anciennes piles de la chambre du chapître. La petite chapelle est construite en 1854.","habitants":"Famille Renard\r\n        \"","divers":"Moreilles; 46° 25' 20\" Nord, 1° 05' 01\" Ouest","gps":"","images":["../image/image_85/85_Moreilles_1.jpg","../image/image_85/85_Moreilles_2.jpg","../image/image_85/85_Moreilles_3.jpg","../image/image_85/85_Moreilles_4.jpg"]},"Consult_chateau_formulairedfa9":{"id":"Consult_chateau_formulairedfa9","dept":"85","canton":"Roche sur Yon","commune":"Mortagne sur Sèvres","nom":"Mortagne_Sèvres","type":"Vestiges","periode":"XIV","histoire":"MORTAGNE, dès le XIe siècle, elle fut une baronnie. Les vicomtes de Thouars en étaient alors les suzerains. Les seigneurs de Mortagne furent Antier Ier de Mortagne vers 1040, puis son petit-fils Guillaume Ier de Mortagne dit Chotard vers 1083. Cette lignée sarrêtera avec la petite-fille de ce dernier, Sybille Chotard de Mortagne, qui se marie avec Pierre III de Chemillé.\r\nDe cette époque jusqu'à la Révolution Française, vont se succéder les Thouars, les Chemillé, les de La Haye, les Scépeaux, les Gondy et les Neuville de Villeroy. Le château fort en pierres est construit aux XIIe-XIIIe siècles. Pendant la guerre de Cent Ans, les anglais s'emparent de la forteresse et la renforcent, entre 1346 et 1373. Tellement renforcée que Olivier de Clisson, qui a délivré quelques places fortes redoutables, n'arrive pourtant pas à reprendre Mortagne-sur-Sèvre en 1372. Avec Bertrand Du Guesclin, il arrivera pourtant à s'en emparer. Les deux chefs militaires détenaient un capitaine anglais, Jean d'Evreux. Les anglais ne pouvaient retrouver leur capitaine qu'en échange de Mortagne-sur-Sèvre, qu'ils livrent aux français le 23 août 1373. Plusieurs siècles après, Henri de Navarre y a séjourné, au mois de septembre 1588.","architecture":"MORTAGNE, à la fin du XVIe siècle, de nouveaux travaux de renforcement du château ont lieu, avec la construction d'une grosse tour d'artillerie, dite \"des Anglais\"  Le château fort formait à l'origine une enceinte flanquée de tours qui épousait l'éperon granitique sud-ouest, dominant la vallée de la Sèvre nantaise. Un peu plus tard, le château fut agrémenté d'une ville fortifiée, dont on devine le tracé approximatif sur des plans cadastraux napoléoniens. Cette ville fortifiée renforçait les défenses du château fort placé à lextrémité du promontoire, et cette ville était constituée de trois enceintes. Cet ensemble de remparts urbains étaient percés de portes fortifiées, dont les noms sont cités dans des récits des guerres de Vendée, après la bataille de 1794, comme les portes Nantaise, Rochelaise, Saint-Louis, Poitiers  mais aussi la porte royale ayant probablement donné son nom à la rue qui la traversait jadis actuelle rue royale. De la même manière, les rues nantaise et St-Louis rappellent l'existence des portes des mêmes noms.","habitants":"Famille de  Pierre III de Chemillé.\r\n        \"","divers":"Vestiges de Mortagne 6° 59' 38\" N, 0° 57' 38\" O","gps":"","images":["../image/image_85/85_Mortagne_S%c3%a8vres_1.jpg","../image/image_85/85_Mortagne_S%c3%a8vres_2.jpg","../image/image_85/85_Mortagne_S%c3%a8vres_3.jpg","../image/image_85/85_Mortagne_S%c3%a8vres_4.jpg","../image/image_85/85_Mortagne_S%c3%a8vres_5.jpg"]},"Consult_chateau_formulaireb176":{"id":"Consult_chateau_formulaireb176","dept":"85","canton":"Les sables d","commune":"La Mothe-Achard","nom":"Mothe_Achard","type":"Château","periode":"XII-XVI","histoire":"MOTHE-ACHARD, le premier château du IXe siècle, fortifié par la suite aux XIe et XIIe siècle a été démoli en 1420.A son emplacement, la famille de Brandois a fait construire lactuel vieux château en 1773. Après la Révolution, le château qui avait été confisqué et vendu comme bien national est revenu à la famille Foucher de Brandois. En 1868, Paul Foucher, baron de Brandois de 1832 à 1887 a fait construire un autre château à La Forêt. En 1908, Olivier de Brandois, maire de La Mothe-Achard, a dû vendre le château du bourg devenu « Vieux Château ». M. Erieau dAizenay, le nouveau propriétaire, en a supprimé le 2ème étage en 1912.  Au XVe siècle, cette commune appelée « Brandois » est rattachée à la vicomté de Thouars qui appartient alors à la famille d'Amboise. Le château de Brandois, datant de la fin du XIXe siècle, qui a conservé l'ancien nom, se dresse au cur d'un domaine de 22 hectares.Le 1er janvier 2017, La Mothe-Achard devient une commune déléguée de la commune nouvelle Les Achards après fusion avec La Chapelle-Achard.","architecture":"MOTHE-ACHARD,  Edifice de plan rectangulaire à deux niveaux  pavillon d'entrée saillants à trois niveaux  accolé d'une tour ronde et tour carrée sur flan de côté et à l'opposée une tour ronde, toit en poivrières pour les tours rondes , toit en croupe le corps de logis avec lucarnes à pinacles. Les écuries du château sont dabord devenues la salle de patronage (théâtre), avant de devenir une imprimerie. Elles ont conservé les formes des portes permettant aux chevaux de passer, gardant ainsi leur âme. À l'origine une motte féodale est l'ancêtre du château fort. Un seigneur Achard (nom d'origine germanique, Akard) a donné son nom à ce lieu.","habitants":"famille de Brandois\r\n        \"","divers":"A la Mothe-Achard Brandois grav 1 à 4","gps":"","images":["../image/image_85/85_Mothe_Achard_1.jpg","../image/image_85/85_Mothe_Achard_2.jpg","../image/image_85/85_Mothe_Achard_3.jpg","../image/image_85/85_Mothe_Achard_4.jpg"]},"Consult_chateau_formulaire641a":{"id":"Consult_chateau_formulaire641a","dept":"85","canton":"les Sables d","commune":"La Mothe_Achard","nom":"Mothe_Achard_II","type":"Château","periode":"XIX","histoire":"FORET, en 1869 Jean Foucher, Baron de Brandois entame la construction du château de La Forêt, au cur dun domaine de 22 hectares.  Le château de La Forêt est resté une demeure privée jusquen 1922. En 1921, lensemble du domaine est légué à lInstitution des Frères de Saint Gabriel par la famille Eriau, second propriétaire. Les Frères de Saint-Gabriel vont créer lécole dagriculture. La réputation de lécole dépasse les frontières du département et de la région. En 1949, la première maison familiale de garçons du département ouvre ses portes dans le domaine. Lécole déménage à La Roche-sur-Yon en 1966 (Les Etablières). En 1968, le domaine est acquis par le centre de promotion sociale qui y implante un établissement consacré à la formation générale et professionnelle des adultes. En 2005, le domaine devient une propriété privée et un hôtel haut de gamme y est ouvert par la suite.","architecture":"PIN MACEE,  en 1613, le chevalier René de Brachechien, est seigneur du Pin-Massé. Sa petite-fille, Marie de Brachechien, épouse Julien Aymon de La Petitière. Leur fils, Louis Aymon, baron de Belleville, en hérite. Samuel-Jacques Mercier, époux de Marie-Ursule de Courcelles, l'acquiert vers 1740. Leur fils Pierre-Gilles Mercier du Pin, lieutenant au bataillon de Poitiers, vend le Pin-Macé vers 1800 à l'avocat René-François Dorion, sieur de La Touche,  et à son épouse Marie-Anne Porchier de La Thibaudière.  Les descendants des Dorion revendent le Pin-Macé à la fin du XIXe siècle à Adrien Sanson de Bricville, petit-fils de la marquise de Combray, et son épouse Élisabeth Marc. Leur fils Maurice Sanson de Bricville marié à Mlle Servanteau de La Brunière, qui fut longtemps maire de la commune de Saint-Georges-de-Pointindoux, en hérite, avant de le transmettre à sa cousine germaine Marguerite Marc, épouse du colonel Paul Dumas-Vence (fils de l'amiral), dont les filles en héritent par la suite. L' édifice  quadrangulaire a deux niveaux flanqué de tours rondes et carrées  aux angles toits en poivrières.","habitants":"Famille Eriau,\r\n        \"","divers":"Château à la Mothe Achard Pin-Macée grv 1-2 Manoir des Achards grav 3-4 st Christophe grav 5 Château vieux grav 6","gps":"","images":["../image/image_85/85_Mothe_Achard_II_1.jpg","../image/image_85/85_Mothe_Achard_II_2.jpg","../image/image_85/85_Mothe_Achard_II_3.jpg","../image/image_85/85_Mothe_Achard_II_4.jpg","../image/image_85/85_Mothe_Achard_II_5.jpg"]},"Consult_chateau_formulaire8c94":{"id":"Consult_chateau_formulaire8c94","dept":"85","canton":"Les Herbiers","commune":"Mouchamps","nom":"Mouchamps","type":"Château","periode":"XV-XVIII-XIX","histoire":"A Mouchamps le manoir de la Bobinière, celui du Colombier et du Parc Soubise (voir article).                                                                                        BOBINIERE, à la fin du XIXe siècle, Ernest Masson et Nelly De Ladouespe rasent l'ancien logis de La Bobinière pour y édifier un château plus confortable. En 1892, le propriétaire, très attaché à l'évolution de l'agriculture dans sa région et fondateur de syndicats agricoles, manifeste cet intérêt dans les dépendances de la Bobinière.                                                                                                        COLOMBIER manoir,  à une question de son secrétaire lui demandant si les Clemenceau sont de lAubraie, Georges Clemenceau, ancien président du Conseil, répond : « Non, les Clemenceau sont de Mouchamps, vous ne connaissez pas le Colombier. Cest le petit château de la famille ! » Les Clemenceau sinstallent au Colombier à la fin du XVIIe siècle construit en 1885 par Benjamin Clemenceau, père de Georges Clemenceau.                                                                                                          FIEF-GOYAU, elle doit son nom à son propriétaire Enjubaud Goyau, seigneur du Fief-Goyau et da la Barotière, mort avant 1253, toujours appelé le moulin du Fief Goyau","architecture":"BOBINIERE, volumes, matériaux utilisés et disposition des bâtiments constituent le parfait exemple d'une ferme modèle. Les Logis du Chaix et du Four à pain sont situés dans le parc de la propriété et chacun d'entre eux possède son propre jardin avec sa terrasse.                                                                                                           CEDRES,  chambres d'hôtes d'Agnès et Frédéric Auclair. \r\n COLOMBIER, cest le petit château de la famille ! » Les Clemenceau sinstallent au Colombier à la fin du XVIIe siècle. La façade de cette gentilhommière dun type très répandu en Poitou, et datant de lépoque Renaissance, est encadrée de deux échauguettes. Sur le côté, une grosse tour ronde surplombe le pont Clemenceau construit en 1885 par Benjamin Clemenceau.                                                                                                         FIEF-GOYAU, il a conservé peu de vestiges médiévaux, l'ensemble, plusieurs fois remanié, garde la physionomie de ces logis poitevins du XVIe siècle. La maison de maître et les communs forment une cour qui était autrefois entourée de douves, dont les restes sont encore visibles à l'entrée.","habitants":"Bobinière, Famille d'Ernest Masson                                       Colombier; Famille clémenceau\r\n        \"","divers":"A Mouchamps le château de la Bobinière grav 1. des Cédres grav 2. du Colombier grav 3-4","gps":"","images":["../image/image_85/85_Mouchamps_1.jpg","../image/image_85/85_Mouchamps_2.jpg","../image/image_85/85_Mouchamps_3.jpg","../image/image_85/85_Mouchamps_4.jpg"]},"Consult_chateau_formulaire1d30":{"id":"Consult_chateau_formulaire1d30","dept":"85","canton":"La Châtaigneraie","commune":"Saint-Pierre-du-Chemin","nom":"Ménardière","type":"Maison forte","periode":"XVII","histoire":"MENARDIERE, construit au XVe siècle, il a d'abord appartenu aux seigneurs de Grignon. À la suite d'une sentence en 1579, il fut démoli, puis reconstruit début XVIIe siècle. Jean d'Asnières de la Châtaigneraye et sa famille en furent alors les heureux propriétaires.  Durant la Révolution, le château fut incendié par des colonnes infernales. La femme du dernier des d'Asnières à posséder le château fonda un hôpital à Saint Pierre du Chemin : Enfin, la Menardière fut vendue à la famille Savary de Beauregard, puis passa par héritage aux La Barre de Nanteuil, puis aux du Plessis de Grenedan, propriétaires actuels.  Ce château fut constamment habité par des familles riches et importantes jusqu'à la Révolution. À cette époque, ce devait être l'une des plus belles demeures de la région. La famille propriétaire jusqu'au siècle dernier était de la lignée d'Asnières de la Châtaigneraie. L'un des héritiers eut le mérite de redonner au logis un peu de splendeur. Les propriétaires actuels, M. et Mme Du Plessis de Grenédan, ont remis en valeur le logis par une fort belle restauration.                                                                                                               Au nord à Ménomblet le château de la FAUCONNIERE,  Hélion de Villeneuve de 1833 à 1907 qui habitait Fontenay-le-Comte ou Saint-Michel-le-Cloucq en a hérité. Le logis étant très délabré, il décida de faire construire ce château néo-Renaissance qui a été achevé en 1904. Albert de Villeneuve-Esclapon de 1904 à 1996 a hérité du château. Il s'est marié avec Marie-Thérèse d'Harcourt, actuelle comtesse de Villeneuve, toujours propriétaire du château. Le comte a été maire de Menomblet de 1933 à 1974 (41 ans) et conseiller général.","architecture":"FAUCONNERIE,  est une très ancienne seigneurie de Menomblet, le logis, en contrebas de la demeure qui a brûlé, daterait du XVIIe siècle, classé aux M.H. Marie-Thérèse de Villeneuve est arrivée jeudi matin. Son château avait brûlé, mais elle a  relativisé la situation  habité toute l'année, la propriétaire était absente au moment du sinistre. Des ouvriers travaillaient sur les lieux, ils ont donné l'alerte mercredi matin vers 10 heures. La façade est encore majestueuse. Mais les dégâts sont considérables. Ils seront longs à évaluer.                                                                          MENARDIERE, ce château, construit au XVe siècle, a conservé de sa splendeur originelle un majestueux escalier, d'élégantes balustrades et des clés de voûtes armoriées complètent la décoration. À droite de l'entrée principale s'ouvrait une autre porte, sans doute celle d'origine, il n'en reste qu'un entourage de pierre blanche, mais qui est une véritable dentelle. Comme vous avez pu le constater sur la photo, le château de la Ménardière est intégré à une ferme : il est situé sur un domaine agricole et sur une terre noble à la fois ; On peut donc dire qu'il constitue la synthèse architecturale entre le château et la métairie. Ils viennent de mener à bien une belle opération de sauvetage de lédifice, grâce à eux le site, promis aux ronces et aux éboulis, a repris vie. Gîte de France.","habitants":"Plessis  de Grenedan\r\n        \"","divers":"A Saint-Pierre-du-Chemin le château  de la Ménardière; 46° 42' 37\" nord, 0° 41' 20\" ouest grav 1 à 4.  Fauconnière grav 5 -6","gps":"","images":["../image/image_85/85_M%c3%a9nardi%c3%a8re_1.jpg","../image/image_85/85_M%c3%a9nardi%c3%a8re_2.jpg","../image/image_85/85_M%c3%a9nardi%c3%a8re_3.jpg","../image/image_85/85_M%c3%a9nardi%c3%a8re_4.jpg","../image/image_85/85_M%c3%a9nardi%c3%a8re_5.jpg","../image/image_85/85_M%c3%a9nardi%c3%a8re_6.jpg"]},"Consult_chateau_formulaire6354":{"id":"Consult_chateau_formulaire6354","dept":"85","canton":"La Roche-sur-Yon-2","commune":"Nesmy","nom":"Nesmy","type":"château","periode":"XVIII","histoire":"NESMY, au Moyen-Age, la terre et la seigneurie de Nesmy formaient une châtellenie avec droit de haute et basse justice. Le château a été édifié à la fin du XVIIIe siècle sur les fondations d'un ancien domaine appartenant aux Ascelin, sur une terrasse remontant sans doute au XVIe siècle, Parc agrandi par les frères Bühler vers 1860, en même temps que la mise au goût du jour du château par l'architecte Guillerot.","architecture":"NESMY, ancienne maison seigneuriale rebâtie à la fin du XVIe siècle sur une terrasse remontant sans doute au XVIIIe siècle,  de plan rectangulaire à deux niveaux  et lucarnes à pinacles sur un toit en croupe, pavillon d'entrée saillant flanqué de deux échauguettes au fronton triangulaire,   Ensuite, divers remaniements, surélévation et décoration de la toiture, création des 2 tours rondes sur angles de la  façade toit  en poivrière avec lucarnes lui donnent laspect quil arbore aujourdhui. Accompagnée d'un parc avec plan d'eau, chaussée, île artificielle vers 1800. Parc agricole et paysager aménagé en 1842 par le pépiniériste-horticulteur et création de jardins André Leroy, accompagnant une modernisation du château à la même époque, ainsi que la construction de communs néo-classiques à l'italienne par l'architecte François Léon Liberge. Le château, lui, daterait du XVIe siècle. Il a traversé les remous de lhistoire tout en restant dans la même famille. Jusquau milieu du XIXe siècle il avait lapparence dun logis Vendéen classique.\r\nSachant que les propriétaires actuels résident dans le logis.","habitants":"Famille d'Ascelin\r\n        \"","divers":"Mesny; 46° 35' 45\" nord, 1° 24' 17\" ouest","gps":"","images":["../image/image_85/85_Nesmy_1.jpg","../image/image_85/85_Nesmy_2.jpg","../image/image_85/85_Nesmy_3.jpg"]},"Consult_chateau_formulaire6acc":{"id":"Consult_chateau_formulaire6acc","dept":"85","canton":"Saint-Jean-de-Monts","commune":"Noirmoutier-en-Ile","nom":"Noirmoutier","type":"Forteresse","periode":"IX-XIV-XIX","histoire":"NOIRMOUTIER,   cité en 830 avec la construction d'un castrum par l'abbé Hilbold, du monastère de Saint-Philbert, pour défendre les moines et la population de l'île, contre les vikings.  L'île se retrouve alors sous la coupe des seigneurs de La Garnache qui firent construire le château qui sera détenu par la famille de la Trémoille, vicomte de Thouars. Le château  résistera à de nombreuses attaques : les Anglais en 1342 et en 1360 puis en 1386 sous les ordres du comte d'Arundel, les Espagnols en 1524 puis en 1588. Mais, en 1674, le château  sera pris par les troupes hollandaises de l'Amiral Tromp. En 1690, une maison fut construite dans l'enceinte du château pour le seigneur de La Paunière, gouverneur de l'île et du château. Il en fera sa demeure. Le château  fut vendu en 1720, à Louis IV Henri de Bourbon-Condé qui le revendra, en 1767, à Louis XV.  Durant la Révolution, le château servit de prison militaire :. En 1871, durant la Commune, des insurgés y furent emprisonnés.                                                                      PELAVE, Gérard Beaupère, propriétaire de lhôtel du Pélavé, vient de vendre son bien aux nouveaux propriétaires : la société Michel-Ange, de la famille Arthus-Bertrand, hôtel restaurant.                                                      ELBEE monsieur Sabry a voulu perpétuer le souvenir du Général d'Elbée,  y  sera incarcéré avant d'être fusillé sur la place d'arme par les troupes républicaines.","architecture":"NOIRMOUTIER;  sur le site dun castrum élevé au IXe siècle par les moines pour résister aux assauts normands sont bâtis au XIIe siècle un donjon et son enceinte quadrangulaire de 50x 100 m, fortifiée. lensemble de la structure garde une fonction militaire jusqu'à la Révolution, et sert ensuite de casernement pendant tout le XIXe siècle. Le château  est reconstruit en pierre au XIIe siècle par le pouvoir féodal qui essaie de stabiliser la région, en empêchant les pillages normands.  Lensemble de la structure garde une fonction militaire jusqu'à la Révolution, et sert ensuite de casernement pendant tout le XIXe siècle. Le donjon carré, fortifiée de 19x15,50, haut de 18 m, flanqué de tourelles dangle dont deux coiffées de toitures en poivrières et de contreforts hémicylindriques est de même type que dautres donjons de la région de même époque (Tiffauges, Pouzauges), louverture de baies géminées à décor trilobé et de fenêtres à meneaux dans les parties supérieures témoigne des réaménagements du XIVe siècle pour le confort de la résidence.  ce donjon  dans une enceinte rectangulaire entourés de hautes murailles pourvue de tours sera construite et entourera la basse-cour et abrite encore aujourd'hui le logis du seigneur de la Paunière gouverneur de l'ile et du château. Depuis 1993, le château  accueille dans ses murs et dans sa cour, le \"Festival de Noirmoutier-en-l'Ile\", organisé par le \"Théâtre régional des Pays de la Loire\".  Depuis 1905, il abrite un musée.","habitants":"Famille de la Trémoille\r\n        \"","divers":"Château de Noirmoutier                     47° 00' 01\" Nord et 2° 14' 33\" Ouest   Grav 1 à 6 Elbée grav 7-8","gps":"","images":["../image/image_85/85_Noirmoutier_1.jpg","../image/image_85/85_Noirmoutier_2.jpg","../image/image_85/85_Noirmoutier_3.jpg","../image/image_85/85_Noirmoutier_4.jpg","../image/image_85/85_Noirmoutier_5.jpg","../image/image_85/85_Noirmoutier_6.jpg","../image/image_85/85_Noirmoutier_7.jpg","../image/image_85/85_Noirmoutier_8.jpg"]},"Consult_chateau_formulaire0113":{"id":"Consult_chateau_formulaire0113","dept":"85","canton":"Fontenay-le-Comte","commune":"Oulmes","nom":"Oulmes","type":"Château","periode":"XVI","histoire":"OULMES, le bourg a toujours formé un tout autour de son château jusquà la Révolution, son histoire ne peut être séparé de lhistoire de la seigneurie qui relevait des comtes du Poitou. L'édifice actuel a été construit à l'emplacement d'un premier château édifié pour Charles de Vivonne au XVIe siècle, détruit à la fin du XVIIe siècle ou au début du XVIIIe siècle.","architecture":"OULMES, la propriété se compose de deux parties distinctes, les communs et le pavillon ou le château proprement dit. Les communs immense construction de la fin du XVIIe siècle, présentant la forme dun fer à cheval, ont été élevés à limitation des casernes de Versailles. La tradition locale va jusquà les attribuer à Mansart de même quelle attribue les jardins à André Le Nôtre. Lancien pigeonnier seigneurial existe toujours. Le pavillon a été bâti de 1759 à 1764. Cest une belle habitation que précèdent des douves. Côté jardins, un bas-relief, encastré dans le fronton, représente les occupations habituelles des anciens châtelains de lendroit.","habitants":"Famille de Charles de Vivonne\r\n        \"","divers":"Oulmes; 46° 23' 59\" nord, 0° 39' 41\" ouest","gps":"","images":["../image/image_85/85_Oulmes_1.jpg","../image/image_85/85_Oulmes_2.jpg","../image/image_85/85_Oulmes_3.jpg","../image/image_85/85_Oulmes_4.jpg"]},"Consult_chateau_formulaire29e8":{"id":"Consult_chateau_formulaire29e8","dept":"85","canton":"Challans","commune":"Palluau","nom":"Palluau","type":"vestiges","periode":"XVII","histoire":"FORT de PALLUAU, résistera aux Anglais. Au XIVe siècle, Létice de Parthenay, épouse de Maurice de Belleville,  Dame de Paluya  y tint une  cour damour, qui regroupait des artistes, chanteurs, poètes et littéraires. Un certain Milhon, troubadour, fit pour elle quantité de chansons et poésies. La légende raconte que le trésor du château de Palluau serait un jeu de quilles en or massif, caché à trois vols de chapon de la chambre de la Dame du Seigneur mais ce trésor ne fut jamais retrouvé, par les femmes  fautes de postérité masculine; les Clisson, les Penthiève, les Gouffier, en 1437 les terrres furent érrigée en baronnie  en faveur de Jean de Brosse. A l'emplacement de l'ancienne forteresse a été reconstruit un château en 1661 pour le maréchal de Clérambault, maréchal de France. En 1713 érigé en comté au profit de  Jérome Phélypeaux comte de Pontchartrain le cèda à son fils Paul-Jérome marquis lieutenant général des armées du roi modifié au XVIIIe siècle. En 1774 la famille Phélipeaux se défait de Palluau au profit du marquis d'Asnières.  Le château de Palluau changera de nombreuses fois de propriétaires au cours des siècles. Le château de Palluau est inscrit aux M.H. par arrêté du 20 mai 1998. Il ne reste que des vestiges.","architecture":"FORT de PALLUAU, est en ruines aujourd'hui, cette ancienne forteresse, flanquée de 6 tours et entourée de larges fossés. La construction date du XIIIe siècle. En 1369 à 1371, une garnison d'arbalétriers occupait le château. Il y avait aussi, des armes à feu comme les canons. La forteresse servira de verrou, du XIIe au XIVe siècle, entre le Poitou et la Bretagne, région de marches sérieusement disputées. Assiégé en 1371, le château de Palluau résistera aux Anglais.  construit au XIIIe siècle, englobant un vicus et une église paroissiale, aujourd'hui disparus avec enceinte fortifiée flanquée de tours et un corps de logis cantonné de tours, reposant sur un soubassement à chemin de ronde bas en gaine dans le talus de la motte. A l'emplacement de cette ancienne forteresse, reconstruction d'un château en 1661 pour le maréchal de Clérambault et modification au XVIIIe siècle par le comte de Pontchartrain. Incendié en 1793 pendant la révolution, il est resté en ruine depuis cette époque. L'intérêt de cet édifice tient autant aux vestiges médiévaux qu'à ceux du château du XVIIe siècle.","habitants":"maréchal de Clérambault\r\n        \"","divers":"Vestiges à Palluau 46° 48' 7,56\" Nord, 1° 37' 13,44\" Ouest                          46° 48' 21\" nord, 1° 37' 06\" ouest","gps":"","images":["../image/image_85/85_Palluau_1.jpg","../image/image_85/85_Palluau_2.jpg","../image/image_85/85_Palluau_3.jpg","../image/image_85/85_Palluau_4.jpg","../image/image_85/85_Palluau_5.jpg"]},"Consult_chateau_formulairec10f":{"id":"Consult_chateau_formulairec10f","dept":"85","canton":"Les Herbiers","commune":"Mouchamps","nom":"Parc_Soubise","type":"Château","periode":"XVII-XVIII","histoire":"PARC-SOUBISE, sa construction date du XVIIe, de la fin du XVIIIe et du XIX siècle,  fut la demeure principale de la famille de Parthenay-Larchevêque. Après le décès de Jean V de Parthenay seigneur de Soubise en 1566, il passe par sa fille, Catherine de Parthenay, dans la famille de Rohan en 1575. C'est là que le mathématicien François Viète, fondateur de l'algèbre nouvelle, s'initia à cette science auprès de son élève. En 1623, sur ordre du roi Louis XIII, les défenses furent démantelées. A la mort d'Henri II de Rohan, fils de la précédente, le Parc-Soubise, entre par sa fille dans la famille de Rohan-Chabot. Tombé en désuétude, le château des Parthenay est vendu et rasé en 1771. L'actuel château du Parc-Soubise est construit sous les ordres du nouveau propriétaire, Pierre Bonfils, riche négociant de La Rochelle sur les ruines de l'ancien manoir Renaissance. En 1784, le comte Charles-Augustin de Rohan-Chabot le rachète et entreprit de nouveaux travaux. Le 31/01/1794, alors qu'elle vient d'épargner les habitants de Le Boupère, la colonne infernale de Lachenay va massacrer 200 femmes, enfants et vieillards dans la cour du château et incendier celui-ci.","architecture":"PARC-SOUBISE, a la rentré d'exil, le comte de Chabot décide de conserver le château tel quel,  Il na jamais été restauré depuis. , hormis son toit qui protège les ruines.  de plan rectangulaire à trois niveaux, toit en croupe pavillon en retour d'équerre de même niveau. Le château du Parc Soubise est classé aux M.H. depuis 1987. Le château, pour ses façades, toitures et le grand escalier, ainsi que la chapelle (hors décors) et la maison de Tournebride font lobjet dune inscription aux M.H. depuis le 23/12/1987.","habitants":"Famille de Parthenay-Larchevêque.\r\n        \"","divers":"A Mouchamps le château de Parc-Soubise; 46° 48' 25\" Nord et 1° 05' 14\" Ouest","gps":"","images":["../image/image_85/85_Parc_Soubise_1.jpg","../image/image_85/85_Parc_Soubise_2.jpg","../image/image_85/85_Parc_Soubise_3.jpg"]},"Consult_chateau_formulaire7a25":{"id":"Consult_chateau_formulaire7a25","dept":"85","canton":"Chantonnay","commune":"le Boupère","nom":"Pelissonnière","type":"Château","periode":"XVI","histoire":"PELISSONNIERE,  ancien château Renaissance comprenant en 1647 un donjon et un manoir principal, Il fut transformé au XIXe siècle pour le vicomte Zénobe Frottier de Bagneux qui fit installer dans le grand salon la grande cheminée du prieuré de Mouzeuil.  En 1828, la Duchesse de Berry séjourna au château de la Pélissonnière, aujourd'hui est la propriété d'une personne privée.","architecture":"PELISSONIERE, date du XVIe siècle, cet ancien manoir de style Renaissance, comprenait, en 1647, un donjon et un manoir principal, qui fut transformé au XIXe siècle pour le vicomte Zénobe Frotier de Bagneux qui fit installer dans le grand salon la grande cheminée du prieuré de Mouzeuil-Saint-Martin.   Éléments protégés MH : la tour isolée dans le parc et la cheminée Renaissance du logis : inscription par arrêté du 14 novembre 1997.","habitants":"Famille du vicomte Zénobe Frottier de Bagneux \r\n        \"","divers":"A boupère le château de Pélissonnière; 46° 46' 27,85\" Nord et 0° 57' 30,42\" Ouest","gps":"","images":["../image/image_85/85_Pelissonni%c3%a8re_1.jpg","../image/image_85/85_Pelissonni%c3%a8re_2.jpg","../image/image_85/85_Pelissonni%c3%a8re_3.jpg","../image/image_85/85_Pelissonni%c3%a8re_4.jpg","../image/image_85/85_Pelissonni%c3%a8re_5.jpg"]},"Consult_chateau_formulaire6e73":{"id":"Consult_chateau_formulaire6e73","dept":"85","canton":"Les Sables-d","commune":"Olonne sur-Mer","nom":"Pierre_Levée","type":"Château","periode":"XVIII","histoire":"PIERRE-LEVEE , construit pour Luc Pezot, receveur des tailles et armateur sablais, exemple parfait du grand bourgeois riche et ambitieux qui, à la veille de la Révolution Française, se faire construire un château royal, en 1789 acquis en viager par Louis-Jacques Fayau seigneur de l'Oliveraie notaire royal de la Roche sur Yon, époux de Marie Anne Mourain de Beauregard, leur fille Marie-Anne-Marguerite épouse Augustin-Moïse Auvynet fils d'un magistrat la descendance Auvynet Charles-Marie officier de Marine reçoit sa belle mère  à Pierre-Levée madame de Joannis qui pris une part active à l'insurrection vendéenne au côté de son frère Charles-Henri-Félicité de Sapinaud de la Rairie lieutenants de Charette.   Le château transmis de génération en génération  à la mort du dernier descendant des Auvynet,  il passe aux la Roche- st-André descendants de madame Houillier de Villedieu , née Marguerite-Marie Auvynet.   Chaque année a lieu un spectacle magnifique. Evoluant dans le parc du château au milieu de parterres fleuris de roses, 200 acteurs font revivre l'histoire de ce haut lieu d'Olonne de l'origine de l'humanité jusqu'aux temps modernes en passant par la construction du château de Pierre-Levée et la sanglante période révolutionnaire. Le château de Pierre-Levée est inscrit aux M.H. en 1948 , et classé aux M.H. le 5/07/1949. propriété de Mme Avuynet et de M.de la Roche Saint-André.","architecture":"PIERRE-LEVEE, est un monument du XVIIIe siècle construit sur un haut-lieu de la préhistoire,sur  le modèle du Petit Trianon à Versailles; selon les plans de larchitecte Gabriel, élevé sur un rez-de-chaussée et un étage carré, l'édifice  couvert d'un toit plat dissimulé par une balustrade à l'italienne présente du côté de l'arrivée un avant corps coiffé d'un fronton triangulaire offrant de part et d'autre de la baie éclairant l'étage, des bas reliefs sculptés, sur le jardin un avant corps à pans coupés en forte saillie, occupe le centre de la façade, et chacune de ses baies son ornées à leur clef  d'élégants motifs. Rythmé  par six travées. Le château doit son nom aux deux menhirs érigés à proximité. Augmenté à  la fin du XIXe siècle sur le côté droit de la cour d'honneur une aile ne dépare pas l'ensemble, des origines de l'humanité à la construction de ce château qu'on appelle encore aujourd'hui \"Le Petit Trianon Vendéen\".","habitants":"Famille de Luc Pezot\r\n        \"","divers":"A Olonne sur Mer Pierre-levée; 46° 31' 42\" Nord, 1° 45' 01\" Ouest","gps":"","images":["../image/image_85/85_Pierre_Lev%c3%a9e_1.jpg","../image/image_85/85_Pierre_Lev%c3%a9e_2.jpg","../image/image_85/85_Pierre_Lev%c3%a9e_3.jpg","../image/image_85/85_Pierre_Lev%c3%a9e_4.jpg"]},"Consult_chateau_formulaire3b8b":{"id":"Consult_chateau_formulaire3b8b","dept":"85","canton":"La Châtaigneraie","commune":"Saint-Laurent-de-la-Salle","nom":"Plessis_le_Franc","type":"Château","periode":"XVII","histoire":"PLESSIS le FRANC, Jehan et Nicolas des Boucheaux, sont en 1451 seigneurs du Plessis Le Franc. Puis Etienne Le Franc, seigneur du Plessis Le  Franc épouse en 1578 Geneviève Grelier. Louis Le Franc, seigneur du Plessis le Franc, épouse Marie Durcot de Puy Tesson, dame de Puy Tesson. En 1692 Antoine-Louis Eschallard épouse Suzanne-Aimée Le Franc, qui en 1711 a le Plessis par retrait lignager.","architecture":"PLESSIS le FRANC, le château du Plessis le Franc a été bâti à lemplacement dun ancien haras en 1440, de plan rectangulaire à deux niveaux avec lucarnes sur comble accolé de part et autre de pavillons carrées. il subsiste une très belle cour intérieure, ainsi qu'un pigeonnier aux 2000 boulins en parfait état.","habitants":"Antoine-Louis Eschallard \r\n        \"","divers":"A Saint-Laurent-de-la-Salle le château de  Plessis-le-Franc; 46° 34' 12\" nord, 0° 55' 26\" ouest","gps":"","images":["../image/image_85/85_Plessis_le_Franc_1.jpg","../image/image_85/85_Plessis_le_Franc_2.jpg","../image/image_85/85_Plessis_le_Franc_3.jpg"]},"Consult_chateau_formulaire5af7-2":{"id":"Consult_chateau_formulaire5af7-2","dept":"85","canton":"Fontenay-le-Comte","commune":"Pisotte","nom":"Poiron_Pisotte","type":"Château","periode":"XIX","histoire":"POIRON, le château du Poiron, reconstruit en 1887 a une longue histoire qui remonte au XIVe siècle. La famille Dorin a son origine puis aux Poiron et aux Ligné. Jacques Dorin, seigneur du Poiron, épouse en 1636 Louise Grelier, dame de la Boucherie à la Jaudonnière. Les Dorin n'ont pas fait souche ailleurs et seront également seigneurs de Saint-Cyren Talmondais pendant les deux dernières générations. Louis Béjarry de la Louerie, marié à Catherine Thomas en 1631, sera seigneur du Poiron. René-Augustin de Mouillebert, seigneur de Puysec, épouse en 1725 Marie Brunet de la Soulière, et achète vers 1742 le Poiron. Neslie des Roches de Chassay, héritière du Poiron, épouse en 1845 Louis-Félix de Chantreau. Depuis plus de 15 ans maintenant, Françoise et Mark, en ont fait leur home sweet  mais aussi leur source de revenus, ont transformé le château en chambre d'hôtes.","architecture":"POIRON, la propriété se situe à l'orée du village de Pissotte dans le sud de la Vendée, le château est édifié sur un domaine de dix hectares. De plan rectangulaire à deux niveaux  et lucarnes sur toit à la mansart.","habitants":"Famille de Neslie des Roches de Chassay,\r\n        \"","divers":"château de Poiron à Pisotte","gps":"","images":["../image/image_85/85_Poiron_Pisotte_1.jpg","../image/image_85/85_Poiron_Pisotte_2.jpg"]},"Consult_chateau_formulaire9e26-2":{"id":"Consult_chateau_formulaire9e26-2","dept":"85","canton":"Aizenay","commune":"Le Poiré-sur-Vie","nom":"Poiré_sur_Vie","type":"Château","periode":"XV-XVIII","histoire":"deux châteaux dans cet article de Poiré sur Vie  celui de la Métairie, et celui de Pont de Vie.                                                                  METAIRIE, c'est la famille de Marchand que nous trouvons à la Métairie au XVe siècle. Dès 1648,  Jeanne du Ponceau arrière petite fille  de Claude Marchand et d'Antoinette de Barro, épouse d'Alphonse Vaz de Mello docteur qui sinstallent et y demeurent jusquà la Révolution. En quelques années, la famille va totalement disparaître. le fils André-Alexandre Vaz de Mello et Marguerite Charette de la Verièrre ont été les derniers propriétaires de cette famille. Tous deux meurent en laissant leurs six enfants : deux garçons et quatre filles. Deux de leurs tantes sont restées à leur côté, histoire tragique \"quatre demoiselles de la Métairie\" cependant les quatre filles et leur servante sont parties afin de fuir larmée de Mayence qui saccageait toute la Vendée, mais elles sont arrêtées et guillotinées le 20 décembre 1793 sans avoir été jugées. En 1799 le château a été acheté par le général Travot qui avait capturé auparavant le général Charette. La propriété vendue en 1799 à Ossian Morin d'Yvonnière et son épouse Josephine Meunier  Appartient aujourd'hui à Christian Gensollen.                                             PONT de VIE,  le général Travot, en 1796, décide d'en faire son quartier général. Tous les prisonniers devaient passés par Pont-de-Vie avant de partir pour le Tribunal des Sables. Le 26 mars 1796, après avoir capturé le Général Charette, le Général Travot le fit transporter au château, où il passa sa première nuit de captivité. Puis, il repartit, le lendemain pour Angers, où il fut fusillé place Viarme à Nantes.","architecture":"METAIRIE, du XVe siècle,  un grand porche dans lequel s'encadrent une porte charretière et deux portes piétonnes permet d'accéder à la cour d'honneur. Le château très sobre d'allure  élevé sur un rez-de-chaussée, deux  étages dont un étage surbaissé, percés de petites ouvertures  possède une tour avec lanternon cette dernière marque l'angle entre le corps principal et l'aile de retour en équerre, au sud de la façade remaniée au XVIIe siècle s'encadre  entre deux tours rondes à toits en poivrière percées d'embrasure de tir à l' exception de la grosse tour abritant l'escalier à vis, l'ensemble est  recouvert d'ardoise, il a été restauré au début du XIXe siècle.                                         PONT de VIE, le château de Pont-de-Vie se situe à 1,5km du bourg. Le corps de logis principal où sest tenu le célèbre Synode, du 4 août 1795, du 4 août 1795, fut rasé complètement. Seul, le pavillon de lentrée est encore intact avec ses servitudes qui le continuent, sur la droite et une tour isolée, à laquelle il manque son couronnement, qui servait de fuie, petit colombier.","habitants":"Maitérie, famille de Marchand\r\n        \"","divers":"A Le Poiré-sur-Vie Métairie;  46° 46' 06\" Nord, 1° 30' 35\" Ouest","gps":"","images":["../image/image_85/85_Poir%c3%a9_sur_Vie_1.jpg","../image/image_85/85_Poir%c3%a9_sur_Vie_2.jpg","../image/image_85/85_Poir%c3%a9_sur_Vie_3.jpg","../image/image_85/85_Poir%c3%a9_sur_Vie_4.jpg","../image/image_85/85_Poir%c3%a9_sur_Vie_5.jpg","../image/image_85/85_Poir%c3%a9_sur_Vie_6.jpg"]},"Consult_chateau_formulaire11f9":{"id":"Consult_chateau_formulaire11f9","dept":"85","canton":"Les Herbiers","commune":"Pouzauges","nom":"Pouzauges","type":"Forteresse","periode":"XII-XV-XVI","histoire":"POUZAUGES,  au XIIe siècle appartient à la famille de Zacharie de Pouzauges, qui le transmet à la famille de Chantemerle, puis à la famille de Savary de Mauléon et enfin aux vicomtes de Thouars qui administrent presque toute la Vendée, avait pour fonction résidentielle entre 1420 et 1440 avec lépouse de Gilles de Rais maréchal de France, Catherine de Thouars, qui le réaménage à cet effet amena le château dans le giron de Gilles de Rais, grâce à leur mariage. Elle vint y résider après la mort de ce dernier, passa par héritage à Jean de Vendome Vidame de Chartres, fils né du second mariage  de Catherine de Thouars. Le château cessera d'être habité  à partir  de la fin du XVe siècle. mais sera occupé par une garnison, au XVIe siècle passe au Gouffier, Claude Gouffier duc de Roannez son petit-fils Loÿs époux de Claude Eléonore de Lorraine-Elbeuf cède la baronnie en 1634  à Louis Grignon seigneur de La Pélissonnière au Boupère. Ses héritiers le conserveront jusqu'à la moitié du XXe siècle. Durant les Guerres de Vendée (1793-1794), les hommes d'une \"colonne infernale\" commandés par le général Lachenay fusillèrent 32 habitants qui s'étaient réfugiés dans l'enceinte du vieux château. Cet acte fut commis le 26 janvier 1794 à l'issue d'un banquet offert par ce républicain au général Grignon. son lointain descendant le comte de Bagneux en 1970 entreprend la restauration du donjon, depuis 1988 la ville de Pouzauges en est propriétaire.","architecture":"POUZAUGES, construit au XIIe siècle,  joue essentiellement un rôle militaire jusquaux guerres de religion, le donjon va subir de nombreux aménagements pour le rendre plus agréable en tant qu'habitation. Un nouvel étage sera rajouté ainsi qu'un escalier à vis le reliant à tous les autres. Plusieurs fenêtres seront percées en remplacement des anciennes meurtrières afin de faire pénétrer la lumière à l'intérieur. La forteresse flanquée de douze tours dont une seule subsiste et son donjon carré avec ses contreforts, présentent dans leur ensemble de nombreux points communs avec dautres sites régionaux de même type, tels que les châteaux de Noirmoutier et de Tiffauges. Comme ceux-ci le donjon de Pouzauges présente des aménagements des XIVe et XVe siècles à objectifs militaire (mâchicoulis) et résidentiel, ouvertures plus larges et tourelle descalier. Le même jour, les villages alentour furent incendiés et une partie des habitants massacrés. Les ruines du château de Pouzauges sont dominées par son majestueux donjon du XIIe siècle, de plus de 25 m de haut, est l'une des 12 tours qui composaient la courtine, offrant ainsi aux visiteurs un majestueux exemple de l'architecture civile romane. Le château de Pouzauges est classé aux M.H. depuis 1862. dont les niveaux supérieurs avec le temps ont perdu leur couverture.","habitants":"Cacaudière  famille   Kuiper                                                        Pouzauges famille Gouffier\r\n        \"","divers":"Vestiges à Pouzauges; 46° 47' 07\" Nord et 0° 50' 23\" Ouest","gps":"","images":["../image/image_85/85_Pouzauges_1.jpg","../image/image_85/85_Pouzauges_2.jpg","../image/image_85/85_Pouzauges_3.jpg","../image/image_85/85_Pouzauges_4.jpg","../image/image_85/85_Pouzauges_5.jpg","../image/image_85/85_Pouzauges_6.jpg","../image/image_85/85_Pouzauges_7.jpg"]},"Consult_chateau_formulairef59b":{"id":"Consult_chateau_formulairef59b","dept":"85","canton":"Les Herbiers","commune":"Pouzauges","nom":"Pouzauges_Chateau","type":"Château","periode":"XIX","histoire":"A pouzauges le château  de la Cacaudière du Colombier,  de la mothe                                                                                                       CACAUDIERE, est un château médiéval aux portes du Puy du Fou, hôtel  par la famille   Kuiper.                                                                        COLOMBIER pas d'information historique.                                                 MOTHE, les premiers que nous connaissons furent en effet les Rouault de la Rousselière. Vers 1529, les Texier leur succédèrent, par suite d'acquisition probablement, ils sont d'origine de Robe et des environs de Mouilleron. Ils ont joint à leur nom celui de Saint-Germain à cause du petit bourg de Saint-Germain-l'Aiguillier dont la seigneurie leur advint nous ne savons à quelle époque. Le premier Texier seigneur de la Mothe prenait le
