s qualifications d' honorable homme et  Jacques Texier licencié ès loix. Roger-Marie Roussel, comte de Courcy, propriétaire au château de la Mothe et maire de la commune.","architecture":"CACAUDIERE du XIXe siècle style néo gothique, de plan rectangulaire sur soubassement  à quatre tours hexagonales à mâchicoulis et terrasse  les toits des tours ont été rasé, édifice à deux niveaux à double cordon, avant corps d'entrée à trois niveaux avec deux échauguettes au dernier étage, lucarnes sur toit en croupe.                                                                                            COLOMBIER de plan rectangulaire a deux  niveaux   flanqué d'une tourelle carrée sur angle à trois niveaux.                                      FROMENTINIERES   de plan rectangulaire sur soubassement important à  deux niveaux. Du XIXe siècle,   deux pavillons saillants aux extrémité.                                                                                HOTEL de VILLES petit château avec tour ronde crénelées et mâchicoulis.","habitants":"Famille de Texier\r\n        \"","divers":"Château à Pouzauges celui du Colombier grav-1 . De la fromentinières grav 2. La Cacaudière  grav 3-4: 46° 46' 59\" Nord, 0° 50' 10\" Ouest et tour manoir hôtel de ville grav 5","gps":"","images":["../image/image_85/85_Pouzauges_Chateau_1.jpg","../image/image_85/85_Pouzauges_Chateau_2.jpg","../image/image_85/85_Pouzauges_Chateau_3.jpg","../image/image_85/85_Pouzauges_Chateau_4.jpg","../image/image_85/85_Pouzauges_Chateau_5.jpg"]},"Consult_chateau_formulaire3fec":{"id":"Consult_chateau_formulaire3fec","dept":"85","canton":"Les Herbiers","commune":"Saint-Mars-la-Réorthe","nom":"Pouët_Réorthe","type":"Château","periode":"XIX","histoire":"Deux châteaux à Saint-Mars la  Réorthe celui de Saint Mars et celui du Pouët.                                                                                                POUËT,  propriété de Pierre des Herbiers, jusqu'en 1685, la propriété appartient ensuite à la famille de Tinguy Du Pouët, qui émigre en Angleterre pendant la Révolution, il est vendu comme bien national à la famille Boubet, les actuels propriétaires sont les descendants. L'un d'eux, notaire et marchand de biens, est maire de Saint-Mars la Réorthe de 1936 à 1977. Le château actuel est construit par cette même famille au début du XIXe siècle. Château de SainT-Mars dit  La Baudière : Très vieille demeure seigneuriale au bord du Lay.","architecture":"POUËT, le domaine était autrefois composé de quatre fermes, la Brunelière, le Puy Martineau, l'Aurosière et la ferme du Pouët, du château et de sa borderie. C'est la plus petite ferme qui assure la subsistance du château. Ces bâtiments aux ouvertures toutes encadrées de briques sont les dépendances de cette borderie.","habitants":"Famille de Tinguy Du Pouët\r\n        \"","divers":"A Saint-Mars-la-Réorthe château de St-Mars et du Pouët","gps":"","images":["../image/image_85/85_Pou%c3%abt_R%c3%a9orthe_1.jpg","../image/image_85/85_Pou%c3%abt_R%c3%a9orthe_2.jpg","../image/image_85/85_Pou%c3%abt_R%c3%a9orthe_3.jpg"]},"Consult_chateau_formulaire4879":{"id":"Consult_chateau_formulaire4879","dept":"85","canton":"Les Herbiers","commune":"Les Epesses","nom":"Puy_du_Fou","type":"Château","periode":"XVI","histoire":"PUY du FOU, les origines de la famille du Puy du Fou sont un peu incertaines, mais remonteraient à la fin du XIIe siècle. Renaud du Puy du Fou, seigneur, épouse avant 1197 Adelis de Thouars. Il serait le premier Puy du Fou connu. Il a au moins deux fils; Philippe continue la lignée, son frère Renaud épouse Eustachie de Monbail et serait donc seigneur de Monbail. Dans la lignée du Puy-du-Fou, Jehan devient seigneur de Bourneau en épousant Jacquette de la Ramée. Son fils Pierre, seigneur du Vernay, épouse Aliénor de Juch, dame de Chavagnes-les-Redoux et des Touches en 1469, sans postérité. François II du Puy du Fou, capitaine de Nantes, épouse en 1527  la fille du gouverneur, Catherine-Laval de Bois Dauphin, et lance la reconstruction de son château en 1547, à la mort de François II en 1458 son fils René futur gouverneur de la Rochelle puis sa veuve Catherine de la Rochefoucault poursuivent les travaux. Le château du Puy du Fou sera vendu en 1659 à Claude de Boyslève, les descendants  au XVIIIe siècle passe aux, la Forest d'Armaillé puis aux Marconnay et en 1791 acquis par le Marquis de Belboeuf.  En 1851 aux comte de Quénetain . En 1949 un notaire de Bressuire monsieur Savard  l'acquiert et depuis  1977, le conseil général de la Vendée racheta le château  et y créa, avec l'aide de l'État et dans l'esprit des projets muséographiques de Georges-Henri Rivière, en 1977 , au même moment un jeune homme, Philippe de Villiers, à la recherche dun lieu pour son spectacle historique.","architecture":"PUY du FOU, le château fort du XIIe siècle était d'assez petite superficie, il dessinait une enceinte presque hexagonale d'environ 30 m de diamètre, et flanquée de tours rondes à chaque angle, dont deux au Nord et deux petites au Sud. Un fossé sec encerclait le château, et un deuxième fossé encerclait à son tour le premier, et il était plus large, plus profond et relié à la rivière qui alimentait ce fossé pour former des douves en eau. Notamment avec une grosse tour ronde très près de l'entrée principale au Nord. Cette tour Nord-Est, qui servait de tour-maîtresse, fait environ 9 m de diamètre à l'extérieur, et à l'intérieur l'espace fait environ 3,10 m. Les murs ont une épaisseur moyenne de 3 m. Ce ne devait sûrement pas être un donjon résidence, l'espace intérieur étant trop petit pour être habitable. Ce devait être la tour la plus haute du château, et servit de tour de guet. Au Sud, il y avait deux petites tours rondes et probablement une poterne. A l'Est, se trouvait un tertre, peut être l'ancienne motte castrale. A l'intérieur, on voit quelques pans de mur peu épais, ils devaient appartenir à des bâtiments adossés aux remparts et encerclant la cour intérieure. Il devait y avoir un logis seigneurial, des cuisines, celliers, salle de réception, salles de justice. De plus, une chapelle castrale dédiée à Sainte-Marie-Madeleine était adossée au rempart. En 1794 partiellement incendié par les colonnes infernales des Turreau.  A été classé aux M.H. en 1974 et en 1986.","habitants":"Marquis de Belboeuf Famille de Philippe de Villiers\r\n        \"","divers":"Aux Espesses la citadelle et le château du Puy du Fou: 46° 53' 02\" Nord, 0° 53' 56\" Ouest","gps":"","images":["../image/image_85/85_Puy_du_Fou_1.jpg","../image/image_85/85_Puy_du_Fou_2.jpg","../image/image_85/85_Puy_du_Fou_3.jpg","../image/image_85/85_Puy_du_Fou_4.jpg","../image/image_85/85_Puy_du_Fou_5.jpg","../image/image_85/85_Puy_du_Fou_6.jpg","../image/image_85/85_Puy_du_Fou_7.jpg","../image/image_85/85_Puy_du_Fou_8.jpg","../image/image_85/85_Puy_du_Fou_9.jpg"]},"Consult_chateau_formulairee7c5":{"id":"Consult_chateau_formulairee7c5","dept":"85","canton":"Chantonnay","commune":"Chantonnay","nom":"Puybelliard","type":"Château","periode":"XIX","histoire":"PUYBELLIARD, la famille Querqui était installée a Puybelliard depuis le XVIIIe siècle. Ils habitent alors dans Le Grand Logis de Puybelliard qui est remplacé par un château moderne en 1856, par Eugène Querqui maire de Puybelliard de 1844 a 1871 et conseiller général.  Le château reste dans la famille Querqui jusqu'en 1936 après les décès de tous les mâles de la famille Querqui. Le château et le parc furent, alors, achetés par le colonel Jean Charles Barrier et son épouse Marie Louise de Ferriet. Les communs transformés en ferme furent acquis par la famille Plessis-Tapon, cette famille continue d'habiter dans les dépendances. Madame Barrier habite seule au château jusqu'en 1984 et occupe deux uniques pièces. A cette époque  le toit endommagé provoque d'importants dégâts des eaux. Après le décès de Madame Barrier le château est inoccupé pendant sept ans.  C'est à cette époque que de nombreux meubles du château seront volés ainsi que beaucoup de lustres, etc. pour embellir la région. Le château est acheté par la famille Desaunay en 1991 et la famille Peniguel en 1993. Depuis cette date, le château est acheté par David Norwood, un anglais, afin d'y établir une résidence secondaire mais il n'habitera jamais au château. Enfin en 2006 le château est acheté par Jérôme et Maeve Hoffman, un gallois et une irlandaise, qui continuent les rénovations que le château nécessite.","architecture":"PUYBELLIARD, date du milieu du XIXe siècle 1856. Il se compose d'un bâtiment carré de deux étages encadré de deux ailes au rez-de-chaussée. Ce bâtiment principal est orné d'une longue poivrière a chaque angle. De plus un pavillon de trois côtés est construit en saillie sur la façade. Il est décoré sur les arêtes de pilastres a chapiteaux ioniques au premier étage et corinthiens au second, conformément à l'ordre antique. La décoration intérieure est particulièrement soignée et finie. Le hall peint en stuc est orné de deux colonnes et de deux niches. La salle a manger dhonneur possède de grandes boiseries cirées dont  le bois ne présente aucun nud. Dans le petit salon les lambris noir et or sont associés a une tenture couleur or.  Il ouvre ses portes en 2012 pour la première fois depuis 30 ans transformé en chambre d'hôte et restaurant gastronomique.","habitants":"Famille Querqui \r\n        \"","divers":"Château de Puybelliard à Chantonnay","gps":"","images":["../image/image_85/85_Puybelliard_1.jpg","../image/image_85/85_Puybelliard_2.jpg"]},"Consult_chateau_formulaire172e":{"id":"Consult_chateau_formulaire172e","dept":"85","canton":"Montaigu","commune":"La Rabatelière","nom":"Rabatelière","type":"Château","periode":"XVII","histoire":"RABATELIERE, Le fief de la Rabatelière doit son nom à la famille Rabasteau. Le prieur de cette commanderie, Louis de Lorraine, la donna à Pierre Bruneau en récompense de ses combats contre les Sarrasins. Au cours des siècles les Bruneau firent de ce lieu une grande seigneurie. Le chartrier de la Rabatelière est surtout connu par Jean Bruneau en 1392, qui mourut par violence lors dune querelle avec Pierre Vau, un pauvre homme de labour voisin. La famille fut surtout connue par le mariage de Jacques Bruneau en 1503 avec Jacquette Moreau, dame de la Jaunière et riche héritière. Grâce à sa fortune la Rabatelière fut  agrandie, en 1632, fut érigée en baronnie par Louis XIII, pour récompenser Charles Bruneau qui avait défendu Ré contre les huguenots. En 1642, La Rabatelière devint une vicomté. La famille Bruneau s'éteignit avec François Bruneau, qui épousa le 7 janvier 1644 Charlotte de Pompadour et fut tué le 3 août 1645 à Nordlingen comme maréchal de camp du duc dEnghien. La Rabatelière fut vendue en 1720 à la famille nantaise des Montaudouin. À la Révolution, René de Montaudouin refusant démigrer, la propriété fut saccagée par les colonnes infernales, puis vendue par ses héritiers en 1828 à Charles Henry de La Poëze. Elle fut entièrement restaurée par son fils Olivier, chambellan de lEmpereur Napoléon III. Le château fut ensuite habité par Yves Gabriel de La Poëze et son épouse Margueritte Legoux fille du baron Jules Legoux,  Leurs propriétaires actuels, Wilfrid et Nathalie Montassier,","architecture":"RABATELIERE, manoir construit sans doute au Moyen-Age, transformé dans les années 1630. Salon oval de 1780 avec décor de gypseries. Il fut remanié dans les années 1830 après son acquisition par le comte de La Poëze qui crée le parc paysager. Le château de La Rabatelière est profondément transformé de 1891 à 1900 par l'architecte Félix Libaudière.  C'est un château construit au XVIIe et XVIIIe siècle d'un corps de logis rectangulaire  à deux niveaux flanqué à droite comme à gauche de pavillons , série de lucarnes à pinacles sur combles, les pavillons sont accolés en retour d'équerre de bâtiment de dépendances, la toiture à toit brisée formant une cour d'honneur. Se trouve au coeur d'un parc romantique de 24 hectares, traversé dallées cavalières. Passionnés dhistoire et très impliqués dans la vie culturelle locale.","habitants":"Famille Bruneau\r\n        \"","divers":"Rabatelière: 46° 51' 36\" Nord, 1° 15' 15\" Ouest","gps":"","images":["../image/image_85/85_Rabateli%c3%a8re_1.jpg","../image/image_85/85_Rabateli%c3%a8re_2.jpg","../image/image_85/85_Rabateli%c3%a8re_3.jpg"]},"Consult_chateau_formulaire1aff":{"id":"Consult_chateau_formulaire1aff","dept":"85","canton":"Mortagne-sur-Sèvre","commune":"Beaurepaire","nom":"Richerie","type":"Château","periode":"XV","histoire":"RICHERIE,  au XVe siècle, les premiers seigneurs connus furent les Gouffier, propriétaires jusqu'au XVIIe siècle, puis possédée par la famille Guyrault. En 1731, le marquis Barrin de la Galissonnière en devient propriétaire, né à Rochefort en 1693, il entre dans la marine en 1710, il revient souvent entre ses campagnes dans ses terres de la Limouzinière, à Ardelay et dans celles de la Richerie. En 1747, nommé gouverneur du Canada, il apporte de chaque expédition de jeunes plants d'arbres et introduit le magnolia en France. Membre de l'académie des sciences, il meurt en 1756 alors qu'il se rend à Versailles pour y recevoir le bâton de maréchal de France. En 1764, l'acheteur de la Richerie, Jean Louis Mesnard, seigneur de la Barotière fait cadeau de ce bien à Claude Charles Conrard de Mahé, son fils. Incendié à la Révolution, émigré et couvert de dettes, le domaine est vendu en 1802 au docteur Damour, médecin général aux hôpitaux de Nantes, qui s'installe dans les communs ayant échappé aux flammes. Après la Révolution de 1848, Louis Joseph Damour restera maire de Beaurepaire sous le second empire, jusquà sa mort. En 1876, la RIcherie fut édifié en utilisant les pierres et la charpente de lancien logis. La famille Damour resta propriétaire du château de la Richerie durant 203 ans. En 2006, le château devint la propriété de Mr et Mme Joncheray.                                                                                                               VIEUX-CHENES, maison dhôte du XVIIIe siècle vous accueille pour vos réunions familiales.","architecture":"RICHERIE, depuis 2008, le château est devenu un hôtel. La chapelle a été restaurée en 2009 et les autres dépendances sont en cours de rénovation.  Au cours du XIXe siècle, la famille Damour entreprit la construction dimposantes dépendances abritant un élevage de juments poulinières.                                                                           GRAND-LOGIS,  Beaurepaire  se développe autour d'une maison de chasse, le Grand Logis, construit au XIIe siècle par les vicomtes de Thouars, au bord de deux immenses étangs. Gille de Rais, le Barbe bleue de la légende, devient seigneur de Beaurepaire en épousant une fille du dernier vicomte de Thouars. Au XVIe siècle, les Girards, nouveaux seigneurs de Beaurepaire, firent construire leur château. Il se situe au coeur du bourg.","habitants":"Famille Guyrault\r\n        \"","divers":"a Beaurepaire le château de Richerie et du Grand logis; 46° 54' 41\" Nord, 1° 05' 16\" Ouest","gps":"","images":["../image/image_85/85_Richerie_1.jpg","../image/image_85/85_Richerie_2.jpg"]},"Consult_chateau_formulaireb8be":{"id":"Consult_chateau_formulaireb8be","dept":"85","canton":"Luçon","commune":"Mouzeuil_St_Martin","nom":"Rivière_Mouzeuil","type":"Château","periode":"XVII","histoire":"RIVIERE,  Mouzeuil est mentionnée au XIe siècle dans une charte. Un château qui semble avoir appartenu à Hugues de Lusignan est incendié en 1010. Un prieuré construit vers 1050 est détruit par Geoffroy la GrandDent en 1232. À la création des évêchés de Maillezais et de Luçon, en 1317, Mouzeuil est rattachée à l'évêché de Maillezais et Saint-Martin-sous-Mouzeuil à celui de Luçon. La rivière la Corde sépare les deux villages.  Le prieuré est reconstruit au XVIe siècle et devient la résidence d'été de l'évêque de Maillezais, Geoffroy dEstissac. Saint-Martin-sous-Mouzeuil est créé comme commune en 1743 par ordonnance royale, détachée de Nalliers. Lors du rétablissement de l'évêché de Luçon en 1817, Mouzeuil lui est rattachée.  Mouzeuil s'est développé autour d'un prieuré établi dès le XIe siècle. Celui-ci est reconstruit au XVIe siècle quand Geoffroy d'Estissac, évêque de Maillezais, ancien évêché de Vendée, choisit Mouzeuil comme résidence d'été.","architecture":"RIVIERE, le château de la Rivière. Le roi Henri IV y séjourna en 1597 lors du siège de Fontenay-le-Comte. Parc découpé en espaces de styles différents (à la française, exotique, boisé, conception du château de plan rectangulaire à deux niveaux sur soubassement important lucarnes sur toit brisés,  pavillons d'entrée saillants avec escaliers et fronton triangulaire et tours rondes sur l'arrière de la bâtisse.","habitants":"Famille de Geoffroy d'Estissac\r\n        \"","divers":"A st-Martin de Mouzeuil le château de R et de Saint-Martin iviere 46° 28' 01\" nord, 0° 59' 01\" ouest","gps":"","images":["../image/image_85/85_Rivi%c3%a8re_Mouzeuil_1.jpg","../image/image_85/85_Rivi%c3%a8re_Mouzeuil_2.jpg","../image/image_85/85_Rivi%c3%a8re_Mouzeuil_3.jpg"]},"Consult_chateau_formulairec15d":{"id":"Consult_chateau_formulairec15d","dept":"85","canton":"Fontennay","commune":"St-Vincent-Puymaufrais","nom":"Roche_Louherie","type":"Château","periode":"XIX","histoire":"ROCHE-LOUHERIE La famille Béjarry de la Roche-Louherie certainement la plus ancienne de St-Vincent-Puymaufrais. Il est très rare de trouver une telle durée. En effet, on retrouve depuis le XIIIe siècle 22 générations de \"Béjarry\" dans ce même lieu.Selon louvrage de Jean de Raignac, de châteaux en logis, en Vendée, seules les familles la Boutetière et la Bassetière ont assuré une telle pérennité dans un même lieu. Les propriétés des Béjarry ont beaucoup évolué depuis le début. Les successions ont provoqué des partages, mais à chaque génération, les épouses apportaient de nouvelles terres.Au départ, le domaine était composé de deux parties : La Louerie et la Roche-Gueffier. Au 14ème siècle, Michel aurait eu La Roche-Gueffier et son frère Guillaume, La Louerie. Les deux seigneuries se seraient regroupées quelques générations plus tard, à lextinction de la descendance de Michel. Ensuite, vers le début du XVIIe siècle, les Béjarry se scindèrent de nouveau en deux branches. Enfin, vers le début du XVIIIe siècle, les deux domaines se regroupèrent en un seul, sous lappellation : La Louerie. Depuis la Révolution, sappelle La Roche-Louherie.  La filiation des premières générations a été établie daprès les indications fournies par une sentence du Sénéchal du Poitou, Geoffroy dEstissac, au sujet dun différend entre Pierre Béjarry et son cousin Maurice.","architecture":"Beauchet-Filleau précise que les actes ne sont pas toujours clairement établis et parfois contredits par dautres actes. Il a dressé la généalogie des Béjarry en 1894, sur des preuves de noblesse faites en 1780, pour ladmission dans lordre de Saint-Jean de Jérusalem de Gaspard-Bonnaventure de Béjarry, le frère du 1er Amédée, un des fils de Charles-François et de Marie-Françoise de Régnon.Depuis, les Béjarry ont pris le nom de Béjarry. \r\n ROCHE-LOUCHERIE; de plan rectangulaire, partie centrale à trois niveaux avant corps d'entrée hexagonal saillant sur les deux faces lucarnes sur tout l'édifice tours rondes à gauche et chapelle à droite","habitants":"famille Béjarry\r\n        \"","divers":"A St-Vincent-Puymaufrais le château la Roche Loucherie","gps":"","images":["../image/image_85/85_Roche_Louherie_1.jpg","../image/image_85/85_Roche_Louherie_2.jpg"]},"Consult_chateau_formulairec27d":{"id":"Consult_chateau_formulairec27d","dept":"85","canton":"La  Roche sur Yon","commune":"La  Roche sur Yon","nom":"Roche_sur_Yon","type":"Château","periode":"XIII-XV","histoire":"A la roche sur Yon le château  pas de vestiges mais des manoirs en quantités tel que le Rotheau, Pessis, Barnes, Oudaires, Couffée, Merville.                                                                                                ROCHE sur YON, au XIIe siècle, la seigneurie est la propriété des seigneurs de Retz, devenus sires de Machecoul, puis des Mauléon au début du XIIIe siècle, puis  elle tombe aux mains des princes de Talmont et de Thouars. Vers 1240, un gouverneur du château, Raymond de Navarre, fait reconstruire la forteresse. En 1249, le comte du Poitou, Alphonse, reçoit la seigneurie de Maurice de Belleville. Le comte met Simon de Coutes à la tête du château en 1268. En 1360, le traité de Brétigny-Calais est signé, stipulant que toute place forte située dans l'Ouest et le Nord de la France, en somme les anciens fiefs perdus des Plantagenêt vient à l'autorité anglaise. Le château de la Roche sur Yon restera quand même sous autorité française, jusqu'en 1369. Cette année-là, le chevalier Jehan Belon, qui gardait la forteresse pour le comte d'Anjou, laissa la place forte aux anglais. Accusé de fellonie, il fut enfermé dans un sac et jeté dans la Loire, où il mourut noyé. La forteresse revient au comte d'Anjou, grâce à Olivier V de Clisson, en 1373. Les ducs d'Anjou gardèrent la seigneurie de la Roche sur Yon jusqu'en 1423. En 1454, ce sont les princes de Bourbon qui possèdent la place.                                                                                  PLESSIS , après le château des Oudairies, le château du Plessis semble lui aussi aiguiser lappétit dun investisseur. Propriété de la ville depuis 1993.","architecture":"ROCHE SUR-YON, la ville forte devait être flanquée de plus de tours, peut être une dizaine environ. La façade Est de cette enceinte étant plus courbe, il devait y avoir des tours assez rapprochées, alors qu'à l'Ouest elles devaient être plus espacées. Une chapelle castrale dédiée à Saint Lienne devait se situer dans la basse-cour, près de la muraille Ouest, comme l'évoque le nom de l'impasse chapelle Saint-Lienne . Un châtelet d'entrée était situé à la pointe Nord de la basse-cour. Un autre se situait au bout de la rue de la Poissonnerie, et a servi de prison. Une troisième porte existait sûrement à l'Ouest. De cette forteresse médiévale, une des plus importantes du Bas-Poitou de l'époque, il ne reste que des vestiges visibles de la rue des Poilus, à savoir les parties Sud de la haute-cour, du donjon et de la basse-cour ainsi qu'une tour ayant une forme évoquant la tour de l'Horloge de Chinon, qui faisait l'angle Sud-ouest de l'enceinte de la basse-cour, tous arasés.  Le moulin de la Garde a joué un rôle important dans la prise du château de La Roche-sur-Yon par les Anglais. Il constituait un poste dobservation permettant de surveiller toute la contrée environnante.","habitants":"Famille de Raymond de Navarre\r\n        \"","divers":"A la Roche sur Yon le château  Rotheau  grav-1, Pessis grav-2-3, Barnes grav-5-6, Oudaires grav-6, Couffée, Merville","gps":"","images":["../image/image_85/85_Roches_sur_Yon_1.jpg","../image/image_85/85_Roches_sur_Yon_2.jpg","../image/image_85/85_Roches_sur_Yon_3.jpg","../image/image_85/85_Roches_sur_Yon_4.jpg","../image/image_85/85_Roches_sur_Yon_5.jpg","../image/image_85/85_Roches_sur_Yon_6.jpg","../image/image_85/85_Roches_sur_Yon_7.jpg","../image/image_85/85_Roches_sur_Yon_8.jpg"]},"Consult_chateau_formulairec366":{"id":"Consult_chateau_formulairec366","dept":"85","canton":"Chantonnay","commune":"Saint-Germain de Prinçay","nom":"Roches_Filées","type":"Château","periode":"XVI","histoire":"ROCHES FILEES, Saint-Germain-de-Prinçay. Le château des Roches-Filées  appartenait à la famille Marchegay. Un lieu chargé d'histoires. Deux frères inséparables Louis et Pierre Marchegay, l'un député et maire de Saint-Germain-de-Princay, l'autre médecin. En 1891, à la mort de leur père Emile-Edmond, Louis hérite du château des Roches-Baritaud. Les deux frères ne veulent pas se séparer, aussi Pierre choisit-il de construire une demeure juste à côté. C'est l'architecte Yonnais Joseph Libaudière qui dessina et construisit les Roches-Filées. Au décès de Pierre Marchegay, en 1930, sa fille, Annette, née en 1907, devient maîtresse de maison des Roches-Filées. La même année, elle épouse l'industriel Jacques Japy, qui fut maire de Saint-Vincent-Sterlanges.Sa petite-fille, Anne, et son époux, Olivier Furgé, héritent du château, en 1997 .","architecture":"ROCHES FILEES Elle fut achevée en 1907 et certainement commencée en 1905, comme en atteste la date située sur une des tourelles en ardoise. Le lavoir de Bobine, à la pointe de la propriété, jouxte les Roches-Baritaud. Il y a quelques années, la famille Furgé en a fait don à la commune.","habitants":"Famille Marchegay. \r\n        \"","divers":"A St-Germain de Princay le château de la Roches Pilées","gps":"","images":["../image/image_85/85_Roches_Fil%c3%a9es_1.jpg","../image/image_85/85_Roches_Fil%c3%a9es_2.jpg","../image/image_85/85_Roches_Fil%c3%a9es_3.jpg"]},"Consult_chateau_formulaire99b3":{"id":"Consult_chateau_formulaire99b3","dept":"85","canton":"Aizenay","commune":"Rocheserviere","nom":"Rocheservière","type":"Château","periode":"XVIII","histoire":"A Rocheservière, le château de la Touche de la Grange Baron, de la Source et de St-André pas d'informations pour ses deux derniers.                                                                                                           TOUCHE,  au château de la Touche à Rocheservière, pour des raisons pour lheure inconnues, un incendie sest déclaré dans le château. À larrivée des pompiers, toute la partie gauche était en flamme. Le reste du château faisant 400 m² au sol, avec sous-sol et deux étages, était largement enfumé.                                                           GRANGE-BARON, la société ROC O'CERF, est installée à Rocheservière, cette TPE est une société anonyme par actions simplifiées fondée en 2013, recensée sous le naf :Hébergement social pour adultes et familles en difficultés et autre hébergement social. depuis le   01-12-1989, élevage de chevaux et d'autres équidés  par madame Catherine Jean.","architecture":"La TOUCHE , construit en 1892 « au-dessus dun autre qui a été rasé » est le  plus grand des six châteaux de la commune. Monsieur Jean louvrait exceptionnellement au public lors des Journées européennes du patrimoine », soupire le maire qui se remémore lhistoire de la construction du domaine et dun  retentissant procès entre le maçon et larchitecte. Lun deux avait confondu les cotes intérieures et extérieures, changeant les dimensions du château .","habitants":"Famille de Faille Jean\r\n        \"","divers":"A Rocheservière, le château de la Touche grav-1-2 de la Grange  Baron grav-5, de la Source grav-6 et de St-André grav-7","gps":"","images":["../image/image_85/85_Rocheservi%c3%a8re_1.jpg","../image/image_85/85_Rocheservi%c3%a8re_2.jpg","../image/image_85/85_Rocheservi%c3%a8re_3.jpg","../image/image_85/85_Rocheservi%c3%a8re_4.jpg","../image/image_85/85_Rocheservi%c3%a8re_5.jpg","../image/image_85/85_Rocheservi%c3%a8re_6.jpg","../image/image_85/85_Rocheservi%c3%a8re_7.jpg"]},"Consult_chateau_formulaire768a":{"id":"Consult_chateau_formulaire768a","dept":"85","canton":"Les Herbiers","commune":"Réaumur","nom":"Réaumur","type":"Château","periode":"XV-XIX","histoire":"A  Réaumur   le château du Lac et de Haute Cour   Manoir des Sciences de Réaumur.\r\nHAUTE-COUR,  Raoul de Vexiau, maire de Réaumur et président du conseil général de la Vendée en 1918, est le propriétaire du château fin XIXe et début XXe siècle. Son fils adoptif, le vicomte Jean de Tinguy de Vexiau y habite de 1929 à 1949.  Propriétaires successifs,   Raoul de Vexiau de 1841 à 1929, maire de Réaumur. 1929  Jean de Tinguy de Vexiau né Tinguy de Nesmy de 1895 à 1987, maire de Réaumur de janvier 1930 à mars 1945 démissionnaire, et son épouse Marie Savary de Beauregard. En 1987 la famille Darde.                                                                                     REAUMUR-LAC,  du XVIIe siècle, perché sur un mamelon dominant la verdoyante vallée du Grand Lay qui prend sa source à quelques kilomètres, le bourg Réaumur voit son horizon borné vers le nord, par la masse imposante des collines de Pouzauges et de Montournais. Le château du Lac est une demeure de plaisance construite en 1878-1880 par Paul Guillerot. Le parc est dessiné en 1878 par Antoine Noisette, paysagiste.","architecture":"HAUTE-COUR, le château et seigneurie de la Haute-Cour a été bâti à côté de l'église fortifiée du XVe siècle Saint-Pierre, dans le bourg de Réaumur.  À l'époque la propriété comprenait un grand jardin, et les communs avaient une étable avec plusieurs vaches laitières.En 1860, au château de la Haute-Cour, un souterrain refuge a été découvert par Léon Audé , maire de la Roche-sur-Yon, secrétaire général de la Vendée (1815-1870) et historien local vendéen.\r\nLAC  château du Lac, de style moderne néo-gothique.","habitants":"Famille de  Paul Guillerot\r\n        \"","divers":"A Réaumur le château  de Haute Cour grav 3  et  du Lac Réaumur; 46° 42' 57\" nord, 0° 47' 58\" ouest","gps":"","images":["../image/image_85/85_R%c3%a9aumur_1.jpg","../image/image_85/85_R%c3%a9aumur_2.jpg","../image/image_85/85_R%c3%a9aumur_3.jpg"]},"Consult_chateau_formulaire3597-2":{"id":"Consult_chateau_formulaire3597-2","dept":"85","canton":"les Sables d","commune":"les Sables d","nom":"Sables_Olonnes","type":"Château","periode":"XV-XVIII","histoire":"Deux châteaux au sables d'Olonne le Jarrie et le le Mortière et le manoir de Nina                                                                                                                              JARRIE, hôtel de ville  du XIVe siècle,  est une ancienne maison forte du XIIe siècle. Sa tour circulaire aurait été rajoutée au XIVe siècle. Les fossés du manoir ont été comblés pendant la seconde guerre mondiale par les troupes allemandes qui avaient installé dans le parc des pièces dartillerie pour protéger la baie des Sables dOlonne. Le bâtiment et ses dépendances datent des XVIIe et XVIIIe siècles. Le manoir a fait lobjet de travaux de restauration importants avec linstallation dune nouvelle mairie et dune médiathèque.                                       MORTIERE, au Moyen-Age, la Mortière est une maison-forte qui fait partie du système défensif d'Olonne sur Mer. La tour-porche a été ajoutée ou reconstruite au XVIe siècle et les bâtiments remaniés au XVIIe siècle. Jacques Martin, capitaine entretenu pour le service du roi en ses armées navales, sauve la vie de Louis XII pendant le siège de La Rochelle en 1628, en s'interposant entre le roi et un boulet de canon. Pour le remercier, le roi l'anoblie, le nomme écuyer et la tradition orale dit qu'il lui aurait donné ce manoir, demeuré possession de cette famille jusqu'en 1953. La coquille, élément décoratif sur l'angle de la façade, indiquerait que ce manoir fut un relais des pélerinnages de Saint Jacques de Compostelle.                                      manoir de NINA ASTY pavillon crénelée avec tour ronde et carrée pavillon d'entrée","architecture":"ETABLIEREE: à Sainte Foy, son Palais toscan, bâtisse au charme italien construit en 1890 et son Orangerie de 500 m², une verrière inspirée de l'architecture Baltard, offrant une vue exceptionnelle sur le Palais, l'étang et les bois.                                    MORTIERE;   manoir propriété de la commune est une autre maison forte située au nord du bourg. Un départ de voûte subsistant sur sa façade nord fait penser à une ancienne entrée de lépoque médiévale. Le porche et la tour carrée seraient du XVIe siècle.  Une dernière maison forte,                                                                                               La Rocquerie (propriété privée), était située à louest du bourg. Il nen subsiste quune porte du XVIIe siècle et à l'intérieur dun puits, l'entrée d'un souterrain refuge de deux mètres de profondeur.","habitants":"Princes de Talmont    Mortière Jacques Martin,\r\n        \"","divers":"Deux châteaux au sables d'Olonne le Jarrie et le le Mortière et le manoir de Nina grav-1  Sables-d'Olonne; 46° 32' 13\" nord, 1° 46' 18\" ouest, Ste-Foy d'Etablière grav 2-3-4","gps":"","images":["../image/image_85/85_Sables_Olonnes_1.jpg","../image/image_85/85_Sables_Olonnes_2.jpg","../image/image_85/85_Sables_Olonnes_3.jpg","../image/image_85/85_Sables_Olonnes_4.jpg"]},"Consult_chateau_formulaire1da1":{"id":"Consult_chateau_formulaire1da1","dept":"85","canton":"Chantonnay","commune":"Sigournais","nom":"Sigournais","type":"Château","periode":"XV","histoire":"deux châteaux à Sigournais dont la forteresse de Sigournais, le\" château de Mr Blanpain à St Mars  et le chateau de L'Aunay ( voir article sur saint-mars) pour ses deux derniers.                                                                    SIGOURNAIS, une seigneurie de la branche des Thouars, Hugues de Thouars seigneur de Pouzauges et de Sigournais  et son épouse, Isabeau des Noyers reçoivent Bertrand de Goth archevêque de Bordeaux. La seigneurie est cédé au XVe siècle  à Guy de Beaumont-Bressuire, Françoise de Beaumont-Bressuire  le porte en dot  à Philbert de Sainte Flayve qui a fait construire le château entre 1432 et 1460, leur fils  Guy de Sainte-Flayve fit  construire un  château sur motte du XVe siècle. En 1521 la seigneurie sont rattachées aux Puybellard et Chantonnay. Au XVIe siècle les Saintes-Flayve portent  le château  par mariage aux Harpedanne de Belleville en 1506, à la mort de Claude d'Harpedanne en 1563 le château est abandonné par ses seigneurs, va passer aux Montpezat, marquis de Villars, puis aux Gillier, aux Montmorency dans les derniers années du XVIIe siècle, puis enfin aux duc de Villeroy seul le fermier habite le château lequel est vendu en 1766 à Alexis-Samuel de Lespinay     Ruiné en 1793, le château est vendu comme bien national à la Révolution au citoyen Piot presque aussitôt cédé aux à Jacques Rouillon, ses héritiers construisent en 1810  avec les pierres du château; une nouvelle demeure dans le style néo-classique. En 1863 Victor Mercier de Lepinay  se porte acquéreur du château de Sigournais toujours dans sa descendance.","architecture":"SIGOURNAIS date du XVe siècle, en 1810. C'est l'une des plus anciennes forteresses du Bas-Poitou, dont il reste un château sur motte du XVe siècle.  Il est le témoin de l'architecture militaire féodale en Vendée, château de Sigournais est de style féodal, cette construction d'une nouvelle demeure est dans le style néo-classique, à l'origine composé de neuf tours réunis par des courtines, son donjon-Porche ensemble fortifié de plan rectangulaire de 25 m de long sur 12 m de large flanqué de deux grosses tours rondes à toitures  d'ardoises pointus, l'ensemble possède un chemin de ronde à mâchicoulis. Les façades  extérieures en pierre de taille percées d'élégantes baies Renaissance, un escalier à vis dans une tour ronde. Entouré de douves sèches environ 25 mètres de largeur, l'enceinte d'un diamètre de 70 mètres, affecte une forme grossièrement polygonale, il ne subsiste aujourd'hui que sept des neuf tours de flanquement cinq d'entre elles sont très mutilés. Actuellement, il abrite une exposition héraldique permanente, ainsi que des expositions temporaires. Le château de Sigournais est ouvert au public.  En 1960, la charpente et tous les mâchicoulis ont été restaurés.  Il est classé en 1946 et 1992 aux M.H. et inscrit en 1987 et en 1995.","habitants":"Famille des Thouars\r\n        \"","divers":"Sigournais; 46° 33' 30\" Nord et 1° 03' 25\" Ouest Château neuf; 46° 42' 26\" nord, 0° 58' 58\" ouest","gps":"","images":["../image/image_85/85_Sigournais_1.jpg","../image/image_85/85_Sigournais_2.jpg","../image/image_85/85_Sigournais_3.jpg","../image/image_85/85_Sigournais_4.jpg","../image/image_85/85_Sigournais_5.jpg","../image/image_85/85_Sigournais_6.jpg"]},"Consult_chateau_formulairea41c":{"id":"Consult_chateau_formulairea41c","dept":"85","canton":"Aizenay","commune":"St-Denis de Chevasse","nom":"St_Denis_Chevasse","type":"Château","periode":"XVI-XVIII-XIX","histoire":"A Saint-Denis de Chevasse le château de l'Aurière du XIXe siècle, du Breuil du XIXe siècle,  pas d'informations pour les châteaux suivants; du Chatenay du XVIIIe siècle, de la Marchegaizière du XVIe siècle, du Puy-Tesson du XIXe siècle                                                                                    BREUIL, pendant la Révolution, François Aimé Masson part pour l'exil dans l'Armée des Princes. Après la Terreur, il revient à Saint Denis la Chevasse et la famille rachète les biens du Breuil : Le roi Louis XVIII le fait chevalier de Saint-Louis en 1816 pour services rendus au pays. Il sera maire de la commune de 1808 à 1820. Pendant la période de la restauration le vieux manoir est dans un état déplorable. A partir de 1860 les Jousseaume achètent le Breuil et font construire le château actuel. Aujourd'hui ce patrimoine a été aménagé pour une activité touristique, il permet cependant d'identifier ce qu'était encore la vie en autarcie au XIXe siècle avec son rendez-vous de chasse, ses grandes dépendances, ses écuries, son pressoir, son four à pain et son lavoir. Pas d'information historique pour les autres château,  le château du Breuil cherche un nouveau propriétaire. Pierre et Monique Maestre, qui lont acquis en 1988, souhaitent maintenant passer le relais.","architecture":"AURIERE  du XIXe siècle même style que le château du Puy Peysson                                                                                                                     BREUIL; de plan rectangulaire à deux niveaux à cinq travées  trois lucarnes centrales sur toit en croupes accolée de deux tours rondes toit en poivrières, le manoir a été reconstruit au XIXe siècle, gîte indépendant de caractère à l'architecture en pierre et granit, toiture ardoise et façade galbée.                                                                               CHATENAY du XVIIIe siècle.                                                               MARCHEGAIZIERE  du XVIe siècle  construction de style moderne à gardé malgré tout ses échauguettes carrées  sur mâchicoulis d'encorbellement et tour carrée à l'opposé avec retour en équerre toit presque plat.                                                                               PUY-TESSON,  du XIXe siècle de plan rectangulaire, trois travées à deux niveaux sur soubassements imposants avec lucarnes sur combles en croupe entre deux tourelles à toit en poivrière  sur angle de la façade retour en équerre  de l'édifice de même niveaux à trois travées.","habitants":"Famille de Chevasse\r\n        \"","divers":"A Saint-Denis de Chevasse le château de l'Aurière grav -1-2, du Breuil grav 4-5-6, breuil-Baret grav-7, Marchegaisière-8, Puybuisson grav-3-","gps":"","images":["../image/image_85/85_St_Denis_Chevasse_1.jpg","../image/image_85/85_St_Denis_Chevasse_2.jpg","../image/image_85/85_St_Denis_Chevasse_3.jpg","../image/image_85/85_St_Denis_Chevasse_4.jpg","../image/image_85/85_St_Denis_Chevasse_5.jpg","../image/image_85/85_St_Denis_Chevasse_6.jpg","../image/image_85/85_St_Denis_Chevasse_7.jpg","../image/image_85/85_St_Denis_Chevasse_8.jpg"]},"Consult_chateau_formulaire51d6-2":{"id":"Consult_chateau_formulaire51d6-2","dept":"85","canton":"St Hilaire des loges","commune":"Saint-Florent des bois","nom":"St_Florent_Bois","type":"Château","periode":"XVIII","histoire":"Saint-Florent faisait partie, comme la Chaise-le-Vicomte, des terres qui appartenaient aux vicomtes de Thouars et qui furent données par ces seigneurs à l'abbaye de St Florent de Saumur.                                                           VERGNE  dit Mainborgère, un logis du Plessis-Salle, on dit aujourd'hui le Grand-Plessis, se trouvait également une chapelle. De nos jours, les seules maisons de la Barre et de la Vergne possèdent une chapelle. Celle de la Barre construite en 1891 est enclavée dans une aile du vieux logis (une vieille chapelle existait avant celle-ci, se trouvant dans la prairie à gauche du logis).","architecture":"Celle de la VERGNE, construite vers 1873 est attenante au château. Ce sont deux chapelles privées. Le lundi de la Pentecôte se célébrait en notre église paroissiale une sorte de pèlerinage. Les habitants des paroisses voisines accouraient en foule. Mais cette réunion, toute de dévotion dans les premiers temps, dégénéra, comme presque partout ailleurs, en assemblée profane où les hommes et les femmes se livraient aux plaisirs de leur goût, les uns à la dame, les autres aux boissons immodérées, et la fête fut supprimée.                                                                                     LA BARRE pas d'historique, de conception oblong à deux niveaux, corps de logis incurvé entre deux pavillons saillants toitures en tuiles presque plates.","habitants":"Seigneurs locaux\r\n        \"","divers":"a St-Florent des Bois  château de la Barre et de Vergne grav 4      46° 35' 40\" nord, 1° 18' 53\" ouest","gps":"","images":["../image/image_85/85_St_Florent_Bois_1.jpg","../image/image_85/85_St_Florent_Bois_2.jpg","../image/image_85/85_St_Florent_Bois_3.jpg","../image/image_85/85_St_Florent_Bois_4.jpg","../image/image_85/85_St_Florent_Bois_5.jpg"]},"Consult_chateau_formulaire07a8":{"id":"Consult_chateau_formulaire07a8","dept":"85","canton":"Montaigu","commune":"Saint-Fulgent","nom":"St_Fulgent","type":"Château","periode":"XVII","histoire":"Vestiges du château féodal de st-Fulgent.                                                SAINT-FULGENT, le château de Saint-Fulgent, château de style Renaissance. Au baptême de leur quatrième fille, Henriette Proust, le 29 mars 1724 à Saint-Fulgent, la marraine est la deuxième femme de Joachim Descazaux : Henriette de Briquemault, marquise de Férole, alliée par les Orléans à la famille royale. Le parrain est le neveu par alliance de J. Descazeaux, René Darquistade, seigneur de la Maillardière. Joachim Descazeaux est alors indiqué comme seigneur de Saint-Fulgent. Au baptême de Pierre-Henri-Benoît Proust, le 22 octobre 1734, le parrain est Pierre Henri Benoit Darquistade, fils de René. Le curé précise dans lacte de baptême que le parrain est « seigneur de ces lieux ». Ce nest quune vérité anticipée puisque le parrain nest âgé que de 12 ans, même si loncle Joachim Descazeaux nest décédé que depuis deux ans. En réalité cest le père, René Darquistade, qui hérita de son oncle par alliance de la seigneurie de Saint-Fulgent en 1732.  Cest Louis Prosper Proust qui conseilla Pierre de Vaugiraud, habitant Bazoges-en-Paillers, pour gérer lhéritage de Claude Moreau, sieur du Coudray, qui était ruiné. Pour cela il fut nommé curateur à la personne et aux biens de René François Joseph de Vaugiraud, M. de Rosnay. Voir notre article publié en août 2014 : La famille de Vaugiraud à Saint-André-Goule-dOie.","architecture":"LIGNY, a 71 ans, suite à un malaise, Mr Payraudeau meurt en 1914 dans son château du Ligny. Mme Céline Guyet son épouse, restée sans descendance, occupe alors seule le château, accompagnée de ses quatre ou cinq domestiques. Les dernières années de sa vie, en raison d'un handicap physique, elle reste la plupart du temps dans ses appartements. Mme Payraudeau, meurt au Ligny en 1936. Les époux Payraudeau-Guyet n'ayant pas de descendance directe : Louis Ribereau neveu de Mme Payraudeau est le légataire des biens de sa tante. Le docteur Louis Ribereau est propriétaire du Ligny jusqu'à sa mort en 1949. Etant célibataire et sans descendance, il laisse la propriété à sa cousine au 7° degré : Mme de la Robrie, née Huguet du Lorin.                                                    SAINT-FULGENT, le château de Saint-Fulgent, château de style Renaissance, privé de plan rectangulaire à deux niveaux flanqué de pavillons aux extrémité accolée d'une tourelle.\r\nPUY-GREFFIER, les ruines, ancien château médiéval, détruit presque entièrement car ses ruines étaient dangereuses. Il n'en reste plus qu'un muret.","habitants":"Famille de Proust                                                                     Famille Peyraudeau\r\n        \"","divers":"A St-Fulgent le château de  Saint-Fulgent de Ligny grav 4 et les vestiges de Puy-Greffier grav 1","gps":"","images":["../image/image_85/85_St_Fulgent_1.jpg","../image/image_85/85_St_Fulgent_2.jpg","../image/image_85/85_St_Fulgent_3.jpg","../image/image_85/85_St_Fulgent_4.jpg"]},"Consult_chateau_formulaired13b":{"id":"Consult_chateau_formulaired13b","dept":"85","canton":"Montaigu","commune":"Saint-Hilaire de Loulay","nom":"St_Hilaire_Loulay","type":"Château","periode":"XIV-XVII","histoire":"Plusieurs châteaux à Saint-Hilaire de Loulay celui de la Lande, de Bois-Corbeau, de Garcilière, de Musselière  de Preuille et de St-Hilaire.                                                                                                                      La LANDE;  dès le XIVe siècle  à Jean Buor, écuyer, seigneur de la Lande, en la paroisse de St-Hilaire-de-Loulay. Le 6 juillet 1545, Pierre Buor, écuyer, seigneur de la Lande, épouse  Anne Lingier. De ce mariage naquit Baptiste Buor, qui se marie en 1582 avec Olympe de Lespinay. Le 24 juillet 1631 mariage de Charles Buor et seigneur de la Lande avec Anne Garipaud, celle-ci, veuve, fait un contrat de partage, comme tutrice de ses enfants, avec son beau-frère, Hélie Buor, seigneur de la Négrie et sa belle-soeur, Jacqueline Buor. Pendant la Révolution, le château fut incendié mais il demeura toujours la propriété de la famille Buor car il ne fut pas vendu aux acquéreurs de biens nationaux. Actuellement habité par la comtesse de Cornulier veuve de M le comte de Cornulier, et par son fils le comte Louis de Cornulier, conseiller général de la Vendée, la demeure est depuis plusieurs siècles la propriété de la même famille,les  Buor. D'où son nom La Lande Buor, qui est devenu la Lande, depuis que, par alliance, cette maison appartient il la famille de Cornulier. Le château possède une chapelle où l'on peut encore dire la messe. Jadis des foules nombreuses venaient en pélerinage à cette chapelle pour prier sainte Anne qui en est la patronne.                                                     BOIS-CORBEAU, Georges de Villebois-Mareuil (22 mars 1847 à Nantes  5 avril 1900, Afrique du Sud), est un militaire français. Il passe sa jeunesse au château familial du Bois-Corbeau. Jean de Lattre de Tassigny y rencontra, au cours d'une garden-party chez la baronne Taylor, au château, Simonne Calary de Lamazière, en septembre 1926. Ils s'épouseront le 22 mars 1927.","architecture":"St_HILAIRE,  L'ancien château de Montaigu, dont les fortifications ont été arasées en 1586 sur l'ordre d'Henri III, inscrit à l'inventaire des M.H. La Caillaiderie à Montaigu, construit au XVIIIe siècle par la famille Thiériot. Les ruines du château de la Sénardière à Boufféré.  Le château du Hallay à Boufféré, de la Preuille, de la Mustière du XIXe, de la Lande du XVIIIe, de Bois-Corbeau du XIXe, de la Peinerie et de la Grande Bernerie.  Vestiges remarquables d'un ancien château médiéval au lieu-dit de la Goyère sur un côteau dominant la Grande Maine.                     PREUILLE  Quadrilatére formé par les bâtiments du XIVe et XVe siècles, il ne reste que deux façades et trois tours en poivrières. Le château est une vieille demeure féodale, c'est l'un des plus anciens du Val de Loire. Commencé au XIe siècle, le bâtiment prit sa forme actuelle au XIIIe siècle puis au XVe siècles. En 1350 Jean Boux, écuyer, est seigneur de la Preuille, il épouse Agnès de Chasteigner. La vaste douve qui défend encore une partie des murs et des tours montre ses origines de place forte et lui confère un cachet de grande noblesse,  musée du vin.                      MUSSELIERE; le premier seigneur connu est messire Pierre Moreau marié à demoiselle Renée de la Porte en 1707.","habitants":"Bois corbeau   Famille de Georges de Villebois-Mareuil  Preuillele comte Dominique de Nacquart\r\n        \"","divers":"Château de Bois Corbeau grav 8-9, de Preuille grav 2 à 7, Musselière grav 1","gps":"","images":["../image/image_85/85_St_Hilaire_Loulay_1.jpg","../image/image_85/85_St_Hilaire_Loulay_2.jpg","../image/image_85/85_St_Hilaire_Loulay_3.jpg","../image/image_85/85_St_Hilaire_Loulay_4.jpg","../image/image_85/85_St_Hilaire_Loulay_5.jpg","../image/image_85/85_St_Hilaire_Loulay_6.jpg","../image/image_85/85_St_Hilaire_Loulay_7.jpg","../image/image_85/85_St_Hilaire_Loulay_8.jpg","../image/image_85/85_St_Hilaire_Loulay_9.jpg"]},"Consult_chateau_formulaire0bc0":{"id":"Consult_chateau_formulaire0bc0","dept":"85","canton":"La Châtaigneraie","commune":"Sainte-Hermine St-Juir Champgillon","nom":"St_Juire","type":"Château","periode":"XV-","histoire":"SAINT-JUIRE,  Saint-Juire est avec la Marronnière, la Boursière et la Blotière, une des demeures de cette famille des Jaillard fort turbulente, les biens reviennent à leur fille Madeleine marié successivement à Jean du Plouer  puis au à René Jaillard écuyer seigneur de la Garonnière leur fils Louis-François épousera sa cousine Renée Viault.  En effet qu'il s'agisse du pillage de Montaigu par Guy Jaillard en 1563, de Jean qui s'évade de la conciergerie après avoir blessé son voisin René Gourdeau de Bonnefonds, de Jacques Jaillard condamné à mort par les Grands-Jours de Poitiers en 1578, du meurtre de son frère Léon Jaillard par René de La Cressonnière en 1579 et de l'enlèvement de la cousine Avoie à la Blotière en 1595, les anecdotes ne manquent pas et ont fait l'objet d'articles dans la presse spécialisée.  Louis Jaillard, petit-fils de Louis-François étant mort sans postérité le domaine revient à sa soeur Marie épouse depuis 1654 de Nicolas Chasteignier chevalier et seigneur de Tennessus, leur fils Jean se marie trois fois.  En 1724 sa veuve Catherine Charrault cède le domaine à Thibault  Florian trésorier leur fille Perrine florian épouse un gentilhomme descendant des Aubigné Michel Avice de Mougon en 1752, leurs descendants conserveront le domaine jusqu'en 1848 date de la vente à sieur Pelletreau épicier à Ste-Hermine, en 1905 st-Juire est acquis par Gustave Marchegay  aïeul des propriétaires actuel les Perrin.","architecture":"SAINT-JUIRE, demeure modeste mais élégante, sa construction se succède sur le même emplacement à une maison forte,  de taille modeste, entouré de douves, le logis édifié à la fin du XVe siècle et sans doute remanié au siècle suivant est éclairés par des baies à meneaux, une lucarnes passante, dont le tympan s'orne d'un crochet et de redents, chevauche le comble. A gauche du logis s'élève une tourelle d'escalier à pans coupés, flanquée d'une tourelle en encorbellement coiffée en poivrière. On accède à la tour d'escalier par un beau portail flamboyant. La tour rappelle symboliquement la fonction défensive.","habitants":"Famille de Renè Jaillard \r\n        \"","divers":"St-Juire; 46° 34' 49\" nord, 1° 01' 47\" ouest","gps":"","images":["../image/image_85/85_St_Juire_1.jpg","../image/image_85/85_St_Juire_2.jpg"]},"Consult_chateau_formulaire3c9e-2":{"id":"Consult_chateau_formulaire3c9e-2","dept":"85","canton":"Talmont-Saint-Hilaire","commune":"Saint-Julien des Landes","nom":"St_Julien_Landes","type":"Château","periode":"","histoire":"Quatre châteaux à saint-Julien  des Landes La commune est liée par son histoire aux comtes de la Bassetière, dont le château éponyme se situe sur le territoire de Saint-Julien, château de  Brandois , de la Foret, et de  Garangeoire.                                                                           BASSETIERE, l'histoire du château est intimement liée                                               à celle de la famille qui l'occupe depuis près d'un demi-millénaire, les Morisson de la Bassetière, descendants d'un clan écossais , venus en France pour la guerre de Cent Ans. Si d'autres fiefs, comme la Sauzinière, la Naullière ou le Brandeau (Vairé) ont été perdus au fil du temps, celui de la Bassetière est resté propriété de cette famille jusqu'à aujourd'hui. C'est à l'époque l'élément central d'un réseau de fermes et de châteaux subordonnés au Morisson, qui, dès 1416, régiront successivement, la Filotière (La Chapelle-Hermier), la Sauzinière pour la branche aînée et la Naullière pour la branche cadette.  Incendiée partiellement sous la Révolution.  À partir de la Restauration, les Morisson de la Bassetière bénéficient du titre de comte, la Bassetière est reconstruite peu après par Constant Morisson de la Bassetière, bien qu'elle ait toujours conservé une aile du seizième. Dès lors, c'est le siège d'une importante exploitation agricole regroupant les fermes.                                                                                              BRANDOIS, a cinq KM au sud-Est à la Mothe-Achard, le château du domaine de Brandois date de la fin du IXe siècle. Baudouin de Champagne, fut le seigneur de La Mothe-Achard, Baron d'Anjou et du Maine. Il est mort en 1560.","architecture":"BASSETIERE,  le domaine  s'étend toujours sur des centaines d'hectares. Il est compris en grande partie entre les trois routes qui forment un triangle, bien qu'elle ait toujours conservé une aile du seizième. Dès lors, c'est le siège d'une importante exploitation agricole, il comporte plusieurs fermes et un château. Au sud de cet ensemble s'étend un parc qui comprend entre autres un étang.                                                                  BRANDOIS,  s'est reconverti en un hôtel-Restaurant imposant. Vous pourrez vous adonner à une grisante promenade à cheval, dans 20 hectares de verdure, qui entourent le château. Le propriétaire est Mr Jean-Pascal Roger.                                                                                    FORET  du XIXe siècle, pas d'information historique.                          GARANGEOIRE, du XIXe siècle,  monsieur et madame de Kerautem et leurs 5 enfants décident de développer une activité touristique. Pour cela, ils sinspirent des châteaux anglais qui ouvrent leurs portes au public et dune chaîne volontaire française, les Castels.","habitants":"Bassetière; Constant Morisson de la Bassetière\r\n        \"","divers":"A St-Julien des Landes le château de Brandois grav 1-2, de Bassetière grav 3,  de la Foret grav 4-5-6 7et de Garangeoire grav-8        ; 46° 38' 30\" Nord, 1° 42' 42\" Ouest","gps":"","images":["../image/image_85/85_St_Julien_Landes_1.jpg","../image/image_85/85_St_Julien_Landes_2.jpg","../image/image_85/85_St_Julien_Landes_3.jpg","../image/image_85/85_St_Julien_Landes_4.jpg","../image/image_85/85_St_Julien_Landes_5.jpg","../image/image_85/85_St_Julien_Landes_6.jpg","../image/image_85/85_St_Julien_Landes_7.jpg","../image/image_85/85_St_Julien_Landes_8.jpg"]},"Consult_chateau_formulaire12cd":{"id":"Consult_chateau_formulaire12cd","dept":"85","canton":"Chantonnay","commune":"Chantonnay","nom":"St_Mars_des_Près","type":"Château","periode":"XIX","histoire":"Deux châteaux à St-Mars, les Près le château de Mr Blanpain, de l'Aunay, de Pailly.                                                                                               BLANPAIN, Louis Blanpain de St-Mars naît à Sigournais, dune famille de propriétaires terriens, dans le château construit en 1848  Louis Blanpain de Saint-Mars est un écrivain vendéen oublié mort aux Sables-dOlonne le 3 février 1951 à 76 ans.    En 1907, Louis Blanpain de St-Mars se marie avec une jeune femme de Fontenay-le-Comte, Antoinette Pichard de La Caillère, dont il aura deux enfants.                                                                                              PAILLY, en 1500, appartenait à la famille des Nouhes, et plus tard la famille de Lespinay. Détruit à la Révolution, il fut reconstruit en 1824 par la famille de Lespinay. Le château est aujourd'hui habité par le couple Xavier et Marie-France de Saint-Pierre. Il a eu trois enfants.  Xavier de Saint-Pierre hérite du château à son tour, en 1956 et l'habite à temps complet en 1961. Xavier a aussi été président de l'association des amis de la Grainetière, qui apporte une aide matérielle et financière aux moines qui vivent à l'abbaye de la Grainetière. Marie-France rejoint donc le château du Pally. La maladie n'a pas permis au couple de châtelains d'avoir une descendance. À 89 ans, Xavier et Marie-France de Saint-Pierre habitent une partie de leur château du Pally. Ils racontent leur histoire, qui est aussi celle du château. Il y a peu d'années encore, Marie-France effectuait le balivage de la forêt. Il fallait sélectionner les plus beaux arbres.","architecture":"l'AUNAY, vous fait découvrir les charmes du XIXe siècle avec son parc de 17 hectares surplombant le lac de Rochereau, son château dinspiration XVIIe et sa vaste cour de dépendances. Construit vers 1880.                                                                                         PAILLY, de plan rectangulaire à deux niveaux cinq travées  lucarnes sur comble, toits en croupe hautes cheminées.\r\nBLANPAIN du XIXe siècle, dit des tuileries. Ce château sera plus tard la proie de deux incendies, le plus intense en 1947, à la sortie de la guerre, le second en 1951. Il est actuellement ruiné.","habitants":"Famille Blanpain Pailly;                                                                   Famille de Lespinay\r\n        \"","divers":"A Chantonnay  le château de Launay  grav 1, de Pailly grav-2, de Blanpain grav 3 à 6","gps":"","images":["../image/image_85/85_St_Mars_des_Pr%c3%a8s_1.jpg","../image/image_85/85_St_Mars_des_Pr%c3%a8s_2.jpg","../image/image_85/85_St_Mars_des_Pr%c3%a8s_3.jpg","../image/image_85/85_St_Mars_des_Pr%c3%a8s_4.jpg","../image/image_85/85_St_Mars_des_Pr%c3%a8s_5.jpg","../image/image_85/85_St_Mars_des_Pr%c3%a8s_6.jpg"]},"Consult_chateau_formulaire670d":{"id":"Consult_chateau_formulaire670d","dept":"85","canton":"La Châtaigneraie","commune":"Saint-Martin-Lars-en-Sainte-Hermine","nom":"St_Martin_Lars","type":"Château","periode":"XIV","histoire":"ST-MARTIN de LARS, vieux château où Eelco et Martine vous accueillent dans leur gîte de XIV siècle.\r\nVivez un moment historique ou vous pouvez vous laisser emporter par le passé et l'histoire des seigneurs d'antan. Gîtes de France.","architecture":"ST-MARTIN de LARS, ce manoir seigneurial se compose d'un grand corps de logis accompagné de bâtiments de communs et d'exploitation groupés autour d'une vaste cour au centre de laquelle se trouvait sans doute un pigeonnier, aujourd'hui disparu. Le corps de logis, bâti à l'extrême fin du XVe siècle, a été allongé dans la première moitié du XVIIe siècle par la construction d'une cage d'escalier à balustres ainsi que de deux autres pièces d'habitation, une salle et une cuisine. Au XVIe siècle, un petit corps de bâtiment abritant un oratoire et une pièce annexe fut édifié dans le prolongement sud de la maison manoriale du XVe siècle.","habitants":"Seigneurs locaux\r\n        \"","divers":"St-Martin-Lars; 46° 35' 27\" nord, 0° 58' 53\" ouest","gps":"","images":["../image/image_85/85_St_Martin_Lars_1.jpg","../image/image_85/85_St_Martin_Lars_2.jpg","../image/image_85/85_St_Martin_Lars_3.jpg"]},"Consult_chateau_formulaire3be9":{"id":"Consult_chateau_formulaire3be9","dept":"85","canton":"Talmont-Saint-Hilaire","commune":"Saint-Mathurin","nom":"St_Mathurin","type":"Château","periode":"XIX","histoire":"MILLIERE, est construit au XIXe siècle pour le comte de Louis Constant de Guinebault et son épouse dame Léontine-Louise-Eugénie de La Roche-Saint-André, à la suite du partage du domaine de la Grassière. M. de Guinnebaud était fils de Constant de Guinnebaud de la Millière, et d'Antoinette-Ursule-Lidie de Kervalloc. Son épouse était fille de Benjamin-Auguste de La Roche-Saint-André et d'Eugénie-Anne-Henriette Ranfray de la Bajonnière. Elle était née à la Grassière le 8 décembre 1815, fut baptisée à la Mothe-Achard, le 13 décembre 1815, fut mariée à  Luçon, est morte à Nantes en février 1910, dans sa 95e année. En 1913, Albert Doyen fait construire les deux ailes extérieures à l'ensemble, et demeure du XIXe siècle par Claude et Danielle Huneault.   Les acheteurs furent maître Bruneteau, avocat, et son épouse Mathilde Mercier, d'une branche des Mercier-Langevinière de Bourgneuf en Saint-Mathurin et des Forges, près de Beaulieu.  Vinrent ensuite monsieur et madame Guérin, dont la fille épousa de Paulo  de Nantes.","architecture":"MILLIERE, devient une exploitation agricole, composée de douze métairies d'un seul tenant, exploitées par douze métayers  Aujourd'hui trois chambres doubles et une suite pour 4 personnes sont aménagées dans cette élégante demeure du XIXe siècle.   Cette terre ne fut pas vendue comme bien de la Nation, car en l'an X de la République, elle appartenait encore à la même famille. Quand M. de Guinnebaud vendit au Poiré-sur-Vie pour bâtir à Saint-Mathurin, la Millière devint la propriété de l'honorable famille Caillé. De ce château, il ne reste plus qu'un pan de mur, et une belle allée de châtaigniers, madame Guérin, devenue veuve, se remaria au comte de Gabriac. Saint-Mathurin lui doit la belle colonne et la statue de N.D. de Lourdes sur la route des Sables. Feu monsieur Gustave Morand, notaire à Chantonnay, devint acquéreur de la Millière vers 1908 - et depuis 1913, en sont propriétaires monsieur et madame Albert Doyen.","habitants":"comte de Louis Constant de Guinebault\r\n        \"","divers":"A saint-Mathurin château  de la Giraudière grv 3 et de la Millière grav 1-2","gps":"","images":["../image/image_85/85_St_Mathurin_1.jpg","../image/image_85/85_St_Mathurin_2.jpg","../image/image_85/85_St_Mathurin_3.jpg"]},"Consult_chateau_formulairedec7-2":{"id":"Consult_chateau_formulairedec7-2","dept":"85","canton":"","commune":"Saint-André sur Sèvre","nom":"St_Mesmin_85","type":"Château","periode":"XIV-XV","histoire":"A Saint-Mesmin la forteresse, le château d'Audraire et de la Lenardière.                                                                                                         AUDRAIRE,  château XIXe siècle, construit par Frédéric Naud devenu maire de la commune en 1908.                                         LENARDIERE, propriété de M. Berthier.                                                       ST-MESMIN, le château « fort » en animations, le château fort de Saint-Mesmin, à Saint-André sur Sèvre, est une forteresse médiévale du XIVe siècle, le seigneur de ce château Le Sevreau., la fait construire aux alentours de 1370. La seigneurie dépendait alors de Guillaume Larchevêque, seigneur de Parthenay. La famille Montfaucon fortifia le château en y ajoutant au XVe siècle limposant donjon de 28 mètres de haut. Le 20 mars 1360, Jehan de Montfaucon est dit chevalier et seigneur de Saint-Mesmin et de la Fosse, bailliage de Vouvant et Mervent.  On peut lire, dans un texte du milieu du XIVe siècle, que le vieux château fort, appartenant à Jehan de Montfaucon est en bon état et fortifié. La famille Du Plessis de la Bourgognière. L'an 1650, achat du château par la famille Petit de la Guierche. De 1755 jusqu'à la Révolution française : la famille de Vasselot. De 1818 à 1990 : la famille Proust propriétaire du château. De 2003 à nos jours : propriété du syndicat mixte","architecture":"AUDRAIRE, tout le manoir XVe siècle est en mauvais état, les couvertures ont été un peu entretenues. Certains bâtiments ont servi d'étables et de remises. Une petite partie est en cours de rénovation                                                                                                              LENARDIERE, se compose d'un corps de logis rectangulaire à deux niveaux et lucarnes sur un toit en croupes prolongés aux extrémités par un pavillon carré toit en croupe et à l'opposé par un pavillon réduit à deux étages accolé aux corps de logis plus un abrit.\r\nST-MESMIN, fortification probable du château de Saint-Mesmin : 1372/1375, le château était entouré de douves en eau, alimentées par la rivière (encore existante),  Laccès au château seffectue par un porche dentrée composé dune porte charretière et dune porte piétonnière. Ce porche donne accès à une vaste cour faisant office de basse-cour, en opposition à la haute cour intérieure du château. Cette cour spacieuse est bordée, sur trois de ses côtés, de bâtiments de ferme à usage agricole (étables, granges, écuries et maison dhabitation), datés pour lensemble du  XVIIe siècle. Face à ce corps de ferme se dresse la forteresse médiévale, limposant donjon de 28 mètres. Le château fut principalement un lieu de résidence Les deux ensembles architecturaux étaient séparés par des douves en eau, qui entouraient le château jusquau XVIIIe siècle. Laccès principal seffectue aujourdhui au moyen dun pont-levis restauré.","habitants":"Audraire; Frédéric Naud                                 M. Berthier.                                    St-Mesmin famille Montfaucon \r\n        \"","divers":"A Saint-Mesmin la forteresse grav 1 à 5, le château d'Audraire grav 6 et de la Lenardière grav 7-8.","gps":"","images":["../image/image_85/85_St_Mesmin_85_1.jpg","../image/image_85/85_St_Mesmin_85_2.jpg","../image/image_85/85_St_Mesmin_85_3.jpg","../image/image_85/85_St_Mesmin_85_4.jpg","../image/image_85/85_St_Mesmin_85_5.jpg","../image/image_85/85_St_Mesmin_85_6.jpg","../image/image_85/85_St_Mesmin_85_7.jpg","../image/image_85/85_St_Mesmin_85_8.jpg"]},"Consult_chateau_formulaire08bc":{"id":"Consult_chateau_formulaire08bc","dept":"85","canton":"Luçon","commune":"Saint-Michel de l","nom":"St_Michel_Lherm","type":"Château","periode":"XVI","histoire":"St-MICHEL de L'HERM, cette commune est dotée notamment d'une abbaye royale, dont les bâtiments appartiennent à la famille Le Roux depuis 1815 (dit le \"Château\"). Le maître autel en marbre polychrome de l'actuelle église provient de l'ancienne abbatiale.  En 682, cest sur un des îlots calcaires du Golfe des Pictons, que des moines de Noirmoutier vinrent ériger labbaye de Saint-Michel-en-lHerm. Elle subit les invasions vikings et connut nombre de destructions et de reconstructions au cours des siècles. Abbaye bénédictine, elle eut une histoire riche et mouvementée, dû notamment aux travaux dassèchement.\r\nDevenue Abbaye Royale après le Concordat signé en 1516, elle eut à sa tête de hauts dignitaires dont le cardinal Mazarin.\r\nPlus aucun moine ny vit depuis la Révolution Française. En 1818, elle devint propriété privée et  désormais depuis deux siècles une propriété familiale.     Alfred Le Roux (1815-1880), propriétaire de l'ancienne abbaye, député de la Vendée, ministre de l'agriculture et du commerce sous le Second Empire.","architecture":"St-Michel de Lherm, l'Abbaye Royal grosse bâtisse rectangulaire à trois niveaux avec lucarnes sur le  toit brisé avec retour en équerre d'un bâtiment oblong d'un niveau.                                            L' hôtel de ville, petit manoir de deux niveaux corps de logis à trois travées  accolé de chaque côtés de pavillons saillants, l'ensemble de la toiture presque plat.","habitants":"Famille Le Roux\r\n        \"","divers":"A Saint-Michel de l'Herm l'abbaye château et manoir de l'hôtel de ville grav 4 .      46° 21' 19\" nord, 1° 14' 51\" ouest","gps":"","images":["../image/image_85/85_St_Michel_Lherm_1.jpg","../image/image_85/85_St_Michel_Lherm_2.jpg","../image/image_85/85_St_Michel_Lherm_3.jpg","../image/image_85/85_St_Michel_Lherm_4.jpg"]},"Consult_chateau_formulairecb48":{"id":"Consult_chateau_formulairecb48","dept":"85","canton":"Les Herbiers","commune":"Saint-Michel-Mont-Mercure","nom":"St_Michel_Mont_Mercure","type":"Château","periode":"XVI","histoire":"Deux châteaux à st-Michel-Mont-Mercure, dit de BLotière et  de Bonnelière.                                                                                           BLOTIERE,  a appartenu, entre autres, aux familles de La Carte et Barbot. En effet, en 1720, après avoir acquis La Blotière de la succession de Emmanuel Hurault, seigneur de la Belotière et de Vibraye, le marquis de La Carte, au nom de sa femme, se lança dans un procès afin d'obtenir une diminution sur le prix d'achat. Les de La Carte n'y habitaient pas mais ils louaient la propriété a un certain Merceron, fermier. En 1732, Marie Angélique Dacquin Buron de Beaupuy, marquise de La Carte, afferme la terre et seigneurie de la Belotière pour neuf années au ménage Lemercier-Barbot. Le 23 août 1740, la marquise de La Carte passe un deuxième bail, mais cette fois à Jean Barbot et  sa femme. En 1790, on trouve au château de La Blottière leur petit-fils, Jean-François Barbot, notaire et maire de Saint Michel Mont Mercure. Monsieur Fortin propriétaire.                                                     BONNELIERE, fondé par les Bonneau passa toujours par héritage dans de nombreuses familles,  à la Révolution vendu comme bien national acquis par le fermier de la seigneurie le vendit au même prix au  de Gourjaut héritier du précédant propriétaire. Le château de la Bonnelière est un château privé. Laccès est autorisé uniquement dans la cour ce qui est fort compréhensible. Famille de de monsieur François Loyau.","architecture":"BLOTIERE, manoir de plan rectangulaire d'un niveau,  corps de logis central à cinq travées accolé de deux tourelles rondes en façade dont une flanqué à l'angle intérieur d'un pavillon en retour d'équerre à deux niveaux, toits recouvert d'ardoises avec fronton central triangulaire et lucarnes.                                                     BONNELIERE, se situe sur la commune de Saint-Michel-Mont-Mercure dans le haut bocage Vendéen, élégant manoir du XVIe siècle  remanié au XVIIe siècle, en franchissant le porche, le château se dévoilera enfin à vous. Sa construction sétale entre le XVIe et le XVIIe siècle. Ses douves, maintenant sèches, datent de 1635. Un imposant pont-levis permet daccéder à la demeure. Des armoiries  sont gravées sur le portail principal. le corps central doté d'un fronton  armorié complété par des pavillons de ferme coiffés en carène de navire renversée,  orné de pavillons en retour à l'angle desquels se dresse une tourelle et précédé de douves. Le corps de logis, quant à lui, arbore fièrement de délicates fenêtres à meneaux,  un pont-levis permet le franchissement des douves. Il faut savoir que la façade et les toitures sont inscrites aux M.H. depuis 1972. Toute cette variété architecturale fait du château de la Bonnelière une demeure unique en son genre.","habitants":"\"","divers":"A st-Michel-Mont-Mercure dit de BLotière grav1 à 3 et  de Bonnelière.  Grav 5 à 8 ;46° 49' 36\" nord, 0° 56' 07\" ouest","gps":"","images":["../image/image_85/85_St_Michel_Mont_Mercure_1.jpg","../image/image_85/85_St_Michel_Mont_Mercure_2.jpg","../image/image_85/85_St_Michel_Mont_Mercure_3.jpg","../image/image_85/85_St_Michel_Mont_Mercure_4.jpg","../image/image_85/85_St_Michel_Mont_Mercure_5.jpg","../image/image_85/85_St_Michel_Mont_Mercure_6.jpg","../image/image_85/85_St_Michel_Mont_Mercure_7.jpg","../image/image_85/85_St_Michel_Mont_Mercure_8.jpg"]},"Consult_chateau_formulaire8997":{"id":"Consult_chateau_formulaire8997","dept":"85","canton":"Les Herbiers","commune":"Saint-Paul-en-Pareds,","nom":"St_Paul_en_Pareds","type":"Château","periode":"XIV-XV","histoire":"Deux châteaux dans cet article de Saint-Paul en Pareds  celui de Bois-Rousseau et celui de Noyers                                                                 BOIS-ROUSSEAU, les plus anciens propriétaires connus sont les Voussart. Tout porte à croire que ce sont eux qui ont construit le château. On trouve un Jean Voussart, seigneur du Bois Rousseau dès 1387, et encore un Louis Voussart en 1620. La famille Voussart était très pieuse : au début du XVIe siècle, Pierre Voussart, à l'occasion de son mariage avec Madeleine Chabot, avait fait un don à l'église de Saint-Paul en Pareds, ce qui lui avait donné le droit de placer son blason sur le porche de l'église. Quelques années plus tard, vers 1534, le seigneur du Bois Rousseau entretenait encore un chapelain alors que Jean Calvin arrivait en Poitiers. Comme beaucoup de petits nobles bas poitevins, Voussart est séduit par les idées du prédicateur. Depuis cette époque, à l'exception d'une courte période, la demeure est toujours resté la propriété d'une famille protestante. Parmi eux, Balda de Lastes, qui fut interné 14 mois et 10 jours au donjon de Niort. Il fut libéré le 14 septembre 1700 sans avoir abjuré et mourut le lendemain. Il fut inhumé au Bois Rousseau à l'écart du château. C'est là l'origine du petit cimetière privé qui est toujours en service. Les bâtiments ont été incendiés lors des guerres de Vendée, et seule une partie de l'aile ouest semble avoir été épargnée.","architecture":"BOIS-ROUSSEAU  de plan rectangulaire à deux niveaux, cour fermé par des dépendances de même niveaux avec mâchicoulis sur angles.                                                                                                         NOYERS, il a été édifié au XVe siècle. Ce château, fut l'un des plus importants de la région. Il commença à décliner dès le XIe siècle puis passa sous la dépendance des seigneurs de La Flocellière. Les guerres de religion épargnèrent relativement la commune mais l'église n'échappa pas au pillage et à l'incendie. Pendant la Révolution française et la guerre de Vendée, la population se rangea unanimement du côté des insurgés. Elle en subit les conséquences sous la forme du massacre de 72 personnes dans la cour du château des Noyers, le 31/01/1794. Le château des Noyers est inscrit aux M.H. le 26/10/1995.Les éléments protégés du château sont le corps de logis, les bâtiments de greniers, les façades et toitures des communs, les murs de clôture avec leurs portails, les parcelles correspondant au sol des anciens jardins ou ils sont inscrits le 26/10/1995.","habitants":"Bois-Rousseau Famille de Jean Voussart                       Noyers  seigneurs de La Flocellière\r\n        \"","divers":"A Saint-Paul en Pareds  château de Bois-Rousseau grav 1 à 4   et celui de Noyers    Noyers;  46° 50' 29,04\" Nord, 0° 57' 06,48\" Ouest","gps":"","images":["../image/image_85/85_St_Paul_en_Pareds_1.jpg","../image/image_85/85_St_Paul_en_Pareds_2.jpg","../image/image_85/85_St_Paul_en_Pareds_3.jpg","../image/image_85/85_St_Paul_en_Pareds_4.jpg"]},"Consult_chateau_formulaire2e70":{"id":"Consult_chateau_formulaire2e70","dept":"85","canton":"Fontenay","commune":"Saint-Sornin","nom":"St_Sornin","type":"Château","periode":"XVI","histoire":"Saint-SORNIN,  le logis de la Borderie (ou « château de Saint-Sornin », la maison de la Frenaudière (propriété privée) ;le logis de la Garenne , et sa fuie, de la famille de Laroque Latour.                                                                             ST-SORNIN Le 15 février 1561 Claude Millon, écuyer, seigneur du Fief-Millon et de Saint-Sornin, rendait aveu à Tanneguy du Bouchet, baron du Poiroux, qui paraît avoir été le terrible huguenot célèbre dans les guerres de religion sous le nom de Saint-Cyr, et avoir, en 1564, fait subir de graves mutilations à l'église de Saint-Sornin. Cet aveu était fait de \"son hôtel et seigneurie de Saint-Sornin\", dont dépendaient notamment trois métairies sises en la paroisse, et appelées la Maison-Neuve, La Blanchardière et la Frairie. En 1585, Saint-Sornin passa aux du Bouchet eux-mêmes, dont un, Joachim, fit, le 21 août 1604, ériger cette terre en châtellenie.Au commencement du XVIIe siècle, cette terre fut achetée par les de Saligné qui, en 1621, la vendirent à René Grassineau, seigneur des Enfrais et sénéchal des Éssarts. Un Saturnin Grassineau, étant mort le 9 août 1697, sans descendant mâle, laissa la châtellenie de Saint-Sornin à sa fille Marie-Anne, épouse de Nicolas de Gabaret, gouverneur pour le roi dans les îles françaises d'Amérique. Vers 1750, cette seigneurie passa aux Harouard du Beignon. En 1771, françois Harouard, seigneur de Saint-Sornin et de la Barre, vendue à son père par Baptiste de Castellane, céda ces terres à Mme Marie-Louise-Renée d'Espinay, veuve de Lantivy,et c'est en vue de cette vente que fut construit par un Harouard de Saint-Sornin, le château actuel, le vendeur s'étant expressement réservé dans l'acte le droit exclusif de porter sa vie durant, le nom de Saint-Sornin","architecture":"Le 15 avril 1774, Mme de Lantivy, qui n'avait pu payer le prix de son acquisition céda , les châteaux et domaines de Saint-Sornin à messire Salomon Lesvêque de Puyberneau de la Boislinière. Par suite d'alliance, les terres de La Barre et de Saint-Sornin sont depuis 1871, la propriété de M. Merveilleux-Duvigneaux, ancien premier président à la cour d'Appel de Poitiers.\r\nSt-SORNIN la fuie, ses petites ouvertures étaient assez grandes pour permettre le passage des pigeons, et suffisamment petites pour éviter l'intrusion des prédateurs.\r\nLa fuie de la Garenne est le témoin de notre histoire, héritière du columbarium romain, une variante de petite taille annexée à tour à une construction.  Elle date, dit-on, de la Renaissance, s'est appelée en latin « fuga » puis « fua » pour prendre le nom de « fuie » Celle-ci a été préservée au fil du temps par la famille de Larocque-Latour. Alain, l'ancien exploitant de la ferme annexée au logis ne tarit pas d'éloge sur sa beauté : « C'est un petit paradis, on est bien ici» C'est lors d'une balade du côté de la Garenne qu'il sera possible de découvrir un des secrets cachés de Saint-Sornin.","habitants":"Messire Salomon Lesvêque de Puyberneau de la Boislinière\r\n        \"","divers":"Saint Sornin la fuie de borderie grav 1-2 le château de Garenne  grav 3- 4 et de Laroque grav -5","gps":"","images":["../image/image_85/85_St_Sornin_1.jpg","../image/image_85/85_St_Sornin_2.jpg","../image/image_85/85_St_Sornin_3.jpg","../image/image_85/85_St_Sornin_4.jpg"]},"Consult_chateau_formulaire1cc2":{"id":"Consult_chateau_formulaire1cc2","dept":"85","canton":"Aizenay","commune":"Saint-Sulpice le Verdon","nom":"St_Sulpice_Verdon","type":"Château","periode":"XVI","histoire":"A Six KM de  de St-Sulpice le château  de Butière à Mormaison CHABOTERIE, il appartenait à la famille des Chabot doù son nom de Chabotterie, puissante seigneurie de Rocheservière et de Saint-Denis la Chavasse, Jean de Chabot édifie en 1384 le premier château, Arthur de Chabot n'ayant eu que deux fils morts sans postérité le domaine passe à sa fille Perette qui épouse en 1554 Jacques Aubert seigneur de la Normandelière, restée veuve Perette convole en 1576 avec Gabriel Darrot seigneur de la Fromentinière, déja père de deux enfants un fils et une fille issus d'une précédente union. Les enfants de Perette un fils et une fille épousent le fils et la fille de leur beau-père, en 1588 la Chabotterie revient à Gabriel Darrot resté veuf du second mariage et à Jean Aubert gendre et beau-fils de procéder la remise en état du château,  et à sa mort en 1627 aucun des sept enfants nés de ses trois  mariages successifs  n'a survécu et le domaine passe aux descendants de sa soeur Elisabeth; habité par des fermiers de la seigneurie échoit en 1642 à Héléne Darrot, épouse de son cousin Gilbert Darrot seigneur de l'Huilière. Leurs descendants dans cette famille jusqu'en 1728 sa veuve transmet le domaine à l'une de ses nièces madame de Fontenelle, puis à la fille de cette dernière madame de Goué. Passe des moments sombres à la Révolution deux de leurs fils émigrent, plusieurs de leurs filles massacrées en 1794 malgré tout reste dans la descendance des  Goué  Jusqu'à son rachat  en  1991 par le conseil général de Vendée pour abriter le Mémorial .","architecture":"CHABOTTERIE, le château date de la seconde moitié du XVe siècle. établi à l'emplacement d'une forteresse détruite lors de la guerre de Cent Ans, construit essentiellement en deux étapes (un Logis du XVe siècle auquel s'adjoint au nord un imposant pavillon carré au début du XVIIe siècle) modifié au XVIIIe siècle et XIXe siècle, il est connu pour avoir été impliqué à plusieurs reprises dans des événements historiques majeurs pour la Vendée: les Guerres de Religion et l'arrestation du chevalier de Charrette en 1796. De son architecture assez hétérogène, on retient surtout l'élévation très élaborée de la tour d'escalier XVIIe. Devenu l'un des lieux emblématiques de la guer
