sult_chateau_formulaire4779","nom":"Verger","commune":"Saint-Christophe du Ligneron","type":"Château","img":"../image/image_85/85_Verger_1.jpg"},{"id":"Consult_chateau_formulaireb7fc","nom":"Verrie","commune":"Mortagne sur sévre","type":"Château","img":"../image/image_85/85_Verrie_1.jpg"},{"id":"Consult_chateau_formulaire8b86","nom":"Vigneau","commune":"St_Germain_l","type":"Manoir","img":"../image/image_85/85_Vigneau_1.jpg"}];const FULL={"Consult_chateau_formulairef790":{"id":"Consult_chateau_formulairef790","dept":"85","canton":"Challans","commune":"Apremont","nom":"Apremont_85","type":"Vestiges -Châteaux","periode":"XIII-XV","histoire":"Deux châteaux à Apremont, Apremont et l' Audardière  et le manoir de  la Tuderrière ( voir article pour ces deux derniers)                                                                           APREMONT, en 1437  Isabeau de Rochechouart apporte Apremont en mariage à Renaud de Chabot seigneur de Jarnac, un château Renaissance construit dans la première moitié du XVIe siècle par le petit fils Philippe de Chabot de Brion, comte de Charny, amiral de France et ami denfance et serviteur de François 1er, en 1542 est cédé à la famille de Brosse. Jean de Brosse comte de Penthièvre et duc d'étampes, époux d'Anne de Pisselieu favorite du roi. Le roi Louis XIII y séjourna le 17 avril 1622, après sa victoire à Riez sur les troupes protestantes de Soubises.  Par le jeu des alliances le château échoit à Charles Paul Sigismond  de Montmorency-Luxembourg et en 1743 celui-ci  le vend à un architecte, les matériaux du corps de logis à l'exception   du rez-de-chaussée des tours et de la chapelle. Malgré la démolition le restant  est un bel ensemble résidentiel qui passent dans différentes familles avant de devenir la propriété de la commune, des travaux en cours depuis l'achat.","architecture":"APREMONT, le château fort primitif date sans doute du XIIIe siècle et avait été construit sur un promontoire rocheux dominant la Vallée de La Vie. De cette forteresse, la chapelle gothique et deux tours renaissance sont les seuls reste de l'édifice construit entre 1530 et 1536 par Philippe de Chabot de Brion amiral de France sur des assises du XIe siècle,  à lorigine de plan polygonal, on peut voir aujourdhui la porte dentrée encadrée de deux tours  rondes couronnées de galeries avec balustres à l'italienne munis de mâchicoulis ainsi que certaines courtines flanquées de tours dont lune possède des archères de défense, des frises de macarons  et d'arabesques des balustres ornent la façade sur la Vie. La partie centrale du château fut démolie en 1733.  Sur le site dun bâtiment plus ancien protégé par une enceinte polygonale du XIIIe siècle quil conserve,  Les vestiges actuels suggèrent un ensemble du XVIe siècle encore défensif. Malgré leurs proportions massives, les tours du château ont cependant recours au vocabulaire architectural caractéristique des débuts de la Renaissance qui se déployait sur le corps de logis,  structuration orthogonale de la façade, avec insistance sur les axes verticaux des fenêtres et des lucarnes, larges fenêtres à croisillons. Louis XIII revenant de la bataille de Riez y séjourna en 1622.","habitants":"Famille de  Renaud de Chabot \r\n        \"","divers":"Château d'Apremont 46° 44' 57,36\" Nord et 1° 44' 29,4\" Ouest","gps":"","images":["../image/image_85/85_Apremont_85_1.jpg","../image/image_85/85_Apremont_85_2.jpg","../image/image_85/85_Apremont_85_3.jpg","../image/image_85/85_Apremont_85_4.jpg","../image/image_85/85_Apremont_85_5.jpg"]},"Consult_chateau_formulairee02e":{"id":"Consult_chateau_formulairee02e","dept":"85","canton":"Les Herbiers","commune":"Les Herbiers","nom":"Ardelay","type":"Château","periode":"XV-XVI","histoire":"ARDELAY , cité en 1130 par une châtellenie d'Ardelay, Le donjon du XVe siècle construit par la famille de Brosses qui ont succédé aux Parceds et aux Chantemerle. En 1421  passe par alliance de Marguerite de Brosses apporte Ardelay  à Germain de Vivonne, leur fils André, remplira de hautes fonctions à la cour sous le règne de Charles VII  et de François Ier et sera le père de l'infortune la Chataigneraie. En 1627  François de la Rochefoucault par alliance avec Andrée de Vivonne devient propriétaire du château  qui le revende en 1635 à Marguerite de Couhé. Après les Vivonne d'Ardelay passe à plusieurs familles dont les Bourdeille, avant de venir en 1687 à Henri des Herbiers seigneur de l'Etenduère. Ses héritiers  le cèdent en 1767 aux Escoubleau de Sourdis dont les descendants le conserveront jusqu'en 1858. Sortira intact de la Révolution régulièrement habité par les propriétaires jusqu'en dans les  années 1920. Dans la seconde guerre les allemands n'hésiteront pas d'utiliser les poutres du plancher du donjon pour bois de chauffage. Laissé à l'abandon après être utilisé comme exploitation agricole il fut acquis par la municipalité des Herbiers en 1984.","architecture":"ARDELAY, les textes anciens mentionnent les origines d'Ardelay au XIIe siècle.  Sis en bordure d'une voie ancienne, Le grand chemin du Bocage, ce petit château de poche, dernier vestige d'un ensemble plus vaste, arbore avec orgueil la masse imposante de son donjon majestueux. Un pont-levis, restauré à l'ancienne, donne accès à une petite cour bordée d'un corps de logis du XVIe siècle, d'un donjon carré du début du XVe siècle et des communs du XVIIIe siècle. L'ensemble a conservé son caractère austère de fortification militaire. Un escalier en vis dessert les trois étages. Au dernier niveau, on peut admirer limposante charpente supportant le toit pyramidal mais aussi les mâchicoulis et les bretèches visibles sur les quatre faces extérieures qui servaient à la défense du donjon par un tir plongeant. Le logis fut construit au XVIe siècle, et compte de superbes cheminées en granit. Enfin, les communs ont été bâtis au XVIIIe siècle. Avec ses ruines chancelantes et sa végétation envahissante, ce château fut acquis par la municipalité des Herbiers en 1984, et soudain, grâce à une restauration exemplaire, achevée en 1988, il a retrouvé sa fierté et sa prestance d'antan.","habitants":"Famille des  Escoubleau de Sourdis \r\n        \r\n        \"","divers":"Tour d'Ardelay; 46° 51' 11\" nord, 1° 00' 19\" ouest","gps":"","images":["../image/image_85/85_Ardelay_1.jpg","../image/image_85/85_Ardelay_2.jpg","../image/image_85/85_Ardelay_3.jpg","../image/image_85/85_Ardelay_4.jpg","../image/image_85/85_Ardelay_5.jpg","../image/image_85/85_Ardelay_6.jpg","../image/image_85/85_Ardelay_7.jpg"]},"Consult_chateau_formulairea367":{"id":"Consult_chateau_formulairea367","dept":"85","canton":"Les Sables d","commune":"St-Clair La Chaume","nom":"Arundel_Chaume","type":"Tour","periode":"XIV-XVII-XIX","histoire":"Tour ARUNDEL, dit de Saint-Clair ou de Chaume, La tour d'Arundel fait partie du système défensif du château Saint-Clair, au XIVe siècle, pour les Princes de Talmont, qui souhaitaient développer le secteur d'Olonne. Le premier feu fut installé en 1593.  cité au XIIe siècle  par Henri de Plantagenêt et appelé château Gauthier. Il appartient aux seigneurs de Talmont-Saint-Hilaire et le restera jusqu'à la Révolution bien que des troupes royales y aient été installées après son démantèlement, à la fin du XVIIe siècle, fut construit par les princes de Talmont au XVe siècle, Soubise chef protestant s'empare du château en 1622 et y fait construire des fortifications.  Épargné par Richelieu, il est démantelé sur ordre de Louvois en 1689, qui fait raser l'enceinte et les murs du château. A la fin du XVIIIe siècle, le feu de La Chaume est le seul phare de Vendée. Il faut attendre la fin du XVIIIe siècle pour entendre parler de Tour d'Arundel , sa forme actuelle résulte de travaux de restauration opérés de 1857 à 1858  et  racheté par lEtat en 1835, puis restauré à nouveau de 1986 à 1994, le château abrite actuellement le Musée de la mer et de la pêche. En haut de la tour, un superbe panorama de la ville et des marais notamment grâce à une table dorientation datant de 1911.","architecture":"Tour ARUNDEL, elle a été créée en 1593. La Tour d'Arundel est située sur la terrasse de la tour, qui constitue le donjon carré de l'ancien château Saint-Clair à la Chaume, bâti à l'entrée du Port des Sables-d'Olonne. A la fin du XVIIIe siècle, le feu de La Chaume est le seul phare de Vendée, est composé d'une tour-donjon et d'un corps de bâtiment à 2 niveaux. A l'origine, il s'agit d'une place forte où résidaient les officiers et le capitaine représentant l'autorité seigneuriale. Installé en haut du donjon, haut de 32 mètres, se trouve un phare, le plus ancien feu de la cote. La Tour d'Arundel fait 27 m de hauteur et 36 m d'élévation. Cet ancien phare était mentionné en 1593, dans une lettre. Il sera le seul feu jusqu'en XVIIIe siècle. Il sera éteint à la Révolution puis sera rallumé en 1804.  la Tour d'Arundel est accessible au public en visitant le Musée de la mer, d'avril à septembre. Du haut de la tour, une vue exceptionnelle sur la baie des Sables d'Olonne.","habitants":"princes de Talmont \r\n        \"","divers":"Tour d'Arundel;  46° 29' 38\" Nord, 1° 47' 44\" Ouest","gps":"","images":["../image/image_85/85_Arundel_Chaume_1.jpg","../image/image_85/85_Arundel_Chaume_2.jpg","../image/image_85/85_Arundel_Chaume_3.jpg","../image/image_85/85_Arundel_Chaume_4.jpg"]},"Consult_chateau_formulairefb22":{"id":"Consult_chateau_formulairefb22","dept":"85","canton":"Montaigu","commune":"La Boissière-de-Montaigu","nom":"Asson","type":"Château","periode":"XIX","histoire":"ASSON, ce château à l'aspect imposant fut brûlé pendant la Révolution et rebâti vers 1807 par la famille Mauclerc. Ce manoir n'a rien de remarquable comme architecture, et pourtant à cette maison grise cachée dans les bois se rattachent des souvenirs d'un grand intérêt, c'est là que pendant plusieurs siècles ont habité de bons chrétiens et de grands chasseurs devant l'Eternel, les Baudry d'Asson. Aucun document ne donne l'origine de cette seigneurie dépendante de la baronnie de Montaigu. Asson est un très vieux nom, puisque on le trouve mentionné aux actes des Apôtres.  Aujourd'hui l'édifice appartient à monsieur Gilles de Baudry d'Asson.","architecture":"ASSON, un bel étang traversé par le ruisseau de l'Asson sert de douves au castel et en fait une belle habitation. Celle-ci est composée d'un long corps de bâtiment avec un rez-de-chaussée surélevé ou se trouvent les pièces de réception, toutes éclairées par de grandes fenêtres. Un premier étage, assez élevé, et un deuxième, mansardé, mais ayant  de belles pièces.","habitants":"Famille Mauclerc\r\n        \r\n        \"","divers":"Château d' Asson;  58' 19\" Nord et 1° 11' 34\" Ouest","gps":"","images":["../image/image_85/85_Asson_1.jpg","../image/image_85/85_Asson_2.jpg","../image/image_85/85_Asson_3.jpg"]},"Consult_chateau_formulaire2f1d":{"id":"Consult_chateau_formulaire2f1d","dept":"85","canton":"La Chataigneraie","commune":"La Réorthe","nom":"Aubraye","type":"Château","periode":"XIV-XVII","histoire":"A la Réorthe deux châteaux, celui d'Aubraye  et de Chateauroux.                                                                                                     L'AUBRAYE, seigneurie des Suriette,  Nicolas de Suriette en 1370 épouse marguerite d'Appelvoisin fille du seigneur de Bois-Chapeleau, passe ensuite à la famille de Sanzay, Louis de Sanzay décède sans postérité passe le domaine à madame Seuzanet née Elisabeth de Courcillon, en 1684 sa fille  Héléne épouse Abraham du Bois, seigneur de la Touche-Levrault, Elisabeth du bois héritière après la mort des deux frères épouse Charles-Louis de Crugy de Marcillac que ces derniers émigrent à la Révolution charge Jean Joubert notaire à la Réorthe de le racheter avec la métairie qui le jouxte, la fille de Jean Joubert Marie-Thérése Gabrielle  épouse en 1809 un médecin Paul Benjamin Clémenceau dont la famille possède  le manoir du colombier à Mouchamps elle viendra s'installer à l'Aubraye ou naîtra son unique enfant, Benjamin Clémenceau médecin également épouse Sophie Gautreau ils auront six enfants dont Georges le plus illustre de la fratrie. Albert avocat engagé avec son frère dans le combat pour la révision du procès Dreyfus et Paul ingénieur qui héritera de l'Aubraye, mort sans postérité, Paul Clémenceau légua le château à son petit-neveu prénommé Georges comme son grand-père.                                             CHATEAUROUX L'entreprise SCI CHATEAUROUX, exerçant son activité dans le domaine de la location de terrains et d'autres biens immobiliers, est actuellement dirigée par Bruno Bougeard.","architecture":"L'AUBRAYE, forteresse féodal du XIIe siècle vers 1370,  en 1575 construction du corps de logis du château actuel et au XVIIe siècle des bâtiments bas dans la cour intérieure. En partie ruinée pendant la guerre de cent-ans et dont subsistent que les tours d'angle percées de meurtrières, l'ancienne basse cour bordé par les bâtiments  des communs à conservé une tour ronde dont la toiture pointue est soutenue par des piliers de bois. Des douves franchies par un ancien pont-levis aboutissant à une poterne crénelée séparent la basse-cour de l'habitation seigneuriale qui occupe la partie droite d'un terre plein entouré de murs dont la base est baignée par les douves et flanqué à ses angles extérieurs de tours rondes. Le corps de logis de trois niveaux dont un de comble avec travées   régulières dans lesquelles s'encadrent des fenêtres à meneaux et des lucarnes sommées de frontons. Prolongé du côté de la cour intérieure par une aile basse du XVIIe siècle coiffée d'un toit pentu recouvert de tuiles.                                                                                                                         CHATEAUROUX, de plan rectangulaire à trois niveaux avec lucarnes sur combles avec toits très pentus, pavillon d'entrée de plan carré saillant de trois niveaux, tour ronde sur la droite toit en poivrière sur chemin de ronde et deux échauguettes sur façade dont une sur l'angle gauche toit en poivrière.","habitants":"Famille de Sanzay.                                                                        Paul Benjamin Clémenceau \r\n        \r\n        \"","divers":"château de l'Aubraye; 46° 35' 36\" nord, 1° 02' 32\" ouest  grav 1 à 8   et le château de Châteauroux à  La Réorthe  grav 9 .                46° 36' 28\" nord, 1° 02' 55\" ouest","gps":"","images":["../image/image_85/85_Aubraye_1.jpg","../image/image_85/85_Aubraye_2.jpg","../image/image_85/85_Aubraye_3.jpg","../image/image_85/85_Aubraye_4.jpg","../image/image_85/85_Aubraye_5.jpg","../image/image_85/85_Aubraye_6.jpg","../image/image_85/85_Aubraye_7.jpg","../image/image_85/85_Aubraye_8.jpg","../image/image_85/85_Aubraye_9.jpg"]},"Consult_chateau_formulairefcca":{"id":"Consult_chateau_formulairefcca","dept":"85","canton":"Challans","commune":"Apremont","nom":"Audardière","type":"Forteresse","periode":"XIII-XVI","histoire":"AUDARDIERE, les origines de l'Audardière se confondent avec celles de la famille Mauclerc qui paraît l'avoir possédé depuis le début du XIIIe siècle. Au milieu du XVIe siècle, après douze générations de Mauclerc, le château va se transmettre par les femmes et ses seigneurs vont changer de nom presque à chaque génération (La Touche, Puy du Fou, Serventeau, etc), et on arrive à dame Marie Sebois qui possède l'édifice en 1837. Elle meurt en 1842, ayant eu des enfants de deux mariages, l'un avec M. Boulais, l'autre avec M. Prébois et comme il n'y a pas d'accord entre les héritiers, il sera vendu par adjudication le 30 novembre 1842. L'acquéreur sera une des héritières, madame Charles Bosset, née Clara Boulais. En 1882, les deux filles de madame Bosset vont échanger l'Audardière avec M. et Mme Eléonor Honoré Rangaine. A la mort de M. Rangaine, en 1906, sa fille en hérite mais cède la propriété à son neveu. L'Audardière appartient en 1951 au comte et à la comtesse de Bonneval.","architecture":"AUDARDIERE, château féodal remanié au XVIIIe siècle. On peut encore voir sur le porche l'entrée les traces de l'ancien pont-levis et les douves,  les façades et les toitures du château avec sa tour et de l'aile des communs en retour, le puits, l'escalier droit du logis avec sa cage, l'ancien salon au rez-de-chaussée avec leur décor : inscription par arrêté du 2 mars 1981.","habitants":"Famille Mauclerc \r\n        \r\n        \"","divers":"château de l'Audardière ;  46° 43' 55\" Nord et 1°45'33\" Ouest","gps":"","images":["../image/image_85/85_Audardi%c3%a8re_1.jpg","../image/image_85/85_Audardi%c3%a8re_2.jpg","../image/image_85/85_Audardi%c3%a8re_3.jpg"]},"Consult_chateau_formulaire4d9e":{"id":"Consult_chateau_formulaire4d9e","dept":"85","canton":"Mortagne sur Sèvres","commune":"St-Laurent sur Sèvres","nom":"Barbinière","type":"Château","periode":"XIV-XVIII-XIX","histoire":"BARBINIERE, dit vieux logis, au XIVe siècle, le baron de Mortagne possédait le domaine de Saint-Laurent en direct et jusqu'à la Révolution, Au XVIIIe siècle, le baron vendit des métairies. Le manoir de Saint-Laurent devint le presbytère après des travaux. D'autres fiefs existaient sur la paroisse : on retiendra la Grande Vergnaie, la Barbinière, la Maltière et la Barre. Une partie du territoire constituant la grande Vergnaie se trouvait sur les marches Anjou-Poitou. Pour la partie poitevine, le possesseur devait rendre hommage au baron de Mortagne. Si la Barbinière prit de l'importance aux XVIIIe et XIXe siècles, il ne s'agissait pourtant pas à l'origine d'une importante seigneurie. Toutefois, les familles d'Espinasseau et Sapinaud de Bois-Huguet choisirent de s'installer dans ce château. Progressivement, à la faveur de mutations foncières, ils se constituèrent une propriété autour du vieux logis. En 1893, le marquis Albert-Charles-François d'Aviau de Piolant y construisit le château de la Barbinière, transformé en hôtel restaurant.","architecture":"BARBINIERE, au XIXe siècle, le corps de logis central de plan rectangulaire à deux niveaux série de lucarnes sur combles, pavillon central d'entrée rectangulaire saillant à trois niveaux et comble avec lucarnes la partie basse en façade pavillon arrondie avec terrasse au premier, retour en équerre d'un pavillon  de deux travées  avec tour carrée à trois niveaux en prolongement avec trois grandes baies de chaque côtés à meneaux et à l'arrière  une tour ronde à trois niveaux toit en poivrière, de l'édifice les toits en croupes en ardoise ainsi que sur les pavillons toits à l'impérial.","habitants":"Famille d'Espinasseau   et le marquis Albert-Charles-François d'Aviau de Piolant\r\n        \"","divers":"Château de Barbinière; 46° 57' 34\" Nord, 0° 53' 30\" Ouest","gps":"","images":["../image/image_85/85_Barbini%c3%a8re_1.jpg","../image/image_85/85_Barbini%c3%a8re_2.jpg","../image/image_85/85_Barbini%c3%a8re_3.jpg","../image/image_85/85_Barbini%c3%a8re_4.jpg","../image/image_85/85_Barbini%c3%a8re_5.jpg"]},"Consult_chateau_formulaire875f":{"id":"Consult_chateau_formulaire875f","dept":"85","canton":"Les Herbiers","commune":"Saint-Paul-en-Pareds","nom":"Barbère","type":"Vestiges","periode":"XIV-XVII","histoire":"BARBERE, le 1er septembre 1378, Jehan de la Barbère, simple sergent d'armes, fut chargé par le sénéchal du Poitou de se rendre au château de la Flocellière, pour signifier au seigneur Jacques Ier de Surgères d'avoir à comparaître personnellement devant ledit sénéchal. Au début du XVIIe siècle, le domaine de la Barbère est la propriété de la famille Boexon. Un siècle plus tard il est possédé par Charles de Hillerin dont les ennuis financiers entrainèrent un procès qui dura 115 ans et ne fut clos qu'en 1813. Fin janvier 1794, plusieurs vendéens et vendéennes y furent massacrées par une colonne républicaine.","architecture":"BARBERE, le château de la Barbère est une modeste construction dont les parties les plus anciennes doivent remonter au XVe siècle. L'étendue du domaine ne permettait pas à son châtelain de mener grand train et on peine à suivre les traces de ses propriétaires avant le XVIIe siècle.  Aujourd'hui, les bâtiments tombent en ruine petit à petit et la proximité d'un élevage dissuade les amateurs amoureux des vieilles pierres de venir s'y installer.","habitants":"Famille Boexon.\r\n        \"","divers":"Château de Barbère","gps":"","images":["../image/image_85/85_Barb%c3%a8re_1.jpg","../image/image_85/85_Barb%c3%a8re_2.jpg","../image/image_85/85_Barb%c3%a8re_3.jpg"]},"Consult_chateau_formulaire69d5":{"id":"Consult_chateau_formulaire69d5","dept":"85","canton":"Aizenay","commune":"Poiré sur Velluire","nom":"Barlot_Poiré","type":"Château","periode":"XV-XVI","histoire":"BARLOT, dit chastelier-Barlot,  dorigine féodale, il est reconstruit en 1593, par Jehan Morisson, architecte.  Les Barlot, seigneurs de la Tremblaye, font souche au Chastelier au début du XVe siècle. Le plus important de leurs descendants est, sans aucun doute, Léon. Il naît au Poiré en 1582, à 12 ans il prend le parti des armes, dès 15 ans il est lun des sept gentilshommes les plus distingués nommés chef de la Province. Après avoir servi sous Henri IV il obtient de lever un régiment pour le dauphin. Il servira tout aussi fidèlement et courageusement Louis XIII, il consacre les dernières années de sa vie à rédiger ses mémoires. Son fils, René, fait effectuer la restauration de léglise Saint-Nicolas du Poiré, sassocie aux desécheurs des marais : il achète et emprunte à ces fins. Son seul descendant, Armand, né en 1650, chevalier de Malte en 1677 après avoir assisté, impuissant, à la liquidation de tous ses biens. En effet, en 1694, trois ans après la mort de René, le château et les terres sont adjugées à Jean de Creil, marquis de Creil Bournezeau. Sous la Révolution, le domaine est vendu morcelé, comme bien démigré. En 1888, le château est transformé en laiterie-fromagerie.","architecture":"BARLOTS, de cette construction, commandée par Antoine Barlot, il ne restait pratiquement plus que deux tours. La tour du donjon est actuellement restaurée, le reste du château en cours de restauration, possède de belles demeures anciennes, telles que l'ancien château du sénéchal de Poitou, le corps de logis de plan rectangulaire à deux niveaux toit en croupe presque plats recouverts de tuiles, cet édifice possède un retour d'équerre par une tour carrée à l'opposée une tour ronde à toit en poivrière l'ancien présidial (devenu la mairie) et l'hôtel du sénéchal de Bretagne (dans la Grand'Rue). Le Grand Logis, ou Maison du sénéchal de Poitou. La maison à encorbellement de la rue Neuve, dernière maison de ce type à Bouin du XVIIe siècle. La demeure de l'Ecrille du XVIIe siècle, ancienne batterie de grade cote sur la route du Sud. La demeure du pavillon, ou maison du sénéchal de Bretagne.","habitants":"Famille Barlots\r\n        \"","divers":"Château de Barlot; grav 1à 4.  46° 58' 28\" nord, 2° 00' 02\" ouest     46° 24' 42\" nord, 0° 54' 04\" ouest                                                                                                       Chastelier grav 5-6 ; 46° 24' 42\"nord, 0° 54' 04\" ouest","gps":"","images":["../image/image_85/85_Barlot_Poir%c3%a9_1.jpg","../image/image_85/85_Barlot_Poir%c3%a9_2.jpg","../image/image_85/85_Barlot_Poir%c3%a9_3.jpg","../image/image_85/85_Barlot_Poir%c3%a9_4.jpg","../image/image_85/85_Barlot_Poir%c3%a9_5.jpg","../image/image_85/85_Barlot_Poir%c3%a9_6.jpg"]},"Consult_chateau_formulaired04f":{"id":"Consult_chateau_formulaired04f","dept":"85","canton":"Fontenay le Comte","commune":"Saint-Michel-le-Cloucq,","nom":"Baugisière","type":"Château","periode":"XVIII","histoire":"BAUGISIERE, le domaine sappelait primitivement le manoir de lUgres ; il prend son nouveau nom au Moyen-Age quand la famille Bogis en devint propriétaire. La famille Boutou est propriétaire de Baugissière dès le XIIIe siècle. Pierre Boutou, écuyer, époux de Lyette de Chassenon, est alors seigneur du lieu. L'actuel château de Baugisière est construit en 1741 par le chevalier Maximilien Boutou de La Baugisière, époux de Suzanne Fleury de La Caillère, puis de Henriette Green de Saint-Marsault, Maximilien eut trois filles : Suzanne (épouse de Claude de Bardin), Thérèse (épouse de M. de Tinguy) et Jeanne (épouse de Charles Racodet de La Vergnais). Le château passe ensuite à la fille de Jeanne, Louise Racodet de La Guillemandière, qui épouse le comte Benigne-Germanicus Maynard du Langon. Leur fils, le comte Bonaventure-Germanicus de Maynard en hérite.  En 1880, la Baugisière est vendu au marquis Calixte de Jousselin et son épouse Léontine de Baudry d'Asson.","architecture":"BAUGISIERE, le château a été bâti au milieu du XVIIIe siècle (1741), par Maximilien Boutou. La chapelle comporte une façade classique surmontée dun clocheton. L'ensemble des jardins sont une grande composition régulière contemporaine de la construction de l'édifice. Ces jardins en cours de restauration abritent, près du lavoir, un remarquable platane tri centenaire. Depuis 2002, Jean-Pierre et Claude Lenglart dAffringue, propriétaires, restaurent les lieux avec beaucoup de soin et de dévouement,  corps de logis composé d'un rez- de chaussée seulement, se développe entre deux pavillons carrés à un étage. La porte est décorée de pilastres.","habitants":"Famille Boutou   de La Baugisière\r\n        \"","divers":"Château de Baugissière; 46° 29' 01\" nord, 0° 44' 00\" ouest","gps":"","images":["../image/image_85/85_Baugisi%c3%a8re_1.jpg","../image/image_85/85_Baugisi%c3%a8re_2.jpg","../image/image_85/85_Baugisi%c3%a8re_3.jpg","../image/image_85/85_Baugisi%c3%a8re_4.jpg"]},"Consult_chateau_formulairec8c9":{"id":"Consult_chateau_formulairec8c9","dept":"85","canton":"La Chataigneraie","commune":"Bazoches-en-Pareds,","nom":"Bazoche_Pareds","type":"Forteresse","periode":"XI-XIV","histoire":"BAZOCHES, au XIe siècle au seigneur de Luneau, le château fort de Bazoches a été construit au XIVe siècle sur les bases d'un château plus ancien par Jehan Girard qui reçut en dot par alliance avec Marie de Luneau, les Girard  le conserveront  jusqu'au XVIe siècle. Un autre Jean Girard décédé en 1563 sa fille Margueritte épouse  Charles Poussard seigneur de Fors qui abandonnèrent le château qui fut acquis en 1726  par César Alexandre de Baudéan comte de Parabère n'y réside pas,  resté dans sa descendance passe au Carré de Candé à la veille de la Révolution et au XIXe siècle échoit aux Augier de Moussac et en 1859 Bazoches est acquis par le baron de Prévinquières au décès du dernier de cette famille en 1985, le donjon est acquis par la commune.","architecture":"BAZOCHES, a été construit au XIVe siècle sur les bases d'un château plus ancien, englobant autrefois l'église paroissiale dans son enceinte. Le donjon  est construit pendant la guerre de Cent Ans. Il est toujours en service au cours des guerres de Religion. Se compose  de deux masses carrées à six étages, l'angle desquelles se trouve une tourelle d'escalier polygonale desservant tout les niveaux, l'étage supérieur est surmonté d'une échauguette; au XVIe siècle fut aménagé en logias, très élevé de 32 mètres et six étages, assez sobre délévation, lédifice présente quelques éléments moins austères représentatifs du XIVe siècle une tour descalier polygonale de proportions élancées, des décors trilobés sur les mâchicoulis et à lintérieur, des chapiteaux et culs de lampe soutenant les voûtes dogives des salles. Le donjon des années 1380 est entouré de fossés secs, et accompagné d'un pigeonnier du XVIe siècle. Il se compose de sept niveaux de salles superposées dont certaines sont voûtées et conservent de belles cheminées, dans la chapelle seigneuriale les culots armoriés évoquent les différentes familles liées au château.","habitants":"Famille des Girard\r\n        \"","divers":"Tour de Bazoches; 46° 39' 22,67\" Nord et 0° 54' 54,3\" Ouest","gps":"","images":["../image/image_85/85_Bazoches_Pareds_1.jpg","../image/image_85/85_Bazoches_Pareds_2.jpg","../image/image_85/85_Bazoches_Pareds_3.jpg","../image/image_85/85_Bazoches_Pareds_4.jpg","../image/image_85/85_Bazoches_Pareds_5.jpg"]},"Consult_chateau_formulaire3099":{"id":"Consult_chateau_formulaire3099","dept":"85","canton":"St-Hilaire de Riez","commune":"Bretignolles sur Mer,","nom":"Beaumarchais","type":"Château","periode":"XVI","histoire":"BEAUMARCHAIS, au Moyen-Age, Bretignolles fait partie de la baronnie du Brandois qui s'étendait du Jaunay à l'Auzance et qui est communément appelée Pays de Brem. Vers 1450, la famille Mauclère, ancienne chevallerie, fait bâtir un manoir. Au XVIe siècle, les pièces centrales sont utilisées pour édifier un nouveau château. En 1552, la propriété est acquise par un armateur, Robert Bouhier de l'Ecluse, qui s'était enrichi au commerce de la mer. Son fils Vincent Bouhier de l'Ecluse en hérite et fait agrandir le château en faisant construire les ailes en retour d'équerre et de deux communs et de deux petites tours. Il y invite Henri IV, son ami, devenu roi de France. Il vint à Beaumarchais avec sa suite et y demeura plusieurs jours. Il logeait dans une chambre qui porte encore aujourd'hui le nom de la \"Chambre du Roi\".","architecture":"BEAUMARCHAIS,  la construction date du XVIe siècle. Entre le XIIe siècle et le XIVe siècle, Brétignolles passera, à plusieurs reprises, sous la domination anglaise. Au XVIe siècle, Henri IV séjourne plusieurs jours au château de Beaumarchais, de plan en U à deux niveaux avec lucarnes sur combles toit recouvert d'ardoises l'ensemble est flanqué de deux tours rondes aux angles côté parc dont une a le toit en coupole l'autre le toit en poivrière,  agrandi par son propriétaire de l'époque, au XVIe siècle sont construit les ailes en retour d'équerre et de deux communs et de deux petites tours. Le château de Beaumarchais est de style Renaissance. Il est inscrit aux M.H. depuis 1962, et  privé et fermé au public.","habitants":"Famille Robert Bouhier de l'Ecluse\r\n        \"","divers":"Château de Beaumarchais;  46° 39' 10\" Nord et 1° 51' 29\" Ouest","gps":"","images":["../image/image_85/85_Beaumarchais_1.jpg","../image/image_85/85_Beaumarchais_2.jpg","../image/image_85/85_Beaumarchais_3.jpg","../image/image_85/85_Beaumarchais_4.jpg","../image/image_85/85_Beaumarchais_5.jpg"]},"Consult_chateau_formulaire7a98":{"id":"Consult_chateau_formulaire7a98","dept":"85","canton":"Talmont Saint-Hilaire","commune":"Grosbeuil","nom":"Benatonière","type":"Château","periode":"XVII","histoire":"BENATONIERE, date du XVIIe siècle sur un site encore plus ancien. Certaines restaurations du XIXe siècle ont modifié son allure défensive, en donnant à cet ensemble d'architecture  une ouverture sur le  paysage,  avec un vaste parc à l'anglaise. Ce parc a été réalisé sur la base d'études faites en 1857 par la grande figure des paysagistes français du XIXe siècle, le comte  de Choulot et quelques idées de Dominique Noisette architecte paysagiste vendéen. A cette époque la propriété de la Bénatonière était importante avec de nombreuses métairies. Le métayage (activité agricole) consistait en une gestion mutuelle entre le propriétaire et les exploitants agricoles et nécessitait des bâtiments  pour entreposer les grains et également le vin élaboré et conservé sur place. Le château est resté pendant 4 siècles dans la même famille, qui a dû sen séparer sous la contrainte fiscale de frais de succession énorme. Cette famille a alors pris le soin et le temps de trouver un acquéreur correspondant aux exigences du domaine, et le château a alors été racheté par une famille anglaise qui la conservé dans son cadre familial durant 21 années, puis la vendu en 2010. Le deuxième acquéreur à acheter le château est le propriétaire actuel, est une société, personne morale : la SARL Abelyssimmo.","architecture":"BENATONIERE , les  modifications et la construction de nouvelles dépendances ont été réalisés par le comte de Bessay en 1868, et ceci au goût du XIXe siècle, sans en modifier la base ni les ouvertures, sous la direction de larchitecte Paul Guillerot de la Roche sur Yon.  Le temps aidant,  suite à la vente du château et d'une partie du parc, par manque d'entretien, la végétation a pris le dessus de sorte que le parc historique est en voie de disparition. Sur un plan paysager, la terrasse du château offre une vue sur la Vallée axée sur le bourg et léglise paroissiale de Grosbreuil. La visibilité est réciproque depuis la Route des Sables, en sortant du bourg, et tout au long de la rue de la rivière, dautant que les abords du château sont dégagés côté Est entre le bourg et le site (prairie humide, étang).\r\n  Les menaces qui pèsent aujourd'hui sur le château et son parc depuis le nouveau PLU (2013) remettent en cause ce patrimoine et ne respecte pas son paysage en prévoyant une urbanisation pour des infrastructures publiques (complexe sportif, parking de 300 places).","habitants":"comte de Bessay\r\n        \"","divers":"Château de Bénatonière 46° 32' 23\" nord, 1° 37' 01\" ouest","gps":"","images":["../image/image_85/85_Benatoni%c3%a8re_1.jpg","../image/image_85/85_Benatoni%c3%a8re_2.jpg","../image/image_85/85_Benatoni%c3%a8re_3.jpg","../image/image_85/85_Benatoni%c3%a8re_4.jpg"]},"Consult_chateau_formulaire6d78-2":{"id":"Consult_chateau_formulaire6d78-2","dept":"85","canton":"Mareuil sur Lay-Dissais","commune":"Bessay","nom":"Bessay","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux à Bessay celui du Bessay et celui de Salidieu.                                                                                                       BESSAY,  au XVe siècle Jacques du Bessay épouse Jeanne de Pont de Vie,  en 1577 construction de la tour Renaissance par Giron du Bessay  amiral de Guyenne, époux de Renée de Machecoul, en 1722   la fille de Paul-Bernard  de Bessay Anne-Marie-Angelique héritière du Bessay épouse Henri Gazeau de la Brandasnière, le domaine passe en héritage à leur fils Paul-Henri vend en 1783  le domaine. Sous la Révolution le propriétaire monsieur de Tanguy émigre vendu comme bien nationale  en 1796 à Jean François Saulnier et en 1820 racheté par les Bessay Pol-Sac comte du Bessay passera par alliance en 1866 aux Beaumont qui le conserveront jusqu'en 1987, racheté par le général Rachou.                                                                              SALIDIEU;  famille Blaize au XIVe siècle,  Queyre au  XVe siècle, Prévost au XV-XVIe siècle,  Thévenin au XVI-XVIIe siècle,  Berthelot au XVIIIe siècle, Sabouraud au XIXe siècle, Pilastre au XXe siècle, famille ayant donné plusieurs maires à la commune de Bessay.","architecture":"BESSAY, construction au XVe siècle des deux tours carrées sur une ancienne motte féodale, intégrant tours et fuie actuelles, le château construit au XVI e siècle est aujourd'hui composé de deux tours Renaissance, reliées par un corps de logis datant des XVIIe et XVIIIe siècles de style très sobre avec porte d'entrée à fronton brisé, ce bâtiment est prolongé par deux ailes en retour d'équerre qui encadrent la cour d'honneur est flanqué aux angles de sa façade postérieure d'une tour carrée l'une plus massive et plus haute que l'autre. La Tour Henri IV, d'allure médiévale symbolise de donjon médiéval avec des salles restaurées, des cheminées monumentales, de magnifique chemin de ronde à mâchicoulis, la charpente en dôme à lanternon ouvert et le grand escalier d'honneur, tels sont les aspects de ce beau château Renaissance. Il recèle aussi le plus grand pigeonnier de la région, 3200 boulins (niches à pigeons) sa construction date de la fin du XVIe siècle, probablement sur les vestiges d'une tour de l'enceinte médiévale. Son parc, aux arbres séculaires, offre aux visiteurs une promenade ombragée et paisible.                                                                                                      SALIDIEU, château de plan rectangulaire à deux niveaux sur soubassement imposant  flanqué de pavillon d'entrée et de tour carrée et ronde sur les flancs. Cest une ancienne gentilhommière possédant une chapelle particulière.","habitants":"Famille de Jean François Saulnier\r\n        \"","divers":"château de Bessay grav 1 à 5 46° 32' 18\" Nord et 1° 09' 09\" Ouest château de Salidieu grav 6","gps":"","images":["../image/image_85/85_Bessay_1.jpg","../image/image_85/85_Bessay_2.jpg","../image/image_85/85_Bessay_3.jpg","../image/image_85/85_Bessay_4.jpg","../image/image_85/85_Bessay_5.jpg","../image/image_85/85_Bessay_6.jpg"]},"Consult_chateau_formulaireb39d":{"id":"Consult_chateau_formulaireb39d","dept":"85","canton":"Les Herbiers","commune":"Monsireigne","nom":"Bois_Tiffrais","type":"Château","periode":"XVI","histoire":"BOIS-TIFFRAIS, au XVIe siècle, le seigneur du Bois-Tiffrais passe au protestantisme. Abandonné pendant la guerre de Vendée cet ancienne maison noble est remise en état sous l'Empire. En 1875 elle est agrandie et transformée en château à la Française pour être un rendez-vous de chasse pour Louis-Jacques Arnaud. Philippe Guillebaud, son neveu était propriétaire du château jusqu'à son décès en 1910. Son neveu et filleul, Philippe Bage hérite de la propriété. En 1947, ouverture du musée dont le pasteur Paul Romane-Musculus est le premier conservateur.","architecture":"BOIS-TIFFRAIS  la présence dune maison-forte est attestée dès le Moyen-Age. Depuis l'édifice a connu de multiples destructions et réaménagements. Le corps de logis présente une façade très harmonieuse composée de deux ailes ouvertes par deux fenêtres sur deux niveaux. Des mansardes aèrent la haute toiture recouverte d'ardoises et procurent à lensemble laspect des gentilhommières de campagne.","habitants":"Famille de Philippe Guillebaud\r\n        \"","divers":"Château de Bois Tiffrais","gps":"","images":["../image/image_85/85_Bois_Tiffrais_1.jpg","../image/image_85/85_Bois_Tiffrais_2.jpg","../image/image_85/85_Bois_Tiffrais_3.jpg","../image/image_85/85_Bois_Tiffrais_4.jpg"]},"Consult_chateau_formulairef16e":{"id":"Consult_chateau_formulairef16e","dept":"85","canton":"Mortagne-sur-Sèvres","commune":"Chambretaud","nom":"Boisniard","type":"Château","periode":"XVII","histoire":"BOISNIARD, le chevalier Jehan du Puy du Fou, seigneur du Bois-Nyart (comme on lécrit à lépoque) bâtit son château en 1407. Les Puy du Fou le vendent en 1643 pour payer leurs dettes. Jusquà la Révolution, le château du Boisniard se transmet, dhéritage en mariage, plusieurs armoiries ornent aujourd'hui le plafond de lancienne chapelle. Un personnage marque la vie de la demeure : Charles-Philippe Grelier, Seigneur du Boisniard et Chevalier de Concise (autre domaine à Chambretaud). Brillant officier de la marine royale, il parcourt le monde et ramène une collection doiseaux exotiques qui peuplent les volières du Boisniard. En 1793, les enfants de Grelier combattent dans larmée Vendéenne aux côtés du marquis de la Rochejacquelein. Aujourd'hui, hôtel 5 étoiles, le château du Boisniard allie la qualité dun hôtel de luxe au charme du bocage Vendéen.","architecture":"BOISNIARD , le Boisniard vit les tristes heures de la Révolution et des colonnes infernales. Ses occupants se cachent dans la campagne environnante et le château est envahi par une garnison républicaine qui le pille mais lui évite dêtre incendié. Au XIXe et XXe siècle, le château est vendu et transmis plusieurs fois.","habitants":"Famille de Charles-Philippe Grelier\r\n        \"","divers":"Château de Boisnard : 46° 55' 21\" Nord, 0° 57' 49\" Ouest","gps":"","images":["../image/image_85/85_Boisniard_1.jpg","../image/image_85/85_Boisniard_2.jpg","../image/image_85/85_Boisniard_3.jpg","../image/image_85/85_Boisniard_4.jpg","../image/image_85/85_Boisniard_5.jpg"]},"Consult_chateau_formulaire9d6c":{"id":"Consult_chateau_formulaire9d6c","dept":"85","canton":"Les Herbiers","commune":"Les Herbiers","nom":"Boistissandeau","type":"Château","periode":"XVI-XVII","histoire":"BOISTISSANDEAU, cité en 1275  Guillaume Foucher seigneur,  au milieu du XVe siècle les  Olivereau prennent possession du domaine  entreprennent la construction du château  en 1575, par Jacques de Claude Olivereau décède en 1606 son fils appelé Claude aussi  mourra en 1641 dans un duel, restée veuve et sans enfants elle lègue à son neveu Jean-Baptiste de Hillerin qui épouse  en 1701 Catherine Moreau de Villiers.  Au XVIIIe siècle, le savant Réaumur y a fait de fréquents séjours en compagnie du propriétaire, Jean-Baptiste-Laurent d'Hillerin, lui-même une sommité scientifique. Le 31 janvier 1794, cinq hussards vont venir massacrer, sur le montoir toujours visible, la châtelaine impotente, Marie Agathe d'Hillerin et ses deux filles, par alliance  au XIXe siècle le château échoit à la famille Bourbon. La petite fille de Jean Baptiste Gabrielle de Hillerin épouse en 1796 un officier originaire  de l'Yonne Alexandre Bourbon et hérite du château  au début du XIXe siècle en 1941 leur petite fille Mathilde de Bourbon épouse de Georges de de Bault de la Morinière fait don du château, aux frères de saint-Gabriel conservant l'usufruit jusqu'à son décès, survenu en 1948 en 1942 à la communauté  des Frères de Saint-Gabriel s'y installent et transforment les lieux, d'abord pour en faire un Noviciat, puis en 1970 une Maison de Retraite.","architecture":"BOISTISSANDEAU construit entre 1575 et 1620 l'édifice succède un château dont-il subsiste quelques murs,présente un corps de logis d'inspiration Renaissance cantonné de deux tours circulaires sur sa façade arrière   et prolongé, sur la façade  d'arrivée  de deux ailes  à usage de communs dont l'une se termine par un pavillon abritant la chapelle, ce corps de logis recouvert d'un toit en pentes  avec six travées avec fenêtres à meneaux  en granit  réparties sur deux niveaux et séparés  du côté de la façade antérieure par un bandeau continu, la partie centrale du bâtiment présente un pavillon aligné sur façade  dont un seul niveau fait saillie sur la hauteur du toit, qui abrite l'escalier, des lucarnes encadrées de pilastres et sommées de frontons triangulaires d'époque classique.  Les jardin à la Le Nôtre  égaient des façades sévères, auxquelles s'harmonisent les tours d'aspect médiéval, les fenêtres à meneaux et les lucarnes   de l'époque pré-classique.  On accède au château, tapi dans les bois, par une magnifique allée bordée de hêtres, de charmes antiques et de vieux marronniers. De la grille on aperçoit le corps de logis construit en 1578, avec son pavillon d'entrée surmonté d'une poivrière en brique rose. L'envers du décor vaut le détour avec son jardin dit à la Française, et sa charmille vieille de deux siècles.","habitants":"Famille de Jean-Baptiste-Laurent d'Hillerin\r\n        \"","divers":"Château de Boistissandeau: 46° 51' 51,11\" Nord et 1° 1' 32,07\" Ouest.","gps":"","images":["../image/image_85/85_Boistissandeau_1.jpg","../image/image_85/85_Boistissandeau_2.jpg","../image/image_85/85_Boistissandeau_3.jpg","../image/image_85/85_Boistissandeau_4.jpg"]},"Consult_chateau_formulairefa5d":{"id":"Consult_chateau_formulairefa5d","dept":"85","canton":"La Chataigneraie","commune":"Bourneau","nom":"Bourneau","type":"Château","periode":"XVII","histoire":"BOURNEAU, abandonné pendant la Révolution, il a été reconstruit dans un style qui n'était pas le sien.  Edmond Möller connaissait déjà les environs car son père possédait le château de Xanton-Chassenon Benoît du Chazaud ne sait pas ce qu'il est arrivé à la famille qui y habitait avant 1789 ni même comment elle s'appelait. Le rentier suisse possède alors 700 ha : « La moitié de la commune ! » Il prend pour épouse Claire de Fontaine. La famille de cette femme comptera plus tard un sénateur-maire de Bourneau. « Aujourd'hui, nous ne pourrions pas être maire », plaisante Benoît du Chazaud. Les descendants d'Edmond Möller et Claire de Fontaine n'eurent pas d'enfants et la demeure fut vendue. À la mort de la vieille dame qui l'occupait, en 1960, la fondation De Lattre décide d'en faire une maison de retraite pour des harkis.  Il est racheté par Benoît du Chazaud un an après. Ce nouveau châtelain souhaite alors en faire des chambres d'hôtes : « Pour le moment, nous n'avons pu aménager que les dépendances en gîte », précise-t-il, car il reste encore « plus d'un quart » de l'édifice à rénover. Acquis dernièrement  par Jean-Baptiste Gois.","architecture":"BOURNEAU, le château se cache du village pour mieux apparaître dans son domaine de 16 ha. Entourée de douves encore remplies d'eau, sa terrasse promet la fraîcheur de l'ombre en matinée et coucher de soleil en soirée. La façade principale forme un L. Elle est inspirée par le château d'Azay-le-Rideau, dans un style Renaissance. Petite originalité toutefois, une galerie dans l'angle permet d'abriter l'entrée et d'offrir un immense bow-window à l'étage. Mais cet édifice est beaucoup plus récent qu'il n'en a l'air. Abandonné à la Révolution, il fut totalement reconstruit dans un nouveau style en 1863 sur les plans de l'architecte de la ville, Arsène Charrier.  L'intérieur n'a rien de fastueux pour autant, surtout l'escalier, à l'image de son constructeur, de confession protestante. Seul, le salon Napoléon III rappelle un peu la somptuosité de son époque, en particulier le lustre et la cheminée en marbre blanc aux motifs végétaux.","habitants":"Famille d'Edmond Möller\r\n        \"","divers":"Château de Bourneau","gps":"","images":["../image/image_85/85_Bourneau_1.jpg","../image/image_85/85_Bourneau_2.jpg","../image/image_85/85_Bourneau_3.jpg"]},"Consult_chateau_formulaire9d6a":{"id":"Consult_chateau_formulaire9d6a","dept":"85","canton":"Chantonnay","commune":"Bournezeau","nom":"Bournezeau","type":"Manoir","periode":"XVII","histoire":"deux châteaux à Bournezeau celui de Chêne-Bertin et celui de Corbe chambres d'hôtes.                                                                                   BOURNEZEAU, château du Chêne Bertin et de la seigneurie de Bournezeau, qui dépendait de la vicomté de Thouars, comme la plupart des places fortes du bocage vendéen, existe au moins depuis la fin du XIe siècle. Les seigneurs de cette époque faisaient partie de la famille de Blois-Penthièvre, qui serait à l'origine de l'ancien nom de Bournezeau, Bleais. La Seigneurie de Bournezeau correspondait à un territoire englobant les Pineaux, Saint-Ouen-des-Gâts, Saint-Vincent-Fort-du-Lay, Puymaufrais, et en partie Bellenoue, Saint-Valérien, Saint-Philbert-de-Pont-Charrault, Saint-Laurent-de-la-Salle, Saint-Florent-des-Bois, Thorigny, Lairoux, Château-Fromage et Saint-Germain-le-Prinçay.   Chambre d'Hôtes M. et Mme Chadeau.","architecture":"BOURNEZEAU de plan rectangulaire à deux niveaux sur soubassement flanqué de lucarnes sur comble et en façade de deux tourelles en angles toits en poivrières.                                          CORBE de plan rectangulaire Au cur du Bocage vendéen, dans les dépendances d'un château de style italien du XIXe siècle,  corps de logis central de deux niveaux avec avant corps d'entrée sur colonnes et de chaque extrémité deux forteresse de trois niveaux à mâchicoulis et tourelles toit presque plat.","habitants":"Famille de Blois-Penthièvre.\r\n        \"","divers":"Château de Bournezeau grav 1-2-3 de Corbe grav 4","gps":"","images":["../image/image_85/85_Bournezeau_1.jpg","../image/image_85/85_Bournezeau_2.jpg","../image/image_85/85_Bournezeau_3.jpg","../image/image_85/85_Bournezeau_4.jpg"]},"Consult_chateau_formulaire3f2e":{"id":"Consult_chateau_formulaire3f2e","dept":"85","canton":"Mareuil-sur-Lay-Dissais","commune":"Le Givre","nom":"Brunière","type":"Château","periode":"XVI","histoire":"BRUNIERE, la seigneurie de la Rollandière est tenue par la famille de Bodin. En 1591, Jean Bodin entreprit de le faire reconstruire et le marqua de son sceau par un seigneur huguenot René Bodin de la Rollandière époux  d'Antoinette de Bessay. Il prit alors le style Renaissance qui le rendit très hospitalier (Henri IV sy reposa). Cest au château de la Brunière que le roi Henri IV choisit de se reposer. En 1621, les troupes royales lenvahirent et le saccagèrent. Après l'extinction de cette famille, le château passe par alliance successives aux la Forest, aux Mareschal et aux Escorce avant d'échoire aux Mauras de Chassenon, Marc de Mauras. lieutenant des armées du Roi sera le dernier seigneur de la Brunière. En 1795 longtemps occupé par les troupes républicaines vendu comme bien national, acquis par le maire du Givre, Louis-Gabriel Porchier de la Thibaudière cédé par ses héritiers en 1837 à la famille Pineau et en 1853 le domaine est acheté  par Louis-Adolphe de Goué apparentés aux derniers seigneurs du lieu, après son décès  en 1881 , passe à sa fille madame Létard de la Bouralière, puis par les femmes, à la famille de Veillechèze de la Mardière. Il appartient aujourd'hui à ses descendants, le docteur Thierry Gorphe et sa soeur, la baronne de Vauchaussade de Chaumont.","architecture":"BRUNIERE, la construction  date du 1660 à 1680. Il fut rénové et agrandi de 1720 à 1740, avec ses jardins, fut construit durant la période troublée de la Guerre de Cent Ans.  En 1621, les troupes royales lenvahirent et le saccagèrent. Le château formait un quadrilatère, orné d'une tour à chaque angle.  Deux corps de bâtiment et une tour sont détruits. Durant les guerres de Vendée, la demeure est occupée par les bleus. Les vendéens essaient par deux fois de la reprendre en 1794 et en 1795, mais sans résultat. D'architecture classique, celui-ci se compose d'un vaste corps de logis terminé par deux pignons droit,  s'ordonna autour d'un pavillon central coiffé d'un comble pyramidal surmonté d'un toit à la Mansart,  deux tours cylindriques flanquent le logis à l'arrière et une échauguette en encorbellement se détache à l'extrémité gauche de la façade principale,   sur les ailes en retour flanqué de quatre petits pavillons. Les ailes, moins élevées, sont coiffées d'un campanile sommé d'un soleil, l'autre d'un croissant de lune. Le parc à la française s'étendait jadis jusqu'à la Vilaine. Il est classé aux M.H. supplémentaires depuis 1987.","habitants":"Famille de René Bodin de la Rollandière \r\n        \"","divers":"château de Brunaire; 46° 27' 38\" Nord et 1° 23' 53\" Ouest","gps":"","images":["../image/image_85/85_Bruni%c3%a8re_1.jpg","../image/image_85/85_Bruni%c3%a8re_2.jpg","../image/image_85/85_Bruni%c3%a8re_3.jpg","../image/image_85/85_Bruni%c3%a8re_4.jpg","../image/image_85/85_Bruni%c3%a8re_5.jpg","../image/image_85/85_Bruni%c3%a8re_6.jpg"]},"Consult_chateau_formulaire130e":{"id":"Consult_chateau_formulaire130e","dept":"85","canton":"Mareuil-sur-Lay-Dissais","commune":"Moutiers-les-Mauxfaits","nom":"Cantaudière","type":"Château","periode":"XIII-XIV","histoire":"A Moutiers, le château de Bigeoire, bois Lambert . A cinq Km au Nord-Ouest le château de Saint-Avaugourd des Landes, la Véquière du XVIe siècle, château du Bois-Renard du XIXe siècle et de  Cheneille. Pas d'information pour ces châteaux.                                                      CANTAUDIERE,  doit son nom à la famille de Cantaud  au XIIIe siècle la maison forte de l'époque dépendait de la Baronnie de Brandois en 1343 Nicolas Cantaud  écuyer et seigneur fit construire le château, en 1578 modernisation et agrandissement du bâtiment passa en de nombreuses mains, avant de  passer par alliance à Jean de Brion. A lépoque, Sully est Gouverneur du Poitou, son gendre,  le château revient à une descendante d'une fille d'André le Geay Jeanne-Bégnine de Brion qui l'apporte en dot à René Kerneveau.   Le duc Henri de Rohan vend La Cantaudière le 13 juillet 1620 à André Legeay, prévôt Général du Poitou, lequel fut aboli par Henri IV Par alliance les Le  Roux puis les Courdeau, sous la Révolution saisi comme bien national occupés par les  Bleues et les Blancs durant la guerres de Vendée. Vendue comme bien de la nation en 1797, acquis par le citoyen Lanjus, la propriété changea plusieurs fois de mains au cours du XIXe siècle et fut rachetée en 1855 par  madame de Maisonneuve qui s'en défait  au profit de Charles-Joseph Duchaine. Aujourd'hui  propriété d'une société civile foncière dont les parts sont détenues par les familles Joubert. Hugue et Guibert issues du mariage de Louis Duchaine avec Anne Libaudière.","architecture":"CANTAUDIERE, construit en 1578 en une période troublée de lhistoire (guerres de religion), maison forte à l'origine flanquée de tours et entourés de fossés. demeure de plaisance, lédifice fut dabord un petit château-fort à quatre tours avec remparts et pont-levis, puis modifié (suppression des remparts et dune tour). Au corps de logis  primitif vient s'ajouter une aile en retour, tandis que dans l'angle rentrant s'élève un pavillon d'escalier accostait d'une tourelle  en encorbellement, au terme de ses transformations  la demeure dont les corps de bâtiments éclairés par des fenêtres à meneaux sont coiffés  de hauts toits en pavillon sur lesquels se détachent  des lucarnes.   Ce château est aujourdhui constitué de deux corps de bâtiment formant un L, avec un joli parc. Larchitecture renaissance reste ici un peu austère, impression renforcée par les importantes douves où leau abonde toujours. Les trois tours dangles, les élégantes proportions du logis et de lensemble donnent à ce manoir un attrait particulier.","habitants":"Famille de Geay \r\n        \"","divers":"Château de Cantaudière; grav 1-2-3 46° 29' 22\" Nord, 1° 26' 12\" Ouest.   Bois renard grav 4. Bigeoire grav 5  St-Avaugourd; grav-6 - 7 ;46° 30' 53\" nord, 1° 29' 00\" ouest. Bois Lambert grav 8","gps":"","images":["../image/image_85/85_Cantaudi%c3%a8re_1.jpg","../image/image_85/85_Cantaudi%c3%a8re_2.jpg","../image/image_85/85_Cantaudi%c3%a8re_3.jpg","../image/image_85/85_Cantaudi%c3%a8re_4.jpg","../image/image_85/85_Cantaudi%c3%a8re_5.jpg","../image/image_85/85_Cantaudi%c3%a8re_6.jpg","../image/image_85/85_Cantaudi%c3%a8re_7.jpg","../image/image_85/85_Cantaudi%c3%a8re_8.jpg"]},"Consult_chateau_formulaire241c":{"id":"Consult_chateau_formulaire241c","dept":"85","canton":"la Roche sur Yon","commune":"Chaize le Vicomte","nom":"Chaize_le_Vicomte","type":"Château","periode":"XII-XVI","histoire":"A  Chaize le Vicomte, deux châteaux  celui de Chaize le Vicomte et Gueliguageau pas d'information; Peyraudeau.                                 CHAIZE le VICOMTE, en 1069, il fait édifier en ce lieu un château fort dont il reste quelques vestiges. Ce château est doté dune chapelle qui va devenir léglise Saint Jean-Baptiste. Cest de ce château que vient le nom « La Chaize-le-Vicomte ». En 1080 débute la construction, sur lordre dAimery IV, dune imposante église romane en granit. les 6 et 7 décembre 1099 en présence du vicomte de Thouars Herbert et de son frère Geoffroy. A cette occasion sest déplacé à La Chaize le plus puissant de tous les vassaux du roi de France, le duc dAquitaine Guillaume IX le Troubadour, grand-père de la future Alienor dAquitaine.  Assez important, le prieuré semble avoir compté une quinzaine de moines au début du XIIe siècle. En 1104, à son retour de la croisade, le nouveau vicomte Geoffroy III sinstalle à la Chaize qui devient, jusquen 1123, la capitale (de fait, sinon de droit) de la vicomté de Thouars. Honneur suprême, La Chaize reçoit, en 1120, la visite du pape Calixte II.                                                                     PEYRAUDAU  Parmi les nombreux châteaux et logis de La Chaize, le logis de Saint-Mars tient une place particulière, puisqu'il a été la dernière demeure des Peyraudeau. Après divers héritages et ventes, c'est le vicomte de Thouars Herbert, qui est seigneur de Saint-Mars au moment de la Révolution. Il émigre et ses biens sont confisqués. Vendu comme « biens nationaux », Saint-Mars est racheté par la soeur d'Henri-Calixte et revendu à Marc-François Payraudeau.","architecture":"CHAIZE LE VICOMTE, prison pendant la Révolution Française, la localité est débaptisée et sappelle « La Chaize-le-Peuple ». Elle devient un chef-lieu de canton, elle sert dabattoir et de boucherie pour larmée républicaine. Le culte ny redémarre quà partir de 1796, sous le Directoire. En revanche, les deux églises, considérées comme biens nationaux, nont jamais été achetées par des particuliers et nont pas souffert des transformations souvent mutilantes subies par dautres églises. Léglise Saint Jean-Baptiste est néanmoins démolie en 1812. La vente comme biens nationaux de plusieurs logis nobles et de leurs terres engendre de grosses fortunes foncières à la Chaize. Lors du transfert du chef-lieu de la Vendée de Fontenay-le-Peuple au centre du département, Napoléon Ier a pensé établir la préfecture à la Chaize-le-Vicomte. Cest finalement la Roche-sur-Yon qui est choisie sous le nom de Napoléon-Vendée.                                                             PUYRAUDAU, le logis tel qu'il apparaît aujourd'hui remonte au XVIe siècle et était alors propriété des Gaultreau. C'est un corps de bâtiment allongé, avec, du côté de la façade nord, de hauts murs formant une cour carrée. À chaque angle, se dresse une tour au toit conique et un grand porche permet d'y accéder. Sur la façade sud, les murs encadrent un grand jardin dont l'ouverture descend par des marches vers un plan d'eau et la rivière La Riallée.","habitants":"Vicomte de Thouars Herbert                                                    Famille des Peyraudeau                   \r\n        \"","divers":"Château de Chaize le Vicomte grav-1 d\"e Guelignageau grav 2, de Peyraudeau grav 3-4, Logis St-Mars grav 5.","gps":"","images":["../image/image_85/85_Chaize_le_Vicomte_1.jpg","../image/image_85/85_Chaize_le_Vicomte_2.jpg","../image/image_85/85_Chaize_le_Vicomte_3.jpg","../image/image_85/85_Chaize_le_Vicomte_4.jpg","../image/image_85/85_Chaize_le_Vicomte_5.jpg"]},"Consult_chateau_formulaire74ac":{"id":"Consult_chateau_formulaire74ac","dept":"85","canton":"Mareuil sur Lay,","commune":"Chaligny Ste Pexine","nom":"Chaligny","type":"Château","periode":"XVI-XVIII","histoire":"CHALIGNY, depuis 1560, ce logis a été le fief de la famille Regnon, cette famille protestante a joué un rôle important dans la région et s'est alliée à de nombreuses familles du Bas-Poitou. Les bâtiments dans leur configuration actuelle ont été construits en 1639 par Hélie Ier Regnon de Chaligny, chevalier, capitaine de Chevaux Légers. Son petit fils Louis III Regnon, émigre en 1685 en Angleterre à la suite de la révocation de l'Edit de Nantes. Le petit fils de ce dernier, Henri Gabriel Gaspard de Regnon, seigneur de Chaligny, Chevalier de Saint-Louis, lieutenant des maréchaux de France, entreprend peu avant la Révolution l'embellissement du logis et du parc qui sont mis au goût du jour. C'est alors la grande époque de Chaligny. Il émigre en Allemagne en 1791. Le logis est épargné par la Révolution.\r\nEn 1844, alors que la branche Regnon de Chaligny s'éteint, le logis est donné en fermage, et ceci jusqu'au milieu du XXe siècle.","architecture":"CHALIGNY, ce logis ayant été occupé la plupart du temps par des fermiers n'a subi aucune altération depuis le XVIIIe siècle, ce qui permet à ce jour de le considérer comme l'un des mieux conservés de Vendée. L'atout majeur de Chaligny réside dans la préservation, non seulement de ses bâtiments, mais aussi de son paysage. Classé en 1989 à l'inventaire supplémentaire des M.H., le logis a été vendu, pour la première fois depuis son origine en 1990, puis revendu l'année suivante.","habitants":"famille Regnon de Chaligny\r\n        \"","divers":"Domaine de  Chaligny; 46° 31' 54\" nord, 1° 06' 42\" ouest","gps":"","images":["../image/image_85/85_Chaligny_1.jpg","../image/image_85/85_Chaligny_2.jpg","../image/image_85/85_Chaligny_3.jpg","../image/image_85/85_Chaligny_4.jpg","../image/image_85/85_Chaligny_5.jpg"]},"Consult_chateau_formulairef321":{"id":"Consult_chateau_formulairef321","dept":"85","canton":"Challans","commune":"Challans","nom":"Challans_Verie","type":"Château","periode":"XIV","histoire":"A Challans, le  château de la Verie, de Bolay et  de Coursaudière.                                                                                VERIE, au XIVe siècle Jehan Belleron, seigneur de la Vérie, succédera la famille Frondebuf dont une fille Agnès épouse en l'an 1400 Guillaume du Plantis, chevalier, seigneur de la Guyonnière, et lui apportera en dot La Vérie. A la fin du XVIe siècle, Claude du Plantis vendit sa propriété challandaise à André Bouhier, trésorier du Roi Henri IV, qui fera reconstruire la demeure existante, s'inspirant du château de Beaumarchais à Brétignolles. Françoise-Catherine Bouhier, dernière descendante de la quatrième génération propriétaire de la Vérie, épouse en 1724  Claude-Gilbert Robert de La Salle-Lézardière, seigneur du Poiroux, leur fils Louis-Jacques-Gilbert Robert de Lézardière, hérite de la Vérie. Il épousera dame Marie-Jeanne-Charlotte Babaud de La Chaussade en 1748, leur  fille, dont Pauline de Lézardière et Jacques-Augustin Robert de Lézardière. Le baron de la Lézardière, accusé en 1791 d'être l'instigateur d'un complot contre la République  verra son château incendié. Le domaine de la Vérie fut mis sous séquestre durant la Révolution, il fut exploité par la citoyenne Marie Jeanne Mornet, veuve Bironneau, et son fils Jacques Joseph Aimé, qui rêvaient d'acheter le domaine lorsqu'il serait bien national. En 1801, le séquestre fut levé par le premier consul, le château retrouva ses légitimes propriétaires. Ceux-ci le vendirent le 16 Mars 1805, à François Armand Boux de Casson, ancien lieutenant de l'armée de Charrette. Il fut restauré en 1886, en style d'inspiration Renaissance.","architecture":"la VERIE ( suite personnage) est mis sous séquestre, jusqu'à sa levée en 1801. Les Lézardière vendirent, en 1805,  à François-Armand Boux de Casson, ancien lieutenant de l'armée de Charette. Ludovic et Olivier Boux de Casson, nés à la Vérie, deviendront tous deux, maires de Challans. François Boux de Casson (1908-1981), ancien député en fut le propriétaire. En 1990 transformé en hôtel   par M.martin. Le Logis de la Vérie est inscrit aux M.H. depuis le 12.10.1964.                                                  VERIE au IXe siècle, fut édifié un château féodal en 1100 en commanderie des Templiers de Coudrie, se compose d'un corps de logis central flanqué de deux ailes en retour d'équerre qui bordent la cour d'honneur. Sur sa façade postérieure, il était cantonné de deux tours d'angles dont une tour au Sud-Ouest, fut entièrement détruite (la 2ème tour menaçant de tomber en ruine fut démolie en 1848). En 1849, il est difficile de reconstituer  l'état originel de l'édifice, du fait de la restauration assez radicale dont il a fait  l'objet en 1886. Les ailes sont aujourd'hui cantonnées  de tourelles carrées en encorbellement et les façades présentent un aspect néo-Renaissance  assez acccusé  avec leurs lucarnes à baies géminées, sommées de fronton triangulaires. L'allure du château coiffé de hauts toits d'ardoise ne semble pas avoir été modifiée de manière très significative.                                                                                    COURSAUDIERE,  édifié au début du XIXe siècle, n'est que la maison d'habitation proprement dite d'un ensemble de bâtiments.","habitants":"Famille de Guillaume du Plantis\r\n        \"","divers":"Verie;  46° 49' 27,48\" Nord et 1° 54' 11,16\" Ouest . Coursaudière grav 7","gps":"","images":["../image/image_85/85_Challans_Verie_1.jpg","../image/image_85/85_Challans_Verie_2.jpg","../image/image_85/85_Challans_Verie_3.jpg","../image/image_85/85_Challans_Verie_4.jpg","../image/image_85/85_Challans_Verie_5.jpg","../image/image_85/85_Challans_Verie_6.jpg","../image/image_85/85_Challans_Verie_7.jpg"]},"Consult_chateau_formulaire2bc1":{"id":"Consult_chateau_formulaire2bc1","dept":"85","canton":"Chantonnay","commune":"Chantonnay","nom":"Chantonnay","type":"Château","periode":"XIV-XVI","histoire":"Trois châteaux à Chantonnay, Auneau, Mouhée et Ponsay, Pailly (voir articles) Boutelière, et Tabarières pas d'information pour ces deux derniers.                                                                                                AUNEAU, en 1892, le professeur Edouard Grimaux racheta la propriété pour édifier un nouveau château. C'est sur les plans de l'architecte Joseph Libaudière que fut bâti   l'Auneau.  Sur la façade sud, une terrasse fut réalisée en 1975 pour la famille David.  Vers 1945, la famille David devient propriétaire de l'Auneau et de l'ensemble des terres.                                                                               MOUHEE,  Zénobe Alexis était le fils cadet de Charles Alexis (9 novembre 1820 , marquis de Lespinay, marié le 7 janvier 1851 avec Alexandrine Eugénie Le Buf de Saint-Mars le 15 septembre 1834  à Chantonnay.  Son frère aîné, Calixte (24 octobre 1851 ? 11 juin 1877 - Bourg , mourut sans alliance. Le marquis de Lespinay épousa le 7 juin 1879  Louise Marie Thérèse Benoist d'Azy le 10 août 1858 , fille de Pierre Paul Ernest, comte Benoist d'Azy et de Claire Mélanie Jaubert.                                              PONSAY, manoir construction date du XIVe, XVIe et XIXe siècle. Au XVe siècle, il appartenait à Jean Berne. En 1492, un château voit le jour au lieu-dit Saint Mars des Prés. A la suite du mariage de Perrine, sa petite fille, en 1644, les familles Grignon, échangèrent leurs demeures. Depuis cette date, un fils a toujours succédé à son père et aujourd'hui la 11ème génération a le plaisir de vous accueillir au manoir de Ponsay. Au cours des siècles, des aménagements vont transformer la maison forte en une belle demeure du XVIIe siècle. Pendant les guerres de Vendée en 1793, une partie des bâtiments disparurent.      transformé en gîtes de France  par la famille de Ponsay.","architecture":"AUNEAU, à l'origine, une maison noble de Launau fut élevée au XVIIe siècle, dépendante de la seigneurie des Villates Mais durant la Révolution, cette maison noble fut incendiée et entièrement détruite. C'est sur les plans de l'architecte Joseph Libaudière que fut bâti l'Auneau. Il s'agit d'un bâtiment carré couvert de tuiles romanes et non d'ardoises, auquel est adossé sur la façade Est, une petite aile en L.  Le style \"de Libaudière\" est plus marqué sur la façade Est, principalement dans la haute ouverture centrale de la cage d'escalier. L'ensemble de la demeure est orchestré autour de cet escalier ouvrant au rez de chaussée sur les pièces de réception et sur des paliers donnant accès aux chambres sur deux étages successifs. Le château de l'Auneau est entouré d'un parc qui offre une peinture hors du temps et un panorama exquis sur une nature préservée.                                                            MOUHEE,  dans son état originel (avant lincendie de 1951) et tableau représentant Jean de Lespinay, mort pour la France le 4 novembre 1918. La tour donjon a été réduite.                                          PONSAY, à l'intérieur, on dénombre 1997 boulins qui servaient de nids aux pigeons. La poutre et le mat tournant au centre existent toujours. On y posait une échelle pour visiter les alvéoles et attraper éventuellement les pigeonneaux. La porte d'entrée de cette fuie est dominée par une pierre datée de 1492. Elle est ornée d'un écu surmonté d'un tortil (corde tressée). On retrouve ces armoiries sur les porches. Le manoir de Ponsay est inscrit aux M.H. depuis 1991, est devenu une agréable maison d'hôtes.","habitants":"Famille de Ponsay                                                                 Mouhée Famille de l'Espinay\r\n        \"","divers":"Château d'Auneau grav 1. de Mouhées grav 2- 3-4   Château de Ponsay; grav 5- 6-7.   46° 41' 32\" Nord et 1° 00' 35\" Ouest. Tabarière grav 8. Boutelière grav 9.","gps":"","images":["../image/image_85/85_Chantonnay_1.jpg","../image/image_85/85_Chantonnay_2.jpg","../image/image_85/85_Chantonnay_3.jpg","../image/image_85/85_Chantonnay_4.jpg","../image/image_85/85_Chantonnay_5.jpg","../image/image_85/85_Chantonnay_6.jpg","../image/image_85/85_Chantonnay_7.jpg","../image/image_85/85_Chantonnay_8.jpg","../image/image_85/85_Chantonnay_9.jpg"]},"Consult_chateau_formulaire22eb":{"id":"Consult_chateau_formulaire22eb","dept":"85","canton":"Fontenay-le-Comte","commune":"Xanton-Chassenon,","nom":"Chassenon","type":"Château","periode":"XVI-XX","histoire":"CHASSENON, Thibaud Chabot épouse, vers 1220 Aënor de Brosse, héritière des Essarts et de Saint-Hilaire-le-Vouhis, est le premier seigneur connu de Chassenon. Il passe ensuite par héritage aux Volvire. Au XIIIe siècle, Lyette de Chassenon épouse Pierre Boutou, seigneur de la Baugisière. Le chevalier Antoine Walsh (1733-), chevalier de l'ordre de Saint-Louis et, petit-fils de Phillip Walsh, fit construire, en 1780, le château de Chassenon actuel, près de l'ancienne bâtisse qui existe toujours. A la Révolution, un bruit se répandit, qu'une troupe de brigands parcourait les campagnes voisines et que le comte d'Artois, fugitif de Paris, se trouvait au château de Chassenon. Une expédition est alors faite pour les débusquer, sans succès. En 1807, la veuve et les filles d'Antoine Walsh cèdent la terre de Chassenon à un riche négociant de Hambourg que le roi du Danemark avait nommé consul à Nantes avant la Révolution, Jean-Joachim Möller (1754-1819), originaire de Norvège. Il passe ensuite à son fils, Ignace Möller, premier maire de Xanton-Chassenon en 1828, puis au fils de celui-ci, Ernest Möller, en 1841.","architecture":"CHASSENON, la construction date des XVIe et XXe siècles. Une belle fontaine de style Renaissance est dans le parc du château. Ernest Möller engage des travaux de restauration et réaménagement du château et agrandi le domaine en faisant l'acquisition de nouvelles fermes (Pineau, la Martinière et les Petit et Grand Champdoré à Darlais).  En 1898, il passe par héritage à son gendre, Alfred Querqui, qui remanie à son tour le château. Un cousin de Querqui, Jean Sioc'han de Kersabiec, en hérite en 1942. La fontaine Renaissance, dans le parc, et le château de Chassenon a été classé aux M.H. depuis 1956.","habitants":"Famille de Jean-Joachim Möller\r\n        \"","divers":"Château de Chassenon; 46° 28' 41\" Nord et 0° 42' 06\" Ouest","gps":"","images":["../image/image_85/85_Chassenon_1.jpg","../image/image_85/85_Chassenon_2.jpg","../image/image_85/85_Chassenon_3.jpg"]},"Consult_chateau_formulaire0b9d":{"id":"Consult_chateau_formulaire0b9d","dept":"85","canton":"La Chataigneraie","commune":"Chataigneraie","nom":"Chataigneraie","type":"Château","periode":"XIX","histoire":"Deux châteaux et deux manoirs à la Chataigneraie, château de Chatenay et de Maronniers,  manoir des Cédres  et Villa Lionnet.                                                CHATENAY, il a été construit en 1870 pour le comte Savary de Beauregard, il appartient actuellement à la famille dAndigné dont les armoiries représentent trois aigles avec cette devise « Aquila non capit muscas » (laigle nattrape pas les mouches),\r\nprès de lactuel château, on peut voir encore une tour carrée, avec une horloge, reste du manoir construit au XVIIe siècle. Il appartient actuellement à la famille Sester.                                       VILLA  LIONNET maison a été construite en 1874 par Félix Lionnet architecte au Louvre, Edmond Guillaume. Au centre, un médaillon en terre cuite représente « la tête dorée de Michel Ange », ainsi nommée par Lionnet. Tout en haut, un imposant fronton de style classique domine la façade.                                                                               CEDRES, le château du Châtenay construit en 1870, de style néo-Louis XIII  par la famille Bailly du Pont de la Tardière, riches bourgeois et lointains parents de Voltaire.                              MARONNIERS, la noce de Guy Adrien de Montillet de Grenaud (1871-1927) et de Marguerite Aulneau de la Touche, le 22 avril 1908, sortant du château des Marronniers.","architecture":"CHATENAY, on remarque la symétrie rigoureuse du corps de bâtiment, agrémenté de panneaux de briques de couleur foncée encadrés par des chaînages de pierre blanche. La façade est décorée de motifs sculptés : armoiries, gargouilles, frontons triangulaires avec pinacles et candélabres, balustres ; le tout surmonté par des toitures dont lélégance est remarquable.Un vaste parc à langlaise met ce château en valeur et lui donne un certain cachet. Dans le parc, larchitecte Arsène Charier y a ajouté un superbe pigeonnier, de vastes dépendances et une pergola. Cette pergola baptisée « pavillon » par les gens, donna son nom au quartier.                                                                                                             CEDRES, le château du Châtenay de 1870 de style néo-Renaissance. Un corps central en avancée, des tourelles dangles en encorbellement, une toiture très pentus, des chaînages en pierre blanche lui donne belle allure.\r\nVILLA LIONNET, la façade orientée au midi est la seule décorée de sculptures et comporte des éléments remarquables dont un charmant perron-corbeille à balustres, une réplique dun perron de la villa Médicis à Rome. Les fenêtres de la partie droite ont leur clé de voûte ornée différemment et chacune leurs particularités : au rez-de-chaussée, meneaux et traverses encadrés de pilastres de style dorique, au premier étage meneaux et pilastres à cannelures surmontés de chapiteaux de style ionique, au second étage, encadrement en pierre moulurée.","habitants":"Comte Savary de Beauregar.,                                                       Famille Lionnet.                                                                        Famille Bailly \r\n        \"","divers":"château à la Chataigneraie; Chatenay   grav 1-2.   46° 39' 00\" nord, 0° 44' 21\" ouest; Cédres grav 3-4; Maronnier  grav 5-6 et autre château dit de Chatenay grav 7","gps":"","images":["../image/image_85/85_Chataigneraie_1.jpg","../image/image_85/85_Chataigneraie_2.jpg","../image/image_85/85_Chataigneraie_3.jpg","../image/image_85/85_Chataigneraie_4.jpg","../image/image_85/85_Chataigneraie_5.jpg","../image/image_85/85_Chataigneraie_6.jpg","../image/image_85/85_Chataigneraie_7.jpg"]},"Consult_chateau_formulaire19a5":{"id":"Consult_chateau_formulaire19a5","dept":"85","canton":"Luçon","commune":"Sainte-Gemme-la-Plaine","nom":"Chevallerie","type":"Château","periode":"XVIII","histoire":"CHEVALLERIE, cest probablement à la famille Babin au début du XVIIIe siècle que nous devons le château actuel.  Les siècles suivants marqueront assez peu les bâtiments malgré le passage des troupes révolutionnaires du général Antoine Marie Bard ou leur démantèlement en deux entités agricoles totalement séparées au XXe siècle.","architecture":"CHEVALLERIE, aujourdhui ce que nous pouvons admirer est presque identique au projet initial, ce qui est exceptionnel, tant dans sa réalisation que sa conservation : lensemble est presque la \"maquette du projet\". Tout plaide pour une conception unique et une réalisation rapide de lensemble: lampleur des bâtiments, leur homogénéité et symétrie et les proportions régulières. Les choix architecturaux modernes sont la marque dun homme riche, connaisseur des Arts et de pouvoir.","habitants":"Famille Babin\r\n        \"","divers":"Château de Chevallerie à Sainte-Gemme-la-Plaine","gps":"","images":["../image/image_85/85_Chevallerie_1.jpg","../image/image_85/85_Chevallerie_2.jpg","../image/image_85/85_Chevallerie_3.jpg","../image/image_85/85_Chevallerie_4.jpg","../image/image_85/85_Chevallerie_5.jpg"]},"Consult_chateau_formulaire9546-2":{"id":"Consult_chateau_formulaire9546-2","dept":"85","canton":"La réorthe","commune":"Saint-Vincent","nom":"Clémenceau","type":"Château","periode":"XVII","histoire":"CLEMENCEAU, cette maison de cinq pièces a été louée au colonel Luce de Trémont par Clemenceau après sa défaite à l'élection présidentielle de janvier 1920, moyennant un loyer symbolique d'un franc  et prévoyant dy séjourner 6 mois par an à la belle saison. Retiré de la vie politique sur ses terres vendéennes dans ce qu'il appelle sa « bicoque de Bélebat », son « château horizontal » ou sa « cabane de paysan », il y vit de façon fort simple (à l'exception de sa Rolls conduite par son chauffeur), entouré de sa cuisinière et de son homme de service. Il adjoint à cette modeste maison un garage, un kiosque « pour l'heure du café, du thé et autres ébats », ainsi qu'une pièce vitrée aux murs extérieurement recouverts de brandes et qui fait office de salon. Après sa mort qui survint en 1929, son fils Michel Clemenceau la cède à l'État en 1932. Elle est gérée par le centre des monuments nationaux.                                                      COLOMBIER, ancien château de la famille Clémenceau.","architecture":"CLEMENCEAU, la maison est restée en l'état depuis la mort du « Tigre » avec son mobilier, ses souvenirs et ses objets personnels, notamment ses nombreux cadeaux diplomatiques témoignant de son japonisme : dans son jardin des petits arbustes, un mât arborant des koinoboris, des kakemonos, deux petits renards en bronze porte-bonheur à l'entrée de sa chambre (tels ceux du temple d'Inari) et qu'il a surnommé ironiquement « Pasteur » et « Rothschild », des estampes japonaises, des porte-bouquets muraux dans les deux chambres dami. Y figurent également une horloge dont les aiguilles sont arrêtées à 1 h 45 du matin, l'heure de sa mort le 24 novembre 1929 ; dans le couloir la bibliothèque qui contient 1 500 livres ; dans son salon servant de fumoir, le rocking-chair, larmoire-cadeau des habitants de Saint-Vincent-sur-Jard, le tapis marocain offert par le maréchal Lyautey ; dans sa chambre la petite bibliothèque tournante de son père vénéré, la plume d'oie avec laquelle il écrit des poèmes à son dernier amour, Marguerite Baldensperger, les pistolets évoquant lamateur de duel, son lit surélevé afin de toujours voir locéan, trois figures de Bouddha ou encore ses trophées de chasse, notamment une gueule de crocodile, des cornes d'antilopes et la peau de tigre blanc qui recouvre son lit (clin d'il pour l'homme que le peuple appelait « Le Tigre »), un trophée rapporté d'un safari au Bengale par Clemenceau.La maison, transformée en musée qui a reçu le label Maisons des Illustres en 2011.","habitants":"Clémenceau\r\n        \"","divers":"Château de Clémenceau et du Colombier  à  Saint-Vincent","gps":"","images":["../image/image_85/85_Cl%c3%a9menceau_1.jpg","../image/image_85/85_Cl%c3%a9menceau_2.jpg","../image/image_85/85_Cl%c3%a9menceau_3.jpg"]},"Consult_chateau_formulairebc60":{"id":"Consult_chateau_formulairebc60","dept":"85","canton":"Saint-Hilaire-de-Riez","commune":"Commequiers","nom":"Commequiers","type":"Vestiges","periode":"XII-XV","histoire":"COMMEQUIERS-FORT, Urvold de Commequiers est le premier de la famille, seigneur de Commequiers en 1091 et n'avait pas encore construit de château à cette époque. Son petit-fils Maurice, prendra le nom de Montaigu, il reprendra les domaines de la famille de la Garnache,   Joscelin de la Forest, époux d'Agnès de Marmande achète le château à Maurice de Belleville vers 1210. Au début du XIVe siècle Josselin de la Forest hérite du château qui passera  en 1380   aux Jusseaume,   Louis de Beaumont Bressuire, seigneur du Plessis Macé, fidèle serviteur des rois Charles VII et Louis XI, avait épousé en 1440 l'héritière de la demeure, Jeanne Jousseaume, sa fille le transmettra aux du Bellay qui vendront le château en 1625 au baron d'Aspremont, Louis de Beaumont,  de 1460 à 1480 fit construire la forteresse, qui sera démantelé en 1628 par ordre de Richelieu. Philippe de la Trémoïlle,  en 1970 acquisition de la forteresse par  la commune.","architecture":"COMMEQUIERS-FORT- vestiges, a été bâti au XVe siècle sur un château du XIIe siècle  et démantelé au XVIIe siècle, construit  selon un octogone régulier en pierres blanches de Sallertaine, vaste  enceinte avec à chaque angle une tour ronde percée de meurtrières destinées à l'artillerie. Il eut uniquement un rôle défensif et n'était pas destiné à l'habitation, ruines d'un donjon octogonal du XIIIe siècle flanqué de huit tourelles. Le château de Commequiers sur une haute motte couronnée d'
