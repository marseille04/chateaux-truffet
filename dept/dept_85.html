re vendéenne, il est aménagé en musée, surtout consacré à la reconstitution des intérieurs ruraux du XVIIIe siècle. Lattrait principal du château et la célèbre cuisine où Charrette, chef vendéen, au moment des guerres de Vendée, prisonnier et blessé, fut transporté par les soldats du général révolutionnaire. Cette pièce a été remise dans létat exact où elle se trouvait en 1796. A quelques centaines de mètres du logis, le petit bois où Charrette traqué se réfugia, une croix a été élevé à lendroit même de sa capture. Le jardin a été aménagé et présente des parterres classiques, un potager et une roseraie. Il y a aussi un second château dans le village à découvrir.","habitants":"Famille des Chabot\r\n        \"","divers":"A St-Sulpice le château  de Butière à Mormaison grav 6-7 Chaboterie grav  1 à 5; 46° 53\" 39\" nord, 1° 25\" 09\" Ouest","gps":"","images":["../image/image_85/85_St_Sulpice_Verdon_1.jpg","../image/image_85/85_St_Sulpice_Verdon_2.jpg","../image/image_85/85_St_Sulpice_Verdon_3.jpg","../image/image_85/85_St_Sulpice_Verdon_4.jpg","../image/image_85/85_St_Sulpice_Verdon_5.jpg","../image/image_85/85_St_Sulpice_Verdon_6.jpg","../image/image_85/85_St_Sulpice_Verdon_7.jpg"]},"Consult_chateau_formulaire924d":{"id":"Consult_chateau_formulaire924d","dept":"85","canton":"Chantonnay","commune":"St Vincent sterlange","nom":"St_Vincent_Sterlange","type":"Forteresse","periode":"XIII","histoire":"Au nord de Chantonnay;                                                                              ROCHES-BARITAUD, au XIIIe siècle, le premier propriétaire  est Jean de Chasteaubriant, les Baritaud sont à l'origine de la Baritaudière à Chantonnay et logiquement des Roches-Baritaud pour lesquelles on ne remonte avec certitude qu'à la famille de Chasteaubriant vers 1290. Geoffroy IV de Chasteaubriant sert dans l'armée du Roi de France pendant les guerres du Poitou. Il a ainsi la garde du château de Pouzauges en 1242. Il épouse en secondes noces une Thouars, dont il n'aura pas d'enfants. Son fils en aura avec une autre, fille du Vicomte. À la génération suivante, trois de ses quatre enfants épousent des bas-poitevins. L'aîné Geoffroy épouse Isabeau de Machecoul, son fils  Geoffroy qui épousera Alix de Thouars, Jeanne de Belleville, épouse ensuite Olivier de Clisson. Sibille se marie avec Maurice de Belleville et le troisième, Jean, épouse la fille du prévost de Thouars. Ses descendants resteront aux Roches Baritaud jusqu'en 1738. Une compagnie des Roches Baritaud figure auprès de Louis XIII à la bataille de Rié en 1622 et Philippe meurt à 34 ans à la bataille de Lérida en 1642. Vendu en 1538 et en 1756 . Puis il sera racheté par le comte Jean-Antoine Olivier de Senozan, le château passe aux Beauharnais,  Il passera ensuite dans les mains de son fils le chef d'escadre Claude de Beauharnais. qui le vendent en 1817 aux Marchegay de Lousigny. Les Marchegay en deviendront propriétaires au cours du XIXe siècle.","architecture":"BELLEVUE à deux Km de Ste Cécile , idéalement situé au cur de la Vendée, vos hôtes vous accueilleront chaleureusement dans leur demeure familiale du XIXe où ils ont su préserver le cachet et l'authenticité des lieux.                                                                               ROCHES-BARITAUD,  la construction du château des Roches-Baritaud date du XIIIe siècle. Douves et fortification, traces d'une présence dès le Moyen-Age. Au fil des siècles, le château des Roches-Baritaud a été le témoin des sursauts de l'Histoire. Les douves et leur fortification dateraient du XIe siècle, la guerre de Cent Ans aurait détruit le château existant. Les douves restent une partie remarquable de l'ensemble actuel, elles ceignent toujours l'ensemble de la propriété. Félix Marchegay, nouveau propriétaire des Roches, faute d'argent, laisse le domaine à l'abandon.  C'est son fils, Paul, qui redonna au château son sublime. Il fit raser une partie des ruines et construisit une habitation plus moderne tout en respectant l'architecture des lieux et en conservant le donjon. Sa demeure fut le rendez-vous des savants et artistes du Grand Ouest, tel le peintre Paul Baudry. Edmond et Jacqueline Marchegay, sixième génération propriétaire du château, ont à coeur de pérenniser cet endroit chargé d'histoire. La demeure dissimule une orangerie et une serre datant du début du XXe siècle, toujours utilisée par Lionel Avril, le jardinier des lieux.  Le château des Roches-Baritaud est classé aux M.H. depuis 1957.","habitants":"Famille de Chasteaubriant \r\n        \r\n        \r\n        \r\n        \"","divers":"Roches-Baritaud; 46° 43' 55\" Nord et 1° 03' 44\" Ouest   Grav 1 à 6                Bellevue grav 7-8","gps":"","images":["../image/image_85/85_St_Vincent_Sterlange_1.jpg","../image/image_85/85_St_Vincent_Sterlange_2.jpg","../image/image_85/85_St_Vincent_Sterlange_3.jpg","../image/image_85/85_St_Vincent_Sterlange_4.jpg","../image/image_85/85_St_Vincent_Sterlange_5.jpg","../image/image_85/85_St_Vincent_Sterlange_6.jpg","../image/image_85/85_St_Vincent_Sterlange_7.jpg","../image/image_85/85_St_Vincent_Sterlange_8.jpg"]},"Consult_chateau_formulaire1036":{"id":"Consult_chateau_formulaire1036","dept":"85","canton":"La Châtaigneraie","commune":"Sainte Hermine","nom":"Ste_Hermine","type":"Château","periode":"XIV","histoire":"Petite COUDRAIE  manoir rivière La Smagne, est un vieux logis vendéen du début du XVIIe siècle et remanié au XVIIIe siècle, hors du temps et de l'espace. Il a conservé toute son âme champêtre. Un enchaînement de cours fleuries, où rosiers et clématites grimpent à l'assaut des murs séculaires contribue au charme des lieux.                                                                                                 SAINTE-HERMINE, fut le siège de la deuxième plus grande baronnie de France, dit Aubraye à Mareuil sur Lay, au XIVe siècle par alliance la seigneurie passe à la famille de la Trémoille, puis en 1599 acquise par François de Nouhes. Le château est construit au XVe siècle. Les premiers seigneurs les Troncas, les Lusignan héritent de Sainte-Hermine des Chabot. La seigneurie échappe à la confiscation de Saint-Louis et passe à d'autres grandes familles féodales, les Mello qui le passe aux de  Brienne. Ces derniers n'ont pas de postérité et Jeanne de Brienne, duchesse d'Athènes, laisse le château à Marie Sully qui l'apportera, avec Noirmoutier, au vicomte de Thouars, Guy de la Trémoïlle puis à Charles d'Albret. Les vicomtes le vendent en 1599 au seigneur de la Tabarière, François des Nouhes baron de la Lande. Son fils, Jacques épouse en 1603 Marie-Anne du Plessis-Mornay, fille du compagnon d'Henri IV. Jacques reconstruit le château, terminé en 1620, à temps pour recevoir Louis XIII en 1622 après la bataille de Rié. Le bon roi Henri IV vint y séjourner plusieurs fois, lui aussi. Le 19/04/1622, à 8H du matin, le roi Louis XIII arriva et fut accueilli par Mme de la Tabarière. Malgré les transformations du XIXe siècle, l'intérieur conserve des aménagements et des décors peints du début du XVIIe siècle.","architecture":"Sainte-HERMINE, la construction date du XIII au XVIIe siècle, devient une puissante forteresse. L'architecte fut Mathurin Bernard. En 1272, Philippe III vint au château de Sainte-Hermine pour y rencontrer les plus grands seigneurs de la région.  La Tour en éperon dite la Tour à Bernard date de la fin du XIIIe siècle. L'ancien château fort du XIVe fut reconstruit au début du XVIIIe siècle.  Se présente comme un long corps de logis construit en 1620 à deux niveaux sur soubassement et lucarnes sur un toit en croupes, flanqué d'un pavillon d'angle, plus élevé et coiffé d'un toit indépendant, à l'autre extrémité de la façade  une grosse tour cylindrique,elle même accostée d'une petite tourelle au toit en calotte, sur la façade d'entrée, un porche, accessible depuis le pont qui franchit  les douves, méne à la cour intérieure ouvrant sur un terre plein, les façades  sont rythmées par des cordons horizontaux soulignant les niveaux et par une corniche à modillons courany à la base du comble chevauché par des lucarnes à fronton triangulaire. De nombreuses transformations eurent lieu au XIXe siècle mais l'intérieur du château de Sainte- Hermine a conservé ses cheminées et décors peints datant du début du XVIIe siècle. Le château de Sainte-Hermine et sa motte féodale sont inscrits aux M.H. depuis le 15/02/2005. \r\nLa BIRONIERE, pas d'information historique, de construction classique de la Vendée de plan rectangulaire à deux niveaux sur soubassement et lucarnes, avant corps d'entré saillant à trois niveaux avec lucarnes sur toit, l'édifice possède une tour ronde sur angle droit à mâchicoulis  chemin de ronde au troisième étage avec tour à fenêtre jumelée toit en poivrière .","habitants":"Famille de la Trémoille,\r\n        \"","divers":"Ste-Hermine  Grav 1 à 5 ; 46° 33' 30\" Nord et 1° 03' 25\" Ouest . La Bironièrre  grav 6","gps":"","images":["../image/image_85/85_Ste_Hermine_1.jpg","../image/image_85/85_Ste_Hermine_2.jpg","../image/image_85/85_Ste_Hermine_3.jpg","../image/image_85/85_Ste_Hermine_4.jpg","../image/image_85/85_Ste_Hermine_5.jpg","../image/image_85/85_Ste_Hermine_6.jpg"]},"Consult_chateau_formulaire73b4":{"id":"Consult_chateau_formulaire73b4","dept":"85","canton":"Fontenay le Comte","commune":"Le Gué de Véluire","nom":"Sébrandière","type":"Château","periode":"XIX","histoire":"SEBRANDIERE , le château de la Sebrandière est un ancien prieuré qui fut  réaménagé sous le second empire. Après plusieurs années de restauration, le domaine a retrouvé son charme d'antan et est aujourd'hui une magnifique demeure à l'architecture d'époque et agrémentée de tout le confort moderne,  le château  est géré directement et indépendamment du domaine par Ludivine Mercier et Lionel Guillon.                                         POIRE, Le seigneur s'enrichissait alors au moyen de péages établis à son profit sur la navigation de la Vendée. En 1412, le château soutient un siège contre les Bourguignons qui ravagent la contrée. En 1593, Antoine Barlot en fait démolir une partie pour construire un château Renaissance. A la fin du XVIIe siècle, il devient la propriété des De Creil. A la Révolution, le domaine est vendu et morcelé. Le château est alors le plus souvent inhabité. Ce sont les seigneurs Barlot, qui au milieu du XVIIe le font agrandir et restaurer. Sous la révolution  il devient \" temple de réunions \". En 1806, grâce aux fonds distribués par Napoléon, la commune effectue les réparations pour qu'il redevienne un lieu de culte. En 1856 et 1899 il est agrandie. De 1888 à 1928, le château est transformé en laiterie-fromagerie, Auguste Lepetit en est le propriétaire, et la marque célèbre prospère ensuite en Normandie.","architecture":"SEBRANDIERE, le château de la Sebrandière est un ancien prieuré complètement réaménagé . Après plusieurs années de restauration le domaine retrouve son charme dantan. Cest aujourdhui une magnifique demeure réhabilitée selon larchitecture de lépoque et agrémentée de tout le confort moderne, qui ouvre ses portes au milieu dun vaste parc au milieu des vignes.","habitants":"Ludivine Mercier et Lionel Guillon\r\n        \"","divers":"Sebrandière à  le gué de Velluire","gps":"","images":["../image/image_85/85_S%c3%a9brandi%c3%a8re_1.jpg","../image/image_85/85_S%c3%a9brandi%c3%a8re_2.jpg","../image/image_85/85_S%c3%a9brandi%c3%a8re_3.jpg","../image/image_85/85_S%c3%a9brandi%c3%a8re_4.jpg"]},"Consult_chateau_formulaire35fb":{"id":"Consult_chateau_formulaire35fb","dept":"85","canton":"Talmont St -Hilaire","commune":"Talmont St -Hilaire","nom":"Talmont_Chateau","type":"Château","periode":"XVI-XIX","histoire":"Cinq châteaux à Talmont Saint-Hilaire; La Garcillière, le Veillon, le Port, la Bénatonière et la Bourgenay pas d'information pour ce dernier.                                                                                                                   La GARCILLIERE en 1882 à la famille de Beaumont de Verneuil d'Auty puis propriété du comte du Bessay leur fille  Henriette épouse  en 1876 le comte Guerry de Beauregard en 1886. Henriette devenue religieuse, retour d'un fils Amblard avec son épouse  Marguerite  de Couesson.                                                                BENATONIERE, les  modifications et la construction de nouvelles dépendances ont été réalisés par le comte de Bessay en 1868, et ceci au goût du XIXe siècle.                                                                                        VEILLON en 1698, par Veillon de Beauregard, l'acquéreur du Veillon, l'histoire est muette sur les aventures des seigneurs du Veillon, les vassaux des princes de Talmont.","architecture":"La GARCILLIERE,  au XXe siècle, le vieux château sera partiellement rasé et reconstruit par l'architecte Paul Guillerot terminé en 1873.  Ce rare fronton avec horloge provient du château de la Garcillière à Talmont Saint Hilaire (Vendée). Réalisé au XIXè siècle en pierre sculptée, les dimensions de ce fronton sont tout à fait monumentale.                                         BENATONIERE, et ceci au goût du XIXe siècle, sans en modifier la base ni les ouvertures, sous la direction de l'architecte Paul Guillerot de la Roche sur Yon. A cette époque la propriété de la Bénatonière était importante avec de nombreuses métairies. \r\nLe métayage  consistait en une gestion mutuelle entre le propriétaire et les exploitants agricoles et nécessitait des bâtiments  pour entreposer les grains et également le vin élaboré et conservé sur place.\r\nVEILLON, au Moyen-Age, soit dans les temps modernes, les vassaux des princes de Talmont, que la citadelle du Veillon, ou plutôt \"le poste\", consistait en une terrasse élevée d'où l'on voyait la mer, au-dessus des arbres plus clairsemés et moins élevés qu'aujourd'hui. Dans le sous-sol existe encore une salle voûtée avec une grande cheminée noircie par le feu ; c'était le corps de garde, il fut bâti avec les deux tours qui le dominent, en 1698.","habitants":"Garcillière;Famille de Beaumont de Verneuil                           Famille de  Veillon de Beauregard           \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"à Talmont Saint-Hilaire grav 6; La Garcillière grav 1,   la Bénatonière grav-5  et la Bourgenay  grav 2-3-4  le Veillon grav 7-8-9      46° 28' 05\" nord, 1° 37' 01\" ouest","gps":"","images":["../image/image_85/85_Talmont_Chateau_1.jpg","../image/image_85/85_Talmont_Chateau_2.jpg","../image/image_85/85_Talmont_Chateau_3.jpg","../image/image_85/85_Talmont_Chateau_4.jpg","../image/image_85/85_Talmont_Chateau_5.jpg","../image/image_85/85_Talmont_Chateau_6.jpg","../image/image_85/85_Talmont_Chateau_7.jpg","../image/image_85/85_Talmont_Chateau_8.jpg"]},"Consult_chateau_formulaire22de":{"id":"Consult_chateau_formulaire22de","dept":"85","canton":"Talmont Saint-Hilaire","commune":"Talmont Saint-Hilaire","nom":"Talmont_st_Hilaire","type":"Vestiges","periode":"XII-XV","histoire":"A Talmont st-Hilaire le château de Talmont, de Bourgenaie, de la Garcilière.                                                                                                         TALMONT -ST-HILAIRE,  la forteresse de Talmont remonte au XIe siècle : Guillaume le Chauve, reçoit en fief un territoire côtier marqué par les invasions normandes,  au XIIe siècle  le fief est passé par alliance aux Mauléon, Raoul  entreprend la construction de la deuxième enceinte flanquée de tours semi-circulaires. Cette région est alors sous l'autorité du comte de Poitou et duc d'Aquitaine, Guillaume V.  En 1253 le château passe dans la famille des vicomtes de Thouars. En 1404 c'est la famille d'Amboise qui hérite de la demeure puis en 1470 la famille de La Trémoille qui en sera le dernier propriétaire. les Trémoille deviennent prince de Talmont. C'est un enjeu important localement puisqu'elle abrite tour à tour, catholiques et protestants jusqu'au siège final des troupes d'Henri de Navarre en 1587, celui-ci une fois Roi de France, fait restaurer les défenses du château, consolider les portes et les palissades endommagées au cours des nombreux sièges. Pour éviter que les anglais et leurs alliés protestants ne puissent s'implanter durablement en Poitou Louis XIII et Richelieu démantelèrent de nombreux châteaux de la région dont celui de Talmont. En 1628, Henri Ier de La Trémoille obéit à l'injonction du roi en échange d'une somme confortable. A partir de cette date, le château n'est plus habité et commence lentement à se dégrader, propriété de la commune.","architecture":"TALMONT; la construction d'un premier château à Talmont: simple tour sur une motte de terre cernée par une palissade de bois. Vers 1035, Guillaume Le Chauve entreprend la construction d'un nouveau château qui deviendra le siège d'une riche principauté. Il fait ériger autour de l'église une enceinte de galets dont le tracé épouse fidèlement celui de l'éperon, dit \"barré\" car coupé du château à motte, au nord, par un profond fossé alimenté par la mer. C'est en quelque sorte la résidence secondaire de Richard qui vient s'y reposer et surtout y chasser. Richard est un valeureux guerrier mais également un grand bâtisseur (Château Gaillard). C'est probablement lui, par l'intermédiaire de son fidèle vassal, Raoul de Mauléon, seigneur de Talmont, qui fait fortifier l'ancien château en le dotant d'éléments défensifs appropriés aux nouvelles machines de guerre. Il fait élever une deuxième enceinte flanquée de tours de contrôle circulaires. Il renforce la face nord, par un mur de plus de sept mètres d'épaisseur, ainsi que la face Est en élevant un mur de protection. Pour achever la fortification de son château, il fait construire la tour assommoir, unique passage entre la basse cour et la haute cour.  Au début du XVe siècle les Thouars se font construire un logis plus confortable, est démantelé sur ordre de richelieu,  le château est une véritable forteresse militaire imprenable et l'histoire ne le démentira pas.","habitants":"Famille des vicomtes de Thouars                                               Famille de La Trémoille \r\n        \"","divers":"Talmont st-Hilaire; 46° 28' 03\" nord, 1° 37' 09\" ouest","gps":"","images":["../image/image_85/85_Talmont_St_Hilaire_1.jpg","../image/image_85/85_Talmont_St_Hilaire_2.jpg","../image/image_85/85_Talmont_St_Hilaire_3.jpg","../image/image_85/85_Talmont_St_Hilaire_4.jpg","../image/image_85/85_Talmont_St_Hilaire_5.jpg","../image/image_85/85_Talmont_St_Hilaire_6.jpg","../image/image_85/85_Talmont_St_Hilaire_7.jpg","../image/image_85/85_Talmont_St_Hilaire_8.jpg","../image/image_85/85_Talmont_St_Hilaire_9.jpg"]},"Consult_chateau_formulaireec14":{"id":"Consult_chateau_formulaireec14","dept":"85","canton":"Fontenay le Comte","commune":"Fontenay le Comte","nom":"Terre_Neuve","type":"Palais","periode":"XVI","histoire":"TERRE-NEUVE, construit en 1580, pour Nicolas Rapin, compagnon d'Henri IV et grand prévôt de la connétablie de France. Véritable joyau de style Renaissance, le château de Terre-Neuve reçut de nombreux personnages importants dont le duc de Sully, et Agrippa d'Aubigné.   Vers 1700 achat du château par la congrégation des lazaristes qui le conserveront pendant une période de deux siècles.  Au XIXe siècle, Octave de Rochebrune devient propriétaire des lieux, en tant que petit-fils du comte de Vassé-Tendron, maire de Fontenay et député de la Vendée, qui avait acquis le château après une longue période doubli du domaine. Terre-Neuve passé à la fille d'Octave de Rochebrune épouse le comte Raoul de Fontenioux resté dans la famille depuis. Cest en 1984 quHenri du Fontenioux, ayant hérité du château, vient sy installer et va le léguer  à son fils. Né en 1940, il y passe son enfance et son adolescence. Lécrivain Georges Simenon la habité, de 1940 à 1943.","architecture":"TERRE-NEUVE, gentilhommière à l'origine, dont les plan d'ensemble a été   préservé malgré les transformations effectués. l'édifice consiste dans deux corps de bâtiment en équerre, flanqué de tourelles en encorbellement aux angles et de deux tours  plus importantes du côté de la basse-cour. Il y a eu également de très gros travaux de restauration du porche et des muses (statues), ainsi que la réalisation, à la main, des copies de ces 9 grandes dames.","habitants":"Famille de Nicolas Rapin\r\n        \"","divers":"Terre-Neuve : 46° 27' 46\" Nord et 0° 48' 53\" Ouest","gps":"","images":["../image/image_85/85_Terre_Neuve_1.jpg","../image/image_85/85_Terre_Neuve_2.jpg","../image/image_85/85_Terre_Neuve_3.jpg","../image/image_85/85_Terre_Neuve_4.jpg","../image/image_85/85_Terre_Neuve_5.jpg"]},"Consult_chateau_formulaire0296":{"id":"Consult_chateau_formulaire0296","dept":"85","canton":"Mortagne-sur-Sèvre","commune":"Tiffauges","nom":"Tiffauges","type":"Vestiges","periode":"XII-XIV-XIX","histoire":"TIFFAUGES,  dit de Barbe Bleue;  Geoffroy de Thouars construit le château et le village au XIIe siècle. Le dernier seigneur Miles II de Thouars, avait deux filles, Marie et Catherine. Le château est la dot de Catherine de Thouars qui épouse Gilles de Rais premier maréchal de France en 1420. C'est le château où Gilles de Rais aurait perpétré ses atrocités. Le 26 octobre 1440, après sa mort, sa veuve Catherine de Thouars se remarie avec Jean II de Vendôme, vidame de Chartres. Il fait élever en 1520 la tour qui portera son nom, la \"tour Vendôme\". Ensuite, le château entrera en la possession de Jean III, fils de Catherine et de Jean II. Le fief passera ainsi de mains en mains tout au long de l'histoire. En 1563, c'est le duc de Thouars qui en hérite. Il le cédera à Bérande de Ferrière qui le remettra à son frère Jean. Le château est attaqué et incendié en 1569 durant les guerres de religion et démantelé par ordonnance royale en 1626. Le 19 septembre 1793 il jouera encore un rôle dans la bataille de Torfou, ce fut la dernière victoire Vendéenne.   Depuis 2002, il est la propriété du conseil départemental de la Vendée.                                                                                            A Tiffauges, le manoir hôtel le Barbacane,  belle demeure du XIXe Siècle de madame Bidan.","architecture":"TIFFAUGES, vestiges d'un ancien château fort, de style médiéval. situé le long de la Crume, au pied du promontoire protégé par un rempart muni de tours. Détruit en partie durant les guerres de religion puis lors de la reconstruction de la ville de Tiffauges suite aux guerres de Vendée, le château sort de l'oubli au XXe siècle grâce à l'investissement de la commune et du conseil départemental de la Vendée. Sa construction a débuté au XIIe siècle et s'est achevée au XVIe siècle.  Situé le long de la Crume, au pied du promontoire. Le tout était protégé par un rempart muni de 18 tours, on y accède par un châtelet d'entré du XIVe siècle qui était muni d'un pont-levis.  Deux tours l'une du XVe siècle l'autre du XVIe siècle, la tour Vidame à conservé de nombreuses salles du XVIe siècle. Il est surnommé le château de Barbe-Bleue, ce donjon du XIIe siècle mesurait initialement 18 mètres de côté pour une hauteur de 24 mètres. Il ne mesure plus que 18 mètres de haut actuellement. Le château est resté longtemps abandonné en ruines. La grande surface intérieure  a même été utilisée pendant une période comme terrain de football du club local du réveil sportif teiphalien .","habitants":"Famille de Geoffroy de Thouars \r\n        \"","divers":"Tiffauges; 47° 00' 59,04\" Nord et 1° 06' 52,92\" Ouest      Barbacane grav 9","gps":"","images":["../image/image_85/85_Tiffauges_1.jpg","../image/image_85/85_Tiffauges_2.jpg","../image/image_85/85_Tiffauges_3.jpg","../image/image_85/85_Tiffauges_4.jpg","../image/image_85/85_Tiffauges_5.jpg","../image/image_85/85_Tiffauges_6.jpg","../image/image_85/85_Tiffauges_7.jpg","../image/image_85/85_Tiffauges_8.jpg","../image/image_85/85_Tiffauges_9.jpg"]},"Consult_chateau_formulaire1184":{"id":"Consult_chateau_formulaire1184","dept":"85","canton":"Mareuil-sur-Lay-Dissais","commune":"Angles","nom":"Tour_Moricq","type":"Tour","periode":"XIII-XIV","histoire":"TOUR MORICQ, elle a été reconstruite, en 1435, par Régnault Girard, maire de La Rochelle, qui avait acquis le château, en 1430. Lédifice avait pour fonction de protéger le port de Moricq qui exportait du vin, des céréales et du bois vers La Rochelle et Bordeaux, ainsi que lembouchure du Lay qui était alors navigable jusquà Mareuil-sur-Lay. Il a été utilisé par les protestants pendant les guerres de religion (1565-1628). La Tour de Moricq a servi également à emprisonner les protestants après la révocation de l'Édit de Nantes en 1685. La tour de Moricq est inscrite aux M.H. depuis le 6 août 1915. La commune dAngles a racheté la Tour, en 1988, afin den assurer la sauvegarde et la restauration.","architecture":"TOUR de MERICQ, a été édifiée sur l'ancienne motte castrale et sur les ruines du château-fort originel, dont les voûtes romanes en sous-sol existent encore. Lors du siège de la Rochelle en 1628, la grosse tour d'angle abritant un escalier à vis aurait été abattue. Les marais avoisinants ont été desséchés au XVIIIe siècle et, la Tour de Moricq fut alors transformée en grenier à blé, en relation avec lactivité du port de Moricq. Celui-ci est resté actif jusquau XIXe siècle.","habitants":"Famille de  Régnault Girard,\r\n        \"","divers":"Au Angles la Tour de Moricq; 46° 24' 18\" Nord et 1° 22' 37\" Ouest","gps":"","images":["../image/image_85/85_Tour_Moricq_1.jpg","../image/image_85/85_Tour_Moricq_2.jpg","../image/image_85/85_Tour_Moricq_3.jpg","../image/image_85/85_Tour_Moricq_4.jpg"]},"Consult_chateau_formulairebd54":{"id":"Consult_chateau_formulairebd54","dept":"85","canton":"Challans","commune":"Apremont","nom":"Tuderrière","type":"Manoir","periode":"XI-XIV","histoire":"TUDERRIERE,  citée en 1161 puis en 1280. Propriété des Belleville au XIVe siècle, ils y installèrent Les Queraud à qui ils donnèrent des biens à l'extrémité de leurs domaines à Chateaumur. Vers 1340, Olivier de Clisson fut accusé de trahison et condamné à mort, ses biens et ceux de son épouse Jeanne de Belleville sont confisqués et attribués au Roi de France. Un dénombrement est fait en 1343 et on trouve Guillaume Queraud, seigneur de la Tuderrière, qui figure pour la Tuderrière à Apremont. Il semble qu'en 1534 la Tuderrière n'est plus habitée. En 1594, la demeure passe à Claude Dreux qui est devenu gentilhomme de la Chambre du Roi grâce à Gilbert de la Tremoïlle. En 1607, il habite toujours au château d'Apremont, il semblerait qu'il a profité de ce séjour pour faire restaurer, ou reconstruire la Tuderrière. Son fils lui succède comme seigneur de la Tuderrière et comme Gentilhomme de la Chambre du Roi. Par mariage, le manoir passe aux Durand, bourgeois et marchands, ils seront anoblis au XVIIe siècle. Ils résideront à la Tuderrière jusqu'à la Révolution, l'un d'entre eux était en 1785 sous lieutenant aux gardes du corps du Roi. La propriété a été vendue comme bien national puis passa de main en main. M. Racaud Boris et Mlle Ceran Sonia l'ont acquis afin dy entreprendre des travaux importants de restauration.","architecture":"TURDERRIERE  Forteresse médiévale au XIe siècle, bâtisse  classique de plan en U dans un parc  à deux niveaux.","habitants":"Famille Les Queraud \r\n        \"","divers":"Tuderrière; 46° 44' 12\" Nord, 1° 44' 09\" Ouest","gps":"","images":["../image/image_85/85_Tuderri%c3%a8re_1.jpg","../image/image_85/85_Tuderri%c3%a8re_2.jpg"]},"Consult_chateau_formulaire6119":{"id":"Consult_chateau_formulaire6119","dept":"85","canton":"La Roche-sur-Yon","commune":"Venansault","nom":"Venansault","type":"Château","periode":"XIV-XVII-XIX","histoire":"A Venansault, château de Venansault de la Boursière des Hermitans et de Monbail.                                                            VENANSAULT, Monbail (1877-78), ses principaux seigneurs étaient des Moines prémontrés de l'Abbaye du Lieu-Dieu, à cause du premier établissement de ceux-ci au Lieu-Dieu de la Genétouze (fin du XIe siècle). Bâti en 1854 par Henri-Joseph de Bonnegens, magistrat à Saint-Jean-dAngély, lédifice et ses terres ont été vendus à lassociation MFR de Venansault, en 1959. Depuis, le site et ses 15 ha poursuivent inexorablement leur mue.                                                                                                   MONBAIL, ancienne maison noble et seigneurie dont les origines remontent au XIIe siècle. Le titre de Marquis y a été attaché à la fin du XVIIe siècle. Cest désormais une demeure privée.\r\n La BOURSIERE (vers 1224) château du   XVIe-XVIIIe siècles, ancien moulin ayant appartenu à Marguerite du Puy du Fou (vers 1365). Aujourdhui le château a été restauré et habité.\r\n Les HERMITANS du XIXe siècle château construit en 1854 par Henri-Joseph de Bonnegens, magistrat à Saint-Jean dAngély . Lensemble  château et dépendances  appartiennent  à la maison familiale. Henri Joseph Vincent de Bonnegens, né en 1806, fit construire le château des Hermitans à Venansault, aujourd'hui propriété toujours à l'association de la maison familiale en 2004. Autrefois, le bâtiment accueillait linternat » , raconte Francis Poisson, directeur.","architecture":"BOURSIERE  de plan rectangulaire petit manoir  du  XVIe-XVIIIe siècles  à deux niveaux sur soubassement, de plan rectangulaire à deux niveaux toits en croupes flanqué sur les angles de deux tours rondes toits en poivrière  prolongés sur les flancs de bâtiments de dépendances à deux niveaux inférieur pour celui de droite et d'un niveau pour celui de gauche et comme avant-corps une tour sur parc .                                                                                     HERMITANS, le gros uvre est achevé et les murs des salles de classe sont posés désormais, dans le château des Hermitans. « \r\nBâti en 1854 par Henri-Joseph de Bonnegens, magistrat à Saint-Jean-dAngély, lédifice et ses terres ont été vendus à lassociation MFR de Venansault, en 1959. Depuis, le site et ses 15 ha poursuivent inexorablement leur mue, de plan rectangulaire à deux niveaux  sur soubassement avec cordon au premier et échauguettes sur angles de la façade sur encorbellement toits en coupole, lucarnes en chien assis sur toit avec frontons et acrotères.","habitants":"Famille de  Henri-Joseph de Bonnegens                   Boursière; Marguerite du Puy du Fou \r\n        \"","divers":"A Venansault chateau de Venansault  grav 1  de la Boursière grav 2 -3 des Hermitans grav 4 et de Monbail.46° 41' 13\" nord, 1° 30' 41\" ouest","gps":"","images":["../image/image_85/85_Venansault_1.jpg","../image/image_85/85_Venansault_2.jpg","../image/image_85/85_Venansault_3.jpg","../image/image_85/85_Venansault_4.jpg"]},"Consult_chateau_formulairec8df":{"id":"Consult_chateau_formulairec8df","dept":"85","canton":"Montaigu","commune":"Vendrennes","nom":"Vendrennes","type":"Maison-forte","periode":"XIII-XVI","histoire":"VENDRENNES, aux XIVe et XVe siècles, c'est à l'origine le siège d'une châtellenie relevant du vicomté de Thouars. En 1230, la marquise de Mauléon, veuve de Guillaume de Lusignan, est qualifiée de dame de Mouchamps et de Vendrennes.  Aux XIVe et XVe siècles, elle est la possession des Bellevile, des Clisson mais aussi du Roi de France qui confisque les biens d'Olivier III de Clisson et de sa femme, pour collaboration avec les Anglais. A l'aube du XVIe siècle, et jusqu'en 1789, la demeure revient aux seigneurs de Mouchamps, qui résident alors au château du Parc Soubise.","architecture":"VENDRENNES,  le vieux château garde son aspect médiéval et sert de résidence au fermier général. Fin 1989, la découverte de vestiges d'une église romane dans l'enceinte fortifiée permet d'affirmer que le donjon primitif appartient à une catégorie connue et limitée : celle des donjons romans de type niortais. De forme carrée, muni aux angles de tours rondes, pleines, et arborant sur au moins deux des côtés des contreforts semi circulaires pleins. Le château de Vendrennes est inscrit aux M.H. depuis 1991, bien qu'il fut incendié, est toujours habité.","habitants":"La marquise de Mauléon\r\n        \"","divers":"Vendrennes; 46° 49' 37,13\" Nord et 1° 07' 25,55' Ouest","gps":"","images":["../image/image_85/85_Vendrennes_1.jpg","../image/image_85/85_Vendrennes_2.jpg","../image/image_85/85_Vendrennes_3.jpg","../image/image_85/85_Vendrennes_4.jpg"]},"Consult_chateau_formulaire4779":{"id":"Consult_chateau_formulaire4779","dept":"85","canton":"Challans","commune":"Saint-Christophe du Ligneron","nom":"Verger","type":"Château","periode":"XV","histoire":"VERGER est une demeure qui date du XVe siècle. Le Castel du Verger est une propriété privée, avec piscine, qui vous propose ses chambres d'hôtes. Vous pourrez vous promener dans un magnifique parc de 3,3 ha, généreusement fleuri, arboré et taillé avec soin. Alain vous fera visiter la magnifique chapelle du château. Si vous aimez pêcher, un étang poisonneux vous comblera de plaisir. Le Castel se situe aussi à 20 mn de la mer.","architecture":"VERGER deux bâtiments dont un en équerre à deux niveaux avec des tourelles sur les angles et une tour donjon crénelé flanqué d'une échauguette dépassant l'ensemble ( tour de guet). Le deuxième bâtiment de plan en équerre à un niveau flanqué également de tours rondes et carrées .                                                        Autre petit manoir à Saint-Christophe bâtiment en équerre avec tourelle sur angles intérieur toit en poivrière.","habitants":"seigneurs locaux\r\n        \"","divers":"Verger; 46° 49' 30\" Nord, 1° 45' 43\" Ouest","gps":"","images":["../image/image_85/85_Verger_1.jpg","../image/image_85/85_Verger_2.jpg","../image/image_85/85_Verger_3.jpg","../image/image_85/85_Verger_4.jpg","../image/image_85/85_Verger_5.jpg"]},"Consult_chateau_formulaireb7fc":{"id":"Consult_chateau_formulaireb7fc","dept":"85","canton":"Mortagne sur sévre","commune":"Mortagne sur sévre","nom":"Verrie","type":"Château","periode":"XVIII-","histoire":"Château de La Vachonnière, de Boisy-Sourdis, anciennement dit La Borderie-Sourdis.                                                                                           VACHONNERIE,  c'est que des ancêtres de la parente, de Boutillier de Saint-André y vivaient au début du XVIIIe siècle. Un Boutillier des Hommelles, mariée avec une cousine Boutillier de la Chèze qui décéda en ce lieu le 21 septembre 1722.  Jacques François Boutillier des Hommelles (1754-1800) avait hérité de la propriété en 1789. Conseiller du Roi à lélection de Châtillon, il fut choisi comme membre du conseil supérieur des Vendéens.   BOIS-SOURDIS  Charles Henri Félicité Sapinaud  baptisé le 1er janvier 1761 , officier des armées vendéennes, lieutenant général, propriétaire, rentier.  En 1797, il épouse Marie-Louise Charette, parente du général. Bien que la guerre soit terminée, Sapinaud n'en reste pas moins royaliste.\r\nEn 1814, il est nommé général du roi. Pendant les Cent-Jours, il essaie de reformer l'armée du centre, au côté de Louis de La Rochejaquelein. Après la mort de celui-ci, il devient le nouveau généralissime. Sous la Restauration, il devient duc, puis Pair de France.","architecture":"VACHONNERIE, a été incendié par les colonnes infernales au début de l'année 1794, partiellement reconstruit autour de 1800, puis restauré en 1895. de plan en U avec porche d'entrée mâchicoulis  rayure de chainage  de pont-levis, corps de logis sur la gauche bâtiment rectangulaire à trois niveaux toit en croupe accolée d'une tour carré centrale et d'une échauguette sur façade côté cour et l'édifice est prolongé par un bâtiment à deux niveaux jusqu'à une intersection par un autre bâtiment reliant l'angle droit et la tour porche d'entrée.                                                     BOIS-SOURDIS  de plan d'équerre, le corps de logis rectangulaire à deux niveaux flanqué d' une tour polygonal et d'une tour carré sur angle gauche à trois niveaux à toit impérial.","habitants":"Boutillier de Saint-André\r\n        \"","divers":"A  Mortagne sur Sévre   La Vachonnière grav 1 à 4, de Boisy-Sourdis,   Verrie; 46° 57' 43\" nord, 0° 59' 38\" ouest","gps":"","images":["../image/image_85/85_Verrie_1.jpg","../image/image_85/85_Verrie_2.jpg","../image/image_85/85_Verrie_3.jpg","../image/image_85/85_Verrie_4.jpg","../image/image_85/85_Verrie_5.jpg","../image/image_85/85_Verrie_6.jpg","../image/image_85/85_Verrie_7.jpg"]},"Consult_chateau_formulaire8b86":{"id":"Consult_chateau_formulaire8b86","dept":"85","canton":"La Châtaigneraie","commune":"St_Germain_l","nom":"Vigneau","type":"Manoir","periode":"XVII","histoire":"VIGNEAU, manoir  a été construit au XVIIe siècle, à cette époque, il appartenait aux seigneurs Tressard. Il passe ensuite dans la famille Béreau dont Louise Placide sera condamnée à mort pour avoir hébergé un prêtre en 1794  au moment de la Révolution.","architecture":"VIGNEAU, le manoir  possède un porche assez original, mais en mauvais état.Le pavillon d'entrée de la propriété présente un porche original avec deux portes, une porte cochère et une petite porte piétonne. Au dessus un chien-assis porte la date 1624. A droite de la grande porte une sorte déchauguette repose sur trois corbeaux de pierre de taille. Sur la droite du logis on peut apercevoir un vitrail qui témoigne de la présence d'une chapelle.  Sur la lucarne datée on peut y voir une couronne qui indique que le Vigneau relève du duc d'Orléans .\r\nSur la droite on peut apercevoir un vitrail qui témoigne de la présence d'une chapelle.","habitants":"Famille Béreau\r\n        \"","divers":"A St_Germain_l'Arguiller Le château de Vignaud","gps":"","images":["../image/image_85/85_Vigneau_1.jpg","../image/image_85/85_Vigneau_2.jpg","../image/image_85/85_Vigneau_3.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','85 — Vendée'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
