un large fossé, a été démantelé sur ordre de Richelieu en 1628, après les révoltes des Huguenots.","habitants":"Famille de Louis de Beaumont \r\n        \"","divers":"Vestiges de Commequiers; 46° 45' 59\" nord, 1° 49' 53\" ouest","gps":"","images":["../image/image_85/85_Commequiers_1.jpg","../image/image_85/85_Commequiers_2.jpg","../image/image_85/85_Commequiers_3.jpg","../image/image_85/85_Commequiers_4.jpg","../image/image_85/85_Commequiers_5.jpg"]},"Consult_chateau_formulaire943c":{"id":"Consult_chateau_formulaire943c","dept":"85","canton":"Mareuil-sur-Lay-Dissais","commune":"Saint-Cyr-en-Talmondais","nom":"Court_Aron","type":"Château","periode":"XVI-XVIII-XIX","histoire":"COURT-D'ARON, siège d'une ancienne seigneurie,  en 1802 acquis par la famille de Joussemet.  L'édifice est ensuite acheté par Octave de Rochebrune, le célèbre aquafortiste de Terre-Neuve qui complète sa construction, en 1881 acquis par Raoul de Fortenioux. A sa mort en 1924, M. le comte de Rochebrune et sa femme nont pas eu denfants, il lègue le Court dAron à son petit neveu : Guillaume du Fontenioux. Celui-ci et son épouse ont quatre enfants et habitent peu au château et en font rapidement une résidence dété. En effet, le legs impose quils occupent les lieux au moins trois mois dans lannée. Pour ce faire, ils y viennent à la période estivale et M. du Fontenioux transforme une partie du château en musée. Cest loccasion dy montrer les nombreuses collections du comte de Rochebrune, notamment une très belle collection darme qui se trouve actuellement au musée dObrée à Nantes. Le comte décède en 2000 à lâge de 94 ans. De ses 4 enfants, aucun ne veut acheter le château de la Court dAron : ils vendent la propriété, le parc floral attenant et lAuberge. Le parc floral allie variétés classiques et tropicales dans un foisonnement végétal.  Le lac au lotus est une étape incontournable de la visite du jardin. Propriété des Fontenioux Location chambres d'hôtes.","architecture":"COURT-D'ARON,  il a été transformé dans un style Renaissance. Le château de la Court d'Aron est un édifice du XVIe siècle modifié au XIXe siècle par Octave de Rochebrune le restaurateur du château de Terreneuve à Fontenay-le-Comte pour l'archéologue Benjamin Fillon. Coté Ouest, se trouve une grande tour de 3 étages à frise de mâchicoulis, balustrade, lucarne et haute cheminée. Le corps du bâtiment comprend deux étages avec deux fenêtres à meneaux. La porte principale du bâtiment est encadré de pilastres. L'aile orientale comporte aussi deux étages et un toit pyramidal soutenu par des mâchicoulis avec des lucarnes à fronton circulaire. Une grande loggia avec arcature termine l'extrémité sud de cette aile. L'ensemble est très élégant. À l'intérieur une importante partie de l'aménagement et du mobilier sont conservés, une cuisine avec vaisselle et cuivre, une statue funéraire en marbre blanc de Suzanne Tiraqueau, fille du juriste fontenaisien, une Vierge de bois polychrome du XVe siècle, un miroir Louis XVI, une table de marquèterie italienne du XIXe et tapisseries du XVIe siècle. La salle à manger possède une cheminée de style Louis XIII et du mobilier de la même époque. Le salon présente une cheminée monumentale du XVIIe siècle avec écusson de René Baudouin, Capitaine des Garde-Côtes du Bas-Poitou et 2 landiers en bronze. Un important parc floral a été développé et accessible au Public.","habitants":"Famille de Joussemet\r\n        \"","divers":"Court-Aron: 46° 27' 41\" Nord, 1° 20' 08\" Ouest","gps":"","images":["../image/image_85/85_Court_Aron_1.jpg","../image/image_85/85_Court_Aron_2.jpg","../image/image_85/85_Court_Aron_3.jpg"]},"Consult_chateau_formulaire8f85-2":{"id":"Consult_chateau_formulaire8f85-2","dept":"85","canton":"La Châtaigneraie","commune":"Cezais","nom":"Cressonnière","type":"Forteresse","periode":"XIV-XVI","histoire":"CRESSONNIERE, le château de la Cressonnière a été construit au XVIe siècle et possède un passé prestigieux. Jean Cresson est seigneur de la Cressonnière en 1360 et 1396. Guillaume Bastard, seigneur du Fougeroux, épouse Andrée Cresson, dame de la Cressonnière en 1497. René Bastard met sa devise sur le porche d'entrée en 1566 et semble faire aussi beaucoup d'émules parmi ses proches. Jean Boutaud de l'Aubouinière épouse Marie Bastard, sur de René. Ensuite la Cressonnière passe aux Maistre de la Papinière, seigneurs de Bonnefonds et de la Mesnardière de Saint-Pierre-du-Chemin.","architecture":"CRESSONNIERE, les vestiges du château de René Bastard montrent la qualité de son inspiration. L'entrée de l'édifice est composée d'une partie centrale le porche  longe une longue suite  de Communs et flanquée de deux grandes tours de trois étages, tout cet ensemble de communs inabités et inemployé à une centaine de mètres s'élève une tour massive flanqué d'un ancien corps d'habitation, en 1579 fut ordonnée la destruction  du château mais cela n'a pas été accompli.","habitants":"Famille de Jean Cresson\r\n        \"","divers":"Porte et remparts  de Cressonnière  à Cezais","gps":"","images":["../image/image_85/85_Cressonni%c3%a8re_1.jpg","../image/image_85/85_Cressonni%c3%a8re_2.jpg","../image/image_85/85_Cressonni%c3%a8re_3.jpg","../image/image_85/85_Cressonni%c3%a8re_4.jpg","../image/image_85/85_Cressonni%c3%a8re_5.jpg"]},"Consult_chateau_formulaire69f1":{"id":"Consult_chateau_formulaire69f1","dept":"85","canton":"Mortagne-sur-Sèvre","commune":"Cugnand","nom":"Cugnand_Lemot","type":"Manoir","periode":"XVIII","histoire":"LEMOT villa, le bâtiment est édifié par l'architecte Pierre-Louis van Cleemputte (1758-1834), après plusieurs projets Mathurin Crucy entreprend la construction prévue dès l'origine, mais les travaux ne commencent qu'en 1824. Son architecture est de style néo-palladien.  Barthélemy Lemot fait ajouter au bâtiment un belvédère en son sommet, ainsi qu'une colonnade en hémicycle donnant sur les trois allées d'accès à la villa. En 1872, il confie à l'architecte Lenoir d'achever la loggia. Ce n'est que vers 1930 que l'ancienne allée du potager, en face de la villa, est élargie en grande allée d'accès, avec des statues de Diane, d'Hippomène et d'Atalante, ainsi que des cratères de fleurs.","architecture":"LEMOT, composée d'un corps de bâtiment principal et de deux ailes en retour, la façade au sud-ouest s'ouvre par une loggia sur la vallée de la Sèvre et sur quelques fabriques situées en face, de l'autre côté de la rivière. À l'intérieur, Barthélémy Lemot fait aussi réaliser, vers 1866, l'aménagement de la galerie des illustres au premier étage de la villa. Celle-ci comprend des représentations en médaillon de son père ainsi que de sept autres artistes, amis de François-Frédéric : Claude Dejoux, sculpteur, professeur de Lemot, Charles Percier l'architecte, François Gérard le peintre, André Galle, sculpteur, François-Joseph Talma, le tragédien, François Adrien Boieldieu, compositeur et Antoine-Jean Gros lui aussi peintre. Ces médaillons sont réalisés à partir de portraits de David d'Angers. La galerie comporte aussi une série de quatre bustes allégoriques datant du XVIIe siècle représentant les saisons, uvres d'Alessandro Rondoni ainsi qu'un moulage en bronze du Jugement de Salomon, uvre prix de Rome de François-Frédéric Lemot en 1790.","habitants":"Famille de Barthélémy Lemot\r\n        \"","divers":"Château de Lemot  à Cugnand","gps":"","images":["../image/image_85/85_Cugnand_Lemot_1.jpg","../image/image_85/85_Cugnand_Lemot_2.jpg"]},"Consult_chateau_formulaire363e":{"id":"Consult_chateau_formulaire363e","dept":"85","canton":"Roche sur Yon","commune":"Dompierre sur Yon","nom":"Dompierre_Yon","type":"Château","periode":"XIX","histoire":"DOMPIERRE sur YON, on ne manquera pas de visiter le pont de Pierre Plate composé de trois mégalithes de schiste, l'ancienne cure datant de 1628 et dernier vestige du prieuré, les logis de l'Eraudière du XVe siècle et de Beaumanoir du XVIIe siècle, mais aussi les châteaux du Rortheau de1844 et de la Braconnière, fin du Moyen-Age, la fontaine de Margerie célébrée par le poète Menanteau ou encore la stèle du Maquis  au bois des Gâts, haut lieu de la Résistance intérieure française lors de la Seconde Guerre mondiale.  C'est la présence de cette forêt qui explique l'installation de maîtres verriers à Rortheau entre le XVe et XVIIIe siècles. Le village se développe doucement jusqu'au XXe siècle. La fin du XXe siècle et le début du siècle actuel sont marqués par une croissance du nombre d'habitants du fait de sa proximité avec La Roche-sur-Yon et de la construction de nouveaux lotissements au centre du bourg.","architecture":"DOMPIERRE,RORTHEAU, c'est la présence de cette forêt qui explique l'installation de maîtres verriers à Rortheau entre le XVe et XVIIIe siècles.  le château de plan rectangulaire à deux niveaux accolé sur la partie droite d'un pavillon carré trois niveaux  avec échauguettes sur encorbellement toit en poivrière. Pavillon d'entrée  de plan carré saillant à trois niveaux également.  Le village se développe doucement jusqu'au XXe siècle. La fin du XXe siècle et le début du siècle actuel sont marqués par une croissance du nombre d'habitants du fait de sa proximité avec La Roche-sur-Yon et de la construction de nouveaux lotissements au centre du bourg.                                                        GATS de plan  rectangulaire à deux niveaux  pavillon saillants  et tourelle  en angle sur  façade toit en poivrière.","habitants":"Famille de Rotheau\r\n        \"","divers":"Château de Rotheau à Dompierre sur Yon","gps":"","images":["../image/image_85/85_Dompierre_Yon_1.jpg","../image/image_85/85_Dompierre_Yon_2.jpg","../image/image_85/85_Dompierre_Yon_3.jpg","../image/image_85/85_Dompierre_Yon_4.jpg","../image/image_85/85_Dompierre_Yon_5.jpg"]},"Consult_chateau_formulaireb004":{"id":"Consult_chateau_formulaireb004","dept":"85","canton":"Fontenay le cComte","commune":"la Flocellière","nom":"Donjon_Chateaumur","type":"Forteresse","periode":"XIV-","histoire":"Trois châteaux à la Flocellière celui de l'Echardière,  le donjon de Châteaumur et la Bergelière.                                                                                         ECHARDIERE, les premiers bâtisseurs du château des Echardières, Louis Bouchet est seigneur des Échardières en 1437 a épousé Guillemette Chevalier. Aymery Girard épouse Anne de La Brosse, dame des Echardières et de Cul-de-Bray. Figurent des blasons sur la plus petite des vieilles tours dont on ne connaît pas l'explication de la même façon qu'on ne connaît pas ses seigneurs avant Jean Bouchet en 1437. L'un des blasons correspond à celui des Boscher de la Boucherie de Saint André d'Ornay et de la Guyonnière. Il s'agit d'un lambel à quatre branches. Un autre pourrait naturellement être celui des Girard bien que les autres blasons paraissent  à l'arrivée des Girard. Deux autres blasons avec un lion pour l'un, et des trèfles, un pal et un chevron pour l'autre, ressemblent à ceux du cimetière de Saint-Révérend où ils sont associés aux Chasteigner d'Apremont.                                                                              DONJON, le donjon de Châteaumur est un donjon ayant fait partie d'un château fort à l'époque médiévale, sur le territoire de la commune déléguée des Châtelliers-Châteaumur, à Sèvremont. C'est un donjon de style niortais datant du XIIe siècle. Il est du même style que les donjons de Pouzauges, Tiffauges et de même époque. C'est une grosse tour quadrangulaire à contreforts ronds aux quatre coins avec un contrefort plus petit au milieu de chaque façade.","architecture":"DONJON, au XIIe siècle, était la seule construction en pierre, bâtit sur un promontoire granitique. Une enceinte, de bois ou de pierre, enfermait peut-être le donjon en un terrain quasi circulaire. Ce qui est sûr, ce donjon, à cette époque, a été conçu comme une forteresse indépendante, avec une porte située au deuxième étage et protégée par une porte à bascule qui semboîtait dans le mur et l'encadrement de la porte. L'intérieur était divisé en deux par un mur de refend pour la solidité, et il y avait quatre niveaux: un sous-sol et trois étages sur planchers. Au rez-de-chaussée étaient stockés les vivres, au premier étage se trouvait le logis seigneurial (et la porte à bascule) avec cheminées et latrines et le deuxième étage comportait probablement une salle de garde avec accès aux hourds. Ce dernier étage était accessible du premier étage par un escalier à vis noyé dans le contrefort sud-est. Peut-être au XIVe siècle, une enceinte est ajoutée en pleine guerre de Cent Ans. Elle est encore partiellement visible, car les maisons autour de la place du donjon y sont adossées, et subsiste une porte charretière fortifiée.                                                                                                                    L'ECHARDIERE, de plan rectangulaire à deux niveaux coupait au centre par un pavillon saillant sur cour accolé de deux tours rondes au niveau de l'entrée et de deux pavillons saillants sur la façade à droite et à gauche toit en croupe.","habitants":"Famille de Louis Bouchet\r\n        \"","divers":"Vestiges de Chateaumur; 46° 50' 46\" N, 0° 49' 57\" O  Grav 1-2 et château de l'Echardière grav 3-4-5-6;   46° 47' 54\" Nord, 0° 51' 59\" Ouest","gps":"","images":["../image/image_85/85_Donjon_Chateaumur_1.jpg","../image/image_85/85_Donjon_Chateaumur_2.jpg","../image/image_85/85_Donjon_Chateaumur_3.jpg","../image/image_85/85_Donjon_Chateaumur_4.jpg","../image/image_85/85_Donjon_Chateaumur_5.jpg","../image/image_85/85_Donjon_Chateaumur_6.jpg"]},"Consult_chateau_formulaire213c":{"id":"Consult_chateau_formulaire213c","dept":"85","canton":"Mortagne-sur-Sèvre","commune":"La Bruffière","nom":"Echasserie","type":"Château","periode":"XV-XVII","histoire":"ECHASSERIE,  est un ancien château fort, datant des XIe et XIIe siècles, la construction date du XVe au XVIIe siècle avant-poste des défenses de Tiffauges, aux limites des marches de Bretagne, marches d'Anjou et marches du Poitou. La famille Sauvage de Cugand, du Pin-Sauvage, en est propriétaire en 1235 et Guillaume Sauvage, fait une donation aux Templiers de la Madeleine (de Clisson) sur ses revenus. La famille Charbonneau, alliée de nobles familles du Poitou, s'y installe en 1250, jusqu'en 1738, où il entre dans la famille Servanteau, armateur aux Sables-d'Olonne. Charles Servanteau, ancien de la garde royale, élu maire de la Bruffière au début de la Révolution, est mis à mort puis enroché (enterré clandestinement, sans cérémonie) par les anti-révolutionnaires de son village, à cause de son comportement équivoque, le 13 mars 1793. Jouant sur les deux tableaux, se disant révolutionnaire, il donnait des informations aux Bleus, tandis que, se faisant passer pour rebelle, il renseignait les Blancs. François Richard de La Vergnes. En 1806, le domaine devient la propriété de Louis Richard de la Vergnes. Son fils, François Richard de La Vergne, 131e archevêque de Paris  en hérite. Son statut de cardinal ne lui permettant pas d'avoir de descendance, la transmission de ses biens se fait par les femmes de la famille : Couespel du Mesnil, de Quatre-barbes et, actuellement, du Rosel de Saint-Germain.","architecture":"ECHASSERIE, le château primitif n'était qu'un donjon de bois protégé par un fossé et entouré d'une palissade, le long de la voie romaine reliant Tiffauges  à Saint-Georges-de-Montaigu, pour parer aux invasions normandes, puis, au XIe siècle, il devient un édifice en pierres,  la construction date du XVe au XVIIe siècle. En octobre 1793, Kléber, menant une expédition punitive le détruit par le feu, ainsi que presque toutes le habitations de La Bruffière situées entre Saint-Symphorien et l'Échasserie. Seule une des tours reste debout. Les éléments protégés aux M.H. sont façades et toitures de la tour carrée, de la tour du guet et de la tour Chandelier du 20/10/1971.","habitants":"Famille Servanteau,\r\n        \"","divers":"A la Buffière le château de l'Echasserie; 46° 59' 22,32\" Nord, 1° 08' 53,66\" Ouest","gps":"","images":["../image/image_85/85_Echasserie_1.jpg","../image/image_85/85_Echasserie_2.jpg","../image/image_85/85_Echasserie_3.jpg","../image/image_85/85_Echasserie_4.jpg","../image/image_85/85_Echasserie_5.jpg","../image/image_85/85_Echasserie_6.jpg"]},"Consult_chateau_formulaireec0e":{"id":"Consult_chateau_formulaireec0e","dept":"85","canton":"Chantonnay","commune":"Les Essarts","nom":"Essarts_Fort","type":"Vestiges","periode":"XI-XV","histoire":"LE FORT des ESSARTS, dit de la Merlatière, au XIIe siècle, devenu propriété de la famille de Thouars, voit s'élever d'imposantes constructions de pierre avec des remparts, flanquée de six tours semi-circulaires, la tour Sarrasine et la Poterne, témoigneront longtemps de cette belle époque des chevaliers. La pierre murmure toujours le nom de ces familles qui ont marqué son Histoire : de 1300 de Lespinay, Chabots, Vivonne, de Rougé. Rochefort,: les Penthièvre passe en 1437 à la famille de Brosse  qui le garderont jusqu'en 1564 jean IV de Brosse mort sans héritier  le domaine passe à son neveu Sébastien de Luxembourg époux de Marie de Beaucaire  qui fit construire le logis Renaissance, leur fille Marie en 1576  apporte le château en dot à Philippe de Lorraine, duc de Mercoeur, et leur petit-fille  en 1609 Françoise le transmet  à César de Vendome fils légitimé d'Henri IV, passé par alliance à la famille de Savoie et ensuite vendu en 1716 à Joseph-Marie de Lascaris marquis d'Urfè cédé  en 1787 au marquis de l'Espinay. A la Révolution victime d'un incendie et vers la moitié du XIXe siècle le baron de l'Espinay décide de faire édifier un nouvel édifice à l'Est des vestiges un logis Renaissance qui entrera en 1869 par alliance dans la famille de Rougé. Les descendants des Famille de Lespinay et de Rougé possèdent toujours le Vieux Château.                                                                                                                   GUEYT, château moderne de la famille Guyet grande famille depuis le XVIe siècle.","architecture":"ESSARTS , le premier château fort des Essarts (un simple donjon en bois) fut construit sur une butte à l'époque féodale. À partir du XIIIe siècle, les Seigneurs des lieux firent bâtir un château en pierre. Pendant les guerres de Vendée, (1793-1796) le château fut en partie détruit. Subsistent encore aujourd'hui les ouvertures, la fenêtre à Meneau, la cheminée, la colonne d'escalier évoquant toute la richesse architecturale qui l'orna deux siècles durant.  Le château médiéval date en grande partie du XIIe siècle, des transformations ont été faites vers les XIVe et XVe siècles au niveau des couronnements, probablement des rajouts de mâchicoulis et des échauguettes. Cest après quaurait été construit ce château de plan presque pentagonal, flanqué de tours carrées dont la tour Sarazine faisait office de donjon. Un châtelet dentrée remarquable est visible, il est formé de deux tours en fer à cheval accolées à une tour carrée, et deux pont-levis existaient : un charretier et un piétonnier. Un autre châtelet dentrée existait à lopposé de lenceinte, qui a été transformé en dépendance au logis seigneurial construit entre le XIIIe et le XIVe siècle. Dautres corps de bâtiments étaient adossés dans la cour. Au XVe siècle, deux tours de garde aux ouvertures canonnières encadrent le portail d'entrée. Porte cavalière et porte piétonnière ont perdu leur pont-levis.    \r\nGUEYT de plan en T à deux niveaux toit en croupes, trois niveaux pour le bâtiment donjon.","habitants":"Famille de Thouars\r\n        \"","divers":"Fort et vestiges des Essarts; 46° 46' 35,4\" Nord, 1° 13' 15,6\" Ouest château Gueyt grav 8-9","gps":"","images":["../image/image_85/85_Essarts_Fort_1.jpg","../image/image_85/85_Essarts_Fort_2.jpg","../image/image_85/85_Essarts_Fort_3.jpg","../image/image_85/85_Essarts_Fort_4.jpg","../image/image_85/85_Essarts_Fort_5.jpg","../image/image_85/85_Essarts_Fort_6.jpg","../image/image_85/85_Essarts_Fort_7.jpg","../image/image_85/85_Essarts_Fort_8.jpg","../image/image_85/85_Essarts_Fort_9.jpg"]},"Consult_chateau_formulairea975":{"id":"Consult_chateau_formulairea975","dept":"85","canton":"Fontenay le comte","commune":"Faymoreau","nom":"Faymoreau","type":"Château","periode":"XIV","histoire":"FAYMOREAU, au XIIe siècle, fief de Faymoreau a été possédé depuis par les familles du Puy-du-Fou du XIVe et XVIIe siècles, Grignon du XVIIe siècle, Panou de Faymoreau du XVIIIe et XIXe siècles Jacques Louis Panou, chevalier seigneur; conseiller du roi et maître ordinaire en sa chambre des comptes de Bretagne\r\nNé à Faymoreau, le 30 avril 1751 , chevalier de Saint-Louis, le 23 mai 1825. Marié le 27 avril 1773 à Nantes, paroisse Sainte-Croix, avec Marie-Adrienne Deurbroucq, décédé en son château de Faymoreau, le 29 juin 1832, à l'âge de 81 ans.  Jacques-Dominique Armand né à Nantes, le 9 février 1774, cadet gentilhomme au régiment de Rohan-Soubise, fit partie de l'expédition de Quiberon dans le régiment d'Hervilly, en qualité d'officier, fut tué le 21 juillet 1795 au fort Penthièvre. Jacques-Marie-Joseph né à Nantes,  le 10 mai 1776  servait dans le régiment d'Hervilly en qualité de sergent, fit partie de l'expédition de Quiberon, fut fait prisonnier le 21 juillet 1795 au fort Penthièvre, et fusillé avec ses compagnons d'infortune. Panou Deurbroucq Joseph, de Nantes. Déclare être âgé de 18 ans.  A quitté la France en 1790, emmené par son père à Bruxelles. Ce vieillard respectable qui a eu l'honneur de servir à l'armée des Princes et d'y faire trois campagnes, qui a eu la douleur de voir succomber à Quiberon ses deux fils qui feraient aujourd'hui le charme de ses vieux jours, n'a jamais sollicité, depuis la restauration, que la croix de Saint-Louis, cette récompense vient enfin de lui être accordée à l'occasion des fêtes du Sacre.","architecture":"FAYMOREAU, l'ancien seigneur de Faymoreau, après avoir éprouvé toutes les spoliations de 1793, encore plongé dans les misères de l'exil, eut le bonheur de se lier d'amitié avec MM. Moller, Hellerman et Bolle, banquiers à Hambourg ; c'est à ces généreux amis qu'il a dû, plus tard,le bonheur de rentrer dans le manoir de ses pères où il a fait ériger une colonne qui perpétuera le souvenir de la noble action de ses bienfaiteurs. On ne saurait trop publier les faits qui honorent l'humanité à cette désastreuse époque de notre histoire.  L'édifice de plan rectangulaire le corps de logis central à deux niveaux sur soubassement et lucarnes sur combles pavillon d'entée saillant toit à l'impérial  et pavillons rectangulaires aux extrémité de trois niveaux toit en croupes, le bâtiment est prolongé à gauche par des dépendances oblongs.\r\nL'édifice des mines transformé en hôtel.","habitants":"Famille de  Jacques-Marie-Joseph, \r\n        \"","divers":"Faymoreau grav 1-2-3  hotel des mines grav 4","gps":"","images":["../image/image_85/85_Faymoreau_1.jpg","../image/image_85/85_Faymoreau_2.jpg","../image/image_85/85_Faymoreau_3.jpg","../image/image_85/85_Faymoreau_4.jpg"]},"Consult_chateau_formulairecc93":{"id":"Consult_chateau_formulairecc93","dept":"85","canton":"Chantonnay","commune":"Le Boupere","nom":"Fief_Milon","type":"Château","periode":"XIV-XIX","histoire":"FIEF-MILON, en 2005, le Château du Fief-Milon a été inscrit en totalité à linventaire supplémentaire des M.H. A été racheté par la famille de Monti de Rezé qui le possède encore de nos jours.","architecture":"FIEF-MILON, construit au XIVe siècle, le château-fort faisait partie du système de défense de Pouzauges. Sa position élevée lui donnait le rôle d'une tour de guet et offrait un panorama exceptionnel sur les monts Gâtine qui dominent le haut bocage Vendéen, Saint-Michel-Mont-Mercure et Le Boupère. Cette position élevée sexplique par sa fonction première : défendre Pouzauges contre les Anglais pendant la guerre de Cent Ans. La charpente des communs est faite de poinçons sculptés et contrefiches courbes. Elle est datée entre 1585 et 1610. Au début du XIXe siècle, le château médiéval (un corps central flanqué de deux grosses tours circulaires) subit des changements, à la manière de Viollet-Le-Duc : on a donné aux deux tours une allure « fortifiée » en les couronnant par un faux mâchicoulis avec un crénelage en briques. En 1861, de nouveaux bâtiments furent édifiés reliant le château à lensemble des communs.","habitants":"Famille de Monti de Rezé \r\n        \"","divers":"A la Boupère le château de Fief Milon; 46° 45' 53\" Nord et 0° 53' 54\" Ouest","gps":"","images":["../image/image_85/85_Fief_Milon_1.jpg","../image/image_85/85_Fief_Milon_2.jpg","../image/image_85/85_Fief_Milon_3.jpg","../image/image_85/85_Fief_Milon_4.jpg","../image/image_85/85_Fief_Milon_5.jpg"]},"Consult_chateau_formulairebe67":{"id":"Consult_chateau_formulairebe67","dept":"85","canton":"Les Herbiers","commune":"La Flocellière","nom":"Flocellière","type":"Forteresse","periode":"XIII-XIV-XIX","histoire":"FLOCELLIERE,  au XIe siècle seigneurie des Surgères qui la conserveront jusqu'au XVIe siècle puis échoit par héritage à Jacques de Maillé-Brézé l'époux de la \" belle Ecossaise\" , le château reste aux de Maillé famille de Rochejaquelin jusqu'à la Révolution. En 1794  durant les guerres de Vendée, le château fut incendié  par les colonnes infernales du général Turreau, en 1796 le domaine est acquis par le fils d'un ancien officier des eaux et Forêts Bellamy de Bellefontaine qui s'est illustré pendant les guerres révolutionnaires deviendra général de brigade, entreprend en 1812 la restauration du donjon qui sera poursuivie par son héritière la baronne Alquier et c'est à elle que l'on doit la construction d'un long corps de bâtiment sur l'emplacement de l'ancienne orangerie. Le château passe par alliance au début du XXe siècle à la famille  de Hillerin de Boistissandeau qui le revend à l'évêché de Luçon en 1958 pour y installer un séminaire et en 1979 le vicomte Patrice Vignial acquiert la Flocellière pour en faire un hôtel-restaurant.                                                             BERGELIERE, Demeure de la famille La Laurencie, en saison, La Bergelière vous accueille en chambres doubles ou suites familiales au confort moderne, en formule chambre d'hôtes ou location saisonnière.","architecture":"FLOCELLIERE, le château est un des plus anciens. Seigneurie remontant au XIe siècle. Ses origines connues remontent au XIIe siècle, il a toujours été habité depuis cette époque. Il se trouve au milieu d'un paysage de bois, de collines et d'étangs, en bordure du bourg, dans le calme d'un vaste parc.  Augmentation du château au début du XIIIe siècle. Agrandissement du donjon à la fin du XIVe siècle. Pendant les guerres de Religion, le château est pris par les troupes du duc de Mercoeur et les défenses renforcées. Durant les guerres de Vendée, le château de la Flocellière est pris et incendié par les colonnes infernales. En 1881-1882, le baron Alquier fait restaurer et transformer le château par l'architecte Arsène Charrier. Château moderne entre deux tours de l'ancien château, relié au donjon par une galerie néo-gothique. Aujourdhui la Flocellière est composée de six tours formant un vaste quadrilatère, au centre duquel sérige un donjon du XIIIe siècle.                                                                            BERGELIERE au coeur du bocage  est un havre de paix. Son parc arboré, son jardin-terrasse à la française et son tennis vous accueillent chaque année de mai à septembre. Il allie lélégance de son style classique à la fonctionnalité despaces modulables. A été construit au XIXe siècle autour dun corps de logis vendéen du XVe siècle et à la place danciennes halles, et entièrement restauré au début des années 2000 après un incendie.","habitants":"Flocellière Famille  de Hillerin de Boistissandeau.            Bergelière famille La Laurencie\r\n        \"","divers":"Flocelière; 46° 50' 06\" nord, 0° 51' 42\" ouest château de Bergelière grav 8","gps":"","images":["../image/image_85/85_Flocelli%c3%a8re_1.jpg","../image/image_85/85_Flocelli%c3%a8re_2.jpg","../image/image_85/85_Flocelli%c3%a8re_3.jpg","../image/image_85/85_Flocelli%c3%a8re_4.jpg","../image/image_85/85_Flocelli%c3%a8re_5.jpg","../image/image_85/85_Flocelli%c3%a8re_6.jpg","../image/image_85/85_Flocelli%c3%a8re_7.jpg","../image/image_85/85_Flocelli%c3%a8re_8.jpg"]},"Consult_chateau_formulaire1bd8":{"id":"Consult_chateau_formulaire1bd8","dept":"85","canton":"Fontenay-le-Comte","commune":"Fontenay le comte","nom":"Fontenay_Comte","type":"Vestiges","periode":"XV-XVII","histoire":"Deux châteaux dans cet article de Fontenay le Comte celui de Baron, de Gaillard, de Sébrandière ( article suivant) et de Mailezais et à 15 km à l'ouest le château de Vergne à  St-Hilaire des loges.                                                                                                         BARON, le parc Baron : sur le site de lancien château fort, quelques vestiges architecturaux subsistent parmi les plantations darbres et les remblais accumulés par le temps. Le château Baron a été bâti de 1878 à 1880 pour Edgar Baron  Les portraits en buste de l'épouse et de deux des filles d'Edgar Baron surmontent la lucarne de la façade principale.  La date 1878 est sculptée sur la lucarne de la façade principale et, d'après les matrices cadastrales, la construction fut terminée en 1880. Il est construit en majeure partie en pierre de taille et couvert en ardoise. L'organisation des volumes et des toitures est très complexe. Le corps de bâtiment principal, couvert d'un toit en pavillon en ardoise, possède deux étages de sous-sol (le premier voûté d'arêtes et le deuxième voûté en berceau), un étage carré et un étage de comble. Il est flanqué d'une tourelle en encorbellement à toit conique en ardoise et de la tour renfermant l'escalier en vis; la pièce au-dessus de l'escalier et le lanternon sont couverts de coupoles. Un corps de bâtiment plus bas, à toit à longs pans à croupe en tuile, est flanqué de deux tours à toit polygonal en ardoise. Les parties semi-circulaires latérales sont couvertes de terrasses. Le bâtiment de commun, flanqué d'un pigeonnier, est construit en moellon et couvert en tuile","architecture":"GAILLARD, cet hôtel est nommé Château-Gaillard, puis Moriceau de Cheusse, du nom de la famille qui le possédait de la fin du XVIIe siècle à la Révolution. L'édifice actuel a été construit entre 1811 et 1816 pour André-Charles Dubois (ou Duboy), ancien receveur particulier des contributions directes à Fontenay, et son épouse Marie-Albertine Bousquet, sur les deux niveaux de sous-sol de la demeure précédente, incendiée en 1795 ; cette demeure était le siège de la seigneurie de Château-Gaillard. En 1811, l'hôtel, en ruine et à l'état de masure, est acquis par Dubois  en 1816, la demeure  reconstruite est revendue  à Nicolas-Quentin Pichard du Page, dont le monogramme PP est visible sur le garde-corps de l'escalier extérieur. La demeure précédente, l'un des principaux hôtels de Fontenay, avait sans doute été édifiée au cours de la deuxième moitié du XVIe siècle pour la famille Le Venyer,  Pierre, propriétaire en de 1580 à  1585. Il subsiste les deux niveaux de sous-sol datant de cette époque ; des pierres sculptées, dont une aux armes des Le Venyer, sont remployées dans le mur du jardin ; enfin, il n'est pas impossible que le motif aux atlantes engainés du portail provienne de cette demeure. Comme on peut l'observer en sous-sol, l'hôtel du XVIe siècle était plus étendu vers le nord que l'hôtel actuel. . Enfin, Château-Gaillard fut la résidence du gouverneur Charles Eschallard de la Boulaye à partir de 1588 et, au moins de 1630 à 1648, celle de l'évêque de Maillezais Henri de Béthune, qui le louait à Jeanne Pougnard, contrairement à la tradition voulant que le prélat est habité au 9 rue Pont-aux-Chèvres.","habitants":"Famille de Moriceau de Cheusse\r\n        \"","divers":"A Fontenay le Comte château  de fontenay grav 1-2-3.    Baron grav 4-5-6 . Gaillard grav 7  : 46° 28' 01\" Nord, 0° 48' 25\" Ouest","gps":"","images":["../image/image_85/85_Fontenay_Comte_1.jpg","../image/image_85/85_Fontenay_Comte_2.jpg","../image/image_85/85_Fontenay_Comte_3.jpg","../image/image_85/85_Fontenay_Comte_4.jpg","../image/image_85/85_Fontenay_Comte_5.jpg","../image/image_85/85_Fontenay_Comte_6.jpg","../image/image_85/85_Fontenay_Comte_7.jpg"]},"Consult_chateau_formulaire98e7":{"id":"Consult_chateau_formulaire98e7","dept":"85","canton":"Fontenay-le-Comte","commune":"Fontenay le Comte","nom":"Fontenay_le_Comte","type":"Château","periode":"XV-XIX","histoire":"Deux châteaux dans cet article de Fontenay le Comte celui de Baron, de Gaillard, de Sébrandière ( article suivant) et le château de Vergne à  St-Hilaire des loges.                                 La TOUR RIVALLAND, date du XIXe siècle.  Ancien officier de marine et franc-maçon , Gustave Rivalland fit construire la Tour en 1880. Sa volonté de défier la flèche de l'église Notre-Dame semble accréditée par la présence de motifs maçonniques et sa position en haut de la ville, face au château de Terre-Neuve. VERGNE pas d'information historique                                                                               HAUTE ROCHE, la tradition veut que le manoir de Haute-Roche ait été construit pour le médecin calviniste François Mizière vers 1571, ce qui n'est pas rigoureusement prouvé. Quant à la datation, elle s'appuie sur l'existence des dates 1567 et 1571 sur une cheminée du premier étage. Or la date 1571 n'est plus visible et l'inscription datée 1567 a été refaite par Emile Boutin en 1943, non d'après l'original mais d'après une gravure: l'inscription déposée, appartenait au XIXe siècle à Octave de Rochebrune qui l'avait gravée, fournissant ainsi un modèle à Boutin.                                                                                                                    VERGNE pas d'information historique","architecture":"HAUTE ROCHE, ce manoir datable de la fin du XVIe siècle, semble avoir été construit en réutilisant partiellement une construction antérieure, comme en témoignent la tour ronde et le mur intérieur attenant. Vers 1943, le manoir fut restauré par l'architecte Emile Boutin pour le menuisier fontenaisien Eugène Fauconnier, auteur du vantail de la porte d'entrée. Boutin restitua les lucarnes en pierre de la partie à droite du pavillon d'escalier, édifia une orangerie, créa une cheminée au premier étage et une balustrade en pierre à la partie supérieure de l'escalier.                                                                                                                               TOUR RIVALLAND,   construite sur un soubassement en pierre de taille, la tour est en béton sur huit niveaux, carrés puis octogonaux. Elle est surmontée d'une cage de Faraday. Des mosaïques représentant des roses, des licornes affrontées, des étoiles à huit branches, des arbustes épineux et des outils de maçon décorent les niveaux inférieurs de la tour, elle est inscrite aux M.H. depuis 1984.                                                                        SEBRANDIERE, a 10 kilomètres a Le Gué-de-Velluire, le château de la Sebrandière est un ancien prieuré complètement réaménagé . Après plusieurs années de restauration le domaine retrouve son charme dantan. Cest aujourdhui une magnifique demeure réhabilitée selon larchitecture de lépoque et agrémentée de tout le confort moderne, qui ouvre ses portes au milieu dun vaste parc entouré de vignes. Le château de la Sebrandière, endroit idéal pour célébrer la réception de votre mariage.                                                                                                             VERGNE, de plan rectangulaire à trois  niveaux avec lucarnes à pinacles sur les travées, avant corps d'entrée, toit à quatre pans, cet ensemble inséré entre  pavillons à droite et à gauche  ces derniers accolés d'une tour ronde donnant vers l'extérieur.","habitants":"Charles Eschallard de la Boulaye\r\n        \"","divers":"Fontenay le Comte; 46° 27' 54\" Nord et 0° 48' 42\" Ouest  grav 1-2-3-chateau de Baron grav-4 de Sebrandière grav-7               Vergne grav-5-6","gps":"","images":["../image/image_85/85_Fontenay_le_Comte_1.jpg","../image/image_85/85_Fontenay_le_Comte_2.jpg","../image/image_85/85_Fontenay_le_Comte_3.jpg","../image/image_85/85_Fontenay_le_Comte_4.jpg","../image/image_85/85_Fontenay_le_Comte_5.jpg","../image/image_85/85_Fontenay_le_Comte_6.jpg","../image/image_85/85_Fontenay_le_Comte_7.jpg","../image/image_85/85_Fontenay_le_Comte_8.jpg"]},"Consult_chateau_formulaire2c98":{"id":"Consult_chateau_formulaire2c98","dept":"85","canton":"Fontenay-le-Comte","commune":"Chaix-Auchay sur vendée","nom":"Foret_Nesdeau","type":"Domaine","periode":"XVIII","histoire":"FORET NESDEAU, construit en 1766, le domaine de la Forêt-Nesdeau se caractérise par le caractère austère de son aspect extérieur, la régularité de sa composition d'ensemble ainsi que par l'homogénéité de ses éléments constitutifs. La Forêt-Nesdeau est également remarquable par la qualité de ses ouvrages de ferronnerie extérieure ainsi que du garde-corps de l'escalier principal. Le domaine se distingue également par la présence d'une fuie à fonction défensive, type de construction manifestement assez rare.","architecture":"FORET-NESDEAU, les façades et toitures du corps de logis principal et des communs autour de la cour fermée ; l'escalier principal ; la chapelle et le pigeonnier-tour en totalité  inscription par arrêté du 25 octobre 2010.","habitants":"Famille de Nesdeau\r\n        \"","divers":"A Chaix-Auchay sur vendée château de Foret-Nesdeau.","gps":"","images":["../image/image_85/85_Foret_Nesdeau_1.jpg","../image/image_85/85_Foret_Nesdeau_2.jpg","../image/image_85/85_Foret_Nesdeau_3.jpg"]},"Consult_chateau_formulairee1a3":{"id":"Consult_chateau_formulairee1a3","dept":"85","canton":"La Châtaigneraie","commune":"La Chapelle Themer","nom":"Fougeroux","type":"Manoir","periode":"XVI-XIX","histoire":"FOUGEROUX, au XIXe siècle, le château est la propriété et la résidence de l'aquafortiste Octave de Rochebrune (qui réalise le décor du salon en 1805 dans le style du Premier Empire).Octave de Rochebrune y habita et laissa son empreinte : une fontaine néo-Renaissance et un pont d'inspiration antique. A voir : une laiterie unique en Vendée.","architecture":"FOUGEROUX, ancien manoir seigneurial remontant au XVIe siècle (vers 1577), reconstruit ou remanié dans la seconde moitié du XVIIIe siècle. Incendié pendant la Révolution, il est reconstruit entre 1802 et 1811, les communs sont rebâtis en 1844, corps de logis de plan rectangulaire à deux niveaux, série de lucarnes sur combles  toit en croupes recouvert de tuiles , deux retours d'équerres de construction réduite en façade formant cour d'honneur et tour rondes aux extrémité.","habitants":"Famille d'Octave de Rochebrune\r\n        \"","divers":"Fougeroux; 46° 34' 12\" Nord et 0° 58' 26\" Ouest","gps":"","images":["../image/image_85/85_Fougeroux_1.jpg"]},"Consult_chateau_formulaire9224":{"id":"Consult_chateau_formulaire9224","dept":"85","canton":"Challans","commune":"La Garnache","nom":"Garnache","type":"Vestiges","periode":"XIII-XV","histoire":"Deux châteaux à Garnache celui de Garnache vestiges  et celui de Fonteclose.                                                                                                               FONTECLOSE, ce fut la demeure de l'un de ses chefs les plus connus de l'insurrection vendéenne; le chevalier François-Athanase Charette de la Contrie. C'est en 1793, dans ce manoir, que Charette, après trois jours de résistance, sétait rendu aux Maraîchins.                                                                                                                         GARNACHE, le château est l'un des plus vieux château de Vendée. Les seigneurs de la Garnache sont liés à l'histoire de toute la région à l'Ile d'Yeu,  Pierre IV de la Garnache fait remanier le château, à la mort en 1204 de Pierre VI dernier héritier, la seigneurie revient à une tante Héloïse de Montaigu puis à sa fille alliée à Hugues de Thouars puis à Pierre  Ier de Mauclerc duc de Bretagne la seigneurie échoit au Thouars-Belleville et au Clisson, en 1407 dans la famille de Rohan qui la conservera jusqu'en 1644 dont en 1588 la propriété est Françoise de Rohan, tante d'Henri de Navarre futur roi de France sous le nom d'Henri IV. Malgré la destruction du château en 1622 la seigneurie  passe de Baronnie en  marquisat  en 1652 par Louis XIV le seigneur nommé est Henri de Guénégaud qui avait racheté la forteresse à Marguerite de Rohan en 1644 et le revend en 1654 à Claude du Chastel. En 1675 passe à Pierre de Gondi duc de Retz. En 1718 revient aux Neuville de Villeroy qui Louis-Anne de Neuville vend  à Claude du Pas à sa mort en 1797 Claude Joseph du Pas lègue les ruines à son cousin Pierre de l'Estourbillon. Au XXe siècle les familles Moussac et Gluard en sont propriétaires. Yann -Rolland de Rengervé  s'en acquiert en 1986 pour visite du château et Jardin.","architecture":"FONTECLOSE, il date du XVe siècle. Il ne reste de cet ancien que ses deux tours, qui sont inscrites aux M.H. depuis le 24/04/1925.  Le manoir de la Vieille-Fonteclose a été construit dans le quatrième quart du XVIIe siècle et fut restauré dans le style néo-Renaissance. \r\nGARNACHE  étant une terre située au croisement de la Bretagne indépendante, du Poitou anglais et du royaume de France tentant d'y rétablir le pouvoir,  une forteresse y fut construite en 1045. Un château fort en pierres fut reconstruit au XIIIe siècle, constitué de six tours rondes et une tour carrée, reliées par des courtines. Une ville fortifiée y a été établie autour, et ces fortifications existaient encore au XVIIe siècle, comme en attestent les plans effectués par Mathieu Mérian et Christophe Tassin.  il ne reste aujourdhui que les vestiges de la tour carrée et de deux tours rondes : la tour du Roi, qui a accueilli Henri IV en 1588, et la tour des Filles. La victoire de Louis XIII dans le marais de Riez en 1662 Sa destruction survient lors du règne de Louis XIII, qui ordonne son démantèlement en 1631 sur les conseils de Richelieu afin de lutter contre de nombreux protestants y habitant.  La construction  date du XVe siècle. Ses deux tours sont inscrites aux M.H. depuis 1925 et sont en ruines. Il est privé.","habitants":"Famille de Rohan\r\n        \"","divers":"Vestiges à  Garnache  : 46° 53' 18,6\" Nord 1° 50' 2,04\" Ouest.  Fonteclose grav 6-7-8","gps":"","images":["../image/image_85/85_Garnache_1.jpg","../image/image_85/85_Garnache_2.jpg","../image/image_85/85_Garnache_3.jpg","../image/image_85/85_Garnache_4.jpg","../image/image_85/85_Garnache_5.jpg","../image/image_85/85_Garnache_6.jpg","../image/image_85/85_Garnache_7.jpg","../image/image_85/85_Garnache_8.jpg"]},"Consult_chateau_formulaire60b9":{"id":"Consult_chateau_formulaire60b9","dept":"85","canton":"Mortagne-sur-Sèvre","commune":"La Gaubretière","nom":"Gaubretière","type":"Château","periode":"XVIII","histoire":"A la Gaubretière, le château  de Landebaudière, de  Sourdis du XVIIIe siècle, de Vergnaie, des Tourelles et de Ramberge du XVIII siècle, mis à part la Landebaudière pas d'information pour les autres.                                                                                       LANDEBAUDIERE, au milieu d'un grand parc arboré se dresse le château de Landebaudière, construit en 1780 par Pierre-Prosper de Boisy. En 1793, lors du soulèvement vendéen, c'est d'ici que sont partis les soldats-paysans avec le marquis de Boisy. Après la mort de Madame de Boisy le château fut vendu en 1824 au comte Auguste de la Rochejaquelein. A partir de 1831 les nobles organisaient des réunions afin de préparer une nouvelle insurrection contre Louis Philippe. La plus importante eut lieu ici, à l'initiative de la comtesse de La Rochejaquelein. A la suite de ce complot, l'édifice fut perquisitionné de nombreuses fois et lourdement endommagé. A partir de 1860, différents propriétaires occupèrent la bâtisse, à la suite de vente ou héritage. Les derniers furent la famille Rampillon des Magnils. Le château devint propriété de la commune en 1979. Une grande salle ouverte sur le parc du château accueille tous les jours de l'année des réceptions, spectacles et conférences.","architecture":"LANDEBAUDIERE, date du XVIIIe siècle. Charles Sapinaud de La Rairie, né le 30 décembre 1760 à La Gaubretière et, mort le 12 août 1829. La Gaubretière est une vieille cité habitée depuis des temps fort éloignés. Quelques vestiges signalent la trace de l'homme depuis les temps préhistoriques (Roche Bouc, Pierre levée) et l'époque gallo-romaine (Pont Romain). La Gaubretière, dont le curé était seigneur châtelain, dépendait à l'époque féodale de l'important vicomté de Tiffauges. Quelques bâtisses bien conservées restent les témoins du Moyen Âge pour notre cité (château du Vieux Landebaudière, manoir de la Soudelache).","habitants":"Famille de Charles Sapinaud\r\n        \"","divers":"A la Gaubretière  château de Landebaudière; 6° 56' 47\" nord, 1° 04' 16\" ouest grav-1. des Tourelles-2 de Pierre Levée grav -3. de Ramberge grav-4.  de Sourdy grav-5. de Vergnaie grav-6.","gps":"","images":["../image/image_85/85_Gaubreti%c3%a8re_1.jpg","../image/image_85/85_Gaubreti%c3%a8re_2.jpg","../image/image_85/85_Gaubreti%c3%a8re_3.jpg","../image/image_85/85_Gaubreti%c3%a8re_4.jpg","../image/image_85/85_Gaubreti%c3%a8re_5.jpg","../image/image_85/85_Gaubreti%c3%a8re_6.jpg"]},"Consult_chateau_formulaire3673":{"id":"Consult_chateau_formulaire3673","dept":"85","canton":"La Châtaigneraie","commune":"Sérigné","nom":"Girardie","type":"Château","periode":"XVI","histoire":"GIRARDIE, ce serait François Girard et Anne Bigot qui édifièrent la Girardie à la fin du XVIe siècle. Louis Bigot de la Girardie épouse au début du XVIe siécIe Catherine Grignon, riche héritière du château de la Mesnardière. Leur fils François épouse une La Brunetière du Puy Papin. Chevalier de l'Ordre du Roi, personnage important, il meurt en 1574 au siège de la Forêt-sur-Sèvre. On raconte que le meurtrier était son gendre, René Bastard de la Cressonnière, protestant et donc de l'autre bord, les Bigot étaient catholiques, et pressé d'hériter. Charlotte Bigot avait épousé le seigneur de la Cressonnière, et sa sur Anne épouse celui des Échardières, François Girard. Elles réunissaient quatre des plus belles demeures du Bas-Poitou, La Mesnardière, la Cressonnière, les Échardières et la Girardie. Situé à la sortie du village le château de la Girardie, édifié sur des fondations plus anciennes, porte la devise suivante \"Qui rit et rapporte de ceste mayson luy defant-on la porte\". Face au château un magnifique chêne, dont le tronc approche les huit mètres de circonférence, daterait du XVe siècle.","architecture":"GIRARDIE, construction du château date de 1593. C'est un château qui fut remanié en 1993. En contrebas du village, vers Sainte-Radegonde, le château de la Girardie est un des monuments du Moyen-Age les mieux conservés, dans la région. Il est doté de nombreux aménagements remarquables dont la grande salle du bâtiment maître, une enceinte et un plan d'eau dans un site paysager peu dénaturé. Le château de la Girardie est inscrit en 1988 et classé en 1993 aux M.H,  est privé.","habitants":"Famille de Louis Bigot de la Girardie\r\n        \"","divers":"Girardie; 46° 30' 46\" Nord et 0° 50' 54\" Ouest","gps":"","images":["../image/image_85/85_Girardie_1.jpg","../image/image_85/85_Girardie_2.jpg","../image/image_85/85_Girardie_3.jpg"]},"Consult_chateau_formulairef452":{"id":"Consult_chateau_formulairef452","dept":"85","canton":"La Châtaigneraie","commune":"Loge-Fougereuse","nom":"Goujonnerie","type":"Château","periode":"XIX","histoire":"GOUJONNERIE, le vicomte de Thouars créa le 2 mars 1546 la baronnie de Loge-Fougereuse qui comprenait alors les paroisses de Loge Fougereuse, Breuil Barret, La Tardière, Réaumur, Mouilleron en Pareds, La chapelle aux Lys, Saint-Maurice des Noues, Chantemerle et les Moutiers sous Chantemerle. Cette baronnie disparut en 1793. L'un de ses maîtres, François d'Appelvoisin, fut chambellan de François 1er. En 1648, il est signalé l'existence d'une \"maladrerie\", hôpital fondé par les largesses seigneuriales et donnant l'asile gratuitement aux malades pauvres de la région, détruit à la Révolution. Le château de la Goujonnerie a été édifié au XIXe siècle par l'architecte Arsène Charrier vers 1872, ses propriétaires M. et Mme Brisson employaient et recueillaient de nombreuses personnes sous leur toit.","architecture":"GOUJONNERIE,  maison familiale  de plan rectangulaire sur soubassement  à deux niveaux avec série de lucarnes sur combles toit en croupe se terminant par un plat, et quatre tourelles sur encorbellement aux angles.","habitants":"Famille de M. et Mme Brisson \r\n        \"","divers":"A la Chataigneraie le château de la Goujonnerie.","gps":"","images":["../image/image_85/85_Goujonnerie_1.jpg","../image/image_85/85_Goujonnerie_2.jpg","../image/image_85/85_Goujonnerie_3.jpg","../image/image_85/85_Goujonnerie_4.jpg"]},"Consult_chateau_formulaire53f5":{"id":"Consult_chateau_formulaire53f5","dept":"85","canton":"Talmont saint-Hilaire","commune":"Talmont saint-Hilaire","nom":"Grange_Cathus","type":"Château","periode":"XVI","histoire":"GRANGES-CATHUS, construit en 1520-1525  par Jean Cathus fils de Louis  Cathus  capitaine du château de Talmont. Jean épouse Marie du Vergier. Veuf , il convole en 1531 avec Marie de Nuchèze veuve d'Antine de Fouilloux. En 1533-1558 campagne de transformations due à Gabriel Ier de Foucault et à son épouse  née Villelume. Les terres de Saint-Germain sont transformé en marquisat, en 1768 le château est vendu par la dernière des Foucault à Nicolas Doublet de Persan.  Le château passera à la famille Baraud de Rivière, puis à l'amiral  de Vaugiraud de Rosnay qui s'illustra pendant les guerres de l'indépendane des Etats-Unis  émigré à la Révolution mais le château n'est pas vendu comme bien national, il sera acquit au début du XIXe siècle par la famille Landois, longtemps habité par  Léon Audé secrétaire général de la Vendée jusqu'en 1864 décéda au Granges en 1870, il sera acquis par le comte Gabriel de Las Cases et depuis il appartient à la famille Rochetulon.","architecture":"GRANGES-CATHUS, en 1190, une maîtresse-tour est construite avec un escalier en vis. Au XIIe siècle, construction d'une enceinte intérieure; creusement d'un fossé pour isoler le château de la haute ville ; les accès sont assurés par un pont-levis défendu par un châtelet de deux tourelles. Au XIVe siècle, construction du grand logis, du moulin à eau et du châtelet de la Mothée et agrandissement du donjon. Au XVIe siècle construction des petits éperons, de la tenaille et de la chaussée barrant le cours du Payré. En 1628, la forteresse est démantelée. le nouveau château est composé d'un corps central sur lequel est flanqué une aile en équerre d'une tour abritant un escalier à l'angle des deux bâtiments et d'une tour cylindrique jouxtant à l'Est de la façade nord  du corps principal. Surélevé d'un étage et coiffé d'un comble élevé, le corps de logis a été agrémenté de grandes lucarnes passantes  sommées de fronton ouvragés avec pinacles, les canonnières ouvertes dans la tour d'escalier ont été supprimées, des éléments décoratifs ont été déplacés, et l'aile ouest est venue remplacer un bâtiment du XVIIIe siècle. Resté intact  la porte de la tour d'escalier constitue à elle seule un chef-d'oeuvre.","habitants":"Famille de Gabriel I de Foucault \r\n        \"","divers":"A Talmont-St-Hilaire Grange_Cathus; 46° 28' 29\" nord, 1° 36' 03\" ouest","gps":"","images":["../image/image_85/85_Grange_Cathus_1.jpg","../image/image_85/85_Grange_Cathus_2.jpg","../image/image_85/85_Grange_Cathus_3.jpg","../image/image_85/85_Grange_Cathus_4.jpg","../image/image_85/85_Grange_Cathus_5.jpg","../image/image_85/85_Grange_Cathus_6.jpg"]},"Consult_chateau_formulairec8e0":{"id":"Consult_chateau_formulairec8e0","dept":"85","canton":"Chantonnay","commune":"Saint-Martin-des-Noyers","nom":"Grève","type":"Maison-Forte","periode":"XV-XVI","histoire":"La GREVE, est lune des vingt baronnies qui relevaient à la foi et à l'hommage du duché de Thouars où elle avait droit de haute justice. L'édifice est mentionné dans les écrits dès le XIIe siècle, époque à laquelle Agnès, dame de la Rocheservière et de la Grève épouse Sébrand Ier Chabot, passant ainsi et pour plus de trois cents ans dans les mains de cette famille.  René de Chabot dernier de cet branche sans postérité le domaine revient à ses tantes  Catherine et Jeanne épouses successivement  en 1446 Charles de Chastillon et Jean de Chambes passe dans la famille Chastillon  et aux Chambes. Le château de la Grève est alors consolidé et rendu plus habitable. Pendant les guerres de religion, l'édifice passe sans cesse des mains des catholiques à celles des protestants. Ce fut alors lapogée de son histoire. En 1599, il fut vendu à Pierre Durcot qui le répara. Aux XVIIe siècle passe par héritage aux Monbourcher aux Franquetot de Coigny et enfin aux Colbert et en 1805 acquis par Jacques Batiot, il perd son rôle militaire puis celui de résidence seigneuriale et se transforme en centre agricole. En 1805, il fut racheté par les Batiot, propriétaires terriens, qui laménagèrent et le transformèrent en ferme, ce quil fut jusquau milieu du XXe siècle. Après les Batiot les Gauveau, les Guitton en 1970 dont  le délabrement est avancé et en 1985 vaste campagne de restauration.","architecture":"La GREVE, sa construction date du XVe et XVIe siècle. Le château de la Grève a été construit au centre dun triangle où siégeaient à lépoque de puissantes forteresses : les châteaux forts des Essarts, Bournezeau et la Chaize le Vicomte. Le château servait alors de relais entre ces points forts. De nombreux vestiges témoignent encore du rôle de place forte,  des douves profondes, un pont-levis  mène à une double porte commandée par deux tourelles débouchant sur une basse cour rectangulaire et de nouvelles douves à franchir par un pont à deux arches prolongé par un second pont-levis. Le rempart crénelé qui s'élève à cet endroit défendu par  des tours rondes de défense percées de meurtrières et de trous à mousquets, une seconde cour rectangulaire dont chaque angle accueil une tour flanquant les murs de défense, sur la façade nord un autre corps de bâtiment réservé aux troupes. Un escalier dans la tour hexagonale au centre de la façade avec des fenêtres à coursiéges. Aujourd'hui des douves sont comblées, certaines tours abattues les deux pont levis supprimés. Il a été inscrit aux M.H. depuis le 8/10/1984, privé, fermé au public.","habitants":"Famille de Charles de Chastillon \r\n        \"","divers":"A   Saint-Martin-des-Noyers le château Grève: 46° 42' 56,88\" Nord, 1° 12' 38,16\" Ouest","gps":"","images":["../image/image_85/85_Gr%c3%a8ve_1.jpg","../image/image_85/85_Gr%c3%a8ve_2.jpg","../image/image_85/85_Gr%c3%a8ve_3.jpg","../image/image_85/85_Gr%c3%a8ve_4.jpg","../image/image_85/85_Gr%c3%a8ve_5.jpg","../image/image_85/85_Gr%c3%a8ve_6.jpg","../image/image_85/85_Gr%c3%a8ve_7.jpg","../image/image_85/85_Gr%c3%a8ve_8.jpg","../image/image_85/85_Gr%c3%a8ve_9.jpg"]},"Consult_chateau_formulaireea01":{"id":"Consult_chateau_formulaireea01","dept":"85","canton":"Talmont-Saint-Hilaire","commune":"Avrillé","nom":"Guignardière","type":"Château","periode":"XVII-XIX","histoire":"GUIGNARDIERE, en 1563, Jean Girard est assassiné et le chantier gigantesque est abandonné, donnant la silhouette actuelle de cette demeure inachevée. Au XVIIIe siècle, un grand étang est creusé et dallé, le comte Sylvestre du Chaffault participe à la reconstruction du château. Mais le Comte, royaliste, recherché après larrestation de Louis XVI, doit émigrer. A son retour dexil les républicains ont pillé le château et fusillé ses enfants. Au début du XIXe siècle, le marquis de Saint-Denis, passionné dagriculture, développe le domaine, son successeur Henri Luce de Trémont songera aussi à terminer le château.  En 1920, Georges Clémenceau, originaire de Mouilleron en Pareds, loue \" la bicoque \" à Saint-Vincent sur Jard, propriété du château de la Guignardière. Amédée Luce de Trémont, alors propriétaire, honorée de recevoir \"le Père la Victoire\", rédige un bail qui stipule que le loyer sera versé à une famille nécessiteuse. Face à l'allée Renaissance, situé dans la partie  du XVIIe siècle du château, le salon, habillé de boiseries Louis XVI, s'organise autour du billard, sous le regard du marquis de Puységur, maréchal de France.","architecture":"GUIGNARDIERE, de style Renaissance, le corps de logis inachevé, est flanqué d'un grand pavillon daté de 1560 annonçant le classicisme, la fenêtre garnie de pilastres à chapiteaux ioniques et surmontée d'un fronton orné de ses armoiries date de 1773. Son successeur Henri Luce de Trémont songera aussi à terminer le château et organisé un parc à l'anglaise, mais il ne fera que déplacer le perron, au centre du logis sur la façade. Le château de la Guignardière est aujourd'hui le siège de nombreuses animations, dont le parcours de jeux-énigmes « Le château des aventuriers ». Le château de la Guignardière est classé aux M.H. depuis 1978.","habitants":"le Comte Sylvestre du Chaffault \r\n        \"","divers":"A Avrillé le château de la Guignardière; 46° 28' 29\" Nord et 1° 30' 33\" Ouest","gps":"","images":["../image/image_85/85_Guignardi%c3%a8re_1.jpg","../image/image_85/85_Guignardi%c3%a8re_2.jpg","../image/image_85/85_Guignardi%c3%a8re_3.jpg","../image/image_85/85_Guignardi%c3%a8re_4.jpg","../image/image_85/85_Guignardi%c3%a8re_5.jpg"]},"Consult_chateau_formulaire3009":{"id":"Consult_chateau_formulaire3009","dept":"85","canton":"Montaigu","commune":"Butière","nom":"Guyonnière_Butière","type":"Château","periode":"XVIII","histoire":"GUYONNIERE, le site de Melay,  ses plus anciens seigneurs connus furent les Marin. Ce nom subsiste dans celui de la toute proche métairie des  Marin. Les Marin figuraient sur les bans et arrière-bans du Poitou, entre autres sur ceux convoqués en 1467. La terre de Meslay passa au début du XVIe siècle, par mariage, aux Gastinaire, seigneurs de la Preuille, en Saint-Hilaire-de-Loulay, puis à la fin du XVIIe siècle, par alliance, dans la famille Du Trehant, seigneur du Hallay, à Boufféré. Après dautres propriétaires, denviron 1740 jusque vers 1770, Charles De La Roche Saint-André, de la branche cadette des Ganuchères, à Treize-Septiers, se qualifia, à son tour, seigneur de Melay-de-la-Court avant que le fief devienne la propriété de lamiral Du Chaffault, son beau-frère. Celui-ci apprit lincendie de son « château » de Meslay lors de sa détention à Nantes, avant de mourir en 1794.                                                                                                  ROCHE THEVENIN, cette ancienne baronnie dès 1411. Avant 1515, ce fief s'appelait la Roche-Brisard, du nom de ses anciens seigneurs. Il reçut son nom actuel lors de son acquisition par les Thévenin qui sy succédèrent jusquau XVIIIe siècle. Les restes du château remontent au XVIe siècle. Il fut brûlé lors de la Révolution. Il fut la propriété dans la deuxième moitié du XIXe siècle de Guillaume Grootaers, sculpteur nantais qui y a laissé des uvres.","architecture":"GUYONNIERE, le château de style XVIIIe siècle environ 900 m² est orienté Nord Sud présente un corps de logis principal encadré de pavillons carrées. Ensemble en parfait état aux prestations luxueuses. Jolies dépendances aux abords du château : cour fermée avec logement de gardien, d'ami avec jardin clos de murs, garages, bureaux et salles aménagées. Chapelle. Tour de garde. Bâtiments d'entretien et bâtiment pour les animaux. Superbe parc de 42 hectares dont : parc clos de murs avec le château et les dépendances, l'édifice de plan rectangulaire à deux niveaux  sur soubassement et lucarnes sur combles toits en croupes, flanqué de droite et gauche de pavillons carrées de un niveau toit en croupes recouvert de tuiles.                                                                                       ROCHES-THEVENIN, corps de logis rectangulaire à deux niveaux toit en croupe  dans une cour avec deux bâtiment de dépendances.  date du XVI au XIXe siècle. Le logis de la Roche-Thévenin,  est situé au sud de la rivière Asson au sommet dun coteau. On y trouve un chemin de croix de 1855, dans l'église paroissiale, les petites croix qui surmontent chaque tableau ont été faites d'un bois de chêne, provenant de la charpente de l'ancienne église qui portait le millésime de 1646. Le manoir de la Roche-Thevenin est inscrit aux M.H. depuis le 7/12/1992, est privé et fermé au public.","habitants":"Amiral Du Chaffault\r\n        \"","divers":"A Butière le château  de la Guyonnière grav 1. de la Roche-Thevenin; 46° 58' 9,09\" Nord, 1° 16' 5,14\" Ouest grav-2","gps":"","images":["../image/image_85/85_Guyonni%c3%a8re_Buti%c3%a8re_1.jpg","../image/image_85/85_Guyonni%c3%a8re_Buti%c3%a8re_2.jpg"]},"Consult_chateau_formulairedfca":{"id":"Consult_chateau_formulairedfca","dept":"85","canton":"Montaigu","commune":"Boufféré","nom":"Hallay","type":"Manoir","periode":"XIX","histoire":"HALLAY, cet authentique château de 1796 bordé de douves, se dresse dans un vaste parc à l'anglaise. La chapelle néo-romane de style byzantin et son orangerie du XIXe siècle sont remarquables. Décoration de style français dans les salons de réception, d'apparat, de compagnie, dans la salle à manger pour les petits déjeuners et dans les chambres élégantes et spacieuses. Noëlle et Philippe Roy, les propriétaires du château, sont des amis,  aujourd'hui chambres d'hôtes","architecture":"HALLAY, les vestiges du château de la Sénardière méritent le détour, tout autant que le château du Hallay ou le logis des Bouillères, en parfait état. Aux confins des bas et hauts bocages vendéens, Boufféré, le château de plan rectangulaire à deux niveaux sur soubassement, pavillons d'entrée saillant à trois travées avec fronton triangulaire remplacé par trois fenêtres. Lucarne sur les côtés latéraux.","habitants":".Noëlle et Philippe Roy\r\n        \"","divers":"Château d'Hallay à Boufféré","gps":"","images":["../image/image_85/85_Hallay_1.jpg","../image/image_85/85_Hallay_2.jpg"]},"Consult_chateau_formulaire518b":{"id":"Consult_chateau_formulaire518b","dept":"85","canton":"Les Herbiers","commune":"Les Herbiers","nom":"Herbiers","type":"Château","periode":"XIV-XVI","histoire":"Château aux Herbiers; Ardelay (voir article) le Bousseau, le manoir de Bignon, de Mondésir et les vestiges de l'Etanduère. Barne et Landreau (article suivant).                                                                                                                 HERBIERS, en décembre 1793, François Athanase Charette de La Contrie est élu, par ses pairs, général en chef des armées du Bas-Poitou au château des Herbiers. La ville décida de racheter le château pour le rénover en 1980.  dit de BOUSSEAU   Il reste peu de choses de l'antique forteresse des Herbiers qui figurait jadis parmi les principales places fortes du pays, çà et là quelques traces d'ouvertures murées sur cette étrange construction, proche de l'église saint Pierre, qui pourrait ressembler à un donjon difforme. Seule une tour carrée, d'allure XIVe siècle, paraît vraiment évocatrice. En effet, son porche à arc plein cintre possède encore ses rainures de herse, l'emplacement d'un assommoir et les feuillures d'une porte à double vantail avec ses trous de barre.                                                     Château des Herbiers appelé aussi le Château BOUSSEAU (du nom de ses anciens propriétaires) est un château bâti à Les Herbiers, dans le département de la Vendée, en région Pays de la Loire, en France. Le château des Herbiers est une ancienne forteresse construite au XIVe siècle.","architecture":"HERBIERS, cette tour écrêtée flanque au sud ouest l'énorme rectangle qui donne à penser à un donjon, à l'intérieur duquel on remarque ici et là quelques emplacements d'archères. Un parchemin de 1420 indique que la fortification vient d'être refaite, car l'ancien, sans doute le bâtiment primitif, avait été détruit par la guerre. Par la suite la forteresse ne sera pas épargnée, d'abord par les guerres de religion au XVIe siècle, puis par l'ordre de démantèlement de Richelieu au XVIIe siècle et incendiée par les colonnes infernales.                                                                                              BIGNON, la construction  date du XVIe au XVIIe siècle. allure résidentielle du XVIe siècle, est composé de bâtiments entourant une cour d'honneur, à la manière des Logis Vendéens. Le pavillon central, cantonné à l'Ouest de 2 tours rondes, et à l'Est de 2 échauguettes sur encorbellement, présente une façade remaniée au XVIIe et, surtout au XIXe siècle, par le sieur Guyet qui a dépecé l'Abbaye de la Grainetière, et dont on retrouve ici quelques réemplois de pierres taillées. L'élégant pavillon qui surmonte le porche d'entrée arbore le blason des Rouhault. Il ne reste plus aucune trace de la 1ère construction défensive du XIVe au XVe, sauf le petit étang, au Nord, qui, faisait fonction de douve en eau, et quelques murs très épais. Un hôte de prestige, à la fin du XVIe siècle vint au manoir de Bignon. Le roi Henri IV, venu guerroyer dans la région, séjourna dans au manoir du Bignon..","habitants":"François Athanase Charette de La Contrie                               Bignon famille de Guyet\r\n        \"","divers":"Château aux Herbiers; Ardelay le Bousseau grav 4, de Mondésir grav-5 et les vestiges de l'Etanduère grav-7-8. Barne et Landreau       Bignon grav-1 : 46° 52' Nord, 1° 01' Ouest","gps":"","images":["../image/image_85/85_Herbiers_1.jpg","../image/image_85/85_Herbiers_2.jpg","../image/image_85/85_Herbiers_3.jpg","../image/image_85/85_Herbiers_4.jpg","../image/image_85/85_Herbiers_5.jpg","../image/image_85/85_Herbiers_6.jpg","../image/image_85/85_Herbiers_7.jpg","../image/image_85/85_Herbiers_8.jpg"]},"Consult_chateau_formulaire6507":{"id":"Consult_chateau_formulaire6507","dept":"85","canton":"Les Herbiers","commune":"Les Herbiers","nom":"Herbiers_Barnes","type":"Château","periode":"XIV","histoire":"BARNES,  de lancienne forteresse des Herbiers, il ne reste quune tour du XIVe siècle. Celle-ci est adossée à un logis plus récent.                                                              LANDREAU, le Landreau a subi les affres du temps. De ses multiples propriétaires, en voici trois. Ils ont marqué les lieux par leurs écrits ou leur caractère. La seigneurie du Landreau nétait à lorigine quun logis. Les premiers écrits indiquant son existence sur les hauteurs des Herbiers remontent au Moyen Âge. Plus exactement à lan 1358. On les retrouve dans un testament rédigé à la demande de Catherine du Puy du Fou. Cette dame souhaitait mettre ses affaires en ordre avant de mourir. Charles Rouault, était un farouche guerrier du XVIe siècle. Lun des seigneurs du Landreau les plus connus est sans doute Charles Rouault. Chevalier de lordre du roi, il était  capitaine de cent chevaux légers , indique Jean Vincent. Peu regardant sur les contradictions, ce personnage intrépide nhésita pas à retourner sa veste en cours de route. Marie-Eugène Jousbert du XVIIIe siècle, surnommé la terreur des Bleus, il es né en 1787, au Landreau. Après avoir bataillé à Leipzig parmi les gardes dhonneur de Napoléon, le « Chevalier du Landreau » rentre en Vendée pour soutenir un mouvement royaliste. En 1850, il rachète le domaine familial du Landreau en ruine. Celui-ci avait été vendu comme bien national après avoir été incendié par les colonnes infernales pendant la Révolution. Actuellement propriété de l'Évêché de Luçon, le château du Landreau, agrandi et aménagé, est devenu Maison du Clergé, Centre de Repos agréé pour les prêtres âgés du diocèse.","architecture":"BARNES,  les murs font 2m dépaisseur à la base et 1,80m au faîte. On peut apercevoir des ouvertures murées, des traces de herses...des détails que livrent ces pierres et qui permettent de mieux les comprendre.Au XVe siècle, le donjon servait de prison.   Au sein d'un cadre bucolique d'exception de parc, bois, verger clos de mur et étang, le château de plus de 1200 m² habitable est agrémenté de nombreux communs en excellent état offrant chapelle, écuries et nombreux logements.                                     LANDREAU    De l'ancien château fortifié, évoqué par les textes du XIVe et du XVIe siècle, il ne reste presque rien : çà et là seulement, dans l'une ou l'autre des tourelles existantes, quelques orifices de canonnières. La Révolution est passée par là, et les propriétaires, qui se sont succéder, ont marqué le lieu de leur empreinte, en adaptant les bâtiments à leurs besoins, en même temps qu'à de nouvelles fonctions. Parc aux essences nombreuses, variées, parfois rares, qu'auraient ramenées de leurs expéditions les seigneurs de l'Etenduère, grands navigateurs du XVIIIe siècle: notamment des cyprès chauves, des magnolia, des tuyas Gigantéas et des maclura. Les sous-bois sont une splendeur au printemps où les couleurs s'enchevêtrent à loisir avec le violet des jacinthes sauvages, l'or des ficaires et des boutons d'or, le mauve léger des géraniums sauvages, et autres légères fleurs blanches d'où émergent de somptueuses digitales.","habitants":"Famille de Catherine du Puy du Fou\r\n        \"","divers":"aux Herbiers le château de Barnes grav 1-2 et de Landreau grav- 4-5 : 46° 52' Nord, 1° 01' Ouest. Bocainsert grav -3","gps":"","images":["../image/image_85/85_Herbiers_Barnes_1.jpg","../image/image_85/85_Herbiers_Barnes_2.jpg","../image/image_85/85_Herbiers_Barnes_3.jpg","../image/image_85/85_Herbiers_Barnes_4.jpg","../image/image_85/85_Herbiers_Barnes_5.jpg"]},"Consult_chateau_formulaired53b":{"id":"Consult_chateau_formulaired53b","dept":"85","canton":"La Châtaigneraie","commune":"L","nom":"Hermenault","type":"Château","periode":"XV-XVIII","histoire":"A Hermenault le château du Gué , de Moulières et  du parc, pas d'information pour ces châteaux.                                                                        HERMENAULT, à lorigine prieuré fortifié dépendant de labbaye de Maillezais situé à quelques lieux de là aux environs de Fontenay-le-Comte, le château de lHermenault est transformé à la Renaissance en résidence dété des évêques, monseigneur d'Estissac y construit un château dont il reste la tour qui porte son nom.  Son secrétaire Rabelais y séjourna et envoya de Rome des plants de platanes.Saccagé pendant les guerres de religion, le château est restauré au XVIIe siècle par le nouvel évêque de La Rochelle Monseigneur de Sully Béthune labbaye ayant été érigée en évêché dès le XIVe siècle. Il est rebâtit au XVIIe par le nouvel évêque, Monseigneur de Sully Béthune avec le concours de larchitecte de la ville de Richelieu, Barthélémy Gilles. Rachetée en 1806 par Pierre Godard des Breuze, colonel d'Empire, la propriété est restée  dans la même famille depuis 1806, le château est légué à Bruno et Nicole Hebert en 1990.","architecture":"HERMENAULT, de l'ancien château fort, il ne reste que la tour qui date de la fin du XVe siècle, à mâchicoulis, ornés de motifs tréflés et flanquée d'une tourelle. Au  XVIIIe siècle monseigneur de Crussol d'Uzès construit le logis des Dames dans le style rochelais pendant que se poursuit l'aménagement du parc.A la Révolution, devenu bien national, la résidence des évêques est racheté par un armateur de La Rochelle, Daniel Garesché, qui fait démolir le château renaissance. De grands travaux sont entrepris, notamment la création dun parc dinspiration italienne, une succession de quatre terrasses talutées de 110 mètres de long reliant la plate-forme du château au parc, surplombent la rivière de la Longèves en contrebas, qui est canalisée. Au-delà, le parc est aménagé avec une grande prairie en hémicycle agrémentée dun miroir deau. Un réseau hydraulique très élaboré est mis en place, le sol marécageux étant drainé et les sources captées.","habitants":"Pierre Godard des Breuze\r\n        \"","divers":"Château à Hermenault; 46° 31' 13\" Nord, 0° 54' 01\" Ouest grav de 2 à 7. du Gué grav-1 . De Moulières grav 2","gps":"","images":["../image/image_85/85_Hermenault_1.jpg","../image/image_85/85_Hermenault_2.jpg","../image/image_85/85_Hermenault_3.jpg","../image/image_85/85_Hermenault_4.jpg","../image/image_85/85_Hermenault_5.jpg","../image/image_85/85_Hermenault_6.jpg","../image/image_85/85_Hermenault_7.jpg"]},"Consult_chateau_formulaire0cc7":{"id":"Consult_chateau_formulaire0cc7","dept":"85","canton":"L","commune":"L","nom":"Ile_d_Yeu","type":"Vestiges","periode":"XIII-XIV","histoire":"ILE D'YEU, dit aussi le Vieux Château, c'est Olivier IV de Clisson, grand bâtisseur de châteaux, qui entreprit en 1330 date à laquelle il épousa  Jeanne de Belleville et fait effectuer les travaux dans le but d'assurer la sécurité des Islais en cas d'invasion étrangère. La plus importante fut celle menée par le célèbre corsaire anglais Robert Knolles, qui réussit en 1355 à s'emparer du château et occupa l'île pendant 37 ans. En 1392, l'île d'Yeu sera reprise aux anglais lors de la reconquête du Poitou par le connétable Olivier V de Clisson. A la Renaissance, Jean V de Rieux fait construire des enceintes bastionnées autour du château.  Dans les années 1970, Maurice Esseul, va entreprendre la fouille puis la restauration du château. Il y tient régulièrement des conférences et organise des visites quotidiennes.","architecture":"ILE D'YEU, à la Renaissance, Jean V de Rieux, Maître de l'île, fera dresser des enceintes bastionnées autour du château. Ces modèles de fortifications furent construits (tels qu'ils se faisaient en leur pays) par des ingénieurs italiens que François Ier avait ramenés avec lui de ses guerres d'Italie. Plus tard, Vauban reprendra, en la perfectionnant, cette architecture militaire pour la conception de ses fameux forts. Cette protection sera très efficace, lorsqu'en 1550 débarquent, venant du nord, plusieurs milliers de soldats espagnols qui, mis en échec sous ces murs par la garnison locale, se virent contraints de reprendre la mer pour retourner vers la péninsule ibérique. Le Vieux-Château, devenu obsolète par la construction (entre 1654 et 1660) de petits forts côtiers selon la technique de Vauban, fut démantelé à la fin du XVIIe siècle, ainsi que plusieurs autres châteaux anciens des côtes françaises, sur l'ordre du roi Louis XIV qui craignait que ceux-ci ne fussent pris par l'ennemi pour s'en servir comme points stratégiques.","habitants":"Olivier V de Clisson\r\n        \"","divers":"Vestiges à l'Ile d'Yeu; 46° 41' 58\" Nord et 2° 22' 07\" Ouest","gps":"","images":["../image/image_85/85_Ile_d_Yeu_1.jpg","../image/image_85/85_Ile_d_Yeu_2.jpg","../image/image_85/85_Ile_d_Yeu_3.jpg"]},"Consult_chateau_formulaire9ea0":{"id":"Consult_chateau_formulaire9ea0","dept":"85","canton":"Luçon","commune":"Nalliers","nom":"Ilots_les_Tours","type":"Domaine","periode":"XVII","histoire":"ILOT LES TOURS,   Jean-Baptiste Deloynes fit construire en 1672 sa demeure de l'Ilôt-les-Tours à l'emplacement d'une petite maison noble appelée Cotine et y installa sa collection d'oeuvres d'art. Le siège de la seigneurie de Nalliers qui depuis quatre siècles était à l'îlot les vases fut transférée, après accord de l'évêque Barillon de Luçon, à l'Ilôt-les-Tours. La famille a conservé la propriété durant 35 ans, le fief fut vendu en 1701 à Marie-Angélique d'Ardemalle qui elle-même vendit l'Îlot en 1712  à  Charles-Paul Beschet, seigneur de Biarge dont la famille posséda l'Ilôt-les-Tours jusqu'à la Révolution. Aujourd'hui il subsiste des vestiges de cet ensemble important accompagné d'un vaste parc enclos et de communs dont les traces restent toujours au sol. Construit sur le côté est de l'avant-cour du logis, le pigeonnier seigneurial est la seule des deux tours circulaires qui existe encore aujourd'hui.","architecture":"ILOT LES TOURS, vestiges d'un ensemble important d'un ancien château bâti vers 1670, accompagné d'un vaste parc enclos et de communs dont les traces subsistent au sol. Construit sur le côté Est de l'avant-cour du logis, le pigeonnier seigneurial est la seule des deux tours circulaires qui existe encore aujourd'hui.","habitants":"Charles-Paul Beschet\r\n        \"","divers":"Ilots les Tours; 46° 29' 16\" nord, 1° 02' 06\" ouest","gps":"","images":["../image/image_85/85_Ilots_les_Tours_1.jpg","../image/image_85/85_Ilots_les_Tours_2.jpg","../image/image_85/85_Ilots_les_Tours_3.jpg"]},"Consult_chateau_formulaire9b1b":{"id":"Consult_chateau_formulaire9b1b","dept":"85","canton":"Challans","commune":"St-Hilaire de Loulay","nom":"La_Lande","type":"Château","periode":"XIV","histoire":"Deux châteaux  dans cet article de St-Hilaire de Loulay celui de la Lande .                                                                                                                     LANDE, le château appartient dès le XIVe siècle (1384) à Jean Buor, écuyer, seigneur de la Lande, en la paroisse de St-Hilaire-de-Loulay. Le 6 juillet 1545, Pierre Buor, écuyer, seigneur de la Lande, épouse une Damoiselle Anne Lingier. De ce mariage naquit Baptiste Buor, qui se marie en 1582 avec Olympe de Lespinay. Le 24 juillet 1631 mariage de Charles Buor et seigneur de la Lande avec Anne Garipaud, celle-ci, veuve, fait un contrat de partage, comme tutrice de ses enfants, avec son beau-frère, Hélie Buor, seigneur de la Négrie et sa belle soeur, Jacqueline Buor. Pendant la Révolution, le château fut incendié mais il demeura toujours la propriété de la famille Buor car il ne fut pas vendu aux acquéreurs de biens nationaux. Actuellement habité par madame la comtesse de Cornulier veuve de M le comte de Cornulier, et par son fils Louis de Cornulier, conseiller général de la Vendée, la demeure est depuis plusieurs siècles la propriété de la même famille, la famille Buor. D'où son nom La Lande Buor, qui est devenu la Lande, depuis que, par alliance, cette maison appartient  à la famille de Cornulier. Le château possède une chapelle où l'on peut encore dire la messe. Jadis des foules nombreuses venaient en pèlerinage à cette chapelle pour prier sainte Anne qui en est la patronne.","architecture":"LANDE, Guillaume Buaor seigneur participa à la septième croisade aux côtés de Saint-Louis, le château passa au milieu du XVIIIe siècle à Alexis de L'Espinay qui avait épousé  Gabrielle -Félicité  Buor de la Lande, puis à leur fille mariée en 1810 au comte Louis de Cornulier un des fidèles compagnons de Charette. En 1903, lors du mariage de Laure de Cornulier avec le comte de Longeril, La Lande passa dans cette maison sans jamais avoir été vendu depuis le XIIIe siècle le propriétaire est le comte de Longeril qui à épousé Marie de Chabot en 1929  La Lande ; grande bâtisse simple que l'on s'exprime mal alors l'impression d'élégance qui s'en dégage A chaque extrémité de la façade, un pavillon vient caler la composition dispositif très classique que complètent ici deux autres pavillons plus étroit, édifice de trois niveaux avec lucarnes sur combles. L'avant corps central  coiffé d'un petit fronton très digne est précédé d'un escalier en fer à cheval dont les courbes viennent adoucir la rigoureuse  ordonnance de l'ensemble.                                                                      PREUILLE  (voir article saint-Hilaire)  Il existe 7 petits châteaux privés, dans le village, témoignages des seigneuries d'autrefois, toujours présentes à Montaigu-Vendée. Il y a aussi le château de la Preuille, la Mussetière, le  Bois-Corbeau, la Peinerie et  la Grande Bernerie.","habitants":"Famille de Jean Buor,\r\n        \"","divers":"Château à st-Hilaire du Loulay, La Lande: 46° 59' 27,73\" Nord, 1° 19' 45,02\" Ouest","gps":"","images":["../image/image_85/85_La_Lande_1.jpg","../image/image_85/85_La_Lande_2.jpg"]},"Consult_chateau_formulaire590e":{"id":"Consult_chateau_formulaire590e","dept":"85","canto
