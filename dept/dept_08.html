er de Fonbrune.","architecture":"TAILLY, il accordera à son fils Jules Amédée Eugène le domaine des Forgettes, où Jules y résidera toute sa vie. En septembre 1914, l'armée allemande réquisitionne les Forgettes, y installe des canons barrant la route de Stenay, et expulse Jules Amédée Eugène. Refusant de quitter son village malgré l'invasion, Jules Amédée Eugène, contraint et forcé, abandonne le domaine des Forgettes, se réfugie au château de Tailly, encore occupé par les soldats allemands, et y meurt en mai 1918, seul, loin des siens, à l'âge de 88 ans. Le château de Tailly devient la propriété d'Antoine, fils d'Irma et Henri Dussumier de Fonbrune, mais Antoine doit s'en séparer. Le château de Tailly est alors racheté en 1911 par un cousin germain, Gaston Darodes de Tailly, fils de Jules Amédée Eugène. Il redevient la maison familiale de Mr et Mme Jean Darodes de Tailly, qui deviendra le maire de Tailly, de 1925 à 1935, puis de leur fils, le contre-amiral et Mme Claude Darodes de Tailly, et depuis, de Marie, leur fille. le corps de logis de Tailly de plan carrée à trois niveaux avec série de lucarnes en comble sur un toit  recouvert de tuiles.","habitants":"Famille Darodes\"","divers":"Tailly GPS : 49° 26' 10\" Nord, 5° 05' 00\" Est","gps":"49° 26' 10\" Nord, 5° 05' 00\" Est","images":["../image/image_08/08_Tailly_1.jpg","../image/image_08/08_Tailly_2.jpg","../image/image_08/08_Tailly_3.jpg"]},"Consult_chateau_formulaireb81f":{"id":"Consult_chateau_formulaireb81f","dept":"08","canton":"Carignan","commune":"Sapogne sur marches","nom":"Tassigny","type":"Château","periode":"XV-XVI","histoire":"TASSIGNY, le château de Tassigny a été construit au XVIe siècle et se situe sur un territoire que se disputèrent l'Empire Germanique et le Royaume de France. Le premier seigneur connu de Tassigny est Nicolas le Gouverneur. Conseiller de Charles-Quint et ensuite de son fils Philippe II d'Espagne, il devint un haut fonctionnaire des finances des Pays-Bas et conseiller extraordinaire de Marie de Hongrie, fille de Charles-Quint à Luxembourg. Son petit-fils, François de Mauléon, échangera le château de Tassigny en 1627 avec Dirk de Boetzelaer. Celui-ci s'y installe avec sa jeune épouse, Jeanne de Mérode après avoir restauré la maison dans les années 1629-1630. Vers  1631 devenu Prévôt d'Yvois, Dirk de Boetzelaer sera enterré à Orval. En 1637, durant la guerre de Trente Ans, le maréchal de Châtillon, et plus particulièrement les troupes commandées par Henri-Robert Gigault de Bellefonds, s'emparent de la place, que la France conserve au traité des Pyrénées, signé en 1659. Au XVIIIe siècle le château sera habité par des membres et descendants de la famille. Eugène de Wal, d'Anthisnes, descendant de Dirk de Boetzelaer. Entré par héritage en possession de la baronne d'Hoogvorst, la maison sera vendue en 1848 au baron de Failly. Elle demeure depuis dans sa descendance. Mis à sac lors de la première guerre mondiale et fortement endommagé par les obus français tirés de la ligne Maginot toute proche en 1940, le château fera l'objet d'un programme de restauration grâce aux efforts conjoints d'Antoine Henriot, Claude sa sur et son mari Paul-Emile Grimaud.","architecture":"TASSIGNY, Dirk de Boetzelaer fit aménager des fenêtres à meneaux en 1629 et créera trois portes d'accès dans la cour, de style Renaissance,  le dernier seigneur de Tassigny modifiera le château dans les années 1780 en transformant notamment le pont-levis en chaussée empierrée, perce une vaste porte cochère et décore les jardins de deux groupes de quatre piliers Louis XVI sommés de glands.  Éléments protégés MH : le château et son décor intérieur, les huit piliers sculptés avec leurs grilles à l'extérieur; la chapelle; la clôture : classement par arrêté du 30 décembre 1991.","habitants":"Famille de Dirk de Boetzelaer\"","divers":"GPS : 49° 36' 13\" Nord, 5° 18' 25\" Est","gps":"49° 36' 13\" Nord, 5° 18' 25\" Est","images":["../image/image_08/08_Tassigny_1.jpg","../image/image_08/08_Tassigny_2.jpg","../image/image_08/08_Tassigny_3.jpg","../image/image_08/08_Tassigny_4.jpg"]},"Consult_chateau_formulairead54":{"id":"Consult_chateau_formulairead54","dept":"08","canton":"Rethel","commune":"Thugny-Trugny","nom":"Thugny_Trugny","type":"Château","periode":"XVI","histoire":"Deux châteaux dans cet article Thugny,  cité Mazarin.                    THUGNY-TRUGNY, du XVIe siècle est attribuée à Jean-Jacques de Suzanne, comte de Cerny-en-Laonnois.  sa fille épouse Charles de Moÿ. Sa petite-fille, Claude de Moÿ, née en ce château, est une riche héritière qui épouse en 1585 Henri de Lorraine-Chaligny, prince du Saint-Empire Germanique. Ce dernier meurt assez jeune en 1601 suivit de sa veuve en 1627. Au début de l'an 1653, le maréchal Turenne reçoit le cardinal Mazarin en cet endroit. En 1721, Procope Hyacinthe de Ligne, héritier des marquis de Moÿ et des Lorraine Chaligny,  ancien brigadier des armées du Roi, menant une vie désordonnée, vend le château à Antoine Crozat un financier du XVIIIe siècle.  Son propriétaire, M. Jacques de Causans, le restaure depuis 3 ans.  Propriété d'Aynard, marquis de Chabrillan, décédé en 1950, puis de son petit-fils, le comte Robert Henri de Caumont La Force, décédé en 2005, il a bénéficié, depuis 2007, d'une importante campagne de restauration, afin d'être aménagé pour l'organisation de réception. Il sert en effet de cadre à des manifestations diverses, qui permettent au propriétaire, Jacques de Causans, de continuer à financer les travaux de rénovation du bien transmis au sein de sa famille. Éléments protégés MH .                                                                                  A Rethel château de la CITE MAZARIN,  appelé aussi la Porte du château Rethel est un ancien château bâti à Rethel,  Il ne reste que quelques vestiges, dont la porte d'entrée du château de la Cité Mazarin, le porche et une partie de sa façade extérieure existent encore. Il appartient depuis à un particulier. La porte est visible de l'extérieur.","architecture":"THUGNY-TRUGNY  date du XVIe siècle. Suite aux dommages subis pendant la première guerre mondiale, il fut reconstruit sur la base des anciens plans en ne rebâtissant qu'une partie des pavillons. En arrivant par la rue du château se dresse le châtelet avec son allure fortifiée.  Le château est bâti en gaize, renforcée de pierres plus dures aux encadrements et dans les chaînes en besace. Une terrasse bordée de balustrade a été créée, au-dessus de voûtes, vestiges d'un ancien bâtiment endommagé en 1918.   Sur le coté, caché dans des arbres, s'élève une grange seigneuriale, avec, à chaque coin, des tourelles coiffées de poivrière, tout en utilsant les techniques de construction des années 1920. C'est un bâtiment de forme oblongue, qui comporte une ligne de mâchicoulis, protégeant l'entrée, et une arcade de passage charretier, qui s'ouvre sur un passage voûté. Derrière le châtelet, se trouve un bâtiment de style classique, avec une façade sur deux niveaux en regard du canal. Il est composé de deux grands pavillons d'angle saillants, d'importances inégales et sur trois niveaux. Le plus grand de ces pavillons d'angle compte trois travées, renforcée de pierres plus dures aux encadrements et dans les chaînes en besace. Une terrasse bordée de balustrade a été créée, au-dessus de voûtes, vestiges d'un ancien bâtiment endommagé en 1918.. Son propriétaire est Mr Jacques de Causans qui le fait restaurer depuis 3 ans. C'est une propriété privée. Le château est classé aux M.H depuis 1946.","habitants":"Henri de Lorraine-Chaligny\"","divers":"Deux châteaux dans cet article Thugny  cité Mazarin    Thugny  GPS : 49° 29' 07\" Nord, 4° 25' 14\" Est                                                                Cité Mazarin grav 6    GPS : 49° 30' 32,4\" Nord, 4° 22' 8,51\" Est","gps":"49° 29' 07\" Nord, 4° 25' 14\" Est","images":["../image/image_08/08_Thugny_Trugny_1.jpg","../image/image_08/08_Thugny_Trugny_2.jpg","../image/image_08/08_Thugny_Trugny_3.jpg","../image/image_08/08_Thugny_Trugny_4.jpg","../image/image_08/08_Thugny_Trugny_5.jpg","../image/image_08/08_Thugny_Trugny_6.jpg"]},"Consult_chateau_formulaire699b":{"id":"Consult_chateau_formulaire699b","dept":"08","canton":"Nouvion-sur-Meuse","commune":"Touligny","nom":"Touligny","type":"Château","periode":"XVII","histoire":"Trois châteaux dans cet article, Basse-Touligny, Guignicourt et Gruyères.                                                                                                                       BASSE TOULIGNY, achevée en 1652 date figurant sur l'entrée du château. Au XIXe siècle modifications du château: destructions en 1881 et augmentations (1881 et 1887) dans le but de le transformer en belle maison de campagne : reconstruction de la tour carrée nord-est, destruction et reconstruction de l'aile est les communs, destruction de l'aile sud,  de la façade sur cour de l'aile ouest, et reconstruction (l'aile rénovée est plus haute que l'ancienne). Actuellement, il abrite une exploitation agricole. Éléments protégés MH : les façade et les toitures de l'aile d'entrée (aile nord), pont d'entrée, parcelle correspondant à l'emplacement des anciennes douves : inscription par arrêté du 19 août 1998.                                                                               A Cinq K.M. à l'Est à GUIGNICOURT sur Vence, château  construit au XVIIIe siècle. Lorsqu'il fut attaqué, les assaillants sen prirent aussi au château dYvernaumont. Tout fut détruit ainsi que léglise du village qui ne fut jamais reconstruite. Le château de Guignicourt-sur-Vence, qui appartient à M. Leonel de Mérode, possède un magnifique parc d'inspiration romantique, de très belles dépendances et un arborétum créé à partir de 1920 par Victor Cayasse. Il réalise une roseraie et trois jardins : un pour les espèces montagnardes, un autre pour les plantes dornement et un dernier  constitué de plantes médicinales. En 1921, il met son jardin à la disposition de la société dhistoire naturelle des Ardennes afin quelle y réalise des expériences de botanique.","architecture":"à cinq K.M. au nord  à GRUYERES  Le château de Gruyères est une bâtisse de la fin du XVIe siècle. L'ensemble se distingue par une disposition en U  est encore cerné de douves en partie. La présence de deux tours d'angle rondes atteste de la volonté de faire de cette demeure une maison-forte. Au XVIIIe siècle, une chapelle fut aménagée dans la tour nord-ouest et l'entrée de la remise à carrosse fit l'objet d'une totale réfection. Les travaux entrepris en 1835 donnent au logis son apparence actuelle. Dans le même temps, l'aile d'entrée qui clôturait la cour fut détruite. Ces remaniements ont permis l'émergence d'une demeure typique des constructions de maître de la Restauration comme en témoigne l'emploi discret des formes classiques. L'intérieur s'harmonise avec ces travaux si l'on excepte les cheminées qui datent du XVIIIe siècle selon toute vraisemblance.  Éléments protégés MH : les façades et les toitures du château, ainsi que les parcelles avec leurs aménagements : inscription par arrêté du 26 avril 2010.","habitants":"Seigneur local\"","divers":"Trois châteaux dans cet article, Basse-Touligny, Guignicourt et Gruyères. Basse-Touligny grav 1-2  GPS : 49° 40' 03\" Nord, 4° 38' 19\" Est                                                                     Gruyère grav-3  GPS : 49° 42' 41\" Nord, 4° 36' 13\" Est                                                    Guignicourt  grav_4 GPS : 49° 40' 56\" Nord, 4° 39' 10\" Est","gps":"49° 40' 03\" Nord, 4° 38' 19\" Est","images":["../image/image_08/08_Touligny_1.jpg","../image/image_08/08_Touligny_2.jpg","../image/image_08/08_Touligny_3.jpg","../image/image_08/08_Touligny_4.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','08 — Ardennes'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
