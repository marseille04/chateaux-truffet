' 04\" Nord, 4° 33' 08\" Est                                    Rémilly grav 3-4-5  GPS : 49° 46' 53\" Nord, 4° 32' 00\" Est","gps":"49° 47' 04\" Nord, 4° 33' 08\" Est","images":["../image/image_08/08_Hardoncelle_1.jpg","../image/image_08/08_Hardoncelle_2.jpg","../image/image_08/08_Hardoncelle_3.jpg","../image/image_08/08_Hardoncelle_4.jpg","../image/image_08/08_Hardoncelle_5.jpg"]},"Consult_chateau_formulairecde7":{"id":"Consult_chateau_formulairecde7","dept":"08","canton":"Signy-l","commune":"Hagnicourt","nom":"Harzillemont","type":"Château","periode":"XVI-XIX","histoire":"HARZILLEMONT,   la construction de cette maison-forte remonte au XVIe siècle. Elle a été construite à proximité d'un autre bâtiment qui fut incendié en 1521 par Charles Quint, revenu invaincu du siège de Mézières. Le château a été transmis vers 1620, de la famille d'Harzillemont à la famille de Saint Quentin. Au moment de la Révolution en 1789, cette famille n'ayant pas émigré, n'a donc pas été spoliée de ses biens. Après la paix d'Amiens, un comte de Bruce, revenant d'émigration, entre dans cette famille par alliance matrimoniale. C'est Charles Hector, comte de Bruce, issu d'une famille descendante des rois d'Écosse, qui avait accompagnée en France Stuart Jacques II d'Angleterre. Militaire également, il participa comme colonel, au sein de l'armée Napoléonienne, aux guerres de l'Empire et décèda le 7 février 1866, à 94 ans. C'est ainsi qu'un descendant des Rois dÉcosse devint un seigneur ardennais.","architecture":"HARZILLEMONT, la construction du château date du XVIe au XIXe siècle. C'est une ancienne maison forte qui fut améliorée au cours des siècles. a été construite de plan carré cantonné de quatre tours rondes du XVIe siècle à proximité d'un autre édifice militaire, incendié en 1521, par Charles Quint, revenu du siège de Mézières, invaincu. Ces descendants restèrent installés au château d'Harzillemont. Il y a quelques décennies, le château d'Harzillemont a été racheté par le conseil général des Ardennes, à un descendant de Charles-Hector de Bruce.                                         Éléments protégés MH : les façades et les toitures du corps de logis central et les quatre tours qui le cantonnent : inscription par arrêté du 12 janvier 1987.","habitants":"famille d'Harzillemont  Charles-Hector de Bruce.  \"","divers":"GPS : 49° 36' 38,41\" Nord, 4° 35' 13,51\" Est","gps":"49° 36' 38,41\" Nord, 4° 35' 13,51\" Est","images":["../image/image_08/08_Harzillemont_1.jpg","../image/image_08/08_Harzillemont_2.jpg","../image/image_08/08_Harzillemont_3.jpg"]},"Consult_chateau_formulairec89c":{"id":"Consult_chateau_formulairec89c","dept":"08","canton":"Givet","commune":"Hierges","nom":"Hierges","type":"Vestiges","periode":"X-XVI-XVIII","histoire":"HIERGES,   le château de Hierges appelé aussi le château fort  dont le nom d'origine était « Le château de Jérusalem » a été construit sur l'emplacement d'un castrum dont les origines dateraient de 840. Au Xe siècle, la seigneurie de Hierges faisait partie des biens de la Maison d'Ardenne. À l'époque des croisades, la forteresse de Hierges est rattachée à la principauté de Liège puis au XIIe siècle, le château aurait été détruit.  Solidement campé sur un éperon rocheux, le château de Hierges veille sur le village qui possède la réputation dêtre lun des plus beaux des Ardennes.                                 A deux K.M. au sud le château moderne de RISDOUX à Vireux-Valleran, le château se situe dans un vaste domaine boisé, au bord de la Meuse. La construction du château date du XVIIIe siècle. Sur le domaine, plusieurs dépendances sont aménagées en maisons de vacances. Idéal pour les  vacances, un séjour en famille, un week-end entre amis, le château se révèlera aussi être un bon choix pour des évènements tels quun mariage, un anniversaire, un séminaire etc.  Il dispose dune salle à manger pouvant accueillir 30 à 40 personnes et dune cuisine semi-professionnelle. Possibilité de louer le domaine, ou des chambres en extra dans les bâtiments annexes.","architecture":"HIERGES,  les premières fortifications datent de lépoque médiévale, mais lédifice fut détruit, puis réhabilité au XVIe siècle, avant de subir les outrages de la Révolution, après être devenu français en 1774. Subsistent encore les murs denceinte entre les trois grosses tours, ainsi que la tour carrée, faisant face à lhabitation actuelle en pierre bleue et à la tour de garde. Le château de Hierges renferme des galeries, un puits du XVIe siècle, les oubliettes de la tour de justice, les communs ont été aménagés au début du XIXe dans les anciennes écuries. Subtil compromis entre les contraintes militaires et les fastes dune demeure princière, le château de Hierges est un bel exemple de larchitecture de la Renaissance mosane. Éléments protégés MH : les ruines du château : classement par arrêté du 30 décembre 1980. Les façades et toitures de l'ancien commun et du colombier du château : inscription par arrêté du 30 décembre 1980. Au XVIIIe siècle, l'ancien commun et le colombier furent rajoutés. Le château de Hierges est assailli, en 1792, par les révolutionnaires puis sera détruit par un incendie le 18/11/1793. En partie restauré, Le château de Hierges a été classé aux M.H. depuis 1980.","habitants":"seigneurie de Hierges\"","divers":"GPS : 50° 06' 21\" Nord, 4° 44' 26\" Est                                                             Risdoux  grav 7                                             GPS : 50° 05' 04\" Nord, 4° 43' 51\" Est","gps":"50° 06' 21\" Nord, 4° 44' 26\" Est","images":["../image/image_08/08_Hierges_1.jpg","../image/image_08/08_Hierges_2.jpg","../image/image_08/08_Hierges_3.jpg","../image/image_08/08_Hierges_4.jpg","../image/image_08/08_Hierges_5.jpg","../image/image_08/08_Hierges_6.jpg","../image/image_08/08_Hierges_7.jpg"]},"Consult_chateau_formulaire3702":{"id":"Consult_chateau_formulaire3702","dept":"08","canton":"Attigny","commune":"Lametz","nom":"Lametz","type":"Château","periode":"XVI","histoire":"Deux châteaux dans cet article, Lametz et Camion à Viviers au court.                                                                                                            LAMETZ, à la fin du XVIe siècle, Henriette de Clèves possédait la moitié de la seigneurie de Lametz, qu'elle vendit à P. Dubois d'Ecordal. Celui-ci y fit construire, en 1597, un château manoir, style Henri IV, dont il ne reste qu'une partie aujourd'hui. Il fut la propriété de la famille Grimaldi, princes de Monaco, puis a accueilli des colonies de vacances pour des comités d'entreprise, avant de devenir gîte d'accueil actuel.   Malgré les réticences de la famille Grimaldi, les deux jeunes gens se marient à Paris, le 27 novembre 1816. Antoine Rouyer décède à Lametz en 1836. En 1841, Florestan devient prince de Monaco. Caroline, nouvelle princesse de Monaco, exerce dès lors une grande influence dans la gouvernance de la principauté et en redresse les comptes. Florestan Grimaldi et sa conjointe vivent en partie en ce domaine de Lametz, mais aussi à Paris. C'est au château de Lametz que Florestan Ier de Monaco rencontra Caroline Gibert qui devint son épouse et Princesse Caroline de Monaco. Le château de Lametz, vendu par les Grimaldi, est depuis habité par des particuliers.                                                                  A deux K.M. à l'Est à Viviers  le château dit de CAMION c'est en 1879 que Charles Camion fait élever son château, appelé le château Camion, et ses communs à l'est de l'usine de quincaillerie Camion.","architecture":"LAMETZ, c'est une ancienne gentilhommière du XVIIe siècle. Le château de Lametz actuel ne correspond qu'à une partie de l'édifice initial. En L, avec une partie plus récente à l'arrière, et des combles de tailles significatives, le château se situe au coeur d'un parc de 1,5 hectares. Le château de Lametz est une propriété qui propose un gite d'hôtes, avec, sur le terrain, une aire de jeux pour les enfants et un terrain de tennis pour les adultes.  Vendu bien des années plus tard, le château de Lametz sera utilisé comme colonie de vacances, avant d'être restauré et réaménagé en un gîte d'hôtes.                                                                                                           CAMION,  le château Camion, dont l'architecture éclectique est représentative des maisons de maître de la fin du XIXe siècle, domine l'ensemble usinier Camion. L'habitation est composée d'un corps de bâtiment central à toit à longs pans et croupe à charpente en bois apparente couverte d'ardoise encadré par deux ailes en avancée surmontées de toits en pavillon ; l'ensemble est à deux étages carrés et un de comble et bâti en pierre de taille.","habitants":"famille Grimaldi, princes de Monaco\"","divers":"Deux châteaux dans cet article, Lametz  grav 1-2-3 et Camion à Viviers au Court grav 4. Camion GPS : 49° 44' 08\" Nord, 4° 49' 54\" Est                                                       Lametz GPS : 49° 31' 41\" Nord, 4° 41' 02\" Est","gps":"49° 44' 08\" Nord, 4° 49' 54\" Est","images":["../image/image_08/08_Lametz_1.jpg","../image/image_08/08_Lametz_2.jpg","../image/image_08/08_Lametz_3.jpg","../image/image_08/08_Lametz_4.jpg"]},"Consult_chateau_formulaire2d02":{"id":"Consult_chateau_formulaire2d02","dept":"08","canton":"Sedan","commune":"Rubécourt-et-Lamécourt","nom":"Lamécourt","type":"Forteresse","periode":"XVI","histoire":"LAMECOURT, le château de Lamécourt est attesté depuis le XVIe siècle. En 1588, il a été occupé par les Ligueurs mais fut repris par les protestants, durant la même année. Il a accueilli un Temple pour la religion réformée, qui pourrait être le bâtiment des écuries en dehors des douves. Le château de Lamecourt eut de nombreux propriétaires notamment les familles de Jouvence, de Dainville, de Billot, de Vissec de Latude, les Martin, les Coquebert de Montfort, les Lespagnol, les d'Orsel, les Touchain de La Lussière. Puis, au XIXe siècle, le château deviendra la propriété de manufacturiers, les Ternaux puis les Montagnac. Au XIXe siècle, Elizé de Montagnac en devient propriétaire.","architecture":"LAMECOURT, de plan en U, corps de logis central à trois niveaux toit en croupes, l'édifice est flanquée aux extrémitées des dépendances de deux tours carrées à trois niveaux , série de lucarnes sur combles intérieures des dépendances. éléments protégés MH : les façades et les toitures du château ; les douves ; le portail d'entrée ; le salon orné de boiseries XVIIIe siècle au rez-de-chaussée ; la cheminée en marbre du salon du premier étage avec son trumeau ; la cheminée en marbre de la grande salle du rez-de-chaussée de l'aile ouest avec son trumeau ; les façade et les toiture de l'édifice dit \"Temple\" : inscription par arrêté du 24 décembre 1986.","habitants":"Famille de Jouvence\"","divers":"GPS : 49° 41' 01\" Nord, 5° 00' 48\" Est","gps":"49° 41' 01\" Nord, 5° 00' 48\" Est","images":["../image/image_08/08_Lam%c3%a9court_1.jpg","../image/image_08/08_Lam%c3%a9court_2.jpg","../image/image_08/08_Lam%c3%a9court_3.jpg"]},"Consult_chateau_formulaire3744":{"id":"Consult_chateau_formulaire3744","dept":"08","canton":"Vouziers","commune":"Bayonville","nom":"Landreville","type":"Château","periode":"XVI-XVIII","histoire":"LANDREVILLE,  aujourdhui, propriété de la famille Philippe Renault, le château de Landreville est un rare exemple encore pratiquement intact de lhabitation seigneuriale Ardennaise de l'époque Pré-Renaissance. Cest aussi 800 ans dhistoire, de drames et de joies, qui furent partagés par les familles Landreville, Beauvais, Maillart, Meixmoro. Vous pourrez découvrir le mystère du trésor de Scholastique de Vassinhac dImécourt, lhistoire et lorigine du jeu de Colin-Maillart, la légende de la dame Blanche et bien dautres anecdotes. Le château de Landreville est devenu aujourd'hui un Luxury Bed & Breakfast avec chambres d'hôtes aussi bien au château même que dans le pavillon de chasse, Landreville est classé aux M.H. depuis 2006.","architecture":"LANDREVILLE, bâti au début du XIIIe siècle et restructuré au milieu du XVIe siècle, sur les bases d'une ancienne forteresse du XIIIe siècle, de style classique, c'est une petite forteresse rectangulaire,  flanquée de quatre tours dangle circulaires à poivrières avec gargouilles, entourée de douves en eaux vives, dun parc de six hectares, de communs, décuries et de deux pavillons dont un du XVIIIe siècle. La porte d'entrée s'orne de bossage vermiculé et de statuettes d'atlantes de style Renaissance avec comme fronton les trois blasons des anciens seigneurs des lieux. La cuisine ou « salle des gardes », est voûtée comme tout l'étage du rez-des-douves ; un pilier isolé au centre de la pièce sur lequel retombent les nervures de section rectangulaire. Les deux pièces situées à chaque étage possèdent des plafonds à la française et les étages sont reliés par un escalier à vis situé dans la tour ouest. Certains communs sont détruits, ceux qui entourent le château sont relativement récents, en 1773 pour le pavillon du régisseur, du XIXe siècle pour les autres, de communs et de deux pavillons dont un date du XVIIIe et un de la fin du XIXe siècle, et a été complètement restauré entre 2005 et 2012.","habitants":"Famille Philippe Renault\"","divers":"Landreville  GPS : 49° 22' 43\" Nord, 5° 00' 32\" Est","gps":"49° 22' 43\" Nord, 5° 00' 32\" Est","images":["../image/image_08/08_Landreville_1.jpg","../image/image_08/08_Landreville_2.jpg","../image/image_08/08_Landreville_3.jpg","../image/image_08/08_Landreville_4.jpg"]},"Consult_chateau_formulaire290a":{"id":"Consult_chateau_formulaire290a","dept":"08","canton":"Nouvion-sur-Meuse","commune":"Mazerny-Mazenay","nom":"Loches_Mazerny","type":"Château","periode":"XIX","histoire":"LOCHES, construit au début du XIXe siècle, est situé au milieu d'un domaine de 185 hectares de forêts et de prairies, Le curé Mellier, considéré comme un des fondateurs de l'athlétisme en France, est né à Mazerny et fut curé d'Etrépigny pendant 40 ans, de 1689 à sa mort. Voltaire et le baron d'Holbach publièrent son testament posthume à Mazerny.  La propriétaire du château des Loches est Mme Michèle Gardan.","architecture":"LOCHES à Mazerny. Il possède un parc arboré remarquable, des jardins, une chapelle, deux ruisseaux bordent la propriété, étang, forêts giboyeuses avec de nombreuses essences d'arbres. Corps de logis de plan rectangulaire à deux niveaux toit en croupe avec lucarnes sur combles, accolé  d'une tour carrée sur flan gauche de trois niveaux,  cinq chambres d'hôtes vous permettront de vous ressourcer dans un environnement calme et naturel. Une piscine couverte permet de se baigner au milieu de la nature. Des petits déjeuners et dîners vous seront servis dans la grande salle à manger. Les repas sont confectionnés selon les traditions locales et avec les produits du terroir. Des mets de grande qualité, issus des jardins ou des forêts des Loches, vous seront proposés dans le grand salon.","habitants":"Le curé Mellier et Mme Michèle Gardan\"","divers":"GPS : 49° 36' 38\" Nord, 4° 36' 50\" Est","gps":"49° 36' 38\" Nord, 4° 36' 50\" Est","images":["../image/image_08/08_Loches_Mazerny_1.jpg"]},"Consult_chateau_formulaire8c90":{"id":"Consult_chateau_formulaire8c90","dept":"08","canton":"Signy-l","commune":"Prez","nom":"Maipas","type":"Château","periode":"XVI","histoire":"MAIPAS, est devenu une ferme, a la fin du XVIe siècle, le fief du Maipas ou Mespas appartient à la famille Brodart, et notamment à un maître des forges, Nicolas Brodart, époux de Marie Simonnet, elle-même issue d'une grande famille bourgeoise de Rethel. Un seigneur écossais, Charles de Douglas, seigneur d'Arrancy épouse la descendante de Nicolas Brodart et Marie Simonnet, Françoise Brodart et habite le Maipas. C'est ce Charles de Douglas qui est le plus souvent cité comme le constructeur de ce logis. Son fils Charles Archanbault de Douglas vend ses terres en Thiérache, et le logis du Maipas devient la propriété de la famille Piermez, qui y habite. Leur succèdent Claude de Saint-Yves, garde général des poudres et salpêtres, puis, au XIXe siècle, le baron Jacques-Louis Hulot. Le Maipas a perdu assez vite sa vocation de logis pour devenir le siège d'une importante exploitation agricole, mais a gardé son intégrité architecturale et a été épargné par les conflits. L'édifice est inscrit au titre des monuments historiques en 1926. Le bâtiment est visible de l'extérieur mais ne se visite pas. C'est une propriété privée.  Le château-ferme du Maipas est inscrit aux M.H. depuis 1926.","architecture":"MAIPAS, la demeure a sans doute été construite pendant le règne de Louis XIII. L'entrée se fait par un porche charretier en anse de panier, avec à sa droite une porte piétonne. Ces deux portes sont encadrées de pierres appareillées et la porte piétonne est surmontée de pierres telles des boulets encastrées. Lorsqu'on passe cette entrée, le bâtiment principal fait face. Il est encadré de quatre pavillons carrés, au toit en losange et en pointe à la manière de bastions. La bâtisse et les quatre pavillons sont sur deux niveaux uniquement, avec d'étroites fenêtres rectangulaires, sous une corniche à petits modillons formant une ceinture continue englobant l'ensemble. Le corps principal est surmonté d'un toit dont les combles sont impressionnants.  Un perron précède la porte d'entrée légèrement décentrée vers la gauche et prise dans un encadrement classique surmonté d'un tableau de pierres noires, et d'un second tableau accompagné de boulets traités en demi-relief. C'est un des rares éléments décoratifs dans une façade très sobre. Les fenêtres portent la trace de barreaux qui les protégeaient. Des vestiges de fossés peuvent être observés.  À droite du bâtiment principal, un mur rejoint un pavillon rectangulaire séparé, qui subsiste d'autres constructions.","habitants":"Famille Brodart et Charles de Douglas\"","divers":"GPS : 49° 47' 10,98\" Nord, 4° 22' 7,36\" Est","gps":"49° 47' 10,98\" Nord, 4° 22' 7,36\" Est","images":["../image/image_08/08_Maipas_1.jpg"]},"Consult_chateau_formulaireb5e0":{"id":"Consult_chateau_formulaireb5e0","dept":"08","canton":"Attigny","commune":"Les Alleux","nom":"Maison_Rouge","type":"Château","periode":"XVII-XVIII","histoire":"MAISON-ROUGE, lorigine du domaine se situe vers 1330 lorsquun certain Gilles de Rodemack, alors ennemi de la ville de Reims et du roi de France, fait bâtir une place forte sur les limites du territoire de lArchevêque de Reims. Celle-ci est constituée de deux mottes artificielles fortifiées (Rodemach et Rougemare) distantes de quelques centaines de mètres. Ces maisons fortes présentes en ce lieu ne relèvent alors daucun suzerain.Par le jeu des mariages, des successions et des ventes, le domaine de Maison Rouge et le territoire des « Alleux de Marcelot » deviennent la propriété dune seule personne. Le château et le domaine changent plusieurs fois de propriétaires entre la fin du XVIIe siècle et 1853. Les familles de Thiret, Collard, Collard de Ville et Rivals de la Salle se succèdent à la tête du domaine. Certains anciens propriétaires reposent encore au cimetière des Alleux. En 1853, les héritiers Rivals de la Salle vendent le domaine à M. de Grandchamp qui le rétrocède la même année à trois propriétaires (Mrs. Parent, Schaken et Blin) qui exploitent les bois  En 1868, Eugène de Grandrut se rend acquéreur du domaine  lance la construction dun nouveau château, En 1910, le domaine est vendu aux familles Barbeaux et de Tassigny. En raison dune clause du contrat de vente, Léon de Tassigny devient lunique propriétaire en 1912. Le château sert de QG à larmée allemande lors de la 1ère guerre mondiale. Le château est fortement endommagé en octobre et novembre 1918.  En 1937, M. Boisson devient propriétaire du domaine, la famille le possède encore actuellement.","architecture":"MAISON-ROUGE un réseau de fossés défensifs et des étangs sont creusés à proximité des deux constructions. Avant de se dénommer Maison- Rouge, le domaine sest appelé primitivement Acy ou Assy probablement en lien avec le seigneur propriétaire au début du XVIe siècle. Vers 1610, Claude Thiret (alors seigneur dAcy) fait bâtir un nouveau château plus grand et plus imposant au centre du  domaine, à mi-distance entre les deux  constructions dorigine. Ce château bâti en briques rouge se dénomme « La Maison Rouge dAssy ».  Bien quappartenant au même suzerain. A lépoque, elles sont séparées par un fossé. Le domaine sera remis en état grâce aux dommages de guerre.\nA la fin des années 20 et au début des années 30, le domaine devient un lieu de villégiature pour nombre de mondains de lépoque. Un élevage de chevaux ardennais sera créé pour préserver lespèce. Suite à un contexte économique plus difficile et à une mauvaise gestion des affaires, la famille de Tassigny doit se résoudre à vendre le domaine.  En 1937, M. Boisson devient propriétaire du domaine, la famille le possède encore.  Lors de la 2eime guerre mondiale, le château sera occupé par larmée française (hôpital militaire), puis allemande (hôpital puis camp de transit : internement et identification pour les civils qui demandent à rentrer dans la zone interdite) et enfin américaine où des soldats seront cantonnés jusquen 1947.\nLe domaine retrouve alors son calme. M. Boisson développe lélevage de daims, lexploitation piscicole et forestière.","habitants":"Famille de Collard\"","divers":"Maison rouge  grav 1-2-3                                                  GPS : 49° 28' 17\" Nord, 4° 44' 20\" Est                                                                           Rougemare grav-4","gps":"49° 28' 17\" Nord, 4° 44' 20\" Est","images":["../image/image_08/08_Maison_Rouge_1.jpg","../image/image_08/08_Maison_Rouge_2.jpg","../image/image_08/08_Maison_Rouge_3.jpg","../image/image_08/08_Maison_Rouge_4.jpg"]},"Consult_chateau_formulaire79f0":{"id":"Consult_chateau_formulaire79f0","dept":"08","canton":"Attigny","commune":"Marcq","nom":"Marcq","type":"Château","periode":"XVI-XVII-XVIII","histoire":"quatre châteaux dans cet article, Marcq, Bois de Lord, Cornay et Chatel Chéhéry.                                                                                                                         MARCQ,  dit château Mercier, édifié par le maître de forge Nicolas Deruë. Le portail du château porte la date 1760 qui doit correspondre à celle de la construction du bâtiment. Le plan le plus ancien est une élévation de la façade sur cour réalisé à la fin du XVIIIe siècle pour l'ajout de deux pavillons latéraux. Le cadastre ancien montre que la cour d'entrée possédait une aile sud, détruite après la première guerre mondiale. L'aile d'entrée de la cour a fait à cette époque l'objet d'une reconstruction presque totale. Le corps de bâtiment n'a pas connu de modifications importantes. Le comble en pavillon semble une référence à l'architecture du XVIIe siècle. La façade sur jardin ressemble aux façades des grosses maisons du XVIIIe siècle.Éléments protégés MH : le corps de logis, le passage entre cour et le jardin au nord du logis, le passage avec la porte charretière et la porte piétonne au centre de l'aile d'entrée, le mur de clôture entourant le jardin : inscription par arrêté du 25 février 2002.","architecture":"à cinq K.M à l'ouest à Grandham le BOIS de LORD , de plan en L, fut vraisemblablement construit au début du XVIe siècle. On trouve en 1548 Charles de Couste qui cède le château du Bois de l'Or à Christophe de Fresneau et à Mademoiselle Catherine de Nauroy, veuve de Claude de Fresneau. Après les de Fresneau, seigneurs jusquen 1669, les de la Boulaye, anoblis en 1670, possédèrent le Bois de l'Or jusqu'à la Révolution.                                             A huit K.M. au sd-est CORNAY, château de style Renaissance, construit au XVIe siècle à partir de la pierre locale, la gaize, puis remanié au XIXe siècle. Il a été profondément modifié au début XXe siècle après l'occupation par le commandement allemand. Le château présente de belles fenêtres à meneaux, galbes néo-gothiques, coquilles en bas-relief. Éléments protégés MH : les façades et les toitures du bâtiment : inscription par arrêté du 9 mars 1990.                                                                                  A deux K.M. au  sud à Châtel-Chéhéry,  dans un village à flanc de coteau, entre lacs et forêt d'Argonne, dominant la vallée de l'Aire avec un beau parc arboré offrant un panorama exceptionnel, le chateau de Châtel, construit au XVIIIe siècle, offre trois chambres d'hôtes classées \"4 épis\" et gîte dans une maison indépendante dans le parc du château des propriétaires, chambres d'hôtes.","habitants":"Christophe de Fresneau\"","divers":"Trois châteaux dans cet article, Marcq grav-1-2, Bois de Lord grav-4 et Cornay grav-3,  Chatel Chéhéry grav-5.                                                                                       Marcq  GPS : 49° 19' 14\" Nord, 4° 55' 40\" Est","gps":"49° 19' 14\" Nord, 4° 55' 40\" Est","images":["../image/image_08/08_Marcq_1.jpg","../image/image_08/08_Marcq_2.jpg","../image/image_08/08_Marcq_3.jpg","../image/image_08/08_Marcq_4.jpg","../image/image_08/08_Marcq_5.jpg"]},"Consult_chateau_formulaire3da4":{"id":"Consult_chateau_formulaire3da4","dept":"08","canton":"Signy-l","commune":"Mesmont","nom":"Mesmont_Wassigny","type":"Château","periode":"XVII","histoire":"Trois châteaux dans cet article ; Mesmont , Wassigny et Séry.     MESMONT-WASSIGNY,  le château-ferme de Wasigny forme un imposant ensemble qui fut habité, jadis, par des personnages importants. Un édifice antérieur figure dans les Albums de Croÿ. Il fut détruit en 1617, par les troupes royales commandées par le duc de Guise et le marquis de Thémines, au moment où Louis XIII impose la fin de la régence de la reine-mère. La seigneurie fut rachetée par les Villelongue, écuyer et seigneur de Remilly,  à Louise Claude de Cauret, veuve de Charles-Philippe de Grandmont le 30/01/1685. Ils reconstruisirent le château de Wasigny. Un munitionnaire et maître de forges de Signy-le-Petit l'acquiert, en 1711, mais le revendit en 1736, à Charles de Saint-Mart, Baron de Neufville, qui, à son tour, le revendit, en 1760, à Pierre-Nicolas Caulet d'Hauteville.  Le fils de celui-ci, Pierre Denis Caulet-de-Wasigny devint, en 1773, grand maître des eaux et forêts de Picardie, et le resta, jusqu'à  la Révolution de 1789. Il résidait peu sur place. Il décèda, en 1790, et laissa ses biens à sa sur Claude-Sophie, épouse d'Alexandre Rouillé de Fontaine, militaire dans la cavalerie, seigneur de Goyencourt, dans la Somme se sépara du château de Mesmont, en 1911. La seigneurie fut achetée par les Villelongue, écuyers et seigneurs de Remilly, qui rebâtissent le château. Au moment de la Révolution le château appartient à Alexandre Rouillé de Fontaine.","architecture":"MESMONT-WASSIGNY, c'est un ancien château-fort du XVe et XVIIe siècle, cette ancienne maison forte a été transformée en ferme. L'entrée  avec un passage charretier, surmonté d'un comble en forme de carène renversée, « à la Philibert Delorme », couvert d'ardoises et surmonté d'un clocheton étroit. Les bâtiments sont du XVIIe siècle. Deux pavillons bas et dissymétriques, couverts d'ardoises également et abritant l'ancien corps de chasse et l'ancienne chapelle, encadrent cette entrée., en juillet 1794, le district de Rethel imposa à Alexandre Rouillé de Fontaine de démolir 2 tours et 4 tourelles, de fermer les meurtrières et de mettre à sec le fossé, du côté opposé de la rivière, réduisant le caractère défensif du bâtiment.  L'entrée est remarquable, avec sa porte charretière, surmontée d'un comble en forme de carène renversée, à la Philibert Delorme, couvert d'ardoises et surmonté d'un clocheton étroit. Deux pavillons bas et dissymétriques encadrent cette entrée. Éléments protégés MH : le porche d'entrée et le logis principal : inscription par arrêté du 24 avril 1946.              A 10 K.M. au sud à SERY, le château de Sery appelé le château d'en haut est un château bâti à Sery, se situe face à l'église. C'est une ancienne maison forte.","habitants":"Famille des  Pierre-Nicolas Caulet d'Hauteville.\"","divers":"Trois châteaux dans cet article ; Mesmont , Wassigny grav1-2-3-4 et Séry grav-5.  Mesmont   GPS : 49° 36' 47,16\" Nord, 4° 23' 56,76\" Est                              Wassigny  GPS : 49° 38' 09\" Nord, 4° 21' 25\" Est                                               Séry GPS : 49° 35' 03\" Nord, 4° 20' 58\" Est","gps":"49° 36' 47,16\" Nord, 4° 23' 56,76\" Est","images":["../image/image_08/08_Mesmont_Wassigny_1.jpg","../image/image_08/08_Mesmont_Wassigny_2.jpg","../image/image_08/08_Mesmont_Wassigny_3.jpg","../image/image_08/08_Mesmont_Wassigny_4.jpg","../image/image_08/08_Mesmont_Wassigny_5.jpg"]},"Consult_chateau_formulaire404a":{"id":"Consult_chateau_formulaire404a","dept":"08","canton":"Vouziers","commune":"Le Mont-Dieu","nom":"Mont_Dieu","type":"Château","periode":"XII","histoire":"Trois châteaux dans cet article le Mont-Dieu, Barbière, et la Huttes d'Ogny.                                                                                                                  Le MONT DIEU, c'est dans la solitude des forêts d'Ardenne que sera fondée en 1132 par Odon, abbé de Saint-Rémi, cette retraite où vivront les moines chartreux. L'abbaye fut plusieurs fois saccagée, et en particulier par les guerres de religion qui l'ont beaucoup éprouvée, et incendiée en 1568 elle fut reconstruite en 1617 avec des briques roses et noires et chainages en pierre taillée. Après l'expulsion des moines à la Révolution,  en 1793-1794 les bâtiments furent convertis en prison, également  en filature, les constructions, négligées et ruinées, furent peu à peu détruites par les propriétaires successifs. Mais en 1820  M. André Poupart de Neuflize, sedanais enrichi dans le commerce du drap, l'achète et sauve ce qui peut encore l'être de cette magnifique chartreuse qui avait presque totalement disparu. Transformation du bâtiment subsistant en maison d'habitation et maison de campagne de monsieur Poupart de Neuflize.\nÉléments protégés MH : l'ancienne chartreuse : inscription par arrêté du 28 février 1927. Le corps de logis, les pavillons Saint-Etienne et Saint-Bruno, les douves, les bâtiment des écuries, le bâtiment de la maréchalerie, le pavillon d'entrée et la maison du jardinier et le pavillon des Dames: classement par arrêté du 30 juillet 1946.","architecture":"BARBIERE est l'ex-propriété de la ville de Douchy-les-Mines, dans le Nord, depuis 1984, le 9 juin 2015. L'acheteur, Luc Hyndryckx, un Bruxellois, possède aussi une propriété dans les Ardennes. La propriété devrait proposer des chambres dhôtes et resteraient ouverte aux touristes. Le château de la Barbière a accueilli durant de nombreuses années des colonies de vacances, dont celles organisées par le comité dentreprise de Louvroil Usinor. La création d'un gite d'hôtes de grande capacité serait depuis en projet.                                                                                                                    A cinq K.M. à l'est à Stonne le château HUTTES D'OIGNY.  Nous ne possédons pas d'historique de ce château des Huttes dOgny, belle propriété située au milieu de beaux bois, au pied du mont de Stonne, dans cette région forestière de la rive gauche de la Meuse, qui prolonge lArgonne vers le Nord, dont les clairières sont jalonnées par danciennes abbayes devenues châteaux: la Cassine, le Mont-Dieu, Belval, en revanche le château est dorigine moins ancienne mais il possède boucoup de charme. Au XXe siècle, il appartenait à la famille Sanson, une des familles les plus anciennes bourgeoisement établies à Charleville et que la tradition disait issue dun de ceux qui étaient venus avec le duc de Nevers fonder la ville, au début du XVIIe siècle.","habitants":"M. André Poupart de Neuflize,\"","divers":"Trois châteaux dans cet article le Mont-Dieu grav-1-2-3 4.              Barbière  grav 7, et la Huttes d'Ogny grav-5-6                                                       Barbière GPS : 49° 32' 52\" Nord, 4° 51' 59\" Est                                                     Stonne GPS : 49° 33' 03\" Nord, 4° 55' 38\" Est","gps":"49° 32' 52\" Nord, 4° 51' 59\" Est","images":["../image/image_08/08_Mont_Dieu_1.jpg","../image/image_08/08_Mont_Dieu_2.jpg","../image/image_08/08_Mont_Dieu_3.jpg","../image/image_08/08_Mont_Dieu_4.jpg","../image/image_08/08_Mont_Dieu_5.jpg","../image/image_08/08_Mont_Dieu_6.jpg","../image/image_08/08_Mont_Dieu_7.jpg"]},"Consult_chateau_formulaire1653":{"id":"Consult_chateau_formulaire1653","dept":"08","canton":"Signy-l","commune":"Signy-l","nom":"Montaubois","type":"Château","periode":"XVIII","histoire":"MONTAUBOIS, Saint-Bernard, après le concile de Reims en 1135, fonda lAbbaye de Signy, fille dIgny, dont le territoire a contenu la Terre de Montaubois.  Le château appartient ensuite aux barons Seillière. Lors de la deuxième guerre mondiale le général Patton y séjourne. La propriété comprend un parc de quatre hectares, avec un potager de style médiéval, le bassin de Bacchus et une chapelle baroque restaurée.  La présentation de la fresque historique de six mètres de long, retraçant quinze siècles d'histoire, de Clovis au baron Ernest Seillère. La projection d'un diaporama, qui retrace les phases de restauration du château, dans la salle des séminaires ou dans l'une des deux autres salles si la première est occupée. Celui-ci est devenu un gite d'hôtes accueillant et se visite. Mr et Mme Monteil vous propose des chambres d'hôtes agréables dans un cadre magnifique.","architecture":"MONTAUBOIS, château de Montaubois se trouve route de Domery.  En lan 1793, après la Révolution, le château est construit avec les pierres, les pavages et les bois venant du démantèlement et de la vente des matériaux de lAbbaye, vendue aux enchères en 1793. La propriété comprend un parc de quatre hectares, avec un potager de style médiéval, le bassin de Bacchus et une chapelle baroque restaurée. Ouvert au public, la visite comprend les pièces du château (sauf celles éventuellement occupées en chambres d'hôtes). La visite du château y comprit toutes les salles. La présentation de la fresque historique (6m de long, retraçant 15 siècles d'histoire, de Clovis au baron Ernest Seillère de l'Académie Française.","habitants":"Famille du  barons Seillière.\"","divers":"GPS : 49° 41' 54\" Nord, 4° 25' 16\" Est","gps":"49° 41' 54\" Nord, 4° 25' 16\" Est","images":["../image/image_08/08_Montaubois_1.jpg","../image/image_08/08_Montaubois_2.jpg","../image/image_08/08_Montaubois_3.jpg"]},"Consult_chateau_formulaireb85e":{"id":"Consult_chateau_formulaireb85e","dept":"08","canton":"Bogny-sur-Meuse","commune":"Montcornet","nom":"Montcornet","type":"Vestiges","periode":"XII-XIII","histoire":"Deux châteaux dans cet article , Montcornet  et Arreux.         MONTCORNET, les premiers propriétaires furent les Montcornet. Au XIIIe siècle et XIVe siècle, la forteresse passa à Miles de Noyer, puis à la famille des Mello. En 1446, Antoine de Croy, chambellan de Philippe III de Bourgogne, le racheta et le reconstruisit presque dans sa totalité, et pour l'occasion l'adapta aux armes à feu. En 1613, Charles de Gonzague, qui est en train de faire construire à quelque distance de là, Charleville capitale de sa principauté d'Arches, l'achète. Le château passe aux mains des La Meilleraye, puis au duc d'Aiguillon qui le démantela vers 1760. Seules des ruines arrivèrent aux Chabrillan puis à Madame de Caumont la Force qui en 1961 accepta de céder les vestiges à l'abbé Bernard Lussigny qui, aidé par des associations locales, entreprit des réparations conservatoires et des fouilles. Depuis la mort de l'abbé, en décembre 2009, une association en est propriétaire et en assure la sauvegarde.\nÉléments protégés MH : les restes du château de Montcornet : inscription par arrêté du 19 juillet 1926.","architecture":"MONTCORNET,  est situé sur un éperon appelé Mont-cornu dominant la vallée et qui a été habité de la préhistoire jusqu'au XIe ou XIIe siècle, période de construction du château. Des fouilles ont permis d'établir que le castrum remonte au début de la féodalité les premiers propriétaires furent les Montcornet.  Château du XIIe siècle reconstitué suivant les plans du XVe siècle riche en architecture militaire. L'édifice est inscrit au titre des monuments historiques en 1926.                                                                                                                                                A un K.M à l'est à  ARREUX (propriété privée). Le château, construit en 1756 comme maison des champs du gouverneur de Mézières, a été largement reconstruit avec des modifications sensibles, notamment par la suppression du dernier étage en attique d'origine, après un incendie qui l'a complètement ravagé au début de la seconde guerre mondiale. On trouve dans son parc une orangerie construite au début du XIXe siècle. C'est l'une des rares qui existe encore dans les Ardennes françaises.","habitants":"Famille deCharles de Gonzague\"","divers":"Deux châteaux dans cet article , Montcornet grav-1-2  et Arreux grav-3-4.                                                 Arreux GPS : 49° 49' 32\" Nord, 4° 39' 09\" Est                                                       Montcornet  GPS : 49° 49' 48\" Nord, 4° 37' 39\" Est","gps":"49° 49' 32\" Nord, 4° 39' 09\" Est","images":["../image/image_08/08_Montcornet_1.jpg","../image/image_08/08_Montcornet_2.jpg","../image/image_08/08_Montcornet_3.jpg","../image/image_08/08_Montcornet_4.jpg"]},"Consult_chateau_formulairec8a0":{"id":"Consult_chateau_formulairec8a0","dept":"08","canton":"Bogny-sur-Meuse","commune":"Monthermé-Bogny","nom":"Monthermé_Bogny","type":"Château","periode":"XVIII-XIX","histoire":"Trois châteaux dans cet article, Crepel, le château de Georges Sand à Monthermé, Ména et Mercadet                                                                    A NOUZONVILLE, une douzaine de  châteaux tel que Crépel, Grandy, lepault, thomé, Soiret, Girodet, etc à Revin , la Tamisière était la propriété de l'industriel Faure, la Mariseraie celle de la famille Tilquin.                                                                                              Château de CREPEL  était d'un manufacturier de la famille de Léon -jules Crepel qui en firent don à l'institue religieuse  de sainte-thérése et le petit château de Nouzoville de  l'industriel Louis -Pierre  Lepault , ce château est devenu la propriété de la commune  utilisé par les services municipaux et un centre aéré.  Cette demeure historique, ancienne école, se transforme en lieu daccueil pour des événements.  Edifice limite XIXe siècle et XXe siècle.                                                                                     Le château MENA  est un château bâti à Monthermé, assez proche l'un de l'autre.","architecture":"Le château MARCADET est une maison bourgeoise bâtie à Bogny-sur-Meuse, construite au XIXe siècle pour un patron de la métallurgie ardennaise. En 1879, la famille Marcadet fonde à Bogny une entreprise de boulons. En 1889, Michel Marcadet acquiert un premier bâtiment existant sur le terrain, ainsi que des terrains avoisinant. Son fils Arthur-Paulin agrandit ce bâtiment en 1896. Il devient une grande demeure bourgeoise mêlant, dans sa décoration intérieure, bois, stucs, céramique et vitrail. Des vitraux à grisaille sont commandés en 1897, représentant le monde du travail et de la boulonnerie, et insérés dans des verrières d'inspiration Art nouveau. Ils furent déplacés en 1999 et sont, depuis, au musée de l'Ardenne à Charleville-Mézières il est inscrit aux M.H. depuis 2000.","habitants":"famille de Léon -jules Crepel\"","divers":"Trois châteaux dans cet article, Crepel grav-1, le château de Georges Sand à Monthermé grav-2, Ména grav 3 et Mercadet  grav-4                                          Mena GPS : 49° 53' 11\" Nord, 4° 43' 56\" Est                                                             Marcadet GPS : 49° 51' 51\" Nord, 4° 45' 30\" Est","gps":"49° 53' 11\" Nord, 4° 43' 56\" Est","images":["../image/image_08/08_Montherm%c3%a9_Bogny_1.jpg","../image/image_08/08_Montherm%c3%a9_Bogny_2.jpg","../image/image_08/08_Montherm%c3%a9_Bogny_3.jpg","../image/image_08/08_Montherm%c3%a9_Bogny_4.jpg"]},"Consult_chateau_formulairee518":{"id":"Consult_chateau_formulairee518","dept":"08","canton":"Villers-Semeuse","commune":"Neufmanil","nom":"Neufmanil","type":"Château","periode":"XVII","histoire":"deux châteaux dans cet article ; Neufmanil et Crepel.                             NEUFMANIL, village relevant de la seigneurie d'Orchimont depuis le XIIe siècle au moins ; tenu en fief par Jacquemart et Warnier de Neufmanil vers 1290 ; paroisse dans le pouillé antérieur à 1312 ; mention du chastelet de Neufmanil en 1449 ; en général aux mains de familles luxembourgeoises ou liégeoises dont la dernière est celle des Desprez de Barchon du XVIe au XVIIIe siècle ; existence d'un vieux manil antérieur au Neufmanil cité dès le XIIe siècle restant à prouver. En 1297, la famille de Neufmanil reçoit la haute justice du lieu des mains de Jacques d'Orchimont, Jean d'Esclassin et Errard de la Morteau tiennent le chastelet de Neufmanil en 1449 ; cette maison forte, de plan régulier en U, entourée d'eau, appartenait aux Desprez de Barchon au XVIe siècle. Le château de Neufmanil a été agrandi de deux ailes en 1753. Suite à l'incendie survenu en octobre 1941 reconstructions disparates sur les vestiges.","architecture":"a l'ouest à Nouzonville  le château CREPEL abrite, aujourd'hui, dans ses murs, une école. Cet édifice  dans un style Louis XIII à deux niveaux sur soubassements , lucarnes en chiens assis sur comble et flanqué d'échauguettes en encorbellement  sur les  angles,  édifice limite du XIXe siècle,  était d'un manufacturier de la famille de Léon-jules Crepel qui en firent don à l'institue religieuse  de sainte-Thérése et le petit château de Nouzonille de  l'industriel Louis -Pierre  Lepault , ce châteaux  est devenu la propriété de la commune  utilisé par les services municipaux et un centre aéré.  Cette demeure historique, ancienne école, se transforme en lieu daccueil pour des événements.","habitants":"Famille de  Desprez de Barchon \"","divers":"deux châteaux dans cet article ; Neufmanil grav-2 et Crepel grav-1.    Crepel  GPS : 49° 48' 57\" Nord, 4° 44' 45\" Est","gps":"49° 48' 57\" Nord, 4° 44' 45\" Est","images":["../image/image_08/08_Neufmanil_1.jpg","../image/image_08/08_Neufmanil_2.jpg"]},"Consult_chateau_formulairebff1-2":{"id":"Consult_chateau_formulairebff1-2","dept":"08","canton":"Attigny","commune":"Day","nom":"Neuville_Day","type":"Château","periode":"XIII-XVIII","histoire":"Deux châteaux dans cet article Day et Mont-de-Jeux                                NEUVILLE-DAY, la construction date de 1770. Le donjon de Day, La tradition veut que cette demeure fortifiée ait été construite à partir de l'an 1243, par Sigebaud, seigneur de Day, compagnon d'armes du roi Saint-Louis lors de sa première croisade. Le 25/12/1390, un ouragan endommage le château de Neuville-Day. Les Bohan héritent du château vers 1430, le remettent en état et le conservent durant 200 ans. Les armes qui figurent sur la cheminée du 2ème étage du donjon sont celles de Gobert de Bohan et Isabeau de Ligneville, mariés en 1498. Au XVIIe siècle, la seigneurie devint la propriété du maréchal de Schulemberg. Un passage souterrain permettrait de communiquer entre ce château et celui du maréchal de France, à Mont-de-Jeux. Un départ voûté fut découvert. Le maréchal de Schulemberg le transmit à Marie d'Estoquoy. Le château devint ensuite la propriété des comtes d'Ancelet. Il subira un incendie au XVIIIe siècle qui détruisit une bonne partie de ses bâtiments. Le vicomte d'Ancelet le vendit en 1828 à la famille Guilly. En 1868, il sera revendu à Jean-Baptiste Capitaine, aubergiste à Vaux-Montreuil, et devint la propriété de Louis Gilles, son gendre. Le docteur Charles Gilles, fils du précédent et médecin de Rosa Bonheur, y aménage. Sa veuve procède à sa mort à des fouilles désordonnées, à la recherche d'un éventuel trésor.  Deux légendes sont liées au château du donjon de Day : la première légende raconte que Fodebert, seigneur du lieu, y emprisonna sa nièce Régina, dans un cachot, sous la petite tour, tandis que son fiancé, Ingebrand, était en croisade.","architecture":"DAY suite, Le fourbe Fodebert proposa à Régina d'épouser son fils, sans succès. A son retour de Terre sainte, Ingebrand provoqua en combat le cruel Fodebert, qui fut battu, libéra Régina sa bien-aimée et fit périr son adversaire, dans d'horribles supplices. L'âme de Fodebert, depuis, errerait la nuit au sommet de la tourelle. La seconde légende raconte que Bucelin, seigneur de Day, fou de jalousie, construisit le donjon pour y enfermer son épouse. Il la soupçonnait en effet d'aimer un seigneur voisin. Elle y mourut sept ans après, selon les uns, trente ans après, selon les autres. Cette légende semble en fait s'inspirer d'un fait divers du pays : en 1579, François de Wignacourt, seigneur de Montgon, avait assassiné sa femme Nicole de Villers par jalousie. Une plaque dans l'église de Montgon en témoigne encore. La seigneurie de Montgon, comme celle de Neuville-Day, appartenait aux Bohan. Les vestiges du château sont restaurés par M. Fabrega, propriétaire depuis 1984. Le donjon de Day est inscrit aux M.H. depuis le 9/06/1987.  le donjon est accollé d'une tourelle sur son flanc, escalier à vis déservant les trois niveaux.                                                            MONT de JEUX,   fut construit vers 1660 par le maréchal de France Schulemberg. Jean de Schulemberg, comte de Mont-de-jeu, militaire, fut lieutenant général de l'Artois. Né en 1597, il mourut  en 1671. Sans descendance directe, ses neveux le vendirent en 1767. La première guerre mondiale endommagea le château puis il fut entièrement détruit par l'artillerie française en mai 1940 et reconstruit en 1959. Le portail, de la fin du XVIIIe siècle, est situé dans le bâtiment nord construit en 1857. La famille d'Achon, héritière aujourd'hui du domaine, utilise la chapelle comme lieu de sépulture. Éléments protégés MH : le portail ; les façades nord et sud ; la voûte avec le passage voûté sur croisées d'ogives et la toiture: inscription par arrêté du 14 février 1995.","habitants":"Day- Maréchal de Schulemberg                          Famille Guilly. Et de Bohan\"","divers":"Neuville GPS : 49° 30' 56\" Nord, 4° 59' 05\" Est   Donjon de Day  grav-2  GPS : 49° 30' 16,51\" Nord, 4° 40' 46,55\" Est","gps":"49° 30' 56\" Nord, 4° 59' 05\" Est   Donjon de Day  grav-2  GP","images":["../image/image_08/08_Neuville_Day_1.jpg","../image/image_08/08_Neuville_Day_2.jpg"]},"Consult_chateau_formulaire3fc4":{"id":"Consult_chateau_formulaire3fc4","dept":"08","canton":"Olly","commune":"Illy","nom":"Olly","type":"Château","periode":"XVIII-XIX","histoire":"OLLY, on ignore si le château  et ses dépendances  ont été construits dans le cadre des activités industrielles qui s'y sont développées où si celles-ci se sont implantées sur le domaine et château existants auxquels ont été effectués des travaux et aménagements nécessaire à une exploitation.  Les premières traces d'une quelconque activité sont celles d'une briqueterie dont la cheminée, toujours existante, est ornée d'une plaque portant la date de 1858. L'activité principalement connue qui y fut exercée était celle d'une filature. De nombreuses autres filatures ont existé dans la région, probablement dynamisées par l'industrie textile florissante dans la région Sedanaise de l'époque, et notamment la fabrique de Tapis Point de Sedan alors très répandus, mais également par l'exploitation du potentiel hydraulique de la région. La ligne de chemin de fer dite « Le Bouillonais » des Chemins de fer départementaux des Ardennes (CFDA) passant par Olly aura d'ailleurs certainement participé au développement de la filature. Le château d'Olly fut le siège de l'ambulance Hollandaise pendant la bataille de Sedan en 1870. Une plaque d'information touristique devant le château décrit cet événement. Le château a été acquis en 2015 par Jérôme Counet et Jérôme Antoine qui ont entrepris sa restauration. Ils filment chaque étape de la restauration et les diffusent sur Youtube, sur la chaîne Les Jérômes.","architecture":"OLLY. A l'heure actuelle, il n'y a pas de trace écrite ou plans retraçant la construction et les diverses modifications qui ont été apportées aux bâtiments. Il est vraisemblable qu'au fil du temps, vu les activités exercées, des travaux et aménagements spécifiques ont été réalisés , modifiant ainsi le site et les bâtiments.  La date de construction et la fonction de l'annexe attenante au château, dite « L'Orangerie » restent assez floues. Celle-ci semble être antérieure aux années 1900 où elle apparaît déjà sur les photos. Dans les années 1960/1970 la toiture fut refaite en Eternit et les Chiens-assis retirés, laissant juste une toiture en plans.  En 1995, d'importantes inondations ont lieu dans la région  et une grosse crue de la Givonne détruisit tout ou en partie quelques aménagements du système de gestion de l'eau, notamment partiellement la prise d'eau de la Givonne et complètement une déviation artificielle du cours d'eau située en aval. Celle-ci alimentait la prise d'eau de la pêcherie voisine, aujourd'hui seulement alimentée par la Hatrelle, la Givonne ayant repris son cours naturel.","habitants":"Famille de Jérôme Counet \"","divers":"49° 44' 42? nord, 4° 58' 34? est1","gps":"","images":["../image/image_08/08_Olly_1.jpg","../image/image_08/08_Olly_2.jpg"]},"Consult_chateau_formulaire1baa":{"id":"Consult_chateau_formulaire1baa","dept":"08","canton":"Rethel","commune":"Neuflize","nom":"Paté_Neuflize","type":"Manoir","periode":"XVII","histoire":"PATE, le château Paté est un petit château bâti à Neuflize,  La famille Poupart maréchal de Schulemberg fit construire des ateliers et un château, il fut partiellement détruit pendant la première guerre mondiale. Il a été rénové depuis. Des ateliers de filature, il ne reste que la salle municipale et un bâtiment abandonné. Ces bâtiments sont inscrits à l'inventaire du patrimoine. Le château Paté est privé.","architecture":"PATE, la famille Poupart y construisit des ateliers et un château. . Ces bâtiments sont inscrits à l'inventaire du patrimoine.L'habitat patronal a été trouvé d'une grande variété allant de l'habitat modeste  au château des barons de l'industrie. Les vastes demeures bâties surtout à partir de 1870-1880 montrent des styles éclectiques et ostentatoires communs à l´architecture bourgeoise de l´époque ; elles bénéficient du confort moderne. Le château s'orne en façade arrière d'un élégant avant-corps hémi-circulaire à la dernière mode. Le secteur textile vit la même évolution que pour la métallurgie, avec la construction après le milieu du XIXe siècle de vastes demeures de style éclectique, tel par exemple que le château Paté à Neuflize. Tout comme les maisons patronales liées à l'agroalimentaire ; secteur où l'on trouve quelques beaux exemples dans le style de l'entre-deux-guerres .","habitants":"Maréchal de Schulemberg  et la  Famille Poupart\"","divers":"GPS : 49° 24' 42\" Nord, 4° 18' 20\" Est","gps":"49° 24' 42\" Nord, 4° 18' 20\" Est","images":["../image/image_08/08_Pat%c3%a9_Neuflize_1.jpg","../image/image_08/08_Pat%c3%a9_Neuflize_2.jpg"]},"Consult_chateau_formulaire26e4":{"id":"Consult_chateau_formulaire26e4","dept":"08","canton":"Château_Porcien","commune":"Wignoncourt","nom":"Porcien","type":"Château","periode":"XV-XVI","histoire":"PORCIEN, en 1243, Nicolas de Rumigny (1190/1257) et son épouse, Isabeau de Boves de Coucy (1192/1265) cèdent le moulin de Juisse à Jean Pain de Soile, prévôt de château-Porcien.\nEn 1650, lors de la Fronde, la ville se rend après un siège à Henri de la Tour dAuvergne dit Turenne (1611/1675). Elle est reprise au printemps 1654 par larmée royale française.  En 1608 : le Porcien est vendu à Charles Ier Gonzague de Mantoue (1580/1637), duc de Nevers et de Rethel et passe ainsi à la maison de Gonzague ;\nEn 1659 : il passe à Jules Raymond Mazarini (1602/1661 portrait de droite) cardinal de Mazarin ; Puis : en 1661 il entre dans la Famille de La Porte de La Meilleraye ;  en 1738 dans la maison de Durfort ; en 1781 dans la maison d'Aumont de Rochebaron.  Le titre séteint en 1826 avec Louise Félicité d'Aumont de Rochebaron (1759/1826) duchesse de Rethel-Mazarin, épouse en 1777 de Charles-Anne de Grimaldi, prince Honoré IV de Monaco (1758/1819). Il est relevé en 1826 par la maison Grimaldi, souverains de Monaco descendants du cardinal de Mazarin, et est toujours porté de nos jours par Albert II de Monaco (1958), prince souverain de Monaco, duc de Mazarin et prince de château-Porcien entre autres.  Les 9 et 10 juin 1940, les Allemands traversent la ville après avoir franchi lAisne, malgré une forte résistance de larmée française.","architecture":"PORCIEN, maison forte avec porte du XVIe siècle et Le château-fort, ruiné en 1347 par les anglais, est reconstruit par Antoine de Croÿ dit le grand (1385/1475) au XVe siècle.\nSes ruines servent à la reconstruction des habitations de la ville après les incendies.","habitants":"Henri de la Tour dAuvergne\"","divers":"Maison forte grav2                                         Latitude: 49° 31' 46'' Nord\nLongitude: 04° 14' 45'' Est\nMairie grav-3","gps":"","images":["../image/image_08/08_Porcien_1.jpg","../image/image_08/08_Porcien_2.jpg","../image/image_08/08_Porcien_3.jpg"]},"Consult_chateau_formulaireff42":{"id":"Consult_chateau_formulaireff42","dept":"08","canton":"Vouziers","commune":"Maisoncelle-et-Villers,","nom":"Raminoise","type":"Maison forte","periode":"XV-XVI","histoire":"deux châteaux dans cet article Raminoise et Villers.                                      RAMINOISE, cette belle maison forte, superbement entretenue, isolée au sud de la commune, à proximité du bois de Raucourt, près d'un étang, est inscrite aux M.H. depuis le 20/01/2003. C'était autrefois un imposant donjon carré, construit au XVe-XVIe siècle, et depuis, est arasé. Il sera agrandi au XVIe siècle, avec deux ailes en retour, mais le projet initial semble ne pas avoir été terminé. L'ensemble était entouré d'eaux vives. On accédait à la maison forte de la Raminoise par son pont-levis. En 1622, elle sera pillée par les troupes d'Ernst von Mansfeld, puis sera incendiée, en 1650, par les Croates. Avant la Révolution, la seigneurie a été détenue,  par les Tige, la branche ainée des Villelongue, les Galopin, les Lhostel, les Mecquenem et les Wacquant. Puis, en 1561, Blanche de Villelongue épouse Jacques de Tige. A l'occasion de ce mariage, une taque sera fondue, représentant les armoiries accolées des 2 familles, surmontées de la devise des Tige : \"Mourir pour ses amis ou vaincre ses ennemis\". Cette plaque de cheminée est toujours présente à la Raminoise. Les Wacquant possèderont la maison forte de la Raminoise, jusqu'en 1928. La même année, ils la vendent. En 1973, rachetée par la famille Visseaux, la maison forte de la Raminoise sera restaurée avec beaucoup de soin. En 1991, elle est vendue à la famille Lisart qui en a fait une exploitation agricole.","architecture":"VILLERS, bâtiment fortifié construit dans la première moitié du XVIe siècle.  De  plan rectangulaire avec tour circulaire au trois angles et une tour d'escalier au centre de la façade nord. Modification au XVIIIe siècle, date 1741 sur la façade sud: percements. A l'intérieur, bâtiment composé aux deux niveaux de deux pièces séparées par un couloir conduisant à l'escalier en vis en bois. La distribution intérieure symétrique a été conservée. Aménagement intérieur de qualité ( peinture de plafond, escalier, cheminées ). Éléments protégés MH : le château en totalité et l'emplacement des anciennes douves : inscription par arrêté du 13 mars 2000.","habitants":"Famille de Jacques de Tige.\"","divers":"deux châteaux dans cet article Raminoise grav 3-4 et Villers grav-1-2.       Raminoise  grav 1GPS : 49° 34' 23\" Nord, 4° 55' 14\" Est                             Villers grav 2-3","gps":"49° 34' 23\" Nord, 4° 55' 14\" Est","images":["../image/image_08/08_Raminoise_1.jpg","../image/image_08/08_Raminoise_2.jpg","../image/image_08/08_Raminoise_3.jpg","../image/image_08/08_Raminoise_4.jpg"]},"Consult_chateau_formulaire51a7":{"id":"Consult_chateau_formulaire51a7","dept":"08","canton":"Rocroi","commune":"Rimogne","nom":"Rimogne","type":"Château","periode":"XVIII","histoire":"quatre châteaux à Rimogne, Bois -Châtelain, l'Enclos, Rousseau et l'Ardoisière.                                                                                                            RIMOGNE L'ARDOISIERE  Le nom de Rimogne apparaît pour la première fois dans un acte signé par Pierre de Montcornet, seigneur du lieu en 1158. Il consiste en une concession de terrain accordée aux religieux de Signy pour l'exploitation d'une ressource minérale, l'ardoise. D'autres chartes suivent renouvelant cette autorisation et l'étendant. En 1220, les religieux de l'abbaye de Foigny entrent dans l'exploitation de l'ardoise, obtenant également une concession des seigneurs de Montcornet, suivis de l'abbaye de Bonnefontaine en 1247. Les religieux se partageront les ressources jusqu'au XVIe siècle, date à laquelle ils vendent leurs possessions. Les laïcs entrent en jeu. Le souvenir des moines est encore présent dans le village à travers le lieu-dit et la rue de Bonne-Fontaine.                                                BOIS-CHATELAIN, est un édifice construit  au XVIIIe siècle dans le bourg de Rimogne. Autrefois le marquis de Bérulle et la famille Teissier, propriétaire des Ardoisières, résidaient au château. Situé à la sortie du village, il fut brûlé en 1944 mais il fut reconstruit à l'identique. Depuis, il abrite des logements privés, gérés par Habitat 08, l'office public de l'habitat des Ardennes.  Abrite des appartements privés.","architecture":"ROUSSEAU,  est une demeure historique des propriétaires des Ardoisières. Le château des Rousseau de Rimogne est situé le long de la route nationale. Tout près se situait également la maison de Monchy, qui fut bombardée en mai 1940. Si la Révolution fait cesser les privilèges, Rimogne reste sous la coupe d'une famille longtemps encore : les Rousseau de Rimogne. Cette famille s'implante à Rimogne avec Jean Louis Rousseau vers 1779. Les Rousseau règnent en maître sur le village, possédant rapidement la presque totalité des tréfonds de la commune. Habitant une riche bâtisse surnommée le château Rousseau, on les retrouve alliés à la famille De Noirfontaine et à la famille De Vaillant de Monchy.                                                                                                                         L'ENCLOS,  Il existe plusieurs châteaux à Rimogne. Le seigneur, propriétaire du château de l'Enclos, paya, au temps des guerres d'Italie, la somme de 100 Ecus, pour la rançon de François 1er, roi de France, qui était prisonnier à Madrid. Le château de l'Enclos fut vendu, en 1529. Pendant de longues années, une brasserie a été établie dans ses murs. Le château de l'Enclos est devenu, aujourd'hui, une ferme. Il ne reste aujourd'hui, que le corps principal, la grande salle et la tour du château de l'Enclos.","habitants":"Famille Teissier\"","divers":"quatre châteaux à Rimogne, Bois -Châtelain grav 2-3, l'Enclos grav-4-5, Rousseau grav-6  et l'Ardoisière grav-1 .                                                          Bois Châtelain                                                  GPS : 49° 50' 24,66\" Nord, 4° 32' 15,54\" Est                                                            L'enclos  GPS : 49° 50' 29\" Nord, 4° 32' 19\" Est                                                      Rousseau r GPS : 49° 50' 29\" Nord, 4° 32' 19\" Est","gps":"49° 50' 24,66\" Nord, 4° 32' 15,54\" Est","images":["../image/image_08/08_Rimogne_1.jpg","../image/image_08/08_Rimogne_2.jpg","../image/image_08/08_Rimogne_3.jpg","../image/image_08/08_Rimogne_4.jpg","../image/image_08/08_Rimogne_5.jpg","../image/image_08/08_Rimogne_6.jpg"]},"Consult_chateau_formulaireb371":{"id":"Consult_chateau_formulaireb371","dept":"08","canton":"Vouziers","commune":"Chéhéry","nom":"Rocan","type":"Château","periode":"XV","histoire":"ROCAN , c'est le seigneur Raoul II de Coucy-Vervins, second fils de Raoul et d'Hélène la Chapelle, qui fait bâtir en 1555 à Chéhéry sur un roc un château nommé Rocan, face à la vallée de la Bar. Le château passe à la famille de Régnier par alliance avec les Escannevelle. En mars 1789, François IV de Régnier, modeste seigneur de Vrigneux en Thiéache et de Rocan, se retire de larmée après de bons et loyaux services et sinstalle dans le rocailleux château de Rocan. Ce mois de mars 1789, les habitants de la paroisse rédigent leurs cahiers de doléances. Ces cahiers ne sen prennent pas à lautorité seigneuriale et sils réclament des fusils, cest contre les loups.  Le premier juin 1792 des coups de feux éclatent,ainsi que  des pierres sont projettés, des vitres volent en éclat, alors que les de Régnier sont en train de dîner dans leur château de Rocan. Ce sont quelques habitants de Chéhéry auxquels se sont joints des sans-culottes venus de Mouzon. Personne nest blessé, mais le départ est décidé, la famille de Régnier abandonne le château.  Parvenu au Luxembourg puis en Allemagne, François de Régnier se rend à Coblenz dans lArmée des Princes. Après la campagne sans gloire en Lorraine et Argonne, et la dissolution de cette armée des Princes à Arlon, il se rend en Autriche. Lui et sa famille y vivent misérablement : il taille des sabots et les vend de porte en porte et sa femme fait des lessives. Pendant ce temps, la commune de Chéhéry prend fait et acte de son émigration. Le château est vendu comme bien national.","architecture":"ROCAN, l'édifice comprend un puissant corps d'habitation, carrée, de dix mètres de côté, avec deux tours cylindriques, accolées, sur deux angles opposés. La partie principale et les tours ont une même élévation, sur trois niveaux. Un escalier, placé dans la tour cylindrique située à l'arrière lorsqu'on observe le château de la vallée, dessert les trois niveaux. L'aspect rocailleux et féodal est donné par la forme générale, et par les maçonneries, épaisses, et parementées en assises de grands blocs rectangulaires taillés en bossages rustiques. Des consoles en saillie au niveau de la corniche subsistent d'une bretèche aujourd'hui disparue. Les tours cylindriques sont munies de canonnières à ébrasement rectangulaire se substituant aux blocs de pierre.  Le bâtiment passe de propriétaire en propriétaire, avec une première restauration en 1838, un peu malheureuse puisqu'elle transforme l'aspect extérieur en multipliant les fenêtres, puis celle en cours depuis 1973, plus fidèle au bâtiment initial. Entre une photographie du château en 1963, et une photographie quelques décennies plus tard, on constate un travail de restauration, en particulier sur les ouvertures pour leur rendre leur forme originelle, les murs sont à bossages et percés de meurtrières, il fut défiguré en perçant les portes en élevant une verrière et des murs à l'emporte pièce.\nÉléments protégés MH : les façades et les toitures du château et du pavillon d'entrée : inscription par arrêté du 23 février 1981.","habitants":"famille de Régnier\"","divers":"Château de Rocan à Chéhéry","gps":"","images":["../image/image_08/08_Rocan_1.jpg","../image/image_08/08_Rocan_2.jpg","../image/image_08/08_Rocan_3.jpg","../image/image_08/08_Rocan_4.jpg"]},"Consult_chateau_formulaire2134":{"id":"Consult_chateau_formulaire2134","dept":"08","canton":"Villers-Semeuse","commune":"Issancourt et Rumel,","nom":"Rumes_Fort","type":"Château","periode":"XV","histoire":"FORT DE RUMES  Première mention du château de Rumes en 1030 appartenant à Gérard de Rumes capitaine des gardes de la cité d'Arches. Cette famille en demeura propriétaire jusqu'au XVe siècle. On y trouve Jean de Boudan vers 1546, puis la famille de Warigny. Jacqueline de Warigny fille de Nicolas, seigneur de Rumes, épouse en 1572 Antoine d'Aguisy, seigneur de Mainbresson, en Thiérache ardennaise, homme d'armes des ordonnances du Roi. Leur fils, François d'Aguisy, seigneur de Rumes, épouse en 1610 Suzanne de Lescuyer; il est dit demeurant à Rume en 1619, en 1633 et  en 1635, l'année de sa mort. Cité en 1716 comme demeurant en sa maison forte et château de Rumes, Jean d'Aguisy est en 1755 encore seigneur d'Issancourt et de Rumes. Le 17 octobre 1766, Henri-Claude d'Ivory achète la terre et seigneurie de Rumes et Issancourt. Lui succède son fils Amédée-Gédéon-Louis d'Ivory, chevalier de Saint-Louis, major des ville et citadelle de Bouillon, seigneur d'Issancourt et de Rumes.  Jacques et Jacqueline devinrent propriétaires en 1988. Jacques exploita la ferme familiale jusqu'en 1991, date à laquelle s'est installé son neveu, Jean-Yves Rentier\nEn 2006, Martine et Jean-Yves Rentier  en deviennent propriétaires , Jean-Yves exploite toujours la ferme familiale.","architecture":"FORT DE RUMES Cité en 1716 comme demeurant en sa maison forte et château de Rumes, édifice carré à deux niveaux, toit en croupe, tour ronde approximité avec toit en poivrières.","habitants":"Famille de Warigny\"","divers":"château fort de Rume","gps":"","images":["../image/image_08/08_Rumes_Fort_1.jpg","../image/image_08/08_Rumes_Fort_2.jpg"]},"Consult_chateau_formulaire60d8-2":{"id":"Consult_chateau_formulaire60d8-2","dept":"08","canton":"Vouziers","commune":"Rémilly-Aillicourt","nom":"Rémilly_Aillicourt","type":"Manoir","periode":"XVIII","histoire":"REMILLY,  cette demeure construite au XVIIIe siècle a été fondée par un manufacturier sedanais. Ce très bel édifice de caractère possède d'anciennes écuries. Il a été racheté en 1977 par Philippe et Claudine Mathieu, professeurs désormais à la retraite qui s'efforcent de restaurer la demeure. En effet, celle-ci a subi des dommages pendant la seconde guerre mondiale. Au bout de 34 ans, la famille Mathieu a réalisé son rêve de sauvetage et peut désormais se consacrer à l'entretien des cinq hectares du domaine.  La construction de cet ancien chateau fort date du XVIIIe siècle. Le château de Rémilly-Aillicourt est  privé, fermé au public.\nDerrière : un jardin à la française dans un parc de deux hectares. Il a été la résidence de François- Félix Dorival, chancelier du Duché de Boillon et celle du général baron Béchet de Léocour, aide de camp du maréchal Ney.","architecture":"REMILLY, le château est un bâtiment de style Louis XV construit en 1774 pour un manufacturier en drap Sedanais. Sur lavant il présente une cour fermée avec deux ailes en quart de cercle. Nous y faisons depuis presque 40 ans des travaux de restauration qui se poursuivent encore aujourdhui.  Éléments protégés MH : les façades et les toitures du corps de bâtiment central et des deux ailes en retour avec les pavillons, l'escalier intérieur avec sa rampe en fer forgé, le mur de clôture de la cour d'honneur avec les deux piliers de l'entrée : inscription par arrêté du 3 avril 1984.\nOn peut voir également dans cette commune l'église fortifiée datant du XVIe siècle et inscrit MH par arrêté du 28 avril 1938.","habitants":"famille Mathieu\"","divers":"Rémilly   GPS : 49° 39' 6,33\" Nord, 4° 59' 39,98\" Est","gps":"49° 39' 6,33\" Nord, 4° 59' 39,98\" Est","images":["../image/image_08/08_R%c3%a9milly_Aillicourt_1.jpg","../image/image_08/08_R%c3%a9milly_Aillicourt_2.jpg","../image/image_08/08_R%c3%a9milly_Aillicourt_3.jpg"]},"Consult_chateau_formulaire8261":{"id":"Consult_chateau_formulaire8261","dept":"08","canton":"Sedan","commune":"Donchery","nom":"Sautou","type":"Manoir","periode":"XIX","histoire":"SAUTOU,  ce petit manoir du XIXe siècle, Georges Corneau, qui voulait en faire un rendez-vous de chasse, cet édifice isolé, entouré par quinze hectares de terrain et par la forêt ardennaise a fait la une des journaux. En effet il fut la résidence du tueur en série Michel Fourniret qui  avait pu acheter ce château, grâce au magot du gang des postiches, sur lequel il avait réussi à mettre la main, en assassinant l'épouse d'un prisonnier qui était incarcéré avec lui. Il avait revendu son château en 1991, quelques mois après les enlèvements des filles, cinq ans plus tard, le château a été aménagé en gite par un couple d'Ardennais. Revendu en 2003, il est depuis occupé par ses nouveaux propriétaires, un couple de pharmaciens belges originaires de Namur. Les restes des corps de Jeanne-Marie Desramault et d'Élisabeth Brichet, deux de ses petites victimes, disparues le 18 mars 1989 à Charleville-Mézières et le 20 décembre 1989 à Saint-Servais en Belgique, ont été retrouvés, dans le bois, le 3/07/2004.","architecture":"SAUTOU, château à la façade ocre, haut de trois étages, encadré par deux tourelles. Il a été construit en 1871 pour l'ancien maire de Charleville-Mézières et député radical-socialiste de la IIIe République,  Le château du Sautou est depuis un château privé, fermé au public.","habitants":"Famille de Georges Corneau\"","divers":"GPS : 49° 45' 20\" Nord, 4° 52' 34\" Est                                                                      Croix-Piot GPS : 49° 41' 50\" Nord, 4° 52' 31\" Est","gps":"49° 45' 20\" Nord, 4° 52' 34\" Est","images":["../image/image_08/08_Sautou_1.jpg","../image/image_08/08_Sautou_2.jpg"]},"Consult_chateau_formulairea782":{"id":"Consult_chateau_formulairea782","dept":"08","canton":"Sedan","commune":"Sedan","nom":"Sedan","type":"Forteresse","periode":"XV-XVI","histoire":"Trois édifice dans cet article Sedan Bas , le Fort et Dijonval.                Château BAS de SEDAN, le site du château était occupé au XVIe siècle par un quartier dit \"du moulin\", entouré d'une fortification, et surplombé par une haute terrasse destinée aux pièces d'artilleries. La construction du château bas, au début du XVIIe siècle, détruit ce quartier dont il ne subsiste plus qu'une maison. A cette époque, est élevé un bastion de Turenne qui englobe le fer à cheval et se termine par l'imposante traverse qui clôt la cour à l'arrière du château. Le bastion a été détruit à la fin du XIXe siècle.  Éléments protégés MH : les façades et les toitures du bâtiment du XVIIe siècle, dit \"Château-Bas\", à l'exclusion de toutes dispositions intérieures : classement par arrêté du 22 décembre 1952. Les constructions situées dans la cour du \"Château-Bas\" : maison du XVIe siècle; corps de garde ; magasin  ; grande traverse  ; mur fermant la cour au nord-ouest : inscription par arrêté du 26 mars 2003.                                                                                                                     DIJONVAL Lors de la création, en 1646, de la manufacture royale du Dijonval, Sedan, nouvellement rattachée à la France, devint le premier centre de fabrication de draps fins \"procédé façon de Hollande\". Le Dijonval fut pendant plus de 300 ans un lieu de travail industriel où se succédèrent des milliers d'hommes et de femmes qui ont fait la grandeur et la renommée du textile sedanais. Les bâtiments subsistants encore aujourd'hui, qui évoquent plus un palais qu'une usine, sont un superbe exemple de l'architecture du XVIIIe siècle. Seule la façade et la cour intérieure peuvent être visibles.","architecture":"FORT DE SEDAN, c'est en 1424 à l'occasion du rachat de la seigneurie de Sedan à Guillaume de Braquemont, son beau-frère, qu'Evrard de la Marck a fait construire un premier château qui englobait un prieuré. Ce château triangulaire fut très largement agrandi et renforcé par les descendants d'Evrard, huit princes et une princesse firent du château-fort, \"le Géant de Sedan : le plus grand château-fort d'Europe avec 35000 m² de superficie\". Pour faire face aux exigences imposées par le développement de l'artillerie Robert II de la Marck engage, en 1500, une nouvelle campagne de travaux, avec remparement, terrassement, et renforcement des murailles. Construction de quatre bastions polygonaux qui vont faire de Sedan, en 1550, une forteresse plus redoutable que jamais. Entreprise sous Robert IV de la Marck et achevée sous Henri Robert de la Marck, cette dernière étape fut importante dans l'histoire du château. La dernière descendante des de La Marck, Charlotte, épouse Henri de la Tour d'Auvergne en 1591. Elle meurt très jeune en laissant son château et ses titres à son époux Henri de la Tour d'Auvergne épousera Elisabeth de Nassau en seconde noce. De cette union naquit Turenne en 1611. Son frère aîné, Frédéric Maurice de la Tour d'Auvergne, suite au complot du 5 Mars, 1642,  Racheté par la couronne et donne le château et la principauté de Sedan à Louis XIII pour sauver sa tête. Le château-fort restera domaine militaire pendant plus de trois siècles. Le château avec ses quatre bastions devient la propriété de Sedan est classé MH par arrêté du 4 janvier 1965.\nC'est aujourd'hui le plus grand château-fort d'Europe du Moyen-Age. Gigantesque, montant sur sept niveaux, le bâtiment est toujours impressionnant. Éléments protégés MH : le château en totalité, y compris ses quatre bastions : classement par arrêté du 4 janvier 1965.","habitants":"Henri Robert de la Marck\"","divers":"Trois édifice dans cet article Sedan Bas , le Fort et Dijonval grav 3  Château bas grav-2 GPS : 49° 42' 6,8\" Nord, 4° 56' 53,39\" Est\nFort de sedan grav-4-5     GPS : 49° 42' 07\" Nord, 4° 56' 58\" Est","gps":"49° 42' 6,8\" Nord, 4° 56' 53,39\" Est","images":["../image/image_08/08_Sedan_1.jpg","../image/image_08/08_Sedan_2.jpg","../image/image_08/08_Sedan_3.jpg","../image/image_08/08_Sedan_4.jpg","../image/image_08/08_Sedan_5.jpg"]},"Consult_chateau_formulaire75ea":{"id":"Consult_chateau_formulaire75ea","dept":"08","canton":"Charleville-Mézières","commune":"Fagnon","nom":"Sept_Fontaines","type":"Château","periode":"XVII","histoire":"SEPT-FONTAINES,  l'abbaye des Prémontrés fut fondée, en 1129, par Hélie, seigneur de Mézières et reconstruite au XVIIe siècle. En 1794, monsieur Presolles devient le premier propriétaire privé de Septfontaines,  Pendant la première guerre mondiale, le château fut le quartier général du Général Joffre, après son repli, lempereur Guillaume II en fit un casino où il venait prendre la thé. A partir de la deuxième moitié du XIXe siècle différentes transactions et héritages amenèrent le domaine dans la famille dYvonne Vendroux (épouse du Général de Gaulle). Entre les Deux guerres Charles de Gaulle et son épouse venaient se ressourcer. transformer aujourd'hui en hôtel restaurant par Michel Nicolle","architecture":"SEPT-FONTAINES, l'abbaye fut fondée, en 1129,  mais ce sont les descendants du Vicomte de Rémond qui marquèrent le plus leur empreinte labbaye avec la suppression du cloître et des deux ailes, et la construction de deux tours de chaque coté de la bâtisse.  Elle a subi de nombreux remaniements architecturaux de la Révolution Française à la première guerre mondiale et affiche la structure dun château à trois niveaux flanqué de deux tourelles, à lesthétique classique du XVIIe siècle insufflée alors par François Mansart.  Éléments protégés MH : les façades et les toitures du bâtiment subsistant : inscription par arrêté du 12 juin 1980.","habitants":"Famille de Monsieur Presolles                               famille dYvonne Vendroux (épouse du Général de Gaulle\"","divers":"GPS : 49° 44' 44,52\" Nord, 4° 38' 11,33\" Est","gps":"49° 44' 44,52\" Nord, 4° 38' 11,33\" Est","images":["../image/image_08/08_Sept_Fontaines_2.jpg"]},"Consult_chateau_formulaire9100":{"id":"Consult_chateau_formulaire9100","dept":"08","canton":"Nouvion-sur-Meuse","commune":"St-Marceau","nom":"St_Marceau","type":"Château-fort","periode":"XV-XVI","histoire":"SAINT-MARCEAU,  construit par la famille de La Glizeulle, dont la construction date du XVIIe et XVIIIe siècles. C'est un édifice défensif, réaménagé les siècles suivants.  Par le jeu des alliances matrimoniales, le domaine revient à une branche de la famille de Pouilly, à la fin du XVIe siècle. Il fut aménagé par Claude de Pouilly, épouse de Philippe de Barge, puis d'Antoine de Greffin, Huguenot lui aussi et proche de Turenne. Antoine de Greffin et Claude de Pouilly décèdèrent, tous deux, dans cette demeure, le premier en 1686 et la seconde en 1701. Au XVIIIe siècle, Charles François de Paul d'Herville continue à améliorer l'habitabilité de la demeure initialement défensive, en faisant agrandir les fenêtres. Il resta sur place durant la Révolution, fut arrêté et emprisonné à la Chartreuse du Mont-Dieu, durant la Terreur puis revint mourir à Saint-Marceau. Le château fut vendu au maire de la commune, puis en 1834, alla à Pierre de Flavigny de Doncourt. Celui-ci le revendit, en 1839, au marquis de Wignacourt. Adrien de Wignacourt, futur député des Ardennes, y naquît le 23/10/1845 et son frère Alof, le 16/10/1847. Mais c'est leur sur, Marie Louise de Wignacourt, épouse de Jacques de Chastenet de Puysegur, qui hérita du domaine de Saint-Marceau et le revendit, en 1905 à la famille Renaudin;   Paul Renaudin y écrivit une partie de ses uvres. Entretemps, durant le conflit franco-allemand de 1870, le château de Saint-Marceau fut occupé et endommagé, et fut pillé en 1914 et touché par un obus en 1940. La famille Renaudin est toujours l'actuelle propriétaire.","architecture":"SAINT-MARCEAU,  c'est un château fort, dont la construction date du XVIIe et XVIIIe siècles. C'est un édifice défensif, réaménagé les siècles suivants, en perçant de grandes fenêtres, pour en améliorer le confort et éclairer les pièces. Ce bâtiment défensif fut remanié aux siècles suivants,    durant le conflit franco-allemand de 1870, il est occupé et endommagé. Il est pillé en 1914 et touché par un obus en 1940. Un incendie a détruit en 1967 le toit et a obligé à refaire la charpente et la couverture. Éléments protégés MH : les façades et les toitures du château et des deux ailes de communs, la tourelle à l'angle de la propriété : inscription par arrêté du 15 juin 1990.","habitants":"Famille de La Glizeulle \"","divers":"GPS : 49° 42' 34,86\" Nord, 4° 43' 11,99\" Est","gps":"49° 42' 34,86\" Nord, 4° 43' 11,99\" Est","images":["../image/image_08/08_St_Marceau_1.jpg","../image/image_08/08_St_Marceau_2.jpg","../image/image_08/08_St_Marceau_3.jpg"]},"Consult_chateau_formulaire6e2f-2":{"id":"Consult_chateau_formulaire6e2f-2","dept":"08","canton":"Vouziers","commune":"Tailly","nom":"Tailly","type":"Château","periode":"XVI-XVII","histoire":"TAILLY, le château de Tailly est fortement lié à la famille Darodes. \"Darodes\" devint, en 1843, \"Darodes de Tailly\". En 1739, Louis Darodes arrive à Tailly, venant de Tourouna, un petit bourg du Lot-et-Garonne, avec son cousin Vassinhac d'Imécourt. En 1741, Louis épouse, Mlle Anne-Françoise de Moy de Sons, cousine de Vassinhac. Cette épouse reçut en héritage, à la mort de sa mère, la grande propriété sur le territoire de Tailly. Louis va valoriser l'activité industrielle des Forgettes et fait construire la grande maison blanche, appelé le domaine de Forgettes, encore visible actuellement au milieu d'un petit groupe d'autres maisons. Mais Louis Darodes meurt à 48 ans, en 1748, en 1758. Son épouse Anne-Françoise lui survivra 44 ans, restant à Tailly, malgré la Révolution. A sa mort, 30 décembre 1802, agée de 88 ans, elle transmet le château et le domaine à son fils Eugène. En 1793, Eugène épouse Marie Blondelet, de Beaufort en Argonne, et réussit sa vie, comme Juge de paix et maire de la commune. Ses affaires prospèrent dans l'avitaillement des régiments de l'Empereur Napoléon stationnés en Argonne. Leur fils Claude-François, né en 1794 à Tailly, reprend la propriété et obtient plusieurs premiers prix aux comices agricoles régionaux (dont une médaille d'or au concours de Charleville. Il fut aussi maire de Tailly. Claude, père de 7 enfants, transmet le château de Tailly et les dépendances à sa dernière fille Irma qui épousera, en 1854, Henri Dussumi
