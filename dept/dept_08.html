hateau_formulaire75ea","nom":"Sept_Fontaines","commune":"Fagnon","type":"Château","img":"../image/image_08/08_Sept_Fontaines_2.jpg"},{"id":"Consult_chateau_formulaire9100","nom":"St_Marceau","commune":"St-Marceau","type":"Château-fort","img":"../image/image_08/08_St_Marceau_1.jpg"},{"id":"Consult_chateau_formulaire6e2f-2","nom":"Tailly","commune":"Tailly","type":"Château","img":"../image/image_08/08_Tailly_1.jpg"},{"id":"Consult_chateau_formulaireb81f","nom":"Tassigny","commune":"Sapogne sur marches","type":"Château","img":"../image/image_08/08_Tassigny_1.jpg"},{"id":"Consult_chateau_formulairead54","nom":"Thugny_Trugny","commune":"Thugny-Trugny","type":"Château","img":"../image/image_08/08_Thugny_Trugny_1.jpg"},{"id":"Consult_chateau_formulaire699b","nom":"Touligny","commune":"Touligny","type":"Château","img":"../image/image_08/08_Touligny_1.jpg"}];const FULL={"Consult_chateau_formulaire9066":{"id":"Consult_chateau_formulaire9066","dept":"08","canton":"Rethel","commune":"Arnicourt","nom":"Arnicourt","type":"Château","periode":"XVIII","histoire":"ARNICOURT,  le château actuel a été reconstruit au XVIIIe siècle par la famille de Rémont. Arnicourt, tel qu'il appartenait depuis, fut bâti au XVIIe siècle, par la famille Rémont. Racheté par Gustave Le Bienvenu Busc, en 1837, il a bénéficié d'importants travaux.  C'est un château privé, fermé au public. \nÉléments protégés MH : les façades et les toitures du corps de logis et des communs entourant la cour d'entrée; les douves anciennes. il  est inscrit aux M.H. depuis 2001.","architecture":"ARNICOURT, bâtiment composé d'un corps de logis et d'ailes de communs fermant la cour d'entrée. Le corps de logis de deux niveaux et une toiture à la Mansart abritant un niveau de comble. Les communs sont sur un niveau et couverts d'une toiture à la Mansart. Modifications aux XIXe et XXe siècle. L'aile gauche est en brique et l'aile droite en craie. Gustave Le Bienvenu du Busc acquiert le bâtiment en 1837, fait exécuter d'importants travaux et installer un carillon sur le toit dont il ne reste que le lanternon. A l'intérieur de l'édifice, les trois chambres du premier étage ont conservé leur lambris avec alcôve du XVIIIe siècle. Il subsiste que des vestiges des douves de l'ancien château.","habitants":"Famille Rémont\"","divers":"GPS : 49° 33' 18\" Nord, 4° 21' 09\" Est","gps":"49° 33' 18\" Nord, 4° 21' 09\" Est","images":["../image/image_08/08_Arnicourt_1.jpg","../image/image_08/08_Arnicourt_2.jpg"]},"Consult_chateau_formulaire482a":{"id":"Consult_chateau_formulaire482a","dept":"08","canton":"Carignan","commune":"Auflance","nom":"Auflance_Carignan","type":"Château","periode":"XVII","histoire":"Cinq châteaux dans cet article,  Point central est  Carignan, Auflance, Euilly6Lombut, Mouzon et la Ferté pas d'info sur le donjon non plus sur le manoir de la Gravière.                                                                                         AUFLANCE, C'est au XVIIe siècle que la Famille de Custine viendra s'installer, à Auflance, proche de la frontière belge. Un château sera bâti, dont il ne reste que des vestiges : Un remarquable portail Renaissance orné d'armoiries, surmonté d'une Pieta, une tour ronde et des souterrains.  Le château d'Auflance a été construit au XVIIe siècle, les éléments protégés à l'inventaire supplémentaire des M.H.  sont les vestiges du château, y compris la façade des communs, inscription par arrêté du 18 septembre 1991.                                                                                                         CARIGNAN Les remparts datent de 1681. Ils comportaient initialement 10 bastions munis d'échauguettes. L'édifice est inscrit au titre des monuments historiques en 1988 et 1994.                               EUILLY-LOMBUT, le château fut assiégé par les généraux de saint Casimir, Roi de Pologne, qui s'en emparèrent sur Elizabeth de Gorlitz, Duchesse de Luxembourg vers 1422. On trouve quatre races de seigneurs de Lombut, Jean de Lombut l'était au commencement du XIIIe siècle. Picelot de Croï de Custine fit passer cette seigneurie dans sa maison par son alliance avec Catherine de Lombut, héritière apparemment des premiers seigneurs. Ide de Custine d'Auflance, la porta en partie dans la famille de Sapone par son mariage avec Gilles de Levant. Gambier de Hezecques était déjà seigneur de Lombut en partie, sur la fin du XVIe siècle; ses descendants l'ont possédé depuis sans interruption. La demoiselle de Hezecques leur héritière, réunit les deux parties, faisant la totalité de cette seigneurie, l'une provenant de son père, l'autre de sa mère. C'est à ce titre que M. de Pouilly, son premier mari l'a possédée et que M. de Juvigni qu'elle épousa en secondes noces la posséda ensuite.","architecture":"MOUZON, des travaux rue de la Mothe ont mis en exergue des vestiges d'un mur d'enceinte du IXe-XIe siècles, antérieur à ces fortifications. Celles-ci sont datées généralement de la fin du XIIe ou début du XIIIe, et leur construction est probablement contemporaine de celle de l'abbatiale. Elles sont en partie réagencées et surtout adaptées à l'artillerie par la mise en place de bastions et par l'épaississement des murs dans la seconde moitié du XVIe et le début du siècle suivant. La place est plusieurs fois assiégée. Les troupes espagnoles s'en emparent notamment en 1650, et les troupes françaises commandées par Turenne, la reprennent en 1653. Elle est démantelée quelques décennies plus tard. L'édifice est inscrit au titre des monuments historiques en 1926 et 20005.   Les fortifications de Mouzon correspondent aux vestiges des fortifications qui entouraient la ville. La porte de Bourgogne est l'élément le plus ancien de ce qui subsiste aujourd'hui des fortifications. Au sein de cette porte, la tour carrée surplombant les remparts est l'élément initial et date du début du xiiie siècle.                                                                                                                    L'ouvrage de La FERTE est un ouvrage fortifié de la ligne Maginot situé sur les communes de Villy et de La Ferté-sur-Chiers. L'édifice, bâti au sommet d'une colline ayant pour nom « La Croix de Villy », est parfois appelé ouvrage de Villy-La Ferté.","habitants":"Auflance ; Famille de Custine \"","divers":"Cinq châteaux dans cet article Auflancegrav 2-3,  Carignan  Grav-1 ,  Euilly Lombut grav-4,   Mouzon  grav-5-6,  graviere grav-7 et la ferté grav 8 .                                Auflance GPS : 49° 37' 04\" Nord, 5° 17' 28\" Est                                                      Lombut  49° 37' 48? nord, 5° 07' 16? est","gps":"49° 37' 04\" Nord, 5° 17' 28\" Est","images":["../image/image_08/08_Auflance_Carignan_1.jpg","../image/image_08/08_Auflance_Carignan_2.jpg","../image/image_08/08_Auflance_Carignan_3.jpg","../image/image_08/08_Auflance_Carignan_4.jpg","../image/image_08/08_Auflance_Carignan_5.jpg","../image/image_08/08_Auflance_Carignan_6.jpg","../image/image_08/08_Auflance_Carignan_7.jpg","../image/image_08/08_Auflance_Carignan_8.jpg"]},"Consult_chateau_formulairee175":{"id":"Consult_chateau_formulairee175","dept":"08","canton":"Carignan","commune":"Autrecourt et Pouron","nom":"Autrecourt","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux dans cet article Autrecourt et Bellevue.                   AUTRECOURT,  Claude Renart acquiert la seigneurie d'Autrecourt en 1641. Le château passe au XVIIIe siècle à Remacle du Val puis à son gendre Bergenheuse qui fait bâtir un nouveau corps de bâtiment en 1804. En 1840, son gendre Edmond Pasquier crée sur le site une filature et conçoit un logement plus grand face à la vallée du Brouhan ainsi que des ateliers de fabrication qui seront attenants. Le domaine est cédée en 1930 à Fernand Quinchez qui y crée une fabrique de ferronnerie.                                                                   BELLEVUE, Propriété de Louis Amour, frère du maire de Donchery, ce château du XIXème siècle était l'endroit où, le 2 septembre 1870, l'Empereur devait attendre le roi Guillaume, mais Bismarck, craignant une sorte d'apitoiement de sa part, exigea que la capitulation soit signée avant son arrivée. Elle le fut à 11 heures en présence du général de Wimpffen. Le roi de Prusse ne se rendit à Bellevue que vers deux heures de l'après- midi et eut avec Napoléon une entrevue d'un quart d'heure au cours de laquelle l'empereur lui affirma n'avoir jamais voulu cette guerre et dont Guillaume Ier révéla plus tard qu'ils étaient « tous les deux fort émus ».","architecture":"AUTRECOURT, les entrepôts de la filature ont été convertis en haras au XXe siècle. Une vingtaine de personnes y travaillent jusqu'en 1940. Les ateliers en moellon calcaire à chaînage en pierre de taille de la filature, bâtis en 1840, encadrent de part et d'autre le logement patronal érigé en 1804. Le bâtiment ainsi formé est homogène, précédé d'une terrasse donnant sur la vallée et le cours du Brouhan. Il s'élève sur un étage carré. L'ancien manoir du XVIIe siècle est situé à l'est, bâti en calcaire de Dom-le-Mesnil et couverture en ardoise avec toits mansardés.","habitants":"Famille de Remacle du Val  et Fernand Quinchez\"","divers":"Deux châteaux dans cet article Autrecourt et Bellevue.                                                         d'Autrecourt grav -1 GPS : 49° 36' 46\" Nord, 5° 01' 50\" Est\nBellevue grav 2","gps":"49° 36' 46\" Nord, 5° 01' 50\" Est","images":["../image/image_08/08_Autrecourt_1.jpg","../image/image_08/08_Autrecourt_2.jpg","../image/image_08/08_Autrecourt_3.jpg"]},"Consult_chateau_formulaire5cb1":{"id":"Consult_chateau_formulaire5cb1","dept":"08","canton":"Sedan","commune":"Bazeilles","nom":"Bazeilles","type":"Château","periode":"XVII-XVIII","histoire":"Quatre châteaux dans cet article; Bazeilles et Turenne, Remehan à Pouru st-Rémy et Montvillers pas d'info pour ce dernier.                                                                                                               BAZEILLES,  dit aussi d'Orival, Louis Labauche, son constructeur en 1750, vous y aurait accueilli si vous aviez vécu au siècle de Louis XV: cétait sa résidence dété, conçue pour donner fêtes et réceptions,  où il avait sa manufacture de drap, une des plus importantes en France à lépoque, ce qui lui valu dêtre anobli avec le rang décuyer. Il en a confié le dessin à Héré, auteur de la place Stanislas à Nancy, entre autres, avec pour mission den faire un lieu ouvert sur la nature avec le parc, leau, les jardins, l'orangerie, le pigeonnier et le pavillon damour pour le plaisir de lharmonie et léquilibre des proportions. Le décor sculpté est important, les ferronneries, le goût prononcé pour les courbes et la dissymétrie : une pointe de liberté et dindépendance comme un pied de nez au siècle précédent de Louis XIV,                                                                             REMEHAN, l'édifice aurait appartenu à la famille d'Aglemont de Tassigny depuis plusieurs siècles, en effet nous trouvons Jean Florentin Lambin d'Anglemont (1689-1715), seigneur d'Anglemont et de Reméhan, co-seigneur de Lombut, chevalier de l'ordre royal et militaire de Saint-Louis (1735) puis Charles Lambin d'Anglemont (1716-1758), frère du précédent, seigneur de Reméhan dès 1753, garde du corps du roi puis capitaine de cavalerie au régiment de Chabot (Crussol en 1747). Il meurt au camp des suites de ses blessures, lors de la guerre de sept ans. Le domaine appartient ensuite à la famille de Nonancourt au XIXe siècle, élevage de chevaux.","architecture":"BAZEILLES, l'édifice comprend un corps principal encadré de deux ailes saillantes, aux angles incurvés. La façade côté parc, de style Louis XIV est couronnée d'un fronton triangulaire sculpté de figures féminines. L'étage est doté d'un large balcon sur portique central, et de têtes de macarons placées au-dessus des fenêtres.  La façade d'entrée possède un fronton découpé dans un cartouche rocaille asymétrique. Des masques ornent la clé des fenêtres.  Dans le parc, une orangerie se signale par un style néoclassique. Le tracé de sa façade est convexe. Elle est coiffée d'un toit en ardoises, épousant la même courbe et dont le sommet est arrondi. De grandes baies se succèdent alternant avec des fenêtres surmontées d'un oculus. Les grilles de l'entrée sont aussi classées. Le parc est clos et possède des pièces d'eau. Éléments protégés MH : le château  classement par arrêté du 19 mars 1943.   Hotel-restaurant de monsieur Guilhas.                                                                              TURENNE,   Bazeilles possédait  au moyen-âge une maison-forte dont l'emplacement était peut-être celui du château de Turenne. Le château fut construit vers 1600, par le prince de Sedan, Henri de la Tour d'Auvergne. Le grand capitaine Turenne y planta plus tard, dit-on, la rangée d'arbres qui y subsiste encore. Ce château, quoique crénelé et entouré de fossés, n'était pas destiné à fournir un siège; c'était un château de plaisance qu'avait bâti et embelli le duc de Bouillon, qui l'habitait avec sa famille pendant la belle saison. Très endommagé en 1870, ce qui subsiste du château aujourd'hui ne permet  d'imaginer son degré de perfection architecturale du début du XVIIe siècle : pont-levis, porte richement ouvragée et ornée, galerie de sept arcades dans la cour, deux jardins entourés de douves et un mur percé de postes de tir.Éléments protégés MH : la porte fortifiée : inscription par arrêté du 18 août 1950.","habitants":"Famille de Louis Labauche                        Turenne; Henri de la Tour d'Auvergne                        Reméhan famille d'Aglemont \"","divers":"Quatre châteaux dans cet article; Bazeilles  grav 1 2-3-4 et Turenne grav-5, Reméhan à Pouru st-Rémy grav 6-7 et Montvillers grav-pas d'info pour ce dernier. Bazeilles-Orival grav- GPS : 49° 40' 25\" Nord, 4° 58' 53\" Est                                                                             Reméhan GPS : 49° 40' 47\" Nord, 5° 05' 03\" Est","gps":"49° 40' 25\" Nord, 4° 58' 53\" Est","images":["../image/image_08/08_Bazeilles_1.jpg","../image/image_08/08_Bazeilles_2.jpg","../image/image_08/08_Bazeilles_3.jpg","../image/image_08/08_Bazeilles_4.jpg","../image/image_08/08_Bazeilles_5.jpg","../image/image_08/08_Bazeilles_6.jpg","../image/image_08/08_Bazeilles_7.jpg","../image/image_08/08_Bazeilles_8.jpg"]},"Consult_chateau_formulaire8f6e":{"id":"Consult_chateau_formulaire8f6e","dept":"08","canton":"Vouziers","commune":"Belval-Bois des dames","nom":"Belval","type":"Château","periode":"XIII-XVII","histoire":"BELVAL, une abbaye est fondée dans les années 1120 par des chanoines réguliers de saint Augustinnote, venus s'installer sur un fief de l'évêque de Verdun, Albéron de Chiny. Il s'agit d'un bâtiment de style roman qui privilégie les constructions massives avec des fenêtres étroites. Progressivement, le style gothique s'impose avec des constructions lumineuses et des voûtes en croisée d'ogives. Deux fois dévastée par les huguenots, la communauté ne se composait plus en 1622 que de deux chanoines, trois clercs et quatre novices. L'abbaye souffrait également de sa proximité avec la frontière, une frontière poreuse et propice aux incursions ennemies comme en 1636, où une partie des bâtiments furent brulés. Belval fut vendu comme bien national en 1791 et devint propriété de Basile Joseph Raux, maître de forges, fils de Nicolas Raux maître de forges lui aussi, fermier général des forges de Belval, pour le compte de l'abbaye, avant la Révolution de 1789. Basile Joseph Raux avait été également élu en 1789 député du Tiers État aux États généraux. Il avait acquis, lors de la vente, la ferme d'Elpèche précédemment exploitée par les religieux, le moulin, la ferme de l'abbatiale, la forge, quatre étangs, des prés, des arpents de vignes et un bois. Le domaine devenu désormais le château de Belval, demeura la propriété de la famille Raux jusqu'en 1848 puis passa à un maître de forges de Fumay, Eugène Mathys. La propriété, dotée d'une domesticité nombreuse, fut le cadre de réceptions et de chasses. Un archéologue, Roger Graffin, en fut ensuite le propriétaire et l'habita jusqu'en 1914.","architecture":"BELVAL, le domaine devenu désormais le château de Belval, demeura la propriété de la famille Raux jusqu'en 1848 puis passa à un maître de forges de Fumay, Eugène Mathys. La propriété, dotée d'une domesticité nombreuse, fut le cadre de réceptions et de chasses. Un archéologue, Roger Graffin, en fut ensuite le propriétaire et l'habita jusqu'en 1914.       \nÉléments protégés MH : l'ancien logis  du XVIIIe siècle; la porterie; le bassin avec les deux statues; le logis XVIIe siècle; l'ancienne chapelle de Belval : inscription par arrêté du 4 novembre 1991. Le principal bâtiment, l'ancien logement , date du XVIIIe siècle. C'est une construction allongée en pierre et en brique, avec deux ailes en équerre. Le portail occidental, tourné vers l'étang, est caractérisé par un linteau élégant, orné de palmettes, encadré de pilastres ioniques, ce décor sculpté se prolongeant au premier étage. Une longue galerie aux belles voûtes occupe le rez-de-chaussée et se termine par un départ d'escalier de style Renaissance. 22 cellules de moine occupent le premier étage.\nLe logis de l'abbé date du XVIIe siècle. Il reste aussi l'ancienne chapelle de Belval, rapetissée au fur et à mesure de l'enlèvement des matériaux pour des constructions locales, et un bassin orné de deux statues. Le tout a été inscrit monument historique le 4 novembre 1991.","habitants":"Famille de Basile Joseph Raux\"","divers":"Belval \n49° 28' 37? nord, 5° 01' 01? est","gps":"","images":["../image/image_08/08_Belval_1.jpg","../image/image_08/08_Belval_2.jpg"]},"Consult_chateau_formulaire007a":{"id":"Consult_chateau_formulaire007a","dept":"08","canton":"Vouziers","commune":"La Berlière","nom":"Berlière","type":"Château","periode":"XVIII","histoire":"BERLIERE, il ressemble plus à une folie du XVIIIe siècle. Cet ancien château fort en pierres jaunes, est entouré d'un parc, agrémenté de tilleuls et de buis taillés. Il comporte un rez-de-chaussée surélevé et d'un étage, sous un comble à la Mansart.  À l'intérieur, ses cheminées proviendraient, dit-on, de l'abbaye de Belval. Les cuisines et les communs, étaient en soubassement dans des salles voutées. Le château de la Berlière fut bâti en 1740, pour Mathieu de Fumeron, seigneur de La Berlière, chevalier de l'ordre royal et militaire de Saint-Louis, commissaire des guerres. A la Révolution le château de la Berlière fut vendu comme bien national.    Le fils de Mathieu de Fumeron préféra émigrer. Puis en mai 1940, servira de point de commandement (PC) au général Grandsard, chef du 10e corps d'armée, placé sous les ordres du général Huntziger, commandant la 2ème armée. Le général Huntziger se trouvait, en tournée d'inspection, au château de La Berlière, le 13/05/1940, en fin d'après-midi, lorsqu'un rapport de la 55ème division d'Infanterie à Grandsard, apprit la percée allemande et la traversée de la Meuse, par l'ennemi, au sud de Wadelincourt.","architecture":"BERLIERE,  précédé d'un parterre à la française.C'est un bâtiment d'agréable dimension, plus proche des folies du XVIIIe siècle que des demeures seigneuriales. Double en profondeur, il se limite en élévation à un rez- de-chaussée surélevé et à un étage ménagé sous un ample comble à la Mansart. La façade principale développe cinq travées, ordonnées à partir d'un étroit avant-corps souligné par un perron à double volée, des pilastres plats et un fronton triangulaire. Très classique ce pavillon ne doit à l'Ardenne que la couleur ocrée de ses pierres, appareillées sur les deux façades principales, faites de moellons enduits sur les côtés. Devant les quatre façades court un collecteur maçonné, alimenté par une source et rejoignant le ruisseau en contrebas qui en assure la salubrité. Au rez-de-chaussée l'escalier de bois à deux volées s'orne d'une rampe en fer forgé au motif simple. Dans les salons, orientés au sud et habillés de boiseries sobrement moulurées, les cheminées à agrafe Rocaille proviendraient de l'abbaye de Belval. Sur la gauche les bâtiments de ferme forment un ensemble de quatre corps, couverts de tuiles à faible pente, entourant une cour fermée: le porche colombier trapu, surmonté d'un clocheton, fait face à l'habitation principale, entre la grange à droite et les logements ouvriers à gauche. Éléments protégés MH : les façades et toitures du château et de sa ferme, ainsi que les deux cheminées situées au rez-de-chaussée du château et provenant de l'Abbaye de Belval-Bois-des-Dames : inscription par arrêté du 28 février 1984.","habitants":"Famille de Mathieu de Fumeron\"","divers":"Berlière  GPS : 49° 31' 09\" Nord, 4° 55' 13\" Est","gps":"49° 31' 09\" Nord, 4° 55' 13\" Est","images":["../image/image_08/08_Berli%c3%a8re_1.jpg"]},"Consult_chateau_formulaire75a2":{"id":"Consult_chateau_formulaire75a2","dept":"08","canton":"Vouziers","commune":"Brieulles sur Bar","nom":"Brieulles","type":"manoir","periode":"XV-XVI","histoire":"BRIEULLES,  situé à la sortie du bourg, cet intéressant bâtiment dresse une sobre façade en pierre jaune d'Authe, encadrée aux angles de deux tourelles polygonales.","architecture":"BRIEULLES, ce bâtiment dresse une sobre façade en pierre jaune d'Authe, encadrée aux angles de deux tourelles polygonales. La maçonnerie est en moellons, à l'exception des tourelles en pierres appareillées, placées en encorbellement sur d'élégantes moulures prismatiques et coiffées de pittoresques toits à pans, dessinés en accolade. Au-dessus, se profilent de hautes cheminées renforcées de chaînes d'angle. Sur la cour, reste la porte basse surmontée d'une petite bretèche à trois consoles, accrochée sous la corniche mais défigurée par la création d'une fenêtre. Il fut souvent assiégé et incendié, en 1596 par les armées bourguignonnes. Brieulles fut autrefois un bourg que défendaient tours, tourelles et fortifications. Près du village de Brieulles, à cause de ses fortifications peu redoutées, campèrent en 1554 des troupes du duc de Nevers, et les armées en 1591, que commandait le Roi Henri IV en personne.\nÉléments protégés MH : les façades et les toitures du château-ferme : inscription par arrêté du 11 juillet 1945.","habitants":"Seigneur locaux\"","divers":"Brieulles Grav 1-2-3  GPS : 49° 28' 35\" Nord, 4° 32' 00\" Est","gps":"49° 28' 35\" Nord, 4° 32' 00\" Est","images":["../image/image_08/08_Brieulles_1.jpg","../image/image_08/08_Brieulles_2.jpg","../image/image_08/08_Brieulles_3.jpg"]},"Consult_chateau_formulaire6667":{"id":"Consult_chateau_formulaire6667","dept":"08","canton":"Attigny","commune":"Brécy-Brieres","nom":"Brécy_Brieres","type":"Château","periode":"XVII","histoire":"BRIERES, Gabriel Dominique Augustin de La Simonne (1708 -1732), fut le seigneur d'Ardeuil, de Brières et Saint-Pierre-lès-Franqueville, au château de Brières. Il épousa le 19/08/1732, Marie-Anne de la Goille : dont Marie-Louise de la Simonne du Hamel qui épousa le 17/07/1758, Jean Baptiste de Moÿ-de-Sons, seigneur de Brières et d'Ardeuil, fils de François Louis et Françoise d'Alaigre, comte de Moÿ. Ils auront plusieurs enfants dont Elisabeth née en 1767, Demoiselles de Saint-Cyr à la maison Royale de Saint-Louis, Charles Antoine, né au château de Brières, en 1769, chevalier de l'Ordre de Saint-Louis et Elisabeth Catherine, née en 1770, au château d'Ardeuil, qui épousa Hyppolite de Surirey de Saint-Rémy dont le jeune fils fut enterré, à l'âge de 13 ans, au cimetière de Louvergny.","architecture":"BRIERES, Deux bâtiment dresse une sobre façade en pierre jaune deux corps de logis en équerre face à face à trois niveaux toits brisés enfermé dans un parc avec porte d'entrée.","habitants":"Gabriel Dominique Augustin de La Simonne\"","divers":"Brières   grav 1-2  GPS : 49° 19' 25\" Nord, 4° 45' 59\" Est","gps":"49° 19' 25\" Nord, 4° 45' 59\" Est","images":["../image/image_08/08_Br%c3%a9cy_Bri%c3%a8res_1.jpg","../image/image_08/08_Br%c3%a9cy_Bri%c3%a8res_2.jpg"]},"Consult_chateau_formulairea699":{"id":"Consult_chateau_formulairea699","dept":"08","canton":"Vouziers","commune":"Buzancy","nom":"Bugancy_Augeard","type":"Château","periode":"XVIII","histoire":"Deux châteaux dans cet article; Augeard et Buzancy.                           AUGEARD, un premier château fut construit au début du XVIIIe siècle et se composait de quatre tours et était entouré de larges fossés. En 1756, le marquisat de Buzancy est vendu aux enchères publiques entre monsieur de Montmain, la comtesse du Barry et le marquis Guillaume-Pierre Tavernier de Boullongne, trésorier des guerres, qui en fait l'acquisition. Il le démolit et fait reconstruire par l'architecte Claude Baccan un nouveau château en conservant les fondations du premier. Il est édifié au milieu d'un grand parc avec de beaux jardins à la Française, pièces d'eau et statues. Mais Tavernier de Boullongne étant ruiné en 1781, le château est vendu à Jacques Mathieu Augeard. Mais le 12 septembre 1784, le château est presque complètement détruit par un incendie. Augéard demande à l'architecte François-Joseph Bélanger de le restaurer et la demeure sera achevée en 1789 au moment de la Révolution. Augeard est mis sur la liste des émigrés et les séquestres sont mis sur ses biens et le château est acheté par Buquet. Le 11 octobre 1804, Buquet fut blessé dans son amour propre lorsque Napoléon passant à Buzancy refusa son invitation, de rage il incendia son château, ne subsistent aujourdhui que les bâtiments annexes (communs et pavillon dentrée) et la grande pièce deau de lancien jardin à la française. Les communs forment deux belles et grandes constructions de facture classique disposées face à face, en arc de cercle, dans lesprit des écuries du château de Versailles. Bouveries dun côté, écuries de lautre. Larchitecte, Claude Baccari, était par ailleurs chargé de la grande écurie du Roi et il avait construit pour les chasses de Louis XV les écuries de Villeneuve-Saint-Georges.un arrêté du 25 mai 1982 a permis le classement des bouveries, propriété communale et un arrêté de classement dune partie des écuries avait été pris le 24 juillet 1986, le propriétaire ayant donné son accord. Les communs abritent aujourd'hui les haras de Buzancy.","architecture":"BUZANCY  Les communs du château de Buzancy ont été construits vers 1760 par l'architecte Claude Baccari qui fut également celui de la grande écurie du roi. Les deux bâtiments sont ordonnés suivant un plan en demi-cercle rappelant celui des écuries du château de Versailles. Les façades sur cour sont parées de maçonneries présentant un bossage en table. Les ouvertures sont assurées par une alternance de portes étroites, de fenêtres avec linteau en arc segmentaire et grandes portes cochères. Des lucarnes en pierre ornent de jour les combles.  Ne subsistent du château qu'un pavillon d'entrée, ainsi que les bouveries, les écuries, et une pièce d'eau dite de la Samaritaine. Les bouveries sont utilisées comme haras et maison du cheval ardennais. Les écuries restent à remettre en état.                                                                                                             La COUR, au XVIIe siècle on trouve un château en ruine qui fut remplacé par une construction plus simple. En 1744, Pierre de Saint-Rémy, conseiller du Roi au grenier à sel de Sainte-Menehould, seigneur de la Cour, hérite du château, mais celui-ci fit construire un château au sud du bourg. En 1780, Marie Ursule Dieudonné d'Ivory, héritière de Pierre de Saint-Rémy et afferme à Nicolas Thierry les dépendances et le colombier. En 1789, le château appartient à Innocent Louis de Maillart d'Ablancourt, comte de Landre, seigneur d'Andevanne et de la Cour. Sous la Restauration, le château est habité par Jean Baptiste Nottret de Saint-Lys, maire de Buzancy. Acheté par le général Chanzy après la campagne de 1870, il fut transformé en particulier par l'ajout de deux ailes. Aujourd'hui, au milieu du parc s'élève le château d'aspect simple, mais aux lignes architecturales solides, comprenant un corps de logis principal et deux pavillons faisant saillie. On pénètre dans la propriété par une grille que garde deux lions de pierre qui viendraient du château de Stanislas Leczynski à Lunéville.","habitants":"Augéard  Famille de Tavernier de Boullongne \"","divers":"Deux châteaux dans cet article; Augéard  grav 1-2-3-4 et Buzancy grav 1 avant, et la Cour grav-6           GPS : 49° 25' 37\" Nord, 4° 57' 20\" Est                                                                                      Cour-Buzency  GPS : 49° 25' 28\" Nord, 4° 57' 14\" Est","gps":"49° 25' 37\" Nord, 4° 57' 20\" Est","images":["../image/image_08/08_Buzancy_Augeard_1.jpg","../image/image_08/08_Buzancy_Augeard_2.jpg","../image/image_08/08_Buzancy_Augeard_3.jpg","../image/image_08/08_Buzancy_Augeard_4.jpg","../image/image_08/08_Buzancy_Augeard_5.jpg","../image/image_08/08_Buzancy_Augeard_6.jpg"]},"Consult_chateau_formulaire094e":{"id":"Consult_chateau_formulaire094e","dept":"08","canton":"Nouvion-sur-Meuse","commune":"Vendresse","nom":"Cassine","type":"Château","periode":"XVI-XIX","histoire":"La CASSINE, le prince bâtisseur, Louis de Gonzague, duc de Rethel et de Nevers, et Henriette de Clèves décidèrent de construire le château de la Cassine en 1571 à Vendresse. A \"une volée de canon\" de la demeure, le couvent des Cordeliers fut construit en 1579: c'était un chef-d'uvre de l'architecture conventuelle avec une magnifique charpente en bois courbé jusqu'à l'incendie qui le détruisit en 1697. Des hôtes célèbres y séjournèrent, Henri IV, Louis XIV, Mazarin. Acheté par le Maitre des Forges en 1820, le château de la Cassine fut reconstruit avant d'être de nouveau détruit par un nouvel incendie en 1927.","architecture":"La CASSINE,  fut édifié, en 1571, pour Louis de Gonzague, duc de Rethel et de Nevers, et Henriette de Clèves.  du château fut construit quelques années plus tard, le couvent des Cordeliers. Le château de la Cassine, aujourd'hui, est à l'état de ruine. Chaque été, il est transformé en un théâtre géant, pour un son et lumière de grande qualité. En 2008, a eu lieu le Spectacle : \"\" CEUX DE 14 \"\" , inspiré du roman de Yanny Hureaux \"\"Le Pain de Suie\"\".  Les ruines du château de La Cassine et du couvent datent pour le château du XIXe siècle et le couvent du XVIe siècle. Visites au cours des Journées du patrimoine chaque année. Spectacle historique et interactif évoque lhistoire du site et de ses personnages illustres.","habitants":"le Maitre des Forges Louis de Gonzague\"","divers":"GPS : 49° 34' 54\" Nord, 4° 48' 57\" Est","gps":"49° 34' 54\" Nord, 4° 48' 57\" Est","images":["../image/image_08/08_Cassine_1.jpg","../image/image_08/08_Cassine_2.jpg","../image/image_08/08_Cassine_3.jpg"]},"Consult_chateau_formulaire9a02":{"id":"Consult_chateau_formulaire9a02","dept":"08","canton":"Attigny","commune":"Charbogne","nom":"Charbogne","type":"Château","periode":"XVI","histoire":"CHARBOGNE, en 1595, Henriette de Clèves, veuve de Louis de Gonzague, vend la seigneurerie de Charbogne au seigneur de Richecourt, gouverneur de Mézières. Il y fait construire un château fort. Les autres bâtiments furent construits au fur et à mesure sur ordre de la famille Guiot de Richecourt qui reste propriétaire du château jusquen 1676. Le château est ensuite vendu à Antoine de Wignacourt. Le fils dAntoine, Daniel remplaça le pont-levis par le porche actuel. Ses descendants vécurent assez peu au château qui en souffrit et fut vendu à la Révolution comme bien national. Au XIXe siècle le château est acheté par un riche bourgeois, Ponce-Antoine Henrat qui le restaure.  La transformation en ferme se fit à la fin du XIXe siècle. La famille Noizet, propriétaire de 1910 à 1976, entreprit des travaux visant à adapter les lieux à lusage agricole. En 1917, un bombardement détruit la tour nord-est et une partie des étables. Le bâtiment des étables est modifié en façade côté cour. En 1989, le corps de logis seffondre et quelques années après cest au tour de la grange. Le château est alors laissé  à labandon. Les deux tours de lest seffondrent également. La tempête de 1999 et les squatters font le reste. En 2006, rachat du château par la famille Gaubert en vue de le rénover. Le projet touristique a vu le jour dès 2007 : rénovation de lensemble.","architecture":"CHARBOGNE, la ferme fortifiée a été appelée le château de Charbogne. Lacte de vente décrit le château ainsi: \"le dit château et maison seigneuriale composant plusieurs logements, quatre tours aux quatres coins servant pour la défense, le tout fermé de murailles, pont-levis entouré deau vive\".Elle possède deux tours du XIIe, qui servaient au guet, sur la Vallée de l'Aisne, puis une construction plus globale bâtie au XVIe siècle, ainsi qu'un portail du XVIIIe siècle. Son origine daterait du XIIe siècle. Vers la fin du XVIe siècle, Henriette de Clèves, Veuve de Louis de Gonzague vendit la seigneurie de Charbogne à un militaire, Jean de Guiot, gouverneur de Mézières, qui fit construire le château. Celui-ci comprenait un corps de logis, les murs d'enceinte, les 2 tours nord, le pont-levis et les douves. Dès la fin du XVIIe siècle, l'édifice était peu entretenu et à la Révolution, il est revendu comme « bien national », puis à partir du XIXe siècle, le château de Charbogne est rénové puis transformé en ferme :  Ponce-Antoine Henrat qui le restaure. Charpente et couverture des deux tours ouest refaites. Le portail est rétabli comme le mentionne un texte gravé dessus. Le bâtiment ouest porte une pierre gravée 1809. Le milieu du XIXe siècle est le départ dune lente altération de lensemble. Le corps de logis devient une écurie, la tour Sud-Est, le grenier à grain et les 2 tours Nord, des bergeries. Pendant la Première Guerre mondiale, la tour Nord-Est est détruite, ainsi qu'une partie des étables. La ferme n'est finalement plus entretenue et, en 1989, le corps de logis s'écroule, suivi rapidement par la grange et des 2 tours Est.","habitants":"Antoine de Wignacourt\"","divers":"GPS : 49° 30' 44,65\" Nord, 4° 33' 23,6\" Est","gps":"49° 30' 44,65\" Nord, 4° 33' 23,6\" Est","images":["../image/image_08/08_Charbogne_1.jpg","../image/image_08/08_Charbogne_2.jpg","../image/image_08/08_Charbogne_3.jpg","../image/image_08/08_Charbogne_4.jpg","../image/image_08/08_Charbogne_5.jpg"]},"Consult_chateau_formulaired8c8":{"id":"Consult_chateau_formulaired8c8","dept":"08","canton":"Givet","commune":"Givet","nom":"Charlemont_Givet","type":"Citadelle","periode":"XV-XVI","histoire":"CHARLEMONT, le fort en réalité une citadelle, constituée d'un réseau de plusieurs défenses. Sa construction fut décidée, en 1555, par Charles Quint, ayant obtenu la cession de Givet, par les évêques de Liège. Le fort domine la ville de Givet et contrôlait la vallée de la Meuse. Le roi de France Henri II lança, en 1554, 3 armées contre les Pays-Bas espagnols et mit le pays à feu et à sang. Une des armées, dirigée par le duc de Nevers prit Givet. Charles Quint demanda au général Martin Van Rossem de diriger son armée sur Givet et d'en chasser l'Armée Française. En octobre 1554, Charles de Berlaymont, gouverneur du comté de Namur, envoie à Givet un ingénieur italien, Donato Buoni Pellizuolli, et Jacques du Brucq pour choisir le meilleur site. Le fort primitif, construit en période de guerre, ce fort primitif, construit en période de guerre, aurait nécessité, à partir de l'année 1555 et en juillet  l'armée française revient à l'assaut de la ville. Les canons tirent depuis le fort en construction. Guillaume d'Orange, nommé commandant de l'armée de Charles Quint, tire de ces combats la conclusion qu'il faut agrandir le fort vers l'ouest. L'extension comprend des bastions à orillons protégeant des casemates ouvertes reprenant le plan du fort de Philippeville. L'extension est achevée en 1563-1564 sous la direction de l'ingénieur Jacques Van Oyen, neveu de l'ingénieur Sébastien Van Oyen.  Suite de cette incursion, Charles Quint décide de construire un fort pour protéger Givet.","architecture":"CHARLEMONT, à la fin du XVIe siècle, jusqu'en 1675, les espagnols construirent une seconde enceinte. En 1680, le fort et la ville de Givet sont remis au roi de France Louis XIV, en exécution de la paix de Ryswick.  A la fin du XVIIe siècle, Vauban complexifie et améliore les défenses de Givet et de Charlemont, cernant la ville de murailles, transformant le village de Charlemont en citadelle. Après la défaite de Napoléon à Waterloo le 18 juin 1815, les troupes du maréchal de Grouchy se replient sur Namur et Givet et occupent la citadelle. Le général Bourke, gouverneur des places de Givet et de Charlemont, enfermé avec 4 000 hommes, refuse de livrer la place forte, mais doit finir par signer une convention honorable livrant Givet aux Prussiens. La cité de Charlemont reste pour sa part française. Après le traité de Paris du 20 novembre 1815, Givet est occupé en janvier 1816 par 7 000 soldats russes. En octobre 1818, Givet est restitué à la France. Le Fort de Charlemont est inscrit aux M.H. depuis 1927.                                                                                                                              La Porte de France protégeait, jadis, l'accès de la ville de Givet, au Sud, sur la rive gauche de la Meuse, en direction de Charleville et de Rocroi. En 1862, la Porte de France fut aménagée pour le passage du chemin de fer, puis, par celui de la route.                                                                                              A cinq K.M. au sud  la maison forte de CHOOZE et   AVIETTES, à Rancennes  le château  se trouve au bord de la Meuse, à 5 km de la frontière belge. Transformé en chambres d'hôtes, le château d'Aviettes est géré par un jeune couple, très sympathique, Cindy et Jean François.  Une table dhôtes est proposée avec des produits régionaux et de saison. Le rez-de-chaussée est à votre disposition. A l'extérieur vous disposez d'un domaine de 6 ha entourés de bois.","habitants":"Charles Quint et Vauban\"","divers":"Charlemont grav 1-2                                   GPS : 50° 08' 09\" Nord, 4° 48' 13\" Est                                                                    Chooze  grav-5                                                GPS : 50° 06' 15\" Nord, 4° 48' 28\" Est                                                               la porte grav 3                                                       GPS : 50° 08' 20\" Nord, 4° 49' 30\" Est                                                Aviette   grav 4                                             GPS : 50° 07' 03\" Nord, 4° 49' 06\" Est","gps":"50° 08' 09\" Nord, 4° 48' 13\" Est","images":["../image/image_08/08_Charlemont_Givet_1.jpg","../image/image_08/08_Charlemont_Givet_2.jpg","../image/image_08/08_Charlemont_Givet_3.jpg","../image/image_08/08_Charlemont_Givet_4.jpg","../image/image_08/08_Charlemont_Givet_5.jpg"]},"Consult_chateau_formulairea110":{"id":"Consult_chateau_formulairea110","dept":"08","canton":"Charleville_Mézières","commune":"Charleville_Mézières","nom":"Charleville_Mézières","type":"Patrimoine","periode":"XVI-XVII","histoire":"CHARLEVILLE-MEZIERES, en 1611, Charles III acquiert, des princes de Conti, le mont Castelet c'est-à-dire la colline qui fait face à Charleville et où se situait la cité gallo-romaine de Castrice. Il la renomme Mont Olympe et elle sera, dans un premier temps, le symbole de la cité et de la principauté. Elle deviendra, après la destruction de la citadelle en 1686, en même temps que les fortifications de la cité, le village de Montcy-Saint-Pierre, aujourd'hui intégré à la ville. Un nombre important d'édifices consacrés et de constructions civiles vont voir le jour. En 1627, à la suite de l'extinction de la branche aînée des Gonzague à Mantoue, Charles part pour l'Italie. Il ne reviendra jamais à Charleville. À la suite de ce départ, les travaux du palais ducal sont interrompus. Il ne sera jamais achevé.L'existence d'une petite principauté souveraine à sa frontière nord,  est une épine dans le pied de la monarchie française, qui n'aura de cesse d'en réduire l'importance. Louis XIII achète le Mont-Olympe en 1629. L'atelier monétaire est fermé en 1656. Les successeurs de Charles ne s'intéressent que peu à leur principauté. Charles III n'y fait que de brefs séjours et Ferdinand-Charles n'y vient qu'une seule fois, pour en obtenir un soutien financier. À sa mort, en 1708, la principauté échoit à un prince français, Henri-Jules de Bourbon, prince de Condé. Tout cela n'empêche pas Charleville de prospérer. En 1667 commence l'activité d'une grande manufacture d'armes qui en 1675 devient manufacture royale. Le tsar Pierre le Grand, lors de son tour d'Europe, est passé par Charleville.  En 1748, sur proposition de Nicolas de Chastillon, commandant de la citadelle de Charleville, au comte d'Argenson, secrétaire dÉtat à la guerre, lécole royale du génie de Mézières est créée : cet établissement, essentiellement destiné aux jeunes gentilshommes, formera l'essentiel des ingénieurs militaires jusqu'au Premier Empire.","architecture":"CHARLEVILLE-MEZIERES, à la Révolution Les massacres de Septembre font une victime à Charleville : le commandant de la place est tué le 4 septembre 1792 par les volontaires du 3e bataillon de Seine-et-Oise, sur laccusation de trahison. La ville a souffert lors de chaque conflit. Lors de la guerre franco-allemande de 1870, elle a été le théâtre proche de la chute du Second Empire à Sedan. Lors de la première guerre mondiale, elle a abrité le quartier général du Kronprinz et a dû subir des bombardements notamment place de l'hôtel-de-Ville à Mézières où la mairie et l'hôpital ont été détruits. Le nouvel hôtel de ville a été inauguré en 1933 par le président de la République Albert Lebrun, dont l'épouse était originaire de Mézières, en style Art déco, et le nouvel hôpital s'est appelé Manchester en hommage à la ville britannique qui participa à sa construction, le lord maire de la ville avait d'ailleurs aussi participé à son inauguration la même année. À chaque conflit mondial, la ville et sa région étaient déclarées « zone de peuplement » , littéralement colonie, ou « zone interdite », ce qui ne facilita pas le ravitaillement et la circulation des biens et des personnes. Les Ardennes ont été, avec le Bas-Rhin, le seul département de France à appliquer l'ordre d'évacuation, durant laquelle le train transportant la plupart des archives départementales a été bombardé. Arthur Rimbaud est un poète français, né le 20 octobre 1854 à Charleville et mort le 10 novembre 1891 à Marseille. Bien que brève, son uvre poétique est caractérisée par une prodigieuse densité thématique et stylistique, faisant de lui une des figures majeures de la littérature française.                                       RENAUDIN, centre hospitalier du domaine Belair.","habitants":"Famille d'Arthur Rimbaud\"","divers":"Charleville Mézières                                    porte neuve grav-1  Remparts grav 2-3  Hotel de ville Grav-4   place ducale grav-5,  tour du roy  grav-6  Musée grav 7, Renaudin grav-8-9","gps":"","images":["../image/image_08/08_Charleville_M%c3%a9zi%c3%a8res_1.jpg","../image/image_08/08_Charleville_M%c3%a9zi%c3%a8res_2.jpg","../image/image_08/08_Charleville_M%c3%a9zi%c3%a8res_3.jpg","../image/image_08/08_Charleville_M%c3%a9zi%c3%a8res_4.jpg","../image/image_08/08_Charleville_M%c3%a9zi%c3%a8res_5.jpg","../image/image_08/08_Charleville_M%c3%a9zi%c3%a8res_6.jpg","../image/image_08/08_Charleville_M%c3%a9zi%c3%a8res_7.jpg","../image/image_08/08_Charleville_M%c3%a9zi%c3%a8res_8.jpg","../image/image_08/08_Charleville_M%c3%a9zi%c3%a8res_9.jpg"]},"Consult_chateau_formulaireb136":{"id":"Consult_chateau_formulaireb136","dept":"08","canton":"Charleville-Mézières","commune":"Elan","nom":"Chateau_Abbatial","type":"Château","periode":"XVI-XVIII","histoire":"CHATEAU-ABBATIAL, situé en bordure de forêt le site abbatial d'Élan comprend : le manoir  bâti au XVIe siècle, est flanqué de quatre tours circulaires, le corps de logis possède une superbe charpente de châtaignier en forme de coque de bateau retournée ; la manse abbatiale du XVIIe siècle, dont l'intérieur abrite aujourd'hui l'office de tourisme, ainsi qu'une exposition sur les abbayes cisterciennes de France et des maquettes sur l'abbaye d'Élan; l'église Notre-Dame d'Élan, ancienne abbatiale remaniée aux XVIIIe et XIXe siècles ; la chapelle Saint-Roger du XVIIIe siècle, dont la silhouette se reflète dans les eaux d'un bassin.","architecture":"CHATEAU-ABBATIAL, situé au coeur de la forêt d'Élan, à l'emplacement d'une source rendue miraculeuse par saint Roger, fondateur de l'abbaye, le site de la chapelle Saint-Roger constitue un lieu de promenade tout à fait charmant, idéal pour se ressourcer ou méditer tranquillement. Arboretum proposé par l'ONF afin de terminer agréablement la découverte des lieux. Éléments protégés MH : les façades, la charpente et la couverture du bâtiment du XVIIe siècle : inscription par arrêté du 27 septembre 1946.","habitants":"Chanoines\"","divers":"Château abbatial  GPS : 49° 40' 25\" Nord, 4° 44' 05\" Est","gps":"49° 40' 25\" Nord, 4° 44' 05\" Est","images":["../image/image_08/08_Chateau_abbatial_1.jpg","../image/image_08/08_Chateau_abbatial_2.jpg"]},"Consult_chateau_formulaire1351":{"id":"Consult_chateau_formulaire1351","dept":"08","canton":"Vouziers","commune":"Chatel-Chéhéry","nom":"Chatel_Chéhéry","type":"Château","periode":"XVII-XVIII","histoire":"CHATEL, la propriété passe des seigneurs de Roucy aux dEspinoy en 1666 puis aux de Salse. Pendant la Révolution, les de Salse, qui ont également acquis une des fermes de labbaye, émigrent. Le château abrite des volontaires nationaux, puis est pillé en 1792 par larmée de Condé. Une demoiselle de Salse le remet en état sous la Restauration, et cette famille le conserve jusquà la moitié du XIXe siècle. Ultérieurement, il devient la propriété des Chenet, et notamment du docteur Célestin Chenet mort en 1912, puis de sa fille et de son gendre. Pendant la première guerre mondiale, la façade tournée vers la vallée est endommagée par un obus. Les troupes allemandes, puis les troupes américaines qui libèrent le village, évitent de sinstaller en cette demeure jugée trop exposée aux tirs dartillerie, et simplantent de préférence à labbaye. Dans lentre-deux-guerres, en 1937, le château est acquis par Auguste Huet. Une de ses héritières le cède après la seconde guerre mondiale à la congrégation des Pères du Saint-Esprit. En 1994, le petit-fils dAuguste Huet, Jacques Huet, et son épouse Simone Defacque, rachètent la propriété, restaurent le château, et laménagent en partie en gîte et chambres dhôtes. En 2014, leur fille Nathalie accompagnée de son mari Samuel Cathrinet prennent le relais.","architecture":"CHATEL, le corps principal de ce château, allongé du sud au nord, est en brique, avec des chaînes dangle de pierre jaune et des croisillons sombres. Le rez-de-chaussée et les deux étages sont rehaussés dun toit avec comble. Lensemble domine des terrasses successives au dessus de la vallée de lAire, avec, plus à lest, de lautre côté de lAire, lancienne abbaye de Chéhéry. La construction date du début du XVIIe siècle. Au sud, un avant-corps fait saillie. Un autre pavillon est accolé au nord. Un chemin, le chemin des Vinats, démarrant peu après ce pavillon septentrional, longe la propriété et descend vers la vallée. De cette vallée, la façade du château est visible de loin : elle a constitué durant la première guerre mondiale une cible facile pour les artilleurs.","habitants":"Famille de Salse Propriété des Chenet, \"","divers":"Chatel -Chéhéry  49° 17' 06? nord, 4° 57' 20? est","gps":"","images":["../image/image_08/08_Chatel_Ch%c3%a9h%c3%a9ry_1.jpg","../image/image_08/08_Chatel_Ch%c3%a9h%c3%a9ry_2.jpg"]},"Consult_chateau_formulaire3cdc":{"id":"Consult_chateau_formulaire3cdc","dept":"08","canton":"Revin","commune":"Fumay","nom":"Comtes_Bryas","type":"Château","periode":"XVII","histoire":"COMTES DE BRYAS, devenue seigneur avoué des terres de Revin en 1689, la famille des comtes de Bryas fait construire ce château entre la fin du XVIIe siècle et le premier quart du XVIIIe siècle sur les ruines d'un château ancien. En 1827, le site devient la propriété de Charles et Louis Borgnet qui fondent une fabrique de céruse. Ayant fait faillite suite à un incendie, le château devient en 1837, la propriété de la société ardoisière du Moulin Sainte-Anne qui y installe ses bureaux jusqu'en 1946, date de liquidation des biens de la société. Le propriétaire Grouard de Tocqueville le cède à la commune en 1951, il abrite de multiples services administratifs. L'édifice de plan en U, appareillé en brique et pierre bleue, présente un agrandissement de l'aile droite et l'adjonction en aile gauche d'un logement. En façade antérieure, la travée centrale se prolonge d'un fronton en pierre de taille. Dans l'ancien parc, on relève une borne russe, située à l'origine sur la route nationale.","architecture":"COMTES DE BRYAS, le château des comtes de Bryas fut revendu, en 1835, à la société ardoisière du Moulin Sainte-Anne qui en fit son siège social. Le reste jusqu'à la vente complète des biens de la société en 1946. Le château de Bruyas est devenu la propriété de la ville de Fumay, depuis 1952 qui l'a racheté. Est inscrit à l'Inventaire supplémentaire des M.H. depuis 1972.   Éléments protégés MH : les façades et les toitures du château (à l'exclusion de la cheminée de la façade postérieure) : inscription par arrêté du 20 mars 1972, propriété de la commune, dans le parc différents ateliers et un bâtiment administratif édifié en 1963.","habitants":"famille des Comtes de Bryas\"","divers":"Comtes de bruyas GPS : 49° 59' 37' Nord, 4° 42' 14\" Est","gps":"49° 59' 37' Nord, 4° 42' 14\" Est","images":["../image/image_08/08_Comtes_Bryas_1.jpg"]},"Consult_chateau_formulaire4f8d":{"id":"Consult_chateau_formulaire4f8d","dept":"08","canton":"Signy-l","commune":"Rumigny","nom":"Cour_des_Prés","type":"Château","periode":"XVI","histoire":"La COUR des PRES,  situé au bord de lAube, ce château fortifié sur la demande de François 1er est typique du style Renaissance. Aux XVIe et XVIIe siècles, la Thiérache Ardenaise souffre des incursions darmées en provenance des Pays-bas et du désoeuvrement des mercenaires. En 1546, Louis Martin, prévôt de Rumigny, fait construire une maison forte. Durant la Révolution française, le propriétaire, Jean-Baptiste Piette, détruit les signes extérieurs de privilèges; le donjon, le pont-levis, et restaure lensemble de lhabitation. Aujourdhui, le château sorganise autour dune cour intérieure ouverte vers les jardins et le parc, transformé en hôtel restaurant propriété  de madame Avril.","architecture":"La COUR des PRES,  le château de la Cour des Prés est une ancienne maison forte, construite en 1546,  entourée de douves, cette demeure à mission résidentielle est défendue par un donjon, des tours et un pont-levis, Il est constitué dun corps de logis en \" L \". La façade principale du château de la Cour des Près est flanquée de deux tours circulaires, autour dune cour intérieure ouverte, vers les jardins et son parc. La construction du château de la Cour des Prés a été encouragée par le roi François Ier, en deuxième ligne des fortifications dressées, le long de la Meuse, pour résister à une éventuelle agression des troupes du roi Charles Quint. La Cour des Prés, souvent transmises par les femmes, est toujours restée dans la même famille, aussi chacune lui a laissée une partie de son ame et de son époque. En vous accueillant  et en vous entrainant à travers l'histoire de cette demeure privée et de sa région, les descendants actuels de la Cour des Prés souhaitent vous faire apprécier son charme et son histoire.","habitants":"Famille de  Jean-Baptiste Piette\"","divers":"Cour des prés GPS : 49° 48' 28\" Nord, 4° 16' 13\" Est","gps":"49° 48' 28\" Nord, 4° 16' 13\" Est","images":["../image/image_08/08_Cour_des_Pr%c3%a9s_1.jpg","../image/image_08/08_Cour_des_Pr%c3%a9s_2.jpg","../image/image_08/08_Cour_des_Pr%c3%a9s_3.jpg","../image/image_08/08_Cour_des_Pr%c3%a9s_4.jpg"]},"Consult_chateau_formulaire6948":{"id":"Consult_chateau_formulaire6948","dept":"08","canton":"Attigny","commune":"Neuville_Day","nom":"Day_Alleux","type":"Château","periode":"XIII-XIVXVII","histoire":"DAY, la tradition veut que cette demeure fortifiée ait été construite à partir de l'an 1243, par Sigebaud, seigneur de Day, compagnon d'armes du roi Saint-Louis lors de sa première croisade. \nLes Bohan héritent du château vers 1430, le remettent en état et le conservent durant deux siècles. Les armes qui figurent sur la cheminée du second étage du donjon sont celles de Gobert de Bohan et Isabeau de Ligneville, mariés en 1498. Au XVIIe siècle, la seigneurie devient la propriété du maréchal de Schulemberg. Un passage souterrain permettrait de communiquer entre ce château et celui du maréchal de France, à Mont-de-Jeux. Un départ voûté a été trouvé, qui ne prouve pas grand chose. Le maréchal de Schulemberg la transmet à Marie d'Estoquoy. Le château devient ensuite la propriété des comtes d'Ancelet. Il subit un incendie au XVIIIe siècle qui détruit une bonne partie des bâtiments. Le vicomte d'Ancelet le vend en 1828 à la famille Guilly. Quarante ans plus tard, il est revendu à Jean-Baptiste Capitaine, aubergiste à Vaux-Montreuil, et devient la propriété quelques années plus tard de Louis Gilles, son gendre. Le docteur Camille Gilles, fils du précédent et médecin de Rosa Bonheur, y aménage.  Sa veuve Mathilde procède à sa mort à des fouilles désordonnées, à la recherche, on ne sait trop pourquoi, d'un trésor. Les vestiges du château sont restaurés par M. Fabrega, propriétaire depuis 1984. L'édifice est inscrit au titre des monuments historiques en 1987. C'est une propriété privée qui ne se visite pas.","architecture":"le donjon de DAY,  est flanqué d'une deuxième tourelle, abritant un escalier à vis. Un bâtiment plus classique avec un toit à la Mansart est lui-même accolé à cette deuxième tourelle. Curieusement chapeautées de toitures-cloches, les tours ont un air bonne-femme. Le donjon possède trois étages, avec à chaque étage une salle ronde : Une salle basse au rez-de-chaussée, une salle des gardes au premier étage, couverte d'une belle voûte sur croisée d'ogives à sept nervures, et ornée d'une grande cheminée, dont les pieds-droits en formes de colonnes supportent un manteau aux armes Bohan-Ligneville. Une salle de même dimension à l'étage supérieur, sous la charpente. Des canonnières et des meurtrières sont aménagées dans les murs.","habitants":"Maréchal Schulemberg \"","divers":"Donjon de Day                                                 GPS : 49° 30' 16,51\" Nord, 4° 40' 46,55\" Est","gps":"49° 30' 16,51\" Nord, 4° 40' 46,55\" Est","images":["../image/image_08/08_Day_Alleux_1.jpg","../image/image_08/08_Day_Alleux_2.jpg","../image/image_08/08_Day_Alleux_3.jpg"]},"Consult_chateau_formulaire467b":{"id":"Consult_chateau_formulaire467b","dept":"08","canton":"Sedan","commune":"Donchery","nom":"Donchery","type":"Château","periode":"XVII","histoire":"FAUCON , la construction du château de Faucon remonte au XVIIe siècle, les siècles ainsi que ses différents propriétaires nont cessé den remodeler son architecture et son parc de 28 hectares. Le grand maître des forges Nicolas Gendarme résida en 1830 aujourd'hui propriété privé. Ce bâtiment, flanqué de deux grosses tours crénelées coiffées en poivrières, est devenu depuis un hôtel restaurant rénommé. Le domaine, avec chapelle, rivière, étang, et un parc sillonné dallées cavalières représente le symbole de lArt de vivre. Des chambres de caractère ouvrant sur les douves et la verdure affichent leur vocation hospitalière pour combler amateurs de calme et de tranquillité. De plus, au cur de cent hectares de bois et pâturages agrémentés de deux étangs, tout est mis en uvre pour le confort du cheval et la sérénité du propriétaire. Ecurie de propriétaires, résidence et pension pour chevaux, le domaine du  château du Faucon propose une très large gamme de prestations particulièrement élaborées.   Hôtel restaurant.","architecture":"C'est à CROIX-PIOT que Bismarck et de Moltke ont dirigé les opérations de la Bataille de Sedan et de Bazeilles. Le 31 août, dans la soirée, le roi Guillaume, son chancelier Bismarck avec lEtat-Major prussien, jetait son dévolu sur la Croix Piot et sy installa,mais dès le lendemain, 1er septembre, le Généralissime Moltke descendit vers Frénois pour se rapprocher de Sedan. Il prit position sur le chemin des Romains, au lieu-dit « les petits arbres », doù il dirigea la manoeuvre qui aboutit à lencerclement de lArmée Française. Cest en suivant les opérations militaires à la jumelle que le roi Guillaume sécria « Ah les Braves Gens »  en apercevant les charges successives et meurtrières de la cavalerie française cassée par les tirailleurs allemands. On accède au site depuis Donchery, par la ferme de Moscou. Au sommet du Mont Piot, on y trouve le château de la Croix-Piot (propriété privée), la chapelle St-Onesime et la table d'orientation.","habitants":"Famille de  Nicolas Gendarme  \"","divers":"Croix-Piot grav 4-5-6                                                 GPS : 49° 41' 50\" Nord, 4° 52' 31\" Est                                                            Faucon  grav 1-2-3                                  GPS : 49° 41' 50\" Nord, 4° 52' 31\" Est","gps":"49° 41' 50\" Nord, 4° 52' 31\" Est","images":["../image/image_08/08_Donchery_1.jpg","../image/image_08/08_Donchery_2.jpg","../image/image_08/08_Donchery_3.jpg","../image/image_08/08_Donchery_4.jpg","../image/image_08/08_Donchery_5.jpg","../image/image_08/08_Donchery_6.jpg"]},"Consult_chateau_formulaire8b8d":{"id":"Consult_chateau_formulaire8b8d","dept":"08","canton":"Signy-l","commune":"Doumely-Bégny","nom":"Doumely","type":"Château","periode":"XV-XVII","histoire":"DOUMELY, certains attribuent sa construction à Tristan de Failly qui hérite de la seigneurie en 1569. Des travaux ont été effectués à la fin du XVIIe siècle et les communs ont été construits au début du XVIIIe siècle, une grande bergerie de 70 m de long abritant le troupeau, le fourrage et aussi le matériel de mise en uvre des produits dans des conditions quasi industrielles. Éléments protégés MH : les façades et les toitures du château et des communs : inscription par arrêté du 21 décembre 1984.","architecture":"DOUMELY, le château de Doumely a été bâti vers le XVe siècle ou XVIe siècle sur des fondations du XIIIe siècle, ses quatre tours ont la forme particulière de goutte d'eau. À côté du château, une bergerie du VIIe borde la cour trapézodïale. Le château a été partiellement restauré à la fin du XXe siècle par son actuel propriétaire qui avait fait l'achat d'une ruine, cette bâtisse porte les stigmates des évolutions que lui ont infligées ses occupants successifs: comblement des douves, ouvertures en façade et destructions des niveaux intérieurs. Il a été, au cours des deux guerres mondiales, utilisé comme poste de commandement avancé, d'hôpital de campagne, ou encore de prison. Quelques inscriptions sont encore visibles aujourd'hui sur les murs.  Les visites du parc sont acceptées. Des animations autour de la vie au Moyen-Age sont organisées, deux fois par an le château de Doumély est inscrit et classé aux M.H. depuis 1984. Il appartient aujourd'hui à Mr Paul Bailly. Seul, le parc du château de Doumely se visite.","habitants":"Mr Paul Bailly.\"","divers":"Doumely    GPS : 49° 37' 48\" Nord, 4° 18' 20\" Est","gps":"49° 37' 48\" Nord, 4° 18' 20\" Est","images":["../image/image_08/08_Doumely_1.jpg"]},"Consult_chateau_formulairee159":{"id":"Consult_chateau_formulairee159","dept":"08","canton":"Signy-l","commune":"L","nom":"Echelle_à_Echelle","type":"Château","periode":"XV-XVII","histoire":"L'ECHELLE, le château de lEchelle du XVe siècle est construit au cur du village ouverture du Musée et de la Mairie sont situés dans le château de l'Echelle, comporte dans ses murs le musée de l'école d'hier. Éléments protégés MH : le château de lEchelle en totalité : inscription par arrêté du 19 juillet 1926. accueille aujourd'hui l'hôtel de ville.","architecture":"ECHELLE,  il s'est substitué en 1990 à l'école et présente aux visiteurs les salles de classe de la communale, (l'école primaire des années 1900 aux années 1960), avec les encriers, les plumes sergent-major (qui précédèrent les stylos-billes, les ardoises, les cartes géographiques, les manuels scolaires, etc. Les Amis du musée de l'école d'hier ont organisé en 2003, une journée pour passer le certificat d'études. Dans l'ambiance d'autrefois, les candidats volontaires ont testé leurs connaissances avec des textes originaux des examens de jadis. Le château actuel est un ouvrage de plan quadrangulaire, enserrant une cour assez exiguë. Le corps du logis encadré de tours circulaires du XVIe siècle, présente une façade principale en pierres régulièrement assisées qui doit son ordonnance aux transformations effectuées au XVIIe siècle. L'échauguette carrée, à langle Nord Ouest, dont les neuf consoles sappuient sur des maçonneries soigneusement appareillées, porte une cartouche datée de 1604. Son nom \"tour aux boulets ou tour des massacres\".","habitants":"seigneur locaux\"","divers":"Echelle  GPS : 49° 48' 02,52\" Nord, 4° 28' 25,32\" Est","gps":"49° 48' 02,52\" Nord, 4° 28' 25,32\" Est","images":["../image/image_08/08_Echelle_%c3%a0_Echelle_1.jpg"]},"Consult_chateau_formulairee377":{"id":"Consult_chateau_formulairee377","dept":"08","canton":"Nouvion-sur-Meuse","commune":"Etrépigny","nom":"Etrépigny","type":"Château","periode":"XVII-XIX","histoire":"ETREPIGNY, est situé dans un repli des crêtes pré-ardennaises, sa rue principale aligne des maisons caractéristiques en pierre de Dom prolongées par une allée de marronniers vénérables débouchant sur le château et l'église. En 1689 le curé Jean Meslier eut à se plaindre du châtelain, l'accusant de maltraiter les paysans. En effet celui-ci faisait sonner de la trompe de chasse sous les verrières de l'église pendant les offices, Messire Anthoine de Touilly, chevalier, seigneur de Cléry, Saint-Martin-sur-Barre et Pouilly, obtint l'appui de l'évêque de Reims, Mgr de Mailly, pour réprimander le curé qui se le tint pour dit jusqu'à sa mort. Si l'église du XIIe siècle est toujours celle qui vit ces événements, en revanche le château d'Etrepigny ne montre plus que quelques vestiges de ce qu'il fut sous l'Ancien Régime. L'actuel château fut construit en 1825 par un autre personnage illustre : Louis Lefèvre-Gineau, physicien et député. Mais aujourd'hui une partie du château a été restauré et est habité par son propriétaire.","architecture":"ETREPIGNY, de 1689 à 1729 en effet, l'église eut pour curé Jean Meslier. Messire Anthoine de Touilly, chevalier, seigneur de Cléry, Saint-Martin-sur-Barre et Pouilly,  il laissa à ses paroissiens un testament philosophique, véritable bombe à retardement qui n'éclatera qu'à la Révolution française. Si la minuscule église du XIIe siècle est toujours celle qui vit ces événements, le château d'Etrepigny en revanche ne montre plus que quelques vestiges de ce qu'il fut sous l'Ancien Régime. Le château d'Etrépigny actuel fut construit, en 1825 par un autre personnage illustre : Louis Lefèvre-Gineau, physicien et député, à qui l'on doit d'avoir défini la masse du kilogramme, en 1799. Le château d'Etrépigny fut un long moment abandonné. Une nouvelle bâtisse est érigée en 1825 par un autre personnage illustre, Louis Lefèvre-Gineau, physicien et député, à qui l'on doit d'avoir, en 1799, défini la masse du kilogramme. Après Louis Lefèvre-Gineau, son fils adoptif, Louis-Hercule Viez-Lefèvre-Gineau, homme de lettres, y séjourne, puis la fille de celui-ci, Louise Adelaïde Viez-Lefèvre-Gineau, mariée au célèbre éditeur Ernest Panckoucke. Mais cet édifice a été un moment abandonné au XXe siècle. Il est rénové en partie, et habité.","habitants":"Messire Anthoine de Touilly\"","divers":"49° 41' 07? nord, 4° 45' 17? est","gps":"","images":["../image/image_08/08_Etrepigny_1.jpg","../image/image_08/08_Etrepigny_2.jpg","../image/image_08/08_Etrepigny_3.jpg"]},"Consult_chateau_formulaire289b":{"id":"Consult_chateau_formulaire289b","dept":"08","canton":"Givet","commune":"Foisches","nom":"Foisches","type":"Château","periode":"XVI","histoire":"FOISCHES, le château-ferme de Foisches appartenait en premier à la famille des Templiers.  Suite aux combats entre les troupes royales françaises et les armées de Charles Quint, un acte de Charles de Berlaymont, en 1558, indique que le village est en ruines. À l'issue des combats, le capitaine de Hierges fait construire cette maison forte, proche de l'église Saint-Martin. En 1640, l'attaque de Charlemont par les troupes du maréchal de la Meilleraye provoquera de nouvelles destructions  en une ferme et appelée la Ferme des Templiers. L'ouvrage fortifié a été par la suite utilisé comme logement pour les officiers du fort voisin de Charlemont de Givet. Éléments protégés MH : les façades et les toitures des deux ailes Est et Sud, et les trois tourelles d'angle.","architecture":"FOISCHES, c'est une ancienne maison forte, transformée en exploitation agricole,  d'où son nom mais n'a rien à voir avec l'Ordre des templiers. Le château-Ferme de Foisches a été bâti au début de 1600. La maison forte de Foisches sera remise en état, dans les années qui suivent et sa chapelle sera restaurée en 1671. Le château de Foisches fut transformé, après la Révolution, en une ferme importante, de plan oblong à deux niveaux, toits en croupe accolée de deux tours rondes sur angles extérieurs toits en poivrières. L'ouvrage fortifié a été par la suite utilisé comme logement pour les officiers du proche Fort de Charlemont de Givet. Éléments protégés MH : les façades et les toitures des deux ailes Est et Sud, et les trois tourelles d'angle.  Le  château-Ferme de Foisches est inscrit aux M.H. en 1991.","habitants":"Famille des Templiers \"","divers":"Foisches GPS : 50° 07' 40\" Nord, 4° 46' 36\" Est","gps":"50° 07' 40\" Nord, 4° 46' 36\" Est","images":["../image/image_08/08_Foisches_1.jpg","../image/image_08/08_Foisches_2.jpg","../image/image_08/08_Foisches_3.jpg"]},"Consult_chateau_formulaire6f6d":{"id":"Consult_chateau_formulaire6f6d","dept":"08","canton":"Signy-l","commune":"Antheny","nom":"Fontenelle_Antheny","type":"Château","periode":"XV-XVI","histoire":"FONTENELLE, à l'origine cet édifice était une maison forte qui fut ravagée en 1589. Reconstruite, la structure pâtit de nouveau des incendies provoqués par les Espagnols en 1638 et en 1643. François Feuillet de Fontenelle est né au château le 30 juillet 1764, il étudie le droit, exerce la chirurgie et crée une école de médecine à Fontenelle, puis devient maire d'Antheny, pratique en tant que médecin des pauvres et s'intéresse à tout.","architecture":"FONTENELLE,  aujourd'hui on peut admirer un joli petit château de style Renaissance entouré de douves. Le bâtiment de pierre blanche consiste en un front dentrée de structure assez semblable à celui de Touligny, comprenant trois pavillons reliés par des bâtiments bas. Construit en maçonnerie de moellons, renforcé de chaînes dangle appareillées en besace, lédifice ne possède pour tout décor darchitecture quune corniche denticulée courant à la base des combles.","habitants":"François Feuillet de Fontenelle\"","divers":"GPS : 49° 50' 57\" Nord, 4° 18' 48\" Est","gps":"49° 50' 57\" Nord, 4° 18' 48\" Est","images":["../image/image_08/08_Fontenelle_Antheny_1.jpg","../image/image_08/08_Fontenelle_Antheny_2.jpg","../image/image_08/08_Fontenelle_Antheny_3.jpg"]},"Consult_chateau_formulaire77f7":{"id":"Consult_chateau_formulaire77f7","dept":"08","canton":"Sedan","commune":"Glaire","nom":"Glaire","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article , Bellevue  et Vilette.                       BELLEVUE, situé à la sortie de Sedan pour se rendre à Glaire, le château, de style néoclassique qui rappelle les châteaux de la Renaissance, est édifié avec les belles pierres jaunes des carrières de Dom-le-Mesnil. Propriété de Louis Amour, frère du maire de Donchery, ce château du XIXe siècle est le lieu où, le 2 septembre 1870,  que Napoléon III, assiégé à Sedan avec ses 83 000 hommes, va se rendre à Donchery où il rencontrera Bismarck. Puis il se rendra au château de Bellevue à Glaire, ou il rencontrera l'empereur Guillaume Ier d'Allemagne, où il signera l'acte de reddition de l'Armée Française. Le lendemain, les soldats français seront emmenés sur la presqu'île d'Iges de Glaire, qui s'étend sur plusieurs centaines d'hectares.  lEmpereur devait attendre le roi Guillaume 1er, mais Bismarck, craignant une sorte dapitoiement de sa part, exigea que la capitulation soit signée avant son arrivée. Elle le fut à onze heures en présence du général de Wimpffen. Le roi de Prusse ne se rendit à Bellevue que vers deux heures de laprès-midi et eut avec Napoléon une entrevue dun quart dheure au cours de laquelle lempereur lui affirma navoir jamais voulu cette guerre et dont Guillaume Ier révéla plus tard quils étaient tous les deux fort émus. Le château a été découpé en plusieurs copropriétés à laube des années 1960, et un des propriétaires espère lui rendre tout son lustre dantan.","architecture":"VILLETTE, un édifice est reconstruit dans les décennies suivantes, qui correspond aux trois travées de gauche de la façade principale actuelle, déjà flanquée de trois tours. Un vestibule central séparait deux grandes salles. En 1656 Mazarin fait l'acquisiion aux comtes de Rethel, s'y serait réfugié brièvement durant la fronde des princes. Les bâtiments sont aménagés une première fois au XVIIe siècle. ils sont acquis au XVIIIe siècle par Jean-François Maucomble, seigneur engagiste de Glaire (et père de Jean-François Nicolas Joseph Maucomble, général sous l'Empire et la Restauration. Ce Maucomble donne au bâtiment sa forme actuelle, pour l'essentiel. Il fait construire le pavillon au Nord, faisant saillie, agrandit et homogénéise la façade principale, revoit les ouvertures et aménage un jardin. Pendant la Révolution Française, et particulièrement pendant les années de terreur puis à la fin de sa vie, la famille Maucomble héberge discrètement en ce lieu l'évêque constitutionnel du diocèse de Sedan, Nicolas Philbert. Il y meurt en Juin 1797. Conformément à ses volontés, on l'enterre dans le cimetière de la petite église. Le fait est noté par quelques historiens et archivistes locaux qui mentionnent notamment l'inscription laissée par ses Vicaires sur une plaque de marbre. En 1982, toutefois, des travaux d'évacuation des eaux de pluie mettent au jour la fameuse plaque de marbre et la sépulture, sous vingt centimètres de terre, au pied du mur du cimetière, face à l'entrée de l'église. Une nouvelle inhumation est effectuée et le curé de Glaire lui apporte une ultime bénédiction. En 1990 le château est acquit par M. Albert Caprani. Au XIXe siècle, l'édifice devient la propriété de négociants en laine de Sedan, les Kistemann qui procèdent à de nouveaux remaniements, notamment sur la façade arrière.","habitants":"Vilette Famille Jean-François Maucomble\"","divers":"Deux châteaux dans cet article , Bellevue  et Vilette.                                      Bellevue Grav-1-2-3                                                GPS : 49° 42' 42\" Nord, 4° 54' 56\" Est                                                     Vilette grav -4-5-6                                     GPS : 49° 42' 36,64\" Nord, 4° 53' 53,97\" Est","gps":"49° 42' 42\" Nord, 4° 54' 56\" Est","images":["../image/image_08/08_Glaire_1.jpg","../image/image_08/08_Glaire_2.jpg","../image/image_08/08_Glaire_3.jpg","../image/image_08/08_Glaire_4.jpg","../image/image_08/08_Glaire_5.jpg","../image/image_08/08_Glaire_6.jpg"]},"Consult_chateau_formulaire0fa6":{"id":"Consult_chateau_formulaire0fa6","dept":"08","canton":"Attigny","commune":"Grandpré","nom":"Grandpré","type":"Château","periode":"XVI-XVIII","histoire":"GRANDPRE, dit des comtes de Joyeuse Les seigneurs de Grandpré furent très puissants du XIe au XIIIe siècle. En raison des dommages causés en Champagne par la garnison de Grandpré, le roi Charles VII ordonna en 1441 la destruction de la place. Un nouveau château sera construit par les seigneurs de la maison de Joyeuse dés la fin du XVe siècle. Il fut complété par Claude de joyeuse en 1617. Grandpré est vendu  au marquis Hennequin d'Equevilly  lieutenant des armées du roi qui lui le revendit à Charles-Louis Huguet de Sémonville. à Mr de Semonville, qui devint ensuite le marquis de Montholon Semonville, qui cède le château au général Dumouriez qui installe son Q.G , mais du l'abandonner  devant la menace autrichienne. Comte de l'Empire Huguet  de Sermonville qui reçoit de Louis XVIII le  titre de marquis  a adopté les enfants nés de son premier mariage de son épouse  avec le marquis de Montholon. Mme de Semonville épousa le Général Joubert fut tué à Novi.  En 1837,la propriété est cédé à Cordélia Gréffulhe , épouse du maréchal Castellane qui revend en 1841 à Pierre Louis Blabled   toujours dans la descendance.","architecture":"GRANDPRE, a été édifié par la famille de Joyeuse, au XVIe siècle, les communs, véritable joyau architectural et la Porte de Justice avec des échauguettes décoratives, encadrée par deux colonnes torsadées et surmontée de bretèches. Le 13 novembre 1834 un incendie touche une grande partie du château. Il est détruit excepté quelques parties, dont la Porte de la Justice et les dépendances qui l'entourent.  Le château, qui avait été remanié par Georges Blabled au XIXe siècle, a dû être entièrement reconstruit, dont son porche nommé \"la Porte de la Justice\" et ses communs, construits entre 1617-1618 dans un style Louis XIII, fait de briques et pierres, de bretèches et d'échauguettes.  Il est reconstruit par ses nouveaux propriétaires sur un plan plus simple. Il fut détruit dans un incendie, en 1834, dont le porche appelé la Porte de la Justice et les communs, construits en 1617-1618, dans un style Louis XIII, caractérisés par l'utilisation de briques et pierres . Le château de Grandpré a été classé aux M.H. en 1921.","habitants":"Famille de Joyeuse                  Marquis de Montholon Semonville\"","divers":"Grandpré                                                GPS : 49° 20' 28\" Nord, 4° 52' 17\" Est","gps":"49° 20' 28\" Nord, 4° 52' 17\" Est","images":["../image/image_08/08_Grandpr%c3%a9_1.jpg","../image/image_08/08_Grandpr%c3%a9_2.jpg","../image/image_08/08_Grandpr%c3%a9_3.jpg","../image/image_08/08_Grandpr%c3%a9_4.jpg","../image/image_08/08_Grandpr%c3%a9_5.jpg","../image/image_08/08_Grandpr%c3%a9_6.jpg"]},"Consult_chateau_formulaire1ff1":{"id":"Consult_chateau_formulaire1ff1","dept":"08","canton":"Nouvion-sur-Meuse","commune":"Baâlons","nom":"Géraumont","type":"Château","periode":"XV-XVII","histoire":"GERAUMONT, le château de Géraumont remonte au Moyen-Age. On en connaît de nombreux seigneurs lointains: en 1316 Jeannot, seigneur de Corbon, en 1566, Hugues de Hersillemont, seigneur pour moitié et pour l'autre moitié, Jehan de Bardys, en 1572, Claude de Villiers, dame de Géraumont et de Terron-les-Poix, fille du seigneur d'Etrépigny, en 1683, Philippe de Melin puis ses deux filles, en 1693, Antoine de Hermant de Marquigny qui épousa Charlotte de Melin, en 1758, Charles-Joseph Nicolas, baron de Feret, seigneur de Terrier qui épousa Marguerite de Hermant, en 1787, Charles Nicolas, baron de Feret, seigneur de Géraumont et Jonval, enfin en 1882, Madame de Vaubert, née de Gruthus, descendante des De Feret. Le château, plusieurs fois revendu par la suite a perdu la majeure partie de son décor intérieur. C'est un édifice, d'élévation modeste, flanqué de deux larges pavillons. Bâti en pierres assisées, renforcées aux angles de chaînes appareillées, il offre des façades dépourvues de tout élément décoratif. Aux murs extérieurs, des agrafes de fer indiquent une date de réfection : 1774.  depuis 1930 c'est une simple ferme.","architecture":"TICHEMONT, est un ancien château fort du XIVe siècle du Duché de Bar. Ferme datée 1699 remaniée au XIXe siècle. Logis daté 1568. Le jardin à la française est aménagé au début du XVIIIe siècle. Plusieurs fois remaniée et transformée en château de plaisance, mais il a conservé son caractère de place fortifiée avec ses fossés de ceinture, une double enceinte, des tours dont une tour-porche, fausses braies, escarpe, contrescarpe, jardin paysager réalisé au XIXe siècle à l'emplacement d'un étang asséché. Orangerie de 1824. Vastes jardins en terrasses conservent ses soutènements d'origine de 1702 reliés par quatre escaliers monumentaux. Le parc multiple recèle également une orangerie, un potager en creux et une composition paysagère bordée de belles essences. Éléments protégés MH : les sols, y compris les ponts et les murs ; façades et les toitures des différents bâtiments ; le jardin à la française et le parc : inscription par arrêté du 20 septembre 1996.","habitants":"Antoine de Hermant de Marquigny \"","divers":"Géraumont grav-1                                Tichemont grav 2-3-4                                             49° 10' 45,12? N, 5° 54' 07,2? E","gps":"","images":["../image/image_08/08_G%c3%a9raumont_1.jpg","../image/image_08/08_G%c3%a9raumont_2.jpg","../image/image_08/08_G%c3%a9raumont_3.jpg","../image/image_08/08_G%c3%a9raumont_4.jpg"]},"Consult_chateau_formulairefdc0":{"id":"Consult_chateau_formulairefdc0","dept":"08","canton":"Rocroi","commune":"Remilly-les-Pothées","nom":"Hardoncelle","type":"Château","periode":"XVI","histoire":"Dreux châteaux dans cet article, Hardoncelle et Rémilly les Potées. HARDONCELLE, le château a été édifié au XVIe siècle sur l'emplacement d'un château détruit par les Liégeois. Suite aux alliances matrimoniales et aux héritages, le château d'Hardoncelle va changer plusieurs fois de propriétaires en particulier les Argy, les Villelongue, les La Salle, les Pétré, les Samboeuf, les Voyart. A la Révolution, le château d'Hardoncelle sera épargné. Suite au déclenchement de la Seconde Guerre mondiale, la famille Gailly de Taurines quitte le domaine pour Paris. Durant l'occupation allemande, le château est réquisitionné par la Wirtschaft-soberleitung, et un chef allemand s'y installe. En 1944, il prend la poudre descampette lors de la libération de la France par les troupes alliées, en emportant toutefois les plus beaux meubles de la demeure. Il demeurera inhabité jusquen 1952, puis il sera racheté par le Général Roger Noiret.","architecture":"REMILLY LES POTEES, ce château fort construit au XVIe siècle durant une période ou le Royaume de France était perturbé par les menaces externes et internes, en particulier les guerres de religion. Le château est situé à l'entrée du bourg, le long de la D9 à l'entrée Est de la commune. Il a subi diverses transformations, mais demeure toujours propriété de la famille qui l'a fondé. Il est constitué d'un corps de bâtiment de plan rectangulaire, flanqué au Nord d'une tour et au Nord-Est d'une échauguette. En l'absence de pont-levis et de fossés, une bretèche défend l'entrée. A l'intérieur du bâtiment, l'espace se limite à quatre salles, deux au rez-de-chaussée et deux à l'étage. Les salles situées à l'Est ont conservé leur cheminée de pierre sculptée, ainsi qu'une salle du rez-de-chaussée de la tour. Un escalier aménagé dans la forte épaisseur des murs permet d'accéder à une cave voûtée en plein cintre. Un vaste grenier desservait à l'origine la bretèche et les meurtrières placées sous la corniche. Il a été ultérieurement aménagé.  Éléments protégés MH : le château de Remilly-les-Pothées : inscription par arrêté du 22 décembre 1927.","habitants":"Hardoncelle famille Gailly de Taurines                     Rémilly\"","divers":"Dreux châteaux dans cet article, Hardoncelle et Rémilly les Potées.Hardoncelle  grav 1-2- GPS : 49° 47
