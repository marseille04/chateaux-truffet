 et enfin de Louis de Germon (1923).","architecture":"Labatut les vicomtes de Rivière font construire ou reconstruire leur château,  de 1401 à 1432, puisque la tour cylindrique, est datée du XIVe siècle ou XVe siècle, le château de Labatut est une ancienne résidence dune branche des vicomtes de Rivière-Basse ; c'est un château du XVIe siècle qui a évolué au fil du temps, édifié à lendroit même de lancien, on remarque surtout sa partie la plus ancienne : une massive tour Renaissance  cylindrique qui, à laide de meurtrières, lui donnait une fonction défensive. Malheureusement, attaquée par le lierre, les fenêtres ouvertes et les toits éventrés, cette imposante et ancienne bâtisse subit des dégradations qui semblent bientôt irréversibles. de plan carré à trois niveaux toit en croupes presque plats, accolé d'une tour ronde crénelée à mâchicoulis et tourelles sur autre angles et dépendances sur l'arrière. aujourd'hui le château est à l'agonie.","habitants":"vicomtes de Rivière \r\n        \r\n        \r\n        \"","divers":"Château de Labatut-Rivière","gps":"","images":["../image/image_65/65_Labatut_Riviere_1.jpg","../image/image_65/65_Labatut_Riviere_2.jpg","../image/image_65/65_Labatut_Riviere_3.jpg","../image/image_65/65_Labatut_Riviere_4.jpg","../image/image_65/65_Labatut_Riviere_5.jpg","../image/image_65/65_Labatut_Riviere_6.jpg","../image/image_65/65_Labatut_Riviere_7.jpg","../image/image_65/65_Labatut_Riviere_8.jpg","../image/image_65/65_Labatut_Riviere_9.jpg"]},"Consult_chateau_formulairee89a-2":{"id":"Consult_chateau_formulairee89a-2","dept":"65","canton":"Barbazan Debat","commune":"Laloubère","nom":"Laloubère","type":"Château","periode":"XV","histoire":"LALOUBERE, château dit de Palaminy, en 1569, lors des guerres de religion, les troupes protestantes du comte de Montgomery traversèrent Laloubère qu'elles ont dû ravager comme elles le firent à Horgues et à Odos. La compagnie de chevaux-légers du vicomte de Larboust, catholique, s'installa à Laloubère durant le siège de Tarbes en 1574. De 1592 à 1594, Tarbes fut occupée par les troupes de la sainte ligue catholique du capitaine Étienne de Castelnau, seigneur de Laloubère. En 1757, messire de Palarin vendit la seigneurie de Laloubère à la famille de Palaminy.  Sous la période napoléonienne, monsieur de Palaminy qui s'était rallié à la cause bonapartiste fut nommé maire du village par le préfet. La visite de la duchesse d'Angoulême, fille de l'ancien roi Louis XVI, fut commémorer par une colonne de style dorique.","architecture":"L'actuel château est datable par son architecture classique des XVIIe et XVIIIe siècles pour l'essentiel, de plan rectangulaire à trois niveaux pour les corps de logis à toit en croupes avec fronton sur toit avec lucarnes  et deux tours carrées  à toits à quatre pans, dépendances imposantes sur la droite pour le haras.","habitants":"Famille de Palaminy\r\n        \r\n        \r\n        \"","divers":"Château de la Loubère","gps":"","images":["../image/image_65/65_Laloubere_1.jpg","../image/image_65/65_Laloubere_2.jpg","../image/image_65/65_Laloubere_3.jpg"]},"Consult_chateau_formulaire1ce4-2":{"id":"Consult_chateau_formulaire1ce4-2","dept":"65","canton":"Maubourget","commune":"Lascazères","nom":"Lascazères","type":"Château","periode":"XVI","histoire":"LASCAZERES  Charles Pierre Pasquier, seigneur de Franclieu, né le 24 avril 1625,  son fils, Jacques-Laurent-Pierre-Charles, seigneur est né le 24 avril 1680 à Brie comte Robert,  il installe sa famille au château de Lascazères, avant de s'y établir lui-même quelques années plus tard. Il y meurt le 16 février 1746, à l'âge de 65 ans, laissant ses \"Mémoires\" Un de ses onze enfants, Jean-François-Anselme, comte de Franclieu, seigneur d'Eraine, de l'Evéché, de Fouilleuse et de Bailleul-le-Soc, maréchal des camps, chevalier de Saint-Louis, né le 21 avril 1735 à Lascazères, mourut en émigration le 18 février 1804 à Eraines, à l'âge de 68 ans, inhumé à Bailleul-le-Soc. Il avait été page, écuyer puis aide de camp du prince de Condé. Il portait le titre de comte de Franclieu comme étant frère de Jean-Baptiste, en faveur duquel le roi Louis XV donna en juillet 1767  les lettres d'érection en marquisat de ses terres et seigneuries sous le nom de Franclieu. Le comte de Franclieu avait épousé Catherine, fille d'Antoine de Belleval, gentilhomme du prince de Condé, et capitaine de ses chasses.","architecture":"Le château et sa motte féodale ont été érigés au début XVIe siècle. Entièrement reconstruit entre 1871 et 1876, il devint en 1947 un aérium, puis un IMP (Institut Médico-Pédagogique   centre médico-professionnel) en 1960. A ce jour, il est occupé par lassociation A.S.E.I (agir, soigner, éduquer, insérer) centre Roland-Chavance.   De plan rectangulaire à trois niveaux pavillons saillants sur les flans avec toits à quatre pans avec lucarnes ainsi que sur les trois travées du corps de logis. Tours rondes à quatre niveaux crénelées à mâchicoulis et tourelle de guet superposée.","habitants":"Charles Pierre Pasquier\r\n        \r\n        \r\n        \"","divers":"Château de Lescazères","gps":"","images":["../image/image_65/65_Lascazeres_1.jpg","../image/image_65/65_Lascazeres_2.jpg","../image/image_65/65_Lascazeres_3.jpg","../image/image_65/65_Lascazeres_4.jpg","../image/image_65/65_Lascazeres_5.jpg"]},"Consult_chateau_formulaireeced":{"id":"Consult_chateau_formulaireeced","dept":"65","canton":"Lourdes","commune":"Lourdes","nom":"Lourdes","type":"Château-fort","periode":"XII","histoire":"Plusieurs châteaux à Lourdes dont le château-fort , de Lugagnan, château de Soum, la maison d'Henry IV  et l'hôtel de ville.                                                                                                                                                LOURDES,   sommé à plusieurs reprises de se rendre, Mirat, en dépit des privations supportées héroïquement par lui et les hommes de sa garnison. Le château, appelé château de  Mirambel, prit alors le nom de Lorus qui aurait donné son nom à la ville de Lourdes.  Du XI au XIIe siècle, Lourdes et la demeure seigneuriale des comtes de Bigorre donné en 1195 au vicomte de Tartas passera par alliances et conquêtes aux mains de Don Pedro chefs albigeois roi d'Aragon,  en 1360 tombé  aux mains des anglais, en 1425 le roi de France cède le comté de Bigorre au comte de Foix.  Le château fort et son musée pyrénéen fut un lieu du pouvoir des comtes de Bigorre en 1407 reconstruction  complète du château en 1565 Lourdes et son château sont dévastés par le comte de Montgoméry, protestants et en 1590  est restauré sur ordre d'Henri IV  ainsi que la place de Lourdes. Devenu une forteresse française, puis une prison militaire, sera utilisé comme place forte du XIVe siècle à 1889. Puis sous le règne de Louis XV et Napoléon 1er, il deviendra une prison. De 1828 à 1856,  subira de nouvelles transformations, sur les consignes de Vauban.                                                                                                         Maison Henry IV  aurait été construit au XVIe siècle sur les consignes de Jeanne d'Albret, mère d'Henri IV, pour servir de relais lors dun voyage entre la France et lEspagne,  également de pavillon de chasse.","architecture":"Le château-fort de Lourdes est un ancien château bâti au N°25 rue du Fort, à Lourdes. Il occupe une position stratégique à l'entrée des 7 vallées du Lavedan dans les Pyrénées. La construction  remonte aux XIe au XIXe siècles, fut remanié au XIVe siècle, sous la domination des anglais. De nouveaux changements interviendront au début du XVe siècle, quand il fera partie du domaine de Foix.  Malgré les destructions et les reconstructions a encore fière allure  tout s'organise autour du donjon de quatre étages rectangulaire réédifier en 1407 il mesure 24 mètres de haut, 11 mètres 50 de long et 9 mètres 60 de large, sa partie supérieure est couronnée de mâchicoulis pratiqués entre des corbeaux reliés par des arcs en plein cintre, et couverte d'un toit en tuiles à quatre pans. une construction rectangulaire oblong à trois niveaux jouxte le donjon. Ce n'est qu'en 1920, qu'un musée sera installé dans ses murs  ouvert au public. Château-fort de Lourdes est inscrit aux M.H. depuis 1995.                                                                                                                                           LUGAGNAN, manoir du XIXe siècle, sur les hauteurs de la route qui mène à Jer en venant de Lourdes. Ensemble avec corps de logis à un étage. L'élévation principale possède cinq travées avec une porte centrale à double vantail surmontée d'un balcon. La toiture à la Mansart est décorée de trois  lucarnes alternant deux oeils- de- boeuf ouverts sur le brisis. À l'intérieur, beau départ d'escalier sculpté.","habitants":"Comtes de Bigorre\r\n        \r\n        \r\n        \"","divers":"Plusieurs châteaux à Lourdes dont le château-fort , de Lugagnan, château de Soum, la maison d'Henry IV  et l'hôtel de ville","gps":"","images":["../image/image_65/65_Lourdes_1.jpg","../image/image_65/65_Lourdes_2.jpg","../image/image_65/65_Lourdes_3.jpg","../image/image_65/65_Lourdes_4.jpg","../image/image_65/65_Lourdes_5.jpg","../image/image_65/65_Lourdes_6.jpg","../image/image_65/65_Lourdes_7.jpg","../image/image_65/65_Lourdes_8.jpg","../image/image_65/65_Lourdes_9.jpg"]},"Consult_chateau_formulairea99a":{"id":"Consult_chateau_formulairea99a","dept":"65","canton":"Trie sur Baïse","commune":"Lubret_Saint-Luc","nom":"Lubret_St_Luc","type":"Château","periode":"XV","histoire":"LUBRET-Saint-Luc est une commune proche de Trie-sur-Baïse. Le château du Castet, bâtiment construit en 1470, est  connu pour son donjon barlong .  Château de M. et Mme Carrère.","architecture":"Lubret-Saint-Luc est une commune proche de Trie-sur-Baïse. Le château du Castet, bâtiment construit en 1470, est  connu pour son donjon barlong le long du mur du château, les propriétaires ont réalisés une superbe mosaïque. La demeure date de 1470, érigée sur quatre niveaux de 150 mètres carrés que coiffent des combles. C'est là que l'incendie a fait rage, détruisant la totalité de la toiture volumineuse qui s'est alors effondrée sur les étages inférieurs.","habitants":"Seigneur locaux\r\n        \r\n        \"","divers":"Château de lubret le castet à saint-Luc","gps":"","images":["../image/image_65/65_Lubret_St_Luc_1.jpg","../image/image_65/65_Lubret_St_Luc_2.jpg","../image/image_65/65_Lubret_St_Luc_3.jpg","../image/image_65/65_Lubret_St_Luc_4.jpg","../image/image_65/65_Lubret_St_Luc_5.jpg","../image/image_65/65_Lubret_St_Luc_6.jpg","../image/image_65/65_Lubret_St_Luc_7.jpg"]},"Consult_chateau_formulaire670c":{"id":"Consult_chateau_formulaire670c","dept":"65","canton":"Trie sur Baïse","commune":"Lustar","nom":"Lustar","type":"Château","periode":"XIX","histoire":"LUSTAR, pas d'information historique, aujourd'hui chambres d'hôtes.","architecture":"Lustar, cette magnifique propriété comprend une activité de chambre d'hôtes et gîte, construite en 1851, cette imposante maison de maître a été superbement rénovée et a conservé de nombreux éléments d'origine: cheminées en marbre, parquets au sol et escalier elliptique.","habitants":"\"","divers":"Château de Lustar","gps":"","images":["../image/image_65/65_Lustar_1.jpg","../image/image_65/65_Lustar_2.jpg"]},"Consult_chateau_formulairebae7":{"id":"Consult_chateau_formulairebae7","dept":"65","canton":"Argelès-Gazost","commune":"Esterre","nom":"Luz_Ste_Marie","type":"Vestiges","periode":"XII","histoire":"Luz-Sainte-Marie le château fut érigé par de Montblanc, le comte de Bigorre Centulle III au XIIe siècle pour raffermir son autorité auprès des barégeois et trouver un abri en cas dagression de leur part. Lenquête royale de 1300 demandée par le roi Philippe le Bel précise que le comte consacrait sept sols tournois pour lentretien du châtelain et de quatre hommes de garde. A cette époque, Jean de Soubile  le tenait pour le compte de la reine de Navarre, épouse de Philippe le Bel. Lors du traité de Brétigny, en 1360, la château fut occupé par une garnison anglaise et un nouveau châtelain fut nommé en 1384 .  En 1404, assiégé et brûlé, le château fut repris par le comte de Clermont, Jean de Bourbon.  Les anglais furent chassés. Jean de Bourbon fut aidé par les habitants de la vallée de Barèges qui se soulevèrent contre le Sénéchal anglais pour un désaccord sur des questions de pâturages et étaient commandés par lun des leurs du nom dAugé de Coufite de Luz.  Les fonctions de la châtellenie cessèrent à ce moment-là. A la fin du XVIe siècle, le seigneur dOssun le déclara  ruinée et au XVIIe siècle, on parle de masure. Il appartient alors à labbaye de Saint-Savin. A la Révolution, il fut vendu comme bien national. Les tours servirent ensuite de grenier à foin.","architecture":"Il ne reste du château que deux tours (une ronde et une carrée) avec entre les deux une muraille les reliant, quon appelle courtine. Devant le château se trouvait autrefois une chapelle nommée prieuré de Sainte-Marie, doù le nom du château.l existe également une légende qui relie Le château à la chapelle Solférino.  Le donjon carré a une hauteur dune douzaine de mètres environ. Il est construit en plusieurs niveaux et lépaisseur des murs diminue à chaque étage (comme au château des Angles). La porte au niveau du sol est plus récente et date du XIXe siècle. Quelques petites ouvertures permettaient de tirer à larc pour se défendre,  la courtine et la tour ronde,  une dizaine de trous sur la courtine (appelés corbeaux). Ils servaient  à soutenir un chemin de ronde ou un toit. Des arrachements laissent supposer laccolement dune salle. La tour ronde est un peu plus basse que la tour carrée, et à sa base apparaît larrachement dune autre courtine. Elle possède des latrines en forme de mâchicoulis.","habitants":"Jean de Bourbon comte de Clermont\r\n        \r\n        \"","divers":"Vestiges du château de Luz sainte-Marie à Esterre","gps":"","images":["../image/image_65/65_Luz_Ste_Marie_1.jpg","../image/image_65/65_Luz_Ste_Marie_2.jpg","../image/image_65/65_Luz_Ste_Marie_3.jpg","../image/image_65/65_Luz_Ste_Marie_4.jpg","../image/image_65/65_Luz_Ste_Marie_5.jpg","../image/image_65/65_Luz_Ste_Marie_6.jpg","../image/image_65/65_Luz_Ste_Marie_7.jpg","../image/image_65/65_Luz_Ste_Marie_8.jpg"]},"Consult_chateau_formulairee8fb":{"id":"Consult_chateau_formulairee8fb","dept":"65","canton":"Maubourguet","commune":"Maubourguet","nom":"Maubourguet","type":"Château","periode":"XVI","histoire":"Plusieurs châteaux à Maubourguet dont celui de Lussy, de  Belle-Allée.   MAUBOURGET Le 19 mars 1814, le maréchal Soult conduit la retraite dEspagne de larmée des Pyrénées face à larmée coalisée anglo-hispano-portugaise commandée par le maréchal duc de Wellington. Soult recule lentement vers Toulouse, en longeant les Pyrénées et harcèle l'adversaire par des combats brefs mais violents. Deux embuscades se déroulent à Maubourguet dans la journée du 19 mars, lune au pont de l'Echez et lautre dans le bois du Marmajou. Les deux armées se font face à Maubourguet, mais la bataille a lieu finalement à Toulouse le 10 avril 1814.                                                                                                                                   LUSSY de la famille de Lussy présente depuis 1609 dont un de ses membres, Albert Bergès, fils de Carline de Lussy fût le maire aux neuf mandats de 1870 -71 de 1880-1923                                                                                 le domaine de Saint-Girons, une ancienne villa gallo-romaine datant du IVe siècle, inscrite au titre des monuments historiques, dans lequel la mosaïque au dieu Océan a été trouvée.                                                                              BELLE-ALLEE et PESSAN manoir du XVIII-XIX  pas d'information historique.","architecture":"Château de Maubourguet; de Lussy, de Pessan du XVIII-XIXe siècles, sont des châteaux de plan rectangulaires à deux niveaux avec pavillon saillant plein cintre accolés de pavillons carrés sur les extrémités.  Belle-Allée de plan rectangulaire à deux niveaux avec lucarnes sur toit à deux pans accolé d'un imposant pavillon  à trois travées et  lucarne centrale sur toit à quatre pans.                                                                                 Maison Pagès, Le Maubourguétois et autour de la place de la libération (maison Gassiot, maisons à terrasses, maison des associations du XVIIIe, l'ancienne école et encore bien d'autres dans les rues adjacentes. Admirez les portes et linteaux, les encadrements, les génoises et corniches et surtout ne repartez pas sans passer par le passage du canal.","habitants":"Famille de Lussy\r\n        \r\n        \"","divers":"A Maubourguet la maison de Pagés, le château de Lussy de Belle-Allée  et le manoir de Pessan","gps":"","images":["../image/image_65/65_Maubourguet_1.jpg","../image/image_65/65_Maubourguet_2.jpg","../image/image_65/65_Maubourguet_3.jpg","../image/image_65/65_Maubourguet_4.jpg","../image/image_65/65_Maubourguet_5.jpg","../image/image_65/65_Maubourguet_6.jpg","../image/image_65/65_Maubourguet_7.jpg"]},"Consult_chateau_formulaire9c5e":{"id":"Consult_chateau_formulaire9c5e","dept":"65","canton":"Mauléon-Barousse","commune":"Mauléon-Barousse","nom":"Mauléon_Barousse","type":"Château","periode":"XII","histoire":"MAULEON-BAROUSSE est un nom transféré. Il provient de Mauléon-Soule au Pays basque dans les Pyrénées-Atlantiques depuis que, vers 1120, un seigneur de Soule a acquis par mariage la seigneurie de Barousse pour moitié. Bernard Ier de Mauléon, est le fondateur de la famille, et de la ville. En effet, il épouse la fille qu'Auger qui a eu de son second mariage avec l'héritière de la Barousse. C'est à partir de 1120 que s'établit la distinction entre la baronnie de Mauléon et celle de Bramevaque.   La tour pentagonale située à côté du château date du XIe siècle. Cependant, selon les sources, elle fut construite par Auger ,avec le château , aux environs de l'an 1100, ou par son père Sanche Ier en 1070.\r\nLe bourg fut mentionné sous les noms de Mauleon en 1184, Maileon (1219), Maloleone (1387, à l'italienne), Maulion (1738), Mauleon (1770 sur la carte de Cassini), Mauléon-Barousse (1806).\r\nCe nom, du gascon mau lioû qui signifie « mauvais lion », est une production de l'époque féodale, où l'on cherchait plus à susciter la crainte que la sympathie.","architecture":"Château de Mauléon remanié au XIIIe - XIVe siècle, avec sa tour pentagonale du XIe siècle Le village est le petit centre de la vallée de la Barousse. Tour pentagonale du XIe siècle de l'ancien château.             Perché à 600m. d'altitude sur les hauteurs de Mauléon, sur le vieux chemin menant à Esbareich,                                                                                                   le manoir DUTREY est un château privé. La date de construction en 1747 est lisible sur le fronton de la porte centrale.","habitants":"Bernard Ier de Mauléon\r\n        \r\n        \r\n        \"","divers":"Château de Mauléon avec sa tour, le manoir Dutrey et maison à colombage","gps":"","images":["../image/image_65/65_Mauleon_Barousse_1.jpg","../image/image_65/65_Mauleon_Barousse_2.jpg","../image/image_65/65_Mauleon_Barousse_3.jpg","../image/image_65/65_Mauleon_Barousse_4.jpg","../image/image_65/65_Mauleon_Barousse_5.jpg","../image/image_65/65_Mauleon_Barousse_6.jpg","../image/image_65/65_Mauleon_Barousse_7.jpg","../image/image_65/65_Mauleon_Barousse_8.jpg"]},"Consult_chateau_formulaired74c-2":{"id":"Consult_chateau_formulaired74c-2","dept":"65","canton":"Tournay","commune":"Mauvezin","nom":"Mauvezin_65","type":"Château fort","periode":"XI-XIV","histoire":"MAUVEZIN,   château fort a été bâti au XIe siècle par les comtes de Bigorre,  d'architecture militaire  doit son essor à Gaston Fébus, vicomte souverain du Béarn et comte de Foix, il s'efforça en effet, par tous les moyens, de récupérer le château de Mauvezin et la Bigorre dont sa famille avait été injustement spoliée en 1292. Il a été reconstruit par Gaston Fébus vers 1380, il mourut en 1391. Il reste dans la famille des Béarn-Foix qui deviennent plus tard rois de Navarre, et ainsi passe à Henri IV. Il tombe en désuétude après le rattachement de la Bigorre au royaume de France en 1607 ; c'est la fin des châteaux forts à vocation défensive, fut restaurée au début du XXe siècle par Albin Bibal et une association \"L'Escòla Gaston Fébus\", afin de le rendre visitable, le sauvant ainsi d'une mort certaine.  L'état a pris en considération la valeur de son travail en la reconnaissant d'utilité publique. Aujourd'hui, le château est en cours de restauration et abrite un musée historique et folklorique du Béarn et de la Bigorre Le château et le donjon de Gaston Fébus ont été inscrits monument historique par arrêté du 22 décembre 1941.","architecture":"Mauvezin castrum au haut Moyen-Âge, un château fort a été bâti au XIe siècle Gaston Fébus le transforma en forteresse, il fit construire un énorme donjon quadrangulaire de 37 mètres de haut  et ses murs à la base de 3 mètres d'épaisseur,  surélever les remparts puis couronna les murailles de la forteresse de mâchicoulis  Les murailles  forment un quadrilatère rectangle de trente-cinq mètres de côté sur quinze mètres de haut, consolidées par sept épais contreforts et couronnées par un chemin de ronde de deux mètres de largeur. Les remparts sont surmontés de mâchicoulis. Le château comprend 6 salles aménagées, avec une collection d'armes et des machines de guerre. Ils sont construits, en grande partie, avec des cailloux roulés de l'Arros, mêlés par endroits à des assises de briques. La chaux utilisée provenait des carrières voisines, situées au nord-ouest du château.  Il fut démantelé petit à petit, ses pierres servant alors pour d'autres constructions.   cette forteresse, fut dépouillée lentement de ses pierres surtout pendant la Révolution.","habitants":"Gaston Febus\r\n        \r\n        \r\n        \"","divers":"Vestiges du château de Mauvezin","gps":"","images":["../image/image_65/65_Mauvezin_65_1.jpg","../image/image_65/65_Mauvezin_65_2.jpg","../image/image_65/65_Mauvezin_65_3.jpg","../image/image_65/65_Mauvezin_65_4.jpg","../image/image_65/65_Mauvezin_65_5.jpg","../image/image_65/65_Mauvezin_65_6.jpg","../image/image_65/65_Mauvezin_65_7.jpg","../image/image_65/65_Mauvezin_65_8.jpg"]},"Consult_chateau_formulaireff3a":{"id":"Consult_chateau_formulaireff3a","dept":"65","canton":"Argelès Gazost","commune":"Adast","nom":"Miramont_Adast","type":"Château","periode":"XVII","histoire":"MIRAMONT, le château de Miramont en 1270 est légué après le décès de Mathe de Bigorre-Mâtas à l'une de ses filles, Marguerite. Cette demeure abrita  les familles nobles des Beaucens au XIIIe siècle, les Miramont de 1300 à 1474, les Serres de 1474 à 1505, les d'Antist de 1505 à 1662, les Lamarque de 1662 à 1686, les Caubotte de 1686 à 1698 et les Despourrins jusqu'à 1840.  Puis au XVIIe siècle, il devient le refuge et la demeure du poète Cyprien Despourrins dont la mère était Gabrielle de Miramont. Le château est ensuite acheté par Bernard Abadie-Gaye habitant de Sazos (près de Luz-Saint-Sauveur).  Le château est également habité par le docteur Jean-François Calot (1861-1944), chirurgien qui fait progresser la chirurgie orthopédique en préférant des traitements conservateurs aux amputations systématiques. Il fait toute sa carrière à partir de 1890 à Berck et il prend sa retraite au château de Miramont.\r\nÀ la fin des années 1960, le château de Miramont est vendu par les filles de Calot au journaliste-animateur de radio télévision Jacques Chancel, originaire du village voisin d'Ayzac-Ost.   Profondément attaché à sa Bigorre natale, Jacques Chancel, natif d'Ost, dans le Lavedan, Jacques Chancel (Crampes-Bourdette de son vrai nom) Crampes Jacques Chancel en 1928  homme de plume et de radio, y possédait un château perché. Il sera ensuite revendu par un descendant de cette famille, fils de Louise Abadie-Gaye, Célestin Carrere, en 1906.","architecture":"Le château de Miramont, une osmose si intense avec le pays originel qu'il y acquiert le château de Miramont, élégant manoir de la fin du XVIIe-début XVIIIe siècle, perché sur les hauteurs d'Adast, un bourg situé entre Argelès-Gazost et Pierrefitte-Nestalas. Le Château de Miramont: du XVIIIe siècle a été remodelé au XIXe siècle. Il fut habité de 1729 à 1759 par le poète Cyprien Despourrins, syndic de la noblesse et subdélégué de l' Intendant d'Etigny. Cest lui qui transforma lancienne et austère demeure médiévale de Mansion Loup, premier vicomte du Lavedan (910-940), en agréable demeure aux larges pièces et grandes ouvertures.","habitants":"Famille de Miramont\r\n        \r\n        \"","divers":"Château  de Miramont à Adast.","gps":"","images":["../image/image_65/65_Miramont_Adast_1.jpg","../image/image_65/65_Miramont_Adast_2.jpg","../image/image_65/65_Miramont_Adast_3.jpg"]},"Consult_chateau_formulaire4e8c":{"id":"Consult_chateau_formulaire4e8c","dept":"65","canton":"Tarbes","commune":"Tarbes","nom":"Montagnan","type":"Château","periode":"XVIII","histoire":"MONTAGNAN,  M. Barthélémy Montagnan, originaire de Hèches, lachète en 1890 : Il faut dire que dans la famille Montagnan on a  la passion des chevaux. M. Paul-Maurice Montagnan, est  président de la société du concours hippique, à Tarbes en 1891 et que M. Montagnan est éleveur et  propriétaire d'un haras des plus importants, primes et récompenses en 1884. Il est également conseiller général des Hautes-Pyrénées. Paul-Maurice Montagnan sest marié avec Marie-Amélie Estevenet. A la mort de M. Montagnan, cest sa fille Mme Marre qui en hérite  et qui le vend à Mr Jean Félix Ducor en 1920. En 1922, M. Ducor vend le bâtiment à M. Barthélémy Gache (fondateur de la SMF) entrepreneur de maçonnerie qui a construit entre autres la mairie et lhôtel des postes de Tarbes et qui y est mort de façon accidentelle écrasé par sa propre voiture. M. Barthélémy  Gache décède en 1931 : ses deux filles héritent du château Montagnan et le vendent en 1946 à létat pour les postes télégraphes et téléphones. Une partie du bâtiment est déjà louée au moment de la vente au département des Hautes-Pyrénées qui y loge les services de linspection académique qui le quittent quelques mois plus tard.","architecture":"M. Barthélémy Montagnan, originaire de Hèches, lachète en 1890 et fait construire la façade sud que nous voyons aujourdhui  depuis la place de la Liberté dans un style « éclectique composite » très en vogue à la charnière du XIX-XXe siècle mélangeant des références néo-renaissance et médiévale avec des accents régionalistes (emploi galets roulés de l'Adour en parement de façade) cela devient « château » ou castel selon la terminologie à la mode à cette époque.","habitants":"Famille de Montagnan\r\n        \r\n        \"","divers":"Château de Montagnan à Tarbes","gps":"","images":["../image/image_65/65_Montagnan_1.jpg","../image/image_65/65_Montagnan_2.jpg","../image/image_65/65_Montagnan_3.jpg","../image/image_65/65_Montagnan_4.jpg","../image/image_65/65_Montagnan_5.jpg","../image/image_65/65_Montagnan_6.jpg"]},"Consult_chateau_formulaire609c-2":{"id":"Consult_chateau_formulaire609c-2","dept":"65","canton":"Lourdes","commune":"Oursbelille","nom":"Montjoie_65","type":"Château","periode":"XVII","histoire":"MONTJOIE, érigé au milieu du XIXe siècle par une famille de notables locaux, il connut une période faste au milieu d'un domaine de 70 hectares de terres vouées à l'agriculture et à l'élevage sur lesquelles étaient employés de nombreux ouvriers agricoles issus de la commune. Et son avenir semblait devoir se dérouler sans heurt jusqu'à ce qu'il ne se retrouve entraîné dans l'enfer de la dernière guerre mondiale lorsque les troupes d'occupation atteignirent Oursbelille. Le dernier directeur refusant de résilier son bail, la commune engagea contre lui une longue procédure pour faire cesser le bail à construction et ce n'est qu'en 2013, et après deux condamnations du dirigeant, que la commune recouvrit la pleine propriété du château. Pendant ces douze années, la bâtisse fut laissée à l'abandon et victime de dégâts et de vols, au grand désespoir du maire qui fit tout ce qu'il put pour lui éviter ces outrages. Le maire d'Oursbelille Henri Fatta a rappelé que le château de la Montjoie avait été un haut lieu de résistance bombardé le 6 juin 1944 par l'occupant nazi. C'est Alain Schwebel, aujourd'hui disparu, qui est à l'origine du projet en tant que président de l'Adapei et qui a inauguré de son vivant en 2013 la ferme-jardin.","architecture":"Pendant ces douze années, la bâtisse fut laissée à l'abandon et victime de dégâts et de vols, au grand désespoir du maire qui fit tout ce qu'il put pour lui éviter ces outrages. Lorsqu'il apprit, en 2007, que l'Adapei recherchait un site pour y installer un lieu de vie, il y vit une chance extraordinaire de sortir le château de son triste sort et d'en écrire une nouvelle page de son histoire. Le président de l'Adapei, Alain Schwebel, unissant ses efforts à ceux du maire, travailla d'arrache-pied à la constitution d'un projet destiné à la création d'un foyer de vie pour personnes handicapées.","habitants":"Notables locaux\r\n        \r\n        \"","divers":"Château de Montjoie à Oursbelille","gps":"","images":["../image/image_65/65_Montjoie_65_1.jpg","../image/image_65/65_Montjoie_65_2.jpg","../image/image_65/65_Montjoie_65_3.jpg","../image/image_65/65_Montjoie_65_4.jpg","../image/image_65/65_Montjoie_65_5.jpg"]},"Consult_chateau_formulaire1923":{"id":"Consult_chateau_formulaire1923","dept":"65","canton":"Capvem","commune":"Montoussé","nom":"Montoussé","type":"vestiges","periode":"XII","histoire":"MONTOUSSE, longtemps propriété des Rois de France depuis le XIIIe siècle  jusquen 1789  De nombreux capitaines sy succédèrent et appliquèrent dès 1416 une « taxe » payée par les marchands sur le bétail et les marchandises. En contre partie, la garnison les protégeait durant la traversée dangereuse des landes de Lannemezan.   Le caractère exceptionnel du château de Montoussé réside dans le fait que ses fortifications ont été utilisées à des fins guerrières jusquà la seconde guerre mondiale. Ce qui prouve la position stratégique sans équivalent du \"Rocher de Montoussé\". On peut penser quun château existait déjà, le donjon datant du XIIe siècle.  Démantelé par les Rois de France au début du XVIIe siècle, le château va subir au fil des siècles les outrages des hommes et du temps jusquau coup fatal porté par une compagnie SS, durant le second conflit mondial, qui dynamitera le donjon et la tour sud pour installer un poste DCA  dont les usines chimiques de Lannemezan, sy était installée de 1942 à 1944.     Après la Révolution Française ce qui restait de la forteresse fut pillé.","architecture":"Les ruines du château de Montoussé se dressent fièrement sur le sommet dune colline qui surplombe le village de Montoussé. À voir : porte, basse cour, vestiges du donjon, bases des murs d'enceinte, chapelle et citerne restaurées (unique exemplaire des Hautes-Pyrénées). Vue panoramique sur la Vallée de la Neste.      Occupé tour à tour par des pillards, des ligueurs et des huguenots, le château de Montoussé fut démantelé par deux fois sur ordre du Roi, soucieux que sa propriété ne puisse protéger ses ennemis. Après la Révolution Française ce qui restait de la forteresse fut pillé. Depuis 1995, grâce à linitiative de lAssociation des Amis du Château Fort de Montoussé (ACFM) les vestiges du château font lobjet dun entretien rigoureux et soigné.  Le public ne peut visiter que les extérieurs de l'ensemble du site encore bien présent pour témoigner dune architecture militaire élaborée et perfectionnée au fil des siècles.","habitants":"Seigneurs locaux\r\n        \r\n        \r\n        \"","divers":"Vestiges du château de Montoussé","gps":"","images":["../image/image_65/65_Montousse_1.jpg","../image/image_65/65_Montousse_2.jpg","../image/image_65/65_Montousse_3.jpg","../image/image_65/65_Montousse_4.jpg","../image/image_65/65_Montousse_5.jpg","../image/image_65/65_Montousse_6.jpg","../image/image_65/65_Montousse_7.jpg","../image/image_65/65_Montousse_8.jpg","../image/image_65/65_Montousse_9.jpg"]},"Consult_chateau_formulaire764e-3":{"id":"Consult_chateau_formulaire764e-3","dept":"65","canton":"Maubourget","commune":"Castelnau-Rivière-Basse","nom":"Montus_Tail","type":"Château","periode":"XII-XVIII","histoire":"MONTUS, c'est dans les années 80 qu'Alain Brumont acquiert le château Montus, au terroir renommé depuis le XVIIIe siècle. C'est à cette période qu'il prouva au monde entier, grâce à des cuvées de prestiges, que l'on pouvait faire de grands vins dans le Madiran.   Avec sa vue imprenable sur la vallée de l'Adour et le village classé de Mazères, elle peut accueillir jusqu'à 150 personnes. La famille de Jean-François Xavier Noguès (déc. 1769déc. 1808 : engagé volontaire dans l'armée des Pyrénées-Orientales, commandant la place de Marseille (1799) puis la Xe division militaire (Toulouse) ; lieutenant-général des armées de Louis Bonaparte, roi de Hollande21. Antoine Noguès (mai 1777déc. 1853 à Jû-Belloc (Gers) : frère du précédent, général de brigade, blessé à Waterloo.                                                                                                  CASTELNAU-RIVIERE-BASSE La ville suit donc les changements de suzerain : jusqu'en 1256, elle est  le fief de Bigorre, puis de 1256 à 1306, rattachée au Béarn et enfin à partir de 1306 rattachée à l'Armagnac, qui reconnait les forts et coutumes de la ville de Castelnau.  Le 4 septembre 1489, Charles VIII décide de faire de Castelnau une place forte réunie provisoirement au domaine de la couronne, situation provisoire mais durable  jusqu'à la chute de la royauté. Même rattachée au Béarn puis à l'Armagnac, la Rivière Basse dépendait du diocèse de Tarbes, héritage de son premier suzerain bigourdan.                                                                                                            VILLEFRANQUE,  château de  Mondégourat    du XVe siècle appartenait à la comtesse  de Franclieu, il a appartenu à la famille de Tauzia.                                                                                                                           TAIL, château   ancien domaine viticole transformé en chambres d'hôtes par la famille Bolac","architecture":"Castenau rivière basse, restes des remparts du XVIe siècle: porte de ville servant de clocher ; anciens fossés, pans de murs. Ruines du château fort des comtes de Bigorre : donjon rectangulaire et fragments d'enceinte XIIIe siècle, sur une motte. Châteaux du Tail et de La Tyre. gentilhommière de Montus, XVIIIe et XIXe siècle, près de laquelle se trouvait l'église de cette communauté disparue, annexée par Castelnau.  Domaine de Laborie, à La Tyre : grand chai, ancien chai, tour carrée et petit pavillon (IMH). Architecture sacrée.    Comme les remparts ou les anciens fossés, le donjon rectangulaire fait partie des derniers vestiges du château fort des Comtes de Bigorre (XIIIe siècle).  Lécole des garçons et sa tour ont été construites en 1881. La cloche servait à sonner les heures décole.                                                                          Tail,  ancien domaine viticole du XVIIIe siècle","habitants":"Famille d'Alain Brumont\r\n        \r\n        \"","divers":"Vestiges de Castelnau Rivière Basse, du château des Montus , du Tail, de Mondégourat et de l'Ecole","gps":"","images":["../image/image_65/65_Montus_Tail_1.jpg","../image/image_65/65_Montus_Tail_2.jpg","../image/image_65/65_Montus_Tail_3.jpg","../image/image_65/65_Montus_Tail_4.jpg","../image/image_65/65_Montus_Tail_5.jpg","../image/image_65/65_Montus_Tail_6.jpg","../image/image_65/65_Montus_Tail_7.jpg","../image/image_65/65_Montus_Tail_8.jpg","../image/image_65/65_Montus_Tail_9.jpg"]},"Consult_chateau_formulaire32aa":{"id":"Consult_chateau_formulaire32aa","dept":"65","canton":"Lourdes","commune":"Peyrousse","nom":"Mourle","type":"Château","periode":"XIV","histoire":"PEYROUSE, il ne s'agit pas ici d'un château mais d'un village édifié au Moyen-Age.Tout le monde est daccord pour voir dans ce nom le gascon Peirosa : terre pierreuse. Michel Grosclaude nous rappelle que cest ainsi que la commune est citée en 1308. Les dites pierres sont en fait les nombreux blocs de granit formant les épandages morainiques. Peyrouse est une bastide formée en 1308 par le sénéchal de Bigorre, Pierre de Crozes (ou Pey de Cros), afin de désengorger la surpopulation du pays Toy.  Le conseil municipal de Lourdes a vendu à Achille Fould en 1856, des parcelles de bois de Mourle et des landes de la métairie de Bouchède, sur une des rives du lac de la ville. Puis, en 1861, la commune de Peyrouse lui a vendu sur les hauteurs, un petit immeuble qu' il transforma en \"château\" en y ajoutant des écuries. C'est ce \"château\" hors écuries que racheta Ph Douste-Blazy, alors maire de la ville,  en le baptisant La bergerie. Il a été vendu à un particulier d'origine écossaise, à son départ de la cité mariale.","architecture":"Les bastides dans le Sud-Ouest de la France étaient à partir du XIVe siècle, des villes nouvelles fortifiées, au plan quadrangulaire, réalisées dans des buts militaires ou politiques. Les efforts faits par le sénéchal furent un échec. Les montagnards récalcitrants restèrent en majorité chez eux ; le manque deau aurait été une des principales raisons. Peyrouse resta un modeste village. Jean de Mauquenchy essaya de continuer luvre de son prédécesseur, en vain. Par contre de nombreux Cagots ou Crestias y avaient trouvé refuge dès le XIIIe siècle. Peyrouse était au XIXe siècle un centre de fabrication de peignes et dobjets en buis ; de ce buis qui pousse dans les massifs calcaires environnants. De la bastide il ne resterait que des fondations d'une tour au lieu-dit Crozes sur le terrain de camping.","habitants":"Pierre de Crozes\r\n        \r\n        \"","divers":"Château de Mourle à Peyrousse","gps":"","images":["../image/image_65/65_Mourle_1.jpg"]},"Consult_chateau_formulairec1b6":{"id":"Consult_chateau_formulairec1b6","dept":"65","canton":"Barbazan-Debat","commune":"Odos","nom":"Odos","type":"Château","periode":"XVII","histoire":"ODOS en 1380, tenu par les Anglais, a été assiégé et détruit par les troupes de Du Guesclin, en 1429 : Bernard de Coarraze reçoit de Jean de Foix, son suzerain, la seigneurie d'Odos,  reconstruit à partir de 1490 par Madeleine de France, sur de Louis XI, reine de Navarre.   En  1525  Marguerite d'Angoulême, dite aussi Marguerite de Navarre, sur de François Ier, épouse d'Henri d'Albret, reine de Navarre et châtelaine d'Odos. En 1534  Jean de Coarraze, petit-fils de Bernard de Coarraze, vend la seigneurie d'Odos à Jeannicot de Lassale. En 1549  mort de Marguerite de Navarre, grand-mère d'Henri IV, au château d'Odos. En  1596  Henri IV confie à Jean de Lassale, fils de Joannicot,  un château qui est à présent  ruiné. En 1701 procès des habitants contre le seigneur d'Odos, mais un arrêt du parlement de Toulouse maintient le seigneur dans la propriété des landes. En 1783  Paul de Lassale, dernier seigneur d'Odos, veuf de Barthélémie Ducasse d'Artagnan, épouse en secondes noces Cécile Barère de Vieuzac, jeune sur de Bertrand Barère.\r\n16 octobre 1787 : décès de Paul de Lassale, 75 ans. De 1852 - 1864  le château est fortement remanié par le général Courby de Cognord, époux de Joséphine de Lassale, petite-fille de Cécile Barère de Vieuzac.     En 1895  le château est acheté par Paul et Madeleine de Févelas, qui s'y installent en 1907. À la mort de Madeleine de Févelas en 1958,le château reste à l'abandon.    En 1968  M et Mme Galissard achètent le château et le restaurent.","architecture":"Le château d'Odos, reconstruit à partir de 1490  sur une motte féodale, reconstruit au XIXe siècle.  Acquisition de la propriété Cénac Larré pour la construction de la mairie-école. Le 21 janvier 1871  vente aux enchères de 2 lots, le château avec ses dépendances (12 hectares), et la métairie Gardette (43 hectares).  il fut pendant quelques années et jusqu'à sa mort le séjour de Marguerite de Navarre. Son aspect actuel date du milieu du XIXe siècle. Le propriétaire fit appel à Auguste Virebent qui enveloppa le château d'un décor de terre cuite, donnant à l'ensemble un aspect troubadour.  Eléments protégés MH  Les façades et toitures du château ainsi que la totalité du sol de la parcelle d'assiette constituant le site médiéval fossoyé d'Odos inscription par arrêté du 27 février 2006.","habitants":"Famille de Paul de Lassale\r\n        \r\n        \"","divers":"Château d'Odos","gps":"","images":["../image/image_65/65_Odos_1.jpg","../image/image_65/65_Odos_2.jpg","../image/image_65/65_Odos_3.jpg","../image/image_65/65_Odos_4.jpg"]},"Consult_chateau_formulaire1fb3-2":{"id":"Consult_chateau_formulaire1fb3-2","dept":"65","canton":"Lourdes","commune":"Omex","nom":"Omex","type":"Maison forte","periode":"XIV","histoire":"OMEX, le propriétaire actuel, amoureux des vieilles pierres, a mis au jour, intégrée dans la maçonnerie, contre une pile, une très belle dalle sculptée, probablement un couvercle de cuve sépulcrale romane, représentant un évêque avec sa crosse. Certains y voient saint Saturnin, premier évêque de Toulouse. Jusquen 1878, le maréchal Foch venait passer ses vacances dans cette belle maison, qui appartenait alors à sa marraine, Mme Normande.  Les ruines de la tour, cest ce quil reste du château du seigneur Bernat de Doumec dAoutmets (1300). Il était vassal de la châtellenie de Castelloubon. On sait que dès le XVIIe siècle, le château construit sur la motte féodale entourée de fossés et protégé  par une enceinte  qui était déjà ruinée et abandonné par ses propriétaires originaires de Pontacq  Les bâtiments attenants ainsi que la grange,  jadis appartenaient à la famille Doucette, doù parfois leur nom de maison Doucette (propriété privée). Une partie des pierres a servi à la construction de la grange en contrebas.  En 1983, le site a été dégagé des broussailles par messieurs Cahuzacq et Varichon de la SESV . Il présente une surface sommitale plane d'environ 40 m² entourée de fossés et abritant les vestiges d'une tour destinée à la défense, aux murs en galets de 1, 45 m d'épaisseur, formant un carré de 5,60 m de côté.","architecture":"le vestige le plus visible de la rue est lancienne entrée de la chapelle romane du château, représenté par un chrisme du XIe siècle, dégagé de son crépi en 1976. La moitié du mur Sud de la chapelle a été abattu en 1947, pour ajouter une extension en L  plus adaptée aux engins agricoles. Sur le mur Nord, une baie a été occultée. La chapelle castrale a servi d'église paroissiale jusqu'au XVIIIe siècle,  il sagit de lancien château des seigneurs dOmex. Il a été plus que remanié au cours des siècles. Le bâtiment haut qui sert de gîte rural, était lancienne tour gothique. Tout autour de la propriété subsistent encore les bases des anciens remparts, et l'occupant en 2014, M. Bordère a mis au jour de nombreuses pierres sculptées dont des claveaux et des fragments de linteaux.  À lintérieur, très belle fontaine murale du XVIIIe siècle, en marbre noir.","habitants":"Famille Doucette\r\n        \r\n        \"","divers":"Maison forte d'Ormex","gps":"","images":["../image/image_65/65_Omex_1.jpg"]},"Consult_chateau_formulaire012f":{"id":"Consult_chateau_formulaire012f","dept":"65","canton":"Argelès-Gazost","commune":"Ayzac-Ost","nom":"Ost_Ayzac","type":"Château","periode":"XIII","histoire":"deux châteaux à Ost et Ayzac, celui d'Ost et celui d'Ayzac.                                                                                        OST,  le grand empereur fit don à labbaye de St Savin du château et de ses dépendances,  il ne  reste que peu de bâti, se trouve à Ayzac, dans la forêt des châtaigniers centenaires. Le premier seigneur connu d'après Bourdette était Fort, en 1060 et le dernier Charles-Alexandre de Boussés allié à la famille d'Espourrin. Propriétaire la  famille d'Ayzac de 1060 à 1361 à la Famille d'Ost de 1450 à 1541  de 1445-1489 Famille de Miramont 1480-1504 Famille de Serres 1505-1654, à la Famille d'Antist 1654 1665 a la Famille de Foix-Rabat 1665-1767 Famille de Monda  1767-1781 Famille de Castelbajac. 1780-1789 Charles-Alexandre ensuite à La seigneurie Soulas d'Ost ou  Monda Les familles seigneuriales propiétaires daprès Jean Bourdette famille de Péne de Sère de 1550 à 1769  et de 1769-1780 Laurent de Boussés (allié aux Despourrins) 1781-1789 Famille de Mua Barbazan.  Il a également appartenu à un lieutenant-colonel de l'armée britannique, Mr Cordogan, il est décédé en 1851.  Le fief d'Ayzac appartiendra durant plus dun siècle aux descendants des Cazaubon, dont une partie de la famille émigre en Argentine. En 1968, le domaine revient à Suzanne Cazaubon, fille dAlbert. Elle épouse Maurice Augustin Perrard en 1937. Leur fille, Jacqueline épouse en 1956, le comte polonais Ladislas-Jules-Adam-Thomas Tarnowski,  le dernier propriétaire est la comtesse Jacqueline Tarnowski.","architecture":"Le « château de la Vieille Tour » est bordé dun long et haut mur qui, ajouté à la végétation, ne permet pas de le voir entièrement. Le donjon carré, sous un haut toit pointu est dorigine médiévale. Les mâchicoulis et le chemin de ronde ont fait lobjet dune restauration, le château d'Ost de la Vieille tour : sur la droite en venant de Lourdes. Cest la belle tour carrée du XIVe siècle, recouverte de lierre, propriété dune comtesse. Le président Mitterrand en déplacement en Bigorre venait parfois rendre visite à ses bonnes relations en hélicoptère, au grand dam des voisins, qui ces jours-là, voyaient leur village transformé en camp retranché. Sous le haut toit pointu à quatre pans, un couronnement de créneaux et de mâchicoulis. Malgré la restauration récente, le tout a fière allure. Nous n'avons aucun plan de la propriété.                                                                               Ost sous le règne de Charlemagne, le chef qui gouvernait à Ayzac-Ost était le seigneur de Mamelon. Sa demeure, une espèce de château en rotonde, était bâtie sur une élévation dominant le village dAyzac. On peut encore en admirer quelques ruines. La chapelle de service du château, quoique fort délabrée est même encore debout. Lorsque Charlemagne fut de retour de son expédition dEspagne, la race des Mamelon sétait éteinte. Actuellement, sur le site, il y a une maison appelée  par la commune, \"le château\" et qui possède des éléments du XVe siècle (portes et fenêtres). C'est une propriété privée.","habitants":"Famille d'Espourrin                                                                \r\nFamille de Miramont\r\n        \r\n        \"","divers":"La tour du château Ost-Ayzac, le domaine d'Ayzac et la vieille-tour","gps":"","images":["../image/image_65/65_Ost_Ayzac_1.jpg","../image/image_65/65_Ost_Ayzac_2.jpg","../image/image_65/65_Ost_Ayzac_3.jpg","../image/image_65/65_Ost_Ayzac_4.jpg","../image/image_65/65_Ost_Ayzac_5.jpg","../image/image_65/65_Ost_Ayzac_6.jpg","../image/image_65/65_Ost_Ayzac_7.jpg"]},"Consult_chateau_formulaire3373":{"id":"Consult_chateau_formulaire3373","dept":"65","canton":"Lourdes","commune":"Ourdis_Cotdoussan","nom":"Ourdis_Cotdoussan","type":"Vestiges","periode":"XII","histoire":"OURDIS, situé après Cheust. Le site servit de fief aux premiers vicomtes du Lavedan. En 945, Donat Loup installa son château sur une éminence dominant plusieurs vallées : le Castelloubon. Il est mentionné pour la première fois comme \"castrum lupi\" le château des loups en 1106, dans le cartulaire des vicomtes du Lavedan ou livre vert de Bénac. Une polémique est née à propos de lorigine de ce nom. Désigne-t-il le château du bon vicomte : castel lou bou (castel le bon), ou le château des Loup (nom de famille du vicomte)   Bons ou méchants, il reste toujours les ruines  du château, en haut  du village de Cotdoussan. Dégradé par un séisme en 1660, il sera abandonné peu après. Il avait cependant été déjà délaissé au XIIe siècle, par les dits vicomtes, pour le château de Beaucens. Il était ruiné au XVIIIe siècle, mais un acte notarié de1615, suite à un inventaire de juin 1613, nous offre un descriptif préçis.","architecture":"Descriptif de structure pyramidale à trois niveaux, les différentes compositions étaient adaptées au terrain. Au sommet se dressait le donjon barlong, deux enceintes le protégeaient. Chaque enceinte était flanquée d'une tour ronde en saillie. \r\nLes bâtiments étaient composés de deux corps de logis ; celui de l'ouest abritait trois chambres \"à deux planchers\",  et celui de l'est, appelé Ventajou, deux chambres. Entre les deux, se trouvait le donjon, une citerne et une chapelle voûtée. La première enceinte en contrebas protégeait deux chais, l'autre enceinte à 30 m environ, des petits logis accrochés aux pentes. \r\nL'édifice était assez complexe car il servait de forteresse et de résidence seigneuriale. Le donjon a été pratiquement arasé, et la tour cylindrique dont nous voyons les restes est l'une des deux tours circulaires du rempart. Anthyme Saint-Paul, en 1866, a réalisé un descriptif, illustré dun plan (Bulletin monumental, 1867).\r\nUne visite nécessite l'accord du propriétaire, car il s'agit d'une propriété privé et l'accompagnement d'un guide connaissant bien le site, car vu le nombre de fossés, de trous et de falaises l'accession est assez dangereuse surtout que la vue est souvent occultée par nombre de buissons de buis.\r\nIl reste encore quelques murs épars, dont celui de la chapelle, de la tour d'angle, du donjon (la basse fosse).","habitants":"vicomtes du Lavedan\r\n        \r\n        \"","divers":"Vestiges du château d'  Ourdis à Cotdoussan","gps":"","images":["../image/image_65/65_Ourdis_Cotdoussan_1.jpg","../image/image_65/65_Ourdis_Cotdoussan_2.jpg"]},"Consult_chateau_formulairea7f7":{"id":"Consult_chateau_formulairea7f7","dept":"65","canton":"Argelès-Gazost","commune":"Argelès-Gazost","nom":"Ourout","type":"Château","periode":"XIV","histoire":"OUROUT, les seigneurs d'Ourout et leur fief commencent dès 1273. Cela permet d'établir la liste des familles descendantes des premiers seigneurs dOurout.  Plusieurs hôtes de marque ont habité cette résidence, dont Henri Russel et le compositeur Gustave Fauré, ami de la grand -mère de monsieur le comte Hugue. Il parait que le prince de Galles qui devait y passer ses vacances, n'a pu faire entrer sa calèche, tant elle était large et la rue d'accès étroite. Il a du annuler son séjour. En 1424 à la famille aux Ourout,  en 1483 à la famille d'Arcizas,  en 1539 à la famille de Laneta,  en 1578 à la famille de Mayouraou, en 1778 à la famille d'Antin, en 1833 à la famille de Saint- Pastouset depuis cette date à la famille de Roquette-Buisson, à la suite du mariage de Marie de Saint-Pastous avec Maxime, comte de Roquette-Buisson.","architecture":"OUROUT, les premières mentions de ce château, daprès Hugues de Roquette-Buisson, remontent à 1086. En fait, le site, contrôlant la voie romaine dEspagne a toujours servi à la construction de forts (oppidum). Les traces de fondations que lon découvre dans le parc près de la chapelle dont un socle octogonal bordé de quatre têtes humaines, datent, pense-t-on, du XIe ou XIIe siècle. Par contre, les murs du donjon carré, le plus ancien, et du corps de bâtiment central datent du haut Moyen-Age. Et la seconde tour carrée des XVe-XVIe siècles. Lune des tours carrées abrite un escalier et  surmontée dun hourdage avec meurtrières. Au XIXe siècle, on a percé quelques ouvertures et rajouté la tour ronde avec des fentes de tir de mousquet sans encadrement de pierre ainsi qu'une terrasse en premier étage, avec une vue face à la montagne. Larchitecte était Jean-Jacques Latour. Durant la Révolution, les bâtiments ont servi de magasins. Sur le linteau du portail d'entrée du parc le devise des d'Antin d'Ourout :\" James arré\"- Jamais ne recule. Ce portail n'existe plus, mais demeure l'inscription en gascon, au-dessus de la porte d'entrée du château.","habitants":"seigneurs dOurout\r\n        \r\n        \"","divers":"Château d'Ourout à Argelès gazost","gps":"","images":["../image/image_65/65_Ourout_1.jpg","../image/image_65/65_Ourout_2.jpg","../image/image_65/65_Ourout_3.jpg","../image/image_65/65_Ourout_4.jpg","../image/image_65/65_Ourout_5.jpg"]},"Consult_chateau_formulaire6b4f":{"id":"Consult_chateau_formulaire6b4f","dept":"65","canton":"Maubourget","commune":"Larreule","nom":"Parabère","type":"Vestiges","periode":"XV","histoire":"Les Baudéan-Parabère, qui s'illustrèrent durant les guerres du XVIe siècle, étaient  propriétaires du château  où résida Mme de Maintenon, Ils l'abandonnèrent vers le XVIIIe siècle pour partir à la cour de Versailles. Marie-Madeleine de Vieuville, comtesse de Parabère, y fut la favorite officielle du Régent (1715-1723).                                                                                     A Versailles, la comtesse de Parabère (Marie-Madeleine de Vieuville). La liaison était telle quun tableau de Santerre, exposé à Versailles, montre Philippe dOrléans au côté de madame de Parabère, surnommée alors « La Sultane ». Le château de Parabère était si grand que la tradition locale lui attribuait 365 ouvertures.","architecture":"Le château de Parabère était le fief des comtes de Parabère, mais ne semble pas être antérieur au XVe siècle. Il fut délaissé à partir du XVIIIe siècle, les comtes préférant vivre à la cour de Versailles et à Paris. Les bâtiments claustraux furent détruits au début du XIXe siècle et leurs vestiges dispersés. Malheureusement à ce jour ces restes, bien que visibles, sont minimes et pris par la végétation.Les ruines du château attestent de nombreux remaniements et ne semblent pas antérieures au XVe siècle.","habitants":"Mme de Maintenon\r\n        \r\n        \r\n        \"","divers":"Vestiges du château de Parabère à Larreule","gps":"","images":["../image/image_65/65_Parabere_1.jpg","../image/image_65/65_Parabere_2.jpg","../image/image_65/65_Parabere_3.jpg"]},"Consult_chateau_formulairec0e7":{"id":"Consult_chateau_formulairec0e7","dept":"65","canton":"Capvem","commune":"Tramezaïgues","nom":"Pouys","type":"Vestiges-Château fort","periode":"XII","histoire":"POUYS  Le Château-fort de Pouys est un château bâti à Tramezaïgues,  La construction du château fort de Pouy date du XIe au XVIIIe siècle. Le château de Pouy-sur-Vannes est la propriété de la commune.","architecture":"Le château de Pouys à Tramezaygues est un château fort cité depuis le XIIe siècle (restauré en 1990), bâti sur un site d'éperon au confluent de la Neste d'Aure et du torrent du Rioumajou, au pied du pic de Tramezaïgues (2 548 mètres). Il sert de poste de surveillance frontalière jusqu'à la Révolution. Ce château est l'un des derniers vestiges en vallée d'Aure des tours à signaux ou tours de guet, avec la tour de Cadéac.  La fonction de ce château est avant tout militaire et défensive, servant de poste de surveillance depuis le sommet de la tour et communiquant avec les autres tours de guet de la vallée au moyen de feux. Il sert sans doute de prison et, au XVIIe siècle, devient un poste de douane. Après la Révolution, il perd de son intérêt militaire. Les ruines du château sont inscrites aux monuments historiques depuis 1980.     À l'origine, le château est constitué d'une tour ou donjon quadrangulaire avec trois niveaux : le rez-de-chaussée est aveugle ; le premier étage est accessible par une porte face nord, à 6 mètres du sol (échelle dressée dans la cour) ; le deuxième étage sommital est probablement une terrasse crénelée.  La défense est assurée par le ravin, côté sud, et par trois murs d'enceinte. Le mur oriental, face au village, qui comportait une porte d'entrée, s'est effondré en 1966.\r\nLa haute-cour du château présente des vestiges de constructions (chambre des officiers, corps de garde). La basse-cour était protégée par deux palissades en bois, remplacées en 1706 par des murailles avec canonnières.","habitants":"Seigneurs de Tramezaigues\r\n        \r\n        \"","divers":"Vestiges du château de Pouys à Tramezaygues","gps":"","images":["../image/image_65/65_Pouys_1.jpg","../image/image_65/65_Pouys_2.jpg","../image/image_65/65_Pouys_3.jpg"]},"Consult_chateau_formulaire3bec":{"id":"Consult_chateau_formulaire3bec","dept":"65","canton":"Bagnères de Bigorre","commune":"Pouzac","nom":"Pouzac","type":"Demeures nobles","periode":"XVIII","histoire":"POUZAC  dont celle de l'enfant du pays le Général du Génie Gabriel Laffaille stèle érigée devant sa maison natale, avec plaque apposée. Pas d'information historique pour ses châteaux","architecture":"Pouzac, à trois kilomètres au nord à Pouzac le château de Langle construit en 1832 à 1834 exemple  d'architectures   néo-classique,   au pied du château de lAngle (1820). C'est un bâtiment  inspiré dune villa « palladienne » dépoque Restauration. Fortes analogies avec larchitecture thermale.   De beaux bâtiments sont à découvrir en arpentant les différents quartiers du village, notamment plusieurs belles maisons anciennes et leur parcs.   Beaux bâtiments également des anciens haras, devenus un temps galerie d'arts. Pouzac était un haut lieu de léquitation et de lélevage, avec même un hippodrome.","habitants":"Général du Génie Gabriel Laffaille \r\n        \r\n        \"","divers":"Plusieurs châteaux à Pouzac dont celui de Langles","gps":"","images":["../image/image_65/65_Pouzac_1.jpg","../image/image_65/65_Pouzac_2.jpg","../image/image_65/65_Pouzac_3.jpg","../image/image_65/65_Pouzac_4.jpg","../image/image_65/65_Pouzac_5.jpg"]},"Consult_chateau_formulaire3524":{"id":"Consult_chateau_formulaire3524","dept":"65","canton":"Argelès-Gazost","commune":"Arcizans-Avant","nom":"Prince_Noir","type":"Forteresse","periode":"XIV","histoire":"PRINCE-NOIR, aux seigneurs dArcizans-Dabant, mais jamais à la couronne dAngleterre. Son appellation « Prince Noir » est erronée. Comme tous les châteaux environnants, il était sous la suzeraineté du roi dAngleterre depuis le Traité de Brétigny de 1360. Manaout, seigneur dArcizans, a rendu hommage en 1362, au fils du roi dAngleterre, devenu prince dAquitaine.  Sa construction serait  des Anglais en 1360 ,   d'ou son nom le château du Prince Noir. La partie la plus ancienne du château est sans conteste le donjon, bâti vers 1120 par les seigneurs d'Arcizans pour protéger leurs terres. Pendant la guerre de Cent Ans, il fut occupé par les Anglais qui envahirent l'Aquitaine, menés par Edouard de Woodstock, dit le Prince Noir. A la suite de leur victoire à Crécy, ils descendirent sur Poitiers, Limoges, Tarbes et Lourdes. Ils se répandirent dans les vallées bigourdanes. Premier propriétaire La famille dArcizas de 1050 à 1583. puis la famille Castets de 1583 à 1613. A la famille Mont dUzer de 1626 à 1902 . Rémi Pahu achète la propriété  Gabriel Anthian Sarbatx à partir de 1903. Savin Anthian Sarbatx. Le château est abandonné. Les ruines sont achetées en 1970 par Doyen Zwaempoed, en 1972, le château est de nouveau habité en 1968, André Doyen rachète les ruines du château à un exploitant agricole du village, après 3 ans de travaux, et plusieurs siècle d'attente, le château est à nouveau habité, chambres d'hôtes.","architecture":"Au donjon du XIIIe siècle (1286) sur trois étages (ruiné de nos jours), fut accolé vers 1500, un corps de logis divisé en deux compartiments carrés, terminés par un donjon carré et flanqué dune tourelle à pans coupée au centre des deux façades. On entre de plain-pied par une porte gothique ornée de moulures prismatiques dans la tourelle à pans coupés qui renferme lescalier. De nombreuses fenêtres éclairent le château, les unes en ogive, les autres en plein-cintre. Lenceinte a disparu, mais elle est facilement repérable au bord des fossés. Le logis a été en partie reconstruit en 1972, avec des ouvertures trop modernes. Le sauvetage de cette ruine entre 1970 et 1972 est luvre de la famille Doyen-Zwaempoed. Cette construction médiévale a été relativement protégée des pilleurs de pierre car le parc a été utilisé un certain temps en camp de jeunesse. Lensemble est plein dintérêt, et la vue magnifique.","habitants":"seigneurs d'Arcizans                                                              \r\nGabriel Anthian Sarbatx\r\n        \r\n        \"","divers":"Château du Prince-Noir à arcizans","gps":"","images":["../image/image_65/65_Prince_Noir_1.jpg","../image/image_65/65_Prince_Noir_2.jpg","../image/image_65/65_Prince_Noir_3.jpg","../image/image_65/65_Prince_Noir_4.jpg","../image/image_65/65_Prince_Noir_5.jpg","../image/image_65/65_Prince_Noir_6.jpg","../image/image_65/65_Prince_Noir_7.jpg"]},"Consult_chateau_formulaire7149":{"id":"Consult_chateau_formulaire7149","dept":"65","canton":"Capvem","commune":"Estarvielle","nom":"Sarreuille","type":"Château-fort","periode":"XIII-XV","histoire":"SARREUILLE, dit château-fort de Sarreuille est un château fort bâti à Estarvielle.  Elle fut sans doute la résidence de la famille Arroux d'Estarvielle, jusque vers le XVIe siècle, la construction du château de Sarreuille date du XIIIe-XIXe siècles. On peut y admirer son ancien four à pain  sa grange et  sa tour-logis.","architecture":"La tour mentionnée en 1276 dans un acte notarié comme Castrum Estarbiele. Elle fut sans doute la résidence de la famille Arroux d'Estarvielle, jusqu'au  XVIe siècle. La construction du château de Sarreuille date du XIIIe-XIXe siècles. On peut y admirer son ancien four à pain, sa grange et  sa tour-logis. Logis et étable construits en 1835, date portée sur le linteau de la porte du logis.","habitants":"Famille Arroux d'Estarvielle\r\n        \r\n        \"","divers":"Château de Sarreuille à Estravielle","gps":"","images":["../image/image_65/65_Sarreuille_1.jpg"]},"Consult_chateau_formulaire1835-2":{"id":"Consult_chateau_formulaire1835-2","dept":"65","canton":"Tarbes","commune":"Sauveterre","nom":"Sauveterre_65","type":"Château","periode":"XII-XVI","histoire":"SAUVETERRE, tout le site sera enfin aménagé au XVIIIe siècle en manoir résidentiel de qualité, par la puissante famille des Ducs d'Antin, avec la grande façade Est, mais aussi de l'élevage de chevaux de selle, de la vigne, un jardin à l'anglaise, etc.\r\nLa guerre passe par le château à la fin du mois de mars 1814. L'armée d'Espagne de Napoléon Ier, et du maréchal Soult fait retraite vers Toulouse, bousculée par le duc de Wellington. S'il n'est pas passé lui-même au château, mais à cinq kilomètres, l'état major de sa cavalerie y a conduit une action décisive avec ses meilleurs officiers, dont plusieurs seront à Waterloo un an après.","architecture":"Sauveterre, château actuel, a très certainement fonctionné, déjà dès le Ve siècle av. J.-C., une forteresse en terre et en bois, que l'armée conquérante de Jules César baptise « oppidum », et la fortifie elle-même, au premier siècle de notre ère. Mille ans après, vers 1050-1100, le premier château médiéval en bois est bâti par un petit seigneur féodal du pays. Sur ce lointain passé, les travaux d'aménagements plus récents seront d'abord  une puissante forteresse maçonnée du XIVe siècle, en galets et en pierre dorée du pays. Il en subsiste les deux belles tours rondes d'angle, et les bases de l'actuelle construction.","habitants":"famille des Ducs d'Antin\r\n        \r\n        \r\n        \"","divers":"Château à Sauveterre","gps":"","images":["../image/image_65/65_Sauveterre_65_1.jpg","../image/image_65/65_Sauveterre_65_2.jpg","../image/image_65/65_Sauveterre_65_3.jpg"]},"Consult_chateau_formulaire91a7-2":{"id":"Consult_chateau_formulaire91a7-2","dept":"65","canton":"Maubourget","commune":"Sombrun","nom":"Sombrun","type":"Château","periode":"XVII","histoire":"SOMBRUN,   en 1790, Bertrand Barère député de Bigorre obtient la création du département des Hautes-Pyrénées dans lequel est incorporée la plus grande partie de la Rivière-Basse dont Sombrun. Avec la création des communes, la Révolution permet à Sombrun de se doter au début de 1790 dune municipalité élue. Son premier maire, Dominique Dargellès Bernadou, entre immédiatement en conflit avec le seigneur Germain Maigné de Sallenave essentiellement sur limposition de ses biens et la propriété de terres seigneuriales revendiquées de longue date par la communauté des habitants. Germain Maigné disparaît sans postérité le 5 octobre 1792 alors que la Révolution entre dans la période de la Terreur à Paris. Ses neveux héritent de la seigneurie de Sombrun, mais la loi des suspects les envoie en détention ainsi que le reste de la famille, du printemps à lautomne 1794, pour cause démigration de lun dentre eux et de postures antirévolutionnaires pour les autres. Leurs biens dont le château de Sombrun et ses terres sont mis sous séquestre jusqu'en juillet 1795. Ces biens  échappent donc à la vente en qualité de biens nationaux.        Aujourd'hui  chambres d'hôtes.","architecture":"Le château de Sombrun, bâtiment du XVIIIe siècle dominé par ses deux tours , bénéficie d'un calme absolu et d'un site de charme pour qui veut fuir le stress de la vie urbaine,     construit au XVIIe siècle, se situe dans un parc de 8 hectares aux arbres centenaires.   harmonieux bâtiment du XVIIIe siècle dominé par ses deux tours , corps de logis rectangulaire à deux niveaux et attiques, fronton triangulaire plein cintre en façade, tours carrées accolés sur angles arrière de quatre niveaux  toit à quatre pans.","habitants":"Seigneur de Sombrun Germain Maigné\r\n        \r\n        \"","divers":"Château de la Motte à Sombrun","gps":"","images":["../image/image_65/65_Sombrun_1.jpg","../image/image_65/65_Sombrun_2.jpg","../image/image_65/65_Sombrun_3.jpg","../image/image_65/65_Sombrun_4.jpg","../image/image_65/65_Sombrun_5.jpg","../image/image_65/65_Sombrun_6.jpg","../image/image_65/65_Sombrun_7.jpg"]},"Consult_chateau_formulaire9b45":{"id":"Consult_chateau_formulaire9b45","dept":"65","canton":"Capvem","commune":"Saint-Lary-Soulan","nom":"St_Lary_Soulan","type":"Tour","periode":"XVI","histoire":"SAINT-LARY, au cur des Pyrénées vous offre des paysages époustouflants à découvrir tout au long de lannée. Pas d'information historique.","architecture":"A Saint-Lary, la tour dAgut dite tour Hachan : cest le seul vestige de lancien manoir de Jean Sans dAgut. A lorigine, existait aussi une tour de plan carré, la tour Hachan.\r\n La maison Fornier : demeure de la famille Fornier, elle fut léguée par la dernière descendante à la municipalité qui en fit sa nouvelle mairie en 1974. Les Fornier jouèrent un rôle important dans la vie politique du XIXe siècle.","habitants":"Seigneur Locaux\r\nFamille Fornier,       \r\n        \"","divers":"Tour de Saint-Lary le Soulan","gps":"","images":["../image/image_65/65_St_Lary_Soulan_1.jpg","../image/image_65/65_St_Lary_Soulan_2.jpg","../image/image_65/65_St_Lary_Soulan_3.jpg"]},"Consult_chateau_formulaire1af4":{"id":"Consult_chateau_formulaire1af4","dept":"65","canton":"Lannemezan","commune":"St-Laurent de Neste","nom":"St_Laurent_Neste","type":"Manoir","periode":"XVII","histoire":"Trois châteaux à Saint-Laurent de Neste celui de Bize, de Montaigut et celui de Nestier.                                                                                                               BIZE, possède un château du XIVe siècle, non entretenu car propriétaires décédés, successeur habitant la région parisienne (étant sous tutelle château médiéval reconstruit au XVIIe siècle. Il est actuellement conservé dans son état, avec son mur d'enceinte et ses deux tours. L'histoire de la seigneurie de Bize demeure encore à ce jour bien mystérieuse. Les terres de Bize semblent avoir appartenue à une famille originaire d'Aragon ou de Navarre avant que, suite à de multiples mariages, elles ne deviennent la propriété du seigneur de Sarlabous. Quelques siècles plus tard, lors de la Révolution, le descendant du seigneur de Sarlabous, Jean Antoine de Mun Cardeilhac s'exila pour échapper à la prison.                                                                                                    MONTEGUT  Château fort médiéval propriété de la maison d'Aure jusqu'au XVIe siècle. Donjon remanié au XIXe siècle. Montégut a compté parmi ses habitants une famille aristocratique, les barons de Verdelin. Le général Jean-Charles de Verdelin fit restaurer une vielle tour en ruines pour lui servir d'habitation. C'est dans ce château qu'est mort le général et le dernier rejeton de la famille. Cette tour qui avait été construite par un télégraphe aérien prit le nom de château qu'elle a toujours conservé.                                NESTIER,  le seigneur de Nestier le plus connu est Louis de Cazaux (1684-1754), descendant de vieilles familles du pays des Quatre-Vallées, écuyer cavalcadour de la Grande Ecurie du roi Louis XV. Le château du village (« Eth Castet »), aujourd'hui centre de vacances, est construit dans la plaine en 1579.","architecture":"A  Saint-Laurent de Neste; Le « Castéra » : les vestiges de la motte castrale et du fortin primitif. Château médiéval reconstruit au XVIIe siècle. Il est actuellement conservé dans son état des XVIe-XVIIe siècle, avec son mur d'enceinte et ses deux tours.                                                         Château de  Nestier a eu trois châteaux différents selon les époques : le château primitif « le Castéra », le château du Moyen Âge ou château fort sur motte appelé « Eth Castérot » et le château moderne « Eth Castet ». Ce dernier est construit dans la plaine en 1579 au-dessous du monticule appelé encore de nos jours le Castéra. Constitué d'une sobre façade cantonnée de deux pavillons, il appartiendra successivement aux « de Saint Paul » puis aux « de Cazaux » et à partir de 1753 aux « de Lassus ». Il sera en particulier le cadre de réceptions remarquables organisées par les « de Cazaux » dans la grande salle du premier étage décorée de six belles tapisseries de Flandre données par le cardinal Mazarin à leur illustre ancêtre François de Saint-Paul.","habitants":"seigneur de Sarlabous                                                                          Les barons de Verdelin\r\n        \r\n        \"","divers":"A Saint-Laurent de Neste celui de Bize, de Montaigut et celui de Nestier.","gps":"","images":["../image/image_65/65_St_Laurent_Neste_1.jpg","../image/image_65/65_St_Laurent_Neste_2.jpg","../image/image_65/65_St_Laurent_Neste_3.jpg","../image/image_65/65_St_Laurent_Neste_4.jpg","../image/image_65/65_St_Laurent_Neste_5.jpg","../image/image_65/65_St_Laurent_Neste_6.jpg","../image/image_65/65_St_Laurent_Neste_7.jpg"]},"Consult_chateau_formulairefeb3":{"id":"Consult_chateau_formulairefeb3","dept":"65","canton":"Lourdes","commune":"St-Pé de Bigorre","nom":"St_Pé_Bigorre","type":"Château","periode":"XVII","histoire":"SAINT-PE-BIGORRE, maison médiévale  reconstruite en 1653, par la famille Lias, aujourd'hui école primaire Sainte-Elisabeth. Jadis elle était dirigée par les soeurs de la Croix.  Mairie et à gauche office de tourisme. La mairie est la maison du général napoléonien Vergez. Ce nest quen 1913 que la mairie y est installée. Auparavant, le bâtiment abritait la gendarmerie, après avoir été la maison natale du général et baron dEmpire Jean-Marie Vergez. Ce dernier, héros des guerres de la Révolution et de lEmpire sest illustré en arrêtant Charette,  le chef des Chouans.","architecture":"À Saint- Pé, la partie la plus ancienne du XVe siècle se trouve dans la cour avec la tour escalier et sa belle porte. Le bâtiment est desservi par cet escalier à balustre et à béquille. Il est surmonté d'un clocher servant de pigeonnier. Le bâtiment, au niveau des combles possède des fenêtres à meneaux du XVIIe siècle. Les autres ouvertures ont été refaites au XVIIIe siècle   au sommet du quartier Génères, quartier dorigine du village, se trouve sur le turon le long du cami calhabet, la tour Péninolle chemin du tas de cailloux,  une tour barlongue de pierre, de 1986, la motte aurait été fortifiée et un fort permettait de contrôler les passages, le long du Gave. Si cette tour a pour nom « tour Péninolle », nous avons un certain doute sur son origine médiévale. Aucune pierre de tuf, meurtrière, encadrement ancien, si ce n'est semble-t-il, autour de la pierre décorative récente sur la façade principale.","habitants":"famille Lyas\r\n        \r\n        \r\n        \"","divers":"Château de Saint-Pé  et la tour Péninolle.","gps":"","images":["../image/image_65/65_St_Pe_Bigorre_1.jpg","../image/image_65/65_St_Pe_Bigorre_2.jpg","../image/image_65/65_St_Pe_Bigorre_3.jpg","../image/image_65/65_St_Pe_Bigorre_4.jpg"]},"Consult_chateau_formulaire1871":{"id":"Consult_chateau_formulaire1871","dept":"65","canton":"Argelès-Gazost","commune":"Sère en Lavedan","nom":"Sère_Lavedan","type":"Vestiges","periode":"XIII","histoire":"SERE, Le fief noble de Sère était vassal du vicomte du Lavedan.  Cette demeure a remplacé un logis seigneurial du XVIe siècle, dont quelques éléments lapidaires sont visibles, scellés dans les façades des communs. Tout cet ensemble, avec léglise, forme une agréable place. Le dernier habitant du château fut le seigneur de Sère (seigneurie de La Péna), Charles-Alexandre de Boussis. Après son émigration en 1792, suite aux conséquences néfastes de la Révolution, son domaine fut vendu à un certain Joseph Abbadie. Ses successeurs le démolirent au XIXe siècle, lune des deux tours et les corps de bâtiments pour édifier la maison visible actuellement. À lorigine, nous avons la maison de La Pèna le premier Garcie Arnaout de La Pèna  vers 1280 à Jeanne de La Pèna en 1555.  Puis la famille Baradgin (Barège)  François Baradgin, époux de Jeanne de La Pèna, de 1555 à 1568.  Le dernier de la famille, Alexandre de Barège, de 1696 à 1768. Il na pas de descendance. Les biens passent au neveu Laurens, famille  de Boussés de Lagrange, le dernier, Charles- Alexandre de Boussés, époux de Jeanne Despourrin, de 1709 à 1795, confiscation des biens par la Révolution. Charles -Alexandre craignant pour sa vie avait émigré fin 1792. Achat  en 1864, par la famille Cantet pour être remplacé par une maison avec conservation dune tour, la ruine actuelle. Mr Cantet de 1905 à Jacqueline Cantet de Mérignac et son fils François qui restaure la tour.","architecture":"Les restes dune tour du XIIIe siècle (1285), avec une cave voûtée,  Cette demeure a remplacé un logis seigneurial du XVIe siècle, dont quelques éléments lapidaires sont visibles, scellés dans les façades des communs. La tour actuelle a été élevée sur un roc qui tombe à pic du côté du Bergons.  Sa longueur, à l'extérieur est de 8 m.14 , sa largeur de 6 m. 42. Ses murs ont une épaisseur de 1m 82 . Le rez-de-chaussée est voûté en berceau : on y pénètre par une large brèche.  Dans l'une de ses séances en 1859, l'Académie des H-P écrit à propos de Sère : \" M. Laffont, curé de Gez-Argelès  signale un vieux fort dont la tour à créneaux existe encore.  On y montre un escalier en marbre que personne n'ose descendre. Ce fort avait été construit par les Templiers. Dans sa chapelle, qui sert d'église à la commune, on voit leurs armoiries à gauche de l'entrée. La porte en est remarquable par les colonnes et les sculptures. On retrouve encore des sculptures dans la maison de paysans qui a été bâtie à la place du fort\".","habitants":"vicomte du Lavedan.\r\n        \r\n        \r\n        \"","divers":"Vestiges du château de Sère à Lavedan","gps":"","images":["../image/image_65/65_Sere_Lavedan_1.jpg"]},"Consult_chateau_formulaireb3ec":{"id":"Consult_chateau_formulaireb3ec","dept":"65","canton":"Aureilhan","commune":"Séméac","nom":"Séméac","type":"Château","periode":"XVII","histoire":"SEMEAC, au XVIIe siècle, fut érigé en marquisat. Le premier marquis de Séméac, Henri (1619-1679), comte de Toulonjon, Gramont et Asté, sénéchal et gouverneur de Gascogne, dans la longue suite des Gramont de Séméac, se détachent quelques personnages : Antoine 1er de Gramont, fils de Claire, seigneur de Séméac, maire de Bayonne depuis lâge de neuf ans, libéra Tarbes assiégé par les Huguenots du baron dArros en 1574 ;  Antoine II,  mourut à Séméac en 1644, lannée où il avait été fait duc et pair de France par le jeune Louis XIV ;\r\nAntoine III, maréchal de France en 1641, servit Richelieu et Mazarin ;\r\nen 1660, Charlotte de Gramont épousa Louis Grimaldi, un ancêtre du prince Rainier III de Monaco ; un des arrière-petits-neveux dHenri, Antoine VII, mena grande vie et ruina  sa famille.  La Révolution Française provoqua le renversement de laristocratie locale, son expropriation et la confiscation des biens du clergé. Les terres ainsi récupérées furent mises à la disposition de la Nation, confisquées et mises en vente, elles furent achetées par les grands bourgeois tarbais : les Caussade (marchands, avocats), Théaux (avocats au parlement), Sireix (greffiers). Après 1850, les moyens et petits paysans du village, dabord journaliers, purent les acheter, lorsque les premiers propriétaires les revendirent pour placer ailleurs leurs capitaux. Il faut voir là lorigine des propriétés paysannes établies solidement à Séméac pendant tout le  XXe siècle","architecture":"Le comte de Toulonjon, Gramont et Asté, sénéchal et gouverneur de Gascogne, rasa le premier château et le fit reconstruire avec une telle magnificence quil mérita le surnom de « Petit Versailles ». Par suite du manque dentretien, langle méridional du bâtiment sécroula en 1777. Ruiné, incapable de le faire réparer, retiré à Bidache, Antoine VII ordonna la démolition complète,  beaucoup de ses pierres ont servi à la construction des vieilles maisons de Séméac, et même de lhôpital de Vic-en-Bigorre.   Château dont le corps de logis de plan rectangulaire oblong accolé à deux pavillons carrés toits à quatre pans","habitants":"Seigneurs locaux\r\n        \r\n        \r\n        \"","divers":"Château à Sémac","gps":"","images":["../image/image_65/65_Semeac_1.jpg","../image/image_65/65_Semeac_2.jpg"]},"Consult_chateau_formulairea910":{"id":"Consult_chateau_formulairea910","dept":"65","canton":"Tarbes","commune":"Tarbes","nom":"Tarbes","type":"Château","periode":"XV-XVIII","histoire":"Plusieurs châteaux à Tarbes dont celui de Mantagnan (voir article), celui de l 'Urac un I.M.Pro. (Institut Médico-Professionnel) , de Libos, de Jullian, l'hôtel de ville et le musée Massey                                                                              URAC Lhistoire de l A.M.E.F.P.A. se confond avec celle du château dUrac. Elle prend racine au cur des solidarités ouvrières internationales du XXe siècle.                                                                                                                                                Dans le quartier de la Sède où sont visibles la préfecture et la cathédrale, la maison familiale du maréchal Foch datant du XVIIe siècle a été aménagée en musée. Il s'agit d'une demeure typiquement bigourdane reconnaissable à sa façade jaune. Il est possible de visiter la chambre natale et le bureau du maréchal et d'observer des objets lui étant relatifs. Le musée Massey est situé, à l'intérieur du Jardin, dans une construction caractéristique de style byzantin et mauresque, copie d'un palais du Caire, dominé par une tour observatoire sur les Pyrénées et le Pic du Midi de Bigorre, est principalement connu dans le monde pour abriter le musée International des Hussards, une collection exceptionnelle de 15 000 pièces. Mais il présente également une riche collection des Beaux Arts.                                                                                                                                                                        Hôtel de Briquet du XVIIe siècle. Face à l'église Saint-Jean est visible la maison natale de Bertrand Barère.","architecture":"D'autres beaux exemples de maisons bigourdanes sont visibles rue de la Victoire, rue Clémenceau ou enco
