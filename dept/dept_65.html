re rue du Régiment-de-Bigorre. Elles sont reconnaissables à leurs portes en bois sculptées, à leurs crépis de couleur qui rehaussent les encadrements en pierre de marbre gris, à leurs balcons de bois sous toit et à leurs toitures d'ardoise percées de lucarnes.","habitants":"Famille nobles\r\n        \r\n        \"","divers":"Plusieurs châteaux à Tarbes, celui de l 'Urac, de Libos, de Jullian, l'hôtel de ville et le musée Massey.","gps":"","images":["../image/image_65/65_Tarbes_1.jpg","../image/image_65/65_Tarbes_2.jpg","../image/image_65/65_Tarbes_3.jpg","../image/image_65/65_Tarbes_4.jpg","../image/image_65/65_Tarbes_5.jpg","../image/image_65/65_Tarbes_6.jpg","../image/image_65/65_Tarbes_7.jpg","../image/image_65/65_Tarbes_8.jpg"]},"Consult_chateau_formulaireb8bd":{"id":"Consult_chateau_formulaireb8bd","dept":"65","canton":"Maubourget","commune":"Tostat","nom":"Tostat","type":"Château","periode":"XVIII","histoire":"TOSTAT, à partir du XVIIe siècle, la famille de Bazillac quitte la région pour sinstaller à Paris. Quand ils reviennent en Bigorre  ils préfèrent sinstaller dans leur domaine de Betplan. La reconstruction du château de Tostat et sa transformation en château de plaisance date pour certains du XVIIe siècle, pour dautres du XVIIIe siècle. Ainsi d'après un membre de la famille Bazillac, cest en 1621 quest reconstruit le château dans le\r\nstyle Louis XIII. Cest à partir de 1760 que le marquis de Bazillac, fort de son titre octroyé par le Roi, fait combler le fossé oriental et construire un nouveau bâtiment entre 1770 -1785. Au début du XXe siècle, le château est acheté par le colonel Rivière dArc, il souhaite y installer un élevage de chevaux.","architecture":"Le nouveau château présente un plan densemble rectangulaire construit, comme beaucoup de constructions de la plaine tarbaise, en galets ronds de lAdour, les chaînages, encadrements,\r\ncorniches étant réalisés en brique foraine, le tout et badigeonné de rose (brique), cette construction est donc un témoin tout à fait remarquable de lart de bâtir en Bigorre dans la deuxième moitié du XVIIIe siècle. La façade principale, précédée dune vaste esplanade est orientée vers lEst et présente un aspect très archaïque pour un édifice de cette période. Elle est réalisée dans un style dit à la Mansart, avec ses combles hauts couverts dardoises. Lavant corps central en faible relief, est matérialisé par deux chaînages de brique appliqués sur toute la hauteur de la façade. Il est surmonté dun fronton curviligne avec des traces de bas-reliefs, les trois travées centrales pourraient correspondre à lemplacement du donjon médiéval. Les parties latérales ont une couverture autonome de forme pyramidale qui se détache du reste du  corps du bâtiment, leur donnant un aspect de tour dangle.  La façade sétire sur neuf travées comporte de nombreuses fenêtres dont le dessin est caractéristique du XVIIIe siècle. Son élévation se compose de trois niveaux en façade et un étage ajouré de\r\nlucarnes sous le toit. De la demeure médiévale, il conserve sur larrière, du côté ouest, la basse-cour et des pans de murs de lancienne muraille, une échauguette, et les fossés. Sur les trois autres côtés, les douves sont maintenues.","habitants":"Famille Bazillac\r\n        \r\n        \"","divers":"Château de Tostat","gps":"","images":["../image/image_65/65_Tostat_1.jpg","../image/image_65/65_Tostat_2.jpg","../image/image_65/65_Tostat_3.jpg","../image/image_65/65_Tostat_4.jpg","../image/image_65/65_Tostat_5.jpg"]},"Consult_chateau_formulaire6190-2":{"id":"Consult_chateau_formulaire6190-2","dept":"65","canton":"Argelès-Gazost","commune":"Argelès-Gazost","nom":"Vieuzac","type":"Château-Tour","periode":"XIII-XV","histoire":"VIEUZAC, famille des Vieuzac,   d' Arnaut Guilhem de Vieuzac vers 1080  à Donat de Vieuzac, en 1273 à la famille de Barège, Claria, fille Donat, épouse de Gaillard de Barège à partir de 1290 jusquà  Antonia de Barège, fille dArnaut III de Barège, pour passer en 1519, aux Majourau. Famille Majourau dArras Ramon Arnaud de Majourau, époux dAntonia de Barège en 1519, jusquà 1608 avec Antonia de Majourau. Durant quelques années le domaine est géré par son neveu Gaston dArmagnac, seigneur de Horgues (1608-1612) pour revenir aux Majourau avec  Louis de Majourau 1612-1619. Thomas de Majourau, fils de Louis, 1619-1647  Famille dAntin Thomas de Majourau vend la propriété en 1647, à Germain II dAntin, seigneur dOurout. Ourout et Vieuzac appartiennent à la même famille. Puis, nous avons : Jean-François dAntin, de 1667 à 1702  Jean-Hector dAntin, fils de Jean-François, de 1702 à 1714. Jacques-Hector dAntin, fils de Jean-Hector, de 1714 à 1778. Il lègue une partie du domaine à  Jean Baptiste Lassalle. l'autre à Jean Barère. Famille Lassalle 1770 Jean- Baptiste Lassalle une partie de la seigneurie 1789 la totalité jusqu'en 1873. Famille Barère, Jean Barère 1778 à 1788 une partie de la seigneurie. Bertrand Barère, son fils 1788- 1789.  Divers.  En 1858 , J-B Lassalle et son épouse, Clémentine Walace .   En 1873, monsieur Alicot, également propriétaire d'après Paul Perret du Castet Nou d'Arras. En 1976, maison de retraite dArgelès-Gazost.","architecture":"La propriété dorigine daterait de la fin du XIIIe siècle. Cétait en fait une ancienne abbaye laïque composée comme nous l'avons vu, de terres, de corps de logis et dune tour. Celle-ci mesure environ six mètres de côté et une vingtaine de mètres de haut et était entourée d'une basse-fosse. L'entrée  se faisait comme à la tour de Vidalos par le premier étage avec une échelle ; elle est agrémentée de deux fenêtres trilobées. Les autres ouvertures sont récentes. Le tout  était entouré de fossés et de contrescarpes. Si, en 1783, la tour était mentionnée au Compost, comme pigeonnier, c'était plus probablement à l'origine une tour de guet qui communiquait par des feux avec celle de Vidalos et le fort de Saint-Savin aujourd'hui disparu, et que les derniers propriétaires voulaient transformer en tour d'habitation. D'où ces \"méchantes\" ouvertures modernes.  Il n'existe aucune présence de boulin à l'intérieur.","habitants":"Famille des Vieuzac \r\n        \r\n        \"","divers":"Château et tour à Vieuzac","gps":"","images":["../image/image_65/65_Vieuzac_1.jpg","../image/image_65/65_Vieuzac_2.jpg","../image/image_65/65_Vieuzac_3.jpg","../image/image_65/65_Vieuzac_4.jpg","../image/image_65/65_Vieuzac_5.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','65 — Hautes-Pyrénées'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
