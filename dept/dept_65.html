ost","type":"Château-Tour","img":"../image/image_65/65_Vieuzac_1.jpg"}];const FULL={"Consult_chateau_formulaire51f3":{"id":"Consult_chateau_formulaire51f3","dept":"65","canton":"Argelès-Gazost","commune":"Lau-Balagnas","nom":"Abillac","type":"Château","periode":"XVI","histoire":"ABILLAC, cette demeure seigneuriale devient propriété des moines de Saint-Savin entre 1744 et 1789. En 1936,  Raymond Ritter et G Balencié évoquent ces ruines. Michel Sevrain, dans l'ouvrage Lavedan Pays Toy de 1982, évoque la triste fin de ce patrimoine médiéval.","architecture":"Au quartier dAbillac,  à quelques 30 mètres et à gauche de la route  on aperçoit, drapés de lierre, les faibles vestiges d'un petit château fortifié composés de deux pans de murs, les restes d'un donjon, soudés à angle droit par une tourelle cylindrique et une petite tour carrée.\r\nOn ne peut que déplorer la disparition de ces vestiges qui ont marqués notre histoire. Et ce, pour une maison au style et aux coloris douteux, qui malgré sa tour moderne  ne pourra jamais remplacer le charme indéfinissable de ces pans de murs disparus à jamais,  restes de tours rondes et carrées, a été rasé en 1963, pour permettre la construction dune maison. Triste fin pour un château dont lexistence remontait au XIe siècle.  La monographie des instituteurs de 1887,  l'évoque comme une vieille  tour dominant le village, dont les habitants la font remonter aux maures.  \r\nBernard Pousthomis dans le numéro de 1983, évoque la découverte de poteries anciennes  sur le site, avant la démolition des vestiges. on peut avancer une fourchette de datation acceptable entre le XVe et le XVIe siècle.","habitants":"Les moines de Saint-Savin\r\n        \r\n        \"","divers":"La tour d'Abillac","gps":"","images":["../image/image_65/65_Abillac_1.jpg"]},"Consult_chateau_formulaire8aa9":{"id":"Consult_chateau_formulaire8aa9","dept":"65","canton":"Lourdes","commune":"Adé","nom":"Adé","type":"Vestiges-","periode":"XIV","histoire":"ADE, à cinq kilomètres avant Lourdes le château de Adé est un ancien château bâti à l'emplacement de l'église,  ayant appartenu aux comtes de Bigorre, culminait au XIe siècle, détruit par le parti anglais.","architecture":"Le château d'Adé aurait été détruit, au XIVe siècle. Il reste encore  quelques vestiges des anciens remparts. Sur le tumulus qui supporte aujourdhui léglise, avait été édifié un château qui commandait la route vers Tarbes. A cette époque, tous les châteaux avaient un lieu de culte. Après plusieurs transformations et réparations, elle devait céder sa place à léglise actuelle terminée en 1878 entièrement financée par la commune et à l'aide de dons particuliers.","habitants":"comtes de Bigorre\r\n        \r\n        \r\n        \"","divers":"La tour d'Adé","gps":"","images":["../image/image_65/65_Ade_1.jpg"]},"Consult_chateau_formulaire5dee":{"id":"Consult_chateau_formulaire5dee","dept":"65","canton":"Argelès-Gazost","commune":"Agos-Vidalos","nom":"Agos_Vidalos","type":"Château-fort","periode":"XII","histoire":"AGOS-VIDALOS  château fort bâti à Agos-Vidalos du XIIe siècle.  Le comte de Bigorre, Centulle III, qui fit construire, en 1175, vendu à Fortaner de Lavedan le château de Vidalos, Estiénéta Bénétrix, fille de Centulle III et épouse de Bernat, comte de Comminges ( second époux). Bernat et Comtors,  sa seconde épouse, fille du vicomte de la Barthe. Bernat et Marie de Guilhem, sa troisième épouse, fille de Guilhem, seigneur de Montpellier en 1197.  Peyrona (Pétronille) fille de Bernat et dEstiénéta, épouse de Gaston de Moncade de 1197 à 1215. Peyrona épouse  de Don Nuno de 1215 à 1215  Peyrona épouse de Guy de Montfort de 1216 à 1216 Peyrona épouse dAynard de Rancon de 1216 à 1225.   Peyrona épouse Boson de Mathas, seigneur de Cognac, de 1225 à 1239.  Matha,  fille de Boson de Mathas et de Peyrona, de 1239 à 1248.  Comte de Leycester de 1248 à 1257. Bernat dAure dAsté, chevalier dAragon et époux de Frigade de Lavedan, et au traité de Brétigny, le 8 mai 1360, donnèrent le château d'Agos aux Anglais avec la Bigorre. Charles V reprit ensuite la province.\r\nSénéchaux de Gascogne, avec séquestre en 1284 à 1429. Sénéchaux de Bigorre de 1429 à 1778.  Propriété de la tour par la commune. En 1846, les communes d'Agos et de Vidalos fusionnent sous le nouveau nom d'Agos-Vidalos.","architecture":"Château fort bâti à Agos-Vidalos du XIIe siècle, La forteresse servit  de prison pour les détenus de droit commun, il ne reste aujourd'hui que la tour de Vidalos, le rez-de-chaussée aussi en cul de-basse fosse avec une voûte en demi-cylindre, dans lequel on accède, en son centre par un trou dhomme de 0, 50  X 0, 50 mètres  environ, depuis le premier étage. La porte dentrée est sur la façade Sud. Avec le sol actuel, elle souvre à 4-5 m de haut. Louverture a été agrandie dans laménagement de la tour en annexe de lhôtel. Au premier étage, dans la chambre aménagée, présente une fenêtre à fort ébrasement, sous lenduit moderne, en ciment. Il sagit dune fente de tir.  Au second étage, se trouve une autre chambre avec une ouverture rectangulaire murée. On peut atteindre la plate-forme supérieure de la tour par un escalier métallique. Jadis l'accès se faisait au premier étage, face au gave, à six mètres de haut par une échelle mobile, entrée murée, accès défendu à l'étage supérieur, par une meurtrière et quelques mâchicoulis. Les murs sont assez épais plus de 1 mètre 50, et les pièces des deux étages assez exiguës. Le rez-de-chaussée est aveugle. La toiture nétait pas en terrasse, mais interne, à double pente, avec un écoulement des eaux à travers les murs, grâce à une série de trous . Cette tour était complétée par une enceinte, entièrement reconstruite en 1997 et quelques bâtiments rasés depuis fort longtemps.  Elle a été en partie reconstruite de 1992 à 1997, après son effondrement en 1981, grâce à laction énergique dune association de sauvegarde.","habitants":"Fortaner de Lavedan\r\n        \r\n        \r\n        \"","divers":"La tour de Agos-Vilados","gps":"","images":["../image/image_65/65_Agos_Vidalos_1.jpg","../image/image_65/65_Agos_Vidalos_2.jpg","../image/image_65/65_Agos_Vidalos_3.jpg"]},"Consult_chateau_formulaire71d3":{"id":"Consult_chateau_formulaire71d3","dept":"65","canton":"Lourdes","commune":"Les-Angles","nom":"Angles_65","type":"Château-fort","periode":"XI-XIV","histoire":"Les ANGLES,  la seigneurie de la baronnie des Angles a existé du Moyen-Age à la Révolution Française, en passant au fil des siècles sous le contrôle de différentes familles. On se reportera à l'article Baronnie des Angles pour l'histoire de cette seigneurie au sein du comté de Bigorre. La baronnie des Angles passera dans diverses familles : à la famille des Angles jusquen 1310 ; aux dArmagnac de 1310 à 1377 , à Jean de Béarn de 1377 à 1407 ;  de nouveau aux dArmagnac de 1407 à 1430 ; aux de Lomagne de 1430 à 1481 ; aux de Gramont de 1534 à 1576 ; de Hélène de Clermont, vicomtesse dAsté de 1576 à 1594 ; aux de Gramont de 1594 à 1694 ; et des Roux de Gaubert de 1734 à 1789. il a été sauvé vers 1980, par son actuel propriétaire, après rachat à la commune, avec la gageure de transformer un « tas de cailloux » en habitation moderne.","architecture":"Le château fort des Angles, sur sa motte féodale, domine le village à l'écart de celui-ci. Construit durant le  XIe siècle, le château est situé sur un mamelon boisé. Il avait jadis un plan polygonal, proche du triangle. La tour, gros donjon cylindrique, a été construite vers 1300 par une des plus anciennes familles de la noblesse bigourdane. Elle était composée de trois niveaux : un rez- de chaussée éclairé par des meurtrières, un étage composé dune grande salle percée de hautes fenêtres, un second étage en retrait et un dernier étage sous comble qui desservait le chemin de ronde crénelé. On pense communément que dès 1100, devaient se trouver sur cette colline certaines fortifications faites de bois. Le château a été échangé en 1310, contre trois possessions dans le Gers. En 1360, par le traité de Brétigny, il est devenu anglais jusquà sa reprise par le parti français en 1404. En ruine depuis des siècles,  il a été sauvé vers 1980, par son actuel propriétaire.","habitants":"Famille des Angles\r\n        \r\n        \"","divers":"Vestiges du château des Angles","gps":"","images":["../image/image_65/65_Angles_65_1.jpg","../image/image_65/65_Angles_65_2.jpg","../image/image_65/65_Angles_65_3.jpg","../image/image_65/65_Angles_65_4.jpg","../image/image_65/65_Angles_65_5.jpg","../image/image_65/65_Angles_65_6.jpg","../image/image_65/65_Angles_65_7.jpg"]},"Consult_chateau_formulairee31e":{"id":"Consult_chateau_formulairee31e","dept":"65","canton":"Lourdes","commune":"Poueyferré","nom":"Antin","type":"Château","periode":"XIV","histoire":"ANTIN, le château  au sommet du village, se trouvait dès 1145, une fortification. Il a été transformé en église dans sa partie Nord, presbytère dans la partie Sud, salle d'école et logement de l'instituteur et depuis peu en logements collectifs, après la démolition des granges et écuries. le château dAntin  réaménagée au XIVe siècle, par la famille d'Antin,  remplacé au XVIIe siècle,  par un château de style classique. Propriété au XIXe siècle, de la famille de Pied, le château fut acheté par la commune en janvier 1867.","architecture":"le château dAntin : au sommet du village, sur un tertre, se trouvait dès 1145, une fortification. Du premier château, seuls subsistent à l'arrière, de rares murs. La base de tour était celle du clocher de l'église.Du premier château, seuls subsistent à l'arrière, de rares murs. La base de tour était celle du clocher de l'église Pour voir la façade, il faut passer par le chemin qui monte à côté de léglise. Les ruines sont à larrière, près du cimetière dominant la route.    Du château actuel de plan rectangulaire à deux niveaux toits en croupe avec quatre lucarnes accolés sur façades.","habitants":"Famille d'Antin\r\n        \r\n        \"","divers":"Château d'Antin à Pouyeferré","gps":"","images":["../image/image_65/65_Antin_1.jpg","../image/image_65/65_Antin_2.jpg"]},"Consult_chateau_formulaire506d":{"id":"Consult_chateau_formulaire506d","dept":"65","canton":"Argelès-Gazost","commune":"Préchac","nom":"Areyt","type":"Château","periode":"XVIII","histoire":"AREYT château  du XVIIIe siècle.  Au-dessus du village de Préchac, belle allée arborée menant an château d'Areyt, fut la propriété au XVIIIe siècle, de Louise d'Estrade d'Esterre, épouse de Pierre Vergez. Ce dernier, né en 1733 à Boô fut officier du roi Louis XVI et chevalier de l'Ordre royal et militaire de Saint-Louis. Il s'engagea dans l'administration révolutionnaire et devint en 1790, vice-président du directoire départemental. Il aménagea et transforma cette dépendance de la seigneurie de Couhite qu'il acheta  à Bertrand d'Astaing d'Arzaas, pour en faire sa demeure. Le  château a reçu la visite du botaniste Ramond de Carbonnières qui y séjourna de décembre 1792 à mai 1793. Homme modéré, il démissionna de la tâche que lui confia Monestier du Puy- de -Dôme pour \"purifier\" la région. Il termina sa vie comme juge de paix du canton de Préchac. Louise dEstrade, nièce de Bernard, épouse de Pierre Vergez, de 1780 à 1829.  Les derniers propriétaires lotirent le domaine et vendirent séparément la grange qui se trouve en contrebas sur la droite de la route et la bergerie qui est située dans les hauteurs.","architecture":"Cette grosse bâtisse d'Areyt composée d'un corps de logis et de deux ailes à un étage surmontées de combles éclairés par des chiens-assis.","habitants":"Louise d'Estrade d'Esterre\r\n        \r\n        \"","divers":"Le château d'Areyt à Préchac","gps":"","images":["../image/image_65/65_Areyt_1.jpg","../image/image_65/65_Areyt_2.jpg","../image/image_65/65_Areyt_3.jpg"]},"Consult_chateau_formulaire2945":{"id":"Consult_chateau_formulaire2945","dept":"65","canton":"Argelès-Gazost","commune":"Argelès-Gazost","nom":"Argelès_Gazost","type":"Tour-Châteaux","periode":"XIII-XIX","histoire":"plusieurs châteaux à Argelès Gazost, le château de Vieuzac et Ourout ( voir article), la tour de Mondaigne, le château de Cordée, la villa Suzanne les thermes, le Sanatorium et l'hôtel du Parc.     \r\nARGELES-GAZOST, dans les années 1880-1890,  va devenir  une petite localité  résultant déjà de la fusion en 1824  des deux villages d'Ourout et de Vieuzac. C'est alors qu'un avocat argelésien, Hector Sassere a l'idée géniale d'acheter au petit village de Gazost ses sources thermales, qui jouissent d'une excellente réputation, et de transporter l'eau jusqu'à l'établissement thermal construit dans la plaine par une conduite d'eau en fonte de 21 kilomètres.  En 1787 l' hôtel de ville, elle est propriété de la communauté. Elle est dite confrontant au septentrion la maison du sieur Tauziet,  la maison Mealis-Normande et d'orient la place. C'est en mars 1789 que sous la direction de Lacrampe et de Lamarque les propriétaires taillables se rassemblèrent dans la grande salle pour rédiger le cahier des doléances qui malheureusement a été perdu.                                                                                               Villa-Suzanne Henri Tron naquit en 1863 à Barcelonnette dans les Alpes de Haute Provence. L'extrême pauvreté de cette région obligeait ses jeunes à s'éloigner pour devenir colporteurs ou émigrer vers le Mexique. En effet, les rares soldats qui étaient revenus indemnes de la guerre du Mexique au milieu du XIXe siècle décrivaient un pays enchanteur où l'on pouvait faire fortune.                                                                                                                                            Les thermes ont adaptés leurs installations aux profondes évolutions qui ont marqué le siècle écoulé. De nombreuses personnalités sont venues faire des cures, notamment François Mauriac de manière régulière dans les années 1910 et 1920 ; il en fera le décor de son roman Le Fleuve de feu paru en 1923.","architecture":"Tour Mendaigne du XVIIIe siècle  la tour faisait une vingtaine de mètres de haut, mais l'édification de la terrasse a enterré une partie de celle-ci. De 2,20 mètres de côté,  elle possède encore le balcon de fer forgé d'origine et, sur le linteau de la fenêtre sous le balcon, l'inscription :\"A designatore nomen domini benedictum habitant inusque sitin sempiternam (anno jubile 1761).                                                                             La Cordée transformé en hôtel restaurant.\r\nHôtel de ville il est probable qu'au début du XVIIIe siècle le bâtiment qui abrite aujourd'hui la mairie existait et accueillait déjà les assemblées des consuls de l'Estrem de Salles, dans sa forme primitive l'édifice ne disposait que d'un seul étage. Le rez-de-chaussée avec ses 3 arcades plein cintre servait de halle et ses deux extrémités logeaient deux boutiques que la communauté affermait périodiquement pour en obtenir quelques revenus. C'est au premier étage que se trouvait la salle ou les deux consuls de la ville réunissaient périodiquement les membres du conseil politique au son de la cloche pour délibérer sur les problèmes et les projets de la communauté.                                                                                                              Thermes, situé au fond du parc du Casino, cest le bâtiment à la façade très typique présentant un appareillage de pierres, de briques et de galets disposés en « feuilles de fougère », comme dans certaines bâtisses de la plaine de Tarbes. Il a été construit en 1884, par Hector Sassère.","habitants":"Famille d'Hector Sassere\r\n        \r\n        \r\n        \"","divers":"A Argelès-Gazost la tour Mondaigne, le château de Cordée, la villa Suzanne, le sanatorium et l'établisment thermal","gps":"","images":["../image/image_65/65_Argeles_Gazost_1.jpg","../image/image_65/65_Argeles_Gazost_2.jpg","../image/image_65/65_Argeles_Gazost_3.jpg","../image/image_65/65_Argeles_Gazost_4.jpg","../image/image_65/65_Argeles_Gazost_5.jpg","../image/image_65/65_Argeles_Gazost_6.jpg","../image/image_65/65_Argeles_Gazost_7.jpg"]},"Consult_chateau_formulaireeaee":{"id":"Consult_chateau_formulaireeaee","dept":"65","canton":"Argelès-Gazost","commune":"Arras-en-Lavedan","nom":"Arras_Lavedan","type":"Vestiges","periode":"XIII","histoire":"ARRAS en LAVEDAN, château médiéval date de 1260 le « CASTET NAÜ D'AZUN »  Restauré depuis 1996 par le propriétaire actuel. La Tour de lAbbadiale (ou manoir des abbés) tout à côté de l'église est devenue la maison des Arts, le château ou Castet Naü dAzun a été édifié par le comte de Bigorre à lentrée du val pour se protéger des envahisseurs béarnais ou aragonais tout en surveillant ses sujets. \r\nAnnexé un temps à la couronne dAngleterre, pendant la guerre de Cent ans, il sera repris en 1404, après le château Sainte-Marie de Luz, par le comte de Clermont, Jean de Bourbon, vassal du roi de France, aidé dAugé de Coufitte  de Barège et des Azunais.  Samuel Eymar seigneur de Palaminy, de 1757 à Guichar dArras et retour aux Palaminy, de  à Etienne Antarriéou qui vend les corbeaux en 1879 à monsieur Alicot d'Argelès  Antoine Latapie Hour, en 1891.  Sabine Latapie Montagnez, de 1891  à 1905. Louis Montagnez, fils de Sabine, de 1905 à   Marcelin Dominique Montagnez et Marie Elisabeth. Dioze de Marsous à Jean-Baptiste Anclades et Léonie Peydomec dArras,  en 1932.  Lucien Lavit époux Anclades, de  1932  à  1996 Jacques Omnès de Lourdes achète en 1996,  les ruines et les terres environnantes à Isabelle Lavit-Cayrey.","architecture":"Il est mentionné dès 1260, ce qui correspond à larchitecture des parties anciennes. Il comprend une enceinte polygonale protégée par un escarpement naturel, mais aussi un fossé en eau  surplombant le village, les ruines d'une petite forteresse, le Castet-Naou en cours de restauration, rappellent qu'Arras-en-Lavedan fut anglais pendant quarante ans sous la domination du Prince Noir  en 1404. Cest après la prise que le donjon circulaire central sera complété par une tour carrée flanquant le sas dentrée ; tandis que lenceinte sera surélevée et crénelée. Ruiné et abandonné depuis des centaines dannées ; des corbeaux et autres éléments ont servi au XIXe siècle à la restauration de la tour de Vieuzac à Argelès. Il avait disparu sous la végétation quand, en 1996, un archéologue de Lourdes a décidé de le racheter pour le restaurer .","habitants":"Comte Jean de Bourbon\r\n        \r\n        \"","divers":"Vestiges de la forteresse  d'Arras en Lavedan","gps":"","images":["../image/image_65/65_Arras_Lavedan_1.jpg","../image/image_65/65_Arras_Lavedan_2.jpg","../image/image_65/65_Arras_Lavedan_3.jpg","../image/image_65/65_Arras_Lavedan_4.jpg","../image/image_65/65_Arras_Lavedan_5.jpg","../image/image_65/65_Arras_Lavedan_6.jpg","../image/image_65/65_Arras_Lavedan_7.jpg","../image/image_65/65_Arras_Lavedan_8.jpg"]},"Consult_chateau_formulaire91e5":{"id":"Consult_chateau_formulaire91e5","dept":"65","canton":"Arreau","commune":"Arreau","nom":"Arreau","type":"Château","periode":"XII-XVIII","histoire":"Deux châteaux à Arreau celui de Nestes et celui de Ségures et l'Abbaye d'Escaladieu.                                                                                                                                    NESTES, cet édifice militaire et hospitalier faisait office de commanderie. abrite en 2010 l'office du tourisme et le musée des Cagots. Il est inscrit aux monuments historiques depuis 1981. L'aile nord en équerre sur un promontoire était en outre le siège d'une juridiction. Il prend le nom de château de Camou (\"terre d'eau\") du fait de l'humidité\" des lieux du XVII - XVIIIe siècle. Le moulin lui fut annexé au XVIIIe siècle. Sa grande galerie Sud est caractéristique de l'habitat Aurois.                                                                           SEGURE, de la famille de Ségure du XIIe siècle à 1790.  A la veille de la Révolution de 1789 le comte Louis-Hector dernier descendant de la famille de Ségure officier et agent double entra chez les mousquetaires du Roi et se battit en Bohème, en Italie et au Portugal. Le duc de Choiseul, représentant du Roi, le chargea de négocier avec les espagnols l'achat des forêts voisines de Gistain dont les arbres pouvaient être utilisés pour la marine Royale. Élu député des Quatre Vallées aux États Généraux de 1789, il ne put exercer son mandat, car accusé lors d'un voyage en Espagne, il fut fusillé le 27 décembre 1790 à l'Alambra de Grenade pour ses idées contestataires.","architecture":"NESTES. Dit autrefois château Camou  inscrit \"Monument Historique L'architecture du château rappelle dix siècles de l'histoire de la Vallée d'Aure. Bâti sur l'enceinte qui clôturait le nord du quartier de la Neste du Louron, il servait de protection au sanctuaire voisin dédié à St-Exupère.  La Tour Centrale surmontée d'un clocheton en bois  du XIXe siècle servit d'observatoire astronomique familial. Le château a été réhabilité en 1989 dans le cadre des grands travaux du président François Mitterrand.                                                                                           SEGURES  érigé au sud du quartier St-Exupère, le château est dominé par une tour carrée du XVIe siècle construite sur le roc et correspondant probablement au donjon primitif du XVIIIe siècle. En front de Neste le bâtiment à croisillons de bois et armoiries martelées comprenait une salle d'arme au rez-de-chaussée et une salle de police au premier étage.                                                                                                                                         La maison des Lys, maison gothique des XVIe et XVIIe siècles, doit son nom aux multiples fleurs de lys de bois parant sa façade est partiellement classée monument historique depuis 1912 ;\r\nLa maison de saint Exupère du XVIe siècle, partiellement inscrite depuis 1928.","habitants":"Famille de Ségure\r\n        \r\n        \r\n        \r\n        \"","divers":"Château  de Nestes, de Ségure, l'abbaye d'Escaladieu, la maison des Lys et la maison de Saint-Exupère à Arreau","gps":"","images":["../image/image_65/65_Arreau_1.jpg","../image/image_65/65_Arreau_2.jpg","../image/image_65/65_Arreau_3.jpg","../image/image_65/65_Arreau_4.jpg","../image/image_65/65_Arreau_5.jpg","../image/image_65/65_Arreau_6.jpg","../image/image_65/65_Arreau_7.jpg","../image/image_65/65_Arreau_8.jpg","../image/image_65/65_Arreau_9.jpg"]},"Consult_chateau_formulaire1bac":{"id":"Consult_chateau_formulaire1bac","dept":"65","canton":"Vic en Bigorre","commune":"Vic-en-Bigorre","nom":"Artagnan","type":"Château","periode":"XVIII","histoire":"ARTAGNAN,  château où n'acquit le chevalier d'Artagnan l'un des quatre remarquables mousquetaires du XVIe siècle (d'Artagnan, Athos, Porthos et Aramis).                                                                                                                                                 Villa Rachel,   cette demeure érigée sous Napoléon III, par une famille de la Havane, conserve lélégance de ses racines cubaines. Son nom «Lou Castel Rachel» est directement hérité de ses origines puisqu'il renvoie au prénom de la fille du premier propriétaire décédée de la tuberculose à 17 ans. et depuis  novembre 2016 à la famille Zacharewicz Bun  Oray   Tun","architecture":"Chateau d'Artagnan  corps de logis central à deux niveaux toits en croupes avec petites lucarnes accolé de chaque côté de corps de bâtiment en équerres avec  tours carrées à trois niveaux                                                                                                                                          Château Rachel  corps de logis rectangulaire à trois niveaux avec pavillons en façades et a l'arrière de l'édifice toits à deux pans.                Labarte,  est situé entre Vic et Montaner. Cest un manoir des XVIIe et XVIIIe siècles avec quatre tours dangles carrées et de très belles écuries.                                                                                                                                   Belles demeures sur Vic en Bigorre et le château de Saint-Aunis corps de logis carré flanqué de tours rondes et carrées.","habitants":"Famille Zacharewicz Bun  Oray   Tun        \r\n        \r\n        \r\n        \"","divers":"Le château d'Artagnan, La villa Rachelle, château de St-Aunis, de Labarthe et l'hôtel de ville avec de belles demeures","gps":"","images":["../image/image_65/65_Artagnan_1.jpg","../image/image_65/65_Artagnan_2.jpg","../image/image_65/65_Artagnan_3.jpg","../image/image_65/65_Artagnan_4.jpg","../image/image_65/65_Artagnan_5.jpg","../image/image_65/65_Artagnan_6.jpg","../image/image_65/65_Artagnan_7.jpg","../image/image_65/65_Artagnan_8.jpg","../image/image_65/65_Artagnan_9.jpg"]},"Consult_chateau_formulaire8955-2":{"id":"Consult_chateau_formulaire8955-2","dept":"65","canton":"Argelès-Gazost","commune":"Salles","nom":"Arzaas","type":"Manoir","periode":"XVII","histoire":"ARZAAS, situé entre le château de Vidalos au nord et de Vieuzac au sud,  cette demeure fut durant des siècles celle des seigneurs d'Arzaas, quand le lieu avait été transformé en night-club, après avoir été cabaret (1884) et débit de tabac (1902).  Famille d'Arzaas de 1060 à 1390, la famille Couarraze de 1417 à 1620, la famille d'Abandenc Jeanne de Couarraze épouse Jean dAbadenc Marie, fille de Jeanne et de Jean, de 1620 à 1643 Jeanne dAnti dArzaas, fille de Marie et de Pey dAntin, Elle épouse en 1618 Fabian de La Barrière  Famille La Barrière,  Fabian, époux de Jeanne dAnti dArzaas, 1644 Saubat ou Salvat, fils de Fabian, 1644 à 1673 Françoise fille de Fabian. Famille dAsta (Estain) dEstampes,   Françoise épouse en 1650, Ramon dAsta. Jean-François, fils de Ramon,  de 1678 à 1707 Jean, fils de Jean-François, de 1707 à 1767   Bernat, fils de Jean, de 1758 à 1787 Jean-Paul Barthélémy, fils de Bernat, de  1787 à 1789  Vente en 1820 du manoir par le dernier Asta dEtampes.  Gérard Léon Laurent Dessay, de 1966 à 1976  Alphonse Marcel Peluhet et son épouse Paulette Raymonde Cayrey,de 1976 à 1995,  Albert Danjau et son épouse Renée Nourry en  1995.","architecture":"Le manoir dArzaas  bâti à Salles,  sa construction  date du XVIIe au XIXe siècles. Il possède une tour carrée du XIIIe siècle de plus de sept mètres de côté, présente plusieurs fenêtres géminées avec coussièges (bancs dans lépaisseur du mur), éclairant les étages, ainsi quune ouverture en meurtrière donnant du jour au cul-de-basse-fosse. Son entrée primitive était en hauteur au niveau du premier étage (entrée aujourdhui passant par le logis mitoyen), un mur de soutènement fait de gros blocs sert de substratum à la plate-forme du manoir. Ce dernier, à l'exception de la tour, a été remplacé au XVIe siècle par un logis indépendant de la tour, tel que nous le voyons aujourd'hui ; la porte dentrée, avec linteau en accolade, lui faisait face. Au siècle suivant, le logis a été modernisé par un agrandissement sur le côté gauche, mitoyen avec la tour. À larrière, le bâti a été élargi par une construction sur le rocher. Toutes les ouvertures extérieures du logis datent de cette ultime modernisation. Les mâchicoulis et les merlons de la tour sont récents. Et, côté ouest, la fenêtre géminée avec voussures et l'étroite baie qui se trouve au-dessous seraient des éléments de réemploi. Nous trouvons la même fenêtre géminée, mais sans sa colonne, sur la façade nord. Lescalier de bois intérieur est du XVIIe siècle. À noter un curieux bénitier encastré près de la porte du logis.","habitants":"Seigneurs d'Arzaas                                                                         Famille Couarraze\r\n        \r\n        \r\n        \"","divers":"Château d'Arzaas  à Salle","gps":"","images":["../image/image_65/65_Arzaas_1.jpg"]},"Consult_chateau_formulaire200c":{"id":"Consult_chateau_formulaire200c","dept":"65","canton":"Bagnères de Bigorre","commune":"Bagnères-de-Bigorre","nom":"Bagnères_Bigorre","type":"Château","periode":"XV-XVIII","histoire":"BAGNERES-de-BIGORRE, après les Romains et le passage des invasions (Wisigoths, Arabes), la ville s'est fortifiée au Moyen-Age. Les historiens datent les fortifications de Bagnères aux environs du Xe siècle. Cette vue aérienne de Bagnères, montre bien l'emplacement des anciens remparts. ils ont aujourd'hui disparu, à part le nom d'une rue. La ville fortifiée de Bagnères était divisée en 4 bourgs distincts : Bourg-Vieux, Bourg-Neuf, Bourg de la Font, Bourg de Caoutérès qui possédaient chacun des dépendances autour de la ville (Salut, Pouey, Bouyaous, Lesponne, Sarraméa, Mariahount, Vignaux, Bériés,  il ne reste pas beaucoup de bâtiments de cette époque médiévale vous pourrez observer la maison dite de « Jeanne d'Albret », une des plus anciennes de Bagnères et qui date de la reine Jeanne. Les Bagnérais assurent que la Reine de Navarre séjourna ici. Bagnères est une station thermale connue depuis les Romains. Mais c'est avec Jeanne d'Albret que le \"tourisme\" commence à se développer : promenades en chaises à porteurs ou excursions à cheval accompagnées par les Bagnèrais. Particulièrement appréciée, la ville a reçu des personnalités célèbres comme Mme de Maintenon et le Dauphin, puis Stendhal, Lamartine, Rossini... A Bagnères le musée Larey château à Beaudéan Le seigneur et la communauté de Beaudéan au XVIIIe siècle ». La seigneurie de Beaudéan est un exemple du phénomène de reféodalisation au XVIIIe siècle.                                                                                 \r\n  De Puysègur du comte  Hélie   Pierre.                                                                                                                               A trois kilomètres au nord à Pouzac le château de Langle construit en 1832 à 1834 exemple  d'architecture raffinée  néo-classique.","architecture":"Sculpture de Jeanne d'Albret près des Thermes à Bagnères. Jeanne d'Albret, mère d'Henri IV, est venue à Bagnères au moins trois fois (1553 et 1567 et surtout 1571). On lui doit l'aménagement des Bains de Bagnerolles, devenus Bains de la Reine.  Ici les nouveaux Thermes, inaugurés en 1828, en dehors de la ville fortifiée. Au fond la villa Théas (aujourd'hui musée Salies)                                                                                          Les prisons de la ville, situées jusque dans les années dans la tour de Mahourat, démolie en 1865, furent construites à côté du nouveau tribunal, faisant face à l'Adour. Le bâtiment, désormais détruit, a laissé place à des bâtiments commerciaux. Le tribunal, toujours présent, a fermé ses portes en 2005.                                                                                                Le château de Puységur de plan rectangulaire à deux niveaux et lucarnes sur toits.                                                                                                    Bonvouloir bâtisse de trois niveaux flanqué en façade de deux pavillons carrés et sur l'arrière à deux niveaux avec balcon , toit brisé avec lucarnes,transformé en appartements, le casino et les thermes.","habitants":"Reine de Navarre Jeanne d'Albret\r\n        \r\n        \r\n        \"","divers":"A Bagnère de Bigorre la maison de Jeanne d'Albret le château de Puységur, de Bonvouloir, du vallon du Salut et le casinoet autres châteaux","gps":"","images":["../image/image_65/65_Bagneres_Bigorre_1.jpg","../image/image_65/65_Bagneres_Bigorre_2.jpg","../image/image_65/65_Bagneres_Bigorre_3.jpg","../image/image_65/65_Bagneres_Bigorre_4.jpg","../image/image_65/65_Bagneres_Bigorre_5.jpg","../image/image_65/65_Bagneres_Bigorre_6.jpg","../image/image_65/65_Bagneres_Bigorre_7.jpg","../image/image_65/65_Bagneres_Bigorre_8.jpg","../image/image_65/65_Bagneres_Bigorre_9.jpg"]},"Consult_chateau_formulaire679c":{"id":"Consult_chateau_formulaire679c","dept":"65","canton":"Capvem les Bains","commune":"Capvem-les-Bains","nom":"Barbé","type":"Manoir","periode":"XVIII","histoire":"BARBE Le château Barbé bâti à Capvern,  de style Napoléon III dans un parc de 2 hectares, expose Claire Jefferson, une merveilleuse idée à germé dans l'esprit de Philippe Bonhomme et Anne Desjacques, son épouse, propriétaires du château : illuminer les salons d'expositions durant la saison estivale   Vous y trouverez des chambres d'hôtes agréables.","architecture":"Barbé, manoir ou  petit château où fut installé l'état-major de Napoléon III dans les années 1850 , de plan en T à trois niveaux accolés de tourelles sur angles intérieurs et deux tours mi hors uvres en façade encadrant le pavillon d'entrée.","habitants":"Famille Desjacques\r\n        \r\n        \r\n        \"","divers":"Manoir  Barbé à Capvem les Bains","gps":"","images":["../image/image_65/65_Barbe_1.jpg","../image/image_65/65_Barbe_2.jpg","../image/image_65/65_Barbe_3.jpg","../image/image_65/65_Barbe_4.jpg","../image/image_65/65_Barbe_5.jpg"]},"Consult_chateau_formulaireeca8":{"id":"Consult_chateau_formulaireeca8","dept":"65","canton":"Bordères sur l","commune":"Bazet","nom":"Bazet","type":"Manoir","periode":"XVIII","histoire":"BAZET, demeure  édifiée en 1765 par le marquis de Bazillac.   A quelques kilomètre à l'est à Chis le château de Bouchon  St-Férréol hôtel restaurant Tout est parti d'une promesse d'une fille à son père. Celle de pérenniser son uvre, elle-même déjà héritée de son aïeul. Troisième génération à présider aux destinées de La Ferme Saint-Ferreol à Chis, Laurence Barincou a tenu parole, au cur de cette superbe propriété du XVIIe siècle, dressée sur un parc de plus de 7 hectares, où l'on cultivait un certain art de vivre, entre l'hôtel et ses chambres à thème, la partie traiteur et le restaurant gastronomique a repris, en 2004, la bâtisse achetée par son grand-père soixante ans plus tôt.","architecture":"Bazet, vestiges du mur d'enceinte du château fort, XIIIe siècle, détruit lors d'un incendie en 1740.  Le château a été bâti sur une butte de terre au nord-ouest du village actuel. Il ne reste en élévation que quelques vestiges de l'enceinte polygonale.                                                                                                                                            Obouchon Chis, corps de logis central oblong d'un seul niveau avec lucarne sur toit deux pans accolé de deux pavillons carrées aux extrémités à deux niveaux toits à quatre pans tour accolée sur l'arrière à toit en poivrière.                                                                                                                             Orleix   bâtisse imposante rectangulaire à trois niveaux avec fronton central plein cintre en façades, toit en ardoise en croupe, accolé de dépendance de un niveau en prolongement sur les flancs.","habitants":"marquis de Bazillac\r\n        \r\n        \"","divers":"A Bazet  le château Obouchon à Chis St-Férréol et le château d'Orleix","gps":"","images":["../image/image_65/65_Bazet_1.jpg","../image/image_65/65_Bazet_2.jpg","../image/image_65/65_Bazet_3.jpg","../image/image_65/65_Bazet_4.jpg","../image/image_65/65_Bazet_5.jpg","../image/image_65/65_Bazet_6.jpg","../image/image_65/65_Bazet_7.jpg"]},"Consult_chateau_formulaire70b5":{"id":"Consult_chateau_formulaire70b5","dept":"65","canton":"Argelès Gazost","commune":"Beaucens","nom":"Beaucens","type":"Vestiges","periode":"XIV","histoire":"Deux châteaux à Beaucens , les vestiges du château-fort et le manoir de Cohitte (voir article) plus l'hôtel thermal.                                                     BEAUCENS,  La  dynastie change lorsque ladite Louise du Lion épouse en 1490 Charles, bâtard de Bourbon, de 1490 à 1502. Hector de Bourbon, fils de Charles de 1502 à 1525.  Jean de Bourbon, frère dHector, de 1525 à 1590. Et ainsi de suite jusquà Marie de Gontaud Geniès qui cède en 1643 tous ses biens aux Montaut de Bénac.  Les Montaut de Bénac  Philippe II Montaut de Bénac , 27e vicomte de Lavedan, de 1643 à 1654.  Philippe III Montaut de Bénac de 1654 à  1684.   Françoise de Montaut Bénac, sur de Philippe III,  de 1684 à 1717. Puis la maison, passe en 1717 aux Orléans avec  Alexandre est nommé héritier par sa tante Françoise. Les Orléans avec :Alexandre dOrléans, 30e vicomte  de 1717 à 1765 dont la dernière héritière Marie-Henriette-Charlotte-Dorothée  épousera en 1765, le prince Charles- Jules-Armand de Rohan  de 1765 à 1789, dernier et 31e vicomte de Lavedan.  Les Rohan Marie-Henriette Charlotte Dorothée, fille dAlexandre dOrléans et épouse du prince Charles de Rohan parti en exil, vend tous ses biens en 1802 à Etienne-Marie Paisselier, puis  cest la vente aux enchères avec :  Divers  Bernard Philippe Gertoux, sous-préfet dArgelès,  de 1803 à 1836. Françoise dEstagnet, 1836.  Barthélémy et Jean-Philippe Cazayous (père et fils) de 1836 à 1846.  Jacqueline Hortagnéou, veuve de Barthélémy, vend en 1846, le château à Achille Fould, député des Hautes Pyrénées.  Tremblement de terre  en 1854, restauration du château, le donjon consolidé en 1975, il a été revendu en 1987 aux exploitants actuels.  Appelé le donjon des Aigles à partir de 1987.","architecture":"Les amateurs de vieilles pierres peuvent faire le tour du domaine. Le château a encore de beaux restes : double enceinte et deux hautes  tours, dont la tour du midi du XIIe siècle, le donjon et la courtine du XVe ainsi que la triple porte fortifiée du XVIe siècle. Il a rarement été assiégé, peut-être du fait de sa situation sur un piton, et de lastucieuse position de la porte dentrée au bout du chemin. Vous constaterez que les murailles sont sur le côté droit du cheminement, le côté des assaillants qui ne portaient pas de boucliers. On navait pas encore la bombe à neutrons, mais on avait des idées. Le corps de logis principal comporte encore ses cheminées et ses cadres douverture. En attendant une hypothétique reconstruction, les propriétaires ont su présenter leurs rapaces tout au long dun cheminement archéologique, souligné par un aimable décor de verdure fort soigné.  Au pied du château l'on trouve « une source sulfureuse froide dont l'eau est la boisson des habitants et une mine de plomb dans un rocher qui sert de base aux restes de l'ancien château de Beaucens. On trouve aussi une mine de cuivre sur la butte d'Aiguesalat.","habitants":"Famille des Bourbons\r\n        \r\n        \r\n        \"","divers":"Vestiges du château fort de Beaucens dit château de l'aigle et bâtiment thermale","gps":"","images":["../image/image_65/65_Beaucens_1.jpg","../image/image_65/65_Beaucens_2.jpg","../image/image_65/65_Beaucens_3.jpg","../image/image_65/65_Beaucens_4.jpg","../image/image_65/65_Beaucens_5.jpg","../image/image_65/65_Beaucens_6.jpg","../image/image_65/65_Beaucens_7.jpg","../image/image_65/65_Beaucens_8.jpg","../image/image_65/65_Beaucens_9.jpg"]},"Consult_chateau_formulaire1409":{"id":"Consult_chateau_formulaire1409","dept":"65","canton":"Bordères","commune":"Bordères_Louron","nom":"Bordères","type":"Vestiges","periode":"XIII","histoire":"BORDERES, vestiges du château fort, la forteresse fut construite à la fin du XIIIe siècle par Don Roger d'Espagne, 1er seigneur de la vallée du Louron. La famille d'Espagne s'allia par la suite avec les Montespan du Comminges. Entre 1308 et 1311, la maison d'Espagne-Montespan transforma le château et l'aménagea en conséquence : le logis du seigneur, le donjon et la chapelle furent élevés.\r\nLa vallée du Louron resta longtemps le fief des seigneurs d'Espagne-Montespan. Elle ne fit partie des Quatre Vallées (Aure-Barousse-Nestès-Magnoac) qu'en 1398, lorsque le Louron fut rattaché à la maison d'Armagnac. Jean V d'Armagnac s'est d'ailleurs retiré plusieurs fois dans son château de Bordères-Louron après son excommunication par le pape Nicolas V en 1460. Cette demeure seigneuriale fut abandonnée par les châtelains à la fin du XVIIe siècle lorsque le marquis de Montespan, tombé en disgrâce à la cour de Louis XIV, se retira sur ses terres de Bonnefont.\r\nÀ l'abandon progressif s'ajouta l'incendie du 14 janvier 1740 qui brûla la toiture du château et qui détruisit la quasi totalité du village.","architecture":"Vestiges du mur d'enceinte du château fort, XIIIe siècle, détruit lors d'un incendie en 1740 Le château a été bâti sur une butte de terre au nord-ouest du village actuel. Il ne reste en élévation que quelques vestiges de l'enceinte polygonale et une partie de la chapelle, aujourd'hui transformée en maison, laissant apparaître l'abside à droite de l'enceinte. L'entrée, située au niveau de la place du Trépadé, se faisait par un pont-levis. Le château fut bâti en pierre de taille et l'on peut remarquer que de nombreuses pierres du château furent réutilisées dans les maisons ou dans les murs de soutènement des rues.","habitants":"Don Roger d'Espagne\r\n        \r\n        \r\n        \"","divers":"Vestiges du château de Bordères","gps":"","images":["../image/image_65/65_Borderes_1.jpg"]},"Consult_chateau_formulaire41bd":{"id":"Consult_chateau_formulaire41bd","dept":"65","canton":"Lannemezan","commune":"Bramevaque","nom":"Bramevaque","type":"Vestiges","periode":"XII-XIII","histoire":"BRAMEVAQUE, au cur de la Barousse, le village médiéval de Bramevaque avec ses petites maisons aux toits orange et son château est entouré de forêt. Signalé depuis la grande route de la vallée, « le château des comtes de Comminges du  XIe et XIIIe siècle. Les ruines de son donjon carré sont accessibles par un escalier en pierre, doù lon peut admirer un vaste panorama sur la Barousse. Les atrocités commises par les seigneurs dautrefois sont une donnée récurrente de la tradition populaire. Si Erzsébeth Bathory, dame de Hongrie au XVIIe siècle, fit bien tuer plusieurs jeunes filles pour boire leur sang et préserver sa jeunesse, en revanche la présence dune ogresse à Bramevaque ne semble pas attestée dans lhistoire.","architecture":"Ruines du château des comtes de Comminges, inscrit au titre des monuments historiques depuis 1950, une forteresse isolée au milieu des bois.   Le château est construit sur une colline rocheuse isolée du reste de la montagne par un fossé.   Les ruines de son donjon carré sont accessibles par un escalier en pierre, doù lon peut admirer un vaste panorama sur la Barousse.  Par un escalier extérieur, accès au clocher-pignon dont le support de cloche est classé. Au pied dun très vieux tilleul, pierre funéraire de granit représentant une salamandre, emblème de François 1er. Cest dans cette enceinte quune brèche matérialise lemplacement de la porte.\r\n la Tour de Bramevaque semble avoir un rôle de surveillance et de défense. Un promontoire rocheux qui surplombe la cour nous mène à un deuxième palier, vers ce qui semble être une ancienne chapelle. Les murs sont ornés dune sorte dentablement ou de corniche, fait dun motif à damier. Impératif de défense oblige, les fenêtres de la petite église sont en ébrasement vers lintérieur, et non vers lextérieur, comme il sied à toute bonne meurtrière.","habitants":"des Comtes de Comminges\r\n        \r\n        \"","divers":"Vestiges du château-fort de Bramevaque","gps":"","images":["../image/image_65/65_Bramevaque_1.jpg","../image/image_65/65_Bramevaque_2.jpg","../image/image_65/65_Bramevaque_3.jpg","../image/image_65/65_Bramevaque_4.jpg","../image/image_65/65_Bramevaque_5.jpg","../image/image_65/65_Bramevaque_6.jpg","../image/image_65/65_Bramevaque_7.jpg"]},"Consult_chateau_formulaire128e":{"id":"Consult_chateau_formulaire128e","dept":"65","canton":"Lourdes","commune":"Ossen","nom":"Bégole","type":"Vestiges","periode":"XII","histoire":"BEGOLE,  le fief était vassal de la châtellenie de Castelloubon. Son propriétaire actuel, désireux de construire une villa sur le terrain a diminué de moitié. La fille de Foulque dAoussen, Na Guiraouta, se maria vers 1300, avec le seigneur Pey II de Bégole, le château fut transmis à la famille de ce dernier. Elle le garda jusquen 1610.   Les différents propriétaires de Bégole le premier propriétaire connu, la famille dAoussen, dont  Foulque dAoussen (ou de Ossenio) de 1297 à 1300,    Jacob de Ossenio vers 1342  puis la famille Bégole vers 1429 avec\r\nPey II de Bégole, époux de Na Guiraouta Foulque d'Aoussen. Antoni de Bégole Jean II de Bégole, oncle dAntoni qui épouse Jeanne de Bourbon, fille du vicomte du Lavedan, Aner. Vente en 1586, puis rachat en 1596, du domaine à Samson dAbbadie de Pontacq.  Paul de Bégole, lun des cinq enfants de Jean II.  Vente en 1610, à la famille de Sabiac. Bourtoumiou de Sabiac, jusquà Germaine de Sabiac, jusquen 1657, quand elle épouse Jean-Hector des Tournès dAngosse., Famille dAngosse :  de 1657 à 1789 avec Jean Paul des Tournès dAngosses, le dernier seigneur dOssen  et Gabriel Cazenave, 1920-1940, démantèlement.  Vers 1920, le château fut racheté par le grand père du maire de lépoque, Gabriel Cazenave. Il ne fit aucune rénovation et le château menaçant de ruines vers 1940, on utilisa alors les pierres pour la construction du clocher et de quelques granges alentours.","architecture":"Une maison forte seigneuriale  se trouvait à cet endroit, au point le plus élevé  , la hauteur de la tour afin de réduire lombre projetée sur sa maison ! Il ne reste maintenant que des murs, peu visibles de la rue.  la façade Sud de la tour possède deux étroites baies allongées, superposées à encadrement calcaire avec un reste de moulures. Lorigine de ce castet vient de la famille dAoussen (Jacobus de Ossenio) qui donna vers le XIIIe siècle, son nom au village, Ossen. Des belles ruines qui existaient encore vers 1950, Tout ce gâchis patrimonial pour une simple villa, alors que ce ne sont pas les terrains constructibles qui manquent dans le secteur.","habitants":"Famille dAoussen\r\n        \r\n        \r\n        \"","divers":"Vestiges du château et manoir de Bégolle","gps":"","images":["../image/image_65/65_Begole_1.jpg","../image/image_65/65_Begole_2.jpg","../image/image_65/65_Begole_3.jpg"]},"Consult_chateau_formulairef2f4":{"id":"Consult_chateau_formulairef2f4","dept":"65","canton":"Ossun","commune":"Bary","nom":"Bénac","type":"Maison forte","periode":"XVII","histoire":"BENAC, sur une hauteur du village de Barry se trouve une maison d'habitation à l'endroit même où était le château des seigneurs de la baronnie de Bénac.   La baronnie du Bénaquès, l'une des plus anciennes de Bigorre, fut érigée en marquisat en 1612.  Madame de Motteville, se rendant au mariage de Louis XIV à Saint-Jean-de-Luz (1660), séjourna au château. Le château fut détruit le 14 juillet 1794,  Ensuite à la famille de Montaut  J.-P. Picquet, en 1832, dans son « Voyage aux Pyrénées françaises », nous parle lui aussi du château de Bénac .","architecture":"Barry, qui signifie « faubourg », était un hameau du village de Bénac. On retrouve donc dans les textes anciens le nom du « château de Bénac malgré les efforts des maires de Bénac et de Barry qui voulaient empêcher cette destruction.   On peut encore voir quelques remparts et le corps de logis de l'ancien château.  le château actuel de plan rectangulaire à deux niveaux avec prolongement de dépendance à niveaux inférieur, toitures à deux pans pour l'ensemble.","habitants":"Famille de Montaut  \r\n        \r\n        \r\n        \"","divers":"Château de Bénac à Barry","gps":"","images":["../image/image_65/65_Benac_1.jpg","../image/image_65/65_Benac_2.jpg"]},"Consult_chateau_formulairefd25":{"id":"Consult_chateau_formulairefd25","dept":"65","canton":"Tarbes","commune":"Le Castet","nom":"Cadéac","type":"Château fort","periode":"XII","histoire":"CADEAC, le  château aurait été construit par le comte d'Aure Sanche Garcie. Il servit de prison, à partir de 1608, et regroupait les détenus des communes de la vallée d'Aure, sauf ceux de la haute vallée, qui allaient au château de Tramezaïgues. La surveillance est assurée par les habitants de Cadéac, qui y montent la garde à tour de rôle. En 1626, le vice sénéchal d'Armagnac,en fait une inspection.","architecture":"D'après la tradition historique le château aurait été construit au XIIe siècle  en même temps que les châteaux de Tramezaïgues (canton de Vielle-Aure) et Labarthe. Dans son état actuel le château est datable du XIIIe siècle. A partir de 1608 il sert de prison pour les villages de la vallée d'Aure à l'exception de la haute-vallée desservie par le château-prison de Tramezaïgues. Les habitants de Cadéac et des autres villages doivent s'y relayer. Située sur une butte au-dessus du village, cette tour de guêt, bien signalée par des panneaux indicateurs, est un reste du donjon carré du château fort. La tour de guet daterait du XIIIe ou XIVe siècle.Il sera consolidé en 1707, puis désaffecté fin XVIIIe siècle. Les matériaux récupérés serviront, en 1792, à la construction de l'hôpital d'Arrau. Ce château était constitué d'un donjon, comprenant un rez de chaussée, et 2 étages, reliés par un escalier droit dans l'épaisseur du mur, d'une basse cour en terrasse, et d'un mur d'enceinte dont il ne reste que des vestiges, et des latrines. Le château a perdu ses chaînages en pierre de taille calcaire, et les parements des murs externes sont percés par des trous de boulin. Son objectif  n'était pas d'avoir à se défendre contre un siège mais plutôt de loger une garnison restreinte et de surveiller les mouvements de la vallée d'Aure.","habitants":"Comte d'Aure Sanche Garcie\r\n        \r\n        \r\n        \"","divers":"Vestiges du château de Cadéac à le Castet","gps":"","images":["../image/image_65/65_Cadeac_1.jpg","../image/image_65/65_Cadeac_2.jpg","../image/image_65/65_Cadeac_3.jpg"]},"Consult_chateau_formulaire33aa":{"id":"Consult_chateau_formulaire33aa","dept":"65","canton":"Vic en Bigorre","commune":"Camalès","nom":"Camalès","type":"Château","periode":"XVII-XVIII","histoire":"CAMALES, château du XVIIe siècle, remaniée au XVIIIe siècle et au début du XIXe siècle. Il porte le souvenir d'une famille de Terride dont l'un des membres fut envoyé en Bigorre par Charles IX afin d'y restaurer la foi catholique.                                                                                                                                     A deux kilomètres à l'Est Bazillac, Le beau château dit de « FLORENCE » du XIXe siècle que l'on découvre au bout d'une allée à la sortie du village en direction de Maubourguet, avec sa chapelle attenante, fermé depuis plusieurs années et dans un état de délabrement qui s'amplifie progressivement.","architecture":"Château de Camalès ,L'accès nord est marqué par une longue allée plantée de marronniers,  y compris le jardin, le pavillon de lecture, la cour avec sa grille et son portail : inscription par arrêté du 3 juin 1999, corps de logis  de plan   rectangulaire à deux niveaux flanqué de pavillons saillants aux extrémités, toits en croupes.                                                                                                                               Le château de Florence  plus manoir que château  à deux niveaux  à toit brisés avec lucarnes dont la centrale et la plus importantes à trois travées avec deux tourelles à trois niveaux créneaux et mâchicoulis sur angle de la façade.                                                                                                                                                                Château Bazillac  de plan rectangulaire, corps de logis central à deux niveaux flanqué de deux pavillons rectangulaires dans un parc.                                                                                               Château de Méracq de plan rectangulaire à deux niveaux toit en croupes  avec lucarnes et tour sur façade opposée .","habitants":"Famille de Terride \r\n        \r\n        \r\n        \"","divers":"Château de Camalès, de Méracq et de Fleurance à Bazillac","gps":"","images":["../image/image_65/65_Camales_1.jpg","../image/image_65/65_Camales_2.jpg","../image/image_65/65_Camales_3.jpg","../image/image_65/65_Camales_4.jpg","../image/image_65/65_Camales_5.jpg","../image/image_65/65_Camales_6.jpg","../image/image_65/65_Camales_7.jpg","../image/image_65/65_Camales_8.jpg"]},"Consult_chateau_formulaire60a0-2":{"id":"Consult_chateau_formulaire60a0-2","dept":"65","canton":"Lourdes","commune":"Geu","nom":"Castel_Jaloux","type":"Vestiges","periode":"XIII","histoire":"Le Castet Gelos ou CASTEL-JALOUX :  Il appartenait à un fils  du vicomte de Lavedan. Il fut occupé de 1373 à 1404, par le parti anglais avec Jean de Béarn, alors gouverneur du château de Lourdes, puis par Arnauton (Arnaout) du Lavedan, sénéchal de la Bigorre. Une restauration fut envisagée en 1593, par le vicomte du Lavedan, Jean-Jacques de Bourbon Lavedan, mais les habitants du cru sy opposèrent, les armes à la main,  Il tomba en ruine lors du départ des Anglais qui avait pris le soin de le démanteler pour le rendre inutilisable. Il ne fut jamais restauré.","architecture":"Castel-Jaloux on accède aux ruines par le chemin qui part de l'arrière de léglise Saint-Martin. Ce sont les restes dun château fort du XIVe siècle. Cest certainement lun des plus vastes châteaux de la région, mais aussi lun des plus endommagés, ils démolirent les premiers murets et jetèrent les matériaux de construction dans le vide. L'approche se faisait par niveaux successifs. Au Sud , la première terrasse franchie, on ne pouvait accéder à la seconde sur le flanc Est du château, qu'en traversant un fossé de 2 m de large. Puis la montée s'effectuait par une rampe. Le tremblement de terre de 1660, a probablement achevé sa destruction. Le dernier relevé date de 1866, il a été fait par Anthyme Saint-Paul, il en a même réalisé un plan édité dans le bulletin monumental en  1867. De nos jours, il reste vraiment peu de chose de cet ancien et puissant castel. Le dernier élément conservé  est la porte dentrée, fermée par une barre coulissante flanquée de deux contreforts en applique ; cette porte est surmontée dune fenêtre à coussiège.","habitants":"Vicomte de Lavedan\r\n        \r\n        \"","divers":"Vestiges du château de Castel-Jaloux à Geu","gps":"","images":["../image/image_65/65_Castel_Jaloux_1.jpg","../image/image_65/65_Castel_Jaloux_2.jpg","../image/image_65/65_Castel_Jaloux_3.jpg"]},"Consult_chateau_formulaire4d42":{"id":"Consult_chateau_formulaire4d42","dept":"65","canton":"Lourdes","commune":"Ourdis-Cotdoussan","nom":"Castelloubon","type":"vestiges","periode":"XII","histoire":"CASTELLOUBON, situé après Cheust. Le site servit de fief aux premiers vicomtes du Lavedan. En 945, Donat Loup installa son château sur une éminence dominant plusieurs vallées : dit le château des loups en 1106, dans le cartulaire des vicomtes du Lavedan. Une polémique est née à propos de lorigine de ce nom. Désigne-t-il le château du bon vicomte : castel lou bou (castel le bon), ou le château des Loup nom de famille du vicomte,   bons ou méchants, il reste toujours les ruines du château, en haut  du village de Cotdoussan. Dégradé par un séisme en 1660, il sera abandonné peu après. Il avait cependant été déjà délaissé au XIIe siècle, par les dits vicomtes, pour le château de Beaucens. Il était ruiné au XVIIIe siècle, mais un acte notarié de 1615, suite à un inventaire de juin 1613, nous offre un descriptif précis.","architecture":"Les ruines du château de Castelloubon Castet Lou Bou, c'est-à-dire le bon château,  de 945 au XIIe siècle, descriptif de structure pyramidale à trois niveaux, les différentes compositions étaient adaptées au terrain. Au sommet se dressait le donjon barlong, deux enceintes le protégeaient. Chaque enceinte était flanquée d'une tour ronde en saillie. Les bâtiments étaient composés de deux corps de logis ; celui de l'ouest abritait trois chambres \"à deux planchers\",  et celui de l'est, appelé Ventajou, deux chambres. Entre les deux, se trouvait le donjon, une citerne et une chapelle voûtée. La première enceinte en contrebas protégeait deux chais, l'autre enceinte à 30 m environ, des petits logis accrochés aux pentes. \r\nL'édifice était assez complexe car il servait de forteresse et de résidence seigneuriale. Le donjon a été pratiquement arasé, et la tour cylindrique dont nous voyons les restes est l'une des deux tours circulaires du rempart. Anthyme Saint-Paul, en 1866, a réalisé un descriptif, illustré dun plan. \r\nUne visite nécessite l'accord du propriétaire, car il s'agit d'une propriété privé et l'accompagnement d'un guide connaissant bien le site, car vu le nombre de fossés, de trous et de falaises l'accession est assez dangereuse surtout que la vue est souvent occultée par nombre de buissons en  buis.\r\nIl reste encore quelques murs épars, dont celui de la chapelle, de la tour d'angle, du donjon et de la basse fosse.","habitants":"Vicomtes du Lavedan\r\n        \r\n        \"","divers":"pas de vestiges à montrer","gps":"","images":["../image/image_65/65_Castelloubon_1.jpg","../image/image_65/65_Castelloubon_2.jpg"]},"Consult_chateau_formulairef74b":{"id":"Consult_chateau_formulairef74b","dept":"65","canton":"Argelès Gazost","commune":"Beaucens","nom":"Cohitte","type":"Manoir","periode":"XIII","histoire":"COHITTE, le premier propriétaire connu est Ramon de Beaucens vers 1320. Famille de Lavedan. Auger de Lavedan, de 1392 à 1429.  Arnaut de Lavedan, fils dAuger de 1440 à 1470.  Bertrand de Lavedan, fils dArnaut, de 1472 à 1483 jusquà  Jean de Lavedan dit de Couhite, fils dArnaut Guilhem, de 1525 à 1530.   En 1547, nous passons aux seigneurs dArras, Antoine de Castet Nau. Etienne 1er de Castet Nau. La propriété est vendue aux Montaut de Sen Sebé (Saint Sever) François de Montaut de Sen Sebé de 1579 à 1623. Bernard de Montaiut de Sen Sebé, fils de François, de 1623 à 1627.  Antoine Montaut de Sen Sebé, fils de Bernard, de 1628 à 1638, jusquà Françoise Montaut de Sen Sebé, sur de Roger qui épouse en 1669,  Louis de Lescure. La propriété est vendue en 1691, au Lourdais. Famille dEstrade Bernat dEstrade, de 1691 à 1728. Jean-Baptiste dEstrade, fils de Bernat, de 1729 à 1760. Sa fille, Louise-Thérèze épouse Bernard dAstaing dEstampes, ils restent propriétaire jusquen 1787.  Les Vergez-Labit Elle devient ensuite en 1787, la propriété de Pierre Vergez, puis de son épouse jusquen 1835. Nous avons ensuite :\r\nDominique Vergez, fils de Pierre.   Joséphine Vergez, fille de Dominique, jusquà son mariage en 1848 avec Henri Labit. Marie-Henriette-Pauline Labit, fille de Henri. Elle épouse Jean-Paul Lacaze.  Les Lacaze\r\nIrène Lacaze, fille de Jean-Paul épouse Blaise Peré, ils sont propriétaires jusquau décès de ce dernier :  en 1964,   leurs enfants Maria et Joseph Lacaze décédés respectivement en 1984 et 1998 sans descendance. L'actuel propriétaire est Louis Fourcade.","architecture":"COHITTE, il est situé au nord de la commune, au sommet d'une colline  dans un espace boisé,  assez sauvage. Certains ouvrages le confondent avec le château dAyret à Préchac. Ce manoir dune seigneurie réputée, celle de la Ribera de Davantaygue, remonte au XIIe siècle. Lactuel bâtiment appartenant à un Lourdais a conservé son noyau médiéval, son aspect fin XVIIe siècle : corps de logis rectangulaire, flanqué de deux petites tours et dune tourelle de latrines. Lensemble comprend une chapelle, un moulin et une grange. Le manoir avec ses dépendances a été classé en 1998, à lInventaire  des monuments historiques.","habitants":"Famille de Lavedan\r\n        \r\n        \"","divers":"Château de Cohitte à Beaucens","gps":"","images":["../image/image_65/65_Cohitte_1.jpg","../image/image_65/65_Cohitte_2.jpg","../image/image_65/65_Cohitte_3.jpg","../image/image_65/65_Cohitte_4.jpg"]},"Consult_chateau_formulaire261e":{"id":"Consult_chateau_formulaire261e","dept":"65","canton":"","commune":"Galan","nom":"Galan","type":"Bastide","periode":"XIV","histoire":"GALAN  fût rattaché à la couronne de France en 1315. Sous protection royale, le prieuré devient bastide royale entourée dune enceinte, dotée de portes  dun fossé, et de couverts accueillant le marché.   Après la destruction du monastère du XVe siècle, cest la ville elle-même qui est saccagée par les Huguenots, pas d'informations historiques.","architecture":"Galan  Deux-tours portes, fermées chaque soir, assuraient la sécurité de laccès à la rue principale. Cette ancienne porte sud de la commune de Galan a été inscrite à linventaire des monuments historiques par arrêté du 13 mars 1946.  C'est là le dernier vestige monumental des murailles de cette commune. Cette unique tour-porte fortifiée conservée est une construction en pierre de 6,20 x 5,50 m. Elle est dotée dune grande porte charretière voûtée de 2,40 m de largeur et de plus de 3 m de hauteur. On note la présence de corbeaux en partie haute du mur, près de la voûte (pour recevoir un plancher. Un autre corbeau, centré au-dessus du portail, servait sans doute de support à une statue de saint protecteur, comme il était dusage.\r\nA létage, accessible par une porte étroite et un escalier, se trouvait une salle obscure.  Le toit en ardoises a été installé à lépoque moderne sur des murs remaniés. La porte était précédée dune barbacane et dun pont disparu.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Porte de la ville de Galan","gps":"","images":["../image/image_65/65_Galan_1.jpg","../image/image_65/65_Galan_2.jpg","../image/image_65/65_Galan_3.jpg"]},"Consult_chateau_formulairee16a":{"id":"Consult_chateau_formulairee16a","dept":"65","canton":"Trie sur Baïse","commune":"Monléon-Magnoac","nom":"Garaison","type":"Château","periode":"XIV-XV","histoire":"GARAISON ville fortifiée, la baronnie de Barthère et Garaison appartient à la famille d'Antin. En 1515 une jeune bergère Anglèze de Sagazan aurait des apparitions de la Sainte Vierge, une source miraculeuse apparaît et une chapelle est construite en 1540 aujourd'hui classée monument historique. Cette jeune fille habitait \"à une portée d'arbalète\", peut-être une habitation antérieure au lieu dit \"Manoir de Garaison\" bâtie sur le même terrain. Très tôt Garaison devient un lieu de pèlerinage sur le chemin de Compostelle. Au manoir de Garaison se tiennent les états des quatre vallées : les vallées d'Aure de la Basse-Neste, de Barousse et de Magnoac.  La France est en guerre de religion. La statue de Notre-Dame des Sept Douleurs, une vierge polychrome est jetée au feu mais elle résiste aux flammes. Dès lors la piéta est placée dans le chur de la chapelle de Garaison où elle est encore aujourd'hui admirée. Au XVIIe siècle des chapelains s'installent à Garaison, évincent la famille d'Antin de ses terres de Garaison et de la commanderie de Boudrac et c'est  à cette époque que le manoir de Garaison devient maison des pélerins. Durant la révolution, les religieux sont chassés et la chapelle est fermée. En 1841 un collège ouvre ses portes mais celui-ci est fermé en 1903. Durant la première guerre mondiale les bâtiments servent à abriter 1 700 prisonniers. Parmi eux se trouve le célèbre docteur Albert Schweitzer, médecin et pasteur protestant. En 1923 grâce à d'anciens élèves qui le rachètent, le collège reprend vie. Depuis lors l'établissement catholique sous contrat continue d'accueillir de nombreux enfants du primaire au lycée. Ils sont accompagnés par des religieux en lien avec le sanctuaire de Lourdes.","architecture":"Le manoir est constitué d'un ensemble de bâtiments clos de murs. La présence d'une ancienne fenêtre à meneaux permettrait de dater l'ensemble des XIVe et XVe siècles. En outre les pierres de fortifications médiévales ont été retrouvées lors des travaux d'assainissement. Ces bâtiments d'une architecture typique du Magnoac sont réalisés dans des matériaux naturels : galets disposés en épis, bois, terre cuite, torchis ou pisé selon des savoirs-faire ancestraux. Une maison principale à colombages orientée nord/sud couverte d'une toiture en tuiles canal est bordée à l'ouest par une étable remarquable par ses dimensions et sa charpente. Autrefois un bâtiment de même modèle lui faisait face. Dans le prolongement, une métairie fut hostellerie au XIXe siècle. On peut admirer le porche monumental, la bergerie et deux granges en enfilade. Un ancien four à pain clôt l'ensemble. La cour était autrefois pavée d'une calade. On y remarque le puits qui a fait l'objet d'une restauration. Au début du XIXe siècle le manoir de Garaison est acheté par la famille Boué. Cette demeure appartient encore à ses descendants.","habitants":"famille d'Antin\r\n        \r\n        \"","divers":"Château de Garaison et porte féodale de Monléon-Magnoac","gps":"","images":["../image/image_65/65_Garaison_1.jpg","../image/image_65/65_Garaison_2.jpg","../image/image_65/65_Garaison_3.jpg","../image/image_65/65_Garaison_4.jpg","../image/image_65/65_Garaison_5.jpg"]},"Consult_chateau_formulairea6de":{"id":"Consult_chateau_formulairea6de","dept":"65","canton":"Ossun","commune":"Gardères","nom":"Gardères","type":"Château","periode":"XV-XVIII","histoire":"GARDERES, au XVe siècle la seigneurie des villages de Gardères, Luquet, Seron, et Aast appartenait à la maison de Coarraze. Catherine de Coarraze légua cette seigneurie à son fils Gaston de Foix-Carmaing qui la vendit en 1504 à Bernard II de Coarraze. La seigneurie passa ensuite par héritage aux Castelnau-Laloubêre et fut vendue en 1603 à Antoine d'Incamps, seigneur d'Abêre en Vic-Bilh. Ainsi depuis le XVe siècle, dans cette ancienne seigneurie de Gardères se sont succédés les familles Coarraze, Foix-Carmaing, Castelnau-Laloubêre, d'Incamps, Day, Cazaubon-Lavedan, d'Olce de La Lande de Vic en Bigorre et Baqué.  Philippe V, roi d'Espagne, y aurait fait étape le 29 mai 1706 avec sa suite.  En 1758, Pierre de Day se marie avec sa cousine, fille de Daniel de Day-Mars. Puis en 1760 naît Pierre Joseph de Day-Gardères dit baron de Day (1760-1812) qui sera le dernier seigneur des cinq communes. celui-ci était conseiller au parlement de Navarre depuis 1779. Ses biens furent séquestrés puis affermés de 1798 à 1800 Après l'intermède de la Révolution, pendant laquelle la famille de Day émigra en Espagne, celle-ci revient à Gardères et le château passa par alliance aux Cazaubon-Lavedan, puis à Marie d'Olce de La lande de Vic en Bigorre le 10 Février 1846. Celle-ci vendit le château aux enchères à la famille Baqué  en Juillet 1904 qui s'en sert de débit de boisson et épicerie avant d'être pillé, même squatté, au gré des intempéries, comme la tempête de 1999 qui portera un coup dur sans précédent au château,   il fut acquis en 2000 par Mr David Alexandre Liagre qui entame une vaste campagne de restauration.","architecture":"On trouve déjà trace du château à partir du XVe siècle. Il fut reconstruit sur un plan XVIIIe siècle lui donnant son aspect actuel. le château et ses communs reprennent vie petit à petit et la réhabilitation de ce bâtiment reste encore aujourd'hui après plusieurs siècles un travail de longue haleine. Tout est fait pour conserver le cachet et l'esprit de cette demeure chargée d'histoire Le plan et la disposition générale ont pu être l'oeuvre de Pierre de Day. Puis en 1760 naît Pierre Joseph de Day-Gardères dit baron de Day (1760-1812) qui sera le dernier seigneur des cinq communes.  Le bâtiment central s'articule autour d'un avant corps central à peine ébauché, coiffé d'un fronton triangulaire. Encadré de communs et d'une chapelle Inscrite à l'inventaire  des monuments historiques.","habitants":"Famille de David Liagre\r\n        \r\n        \r\n        \"","divers":"Château de la Gardères","gps":"","images":["../image/image_65/65_Garderes_1.jpg","../image/image_65/65_Garderes_2.jpg"]},"Consult_chateau_formulaire8f57-2":{"id":"Consult_chateau_formulaire8f57-2","dept":"65","canton":"Trie  sur Baïse","commune":"Castelnau-Magnoac","nom":"Grange_Castelnau","type":"Manoir","periode":"XVI","histoire":"La GRANGE, au coeur de la Gascogne, entre Auch et Lannemezan, se trouve cette magnifique propriété avec maison de maître de 1850 et ancien moulin à eau du XIVe siècle dans un parc arboré au bord du GERS.  Actuellement chambre d'hôtes de Bernard Verdier.                                                A quelques kilomètres à l'Ouest à Hachan tour de Saint-Lary de Soudan.","architecture":"Construit en 1536 d'un mélange Moyen-Age et Renaissance, un escalier intérieur, renforcé de balustres desert  le logis principal et les dépendances.                                                                                                                           Saint-Lary-Soulan la tour Hachan.","habitants":"Famille de Bernard Verdier\r\n        \r\n        \"","divers":"Château de Grange Castelenau et à Saint-Lary-Soulan la tour Hachan","gps":"","images":["../image/image_65/65_Grange_Castelnau_1.jpg","../image/image_65/65_Grange_Castelnau_2.jpg","../image/image_65/65_Grange_Castelnau_3.jpg","../image/image_65/65_Grange_Castelnau_4.jpg","../image/image_65/65_Grange_Castelnau_5.jpg","../image/image_65/65_Grange_Castelnau_6.jpg"]},"Consult_chateau_formulaire986c":{"id":"Consult_chateau_formulaire986c","dept":"65","canton":"Capvem","commune":"Loudenvielle","nom":"Génos_Moulor","type":"Vestiges-château fort","periode":"XIII","histoire":"GENOS,  le château de Génos est un ancien château-fort bâti au lieu-dit à Pouyès, à Genos, La construction du château fort de Génos date du XIIIe siècle a conservé sa tour de guet. Château fort attesté en 1256 . La coutume de 1532 spécifiait que les habitants de la vallée devaient entretenir et défendre le château, en temps de guerre. En 1899, sur l'intervention de J.de Lahondès, président de la société archéologique du midi de la France, le maire de Génos prend un arrêté pour interdire aux habitants de démanteler les murs.\r\nLe château de Moulor fut construit au XIIe siècle. Le fief de la seigneurie comprenait une partie des territoires actuels des communes de Germ, Loudervielle, Armenteule et Aranvielle et quelques terres dans le Larboust, vallée voisine. Le donjon et la chapelle appartenaient aux seigneurs de Montlaur, vassaux des barons dEspagne les Montespan. En 1540, Dominique de Montlaur rend hommage pour le château. \r\nLes derniers membres de la famille des seigneurs de Moulor ayant résidé au château se sont éteints en 1753 et 1754.","architecture":"Pendant les troubles des IXe et Xe siècles, la vallée du Louron a été saccagée, pillée par les bandes sarrasines. Les tours de guet furent bâties à cette époque pour repérer et résister aux attaques des Maures. Ces tours, toutes de formes carrées, pouvaient être incluses dans un château ou entourées d'une simple enceinte. La tour de Génos, construite sur un étranglement de la vallée, à côté des ardoisières, surveillait le Sud et prévenait les autres tours du danger. On raconte même qu'il existerait un passage souterrain reliant la tour de Génos à celle de Moulor. La tour de Génos est construite sur un étranglement de la vallée, à côté des ardoisières. Elle surveillait ainsi au sud, le débouché des gorges de Clarabide et de la Vallée de la Pez et prévenait les autres tours du danger à laide de trois signaux : rythmes divers martelés sur des tambours de bois, signaux transmis au moyen de feux et enfin transmissions par pigeons-voyageurs. Certains racontent même quil existerait un passage souterrain reliant la tour de Génos à celle de MoulorTour de Moulor","habitants":"Seigneurs locaux\r\n        \r\n        \r\n        \"","divers":"Vestiges du château de Génos la tour Moulor à Loudenvielle","gps":"","images":["../image/image_65/65_Genos_Moulor_1.jpg","../image/image_65/65_Genos_Moulor_2.jpg","../image/image_65/65_Genos_Moulor_3.jpg","../image/image_65/65_Genos_Moulor_4.jpg","../image/image_65/65_Genos_Moulor_5.jpg","../image/image_65/65_Genos_Moulor_6.jpg","../image/image_65/65_Genos_Moulor_7.jpg"]},"Consult_chateau_formulairee9a4":{"id":"Consult_chateau_formulairee9a4","dept":"65","canton":"Maubourget","commune":"Hagedet","nom":"Hagedet","type":"Vestiges","periode":"XII","histoire":"HAGEDET, cité en 1080; Etienne seigneur du lieu obtiendra la charge des Prieur de Madiran. Au XIIe siècle possession des moines chevaliers de l'ordre de l'hospital. En 1300 Jean de Hagedet prête hommage au comte d'Armagnac.  Au XVe siècle c'est sous Arnaud-Guilhem  de Hagedet la famille  passe  par alliance aux Saint-Lanne, Raymond de Saint-Lanne en 1501 le dernier seigneur. Au cours des guerres de religion le château est détruit et ruiné en 1658.","architecture":"Château ruiné est composé de terres rapportés formant une motte  précédé d'une esplanade dénommée basse-cour l'ensemble était protégés par des fossés. Au sommet se trouvait le bâtiment octogonal ou résidait les seigneurs. Aujourd'hui vestiges.","habitants":"Famille d'Arnaud-Guilhem  de Hagedet \r\n        \r\n        \"","divers":"Vestiges du château d'Hagedet","gps":"","images":["../image/image_65/65_Hagedet_1.jpg","../image/image_65/65_Hagedet_2.jpg"]},"Consult_chateau_formulaire3045":{"id":"Consult_chateau_formulaire3045","dept":"65","canton":"Trie sur Baïse","commune":"Vieuzos","nom":"Haget_Vieuzos","type":"Château","periode":"XVIII","histoire":"HAGET, son château situé dans la plaine du Haget, construit en deux parties, la première au XVIIIe siècle puis deux ailes latérales réalisées au XIXe siècle. Ce château n'est pas inscrit au patrimoine historique .Perdu dans la plaine gasconne, le château du Haget est un lieu chargé dhistoire et dart, propice à loisiveté. Hôtel restaurant.","architecture":"Construit au XVIIIe siècle de plan en U corps de logis rectangulaire  à deux niveaux à créneaux au niveau du toit accolé en façade de deux tourelles  à toit en poivrières. Les deux  pavillons latéraux rectangulaires à trois niveaux toits en croupes avec lucarnes sur parc à galbes et acrotères, et sur cour donjon  néo-gothique de trois niveaux crénelés à mâchicoulis toits à quatre pans lucarnes à galbes et acrotères sur face avant et clocheton.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Château d'Haget de Touron et la porte tour de Vieuzos","gps":"","images":["../image/image_65/65_Haget_Vieuzos_1.jpg","../image/image_65/65_Haget_Vieuzos_2.jpg","../image/image_65/65_Haget_Vieuzos_3.jpg","../image/image_65/65_Haget_Vieuzos_4.jpg","../image/image_65/65_Haget_Vieuzos_5.jpg","../image/image_65/65_Haget_Vieuzos_6.jpg","../image/image_65/65_Haget_Vieuzos_7.jpg"]},"Consult_chateau_formulairea827":{"id":"Consult_chateau_formulairea827","dept":"65","canton":"Barbazan Debat","commune":"Horgues","nom":"Horgues","type":"Château","periode":"XIV-XVIII","histoire":"HORGUES, le premier seigneur  de Horgues au XIIIe siècle passe aux seigneur d'Equivat de Chavannes comte de Bigorre et ensuite aux Raymond  Garcie de Lavedan jusqu'à la fin du Moyen-Age, au XVIe siècle par alliance passa de Gabrielle  de Lavedan a Gaston d'Armagnac.","architecture":"construit au XVe siècle restauration au XVIIe siècle modifier au XIXe siècle le château  comportait des fondations médiévales de plan carré, cantonné de quatre tours rondes. A ce jour il reste deux tours rondes en façade et une tour à l'angle  Sud-Est et des fenêtres à meneaux sont encore visible  sur la façade nord et Est formant un ensemble de plan en T.  L'édifice est situé en bordure du ruisseau de Campade qui alimente le canal du moulin. Il comporterait des fondations médiévales sur un plan carré cantonné de quatre tours circulaires. Sa restauration eut lieu à diverses époques, et notamment au XVIIIe siècle. Quelques fenêtres à meneaux sont visibles sur la façade Nord et Est. Cependant, il existe des traces de terrassements pouvant dater de l'époque médiévale sur le côté Est du château.","habitants":"Famille de Gaston d'Armagnac\r\n        \r\n        \"","divers":"Château de Horgues","gps":"","images":["../image/image_65/65_Horgues_1.jpg","../image/image_65/65_Horgues_2.jpg","../image/image_65/65_Horgues_3.jpg"]},"Consult_chateau_formulairec9f1-2":{"id":"Consult_chateau_formulairec9f1-2","dept":"65","canton":"La Barthe de Neste","commune":"La Barthe de Neste","nom":"La_Barthe_Neste","type":"Vestige, tour","periode":"XIII-XV","histoire":"LA-BARTHE, un compte-rendu dune inspection de places fortes décrit au XVIIe siècle le château de La Barthe de Neste :  Il est dans un lieu  pour être conservé comme étant proche de la frontière.  Les vicomtes de Labarthe lhabitèrent jusquen 1330 et propriété de la Maison de La Barthe jusquà ce quil passe aux Comtes dArmagnac au XIVe siècle. En 1475  il devient propriété des Rois de France jusquà Louis XI. Durant les guerres de Religion au XVIe siècle, il est le refuge de Ligueurs ; Henri IV ordonne alors sa destruction. Le Sénéchal du Roi à Toulouse fait raser le château à hauteur dinfamie (à hauteur du pont levis). Il est reconstruit plus tard et devient le repère de 60 bandouliers qui terrorisent la population.  Au XVIIIe siècle, ce quil en reste est cédé au duc dAntin, puis à son héritier, le duc dUzès en 1768. Il est acheté par Pierre de Lassus en 1759 ; la famille en est encore aujourdhui propriétaire et porte le titre de baron de Labarthe.","architecture":"¨Place forte du XVII le château de Neste « Cest un bâtiment aux  murs d'environ de 2 mètres  de hauteur entouré de mâchicoulis à lantique sans aucun flanc assuré. De cet important site médiéval supposé construit au XIIe siècle par Mansion-Auriol, troisième vicomte de Labarthe, il ne reste quune partie de limposant donjon bâti de galets et quartzite savamment agencés et de pierres taillées, la basse cour et des murs renversés. Pourtant, face aux Pyrénées, aux vallées de Neste, d' Aure et à lAragon, ce château a eu une importance de premier ordre.                                        Magnifique point de vue sur les vallées de Neste et Aure. Vue sur le Château de Montoussé et la Tour médiévale de Hechettes. et manoir de Lachau.","habitants":"vicomtes de Labarthe \r\n        \r\n        \r\n        \"","divers":"Vestiges du château de La-Barthe, Vue sur le Château de Montoussé et la Tour médiévale de Hechettes. et manoir de Lachau","gps":"","images":["../image/image_65/65_La_Barthe_Neste_1.jpg","../image/image_65/65_La_Barthe_Neste_2.jpg","../image/image_65/65_La_Barthe_Neste_3.jpg","../image/image_65/65_La_Barthe_Neste_4.jpg","../image/image_65/65_La_Barthe_Neste_5.jpg"]},"Consult_chateau_formulaireb4a2-2":{"id":"Consult_chateau_formulaireb4a2-2","dept":"65","canton":"Maubourget","commune":"Labatut_Rivière","nom":"Labatut_Rivière","type":"Château-fort","periode":"XIV","histoire":"LABATUT,  Bernard de Rivière, est au service du comte Jean V d'Armagnac au milieu du XVe siècle. nommé sénéchal d'Armagnac, mais aussi de Toulouse. Conseiller et chambellan du roi. Au XVIe siècle, les descendants de Rivière continuent de porter le titre de vicomte , les Rivière sont tués lors des guerres  de religion. Au début du XVIIe siècle, Henriette de Rivière fille d'Annet épouse Philippe de Barbotan, puis lègue à son fils Louis Bompar de Barbotan. Vient ensuite François-Henry dont deux fils se disputent la succession : François dit marquis de Giscaro et Jacques dit comte de Labatut. Anne-Henriette, fille de ce dernier, vend la seigneurie de Labatut et ses dépendances en 1776, L'acquéreur est  Bertrand de Fondeville, seigneur de Marignac et Moustajon dans la Haute-Garonne. Il est assassiné quelques années plus tard en 1781. Son fils Pierre Clair de Fondeville s'installe alors dans le château et sur ses terres de Labatut, exerce ensuite plusieurs mandats locaux à Labatut, conseiller municipal, ainsi que maire de 1808 à 1816, puis de 1821 jusquà son décès en 1828. Son fils ayant disparu prématurément, la succession de Pierre Clair de Fondeville repose sur ses filles dont laînée Marquette épouse en 1805 Jean Placide de Castelmore, titré chevalier de Saint-Louis en 1817. La famille de Germon en devient à son tour propriétaire par alliance, à l'époque du Second Empire et ce jusquà sa vente en 1980. L'intégration de ces deux familles nobles dans la commune est attesté par les multiples mandats de maire de Jean Placide de Castelmore, puis de Charles de Castelmore, son frère (1852, 1871)
