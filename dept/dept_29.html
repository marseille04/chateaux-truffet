                  TREVIGNON, édifié à l'emplacement d'anciennes fortifications littorales  au cours du quatrième quart du XIXe siècle: Trévignon n'était composé que de quelques habitations et d'une partie d'un fort militaire qui aurait été élevé par Vauban. Le domaine maritime vendit ce terrain au docteur Artaud, dont le neveu et héritier était le petit-fils d'Armand Fallières, président de la République de 1906 à 1913. Le docteur fit construire cette demeure, qui par son allure, n'est pas sans évoquer les châteaux Ecossais. A sa mort en 1936, la propriété est mise en vente par son neveu. C'est une famille en vacances à Beg-Meil qui finit par l'acheter. De 1936 à 1939, les travaux de remise en état vont bon train, lorsque la guerre éclate. La famille demeure à Trévignon, mais elle doit cohabiter avec les Allemands avant d'être chassée. En 1944, lorsque la poche de Lorient cède, les Allemands invitent les villageois à vider le château avant d'y mettre le feu en partant. Les travaux de reconstruction ont été entrepris dans les années 1950.","architecture":"KERMINAOUËT, en 1427 on trouve dans les archives l'existence du \"Noble Manoir\" et son domaine ; construit par la famille Gallois, qui changera a maintes reprises de propriétaires. En 1655, il acquiert le titre de Noble manoir de Kerminaouët et est déclaré officiellement seigneurie en 1677, appartenant à Messire Olivier de Kermellec. Puis, en 1855, le comte Ferdinand de la Lande de Calan fait construire, pour loger ses nombreux enfants, le château près du manoir, par l'architecte Chaussepied inspiré d'art oriental à qui l'on doit l'église de Concarneau, les jardins sont dessinés par le paysagiste Edouard André, le domaine de Kerminaouët sera la propriété des Calan jusqu'en 1997. En 1998, Jacoline et Bob Dubois tombent amoureux du domaine; ils l'achètent et consacrent leur temps à sa restauration. Après 4 ans de travaux, ils ouvrent leur havre de paix de 53 ha aux artistes, aux amoureux de la nature et du calme.","habitants":"docteur Artaud                                                                                         Famille de Messire Olivier de Kermellec \r\n        \"","divers":"Deux châteaux à Trégunc; Pananrum,, Kerminaouët grav  1 à 4.  Trévignon grav-5-6-7                                                                    Artaud GPS : 47° 51' 20\" Nord, 3° 51' 10\" Ouest                        Trévignon  GPS : 47° 51' 20\" Nord, 3° 51' 10\" Ouest","gps":"47° 51' 20\" Nord, 3° 51' 10\" Ouest                        Tr","images":["../../jctruffet.com/image/image_29/29_Tr%c3%a9gunc_1.jpg","../../jctruffet.com/image/image_29/29_Tr%c3%a9gunc_2.jpg","../../jctruffet.com/image/image_29/29_Tr%c3%a9gunc_3.jpg","../../jctruffet.com/image/image_29/29_Tr%c3%a9gunc_4.jpg","../../jctruffet.com/image/image_29/29_Tr%c3%a9gunc_5.jpg","../../jctruffet.com/image/image_29/29_Tr%c3%a9gunc_6.jpg","../../jctruffet.com/image/image_29/29_Tr%c3%a9gunc_7.jpg"]},"Consult_chateau_formulaire9083":{"id":"Consult_chateau_formulaire9083","dept":"29","canton":"Briec","commune":"Goazec","nom":"Trévarez","type":"Château","periode":"XIX","histoire":"TREVAREZ, situé dans un site surplombant la vallée de l'Aulne, le domaine de Trévarez fut construit de 1893 à 1907 non loin d'un ancien manoir. La personnalité de son commanditaire, ancien diplomate, président du Conseil général, associée au savoir faire d'un atelier d'architectes parisien dirigé par Walter André Des tailleurs contribua à l'établissement de constructions conçues et mises en oeuvre avec un extrême soin. Le château est édifié en granit de Kersanton et en brique, selon un style en accord avec les modes de vie et de représentation de la haute bourgeoisie financière de l'époque. Il rappelle d'ailleurs les hôtels particuliers New-Yorkais élevés par les Vanderbilt sur la Ve avenue, aujourd'hui disparus, et qui pastichaient les détails d'ornementation de l'architecture Renaissance. La plus grande partie du chantier fut réalisée par des entreprises parisiennes. Ce château de la Loire pourvu d'un très moderne ascenseur comme d'un somptueux escalier d'honneur au décor Renaissant, est véritablement une création ex-nihilo, d'une ampleur qui ne pourra être imitée après avec la crise engendrée par la Première Guerre mondiale. Il figura d'ailleurs parmi la sélection nationale pour l'architecture à l'Exposition universelle de Chicago en 1904. Le château  fut malheureusement sinistré en partie par un bombardement en 1944 et resta en l'état jusqu'à nos jours, quant à ses abords, ils furent remis en valeur par le nouveau propriétaire du domaine, le Conseil Général du Finistère. Ouvert à la visite depuis 1971, son parc de 75 hectares est le lieu d'un important concours hippique et de floralies réputées.","architecture":"TREVAREZ, éléments protégés MH : l'ensemble des éléments constitutifs, bâtis et paysagers, du domaine de Trévarez, à savoir : les façades et les toitures du château et la totalité des pièces du rez-de-chaussée et du sous-sol y compris l'escalier d'honneur ainsi que les escaliers, les rampes et la balustrade périphérique de la terrasse sud; les façades et les toitures des communs ainsi que les stalles conservées dans l'extrémité sud-est de l'aile sud des écuries et la fontaine du Lion y compris le mur de soutènement sur lequel elle s'adosse, le manoir est une ferme expérimentale : les façades et les toitures du logis, des deux maisons de fonction, de l'ensemble des communs et des chenils ainsi que les anciens jardins en terrasses, la chapelle et la fontaine Saint-Hubert en totalité, la pavillon de garde de Cavarno pour ses façades et ses toitures, la maison du jardinier pour ses façades et ses toitures, y compris la serre attenante en totalité, les sols et les murs de clôture du verger et du potager, le bassin central du potager, les serres à savoir les serres adossées au mur nord du potager en totalité, dans le verger les trois serres froides et la serre chaude pour leurs façades et leurs toitures, la cressonnière, la parc paysager et les jardins  régulier, classique, d'inspiration Renaissance italienne, pittoresque et asiatique avec les fabriques qu'ils contiennent, à savoir le bassin de la chasse et son buffet d'eau du jardin Renaissance, les deux vasques et le cadran solaire du jardin régulier, les deux statues des enfants maîtres-chiens, et les infrastructures hydrauliques, à savoir le réservoir sud-ouest, les canalisations souterraines et dégagées, l'étang, qui, vannes et vivier, les grilles et les piliers des portails d'accès par les pavillons de Cavarno et la maison forestière de Vein Roux : inscription par arrêté du 6 avril 2009.","habitants":"Conseil Général du Finistère.\r\n        \r\n        \"","divers":"Château de Trévarez à Goazec","gps":"","images":["../../jctruffet.com/image/image_29/29_Tr%c3%a9varez_1.jpg","../../jctruffet.com/image/image_29/29_Tr%c3%a9varez_2.jpg","../../jctruffet.com/image/image_29/29_Tr%c3%a9varez_3.jpg","../../jctruffet.com/image/image_29/29_Tr%c3%a9varez_4.jpg","../../jctruffet.com/image/image_29/29_Tr%c3%a9varez_5.jpg","../../jctruffet.com/image/image_29/29_Tr%c3%a9varez_6.jpg"]},"Consult_chateau_formulaire4f69":{"id":"Consult_chateau_formulaire4f69","dept":"29","canton":"Plouigneau","commune":"Locquirec","nom":"Île_Blanche","type":"Château","periode":"XVII","histoire":"ILE-BLANCHE, le manoir fut construit en 1661 pour Pierre de la Haye, Son premier propriétaire connu fut , un  armateur, qui combattit au service du roi Louis XIV. Il mourut en 1668. Au cours du XIXe siècle, le domaine passa à la famille Guezennec, à Francis Goüin, historien et magistrat (petit-fils d'Armand Joseph Dubernad), à Henri Le Blond en 1887 et à Mr Crokaert. Early John Norton, avocat-conseil du vice-roi des Indes à Madras, devint le propriétaire du domaine, en 1903. le manoir devient château, à linitiative de Mme Norton, épouse de lavocat conseil du vice-roi des Indes. Elle prend possession des lieux en 1903 et fait élever les deux ailes, les tourelles, le portique dentrée avec sa grille, son clocheton, les bâtiments de ferme et la salle de danse. On mène grande vie dans ce château jusquen 1924, où M. Norton coupe les vivres et met la propriété en vente. A cette époque, le château de l'Ile Blanche a lapparence quon lui connaît aujourdhui, avec ses 127 ouvertures, les dépendances, les bâtiments de ferme et son environnement dans une propriété de treize hectares. La congrégation des Filles du Saint-Esprit acquiert lIle Blanche en 1926, avec le projet dy établir une école pour jeunes filles désireuses dentrer dans la vie religieuse. Il fallut construire de nouveaux bâtiments à usage de salles de classes et de pensionnat, à larrière du château de l'Ile Blanche. Après la fermeture du juvénat, lIle Blanche devient maison daccueil en 1968.","architecture":"ILE-BLANCHE, le manoir fut construit en 1661. La pierre de construction, un schiste calcaire de couleur vert-bleue, dite \"pierre de Locquirec\" donne un charme tout particulier à ce manoir. Ce nest quau début du XXe siècle que le manoir devient château. L'édifice fut remanié à la demande de son épouse, éprise de luxe et de fêtes somptueuses. Durant 4 ans, les 2 ailes, les tourelles et la tour carrée de l'horloge, la salle des fêtes, le portique d'entrée et son clocheton furent réalisés. En 1926, las de ces prodigalités, son époux mit le manoir de l'Ile Blanche en vente. Il fut acquis par la Congrégation des Filles du Saint-Esprit du Diocèse de Saint-Brieuc qui, aujourdhui, anime le domaine. Le château de lÎle-Blanche se trouve en bordure de la route de la corniche joignant Locquirec à Saint-Efflam. Sa direction est indiquée sur la gauche, juste avant le pont, sur le Douron, en face de la rue de Toul an Héry.","habitants":"Richard de La Haye et à la  famille Guezenne\r\n        \"","divers":"GPS : 48° 40' 21,56\" Nord, 3° 38' 28,32\" Ouest","gps":"48° 40' 21,56\" Nord, 3° 38' 28,32\" Ouest","images":["../../jctruffet.com/image/image_29/29_%c3%8ele_Blanche_1.jpg","../../jctruffet.com/image/image_29/29_%c3%8ele_Blanche_2.jpg","../../jctruffet.com/image/image_29/29_%c3%8ele_Blanche_3.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','29 — Finistère'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
</script></body></html>
