"type":"Château","periode":"Xix","histoire":"A Douarnenez, le château de Kerena, de Vallonbreuse et le château de Tristan sur l'Ile.                                     KERANA Petit château construit dan un parc au cours de la deuxième moitié du XIXe siècle. Il appartient à M. Victor Belbéoch au début du XXe siècle. Édifice de plan massé symétrique ; élévation ordonnancée à 3 travées avec un avant-corps central saillant, de  plan symétrique  en élévation ordonnancée à trois travées avec un avant-corps central saillant.et sous-sol, rez-de-chaussée surélevé, un étage carré, étage de comble, couverture en ardoise.                                                                         ÎleTRISTAN   le château de l'île Tristan et l'ancienne défense du port vers 1900  Dans la rade du Guet, au large de Douarnenez, la petite île Tristan, au nom évocateur de célèbres légendes, est un lieu enchanteur aux multiples visages. A 300 mètres des rivages de Douarnenez, la petite île Tristan (450 m de long par 250 m de large) présente une multitude d'aspects : côtes rocheuses, falaises, prairies, vergers, bois, jardins, autant de paysages et de milieux qui font son attrait mais aussi sa vulnérabilité. L'île est accessible mais en visite accompagnée.","architecture":"VALLOMBREUSE;  cet établissement datant du XIXe siècle, situé dans un parc arboré, se trouve 2 minutes à pied de la plage au centre du pittoresque village portuaire de Douarnenez. Transformée en hôtel.","habitants":"M. Victor Belbéoch\r\n        \"","divers":"A Douarnenez; ïle  de Tristan avec fort Napoléon grav 1-2-3-4   Kérana grav 5-6-7  Vallombreuse grav 8","gps":"","images":["../../jctruffet.com/image/image_29/29_Douarnenez_1.jpg","../../jctruffet.com/image/image_29/29_Douarnenez_2.jpg","../../jctruffet.com/image/image_29/29_Douarnenez_3.jpg","../../jctruffet.com/image/image_29/29_Douarnenez_4.jpg","../../jctruffet.com/image/image_29/29_Douarnenez_5.jpg","../../jctruffet.com/image/image_29/29_Douarnenez_6.jpg","../../jctruffet.com/image/image_29/29_Douarnenez_7.jpg","../../jctruffet.com/image/image_29/29_Douarnenez_8.jpg"]},"Consult_chateau_formulaire80aa":{"id":"Consult_chateau_formulaire80aa","dept":"29","canton":"Fouesnant","commune":"Ergué-Gabéric","nom":"Ergué_Gabéric","type":"Château","periode":"XIII","histoire":"Deux châteaux à Ergué-Gabéric; Lezergué et Pannarum.   LEZERGUE, le château a été bâti à lemplacement dun ancien manoir occupé par les familles Cabellic au XIIIe siècle et Coatanezre au XVe siècle, puis par Guy Autret, seigneur de Missirien vers 1630 et la famille La Marche au XVIIIe siècle. Le manoir a vu naître en 1729 le dernier évêque de Léon, Mgr François de la Marche, il est surnommé dans le diocèse \"Eskop ar patates\", pour y avoir répandu, en période de pénurie de vivres, la culture de la pomme de terre. Le château présente une façade en granit à deux étages, flanquée de deux pavillons couronnés par des frontons circulaires portant des écussons. A l'intérieur, escalier à deux voûtes plates. Certaines pièces laissent penser que l'édifice n'a jamais été achevé (absence d'enduits et de peintures, boiseries non traitées).\r\nÉléments protégés MH : le château en totalité : inscription par arrêté du 9 décembre 1929.","architecture":"PANNARUM, en 1585, le Manoir de Pennarun appartenait à la Famille Tourtenoutre, en alliance avec Jérôme de Toutenoutre, époux de Gilette Le Louët. Le Manoir de Pennarun date du XVIII siècle dans son état actuel, mais un manoir antérieur fut construit en 1661 comme en témoigne un linteau gravé situé au-dessus de la porte d'entrée. Une légende, Le trésor de Pennarun, le concerne : « Au Bourg donc, on parlait encore du seigneur de Pennarun, lequel avait mauvaise réputation. Le seigneur  son nom s'était perdu dans la nuit des temps mais son souvenir était resté vivace. S'agissait-il d'un seigneur en particulier, d'une lignée de seigneurs. On ne le savait plus. C'était \" le \" Seigneur de Pennarun. On disait qu'il était méchant, qu'il avait opprimé les paysans, qu'il pendait à Lenhesq ceux qui ne lui plaisaient pas. Il était si mauvais que la Justice Divine se devait de lui réserver un châtiment exemplaire ! Et c'est ainsi que l'on racontait toujours, vers 1950, que le seigneur de Pennarun était condamné à réapparaître, tous les ans, sous un chêne de l'ale Goz où il remuait éternellement l'or de son trésor enfoui. Cela, le dimanche des Rameaux, pendant la lecture particulièrement longue de l'Évangile de la Passion du Christ selon St Matthieu. La personne qui le trouverait et accepterait son or, le délivrerait de sa malédiction mais perdrait aussitôt son âme ! En ce temps-là, manquer la messe du dimanche était considéré comme un péché mortel.","habitants":"Lazergue; Famille de  Guy Autret,                            Pannarum; Famille Tourtenoutre\r\n        \"","divers":"Deux châteaux à Ergué-Gabéric; Lezergué grav 1-2 et Pannarum grav 3-4.                                                       Panarum GPS : 47° 59' 49\" Nord, 4° 01' 15\" Ouest","gps":"47° 59' 49\" Nord, 4° 01' 15\" Ouest","images":["../../jctruffet.com/image/image_29/29_Ergu%c3%a9_Gab%c3%a9ric_1.jpg","../../jctruffet.com/image/image_29/29_Ergu%c3%a9_Gab%c3%a9ric_2.jpg","../../jctruffet.com/image/image_29/29_Ergu%c3%a9_Gab%c3%a9ric_3.jpg","../../jctruffet.com/image/image_29/29_Ergu%c3%a9_Gab%c3%a9ric_4.jpg"]},"Consult_chateau_formulaire66a3":{"id":"Consult_chateau_formulaire66a3","dept":"29","canton":"Douarnenez","commune":"Esquibien_Audriène","nom":"Esquibien_Audriène","type":"Château","periode":"XVIII-XIX","histoire":"à Esquibien Suguensou, Locquéran et  Kéristum à Andriène ville voisine.                                                                                                                                  SUGUENSOU, pour sa construction, au milieu du XIXe siècle, on fit venir les pierres de Suguensou l'Ancien, probablement né au XIIIe siècle, qui pourrissait là, derrière, après une longue existence. Au début du XXe siècle, l'Amiral Alfred, qui parcourut les mers de Brest jusqu'au Tonkin, rajouta des coursives, offrit à chacun de ses fils une cabine et embellit le pont de quelques végétaux orientaux, c'était la belle époque, le temps des grands navires. Suguensou chambres d'hôtes","architecture":"KERISTUM, construit pour la famille de l'Écluse en 1877 (date portée); blasons ; un corps de bâtiment semble avoir été ajouté vers 1900 à l'est. Cet édifice témoigne de la prospérité de cette famille audiernaise dont le nom apparaît régulièrement dans les archives de la ville. Edifice de plan massé dissymétrique, de style néo-XVIIIe. Elévation ordonnancée en maçonnerie enduite avec niveau de soubassement, un rez-de-chaussée surélevé, un étage carré et un étage de comble, encadrements de baies et chaînes d'angles en pierre de taille de granite. Toit brisé percé de lucarnes couvert en ardoise. Armoiries  de l'écluse.  propriété de la commune du Mans, qui le vend en 1955.","habitants":"Suguensou; Famille de l'Amiral Alfred\r\n        \"","divers":"à Esquibien Suguensou grav et  Kéristum grav 1-2-3-4-5 à Andriène ville voisine.                                                                            gps  48° 01' 33\" nord, 4° 33' 41\" ouest","gps":"","images":["../../jctruffet.com/image/image_29/29_Esquibien_Audri%c3%a8ne_1.jpg","../../jctruffet.com/image/image_29/29_Esquibien_Audri%c3%a8ne_2.jpg","../../jctruffet.com/image/image_29/29_Esquibien_Audri%c3%a8ne_3.jpg","../../jctruffet.com/image/image_29/29_Esquibien_Audri%c3%a8ne_4.jpg","../../jctruffet.com/image/image_29/29_Esquibien_Audri%c3%a8ne_5.jpg","../../jctruffet.com/image/image_29/29_Esquibien_Audri%c3%a8ne_6.jpg","../../jctruffet.com/image/image_29/29_Esquibien_Audri%c3%a8ne_7.jpg"]},"Consult_chateau_formulaireb1aa":{"id":"Consult_chateau_formulaireb1aa","dept":"29","canton":"Fouesnant","commune":"Fouesnant","nom":"Fouesnant","type":"Château","periode":"XIV-XVIII-XIX","histoire":"Six châteaux à Fouesnant; Bot-Conan, Mesmeur et Lespont, Penfoulic à cinq Km au nord Est à la Forêt de Fouesnant et  Stang.                                                                     BOT-CONAN, ou Coat-Conan était au XVIe siècle, propriété du domaine de Penfoulic, est construit en 1899 par l'architecte Paul Lagrave. Il appartient au docteur Guyon au début du XXe siècle , médecin du Tsar de Russie, qui acquit le domaine de Bot-Conan et y construisit le château que nous connaissons actuellement. Puis c'est la famille Polaillon qui habite le château de Bot Conan hérité du docteur Guyon. En 1942, la demeure est occupée par les allemands et réquisitionnent une partie des écuries pour abriter leurs chevaux et se servent largement du fourrage. Bâtiment de plan irrégulier en L comportant un important pavillon saillant sur l'angle et un pavillon à l'une des extrémités du corps de logis principal. Maçonnerie enduite avec encadrements de baies, chaînes d'angle, corniche et lucarnes en pierre de taille de granite. Toit mansardé.\r\nSTANG Le manoir, transmis d'une génération à l'autre depuis plus de deux siècles, est un manoir du XV du XVI et XVIII siècle                                                                          PENFOULIC manoir du XIXe siècle, édifié près dun ancien manoir du XVIIe siècle.","architecture":"MESMEUR, situé sur la rive gauche de la ria de La Forêt-Fouesnant, c'est une demeure de style classique qui date de la seconde moitié du XVIIIe siècle appartint longtemps à la famille de Sylguy (noblesse quimpéroise). L'édifice est composé d'un corps de logis central encadré de deux ailes en légère saillie, surmontées chacune d'un fronton triangulaire. Ce manoir est désormais le siège du club-house du \"Golf de Cornouaille\", qui dispose d'un parcours de 18 trous.                                                                                          LESPONT, vestiges,  a tradition rapporte que Lespont aurait appartenu aux Templiers, mais aucun document authentique ne confirme cette croyance. En 1426, on le trouve aux mains de Jehan an Digloerec. A la Réformation de 1536, c'est toujours un Digwerec, Chistophe, qui possède Lespont, et en 1562, il avait passé au sieur de Keroulin. En 1671, Monsieur Kerret de Coatluz, époux de Marguerite Carentine de Laize de Landebec, se qualifie seigneur de Lespont et laisse la propriété à sa fille Julienne, mariée en 1685 à noble homme Isaac Froment, sieur de Mouchy le Vicomte. La demeure était habitée en 1674 par messire Guillaume Antoine le Lagadec de Mezedern chevalier de Saint Louis, gouverneur des ville et château de Concarneau. Le château de Lespont présente des ruines grandioses, par ce qui en reste on peut juger qu'il était un chef-lieu d'une très importante seigneurie, il appartient à M. Buzaré.                                                            STANG de plan en équerre avec tour polygonale au centre  à quatre niveaux lucarnes sur toit en croupe, corps de logis principal à deux niveaux sur soubassement et série de lucarnes  au Troisième niveaux et une autre série de lucarnes sur comble ,Tour à quatre niveaux dans la partie centrale et transversale, dépassant l'ensemble, deuxième corps de logis en retour d'équerre à deux niveaux huit travées et de trois lucarnes réparties sur comble avec tour carrée à l'extrémité en retour d'équerre.","habitants":"Bot-Conan; Famille Polaillon                                  Mesmeur; Famille de Sylguy                                                     Lespont;  Monsieur Kerret de Coatluz                                            Stang; La famille Hubert\r\n        \r\n        \"","divers":"Cinq châteaux à Fouesnant; Bot-Conan grav-6-7 et Lespont grav-5 Penfoulic grav 9.   et Mesmeur grav-8  et stang grav 1-2-3-4","gps":"","images":["../../jctruffet.com/image/image_29/29_Fouesnant_1.jpg","../../jctruffet.com/image/image_29/29_Fouesnant_2.jpg","../../jctruffet.com/image/image_29/29_Fouesnant_3.jpg","../../jctruffet.com/image/image_29/29_Fouesnant_4.jpg","../../jctruffet.com/image/image_29/29_Fouesnant_5.jpg","../../jctruffet.com/image/image_29/29_Fouesnant_6.jpg","../../jctruffet.com/image/image_29/29_Fouesnant_7.jpg","../../jctruffet.com/image/image_29/29_Fouesnant_8.jpg","../../jctruffet.com/image/image_29/29_Fouesnant_9.jpg"]},"Consult_chateau_formulaire0699":{"id":"Consult_chateau_formulaire0699","dept":"29","canton":"Plouigneau","commune":"Garlan","nom":"Garlan","type":"Château","periode":"XV-XVI-XIX","histoire":"Trois châteaux à Garlan ; Bois de la Roche , Kervezec  et Kervolongar.                                                                                                                                  BOIS de la ROCHE, ancien domaine seigneurial dont les origines datent de la fin du Moyen-Age. La Réformation de 1427  l'attribuait au seigneur de Lescouloarn Eon Foucault, capitaine de Concarneau en 1413, et chevalier en 1420 dans l'armée levée contre les Penthièvres comté des Côtes d'Armor. Sur sa façade Est, le château du Bois de la Roche s'ouvre sur une cour bordée de bâtiments annexe et comprend en son centre un puits imposant. La façade opposée s'ouvre sur un parc où, le long d'une allée principale, se mêlent harmonieusement arbres fruitiers, arbustes fleuris et arbres séculaires. Le domaine abrita au fur et à mesure des siècles plusieurs familles nobles. Les premiers seigneurs furent les Foucault jusqu'au XVIe siècle. Puis le Général Maxime Weygand dont l'épouse était une Forsanz, il y fit construire un immense hall d'honneur avec un escalier monumental. Depuis 2004, le château appartient à la famille Braun originaire de l'Est de la France. Jean-Charles va s'attacher à lui redonner sa composition et ses dimensions originelles. Aujourd'hui, il est soucieux de rendre ses lettres de noblesse à cette propriété qui figure parmi les plus belles de la région, tant au plan architectural qu'au plan de la charge historique.","architecture":"KERVEZEC, l'origine du manoir de Kervézec est très obscur : on ne retrouve aucune mention de terre noble à cet endroit dans les réformations de 1481 et 1535. La première mention n'apparaît qu'en 1665 à l'occasion de la bénédiction de la cloche de la chapelle, le premier propriétaire connu est François Rolland, riche marchand de Morlaix, en 1667. Le manoir a cependant été construit au XVIe siècle (est daté 1568) et présente des caractéristiques de la demeure noble, malgré les modifications subies au XIXe siècle. Il a en effet été très modifié par Pol de Courcy, l'auteur de l'armorial de Bretagne, entre 1877 et 1879. Le bâtiment prolongeant vers le nord-est le portail d'entrée à mâchicoulis a été détruit, et le manoir s'est étendu vers le sud par la création de deux bâtiments parallèles terminés par une cour. L'intérieur a conservé son décor du XIXe siècle.Éléments protégés MH : les façades et les toitures du logis, et la chapelle : inscription par arrêté du 19 avril 1990.                                                                                                          KERVOLONGAR, le château de Kervaulongar, construit sous Louis XV, semble avoir été agrandi et restauré autour de 1900, le corps de logis principal a été transformé par le percement de baies et de lucarnes, et de l'adjonction de deux pavillons sur la façade principale (aménagement d'un hall et d'un escalier), d'une aile en retour d'équerre à l'une des extrémités. La propriété possède également un beau parc avec un jardin potager (inscrit au pré-inventaire jardins remarquables).","habitants":"Bois; Famille de Foucault                                                                   Kervezec;  Famille de François Rolland\r\n        \r\n        \"","divers":"Trois châteaux à Garlan ; Bois de la Roche grav 1 à 4 , Kervezec grav 5 à 7  et Kervolongar grav-8.                                      Bois-Roche GPS : 48° 36' 07\" Nord, 3° 45' 21\" Ouest                                       Kervezec GPS : 48° 36' 07\" Nord, 3° 45' 21\" Ouest","gps":"48° 36' 07\" Nord, 3° 45' 21\" Ouest","images":["../../jctruffet.com/image/image_29/29_Garlan_1.jpg","../../jctruffet.com/image/image_29/29_Garlan_2.jpg","../../jctruffet.com/image/image_29/29_Garlan_3.jpg","../../jctruffet.com/image/image_29/29_Garlan_4.jpg","../../jctruffet.com/image/image_29/29_Garlan_5.jpg","../../jctruffet.com/image/image_29/29_Garlan_6.jpg","../../jctruffet.com/image/image_29/29_Garlan_7.jpg","../../jctruffet.com/image/image_29/29_Garlan_8.jpg"]},"Consult_chateau_formulairef888":{"id":"Consult_chateau_formulairef888","dept":"29","canton":"Fouesnant","commune":"Gouesnach","nom":"Gouesnach","type":"Château","periode":"XVIII-XIX","histoire":"Deux châteaux à Gouesnac'h  Boutiguery et Penfrat.  \r\nBOUTIGUERY, vers le milieu du XVIIIe siècle, la terre de Botiguery est une dépendance de la seigneurie de Bodinio, sise à Clohars Fouesnant. Par le jeu des alliances matrimoniales, l'édifice appartiendra au puissant marquis du Bordage, au marquis de Cheffontaine et à l'épouse du maréchal François de Coligny dont le petit fils le cède, le 5 octobre 1770, au sieur Tanguy Yvonnet du Run. Le domaine passe à Guillaume le Berre, meunier au moulin de l'évèché à Quimper. En 1841, Carl de Kernet rachète la propriété. Il construit d'abord des écuries en utilisant des briques produites par la briqueterie du domaine, il détruit le manoir et projette la construction d'un château au point le plus élevé du parc. Mais il meurt en 1887, à l'age de 45 ans, laissant la propriété à sa sur Hermine. Celle-ci la donne à son fils Georges de la Sablière lequel n'aura guère le temps de réaliser la demeure prévue par son oncle. A cette époque un avant projet de parc à l'anglaise y avait vu le jour. Christian de la Sablière, l'actuel propriétaire, vit à Boutiguéry depuis sa naissance. L'arrière-petit-neveu de Carl de Kerret s'attèle depuis plus de 40 ans à créer un parc floral et arboré.","architecture":"PENFRAT, château servant de relais de chasse construit en 1859 par Joseph Bigot pour M. de Cambourg, l'édifice a été agrandi successivement par la construction de l'aile gauche en 1895, puis de l'aile droite en 1936. Bâtiment de style Néo-Louis XIII, de plan en H ; le corps central à cinq travées est accosté de deux pavillons surélevés d'un étage. Maçonnerie de moellon avec encadrements de baies, chaînes d'angle, bandeaux horizontaux, corniche et lucarnes en pierre de taille. Ecuries de style rationaliste, maçonnerie enduite, encadrements de baies en brique et granite. Aujourdhui le château de Penfrat sétend sur 100 ha de bois et de prés le long dune anse de lOdet. Découvrez les Ecuries   de  Penfrat et profitez des moments magiques! Situées dans un cadre agréable (dans les bois du château de Penfrat) ces écuries ont de quoi satisfaire vos attentes.  Location chambres d'hôtes.","habitants":"Boutiquery; maréchal François de Coligny                                  Penfrat; M. de Cambourg\r\n        \r\n        \r\n        \r\n        \"","divers":"Deux châteaux à Gouesnac'h  Boutiguery grav 1-2-3 et Penfrat grav-4.                                                                           Boutigory et Penfrat GPS : 47° 54' 41\" Nord, 4° 06' 49\" Ouest","gps":"47° 54' 41\" Nord, 4° 06' 49\" Ouest","images":["../../jctruffet.com/image/image_29/29_Gouesnach_1.jpg","../../jctruffet.com/image/image_29/29_Gouesnach_2.jpg","../../jctruffet.com/image/image_29/29_Gouesnach_3.jpg","../../jctruffet.com/image/image_29/29_Gouesnach_4.jpg"]},"Consult_chateau_formulaire1b88-3":{"id":"Consult_chateau_formulaire1b88-3","dept":"29","canton":"Brest","commune":"Gouesnou","nom":"Gouesnou","type":"Vestiges. Château","periode":"XIII-XVII","histoire":"Deux châteaux à Gouesnou: Bois et Meslean.  à Cinq KM au nord à Plabennec le château de Leuhan.                                                              BOIS, le premier propriétaire et probablement créateur de l'édifice, serait un sieur du Bois qui y vivait au début du XVe siècle, Henri était seigneur du Bois en 1426. Les terres furent transmises à la famille Denis qui les posséda jusquà la fin du XVIIe siècle, la dernière du nom épousa en 1589 Samuel Guillaume de Sansay. Cette propriété se composait d'un manoir consistant en un grand corps de logis et une aile en bout. Par autorisation du duc de Bretagne, un colombier fut bâti en 1535. Lensemble fut vendu en 1768 à Jean François Gillard de lArchantel qui entreprit de nombreuses transformations. A sa mort le domaine fut acheté par une famille d'armateurs originaire de Saint-Malo, les Desperles, et par voie de succession aux Bigot de la Robillardière puis aux Boelle. La dernière de cette famille Boelle, Gabrielle, épousa Henri Gillard de Keranflech. Leur fille Anne épousa en1903, Guy Le Beschu de Champsavin, ils y résidèrent jusquen 1970. A cette date, la propriété a été acquise par la Caisse dépargne de Brest pour en faire une maison de retraite, mais le projet fut abandonné de même que l'édifice.  Celui-ci se dégrada rapidement, mais en 1976 le château fut racheté et restauré par les propriétaires actuels.                                                                 LEUHAN à  Plabennec        Le château de Leuhan a été construit de 1882 à 1884 par John Burnett Stears et son épouse Béatrice de Trobriand qui créent un domaine et entourent le château d'un très beau parc.","architecture":"MESLEAN  vestiges, situé à 1,5 Km du bourg de Gouesnou et à 3 km de Brest, le château de Mesléan se trouve pratiquement inclus dans une zone d'urbanisation qui couvre les deux communes de Brest et de Gouesnou. Sa proximité de Brest et son éventuelle mise en valeur pourraient en faire un pôle attractif intéressant pour cette région en pleine expansion. Du château, il ne reste d'intéressant que les ruines de la façade d'entrée et des tours, les courtines semblent avoir été couvertes d'une charpente et d'une couverture en ardoises dont il ne reste pratiquement plus rien. La courtine située au-dessus de l'entrée est couverte par des dalles de granit et percée de fenêtres et meurtrières sur ses deux faces. Seule la face externe possède des mâchicoulis. L'escalier de la tour d'angle est un escalier circulaire en granit sur pivot central, l'intérêt de ce château est de montrer une façade médiévale comportant un système de défense assez exceptionnel qui en fait une véritable petite place forte. Éléments protégés MH : le château de Mesléan (ruines) : inscription par arrêté du 16 avril 1975.                                                                                                                          LEUHAN   à  Plabennec, demeure de style néo-gothique, de plan massé; une tour rectangulaire couverte en pavillon et en légère saillie sur la façade principale accoste le corps de logis. Loggia au décor néo-gothique sur la façade arrière, étage de soubassement à bossages irréguliers, élévation de moellon enduit avec encadrements de baies, bandeaux horizontaux, corniche et lucarnes en pierre de taille.","habitants":"Bois; Famille de Jean François Gillard de lArchantel                          Meslan; seigneur de l'époque                                                   Luhan; Famille de  John Burnett Stears \r\n        \"","divers":"Deux châteaux à Guesnou: Bois grav-1 et Meslean grav-2.                     Bois GPS : 48° 27' 16\" Nord, 4° 27' 48\" Ouest                                                          Lehan grav 3-4-5gps 48°30'36.5\"N 4°22'53.5\"W","gps":"48° 27' 16\" Nord, 4° 27' 48\" Ouest","images":["../../jctruffet.com/image/image_29/29_Gouesnou_1.jpg","../../jctruffet.com/image/image_29/29_Gouesnou_2.jpg","../../jctruffet.com/image/image_29/29_Gouesnou_3.jpg","../../jctruffet.com/image/image_29/29_Gouesnou_4.jpg","../../jctruffet.com/image/image_29/29_Gouesnou_5.jpg"]},"Consult_chateau_formulaire34d4":{"id":"Consult_chateau_formulaire34d4","dept":"29","canton":"Landivisiau","commune":"Guiclan","nom":"Guiclan_St_Jacques","type":"Château","periode":"XV-XVI","histoire":"ST-JACQUES, le domaine a appartenu à la famille le Sénéchal, aux XVe et XVIe siècles. De cette période subsiste un petit bâtiment en pierre, dont les baies sont surmontées d'arcs en accolade. À la fin du XVIIe siècle, la puissante famille noble de Kerouartz hérite de l'ensemble des biens et fait construire un nouveau manoir Les armes des Kerouartz dont l'origine remonte au temps des croisades y sont gravées. En 1870, un troisième château est élevé à l'initiative d'Albert de Kerouartz, capitaine de frégate à l'état major du ministère de la Marine. À la mort du comte en 1893, sa fille, soeur Marie Caroline, hérite du domaine et en fait don aux missionnaires d'Haïti, propriété du centre missionnaire, maison de retraite.","architecture":"ST-JACQUES, formé de deux corps de logis en équerre et ornés de belles lucarnes surmontées de frontons cintrés ou triangulaires. L'orangerie et son haut toit à forte inclinaison datent de cette époque. construit, l'année suivante  en 1894 , une aile jouxtant le château pour accueillir et former de futurs missionnaires. C'est aujourd'hui le centre missionnaire Saint Jacques. Des constructions modernes, situées au nord-est, abritent une maison de retraite. Dans le parc, la chapelle Saint-Jacques de style néo-gothique construite en 1869.","habitants":"Famille Le Sénéchal\r\n        \"","divers":"A Guiclan le château saint-Jacques","gps":"","images":["../../jctruffet.com/image/image_29/29_Guiclan_St_Jacques_1.jpg","../../jctruffet.com/image/image_29/29_Guiclan_St_Jacques_2.jpg"]},"Consult_chateau_formulaire4af5":{"id":"Consult_chateau_formulaire4af5","dept":"29","canton":"Plonéour-Lanvern","commune":"Landudec.","nom":"GuilguIffin","type":"Château","periode":"XV-XVIII","histoire":"GUILGUIFFIN, la famille de Guilguiffin s'éteint au début du XIVe siècle.  Au XVe siècle le domaine échoit  à la famille de Tyvarlen, en 1585  Anne leur fille apporte Guilguiffin à son époux  Jean de Ploeuc seigneur de Breignou. Au XVe siècle, le manoir de Tyvarlen en Landudec semble avoir été dépouillé de ses pierres pour servir à lédification de la bâtisse de Nicolas-Louis de Ploeuc, en 1750 Larchitecte Nicolas Pochic est originaire de Pont-Croix.   Nicolas Pochic est considéré comme entrepreneur et maître des ouvrages au château du Guilguiffin en Landudec. en 1843 le château passe par alliance à la famille Saint-Luc toujours par alliance à la famille Foy et après 40 ans d'abandon passe en 1965 à monsieur Philippe Davy.","architecture":"GUILGUIFFIN,  dès le début de 1750, la démolition du manoir familial est bien avancée. Les pierres sont ensuite retaillées et servent à l'édification de la nouvelle maison. grande bâtisse avec deux pavillons faisant saillies aux extrémités, les communs édifiés parallèlement au château ferment une cour à l'arrière, comporte une façade sud (corps de logis central et deux pavillons en saillie d'environ soixante mètres), sobre, classique, avec peu de décorations : un léger bossage et une corniche à modillons. Une grande symétrie est à noter dans les fenêtres disposées sous un arc bombé. Le toit est à long pan et est orné de lucarnes et de cheminées. La façade nord reprend une disposition quasiment identique à la façade sud. Sajoute deux éléments : des tourelles accolées aux pavillons et un pavillon en saillie dû à lescalier hors-uvre. Lintérieur est composé dun rez-de-chaussée, avec pour le corps central : vestibule dallé de granite plus escalier en fer forgé,  Entre les pavillons et le corps central est disposé deux escaliers de dégagements. Le premier étage : le corps de logis central est divisé en blocs compacts indépendants les uns des autres.  Pour entrer dans les différents appartements, il faut passer par le couloir au nord. Les pavillons Ouest et Est comporte trois pièces, apparemment destinés à la chambre et ses services. La cour dhonneur encadre parfaitement lédifice, avec un carré denviron soixante mètres de côté. Elle est composée dun muret exécuté en moellons, et est en petit appareil irrégulier pseudo isodome. Sur le muret est disposé des piliers en granite, couronné par une décoration interprétée comme des pots à feu.   Colombier de l'ancien manoir, attesté au XVIe siècle. Le 20 août 1749.","habitants":"Famille de Tyvarlen\r\n        \r\n        \"","divers":"Guilguiffin GPS : 48° 00' 00\" Nord, 4° 20' 00\" Ouest","gps":"48° 00' 00\" Nord, 4° 20' 00\" Ouest","images":["../../jctruffet.com/image/image_29/29_Guilguiffin_1.jpg","../../jctruffet.com/image/image_29/29_Guilguiffin_2.jpg","../../jctruffet.com/image/image_29/29_Guilguiffin_3.jpg","../../jctruffet.com/image/image_29/29_Guilguiffin_4.jpg"]},"Consult_chateau_formulaire1539":{"id":"Consult_chateau_formulaire1539","dept":"29","canton":"Pont-l","commune":"Guilvinec-Penmarc","nom":"Gulvinec","type":"Château","periode":"XVIXIX","histoire":"Deux châteaux dans cet article Goeland et Kergoz , à trois Km de distance.                                                                                                    GOELANDS, construit en 1888, vient d'être mise en vente sur le site Agorastore, par son actuel propriétaire la ville de Courbevoie. Avec sa vue sur mer inégalable, cette propriété a été érigée par un médecin niçois fortuné, Gustave Salavy. Revendue plusieurs fois, la demeure devint un hôtel en 1900, avant d'être acquise par Paul Lederlin, un industriel du textile, dans les Vosges, sénateur des Vosges puis sénateur de la Corse, sous la IIIe République, qui en fit sa résidence de loisirs, puis par la famille Friant, propriétaire de la Biscuiterie des Filets Bleus (première biscuiterie industrielle de Bretagne, en 1950). Depuis son acquisition par la ville de Courbevoie en 1956, la villa était devenue un centre de vacances. Aussi appelée \" Maner ar Parizian \", la propriété est composée d'un bâtiment principal dit le \" Château \" de 867 m² (qui comporte des bureaux, des sanitaires, des chambres, une salle polyvalente et des caves, d'un bâtiment annexe de 1.344 m² destiné à l'hébergement et aux activités (dortoirs, sanitaires, salles de classe et activités, cuisine, réfectoire, infirmerie), et d'un bâtiment servant de locaux techniques et atelier de 161 m². L'ensemble dispose d'un terrain de 13500 m² non constructible.                                                                                  le LESTREDIAGAT à Tréffiagat du XVIIe siècle, manoir remplace un édifice plus ancien ; la tour date du XIVe siècle.","architecture":"KERGOZ, avant la Révolution de 1789, lancienne  seigneurie  de Kergoz  en  Plomeur, avec son  manoir   fortifié, sa gentilhommière, son colombier    où    nichaient des  centaines  de  pigeons, son  moulin  à  vent  et  la maison  du  meunier, ses fontaines et ses lavoirs, ses marais salants, ses terres chaudes à céréales et ses  prairies  de  Traon  Ar  Maner  représentant  480  journaux,soit  plus  de  235  hectares daujourdhui, répartis de Men Meur à Pouliguéner et de Lostendro à Kerlan autour des chaumières  de  ses  paysans,  exploitées  sous  le  régime  du  domaine  congéable,  tout  cela appartenait au dernier noble dAr Gelveneg, le Comte de Derval, qui vivait plutôt dans son hôtel de Quimper. Propriété de la famille de Derval, le manoir de Kergoz est une vaste demeure seigneuriale qui appartient désormais à la municipalité du Guilvinec. Cette demeure a conservé son haut pigeonnier daté du XVIe siècle. Ce pigeonnier fut installé au-dessus du porche d'entrée de la vaste enceinte ponctuée de deux tours couronnées de créneaux. De belles fenêtres de style Renaissance ornent les murs. Une des tours d'enceinte a été restaurée. Inscription par arrêté du 11 mai 1932. A  cette  date,  Kergoz  était  cité  comme maison noble à Plomeur.Le mur denceinte des remparts en pierres taillées de granite local a près dun mètre de large. Assez pour inclure côté sud une niche que la légende a prise pour un  souterrain  qui  devait  rejoindre  le  tumulus  néolithique  de  Poulguen,  par-dessous létang de  Saint-Trémeur.  Disons  tout  de  suite  que  cela est  absurde.  Mais  la  tendance  actuelle  des conteurs nest-elle pas de rechercher des faits magiques ou mystérieux en histoire.","habitants":"Goelands; Famille de  Gustave Salavy,                                       Kergoz ; Famille de Derval\r\n        \"","divers":"Deux châteaux dans cet article Goelands grav-1 et Kergoz grav 2_3_4_5 , à trois Km de distance.                                                   Goelands à Penmach GPS : 47° 48' 46\" Nord, 4° 20' 12\" Ouest                   Lestrédiagat à Tréffiagat grav 6","gps":"47° 48' 46\" Nord, 4° 20' 12\" Ouest                   Lestréd","images":["../../jctruffet.com/image/image_29/29_Guilvinec_1.jpg","../../jctruffet.com/image/image_29/29_Guilvinec_2.jpg","../../jctruffet.com/image/image_29/29_Guilvinec_3.jpg","../../jctruffet.com/image/image_29/29_Guilvinec_4.jpg","../../jctruffet.com/image/image_29/29_Guilvinec_5.jpg","../../jctruffet.com/image/image_29/29_Guilvinec_6.jpg"]},"Consult_chateau_formulaire0975":{"id":"Consult_chateau_formulaire0975","dept":"29","canton":"Plonéour-Lanvern","commune":"Plogastel-Saint-Germain","nom":"Hilguy","type":"Château","periode":"XVII","histoire":"HILGUY, les seigneurs du Hilguy tenaient leur fief sous celui de Quéménet, et rendaient aveu au marquis de Pont Croix. Le Hilguy passa par alliance au XVIe siècle, successivement aux familles de Lezongar de Pratanras, du Quélennec, et de Visdelou en 1592. Au XVIIIe siècle, la dame du Hilguy était Marie Françoise de Visdelou. Elle épousa le comte Du Guay, Lieutenant Général des armées navales en 1757 et Commandant de la Marine de Brest, en 1759. Au XVIIIe siècle, Marie-Anne de Visdelou épouse Louis Enguilbert, comte de La Marck et du Saint-Empire, il est l'héritier d'un comté d'outre-Rhin ; leur fille épouse l'héritier d'un petit duché, et en 1854, date à laquelle la dernière descendante Élisabeth, dite Sissi, fille du duc de Bavière, épouse François-Joseph, Ier empereur d'Autriche. Actuellement Hilguy est devenu la propriété dune compagnie dassurances anglaise. Le corps principal est reconstruit au XIXe siècle, du XVIIe siècle restent les communs et l'entrée avec son porche monumental. Éléments protégés MH .","architecture":"HILGUY, porte d'entrée : inscription par arrêté du 2 décembre 1926\r\nLe château est précédé d'une porte monumentale décorée du XVIIe siècle, encadrée de murs qui rejoignent de chaque côté un pavillon décoré d'arcatures, le château du Hilguy du XVIIe siècle, XIXe siècle et XXe siècle: depuis 1987 le domaine du Hilguy est la propriété d'une société de vacances anglaise : \"The Holiday Property Bond\"46 Le château est inscrit aux Monuments historiques.","habitants":"Famille de Lezongar de Pratanras\r\n        \"","divers":"Hilguy GPS : 47° 49' 52,97\" Nord, 3° 45' 18,65\" Ouest","gps":"47° 49' 52,97\" Nord, 3° 45' 18,65\" Ouest","images":["../../jctruffet.com/image/image_29/29_Hilguy_1.jpg","../../jctruffet.com/image/image_29/29_Hilguy_2.jpg","../../jctruffet.com/image/image_29/29_Hilguy_3.jpg","../../jctruffet.com/image/image_29/29_Hilguy_4.jpg","../../jctruffet.com/image/image_29/29_Hilguy_5.jpg"]},"Consult_chateau_formulaire21ed":{"id":"Consult_chateau_formulaire21ed","dept":"29","canton":"Pont-de-Buis-lès-Quimerc","commune":"Loperhet","nom":"Keranchoat","type":"Manoir","periode":"XV-XVIII","histoire":"KERANC'HOAT,  vestiges d'un manoir datant XVe siècle. La terre fut Propriété successive des familles Keranhoat au XIIIe siècle, Rosnyvinen et Coetmenech au XIVe-XVIe siècle.le manoir du XVIe au XVIIIe siècle fut la résidence des du Louët et leurs descendants.  la famille de  du Harlay, de Montmorency, puis Goubin de Kerdaniel.","architecture":"KERANC'HOAT, château  construit dans les années 1840. Bâtiment de style néo-classique. Maçonnerie enduite avec encadrements de baies et chaînes d'angle en pierre de taille. Rez-de-chaussée surélevé, un étage carré et étage de comble, perron à deux volées convergentes. Très beau portail d'entrée datant du XVe siècle. le manoir tel qu'il existait jusqu'au XIXe siècle, avant les démolitions et incendies de 1850, 1912 et 1965 - était un manoir datant (dans sa majeure partie) des XVIeXVIIe siècles,  soit qu'il ait été construit par les du Louët, soit qu'il fut le résultat d'une restauration, après démolition partielle de l'ancien manoir des Rosnyvinen, et aussi de restaurations ou transformations successives au cours des ans. Puis il fut démoli vers 1850 (par Cyriaque Goubin), pour être entièrement reconstruit. Mais il fut sinistré lors d'un incendie en 1912. C'est alors qu'a été reconstruite, à sa place, une grande maison rectangulaire qui était le château jusqu'en 1965, qui encore une fois était la proie des flammes. Cette fois-ci s'étaient les derniers bâtiments de l'ancien manoir qui furent ravagés par l'incendie. Le propriétaire renonça à restaurer le bâtiment et, en 1968, il mit en vente les pierres.","habitants":"Famille Keranhoat\r\n        \r\n        \r\n        \"","divers":"Château de Keranc'hoat à Loperhet","gps":"","images":["../../jctruffet.com/image/image_29/29_Keranchoat_1.jpg","../../jctruffet.com/image/image_29/29_Keranchoat_2.jpg","../../jctruffet.com/image/image_29/29_Keranchoat_3.jpg","../../jctruffet.com/image/image_29/29_Keranchoat_4.jpg"]},"Consult_chateau_formulaire15d6-2":{"id":"Consult_chateau_formulaire15d6-2","dept":"29","canton":"Quimper","commune":"Melgven","nom":"Keranevel","type":"Château","periode":"XIX","histoire":"KERANEVEL,1426, Guillaume de Goarlot, seigneur originaire de Kernével, érige la seigneurie de Keranével à Melgven. Entre 1840 et 1994, le château de Keranével est la propriété de la famille Harscouët de saint-George. Le château de Keranével réunit très largement la famille et les amis chaque été.Le samedi 20 mars 1976, l'unique héritière du domaine familial Ghislaine Harscouët de Saint-George épouse le Comte Robert de Monti de Rezé. Depuis 1951, le château de Keranével ouvre son domaine chaque été pour accueillir gracieusement des troupes scoutes provenant de toutes les régions françaises .  De 1985 à 2019,  reçoit régulièrement des associations caritatives, culturelles et sportives pour leur faire profiter gracieusement du site  : camps scouts, photos de mariage, soirées privées, défilés de voitures anciennes, méchouis, week-ends des Journées Européennes du Patrimoine.","architecture":"KERANEVEL, de 1885 à 1892, Alfred Legendre, architecte diocésain de la Ville de Nantes, édifie le nouveau château de Keranével en lieu et place du premier édifice, agrémenté de nouvelles dépendances (écurie, sellerie, garage à calèches, laiterie, étables, four à pain, forge) et autres annexes (maison de garde, potager, surplombant un vaste étang dans lequel il se reflète merveilleusement, le moulin de Keranével demeure le seul vestige subsistant du premier site historique du domaine . En 1844, le plan cadastral napoléonien situe les constructions dans le domaine.","habitants":"Famille Harscouët de Saint-George \r\n        \r\n        \"","divers":"A Melgen le château de Keranevel","gps":"","images":["../../jctruffet.com/image/image_29/29_Keranevel_1.jpg","../../jctruffet.com/image/image_29/29_Keranevel_2.jpg","../../jctruffet.com/image/image_29/29_Keranevel_3.jpg","../../jctruffet.com/image/image_29/29_Keranevel_4.jpg"]},"Consult_chateau_formulaire45d1":{"id":"Consult_chateau_formulaire45d1","dept":"29","canton":"Poudalmézeau","commune":"Plourin","nom":"Kerenneur","type":"Château","periode":"XIV_XV","histoire":"KERENNEUR, construit vers l'an 1400 par Hamon de Kergadiou, ce qui est devenu un manoir était à l'origine un simple poste de guet fortifié. La moitié gauche symbolise la famille de Kergadiou, la moitié droite la famille de Kerlec'h.  Au-dessus des fenêtres du premier étage, qui datent d'un remaniement vers 1540-1550, deux autres blasons marquent le mariage de Marie de Kergadiou, héritière du manoir, avec François de Kersauzon, seigneur de Penhoat. Le domaine passa plus tard aux Poulpry qui le gardèrent jusqu'à la Révolution. Il fut ensuite utilisé en tant que ferme. La famille des actuels propriétaires l'a acquis en 1889.","architecture":"KERENNEUR, mais c'est un autre blason que l'on remarque actuellement sur la façade sud du logis : il combine les armes des Kergadiou avec celles des Kerlec'h à l'occasion sans doute du mariage de Tanguy de Kergadiou avec Catherine de Kerlec'h du Chastel vers 1510    La belle cour du manoir est dite « à pavage bouleversé » car son sol, qui présente une planéité très approximative, est formé de grandes dalles posées de chant afin d'améliorer l'écoulement des eaux de pluie. Partout domine le granite rose de l'Aber Ildut, aussi bien dans les pierres des constructions que dans le dallage. Un puits rustique, encore en bon état, attire le regard au milieu de la cour. Au fond de l'ancien jardin clos s'élevait autrefois la chapelle. Il n'en reste rien aujourd'hui.","habitants":"Famille de Kergadiou\r\n        \r\n        \"","divers":"Château de Kerenneur","gps":"","images":["../../jctruffet.com/image/image_29/29_Kerenneur_1.jpg","../../jctruffet.com/image/image_29/29_Kerenneur_2.jpg","../../jctruffet.com/image/image_29/29_Kerenneur_3.jpg","../../jctruffet.com/image/image_29/29_Kerenneur_4.jpg"]},"Consult_chateau_formulaire6fdf":{"id":"Consult_chateau_formulaire6fdf","dept":"29","canton":"Moëlan-sur-Mer","commune":"Scaër","nom":"Kergoaler","type":"Château","periode":"XVIII","histoire":"KERGOALER, le château de Kergoaler ou de Kergoualec'h, fut construit pour Jean Corentin du Couëdic de Kergoaler. Agrandissement de style néo-médiéval, probablement au cours du deuxième quart du XIXe siècle, d'un logis construit en 1718. La chapelle est édifiée autour de 1840. Le corps de logis est de plan rectangulaire sur lequel se greffent deux tours circulaires crénelées raccordées par un corps de bâtiment. Il possède un rez de chaussée un étage carré et étage de comble couvert d'ardoise.","architecture":"KERGOALER, agrandissement de style néo-médiéval, probablement au cours du 2e quart du XIXe siècle, d'un logis construit en 1718 par Jean-Corentin du Couëdic de Kergoaler. Chapelle construite autour de 1840.\r\nCorps de logis de plan rectangulaire sur lequel se greffent deux tours circulaires crénelées raccordées par un corps de bâtiment. Chapelle de style néoclassique.","habitants":"Jean-Corentin du Couëdic de Kergoaler.\r\n        \"","divers":"A Scaer château de Kergoaler","gps":"","images":["../../jctruffet.com/image/image_29/29_Kergoaler_1.jpg","../../jctruffet.com/image/image_29/29_Kergoaler_2.jpg","../../jctruffet.com/image/image_29/29_Kergoaler_3.jpg","../../jctruffet.com/image/image_29/29_Kergoaler_4.jpg"]},"Consult_chateau_formulaire1977":{"id":"Consult_chateau_formulaire1977","dept":"29","canton":"Concarneau","commune":"Concarneau","nom":"Keriolet","type":"Palais","periode":"XV","histoire":"KERIOLET, en 1889 décès du  comte Charles de Chauveau dont le palais est né de l'imagination du comte Charles de Chauveau et de la princesse russe Zénaïde Narischkine  et en 1897 à la mort de la princesse le palais devient la propriété  du département du Finistère, en 1902 les voeux de la princesse ne sont pas exaucés,  vendent les terrains et cinquante ans plus tard bataille judiciaire qui attribue Kériolet à Félix  Youssoupov, arrière petit fils de la princesse,  l'indigne  héritier disperse le mobilier et les collections, achève de vendre les terres et Kériolet passe aux mains de différents propriétaires qui ont des divers projet, hôtel , centre de loisirs, hôpital, le château de Christophe Levêque est racheté à la fin des années 1980 en piteux état.","architecture":"KERIOLET, le château de Kériolet, remonte au XVe siècle, transformé au XIXe siècle.  Édifice néo-gothique dû à l'architecte, Bigot qui a réuni dans ce château un certain nombre de modèles empruntés à l'architecture civile gothique. Le corps de logis principal, en forme de L, est doté d'ouvrages annexes: le corps de garde à l'entrée du parc, la tour, la porte charretière et la porte piétonne fermant la cour d'honneur à l'ouest, le mur de soutènement créant douve au nord de cette cour. Les fenêtres de la salle des gardes sont ornées de vitraux sur certains figurent les rois de France. Le plafond est en chêne sculpté, censé reproduire celui de la salle capitulaire de Reims.","habitants":"Comte Charles de Chauveau\r\n        \"","divers":"le palais de Kériolet à Concarneau","gps":"","images":["../../jctruffet.com/image/image_29/29_Keriolet_1.jpg","../../jctruffet.com/image/image_29/29_Keriolet_2.jpg","../../jctruffet.com/image/image_29/29_Keriolet_3.jpg","../../jctruffet.com/image/image_29/29_Keriolet_4.jpg"]},"Consult_chateau_formulaire8ad0-2":{"id":"Consult_chateau_formulaire8ad0-2","dept":"29","canton":"Landivisiau","commune":"Saint-Vougay","nom":"Kerjean","type":"Château","periode":"XVI","histoire":"KERJEAN, à la fois château fort et symbole de la Renaissance en Bretagne, le château de Kerjean dévoile aux visiteurs une histoire très mouvementée qui façonne la personnalité du lieu. Achat des terres de Kerjean par Olivier Barbier, la construction du château actuel commence t vers 1545  à 1596. René Barbier obtient l'appellation de marquisat en 1617, dont sa femme, Marie de Parcevaux était dame d'honneur de la reine Anne d'Autriche. Incendie de l'aile droite  en partie détruite.  En 1755 passe par mariage au Coatanscour, Suzeanne de Coatanscour épousa Louis-François-Gilles de Kersauson qui prit le nom de sa femme,   qui relèvent le nom des Coatanscour périt à l'échafaud en 1794, vendu comme bien national   passe à  aux familles; les Brilhac, les Forsang et les Coëtgourreden, Il été en mauvais état lors de la visite de monsieur Flaubert en 1847 acquis par l'état en 1911.","architecture":"KERJEAN , construit en 1545 par Louis Barbier  sur un plan quadrangulaire, trois corps de bâtiment l'édifice s'organise autour d'une cour  carrée bordée  d'un corps de logis aux combles  chevauchés  de hautes lucarnes et terminée sur l'une des faces du carré par un bâtiment bas, dont le centre occupé par un portail d'entrée. il est doté de remparts et de quatre tours d'angle qui attestent de son rôle militaire, par ailleurs mal connu, une partie du château avait brulé en 1710 et n'avait pas été reconstruit amputé de la moitié de son aile droite. Des travaux effectués au début du XVIIIe siècle sont suivis par une dégradation et une ruine progressive après 1755 (destruction du pavillon nord-est), agravé par les déprédations révolutionnaires. Préservé à peu près au cours du XIXe siècle, le château de Kerjean est acquis par l'État et classé monument historique en 1911. Il abrite désormais le musée breton. Éléments protégés MH : le château et ses dépendances en totalité : classement par arrêté du 29 avril 1911.","habitants":"Louis-François-Gilles de Kersauson\r\n        \"","divers":"Château de Kerjean Saint-Vougay","gps":"","images":["../../jctruffet.com/image/image_29/29_Kerjean_1.jpg","../../jctruffet.com/image/image_29/29_Kerjean_2.jpg","../../jctruffet.com/image/image_29/29_Kerjean_3.jpg","../../jctruffet.com/image/image_29/29_Kerjean_4.jpg","../../jctruffet.com/image/image_29/29_Kerjean_5.jpg","../../jctruffet.com/image/image_29/29_Kerjean_6.jpg","../../jctruffet.com/image/image_29/29_Kerjean_7.jpg","../../jctruffet.com/image/image_29/29_Kerjean_8.jpg"]},"Consult_chateau_formulaire9acb":{"id":"Consult_chateau_formulaire9acb","dept":"29","canton":"Saint-Pol-de-Léon","commune":"Plouénan","nom":"Kerlaudy","type":"Château","periode":"XVII","histoire":"KERLAUDY, lieu noble habité en 1427 par la famille Hamon, premier château construit entre 1571 et 1670 pour la famille de la Haye dont subsistent actuellement l'étage de soubassement avec cheminée, four et caves voûtées.Propriété de Joseph du Dresnay père et fils, gouverneurs de Saint Pol de Léon et maître de camp de cavalerie de la garde de Louis XVI. Escalier et logement sud-est aménagés entre 1871 et 1895 sous Drouillard, maire de Saint Pol de Léon, conseiller général et sénateur du Finistère.","architecture":"KERLAUDY, le logis du XVIIe siècle, est reconstruit entre 1750 et 1787, chapelle, écuries, remises, logement, parc et jardin datent de la même époque. Escalier et logement sud-est aménagés entre 1871 et 1895, lambris et cheminées déplacés au château de Hautefort vers 1970. Allée et parc disparus.","habitants":"famille de la Haye \r\n        \"","divers":"Château de Kerlaudy à Plouénan","gps":"","images":["../../jctruffet.com/image/image_29/29_Kerlaudy_1.jpg","../../jctruffet.com/image/image_29/29_Kerlaudy_2.jpg","../../jctruffet.com/image/image_29/29_Kerlaudy_3.jpg","../../jctruffet.com/image/image_29/29_Kerlaudy_4.jpg","../../jctruffet.com/image/image_29/29_Kerlaudy_5.jpg"]},"Consult_chateau_formulaireee30":{"id":"Consult_chateau_formulaireee30","dept":"29","canton":"Pont-de-Buis-lès-Quimerc","commune":"Hanvec","nom":"Kerliver","type":"Château","periode":"XIV-XVI","histoire":"KERLIVER,  manoir date du XIVe et XVIe siècle. Il fut la propriété de René Floch de Saint Gouesnou, des Carné en 1648, puis des Picot, et des Hérrison Vaudion jusqu'en 1798. La famille De Quelen de Kerohan entra en possession du manoir après la Révolution et marqua la vie locale, le père fut maire de Hanvec de 1814 à 1830. Un de ses fils décide de se consacrer au commerce de bois que son père avait crée. En 1850 ce dernier fait faillite et le manoir fut vendu. Ce sont les frères Dehaies de Montigny qui deviennent propriétaires de cette imposante bâtisse, ces deux anciens officiers se retirèrent à l'âge de la retraite à Hanvec. Le dernier des deux frères décédait le 18 décembre 1879 et léguait à la commune, le manoir, ses propriétés et la location des fermes.","architecture":"KERLIVER, cet ancien manoir est constitué de bâtiments qui entourent son avant-cour et une cour d'honneur, donnant accès à la demeure des seigneurs. L'entrée principale est une grande porte en pierre de Logonna qui date du XVIe siècle. En 1805, une chapelle dédiée à Sainte-Agathe est ouverte au culte, à la demande de la famille de Quélen. Sainte-Agathe a des vertus pour guérir les nourrices en manque de lait, et une fontaine proche lui est également consacrée. Le manoir de Kerliver est désormais un établissement public de formation agricole, paysage, forêt, production agricole et horticole, commerce.  Le manoir, ses propriétés et la location des fermes. En contre partie la municipalité devait s'engager à y créer une école où les filles de la commune recevraient gratuitement une instruction en rapport avec l'existence qu'elles doivent mener à la campagne.","habitants":"Famille d'Hérrison Vaudion\r\n        \"","divers":"manoir de Kerliver à Hanvec GPS : 48° 19' 39' Nord, 4° 09' 31\" Ouest","gps":"48° 19' 39' Nord, 4° 09' 31\" Ouest","images":["../../jctruffet.com/image/image_29/29_Kerliver_1.jpg","../../jctruffet.com/image/image_29/29_Kerliver_2.jpg","../../jctruffet.com/image/image_29/29_Kerliver_3.jpg","../../jctruffet.com/image/image_29/29_Kerliver_4.jpg"]},"Consult_chateau_formulaireaad6":{"id":"Consult_chateau_formulaireaad6","dept":"29","canton":"Guipavas","commune":"Relecq-Kerhuon","nom":"Kerléon","type":"Château","periode":"XIX","histoire":"KER-LEON, le château de Ker-Léon, dit aussi \"château russe\", a été construit dans la deuxième moitié du XIXe siècle par Rosalie Léon. Née en 1832 à Quimper, cette femme de modeste origine entretint une liaison avec un aide de camp du tsar de Russie, Pierre de Wittgentsen, avant de se réinstaller en Bretagne en 1863. Elle épousa le prince en 1886, ce dernier décéda l'année suivante au château (corps transféré en Bavière). propriété des Carmélites.","architecture":"KER-LEON l'édifice a été construit entre 1863 et 1886. Bombardé pendant le siège de Brest lors de la seconde guerre mondiale, le château a été très endommagé, ces vestiges ont été aménagés par les Carmélites à qui appartient aujourd'hui le domaine.","habitants":"Famuille de  Rosalie Léon\r\n        \r\n        \"","divers":"a Relecq-Kerhuon le château de kerléon  gps 48° 24' nord, 4° 24' ouest","gps":"","images":["../../jctruffet.com/image/image_29/29_Kerl%c3%a9on_1.jpg"]},"Consult_chateau_formulaire93be":{"id":"Consult_chateau_formulaire93be","dept":"29","canton":"Quimperlé","commune":"Mellac","nom":"Kernault","type":"Château","periode":"XV","histoire":"KERNAULT, logis construit pour Yves de Lescoët peu avant 1471 et  complété au XVIe siècle par la famille Le Boeuf. Manoir réaménagé en 1627 par la famille Le Veyer, redistribution des pièces. Au XVIIIe siècle par alliance passe au à la famille Du Vergier de Kerhorlay fait partiellement réaliser le projet d'aménagement du logis proposé par l'architecte Antoine Le Forestier en 1749, agrandissement des baies, percement d'un passage entre l'entrée et l'office, mise en place de lambris de la grande salle et cloisonnements à l'étage. A la mort de Jean-Marie du Vergier en 1810 son fils Jean-Marie hérite également et s'attachera à développer sur le  domaine des techniques végétales inconnues,  Kernault  restera dans la descendance. Par mariage, le domaine devint au XXe siècle la propriété de la famille De Poulpiquet de Brescanvel. Jacques de Poulpiquet de Brescanvel en fait un lieu d'élevage pour les chevaux de selle, jusqu'en 1989 date du décès de madame  de Poulpiquet de Bescanvel et passe en 1990 au département du Finistère.","architecture":"KERNAULT, stèle en granite datant de l'Age du Fer. Vestiges d'un édifice fortifié au nord du domaine. Chapelle et ancien logis de régisseur du XVIe siècle, construction du logement et de l'aile des communs, à l'origine couvert de chaume, à la fin du XVIe siècle ou au début du XVIIe siècle. Construction du grenier, avec façade sur cour en pan de bois et corps de passage, dans la première moitié du XVIIe siècle, pour la famille le Veyer dont les armoiries figuraient sur une des lucarnes sud remontées en 1932 sur le logis. Jusqu'au milieu du XVIIIe siècle, l'accès principal se faisait par le sud en traversant les communs. L'ancien colombier, situé au sud des communs et attesté en 1810. Le Forestier semble être également l'auteur d'un projet d'aménagement du jardin. Mise en place des portails et des piliers délimitant la cour en 1846. Ancienne maison de garde-barrière bâtie en 1861 lors de la construction de la ligne de chemin de fer traversant le domaine. Bâtiments à usage agricole rajoutés vers 1900. Partie nord du logis remanié à la fin du XIXe siècle. L'ancienne métairie de Penallé date de 1789 et a été transformée en 1903. Le moulin de Kernault et une douzaine de fermes dont Guilligourgant, Kernestour, Lesforn, La Madeleine, Le Buzit et Le Bourgneuf, font partie du domaine jusqu'au début du XXe siècle. Restauration des bâtiments et restructuration de l'environnement végétal entre 1991 et 1998. Tous les bâtiments sont en moellon de granite, à l'exception des communs sud, partiellement en pan de bois. Ancienne maison du régisseur et communs à l'origine couverts de chaume. Chapelle domestique en alignement avec le logis.","habitants":"Louis de vergier de Kerhorlay\r\n        \"","divers":"Château de Kernault à Mellac","gps":"","images":["../../jctruffet.com/image/image_29/29_Kernault_1.jpg","../../jctruffet.com/image/image_29/29_Kernault_2.jpg","../../jctruffet.com/image/image_29/29_Kernault_3.jpg","../../jctruffet.com/image/image_29/29_Kernault_4.jpg"]},"Consult_chateau_formulaire5bf4":{"id":"Consult_chateau_formulaire5bf4","dept":"29","canton":"Saint-Pol des Léon","commune":"Saint-Pol des Léon","nom":"Kernevez","type":"Château","periode":"XIX","histoire":"KERNEVEZ, l'ancien château de la Villeneuve, attesté au Moyen Age et connu par des documents graphiques de la première moitié du XIXe siècle, existait encore en 1848. Il n'en subsiste qu'un vestige : la cheminée, datée de 1627, qui a été remployée dans l'actuelle cuisine. Le château passa par mariage à la famille de Guébriant au XIXe siècle et une campagne de réaménagement du domaine fut entreprise. Il semble que dans un premier temps, les de Guébriant se soient contentés de vouloir aménager le parc sans toucher au château. Les plans signés par Buhler paysagiste, datant de 1845, sont organisés autour de l'ancien logis. Dans un deuxième temps, en 1849, le château fut reconstruit selon les plans de l'architecte suisse Froelicher.","architecture":"KERNEVEZ  éléments protégés MH : l'ensemble du domaine inclus dans les murs du parc : le château en totalité, les façades et les toitures des autres bâtiments, le parc en totalité et les murs du parc. Les façades et les toitures de la ferme située à l'extérieur du parc : inscription par arrêté du 6 novembre 1997. Le parc, entièrement clos de murs, a conservé une bonne partie des allées dessinées par Buhler. Autour de Kernévez sont disposées les écuries, des vestiges d'une chapelle provenant du manoir de Keriviry et une serre. De part et d'autre de l'entrée principale, deux maisons de gardes répondent à la ferme située de l'autre côté de la route, hors du parc. L'ensemble des bâtiments est contemporain du château de Kernévez. Ce domaine est très représentatif du mouvement de retour à la terre de la grande aristocratie légitimiste au milieu du XIXe siècle.","habitants":"Famille de Guébriant\r\n        \"","divers":"à Saint-Pol des Léon château de Kernevez","gps":"","images":["../../jctruffet.com/image/image_29/29_Kernevez_1.jpg"]},"Consult_chateau_formulaire4896":{"id":"Consult_chateau_formulaire4896","dept":"29","canton":"Brest","commune":"Guillers","nom":"Keroual","type":"Château","periode":"XVII","histoire":"KEROUAL, le château de Keroual est une ancienne propriété des seigneurs de Penancoët, comtes de Kerouazle. Louise de Penancoët de Kerouazle, duchesse de Petersfield, d'Aubigny et de Porsmouth en 1672, fille de Guillaume de Penancoët et de Marie de Ploeuc, est née au château de Keroual en 1649, elle était devenue la favorite de Charles II dont elle avait eu un fils, Charles de Lenox duc de Richmond. A partir de 1715, le château passe de main en main puis est vendu au marquis du Châtel. A la Révolution, vendu comme bien de la couronne, et non comme bien national, à un franc-maçon, M. Borgnis-Desbordes, sa fille Mlle Legros célibataire, en hérite, après celle-ci, Keroual est passé à son neveu, M. Nicolas-Hippolyte de Kersauzon de Penandreff, notaire à Brest, il fut maire de Guilers de 1874 à 1886. En 1886 le château est racheté par l'amiral Didelot préfet maritime de Brest et reste dans cette famille. Keroual a été réquisitionné par les occupants allemands en septembre 1940. Le château na jamais été bombardé, comme on le dit souvent. Les occupants y ont mis sciemment le feu avant de lévacuer. En 1967, l'édifice ainsi que 10 hectares de terre sont vendus à Albert Cortellari, architecte brestois. Propriété de la ville de Brest, il a aujourdhui une vocation artistique.","architecture":"KEROUAL, le manoir de Keroual, se situe dans le bois de Keroual. La fin de sa construction date du XVIe siècle. Ses propriétaires initiaux étaient les Penancoët, Comtes de Keroual, Kerouale, Kerouazle qui en avaient fait leur résidence principale. L'ensemble est constitué dun corps de logis principal accosté dune aile terminée par l'un des deux pavillons marquant l'entrée de la propriété. Le pigeonnier forme lune des extrémités du jardin. La tour ronde sélève, à gauche du manoir, dévoilant le caractère initialement défensif de la bâtisse. Lédifice suit la mode de son siècle et donc les règles de larchitecture de la Renaissance, qui abandonne le gothique  dont l'influence continue de se faire sentir par le style de certaines ornementations  au profit de lesthétique antique utilisation de colonnes de style dorique, de frontons. Les matériaux utilisés sont typiquement bretons : granite, pierres de Logonna et de Kersanton. C'est une belle bâtisse de la Renaissance, qui sert depuis 2002, de résidence de création et héberge le Festival de Musique électronique Astropolis. C'est aujourd'hui une création-résidence. Son propriétaire actuel est la ville de Brest.","habitants":"Famille de  Guillaume de Penancoët\r\n        \r\n        \r\n        \"","divers":"Keroual GPS : 48° 24' 53\" Nord, 4° 33' 06\" Ouest","gps":"48° 24' 53\" Nord, 4° 33' 06\" Ouest","images":["../../jctruffet.com/image/image_29/29_Keroual_1.jpg","../../jctruffet.com/image/image_29/29_Keroual_2.jpg","../../jctruffet.com/image/image_29/29_Keroual_3.jpg","../../jctruffet.com/image/image_29/29_Keroual_4.jpg"]},"Consult_chateau_formulaire3de9":{"id":"Consult_chateau_formulaire3de9","dept":"29","canton":"Pont-de-Buis-lès-Quimerc","commune":"Hôpital-Camfrout","nom":"Keroullé","type":"Château","periode":"XVI","histoire":"KEROULLE   manoir  La référence la plus ancienne à Keroullé semble dater de 1536, son propriétaire en est Bernard Omnès, seigneur de Keroullé, de Tibizien Kerantrez. S'agissant de probables remplois. Le manoir de Keroullé, en dépit de nombreuses périodes constructions, possède deux particularités architecturales qui l'inscrive dans la famille du logis manorial de la première moitié du XVIe siècle (années 1520-1530) et du tout début du XVIIe siècle. La tour d'escalier polygonale à trois pans sur laquelle se greffe une tourelle comprenant un second escalier à vis, donne accès à une pièce à feu lambrissée.                                                                                                           ILE DE TY BIDY,  est achetée en 1868 par Prosper Michel Avice, comte de Mougon,  construit en 1869. Prosper Avice a créé un chantier naval initialement situé sur l'île de Tibidy puis transféré vers l'anse de Keravice. Afin de loger les familles et équipages des bateaux qui hivernaient à Tibidy, le comte de Mougon fit construire des maisons à \"la Marinière\", d'où le nom de cet écart créé ex-nihilo. Des travaux de modernisation sont réalisés dans le château (chauffage central, électricité par batteries d'accumulateurs, eau courante, etc. Lorsque René Bolloré en devient le propriétaire en 1925, puis il est la propriété de l'association anonyme immobilière du Léon en 1935. Les dépendances accueillent des colonies de vacances et a servi d'école privée durant la Seconde Guerre mondiale. Édifice de plan rectangulaire cantonné de deux tours circulaires placées en diagonale et couvertes en poivrière ainsi que d'une échauguette sur l'angle. Maçonnerie enduite avec encadrements de baies, chaînes d'angle et bandeaux horizontaux en pierre de taille.","architecture":"KEROULLE,  plusieurs bâtiments autour d'une cour carrée : tour d'escalier polygonale à trois pans sur laquelle se greffe une tourelle, à vis secondaire, donnant accès à une pièce à feu lambrissée ; système d'encorbellement permettant d'augmenter la superficie des pièces à chaque niveau. Entrée principale dans la tour d'escalier. Partie supérieure de l'escalier à  vis en kersantite. Pas de jonction, initialement, avec le bâtiment Est.  Le logis se développe le long du chemin, les ouvertures en façade sud ont été modifiées et comportent de nombreux remplois ; pente de toit modifiée. Salle de guet permettant une vue vers l'est, le sud et l'ouest (archère-canonnière). Arc de décharge d'une cheminée (détruite) en rez-de-chaussée au pignon Est. Le corps de bâtiment est orienté nord-sud : perpendiculaire au corps de logis ; ancienne galerie se terminant en cul-de-sac au nord. Côté cour, on compte trois colonnes debout avec ouvertures conservées de la cour vers l'est. Dans le mur, remonté et obstrué afin de créer des pièces en rez-de-chaussée, deux colonnes sont visibles, et deux socles sont intégrés à la maçonnerie. Dans la partie sud de ce corps de bâtiment existait une cheminée (traces de conduit en façade est). Beaucoup de traces de remontage et création d'ouvertures que ce soit en façade est ou ouest. Bâtiment dont la jonction avec le logis principal est parfois maladroite. Portes charretière et piétonne liant le logis sud au bâtiment ouest. Ce dernier est modifié en 1929 (porte date). Ouvertures modifiées et obstruées en façade est, indiquant une fonction mixte ; façade ouest créée en 1929 et ainsi qu'une tourelle d'angle. Accès à ce logis de type ternaire par l'ouest. En fond de cour, au nord, logis, ancienne ferme, comprenant rez-de-chaussée et étage de comble. Quelques blasons intégrés à la maçonnerie sont de probables réemplois.","habitants":"Famille de Bernard Omnès\r\n        \"","divers":"Château de Keroullé à  Hôpital-Camfrout; Ile' de Ty Bidy grav 4","gps":"","images":["../../jctruffet.com/image/image_29/29_Keroull%c3%a9_1.jpg","../../jctruffet.com/image/image_29/29_Keroull%c3%a9_2.jpg","../../jctruffet.com/image/image_29/29_Keroull%c3%a9_3.jpg","../../jctruffet.com/image/image_29/29_Keroull%c3%a9_4.jpg"]},"Consult_chateau_formulaire777b":{"id":"Consult_chateau_formulaire777b","dept":"29","canton":"Briec","commune":"Gouezec","nom":"Kerriou","type":"Château","periode":"XIX","histoire":"KERRIOU, le château de Kerriou de 1906, de style néogothique, édifié par l'architecte Jean-Marie Laloy pour la comtesse Cecilia Monteiro de Barros, épouse brésilienne du comte Henri de Legge, maire de Gouézec de 1902 à 1922   château construit en 1906 par l'architecte rennais Jean-Marie Laloy pour le comte Henri de Legge et son épouse, Cecilia Monteiro de Barros, sur le domaine de l'ancien manoir de Kerriou. Après son occupation pendant la deuxième guerre mondiale, le château change plusieurs fois de main. Kerriou , édifié par la comtesse Cecilia Monteiro de Barros ;Il a été restauré à la fin du XXe siècle.  Après son occupation pendant la 2e guerre, le château change plusieurs fois de main. Il a été restauré à la fin du 20e siècle.","architecture":"KERRIOU, édifice de plan massé composé d'un corps de logis rectangulaire cantonné de plusieurs pavillons, l'un en retour d'équerre au nord-est, l'autre sur l'angle nord-ouest, de part et d'autre de l'entrée principale situé au-delà d'un perron. Au sud, la façade plus régulière est animée d'une échauguette sur l'angle ouest. Au-dessus d'un niveau de sous-sol, le corps de logis comporte un rez-de-chaussée surélevé, un étage carré et un étage de comble distribué par un grand escalier situé dans le pavillon ouest surélevé d'un demi-niveau. Les maçonneries sont en moellon tandis que le soubassement, les bandeaux horizontaux, les encadrements de baies, les allèges et les lucarnes sont en pierre de taille. L'ornementation extérieure est de style néogothique.","habitants":"Comtesse Cecilia Monteiro de Barros\r\n        \"","divers":"Kerriou GPS : 48° 10' 12\" Nord et 3° 58' 15\" Ouest","gps":"48° 10' 12\" Nord et 3° 58' 15\" Ouest","images":["../../jctruffet.com/image/image_29/29_Kerriou_1.jpg","../../jctruffet.com/image/image_29/29_Kerriou_2.jpg","../../jctruffet.com/image/image_29/29_Kerriou_3.jpg"]},"Consult_chateau_formulairee190-2":{"id":"Consult_chateau_formulairee190-2","dept":"29","canton":"Landivisiau","commune":"Plougourvest","nom":"Kervoanec","type":"Château","periode":"XVIII","histoire":"KERVOANEC,  en 1566, fief d'Allain de Kerchoent, seigneur de Kergournadech. En 1710, il fut la propriété du sénéchal de Landivisiau, René Corentin Allain, seigneur de Pen-an-Ru. Après 1780, le château passe par alliance à la famille Bizien de Lizart qui reconstruit au cours du deuxième quart du XIXe siècle sur le site de cette seigneurie. Vendu par la famille de Quengo de Tonquédec à la commune de Landivisiau.","architecture":"KERVOANEC,  l'édifice est transformé en asile, puis en maison de retraite. D'abord administré par les soeurs du Saint-Esprit, il appartient aujourd'hui au  département. Corps de logis de style néo-classique, de plan rectangulaire comportant cinq travées, agrandi par une annexe latérale en rez-de-chaussée et couverte en terrasse  par un pavillon à l'autre extrémité. Elévation de moellon enduit, encadrement de baies, pilastres, corniche et lucarnes en pierre de taille. Aujourd'hui  maison de retraite.","habitants":"Famille Bizien de Lizart\r\n        \"","divers":"Château de Kervoanec à Plougourvest","gps":"","images":["../../jctruffet.com/image/image_29/29_Kervoanec_1.jpg","../../jctruffet.com/image/image_29/29_Kervoanec_2.jpg"]},"Consult_chateau_formulaire7570":{"id":"Consult_chateau_formulaire7570","dept":"29","canton":"Pont-de-Buis-lès-Quimerc","commune":"Tréflévénez","nom":"Kerézellec","type":"Château","periode":"XV","histoire":"KEREZELLEC  le domaine de Kerézellec a été jusquen 1772 la propriété des Huon de Kerézellec, nobles dancienne extraction, dont le blason figure encore sur des pierres armoriées qui étaient sur la façade de la chapelle et sur un pavillon, aujourdhui démoli. Une chapelle primitive aurait peut-être été édifiée sur la colline, au retour dune croisade. Cest une hypothèse, la plus plausible. Le manoir ou château de Kerézellec qui appartenait depuis le XVe siècle à la famille Huon est devenu en 1772 la propriété de la famille de Lestang du Rusquec. Il est occupé essentiellement par Mme Marie Gabrielle Huon de Lesguern et Kerézellec, ses enfants, belles-filles et gendres. Née à Tréflévénez, elle avait épousé, à Saint-Pol de Léon Jean François Mathurin de Lestang du Rusquec. Celui-ci avait émigré à Cologne à la Révolution et avait été assassiné en cette ville le 12 juillet 1792.  Madame Bouroullec, location pour réceptions avec possibilité d'hébergement.","architecture":"KEREZELLEC ; corps de logis de plan rectangulaire sur soubassement à deux niveaux, deux toits parrallèle  en croupes,  accolé sur les flancs latéraux de pavillons d'un niveau à toit brisé.                                                                                    KERIDREUX","habitants":"Famille de Huon de Kerézellec\r\n        \"","divers":"a  Tréflévénez le château de Kerézellec","gps":"","images":["../../jctruffet.com/image/image_29/29_Kerezellec_1.jpg","../../jctruffet.com/image/image_29/29_Kerezellec_2.jpg"]},"Consult_chateau_formulaire1fe4":{"id":"Consult_chateau_formulaire1fe4","dept":"29","canton":"Guingamp","commune":"Kéranguevel","nom":"Kéranguevel_Paule","type":"Château","periode":"XVIII","histoire":"KERANGUEVEL  l'édifice fut la propriété de la famille du Leslay de Keranguevel du XVe au XIXe siècle, puis il passe par alliance à la famille Ruellan du Créhu et ensuite à la famille du Pontavice. Au XXe siècle il appartient à M. et Mme Brière de l'Isle et aujourd'hui c'est Monsieur de Crevoisier qui est propriétaire du château de Kéranguével. La partie centrale ainsi que les ailes sur la cour principale ont été modifiées au XVIIIe siècle par la famille du Leslay qui en était propriétaire.","architecture":"KERANGUEVEL, la construction du château s'étend du Moyen Âge au XVIIIe siècle. L'actuelle demeure date du début du XVIIIe siècle. On y trouve un puits qui date de 1659. La façade porte la date de 1717 et l'aile Nord porte la date de 1777. L'édifice possède une chapelle privée. La partie centrale ainsi que les ailes sur la cour principale ont été modifiées au XVIIIe siècle par la famille du Leslay qui en était propriétaire. Les trois grandes pièces du rez-de-chaussée sont caractérisées par des boiseries. Accolé au manoir, une chapelle avec des ouvertures de style roman ainsi qu'un manège de style renaissance qui devait servir à faire travailler les animaux.","habitants":"Famille du Leslay de Keranguevel \r\n        \r\n        \r\n        \r\n        \"","divers":"Keranguevel_Paule","gps":"","images":["../../jctruffet.com/image/image_29/29_Keranguevel_Paule_1.jpg"]},"Consult_chateau_formulairebb0a":{"id":"Consult_chateau_formulairebb0a","dept":"29","canton":"Landerneau","commune":"Landerneau","nom":"Landerneau","type":"Château","periode":"XVI","histoire":"Quatre châteaux dans cet article  de Landerneau; Kéranden, Grande Palud, Coat-Mez et Duthoya                                               LANDERNEAU, Penanrue, château XVIIIe-XIXe siècles, parc, propriété privée, ne se visite pas, pas d'historique.  Fort de Joyeuse, Garde, château XIIe siècle, ruiné.                                                               KERANDEN,  manoir, une première transformation est effectuée en 1823. L'édifice actuel, construit par l'architecte Joseph Bigot en 1904, comporte une façade de style Renaissance. Le porche de l'entrée, avec son arcade supportée par des pilastres, est surmonté d'un fronton triangulaire piqué de trois pots à feu. Après avoir été à l'abandon, le manoir a été racheté par la commune qui le rénove, on y trouve aujourd'hui le centre de formation des langues bretonnes.                                                                                                      GRANDE-PALUD, manoir du XVe siècle, propriété des seigneurs de la Grande-Palud, des familles Montdragon, Montmorency et de Hervé de Parcevaux en 1560, puis propriété successive des familles Barbier, suite au mariage de René Barbier en 1627 avec Françoise de Parcevaux, Pinsonneau en 1720, Bidé, Thiberge en 1798, Le Jeune, Vacheront, Guézennec. Le manoir a connu des fortunes diverses. Son moulin, édifié sur le ruisseau de Pen-ar-Coat, était devenu au fil des siècles une usine à lin, à coton et même à poudre durant les deux guerres mondiales. Le manoir est encore la propriété de la famille Guézennec à la fin du XXe siècle ;                                                                            le GUERRUS-Laouen (vers 1870), édifié par la famille Vacheront. Ce château est encore appelé « Coat-Ruz ».","architecture":"COAT-MEZ ou Coatmes manoir  du XIXe siècle. Cet édifice aurait été fondé par Armand-Aimé-Marie de Guesnet, ancien lieutenant-colonel du génie militaire, chevalier de Saint-Louis, officier de la Légion d'honneur, sous-préfet de Brest pendant la Restauration. Il a eu pour enfants  en 1 Athanase-Marie-Michel de Guesnet, capitaine de vaisseau très distingué, commandeur de la Légion d'honneur, né le 20 avril 1808, mort sur le vaisseau le Redoutable, qu'il commandait, le 19 décembre 1860, laissant une nombreuse postérité, 2°-Urbain-Antoine-Marie de Guesnet, homme instruit, affligé par un accident de jeunesse d'une infirmité grave qui l'écarta de toute carrière, 3° - plusieurs filles, dont une, Mlle Aimée qui avait habité Coatmes.                                                                                       DUTHOYA, située à proximité du port, cette maison s'intégrait à l'origine à un ensemble plus vaste comprenant deux autres immeubles mitoyens placés au sud et à l'ouest autour d'une petite cour intérieure,  Elle est constituée d'un unique corps de bâtiment de plan rectangulaire couvert d'une grande toiture de deux versants à coyaux. Sa façade principale donnant à l'est sur la rue du Commerce, est entièrement appareillée en pierres de taille de Logonna. Couronnée d'une épaisse corniche à modillons, elle présente deux travées principales percées de grandes baies droites dominées par des lucarnes à frontons galbés ornés de pots à feux, ainsi qu'une tourelle d'escalier coiffée d'une toiture à croupe. L'espace intérieur comporte un rez-de-chaussée réservé au service, deux étages carrés d'habitation et un comble. L' édifice conserve son escalier principal en vis, ses cheminées et son dispositif de latrines en encorbellement sur la façade arrière maison datée de 1667, présentant une façade en pierre de taille, percée de baies et couronnée d'une grosse corniche à modillons qu'interrompt une tourelle d'escalier et deux lucarnes en pierre. C'est un type de façade qui semble avoir été couramment adopté au XVIIe siècle à Landerneau.","habitants":"Coat-Athanase-Marie-Michel de Guesnet,                           Grande Palud ; Famille Guézennec \r\n        \"","divers":"Quatre châteaux dans cette article  de Landerneau grav-1 ; Kéranden grav 2-3-4, Grande Palud Grav-9, Coat-Mez grav-5  Ruz grav-6 et Duthoya   grav-7-8","gps":"","images":["../../jctruffet.com/image/image_29/29_Landerneau_1.jpg","../../jctruffet.com/image/image_29/29_Landerneau_2.jpg","../../jctruffet.com/image/image_29/29_Landerneau_3.jpg","../../jctruffet.com/image/image_29/29_Landerneau_4.jpg","../../jctruffet.com/image/image_29/29_Landerneau_5.jpg","../../jctruffet.com/image/image_29/29_Landerneau_6.jpg","../../jctruffet.com/image/image_29/29_Landerneau_7.jpg","../../jctruffet.com/image/image_29/29_Landerneau_8.jpg","../../jctruffet.com/image/image_29/29_Landerneau_9.jpg"]},"Consult_chateau_formulaire9386":{"id":"Consult_chateau_formulaire9386","dept":"29","canton":"Brest","commune":"Landunvez","nom":"Landunvez","type":"Vestiges","periode":"XIII-XIV","histoire":"A Landunvez les vestiges de Trémazan                                                 TREMAZAN, château remontant aux XIIIe et XIVe siècles. Le château aurait été construit sur les ruines d'un castellum existant déjà dès le VIe siècle. Selon la légende, Tanguy du Châtel, fondateur de l'abbaye de Saint Mathieu, y naquit. Le bâtiment devient château-fort vers le Xe siècle. En 1220, il est détruit au cours de la guerre contre le duc de Bretagne, Au XIVe siècle, construction du château fort par la famille Du Chastel,  reconstruit par Bernard du Châtel. Vendu comme bien national à la Révolution,  \"SOS château de Trémazan\" s'attache à préserver le château et à accroître la connaissance de son passé. En 1926, le site castral est inscrit aux M.H.. En 1995, un pan de mur de la tour s'écroule. En 1998, la commune achète la tour et les remparts.","architecture":"TREMAZAN, le château est abandonné au XVIIIe siècle. Reste le donjon du XIIe siècle, de plan carré, divisé en quatre étages sur rez-de-chaussée. Les autres tours et l'enceinte extérieure datent des XIIIe, XIVe et XVe siècles.   Au XVe siècle, une barbacane est certainement construite. Au XVIIIe siècle, le château n'est plus habité et se dégrade doucement. L'Association \"SOS château de Trémazan\" s'attache à préserver le château et à accroître la connaissance de son passé. le vert-rempart. Je ne savais pas que nos ancêtres peignaient les murs en couleur nature.   Dans quelques années, il ne sera plus possible de voir les pierres pauvrement taillées, asymétriques et peu jointives du rempart. Au centre de la verdure arrive à survivre une haute construction. le donjon. Avec ses dimensions, je peux affirmer qu'il était habitable. Bien que ses parois soient réalisées en pierres de tailles différentes, le parement d'angle est sans reproche. pas voir d'ouverture de tir, ni de fenêtre et encore plus surpris par l'absence de construction en encorbellement","habitants":"Famille du Châtel\r\n        \r\n        \r\n        \"","divers":"Vestiges de Trémazan grav1-2 et","gps":"","images":["../../jctruffet.com/image/image_29/29_Landunvez_1.jpg","../../jctruffet.com/image/image_29/29_Landunvez_2.jpg"]},"Consult_chateau_formulaire869e":{"id":"Consult_chateau_formulaire869e","dept":"29","canton":"Plouigneau","commune":"Guimaëc-Lanmeur","nom":"Lanmeur","type":"Château","periode":"XIX","histoire":"Cinq châteaux à Guimaëc -Lanmeur ; Croat-ar-Frotier, Helles, Kergadiou et Kerven.                                                                                           CROAT-AR-FROTIER  à Lanmeur, le manoir de Coat-ar-Frotter du XVe siècle. A l'arrière se trouvait jadis une tour circulaire. Il possédait autrefois une chapelle privée et un moulin. Propriété successive du XVe siècle, au Quintin passa ensuite aux  du XV-XVIe siècle, suite au mariage d'Adeline La Forêt avec François Quintin, seigneur de Coatamour, Lollivier de Lochrist du XVIIe siècle, suite au mariage de Marie Quintin avec Yves Lollivier, seigneur de Lochrist, Kersauson de Vieux Châtel, Pluvié (suite au mariage de Pauline Kersauson avec Auguste de Pluvié), Le Sann au XXe siècle.                                                                                                          HELLES,  à Lanmeur  la métairie de Hellés du XVIe siècle. La famille de La Forest y résidait au XVIIe siècle, puis la transmit par alliance à la famille du Trévou et Le Lay de Kermabin;  il fut aussi vendu nationalement.                                                                                             K
