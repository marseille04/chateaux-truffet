scalier. La façade sur cour et l´intérieur du logis ont, de nouveau, été agrandis ou remaniés vers 1900, notamment dans la la partie nord-ouest. Le jardin en terrasse à l´est a été aménagé au XIXe siècle.","architecture":"KERLAREC, en 1834 Victor comte de Kerouallan (1802-1876), petit fils du Sénéchal de Quimperlé achète les terres du village de Kerlarec. Il fait raser les bâtiments existants, à l´exception des pavillons d´angle, et construire en 1840 le corps de bâtiment actuel. Il y adjoint la ferme-métairie à l´est, une orangerie et des écuries à l´ouest ainsi qu'une allée d´accès. Le château est agrandi en 1894 par Constance de Kerouallan, fille du comte, et son époux le Baron Étienne-Charles-Alfred de Lépinau (pavillons d´angle carrés à toiture aiguë et aménagements intérieurs). Chambres d'hôtes.                                                                              KERBERTRAND, château probablement construit au cours du 3e quart XIXe siècle par l'industriel Henry de Mauduit au centre d'un parc.  Edifice de plan symétrique ; le corps central marqué par un avant-corps polygonal saillant sur la façade sur jardin est encadré de deux pavillons bas. Maçonnerie de moellon avec soubassement, encadrements de baies, chaînes d'angle, corniche et lucarnes en pierre de taille. Toit brisé.                                                                   QUEBLEN manoir à cour ouverte. Plan en équerre. Tour d´escalier antérieur. Tour d´escalier dans l´angle. Tour d´escalier à pièce haute. Le logis à un étage est couvert d´un toit à croupe, à l´exception de la tour d´escalier octogonale, coiffée d´un toit polygonal et de l'aile de retour, avec toit à longs pans et pignon découvert. Le colombier, à l´origine couvert d´une voûte en pierre avec ouverture zénithale, a été tardivement couvert d´un toit conique. Les communs (ancienne métairie noble), à pignons découverts, étaient probablement couverts de chaume. L'aile en retour du logis comporte trois niveaux occupés respectivement par un cellier (ou cave) et deux chambres superposées dont celle de l'étage conserve une fenêtre à meneau et traverse. La souche de cheminée de la chambre haute de la tour d'escalier a été supprimée. L'encadrement des ouvertures de l'aile principale est en ciment.","habitants":"Queblen ; Famille Jean Le Roy de Keralno                                   Kerlarec ; Victor comte de Kerouallan                      Kerbertrand ; Famille d'Henry de Mauduit\r\n        \"","divers":"Trois châteaux dans cet article à Quimperlé; Québlen grav-1, Kerlarec grav-3         et Kernertrand grav-2.                                     Kerlarec 47° 53' 01\" nord, 3° 28' 29\" ouest1","gps":"","images":["../../jctruffet.com/image/image_29/29_Quimperl%c3%a9_II_1.jpg","../../jctruffet.com/image/image_29/29_Quimperl%c3%a9_II_2.jpg","../../jctruffet.com/image/image_29/29_Quimperl%c3%a9_II_3.jpg"]},"Consult_chateau_formulairee2d8":{"id":"Consult_chateau_formulairee2d8","dept":"29","canton":"Moëlan-sur-Mer","commune":"Riec-sur-Belon,","nom":"Riec_sur_Belon","type":"Château","periode":"XV-XVIII","histoire":"deux châteaux à Riec sur Belon; Porte-Neuve et Bellon                          PORTE-NEUVE, le château de la Porte Neuve fut élevé sur le site d'un ancien manoir appartenant à la famille Morillon originaire du Poitou. Par mariages, il passera aux de Guer en 1445 et aux de Pontcallec en 1598. Le domaine demeure dans cette famille jusquen 1797. Alain de Guer fut fait marquis de Pontcallec par le roi Louis XIV. Armand de Malestroit De Bruc, fils adoptif du dernier des Pontcallec verra la fin de la saisie sur le domaine en 1811. Il vendra le domaine en 1834 à de riches armateurs nantais, les frères Arnaud, le manoir est transformé en dépendances, un château est alors édifié dans la première moitié du XIXe siècle. Il appartient à Anatole de Brémond dArs, marquis de Migré, au début du XXe siècle. En 1968, abandonné, il devient un centre de vacances de la Mutuelle Générale de léducation Nationale qui le restaure. Le corps de bâtiment est en L à élévation ordonnancée. Maçonnerie de moellon avec encadrements de baies, chaînes d'angle, pilastres et bandeaux horizontaux, corniche et lucarnes en pierre de taille. Toit brisé.","architecture":"BELON,  à lorigine l'édifice était un rendez-vous de chasse pour les seigneurs de Quimerch à Bannalec. Subsiste de cette époque la cuisine qui daterait du XVe siècle. Au XVIIIe siècle, les Tinténiac, héritiers par mariage des Quimerch, construisent au sud le corps du logis en pierres blanches, venues des régions de la Loire. Alphonse de Tinténiac, propriétaire de l'édifice à la révolution, est un chef de la chouannerie. Il trouvera la mort en 1795 à Coatlogon, ses biens sont confisqués, et la propriété est vendue comme bien national. Le domaine est racheté par un ancien officier breton en 1806, c'est son neveu qui en hérite. Une tour est construite à louest, à la fin du XIXe siècle, donnant son aspect définitif à la demeure actuelle.  La construction du château de Belon date du XVIIIe siècle,  le manoir fut construit  pour la famille de Tinténiac, dont le représentant le plus célèbre fut Vincent de Tinténiac surnommé \"le Loup blanc\", un des chefs de la chouannerie. Aujourd'hui, on y cultive des huitrières. Depuis 1864, les Huîtrières du château de Bélon cultivent lhuître plate et lhuître creuse, tout en préservant le lieu. Aujourdhui encore, après 5 générations dostréiculteurs.","habitants":"Porte ; Famille Morillon                                                                 Belon ; Famille  des Tinténiac\r\n        \"","divers":"deux châteaux à Riec sur Belon; Porte-Neuve grav-1-2-3 et Bellon grav-4-5.                                                                                           Bellon GPS : 47° 50' Nord, 3° 42' Ouest","gps":"47° 50' Nord, 3° 42' Ouest","images":["../../jctruffet.com/image/image_29/29_Riec_sur_Belon_1.jpg","../../jctruffet.com/image/image_29/29_Riec_sur_Belon_2.jpg","../../jctruffet.com/image/image_29/29_Riec_sur_Belon_3.jpg","../../jctruffet.com/image/image_29/29_Riec_sur_Belon_4.jpg"]},"Consult_chateau_formulaire9056":{"id":"Consult_chateau_formulaire9056","dept":"29","canton":"Landerneau","commune":"La Roche-Maurice","nom":"Roch_Morvan","type":"Vestiges","periode":"XIII","histoire":"ROCH-MORVAN, la première mention du château date de 1263, mais il est  plus ancien. Situé sur un emplacement défensif de premier ordre, il était une des plus importantes forteresses des puissants vicomtes de Léon. En juin 1342, Charles de Blois tente, en vain, de s'en rendre maître, occupé par Jeanne de Montfort. Hervé VIII de Léon décède en 1363 et le Léon revient alors à sa soeur aînée, épouse du vicomte Jean Ier de Rohan depuis 1349. Suite à un traité du 4 novembre 1371, entre le roi d'Angleterre et le duc Jean IV de Bretagne, le château est gardé par une garnison anglaise. En mai 1373 Du Guesclin s'en empare, en 1375, le duc Jean IV, aidé par des soldats anglais, reprend l'édifice. En 1472, le duc François II saisit le château sur le vicomte de Rohan pour le punir de tenir le parti du roi de France. La fin du XVe siècle voit commencer le démantèlement de Roc'h Morvan.","architecture":"ROCH-MORVAN, proche de Landerneau, le château de Roch Morvan domine la Vallée de lElorn, qui fut une ancienne frontière entre la vicomté de Cornouaille et la vicomté de Léon. Son nom traduit à la fois, sa position topographique, sur un piton rocheux, et le nom de son bâtisseur au XIe siècle, le Vicomte de Cornouaille du nom de Morvan. Seules les fouilles archéologiques nous renseignent sur les deux premiers siècles de lhistoire de ce château. Le premier établissement fortifié, date du XIe siècle. Il est attesté par des traces daplanissement de léperon rocheux, des lambeaux de sols et des segments de murs, mal conservés. Ce lieu stratégique entre les vicomtés de Léon et de Cornouaille, a rempli un rôle de défense de la frontière. A lissue dune guerre féodale, les vicomtes de Léon semparèrent du château de Roc'h-Morvan, en 1163, et étendirent alors leur territoire jusquà Daoulas. La forteresse de La Roche-Maurice assura désormais un rôle de protection de la ville de Landerneau. Vers 1180, la vicomté de Léon fut démantelée, suite à des révoltes contre le pouvoir ducal, et le château de Roc'h-Morvan passa aux mains dune branche cadette des Seigneurs de Léon. Au XIVe siècle, les vicomtes de Rohan, héritèrent par mariage du château et de sa seigneurie.  Après la Révolution française, et en dépit des interdictions, le château est exploité comme carrière de pierre. En 1926, la découverte d'une galerie et de salles souterraines près de l'entrée du château provoque une \"chasse au trésor\". C'est à partir de son acquisition par le département, en 1987, que d'importants travaux sont entrepris.Éléments protégés MH : les vestiges du château : inscription par arrêté du 18 octobre 1926. La Mission patrimoine architectural, dirigée par Anne Badiche-Desille, du Département du Finistère, mène le projet de valorisation du site, dans sa globalité. Un circuit avec des panneaux explicatifs permet une visite libre.","habitants":"le vicomte de Rohan \r\n        \"","divers":"A la Roch Maurice vestiges de la Roch-Morvan                                                                             GPS : 48° 28' 22,75\" Nord, 4° 12' 21\" Ouest","gps":"48° 28' 22,75\" Nord, 4° 12' 21\" Ouest","images":["../../jctruffet.com/image/image_29/29_Roch_Morvan_1.jpg","../../jctruffet.com/image/image_29/29_Roch_Morvan_2.jpg","../../jctruffet.com/image/image_29/29_Roch_Morvan_3.jpg","../../jctruffet.com/image/image_29/29_Roch_Morvan_4.jpg"]},"Consult_chateau_formulaire6e56":{"id":"Consult_chateau_formulaire6e56","dept":"29","canton":"Landerneau","commune":"La Roche Maurice","nom":"Roche_Maurice","type":"Château","periode":"XV-XVII-XVIII","histoire":"PPONTOIS Propriété successive des familles de Bauchesnes. Le Pontois (Guillaume Le Pontois époux de Catherine Mahieu, avant 1693, et René Le Pontois époux de Catherine Derrien en 1693-1708), Moucheron (au mariage de Sébastien de Moucheron avec Marguerite Le Pontois), Le Roy  du milieu du XVIIIe siècle, Parscau du Plessis (à partir du début du XIXe siècle, vers 1800), Audibert de Lavillasse  de 1831, suite à l'achat du domaine du Pontois par Joseph Marie François Etienne d'Audibert de Lavillasse, époux de Louise Denise Guymar de Coatidreux, le 12 février 1831,  Eugène Belin (1891 à 1895, à l'achat du domaine du Pontois à Stéphanie d'Audibert de Lavillasse le 28 janvier 1891), Gabriel Marie de Kermenguy (1895 à 1913, à l'achat du domaine du Pontois le 22 mai 1895), Yves Bernard (à partir de 1913, à l'achat du domaine du Pontois le 8 avril 1913). Le manoir actuel  est assez récent. Il a remplacé l'ancien du XVe siècle ou XVIe siècle qui appartint, avec sa chapelle Saint-Guillaume, à la famille du Pontois .                                                                KERRAOUL, le manoir de Keraoul ou Kerraoul ou Kernoual, propriété successive des familles Keraoul (Robert de Keraoul en 1426), Le Gac de Keraoul (du XVIe siècle au XVIII siècle), O'Croly (par succession de feu Christophe Ange Le Gac, sieur du Quistillic), Olliviere à l'achat du domaine de Keraoul par Joseph Marie Ollivier le 31 décembre 1802. C'est Yves Isidore Marie Ollivier qui fait construire le nouveau château sur l'emplacement de l'ancien manoir, vers 1871-1873. Le domaine de Keraoul est vendu ensuite à Ernest Robert (époux de de Louise Miorcec de Kerdanet) le 16 février 1876, puis à Fernand Aubert de Vincelles (époux de Marie-Thérèse de la Bintinaye) vers 1901, puis à Louis Berthelot (époux de Marie Hautin) vers 1922. Le domaine est depuis 1946 la propriété de l'Association Don Bosco .","architecture":"KERMADEC, ancien manoir de Kermadec (XIIIe siècle), où naquit vers le milieu du XIIIe siècle, Olivier Saladin, recteur de l'Université de Paris en 1348, puis évêque de Nantes, surnommé la Fleur des Prélats de son temps. Il se trouva à Avignon, lors de la canonisation de saint-Yves. Ce prélat était frère de Pigette Saladin, qui, porta, par mariage, la seigneurie de Kermadec à Hervé, fils d'Huon, sieur de Kerhuon, prévôt féodé héréditaire de la vicomté de léon. La manoir est reconstruit vers 1503 par Pierre Huon, sieur de Kermadec.\r\nKERNEVEZ,ancien manoir de Kernevez (vers le milieu du XIXe siècle), propriété successive des familles d'Audibert de Lavillasse (vers 1861), Dieuleveult (en 1872, suite à la vente de Kernevez par Paul d'Audibert de Lavillasse, né en 1866 et décédé en 1906), Coatgoureden (en 1914, suite à la vente de Kernevez par Paul de Dieuleveult à Charles de Coatgoureden), Berthelot (de 1921 à 1995, suite à l'achat du domaine de Kernevez par Charles Alain Marie Berthelot frère de Louis Berthelot (qui achète Keraoul et époux d'Anne Louise Gaulard).","habitants":"Pontois ; Famille de Pontois                                              Kermadec  ;Famille de Saladin                                   Kernevez;   Famille d'Audibert de Lavillasse\r\n        \r\n        \"","divers":"Quatre châteaux dans cet article sur la Roche-Maurice ; Pontois grav-4-5 , Kerraoul grav-1-2, Kermandec et Kernevez grav-3","gps":"","images":["../../jctruffet.com/image/image_29/29_Roche_Maurice_1.jpg","../../jctruffet.com/image/image_29/29_Roche_Maurice_2.jpg","../../jctruffet.com/image/image_29/29_Roche_Maurice_3.jpg","../../jctruffet.com/image/image_29/29_Roche_Maurice_4.jpg","../../jctruffet.com/image/image_29/29_Roche_Maurice_5.jpg"]},"Consult_chateau_formulairef618-2":{"id":"Consult_chateau_formulairef618-2","dept":"29","canton":"Saint-Pol-de-Léon","commune":"Roscoff","nom":"Roscoff","type":"Château","periode":"XV-XVI-XVII","histoire":"A Roscoff le château de la Digue,  Brittany, Kerestat  et Kernuz.                                                                                  La DIGUE, les propriétaires de l'Aber, la famille Laurent, se construiront vers 1890 le château de la Digue. C'est une bonne construction en pierre de Keravel, la pierre de taille vint de Cléder. Le travail fut confié à M. Pétel, entrepreneur et maire. A en croire les souvenirs qui se colportent \"les Dames du château\" firent abattre à deux reprises la maçonnerie au cours de la construction pour apporter des retouches au plan, les lucarnes en pierre sont inspirées des fenêtres Henri IV que l'on voit en ville. La grande salle présente dans l'arrondi d'une tourelle, une curiosité architecturale: un édicule en bois recouvert de stuc creusé d'arabesques et d'entrelacs aux couleurs vives, d'inspiration hispano-arabe, cet édicule abrite une cheminée. Devenue veuve, Marie Laurent épousa le Colonel Geoffroy. Ils avaient adopté un garçon, Armand Maurice Follet. Le 11 août 1900 il se noya aux écluses de la digue, il avait 12 ans. Madame Geoffroy en perdit la tête, on a dit qu'elle brûlait des billets de banque dans sa cheminée. Il fallut l'hospitaliser, elle décédait le 5 mai 1902. Le colonel était mort lui aussi dans l'intervalle.                                                                                 KERNUZ, château construit au XVIe siècle sur le site d'une ancienne place forte ; le bâtiment a été fortement restauré et agrandi au XIXe siècle par Armand du Châtellier qui s'adresse à Joseph Bigot, architecte à Quimper. Les travaux, qui constituent la première grande \"restauration\" de l'architecte sont menés en plusieurs campagnes : construction de la partie ouest en 1843, restauration de la tour est en 1845, construction de la partie est en 1847. Surélévation au-dessus de l'arc en accolade, et construction en pendant, par Jean-Marie Abgrall à la fin du siècle. Paul-Armand du Châtellier y créa un musée d'art préhistorique.","architecture":"La DIGUE, la construction date du XIXe siècle. en 1890, pour le Colonel Geoffroy et sa femme, héritière du lorientais Laurent, sur un terrain de 50 hectares acquis aux enchères par celui-ci le 10/11/1846, au terme de l'affaire de la Digue. Veuve en 1901, elle mourut le 5/05/1902,  Armand Follet, un  en léguant le château à l'Assistance Publique, laquelle l'a concédé pour 99ans au Centre Helio-Marin, le 8/06/1920. Le château de la Digue a été acquis par la communauté de communes du Pays Léonard en 2013.                                                             BRITTANY,  vieille bâtisse du XVIIe siècle, entièrement rénovée qui niche au bout de la presqu'île de Sainte Barbe, membre des Relais et Châteaux depuis 2007, bénéficie dune situation privilégiée sur la presquîle de Sainte-Barbe entre le port de plaisance et la petite cité de caractère de Roscoff. Elégant manoir du XVIIe siècle sassocie à Batz, un espace design contemporain. Bâti sur la propriété dun ancien marchand et flanqué de murailles granitiques aussi imprenables quune forteresse, le Brittany & Spa est un établissement du XVIIe siècle qui a été reconstruit pierre par pierre en 1974 par la famille Chapalain sur la presquîle de Sainte-Barbe à Roscoff. Bénéficiant dun panorama stratégique unique, cest aujourdhui un  hôtel de charme et de design face au port et à l'île de Batz.                                                      KERESTAt, du XVIe siècle, restauré au XIXe siècle, édifié par la famille de Kerguvelen, puis propriété de James de Portenoire, du comte de Marbeuf, et, au XIXe siècle, de la famille dHerbais de Thun.  Tel un capitaine Haddock dans son Moulinsart, l'ancien capitaine au long cours, un temps compagnon du mercenaire Bob Denard, a ouvert le parc de son manoir du XVéme siècle, Kerestat, pour officiellement financer des travaux sur le bâtiment hérité de ses ancêtres.","habitants":"Digue ;la famille Laurent,                                                             Kezrnuz ; Famille de Armand du Châtellier                                        Brittani;                                                                                                     Kerestat;  famille de Kerguvelen\r\n        \r\n        \r\n        \"","divers":"A Roscoff le château de la Digue grav de 1 à 4  Brittany grav-7 ,  Kerestat grav 5- , Kernuz grav-6  et Roscoff  Maison gaillard  grav-8-9                                                                               la Digue GPS : 48° 43' 38\" Nord, 3° 59' 04\" Ouest","gps":"48° 43' 38\" Nord, 3° 59' 04\" Ouest","images":["../../jctruffet.com/image/image_29/29_Roscoff_1.jpg","../../jctruffet.com/image/image_29/29_Roscoff_2.jpg","../../jctruffet.com/image/image_29/29_Roscoff_3.jpg","../../jctruffet.com/image/image_29/29_Roscoff_4.jpg","../../jctruffet.com/image/image_29/29_Roscoff_5.jpg","../../jctruffet.com/image/image_29/29_Roscoff_6.jpg","../../jctruffet.com/image/image_29/29_Roscoff_7.jpg","../../jctruffet.com/image/image_29/29_Roscoff_8.jpg","../../jctruffet.com/image/image_29/29_Roscoff_9.jpg"]},"Consult_chateau_formulaire1771":{"id":"Consult_chateau_formulaire1771","dept":"29","canton":"Pont-de-Buis-lès-Quimerc","commune":"Rosnoën","nom":"Rosnoën","type":"Château","periode":"XVI-XIX","histoire":"trois châteaux  à Rosnoën; Kéronec, Kerrec et Toulancoat. KERONEC, acquisition du domaine par Henri Brosset de la Chaux, lieutenant de vaisseau, en 1897. Construction du logis entre 1901 et 1904 probablement d'après les plans de Laloy, architecte du département d'Ille et Vilaine depuis 1884. Gros oeuvre en schiste, chaînes d'angle, soubassement, baies et corniche en granite. Cuisine hors-oeuvre. Parquets provenant de bateaux désaffectés. Escalier de distribution à l'extérieur en maçonnerie. Escalier dans oeuvre en bois. Sur la lucarne nord et escalier armes de Brosset de la Chaux et Le Bastard de Mesmeur.                                                       KERREC, lieu noble attesté en 1426 appartenant à Guyomar Omnès, procureur du Vicomte du Faou. Manoir XVIe siècle déclassé en ferme au XVIIIe siècle. Logis construit en 1780 pour David de Penguern avec des matériaux provenant du manoir de Penguern en Lopérec. Vivier fin XVIIIe ou début XIXe siècle. Château à plan massé, plan double en profondeur, entrée centrée, logis à quatre pièces par étage, évier, passe plat.","architecture":"TOULANCOAT, les vestiges d'un logement et d'une chapelle sont les seules traces d'un manoir construit au XVIe siècle pour Charles Le Saulx de Toulancoat, notaire, et Catherine de Tréouret de Kerstrat. En 1682, le logis est entouré d'écuries, de jardins, d'un verger, d'une métairie et d'une chapelle. La distribution intérieure et la fonction des pièces sont connus par un inventaire de 1864. Ferme datant du milieu du XIXe siècle. Vers 1880, destruction du manoir et construction du château actuel pour Marie Philomène le Saulx de Toulancoat et Raoul Boscals de Réals. Communs avec logement, écuries, sellerie et remise achevés en 1888, travaux exécutés par l'entrepreneur Le Naour de Quimper. Liquidation et vente du domaine composé de 30 ha de bois et 13 fermes entre 1918 et 1920.\r\nLogis avec sous sol, un étage carré et comble à surcroît ; écuries, sellerie et remise à voitures en rez-de-chaussée et combles à surcroît flanqué d'un pavillon avec logement à un étage carré. Logis en pierre de taille de granite de Locronan, communs en moellon enduit. Escalier en bois.","habitants":"Keronec  Henri Brosset de la Chaux                             Kerrec ; David de Penguern                                                     Charles Le Saulx de Toulancoat,\r\n        \r\n        \r\n        \"","divers":"trois châteaux  à Rosnoën; Kéronec grav-3, Kerrec grav-4-5 et Toulancoat grav-1-2.6-7-8","gps":"","images":["../../jctruffet.com/image/image_29/29_Rosno%c3%a8n_1.jpg","../../jctruffet.com/image/image_29/29_Rosno%c3%a8n_2.jpg","../../jctruffet.com/image/image_29/29_Rosno%c3%a8n_3.jpg","../../jctruffet.com/image/image_29/29_Rosno%c3%a8n_4.jpg","../../jctruffet.com/image/image_29/29_Rosno%c3%a8n_5.jpg","../../jctruffet.com/image/image_29/29_Rosno%c3%a8n_6.jpg","../../jctruffet.com/image/image_29/29_Rosno%c3%a8n_7.jpg","../../jctruffet.com/image/image_29/29_Rosno%c3%a8n_8.jpg"]},"Consult_chateau_formulaire4d4f":{"id":"Consult_chateau_formulaire4d4f","dept":"29","canton":"Pleyben","commune":"Saint-Herbot-Loqueffret","nom":"Rusquec","type":"Manoir","periode":"XVI-XVII","histoire":"RUSQUEC, situé au bord de la rivière Ellez au nord (devenue lac à cet endroit à la création d'une centrale hydraulique qui canalisa malheureusement la plus belle cascade de Bretagne, d'une dénivellation de 70 mètres) , cet édifice consiste en un manoir à trois enclos : du nord au sud, le potager, puis le logis et ses dépendances, des remises, crèches, puits, aire à battre, fuie, et, en contrebas, le verger. L'ensemble est situé au sommet d'une colline proche de la chapelle Saint-Herbot (classée) où d'importantes foires et un pardon se déroulaient au début du XVIe siècle. Le premier seigneur du Rusquec apparut en 1427 à la réformation, et les plus anciennes archives du manoir conservées aux Archives départementales du Finistère sont postérieures au début du XVIe siècle. Il semblerait qu'une partie de la construction qui nous est parvenue soit l'oeuvre d'Anceau du Rusquec, mort en 1522, qui épousa en 1480 Françoise de Rosnyvinen, et de son fils, Anne Jehan, mort en 1536. Un corps de logis fut ajouté au nord au milieu du XVIIe siècle ; celui-ci est remisé en partie, oeuvre d'Alan de Kerlech du Chastel, marié à Renée de Lannion en 1637 .","architecture":"RUSQUEC , deux vasques situées dans le parc du manoir : inscription par arrêté du 7 août 1926 ; Façades et toitures du logis Ouest et son retour en équerre ; puits ; pigeonnier ; vestiges de l'ancien corps de logis du XVIIe siècle ; vestiges de l'enceinte du manoir inscription par arrêté du 26 mai 1986.","habitants":"Alan de Kerlech du Chastel\r\n        \"","divers":"A Saint-Herbot-Loqueffret château de Rusquec.","gps":"","images":["../../jctruffet.com/image/image_29/29_Rusquec_1.jpg","../../jctruffet.com/image/image_29/29_Rusquec_2.jpg"]},"Consult_chateau_formulaire7a09":{"id":"Consult_chateau_formulaire7a09","dept":"29","canton":"Quimperlé","commune":"Guilligomarc","nom":"Sach","type":"Château","periode":"XV-XVIII","histoire":"SACH, le manoir du Sac´h  est attesté comme lieu noble en 1443, il appartient alors aux Sauldraye originaires de Guidel dans le Morbihan et est habité par Jehan Le Guernec, métayer. Il appartient aux XVIe et XVIIe siècles aux familles Jégado et Bahuno. Le logis aurait été reconstruit au XVIIIe siècle. Le manoir et certaines fermes des environs de Botaval, appartiennent depuis la seconde moitié du XIXe siècle à la famille de Boisguéhenneuc. Le parc, dont l'aménagement remonterait au milieu du XIXe siècle, a fait l'objet, en 1992, d'un repérage dans le cadre du pré-inventaire des jardins remarquables du Finistère. Propriété de la famille de Raime à la fin du XIXe siècle, les bâtiments sont rasés au profit du château actuel, de la ferme modèle et des dépendances, construit en 1902 (date portée sur l'élévation) pour Raoul de Raime, maire de Guilligomarc'h, d'après les plans d'un architecte de Lorient, son nom reste obscur suite à la disparition des archives familiales. Les lambris d'une pièce de l'étage proviennent de l'ancien logis.","architecture":"SACH, le corps central du château, à un étage carré, est couvert d´un toit à longs pans, les pavillons d´angle, à deux étages carrés, sont couverts de toits en pavillon ; la partie sud-ouest abrite un sous-sol partiel. La ferme modèle est composée de trois corps de bâtiments donnant sur une cour. Le logis à étage, couvert d'un toit à croupe, est flanqué de communs en alignement, une remise en charpenterie et écuries (stalles, mangeoires) surmontées de greniers ferment la cour au sud et au nord.","habitants":"Famille de Boisguéhenneuc\r\n        \"","divers":"A Guilligomarc'h le château de Sach","gps":"","images":["../../jctruffet.com/image/image_29/29_Sach_1.jpg","../../jctruffet.com/image/image_29/29_Sach_2.jpg"]},"Consult_chateau_formulairea1bf":{"id":"Consult_chateau_formulairea1bf","dept":"29","canton":"Saint-Pol-de-Léon","commune":"Sibiril","nom":"Sibiril","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux à Sibiril; Kérouzère, Krerlan et Troheon.                  KEROUZERE, de 1425 à 1459 Jean de Kérouzéré le fait édifier,  à sa mort le domaine passe à sa soeur Marie  épouse de Jean de Kerymel de Coatinisan  mort en 1508 puis à son fils Guillaume.  Par alliance passe  en 1566 à la famille de Boiséon le possède jusqu'en 1680 qui passera à l'un de ses parents Yves de Poulpy seigneur de Lavengeat sénéchal et conseiller du roi, son neveu et héritier le comte de Mauron qui s'en défait en 1720 au profit des Rochefort, ensuite  en 1766,  les Penfétenyo puis en 1778  les Eon du Vieux-Châtel. La marquise de Piré née Eon y demeure pendant la Révolution sans être inquiétée et en 1821, son fils, le général de Piré vend le château à Jean-Baptiste Du Beaudiez puis passe à son héritier en 1856 à la famille de Rusquec qui le  firent restaurer. Puis passe en 1856 aux Kerdrel et aux  Lande de Calan les propriétaire actuels, actuellement, la propriété de la famille bretonne de La Lande de Calan, depuis le mariage le 21/05/1912 de Joseph de La Lande de Calan avec Agnès Audren de Kerdrel, décédée le 10/06/1914, à 23 ans, peu après avoir donné naissance à Olivier de La Lande de Calan, qui devint Maire de Sibiril, de 1941 et 1945, ainsi que de 1947 et 1951. Le château de Kérouzéré, est l'unique forteresse du XVe siècle, visitable, dans le Finistère classement par arrêté du 28 mai 1883. M. De Calan.  En Bretagne, seuls les châteaux de Brest et de Kérouzéré sont acquis à la cause du roi Henri IV.","architecture":"KEROUZERE,   le château  constitue un parfait exemple de ce que le terme château fort décrit; austérité et puissance, un style moins médiéval, notamment dans sa partie sud, la façade nord conservant son style d'origine. Le château-fort de Kérouzéré se compose à l'origine d'une série de bâtiments formant une courtine, flanqués de tours et d'un chemin de ronde crénelé pourvu de mâchicoulis. Le château perd sa tour sud ouest et sa courtine sud lors du second siège soutenu contre la Ligue, en 1590.                                                                                                            KERLAN, façades et toitures du bâtiment principal avec son aile en retour, façades et toitures du bâtiment Ouest ; mur reliant ces deux bâtiments : inscription par arrêté du 6 novembre 1969. Construction en granit formant le fond d'une cour bordée de constructions qui devaient former une enceinte dont le portail a disparu. Les fenêtres à meneaux présentent des linteaux ornés d'accolades. Le principal corps de logis se compose d'un bâtiment en équerre bordant en partie la cour au nord et à l'est avec une tourelle d'escalier découronnée. Porte du XVe siècle avec arcature en tiers point, colonnette et accolade. L'édifice est mentionné dans le cadre de la reddition du château de Kerouzéré aux Ligueurs, en 1590.                                                                                                                                                                        TROHEON;   le Manoir de Trohéon a été construit au XVIe siècle. Il devint la propriété de la famille de Kerhoent (ou Querhoent) au mariage de Nicolas, seigneur de Querhoent, mort en 1420, avec Anne Huon, héritière d'Éon, seigneur de Trohéon. Leur fils Pierre I de Querhoent et Trohéon était présent à la réformation de 1443. Il épousa une fille de Jean de Kérouzéré et fonda la chapelle Saint-Nicolas à Saint-Pol-de-Léon. Leurs successeurs furent respectivement Jean de Querhoent et Trohéon, puis Pierre II et Pierre III de Querhoent, etc. Par la suite leurs héritiers furent aussi seigneurs de Kergournadec'h en raison du mariage vers 1504 d'Alain de Kerhoênt avec Jeanne de Kergournadec'h. De nos jours, seul, un colombier subsiste de cet ancien manoir.","habitants":"Kerouzere; de  famille de Boiséon                                Troheon  ; famille de Kerhoent \r\n        \"","divers":"Deux châteaux à Sibiril; Kérouzère grav de 1 à 5  Kerlan grav 6-7-8 et Trohéon.                                                                                 GPS : 48° 40' 20\" Nord, 4° 4' 11\" Ouest                                                 Trohéon  GPS : 48° 39' 50\" Nord, 4° 03' 43\" Ouest","gps":"48° 40' 20\" Nord, 4° 4' 11\" Ouest","images":["../../jctruffet.com/image/image_29/29_Sibiril_1.jpg","../../jctruffet.com/image/image_29/29_Sibiril_2.jpg","../../jctruffet.com/image/image_29/29_Sibiril_3.jpg","../../jctruffet.com/image/image_29/29_Sibiril_4.jpg","../../jctruffet.com/image/image_29/29_Sibiril_5.jpg","../../jctruffet.com/image/image_29/29_Sibiril_6.jpg","../../jctruffet.com/image/image_29/29_Sibiril_7.jpg","../../jctruffet.com/image/image_29/29_Sibiril_8.jpg"]},"Consult_chateau_formulaire283d-2":{"id":"Consult_chateau_formulaire283d-2","dept":"29","canton":"Fouesnant","commune":"Saint-Evarzec","nom":"St_Evarzec","type":"Manoir","periode":"XIII-XVII","histoire":"MOUSTOIR, le Moustoir vient du breton \"moster\" qui veut dire monastère et Saint-Evarzec vient de \"Trefidoc\", un saint breton du VIe siècle. La trace des constructeurs du manoir et des premiers occupants reste inconnu à ce jour ; il faut attendre les débuts du XVIIe siècle pour connaître les propriétaires du lieu : la famille Toutenoutre, qui précède une illustre descendance : Charles d'Arenberg et Louise Marguerite de La Marck, Elisabeth limpératrice d'Autriche (Sissi), Marie-José, reine d'Italie, Albert II, roi des Belges et bien d'autres chanceux. En 2017 démarre une vaste restauration du manoir du Moustoir.","architecture":"MOUSTOIR, le manoir du Moustoir serait une ancienne commanderie des chevaliers hospitaliers de Saint-Jean-de-Jérusalem. Le manoir est construit dans le style gothique de la fin du XIIIe siècle et, chose assez rare.  Le manoir de style gothique, il date de la fin du XIIIe siècle et a conservé son imposante fortification, un rempart carré bordé d'un parapet à mâchicoulis qui a dans l'un de ses angles une échauguette. C'est désormais un hôtel de charme renommé \"Les Empreintes\".","habitants":"famille Toutenoutre\r\n        \"","divers":"A St-Evazec le manoir de Moustoir","gps":"","images":["../../jctruffet.com/image/image_29/29_St_Evarzec_1.jpg","../../jctruffet.com/image/image_29/29_St_Evarzec_2.jpg","../../jctruffet.com/image/image_29/29_St_Evarzec_3.jpg","../../jctruffet.com/image/image_29/29_St_Evarzec_4.jpg"]},"Consult_chateau_formulaire0d76":{"id":"Consult_chateau_formulaire0d76","dept":"29","canton":"Lesneven","commune":"St-Frégant","nom":"St_Frégant","type":"Château","periode":"XV-XVI","histoire":"LESVERN, manoir solide, bâti au XVe siècle, sur plan en équerre analogue à celui d'innombrables demeures seigneuriales, répandues tant en Bretagne que dans le reste du Royaume, et aussi bien à la ville qu'à la campagne. L'angle du logis est occupé par une tour à pan coupé. Elle est accostée d'une tourelle en encorbellement, abritant un escalier à vis en pierre. L'édifice a été l'objet d'une restauration accomplie avec une sûreté de goût qui fait honneur aux propriétaires actuels, conscients de la valeur inestimable de l'héritage. Construit au XVe siècle, le moulin à farine du manoir est considéré comme l'un des plus anciens de Bretagne. Il se distingue par la qualité de ses matériaux et de leur mise en oeuvre, en granit, en gros et moyen appareil et couvert d'ardoises. Jadis il était couvert en chaume, les cheminées prouvent qu'il était habité par le meunier avec sa famille. Transformé en résidence secondaire, ses mécanismes ont disparu. Éléments protégés MH : les façades et les toitures du manoir et du moulin : inscription par arrêté du 12 février 1971.","architecture":"PENMARCH, gentilhommière bretonne datant de 1540 avec une tour isolée semblant du XVe siècle. Le manoir a été construit pour la famille Penmarch, l'une des plus anciennes familles du Léon. Il se pourrait bien que la date de 1546, sur l'entrée principale, n'est relative qu'à une restauration et que l'édifice est d'un siècle plus ancien. Les seigneurs de Penmarc'h, remontent à Alain de Penmarc'h, en 1300 époux de Constance de Coëtivy, dont le fils Henry, est employé aux guerres de Flandres dans la compagnie du vicomte de Léon, en 1383. Le corps de logis possède, côté ouest, une aile en retour et du côté opposé, un donjon carré en saillie. Les fenêtres du premier étage et des mansardes ont des meneaux cruciformes. Les façades donnant sur la cour d'entrée sont percées de lucarnes à pignon décoré de pinacles et de crochets, ainsi que d'une porte à arc surbaissé et accoladé. La tour circulaire isolée est couronnée de mâchicoulis, elle renferme une salle carrée avec cheminée Renaissance. Éléments protégés MH : le corps de logis du XVIe siècle et la tour isolée : inscription par arrêté du 3 juin 1932.","habitants":"Famille Penmarch,\r\n        \"","divers":"Deux châteaux à st-Fregant Penmarc'h grav -3-4-5-6                      et Lesvern grav-1-2                                                                                                GPS : 48° 36' Nord, 4° 23' Ouest","gps":"48° 36' Nord, 4° 23' Ouest","images":["../../jctruffet.com/image/image_29/29_St_Fr%c3%a9gant_1.jpg","../../jctruffet.com/image/image_29/29_St_Fr%c3%a9gant_2.jpg","../../jctruffet.com/image/image_29/29_St_Fr%c3%a9gant_3.jpg","../../jctruffet.com/image/image_29/29_St_Fr%c3%a9gant_4.jpg","../../jctruffet.com/image/image_29/29_St_Fr%c3%a9gant_5.jpg","../../jctruffet.com/image/image_29/29_St_Fr%c3%a9gant_6.jpg"]},"Consult_chateau_formulairec7fe":{"id":"Consult_chateau_formulairec7fe","dept":"29","canton":"Briec","commune":"Saint-Goazec","nom":"St_Goazec_Kervoazec","type":"Château","periode":"XIX","histoire":"KERVOAZEC, date de 1850, à l'emplacement de l'ancien village de Tregoazec, pour Louis Monjaret de Kerjégu, député et conseiller général du Finistère. Celui-ci y pratiqua l'élevage des chevaux et y créa une ferme-école. Il légua son château à son frère, Louis Monjaret de Kerjégu. La fille de Louis, Anne Monjaret de Kerjégu, épousa le comte Eudes de Rouvroy de Saint-Simon (né le 5/06/1854 à Lorient, décédé le 31/01/1935 à Saint-Goazec), Maire de Saint-Goazec entre 1919 et 1929, neveu de Claude Henri de Rouvroy, comte de Saint Simon, fondateur du Saint-Simonisme), qui fit construire Ker Maunoir, une jolie demeure au fond du parc, pour sa fille. Dès 1932, après la mort d'Eudes de Rouvroy de Saint-Simon, le château, dénommé alors « château de Saint-Simon », passa à la famille de Foucault, suite au mariage de Pierre de Foucault (1888-1972) avec Geneviève de Rouvroy de Saint-Simon, fille d'Eudes de Rouvroy de Saint-Simon, qui y ouvrit un ouvroir à dentelle, de 1916 à 1928. Homme du XIXe siècle, partisan de l'action française dont il présida la section locale, il y organisa d'importantes réunions politiques à laquelle participèrent Léon Daudet et de nombreux camelots du roi.","architecture":"KERVOAZEC, le château fut occupé par l'armée allemande, dès mai 1944 puis servit de Centre de regroupement pour les enfants de Brest. Le Domaine de Kervoazec s'étendait alors sur 50 Ha, composé de jardins (dont un jardin d'hiver avec des plantes exotiques et de bois, disposant aussi d'un étang alimenté par une source, laquelle est désormais exploitée commercialement pour vendre de l'eau de source (marque « Isabelle ». Le parc actuel ne fait plus que 8 ha, le reste ayant été vendu en 1950. Le château de Kervoazec a fait l'objet de nombreuses rénovations depuis 1990.","habitants":"Louis Monjaret de Kerjégu,\r\n        \"","divers":"Château de Kervoazec à Saint-Goazec.                                                                                   GPS : 48° 09' 53\" nord, 3° 46' 51\" Ouest","gps":"48° 09' 53\" nord, 3° 46' 51\" Ouest","images":["../../jctruffet.com/image/image_29/29_St_Goazec_Kervoazec_1.jpg","../../jctruffet.com/image/image_29/29_St_Goazec_Kervoazec_2.jpg","../../jctruffet.com/image/image_29/29_St_Goazec_Kervoazec_3.jpg","../../jctruffet.com/image/image_29/29_St_Goazec_Kervoazec_4.jpg"]},"Consult_chateau_formulaire6d9f-3":{"id":"Consult_chateau_formulaire6d9f-3","dept":"29","canton":"Morlaix","commune":"Saint-Martin-des-Champs","nom":"St_Martin_Champs","type":"Château","periode":"XVI-XVII-XIX","histoire":"Saint-Martin-des-Champs quatre châteaux, Bagatelle, Pennele, Lannuguy, Porzantrez et Tréoudal.                                                                                                    BAGATELLE, de style Louis XV, d'abord appelé de Carman puis de Bagatelle, dont la première mention officielle remonte à 1754. La partie centrale présente un corps de logis saillant formant un octogone. Deux pavillons rectangulaires flanquent le bâtiment aux extrémités encadrent la cour d'honneur au fond de laquelle s'élève le manoir du XVIIIe siècle. Sur la façade principale  un avant corps polygonal surmonté d'un toit à pans, aux extrémités deux pavillons dissymétriques. Les fenêtres de la façade ainsi que les boiseries intérieures sont caractéristiques de l'époque Louis XV. Un jardin à la française orne la façade ouest. Éléments protégés MH : les façades et les toitures,  : inscription par arrêté du 20 septembre 1946.                                                                                                 LANNUGUY, construit dans la 2e moitié du XIXe siècle sur le site d'un ancien manoir dont ne subsiste d'un petit corps de logis au sud ; il appartient alors à la famille Hersart de La Villemarqué.  L'édifice primitif était, au XVIe siècle, la propriété de la famille de Cremeur, de nobles bourgeois de Morlaix. Lannuguy faisait jadis partie du fief de Pennelé. il appartient ensuite à la famille Toussaint Jean Hersart de La Villemarqué, dernier lieutenant du Roi au château du Taureau. Entre manoir et château, Lannuguy est un édifice original et pittoresque qui ne trouve guère d'équivalent dans la production châtelaine bretonne de la deuxième moitié du XIXe siècle, romantique, l'édifice s'inscrit dans un environnement comprenant un parc et des dépendances. Mme Josiane Grandchamp,chambres d'hôtes.","architecture":"PENNELE,  fut bâti pour Bernard Le Bihan, seigneur de Pennelé, qui épouse en 1528 Marguerite de Tréouret. Cette terre avait été achetée par la famille Le Bihan au puissant duc de Rohan. La famille Le Bihan de Pennelé est connue depuis Bernard Le Bihan, sénéchal de Morlaix en 1450. La dernière des Sévigné, Marie Charlotte de Sévigné-Montmauron, mariée en 1706 à Toussaint Le Bihan, seigneur de Pennelé, est décédée vers 1760 dans cette demeure. Le manoir devient ensuite la propriété de la famille Langle, en 1886, suite au mariage de Marie Zoé Le Bihan de Pennelé avec Henri Marie Joseph Alphonse de Langle, le 22 février 1886. Le domaine de Pennélé comporte une chapelle de Notre Dame de la Pitié et un très beau pigeonnier du XVIe siècle à lentrée du domaine, qui aurait été élevé par Jean Le Bihan, il porte ses armes ainsi que celles de son épouse née Marguerite de Tréouret.                                                            PORZANTREZ,  de style néo-classique  construit au cours du troisième quart du XIXe siècle. La propriété appartient au comte de Lauzanne au début du XXe siècle. Édifice de plan rectangulaire à élévation ordonnancée à sept travées. Les trois travées centrales, marquées par un léger massif en pierre de taille de granite, sont surmontées d'un fronton en attique ; elles comportent des baies en plein-cintre et des ordres superposés. Maçonnerie de moellon enduit avec soubassement, bandeaux horizontaux, balustrades, massif d'entrée, chaînes d'angle, corniche et lucarnes en pierre de taille de granite.                                                                TREOUDAL  a été construit au début du XXe siècle en agrandissement de deux corps de bâtiments anciens; il s'agit peut-être d'une reconstruction. C'est un édifice de plan allongé présentant plusieurs corps en saillie sur les façades édifié dans l'alignement de deux corps rectangulaires de deux travées chacun.","habitants":"Lannuguy ;Famille Hersart de La Villemarqué                         Pennele ; Famille Le Bihan\r\n        \"","divers":"Saint-Martin-des-Champs quatre châteaux, Bagatelle grav-1, Pennele grav-5-6, Lannuguy grav 2-3-4, Porzantrez grav_6. Tréoudal-grav-7                                                                                      Bagatelle; GPS : 48° 33' 58,04\" Nord, 3° 51' 36,81\" Ouest","gps":"48° 33' 58,04\" Nord, 3° 51' 36,81\" Ouest","images":["../../jctruffet.com/image/image_29/29_St_Martin_Champs_1.jpg","../../jctruffet.com/image/image_29/29_St_Martin_Champs_2.jpg","../../jctruffet.com/image/image_29/29_St_Martin_Champs_3.jpg","../../jctruffet.com/image/image_29/29_St_Martin_Champs_4.jpg","../../jctruffet.com/image/image_29/29_St_Martin_Champs_5.jpg","../../jctruffet.com/image/image_29/29_St_Martin_Champs_6.jpg","../../jctruffet.com/image/image_29/29_St_Martin_Champs_7.jpg","../../jctruffet.com/image/image_29/29_St_Martin_Champs_8.jpg"]},"Consult_chateau_formulaire5a7a":{"id":"Consult_chateau_formulaire5a7a","dept":"29","canton":"Saint-Pol-de-Léon","commune":"St-Pol de Léon","nom":"St_Pol_de_Léon","type":"Château","periode":"XV-XVII-XIX","histoire":"dans cet article quatre  châteaux à St-Pol de Leon; Kermorus et Kéroulas, Kerrom et Kersaliou                                                                                                KERMORUS   Sa construction date du XVe et XVIe siècle. Le manoir de Kermorus apparaît, dans les textes, au milieu du XVe siècle. Il appartenait à la Famille de Penfentenyo. Le manoir de Kermorus connut divers agrandissements et embellissements jusqu'à la fin du XVIe siècle, avant d'être mis en fermage et, peu à peu, délaissé, au profit de l'autre résidence des Penfentenyo, Cheffontaines, en Cornouailles. Il subsiste, aujourd'hui, un grand logis en équerre mutilé, du XIXe siècle, ainsi que les vestiges des communs et d'une fontaine. Le colombier et la chapelle ont disparu. Le logis conserve cependant son organisation d'ensemble et des dispositions architecturales et décoratives (escaliers en vis, poutraison, cheminées, fragments de peinture murale) qui témoignent de son importance passée et traduisent le passage du style Gothique à celui de la Renaissance.                                                                            KERROM, corps principal du logis du XVIIe siècle, agrandi au XVIIIe siècle. Aile ouest du logis, logement et communs construits avant 1848, colombier transformé. Château reconstruit au XIXe siècle sur le site d'un ancien manoir. Chapelle construite en 1640, détruite. Reconstruite en 1830 pour Francis de Miollis en remployant les matériaux de la précédente, élévation ordonnancée. Gros-oeuvre : granite, enduit partiel, pierre de taille, moellon. Couverture: flèche en maçonnerie, toit à longs pans, noue, croupe, pignon découvert en ardoise.","architecture":"KERSALIOU;  a été construit en 1510 par la famille de Kersaint-Gilly.   Le château de Kersaliou fut construit vers 1890 pour Louis-Marie-Floriant-Augustin, comte Gouyon de Beaufort demeurant au château de Keranroux en Ploujean. Kersaliou est acquis par Pierre Raindre en 1918, époux de Marie de Lallemand du Marais, puis en 1922 par une société \"Kersaliou\" qui organise des colonies de vacances. qui n'échappa guère à l'il de Gustave Flaubert. Le château est construit en raison de l'humidité excessive du manoir par un jeune propriétaire mais qui en fut vite incommodé et entreprit, au début du siècle, sa démolition, mais seule une aile en fit les frais. Il possède un parc boisé d'un hectare. l'édifice comprend quatre corps de bâtiments. Sur la gauche se trouve une imposante tour carrée à trois étages et flanquée de deux cheminées. Sur la droite se trouve une tour à toit plat et crénelé, le corps central est couronné de créneaux et comporte une terrasse bordée de balustres. Une aile droite (le corps de logis à toit triangulaire) est détruite par Pierre Raindre en 1920.                                                                                                 KEROULAS est un manoir bâti   en 1520, pour le chanoine Hamon Barbier de la Maison de Kerjean, Abbé de Saint-Mathieu et Archidiacre de Quéménédilly. Dans le quartier au Lin se passait la fabrication de draperies et de toiles de bateaux. Classé aux M.H. Il servit d'hospice en 1830 puis de petit séminaire (pensionnat) appelé le Petit Collège, contenant une chapelle (cédé par lEvêque de Quimper en 1861), d'où le nom de la rue adjacente. Lhôtel de Kéroulas est devenu par la suite une annexe de lhospice puis, aujourdhui un Centre Municipal. Le manoir de Kéroulas est inscrit aux M.H.","habitants":"Kermorus; Famille de Penfentenyo                                          Kerrom; Famille de Francis de Miollis                                   Kersaliou; Famille de Louis-Marie-Floriant-Augustin                                 Kéroulas; chanoine Hamon Barbier                              \r\n        \r\n        \"","divers":"Deux châteaux à st Pol; Kermorus grav 2-3 et Kéroulas  grav-1   Kerrom grav-7                                                     GPS : 48° 41' 10\" Nord, 3° 59' 06\" Ouest                                                              Kéroulas GPS : 48° 41' 10\" Nord, 3° 59' 06\" Ouest                                             Kersaliou grav 4-5-6  GPS : 48° 41' 10\" Nord, 3° 59' 06\" Ouest","gps":"48° 41' 10\" Nord, 3° 59' 06\" Ouest","images":["../../jctruffet.com/image/image_29/29_St_Pol_de_L%c3%a9on_1.jpg","../../jctruffet.com/image/image_29/29_St_Pol_de_L%c3%a9on_2.jpg","../../jctruffet.com/image/image_29/29_St_Pol_de_L%c3%a9on_3.jpg","../../jctruffet.com/image/image_29/29_St_Pol_de_L%c3%a9on_4.jpg","../../jctruffet.com/image/image_29/29_St_Pol_de_L%c3%a9on_5.jpg","../../jctruffet.com/image/image_29/29_St_Pol_de_L%c3%a9on_6.jpg","../../jctruffet.com/image/image_29/29_St_Pol_de_L%c3%a9on_7.jpg","../../jctruffet.com/image/image_29/29_St_Pol_de_L%c3%a9on_8.jpg"]},"Consult_chateau_formulaired6ea":{"id":"Consult_chateau_formulaired6ea","dept":"29","canton":"Saint-Pol-de-Léon","commune":"Saint-Pol-de-Léon,","nom":"St_Pol_de_Léon_II","type":"Château","periode":"XV-XVII-XIX","histoire":"Trois châteaux à  Saint-Pol de Léon; Kérantraon, Kéraudren, Kernevez.                                                                                                                                   KERANTRAON,  le manoir dit St-Etienne détruit.  Sur le site d'un manoir datant du XVIe et XVIIe siècle, un château neuf est construit en 1910 pour la famille de Kermoysan. Le château neuf est construit à l'écart, au nord-est du manoir ancien et des communs. Édifice de plan massé comprenant un corps principal rectangulaire, flanqué à l'est de deux hauts pavillons de plan carré; élévation ouest (antérieure) à cinq travées, la travée centrale se trouvant comprise dans un corps en pavillon en légère saillie et surélevé d'un étage, comme les pavillons latéraux de la façade ouest. Escalier dans oeuvre en charpente, tournant à retours avec jour. Toit à longs pans ; toit en pavillon recouverts d'ardoise. Maçonnerie enduite avec soubassement, encadrements de baies, chaînes d'angle, bandeaux et lucarnes en pierre de taille de granite. Les communs du XIXe siècle partiellement détruits vers 1980.                                                                                                                         KERAUDREN, le château de Keraudren appartenait à la famille Keraudren-Jacob en 1698. Aujourd'hui, il abrite un centre de loisirs et est entouré d'un très beau jardin d'agrément avec pelouse, groupe d'arbres et rocaille de jardin. Le parc de Keraudren accueille une importante collection de plantes anti-cancéreuses, fruit d'un projet inédit en Europe. L'objectif de ce jardin est de rappeler que la biodiversité est un précieux réservoir de substances utilisées pour leurs propriétés thérapeutiques...il abrite un centre de loisirs avec parc municipal.","architecture":"KERNEVEZ, l'ancien château de la Villeneuve, attesté au Moyen-Age et connu par des documents graphiques de la première moitié du XIXe siècle, existait encore en 1848. Il n'en subsiste qu'un vestige : la cheminée, datée 1627, qui a été remployée dans l'actuelle cuisine. Le château passa par mariage à la famille de Guébriant au XIXe siècle et une campagne de réaménagement du domaine fut entreprise. Il semble que dans un premier temps, les de Guébriant se soient contentés de vouloir aménager le parc sans toucher au château. Les plans signés par Buhler paysagiste, datant de 1845, sont organisés autour de l'ancien logis. Dans un deuxième temps, en 1849, le château fut reconstruit selon les plans de l'architecte suisse Froelicher. Le parc, entièrement clos de murs, a conservé une bonne partie des allées dessinées par Buhler. Autour de Kernévez sont disposées les écuries, des vestiges d'une chapelle provenant du manoir de Keriviry et une serre. De part et d'autre de l'entrée principale, deux maisons de gardes répondent à la ferme située de l'autre côté de la route, hors du parc. L'ensemble des bâtiments est contemporain du château de Kernévez. Ce domaine est très représentatif du mouvement de retour à la terre de la grande aristocratie légitimiste au milieu du XIXe siècle.  Éléments protégés MH : l'ensemble du domaine inclus dans les murs du parc : le château en totalité, les façades et les toitures des autres bâtiments, le parc en totalité et les murs du parc. Les façades et les toitures de la ferme située à l'extérieur du parc : inscription par arrêté du 6 novembre 1997.","habitants":"Kerantraon; Famille de Kermoysan                           Keraudren; Famille Keraudren-Jacob                      Kernevez; Famille de Guébriant \r\n        \r\n        \"","divers":"Trois châteaux à  Saint-Pol de Léon; Kérantraon grav 8, Kéraudren grav 1-2-3-4, Kernevezgrav-5                                         Kernevez GPS : 48° 40' 40\" Nord, 3° 58' 29\" Ouest","gps":"48° 40' 40\" Nord, 3° 58' 29\" Ouest","images":["../../jctruffet.com/image/image_29/29_St_Pol_de_L%c3%a9on_II_1.jpg","../../jctruffet.com/image/image_29/29_St_Pol_de_L%c3%a9on_II_2.jpg","../../jctruffet.com/image/image_29/29_St_Pol_de_L%c3%a9on_II_3.jpg","../../jctruffet.com/image/image_29/29_St_Pol_de_L%c3%a9on_II_4.jpg","../../jctruffet.com/image/image_29/29_St_Pol_de_L%c3%a9on_II_5.jpg"]},"Consult_chateau_formulaire287b-2":{"id":"Consult_chateau_formulaire287b-2","dept":"29","canton":"Morlaix","commune":"Saint-Thégonnec","nom":"St_Thégonnec","type":"Penhoat","periode":"XIV-XVI","histoire":"Deux châteaux à Saint-Thégonnec; Penhoat et Quelennec.\r\nPENHOAT  vestiges, c'est actuellement un des quatre châteaux féodaux du Finistère encore existants, resté en l'état depuis sa destruction. Le château a été élevé au XIIIe siècle par Guillaume, sire de Penhoat, au retour de la croisade de 1248. Des personnages ont marqué son histoire : Guillaume Pennehoz dit \"Le Tors Boiteux\", capitaine de Rennes en 1356 ; Jean de Penhoat, capitaine de Morlaix, amiral de Bretagne de 1400 à 1435 et Chambellan du duc Jean V. Françoise, sa petite-fille, l'une des plus riches héritières du duché de Bretagne, épouse Pierre de Rohan Gié, futur maréchal de France, d'où est issue la branche cadette des Rohan-Chabot.\r\nDu château construit sur une énorme butte, reste des vestiges imposants. Le château avait une forme presque triangulaire avec une tour à chaque angle. En 1991 a été créée une association \"Mémoire de Penhoat\" le but est de redonner vie au site, efforts récompensés, en effet la commune s'est rendue propriétaire du site et la consolidation des tours et la sécurisation de l'ensemble ont été réalisées. Eléments protégés MH : le château à savoir les vestiges des élévations du château, la partie dite \"basse-cour\" à l'ouest et la totalité des terrains d'assiette comportant les éléments de défense (fossés et douves) : inscription par arrêté du 21 juin 2006. propriété de la commune.","architecture":"QUELENNEC, siège d'une seigneurie mentionnée depuis le XVe siècle, transmis en 1587, par alliance, de la famille La Boixière à la famille Kerhoas. Le château de Quélennec a été restauré et partiellement reconstruit en 1921 par M. Jacques Laurent au début du XXe siècle. Aile de communs datant du XVIIe siècle. Ensemble de bâtiments disposés selon un plan en L. Le corps de logis, de plan allongé, est composé d'un pavillon central de deux étages carrés encadrés par deux corps de logis plus bas de chaque côté. Élévation de moellon avec encadrements de baies et lucarnes en pierre de taille de granite.","habitants":"Penhoat, Famille Jean de Penhoat                                                   Quelenec; Famille La Boixière\r\n        \r\n        \"","divers":"Deux châteaux à Saint-Thégonnec; Penhoat grav 1 à 3 et Quelennec grav 4-5                                                                   .Penhoat GPS : 48° 36' Nord, 4° 23' Ouest","gps":"48° 36' Nord, 4° 23' Ouest","images":["../../jctruffet.com/image/image_29/29_St_Th%c3%a9gonnec_1.jpg","../../jctruffet.com/image/image_29/29_St_Th%c3%a9gonnec_2.jpg","../../jctruffet.com/image/image_29/29_St_Th%c3%a9gonnec_3.jpg","../../jctruffet.com/image/image_29/29_St_Th%c3%a9gonnec_4.jpg","../../jctruffet.com/image/image_29/29_St_Th%c3%a9gonnec_5.jpg"]},"Consult_chateau_formulairee730-2":{"id":"Consult_chateau_formulairee730-2","dept":"29","canton":"Pont-de-Buis-lès-Quimerc","commune":"Saint-Urbain","nom":"St_Urbain","type":"Château","periode":"XV-XVIII","histoire":"Deux châteaux à St-Urbain; Beuzidou,  Kerdoulas et Créac'h Balbé  et à deux K.M. à l'Est à Dirinon château de Lesquivit.                                                                                    BEUZIDOU, château construit à l'emplacement d'un ancien édifice appartenant à la famille Courtois, puis à la famille Le Veyer et de Flotte. Au XVe siècle en effet, les Courtois sont les seigneurs de Beuzidou. En 1500, le manoir devient, à la suite d'un mariage, la propriété de la famille Le Veyer. En 1761 le mariage de Marie Le Veyer du Beuzidou avec Paul de Flotte est à l'origine de la famille de Flotte Le Veyer, qui est propriétaire de la demeure jusqu'en 1901. Au XXe siècle, l'édifice appartient au général de division Jacques de Parcevaux jusqu'à sa mort en 2009.                                                    KERDAOULAS, la tour d'angle de ce manoir date des années 1500. À l'origine, les seigneurs de Kerdaoulas sont les seigneurs de Névet. En 1455, Jeanne de Névet, dame de Kerdaoulas, épouse Alain Buzic. En 1695 cette famille se fond dans la lignée des Goezbriant. Dans les années 1890, la famille Bréart de Boisanger fait l'acquisition du manoir et s'y installe. Pendant la deuxième Guerre mondiale, l'amiral Pierre de Boisanger, alors maire de Saint Urbain, donne asile à des parachutistes anglais dans son manoir. C'est de Kerdaoulas que le 5 août 1944, le commando part pour attaquer la Kommandantur de Daoulas.","architecture":"CREAC'H BALBE, fut construit en 1860 pour la famille de Parcevaux, dont le petit fils, le Général Jacques de Parcevaux fut maire de Saint-Urbain dans les années 1980. S'appelait autrefois le Manoir de la Salle. En 1940 il accueille  l'école ménagère rurale et depuis 1967, Creac'h Balbé est la propriété de religieuses, \"les Filles du Saint-Esprit\", qui en font une maison d'accueil. Édifice néo-XVIIIe, de plan symétrique, composé d'un corps de logis central encadré de deux pavillons bas dans le même alignement. Élévation ordonnancée à cinq travées ; avant-corps central en légère saillie.   Vendu en 1926 à la famille Bréart de Boisanger, celle-ci en 1940 met le château à disposition des filles du Saint-Esprit qui y créent une École ménagère rurale, puis en 1967, une maison d'accueil ouverte à des groupes variés du monde ecclésial, religieux ou éducatif. Le château de Créac'h-Balbé est devenu depuis un centre Spirituel du Diocèse de Quimper.                                                                                                                              LESQUIVIT,  construit au XVIIIe siècle par la famille du Louët (par exemple Achille IV de Harlay, seigneur comte de Beaumont, avocat général au Parlement de Paris et conseiller d'État (décédé à Paris le 23 juillet 1717), époux de Anne-Renée Louise du Louet (fille unique de Robert-Louis du Louët, marquis de Coëtjunval (en Ploudaniel), doyen du Parlement de Bretagne, héritière de Coëtjunval, y habita au début du XVIIIe siècle). Le château de Lesquivit fut ensuite habité par la famille Bernard de Marigny. À la suite du décès le 16 février 1939 à l'âge de 93 ans de Fanny Barazer de Lannurien, vicomtesse de Lesguern (en Saint-Frégant), alors propriétaire du château,  il est mis en vente en 1939.","habitants":"Beuzidou;  famille Le Veyer                                                     Kerdaoulas :     famille Bréart de Boisanger                                      Créac'h;  du  Général Jacques de Parcevaux                   \r\n        \"","divers":"Deux châteaux à St-Urbain; Beuzidou grav-1 Kerdoulas grav 2 et Créac'h Balbé grav-3  et à deux K.M. à l'Est là dirinon château de Lesquivit grav 4.                                                             Beuzidou GPS : 48° 24' Nord, 4° 14' Ouest","gps":"48° 24' Nord, 4° 14' Ouest","images":["../../jctruffet.com/image/image_29/29_St_Urbain_1.jpg","../../jctruffet.com/image/image_29/29_St_Urbain_2.jpg","../../jctruffet.com/image/image_29/29_St_Urbain_3.jpg","../../jctruffet.com/image/image_29/29_St_Urbain_4.jpg"]},"Consult_chateau_formulaire001f":{"id":"Consult_chateau_formulaire001f","dept":"29","canton":"Morlaix","commune":"Sainte Sève","nom":"Ste_Sève","type":"Château","periode":"XIII-XV","histoire":"Trois châteaux  à Sainte-Sève  Kervéguen , Pananvern et le manoir du Grand-Plessis.                                                                                                   KERVEGUEN, la construction du manoir de Kervéguen date du XVIIIe siècle, il est le plus ancien édifice civil du pays bigouden. Sa construction date 1242 et 1272. Il est toujours habité par des membres de la famille qui en est à l'origine, d'abord la famille de Kervéréguen, puis en raison du mariage en 1651 de Marguerite de Kervéréguen avec Sébastien de Penfentenyo, de la Famille de Penfentenyo. Le manoir de Kervéguen est privé, fermé au Public. Il existe 4 châteaux à découvrir : le château du Dourdy, Kerpaul, le  Rose ,de la Forêt et 4 manoirs à découvrir :de Coadigou, de Kerenez, de Kervereguen,  de Moor Braz, de Briemen.","architecture":"GRANd-PLESSIS du XVIe-XVIIe siècles, propriété successive des familles Guicaznou, Leau de Kerbabu, Gouzillon et Kerret.\r\nPANANVERN  (ou Penvern) où serait peut-être né Napoléon Bonaparte est inscrit aux Monuments historiques par arrêté du 4 décembre 1968. Du manoir subsistent deux grands corps de bâtiments en équerre, flanqués à l'arrière de deux pavillons, dont l'un, en échauguette, repose sur un encorbellement historié. Un escalier de granit conduit, en treize marches, à un premier palier. Sept marches identiques prolongent l'escalier jusqu'au second palier limité par une balustrade en bois. La porte du manoir, voûtée en plein cintre, est surmontée d'un fronton triangulaire. Les autres ouvertures sont modernes. Propriété privée, il est fermé au public.\r\nLes restes du manoir de Fontaine-Blanche du XVIIe siècle.","habitants":"Famille de Kerneguen\r\n        \"","divers":"Trois châteaux  à Sainte-Sève  Kervéguen grav-5, Pananvern grav-3-4 et le manoir du Grand Plessis grav-1-2.                                 Ste-Sève  GPS : 48° 33' 29\" Nord, 3° 52' 34\" Ouest","gps":"48° 33' 29\" Nord, 3° 52' 34\" Ouest","images":["../../jctruffet.com/image/image_29/29_Ste_S%c3%a8ve_1.jpg","../../jctruffet.com/image/image_29/29_Ste_S%c3%a8ve_2.jpg","../../jctruffet.com/image/image_29/29_Ste_S%c3%a8ve_3.jpg","../../jctruffet.com/image/image_29/29_Ste_S%c3%a8ve_4.jpg","../../jctruffet.com/image/image_29/29_Ste_S%c3%a8ve_5.jpg"]},"Consult_chateau_formulaireee4e":{"id":"Consult_chateau_formulaireee4e","dept":"29","canton":"Morlaix","commune":"Taulé","nom":"Taulé","type":"Château","periode":"XIV-XIX","histoire":"Trois châteaux à Taulé ; Coatilès, Lannigou, Kerozal, Vieux-Chastel.                                                                                        COATILES   l'origine du fief remonterait au XIVe siècle, le château de Coatilès fut vendu en 1607 à la famille de Kergroadès. En 1663, Meusnier de Quatre-Marre entreprend des travaux de nivellement et l'aménagement de trois terrasses. Terrasses, colombier, chapelle et portail du XVIIe siècle. Le château est reconstruit à la fin du XVIIIe siècle par Mathurin Cornic. Agrandissement vers 1845 et en 1895. C'est un bâtiment de plan rectangulaire, élévation à cinq travées en moellon enduit avec entrée, encadrements de baies et chaînes d'angle en pierre de taille. Terrasse et jardin à la française.","architecture":"LANNIGOU château construit à la fin du XIXe siècle par le baron Cazin d'Honincthun, alors maire de la commune, sur une terre patrimoniale mentionnée depuis le XVIe siècle. Le château de Lannigou est un exemple intéressant d'un type d'édifice construit par la noblesse sur des terres patrimoniales à la charnière des XIXe et XXe siècles. Le bâtiment remplace un ancien manoir au centre d'un domaine foncier, mais s'il conserve des attributs castraux comme les tours ou des éléments fortifiés, il est aussi une demeure moderne et s'apparente, par la recherche d'effets pittoresques, à l'architecture de villégiature.                                                                              KEROZAL l'ancien manoir de Kérozal, édifié en plusieurs étapes par Jean Victor Lhuillier (1827-1888). La partie gauche de l'édifice date de 1890. La partie Est du château, édifiée par Blanche Lhuillier (épouse de Jean Victor), date de 1897. L'édifice devient ensuite la propriété de la fille de ces derniers, Blanche (1859-1950) épouse de Lucien Blavoyer (1870-1927). Le domaine est vendu vers 1937 à une communauté de soeurs Franciscaines. En 1972, l'édifice est acheté par les \"Genêts d'Or\" pour accueillir des enfants présentant des défiances intellectuelles ;Pour des raisons de sécurité, lédifice qui date du XIXe siècle, va être déconstruit. Mais la mémoire de « la grande maison » sera conservée.                                                                                                                             VIEUX-CHASTEL du XIXe siècle, ancienne terre noble est, en 1434, la propriété de Jehan du Faou, époux de Constance Penhoadic. On mentionne Jean du Faou (ou Fou) en 1467. Ollivier Quellen est mentionné en 1481 : ce dernier est marié avec Marie de Berien .","habitants":"Coatilés; Famille de Kergroadès                                                  Lannigou; Famille du baron Cazin d'Honincthun\r\n        \r\n        \"","divers":"Trois châteaux à Taulé ; Coatilès grav-1 et Lannigou grav-4-5-6 Kérozal grav 2-3 Penhoat grav -7  Vieux chastel-8","gps":"","images":["../../jctruffet.com/image/image_29/29_Taul%c3%a9_1.jpg","../../jctruffet.com/image/image_29/29_Taul%c3%a9_2.jpg","../../jctruffet.com/image/image_29/29_Taul%c3%a9_3.jpg","../../jctruffet.com/image/image_29/29_Taul%c3%a9_4.jpg","../../jctruffet.com/image/image_29/29_Taul%c3%a9_5.jpg","../../jctruffet.com/image/image_29/29_Taul%c3%a9_6.jpg","../../jctruffet.com/image/image_29/29_Taul%c3%a9_7.jpg","../../jctruffet.com/image/image_29/29_Taul%c3%a9_8.jpg"]},"Consult_chateau_formulaire2b23":{"id":"Consult_chateau_formulaire2b23","dept":"29","canton":"Morlaix","commune":"Henvic","nom":"Trogriffon","type":"Château","periode":"XVII-XVIII","histoire":"TROGRIFFON, le manoir de Trogriffon, La tradition locale rapporte que le dernier seigneur de Trogriffon, un Coatanlem de Rostiviec, aurait accepté de rester cloîtré dans le manoir pendant toute la période révolutionnaire, à condition d'avoir l'assurance de ne pas être inquiété par les patriotes henvicois et aurait profité de cette réclusion forcée pour rédiger un dictionnaire breton-français en sept volumes. Le manoir est passé par la suite par mariage de Marie de Coëtanlem de Rostiviec à la famille de L'Espine de Grainville.  À l'époque moderne, le manoir de Trogriffon  qui fut une simple gentilhommière appartenant à Jean Le Moyne, seigneur de Coatudavel, au XVe siècle devint propriété de la famille Tournemouche en 1578, passa aux mains des Quintin-Kerscao, puis des Coatanlem, enfin des Grainville. Le dernier seigneur du lieu, de Coatanlem de Rostiviec, serait resté claquemuré dans son manoir pendant la Terreur et n'aurait pour cette raison pas été inquiété par les patriotes de la commune. Ce manoir possédait une chapelle dédiée à sainte Marguerite et deux moulins dont un moulin à marée le long de l'estuaire de la Penzé.","architecture":"TROGRIFFON , sur les bords de la Penzé, encaissé dans un vallon étroit, date des XVIIe siècle et XVIIIe siècle et possède encore une tourelle du XVe siècle et un colombier du XVIe siècle, ainsi qu'un beau parc agrémenté d'un étang mêlant eau douce et eau de mer. Implanté au coeur d'un étroit vallon, « le domaine de Trogriffon, dont l'étymologie incertaine semble dérivée du vieux celte Afon et signifie rivière, précise Jean de Keranflec'h, propriétaire, a une origine ancienne et présente encore plusieurs attributs médiévaux ».Le parc et le jardin s'étendent sur 10 ha ; un ruisseau parcourt le domaine, traversant des prairies et alimentant une première retenue d'eau, avant de se confondre, en contrebas, avec le flux marin venu de la Penzé. Le grand étang d'eau douce et d'eau de mer mêlées, fermé par une digue et un ancien moulin à marée, est partiellement dominé par l'enceinte du manoir et le haut mur de la terrasse du jardin.Un jardin italien, en terrasse, de type Renaissance s'ouvre sur la façade arrière du manoir. Surplombant l'étang d'eau de mer, ce jardin d'agrément rectangulaire est orné d'ifs, de buis et de citronniers. Les châtaigniers et les pins de Monterrey et quelques autres arbres remarquables complètent le panorama offert au visiteur.","habitants":"Coatanlem de Rostiviec\r\n        \"","divers":"Château de Trogriffon  à Henric","gps":"","images":["../../jctruffet.com/image/image_29/29_Trogriffon_1.jpg","../../jctruffet.com/image/image_29/29_Trogriffon_2.jpg","../../jctruffet.com/image/image_29/29_Trogriffon_3.jpg"]},"Consult_chateau_formulairea999":{"id":"Consult_chateau_formulairea999","dept":"29","canton":"Saint-Pol-de-Léon","commune":"Cleder","nom":"Tronjoly_29","type":"Château","periode":"XVI-XVII","histoire":"TRONJOLY, date de 1534 au XVII et XIXe siècle. Le manoir de Tronjoly, fut construit pour Christophe de Kergoët. Cette vieille famille bretonne, citée dès 1256, compte parmi ses ancêtres, Yves, médecin des ducs Jean IV et Jean V, évêque de Tréguier en 1401. La famille de Kergoët, originaire de Dinéault en Cornouaille, serait d'une branche cadette de la famille des vicomtes du Faou. La présence d'un premier manoir, propriété de Guyon de Kergoët de Trojoly, est attestée en 1360. En 1738, Marie-Magdeleine du Kergoët de Tronjoly (1706-1758), fille d'Olivier-Gabriel de Kergoët, seigneur de Tronjoly et de Dame Françoise-Gabrielle de La Palue, épousa Claude Marie de Parcevaux, seigneur de Kerarméar. Claude-Marie de Parcevaux devint chef d'escadre des Armées Navales, en 1764. Leur fils cadet, Ambroise de Parcevaux, seigneur de Tronjoly (1747-1826), Chevalier de Saint-Louis, servit dans la Royale, comme Lieutenant de vaisseau du roi. Émigré en 1792, il participa à l'Expédition de Quiberon en 1795 et échappa de peu au destin de 750 royalistes et chouans, condamnés par les tribunaux révolutionnaires puis exécutés. Le Manoir de Tronjoly devint la propriété de la Famille du Penhoat dès 1883. En février 1944, François Hervé du Penhoat, aviateur ayant rejoint la France libre, trouva la mort au cours d'un exercice en Afrique du Nord. Son frère Jean décéda au combat, en septembre 1944, dans les Alpes. Le 24/02/1949, le corps de François Hervé du Penhoat fut ramené au manoir de Tronjoly.","architecture":"TRONJOLY, le manoir  dont le nom signifie \"jolie vallée\" adopte un plan typique des manoirs Léonards. Il est divisé en trois parties : un corps de bâtiment et deux ailes qui se joignent par une tour. Tronjoly est caractéristique dune architecture flamboyante du XVIe siècle. La présence d'un premier manoir, propriété de Guyon de Kergoët, est attestée en 1360. Si les meneaux, les rampants à crochets et les pinacles sont caractéristiques du XVe siècle, la construction de l'aile la plus ancienne, l'aile orientale, date cependant de 1535. Elle est édifiée par Christophe de Kergoët. Les autres parties de la demeure avec les gerbières à fronton triangulaire ou arrondi, relèvent de l'époque classique. Tronjoly est un exemple de la persistance du goût pour le flamboyant plaqué sur un bâtiment du milieu du XVIe siècle. La terrasse, bordée d'une balustrade, est terminée par une chapelle, de plan rectangulaire, du XIXe siècle, et par un pavillon, autrefois réservé au chapelain. Une vasque monolithique, d'inspiration italienne, occupe le milieu de la cour, la mode de ces fontaines se répand en Bretagne au XVIe siècle.\r\nÉléments protégés MH : les façades et les toitures du manoir, de la chapelle du XIXe siècle, des communs, du pavillon du chapelain et du colombier ; la balustrade de la terrasse et la vasque dans la cour ; l'escalier à vis en pierre avec sa voûte ; l'escalier en bois avec sa rampe en fer forgé et son plafond peint : classement par arrêté du 23 juillet 1981.","habitants":"Famille de  Christophe de Kergoët\r\n        \"","divers":"Château de Tronjoly à Cléder GPS : 48° 40' 26\" Nord, 4° 07' 14\" Ouest","gps":"48° 40' 26\" Nord, 4° 07' 14\" Ouest","images":["../../jctruffet.com/image/image_29/29_Tronjoly_29_1.jpg","../../jctruffet.com/image/image_29/29_Tronjoly_29_2.jpg","../../jctruffet.com/image/image_29/29_Tronjoly_29_3.jpg","../../jctruffet.com/image/image_29/29_Tronjoly_29_4.jpg","../../jctruffet.com/image/image_29/29_Tronjoly_29_5.jpg","../../jctruffet.com/image/image_29/29_Tronjoly_29_6.jpg","../../jctruffet.com/image/image_29/29_Tronjoly_29_7.jpg","../../jctruffet.com/image/image_29/29_Tronjoly_29_8.jpg"]},"Consult_chateau_formulaire2128":{"id":"Consult_chateau_formulaire2128","dept":"29","canton":"Plabennec","commune":"Tréguelou","nom":"Trouzilit","type":"Château","periode":"XVI","histoire":"TROUZILLIT, le manoir de Trouzilit est une vaste demeure qui date du XVIe siècle, qui se situe sur la route des plages et au bord de l'Aber. Vous serez accueilli par Stephan, qui vous proposera ses chambres d'Hôtes et gites ruraux.  Le Manoir de Trouzilit,  du XVIe siècle devenu un centre équestre et d'hébergement, est aussi un lieu de manifestations culturelles.","architecture":"TROUZILLIT à Tréglonou,  manoir du XVIe siècle a été acheté en 1963 à l'état d'abandon par la famille Stéphan, famille d'agriculteurs issue de Sibiril petite commune rurale située près de ST-Pol de Léon dans le finistère ; sans abandonner l'agriculture puisqu'on y élève aujourd'hui chevaux et bovins et cultive 80 ha , la famille Stéphan s'est ouvert petit à petit à l'opportunité de la diversification et à la restauration du patrimoine existant sur le site du manoir.","habitants":"Famille Stéphan\r\n        \"","divers":"Trouuzilit    GPS : 48° 33' Nord, 4° 32' Ouest","gps":"48° 33' Nord, 4° 32' Ouest","images":["../../jctruffet.com/image/image_29/29_Trouzilit_1.jpg","../../jctruffet.com/image/image_29/29_Trouzilit_2.jpg"]},"Consult_chateau_formulaire299d":{"id":"Consult_chateau_formulaire299d","dept":"29","canton":"Saint-Renan","commune":"Trébabu","nom":"Trébabu","type":"Château","periode":"XVI-XIX","histoire":"Deux châteaux à Trébabu Kerjean-Mol et  Kermorvan -Nève KERJEAN-MOL, ancien manoir construit au XVIe siècle, agrandi dans la deuxième moitié du XIXe siècle par la construction d'une aile en retour d'équerre et d'une tour. Sa chapelle privée est dédiée à Saint-Cado et à sainte-Anne. Propriété de la famille Mol qui se fond, dès 1733, dans la famille de Kersauson de Goasmelquin. Il appartient à la comtesse de Kersauzon au début du XXe siècle. C'est un bâtiment de plan en L. Agrandissement et restauration de style néo-gothique au XIXe siècle. Une tour dans oeuvre de plan carré établit la jonction entre les deux ailes de bâtiments. Elévation ordonnancée de moellon enduit avec encadrements de baies, lucarnes et encorbellement en pierre de taille.","architecture":"KERMORVAN-NEVE, le château fut construit au cours du troisième quart du XIXe siècle à lemplacement dun ancien édifice, propriété de la famille Kermorvan, puis de la famille Penfenteuniou au XVIe siècle. Il appartient à la comtesse de Kergariou au début du XXe siècle.\r\nLe corps de logis central, de plan rectangulaire, est encadré de deux tours sur les angles de la façade antérieure. Elévation ordonnancée à cinq travées en moellon enduit avec encadrements de baies, corniche et lucarnes en pierre de taille. Le parc comprend une chapelle et des communs.","habitants":"Kerjean-Mol  ;Famille Mol                                            Kermorvan -Nève ; famille Penfenteuniou \r\n        \"","divers":"Deux châteaux à Trébabu Kerjean-Mol grav-1et  Kermorvan -Nève grav 2-3-4-5","gps":"","images":["../../jctruffet.com/image/image_29/29_Tr%c3%a9babu_1.jpg","../../jctruffet.com/image/image_29/29_Tr%c3%a9babu_2.jpg","../../jctruffet.com/image/image_29/29_Tr%c3%a9babu_3.jpg","../../jctruffet.com/image/image_29/29_Tr%c3%a9babu_4.jpg","../../jctruffet.com/image/image_29/29_Tr%c3%a9babu_5.jpg"]},"Consult_chateau_formulaire4e9a":{"id":"Consult_chateau_formulaire4e9a","dept":"29","canton":"Saint-Pol-de-Léon","commune":"Tréflaouenan","nom":"Tréflaouenan","type":"Château","periode":"XV-XVI","histoire":"à Tréflaouenan ,trois châteaux Kerzelegan, Créach-Ingar et Kermelin.                                                                                                  KERZELEGAN date du XVe siècle. Ce manoir est composé d'un corps de logis en équerre, de la seconde moitié du XV siècle. Il fut remanié par la suite, avec, à l'angle des bâtiments, sa tourelle d'escalier circulaire, où il manque la salle sommitale. Le manoir de Kerzelegan a appartenu à : Jean Fréon, sieur de Kerzelegan en 1443-1446, Guillaume Fréon, vougier en brigandine à la montre de 1481, Jehan Fréon, en brigandine aux montres de 1503 à 1534, François Fouern en 1557, François de Coetnempren, sieur de Kerdelegan, époux de Marguerite du Lech, capitaine de Treflaouenan, en 1575, sous la Ligue, mort sans descendance, son frère Yves de Coetnempren, sieur de Crechengar, époux de Ambroise de Kerliviry puis de Marguerite de Kerouartz, leur fils Pierre de Coetnempren, sieur de Crec'hengar, Guverneur de Saint Pol de Léon en 1621, époux de Yvonne Françoise de Kerjar, leur fils François de Coetnempren, sieur de Crec'hengar, époux de Thomine de Pentrez, mort sans descendant, son frère Guillaume de Coetnempren, époux en 1648 de Gillette de Kerlech de Langalla, Anne Françoise de Coetnempren, dame de Mesilly et Crechengar en 1715, épouse de Maurice Le Floch, seigneur de Mézilly en 1698, sa fille Marie Claude Le Floch de Mérilly, épouse en 1696 de Jérôme de l'Estang, sieur de Rusquec et leur fils Ambroise Marie de Lestang, sieur de Rusquec, époux d'Anne Marie de Kergoet de Tronjoly puis, en 1734, de Marguerite Françoise du Dresnay.","architecture":"CREAC'H-INGAR, manoir du XVIe siècle. Construction en granit appareillé des XVIe et XVIIe siècles. La partie ancienne, de plan en L, comprend un escalier en granit à volée droite, et une grande salle ; une petite salle oblongue et un appenti dans la partie étroite. Au premier étage, une pièce contenant une cheminée est surnommée \"chapelle\" par la tradition. Cette salle servit sans doute de chapelle clandestine pendant la Révolution. Façades et toitures ; escalier intérieur avec sa rampe à balustres ; salle du premier étage dite chapelle avec sa cheminée: inscription par arrêté du 31 décembre 1979.                                                 KERMILIN, tout le long du côté extérieur de l'édifice, règne à sa partie supérieure une galerie couverte, également munie de mâchicoulis et de créneaux. On voit aussi du même côté quelques meurtrières pratiquées dans des temps plus modernes pour placer des fauconneaux, consiste en un corps de logis flanqué de deux grosses tours et en avant duquel est une cour environnée d'un rempart demi circulaire construit en pierres de taille. Dans l'épaisseur du mur de ce rempart étaient pratiquées des meurtrières par lesquelles on faisait agir les engins et machines de jet employées avant l'invention de l'artillerie pour la défense d'une place assiégée. On ne voit plus aujourd'hui que les ruines de ces fortifications.  il appartenait à une branche cadette de la famille de Tournemine et y avait été apporté par alliance d'un membre de cette branche avec une demoiselle de Plusquellec.","habitants":"Kerzelegan; Famille de Fréon                                      Kermelin ; Famille de  Tournemine\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":".\r\nà Tréflaouenan ,trois châteaux Kerzelegan gra-3,Créach-Ingar  grav 1_2  GPS : 48° 38' Nord, 4° 06' Ouest","gps":"48° 38' Nord, 4° 06' Ouest","images":["../../jctruffet.com/image/image_29/29_Tr%c3%a9flaouenan_1.jpg","../../jctruffet.com/image/image_29/29_Tr%c3%a9flaouenan_2.jpg","../../jctruffet.com/image/image_29/29_Tr%c3%a9flaouenan_3.jpg"]},"Consult_chateau_formulaire3542":{"id":"Consult_chateau_formulaire3542","dept":"29","canton":"Moëlan-sur-Mer","commune":"Trégunc","nom":"Trégunc","type":"Château-fort","periode":"XVII-XIX","histoire":"Trois châteaux à Trégunc;  Trévignon et Kerminaouët.
