ison d'un conflit de succession, Le Conseil départemental du Finistère a racheté le domaine en 2016. Lhistoire commence en 1971. Auguste Le Guellec, polytechnicien et administrateur de sociétés, achète 10 ha dans la baie de Douarnenez.Fabriquée en béton armé et granit, la bâtisse est en partie semi-enterrée. Les bâtiments sont disposés en L. En 1978, son propriétaire décède à Beaulieu-sur-Mer. Germaine Mazières, par un arrêté de « bien sans maître » est pris par la commune, en octobre 2013, avant que ne soit présenté un titre de propriété par la fille de Christian Gay de Vernon.                                                                                                                                                                             KERGONNEC. Pas d'image ni information","habitants":"Keryar;Seigneur locaux\r\n        \"","divers":"Trois châteaux dans cet article de Plonévez-Porzay ; Keryar gra-1-2-3, Roz-Tréfeuntec grav-4   et Kergonnec                                                         GPS : 48° 07' 30\" Nord, 4° 13' 12\" Ouest","gps":"48° 07' 30\" Nord, 4° 13' 12\" Ouest","images":["../../jctruffet.com/image/image_29/29_Plon%c3%a9vez_Porzay_1.jpg","../../jctruffet.com/image/image_29/29_Plon%c3%a9vez_Porzay_2.jpg","../../jctruffet.com/image/image_29/29_Plon%c3%a9vez_Porzay_3.jpg","../../jctruffet.com/image/image_29/29_Plon%c3%a9vez_Porzay_4.jpg"]},"Consult_chateau_formulaire07ce":{"id":"Consult_chateau_formulaire07ce","dept":"29","canton":"Saint-Renan","commune":"Plouarzel","nom":"Plouarzel","type":"Château","periode":"XV-XVII","histoire":"KERVEATOUX, la construction du manoir primitif, selon un plan en L, date au XVe siècle. Premier agrandissement au XVIIe siècle, puis transformation en ferme. L'aile Est devient une étable. Dans les années 1850, travaux de remise en état, l'ensemble est transformé en château, de plan irrégulier, disposé en U autour d'une cour centrale. La transformation aurait été confiée à l'architecte Bernier. Les différents corps de bâtiments, avec tours et pavillons, conservent une unité grâce à une ornementation architecturale inspirée du XVe siècle.","architecture":"KERVEATOUX , la distribution et le décor intérieurs datent de ce remaniement, avec remploi d'éléments (panneaux de bois sculptés, panneaux sculptés polychromes du XVIIe siècle). Les communs sont organisés autour d'une cour. Au nord du château, les jardins en terrasses suivent une composition axiale à partir d'un premier jardin d'agrément et de son bassin central. La première terrasse contient le potager, la seconde le verger. Le parc paysager conserve le tracé d'anciennes allées d'arrivée au château. Cette demeure est un bel exemple de restauration homogène réalisée dans les années 1880, de style néo-gothique.\r\nÉléments protégés MH : les façades et les toitures, l'ensemble du château, à savoir le château proprement dit (corps de logis principal et ailes en retour), l'ensemble des bâtiments de dépendances organisés autour de la cour située à l'ouest du château, le colombier ainsi que le jardin nord organisé en terrasses (jardin d'agrément et jardin potager: inscription par arrêté du 17 août 2007.","habitants":"Seigneurs locaux\r\n        \"","divers":"Kerveatoux  GPS : 48° 26' 01\" Nord, 4° 39' 39\" Ouest","gps":"48° 26' 01\" Nord, 4° 39' 39\" Ouest","images":["../../jctruffet.com/image/image_29/29_Plouarzel_1.jpg","../../jctruffet.com/image/image_29/29_Plouarzel_2.jpg","../../jctruffet.com/image/image_29/29_Plouarzel_3.jpg","../../jctruffet.com/image/image_29/29_Plouarzel_4.jpg"]},"Consult_chateau_formulaire2532":{"id":"Consult_chateau_formulaire2532","dept":"29","canton":"Lesneven","commune":"Ploudaniel","nom":"Ploudaniel_Trébodennic","type":"Château","periode":"XV","histoire":"TREBODENNIC,  le constructeur de ce château s'appelait Alain du Poulpry seigneur de Lanvengat, ecclésiastique du haut clergé du Léon, juriste, conseiller au parlement de Bretagne, décédé en 1599. Il transmit le château à un neveu de la branche aînée de la famille du Poulpry qui s'éteignit en 1789. Le château de Trébodennic connaitra divers propriétaires qui ont entrepris une démolition importante de la demeure, avant d'appartenir depuis 1850 à la famille Croc, celle-ci le remania au XIXe siècle.","architecture":"TREBODENNIC, de ce château daté de 1584, il ne reste que le corps de logis gauche, la partie droite avec deux tours carrées est une reconstruction du XIXe siècle. La façade de style Renaissance a belle allure avec ses trois lucarnes à frontons courbés, sa fine tourelle à encorbellement et sa magnifique entrée encadrée de splendides cariatides ornées de motifs curieux et délicats. Sur le fronton, couronné d'urnes à fleurs, figure une femme et un joueur de tambour, une flûte à la main. Le vantail en chêne, très décoratif, serait une figure de l'original. Pendant la Révolution, le château et ses dépendances furent vendus comme biens domaniaux. Un jour, dit-on, monté sur une tourelle afin de l'abattre, un démolisseur fit une chute mortelle, ainsi la tourelle fut sauvée.  Éléments protégés MH : les façades et les toitures du château : inscription par arrêté du 10 juin 1932.Madame Anne Louboutin Croc.","habitants":"Trébodennic ;Famille d'Alain du Poulpry\r\n        \r\n        \"","divers":"Château de Trébodennic à Ploudaniel","gps":"","images":["../../jctruffet.com/image/image_29/29_Ploudaniel_Tr%c3%a9bodennic_1.jpg","../../jctruffet.com/image/image_29/29_Ploudaniel_Tr%c3%a9bodennic_2.jpg","../../jctruffet.com/image/image_29/29_Ploudaniel_Tr%c3%a9bodennic_3.jpg"]},"Consult_chateau_formulaire6add":{"id":"Consult_chateau_formulaire6add","dept":"29","canton":"Landerneau","commune":"Plouedern","nom":"Plouedern","type":"Manoir","periode":"XVI","histoire":"KERGOAT, le manoir présente une architecture du XVI  le manoir de Kergoat (1871), édifié sur les ruines d'une ancienne demeure. Propriété de la famille de Kerguelen de Kerbiquet depuis le XVIIIe siècle avec une tourelle engagée dans la partie centrale et des lucarnes aux frontons de pierre sculptés. Lentrée de la cour est gardée par deux pavillons symétriques. Jean de Corran est seigneur de Kergoat en 1635. Sa famille originaire dÉcosse, est établie à Plougasnou aux XVe et XVIe siècles. Son fils Louis épouse Jeanne LHaridon de Kerantraon. La branche Corran séteint en 1762, le manoir est alors racheté par la famille Mazurié, seigneurs de Pennanech. À partir de 1831, il est vendu cinq fois, passant à la famille de Montfort en 1904.  En 1990, Michel Briat et sa fille Emmanuelle s'efforce de conserver au maximum la nature du parc d'origine, le manoir de Kergoat (1871), édifié sur les ruines d'une ancienne demeure. Propriété de la famille de Kerguelen de Kerbiquet depuis le XVIIIe siècle                                                                        KERVELEOC, appartenait à la famille Le Jar.","architecture":"KERGOAT, les propriétaires ont gardé autour de la demeure trois hectares de terres en parc et jardins. La façade sud, percée de grandes fenêtres, dont trois à lamiers a été remaniée au XVIIIe siècle. Une tour carrée fait un retour à léquerre à louest. La base ancienne est coiffée dun crénelage récent fait de briques rouges. Un bassin de pierres, avec en son milieu une vasque de Kersanton, agrémente le jardin. Un inventaire de 1847 répertorie de grandes variétés darbres fruitiers et ornementaux au nombre de trois mille.                                                                                                     KERVELEOC, ressemble davantage à une grande ferme du XVIe siècle. La façade en moellons a été remaniée, notamment par lagrandissement des baies. La porte en plein cintre, dorigine, est encadrée de pierre de taille, une petite ouverture de même style a été obturée. Les nouvelles fenêtres ont un encadrement de granit gris. Une avancée porte sur le côté ouest deux petits oculi en pierres et en façade sous le toit une pierre moulurée surmontée dune pierre sculptée. À lintérieur, lescalier de pierre est à volée droite jusquau premier étage  où les encadrements sont en pierres de taille  et à vis autour dun noyau central également de pierres. Il sélève dans une tour carrée que lon peut voir sur la façade arrière.","habitants":"Kergoat ; Famille de Kerguelen de Kerbiquet\r\n        \r\n        \r\n        \r\n        \"","divers":"A plouedern le château de Kergoat grav-1 et de Kerveloc grav-2","gps":"","images":["../../jctruffet.com/image/image_29/29_Plou%c3%a9dern_1.jpg","../../jctruffet.com/image/image_29/29_Plou%c3%a9dern_2.jpg"]},"Consult_chateau_formulaireca87":{"id":"Consult_chateau_formulaireca87","dept":"29","canton":"Plouigneau","commune":"ile du Louet_Plouezoc","nom":"Plouezoc","type":"Fort- châteaux","periode":"XVI-XIX","histoire":"Deux châteaux sur ile du Louet; Roc'hou, Trodibon et le fort du Taureau.                                                                                                               ROC'HOU, sur cette terre s'élevait déjà un manoir au XVIe siècle, les plus anciens propriétaires de la terre de Roc'hou sont les de La Haye, seigneur de Roc'hou et de Catgoualen, en 1558. Cet édifice du XVIe siècle est transmis par alliance à la famille du Dresnay en 1670, puis le domaine devient la propriété de la famille Mazurié de Pennaneach, de la famille Pastour de Kerjean en 1815. Le château est de plan en L. Maçonnerie de moellon enduit avec encadrements de baies et chaînes d'angles en pierre de taille de granite. La demeure appartient à la Comtesse Huon de Kermadech au début du XXe siècle. Une inscription est gravée au-dessus de la porte d'entrée : \"IHS 1711\".                                                                                                     TRODIBON, l'actuel château a certainement été reconstruit autour de 1900 à l'emplacement d'un édifice du XVIIIe siècle, lui-même remplaçant des bâtiments plus anciens. La propriété passe par héritage à la famille de Kersauzon en 1810 et y reste jusqu'en 1966. Le château est entouré d'un vaste parc et de nombreuses dépendances. Chapelle XVIIIe siècle.Edifice de plan en L. La façade principale est encadrée de deux avant-corps polygonaux. Maçonnerie de moellon enduit avec encadrements de baies, chaînes d'angles, bandeaux horizontaux, corniche et lucarnes en pierre de taille de granite.","architecture":"TAUREAU  est une île-forteresse, bien que plus proche de Carantec. Le château du taureau fut bâti, pour les bourgeois de Morlaix, en 1542, afin de défendre l'entrée de la rivière, des invasions anglaises. Construit par Jean-Siméon Garangeau et casematé par Vauban, en 1689, le château du Taureau servit de prison d'état, durant la Révolution Française (Romme, Soubrany et Bourbotte s'y poignardèrent, en 1795, pour éviter l'échafaud et après la Commune de Paris, Auguste Blanqui y fut emprisonné. En 1902, Prosper Hémon publie une brochure sur Sébastien du Trévou, un lieutenant de vaisseau, commandant de la corvette Le Papillon en 1787 et 1788. Les démêlés du comte du Trévou avec son équipage le firent enfermer au château de Taureau doù il voulut sévader. Son corps fut retrouvé fracassé sur les rochers de Plougasnou. Après avoir été une prison, le château du Taureau devint une résidence secondaire propriété de Mélanie Levêque de Vilmorin qui y donna des réceptions fastueuses dans la décennie 1930, puis une école de voile en 1960, qui ferma ses portes en 1980, faute d'entretien. Restauré par la chambre de commerce et d'industrie de Morlaix et 9 communes avoisinantes, ce « Fort Boyard » breton, se visite à nouveau en bateau depuis Carantec. En accostant, un escalier baigné par les vagues et un pont-levis permettent d'y accéder. On y découvre les anciennes chambres où la troupe était logée, des cachots et des caveaux voûtés. De la plate-forme supérieure, le panorama s'étend sur toute la Baie de Morlaix. Le site est désormais aménagé et sécurisé afin de recevoir les touristes. On peut y accéder en bateau au départ de la plage du Kelenn à Carantec ou du port du Diben à Plougasnou.","habitants":"Rochou;  famille du Dresnay                                                Trodibon ;  Famille de Kersauzon                                          Taureau ; Famille de Mélanie Levêque de Vilmorin\r\n        \r\n        \"","divers":"Deux châteaux sur ile du Louet; Rochou et le fort du Taureau grav 1-2-3-4 . Taureau GPS : 48°40'33\" Nord et 3°53'04\" Ouest                                                                                        Traudibon grav-5                                                                  Rochou  grav-7","gps":"48°40'33\" Nord et 3°53'04\" Ouest","images":["../../jctruffet.com/image/image_29/29_Plouezoch_1.jpg","../../jctruffet.com/image/image_29/29_Plouezoch_2.jpg","../../jctruffet.com/image/image_29/29_Plouezoch_3.jpg","../../jctruffet.com/image/image_29/29_Plouezoch_4.jpg","../../jctruffet.com/image/image_29/29_Plouezoch_5.jpg","../../jctruffet.com/image/image_29/29_Plouezoch_6.jpg","../../jctruffet.com/image/image_29/29_Plouezoch_7.jpg"]},"Consult_chateau_formulaire1fdf":{"id":"Consult_chateau_formulaire1fdf","dept":"29","canton":"Plouigneau","commune":"Plougasnou","nom":"Plougasnou","type":"Château","periode":"XVII","histoire":"a Plougasnou; Six châteaux dans cet article; Cosquer; Traon-ar-Run, Ruffelic, Germeur, Ponplaincoat et  ST-Samson.                                                                             COSQUER, à l'entrée de l'allée menant au manoir se trouvait la chapelle Sainte-Anne. L'entrée de la cour est formée d'un porche, double arcade en granit, porte cavalière et porte piétonne. A ce portail est accolé un pigeonnier contenant des nids taillés dans la pierre. Le bâtiment principal se dresse au fond de la cour. Dans le bâtiment de droite, un puits a été creusé dans la muraille, sous une arcade saillante accompagnée de deux consoles de granit pour déposer les seaux, et d'une auge pour les animaux. A l'intérieur, le manoir conserve des cheminées aux manteaux de bois sculpté et un escalier de pierre.                                                                                                    RUFFELIC, date du XVIIe siècle. Il y a un puits. Le manoir  fut la résidence du Recteur de Plougasnou au XVIIIe siècle et celle de François Louis de Kermerchou, sieur de Lézénor, vers 1772.  Jacques Boudin de Tromelin de Lanuguy (1751-1798), Major de vaisseau, a donné son nom à l'île Tromelin, comme raconté par Irène Frain dans son roman Les Naufragés de l'île Tromelin. Le Manoir de Tromelin est inscrit au titre des M.H. depuis le 16/08.1971. Il existe 2 autres manoirs à découvrir à Plougasnou : Le Manoir du Cosquer,pas d'information ni image.                                                                         TRAON-AR-RUN,  vers 1400, un des cadets, Jean de Tréménec, avait épousé Tiphaine de Trémédern, héritière de Traon-ar-Run. Pillé par les espagnols durant les guerres de La Ligue, il est transformé en poste d'observation jusqu'en 1598. Le manoir de Traon-ar-Run était en 1762 la résidence de l'écuyer Guy-Julien de Tréménec de la Salle, puis est passé entre les mains des familles de Crechquérault et Gicquay de Preissac.","architecture":"GUERMEUR (vers 1620). Propriété, en 1624, de Guillaume du Poulmic, maire de Morlaix.                                                                                                                                                PONTPLAINCOAT, du XVIe siècle. Hervé, seigneur de Kersauson, époux de demoiselle Isabelle de Pontplaincouët, est signalé dans un acte du 14 janvier 1472 : Lettres de respit concédées au dict Hervé, escuyer sieur de Kersauson, et à demoiselle de Pontplaincouët, sa compagne, par le duc de Bretagne. Propriété de la famille Quelen (Guillaume de Quelen, puis de la famille Pastour de Kerjean (vers 1610, suite au mariage de Jeanne de Quelen avec Valentin Pastour de Kerjean). A la fin du XVIIIe siècle, le manoir est vendu à des religieuses de Kertanguy qui fondent en 1840 une école pour jeunes filles. Entre 1920 et 1940 Pontplaincoët est une école gérée par les Soeurs du Saint-Esprit de Lannion. Il s'agit aujourd'hui d'un centre de vacances qui appartient depuis 1970 à la Ville de Paris.\r\n La mairie de Paris a mis en vente le manoir de Pontplaincoat depuis plusieurs mois et une nouvelle annonce immobilière vient de paraître tout récemment dans Le Figaro, confirme le maire de Plougasnou, Yvon Tanguy. J'ai mis en relation le vendeur et plusieurs promoteurs immobiliers. Sans succès pour l'instant».                                                                  SAINT-SAMSON  du XIXe siècle chambres d'hôtes de Franck et Florence.","habitants":"Ruffelic: François Louis de Kermerchou,               Pontplaincoat; Famille d'Hervé de Kersauson              Traon; Famille de Crechquérault\r\n        \"","divers":"Plougasnou; Six châteaux dans cet article; Cosquer Grav I-2-3; Traon-ar-Rungrav-5, Ruffelic Grav-6 ,  Sable grav-7 Germeur, Ponplaincoat  grav 4  et  ST-Samson grav-8 .                   GPS : 48° 42' 7,82\" Nord, 3° 47' 44,46\" Ouest","gps":"48° 42' 7,82\" Nord, 3° 47' 44,46\" Ouest","images":["../../jctruffet.com/image/image_29/29_Plougasnou_1.jpg","../../jctruffet.com/image/image_29/29_Plougasnou_2.jpg","../../jctruffet.com/image/image_29/29_Plougasnou_3.jpg","../../jctruffet.com/image/image_29/29_Plougasnou_4.jpg","../../jctruffet.com/image/image_29/29_Plougasnou_5.jpg","../../jctruffet.com/image/image_29/29_Plougasnou_6.jpg","../../jctruffet.com/image/image_29/29_Plougasnou_7.jpg","../../jctruffet.com/image/image_29/29_Plougasnou_8.jpg"]},"Consult_chateau_formulaire1877":{"id":"Consult_chateau_formulaire1877","dept":"29","canton":"Plouigneau","commune":"Plougasnou","nom":"Plougasnou_II","type":"Château manoir","periode":"XIV-XV-XVI","histoire":"Six chateaux dans cet article; Coran; Kerlessy, Kerverny, Kéricuff  Kerprigent et Thomelin                                                                                 CORAN , manoir du XVe siècle  XVIIe siècle. Salomon Corran est mentionné au nombre des nobles de Plougasnou en 1427. Détruit durant les guerres de la Ligue, le manoir est reconstruit en 1612 par Alain de Corran, conseiller du roi et époux de Guillemette de Coëtquelfen (leurs armes sont gravées sur le fronton du portail). En 1678, il est la propriété de Gabriel Yves de Corran, lieutenant général de la maréchaussée de Basse-Bretagne à Landerneau. La terre de Corran passe ensuite successivement entre les mains des familles de Kersauson, Trécesson de Campana, Le Diouguel, Boudin de Tromelin, Botmiliau et May qui entreprit une rénovation complète du manoir. En 1940-1944, Corran appartient à la princesse Poniatowska, puis au général du Crest de Villeneuve.                                                                                                         KERLESSY, Propriété de la famille Mériadec au XVe siècle, puis résidence de la famille de Trogoff (dès 1450). Le manoir est pillé et saccagé par les Espagnols en 1596. Maison natale du dominicain François de Trogoff (en 1680). KERVENY,   le manoir  du XVIe siècle). Propriété successive des familles Trélever, Coatanscour au XVIe siècle), Botherel (en 1679) ;                                                                                             KERICUFF  du XVIIe siècle. Le colombier date de 1709 et on y voit les armes de la famille Pastour. Propriété successive des familles Kermabon, Kermoysan, Pastour du Val, Le Roux de Kerninon.                                                       Chateau des SABLES,  hôtel 4 étoiles.","architecture":"A un k.M. au sud est à st-Jean du Doigt le château,  KERPRIGENT, en 1595, le manoir de Kerprigent est victime du brigand Guy Eder de La Fontenelle. Propriété des familles Trogoff au XVIe siècle, Boisriou au XVIe siècle, suite au mariage de François du Boisriou avec Marie de Trogoff, Quinquizou, Mol de Guerneles, Flotte, Kergrist suite au mariage de Jeanne de Flotte avec Charles de Kergrist. Après la mort de son mari, le 11 octobre 1876, Adeline fait raser l'ancien manoir et bâtit un château au cours de la deuxième moitié du XIXe siècle. Il appartenait, au début du XXe siècle, à M. Henri de Preissac, le domaine est ensuite transmis par alliance à la famille Kersauson. Bâtiment de style éclectique, de plan rectangulaire : le corps central à cinq travées, est encadré de deux pavillons. Maçonnerie de moellon enduit avec encadrements de baies, chaînes d'angle, perron et lucarnes en pierre de taille.                                                                                         TROMELIN, l'ancien manoir  du XVIe siècle, édifié en 1530 par René de Coetanscour et son épouse Catherine de Coëtnempren, seigneur et dame de Tromelin et de Kerbignon. Il devient ensuite successivement la propriété des familles de Toulbodou vers 1580, par alliance, Le Diouguel de Pennanrun  et Boudin de Launay. L'édifice est composé aujourd'hui de deux bâtiments en équerre dont l'un est accosté d'une tour. Les deux portes sont surmontées d'un double arc en ogive à accolade. On y trouve un puits sculpté.","habitants":"Coran; Alain de Corran                                                      Thomelin; Famille de Toulbodou                                                  Kerrigent;  famille Trogoff\r\n        \"","divers":"Six chateaux dans cet article; Coran grav-1-2 ;Kerlessy grav-5  Kerverny; Kéricuff  Kerprigent grav-3 et Thomelin  grav-4-5-6 Thomelin grav-6                                                                            GPS : 48° 41' 57,54\" Nord, 3° 49' 9,09\" Ouest","gps":"48° 41' 57,54\" Nord, 3° 49' 9,09\" Ouest","images":["../../jctruffet.com/image/image_29/29_Plougasnou_II_1.jpg","../../jctruffet.com/image/image_29/29_Plougasnou_II_2.jpg","../../jctruffet.com/image/image_29/29_Plougasnou_II_3.jpg","../../jctruffet.com/image/image_29/29_Plougasnou_II_4.jpg","../../jctruffet.com/image/image_29/29_Plougasnou_II_5.jpg"]},"Consult_chateau_formulaire4a66":{"id":"Consult_chateau_formulaire4a66","dept":"29","canton":"Plouigneau","commune":"Plougonven","nom":"Plougonven","type":"Château","periode":"XVIIXIX","histoire":"Deux châteaux à Plougonven; Rosampoul  et le manoir de Mezederm.                                                                                                                                  ROSAMPOUL,  construit au cours du troisième quart du XIXe siècle sur le site d'un ancien édifice (ruines subsistantes dans le parc, au sud-ouest du nouveau bâtiment) ; il appartient à la famille Boscal de Réals au début du XXe siècle. Edifice de plan symétrique composé d'un corps central encadré de pavillons saillants et de deux tours cylindriques sur la façade principale. Maçonnerie de moellon enduit avec étage de soubassement, encadrements de baies, chaînes d'angles, bandeaux horizontaux, corniche en pierre de taille. Pension de chevaux, activités équestres.","architecture":"MEZEDERM,  manoir Even Le Lagadec, frère de Jean, est seigneur du lieu en 1443. Louis le Lagadec, cité dans la réformation de 1535, avait épousé en 1513 Catherine Le Sénéchal de Coatélant. Le manoir tel qu'il se présente actuellement, a connu plusieurs périodes de construction : autour d'une cour quadrangulaire se trouve en effet un logis principal du XVe siècle (à l'ouest), un logis porche avec tour pigeonnier du XVIe siècle (à l'est), commun du XVIe siècle et un autre du XVIIIe siècle (au sud), une étable du début du XXe siècle accrochée au logis porche (au nord ouest), de cette même époque date une remise adossée au pignon nord du logis principal. Ajoutons enfin qu'au XVIIe siècle, une chapelle a été bâtie au nord-est, à l'extérieur de ce quadrilatère. Il existait un corps de garde à Mézédern comme en témoigne  les meurtrières.\r\nÉléments protégés MH : le manoir, y compris la chapelle : classement par arrêté du 31 août 1992.","habitants":"Rosampoul; famille Boscal de Réals                                       Mezederm; Famille de Louis le Lagadec\r\n        \"","divers":"Deux châteaux à Plougonven; Rosampoul -6  et le manoir de Mezederm grav 1 à 5                                                                      GPS : 48° 30' 47\" Nord, 3° 42' 15\" Ouest","gps":"48° 30' 47\" Nord, 3° 42' 15\" Ouest","images":["../../jctruffet.com/image/image_29/29_Plougonven_1.jpg","../../jctruffet.com/image/image_29/29_Plougonven_2.jpg","../../jctruffet.com/image/image_29/29_Plougonven_3.jpg","../../jctruffet.com/image/image_29/29_Plougonven_4.jpg","../../jctruffet.com/image/image_29/29_Plougonven_5.jpg","../../jctruffet.com/image/image_29/29_Plougonven_6.jpg"]},"Consult_chateau_formulaireaa40":{"id":"Consult_chateau_formulaireaa40","dept":"29","canton":"Plouigneau","commune":"Plouigneau,","nom":"Plouigneau","type":"Château","periode":"XVIII-XIX","histoire":"Trois châteaux à Plouigneau; Coetmen-Trojoa, Lannidy, Mur, et Kerrelou.                                                                                                   COETMEN-TROJOA, restauration d'un édifice plus ancien à la fin du XIXe siècle avec adjonction d'un pavillon et d'une tour d'escalier. Bâtiment de plan allongé composé d'un corps de logis encadré d'une aile de dépendances et d'un pavillon rectangulaire. Une tour d'escalier de plan carré et couverte en pavillon occupe l'angle du côté de l'aile latérale. Elévation de moellon enduit avec encadrements de baies, chaînes d'angle, bandeaux horizontaux, corniche et lucarnes en pierre de taille. Le château fut propriété successive des familles le Bouloigne en 1669, Chateaudassy, Jamin, Ploësquellec, Barrial du Breuil et Le Rouge de Guerdavid.                                                       LANNIDY, restauration dans le style néo-gothique de la deuxième moitié du XIXe siècle d'un manoir remontant au XVe siècle ayant appartenu à cette période à l'évêque de Tréguier, Jean Calloët. Puis il passe aux familles Du Dresnay par le mariage de la fille de Jean Marie du Marchallach avec le vicomte Vincent Joseph du Dresnay, député de Morlaix, puis Kersauson suite au mariage de Marie Louise du Dresnay avec Ludovic de Kersauson Vieux Châtel, aux La Jaille et aux Monnier. Le manoir possédait jadis une chapelle privée dédiée à Saint Idy. L'édifice possède une double tour : une grande hexagonale portants des ouvertures à meneaux sur ses pans, et une plus petite et à cul-de-lampe accolée à la grande.                                                                                                                      KERELLOU , le Manoir de Kerellou est unique en son genre. Ce manoir breton en pierre de granit date du XVIe siècle et, depuis 1982, est Gîte de France.","architecture":"LANLEY, le manoir de Lanleya du XVIe siècle, propriété de Mme de Lampezre, et des familles du Parc, Du Dresnay, Kermoisan (ou Kermoysan) et Kergariou (comte de Kervegant). Ce manoir, en partie ruiné, a été restauré à partir de 1991 par M. André Marrec, alors libraire à Plougasnou. A l'époque de la Révolution la terre de Lanley  appartenait à Messire Jonathas de Kergariou, comte de Kervégant, mort à Kergrist en Ploubezre le 17 floréal an II. Sa fille héritière de Catherine-Vincente-Reine, mariée en 1781 à Sébastien-François Barbier marquis de Lescoet, ayant émigré à Hambourg, la nation s'empara de ses biens et les mit en vente. Les manoirs et métairies de Lanleya furent acquis le 15 Messidor an VIII par les citoyens Dauxais et Yves Le Manach, tandis que le moulin devenait le 25 août 1808 la propriété de Monsieur Pezron et que le citoyen Yves Lelchat s'adjugeait la chapelle 1e 26 Floréal an III, au citoyen Yves Nigeou, parent d'un prêtre insermenté de Plouigneau, qui ne l'acheta que dans le but de la rendre un jour au culte catholique.                                                                                                                                                    MUR (du)  château construit au début du XVIIIe siècle pour Julien Croueze, il passe à la famille de Guernissac en 1772. En 1870, Louis de Guernissac restaure et agrandit (ou reconstruit, l'édifice et construit ainsi que les communs. Propriété de la famille de Penguern, et par alliance, à la famille Servin. Édifice de plan allongé symétrique ; sur l'une des façades, le corps principal est encadré de deux tours et de deux pavillons perpendiculaires, la travée centrale recevant un avant-corps couvert en pavillon. La façade opposée est occupé par un pavillon central. Élévation de moellon enduit avec encadrement de baies, bandeaux horizontaux, corps d'entrée, corniche et lucarnes en pierre de taille. Il possédait autrefois une chapelle privée.","habitants":"Coetmen :Famille Le Bouloigne                                              Lannidy;  Famille Du Dresnay                                                  Lanley; famille du Parc,\r\n        \"","divers":"Trois châteaux à Plouigneau;  Lanley grav-2-3-4  Coetmen-Trojoa grav-1, Kerellou grav-7-8 Lannidy grav-5 et Mur grav-6. Coetmen GPS : 48° 34' Nord, 3° 42' Ouest","gps":"48° 34' Nord, 3° 42' Ouest","images":["../../jctruffet.com/image/image_29/29_Plouigneau_1.jpg","../../jctruffet.com/image/image_29/29_Plouigneau_2.jpg","../../jctruffet.com/image/image_29/29_Plouigneau_3.jpg","../../jctruffet.com/image/image_29/29_Plouigneau_4.jpg","../../jctruffet.com/image/image_29/29_Plouigneau_5.jpg","../../jctruffet.com/image/image_29/29_Plouigneau_6.jpg","../../jctruffet.com/image/image_29/29_Plouigneau_7.jpg","../../jctruffet.com/image/image_29/29_Plouigneau_8.jpg"]},"Consult_chateau_formulaire59e7":{"id":"Consult_chateau_formulaire59e7","dept":"29","canton":"Morlaix","commune":"Ploujean","nom":"Ploujean","type":"Château","periode":"XIV-XVI","histoire":"Quatre châteaux à Ploujean Armorique et Nec'hoat. Kéranroux, Roch ar-Brini   et Traon-Freuteniou.\r\nAMORIQUE, avant le XIVe siècle, les terres de l'Armorique sont la propriété de Charles de Dinan, sire de Montafilant et de Bodister. Le domaine passe au XIVe siècle aux mains de Jouhan de Dinan, beau-frère de Du Guesclin et ensuite devient la propriété de la famille Foucault de Lescoulouarn, et de François de Goesbriand en 1590. Vers 1730, le domaine passe dans les mains des familles Le Minihy de Rumen et Mauduit du Plessis. Au XIXe siècle, suite au legs de Laure de Masson, épouse de Louis de la Villebiot, l'Armorique passe alors à la famille d'Armand de Lugré, et un nouveau manoir est construit vers 1887 par Armand de Lugré. Ce nouveau château possède deux tourelles. Christiane, fille d'Henri de Lugré et de Madeleine de Feydau, épouse André de Reffye et les héritiers de ces derniers vendent par la suite le domaine.                                             SUSCINIO,  le manoir de Suscinio appelé aussi la Maison Cornic-Duchesne, fut acquis par le corsaire Charles Cornic à la fin du XVIIIe siècle. Le parc botanique de Suscinio est un domaine de 3 Ha, agencé autour du manoir. Une promenade au cur du parc est loccasion de découvrir une succession de jardins, tous aussi surprenants les uns que les autres. Du jardin à litalienne avec ses terrasses encloses à la Vallée des mondes perdus, en passant par le jardin de la table ronde, véritable symbole celte, et le jardin potager. Le parc botanique de Suscinio a reçu le Label « Arbres remarquables de France ».","architecture":"KERANROUX, le domaine de Kéranroux se situe près de la rivière le Dossen en Ploujean-Morlaix sur la rive trégoroise.  Le château qui est une bâtisse de la seconde moitié du XVIIIe siècle est classé M.H. depuis 1992. La seigneurie de Kéranroux existe depuis 1301. Elle fut cédée au XVIIIe siècle à Madame de la Flugaye, née Sophie de Caradeuc.  Le bâtiment actuel remplaça l'ancien édifice et fut construit en 1773. Celui-ci devint la résidence de la famille de la Flugaye. Le bâtiment actuel fut construit en utilisant les pierres du premier château. Le propriétaire était Mr Du parc également seigneur de Plouégat-Guerrand et de Guerlesquin.                                                                                                         NEC'HOAT, l a construction du château de Nec'Hoat date du XVIe au XIXe siècle. Le château de Nec'hoat fait partie aujourd'hui des Gites de France où vous recevrez un excellent accueil pour un séjour inoubliable.\r\n TRAON-FreuteniouLe premier propriétaire connu du château est Sébastien du Trévou, seigneur de Traon Feunteniou qui fut condamné et emprisonné au château du Taureau en 1792 pour avoir maltraité son équipage alors qu'il commandait Le Papillon. Il dût aussi faire abattre un arbre sur deux de l'allée principale de sa propriété, peine très déshonorante à l'époque. Il réussit à s'évader du château du Taureau, mais fut retrouvé mort sur la côte de Térénez.  Peu après 1883, Ferdinand Foch, alors lieutenant-colonel épousa Julie Bienvenüe, originaire de Saint-Brieuc, et racheta le château à la famille La Jaille. C'est Anne Fournier, la fille du Maréchal, qui occupa la dernière le château, jusquà sa mort en 1981. Le propriétaire suivant, labée Coache, donna le château aux religieuses de Saint François d'Assise.","habitants":"Amorique; Charles de Dinan,                                    Suscinio;le corsaire Charles Cornic                                                       Keranroux; Madame de la Flugaye,\r\n        \"","divers":"Quatre châteaux à Ploujean Amorique et Nec'hoat. Kéranroux grav 4-5 Roch ar-Brini Grav-1-2-3-. Suscinio grav -6-7-8  traon Grav 9 GPS : 48° 36' 19\" Nord, 3° 50' 02\" Ouest                                                      Nes_Noat    GPS : 48° 36' 19\" Nord, 3° 50' 02\" Ouest                                     Traon 48° 36' 43\" nord, 3° 48' 28\" ouest","gps":"48° 36' 19\" Nord, 3° 50' 02\" Ouest","images":["../../jctruffet.com/image/image_29/29_Ploujean_1.jpg","../../jctruffet.com/image/image_29/29_Ploujean_2.jpg","../../jctruffet.com/image/image_29/29_Ploujean_3.jpg","../../jctruffet.com/image/image_29/29_Ploujean_4.jpg","../../jctruffet.com/image/image_29/29_Ploujean_5.jpg","../../jctruffet.com/image/image_29/29_Ploujean_6.jpg","../../jctruffet.com/image/image_29/29_Ploujean_7.jpg","../../jctruffet.com/image/image_29/29_Ploujean_8.jpg","../../jctruffet.com/image/image_29/29_Ploujean_9.jpg"]},"Consult_chateau_formulaire8387-2":{"id":"Consult_chateau_formulaire8387-2","dept":"29","canton":"Landivisiau","commune":"Plounéventer","nom":"Plounéventer","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux à Plounéventer; Brézal et Mézarnou. et Kergoat                                                                              BREZAL, la terre de Brézal est connue depuis 1378, elle est possession de Yvon Brézal, écuyer. La propriété passe  dans cette famille avec Jean qui épouse, vers 1400, Sybille de Rodalvez, Derrien Brézal qui épouse Marguerite de la Roche Vincent vers 1426, Guillaume Brézal en 1438, Yvon Brézal en 1479, puis Guillaume Brézal, page de la Reine de Bretagne, époux de Marguerite Le Sénéchal, vient habiter à Brézal, fait bâtir le moulin féodal et élever la chapelle de Pont-Christ en 1553. Le château devient ensuite par alliance la propriété des familles de Kersauzon en 1710. A cette date, le château de Brézal abrite un salon de poètes, dont les réunions sont connues sous l'appellation de veillées de Brézal. Il passe aux de Tinténiac vers 1775. Hyacinthe Joseph de Tinténiac ayant émigré en 1792, Brézal est vendu comme bien national et acheté par Radiguet qui y installe une filature. La propriété passe aux mains des familles Le Tom, Pouliquen vers 1808, Malin en 1814, Dodin du Breil vers 1818, Denis Véron en 1837, et à Guillaume Le Roux en 1847 qui démolit le château et construit un nouvel édifice. Actuellement, il appartient à Philippe et Marie Gourlaouen qui organisent des réceptions pour vos fêtes familiales.","architecture":"MEZARNOU, la construction du manoir, commanditée par Yves de Parceveaux et Jeanne de Kerven, est achevée dans les années 1525. Il se présente sous la forme d'un logis à cour fermée, dont le plan en équerre occupe les côtés nord et ouest. Ces deux ailes s'articulent de part et d'autre d'une tour d'escalier passant d'un plan octogonal à un plan carré. Une tourelle circulaire, en encorbellement dans la partie supérieure Est, dessert une chambre haute à feu. L'escalier principal en vis, en granit, par sa mise en oeuvre très soignée, est un des éléments majeurs de l'édifice. Le décor des façades sur cour, de style gothique flamboyant, est particulièrement riche sur la façade de l'aile nord, réservée à l'habitation seigneuriale. Le manoir possède une autre disposition rare en Bretagne: un passage voûté reliant l'aile ouest à un bâtiment de communs placé sur l'arrière qui rappelle les cross passage de certaines demeures anglaises de la même époque.   Éléments protégés MH : le manoir dans sa totalité, ainsi que le sol de la cour, le mur de clôture sud de la cour et le bassin qu'elle contient : classement par arrêté du 9 avril 2002.","habitants":"Famille de Brézal                                                                     Famille de Yves de Parceveaux\r\n        \r\n        \"","divers":"deux châteaux à Plounéventer; Brézal grav-1-2 et Mézarnou grav-3-4-5.                                                                                    Brezal GPS : 48° 31' Nord, 4° 13' Ouest","gps":"48° 31' Nord, 4° 13' Ouest","images":["../../jctruffet.com/image/image_29/29_Ploun%c3%a9venter_1.jpg","../../jctruffet.com/image/image_29/29_Ploun%c3%a9venter_2.jpg","../../jctruffet.com/image/image_29/29_Ploun%c3%a9venter_3.jpg","../../jctruffet.com/image/image_29/29_Ploun%c3%a9venter_4.jpg","../../jctruffet.com/image/image_29/29_Ploun%c3%a9venter_5.jpg"]},"Consult_chateau_formulaire672f":{"id":"Consult_chateau_formulaire672f","dept":"29","canton":"Landivisiau","commune":"Plouvorn","nom":"Plouvorn","type":"Château","periode":"XV-XVII","histoire":"Deux châteaux à Plouvorn; Keruzoret et Troerin.                            KERUZORET construit vers 1500. Édifice sur cour fermée, de plan en L, articulé autour d'une tour d'escalier polygonale. En 1537, construction d'une chapelle dans l'angle sud-ouest du jardin. En 1666, un pavillon est rajouté à l'est, ainsi que des communs attenants. En 1792 restauration de la propriété, avec suppression d'une partie des communs à l'est pour dégager une esplanade, et reconstruction à l'identique de la chapelle au sud-est. En 1865, l'architecte parisien Henri Parent est engagé pour transformer le manoir en château, travaux achevés en 1887. L'architecte recompose l'édifice en respectant le style gothique de l'ancien manoir. Le château s'élève d'un étage carré et combles selon un plan irrégulier en U. La tour d'escalier polygonale relie le corps de logis principal et l'aile en retour d'équerre à l'ouest, terminée par un pavillon de plan rectangulaire. A l'est, le corps de logis est flanqué d'un pavillon sur lequel se greffe une terrasse surélevée en retour sur la cour. Le pavillon Est est agrandi d'une tour carrée. L'ornementation est de style néo-gothique et néo-Renaissance. Le hall d'accès de l'entrée principale conserve l'escalier du XVIe, terminé par un plafond de dalles rayonnantes reposant sur l'amortissement mouluré du noyau. Boiseries sculptées du XIXe siècle. Communs définitivement séparés du château et  reconstruits au nord. L'architecte retravaille également l'environnement paysager. jamais vendu, par héritage  il est parvenu au comte et à la comtesse jacques de Menou.","architecture":"TROERIN   Sur le site d'un ancien manoir attesté dès 1413, dont subsistent un corps de bâtiment datant du XVIIe siècle (aile latérale Est datant du XVIIe siècle avec des remplois plus anciens), un colombier construit en 1578 (date portée, porte la date 1769 (remaniement de détail). Le manoir fut propriété de la famille Troërin, puis des familles La Tullaye et Boscal de Réals. En 1717, un plan est établi par Isaac Robelin pour la création de nouvelles terrasses pour l'établissement d'un parterre et d'un jardin potager, ainsi que d'un vaste bassin rectangulaire, miroir d'eau de la demeure dont le corps de logis principal présente un aspect austère tandis que l'aile en retour témoigne du manoir primitif. Les ruisseaux existants ont été captés et déviés de leurs cours initiaux afin d'assurer l'alimentation du logis, l'irrigation du jardin, l'alimentation du vivier et de l'étang, et le fonctionnement du moulin. Le corps de logis actuel est construit entre 1815 et 1825. Corps de logis de plan rectangulaire construit perpendiculairement à une aile de communs plus ancienne. Une tourelle dans oeuvre, de plan carré, assure la jonction entre les deux bâtiments. La façade principale comporte sept travées, la travée centrale, plus forte étant encadré de pilastres et surmontée d'un fronton triangulaire au niveau de la toiture. Élévation en moellon avec encadrement de baies, chaînes d'angle, pilastres, corniche et fronton en pierre de taille de granite.","habitants":"Famille Troërin\r\n        \r\n        \"","divers":"Deux châteaux à Plouvorn; Keruzoret grav 1-2-3 et Troerin grav-4-5.                                                                              Keruzoret GPS : 48° 35' 32,5\" Nord, 4° 02' 27,2\" Ouest","gps":"48° 35' 32,5\" Nord, 4° 02' 27,2\" Ouest","images":["../../jctruffet.com/image/image_29/29_Plouvorn_1.jpg","../../jctruffet.com/image/image_29/29_Plouvorn_2.jpg","../../jctruffet.com/image/image_29/29_Plouvorn_3.jpg","../../jctruffet.com/image/image_29/29_Plouvorn_4.jpg","../../jctruffet.com/image/image_29/29_Plouvorn_5.jpg"]},"Consult_chateau_formulaire797c":{"id":"Consult_chateau_formulaire797c","dept":"29","canton":"Plouigneau","commune":"Plouégat-Guérrand","nom":"Plouégat_Guérrand","type":"Château","periode":"XIV-XIX","histoire":"Deux manoirs à Plouegat-Guerrand dont  celui de Plouegat et celui de Goasmelquin.                                                                                         PLOUEGAT-GUERRAND,  l'ancien manoir à tourelle était la propriété de la famille Goudelin puis de la famille Kersauzon en 1703. Un château fut reconstruit dans la deuxième moitié du XIXe siècle sur le site. Edifice de plan rectangulaire allongé accosté (symétriquement) de deux pavillons latéraux en saillie sur la façade principale. La chapelle de Goasmelquin est un édifice de plan rectangulaire avec clocheton à dôme datée du XVIIIe siècle et dédiée à sainte Barbe.Edifice de plan allongé composé d'un corps de logis rectangulaire prolongé par une chapelle et sur lequel se greffent plusieurs éléments ; la façade principale est marquée par une tour polygonale saillante recevant l'entrée accostée d'une tourelle d'escalier et par un corps perpendiculaire d'entrée pour la chapelle. Un corps rectangulaire accosté d'un pavillon et d'une échauguette double le corps central sur l'arrière.Ensemble de communs et parties agricoles.L'ancien château de Guérand, construit au milieu du XVIIe siècle, est détruit vers 1840 et reconstruit avec ses matériaux à proximité de l'étang. L'édifice, agrandi en 1902, a été incendié dans la 1ère moitié du XXe siècle ; il est aujourd'hui ruiné.","architecture":"GUERRAND, la terre de Guerrand appartient au XIVe siècle à Yves Charruel, seigneur de Guerlesquin et de Guerrand. En 1637, les terres de Guerrand qui appartiennent à Vincent du Parc Locmaria sont érigées en marquisat par Louis XIII. C'est Vincent du Parc Locmaria qui fait construire la partie ancienne de la demeure. Son fils, Louis François du Parc fait bâtir le mur d'enceinte. Il épouse Marie Angélique de Kercadio, ils n'ont qu'un fils Jean Marie François qui meurt sans descendance en 1745. Ce dernier lègue le domaine à son cousin Charles Marie Gabriel du Parc, mort lui aussi sans descendance, en 1769. A cette date, Guérrand passe à la famille Quemper de Lanascol avec Charles qui émigre en Angleterre. A la Révolution, le domaine est vendu comme bien national à des négociants. La partie ouest du château est acheté en 1793 par Jean François Pezron. Puis Guérrand passe à la famille Micol, mais il est incendié en 1940. Henri, fils de Charles Micol, vend le domaine de Guerrand en 1973.","habitants":"Pouegat; Famille Kersauzon                                             Guerrand; Famille dYves Charruel,\r\n        \"","divers":"Deux manoirs à Plouegat-Guerrand dont  celui de Plouegat grav -1-2-3 et celui de Goasmelquin grav -4.  GPS : 47° 50' 04\" Nord, 4° 10' 05\" Ouest","gps":"47° 50' 04\" Nord, 4° 10' 05\" Ouest","images":["../../jctruffet.com/image/image_29/29_Plou%c3%a9gat_Gu%c3%a9rrand_1.jpg","../../jctruffet.com/image/image_29/29_Plou%c3%a9gat_Gu%c3%a9rrand_2.jpg","../../jctruffet.com/image/image_29/29_Plou%c3%a9gat_Gu%c3%a9rrand_3.jpg","../../jctruffet.com/image/image_29/29_Plou%c3%a9gat_Gu%c3%a9rrand_4.jpg"]},"Consult_chateau_formulairebf57":{"id":"Consult_chateau_formulairebf57","dept":"29","canton":"Pont-l","commune":"Pont-l","nom":"Pont_Abbé","type":"Château","periode":"XIV","histoire":"PONT  L'ABBE,  En 1350, Hervé IV, jetait les fondations d'une chapelle dans l'enceinte du château, mais en 1553, Charles de Quélennec passé au protestantisme, en chassait les chatelains, ce qui amena la ruine de l'édifice. Durant les guerres de la Ligue, Pont l'Abbé est aux mains du duc de Mercoeur. Les troupes du roi vinrent l'assiéger mais sans succès. En 1590, la forteresse est aux mains des royalistes. Le baron Toussaint de Beaumanoir étant au siège d'Ancenis, donna ordre au jeune sergent de Douarnenez nommé Trogoff de se porter au secours du château. Dès qu'il fut maître de la place, Trogoff inquiéta le pays par ses fréquentes sorties, pillant et brulant tout sur son passage. Les habitants demandèrent l'aide du Capitaine de Lézonnet, qui tenait garnison à Concarneau. Il accourut accompagné d'un grand nombre de paysans plus désireux de faire du mal aux royalistes que poussés par un zèle religieux. Le siège étant posé on fit jouer le canon contre la tour, les défenses et parapets, où il ne fit pas grand mal. Trogoff, s'avançant à regarder les assaillants par une petite lucarne fut tué d'un coup d'arquebuse. La garnison demanda à capituler, ce qui lui fut accordé. En 1675, se place la révolte du Papier timbré ou des Bonnets Rouges. Les paysans, protestant contre des nouvelles impositions, dévastèrent l'édifice et l'incendièrent. Au début du XVIIIe siècle, le chevalier d'Ernothon reconstruisit le corps de logis du château sur les anciennes caves. Le chevalier d'Ernothon devint fou et se jeta par l'une des fenêtres du château. A la Révolution le château servit de prison. Madame de Pompéry la Sévigné Cornouaillaise y séjourna. Le château passa à la Nation suite de l'émigration du baron Bande de Saint Père, et fut vendu comme bien national le 25 pluviose an VII. La ville de Pont-l'Abbé en devint acquéreur en 1836, installa les services municipaux, les écoles, la gendarmerie, et plus tard la justice de paix.","architecture":"KERLUT, le manoir de Kerlut est un petit château  construit à  Plobannalec-Lesconil, sur le Ster, en granit taillé. Il fut édifié, de 1896 à 1898, pour le Comte Arthur Janvier de La Motte. Un camping occupe maintenant le Domaine de Kerlut. Vous pourrez aussi y louer une salle et y organiser votre mariage.                                                                                                              KERNUZ, château construit au XVIe siècle sur le site d'une ancienne place forte ; le bâtiment a été fortement restauré et agrandi au XIXe siècle par Armand du Châtellier qui s'adresse à Joseph Bigot, architecte à Quimper. Les travaux, qui constituent la première grande \"restauration\" de l'architecte sont menés en plusieurs campagnes : construction de la partie ouest en 1843, restauration de la tour est en 1845, construction de la partie est en 1847. Surélévation au-dessus de l'arc en accolade, et construction en pendant, par Jean-Marie Abgrall au XXe siècle. Outre la chapelle mortuaire gothique en deux parties qui se trouve au fond de la propriété, le gisant de chevalier du Moyen Âge, une stèle de l'Âge de fer, un pigeonnier de 900 boulins, on trouve aussi un menhir, vestige de l'âge d'or intellectuel de Kernuz. Paul-Armand du Châtellier y créa un musée d'art préhistorique. Le dernier du Châtellier transformera finalement la demeure en hôtel-restaurant et centre équestre, avant qu'il ne ferme définitivement ses portes au public à la fin des années 90.                               TREBEHORET, le château de Trébéhoret a été construit au XIXe siècle. C'est un édifice de style classique composé d'un corps de logis rectangulaire à cinq travées sur lequel se greffent plusieurs pavillons du côté de la façade antérieure. Maçonnerie de moellon avec encadrements de baies, chaînes d'angle, corniche et lucarnes en pierre de taille.","habitants":"Pont-L'Abbé; Famille; baron Toussaint de Beaumanoir                                 Kernuz ; Famille Armand du Châtellier\r\n        \"","divers":"Trois châteaux à Pont l'Abbé  dont Pont l'Abbé, Kerlut grav-1  Kernuz  grav-2-3 et Trebahoret grav-4. pont-abbé grav- 5-à-9                                         Barons-GPS : 47° 52' 01\" Nord, 4° 13' 20\" Ouest                                    Kernuz GPS : 47° 52' 05\" Nord, 4° 13' 19\" Ouest","gps":"47° 52' 01\" Nord, 4° 13' 20\" Ouest","images":["../../jctruffet.com/image/image_29/29_Pont_Abb%c3%a9_1.jpg","../../jctruffet.com/image/image_29/29_Pont_Abb%c3%a9_2.jpg","../../jctruffet.com/image/image_29/29_Pont_Abb%c3%a9_3.jpg","../../jctruffet.com/image/image_29/29_Pont_Abb%c3%a9_4.jpg","../../jctruffet.com/image/image_29/29_Pont_Abb%c3%a9_5.jpg","../../jctruffet.com/image/image_29/29_Pont_Abb%c3%a9_6.jpg","../../jctruffet.com/image/image_29/29_Pont_Abb%c3%a9_7.jpg","../../jctruffet.com/image/image_29/29_Pont_Abb%c3%a9_8.jpg","../../jctruffet.com/image/image_29/29_Pont_Abb%c3%a9_9.jpg"]},"Consult_chateau_formulaire332f":{"id":"Consult_chateau_formulaire332f","dept":"29","canton":"Moëlan-sur-Mer","commune":"Pont-Aven","nom":"Pont_Aven","type":"Château","periode":"XII-XVII-XVIII","histoire":"trois châteaux à Pont-Aven;  Kerangosquer, Plassis-Nizon et Rustephan.                                                                                                              KERANGOSQUER, ce hameau, datant probablement du XVIIIe siècle, est constitué de trois habitations et de leurs bâtiments d'exploitation, d'un puits et d'un four. Les bâtiments sont disposés autour d'une cour ouverte au sud-est et en partie délimitée par une clôture. La particularité de ces constructions est d'avoir conservé une toiture de chaume, malheureusement en mauvais état. On note aussi, en dehors des murs en granit, petit appareil ou pierre de taille autour des ouvertures, l'utilisation d'orthostats (technique de la pierre debout) pour délimiter une cour et pour former un appentis. Beau parc et jardin d'hiver.  Découvrez l'authenticité d'un manoir breton et profitez de son magnifique parc arboré, dominant la célèbre cité des peintres qui a accueilli entre autres Emile Bernard, Paul Sérusier, Xavier Grall et Paul Gauguin.\r\nÉléments protégés MH : le puits : inscription par arrêté du 22 mars 1930. L'ensemble du domaine : les trois maisons d'habitation, les bâtiments d'exploitation et le four : inscription par arrêté du 4 février 1988.","architecture":"PLESSIS-NIZON  Situé sur les hauteurs de Pont-Aven, le château du Plessis, construit pour la famille Feydeau au début du XVIIe siècle, fut ensuite la demeure de la famille de la Villemarqué, propriétaire du Bois dAmour et de la chapelle de Trémalo. Il faut préciser qu'avant les peintres, ce sont les moulins et leur concentration qui ont fait la réputation de Pont Aven. En effet, en amont et en aval du pont principal séchelonnaient une quinzaine de moulins. Le moulin du Plessis qui tire son nom du manoir, situé au lieu-dit Mainguinis, est aujourd'hui démoli. Il était le fief de la famille du Plessis depuis 1426 (citée cette année-là lors d'une réformation de la noblesse de Bretagne). En 1690, la famille tombe en quenouille et l'héritière Marie-Anne, fille de Georges du Plessis, épousa Charles Feydeau de Saint-Rémy, chevalier de Malte. Cette famille tomba à son tour en quenouille en 1798, année où Marie-Ursule Feydeau de Saint-Rémy épousa le comte Pierre Hersart de La Villemarqué. Ils eurent 8 enfants dont le plus jeune fut Théodore Hersart de La Villemarqué, l'auteur du Barzaz Breiz.                                                                                                              RUSTEPHAN  vestiges;   le château aurait été construit, à l'origine, par Etienne, comte de Penthièvre, au XIIe siècle. Les vestiges actuels remontent à la reconstruction du XVe siècle. Pendant la Révolution l'ensemble a été vendu comme bien national, puis les pierres du château de Rustéphan ont servi à la construction des fermes des alentours. La tour d'angle contient un escalier ayant conservé son noyau intact. Cette tour aurait servi de modèle lors de la construction du château de Keriolet situé à Concarneau. A l'ouest, le pignon est flanqué d'une tourelle en cul de lampe de style Renaissance. Éléments protégés MH : le château de Rustéphan à Nizon (vestiges) : inscription par arrêté du 10 mai 1926.","habitants":"Keran; seigneur local                                                                  Plessis;   famille Feydeau                                                           Rustephan ;comte de Penthièvre\r\n        \"","divers":"trois châteaux à Pont-Aven;  Kerangosquer grav1-2-3, Plassis-Nizon grav-4 et                                                               Rustephan  grav 5                                                                                              GPS : 47° 51' 50\" Nord, 3° 46' 04\" Ouest                                                                  Rustephan GPS : 47° 51' 31\" Nord, 3° 46' 01\" Ouest                                   Kerminaouët GPS : 47° 50' 45,01\" Nord, 3° 48' 33,87\" Ouest","gps":"47° 51' 50\" Nord, 3° 46' 04\" Ouest","images":["../../jctruffet.com/image/image_29/29_Pont_Aven_1.jpg","../../jctruffet.com/image/image_29/29_Pont_Aven_2.jpg","../../jctruffet.com/image/image_29/29_Pont_Aven_3.jpg","../../jctruffet.com/image/image_29/29_Pont_Aven_4.jpg","../../jctruffet.com/image/image_29/29_Pont_Aven_5.jpg"]},"Consult_chateau_formulairefcae-2":{"id":"Consult_chateau_formulairefcae-2","dept":"29","canton":"Carhaix-Plouguer","commune":"Cleden_Poher","nom":"Pratulo","type":"Château","periode":"XIV","histoire":"PRATULO,  a été construit en 1420 par un cadet de la maison des Douglas, proche parent du roi dÉcosse de lépoque, un Stuart. Envoyé avec une armée de 7.000 hommes au secours de Charles VII, très mal en point face aux anglais (époque de Jeanne dArc). Ce jeune homme se montra un très bon Général puisquil gagne plusieurs batailles pour le roi de France. Celui-ci pour le remercier le nomma Duc de Touraine. Au cours de ses nombreux voyages, notamment en Bretagne, il rencontra la dame de Pratulo, en tomba amoureux, lépousa et y demeura le reste de sa vie.\r\nEt cest pour commémorer le souvenir de ce prince écossais de la maison royale des Stuart, venu au secours du roi de France, que le moulin situé à 400 mètres du château (sur lAulne) porte encore son nom. En effet, le moulin vert est le diminutif du nom breton « Mael Douglas » moulin de Douglas devenu au cours des siècles Mael Glas, en français : moulin vert. Le pigeonnier, les remparts avec des tours à meurtrières entouraient six hectares de jardins à la française. Le pont de 53 mètres sur lAulne, ainsi que le barrage seraient aussi son uvre.  Les Douglas firent souche à Pratulo, mais en 1650, leurs descendants neurent quune fille unique qui épousa la Marquis de Muzillac. La famille Muzillac transforma Pratulo, façon XVIIIe siècle, notamment en agrandissant les fenêtres, alors quauparavant ce nétait que des petites fenêtres à meneaux.  Étant sans postérité, les Muzillac vendirent la propriété en 1806 à la famille Jégou du Laz dont les descendants l'habitent toujours.","architecture":"PRATULO, le comte Jégou du Laz, dont on rappelle le souvenir à la maison du canal au Pont-Triffen, fit beaucoup pour la région. Il acheta notamment deux péniches pour remonter le sable calcaire de la rade de Brest, ce qui a permis dintroduire lassolement tréénal et faire de cette région une riche région délevage. En 1906, le Comte Adolphe du Laz, dune descendance de 10 enfants, construisit un château qui brûla en 1946. Un dicton disait que Pratulo et Trévarez (à Châteauneuf du Faou) seraient anéantis pendant une révolution, ce qui est malheureusement arrivé. La famille est revenue dans cette demeure, vieille  de 600 ans, avec dénormes travaux de restauration puisque pendant 40 ans, Pratulo avait été abandonné et était devenu un bâtiment de ferme. En 1965, en raison des dégâts occasionnés par les nombreux promeneurs, la famille du Laz décidèrent de créer un terrain de camping qui est encore existant actuellement, ce qui a permis la restauration de la propriété.                            Pratulo : le château moderne construit en 1906, mais brûlé en 1946","habitants":"famille de Muzillac \r\n        \"","divers":"Château de Pratulo à Cleden poher gps 48° 14' 11\" nord, 3° 40' 02\" ouest","gps":"","images":["../../jctruffet.com/image/image_29/29_Pratulo_1.jpg","../../jctruffet.com/image/image_29/29_Pratulo_2.jpg","../../jctruffet.com/image/image_29/29_Pratulo_3.jpg","../../jctruffet.com/image/image_29/29_Pratulo_4.jpg"]},"Consult_chateau_formulaired49a":{"id":"Consult_chateau_formulaired49a","dept":"29","canton":"Plouigneau","commune":"Guerlesquin","nom":"Présidial","type":"Château","periode":"XVII-XIX","histoire":"PRESIDIAL, la promenade du centre historique de Guerlesquin vous emmène à l'exploration dédifices des XVIe au XIXe siècles aux noms tantôt évocateurs, tantôt mystérieux : la maison de la Tourelle, face aux halles, la maison de Kernaman, aux huisseries originales (il de buf et ouvertures moulurées), la maison du Bourreau sont du XVIe siècle. Parmi elles, la belle maison du Sénéchal aux lucarnes Renaissance qui trône face à la Place du Martray du XVII ou encore cette ancienne demeure de 1787 qui compte au total 27 ouvertures L'exploration touristique de Guerlesquin ne sarrête pas à ses places principales : le visiteur est invité à parcourir les petites rues adjacentes, comme \"Park ar Piz\" qui offre une superbe vue sur les toits des maisons nobles et sur leurs tourelles descalier. Des trésors darchitecture vous attendent dès lors que vous franchirez les nombreux porches dentrée. Attention, vous entrez dans une propriété privée, soyez discrets Aux 16e et 17e siècles, la cité renforce ses fonctions de marché et de justice. En témoigne la prison seigneuriale, appelée Présidial, qui prend la forme dune petite forteresse. Une importante corporation de tailleurs de pierre se met à luvre pour créer de nobles demeures. En vous attardant sur la place centrale aux exceptionnelles dimensions, vous admirerez les façades ouvragées, les corniches et lucarnes finement travaillées.","architecture":"PRESIDIAL;  monuments et belles maisons sétirent dans cette ville aux 3 places successives. Les demeures portent des noms évocateurs tels que Maison de la Tourelle, du Prévôt, du Bourreau En faisant quelques pas dans les rues adjacentes, vous découvrirez les maisons douvriers, dallure plus modeste. La prison Seigneuriale dite le Présidial ancien prétoire fortifié. Cet édifice est l'ancienne prison seigneuriale de la juridiction des seigneurs de Guerlesquin. Il a été construit en 1640 par le marquis Vincent du Parc de Locmaria, vicomte de Guerlesquin, sous forme dun pavillon forteresse carré, flanqué à chaque angle d'une échauguette saillante.\r\nAu rez-de-chaussée, se trouvait le cachot et aux étages le logement des gardiens dont le dernier est doté de latrines. Il ne s'agissait pas d'un présidial  contrairement à son appellation actuelle. La justice était rendue chaque lundi à l'auditoire qui se trouvait à létage des halles en bois à l'emplacement des halles d'aujourd'hui.Grâce aux démarches entreprises par le barde guerlesquinais Prosper Proux descendant par alliance de la famille du Parc, auprès du Ministère d'État en 1856 et en particulier auprès de Prosper Mérimée, la prison fut sauvée de la destruction. Restaurée en 1872, La prison Seigneuriale fut classée M. H. en 1875 et, de cette date jusqu'en 1965, servi de Mairie. Pierre de Rohan, seigneur de Guerlesquin fait construire les halles ou \"cohue\" en bois en 1526. La justice y était rendue chaque lundi, jour de marché. Tombant en ruines, elles furent remplacées par des halles en granit en 1882 qui recevaient, en plus du marché hebdomadaire, de nombreuses foires annuelles.","habitants":"Famille du Parc\r\n        \"","divers":"a Guerlesquin le manoir  Présidial","gps":"","images":["../../jctruffet.com/image/image_29/29_Pr%c3%a9sidial_1.jpg","../../jctruffet.com/image/image_29/29_Pr%c3%a9sidial_2.jpg","../../jctruffet.com/image/image_29/29_Pr%c3%a9sidial_3.jpg"]},"Consult_chateau_formulaire119c":{"id":"Consult_chateau_formulaire119c","dept":"29","canton":"Briec","commune":"Pleyben","nom":"Quillien","type":"Château","periode":"XIX","histoire":"QUILLIEN, construit entre 1858 et 1861 par l'architecte Joseph Bigot pour Charles-Fidèle de Kerret, qui possède alors le château de Lanniron. Son fils, René-Maurice, officier de marine, en hérite en 1873. L'édifice est élevé sur le site d'un ancien manoir transformé en communs. La propriété passe au comte Bourdon de Lignières au début du XXe siècle. Après son occupation par l'armée allemande pendant la Seconde Guerre mondiale, elle a connu une période d'abandon.","architecture":"QUILLIEN, édifice à deux niveaux sur soubassement de plan rectangulaire composé d'un corps de bâtiment central encadré de deux pavillons latéraux en légère saillie sur la façade antérieure, toiture en croupe   avec lucarnes sur comble. Décor intérieur conservé (lambris dans les pièces de réception)","habitants":"Charles-Fidèle de Kerret\r\n        \"","divers":"Château de Quillien à Pleyben","gps":"","images":["../../jctruffet.com/image/image_29/29_Quillien_1.jpg","../../jctruffet.com/image/image_29/29_Quillien_2.jpg"]},"Consult_chateau_formulaireab00":{"id":"Consult_chateau_formulaireab00","dept":"29","canton":"Quimper","commune":"Quimper","nom":"Quimper","type":"Château","periode":"XVII-XIX-XX","histoire":"Cinq châteaux à Quimper; Kérivoal, Kerrien, Kistinic, Lanniron, et Toulven.                                                                                                          KERIVOAL, édifice construit au cours du XIXe siècle,  agrandi par l'adjonction d'une tour d'angle couverte en pavillon à la fin du siècle. Le château appartient à M. A. de Montluc de la Rivière au début du XXe siècle. Bâtiment de plan rectangulaire, l'élévation de type ternaire est accentuée par un corps d'entrée légèrement saillant couvert en pavillon. Le corps de logis est accosté d'une tour de plan carré, également couverte en pavillon. Maçonnerie enduite avec encadrements de baies et chaîne d'angle en pierre de taille.                                                                            KERRIEN, édifice hétérogène pouvant avoir été construit dans la première moitié du XIXe siècle et agrandi par l'adjonction de pavillons latéraux et le doublement du corps de logis. Il appartient à M. le comte J. d'Amphernet au début du XXe siècle. Corps de logis principal à élévation ordonnancée et régulière, encadré de deux ailes en rez-de-chaussée formant retour d'équerre sur chaque façade. La façade postérieure présente une adjonction accolée au corps de logis principal; les toitures, disposées perpendiculairement à l'axe longitudinal de l'édifice, forment deux légers pignons en façade; un bow-window polygonal supporté par des piles occupe le centre de ce dispositif.                                                                               KISTINIC, construit au cours de la deuxième moitié du XIXe siècle dans le style néo-gothique. Il appartient à M. L. Cosset au début du XXe siècle. Bâtiment de style néo-gothique, de plan massé irrégulier, le corps de bâtiment principal est encadré de plusieurs pavillons et d'une tour circulaire. La maçonnerie est enduite avec encadrements de baies, corniche à modillons en pierre de taille, les lucarnes sont surmontées de fronton à gâble, la porte d'entrée d'une accolade.","architecture":"LANNIRON, ancienne résidence d'été des évêques de Quimper au bord de l'Odet à proximité immédiate de l'agglomération, résidence des évêques de Cornouaille au XVe siècle Mgr Gatien de Monceaux et son successeur Mgr de Rosmadec qui fit construire le château  et au XVIIe siècle  Mgr François de Coetlogon, fait aménager les jardins  En 1791 le domaine est acquis par sieur Mallin. qui le conserve jusqu'en 1805  date de la vente à François-Marie-Léon  Toussaint Tréverret  en faillitte en 1809 adjugé à M. Guillaume-Marie Kerbriand -Postic   négociant à Morlaix. Mgr de Farcy de Cuillé évêque fait construire en prolongement côté ouest .En 1811  achat du domaine par  la famille de Charles Kerret de Quillien, M. Emmanuel alixte Harrington, notable d'origine anglaise, entreprit entre 1824 et 1833 une importante restauration de l'ancien manoir de la fin du XVe siècle et agrandi une première fois dans les années 1760,  à sa mort d'Emmanuel le domaine rest revendu aux  Krerret de Quillien passe aux  Massol de Rebetz descendant direct et propriétaire aujourd'hui au XVIIIe siècle.  C'est sous l'aspect d'une construction de style napoléonien que l'édifice apparaît à nos yeux aujourd'hui. Vers 1824 construction d'un avant corps de style palladien. De ces jardins restent plusieurs bassins, une pièce d'eau appelée le Neptune et un ancien canal. \r\nÉléments protégés MH : les façades et les toitures du château, les terrasses, le bassin de Neptune, la grande allée donnant accès au domaine au Nord, la façade sud de l'Orangerie : inscription par arrêté du 6 mai 1988. Le parterre, l'allée des chevaux, le canal et la terrasse de l'orangerie, l'orangerie et le bâtiment des communs : inscription par arrêté du 23 décembre 1992 .","habitants":"Kerioval; M. A. de Montluc de la Rivière                                Kerien;  M. le comte J. d'Amphernet                                      Kistinic ;M. L. Cosset                                                                      Lanniron  ;Mgr Gatien de Monceaux\r\n        \r\n        \r\n        \"","divers":"Cinq châteaux à Qimper; Kérioval grav-1, Kerrien grav-2-3, Kistinic grav-5-6-7-8 Lanniron grav-9, et Toulven.                     Kistinic GPS : 47° 59' 48\" Nord, 4° 05' 47\" Ouest                                               Laniron GPS : 47° 58' 33,68\" Nord, 4° 06' 38,38\" Ouest                                 KIrrien GPS : 47° 59' 13\" Nord, 4° 07' 12\" Ouest","gps":"47° 59' 48\" Nord, 4° 05' 47\" Ouest","images":["../../jctruffet.com/image/image_29/29_Quimper_1.jpg","../../jctruffet.com/image/image_29/29_Quimper_2.jpg","../../jctruffet.com/image/image_29/29_Quimper_3.jpg","../../jctruffet.com/image/image_29/29_Quimper_4.jpg","../../jctruffet.com/image/image_29/29_Quimper_5.jpg","../../jctruffet.com/image/image_29/29_Quimper_6.jpg","../../jctruffet.com/image/image_29/29_Quimper_7.jpg","../../jctruffet.com/image/image_29/29_Quimper_8.jpg","../../jctruffet.com/image/image_29/29_Quimper_9.jpg"]},"Consult_chateau_formulaire3f06":{"id":"Consult_chateau_formulaire3f06","dept":"29","canton":"Quimper","commune":"Quimper","nom":"Quimper_II","type":"Château","periode":"XVI-XIX","histoire":"QUIMPER,  il est de type château. Il abrite, depuis 1909, les services de la Préfecture. L'édifice se situe dans le centre-ville de Quimper, au bord de l'Odet, la construction de l'édifice est décidée, par le Conseil Général du département du Finistère, en 1904 et effectuée, sous la direction de l'architecte départemental Adolphe Vally, de 1906 à 1909. La résidence du préfet du Finistère se situe, quant à elle, Rue Sainte-Catherine, dans une maison conventuelle de l'ancien hôpital Sainte-Catherine (reconstruit vers 1675-1685), premier hôtel de préfecture (1800-1861), sur les vestiges duquel se dresse l'actuelle préfecture. L'armature de l'édifice est entièrement en béton armé, mais soigneusement masquée par un style architectural néo-Renaissance, inspiré des châteaux érigés sous le règne de Louis XII. La configuration du terrain a quelque peu obligé l'architecte à décentrer l'entrée principale, traitée comme une tour d'angle. La deuxième porte d'entrée, côté quais de l'Odet, est encadrée par deux couples de sonneurs, en costume traditionnel. L'Hôtel de la Préfecture du Finistère est un bâtiment bâti.                 TOULVEN    Édifice construit dans la deuxième moitié du XIXe siècle dans le style néo-gothique. Il appartient à Monsieur Malherbe de la Bouexière au début du XXe siècle. Château de plan rectangulaire comportant un pavillon central cantonné de quatre tours circulaires couvertes en poivrière ; le décor de style néo-gothique se concentre sur l'axe du bâtiment (balustrade, accolade, fronton à gâble surmontant les lucarnes).","architecture":"PALAIS de ROHAN, propriété du département, le musée est installé dans l'ancien Palais des Evêques de Quimper construit du XVIe siècle au XIXe siècle. Il comprend, selon un plan en équerre, deux ailes encadrant la magnifique tour d'escalier, au riche décor Renaissance, élevée en 1507 par l'Evêque Claude de Rohan. Entre celle-ci et la cathédrale, l'aile longeant la rue du Roi Gradlon (1647), est percée d'un porche par lequel s'effectue l'entrée dans la cour du musée. L'aile bordant l'Odet, élevée au XVIIIe siècle (1776) a été remaniée en 1860. Cloître dans le goût néo-gothique. Cloître néo-gothique (vers 1850). Cette tour descalier est la partie la plus ancienne du bâtiment (1507). Le faste flamboyant du décor extérieur des fenêtres et de la cheminée contraste avec la sobriété de lespace intérieur de lescalier. Seuls les paliers sont mis en valeur par des arcatures gothiques. Lescalier hélicoïdal sachève par un somptueux plafond sculpté, en « palmier », lun des éléments décoratifs les plus importants du Palais. Lensemble est soutenu, au centre, par une colonne torsadée ornée du symbole héraldique des Rohan et de lhermine de Bretagne. Le décor du pourtour présente une grande diversité (rinceaux, feuillages, nombreux animaux réels ou imaginaires, personnages énigmatiques). Ce palier permet daccéder, grâce à un petit escalier à vis, à deux pièces hautes qui servaient, aux XVIIe et XVIIIe siècles, de salles des archives. Ces appartements furent aménagés à la fin du XVIIIe siècle, dans laile sud du Palais, qui datait du XVIe siècle. La façade, au-dessus de lOdet, repose sur des arcades percées dans les remparts de la ville. À lintérieur, le premier et principal étage est le plus richement décoré. Il sorganise en une enfilade de pièces lambrissées. Cet ensemble constituait, dès 1776, la suite principale du Palais et devait accueillir les appartements de lévêque.","habitants":"Quimper ; 'Evêque Claude de Rohan                                 Toulven; Monsieur Malherbe de la Bouexière \r\n        \r\n        \r\n        \"","divers":"Prefecture grav-1      des Indes Grav-2   Kinkiz grav-4                      GPS : 47° 59' 40\" Nord, 4° 06' 10\" Ouest                                                                               Toulven -5                                                                               GPS : 47° 59' 48\" Nord, 4° 05' 47\" Ouest","gps":"47° 59' 40\" Nord, 4° 06' 10\" Ouest","images":["../../jctruffet.com/image/image_29/29_Quimper_II_1.jpg","../../jctruffet.com/image/image_29/29_Quimper_II_2.jpg","../../jctruffet.com/image/image_29/29_Quimper_II_3.jpg"]},"Consult_chateau_formulairea27a-2":{"id":"Consult_chateau_formulairea27a-2","dept":"29","canton":"Quimper","commune":"Quimper","nom":"Quimper_III","type":"Château","periode":"XV-XIX-XX","histoire":"Trois châteaux dans cet article de Quimper; Lanroz  Poulguignan,  et la Prefecture.                                                                                  LANROZ;   à Beg-Meil. Édifice construit au début du XXe siècle. Lanroz, ancienne propriété de Mme de Sévigné, se situe dans un site exceptionnel, sur une presqu'île sur les bords de l'Odet. C'est un grand domaine composé de bois, de champs et de prairies. La demeure est protégée sur sa façade nord-ouest par un bois de feuillus. A l'inverse, sa façade principale, orientée vers le sud-ouest, s'ouvre sur une vaste prairie qui descend jusqu'à l'Odet. Les séquoias, les cèdres et les pins forment des structures hérissées ou en plateau qui jaillissent du couvert feuillu.  Cinq chambres d'hôtes.                                                                            POULGUINAN     Un corps de bâtiment antérieur à la Révolution, propriété de la famille de Gleudic au XVe siècle, a été transformé et agrandi dans la deuxième moitié du XIXe siècle dans un style néo-gothique. Le corps de logis principal est une construction de plan rectangulaire comportant cinq travées régulières ; il est construit en pierre de taille. Une tour circulaire, élevée en moellons, est accolée à l'une des façades latérales du bâtiment. A l'opposé, une aile en retour d'équerre, comportant un étage carré, vient agrandir le logis. La liaison entre les deux corps de bâtiments est assurée par une tourelle polygonale sur l'angle de la façade principale. Gâble sur les lucarnes, créneaux et accolades sont réalisées dans un style néo-gothique.","architecture":"PREFECTURE, c'est un château de style Renaissance, construit de 1906 à 1909. L'architecte était Adolphe Vally. Son commanditaire était le Conseil Général du Département du Finistère. La résidence du Préfet du Finistère se situe, quant à elle, Rue Sainte-Catherine, dans une maison conventuelle de l'ancien hôpital Sainte-Catherine (reconstruit vers 1675-1685), premier hôtel de Préfecture (de 1800 à 1861. Il est aujourd'hui la Propriété du Département du Finistère. L'Hôtel de Préfecture se situe dans le centre-ville de Quimper, au bord de l'Odet. Il abrite, depuis 1909, les services de la Préfecture.","habitants":"Lanroz: Mme de Sévigné                                                      Pouguignan ; famille de Gleudic\r\n        \r\n        \r\n        \"","divers":"Trois châteaux dans cet article de Quimper; Lanroz grav-4-5  Poulguignan grav 2-3, plomelin                                                                Prefect   GPS :47° 59' 40\" Nord, 4° 06' 10\" Ouest","gps":"47° 59' 40\" Nord, 4° 06' 10\" Ouest","images":["../../jctruffet.com/image/image_29/29_Quimper_III_1.jpg","../../jctruffet.com/image/image_29/29_Quimper_III_2.jpg","../../jctruffet.com/image/image_29/29_Quimper_III_3.jpg","../../jctruffet.com/image/image_29/29_Quimper_III_4.jpg","../../jctruffet.com/image/image_29/29_Quimper_III_5.jpg"]},"Consult_chateau_formulairec2ca":{"id":"Consult_chateau_formulairec2ca","dept":"29","canton":"Quimperlé","commune":"Quimperlé","nom":"Quimperlé","type":"Château","periode":"XVI-XIX","histoire":"Quatre châteaux à Quimperlé, dont Lézardeau, Kéransquer.                                                                           LEZARDEAU, attesté au XVIe siècle, appartenait à la famille Des Portes. Le logis, conserve des éléments d'une construction du XVIIe siècle, notamment le corps de logis central avec l'escalier monumental en pierre. L'intérieur à été modifié au XVIIIe siècle, au temps où le domaine appartient à la famille Du Couëdic. Grand maître des eaux et forêts de Bretagne, Thomas-Louis Du Couëdic émigre, la propriété est rachetée par son petit-fils, Louis-Corentin, conseiller général, maire et député,    En 1846, il fait bâtir, d'après le projet de l'architecte Joseph Bigot, de Quimper, le pavillon, ancien logement de gardes, près de la route de Quimper date de cette époque. Du Couëdic fait également modifier le logis par la suppression d'une aile en retour d'équerre, le rajout de pavillons latéraux et l'aménagement intérieur, lambris, cloisonnement, cheminées et peinture murale, tout en conservant l'escalier d'origine et une partie des cheminées et des lambris du XVIIIe siècle. Également fondateur de l´usine à papier de Kerisole, il consacre sa fortune à la modernisation agricole; en 1861, il fonde au Lézardeau une \"Ecole pratique d'irrigation et de drainage\" qui fonctionne jusqu'en 1910. La zone entourant le Lézardeau (parc, prairies et fermes) a été entièrement urbanisée après la deuxième Guerre mondiale; seul le logis et l'ancien logement de gardien subsistent. Les cheminées et les lambris, déposés en 1996 lors de la transformation en logements sociaux, sont conservés dans les services techniques de la ville de Quimperlé, propriétaire du bâtiment, propriété de la commune.","architecture":"KERANSQUER  Michaël Quernez, comme le château et le domaine de Keransquer ont été mis en vente par la famille.  Le manoir où a vécu le père du Barzaz-Breiz publié en 1867, Théodore Hersart de La Villemarqué, était à vendre depuis mars 2016, Il a trouvé un acquéreur le 11 avril 2018. Il sagit dAlain Benard, un antiquaire de métier qui habite à Québlen, dans le secteur de Lothéa. Théodore Hersart de La Villemarqué a construit cette demeure familiale en 1851. Cest là, quil a écrit le Barzaz-Breiz après avoir collecté les chants traditionnels bretons. Ses carnets de collecte avaient été découverts par lethnologue Donatien Laurent et Pierre de La Villemarqué (arrière-petit-fils de lauteur du Barzaz-Breiz).  Michaël Quernez, maire, en a fait l'annonce en toute fin de conseil municipal, suite à une question d'Erwan Balanant : la ville souhaite acheter le domaine de Keransquer, là où a vécu Théodore Hersart de La Villemarqué, auteur du « Barzaz Breiz », le célèbre recueil de chants populaires bretons. La propriété, édifiée en 1852, un manoir, une chapelle et un dolmen.","habitants":"Lézardeau; famille Des Portes                                       \r\n        \r\n        \"","divers":"Quatre châteaux à Quimperlé, dont Lézardeau grav-1-2, Kéransquer grav-3,                                                                     Quimperlé gps 47° 52' nord, 3° 33' ouest","gps":"","images":["../../jctruffet.com/image/image_29/29_Quimperl%c3%a9_1.jpg","../../jctruffet.com/image/image_29/29_Quimperl%c3%a9_2.jpg","../../jctruffet.com/image/image_29/29_Quimperl%c3%a9_3.jpg"]},"Consult_chateau_formulaire10f1":{"id":"Consult_chateau_formulaire10f1","dept":"29","canton":"Quimperlé","commune":"Quimperlé","nom":"Quimperlé_II","type":"Château","periode":"XVII-XIX","histoire":"Trois châteaux dans cet article à Quimperlé; Québlen, Kerlarec et Kernertrand.                                                                                                                                        QUEBLEN  Françoise de Québlen et Jean de Bennerven (mort en 1484), membre de l´administration ducale puis procureur de Cornouaille, sont peut-être à l´origine du début du chantier du logis et des communs. Le colombier semble dater du XVIe siècle. Une cheminée du logis porte la date de 1637, période qui pourrait correspondre à certaines transformations faites pour Jean Le Roy de Keralno, originaire de Guérande, sergent de la gruerie de Quimperlé et alors propriétaire de Québlen. En 1697, Charles Bréart, négociant, armateur puis directeur de la Compagnie des Indes à Lorient, anobli en 1701, acquiert le domaine. Le cadran solaire placé au-dessus de la porte d'entrée du logis porte la date de 1707. C´est peut-être Pierre Bréart de Boisanger, fils du précédent, sénéchal de Hennebont, qui fait agrandir le logis, remanier les ouvertures et les charpentes ainsi que les distributions intérieures vers 1740 (cloisons, lambris avec vestiges de décor peint), tout en conservant le volume de l´ancien manoir, notamment l´aile en retour et la tour d´e
