ERGADIOU, château construit dans la deuxième moitié du XIXe siècle sur le site d'un ancien manoir dont il ne restent que quelques vestiges (portail fortifié) ; il est propriété de monsieur de Mauduit au début du XXe siècle. Le style du château de Kercadiou, néo-gothique peut être rapproché de la production des Mellet, architectes à Rennes.","architecture":"KERGADIOU, l'édifice de plan massé comporte plusieurs corps de bâtiment et une tour circulaire couverte en poivrière en façade. Rez-de-chaussée surélevé; étage carré et étage de comble. Encadrements de baies, chaînes d'angle, bandeaux horizontaux, corniche et lucarnes en pierre de taille.                                                                                                                                              KERVEN à Guimaec l'ancien manoir de Kerven du XVIe siècle. La terre appartenait au XVe siècle à Jehan Stephan, puis à son fils Jacques Stephan. Le manoir est édifié par Olivier Nouël  (maire de Morlaix en 1598), époux de Françoise Calloët. Il est vendu ensuite à François Le Blonsart, sieur de Kertanguy, puis devient la propriété de la famille Kermabon (suite au mariage de Marie Le Blonsart avec Yves de Kermabon) et de la famille Corentin Le Dall de Tromelin (à partir de 1751), Kermadec, Bergevin (suite au mariage de Franceza de Kermadec avec Edouard de Bergevin). On y voyait les armes des familles Bergevin et Huon de Kermadec. Cette terre possédait jadis une chapelle privée, aujourd'hui disparue, qui avait sa fontaine de dévotion.","habitants":"Croat et Helles;   familles La Forêt                              Kergadou; Monsieur de Mauduit                                Kerven; Famille Corentin\r\n        \"","divers":"cinq châteaux à Guimaëc -Lanmeur ; Croat-ar-Frotier grav 1-2, Helles grav-4, Kergadiou grav -5-6    et Kerven grav-3.","gps":"","images":["../../jctruffet.com/image/image_29/29_Lanmeur_1.jpg","../../jctruffet.com/image/image_29/29_Lanmeur_2.jpg","../../jctruffet.com/image/image_29/29_Lanmeur_3.jpg","../../jctruffet.com/image/image_29/29_Lanmeur_4.jpg","../../jctruffet.com/image/image_29/29_Lanmeur_5.jpg","../../jctruffet.com/image/image_29/29_Lanmeur_6.jpg"]},"Consult_chateau_formulairef527":{"id":"Consult_chateau_formulairef527","dept":"29","canton":"Plabennec","commune":"Lannilis","nom":"Lannilis","type":"Château","periode":"XIV-XVII","histoire":"Trois châteaux à Lannilis ; Kerouartz et  Bergot, Kerbabu                                           KEROUARTZ  La famille de Keroüartz, entrera dans lhistoire à  l'époque où légende et merveilleux se confondent en cette journée du 26 mars 1351. De cette héroïque épopée du Combat des Trente, un champion Hennequin Hérouart fera partie du team des chevaliers, aux règles établies par le code de lhonneur. Elle franchira la porte de la renommée en 1376, un autre tournoi donnera loccasion à Hervé de Keroüartz de mener son blason au Panthéon des \"cycles Arthurien\". Ce fait darme, authentifié et conté par Guillaume de La Penne \"Gestes des Bretons en Italie, sous le pape Grégoire XI\" sera porté aux \"Preuves de lHistoire de Bretagne\" Les clameurs de la révolution écarteront la famille de son sol natal, mais au XIXe siècle, le destin de lhistoire donnera loccasion au marquis de reconquérir ses biens, pouvait-il ignorer la maxime gravée en 1771 dans le plomb du cadrant solaire du parc, \"Afflictis lentas, celeres gaudentibus horae\" (le temps passe lentement dans la peine, rapidement dans la joie). Et cette autre devise nobiliaire des Keroüartz \" Tout avec le temps\" nest-elle pas dactualité   depuis demeuré dans la même famille. appartient au marquis de Kérouartz.                                                                                                   KERBABU dit des abers, une première alliance Perrien en 1646.\r\nLe décès à Kerbabu en 1759 du vieux comte Claude-Hubert, dernier seigneur  le capitaine des Garde-côtes, trois fois veuf, et dont la nombreuse progéniture est depuis longtemps éparpillée, ayant récupéré par retrait lignager  (Perrien-Lannion) le marquisat de Crenan en Quintin.Le décès à Quintin en 1836 du dernier Bellingant, marquis de Crenan, ruiné, dont les prodigalités auront mené sa fille à réaliser tout l'héritage.","architecture":"KEROUARTZ, l'édifice, construit à la fin du XVIe siècle et au début du XVIIe siècle, est précédé au sud par une allée d'un kilomètre de long, bordée de part et d'autre d'une double rangée de hêtres. A l'extrémité sud de cette allée le portail d'entrée, dont il ne restent que deux piles rectangulaires en granit surmontées chacune d'un pignon triangulaire. La pile Est est ornée, à son sommet, sur sa face extérieure, des armoiries de la famille de Kerouartz. Ces deux piles comportent sur leur face interne des saillies verticales de taille permettant la pose de portes sur pivots. A l'est de cet ensemble existe un passage à enjamber, constitué de deux marches surmontées d'une dalle de pierre verticale. L'intérêt de cet ensemble est constitué par sa position à l'entrée de l'avenue qui mène au château et forme, avec ce dernier et le parc, un tout indivisible. Inscription par arrêté du 18 octobre 1926.                                                                                                      BERGOT   typique de larchitecture des manoirs du Léon aux XVe et XVIe siècles, Maner Bras Ar Bergot a conservé sa façade en grand appareil, avec ses ouvertures dissymétriques et sa porte à accolade blasonnée. Lintérieur comporte de beaux encadrements de pierre et deux grandes cheminées, dont celle imposante du rez-de-chaussée. Un grand escalier rampe sur rampe occupe la tour située au nord du manoir. Le Bergot, ou Bergoët a donné son nom à une très ancienne famille du Léon. Les parties les plus anciennes du manoir datent des Bergoët de 1413 à 1534. Dès 1543 et jusquen 1636, le Sieur du Bergot est un cadet de Kerouartz : Ollivier, Judicaël et François. En 1674, le manoir est aux Michel de Kervenny, alliés aux Kerouartz par Marie de Kerouartz. En 1744, Charles Raymond de Clérambault, commissaire général à la marine au Port Louis, est sieur du Bergot. Ses fils ayant émigré, le manoir est confisqué au profit de la nation le 20 thermidor an IV. Les Clérambault le rachète. Un partage de 1886 démembre le domaine.","habitants":"Famille d'Hervé de Keroüartz                                                 Kerbabu; comte Claude-Hubert,\r\n        \r\n        \"","divers":"Trois châteaux à Lannilis ; Kerouartz grav-3-4-5-6 et  Bergot grav 7, Kerbabu grav 1-2.                                                            Bergot  GPS : 48° 34' Nord, 4° 31' Ouest","gps":"48° 34' Nord, 4° 31' Ouest","images":["../../jctruffet.com/image/image_29/29_Lannilis_1.jpg","../../jctruffet.com/image/image_29/29_Lannilis_2.jpg","../../jctruffet.com/image/image_29/29_Lannilis_3.jpg","../../jctruffet.com/image/image_29/29_Lannilis_4.jpg","../../jctruffet.com/image/image_29/29_Lannilis_5.jpg","../../jctruffet.com/image/image_29/29_Lannilis_6.jpg","../../jctruffet.com/image/image_29/29_Lannilis_7.jpg"]},"Consult_chateau_formulaire31ea-2":{"id":"Consult_chateau_formulaire31ea-2","dept":"29","canton":"Plouigneau","commune":"Lannéanou","nom":"Lannéanou","type":"Manoir","periode":"XVI","histoire":"Trois manoirs à Lannéanou; Kerlosser, Guerdavid et Keruscar                                                                                    KERLOSSER  manoir du XVIe siècle qui appartenait en 1617 à Guy Le Lévyer, sénéchal de Morlaix en 1617, et à sa femme Marie de la Boissière. Ce manoir a appartenu primitivement à la famille La Tour, fondatrice en 1560 de la chapelle Saint-Sébastien ;  Kerlosser, vieux manoir célèbre dans les traditions locales. En 1481, il appartenait aux Le Roux, puis passa aux Trogoff, de la Tour, Le Lévyer, Gourcun, Kerc'hoent de Morizur, Pastour de Kerjan, de Tonquédec, de Kerdrel et de Lorgeril.\r\n Dans la cour,  un écusson offrant les armes mi-parti de Guy Le Lévyer, sieur de Penarstang et de Kerloassezre, sénéchal de Morlaix en 1640, et de sa première femme Marie de la Boissière.                                                       GUERDAVID, le manoir de Guerdavid et son colombier du XVIIe siècle. Les terres de Guerdavid appartenait depuis le XVe siècle à la famille Le Rouge de Guerdavid. Le manoir possédait autrefois une chapelle privée ;  vieille terre seigneuriale qui appartient, depuis le XVe siècle, à la famille Le Rouge de Guerdavid, ramage des Le Rouge, seigneurs d'Ancremel en Plouigneau. L'ancien manoir a été démoli ; ses belles pierres de taille ont servi à la construction d'une ferme, dont la cour est encore précédée d'un portail Renaissance en ruines. Une maison de campagne style Restauration, abandonnée et très délabrée, s'élève non loin, et porte sur le linteau d'une de ses baies, cette date qui doit être celle du manoir détruit en  1566.","architecture":"KERLOSSER On y accède du bourg par la voie romaine de Carhaix à Lanmeur, encore assez bien conservée par places. A côté, sur le sommet d'une colline, il y a des traces de travaux anciens, levée de terre et tertres formés de pierres amoncelées. Peut-être y avait-il eu en cet endroit un poste de surveillance.Le manoir de Kerlosser (anciennement Kerloassezre) est un édifice du XVIe siècle, construit par la famille de la Tour dans une position très forte dominant la profonde vallée du Douron. Son portail extérieur est muni de meurtrières et l'édifice principal, à porte gothique, s'appuie à droite sur une sorte de pavillon flanqué de deux échauguettes carrées reliées par une galerie garnie de mâchicoulis et d'embrasures nombreuses. Une tour ronde qui se dressait derrière la maison a été abattue.                                                                                                                          KERUSCAR du XVIe siècle, édifice à porte gothique transformé en ferme. A côté du manoir se trouve une chapelle dédiée à saint Claude. Ce manoir se trouve plus près du bourg de Lannéanou, au bord de la même voie de Carhaix à Primel. Il a appartenu aux familles Pinart, de Rospiec, Saisy de Kerampuil, de Lagadec, de Pompéry et de Parcevaux. Près de l'habitation moderne subsiste l'ancienne maison, à porte ogivale et cinq fenêtres décorées d'accolades, dont les meneaux ont été enlevés. La chapelle, dédiée à saint-Claude, a un fronton Renaissance à colonnes, attique et balustrade, que surmonte un petit clocheton pointu assez curieux ; elle paraît avoir été bâtie au XIXe siècle.","habitants":"Kerlosser; Famille La Tour, Guy Le Lévyer                                        Guerdavid ; Famille Le Rouge de Guerdavid.                                     Keruscar;   Famille Pinart.\r\n        \"","divers":"Trois manoirs à Lannéanou Kerlosser  grav-1, Guerdavid grav-2 et Keruscar grav 3","gps":"","images":["../../jctruffet.com/image/image_29/29_Lann%c3%a9anou_1.jpg","../../jctruffet.com/image/image_29/29_Lann%c3%a9anou_2.jpg","../../jctruffet.com/image/image_29/29_Lann%c3%a9anou_3.jpg"]},"Consult_chateau_formulaire97cc":{"id":"Consult_chateau_formulaire97cc","dept":"29","canton":"Morlaix","commune":"Pleyber-Christ","nom":"Lesquiffiou","type":"Château","periode":"XVII","histoire":"LESQUIFFIOU, était jadis une châtellenie avec droit de basse justice et haute justice dont la potence se dressait à Coat-ar-Justiçou et sa juridiction s'étendait à une partie de Saint-Martin-des-Champs. Il appartint successivement aux familles De Kerguennec, Le Borgne de Kerguidiou, Barbier de Lescoët et de Chabannes.  Le domaine comprend aussi une ferme construite entre 1861 et 1863 par le marquis de Lescoët, afin d'en faire une école d'agriculture. Aventures du citoyen Jean Conan à Guingamp » retrouvé par hasard, relié dans une peau de vache, dans la bibliothèque du château de Lesquiffiou. Il décrit en particulier ses tribulations de soldat de l'an II, Jean Conan se qualifiant lui-même de « pauvre homme », a rédigé ce texte à la fin de sa vie alors qu'il était installé comme tisserand dans le bourg de Trédrez. Il fut successivement petit tambour dans la milice royale à l'époque de Louis XVI, pêcheur de morue au large de Terre-Neuve, calfat dans le port de Brest, soldat de la République.","architecture":"LESQUIFFIOU, le château de Lesquiffiou a été construit au XVIIe siècle, probablement sur l'emplacement d'un manoir plus ancien dont subsiste le pigeonnier du XVIe siècle. Le corps central rectangulaire, daté de 1698, a été flanqué dans la première moitié du XVIIIe siècle, de deux pavillons carrés prolongés vers l'est par deux ailes en retour d'équerre. Ces deux ailes ont été détruites entre 1890 et 1897, et la largeur du corps central a été doublée par la création d'une nouvelle façade d'inspiration Louis XV. Le château fut dévasté pendant la Révolution française mais restauré ensuite. Outre le château et le pigeonnier, le domaine comprend une ferme, construite de 1861 à 1863 par le marquis de Lescoût pour faire une ferme modèle pour une école d'agriculture. La guerre de 1870 a fait avorter le projet.\r\nÉléments protégés MH : les façades et les toitures, le salon, la salle à manger, la salle Louis XV, le pigeonnier, le jardin à la française, la cour d'honneur avec sa balustrade et la ferme modèle : inscription par arrêté du 19 novembre 1992.","habitants":"Famille du marquis de Lescoët \r\n        \"","divers":"Lesquiffiou gps 48° 32' 39?\" N, 3° 50' 25\" O","gps":"","images":["../../jctruffet.com/image/image_29/29_Lesquiffiou_1.jpg","../../jctruffet.com/image/image_29/29_Lesquiffiou_2.jpg","../../jctruffet.com/image/image_29/29_Lesquiffiou_3.jpg","../../jctruffet.com/image/image_29/29_Lesquiffiou_4.jpg","../../jctruffet.com/image/image_29/29_Lesquiffiou_5.jpg"]},"Consult_chateau_formulaire9a11":{"id":"Consult_chateau_formulaire9a11","dept":"29","canton":"Douarnenez","commune":"Plouhinec","nom":"Locqueran","type":"Château","periode":"XIX","histoire":"LOCQUERAN, château construit vers 1870 par la famille de l'Ecluse. Décor intérieur de style Art Nouveau au début du 20e siècle. Le site est classé en 1922. L'édifice abrite un lycée dans les années 1950 puis un institut médico-éducatif avant d'être transformé en hôtel de voyageurs à la fin du XXe siècle. La construction du château de Locquéran a débuté à la fin de lannée 1879, commandé par Amédée de l'Ecluse, récent acquéreur des terres du manoir de Locquéran. Cet industriel audiernais, maire de cette même commune et propriétaire de lusine de produits chimiques du Stum et de la future conserverie de Poulgoazec, souhaitait bâtir un château du même style que celui de son frère, Emile, situé à Keristum sur la rive droite du Goyen. Hormis la maison du jardinier qui fut bâtie en même temps que le château, les autres annexes. ne furent construites quà partir des années 1890. Le domaine et son château, théâtre de grandes réceptions mondaines, resta dans la famille de l'Ecluse moins dune quarantaine dannées et fut vendu en 1914. Par la suite, le château deviendra une annexe de lhospice dAudierne, après le départ des allemands qui sy étaient installés pendant la seconde guerre mondiale.","architecture":"LOCQUERAN  Audierne Plouhinec, ce château du XIXe siècle se situe au coeur d'un parc de 3 hectares sur la côte d'Audierne, avec une vue imprenable sur le port et la rivière Goven et à 1 km du port et des commerces. Situé au bord de la mer, à 20 km au sud de la Pointe du Raz,  perché sur le promontoire de la pointe de Paouen avec vue sur larrière port dAudierne, le château de Locquéran est un grand bâtiment dinspiration Renaissance comportant 105 ouvertures. Édifice de plan massé très profond et dissymétrique composé d'un corps central formant un pavillon à l'est, encadré de deux corps latéraux polygonaux ; deux tours d'escalier postérieures. Élévation de maçonnerie enduit avec encadrements de baies, chaînes d'angle, bandeaux, corniche et lucarnes en pierre de taille de granite. Toit brisé percé de lucarnes à volutes. linstruction publique ouvre un « centre dapprentissage féminin » au château où furent donnés pendant une dizaine dannées des cours de travaux ménagers et de couture. La construction, en 1968, du collège de Locquéran saccompagnera de la destruction des écuries. Le château, alors toujours propriété de lhospice dAudierne, accueillera encore quelques temps un centre daide aux jeunes handicapés puis sera vendu et transformé en une résidence hôtelière.","habitants":"Amédée de Lécluse\r\n        \"","divers":"A Plouhinec le château de Locquéran","gps":"","images":["../../jctruffet.com/image/image_29/29_Locqueran_1.jpg","../../jctruffet.com/image/image_29/29_Locqueran_2.jpg","../../jctruffet.com/image/image_29/29_Locqueran_3.jpg","../../jctruffet.com/image/image_29/29_Locqueran_4.jpg"]},"Consult_chateau_formulaire3a4a":{"id":"Consult_chateau_formulaire3a4a","dept":"29","canton":"Morlaix","commune":"Locquénolé","nom":"Locquénolé","type":"Château","periode":"XVII-XIX","histoire":"Plusieurs châteaux dans cet article. L'ancien château ou manoir de St-GUENOLE du XIXe siècle, construit par Hilaire du Pontavice, ancien maire, appartient désormais à la famille Stocks.\r\n Le manoir de LESENOR    , dit aussi « maison Kerautem » (1965), est une uvre de l'architecte Roger Le Flanchec (1915-1986)                                                        KEROMNES, le manoir de Keromnès du XVIe siècle-XVIIe siècle, restauré au XXe siècle et propriété un temps de la famille de Lafforest, du XVI-XVIIe siècle), restauré au XXe siècle. L'écuyer René-Marie Gourcun (époux de Marie Quemeneur du Plessis), seigneur de Keromnès, ex-colonel de cavalerie et gouverneur de Carhaix y meurt en 1762. A noter que la famille Gourcun est mentionnée dès 1481 : Clet Gourcun épouse alors Aimée Le Sall. L'édifice devient ensuite la propriété d'Audren de Kerdrel, puis de Pol de Kerdel (vers 1950) et de Henri de Lafforest (maire de Locquénolé de 1977 à 1986). A noter que d'importants travaux de restauration ont eu lieu au XXe siècle à l'instigation de l'architecte morlaisien Loïc de Lafforest ;\r\nCLEMEUR, le manoir du Clémeur du XIXe siècle, propriété de la famille Barazer de Lannurien L'arrière comporte une tour rectangulaire. Propriété de Guillaume Nouël vers 1850, puis de sa fille Marie Jeanne, épouse de Jean Marie Etienne Barazer de Lannurien. L'édifice appartient toujours à cette dernière famille.                                                            KER-HULLA; après la Première Guerre mondiale, le dernier propriétaire, pour respecter le vu de son fils unique décédé des suites du conflit mondial, a transmis la propriété aux hospices de Brest pour une uvre sociale. La maison maternelle a alors été inaugurée en 1925. Cest ainsi quaprès avoir accueilli pendant des années les jeunes mères célibataires, le château sest reconverti en hôpital de jour pour enfants et a pris le nom de Winnicot, célèbre psychiatre anglais spécialiste pour enfants.","architecture":"KERLIVIOU,  du XIX-XXe siècle), édifié par le capitaine Ropers qui donna à l'édifice le nom de famille de son épouse Marie Louise de Kerliviou (1850-1882). Cette demeure devient ensuite la propriété de Cécile Guillotou de Keréver (comtesse de Pluvie), puis d'Allyre de Pluvie (en 1905), du comte de Pontavice, d'Auguste Le Goaster, de Le Gonidec de Tressan et de Louis Jules Patault.                                                                                                        COATILES du XVIIe siècle. Les premiers propriétaires de la terre de Coatilès ont été les familles de Coatelez, de Kerriou et de L'Isle. Un acte de vente, qui date du 16 octobre 1607, indique que la demeure est cédée au sire de Kergroadès. Des travaux de restauration sont entrepris en 1663 par Meusnier de Quatre-Marre (ou Quatremarre), époux de Fiacre de Gratz. L'édifice est vendu en 1693 à la famille Le Gac de Lansalut, puis devient la propriété de la famille Coëtlogon en 1763 et de la famille Cornic en 1791. On y trouvait jadis un pigeonnier et une chapelle privative. Le porche, cintré et orné de sculptures, date de 1673.                                                                                                                                     St-GUENOLE   Il s'agit d'un bâtiment ancien, en effet un manoir a été construit au XVe siècle et appartenait à la famille Chef de Bois, à laquelle a succédé les La Sablière. Le château est restauré et agrandi au cours du dernier quart du XIXe siècle et le parc est aménagé dans le goût des jardins anglais par le jardinier Édouard André. C'est un édifice de plan irrégulier en L, comportant plusieurs corps de logis en pavillon et une tour semi hors-oeuvre sur la façade arrière. Maçonnerie de moellon avec encadrements de baies en pierre de taille.","habitants":"Keromnès;  famille de Lafforest                                    Clémeur ; famille Barazer de Lannurien                            Kerliviou; Marie Louise de Kerliviou                            Coatiles ; famille Le Gac de Lansalu                                          ST-Quénolé: famille Chef de Bois\r\n        \"","divers":"Châteaux cité sur Locquénolé grav-3  Keromnès grav-1-2 Clémeur Kerliviou et st-Guénolé grav-6. Cloatilès grav-4","gps":"","images":["../../jctruffet.com/image/image_29/29_Locqu%c3%a9nol%c3%a9_1.jpg","../../jctruffet.com/image/image_29/29_Locqu%c3%a9nol%c3%a9_2.jpg","../../jctruffet.com/image/image_29/29_Locqu%c3%a9nol%c3%a9_3.jpg","../../jctruffet.com/image/image_29/29_Locqu%c3%a9nol%c3%a9_4.jpg","../../jctruffet.com/image/image_29/29_Locqu%c3%a9nol%c3%a9_5.jpg","../../jctruffet.com/image/image_29/29_Locqu%c3%a9nol%c3%a9_6.jpg","../../jctruffet.com/image/image_29/29_Locqu%c3%a9nol%c3%a9_7.jpg","../../jctruffet.com/image/image_29/29_Locqu%c3%a9nol%c3%a9_8.jpg"]},"Consult_chateau_formulaireb126":{"id":"Consult_chateau_formulaireb126","dept":"29","canton":"Pont-l","commune":"Loctudy","nom":"Loctudy_Kerazan","type":"Château","periode":"XVI","histoire":"KERAZAN , bâti à la fin du XVIe siècle, est une des plus anciennes seigneuries du pays bigouden, ses seigneurs étaient des vassaux des barons du Pont (Pont lAbbé). Du XVe au XVIIe siècle, le manoir appartient à la famille Kerfloux, pendant huit générations. Cest un Kerfloux qui fit construire les premiers éléments du manoir,  Après les Kerfloux, le manoir eut comme propriétaire Jean Sauvaget des Clos qui vendit le domaine en 1647 à René Drouallen. Le mariage de sa petite-fille fit passer le domaine dans la famille Le Gentil de Rosmorduc, comte de Rosmorduc, qui le conserva de 1710 à la Révolution et le transforma. Les Rosmorduc firent construire au milieu du XVIIIe siècle un second niveau au manoir. À la Révolution, le dernier châtelain de Kerazan, Louis Ange Aimé de Rosmorduc, émigra pour combattre dans larmée de Condé ; puis il participa aux soulèvements de lOuest. En 1793, confisqué par le tribunal révolutionnaire de Quimper comme bien national, le domaine est vendu à Louis Derrien, architecte entrepreneur à Quimper. Son gendre, Edouard Le Normant des Varannes, homme actif, donna une nouvelle impulsion au domaine. Le manoir fut acheté en 1847, par un riche notaire de Pont lAbbé, Alour Arnoult  père de Noémie  Astor qui entreprit d'en faire une résidence somptueuse, en 1929 décès de  Joseph Georges Astor, kérazan revient par legs à l'institut de France","architecture":"KERAZAN   caractéristiques de lépoque bretonne contemporaine (plan en équerre, murs de granite et toits dardoise). Laile droite reste aujourdhui la plus proche de létat dorigine, elle date du XVIe siècle. De manoir fortifié, il devint maison dhabitation et subit des transformations architecturales et de décoration exprimant un nouvel art de vivre. fut reconstruit dans les années 1760 sur les fondements d'une demeure de la fin du XVIe siècle début du XVIIe siècle. Au XVIIIe siècle un second niveau au manoir, et la façade devint plus classique témoignant de lélégance et de la sobriété de son siècle par la symétrie de part et dautre de la porte, les pilastres ornés de bossage aux extrémités. Le château fut agrandi dans les années 1912-1913, avec la construction d'un pavillon de plan rectangulaire auquel fut accolée une tour d'escalier ronde coiffée en poivrière sur la façade nord du corps de logis. Des communs furent édifiés à l'ouest. Les salons du rez-de-chaussée ont conservé des lambris des XVIIIe et XIXe siècles.   Le manoir fut acheté en 1847, par un riche notaire de Pont lAbbé, Alour Arnoult qui entreprit d'en faire une résidence somptueuse, la cour du manoir fut restructurée, on créa une pelouse arrondie vers lEst selon la mode de lépoque, les plafonds furent surélevés, laspect des toitures fut aussi modifié. \r\nÉléments protégés MH : les façades et les toitures du corps de logis et de l'aile en retour est, à l'exclusion des communs du début du XXe siècle attenants au pignon ouest ; les cinq pièces du rez-de-chaussée :  y compris les éléments du système hydraulique du XVIIIe siècle  et les douves : inscription par arrêté du 24 août 2000.","habitants":"Famille Kerfloux\r\n        \"","divers":"Château de Kérazan à Loctudy","gps":"","images":["../../jctruffet.com/image/image_29/29_Loctudy_Kerazan_1.jpg","../../jctruffet.com/image/image_29/29_Loctudy_Kerazan_2.jpg","../../jctruffet.com/image/image_29/29_Loctudy_Kerazan_3.jpg","../../jctruffet.com/image/image_29/29_Loctudy_Kerazan_4.jpg","../../jctruffet.com/image/image_29/29_Loctudy_Kerazan_5.jpg","../../jctruffet.com/image/image_29/29_Loctudy_Kerazan_6.jpg"]},"Consult_chateau_formulaire5664":{"id":"Consult_chateau_formulaire5664","dept":"29","canton":"Pont-de-Buis-lès-Quimerc","commune":"Logonna-Daoulas","nom":"Logonna_Daoulas","type":"Château","periode":"XV-XVI","histoire":"deux châteaux dans cet article Rosmorduc et vieux Kerisit. ROSMORDUC, le château est construit sur une ancienne motte féodale. Le manoir primitif était protégé par une enceinte trapézoïdale cernée de douves, avec une face donnant sur la mer et un talus maçonné le long de l'estuaire. Au manoir primitif a succédé un second manoir fortifié bâtit dans les années 1545 puis restauré après les destructions des guerres de la Ligue et agrandi vers 1648. Le manoir est cité au XIIIe siècle comme étant possession de Salomon de Rosmorduc, apparenté aux sires de Daoulas, cadets des vicomtes de Léon. En 1710, les Rosmorduc établissent leur résidence principale au château de Kerazan près de Quimper, alors le château devient résidence campagnarde réservée à la chasse.                 VIEUX-KERISIT  à Daoulas , construit sur l'emplacement d'un manoir du XVe siècle, le bâtiment en conserve les vestiges, qui constituent l'aile gauche de l'édifice. Le manoir appartenait à la famille de Kérisit en 1426. Mathurin Le Forestier de Quillien qui possède, depuis 1696, la charge de sénéchal bailli, lieutenant de juridiction et châtellenie de Daoulas, achète en 1698 la demeure à Jérôme de La Sauldraye. Son petit-fils Mathurin Louis, hérite du manoir. Le 16 novembre 1793 pendant la Révolution, il est arrêté et emprisonné à Landerneau, tandis que le manoir est pillé. En 1867, la propriété passe par mariage dans la famille des Déserts. Vers 1905, une porte gothique provenant de l'ancienne chapelle Saint Nicolas est posée sur l'aile droite du manoir.","architecture":"ROSMORDUC,  édifié en microgranite ocre blond de Logonna monté en grand appareil, a perdu en partie son corps de logis principal situé au Levant. A léquerre, laile du Midi est ornée de belles lucarnes renaissance. Un portail, datant du XVIIe siècle en Kersanton, défendu par des meurtrières, donne accès à la cour dhonneur par une large porte cavalière, accostée dune petite porte pour les piétons. Au départ de létage du pavillon ouest, une tourelle contient une vis de pierre qui dessert les niveaux supérieurs. Saisi comme bien national à la Révolution, le château est partiellement transformé en exploitation agricole. Au siècle suivant, il est racheté par la famille de Rosmorduc qui entreprend sa restauration avec laide de larchitecte Henri Mellet. Ce dernier restaure lensemble manorial sur cour fermée et transforme l'ancienne aile de communs sud en corps de logis principal, lui joignant une courte aile en retour préexistante à l'est et en disposant un corps de communs lui faisant face au nord.","habitants":"Salomon de Rosmorduc familles de Resmonduc & la   famille de Kérisit \r\n        \"","divers":"Rosmorduc grav 1 à 5    Vieux Kerisit grav-6                                    GPS : 48° 19' 17,96\" Nord, 4° 16' 17,74\" Ouest","gps":"48° 19' 17,96\" Nord, 4° 16' 17,74\" Ouest","images":["../../jctruffet.com/image/image_29/29_Logonna_Daoulas_1.jpg","../../jctruffet.com/image/image_29/29_Logonna_Daoulas_2.jpg","../../jctruffet.com/image/image_29/29_Logonna_Daoulas_3.jpg","../../jctruffet.com/image/image_29/29_Logonna_Daoulas_4.jpg","../../jctruffet.com/image/image_29/29_Logonna_Daoulas_5.jpg","../../jctruffet.com/image/image_29/29_Logonna_Daoulas_6.jpg"]},"Consult_chateau_formulairebc65":{"id":"Consult_chateau_formulairebc65","dept":"29","canton":"Saint-Pol-de-Léon","commune":"Plounévez-Lochrist","nom":"Maillé","type":"Château","periode":"XIV-XV","histoire":"MAILLE, c'est Maurice de Carman, influencé par Philibert Delorme, qui lui donna sa forme actuelle et fit construire, en 1555, la chapelle de Kermeur. Par la suite, les terres relevant de sa juridiction furent érigées en marquisat, par le roi Louis XIII et passèrent dans les mains des Maillé, une riche famille tourangelle (1577), des Rohan-Chabot (1747), des Cadeville (1789), des Dein (1812), des Nielly (1900).  la chapelle de Maillé fait partie de l'ensemble du château de Maillé, classé en 1981. I. En 1789, elle est vendue comme bien national et rachetée par la belle mère du propriétaire, Nicolas de Cadeville.","architecture":"MAILLE, sur des bases d'un manoir plus ancien,  la construction   bâti en 1560 en deux ailes en équerre  reliés par une tour carrée très ornementée appartient à la seconde Renaissance. Un pavillon carré avec trois étages ornés d'ordres superposés, et de style Renaissance  ainsi que la façade ouest avec des fenêtres et lucarnes sculptées. Le corps du bâtiment du XVIIe siècle  garde ses toitures d'origine à la Mansart. A l'intérieur deux très beaux escaliers du XVIe siècle. Éléments protégés MH : les façades et les toitures, le grand et le petit escalier, la grande salle et la rotonde attenante avec leur décor, la cheminée peinte de la chambre n° 13 et la cheminée sculptée dans la chambre dite chambre Sud. L'ensemble du domaine comprenant la cour d'honneur et les bâtiments, les murs et les douves qui l'entourent, les murs de clôture des jardins, la chapelle, la motte féodale et les allées du Cavalier, de Kerveur, de Morlaix, de Broko et Plouescat. Il choisit une grange du XVIIe siècle en bel appareil, à quatre pans de toiture. Il en supprime un en élevant le pignon et l'ancienne grange devient chapelle. C'est donc un bâtiment tout à fait original, qui a en grande partie conservé son aspect rural et possède une très belle charpente du XVIIe siècle. : inscription par arrêté du 19 avril 1990.","habitants":"Nicolas de Cadeville\r\n        \r\n        \"","divers":"Le château de Maillé à Plounevez-Lochrist GPS : 48° 37' 19,51\" Nord, 4° 10' 7,55\" Ouest","gps":"48° 37' 19,51\" Nord, 4° 10' 7,55\" Ouest","images":["../../jctruffet.com/image/image_29/29_Maill%c3%a9_1.jpg","../../jctruffet.com/image/image_29/29_Maill%c3%a9_2.jpg","../../jctruffet.com/image/image_29/29_Maill%c3%a9_3.jpg","../../jctruffet.com/image/image_29/29_Maill%c3%a9_4.jpg","../../jctruffet.com/image/image_29/29_Maill%c3%a9_5.jpg","../../jctruffet.com/image/image_29/29_Maill%c3%a9_6.jpg","../../jctruffet.com/image/image_29/29_Maill%c3%a9_7.jpg","../../jctruffet.com/image/image_29/29_Maill%c3%a9_8.jpg"]},"Consult_chateau_formulaire3eb1":{"id":"Consult_chateau_formulaire3eb1","dept":"29","canton":"Pont-de-Buis-lès-Quimerc","commune":"La Martyre","nom":"Martyre","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux à la Martyre; Guilly, et Poulbroc'h.                       GUILLY, un édifice ancien, antérieur au XVIIe siècle, a été agrandi et rhabillé dans la seconde moitié du XIXe siècle. La demeure appartient à M. de Brémont d'Ars au début du XXe siècle. Bâtiment de plan en L, de style néo-gothique, néo-médiéval. Le corps de logis principal, allongé est flanqué d'une aile en retour d'équerre, une tour circulaire étant placée à l'angle des deux bâtiments, tour crénelée sur la façade postérieure. Elévation à travées en moellon avec encadrements de baies, chaînes d'angle, corniche, lucarnes et ornements en pierre de taille.                                                                                                         POULBROC'H , François de Keroudault, seigneur de Poulbroc'h et Jérôme de Keroudault font du ministère dans la trève, le premier de 1639 à 1675, date de sa mort, le second de 1640 à 1655. Aux de Keroudault succèdent, par alliances, les de Penfeunteniou, Saisi de Kerampuil, le Forestier de Quillien, de Coattarel. Voici quelques actes concernant ces familles relevés sur les registres : - Le 17 Novembre 1681, écuyer Ronan de Penfeunteniou, de la paroisse de Plouédern, épouse Françoise de Keroudault, fille de Louis et de Marie de Trédern, dame de Kerbernard, héritière principale de Poulbroc'h. Guillaume Cren, vicaire général de Léon, bénit le mariage et signe.  Le 6 Décembre 1763, noble écuyer Jean-François-Paul-Henri de la Cour de Bellevoy, lieutenant de vaisseau et capitaine d'artillerie, épouse dame Véronique de l'Isle de Penfeunteniou, avec la permission du roi, signée par le duc de Choiseul.","architecture":"POULBROC'H, en 1767, on note les bans d'écuyer François-Louis de Penfeunteniou, seigneur de Poulbroc'h, officier d'infanterie, bataillon de Carhaix, et de Céleste Cabon de Kerandraon ; en 1808, les bans de Pierre-Marie Saisi de Kerampuil, ancien capitaine des Chasseurs de Flandre, chevalier de Saint-Louis, et de dame Jeanne-Véronique de Penfeunteniou de Poulbroc'h.  Le 7 Août 1832, mariage d'Augustin-Marie-Marc de Guengo Tonguédec (Tonquédec ?), de Morlaix, avec Marie-Agathe­François Saisi de Kerampuil. L'abbé de Lansalut, chanoine de Quimper et de Léon, recteur de Garlan, bénit le mariage.  Le 6 Juin 1838, mariage de M. Armand-Joseph-Marie Le Forestier de Quillien, fils de sieur François­Marie-René Le Forestier de Quillien, capitaine au régiment d'Aunis, et de dame Marie-Claude-Thérèse Jouan de Kervénoël, né à Daoulas, et domicilié à Saint-Pol de Léon, avec Marie-Pauline-Henriette Saisi de Kerampuil, le 6 Juin 1838.château construit à la fin du XIXe siècle sur le site d'un ancien manoir ; la propriété appartient à M. Le Forestier de Quillien au début du XXe siècle. Édifice de plan massé en L ; la façade antérieure est marquée par une aile en retour d'équerre formant pignon et une tour circulaire placée dans l'angle du corps de logis ; la façade postérieure est encadrée d'un pavillon saillant et d'une échauguette. Élévation à travées, en moellon avec soubassement, bandeaux horizontaux, encadrements de baies, chaînes d'angle, corniche et lucarnes en pierre de taille.","habitants":"Guuilly; Famille de M. de Brémont d'Ars                       Poulbroc; Famille de M. Le Forestier de Quillien\r\n        \"","divers":"Deux châteaux à la Martyre; Guilly, et Poulbroc'h.                        GPS : 48° 27' Nord, 4° 10' Ouest","gps":"48° 27' Nord, 4° 10' Ouest","images":["../../jctruffet.com/image/image_29/29_Martyre_1.jpg","../../jctruffet.com/image/image_29/29_Martyre_2.jpg"]},"Consult_chateau_formulaire1c68":{"id":"Consult_chateau_formulaire1c68","dept":"29","canton":"Moëlan-sur-Mer","commune":"Moelan sur mer","nom":"Moelan_sur_mer","type":"Château","periode":"XV","histoire":"A Moelan les vestiges du manoir de Kermoguer (XVe siècle) ; le manoir de Kervignac (1640) ;  le château de Plaçamen                                                                                KERTALG    le manoir de Kertalg (XVe siècle), encore surnommé \"château du Guilly\", propriété au XVe siècle de Hervé Du Juch. Reconstruit au XVIIIe siècle ; le colombier de Kermoguer (XVe-XVIe siècle) ;le fortin ou la maison douanière (XVIIe siècle), situé ria de Merrien ; C'est un \"château-hôtel\" près de Pont-Guily. Le Manoir de Kertalg se situe, en bordure du ruisseau du Guilly, au fond de l'anse de la Rivière de Belon. La construction du Manoir de Kertalg date du XVe siècle. Il était la propriété, au XVe siècle, de Hervé Du Juch. Le Manoir de Kertalg a été reconstruit au XVIIIe siècle. C'est devenu un superbe château-hôtel 4 étoiles.","architecture":"PLACAMEN,   le château de Plaçamen, construit par Casimir de Mauduit dans la première moitié du XIXe siècle.  Cest à Plaçamen, domaine denviron deux cents hectares et vingt métairies, que Thomas-Casimir se repose de ses années de guerre contre les Anglais et de sa longue captivité en Angleterre. Il sest installé à Plaçamen avec deux de ses surs, Alline-Marie, qui décède le 20 décembre 1825 à lâge de 22 ans, et Françoise-Gabrielle, qui disparaît le 14 mars 1831 à lâge de 35 ans, « rentière et célibataire », et de sa tante, Scholastique, née en 1783. Celle-ci a acheté le domaine avec son père en lan 6. Elle y passera toute sa vie avant dy décéder le 27 avril 1844, à lâge de 61 ans.","habitants":"Hervé Du Juch\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Trois châteaux à Moellan, Kertalg grav-1-2, Guilly  et de Plaçamen grav 3         Kermoguer grav 4-5                                                   GPS : 47° 49' 19,87' Nord, 3° 38' 49,28' Ouest","gps":"47° 49' 19,87' Nord, 3° 38' 49,28' Ouest","images":["../../jctruffet.com/image/image_29/29_Mo%c3%ablan_sur_mer_1.jpg","../../jctruffet.com/image/image_29/29_Mo%c3%ablan_sur_mer_2.jpg","../../jctruffet.com/image/image_29/29_Mo%c3%ablan_sur_mer_3.jpg","../../jctruffet.com/image/image_29/29_Mo%c3%ablan_sur_mer_4.jpg","../../jctruffet.com/image/image_29/29_Mo%c3%ablan_sur_mer_5.jpg"]},"Consult_chateau_formulaired47a":{"id":"Consult_chateau_formulaired47a","dept":"29","canton":"Crozon","commune":"Plonèvez-Porzay","nom":"Moellien","type":"Manoir","periode":"XVII","histoire":"MOELLIEN Le prédicateur Julien Maunoir prêcha une mission à Plonévez-Porzay en 1659.Le manoir et la famille de Moëllien aux XVIIe siècle et XVIIIe siècle, est reconstruit en 1642 par Nicolas de Moëllien selon une architecture qui s'inspire encore pour partie du style gothique, mais aussi pour partie du style classique à la française. Selon la tradition Guy de Moëllien aurait participé en 1683 à la bataille de Vienne sous les ordres du roi de Pologne Jean Sobieski.Une de ses descendantes, Thérèse de Moëllien (1759-1793) fut la maîtresse du marquis de La Rouërie et participa activement aux activités antirévolutionnaires. Elle fut guillotinée à Paris le 18 juin 1793. Le manoir fut alors pillé et vendu comme bien national, mais fut par la suite racheté par Guy de Moëllien. Plus tard, leurs enfants, Marie-André Le Corre et Bruno Garet sattacheront à poursuivre la rénovation du site et en feront un hôtel au charme authentique classé 3 étoiles. Marie-André et Bruno ont aujourdhui passé le flambeau à Cyrille et Maud Loussouarn qui sont heureux de vous y accueillir.","architecture":"MOELLIEN  du XVIIe siècle), passé aux mains de plusieurs familles (familles Kerret, puis Louis de Biré) en raison du mariage d'héritières successives dans le courant du XIXe siècle, puis vendu en 1929 à la famille Le Corre, est transformé en hôtel-restaurant de charme à partir de la décennie 1960.                                                                                                                \r\nManoir Renaissance composé de deux corps de logis, le second étant percé d'une porte d'entrée encadrée de deux colonnes doriques et surmontée d'un fronton triangulaire. Il est accolée une tour carrée dont le comble est porté par une corniche à modillons agrémentée de lucarnes à fronton circulaire.","habitants":"Nicolas de Moëllien \r\n        \r\n        \r\n        \"","divers":"à Moellien-Plouveez le manoir de Moellien","gps":"","images":["../../jctruffet.com/image/image_29/29_Moellien_1.jpg","../../jctruffet.com/image/image_29/29_Moellien_2.jpg","../../jctruffet.com/image/image_29/29_Moellien_3.jpg","../../jctruffet.com/image/image_29/29_Moellien_4.jpg","../../jctruffet.com/image/image_29/29_Moellien_5.jpg","../../jctruffet.com/image/image_29/29_Moellien_6.jpg"]},"Consult_chateau_formulaire6a79":{"id":"Consult_chateau_formulaire6a79","dept":"29","canton":"Morlaix","commune":"Morlaix","nom":"Morlaix","type":"Château","periode":"XVI-XIX","histoire":"Quatre châteaux à Morlaix de Napoléon, Keroriouval, Keriocr'iou et Keranroux                                                                                                                    NAPOLEON III  Morlaix, château du XIXe siècle, propriété privée, ne se visite pas, visible de l'extérieur, pas d'historique.                                                                                                                                  KERORIOUVAL  Édifice construit au cours du XIXe siècle,  agrandi par l'adjonction d'une tour d'angle couverte en pavillon à la fin du siècle. Le château appartient à M. A. de Montluc de la Rivière au début du XXe siècle. Bâtiment de plan rectangulaire.                                                                    KEROCH' IOU   Château construit en 1898 sur le site d'un ancien manoir aujourd'hui ruiné. La propriété est vendue en 1893 par Paul de Champagny au baron Alphonse Cazin d'Honincthun qui confie les travaux du nouvel édifice à un architecte de Saint-Brieuc. Bâtiment néo-XVIIe de plan massé; le corps de logis est flanqué de plusieurs pavillons surélevés. Elévation de moellon avec soubassement, encadrements de baies, bandeaux horizontaux, chaînes d'angle, corniche en pierre de taille. Lucarnes surmontées d'un fronton semi-circulaire orné d'une coquille. : les façades et les toitures y compris le portail d'entrée : classement par arrêté du 26 novembre 1979.","architecture":"KERANROUX  La Seigneurie de Keranroux, connue depuis 1301, a été cédée au XVIIIe par la famille du Parc à Madame de la Fruglaye, née Sophie de Caradeuc, fille de Louis René de Caradeuc de la Chalotais, procureur général du Parlement de Bretagne. L'ancien manoir fut remplacé en 1773 par le château actuel, qui devint la résidence de la famille de la Fruglaye. Le bâtiment, de plan rectangulaire et d'ordonnance classique, occupait le centre d'un domaine composé d'un jardin entouré d'un parc. L'ensemble a subi aux XIXe et XXe siècles des modifications, toiture du château, sculpture de son fronton, reconstruction des communs, d'une maison de style Directoire dans le bas du parc et d'une ferme modèle à l'autre extrémité du domaine. Ces ajouts importants n'altèrent cependant pas la perception que l'on a du domaine. .Éléments protégés MH : les façades et les toitures, la suite des pièces du rez-de-chaussée, le vestibule et son escalier, les façades et les toitures de la chapelle, des communs, de la maison du régisseur et de la ferme de Roz-ar- Prat, le colombier et la fontaine, le jardin avec ses terrasses, les ruines de la chapelle médiévale : inscription par arrêté du 19 novembre 1992.","habitants":"Nec'Hoat; Famille La Barre de Nanteuil                Keroriouval;  M. A. de Montluc de la Rivière    Kerioch'Iou ; Famille de  Paul de Champagny       Keranroux; famille du Parc\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Quatre châteaux à Morlaix grav 1 de Napoléon, de Nec'Hoat  grav-3-4-5, Kéroriouval, de Keroch'iou grav 2-3  et de Kéranroux_6-7                                                                           Keroch'iou  GPS : 48° 36' 07\" Nord, 3° 50' 39\" Ouest","gps":"48° 36' 07\" Nord, 3° 50' 39\" Ouest","images":["../../jctruffet.com/image/image_29/29_Morlaix_1.jpg","../../jctruffet.com/image/image_29/29_Morlaix_2.jpg","../../jctruffet.com/image/image_29/29_Morlaix_3.jpg","../../jctruffet.com/image/image_29/29_Morlaix_4.jpg"]},"Consult_chateau_formulaire3b3f":{"id":"Consult_chateau_formulaire3b3f","dept":"29","canton":"Morlaix","commune":"Morlaix","nom":"Morlaix_II","type":"Château","periode":"XV-XVIII","histoire":"Deux châteaux à Morlaix; Nec'Hoat et Traon-Feunténiou.            NEC'HOAT   était la propriété de la famille La Barre de Nanteuil au XVIe siècle. Ce château a été bâti sur une terre seigneuriale appartenant au XVIe siècle à la famille Kergournadeac'h. En 1680, la propriété est acquise par Philippe Coroller de Kervescontou. Avant la Révolution, le château servait de résidence secondaire au marquis de Kerouartz. Durant la Révolution, le domaine est vendu comme bien national à la famille Guégot de Traoulen dont l'héritière Hélène, apporte la propriété suite à son mariage le 20 juin 1842, au général Le Flô, ancien ambassadeur en Russie. Le portail date de 1880 et a été construit par le général Le Flô. Édifice de plan allongé ; le corps de logis principal reçoit un pavillon perpendiculaire à l'une des extrémités ; une tour circulaire demi-hors-oeuvre occupe le centre de la façade antérieure et une tour carrée sur laquelle est greffée au niveau du toit une petite tourelle. Élévation ordonnancée à travées, en moellon enduit, avec encadrements de baies, bandeaux horizontaux, chaînes d'angle, corniche et lucarnes en pierre de taille, communs à l'arrière.","architecture":"TRAON-FEUNTENIOU, si la seigneurie de Traon-feunténiou est attestée dès le XVe siècle, le bâtiment actuel n'est pas antérieur au XVIIIe siècle. C'est un long bâtiment à étage, de décor très sobre, reconstruit avec les matériaux de l'ancien manoir, et modifié au XIXe siècle. Le colombier gothique a été rasé au début du XXe siècle. L'intérêt du bâtiment est surtout d'ordre historique : il a été propriété du Maréchal Foch, avant d'être racheté par les religieuses qui l'occupent actuellement.  la construction du manoir date du XVIIIe au XIXe siècle. Le propriétaire initial du château fut Sébastien du Trévou, seigneur de Traon Feunteniou qui fut condamné et emprisonné en 1792, au château du Taureau, pour avoir maltraité son équipage alors qu'il commandait Le Papillon. Il fit aussi abattre un arbre sur deux de l'allée principale de sa propriété, peine très déshonorante à l'époque. Il réussit à s'évader du château du Taureau, mais fut retrouvé mort, sur la côte de Térénez. Peu après 1883, Ferdinand Foch, Lieutenant-Colonel épousa Julie Bienvenüe, de Saint-Brieuc, et racheta le château de Traon-Feunteniou à la famille La Jaille. Le colombier, de style gothique, fut rasé au début du XXe siècle. En 1940, les Allemands rasèrent la chapelle et firent abattre de grands ormes centenaire pour rallonger leur piste datterrissage. C'est Anne Fournier, la fille du Maréchal, qui occupa la dernière le château, jusquà son décès, en 1981. Le propriétaire suivant, labbée Coache, donna le château aux religieuses de Saint François d'Assise. Les façades et toitures du logis, le cabinet de travail du Maréchal Foch, la clôture de la cour, le potager, le tapis vert et l'allée d'accès avec ses piliers d'entrée sont inscrits aux M.H. depuis le 19.11.1992. Le Château de Traon Feutenieu fut aussi la résidence du Maréchal Foch. Le cabinet de travail du Maréchal Foch reste accessible à la visite. Aujourd'hui, devenu un monastère, le château de Traon-Feunteniou est la propriété d'une asociation.","habitants":"\"","divers":"Deux châteaux à Morlaix; Nec'Hoat grav 2-3-4- et Traon-Feunténiou grav-1                                          GPS : 48° 36' 19\" Nord, 3° 50' 02\" Ouest                                                             Traon  GPS : 48° 36' 42,89\" Nord, 3° 48' 27,69\" Ouest","gps":"48° 36' 19\" Nord, 3° 50' 02\" Ouest","images":["../../jctruffet.com/image/image_29/29_Morlaix_II_1.jpg","../../jctruffet.com/image/image_29/29_Morlaix_II_2.jpg","../../jctruffet.com/image/image_29/29_Morlaix_II_3.jpg","../../jctruffet.com/image/image_29/29_Morlaix_II_4.jpg","../../jctruffet.com/image/image_29/29_Morlaix_II_5.jpg"]},"Consult_chateau_formulaireca7b-2":{"id":"Consult_chateau_formulaireca7b-2","dept":"29","canton":"Morlaix","commune":"Morlaix","nom":"Morlaix_III","type":"Château","periode":"XVI-XIX","histoire":"Deux châteaux dans cet article de Morlaix; Kérozar, Ker Huella , Trobidon et Kerivoas à Plourin les Morlaix.                                                                                                               KEROZAR,  l'ensemble est niché dans un magnifique parc arboré de six hectares, où trônent notamment un imposant tilleul et un palmier remarquable, le château est mentionné dès le XVIe siècle, et appartient alors à Alain Quintin, époux de Périne de Kermerc'hou. La demeure est vendue par Jeanne Quintin à Jean Guillotou, ensuite elle devient la propriété de François Joseph Guillotou, seigneur de Kerever et secrétaire du roi en 1739. Elle est vendue comme bien national à la révolution, et devient la propriété de la famille de Villiers, de la famille Le Loup Varennes, puis de la famille Le Bris en 1843. Château  reconstruit au milieu du XIXe siècle par Jacques Le Bris. Il appartient au général Le Bon au début du XXe siècle. En 1964, le château est vendu à la société Unicopa pour en faire son siège social. L'édifice est de plan allongé (en L ou en H). Le corps central est cantonné de plusieurs pavillons de plan carré. Maçonnerie enduite avec encadrements de baies, bandeaux horizontaux, chaînes d'angle, corniche et lucarnes.                                                                                              KERIVOAS,  à cinq K.M. au sud à Plourin les Morlaix, construit dans la deuxième moitié du XIXe siècle. Édifice de plan massé, le corps de logis central rectangulaire, est cantonné d'une tour polygonale hors-oeuvre, d'une échauguette et d'un corps bas latéral au nord ; la façade sur jardin est marquée par un bow-window central en pierre de taille, brique et pan de bois. Soubassement en pierre de taille à bossage, élévation de moellon enduit avec encadrements de baies et chaînes d'angle en pierre de taille et brique alternées ; l'échauguette en brique. Parc avec une grande serre au sud.","architecture":"KER-HUELLA,   Myriam et Philippe vous accueillent toute lannée dans leur charmant manoir qui date du XIXe siècle, se situe au cur même de la ville de Morlaix, au dessus du port et de la place principale. A pieds par les venelles, vous rejoindrez le centre ville, ses commerces, ses restaurants en quelques minutes. Les plages et la magnifique baie de Morlaix sont à un quart dheure en voiture. Le vaste parc dun hectare et demi, alternance de jardins fleuris et d'espaces arborés, vous permettra de vous détendre en fin de journée après vos visites. Nos quatre chambres d'hôtes, récemment rénovées dans l'esprit du XIXè siècle, confortables et lumineuses, disposent chacune d'une salle d'eau privative avec WC. A pied, de la gare TGV, vous serez à Ker-Huella, très rapidement. Vous y recevrez un agréable accueil et y trouverez des chambres d'hôtes.Nous vous proposons également une table d'hôtes en hiver . Vous pourrez aussi bénéficier des massages détente d'Anouk Delles.                                                                            TRODIBON au nord de Morlaix, situé sur la commune de Plouézoc'h en Trégor Morlaisien , le château de Trodibon date du XVIIIe siècle.\r\nIl a été construit sur les ruines d'un monument plus ancien.\r\nIl a appartenu à la famille De Kersauson  dont une lignée fut maires de Plouézoc'h.","habitants":"Kérozar;famille de Villiers,                                                              Ker Huella;  Myriam et Philippe                                              Trobidon; famille De Kersauson\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Deux châteaux dans cet article de Morlaix;   Kérozar grav-4 et Ker Huella grav -1-2-3. Huella GPS : 48° 34' 42\" Nord, 3° 49' 36\" Ouest            Trodibon grav -5-6  Kervoas-7","gps":"48° 34' 42\" Nord, 3° 49' 36\" Ouest            Trodibon grav","images":["../../jctruffet.com/image/image_29/29_Morlaix_III_1.jpg","../../jctruffet.com/image/image_29/29_Morlaix_III_2.jpg","../../jctruffet.com/image/image_29/29_Morlaix_III_3.jpg","../../jctruffet.com/image/image_29/29_Morlaix_III_4.jpg"]},"Consult_chateau_formulairef1b5":{"id":"Consult_chateau_formulairef1b5","dept":"29","canton":"Moëlan-sur-Mer","commune":"Nevez","nom":"Nevez","type":"Château","periode":"XIV-XVI","histoire":"quatre châteaux à Nevez dont Nevez ; Dalmore, Hénant,Poulguin et Panhoat.                                                                                                     NEVEZ, Hervé, seigneur de Névez, chevalier, vivait en 1260. Jacques de Névez, lui aussi chevalier, et capitaine. Claude de Névez, son fils, épousa en 1595 Élisabeth d'Acigné ; il fut gouverneur de Quimper et décéda en 1597. Leur fils Claude II de Névez se maria avec Françoise d'Avaugour. Leur fils René  fut colonel dans le Régiment des vaisseaux du Roi et mourut en 1660.                                                                                                                       DALMORE, le manoir date de 1926. Il a été construit à linitiative dune australienne amatrice dart, ayant succombé aux charmes de la région et désireuse de se rapprocher de Pont-Aven et de sa célèbre école de peinture. A son décès en 1941, la demeure est rachetée par une famille Brestoise désireuse de séloigner des bombardements. Quatre générations plus tard, les successeurs décident, en 2011, de transformer le manoir en hôtel pour permettre au plus grand nombre de profiter de ce site.                                                                                                          HENANT, la partie la plus ancienne du château remonterait au XVe siècle. La chapelle et la tour polygonale datent du XVIe siècle. Le reste du bâtiment a été reconstruit au XIXe siècle. La tour polygonale semble avoir toujours été placée telle qu'elle est par rapport au corps de logis. Elle est elle même flanquée d'une tourelle d'escalier polygonale. Des communs devaient exister un peu plus à l'ouest, s'appuyant à une courtine, mais le tout a été abattu. La courtine percée de deux portes, aboutit, à gauche, à une grosse tour polygonale et, à droite, à la chapelle. Éléments protégés MH : la tour, la courtine bordant la cour sud, la grosse tour reliée à cette courtine et la chapelle : inscription par arrêté du 4 mars 1935.","architecture":"HENANT, la construction du château du Hénan a commencé au XIVe siècle et s'est surtout développée durant la première moitié du XVIe siècle. Selon Émile Souvestre, le château fut construit au XIVe siècle pour défendre l'entrée de la rivière Aven. Il décrit ainsi le château dans la première moitié du XIXe siècle : « L'entrée principale de cette forteresse a deux portes, l'une grande, l'autre petite. Sur le mur règne une galerie à mâchicoulis et à l'extrémité s'élève une tour hexagone. Dans l'intérieur de la cour se trouve le logis principal et le donjon, surmonté d'une galerie tréflée du plus charmant effet, et que couronne un toit pointu avec sa girouette. Une tourelle appliquée contre le donjon renferme l'escalier. À l'opposé de la tour d'entrée existe la chapelle, plus endommagée que le reste de l'édifice ».                                                                                                       POULGUIN  manoir (ou château) du Poulguin, en bordure de l'Aven, semble avoir été construit à partir du début du XVIe siècle. Il est mentionné dans un acte de mariage de 1525. Il est flanqué d'une chapelle et d'un colombier.                                                                                                    PANHOAT, aujourdhui rénové par les époux Gélard, le manoir du Penhoat, à Plounéour-Ménez,  dont les premières traces remontent au XIIIe siècle, a connu des heures de gloire, des personnages illustres puis labandon.Situé sur un domaine de 35 ha, au milieu dun jardin botanique qui compte des spécimens exceptionnels, la demeure était en ruines lorsque le couple la rachète à la famille Traoulen, en 1988. Originaire de Bretagne, les nouveaux propriétaires, qui vivaient à Londres depuis des années pour des raisons professionnelles, avaient le désir de revenir pour sinstaller dans une demeure chargée dhistoire.","habitants":"Claude de Névez\r\n        \"","divers":"quatre châteaux à Nevez dont Nevez ; Dalmore grav 1-2 Hénant grav 3-4-5-6,   Poulguin -grav 7  et Panhoat   grav-8-9                                                     GPS : 47° 49' 52,97\" Nord, 3° 45' 18,65\" Ouest","gps":"47° 49' 52,97\" Nord, 3° 45' 18,65\" Ouest","images":["../../jctruffet.com/image/image_29/29_N%c3%a9vez_1.jpg","../../jctruffet.com/image/image_29/29_N%c3%a9vez_2.jpg","../../jctruffet.com/image/image_29/29_N%c3%a9vez_3.jpg","../../jctruffet.com/image/image_29/29_N%c3%a9vez_4.jpg","../../jctruffet.com/image/image_29/29_N%c3%a9vez_5.jpg","../../jctruffet.com/image/image_29/29_N%c3%a9vez_6.jpg","../../jctruffet.com/image/image_29/29_N%c3%a9vez_7.jpg","../../jctruffet.com/image/image_29/29_N%c3%a9vez_8.jpg","../../jctruffet.com/image/image_29/29_N%c3%a9vez_9.jpg"]},"Consult_chateau_formulaire6ccb-2":{"id":"Consult_chateau_formulaire6ccb-2","dept":"29","canton":"Carhaix-Plouguer","commune":"Loperec","nom":"Nivot_Loperec","type":"Manoir","periode":"XVII","histoire":"NIVOT, une enceinte, probablement d'origine médiévale, a été partiellement conservée. l'ancienne chapelle est désaffectée à la Révolution. Le manoir, construit ou reconstruit vers 1650 à l'intérieur de l'enceinte, est transformé en 1884 en château de chasse pour le prince Russe Pierre de Sayn Wittgenstein, les travaux sont exécutés par les entrepreneurs. Le Borgne de Brasparts et Charreteur de Sizun. En 1889, Jean Charles Chevillotte acquiert le domaine de 400 ha et fait rehausser le logis en 1895. Le projet de créer une école d'agriculture, né avant 1914, n'est réalisé qu'en 1922, grâce à la fondation Chevillotte, aboutissant à la construction actuelle.","architecture":"NIVOT, l'édifice d'après les plans de Ruer et Mony, architectes à Douarnenez et réalisés par l'entrepreneur Cornec de Châteaulin. L'ensemble a été agrandi dans les années 1960-1970.  Enceinte quadrangulaire ; logis à étage de soubassement flanqué d'un pavillon à un étage carré ; école à plan symétrique, élévation ordonnancée à travées, étage de soubassement et trois étages carrés.","habitants":"prince Russe Pierre de Sayn Wittgenstein\r\n        \"","divers":"Château Nivot à Loperec","gps":"","images":["../../jctruffet.com/image/image_29/29_Nivot_1.jpg","../../jctruffet.com/image/image_29/29_Nivot_2.jpg","../../jctruffet.com/image/image_29/29_Nivot_3.jpg"]},"Consult_chateau_formulairefd28":{"id":"Consult_chateau_formulairefd28","dept":"29","canton":"Landerneau","commune":"Pencran","nom":"Pencran","type":"Château","periode":"XV-XSVI","histoire":"Deux châteaux à Pencran,  Chef des Bois et Kermadec.                              CHEF DES BOIS, le château est un ensemble dont l'évolution est assez mal connue et qui présente d'importants remaniements. Il ne semble rien subsister du manoir initial, construit au XVe siècle par Jean Guérault. C'est au XVIIe siècle que fut reconstruit un château, selon un plan en U. Le marquis de Kerlozrec, propriétaire du manoir à la fin du XVIIe siècle, s'adressa à l'architecte brestois Le Petit, élève de Mansart et de Le Nôtre, pour faire agrandir le château. Les projets de l'architecte, trop ambitieux et trop coûteux, ne reçurent qu'un début d'exécution: transformation du toit du logis en toit à la Mansart, démolition de l'aile est, et peut-être début d'exécution du jardin, dont subsiste un bassin. La chapelle prévue fut ajoutée en 1777. L'ensemble actuel, quelque peu hétéroclite, n'a plus qu'une ressemblance lointaine avec la demeure initiale et avec le projet de l'architecte, mais conserve une architecture de belle qualité.  Éléments protégés MH : les façades et les toitures de l'ensemble des bâtiments constituant le château. La cour avec ses murs de clôture, le cloître, le colombier, l'allée d'accès avec ses piliers. A l'intérieur, le grand escalier : inscription par arrêté du 23 décembre 1992. Propriété de monsieur Olivier  Rasmonduc.","architecture":"Manoir de KERMADEC, le manoir de Kermadec est situé dans un site occupé depuis l'époque gallo-romaine. Il a appartenu au Moyen Age à Gérard Saladin dont le fils, Olivier, est devenu recteur de l'Université de Paris, puis évêque de Nantes, au XIVe siècle. Le manoir passe ensuite à la famille Huon de Kermadec. L'édifice actuel, datant du début du XVIe siècle, est dû à Pierre Huon de Kermadec, et il est conçu selon les dispositions traditionnelles des manoirs de cette époque dans le Léon. Il se compose d'un corps de logis en équerre donnant sur une cour autrefois fermée. Il a été dégagé des constructions agricoles parasites qui le défiguraient et a retrouvé ainsi tout son intérêt, d'autant plus que l'intérieur a conservé ses dispositions d'origine. Représentatif de l'architecture manoriale du Léon. Éléments protégés MH : l'ensemble des bâtiments constituant le manoir, ainsi que la parcelle située au Nord du logis : inscription par arrêté du 23 décembre 1992.","habitants":"Chef; famille de Jean Guérault                                                  Kermadec; Famille de Gérard Saladin\r\n        \"","divers":"Deux châteaux à Pencran,  Chef des Bois  grav 1-2  et Kermadec grav -3-4.                                                                Chef des bois GPS : 48°26'11,83\" Nord, 4°14'8,49\" Ouest","gps":"48°26'11,83\" Nord, 4°14'8,49\" Ouest","images":["../../jctruffet.com/image/image_29/29_Pencran_1.jpg","../../jctruffet.com/image/image_29/29_Pencran_2.jpg","../../jctruffet.com/image/image_29/29_Pencran_3.jpg","../../jctruffet.com/image/image_29/29_Pencran_4.jpg"]},"Consult_chateau_formulaire2246":{"id":"Consult_chateau_formulaire2246","dept":"29","canton":"Quimper","commune":"Plomelin","nom":"Plomelin_II","type":"Château","periode":"XIX-XX","histoire":"quatre châteaux dans cet article  à Plomelin,, Kerdour, Lestemeur  Kerouzien et Kerambliez.                                                                                                                                                                                                        KERDOUR, plusieurs campagnes de construction peuvent être distinguées par l'analyse stylistique du bâtiment, en particulier un corps de logis construit au XIXe siècle en avant d'un pavillon, et agrandi par une aile en retour d'équerre à la fin du XIXe siècle ou au début du XXe siècle. Corps de logis rectangulaire à cinq travées régulières. On y remarque, au milieu du corps de logis principal, un bâtiment carré assez élevé, flanqué de deux tourelles, dans lesquelles sont pratiquées de nombreuses meurtrières. Ce bâtiment et ces tourelles, quoique paraissant avoir été édifiés dans le XVIe siècle, sont bien plus ancien que le reste de la demeure. Aile en retour d'équerre présentant un pignon en façade et de larges baies à meneaux.","architecture":"KERAMBLIEZ, le château de Kerambleiz, de style néo-gothique, a été construit dans la deuxième moitié du XIXe siècle pour la famille Roussin, en même temps qu'est aménagé un beau parc. Il a été la résidence du marquis de Pluc. Edifice de plan allongé cantonné de tours circulaires et d'échauguettes couvertes en poivrière. Les façades sont accentuées par un corps central formant pignon et pavillon. Ornementation de style néo-gothique avec fenêtres à meneaux, lucarnes surmontées de pignons à gâble orné d'un trilobe, pinacle, accolade.                                                                                                KEROUZIEN, château construit au cours de la deuxième moitié du XIXe siècle; agrandissement latéral au début du XXe siècle par M. de Carné. Bâtiment de plan symétrique, le corps de logis rectangulaire recevant un avant corps central polygonal sur la façade sur jardin. Dépendance latérale couverte en terrasse. Maçonnerie enduite avec encadrements de baies, bandeaux horizontaux, chaînes d'angle et corniche en pierre de taille. Le parc, l'orangerie ainsi que la cascade sont inscrits comme jardins remarquables. Chambres d'hôtes.                                                                        \r\nLESTEMEUR a appartenu à Guy de Keraldanet (décédé en 1628 ou 1629), seigneur de Rossulien et époux de Marguerite de Coëtnempren (née vers 1599, décédée le 18 juillet 1662 à Rennes) ; puis à la famille de Sévigné (en raison du mariage de Marguerite de Coëtnempren avec Charles de Sévigné (1598-1635). Il fut vendu en 1713 à René Le Prestre (1656-1724), seigneur de Lézonnet et de Châteaugiron, qui fut notamment président à Mortier du Parlement de Bretagne.","habitants":"Kérambliez  , Famille Roussin                                    Kerouzien ; M. de Carné.                                                   Lestemeur  : famille de Sévigné\r\n        \"","divers":"Quatre châteaux à Plomelin,  Kerdouir-grav-4,  Kerouzien grav -5 et Kerambliez grav -2-3-4. Lestemeur grav-6                                             Kerdour-2GPS : 47° 56' Nord, 4° 09' Ouest                                                       Kerouzien GPS : 47° 56' Nord, 4° 09' Ouest                                                  Kérambleiz GPS : 47° 56' Nord, 4° 09' Oues","gps":"47° 56' Nord, 4° 09' Ouest","images":["../../jctruffet.com/image/image_29/29_Plomelin_II_1.jpg","../../jctruffet.com/image/image_29/29_Plomelin_II_2.jpg","../../jctruffet.com/image/image_29/29_Plomelin_II_3.jpg","../../jctruffet.com/image/image_29/29_Plomelin_II_4.jpg","../../jctruffet.com/image/image_29/29_Plomelin_II_5.jpg","../../jctruffet.com/image/image_29/29_Plomelin_II_6.jpg"]},"Consult_chateau_formulaire4dcf":{"id":"Consult_chateau_formulaire4dcf","dept":"29","canton":"Quimper","commune":"Plomelin-2","nom":"Plomelin_Pérennou","type":"Château","periode":"XVI-XVII-XIX","histoire":"Deux châteaux dans cet article Perennou et   Kéraval.                          PERENNOU, Christian de Broc est le propriétaire, jardinier et guide de Pérennou.  Christian de Broc, 72 ans, vit depuis 1984, à Pérennou. « En intérieur, nous ne faisons que visiter le 1er étage, le reste est privé, j'y habite avec ma fille ». Lorsque son père, Charles de Broc, est décédé, Christian a pris le relais de la responsabilité du domaine, parc romantique, qui fut dessiné par Bühler, au milieu du XIXe siècle avec ses grands arbres séculaires, de belles perspectives sur l'Odet et le château.  Depuis 2000, prend soin d'entretenir le parc de 18 ha qui entoure le château. « La tempête de 1987 a fait de sacrés dégâts : 800 arbres furent déracinés, mais les spécimens les plus importants du jardin ont survécu à cette épreuve ». En 1841, la famille fit appel à Denis Bühler, un paysagiste, qui transforma le champ autour du château, en véritable parc. Ils plantent une sélection variée d'arbustes, qui perdurent encore aujourd'hui. Un Gingko biloba de 28 m trône au centre du parc, « l'espèce la plus ancienne encore vivante aujourd'hui, son origine remonte à il y a 300 millions d'années ». Un peu plus loin, en marge du château, un énorme châtaignier de 400 ans, avec un tronc imposant de 8 m de circonférence. À l'Est du château, une pente raide donne sur un petit ruisseau. Étouffé par la végétation, un pont parvient à le chevaucher. Il offre une vue pittoresque du château dans un paysage naturel cadré par deux Séquoia sempervirens de 50 m chacun.","architecture":"PERENNOU, la reconstruction  procède très probablement du rhabillage et de l'agrandissement d'un manoir pouvant remonter au XVe siècle et dont une partie semble être conservée au nord. Cette intervention peut être datée du 3e quart du 19e siècle ; un parc paysager est aménagé par Eugène Bühler en 1850. Des vestiges archéologiques sont retrouvés sur le domaine, édifice de plan allongé irrégulier ; le corps de logis est composé de deux corps de bâtiments principaux flanqués de tours   en encorbellement, d'échauguettes et d'avant-corps saillants. Le centre de la façade nord est occupé par un châtelet d'entrée de plan ovale au devant duquel est construite la chapelle. L'entrée de la façade sud s'inscrit dans un massif formant pignon, accosté d'un avant-corps polygonal. L'élévation comprend un niveau de rez-de-chaussée, un ou deux étages carrés suivant les corps de bâtiment ; elle est ordonnancée en travées au sud. Le gros oeuvre est en moellon de granite avec encadrements de baies, chaînes d'angle, corniche et lucarnes en pierre de taille. Le massif central de la façade sud est en pierre de taille de granite.                                                                                                                                        KERAVAL  ancien manoir construit au XVIe siècle par Guillaume Moreau puis transformé au XVIIe siècle. En 1842, Victor Roussin, qui en est propriétaire, sollicite Joseph Bigot pour la construction de dépendances agricoles (écurie, remise, étable, poulailler). En 1861, l'architecte quimperois agrandit le logis par la construction d'une tour néogothique à l'emplacement de l'ancienne chapelle et d'une serre.  Corps de logis ancien de plan allongé encadré d'un pavillon polygonal à deux étages carrés sur rez-de-chaussée et combles recevant une ornementation de style néogothique et pittoresque, et, à l'autre extrémité de deux annexes crénelées et couvertes en terrasse. Intérieur.","habitants":"Perennou : Famille de Christian de Broc                              Kéraval ; Famille  Guillaume Moreau                                Kerambliez;  Famille Roussin                                Lestemeur ; Famille de Sévigné \r\n        \r\n        \r\n        \"","divers":"trois  châteaux à Plomelin,   Kéraval-Grav-1    Perennou grav-2-3-4   GPS : 47° 56' Nord, 4° 09' Ouest","gps":"47° 56' Nord, 4° 09' Ouest","images":["../../jctruffet.com/image/image_29/29_Plomelin_P%c3%a9rennou_1.jpg","../../jctruffet.com/image/image_29/29_Plomelin_P%c3%a9rennou_2.jpg","../../jctruffet.com/image/image_29/29_Plomelin_P%c3%a9rennou_3.jpg"]},"Consult_chateau_formulaire0579":{"id":"Consult_chateau_formulaire0579","dept":"29","canton":"Quimper","commune":"Plonéis","nom":"Plonéis","type":"Château","periode":"XIX","histoire":"Quatre châteaux à Ploneis  Marc'Hallac'h, Kerven, Lanhoulou  et Kergaben.                                                                                                                                                                                    KERVEN,  Claude du Disquay était le seigneur de Plonéis et occupait la charge de Président du Présidial (tribunal) de Quimper. Lun de ses prédécesseurs fut procureur général et maître de requête du duc de Bretagne et son ambassadeur à Rome. La Révolution de 1789 sonna le déclin du manoir. Le seigneur de Kerven, le comte Louis-René du Brieux, officier de vaisseau du Roy, dût émigrer en Grande-Bretagne où il aurait laissé une descendance.\r\nLANHOULOU appartenait avant la Révolution française à la f de Carné , mais il a été démantelé en 1929.  Situé à deux kilomètres au nord du bourg, ce vieux manoir fut quasiment démantelé en 1929 pour servir à la construction dune villa à Douarnenez, près du Ris, où on y retrouve notamment la porte à arcade armoriée de la cour.Au XVIIe siècle, le manoir appartenait à la famille de Moellien. A la Révolution, le propriétaire des lieux émigra.\r\nKERGABEN, sur la route de Quimper-Douarnenez, moins dun kilomètre avant le bourg, se situe le manoir de Kergaben au centre dun magnifique domaine où le Goyen prend sa source. Le manoir construit en 1765 servit de presbytère jusquà la Révolution \"Ar presbytal Coz\" disaient les anciens. Le linteau sculpté au-dessus de la porte dentrée en témoigne. Agrandi il y a un peu plus dune centaine dannées, il a troqué son côté austère contre une superbe restauration en 1986.","architecture":"MARC'HALLAC' H, édifice de plan massé comportant un corps de bâtiment principal sur lequel se greffent quelques excroissances (tourelles d'escalier et corps d'entrée au nord, abside polygonale de la chapelle à l'est, bow-window et terrasse au sud). Élévation en maçonnerie de moellon enduit avec niveau de soubassement, encadrement de baies, chaînes d'angle, corniche et lucarnes en pierre de taille de granite. Toit brisé couvert d'ardoise. Château construit en 1888 par la famille de Carné d'après les plans d'un architecte marseillais sur le site d'un manoir plus ancien dont subsistent des vestiges dans les bâtiments de communs.                                                                                                                     KERVEN, la partie la plus ancienne du manoir est datée du XIIIe siècle. Il fut profondément remanié lors de la première moitié du XVIIe siècle pour devenir cet ensemble architectural très homogène que nous connaissons aujourdhui. Il est composé dune maison noble avec un corps de logis, les communs et une cour dhonneur de vaste proportion, lensemble clos dun mur denceinte. Le plus bel élément de cet édifice est une porte gothique du milieu du XVIe siècle. En 1651, conséquence du prestige et de la grandeur reconnus aux terres de Kerven, une décision royale érige le manoir au rang de châtellenie avec le droit de rendre justice sur son territoire.   Vendue au titre des Biens Nationaux, la terre de Kerven fut progressivement abandonnée et nétait plus quune ruine au début des années 60. Depuis, les propriétaires successifs ont redonné une seconde vie au manoir qui a retrouvé toute son authenticité.","habitants":"Kerven : Famille du comte Louis-René du Brieux                                                   marc'Hallac'h ;Famille  de Carné                               Lanhoulou ;  Famille de Moellien\r\n        \r\n        \"","divers":"Quatre châteaux à Ploneis  Marc'Hallac'h grav-6-7, Kerven grav-1-2-3 Lanhoulou grav-8  et Kergaben grav--4-5.","gps":"","images":["../../jctruffet.com/image/image_29/29_Plon%c3%a9is_1.jpg","../../jctruffet.com/image/image_29/29_Plon%c3%a9is_2.jpg","../../jctruffet.com/image/image_29/29_Plon%c3%a9is_3.jpg","../../jctruffet.com/image/image_29/29_Plon%c3%a9is_4.jpg","../../jctruffet.com/image/image_29/29_Plon%c3%a9is_5.jpg","../../jctruffet.com/image/image_29/29_Plon%c3%a9is_6.jpg","../../jctruffet.com/image/image_29/29_Plon%c3%a9is_7.jpg","../../jctruffet.com/image/image_29/29_Plon%c3%a9is_8.jpg"]},"Consult_chateau_formulairef831":{"id":"Consult_chateau_formulairef831","dept":"29","canton":"Plonéour-Lanvern","commune":"Plonéour-Lanvern,","nom":"Plonéour_Lanvern","type":"Château","periode":"XV-XVII","histoire":"Deux châteaux à Plonéour Kerhuel, et Trévilit.                                  KERHUEL, la tour est probablement le vestige d'un système de défense du XVIIe siècle ; la porte Est de l'enclos date de 1771, les communs remontent au XVIIIe siècle, le logis, de style néo-XVIIe, date de la deuxième moitié du XIXe siècle. Château au centre d'un parc et d'un ensemble de bâtiments annexes. Édifice de plan massé comprenant un corps central encadré de deux ailes perpendiculaires, élévation à un étage carré et un étage de comble ; toit brisé percé de lucarnes, le parc possède une belle avenue de jardin, une terrasse en terre plein et une orangerie. Château réhabilité après de longues années d'abandon, derrière ses grilles vous allez découvrir un endroit d'une beauté inattendue et profiter d'un calme enchanteur dans un écrin de verdure. Ses tours, ses créneaux et son majestueux perron, soulignent une architecture remarquable entièrement dédiée à votre plaisir.  Philippe et Rachel Lanvoc, hôtel restaurant avec salle de réceptions pour mariage.","architecture":"TREVILIT, la construction du Manoir de Trévilit date du XVe siècle. Le corps de logis principal est composé d'un corps central. Il n'a qu'un rez-de-chaussée et un premier étage. Il comprend un corps central, percé de 8 fenêtres à croisillons, réparties autour d'une porte moulurée en anse de panier, surmontée d'une lancette et flanquée de pilastres à fleurons. Celui-ci se poursuit par une aile reliant la chapelle au manoir principal. L'aile comporte le rez-de-chaussée et le comble éclairé par des lucarnes à fronton plat. Au bout du logis se trouve la chapelle, qui forme un pavillon d'angle, limité à l'Est et à l'Ouest par un pignon. Au Nord, se trouve un mur de défense qui ferme la cour. Il est garni de corbelets qui supportaient le mur du chemin de ronde garni de mâchicoulis. Dans le manoir de Trévilit se trouve plusieurs cheminées monumentales en granit sculpté d'ornements floraux. Au sud de cet ensemble et séparé de lui de 35 mètres, se trouve un grand enclos, qui abritait les personnes et animaux des environs, en cas d'attaque. Le manoir de Trévilit est inscrit aux M.H.","habitants":"Seigneurs locaux\r\n        \"","divers":"Deux châteaux à Plonéour Kerhuel grav-1-2-3-4, et Trévilit grav-7-8.                                                                                   Trévilit GPS : 47° 54' Nord, 4° 17' Ouest","gps":"47° 54' Nord, 4° 17' Ouest","images":["../../jctruffet.com/image/image_29/29_Plon%c3%a9our_Lanvern_1.jpg","../../jctruffet.com/image/image_29/29_Plon%c3%a9our_Lanvern_2.jpg","../../jctruffet.com/image/image_29/29_Plon%c3%a9our_Lanvern_3.jpg","../../jctruffet.com/image/image_29/29_Plon%c3%a9our_Lanvern_4.jpg","../../jctruffet.com/image/image_29/29_Plon%c3%a9our_Lanvern_5.jpg","../../jctruffet.com/image/image_29/29_Plon%c3%a9our_Lanvern_6.jpg","../../jctruffet.com/image/image_29/29_Plon%c3%a9our_Lanvern_7.jpg","../../jctruffet.com/image/image_29/29_Plon%c3%a9our_Lanvern_8.jpg"]},"Consult_chateau_formulaire0841-2":{"id":"Consult_chateau_formulaire0841-2","dept":"29","canton":"Crozon","commune":"Plonévez-Porzay","nom":"Plonévez_Porzay","type":"château","periode":"XX","histoire":"Trois châteaux dans cet article de Plonévez-Porzay ; Keryar, Roz-Tréfeuntec et Kergonnec                                                                               KERYAR, ce manoir n'est pas daté mais la date 1545 relevée sur le puits s'accorde avec le style gothique de l'édifice. Un document de 1817 indique que la couverture originelle était en chaume. Elle fut remplacée par de l'ardoise à la fin du XIXe siècle. La porte qui éventre l'élévation a été percée vers 1930. La structure présente deux  corps de bâtiments perpendiculaires, le corps postérieur contenant un vaste escalier en vis en pierre. L'édifice comporte un rez-de-chaussée, un étage et un comble. La construction est un  grand appareil de pierre de taille et granit. A l'intérieur, les parements sont en granit et schiste pour les autres pièces. Les cheminées monumentales sont en granit. L'élévation antérieure, endommagée par le percement moderne d'une porte, compte deux travées de baies moulurées. Le décor de la porte, décentrée et correspondant à la cage d'escalier, est remarquable, à pilastres, archivolte à crochets, pinacles à nids d'abeille et corniche. Ce décor appartient à la tradition gothique et plus particulièrement au style dit Louis XII, qui apparaît au tout début du XVIe siècle. Sur l'élévation latérale gauche, on voit des bouches à feu. Keryar, par son volume très massé, par la qualité de la construction et du décor, est un bon exemple de petit manoir de la première moitié du XVIe siècle de tradition gothique, dont les exemples ne sont pas si nombreux en Bretagne. Les remaniements modernes qu'il a subis ne semblent pas irrémédiables. Le manoir de Keryar est inscrit aux M.H.","architecture":"MOELLIEN ( voir article)                                                                                                   ROZ-TREFEUNTEC, le  manoir   n'a jamais été habité en ra
