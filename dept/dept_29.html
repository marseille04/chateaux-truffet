const FULL={"Consult_chateau_formulaire2c08":{"id":"Consult_chateau_formulaire2c08","dept":"29","canton":"Quimperlé","commune":"Arzano","nom":"Arzano","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux à Arzano Kerlarec et Laz.Trévarez (voir article)                                                                            KERLAREC, il appartient aux Kerouallan, famille possessionnée autour de Quimperlé et dans le Morbihan voisin (Gestel et Lignol). Victor de Kerouallan (1802-1876), partisan d´une agriculture moderne et lucrative, acquiert Kerlarec en 1834. Il fait raser les bâtiments existants et construire, à l´exception des pavillons d´angle, le logis actuel achevé en 1840, sans doute d'après les plans d'un architecte. Il est probablement aussi l´auteur de la ferme-métairie à l´est, de l´orangerie et des écuries à l´ouest ainsi que de l´allée d´accès. Les travaux sont achevés en 1840. Le domaine couvre dans la seconde moitié du XIXe siècle environ 200 hectares et fonctionne comme une entreprise agricole dont le caractère moderne pour l´époque est attesté : défrichement des landes, introduction de pins sylvestres. Le château est agrandi en 1894 par Constance de Kerouallan et Etienne de Lépineau (pavillons d´angle, aménagements intérieurs, vitraux); de cette période subsistent également des éléments de papiers peints. A l´époque contemporaine, le domaine a été divisé en quatre propriétés différentes. Une partie des appartements du château a été aménagée en hôtellerie.                                                                                       PLESSIS, il a appartenu au XVIe siècle à la famille Du Plessis de La Villeneuve, originaire de Trégourez, puis est passé au XVIIe siècle aux mains de la famille de Kernezné avant d'être acheté vers 1890 par James de Kerjégu, propriétaire du château de Trévarez.","architecture":"LAZ; date du XVIe siècle. Il est de style Classique. C'était une demeure familiale qui appartenait à Paul de Laage. Connu aussi sous le nom de château de Kerigomarc'h est édifié à lemplacement d'un ancien manoir de la famille Bizien. Le manoir de Kerigomarc´h appartenait en 1426, à la famille Bizien dont la présence était déja attestée à Arzano dès le XIIIe siècle, qui était le berceau familial. Le manoir du Laz actuel a probablement été construit pour Jean Bizien au début du XVIe siècle. Ses armoiries  figurent au-dessus de la porte d'entrée, une clé de voûte de la cage d´escalier. On les retrouve aussi associées à d´autres armoiries, peut-être Kerouallan, sur le linteau de la cheminée de la pièce ouest du rez-de-chaussée. L´édifice portent les traces de remaniements et de repentirs. En 1610, le domaine comprend une métairie au nord et un moulin à eau au sud. Suite à une alliance, il passe à la famille de Laage dont le patronyme, déformé ultérieurement en Laz, remplace l´ancien toponyme qui demeure néanmoins en usage pour l´ancienne métairie. Au XVIIe siècle, on effectue des modifications secondaires tel que l'agrandissement et couronnement des baies ouest des grandes salles et de la lucarne ouest, cloison du rez-de-chaussée. Une pierre de la façade Sud porte la date de 1760, date où la famille de Rosily en est propriétaire. A la Révolution, le domaine est vendu comme bien national, puis acheté en 1812 par Benjamin Brizoal de Guilligomarc´h. Des lambris de style néogothiques, uvre du menuisier Pigueller d' Arzano, sont mis en place dans la salle ouest du rez-de-chaussée au milieu XIXe siècle. Au début du XXe siècle, par la famille Guyonvarc´h, descendants des Brizoal, des travaux d´agrandissement, non achevés, affectent la partie Est de l´édifice. Il est inscrit aux M.H. depuis 2006.","habitants":"Kerlarec; Famille Constance de Kerouallan                           famille Du Plessis                                                                           Laz; famille de Laage\r\n        \"","divers":"Deux châteaux à Arzano Kerlarec grav-1  Plessis grav-2 et Laz  grav-3.                                                                                  Laz GPS : 47° 54' 30\" Nord, 3° 27' 03\" Ouest","gps":"47° 54' 30\" Nord, 3° 27' 03\" Ouest","images":["../../jctruffet.com/image/image_29/29_Arzano_1.jpg","../../jctruffet.com/image/image_29/29_Arzano_2.jpg","../../jctruffet.com/image/image_29/29_Arzano_3.jpg"]},"Consult_chateau_formulairebc0b":{"id":"Consult_chateau_formulairebc0b","dept":"29","canton":"Pont l","commune":"Pont l","nom":"Barons_du_Pont","type":"Fort","periode":"XIII-XIV","histoire":"BARONS PONT-L'ABBE, au XIIIe siècle, les barons, étant devenus de puissants seigneurs, construisirent un château pour leur servir de forteresse. En 1350, Hervé IV, jetait les fondations d'une chapelle dans l'enceinte du château, mais en 1553, Charles de Quélennec passé au protestantisme, en chassait les châtelains, ce qui amena la ruine de l'édifice. Durant les guerres de la Ligue, Pont l'Abbé est aux mains du duc de Mercoeur. Les troupes du roi vinrent l'assiéger mais sans succès. En 1590, la forteresse est aux mains des royalistes. Le baron Toussaint de Beaumanoir étant au siège d'Ancenis, donna ordre au jeune sergent de Douarnenez nommé Trogoff de se porter au secours du château. Dès qu'il fut maître de la place, Trogoff inquiéta le pays par ses fréquentes sorties, pillant et brulant tout sur son passage. En 1675 le château est incendié  par la révolte des bonnets rouges il sera reconstruit partiellement par  le chevalier d'Ernothon nouveau propriétaire. Les habitants demandèrent l'aide du Capitaine de Lézonnet, qui tenait garnison à Concarneau. A la Révolution le château servit de prison. et sera vendu comme bien national à la commune en 1836 de Pont l'Abbé. Madame de Pompéry la Sévigné Cornouaillaise y séjourna. Le château passa à la Nation suite de l'émigration du baron Bande de Saint Père, installa les services municipaux, les écoles, la gendarmerie, et plus tard la justice de paix.","architecture":"BARONS du PONT. Il accourut accompagné d'un grand nombre de paysans plus désireux de faire du mal aux royalistes que poussés par un zèle religieux. Le siège étant posé on fit jouer le canon contre la tour, les défenses et parapets, où il ne fit pas grand mal. Trogoff, s'avançant à regarder les assaillants par une petite lucarne fut tué d'un coup d'arquebuse. La garnison demanda à capituler, ce qui lui fut accordé. En 1675, se place la révolte du Papier timbré ou des Bonnets Rouges. Les paysans, protestant contre des nouvelles impositions, dévastèrent l'édifice et l'incendièrent. Au début du XVIIIe siècle, le chevalier d'Ernothon reconstruisit le corps de logis du château sur les anciennes caves. Le chevalier d'Ernothon devint fou et se jeta par l'une des fenêtres du château. Le corps de logis a été reconstruit au début du XVIIIe siècle dans un style d'époque, le château est dotée d'une cour carrée flanquée à chacun de ses angles d'une tour circulaire abrite la mairie installée dans l'ancien corps de logis et le musée bigourdin logé dans le donjon. La plus grosse tour  s'est trouvé amputée d'une partie de ses étages en 1825.","habitants":"le duc de Mercoeur\r\n        \"","divers":"Château des Barons de Pont l'Abbé gps 47° 52' 01?\" N, 4° 13' 20\" Ouest","gps":"","images":["../../jctruffet.com/image/image_29/29_Barons_du_Pont_1.jpg","../../jctruffet.com/image/image_29/29_Barons_du_Pont_2.jpg","../../jctruffet.com/image/image_29/29_Barons_du_Pont_3.jpg","../../jctruffet.com/image/image_29/29_Barons_du_Pont_4.jpg","../../jctruffet.com/image/image_29/29_Barons_du_Pont_5.jpg"]},"Consult_chateau_formulaire2203":{"id":"Consult_chateau_formulaire2203","dept":"29","canton":"Saint-Renan","commune":"Plougonvelin","nom":"Bertheaume_Fort","type":"Forteresse","periode":"XIV-XVII","histoire":"Fort de BERTHEAUME, au Moyen-Age, une forteresse se dressait sur le rocher, mais elle est détruite  en 1558 par une flotte anglo-flamande. Dès 1683, Vauban s'intéresse à l'emplacement de l'îlot de Bertheaume pour établir une batterie de canons à deux niveaux de feu et des mortiers. En 1694, la batterie n'était encore équipée que de trois canons et deux mortiers. L'objectif est de protéger le mouillage du Trez Hir d'une bombarderie ennemie en coordination avec les autres batteries de côte. Bertheaume est agrandi successivement en 1695 et 1699. En 1700, un projet fut établi par Benoît de Musinot, officier d'artillerie de la Marine à Brest, inventeur du mortier tournant, comportant la construction d'une fortification en forme de bastion et d'une batterie semi-circulaire, un magasin et une poudrerie. En cherchant bien, on peut toujours voir les vestiges de deux échauguettes. L'utilisation du fort s'est poursuivie jusqu'à la Seconde Guerre Mondiale. Fort de Bertheaume présente des traces d'utilisation très ancienne (dès l'âge de pierre), avant de devenir le château du Perzel, pour les Ducs de Bretagne au Ve siècle, puis d'être fortifié par Vauban au XVIIe siècle. C'était un lieu stratégique pour la défense et la surveillance du goulet de Brest. Il comporte également des constructions de la Seconde Guerre mondiale. Depuis 1992, après une longue période d'abandon, le Fort de Bertheaume est à nouveau ouvert au Public et se visite.","architecture":"Fort de BERTHEAUME,  apparaît pour la première fois dans un acte du 8 mars 1474, mais il semble que ce premier fort ait été détruit en 1558. C'est ensuite Vauban qui décida d'en faire le premier rempart de défense de la rade de Brest en y établissant une batterie en 1689, afin de repousser une attaque ou un débarquement anglais. Elle prouva son utilité au cours du débarquement manqué des Anglais à Camaret en 1694.\r\nJusqu'en 1835, date de construction de la première passerelle, l'îlot n'est relié au continent que par une nacelle.\r\nLes casernes et le mur d'enceinte, les magasins à poudre (dont l'un se trouve à 13 mètres sous terre) et la batterie basse datent du milieu du XVIIIe siècle. D'autre part, des casemates ont été construites entre 1880 et 1890.","habitants":"Fort Vauban\r\n        \"","divers":"Bertheaume GPS : 48° 20' 13\" Nord, 4° 41' 51\" Ouest","gps":"48° 20' 13\" Nord, 4° 41' 51\" Ouest","images":["../../jctruffet.com/image/image_29/29_Bertheaume_Fort_1.jpg"]},"Consult_chateau_formulaireb0b8":{"id":"Consult_chateau_formulaireb0b8","dept":"29","canton":"Fouesnant","commune":"Clohars-Fouesnant","nom":"Bodinio","type":"Château","periode":"XVI","histoire":"BODINIO, la terre de Botigneau ou Bodigneau est tenu en 1426 par Jehan Droniou. Le manoir de Bodinio est reconstruit, autour de 1600, par Jeanne de Bodigneau mariée en 1583 à François de Kerc'hoent qui s'y éteint en 1629.  François de Rosmadec comtes des chapelles frères des Bodinio exécutés à paris en 1627  ; puis acquis en1662 par les Penfeunteniou, L'édifice est en grande partie détruit au cours du XVIIIe siècle et fournit les matériaux à la construction du château de Cheffontaines. En 1793 devient la propriété de la famille Quernio, vieille\" famille d'Hommes de loi de Quimper, après le décès de François-Thomas de Quernio en 1848, le domaine par alliance passe  aux Ruinet du Tailly dont le dernier représentant Georges adoptera en 1891 son neveu Georges Nouët. La fille de se dernier, Yvonn Nouët-Ruinet du Tailly épouse Renée de la Vallière, Thierry des Vallières  héritera de Bodinio qui compte parmi ses ancêtres, quelques irlandais de souche.","architecture":"BODINIO,  un nouveau château est construit dans la deuxième moitié du XIXe siècle à proximité de ses vestiges (un pavillon subsiste) par la famille Nouët du Tailly. Important pavillon de plan carré accolé à un édifice plus modeste cantonné de deux pavillons entourés de douves que franchissaient deux pont équipées de Meurtrières, celui qui subsiste de plan carré et accosté d'une tourelle d'escalier couverte d'un toit en dôme et coiffé d'un haut comble  sur lequel se détachent des lucarnes . En 1967, les propriétaires actuels du château entreprirent des travaux de restauration, en particulier la charpente et la toiture du pavillon visant à rendre les communs habitables, ces travaux venaient d'être achevés quand le 4 février 1969, un violent incendie anéantit toute la toiture, les boiseries sculptées et les lambris. La toiture a été refaite aussitôt pour éviter la ruine définitive de l'ensemble.    Le château de Bodinio récent a été construit dans la seconde moitié du XIXe siècle. Il comporte aussi un étang et un important colombier.","habitants":"Famille de François de Kerc'Hoent\r\n        \"","divers":"Bodinio GPS : 47°54'16\" Nord, 4°03'34\" Ouest","gps":"47°54'16\" Nord, 4°03'34\" Ouest","images":["../../jctruffet.com/image/image_29/29_Bodinio_1.jpg","../../jctruffet.com/image/image_29/29_Bodinio_2.jpg","../../jctruffet.com/image/image_29/29_Bodinio_3.jpg","../../jctruffet.com/image/image_29/29_Bodinio_4.jpg"]},"Consult_chateau_formulairef193":{"id":"Consult_chateau_formulairef193","dept":"29","canton":"Brest","commune":"Bohars","nom":"Bohars","type":"Château","periode":"XVIII-XIX","histoire":"trois châteaux à Bohars Kerguillau et Monplaisir du XIXe siècle. et de Kerampir.                                                                                                                          KERGUILLAU, édifié à l'emplacement d'un ancien manoir daté du XVe siècle, avec chapelle privée détruite, le château fut le berceau de la famille de Kerguiziau. L'édifice a appartenu par mariage aux familles du Louët, du Harlay et au maréchal de Montmorency-Bouteville. Le château de Kerguillau est la propriété du baron Didelot. La demeure de plan en T, de style éclectique, est composée d'un corps de logis rectangulaire à un étage carré et un étage de comble et d'une aile perpendiculaire plus développée en hauteur (un étage carré supplémentaire) et coiffée de deux toitures en pavillon avec épis de faîtage, château construit dans la 2e moitié du XIXe siècle.                                                                                                                MONPLAISIR, construit à la fin du XIXe siècle, peut-être à partir d'un édifice ancien (manoir de Keramezec) l'un des corps de bâtiment est de 1776. Il appartient à Monsieur de la Jonchère au début du XXe siècle. Le château de Monplaisir  passe en 1954 à l'amiral OdendHal. Lhéritère devient ensuite sa fille Madame Bizot-Fléchi, le bâtiment de plan allongé se compose de deux corps de bâtiments parallèles avec corps de jonction abritant l'entrée. Maçonnerie de moellon enduit avec soubassement, encadrements de baies, chaînes d'angle et corniche en pierre de taille. Les armes des familles Parseau du Plessix et Saget de La Jonchère, auxquelles la propriété appartenait encore à la fin du XIXe siècle, figurent sur la hotte d'une cheminée.","architecture":"KERAMPIR, cest sur le domaine de Keranoues  que fut construit le château de Kerampir à la fin du XIXe siécle par Madame  de Trolong Du Rumain. Elle finança la construction de la nouvelle église et fit bâtir également les petites maisons du bas du bourg ainsi quun manoir plus petit pour la dot de sa fille : Madame Million  de la Verteville. Avant 1897, le domaine de Keranoues a connu de nombreux propriétaires : des nobles, des bourgeois, un pasteur protestant, des amiraux, un sénateur. Jules Le Gars témoigne déjà de son existence en 1867 et Mr Dubalais dit que cest Madame De Trolong Du Rumain au XIXe siécle mais elle nétait propriétaire quen 1897. Les propriétaires   en   1922-1925: Peron, industriel, fabricant de chaises.   En 1925-1930: LAmiral Exelmanset son épouse Madame DE Penfeutengo De Kervereguin. En 1930-1948: Donation à leur fille Madame Du Crest de Villeneuve. En 1941-1944: Occupation par le Major allemand Werguer Erwald. Le manoir a servi de Poste de commandement au bataillon. En 1948-1955: Victor Joseph Brannelec et son épouse Madame Dardaliaguet, et depuis 1955: CPAM (Caisse Primaire dAllocation Maladie). En 1955, occupation par lhôpital Morvan pour cause dépidémie de variole.","habitants":"Kerguillau; Famille de Kerguiziau                                    Monplaisir; Monsieur de la Jonchère                                                  Kérampir; Madame  de Trolong Du Rumain. \r\n        \"","divers":"trois châteaux à Bohars; Kerguillau grav-1 et Monplaisir grav-2.  Kérampir grav-3                                                         Kerguillau GPS : 48° 25' 49\" Nord, 4° 30' 44\" Ouest","gps":"48° 25' 49\" Nord, 4° 30' 44\" Ouest","images":["../../jctruffet.com/image/image_29/29_Bohars_1.jpg","../../jctruffet.com/image/image_29/29_Bohars_2.jpg","../../jctruffet.com/image/image_29/29_Bohars_3.jpg"]},"Consult_chateau_formulaireda92":{"id":"Consult_chateau_formulaireda92","dept":"29","canton":"Pont-de-Buis-lès-Quimerch","commune":"Pont-de-Buis-lès-Quimerch","nom":"Bot","type":"Château","periode":"XVII","histoire":"BOT, manoir attesté en 1426. Incendie présumé vers 1590. Pressoir à cidre portant la date 1654 et l'inscription Jacques Du Bot. Construction du château actuel en 1730 pour Jacques Joseph du Bot en englobant partiellement les vestiges d'une construction du XVIe siècle.","architecture":"BOT, attestée en 1774, datait du milieu du XVIIe siècle. Fronton, oeils-de-boeuf, balcon et certains aménagements intérieurs  réalisés en 1816 pour la famille Conen de Saint-Luc. Chapelle reconstruite en 1845, communs partiellement milieu du XVIIe siècle et transformés au XIXe siècle. Ferme, four à pain et croix, deuxième moitié XIXe siècle. Logis en moellon de schiste et de granite, façade principale enduite, encadrement des baies en kersantite et microdiorite quartzique. Escalier en pierre et en bois. Communs et ferme en moellon de schiste et de granite. La chapelle en moellon enduit. Toitures couvertes d'ardoises sauf celles des communs, de tuiles mécaniques. Croix en kersanton.","habitants":"Jacques Joseph du Bot\r\n        \"","divers":"A Pont-de-Buis-lès-Quimerch; Bot grav _1                                                gps   48° 16' 57\" nord, 4° 06' 25\" ouest","gps":"","images":["../../jctruffet.com/image/image_29/29_Bot_1.jpg"]},"Consult_chateau_formulaired2d4":{"id":"Consult_chateau_formulaired2d4","dept":"29","canton":"Plouigneau","commune":"Botsorhel","nom":"Botsorhel_Keraël","type":"Château","periode":"XVII","histoire":"KERAEL, date du milieu du XIXe siècle, pour les comtes Le Rouge de Guerdavid, sur un premier château datant du début du XVe siècle. La terre de Keraël est liée à la Maison de Charruel, dites des vicomtes de Guerlesquin cités dès l'ost ducal de 1294. Du reste, le château actuel intègre dans ses ornements une borne de châtellenies ducales datant des années 1430, liée à une rectification de territoire de châtellenie par l'Amiral de Bretagne Jehan de Penhoet à qui l'une de ses épouses successives, Jehanne du Périer, ayant apporté la seigneurie de Charruel. Lors de la réformation de 1426, c'est Morice du Plessis qui se trouve en possession du château de Keraël. D'autres du Plessis s'y succèderont, et leur quenouille installera une autre lignée qui vendra Keraël au milieu du XVIIe siècle, aux Calloet de Lanidy, propriétaires du château de Lanidy à Plouigneau. Etienne René Calloët de Lanidy, préférant ce château à ses terres familiales, s'y installera durant la Révolution, et on l'accusera d'y abriter des réunions contre révolutionnaires mais il saura se faire respecter. Le château de Keraël  qui date du milieu du XIXe siècle fut construit par les comtes Le Rouge de Guerdavid.","architecture":"KERAEL à mesure que l'arsenal et le port prennent de l'ampleur, la question de la fortification de la ville revient à l'ordre du jour. Les travaux de l'enceinte urbaine de Brest débutèrent dès 1674. Il s'agissait alors d'une fortification de campagne en terre composée de simples retranchements et de redoutes.   Le château de Keraël qui date du milieu du XIXe siècle fut construit par les comtes Le Rouge de Guerdavid. Propriété privée, il ne se visite pas.  Bâtiment de plan symétrique, en H, les pavillons latéraux en légère saillie recevant une échauguette polygonale sur les angles de la façade postérieure. Corps principal à cinq travées, la travée centrale étant marquée par un balcon au niveau du premier étage et d'une toiture en pavillon surmontée d'un lanternon. Crêtes et épis de faîtage.","habitants":"comtes Le Rouge de Guerdavid. \r\n        \r\n        \r\n        \r\n        \"","divers":"Kerael  GPS : 48° 31' 40\" Nord, 3° 38' 24\" Oues                          Keraèl grav -1 à 4                                                                              Ker-Nelly grav -5-6","gps":"48° 31' 40\" Nord, 3° 38' 24\" Oues                          K","images":["../../jctruffet.com/image/image_29/29_Botsorhel_K%c3%a9ra%c3%abl_1.jpg","../../jctruffet.com/image/image_29/29_Botsorhel_K%c3%a9ra%c3%abl_2.jpg","../../jctruffet.com/image/image_29/29_Botsorhel_K%c3%a9ra%c3%abl_3.jpg","../../jctruffet.com/image/image_29/29_Botsorhel_K%c3%a9ra%c3%abl_4.jpg","../../jctruffet.com/image/image_29/29_Botsorhel_K%c3%a9ra%c3%abl_5.jpg","../../jctruffet.com/image/image_29/29_Botsorhel_K%c3%a9ra%c3%abl_6.jpg"]},"Consult_chateau_formulaireaa67":{"id":"Consult_chateau_formulaireaa67","dept":"29","canton":"Brest","commune":"Brest","nom":"Brest","type":"Forteresse","periode":"XIII-XV-XVI","histoire":"BREST, vers 1560, Pietro Fredance, ingénieur italien, est chargé de renforcer les défenses de la ville et du château. Le bastion de Sourdéac situé en avant du donjon est construit durant cette période. Le plus ancien plan du château de Brest date de 1640, on peut y voir les vieilles tours romaines rasées à la demande de Vauban en 1685 (aujourd'hui subsistent encore des traces du mur en moellon et briques, et d'une tour). Le château affecte la forme d'un polygone irrégulier flanqué de plusieurs tours : de la Madeleine,  du Moulin, tour Française,  de César,  de Brest,  Azénor,  de la Duchesse Anne et donjon. La porte principale de type châtelet est protégée par deux tours coiffées en poivrière et dotées de mâchicoulis : les tours Paradis. Côté mer se trouvent le \"parc du Duc\" et le bastion Notre-Dame ainsi qu'une batterie extérieure située au ras de l'eau. En 1592, le château qui a épousé la cause royaliste est assiégé en vain par les Ligueurs pro-catholiques. Parallèlement, le colonel espagnol Don Juan del Aquila fait construire en 1594 un fort appelé \"Castilla de Léon\" sur l'actuelle pointe des Espagnols (rade de Brest) par Cristobal de Rojas afin de se positionner avantageusement face à l'Angleterre. Son but secondaire est de se rendre maître du château. Finalement, l'armée royale avec à sa tête Jean, duc d'Aumont, maréchal de France et dans ses rangs René de Rieux, sieur de Sourdéac, aidés de la flotte et de la troupe anglaise, fait le siège du fort espagnol et gagne la bataille en novembre 1594. Près de 4000 hommes moururent au combat et le fort fut rasé. A mesure que l'arsenal et le port prennent de l'ampleur, la question de la fortification de la ville revient à l'ordre du jour.","architecture":"BREST; les travaux de l'enceinte urbaine débutèrent dès 1674. Il s'agissait alors d'une fortification de campagne en terre composée de simples retranchements et de redoutes.  En 1681, au delà de la défense de l'arsenal, il s'agit de fédérer les bourgs de Brest et Recouvrance séparés par la Penfeld et de concevoir une nouvelle ville tournée vers la mer, fonctionnelle, capable d´accueillir une population importante si nécessaire à la Marine du Roi Soleil. Le projet de Massiac de Sainte-Colombe qui trouva un début d'exécution en 1681, est repris et transformé par Vauban en mai 1683. Intégré dans le plan d'ensemble, le château médiéval est modernisé et adapté à l'artillerie moderne, il devient \"citadelle\" surveillant à la fois la ville, la campagne et le large.  Glacis, chemin couvert et demi-lunes prolongent la fortification du côté de la terre. Les parapets sont redessinés et dotés d'embrasures plongeantes. Commencés en 1681, les travaux de l'enceinte urbaine se poursuivent jusqu'en 1705. Sous le règne de Louis XV, l'enceinte du côté de Recouvrance est renforcée par le front bastionné de Quéliverzan. Cet ouvrage protège le fond de l'arsenal. Pendant la Guerre d'Indépendance Américaine (1778-1783), les ingénieurs militaires redoutant une attaque terrestre après un débarquement anglais, construisent l'ouvrage fortifié du Bouguen et établissent une ceinture de forts détachés autour de la ville : fort de Penfeld, Questel, Keranroux, Montbarey, et Portzic (agrandissements des ouvrages existants). Pierre-Jean de Caux (directeur des fortifications de Basse-Normandie qui oeuvra à Cherbourg principalement et au fort de Saint-Père, au sud de Saint-Malo) dresse dès 1777 les premiers projets de forts détachés pour Brest. Au XIXe siècle, le dispositif est complété par la redoute de Keroriou et les forts des Fédérés et de Guelmeur (aujourd'hui détruits).En 1789 le château sert de prison.","habitants":"Vauban\r\n        \r\n        \r\n        \"","divers":"Brest GPS : 48° 22' 53\" Nord, 4° 29' 41\" Ouest                           Brest rempart et donjjpn grav 1-2-3-4                                                          Fort Montbarey grav-5","gps":"48° 22' 53\" Nord, 4° 29' 41\" Ouest","images":["../../jctruffet.com/image/image_29/29_Brest_1.jpg","../../jctruffet.com/image/image_29/29_Brest_2.jpg","../../jctruffet.com/image/image_29/29_Brest_3.jpg","../../jctruffet.com/image/image_29/29_Brest_4.jpg","../../jctruffet.com/image/image_29/29_Brest_5.jpg","../../jctruffet.com/image/image_29/29_Brest_6.jpg","../../jctruffet.com/image/image_29/29_Brest_7.jpg","../../jctruffet.com/image/image_29/29_Brest_8.jpg"]},"Consult_chateau_formulaired74c":{"id":"Consult_chateau_formulaired74c","dept":"29","canton":"Brest","commune":"Brest","nom":"Brest_II","type":"Palais","periode":"XIX","histoire":"KER-STEARS, construit à la place de la première demeure pour John Burnett-Stears son  fils et son épouse, Béatrice Denis de Keredern de Trobriand, née à New-York, et dont le père, le baron Régis de Trobriand, émigré aux Etats-Unis en 1840 . La construction débutée peu après 1885 et achevée en 1891, est attribuable à l'architecte local Victor Lapierre, élève de Viollet le Duc qui était également sculpteur. La nouvelle demeure reprend dans une version plus ample le style celui du château de Leuhan en Plabennec édifié à l'initiative des mêmes commanditaires entre 1882 et 1884. L' accès au château était marqué, au niveau de l'actuelle rue Alfred de Musset, par un haut logis à tourelles formant un passage traversant qui servait de maison de garde. Ce dernier a disparu peu après 1950, lors de la création du pont du Forestou. Une autre maison de garde se trouvait à l'opposé du côté du port. L'ancienne buanderie du domaine subsiste au bord d'une montée située en contrebas de la rue du général de Trobriand. Les écuries se trouvaient près de l'actuelle rue de la comtesse de Rodellec du Porzic. La propriété s'étendait alors au delà de la voie ferrée et l'ancien mur du parc est encore en partie visible dans la rue de la comtesse de Rodellec du Porzic ; il se prolongeait également le long de la rue Pierre Semard. Après le décès de John Burnett-Stears en 1888, sa veuve se remarie avec le comte Olivier de Rodellec du Porzic et réside à Ker Stears jusqu'à la seconde guerre mondiale. En 1945, les religieuses de la congrégation de la Retraite installent dans la propriété l'école privée du cours Fénelon, destinée à l'enseignement des jeunes filles. Il est plus  spécialisé aujourd'hui dans l'enseignement de lhôtellerie et de la restauration.","architecture":"KER-STEARS, sur un soubassement solidement maçonné abritant caves et cuisines et ouvert du côté de la rade par un jeu d'arcades. Cet étage de soubassement porte une large terrasse court sur toute la longueur du château et ouvre en son milieu sur un large escalier à rampes divergentes et balcon central. Cet escalier conduit en contrebas vers une deuxième terrasse, elle même communiquant avec le jardin par deux rampes convergentes qui se réunissent en un degré arqué de deux statues monumentale de lions. Ces dernières portent la signature de Victor Lapierre et la date de 1885.  Le corps principal est précédé d'un large porche hors-uvre permettant l'accès à couvert en voiture au pied d'un vaste hall abritant l'escalier d'apparat. Ce dernier est contenu dans un avant corps formant pavillon éclairé par trois hautes baies dont la forme en arc brisé fait écho à celles du porche. Ces arcs brisés se retrouvent également sur les baies de la grande salle qui occupait la partie droite du rez-de-chaussée et disposait d'un accès direct depuis l'extérieur par un degré de cinq marches. A gauche du porche, une haute tour de plan rectangulaire émerge au dessus des toits et se termine par une plateforme à garde corps crénelé formant belvédère. A l'opposé, contre le pignon nord-ouest, une autre tour, de plan circulaire et couronnée d'un chemin de ronde sur faux mâchicoulis est surmontée d'un étage en retrait coiffé d'un haut toit conique.                                                                                      La TOUR TANGUY, bâtie sur un bloc de granit, la Bastille de Quilbignon ou « Tour de la Motte Tanguy » occupe une situation privilégiée en bordure de la Penfeld et face au château de Brest. Elle a sans doute fait partie dun système de fortifications établi pour protéger ou empêcher, selon les circonstances, les communications entre les deux rives. La Tour Tanguy abrite d'immenses dioramas qui sont autant de reconstitutions historiques.","habitants":"Famille de  John Burnett-Stear\r\n        \"","divers":"Stears GPS : 48° 23' 27\" Nord, 4° 29' 08\" Ouest                                                                                              ker-Stars grav 1 à 4  tour Tanguy grav -5","gps":"48° 23' 27\" Nord, 4° 29' 08\" Ouest","images":["../../jctruffet.com/image/image_29/29_Brest_II_1.jpg","../../jctruffet.com/image/image_29/29_Brest_II_2.jpg","../../jctruffet.com/image/image_29/29_Brest_II_3.jpg","../../jctruffet.com/image/image_29/29_Brest_II_4.jpg","../../jctruffet.com/image/image_29/29_Brest_II_5.jpg","../../jctruffet.com/image/image_29/29_Brest_II_6.jpg"]},"Consult_chateau_formulaire6b33":{"id":"Consult_chateau_formulaire6b33","dept":"29","canton":"Briec","commune":"Briec de l","nom":"Briec_de_l","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux à Briec ; Boissière et Trohanet.                                                             BOISSIERE, appelé aussi le château de la Boixière est un château bâti au lieu-dit Edern, à Briec-de-lOdet, la construction du château  date du XIXe siècle. Le manoir familial de Jean-Edern Hallier à La Boissière, est un peu plus bas que la ville de Briec. Sur la route entre Landudal et Briec. Jean Edern Hallier, journaliste, philosophe, romancier, en fut son propriétaire. Aujourd'hui, le château de la Boissière est laissé à l'abandon.  La demeure possède un beau parc avec étang, classé \"jardins remarquables\".","architecture":"TROHANET, a conservé une part importante de sa structure du XVIIe siècle. La recomposition des façades sud et est, vers 1880, est une bonne illustration des modernisations du château de Trohanet. Les structures et décors intérieurs reflètent différentes étapes de l'évolution du XVIIe au XIXe siècle. L'aménagement du dernier tiers du XIXe siècle a entraîné la construction de dépendances et la création d'un parc paysager par les frères Bülher. Appartient à M. de la Grandière au début du XXe siècle. Aujourd'hui, il est la propriété d'un de ses arrière petits fils, M. Baudoin de Pimodan. Éléments protégés MH : le château et le parc à savoir; le logis en totalité, les façades et les toitures des communs du XIXe siècle (la grange dans la cour nord du château et la ferme au sud ouest), le parc paysager, le jardin potager, ses murs de clôture et la serre : inscription par arrêté du 9 novembre 2001.","habitants":"Boissière;  Familie de Jean-Edern Hallier                               Trohanet; Famille de M. de la Grandière\r\n        \r\n        \r\n        \"","divers":"Deux châteaux à Briec ; Boissière grav 1-2-3  et Trohanet grav-4-5-6.                                                                                            Boixière GPS : 48° 06' 10\" Nord, 3° 59' 50\" Ouest","gps":"48° 06' 10\" Nord, 3° 59' 50\" Ouest","images":["../../jctruffet.com/image/image_29/29_Briec_de_Odet_1.jpg","../../jctruffet.com/image/image_29/29_Briec_de_Odet_2.jpg","../../jctruffet.com/image/image_29/29_Briec_de_Odet_3.jpg","../../jctruffet.com/image/image_29/29_Briec_de_Odet_4.jpg","../../jctruffet.com/image/image_29/29_Briec_de_Odet_5.jpg","../../jctruffet.com/image/image_29/29_Briec_de_Odet_6.jpg"]},"Consult_chateau_formulaire0f2b":{"id":"Consult_chateau_formulaire0f2b","dept":"29","canton":"Saint-Renan","commune":"Brélès","nom":"Brélès","type":"Château","periode":"XVI-XVII-XVIII","histoire":"Trois  châteaux à Brèles:  Brescanvel, Kergroadez et Bel-Air.                                                                                  KERGROADEZ, a été bâti par François  de Kergroadès entre  1613 et 1617, il est constitué par trois ailes disposées en U autour d'une cour fermée par une galerie, avec quatre pavillons d'angle. Si la distribution interne s'inspire de celle de Kerjean, l'architecture s'en distingue par sa sévérité,  à la mort de François III de Kégroadez passe à son fils François IV, resté dans la famille de Kergroadez jusqu'en 1732, Marie Jeanne de Kergroadez épouse  Louis de Kérouartz. Puis par jeu d'héritage passe au marquis de Hochin ensuite à François de Bessuejouls marquis de Roquelaure. Il n'a subi aucune modification sous l'Ancien Régime, la propriété a été mise sous séquestre à la fin du XVIIIe siècle ce qui a provoqué la liquidation des portes, des fenêtres et de la charpente en 1807.  Mme de Prévinquières née Bessuejouls récupère une ruine et en 1860 son héritière le  cède à la famille Mevel  qui en 1889 Valentine Mevel  épouse un armateur brestois Julien de Chevillotte dont la famille rachète le château à l'état de ruine, il a été restauré en 1913-1914. le côté opposée à la façade principale, sommée de belles lucarnes, et occupée  par une longue terrasse à parapet soutenues par d'élégantes arcades, aux angles  extérieurs  deux tours rondes dont l'une est surmontée d'une coupole de pierre.  La charpente, la toiture, les menuiseries et les aménagements intérieurs ont été entièrement refaits ab-nihilo. Les maçonneries semblent cependant n'avoir subi aucune modification. En 1991 vente à un artiste peintre  d'origine polonaise Marek Mielniczuk, qui fera faire un classement aux M.H.par arrêté du 2 mai 1995, et depuis l'an 2000 le château est acquis par la famille Jalin.","architecture":"BEL-AIR, la construction  date de 1585 à 1599. Son propriétaire initial était François de Kerengar, le manoir remplace un édifice plus ancien situé au lieu-dit « Kerengar », encore attesté en 1462, qui appartient alors au de Kerengar. La fortune des Kerengar était directement liée à l'activité commerciale et maritime sur ce site. Encore aujourd'hui, le quai est défendu par 4 canons placés là depuis le XIXe siècle. « Priez pour François de Kerengar qui ma fait faire et Bel Air ma nommé 1599 », telle est la devise figurant au-dessus de la porte principale du logis, est  reste dans la descendance des Kerengar jusqu'en 1810, date à laquelle il passa, dans les mains de la famille de Claisrambault,  puis  fut racheté au milieu du XIXe siècle par le Baron Grivel, vice-Amiral, vétéran des campagnes du Premier Empire, sénateur sous le Second Empire. La légende situe un séjour à Bel-Air de Victor Hugo. Le manoir de Bel-Air devint la propriété de la famille de Taisne de Raymonval en 1893, a fait lobjet dimportants travaux de restauration depuis le début de 2000. A été classé aux M.H. depuis 1993.                                                                                                      BRESCANVEL, la famille Le Roux possédait jadis cette terre. Elle sest éteinte en 1755 avec Messire Charles Le Roux de Brescanvel, recteur de Guilers, qui laissa pour héritier son cousin germain François de Poulpiquet. Les de Poulpiquet sétaient alliés aux Brescanvel par le mariage de Jeanne Le Roux, dame de Brescanvel, avec Jacques de Poulpiquet, fils dHervé, seigneur de la Roche-Durand et de Jeanne de Keroulas.  Tapi dans un écrin de verdure et perché sur une hauteur au dessus de Saint-Eloi et de l'Aber Il ou se trouve le charmant manoir de Brescanvel, édifice du XVIe siècle à porte gothique et grandes baies coupées de meneaux. Une tourelle à cul de lampe fait saillie sur la façade et abrite un escalier à vis. A lextrémité de laile droite, la chapelle domestique porte un écusson avec pies de mer et la devise.","habitants":"Kergroadez;  Famille de Kergroadez                         Brescanvel;  Famille de Jacques de Poulpiquet,                          Bel-Air; Famille de François de Kerengar \r\n        \r\n        \r\n        \"","divers":"trois châteaux à Brèlés:  Brescanvel grav-3-, Kergroadez grav 4 à 8 et Bel-Air grav-1-2                               .                             Bel-Air      GPS : 48°28'33,48\" Nord, 4°43'16,95\" Ouest                             Kergroadez GPS : 48° 28' 40\" Nord, 4° 40' 22,8\" Ouest","gps":"48°28'33,48\" Nord, 4°43'16,95\" Ouest","images":["../../jctruffet.com/image/image_29/29_Br%c3%a9l%c3%a8s_1.jpg","../../jctruffet.com/image/image_29/29_Br%c3%a9l%c3%a8s_2.jpg","../../jctruffet.com/image/image_29/29_Br%c3%a9l%c3%a8s_3.jpg","../../jctruffet.com/image/image_29/29_Br%c3%a9l%c3%a8s_4.jpg","../../jctruffet.com/image/image_29/29_Br%c3%a9l%c3%a8s_5.jpg","../../jctruffet.com/image/image_29/29_Br%c3%a9l%c3%a8s_6.jpg","../../jctruffet.com/image/image_29/29_Br%c3%a9l%c3%a8s_7.jpg","../../jctruffet.com/image/image_29/29_Br%c3%a9l%c3%a8s_8.jpg"]},"Consult_chateau_formulaired41c":{"id":"Consult_chateau_formulaired41c","dept":"29","canton":"Crozon","commune":"Camaret-sur-Mer","nom":"Camaret_sur_Mer","type":"patrimoine","periode":"XVII-XIX","histoire":"A Camaret le château de Boultous, Tourlinguer et la tour Vauban.                                                                                     BOULTOUS   Vestiges  d'une demeure baroque et tourmentée, aussi démesurée que le génie de son propriétaire, l'écrivain Saint-Pol Roux. En marge de tous les courants littéraires, il s'éloigne de la vie parisienne pour s'installer à Camaret où en 1904, il fait bâtir le château du Boultous. S'il aime y accueillir des amis célèbres, Max Jacob, Paul Eluard et Jean Moulin, sa générosité et son charisme le rapprochent des pêcheurs de Camaret. Durant la deuxième guerre mondiale, les falaises furent truffées de blockhaus allemands. Dans la soirée du 22 juin 1940, un soldat allemand ivre pénétra de force dans le château du Boultous, il y assassina Rose, la vieille servante, assomma l'écrivain et violenta sa fille Divine, puis la demeure est pillée, les manuscrits brûlés. Hospitalisé à Brest, Saint-Pol Roux y mourut de chagrin le 18 octobre. Les ruines désolées des tours sont les seules vestiges de la demeure construit en 1904 par le poète. En août 1944, le manoir est bombardé par l'aviation alliée. Il n'en subsiste depuis que des ruines. La construction du manoir date du 3ème quart du XIXe siècle. Il ne reste encore debout que ses tours d'angle.                                                                                                                  TOUR-VAUBAN, le port de Camaret possède une tour de défense côtière avec batterie basse construite par Vauban. Elle est appelée localement la Tour Vauban. Vauban, lui, la fit nommer la Tour Dorée. Cette tour, de forme polygonale,  assurant  la défense de la ville, est dotée d'un fossé, d'un pont-levis et d'un mur d'enceinte. Projetée dès 1683, La construction supervisée par l'ingénieur Jean-Pierre Traverse date de 1693 à 1696.","architecture":"TOUR-VAUBAN, les 11 pièces d'artillerie de la batterie basse croisaient leurs feux avec ceux de la Pointe du Gouin, des lignes primitives de Quélern et des nombreuses batteries côtières. La Tour Vauban et sa batterie étaient destinées à protéger le mouillage de l'anse de Camaret et à repousser une éventuelle attaque venue de la mer. Lors de la bataille de Camaret, en 1694, la batterie, en cours dachèvement avec ses 2 corps de garde, nétait armée que de 9 canons de 24 livres de balle et 3 mortiers de fer de 12 pouces. Cette victoire valut à Camaret d'être exemptée de fouages jusqu'à la Révolution. Le four à boulets fut construit lors de la Révolution. Camaret-sur-Mer est membre de l'association de Villes Réseau des sites majeurs de Vauban.                                                                                                               TOURLINGUET, permet l'observation de toute la largeur de la passe jusqu'à la pointe Saint-Mathieu. Un ouvrage de défense y est attesté au XIIe siècle. Des aménagements réalisés par Vauban en 1694, il ne reste que quelques vestiges au pied du phare construit en 1849. Sur le point le plus élevé de la pointe, une tour-réduit est édifiée en 1812 sur le modèle type de 1811, pour accueillir douze à dix-huit hommes. Vers 1884, elle est retranchée à la gorge par un mur défensif avec fossé maçonné passant par la tour et s'appuyant sur les escarpements nord et sud de la presqu'île, l'ensemble constituant un front rectiligne qui barre la pointe. Elevé sur trois niveaux, dont le dernier est une terrasse d'artillerie munie d'un parapet et dallée de granit, la tour contient des pièces voûtées de briques au rez-de-chaussée et une pièce unique voûtée d'arêtes en granit s'appuyant sur un pilier central au premier étage. L'unique modification apportée à l'ouvrage a été la suppression, vers 1884, du pont-levis commandant l'entrée d'origine au deuxième niveau, au profit d'une entrée de plain pied .","habitants":"Boultous; Saint-Pol Roux                                                     Tour-Vauban\r\n        \"","divers":"A Camaret le château de Boultous grav1-2-3, et la tour Vauban grav-5-6-7-8 et de Tourlinguet grav-4.  Roscambel grav-9                                                                                                  GPS : 48° 16' 36\" Nord, 4° 35' 44\" Ouest                                                            Tour GPS : 48° 16' 47,19\" Nord, 4° 35' 29,98\" Ouest","gps":"48° 16' 36\" Nord, 4° 35' 44\" Ouest","images":["../../jctruffet.com/image/image_29/29_Camaret_sur_Mer_1.jpg","../../jctruffet.com/image/image_29/29_Camaret_sur_Mer_2.jpg","../../jctruffet.com/image/image_29/29_Camaret_sur_Mer_3.jpg","../../jctruffet.com/image/image_29/29_Camaret_sur_Mer_4.jpg","../../jctruffet.com/image/image_29/29_Camaret_sur_Mer_5.jpg","../../jctruffet.com/image/image_29/29_Camaret_sur_Mer_6.jpg","../../jctruffet.com/image/image_29/29_Camaret_sur_Mer_7.jpg","../../jctruffet.com/image/image_29/29_Camaret_sur_Mer_8.jpg","../../jctruffet.com/image/image_29/29_Camaret_sur_Mer_9.jpg"]},"Consult_chateau_formulaire8208":{"id":"Consult_chateau_formulaire8208","dept":"29","canton":"Morlaix","commune":"Carantec","nom":"Carantec","type":"Château","periode":"XVI-XVII-XIX","histoire":"cinq châteaux à Carantec; Fransic, Frout, Kéromnès, et Rohou.                                                                                                                             FRANSIC, cette ancienne terre noble appartenait au XVIIIe siècle aux familles Keranguen et Poulpiquet. Puis à partir du 12 avril 1781, le château du Fransic fut la propriété de Joseph Guillaume de Poulpiquet de Coatlez, époux de Marguerite de Kerouartz. En 1790, il appartenait au vicomte Léonard du Dresnay. Confisqué à la Révolution, le Fransic est vendu comme bien national il appartient à une famille anglaise avant d'être acquis par Sophie de Penguern. De 1802 à 1811, le maire de Carantec André Couhitte, réside au Fransic. En 1895 Fanny de Parscau achète la propriété à madame du Plessix-Quinquis. Ce château possède une chapelle privative, dédiée à Sainte Anne consacrée en 1789.                                                                                    FROUT, fut construit dans la seconde moitié du XIXe siècle. Il appartient au vicomte de Kersauzon au début du XXe siècle. Bâtiment de plan massé en L, composé de plusieurs pavillons emboités, l'entrée principale de la demeure se plaçant dans l'angle des deux corps principaux, au-dessus d'un escalier à deux volées arrondies. Tourelle circulaire sur l'angle. Maçonnerie de moellon avec encadrements de baies, corniche et lucarnes en pierre de taille. Parc avec sa chapelle édifiée en 1860, dédiée à notre Dame de Bonne Nouvelle.","architecture":"KEROMNES,  L'ancien château de Keromnès, restauré au XVIIIe siècle, est démoli vers 1897, il est alors remplacé par un nouvel édifice pour François de Kergrist, maire de Carantec de 1858 à 1896, introducteur de la culture maraîchère dans le Léon. Chapelle avec vitrail aux armes de François de Boiséon et François Bouteiller. Reconstruction, néo-XVIIe, éclectique, pigeonnier XVIe siècle. Edifice de plan en L composé d'un corps de bâtiment principal de trois travées et deux pavillons latéraux dans le même alignement, d'une courte aile en retour d'équerre sur la façade principale ainsi que d'une aile plus importante sur la façade arrière. La chapelle est placée en avant de la façade principale. Maçonnerie de moellon avec encadrements de baies, corniche et lucarnes en pierre de taille.                                                                                                                             ROHOU, l'édifice du XVIe siècle et du XIXe siècle. Il s'agit d'un ancien rendez-vous de chasse faisant jadis partie du domaine de Keromnes, appartenant à la famille Salaün de Keromnes. Une porte piétonne datant du XVIe siècle est encore visible : elle est surmontée d'un écusson représentant le blason de la famille Salaün de Keromnes. Le manoir actuel est construit en deux temps (d'abord la partie centrale, puis les ailes de chaque côté). Les ailes ont été édifiées par Julien de Kergrist au milieu du XIXe siècle. Propriété de Joseph Pierre de Kergrist, puis de Julien François de Kergrist (fils de Joseph Pierre et maire de Carantec de 1816 à 1830), de Joseph Pierre (1798-1868, fils de Julien François et époux de Pauline de Cargouët), de Joseph Jules de Kergrist (1847-1905, fils de Joseph-Pierre et époux de Marie Le Rouge de Guerdavid). Ces derniers n'ayant pas eu d'enfant, le Rohou est légué en 1920 à leur filleul, Joseph Le Rouge de Guerdavid (1886-1961, époux de Sophie de Bourmont). Sur la façade, on peut voir trois balcons à balustres en granit.","habitants":"Fransic; Famille de Joseph Guillaume de Poulpiquet de Coatlez                                                                    Kéromnès; Famille de François de Kergrist,                               Rohou; Famille Salaün de Keromnes\r\n        \"","divers":"Quatre chateaux à Carantec; Fransic grav-1, Frout grav-2, Kéromnès grav-3-4-5  et Rohou grav-6.  Fransic GPS : 48° 40' 07\" Nord, 3° 54' 45\" Ouest                                          Frout GPS : 48° 40' 07\" Nord, 3° 54' 45\" Ouest                                                     Rohou GPS : 48° 39' 49,76\" Nord, 3° 54' 18,37\" Ouest","gps":"48° 40' 07\" Nord, 3° 54' 45\" Ouest","images":["../../jctruffet.com/image/image_29/29_Carantec_1.jpg","../../jctruffet.com/image/image_29/29_Carantec_2.jpg","../../jctruffet.com/image/image_29/29_Carantec_3.jpg","../../jctruffet.com/image/image_29/29_Carantec_4.jpg","../../jctruffet.com/image/image_29/29_Carantec_5.jpg","../../jctruffet.com/image/image_29/29_Carantec_6.jpg"]},"Consult_chateau_formulaire781b":{"id":"Consult_chateau_formulaire781b","dept":"29","canton":"Carhaix-Plouguer","commune":"Carhaix-Plouguer","nom":"Carhaix_Plouguer","type":"Château","periode":"XVI-XIX-XX","histoire":"Trois châteaux à  Carhaix-Plouguer; Kerampuil, Pratulo ( voir article) et le Rouge et à cinq K.M. au nord à  Poullaouen ;Tymeur.                                                                KERAMPUIL,  installé auprès des vestiges d'un édifice habité au XVIe siècle par le procureur à la Cour de Carhaix et par Gilles de Kerampuilh, chanoine de la collégiale Saint Trémeur. Le château, de plan régulier, est construit vers 1760 pour Charles Robert, Conseiller au Parlement de Bretagne, comprenant un corps de logis central et deux ailes débordantes. Le château reste propriété de la famille de Kerampuilh jusqu'à la Révolution et sa vente comme bien national. Sous la Restauration il est rendu à la famille qui le cède en 1939 sous réserve qu'il serve d'hospice. Chapelle construite en 1840 (porte date) pour le Vicomte de Saisy. Avec la transformation en hospice, l'édifice a perdu tous ses intérieurs hormis un grand escalier de bois à double révolution avec balustres et quelques portes. La famille de Kerampuilh  le cèdera, en 1938, à la commune, à condition qu'il serve d'hospice. En 1999, le Château de Kerampuil est devenu la propriété de la ville de Carhaix. Le château et son parc deviennent la propriété de la ville de Carhaix-Plouguer, en 1999, puis furent rachetés par la Région, en 2010  Transformé en hospice, le château de Kerampuil perdit tous ses intérieurs dont son grand escalier de bois à double révolution, Éléments protégés MH : les façades et les toitures du château : inscription par arrêté du 12 juillet 1965.","architecture":"TYMEUR ,était la maison seigneuriale de la paroisse de Poullaouen, il comprend les vestiges de lancien château datant du XIIIe siècle, siège de la Baronnie de Kergorlay et berceau de la famille de Ploeuc. La seigneurie du Tymeur est érigée en marquisat en 1616 et acquise en 1682 par la famille Ferret, et transmise par alliance à la famille la Bourdonnaye de Blossac avant d'être vendue par elle au XIXe siècle. Elle appartenait au marquis de Kergariou en 1925. Les parties anciennes ont été très remaniées ou ont disparu. On y trouve un pigeonnier qui remonte au XVIe siècle et qui porte les blasons de Charles de Ploeuc et Marie de Saint Gouësnou. Cest au château de Tymeur qua pris fin la révolte paysanne des Bonnets rouges avec lassassinat de son principal meneur par le marquis de Montgaillard, seigneur de Tymeur.                                                                                                           ROUGE,  le château est commandé, au début du XXe siècle, par Constant Lancien à l'architecte diocésain Le Guerranic de Saint-Brieuc. Le notaire carhaisien aurait fait construire cette imposante demeure pour plaire à son épouse. Un de ses sept enfants, Fernand, joua un rôle notable pour la ville: il fut maire pendant 38 ans, député, sénateur et président du conseil général. Au cours de la seconde guerre mondiale, des résistants sont détenus et torturés dans les caves du château. Racheté par la commune en 1956, le Kastell Ruz abrite l'hôtel des impôts avant que la bibliothèque municipale et l'école de musique n'investissent les lieux.","habitants":"Kerampuil; Famille de Kerampuilh                                                                        Pratulo; Famille de Jégou du Laz\r\n        \r\n        \"","divers":"Trois châteaux à  Carhaix-Plouguer ; Kerampuil grav-3-4, Prartulo grav-1 et le Rouge grav-2     Tymeur grav-5                      Kerampuil  GPS : 48° 16' 21\" Nord, 3° 33' 12,6\" Ouest                                  Pratulo GPS : 48° 14' 11\" Nord, 3° 40' 02\" Ouest","gps":"48° 16' 21\" Nord, 3° 33' 12,6\" Ouest","images":["../../jctruffet.com/image/image_29/29_Carhaix_Plouguer_1.jpg","../../jctruffet.com/image/image_29/29_Carhaix_Plouguer_2.jpg","../../jctruffet.com/image/image_29/29_Carhaix_Plouguer_3.jpg","../../jctruffet.com/image/image_29/29_Carhaix_Plouguer_4.jpg","../../jctruffet.com/image/image_29/29_Carhaix_Plouguer_5.jpg"]},"Consult_chateau_formulaireb82b":{"id":"Consult_chateau_formulaireb82b","dept":"29","canton":"Crozon","commune":"Chateaulin","nom":"Chateaulin","type":"Vestiges-Chateau","periode":"X-XIX","histoire":"Deux châteaux à Chäteaulin, dont Châteaulin et Toul-ar-Hoat.                                                                             CHATEAULIN, la motte quenserrait lAulne et des étangs constituait un site de défense naturel. Les comtes de Cornouaille y construisirent un château-fort au Xe siècle. Lorsque la famille comtale de Cornouaille hérite en 1066 de la couronne ducale la châtellenie de Châteaulin entra dans le domaine ducal. Vers 1250, le Duc Jean le Roux entoure les terres du domaine ducal de Châteaulin dun mur long de 32 km qui traverse les campagnes de Cast, Briec, Lothey et de Châteaulin. En 1373, le château fut incendié par les Anglais avant leur départ devant lavancée de larmée royale de Duguesclin. En 1689, le château et sa motte furent donnés à Yves Bauguion, prêtre desservant de Notre Dame, Il ne reste aujourdhui plus grand chose de ce château, exceptée une tour en ruine.","architecture":"TOUL-AR-HOAT, construit dans la seconde moitié du XIXe siècle. Il appartient au comte de Boisier au début du XXe siècle. Nombreux bâtiments modernes abritant une école à proximité du château. Edifice de plan massé composé d'un corps rectangulaire principal sur lequel se greffent une aile en retour d'équerre sur la façade antérieure et deux tourelles sur les façades latérale et arrière. Maçonnerie enduite avec encadrements de baies, chaînes d'angle et portail d'entrée en pierre de taille. Accueille  aujourd'hui  une école.","habitants":"Châteaulin; Famille comtale de Cornouaille                                          Toul; Famille du  comte de Boisier \r\n        \"","divers":"Deux châteaux à Châteaulin, dont Chateaulin grav 1 et Toul-ar-Hoat grav-2. Châteaulin  GPS : 48° 11' 51\" Nord, 4° 05' 19\" Ouest","gps":"48° 11' 51\" Nord, 4° 05' 19\" Ouest","images":["../../jctruffet.com/image/image_29/29_Chateaulin_1.jpg","../../jctruffet.com/image/image_29/29_Chateaulin_2.jpg"]},"Consult_chateau_formulaire262a":{"id":"Consult_chateau_formulaire262a","dept":"29","canton":"Fouesnant","commune":"Clohars-Fouesnant","nom":"Cheffontaines","type":"Château","periode":"XIX","histoire":"Châteaux à Clohars-Fouesnant, Cheffontaines                      CHEFFONTAINES, au nombre des places fortes, le château féodal de Kergoat et le château de Bodigneau figuraient en bonne et due place dans le système de défense de la Cornouaille du sud et servaient de garnison aux ligueurs. Cet état de fait demeura jusqu'à la prise de Quimper par le Maréchal d'Aumont qui, après sa victoire, ordonna le démantèlement des places fortes. Bodigneau bénéficia d'une mesure d'exception. L'article XVI de la capitulation que le Maréchal accorda en1594 stipulait qu'à l'égard des fortifications de Bodigneau, y sera pourvu à leur démolition par le Maréchal, à la moindre faute et oppression que faire se pourra. Le peuple resta sage et Bodigneau échappa à la destruction, quant aux fortifications de l'ancien château féodal de Kergoat, dont le système de défense s'appuyait sur la présence de deux étangs qui existent encore actuellement, elles furent démantelées. Seul subsista le corps de logis central qui fut épargné et devint la résidence des Penfentenio. En 1662, Jean de Penfentenio acheta Bodigneau à Barthélémy Rosmadec, et obtint en 1680 l'érection en châtellenie de ses terres de Kergoat et de Bodigneau sous le nom de Cheffontaines, forme francisée de Penfentenio  Propriétaire actuel madame P.E. Hentsch née Cheffontaines.","architecture":"CHEFFONTAINES, en 1766, la seigneurie fut érigée en marquisat et c'est alors que le nouveau marquis de Cheffontaines se construisit une résidence digne du titre dont Louis XV avait gratifié son fief et Bodigneau fut en partie abattu pour fournir ses beaux matériaux de granit à la construction de l'actuel château, quand survint la Révolution, l'ensemble du château n'était pas encore terminé. Un avant corps à pans marque le centre de la façade, prolongés par quatre pavillons avec de belles lucarnes ornent les hauts du toit.  Ainsi les écuries et les pavillons jouxtant les douves ne furent jamais réalisés. Le parc comprenait de nombreuses essences rares, l'accès de la propriété se faisait par une grande avenue qui rappelle les vastes percées du Grand Siècle (dans sa partie la plus étroite, elle mesure 1,10 m de large). Éléments protégés MH : le château, sauf les parties classées : inscription par arrêté du 25 février 1928. Les façades et les toitures, le vestibule d'entrée, le grand escalier, le petit salon, le grand salon et la salle à manger : classement par arrêté du 26 mars 1958.","habitants":"Jean de Penfentenio\r\n        \"","divers":"Deux châteaux à Clohars-Fouesnant, Cheffontaines    Cheffotaines GPS : 47° 53' 45,46\" Nord, 4° 03' 12,85\" Ouest","gps":"47° 53' 45,46\" Nord, 4° 03' 12,85\" Ouest","images":["../../jctruffet.com/image/image_29/29_Cheffontaines_1.jpg","../../jctruffet.com/image/image_29/29_Cheffontaines_2.jpg","../../jctruffet.com/image/image_29/29_Cheffontaines_3.jpg"]},"Consult_chateau_formulaireb67a":{"id":"Consult_chateau_formulaireb67a","dept":"29","canton":"Fouesnant","commune":"Clohars-Fouesnant","nom":"Clohars_Fouesnant","type":"Château","periode":"XIV-XVII-XIX","histoire":"Trois châteaux à Clohars-Fouesnant; Garennes, Kergos et Squividan.                                                                     GARENNES;   construit au cours de la deuxième moitié du XIXe siècle; il appartient à M. de Mauduit au début du XXe siècle, de style néo-XVIIe, de plan massé, est composé d'un corps principal et de plusieurs pavillons saillants. Élévation à travées, maçonnerie enduite avec soubassement, encadrements de baies, chaînes d'angle, bandeaux horizontaux, corniche et lucarnes en pierre de taille. Belle conciergerie couverte en chaume, le parc est classé jardin remarquable.\r\n  KERGOS, restauration de style néo-Renaissance et agrandissement au XIXe d'un manoir du XVIe siècle, suivi d'un réaménagement intérieur. Il est depuis 300 ans dans la famille Kernafflen de Kergos. L'entrée se fait par un double portail gothique. Les bâtiments sont disposés autour d'une cour fermée par une clôture, le corps de logis est encadré de deux ailes de dépendances en retour d'équerre. L'édifice, de plan allongé, présente une élévation à cinq travées et un avant-corps saillant de forme polygonale, surélevé d'un étage et couvert en pavillon. Lucarnes surmontées de frontons semi circulaires. Appareil de pierre de taille de granite. Son colombier date du XVIIe siècle. La chapelle est flanquée d'une large échauguette en nid d'hirondelle, et est surmontée d'un dôme à campanile. Le parc possède un étang, une serre et un jardin botanique.Ensemble de bâtiments disposés autour d'une cour fermée par une clôture, le corps de logis est encadré de deux ailes de dépendances en retour d'équerre. De plan allongé, il présente une élévation à 5 travées et un avant-corps saillant de forme polygonale, surélevé d'un étage et couvert en pavillon. Lucarnes surmontées de frontons semi-circulaires. Appareil de pierre de taille de granite.","architecture":"SQUIVIDAN, Émile Simon et Madeleine Fié-Fieux sinstallent au domaine de Squividan ; qui signifie en breton « lieu où abonde le sureau ». Ils ont vécu et peint ensemble au sein de cette maison de maître du XIXe siècle et de son parc. Cependant, ils ont aussi parcouru la Bretagne, à la recherche de paysages et de scènes de vie. Les deux peintres laissent à leur mort, une collection de plus de 1000 tableaux. Madeleine Fié-Fieux en fit don par testament au Conseil Général du Finistère, également légataire du domaine, à la condition quil ouvre celui-ci au public, y mettant en valeur luvre dÉmile Simon. Sa conservation et sa mise en valeur ont été confiées au musée départemental breton de Quimper. LAssociation Les amis du Squividan des expositions ont été proposées, dans plusieurs communes du Finistère. Depuis 2009, le parc et son espace dexposition sont ouverts au Public. Chaque année, une sélection de 40 oeuvres de ces deux artistes sont présentées afin d'apprécier le regard quils ont posé sur le Finistère, la Bretagne et ses habitants. Le manoir de Squividan est composé d'une maison de maître construite en 1886, d'une extension construite entre 1970 et 1980, à l'Est de la maison de maître, qui renferme une galerie d'exposition et un garde-meuble, d'un parc d'une superficie de 2 ha et 61 ares, qui se visite gratuitement, d'une collection double : le fonds d'Émile Simon riche de 942 pièces et celui de Madeleine Fié-Fieux de 211 pièces ainsi que tous les objets de la vie quotidienne recensé dans le manoir. Le parking du domaine de Squividan a été baptisé du nom d'Honoré d'Estienne d'Orves, en hommage à ce résistant dont la famille a temporairement habité le domaine pendant la seconde guerre mondiale.","habitants":"Squividan: Émile Simon et Madeleine Fié-Fieux                        Kergos;  Famille Kernafflen de Kergos.                                 Garennes;  M. de Mauduit    \r\n        \"","divers":"Trois châteaux à Clohars-Fouesnant; Garennes grav 2-3, Kergos  grav-4-5-6 et Squividan grav-1.                                                           Garennes GPS : 47°54'16\" Nord, 4°03'34\" Ouest                                            Squividan GPS : 47° 54\" 43\" Nord, 4° 04' 40\" Ouest","gps":"47°54'16\" Nord, 4°03'34\" Ouest","images":["../../jctruffet.com/image/image_29/29_Clohars_Fouesnant_1.jpg","../../jctruffet.com/image/image_29/29_Clohars_Fouesnant_2.jpg","../../jctruffet.com/image/image_29/29_Clohars_Fouesnant_3.jpg","../../jctruffet.com/image/image_29/29_Clohars_Fouesnant_4.jpg","../../jctruffet.com/image/image_29/29_Clohars_Fouesnant_5.jpg","../../jctruffet.com/image/image_29/29_Clohars_Fouesnant_6.jpg"]},"Consult_chateau_formulaire00b3":{"id":"Consult_chateau_formulaire00b3","dept":"29","canton":"Saint-Pol-de-Léon","commune":"Cléder","nom":"Cléder","type":"Château","periode":"XIII-XVI-XVIII","histoire":"Deux châteaux à Cléder, Kergournadeach et Kermenguy , Tronjoly (voir article) et à  trois K.m à l'est à Tréflaouenan un château de Creac'Hingar.                                                                                                KERGOURNADEACH, construit à la fin du XVIe siècle, ce château fut habité pendant 150 ans avant dêtre volontairement détruit par ses propriétaires vers 1760 et exploité comme carrière. Grâce à ses tours monumentales et ses mâchicoulis, il est considéré comme le dernier château-fort construit en France. Il est assimilé au château de Chambord. Aujourdhui seuls les murs extérieurs, les tours ainsi que les cheminées sont visibles. La légende veut quun jeune de la famille de Nuz ait accompagné Saint Pol Aurélien (un des sept Saints fondateur de la Bretagne) à lîle de Batz pour y combattre un dragon. En récompense de sa bravoure, le jeune Nuz reçut le domaine de Kergournadéach : \"lieu de lhomme qui ne fuit pas\".\r\nÉléments protégés MH : les restes du château : inscription par arrêté du 19 juin 1926.                                                                                         CREAC'HINGAR, la construction du manoir date des XVIe et XVIIe siècles. Il est en granit et, son plan en L, laisse voir un escalier droit en granit, une grande salle, une plus petite pièce, toute en longueur et un appentis. A l'étage, se trouve une petite pièce ornée d'une cheminée appelée la chapelle, car elle aurait servi de chapelle clandestine, durant la Révolution. Le manoir de Créac'hingar a été inscrit aux M.H. le 31/12/1979.","architecture":"KERMENGUY, il a été remplacé par un joli manoir breton, achevé en 1632, flanqué de 2 tourelles et dune autre aile avant la Révolution, époque à laquelle ces parties furent détruites. Le manoir de Kermenguy actuel est clôturé par une jolie galerie style Louis XIII, caractérisée par ses petits piliers très rapprochés qui étaient le cachet de l'époque. A la Révolution, laile Nord brula ainsi quune des tourelles. Durant cette trouble période le manoir a servi de cachette pour les prêtres non assermentés. Nicolas de Kermenguy aida Monseigneur de la Marche, évêque de Saint-Pol-de-Léon, à sexiler sur lîle de Jersey. Les bois de Kermenguy servirent de quartier général aux troupes contre-révolutionnaires lors de la bataille de Kerguidu, en mars 1793, proche du moulin de Kerguidu, situé depuis à Tréflaouénan.  Les terres et le château de Kermenguy sont la propriété de la famille de Kermenguy depuis 6 siècles. En 1400, Yvon Derian ou Derrien, fils du Seigneur de Pratalan épousa Basile de Coëtaudon, Dame de Kermenguy et de Kerabret. A l'époque, le nom de Kermenguy commence à être repris comme nom de famille. La Famille Derrien dont descend Yvon Derrien sillustra en donnant un évêque (1227 à 1238), un croisé (Guillaume Derrien en 1248), un sénéchal de Bretagne (Hervé Derrien en 1378). Les Kermenguy se sont illustrés en donnant un Chevalier de Saint-Michel (Jacques de Kermenguy en 1647), un chevalier de Saint-Lazare en 1721, deux pages du roi en 1710 et 1750, un page de la reine, en 1755, un député royaliste indépendant (Émile de Kermenguy, député de 1871 à 1893), de nombreux maires et prêtres, récemment. \r\nÉléments protégés MH : les façades et les toitures du manoir et du colombier ; les entrées Nord et Sud avec leurs balustres et leurs piliers : inscription par arrêté du 5 mai 1975.","habitants":"Kergou. Famille de Nuz Kermenguy;  Famille de Kermenguy\r\n        \"","divers":"Deux châteaux à Cléder grav-8, Kergournadeach grav 1-à 5 et Kermenguy. Kergou-grav-8                                                             GPS : 48° 37' 24,19\" Nord, 4° 8' 38,87\" Ouest                                                        Kermenguy GPS : 48° 37' 47,91\" Nord, 4° 8' 9,8\" Ouest grav 6-7                                                                                                      Creac'Hingar GPS : 48° 37' 46,29\" Nord, 4° 06' 12,37\" Ouest   grav 9","gps":"48° 37' 24,19\" Nord, 4° 8' 38,87\" Ouest","images":["../../jctruffet.com/image/image_29/29_Cl%c3%a9der_1.jpg","../../jctruffet.com/image/image_29/29_Cl%c3%a9der_2.jpg","../../jctruffet.com/image/image_29/29_Cl%c3%a9der_3.jpg","../../jctruffet.com/image/image_29/29_Cl%c3%a9der_4.jpg","../../jctruffet.com/image/image_29/29_Cl%c3%a9der_5.jpg","../../jctruffet.com/image/image_29/29_Cl%c3%a9der_6.jpg","../../jctruffet.com/image/image_29/29_Cl%c3%a9der_7.jpg","../../jctruffet.com/image/image_29/29_Cl%c3%a9der_8.jpg","../../jctruffet.com/image/image_29/29_Cl%c3%a9der_9.jpg"]},"Consult_chateau_formulaire44eb":{"id":"Consult_chateau_formulaire44eb","dept":"29","canton":"Concarneau","commune":"Citadelle-Concarneau","nom":"Concarneau","type":"Citadelle","periode":"XV-XIV-XVI","histoire":"A Concarneau le Fort et le château de Kériolet (voir article) Roscanvel.                                                                        CONCARNEAU   dit de Cadelou. Ville close par excellence, la cité maritime établie sur l´île de Conq : \"la grande coquille\" est très fréquentée au Moyen-Age car elle se situe sur l'itinéraire le plus court entre Quimper et Pont-Aven. Occupée à maintes reprises par les Anglais, elle se soumet à Du Guesclin en 1373. Les fortifications sont remaniées au XVe puis au XVIe siècle. Au XVIIe siècle, la cité dotée d'une centaine de foyers est en perte de vitesse.  Intégrant Concarneau dans le système défensif de la province de Bretagne et du Royaume, Vauban fait moderniser les fortifications de la ville entre 1692 et 1699. Face à la terre, les tours d'artillerie du Major (au nord) et du Gouverneur (au sud) encadrant le front d'entrée et le ravelin sont renforcés par un chemisage en granite de plusieurs mètres d'épaisseur au XVIe siècle et des éperons au XVIIe siècle. Pour échelonner la défense en profondeur, Vauban adapte une nouvelle porte comprenant pont-levis et fossé en arrière de la demi-lune. Coté mer, l'ingénieur dote l'enceinte d'embrasures plongeantes aux endroits les mieux tournés face à la passe d'entrée : la tour du fer à Cheval et face à l'arrière-port : la tour Neuve. Traverse, ingénieur en charge des côtes de Cornouaille, propose vainement en 1693, 1698 et 1699 des agrandissements avec notamment la surélévation de la tour du Gouverneur. Ces projets, pourtant validés par Vauban, sont rejetés par le Roi qui juge cette place comme \"fortification ordinaire\". En juillet 1695, Vauban lui-même (il est quand même commandant de Haute et Basse Bretagne !) faisait remettre à Concarneau et au château du Taureau des munitions pour les mettre en état de défense.","architecture":"CONCARNEAU, contestée au XVIIIe siècle,  voit son rôle militaire réaffirmé au XIXe siècle du fait de sa position géographique à mi-chemin entre Brest et Lorient. Les parapets sont surélevés et percés de créneaux de fusillade tandis qu'une nouvelle caserne et un magasin à poudre sont construits vers 1837. L'île de Conq devient à la fin du XIXe siècle un poste de ravitaillement pour les torpilleurs de la défense mobile Française. La ville close de Concarneau est un site exceptionnel pour comprendre six siècles d'évolution de la fortification. Les fouilles archéologiques entreprises ces 30 dernières années ont permis de redécouvrir toute une typologie d'embrasures (archères, archères-canonnières, canonnières, embrasures plongeantes, créneaux de fusillade etc.), portes et poternes... qui permettent de mieux comprendre l'histoire de cette cité.Éléments protégés MH : les remparts : classement par arrêté du 27 février 1899. Les remparts de la ville close comprenant la tour du Gouverneur et la tour du Major , quant à leur extérieur seulement, les courtines adjacentes et fermant les terrains et bâtiments affectés au service de la Guerre, à savoir la partie du front attenant à la tour du Gouverneur et la poterne d'accès : classement par arrêté du 20 août 1913.                                                                                                                             ROSCANVEL, lîlot des Capucins est un îlot rocheux au pied de la falaise de la commune de Roscanvel. Son nom vient dun rocher à proximité de lîlot, qui a la forme dun moine en prière. Sa position est stratégique à lentrée du goulet de Brest. Le fort contrôle la totalité de la baie de Camaret. La vue est entièrement dégagée de la pointe du Grand Gouin. Le fort est construit en 1848 daprès les plans que Vauban avait dessinés quelques 150 ans plus tôt. Le magasin sous roc est creusé dans la pierre et de ce fait cet îlot rocheux est creux. Tout le casernement est en schiste et granite et sintègre parfaitement au paysage. Louvrage comprend une batterie de rupture sous roc, une batterie à tirs rapides.","habitants":"Concarneau; Vauban Kériolet; Comte de Chauveau \r\n        \"","divers":"A Concarneau le Fort . Fort du Cabelou grav 5  Roscanvel grav 6-7                                                                                            GPS : 47° 51' 25\" Nord, 3° 55' 03\" Ouest","gps":"47° 51' 25\" Nord, 3° 55' 03\" Ouest","images":["../../jctruffet.com/image/image_29/29_Concarneau_1.jpg","../../jctruffet.com/image/image_29/29_Concarneau_2.jpg","../../jctruffet.com/image/image_29/29_Concarneau_3.jpg","../../jctruffet.com/image/image_29/29_Concarneau_4.jpg","../../jctruffet.com/image/image_29/29_Concarneau_5.jpg","../../jctruffet.com/image/image_29/29_Concarneau_6.jpg","../../jctruffet.com/image/image_29/29_Concarneau_7.jpg"]},"Consult_chateau_formulaire8f54":{"id":"Consult_chateau_formulaire8f54","dept":"29","canton":"Concarneau","commune":"Concarneau","nom":"Concarneau_II","type":"Château","periode":"XV-","histoire":"Dans cet article deux châteaux ; Moros et Stang                                     MOROS,  il a été construit, en 1477, pour Yvon de Tréanna, capitaine de Concarneau. La châtellenie du Moros comprenait alors le Grand Moros (l'actuel manoir et son domaine), le Petit Moros (dont les pierres de la bâtisse médiévale, détruite au XIXe siècle, ont servi à construire l'actuelle Ferme du Moros), 2 moulins et des terres allant jusqu'à Kerrichard, dont l'église Notre-Dame-de-Lorette de Lanriec, contemporaine du manoir et qui porte encore les armes des Tréanna. Le Domaine du Moros a appartenu à Augustin de Beaulieu (1635-1637), explorateur de la marine royale et homme de confiance de Richelieu, Abraham Duquesne (1651-1688), lieutenant général des armées navales de Louis XIV, François-Marie Penguilly L'Haridon (qui fait ériger, en 1830, les terres du Moros en majorat) et Zénaïde Ivanovna Narychkine, Princesse impériale russe (1865-1893). Le parc du Manoir du Moros fut totalement dévasté par l'ouragan de 1987. Suite aux dégâts, il a été totalement redessiné et replanté depuis. Le parc présente depuis une belle collection de plantes de bruyères, de camélias, d'azalées, de rhododendrons et d'hortensias. Aujourd'hui, le Manoir du Moros est privé.","architecture":"STANG, le manoir de Stang-al-Lin appelé aussi le château Rose, La construction du manoir date de 1903. Le conseiller Général du canton de Concarneau, Gustave Bonduelle a racheté, en 1902, les terres issues du Domaine de Keriolet à Beuzec-Conq et y fit construire, en 1903, le Manoir de Stang-al-Lin. Actuellement, il appartient à la Famille Denier, ce manoir, dont les éléments les plus anciens remonteraient au XVe siècle a été reconstruit en 1664 par René de Guernisac et remanié au XVIIIe siècle, il est devenu bien national lors de la Révolution française et fut acheté par un marchand de biens de Quimper, qui le revendit à Bertrand Nicou, d'origine lyonnaise. Agrandi à plusieurs reprises au fil du temps, ce manoir a été transformé en château-hôtel en 1937. Situé dans une vallée encaissée, il conserve son escalier monumental et de grandes cheminées en granite, un cadran solaire daté de 1629, un beau parc à la française et un étang. Il a été restauré complètement en 1958. Son porche monumental comprend une entrée cavalière et une entrée piétonne et porte un blason aux armes de la famille de Guernisac, actuel propriétaire  La famille Hubert.","habitants":"Moros; Famille d'Augustin de Beaulieu                                Stang; Gustave Bonduelle  et  famille de Guernisac\r\n        \"","divers":"Dans cet article deux châteaux ; Moros grav 1-2-3 et Stang  grav-4                                                                                                                GPS : 47° 52' 43\" Nord, 3° 53' 43\" Ouest                                                               Stang GPS : 47° 52' 53\" Nord, 3° 54' 08\" Ouest","gps":"47° 52' 43\" Nord, 3° 53' 43\" Ouest","images":["../../jctruffet.com/image/image_29/29_Concarneau_II_1.jpg","../../jctruffet.com/image/image_29/29_Concarneau_II_2.jpg","../../jctruffet.com/image/image_29/29_Concarneau_II_3.jpg","../../jctruffet.com/image/image_29/29_Concarneau_II_4.jpg"]},"Consult_chateau_formulairef123":{"id":"Consult_chateau_formulairef123","dept":"29","canton":"Saint-Renan","commune":"Le Conquet","nom":"Conquet","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux à le Conquet ; Cosquiez et Penhep.                            COSQUIEZ, château construit autour de 1900 à l'emplacement d'une ferme, bâtiment de plan irrégulier en L, de style néo-gothique; néo-médiéval, les corps des bâtiments principaux sont interrompus par des pavillons et des corps secondaires. Elévation de moellon avec encadrements de baies en pierre de taille, couvertures en pavillon et en terrasse. Eléments de fortifications pittoresques (châtelet, et creneaux).\r\nA ne pas manquer au Conquet : le phare de Kermorvan sur la presqu'île du même nom, le fort de l'Ilette et les nombreuses redoutes de style Vauban, le port de pêche  le centre-ville historique avec ses vieilles maisons du XVIe siècle.","architecture":"PENHEP, du nom dun manoir qui se dressait là au début du XVIIe siècle et appartenait à l'écuyer François Huon, sieur de Kermadec Penhep et de Gorre Conq, bâti au début du XIXe siècle par François Benoît Tissier, ancien pharmacien en chef des armées de Napoléon. Il fut maire du Conquet et mourut pendant son mandat le 11 août 1873, âgé de 70 ans. Penhep est décrit en 1898 dans un courrier municipal: \"le château est la propriété la plus somptuaire du Conquet, elle possède un parc de huit hectares, une grande maison avec sous sol, seize salles, salons ou chambres de maîtres avec mobilier luxueux, des mansardes, deux serres de soixante mètres, écurie pour 8 à 10 chevaux, étable, porcherie, poulailler, clapier, pigeonnier, magasin à fourrage, cour dhonneur avec loge de concierge dun côté et belle remise de lautre, potager, verger, etc.. Vendu en 1922 et transformé en hôtel de charme, puis en colonie de vacances, le château est depuis1988 propriété de la commune du Conquet, qui en fait sa mairie. Le château de plan allongé est composé d'un corps central de cinq travées accosté de deux ailes basse en appentis. Maçonnerie enduite avec encadrements de baies, chaînes d'angle, corniche et lucarnes en pierre de taille.  Propriété de la commune, hôtel de ville.","habitants":"Penhep; l'écuyer François Huon\r\n        \"","divers":"Deux châteaux à le Conquet ; Cosquiez grav 1-2-3 et Penhep grav-6.                                                                                         Cosquer GPS : 48° 41' 47\" Nord, 3° 47' 17\" Ouest","gps":"48° 41' 47\" Nord, 3° 47' 17\" Ouest","images":["../../jctruffet.com/image/image_29/29_Conquet_1.jpg","../../jctruffet.com/image/image_29/29_Conquet_2.jpg","../../jctruffet.com/image/image_29/29_Conquet_3.jpg","../../jctruffet.com/image/image_29/29_Conquet_4.jpg","../../jctruffet.com/image/image_29/29_Conquet_5.jpg"]},"Consult_chateau_formulairedc75":{"id":"Consult_chateau_formulairedc75","dept":"29","canton":"Plonéour-Lanvern","commune":"Tréméoc","nom":"Coudraie","type":"Château","periode":"XVII","histoire":"COUDRAIE,  construit à différentes époques. Mentionné depuis le XVe siècle, le château de la Coudraie est vendu comme bien national à la famille Huard ; il est reconstruit en 1817 par Jean-Baptiste Huard, négociant et maire de Pont-l'Abbé de 1833 à 1837. Portail du XVIIe siècle. Ecuries et communs du XVIIIe siècle. Repaire huguenot durant les guerres de religion, maison natale de Charles Mascarenne de Rivière, qui a signé une page douloureuse de l'histoire maritime de la France, propriété à la fin du XIXe de Jean-Baptiste Huard, qui y mourut tragiquement. L'accès s'effectue par une clôture d'entrée ornée de huit piliers datant du début du XVIIe siècle, permettant le passage des voitures et des piétons.","architecture":"COUDRAIE,  date du XVIIe et XVIIIe siècle, le château fut construit à différentes époques. Le manoir donne sur une cour carrée limitée, au sud, par un muretin surmonté d'une grille en fer forgé. L'Est et l'Ouest de la cour sont occupés par des communs qui remontent aux XVIIe et XVIIIe siècles. Le manoir de la Coudraie se situe au Nord, reconstruit à la fin du XVIIIe siècle. Il est de forme rectangulaire. Du manoir ancien, il ne reste que le bâtiment 0uest des communs et les 8 piliers monumentaux de l'entrée. Le logement principal constitue un ensemble Directoire rare en Bretagne. Toutes les pièces ont conservé leurs boiseries d'époque. Le grand salon est décoré de motifs en stuc noir et or. Derrière cette construction se trouve son jardin d'agrément datant de 1800.  Inscrit aux M.H. le 18/12/1967. C'est depuis un hôtel classé.\r\nÉléments protégés MH : le château, les façades et les toitures des communs.","habitants":"Famille de Coudraie\r\n        \"","divers":"Coudraye GPS : 47° 54' 21\" Nord, 4° 12' 42\" Ouest","gps":"47° 54' 21\" Nord, 4° 12' 42\" Ouest","images":["../../jctruffet.com/image/image_29/29_Coudraie_1.jpg"]},"Consult_chateau_formulaire2626":{"id":"Consult_chateau_formulaire2626","dept":"29","canton":"Douarnenez","commune":"Douarnenez","nom":"Douarnenez",
