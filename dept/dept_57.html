ud-est du donjon, est un bâtiment rectangulaire à trois niveaux, dont un étage de soubassement. La façade principale donnant sur le parc, construite dans le style très classique de la fin du XVIIIe siècle, comporte un avant-corps central peu saillant à fronton triangulaire. Elle est à neuf travées de fenêtres rectangulaires, à l'exception des trois fenêtres centrales du rez-de-chaussée en plein cintre.","habitants":"Famille d'Hausen\"","divers":"Château de Weidesheim à    Kalhausen        49° 02' 16? N, 7° 07' 58? E","gps":"","images":["../image/image_57/57_Weidesheim_1.jpg","../image/image_57/57_Weidesheim_2.jpg","../image/image_57/57_Weidesheim_3.jpg"]},"Consult_chateau_formulaire5528":{"id":"Consult_chateau_formulaire5528","dept":"57","canton":"Maizières-lès-Metz","commune":"Woippy","nom":"Woippy","type":"Château","periode":"XIII-XIV","histoire":"Deux châteaux dans cet article; Woippy et la maison Rucher.            WOIPPY, édifié au XIIIe-XIVe siècle, est resté jusquà la Révolution propriété du chapitre  de Metz, seigneur de Woippy. L'édifice se compose dun donjon carré de trois étages de 12 m de haut. Aux angles du mur denceinte, crénelé jusquau XVIIIe siècle, se trouvent quatre tourelles, surmontées chacune dune poivrière. Lune des tours servait de prison ou furent emprisonnés les malheureux jugés pour sorcellerie au XVIe siècle.  Le château était entouré dun fossé large de 11 mètres, alimenté par le ruisseau. Lentrée, donnant sur la rue de Briey, était protégée par un pont-levis. Vendu à la Révolution à la suite de la confiscation des biens du clergé, il a été acheté par la famille Séchehaye, qui en restera propriétaire jusquen 1978.  Ce petit château comporte un donjon de plan carré entouré d'un mur d'enceinte cantonné de quatre tours rondes et d'un large fossé, alimenté par le ruisseau de saulny, aujourd'hui détourné. Une petite chaussée a remplacé à la fin du XVIIIe siècle le pont-levis qui nécessitait beaucoup de travaux. Le donjon, couvert d'un toit en pavillon à faible pente, possède quatre niveaux de petites ouvertures irrégulièrement disposées, le premier niveau de la façade nord ayant été repercé à une époque plus récente. A la fin du XIXe siècle puis à nouveau en 1936, d'importantes transformations eurent pout but de rendre habitable le château : divisions des grandes salles et utilisation de l'espace entre le donjon et les tours pour l'aménagement de pièces d'habitation.Les tours d'angle à deux étages sont réunies par des courtines autrefois crénelées.\nÉléments protégés MH : les façades et les toitures, ainsi que le mur d'enceinte avec les façades et les toitures des quatre tourelles d'angle : inscription par arrêté du 4 décembre 1968.","architecture":"La Maison le RUCHER cette élégante maison fut construite avec sa chapelle, au milieu du XIXe siècle, pour le père de l'historien René Paquet, elle est entourée de fossés et d'un vaste parc. La Maison Le Rucher était considérée comme l'une des plus belles villas du pays messin. Remplacée, vers 1849, par une grande maison bourgeoise, elle abrita en septembre-octobre 1870, le quartier général du général Gibon qui y décèda, le 19/10/1870, des suites de ses blessures. Aujourdhui, la Maison Le Rucher est laissée à labandon.","habitants":"famille Séchehaye\"","divers":"dans cet article; Woippy et la maison Rucher                                       Rucher  grav-4                                  Woippy         49° 09' 07? N, 6° 08' 44? Est             Rucher   49° 09' 07\" Nord, 6° 09' 08\" Est","gps":"","images":["../image/image_57/57_Woippy_1.jpg","../image/image_57/57_Woippy_2.jpg","../image/image_57/57_Woippy_3.jpg","../image/image_57/57_Woippy_4.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','57 — Moselle'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
