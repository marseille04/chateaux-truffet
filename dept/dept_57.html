truit à la fin du XIVe siècle par Gilles de Rodemack, et détruit en 1483 lors des hostilités avec Gérard de Rodemack, le château de Pépinville, déjà mentionné en 1356 mais reconstruit par la suite, existe toujours. La seigneurie appartenait au XVIe siècle à la famille de Lellich. En 1761 Marie-Françoise Morel administrait le domaine jusqu'à la majorité de son fils Charles-Léonard, et fit reconstruire ou restaurer le château en 1776 ainsi que l'indique la date inscrite dans deux cartouches sur la façade du jardin. Vendu comme bien national, il changea plusieurs fois de propriétaires avant d'être acheté en 1847 par la famille Bertrand. C'est au château de Pépinville que naquit en 1855 Théodore Gosselin, célèbre historien et académicien connu sous le nom de G. Lenôtre. Le château fut acheté en 1894 par les soeurs du sacré-coeur de Jésus, qui y installèrent un orphelinat de jeunes filles, au XIXe siècle. Puis il devint au XIXe siècle, un couvent. En 1951, un Institut médico-psychopédagogique s'y installe. Lorsque les religieuses quittèrent le château de Pépinville en 1968 pour sinstaller à Scy-Chazelles, le château de Pépinville fut repris par le centre socio-éducatif de Guénange, au milieu du XXe siècle. Il accueille, aussi, chaque été, le centre aéré de la commune. Occupé depuis 1968 par un institut d'enfants inadaptés.","architecture":"PEPINVILLE, la plus ancienne mention connue du château remonte à 1356. Il fut détruit et reconstruit maintes fois.  Isolé au nord de Richemont, reconstruit entre les deux tours rondes de l'ancienne demeure médiévale, est un bâtiment de plan rectangulaire, formé de trois corps en U disposés autour d'une cour. Le corps de bâtiment principal, de plan rectangulaire allongé, couvert d'un toit à croupes, a ses façades principales d'ordonnance symétriques à deux niveaux séparés par un bandeau, avec un avant corps central en faible saillie, élevé en pierre de taille et surmonté d'un fronton triangulaire.  La façade sur jardin est la plus soignée, avec un avant-corps plus large, s'ouvrant au premier niveau par trois portes-fenêtres en plein cintre, et au deuxième étage par une baie identique encadrées par deux fenêtres à linteau en arc segmentaire. La tour qui flanquait l'aile droite a été remplacée après 1938 par une chapelle néo-romane qui l'écrase. L'aile gauche est en revanche toujours prolongée sur son angle extérieur, par une grosse tour ronde. Les dépendances du XVIIIe siècle, plus anciennes que le château sont en partie conservées. Les tours rondes de l'ancien château et ses dépendances datent du XVIIIe siècle ainsi que les jardins et son parc.","habitants":"Famille de Lellich\"","divers":"Château de Pépinville à Richemont                                                        49° 17' 11\" Nord, 6° 10' 01\" Est","gps":"","images":["../image/image_57/57_P%c3%a9pinville_1.jpg","../image/image_57/57_P%c3%a9pinville_2.jpg","../image/image_57/57_P%c3%a9pinville_3.jpg"]},"Consult_chateau_formulaire2b48":{"id":"Consult_chateau_formulaire2b48","dept":"57","canton":"Boulay-Moselle","commune":"Hinckange","nom":"Pétange","type":"Château","periode":"XV-XIX","histoire":"Deux châteaux dans cet article , Pétange et Rexroth.                                PETANGE, le château fortifié dont les origines ne sont pas connues, mais qui semble avoir été antérieur au XVe ou XVIe siècle, avait la particularité d'être construit en partie sur le territoire de l'évêché de Metz et en partie sur le territoire Lorrain, la borne séparative se trouvant dans la cuisine du château. Au début du XVIIe siècle, il appartenait à la famille de Bassy et, en 1631, à la famille de Bock qui le conserva jusqu'à la Révolution. C'était, selon la déclaration d'Antoine de Bock à la chambre royale de Metz en 1681, \"un tout petit château enclos de fossés\" et cantonné de tours. Une partie de ce château, formée d'un bâtiment rectangulaire avec sur la façade Est deux tours circulaires tronquées et une porte appareillée, mais bouchée, subsiste encore tout près de l'actuelle ferme de Pétrange. Sa construction date du XIVe au XVe siècle.","architecture":"A deux K.M. à l'ouest; Charleville sous bois le château de REXROTH situé dans la forêt de Befey. En 1912 lindustriel Fritz Rexroth (IDÉAL Tannerie de Wiltz S.A.) fit construire un château dans le style des résidences rhénanes. Il servit depuis 1925, de sanatorium et de maison de convalescence. En 2009-2010, laspect homogène de ce très bel ensemble du début du XXe siècle a été totalement dénaturé par des constructions en rupture architecturale, venues flanquer le château de Rexroth, sur les deux côtés, sans une intégration paysagère et patrimoniale. Le château de Rexroth fut inauguré le 9.12.2011 et appartient, depuis, à l'institut d'assurances sociales d'Alsace-Lorraine.","habitants":"Famille de Bassy \"","divers":"Deux châteaux dans cet article, à  Hinckange                             Pétange grav 1-2 et Rexroth grav-3.    Petange 49° 11' 26\" nord, 6° 26' 49\" Est                                              Rexroth  49° 11' 25\" Nord, 6° 24' 46\" Est","gps":"","images":["../image/image_57/57_P%c3%a9tange_1.jpg","../image/image_57/57_P%c3%a9tange_2.jpg","../image/image_57/57_P%c3%a9tange_3.jpg"]},"Consult_chateau_formulairee698":{"id":"Consult_chateau_formulairee698","dept":"57","canton":"Bitche","commune":"Rahling","nom":"Rahling","type":"Château","periode":"XIV-XV","histoire":"RAHLING, le château appartenait anciennement aux comtes de Deux-Ponts-Bitche. Mentionné en 1347, il fut détruit en 1380 par le comte Jean II de Sarrewerden et reconstruit au XVe siècle.  Après l'extinction de la lignée des seigneurs de Deux-Ponts-Bitche, le château revint en 1572 au duc de Lorraine. Mais selon le dénombrement du duché de Lorraine, rédigé en 1594 par le président de la chambre des comptes de Lorraine, Thierry Alix, il était alors ruiné. Il ne subsistait plus que les \"marques de vieilles murailles du château\". Il fut reconstruit au début du XVIIe siècle, ainsi qu'en témoigne la date 1620 inscrite sur la porte de la tour et engagé en 1646 à Etienne de Vervenne, colonel d'un régiment d'infanterie, gouverneur de Bitche, puis en 1647 à François de Rommecourt, seigneur de Rahling et Bining. Au XVIIIe siècle, le château était propriété du domaine ducal, puis royal. Il fut habité vers 1764 par Jean-Daniel Zoller, ancien prévôt de la ville et du comté de Bitche.\nSitué à l'est du village, inscription par arrêté du 29 avril 1994.","architecture":"RAHLING, à la fin du XVIe siècle, Rahling est engagé en 1646 puis en 1647 aux gouverneurs de la place forte de Bitche et racheté par la commune de Rahling en 1989. Du château primitif, du XIVe siècle, subsisteraient les façades postérieures et latérales, repercées au XVe siècle et XVIe siècle. Sa façade antérieure date du XVIe siècle. La tour d'escalier sur la façade antérieure fut construite en 1620 (date portée par un cartouche au droit de la porte piétonne) avec les repercements partiels des façades. Il porte des marques de tâcheron. Précédé d'un fossé qui subsiste seulement au nord, le château actuel, d'aspect trapu, est un bâtiment de plan rectangulaire, couvert d'un toit à la Mansart de tuiles en écaille et flanqué au milieu de la façade sud d'une tour ronde d'escalier demi-hors-oeuvre. Les façades sur trois niveaux sont irrégulièrement percées de fenêtres à meneau à encadrement de grès rose datant de trois époques différentes. Avec le très exceptionnel escalier en vis, suspendu, la porte de la tour, surmontée d'un cartouche date 1620, est la partie la plus décorée de ce château austère. Ses piedroits sont ornés, sur la face, de motifs feuillagés inscrits dans les éléments géométriques et, dans l'embrasure, de niches à coquille. La marque de tâcheron du cartouche daté est la même que l'une de celles que porte le limon mouluré de l'escalier; le dessous de chacune des marches est entièrement sculpté en faible relief d'entrelacs géométriques qui encadrent de grosses fleurs inscrites dans un cercle, toutes différentes. Au premier étage, une salle à plafond à poutres et solives conserve une très belle cheminée. le château de Rahling a été construit en bordure du village de Rahling. Mentionné au XIVe siècle. Isolé dans la région où il ne subsiste que des châteaux forts et des châteaux construits au XVIIIe siècle, il se rattache davantage à l'architecture alsacienne, par la forme de la toiture, le décor à enroulements de fenêtres, l'ornementation et les nombreuses marques de tâcheron gravées sur le limon de l'escalier et le tympan de son portail, est devenu un domaine viticole.","habitants":"Famille de Jean-Daniel Zoller\"","divers":"Château de Rahling                                      48° 59' 31\" Nord, 7° 13' 03\" Est","gps":"","images":["../image/image_57/57_Rahling_1.jpg","../image/image_57/57_Rahling_2.jpg","../image/image_57/57_Rahling_3.jpg","../image/image_57/57_Rahling_4.jpg"]},"Consult_chateau_formulaire30b6":{"id":"Consult_chateau_formulaire30b6","dept":"57","canton":"Sarrebourg","commune":"Richecourt le château","nom":"Richecourt","type":"Château","periode":"XV-XVII","histoire":"RICHECOURT, appartenait sans doute dès la fin du XIIe siècle aux comtes de Werd dits de Frankenbourg, issus de la maison de Sarrebruck. En 1255, Thérry, comte de Réchicourt, fils du comte Sigebert de Werd, fit hommage à l'évêque de Metz pour le château, et ses successeurs renouvelèrent cet hommage jusqu'au XVIe siècle. La seigneurie passa par mariage au début du XIVe siècle au comte Fritzmann de Linange-Dabo, de la branche des Linange-Hartenburg. Le château fut détruit vers 1469 au cours d'un conflit entre le comte Rudolphe de Linange et le duc de Lorraine qui s'engagea à le reconstruire. La branche des comtes de Linange, seigneurs de Réchicourt, s'éteingnit en ligne masculine en 1507 au décès du comte Hanemann, qui laissa deux filles, Elisabeth, mariée à Emich, seigneur de Daun, et Walburge, mariée à Jean, seigneur de Hohenfels de Reipolskirchen. La division de la seigneurie au XVIe siècle entre les descendants des deux héritières; les comtes d'Eberstein, les Linange-Westerburg, les Hohenfels, explique sans doute la construction d'un deuxième château. La seigneurie fut à nouveau réunie en une seule main en 1593 à la suite d'héritages et d'acquisitions diverses par le comte Louis de Linange-Westerburg, et resta en possession des Linange Westerburg Réchicourt jusqu'en 1669. Le bourg et les châteaux souffrirent beaucoup de la guerre de trente ans. En 1669, après plusieurs tentatives d'aliénation, la seigneurie fut vendue au comte Frédéric d'Ahlefeld, grand chancelier du Danemark, qui en 1681 fit hommage au roi de France pour le comté de Réchicourt, comprenant notamment \"le château, séparé du bourg environné de fossés, consistant en un donjon vieux et neuf bâtiment\".","architecture":"RICHECOURT,  le château actuel est le résultat d'une succession d'accroissements et d'amputations, l'époque de son apogée paraissant être le XVIIIe siècle et le début du XIXe siècle. C'est peut-être à partir d'une haute tour-porche, élevée au XVIe siècle, que le château s'est agrandi d'abord à l'ouest puis à l'est, pour finir par devenir un bâtiment important de plan curviligne, prolongé au nord par de longues dépendances. Le château est encore aujourd'hui un imposant bâtiment de plan rectangulaire dans lequel s'imbrique au sud-ouest un corps de plan carré, percé au rez-de-chaussée d'un passage couvert donnant accès à la cour. Le toit à demi-croupes est couvert de tuiles en écaille. Les hautes façades sont percées sur trois niveaux de fenêtres à meneau ou de croisées à encadrement de grès rouge, soulignés de bandeaux seulement sur la façade postérieure. Parmi toutes ces fenêtres, seule la double croisée au droit de la porte cochère sur la façade principale, est décorée de tables rentrantes et de motifs floraux et géométriques, caractéristiques du XVIe siècle. A gauche de cette ouverture subsiste encore le culot pyramidal d'une échauguette. La porte cochère du début du XVIIIe siècle, à l'extrémité du passage couvert, côté cour, s'ouvre sur un arc en anse de panier. A l'ouest du passage couvert, l'escalier tournant suspendu dans une vaste cage carrée, ajouté lors des agrandissements du XVIIIe siècle, a une rampe d'appui à grille en fer forgé, se terminant au second étage par des balustres plats en bois.  Éléments protégés MH : les façades et les toitures du logis et de la grange; l'escalier du XVIIIe siècle et les deux pièces de l'étage: inscription par arrêté du 16 novembre 1988.","habitants":"comte Fritzmann de Linange-Dabo,\"","divers":"Château de Richecourt: 48° 39' 56\" Nord, 6° 50' 28\" Est","gps":"","images":["../image/image_57/57_Richecourt_1.jpg"]},"Consult_chateau_formulaire74dc-2":{"id":"Consult_chateau_formulaire74dc-2","dept":"57","canton":"Yutz","commune":"Rodemack","nom":"Rodemack","type":"Citadelle","periode":"XII-XVI","histoire":"RODEMACK, le premier château construit à Rodemack vers 1190 par le voué Arnould, qui prit le titre de sire de Rodemack, le fut en usurpation des droits de l'abbaye d'Echternach. Un des descendants d'Arnould, Gilles II ou Gilles III, le transforma en une forteresse, en créant une deuxième enceinte entourée de fossé creusé dans le roc. Il subsiste de cette époque la profonde porte cochère flanquée de tours jumelées. Rodemack fut incendié par les Messins en 1430 et Jean III puis Gérard, son fils restaure la forteresse et la renforce par des avants-murs, de nouveaux fossés et une énorme barbacane devant le pont-levis du front nord. Prisonnier à la bataille de Bulgnéville, épuisé par la reconstruction de sa forteresse, Jean III contracta des dettes considérables. Son fils Gérard fut un redoutable chef de mercenaires mais mourut ruiné, dépossédé et sans descendance. Rodemack fut bientôt l'objet de longues et âpres compétitions entre les Margraves de Bade, les ducs de Guise, les Français et les espagnols. Lorsqu'il fut attribué à l'Espagne par le traité de Cateau-Cambrésis en 1559, le château était devenu inhabitable, proprieté de la famille Delvecchio.","architecture":"RODEMACK,   au XVIe siècle, Christophe II de Bade fit construire, au milieu du bourg, le petit château, grosse demeure qui subsiste, quoique très transformée au XVIIIe siècle. Au cours de la guerre de trente ans, Rodemack connu encore des ruines; l'enceinte du bourg fut partiellement abattue en 1673. En 1678, les français occupèrent le château en ruine, pour ne plus la rendre. La place fut remise en état par les ingénieurs français au cours du XVIIIe siècle, conservant en très grande partie ses fortifications médiévales  le château proprement dit fut démoli et remplacé par le corps de garde principal. La citadelle fut prise et saccagée par les troupes de Brunswick en 1792. Vendue par le gouvernement en 1811 et rachetée en 1815. Son démantellement eut lieu peu après 1815, assiégée pendant les Cent-Jours et défendue par le général Joseph Léopold Sigisbert Hugo. Le logement du commandant est détruit en 1819 et toutes les fortifications du côté Nord en 1821 avant que l'armée ne déclasse le château. Vers 1869 le baron Charles de Gargan acquit les vestiges et restaure le pavillon neuf des officiers,  restaure et aménage en habitation le logement du commandant et le pavillon neuf des officiers,. En 1948, le pavillon des officiers est reconstruit au-dessus des caves. Le village de Rodemack est classé parmi les plus beaux villages de France.                                                                                                                          Le logement du commandant est détruit en 1819 et toutes les fortifications du côté Nord en 1821 avant que l'armée ne déclasse le château.","habitants":"Famille de Christophe II de Bade \"","divers":"Citadelle de Rodemack                         49° 28' 6,28\" Nord, 6° 14' 19,9\" Est","gps":"","images":["../image/image_57/57_Rodemack_1.jpg","../image/image_57/57_Rodemack_2.jpg","../image/image_57/57_Rodemack_3.jpg","../image/image_57/57_Rodemack_4.jpg","../image/image_57/57_Rodemack_5.jpg","../image/image_57/57_Rodemack_6.jpg","../image/image_57/57_Rodemack_7.jpg","../image/image_57/57_Rodemack_8.jpg","../image/image_57/57_Rodemack_9.jpg"]},"Consult_chateau_formulaire0278-2":{"id":"Consult_chateau_formulaire0278-2","dept":"57","canton":"Sarrebourg","commune":"Azoudange","nom":"Romécourt","type":"Château","periode":"XVI","histoire":"ROMECOURT, érigé en fief noble par le cardinal de Lorraine, le 5 juin 1564, les terres de Romécourt furent octroyées à Michel l'Enfant, secrétaire de la reine d'Ecosse et officier des Salines de Dieuze. Construit à partir de 1564, entouré de terres et de forêts, c'est un lieu chargé d'histoire inscrit à l'inventaire des monuments historiques. Le château de Romécourt est de style renaissance. Des tourelles battent les entrées. Les briques et les tuiles qui ont servi à la construction ont été cuites sur place. Une chapelle castrale remplace l'une des tourelles. Elle fut construite en même temps que l'ensemble des bâtiments à la fin du XVIe siècle. Un des vitraux représente Saint-Louis et Hugues de Martimprey qui accompagna le roi aux croisades. Depuis 1698, la chapelle castrale a servi de sépulture à la famille de Martimprey de Romécourt. Le parc à l'anglaise qui entoure le château vous invite au calme et au repos. Il fut planté en 1860. De chaque côté, des gorges creusées pour extraire la terre nécessaire à la fabrication des briques et des tuiles qui ont servi à construire le château. L'une d'elles se termine par un petit étang.","architecture":"ROMECOURT, attribuées à Michel l'Enfant, qui y fit construire le château de Romécourt au XVIe siècle. Le château de Romécourt date du XVIe siècle, avec sa chapelle, sa demeure fortifiée de 4 tours d'angle, sa façade et son puits, et les décorations des 2 portes et de la porte de la maison d'habitation. Éléments protégés MH,  le château de Romécourt a été inscrit aux M.H, les façades y compris le puits qui y est adossé et les toitures, à l'exception de celles des bâtiments modernes (écuries, grange et remise) : inscription par arrêté du 28 décembre 1976.","habitants":"Famille de Martimprey de Romécourt\"","divers":"Château de Romécourt  à   Azoudange                                                48° 42' 48,6\" Nord, 6° 49' 55,2\" Est","gps":"","images":["../image/image_57/57_Rom%c3%a9court_1.jpg","../image/image_57/57_Rom%c3%a9court_2.jpg","../image/image_57/57_Rom%c3%a9court_3.jpg","../image/image_57/57_Rom%c3%a9court_4.jpg","../image/image_57/57_Rom%c3%a9court_5.jpg"]},"Consult_chateau_formulaire9a7c":{"id":"Consult_chateau_formulaire9a7c","dept":"57","canton":"Yutz","commune":"Roussy-le-village","nom":"Roussy_Comte","type":"Château","periode":"XII-XVI-XVIII","histoire":"ROUSSY,  ensemble de deux châteaux: Roussy-Comté et Roussy-Seigneurie, le château de Roussy-Comté cité dès 1131. Ensemble de différentes époques de la fin du XVe au milieu du XVIIIe siècle.  Le château de Roussy-Seigneurie reconstruit au XIIIe siècle dont subsiste la tour sud, dite le donjon ; des courtines et deux tours Est et deux tours ouest, écrêtées, reconstruites au XIVe siècle; le logis en partie repercé est adossé à la courtine ouest au XVIe siècle ; portail d'entrée dans la courtine nord et un  puits construits au XVIIIe siècle.","architecture":"ROUSSY, la construction de Roussy-le-Bourg date du Ve, XVIe et XVIIIe siècle. Il existait autrefois deux châteaux : Roussy-Comté et Roussy-Seigneurie, était formé de trois corps en U, sur un plan trapézoïdal. Ensemble de différentes époques de la fin du XVe au milieu du XVIIIe siècle. La terre de Roussy, autrefois comté, devint en 1287 un apanage de la branche de Luxembourg-Ligny. Elle fut de nouveau érigée en comté par Charles V roi de France en 1367, afin de récompenser les services de la maison de Luxembourg. En 1701, Roussy-le-Bourg était encore le siège d'une seigneurie. Il est privé et fermé au public.                                                        Éléments protégés MH : château de Roussy-Seigneurie,  façades et toitures, tours, donjon, murs de soutènement, portail d'entrée, puits dans la cour, caves voûtées, escaliers à l'italienne et cheminée de la cuisine au rez-de-chaussée du logis: inscription par arrêté du 13 février 1997: inscription par arrêté du 16 novembre 1988.","habitants":"Seigneurs de la branche de Luxembourg-Ligny\"","divers":"Châteaux de  Roussy_Comte                             49° 27' 9,79\" Nord, 6° 11' 33,6\" Est","gps":"","images":["../image/image_57/57_Roussy_Comte_1.jpg","../image/image_57/57_Roussy_Comte_2.jpg","../image/image_57/57_Roussy_Comte_3.jpg","../image/image_57/57_Roussy_Comte_4.jpg","../image/image_57/57_Roussy_Comte_5.jpg","../image/image_57/57_Roussy_Comte_6.jpg"]},"Consult_chateau_formulairec42e":{"id":"Consult_chateau_formulairec42e","dept":"57","canton":"Fameck","commune":"Fameck","nom":"Rémelange","type":"Château","periode":"XVI-XVII","histoire":"REMELANGE, pendant des siècles, Rémelange a constitué une pointe avancée du Barrois, enfoncée au flanc des territoires du Duché de Luxembourg, seigneurie de Florange et prévôté de Thionville. Cette situation s'est prolongée bien au-delà du rattachement de Thionville au royaume de France en 1659. Le petit manoir de Rémelange, construit probablement à la fin du XVIe siècle, doit à cette inconfortable situation historique d'avoir conservé un caractère d'ouvrage défensif, à peine atténué par les grâces d'une décoration encore Renaissance. Il se présente comme un quadrilatère massif flanqué à son angle nord-est et à son angle sud-ouest par deux lourdes tours carrées comportant un étage de plus que le corps principal. Les fenêtres ont conservé leurs meneaux de pierre, doubles sur la façade principale, simples ailleurs. Le portail d'entrée présente une décoration sculptée élégante. La porte d'accès à la cave est entourée d'un curieux encadrement de pierres à bossage. Le château est connu localement sous le nom de \"château des Moines\" pour des raisons mal déterminées.","architecture":"REMELANGE, les origines du château de Rémelange restent obscures. Une légende raconte quil aurait appartenu aux Templiers qui menaient mauvaise vie avec les nonnes installées dans le prieuré de Morlange grâce à un souterrain reliant le château au Prieuré. Ils auraient été tous massacrés par le duc de Bar, excepté labbesse qui se précipita elle-même dans un puits avec son enfant et le trésor du couvent. Cest en 1716 que le château est désigné comme tel dans les registres paroissiaux, comme appartenant à la famille Kilbourg dénommée plus tard Kilberger. Le domaine devient propriété de labbaye de Justemont en 1735.  Propriété de Wendel après la première guerre mondiale, il fut racheté en 1969 par Gilbert Auburtin, lui évitant ainsi de rester à labandon. Il est aujourdhui en partie transformé en logements dhabitation.","habitants":"seigneurs locaux\"","divers":"Château de Rémelange à Fameck","gps":"","images":["../image/image_57/57_R%c3%a9melange_1.jpg","../image/image_57/57_R%c3%a9melange_2.jpg","../image/image_57/57_R%c3%a9melange_3.jpg"]},"Consult_chateau_formulaire809c":{"id":"Consult_chateau_formulaire809c","dept":"57","canton":"Sarrebourg","commune":"Oberstinzel","nom":"Sarreck","type":"Château","periode":"XVI","histoire":"SARRECK, En 1381, les habitants de Sarrebourg brûlèrent et détruisirent la maison-forte du comte Henri de la Petite-Pierre. Ainsi en 1526, Frédéric de Lutzelbourg prit possession de toute la seigneurie et du château qui revinrent en 1649 à la famille de Custine, par suite du mariage d'Anne-Suzanne de Lutzelbourg avec Philippe de Custine, seigneur de Guermenge. Sarreck resta aux mains de cette famille jusqu'à la Révolution. Le château, reconstruit au XVIe siècle, fut partiellement détruit durant la guerre de trente ans. Il fut restauré au XVIIIe siècle par le baron de Bande, marié à Théodora  de Custine, qui résida à Sarreck vers 1720. Vendu comme bien national, le château fut acquis par François Barrabino.  Au XVIe siècle, la seigneurie relevait de Frédéric de Lutzelbourg. Le château de Sarreck actuel remonte au XVIe siècle.  Le nouveau château de Sarreck fut reconstruit au XVIe siècle, partiellement détruit, durant la guerre de trente ans, puis restauré, au XVIIIe siècle par le baron de Bande, il appartient aux propriétaire actuels, les descendants d'Alexandre Hertz, notaire et conseiller général à Sarrebourg. Le plus illustre propriétaire fut le général Adam Philippe de Custine, commandant de l'armée du Rhin, qui fut guillotiné, en 1793. La Tour-Porche date du XVIe siècle. Le château de Sarreck est devenu un hôtel-restaurant.","architecture":"SARRECK, en face du château actuel qui remonte au XVIe siècle avec des transformations au XVIIIe siècle, une ruine sur les hauteurs indiquerait l'emplacement du château primitif, attesté au XIVe siècle mais sans doute plus ancien et partagé alors en deux parties, l'une relevant des évêques de Metz, laissée en fief aux comtes de la Petite-Pierre et l'autre appartenant à la famille de Lichtenberg,   isolé au milieu de ses terres, se présente comme un long bâtiment de plan curviligne, les corps s'articulant autour de la tour-porche du XVIe siècle. Etroite, de plan rectangulaire, elle est couverte d'une très haute toiture à croupe de tuiles en écaille et percée d'une porte cochère et d'une porte piétonne en plein cintre et, au second niveau, de deux fenêtres à meneau, toutes ces ouvertures encadrées de doubles canonnières rondes à redents qui défendaient l'accès du pont-levis. A gauche de la tour-porche, un haut corps de bâtiment de plan rectangulaire, à toit à deux versants et à quatre niveaux de fenêtres à linteau en arc segmentaire, a sans doute été reconstruit au début du XVIIIe siècle. A droite, de la même époque que la tour-porche, un long corps de plan curviligne flanqué au milieu de la façade principale d'une tour ronde demi-hors-oeuvre à toit conique d'ardoise, n'a que deux niveaux de fenêtres à meneau et contraste avec les hauts volumes des autres corps. Au nord, le colombier de plan carré, à toit en pavillon, se dresse au milieu de la cour de la ferme.","habitants":"Famille de Lichtenberg\"","divers":"Château de Sarreck à  Oberstinzel                                               : 48° 47' 36\" Nord, 7° 02' 06\" Est","gps":"","images":["../image/image_57/57_Sarreck_1.jpg"]},"Consult_chateau_formulaire37fa":{"id":"Consult_chateau_formulaire37fa","dept":"57","canton":"Bitche","commune":"Schmittviller","nom":"Schmittviller","type":"Château","periode":"XVII-XVIII","histoire":"SCHMITTVILLER,  dit Hochberg  a été construit à partir de 1726 par Jacques Natte, maître maçon à Bitche, attribution par source  aux frais de Jean Friderich de Dithmar, qui était receveur des finances de son altesse royale à Bitche, seigneur de Schmittviller et de Dithmar, en faveur duquel les terres avaient été érigées en fief en 1723. Les pierres de taille ont été fournies par les carrières de Rahling, les parties agricoles sont de la même époque.  Le village est mentionné au XIe siècle sous la forme Smithwilre, du nom d'homme germanique Schmitt et du substantif villare, weyler, le village. À la fin du XVIIe siècle, il ne s'agit d'une simple ferme qui sera érigée en fief en 1723 pour Jean-Frédéric de Dithmar, receveur des finances du duc de Lorraine. C'est autour de cette exploitation que le village se développera. Le château est construit à partir de 1726 par un maçon tyrolien établi à Bitche, Jacques Nat, pour Jean-Frédéric de Dithmar.  Du point de vue spirituel, le village est succursale de la paroisse de Rahling jusqu'en 1837, tout d'abord dans l'archiprêtré de Bouquenom puis dans celui de Rohrbach-lès-Bitche en 1802. L'église, dédiée à l'assomption de la vierge Marie, remplace depuis 1866 une petite chapelle élevée en 1821.","architecture":"SCHMITTVILLER, le château, construit à partir de 1726 aux frais de Jean Friderich de Dithmar (receveur des finances de son altesse royale à Bitche, seigneur de Schmittviller et de Dithmar, en faveur duquel les terres avaient été érigées en fief en 1723). Élévation en travées, un  sous-sol ; un étage carré, escalier dans-oeuvre : escalier tournant à retours,  à  toit à longs pans ; croupe ; demi-croupe, couvert de tuile plate et de tuile mécanique.  Les pierres de taille ont été fournies par les carrières de Rahling, parties agricoles de la même époque.","habitants":"Famille de Jean-Frédéric de Dithmar\"","divers":"Château de   Schmittviller                                                        49° 00' 27? N, 7° 10' 56? Est","gps":"","images":["../image/image_57/57_Schmittviller_1.jpg"]},"Consult_chateau_formulaire3c3b":{"id":"Consult_chateau_formulaire3c3b","dept":"57","canton":"Bouzonville","commune":"Sierck_les_Bains","nom":"Sierck_les_Bains","type":"citadelle","periode":"XII-XV-XVII","histoire":"Deux châteaux dans cet article, Sierck et Rudlingen.                                                    SIERCK , la tradition veut qu'il ait été construit sur les restes d'un castel gallo-romain. Le château existait déjà au XIe siècle, comme le montre un acte du Duc de Lorraine Gérard d'Alsace (1048-1070) fait au château, daté de 1067 et des pièces de monnaies frappées à Sierck sous le règne de ce même duc. ce château fut une des résidences favorites des ducs de Lorraine, dès le début, ils y séjournèrent fréquemment avec leur cour. Ce fut le cas notamment de Gérard d'Alsace (1048-1070) de Mathieu II (1220-1251). On y vit aussi Jean Ier (1346-1390) en l'honneur duquel la tradition affirme que l'on faisait descendre une roue enflammée du sommet du Stromberg lors de la Saint-Jean, puis Charles II (1390-1431) dont l'épouse Marguerite de Bavière fonda l'hôpital de Sierck et fit venir à Marienfloss le Père Adolf d'Essen inventeur du rosaire, ou encore Charles IV (1624-1675), qui y résida plusieurs années avec sa cour. Le château fut à plusieurs fois assiégé, résistant victorieusement lorsque les ducs y résidaient (en 1131 avec le duc Simon Ier, avec le duc Antoine le Bon en 1516) mais succombant en leur absence (en 1475 face à Charles le Téméraire, en 1633 face aux français.). La ville et son château furent officiellement intégrés au royaume de France par le traité de Vincennes en 1661. Le château perdit sa fonction résidentielle et fut ravalé au rang de place forte aux frontières du royaume.","architecture":"SiERCK, de ce XIe siècle, constamment réaménagé pour s'adapter au progrès de la poliorcétique (apparition de l'artillerie), ce château, en son état actuel, remonte à la fin du XVe siècle, et comporte des bâtiments ajoutés au XVIIIe siècle, En 1673 sa mise en état de défense étant jugée trop coûteuse, il fut désarmé et démantelé sour ordre de Louvois, secrétaire d'Etat à la guerre de Louis XIV, les bâtiments furent en quasi totalité détruits et les tours furent arasées. Après avoir contraint le duc de Malbourough, qui avait établi son quartier général au château de Manderen, à la retraite en 1705, le maréchal de Villars conscient de l'importance stratégique de la place, ordonna des travaux pour remettre le château de Sierck en état de défense. Il fut de nouveau désarmé en 1713, en exécution du traité d'Utrecht, qui mit fin à la guerre de succession d'Espagne. De 1733 à 1752 le château fut progressivement restauré sous l'impulsion du maréchal de Belle-Isle, gouverneur de la province des Trois-Evêchés. En 1811, jugé sans importance, il fut vendu au profit du trésor. En 1814, le château devint la propriété de la ville de Sierck les Bains, éléments protégés MH : les ruines du château et les fortifications : classement par journal officiel du 16 février 1930.\nRUDLINGEN c'était au départ, un château de vin romain, muni d'un clocher de guette pour annoncer le passage  sur la route de Trèves à Thionville. Puis, il devint en 1282 une propriété des seigneurs de Sierck. Bâti dans sa splendeur actuelle à la fin du XVIIIe siècle, le château de Rudlingen a beaucoup souffert des deux guerres mondiales du fait de sa proximité avec les frontières Allemande et Luxembourgeoise. Situé sur la commune de Sierck-les-Bains et sur la rive gauche de la Moselle, le château reste utilisé comme résidence privée. Le domaine quant à lui arrive jusqu'à la frontière Luxembourgeoise et est composé de plusieurs hectares de forêt, de vergers, et des jardins qui entourent le château.","habitants":"Seigneurs locaux\"","divers":"dans cet article,citadelle de  Sierck grav 1 à 6  et Rudlingen grav-7-8-9                                      Rudlingen   49° 27' 08\" Nord, 6° 22' 08\" Est","gps":"","images":["../image/image_57/57_Sierck_les_Bains_1.jpg","../image/image_57/57_Sierck_les_Bains_2.jpg","../image/image_57/57_Sierck_les_Bains_3.jpg","../image/image_57/57_Sierck_les_Bains_4.jpg","../image/image_57/57_Sierck_les_Bains_5.jpg","../image/image_57/57_Sierck_les_Bains_6.jpg","../image/image_57/57_Sierck_les_Bains_7.jpg","../image/image_57/57_Sierck_les_Bains_8.jpg","../image/image_57/57_Sierck_les_Bains_9.jpg"]},"Consult_chateau_formulaire8b5d-2":{"id":"Consult_chateau_formulaire8b5d-2","dept":"57","canton":"Bitche","commune":"Mouterhouse","nom":"Sonis","type":"Château","periode":"XVIII","histoire":"SONIS dit aussi de Wasserburg est construit en 1830 au lieu-dit Altschmelz (ou Vieille-Fonderie), à proximité des ruines de la fonderie de lAltschmelz, alors abandonnée et dont il ne subsiste plus aujourdhui que les vestiges des vannes et les bâtiments de la fonderie ou bien du marteau à castine. Son commanditaire est Pierre René Orono de Sonis, propriétaire de la société des forges et usines de Mouterhouse, qui a aussi à son actif la rénovation de la chapelle Notre-Dame de-la-Miséricorde, datant de 1504. A noter que dans ce village subsistent deux château ruinés: le château du Wasserburg construit en 1505 pour Reinhard, comte de Deux-Ponts-Bitche, situé au bord du ruisseau de la Moderbach. Il est détruit en 1633 par les troupes suédoises durant la guerre de Trente Ans et le château du Hohe Weyersberg, lui aussi en ruines, il sagissait dun château de chasse, édifié en 1560 pour le comte Jacques de Deux-Ponts Bitche, sur la colline de Grünberg.","architecture":"SONIS, cet ancien château fort fut construit, en 1505, Il est de style Médiéval. Lors de la guerre de trente ans, en 1633, le château de Mouterhouse fut détruit par les suédois. Les vestiges d'une tour polygonale et de la courtine ont été abattus en 1944. Les décombres servirent de carrière de pierres, après la guerre, lors des reconstructions. La pierre de fondation du château de Mouterhouse, datée 1505, fut ré-employée dans le mur Ouest de la chapelle Notre-Dame-de-la-Miséricorde. Les vestiges du château de Mouterhouse se situent, au lieu-dit Kapellenhof. Les ruines de Mouterhouse.  La construction du nouveau château de Sonis date de 1830. C'est une ancienne demeure bourgeoise. Pierre René Orono de Sonis, propriétaire de la société anonyme des forges et usines de Mouterhouse, fut le responsable de la construction du château de Sonis. Le château de Sonis était une ancienne demeure bourgeoise. Le château de Sonis est, depuis, privé, fermé au public.","habitants":"Famille dePierre René Orono de Sonis,\"","divers":"Château de Sonis : 48° 59' 03\" Nord, 7° 26' 45\" Est                                                     NouveauPS : 48° 59' 26\" Nord, 7° 24' 59\" Est","gps":"","images":["../image/image_57/57_Sonis_1.jpg"]},"Consult_chateau_formulaireb51b":{"id":"Consult_chateau_formulaireb51b","dept":"57","canton":"Saint-Avold","commune":"Saint Avold","nom":"St_Avold","type":"Château","periode":"XVI-XVII","histoire":"ST-AVOLD, une tradition locale attribue la construction du château actuel entre 1653 et 1658, à la princesse Henriette de Lorraine, soeur du duc de Lorraine Charles IV et dame de Hombourg-Saint-Avold. Cette attribution est très douteuse; l'architecture même de ce château est du XVIIIe siècle et construit sans doute pour les comtes de Hennin. Acquis début XIXe siècle par le général Kister, c'est en effet, en 1809 que le baron Kister, alors à l'armée d'Allemagne et son épouse, Madeleine Mathieu, demeurant à Metz, achetèrent à Rodolphe Spinga, la maison leur appartenant par indivis en tant qu'enfants de Nicolas Spinga,  propriété de la commune,  Il fut vendu en 1873 au département, et transformé ensuite en établissement d'enseignement, il abrite l'hôtel de ville depuis 1965.","architecture":"HENRIETTE; la construction  date du début du XVIIIe siècle, pour les comtes de Hennin.  En 1873, le château d'Henriette de Lorraine fut revendu au département. Puis il fut transformé en un établissement d'enseignement. Le château accueille, depuis 1965, la mairie de Saint-Avold. Il comportait, au rez-de-chaussée, une ancienne chapelle, ancien notaire à Saint-Avold, et connue sous le nom de château, rue des Charrons entre le sieur Bidau et la veuve Gayot, et la chaussée allant à Sarrelibre (Sarrelouis) avec les bâtiments attenants, cour, écuries, remises et un jardin derrière pour 18000 livres tournois.                                                                    VALMONT au sud ouest date du XIe, XVe et XVIe siècle. Le château de Valmont de la Famille d'Estouteville, comporte un donjon XIe siècle et une aile de style Renaissance. Ce château imposant a connu de nombreuses transformations et de nombreux propriétaires dont les Grimaldi de Monaco et les Barbet de Rouen. Le château de Valmont est une propriété privée. Seul son grand parc est ouvert au public. Le château de Valmont est inscrit aux M.H. en 1930 et a été classé aux M.H. le 30/03/1976.","habitants":"princesse Henriette de Lorraine\"","divers":"Château à St-Avold                                                                                           GPS : 49° 06' 13\" Nord, 6° 42' 29\" Est                                               Valmont    GPS : 49° 44' 27,24\" Nord, 0° 30' 48,96\" Est      Henriette grav-4","gps":"49° 06' 13\" Nord, 6° 42' 29\" Est","images":["../image/image_57/57_St_Avold_1.jpg","../image/image_57/57_St_Avold_2.jpg","../image/image_57/57_St_Avold_3.jpg","../image/image_57/57_St_Avold_4.jpg"]},"Consult_chateau_formulaire9bae":{"id":"Consult_chateau_formulaire9bae","dept":"57","canton":"Les Saulnois","commune":"Saint-Epvre","nom":"St_Epvre","type":"Château","periode":"XVII-XVIII","histoire":"St-EPVRE, la seigneurie appartenait au XVIIe siècle aux familles de Villers, d'Herbin et de Brunel. Cette dernière la possédait encore au XVIIIe siècle. Le château échut au début du XIXe siècle à Jean-Baptiste-Henri, marquis de Marguerie, maréchal de camp, par son mariage avec Françoise-Appoline du Buat, et après 1861 à son fils Anne-Bon-Henry, marquis de Marguerie, mais il fut incendié vers 1890. Comme il n'était plus très habitable, Henri-Maurice, comte de Marguerie, commença vers 1887,  la construction d'un nouveau château resté propriété de la famille de Marguerie jusqu'en 1947.","architecture":"St-EPVRE,  Saint-Epvre En 1681, Jacques d'Herbin fit hommage au roi pour le château de Saint-Epvre. Traces de l'ancien château de Saint-Epvre. Incendié vers 1890, les bâtiments restants furent transformés en ferme qui brûla en 1911. Nouveau château du XIXe siècle, l'ancien château n'était plus habitable. Le comte Henri-Maurice de Marguerie en fit construire un nouveau vers 1887 à trois niveaux de neuf travées.\nde l'ancien château du XVIIe siècle, construit au nord du bourg, il ne subsiste plus que les deux corps en équerre. Le nouveau château construit à la fin du XIXe siècle est situé au sud-est du village. La façade principale, d'ordonnance symétrique à trois niveaux de neuf travées dont un niveau de combles, est encadrée par deux hautes tours circulaires à toits d'ardoise coniques. Sur la façade postérieure, plusieurs corps de formes et de volumes différents ont été accolés par la suite.","habitants":"Famille de Villers\"","divers":"Château de Saint-Epvre à Saint-Epvre                                                    \n48° 58' 29? nord, 6° 26' 17? est","gps":"","images":["../image/image_57/57_St_Epvre_1.jpg","../image/image_57/57_St_Epvre_2.jpg"]},"Consult_chateau_formulairec7cd":{"id":"Consult_chateau_formulairec7cd","dept":"57","canton":"Bouzonville","commune":"Friestroff","nom":"ST_Sixte_Moselle","type":"Château","periode":"XV-XVI","histoire":"SAINT-SIXTE, au XIIe siècle  la construction  est luvre de Wirich de Valcourt. Freistroff appartient en 1457 à Fulko dEllentz qui testamenta en faveur dHenri de Varsberg, son gendre. En 1493, laîné des fils dHenri, Guillaume reprend en plus du château les droits de haute justice sur son fief. Vers 1513, son frère Jean et les enfants de son autre frère Henri se partagent le château. La demeure échoit en 1527 à Jean II de Varsberg.  Resta dans la famille jusquen 1629, date à laquelle Samson II de Varsberg, ayant de grosses difficultés financières, dut vendre la seigneurie de Freistroff au couvent de Mettlach. En 1665, Jean-Edmond de Bassenheim, conseiller de lélecteur palatin, prit la moitié du château en fief du duc de Lorraine. Lui succéda, en 1671, Jean Simon, officier du baron de Koenigsfeld, qui perdit à son tour la moitié de la seigneurie de Freistroff pour dettes. Cette moitié du château échut ensuite à lun de ses créanciers puis à diverses personnes jusquà ce quelle soit occupée par une compagnie de fusiliers français (1678 à 1697). Lautre moitié de la seigneurie était partagée entre les descendants de Marguerite de Varsberg. Une part de cette moitié échut ensuite à la famille de Stromberg, et une autre à la famille de Liebenstein. Frédéric Ernst dEltz, seigneur de château-Rouge, acquit  la seigneurie de Freistroff en commençant par prendre la part des Liebenstein, puis celle des Stromberg après 1673, dans des circonstances encore maintenant inconnues. Peu après 1697, il entra également en possession de lautre moitié, lancienne part des Varsberg, et de nouveau, comme au XVe siècle, la seigneurie était réunie. A sa mort en 1717, ses biens passèrent à sa petite-fille, Marie-Thérèse, qui épousa en 1747, Francois-Louis-Joseph de Schmittbourg ou Schmidtburg.","architecture":"SAINT-SIXTE; le mariage, selon la tradition, ne fut pas heureux en raison des prodigalités du baron de Schmittbourg qui menait grand train de vie, sa femme, devenue veuve, résida fréquemment à Freistroff jusquen 1792, période de la grande peur, où elle partit se réfugier à Heidelberg. Ses propriétés de Freistroff et de château-Rouge furent confisquées comme biens nationaux, fut ensuite vendu à son valet de chambre et à un certain Jean Cousin, receveur du château. Schideler, sans doute de connivence avec la baronne de Schmittbourg, racheta la part de ce dernier. La baronne put, en 1802, cest à dire sous Napoléon, rentrer en possession de son château que Schideler, devenu son intendant, lui revendit le 13 janvier 1802. En revanche, le château-Rouge ne lui fut pas restitué. Sa satisfaction fut de courte durée, car à peine six mois après la restitution de Freistroff, elle mourut le 15 juillet 1803. Son fils, dernier baron de Schmittbourg, hérita du château et sa fille fit mettre en vente ses biens. Le château fut adjugé à Louis Delhomme, régisseur, et sa famille resta propriétaire jusquen 1870. Il passa ensuite aux mains de plusieurs familles, Helstroffer, Rheinhart et à partir de 1919, les Wagner, Emmerich et Dalstein. Le 20 septembre 1986, la famille Gehl originaire de Falck, acquit le château de Saint Sixte et les terres. Les fils Dominique, Philippe et Luc entreprirent une vaste uvre de restauration. En septembre 2007 Philippe Gehl  rachète le château à ses deux frères et continue seul l'oeuvre commencée par son père 20 ans plus tôt.\nÉléments protégés MH : le château, y compris le sol des anciennes douves : classement par arrêté du 28 novembre 1991.","habitants":"Jean II de Varsberg                Baron Frédéric Ernst dEltz\"","divers":"Châteaude de St-Sixte à Friestroff                                                        : 49° 16' 28\" Nord, 6° 29' 20\" Est","gps":"","images":["../image/image_57/57_ST_Sixte_Moselle_1.jpg","../image/image_57/57_ST_Sixte_Moselle_2.jpg","../image/image_57/57_ST_Sixte_Moselle_3.jpg","../image/image_57/57_ST_Sixte_Moselle_4.jpg","../image/image_57/57_ST_Sixte_Moselle_5.jpg","../image/image_57/57_ST_Sixte_Moselle_6.jpg","../image/image_57/57_ST_Sixte_Moselle_7.jpg","../image/image_57/57_ST_Sixte_Moselle_8.jpg"]},"Consult_chateau_formulaire41e6":{"id":"Consult_chateau_formulaire41e6","dept":"57","canton":"Metz","commune":"Sécourt","nom":"Sécourt","type":"Vestiges","periode":"XIV-XV","histoire":"SECOURT, la seigneurie appartenait aux XIVe et XVe siècles à la famille messine Renguillon, qui la partagea à la fin du XVe siècle avec les Remiat, également bourgeois de Metz. Par le mariage, vers 1490, d'Alix Remiat avec Regnault de Gournay, la seigneurie passa à cette famille. Au XVIIIe siècle, la seigneurie revint aux Goulet de Montlibert, puis par mariage en 1765 à Jacques Foix de Candale, ancier officier. Sa veuve, Anne Goulet de Montlibert, fit don du château en 1813 à François-Benoît-Charles-Pantaléon Durand, ancien avocat général au parlement de Metz. Le château acheté aux héritiers Durand en 1852 par Gabriel-Auguste Prost, historien messin, membre de l'académie de Metz, passa par héritage à la fin du XIXe siècle à la famille de la Vernette.","architecture":"SECOURT, le château, qui a subit les outrages de ses derniers propriétaires, est un haut bâtiment de dimensions modestes, couvert d'un toit à croupes. Un autre corps semblable mais de taille réduite, couvert de tuiles en écaille, est placé en équerre sur l'angle droit de la façade postérieure et une tourelle d'escalier ronde occupe l'angle nord-est.","habitants":"Famille de Renguillon\"","divers":"Vestiges de Sécourt à sécourt\n48° 56' 53? nord, 6° 17' 08? es","gps":"","images":["../image/image_57/57_S%c3%a9court_1.jpg","../image/image_57/57_S%c3%a9court_2.jpg"]},"Consult_chateau_formulaire98d1":{"id":"Consult_chateau_formulaire98d1","dept":"57","canton":"Thionville","commune":"Thionville","nom":"Thionville","type":"Château","periode":"XII-XIV","histoire":"Deux châteaux dans cet article; Thionville et l'hôtel de ville.                   THIONVILLE, se compose de deux tours ainsi qu'un porche qui les réunit. Il a été construit au XVe siècle et reconstruit au XVIIIe siècle. le secteur de la cour du château semble correspondre à l'emplacement d'un domaine carolingien, cité en 770, où séjournèrent Charlemagne et ses successeurs.  Au Xe siècle, Thionville passe sous domination des comtes de Luxembourg qui bâtirent un château fort au même endroit.  Comprenant des granges pour stocker les redevances du domaine comtal le château devient à partir de 1292 la résidence du prévôt. Au    début du XVe siècle, des familles nobles obtiennent le droit de se bâtir une demeure à l'intérieur de l'enceinte. Entre 1542 et 1558, des travaux de remparage effectués pour la cour de Bruxelles, sous le contrôle d'Adam de Volkrange afin de moderniser la place, aboutissent à la destruction d'une partie des courtines et d'une partie des bâtiments qui sont ensevelis sous les terrassements. En 1903, les travaux de démolition des fortifications mettent en valeur \"la tour aux Puces\" qui est dégagée de ses constructions annexes. Seules subsistent les tours jumelles et une tour derrière le tribunal : rez-de-chaussée des tours jumelles voûté en berceau (passage et tours), le corps central couvert d'une toiture à longs pans en croupe et des tours couvertes de toits polygonaux. Éléments protégés MH : les façades des deux tours d'entrée, ainsi que le porche qui les réunit : inscription par arrêté du 27 mai 1980.propriété de la commune.                                                                                                                      LHOTEL  DE VILLE : il prend pour origine un couvent érigé par les Clarisses au XVIIe siècle. Larchitecture du lieu marquée par une haute toiture recouverte dardoises dotées de lucarnes singulières caractérise linfluence luxembourgeoise. En 1803, lancien couvent devient lhôpital civil de Thionville pour devenir en 1899  la mairie.","architecture":"THIONVILLE, la construction de la Tour aux Puces date du XIIe siècle. C'est l'ancien donjon du château féodal, tour polygonale à 14 côtés, édifiée aux XIe et XIIe siècles, en constituait  le donjon,  est l'ancien donjon du château des comtes puis des ducs du Luxembourg qui occupe l'emplacement d'un palatium carolingien cité, au milieu du XVIIIie siècle, et détruit au XXe siècle. La tour aux puces est le plus ancien monument de Thionville.  Après avoir été rénovée, la tour abrite, aujourd'hui, le musée municipal de Thionville. La tour aux puces est un cadeau des comtes luxembourgeois. On peut encore voir, du côté Nord-Est, les fondations de sa première construction, qui date environ de l'an 1100. Elle a été en partie démolie, puis reconstruite à l'aide de pierres issues de décombres d'autres maisons. Une légende dit qu'il y avait une pièce secrète qui n'a jamais été retrouvée. Une autre légende dit qu'une erreur de relecture ou de traduction du Luxembourgeois au Français a donné son nom à la tour, qui a longtemps fait travailler l'imagination des habitants des alentours de Thionville. La princesse (dont on n'a jamais su le prénom) aurait eu seulement quatorze ans lorsqu'elle fut emprisonnée dans le cachot, et fut dévorée par des milliers de puces féroces. Les seules choses qui sont restées intactes sont les cheveux et les dents de la princesse, qui furent conservés par le musée de la Tour aux puces. Le musée est ouvert au public et se visite.","habitants":"Famille d'Adam de Volkrange\"","divers":"Château à Thionville                            Mairie grav-1                               Tour  grav-2-3-4-5                               49° 21' 29\" Nord, 6° 10' 09\" Est                                                   Château grav-6 49° 21' 29? nord, 6° 10' 07? est","gps":"","images":["../image/image_57/57_Thionville_1.jpg","../image/image_57/57_Thionville_2.jpg","../image/image_57/57_Thionville_3.jpg","../image/image_57/57_Thionville_4.jpg","../image/image_57/57_Thionville_5.jpg","../image/image_57/57_Thionville_6.jpg","../image/image_57/57_Thionville_7.jpg"]},"Consult_chateau_formulaire2fa8":{"id":"Consult_chateau_formulaire2fa8","dept":"57","canton":"Thionville","commune":"Thionville","nom":"Thionville_environ","type":"Château","periode":"XVIII-XIX","histoire":"Trois châteaux dans cet article; Guenange, Oeutrange et Nilvange. GUENANGE,  au sud de Thionville à 10 KM; Le puits date du XVIe siècle ; le château a été construit au XVIIIe siècle ; les baies du premier étage de la façade postérieure ont été repercées au XIXe siècle. L'édifice se compose d'un étage carré et un sous-sol, le gros-oeuvre : calcaire; moellon; moellon sans chaîne en pierre de taille; enduit, élévation à travées surmontée de toit à longs pans; croupe; flèche carrée, recouverts d'ardoise. Éléments protégés MH : les façades et les toitures des deux pavillons d'angle du parc : inscription par arrêté du 26 décembre 1980.                                                                                                                      OEUTRANGE, Jean Elminger ou Helminger, notaire à Thionville en 1696, est désigné comme seigneur d'Oeutrange. Son habitation est une modeste gentilhommière rurale d'un étage sur rez-de-chaussée, de plan très irrégulier, probablement à cause de démolitions successives. La façade nord comporte trois fenêtres à l'étage, alors que le rez-de-chaussée s'ouvre par quatre fenêtres encadrant la porte d'entrée centrale. La façade sud a sept fenêtres identiques sur deux niveaux. Toutes les ouvertures comportent des encadrements de pierre à clefs supérieures; le reste des surfaces est crépi. Les très importants communs, surmontés par un pigeonnier, sont contemporains du château. Le mur d'enceinte du parc est coupé d'élégants portails à grille de fer forgé et à encadrement de pierre soigneusement taillée. Le portail de l'entrée principale, en anse de panier, est soutenu par deux colonnes de pierres élégamment appareillées.","architecture":"à l'ouest de Thionvlle NILVANGE: fut la demeure des directeurs successifs de la société métallurgique de Knutange. Le parc, dun hectare et demi, présente, avec ses trois cents arbres et une centaine darbustes, une belle collection botanique et une large palette de végétaux, à l'ouest de Thionvlle.  fut la demeure des directeurs successifs de la société métallurgique de Knutange. Un beau jardin a été aménagé au moment de la construction des bâtiments au début du XXe siècle, dans lesprit dun jardin à langlaise de la fin du siècle précédent. Le parc, dun hectare et demi, présente, avec ses trois cents arbres et une centaine darbustes, une belle collection botanique et une large palette de végétaux. Parmi les essences représentées: le Cèdre du Liban, lEpicéa du Colorado, plusieurs espèces de tilleul et dérable, en particulier lErable Negundo, rare en 1900 et, bien entendu, le magnolia. Vous admirerez le travail de ferronnerie au niveau des portails et de lentrée du château. Classé \"Jardin de France\" depuis 1992, ce parc abrite également un refuge de la Ligue de Protection des Oiseaux.","habitants":"Directeur industriels\"","divers":"dans cet article; Guenange grav 1, Oeutrange et Nilvange grav-2-3-4. Oeutrange 49° 24' nord, 6° 06' est","gps":"","images":["../image/image_57/57_Thionville_environ_1.jpg","../image/image_57/57_Thionville_environ_2.jpg","../image/image_57/57_Thionville_environ_3.jpg","../image/image_57/57_Thionville_environ_4.jpg"]},"Consult_chateau_formulaire2af7":{"id":"Consult_chateau_formulaire2af7","dept":"57","canton":"Courcelles-Chaussy","commune":"Courcelles-Chaussy","nom":"Urville","type":"Château","periode":"XV","histoire":"URVILLE,  l'édifice est acquis en 1876 par Romain Sendret, industriel corroyeur à Saint Julien-lès-Metz, un des plus importants fournisseurs de l'armée française. De 1890 à 1918 Urville est surtout connu pour avoir été propriété de l'Empereur Allemand Guillaume II. Une campagne de restauration débute en 1891, l'extérieur s'orne des armes impériales et l'intérieur est remanié et entièrement remeublé. Il accueillera d'illustres invités comme les généraux Schlieffen chef de l'Etat Major, Gosseler ministre de la guerre, les spécialistes des forteresses Falkenhausen et von der Goltz, en 1908 l'archiduc François-Ferdinand est reçu à Urville. Classé en 1926, le parc devient en 1948 propriété du ministère de l'agriculture.","architecture":"URVILLE, le château d'Urville fut construit au XVe siècle, on peut encore voir deux vestiges témoins de ce premier bâtiment, le colombier sur arcades muni d'archères canonnières, architecture rare dans la région, et une taque de cheminée, datant de 1577, aux armoiries de Créhange et de Raville.","habitants":"Famille de Romain Sendret\"","divers":"Château d' Urville à  Courcelles-Chaussy                                            49° 06' 11? N, 6° 09' 29? Est","gps":"","images":["../image/image_57/57_Urville_1.jpg","../image/image_57/57_Urville_2.jpg","../image/image_57/57_Urville_3.jpg"]},"Consult_chateau_formulairee8fe":{"id":"Consult_chateau_formulairee8fe","dept":"57","canton":"Sarregueminnes","commune":"Sarregueminnes","nom":"Utzschneider","type":"Château","periode":"XIX","histoire":"UTZSCHNEIDER, abrite aujourd'hui la communauté d'agglomération Sarreguemines confluences, est un exemple typique de l'architecture de la fin du XIXe siècle et du début du XXe siècle. Il s'agit d'un \"château industriel\". Cette villa et ses dépendances bâties dans le quartier de Neunkirch impressionnent par leur taille et leur physionomie. Les architectes Berninger et Krafft de Strasbourg, issus de l'école d'architecture de Stuttgart employaient volontiers l'assymétrie. Les colonnes néorenaissance à l'entrée et les pignons triangulaires s'associent harmonieusement aux formes médiévales des tourelles et à l'emploi des pierres de taille. Les architectes ont construit cette maison en 1906 pour la veuve Utzschneider, mais la famille n'occupa cette résidence que pendant 33 ans. Entre 1940 et 1944, le bâtiment fut occupé par les nazis. Il servit ensuite de quartier aux américains à la Libération en 44-45. Puis la propriété resta longtemps délaissée jusqu'à ce que H. Pierron fasse l'acquisition des écuries et du château en 56-58 pour ses équipements scientifiques et scolaires. En 1983, l'entreprise déménagea sur la zone industrirelle et la villa fut de nouveau laissée à l'abandon, jusqu'à ce qu'elle soit rachetée par le district de Sarreguemines au début des années 90. Aujourd'hui le bâtiment principal et ses annexes ont été agréablement rénovés et restaurés, le parc réamenagé, offrant ainsi un cadre adéquat pour la communauté d'agglomération. Le parc est accessible à toute heure aux promeneurs.","architecture":"UTZSCHNEIDER,  illustrant la richesse industrielle de la famille Utzschneider, ce château, achevé en 1906, fait référence à plusieurs styles. Si linspiration de la Renaissance italienne domine avec lutilisation des fenêtres à meneaux et lescalier du hall dhonneur ; lassociation de la brique, de la pierre et de lardoise fait plutôt penser à larchitecture française du début du XVIIe siècle. Mais ce qui rend ce bâtiment exceptionnel, cest sa façade avant. En effet, les architectes Berninger et Krafft de Strasbourg, issus de l'école d'architecture de Stuttgart, employaient volontiers l'assymétrie. Lavant et larrière ont été inversés probablement pour que les réceptions puissent se faire à l'abri des regards, à larrière du bâtiment, qui dévoile la plus belle façade. Occupé par les nazis durant la seconde guerre mondiale, ce bâtiment, longtemps resté à labandon, abrite aujourdhui lhôtel de la communauté dagglomération Sarreguemines-Confluences.","habitants":"Famille Utzschneider\"","divers":"Château d' Utzschneider à   Sarregueminnes                                      49° 07' 05? nord, 7° 04' 56? est","gps":"","images":["../image/image_57/57_Utzschneider_1.jpg","../image/image_57/57_Utzschneider_2.jpg","../image/image_57/57_Utzschneider_3.jpg","../image/image_57/57_Utzschneider_4.jpg"]},"Consult_chateau_formulaire8bfd-2":{"id":"Consult_chateau_formulaire8bfd-2","dept":"57","canton":"Boulay-Moselle","commune":"Ham-Sous-Varsberg","nom":"Varsberg","type":"Château","periode":"XVI-XIX","histoire":"VARSBERG, du vieux château, il subsistait encore au XVIe siècle quelques bâtiments et jusqu'au début du XIXe siècle une tour. En revanche le \"nouveau château\" fut relevé par une branche des seigneurs de Varsberg remontant à Jean de Varsberg dit le grand chevalier au XIIIe siècle. Mais le château reconstruit modestement ne joua plus qu'un rôle secondaire. Au XVIe siècle les seigneurs de Varsberg, qui portent au XVIIe siècle le titre de barons de Varsberg, n'habitaient plus leur château, mais à Saarburg près de Trèves. Le château fut ruiné durant la guerre de trente ans. Le domaine resta néanmoins indivis à la famille des barons de Varsberg jusqu'en 1834 puis fut partagé. En 1843 les ruines du château furent achetées par l'avocat et écrivain messin Charles Stoffels. Celui-ci rebâtit sur l'emplacement de l'ancien château une nouvelle demeure confortable, qui passa ensuite à son gendre Louis-Paul-Ferdinand, marquis de Liniers. En février 1913, l'aile Est du château brûla, mais fut reconstruite la même année. Son fils Jacques, marquis de Liniers, le vendit en 1928. Il a depuis changé à plusieurs reprises de propriétaire. L'un d'eux le transforma en restaurant.","architecture":"VARSBERG,  de l'ancien château il ne subsiste plus qu'une grosse tour ronde au nord coiffée jusque vers 1945 d'un toit à bulbe, mais actuellement défiguré par l'addition d'une tour polygonale à toit crénelé. Il reste également la partie inférieure d'une autre tour ronde au sud, sur les débris de laquelle a été édifiée une chapelle néo-gothique en 1881, abritant les sépultures de la famille Stoffels-Liniers et abîmée durant la dernière guerre. Tout le corps de bâtiment en L date du XIXe siècle, sauf l'aile Est, refaite en 1913. Au-dessus du portail d'entrée du bâtiment Est, se trouvent les armoiries de la famille Liniers. Dans la cour un puits de 98 mètres creusé dans le roc remonte certainement au château médiéval. Du château bâti sur une hauteur dans un site pittoresque, on jouit d'une vue incomparable sur la grande forêt de la Warndt.","habitants":"Barons de Varsberg\"","divers":"Château de  Varsberg à Ham-Sous-Varsberg                                                49° 10' 14? N, 6° 37' 37? Est","gps":"","images":["../image/image_57/57_Varsberg_3.jpg"]},"Consult_chateau_formulaire71d9":{"id":"Consult_chateau_formulaire71d9","dept":"57","canton":"Moulins-lès-Metz","commune":"Vaux","nom":"Vaux_Moselle","type":"Château","periode":"XVI","histoire":"VAUX, une maison forte du XVIe siècle abrite une chapelle. Dans cet antique village viticole, on y produit du vin de Moselle (AOC). Les caves du château, du XIIIe siècle, produisent un crémant qui, lors de la période allemande de 1870-1918, fut célèbre, sous la marque Schloss Vaux et a été distribué dans toute lAllemagne. En décembre 1918, les propriétaires, comme beaucoup dallemands alors, sont expulsés dAlsace-Lorraine. Ils recréent un vignoble dans la partie allemande des côtes de Moselle, exploitant la même marque. Il existe donc deux vignobles du château de Vaux : lun en Allemagne et lautre en France. Le château et le vignoble de Vaux sont progressivement restaurés, à partir de 1981, par un messin, Jean-Marie Diligent. Repris en 1999 par un couple d'nologues, le domaine est en pleine restructuration : des vins AOVDQS Moselle sont produits sur 11 hectares de coteaux qui surplombent la Moselle. C'est le seul vignoble à posséder un château.","architecture":"VAUX, le château de Vaux (encore commercialisé en allemagne sous la marque Schloss Vaux) fournissait, aux cours princières de la belle époque et aux grandes tables comme Kempinski, un mousseux digne des meilleurs champagnes. Marie-Geneviève, oenologue de profession, est issue dune grande famille de négociants en vins, les Hennequin. Norbert, oenologue lui aussi, a travaillé dans le monde entier comme wine maker, à la commande. Engagés depuis 1999 dans une démarche exigeante et rigoureuse, les Molozay ont choisi en premier la culture biologique et, aujourdhui, biodynamique. Vous y découvrirez la production de vins, d'alcools, de spiritueux.","habitants":"Famille Jean-Marie Diligent\"","divers":"Château de Vaux à Vaux","gps":"","images":["../image/image_57/57_Vaux_Moselle_1.jpg","../image/image_57/57_Vaux_Moselle_2.jpg"]},"Consult_chateau_formulaire266e-2":{"id":"Consult_chateau_formulaire266e-2","dept":"57","canton":"Moulins-lès-Metz","commune":"Vernéville","nom":"Vernéville","type":"Château","periode":"XVII-XVIII","histoire":"VERNEVILLE, la seigneurie possédait un château fort, fief de lévêché de Metz. La seigneurie de Vernéville appartenait aux XVIe et XVIIe siècles à la famille de Roucel. Le château actuel fut sans doute reconstruit au début du XVII siècle par Nicolas de Roucel, seigneur de Vernéville, Fléville, Lixières en Woëvre, conseiller d'Etat du duc de Lorraine, selon la date inscrite sur la tour-porche. La seigneurie fut acquise au début du XVIIIe siècle par des parlementaires messins, Claude-François Jobal et François Huyn, seigneur de Montigny la Grange, dont le fils François-Louis-Paul Huyn, par son mariage en 1735 avec Anne-Françoise de Jobal, réunit toute la seigneurie en ses mains. La famille Huyn de Vernéville conserva la propriété jusqu'à la première guerre mondiale.","architecture":"VERNEVILLE, devenu propriété de la société lorraine des acièries de Rombas le château de Vernéville fut transformé en 1931 en centre dadaptation et de soins, mais depuis le bâtiment a été bien restauré et vendu en appartements.  Situé à l'extérieur sud du village, le château et ses dépendances forment un vaste ensemble de bâtiments disposés autour de deux cours carrées dans le prolongement l'une de l'autre. Parallèle à la route de Gravelotte, la tour-porche, encadrée de deux bâtiments rectangulaires allongés à un niveau et munis de tours rondes aux extrémités, permet l'accès à une première cour, fermée autrefois à l'ouest par un important bâtiment. Au sud la seconde cour, plus étroite, est encadrée par le château et ses dépendances disposées en U. De plan rectangulaire, couvert d'un toit d'ardoise à croupes et cantonné de tours carrées, le château est largement percé sur ses quatre faces de grandes fenêtres rectangulaires disposées sur deux niveaux. Sur la façade principale nord une bretèche défend la porte d'entrée précédée d'un large escalier en U. La partie la plus remarquable est la tour-porche, dotée d'une porte cochère et d'une porte piétonne en plein cintre. Plusieurs canonnières doubles sur les tours d'angle et la tour-porche témoignent d'un système défensif élaboré.","habitants":"Famille de Roucel.\"","divers":"Château de Verneville 49° 07' 35? N, 6° 00' 01? E","gps":"","images":["../image/image_57/57_Vern%c3%a9ville_1.jpg"]},"Consult_chateau_formulaire85e6":{"id":"Consult_chateau_formulaire85e6","dept":"57","canton":"le Saulnois","commune":"Vic-sur-Seille","nom":"Vic_sur_Seille","type":"Château","periode":"XII-","histoire":"Deux châteaux dans cet article,  le palais épiscopal de Vic  et Marsal.              VIC-EPISCOPAL, fut construit au XIIe siècle pour lévêque Bertram de Metz, puis il connaîtra des extensions successives jusqu'au XVe siècle. Le château des Evêques fut pendant 600 ans la résidence des évêques de Metz, Il ne fut pas, contrairement à nombre de ses semblables, détruit à la Révolution, mais en 1792, quand fut déclarée la \"patrie en danger\", il fut réquisitionné pour le casernement des troupes, représentant une place forte militaire très convenable. Détruit au XIXe siècle, il servira de carrière, comme beaucoup de monuments en ruines, pour les constructions du village. Actuellement il subsiste le castelet d'entrée flanqué de deux tours, classées monuments historiques. Des fouilles ont permis de dater le châtelet dentrée du château au XVe siècle, il avait un double but esthétique et défensif. Les archéologues ont pu reconstituer, en croisant leurs découvertes, une partie de lhistoire du lieu antérieure au XIIIe siècle, une occupation plus ancienne du site, sous la forme dun premier château, découvrant les vestiges dune tour-porte quadrangulaire. De l'hexagone irrégulier du Moyen-Age, il ne reste qu'un quart ou un cinquième. Le côté nord était occupé par la porte donnant sur Vic. On voit encore les deux tours rondes avant, actuellement d'inégale hauteur et décoiffées avec de belles archères ou embrasures à couleuvrine. Elles encadrent la porte cochère et la porte piétonne, sises sous une galerie de mâchicoulis, dans le style fin du XIVe siècle. Il n'y a plus qu'une tour arrière du châtelet, très abaissé par les destructions. Cette tour s'engage dans le rempart du château proprement dit dont le front nord-est est remarquable par la hauteur des courtines et des deux redoutables tours rondes qui les flanquent. Deux périodes de construction peuvent être distinguées: en bas, l'appareil irrégulier et grossier, plus haut, le magnifique appareil de moellons bien taillés. Le front nord-est a aussi conservé son profond fossé, ce qui renforce l'impression de hauteur que donne l'édifice. Une partie des dépendances qui s'adossaient au rempart, à l'intérieur du château, a été conservée avec de belles fenêtres à meneaux et croisillons.","architecture":"VIC, un premier château avait été construit à la fin du XIIe siècle sur le modèle à tour porte. Il est agrandi au XIIIe et restauré au XIVe siècle. La porte extérieure visible de nos jours a été érigée au XVe siècle. Le château est victime d'un incendie destructeur en 1815 et tombe en ruines. La porte du château, dont les tours sont hautes de 7 m, est classée au titre des monuments historiques par une publication au Journal officiel du 16 février 1930. Les restes du château ont été restaurés en 2008.                                                                                                                                            A trois K.M à l'est MARSAL, soucieux de préserver le sel de la convoitise germanique, Louis XIV confie à Vauban l'amélioration des fortifications de la cité saline.  S'il ne reste que quelques vestiges bien délabrés des remparts, la vue  nous en montre avec une étonnante précision le tracer géométrique. La porte de France conservée dans un état qui justifie l'hébergement du musée départemental du sel mérite absolument une visite ! Votre guide sera fier de commencer par la présentation d'une étonnante collection de salières, de la plus kitch à la plus raffinée, mais le plus intéressant reste la reconstitution d'une exploitation néolithique et plus loin l'histoire: antérieure à 1663, appelée porte Notre-Dame, elle défendait l'accès principal à Marsal et a été fortement remaniée dans la première moitié du XVIIe siècle. Fortifications : quelques pans des fortifications de Vauban, restaurés en 1821-1823, sont encore visibles actuellement. La poterne sud est également conservée et a été restaurée assez récemment. L'édifice est classé aux M.H. en 1928.  Porte de France classée monument historique le 6 mars 1928.","habitants":"Seigneur locaux\"","divers":"dans cet article  le palais episcopal de Vic  et Marsal grav-4-5-6.                                                                             48° 46' 47? nord, 6° 31' 51? est","gps":"","images":["../image/image_57/57_Vic_sur_Seille_1.jpg","../image/image_57/57_Vic_sur_Seille_2.jpg","../image/image_57/57_Vic_sur_Seille_3.jpg","../image/image_57/57_Vic_sur_Seille_4.jpg","../image/image_57/57_Vic_sur_Seille_5.jpg","../image/image_57/57_Vic_sur_Seille_6.jpg"]},"Consult_chateau_formulairecabb":{"id":"Consult_chateau_formulairecabb","dept":"57","canton":"Thionville","commune":"Thionville","nom":"Volkrange","type":"Château","periode":"XV-XVI","histoire":"VOLKRANGE, la famille de Volkrange appartenait à l'ancienne noblesse du duché de Luxembourg. Arnoux II de Volkrange aurait bénéficié des largesses de la comtesse Ermesinde pour bâtir le château sur une motte castrale. Surélévation du terrain sur laquelle il est édifié. De plan quadrangulaire, il disposait de fossés, d'un pont-levis.  son futur gendre, Guerlach de Neuerbourg, fiancé à Irmengarde. Après de hauts faits militaires, il se distingue et il est adoubé chevalier. Mais le malheureux contracte la lèpre et lorsqu'il rentre au château, précédé par son seigneur Arnoux II, Guerlach s'isole dans un petit ermitage, construit à son intention, sur les hauteurs de la colline du Saint-Michel. Il s'y éteint dix ans plus tard, Irmengarde, veuve, se retire dans un couvent, le patrimoine familial demeura morcelé pour une longue période durant laquelle des branches collatérales se partagèrent les biens. En 1614, la reconstitution de la seigneurie s'amorça et en 1671, Jean de Pouilly se porte acquéreur du château. A cette date la guerre de trente ans (1618-1648), a dévasté la région. Au moment de l'achat, Jean de Pouilly effectue des choix de travaux de reconstruction. Il veille à respecter les tours, mais une aile n'est pas reconstruite. Des traces d'arrachement sur la façade ouest témoignent de l'existence d'un second édifice qui faisait face au premier. En 1701, le fils de Jean de Pouilly, François Isaïe de Pouilly devient l'unique seigneur après l'achat du château qui appartenait encore à l'autre co-seigneur, Charles François Hue de Saint Rémy, sa fille, Marie Christine de Pouilly, épouse Charles François, baron de Mesnil, et par cette alliance Charles devient seigneur de Volkrange.","architecture":"VOLKRANGE, Frédéric-Charles-Joseph de Mesnil réussit, après trois siècles de morcellement, à réunir l'ensemble de la seigneurie, grâce à l'achat vers 1788, de la part de Jean III. Frédéric-Charles-Joseph de Mesnil devint maire de Volkrange aux temps troublés de la Révolution. Il ne quitta pas le château et sa fille, Marie Barbe Constance, vint l'y rejoindre vers 1794. Antoine François de Nonancourt, originaire du Luxembourg Belge, épousa Marie Barbe Constance : il fut le dernier noble à vivre du revenu de ses terres à Volkrange. Après le décès de Nonancourt, sa veuve géra le domaine mais elle fut contrainte à vendre, croulant sous les dettes et poursuivie par ses créanciers. On voit encore deux tours circulaires coiffées d'ardoises s'élevant sur les douves. La façade opposée aux tours s'anime de nombreuses ouvertures disposées très irrégulièrement et datant des différentes époques de construction et de restauration du château; du XVIe, XVIIe, XVIIIe et même XIXe siècles. Barthélemy Bompard achète le domaine en mai 1840 . Bourgeois de la ville de Metz dont il fut maire, il a fondé une maison de draperie et soierie. Il fit élever un nouveau château à proximité de l'ancien. C'est une construction rectangulaire très classique d'un étage sur rez-de-chaussée, les façades principales s'éclairant par neuf fenêtres sous un haut toit d'ardoises en écaille.\nÉléments protégés MH : le château en totalité avec son ancienne motte et fossés qui les entourent, ainsi que les façades et les toitures des communs et du colombier : inscription par arrêté du 8 octobre 1984.","habitants":"Famille deArnoux II de Volkrange\"","divers":"Château de Volkrange à Thionville                                                   49° 21' 32? N, 6° 05' 17? Est","gps":"","images":["../image/image_57/57_Volkrange_1.jpg","../image/image_57/57_Volkrange_2.jpg","../image/image_57/57_Volkrange_3.jpg","../image/image_57/57_Volkrange_4.jpg","../image/image_57/57_Volkrange_5.jpg","../image/image_57/57_Volkrange_6.jpg"]},"Consult_chateau_formulaire66e1":{"id":"Consult_chateau_formulaire66e1","dept":"57","canton":"Courcelles-Chaussy","commune":"Vry","nom":"Vry","type":"Vestiges","periode":"XII-XV","histoire":"VRY, le château-fort de Vry fut peu après reconstruit par la famille ségneuriale du même nom, qui le conserva jusqu'au début du XVe siècle. A partir de cette époque, il appartint à la ville de Metz qui y installa un châtelain ainsi qu'une garnison permanente, solidement équipée. Le château, véritable forteresse, joua un rôle important lors des guerres locales des XIVe et XVe siècles, dans la défense du haut chemin entre Metz et Bouzonville. Lors de la guerre de 1444 entre les messins et le duc de Lorraine, soutenu par les armées du roi de France, le château, malgrès une héroïque résistance de la garnison messine, fut pris par les écorcheurs français. Il avait subi au cours du siège un bombardement très intensif et fut sans doute considérablement restauré. Une garnison y fut maintenue encore au début du XVIIe siècle, mais après la guerre de Trente Ans, il perdit tout intérêt militaire.","architecture":"VRY, offre cette particularité très rare en Lorraine d'être de plan circulaire. Entouré d'un fossé large de 25 mètres, encore en eau au début du XXe siècle et franchi au nord par une chaussée qui en constituait l'unique accès, il était formé d'une enceinte circulaire, autour d'une vaste cour, flanquée d'une tour carrée au sud-ouest et de cinq tours semi-circulaires, trois grosses au nord-ouest, au nord-est et au sud-est, et deux petites au nord et au sud. La petite tour nord était appelée tour du châtelain; l'étage inférieur de la tour nord-est servait de prison et la tour sur-est de chapelle. Bien qu'en partie ruiné, le château était encore en assez bon état jusque vers  1900. Depuis la dernière guerre, il s'est considérablement dégradé, notamment à la suite d'un incendie qui a détruit le logis nord-est, habité jusqu'en 1950, et de l'installation d'un garage dans l'enceinte du château. Seul le logis ouest est encore utilisé. Les tours subsistent , mais tronquées ou partiellement enterrées à la suite d'un comblement de fossé.","habitants":"Ville de metz\"","divers":"Vestiges à Vry                                         49° 11' 21? N, 6° 19' 41? Est","gps":"","images":["../image/image_57/57_Vry_1.jpg","../image/image_57/57_Vry_2.jpg","../image/image_57/57_Vry_3.jpg"]},"Consult_chateau_formulaire476e-2":{"id":"Consult_chateau_formulaire476e-2","dept":"57","canton":"Sarreguemines","commune":"Kalhausen","nom":"Weidesheim","type":"Château","periode":"XV-XVI","histoire":"WEIDESHEIM Reconstruit au XVe siècle, il fut inféodé en partie en 1444 par le comte Frédéric de Deux-Ponts-Bitche à Simon le Vieux, seigneur de Bitche dit Gentersberg. Peu à peu cette famille seigneuriale racheta la plus grande partie de la seigneurie et Simon l'Ancien qui transforma le château à la fin du XVIe siècle, ainsi que ses successeurs au XVIe siècle, y élurent domicile jusqu'à l'extinction de la famille en ligne masculine en 1607. Par mariage, le château revint après 1607 à Jean-Guillaume de Bettendorf. En 1728, il fut acquis avec la seigneurie par Pierre d'Hausen et, jusqu'après la dernière guerre mondiale, il est resté la propriété de la famille d'Hausen. A la veille de la Révolution, Dominique-Ignace-Charles d'Hausen alors conseiller au parlement de Paris, puis député de la Moselle, et maire de Sarreguemines, fit démolir l'ancien château ne gardant que le donjon et quelques parties des dépendances pour en rebâtir un nouveau, sans doute vers 1785.\nAu château primitif de la famille de Weidesheim détruit en 1380 succède un édifice reconstruit au milieu du XVe siècle et transformé à la fin du même siècle par Simon de Bitche l'ancien. En 1728, la seigneurie est acquise par Pierre d'Hausen dont les descendants conservent encore le domaine. Du château du XVe siècle, il subsiste la tour, qui semble apparentée aux Turmburgen allemands. Ce haut bâtiment de plan massé, comportant quatre niveaux d'ouvertures, est couvert d'un toit à longs pans et croupes à forte pente et tuiles plates. Accolée à la façade sud, la tour de l'escalier en vis, à comparer avec celui du proche château de Rahling daté 1620, est rajoutée au XVIe siècle ou au XVIIe siècle, à l'époque où l'édifice est partiellement repercé. Des bâtiments agricoles très remaniés, dotés de canonières doubles du XVIe siècle, ferment la cour du XVIe siècle. Ils sont précédés à l'Ouest par le nouveau château de style néoclassique reconstruit à la veille de la Révolution française pour Dominique Ignace Charles d'Hausen, conseiller au Parlement de Metz, futur député de la Moselle et maire de Sarreguemines.","architecture":"WEIDESHEIM, rattaché à la commune de Kalhausen, il conserve encore quelques fermes dominées par le château. Un autel à Junon et deux bas-reliefs gallo-romains découverts dans l'écart et partiellement remployés dans la chapelle témoignent de l'ancienneté du site. Le hameau est cité sous la forme Weidesheim en 1506,  à  Weitzheim à la fin du XVIIIe siècle. Du point de vue administratif, le village est tout d'abord une commune indépendante du canton de Bouquenom (aujourd'hui Sarre-Union, dans le Bas-Rhin) de 1790 à 1793, avant d'être placé dans celui de Rohrbach-lès-Bitche, puis d'être rattaché à la commune de Kalhausen en 1811.                                                                                 de l'ancien château subsiste un bâtiment rectangulaire très intéressant, sans doute le donjon du XVe siècle, flanqué d'une tourelle d'escalier polygonale hors-oeuvre sur la façade sud-est. Les façades ainsi que la tourelle sont percées de plusieurs baies soit rectangulaires ou à meneaux, soit de petites baies à linteau trilobé. L'étage supérieur est muni d'éléments défensifs, fenêtre de tir, archères et bretèche. Le toit à croupes est couvert de tuiles en écaille. Dans un bâtiment des dépendances, situé dans le prolongement de l'aile du nouveau château, subsiste également une meurtrière à redent, sans doute de la même époque. Le nouveau château, édifié au s
