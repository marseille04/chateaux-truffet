, le premièr est construit sur des bases probablement médiévales par Étienne Toupet en 1564 quand il obtient le fief dAlteville du duc Charles IV de Lorraine,  l'autre bâtiment, élevé en 1698 par Charles Palléot, officier de cavalerie. En 1786, le château d'Alteville appartenait à Nicolas Leclerc, l'un des fermiers généraux régisseurs des domaines de Lorraine et Barrois, résident à Dieuze. Le mariage de sa fille Julie-Charlotte avec Jean-Baptiste-Nicolas Vivaux, avocat et maître de forges, y fut célébré le 10/01/1786.  En 1819, le général Charles Louis Dieudonné Grandjean hérite du domaine. En 1851, Amélie-Marie Grandjean épouse François Paul Guaïta, le père de Stanislas de Guaita qui naîtra dans le château familial. En 1906 le château fut vendu à Maurice Barthélémy, de Saales, député au Landtag. Le domaine est très endommagé pendant la deuxième guerre mondiale par les troupes allemandes qui détruisent la chapelle. La propriété est toujours entre les mains des descendants de la famille Barthélémy.","architecture":"ALTEVILLE,  comprend les deux châteaux qui se font face; au nord la maison franche et au sud le nouveau château ouvrant sur un vaste parc. cest une maison-forte typique qui garde un aspect défensif avec tourelle, meurtrières et fenêtres à meneaux. La maison franche, couverte d'un toit de tuiles à croupes, est flanquée sur sa longue façade Est d'une tourelle d'escalier hors-oeuvre à toit conique d'ardoise et prolongée à l'ouest par les dépendances. Lui faisant face, le château du XVIIIe siècle, se présente comme un corps de bâtiment de plan massé à toit à croupes, avec trois niveaux d'ouvertures à linteau en arc segmentaire, prolongé à l'est et à l'ouest par deux longues ailes basses sur le même alignement, à toits à deux versants. L'aile Est était flanquée jusqu'en 1940 d'une chapelle à choeur pentagonal, peut-être ajoutée au XIXe siècle. L'ensemble, complété par deux pavillons sur les angles de la façade nord du corps principal, a été à plusieurs fois reprises, remanié. Les pavillons de style Louis XIII, ajoutés en 1868.","habitants":"Famille Barthélémy\"","divers":"Château d'Alteville à Dieuze: 48° 47' 07\" Nord, 6° 45' 32\" Est","gps":"","images":["../image/image_57/57_Alteville_1.jpg","../image/image_57/57_Alteville_2.jpg"]},"Consult_chateau_formulairea833":{"id":"Consult_chateau_formulairea833","dept":"57","canton":"Faulquemont","commune":"Ancerville","nom":"Ancerville","type":"Château","periode":"XIII-XV","histoire":"ANCERVILLE,  ce fut le fief de lévêché dans la châtellenie de Rémilly, avec son château fort, possession des Baudoche (maîtres échevins de la République messine entre 1340 et 1549), des Gournay, des Raigecourt, et des Poline. Le château construit au XIIIe siècle est rénové pour Simon Desarmoises, chevalier, au XVe siècle et devient une résidence de type féodal. Il a été la possession de grandes familles messines, les Baudoche, les Gournay et les Raigecourt. Le bâtiment a subi les fatigues du temps on peut malgré tout apercevoir une magnifique façade et les restes darcades malheureusement murées. Des machicoulis et des canonnières défendent encore le portail et le guichet.","architecture":"ANCERVILLE. le château  date du XIIIe siècle. Il fut restauré au XVe siècle : donjon carré, tours, porterie fin du XVe siècle avec ses portes à linteaux gothiques, ses armoiries, sa cheminée Renaissance et les restes des défenses extérieures. Les corps de logis , les façades et les toitures de l'aile Sud, incluant les façades et toitures du bâtiment Sud-Ouest, la tour Ouest et la tour Nord, ainsi que la pierre avec inscription commémorative de la prise du château le 15 août 1590 sont inscrits au titre des M.H. par arrêté du 16 novembre 1988.   Éléments protégés MH : le corps de logis : les façades et les toitures de la tour-porche et de l'aile ouest, le premier étage de la tour-porche et l'escalier à vis qui y mène ;, le rez-de-chaussée de l'aile Sud et tour d'angle Est, les restes des défenses extérieures et l'aire contenue par ces défenses,  et la pierre avec inscription de la prise du château le 15 août 1590 : inscription par arrêté du 16 novembre 1988.","habitants":"Famille  de Baudoche\"","divers":"Château d'Ancerville                        49° 01' 49\" Nord, 6° 23' 11\" Est","gps":"","images":["../image/image_57/57_Ancerville_1.jpg","../image/image_57/57_Ancerville_2.jpg"]},"Consult_chateau_formulaire2883":{"id":"Consult_chateau_formulaire2883","dept":"57","canton":"Thionville","commune":"Ancy sur Moselle","nom":"Ancy_sur_Moselle","type":"Château","periode":"XVII-XVIII","histoire":"trois châteaux dans cet article, Saulcy et le Breuil. Et dans un village voisin Ste-Ruffine BUZELET                                                                                                SAULCY, ce château fut construit vers 1724, à l'emplacement d'une partie des fossés de la forteresse d'Ancy, pour l'avocat Toussainy Gravelotte, en faveur de qui Léopold avait érigé en fief noble la terre du Saulcy en 1724. A la mort de Toussaint Gravelotte, en 1739, le château fut racheté par Hollande de Colmy. Construit au chevet de l'église paroissiale, au fond d'un grand parc, c'est un long bâtiment de plan rectangulaire à toit d'ardoise à croupes, à façade principale ordonnancée symétrique, à sept travées de fenêtres rectangulaires disposées sur trois niveaux.                                                                                                              BUZELET, le comte de Buzelet a fait construire cette demeure en 1730, sous le règne de Louis XV, il servait de maison de campagne ou il faisait son vin. Demeuré dans son état d'origine jusqu'en 1939, l'édifice est ensuite occupé par un membre de l'état major allemand qui entreprend de grandes modifications; tout ce qui touchait à la vinification a été enlevé, ainsi que les alcôves dans les chambres. Il ne reste plus grand chose d'époque hormis à l'intérieur un escalier en fer forgé.\nÉléments protégés MH : la façade et la toiture sur le parc avec le grand escalier à rampe en fer forgé et mur de soutènement de la terrasse ; l'escalier intérieur avec sa rampe en fer forgé et couloir voûté au rez-de-chaussée ; le salon d'honneur au rez-de-chaussée et le grand salon au premier étage avec leur décor : inscription par arrêté du 23 juillet 1981.","architecture":"BREUIL, il fut reconstruit sur l'emplacement du château fort d'Ancy. Il existe aussi sur la commune, le château du Breuil, dans le Hameau du Chêne, date du XVIIe siècle, qui fut remanié. Il possède un puits couvert du XVIIe siècle     BREUIL   Le château du Breuil semble bien être la maison seigneuriale de la famille de Féligny, propriétaire au XVIIIe siècle du fief de la Charrée-Hennemont et du ban de la Salle. Acheté en 1559 par Mathieu de Mondelange, maître échevin de Metz à plusieurs reprises, à Jacques de Luz, seigneur de Neuville en Verdunois, le ban de la Salle était passé par mariage et par héritages à Dominique Lombart, puis à Jacques Trilpot, trésorier de la cité de Metz, à Jean de La Bruyère de Haraucourt et, au début du XVIIIe siècle à François de Féligny. Elevé dans un vaste parc au début du XVIIe siècle, à l'emplacement d'une maison-forte peut-être construite par les Heu, le château, remanié par la suite, est un long bâtiment de plan en  L, avec une tourelle polygonale sur la face postérieure. La porte, ouverte sous un arc polygonal à trois pans et encadrée de pilastres supportant un entablement, est surmontée d'une niche encadrée de deux ailerons. Au-dessus d'une porte des dépendances, une clef datée de 1618 indique sans doute la date de la construction. Un beau puits couvert d'un dôme carré semble dater de la même époque.","habitants":"avocat Toussainy Gravelotte                                 comte de Buzelet            famille de Féligny\"","divers":"trois châteaux dans cet article, Saulcy grav-4 et le Breuil  Grav-5. Et dans un village voisin Ste-Ruffine Buzelet grav 1-2                 49° 03' 27\" Nord, 6° 03' 32\" Est","gps":"","images":["../image/image_57/57_Ancy_sur_Moselle_1.jpg","../image/image_57/57_Ancy_sur_Moselle_2.jpg","../image/image_57/57_Ancy_sur_Moselle_3.jpg","../image/image_57/57_Ancy_sur_Moselle_4.jpg","../image/image_57/57_Ancy_sur_Moselle_5.jpg","../image/image_57/57_Ancy_sur_Moselle_6.jpg"]},"Consult_chateau_formulaire9744":{"id":"Consult_chateau_formulaire9744","dept":"57","canton":"Bouzonville","commune":"Coincy","nom":"Aubigny_Coincy","type":"Château","periode":"XVIII","histoire":"AUBIGNY,  (dont subsiste une partie du mur de l'une de ses trois tours) fut démoli durant la guerre de trente ans (1618 1648), par les \"Suédois\" en 1630. A la seigneurie d'Aubigny, étaient attachés des droits féaudaux qui se transmettaient par héritage ou par transaction immobilière. Pour s'ennoblir les patriciens de la République Messine usaient volontiers de ce moyen. Du passé subsiste encore un balcon, une porte et une fenêtre à meneau. Le château fut entièrement remanié au XVIIIe siècle, et à propos d'un procès en 1772, on a l'état descriptif de celui-ci et il apparaît exactement conforme à celui qui existe aujourd'hui. Il semblerait que c'est entre 1740, époque de la vente par la famille Roucel, et 1770, que cette transformation a eu lieu, du temps de Louis XV ou l'architecture des maisons et jardins était si équilibrées. On y créa un jardin à la française avec cadran solaire, massifs de buis et des ifs aujourd'hui tricentenaires.  La famille de Belchamps hérita de la demeure en 1814 par échange avec La Grange aux Bois; elle appartient toujours à ses descendants. Entre les deux guerres mondiales, le général de Cugnac, président du souvenir Français, y reçut de prestigieuses personnalités (Foch, Lyautey, de Gaulle). Jean de Cugnac avait épousé Marguerite, la fille de Vaulgrenant, ce sont eux qui, de 1920 à 1956, furent les propriétaires d'Aubigny. Jean de Cugnac, qui avait pris sa retraite en 1918 eut, pendant la période de l'entre deux guerres un rôle très important en Moselle à la tête du Souvenir Français. Ils modernisèrent la demeure d'Aubigny et en firent un centre familial incomparable. A l'été 1940, les autorités nazies confisquèrent le domaine.","architecture":"AUBIGNY La maison fut dépouillée de ses uvres d'art, dont une partie seulement a pu être récupérée. Leurs fils, Henry de Cugnac, qui avait épousé Joséphine d'Hannoncelles, était officier et fut arrêté par les occupants en 1943 à Clemont Ferrand. Déporté à Mauthausen, il est mort en 1945, quelques jours avant la libération du camps.\nSes légitimes propriétaires revinrent dès l'automne 1944 dans la Lorraine ravagée pour redonner vie à Aubigny. Depuis, la demeure et le jardin sont inscrits \"monuments historiques\". C'est à Chantal, fille ainée de Marguerite de Cugnac qu'échut le château d'Aubigny. A son décès en 1982, sa fille ainée, Geneviève, hérita, avec sa soeur Marie Thérèse de la propriété. Geneviève avait épousé Edouard de Montalembert, ils eurent sept enfants : cinq filles et deux garçons. Ce sont Marie Thérèse de Vasselot, veuve de Guillaume Du Boisson de Courson, Edouard de Montalembert et ses 7 enfants qui ont à ce jour la propriété d'Aubigny. L'héritière sera en 2004 Marie Odile d'Ornellas. Ainsi Aubigny témoigne de la vie d'une famille d'officiers français toujours restée fidèle à la Moselle en dépit des guerres et des annexions. Son cadre de verdure, la ferme qui en dépend, forment un espace remarquable aux abords de Metz qui vaut certainement le détour.\nÉléments protégés MH : le château avec sa cour et les dépendances adjacentes ainsi que le jardin, avec leurs murs de clôture et les portails : inscription par arrêté du 30 juillet 1993.","habitants":"Famille de Belchamps \"","divers":"Château d'Aubigny à Coincy                       gps 49° 06' 06? nord, 6° 16' 23? est","gps":"","images":["../image/image_57/57_Aubigny_Coincy_1.jpg","../image/image_57/57_Aubigny_Coincy_2.jpg","../image/image_57/57_Aubigny_Coincy_3.jpg","../image/image_57/57_Aubigny_Coincy_4.jpg"]},"Consult_chateau_formulaire9ea9":{"id":"Consult_chateau_formulaire9ea9","dept":"57","canton":"Les Coteaux de Moselle","commune":"Augny","nom":"Augny","type":"Château","periode":"XVI-XVII","histoire":"AUGNY, la seigneurie du ban de la Centaine, sur lequel est élevée la maison forte d'Augny, appartint successivement à la fanille de Port-Sailly au XIIe siècle et aux Louve, futurs seigneurs de Prayelle en 1337. De nombreux propriétaires se succédèrent aux siècles suivants, les Desch, les Barrisey, les Le Lanty, les Saint-Blaise, les Cannelet, les T'Schudy, les Etienne d'Augny et, à la veille de la Révolution, les Raigecourt. Vendue comme bien national en 1791 à François Louis, d'Augny, la maison forte resta dans sa famille jusqu'en 1830, où elle fut vendue à Jean-Nicolas Leroy. De 1903 à 1934, elle resta entre les mains de la famille de Brossin de Méré et fut revendue à cette date à la famille Maire qui en est toujours propriétaire.","architecture":"AUGNY, dans son état actuel, elle date du XVIe ou du XVIIe siècle, avec des remaniements aux siècles suivants. En bordure du village et dominant les maisons voisines, la maison forte d'Augny est un haut bâtiment de plan rectangulaire à quatre niveaux, couvert d'un toit d'ardoise à croupes. L'angle sud-est, arrondi, est occupé par un escalier à vis demi-hors-uvre qui dessert les trois étages. Les façades est et ouest sont aveugles tandis que les façades sud et nord ont été repercées au XIXe siècle de fenêtres rectangulaires de modules différents. Des ouvertures anciennes, subsistent la porte d'entrée, sur la façade sud, et la plupart des fenêtres de la tour d'escalier. Les seuls éléments défensifs encore visibles consistent en deux petites archères au droit de la porte d'entrée.","habitants":"Famille des Raigecourt\"","divers":"Château d'Augny                                 49° 03' 34? nord, 6° 07' 19? est","gps":"","images":["../image/image_57/57_Augny_1.jpg","../image/image_57/57_Augny_2.jpg"]},"Consult_chateau_formulaire8513":{"id":"Consult_chateau_formulaire8513","dept":"57","canton":"Le Saulnois","commune":"Aulnois sur seille","nom":"Aulnois","type":"Château","periode":"XIV-XV-XVIII","histoire":"Deux châteaux dans cet article; Aulnois les Cuvry a Coin,\n AULNOIS, à lorigine, cette dépendance de lévêché de Metz était une place forte médiévale. On peut encore admirer, à larrière du château, les tours des XIVe et XVe siècles merveilleusement incorporées dans le château reconstruit dans le style classique. Chargé de rebâtir cette demeure au XVIIIe siècle, larchitecte Boffrand, décide dutiliser avec prestance la terrasse naturelle sur la Seille que constitue le site. Le résultat est, encore aujourdhui, surprenant et visible de loin.  La façade est conçue en 1726. A cette date le comte des Armoises, gouverneur des enfants Ducaux et propriétaire, est créé par le marquis d'Aunoy et par le duc Léopold Ier de Lorraine. La construction du château d'Aulnois a débuté au XIVe siècle et s'est achevée au XVIIIe siècle. Il a été transformé depuis en un établissement scolaire. Le SIVU en est propriétaire.  Ses parties anciennes comportent une grosse tour du XVe siècle, une tour carrée et un corps de bâtiment du XVIe siècle.  Elle date du XVIIIe siècle : deux pavillons latéraux à frontons triangulaires, un pavillon central, deux terrasses et une pyramide de pierre. Le château d'Aulnois fut vendu en 1772 à Michel de Coeuderoy, premier président de la cour souveraine de Lorraine, puis fut transmit au comte de Riocourt, puis au baron de la Chaise. Depuis, le château d'Aulnois est devenu une école.","architecture":"AULNOIS, éléments protégés MH : la grosse tour ; le corps de logis unissant ce bâtiment à la tour ; le bâtiment du XVIIIe siècle ; la terrasse avec ses escaliers d'accès ; l'ensemble des terrasses avec leurs murs et leurs perrons ; le parterre situé en contre-bas et bassin ; la grille d'entrée, côté village, et ses piliers ; les deux grilles en fer forgé et leurs piliers du XVIIIe siècle, situées à chacune des extrêmités de la terrasse : classement par arrêté du 7 mai 1963. En totalité, toutes les parcelles du domaine, y compris les sols, avec les trois tours rondes, les quatre tours carrées et l'obélisque : inscription par arrêté du 27 septembre 2013.                                                                   A cinq K.M. à l'est COIN,  les CUVRY, la seigneurie fut aux mains de la famille de Gournay aux XVe et XVIe siècles, puis au XVIIe siècle, elle passa aux Le Goullon. La maison-forte des Gournay avait été transformée au XVIIe siècle, Benoit Le Goullon, seigneur de Regnier, possédait en 1681 un quart de la seigneurie de Coin, duquel dépendait \"la maison seigneuriale appelée maison-forte dont les fossés ont été cy-devant comblés, bâtie en pavillon au milieu d'une grande cour entourée de hautes murailles, avec quatre grosses tours aux quatre coins, dont l'une est un grand colombier, grange, ecuries, vacherie, bergerie, une grande allée servant d'entrée à la maison, un parterre devant entouré de murailles\". Située au sud-est du village, au fond de la rue du château, la demeure a conservé son allure générale, bien qu'elle ait été défigurée. De plan massé à trois niveaux dont un niveau de combles, elle a conservé sur les façades de larges fenêtres du XVIIe siècle, modifiées au XVIIIe siècle. Les quatre tours rondes, cantonnant le mur d'enceinte, existaient jusqu'à la dernière guerre, il subsiste encore les vestiges de celles situées à l'est, englobées dans des constructions.","habitants":"Aulnois: comte des Armoises                                                       Cuvry; famille de Gournay\"","divers":"Deux châteaux dans cet article; Aulnois Grav 1-à-8 les Cuvry a Coin grav -9,:                                               48° 52' 09\" Nord, 6° 18' 48\" Est","gps":"","images":["../image/image_57/57_Aulnois_1.jpg","../image/image_57/57_Aulnois_2.jpg","../image/image_57/57_Aulnois_3.jpg","../image/image_57/57_Aulnois_4.jpg","../image/image_57/57_Aulnois_5.jpg","../image/image_57/57_Aulnois_6.jpg","../image/image_57/57_Aulnois_7.jpg","../image/image_57/57_Aulnois_8.jpg","../image/image_57/57_Aulnois_9.jpg"]},"Consult_chateau_formulaire1d33":{"id":"Consult_chateau_formulaire1d33","dept":"57","canton":"Les Coteaux de Moselle","commune":"Vernéville","nom":"Bagneux_Moselle","type":"Château","periode":"XVII","histoire":"BAGNEUX, la seigneurie appartenait au début du XVIIIe siècle à Jean-Jacques de la Croix, brigadier général des armées du roi, auquel succédèrent les Busselot et en 1782 Jean-Claude-Joachim de Faultrier, colonel du régiment de Metz du corps royal d'artillerie. Depuis le XIXe siècle, le château couvert d'ardoises, sans doute construit au XVIIIe siècle, pour lequel Jean-Claude de Faultrier fit hommage au roi, est devenu une habitation agricole. Isolé dans la campagne, au nord de la route de Metz à Etain.","architecture":"BAGNEUX, le château de Bagneux, de dimensions modestes, est composé d'un corps rectangulaire avec des tours carrées de tailles différentes situées aux angles, sauf à l'angle sud-est. Il est coiffé de hauts toits d'ardoise, à croupes sur le corps principal et en pavillon sur les tours, tous à égout retroussé. Les ouvertures peu nombreuses disposées sur deux niveaux sont à linteau en arc segmentaire et sur la façade principale la porte d'entrée est désaxée à droite. Le dépendances qui encadrent le château sur trois de ses côtés ont été très remaniées au XIXe siècle.","habitants":"Famille de  Jean-Claude-Joachim de Faultrier\"","divers":"Château de Bagneux à  Vernéville                                                        49° 07' 35\" Nord, 6° 00' 01\" Est","gps":"","images":["../image/image_57/57_Bagneux_Moselle_1.jpg"]},"Consult_chateau_formulairef4ea":{"id":"Consult_chateau_formulairef4ea","dept":"57","canton":"Yutz","commune":"Berg sur Moselle","nom":"Berg_sur_Moselle","type":"Château","periode":"XVIII","histoire":"BERG sur MOSELLE   Château construit dans le troisième quart du XVIIIe siècle pour l'abbaye d'Echternach (Luxembourg) sous l'abbatiat de l'abbé Michel Horman, dont les armoiries sculptées sont encastrées au-dessus de la porte d'entrée du corps de logis principal. Parties agricoles ajoutées au XIXe siècle, Imposant par sa masse majestueuse.","architecture":"BERG sur MOSELLE, le château possède un corps de logis avec escalier droit en oeuvre, couvert d'un toit à longs pans et croupe et toit à longs pans brisés sur les ailes en retour ; tour avec escalier en vis en oeuvre et couvert d'un toit brisé en pavillon. A l'intérieur plusieurs pièces, dont le salon de réception de l'abbé et la salle à manger au rez-de-chaussée, sa chambre au premier étage, ont conservé leurs belles boiseries et leurs parquets de chêne du XVIIIe siècle. Parties agricoles couvertes d'un toit à longs pans et demi-croupe. On ne peut visiter que les extérieurs.\nÉléments protégés MH : les sols, les murs de clôture, le jardin, les façades et les toitures de l'ensemble des bâtiments, ainsi que les intérieurs du logis : inscription par arrêté du 17 février 2003.","habitants":"des Abbés locaux\"","divers":"Château de Berg sur Moselle  49° 25' 47,14\" Nord, 6° 18' 38,45\" Est","gps":"","images":["../image/image_57/57_Berg_sur_Moselle_1.jpg","../image/image_57/57_Berg_sur_Moselle_2.jpg","../image/image_57/57_Berg_sur_Moselle_3.jpg"]},"Consult_chateau_formulaired3f0":{"id":"Consult_chateau_formulaired3f0","dept":"57","canton":"Le Saulnois","commune":"Bidestroff","nom":"Bidestroff","type":"Château","periode":"XVI-XVII","histoire":"BIDESTROFF, la seigneurie appartenait en 1569 à François de Theuilly; . Il a été construit en 1569 pour le seigneur François de Theuilly, elle revint par mariage à Claude de la Ruelle à la fin du XVIe siècle et au début du XVIIe siècle. Passée à la fin du XVIIe siècle à la famille Philbert, elle fut érigée en 1722 en baronnie en faveur de Pierre Charles Melaine Philbert, gouverneur des pages du duc Léopold, et de son épouse Gabrielle de Ramgerviller, puis échut par héritage à la famille de Ramberviller. En 1792, il est acheté par Antoine Schneider, maire de Dieuze durant la Révolution française et conseiller général du département de la Meurthe (Meurthe-et-Moselle aujourd'hui). A la fin de l'empire en 1814, il ne peut faire face à l'endettement qu'il a imprudemment contracté depuis plusieurs années et doit vendre son château et, petit à petit, la plupart de ses terres.","architecture":"BIDESTROFF, a été construit dans la deuxième moitié du XVIe siècle au milieu d'un beau parc de verdure, il est flanqué de deux tours circulaires et élancées dont les canonnières de défense ornent la base, le fief de Bidestroff relevait de la châtellenie de Dieuze (bailliage d'Allemagne).  il est acheté par Antoine Schneider. Le château de Bidestroff est inscrit aux \n MH : les façades et les toitures du château ; le pigeonnier : inscription par arrêté du 6 juillet 1990.","habitants":"Famille Philbert                  Famille de Ramberville\"","divers":"Château de  Bidestroff                                      48° 51' 00\" Nord, 6° 47' 18\" Est","gps":"","images":["../image/image_57/57_Bidestroff_1.jpg","../image/image_57/57_Bidestroff_2.jpg","../image/image_57/57_Bidestroff_3.jpg","../image/image_57/57_Bidestroff_4.jpg","../image/image_57/57_Bidestroff_5.jpg"]},"Consult_chateau_formulaire0e1c":{"id":"Consult_chateau_formulaire0e1c","dept":"57","canton":"Boulay-Moselle","commune":"Bionville-sur-Nied","nom":"Bionville_sur_Nied","type":"Château","periode":"XV-XVIII","histoire":"BIONVILLE-sur-NIED, en 1610, Pierre Joly, procureur du roi à Metz, acquit la seigneurie et reconstruisit le château. Une inscription encastrée à l'angle de la façade ouest, sur jardin, de l'actuel château qui est postérieur, rappelle son nom et celui de sa seconde femme Sara Busselot. À son décès en 1622, le château passa à son fils Paul Joly, conseiller au bailliage et échevin de Metz, puis à la fin du XVIIe siècle à Philippe Auburtin, seigneur de Chesny, conseiller-échevin de Metz, et au début du XVIIIe siècle à son fils Claude-Philippe, conseiller du roi et maire de Metz.  À la veille de la Révolution il appartenait à Jacques-Rémy-Charles du Pillard de Reguin, officier d'infanterie. Au XIXe siècle il eut de nombreux propriétaires successifs, parmi lesquels un marchand de vin, qui installa dans la partie est des dépendances une brasserie, c'est actuellement une exploitation agricole, en effet, pour la première fois depuis 30 ans, à l'occasion de la fête patronale du village, le propriétaire du château de Bionville ouvre les portes de sa demeure au public.","architecture":"BIONVILLE, c'est un manoir de campagne du XVIIe siècle, bâti sur les restes dun château féodal du XVe, remanié au XVIIIe. Nous avons pu présenter nos saynètes de duels d'escrime artistique et partager des moments très sympathiques autour du bivouac et en animation avec les représentants de la grande armée d'Alsace-Lorraine, (reconstitution napoléonienne). Le château construit au nord-ouest du village est un bâtiment de plan rectangulaire avec deux courtes ailes en retour d'équerre aux extrémités des façades principales, l'ensemble couvert de toits dardoise à croupes. La façade sur cour est ordonnancée à deux niveaux de fenêtres à linteau en arc segmentaire et, à l'intérieur, plusieurs pièces ont conservé leurs lambris du XVIIIe siècle. Encadrant la cour à l'est et à l'ouest, les dépendances sont prolongées par des pavillons de plan massé. Une porte charretière en plein cintre à bossases en losanges, rare vestige du château du XVIIe siècle, subsiste encore dans le bâtiment ouest.","habitants":"Famille de  Jacques-Remy-Charles du Pillard de Reguin\"","divers":"château de Bionville-sur-Nied 49° 06' 20? nord, 6° 28' 52? est","gps":"","images":["../image/image_57/57_Bionville_sur_Nied_1.jpg","../image/image_57/57_Bionville_sur_Nied_2.jpg"]},"Consult_chateau_formulaire5489":{"id":"Consult_chateau_formulaire5489","dept":"57","canton":"Bitche","commune":"Bitche","nom":"Bitche","type":"Citadelle","periode":"XVI-XVII","histoire":"BITCHE,  château fort sans doute construit sur un rocher dominant la ville à la fin du XIIIe siècle par le comte Eberhard de Deux-Ponts, partiellement détruit début XVe siècle pendant la guerre des Paysans, acheté en 1570 par le duc de Lorraine, détruit en 1634 pendant la guerre de Trente Ans puis définitivement réuni à la France en 1680. De 1683 à 1697 construction de la citadelle à son emplacement, sur les plans de Vauban, détruite en 1698 en exécution du traité de Ryswick, Bitche revenant à la Lorraine. En 1738, Bitche étant intégré au système défensif des frontières françaises, sous le commandement du maréchal de Belle-Isle, puis du gouverneur de Bombelles, la citadelle est reconstruite de 1740 à 1765 par l'entrepreneur Gérard, sous la direction de Cormontaigne (casernes, bâtiments pour les officiers du génie, le gouverneur, magasins pour l'artillerie, magasin à poudre, corps de garde, défense des glacis, de 1755 à 1760 construction de l'ouvrage avancé, en 1765 aménagement de l'esplanade au pied du glacis). Partiellement détruite lors de l'avancée prussienne en 1870-1871, la citadelle est modernisée par les Allemands de 1870 à 1900, puis à nouveau endommagée en 1944-1945 par l'artillerie américaine","architecture":"BITCHE, le château construit au nord-ouest du village est un bâtiment de plan rectangulaire avec deux courtes ailes en retour d'équerre aux extrémités des façades principales, l'ensemble couvert de toits dardoise à croupes. La façade sur cour est ordonnancée à deux niveaux de fenêtres à linteau en arc segmentaire et, à l'intérieur, plusieurs pièces ont conservé leurs lambris du XVIIIe siècle. Encadrant la cour à l'est et à l'ouest, les dépendances sont prolongées par des pavillons de plan massé. Une porte charretière en plein cintre à bossases en losanges, rare vestige du château du XVIIe siècle, subsiste encore dans le bâtiment ouest. La citadelle de Bitche fait partie du réseau des grands sites de Moselle. Un plan-relief de la ville de Bitche, datant de 1794 et classé aux M.H. depuis 1983, est exposé dans le musée. Au travers de son complexe souterrain, un parcours muséographique audiovisuel plonge les visiteurs à la découverte de l'histoire de cette imposante forteresse.","habitants":"Famille Busselot\"","divers":"Citadelle à Bitche                                                                   49° 09' 07\" Nord, 6° 09' 08\" Est citadelle 49° 03' 10\" Nord, 7° 25' 53\" Est","gps":"","images":["../image/image_57/57_Bitche_1.jpg","../image/image_57/57_Bitche_2.jpg","../image/image_57/57_Bitche_3.jpg","../image/image_57/57_Bitche_4.jpg","../image/image_57/57_Bitche_5.jpg","../image/image_57/57_Bitche_6.jpg","../image/image_57/57_Bitche_7.jpg"]},"Consult_chateau_formulaire1060":{"id":"Consult_chateau_formulaire1060","dept":"57","canton":"Metzervisse","commune":"Bousse","nom":"Bléttange","type":"Château","periode":"XV-XVI","histoire":"BLETTANGE, château construit au XVe siècle. Au XVIe siècle, il appartenait aux seigneurs de Florange et fut détruit en 1552 lors du siège de Metz. Henri Claude de Verpy, seigneur de Blettange, de Bousse et de Landrevange entreprend d'importants travaux à partir de 1755. Les façades sont repercées, les dépendances et les pavillons abritant la chapelle et la chambre à Four sont ajoutés. L'aile nord-est est terminée en 1758 (date portée par la clef des portes charretières). A son décès en 1781, le château échut à son gendre François Turlure de Vellecourt, commissaire des guerres, qui avait épousé en 1769 Anne Marguerite de Verpy. C'est ensuite Charles Turlure de Vellecourt, inspecteur des eaux et forêts et littérateur, qui en devint propriétaire, et ensuite son fils, Charles-Gustave, officier de marine. A la fin du XIXe siècle, le château de Blettange appartient à la famille du Marin de Bouillères. En 1974, M. Gaucher Jean-Jaques, dentiste à Mondelange, est propriétaire et en assure la restauration jusqu'à sa mort. Actuellement, le château de Blettange appartient à la famille Jeanguyot.","architecture":"BLETTANGE, le château dépendait de la seigneurie de Blettange. Il était le siège dun couvent ou le prieuré des chevaliers de Saint-Jean de Malte jusquen 1788. Sous le nom de Blettange, Bousse formait autrefois avec Landrevange une seigneurie foncière. Le seigneur partageait la juridiction haute et moyenne avec le prévôt de Thionville, qui restait seul investi des pouvoirs du haut justicier. Le château fort de Blettange fut rasé en 1551. Château construit au XVe siècle. Henri Claude de Verpy entreprend dimportants travaux à partir de 1755. Les façades du château sont repercées, les dépendances et les pavillons abritant la chapelle et la chambre à four sont ajoutés. Laile Nord-Est est terminée en 1758 (date portée par la clef des portes charretières). Incendié en 1967, le château est depuis en cours de restauration. On y découvre encore quelques vestiges dune forteresse, rasée par le prince de Nassau en 1521.","habitants":"Famille de François Turlure de Vellecourt\"","divers":"Château de Blettange à Bousse 49° 16' 37\" Nord, 6° 12' 04\" Est","gps":"","images":["../image/image_57/57_Bl%c3%a9ttange_1.jpg","../image/image_57/57_Bl%c3%a9ttange_2.jpg"]},"Consult_chateau_formulaire65fd":{"id":"Consult_chateau_formulaire65fd","dept":"57","canton":"Metzervisse","commune":"Metz-Borny","nom":"Borny","type":"Château","periode":"XVIII","histoire":"BORNY, ce que l'on appelle actuellement le château est en fait l'ancienne maison-forte des voués de l'abbaye de Saint-Vincent, seigneurs de Borny. Le souvenir le plus mémorable qui se rattache à cette maison est le bref séjour qu'y fit le roi Louis XIII, en décembre 1631, lors d'un voyage à Metz. Incendiée en 1712, la maison-forte et franche fut reconstruite par Jean Barné, secrétaire de la chancellerie du parlement de Metz, quartier juré et bourgeois de Metz et achetée en 1747 par Claude-Antoine Lecomte d'Humbepaire, secrétaire en la chancellerie du parlement de Metz. Le château appartint au XIXe siècle aux Chelincourt de Borny, en 1840 au comte Pierre-Hugues de Thémines et en 1899 au vicomte Maurice de Coëtlosquet. Enfin en 1906, la veuve de ce dernier fit don du château aux soeurs du Bon-Pasteur qui s'y installèrent en 1908. L'édifice à quatre niveaux a été très remanié et sans doute réhaussé au XIXe siècle.","architecture":"BORNY, cette maison-forte  de labbaye Saint-Vincent de Metz fut détruite par un incendie, en 1712. Le roi Louis XIII et son cortège, surpris par un orage, y firent un bref séjour le 21/12/1631. Le roi Louis XIII fut tellement satisfait de lhospitalité des propriétaires, Jérémie Le Goullon et son épouse Élisabeth Thiercelin, quil leur accorda lexemption du logement des gens de guerre et fit ajouter 3 fleurs de lys, au blasonde Borny. Aujourdhui, le château de Borny est privé, et sert de résidence personnelle. L'édifice à quatre niveaux a été très remanié et sans doute réhaussé au XIXe siècle.","habitants":"Famille de Chelincourt de Borny\"","divers":"Château de Borny                                   49° 06' 43\" Nord, 6° 13' 39\" Est","gps":"","images":["../image/image_57/57_Borny_1.jpg"]},"Consult_chateau_formulaire8953":{"id":"Consult_chateau_formulaire8953","dept":"57","canton":"Bouzonville","commune":"Schwerdorff","nom":"Bourg_Esch","type":"Château","periode":"XVIII","histoire":"BOURG-ESCH, date de la fin du XVIIIe siècle, ses origines remontent au XIVe siècle. Son nom vient d'un membre de la famille d'Esch qui se fit construire un château dans la prévôté de Siersberg. En 1608, la seigneurie fut acquise par Jeande Kerpen, seigneur d'Illingen, de la famille de Cronenberg, qui en était dejà propriétaire au XVIe siècle. C'est Didier de Marimont, gentilhomme lorrain qui racheta, en premier, le château de Bourg-Esch qu'il ne conserva que 3 mois. Le 12 mai 1615, Guillaume Marzloff de Braubach racheta le château, à son tour. Vers la fin de sa vie, Guillaume Marzloff de Braubach, criblé de dettes, dut revendre la seigneurie en deux parties : l'une à Charles Emmerich de Berncastel et l'autre à Pierre de Haen. Charles Emmerich de Berncastel décèdera vers 1627-1628 en laissant des dettes à sa femme Catherine.  Celle-ci revendit le domaine, en le morcellant. La moitié du château ira à Pierre de Haen. En 1630, elle épousa Claude de Leiningen. Après des problèmes de transmission des biens, le reste de leurs possessions furent vendues, à la criée, en 1671 et Lothaire de Haen, fils de Pierre de Haen s'en porta acquéreur  En 1629 Pierre de Haën acheta Bourgesch. C'est son fils Lothaire qui rebâtit en 1661 le château ruiné au cours de la guerre de trente ans. Restauré en grande partie en 1701 par Philippe-François de Haën, fils de Lothaire, il fut occupé en 1705 par le duc de Malborough avant qu'il ne se rende au château de Meinsberg et peu après, par le maréchal de Villars qui y établit son quartier général. Incendié en 1723, il fut reconstruit sans beaucoup de soin par Lothaire-Ignace de Haën. Il était alors entouré de fossés et défendu par des tours fortifiées et un donjon. Jean-Charles-Adam, marquis de Villers, comte de Grignoncourt, qui tenait Bourg-Esch de sa mère, née Haën, démolit le château et le rebâtit au même endroit vers 1774.","architecture":"BOURG-ESCH, élevé dans un site isolé, le château aux dimensions importantes et construit en grès rouge, est un bâtiment de plan rectangulaire formé de trois corps en U, couverts de toits à la Mansart, fermant la cour à l'ouest. La façade principale du château, sur cour, est d'ordonnance symétrique à trois niveaux de neuf travées dont un niveau de soubassement, soulignés par des bandeaux de grès rouge. Toutes les fenêtres ont un linteau en arc segmentaire. Un fronton cintré interrompt le brisis du corps central, portant des armoiries sculptées en 1828, celles de la famille de Villers et de la famille de Limpach, en 1804 Jacques-Louis Guisberg de Villers avait épousé Madeleine-Valburge de Limpach. Précédée d'un degré droit, la porte d'entrée appareillée, à ébrasement concave, est surmontée d'une importante corniche. A l'est, les dépendances forment un bâtiment à trois corps de plan en U,   la construction du château de Bourg-Esch date du XVIIIe siècle. C'est un quadrilatère fermé avec un porche. Il fut remanié au XIXe siècle et XXe siècle. Le château de Bourg-Esch est devenue depuis une résidence privée.","habitants":"Famille de Cronenberg\"","divers":"Château de Bourg-Esch à Schwerdorff                                           49° 23' 02\" Nord, 6° 33' 48\" Est","gps":"","images":["../image/image_57/57_Bourg_Esch_1.jpg","../image/image_57/57_Bourg_Esch_2.jpg","../image/image_57/57_Bourg_Esch_3.jpg","../image/image_57/57_Bourg_Esch_4.jpg"]},"Consult_chateau_formulairee76c":{"id":"Consult_chateau_formulairee76c","dept":"57","canton":"Faulquemont","commune":"Verny","nom":"Buchy","type":"Château","periode":"XVIII","histoire":"BUCHY, la seigneurie appartenait depuis 1669 à Louis Addé, écuyer, qui déclara, en 1681, à la chambre royale de Metz posséder à Buchy une maison seigneuriale avec quatre tours. Celle-ci fut remplacée, sans doute au début du XVIIIe siècle par un nouveau château. La seigneurie était alors détenue par Antoine de Goussaud, conseiller du Roi et commissaire ordonnateur des guerres au département de Sarrelouis.","architecture":"BUCHY, situé à la bordure nord-est du village, le château est un bâtiment de plan rectangulaire, avec deux courtes ailes en retour d'équerre faisant saillie sur les deux façades, couvert d'un toit d'ardoise à la Mansart sur le corps central et de toits à croupes sur les ailes. Les façades, à trois niveaux, dont un niveau de lucarnes, sont percées de fenêtres rectangulaires aux encadrements en calcaire. Les portes d'entrée, dans l'axe, sont en plein cintre, surmontée d'une corniche moulurée sur la façade côté jardin et précédée d'un escalier à volée double sur la façade sur cour. Le château, à peine transformé depuis sa construction, domine le village de sa masse austère. Le château de Buchy fut construit au XVIIe siècle, et remanié au XVIIIe siècle. Cette belle demeure date du XVIIIe siècle. Découvrez ce château  au cur dune ferme offrant de larges espaces. Pour accéder aux chambres, vous emprunterez lescalier en pierre dépoque sur les traces de François Barbé de Marbois ou encore du Général Patton. Ses propriétaires vous accueillent pour vos séjours en gîte ou chambres d'hôtes et spa.","habitants":"Famille d'Antoine de Goussaud\"","divers":"Château de Bichy à Verny            48° 58' 49\" Nord, 6° 16' 41\" Est","gps":"","images":["../image/image_57/57_Buchy_1.jpg"]},"Consult_chateau_formulaire812f":{"id":"Consult_chateau_formulaire812f","dept":"57","canton":"Les Saulnois","commune":"Salonnes","nom":"Burthecourt","type":"Château","periode":"XVIII-XIX","histoire":"BURTHECOURT, construit vers 1810 pour Vivant Pierre Nicolas Thouvenel . Il semble avoir été très largement remanié à la limite du XIXe et du XXe siècle (escalier, pavement intérieur). Gravement endommagé pendant la guerre de 1914-1918, il est vendu à la congrégation des Missionnaires Oblats Marie-Immaculée qui le transforment en scolasticat en 1929 et élèvent l'aile en retour d'équerre, comprenant la chapelle et les dortoirs. En 1952, le château passe aux mains des pères du sacré coeur de Picpus qui y établissent un séminaire, puis un collège privé en ajoutant un vaste bâtiment scolaire moderne en 1960. L'élévation est pratiquement intacte à l'exception de l'adjonction du bâtiment scolaire, en revanche les intérieurs sont totalement dénaturés. La conciergerie comprend une grille monumentale en ferronnerie créée par l'entreprise Schertzer de Nancy pour les comtes Molitor vers 1900, deux portes piétonnes surmontées de frontons et deux pavillons de deux niveaux couverts de toits à longs pans. Les baies semi-circulaires de l'étage sont encadrées de brique. Le pigeonnier de base cruciforme est composé de quatre corps saillants en rez-de-chaussée (peut-être anciennement chenil) et d'une tour de deux niveaux supplémentaires percée de baies semi-circulaires et couverte en pavillon. Le bâtiment d'exploitation (ancienne orangerie) de plan rectangulaire à deux niveaux, servait à la fois d'étable, remise et grenier. Il compte neuf travées en largeur et trois travées en longueur (arcades en plein cintre).","architecture":"BURTHECOURT, la mise en oeuvre complexe joue sur les couleurs et les imitations de texture en créant une grande confusion de matériaux; les cloisons intérieures sont en pan de bois.  La maison du jardinier est bâtie sur un plan en U autour d'une tour centrale couverte en bâtière, les deux ailes sont couvertes de toits à longs pans et croupes. La chapelle a été édifiée durant l'été 1930 par les pères et les frères convers de la congrégation des Oblats de Marie-Immaculée sous la direction du maître maçon Georges Metzinger, frère du provincial de l'ordre commanditaire du chantier. Elle est bâtie sur l'arrière du château, formant un plan d'ensemble en T, et reliée au corps principal par un escalier. Le bâtiment est en moellons enduits, le soubassement en bossage rustique et l'élévation intérieure à faux joints simule la pierre de taille. Il compte quatre niveaux , la façade latérale droite est privilégiée : elle est marquée par un grand fronton triangulaire en pignon et un balcon à l'étage noble, soutenu par quatre colonnes doriques,   leurs façades en moellon enduit sont animées de chaînes d'angle en pierre de taille, de bandeaux et de corniches moulurés, les trois baies de l'étage sont également surmontées de frontons triangulaires, le réfectoire en sous-sol, la chapelle au rez-de-chaussée, un dortoir, et les cellules situées dans les combles. Construite sur un plan en croix latine, la chapelle possède un choeur semi-circulaire flanqué de deux sacristies. La tribune d'orgue surplombe quatre petites chapelles séparées par des cloisons en plâtre terminées par de fines colonnettes en bois ; elle a été obturée par un lambris afin de ménager un espace indépendant utilisé comme bibliothèque. La voûte plate est suspendue à la charpente métallique par un système de tirants.","habitants":"Famillez de Vivant Pierre Nicolas Thouvenel\"","divers":"Château de  Burthecourt à Salonnes                                                   48° 47' 30\" Nord, 6° 29' 49\" Est","gps":"","images":["../image/image_57/57_Burthecourt_1.jpg","../image/image_57/57_Burthecourt_2.jpg","../image/image_57/57_Burthecourt_3.jpg"]},"Consult_chateau_formulaire8f2b":{"id":"Consult_chateau_formulaire8f2b","dept":"57","canton":"Le Pays messin","commune":"Antilly","nom":"Buy","type":"Château","periode":"XV-XVI","histoire":"BUY, appartenait à la puissante seigneurie d'Ennery. Nicole IV de Heu, fils de Gaspard II de Heu, vendit Buy en 1602 à Jean de Saint-Aubin, bourgeois et marchand de Metz et à sa femme Dorothée Le Duchat. La seigneurie resta dans la première moitié du XVIIe siècle aux mains des familles protestantes Saint-Aubin et Le Duchat.  La double porte fortifié construite en 1604 avant la guerre de trente ans, était l'entrée d'un couvent de moines défricheurs, comme en témoigne l'inscription en latin à son fronton «Vive ut visas» (vis ta vie). La seigneurie était détenue vers 1656 par Louis Maillet, également de religion réformée. Par la suite, il y eut de nombreux seigneurs de Buy, la seigneurie semblant être partagée entre Jean Tiersant (président aux requêtes du palais à Metz, mort en 1713) - Claude-Nicolas Perain de Buy (receveur des derniers patrimoniaux de la ville de Metz, mort en 1760)  Jean-Nicolas-Étienne de Bock ( lieutenant des maréchaux au département de Thionville et gouverneur de Sierck, vers 1781). Ce dernier possédait la moitié de la seigneurie avec le château entouré des fossés et une maison de fermier. L'autre moitié de la seigneurie appartenait, peu avant la Révolution, à Auguste-Charles-Louis Ancillon de Jouy ( conseiller au parlement de Metz, commandant de cavalerie, chevalier de la légion d'honneur, mort le 27 septembre 1857). Le château de Buy était au XIXe siècle la propriété de la famille Ancillon de Jouy, puis passa, par héritage, en 1887, au comte Marie-Victor de Vernou-Bonneuil et a été restauré après 1960. Il abritait une discothèque fréquentée par la population gay. Il a fermé définitivement ses portes.","architecture":"BUY, le château est entouré d'un mur de clôture borné par quatre pavillons carrés percés de meurtrières, le logis lui-même, de plan rectangulaire, fut remanié , les fenêtres à meneaux furent remplacées par des baies en arc segmentaire, la demeure entourée d'un mur de clôture borné par quatre pavillons carrés percés de meurtrières pendant la Réforme (vers 1560). Logis reconstruit au début du XVIIe siècle, modifié ensuite intérieurement au XVIIIe siècle. A l'intérieur, subsistent plusieurs cheminées anciennes dont celle de la cuisine au linteau supporté par des colonnes. Un plafond à caissons de terre cuite, à décor de marguerites, y est encore visible. Prolongeant le logis à droite, un bâtiment bas, occupé par les dépendances avant d'être récemment transformé en restaurant. Dans le village, le château construit au XVIIIe siècle, appartenant entre autres aux familles Goussaud et de Turnel, est devenu par la suite une habitation d'exploitation agricole.\nÉléments protégés MH : le puits dans la cour du château, les parties subsistantes de l'enceinte, y compris les quatre tours d'angle dont celle du colombier : inscription par arrêté du 13 février 1997.","habitants":"Famille Messine des Heu\"","divers":"Château de Buy  à Antilly                   49° 11' 47\" Nord,6° 13' 55\" Est","gps":"","images":["../image/image_57/57_Buy_1.jpg","../image/image_57/57_Buy_2.jpg"]},"Consult_chateau_formulairec1ae":{"id":"Consult_chateau_formulairec1ae","dept":"57","canton":"Fameck","commune":"Florange","nom":"Bétange","type":"Château","periode":"XVII","histoire":"BETANGE,  construit en 1828 puis modifié à plusieurs reprises (1856 et 1927 durant la seconde guerre mondiale, puis à la libération).\nC'est un château fortifié qui dépend de la seigneurie de Florange. Jehan de Bétanges fut ami de Phillipe de Florange. À la fin du XVe siècle, le nom de Bettingen est mentionné. Il comptait trois feux. Lors du siège de Florange en 1521, Guillaume de la Mark y fut détenu par Guillaume de Nassau, Lieutenant de Charles Quint. Puis le château de Bétange fut détruit, comme celui de Florange. Il sera reconstruit dix ans plus tard. Il appartiendra à la famille De Salm jusquen 1600. C'est toujours le fief de la seigneurie de Florange. Ce château fut remplacé en 1828 par une nouvelle construction et fut luvre de la sur de Baron dHuart. Il devint la propriété de Théodore de Gargan, en 1856. Le château de Bétange sera agrandi et embelli. En 1928, le château de Bétange est racheté par la famille Mitry. De 1940 à 1945,la famille subit lexil, et le château de Bétange fut mis, sous séquestre, par lautorité allemande.  il  est toujours la propriété de la famille Mitry.","architecture":"BETANGE, un parc à langlaise, de 60 ha, avec un plan deau, entoure la propriété. Le corps principal est flanqué, dans son prolongement, de deux ailes basses. L'ensemble est entouré d'une cour anglaise sur trois côtés et une terrasse s'ouvrant vers le jardin. Il est construit en calcaire jaune. Maçonnerie imitant le bossage à refend au premier niveau et moellon enduit. Encadrements et allèges en pierre de taille. Les distributions restées dans l'état des années 1920, témoignent du mode de vie d'une famille nombreuse de la haute bourgeoisie : services au sous-sol, salles de réceptions au rez-de-chaussée ornées de boiseries néo-XVIIIe, chambres avec salles de bain dans les étages, chambres des domestiques et lingerie dans les combles.   Éléments protégés MH : le parc du domaine y compris sa clôture, mais à l'exclusion des dépendances : inscription par arrêté du 29 juin 1993. Le château en totalité : inscription par arrêté du 16 juillet 2007.","habitants":"Famille De Salm              Famille Mitry\"","divers":"château de  Bétange à Florange                                                  49° 20' 17\" Nord, 6° 07' 01\" Est","gps":"","images":["../image/image_57/57_B%c3%a9tange_1.jpg"]},"Consult_chateau_formulairea7c1":{"id":"Consult_chateau_formulairea7c1","dept":"57","canton":"Phalsbourg","commune":"Niderviller","nom":"Carrière","type":"Château","periode":"XIX","histoire":"Deux châteaux dans cet article; Carrières et Niderviller.                       CARRIERES, une opération de diagnostic archéologique a été réalisée sur une surface de 7 967 m2, à Niderviller, un projet de construction dune unité de soin de longue durée au lieu-dit château des Carrières. Les sondages ont permis de mettre en évidence la présence de deux dépotoirs domestiques ainsi quun alignement de dés de pierres à lemplacement dun ancien jardin potager. Le premier dépotoir, dune surface denviron 100 m2, contenait essentiellement de la vaisselle domestique courante appartenant  au château, le second, dune surface denviron 12 m2, contenait des carreaux de faïence. Le château dit des Carrières se dresse dans la grande forêt de Niderviller au milieu d'un bois, au lieu-dit la Carrière dont il tire son nom. Il fut construit vers 1863 par Léopold Halphen, de Paris, pour son gendre Théodore Cerfberr qui avait créé vers 1850 la ferme modèle d'Oberviller, située à environ un kilomètre de là. L'intérieur été aménagé avec beaucoup de luxe. En 1890, Théodore Cerfber  vendit le château à un officier prussien, le baron von Stietencron qui laissa un souvenir détestable dans la région de Niderviller. D'un type peu courant en Moselle, le château, situé dans un splendide cadre de verdure, a belle allure bien que récent. C'est un bâtiment de plan rectangulaire, formé de trois corps en U, avec deux tours rondes demi-hors-oeuvre sur les angles de la façade principale, construit en briques rouges avec encadrement de baies en pierre de taille, et couvert de toits d'ardoise à la Mansart. La façade principale, à trois niveaux dont un de combles, est à sept través. Deux bâtiments rectangulaires, disposés perpendiculairement à la façade postérieure, sont encore du XIXe siècle.","architecture":"NIDERVILLER Le 22 août 1807, Jean Pons Vidil achète à la succession Custine deux forêts, dont l'une de 156 ha, appelée \"la Forêt de la Carrière\". Un demi-siècle plus tard, un parisien du nom de Léopold Haiphen acquiert ce domaine et fait construire, entre 1860 et 1863, un château dans une clairière de la forêt de Niderviller. C'est le \"château des carrières\". Sa fille unique épouse le propriétaire de la ferme d'Oberviller. En 1888, le baron Von Stietenkron, capitaine de la garde prussienne, achète l'ensemble du domaine. Personnage ombrageux, il tue, le 12 juillet 1901, un ouvrier italien qui avait traversé sa propriété, pour aller travailler à la conduite d'eau en construction. Il est acquitté par le conseil de guerre comme ayant agi en cas de légitime défense. Le tribunal civil de Saverne le condamne toutefois à verser une rente à la famille de la victime, mais la cour d'appel de Colmar annule ce jugement. Selon que vous êtes riche ou pauvre. Se sentant menacé, notre baron doit se résoudre, en 1910, à vendre sa propriété au docteur Adolf Schmidt administrateur de la firme Krupp. Ce philanthrope est enterré dans la forêt de Niderviller. Sa pierre tombale porte l'inscription suivante : \"Die Liebe höret nimmer auf\" (l'amour ne connaît pas de fin). Le docteur Schmidt ne pensait peut-être pas si bien dire! L'avenir montrera qu'il ne s'était pas trompé.  Lui-même avait créé un sanatorium dans ce château. En 1928, la congrégation des pères de Saint Camille de Lellis rachète ce dernier pour en faire un centre de désintoxication alcoolique. Incendié lors de l'offensive américaine de 1944, le château est reconstruit. Et le 24 mars 1949, Mgr Heintz, évêque de Metz, et le révérend Père Mansfeld, supérieur de la congrégation des Camilliens à Rome, inaugurent un aérium pour enfants de santé déficiente, appelé \"Centre Infantile Saint-Camille\".  Le 1er mars 1982, le centre de réadaptation spécialisé Saint-Luc d'Abreschviller rachète le château et ses 27 ha de parc et de forêts, pour en faire une maison de rééducation et de convalescence cardio-vasculaire.","habitants":"Famille de Théodore Cerfberr\"","divers":"Deux châteaux dans cet article; Carrière  grav-1-2-3 et Niderviller grav-4","gps":"","images":["../image/image_57/57_Carri%c3%a8re_1.jpg","../image/image_57/57_Carri%c3%a8re_2.jpg","../image/image_57/57_Carri%c3%a8re_3.jpg","../image/image_57/57_Carri%c3%a8re_4.jpg"]},"Consult_chateau_formulairebc74":{"id":"Consult_chateau_formulairebc74","dept":"57","canton":"Les Coteaux de Moselle","commune":"Chatel st- Germain","nom":"Chahury_Chatel","type":"Château","periode":"XX","histoire":"CHAHURY, situé au sud du village dans une étroite vallée, le château fut tour à tour la propriété des Lamy, des Duchat et des Van den Broeck qui le possédèrent de la Révolution jusqu'en 1910. Le vieux château fut rasé à cette date et remplacé par un château de style Louis XV par l'architecte messin, Adrien Collin, pour l'industriel Henri Cannepin, notamment dans les vitraux du jardin d'hiver et dans les grilles en fer forgé, réalisées par Quentin, ferronnier à Metz. Éléments protégés MH : le portail d'entrée avec sa grille en fer forgé, les façades et les toitures du château et du bâtiment des communs, le hall d'entrée, l'escalier d'honneur et les pièces avec leur décor au rez-de-chaussée, le grand salon d'accueil et le jardin d'hiver : inscription par arrêté du 15 décembre 1980.","architecture":"CHAHURY, la construction du château de Chahury date de 1910 à 1912. L'architecte était Adrien Collin, se situe au sud de Chatel-Saint-Germain dans une étroite vallée. Le vieux château sera ensuite rasé à cette date et remplacé par un nouveau château, de style Louis XV. Le bâtiment est construit en pierre de Jaumont. Son décor intérieur est influencé par l'Art Nouveau, dans les vitraux du jardin d'hiver et dans les grilles en fer forgé, réalisées par Quentin, ferronnier à Metz.","habitants":"industriel Henri Cannepin\"","divers":"Château  de  Chahury  à Chatel                            49° 74 7,93 Nord, 6° 44 56,42\" Est","gps":"","images":["../image/image_57/57_Chahury_Chatel_1.jpg","../image/image_57/57_Chahury_Chatel_2.jpg","../image/image_57/57_Chahury_Chatel_3.jpg","../image/image_57/57_Chahury_Chatel_4.jpg","../image/image_57/57_Chahury_Chatel_5.jpg","../image/image_57/57_Chahury_Chatel_6.jpg"]},"Consult_chateau_formulaired4a0":{"id":"Consult_chateau_formulaired4a0","dept":"57","canton":"Courcelles-Chaussy","commune":"Charleville sous Bois","nom":"Charleville_sous_Bois","type":"Château","periode":"XVIII","histoire":"CHARLEVILLE sous BOIS,   construit vers 1775 sur les plans de Sébastien Chais, bénédictin de l'abbaye de Saint Avold et curé de Charleville, pour son beau-frère Jean-Louis Caillou, seigneur de Valmont. Le château se dresse à l'emplacement d'une maison franche édifiée vers 1620. Il fut propriété de la famille de Vaux d'Achy, puis dans la seconde moitié du XIXe siècle l'édifice était à la famille de Vaugelet. C'est en mai 1912 que débuta la construction du château par un architecte et un grand entrepreneur de Sarrebruck pour M. Frédéric Rexroth, industriel de Sarrebruck, qui avait acquis la propriété pour ses forêts giboyeuses. La construction terminée en 1913, après l'aménagement du château, fin mai, la famille Rexroth venait y habiter et le propriétaire organisa de grandes chasses sur la propriété. Puis le domaine passa en 1922 à l'institut d'assurances sociales qui le transforma en sanatorium pour le traitement des assurés lorrains tuberculeux.  Le maitre d'oeuvre était Chais  Sébastien. Le château, ses dépendances et ses jardins sont nscrits aux M.H. le 29/06/1993.","architecture":"CHARLEVILLE sous BOIS,  pendant la seconde guerre mondiale, l'établissement accueillit durant plus d'un an des femmes d'officiers allemands, avec leurs enfants, puis, le château devint en 1944, une annexe de la maternité Sainte Croix, centre de convalescence et de moyen séjour.  Le château, adossé au sud de la petite colline sur laquelle se trouve l'église, est une austère construction de la fin du XVIIIe siècle, de plan en L,  à trois niveaux dont un de comble, avec un toit d'ardoise à croupes. La rampe en fer forgé de l'escalier en U est le seul élément qui égaye un peu la façade principale à neuf travées. Parallèle à la façade postérieure et accolé à l'aile en retour d'équerre, subsiste un bâtiment de la maison franche du début du XVIIe siècle, de plan rectangulaire, à deux niveaux, qui a conservé ses fenêtres à carreaux anciens. Dans la partie XVIIIe siècle l'une des pièces les plus intéressantes, est la chambre de Sébastien Chais, ou se trouve un globe terrestre qu'il aurait lui même fabriqué. C'est un château de la 2ème moitié du XVIIIe siècle. Sa construction daterait de 1775. Le château de Charleville-sous-Bois se dresse à lemplacement dune maison franche, édifiée vers 1620.","habitants":"Famille de Vaugelet.\"","divers":"Château  à Charleville sous Bois                           49° 11' 27,24\" Nord, 6° 24' 41,4\" Est","gps":"","images":["../image/image_57/57_Charleville_sous_Bois_1.jpg","../image/image_57/57_Charleville_sous_Bois_2.jpg"]},"Consult_chateau_formulaire870f":{"id":"Consult_chateau_formulaire870f","dept":"57","canton":"Faulquemont","commune":"Chérisey","nom":"Chérisey","type":"Château","periode":"XIV","histoire":"CHERISEY, en 1521 : attaque des habitants de Marange contre le château de Chérisey.  Les habitants de Marange, maltraités et leur vouant une haine farouche, avaient fini par entrer au service de Charles Quint et de René de Lorraine. Ils s'armèrent sous le commandement de Didier-le-Roi, l'un d'eux et allèrent forcer le château de Chérisey dont le propriétaire Warin de Chérisey, était au service de la couronne de France, sa jeune dame Anne de Montormentier, fille de haut et puissant seigneur Jean de Montormentier et de Claire de Chastenoy, que sa chemise lui imposèrent une rançon  et revinrent à Marange chargés d'un considérable butin.   En 1625 et 1628, des conférences ont lieu à Chérisey pour régler les contestations qui s'étaient élevées entre le duc de Lorraine, en 1631, début de la \"guerre de trente ans\".  Louis XIII décide d'annexer  la Lorraine. Le duc Charles IV de Lorraine, allié à l'empereur Charles Quint, résiste. Les Suédois s'allient au roi, et les Polonais, Croates, Turcs sont alliés de l'empereur. Il n'est pas un village qui ne soit pillé et brûlé. La plupart des fortifications et châteaux abattus comme celui de Chérisey en 1639 et dont il ne reste plus que le pigeonnier. En 1650 : réunion du ban de Sainte-Glossinde à la seigneurie de Chérisey après que la cause fut portée devant les Treize de Metz par Jean et Marthe de Chérisey en 1814 le château de Chérisey devient un quartier de l'armée russe commandée par le général Borasdin et le prince Scherbatoff,  puis en 1870-1871, Chérisey ou Schersingen, se trouvait sur le territoire allemand.  Les descendants directs des Chérisey, seigneurs voués au XIIIe siècle, occupèrent le château jusqu'en 1950.","architecture":"CHERISEY, Le corps de logis principal est couvert d'un toit d'ardoise à croupes, encadré par deux pavillons à toits à quatre pans, sur lesquels s'appuient les deux longues ailes ajoutées au XIXe siècle. Les deux façades sont ordonnancées à trois niveaux, dont un niveau de combles éclairé par des petites fenêtres en plein cintre. Rénovation des grilles d'entrée et remise en état du parc dessiné par Paul de Lavenne de Choulot. Depuis 1963 le parc accueille un parcours de golf, il sera redessiné par larchitecte Donald Harradine pour recevoir 18 trous.\n La construction du château de Cherisey date de 1303. Il fut détruit en 1367, par les Messins et fut reconstruit à plusieurs reprises depuis le XIVe siècle. Restructuré dans sa forme actuelle sous Richelieu. Le batiment est formé de 3 corps, de 2 tours carrées, et d'un pigeonnier du XVe siècle avec un escalier central. Le château de Chérisey a été, après le passage des troupes russes en 1814. Il fut à nouveau entièrement restauré en 1830 par l'ajout d'une orangerie (détruite depuis), la rénovation des grilles d'entrée et la remise en état du parc qui fut dessiné par Paul de Lavenne de Choulot. Les descendants directs des Chérisey, seigneurs voués au XIIIe siècle, occupèrent le château de Cherisey jusqu'en 1950. Il est inscrit aux M.H.depuis le 19/12/1986. Les éléments protégés sont la grille d'entrée, le pigeonnier, les façades et toitures du corps principal et l'orangerie.","habitants":"Famille de  Paul de Lavenne de Choulot\"","divers":"Château  de Chérisey à Chérisey                                        49° 00' 49\" Nord, 6° 14' 06\" Est","gps":"","images":["../image/image_57/57_Ch%c3%a9risey_1.jpg","../image/image_57/57_Ch%c3%a9risey_2.jpg"]},"Consult_chateau_formulaire4f96":{"id":"Consult_chateau_formulaire4f96","dept":"57","canton":"Montigny lès Metz","commune":"Montigny lès Metz","nom":"Courcelles_Moselle","type":"château","periode":"XVII","histoire":"COURCELLES,  construit en 1713 par Charles Joseph de Courcelles. Celui-ci était conseiller secrétaire du Roi,  Barbe Besser. Une première mention est lisible en 1716, sur un plan de Nicolas Duchêne comme appartenant à \"Monsieur de Courcelles\". La demeure passe ensuite en héritage à sa fille Barbe de Courcelles, épouse de jean François, marquis de Creil de Bournezeau. Le 1er septembre 1744, eurent lieu à Montigny, où les mousquetaires noirs du détachement de la garde de sa majesté logeaient, des festivités et réjouissances dans la demeure, pour célébrer la guérison du roi Louis XV, tombé gravement malade lors de son séjour à Metz. Château et parc furent vendus en 1748 à Mathurin Antoine Goussaud, seigneur de Villers-Laquenexy, par Anne Barbe de Courcelles, veuve dArnold de Ville, baron libre du Saint-Empire. Après être passée entre différentes mains, la belle maison fut acquise par Laurent Lecomte dHumbepaire, écuyer, receveur des finances à Metz. Celui-ci, ayant fait de mauvaises affaires, fit vendre la propriété aux enchères le 4 juin 1781. Elle fut adjugée à Mathieu Sébastien Louis Michelet, chevalier seigneur de Vatimont. Le domaine fut acquis en 1802 par Pierre-Charles de Baudinet de Courcelles, ancien capitaine du régiment du Bourbonnais. Celui-ci loffrit en dotation à son fils Victor, à loccasion de son mariage, en 1824. En juin 1832, il reçut au château pour un court moment Louis-Philippe et sa suite quun orage avait surpris entre Metz et Montigny. A la mort de Victor de Baudinet de Courcelles, le château passa à son fils Gustave, né en 1828 à Montigny, puis à son petit-fils Henri né en 1868. Le 22 avril 1949, après de nombreuses tractations, le contrat de vente fut signé devant Joseph Schaff, maire de Montigny, par le baron Henri de Baudinet de Courcelles et Maurice Traver, premier adjoint représentant la ville.","architecture":"COURCELLES, on y installa alors une coopérative de reconstruction, puis les locaux servirent à une école maternelle, ainsi quà un cabinet darchitectes. Petit à petit, la résidence dépérit et cest seulement en 1995 que furent élaborés des projets de réhabilitation, tant à lextérieur quà lintérieur. La municipalité envisagea plusieurs destinations pour le bâtiment: maison de retraite, restaurant. On pensa même le démolir. Le parc fut finalement loti en partie et lédifice resta inoccupé. En 2002, la municipalité décida de restaurer le château de Courcelles, avec le soutien du conseil général de la Moselle. La rénovation fut confiée aux architectes Christian François et Patricia Henrion. Les travaux débutèrent en octobre 2003. Ils ont respecté le caractère XVIIIe siècle de l'édifice, tout en lui donnant des conditions d'accueil très contemporaines. Les architectes, après une phase de relevés du bâtiment, ont fait effectuer des sondages pour révéler les différentes strates historiques. Parallèlement, ils ont entrepris une recherche des actes notariés. Commença alors un minutieux travail de restauration des portes, cimaises, corniches, parquets, effectué par des entreprises régionales spécialisées dans ce domaine, et d'adaptation du bâtiment à la modernité, tout en respectant lhistoire et le caractère de l'édifice. Proprieté de la commune.","habitants":"Famille de Courcelles\"","divers":"château de Courcelle à  Montigny lès Metz                        : 49° 06' 02\" Nord, 6° 09' 14\" Est","gps":"","images":["../image/image_57/57_Courcelles_Moselle_1.jpg","../image/image_57/57_Courcelles_Moselle_2.jpg","../image/image_57/57_Courcelles_Moselle_3.jpg"]},"Consult_chateau_formulairedab6":{"id":"Consult_chateau_formulairedab6","dept":"57","canton":"Le Saulnois","commune":"Craincourt","nom":"Craincourt","type":"Maison-forte","periode":"XVI-XVII","histoire":"CRAINCOURT, la maison forte actuelle fut peut être construite par Balthazard et Georges de Craincourt, qui firent leurs reprises en 1480. puis en 1536 par Philippe de Craincourt. Par extinction du lignage au milieu du XVIe siècle, la seigneurie revint par alliance aux Haraucourt et à la famille d'Einville. En 1568, Perrin de Haraucourt, puis en 1581 Nicolas d'Einville, seigneur de Guéblange. A la fin du XVIe siècle, Graincourt revint à Nicolas de Greische, seigneur de Biffontaine, époux de Marie d'Einville en 1595, en 1596, suivi en 1625 par Jean et Claude de Greische, et en 1663 par Jean de Greische. C'est sans doute entre les années 1596 et 1625 que la maison-forte fut remaniée; construction de deux tours carrées et d'un colombier, escalier à l'italienne, reprise des percements. Dans les années 1730, les intérieurs furent réaménagés et un nouveau portail édifié peut être par Nicolas d'Aglars, qui avait épousé en 1729 Catherine Eléonore de Greische, fille de Jean François et de Claude Catherine de Greische, fille de Jallaucourt. En 1772, le fief était tenu par Jean-Claude Vaultrin, avocat à la cour; de cette époque paraissent dater la plupart des cheminées du château.","architecture":"CRAINCOURT,  le bâtiment, de plan rectangulaire, est épaulé par deux pavillons carrés aux extrémités de la façade Ouest, et une tour ronde sur l'angle nord-est. Les dépendances transformées au XIXe siècle encadrent la cour fermée au nord par un mur de clôture flanqué d'un pigeonnier de plan carré; ce mur est percé d'un portail, donnant accès au domaine. Le portail à porte charretière en anse de panier est encadré de pilastres ioniques supportant un entablement mouluré que couronne un fronton cintré daté 1728, aux armoiries bûchées, la tour ronde hors-oeuvre nord, en moellons régulièrement assisés pourrait être de même époque, tous ses percements ayant néanmoins été murés ou repris. Les façades Est (sur cour) et ouest ont perdu leurs percements médiévaux, peut-être murés sous les enduits. Les deux pavillons carrés à l'ouest sont des adjonctions peut être du début du XVIIe siècle. À la fin du XVIe siècle ou au début du XVIIe siècle, a été repercé le logis. La façade nord, la plus homogène, s'ordonne sur deux travées de larges fenêtres à meneaux aux appuis gravés, sous la tablette, d'un réseau de losanges pointés, décor qui se retrouve sous les deux hautes fenêtres à simple croisée marquant les deux niveaux de la tour ronde. La terrasse ouest, sans doute créée au XVIIIe siècle a dû occulter les flanquements du mur correspondant. A noter que la porte fenêtre du rez-de-chaussée sur terrasse était à l'origine une fenêtre que l'on à abaissée en supprimant le meneau inférieur. Les canonnières de Craincourt ont sans doute été aménagées à la fin du XVIe siècle, ou au début du XVIIe siècle, qui était marquée dans l'espace lorrain par une période de grande insécurité. Il n'est pas impossible qu'elles soient postérieures aux travaux de réaménagement du logis, réalisés par les de Greische autour de 1600.","habitants":"Famille de  Jean de Greische\"","divers":"Maison-forte à  Craincourt                                               48° 52' 32? N, 6° 19' 16? E","gps":"","images":["../image/image_57/57_Craincourt_1.jpg","../image/image_57/57_Craincourt_2.jpg","../image/image_57/57_Craincourt_3.jpg","../image/image_57/57_Craincourt_4.jpg"]},"Consult_chateau_formulairef088":{"id":"Consult_chateau_formulairef088","dept":"57","canton":"Le Saulnois","commune":"Delme","nom":"Delme","type":"Château","periode":"XVII","histoire":"Deux châteaux dans cet article; Delme  et Oriocourt.                                                           DELME   Il semble que ce que l'on a appelé le château, au début du XIVe siècle, est appartenu aux propriétaires du fief de Delme constitué à la fin du XVIe siècle en faveur de la famille de Rennel et distinct de la seigneurie. Ce fief passa aux Tardvenu puis avant 1662 à Louis Busselot jusqu'en 1756. En 1774 il était aux mains de Jean-Melchior Goullet de Rugy dont la famille conserva la propriété pendant tout le XIXe siècle.         ORIOCOURT à deux K.M.au sud, fut construit par François-Elie-Antoine de Rocheret, seigneur d'Oriocourt, capitaine au régiment de Languedoc-infanterie et sa femme Antoinette Busselot. Une pierre portant leur nom et la date 1724, encastrée dans un mur des dépendances à l'est, indique l'année de sa construction. Celui ci passa ensuite à la famille Busselot. Vendu en 1796 comme bien national de l'émigré Jean-Baptiste Chatel, il fut acquis par Antoine Vatelot, architecte à Vic, Antoine Thomy, de Château-Salins, et Joseph Laurent de Nancy. Nicolas Didier, propriétaire à Oriocourt, racheta en 1814 et 1820 les parts de ces trois propriétaires.","architecture":"DELME, le château se présente comme un bâtiment de plan massé, formé de quatre corps délimitant une petite cour intérieure. Les grands corps latéraux, à l'est et à l'ouest, sont couverts de toits à deux versants à faible pente avec croupe au sud et les petits corps transversaux de toits en appentis. Les façades latérales ont conservé leurs croisées tandis que la façade principale, au sud, a été en grande partie repercée au XVIIIe siècle. Un mur de clôture avec une tour circulaire à canonnière, sur l'angle nord-est, aujourd'hui tronquée, ferme la propriété du côté de la rue et des dépendances entourent sur les trois autres côtés la grande cour du château.                                                                                                                  ORIOCOURT, ses enfants vendirent le château aux religieuses bénédictines de Flavigny sur Moselle, qui l'aménagèrent en pensionnat et construisirent à côté de nouveaux bâtiments, le cloître en 1865 et la chapelle bénite en 1892. Le château, de plan rectangulaire avec avant-corps latéraux sur la façade antérieure, est couvert d'un toit d'ardoise à croupes. La façade principale, d'une ordonnance symétrique, est à trois niveaux de neuf travées.","habitants":"Famille de Jean-Melchior Goullet de Rugy                                      Oriocourt; Famille  Busselot\"","divers":"Deux châteaux dans cet article; Delme Grav-1_2 et Oriocourt     grav-3.   48° 51' 56? N, 6° 24' 53? E","gps":"","images":["../image/image_57/57_Delme_1.jpg","../image/image_57/57_Delme_2.jpg","../image/image_57/57_Delme_3.jpg"]},"Consult_chateau_formulairee73d":{"id":"Consult_chateau_formulairee73d","dept":"57","canton":"Metzervisse","commune":"Distroff","nom":"Distroff","type":"Château","periode":"XV-XVII","histoire":"Deux châteaux  dans cet article , Distroff et Inglange.                                                 DISTROFF, la seigneurie appartenait en 1495 à Georges de Schifflange, puis échut par mariage à Bernard de Gondersdorff, dont la famille resta propriétaire jusqu'au milieu du XVIIe siècle. Elle fut acquise en 1665 par Samuel Duclos, conseiller et médecin ordinaire du roi,  de la ville de Metz, puis passa à son gendre Jean-Baptiste-Pantaléon Durand par diverses acquisitions. Du château primitif construit au XVe siècle, seules restent les tours nord-ouest et sud-ouest. Au milieu du XVIIIe siècle, François Benoît Durand fait reconstruire la demeure. La chapelle castrale est reconstruite en 1736. Le portail d'accès à la cour du château est bâti en 1771. François Michel Durand ajoute en 1771 un bâtiment au sud-est de la cour afin d'abriter la bibliothèque et loger les employés. Ce bâtiment est reconstruit au milieu du XIXe siècle en même temps que la plupart des dépendances. La chapelle castrale fait office d'église paroissiale jusqu'en 1910 et est démolie en 1956, à l'exception de la tour clocher.","architecture":"au nord -est de Distroff à deux K.M. INGLANGE, l'importante seigneurie d'Inglange relevait directement des ducs de Luxembourg. Après le rattachement du Luxembourg français à la couronne de France, Inglange comme la presque totalité des seigneuries de la région est racheté par une famille d'origine française. Le château échut, par le jeu des héritages, à la fin du XIXe siècle à Théodore de Puymaigre, poète, historien et érudit local très estimé. Château construit ou reconstruit au XVIIe siècle, puis transformé au XVIIIe siècle, et restauré au XXe siècle. C'est une construction très simple, plus charmante que belle, écrasée sous un haut toit d'ardoises qui enveloppe les différents éléments du bâtiment et lui donne son unité. Un pigeonnier, dont la toiture d'ardoises très élaborée évoquait déjà les clochers à bulbe d'Europe centrale, a été simplifié lors de restaurations récentes. Une fenêtre en accolade, surmontée d'un écusson aux armes des Raville, orne un pavillon prolongeant l'extrémité gauche de la façade principale. Elle provient d'un autre monument; les Raville, importante famille féodale de la région, n'ayant jamais possédé Inglange.","habitants":"Distroff-Bernard de Gondersdorff                       Inglange;  Théodore de Puymaigre,\"","divers":"Deux châteaux  dans cet article, Distroff grav-1-2-3 et Inglange grav-4                                                              Distroff  49° 19' 54? N, 6° 15' 40? E","gps":"","images":["../image/image_57/57_Distroff_1.jpg","../image/image_57/57_Distroff_2.jpg","../image/image_57/57_Distroff_3.jpg","../image/image_57/57_Distroff_4.jpg"]},"Consult_chateau_formulaire59a2":{"id":"Consult_chateau_formulaire59a2","dept":"57","canton":"Forbach","commune":"Cocheren","nom":"Ditschviller","type":"Château","periode":"XVII","histoire":"DITSCHVILLER, résidence d'été et rendez-vous de chasse de Henning, baron de Stralenheim, comte de Forbach, fut construit en 1717 par l'architecte Jonas-Erickson Sundahl. Restauré vers 1852, le château changea au XIXe siècle huit fois de propriétaire avant d'être acquis après 1920 par la compagnie des Houillères de Sarre-et-Moselle. Il appartient aujourd'hui aux Houillères du Bassin Lorrain. En face du mont Hérapel, le château est un bâtiment rectangulaire prolongé à droite par deux ailes sur le même alignement, chacune plus basse d'un niveau. La façade principale, largement percée et bien qu'en partie remaniée, est à trois niveaux de cinq travées de fenêtres à linteau en arc segmentaire, le troisième niveau étant ouvert dans le brisis du toit à la Mansart couvert d'ardoise.","architecture":"DITSCHVILLER , en face du mont Hérapel, le château est un bâtiment rectangulaire prolongé à droite par deux ailes sur le même alignement, chacune plus basse d'un niveau. La façade principale, largement percée et bien qu'en partie remaniée, est à trois niveaux de cinq travées de fenêtres à linteau en arc segmentaire, le troisième niveau étant ouvert dans le brisis du toit à la Mansart couvert d'ardoise. Les deux ailes sont couronnées par la balustre de pierre d'une ancienne terrasse. Une porte cochère en anse de panier, dotée d'un encadrement à ébrasement concave, est ouverte dans la première aile. La façade postérieure présente une parti semblable.","habitants":"Houillières de Lorraine\"","divers":"Château de  Ditschviller à                    Cocheren                                                        49° 08' 51? N, 6° 50' 31? E","gps":"","images":["../image/image_57/57_Ditschviller_1.jpg","../image/image_57/57_Ditschviller_2.jpg"]},"Consult_chateau_formulaire2a80":{"id":"Consult_chateau_formulaire2a80","dept":"57","canton":"Thionville","commune":"Thionville_Guentrange","nom":"Donnerscheuer","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article; Donnerscheuer et le Hof.                              DONNERSCHEUER,  l'important domaine rural de l'époque que représente le premier château de Guentrange est situé à quelques mètres à l'ouest de la rue du Crève Coeur, à l'angle du sentier des Amoureux et de la rue de l'Abreuvoir. Le château et ses dépendances sont attribués en 1611 au baron d'Eltz, lequel vend la propriété à Jean Valentin Klein, échevin à Thionville et son épouse, née Marie-Elisabeth de Friederiche à qui revient la propriété lors du décès de son mari en 1674. C'est une construction très simple, de la fin du XVIe ou du début du XVIIe siècle, d'un étage sur rez-de-chaussée, surmonté d'un demi-étage à fenêtres carrées sous un vaste toit à quatre pentes, flanquée d'une tour carrée massive de la même hauteur que le reste du bâtiment. De solides contreforts subsistent aux angles. Fossés et douves ont existé jusqu'en 1880. A proximité immédiate, d'élégants communs couverts de tuiles romaines sont dominés par un pigeonnier carré à toit pointu.","architecture":"Le HOF, le château du Hof construit après 1756 par le comte de la Touraille, ami de Voltaire, est charmant dans sa simplicité. Le corps de bâtiment principal, crépi, dont l'architecture rappelle celle du château de la Grange à Manom, comporte un seul étage à sept fenêtres sur rez-de-chaussée, surmonté d'un toit à la française également galbé à quatre pentes, agrémenté de trois mansardes aux encadrements de pierre moulurée. Il est flanqué de deux petits pavillons symétriques, constitués d'un seul rez-de-chaussée et coiffés de toits appuyés sur les façades latérales. Comme à la Grange, les seuls ornements sont les entourages de fenêtres à clefs en pierre et aux angles, des chaînages en pierre très soignés. Les communs, couverts de tuiles romaines, sont particulièrement plaisants. On y remarque un fort joli escalier extérieur en fer forgé auquel s'adosse un puits. Éléments protégés MH : les façades et les toitures ; les deux chambres à l'étage ; les portails avec leurs grilles : inscription par arrêté du 14 décembre 1992.","habitants":"Famille de  Jean Valentin Klein                Hoff; comte de la Touraille\"","divers":"Deux châteaux dans cet article; à Thionville Donnerscheuer et le Hof grav 1.                                                           49° 22' 21? N, 6° 08' 33? Est","gps":"","images":["../image/image_57/57_Donnerscheuer_1.jpg","../image/image_57/57_Donnerscheuer_2.jpg","../image/image_57/57_Donnerscheuer_3.jpg","../image/image_57/57_Donnerscheuer_4.jpg"]},"Consult_chateau_formulaire9c03":{"id":"Consult_chateau_formulaire9c03","dept":"57","canton":"Phalsbourg","commune":"Phalsbourg","nom":"Einartzhausen","type":"Château","periode":"XVI","histoire":"EINARTZHAUSEN, la ville neuve de Phalsbourg fut créée en 1568 par Georges-Jean de Veldenz, comte palatin. Associé à un village qui s'appelait Einhartshausen, pré-existait un château qui avait été fondé en 1390 par le comte Henri de Lutzelstein, afin de commander le passage des cols vosgiens. Le comte Georges-Jean de Veldenz ayant hérité du comté de la Petite-Pierre en 1553, l'un de ses premiers soins fut de rénover le château et de le reconstruire en style de la Renaissance. Le rez-de-chaussée est conservé en grande partie et sert de sous-sol à la maison faisant office d'auberge de jeunesse. La construction est datée de 1568 par une inscription. Le comte palatin vendit Phalsbourg au duc de Lorraine Charles III. Ce dernier en pri
