t possession en 1588.","architecture":"EINARTZHAUSEN, a  partir de cette époque, Phalsbourg fut doté de fortifications bastionnées qu'une gravure de Tassin représente dans son état d'achèvement en 1633. Ce qu'il en reste aujourd'hui est ce qui a pu être intégré par Vauban dans ses plans lorsqu'il modernisa toutes les fortifications de Phalsbourg au XVIIe siècle.Il est classé aux M.H. depuis 1937. Les fondations du château datent de 1560. Son nom fait référence à sa proximité avec un village voisin, situé sur les terres constituant la dot de la princesse Anna Maria, épouse du fondateur de la ville de Phalsbourg. Château dEinhartzhausen, le premier fondé en 1390 par le comte Henri de Lutzelstein fut construit afin de commander le passage des cols vosgiens. En 1568, le Comte Georges-Jean de Veldenz fit reconstruire le château dans un style Renaissance. Il a été vendu, en 1588, au duc de Lorraine Charles III de Lorraine. Le château d'Einartzhausen est la propriété de l'Etat. Il sert à accueillir de nombreuses manifestations culturelles. Éléments protégés MH : le château d'Einartzhausen : inscription par arrêté du 5 mars 1937.","habitants":"duc de Lorraine Charles III\"","divers":"Château d' Einartzhausen  à    Phalsbourg                                            48° 45' 56,27\" Nord, 7° 15' 39,31\" Est","gps":"","images":["../image/image_57/57_Einartzhausen_1.jpg"]},"Consult_chateau_formulaire3aca":{"id":"Consult_chateau_formulaire3aca","dept":"57","canton":"Courcelles-Chaussy","commune":"Ennery","nom":"Ennery","type":"Château","periode":"XIV","histoire":"ENNERY, une des plus imposantes forteresses du pays messin fut acquis au début du XIVe siècle par Thiébault de Heu, maître échevin de Metz en 1314. Le château médiéval, transformé au XVIIIe siècle en une maison plus confortable, fut acheté en 1810 par le notaire Purnot, de Metz, puis par Louis Hébert, ancien capitaine du génie, qui installa dans le bâtiment ouest des dépendances une importante distillerie transformée en 1879 en brasserie. La famille Hébert conserva le château jusqu'en 1879 qui passa à cette époque au comte Ernest de Tocqueville.","architecture":"ENNERY; construit sur une terrasse carrée délimitée par un mur de clôture cantonné de tours rondes ouvertes à la gorge, aujourd'hui tronquées, et entouré d'un large fossé, autrefois rempli d'eau, qui subsiste encore, le château, reconstruit au XVIIIe siècle suivant des dimensions réduites, est un bâtiment de plan rectangulaire à deux niveaux couvert d'un haut toit en croupes, avec deux tours rondes sur les angles nord-ouest et sud-ouest. Deux tours rondes à toit conique, sur les angles extérieurs au nord, subsistent quoique en mauvais état","habitants":"Famille Hébert\"","divers":"Château à Ennery                                             49° 06' 11? N, 6° 09' 29? Est","gps":"","images":["../image/image_57/57_Ennery_1.jpg","../image/image_57/57_Ennery_2.jpg","../image/image_57/57_Ennery_3.jpg","../image/image_57/57_Ennery_4.jpg"]},"Consult_chateau_formulaireea74":{"id":"Consult_chateau_formulaireea74","dept":"57","canton":"Moulins lès  Metz","commune":"Moulins lès  Metz","nom":"Ermitage_St_Jean","type":"Château","periode":"XVII","histoire":"ERMITAGE St-Jean, en 1368, il est question dune tour, en 1403 et en 1479, il est mentionné « un château, une forte-maison ». Il semble donc avoir été construit entre ces deux dates. Il dut être très tôt aux mains de la famille de Laitre, maître-échevin, comme lindiquait une stèle armoriée en pierre de Jaumont, avec cadran solaire du XVe siècle, qui se trouvait devant le château au début du XXe siècle. Nayant pas dhéritiers, le domaine revint à deux filles de Nemmery Noiron qui le vendirent en Janvier 1426 à Nicole Grognat. Ce domaine régulièrement dévasté fut le terrain de beaucoup dévénements guerriers entre 1415 et 1711.  Le château, appelé en 1960, « petit château ou forte-maison », était situé sur le ban Noiron, qui par moitié, était détenu par la famille Baudoche. Bien que faisant partie du fief, elle ne loccupa jamais.  De nombreux propriétaires, nobles ou bourgeois aisés, se succédèrent entre ses dates. A partir de 1711, le château de Grognant devint, par déformation château de Grignant. Sous la révolution, ses occupants ayant émigré, même celles, en 1901, du maire Allemand de Metz, le domaine appartient maintenant, depuis 1923, à la mense épiscopale du diocèse de Metz, c'est-à-dire à lévêché de Metz. Lassociation «LErmitage St Jean » en assure la gestion.","architecture":"ERMITAGE-St-Jean,  fut vendu comme bien national.  En 1855, suivant un acte de vente, le château était composé « dune maison dhabitation avec bûcher, pressoir, écuries, remises, cellier, étable, habitation de jardinier, buanderie, salle de bains, orangerie, hallier, cours, fossés, lavoir couvert et terrasse, jardins potager et dagrément avec plusieurs points deau, charmille, kiosque et bosquets, le tout entouré de murs ouvrant par une grille sur la route impériale de Metz à Paris, occupant une superficie de trois hectares.  Après être passé par diverses mains depuis 1789. Le ruisseau de Montvaux baigne le pied des murailles.  Le pont, à lentrée, est à lemplacement de lancien pont-levis.  Corps de logis de plan carré sur trois niveaux , flanqué de tours rondes aux angles  toit en poivrières. Au Moyen-Âge, le territoire de Moulins-Les-Metz formait cinq seigneuries de haute, moyenne et basse justice ayant chacune un secteur bien délimité ou ban.","habitants":"Famille Baudoche\"","divers":"Château d'Ermitage à Moulins les Metz                                                                   grav 2-3                 49° 06' 23? N, 6° 06' 19? E","gps":"","images":["../image/image_57/57_Ermitage_St_Jean_1.jpg","../image/image_57/57_Ermitage_St_Jean_2.jpg","../image/image_57/57_Ermitage_St_Jean_3.jpg"]},"Consult_chateau_formulairece8c":{"id":"Consult_chateau_formulairece8c","dept":"57","canton":"Courcelles-Chaussy","commune":"Mey","nom":"Espagne","type":"Château","periode":"XVIII","histoire":"ESPAGNE, la terre de Mey appartenait au Moyen-Age aux seigneurs de Sancy dont les armoiries étaient dazur, à une étoile de six rais dor. Le château de Mey est dit château Espagne car il était la demeure du général comte Espagne et de sa famille au XIXe siècle. Il a été acquis en 1808 comme résidence dété. La bâtisse a aussi accueilli les peintres Théodore Devilly et Laurent-Charles Maréchal. Ce dernier avait un fils, Charles-Raphaël Maréchal, peintre également. C'est là en tout cas qu'il se lie avec de futurs généraux dEmpire, Jean-Louis Espagne, Louis-Chrétien Carrière de Beaumont, Joseph Piston. Leur amitié et leurs exploits inspireront sans doute le roman les Trois Mousquetaires. Le nom du général Espagne est inscrit sur le côté sud de lArc de Triomphe de l'Étoile. Les noms de ses compagnons, les généraux Dumas et Carrière de Beaumont, y figurent également.","architecture":"ESPAGNE, la construction  date du XVIIIe au XIXe siècle, est inscrit aux M.H. depuis le 25/06/1986, demeure du XIXe siècle ayant appartenu au général dEmpire du même nom. Ce château a été le témoin dune activité culturelle intense, à lépoque romantique, dans la mouvance Saint-Simonienne, la famille Espagne côtoyant les salons littéraires, les musiciens, les philosophes et les peintres de lÉcole de Metz. Le peintre Émile Knoepfler, élève de Delacroix, était dailleurs un petit-fils du général. Le général Jean-Louis Espagne est connu pour avoir été lami du général Dumas, père d'Alexandre Dumas selon lequel, il se serait vite rendu célèbre dans le régiment par ses prouesses herculéennes.  Le château est une propriété privée, fermée au public. Les éléments protégés par les M.H. sont la maison, le portail, le pigeonnier et les communs par arrêté du 25/06/1986.","habitants":"Général Comte Espagne\"","divers":"Château  Espagne  à  Mey                       49° 08' 14\" Nord, 6° 14' 12\" Est","gps":"","images":["../image/image_57/57_Espagne_1.jpg","../image/image_57/57_Espagne_2.jpg"]},"Consult_chateau_formulaire9944-2":{"id":"Consult_chateau_formulaire9944-2","dept":"57","canton":"Courcelles-Chaussy","commune":"les Etangs","nom":"Etangs","type":"Château","periode":"XVI","histoire":"ETANGS, a l'origine, la famille de Borfer, lignage chevaleresque cité de 1137 à 1310, possédait les étangs en alleu. Ensuite deux fiefs se constituèrent. Le village faisait partie de la châtellenie Lorraine de Boulay. Le château-fort avec les hameaux Beuverie et Bruyère, le moulin de Banfey et 1000 arpents de forêts avec deux étangs, formaient une seigneurie, celle-ci relevait des Créhange depuis le début du XVe siècle et demeura sous suzeraineté luxembourgeoise jusqu'en 1552, au titre de la baronnerie de Ravine. Depuis, ce fief a été donné à des familles messines: Drouin (1362 à 1426), Le Hongre en 1426, Baudoche de 1489 à 1552 pour la moitié, Desch (1488 à 1549), Raigecourt (1550 à 1639). De 1679 à 1858, la famille de Blair le posséda en totalité depuis 1700. Aux XVe et XVIe siècles, le château est abattu en 1404 par une coalition féodale, mais semble avoir été épargné par le raid messin de 1444. En 1490, la place était brûlée et ruinée en grande partie par les Lorrains et en 1518, c'est la ville qui était incendiée lors de la guerre entre la ville de Metz et Robert de la Marck. En 1552 enfin ; il semble que c'est le château qui ait été incendié et ruiné par les français, dans des proportions sans doute limitées ayant permis sa rénovation. De fait, en 1681, Louise de Marsal, dame de la seigneurie du château, fit hommage au Roi de France pour \"le château à pont-levis et fossés tout alentour avec trois tours, un colombier dans l'une d'icelle\". Remanié au XVIIIe siècle et sous le second Empire où ses façades sud et Est ont été percées de fenêtres, il a perdu ses fossés et son pont-levis.","architecture":"ETANGS, le château est constitué de trois corps de bâtiments et dun donjon rectangulaire massif situé à louest, ménageant au centre une cour, les bâtiments qui forment un trapèze sont flanqués de quatre tours rondes, les deux tours sud sont accolées au donjon à la manière d'une barbacane avec ses orifices de tir. La tour nord de plan circulaire présente une ogive sculptée, des fenêtres à coussièges, ainsi qu'un sol en terres cuites décorées, il s'agit sans doute de la chapelle privée des seigneurs du château qui fut abandonnée en 1743 après la construction de la chapelle castrale. L'aile Nord offre une monumentale cheminée et son four à pain. La tour Nord-Est de plan plus irrégulier présente un toit d'ardoise en pavillon. Le donjon massif, situé coté ouest, offre quatre niveaux de fenêtres à meneau. Ce type de fenêtres se retrouve sur le corps Nord du bâtiment.  Le château est remanié aux XVIIIe et XIXe siècles afin d'en faire un ensemble résidentiel : les façades Est et Sud sont percées de hautes fenêtres rectangulaires en pierre de Servigny,                                                                                                                    Malgré ces transformations, il conserve cependant l'aspect de grosse maison forte qui était le sien au XVIe siècle, avec ses trois tours encore présentes et les deux en avancée du donjon à l'Ouest.  Éléments protégés MH : les façades et les toitures du château ; le sol de la cour et des terrasses ; la salle de la tour nord avec son sol : inscription par arrêté du 26 novembre 2004.","habitants":"Famille Louise de Marsal\"","divers":"Château de l' Etangs 49° 08' 28? N, 6° 22' 36? Est","gps":"","images":["../image/image_57/57_Etangs_1.jpg","../image/image_57/57_Etangs_2.jpg","../image/image_57/57_Etangs_3.jpg","../image/image_57/57_Etangs_4.jpg"]},"Consult_chateau_formulaire3523":{"id":"Consult_chateau_formulaire3523","dept":"57","canton":"Moulins lès Metz","commune":"Moulins lès Metz","nom":"Fabert_Grignan","type":"Château","periode":"XVIII-XIX","histoire":"Deux châteaux dans cet article; Fabert et Grignan.                                FABERT, c'est sans doute en raison de sa valeur stratégique évidente que le passage de la Moselle à Moulins justifia la présence de deux maisons fortes. La première étant le château Grignan et l'autre le château Fabert. Construite primitivement pour le domaine épiscopal et donnée en fief aux Neufchâtel puis aux Hacque, la maison forte appartenait en 1415 à Poince Groignat et en 1444 à Jean de Vy. Passée en 1455 entre les mains des familles Dieuamy, le Hungre et Baudoche, par sa mise en gage par Conrad Bayer de Boppard, évêque de Letz, la terre de Moulins fut achetée en 1590 par Pierre-Abraham Fabert, père du futur maréchal de France et fils de Mangin Fabert qui, venant de Strasbourg avait été directeur de l'imprimerie ducal à Nancy. Fabert obtint en 1603 de Henri IV des lettres de noblesses. Le château et la seigneurie restèrent entre les mains de sa famille jusqu'à la fin du XVIIIe siècle. L'aile nord, détruite par un incendie au début du XIXe siècle, fut reconstruite peu après. Les différents corps acquis par la commune de Moulins en 1951 sont maintenant loués en appartements.  Le château Fabert est un long bâtiment rectangulaire formé de trois corps en U disposés autour d'une cour étroite et cantonné de tours rondes à toits coniques. Le corps central est un haut bâtiment rectangulaire couvert d'un toit d'ardoise à croupes et percé de fenêtres sur quatre niveaux. Seules les fenêtres à meneau sont anciennes. L'aile gauche n'a conservé qu'au troisième niveau ses croisées, les fenêtres des deux premiers niveaux ayant été repercées au XIXe siècle, sans doute à l'époque où fut reconstruite l'aile nord. Les transformations actuelles et celles du XIXe siècle, qui ont  affecté les façades, n'ont pas, en revanche, modifié l'allure encore médiévale du château. Bien que de conception traditionnelle, il se distingue des châteaux lorrains de ce type par la hauteur de ses façades et sa massivité encore accentuée par l'étroitesse de la cour. Éléments protégés MH : les façades et les toitures du château : inscription par arrêté du 9 avril 1990.","architecture":"GRIGNAN,   élevé sur la partie du ban Noiron détenu en fief par les Baudoche, un des cinq bans dont était constitué Moulins au moyen-age, le château de Grignan fut sans doute construit à la fin de XIVe siècle, entre 1368, date à laquelle il est fait mention d'une tour et 1403, ou il est question d'un château. Le premier propriétaire en fut Poincé Groignat, chevalier, car 1415 c'est la \"forte maison du seigneur Poince Groignat\" que Henry de la Tour, seigneur de Sancy et féal du duc Charles de Lorraine, abattit. Elle fut reconstruite aussitôt et les tours qui subsistent aujourd'hui sont sans doute les vestiges de cette demeure. Reprise en 1444 par charles VII, roi de France et René d'anjou, duc de Lorraine, au moment du siège de Metz, elle resta dans la famille Groignat jusqu'en  1474 puis passa par mariage aux Chaverson. En 1590, la seigneurie fut acquise par Abraham Fabert, maître imprimeur à Metz, père du célèbre maréchal de France et propriétaire du château Fabert, mais il ne fut jamais propriétaire du château de Grignan. Sa famille conserva la seigneurie jusqu'à la Révolution mais, en 1681, le château passait à Sébastien Besseur, conseiller du roi et trésorier de ses finances. Aux XVIIIe et XIXe siècles de nombreux propriétaires se succédèrent au château qui fut racheté en 1923 par l'Association de l'Ermitage Saint Jean pour en faire une maison de retraites spirituelles. Le château Grignan se présente actuellement comme un important bâtiment de plan massé encadré de deux tours rondes sur la façade postérieure. Au sud, à l'extérieur du fossé, des dépendances du XVIIIe siècle encore bien conservées encadrent une cour pavée. Très transformé au XIXe siècle et entièrement repercé sur trois niveaux de hautes fenêtres rectangulaires, entouré de bâtiments modernes après 1923, le château a perdu beaucoup de son intérêt.","habitants":"Famille de Fabert et Grignan;                              Famille de Fabert    \"","divers":"Deux châteaux de Moulins lès Metz dans cet article; Fabert grav 4-5-6-7 mairie grav 8 et Grignan. grav-1-2-3                             Fabert 49° 6' 21,48\" Nord, 6° 6' 26,48\" Est                                                 49° 06' 21? N, 6° 06' 26? Est","gps":"","images":["../image/image_57/57_Fabert_Grignan_1.jpg","../image/image_57/57_Fabert_Grignan_2.jpg","../image/image_57/57_Fabert_Grignan_3.jpg","../image/image_57/57_Fabert_Grignan_4.jpg","../image/image_57/57_Fabert_Grignan_5.jpg","../image/image_57/57_Fabert_Grignan_6.jpg","../image/image_57/57_Fabert_Grignan_7.jpg","../image/image_57/57_Fabert_Grignan_8.jpg"]},"Consult_chateau_formulaireb1c4":{"id":"Consult_chateau_formulaireb1c4","dept":"57","canton":"Bitche","commune":"Philippsbourg","nom":"Falkenstein_Fort","type":"Vestiges","periode":"XII-XIII","histoire":"Deux châteaux dans cet article Falkenstein et Rothenbourg.                  FALKENSTEIN, c'est un ancien chateau fort de style Médiéval, sa construction date de 1246 et 1250, construit pour le comte Pierre de Lutzelbourg, est mentionné en 1127. En 1150, Renaud, fils de Pierre, meurt sans laisser de descendant. Le château est alors partagé entre Folmar de Sarrewerden et la famille de Hohenstaufen. Jacques de Falkenstein apparaît comme témoin dans une charte signée à Haguenau en 1205 et en 1316, Gottfried, Conrad, Heinrich et Jacob de Falkenstein jurent la paix avec la ville de Strasbourg. Une paix castrale est signée en 1335, délimitant le château en trois parts au moyen de murs transversaux. En 1419, Jean de Finstingen (Fénétrange) se dit seigneur de Falkenstein puisque usufruitier de la part des Sarrewerden ; en 1474 a lieu une convention de pariage, entre les Falkenstein : aucune part ne doit être cédée, même à un autre membre de la famille, sans l'accord des autres pariers. Le château revient aux comtes de Deux-Ponts-Bitche en 1479 et en 1482-1483 éclate un conflit pour le non-respect de la convention. Les Falkenstein sont seuls maîtres du château en 1515 et la modernisation commencée par Balthasar est continuée par ses fils.  En 1564, Philippe IV (1538-1590), le comte de Hanau-Lichtenberg, le rachète  aux enfants et petits-enfants de Balthasar et, quelques mois plus tard, il fut complètement détruit par un incendie et ne fut jamais reconstruit. Il ne reste que des ruines, aujourd'hui. Il est classé aux M.H. depuis le 16.02.1930.","architecture":"ROTHENBOURG, cet ancien château fort était de style Médiéval. Il a été construit du IXe au XIIIe siècle. Le château de Rothenbourg, situé sur la hauteur, appelé Rothenberg ou Rodenberg, au nord du Falkenstein, remonte au IXe siècle. Vers l'an 912, l'évêque de Strasbourg, Otbert, chassé par des sujets révoltés, se réfugia à la Rathburg qui est peut-être Rothenburg, et y fut assassiné peu de temps après. Rothenburg appartenait en partie, au XIVe siècle, au comte Walram de Deux-Ponts-Bitche qui le donna en fief, en 1353, à Gerhard Harnasch de Weikirchen. En 1369, Rothenburg fut pris et détruit par les strasbourgeois. Le château de Rothenbourg paraît avoir donné son nom, à la famille Blick de Rothenburg, qui possédait plusieurs fiefs des sires de Bitche, et qui s'est éteinte en 1749.","habitants":"Falkenstein; Famille de Hohenstaufen                   Rothenbourg; Gerhard Harnasch de Weikirchen.\"","divers":"Deux châteaux dans cet article Falkenstein grav-1-2 et  vestpges Rothenbourg. 49° 0' 16,92\" Nord, 7° 33' 56,16\" Est","gps":"","images":["../image/image_57/57_Falkenstein_Fort_1.jpg","../image/image_57/57_Falkenstein_Fort_2.jpg"]},"Consult_chateau_formulaire31ea":{"id":"Consult_chateau_formulaire31ea","dept":"57","canton":"Le Pays messin","commune":"Ogy-Montoy-Flanville","nom":"Flanville","type":"Château","periode":"XVI","histoire":"FLANVILLE,  récemment restauré, le château  a conservé son haut mur à créneaux et sa tour ronde. Les propriétaires ont été : la famille Lapointe, le comte Adolphe-Georges-Balthazard Lamberty (capitaine au 2e régiment de la garde royale), le baron de Joybert (jusquen 1849).Vers 1560, la famille Pierron de Bettainvillers sétait rendue acquéreur de lune des deux seigneuries de Moyeuvre, celle de la grande Cour détenue par labbaye Saint-Symphorien de Metz, en même temps quelle devenait amodiatrice de la forge ducale de Moyeuvre fondée au début du XIVe siècle par Édouard Ier de Bar. Cest à partir de 1598, que Jean Pierron de Bettainvillers fit construire le château, pour servir de siège à la seigneurie, avec son fils Louis qui sy installa dès 1599, au moment de son mariage avec Marguerite François, fille de Simon François, seigneur dAuboué et de Saulcy. Mais le château ne fut terminé quen 1616, selon la date inscrite sur le fronton de la porte. Au décès de Louis de Bettainvillers en 1644, le château passa à son fils Jean, puis en 1685 à son petit-fils Gury-Dieudonné. La fille de ce dernier, Anne-Dorothée de Bettainvillers de Mensberg, qui avait épousé en 1711, Claude-Alexandre de Pons, marquis de Rennepont, séjourna au château jusque vers 1730, puis la famille quitta Moyeuvre pour Roches-sur-Rognon (Haute-Marne) aujourdhui Roches-Bettaincourt, héritage paternel du marquis de Rennepont.","architecture":"FLANVILLE, fut alors loué de 1733 à 1805. Dès 1740, cest la famille Cochard de Moyeuvre qui en devint fermier. En 1805, les frères Cochard sen rendirent acquéreurs et le possédèrent jusquen 1873, date à laquelle la partie Ouest du château fut vendue à la société de Wendel qui y installa en 1884, une infirmerie, avant de racheter, en 1904, la totalité du bâtiment pour le transformer, en 1907, en hôpital. Il est la propriété de l'Etat.","habitants":"Famille Pierron de Bettainvillers \"","divers":"Château de Flanville  49° 15' 12\" Nord, 6° 02' 47\" Est","gps":"","images":["../image/image_57/57_Flanville_1.jpg","../image/image_57/57_Flanville_2.jpg","../image/image_57/57_Flanville_3.jpg","../image/image_57/57_Flanville_4.jpg","../image/image_57/57_Flanville_5.jpg"]},"Consult_chateau_formulaire83c4":{"id":"Consult_chateau_formulaire83c4","dept":"57","canton":"Forbach","commune":"Forbach","nom":"Forbach","type":"Château","periode":"XII-XVII-XVIII","histoire":"Trois châteaux dans cet article ; Barrabino, Schlossberg et Burghof.       BARRABINO, fut bâti à l'extérieur de la ville en 1716 par l'architecte Jonas-Erickson Sundahl pour Henning, baron de Stralenheim, diplomate suédois au service du roi de Suède, Charles XII, duc de Deux-Ponts et gouverneur général du duché  de 1710 à 1718. Le château de Forbach, où le baron de Stralenheim s'était retiré après avoir cessé ses fonctions de gouverneur en 1718, resta propriété de sa veuve, la comtesse Sophie-Elisabeth de Wasaborg, jusqu'en 1751. Il fut acheté en 1756 par le duc de Deux-Ponts, Christian IV, pour son épouse Marianne Camasse, élevée à la dignité de comtesse de Forbach en 1757. Mis sous séquestre comme bien national en 1793, lui fut restitué en 1801 après son retour en France et resta à sa famille jusqu'en 1824. Il fut acquis vers 1830 par François Barrabino qui donna son nom, maire de Forbach de 1837 à 1843. Etait, avant les destructions de 1947, un bâtiment de plan rectangulaire formé de trois corps en U couverts de toits d'ardoises à croupes. Il n'en subsiste plus, actuellement, que le large corps central au toit d'ardoise à la Mansart, prolongé au sud par une petite aile basse moderne, sur le même alignement. La façade Est, donnant sur la place Houchard qui a remplacé les très beaux jardins à la française, est ordonnancée symétrique à deux niveaux de onze travées de fenêtres à linteau en arc segmentaire, séparés par un bandeau avec un niveau supplémentaire de lucarnes. La façade sur cour autrefois, aux extrémités de laquelle se voient encore les arrachements des ailes détruites en 1947, est ordonnancée symétrique mais à sept travées. Contrairement à la plupart des constructions du XVIIIe siècle, la taille des fenêtres ne va pas en décroissant, du bas vers le haut. Ici, les fenêtres sont au second niveau, accentuant l'horizontalité de la façade.","architecture":"SCHLOSSBERG, fut construit à la fin du XIIe ou au début du XIIIe siècle,  par les comtes de Werde dont le premier membre cité de façon sûre en tant que seigneur de Forbach est Thierry, comte de Werde vers 1240. Le château fut agrandi et remanié à plusieurs reprises et amélioré défensivement jusqu'au XVIIe siècle. Mais cela n'empêcha pas en 1653 le maréchal de la Force de s'emparer, sur l'ordre de Richelieu, du château défendu par une petite garnison, après un siège de onze jours, la forteresse, détruite par le feu et à coups d'explosifs, ne fut pas reconstruite. Sous la Révolution les ruines servirent de carrière de pierres. Le château sortit cependant de l'oubli quand en 1886 l'industriel Gustave Adt acheta les ruines et les terrains avoisinants, puis de 1888 à 1893 fit dégager les fondations du château, ce qui permit d'établir sa configuration exacte, et restaura certaine parties. Il fit également élever en 1891, sur les bases de la tour de Saareck, une monumentale tour octogonale en style néo-gothique, en forme de polygone irrégulier, tel qu'il se présentait à son apogée au début du XVIIe siècle, était une suite d'extensions progressives de bâtiments et d'éléments de défense vers l'ouest. Le donjon carré, noyau du château primitif, situé à l'est de la colline, dont il subsiste une ruine de près de huit mètres de haut, fut renforcé au XVIe siècle, à l'est, d'une tour d'angle carrée qui présente encore trois meurtrières. Au nord-ouest du donjon, le corps de logis ou palais, dont on a pu reconstituer la disposition intérieure, fut presque entièrement remanié au XVIe siècle. De nombreux éléments de sculptures retrouvés lors des fouilles, témoignent de la qualité de construction de ce palais.                                          BURGHOF, voit le jour par Gustave Adt qui  confie en 1900 à larchitecte Fritz Leidner, la construction du « Burghof », autrement dit la ferme du château. Aujourdhui une partie des bâtiments est devenue le centre Européen des Congrès.","habitants":"Famille de François Barrabino                                   Schossberg, industriel Gustave Adt\"","divers":"Trois châteaux dans cet article ; Barrabino grav-1,                            49° 11' 09? N, 6° 53' 42? Est Schlossberg grav-5-6-7  et Burghof grav 2-3-4.  Adt 49° 11' 5,72\" Nord, 6° 54' 30,26\" Est                                                Schlosberg;  49° 11' 00? N, 6° 54' 02? E","gps":"","images":["../image/image_57/57_Forbach_1.jpg","../image/image_57/57_Forbach_2.jpg","../image/image_57/57_Forbach_3.jpg","../image/image_57/57_Forbach_4.jpg","../image/image_57/57_Forbach_5.jpg","../image/image_57/57_Forbach_6.jpg","../image/image_57/57_Forbach_7.jpg"]},"Consult_chateau_formulaire68fa":{"id":"Consult_chateau_formulaire68fa","dept":"57","canton":"Sarreguemines","commune":"Frauenberg","nom":"Frauenberg","type":"Vestiges","periode":"XIII-XIV-XVII","histoire":"FRAUENGERG, la première mention connue du château se trouve dans un acte de 1371 dans lequel Frédéric de Sierck se nomme seigneur de Frauenberg, aucun texte ne peut dire qui est le fondateur de l'édifice. Durant le XVIIe siècle, Frauenberg est victime de la guerre des Rustauds ou des Paysans. Elle dure deux ans et s'achève en 1626 dans un bain de sang. Il va à nouveau souffrir pendant la guerre de trente ans, abandonné par son seigneur, il devient un repaire de partisans qui font la guerre pour leur propre compte et rançonnent tout le monde. Pour mettre fin à cet état de choses, en 1637, Richelieu donne l'ordre au Maréchal de la Force de démanteler le château. La seigneurie de Frauenberg est acquise en avril 1783 par Charles Gravier, comte de Vergennes, ministre des Affaires Etrangères de Louis XVI, mais il meurt quatre ans après. En 1785, une faïencerie est installée dans le château. En 1793, les prussiens l'occupent et le rendent tout à fait inhabitable en brûlant portes et fenêtres. Le 11 Brumaire de l'an III, Mathias Calis achète le chateau, les jardins, les granges et la bergerie.","architecture":"FRAUENGERG, la construction date du XIIIe siècle, fut remanié au XVIIe siècle ainsi que ses murs d'enceinte, son donjon cylindrique et ses fossés. Aujourd'hui, il ne reste que des ruines de l'ancien château de Frauenberg   Éléments protégés MH : les vestiges du château : classement par arrêté du 26 avril 1921.   Propriété de la commune.","habitants":"Famille de Charles Gravier\"","divers":"Vestiges à   Frauenberg                          49° 8' 3,39\" Nord, 7° 7' 45,6\" Est","gps":"","images":["../image/image_57/57_Frauenberg_1.jpg","../image/image_57/57_Frauenberg_2.jpg"]},"Consult_chateau_formulaire05aa":{"id":"Consult_chateau_formulaire05aa","dept":"57","canton":"Saint-Avold","commune":"Folscheviller","nom":"Furst","type":"Château","periode":"XVIII","histoire":"FURST,  la construction du château de Fürst date du XVIIe siècle. Il fut le siège dune seigneurie, haute, base et moyenne justice, mouvant de l'évéché de Metz, en 1681, il possédait une chapelle castrale, anexée à la paroisse de Téting. Reconstruit au XVIIIe siècle en remplacement d'une maison-forte mentionnée au XVIIe siècle. En 1681, la maison seigneuriale appartenait à Philippe de La Vigne, seigneur de Fürst et de Hesser. Sa veuve Jeanne de Blair la possédait encore au début du XVIIIe siècle, conjointement avec Gaspard Gillot. Le château fut détenu au XVIIIe siècle par les familles Gillot, de Bock et Forget de Barst, alliées à la première, mais on ignore à quel moment précis eut lieu sa reconstruction,Il fut un temps le siège de Alexandre Dreux, acquis par la compagnie des Mines de Saint-Avold qui en a fait le siège de la direction de Folschviller. actuellement  centre socio culturel.","architecture":"FURST, Il fut remanié au XVIIIe siècle : bâtiment rectangulaire formé de 4 corps, des cheminées du XVIIIe siècle. Il a été refondé sur les restes d'un ancien château seigneurial dont les origines ont été perdues mais dont le nom existe encore dans les archives datant de 1134. L'édifice se compose d'un étage carré, un étage de comble et un sous-sol, le gros-oeuvre: moellon et enduit, élévations à travées surmontées de toit à longs pans brisés et toit en pavillon couverts d'ardoise et de tuiles mécaniques. Le château de Fürst a été remodelé et reconstruit au XVIIIe siècle et aménagé en un devant de corps de ferme. Au nord du corps de logis principal, la cour est bordée par deux corps du XVIIIe siècle qui ont été fortement remaniés. Le corps ouest possède encore une porte cochère en plein cintre, comme celles du passage couvert du troisième corps de bâtiment. Aux angles sud-est et sud-ouest des murs de clôture du parc, les deux tours carrées sont couvertes de toits en pavillon, reconverti en un centre de formation et de loisirs du comité dentreprise des H.B.L. Dernièrement, le château de Fürst a été acquis par les établissements Neuhauser.","habitants":"Famille de Philippe de La Vigne\"","divers":"Château de Furst à Folscheviller                                       49° 04' 13\" Nord, 6° 41' 09\" Est","gps":"","images":["../image/image_57/57_Furst_1.jpg","../image/image_57/57_Furst_2.jpg","../image/image_57/57_Furst_3.jpg"]},"Consult_chateau_formulaire5647":{"id":"Consult_chateau_formulaire5647","dept":"57","canton":"Sarrebourg","commune":"Fénétrange","nom":"Fénétrange","type":"Château","periode":"XVI-XVIII","histoire":"FENETRANGE, la terre et seigneurie  fut divisée dès le XIIIe siècle en trois seigneuries: , la seigneurie dite Schwanhals ou col de cygne et la seigneurie dite Brackenkopf ou tête de Braque. Le château est un ensemble architectural construit au XIVe siècle, remanié au XVIe siècle, puis au XVIIIe siècle avec l'apparition du style Renaissance, mais en arborant un style classique réussi, la demeure est encore habitée. Le bâtiment abrite une chapelle gothique, édifiée en 1584 par Diane de Dommartin pour accueillir le culte catholique après le triomphe de la réforme. Un pilier central soutient les voûtes, dont les clefs sont ornées des armes de Diane et de son second époux, Charles-Philippe de Croy. A côté se trouve la cuisine seigneuriale et un magnifique escalier hélicoïdal avec ses volutes en coquille d'escargot. L'accès au château se fait au nord-ouest par un passage couvert ménagé dans un corps haut et étroit du XVIe siècle.","architecture":"FENETRANGE, la porte cochère en plein cintre, côté ville, était défendue par un pont-levis dont il subsiste les rainures. Le corps de logis principal, au sud, encadré sur la façade extérieure de deux tours circulaires à toit conique, présente une façade sur cour, transformée au XVIIe siècle, ordonnancée symétrique à sept travées de larges fenêtres rectangulaires disposées sur trois niveaux. La façade extérieure, remaniée au XVIIIe siècle, est ordonnancée à trois niveaux de hautes fenêtres rectangulaires, avec un léger avant-corps central très étroit, percé d'une porte en arc segmentaire, encadrée de deux pilastres supportant une corniche. Les deux corps situés au sud-est ont conservé leurs croisées anciennes seulement du côté de la Sarre et constituent la partie la plus intéressante du château de Fénétran, les dépendances du XVIIIe siècle forment un hémicycle entourant la cour; le rez-de-chaussée s'ouvre par une succession d'arcades en plein cintre et de portes cochères rectangulaires.","habitants":"Famille de Charles-Philippe de Croy\"","divers":"Château de Fénétrange  grav-1-2                                                                48° 50' 49\" Nord, 7° 01' 11\" Est  divers -3 école grav-4","gps":"","images":["../image/image_57/57_F%c3%a9n%c3%a9trange_1.jpg","../image/image_57/57_F%c3%a9n%c3%a9trange_2.jpg","../image/image_57/57_F%c3%a9n%c3%a9trange_3.jpg","../image/image_57/57_F%c3%a9n%c3%a9trange_4.jpg"]},"Consult_chateau_formulaire357b":{"id":"Consult_chateau_formulaire357b","dept":"57","canton":"Bitche","commune":"Hanviller","nom":"Gentersberg","type":"Château","periode":"XVIII","histoire":"GENTERSBERG,  l'ancien château fut acquis avant 1436 par Frédédic le Vieux, de la maison seigneuriale de Bitche dite Gentersberg. Il semble que celui-ci fut détruit très tôt, sans doute au XVIe siècle. Un nouveau château fut reconstruit au XVIIIe siècle pour Jean Frédéric Dithmar, substitut et receveur des finances du duc de Lorraine au comte de Bitche, anobli en 1723, resté dans la famille Dithmar jusqu'à la Révolution. Le château de Gendersberg est passé ensuite entre les mains de la famille des comtes de Gudin qui le possède jusqu'en 1877. L'édifice, qui a souffert des changements successifs de propriétaires depuis la fin du XIXe siècle et de la dernière guerre.","architecture":"GENTERSBERG, fut construit au sud-ouest du village, dans la forêt du Dittenbacherwald, devenu le bois de la Redoute. Bien qu'étant devenu une propriété ducale, au XVIe siècle, le château tombe déjà en ruine. Au nord-ouest de Hanviller, la ferme de Gentersberg a laissé la place, dans les premières décennies du XVIIIe siècle, à un château du même nom. L'édifice, de plan allongé avec des avant-corps aux extrémités des deux façades et possède un toit de tuiles plates. Il semble avoir été plus important au XVIIIe siècle et a dû comporter deux ailes dans le prolongement du corps principal. Éléments protégés MH : les façades et les toitures du château : inscription par arrêté du 27 juin 1984, fut édifié,  est privé et fermé au public. Le château est inscrit aux M.H. depuis 1984.  Le château du Gentersberg a été construit pour remplacer un château mentionné au XVe siècle et détruit à la fin du XVIe siècle ou au début du XVIIe siècle. Si le style classique domine et que la terre est bien historiquement dans le duché de Lorraine, l'influence des terres germaniques se fait ressentir par la présence de tuiles plates mais aussi par le travail des entourages des portes dont l'une fait apparaître les armoiries des Dithmar et Lalance de Moranville. Une belle bâtisse souvent ignorée dans l'extrême Est de la Moselle et de l'ancien Duché de Lorraine.","habitants":"Famille de Jean Frédéric Dithmar\"","divers":"Château de Gentersberg à Hanviller                                                            49° 06' 48,99\" Nord,7° 26' 07,71\" Est","gps":"","images":["../image/image_57/57_Gentersberg_1.jpg","../image/image_57/57_Gentersberg_2.jpg","../image/image_57/57_Gentersberg_3.jpg"]},"Consult_chateau_formulairebd84":{"id":"Consult_chateau_formulairebd84","dept":"57","canton":"Le Pays messin","commune":"Glatigny","nom":"Glatigny_Moselle","type":"Vestiges","periode":"XVII","histoire":"GLATIGNY, petit village de l'Est du pays Messin, Glatigny cache un château dont il ne restera bientôt plus de traces si rien n'est fait.\nAu coeur du village mais davantage visible depuis les chemins qui font le tour de ce dernier par le Sud, le château n'a presque plus de toiture ni de planchers et ses murs tiennent tant bien que mal mais jusqu'à quand L'indifférence serait-elle la règle.","architecture":"GLATIGNY,  si le château ne semble pas pouvoir retouver son éclat passé il serait primordial de préserver ce qui en subsiste. En effet ce village ne possède pas d'église (et n'est donc pas \"écrasé\" par un poids patrimonial hors de sa portée) et a été en partie défiguré de lotissements et de pavillons mal insérés dans le tissu bâti ancien, lui même plus abimé que valorisé par des rénovations (et si peu de restaurations, peu réjouissantes. Restaurer les ruines de ce château (qui semble faire partie d'une exploitation agricole) serait la possibilité de maintenir une certaine silhouette et une identité au village. Ce serait peut-être l'occasion aussi de valoriser un lieu d'expression culturelle publique innovant. Tous les projets et surtout toutes les solutions sont à trouver pour ce qui semble être un château bâti durant la première moitié du XVIIe siècle (à partir d'un site plus ancien) et remanié au XIXe siècle avant d'agoniser aujourd'hui. Une perte irrémédiable serait plus que regrettable, ce serait une erreur pour l'histoire, le patrimoine, la culture, le territoire.","habitants":"Seigneurs locaux\"","divers":"Vestiges à  Glatigny","gps":"","images":["../image/image_57/57_Glatigny_Moselle_1.jpg","../image/image_57/57_Glatigny_Moselle_2.jpg"]},"Consult_chateau_formulaire778e":{"id":"Consult_chateau_formulaire778e","dept":"57","canton":"Faulquemont","commune":"Goin","nom":"Goin","type":"Château","periode":"XV-XVI","histoire":"GOIN, la maison-forte, mentionnée en 1348 comme appartenant à Ferry de Bacour et à Ferry de Chambley, fut acquise à la fin du XVe siècle, avec la seigneurie par Pierre Baudoche, bourgeois de Metz, seigneur de Moulins. Elle fut toutefois donnée par les Baudoche en fief à une autre famille, les Chaverson. En 1514 Michel Chaverson, maitre échevin de Metz, et ses frères reprirent en foi et hommage, de Charles Baudoche, la maison-forte \"qu'on dit la Cour\" dépendant de sa seigneurie de Goin. En 1549 François Baudoche, fils de Claude, vendit la seigneurie et le château au duc de Lorraine qui les nomat aussitôt en fief à Robert de Heu, seigneur de Malroy, et à sa fille Catherine. Le château revint ensuite à Claude de Vienne, sieur de Clervant, seigneur de Montoy, par son mariage en 1533 avec Catherine de Heu. Devenu propriété en 1840 de Auguste Saint Ange Boissonneaux de Chevigny qui le garda jusqu'en 1865, l'édifice fut amputé d'une partie des ailes et de deux tours et à nouveau transformé vers 1842.","architecture":"GOIN, le château comporte actuellement un corps central de plan rectangulaire avec deux courtes ailes en retour d'équerre sur la façade est et deux tourelles circulaires demi-hors-oeuvre dans les angles. La façade ouest est toujours encadrée par deux tours rondes sur les angles. La façade est à ordonnance symétrique comporte trois niveaux de sept travées, avec un avant-corps central peu saillant surmonté d'un fronton triangulaire. Les fenêtres à linteau à arc surbaissé sont soulignées par un bandeau. La clef de la porte d'entrée est décorée d'un motif de rocaille et le tympan porte des armoiries bûchées, sans doute celles de la famille Cléron d'Haussonville.   Les ailes ont conservé plusieurs fenêtres rectangulaires du XVIe siècle ou du début du XVIIe siècle aux piedroits à table rentrante et chapiteaux ioniques. Les corps de bâtiments sont couverts de toits d'ardoise à croupes, les tourelles de toits coniques et les grosses tours tronquées, de terrasses. Goin était une enclave lorraine dans le Saulnois. Elle devint une seigneurie et Justice sous la prévôté d'Amance. La seigneurie relevait de la famille de Commercy, puis du duc de Lorraine, Charles III de Lorraine. Le château du XVe siècle, fut remanié au XVIe siècle (fenêtres Renaissance carrées, ayant perdu leurs meneaux croisés) et au XVIIIe siècle (façade sur jardins, grand escalier et sa rampe en fer forgé, intérieurs).","habitants":"Famille, les Chaverson. \"","divers":"Château de  Goin  48° 59' 14\" Nord, 6° 13' 07\" Est","gps":"","images":["../image/image_57/57_Goin_1.jpg","../image/image_57/57_Goin_2.jpg"]},"Consult_chateau_formulaire2aea":{"id":"Consult_chateau_formulaire2aea","dept":"57","canton":"Moulins-lès-Metz","commune":"Gorze","nom":"Gorze","type":"Château","periode":"XVII","histoire":"GORZE, c'est un château de la Renaissance. La construction du palais abbatial de Gorze date de 1696 à 1699), par labbé Philippe Eberhardt de Lowenstein de Bavière. Au XVIIIe siècle, le palais abbatial a été mis à la disposition de parlementaires messins, pour de grandes fêtes. La chapelle baroque date du XVIIIe siècle. Le palais de Gorze fut vendu comme bien national, en 1792. En 1811, le département de la Moselle rachète le château de Gorze pour y installer son dépôt de mendicité et y faire des travaux daménagement et d'agrandissement. En 1813, le palais de Gorze servit dhôpital militaire. En 1816, il devint une caserne de cavalerie. En 1828, il devient l'annexe de lhospice Saint-Nicolas de Metz. La congrégation des filles de la charité de Strasbourg sy installa en 1886.","architecture":"GORZE La porte d'entrée, les escaliers, les terrasses et les murs de soutènement décorés de fontaines : classement par arrêté du 21 septembre 1932, les parties anciennes du palais abbatial en totalité, le sol de la cour et le sol de ses jardins : classement par arrêté du 9 mai 2006.","habitants":"abbé Philippe Eberhardt de Lowenstein de Bavière\"","divers":"à Gorze                                                   Palais abbatial grav-1-2-3                   49° 03' 14? N, 5° 59' 49? Est","gps":"","images":["../image/image_57/57_Gorze_1.jpg","../image/image_57/57_Gorze_2.jpg","../image/image_57/57_Gorze_3.jpg"]},"Consult_chateau_formulaire6126-2":{"id":"Consult_chateau_formulaire6126-2","dept":"57","canton":"Thionville","commune":"Manom","nom":"Grange_Manom","type":"Château","periode":"XV-XVIII","histoire":"LA GRANGE,  du haut Moyen-Âge à la fin du XVIIe siècle, La Grange est passée, par le jeu de mariages et d'héritages, sans jamais être vendue. La première vente eut lieu en 1700 : l'acquéreur était François Brice Gomé des Hasards, conseiller au parlement de Metz, dont le fils Christophe fit construire, le château actuel. Mais ruiné, Chritophe Gomé des Hasards fut contraint de vendre la demeure en 1750. L'acquéreur était le Marquis de Fouquet, lieutenant général du roi au pays Messin, cousin du maréchal de Belle Isle petit-fils de Nicolas Fouquet, constructeur de Vaux le Vicomte. Ce sont les descendants directs du marquis de Fouquet qui sont encore aujourd'hui propriétaires de La Grange. Avant la guerre de 1914-18, le comte de Bertier, propriétaire de La Grange, en tant qu'officier français ne pouvait pas revenir en Moselle annexée. En 1912, il est amené à vendre le château de La Grange à la Gutehoffnongshütte, société sidérurgique. La guerre passée, le comte de Bertier rachète la Grange, est élu maire de Manom et sénateur de la Moselle. Il meurt subitement en 1926 des suites des blessures qu'il avait eues pendant la guerre. En 1940, sa femme et sa fille sont expulsées et passent le temps de la guerre en Bretagne. De retour en 1945, Sylvie de Bertier est élue à 24 ans maire de Manom, elle était alors la plus jeune maire de France. Avec son mari, Jean de Selancy, ils ont consacré leur vie au château  et à le remettre dans un état très proche de ce qu'il devait être au XVIIIe siècle et à le faire revivre.  Jean de Selancy toujours dans cette famille. Séjours de Casanova, du duc et de la duchesse de Windso et du colonel Charles de Gaulle.","architecture":"La GRANGE à  l'intérieur, le grand escalier met en scène de remarquables tapisseries des Flandres du début du XVIIe siècle, retraçant la guerre de Troie. La bibliothèque recèle une belle collection de céramiques orientales, céladons réunis par le comte Jean de Selancy, provenant de Chine et de Corée, et un fragment de retable du XVIe siècle. Pavée de pierres noires et blanches, la salle à manger abrite un beau poêle de chauffage, fabriqué dans les faïenceries de La Grange vers 1780.  Le jardin des Prairiales: à l'arrière du château, une grande pelouse centrale est encadrée par deux larges bandes de prairies semées de fleurs de tous pays  qui donnent leur nom au jardin qui est intitulé \"Jardin des Prairiales\".  Éléments protégés MH : la façade et la toiture du pigeonnier : inscription par arrêté du 28 février 1984. Le château proprement dit : les façades et les toitures, l'ensemble des sous-sols , à l'étage : le corridor, la grande chambre sur le parc, la chambre dite chambre dorée ; les terrasses avec la balustrade, les escaliers, les deux lions et les deux chimères de pierre ; les douves avec les trois ponts dont le pont-levis au Sud avec son ouvrage. La ferme et les dépendances : les façades et les toitures de la ferme, des trois bâtiments d'habitation entourant la cour du colombier, de l'étable et de l'ancienne écurie, à l'exclusion des communs du XIXe siècle ; la cour du colombier et la basse-cour pavées ; les trois portes charretières et piétonnes : classement par arrêté du 28 février 1984.","habitants":"Famille de  Brice Gomé des Hasards,                    Jean de Selancy\"","divers":"Château de la Grange à Manom\n49° 22' 36? nord, 6° 10' 01? est","gps":"","images":["../image/image_57/57_Grange_Manom_1.jpg","../image/image_57/57_Grange_Manom_2.jpg","../image/image_57/57_Grange_Manom_3.jpg","../image/image_57/57_Grange_Manom_4.jpg","../image/image_57/57_Grange_Manom_5.jpg","../image/image_57/57_Grange_Manom_6.jpg","../image/image_57/57_Grange_Manom_7.jpg"]},"Consult_chateau_formulaire24ba":{"id":"Consult_chateau_formulaire24ba","dept":"57","canton":"Moulins-lès-Metz","commune":"Augny","nom":"Grosyeux","type":"Domaine","periode":"XIV-XVI","histoire":"GROSYEUX, arrière-fief des comtes de Salm au XIIIe siècle, la seigneurie de Grosyeux appartenait au XIVe siècle aux Gournay puis aux Heu, familles patriciennes de Metz qui détenaient de nombreuses terres aux portes de la ville. Au début du XVe siècle, la seigneurie passa aux Paillat, au XVIe siècle elle appartint aux Baudoche puis, de la fin du siècle à 1667, aux de Goz, famille protestante. Partagée à la suite d'héritages, elle fut à nouveau réunie en 1713 par Pierre Lecomte, conseiller du Roi, substitut du procureur général à la cour et au parlement de Metz. En 1752, elle fut vendue à Laurent de Chazelles fils, propriétaire de la seigneurie voisine de Lorry-devant-le-Pont et de son très beau château récemment construit, avant d'être acquise, en 1765, par le marquis Christophe de Raigecourt. Vendu comme bien national en l'an III à Denis Daumont, le domaine fut rachetée en 18O6 par Jean-Louis-Claude Emmery, ami de La Fayette, créé comte de Grosyeux en 1808. Il transforma  le château, supprimant la courtine à l'est, du côté du parc, et construisant un nouveau bâtiment entre l'une des tours d'angle et le corps de logis existant. C'est Là qu'il installa sa célèbre bibliothèque, riche en livres rares sur Metz et la Lorraine. En 1850, Anne-Hollande de Colmy, propriétaire de la maison forte de Prayelle, racheta Grosyeux qui, de 1860 à 1923, appartint à la famille de Brossin de Méré. Très endommagé par les bombardements de 1944, le \"vieux château\", déjà transformé au XVIIIe siècle, puis agrandi entre 1806 et 1811 par le comte Emmery, ne conserve plus que quelques beaux vestiges, témoins des époques qui marquèrent les transformations et les agrandissements de Grosyeux.","architecture":"GROSYEUX,  isolé au milieu de son parc, entre Augny et Fey, le château est un vaste quadrilatère cantonné de tours rondes, formé de bâtiments disposés autour d'une cour carrée et entouré de larges fossés en partie comblés. Très transformé au cours des siécles, agrandi au XVIIIe siècle puis au début du XIXe siècle, il ne subsiste du château fort médiéval que les quatre tours rondes dont certaines ont perdu leur toit conique, munies de canonnières à rotule ou à redents et les courtines sur lesquelles s'appuient, au sud et à l'ouest, les dépendances en grande partie remaniées. Fermant la cour au nord, un bâtiment du XVIe siècle, remanié, flanqué d'un escalier droit, est prolonge à l'est par une aile sur le même alignement, aux fenêtres ouvertes dans la première moitié du X VIIIe siècle, én même temps que fut ajoutée la longue aile en retour d'équerre qui divise la cour en deux: à l'ouest, les dépendances, à l'est, l'habitation. L'accès se fait au nord par deux portails accolés, en arc segmentaire, également de la première moitié du XVIIIe siècle, le décor de coquille de l'agrafe gauche contraste avec la riche iconographie des écoinçons et de l'agrafe droite, s'inspirant des travaux de la terre: charrue, rouleau, herse et sacs de grains. Au début du XIXe siècle, entre 1806 et 1811, un bâtiment de plan massé, flanqué d'une petite chapelle au sud, fut accole entre le bâtiment nord et la tour nord-est. Bombardé en 1944, ce corps ne fut pas reconstruit. Il n'en subsiste qu'une petite aile flanquant la tour au sud.","habitants":"Famille des  Baudoche\"","divers":"Domaine de Grosyeux à Augny     49° 03' 34? nord, 6° 07' 19? est","gps":"","images":["../image/image_57/57_Grosyeux_1.jpg","../image/image_57/57_Grosyeux_2.jpg","../image/image_57/57_Grosyeux_3.jpg"]},"Consult_chateau_formulairef978":{"id":"Consult_chateau_formulairef978","dept":"57","canton":"Sarrebourg","commune":"Guermange","nom":"Guermange","type":"Maison-forte","periode":"XVI","histoire":"GUERMANGE, maison-forte construite au bord de l'étang de Lindre et signalée dès 1315. Elle fut restaurée et amplifiée de cinq tours entre 1544 et 1547 par Hans de Guermange. Représenté sur une carte figurative des bois de Sar à l'usage des salines de Dieuze dressée en 1712 et conservée aux archives de Meurthe et Moselle, le château était situé hors du village et défendu par une muraille crénelée, flanquée de nombreuses tours. Passé par alliance aux seigneurs de Custine en 1561, le château demeura leur propriété jusqu'à la Révolution. Mais on ne sait pas à quel moment il fut détruit pour être remplacé par le château actuel. La ferme  est édifiée au XVIIIe siècle, et la grange-écurie au début du XIXe siècle. La grange écurie a une date portée, 1803 sur le linteau de la porte charretière et An XII sur la seconde porte de grange","architecture":"GUERMANGE, c'est une grande demeure de plan rectangulaire reconstruite au XIXe siècle sans grand cachet. Il subsiste de l'ancien château les fossés, des bâtiments d'exploitation, le pigeonnier et deux petites tours surmontées d'un clocheton en bulbe, aux deux extrémités du mur fermant l'ancien parc aujourd'hui à l'abandon. Éléments protégés MH : les façades et les toitures des deux pavillons d'angle du parc : inscription par arrêté du 26 décembre 1980.  Le nouveau château est édifié au XVIIIe siècle et reconstruit en partie au XIXe siècle. Pendant la seconde guerre mondiale il sert d'hôpital militaire allemand, de camp de jeunes filles allemandes. Pendant cette période il est restauré par les allemands.","habitants":"seigneurs de Custine \"","divers":"Maison-forte de Guermange à Guermange                                                    48° 47' 39? N, 6° 48' 33? Est","gps":"","images":["../image/image_57/57_Guermange_1.jpg","../image/image_57/57_Guermange_2.jpg","../image/image_57/57_Guermange_3.jpg"]},"Consult_chateau_formulaire0939":{"id":"Consult_chateau_formulaire0939","dept":"57","canton":"Le Saulnois","commune":"Haboudange","nom":"Haboudange","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article Haboudange et Ravida.                                  HABOUDANGE, ce château aussi appelé Château-Haut apparaît durant le Xe siècle, édifié sur les ruines d'un castrum romain. C'est un fief cité en 976 dépendant de l'évêché de Metz. Au XIIe siècle la place est tenue par la famille De Bollenden. Le 25 septembre 1165 Werner De Bollenberg  reçoit une autre propriété des mains de l'évêque Thièry. Celui-ci va considérablement modifier les lieux pour en faire une résidence épiscopale. Entre 1165 et 1170 Haboudange devient siège d'une prévôté. Les divers évêques de Metz conserveront la place jusqu'à la Révolution. En 1578 un château de style renaissance est édifié au centre des remparts médiévaux et une grande partie des édifices antérieurs sont rasés. Cette demeure subira des modifications importantes en 1835. Le château est classé M.H. le 27 février 1996 est reste une propriété, proposant des gîtes aux touristes.   Les remparts médiévaux ruinés sont imposants. Le château moderne est toujours habité, et se dresse au centre des remparts.","architecture":"RAVIDA, le nouveau château, appelé \"Château Neuf\" aux XVIIe et XVIIIe siècles et également \"Château Bas\" au XIXe siècle, est l'ancienne maison franche de Jean du Puy du Fou, seigneur du Portal et Ramberge en Poitou, bailli de l'évêché de Metz. Cette maison franche ou forte passa en 1571 à Jean de Lenoncourt, seigneur de Serres, conseiller d'état du duc de Lorraine, par son mariage avec Barbe du Puy du Fou. Acheté en 1861 par Félix-Benoît Brice, notaire à Haboudange, le château échut par mariage à la fin du XIXe siècle à la famille Ravida, qui en fut propriétaire jusqu'en 1966 et le donna à cette date à la maison de retraite de Vic-sur-Seille. situé en contrebas de l'ancien château des évêques de Metz, devenu une ferme, le château Ravida est un bâtiment de plan rectangulaire avec deux petites ailes en retour d'équerre sur la façade principale et une tour octogonale demi-hors-oeuvre sur la façade postérieure. Le corps de logis, à façade ordonnancée symétrique à deux niveaux de cinq travées, est couvert d'un toit à croupes de tuiles en écaille, comme les ailes. La tour, qui a conservé des fenêtres à traverses et des canonnières rondes, est le seul vestige du château plus ancien.","habitants":"Jean de Lenoncourt\"","divers":"Deux châteaux dans cet article Haboudange grav 1-2 et Ravida grav 4-5-6.","gps":"","images":["../image/image_57/57_Haboudange_1.jpg","../image/image_57/57_Haboudange_2.jpg","../image/image_57/57_Haboudange_3.jpg","../image/image_57/57_Haboudange_4.jpg","../image/image_57/57_Haboudange_5.jpg","../image/image_57/57_Haboudange_6.jpg"]},"Consult_chateau_formulaireacad":{"id":"Consult_chateau_formulaireacad","dept":"57","canton":"Freyming-Merlebach","commune":"Hombourg-Haut","nom":"Haussen","type":"Château","periode":"XVIII","histoire":"HAUSSEN, à partir de l'autorisation obtenue en 1758 d'établir une forge à Hombourg, Charles de Wendel développe une activité industrielle au bord de la Rosselle, au pied du vieux village de Hombourg. Il fait construire vers 1762 à proximité de la forge, un château qui ressemble probablement beaucoup au château actuel, à l'exception des petites ailes nord et sud. En 1808, le château devient la propriété d'Ignace d'Hausen, neveu de la veuve de Charles de Wendel. Le plan cadastral de 1836 permet de comprendre la physionomie du domaine qui a peu changé jusqu'à aujourd'hui : le château, les communs, et le jardin dit jardin d'agrément. En 1882, le château est acquis par la société Gouvy Frères et compagnie, propriétaire des forges de Hombourg depuis 1850, qui revend le château en 1938 à la société Houillère de Sarre et Moselle. Nationalisée en 1946, cette dernière est transformée en houillères du Bassin de Lorraine (HBL). Le château devient alors le siège de son administration. Les HBL réalisent d'importants travaux intérieurs, notamment en installant la salle du conseil d'administration dans le bâtiment des communs au nord. En 1999, le château est cédé à la société civile Immobilière du château d'Hausen, club d'entreprises qui anime le château pendant cinq ans. En 2004, la commune de Hombourg-Haut achète le château pour y abriter la mairie, il est construit au pied du promontoire rocheux du village de Hombourg-Haut, à proximité des forges qui bordaient la Rosselle.","architecture":"HAUSSEN, précédé d'une cour d'honneur sur la rue, le château est un bâtiment élégant de plan rectangulaire, avec deux petites ailes sur les côtés, et prolongé au nord par des communs. Il est bâti en moellon enduit et en pierre de taille de grès pour le soubassement, les chaînages, les modénatures et les encadrements de baie. Le toit brisé est couvert d'ardoises. L'élévation symétrique est rythmée par sept travées sur deux niveaux, comprenant des fenêtres en arc segmentaire. En façade sur cour, la travée centrale est soulignée par un fronton triangulaire, par un chaînage en grès, par l'escalier en fer à cheval et le balcon qui surmonte la porte d'entrée. Le jardin se développe à l'arrière du château, dans la pente rocheuse. Dessiné suivant un tracé irrégulier caractéristique du XIXe siècle, il comprend quelques fabriques, grotte, maison du jardinier, orangerie, ainsi qu'un bassin et des arbres remarquables. Éléments protégés MH : les éléments suivants du château d'Hausen : les façades et les toitures du château et de ses communs, y compris l'orangerie ; le jardin en totalité, y compris ses éléments de terrassement, bassins, murets, emmarchements, vestiges de l'ancienne pièce d'eau, palissade, ainsi que la grotte ; les façades et les toitures de la maison du jardinier ; le mur de clôture du domaine, inscription par arrêté du 5 juin 2019, hôtel de ville.","habitants":"Ignace d'Hausen\"","divers":"Château  d'Haussen à Hombourg                            49° 07' 26? N, 6° 46' 26? E","gps":"","images":["../image/image_57/57_Haussen_1.jpg"]},"Consult_chateau_formulairec050":{"id":"Consult_chateau_formulairec050","dept":"57","canton":"Hayange","commune":"Hayange","nom":"Hayange","type":"Château","periode":"XVIII-XIX","histoire":"trois châteaux dans cet article Wendel, Nilvange et Tournebride.                   GUY de WENDEL; deux châteaux construit par Guy celui de Wendel et  en 1906 est Tournebride remaniè est de style romantique germanique. Le parc du domaine totalisait 4,3 hectares. On y admirait des fontaines, des bassins, des serres et un jardin suspendu. Des arbres aux essences rares y furent plantés. L'intérieur du château a été doté de belles boiseries, de cheminées en marbre et d'une bibliothèque remarquable en chêne massif sculpté. La demeure fut habitée jusqu'en 1978 par Ségolène de Wendel, qui joua un rôle important pendant la Résistance durant la guerre de 1940 et fut un soutien essentiel pour de nombreux lorrains condamnés à lexode, dernière représentante de la famille qui avait régné sur Hayange pendant 274 ans. Ce château,  est devenu aujourdhui un hôtel-restaurant et un centre daffaires.  En 1704, Jean-Martin Wendel acquiert les forges délabrées de la Rodolphe. A cette date, il se fait alors bâtir un château achevé vers 1720. A cette époque, il comprenait un rez-de-chaussée et deux étages, il va ensuite s'agrandir au rythme de l'empire industriel, restauré et modifié par monsieur Humbert de Wendel (1876-1954). Les bâtiments d'origine ont été en partie démolis en 1935, puis reconstruits dans le style du XVIIIe siècle. Appartenant au patrimoine de la communauté dagglomération du Val de Fensch, en 2007 une partie du château est démolie, mais trois bâtiments subsistent : le bâtiment de lhorloge, la chapelle et le pavillon Robert De Wendel. Éléments protégés MH : l'immeuble dit le bureau central, le colombier et les grilles d'entrée du domaine: inscription par arrêté du 24 juillet 1987.","architecture":"NILVANGE,  le château de Nilvange fut la demeure des directeurs successifs de la société métallurgique de Knutange. Un beau jardin a été aménagé au moment de la construction des bâtiments au début du XXe siècle, dans lesprit dun jardin à langlaise de la fin du siècle précédent. Le parc, dun hectare et demi, présente, avec ses trois cents arbres et une centaine darbustes, une belle collection botanique et une large palette de végétaux. Parmi les essences représentées: le cèdre du Liban, lépicéa du Colorado, plusieurs espèces de tilleul et dérable, en particulier lérable Negundo, rare en 1900 et, bien entendu, le magnolia. Vous admirerez le travail de ferronnerie au niveau des portails et de lentrée du château. Classé \"Jardin de France\" depuis 1992, ce parc abrite également un refuge de la ligue de protection des oiseaux. Cet édifice néo-baroque, entouré dun jardin de style anglais, a été bâti pour le directeur des Hauts-Fourneaux de la Paix en 1899. Son magnifique parvis et les nombreux éléments qui ont pu être conservés tels que boiseries, lustres ou vitraux vous feront voyager dans un passé pas si lointain. Aujourd'hui il abrite le musée du cirque.                                                                                                                       TOURNEBRIDE,  les périodes de la construction du château datent de 1704, 1720. Il fut amélioré pour Guy de Wendel en 1906. il est de style romantique germanique, il possède un parc immense aux essenses rares, des fontaines et de beaux jardins suspendus. Lintérieur du château est doté de superbes boiseries, de magnifiques cheminées en marbre et dune bibliothèque remarquable en chêne massif sculpté. À la mort de Guy de Wendel il sera revendu et trouvera une nouvelle vocation grâce à ses nouveaux propriétaires. Ceux-ci ouvrent leurs portes au salon de musique et vous proposent 4 salons pour vos événements privés ou professionnels, toute l'année. De nombreux concerts y sont donnés. Ce château est devenu aujourdhui un hôtel, un restaurant et un centre daffaires. Le château de Tournebride est inscrit aux M.H. depuis le 24/07/1987.","habitants":"Guy de Wendel\"","divers":"Hayange dans cet article Wendel grav 1-2-4--6-7, Nilvange et Tournebride grav-5                               49° 19' 30,15\" Nord, 6° 04' 34,12\" Est","gps":"","images":["../image/image_57/57_Hayange_1.jpg","../image/image_57/57_Hayange_2.jpg","../image/image_57/57_Hayange_3.jpg","../image/image_57/57_Hayange_4.jpg","../image/image_57/57_Hayange_5.jpg","../image/image_57/57_Hayange_6.jpg","../image/image_57/57_Hayange_7.jpg"]},"Consult_chateau_formulaire377e":{"id":"Consult_chateau_formulaire377e","dept":"57","canton":"Courcelles-Chaussy","commune":"Hayes","nom":"Hayes_Moselle","type":"Château","periode":"XVI-XVII","histoire":"HAYES, un premier château du XIIIe siècle est détruit en 1367 par les Messins, il ne fut reconstruit qu'à la fin du XVIe siècle peut-être en 1576 par le comte Louis Nassau-Sarrebruck, seigneur de Helfedange, qui avait acheté en 1566 la seigneurie de Hayes et repeupla le village vers 1579. De cette époque datent  les tours qui subsistent à l'avant et à l'arrière de l'actuel château. En 1609, le baron Pierre-Ernest de Créhange l'acquit du comte Louis Nassau-Sarrebruck, au nom de sa femme Anne-Sibylle de Nassau, la seigneurie de Helfedange dont dépendait en partie la terre de Hayes, qu'il revendit aussitôt à Jean Christophle, bourgeois de Metz, seigneur d'Avancy. Le château semble avoir été reconstruit au début du XVIIe siècle. Anne Christophle, sa fille, qui avait hérité de la moitié de la seigneurie avec le château, l'apporta en dot en 1634 à Jean Michelet dont les gendres Guillaume de Servais et Pierre Blaise, bourgeois et médecin de Metz se partagèrent le château en 1654. En 1682, Pierre Blaise réunit à nouveau le domaine, qui resta à sa famille jusqu'en 1709. En 1713 Nicolas Dupasquier de Dommartin, comte de Fontenoy, acquit la terre qui succède à ses parents. La petite-fille de ce dernier Françoise Cécile, épousa en 1789 Jacque Philibert, baron de Couët du Vivier de Lorry. Depuis le château est resté propriété de cette famille.","architecture":"HAYES, composé d'un corps rectangulaire encadré de deux ailes basses de communs. Le corps principal date du début du XVIIe siècle, les ailes, le mur avec portail fermant la cour et l'escalier d'honneur datent du début du XVIIIe siècle. Un jardin à la française est attesté sur plan de 1752, avec des murs de terrasse et des tours susceptibles de correspondre aux dispositions du XVIe siècle. Restent une glacière couverte en coupole, une cour avec rampe d'accès vers les communs pour les chevaux. Château dans le style néo-gothique avec grand escalier intérieur et sa cage, trois tours de défense.","habitants":"Hayes; Famille Blaises         Lue; Nicolas-Etienne d'Augny et Etienne-Louis Jobal\"","divers":"Château à  Hayes                                           49° 09' 59\" Nord, 6° 21' 54\" Est,","gps":"","images":["../image/image_57/57_Hayes_Moselle_1.jpg","../image/image_57/57_Hayes_Moselle_2.jpg","../image/image_57/57_Hayes_Moselle_3.jpg"]},"Consult_chateau_formulaire0c68":{"id":"Consult_chateau_formulaire0c68","dept":"57","canton":"Faulquemont","commune":"Guinglange","nom":"Helfedange","type":"Château","periode":"XVII-XVIII","histoire":"deux châteaux dans cet article  Helfedange  et Elvange.             HELFEDANGE  Le château actuel, qui date du début du XVIIe siècle avec des transformations ultérieures, a une histoire fort mouvementée. Il est construit sur l'emplacement d'un château plus ancien, mentionné en 1343, mais sans doute antérieur au XIVe siècle. Tenu en fief des évêques de Metz jusqu'au XVIIe siècle, il était partagé dans la première moitié du XIVe siècle entre les châtelains épiscopaux de la famille de Helfedange et Pierre de Torcheville. Avant 1565, le comte Jean IV de Nassau-Sarrebruck en acquis une part et fit édifier un nouveau bâtiment. La division du château entre plusieurs propriétaires cessa quand en 1609, Louis de Nassau-Sarrebruck vendit sa part à son beau-frère Pierre Ernest de Créhange. De 1648 à 1779 l'édifice changea plusieurs fois de propriétaires avant d'échoir de nouveau dans la famille de Créhange. Devenu propriété de l'Etat au XIXe siècle, le château fut loué pour abriter l'école normale d'instituteurs, mais Jacques-François Celini, baron de Cressac, devenu propriétaire en 1828, ne renouvela pas le bail. La demeure est restée dans cette famille encore aujourd'hui.\nIsolé sur une colline dominant la vallée de la Nied allemande et le village de Guinglange.","architecture":"HELFEDANGE, le château est un vaste bâtiment de plan rectangulaire, formé de quatre corps entourant une cour à laquelle on accède par un passage couvert situé au milieu du corps Est, flanqué de deux tours circulaires à toit conique. Le corps principal, très allongé, est couvert d'un toit d'ardoise à croupes. Une tour d'escalier polygonale demi-hors-oeuvre, actuellement couverte d'une terrasse, monte de fond au milieu de la façade sur cour, ordonnancée à trois niveaux de sept travées dont un niveau de combles.Toutes les ouvertures encadrées de grès rose ont été transformées au XVIIIe siècle, sauf celles du dernier niveau, qui ont conservé leur meneau orné d'enroulements végétaux. La tour, aux angles soulignés par des chaînes de grès, a encore ses fenêtres d'origine, la plus remarquable étant celle du dernier niveau. La façade sur parc, avec avant-corps central à fronton triangulaire, a été irrégulièrement repercée au XVIIIe siècle sur trois niveaux.                                                                              A deux K.M. au sud   ELVANGE;  En 1577, Jean-Wolff Seltzer, châtelain de Helfedange, acquis les droits de l'abbaye de Saint-Pierre de Metz à Elvange. Le château fut sans doute construit au début du XVIIe siècle peut-être par Jean-Hartmann Seltzer, bailli de Hingsange, annobli en 1611, qui fit hommage au duc de Lorraine pour la moitié de la seigneurie d'Elvange, l'autre moitié appartenant à l'abbaye de Longeville-les-Saint-Avold. C'est là qu'habita le célèbre numismate et historien François-Dominique de Mory d'Elvange, né en 1738 et guillotiné en 1794. Construit sur la rive gauche de la Nied allemande, c'est un bâtiment en calcaire et grès rose, de plan rectangulaire, formé de quatre corps entourant une cour pavée défendu par trois tours carrées munies de canonnières rectangulaires à redents. Le corps de logis situé à l'est est couvert d'un toit à deux longs pans. Les façades, modifiées à plusieurs reprises, conservent encore au second niveau leurs fenêtres à meneau d'origine, aux montants moulurés en cavet et décorés à la base d'enroulements végétaux caractéristiques de l'architecture germanique.","habitants":"famille de Créhange\"","divers":"deux châteaux dans cet article  de Guinglange;  Helfedange  et Elvange  pas de Grav pour ce dernier                                                     49° 04' 52\" Nord, 6° 31' 48\" Est","gps":"","images":["../image/image_57/57_Helfedange_1.jpg","../image/image_57/57_Helfedange_2.jpg","../image/image_57/57_Helfedange_3.jpg"]},"Consult_chateau_formulaire1954":{"id":"Consult_chateau_formulaire1954","dept":"57","canton":"Metzervisse","commune":"Hombourg","nom":"Hombourg","type":"Château","periode":"XII-XIII","histoire":"HOMBOURG-BAS, le château de Hombourg est attesté au milieu du XIIe siècle et appartenait aux comtes de Metz-Lunéville, qui étaient également comtes de Hombourg et dont le premier fut Folmar. A la mort du dernier comte de Metz, Hugues, vers 1152, l'évêque de Metz, Etienne de Bar prit possession du château. On ne sait à quel moment celui-ci fut abandonné, peut-être à la fin du XIIIe ou au XIVe siècle, après la construction du nouveau château de Hombourg-Haut par l'évêque Jacques de Lorraine. En 1270, la tour du \"viez Hombourg\" fut acquise par Jean de Varsberg des héritiers de Jean de Hennaménil. Le château était construit sur un monticule au sud-ouest du bois dit Bilstein. Le château, de forme presque ovoïde, était entouré d'un profond et large fossé et défendu au nord par un talus dont la partie la plus élevée domine encore de nos jours la terrasse du château de près de trois mètres. Du mur d'enceinte, édifié autour du château, il subsiste encore au sud des vestiges des soubassements de plus de deux mètres d'épaisseur. La motte castrale est bien visible du haut de la colline de Hombourg-Haut.                                                                                                            HOMBOURG-HAUT, l'évêque de Metz, Jacques de Lorraine, construisit \"près du vieil Hombourg un  château neuf  sur le sommet d'un mont désert qui est appelé maintenant Hombourg\". Ce nouveau château, bâti à grands frais,  vers 1254, resta la propriété des évêques de Metz jusqu'en 1572. Au XVIIe siècle le château servait de résidence au gouverneur et bailli de Hombourg. Louis de Guise, devenu prince de Phalsbourg, y séjourna à plusieurs reprises vers 1630. Après son décès en 1631, sa veuve Henriette de Lorraine conserva l'usufruit de la seigneurie et du château de Hombourg. Il semble qu'il est souffert de la guerre de trente ans; après 1653 Henriette de Lorraine lors de ses séjours dans la seigneurie, ne résidait plus au château qui était devenu semble-t-il inhabitable.","architecture":"Hombourg haut suite. Après 1698 le château revint au domaine ducal mais ne fut plus entretenu. Vers 1730 il était entièrement ruiné; les quelques pans de mur du bâtiment d'habitation, de la chapelle et des écuries furent détruits après 1735. Les bastions et les tours étaient aussi rasés et les fossés convertis en jardins.\nL'emplacement du château est encore bien marqué de nos jours. Il subsiste outre le fossé à l'est, des vestiges assez importants de mur d'enceinte au sud entre le petit bastion du milieu et le grand bastion au sud-est, ainsi que des bases des tours à l'ouest. Le site du château avait été admirablement choisi sur la colline qui à l'est du village, domine la vallée de la Rosselle et la grande route de Metz à Sarrebruck. Il semble que le château ait constitué au XIIIe siècle un ensemble fortifié bien plus important qu'il ne l'était au XVIe sliècle, couvrant toute la colline, de la collégiale à l'ouest jusqu'à la chapelle Sainte Catherine. Il subsiste encore près de cette chapelle la base d'une tour, sans doute un des éléments du château du XIIIe siècle. Aux XVIe et XVIIe siècles, le château, limité à la partie ouest de la colline, était pourvu de bastions et de plusieurs tours, notamment la \"tour des prêtres\", la tour de \"la lanterne\", la tour dite \"l'entretour\" et également la \"tour des sorcières\", encore mentionnée en 1736.  Éléments protégés MH : le château et les fortifications : classement par journal officiel du 16 février 1930.  propriété de la commune, vestiges entre la collégiale et la chapelle Sainte-Catherine.","habitants":"Bas; Jean de Varsberg   Haut; Louis de Guise\"","divers":"Châteaux à  Hombourg                         : 49° 07' 39\" Nord, 6° 46' 52\" Est","gps":"","images":["../image/image_57/57_Hombourg_1.jpg","../image/image_57/57_Hombourg_2.jpg"]},"Consult_chateau_formulaire584a":{"id":"Consult_chateau_formulaire584a","dept":"57","canton":"Metzervisse","commune":"Hombourg-Budange","nom":"Hombourg_Budange","type":"Château","periode":"XIV-XVI-XVII","histoire":"HOMBOURG-BUDANGE, château actuel précédé par un château du XIIIe ou XIVe siècle, dû à une branche des Varsberg, maison de Raville, auquel il appartient de la fin du XIIIe au début du XVe siècle. Importants vestiges de l'enceinte : courtine Est, deux tours encadrant la tour porche, deux tours nord-est et nord-ouest du corps de logis. Début du XVe siècle, l'édifice échoit aux Créhange: Guillaume de Créhange le restaure et le fortifie de 1536 à 1551. Château incendié en 1552. Wyrich de Créhange, frère de Guillaume, le reconstruit dès 1558, avec étables et bâtiment à grain, il établit un nouveau château sans doute en U, de 1560 à 1574. (1566, 1572, 1574 dates portées par un médaillon au revers de la tour porche, par un linteau de fenêtre de la façade sud, par le linteau d'une fenêtre de l'échauguette, et par le linteau d'une porte piétonne de l'élévation nord du corps nord des communs. Les communs sont transformés partiellement en 1635 (date portée par la clef d'une porte charretière de l'élévation nord). En 1655, le château devient propriété d'Antoine Joachim de Lenoncourt, puis la même année, celle d'Antoine de Prisacier, tué devant le château par les troupes impériales. Son gendre, Jacques Gustave de Malortie, marquis de Boudeville, élève l'aile nord du château en 1719. Au XVIIIe siècle, les communs  repercés. En 1774, par succession, le château échoit aux Hunolstein. Joseph Philippe Léopold de Hunolstein transforme la façade ouest avec adjonction d'une tour, en 1893. Le propriétaire actuel est le comte Charles Louis de Rochechouart de Mortemart.  Éléments protégés MH : les parties intérieures du logis : inscription par arrêté du 16 novembre 1988. Les façades et les toitures de l'ensemble des bâtiments : classement par arrêté du 8 novembre 1994.","architecture":"HOMBOURG-BUDANGE, la construction date de 1566 à 1719. Il est aujourd'hui, en danger de mort, menacé de destruction. Il fut reconstruit à la Renaissance, comme en témoignent 3 de ses 4 ailes. On peut aussi le voir sur les meneaux encore présents qui se trouvent sur les parties communes. Une magnifique aile classique viendra complèter lensemble, au XVIIIe siècle, avec  son fronton qui la surplombe pour en faire la façade principale. Malheureusement, son propriétaire reste indifférent face aux rarages du château, insconcient de la perte inexorable de ce monument historique de la Lorraine, en refusant tout sauvetage de son architecture et de son histoire, en péril. Bien qu'il fasse partie du domaine privé, il n'a subi aucune restauration, depuis plusieurs années, laissant ses toitures s'effondrer. Le château dHombourg-Budange est, actuellement, dans un état de dégradation avancé. Le comte Charles Louis de Rochechouart de Mortemart, son père, habite l'Orangerie du château de Hombourg-Budange. Un appel au mécénat a été lancé pour aider à refaire les toitures.  Le château Hombourg-Budange est classé aux M.H. depuis 1928 et 1994.","habitants":"Antoine Joachim de Lenoncourt\"","divers":"Château à Hombourg-Budange             49° 17' 40,92\" Nord, 6° 20' 26,88\" Est","gps":"","images":["../image/image_57/57_Hombourg_Budange_1.jpg","../image/image_57/57_Hombourg_Budange_2.jpg","../image/image_57/57_Hombourg_Budange_3.jpg"]},"Consult_chateau_formulaire79f9":{"id":"Consult_chateau_formulaire79f9","dept":"57","canton":"Courcelles-Chaussy","commune":"Landonvillers","nom":"Landonvillers","type":"Château","periode":"XVI","histoire":"LANDONVILLERS, comme sorti tout droit dun conte de fées, un imposant château, daspect médiéval, dresse fièrement ses tours dans le ciel mosellan. La silhouette actuelle du château de Landonvillers, ce rêve héroïque devenu pierre, ne date que du début du XXe siècle! Cest Thomas du Chat seigneur de Landonvillers, qui fit bâtir à la fin du XVIe siècle le premier et sobre châtelet de style Renaissance, souvent vendu ou transmis par héritage, qui abrita au cours des siècles et jusquà la Révolution de nobles familles. Au XVIIIe siècle, François Louis de Saint Blaise, donna au village son blason \"dazur et dargent\". Au XIXe siècle, succédant au baron Charles de Montigny, le député Charles Joseph de Bouteiller membre de lAcadémie de Metz, reconstruit la maison seigneuriale, aménagea un parc magnifique, enrichi dun gigantesque séquoiadendron, arbre dune extrême rareté en Europe. Le riche industriel allemand John von Haniel, l'acheta en 1891 pour y prendre sa retraite. Il désirait devenir le \"voisin\" de Guillaume II, qui venait de sinstaller à Urville un an auparavant, une certaine amitié liait les deux hommes. On peut sétonner que lempereur ne soit jamais venu à Landonvillers. Le docteur Haniel, se sentant à létroit dans lancien château, fit ajouter en 1903 une importante aile de style Renaissance, richement décorée. Vers 1900 avait démarré en Alsace la reconstruction du Haut Koenigsbourg, sous la direction du célèbre architecte Bodo Ebhardt considéré comme le Viollet-le-Duc doutre Rhin. Probablement après une visite de ce chantier, von Haniel, pris de \"fièvre médiévale\", demanda à Ebhardt de construire un grandiose donjon dhabitation carré dans lesprit du Moyen Age et un beffroi élancé culminant à 50 mètres. La pierre alimentant le chantier nétait pas du grès rose des Vosges, comme on le pense. Les massifs blocs furent livrés à grands frais dAllemagne par le train, extraits des carrières de Kyllburg et de Büren, terre natale du châtelain.","architecture":"LANDONVILLERS; une unique encyclopédie de styles vit le jour, où éléments romans, gothiques, Renaissance, voir Art nouveau, se mêlent en un riche symbolisme, souvent marqué par les aspirations ésotériques et maçonniques du propriétaire. John von Haniel, décéda subitement en 1912.  Il ne vit pas la mise sous séquestre de son château en 1918. François de Marmier, héros de laviation française, prit sa succession et tenta, avec un succès mitigé, de le transformer en une exploitation agricole. Sa santé déclinant, il le vendit et, en 1932, le château devint la propriété des hospices civils de la ville de Metz. Ayant dautres priorités que celles de soigner les vieilles pierres, lhôpital en décida la vente au début des
