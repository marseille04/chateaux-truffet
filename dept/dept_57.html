 années 1990. Blessé par deux guerres, mal aimé, abandonné pendant de nombreuses décennies, le château semblait endormi à jamais. Mais depuis 1993, les lumières se rallument, le parc refleurit et lart et la musique réaniment cet endroit mythique, Norbert Vogel, psychothérapeute, passionné dhistoire, a relevé le défi de faire revivre ce joyau de notre patrimoine, maintenant inscrit à IS MH. Grâce à son initiative, des concerts classiques ravissent les mélomanes et les expositions de peinture sacrée ont connu un retentissement international.\nÉléments protégés MH : le domaine de Landonvillers en totalité : inscription par arrêté du 13 février 1997.","habitants":"Famille de Thomas du Chat \"","divers":"Château de Landonvillers          49° 08' 05? nord, 6° 23' 42? est","gps":"","images":["../image/image_57/57_Landonvillers_1.jpg","../image/image_57/57_Landonvillers_2.jpg","../image/image_57/57_Landonvillers_3.jpg","../image/image_57/57_Landonvillers_4.jpg","../image/image_57/57_Landonvillers_5.jpg"]},"Consult_chateau_formulaire89c4":{"id":"Consult_chateau_formulaire89c4","dept":"57","canton":"Bitche","commune":"Meisenthal","nom":"Lanzy","type":"Manoir","periode":"XIX","histoire":"LANZY, de style troubadour, est construit milieu XIXe siècle pour la famille Lorin, actionnaire des cristalleries de Saint-Louis, acheté vers 1902 et agrandi en 1906 d'une tour placée dans l'angle nord-ouest (date portée), pour M. Jules Amiet, directeur des cristalleries de Saint-Louis. La chapelle dédiée à Notre-Dame des Sept Douleurs, a été construite au milieu du XIXe siècle. Autel consacré en 1854 par Mgr Dupont des Loges.\n à étages : sous-sol ; deux étages carrés ; étage de comble, en  grès ; pierre de taille ; moellon ; enduit  à toit à longs pans et conique\nen  tuile plate couvert d'ardoise.","architecture":"LANZY Le début de la construction du château des Lanzy date du milieu du XIXe siècle et fut achevée en 1906, ou il fut agrandi. Le château des Lanzy est un manoir. Il a été agrandi en 1906 d'une tour à l'angle nord-ouest du château. Construit dans l'écart de Schieresthal, il s'agit d'un château de style troubadour agrémenté d'un parc. L'architecte Ebrart Bodo,  construisit au milieu du XIXe siècle pour la famille Lorin, actionnaire des cristalleries de Saint-Louis-lès-Bitche. Louis Lorin puis son fils Jean-Louis Lorin (mort en 1865) étaient directeurs de la cristallerie de Saint-Louis. Le château a été racheté vers 1902 par Jules Amiet, directeur des cristalleries de Saint-Louis et agrandi en 1906 d'une tour placée dans l'angle nord-ouest. Une chapelle dédiée à Notre-Dame-des-Sept-Douleurs est construite au milieu du XIXe siècle et l'autel consacré en 1854 par Mgr Dupont des Loges. Le château des Lanzy n'est pas inscrit ni classé aux M.H.","habitants":"Famille Lorin\"","divers":"Manoir de Lanzy à  Meisenthal                           : 48° 58' 26\" Nord, 7° 21' 11\" Est","gps":"","images":["../image/image_57/57_Lanzy_1.jpg"]},"Consult_chateau_formulairee79c-2":{"id":"Consult_chateau_formulairee79c-2","dept":"57","canton":"Metzervisse","commune":"Rurange-lès-Thionville","nom":"Logne","type":"Château","periode":"XVI","histoire":"LOGNE, il existait au XVIe siècle un château dont il ne resterait plus que quelques éléments des fondations devant le château actuel. La seigneurie était détenue dans la première moitié du XVIIe siècle par André Scarron, conseiller au parlement de Metz en 1634. Il semble que le château ait été reconstruit au XVIIe siècle. En 1668 François-Regnault Ottringer fit hommage au roi de France, à cause du duché de Luxembourg dont relevait la seigneurie, pour sa \"maison seigneuriale enfermée de murailles\", et Jean-Philippe de Guerschin en fit autant en 1736. Au XVIIIe siècle il est la propriété de la famille de Guerschin, dont on trouve les armoiries dans la chapelle et dans un mur de la tour clocher. Au début du XIXe siècle, l'édifice passe au mains de Nicolas Damas Marchand, baron d'Empire qui le remanie en 1842. Le château est un bâtiment de plan rectangulaire massé, couvert d'un toit à brisis et vaste terrasse faitière, encadré de deux pavillons du côté de la façade principale. Les façades ordonnancées sont à trois niveaux de baies rectangulaires. Au milieu du XIXe siècle les parties agricoles au sud du château sont transformées. Fortement endommagé par les bombardements de novembre 1944, le château est restauré en 1949. Armoiries de la famille de Guerschin.","architecture":"LOGNE, est un château primitif est mentionné au XVIe siècle. Il est reconstruit au XVIIe siècle et est alors la possession de François Regnault Ottringer. De cette époque seule subsiste la tour clocher de la chapelle.  Au début du XIXe siècle il passe au mains de Nicolas Damas Marchand, baron d'Empire qui le remanie complètement en 1842. Au milieu du XIXe siècle les parties agricoles au sud du château sont transformées. La chapelle est reconstruite en style néo-gothique en 1867. L'aile ouest des parties agricoles au nord du château date de 1877 (date portée sur le linteau de la porte piétonne) . Le château et les ailes nord, au sud des parties agricoles nord sont à nouveau remaniés durant le début du 1er quart du XXe siècle.","habitants":"Famille d'André Scarron\"","divers":"Château de Logne à  Rurange-lès-Thionville                                             GPS : 49° 16' 40\" Nord, 6° 14' 01\" Est","gps":"49° 16' 40\" Nord, 6° 14' 01\" Est","images":["../image/image_57/57_Logne_1.jpg","../image/image_57/57_Logne_2.jpg","../image/image_57/57_Logne_3.jpg"]},"Consult_chateau_formulairefe1e":{"id":"Consult_chateau_formulairefe1e","dept":"57","canton":"Moulins-lès-Metz","commune":"Lorry-Mardigny","nom":"Lorry_Moselle","type":"Château","periode":"XVII-XVIII","histoire":"LORRY-MARDIGNY, en 1720 propriété de la famille de Reims, en 1741  achat des terres  par les Chazelles qui firent édifié au XVIIIe siècle le château pour le comte de Chazelles, conseiller et secrétaire du roi Louis XV en la chancellerie du parlement de Metz, receveur des finances de la généralité de Metz, qui avait acquis la seigneurie de Lorry en 1731 du comte de Beaurepaire. Il témoigne de l'art de vivre que connut Metz et la Lorraine au XVIIIe siècle.  En 1808 mort du président Chazelles Après la mort de son petit-fils, Joseph de Chazelles, décédé en 1854 sans postérité, le château passa à sa cousine Mme de Roguier, fille de Laurent de Chazelles, de Dornot. Au début du XXe siècle, il appartenait à Mme Berthelin, née Roguier.","architecture":"LORRY,  l'entrée principale, sur la cour d'honneur, présente une facade classique avec un léger avant-corps central surmonté d'un large fronton triangulaire, décorée de clefs de fenêtres ornées de cartouches rocaille, de coquilles feuillagées et de tête féminine. Un escalier à double révolution dessert la première terrasse. l'entrée  sur la cour d'honneur,  d'époque Louis XV, le château en pierre jaune de Jaumont est ouvert sur trois terrasses, s'organisant autour de trois pièces d'eau, alimentées en eau vive. La propriété fut embellie par le comte Laurent II de Chazelles, président du parlement de Metz, qui aménagea en 1753, de remarquables jardins en terrasses. Les jardins et les serres établis par ses soins attirèrent de nombreux visiteurs. Le catalogue des plantes de ses serres témoigne de sa grande compétence horticole. A cette époque, trois terrasse, de plus en plus grandes, descendaient jusqu'à la route, séparées par des murs de soutènement encadrés d'escaliers. Les allées bordées d'orangers ou de tilleuls et les parterres s'organisaient autour d'une fontaine sur la première terrasse, d'un buffet d'eau au pied de la deuxième et d'un vaste jet d'eau ovale à l'extrélité de la troisième. Devant l'orangerie s'étageaient d'autres terrasses, aujourd'hui  méconnaissable comme tout ce beau jardin dont il ne rest plus que le mur de clôture.","habitants":"comte de Beaurepaire\"","divers":"Château de Lorry à  Lorry-Mardigny                      48° 59' 23,53\" Nord, 6° 5' 8,7\" Est","gps":"","images":["../image/image_57/57_Lorry_Moselle_1.jpg","../image/image_57/57_Lorry_Moselle_2.jpg"]},"Consult_chateau_formulaire5969":{"id":"Consult_chateau_formulaire5969","dept":"57","canton":"Faulquemont","commune":"Louvigny","nom":"Louvigny_Fort","type":"Vestiges","periode":"IX-XI","histoire":"LOUVIGNY, la dislocation du duché de Gascogne, au IXe siècle, entraîne la formation de seigneuries autonomes, dont celle de Louvigny au Xe siècle. En 1554, la vicomté est érigée en comté, et Diane d'Andoins, vicomtesse de Louvigny, par son mariage, fait entrer la seigneurie dans la famille de Gramont, où elle demeure jusqu'à la Révolution. La motte dite Lou Castet, du XIIe ou du XIIIe siècle, haute de 8 m environ, pourrait être l'emplacement du château-fort du seigneur de Louvigny puis du roi-duc. La date de destruction du château est inconnue. Il servit de carrière et l'on retrouve des pierres en remploi dans les maisons du bourg. Restes des murs primitifs dans les jardins et la grange de la ferme Crabos, sur la face sud-ouest de la motte, sur une longueur de 30 m. L'accès au château se faisait par une porte charretière et une piétonnière percées dans la courtine à proximité d'une des tours d'angle, ces portes étaient adextrées, chacune possédait son propre pont-levis dont les rainures sont toujours visibles dans la maçonnerie. Éléments protégés MH : la maison-forte en totalité : inscription par arrêté du 2 novembre 1994. propriété de la commune.","architecture":"LOUVIGNY c'est une ancienne maison forte, il est privé. Louvigny possède 3 châteaux qui datent du XIVe siècle. Ils furent assiégés puis incendiés, en 1387, par l'armée de l'évêque de Metz. Le château actuel, cité en 1444, fut édifié pour empêcher le duc de Lorraine de s'approprier le pays messin, de plan quadrangulaire, pourvu de tours, bordé par un fossé. Le château fut très gravement endommagé durant la première guerre mondiale et un long travail de consolidation a été entrepris grâce à des chantiers de jeunes (stages internationaux en juillet avec de jeunes russes, et de jeunes polonais). Malgré qu'en ruines, est ouvert au public et se visite.","habitants":"seigneurs locaux\"","divers":"Vestiges du fort  à Louvigny                    48° 57' 45,12\" Nord, 6° 10' 53,96\" Est","gps":"","images":["../image/image_57/57_Louvigny_Fort_1.jpg","../image/image_57/57_Louvigny_Fort_2.jpg"]},"Consult_chateau_formulaire6dbe":{"id":"Consult_chateau_formulaire6dbe","dept":"57","canton":"Courcelles-Chaussy","commune":"Hayes","nom":"Lue","type":"château","periode":"XVII","histoire":"LUE, Jean Grandjambe, protestant fortuné de Metz, qui avait hérité d'une partie de la seigneurie de Lue, avait fait construire vers 1653 une maison seigneuriale. En 1728, sa fille Elisabeth et son second mari Nicolas-Etienne d'Augny, seigneur de Lue, vendirent la seigneurie et la maison seigneuriale à Angélique de Blair, veuve de Louis-François Sauterize de Campetz, conseiller au parlement de Metz. En 1749, Etienne-Louis Jobal, second président à Mortier au parlement de Metz, racheta à ses héritiers la seigneurie. Bien qu'on n'ait aucun texte sur la construction, c'est sans doute Etienne-Louis Jobal qui transforma la maison du XVIIe siècle en un véritable château du XVIIIe siècle, car à son décès en 1755 il n'est plus question de la maison seigneuriale, mais du château de Lue. La prorpiété passa à son fils Joseph-François-Louis Jobal, lieutenant général des armées du roi, député de la Moselle en 1815, titré comte de Lue par Louis XVIII. Après 1866, l'édifice revint par héritage au comte Gaston de Lambertye, puis par mariage, au comte Fernand du Plessis d'Argentré, dont la famille est l'actuelle propriétaire.","architecture":"LUE;  Le château est construit dans un site isolé, au milieu de la forêt de Lue. Le bâtiment de plan rectangulaire, avec des avants-corps latéraux sur les deux façades, est à trois niveaux, dont un niveau de combles. Les façades d'une grande sobriété, à ordonnance symétrique de neuf travées, sont identiques. Un balcon en fer forgé à consoles sculptées de volutes et de feuilles d'acanthe, seul élément décorarif de l'extérieur, surplombe les entrées côté cour et jardin. Le toit à la Mansart, couvert de tuiles creuses sur le terrasson et d'ardoises sur le brisis, est surmonté d'un clocheton ajouté en 1827. le château est entouré d'un parc paysager avec des pièces d'eau, aménagé dans la première moitié du XIXe siècle.  Éléments protégés MH : les façades et les toitures ; l'escalier et sa rampe en fer forgé ; la bibliothèque au premier étage ; l'obélisque et la glacière dans le parc : inscription par arrêté du 2 mars 1981.","habitants":"Famille Jean Grandjambe                                    Lue; Nicolas-Etienne d'Augny et Etienne-Louis Jobal\"","divers":"Château de Lue à la Hayes                                       49° 9' 39,9\" Nord, 6° 23' 3,81\" Est","gps":"","images":["../image/image_57/57_Lue_1.jpg","../image/image_57/57_Lue_2.jpg"]},"Consult_chateau_formulaire8f69":{"id":"Consult_chateau_formulaire8f69","dept":"57","canton":"Metzervisse","commune":"Luttange","nom":"Luttange","type":"Château","periode":"XIII-XIV-XV","histoire":"LUTTANGE, poste militaire durant la période gallo-romaine, Luttange relevait des comtes de Luxembourg qui eux-mêmes rendaient hommage aux évêques de Metz, comme on le voit par plusieurs actes de reprises de 1284 à 1377. A partir du XVe siècle, il nest plus question de lévêché de Metz dans les actes de reprises. Le 7 septembre 1638, pendant la guerre de trente ans, le village est brûlé par la garnison française, c'est sans doute pendant cette guerre qua été détruite une grande partie du château dont nous voyons encore les restes aujourdhui. Le donjon, les tours nord-ouest, sud-ouest et sud-est datent du XIVe siècle. Le château appartient alors à la famille de Luttange. Il appartient au XVe à la famille de Perpignant. Au XVIIIe siècle, une façade est plaquée sur la courtine nord et la tour nord-ouest est repercée. A cette époque, l'édifice est alors propriété des familles de Cabannes et d'Attel depuis la fin du XVIe siècle. Au XIXe siècle, la courtine Est est repercée. Pratiquement abandonné après la seconde guerre mondiale, le château menaçait de ruine. En 1965, les jeunes gens du village ont entrepris sa restauration et ont pu le sauver, malgré la faiblesse de leurs moyens. La façade sud, pratiquement écroulée, a pu être relevé avec des éléments importants du château de Daspich, à Florange, près de Thionville, ont pu y être incorporés; elle s'orne à présent d'un fort bel oriel, en pierre soigneusement appareillé, placé au dessus de la porte d'entrée, d'une échauguette, reconstruite à l'extrémité ouest de la façade, et d'une série de jolies fenêtres cintrées, qui a permis la création d'un second étage. Tous ces élément datent du XVIe siècle. A l'intérieur subsistent, presque dans chaque pièce, de charmantes cheminées en pierre sculptées du XVIIIe siècle. Propriété de la commune; inscription par arrêté du 2 novembre 1979.","architecture":"LUTTANGE,  situé sur un point stratégique. Le donjon, les tours nord-ouest, sud-ouest et sud-est datent du XIVe siècle.  Il appartient au XVe siècle à la famille de Perpignant qui y fera rajouter, devant le donjon, une tour ovale. Au XVIIIe siècle une façade est plaquée sur la courtine nord,la tour nord-ouest est repercée. Au XIXe siècle, c'est la courtine Est qui est repercée. Depuis 1965, le château de Luttange est en cours de restauration, notamment les façades sud et ouest où une échauguette, un oriel et une bretèche du XVIe siècle, construit au XIIIe siècle, le château de Luttange comportait à l'origine deux bâtiments d'habitation élevés dans la cour et reliés au point central par une tour de défense. A chaque siècle, des transformations furent opérées. Il existe encore deux tours rondes datant du XIIIe siècle et une tour carrée du XIVe siècle. Au XVe siècle, une porte ovale fut élevée devant la tour carrée, construction unique en Lorraine.","habitants":"Famille de Luttange\"","divers":"Château de  Luttange                                               49° 16' 10,07\" Nord, 6° 18' 33,92\" Est","gps":"","images":["../image/image_57/57_Luttange_1.jpg","../image/image_57/57_Luttange_2.jpg","../image/image_57/57_Luttange_3.jpg","../image/image_57/57_Luttange_4.jpg","../image/image_57/57_Luttange_5.jpg"]},"Consult_chateau_formulaired159":{"id":"Consult_chateau_formulaired159","dept":"57","canton":"Phalsbourg","commune":"Lutzelbourg","nom":"Lutzelbourg","type":"Vestiges","periode":"XI","histoire":"LUTZELBOURG, bâti au XIe siècle sur les ruines d'un castel romain, le château devient la possession de Pierre, fils de Frédéric de Montbéliard-Monçion, apparenté aux comtes de Dabo et d'Agnès de Savoie qui l'acquiert plus ou moins de force au détriment de l'Abbaye de Marmoutier, après avoir perdu une partie de son héritage de la maison de Savoie. Pierre prit le nom de Lutzelbourg et en devint comte. Il fit élevé les premiers éléments de la place forte qui devait servir à la défense du flanc sud du domaine. A sa mort en 1133, son fils Réginald, né de son mariage avec Itta, rendra les terres à l'Abbaye de Marmoutier. Etienne, évêque de Metz, hérita du château et en fit don à l'évêché et dut le défendre face à des expéditions militaires, notamment de Mathieu de Lorraine vers 1151.  Réginald sera le seul fils de l'union de Pierre et Ita, sa mort quelques jours, après Noël en 1142, laisse le comté sans descendance. L'évêque de Metz en reçut la souveraineté, vers 1150, et en donna la garde aux premiers seigneurs de Lutzelbourg.  Le 11 mai 1523 le château fort est pris et incendié par les troupes conduites par le comte Louis le Pacifique, le Landgrave de Hesse et l'électeur de Trèves. En 1840, les ruines du château de Lutzelbourg furent sauvées de la démolition grace à Adolf Germain, un notaire à Phalsbourg, car les propriétaires du château souhaitaient vendre les matériaux de la ruine aux entreprises qui construisaient la ligne de chemin de fer professeur de médecine à Strasbourg, Eugène Koeberlé racheta le site. Le château et ses ruines s'élèvent sur un promontoire rocheux, Un fossé en arc de cercle taillé dans le roc détache de la montagne l'éperon portant le château.","architecture":"LUTZELBOURG, après plusieurs ventes successives Eugène Koeberlé, professeur de médecine à Strasbourg, racheta le site. Vers 1900 il décida de consolider les ruines, d'entreprendre des fouilles et édifia la salle néo-romane. En 1909, il publia à Strasbourg son ouvrage \"Les Ruines du château de Lutzelbourg\" où il rapporte ses découvertes et ses hypothèses. La grande tour carrée du château, fut construite au XIIe siècle. Elle a une hauteur de 24 mètres et ses murs ont une épaisseur de 2,40 mètres. Elle fut construite, pour le comte Pierre de Lutzelbourg et son fils Reginald. Éléments protégés MH : les ruines du château de Lutzelbourg : classement par arrêté du 16 février 1930, propriété de la commune depuis 1977","habitants":"Adolf Germain                  comte Pierre de Lutzelbourg \"","divers":"Vestiges à  Lutzelbourg                             48° 43' 57,36\" Nord, 7° 15' 14,4\" Est","gps":"","images":["../image/image_57/57_Lutzelbourg_1.jpg","../image/image_57/57_Lutzelbourg_2.jpg","../image/image_57/57_Lutzelbourg_3.jpg"]},"Consult_chateau_formulaire9dcf-2":{"id":"Consult_chateau_formulaire9dcf-2","dept":"57","canton":"Bouzonville","commune":"Manderen","nom":"Malbrouck","type":"Forteresse","periode":"XIII-XIV","histoire":"MALBROUCK, fut construit par la volonté d'Arnold VI seigneur de Sierck en 1419 et achevé en 1434, année où le château est déclaré en mesure de soutenir un siège et mis au service de larchevêché de Trèves, à la mort du chevalier Arnold, passe par héritage à la famille de Syan, la descendance n'est pas assurée, va passer de propriétaires en propriétaires de la fin du XVe au début du XVIIe siècle. En 1705,  le château de Meinsberg se retrouve au premier plan de la scène internationale. L'Angleterre et les provinces unies se joignirent à l'Empire et la France se retrouvait face à une Europe coalisée et à son chef de guerre, John Churchill, duc de Marlborough, que les français surnommeront Malbrouck. Au début de l'année 1705, le duc de Malbrouck prépare son plan d'invasion de la France. Au mois de juin 1705 il dispose son armée aux portes du royaume de France, de la Moselle au château de Meinsberg, où il installe son quartier général. Face à lui, le maréchal Louis Hector de Villars s'apprête à défendre la frontière avec moins de 50 000 hommes. A un contre deux, Villars ne peut se permettre d'attaquer et doit se conduire avec sagesse. Malbrouck qui tient Villars en estime, décide de n'attaquer qu'avec le renfort du prince de Bade à qui il a donné rendez-vous au château de Meinsberg alors en attendant Malbrouck fait tout pour que le maréchal Villars sorte de ses positions, mais celui-ci, patient, ne bouge pas. Le face à face dure une dizaine de jours sans ravitaillement pour l'armée, tant et si bien que les soldats de Malbrouck, qui souffrent de la carence en vivres, désertent les uns après les autres. Le duc de Malbrouck se résigne donc à quitter la place sans livrer la bataille et profite d'une nuit de brouillard pour fuir vers Trèves et Maastricht,  le 17 juin au petit matin, Villars a la surprise de constater la disparition des ennemies.","architecture":"MALBROUCK. s'en est allé en laissant son nom à ce château. A cette époque, la seigneurie de Meinsberg était ruinée et le château dégradé. Il passera de mains en mains jusqu'en 1793, le bâtiment et ses terres furent achetées par Pierre Breidt, qui réussit petit à petit à reconstituer la seigneurie d'origine. L'aristocratie était remplacée par la bourgeoisie terrienne, et à partir de cette période, il connut une très lente dégradation. De plan trapézoïdal, quatre tours sont reliées par des courtines de 12 mètres de hauteur et de 4 mètres 80 d'épaisseur délimitant ainsi de longues façades. Sa courtrine ouest vient s'appuyer au logis seigneurial, tandis que celle du nord est perché d'un porche, précédé d'un fossé et d'un châtelet  d'entrée. Les quatre tours sont flanquées d'une tourelle d'escalier, la tour nord-ouest dite la tour des dames est la seule à adopter une silhouette circulaire les trois autres sont de plan carré. L'accès  à la forteresse est défendue par une barbacane et un pont levis, tandis que les quatres tours sont percées de meurtrières et d'autres types d'ouverture de tir, les courtines sont couronnées d'un chemin de ronde, la tour circulaire véritable donjon sur cinq niveaux, comporte une porte surélevée à 2m50 du sol. Son propriétaire actuel est le conseil général. le château est entièrement réhabilité et renaît de ses ruines en septembre 1998, Le château de Malbrouck est ouvert au public et se visite. Il a été classé M.H. en 1930.","habitants":"Seigneur de Sierck Arnold VI \"","divers":"Forteresse de Malbroock à  Manderen                                                          49° 27' 26\" Nord, 6° 25' 58\" Est  Barst  49° 04' 06\" Nord, 6° 50' 02\" Est","gps":"","images":["../image/image_57/57_Malbrouck_1.jpg","../image/image_57/57_Malbrouck_2.jpg","../image/image_57/57_Malbrouck_3.jpg","../image/image_57/57_Malbrouck_4.jpg","../image/image_57/57_Malbrouck_5.jpg","../image/image_57/57_Malbrouck_6.jpg","../image/image_57/57_Malbrouck_7.jpg"]},"Consult_chateau_formulaire1851":{"id":"Consult_chateau_formulaire1851","dept":"57","canton":"Moulins-lès-Metz","commune":"Lorry_Mardigny","nom":"Mardigny","type":"Château","periode":"XVI-XIX","histoire":"MARDIGNY, la seigneurie relevait de la puissante maison de Fenestrange et tenue au XIVe siècle par Jean de Varize appartenait au XIVe siècle a quelques puissantes familles messines, puis à Nicole Baudoche et, par héritage, à la fin du siècle à Laurent Le Gronaix. En 1404, elle passa à Thierry de la Tour, chanoine de la cathédrale de Metz qui, à sa mort, donna la terre de Mardigny au chapitre de Metz qui la posséda jusqu'en 1525, époque à laquelle il l'échangea avec Philippe de Raigecourt chambellan du duc de Lorraine le château demeure dans sa descendance et entre  par alliance dans la famille Marteau.  En 1651 acquit par Abraham le Duchat, conseiller au parlement de Metz. Le château fut vendu en 1678 à Nicolas Jacquemin puis en 1686 à François Georgin, procureur du roi de la ville de Metz, qui prit aussitôt le nom de Georgin de Mardigny procureur du roi. La propriété demeura dans cette famille jusqu'à la dernière guerre mondiale.","architecture":"MARDIGNY, on peut penser qu'à la maison-forte du Moyen-Age,  succéda au XVIe siècle un château défendu par une enceinte cantonnée de tours d'angle et d'une puissante porte avec pont-levis qui fut remplacé vers 1655 par un élégant portail, à porte piétonne et porte cochère, richement sculpté.  Le château était à l'origine un bâtiment de plan carré formé de quatre corps disposés autour d'une cour cantonné de tours rondes et carrées et entouré de larges fossés. Il n'en subsiste plus, aujourd'hui, que l'aile ouest encore encadrée de ses deux tours et la tour-porche située de biais, dans l'angle nord-est. La tour-porche, du XVIe siècle, de qualité tout à fait exceptionnelle, est précédée d'un pont qui franchit le large fossé. De plan massé, coiffé d'un toit à croupes couvert de tuiles plates en écaille, elle a conservé, sur sa façade extérieure, son hourd de pierre sur consoles et les rainures du pont-levis, bouchées. Le corps de logis est un bâtiment de plan rectangulaire allongé à toit d'ardoise à croupes, à façade principale ordonnancée symétrique, largement ouverte sur deux niveaux de neuf travées de fenêtres rectangulaires. L'entrée principale, sur la cour d'honneur, présente une façade classique avec un léger avant-corps central surmonté d'un large fronton triangulaire, décorée de clefs de fenêtres ornées de cartouches rocaille, de coquilles feuillagées et de tête féminine. Un escalier à double révolution dessert la première terrasse. Il semble que toute la façade ait été repercée au XIXe siècle, les fenêtres du deuxième niveau, surmontées de frontons cintrés, alternant avec des corniches, et une rangée d'oculus ovales ouverts pour éclairer les combles, date du XVIe au XIXe siècles.  Les façades et toitures du bâtiment d'habitation se situent au fond de la cour. La tourelle est accolée à l'angle nord-ouest de ce bâtiment. Les façades et toitures des communs nord et sud. Les ruines de la tour sud-ouest.    Éléments protégés MH : la tour carrée située à l'entrée de la cour ;  classement par arrêté du 19 septembre 1963 ; les douves et le pont : inscription par arrêté du 9 novembre 1984.","habitants":"Famille Marteau\"","divers":"Château de Lorry à Mardigny 48° 58' 33,38\" Nord, 6° 5' 12,73\" Est","gps":"","images":["../image/image_57/57_Mardigny_1.jpg","../image/image_57/57_Mardigny_2.jpg","../image/image_57/57_Mardigny_3.jpg","../image/image_57/57_Mardigny_4.jpg"]},"Consult_chateau_formulaire7013":{"id":"Consult_chateau_formulaire7013","dept":"57","canton":"Le Saulnois","commune":"Bourdonnay","nom":"Marimont","type":"Château","periode":"XIX","histoire":"MARIMONT, siège d'une seigneurie, puis baronnie, appartenant jusqu'à la Révolution aux comtes de Réchimont, le château, mentionné en 1291, fut détruit en 1427 par l'évêque de Metz, qui dut s'engager à le reconstruire. Néanmoins il fut une nouvelle fois dévasté en 1574 par un régiment français de passage en Lorraine et tomba en ruine. Un nouveau château fut construit au XIXe siècle, sans doute par Antoine Stanislas Nicolas Jankovitz de Jeszenicze, dont il subsiste un pan de tour circulaire, une chapelle ronde néo-classique abrite les tombeaux des familles Jankovitz et Falconet.","architecture":"MARIMONT, a été construit au XVe siècle. Il a été détruit. Au nord de Bourdonnay, isolé avec sa ferme et ses importantes dépendances bâties autour d'une vaste cour carrée, le château était un large bâtiment trapu, de plan massé, couvert d'un toit à demi-croupes, cantonné de tours rectangulaires. Du côté de la façade principale donnant sur la cour, deux ailes rectangulaires en retour d'équerre prolongeaient les tours. Les façades basses  étaient percées de fenêtres rectangulaires sur un seul niveau. Dans le parc, sur la butte, ou était construit le château médiéval, dont il subsiste un pan de tour circulaire, une chapelle ronde néo-classique Il ne reste qu'une chapelle funéraire de style néo-classique. Éléments protégés MH : les vestiges du château, à Marimont, y compris la chapelle funéraire néoclassique : inscription par arrêté du 24 décembre 1991.","habitants":"Famille de Antoine Stanislas Nicolas Jankovitz de Jeszenicze\"","divers":"Château de  Marimont à Bourdonnay                                                               48° 44' 01\" Nord, 6° 43' 47\" Est","gps":"","images":["../image/image_57/57_Marimont_1.jpg","../image/image_57/57_Marimont_2.jpg"]},"Consult_chateau_formulairea6dd":{"id":"Consult_chateau_formulairea6dd","dept":"57","canton":"Montigny-lès-Metz","commune":"Marly","nom":"Marly","type":"Gentilhommière","periode":"XIII au XIX","histoire":"Six gentilhommières dans cet article dont Marly, Bogenez,les granges aux Ormes, Haack, Avallon de Jouy, Chandelier, et Le Jaille (Henrion)                                 MARLY sur les 6 châteaux de Marly, on peut dire que seuls deux dentre eux méritent la dénomination de château : le château-ferme seigneurial de part ses origines historiques et le château de la Grange aux Ormes, de part son histoire et sa physionomie. Les autres châteaux mériteraient plutôt lappellation de gentilhommière. Ces 6 ont une histoire qui continue aujourdhui encore, puisquil y a de la vie dans ces demeures.                                                                                                      BOGENEZ, de 1352 à 1685, il appartint tour à tour aux de Marly, de Gournay, Baudoche, De Heu, de Raigecourt.  En 1685, tout le domaine seigneurial était entre les mains des dArros de la Motte. En 1758, en partie, entre les mains des Legoullon. Par la suite, divers fermiers lont occupé dont les Dory et Louyot au XXe siècle. En 1963, Hyacinthe Bogenez lachète et la famille y demeure toujours.                                           GRANGES aux ORMES, en 1322 à M. Collignon de Strasbourg, en 1404  la famille de Vry, en 1436, sire Philippe Marcoult  En 1500, le château est vendu aux Chauvrain puis en 1586,  Claude dApremont le vend aux Gronnaix et les acquéreurs se succèdent : Jehan de Travald ; le chapitre de la cathédrale jusquen 1611 ; en 1614, Jacques Loys, avocat au parlement de Paris ; en 1661, le comte de Cherisey ; en 1709, M. Le Goullon qui le vend à Mgr Coislin, évêque de Metz pour y faire son palais épiscopal. La famille Saint-Hélier lachète en 1728.  En 1785 la  famille de Clermont-Tonnerre, et en 1923, à Hyacinthe Bogenez.                                         HAACK, en 1847, à la mort de Philippe,  en 1914 où le commerçant Paul Gaertner lachète. Adrien Fenot, jardinier, en fait lacquisition en 1933. En 1951, Mme et M. Clément Haack, gardien de la paix, en deviennent propriétaires. Après le décès de Clément, le château revient à son épouse, Mme Rose Haack. La famille Lagarde, puis les frères Levy deviennent propriétaires.","architecture":"ANCILLON de  JOUY, en 1887, à la mort de M. Ancillon de Jouy, Louis Henrion, agriculteur, achète la propriété et en 1938, son fils Emile, célibataire, en hérite. A sa mort, en 1940, la famille de sa mère, les Gircourt, en héritent et vendent le mobilier, puis le château en 1947.  Sa construction remonterait à la fin du XVIIIe siècle. Le château d'Ancillon-de-Jouy appartient au maraîcher Butin, depuis 1947.                                            CHANDELIER,  construit en 1845, porte le nom de son constructeur : Jean-Nicolas Chandellier, né le 1er juillet 1777 à Scy. En 1922, le château abritait une mission de surs franciscaines de Marie qui y avait installé un ouvroir, et en labsence de M. le curé, y enseignaient le catéchisme aux enfants. Les soins aux malades assurés par une infirmière complétaient leur activité. En 1931, deux ans après le départ des surs franciscaines, en 1935, peu dannées avant sa mort le 26/04/1937, Mlle Marie-Marguerite fit un legs en faveur de lévêché de Metz qui en devint le nouveau propriétaire du château et de ses dépendances. Il confia la gestion aux surs de Peltre, déjà en place, qui le convertirent alors en une maison de retraite pour personnes âgées. En 1939, à la libération, la mairie-école étant gravement endommagée, le château abrita jusquà sa réfection en 1951 les services de la mairie et les classes primaires.                                                                                                                LEJAILLE ou château Henrion; construit  1880 par Emile et Marguerite Lejaille.En 1901, elle vendit le château à M. Jean-Joseph Henrion, agriculteur à la ferme Chandellier devenue ferme Joly.En 1953, celle-ci en fit donation à deux de ses enfants Hubert et Gilberte Henrion qui le vendirent à la commune de Marly .  En 1977, le centre musical sy installe. En 1982, il devient lécole municipale de musique, des cours ont également lieu au centre la Louvière.","habitants":"Divers personnage\"","divers":"Six gentilhommières dans cet article dont Marly grav 1, Bogenez grav-3,les granges aux Ormes grav 6, Haack grav-4, Avallon de Jouy grav 7, Chandelier grav-2-3, et Le Jaille (Henrion) grav-5                                                 Ancillon 49° 03' 39\" Nord 6° 09' 16\" Est                                                       Chandelier49° 03' 39\" Nord, 6° 09' 16\" Est","gps":"","images":["../image/image_57/57_Marly_1.jpg","../image/image_57/57_Marly_2.jpg","../image/image_57/57_Marly_3.jpg","../image/image_57/57_Marly_4.jpg","../image/image_57/57_Marly_5.jpg","../image/image_57/57_Marly_6.jpg","../image/image_57/57_Marly_7.jpg"]},"Consult_chateau_formulaire4348":{"id":"Consult_chateau_formulaire4348","dept":"57","canton":"Le Saulnois","commune":"Marsal","nom":"Marsal","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux dans cet article; Marsal  et Berthélémont.                       MARSAL, soucieux de préserver le sel de la convoitise germanique, Louis XIV confie à Sébastien le Pestre dit Vauban  l'amélioration des fortifications de la cité saline. S'il ne reste que quelques vestiges bien délabrés des remparts, nous en montre avec une étonnante précision le tracer géométrique. La porte de France conservée dans un état qui justifie l'hébergement du musée départemental du sel mérite absolument une visite  guidé commenter par la présentation d'une étonnante collection de salières, de la plus kitch à la plus raffinée, mais le plus intéressant reste la reconstitution d'une exploitation néolithique, quelques pans des fortifications de Vauban, restaurés en 1821-1823, sont encore visibles actuellement.","architecture":"MARSAL Porte de France classée monument historique le 6 mars 1928: antérieure à 1663, appelée porte Notre-Dame, elle défendait l'accès principal à Marsal et a été fortement remaniée dans la première moitié du XVIIe siècle. La poterne sud est également conservée et a été restaurée assez récemment. L'édifice est classé aux M.H. en 1928.                                                                                           BARTHELEMONT à deux K.M. au nord-Est à St-Médard,  Barthélémont était un petit village qui fut incendié au début de la guerre de trente Ans et dont il ne subsista que le château. Au XIXe siècle, ce château devint la propriété du comte de Bourcier de Montureux qui le fit reconstruire sous le second empire par l'architecte Jean Corrard des Essarts. C'est une construction rectangulaire à deux niveaux dont la façade principale, dominant la vallée de la Seille au sud, présente trois avants-corps qui, avec les hautes toitures et le jeu des rampes descendant de la terrasse vers le parc, donnent assez d'allure à une architecture très banale. A côté de ce château, on éleva une chapelle néo-gothique qui fut transportée, après 1920, à l'entrée du cimetière militaire de Riche; on y avait placé d'intéressant vitraux de 1529, provenant de l'église des soeurs grises d'Ormes et vendus depuis au Métropolitan Muséum of Art à New-York.","habitants":"Marsal  Famille de   Sébastien le Pestre- Vauban                Berthélémont  comte de Bourcier de Montureux \"","divers":"dans cet article; Château de Marsal grav-1  et de Berthélémont grav-2.","gps":"","images":["../image/image_57/57_Marsal_1.jpg","../image/image_57/57_Marsal_2.jpg"]},"Consult_chateau_formulaire4211":{"id":"Consult_chateau_formulaire4211","dept":"57","canton":"Courcelles-Chaussy","commune":"Ars-Laqueney","nom":"Mercy_Ars","type":"Château","periode":"XIX-XX","histoire":"MERCY, sous lannexion allemande, le château de Mercy a été reconstruit par Maurice du Coetlosquet en 1905 sur les vestiges d'une ancienne demeure. Empruntant ses références stylistiques à toutes les époques du gothique finissant au XVIIIe siècle. En 1919, le domaine est vendu. Un Suisse, Schneider, achète le château, et crée un élevage de bovins. Pour ce faire, il fait détruire le magnifique Jardin à la Française, afin d'installer des clôtures de parquage. Endetté, il disparaitra de la région et le château de Mercy sera racheté par les Domaines, en 1938. Vendu par Mme du Coëtlosquet en 1926, il rejoint le domaine militaire, en 1938. Il est ensuite successivement occupé par l'armée canadienne, au titre de l'Otan puis, par l'armée française jusqu'en 2000 où il fut rétrocédé à Metz, pour l'aménagement du pôle santé de Mercy.","architecture":"MERCY, l'édifice se veut le témoin du bon goût à la française. Les façades sont à trois niveaux. L'ensemble est animé par la forme et la décoration des baies où se mêlent linteaux droits en plein cintre en arc segmentaire, la décoration de la façade est ornée de cariatides supportant la corniche de l'avant-corps central. A l'intérieur, la grande salle lambrissée à plafond à caissons, donne sur un immense hall d'entrée, où se trouve une cheminée Renaissance. L'escalier à l'admirable rampe en fer forgé et en bronze mène à un palier où le plafond est soutenu par des colonnes de marbre.","habitants":"Famille de  Maurice du Coetlosquet\"","divers":"Château de Mercy  à Ars-Laqueney                                                    49° 05' 04\" Nord, 6° 14' 38\" Est","gps":"","images":["../image/image_57/57_Mercy_Ars_1.jpg","../image/image_57/57_Mercy_Ars_2.jpg"]},"Consult_chateau_formulaire7acc":{"id":"Consult_chateau_formulaire7acc","dept":"57","canton":"Metz","commune":"Metz","nom":"Metz","type":"Forteresse","periode":"XIII-XIX","histoire":"Quatre bâtiments dans cet article, la Porte, Crépy, Lasalle  et fort Queleu.                                                                                                                                                                                  La PORTE à METZ, cette porte de ville a été construite du XIIIe siècle à la fin du XVIe siècle. Elle est de style Gothique et Renaissance. Elle servait de pont, sur la Seille du XIIIe siècle, au début du XXe siècle. La porte des allemands est, aujourdhui, le plus important vestige des remparts médiévaux de Metz. Elle témoigne de lévolution de larchitecture militaire, au Moyen-Age, la porte des allemands dominait la ligne denceinte orientale, sur près de 1 200 m, depuis la porte Mazelle jusquà la porte Sainte-Barbe. Véritable porte-forteresse, dotée de tours, de créneaux et de mâchicoulis, doit son nom aux chevaliers de l'ordre teutonique, appelés aussi les « frères hospitaliers de Notre-Dame-des-Allemands », installés à l'époque, dans une rue voisine. Leur hospice fut détruit par François de Guise, lors du siège de Metz, de 1552.                                                                                           Au sud de Metz manoir de CREPY, de la maison-forte de la famille de Heu, mentionnée au XVe siècle, il ne reste plus de traces. Le château actuel a été bâti en 1873 par François-Gérard d'Hannoncelles, 1er président à la cour d'appel de Nancy, et qui appartenait depuis 1820  à sa femme Louise-Elisabeth Pyrot de Crépy, sur l'emplacement d'un château incendié lors des combats de septembre 1870,  Depuis 1957 il appartient aux frères des écoles chrétiennes, qui y installèrent un noviciat et un juvéniat.","architecture":"CREPY,  De la maison-forte de la famille de Heu, mentionnée au XVe siècle, il ne reste plus de traces. Le château actuel a été bâti en 1873 par François-Gérard d'Hannoncelles, 1er président à la cour d'appel de Nancy, et sa femme Louise-Elisabeth Pyrot de Crépy, sur l'emplacement d'un château incendié lors des combats de septembre 1870, et qui appartenait depuis 1820 à la famille Pyrot de Crépy. Depuis 1957 il appartient aux frères des écoles chrétiennes, qui y installèrent un noviciat et un juvéniat.\nLe château de Crépy, de plan rectangulaire à trois niveaux, n'a pas de style bien particulier. Dans les dépendances, elles aussi reconstruites en 1873, une tour carrée munie d'archères, une autre tour ronde servant de colombier et quelques fenêtres à meneau donnent une allure ancienne au château. Les seuls éléments intéressants sont une porte en fer forgé aux initiales HP (Hannoncelles Pyrot) dans la cour du château vers les dépendances et un beau parc dans lequel on a élevé de nouveaux bâtiments.                                                                                                                   Quartier Ban St-Martin le château de LASALLE, construit  vers le milieu du XVIIIe siècle. La plupart des pièces ont conservé leurs aménagements du XVIIIe siècle.                                                                                                             Fort QUELEU date du XIXe siècle. Le fort de la première ceinture de Metz fut construit, dès 1868 et achevé de 1872 à 1875, par les allemands, sous l'appellation de \"Feste Goeben\". Entre 1943 et 1944, plus de 1 500 patriotes furent détenus, par la gestapo, dans la caserne de gorge, avant leur envoi dans un camp de concentration. C'est un ouvrage en béton avec un parement en pierre de Jaumont, qui possède 2 étages de casemates, dont seul, le niveau inférieur a servi de prison. Ce niveau comprend un ensemble de salles voûtées, avec des cellules individuelles aménagées dans l'une d'elles. Le fort de Queuleu est devenu aujourd'hui la propriété de l'état. Aujourd'hui est devenu un lieu de mémoire, un Mémorial de la Résistance et de la Déportation, une zone de loisirs et un parcours de santé.Il est inscrit aux M.H. depuis le 13/02/1970.","habitants":"Crépy;  Famille Pyrot de Crépy.\"","divers":"dans cet article de Metz, la Porte grav-1-2-3, Crépy grav 4,   et fort Queuleu grav 5-6-7.                    Porte : 49° 07' 3,04\" Nord, 6° 11' 09,91\" Est                                              Crépy  49° 04' 33\" Nord, 6° 13' 29\" Est                                                  Fort Queuleu grav-5- 6-7                       49° 05' 50,28\" Nord, 6° 12' 15,44\" Est","gps":"","images":["../image/image_57/57_Metz_1.jpg","../image/image_57/57_Metz_2.jpg","../image/image_57/57_Metz_3.jpg","../image/image_57/57_Metz_4.jpg","../image/image_57/57_Metz_5.jpg","../image/image_57/57_Metz_6.jpg","../image/image_57/57_Metz_7.jpg"]},"Consult_chateau_formulairef569":{"id":"Consult_chateau_formulairef569","dept":"57","canton":"Metz","commune":"Metz","nom":"Metz_II","type":"Palais","periode":"XIX","histoire":"Quatre chateaux dans cet article Le palais du Gouverneur,  Lasalle Pontoy et Pouilly.                            METZ, Le palais du Gouverneur, appelé autrefois général-kommando, est une résidence édifiée à Metz, entre 1902 et 1905, pour servir de pied-à-terre à lempereur Guillaume II, est de style Néo-Renaissance Rhénan, a été construit, de 1902 à 1905, par les allemands. Après la première guerre mondiale, la France reprend possession de lAlsace et de la Moselle. Le général de Maudhuy, nouveau gouverneur de Metz, s'installe au palais en 1919. L« hôtel du général commandant le XVIe corps darmée » devint « l'hôtel du général commandant supérieur des troupes en Lorraine », puis « palais du Gouverneur » en 1922 avec le général de Lardemelle. Les vitraux aux armes impériales sont remplacés en 1925 par le maître-verrier Michel Thiria. Pendant la seconde annexion, le palais du gouverneur retrouve sa fonction première de kommandantur. Ses souterrains sont alors utilisés comme abris anti-aériens, mais aussi poste de commandement durant la bataille de Metz. Aujourdhui, lédifice accueille le commandant de la région militaire nord-est. Létat-major inter-armées de la zone de défense Est est implanté à Metz et localisé avec létat-major de la région terre nord-est. Ce siège gouvernait une zone comprenant le Nord-Pas de Calais, la Picardie, la Lorraine, Champagne-Ardenne, lAlsace, la Bourgogne et la Franche-Comté et les forces basées en Allemagne. Ses façades et ses toitures sont protégées par un arrêté du 15/01/1975. Le palais du Gouverneur a été restauré en 1994-1995. Dans le parc, se trouvent toujours les vestiges du rempart romain et les immenses salles souterraines de la tour dEnfer, laquelle formait un angle du rempart médiéval. Il est situé square Giraud, au Sud-Ouest du quartier de Metz-Centre, mais reste historiquement lié, au quartier impérial, plus à lEst. Le palais du gouverneur est inscrit à linventaire supplémentaire des M.H. depuis 1975.","architecture":"à  Le Ban-St-Martin  LASALLE, a été construit vers le milieu du XVIIIe siècle. La plupart des pièces ont conservé leurs aménagements du XVIIIe siècle. En 1951, le château  abrite une école denseignement ménager, remplacée plus tard par lIRTS. Éléments protégés MH : le château avec son décor intérieur : inscription par arrêté du 10 mai 1996.                                                                                           PONTOY,  au sud-est de Metz   appartenait  au chapitre de la cathédrale de Metz jusqu'à la Révolution, également, et il servait de refuge pour les habitants des maisons environnantes, sa garde était confiée, au XVIe siècle à des châtelains que désignait le chapitre. En 1490, il fut pris et incendié par les Lorrains, puis reconstruit au XVIe siècle. La garnison qui l'occupait lors de l'attaque des troupes de Frantz de Sickingen contre les messins en 1518, l'abandonna pour se réfugier à Metz. En revanche, en 1545, le chapitre ordonna au châtelain de se défendre à tout prix contre les gens de Guillaume de Furstemberg et les espagnols. Par la suite le château qui était encore entouré de fossés en 1737, ne joua plus aucun rôle défensif. Au XVIIIe siècle, il fut laissé par le chapitre à l'amodiateur de la terre,  a l'allure générale d'une maison-forte: un logis constitué d'un bâtiment carré et trapu, couvert d' un toit en pavillon à faible pente, flanqué au sud d'un corps rectangulaire plus bas faisant la jonction avec deux tours semi-circulaires débordant à l'ouest, reliés par une courtine, vestiges du château médiéval.                                                                     POUILLY, ainsi appelé depuis le XIXe siècle,  maison seigneuriale de Jacques Baltus, controleur des guerres à Metz, qui avait acquis en 1767 la moitié de la seigneurie, reconstruite après 1767 fut vendue en 1817 par son fils, le baron Basile-Guy-Marie Baltus, à Louis Chéron, rentier à Metz et depuis cette époque changea souvent de propriétaire. De la maison seigneuriale du XVIIe siècle, appartenant aux Roucel, aux Bechevel puis passée par héritage au XVIIIe siècle aux Collignon de Pouilly, il subsiste une porte cochère et une porte piétonne à bossages fermant la cour, et peut-être aussi le colombier accolé à l'est au bâtiment d'habitation à deux niveaux et toit à croupes de la fin du XVIIIe siècle.","habitants":"lEmpereur Guillaume II\"","divers":"dans cet article de Metz; Le palais du Gouverneur Grav 1-2-3-4,  Lasalle grav-5-6 Pontoy grav-7 et Pouilly-8.  49° 06' 48,24\" Nord, 6° 10' 06,24\" Est, Lasalle-grav 3-4","gps":"","images":["../image/image_57/57_Metz_II_1.jpg","../image/image_57/57_Metz_II_2.jpg","../image/image_57/57_Metz_II_3.jpg","../image/image_57/57_Metz_II_4.jpg","../image/image_57/57_Metz_II_5.jpg","../image/image_57/57_Metz_II_6.jpg","../image/image_57/57_Metz_II_7.jpg","../image/image_57/57_Metz_II_8.jpg"]},"Consult_chateau_formulaire5462":{"id":"Consult_chateau_formulaire5462","dept":"57","canton":"Montigny-lès-Metz","commune":"Montigny-lès-Metz","nom":"Montigny_lès_Metz","type":"Château","periode":"XVI-XVII","histoire":"Trois châteaux dans cet article; Frescatelly, Courcelles et Montigny et la Grange -Mercier.                                                                                                                           FRESCATELLY, folie construite aux portes de Metz par Claude Auburtin de Bionville, avocat au parlement de Metz, entre 1718, date ou il acheta le terrain à François Marc, procureur du roi au parlement de Metz, et en 1738, date de sa mort. Le petit château de Frescatelly doit son nom à la présence, à quelques kilomètres de là, de la résidence d'été des évêques de Metz, le château de Frescatelly. A la mort de son propriétaire en 1738, le château fut vendu à Antoine-François Mey de Valombre, lieutenant général de lespée du bailliage de Metz, puis en 1775, à demoiselle d'Eu de Moncel, veuve de Louis-Philippe de Ferrié, chevalier, seigneur de Scy et de Verny, président à mortier du parlement. Vendu comme bien national en l'an III au sieur Collin-Combe, il passa ensuite aux frères Bompart puis à Jean-Pierre-Charles Bouchotte, déjà propriétaire de Frescatelly. En 1866, la ville de Metz racheta le château et les jardins à l'anglaise à la baronne de l'Espée, dernière propriétaire du château, pour y installer son jardin botanique. Frescatelly est une haute bâtisse de plan rectangulaire massé, couvert d'un toit d'ardoise à la Mansart, jardin botanique.                                                                                                                            MONTIGNY, la Horgne-au-Sablon XIVe siècle, brûlé en 1372 par le roi de Bohême, grosse tour dangle qui servit de chambre à Charles Quint en 1552 lors du siège de Metz ; plaque rappelant lévènement, présence également de remparts et de deux autres tours en arrière des premières ruines ; situé sur le territoire du Sablon jusqu'à la fin du XIXe siècle, détruit en 1944. Ancien château fort « Château-lEvêque », détruit pendant le siège de Metz de 1552.","architecture":"COURCELLES  le \"château de Courcelles\" et son parc offrent une vue très ouverte sur les côtes, notamment le Saint Quentin. Cette très belle maison de maître dont la construction remonte au début du XVIIIè siècle, figure pour la première fois, en 1716, sur un plan de Nicolas Duchêne comme appartenant \"à Monsieur de Courcelles\". Le château s'anime avec ses toits d'ardoise accompagnés de lucarnes et capte la lumière grâce à ses neuf travées de hautes fenêtres disposées sur deux niveaux. Dans le tissu montignien aux côtés des édifices religieux, des bâtiments militaires, des établissements d'éducation, le château de Courcelles est l'unique construction civile d'envergure qui offre une histoire et une architecture vivante. L'Espace Europa-Courcelles vous ouvre ses portes. Au château de Courcelles, tout un chacun pourra mener un train élégant, convivial et respectueux entre glaces et miroirs surmontés de trumeaux. Parquets, boiseries, marbres, lambris et gypse accueilleront conversations et causeries rythmées par le frôlement des soieries et le chuchotement des grands arbres répétant à l'envie les rumeurs de la vallée.                                                                                                                                                              GRANGE le MERCIER, la terre et seigneurie de la Grange le Mercier appartenait au XVIe siècle aux Gournay, puis aux Bouillac et au XVIIe siècle aux Streiff de Lawenstein. En 1681 Armand de Blair, lieutenant général au bailliage de Metz, seigneur de la Grange le Mercier, fit hommage au roi de France pour le château ou maison fossoyée, qui fut vendu en 1687 à Abel de Poilbois, lieutenant du roi au gouvernement de Metz. La seigneurie passa au XVIIIe siècle par mariage à Nicolas-François Auburtin de Chesny, et à la famille de Navarre, puis à la fin du XVIIIe siècle à la famille Dumoulin, qui tenait encore le domaine au début du XIXe siècle. Celui-ci revint par alliance aux Allouard-Carny et fut acquis en 1895 par le conseiller Jean Haniel, propriétaire du château de Landonvillers. Le château de la Grange Le Mercier, reconstruit au XVIIIe siècle, est l'un des exemples les plus intéressants de ce que l'on a appelé les fermes-châteaux du pays messin. La porte cochère surmontée d'une tour carrée donne accès à la cour autour de laquelle sont distribués le logis dont la façade arrière a conservé des fenêtres en arc segmentaire, le colombier et les dépendances.","habitants":"Famille de Frescatelly-Antoine-François,               Mey de Valombre                         Grange famille Dumoulin\"","divers":"Montigny-lès-Metz  quatre  châteaux dans cet article; courcelles -grav-4-5  Frescatelly  grav 2-3 et Montigny grav-6 et la grange-Mercier-grav-1                                                         La Horgne 49° 05' 21? N, 6° 10' 30? E     Maison de Gaule grav_8","gps":"","images":["../image/image_57/57_Montigny_l%c3%a8s_Metz_1.jpg","../image/image_57/57_Montigny_l%c3%a8s_Metz_2.jpg","../image/image_57/57_Montigny_l%c3%a8s_Metz_3.jpg","../image/image_57/57_Montigny_l%c3%a8s_Metz_4.jpg","../image/image_57/57_Montigny_l%c3%a8s_Metz_5.jpg","../image/image_57/57_Montigny_l%c3%a8s_Metz_6.jpg","../image/image_57/57_Montigny_l%c3%a8s_Metz_7.jpg","../image/image_57/57_Montigny_l%c3%a8s_Metz_8.jpg"]},"Consult_chateau_formulaire0822":{"id":"Consult_chateau_formulaire0822","dept":"57","canton":"Courcelles-Chaussy","commune":"Montoy-Flanville","nom":"Montoy","type":"Château","periode":"XVI-XVIII","histoire":"MONTOY, le château appartenait vers 1480 à Jean Cheverson, échevin de Metz. Il fut assiégé et incendié en 1518 par Franz von Sickingen lors d'une expédition punitive contre Metz. Michel Chaverson, fils de Jean fit reconstruire le château, qu'il transforma en une solide forteresse. Sa fille l'apporta en dot en 1531 à Robert de Heu, seigneur de Clervant, important chef huguenot. Le château vendu en 1618 par Nicole de Vienne, et changea souvent de propriétaires. Au XVIIIe siècle, il appartint à des officiers du parlement de Metz, Armand-Philippe Charuel, président à Mortier, puis en 1748 à Jean-Nicolas Brazy, conseiller. Il passa ensuite à son fils Pierre, puis après 1834, par héritage, à Louis Durand d'Aunoux, lieutenant colonel de cavalerie et à sa femme Adélaïde-Louise de Larminat, décédé  sans postérité. En 1885, le baron Pierre Louis de Larminat vendit le domaine avec le château et la chapelle à Dominique Juste, de Verny.","architecture":"MONTOY, l'ancien château du début du XVIe siècle avait été remplacé dans la seconde moitié du XVIIIe siècle, par une demeure plus moderne. Le donjon disparut également au début du XIXe siècle, peut-être en 1837, mais trois tours furent conservées et intégrées au nouveau bâtiment.  De l'ancien château était flanqué de cinq tours, défendu par un donjon carré et entouré d'un fossé traversé par un pont-levis situé près de la tour dite de la garde, il ne subsiste plus que quelques éléments; dans le prolongement de l'aile nord du château actuel, la haute tour carrée de la garde et dans le prolongement de l'aile sud la tour ronde, très remaniées. En revanche, la grosse tour attenante au bâtiment de la ferme à l'est du château, couverte d'un toit conique, n'a guère été modifiée. Le château du XVIIIe siècle est un bâtiment rectangulaire à trois niveaux, dont un niveau de combles, encadré de deux petites ailes sur le même alignement. Fortement restauré notamment après 1965, il n'offre guère d'intérêt; l'aile gauche abrite la chapelle actuellement désaffectée, Aujourd'hui, le château de Montoy a été entièrement réaménagé en appartements privés. On peut admirer la haute tour carrée de la garde du XVIe siècle plus élevée, et dans le prolongement de l'aile sud, la tour ronde dite de la chapelle. Le château fut très fortement restauré, notamment après 1965. On peut également noter l'existence d'un pigeonnier à l'arrière du domaine ainsi que les sépultures des familles Brazy-Durand d'Aunoux, dans la chapelle, depuis, désaffectée.","habitants":"Famille; Armand-Philippe Charuel\"","divers":"Château de Montoy à Montoy-Flanville                                                     49° 07' 12\" Nord, 6° 16' 39\" Est","gps":"","images":["../image/image_57/57_Montoy_1.jpg","../image/image_57/57_Montoy_2.jpg","../image/image_57/57_Montoy_3.jpg","../image/image_57/57_Montoy_4.jpg"]},"Consult_chateau_formulairec0ff":{"id":"Consult_chateau_formulairec0ff","dept":"57","canton":"Hayange","commune":"Moyeuvre-Grande","nom":"Moyeuvre","type":"Château","periode":"XVI","histoire":"MOYEUVRE;  en 1598 que Jean Pierron de Bettainvillers fit construire le château, pour servis de siège à la seigneurie, avec son fils Louis qui s'y installa dès 1599, au moment de son mariage avec Marguerite Françoise, fille de Simon François, seigneur d'Auboué et de Saulcy. A la mort  de Louis de Bettainvillers en 1644, le château passa à son fils Jean, puis en 1685 à son petit-fils Gury-Dieudonné. La fille de ce dernier, Anne-Dorothée de Bettainvillers de Mensberg, qui avait épousé en 1711 Claude-Alexandre de Pons, marquis de Rennepont, séjourna au château jusque vers 1730, puis la famille quitta Moyeuvre. Le château fut alors loué de 1733 à 1805 et dès 1740, c'est la famille Cochard, de Moyeuvre, qui en devenait fermier. En 1805, les frères Cochard s'en rendirent acquéreurs et le possédèrent jusqu'en 1873, date à laquelle la partie ouest du château fut vendue à la société de Wendel qui y installa une infirmerie, avant de pouvoir racheter en 1904 la totalité du bâtiment.\nÉdifié sur la rive gauche de l'Orne.","architecture":"MOYEUVRE, le château est un bâtiment de plan rectangulaire massé, cantonné de tours rectangulaires, l'ensemble couvert de hauts toits à croupes en ardoise. Les façades, repercées et modifiées depuis le XIXe siècle, ont conservé quelques croisées anciennes au deuxième niveaux et des petites fenêtres géminées en plein cintre éclairant les combles au troisième niveau. Des cordons à hauteur des appuis et des linteaux des baies délimitent les niveaux de la façade principale. La porte d'entrée en plein cintre, précédée d'un escalier à volée double, est la partie la plus soignée de l'ensemble, deux colonnes à chapiteaux corinthiens supportent une corniche, fortement moulurée, surmontée d'un fronton rectangulaire daté de 1616, amorti par un cadran solaire. Des rinceaux, des enroulements végétaux et des cannelures décorent les colonnes, les pilastres et les écoinçons. L'intérieur a conservé plusieurs éléments anciens: des cheminées, des taques aux armoiries des Bettainvillers-François, datées 1600.Il fut bâti, en 1598, pour Louis Pierron de Bettainvillers. Il sera achevé, en 1616 comme lindique le frontispice du portail, qui sera restauré au XIXe siècle. Les croisées Renaissance et cheminées le seront au XVIIe siècle.","habitants":"Famille de Jean Pierron de Bettainvillers\"","divers":"Château de Moyeuvre                                            49° 15' 12\" Nord, 6° 02' 47\" Est","gps":"","images":["../image/image_57/57_Moyeuvre_1.jpg"]},"Consult_chateau_formulaire43bc":{"id":"Consult_chateau_formulaire43bc","dept":"57","canton":"Sarreguemines","commune":"Neufgrange","nom":"Neufgrange","type":"Château","periode":"XVIII","histoire":"Au sud-est de Sarreguemines  NEUFGRANGE,  construit vers 1761 par le baron Jean-Nicolas de Jacquemin, seigneur de Neufgrange, le château devint au début du XIXe siècle propriété de la famille Roger de Belloquet. En 1903, Jeanne-Marguerite Roger de Belloquet, épouse de Charles Paul, comte de Rousselot de Morville, le vendit avec le domaine à la congrégation des pères missionnaires du Saint-Esprit, qui en est encore propriétaire aujourd'hui.","architecture":"NEUFGRANGE, c'est un petit château, mais bien proportionné. Le bâtiment de plan rectangulaire, à façade principale ordonnancée, est à deux niveaux de cinq travées et le toit est percé de lucarnes. Deux tours rondes couvertes d'un toit à bulbe flanquent la façade principale, prolongée à droite par une petite aile. Les encadrements des fenêtres et de la porte d'entrée sont en grès rouge. A l'intérieur, il subsiste encore deux cheminées du XVIIIe siècle.","habitants":"Famille Roger de Belloquet\"","divers":"Château de Neufgrange à  Neufgrange                                   49° 04' 39? nord, 7° 04' 07? est","gps":"","images":["../image/image_57/57_Neufgrange_1.jpg"]},"Consult_chateau_formulaire166c":{"id":"Consult_chateau_formulaire166c","dept":"57","canton":"Moulins-lès-Metz","commune":"Novéant-sur -Moselle","nom":"Novéant_Bompart","type":"Château","periode":"XVI-XVIII","histoire":"Deux châteaux dans cet article; Noveant  et Bompard                             NOVEANT, en 1567, la seigneurie fut engagée à Antoine Goz par Charles, cardinal de Lorraine et abbé de Gorze, pour des besoins d'argent. On peut penser qu'entre 1567, date de l'arrivée de Goz à Novéant, et 1586, année de sa mort, il fit reconstruire ou transformer le corps de logis du château, au milieu de la puissante enceinte médiévale qu'il conserva. Le fief du château de Novéant fut adjugé en 1681 devant le parlement de Metz sur la succession vacante de Anne-Rose Goz à Mathurin de Saluces, capitaine de cavalerie, dont le fils Jean-Claude de Saluces en était encore le détenteur vers 1750. Au moment de la Révolution, le château passa à la famille Legoux de Neuvry puis fut revendu en 1838 à Frédéric Guerber, ancien notaire à Metz et vers 1867 à Jean-Antoine Mathieu, de Metz. Après 1918, il fut acquis par Maurice Bompard, ambassadeur de France. Séquestré au moment de la guerre de 1939 et transformé en mairie le château fut remis en état par Mme Bompard au lendemain de la libération puis légué à l'évêché de Metz pour en faire une maison de retraite. Du vieux château médiéval, il subsiste encore la courtine ouest, le long de la rue de l'église, flanquée de deux puissantes tours tronquées, qui ont conservé des petites archères et des canonnières, une tour carrée à l'angle nord-ouest, munie d'archères-canonnières, un colombier à toit conique dans le parc et les restes d'une tour englobés dans les importants bâtiments de la ferme, situé en contrebas. A l'intérieur de l'enceinte, le logis semble avoir été un bâtiment de plan en U. Dans le courant du XIXe siècle il aurait été fermé entre les deux ailes et le balcon qui les reliait se trouve aujourd'hui, de ce fait, dans le hall d'entrée. De riches consoles décorées supportent ce balcon. Dans son état actuel, le corps de logis est un bâtiment de plan rectangulaire à toit d'ardoise, percé sur trois niveaux de fenêtres rectangulaires, sans grand intérêt architectural. Le parc, qui a conservé quelques essences rares, s'étend au sud, entouré d'un mur de clôture cantonné de tourelles rondes écrétées. De l'autre côté de la rue du château subsiste, mais méconnaissable, la courtine nord.","architecture":"BOMPARD, tire son nom de Maurice Bompart (1854-1935), diplomate et homme politique né à Metz, petit-fils de Barthélémy Bompard, maire de Metz et député de la Moselle sous la monarchie de Juillet. Maurice Bompard qui a choisi en 1872 de sexiler à Paris  a entamé une carrière prestigieuse au ministère des Affaires Etrangères, où il sest illustré en qualité dambassadeur auprès de lEmpire Russe de 1902 à 1908, puis auprès de lEmpire Ottoman jusquen 1914. Avec son homologue Paul Cambon dont il était très proche, il a fortement uvré à sceller la triple entente, alliance indispensable dans la marche vers la libération de lAlsace-Lorraine. De retour en Lorraine après la victoire, Maurice Bompard achète en 1919 le château de Novéant en état de ruine consécutif aux bombardements et son utilisation en hôpital. Son épouse Gabrielle née Le Barbier de Bignères (1865-1948) entreprend de le restaurer entièrement et le remeubler. Les travaux durent 2 ans. Pendant ce temps, Maurice Bompard est élu sénateur de la Moselle, siège quil occupera de 1920 à 1933, peu avant son décès. Ce sera sa dernière uvre et à sa mort en 1948 elle lègue la propriété de Novéant à lévêché de Metz pour lhébergement des vieux prêtres. Dès sa création, lA.F.B. sest inscrite dans le développement de réponses aux besoins courants de la personne dépendante, à la fois handicapée ou âgée.","habitants":"Famille de Maurice Bompart \"","divers":"dans cet article;  Château Noveant grav-1-2 et Bompard    grav-3","gps":"","images":["../image/image_57/57_Nov%c3%a9ant_Bompard_1.jpg","../image/image_57/57_Nov%c3%a9ant_Bompard_2.jpg","../image/image_57/57_Nov%c3%a9ant_Bompard_3.jpg"]},"Consult_chateau_formulaireda6a":{"id":"Consult_chateau_formulaireda6a","dept":"57","canton":"Algrange","commune":"Ottange","nom":"Ottange","type":"Vestiges","periode":"XIII-XVIII","histoire":"OTTANGE, mentionné dès le XIIIe siècle, appartenait à une famille seigneuriale du même nom apparue à la fin du XIIe siècle et éteinte en ligne masculine en 1518. Il passa ensuite par héritage à la famille d'Eltz jusqu'au milieu du XVIIIe siècle. En partie détruit en 1671 par le maréchal de Créqui, le château médiéval fut entièrement démoli en 1734 par Jean-Antoine d'Eltz et remplacé par un somptueux édifice, qui selon la tradition, aurait coûté près d'un million de livres et comporté trois cent soixante cinq fenêtres. Jean-Antoine d'Eltz étant décédé sans enfant, le château passa à son frère Philippe-Antoine, doyen et grand écolâtre du chapitre de Spire, qui en 1749 donna la seigneurie érigée en comté en 1777, à son neveu Philippe-Charles, voué d'Hunolstein et seigneur de château-Voué, à l'occasion de son mariage. En 1792, un incendie détruisit le château occupé par un corps de troupes chargées de le garder. Vers 1810, le comte Philippe-Antoine d'Hunolstein fit démolir ce qui restait de la bâtisse et utilisa les matériaux pour la construction de ses forges.","architecture":"OTTANGE, du château médiéval construit sur une colline à l'est du village, à laquelle on accède par une route en lacets, il subsiste encore une grosse tour circulaire et quelques murs de terrasses dans son prolongement. A cette tour est accolé un bâtiment de dépendances, seul vestige du château bâti au XVIIIe siècle qui comprenait trois corps de logis. Le bâtiment rectangulaire, construit en pierre de taille, à deux niveaux, porte la date 1753 inscrite sur une clef de voûte du rez-de-chaussée. A l'extérieur de la bâtisse, plusieurs clefs de fenêtres sont décorées de têtes de femmes ou de cartouches aux armoiries des comtes d'Eltz, également sculptées à l'intérieur de l'édifice. Le bâtiment, qui témoigne de la qualité architecturale du château disparu, a été restauré en 1894, mais il est actuellement laissé à l'abandon, classement par liste de 1840.","habitants":"Famille d'Eltz \"","divers":"Vestigesà Ottange Mairie grav 1                                                      49° 26' 29? N, 6° 01' 36? E","gps":"","images":["../image/image_57/57_Ottange_1.jpg","../image/image_57/57_Ottange_2.jpg","../image/image_57/57_Ottange_3.jpg","../image/image_57/57_Ottange_4.jpg"]},"Consult_chateau_formulaire9b6a":{"id":"Consult_chateau_formulaire9b6a","dept":"57","canton":"Courcelles-Chaussy","commune":"Pange","nom":"Pange","type":"Château","periode":"XVI-XVII","histoire":"PANGE, il y avait à Pange un château qui appartenait, au début du XVe siècle, à Burthe Paillat. La seigneurie appartint au XVIe siècle à la famille de Beauvau, au XVIIe et au début du XVIIIe siècle à la famille de Vapy. Le château fut incendié en 1704 et la toiture détruite. En 1720, la seigneurie fut acquise par Jean Baptiste Louis Thomas de Pange, trésorier principal des troupes du roi au département de Metz, qui fit reconstruire entre 1720 et 1756 un nouveau château sur l'emplacement de l'ancien datant du XVe siècle, pourvu d'un donjon. En 1756, l'architecte entrepreneur Jean Louis, qui fut aussi architecte du chapitre de la cathédrale de Metz, ajouta deux pavillons du côté de la Nied. Depuis le XVIIIe siècle, le château est resté propriété de la famille de Pange. Il asubit quelques modifications après 1766. Deux tours rondes précédant la cour d'honneur à l'extrémité d'un pont, l'une servant de prison et l'autre de dépôt d'archives furent démolies en 1807 sur l'ordre du comte Jacques de Pange. En juillet 1812, ce dernier offrit l'hospitalité en son château à l'impératrice Marie-Louise lors de son retour de Saxe. Le toit à croupes du corps principal fut modifié en toit à la Mansart au début du XIXe siècle. En 1836, l'architecte messin Grenier mit également en place un toit à la Mansart sur les pavillons et effectua des aménagements intérieurs. Les dépendances ont été en partie détruites en 1944, mais le château a surtout beaucoup perdu de son cachet intérieur depuis 1948. Loué à la caisse d'allocations familiales et en 1984 à la mort  de Maurice de Pange le domaine revient à son neveu Jean comte et la comtesse Roland de Pange  se réinstalle au château.","architecture":"PANGE,  couvert d'un toit d'ardoise à la Mansart, il est de plan rectangulaire avec deux pavillons demi-hors-oeuvre encadrant la façade sur la Nied, d'ordonnance symétrique à trois travées dont un niveau de combles, la façade sur cour, avec son avant-corps central à fronton triangulaire, présente la même ordonnance symétrique, mais à neuf travées, rythmée par des chaînes délimitant l'avant-corps et séparant les travées deux à deux. Un cordon court entre les deux premiers niveaux. Les pavillons à trois travées sont courverts de toits brisés en ardoise. L'austérité de l'ensemble, encore accrue par la couleur jaune de la pierre de Jaumont, est tempérée par les ailerons des lucarnes, la large agrafe aux armoiries des Pange surmontant la porte d'entrée, côté cour, et les consoles prolongées par des chutes de feuilles et fleurs supportant la corniche de la porte côté rivière. Les restes d'un très large fossé et d'un mur d'enceinte avec un pavillon d'angle, ainsi qu'un bâtiment fermant au nord-ouest la cour, sont les seuls éléments qui subsistent de l'ancien château.  Ce jardin a obtenu le label \"Jardin remarquable\".Éléments protégés MH : la grange; les façades et les toitures des deux pavillons bornant le mur de domaine au Nord-Est: inscription par arrêté du 19 décembre 1986. L'ensemble des façades et des toitures du château, y compris le perron et la terrasse sur la Nied; le vestibule ; l'escalier d'honneur avec sa rampe ; l'antichambre ; la salle à manger, y compris le poêle en faïence ; le salon dit des tapisseries ; la chambre à alcôve : classement par arrêté du 6 décembre 1990.","habitants":"Famille de Pange\"","divers":"Château de Pange à Pange                   49° 5' 0,6\" Nord, 6° 21' 14,04\" Est","gps":"","images":["../image/image_57/57_Pange_1.jpg","../image/image_57/57_Pange_2.jpg","../image/image_57/57_Pange_3.jpg","../image/image_57/57_Pange_4.jpg"]},"Consult_chateau_formulaire2780":{"id":"Consult_chateau_formulaire2780","dept":"57","canton":"Phalsbourg","commune":"Phalsbourg","nom":"Phalsbourg","type":"Château","periode":"XVI","histoire":"PHALSBOURG,  est une cité Vauban, édifiée au XVIe siècle sur un site déjà fondé par le comte palatin du Rhin, duc de Bavière, comte de La Petite-Pierre, George Jean de Veldenz, aux alentours de 1570. De cette époque subsiste le château d'Einhartshausen circonscrit dans l'un des bastions érigé par Vauban.  Le musée historique, militaire et Erckmann-Chatrian est à découvrir à l'étage de l'hôtel de ville, ancien corps de garde de la forteresse de Sébastien le Pestre dit Vauban. Subsistent de la même période les deux portes de la ville : la porte d'Allemagne et la porte de France ainsi qu'une poudrière et la caserne Lobau.  L'hôtel de ville actuel a ses bureaux au rez-de-chaussée et abrite également le musée historique au premier étage. Ce bâtiment est en fait l'ancien corps de garde de la forteresse. Sa position centrale lui permettait de jouer un rôle prépondérant pour diriger les opérations militaires.","architecture":"PHALSBOURG, le château subit une modification au XVIIe siècle. La ville appartenant au roi de France, elle est fortifiée pour se prémunir des attaques des rivaux ducs de Lorraine. Le ministre de la guerre, Vauban, fait intégrer le bâtiment dans un bastion et fait remblayer le rez-de-chaussée, l'accès se fait alors par le premier étage. Le bâtiment est donc affecté alors à plusieurs usages, notamment comme lieu de stockage pour les forces armées présentes. Pendant les siècles suivants, il est altéré puis restauré à la fin du dix-neuvième siècle. La ville l'utilise comme auberge de jeunesse au début du vingtième siècle. Le bâtiment est actuellement sur le terre plein de l'ancien bastion, à quelques mètres de la porte d'Allemagne,  jouxte actuellement les gîtes ruraux municipaux. Le château sert encore de cadre à des manifestations culturelles, notamment lors du festival. Si l'escalier n'est pas restauré, de nombreuses pièces sont reconstituées et l'on peut apercevoir sur une face le relief aux armes du comte palatin et de son épouse, relief qui surplombait une cheminée.","habitants":"Sébastien le Pestre-Vauban\"","divers":"Château  à Phalsbourg                  Porte de France grav-3                              48°45'56.2\"N, 7°15'39.3\"Est","gps":"","images":["../image/image_57/57_Phalsbourg_1.jpg","../image/image_57/57_Phalsbourg_2.jpg","../image/image_57/57_Phalsbourg_3.jpg"]},"Consult_chateau_formulaire5bdd":{"id":"Consult_chateau_formulaire5bdd","dept":"57","canton":"Yutz","commune":"Basse Rentgen","nom":"Preische","type":"Château","periode":"XVIII","histoire":"PREISCHE, le château fort du Moyen Age a été rasé en 1680. Il appartient  aux Preisch mentionnés dès 1122, aux Ottange à partir de 1443, à Gérard de Gulch en 1500, aux Schawenbourg à partir de 1514 et aux Mérode en 1597. La motte féodale et ses douves sont décelables dans le parc qui entoure le château. Celui-ci, dont la construction fut entreprise par Conrad de Soetern et Marguerite de Mérode au début du XVIIe siècle. Il appartient depuis 1855 à la famille de Gargan. Charles Joseph de Gargan constitua une collection dobjets qui meubla le château. Lintérieur pillé et dévasté par loccupation allemande durant la seconde guerre mondiale fut rénové par Madeleine de Gargan (1928 - 2000) et sa petite-fille, maire de Basse Rentgen et conseiller général pendant 18 ans. Aujourdhui sa fille, Dominique Charpentier, a réuni des uvres, meubles et objets de la famille de Gargan et Charpentier. Cette collection forme un ensemble révélateur dune démarche historisante de la part de Charles Joseph de Gargan, reprise par ses descendants dans une propriété qui se transmet de génération en génération avec le même souci de conserver le patrimoine familial et de lenrichir,  un campanile carré, en bois et surmonté dune flèche élancée abritait la cloche de la chapelle, cloche baptisée Magdeleine en 1564, on peut encore la voir aujourdhui. La chapelle fut restaurée en 1862, Charles de Gargan transforma le modeste bâtiment, présente une élévation à deux niveaux.","architecture":"PREISCHE, lensemble, avec ses dépendances du XVIIe et XVIIIe siècle, dessine deux plans en U à deux cours, celle du château et celle de la ferme, le domaine de Preische sétend sur 170 hectares clos par un mur de 7 km qui abrite un jardin anglais, des moutons Hampshire, un potager, des pâtures et des bois centenaires et un golf de 3 X 9 trous; toutes les parties neuves furent refaites en pierre jaune de \"Jaumont\". Il fit creuser une crypte où seront inhumés les membres de sa famille, il fit ériger un clocher orné dune flèche en pierre de 13 mètres de haut, il fit bâtir derrière lautel une sacristie et remplaça les fenêtres par des vitraux commandés à monsieur Maréchal, maître verrier à Metz, fit paver le sol en mosaïque de marbres fins et fit installer un autel de marbre blanc commandé à Mr Jacquemin. Toute cette décoration lui fut inspirée par la Renaissance monumentale du XVIe siècle.  Le château de Preische présente un corps de logis couvert d'ardoise avec escalier en vis dans corps en retour d'équerre et escalier droit en oeuvre, tours demi hors-oeuvre avec flèche carrée couverte d'ardoise ; pavillons d'entrée en moellon sans chaîne en pierre de taille avec toit en pavillon couvert d'ardoise ; colombier avec toit en pavillon couvert d'ardoise ; bâtiments en moellon sans chaîne en pierre de taille et couverts de tuile plate ; moulin en moellon sans chaîne en pierre de taille couvert de tuile mécanique.  classement par arrêté du 10 mai 1995.","habitants":"Famille de Gargan\"","divers":"Château de Preische  à Basse Rentgen                                                         49° 29' 54\" Nord, 6° 12' 57\" Est","gps":"","images":["../image/image_57/57_Preische_1.jpg","../image/image_57/57_Preische_2.jpg","../image/image_57/57_Preische_3.jpg","../image/image_57/57_Preische_4.jpg"]},"Consult_chateau_formulaire6a26":{"id":"Consult_chateau_formulaire6a26","dept":"57","canton":"Yutz","commune":"Puttelange-lès Thionville","nom":"Puttelange","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux dans cet article ; Puttelange et Barst.                          PUTTELANGE, le château primitif du Moyen-Age fut incendié en 1389. Il appartient jusqu'au XVIe siècle à une branche collatérale de la famille de Rodemack, puis aux Larochette. Il n'en subsiste qu'une cave. Le château actuel a été reconstruit à 150 mètres au sud-ouest du château primitif, au milieu du XVIIe siècle (date 1653 sur le linteau de la porte piétonne du logis) par la famille de Ryaville. Les vestiges d'un bâtiment qui aurait été la chapelle castrale, comprennent en remploi, provenant du château primitif, plusieurs baies à linteau trilobé. Après 1736 le château est propriété des familles de Dampont puis d'Huart. Le corps principal à l'ouest de la cour, de plan rectangulaire, à deux niveaux et couvert d'un haut toit d'ardoise à croupes, a conservé, sur la façade extérieur, à l'ouest, plusieurs fenêtres à meneaux et des croisées; celles de la façade intérieure à l'est ont été mutilées après la deuxième guerre mondiale. La porte d'entrée appareillée est datée de 1653. Dans l'angle Est de la cour se trouve une grosse tour ronde coiffée d'un toit conique.","architecture":"BARST, à 10 K.M.à l'ouest Barst a été construit dans le deuxième quart du XIXe siècle pour Louis Joseph Polti, maire de Barst, dans l'ancien jardin de la famille Forget, puis restauré entre 1967 et 1977. L'édifice se compose de deux étages carrés et un sous-sol, le gros oeuvre : grès; moellon; enduit et pierre de taille, élévation ordonnancée, surmontée de toit à longs pans et croupe, recouverts d'ardoise et de tuiles, propriété de la commune.","habitants":"Famille de Ryaville                Barst; Louis Joseph Polti\"","divers":"dans cet article ; Puttelange et Barst grav-5.                                                  49° 04' 11? N, 6° 50' 00? Est","gps":"","images":["../image/image_57/57_Puttelange_1.jpg","../image/image_57/57_Puttelange_2.jpg","../image/image_57/57_Puttelange_3.jpg","../image/image_57/57_Puttelange_4.jpg","../image/image_57/57_Puttelange_5.jpg"]},"Consult_chateau_formulaireb28c":{"id":"Consult_chateau_formulaireb28c","dept":"57","canton":"Fameck","commune":"Richemont","nom":"Pépinville","type":"Château","periode":"XIV","histoire":"PEPINVILLE, du château de Richemont appelé Ornelle, cons
