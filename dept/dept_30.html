XIXe siècle en forme de U à deux niveaux .","habitants":"Famille d'Antoine Dupleix de Grémian\r\n        \"","divers":"Château et village des Lecques","gps":"","images":["../image/image_30/30_Lecques_1.jpg","../image/image_30/30_Lecques_2.jpg"]},"Consult_chateau_formulaire00b3-2":{"id":"Consult_chateau_formulaire00b3-2","dept":"30","canton":"Redessan","commune":"Ledenon","nom":"Ledenon","type":"Vestiges","periode":"XII","histoire":"LEDENON,  construction du XIIe siècle, mais le seigneur du lieu, Raymond Gaucelin, de la famille de Sabran, apparaît en 1299, la fille de ce seigneur, Béatrix, laissa  en héritage château et seigneurie à son oncle, le cardinal Béranger de Frédol, qui mourut en 1323. Pendant la période troublée du XIVe siècle, il eut à souffrir des routiers, des anglais, des gens d'armes du duc de Berry, puis des turchins. Sa ruine fut consommée en 1567 par une bande de calvinistes venus de Marseille. Au XVe siècle,  la famille d'Aramon, partageant la seigneurie avec le roi de France. Celle-ci appartient à plusieurs co_seigneurs, changeant de nom au gré des alliances successives dont les Bargeton de Cabrières au XVIIIe siècle. La dernière baronne de Lédenon, prénommée Blanche, épousa le lieutenant-colonel de Vedel. A sa mort, le fief fut racheté en 1779 par Barthélémy Fornier, qui prit le nom de Fornier de Clausonne. Epargné à la Révolution , ni saisi ni vendu, mais abandonné au Clausonne. Aujourd'hui propriété de monsieur Nicolas Seydoux.","architecture":"Ledenon, au sommet du village, le château des XIIe, XIIIe, XVe et XVIIIe siècles , de plan irrégulier  au sud-ouest l'entrée donne sur le porche qui s'ouvre sur la cour, la façade flanquée d'une grande tour carrée percées de portes en tiers-points et de meurtrières, y compris le sol et les remparts, château-fort conservant une salle voûtée d'ogives du XIIIe siècle et le donjon, enceinte, sol.  Au début du XXe siècle le  château était dans un état lamentable, actuellement des travaux de consolidation et reconstruction sont entrepris.","habitants":"Famille de Sabran\r\n        \"","divers":"Vestiges du château-fort de Ledenon","gps":"","images":["../image/image_30/30_Ledenon_1.jpg","../image/image_30/30_Ledenon_2.jpg","../image/image_30/30_Ledenon_3.jpg","../image/image_30/30_Ledenon_4.jpg","../image/image_30/30_Ledenon_5.jpg","../image/image_30/30_Ledenon_6.jpg"]},"Consult_chateau_formulairee3bb-2":{"id":"Consult_chateau_formulairee3bb-2","dept":"30","canton":"Grau du Roi","commune":"Grau du Roi","nom":"Leenhardt","type":"Résidence","periode":"XVIII","histoire":"LEENHARDT,  les Leenhardt de Montpellier descendent d'un André-Chrétien Leenhardt  qui, à la fin du XVIIIe siècle, était venu d'Alsace se fixer dans cette ville. Son père émigré de Pologne était venu habiter Wesserling en Alsace.  Le dernier fils d'André-Chrétien Leenhardt était  Paul Nicolas Leenhardt, né en 1786 et mort en 1870. De son mariage avec Eugénie Castelnau (1796-1853), il avait eu sept enfants : Antonie, devenue Mme Pomier-Layrargues; Charles, Henry, Abel,Inès, devenue Mme Gaston Westphal, René et André.                                                             Charles Leenhardt avait épousé sa cousine germaine Juliette Bazeille, dont le père Scipion Bazille était marié avec la sur aînée d'Eugénie Castelnau.                                                                 Les Leenhardt avaient eu cinq enfants; Roger qui avait épousé sa cousine germaine Juliette Lichtenstein,  Pierre qui s'était marié avec sa cousine germaine Albertine Bazille. Suzanne,  Délie qui avait épousé son cousin issu de germain Georges Castelnau et Marthe qui était devenue la femme de Charles Warnery, d'une famille suisse. Aujourd'hui transformé en maison de retraite.","architecture":"Leenhardt du XVIIIe siècle à l'origine  transformé, corps de logis central à quatre travées et deux niveaux arcades sur façade, deux pavillons en retrait sur les côtés à et attiques arcades et  bretèches en façades.","habitants":"Famille André-Chrétien Leenhardt\r\n        \"","divers":"Château-résidence de Leenhardt au Grau du Roi","gps":"","images":["../image/image_30/30_Leenhardt_1.jpg","../image/image_30/30_Leenhardt_2.jpg","../image/image_30/30_Leenhardt_3.jpg"]},"Consult_chateau_formulaire32b7":{"id":"Consult_chateau_formulaire32b7","dept":"30","canton":"Quissac","commune":"Lezan","nom":"Lezan","type":"Château","periode":"XVII","histoire":"LEZAN, fief des comtes d'Alés plusieurs co-seigneurs comme vassaux, les seigneurs d'Aigremont, des Rousson, de Valette de Cardet et de Boulogne de Lascours, les Cardet firent construire le château en 1600 qui fut brûlé à la Révolution, vendu comme bien national à Jean de Bruguière ensuite par l'armateur Henri Claras, les propriétaires actuels sont Mme Rothé qui le reçu en héritage.","architecture":"Le château de Lessan fut construit au XVIIe siècle,  brûlé à la Révolution, puis rajout de l'étage supérieur et pont au XIXe siècle,  une tour ronde avec balustrade en fer forgé.   La tour de l'horloge constitue le seul vestige important des remparts médiévaux. Jeu des volumes très  différents composant le château, donnant un effet de pittoresque intéressant,  date de la reconstruction de 1818.  Les façades et les toitures de la tour de l'horloge et en totalité le \"salon rouge\" situé au  nord-ouest du premier étage du château de Lézan.","habitants":"Famille des Cardet\r\n        \"","divers":"Château de Lezan et la tour de l'horloge","gps":"","images":["../image/image_30/30_Lezan_1.jpg","../image/image_30/30_Lezan_2.jpg","../image/image_30/30_Lezan_3.jpg","../image/image_30/30_Lezan_4.jpg","../image/image_30/30_Lezan_5.jpg","../image/image_30/30_Lezan_6.jpg","../image/image_30/30_Lezan_7.jpg","../image/image_30/30_Lezan_8.jpg"]},"Consult_chateau_formulairea409":{"id":"Consult_chateau_formulairea409","dept":"30","canton":"Quissac","commune":"Liouc","nom":"Liouc","type":"Château","periode":"XVI","histoire":"LIOUC, cité en 1108 le village sest formé à partir des deux châteaux qui sy sont succédé. On sait que pendant une partie du Moyen-Age, Quissac est seigneurie royale, le siège du pouvoir étant à Liouc, le seigneur de Liouc représente localement le souverain. Durand de Béringuier seigneur de Liouc au XVIe siècle. La propriété du château passe au cours du XVIIIe siècle à lhôpital dAlès, puis le château est vendu à la Révolution comme bien national. Les bâtiments sont morcelés entre différents propriétaire privés. Une partie est rachetée au XIXe siècle par la commune pour y installer la mairie.","architecture":"Mais de ce premier château médiéval, on ne sait rien. Lhypothèse du caractère castral de léglise a été posée, ce qui ferait remonter le premier château au milieu du XIIe s. Un second château est construit au XVIe siècle, à partir duquel sest développé le village actuel. Des vestiges subsistent dans le village, quelques voûtes et un espace à vocation défensive, aujourdhui déconnectés de toute construction, difficiles à dater.  Les bâtiments sont morcelés entre différents propriétaire privés. Une partie est rachetée au XIXe siècle par la commune pour y installer la mairie.","habitants":"Famille de Durand de Béringuier\r\n        \"","divers":"Château du Liouc et de Planques","gps":"","images":["../image/image_30/30_Liouc_1.jpg","../image/image_30/30_Liouc_2.jpg","../image/image_30/30_Liouc_3.jpg"]},"Consult_chateau_formulairef50e":{"id":"Consult_chateau_formulairef50e","dept":"30","canton":"Alès","commune":"Lussan","nom":"Lussan","type":"Château","periode":"XV-XVII","histoire":"Trois châteaux à Lussan, château de Fan du  XVIIe siècle, du Verger et de Lussan du XV-XVIIe siècle hôtel de ville.                         FAN, en 1550, Gaspart d'Audibert, seigneur de Lussan, construit le château près de la source d'un petit ruisseau nommé le Fan. Vers 1791 confisqué par les révolutionnaires, le bâtiment devient une hostellerie. En 1795, le château est vendu à un habitant de Lussan; Théophile Gide. c'est l'arrière grand-père de l'écrivain André Gide.  En 1920, la famille Gide ayant besoin d'argent vend le château à la municipalité. Le manque d'entretien détériore l'intérieur.  Vers 1960, le bâtiment devient une gendarmerie. Mais le château garde quand même son identité. En 1980, les gendarmes sont transférés à Audabiac. Un gardiennage communal est assuré, mais les bâtiments sont peu entretenus. En 2008, le bâtiment a été mis en vente puis acheté pour réaliser des appartements. \r\nLUSSAN, fief des Gaucelm au XIIIe siècle, passa ensuite aux Bertrand de Barjac seigneur du Bouquet et de Lussan et au XVe siècle Jacques Audibert hérita  de Jean  de Folcherand, Jacques construisit le château qui fut élevé en comté par Anne d'Autriche et le domaine fut gardé par la famille  Audibert jusqu'au XVIIIe siècle. Le domaine passa par alliance de Gabrielle de Lussan  à Henry Fitz-James, duc d'Albemarle puis devenue veuve passa à Jean Drummond, duc de Melfort, ces derniers ont émigrés à la  Révolution, ravagé et vendu comme bien national, les Gide l'acheta et le revendirent à la commune pour le transformé en hôtel de ville.                                VERGER, château construit par Adalbert de Lussan et détruis par les Truchins.","architecture":"Fan, ce château féodal comporte; quatre tours d'angle avec un glacis, une base inclinée, elles ne comportent pas de trace ou de transformation d'archère. Les  bouches à feu semblent avoir été construites dans la tour et non rajouté, étant très basses elles offrent un tir tendu ce qui est conforme à la construction au début du XVIe siècle. \r\nLussan,  quadrangulaire irrégulier, quatre tours rondes aux angles, en parties décoiffées  Une tour semble posséder des traces de mâchicoulis. une autre porte l'horloge et on accède à la cour d'honneur par quelques marches. la porte d'entrée style Louis XIII à encadrement à bossages et fronton brisé. Mais ce type de construction servant de défense a été utilisé jusqu'au XVIIIe siècle. Au centre, une grande porte à deux vantaux semble datée du XVIe siècle avec son encadrement à bossage et son fronton.  Les fenêtres de la façade sont grandes et modernes, elles sont encadrées de pilastres cannelés à chapiteaux corinthiens. \r\nVerger, détruit par les Truchins subsiste les soubassement et un puits.","habitants":"Famille de Gaspart d'Audibert                                                                    Famille de Folcherand\r\n        \"","divers":"Château de Lussan, des Fan et du Verger.","gps":"","images":["../image/image_30/30_Lussan_1.jpg","../image/image_30/30_Lussan_2.jpg","../image/image_30/30_Lussan_3.jpg","../image/image_30/30_Lussan_4.jpg","../image/image_30/30_Lussan_5.jpg","../image/image_30/30_Lussan_6.jpg","../image/image_30/30_Lussan_7.jpg"]},"Consult_chateau_formulaire1db2":{"id":"Consult_chateau_formulaire1db2","dept":"30","canton":"Le Vigan","commune":"Mangadout","nom":"Mandagout","type":"Château","periode":"XV","histoire":"MANDAGOUT, au XIVe siècle la famille de Mandagot est l'une des premières maison féodale des Cévennes. Elle joua un rôle important au temps des papes d'Avignon grâce à plusieurs prélats qu'elle donna à l'église. Le plus célèbre est Guillaume de Mandagot, fait cardinal en 1305, renommé par sa science, légat habile,  il était près d'être élu pape en 1316 après la mort de Clément V.  La famille de Mandagot édifia une construction au XV et XVIe siècle. Au XVIIe siècle, Marguerite de Mandagot, héritière du château le vend à sa soeur Violande qui en 1672  épousa Jean d'Albignac, barron d'Arre. Le 16 avril 1792, le château habité par madame d'Albignac, belle soeur du général, reçu la visite des gens du pays qui lui demandèrent les papiers de ses droits seigneuriaux ainsi que les meubles qu'ils brûlèrent sur la place de Beaulieu. Le château désormais sous le nom d'Albignac reste à leurs descendants jusqu'au XXe siècle. Il fut acheté par la Sefer et revendu en 1967 à M. Trautmann ancien coureur automobile. Aujourd'hui chambres d'hôtes de monsieur Michel Lamotte.","architecture":"Mandagout dans le massif du sud de l'Aigoual. Situé dans un vallon sur un piton rocheux, il surveillait la route du col des Mourèzes. Sur l'emplacement d'un château fort du XIIIe siècle, restes du château fort de Mandagout XIIIe siècle, reconstruit aux XVe/XVIe siècles. L'entrée  protégée par une herse moderne qui passe sous l'ancienne tour de Guet ou se trouve encore les corbeaux et bretèche, les créneaux sont modernes, couvertures de la Renaissance.                                                                                 Dans le hameau de Costubague, ruines d'un château de l'Arboux  ayant appartenu à la famille d'Albignac.","habitants":"Famille de Mandagot\r\n        \"","divers":"Château de Mandagout","gps":"","images":["../image/image_30/30_Mandagout_1.jpg","../image/image_30/30_Mandagout_2.jpg"]},"Consult_chateau_formulaire3ff6":{"id":"Consult_chateau_formulaire3ff6","dept":"30","canton":"Quissac","commune":"Maruéjols les Gardon","nom":"Maruejols_Gardon","type":"Château","periode":"XVII","histoire":"MARUEJOLS, le château de Maruéjols-lès-Gardon a été construit à l'époque des Croisades. Raymond, comte de Toulouse y avait rassemblé ses partisans pour un départ en croisade, le fief  appartenait aux des Roys qu'ils tenaient  des barons d'Aigremont qui en rendaient hommage  aux comtes d'Alès.  Possession de Guillaume de Cause et Henriette-Emilie d'Aireboudouze en 1693.  Ils furent remplacés au XVIIIe siècle  par Jean-René de Jouenne d'Esgrigny capitaine au régiment en forez, suite à un conflit il se retira au domaine de Lascours qu'il échangea. Depuis le XIXe siècle le château de Maruéjols appartient à la famille Gardies.                         A quelques kilomètres au Sud-Est le château de St-BENEZET au village  du même nom au XIVe siècle des barons d'Aigremont, puis aux Folhaquier aujourd'hui aux Masbon.","architecture":"Le village de Maruéjols sera tragiquement marqué par les guerres de religion. Lors d'une embuscade tendue par Ravanel, l'adjoint de Cavalier, les camisards tuèrent trente dragons avec leurs officiers. En représailles, le maréchal de Montrevel, commandant des armées royales, fit incendier le château et raser le village. Les habitants, tous protestants, les hommes furent envoyés aux galères, tandis que les femmes furent emprisonnées à la Tour de Constance d'Aigues-Mortes. Maruéjols-lès-Gardon, comme nombres de villages cévenols, fut donc un village martyr.\r\nle château, grand bâtiment percé pour donner le passage à une ruelle, la façade comporte deux avancées carrées, celle de gauche et la porte d'entrée.","habitants":"Famille de Guillaume de Cause\r\n        \"","divers":"Château de Maruéjols et de St-Benezet.","gps":"","images":["../image/image_30/30_Maruejols_Gardon_1.jpg","../image/image_30/30_Maruejols_Gardon_2.jpg","../image/image_30/30_Maruejols_Gardon_3.jpg"]},"Consult_chateau_formulairee7a4":{"id":"Consult_chateau_formulairee7a4","dept":"30","canton":"Quissac","commune":"Massillargues-Attuech","nom":"Massillargues","type":"Château","periode":"XIII-XVIII","histoire":"MASSILLARGUES, au XIIIe siècle à appartenu à plusieurs co-seigneurs, au XIVe siècle les Massillargues, puis les Aleyrac baron d'Aigremont, les Amalric et les David, au XVIIIe siècle Jean Palier Rodier qui était en indivis avec Charles-Louis de Cau comte de Frégeville. Le propriétaire actuel est monsieur Eric Salmon.","architecture":"le château de Massillargues est perché sur la motte féodale, à lintérieur du hameau. Le donjon date du XIIe siècle, alors que la partie plus récente est du XVIIIe siècle. Cest un bien privé non visitable, mais on peut voir la passerelle suspendue en briques qui le rattache à son ancienne ferme. Autour se trouve le parc, la place et les maisons anciennes, dont une magnanerie.                         La Blaquière est une ancienne maison forte qui est attenante au château. La tour carrée servit de tour de garde, puis cette grande bâtisse fut en 1839 une filature à soie et surtout une savonnerie jusqu'en 1914. On y produisit du savon type de Marseille qui avait deux appellations \"le savon Vainqueur\" et \"le savon écume ».\r\ndans une petite rue à un corps de logis à galerie accolé d'une tour carré, terrasse à balustres, l'entrée est une étroite arcade plein cintre surhaussée.","habitants":"Famille d'Aleyrac\r\n        \"","divers":"Château de Massillargues","gps":"","images":["../image/image_30/30_Massillargues_1.jpg","../image/image_30/30_Massillargues_2.jpg","../image/image_30/30_Massillargues_3.jpg","../image/image_30/30_Massillargues_4.jpg","../image/image_30/30_Massillargues_5.jpg"]},"Consult_chateau_formulaire9c3f":{"id":"Consult_chateau_formulaire9c3f","dept":"30","canton":"Redessan","commune":"Meynes","nom":"Meynes","type":"Château","periode":"XVIII","histoire":"Deux château à Meynes, Clausonne et Clausonette.  Meynes était autrefois une ville fortifiée, dépendante des marquis de Monteynard.                                                                        CLAUSONNE, le fief  appartient à différentes familles nobles de la région Nimoise. Le château fut mis à sac en 1562 par les protestants. A la fin du XIIIe siècle fief de Raymond Decan, seigneur de Broussan, celui-ci  l'échangea en accord avec Philippe le Bel contre celui de Bellegarde devient seigneur d'Uzès. Le château au XIVe siècle passa aux Frédol de Lavérune, puis aux Aramon. Au XVIIe siècle il fut transmis aux Georges de Thavaux, remanié par l'héritier Claude-François de Romieu de Cornillon qui le vendit à Barthélémy de Fornier.  Aujourd'hui propriété de monsieur Nicolas Seydoux descendant des Fornier de Clausonne.                               CLAUSSONETTE, appartenait au XVe siècle à la famille de Joncherettes, puis à Jacques de Roques qui le conservère jusqu'au XIXe siècle.","architecture":"Le château de Clausonne, construit en L, en équerre avec une partie légèrement plus basse, deux corps de logis à deux étages plus un demi  en avancée avec cour intérieure,  tour ronde au nord qui complète l'ensemble qui est entourée d'une immense terrasse à balustrade de pierre.","habitants":"Famille de Joncherettes\r\n        \"","divers":"Château de Clausonne et de Clausonnette","gps":"","images":["../image/image_30/30_Meynes_1.jpg","../image/image_30/30_Meynes_2.jpg","../image/image_30/30_Meynes_3.jpg"]},"Consult_chateau_formulaire12f7":{"id":"Consult_chateau_formulaire12f7","dept":"30","canton":"Le Vigan","commune":"Pompignan","nom":"Mirabel_Pompignan","type":"Château-Vestiges","periode":"XII-XVIII","histoire":"Deux châteaux à Pompignan, vestiges du vieux Mirabel du XIIe siècle et le château de Mirabel.                                                      MIRABEL vieux; cité en 1237 possession des roi de France puis fief des Mirabel puissante famille allier aux Bermond d'Anduze, Aigline de Pouzilhac veuve et héritière  de Hugues de Mirabel l'apporta à son second mariage en 1408 à Garin  Alleman qui en firent leur résidence jusqu'à la fin du XVIIe siècle.  La dernière du nom  Marie Engracie d'Alleman de Mirabel le passa par alliance en 1665 à Antoine marquis de la Fare et de Montclar gouverneur de différents forts de la région et de nouveau le château passa au XVIIIe siècle par alliance aux Pavée de Villevieille.              Madame de Taulignan, au XIXe siècle est propriétaire d'un beau mas (nouveau château) elle fit de nombreux travaux, passa aux Garnier de Crès qui le vendirent au père Robert, le château de Mirabel devint l'hospice Saint-Joseph et en 1975 maison de retraite et EHPAD.","architecture":"Mirabel, le vieux Mirabel sur la montagne Saint-Jean (402 m), siège des ruines du château fort et d'une ancienne chapelle romane, il y a été construit en 1237. Long d'environ 80 mètres, il est aujourd'hui totalement en ruine,  visite interdite car dangereuse. Ce château a appartenu à la famille Alleman de Mirabel.                                   Le mas transformé en château  dans la vallée  à Pompignan a été construit  sur un plan en U avec des tours  dans les angles extérieurs et une tour d'escalier dans la cour intérieure.","habitants":"Famille de Garin Alleman\r\n        \"","divers":"Vestiges du vieux Mirabel et le nouveau château.","gps":"","images":["../image/image_30/30_Mirabel_Pompignan_1.jpg","../image/image_30/30_Mirabel_Pompignan_2.jpg","../image/image_30/30_Mirabel_Pompignan_3.jpg","../image/image_30/30_Mirabel_Pompignan_4.jpg"]},"Consult_chateau_formulaire74e1":{"id":"Consult_chateau_formulaire74e1","dept":"30","canton":"Rousson","commune":"Mollieres sur Céze","nom":"Montalet","type":"Vestiges","periode":"XIII-XIV","histoire":"MONTALET, cité en 1199 et 1202 les premiers occupants sont appelés Montalet, vassals des barons de Portes, eux-mêmes sous la suzeraineté  de  l'évêché d'Uzès puis se partagea en 1248 entre les frères Arnault et Bertrand de Montalet, damoiseaux, fils d'autre Arnault, seigneurs de Montalet, qui  avaient des droits. Il y eut transaction à ce propos entre les évêques, les Anduze et les Montalet. Elles furent tranchées par le roi Philippe II Auguste. Il est sous la suzeraineté des seigneurs de Portes.  La deuxième dynastie établie en 1386 sont les Bérard, connus pour avoir occupé des fonctions importantes, commandant des mousquetaires du roi, colonel de régiments, commandant de compagnies, chevalier et commandeur de l'ordre de Malte. Ils furent baron d'Alais et de Montalet. Au XIVe siècle, appartient en indivision aux Bérard et aux Guilhafred. Au XVe siècle. Les Bérard le délaissent au profit du château de Potelières, le château de Montalet  n'est plus habitable, il fut en  1703 en partie détruit par les camisards commandés par Jacques Bruyère, et de nouveau détruit en 1792 toujours dans la famille Bérard.","architecture":"Montalet au Xe siècle, construction probable du château, Le castrum de Montealeno,  en 1221 première mention du château, a été reconstruit au XIIIe siècle sur un promontoire surplombant le vallée de la Cèze. Il culmine à 275 m en bordure de l'ancien village minier de Molières-sur-Cèze. On suppose quil servait de lieu de surveillance entre la voie Régordane et laccès à la vallée de lArdèche. La défense devait se faire depuis les murs d'enceinte et du haut du chemin de ronde du donjon par un tir plongeant, à l'abri de hourds ou de créneaux. Les restes d'une échauguette et d'un crénelage sont encore visible sur la tour sud du donjon. Les ruines et amas de pierres en avancées laissent entrevoir les restes d'un village médiéval de hauteur, lentrée dans le donjon se fait à travers une barbacane qui met lassaillant plusieurs fois sous le feu des maîtres des lieux. Hélas le temps et les hommes ont mis à mal les constructions, un bâtiment central trapézoïdal doté d'une étroite cour intérieure, il subsiste aujourdhui la salle du seigneur (ses appartements), la salle à grains (la réserve du château), la salle d'honneur, la salle de réception (anciennement la salle de garde), le donjon dit la tour carrée.","habitants":"Famille des  Montalet\r\n        \"","divers":"Vestiges de Montalet","gps":"","images":["../image/image_30/30_Montalet_1.jpg","../image/image_30/30_Montalet_2.jpg","../image/image_30/30_Montalet_3.jpg","../image/image_30/30_Montalet_4.jpg","../image/image_30/30_Montalet_5.jpg","../image/image_30/30_Montalet_6.jpg","../image/image_30/30_Montalet_7.jpg","../image/image_30/30_Montalet_8.jpg"]},"Consult_chateau_formulaire60fe-2":{"id":"Consult_chateau_formulaire60fe-2","dept":"30","canton":"Uzès","commune":"Montaren-et-St-Médiers","nom":"Montaren","type":"Château fort","periode":"XIII","histoire":"MONTAREN,  cité au XIe siècle, en 1284  dépendait des évêques d'Uzès, puis aux XIIIe siècle passa aux Audibert,  au XVe siècle par achat aux Bargeton et aux Chapelier famille ayant été propriétaire au XVIe du château dArpaillargues, les Vergèze dAubussargues. Antoine le Chapelier le vendit en 1758 à Simon Scipion de Vergése. Après la Révolution il fut acquis par Pierre-Roux Sagriès  qui le légua à son neveu Louis Puget, un magistrat parisien, qui le transforma en résidence secondaire, cest ensuite son petit-fils, Paul Puget, qui obtint en 1930 et 1931 le classement du château et de sa terrasse plantée.  La marquise de Saint-Sauveur en fut la propriétaire, puis morcelé en quatre propriétaires de nationalités différentes qui l'occupent actuellement.","architecture":"Montaren,  les origines de la construction actuelle sont difficiles à établir. Il semblerait que lédifice ait pour point de départ une tour du XVe siècle, dite Tour de Jeanis et qui subsiste toujours incluse dans la construction, à langle Nord-Est du logis Nord du château.  il se compose de deux corps de logis  en équerre de trois niveaux avec tourelles  en encorbellement pour les escaliers, l'ensemble est couronné de mâchicoulis et aux angles des échauguettes  carrées ou polygonales.  A cette occasion, le château qui était totalement imbriqué dans le village, fut entouré dun jardin à la suite dun remembrement effectué par Louis Puget. Celuici acheta pour les démolir les habitations entourant le château pour créer, en particulier, la terrasse à louest. Il suréleva également le mur à louest pour lui donner lapparence dune tour et créa un escalier descendant sur le jardin.","habitants":"Famille le Chapelier\r\n        \"","divers":"Château fort de Montaren","gps":"","images":["../image/image_30/30_Montaren_1.jpg","../image/image_30/30_Montaren_2.jpg","../image/image_30/30_Montaren_3.jpg","../image/image_30/30_Montaren_4.jpg","../image/image_30/30_Montaren_5.jpg","../image/image_30/30_Montaren_6.jpg"]},"Consult_chateau_formulaire4ff0":{"id":"Consult_chateau_formulaire4ff0","dept":"30","canton":"Pont St-Esprit","commune":"Montclus","nom":"Montclus_Gard","type":"Vestiges","periode":"XIII","histoire":"MONTCLUS, il est impossible de déterminer le rôle quil a joué en 1247 lors des conflits opposant le comte de Sabran et le Roi de France, fief des comtes des Montlaur en vivarais.  Parallèlement aux comtes dAnduze et de Barjac, les comtes de Sabran faisaient partie, depuis la fin du XIe siècle, des  milites majores, les partisans les plus importants du comte de Toulouse.  En plus de leur château fort attitré de Sabran, ils possédaient les châteaux de Montclus, de Tresques, de Saint-Victor-la-Coste, certaines parties du château fort de Bouquet, et, par période, le château fort de Saint-Laurent-des-Arbres à Guillaume de Poitiers au XVe siècle qui en fit don aux frères Philippe et Cathelin de Combes entrent en possession du comté de Sabran. Après une partition en lan 1510, Tresques et Montclus échoient à Philippe. Par le mariage de sa fille, le château fort de Montclus passe à la famille Montcalm.  En 1683 la baronnie fut élevé au titre de marquisat en faveur de Louis de Vivet juge à Nimes et président à la cour des comptes de Montpellier  en 1750, par mariage, à la famille Vogüé, à laquelle il appartient encore aujourdhui mais reste inhabité.","architecture":"Montclus vestiges du château construit en  1275  dont il ne reste que le donjon carré dune grande hauteur. Le village médiéval existait avant le XIIIe siècle. Castrum Montecluso. Sa position sur une colline entourée de montagnes lui a valu son nom de Montclus, situé au milieu du village, bâtie au début du XIIIe siècle  un donjon lui fut rajouté ressemblant à celui dUzès. Le château a connu ensuite différentes transformations ou ajouts au XVe siècle puis au XVIIIe et au XIXe siècle. Le château comprend  les restes dune maison dhabitation seigneuriale datée des environs de lannée 1200, le donjon carré, le tout entouré de murs denceinte  construits par étapes successives  mais qui semblent avoir été achevées vraisemblablement au XIVe siècle. Le donjon a été en partie restauré  ces dernières années, mais les restes  de lhabitation seigneuriale sont dans un état de dégradation avancé dont la sauvegarde justifie précisément la création de notre association.","habitants":"Famille Montcalm                                                                               Famille Vogüé\r\n        \"","divers":"Vestiges du Château de Montclus","gps":"","images":["../image/image_30/30_Montclus_Gard_1.jpg","../image/image_30/30_Montclus_Gard_2.jpg","../image/image_30/30_Montclus_Gard_3.jpg","../image/image_30/30_Montclus_Gard_4.jpg","../image/image_30/30_Montclus_Gard_5.jpg","../image/image_30/30_Montclus_Gard_6.jpg","../image/image_30/30_Montclus_Gard_7.jpg","../image/image_30/30_Montclus_Gard_8.jpg"]},"Consult_chateau_formulaire0ee3-3":{"id":"Consult_chateau_formulaire0ee3-3","dept":"30","canton":"Le Vigan","commune":"Montdardier","nom":"Montdardier","type":"Château","periode":"XV","histoire":"MONTDARDIER, cité au XIIe siècle sous la suzeraineté du seigneur d'Hierle passa au XIIIe siècle  au trois frères Montdardier, le fils de l'un d'eux en 1282 Raymond rachète toutes les parts, et décéda sans descendance. Au XIVe siècle, au début de la guerre de cent ans, situé au milieu du village, bâtie au début du XIIIe siècle  un donjon lui fut rajouté ressemblant à celui dUzès. Le château a connu ensuite différentes transformations ou ajouts au XVe siècle puis au XVIIIe et au XIXe siècle. Le château comprend  les restes dune maison dhabitation seigneuriale datée des environs de lannée 1200, le donjon carré, le tout entouré de murs denceinte  construits par étapes successives  mais qui semblent avoir été achevées vraisemblablement au XIVe siècle. Le donjon a été en partie restauré  ces dernières années, mais les restes  de lhabitation seigneuriale sont dans un état de dégradation avancé dont la sauvegarde justifie précisément la création de notre association.","architecture":"Montdardier. Il a été reconstruit sur les soubassements d'une forteresse édifié au XIIe siècle comportant quatre grandes tours rondes. La forteresse assure la protection du village et des paroisses du Causse dès le XIIe siècle. Au XIVe siècle, au début de la guerre de cent-ans, la présence anglaise dans le Rouergue provoque de nouveaux travaux de fortifications du château. En 1469 le village et la forteresse sont pillés et incendiés par les troupes fidèles au comte dArmagnac. Restauré au XVe siècle, le château est confronté aux troubles religieux. En 1609 en partie détruit par le duc de Ventadour. En 1628, les troupes du duc de Rohan détruisent les murailles de la forteresse. Rebâti à nouveau en 1703, le château na plus aucune vocation militaire. En 1792 il est pillé et incendié par une troupe venue dune autre région, le château est alors abandonné. D'aspect féodal surchargées de tours de mâchicoulis et de lucarnes se dresse au sommet du village. Au nord et à l'Est tours rondes. La forteresse a subi de nombreuses mises à sac au cours de l'histoire. Après la Révolution le château est restauré.","habitants":"Famille des Montdardier\r\n        \"","divers":"Château fort de Montdardier.","gps":"","images":["../image/image_30/30_Montdardier_1.jpg","../image/image_30/30_Montdardier_2.jpg","../image/image_30/30_Montdardier_3.jpg","../image/image_30/30_Montdardier_4.jpg","../image/image_30/30_Montdardier_5.jpg","../image/image_30/30_Montdardier_6.jpg"]},"Consult_chateau_formulaire7306":{"id":"Consult_chateau_formulaire7306","dept":"30","canton":"Roquemaure","commune":"Montfaucon","nom":"Montfaucon_Gard","type":"Forteresse","periode":"XII-XVI","histoire":"MONTFAUCON, vers 1040, première mention écrite des sires de Montfaucon. Conon, vassal de larchevêque de Besançon, surnommé Faucon, puis Richard vers 1060. Existence probable, à cette date, dun château  sur le Mont Faucon entre les mains de ces seigneurs, qui adopte comme éponyme le nom de Montfaucon et  devient en 1125 possession des comtes de Toulouse rattaché à la couronne en 1229 et au XIVe siècle à la famille de Laudun, au XVe siècle représenté par Claude de Laudun baron de Montfaucon et de Vénezobres, sénéchal de Beaucaire,  en 1487 et lieutenant du royaume de Naples en 1490. La baronnie passa par alliance  au XVIe siècle aux Panisse-Passis et  aux Astier. La seigneurie est acquise en 1760 par la famille des Pertuis qui le restaura et reconstruire le corps de logis pour le rendre habitable. Le baron Quesnoy   en hérite à la mort de son oncle le marquis de Pertuis et par alliance de Marie-Madeleine du Quesnoy, le château  entre dans la famille des Pins d'Aulagnères qui le possède toujours. Pour une raison encore inconnue, il fut restauré et agrandi au siècle dernier par le Baron Louis de Montfaucon.","architecture":"Le château fort féodal de Montfaucon, édifié au XIe siècle, sur le rocher de St Maur, permettait autrefois le contrôle du trafic fluvial et la perception des droits de péage. Détruit en partie au XVIe siècle. En souvenir de sa mère Agatha Clavering, il donna au château un style écossais unique en France par sa forme triangulaire. Premier château situé sans doute à lextrémité de léperon, là-même où subsistent des vestiges archéologiques, témoins dune occupation militaire prolongée. En effet, fin du XIIe  siècle, des documents citent un vieux Montfaucon qui correspondrait à ce site primitif, site pittoresque, existe depuis le néolithique. malgré les destructions des guerres de religions et la Révolution à gardé son aspect féodal, forteresse médiévale de plan triangulaire, édifié au XIIe siècle, sur le rocher de St-Maur, le château fort féodal permettait autrefois le contrôle du trafic fluvial et la perception des droits de péage. Grand logis rectangulaire à quatre étages crénelé et flanqué de tourelles circulaires,  une vaste enceinte flanquée de tours dont les murailles  étaient couronnées d'un chemin de ronde continu avec tour ronde de surveillance, façades fenêtres à meneaux couronnée par un parapet crénelé, une grosse tour ronde pourvue d'une porte sur l'extérieur du XIIe siècle pour la surveillance du Rhône.","habitants":"Famille des Montfaucon\r\n        \"","divers":"Forteresse de Montfaucon","gps":"","images":["../image/image_30/30_Montfaucon_Gard_1.jpg","../image/image_30/30_Montfaucon_Gard_2.jpg","../image/image_30/30_Montfaucon_Gard_3.jpg"]},"Consult_chateau_formulaire65f0":{"id":"Consult_chateau_formulaire65f0","dept":"30","canton":"Redessan","commune":"Montfrin","nom":"Montfrin","type":"Château","periode":"XVIII","histoire":"MONTFRIN, fief au XIIe siècle des Albaron et  aux Alleman, aux Arpajon et aux Cardailhac, il a appartenu ensuite par alliance de Madeleine-Alleman d'Albaron avec Louis de Monteynard, la famille  de Monteynard seigneur de Chalençon élevée au rang de marquisat en faveur d'Hector de Monteynard qui devient grand sénéchal de Beaucaire et de Nîmes. Ils gardèrent le domaine plusieurs siècles, Mansard  remplace au XVIIe siècle la vieille demeure par le château actuel sur les plans de l'école de Mansart, il fut pillé en 1792  rendu au Monteynard, acquis par Robert Schreiber (Robert Servan-Schreiber) en 1925. Il a appartenu ensuite à sa fille, Marie-Claire Mendès-France et appartient aujourd'hui à son petit-fils; Jean-René de Fleurieu, oléiculteur de renom qui produit notamment une huile d'olive appelée \"Chateau de Montfrin\". Les dernières années de sa vie furent passées au château de Montfrin dans le Gard, acquis par son père, Robert Servan-Schreiber. Ce château a également servi de centre de commandement pour la Luftwaffe lors de la Seconde Guerre Mondiale. C'était le quartier général de la deuxième division aérienne. Deux généraux s'y sont succédé : Johannes Fink, de novembre 1942 au 10 février 1944, et ensuite, Hans Korte jusqu'au 18 août 1944. Le village fut libéré par les chars de la 1e armée Française du Maréchal de Lattre de Tassigny; en l'occurrence un peloton du 5e régiment des chasseurs d'Afrique commandé par Jean-Claude Schreiber (Jean-Claude Servan-Schreiber), fils de Robert.","architecture":"Château de Montfrin donjon du XIIe siècle dit  tour des templiers, château reconstruit au XVIIIe siècle  l'empereur Antonin y fait édifier une tour qui sera la base de l'actuel donjon du château qui est parmi les monuments historiques de France. Il y eut en premier lieu un château ou une tour romaine. Le château lui-même fut construit en plusieurs étapes, la dernière étant réalisée au XVIIe siècle. Les jardins sont attribués à Jules Hardouin-Mansard. Cette bâtisse, souvent remanié, a abrité de nombreux hôtes  illustres, dont Louis XIII à quatre reprises. Faible hauteur des bâtiments d'où émerge  la grosse tour avec sa tourelle de vigie, une grande cour d'honneur, le corps de logis de plan carré à deux niveaux  avec deux ailes en équerres, avant corps en saillies, avant corps central en légère saillie couronnée d'un fronton triangulaire aux armes des Monteynard.","habitants":"Famille  de Monteynard\r\n        \"","divers":"Château de Montfrin","gps":"","images":["../image/image_30/30_Montfrin_1.jpg","../image/image_30/30_Montfrin_2.jpg","../image/image_30/30_Montfrin_3.jpg","../image/image_30/30_Montfrin_4.jpg"]},"Consult_chateau_formulaire1ad0":{"id":"Consult_chateau_formulaire1ad0","dept":"30","canton":"Calvisson","commune":"Montmirat","nom":"Montmirat","type":"Vestiges","periode":"XI","histoire":"MONTMIRAT, il fut la demeure des seigneurs de Montmirat, eux-mêmes sous la dépendance des Bermond d'Anduze. En 1163 Bertrand de Montmirat rendit hommage au comte de Toulouse, Raymond et Guillaume prirent part à la révolte contre Raymond VI.","architecture":"Montmirat, le château doté de fortes murailles, date du XIe siècle. Il est aujourd'hui en ruine et seul subsiste sur la face nord le rempart et ses tours a angles vifs. L'ancienne abbaye clunisienne de Jouffe fut abandonnée au bénéfice du château fort a la suite des guerres de religion. Il reste que quelques ruines complètement abandonnées.","habitants":"Famille de Bertrand de Montmirat\r\n        \"","divers":"Vestiges de Montmirat","gps":"","images":["../image/image_30/30_Montmirat_1.jpg","../image/image_30/30_Montmirat_2.jpg","../image/image_30/30_Montmirat_3.jpg"]},"Consult_chateau_formulaire5335":{"id":"Consult_chateau_formulaire5335","dept":"30","canton":"Calvisson","commune":"Montpezat","nom":"Montpezat","type":"Château","periode":"XIV-XVI","histoire":"MONTPEZAT, la bulle d'Adrien IV du 10 décembre 1156 recense déjà le château de Montpezat parmi les possessions de l'évêque de Nîmes, tenu par Bermond d'Anduze, vassal des comtes de Toulouse, passa par alliance de Alix d'Anduze à Rostaing de Montpezat, et en 1432 la seigneurie  est acquise par la famille de Saint-Félix. En 1521 Pierre Trémolet achète la seigneurie, chirurgien de Montpellier et médecin personnel de François Ier est bénéficie de l'élévation de la seigneurie en baronnie est en profita d'embellir le château en  demeure de plaisance.  Durant les guerres de religion, vers 1570, les protestants des environs, attaqués par le maréchal de Damville, se réfugièrent dans l'enceinte du château, mais un assaut final eut lieu et tous les hommes y furent massacrés.  Au XVIIe siècle un des descendants de Pierre de Montpezat lieutenant général  des armées du roi voit sa terre titré en marquisat, le dernier de cette famille Henri s'éteint sans postérité laissant son château à sa soeur la marquise de Vivet de Montclus, le château pillé à la Révolution sauvé par les habitants passera ensuite aux de Voguë qui le passe par héritage aux Vignet de Vendeuil, passera par alliance par la fille de Vignet de  Vendeuil  et le général de La Chapelle en est aujourd'hui le propriétaire.","architecture":"Au XIIe siècle, le village  de Montpezat fut une place forte occupant une position stratégique sur les premiers contreforts des Cévennes. Son allure guerrière marque fortement le paysage. comme beaucoup de communes de cette région eut son lot de malheurs, château des XIVe et XVIe siècles, restauré pendant les guerres de religion est un quadrilatère  fermé au sud par un mur, trois bâtiments forment un U autour d'une cour d'honneur au fond de cette cour bâtiment à trois niveaux, fenêtres à meneaux, l'aile ouest est flanquée d'une grosse tour ronde du XIVe siècle, accostée par une tour d'escalier polygonale.","habitants":"Famille de Bermond d'Anduze\r\n        \"","divers":"Château au centre du village de Montpezat","gps":"","images":["../image/image_30/30_Montpezat_1.jpg","../image/image_30/30_Montpezat_2.jpg","../image/image_30/30_Montpezat_3.jpg","../image/image_30/30_Montpezat_4.jpg","../image/image_30/30_Montpezat_5.jpg","../image/image_30/30_Montpezat_6.jpg"]},"Consult_chateau_formulaire89bf":{"id":"Consult_chateau_formulaire89bf","dept":"30","canton":"Quissac","commune":"Moussac","nom":"Moussac","type":"Tour Château","periode":"XIII","histoire":"MOUSSAC, a joué un rôle si proéminent dans lhistoire du Languedoc, concession en 1211 à lévêque dUzès par le roi Philippe-Auguste.  Propriété du comte de Toulouse, vient dêtre conquis par les armées royales. Lévêque y fait édifier une tour qui souligne son rang de seigneur. La puissance du clergé est cependant mise en question dès la fin du XIIIe siècle par le roi Philippe IV le Bel, en conflit avec la papauté. Après le procès et lexécution des templiers,  Guillaume de Nogaret et Guillaume de Plaisians, reçurent du roi dimportantes terres juste en face du château de Moussac. Devant la montée du pouvoir laïque et lhostilité de ces influents représentants de la Couronne, lévêque fait renforcer son château. \r\n Le village tombera à nouveau aux mains des protestants en 1703, durant la guerre des Cévennes. Le chef des « camisards », Jean Cavalier, fait incendier léglise, mais renonce à semparer du château. Lédifice de culte sera alors transformée en temple protestant. Le vénérable château de Moussac finira par être vendu comme bien public à la Révolution Française. Plusieurs propriétaires privés sy succéderont jusquen 1984. Il sera racheté en 2012 par Anne Creusot et Frédéric Salle-Lagarde, dont les ancêtres ont aussi joué un rôle dans lhistoire du pays (dans un camp et dans lautre). Cest eux qui ont entrepris la restauration particulièrement soignée de ce monument multicentenaire et son aménagement en logement de vacances.","architecture":"Ce petit château de Moussac, ancienne propriété des évêques d'Uzès, construit à la fin du XIIIe siècle, domine le village de Moussac où la Droude vient mêler ses eaux à celles du Gardon.  Il est aujourd'hui constitué d'une puissante tour barlong à bossage et d'un ensemble palatial construit sur un terrain clos de 700 m²  de plan rectangulaire de 10,50 mètres par 8,5 mètres haute de 15 mètres, appareillée en bossages, percées d'archères courtes à différentes hauteurs servait de grenier lors des attaques.\r\nLe château qui se répartit sur trois niveaux est doté d'une magnifique voûte gothique et d'une tour aménagée en pigeonnier au XVe siècle. Les travaux de restauration ont permis de mettre à jour une fresque sans équivalent du début du XIVe siècle qui nous raconte le combat sans merci que se livrèrent en 1300 la religion et Philippe le Bel, cest une plongé dans lintime de lHistoire de France. La tour seigneuriale du XIIe siècle  et le château du XIIIe siècle et XIVe siècles.","habitants":"Guillaume de Nogaret                                                                        Guillaume de Plaisians\r\n        \"","divers":"Tour des templiers à Moussac","gps":"","images":["../image/image_30/30_Moussac_1.jpg","../image/image_30/30_Moussac_2.jpg","../image/image_30/30_Moussac_3.jpg","../image/image_30/30_Moussac_4.jpg"]},"Consult_chateau_formulaire35c4":{"id":"Consult_chateau_formulaire35c4","dept":"30","canton":"Rousson","commune":"Navacelles","nom":"Navacelles","type":"Château","periode":"XVI","histoire":"NAVACELLES,  les possessions à Navacelles passent par la suite aux mains de seigneurs de la maison d'Uzès, au XVIe siècle aux Audibert, Pierre d'Audibert seigneur de Tressan et de Clavière de Beaucoiran. Marie-Anne de Clavière le transmit par alliance en 1702 à Joseph de Roux brigadier des armées royales, et en 1730 la seigneurie est acquise par Jean Roustan avocat au parlement de Nimes est devient seigneur de Navacelles, suite à une mésentente avec son fils, Charles Bonaventure Roustan de Navacelles en 1760 partagea le domaine en deux part l'une pour son fils, l'autre part pour son neveu Chambon, le domaine resta dans la famille de Bonaventure, dont un descendant Charles de Bonaventure  entreprit en 1957 la restauration.","architecture":"Navacelles, la construction date des XVIe et XVIIe siècles. Le bâtiment d'origine est resté en état jusqu'en 1760, date ou il fut partagé entre deux propriétaires. La chapelle devint par la suite l'église paroissiale et la tour sud  en tour  d'horloge. Le corps principal du château est  aujourd'hui habité. Une sorte   de galerie percées de  deux hautes arcades se situe  sur la gauche de la cour d'entrée. A l'origine s'élevait à cet endroit  une tour qui  a été arasée à hauteur du premier étage afin de créer une terrasse ornée d'une balustrade en pierre. A droite  de la cour on remarque le mur   de séparation dressé après le partage. En face, devant la façade, cinq marches d'un escalier en demi-lune conduisent sur la petite terrasse. De là, une porte d'entrée débouche directement  sur un escalier à vis  qui dessert les deux étages. Au premier étage, dans une salle voûtée, on retrouve le mur  de séparation et une belle cheminée à pieds droits et manteau renaissance, récupérée au XVIIe siècle dans un  château de la Loire. En entrant dans le jardin de l'église  se trouve l'ancienne  porte du château. Outre la porte de forme ogivale on observe sur la même façade des croisées à meneaux.","habitants":"Famille de Pierre d'Audibert \r\n        \"","divers":"Château de Navacelles","gps":"","images":["../image/image_30/30_Navacelles_1.jpg","../image/image_30/30_Navacelles_2.jpg","../image/image_30/30_Navacelles_3.jpg","../image/image_30/30_Navacelles_4.jpg"]},"Consult_chateau_formulaireabb3":{"id":"Consult_chateau_formulaireabb3","dept":"30","canton":"Quissac","commune":"Ners","nom":"Ners","type":"Château","periode":"XIII-XV","histoire":"NERS, au XVe siècle, le château appartenait à Jacques de Bozène, passa par alliance aux Dolon qui épousa  Bernardine  Teyssière qui avait acquit le château, en 1761 leur fille Anne-Julie de Dolon le vendit à Françoise-Olympe de Calvière-Boucoiran qui resta dans cette famille jusqu'en 1823 et à cette date le marquis de Clavière le vendit en trois lots.","architecture":"Cité en 1211 « le castrum de Ners », effectivement, à une tour de guet du XIIe siècle, encore visible aujourd'hui, sont venus sajouter des murs denceinte protégeant ainsi les quelques habitations du village.  Ners est incendié par une compagnie de routiers puis en 1403, le pont de bois médiéval est emporté par une crue du Gardon. Le château est le bâtiment le plus anciens du village, modifié en 1480, sous Louis XI, a conservé ses murs à bossage et  certainement le plus ancien bâtiment du village, construit en plan de U, une tour de guet à l'angle nord-Est.","habitants":"Famille de Jacques de Bozène\r\n        \"","divers":"Château de Ners","gps":"","images":["../image/image_30/30_Ners_1.jpg"]},"Consult_chateau_formulaireab31":{"id":"Consult_chateau_formulaireab31","dept":"30","canton":"Nimes","commune":"Nimes","nom":"Nimes_Chateaux","type":"Château","periode":"XVI","histoire":"Plusieurs châteaux au environ de Nîmes; tel que Lacoste, les Tuilerie et Fadaise.                                                                             NIMES, le château Royal joua un certain rôle dans notre histoire locale, sous Charles VI, à l'époque où la France resta livrée aux factions des Armagnacs et des Bourguignons, le château fut assiégé une première fois, en 1418, par le prince d'Orange, une deuxième fois, en 1420, par le dauphin lui-même qui vint assiéger Nîmes et son château, aux mains de ses ennemis. En 1570, le château fut assiégé et pris par Saint-Cosme, gouverneur de la ville pour les protestants, qui fit démolir les deux tours construites en 1443.                                                                                         LACOSTE, construit en 1763 dans le plus pur style du XVIIIe siècle, l'Orangerie était à l'origine destinée à abriter l'hiver les nombreux orangers qui agrémentaient le parc du château de Lacoste conçu par un élève de Le Nôtre.\r\nTUILERIE depuis plusieurs années, le domaine est conduit en sélection parcellaire. Et depuis toujours Chantal et Pierre-Yves Comte ont travaillé au renouvellement des parcelles, à la plantation de cépages très qualitatifs en haute densité mais dans le souci de léquilibre hygrométrique. \r\nFADAISE, édifié aux XVIIe siècle probablement par l'architecte Gabriel Dardaillon. Château des Fées, Marie de Serres, femme d'Alexandre Reynaud, laissa une fille, Margueritte Reynaud, qui épousa Simon de Possa, ce dernier étant mort, laissa une fille, Françoise de Possac, qui épousa le sieur Pauc; de ce mariage naquit une fille, Marthe-Sophie Pauc, qui hérita de Fadèse suivant acte de partage du 29 février 1795, et épousa Jean-Jacques Destrems de Saint ­Christol.   Le 19 mars 1828, M. Liotard acquit de ladite dame veuve Destrems le Fadèse, suivant acte reçu M. Gide, notaire, et le 15 juillet 1865, M. Samuel Guérin en est devenu propriétaire suivant acte reçu M. Canonge.","architecture":"Nimes.  Après la démolition des fortifications de Rohan, en 1632, il ne subsista plus du château Royal que la portion sur les fossés. Nous avons dit ailleurs qu'en 1793, en démolissant ce qui restait des anciennes fortifications de Nîmes, on découvrit l'ancienne Porte d'Arles  dit d'Auguste sous les ruines du vieux château Royal. Dans la suite, l'intérieur de la Porte d'Arles servit de cour aux écuries de la gendarmerie installée dans les bâtiments de l'ancien couvent des Dominicains. En 1848, le Préfet du Gard ordonna des fouilles, fit effectuer quelques restaurations dans l'intérieur de la Porte d'Arles, et la mise à nu du sol romain, où il fit transporter quelques antiquités. En 1867, la Porte d'Arles fut l'objet de nouveaux remaniements, on agrandit l'espace libre derrière les ruines romaines, on dégagea le monument du côté de la tour de gauche et la vieille porte romaine se présenta telle que désormais nous la voyons. Lacoste; quadrilatère à trois niveaux flanqué sur les côtés de tours carrées légèrement d'un niveau supérieure à la toiture du corps de logis avec toitures à quatre pans peu incliné.          Tuilerie; corps de logis rectangulaire à six travées et deux niveaux flanqué aux extrémités de deux pavillons rectangulaires et une tour ronde sur la partie gauche de la façade avec toitures en poivrières.                    Fadaise;  un édifice civil bourgeois de la ville de Nîmes, corps de logis rectangulaire à trois niveaux flanqué en angle de pavillon saillant carré, sur façade balcon supporté par une séries de colonnes gothiques et terrasses, sur le toit à balustrades. Ce château, à la gracieuse colonnade romane, au péristyle rappelant l'école italienne, aux vastes salles et galeries.","habitants":"Famille de Rohan,                                                                                 Famille d'Alexandre Reynaud\r\n        \"","divers":"Château de Lacoste, des Tuilerie,et de Fadaise","gps":"","images":["../image/image_30/30_Nimes_Chateaux_1.jpg","../image/image_30/30_Nimes_Chateaux_2.jpg","../image/image_30/30_Nimes_Chateaux_3.jpg","../image/image_30/30_Nimes_Chateaux_4.jpg","../image/image_30/30_Nimes_Chateaux_5.jpg","../image/image_30/30_Nimes_Chateaux_6.jpg","../image/image_30/30_Nimes_Chateaux_7.jpg","../image/image_30/30_Nimes_Chateaux_8.jpg"]},"Consult_chateau_formulaire599e-2":{"id":"Consult_chateau_formulaire599e-2","dept":"30","canton":"Nimes","commune":"Nimes","nom":"Nimes_Patrimoine","type":"Patrimoine","periode":"X-XVI","histoire":"NIMES, la fondation de Nîmes remonte à l'Antiquité dénommé Némausus d'où vient le nom de Nîmes. De la période romaine, Nîmes conserve de remarquables et exceptionnels monuments tels que les Arènes qui furent transformés en forteresse au Ve siècle avec petit village intérieur jusqu'au XIXe siècle, la Maison Carrée, temple romain dédié aux petits fils de l'empereur Auguste et la Tour Magne poste de surveillance Pré-Romain longtemps utilisée comme une citadelle, au pied de laquelle se situe le splendide sanctuaire de la Fontaine. Ce riche passé antique lui vaut le surnom de « Rome Française ». Ville à la fois romaine et hispanique, camarguaise, cévenole, à la fois languedocienne et provençale culturellement, fief protestant historique depuis le XVIe siècle, elle s'enorgueillit d'une culture et d'une histoire particulièrement riche et reste une ville à forte identité. Son patrimoine historique et culturel ainsi que la valorisation de son architecture courant de l'époque romaine au XXe siècle a permis à la ville d'obtenir le label de ville d'art et d'histoire. Depuis 2012, date de son inscription sur la liste indicative des villes acceptées à postuler, la ville de Nîmes travaille son dossier de candidature sur le thème « Nîmes, l'Antiquité au présent » pour l'inscription de la cité bimillénaire au Patrimoine Mondial de l'UNESCO.           FORT-VAUBAN. Les plans du Fort Vauban ont été réalisés non par Vauban, mais par un de ses émules, Jean-François Ferry, ingénieur du roi Louis XIV. On doit au Nîmois Jacques Cubizol et à l'architecte du roi Jacques Papot la construction de la citadelle. Ayant servi de prison au cours du XVIIIe siècle, elle reçut cette fonction de façon durable à partir de la Révolution. Le Fort a été transformé en site universitaire en 1995.","architecture":"La Maison Carrée  temple romain doit son exceptionnel état de conservation à une utilisation sans interruption depuis le XIe siècle. Inspiré par les temples d'Apollon et de Mars Ultor à Rome,  séduit par l'harmonie de ses proportions. Mesure 26 mètres de long sur 15 de large et 17 de hauteur. Le plafond du pronaos date du début du XIXe siècle; la porte actuelle a été réalisée en 1824. Ses merveilleuses frises et colonnes.  Transformée en hôtel de ville, en maison d'habitations privées, écurie, en église. Après la Révolution Française, elle est le siège de la première préfecture du Gard, puis aménagée en archives départementales avant d'inaugurer, dès 1823, la création du musée à Nîmes.                                                  La Tour Magne est une tour gallo-romaine haute de 18 mètres, vestige de l'ancienne enceinte romaine du Ier siècle avant notre ère, domine l'ensemble de la ville. Elle était en partie composée d'un coeur plein autour duquel s'organisait les pièces d'usage, celles-ci ont depuis longtemps disparues. Cherchant probablement un trésor, la tour Magne est vidée au XVIIe siècle.  La tour domine les jardins de la Fontaine sur le mont Cavalier.  Transformé en donjon au Moyen-Age.  Porte d'Espagne, la Porte de France compte une seule arcade en plein cintre surmontée d'une galerie aveugle décorée de pilastres toscans. Durant l'Antiquité, elle était encadrée de deux tours semi-circulaire. Fort Vauban, ayant servi de prison au cours du XVIIIe siècle, à reçut cette fonction de façon durable à partir de la Révolution, pour devenir en 1820 \"Maison Centrale de détention pour le département du Gard\" et le rester jusqu'en juin 1991. Le Fort a été transformé en site universitaire en 1995.                                                                                             Arènes, amphithéâtre ovale construit en 100 après J. C. 20000 places sur 34 niveaux de gradins ceci pour les combats de gladiateurs. Temple de Diane, l'édifice se trouve dans les jardins de la fontaine. C'est le monument antique le plus romantique et le plus énigmatique de Nîmes. Associé depuis sa construction au cimetière impérial, on ne connait pas sa fonction exacte: sauna mystique, bibliothèque, lieu de célébration de l'empereur, toujours est-il que le mystère plane encore.","habitants":"Les Romains\r\n        \"","divers":"Les Arènes, la portes d'Arle, la maison Carrée, la tour Magne, le fort Vauban, le temple de Diane et la façade de la Trésorerie.","gps":"","images":["../image/image_30/30_Nimes_Patrimoine_1.jpg","../image/image_30/30_Nimes_Patrimoine_2.jpg","../image/image_30/30_Nimes_Patrimoine_3.jpg","../image/image_30/30_Nimes_Patrimoine_4.jpg","../image/image_30/30_Nimes_Patrimoine_5.jpg","../image/image_30/30_Nimes_Patrimoine_6.jpg","../image/image_30/30_Nimes_Patrimoine_7.jpg","../image/image_30/30_Nimes_Patrimoine_8.jpg","../image/image_30/30_Nimes_Patrimoine_9.jpg"]},"Consult_chateau_formulaire6524":{"id":"Consult_chateau_formulaire6524","dept":"30","canton":"Bagnols sur Ceze","commune":"Orsan","nom":"Orsan","type":"Château","periode":"XVI","histoire":"ORSAN, en 1309 Guillaume de Laudun, co-seigneur de Laudun, Orsan, Codolet, Montfaucon, partage ses biens entre ses deux fils, tous deux du nom de Raymond. En 1333 Raymond de Laudun, seigneur d'Orsan. En 1348 Guillaume de Laudun, seigneur d'Orsan. En 1359 Raymond de Montaren habite le château d'Orsan. En 1384 Orsan appartient au diocèse d'Uzès, viguerie et doyenné de Bagnols; le prieuré de Saint-Martin d'Orsan dépend de la chapellenie des quatre chanoines de Bagnols. Au début du XVIe siècle, Pierre de Cambis, chevalier, dont la famille est originaire de Florence, porte le titre de seigneur d'Orsan; il épouse en 1525, Françoise de Perrussis, leur descendance est représentée successivement par, Jean de Cambis, chevalier de l'Ordre du Roi, seigneur d'Orsan, premier consul d'Avignon qui épouse Françoise de Clérici, Louis de Cambis, chevalier, seigneur d'Orsan, capitaine  premier consul et viguier d'Avignon, qui épouse Georgette de la Falèche, Jean de Cambis, chevalier, baron d'Orsan qui épouse en 1616 Marguerite de Simiane. De 1750 à 1792, le seigneur d'Orsan s'appelle Jacques-François-Xavier-Régis-Ignace, vicomte de Cambis, chevalier, marquis de Lagnes, brigadier des armées du roi, gouverneur de Navarre et commandant dans les Cévennes. Il épouse en 1755 Mlle de Chimay.  Orsan est un château viticole depuis le XIVe siècle, ce château était en ruine incendié en 1950  lors de son  acquisition par les Brunel, il est maintenant la propriété de Mme et Mr Philippe Verdier,  vigneron descendant des Brunel.","architecture":"Château d'Orsan,  dit des Cambis  était un château féodal avec des douves construit au XIVe siècle par les Montaren. Puis, il a appartenu au lieutenant général des armées du roi au XVIIe siècle. Pendant les guerres de religion, le château est très disputé. Corps de logis à trois niveaux en équerre  avec à son angle intérieur une tour d'escalier hexagonale, face à l'entrée le bâtiment d'habitation flanquée de deux tours carrées du XVIIe siècle.","habitants":"Famille de Pierre de Cambis\r\n        \"","divers":"Château d'Orsan et prieuré","gps":"","images":["../image/image_30/30_Orsan_1.jpg","../image/image_30/30_Orsan_2.jpg","../image/image_30/30_Orsan_3.jpg","../image/image_30/30_Orsan_4.jpg","../image/image_30/30_Orsan_5.jpg","../image/image_30/30_Orsan_6.jpg","../image/image_30/30_Orsan_7.jpg"]},"Consult_chateau_formulaire31a0":{"id":"Consult_chateau_formulaire31a0","dept":"30","canton":"La Grand-Combe","commune":"Sénéchas","nom":"Peras","type":"Maison forte","periode":"XVI","histoire":"PERAS; les Leyris en fut propriétaire au XVIIIe siècle, à la Révolution appartenait à la famille de la Tour-du-Pin  Gouvernet, et acquit en 1906 par monsieur Bondurand qu'il revendit en 1921 à monsieur Robert beau-père du propriétaire actuel monsieur Aubin.                                       A Sénéchas reste de vestiges d'une tour dite la tour d'Olivon,  tour à signaux qui contrôlé la vallée de la Cèze.","architecture":"Château de Péras, plus maison forte que château, semble être construite au XVIe siècle en plusieurs étapes,  quadrilatère avec cour fermée par les communs,  avec une  tour, tourelles et échauguettes à toits en poivrières, côté sud-est avec la tour carrée du XIIIe siècle à deux étages, le corps de logis à deux étages également du XVIIe siècle.                                                            Vestiges de la tour d'Olivon construite de plan carrée, elle présente deux archères ainsi qu'un mâchicoulis ruinés au deuxième étage.","habitants":"Famille des Leyris\r\n        \"","divers":"Maison forte de Péras et les vestiges de la tour d'Olivon","gps":"","images":["../image/image_30/30_Peras_1.jpg","../image/image_30/30_Peras_2.jpg","../image/image_30/30_Peras_3.jpg","../image/image_30/30_Peras_4.jpg"]},"Consult_chateau_formulaire2f49":{"id":"Consult_chateau_formulaire2f49","dept":"30","canton":"La Grand-Combe","commune":"Soustelle","nom":"Peries","type":"Vestiges","periode":"XIII","histoire":"PERIES, fief au XIIIe siècle de Firmas puis fief du baron d'Alès, vendu par  les héritiers de  Guillaume Pierre en 1518 à Jacques de Bilhot et passa par alliance de Françoise de Bilhot à Gervais des Estienne  qui toujours par alliance en 1578 leur fille Anne des Estienne, dame de la tour de Bilhot apporta aux Firmas et Antoine de Saunier seigneur de Périès. La lignée de Firmas depuis le XVIe siècle jusqu'à nos jours par mademoiselle Firmas de Périès.","architecture":"Périès, dit petit château la disposition des bâtiments à l'intérieur de la courtine délimite deux cours intérieures, accès par une porte voutée surmontée d'un mâchicoulis de défense, devait possédait quatre tours.  Une ferme fortifié dépendait du château aujourd'hui  pratiquement ruiné deux tours rondes dont une transformée en pigeonnier son percées de canonnières et fenêtres à meneaux.","habitants":"Famille de Guillaume Pierre                                                               Famille de Firmas de Périès\r\n        \"","divers":"Vestiges du château de Soustelle et château de Périès","gps":"","images":["../image/image_30/30_Peries_1.jpg","../image/image_30/30_Peries_2.jpg","../image/image_30/30_Peries_3.jpg","../image/image_30/30_Peries_4.jpg","../image/image_30/30_Peries_5.jpg"]},"Consult_chateau_formulairebafc-2":{"id":"Consult_chateau_formulairebafc-2","dept":"30","canton":"Le Vigan","commune":"Les Plantiers","nom":"Plantiers","type":"Château-Vestiges","periode":"XIV-XVIII","histoire":"PLANTIERS, au XIVe siècle fief du Baron d'Aleyrac vassaux des comtes d'Alès, passa aux Mandajors, aux Ginestoux et aux La Tour-Gouvernet y résidèrent jusqu'au XVIIIe siècle. Incendié en 1703, remis en état sur ordre de l'intendant du Languedoc, Lamoignon de Basville, puis vendu par les héritiers au vicomte René de la Charce, frère de Pierre de la Tour-Gouvernet marquis de Plantiers, puis passa à Jean-Elie de Salvaire ses descendants les Salvaire d'Aleyrac, et en 1911 à Sylvain Liron aujourd'hui la famille Mourgues en est propriétaire.                                                                  Au-dessus du mas d'Alayrac, sur l'élévation, se distinguent encore quelques traces du vieil Alayrac.\r\nSur l'éperon rocheux du site de Monteils  se dresse la tour donjon du château de Monteils  dépendait du marquisat de la Fare.","architecture":"le château de le Plantiers sur le bord de la Borgne, quadrilatère irrégulier possédait au XVIIe siècle quatre tours deux rondes deux carrées toutes crénelées, reste les tours rondes et la tour maîtresse flanqué d'une échauguette, les fenêtres à meneaux, les créneaux ont disparus. La tour à conservé l'escalier à vis. L'entrée dans la cour  au nord-est ouverture en anse de panier qui retombe sur des impostes de fins pieds droits.                                               A les Plantiers sont visibles trois forteresses non visitables  d'origine moyenâgeuse ou ce qu'il en reste.                                         Le château du Caylou, surplombant un méandre de la Borgne, commandait le chemin de Saumane.","habitants":"Vicomte René de la Charce\r\n        \"","divers":"Vestiges de l'ancien château (tour donjon de Monteils) et du nouveau château des Plantiers","gps":"","images":["../image/image_30/30_Plantiers_1.jpg","../image/image_30/30_Plantiers_2.jpg","../image/image_30/30_Plantiers_3.jpg","../image/image_30/30_Plantiers_4.jpg","../image/image_30/30_Plantiers_5.jpg"]},"Consult_chateau_formulaire157e":{"id":"Consult_chateau_formulaire157e","dept":"30","canton":"Pont St-Esprit","commune":"Pont St-Esprit","nom":"Pont_St_Esprit_chateau","type":"Château","periode":"XVI-XIX","histoire":"Quatre châteaux à Pont Saint-Esprit, le Lamartine du XIIIe siècle (Voir article), château des Bruyères du XVIIe siècle, du Colombier  et la citadelle du XIV-XIXe siècles (voir article).            BRUYERES  cest madame Louise Marie Couderc qui supervisa les travaux de 1919 à 1921 car son mari périt a cette guerre. La municipalité le racheta en 1987, il fut vandalisé, volé, squatté, les dépendances ont brûlés, et  les toitures se sont effondrées. Dans le parc  on peut admirer le plus gros platane dEurope, avec 9,90 mètres de circonférence, il fut planté vers 1553 par Pierre Belon, protégé du Roy François 1er. Il fut racheté en 1991 par les propriétaires actuels  la famille de Caregnato Alberto qui l'on transformé en hôtel restaurant et chambres d'hôtes.                     COLOMBIER ou Bravay. François Bravay, qui fit construire ce château pour son frère au XIXe siècle. François Bravay nait en novembre 1817, est le fils d'un marchand de casseroles et doutils agricoles de Pont-Saint-Esprit et lami denfance de Pierre Taillant. Après des déboires financiers, il quitte la France et va tenter sa chance à Alexandrie. Grâce à un heureux concours de circonstances et à lamitié du vice-roi dEgypte Saïd Pacha, il acquiert une immense fortune. De retour en France il se lance dans la politique, mène une vie fastueuse et dilapide sa fortune, achète celui de Belle-Eau à Donzère, où il reçoit Saïd Pacha, et un hôtel à Paris, où il réside. Il se lance alors dans la politique. Après de nombreuses péripéties il est élu conseiller général, en 1862, puis député du Gard, en 1865. Mais ses dépenses fastueuses l'ont complètement ruiné, en 1874.  Il meurt aveugle et sans ressource à Paris. Il repose au cimetière de Pont-Saint-Esprit dans un caveau remarquable quil sétait fait construire.","architecture":"Bruyères, Le château a été bâti dans la plaine au bord dune voie romaine qui longe le Rhône, les dates gravées sur des pierres existantes a langle de lactuelle demeure sont de 1626. Le dernier habitant recensé au cadastre Napoléonien était le comte de Lezert, lieutenant du Roy. Le château fut démoli et pillé à la Révolution, et fut restauré en 1827, puis vandalisé  suite à la première guerre mondiale. En 1974, les Bruyères servait de hangar agricole et l'édifice se détériora petit a petit.                                                  Colombier; joli petit manoir à un niveaux et attiques à toitures en croupes en ardoises très prononcée,  flanqué sur façades sud de deux tourelles en angles toitures en poivrières et tour carré à l'arrière à deux niveaux.","habitants":"Famille de Pierre Belon                                                                        Famille de François Bravay \r\n        \"","divers":"Château  de Bravay, de la Bruyères, et de Sainte-Alexandre","gps":"","images":["../image/image_30/30_Pont_St_Esprit_chateau_1.jpg","../image/image_30/30_Pont_St_Esprit_chateau_2.jpg","../image/image_30/30_Pont_St_Esprit_chateau_3.jpg","../image/image_30/30_Pont_St_Esprit_chateau_4.jpg","../image/image_30/30_Pont_St_Esprit_chateau_5.jpg","../image/image_30/30_Pont_St_Esprit_chateau_6.jpg"]},"Consult_chateau_formulaire452c":{"id":"Consult_chateau_formulaire452c","dept":"30","canton":"Pont St-Esprit","commune":"Pont St-Esprit","nom":"Pont_St_Esprit_citadelle","type":"Citadelle","periode":"X-XI","histoire":"CITADELLE, pont médiéval à 25 arches sur le Rhône, le pont mesure 919 mètres de long construit de 1265 à 1309. Le Pont de Saint-Esprit a la majeure partie de sa structure sur la commune de Lamotte-du-Rhône. Sa construction fut voulue par le frère de Saint-Louis, le comte de Poitiers et de Toulouse Alphonse de Poitiers; elle commença en 1265 pour sachever en 1309. Daprès Viollet-le-Duc, elle fut confiée à la branche pontife des hospitaliers, la branche des constructeurs de ponts, formée par ces moines-soldats pour faciliter les pèlerinages et dirigée par Jean de Tensanges ou de Thianges. La tradition veut que celui-ci, prieur des bénédictins de Saint-Saturnin-du-Port se soit d'abord refusé à cette construction puis qu'il céda, inspiré par l'Esprit-Saint et posa lui-même la première pierre. La citadelle et la collégiale (XIVe-XVIIIe siècles); cette ancienne collégiale possède un admirable portail en gothique flamboyant hélas encore une fois fort dégradé. La maison des chevaliers (XIIe siècle) qui abrite le musée d'Art sacré du Gard ancienne demeure des Piolenc. Outre les belles et hétéroclites collections, remarquables plafonds peints que ce soit dans la salle d'apparat, plafond à la française du XVe siècle ou encore sur la magnifique charpente de la cour royale de justice  qui s'élève à 8 mètres de hauteur au premier étage de la demeure.   A quelques kilomètres au sud à Saint-Alexandre le château BEL-AIR , La Fage viticole est dirigée par De la Fage Robert qui occupe le poste de Gérant, édifié sur des caves anciennes à trois niveaux construction rectangulaire, une tour carrée en retrait à gauche du bâtiment, ou  a habité Martoum de Digoine du Palais. Aujourd'hui exploitation viticole. Château de Bel Air, remanié au XIXe siècle: tour-pigeonnier carrée.","architecture":"La Citadelle et la Collégiale constituent un ensemble d'édifices construits entre le XIVe et le XVIII siècle, situé à quelques pas de Pont du Saint-Esprit. La porte de la collégiale représente l'un des seuls vestiges de l'ancien édifice, suite à la démolition d'une grande partie de la Citadelle, entreprise par la municipalité de l'époque juste après la seconde guerre mondiale.  Située dans la citadelle, cet ensemble recèle en son cur un monumental portail gothique. Enceinte et vestiges sont construits selon les techniques d'architecture militaire de l'époque Vauban, cette forteresse défendait la ville et le pont. Depuis le XVIIe siècle, les garnisons s'y sont succéder.                                                                            Portail de l'ancienne chapelle de l'hôpital, deux contreforts encadrant à droite et à gauche la façade méridionale, porte à voussures qui donnait autrefois accès à la chapelle, fronton et arcatures surmontant les portes, façade Nord; classement par arrêté du 19 novembre 1910, chapelle et ses dépendances, salle de l'hôpital, porte de la citadelle, inscription par arrêté du 18 janvier 1951.                                                                                            Château de Bel-Air de construction rectangulaire à trois niveaux pavillons saillants en façades avec attiques.","habitants":"Le comte de Poitiers\r\n        \"","divers":"La citadelle, la maison du roi et  la cathédrale st-Saturnin à Pont saint-Esprit.","gps":"","images":["../image/image_30/30_Pont_St_Esprit_citadelle_1.jpg","../image/image_30/30_Pont_St_Esprit_citadelle_2.jpg","../image/image_30/30_Pont_St_Esprit_citadelle_3.jpg","../image/image_30/30_Pont_St_Esprit_citadelle_4.jpg","../image/image_30/30_Pont_St_Esprit_citadelle_5.jpg","../image/image_30/30_Pont_St_Esprit_citadelle_6.jpg","../image/image_30/30_Pont_St_Esprit_citadelle_7.jpg","../image/image_30/30_Pont_St_Esprit_citadelle_8.jpg","../image/image_30/30_Pont_St_Esprit_citadelle_9.jpg"]},"Consult_chateau_formulaire3b9b":{"id":"Consult_chateau_formulaire3b9b","dept":"30","canton":"La Grand-Combe","commune":"Ponteils et Brésis","nom":"Ponteils_Bresis","type":"Vestiges","periode":"XII","histoire":"Deux châteaux à Ponteils et Brésis dont celui de Brésis vestiges du XIIe siècle  et vestiges du château de Moyes.                                 A une dizaine de kilomètres à l'ouest le château de la Grange à Concoules (voir article) Chambonnet et au nord de Ponteils le château de Malons et Elze.                                                        BRESIS, Le château fort de Brésis du XIIe siècle  fut  bâti sur une ancienne villa romaine. Il appartient a la famille des Hérail au XIIe siècle. Il échoit à Pierre Hérail, écuyer, seigneur de Brésis, épouse Blandine dAnduze, fille de Pierre et de Vierne du Luc,  décédé avant 1307, son testament est publié en 1310, ils eurent 14 enfants. Jean Ier Hérail, damoiseau, seigneur de Brésis rend hommage en 1317 à lévêque dUzès, peu avant son décès, en faveur de son fils aîné, il avait eu cinq enfants de son épouse   Catherine de Seneuil, fille de Guillaume seigneur de Seneuil. Sous François Ier  cette seigneurie devient une  vicomté. La comtesse de Caritat de Condorcet, née Anne Hérail de Brésis, hérite du château  au XVIIe siècle et cette famille émigre à Gênes en Italie, mais après la Révolution la propriétaire leur fille madame d'Ailhaud du Castellet qui par manque de moyen le vend à monsieur du Chambonnet et à Félix Chaber de Montselgues. Au XXe siècle il est abandonné, pillés et tombe en ruine et racheté au XXe siècle par un membre de la famille des Hérail de Brézis revenu au pays. \r\nELZE,  cité au XIVe siècle seigneurie relevant en partie du duc dUzès. le fief dépendait du roi puis aux comtes  de Toulouse et en coseigneuries; les Galtier, les Molette, les Pradel de Saint-Ambroix, à la fin du XVe siècle les Grimoard de Beauvoir de Roure, le fief élevé en comté par Henri IV en faveur de Balthazar de Beauvoir de Roure puis passa par alliance au XVIIIe siècle  aux Agrain des Ubacs. Il fut donné au XXe siècle à l'évêché de Nîmes et devient résidence des prêtres, tomba en indivision et vente  judiciaire en 1987 à monsieur Passe qui le restaure.","architecture":"Brésis ruines du château, les pierres de taille composant les encadrements de portes et fenêtres  sont vendues les autres pillées par les voisins avec ses fortifications et le bâtiment attenant faisant partie de l'unité castrale. Ce château fut édifié au XIIe siècle sur un bloc de schiste que les maîtres d'oeuvre de l'époque ont su admirablement tailler et utiliser à leur avantage, de forme polygonale, est un vaste ensemble qui se déploie autour d'une tour carrée; le donjon imposant est en cours de restauration, présente trois étages que séparent des voûtes.                                     Elze, hameau gardois depuis 1812, possède une église et un château mentionné depuis le XIVe siècle. Située aux confins des départements de lArdèche, du Gard et de la Lozère, cette place surveillait le passage des marchandises sur le chemin muletier de dimension modeste, plus maison forte que château, édifice à trois niveaux accolé d'une tour ronde a même niveau. Ruines dun ancien château fort du XIVe  siècle sur un pic du Mont-Barre.","habitants":"Famille des Hérail                                                                                   Famille de  Grimoard de Beauvoir de Roure\r\n        \"","divers":"Vestiges de Brésis, de Moyes  et maison forte d'Elze","gps":"","images":["../image/image_30/30_Ponteils_Bresis_1.jpg","../image/image_30/30_Ponteils_Bresis_2.jpg","../image/image_30/30_Ponteils_Bresis_3.jpg","../image/image_30/30_Ponteils_Bresis_4.jpg","../image/image_30/30_Ponteils_Bresis_5.jpg","../image/image_30/30_Ponteils_Bresis_6.jpg","../image/image_30/30_Ponteils_Bresis_7.jpg","../image/image_30/30_Ponteils_Bresis_8.jpg"]},"Consult_chateau_formulaire277f-2":{"id":"Consult_chateau_formulaire277f-2","dept":"30","canton":"La Grand-Combe","commune":"Portes","nom":"Portes","type":"Forteresse","periode":"XII","histoire":"PORTES, fief en 1052 d'Almérade d'Anduze qui légua  au prieuré de Sauve, devenue propriété des Anduze, vassaux des comtes de Toulouse, le seigneur d'Anduze pour refus de prêter hommage à Simon de Monfort fut dépossédé de leur bien au profit d'un oncle Bernard VIII d'Anduze.  Au XIIe siècle la baronnie appartenait au Châteauneuf de Randon   puis passe par héritage à la famille de Polignac, mais Randon-Polignac endetté dut  vendre.  La seigneurie  fut achetée en 1322 par Raymond-Guillaume Ier de Budos, neveu  de Bertrand de Got futur pape Clément V, pendant la guerre de cent ans les Budos  ayant pris part pour les anglais ils furent dépossédé du château au profit  d'Humbert II qui le céda au comte de Beaufort.  Les Budos  en 1383 le  récupèrent et rendirent hommage au roi de France, après les conflits religieux le château fut pillé par les truchins,  ont dut le  remanier par des rajout de tours,  son fils Jacques de Budos  devenu vicomte récupère le château en 1583 et   Louis XIII élevé la seigneurie au titre  de marquisat en faveur d'Antoine-Hercule de Budos qui épousa Louis de Crussol et construisit la partie moderne du  château,  il est tué en 1629 au siège de Privas, sa fille Marie-Félice marquise de Portes laisse en héritage en 1693 le château à son neveu le prince de Conti puis aux Bourbon et à Louis XVI qui le racheta et le donna à son frère au comte de Provence futur Louis XVIII. A la Révolution  transformé en prison, vendu  comme bien national  à connu six propriétaires successifs dans l'espace d'un demi-siècle qui terminera dans les mains de la famille de Pagèze de la Vernède qui le restaurera et le vendra à la famille Coquebert de Neuville.","architecture":"Le premier château de Portes fut construit au XIIe siècle, surnommé le vaisseau des Cévennes en raison de sa proue en pierre spectaculaire et unique en Europe, le château de Portes forteresse médiévale et son col surveillent lancien chemin dit de Régordane quempruntaient les pèlerins de Saint-Gilles et les Croisés vers la Terre Sainte. Autour dune enceinte polygonale cantonnée de tours, sélevèrent du XIe au XVIe siècles corps de logis et galeries à arcades par campagnes successives quadrilatère irrégulier, flanqué de courtines talutés cantonnées  à l'ouest de deux tours rondes au nord-Est une tour carrée,  la dernière fut lédification vers 1600 du \"Château Neuf\", haut et énigmatique bâtiment de plan triangulaire adossé à la forteresse médiévale et construit en grand appareil de grès doré sur la base dun éperon très effilé, tel une proue de navire,le quatrième angle est occupé par un grand corps de logis de plan trapézoïdal comprenant trois étages percées de larges baies rectangulaires à meneaux, ce corps de logis très amenuisé à son angle sud-est, est prolongé à cet endroit par un éperon très aigu qui ne monte pas plus haut que la base du second étage possédant sur son extrémité une forte échauguette sur encorbellement, qui lui a valu le surnom de  vaisseau en Cévennes. Ce monument qui célèbre le mariage du Moyen-Age et de la Renaissance était habité jusquau début du XXe siècle avant que les mines ne changent le destin du village.","habitants":"Seigneur d'Anduze\r\n        \"","divers":"Forteresse de Portes.","gps":"","images":["../image/image_30/30_Portes_1.jpg","../image/image_30/30_Portes_2.jpg","../image/image_30/30_Portes_3.jpg","../image/image_30/30_Portes_4.jpg","../image/image_30/30_Portes_5.jpg","../image/image_30/30_Portes_6.jpg","../image/image_30/30_Portes_7.jpg","../image/image_30/30_Portes_8.jpg","../image/image_30/30_Portes_9.jpg"]},"Consult_chateau_formulaireabcb-2":{"id":"Consult_chateau_formulaireabcb-2","dept":"30","canton":"Rousson","commune":"Potelières","nom":"Potelieres","type":"Château","periode":"XII-XV","histoire":"POTELIERES, du XIIe siècle, fief de Bérard de Montalet vassaux des vicomtes de Portes. En 1789 Le bailli de Suffren parrain de Marie-Alix Bérard de Montalet, son neveu le vicomte de Suffren Saint-Tropez  devient propriétaire et par alliance de sa fille avec son cousin le marquis de Montalet  le château fait retour dans cette famille. En 1901 date de la mort du dernier marquis, passa à la famille Lebrun qui mis des appartements en location en 1993,  la famille Tcherepakhine utilise le château pour des concerts séminaires et chambres d'hôtes et en 1998 Florence et Eric Odin, sont  les propriétaires du château de
