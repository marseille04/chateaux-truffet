Potelières et continue les chambres d'hôtes.","architecture":"Le château de Potelières du XVe siècle est une propriété de vacances, un lieu de réceptions et séminaires. Remanié au XVIIIe siècle, un magnifique portail d'entrée entre deux colonnes surmontées de Sphinx;  corps de logis à trois niveaux, relié au sommet par des balustrades  dissimulant le toit qui relie les deux tours rondes, accès au corps de logis  par un perron central à double évolution. Sur la façade opposée grande terrasse à balustrade de pierre et deux ailes  avancées.\r\nMalgré un incendie en 1564 et occupé par des troupes protestantes  du duc de Rohan, et pillage à la Révolution il fut restauré en 1780 et au siècle suivant. Le hall monumental et sa galerie à l'italienne, les sols d'asphalte et terre cuite impressionnent le visiteur qui élève son regard dès l'entrée, conquis par la beauté et la majesté du lieu.","habitants":"Fief de Bérard de Montalet\r\n        \"","divers":"Château de la Potelières  face et arrière","gps":"","images":["../image/image_30/30_Potelieres_1.jpg","../image/image_30/30_Potelieres_2.jpg","../image/image_30/30_Potelieres_3.jpg","../image/image_30/30_Potelieres_4.jpg"]},"Consult_chateau_formulaire0b64":{"id":"Consult_chateau_formulaire0b64","dept":"30","canton":"Uzès","commune":"Pougnadoresse","nom":"Pougnadoresse","type":"Château","periode":"XII-XIV","histoire":"POUGNADORESSE, cité en  1144 où le seigneur d'Uzès Bermond Ier rend hommage aux évêques d'Uzès pour cette seigneurie. Ceci est confirmé dans la charte du roi Louis-le-Jeune, qui en 1156, donnait le château et ses dépendances à l'église d'Uzès et à ses évêques. En 1257, Raymond de Sernhac apparaît comme co-seigneur et au XIVe siècle, En 1332, puis en 1449, il passe aux mains du vicomte d'Uzès, c'est alors une co-seigneurie, on compte de  nombreux co-seigneurs, ainsi les seigneurs de Pouzilhac qui en héritent en 1391 et ceux de  Ribaute qui signent un acte de 1503.   En 1550, Honoré Le Chantre achète une partie de la seigneurie et devient co-seigneur; il  va réunir toute la seigneurie jusqu'en 1594 où il apparaît seul seigneur du lieu. C'est l'ancêtre de la famille qui possède aujourd'hui le château car en 1780, Marie Le Chantre  épouse J. François de Sorbier de la Condamine qui prend alors le nom De Sorbier De  Pougnadoresse. Aujourd'hui Gérard de Pougnadoresse.","architecture":"Le château de Pougnadoresse, construit sur une crête rocheuse au Nord-Ouest d'Uzès, domine la Tave qui se jette dans la Cèze. Ce château qui subit des saccages et incendie. De gros blocs de grès ocre l'entourent coté Est. Le château de Pougnadoresse est aussi très riche d'histoire, avec sa plus vieille tour qui date de l'époque carolingienne de l'an 1000, sa double enceinte fortifiée du XIIe siècle et, surtout, sa grosse tour qui servait autrefois de glacière.  Les bâtiments aujourd'hui détruits au sud-ouest de part et d'autre de la grosse tour et l'aile Est jouxtant la petite tour sud-est ainsi que le toit en pavillon aujourd'hui disparu, de la tour sud-ouest. Côté sud  le pont levis et les deux échauguettes qui l'entourait ont disparu  à la Révolution, le  corps de logis est en deux parties, une tour ancienne de défense du Xe siècle, celle de droite accolée au rocher au nord ou l'on rejoint une plateforme avec murailles crénelées.","habitants":"Famille de Raymond de Sernhac\r\n        \"","divers":"Château de Pougnadoresse","gps":"","images":["../image/image_30/30_Pougnadoresse_1.jpg","../image/image_30/30_Pougnadoresse_2.jpg","../image/image_30/30_Pougnadoresse_3.jpg","../image/image_30/30_Pougnadoresse_4.jpg","../image/image_30/30_Pougnadoresse_5.jpg","../image/image_30/30_Pougnadoresse_6.jpg"]},"Consult_chateau_formulairefd41":{"id":"Consult_chateau_formulairefd41","dept":"30","canton":"Redessan","commune":"Pouzilhac","nom":"Pouzilhac","type":"Forteresse","periode":"XII","histoire":"POUZILHAC, cité au XIIe siècle fief des Pouzilhac son remplacé au XIVe siècle par les Maubuisson de Ribaute et par alliance passa à Jean de Cubières, seigneur du Cheylar d'Aujac. En 1622 le duc de Rohan s'empare du château y installa une garnison et fit de nouvelles fortifications, mais fut repris par le marquis de Portes, en 1623 fut acquis par Georges de Picon maître d'hôtel du roi et de nouveau acquit en 1677 par Pierre Baudet d'Avignon comte palatin et  en 1721 l'abbé Jean-Joseph Duplessis en prend possession. En 1818 élevé au titre de baronnie en faveur de Louis-Antoine Duplessis de Pouzilhac neveu de l'abbé. Le comte de Conchy l'acquit au XXe siècle, à la mort de sa veuve en 1964 mésentente des héritiers, le château fut mis sous scellés passa au tribunal abandonné jusqu'en 1978  et acquisition par le vicomte de Lavaissière de Verduzan qui le remania à l'aspect actuel.","architecture":"Pouzilhac,  fondations du XIIe siècle, édifice d'aspect pittoresque tours recrénnelées après les guerres de religion et original remanié au XIXe siècle mais ayant conservé beaucoup d'éléments médiévaux, quadrangulaire style forteresse haute tour carrée en angles, donjon carré également avec une tourelle accolée dépassant l'ensemble  et l'enceinte crénelée. L'aile des  communs, sur la cour d'honneur,  quatre tours carrées reliés par un chemin de rondes, le donjon carré base de la construction du château, transformation en 1720 des ouvertures de fenêtres .A l'intérieur du château, très beau plafond du XVIIe siècle du salon et les cheminées. Petite chapelle seigneuriale du XVIIIe siècle.","habitants":"Fief des Pouzilhac\r\n        \"","divers":"Forteresse de Pouzilhac","gps":"","images":["../image/image_30/30_Pouzilhac_1.jpg","../image/image_30/30_Pouzilhac_2.jpg","../image/image_30/30_Pouzilhac_3.jpg","../image/image_30/30_Pouzilhac_4.jpg","../image/image_30/30_Pouzilhac_5.jpg","../image/image_30/30_Pouzilhac_6.jpg","../image/image_30/30_Pouzilhac_7.jpg","../image/image_30/30_Pouzilhac_8.jpg"]},"Consult_chateau_formulaire0522":{"id":"Consult_chateau_formulaire0522","dept":"30","canton":"Redessan","commune":"Remoulins","nom":"Remoulins_Rabasse","type":"Château","periode":"XV","histoire":"A Remoulins le château de Rabasse (Article) et l'église fortifié de Saint-Bonnet du Gard.                                                                   RABASSE;  Raymond Rabasse, en lutte avec son suzerain le vicomte dUzès fit construire vers lan 1450, un nouveau château sur les ruines dun château féodal, ce dernier avait usurpé le titre de seigneur de Remoulins, emprisonné il fit ensuite amende honorable  mais la famille étant obligé de quitter le Castel-Viel pour cela qu'il fit construire le château de Rabasse  qui passa par alliance à Bertrand de Laudun co-seigneur  de Fournès et restera dans cette famille jusqu'en 1620, Charles Faret seigneur de Saint-Privat et de Fournés hérita. Le comte de Pont Renepont l'acquit en 1820,  monsieur Cazagne notaire à Remoulins l'acquit en 1840 pour le transformé en ferme. Monsieur Gilles l'acheta  le laissa à l'abandon et le revendit dernièrement à monsieur Macaigne qui le restaure.                                                                                             PONT du GARD est un pont-aqueduc romain à trois niveaux,  il enjambe le Gardon. Probablement bâti dans la première moitié du Ier siècle, il assurait la continuité de l'aqueduc romain qui conduisait leau dUzès à Nîmes. D'après les dernières recherches, il aurait cessé d'être utilisé au début du VIe siècle. Au Moyen-Age, les piles du second étage furent échancrées et l'ouvrage fut utilisé comme pont routier. L'architecture exceptionnelle du Pont du Gard attira l'attention dès le XVIe siècle, qui dès lors bénéficia de restaurations régulières destinées à préserver son intégrité. Un pont routier lui fut accolé en 1743-1747. Plus haut pont-aqueduc connu du monde romain, il a été classé monument historique en 1840 et inscrit sur la liste du patrimoine mondial de l'Unesco en décembre 1985.","architecture":"Rabasse, édifice, inachevé, qui incorpore les restes d'un bâtiment plus ancien. Celui-ci se compose dun bâtiment du XVe siècle formant les deux tiers  du corps de logis rectangulaire  à lest et  dune construction plus récente à louest, datant fin XVIe, début XVIIe siècle. Quatre échauguettes, ou tourelles dangle pentagonales en surplomb, encadrent lensemble, cest un joyau de larchitecture  provençale. Distribution intérieure influencée par l'agencement des appartements à la Française. La porte d'entrée sur la façade sud encadrement  de pierres taillées en pointes de diamant surmontée d'un fronton arrondi brisé, fenêtres à meneaux et deux bandeaux à espace d'un mètre sur le pourtour du bâtiment.  Travaux de réparation dès la fin du XVIIe siècle.  Face à l'église de Remoulins  la Tour des Escarabats, tour rectangulaire est le reste d'une enceinte fortifiée du XIIe siècle elle à conservé des vestiges de mâchicoulis. L'église, construction du IXe siècle fortifiée à partir de 1356 (extérieur). Située en position dominante au-dessus du village qu'elle protège, l'église est un édifice fortifié de style \"roman primitif\". Sa construction remonte au IXe siècle et utilise de nombreux débris de l'ancien aqueduc romain.","habitants":"Famille de Raymond Rabasse\r\n        \"","divers":"Château de Rabasse avant et après et remparts de Remoulins, pont du Gard  et l'église fortifiée de St-Bonnet du gard","gps":"","images":["../image/image_30/30_Remoulins_Rabasse_1.jpg","../image/image_30/30_Remoulins_Rabasse_2.jpg","../image/image_30/30_Remoulins_Rabasse_3.jpg","../image/image_30/30_Remoulins_Rabasse_4.jpg","../image/image_30/30_Remoulins_Rabasse_5.jpg","../image/image_30/30_Remoulins_Rabasse_6.jpg","../image/image_30/30_Remoulins_Rabasse_7.jpg","../image/image_30/30_Remoulins_Rabasse_8.jpg","../image/image_30/30_Remoulins_Rabasse_9.jpg"]},"Consult_chateau_formulaire4294":{"id":"Consult_chateau_formulaire4294","dept":"30","canton":"Alès","commune":"Ribaute les Tavernes","nom":"Ribaute_30","type":"Château","periode":"XIII-XVIII","histoire":"RIBAUTE, splendide château des XIIIe-XVIIIe siècles,  les Bermond, barons d'Anduze dont dépendait Ribaute, puissante famille apparentée au comte de Toulouse, leur suzerain, prirent parti contre les troupes du roi de France et les croisés. Leurs terres, comme celles de la plupart des seigneurs languedociens furent confisquées par le roi Philippe III le Hardi et le Languedoc définitivement rattaché en 1271 à la couronne de France en 1307. Plus tard Philippe le Bel fit don du fief de Ribaute à un chevalier d'une famille originaire d'Ile de France, Odoard de Malbuisson déjà viguier royal à Sommières 1307.  Au XVIe siècle passa par alliance à Jean de Cubières seigneur du Cheylard d'Aujac, puis en héritage aux Ségla, magistrats au parlement de Toulouse et aux Deshours de Mandajors. Camille  de Calvière et son mari Philippe de Mandajors en héritent en 1771. Ce château ayant subit des vicissitudes  à la Révolution  vendu par lots et racheté au début du XIXe siècle à la famille Vigne, Camille Vigne de Mandajors consacra beaucoup de son temps à la rénovation. Aujourd'hui le comte et la comtesse Chamski-Mandajors  l'ont transformé en chambres d'hôtes.","architecture":"Le château au centre du village de Ribaute fut construit au XIIIe siècle sur des soubassements plus anciens suivant le plan classique des maisons fortes du Bas-Languedoc.  De plan en U le corps de logis  et deux ailes  sur arcades délimite la cour d'honneur sur la façade sud deux tours d'angle ont été conservées arasées au niveau du toit, une tour englobe l'église paroissiale.  Le château  fut reconstruit au XVIe siècle sur des bases anciennes la façade nord qui donne sur la cour présentant un léger avant corps surmonté d'un fronton  courbé. L'entrée principale présente une façade classique du XVIIIe siècle. Un escalier monumental à double révolution construit en 1771 dessert les pièces de réception à l'étage. Rareté des peintures civiles du XIVe siècle. La cage d'escalier date du milieu du XVIIIe siècle. Les salles de réception du premier étage et du corps central sont décorées de gypseries. La partie du XVIIIe siècle a été édifiée par l'architecte Guillaume Rollin. Très belles salles a l'étage meublées d'époque. Rez-de-chaussé médiéval.  Le château souffrit de son occupation par les allemands, au cours de laquelle fut décrénelée la tour d'angle.","habitants":"Famille  de Camille  de Calvière\r\n        \r\n        \"","divers":"Château de Ribaute","gps":"","images":["../image/image_30/30_Ribaute_30_1.jpg","../image/image_30/30_Ribaute_30_2.jpg","../image/image_30/30_Ribaute_30_3.jpg","../image/image_30/30_Ribaute_30_4.jpg","../image/image_30/30_Ribaute_30_5.jpg"]},"Consult_chateau_formulairec3ec":{"id":"Consult_chateau_formulairec3ec","dept":"30","canton":"Rousson","commune":"Rivières","nom":"Rochegude_Ceze","type":"Vestiges","periode":"XII","histoire":"ROCHEGUDE, au XIIe siècle fief du comte de Toulouse sous la suzeraineté des évêques d'Uzès, au XIIIe siècle les Budos de Portes en été les co-seigneurs, au XIVe siècle Richard d'Autun en était le propriétaire, puis la seigneurie passa à Raymond de Barjac et cette lignée Barjac-Rochegude conserva le château jusqu'en 1718.","architecture":"Rochegude, vestiges du château dont une tour arasée et un mur percé d'une baie rectangulaire. Rochegude vient du mot occitan Rocaguda (la roche aiguë). Le bourg médiéval construit sur une colline escarpée, s'élève en gradins, jusqu'aux vestiges du château fort de la famille des \"Barjac-Rochegude\" et occupe une position des plus pittoresque sur la rive droite de la Cèze. Les maisons, de pierre calcaire, sont imbriquées les unes dans les autres, reliées par des arches, des voûtes, des ruelles, des calades étroites et sinueuses formant comme un labyrinthe de pierre.","habitants":"Famille des Budos de Portes\r\n        \"","divers":"Vestiges du château de Rochegude","gps":"","images":["../image/image_30/30_Rochegude_Ceze_1.jpg","../image/image_30/30_Rochegude_Ceze_2.jpg","../image/image_30/30_Rochegude_Ceze_3.jpg","../image/image_30/30_Rochegude_Ceze_4.jpg"]},"Consult_chateau_formulaire4ffc":{"id":"Consult_chateau_formulaire4ffc","dept":"30","canton":"La Vistrenque","commune":"Rodilhan","nom":"Rodilhan","type":"Château","periode":"XV","histoire":"RODILHAN, au XIe siècle fief  d'Etienne de Rodilhan vassaux du seigneur de Manduel, puis à Guillaume de Nogaret passa par héritage en 1313 aux Aleyrac et aux Ginestoux de Mondardier en 1570, puis par alliance passa au la Tour du Pin et César de la Tour du Pin reconstruit le château en 1603 et à cette date fut nommé marquis de la Charce par Louis XIII. Par l'alliance de la fille de César le fit passer  à Julien de Pons. Jean-François de Julien de Pons capitaine des armées de Napoléon  Bonaparte le restaura  à son retour des campagnes d'Italie le vendit en 1818 à Jean-Etienne Murjas, dont la fille fit édifier, en mémoire de ses parents, une crypte surmontée dune magnifique chapelle dut au grand architecte nîmois Feuchères. Un véritable chef-doeuvre de style néo-baroque. Revendu depuis le dernier acquéreur monsieur Jean Cadini transforma le domaine en exploitation agricole et le passa à son gendre monsieur Chauve.","architecture":"Rodilhan, château dorigine XIe siècle, à subit  en 1496 et en 1439 des dégâts par les armées de Gascogne et fut presque détruit par les calvinistes et les catholiques, reconstruit au début du XVIIe siècle, de style italien;  tour carrée, parc, chapelle du XIXe siècle baroque dans le parc du château. Cet édifice, en plein coeur du village, doté dun magnifique parc où les arbres centenaires ombragent des allées plaisantes.","habitants":"Famille de César de la Tour du Pin\r\n        \"","divers":"Château de Rodilhan","gps":"","images":["../image/image_30/30_Rodilhan_1.jpg"]},"Consult_chateau_formulaire5f62":{"id":"Consult_chateau_formulaire5f62","dept":"30","canton":"Le Vigan","commune":"Rogues","nom":"Rogues","type":"Château","periode":"XII","histoire":"Deux châteaux à Rogues, Madières  du XIIe siècle et de Rogues du XIIe siècle.                                                                          MADIERES, possession de la famille de Madières arrière fief  du baron d'Hierle, en 1250 passa par alliance de sa fille avec Raymond de Ginestous, cette dernière le posséda jusqu'en 1887, à l'abandon,  acheté par l'EDF avec toute la vallée par la société des eaux de La Vis, il était en ruine lord de l'achat en 1982 par la famille  Brucy  depuis 2002 devient la propriété d'Evelyne et Christian Raspati suite à la mort de monsieur Brucy  pour en faire un hôtel restaurant.                                                                    ROGUES, fief de la famille de Rogues au XIe siècle, passa au XVIIe  siècle aux Ginestous qui était encore les seigneurs à la Révolution lors de l'incendie du château, restauré en 1802, racheté en 1948 par les Saporta de la Mogère qui le remirent en état et fut acheté en 1961 par le docteur André Bédrines père du propriétaire actuel. Aujourd'hui transformé en hôtel restaurant par Jean-Louis Portales.","architecture":"Madières, qui fut construit aux XIIe et XIIIe siècles accroché à flan de montagne puis remanié au XVIIIe siècle, est  un  quadrilatère flanqué de trois corps de logis et de deux tours rondes, de plan en U  à deux niveaux sur rez de chaussée, et une échauguette avec façade Renaissance au-dessus d'un à-pic et les ruines de l'ancien château sur la colline dominant Madières, galerie voûtée avec arcades bien restaurées. Au dessus du portail d'entrée, bretèche qui défendait l'ancien pont-levis,  il subsiste des pans de murs, une citerne, une grande salle et une cheminée.                             Rogues, construit au XVIIe siècle de plan carré flanqué au angle  de base d'échauguette et  surmontée d'une partie sur élevée carrée au milieu de la façade, une bretèche  au-dessus de la porte d'entrée.","habitants":"Famille de Madières                                                                            Famille de Rogues\r\n        \"","divers":"Château de Rogues et de Madières","gps":"","images":["../image/image_30/30_Rogues_1.jpg","../image/image_30/30_Rogues_2.jpg","../image/image_30/30_Rogues_3.jpg","../image/image_30/30_Rogues_4.jpg"]},"Consult_chateau_formulaire84e7":{"id":"Consult_chateau_formulaire84e7","dept":"30","canton":"Pont St-Esprit","commune":"La Roque sur Cèze","nom":"Roque_Ceze","type":"Vestiges","periode":"XII","histoire":"ROQUE SUR CEZE, près de la vallée du Rhône, au début de 1382, les truchins campèrent dans les gorges de la Cèze où ils furent rejoints par des nobles dont Régis de Saint-Michel-d'Euzet, Étienne Augier, dit Ferragut du Pin, Vachon de Pont-Saint-Esprit et Verchère de Vénéjan qui prirent leur tête. Ils semparèrent alors de Cavillargues, Chusclan et Tresques, avant de piller les châteaux de Sabran, La Roque-sur-Cèze, Saint-Laurent-des-Arbres et Cornillon. Dans ce dernier château se trouvait le trésor de Clément VI. Son neveu, Guillaume III Roger de Beaufort, alors lieutenant des armes du Sénéchal de Beaucaire, organisa la répression. En septembre 1382, il recruta des mercenaires et fit venir une compagnie darbalétriers dAvignon. Ses troupes cantonnées à Bagnols-sur-Cèze attaquèrent alors Cornillon. Dirigées par Gantonnet d'Abzac, commandant du Saint-Père pour le Païs de Saint-Esprit, elles semèrent la terreur. Guillaume III fit ensuite intervenir son capitaine des gardes de Bagnols, Jean Coq, ce dernier réussit à pacifier le pays en expulsant les chefs du truchinat. Ce qui permit de signer la paix en février 1383. Au XIVe siècle le château appartient aux Sabran, aux Nicolaï et à la famille Gorzeles derniers habitants, abandonné servit de carrière, monsieur Creuzevault beau-père de l'actuel propriétaire l'acquit en 1965 et monsieur Fagot continu la restauration.","architecture":"La Roque-sur-Cèze, le château, qui date du XIIe siècle fut construite sur un piton rocheux afin d'assurer sa sécurité. La partie la plus ancienne se trouve entre le château et les tours de fortifications. Le corps de logis qui était autrefois relié à d'autre bâtiment aujourd'hui en ruines il est accolé à une tour munie de deux échauguettes. \r\nLe château fut brûlé en 1573 par les huguenots et fut abandonné à la fin de XIXe siècle. La chapelle romane qu'il possède a été vendue par la commune en 1955. le château avait pour objectif de surveillé le pont de l'époque médiévale  qui enjambe la Cèze et qui est parfois abusivement dénommé \"Pont Charles Martel\".","habitants":"Famille Gorzeles\r\n        \"","divers":"Vestiges du château de la Roque","gps":"","images":["../image/image_30/30_Roque_Ceze_1.jpg","../image/image_30/30_Roque_Ceze_2.jpg","../image/image_30/30_Roque_Ceze_3.jpg","../image/image_30/30_Roque_Ceze_4.jpg","../image/image_30/30_Roque_Ceze_5.jpg"]},"Consult_chateau_formulaire42cb":{"id":"Consult_chateau_formulaire42cb","dept":"30","canton":"Le Vigan","commune":"Roquedur","nom":"Roquedur","type":"Château-Vestiges","periode":"XII-XVII","histoire":"ROQUEDUR, au Moyen-Age, le château de Roquedur entre par alliance dans la maison de Ginestous. Lors de la croisade contre les Albigeois, l'agglomération fortifiée établie autour du rocher de Roquedur, le castrum, voit ses défenses ruinées sur ordre du roi de France. Le baron d'Hierle y demeure quelque temps avant de pouvoir aller s'établir à Aulas. En 1654, Christophe de Montfaucon, baron de Vissec, baron d'Hierle, cède pour raisons financières la terre de Roquedur à Daniel de Montcalm. En 1628, le château est démantelé sur ordre du duc de Rohan, le pont-levis est détruit et cinq tours sont arasées. Il faut attendre 1703 pour que la forteresse soit sommairement restaurée. Elle passe par mariage dans la famille dAssas-Montdardier. Toutefois, elle est à nouveau saccagée et incendiée par une bande de pillards en 1792. Lensemble reste dans un relatif abandon jusquen 1859, Fernand de Ginestous rachète à son cousin le marquis dAssas les vestiges qui ne sont plus quun corps de ferme. Il confie à larchitecte Eugène Viollet-le-Duc lédification sur les bases subsistantes dune nouvelle demeure. Cette dernière est achevée en 1871.","architecture":"Ruines du château des Pauses du Xe siècle, détruit au XIVe siècle, château du XVe siècle, remanié au XVIIIe siècle, réaménagé au XIXe siècle.","habitants":"Famille des Ginestous\r\n        \"","divers":"Château de Roquedur","gps":"","images":["../image/image_30/30_Roquedur_1.jpg","../image/image_30/30_Roquedur_2.jpg","../image/image_30/30_Roquedur_3.jpg","../image/image_30/30_Roquedur_4.jpg"]},"Consult_chateau_formulaireddf4-2":{"id":"Consult_chateau_formulaireddf4-2","dept":"30","canton":"Roquemaure","commune":"Roquemaure","nom":"Roquemaure_30","type":"Château-Vestiges","periode":"XII-XVII","histoire":"Trois châteaux à Roquemaure dont  Roquemaure, château de Truel du XIIe siècle et de Clary du XVIIIe siècle.                      ROQUEMAURE, fief de comte de Toulouse qui le passa au pape Innocent III lors de la soumission, passa à la couronne de France,  ville royale, au château un gouverneur avec une importante garnison, au XIVe et XVe siècles, un pape, des rois et des ducs de France sinstallent  au château. Le pape Clément V y meurt en 1314. Le duc dAnjou, lieutenant du roi en Languedoc, y fait des séjours répétés de 1367 à 1380 accompagné de son épouse, la duchesse Marie de Blois. En 1376, il y vient avec Catherine de Sienne. En 1385, le duc de Berry, lieutenant du Languedoc, convie au château une ambassade de Hongrie. Le roi Charles VI y fait étape en octobre 1389. Enfin, le dauphin Charles, futur roi Charles VII, sarrête à Roquemaure. En 1562 le château et la baronnie passe  à Guillaume comte de Joyeuse, puis par alliance aux de Guise et aux Harcourt. En 1564 Charles IX accompagné de Catherine de Médicis  et en 1642 Richelieu convoyant Cinq-Mars y fit halte.  Louis-Philippe de Noailles propriétaire à la Révolution ne survécut pas, le château fut démantelé et vendu en 1795 en lots. \r\nTRUEL,  au sud du village  château du XVIIe siècle sur un site des Templiers, il a appartenu au XVIIIe siècle au marquis de Montlaur puis à la famille d'Hugues et a maître Coupon avocat d'Avignon qui le revendit en 1993 à monsieur de Quinqueran de Beaujeu.\r\nCLARY, en 1775 marque la naissance du domaine de Clary, propriété de Marie-Joseph-Emmanuel de Guignard, vicomte de Saint-Priest. En 1792 La vocation agricole du domaine saffirma très rapidement. Après une période de transition de la fin du XVIIIe siècle et du début du XIXe siècle, une riche famille de négociant lyonnais et  darmateur marseillais, la famille Richard, va se succéder pendant 75 ans à la tête du domaine.","architecture":"Roquemaure, dès le XIIe siècle, le château de Roquemaure était un des plus importants du Languedoc. Donjon et enceinte percée d'archères dans laquelle on pénètre  par une porte à arc brisé ouverte dans une tour semi-circulaire, de plan rectangulaire, était protégé par sept tours dont-il reste la tour carrée  dit des Carthaginois du XIIe siècle, Il ne reste aujourdhui que quelques vestiges des murs denceinte, une tour circulaire dite « Tour de la reine » et une haute tour carré appelée « la tour des princes de Soubise », mais à la fin du XVIe siècle sa détérioration est amorcée et se poursuit en trois étapes échelonnées sur deux siècles. En 1590-1591, un siège détruit sa façade méridionale; en 1671, sur ordonnance royale, lîle du château est annexée à la ville, enfin de 1795 à 1850 le château et son rocher, sont vendus à titre de bien national et utilisés comme carrière de pierre et disparais.                   Truel  domaine clôturé de murs avec un portail sur chaque côté, le bâtiment rectangulaire à trois niveaux.                                              Clary est représentatif de ce que pouvait être un grand domaine agricole au XIXe siècle, le domaine, malgré des remaniements fonciers sensibles, a gardé une intégrité avec une surface denviron 200 ha, sur laquelle on peut voir encore toutes les empreintes de son évolution depuis le XVIIIe siècle. La partie bâtie affiche un potentiel architectural  de la fin du XVIIIe siècle. Lampleur des dépendances, les traces de nombreuses activités représentent un potentiel ethnique important. Les abords, marqués par linfluence paysagère du XIXe siècle, diffusent une délicieuse ambiance romantique. Néanmoins, larchitecture  des abords  reste à redécouvrir: le système dalimentation  de la cascade de rocaille, les circulations enfouies sous la végétation, le bosquet  de cèdres au Sud de la partie bâtie, ajouteront sans doute à lintérêt paysager déjà avéré du site.","habitants":"Guillaume comte de Joyeuse                                                                 Famille d'Hugues                                                                            Famille Richard\r\n        \r\n        \"","divers":"Vestiges du château fort de Roquemaure, château de Clery et de Truel","gps":"","images":["../image/image_30/30_Roquemaure_30_1.jpg","../image/image_30/30_Roquemaure_30_2.jpg","../image/image_30/30_Roquemaure_30_3.jpg","../image/image_30/30_Roquemaure_30_4.jpg","../image/image_30/30_Roquemaure_30_5.jpg","../image/image_30/30_Roquemaure_30_6.jpg","../image/image_30/30_Roquemaure_30_7.jpg","../image/image_30/30_Roquemaure_30_8.jpg"]},"Consult_chateau_formulaireb90e":{"id":"Consult_chateau_formulaireb90e","dept":"30","canton":"Rousson","commune":"Rousson","nom":"Rousson","type":"Maison forte","periode":"XV","histoire":"ROUSSON, seigneurie de Rousson fief des Rochemore d'Aigremont Il fut incendié en 1241 par Pierre dAthiès, sénéchal de Beaucaire, amoureux de la Baronne Alaïs de Rousson qui trouva là un moyen simple de se venger de la belle qui ne voulait pas céder à ses avances. Ils fut acquit par les dAgulhac de Beaumefort qui en était propriétaire en 1588 Jacques d'Agulhac de Beaumefort  baron de Rousson  était baillis et gouverneur du comté dAlais fit construire le château.  Le 8 Juin 1629 Le Roy Louis XIII, accompagné du cardinal de Richelieu  signa lEdit de Tolérance ou paix dAlès qui vint confirmer lédit de Nantes signé par Henri IV en 1598. A loccasion de cette signature, le cardinal de Richelieu coucha au château de Rousson, seul témoin encore debout aujourdhui de cette époque troublée. En 1740 une descendante directe de la famille dAgulhac épousa Claude de Romiaux de Milanie de Lédenon, leur fille Blanche  déshéritée par ses parents et enfermée dans un couvent pour lempêcher dépouser lhomme quelle aimait elle mourut en  1785. Le château par héritage fut légué  à la nièce  de son mari Elisabeth Noyon  mariée à monsieur Duclaux  de Farelle qui arriva à protéger le château pendant la Révolution, seulement tours arasées, leur fille Sophie Duclaux de Farelle hérite et le transmet  à la famille de Bary, avec laquelle son mari monsieur Chambon de Vans est allié. Aujourdhui, Brigitte et Dominique de Cabissole reprennent le flambeau et fidèles à leurs ancêtres,  ils continuent  dentretenir leur demeure et partagent volontiers leur passion de lart, des jardins et de lolivier.","architecture":"Rousson,  le château primitif abandonné en 1588 en faveur d'une nouvelle construction de 1611 et 1615, surplombant  le hameau de Trouillas au nord ouest de Salindres. Demeure  style Louis XIII,   bastide du XVIIe siècle, quadrilatère à trois corps de logis à trois niveaux flanqué de quatre tours rondes au angles conservée dans son état original fermeture de la cour intérieure par un mur reliant les deux tours. Remarquable par son histoire et son implication dans les guerres de religion, par son architecture de maison forte de style défensif avec ses quatre tours et ses meurtrières et par son mobilier d'époque XVIIe et XVIIIe siècle. En dehors de laspect défensif, le château a également été conçu pour être une demeure dhabitation agréable.","habitants":"Famille d'Agulhac de Beaumefort \r\n        \"","divers":"maison forte de Rousson et le mas Evèque","gps":"","images":["../image/image_30/30_Rousson_1.jpg","../image/image_30/30_Rousson_2.jpg","../image/image_30/30_Rousson_3.jpg","../image/image_30/30_Rousson_4.jpg","../image/image_30/30_Rousson_5.jpg","../image/image_30/30_Rousson_6.jpg","../image/image_30/30_Rousson_7.jpg"]},"Consult_chateau_formulairead07":{"id":"Consult_chateau_formulairead07","dept":"30","canton":"Calvisson","commune":"La Rouvière","nom":"Rouviere","type":"Château","periode":"XVI","histoire":"LA-ROUVIERE, au XIIe siècle fief des évêques d'Uzès, on trouve Bermond de Sauve, seigneur de La Rouvière en 1237. Bertrand de Sauve, de 1391 à 1426 et son fils Jacques de Deaux de 1437 à 1439. La seigneurie de La Rouvière passe entièrement, par succession, dans la famille de Montlaur de Murles au cours des années en 1465 passa à Jean de Montlaur seigneur de Murlhes,  en 1555, le quatrième Jean de Montlaur (mineur de 23 ans) est contraint de vendre aux enchères sa seigneurie de La Rouvière, maître Robert le Blanc l'acquit en 1556, il finit ses jours en 1578. Pierre Le Blanc, son fils et successeur, protestant, aura 9 enfants. Il meurt le 1er octobre 1599 à 36 ans étant premier consul de Nîmes en charge. La Rouvière fut habité par le duc d'Uzès Jacques de Crussol, passa par alliance de Anne le Blanc à François-Annibal de Rochemore en 1681 devenue veuve, vendit le château à André Chambon en 1738. Après la Révolution en 1806 les héritiers Chambon  morcellent le domaine mais toujours dans cette famille.","architecture":"La Rouvière construit sur un éperon rocheux dominant les vallons de deux rivières, reconstruit au XVIe siècle, agrandit au XIXe siècle,  quadrilatère, trois corps de logis, une cour avec un puits, sur la façade Est  les mâchicoulis sur contreforts et à arcades brisées soutenaient le chemin de ronde, la façade Nord de lédifice, deux fenêtres à meneaux.   il est entouré de pavillons remodelés dans le style Renaissance avec attique; sy trouve aussi un grand escalier à balustres édifié en 1655 à lemplacement de la poterne que nous navons pu apercevoir en raison du morcellement de propriété effectué en 1806, ses arcades sur la cour ayant dû être murées. La grande tour et sa fente de tir, ainsi que la façade du corps de logis ouest, pourvue, elle aussi, de mâchicoulis à arcades.","habitants":"Famille de Pierre Le Blanc\r\n        \"","divers":"Château de la Rouvière","gps":"","images":["../image/image_30/30_Rouviere_1.jpg","../image/image_30/30_Rouviere_2.jpg","../image/image_30/30_Rouviere_3.jpg"]},"Consult_chateau_formulaire02b3":{"id":"Consult_chateau_formulaire02b3","dept":"30","canton":"Quissac","commune":"Quissac","nom":"Sabatier","type":"Château","periode":"XVIII","histoire":"SABATIER, Quissac était le fief des barons  de Sauve qui y firent construire un château qui changea souvent de propriétaires au cour des ans, passa à la famille Fons magistrat protestant à Nîmes à sa mort en 1657 laissa le domaine à son fils Louis qui le vendit  en 1660 à la famille Rivet armateur deviennent seigneurs et acquirent les châteaux  de Cauviac et de Vibrac. Au XVIIIe siècle  David Rivet remania le château et créa un système d'irrigation avec  la théorie d'Arthur Young, la famille Rivet garda le domaine jusqu'au XXe siècle. Aujourd'hui, une société civile immobilière a été créée le 12 octobre 1987 par monsieur Michel Bremond.","architecture":"Château de Sabatier, domaine d'origine médiéval remanié au XVIIIe siècle; superbe et monumentale grille d'entrée, chef d'uvre de ferronnerie d'époque Louis XVI; présence d'un gracieux petit campanile, au milieu XVIIIe siècle en fer forgé ouvragé, abritant une cloche des heures de la même époque sur l'une des tours. Un bâtiment central à trois niveaux à pavillon entre deux tours rondes et ailes latérales elles mêmes prolongées de deux avancées en équerres se terminant sur la façade  postérieure par deux tours  d'angle, aux angles de la cour deux pigeonniers.                                   Dans la commune de Quissac un temple avec support d'un fronton triangulaire par des colonnes de style Toscanne.","habitants":"Famille Fons\r\n        \"","divers":"Château de Sabatier et le temple","gps":"","images":["../image/image_30/30_Sabatier_1.jpg","../image/image_30/30_Sabatier_2.jpg"]},"Consult_chateau_formulaired18e":{"id":"Consult_chateau_formulaired18e","dept":"30","canton":"Bagnols sur Cèze","commune":"Sabran","nom":"Sabran","type":"Château","periode":"XII-XVI","histoire":"Deux châteaux à Sabran, celui de Boussargues du XVIe siècle et celui de Sabran de XIIe siècle.                                              BOUSSARGUES, le domaine fut donné aux Templiers par le comte de Sabran. Appartenait au XIVe siècle aux Aigalliers et aux de Banne puis  vendu en 1434 par Jean Henricy à Thomas Albert viguier de Pont St-Esprit,  la descendance gardera le domaine jusqu'au XVIe siècle. Les Voguë l'acquérir et le revendirent en 1637 à Claude de Pelloux dame de la Roque sur Cèze, sa descendance  François de Vallat de Saint-Romain baron de la Roque le revendit en 1781 à Marie-Anne  Cadolle de Voguë marquise de Montclus, qui le revend à monsieur Fraisse et de nouveau à monsieur Constant toujours dans la descendance de la famille de madame Malabre-Constant exploitant viticole.                                           SABRAN, cité en 1156  Les barons de Sabran, seigneurs mineurs, rendent hommage et reconnaissance aux évêques d'Uzès seigneurs de toute la Sabranenque. Sabranet (1208), Rostang(1228), Pierre de Sabran (1262), Anne de Montcamp (1603), Joseph de Nicolay (1714). Fief des seigneurs de Sabran dépendait du duché d'Uzès, il fut partager entre les frères Combes en 1510 , le domaine de Sabran échut  à Cathelin dont la moitié de Sabran fut aliénée en 1602 à Pierre Augier prévôt du Languedoc, suite à un procès par Anne de Montcalm la baronnie fut laissée au seigneurs de Montclus.                                                         MONTCAUD, pas d'historique du XIXe siècle, \"Relais et Château\".","architecture":"Boussargues, de plan rectangulaire murs d'enceinte et chemin de ronde et trois tours rondes crénelées, deux corps de logis en équerre reliant le donjon qui était autrefois plus haut et crénelé pour la surveillance de la vallée de la Tave.                                              Sabran, vestiges du château dont il reste que la tour Sainte-Agathe ruinée et quelques pans de murs.                                                                             Montcaud, de style Napoléon III  corps de logis à trois niveaux rectangulaire à toitures légèrement inclinée, flanqué de deux avancées sur les côtés  avec fronton au niveau du toit.","habitants":"Famille d'Aigalliers\r\n        \"","divers":"Vestiges du château de Sabran, château de Boussargues et de Montcaud.","gps":"","images":["../image/image_30/30_Sabran_1.jpg","../image/image_30/30_Sabran_2.jpg","../image/image_30/30_Sabran_3.jpg","../image/image_30/30_Sabran_4.jpg","../image/image_30/30_Sabran_5.jpg","../image/image_30/30_Sabran_6.jpg","../image/image_30/30_Sabran_7.jpg","../image/image_30/30_Sabran_8.jpg"]},"Consult_chateau_formulaire47d9":{"id":"Consult_chateau_formulaire47d9","dept":"30","canton":"Alès","commune":"Salindres","nom":"Salindres","type":"Tour Château","periode":"XII","histoire":"SALINDRES, à la fin du XIIe siècle, construit par les Templiers, un profond bouleversement architectural permettra limplantation dune famille chevaleresque du nom de Becamil.\r\nLa maison forte de Becamil deviendra le berceau du trentième évêque dUzès, Pons de Becamil (mort en 1249). Habitée jusquau XIIe siècle elle deviendra une métairie. Bernard Pellet d'Alais seigneur d'Alès la possédait au XIIIe siècle sous la suzeraineté de l'évêque de Pons de Becamil. Denis de Becli décéda en 1341 laissant deux filles dont l'une épousa Foulques de Caussargues, la tour resta dans cette famille jusqu'à la fin du XVIe siècle et la vende à Georges de Cambis baron d'Alès succédé par les Isnards.","architecture":"Donjon et ruines du  château fort  de Becamel ( Becamil) construit en 1145 par l'ordre des Templiers, solidement implanté sur une esplanade (215m) laustère et sobre donjon de Becamel, ancienne tour à signaux, dont limplantation remonterait au début du XIIe siècle, conserve une partie de ses mystères. Il y avait un mas accolé à la tour actuellement une cour carrée fermée par  des murs avec une entrée principale.","habitants":"Famille de Becamil\r\n        \"","divers":"Tour du château de Becamel","gps":"","images":["../image/image_30/30_Salindres_1.jpg","../image/image_30/30_Salindres_2.jpg","../image/image_30/30_Salindres_3.jpg"]},"Consult_chateau_formulairebb11":{"id":"Consult_chateau_formulairebb11","dept":"30","canton":"Calvisson","commune":"Salinelles","nom":"Salinelles","type":"Château","periode":"XII-XVII","histoire":"Cinq châteaux à Salinelles, du Bru, de Clotte, de Montredon, de Salinelles et Vila.                                                                            SALINELLES, fief de Jean de Brun seigneur de Salinelles et de Russas au XVIIe siècle, Jean Guillot  seigneur du Fesq et directeur de la monnaie l'achète  en 1720, suite à sa faillite, le château est transmit par le roi à Jean de Salles. Après une période d'abandon en 1763 il est acquit  par un riche négociant David-Etienne Meynier.  Mis à sac à la Révolution,  les biens sont remis au fermier Pierre Goubert et ensuite rendu à la famille Meynier, utilisé en 1943 par l'état major allemand, puis ensuite acheté par la commune pour le louer à un restaurateur.                            BRU, château  dont-il resté  au début du XIXe siècle des vestiges en cours de restauration, il appartenait en 1781 à la famille Pieyre, le fils de David Meynier  vécu dans ce château dont-il en était propriétaire.                                                                                     CLOTTE; en 1432, mas appartenant à Pierre de Ganges, Les Mouton de la Motte acquirent au XVIIIe siècle le château d'Assas dans l'Hérault et y habitèrent jusqu'à la Révolution, le château de la Clotte a appartenait à la famille de Montlaur et à la fin du XIXe siècle passe par alliance  au vicomte  de Saint-Geniès qui épousa  Geneviève de Villardi de Montlaur et en 1922 monsieur Rousset l'acheta, et en 1993 c'est monsieur Pagès industriel de Sommières qui le racheta pour  le restaurer.                                                           MONTREDON, fief des Montredon au XIIe siècle, baronnie sous la suzeraineté  de Guilhem de  Montpellier, suite aux conflits le château fut démantelé et en 1229 passa au royaume Royal.  Sous Louis XV fut échangé avec le comte d'Eu puis acquis par le président de Montglas et depuis quelques années, il fut racheté par monsieur Martin Granel architecte.                                                       VILA, fief des Pondres, au XVIIe siècle Antoine de Crouzet  seigneur de Pondres et de Villa  puis passa aux d'Urre,  au XIXe siècle puis par des fermiers qui l'abandonnèrent et en 1948,  il fut acheté par monsieur Grimaud à monsieur Pécaud propriétaire de Pondres.","architecture":"Salinelles, construit au XVIIe siècle en plein village, corps de logis à deux niveaux surmonté d'un pavillon carré appelé la tour percé de chaque côté utilisé comme tour de guet, une tourelle d'angle côté jardin cour d'honneur fermé par un portail et grille.                 Clotte,  château incendié à la Révolution puis transformé en ferme  et remanié, double corps de logis rectangulaire à deux niveaux et attiques, entrée par un escalier et une porte surmonté d'un fronton et terrasse à balustrade sur l'autre partie, escalier à vis dans la partie ancienne.                                                                                       Bru; il ne reste de ce château qu'une partie d'une tour ronde et d'un corps de bâtiment carrée.                                                                 Montredon, sur un mont  se dresse les ruines du château qui fut longtemps abandonné, il ne reste que des murs  en pierres sèches.                      Villa, manoir du XVIIe siècle, trois corps de logis à différents niveaux avec fenêtres à meneaux, une cour d'honneur fermée par un mur d'enceinte,  une tourelle d'escalier sur trompe d'angle, canonnières et couleuvrines.","habitants":"Famille de Guilhem de  Montpellier                                                     Famille de  Pierre de Ganges\r\n        \"","divers":"Château de Salinelles, de Clotte, de Bru, de Vila et vestiges de Montredon.","gps":"","images":["../image/image_30/30_Salinelles_1.jpg","../image/image_30/30_Salinelles_2.jpg","../image/image_30/30_Salinelles_3.jpg","../image/image_30/30_Salinelles_4.jpg","../image/image_30/30_Salinelles_5.jpg","../image/image_30/30_Salinelles_6.jpg","../image/image_30/30_Salinelles_7.jpg","../image/image_30/30_Salinelles_8.jpg"]},"Consult_chateau_formulairedeb2":{"id":"Consult_chateau_formulairedeb2","dept":"30","canton":"La Grand-Combe","commune":"Les Salles du Gardon","nom":"Salles_Gardon","type":"Château","periode":"XIII-XIV","histoire":"Deux châteaux à les Salles du Gardon; La Tour du XIIIe siècle et Favède du XIVe siècle.                                                                         La TOUR  hameau de la Tour, au XIIIe siècle dépendait du diocèse d'Uzès, au XIVe siècle fief de Sibylle de la Tour,  puis des Fontanilles qui l'apporta par alliance à Jean de Montclar,  leur fille à son second mari Guillaume de la Fare qui gardèrent ce domaine jusqu'au XIXe siècle, il fut acquis en 1972 par monsieur Bernhard Von  Hünerbein. Le château de la Tour présumé du XIe ou XVe siècle appartenait en 1660 à un marquis du château de La Fare. Le dernier chapelain de la Tour fût, sans doute, l'Abbé de Mandajors, chanoine d'Alais et plus tard Prieur Royal de La Canourgue en 1749.    \r\nFAVEDE, en 1688 Benjamin Ribot, sieur du Plan, laïc né dans une famille protestante vit le jour au château de la Favède. Après une éducation militaire il se consacra au soutien et à la propagation de la foi protestante. A partir de 1710 il rencontra des prophètes, soutint les inspirés et, à partir de 1715, il travailla avec Antoine Court à la restauration de l'église. En 1725 il fut nommé député général des synodes auprès des puissances protestantes. Il mourut exilé à Londres en 1763. Site enchanteur du XIVe siècle, que celui du château de la Favède ou  les Duvals sont aujourd'hui les occupants qui l'on transformé en hôtel.","architecture":"Château de la Tour, les maigres descriptions disponibles sur ce château font état d'un château médiéval qui surplombe la belle vallée du Gardon au pied des Cévennes. Il est composé d'un rez-de-chaussée indépendant servant d'entrée et donnant sur un jardin. Le château fait partie d'un ensemble historique composé du château XIVe siècle, La tour du XIIIe siècle perché sur un éperon dominant la vallée du Gardon, de forme rectangulaire à deux niveaux encadré de deux tours rondes arasées toitures en chapeau asiatique. A gardé son allure malgré l'abandon et l'utilisation en exploitation agricole.   Plus haut une tour qui à donné son nom au hameau et au château  tour  de plan Barlong. chapelle Romane du XIe siècle, tour à signaux  du XIIIe siècle.\r\nFavède, du XIVe siècle corps de logis rectangulaire à trois niveaux toitures deux pans deux tours carrées aux angles  dont-une plus petite les deux inférieures aux toits et tourelles à l'arrière de la bâtisse font partie de l'une des nombreuses caves, cinq souterrains, aujourd'hui fermés, reliaient le château aux bâtisses fortifiées environnantes. Ils étaient un moyen de communication sécurisé et de protection contre les catholiques.","habitants":"Fief de Sibylle de la Tour,                                                                         Famille de Benjamin Ribot\r\n        \"","divers":"Vestiges de l'ancien château (la tour) nouveau château de la Tour, château de Favède et vestiges du château de Soustelles.","gps":"","images":["../image/image_30/30_Salles_Gardon_1.jpg","../image/image_30/30_Salles_Gardon_2.jpg","../image/image_30/30_Salles_Gardon_3.jpg","../image/image_30/30_Salles_Gardon_4.jpg","../image/image_30/30_Salles_Gardon_5.jpg","../image/image_30/30_Salles_Gardon_6.jpg","../image/image_30/30_Salles_Gardon_7.jpg"]},"Consult_chateau_formulairef24d":{"id":"Consult_chateau_formulairef24d","dept":"30","canton":"Uzès","commune":"Sanilhac-Sagriès","nom":"Sanilhac","type":"Château","periode":"XIII","histoire":"SANILHAC, Sagriès distant de 3 km fut rattaché à Sanilhac en 1814. fief d'Arnaud de la Balme et Rostang en 1240, et en 1340 Raymond de la Balme, aux XVIe siècle Simone de la Balme le fit passer par alliance à Guillaume d'Auriac. Au XVIIe siècle l'évêque Nicolas de Grillet vend sa part de seigneurie au sieur de Brignon toujours par alliance passa à Gui de Grisols et les Raimond de Brignon. Passa ensuite au Audibert de Lussan, puis aux ducs de Melfort  et en 1749 aux  Massureau de Marsilian, président, d'une ancienne famille de parlementaires de Montpellier,  transformé en maison de repos après sa reconstruction, en 1962 collège des Garrigues à sa fermeture en 1992 acheté par monsieur Bédrines.","architecture":"Sanilhac, son histoire fut particulièrement mouvementée au cours des événements de l'histoire, puisque, par deux fois incendié, il dut traverser les épreuves des guerres de religion, des camisards, et de la Révolution. Bâti au début du XIIe siècle autour dun château et entouré de remparts, Sanilhac était protégé par trois tours. De ces constructions il ne reste quune tour de défense la « Tourasse », ainsi que le donjon roman du château du XIIIe siècle, et au XVIIIe siècle construction du château  façade classique, sur la commune de Sanilhac-Sagriès. Il est aujourdhui une des trois salles de vente de létude de Provence, et accueille régulièrement des ventes dobjets et de meubles anciens ainsi que des événements culturels et festifs.  Il conserve encore de remarquables éléments darchitecture, dont ses anciennes salles basses à triple croisées dogives, dites salles capitulaires, qui servirent déglise paroissiale durant les guerres de religion, puis doffice par lajout plus tardif dune monumentale cheminée en pierre dépoque du  XVe siècle.","habitants":"Fief d'Arnaud de la Balme \r\n        \"","divers":"Tour de Sanilhac et son château","gps":"","images":["../image/image_30/30_Sanilhac_1.jpg","../image/image_30/30_Sanilhac_2.jpg","../image/image_30/30_Sanilhac_3.jpg","../image/image_30/30_Sanilhac_4.jpg","../image/image_30/30_Sanilhac_5.jpg"]},"Consult_chateau_formulaire3acf":{"id":"Consult_chateau_formulaire3acf","dept":"30","canton":"Quissac","commune":"Sardan","nom":"Sardan","type":"Château","periode":"XVIII","histoire":"SARDAN, très peu de données historiques sont disponibles sur la commune de Sardan. La première trace du village remonte à 1609, les archives mentionnant la « communauté de Gailhan et Sardan ». Sardan devient une commune à part entière à la Révolution. Elle devient autonome religieusement dans les années 1840, cest alors quune église est construite.","architecture":"Le château de Sardan construit au XVIIIe siècle, et agrandi au XIXe siècle. Une pièce du rez de chaussée a été décorée d'un papier peint panoramique représentant les campagnes de Bonaparte en Italie. Papier peint réalisé par la fabrique Dufour en 1829. Elle compte un monument classé; le château de Sardan, protégé pour ses papiers peints anciens, même sil sagit dun décor intérieur, lédifice apparaît dans la liste des monuments protégés, il conviendra donc de préciser la réglementation en vigueur, et la soumission ou non des travaux à lavis de larchitecte des bâtiments de France au titre des abords.","habitants":"Famille de Sardan\r\n        \"","divers":"Château de Sardan","gps":"","images":["../image/image_30/30_Sardan_1.jpg"]},"Consult_chateau_formulaire0979":{"id":"Consult_chateau_formulaire0979","dept":"30","canton":"Le Vigan","commune":"Saint-Martin-de-Coronac","nom":"Saumane","type":"Château","periode":"XV","histoire":"CASTELLAS, des sources anciennes font état de l'existence du Castelas mentionné en 1257, aujourd'hui disparu, surplombant le plan du Verdier et la Pradelle, sur le chemin de la Bécédelle. Un vestige du château appelé la Tourasse existait encore pendant l'aménagement des chemins par Basville. Ses matériaux ont été réemployés dans l'environnement proche.                                                    HOM,  au XVe siècle fief d'Agnès d'Auriac, héritière de Guillaume Delhom damoiseau, passa à Jean le Mengre. Guillaume d'Auriac en hérite et par alliance de sa fille à Gui de Grisols, le château revient au frère de Guillaume, Antoine dont sa fille hérite de l'Hom, Armand de Bozène son mari et seigneur d'Arboras s'y installa se fit assassiner, sa veuve se remarie avec Jean de Rozel de Nimes, cette famille gardera le château jusqu'au XVIIIe siècle.  Marc de Gally d'Aurtiac neveu de Marguerite de Rozel le vendit en 1767 à Louis Manoël seigneur de Gravières. Devenu propriété de la ville de Nimes un centre de villégiature de l'enfance ouvrière y fut ouvert et aujourd'hui fait parti du camping de monsieur Tapis.                   PRADELLE, pas d'information historique.                              VALESCURE, il aurait été édifié par la famille des Valescure qui restèrent fidèles au duc de Rohan pendant les campagnes de 1621-29. Dans une époque récente, les maquisards de la dernière guerre y trouvèrent refuge.","architecture":"St-Martin-de-Corconac, le Castelas  au-dessus de l'église, se dresse le château de St-Martin de Corconac, apparemment du début du XVIIe siècle, remanié au XVIIIe. l'Hom, dans un méandre recoupé du Gardon, remonterait au XIVe siècle, grosse bâtisse rectangulaire à trois niveaux  avec dans l'angle ouest une tour ronde arasée à hauteur du toit, le mur nord-ouest porte un pavillon carrée de six mètres de large, la façade sud-ouest  ou se trouve l'entrée est percée de six fenêtres à meneaux dont une surmontée d'un larmier.                                                                                          Bussas, en aval des gorges du Soucy, se niche une grosse bâtisse appelée Saumane, l'antique château du Castellas, devenu la Tourasse ne possède plus que les assises d'une tour carrée.\r\n la Pradelle, dans un vaste terrain plat, est composé d'un ensemble de bâtiments, actuellement occupé par un C.A.T. qui y développe des activités agricoles et des hébergements, la bâtisse principale est flanquée d'une tour carrée coiffée d'un toit en pyramide, dit en queue de paon, recouvert de céramique d'Anduze.","habitants":"Famille de Guillaume Delhom                                                                   Famille des Valescure\r\n        \"","divers":"Château de l'Hom et de Pradelles","gps":"","images":["../image/image_30/30_Saumane_1.jpg","../image/image_30/30_Saumane_2.jpg","../image/image_30/30_Saumane_3.jpg"]},"Consult_chateau_formulairec8b7":{"id":"Consult_chateau_formulairec8b7","dept":"30","canton":"Quissac","commune":"Sauve","nom":"Sauve_Castellas","type":"Château-Vestiges","periode":"X-XIV","histoire":"Cinq châteaux à Sauve, le Castellas,  de Roquevaire,  article suivant pour de Lavesque, de la Roquette et de Valfond.  CASTELLAS, fondé en 929 par Pierre frère de l'évêque de Nimes. Fief de la seigneurie du Salavès. Bermond d'Anduze, puissant seigneur de Sauve avait édifié leur château. Sept Bermond se succédèrent jusqu'en 1293.  On trouve ensuite, pour la baronnie et le comté de Sauve, entre autre noms, ceux de M. de Fize époux de Mlle de Semblacey (connue sous le nom de Madame de Sauve) et du Ranc de Vézenobres de Vibrac de Valfons. Le dernier des comtes de Sauve, sans aucun pouvoir depuis 1789, fut le comte de Banne d'Avéjan.                                                                              ROQUEVAIRE, fief des évêques  de Maguelonne, Il fut construit au milieu du XVIIe siècle sur un site d'occupation plus ancienne citation d'un mas agricole à la fin du XIIIe siècle, par Henry Delmas, abbé commanditaire de l'abbaye Saint-Pierre de Sauve. En 1691 Roquevaire a plusieurs propriétaires dont l'abbé Henri Delmas qui fait construire le château actuel Les guerres de religion ont été fatales au bâtiment, incendié dans la nuit du 31 janvier au 1er février 1703 par les troupes du chef camisard Rolland  qui prend le maquis dans le massif du Coutach. Après un passage rapide entre les mains des seigneurs voisins, les Durand de Vibrac, il sera pendant deux siècles le lieu de sépulture d'une famille protestante de Sauve, puis vendra après l'avoir dépouillé à David  Massip menuisier de Sauve. En 1880 par héritage passe aux Favantines et en 1926 pendant huit années la propriété de lécrivain Jean Germain,  à sa mort le château fut acquis en 1934 par Georges Lorot et ensuite par monsieur Boyat qui le restaure.","architecture":"Sauve le Castellas du Xe siècle il ne reste que des vestiges Sur cet emplacement subsiste une petite tour bâtie en 1705 sur l'ordre de l'intendant du Languedoc Nicolas Delamoignon de Basville pour renforcer les défenses de la ville.  Abandonnée au XIIIe siècle, elle a été totalement rasée. Actuellement, il ne reste que quelques murs de pierre en gros appareil qui formaient l'enclos de cet édifice.\r\nRoquevaire du XIVe siècle Présence d'un mas peut-être fortifié à l'emplacement d'un ancien château de Roquevaire. Est un bâtiment disposé sur un éperon rocheux du plateau calcaire dominant le village de Sauve, posée sur le bord du plateau calcaire de la Mer de Rochers. Roquevaire est incendié,  sert alors de tour de guet. Cest en 1704 que lintendant du Languedoc Roussillon de Basville ordonna denclore dans les murs de Sauve le rocher du Castellas et dy construire une guérite. Nul doute que ce lieu constituait un site privilégié pour la surveillance dun secteur très large. Certains aspects de larchitecture de Roquevaire rappellent la période médiévale, pont-levis, défenses en archère, pierres à bossage. Mais l'ensemble du bâtiment et son environnement de jardins en terrasses évoquent aussi, par la présence d'une enceinte complète.","habitants":"Famille de Bermond,                                                                                     Abbé Henri Delmas \r\n        \"","divers":"Vestiges du Castellas  et château de Roquevaire","gps":"","images":["../image/image_30/30_Sauve_Castellas_1.jpg","../image/image_30/30_Sauve_Castellas_2.jpg","../image/image_30/30_Sauve_Castellas_3.jpg","../image/image_30/30_Sauve_Castellas_4.jpg","../image/image_30/30_Sauve_Castellas_5.jpg","../image/image_30/30_Sauve_Castellas_6.jpg"]},"Consult_chateau_formulaire6faa":{"id":"Consult_chateau_formulaire6faa","dept":"30","canton":"Quissac","commune":"Sauve","nom":"Sauve_Roquette","type":"Château","periode":"XII-XIII","histoire":"ROQUETTE, la première mention connue du château date du XIIe siècle,  fief du comte de Melgueil. Quelques actes reflètent la vie dune petite communauté installée près du château.         LAVESQUE à l'origine ancienne construction d'un moulin de la famille Fabre et ensuite  les Méjanelle qui transformèrent le moulin en château. En 1737 pendant dix ans fut la propriété du docteur Astruc médecin consultant de Louis XV, vendu ensuite aux Teulet et passa dans différentes mains jusqu'en 1957 ou il fut acquis  par la famille Rousée toujours résident.                                            VALFONDS au XIVe siècle Pierre de Valfonds en était propriétaire est en rendit hommage au évêque de Maguelone, au XVe siècle Cibille de Claret l'apporta à Jacques de Blauzac et en 1540 par alliance d'Isabeau de Blauzac et Bernardin Duranc de Vibrac et par succession aux Banne d'Avejan. En 1880 Monsieur Roussy l'achète, doit le remettre en état car il a été  saccagé et incendié à la Révolution, toujours dans la descendance.","architecture":"Ruines du château de la Roquette du XIIe siècle. Aussi connu, aujourd'hui, sous le nom de château de Viviourès est situé sur le territoire de la commune de Rouet à 25 kilomètres au nord-ouest de Montpellier occupe une situation allongée sur la crête méridionale surplombant de 200 m environ la vallée la séparant du pic Saint-Loup au sud, dominant le plateau de lHortus au nord,  détruit sur ordre de Richelieu.                                                                         Château de Lavesque dorigine XIIIe siècle, reconstruit au XVe-XVIe siècles; de plan rectangulaire à deux étages accolé en équerre un bâtiment de l'ancien moulin. A l'angle Est une tour ronde, la façade  au Sud-Est dont le toit s'élève à son centre forme une ondulation et avancé carré à l'est. \r\nChâteau de Valfonds du XIIe siècle, incendié à la Révolution, remis en état à la fin du XIXe siècle, corps de logis à un étage cantonné de deux tours rondes toiture style chapeau asiatique, façade percée  de grandes fenêtres.                                                                              Tour de la Môle, une des tours Bermondes de la région (constructions élaborées par le même architecte et les mêmes maçons avec un appareil à bossage identique), à lorigine appelée tour de labbaye car elle faisait partie de lenceinte de labbaye. Cette construction date de la fin du XIIe  début du XIIIe siècle. Elle servait en outre de tour de guet, de refuge en cas de siège avec un point deau ( passage du Vidourle souterrain), de lieu possible démission de message optique par fumée. Elle doit son nom actuel à monsieur Môle, qui en avait fait lacquisition, avant quelle ne soit rachetée par la commune.","habitants":"Fief du comte de Melgueil                                                                       Famille Fabre                                                                                                 Famille de Pierre de Valfonds\r\n        \"","divers":"Vestiges de la Roquette, château de Lavesque, de Valfonds et la tour de Môle.","gps":"","images":["../image/image_30/30_Sauve_Roquette_1.jpg","../image/image_30/30_Sauve_Roquette_2.jpg","../image/image_30/30_Sauve_Roquette_3.jpg","../image/image_30/30_Sauve_Roquette_4.jpg","../image/image_30/30_Sauve_Roquette_5.jpg","../image/image_30/30_Sauve_Roquette_6.jpg","../image/image_30/30_Sauve_Roquette_7.jpg","../image/image_30/30_Sauve_Roquette_8.jpg"]},"Consult_chateau_formulaire9959-2":{"id":"Consult_chateau_formulaire9959-2","dept":"30","canton":"Roquemaure","commune":"Sauveterre","nom":"Sauveterre_30","type":"Château","periode":"XVI-XVIII","histoire":"Deux châteaux à Sauveterre celui de Montsauve du XVIe siècle et de Varenne du XVIIIe siècle.                                                            MONTSAUVE, construit en 1607 par la famille de Thiéry de Villeneuve les Avignon, l'abbé  Abel de Thiéry hérite en 1686 le lègue à son neveu le marquis de Roux viguier de Villeneuve, décéda en 1780, sa veuve qui s'en sépare après la Révolution  en 1805 à Jacques Sautet. En 1853 la propriété est acquise  par un avoué, puis acquis  par Angélique de Monconis veuve de première noce du comte  Raousset de Boulbon et récemment remarié au marquis Auguste de Cambis  d'Orsan ancien député et président du conseil général du Vaucluse et propriétaire du château de Varenne par héritage arrive à la petite fille  Antoinette de Raousset-Boulbon épouse de Joseph Napoléon Bonaparte-Wyse. Conserveront le château jusqu'en 1912  et sera vendu à madame Alice Panot, mère de Marie Thérèse Pierrat, artiste lyrique, épouse du peintre Guirand de Scevola (inventeur du camouflage).  Débute la grande époque des artistes à Sauveterre.  (Princesse Marie de Grèce, Colette et Anatole France et autres). Acquit  par la municipalité en 1946, il a d'abord abrité les écoles communales puis maintenant la mairie de Sauveterre depuis 1980.            VARENNE, Hyacinthe Virgile du Puy, trésorier général à Avignon fait construire le château qui passera à son fils maire d'Avignon sous l'Empire, à sa mort laisse en 1820  la propriété à sa fille qui la fait passa par alliance au marquis de Cambis d'Orsan pair de France. Veuf celui-ci convolera avec la comtesse  de Raousset-Boulbon qui achètera  en 1853 le château de Montsauve. Le château de Varenne sera acquis peu avant la première guerre mondial par Paul Maitrot de Varenne préfet du Gard, occupé pendant le seconde guerre mondiale,  longtemps inoccupé, ensuite il est racheté en 1979 par les propriétaires actuels Martine et Robert Byothias pour une hostellerie.  Il est acquis au XIXe siècle par Guillaume Puy, maire dAvignon. Il est vendu à la veille de la première guerre, au préfet du Gard, Maitrot de Varenne. Il est transformé en école, puis laissé à labandon. Après plusieurs mois de travaux, Varenne rouvre ses portes, \"ressuscité\" en hôtel de charme.","architecture":"Le château de Montsauve à Sauveterre. Accès par un escalier à double révolution à balustres de pierre, bassin rond au centre, un autre escalier mène au château, composé d'un corps de logis à deux niveaux de plan rectangulaire  et en façade deux pavillons de chaque côté saillants.\r\nChâteau de Varenne construit en 1738, à  deux  niveaux et attiques, la lucarne centrale à fronton triangulaire et sur la droite un pavillon couvert par un toit plat cerné de balustrade et pour accéder au jardin escalier à double révolution.","habitants":"Famille de Thiery                                                                                            Famille de Hyacinthe Virgile du Puy,\r\n        \"","divers":"Château de Montsauve et de Varenne à Sauveterre","gps":"","images":["../image/image_30/30_Sauveterre_30_1.jpg","../image/image_30/30_Sauveterre_30_2.jpg","../image/image_30/30_Sauveterre_30_3.jpg","../image/image_30/30_Sauveterre_30_4.jpg","../image/image_30/30_Sauveterre_30_5.jpg"]},"Consult_chateau_formulaire5942":{"id":"Consult_chateau_formulaire5942","dept":"30","canton":"Villeneuve les Avignon","commune":"Saze","nom":"Saze","type":"Château","periode":"XVI","histoire":"SAZE, fief des vicomtes d'Uzès, vassaux des évêques d'Avignon qui le vendirent   après les guerres de religion de 1560, à la famille de Thézan qui intègre ce qui reste de l'église dans la nouvelle construction, Olivier de Thézan chevalier des ordres du roi, sa petite fille fit passer le château par alliance à Antoine Olivier de Castillon marquis de saint-Victor de Malcap et en 1720  la famille de Baroncelli marquis de Javon l'acheta et le gardèrent jusqu'en 1793, Félicien-Joseph de Baroncelli ancêtre du fameux manadier Folco de Baroncelli. Un groupe scolaire est installé de 1954 à 1980 dans l'aile méridionale du château qui appartient aujourd'hui à la famille Bourelly.","architecture":"Saze, situé au cur du village,  première mention du château en 1157. Le château est incendié en 1560, lors des guerres de religion, puis reconstruit dans le style Renaissance avec deux corps de bâtiments en L.  Ce château rebâti aux XVIe et XVIIIe siècles sur des vestiges médiévaux, englobe le chur de l'ancienne église paroissiale du XIIe siècle.   Une tour carrée symétrique est édifiée à l'est et les deux sont reliées par une galerie ouverte au sud sur deux niveaux. La porte d'entrée en plein cintre est surmontée d'un fronton arrondi brisé contenant les armes des Thezan (bûchées) et la date de 1589. Cette ouverture est encadrée par deux petites baies surmontées d'un fronton brisé, selon une composition symétrique. L'escalier tournant à quatre noyaux pleins est ample et les coquilles d'angle ne sont pas décorées ou portent une simple coquille.  L'angle intérieur est occupé par la tour d'escalier carrée  comprenant l'entrée principale. Par symétrie,  à l'est, se trouve une tour carrée  et les deux sont reliées par une galerie ouverte au sud. Le château a été rénové est ouvert depuis janvier 2013. Il comporte notamment la mairie et la bibliothèque de Saze.","habitants":"Famille de Thézan\r\n        \"","divers":"Château de Saze ancien et nouveau","gps":"","images":["../image/image_30/30_Saze_1.jpg","../image/image_30/30_Saze_2.jpg","../image/image_30/30_Saze_3.jpg","../image/image_30/30_Saze_4.jpg","../image/image_30/30_Saze_5.jpg"]},"Consult_chateau_formulaire5619-2":{"id":"Consult_chateau_formulaire5619-2","dept":"30","canton":"Alès","commune":"Servas","nom":"Servas","type":"Château","periode":"XIII","histoire":"SERVAS, dans un site imprenable dominant la vallée de lAuzonnet,  près dAlès, le village actuel sest formé à proximité, autour du mas de lOlivier. Les tours de la Sorbière et de Servas sont citées depuis le XIIIe siècle. En 1225, Pierre Bermond de Sauve en faisait hommage à lévêque dUzès. À partir de 1347, elles passèrent de main en main, à Pierre de Mirabel, au début du XVe siècle à Martial Pradel, puis à Jean de Montvilliers jusquen 1505 où elles furent cédées à Jean Pavée, contrôleur des domaines du roi, et à Madeleine de Village, son épouse. Par alliance passa au capitaine Freton au XVIIe siècle. En 1624, le duc de Rohan y mit une garnison de 8 soldats.  En 1637 la fille unique de Freton Madeleine l'apporta par alliance à François de Rozel lieutenant principal du présidial de Nîmes pris le titre de seigneur de Servas. En 1702, il fut pris et pillé par Jean Cavalier et sa troupe. La tradition rapporte quil vint déguisé en gentilhomme, escorté de 30 hommes darmes accompagnant des prisonniers. Il demanda lhospitalité et, pendant le repas, ces camisards égorgèrent la garnison et se livrèrent à un pillage en règle. Au XVIIe siècle Servas passe par alliance de  Marguerite de Rozel à de Laurent Moreton-Chabrillan leur fils héritier vendit le château en 1752 à Jean-Elie Hostalier, toujours par alliance passe aux Sabatier de Lanchadenède et au XVIIIe siècle, il changea de main par mariages aux Varain d'Ainvelle, à la mort de ce dernier, il fut abandonné pendant 25 ans puis repris par ses descendants madame Alègre de la Sougeole.","architecture":"le château de Servas, construction austère bâtie sur un large terre-plein où trois bâtiments encadrent une cour rectangulaire. Son entrée est rétrécie par une tour rectangulaire accolée au corps de logis, cette tour est la partie la plus ancienne, elle a été, par la suite, pourvue dun escalier à vis. La façade méridionale du corps de logis, qui sélève sur deux étages, est flanquée de deux avancées, anciennes tours carrées autrefois crénelées, comme lensemble du château qui était conçu pour la défense, avec partout des bouches à feu et de petites ouvertures remplacées aujourdhui par des portes et des fenêtres plus modernes.","habitants":"Famille de  Pierre de Mirabel\r\n        \"","divers":"Château de Servas","gps":"","images":["../image/image_30/30_Servas_1.jpg","../image/image_30/30_Servas_2.jpg","../image/image_30/30_Servas_3.jpg","../image/image_30/30_Servas_4.jpg"]},"Consult_chateau_formulaire30dc":{"id":"Consult_chateau_formulaire30dc","dept":"30","canton":"Uzès","commune":"Serviers et Labaume","nom":"Serviers_Labaume","type":"Château","periode":"XVII","histoire":"SERVIERS, bien de Louis du Buis, le duc de  Rohan s'en empara en 1622 et en fit abattre une partie, elle fut indemnisé et élevée au titre en 1633 de marquisat en faveur de son petit-fils Henri de Porcelet. Après plusieurs changements au XVIIe et XVIIIe Siècles, il fut acheté en 1776 par un négociant d'Uzès monsieur Siméon Verdier. Monsieur Moulin notaire à Uzès l'acquit en 1850 toujours dans la famille.","architecture":"Partiellement détruit  en 1626 par Rohan, château reconstruit au XVIIe siècle, quadrilatère fermé par trois bâtiments d'habitation et par un mur crénelé, à l'angle nord-est la tour carrée est également crénelée, la façade à un étage est percée de fenêtres à meneaux et surmontée d'un fronton triangulaire. Au centre la porte Louis XIII s'ouvre sous un passage voûté débouche dans une cour intérieure.","habitants":"Famille de Henri de Porcelet\r\n        \"","divers":"Château de Serviers-Labaume","gps":"","images":["../image/image_30/30_Serviers_Labaume_1.jpg","../image/image_30/30_Serviers_Labaume_2.jpg","../image/image_30/30_Serviers_Labaume_3.jpg","../image/image_30/30_Serviers_Labaume_4.jpg"]},"Consult_chateau_formulaire1442":{"id":"Consult_chateau_formulaire1442","dept":"30","canton":"Calvisson","commune":"Sommières","nom":"Sommieres","type":"Château fort","periode":"XVII-XIX","histoire":"Plusieurs châteaux à Sommières dont celui de Sommières du Xe siècle,  de Lantillac du XIXe siècle, pas d'informations sinon du XIXe siècle, de Puech-Bouquet du XVIIe siècle, de Costes-Cirgues du XIXe siècle, de Massereau, d'Aujargues (chambres d'hôtes).                                 SOMMIERES, les origines de la ville sont liés à cette époque des premiers seigneurs les Bermond d'Anduze et les de Sauve, le seigneur  Bernard III d'Anduze fit construire  le château dans  la seconde moitié du Xe siècle, fiefs principaux de la maison des Princes d'Anduze, Satrapes de Sauve, et de leurs cousins les Roquefeuil-Anduze. Ces deux familles seigneuriales, de grande importance régionale, y battaient monnaie, dans un des ateliers de la ville, entre les années 1220-1266.  La tour actuelle, appelée tour Bermonde, date des années 1160-1180, en 1248 incorporé au domaine royal mais subit de nombreux assauts pendant les guerres des albigeois. Après la révocation de l'édit de Nantes, le château fut transformé en prison, après la Révolution le château servit de carrière et la tour restée intact  appartient depuis 1809 à la commune.                                                                                    PUECH-BOUQUET, la construction de l'édifice pourrait remonter en 1606. Il fut acheté en 1704 par le seigneur Jean-Joseph dAlbenas à qui les Huguenots avaient détruit le château. Par succession, ce domaine devient la propriété de son petit-fils François-Alexandrin dAlbenas qui le transmet lui aussi par succession à son fils Jean-Joseph dAlbenas. Le 31 mai 1810  Jean-Joseph dAlbenas, vend le domaine appelé Pied Bouquet à Jérôme-Etienne Aubanel, négociant. Après différents travaux de rénovation et dagrandissement de la propriété, le sieur Aubanel vend le 1er novembre 1814 ce domaine à Guillaume Cazaly, natif français, négociant demeurant à Londres. Le domaine reste dans la famille Cazaly jusquen décembre 1859 date de la vente du domaine de Pié Bouquet à la comtesse de Noailles. En 1955, le château et 50 ha de bois attenant furent vendus à M. Jacques Lafont; il en est toujours propriétaire. \r\nCOSTES-CIRGUES, aujourd'hui exploitation viticole de Béatrice Althoff et son fils David.                                                                  MASSEREAU, camping de luxe, il est le premier établissement d'hôtellerie de plein air à obtenir la 5e étoile en 2010.","architecture":"Sommières, le premier château remonterait au IXe siècle, la seconde tour est construite sous Louis IX puis le château sétend vers le Nord sur un rocher dominant la ville. Elle est alors entourée de remparts qui offrent une protection contre les Vidourlades ainsi quun système de défense. Après la Révolution une évolution nette se fait jour avec la vente et le démantèlement des remparts, le comblement des fossés. Aujourdhui Sommières sétend des deux côtés du fleuve avec un urbanisme plus diffus en rive droite qui sest développé dans la seconde moitié du XXe siècle,  Bermond forteresse du Xe ou XIe siècle. Le château comprenait deux tours, la deuxième, dite la tour Montlaur semblable à celle qui reste, a été détruite lors du premier siège de la ville en 1573. L'importance stratégique du château provenait de sa situation dominant le pont romain, seul point de passage sur Vidourle entre les Cévennes et la mer. La tour Bermond  haute de 25 mètres reste le grand témoin du passé.                                                                                          Costes-Cirgues dit autrefois mas de Fine; bien caché dans la végétation, remanié au début du XXe siècle dans le style belle époque, toiture conique pointue couverte d'ardoises de la tour de l'horloge avec cadran en façade, présence, à côté, sur une terrasse, d'un campanile en fer forgé.                                                 Lantillac, au quartier de Calès, petit château du milieu du XIXe siècle, juché sur la colline surplombant la ville et les ruines du château médiéval dont la tour Bermond ou Carrée. Deux petites tours rondes, à l'origine couvertes de toitures coniques, encadrent sa façade.                                                                                  Massereau, plus ancien, il possède également une tour d'angle comportant encore une fois une ancienne horloge. Cette tour ronde est coiffée d'un dôme de pierre surmonté d'un petit campanile très sobre composé de quatre arceaux de fer supportant un timbre hémisphérique pour sonner les heures.","habitants":"Seigneur  Bernard III d'Anduze                                                               Seigneur Jean-Joseph dAlbenas\r\n        \"","divers":"La tour de Sommières; le château d'Estelou, de Costes-Cirgues et de Lantillac.","gps":"","images":["../image/image_30/30_Sommieres_1.jpg","../image/image_30/30_Sommieres_2.jpg","../image/image_30/30_Sommieres_3.jpg","../image/image_30/30_Sommieres_4.jpg","../image/image_30/30_Sommieres_5.jpg","../image/image_30/30_Sommieres_6.jpg","../image/image_30/30_Sommieres_7.jpg","../image/image_30/30_Sommieres_8.jpg","../image/image_30/30_Sommieres_9.jpg"]},"Consult_chateau_formulaire4507":{"id":"Consult_chateau_formulaire4507","dept":"30","canton":"Le Vigan","commune":"Soudorgues","nom":"Soudorgues","type":"Vestiges","periode":"X-XII-XVI","histoire":"Deux châteaux  à Soudorgues, celui de Beauvoir du Xe siècle, de Roucou du XVIe siècle et la tour de Peyre du XIIe siècle.                              BEAUVOIR, autrefois  Belbezet du XIIe siècle, au XVe siècle  Guillaume de la Rivière, gouverneur et châtelain d'Aigues-Mortes en rendait hommage au comte d'Alès pour l'utiliser à la surveillance des Cévennes avec une garnison et d'en faire une prison. Les  de la Rivière furent remplacé par  les seigneurs de la Fare et au XVIIe siècle les Vignolles de Saint-Bonnet en prirent possession et ensuite les Tourtoulon-Lasalle. La famille d'Henri Rodiac de Calviac en prirent possession par achat à une adjudication en 1890. Actuellement résidence secondaire de la famille Triaire.         TOUR de PEYRE, des seigneurs dAnduze-Sauve jusquen 1243, au XIVe siècle Guillaume de Saint-Bonnet,  acquit par Faïsse de Soudorgues et à la fin du XVIIe siècle passe par alliance à Louis de Gasc de saint-Gervais, à la Révolution appartenait aux seigneurs Marion d'Arlus, aujourd'hui fait partie de l'ensemble du vieux prieuré des Faîsses appartenant à madame Torcy. ROUCOU, fief des Thoiras au XVIe siècle  et en 1610  les Gauthier  l'achetèrent et le gardèrent jusqu'à la fin du XVIIIe siècle.","architecture":"Donjon de Beauvoir,  du Xe siècle, reste de lancien château fort, une tour carrée, crénelée percée de meurtrières haute de 12 mètres, bâtiments accolées dit de Beauvoir corps de logis, formant une cour carrée avec accès par un portail plein cintre, les deux tourelles et l'enceinte crénelée d'entrée on disparues. \r\nRuines de la tour de Peyre, au lieu dit \"tour-Signal\" de plan carré, elle possède un appareillage  à bossage capable de résister aux jets de projectiles ou aux coups de bélier, toujours debout sur un rocher, ancienne tour de guet ou restes dun château qui était entouré d'un fossé, incorporée à lenceinte médiévale, ruinée dès le XVIIIe siècle.\r\nRoucou du  XVIe-XVIIe siècles, constitué d'un corps de logis de forme en L à deux étages, une tour ronde à l'angle, avec  prolongation de dépendances, ce château fut incendié an 1704 mais remanié en 1815.","habitants":"Famille dela Rivière                                                                                  Famille de Guillaume de Saint-Bonnet\r\n        \"","divers":"Vestiges de Beauvoir vestiges de la tour de Peyre et le château de Roucou.","gps":"","images":["../image/image_30/30_Soudorgues_1.jpg","../image/image_30/30_Soudorgues_2.jpg","../image/image_30/30_Soudorgues_3.jpg","../image/image_30/30_Soudorgues_4.jpg","../image/image_30/30_Soudorgues_5.jpg","../image/image_30/30_Soudorgues_6.jpg"]},"Consult_chateau_formulaire4928":{"id":"Consult_chateau_formulaire4928","dept":"30","canton":"Calvisson","commune":"Souvignargues","nom":"Souvignargues","type":"Château","periode":"XIV","histoire":"SOUVIGNARGUES, est mentionnée en 1121.  Pons de Souvignargues chevalier des arènes fit construire le château, le fief passa au XIVe siècle à Pierre Scatisse, seigneur de Villevieille trésorier du roi en Languedoc, passa ensuite à la famille Faucon et en 1556 passa par alliance aux Brueys de Saint-Chaptes qui le conservèrent jusqu'au début du XVIIIe siècle passa ensuite à Jean de Rouzier de la cour des comptes de Montpellier, le gendre de Jean de Laurent de Rouzier le marquis de Montglas en était propriétaire à la  Révolution, passa ensuite par alliance  aux Montlaur de Pondres. Un habitant du village l'acquit pour le revendre peu de temps après aux enchères aux grands-parents de l'actuel propriétaire monsieur Nouvel.","architecture":"Souvignargues, cité 1175 vestiges du chemin de ronde, un château a sans doute existé à cette époque, qui fut ensuite déplacé à la périphérie de l'agglomération puis ensuite largement transformé.  La partie ancienne possède une surface restreinte qui a été dotée d'une enceinte aux rares vestiges. Remplacé par une construction nouvelle un long bâtiment avec cour d'entrée sur la façade à l'ouest, le toit à quatre pans est surmonté d'un pigeonnier carré.","habitants":"Famille de Pierre Scatisse\r\n        \"","divers":"Château de Souvignargues","gps":"","images":["../image/image_30/30_Souvignargues_1.jpg"]},"Consult_chateau_formulairee20d":{"id":"Consult_chateau_formulairee20d","dept":"30","canton":"St-Ambroix","commune":"St-Ambroix","nom":"St_Ambroix","type":"Château-Vestiges","periode":"XII-XVI","histo
