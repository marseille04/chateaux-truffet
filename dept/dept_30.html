teau fut édifié sur un ancien prieuré dont il reste les voûtes du XIVe siècle. Grâce à un décret de 1635, les propriétaires du château furent autorisés à rassembler dans le parc paysager romantique, des vestiges romains. Le parc du château de Teillan comprend des essences rares et une collection de bornes milliaires et de stèles romaines provenant de le via Domitia. Une noria a été aménagée au début du XVIIe siècle. La visite comprend aussi les extérieurs du château et le pigeonnier. Ensemble de bâtiment  combinant fonction résidentielle et agricole, le porche d'entrée à remplacé la poterne à pont-levis donnant accès à la cour carrée, le corps de logis à droite de forme rectangulaire à deux niveaux, et à son centre une tour de guet rectangulaire avec échauguette, transformé en terrasse desservi par un escalier rampe sur rampe, fenêtres à meneaux en façades sont remplacées et de l'autre côté de la cour les communs et des bâtiments agricoles et au sud le pigeonnier sur une ancienne tour de défense.","habitants":"Famille de Philippe Magnan de Bornier                                                      Préfet Pierre Melchior d'Adhémar\r\n        \"","divers":"Château de Teillan à Aimargues","gps":"","images":["../image/image_30/30_Teillan_1.jpg","../image/image_30/30_Teillan_2.jpg","../image/image_30/30_Teillan_3.jpg","../image/image_30/30_Teillan_4.jpg","../image/image_30/30_Teillan_5.jpg","../image/image_30/30_Teillan_6.jpg"]},"Consult_chateau_formulaired9c1":{"id":"Consult_chateau_formulaired9c1","dept":"30","canton":"Rousson","commune":"Rivières","nom":"Theyrargues","type":"Château fort","periode":"XV","histoire":"THEYRARGUES, au XIIIe siècle fief de Martial Pradel,  en 1434  André de Budos  acheta   le fief et fit construire le château de Theyrargues. Dans les premières années des guerres de religion, vers 1565, Jacques de Budos, baron de Portes et de Budos, entreprend des réparations en son château. En 1613, Louis XIII  élève au titre de baronnie de Theyrargues en vicomté au profit dAntoine-Hercule de Budos, beau-frère du connétable Henri 1er de Montmorency et de Louise Budos qui fut la mère d'Henri II de Montmorency gouverneur du Languedoc. Au cours de la seconde partie du XVIIe siècle la demeure est occupée par Marie-Félice de Budos, marquise de Portes. De 1667 à 1781 les bâtiments du château abritent tour à tour un couvent, un hôpital  puis un collège. Après la Révolution propriété d'Antoine de Chalbos de Cubières magistrat à Nîmes acquiert Theyrargues, incendié en 1793  ensuite c'est  une succession de propriétaires qui passent dans la propriété, les Magne d'Alès qui le restaure et au XIXe siècle passe aux  Maubec, les Isnard en hérite et depuis 1905 il appartient à M. Régis de Ramel qui le transforma en chambres d'hôtes.","architecture":"Theyrargues, le château aurait été construit au XVe siècle, le château sert de résidence  principale à ses propriétaires, quadrilatère formé d'un corps de logis rectangulaire à deux niveaux délimitant une cour fermée, reste trois tours rondes et un donjon carré crénelé, le crénelage  qui surmonte un avant corps du côté cour a été ajouté au XXe siècle comme les créneaux et mâchicoulis de la tour nord-ouest. En 1628, le château de Theyrargues  est pris et incendié par  les troupes du duc de Rohan. Cette dévastation, sans en être la cause, inaugura une période  dau moins vingt années pendant laquelle le château resta pratiquement inoccupé.","habitants":"Famille d'André de Budos \r\n        \"","divers":"Château de Theyrargues","gps":"","images":["../image/image_30/30_Theyrargues_1.jpg","../image/image_30/30_Theyrargues_2.jpg","../image/image_30/30_Theyrargues_3.jpg","../image/image_30/30_Theyrargues_4.jpg","../image/image_30/30_Theyrargues_5.jpg"]},"Consult_chateau_formulaire2eb3-2":{"id":"Consult_chateau_formulaire2eb3-2","dept":"30","canton":"La Grand-Combe","commune":"Thoiras","nom":"Thoiras","type":"Château","periode":"Xii-XIII-XVIII","histoire":"Trois châteaux à Thoiras dont celui de Thoiras, le château de Prades et celui de Malérargues.                                                          THOIRAS, les Gauffridi de Saint-Bonnet  ces seigneurs construisirent le château qui passa par alliance en 1386 à Guillaume du Caylar  de Montferrier descendant des Bermond de Sauve, cette famille prit le nom  de Saint-Bonnet-Thoiras et conserva le fief pendant trois siècles, dépendant du comte d'Alès. Souvenir de Jean du Caylar de Saint-Bonnet Thoiras, marquis de Thoiras nommé maréchal de France en 1630, mourut à la bataille de Fontanette en 1633. En 1685 par vente aux enchères suite à une saisie acquit par Pierre Rouquier, puis passa à son neveu Pierre Caulet contrôleur du domaine du roi et en 1737 le château passa aux Manoël d'Algues, le château resta dans la descendance de la famille Chapel.                                                                          MALERARGUES, fief  des Mandajors seigneurs des Plantiers, passe au XVe siècle aux Ginestous et par alliance à César de la Tour du Pin marquis de Charce, cette famille fit édifier le château et le gardèrent cent cinquante ans sous le nom de Malérargues, ruiné par un incendie à la Révolution il passe à Louis des Hours de Calviac qui le transmit à Jacques-Louis de Portalès. Aux Meyrueis au XIXe siècle, des cadres de la résistance devient un point d'appui du groupe. Robert Francisque, ancien sous-officier de carrière et résistant, en est le régisseur depuis 1933. En octobre 1943, il devient responsable d'une école de cadres du maquis mise en place à Malérargues, mais le 10 mai 1944, des SS investissent le château, exécutent Robert Francisque et mettent le feu aux bâtiments. En 1974 Roy Hart installe un théâtre et un centre artistique.                                                                                            PRADES, dès le XVe siècle habité par des gentilhomme verriers, les Bagard. Au XVIIe siècle aux Vignolles, passa aux Boileau de Castelnau qui le vende au seigneur de Sainte-Croix Louis Novis de Monoblet, puis passa par alliance au XIXe siècle au Tourtoulon, passa ensuite aux Campredon, à monsieur Tatistcheff qui la revendu à monsieur Lovisi.","architecture":"Thoiras, vestiges d'une tour de guet construite par les Sarrasins au Xe siècle, restauré en 1989 sert de point de vue sur les Cévennes. A l'origine au XIIIe siècle une ferme fortifiée avec une tour carrée, des bâtiments s'ajoutèrent, donjon  et tour circulaire et fossés furent creusées, murs d'enceinte et tour d'escalier, deux autres tours rondes au XVe siècle, corps de logis attenant au donjon carré, les tours furent arasées à la Révolution.  L'aspect actuel style renaissance avec meurtrières pour armes à feu, trois bâtiments  à deux niveaux  à toit en tuiles provençales à deux pans dans une enceinte carrée flanqué de trois tourelles rondes d'angles, ces  trois bâtiments  délimitent la cour  rectangulaire, une tour d'escalier à vis en angle intérieur dépassant l'ensemble crénelée.                           Malérargues, château construit  au XVIe siècle, incendié à la Révolution, transformé en école des cadres de la résistance et centre artistique. Le corps de logis avec façade du XIXe siècle avec plusieurs bâtiments de dépendance.                                       Prades, dit château du XIIIe siècle, château reconstruit au XVIIe siècle remanié au XVIIe siècle remplacement des fenêtres à meneaux en façade sur le corps de logis rectangulaire  d'une longueur démesurée à deux étages encadré de deux pavillons carrés massifs en légère avancée dépassant en hauteur se terminant en terrasse à balustrades.                                                   A Thoiras vestiges d'une tour de guet construite par les Sarrasins au Xe siècle, restauré en 1989 sert de point de vue sur les Cévennes.","habitants":"Famille des Saint-Bonnet-Thoiras                                                           Famille de César de la Tour du Pin                                                        Famille de Boileau de Castelnau \r\n        \"","divers":"Vestiges de la tour de guet et château de  Thoiras, maison forte de Malérargues et de Prades.","gps":"","images":["../image/image_30/30_Thoiras_1.jpg","../image/image_30/30_Thoiras_2.jpg","../image/image_30/30_Thoiras_3.jpg","../image/image_30/30_Thoiras_4.jpg","../image/image_30/30_Thoiras_5.jpg","../image/image_30/30_Thoiras_6.jpg","../image/image_30/30_Thoiras_7.jpg","../image/image_30/30_Thoiras_8.jpg"]},"Consult_chateau_formulaire24ba-2":{"id":"Consult_chateau_formulaire24ba-2","dept":"30","canton":"Quissac","commune":"Tornac","nom":"Tornac","type":"Vestiges","periode":"XIV","histoire":"TORNAC, du XIe et XIIe siècles, fief des seigneurs d'Anduze. Entre 1549 et 1566, construction du château par Bremond De la Jonquière bourgeois d'Anduze.  Par succession au XVIIe siècle, le château passera  à Marguerite de la Fare héritière de son mari Pierre de la Jonquière qui le laissera à son neveu Henri de la Fare. Pour affirmer leurs richesses, les de la Fare feront construire une nouvelle résidence, le château de Bellefont avec un magnifique jardin partant du château et sétendant jusquau Gardon. Par alliances et successions le château de Tornac appartenait à la Révolution au comte de Brison qui le délaissa, et  le 3 Avril 1792, le château est incendié, devenu bien national, est vendu en plusieurs lots et laissé en ruines. En 1970, création de l'association les amis du château qui le restaure. Ce jardin digne de celui des Tuileries, nous dit linspecteur du roi Louis XV était ouvert à la population qui y célébrait les mariages et autres réjouissances. Malheureusement, le gendre de M. de Montbrison décide de détruire ces jardins à la fin du XVIIIe siècle pour des raisons déconomie.","architecture":"Le château de Tornac,  ruines du XIIe et XVe siècles enceinte flanquée de tours rondes et donjon carré de 5 m  de côté et 25 m de haut,  surplombe la rive droite du Gardon dAnduze à un emplacement stratégique qui lui permettait de protéger lentrée vers Anduze et les Cévennes. Construit à partir du XIe siècle mais qui ne comportait quune seule tour,  la première tour de guet, tour Sandeyren  est construite sur des bases romaines. Château  reconstruit au XVIe siècle de plan triangulaire irrégulier l'entrée était protégée par deux tourelles aujourd'hui arasées, la cour délimitée par le corps de logis, la chapelle et la courtine qui les relient, il a été incendié en 1792, par les révolutionnaires de la région. Au XVIIIe siècle création des célèbres jardin du château. Lors de la seconde guerre mondiale en août 1944 il fut le lieu de combats entre résistants et troupe nazi, de nombreux combattants y trouvèrent la mort. Bien que ruiné, on peut encore y voir sa tour carrée à base romaine, une enceinte flanquée de tours circulaires du XIIe siècle et des bâtiments de style Renaissance du XVIe siècle.","habitants":"Seigneur Bremond de la Jonquière\r\n        \"","divers":"Vestiges du château de Tornac","gps":"","images":["../image/image_30/30_Tornac_1.jpg","../image/image_30/30_Tornac_2.jpg","../image/image_30/30_Tornac_3.jpg","../image/image_30/30_Tornac_4.jpg","../image/image_30/30_Tornac_5.jpg","../image/image_30/30_Tornac_6.jpg","../image/image_30/30_Tornac_7.jpg","../image/image_30/30_Tornac_8.jpg"]},"Consult_chateau_formulairef96a":{"id":"Consult_chateau_formulairef96a","dept":"30","canton":"Bagnols sur Cèze","commune":"Tresques","nom":"Tresques","type":"Vestiges","periode":"XII","histoire":"TRESQUES, cité en 1200, fief des Sabran passa par alliance de Bèrengère de Sabran qui épousa Pons de Montlaur. La baronnie fut vendue en1486 à la famille de Combes, partagé ensuite au XVIe siècle par les deux frères Cathelin et Philippe de Combes ce dernier reçut Montclus et Tresques  qui passa aux Montcalm par alliance de sa fille. En 1647  Louis de Vivet époux de Marie de Montcalm fit bâtir un autre château dans le village après avoir fait détruire ce qui restait de la forteresse et par alliance ce château passa aux Cadolle et aux de Voguë, ce château  de style Renaissance fut dispersé par monsieur Fraisse après la premier guerre mondial.","architecture":"Au sommet du village de Tresques se sont développés à l'époque médiévale le château fort et la chapelle castrale.  le château a été reconstruit au cours de la deuxième moitié du XVIIe siècle. le château subit des destructions au cours des guerres de religion  qu'il ne s'en releva pas,  fut dispersée après la guerre de 14-18.  on peut toujours aujourd'hui admirer le portail et la demeure classique.                       La tour de guet du fort qui fut détruit pour la construction du nouveau château, située près de l'église au milieu du village et datant du XIVe siècle. Elle a servi à la protection du village et, plus tardivement, de prison, cette haute tour s'élève sur un promontoire rocheux, au sommet du village, en face de l'église et du château. Elle faisait  partie du système défensif et servait de poste de surveillance. De forme carrée, son appareil se compose de petits moellons. De multiples traces de fenêtres et portes, maintenant bouchées, se distinguent sur les différentes parois. L'accès actuel se fait par une petite porte en plein cintre pratiquée à l'Est. Il se peut qu'à l'origine, l'accès se trouvait au premier étage en connexion avec le rempart.","habitants":"Famille de Combes\r\n        \"","divers":"Tour et château à Tresques.","gps":"","images":["../image/image_30/30_Tresques_1.jpg","../image/image_30/30_Tresques_2.jpg"]},"Consult_chateau_formulaire1bbf-2":{"id":"Consult_chateau_formulaire1bbf-2","dept":"30","canton":"Uzès","commune":"Uzès","nom":"Uzes","type":"Château","periode":"XII-XVII","histoire":"Plusieurs châteaux à Uzès le château Bérard, la Bastide-Blanche et la tour Fenestrelle.                                                                      UZES, du XIIe siècle fief de la famille du même nom, Le comte de Bermond administrateur de la cité d'Uzès fit construire au XIIe siècle la tour Bermode, le seigneur d'Uzès vassal du roi assujetti aux comtes de Toulouse impose son autorité depuis la Provence à L'Aquitaine. La famille d'Uzès fidèle au roi de France s'illustre  à son service ce qui assure l'ascension de la famille, en 1328 Robert Ier d'Uzès rejoint l'armée Française la victoire de Cassel lui vaut le titre de vicomte. En 1486, Simone d'Uzès épouse le comte de Crussol, Jacques de Crussol grand chambellan et gouverneur du Dauphiné, par cette union  accède à de nouveaux honneurs et renforce les prestiges de cette maison. En 1565 Antoine de Crussol élevé au rang de duc et pair du royaume  en 1572 par le roi Charles IX. A la Révolution le Duché toujours dans la famille de Crussol,  connaîtra des moments difficiles, vendue comme bien national racheté par les habitants d'Uzès,  transformée en collège. Le duc d'Uzès rachète le Duché en 1824 aux familles uzétiennes dont celle de l'écrivain André Gide qui en l'achetant l'ont protégées. La première partie du XXe siècle est aussi une période noire pour le Duché, le duc d'Uzès en difficulté vend son mobilier et il loue le Duché à l'éducation nationale qui y installe de nouveau un collège.","architecture":"Les châteaux d'Uzès. Ducal appelé le \"Duché\" est par son architecture un résumé de l'histoire de France, construit au cours des ans,  le Moyen-Age, la Renaissance, le siècle des lumières et les temps modernes s'y retrouvent, conserve un ensemble exceptionnel de trois tours féodales dont le noyau est le donjon carré du XIIe siècle, qui étaient autant de démembrements de la seigneurie originelle, encore représentée par le château du Duché et sa tour Bermonde ( donjon) qui domine la ville. La tour de l'évêché et la tour du Roi, magnifiquement conservées à côté de la tour Bermonde (la plus haute, 42 mètres, au sein du Duché), les enceintes et les logis de ces châteaux urbains, témoignent de la façon dont les seigneuries languedociennes étaient partagées au gré des successions. La tour de l'évêché est surmontée d'un campanile abritant la cloche de lhorloge communale depuis 1836. La tourelle et la structure du campanile en fer forgé dépassent en hauteur la tour Bermonde. La tour Fenestrelle, ce vestige roman du XIIe siècle de l'ancienne cathédrale est l'unique exemple en France du clocher de plan circulaire, doit son nom à ses cinq étages de fenêtres géminées, haute de 42 mètres et le clocher de la cathédrale Saint-Théodorit d'Uzès.                                                 Château Bérard (plus loin) près duquel on trouve à gauche les restes de l'aqueduc romain qui conduisait à Nîmes les eaux de la fontaine d'Eure d'Uzès en passant sur le Pont du Gard et à droite au milieu d'un bois de pins un temple de druides monument celtique dans lequel on immolait des victimes humaines.","habitants":"Famille des Crussol\r\n        \"","divers":"Duché à Uzes et divers châteaux Bérard  etc","gps":"","images":["../image/image_30/30_Uzes_1.jpg","../image/image_30/30_Uzes_2.jpg","../image/image_30/30_Uzes_3.jpg","../image/image_30/30_Uzes_4.jpg","../image/image_30/30_Uzes_5.jpg","../image/image_30/30_Uzes_6.jpg","../image/image_30/30_Uzes_7.jpg","../image/image_30/30_Uzes_8.jpg","../image/image_30/30_Uzes_9.jpg"]},"Consult_chateau_formulaireaa2e":{"id":"Consult_chateau_formulaireaa2e","dept":"30","canton":"Pont St-Esprit","commune":"St-Paulet de Caisson","nom":"Valbonne","type":"Chartreuse","periode":"XIII","histoire":"VALBONNE, cette chartreuse  fondée du XIIIe siècle par Raymond Rascas d'Uzès (1163-1209), bienfaiteur  François Laurent, moine de la grande chartreuse, est prieur chartreux de Valbonne de 1634-1650, participe activement à la reconstruction de la chartreuse au XVIIe siècle. Jean-Claude Farigoule, industriel de Calais, fut propriétaire de la chartreuse de Valbonne de 1907 à 1926. En 1926,  la chartreuse de Valbonne laissée à l'abandon, elle fut rachetée en 1926 par le pasteur Philadelphe Delord qui fonde l'association de secours aux victimes des maladies tropicales et principalement aux victimes de la lèpre (ASVMT) qui deviendra le propriétaire de la chartreuse. Il y meurt le 24 novembre 1947 et est enterré dans le grand cloître. En 1975, lassociation installe à la chartreuse un centre de postcure psychiatrique à vocation de réinsertion et de réadaptation socioprofessionnelle.  En 1992, elle crée des appartements thérapeutiques à Pont-Saint-Esprit et un centre d'aide par le travail à la chartreuse. En 1995, elle ouvre un foyer de vie et un foyer d'hébergement pour les travailleurs du centre d'aide par le travail, les \"Résidences de Ventabren\" à Pont-Saint-Esprit. En 2003, l'établissement \"UPSR du château de Coulorgues\" ouvre à Bagnols-sur-Cèze.\r\nEn 2010, un nouveau foyer de vie, la Résidence Marie Durand est créé à Laudun.","architecture":"Chartreuse de Valbonne, fondée en 1204 par Guilhem de Vénéjan, évêque d'Uzès, et rebâtie au XVIIe siècle, la chartreuse de Valbonne, abrite l'ordre des chartreux jusqu'en 1901. À la fin du XIXe siècle, la chartreuse renferme une chaussure de Saint-Malachie. En 1802, une verrerie occupe les bâtiments. Le sable utilisé est extrait sur place. Louis Barbat, le bourreau de Cayenne est enterré dans le cimetière attenant à la Chartreuse. Les cellules des moines sont distinguées par une lettre allant de A à Y (sauf Q, non utilisé).                                                                                         Le château, ancienne demeure des comtes de Gabriac, le château fut démembré pendant la Révolution Française, quelques traces, une échauguette notamment témoignent encore de son existence sur quelques maisons près de l'église.                                                       Le château de La Conseillère, construit au XIXe siècle.\r\nLe château de Balazut, construit au XIXe siècle.","habitants":"chartreux de Valbonne\r\n        \"","divers":"Chartreuse de Valbonne à Saint-Paulet  les Caisson","gps":"","images":["../image/image_30/30_Valbonne_1.jpg","../image/image_30/30_Valbonne_2.jpg","../image/image_30/30_Valbonne_3.jpg","../image/image_30/30_Valbonne_4.jpg","../image/image_30/30_Valbonne_5.jpg"]},"Consult_chateau_formulaire24c9":{"id":"Consult_chateau_formulaire24c9","dept":"30","canton":"Uzès","commune":"Vallabrix","nom":"Vallabrix","type":"Château","periode":"XVI","histoire":"VALLABRIX, au Moyen-Age, il était l'un des 13 fiefs nobles du château d'Uzès. Raymond VI de Toulouse reçut, en 1209, de l'évêque, seigneur d'Uzès, le castrum de Valabricio, après la réconciliation avec le pape. Après avoir eu dans le temps, de nombreux co-seigneurs, la seigneurie de Vallabrix a été achetée, en 1536, par Mathieu de Bargeton. C'est l'une de ses descendantes qui, en 1732, épousera Gaspard d'Arnaud, fondant la famille d'Arnaud de Vallabrix. Leur petit- fils, deviendra maire et sous-préfet d'Uzès sous la terreur blanche.                                            A  trois kilomètres au sud-ouest à St-Quentin,  la Poterie une tour carrée.","architecture":"Vallabrix avait un rempart en 1791,  déjà démoli en plusieurs endroits. C'était un quadrilatère d'énormes murailles dont il reste presque entier le mur Est limité par deux tours, dont l'une à moitié démolie. Ce rempart englobait la maison seigneuriale, le château et ses dépendances, remises, magnanerie, et pigeonnier devenu une maison d'habitation qui a conservé ce nom, un bâtiment du XVIe siècle, devenu école primaire publique, le fronton triangulaire semble nous parler du XVIe siècle. A l'origine, cette façade de l'ancien château se trouvait sur la place du village. Elle a été déplacée et remontée au fond de la cour à la fin du XIXe siècle ou au début du XXe siècle. Il s'agit d'une façade Renaissance de la fin du XVIe siècle. Elle est composée d'un fronton avec des frises et corniches très ouvragées, de six pilastres surmontés de chapiteaux corinthiens. Les ouvertures d'origine sont murées et, de ce fait, cette façade ne présente plus qu'un simple décor.","habitants":"Famille d'Arnaud de Vallabrix.\r\n        \"","divers":"Château de Vallabrix et tour de saint-Quentin de la Poterie.","gps":"","images":["../image/image_30/30_Vallabrix_1.jpg","../image/image_30/30_Vallabrix_2.jpg","../image/image_30/30_Vallabrix_3.jpg","../image/image_30/30_Vallabrix_4.jpg","../image/image_30/30_Vallabrix_5.jpg"]},"Consult_chateau_formulaireea30":{"id":"Consult_chateau_formulaireea30","dept":"30","canton":"Le Vigan","commune":"Valleraugues","nom":"Valleraugues","type":"Château","periode":"XVIII","histoire":"VALLERAUGUES, castrum de Valarauga est cité en 1225, et l'éclésiastique de Varalauga, en 1249 dans le cartulaire de Notre-Dame de Bonheur. C'est alors un poste militaire avancé, au confluent de l'Hérault et du Clarou faisait partie de la viguerie du Vigan et du diocèse de Nîmes (plus tard d'Alais) (Alès), archiprêtre de Sumène. Au commencement du XIIIe siècle, Valleraugues appartenait à la maison de Roquefeuil,  il fit ensuite partie de la baronnie de Meyrueis, et ne fut définitivement réuni à la couronne que vers 1780. Valleraugues devint, en 1790, le chef-lieu d'un canton du district du Vigan qui comprenait seulement trois communes: La Rouvière, Saint-André-de-Majencoules et Valleraugues.\r\nObservatoire du Mont-Aigoual. Le général François Perrier (1833-1888) est né à Valleraugues. Fils de boulanger, ce savant géographe fut chef du service géographique de larmée, président du conseil général du Gard. Il fit construire lobservatoire du Mont-Aigoual REY, à Pont d'hérault,  depuis le XIIIe siècle, autrefois forteresse, aujourd'hui hôtellerie de tradition, restauré au XIXe siècle par Viollet-Le-Duc.","architecture":"Édifié de 1888 à 1894. Dernier observatoire météorologique de France situé en montagne et en activité.  Au Rey, un autre château remonte lui aussi au XIIIe siècle. Incendié lors de la Révolution, il aurait été restauré (et profondément remanié) par Eugène Viollet-Le-Duc en 1848. Corps de logis rectangulaire à quatre niveaux toit en croupe flanqués en façades de deux tours rondes à mâchicoulis avec rajouts de toits coniques et échauguettes sur la partie arrière.\r\nMaison du XVIIe siècle, au hameau du Rey, trois ponts gothiques.","habitants":"baronnie de Meyrueis                                                                            Général François Perrier \r\n        \"","divers":"château des Rey, tour de l'observatoire du Mon-Aigual, maison forte de Cougnet, de Silhol et d'Angliviel","gps":"","images":["../image/image_30/30_Valleraugues_1.jpg","../image/image_30/30_Valleraugues_2.jpg","../image/image_30/30_Valleraugues_3.jpg","../image/image_30/30_Valleraugues_4.jpg","../image/image_30/30_Valleraugues_5.jpg","../image/image_30/30_Valleraugues_6.jpg","../image/image_30/30_Valleraugues_7.jpg","../image/image_30/30_Valleraugues_8.jpg","../image/image_30/30_Valleraugues_9.jpg"]},"Consult_chateau_formulaire4e36-2":{"id":"Consult_chateau_formulaire4e36-2","dept":"30","canton":"Redessan","commune":"Valliguières","nom":"Valliguieres","type":"Château","periode":"XII-XVI","histoire":"VALLIGUIERES, cité en 1156 don du roi Louis XII à l'évêque d'Uzès dont une partie appartenait au comte de Toulouse et après le traité de Paris en 1229 le roi fut co-seigneur avec le chapitre d'Uzès qui cède ses droits à Géraud d'Amicy, baron de Rochefort. La baronnie passe en 1392 par alliance à  François de Laudun autorise les habitants à appuyer les remparts de la communauté contre sa tour. En 1474 à  Louis d'Albaron et sa fille Catherine d'Albaron apporta par alliance la seigneurie à Guillaume de la Baume. A cette date la seigneurie toujours partagée avec les évêques d'Uzès qui changera souvent de main par les héritages et les alliances et achats. Le dernier seigneur est monsieur Barbier  comte de Rochefort qui vendit la seigneurie à la veille de la Révolution à son cousin Roger de Chauzonette et en 1875 monsieur Léon Domergue cède la tour et la tourelle du château  pour y construire l'horloge du village. En 1904, l'actuel clocher et son campanile furent mis en place. Le château est transformé en logements.","architecture":"Valliguières; château fortifié porte le nom des essarts jusqu'au IXe siècle environ. Puis, entre le IXe et le XIIe il est construit  sur les hauteurs, et   devient \" Valliguières \" (Valle Aqua, vallée des eaux) Valliguières. La tour est antérieure au château qui  englobé dans les remparts construits au XIVe siècle. Aujourd'hui  le village fortifié est entièrement rénové, la tour de l'horloge,  la tour d'angle du château et le corps du  logis sont les éléments les plus importants. Une tourelle repose sur une trompe en panache ornée d'une coquille au centre, sa porte fortifiée en plein cintre comportait une herse.","habitants":"Famille de François de Laudun\r\n        \"","divers":"Château de Valliguières et le domaine de St-Martin","gps":"","images":["../image/image_30/30_Valliguieres_1.jpg","../image/image_30/30_Valliguieres_2.jpg","../image/image_30/30_Valliguieres_3.jpg","../image/image_30/30_Valliguieres_4.jpg","../image/image_30/30_Valliguieres_5.jpg","../image/image_30/30_Valliguieres_6.jpg","../image/image_30/30_Valliguieres_7.jpg"]},"Consult_chateau_formulaire7dfc":{"id":"Consult_chateau_formulaire7dfc","dept":"30","canton":"Vauvert","commune":"Vauvert","nom":"Vauvert","type":"Patrimoine","periode":"XIV","histoire":"Trois châteaux à Vauvert de Beck,  et de Vauvert,  plusieurs autres châteaux mais viticoles comme  le  château Boissy d'Anglas, à Gallician, de Roubeau etc.                                                           VAUVERT, en 1306 par Philippe le Bel qui migre vers Tarascon, puis vers le comtat Venaissin  qui était terre du Pape. Rabad de Posquières et son fils Isaac l'Aveugle, puis passa aux Lévis-Ventadour et aux de Foretier. En 1305, Vauvert accueille le pape Clément V, puis Guillaume de Nogaret en 1311. La citadelle fut rasé en 1628 sur ordre de Rohan. Les Hauteville construisirent une nouvelle bâtisse au XVIIe siècle qui passa aux Genas et par alliance aux Jean-Jacques Maurice Reynaud juge-mage au présidial de Nimes est prirent le nom de Reynaud-Génas abandonné à la Révolution, acquis en 1930 par l'évêché  pour en faire un presbytère et une école.                                                         BECK, viticole dépendance des hôpitaux de Nîmes au XVIe siècle, il devient au XIXe siècle la résidence principale de l'historien Prosper Falgairolle. M Jean-Francois Herbinger, né en 1937, en sa qualité de gérant, était dirigeant de la société.","architecture":"Vauvert, dans les années 1590-1600, les remparts sont reconstruits et une nouvelle église bâtie mais en 1622 nouvelle destruction de la cité, le château est rasé.                                                                 L'hôtel de ville du XIXe siècle a perdu le dôme en ardoises qui surmontait l'horloge de sa façade. Il est très représentatif, par la richesse de sa façade, de l'essor économique de ce  village dans la seconde moitié du siècle.\r\nLa tour de l'horloge du XIXe siècle, coiffée d'une toiture à quatre pans en tuiles vernissées, comporte une cloche du XVIIe siècle classée Monument Historique. Cette tour surmonte l'ancienne porte médiévale de Saint-Gilles.","habitants":"Famille de Lévis-Ventadour\r\n        \"","divers":"Patrimoine de Vauvert porte , tour de l'horloge, hôtel de ville et le moulin d'èole","gps":"","images":["../image/image_30/30_Vauvert_1.jpg","../image/image_30/30_Vauvert_2.jpg","../image/image_30/30_Vauvert_3.jpg","../image/image_30/30_Vauvert_4.jpg","../image/image_30/30_Vauvert_5.jpg","../image/image_30/30_Vauvert_6.jpg"]},"Consult_chateau_formulaire6e27":{"id":"Consult_chateau_formulaire6e27","dept":"30","canton":"Pont St-Esprit","commune":"Vénéjan","nom":"Venejan","type":"Château fort","periode":"XIV","histoire":"VENEJAN, au XIIIe siècle, fief de Guillaume de Bermond, la seigneurie est inféodée par Philippe le Bel à Pierre de Béziers qui construisit le château au début du XIVe siècle et passa en 1556 par alliance à Louis Candart d'Ancézune  et toujours par alliance en 1595 à Louis Gaucher d'Adhémar de Monteils, comte Grignan. Son petit-fils en 1669 épousa la fille de madame de Sévigné, le château fut vendu en 1720 au marquis de la Royère Prince de Mondragon, passa  au marquis de la Fare baron de St-Alexandre, un incendie détruisit une grande partie de la construction du marquis de Grignan.  La partie nord, nord-ouest, construite au XVIIe siècle est ravagée. Lieu de combats importants au moment de la Révolution Française, le château fut plus tard racheté par Gilbert de Millaut, gantier de profession. Aujourd'hui Odile de Frayssinet y habite avec son père, le comte Millet de Frayssinet. C'est lui qui a fait entrer ce monument dans la famille en 1955.  À l'époque, il n'y avait rien, tout était à ciel ouvert, on l'a peu à peu sauvé de la ruine totale, les siècles passant, la fière bâtisse est peu à peu tombée en ruines. La partie en état transformé  en hôtel restaurant.","architecture":"Le château médiéval de Vénéjan et sa terrasse plein ciel, surplombant le village et la vallée, construit au début du XIVe siècle, celui-ci y a fait construire la partie principale du château, composée de la grande tour, du bâtiment y attenant et de deux tours de guet, plus à l'ouest, aujourd'hui écroulées. À l'opposé étaient creusées des douves sèches, dont les vestiges sont encore visibles. En revanche, difficile d'imaginer qu'en lieu et place de l'autre sortie du château s'activait auparavant un pont-levis. Une fois fermé, le château était ainsi complètement isolé. Aujourd'hui, joyau du patrimoine, au trois-quarts ruiné, ce château était à l'origine une forteresse de défense. Tours de guet, douves, pont-levis, salle de garde, autant d'éléments destinés à contrer les ennemis. Voire à les enfermer, puisqu'une prison bordait même la cour intérieure.","habitants":"Famille de Louis Candart d'Ancézune \r\n        \"","divers":"Château  de Vénéjan","gps":"","images":["../image/image_30/30_Venejan_1.jpg","../image/image_30/30_Venejan_2.jpg","../image/image_30/30_Venejan_3.jpg","../image/image_30/30_Venejan_4.jpg","../image/image_30/30_Venejan_5.jpg","../image/image_30/30_Venejan_6.jpg","../image/image_30/30_Venejan_7.jpg"]},"Consult_chateau_formulairef875":{"id":"Consult_chateau_formulairef875","dept":"30","canton":"Pont St-Esprit","commune":"Verfeuil","nom":"Verfeuil","type":"Forteresse","periode":"XIII","histoire":"VERFEUIL, cité au XIIe siècle sous la suzeraineté des évêques d'Uzès. La tour de Marcuel tour de guet du château de Verfeuil, la famille de Guillaume d'Audigier seigneur de Verfeuil sa fille voulut épouser Louis de Laroque, le père n'étant pas d'accord fit construire la tour pour enfermer sa fille, malgré cela Louis de Beaufort épousa la fille et devient seigneur de Verfeuil de 1210 à 1344 dans cette période il a appartenu a deux coseigneurs les Rostand de Pujaud et les Carsan et par alliance successives passa à Guillaume d'Audigier et à Louis de Beaufort de Canillac en 1359.  A partir du XIVe siècle  est mentionné comme possession de la famille  de Grimoard de laquelle est issu le pape Urbain V, né en 1309.  Aux Latour Gouvernet en 1444 et fut vendu en 1765 à Bruneau d'Ornac seigneur de Verfeuil, cette famille garde le château jusqu'à la Révolution, pillé et incendié, abandonné, servit à l'armée belge pendant la guerre de 1939-1945, puis à loger les indochinois pour faire du charbon de bois. Il fut acquis par monsieur Robert, agriculteur qui le négligea et en 1961 acquit par une famille de retraité qui le possède toujours.","architecture":"Le château de Verfeuil  sur une pente abrupte surveillant la vallée de Lussan, sapparente aux castra typiques du Languedoc, sur plan triangulaire autour d'une cour plusieurs bâtiments de dépendance dont les murs s'appuient sur une tour carrée à créneaux du XIIe siècle hauteur de 18 mètres, murs épais percés de six archères, la porte d'entrée possédait une herse dont-il ne reste que les rainures. Lensemble des bâtiments qui occupent la terrasse sommitale correspond au château, corps de logis en retour d'équerre du XVe siècle immense cage d'escalier carrée une petite cour ronde à l'angle sud-ouest. La construction la plus massive du château de Verfeuil  était sans doute un logis  mais en labsence de fouilles, il nest pas possible de déterminer la fonction des bâtiments.","habitants":"Famille  de Grimoard \r\n        \"","divers":"Forteresse de Verfeuif","gps":"","images":["../image/image_30/30_Verfeuil_1.jpg","../image/image_30/30_Verfeuil_2.jpg","../image/image_30/30_Verfeuil_3.jpg","../image/image_30/30_Verfeuil_4.jpg"]},"Consult_chateau_formulaire9b98-2":{"id":"Consult_chateau_formulaire9b98-2","dept":"30","canton":"Vauvert","commune":"Vestric et Candiac","nom":"Vestric_Candiac","type":"Château","periode":"XII-XVI","histoire":"CANDIAC ou MONTCALM, dès le XIIe siècle divers coseigneurs possédaient cette seigneurie au XVe siècle passa aux Lévis-Lautrec, vendut en 1459  à Jean le Forestier,  Maguerite de Joyeuse son épouse veuve remarié avec Gaillardet  de Montcalm, Louis II de Montcalm bâti le château entre 1629 et 1632, seigneur de Saint Véran, Candiac et autres lieux. Louis XIII souhaitait récompenser les services du seigneur pour sa participation à la signature de la Paix dAlès. Il permit à Montcalm  d'élever son édifice avec les matériaux issus de la démolition des remparts de Nîmes. Cette belle demeure a bien failli disparaître durant la terrible guerre des camisards,  Certains seigneurs protégeaient  dignement les victimes  des dragons du roi, dans leur château,  cest à cause de ces accointances que lintendant Bâville failli ordonner la destruction du château de Montcalm, mais finalement pillé de tout son mobilier. Lieu de naissance de Louis-Joseph, marquis de Montcalm (1712-1759), défenseur du Québec. Ce château a vu naître le marquis de Montcalm, qu'une statue en bronze de Léopold Morice représente devant le château.  Il fut acquis en 1968 par madame Flandrin-Sauvadet. Le château de Montcalm a été acheté par lInstitut dAlzon en 1999. Il abrite un collège et un centre de formation des apprentis (CFA) des  métiers du cheval.                      Le château de Montcalm au centre du bourg des seigneurs de Calvisson eut plusieurs sucésseurs les Saulvanles Buade et les Turcau XVIe siècle transmirent leurs droits aux Bérard de Tarabias.           Le château de Vestric du marquis de Thoiras qui passa à Jean Barrière aux XVIIIe siècle aux Favier,  aux Baudan et par le marquis de Montcalm en 1730. Aujourd'hui maison de repos pour handicapés.","architecture":"Le château de Montcalm  a été bâti avec les pierres des remparts de Nîmes entre 1629 et 1632, corps de Logis rectangulaire à deux niveaux, cantonné de deux pavillons carrées fronton en demi-cintre et fenêtres à meneaux sur l'ensemble et la façade possède un grand fronton cintré. Deux autres pavillons au nord de plan rectangulaire arasés jusqu'au premier étages,  escalier à double volée.                                                                                                    Vestric, château du XVIe siècle,  corps de logis rectangulaire flanqué de deux tours rondes en façades engagées aux angles et arasées à hauteur du toit.","habitants":"Famille de Montcalm\r\n        \"","divers":"Chaâteau des Montcalm à Vestric et Candiac","gps":"","images":["../image/image_30/30_Vestric_Candiac_1.jpg","../image/image_30/30_Vestric_Candiac_2.jpg","../image/image_30/30_Vestric_Candiac_3.jpg","../image/image_30/30_Vestric_Candiac_4.jpg","../image/image_30/30_Vestric_Candiac_5.jpg","../image/image_30/30_Vestric_Candiac_6.jpg"]},"Consult_chateau_formulaire42c9":{"id":"Consult_chateau_formulaire42c9","dept":"30","canton":"Alès","commune":"Vézénobres","nom":"Vezenobres","type":"Château vestiges","periode":"XIV-XVIII","histoire":"Plusieurs châteaux à Vézénobres, château de Fay-Pérault mairie et  les vestiges de Fay-Pérault, les vestiges  du fort de Montaréches du XIVe siècle, Calvières et Girard.                             VEZENOBRES,  fut une seigneurie vassale de la maison d'Anduze. Il semblerait qu'elle ait eu une certaine importance au XIIe siècle aux seigneurs d'Uzès, au XVIe siècle l'hôtel de Montfaucon   des seigneurs de Vénezobres y habitèrent délaissant le château féodal qui fut construit en 1309 par Guillaume de Plasian, la baronnie passa au baron de Laudun, en 1485 Claude de Montfaucon racheta à son frère Guillaume de Laudun, passa aux Lesgrange et alliance aux Fay-Pérault en 1541. En 1628 l'armée de Rohan détruisit le château et les fortifications. La baronnie passa aux Calvière baron de Boucoiran, le château de Calvière pour  le compte de Charles François de Calvière. \r\nCALVIERE, château conçu vers 1750  par le marquis de Calvière, Alphonse de Calvière seigneur de Vézénobres. Charles-François de Calvière, officier de la Garde Royale, épousa en 1733 Françoise Olympe de Boucoiran, fille d'Alphonse de Calvière, seigneur de Vézénobres et de Boucoiran. Devenu marquis de Vézénobres et baron de Boucoiran, Charles-François décida de construire à Vézénobres un château (1740-1750) avec l'appui de l'architecte Guillaume Rollin d'Alès. Apprécié de Louis XV, le marquis souhaita que ce château symbolise sa réussite. Pour ce faire, il s'inspira fortement du château de Versailles. Légué  en 1870 au comte de Bernis neveu par alliance, Le château appartient aujourd'hui à ses descendants, les Bernis de Calvière. \r\nGIRARD coseigneurs de Vézenobres, construit par la famille de Girard au XIVe siècle    leur descendance échangèrent  le château contre la suppression des impôts. le marquis de Thoiras a vendu le château à la  communauté au XVIIe siècle qui devient l'hotel de ville de Vézenobres.","architecture":"Vezenobres, les vestiges du fort et des enceintes de  Fay-Perault, médiéval construit au XIIe siècle, le seul vestige visible aujourdhui est un pan de mur de 30 m de haut.  il fut agrandi et rehaussé dans le style Renaissance au début du XVe siècle et il fut détruit le 15 Juin 1625.\r\nCalvière, château féodal du XVe siècle, remanié au XVIIIe siècle, bâtiment flanqué de deux ailes à façade classique avec fronton triangulaire, colonnade  et escalier en fer à cheval, cour d'honneur fermée par des grilles en fer forgé.  Ce château fastueux présente une combinaison de classicisme versaillais et de baroque italien.                             Girard, château féodal du XIVe siècle, les soubassements du château abritent l'hôtel de ville loffice de tourisme. Depuis laccueil, on peut découvrir lancien mécanisme de lhorloge, située au-dessus de la Porte Sabran, datant de la fin du XIXe siècle. Ce magnifique ouvrage a été patiemment remis en état de marche grâce aux bons soins de Jean-Pierre Natanek, passionné dhorlogerie, ce château était  intégré aux fortifications urbaines, lesquelles furent durement mises à  mal pendant les guerres de religion. Côté Sud, le château présente  encore une imposante allure.                                                                                             Porte de Sabran, au XVIIIe siècle, elle a été surmontée d'un clocher et de l'horloge. En descendant la rue de l'Horloge, une fois la porte franchie, on remarque l'amorce du mur des remparts et le chemin de ronde sur les hauteurs de la porte, cette dernière doit son nom à la famille Sabran, l'une des plus illustres familles de Provence et du Languedoc qui trôna, dès le XIe siècle, sur le Duché d'Uzès et la baronnie de Sabran.","habitants":"Famille des Montfaucon                                                                       Famille d'Alphonse de Calvière \r\n        \"","divers":"Vestiges du fort de Vézénobres, porte de Sabran, château de Girard  et de Calvière.","gps":"","images":["../image/image_30/30_Vezenobres_1.jpg","../image/image_30/30_Vezenobres_2.jpg","../image/image_30/30_Vezenobres_3.jpg","../image/image_30/30_Vezenobres_4.jpg","../image/image_30/30_Vezenobres_5.jpg","../image/image_30/30_Vezenobres_6.jpg","../image/image_30/30_Vezenobres_7.jpg"]},"Consult_chateau_formulaire688a":{"id":"Consult_chateau_formulaire688a","dept":"30","canton":"Calvisson","commune":"Villevieille","nom":"Villevieille","type":"Forteresse","periode":"X-XII","histoire":"Deux châteaux à Villevieille dont celui de Villevieille et celui de Pondres.  \r\nPONDRES, fief  des Bernard d'Anduze au XIIe siècle qui inféodait la terres de Pondres aux frères Bernard et Jean Fraisnel  leur descendant en été encore propriétaire au XIVe siècle passa ensuite à Bertrand de Ganges, par sa mère, Antoinette de Ganges, Antoine de Brueys, seigneur de Souvignargues et de St-Etienne d'Escatte, en devient le propriétaire. Il vend, le 30 août 1646, le château, terre et seigneurie de Pondres à Pierre Coutelle, secrétaire de la chambre du Roy, qui décède peu après, et par alliance aux Grefeuille et en 1590 aux Crouzet magistrat au présidial de Montpellier qui reconstruisirent le château,  Pierre-Charles de Crouzet épousa Jeanne de Montlaur Bousquet en 1686, après la restauration Isidore de Montlaur musicien remania le château qui avait souffert à la Révolution une partie incendié, Les Villardi-Montlaur le vendirent en 1920 à monsieur Pécout.  Propriété du conseil général du Gard de 2004 à 2006.                   VILLEVIEILLE, à partir du XIe siècle fief des Bermond d'Anduze,  vassaux des comtes de Toulouse, certaines parties de l'édifice date du  XIIIe siècle ce n'est que vers 1365 qu'un certain Pierre Scatisse, trésorier du domaine royal et des États du Languedoc, obtient la seigneurie. Il fit alors agrandir le château et y ajouta 3 nouvelles tours. Après plusieurs passations de propriété, c'est Bernard Pavée maître en la cour de Montpellier qui fit fortifier le château vers 1527. Le site devient en 1573 le quartier général du maréchal de Dampville dans le cadre du siège de Sommières et Louis XIII y logea en 1622 et  en fit son état-major pour le deuxième siège de la cité Baronnie au XVIIe siècle élevée au titre de marquisat pour Abdias de Pavée qui y reçut Louis XIII en 1623. Lors de la Révolution, les bâtiments furent épargnés. La dernière des Pavée  épouse le marquis de Préville, leur fille madame  David-Beauregard ancêtre des propriétaires actuels. Alors qu'il fut inhabité de 1913 à 1960, il souffrit de l'occupation allemande. Depuis, c'est la famille de J. de David Beauregard, qui en entreprit la restauration. Saint-Louis et Louis XIII y séjournèrent tout comme Voltaire, Mirabeau et Cambacérès.","architecture":"Pondres,  construit au XIIe siècle, quadrilatère formé d'un corps de logis  avec deux ailes en retour d'équerre flanquées aux quatre angles de tours carrées, la tour nord  est surmonté d'une petite tourelle  hexagonale couverte d'un dôme à Pans,  il a été fortement remanié au début du XVIIe siècle. A partir du XIIe  siècle, le donjon médiéval, a été ajouté au XVIIe siècle deux ailes reliées par un vaste corps central. De magnifiques terrasses et escaliers ouvrent la perspective vers l'est depuis la cour d'honneur revêtue de traditionnelles calades.                                                                  Villevieille, château du Xe au XIIIe siècle,  une grosse tour rectangulaire dit de Bermont, ce premier château fut saccagé et confisqué pour tomber dans le domaine royal suite à la guerre contre les Cathares. Remanié au XVIe siècle en forme de U autour de la cour d'honneur  fermée à l'ouest par un mur bas couronné d'une balustrade qui ouvre sur une avant cour à laquelle on accède par un portail monumental percé dans l'ancien rempart, façades surélevées avec suppression des meneaux aux  fenêtres, couronnées de fronton cintré, de vastes terrasses donnent sur les jardins, côté entrée deux tours carrées  à toits en terrasses sont accolés sur  la face intérieure une tourelle d'escalier à toit en poivrières. Les mâchicoulis sont supprimés à la Révolution.","habitants":"Famille des Fraisnel                                                                               Fief des Bermond d'Anduze\r\n        \"","divers":"Château de Pondres et de Villevieille","gps":"","images":["../image/image_30/30_Villevieille_1.jpg","../image/image_30/30_Villevieille_2.jpg","../image/image_30/30_Villevieille_3.jpg","../image/image_30/30_Villevieille_4.jpg","../image/image_30/30_Villevieille_5.jpg","../image/image_30/30_Villevieille_6.jpg","../image/image_30/30_Villevieille_7.jpg","../image/image_30/30_Villevieille_8.jpg","../image/image_30/30_Villevieille_9.jpg"]},"Consult_chateau_formulairee49e":{"id":"Consult_chateau_formulairee49e","dept":"30","canton":"Le Vigan","commune":"Vissec","nom":"Vissec","type":"Manoir","periode":"XV","histoire":"VISSEC, en 1570 fief de Jacques de Montfaucon, seigneur,  président à la cour des aides de Montpellier,  baron d'Hierle puis marquis de Vissec. Dépendait de la baronnie d'Hierle.  Christophe de Montfaucon fait réparer la forteresse vers 1646. Le 22 juillet 1654, Pierre de Montfaucon et sa bande sont condamnés à mort par le tribunal de Castres,  Le démantèlement a lieu du 26 au 28 juin 1656, mais Pierre de Montfaucon court toujours. Il est arrêté en 1660 et incarcéré à la Conciergerie à Paris. En 1668, Il est libéré grâce à lintervention du prince de Conti, Louis Armand Ier de Bourbon-Conti. Le 18 février 1668, il signe un acte en son château de Vissec en faveur du prieur de Navacelle Anne-Jacquette du Faur de Pibrac, deuxième épouse de Pierre  Vissec, pour son époux, puis pour son fils Michel. Michel de Montfaucon, marquis de Vissec, baron d'Hierle réside au Vigan, mais séjourne aussi à Vissec, dans la partie du château féodal, réaménagée en manoir, À la mort dAnne de Crouzet, veuve de Michel Marc Antoine César de Montfaucon, en 1762, Jean Alexandre de la Tour du Pin de Gouvernet, beau-frère de la défunte, hérite des biens et des titres de Vissec. En 1792, les biens appartenant à Alexandre-César de La Tour du Pin, marquis de Vissec deviennent des biens nationaux. Le château est pillé. Des lots sont établis pour la mise aux enchères du domaine. Maître Jean-Jacques Capion, notaire au Vigan, les achète tous sauf un, qui est exclusivement composé de terres et qui est acheté par des habitants de Vissec. Le 7 octobre 1862, Louis-Eugène Capion, propriétaire au Vigan, vend à Joseph Bourrier, propriétaire à Roquenouze, cette bâtisse fut réunie en 2000 au décès d'un autre Joseph Bourrier, propriétaire de Roquenouze. Pour plus d'info http://vissec.free.fr","architecture":"Vissec; le 27 août 1628, dans le cadre de la guerre entre protestants et catholiques, le duc de Rohan donne l'ordre à Fulcran II d'Assas de raser totalement le château, les maisons du village de Vissec et le moulin de la Foux. Si les remparts et les points défensifs ont été mis à bas,   le 15 septembre 1655, démolition des fortifications de Vissec et le comblement des fossés. Le démantèlement a lieu du 26 au 28 juin 1656,  un petit domaine situé à Vissec comprenant une maison avec écurie et dépendances, dénommée ainsi dans l'acte de vente, précédemment appelée le château.                                                                                                      Le château vieux dit \"Castellas\", est aujourd'hui en ruine. Il a été remplacé par le château de Pierre de Montfaucon, toujours sur pied, mais construit sur des parties du vieux château. De conception rectangulaire à deux niveaux et attiques.","habitants":"Marquis Alexandre-César de La Tour du Pin\r\n        \r\n        \"","divers":"Manoir de Vissec","gps":"","images":["../image/image_30/30_Vissec_1.jpg","../image/image_30/30_Vissec_2.jpg","../image/image_30/30_Vissec_3.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','30 — Gard'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
