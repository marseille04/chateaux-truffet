les, dominée par les restes d'un donjon de 4,20 x 6,60 mètres accolé au mur  présente en partie basse sur un à deux niveaux un remarquable appareil en calcaire très dur tandis que la partie haute tout comme le corps de logis ou l'enceinte sont construits de manière plus grossière, les joints se sont vidés et de nombreux blocs. Cela marque une phase de construction postérieure que l'étude des archives nous permettrait de situer plus précisément.","habitants":"Famille de Raymond de Rascas\r\n        \"","divers":"Vestiges du château de Belvezet.","gps":"","images":["../image/image_30/30_Belvezet_1.jpg","../image/image_30/30_Belvezet_2.jpg","../image/image_30/30_Belvezet_3.jpg"]},"Consult_chateau_formulaire429f":{"id":"Consult_chateau_formulaire429f","dept":"30","canton":"Vauvert","commune":"Bernis","nom":"Bernis","type":"Village fortifié","periode":"XII","histoire":"BERNIS, édifiée au début du Moyen-Age, et la tour de l'horloge du XIIIe siècle témoignent également de cet attachant passé historique. Pendant cette époque moyenâgeuse, outre famines et épidémies de peste, le village aura à souffrir de la croisade des Albigeois, opposant les armées papales à celles du comte de Toulouse. Le 30 juin 1217, Simon de Montfort à la tête des troupes papales, brûle le village et massacre la plupart de ses habitants. Au XVIIIe siècle, Bernis néchappe pas aux troubles révolutionnaires. Les maires Louis Granier et Antoine Fontaine sont tour à tour emprisonnés dans les geôles nîmoises, le château est en partie détruit, les biens du seigneur Robecq de Montmorency et de léglise saisis et vendus au profit de la nation.","architecture":"Le village situé en bordure de l'antique voie Domitienne reliant Nîmes à Ampurias (Espagne) était autrefois entouré d'une enceinte fortifiée. Aujourd'hui, seuls quelques fragments de bornes milliaires et un mail ombragé d'une double rangée de platanes ceinturant le vieux village groupé autour des vestiges du château en retracent le souvenir. Le château était  bâti sur une motte féodale, il ne reste aujourd'hui que quelques éléments architecturaux remarquables que sont les fenêtres à meneaux et croisillons en pierre ainsi que le fronton triangulaire du portail dont les armoiries seigneuriales ont été martelées pendant la révolution.Les anciens remparts entourant autrefois le village dessinent de nos jours une magnifique rotonde ombragée. Ils ne sont visibles qu'à de très rares endroits comme à l'entrée sud de la Grand Rue qui était l'une des deux portes principales du bourg.","habitants":"Simon de Montfort\r\n        \"","divers":"Vestiges et patrimoine de Bernis","gps":"","images":["../image/image_30/30_Bernis_1.jpg","../image/image_30/30_Bernis_2.jpg","../image/image_30/30_Bernis_3.jpg","../image/image_30/30_Bernis_4.jpg","../image/image_30/30_Bernis_5.jpg"]},"Consult_chateau_formulaired921":{"id":"Consult_chateau_formulaired921","dept":"30","canton":"Béssèges","commune":"Béssèges","nom":"Besseges_Gagnieres","type":"Château","periode":"XVII","histoire":"BESSEGES-GAGNIERES, Bessèges, avant 1790, hameau de la paroisse de Saint-André de Robiac.  Ses forges et ses mines en ont fait une cité.  Fut érigé en commune en 1857, et en chef-lieu de canton en 1868.  Vestiges préhistoriques et antiques époque romaine : exploitation de plomb argentifère et de fer à Trelys. sous l'ancien régime Bessèges n'est qu'un hameau de la paroisse de Robiac. Malheureusement pas d'informations historiques de ce canton de Bessèges qui fut transformé en commune en 1857, et en chef-lieu de canton en 1868  L'essor de Bessèges commence avec la mine, ouverte en 1809 et agrandie après l'installation d'une usine sidérurgique en 1833.     Gagnières, son activité est classée dans la catégorie hôtel  restaurant, son dirigeant est Ludovic Michel Romestan.","architecture":"Bessèges,  ruines du château de Castillon du XIVe siècle, sur une autre  hauteur ruines du château du Castellas tour carrée du XIIe siècle. Château de la Nouvelle à Foussignargues. Château du Grand Vialas, pavillon de chasse du XIIe siècle. Ruines du château de Castillon du XIVe siècle. Château de La Marchande du XVIIe siècle.","habitants":"Seigneurs locaux\r\n        \"","divers":"Châteaux de Béssèges de Gagnières, de la Marchande et la tour de Castillon.","gps":"","images":["../image/image_30/30_Besseges_Gagnieres_1.jpg","../image/image_30/30_Besseges_Gagnieres_2.jpg","../image/image_30/30_Besseges_Gagnieres_3.jpg","../image/image_30/30_Besseges_Gagnieres_4.jpg","../image/image_30/30_Besseges_Gagnieres_5.jpg","../image/image_30/30_Besseges_Gagnieres_6.jpg","../image/image_30/30_Besseges_Gagnieres_7.jpg"]},"Consult_chateau_formulaire16fd":{"id":"Consult_chateau_formulaire16fd","dept":"30","canton":"Le Vigan","commune":"Bez et Esparon","nom":"Bez_Esparon","type":"Château","periode":"XV-XIX","histoire":"Quatre châteaux à Bez et Esparon,  de Bez avec la maison à la Tour, ancienne demeure médiévale dans le village, le château de Massal chambres d'hôtes","architecture":"Château de Bez, du XVIe siècle sur un rocher, deux corps de logis  anciens reliés par un bâtiments  dont la construction datent du XIXe siècle à l'emplacement d'une terrasse, cour fermée, les murs percés de fenêtres à meneaux  et une tour ronde à escalier à vis,  transformé en ferme.                                                                                                    Massal, corps de logis rectangulaire à deux niveaux et attiques toiture brisée en ardoises avec lucarnes  flanqué sur la façade deux tours rondes de même hauteurs toitures en poivrières.","habitants":"Famille Bastier de Villars                                                                      Famille Coupier\r\n        \r\n        \r\n        \"","divers":"Château de Bez, de Lavalette et de Massal","gps":"","images":["../image/image_30/30_Bez_Esparon_1.jpg","../image/image_30/30_Bez_Esparon_2.jpg","../image/image_30/30_Bez_Esparon_3.jpg","../image/image_30/30_Bez_Esparon_4.jpg","../image/image_30/30_Bez_Esparon_5.jpg"]},"Consult_chateau_formulairec66c":{"id":"Consult_chateau_formulairec66c","dept":"30","canton":"Le Vigan","commune":"Le Vigan","nom":"Blandas","type":"Maison forte","periode":"XV-XVIII","histoire":"deux châteaux à Blandas, d'Assas ou Lavit et les vestiges du château de Belfort.                                                                       ASSAS-LAVIT, au Moyen-Age, les religieux de Saint-Guilhem-le-Désert   possèdent des fiefs et des pensions sur lensemble de  la paroisse. Au milieu du XVIe siècle, la famille de Montfaucon fait  édifier au centre du village un fort pour garder la route qui mène à Vissec. De son côté, un seigneur protestant, Fulcrand dAssas décide à partir de 1565 de construire un château à Lavit, véritable poste avancé des huguenots en terres catholiques. Le bâtiment devient un enjeu stratégique majeur. Cest le commencement dune guérilla de plusieurs décennies opposant les Montfaucon, catholiques, à la famille dAssas, protestante. En avril 1577, alors que les guerres de Religion ensanglantent  les Cévennes, les protestants prennent Blandas, ruinent et démolissent entièrement le fort ainsi que les édifices contigus. Fulcrand dAssas (vers 1530-1597) issu dune famille célèbre, il se convertit au protestantisme en 1560 et fait édifier cinq ans après le château qui porte son nom près du hameau du Barral, au grand dam de ses voisins et rivaux catholiques, les Montfaucon qui tiennent la forteresse de Vissec. François Begon de Blandas. (1697-1757) avocat issu dune lignée de juristes viganais, il obtient au début du XVIIIe siècle les charges de Viguier et Juge de la baronnie de Sumène et fait lacquisition de la seigneurie de Blandas. Lui et ses descendants portèrent désormais le nom de Blandas  de Begon. Ses charités et ses dons pour Blandas en font le plus important bienfaiteur local au XVIIIe siècle. Après la famille d'Assas, passa aux Ginestous qui le vendirent au Coularou et depuis 1931 les descendants son propriétaire sous le nom des Aubanel.","architecture":"Assas, belle demeure du XVIIIe siècle, construite entre cour et jardin. L'hôtel possède une distribution et un décor intérieur de grande  qualité, cage d'escalier, alcôves, gypseries, cheminées et menuiseries,  corps de logis rectangulaire à quatre niveaux, un avant corps avec fronton central en façade en faible saillie souligné de bandeaux plats, des refends  formant pilastres et percé au rez- de-chaussée de trois baies plein cintre.                                            A la limite du département le château dAssas ou de Lavit  Il domine la route qui va du Vigan à Lodève, cest un lieu fortifié, avec une belle cour centrale flanquée de quatre tours carrées. Un large escalier à vis et des fenêtres à meneaux complètent cette imposante demeure seigneuriale.                                                  Castrum de Follaquier ou de Belfort mentionné dès 1337 dans le Chartrier dAlzon, il est situé sur une hauteur et bénéficie dune vue imprenable sur la vallée de lArre. Il est rasé lors de la croisade contre les Albigeois puis remis en état par les Montfaucon lors des guerres de Religion, pour être à nouveau démoli en 1584 par les troupes huguenotes.","habitants":"Famille dAssas\r\n        \"","divers":"Maison forte d'Assas et de Blandas","gps":"","images":["../image/image_30/30_Blandas_1.jpg","../image/image_30/30_Blandas_2.jpg","../image/image_30/30_Blandas_3.jpg"]},"Consult_chateau_formulaire93a6":{"id":"Consult_chateau_formulaire93a6","dept":"30","canton":"Uzès","commune":"Blauzac","nom":"Blauzac","type":"Château","periode":"XII","histoire":"BLAUZAC, ce fief fut attribué en 1156 à Raymond du Caylar, évêque  d'Uzès, à Pierre de Deaux en 1353, passa ensuite à Jean de Blauzac neveu  de pierre de Deaux restera dans cette famille jusqu'à la Révolution et sera racheté par la famille de Tristan d'Arbaud racheté dernièrement par monsieur Besnar.   Dès 1147 est mentionné le village de Blaudacum à propos de la deuxième croisade et le castrum de Blauzach en 1156. En 1353, la seigneurie de Blauzac revient à Pierre de Deaux. Bertrand de Deaux, devient cardinal et légat du pape Jean XXII.  En 1569, Jean de Saint-Chamand, chef des protestants s'empare de Blauzac. Après avoir donné deux prélats à l'église catholique, Blauzac fournit des défenseurs acharnés de l'église réformée : Raoul et Jacques Guérin, célèbres camisards, mais aussi Ravanel, né à Malaïgue, qui fut le lieutenant de Jean Cavalier, ennemi juré des dragons du roi. De 1300 à 1789, les consuls de Blauzac ne cessent de présenter des requêtes au roi, portant sur une exemption d'impôt, datant de 1362, en récompense du versement de 250 ducats d'or pour la rançon du roi Jean II.","architecture":"Blauzac ce beau village gardois, bâti sur une colline, possède un château du XIIe siècle,  brûlé par les tuchins en 1382, la construction du château semble remonter à cette époque, bien que la tour à bossages située à l'angle nord-ouest paraisse antérieure. Les ailes forment un quadrilatère cantonné de tours chaînages, reprises de maçonnerie et surélévations dénotent des différentes étapes de construction. L'aile Est présente des dispositions datables  du XIVe siècle. Deux corps de logis en forme de tours carrées sont reliées par une salle basse voûtée en berceau formant terrasse à l'étage. Les deux salles à l'étage des tours sont voûtées sur croisée d'ogives, clés de voûtes et culots sont sculptés de feuillages et de personnages.  La salle de la tour sud possède une cheminée monumentale  en saillie sur la façade et à souche circulaire. La cour a été modifiée  par la construction, en 1773,  d'une nouvelle galerie maçonnée abritant  une galerie et le nouvel escalier.","habitants":"Famille de Pierre de Deaux\r\n        \"","divers":"Château de Blauzac","gps":"","images":["../image/image_30/30_Blauzac_1.jpg","../image/image_30/30_Blauzac_2.jpg","../image/image_30/30_Blauzac_3.jpg","../image/image_30/30_Blauzac_4.jpg"]},"Consult_chateau_formulaireacff":{"id":"Consult_chateau_formulaireacff","dept":"30","canton":"Alès","commune":"Boisset et Gaujac","nom":"Boisset_Gaujac","type":"Château","periode":"XVI","histoire":"Deux châteaux à Boisset et Gaujac;  celui de Boisset et de Lascours.                                                                                         BOISSET ou  MONTVAILLANT en 1219 le fief appartenait à Pierre de Bermond II  dAnduze. En 1243, le roi Saint-Louis, en fait don au sénéchal de Beaucaire et en 1345,  vendus au comte de Beaufort, frère du pape Clément VI.  En 1542, est confié au sieur Claude de Laporte, qui demeure le vassal du comte de Beaufort, en 1634, le fils dAuban et Catherine de Laporte, noble Jean de Petit, seigneur de Boisset,  Charlotte de Montmorency.  En 1736, ses descendants cèdent la seigneurie à Louis Flavard, avocat au parlement et habitant Anduze, exécuté à la Révolution, laisse son bien à sa veuve, Marie de Boisset. Ses fils Pierre-Paul,  Jean et César-Jean se partagent la succession le 24 octobre 1814. En 1822, Pierre-Paul vend sa propriété à Michel Montaud, maire de Boisset. A sa mort, en 1848, M. Montaud laissait deux enfants. Marie-Louise Tirza, mariée le 29 janvier 1826 à Jean-Pierre Eugène Rieu de Montvaillant et Désiré Montaud.    La propriété passe à Mme de Montvaillant. La famille Rieu de Montvaillant était connue à Anduze et à Mialet. Il décède à 79 ans en 1906 et son fils Alfred hérite du château quil vend, pour payer ses dettes en 1932 à un pasteur retraité, monsieur Brunel, qui, à son tour le cède en novembre 1940 à monsieur Elie Cohen.\r\nLASCOURS,  fief au XIIIe siècle appartenait à la maison d'Anduze, passa aux Cilias, aux Bagard et aux Boulogne de Calvisson.  Jérôme Reynaud de Bologne de Lascours, né en 1761 à Gaujac, député et président du corps législatif. Fortuné Reynaud de Bologne de Lascours, né en 1786 à Gaujac, fils du précédent, député et pair de France. De 1830 à 1840  il fut reconstruit par Louis Joseph Reynaud qui le  passa  a la famille de Chaponnay,  et  au prince de Croÿ grande famille de l'aristocratie européenne.  Aujourd'hui à Pierre-Alain Challier.","architecture":"Boisset ou Montvaillant porte des vestiges vieux parfois de plusieurs siècles, oppidum et voie romaine. Le château, devenu maison denfants, servit pendant la guerre de lieu de passage et de refuge à de nombreux enfants juifs puis, une association dAvignon en fit une colonie de vacances.\r\nEn 1948, la confédération du Gard des Anciens Combattants et victimes de la guerre achète la propriété et en fait une maison de repos ouverte en 1952. Elle est rachetée en 1997 par les uvres et Institutions des Diaconesses de Reuilly (O.I.D.R.) qui y installe une maison spécialisée dans laccueil des personnes atteintes de la maladie dAlzheimer. les bâtiments, une échauguette visible à langle ouest nous rappelle que cette demeure a une très ancienne histoire.\r\nChâteau de Lascours du XVIe siècle, remanié au XIXe siècle;  maison forte  avec donjon, corps de logis rectangulaire à deux niveaux  accolés au donjon ancien  prolongés par des ailes servant de maintenances.","habitants":"Famille de Claude de Laporte                                                                     Reynaud de Bologne de Lascours\r\n        \"","divers":"Château de Boisset, de Lascours, de Montvaillant","gps":"","images":["../image/image_30/30_Boisset_Gaujac_1.jpg","../image/image_30/30_Boisset_Gaujac_2.jpg","../image/image_30/30_Boisset_Gaujac_3.jpg","../image/image_30/30_Boisset_Gaujac_4.jpg","../image/image_30/30_Boisset_Gaujac_5.jpg","../image/image_30/30_Boisset_Gaujac_6.jpg","../image/image_30/30_Boisset_Gaujac_7.jpg"]},"Consult_chateau_formulaire9cdb-2":{"id":"Consult_chateau_formulaire9cdb-2","dept":"30","canton":"Calvisson","commune":"Boissieres","nom":"Boissieres","type":"Château fort","periode":"X","histoire":"BOISSIERES,  au Moyen-Age la seigneurie appartenait aux barons de Calvisson, en 1379 à Jean de Vissec, passa au baron d'Aubais  Jacques de Bozène qui le vendit à Nicolas de Calvière en 1557,  gentilhomme du roi Henri III et gouverneur de Nimes, mais surtout ardent protestant, vers 1567 il a commencé à faire édifier au-dessus des habitations une grande maison en forme de château. A partir du 7 octobre 1685  tous les habitants sont obligés d'abjurer le protestantisme. Mme Françoise d'André épouse de Gaspard de Calvière, contrairement à la légende, abjure à son tour le 9 décembre elle avait alors 25 ans. Son époux, Gaspard de Calvière, s'était déjà converti secrètement quelques années auparavant et  deviendra un aussi violent défenseur du catholicisme  que son ancêtre Nicolas l'avait été pour le culte réformé. C'est le premier à vraiment résider au château, il sera assassiné en 1702 alors qu'il rentrait chez lui. Pendant la Révolution le château fut vendu comme bien national abandonné jusqu'en 1905 puis acquit par  Fernand Audemard, sa fille  Fernande Boissier en hérita, le propriétaire aujourd'hui est monsieur Trouchaud petit-fils par alliance de Fernande Boissier.","architecture":"Boissières; construit au Xe siècle sur une butte  de plan rectangulaire, de style féodal défensif, corps de logis rectangulaire à trois niveaux à toits plats, une tour carrée sur un angle du XIe siècle et trois autres tours rondes  sur les autres angles étaient garnies de créneaux et mâchicoulis ainsi que les courtines qui les reliaient, la porte d'entrée avec fronton triangulaire.","habitants":"Famille de Nicolas de Calvière\r\n        \"","divers":"Château fort de Boissières","gps":"","images":["../image/image_30/30_Boissieres_1.jpg","../image/image_30/30_Boissieres_2.jpg","../image/image_30/30_Boissieres_3.jpg"]},"Consult_chateau_formulaire6fd1":{"id":"Consult_chateau_formulaire6fd1","dept":"30","canton":"Quissac","commune":"Boucoiran et Nozières","nom":"Boucoiran","type":"Vestiges","periode":"XII","histoire":"BOUCOIRAN, fief des Pelet d'Alés, acheté en 1310 par  Guillaume de Plaisain conseiller de Philippe  le Bel, le duc du Berry fait saisir le fief par Louis de Grimaldi et repris par les Truchins, passa en indivis jusqu'au XVe siècle, le château servit de prison pour une femme, madame Martiale pour sorcellerie. En 1566  Jacques de Bozène seigneur du lieu vend le château  à Robert de Calvière, le château est délaissé au XVIIIe siècle. En 1947, Giacomo Colombi, 24 ans, vient en France avec sa jeune épouse, ils découvrent la tour du château et décident d'acheter ces ruines. La famille va alors entreprendre la restauration du bâtiment et installer dans la tour, lingénieux système de refroidissement qui donnera au minerai de plomb le statut de plomb de chasse.","architecture":"Boucoiran, cité en 1210, la porte de lagglomération dAlès se situe un tout petit peu plus au Sud, à Brignon, cest Boucoiran qui en est le premier signal fort. Et ce, grâce à sa tour  haute de 38 mètres, que lon aperçoit de très loin et qui domine le village et la plaine du Gardon. Cette tour médiévale, intégrée dans l'enceinte du château, est attribuée au moins au XIIIe siècle et dite Sarrasine,  elle préfigure et anticipe le site suivant, celui de Vézénobre, en fait un repère incontournable. Le château médiéval nombreux détails de lépoque romane, dominée par sa tour  carrée du XIIIe siècle. château aujourd'hui ruiné.","habitants":"Famille de Guillaume de Plaisain\r\n        \"","divers":"Château de Boucoiran et la tour Sarrasine","gps":"","images":["../image/image_30/30_Boucoiran_1.jpg","../image/image_30/30_Boucoiran_2.jpg","../image/image_30/30_Boucoiran_3.jpg","../image/image_30/30_Boucoiran_4.jpg","../image/image_30/30_Boucoiran_5.jpg","../image/image_30/30_Boucoiran_6.jpg"]},"Consult_chateau_formulaire84db":{"id":"Consult_chateau_formulaire84db","dept":"30","canton":"Alès","commune":"Bouquet","nom":"Bouquet","type":"Vestiges","periode":"XII","histoire":"BOUQUET, en 1357 Guillaume d'Allègre est écuyer coseigneur de Bouquet et il reconnait tenir en fief la sixième partie de toute la juridiction du canton  dit château de Bouquet, indivis avec Jourdan de Bouquet, qu'il tient de l'Evêque et du Vicomte d'Uzès.  Dans une seconde phase, une famille seigneuriale unique s'impose, celle des Barjac-Rochegude qui vont dominer la région pendant près de 4 siècles.  Thibaut de Barjac, seigneur de Bouquet et Jean Rovergat qui en tant que prieur de Navacelles est le seigneur principal de cette communauté. Le bayle seigneurial  s'appelle Antoine Chapelier. En 1594 Jacques de Barjac épouse Diane d'Albenas, fille du seigneur de Vallérargues, et le couple s'installe au château de Vacquières, plus récent  et plus hospitalier que celui de Bouquet. L'héritière d'Antoine, sa nièce Louise épouse René de la Tour du Pin, baron de Mallérargues. Par son mariage il devient seigneur de Bouquet et la famille des de La Tour du Pin succède à celle des Barjac, relayée ensuite, toujours par alliance, par celle des Julien au XVIIIe siècle. Le château de Bouquet ne présente apparemment plus de grand intérêt pour ces deux familles qui le cèdent  à la famille Roux  En 1726, Antoine de Julien seigneur de Saint-Laurent la Vernède et la Bruguière et également de Bouquet, Vacquières etc.  Par les biens de sa femme déclare  être le seul seigneur et posséder en haut de la montagne de Bouquet, un vieux château et une forteresse ruinée et non habitable. Peu avant la Révolution, les Julien vendent leurs derniers biens du Castellas, dont les ruines du château à la famille Roux, dont le dernier représentant à Bouquet cède ses biens aux Darroussin.","architecture":"Bouquet fut construit sur un sommet escarpé à la fin du XIe siècle ou au début du XIIe siècle. Le château fut reconnu dès 1156 par le Roi Louis VII. C'est en 1382 que débute le \"Tuchinat\", ce vent de révolte qui rassembla les miséreux et les paysans excédés par les nouvelles impositions. Ils investirent et brûlèrent plusieurs places de la région dont le château de Bouquet. Le  manque de construction postérieure au XVe siècle laisse à penser qu'il fut abandonner au siècle suivant.  si les paysans acquéreurs de biens des anciens seigneurs sont intéressés par les terres, on ne voit pas quel usage ils pouvaient faire des vestiges et ruines du château, sauf à y trouver une carrière de pierres pour la construction de nouvelles habitations ou consolidation de leurs mas.","habitants":"Famille des Barjac-Rochegude \r\n        \"","divers":"Vestges du château Castellas Puech du Bouquet","gps":"","images":["../image/image_30/30_Bouquet_1.jpg","../image/image_30/30_Bouquet_2.jpg","../image/image_30/30_Bouquet_3.jpg","../image/image_30/30_Bouquet_4.jpg","../image/image_30/30_Bouquet_5.jpg"]},"Consult_chateau_formulaire784a":{"id":"Consult_chateau_formulaire784a","dept":"30","canton":"Quissac","commune":"Bragassargues","nom":"Bragassargues","type":"Château-Vestiges","periode":"XII-XVII","histoire":"Deux châteaux à Bragassargues castellas de Roucaute,  et le château des Roux.                                                                      ROUCAUTE, ou de la reine blanche ( Blanche de Castille) de l'enceinte subsistent des vestiges. \r\nROUX, a été construit à la fin du XVIIe siècle par Jacques d'Aldebert seigneur de Roux et de Bragassargues, parents des actuels propriétaires les Moronges exploitants agricoles.  A été la propriété  du baron  d'Aigremont Jean-Baptiste-Louis de Rochemore sa petite fille  qui épousa  monsieur Blanchard qui le vendit en 1890.","architecture":"D'autres traces dune occupation humaine sur le territoire de Bragassargues remontent à la période préhistorique et sont attestées par des céramiques datées des Ve et VIe siècles av. J.-C. découvertes au castellas de Roucaute, et par une enceinte dont subsistent des vestiges. Sur le même site, un château est bâti au XIIe siècle, en restent les murs du donjon et une partie de lenceinte. À cette époque, le hameau de Bragassargues existe depuis au moins deux siècles, il est mentionné pour la première fois en 959, sous le nom de « Bracacianicus », dans le cartulaire de Notre-Dame de Nîmes.  La tour de droite a été en partie détruite pendant la Révolution Française. Château de Roux quadrilatère à deux niveaux flanqué de tours carrées en angles, toitures en terrasse.","habitants":"Blance de Castille                                                                              Famille de Jacques d'Aldebert \r\n        \"","divers":"Vestiges de Ribaute et château de Roux","gps":"","images":["../image/image_30/30_Bragassargues_1.jpg","../image/image_30/30_Bragassargues_2.jpg","../image/image_30/30_Bragassargues_3.jpg"]},"Consult_chateau_formulairef98d":{"id":"Consult_chateau_formulairef98d","dept":"30","canton":"La Grand-Combe","commune":"Branoux les Taillades","nom":"Branoux","type":"Maison forte","periode":"XIX","histoire":"BRANOUX, au XIVe siècle, les co-seigneurs de Branoux sont Jean de Ponsono, Raimond Pélegrin et Jean de Montclar. Les XVIIe et XVIIIe siècles sont marqués par les guerres de religion. Après la révocation de l'Edit de Nantes, en 1685, les protestants se soulèvent contre les troupes de Louis XIV ; cette guerre porte le nom de « Guerre des camisards ». Un chef camisard vit à Branoux à la fin du XVIIe siècle : Gédéon Laporte. Il sera tué dans une embuscade en 1702. Sa tête, ainsi que celle de ses compagnons d'armes, sera exposée sur le pont d'Anduze. En 1846: Un premier puits de charbon est creusé aux Taillades; il s'agit du Puits Mourier. En 1947, la mairie de Branoux déménage; elle s'installe dans une des plus grandes maisons de la commune, la maison Durand-Bonnal construite au XIXe siècle.","architecture":"Un château fort est construit sur un éperon rocheux à La Devêze, le château de Sainte Foix, dominant la vallée du Gardon, lieu de passage important entre Languedoc et Gévaudan. On trouve des vestiges d'anciens chemins médiévaux pavés sur les hauteurs de Branoux.","habitants":"Famille de Durand-Bonnal \r\n        \"","divers":"Maison forte de Branoux","gps":"","images":["../image/image_30/30_Branoux_1.jpg"]},"Consult_chateau_formulairebc82":{"id":"Consult_chateau_formulairebc82","dept":"30","canton":"Le Vigan","commune":"Breau et Sallagosse","nom":"Breau_Sallagosse","type":"Maison forte","periode":"XVI","histoire":"Trois châteaux à Bréau et Salagosse dont le château de Caladon, de Serres et le manoir de Dupont. \r\nCALADON, il date probablement du XVIe siècle, cité comme bien de la famille d'Assas, il passa ensuite aux Bérenger de Caladon, seigneurs de Clapices, puis aux Quatrefages de Bréau pour revenir aux Bérenger de Caladon ou plus exactement à Athénaïs de Quatrefages, épouse d'Emile Bérenger de Caladon, qui le vendit avec le domaine en 1853.                                                        SERRES,  au XIIIe siècle  il est mentionné du temps des Roquefeuil, et fut apporté en dot par une descendante de cette famille, Marguerite de Serres de Bréau, à la famille Dupont de Boussugues. Cette branche éteinte, il passera à Philippe de Bergier puis au d'Assas et à François de Saint-Julien qui le restaurera en 1700.   Passera par acquisition aux Arnal , Maurice d'Arnal, fit faire le pont de Serres entièrement en granit, avec une seule arche et également un griffou, fontaine publique pour les gens du village.  Jean-Marie d'Arnal de Serres cède le domaine à Me Roger Cuche, ancien maire de Bréau-et-Salagosse. il fut la propriété des familles du Pont de Serres puis Quatrefages avant d'être vendu en trois parties entre 1839 et 1843. En 1974, le domaine est transmis à sa fille Suzanne-Madeleine. le château aujourd'hui appartient à madame Schnebelli.\r\nDUPONT, manoir, fut le fief des Assas en 1555, passa par alliance aux Caylou, puis  aux Calandon, au XVIIe siècle ces derniers furent seigneurs de Bréau et en 1765 vendirent la seigneurie aux Quatrefages.","architecture":"Caladon, ou vieux château dans le village du XVIe siècle flanqué d'une tour ronde se prolonge au nord par un beffroi carré avec horloge, il possédait une tour pigeonnier. Au XIXe siècle une aile sud-ouest à été rajoutée.\r\nSerres.  Important logis  remanié au XVIIIe siècle les tours  et les défenses ont été supprimées reste  que deux consoles au dessus de la porte d'entrée.\r\nDupont, manoir de plan rectangulaire à trois niveaux, en pierre de schiste avec tour ronde décentrée et engagée en façade toiture arasée.","habitants":"Famille d'Assas                                                                                      Famille de Calandon\r\n        \"","divers":"Maison forte de Calandon,  de Serres et de Dupont.","gps":"","images":["../image/image_30/30_Breau_Sallagosse_1.jpg","../image/image_30/30_Breau_Sallagosse_2.jpg","../image/image_30/30_Breau_Sallagosse_3.jpg","../image/image_30/30_Breau_Sallagosse_4.jpg"]},"Consult_chateau_formulaireddda":{"id":"Consult_chateau_formulaireddda","dept":"30","canton":"Quissac","commune":"Brignon","nom":"Brignon","type":"Château","periode":"XII-XVIII","histoire":"BRIGNON, dès 1144,  fief  des Raymond de Brignon  qui se succédèrent par héritage jusqu'au XVIIIe siècle. Françoise de Brignon la dernière du nom passa le fief par alliance  à Jean d'Audibert de Lussan fils de Jacques et de Jeanne de Beauvoir du Roure. Au début du XIXe siècle appartenait à la famille des Adhémar-Saint-Maurice.    Brignon, depuis, a été fortement marqué par certains faits de l'histoire : la guerre des camisards, les guerres de religions, où se distinguèrent de nombreux Brignonais. Ce village pittoresque tente de préserver son environnement, notamment son architecture religieuse et civile.                                     Le château Carenou, une maison de maître construite en 1870 par le propriétaire de l'usine de réglisse.","architecture":"Brignon, le village actuel montre de nombreux vestiges des XIIe et XIIIe siècles, l'église, des fragments de mur d'enceinte, les tours d'angles et la tour du château fort. Le « 1893 » inscrit au-dessus de la porte dentrée de la grande salle, nous le laisse penser. En effet, cette ancienne maison, datant du XVIIe siècle. Le logis principal du château et le jardin furent transformés au XVIIIe siècle et les dépendances agricoles furent reconstruites à la fin du XIXe siècle .\r\nLe gros uvre est en pierre de taille et en moellon. Il y a à lintérieur un étage avec un très bel escalier. le village actuel est positionné sur le flanc sud d'une colline, il montre de nombreux vestiges du XIIe et XIIIe siècles : l'église romane, des fragments de mur d'enceinte, les six tours d'angles cinq bien conservés  trois rondes et deux carrées et la tour du château fort.","habitants":"Famille de  Raymond de Brignon\r\n        \"","divers":"Ville de Brignon avec château de Brignon, de Carenou et  de Plagnol","gps":"","images":["../image/image_30/30_Brignon_1.jpg","../image/image_30/30_Brignon_2.jpg","../image/image_30/30_Brignon_3.jpg","../image/image_30/30_Brignon_4.jpg","../image/image_30/30_Brignon_5.jpg","../image/image_30/30_Brignon_6.jpg","../image/image_30/30_Brignon_7.jpg","../image/image_30/30_Brignon_8.jpg"]},"Consult_chateau_formulaire83ff":{"id":"Consult_chateau_formulaire83ff","dept":"30","canton":"Uzès","commune":"Dions","nom":"Buissieres","type":"Château","periode":"XVIII","histoire":"BUISSIERES, construction qui servit de résidence dété aux évêques dUzès, avec divers coseigneurs qui se partageaient le fief dès le XVe siècle, les dupont, les Adhémar, les Marcel, les Joanis de la Roche Saint-Angel, au XVIe siècle, acquis ensuite par les Bouvière de Cernay conseiller d'état qui donnèrent leur nom au château et aux Trinquelague par acquisition au XVIIIe siècle, toujours dans la descendance.","architecture":"Bussières, corps de logis rectangulaire à deux niveaux donnant sur une grande terrasse avec du côté sud deux tours carrées avec faux mâchicoulis et accolés d'échauguettes crénelées encadre l'entrée. Est inscrit sur un linteau en pierre au-dessus dune porte la date de 1707,  se situe dans le mur intérieur parallèle à la rue du Puits Neuf. La grande terrasse surélevée au Nord dont on voit le mur depuis la route est due à Jacques-Philippe Maréchal. Elle a probablement été édifiée vers les années 1755, en même temps que les jardins de la Fontaine étaient restaurés à Nîmes. Au cours des XIXe et XXe siècles il y eut plusieurs extensions, dont la seconde tour située au Sud-Est et deux ou trois pièces pour nen faire quun ensemble.","habitants":"Famille de Bouvière de Cernay\r\n        \"","divers":"Château de Buissières","gps":"","images":["../image/image_30/30_Buissieres_1.jpg","../image/image_30/30_Buissieres_2.jpg"]},"Consult_chateau_formulairec7e8":{"id":"Consult_chateau_formulairec7e8","dept":"30","canton":"Aigues-Mortes","commune":"Cailar","nom":"Cailar","type":"Maison forte","periode":"XIV","histoire":"CAILAR, en 1382, le château primitif est incendié par des Tuchins venant de Beaucaire (les Tuchins sont des paysans révoltés contre le pouvoir central). Après diverses péripéties, le fief passera au XVIe siècle, par le jeu des alliances, aux Baschy dAubais. À la Révolution, il ne reste déjà plus que des traces du château féodal, qui était probablement situé entre les arènes et le cimetière actuel, sur le point culminant du village et qui fut détruit définitivement par le prince de Condé en 1628 durant les guerres de religion. Seul le nom de celui-ci  vient de castellum  château, transformé en Cailus, Cayla, Chayla, Quila en occitan et enfin Cailar, gardera le souvenir de cette importante place forte. À l'extérieur du village, on aperçoit la Tour d'Anglas, ancienne tour d'octroi en direction de la mer, datant du XIVe siècle qui est très bien restaurée. Elle doit son nom au comte François-Antoine de Boissy d'Anglas, noble d'origine protestante et figure de la Révolution Française.","architecture":"Cest en Mars 1280 que fut décidé la construction de la tour dAnglas,  ce bâtiment, un des plus anciens du Cailar, est une tour carrée à péage habitée autrefois par un receveur.","habitants":"Famille de François-Antoine de Boissy d'Anglas\r\n        \"","divers":"Cailar et tour d'Anglas.","gps":"","images":["../image/image_30/30_Cailar_1.jpg","../image/image_30/30_Cailar_2.jpg","../image/image_30/30_Cailar_3.jpg","../image/image_30/30_Cailar_4.jpg"]},"Consult_chateau_formulairee6c6":{"id":"Consult_chateau_formulairee6c6","dept":"30","canton":"Marguerittes","commune":"Caissargues","nom":"Caissargues","type":"Château","periode":"XIV","histoire":"Deux châteaux à Caissargues de Barnier et de Bellecoste.                   Caissargues, La présence du château, dés le XIe siècle, atteste de l'existence d'une seigneurie ou d'une co-seigneurie. D'après une reconnaissance féodale, Noble Pierre Bérenguier de Caissargues et sa femme Agnés possédaient avant l'année 1159 la moitié du sixième de la vignerie de Garons qui leur était inféodée. Au XIIe siècle, Bernard Aton VI, vicomte de Nîmes reçoit le serment de fidélité du seigneur de Caissargues. En 1179, le vicomte se reconnaît vassal du roi d'Aragon, Alphonse II et par un traité lui transmet le château de Caissargues et d'autres places fortes. Au XIVe siècle, Pons de Caissargues est vassal du seigneur de Manduel. Au XVe siècle, Jean Nuzier est seigneur de Caissargues, (1455) ainsi que Pierre de Gaude en 1476. A partir de cette époque, la seigneurie est souvent fractionnée. Aux XVIe et XVIIe siècles, Claude, Jean-Jacques de Large et sont tantôt seigneurs ou co-seigneurs. Au XVIIe siècle, il en est de même pour les de Ricard et les de Barnier.                                                                          Caissargues, maison de Charles-Adolphe Ritter, campagne WHITE HOME, est construit sur un ancien fief qui appartenait, avant 1790, aux chevaliers de Malte.                                         BARNIER, château Barnier, qui aurait été un relais pour les pèlerins de Compostelle, il appartient depuis plusieurs générations à la famille de Meyrignargues, actuellement monsieur Pasquier en est le propriétaire.                                                                    BELLECOSTE, a appartenu à la famille de Chazelles, parent du  marquis  Folco due Baroncelli-Javon, vendu ensuite à Esdouard  Mouret viticulteur toujours dans la descendance.","architecture":"Barnier, pas information historique.                                                Caissargues corps de logis rectangulaire à deux niveaux, support en façade par une série de piliers.                                                       Bellecoste corps de logis rectangulaire à trois niveaux, cantonné de deux pavillons carrées  en saillit sur façade.","habitants":"Famille de Meyrignargues                                                                         Famille de Chazelles\r\n        \"","divers":"Château de Barnier et de Bellecoste","gps":"","images":["../image/image_30/30_Caissargues_1.jpg","../image/image_30/30_Caissargues_2.jpg","../image/image_30/30_Caissargues_3.jpg","../image/image_30/30_Caissargues_4.jpg","../image/image_30/30_Caissargues_5.jpg","../image/image_30/30_Caissargues_6.jpg"]},"Consult_chateau_formulaireac8d":{"id":"Consult_chateau_formulaireac8d","dept":"30","canton":"Aigues-Mortes","commune":"St-Laurent d","nom":"Calvieres","type":"Château","periode":"XVII","histoire":"CALVIERES, ce château appartenait au XVIIe et XVIIIe siècle à la famille de Calvières. La marquise de Bernis Calvières le vend en 1848 à M. Valz. L'architecture date essentiellement du XVIIe siècle mais a été très reprise au milieu  du XIXe siècle.  le propriétaire actuel exploitant viticole.","architecture":"Le château de Calvières des XVIIe et XIXe siècles.  L'architecture date essentiellement du XVIIe siècle mais a été très reprise au milieu  du XIXe siècle présente un plan en L et dans l'angle, se trouve aujourd'hui un logis  qui faisait partie autrefois du château mais qui n'a pas été inclus dans ce dossier. S'étend dans l'angle Nord tandis que les bâtiments de service occupent tout le sud, la façade sur le parc  est plus régulière, mais elle a été reprise au XIXe siècle (baies et balcon), et  rendue symétrique avec la construction  de la tour nord. A l'intérieur, le plus remarquable  sont les plafonds peints de la deuxième moitié du XVIIe siècle  qui subsistent  dans les pièces du 1er étage.  Au centre de cette cour caladée assez vaste, se trouve un emplacement circulaire. Sur cette cour, la façade du château présente deux parties distinctes en hauteur. La partie Est, plus basse, est réservée aux services  et à l'ouest se trouve la construction du XVe siècle avec la tour d'angle. Ce bâtiment présente cinq travées irrégulières et une grande baie avec balcon ouvert. Depuis la place du village, on entre dans  la cour des communs par un grand portail.","habitants":"Famille de Calvières\r\n        \"","divers":"Château de Calvières","gps":"","images":["../image/image_30/30_Calvieres_1.jpg","../image/image_30/30_Calvieres_2.jpg","../image/image_30/30_Calvieres_3.jpg","../image/image_30/30_Calvieres_4.jpg"]},"Consult_chateau_formulaire9e8f":{"id":"Consult_chateau_formulaire9e8f","dept":"30","canton":"Calvisson","commune":"Calvisson","nom":"Calvisson","type":"Château-Vestiges","periode":"XI-XVII","histoire":"CALVISSON, il appartient au vicomte de Nîmes, Bernard Aton V qui le donnera en dot à sa fille Ermessinde lors de son mariage, en 1121, avec Rostaing II de Posquières, seigneur de Vauvert. Ce dernier prend ainsi possession d'un château édifié au XIe siècle sur un promontoire dominant à l'ouest le village, cédé par la maison d'Uzès au royaume de France en 1264.  En 1304 le roi de France Philippe IV de France donne la seigneurie à Guillaume de Nogaret. À sa mort la Baronnie de Calvisson passe aux mains de son neveu Raymond. Le village est administré par deux consuls, preuve d'une certaine autonomie. À partir du XVIe siècle, avec les débuts de la réforme, Calvisson est pris dans la tourmente des guerres de religion. Le village devient un foyer du protestantisme. Les guerres vont petit à petit ruiner le château qui, dès le milieu du siècle suivant, ne deviendra plus que « carrière » de pierres. En 1703, Calvisson se trouve au cur de la guerre des Camisards. Le village sert de base aux troupes royales dans la bataille de Nages contre les forces de Jean Cavalier.\r\nRésidence Margarot, pas d'information historique.","architecture":"Calvisson a alors un château surmonté de deux tours. Cette place forte commande toute la Vaunage, le château fort imposant disposait, à l'origine, de deux puissantes tours d'environ 20 mètres de hauteur ainsi que d'une grande salle de 27 mètres de longueur possédant une belle voûte en berceau. Complètement démantelé durant les guerres de religions au XVIe siècle, il ne sera jamais relevé de ses ruines, servant même de carrière aux habitants du village. En 1714, un moulin à vent est édifié au sommet de la butte qui abritait jadis le château. Comme le « moulin de Cassini », ce dernier sera transformé en mausolée au début du XXe siècle, une coupole circulaire surmontée d'une urne en fonte couronne son sommet.  Margarot. Très élégante demeure de style Louis XV édifiée en pierres de taille tendre au milieu du XVIIIe siècle (1745) sur l'actuelle place du pont et sur une partie du ruisseau couvert de l'Escattes, en face de l'église. La construction présente une aile centrale et deux avants corps sur trois niveaux donnant sur un jardin côté place entouré de belles grilles scellées sur des piliers en forme de colonnes. Remarquer les ferronneries ouvragées des balcons ainsi que les riches menuiseries des portes. Cet immeuble est le seul de ce type en Vaunage pouvant être comparé, par ses qualités et ses dimensions, aux hôtels particuliers des centres urbains importants de l'époque.","habitants":"Famille de Guillaume de Nogaret \r\n        \r\n        \"","divers":"Vestiges et résidense Margarot","gps":"","images":["../image/image_30/30_Calvisson_1.jpg","../image/image_30/30_Calvisson_2.jpg","../image/image_30/30_Calvisson_3.jpg"]},"Consult_chateau_formulaire9e26":{"id":"Consult_chateau_formulaire9e26","dept":"30","canton":"Le Vigan","commune":"Campestre et Luc","nom":"Campestre_Luc","type":"Château","periode":"XIII-XVI","histoire":"quatre châteaux à Campestre et Luc, celui de Campestre, Le Grailhe dit aussi de Lamanderie et le manoir de Salze.  CAMPESTRE, les deux métairies du Luc désignées comme Luc-Haut et Luc Bas appartenaient au Moyen-Age à la puissante famille de Roquefeuil alors établie dans son château d'Algues, sur les hauteurs de Saint-Jean-du-Bruel. Une procédure en justice aboutit en 1258 à la cession par Raymond de Roquefeuil de la métairie du Luc-Bas aux Templiers. Les Roquefeuil cèdent en 1571 le Luc-Haut à la famille d'Aldiguier, originaire de Millau. Campestre fut longtemps le fief des Estiennes de Saint-Martial, passa au XVIe siècle aux Nouville, et au XVIIIe siècle au de Guichard. Les deux métairies seront enfin rassemblées par la famille Marquès en 1798.                            GRAILHE ou LAMANDERIE, fief des Alaman qui passa  au XVIe siècle Pierre et Guillame de Grailhe capitaine des ligueurs, puis par alliance en 1648 de Delphine de Grailhe à Dominique de Montuejols qui le transmette en 1764 à Pierre-Jacques de Faventines, aujourd'hui propriété de monsieur André Saurel.                                                 Le LUC, comme Campestre en 1232 a Pierre Montesquieu  qui  le vende en 1257aux  Roquefeuil, revendut en 1571 aux frères d'Aldiguier qui le conserveront jusqu'au XVIIIe siècle est acheté au XIXe siècle par les Marquès du Luc.                                                SALZE, fief des Montjuejols qui ont fait construire le manoir au XVIe siècle, Dominique de Montuejols était aussi au XVIIe siècle propriétaire du château de la Grailhe, le vendit aux Faventines du Vigan.                                                                                              MAZEL à Alzon  château des vicomtes dAlzon, ancêtres du père dAlzon. Construit par monseigneur Arnal du Curel, évêques de Monaco. À la fin du XVIIe siècle, la seigneurie d'Alzon est acquise par la famille Daudé, établie au Vigan mais originaire de Saint-André-de-Majencoules. Les héritiers de Jacques Daudé seigneur de La Coste et d'Alzon, voient leurs terres érigées en vicomté par le roi Louis XV pour service rendus à la Couronne. Ils restaurent le château. La seigneurie d'Alzon est ensuite cédée en 1766 à une autre famille viganaise, les Faventines. Transformé en logis de France par la famille Recolin.","architecture":"Campestre du XIIIe siècle. Vestiges visibles dans le village. Dont existe le corps principal avec une tour d'angle ronde au nord-est, une échauguette au Sud-Ouest. La tour  carrée a conservée ses meurtrières et ses canonnières et a perdu ses mâchicoulis et créneaux.                                                                                       Grailhe ou des Lamanderie  corps de logis barlong avec galerie qui relie les deux tours qui sont  flanquée d'un côté d'une haute  tour carrée au levant et à l'opposée d'une tour ronde .                                     Le Luc, il reste de l'ancien château deux petites tours d'angles couvertes de dalles.                                                                     Château du Salze (XVIe siècle). Propriété privée, grand corps de bâtiment de plan carrée à deux étages flanqué de trois tours rondes en angles et sur angle sud-est une échauguette, sur la façade sud une porte d'entrée plein cintre surmontée d'un fronton brisé, de la bretèche il ne reste que deux consoles, une tour isolée faisait partie des remparts.\r\nMazel, construit par Arnal de Curet évêque de Monaco.","habitants":"Famille de Roquefeuil                                                                             Famille Daudé\r\n        \"","divers":"Château de Campestre, de Grailhe, du Luc, de Salze et de Mazel.","gps":"","images":["../image/image_30/30_Campestre_Luc_1.jpg","../image/image_30/30_Campestre_Luc_2.jpg","../image/image_30/30_Campestre_Luc_3.jpg","../image/image_30/30_Campestre_Luc_4.jpg","../image/image_30/30_Campestre_Luc_5.jpg","../image/image_30/30_Campestre_Luc_6.jpg"]},"Consult_chateau_formulairefbc6":{"id":"Consult_chateau_formulairefbc6","dept":"30","canton":"Marguerittes","commune":"Manduel","nom":"Campugnet","type":"Château","periode":"XIV","histoire":"CAMPUGNET, en 943 de notre ère apparaît pour la première fois le nom Manduel. Au XIIe siècle, le territoire appartenait aux puissants Comtes de Toulouse.  Campuget  passa au XIVe siècle sous la domination de Guillaume de Nogaret, seigneur et marquis de Calvisson, et resta aux mains de ses héritiers jusqu'à la Révolution Française. Le château de Campuget, cest avant tout laventure dune famille du Nord venue sinstaller pendant la guerre non loin de la Méditerranée, dans les Costières de Nîmes. Au XIXe siècle le romancier suisse  Jacques Chenevrière hérita vendu à maintes reprises, la famille Dalle l'acquit en 1920. Aujourd'hui viticole.","architecture":"Campugnet est constitué d'un corps de logis rectangulaire deux niveaux accolé à une tour carrée à trois niveaux, toiture en terrasse.","habitants":"Famille de Guillaume de Nogaret\r\n        \"","divers":"Château de Campugnet","gps":"","images":["../image/image_30/30_Campugnet_1.jpg","../image/image_30/30_Campugnet_2.jpg","../image/image_30/30_Campugnet_3.jpg"]},"Consult_chateau_formulairecc9d":{"id":"Consult_chateau_formulairecc9d","dept":"30","canton":"Uzès","commune":"La Capelle et Masmolène","nom":"Capelle_Masmolene","type":"Château-Vestiges","periode":"XII","histoire":"CAPELLE, Aujourdhui, la mairie se situe dans un bâtiment neuf à égale distance entre La Capelle et Masmolène.\r\n La Capelle, avec son château féodal du XIe siècle.  Masmolène et son donjon, dernier vestiges du seigneur Adelard, possède une chapelle romane du XIe siècle, jadis incluse dans le rempart, en 1210 le roi Philippe Auguste fait don de la bastide de la Capelle aux évêques d'Uzès qui la transforme en résidence d'été qui la garderont jusqu'à la Révolution, ensuite sera vendu comme bien national acquis en 1822 par la famille  Verdier de Flaux, ne l'occuperont pas utilisé comme exploitation agricole, presque à l'abandon et le revend en 1924 à un agriculteur  monsieur Gayte qui  le cède en 1965 à messieurs Paul Hambury et Schootmeyer, puis  revendu plusieurs fois, en  1977 à une société suisse, revendu à nouveau en 1991 à madame Francine Gomez  ex pdg de Waterman. MASMOLENE était le fief des duc de Rohan. Un acte officiel daté de 1814 atteste que les deux agglomérations forment une seule commune. Dautres sources font remonter la fusion des deux entités, dès le XVIIe siècle. Pourtant, chaque bourg possède encore son église, son bâtiment public qui abritait école et mairie.","architecture":"La Capelle,   construction probable du château mais une ferme fortifiée devait déjà exister sur le site. Château féodal du XIIe siècle admirablement restauré en résidence principale.  Construit en calcaire et en grès de plan rectangulaire, l'enceinte flanquais de quatre tours, une tour carrée du XVIe siècle et de trois tours rondes dont l'une est le donjon délimitant la cour d'honneur bordée d'habitation, la porte à arche de pierre fermé auparavant par une herse  et l'escalier menant à la cour intérieure.                             Masmolène du XIIe siècle détruit sur ordre de Richelieu, reste un pan de mur de la tour maîtresse.","habitants":"Famille  Verdier de Flaux\r\n        \"","divers":"Vestiges du château de Masmolène et château fort de la Capelle","gps":"","images":["../image/image_30/30_Capelle_Masmolene_1.jpg","../image/image_30/30_Capelle_Masmolene_2.jpg","../image/image_30/30_Capelle_Masmolene_3.jpg","../image/image_30/30_Capelle_Masmolene_4.jpg","../image/image_30/30_Capelle_Masmolene_5.jpg","../image/image_30/30_Capelle_Masmolene_6.jpg"]},"Consult_chateau_formulaire96a5":{"id":"Consult_chateau_formulaire96a5","dept":"30","canton":"Quissac","commune":"Cardet","nom":"Cardet","type":"Château","periode":"XVIII","histoire":"CARDET, est un petit village. Dans les années 1700 Cardet appelé Saint-Saturnin de Coiran, il a été essentiellement construit sur la hauteur du mas Cardet, les seigneurs d'Anduze ont construit un château dit de Peschaud sur le bord du Gardon des maisons ont été construites autour de Cardet. Jean Cavalier, né le 28 novembre 1681 à Ribaute et baptisé à Cardet. À partir de 1700, les camisards dévastent les villages catholiques et brûlent les églises. Ils n'hésitent pas à attaquer les troupes royales. En 1704, sa troupe est durement défaite à Nages. Vers 1710, M. de Bouzanquet, seigneur de Cardet, lui donna son allure et aménagea les bosquets. De nombreux héritiers lui succédèrent. En 1738, il devient lieutenant gouverneur de l'île de Jersey. Il meurt à Chelsea le 17 mai 1740. Il fut la propriété de la famille Chapel.  Il avait une maison dans les mas de Cardet qui symbolisait le siège du protestantisme cévenol. Georges Fabre, ingénieur forestier français né en 1844 à Orléans et mort en 1911 à Nîmes. Il vécut dans un petit château de Cardet. Il participa, notamment, à la reforestation active du massif de l'Aigoual. Depuis 1946, le château est la propriété de Mme de Provenchères.","architecture":"Cardet, cohésion du domaine avec des constructions essentiellement du XVIIIe siècle et quelques vestiges du  XVIIe siècle. Le château, quadrilatère à trois niveaux deux pavillons carrées d'entrées avec prolongement de chaque côté terminant à l'angle par une tour ronde et corps de logis en retour d'équerre, la toiture  de la tour en style chapeaux chinois, avec son magnifique parc de 7 hectares, est intimement lié à lhistoire de Cardet. Sa partie ancienne, comprenant des caves voûtées, remonterait au début du XIIIe siècle. Des aménagements et des embellissements interviennent à plusieurs reprises au cours des siècles.","habitants":"Famille Chapel                                                                                        Famille de M. de Bouzanquet\r\n        \"","divers":"Château de Cardet et de Peschaud","gps":"","images":["../image/image_30/30_Cardet_1.jpg","../image/image_30/30_Cardet_2.jpg","../image/image_30/30_Cardet_3.jpg","../image/image_30/30_Cardet_4.jpg","../image/image_30/30_Cardet_5.jpg"]},"Consult_chateau_formulaire4918":{"id":"Consult_chateau_formulaire4918","dept":"30","canton":"Quissac","commune":"Cassagnoles","nom":"Cassagnoles","type":"Château","periode":"XV","histoire":"CASSAGNOLES, au XIIe siècle propriété du prieuré de Saint-Martin de Cassagnoles, qui le fortifièrent à en faire un château fort, en 1220 les Bermond de Sauve qui l'inféoda une moitié à  Gervais de Folhaquier et l'autre moitié à Raymond d'Alairac, la veuve  de Lordet de Chirac en 1400 prétait hommage au comte d'Alès. Au XVe siècle passa  à Pierre Pons Astorg lieutenant du comté d'Alais par alliance sa fille l'apporta en 1450 à Thibaud de Béziers seigneur de Vénéjan, au XVIe siècle propriété de  Charles de Lauberge, marquis de Cassagnoles qui s'éteignit en 1787, les Boileau de Castelnau hérite, puis passa aux Fornier de Mayrard et plus tard aux Ducamp et en 1914 à un banquier nîmois les Nègre, ou naquit Gorginat Dufoix ministre de François Mitterrand. Le château fut acquis en 1987 par les Ritter et les Mistral qui en firent un atelier de cotonnades.","architecture":"Château de Cassagnoles, deux vieilles tours restantes et la tour carrée remaniée au XIXe siècle haute de 13 mètres sont encore visibles, le château  quadrangulaire irrégulier à trois niveaux, la cour intérieure en pavés, porte d'entrée à double arcs brisés séparés par la chambre à herse.","habitants":"Famille de Pierre Pons Astorg                                                                  Naquit Gorginat Dufoix \r\n        \"","divers":"Château de Cassagnoles","gps":"","images":["../image/image_30/30_Cassagnoles_1.jpg","../image/image_30/30_Cassagnoles_2.jpg","../image/image_30/30_Cassagnoles_3.jpg","../image/image_30/30_Cassagnoles_4.jpg"]},"Consult_chateau_formulaireec24":{"id":"Consult_chateau_formulaireec24","dept":"30","canton":"La Grand-Combe","commune":"St-Bonnet-de-Salendrinque","nom":"Castellas","type":"Château","periode":"XI-XII","histoire":"CASTELLAS, fief de la famille d'Anduze, en 1156 Louise de Saint-Bonnet au XIVe siècle l'apporta par alliance aux Caylar prirent le nom de Caylar de St-Bonnet, cette puissante famille de la vallée de Salendrinque modifia au XVe siècle le castellas qui prit sa forme actuelle. Sa descendance en aura la garde jusqu'à la mort de François de Taulignan, qui le transmettra par alliance  aux Taulignan. Peu avant sa mort, François de Taulignan vendit  la juridiction et la seigneurie de Saint-Bonnet à maître Antoine de Bucelli. Un siècle plus tard en 1530 Antoine de Bucelli achète la seigneurie, Jean de de Bucelli hérite de son père, mais à sa mort, la seigneurie est vendue en 1553 à Claude de Vignolles et à Jean Calvet. Le défaut de paiement de ce dernier conduit au partage de la seigneurie entre les familles de Bucelli et de Vignolles. En 1596, Jacques de Vignolles épouse par contrat Isabeau des Urcières de Gaudette, qui, après avoir hérité de sa tante Jeanne, devient seule propriétaire de Saint-Bonnet. Elle entreprend des travaux d'embellissement qui lui donneront son aspect actuel. En 1705 Charles de Vignolles s'exile en Prusse. Le château passe par héritage aux Ginestous et à la Révolution le château appartient à Alexandre de Vissec comte de Ganges, confisqué comme bien national divisé en deux lots vendu à des bourgeois de Lasalle, convertis à des besoins agricoles puis abandonné  et racheté en 1974 par la famille Hantat.","architecture":"Le Castellas élevé au XI-XIIe siècle  sur une éminence dominant la Salendrinque et la ville de Lasalle, d'origine carolingienne, Le donjon Roman témoigne de cette période interrompue par les conséquences politico-militaires de la croisade des Albigeois. Si le  Castellas n'eut  pas à souffrir des troubles Religieux, il n'en fut pas de même  pendant la Révolution. Vendu comme bien national, il tomba dans l'oubli et  fut transformé en exploitation agricole. Très dégradé en 1974, il a fait l'objet depuis lors d'une longue restauration L'architecture du Castellas est mi-féodale, salles du XIIe siècle  avec meurtrières, mi-Renaissance, salles du XVIIe siècle avec cheminée monumentale, chambre gothique avec lit à baldaquin, corniches moulurées, tête  humaine sculptée sous échauguettes. Il comprend un donjon à ciel ouvert, un chemin de ronde et une chapelle. Les appartements sont riches de nombreux éléments décoratifs.","habitants":"Famille d'Antoine de Bucelli\r\n        \r\n        \"","divers":"Château Castellas de Saint-Bonnet de Salendrinque et le château de St-Bonnet.","gps":"","images":["../image/image_30/30_Castellas_1.jpg","../image/image_30/30_Castellas_2.jpg","../image/image_30/30_Castellas_3.jpg","../image/image_30/30_Castellas_4.jpg","../image/image_30/30_Castellas_5.jpg","../image/image_30/30_Castellas_6.jpg","../image/image_30/30_Castellas_7.jpg","../image/image_30/30_Castellas_8.jpg"]},"Consult_chateau_formulaireb82a":{"id":"Consult_chateau_formulaireb82a","dept":"30","canton":"Redessan","commune":"Castelnau-Valence","nom":"Castelnau_Valence","type":"Forteresse","periode":"XIII","histoire":"Deux châteaux à Castelnau-Valence celui de Castelnau et celui de Saint-Dézéry.                                                                           CASTELNAU-VALENCE,  château de Castelnau, autrefois appelé château de Châteauneuf de la Garde, au XIIIe siècle possession de la famille d'Uzès, passa en 1396 à Pons de Thézan, puis acquis en 1486 par Arnaud de Saint-Félix seigneur de Montpezat et passa en 1500 au Boileau, Antoine Boileau trésorier royal restera dans cette famille  jusqu'au  XXIe siècle, aujourd'hui appartient au Valfons par héritage.                                                                           A cinq kilomètres au Sud-Est à Saint-Dézéry  ancienne propriété viticole  exploité en 1936  par monsieur Cambre. Acquit par monsieur Haffner avocat de Genève en 1985 qui la restaurer      société Anonymes des Eaux minérales dEuzet,","architecture":"Château-fort de Castelnau-Valence  édifié  sur les rives du Gardon construit au XII-XIIIe siècle, quadrilatère irrégulier flanqué de quatre tours, deux carrées et deux rondes surélevées de créneaux datant du XIXe siècle, dont une herse et une bretèche  défendaient  l'accès de la poterne  qui donne toujours l'accès au logis par la cour intérieure, chemin de ronde sur enceinte crénelé. Restauré au XIXe siècle, il constitue un magnifique exemple des châteaux forts des XIIe-XIIIe siècle. Quelques unes de ses parties remonteraient même au IXe siècle. Le bâtiment est un superbe quadrilatère à 4 tours; 2 rondes et 2 carrées qui ont par ailleurs été surélevées et crénelées avec l'ensemble des défenses au XIXe siècle, puis à nouveau aux alentours de 1910. La cour est dotée d'une galerie couverte à 2 rangées de colonnes. La chapelle castrale, de type roman, y est très bien conservée. \r\nSaint-Dézéry, quadrangulaire flanqué de quatre tours rondes aux angles, l'une des deux tours donnant sur parc ont été réduite à mi-hauteur, l'autre sert de pigeonnier, deux corps de logis formant un L, il a conservé son chemin de ronde, fenêtres à meneaux  oculus et autres fenêtres de style gothique.","habitants":"Famille d'Arnaud de Saint-Felix\r\n        \"","divers":"Forteresse de Castelnau et le château de St-Dezery","gps":"","images":["../image/image_30/30_Castelnau_Valence_1.jpg","../image/image_30/30_Castelnau_Valence_2.jpg","../image/image_30/30_Castelnau_Valence_3.jpg","../image/image_30/30_Castelnau_Valence_4.jpg","../image/image_30/30_Castelnau_Valence_5.jpg","../image/image_30/30_Castelnau_Valence_6.jpg","../image/image_30/30_Castelnau_Valence_7.jpg","../image/image_30/30_Castelnau_Valence_8.jpg","../image/image_30/30_Castelnau_Valence_9.jpg"]},"Consult_chateau_formulaire3a5f":{"id":"Consult_chateau_formulaire3a5f","dept":"30","canton":"Redessan","commune":"Castillon du Gard","nom":"Castillon_Gard","type":"Château","periode":"XIII","histoire":"Vestiges du château féodal à Castillon du Gard et château de Bellevue.                                                                              CASTILLON du Gard à l'extérieur du village, en direction du nord-ouest se trouvait une belle villa romaine dont les vestiges sont encore visibles, elle était le centre d'une importante propriété agricole où l'on pressait le raisin et les olives. Castillon tire son nom du château, ouvrage défensif protégeant la population. Au moyen-âge le village appelé « Castrum de Castelione » est une possession de l'Evêque d'Uzès. Un consul du village était nommé par l'évêque. Les guerres de religion furent catastrophiques pour Castillon : le village est pris par les protestants en 1568, puis il est repris par le parti catholique deux ans plus tard. Les protestants d'Uzès s'en emparent une nouvelle fois en 1575 et leurs adversaires le reprennent finalement en 1580. Après ces évènements, Castillon est très endommagé. Aujourd'hui néanmoins Castillon est pour les visiteurs un très beau village médiéval, un des plus beau du département du Gard                                         BELLEVUE construit au XVIIIe siècle par  Daniel Mourier.","architecture":"Castillon du Gard est un village médiéval situé à l'extrémité sud des Gorges du Gardon, à seulement 3 km du Pont du Gard. Le village est bâti sur un petit plateau  avancé qui surplombe la vallée du Gardon. La vue porte jusqu'au Pont-du-Gard dont on distingue au loin les arches enchâssées dans la garrigue. Castillon est situé un peu à l'écart des routes qui partent vers Uzès à l'ouest et vers Bagnols sur Cèze au nord.                                                           Bellevue  possède un corps de logis allongés, relie deux grosses tours rectangulaires, à l'ouest deux tours symétriques dont une était habitée par le docteur Niels Kaj Jerne.                                            Le château du XIIIe siècle surveille du haut des 304 m de sa butte, le confluent de la Cèze et de la Ganière. Il pouvait communiquer optiquement avec les châteaux de la région. Les restes visibles des murs d'enceinte sont assez étendus mais la taille de la citerne près de la tour ne permet pas de penser à une garnison nombreuse et permanente.","habitants":"Evêque d'Uzès.\r\n        \"","divers":"Château dans village de Castillon du Gard","gps":"","images":["../image/image_30/30_Castillon_Gard_1.jpg","../image/image_30/30_Castillon_Gard_2.jpg","../image/image_30/30_Castillon_Gard_3.jpg","../image/image_30/30_Castillon_Gard_4.jpg","../image/image_30/30_Castillon_Gard_5.jpg","../image/image_30/30_Castillon_Gard_6.jpg","../image/image_30/30_Castillon_Gard_7.jpg"]},"Consult_chateau_formulaire6c91":{"id":"Consult_chateau_formulaire6c91","dept":"30","canton":"Saint-Gilles","commune":"Caveirac","nom":"Caveirac","type":"Château","periode":"XVII","histoire":"CAVEIRAC, depuis le IXe siècle possessions des comtes de Toulouse avant de passer au XIe siècle à l'abbaye de Saint-André, puis en 1390  à la seigneurie des Buande, puis au XVIe siècle passe au Carles, puis à son gendre Pierre de Robert et en 1648, propriété de l'évêque d'Uzès. est acheté en 1654 par Jacques Boisson, riche drapier de Nîmes, propriétaire des seigneuries du Luc et  de Vaqueirolle épris de grandeur. En 1648, un ancien château féodal propriété de la famille Montolieu est acheté par Jacques de  Boisson  qui entreprend de remplacer son vieux château de Caveirac par une fastueuse résidence, dans laquelle il engloutira des sommes énormes qui l'emmena à la faillite,  vendue en 1696 il décède en 1697.   Le château  acquit par  Pierre de  Sartre secrétaire du roi Louis XIV et receveur général. Ce dernier prend pour constructeur un des meilleurs de Nîmes, en la personne de Jacques Cubizol. Il travaille sous les ordres d'un architecte parisien, Augustin-Charles d'Aviler. Celui-ci est dessinateur à Versailles, ce qui aurait pu l'inspirer pour construire une imitation d'un château royal à Caveirac. Sartre fait lui aussi faillite et en 1713, il vend ses biens à Raymond de Novy qui est receveur des tailles de la ville de Nîmes. Sa lignée gardera le château jusqu'à la Révolution qui subit un incendie  en 1792 détruisant  son charme et son luxe. Le dernier des Caveirac, Léon Jule est emprisonné à Nimes doit son salut à la chute de Robespierrre,  mais suite à l'incendie le château est délaissé et en 1856  livré à des spéculateurs  et partagé par plusieurs propriétaires et également les locaux de l'hôtel de ville.","architecture":"Caveirac, le château  a été construit pendant la seconde moitié du XVIIe siècle, château féodal. En 1826,  en forme de U  trois corps de bâtiment à trois niveaux, cantonné à leurs angles de pavillons carrés  à toitures vernissé, le corps de logis principal percé en son centre par une arcade de passage.  Le château et ses terres sont démantelés. Les particularités de ce « petit Versailles » sont 4 tours, 5 à l'origine,  dont deux seules subsistent en ce début de XXIe siècle avec leurs toitures à pavillon pointues  à la française  recouvertes de tuiles vernissées très colorées à la  mode bourguignonne. vers 1650 très rare dans le midi de la France. Il y avait un parc de près de 40 hectares, un jardin d'hiver protégé par un grand mur et une orangerie avec son jardin de prestige. L'eau arrive d'une source située à plus d'un kilomètre au nord du village.","habitants":"Famille Montolieu\r\n        \"","divers":"Château de Caveirac","gps":"","images":["../image/image_30/30_Caveirac_1.jpg","../image/image_30/30_Caveirac_2.jpg","../image/image_30/30_Caveirac_3.jpg","../image/image_30/30_Caveirac_4.jpg","../image/image_30/30_Caveirac_5.jpg","../image/image_30/30_Caveirac_6.jpg"]},"Consult_chateau_formulaired60f":{"id":"Consult_chateau_formulaired60f","dept":"30","canton":"Bagnols sur Cèze","commune":"Cavillargues","nom":"Cavillargues","type":"Château","periode":"XIV-XV","histoire":"Deux châteaux à Cavillargues celui de la Fare du XVI et celui de Nicolaï.                                                                                          FARE, les Chaudeyrac, originaires de Lozère, furent seigneurs de Cavillargues de 1250 à 1386. La demeure passa par héritage aux La Fare à la fin du XIVe siècle et  resta leur propriété jusqu'en 1779. Des aménagements successifs transformèrent les bâtiments en demeure plus résidentielle, probablement au milieu du XVe siècle. Incendié en 1562 par les religionnaires durement combattus par les La Fare qui étaient catholiques. Acquis en 1779 par le marquis  Louis Scipion de Nicolaï, baron de Sabran, il fut vendu comme bien national, en deux parties en 1791. Restitué  aux descendants  des Nicolaï en 1826, il fut habité parfois par leurs héritiers  jusqu'en 1886. Laissé à l'abandon  pendant trente cinq ans le château fut utilisé comme maison communale. Pendant la première guerre mondiale, des ouvrières y conditionnaient des médicaments.  Gabriel Arnaud, père de l'actuel propriétaire , dont la famille vit à Cavillargues depuis le début du XVIIe siècle, ne  pouvant se résoudre à voir s'effriter cette magnifique demeure, en fit l'acquisition en 1919. aujourd'hui à la famille de Bobot.\r\nNICOLAI, dans cette famille depuis le XVe siècle jusqu'en 1934, au  XVIIIe siècle Louis-Scipion de Nicolaï achète le château de la Fare. Le dernier marquis vendit le château en deux parties à des maçons  dont une partie fut acheté en 1987 par la famille des Pomeys et l'autre partie  est une entreprise d'agence immobilière qui bénéficie d'une forte ancienneté car elle a été créée en mars 2001. Eva Gnadinger en est le dirigeant principal.","architecture":"A lemplacement du château actuel de la  Fare, il nexistait au XIIe siècle quun donjon et une maison forte qui est attestée dès le XIIIe siècle. Cette tour constituait alors le premier ouvrage de défense du village de Cavillargues. Une maison forte se greffe au XIVe siècle et ce nest quau XVe siècle que le lieu devient une  demeure dagrément. En 1562, en pleine guerre de religion, le château est incendié par les Huguenots. Il sera reconstruit cinq ans plus tard  de 1567 à 1571, et les façades édifiées de style Renaissance sont exemplaires pour la région. les anciens remparts ont été détruits en 1793, les deux châteaux qui s'intégraient dans ces fortifications ont eux, été restaurés,  la cour intérieure est délimitée par trois bâtiments disposées en U, l'aile sud à été incendié au XVIIIe siècle.  Une tour à escalier à vis alimente une terrasse.                                                                                       Le château de Nicolay, construit à partir de 1590 est doté d'un corps de logis en équerre à deux étages entre  deux tours rondes, d'un escalier à rampe et d'une porte monumentale datant de la Renaissance.","habitants":"Famille de la Fare et de Louis-Scipion de Nicolaï\r\n        \"","divers":"Château de la Fare et de Nicolaï à Cavillargues","gps":"","images":["../image/image_30/30_Cavillargues_1.jpg","../image/image_30/30_Cavillargues_2.jpg","../image/image_30/30_Cavillargues_3.jpg"]},"Consult_chateau_formulaire5e46":{"id":"Consult_chateau_formulaire5e46","dept":"30","canton":"Alès","commune":"Cendras","nom":"Cendras","type":"Château vestiges","periode":"XII-XVI","histoire":"A Cendras le château  de la Fare et la tour del Puech de Cendras du XIVe siècle.                                                                                 FARE, résidence des Fare au XVII-et XVIIIe siècle, grande famille seigneuriale et  militaires. puis au Pavée de Villevieille. En 1830 au général Meynadier, sa nièce madame Albert en hérita et par alliance la porta à Henri Cabane de Florian qui la vendit  à monsieur Dumoulin qui le transforma en restaurant et à l'abandon depuis la fermeture de ce dernier.\r\nTOUR-PUECH, en 1378 château de la famille del-Puech, Seguin del-Puech seigneur du lieu avait obtenu l'autorisation de  fortifier le nouveau château qu'il avait fait construire à Saint-Martin del Puech aujourd'hui la Fare.  En  1576  la fille  Hélix del Puech  le passa par alliance  à  Jacques de la Fare, baron de Montclar et Salendrinque, sur ordre de Richelieu le château fut détruit  et le marquis alla s'installer au château voisin  de la Fare.","architecture":"Fare; quadrilatère, deux  corps de logis rectangulaire à trois niveaux accolée  à une tour carrée à toit pointu, une orangerie en retour d'équerre, aux angles deux échauguettes trapézoïdales et fenêtres à meneaux.                                                                                                     Del Puech; vestiges dont-il reste une tour carrée ruinée sans couverture  trois étages et terrasse était surtout utilisé comme tour de guet.","habitants":"Général Meynadier                                                                                   Famille de Hélix Del Puech \r\n        \"","divers":"Vestigues du château du Puech et le château de la Fare.","gps":"","images":["../image/image_30/30_Cendras_1.jpg","../image/image_30/30_Cendras_2.jpg","../image/image_30/30_Cendras_3.jpg","../image/image_30/30_Cendras_4.jpg","../image/image_30/30_Cendras_5.jpg","../image/image_30/30_Cendras_6.jpg"]},"Consult_chateau_formulaire3104-2":{"id":"Consult_chateau_formulaire3104-2","dept":"30","canton":"Génolhac","commune":"Concoules","nom":"Chambonnet","type":"Château","periode":"XV-XVII","histoire":"CHAMBONNET, au XIVe siècle le premier propriétaire était Nicolas Vincent, puis Guillaume Vincent passa à Pierre et Jean Blau seigneur de Touillas qui le vendirent en 1375 à Jean Dupasseur, famille des Hérail de Brésis et par alliance à Pons Sarrazin En 1589, comme l'atteste une pierre portant la dédicace du seigneur Pierre de Sarrazin, ce château a été construit pendant la période des guerres de religion qui affectaient la vallée de la Cèze et le chemin de Regordane et avec les matériaux récupérer au château de Brésis. il sera ensuite vendu à une famille de cultivateurs  qui le revend en 1983  à Heini et Jean-Paul Delafont, aujourd'hui le propriétaire est Joop Peterse.                                                    A une dizaine de kilomètres à l'ouest le château de la Grange à Concoules.                                                                               LA GRANGE,   avant le village de Concoules, le château de la Grange est invisible depuis la route dAlès à Villefort dont il est proche. A lorigine simple ferme fortifiée, ce petit château a été construit dans la deuxième moitié du XVIIe siècle, avant dêtre récemment modernisé. Cest luvre des Castanier, ancienne famille de potiers détain devenus viguiers de la baronnie de Brésis. Ils le conservèrent jusquau XIXe siècle. Mme Castanier le donna à son neveu, Jean-Hubert Raoul de Chastaignier de la Grange, qui le vendit en 1891 à Emile Peyric, à sa mort, il fut transmis à ses neveux et appartient depuis une quinzaine dannée à la famille Placide.","architecture":"Chambonnet, le château contrôlait une portion de route entre Planzolles et le Plagniol . Il joua, par la suite, un rôle non négligeable dans la guerre contre les camisards. Son architecture, elle, est toute simple, de plan carré à trois niveaux, en façade fenêtres à meneaux et deux tours à toits coniques.                            La Grange, il est bâti à flanc de coteau sur plan quadrilatère. Les transformations et aménagements ont été conçus pour le rendre plus habitable, sans souci dauthenticité. Tout en granit du mont Lozère taillé sur place. Sous lancien crépi, ont été découverts des fenêtres à meneaux qui sont restées murées. Lentrée est au midi. A langle sud-est, la tour ronde reconstruite en 1840 après sêtre écroulée, porte cette date sur la girouette. La cour intérieure carrée est pavée. Les trois corps de logis sont complétés, à lest, par une galerie sur arcades, dont plusieurs sont bouchées, qui prend jour sur lextérieur. Dans langle sud-ouest, une tour carrée, dépassant les toits,  est couvertes en lauzes comme la tour ronde, alors que les toits sont en tuiles canal.","habitants":"Famille de  Pierre de Sarrazin\r\n        \"","divers":"Château de Chambonnet et de la Grange","gps":"","images":["../image/image_30/30_Chambonnet_1.jpg","../image/image_30/30_Chambonnet_2.jpg","../image/image_30/30_Chambonnet_3.jpg","../image/image_30/30_Chambonnet_4.jpg","../image/image_30/30_Chambonnet_5.jpg","../image/image_30/30_Chambonnet_6.jpg","../image/image_30/30_Chambonnet_7.jpg","../image/image_30/30_Chambonnet_8.jpg"]},"Consult_chateau_formulaireaaa9":{"id":"Consult_chateau_formulaireaaa9","dept":"30","canton":"La Grand-Combe","commune":"Chamborigaud","nom":"Chamborigaud","type":"Château","periode":"XV-XVII","histoire":"Trois châteaux à Chamborigaud, de Montjoie du XVIIe siècle, de Crouzas du XVIIe siècle et de Tagnac du XVe siècle.  CHAMBORIGAUD, fut d'abord un hameau devenu au XVIIIe siècle une paroisse du diocèse d'Uzès, doyenne de Sénéchas. Les habitants se rendirent célèbres pendant la guerre des camisards du 1702 au 1705. En 1867, s'achève la construction du Viaduc de Chamborigaud pour la ligne des Cévennes conçu par Charles Dombre, M. Ruelle, M. Joubert, unique par sa courbe et ses 41 arches. qui avait permit le développement de la soie et du charbon et la construction de ces manoirs.\r\nMONTJOIE, construit au XVIIe siècle par le capitaine de Leyris, passa ensuite au Gabriac de Tignac.  Samuel Miaulet lacquit vers 1900 et décida de lui donner le nom de Montjoie que portaient les derniers propriétaires nobles sous le premier empire. Ce  petit château a toujours été en bon état. Il appartient depuis quelques années à un japonais, M. Yoshii, qui possède une galerie de peinture à Paris, avenue Matignon.\r\nCROUZAS en 1286 de  Dermond de Montclar  résidence des seigneurs de Montclar, en 1431 Almueys de Montclar descendante des Dermond   épousa Guillaume de la Fare,  et au XVIIe siècle à la famille de Leyris, et  des Ponchets qui firent  construire le château   et le garderont jusqu'au XVIIIe siècle, vendu comme bien national à la Révolution à Jean Louis Gardiès passa dans diverses mains, les Mazordier l'acquirent  dans cette descendance jusqu'en 1950, sera utilisé pour des  colonies de vacances avant d'être acquis par monsieur Gras.     TAGNAC la seigneurie relevait des barons de Verfeuil et de Montclar et des Targnac depuis le XIIIe siècle, la bâtisse fut construite au XVIe siècle par le notaire Pierre Poitevin auquel se succéderont les Leyris, les Teyssier du Rosier, les Larnac, les de Clarid et les d'Autun.","architecture":"Chamborigaud dit de Montjoie,  avec tours et tourelles aux angles dépassant les trois niveaux du château, construit au XVIIIe siècle en forme de L  à trois niveaux, cantonné sur les trois angles d'une tour ronde à toitures en poivrières Crouzas; trois corps de logis placés en fer à cheval à deux niveaux, munis de deux tours rondes d'angles dépassant l'ensemble et de deux  échauguettes à toit pointus sur la face arrière.                                                                  Tagnac, construction rectangulaire à deux niveaux possédant aux angles des échauguettes.","habitants":"Famille de Leyris \r\n        \"","divers":"Château de Montjoie, de Crouzas et de Tagnac.","gps":"","images":["../image/image_30/30_Chamborigaud_1.jpg","../image/image_30/30_Chamborigaud_2.jpg","../image/image_30/30_Chamborigaud_3.jpg","../image/image_30/30_Chamborigaud_4.jpg","../image/image_30/30_Chamborigaud_5.jpg","../image/image_30/30_Chamborigaud_6.jpg","../image/image_30/30_Chamborigaud_7.jpg","../image/image_30/30_Chamborigaud_8.jpg","../image/image_30/30_Chamborigaud_9.jpg"]},"Consult_chateau_formulaireeba6-2":{"id":"Consult_chateau_formulaireeba6-2","dept":"30","canton":"La Grand-Combe","commune":"Aujac","nom":"Cheylard_Aujac","type":"Château","periode":"XIV","histoire":"CHEYLARD, symbole du double pouvoir de l'évêque d'Uzès et de la famille d'Anduze, le Cheylard d'Aujac s'installe au XIIe siècle au centre de la haute vallée de la Cèze en Cévennes, il est le dernier représentant intact d'un réseau de fortifications sur un itinéraire déjà existant au Moyen-Age, en 1211 Louis-Philippe dépossède la famille d'Anduze du château du Cheylard en fit don à l'évêque d'Uzès qui le rétrocéda  aux Châteauneuf-Randon, c'est dernier en vendit la moitié à l'évêque d'Uzès en 1311 et le reste à Artaud de Cubières, érigée en baronnie en 1609   qui sera occupé par  les Cubières jusqu'en 1774, année ou il fut acheté par Louis de la Fare et fut acheté en 1805 comme bien national par ses métayers, les Rigal toujours dans la même famille par madame Marceline Rigal-Pouget qui créa l'association de recherche et de restauration  de ce château.","architecture":"Aujac, construit au XIVe siècle, perché à 600 m d'altitude, situé sur un promontoire dominant la Cèze, le château et son village illustrent une évolution castrale sétalant du Moyen-Age à la Renaissance.  il reste aujourd'hui quatre édifices disposés de part et d'autre, d'une ruelle colombier , étable, séchoir et chapelle. Le château est construit  sur plan rectangulaire avec deux corps de logis en équerre  et une cour intérieure, la tour carrée de 20 mètres de haut à la tour ronde,  la tour ronde taluté du XIVe siècle se termine par une plate forme en encorbellement pour former un anneau de mâchicoulis. Sous la protection de ses remparts, un village médiéval fortifié s'installe avec ferme. Maintenant rénové, ce hameau du Cheylard sert comme autrefois à la vie du château est lobjet de recherches scientifiques.","habitants":"Famille d'Artaud de Cubières\r\n        \"","divers":"Château du Cheylard à Aujac.","gps":"","images":["../image/image_30/30_Cheylard_Aujac_1.jpg","../image/image_30/30_Cheylard_Aujac_2.jpg","../image/image_30/30_Cheylard_Aujac_3.jpg","../image/image_30/30_Cheylard_Aujac_4.jpg","../image/image_30/30_Cheylard_Aujac_5.jpg","../image/image_
