ire":"St-AMBROIX,  est une cité historique, les Celtes et les Romains y ont laissé des traces de leur passage. la seigneurie dépendait des évêques d'Uzès avec château cité en 1199  et détruit par Louis XIII.  Le conflit prit fin au mois de mars 1193, par un acte de transaction amiable au sujet de la seigneurie. Il fut passé en lhôpital dAlais, et scellé des plombs de Guillaume de Vénéjan, évêque dUzès, et de Pierre de Bernard dAnduze. Nobles Arnaud, Pons dArnaudet Guibert de Montalet, frères, seigneurs de Montalet et coseigneurs de Saint-Ambroix,  cédèrent à Bernard dAnduze et à son fils Pierre de Bermond, tous leurs droits sur le château de Saint-Ambroix. À leur tour, ces deux derniers cédèrent ces mêmes droits au seigneur évêque dUzès. Celui-ci donna en retour au seigneur dAnduze la moitié de ses droits sur la  ville de Génolhac, à lexception des revenus de léglise, du cimetière. Six ans après, Bermond dAnduze et ses fils reconnurent de nouveau les droits de lévêque en lui faisant hommage pour le château de Saint-Ambroix; en 1629, Suzeraineté à différents seigneurs, parmi lesquels les fameux Bermond d Anduze; il gardera la suzeraineté jusquà la Révolution avec le titre de baron.\r\nFABIARGUES, aujourd'hui maison de retraite et DEBOISSET gite de France.","architecture":"Depuis l'antiquité Saint-Ambroix a grandi au bord de la Cèze, lieu de passage naturel entre la montagne et la plaine. De l'époque celte il reste sur l'oppidum, nommé Plateau du Dugas, lieu de culte dès l'antiquité, où trône le mystérieux \"autel des sacrifices\". A l'opposé, une chapelle du XIXe siècle, plus, une tour carrée, probable vestige de la première église détruite en 1560. Cette tour porte la cloche de l'ancien temple, brisée par les catholiques et refondue par un évêque intégriste, à l'époque de la révocation de l'édit de Nantes. \r\nVestiges de l'ancien château du XIIe siècle sur un rocher.  La Tour Guisquet de style médiéval édifiée en briques, la chapelle du Dugas, curieux édifice. Sa construction est due à monsieur l'abbé Salignon, qui fit construire, grâce à des dons, cette chapelle aux allures de forteresse.","habitants":"Famille de Guillaume de Vénéjan\r\n        \"","divers":"Vestiges de Dugas, la tour Guisquet, le château de Deboisset et de Fabiargues.","gps":"","images":["../image/image_30/30_St_Ambroix_1.jpg","../image/image_30/30_St_Ambroix_2.jpg","../image/image_30/30_St_Ambroix_3.jpg","../image/image_30/30_St_Ambroix_4.jpg","../image/image_30/30_St_Ambroix_5.jpg","../image/image_30/30_St_Ambroix_6.jpg","../image/image_30/30_St_Ambroix_7.jpg","../image/image_30/30_St_Ambroix_8.jpg","../image/image_30/30_St_Ambroix_9.jpg"]},"Consult_chateau_formulairefa83":{"id":"Consult_chateau_formulairefa83","dept":"30","canton":"Le Vigan","commune":"St-André de Majencoules","nom":"St_Andre_Majencoules","type":"Château","periode":"XI-XVI","histoire":"Trois châteaux à Saint-André de Majencoules  celui de Saint-André, des Pauses et du Rey.                                                                 ST-ANDRE de MAJENCOULES,  au XIIIe siècle fief des seigneurs de Sauve, au XVe siècle la famille d'Assas de Chamfort construisirent le château qui fut reconstruit  suite à la révolte du duc de Rohan. Le château vendu à la Révolution à des paysans trop onéreux à l'entretien le rendit à son propriétaire monsieur de la Lignière de Chamfort qui mourut sans héritier, la famille Delpuech de Loméde notable le récupère et y apportèrent des modifications, le fils en hérita,  fut nommé chanoine et en 1955 le château revient à l'évêché et le vendirent à la commune, en 1985 appelé  le manoir Saint-Louis.                                                                                    PAUSES,  fief dépendait de la suzeraineté des seigneurs de Sauve, puis  des Roquefeuil passa aux comtes d'Armagnac barons de Meyrueis, le château du XIe siècle fut détruit au XVIe siècle au cours des guerres de religion.                                                     REY, château qui n'a jamais fait l'objet  d'une vente, le nom des propriétaires a changé par les alliances, aujourd'hui la famille Cazalis de Fondouce  l'ont transformé en 1967 en hôtel restaurant.","architecture":"St-André de Majencoules construit  sur les vestiges d'un ancien manoir dépendant du château des Pauses, façade en trompe-l'il à l'étage  avec la fenêtre à balcon central encadré de deux tours rondes d'escaliers à vis, une statue de la Vierge dans une niche est récente.                                                                                Pauses, le château du XIe siècle fut détruit au XVIe siècle au cours des guerres de religion, emplacement  marqué par une croix plantée il y a quarante ans par la paroisse de Mazel.                             Rey,  quadrilatère  construit au XIIIe siècle pour garder le pont à péage de l'Arre et de l'Arboux, brulé à la Révolution, rénové par Viollet le Duc et rehaussé d'un étage, trois niveaux sur rez-de-chaussée, la façade principale est flanquée de deux tours rondes crénelées à toit pointu, les façades  annexes se caractérisent par la présence d'une tourelle et de fenêtres à croisées, une cour intérieure jouxte le château.","habitants":"Famille d'Assas de Chamfort                                                               Famille Cazalis de Fondouce\r\n        \"","divers":"Château de Saint-André , des Pauses et  de Rey.","gps":"","images":["../image/image_30/30_St_Andre_Majencoules_1.jpg","../image/image_30/30_St_Andre_Majencoules_2.jpg","../image/image_30/30_St_Andre_Majencoules_3.jpg","../image/image_30/30_St_Andre_Majencoules_4.jpg","../image/image_30/30_St_Andre_Majencoules_5.jpg"]},"Consult_chateau_formulaire0b9f":{"id":"Consult_chateau_formulaire0b9f","dept":"30","canton":"Pont-St-Esprit","commune":"St-André de d","nom":"St_Andre_Olerargues","type":"Château","periode":"XVII","histoire":"St-ANDRE-OLERARGUES, Raymond et Pons de Combes coseigneurs jusquen 1440 puis ce fut Giraud de Gardies. En 1426 sa fille Antoinette de Gardies épouse Guignon de Beauvoir du Roure, hérite et cest en 1447 que Grignon de Beauvoir du Roure devient seigneur de Saint-André. Puis en 1454 il vend la seigneurie à Etienne de Montdragon,  son fils Jacques lui succède.  En 1493 vendus à Antoine de Bagnols, Aubert son gendre, fils de Jean Aubert baron de Montclus. Théobald épousa Michelette en 1486, sans enfant. Théobald se remaria avec Gabrielle de Montdragon, fille dEtienne et de Louise de la Baume de Suze. La fille Marguerite dAlbert  fut mariée en 1588 avec Charles dAudibert  seigneur de Lussan, naquit Charles Audibert  comte de Lussan lui succède en 1638. Il épouse Jeanne de Grimoard de Beauvoir du Roure. Leur fils Jean dAudibert deuxième comte de Lussan lui succède en 1674 jusquen 1697,  baron de Valcrose et de Saint-André dOlérargues. En 1604, Antoine Dodol achetait à Charles d'Audibert de Lussan la seigneurie de Christol. Le château  passa par mariage à la famille de Beaumefort,  Jean dAudibert à la fin du XVIIe siècle. En 1697 la seigneurie  passe à Charles de Reynaud de Burguérolles. En 1704 et les terres reviennent à Marguerite-Françoise-Gabrielle dAudibert comtesse de Lussan jusquen 1720, elle épouse en 1719 Jean Drummond duc de Melfort. En 1737 Paul de Reynaud fils de Frédéric Antoine vend la terre de Saint-André à messire Vivet de Servezan. En 1765, à la mort  de Vivet de Servezan il a pour successeur madame Elisabeth de Laurens sa veuve, et Gabriel de Bruey baron dAigalliers son gendre. En 1770 cest François de Brueys,  baron de St-André qui a 19 ans, lui succède, il est page du Roi, capitaine au régiment dAngoumois, mort en 1804 à Tresques, il vend, avant 1789, la terre et la seigneurie à  Bruneau dOrgnac Baron de Verfeuil. En 1816  dame de Niel de Verfeuil veuve dOrgnac vend  aux Sieurs Jean et Antoine Lauron. Le château reste dans la descendance des Lauron jusquà André Dumas qui le vendra à Pascal Bono en 2002. les descendants de la   famille Dumas son propriétaire.","architecture":"St-André-d'Olerargues; château construit en 1630, longue bâtisse rectangulaire à deux niveaux  avec à l'est une grosse tour, et  quatre tours rondes,  huit meurtrières  sur les tours, archères, canonnières,  fenêtres à meneaux en façade sud entre deux tours rondes, une tour hexagonale escalier à vis avec porte protégée par une bretèche.","habitants":"Famille de Grimoard de Beauvoir du Roure\r\n        \"","divers":"Château de Saint-Andre d'Olérargues","gps":"","images":["../image/image_30/30_St_Andre_Olerargues_1.jpg","../image/image_30/30_St_Andre_Olerargues_2.jpg","../image/image_30/30_St_Andre_Olerargues_3.jpg","../image/image_30/30_St_Andre_Olerargues_4.jpg","../image/image_30/30_St_Andre_Olerargues_5.jpg","../image/image_30/30_St_Andre_Olerargues_6.jpg","../image/image_30/30_St_Andre_Olerargues_7.jpg","../image/image_30/30_St_Andre_Olerargues_8.jpg","../image/image_30/30_St_Andre_Olerargues_9.jpg"]},"Consult_chateau_formulairef3c1":{"id":"Consult_chateau_formulairef3c1","dept":"30","canton":"Le Vigan","commune":"St-André de Valborgne","nom":"St_Andre_Valborgne","type":"Château","periode":"XIII-XV","histoire":"Cinq châteaux à Saint-André de Valborgne; des Barbuts du XIIIe siècle, de Folhaquier du XIIIe siècle, de Masvoyer du XVe siècle, de Nogaret du XIIIe siècle et celui de Saint-André.                             ST-ANDRE-VALBORGNE, les Sauvin construisirent le château en 1542 sur des terres acquises au comte d'Alès, passa successivement aux familles de Bérenguier et de la Broche.                   BARBUTS, fief de Guillaume de Saint-Flour en 1407, puis passa aux  Albignac et en 1531 par alliance à la famille de Béringuier avant d'être transmis par mariage à la famille de Broche de Saint-André au XVIIe siècle jusqu'à la vente de la partie orientale en 1827 par Raoul de Broche. En 1750, Charles de Broche de Béringuier décède,  Mathieu de Broche, en 1792, fût élu maire de Saint-André de Valborgne, emprisonné, il fut sauvé de l'exécution grâce à une pétition des  habitants de Saint André de Valborgne.  La famille Blanc propriétaire actuel.                                                   NOGARET, était fief et seigneurie dépendant du comte d'Alès. Au XIIIe siècle première mention de Nogaret et de ses seigneurs Guillaume et Bernard de Montségur, au XIVe siècle Nogaret, aux Manoël puis  appartient aux Gatuzières en Gévaudan.  En 1375, coseigneurie Gatuzières et Gaucelin de Pouzol à Saint-Martin de Campazalade. Gaucelin transmet à un descendant de la Fare. En 1400, Pierre Manoël de Nogaret son épouse Antoinette de Turenne, comte et comtesse d'Alès, la branche aînée, qui conserve Nogaret s'éteint dans la deuxième  moitié du XVIe siècle. D'autres Manoël de Nogaret reprennent le domaine.  Au début du XIXe siècle une de Nogaret épouse un Delon et toujours  dans la ligné des Nogaret le propriétaire aujourd'hui monsieur Mars.                                               MASVOYE,  Henri Guibal  notaire au XVIIe siècle, aujourd'hui propriété de la famille Boudon                                                     FOLHAQUIER; fief des Folhaquier  et aux Frédol ensuite.","architecture":"Barbuts cette demeure fortifiée fut bâtie au début du XIVe siècle. Elle se compose d'un corps de logis rectangulaire à un étage un petit escalier montant au chemin de ronde de la cour intérieure ceinturée d'un rempart avec courtine surmontée sur l'un des angles d'une échauguette circulaire, protégée d'un mâchicoulis sur la porte, une grosse tour carrée à gauche de l'entrée haute de 15 mètres avec meurtrières trous de hourdage et canonnière.\r\nNogaret  ce château qui a subit deux incendies à gardé son style de place forte cévenol, il se développe aujourd'hui autour d'une cour, reconstruit au XVIIe siècle, un quadrilatère renforcé aux deux angles principaux par une tour. Il présente un corps principal au nord à étage sur trois niveaux, dans lequel est ménagé un passage entre la cour et le parc, et deux ailes en retour, l'aile ouest sur deux niveaux qui comporte l'escalier à volées droites, un rez de chaussée voûté d'arêtes et un étage plafonné, l'aile Est comportant quant à elle trois niveaux.                                                                 St-André de Valborgne bâtiment imposant percé de fenêtres à meneaux.                                                                                          Mas-Voyer; grand  bâtiment en deux parties, le bâtiment supérieur rectangulaire couvert de lauzes, la façade principale possède à une extrémité une grosse tour ronde et à l'opposée une échauguette d'angle. Le deuxième bâtiment de plan irrégulier avec une tour carrée percée d'une meurtrière délimite la cour intérieure                         Folhaquier, tour à trois étages, haute de 12 mètres couverte d'un toit pointu, transformé aujourd'hui en pigeonnier.                                Fare; les ruines du château de la Fare mentionné au XIIe siècle.","habitants":"Famille de Bérenguier                                                                                     Famille de  Gatuzières                                                                        Famille Boudon  \r\n        \"","divers":"Château des Barbuts, de Nogaret,  Mas-Voyer et de Saint-André de Valborgne","gps":"","images":["../image/image_30/30_St_Andre_Valborgne_1.jpg","../image/image_30/30_St_Andre_Valborgne_2.jpg","../image/image_30/30_St_Andre_Valborgne_3.jpg","../image/image_30/30_St_Andre_Valborgne_4.jpg","../image/image_30/30_St_Andre_Valborgne_5.jpg","../image/image_30/30_St_Andre_Valborgne_6.jpg","../image/image_30/30_St_Andre_Valborgne_7.jpg","../image/image_30/30_St_Andre_Valborgne_8.jpg","../image/image_30/30_St_Andre_Valborgne_9.jpg"]},"Consult_chateau_formulaireacfa":{"id":"Consult_chateau_formulaireacfa","dept":"30","canton":"Uzès","commune":"St-Chaptes","nom":"St_Chaptes","type":"Tour Château","periode":"XIII-XVI","histoire":"Deux châteaux à Saint-Chaptes, la Tour du XIIIe siècle, et le château de Saint-Chaptes                                                                          La TOUR, vers l'an 1212, est érigé une tour carrée appelée autrefois \"Tour de Gatigne\", mais dont l'origine exacte est inconnue, la partie la plus ancienne du château adossée à cette tour, aurait été une commanderie des Templiers. L'ensemble gardera son aspect primitif durant 5 siècles, il ne sera modernisé qu'au XVIIIe siècle pendant la période du Directoire, par les Chabaud-Latour. En 1306, ce château fut offert par Philippe le Bel à Guillaume de Nogaret et transmis à la fin du XVe siècle à la famille de Brueys, vendu en 1698 à Claude Lombard, bourgeois de Nîmes, puis cédé en 1764 au négociant André Chabaud, à la mort de son père Antoine Chabaud est fait baron, le 22 novembre 1817 et devient Antoine-Georges-François baron de Chabaud-Latour.  Après la Révolution, le nouveau propriétaire, le baron de Larcy, Roger Saubert de Larcy, propriétaire du château de la Tour à Saint-Chaptes à partir de 1835. le domaine échut aux  descendants du baron de Larcy à  son petit-fils Jacques marquis de Lordat depuis 1943.                                                                                                  ST-CHAPTES,   le bourg de Saint-Chaptes conserve une partie de son enceinte, dont le château  formait la défense Sud-Est. Il aurait été pillé en 1217. La famille du Caylar y est attestée dès 1274. Mais en 1306, Philippe le Bel les dessaisit de ce fief et l'attribue à Guillaume de Nogaret. La fille de Pierre du Caylar épouse Pierre de Brueys. Le château est alors agrandi. Suite à des difficultés financières, Louis XIV, conteste l'héritage de Nogaret, et, le 27 Juillet 1727, par arrêt parlementaire, l'adjuge à Claude Baguet, bourgeois de Nîmes et créancier d'Henri de Brueys. Un de ses descendants le revendra en 1803 à une comtesse de Brueys. Aujourd'hui propriétaire la famille Nègre.","architecture":"Tour du XIIIe siècle, remanié au XIXe siècle, la Tour a été couronnée par Viollet-Le-Duc, carrée crénelée et munie de bretèches. Elle y perdit son traditionnel toit de tuiles. Une galerie couverte, éclairée de fenêtres à meneaux, communique avec la partie \"Directoire\" en équerre. Surmontée d'une tourelle crénelée  munie de bretèches. reliée au sud-ouest à une galerie couverte éclairée de fenêtres à meneaux,  communiquant avec les  bâtiments  en équerre,  ces derniers comprennent un corps de logis central à trois fenêtres donnant au sud sur le parc et accolé de pavillons.                                                                                               St-Chaptes, les restes du rempart, remontant au XIVe siècle, comprennent deux tours, formant  l'entrée du château. Le rempart a été remonté au XIXe siècle ces deux tours rondes de diamètres inégaux, couronnées de tuiles et d'une génoise, encadrent le portail d'entrée. Elles ne mesurent que huit mètres de hauteur, ayant été écimées à la Révolution, en même temps que deux autres qui furent détruites. Il reste peu de traces du castel médiéval, englobé dans les bâtiments ultérieurs construits avec ses pierres en remploi. Seule quelques meurtrières. A l'intérieur de la cour, une tour ronde accolée au coin d'une aile plus haute, est datée de 1613. La porte Louis XIII, surmontée d'un fronton brisé, s'ouvre sur une belle cage d'escalier à quatre noyaux, avec des balustres de pierres à section carrée. Au premier étage se trouve le salon, où, après la \"Paix d'Alais\" (Alès), Louis XIII et le cardinal de Richelieu reçurent les délégués protestants et y séjournèrent du 29 juin au 2 juillet 1629. Cette pièce a gardé son plafond de poutres à la Française, alors que partout ailleurs le style \"Empire\" a prévalu.","habitants":"Famille de Brueys                                                                               Famille du Caylar \r\n        \"","divers":"Le château et la Tour de St-Chaptes","gps":"","images":["../image/image_30/30_St_Chaptes_1.jpg","../image/image_30/30_St_Chaptes_2.jpg","../image/image_30/30_St_Chaptes_3.jpg","../image/image_30/30_St_Chaptes_4.jpg","../image/image_30/30_St_Chaptes_5.jpg","../image/image_30/30_St_Chaptes_6.jpg","../image/image_30/30_St_Chaptes_7.jpg"]},"Consult_chateau_formulairec7bb":{"id":"Consult_chateau_formulairec7bb","dept":"30","canton":"Alès","commune":"St-Christol les Alès","nom":"St_Christol_Ales","type":"Château fort","periode":"XII-XVII","histoire":"Trois châteaux à Saint-Christol les Alès, Arènes du XIIe siècle (voir article), de Montmoirac du XVIIe siècle  et de Saint-Christol les Alès du XVIIe siècle.                                                                       ST-CHRISTOL, au début il y eut une tour carrée, autour de laquelle sest ajouté le château. En 1652, Henry de Trémolet fait officiellement lacquisition de la terre et du château de Saint-Christol et réunit ainsi les trois seigneuries (Montmoirac, Montèze et Saint-Christol).  En 1748, possession du marquis Jean-Baptiste de Trémolet quil disait tenir de son grand-père lui-même lavait acquis  du marquis de Faye, seigneur de Vézénobres, et  lavait réuni à la seigneurie de Montmoirac. En 1782, Jean Trémolet de Montmoirac vend ses trois terres (Montmoirac, Montèze et Saint Christol) à Jacques Destremx. Commence alors une nouvelle époque pour le château de St-Christol, l'ère Destremx jusqu'au XXe siècle ensuite le château passe à Richard Ducros, puis à M. et Mme Tupin en 1964, qui  lont fait presque entièrement restaurer.                                MONTMOIRAC, ce château fort d'origine carolingienne (VIIIe siècle) semble bien être le véritable ancêtre  de la commune.  A lépoque de la croisade des Albigeois au XIIIe siècle, le château était la propriété de la maison seigneuriale des Bernard dAnduze, alliée aux comtes de Toulouse, puissants rivaux du Roi Philippe II Auguste. Vers la fin du XIIIe siècle, le lieu devient une nouvelle puissance avec la maison des Sérignac. En 1301, sous le règne de Philippe IV le Bel, Guillaume de Sérignac  damoiseau. En 1629, lors du siège dAlès, Louis XIII a couché à Montmoirac dans la nuit du 11 au 12 juin, le seigneur était alors Jean Baptiste de Trémollet Montpezat, marquis de Montmoirac, seigneur de Saint-Christol. Il semblerait que le château soit resté inhabité tout au long du XVIIIe siècle. Le 13 septembre 1782, Jean de Trémolet, 4e du nom, marquis de Montmoirac, seigneur de Montèze et de Saint-Christol, vendit ses terres à M. Jacques Destremx. Pendant la Révolution les créneaux furent supprimés, et reconstruits ensuite par Léonce Destremx. En 1924, le château fut vendu par ses descendants à M. Thérond, qui le revendit deux ans plus tard à M. Génolhac, grand-père du propriétaire actuel.","architecture":"St-Christol les Alès,  de conception rectangulaire de deux étages édifiée sur un terrain de deux hectares clos de murs. La façade sud est cantonnée de deux tours dangle, rondes, de même hauteur que le toit. Au milieu de la façade opposée  la grosse tour carrée crénelée  domine les toits en tuiles, elle est percée de fenêtres à traverse de pierre, les meurtrières ont été agrandies et les canonnières bouchées, au sud la porte d'entré plein cintre surmontées d'armoiries, à l'ouest  il est relié par un pont sur arcades aux dépendances qui forment une grande cour carrée.     Montmoirac, d'aspect massif construction en forme de U ouverte au sud, le grand corps de logis au levant est flanqué aux angles de deux tours rondes crénelées ayant perdues ses créneaux à la Révolution restitués au XIXe siècle,  la grosse tour carrée crénelée avec échauguette d'angles,les murs d'enceintes ont disparu.","habitants":"Marquis Jean-Baptiste de Trémolet                                                        Famille de  Jean de Trémolet\r\n        \"","divers":"Château fort de Saint-Christol les Alés et de Montmoirac.","gps":"","images":["../image/image_30/30_St_Christol_Ales_1.jpg","../image/image_30/30_St_Christol_Ales_2.jpg","../image/image_30/30_St_Christol_Ales_3.jpg","../image/image_30/30_St_Christol_Ales_4.jpg","../image/image_30/30_St_Christol_Ales_5.jpg","../image/image_30/30_St_Christol_Ales_6.jpg","../image/image_30/30_St_Christol_Ales_7.jpg"]},"Consult_chateau_formulaired328":{"id":"Consult_chateau_formulaired328","dept":"30","canton":"Calvisson","commune":"St-Clément","nom":"St_Clement","type":"Château","periode":"XVII","histoire":"St-CLEMENT, siège d'un important prieuré-cure relevant de l'évêque de Nîmes, a été le théâtre d'importants combats pendant les guerres de religion. Son église a alors été complètement détruite. Au XVIIe siècle le seigneur Antoine de Marc  seigneur également de Calméte, monsieur Huguet fut propriétaire au début du XIXe siècle  puis le domaine fut partagé par divers propriétaire.  En 1850 le château fut acquis par la commune qui a entrepris sa reconstruction ainsi que la restauration d'un beau petit château flanqué de tours. Il y installèrent un presbytère.","architecture":"St-Clément, château  sur la place du village construction du XVIe siècle de plan carré flanque de quatre grosses tours d'angles rondes, toits à quatre pentes, à deux niveaux plus combles. Escalier à vis dans la tour gauche.","habitants":"Seigneur Antoine de Marc\r\n        \"","divers":"Château de Saint-Clément","gps":"","images":["../image/image_30/30_St_Clement_1.jpg"]},"Consult_chateau_formulaireaf81":{"id":"Consult_chateau_formulaireaf81","dept":"30","canton":"Quissac","commune":"St-Félix de Pallières","nom":"St_Felix_Pallieres","type":"Château","periode":"XVI","histoire":"St-FELIX-PALLIERES, dit le château des trois seigneurs, au XIIIe siècle fief des Saint-Félix,  Arnaud  de St-Félix  le dernier de cette ligné décède en 1360 sa veuve apporte le fief en seconde noce à  Guillaume de Claret chevalier que la descendance  gardera deux siècles. En 1614 le domaine passe par alliance de Françoise de Claret et Jean Grégoire de Gardiès vicomte de Montpeyroux, leur descendance s'éteint au XVIIIe siècle dans la famille de Dax-d'Axat.  En 1912 Louis de Seynes hérite du château que son père avait acheté fait des remaniements et par alliance passe  à la baronne Demarçais née Monique de Seynes, puis à monsieur de Luze. Aujourd'hui le propriétaire est madame Gilberte Garcia depuis 1990, qui lui donne l'aspect qu'il avait auparavant.","architecture":"Saint-Félix de Palières, construit au XIIe siècle remanié au cours des ans et incendié en 1703 par les camisards et incendié à nouveau en 1792. composé d'une série de bâtiments hétéroclites dont la majeure partie doit être amputée au XIXe siècle. Construit sur un plan en L avec un corps de logis  au nord et un autre à l'ouest, le plus ancien date du XIVe siècle à deux étages et demi il est relié à l'ouest par un bâtiment plus bas, l'accès à l'ouest par un porche plein cintre surmonté d'une bretèche haute de deux mètres cinquante. Dans l'angle sud une grosse tour ronde coiffée d'un toit plat couvert de tuiles. La façade sud du bâtiment reliant les deux corps de logis est percée de trois grandes baies cintrées ouvrant sur la terrasse qui communique avec la cour  par un escalier double en fer à cheval bordé de balustres.","habitants":"Famille de Dax-d'Axat\r\n        \"","divers":"Château de Saint-Felix de Palières","gps":"","images":["../image/image_30/30_St_Felix_Pallieres_1.jpg","../image/image_30/30_St_Felix_Pallieres_2.jpg","../image/image_30/30_St_Felix_Pallieres_3.jpg","../image/image_30/30_St_Felix_Pallieres_4.jpg"]},"Consult_chateau_formulaire6a8f-2":{"id":"Consult_chateau_formulaire6a8f-2","dept":"30","canton":"Le Vigan","commune":"St-Hippolyte du Fort","nom":"St_Hippolyte_Fort","type":"Fort Vauban","periode":"XII-XVII","histoire":"St-HIPPOLYTE le Vieux, au XVIIe siècle, Saint-Hippolyte-du-Fort, place-forte protestante, se soumet à lautorité royale pour éviter dêtre brûlée. En application de la Paix dAlès (1629), ses remparts, furent construits, suivent les méandres du Vidourle depuis la tour de guet St-Jean jusquau fort Vauban. La ville est alors sous la surveillance des dragons du Roi. Le fort sert de prison et de quartier général dans la  lutte contre les camisards, sont détruits et le culte réformé interdit en 1678. Avec la révocation de lÉdit de Nantes en 1685. Basville, intendant du Languedoc. Le fort dont le nom de la ville porte trace fut édifié entre 1687 et 1689 par François Ferry, ingénieur de Louis XIV, sur le modèle bien connu des forts Vauban  pour  contenir  les protestants des Cévennes, il s'agissait, pour le pouvoir royal de créer une place de sûreté et de surveillance des protestants de la ville.  Il serait consécutif au passage de Blanche de Castille dans une ville où elle naurait pu dormir à cause du chant des cigales.                                                                  Sur la route de Lasalle le château de FIGARET château ferme de Louis de Bousquet négociant devenu seigneur du lieu en 1762.","architecture":"La tour Saint-Jean, renommée mystérieusement « tour Saint-Louis » sur les documents au début du XXe siècle. Ouvrage défensif à la porte de Cros et point névralgique des fortifications du XVIIe siècle face aux vallées cévenoles.\r\nLe Fort, c'est sans doute le monument le plus remarquable de la ville avec le grand temple, et qui lui donna son nom. Aujourd'hui privé de ses principaux éléments défensifs, il reste cependant une magnifique homogénéité architecturale.\r\n Figaret château ferme du XVIIIe siècle, ancien fort, fin  du XVII-XVIIIe, les casernes, construites sous Louis XIV pour loger les dragons, elles sont transformées en garnison par Napoléon III. Chaque bâtiment porte le nom dune victoire : Marengo, Isly. Au XIXe siècle, le général Boulanger y fonde lécole militaire des Enfants de Troupe.","habitants":"Ingénieur François Ferry                                                                           Famille de Louis de Bousquet \r\n        \"","divers":"Vestiges du castellas et du fort de Roquefourcade, la tour Saint-Jean, la Caserne et le château de Figaret.","gps":"","images":["../image/image_30/30_St_Hippolyte_Fort_1.jpg","../image/image_30/30_St_Hippolyte_Fort_2.jpg","../image/image_30/30_St_Hippolyte_Fort_3.jpg","../image/image_30/30_St_Hippolyte_Fort_4.jpg","../image/image_30/30_St_Hippolyte_Fort_5.jpg","../image/image_30/30_St_Hippolyte_Fort_6.jpg","../image/image_30/30_St_Hippolyte_Fort_7.jpg","../image/image_30/30_St_Hippolyte_Fort_8.jpg","../image/image_30/30_St_Hippolyte_Fort_9.jpg"]},"Consult_chateau_formulairee43b":{"id":"Consult_chateau_formulairee43b","dept":"30","canton":"La Grand-Combe","commune":"St-Jean du Gard","nom":"St_Jean_Gard","type":"Château","periode":"XVI-XVII","histoire":"Plusieurs châteaux à St-Jean du Gard, dont celui de St-Jean du XVIe siècle , le Calcadis vestiges, de Cabrières du XVIIe siècle, de Marcassargues du XVIe siècles, du Maylet et de Sueilhes du XVe siècle.                                                                                            ST-JEAN du GARD, fief de la seigneurie créée par François 1er. De nombreux personnages illustres séjournèrent en ses murs, tel, le château ayant appartenu à la famille de Jean de Saint-Bonnet, qui devint le célèbre maréchal de Thoiras, le duc de Rohan, Basville intendant du Languedoc, le comte de Broglie, le duc de Noailles, le maréchal de Montrevel, le maréchal de Villlars, tous liés aux guerres de religion qui marquèrent les Cévennes,  monsieur Guillaume de Girard lui donna l'aspect actuel. Il fut acquis en 1995 la la famille André.                                                                    CABRIERES, en 1625 était la propriété du capitaine Pierre Lafon qui a épousé Gabrielle de Belcastel de Montvaillant passa par alliance par leur petite-fille Nimple qui épousa Jacques de Vignolles seigneur de Laval de Montvaillant  sans enfant fut attribué en héritage à Julien Delacoste officier des dragons qui le revendit  à Jean-Elie de Salvaire Baron d'Aleyrac, passa aux Verneuil au XIXe siècle  et au Pallé au XXe siècle, puis a Jacques Roger qui la transformé en hôtel.                                                                   MARCASSARGUES, fief de la famille d'Assas qui construisit le château au XVe siècle où naquit Jean de Plantavit fils d'Isabeau d'Assas, ancien ministre  devient aumônier de Marie de Médicis, puis en 1625 évêque de Lodève. La famille d'Assas dont le château fut saisi suite à des difficultés financières passa par adjudication à Pierre Caulet seigneur de Thoiris dont le fils le revendit en 1737 aux Manoël d'Algues, changea plusieurs fois de propriétaire au XIXe siècle et en 1980 acquit par monsieur von Boetticher qui le restaura, aujourd'hui propriété de Jacqueline Lefèvre.              SUEILHES, fief des seigneurs de Tresfonts, par héritage passa  aux Fabre qui le gardèrent jusqu'a la fin du XVe siècle. Jean Barnier notaire l'acquit au XVIe siècle et par alliance passa à Pierre Reboutier, dans cette famille jusqu'à la Révolution, en 1948 acquit par madame Baix toujours dans la descendance.","architecture":"Saint-Jean-du-Gard,  fut brûlé au XVIe siècle par les troupes royales, aussitôt reconstruit puis agrandi au XVIIe,  construction massive de plan carré importante sur l'esplanade façade cantonnée de deux pavillons carrés avec tour  quadrangulaire en façade sud deux tours rondes aux nord, entouré de murs percés de meurtrières et surmonté de créneaux.                                                           Cabrières, du XVIIe siècle, incendié en 1704 par les huguenots reconstruit au XVIIIe siècle sur plans d'origine,  corps de logis carré flanqué à son angle sur une tour carrée  à un niveau supérieur.\r\nMarcassargues, du XVIe siècle, restauré, quadrilatère flanqué de trois tours d'angle circulaires arasées à hauteur du toit, tout autour des canonnières et des meurtrières, cour intérieure  originale trois côtés en double galerie d'arcs en plein cintre surbaissé sur piliers carrés, une tour d'escalier sur l'angle sud-ouest, les corps de logis autour de la cour à deux niveaux avec fenêtres à meneaux.\r\nSueilhes, d'origine XIIIe siècle, de plan carré, au Nord-Est tour d'angle haute de douze mètres, échauguettes sur culots et meurtrières sur la base, une deuxième échauguette  d'angles à l'ouest.\r\nLes vestiges d'un oppidum sur la colline de Sueilhes.                         Ruines du Calcadis, ancien poste de défense qui appartenait à Jean de Calcadis en 1309 et aux Tresfonts. Ils ne reste que quelques ruines sur un éperon au dessus du tunnel routier.","habitants":"Famille de Jean de Saint-Bonnet                                               Famille de Jacques de Vignolles                                                       Famille d'Assas                                                                                     Famille de Pierre Reboutier\r\n        \"","divers":"Château de Saint-Jean du Gard, de Cabrières, de Marcassargues et de Sueilhes.","gps":"","images":["../image/image_30/30_St_Jean_Gard_1.jpg","../image/image_30/30_St_Jean_Gard_2.jpg","../image/image_30/30_St_Jean_Gard_3.jpg","../image/image_30/30_St_Jean_Gard_4.jpg","../image/image_30/30_St_Jean_Gard_5.jpg","../image/image_30/30_St_Jean_Gard_6.jpg","../image/image_30/30_St_Jean_Gard_7.jpg"]},"Consult_chateau_formulairea122-2":{"id":"Consult_chateau_formulairea122-2","dept":"30","canton":"Rousson","commune":"St-Jean de Maruéjols et Avéjan","nom":"St_Jean_Maruejols","type":"Château","periode":"XV-XVII","histoire":"Trois châteaux à Saint-Jean de Maruéjols, celui de Saint-Jean de Maruéjols du XVIIe siècle, celui d'Avéjan du XVe siècle et celui du Pont du XVIIe siècle dit moulins de Courlas.                               St-JEAN de MARUEJOLS, cité en 1254. C'est une paroisse de Barjac, succursale érigée par décret du 17 Prairial an XIII (6 Juin 1805). Avant 1790, cétait une paroisse du diocèse d'Uzès régie par un vicaire perpétuel. Divers débris gallo-romains indiquent que ce lieu a été habité; la maison de Crussol d'Uzès y était en possession de tous ses droits fort étendus. Le château de Saint-Jean passa, en 1628, aux mains des huguenots de Rohan, à la suite de l'assemblée des protestants à Alais. Rohan fit démanteler ce château qui appartenait à son vaillant adversaire le marquis de Portes. Au XVIIe siècle possession des Audibert de Caveirac, passa au XVIIIe siècle aux Laborie de Tarreaux  toujours dans la descendance transmit par les femmes, aujourd'hui aux Rebotier.\r\nAVEJAN, au XIIe siècle dépendait des évêques d'Uzés, au XIIIe siècle aux seigneurs de Bannes (07) unies au titre de Baronnies avec les Ferreyrolles, puis passa au titre de marquisat en 1736 en faveur de Louis de Banne d'Avéjan.                                                   PONT de THARAUX, au XIIe siècle sous la mouvance des évêques d'Uzès, connu  au XIVe siècle comme auberge tenu par les Ribeyrol, devenu plus tard seigneurie et marquisat au profit des Entremaux, les Ribeyrol conserveront le Pont des Tharaux  jusqu'au XIXe siècle.","architecture":"Saint-Jean de Maruéjols, grande bâtisse à trois niveaux, la cour d'entrée suit la courbe de  l'ancien fossé tracé circulaire du village, aujourd'hui disparu avec pont levis. La façade  est flanqué à l'angle Nord-Est d'une grosse tour ronde, dans la cour la tour d'escalier.                             Avéjan ce château fut incendié et pillé en 1791 donjon et tour arasé, à l'angle sud-ouest une tour ronde au niveau du toit et au nord-ouest une échauguette. Le corps de logis rectangulaire la façade à droite une grosse tour ronde et à gauche une autre tour ronde du XVe siècle escalier à vis.                                                    Pont de Tharaux; au bord de la Cèze, construction du XVIIe siècle avec tourelles d'angles.","habitants":"Famille d'Audibert de Caveirac                                                                        Famille des Ferreyrolles,\r\n        \"","divers":"Château de Saint-de Maréujols, d'Avejan et du Pont de Thareaux","gps":"","images":["../image/image_30/30_St_Jean_Maruejols_1.jpg","../image/image_30/30_St_Jean_Maruejols_2.jpg","../image/image_30/30_St_Jean_Maruejols_3.jpg","../image/image_30/30_St_Jean_Maruejols_4.jpg","../image/image_30/30_St_Jean_Maruejols_5.jpg"]},"Consult_chateau_formulairef64a":{"id":"Consult_chateau_formulairef64a","dept":"30","canton":"Rousson","commune":"St-Jean de Valeriscle","nom":"St_Jean_Valeriscle","type":"Château","periode":"XIV","histoire":"ST-JEAN de Valeriscle, cité en 1239 fief de Bernard IX d'Anduze, au XIVe siècle plusieurs co-seigneurs se succédèrent les de La Farelle, les Budos de Portes, cette seigneurie élevée au titre de Baronnie par Louis XIII en même temps que le vicomté de Portes en marquisat et la baronnie de Theyrargues en vicomté. En  1693  la marquise de Portes Marie-Félice de Budos en fit don au prince de Conti et cette famille conservera le domaine jusqu'à la Révolution, il fut acheté en 1792 par monsieur de Montfrin pour devenir la propriété des houillères en 1919 et en 1979 à une société de conseil appartenant à la famille de Saintville.","architecture":"Château  de Saint-Jean de Valériscle ruiné par le duc de Rohan profitant de l'absence du seigneur le marquis de Portes, dominant la vallée s'adossant aux maisons du village face à l'église, construction rectangulaire à trois niveaux avec une tour ronde arasée à hauteur du toit à l'angle sud-ouest, porte d'entrée plein cintre du porche qui conduit à une petite cour rectangulaire.","habitants":"Famille de Budos\r\n        \"","divers":"Château de Saint-Jean-de-Valesricle","gps":"","images":["../image/image_30/30_St_Jean_Valeriscle_1.jpg","../image/image_30/30_St_Jean_Valeriscle_2.jpg","../image/image_30/30_St_Jean_Valeriscle_3.jpg"]},"Consult_chateau_formulaire5204-3":{"id":"Consult_chateau_formulaire5204-3","dept":"30","canton":"Le Vigan","commune":"St-Julien de la Nef","nom":"St_Julien_Nef","type":"Château","periode":"XIII-XV","histoire":"Deux châteaux à Saint-Julien la Nef le château de st-Julien dit d'Isis  et celui de Mercou du XIIIe siècle.                                               ISSIS St-JULIEN, le seigneur du lieu ayant pris le nom de sa paroisse, il fut fait marquis pour avoir assuré le passage du cortège royal, alors appelé  nef royale, avec sécurité au long de tous ces châteaux pour l'embarquement à Aigues-Mortes de Louis IX (Saint Louis) pour les croisades ; puis pour le retour par la même route de son épouse Marguerite de Provence qui l'avait accompagné. Le seigneur de ce château lors des guerres des camisards en 1705 fut exécuter par Fidel Abric. Appartenait au XVIIIe siècle aux Saint-Julien de Thomeyrolles, le château est resté aux Saint-Julien jusqu'au XIXe siècle puis est passé aux Calvière et à leurs héritiers avant de devenir une résidence pour colonies de vacances \"Tourisme et Travail\" et aujourd'hui chambres d'hôtes et auberge du \"château d'Isis\" de  Richard et Maryvonne, les propriétaires de ce havre de détente.                                                                         MERCOU,  la toponymie en a conservé le nom de Mercou. Son occupation semble ininterrompue et une première tour de guet est construite par Adhemar des Barris, des premiers seigneurs de Sumène au IXe siècle pour dominer l'Hérault, fief au XIIe siècle des Bermond d'Anduze au XIIIe siècle au Baron de Saint-Just seigneur d'Hièrle,  et passé par succession dans plusieurs familles, jusqu'aux d'Assas, au XVIIe siècle, dont l'un des fils Louis d'Assas du Mercou  tomba glorieusement à la bataille de Kloster Kampen en 1760. Le château resta dans cette famille jusqu'à la Révolution, passa  aux marquis d'Urre, après un incendie en 1868 devient une ferme au profit de la famille Clerc de Sumène. Aujourd'hui propriété de monsieur Delaise de Berre architecte.","architecture":"Saint-Julien, situé en aval du pont, de plan rectangulaire à un étage flanqué de tours aux angles, relié par un bâtiment plus bas, à un gros pigeonnier carré, il possède une assise constituée de caves voûtées ainsi que d'une tour carrée qui pourraient dater du XIVe siècle. Le corps de logis principal est percé de larges fenêtres et portes fenêtres  donnant sur une terrasse surélevée dominant le parc.  La tour ronde à gauche à archères et à droite une autre tourelle d'angle, sur la façade opposée les deux tours d'angles,  une ronde l'autre carrée plus haute, les deux son crénelées étant les tours de guet.                                                                          Mercou, abandonnée par la construction au XIIe siècle de la première tour du château, à la fois logis seigneurial, place forte et de protection paysanne. Quadrilatère à deux niveaux avec tours en angles, le donjon est adjoint un corps de logis et de garde avec tour ronde du XIVe siècle. Des extensions de résidences, interrompues par la Révolution.  Ses rajouts font un ensemble rectangulaire clos de murs, à deux niveaux avec pavillons carrées en angles en alignement de la façade, le toit dépassant le bâtiment le portail jouxtant la tour ronde à droite de l'entrée du bâtiment. Incendié  en 1868 puis rénové par ses derniers propriétaires.","habitants":"Famille de Saint-Julien                                                                       Famille de Louis d'Assas du Mercou\r\n        \"","divers":"Château d'Isis à St-Julien et château de Mercou.","gps":"","images":["../image/image_30/30_St_Julien_Nef_1.jpg","../image/image_30/30_St_Julien_Nef_2.jpg","../image/image_30/30_St_Julien_Nef_3.jpg","../image/image_30/30_St_Julien_Nef_4.jpg","../image/image_30/30_St_Julien_Nef_5.jpg","../image/image_30/30_St_Julien_Nef_6.jpg","../image/image_30/30_St_Julien_Nef_7.jpg","../image/image_30/30_St_Julien_Nef_8.jpg"]},"Consult_chateau_formulaire1759-2":{"id":"Consult_chateau_formulaire1759-2","dept":"30","canton":"Aigues-Mortes","commune":"St-Laurent d","nom":"St_Laurent_Aigouze","type":"Vestiges","periode":"XIV","histoire":"Deux châteaux à Saint-Laurent d'Aigouse, celui de St-Laurent et de Calvières du XVIIe siècle (voir article),  de Montcalm et la tour Carbonnière.       \r\nSt-LAURENT appartenait au XVIIe et XVIIIe siècle à la famille de Calvières. La marquise de Bernis\r\nCalvières le vend en 1848 à M.  Adolphe Valz. En indivision  il fut vendu par la famille Picheral à monsieur Yung en 1996. MONTCALM, 6 mars 1712 baptême de Joseph Louis marquis de Montcalm. Seigneurie importante sur Vauvert qui possédait un domaine et le château de Montcalm qui sera acheté en 1882 par Louis Prat, fils aîné du créateur de la firme Noilly-Prat, à un descendant de la famille des Montcalm. Jusqu'en 1902, à la mort de sa mère, il eut tout le loisir d'y créer et développer  un domaine de mise en valeur agricole. En 1894 Le curé Triaire achète les ruines du château et les fait restaurer. En 1896 consécration du maître autel par Mgr de Cabrières, inauguration des salles du château rénovées destinées à devenir un orphelinat, une école et un hospice de vieux. En 1897 Les surs installent les classes dans le château et commencent à créer lorphelinat.  La mort de Louis Prat en 1932, le domaine n'a pas été repris, mais vendu par lots et le château laissé à l'abandon et même dépecé. Les ruines résiduelles révèlent le passé glorieux du château.             TOUR CARBONNIERES, située à 4 km dAigues-Mortes, au milieu des marais, sur un ancien cours du Vistre, la tour Carbonnière fut construite à la fin du XIIIe siècle, en même temps que les remparts d'Aigues-Mortes. La tour faisait partie du plan de défense d'Aigues Mortes, cela explique la ressemblance avec les portes de l'enceinte de la ville. La double herse, les assommoirs, la tourelle reproduisent la porte de l'Arsenal ou des Cordeliers, la terrasse est large elle était adaptée aux pièces d'artillerie, elle en défendait l'approche.\r\nLes moines de Psalmody, les premiers fermiers de la tour, retiraient un droit de péage.","architecture":"Vestiges du château de Montcalm inhabité mais encore debout.  Un domaine qui fut cédé par Raymond Rafinel, duc de Toulouse, à labbaye de Saint-Thibéry, doté dun château bâti sur une hauteur près duquel sagrégea un hameau connu sous le nom de Posquières. Une place forte qui suscita les convoitises, notamment lors des croisades albigeoises, ce qui valut sa prise par Simon de Montfort. Partagée par deux communautés chrétienne et juive,  Posquières abritait une école rabbinique dont la réputation sétendait bien au-delà du pays, mais aussi le sanctuaire Notre-Dame du Val-Vert.                                                                                                     Tour Carbonnière, au début du XIXe siècle, la tour étant en ruines, il fut envisagé de la démolir mais elle fut sauvée et restaurée en 1858. En 1870, le passage étant trop étroit pour les charrettes et les voitures, l'ancienne route départementale qui passait encore au milieu de la tour fut supprimée. La nouvelle route contourna la tour des deux côtés.","habitants":"Famille de Calvières                                                                               Famille des Montcalm\r\n        \"","divers":"Vestiges du château de Montcalm  et la  Tour Carbonière","gps":"","images":["../image/image_30/30_St_Laurent_Aigouze_1.jpg","../image/image_30/30_St_Laurent_Aigouze_2.jpg","../image/image_30/30_St_Laurent_Aigouze_3.jpg","../image/image_30/30_St_Laurent_Aigouze_4.jpg","../image/image_30/30_St_Laurent_Aigouze_5.jpg","../image/image_30/30_St_Laurent_Aigouze_6.jpg","../image/image_30/30_St_Laurent_Aigouze_7.jpg","../image/image_30/30_St_Laurent_Aigouze_8.jpg"]},"Consult_chateau_formulaire4531":{"id":"Consult_chateau_formulaire4531","dept":"30","canton":"Roquemaure","commune":"St-Laurent des Arbres","nom":"St_Laurent_Arbres","type":"Tour Château","periode":"XII-XVII","histoire":"Deux châteaux à Saint-Laurent des Arbres, celui de St-Laurent  du XII-XIVe siècles et de Beaupré-Deleuze du XVII transformé en chambres d'hôtes.                                                                     St-LAURENT des ARBRES, le pape Adrien IV, en 1155, confirme les droits de Geoffroy, évêque d'Avignon et de ses successeurs, et cite parmi les biens temporels de l'évêque la villa de Saint-Laurent-des-Arbres dont les seigneurs étaient des membres de la famille Sabran. Le 12 avril 1232, Guillaume de Sabran d'Aiguèse et Rostaing de Sabran vendent le château et la villa de Saint-Laurent-des-Arbres à Bertrand, évêque d'Avignon. En 1255, Decanesse, fille de Guillaume de Sabran, vend une tour située à Saint-Laurent-des-Arbres et qui pourrait être la tour Ribas. Jacques Duèze, évêque d'Avignon de 1310 à 1312, puis pape sous le nom de Jean XXII de 1316 à 1334, fait construire à Saint-Laurent-des-Arbres un château fort surmonté d'un donjon.\r\nEn 1383, la ville fut assiégée par une bande de tuchins. Ce fut une des dernières actions de ce mouvement. L'année suivante le roi Charles VI leur accorda un pardon général.                                   La tour Ribas, siège de loffice de tourisme, abrite une maquette réalisée à partir darchives, qui représente la cité telle quelle pouvait apparaître au Moyen-Age et jusquau environ de 1750. À l'est du village se trouvent deux magnifiques propriétés.  En face de la Bégude se situe la chapelle romane dite de Thézan.  DELEUZE-BEAUPRE,  ayant appartenu aux familles Deleuze, ancien viguier du Pape, Vigan-Braquet, Bérard et Ponsoye.","architecture":"Le donjon féodal du château de Saint-Laurent, la tour Jacques d'Euze, datée du XIIe siècle pour son rez-de-chaussée, des restes du château. Les étages supérieurs furent entièrement rebâtis au début du XIVe siècle par l'évêque d'Avignon. Nous ne possédons aucune information sur le château antérieur, si ce n'est que cet édifice était  au centre du village. Le château fut démantelé sous Napoléon III. Le donjon, rectangulaire habitable couronnée de mâchicoulis seul vestige du château qui exista jadis, est bâti sur un plan quadrangulaire avec un premier niveau voûté en berceau de style roman. Les murs à leur base ont une épaisseur de 1,50 mètre. Le rez-de-chaussée était relié au niveau supérieur par un escalier droit. On reconnaît aisément le style gothique des ouvertures en arc brisé des étages supérieurs. Pour se protéger des invasions, la cité s'entoure d'un rempart, renforcé par un fossé rempli d'eau. Deux portes en autorisent l'accès, la porte Notre Dame, côté Saint-Geniès. La porte Sainte-Croix regardant vers Lirac. Les deux portes sont défendues par un mâchicoulis et un ravelin. Plusieurs tours rondes échelonnées à l'intérieur des murs, servent de ligne de défense supplémentaire. Une partie des remparts disparut pendant la Révolution, cependant il reste d'importants vestiges.\r\nLa Tour Ribas, c'est à faible distance de l'église et du donjon, que s'élève le troisième monument militaire de Saint-Laurent-des-Arbres, de plan carré, bien crénelée, sans doute contemporaine de la partie inférieure du donjon. On se demande ce que représentait cette tour isolée, assez proche du château mais cependant autonome.                                                                                            Deleuze-Beaupré, magnifique architecture du XVIIe siècle et la Bégude, qui n'existe plus suite à une expropriation, bastide du XVIIIe siècle avec des bases médiévales.","habitants":"Famille de Guillaume de Sabran d'Aiguèse                                          Familles Deleuze\r\n        \"","divers":"La tour Ribas et le donjon du château  et le château de Deleuze Beaupré à Saint-Laurent les Arbres","gps":"","images":["../image/image_30/30_St_Laurent_Arbres_1.jpg","../image/image_30/30_St_Laurent_Arbres_2.jpg","../image/image_30/30_St_Laurent_Arbres_3.jpg","../image/image_30/30_St_Laurent_Arbres_4.jpg","../image/image_30/30_St_Laurent_Arbres_5.jpg","../image/image_30/30_St_Laurent_Arbres_6.jpg","../image/image_30/30_St_Laurent_Arbres_7.jpg","../image/image_30/30_St_Laurent_Arbres_8.jpg","../image/image_30/30_St_Laurent_Arbres_9.jpg"]},"Consult_chateau_formulairecdd8":{"id":"Consult_chateau_formulairecdd8","dept":"30","canton":"Le Vigan","commune":"St-Laurent le Minier","nom":"St_Laurent_Minier","type":"Château","periode":"XVII","histoire":"St-LAURENT-Le-MINIER,  du XVIIe siècle, construit en 1664 par Christophe de Montfaucon seigneur d'Hierle, qui vendit la seigneurie à Jean de Bonnail passa par alliance en 1664 à Pierre de Sarret, la dernière  personne de cette famille décéda  en 1800 et le château fut vendu, ensuite réaménagé entre 1750 et 1800 par la famille de Vissec de Latude. Au XIXe siècle  il fut la propriété de madame Bonnet propriétaire des mines de la région le revendit à la société Pennaroya, actuellement plusieurs propriétaires l'occupent.","architecture":"Le château de Saint-Laurent le Minier, corps de logis central à deux niveaux  toit à deux pentes, avec grand fronton central ornemental et fausses lucarnes, le bâtiment est  encadré de deux pavillons à trois niveaux  à toits brisés à la Mansart, deux ailes à l'arrière à toit en bâtière encadrent une grande terrasse bordée dune balustrade de pierre. Escalier à double révolution qui accède au parc.","habitants":"Famille de Christophe de Montfaucon \r\n        \"","divers":"Château de Saint-Laurent le Minier","gps":"","images":["../image/image_30/30_St_Laurent_Minier_1.jpg","../image/image_30/30_St_Laurent_Minier_2.jpg","../image/image_30/30_St_Laurent_Minier_3.jpg"]},"Consult_chateau_formulaire7c94":{"id":"Consult_chateau_formulaire7c94","dept":"30","canton":"Uzès","commune":"St-Laurent de Vernède","nom":"St_Laurent_Vernede","type":"Château fort","periode":"XV","histoire":"ST-LAURENT-VERNEDE, au XIIe siècle propriété des comtes de Toulouse. Plusieurs co-seigneurs ensuite et en 1445, celles ci demandèrent au bailli, le représentant du seigneur et duc d'Uzès, l'autorisation de se fortifier derrière des murs pour se protéger des bandes de routards qui sévissaient dans la région.  En 1446, les actes d'attribution des emplacements vides  dans le fort furent ratifiés  aux différentes familles suivant leur participation à l'édification de ces murailles, on peut suivre aussi l'évolution démographique du fort les deux siècles suivants.  En 1465 acquit par Bermond de Sommières seigneur de Saint-Laurent jusqu'au XVIIe siècle quand  Louis de Rochemore se déclare seul seigneur passa cette seigneurie aux Julien et en 1746 la vendit à Joseph Thomas.","architecture":"Le château fort date de la seconde moitié du XVe siècle, ce qui correspond à la fin de la longue guerre de cent ans. Il fût édifié par les principales familles qui ont survécus à la forte mortalité de cette époque là. Le fort possède une tour  à l'entrée sud, trois tours d'angle, plus une échauguette  qui surveillait une autre porte d'entrée  à l'angle nord ouest.  Des maisons comme celles que l'on trouve à l'aile ouest sont restées en l'état depuis leur construction au  XVe siècle. D'autres sont venues s'appuyer plus tard sur le chemin de ronde supprimant ainsi sa continuité. Si le fort a gardé sont aspect d'origine, ses murailles et ses tours étant en l'état, ses éléments défensifs tels murets du chemin de ronde et des tours, herse, pont-levis, ont été depuis supprimés.","habitants":"seigneur Bermond de Sommières \r\n        \"","divers":"Château fort de Saint-Laurent de Vernède","gps":"","images":["../image/image_30/30_St_Laurent_Vernede_1.jpg","../image/image_30/30_St_Laurent_Vernede_2.jpg","../image/image_30/30_St_Laurent_Vernede_3.jpg"]},"Consult_chateau_formulaire1b93-3":{"id":"Consult_chateau_formulaire1b93-3","dept":"30","canton":"Alès","commune":"St-Maurice de Cazevieille","nom":"St_Maurice_Cazevieille","type":"Château Temple","periode":"XVI","histoire":"St-MAURICE de Cazevieille, le Moyen-Age a marqué Saint-Maurice-de-Casesvieilles, qui appartenait à la viguerie et au diocèse dUzès, dans le doyenné de Sauzet. Les Templiers y avaient une résidence en 1118, cest à dire dés le début de la création de cet ordre. Les vestiges de leur établissement ont donné au village le nom de Casesvieilles (vieilles demeures). Les guerres de religion ont vu la destruction du temple en 1672. Rappelons que la réforme a commencé à se répandre en Uzège dès 1532. Très tôt, une grosse majorité de Saint-Mauriçois va adopter la réforme. Exactions et répressions vont se succéder entraînant une longue série de guerres religieuses qui vont ravager le Languedoc et marquer Saint-Maurice-de-Cazevieille en particulier. La répression concerne tous les protestants et va saccélérer. Louis XIV, une fois au pouvoir va diriger lui-même la lutte contre lhérésie. La révolte des Camisards Le 12 octobre 1702, Jean Cavalier (grand chef camisard) et sa troupe, pillent et incendient léglise et le presbytère de St-Maurice. Le temple : un premier édifice fut  construit vers la fin du XVIe siècle. On peut supposer qu'il fut édifié sur l'emplacement même de l'ancienne commanderie de l'Ordre de Saint-Jean-de-Jérusalem, que des religionnaires avaient démantelée en 1553. Sa destruction fut ordonnée en 1672. La construction du temple actuel date de 1853.","architecture":"On accède au château par le grand parc et par une porte grillagée, l'édifice est une construction rectangulaire à deux étages, une porte Renaissance à fronton triangulaire ouvragé, l'entrée couverte d'une voûte à pénétration  et escalier à cage carrée, une marque de 1646 porte les armes  des Adhémar.                                                            Le Portalet de Saint-Maurice de Cazevieille et lancienne entrée nord des fortifications contribuent à donner beaucoup de caractère et de charme à ce village accueillant.Le Portalet est le vestige le mieux conservé du rempart du XIIe siècle. Il sagit de l'ancienne entrée Nord des fortifications qui protégeaient la commanderie des Templiers. Ces fortifications furent détruites en 1553.","habitants":"Les templiers\r\n        \"","divers":"Hameau de Saint Maurice de Cazevieille son portelet et son temple","gps":"","images":["../image/image_30/30_St_Maurice_Cazevieille_1.jpg","../image/image_30/30_St_Maurice_Cazevieille_2.jpg","../image/image_30/30_St_Maurice_Cazevieille_3.jpg"]},"Consult_chateau_formulaire71a5":{"id":"Consult_chateau_formulaire71a5","dept":"30","canton":"Uzès","commune":"St-Maximin","nom":"St_Maximin","type":"Château","periode":"XII-XVII","histoire":"St-MAXIMIN,  fut cédé en 1156, par le roi Louis VII, à l'évêque d'Uzès. La seigneurie de Saint-Maximin appartenait en 1721 à d'Argenvilliers (l'oncle de Racine). La famille seigneuriale dUzès avait là des droits forts anciens et au milieu du XVIe siècle, la seigneurie fut inféodée à Olivier de Thézan de Poujols, petit fils dElix dUzès et seigneur de Saze où se trouve sa famille durant tout le XVIIe siècle, dont certains membres jouissent en outre de bénéfices ecclésiastiques. il fut vendu en 1659 au chanoine  Sconin cousin de Racine, puis fut revendu au XVIIIe siècle aux Laplace de Pont St-Esprit et au XIXe siècle il appartenait  aux Goirand de la Baume, et fut acquis  en 1994 par monsieur Duplaix.","architecture":"Saint-Maximin, ensemble constitué de deux parties bien distinctes, une partie médiévale de la fin du XIIe siècle et au XVIIe siècle avec traces de décor et un corps de logis bâti au XVIIIe siècle construit par le chanoine Sconin. En façade classique ornée de refends et d'un fronton triangulaire. Au fond de la cour face à l'entrée, le mur nord portait jadis une terrasse qui a été remplacé par un préau à arcades et une tour rectangulaire de la forteresse primitive. L'aile orientale, bâtiment à un étage avec combles du XIIIe siècle.","habitants":"Famille d'Argenvilliers \r\n        \"","divers":"Château de Saint-Maximin","gps":"","images":["../image/image_30/30_St_Maximin_1.jpg","../image/image_30/30_St_Maximin_2.jpg","../image/image_30/30_St_Maximin_3.jpg","../image/image_30/30_St_Maximin_4.jpg","../image/image_30/30_St_Maximin_5.jpg"]},"Consult_chateau_formulaire2931":{"id":"Consult_chateau_formulaire2931","dept":"30","canton":"Remoulins","commune":"Pont du Gard","nom":"St_Privat","type":"Château fort","periode":"XIII","histoire":"ST-PRIVAT, les seigneurs laïcs étaient vassaux des seigneurs d'Uzès, Rostaing de Saint-Privat en 1210 et Pons de Saint-Privat en 1243, puis passa en 1258 à Raymond de Masmolène, inféodé en 1360 au profit de Guy de Prohins et passa dans différentes mains, à Jean de Planterose, à Jean  Henry receveur de Bayeux en 1452 fief de Jacques Faret  famille de joailliers italiens venu en France avec les papes d'Avignon ils conserveront le fief pendant cinq siècles, ils eurent la visite en 1564  de Charles IX et Catherine de Médicis. Pris par Coligny en 1570 et le 7 juillet 1629 signature de la paix de grâce d'Alais au château fut élaborée par le cardinal de Richelieu et signée par Louis XIII. Le château passe en 1865 à Thomas Calderon  descendant d'un grand dramaturge espagnol et le château passa à  divers propriétaires avant d'être acquis en 1916 par Jacques Rouché,  directeur de l'Opéra de Paris et  des musées  nationaux, il réaménage les jardins, installant, à la place du potager, un jardin à la Française selon les goûts de l'époque, il réalise aussi un buffet d'eau à l'imitation de celui de la Mogère à Montpellier.  Sa fille  madame Robert André et sa petite-fille madame Fenwick veille sur cette demeure.","architecture":"St-Privat, situé sur la rive du \"Gardon\" est un haut lieu historique,  le château du XIIIe siècle est un ensemble complexe, modifié et modernisé à des époques successives, ou les styles et volumes sont les jalons de lhistoire, simbriquent dans les murs de pierre dorée. Remanié tourelles d'enceinte, en forme de U accolé de trois tours carrées remanié en 1730. La haute tour dit donjon rectangulaire du XIIe siècle à mâchicoulis isolée dans la cour d'honneur construite sur trois étages domine le château, tourelle d'enceinte, des tours du Moyen-Age, des fenêtres à meneaux du XVIe siècle, une impressionnante porte à Bossages du début XVIIe siècle, ainsi quune façade du début XVIIIe siècle coté jardins, édifié sur une terrasse au-dessus de la rivière, le bâtiment s'organise au de la de la cour dhonneur, précédée de douves sèches.","habitants":"Famille de Raymond de Masmolène\r\n        \"","divers":"Château fort de Saint-Privat","gps":"","images":["../image/image_30/30_St_Privat_1.jpg","../image/image_30/30_St_Privat_2.jpg","../image/image_30/30_St_Privat_3.jpg","../image/image_30/30_St_Privat_4.jpg","../image/image_30/30_St_Privat_5.jpg","../image/image_30/30_St_Privat_6.jpg","../image/image_30/30_St_Privat_7.jpg","../image/image_30/30_St_Privat_8.jpg"]},"Consult_chateau_formulaire10db":{"id":"Consult_chateau_formulaire10db","dept":"30","canton":"Le Vigan","commune":"St-Roman de Codières","nom":"St_Roman_Codieres","type":"Château fort","periode":"XVI","histoire":"ST-ROMAN de CODIERES, au XIe siècle,  un château construit par les Bermond dAnduze et de Sauve, conservant une tour bâtie par les Sarrasins et qui existe encore. En 1215, lors de la croisade des Albigeois, le comté de Toulouse est rattaché à la couronne de France. La sénéchaussée de Nîmes et Beaucaire est créée, dont dépend dorénavant St-Roman. En 1293, le roi de France Philippe le Bel échange Montpellier  appartenant aux évêques de Maguelonne, contre Sauve et de nombreuses villes de la région, cédant ainsi St-Roman et son château. du XVIe siècle, Le château passe par mariage à Jean de Cubières, seigneur du Cheylar d'Aujac.\r\nPendant les guerres de religions en 1562, le château est pris par le duc de Rohan qui y laisse une garnison afin de le protéger. N'ayant pas été payée, la garnison déserte et le marquis de Portes, à la tête de 2000 hommes, en profite pour reprendre le château. En 1623, acheté par Antoine de Picon. En 1676,  Georges de Picon le vend à Pierre de Baudet, d'Avignon. En 1721, vendu à l'abbé Jean-Joseph du Plessis. La baronnie de Sauve acquise en 1563 par Simon Fitzgerald de Fizes secrétaire d'état, sera réunie à nouveau à lévêché de Montpellier et le restera jusquà la Révolution Française. Saint-Roman sera alors divisé en trois seigneuries distinctes : le Castanier, lEuzière et Saint-Roman de Codières qui comprend la majeure partie de la paroisse jusquau Fromental. En 1838 le château est restauré par le comte Raymond de Serre de Saint-Roman, il passa par alliance en 1910 aux Marchand, et les Piplard l'achetèrent pour une vocation d'hospitalité.","architecture":"Tour de Saint-Roman-de-Codières, vestige de l'ancien château médiéval, elle a été remise en état et réaménagée en 1838 par le comte Raymond de Serre de Saint-Roman. À loccasion de ces travaux, les archères ont laissés la place à des ouvertures modernes et le sommet de la tour sest ourlé de petites arcades en brique rose qui lui donnent cette touche arabisante sans doute responsable de lappellation de « tour sarrasine », dont la tradition locale lorne parfois. Mesurant après restauration 22 mètres de haut, elle est presque carrée (7,52 m x 7,70 m x 7,90 m). La partie qui correspond à peu près aux deux premiers étages est construite dans un bel appareil régulier à bossages rustiques sans liseret, datant de la seconde moitié du XIIe siècle ou de la première moitié du XIIIe siècle.","habitants":"Famille d'Antoine de Picon\r\n        \"","divers":"Château  fort de Saint-Romain de Codières","gps":"","images":["../image/image_30/30_St_Roman_Codieres_1.jpg","../image/image_30/30_St_Roman_Codieres_2.jpg","../image/image_30/30_St_Roman_Codieres_3.jpg","../image/image_30/30_St_Roman_Codieres_4.jpg","../image/image_30/30_St_Roman_Codieres_5.jpg"]},"Consult_chateau_formulaire1a72":{"id":"Consult_chateau_formulaire1a72","dept":"30","canton":"Uzès","commune":"St-Siffret","nom":"St_Siffret","type":"Château vestiges","periode":"XII-XVI","histoire":"Deux châteaux à Saint-Siffret, la commanderie dit château et le château de Saint-Siffret.                                                          COMMANDERIE, construite au XIIe siècle par les Templiers fut donnée au chapitre d'Uzès. Les chanoines se sont retirés en 1621 dans leur château  ou le duc de Rohan sur ordre du duc de Montpensier  les expulsa. François de Gondin seigneur de Saint-Quentin-la-Poterie en devient propriétaire puis passa dans différentes mains avant d'être acquit par des architectes pour en faire des habitations.                                                                      Château de Saint-Siffret est un château qui appartient à la même famille depuis 400 ans, à changé de nom par alliance les Alméras, les Froment, les Abazuzit et la famille Silhol.  Aujourd'hui chambres d'hôtes.","architecture":"Château dit de la \"Commanderie\" date du XIIe siècle, mais a été remanié, seule sa porte fortifiée est d'origine ainsi que les abords, il possède une tour rectangulaire  avec porte fortifiée du XIIe siècle.\r\n Château de Saint-Siffret, au nord du village, était l'ancienne place forte protestante contre la Commanderie des évêques d'Uzès, et le château de Saint Siffret,  Il fut établi sur des constructions très anciennes, dont l'existence est connue depuis le milieu du XVIe siècle, domine la vallée. Bâtiment sur un plan en L  à deux étages percées de fenêtres à meneaux et flanquée d'une petite tour ronde légèrement de forme conique et un dôme en-guise de toit avec tour en angles pour l'escalier à vis, le corps de logis se prolonge face à l'entrée de la cour par un préau qui la ferme.","habitants":"Les templiers                                                                                     Famille de François de Gondin\r\n        \"","divers":"Château de Saint-Siffret et tour du Mas","gps":"","images":["../image/image_30/30_St_Siffret_1.jpg","../image/image_30/30_St_Siffret_2.jpg","../image/image_30/30_St_Siffret_3.jpg","../image/image_30/30_St_Siffret_4.jpg","../image/image_30/30_St_Siffret_5.jpg","../image/image_30/30_St_Siffret_6.jpg"]},"Consult_chateau_formulaire160a":{"id":"Consult_chateau_formulaire160a","dept":"30","canton":"Roquemaure","commune":"St-Victor la Coste","nom":"St_Victor_Coste","type":"Vestiges","periode":"XII","histoire":"St-VICTOR la COSTE, castellas, château-fort médiéval,  est souvent comparé aux châteaux Cathares. Le pouvoir des Sabran s'est effondré, avec la défaite des comtes de Toulouse, lors de la croisade du roi de France contre les Albigeois. Rostaing de Sabran, après la croisade  en rendit hommage au roi. En 1249, le château fort, appelé le Castellas, fut livré au sénéchal royal de Beaucaire qui en fit abattre les fortifications sur ordre du roi et à la demande de Rostaing de Sabran.  Dès lors, Saint Victor ne fut plus qu'une seigneurie parmi tant d'autres, appartenant successivement aux vastes domaines de plusieurs familles féodales, Il fut reconstruit au XIIIe siècle pour la maison de Montlaur, fut remplacé par les Poitiers qui le revendirent en 1501 aux Nicolaï, et le céda en 1542 aux Gadagne, Thomas de Gadagne riche banquier florentin.  Il existe le château d'en bas à Saint-Victor la Coste, Imbert du Roy acquit en 1599 la seigneurie et fit construire le château au centre du village qui sera revendu en 1711 à Jean de Domergue par Guillaume du Roy passa ensuite par alliance aux Rippert d'Alauzier. Eugène Prosper marquis d'Alauzier le dernier seigneur sans enfants après sa mort, le château est à l'abandon en proie aux pilleurs et heureusement la famille Moussières en firent une belle demeure.","architecture":"Saint-Victor la Coste dominé par les ruines du Castellas, c'est un exemple rare de patrimoine moyenâgeux,  ses fortifications et sa position lui donnèrent une réputation d'imprenable. Il a  conservé les ruines impressionnantes d'un magnifique château-fort qui, posé au sommet d'une colline, domine la plaine du Rhône. Un long rempart cerne la colline depuis le château jusqu'au village protégé par une dernière grande muraille. le château fut pillé et incendié pendant les guerres de religion à partir de cela ne sera plus habité et au XIXe siècle sert de carrière de pierre pour construire les maisons dans le village.","habitants":"Famille de  Thomas de Gardagne\r\n        \"","divers":"Vestiges du château féodal de St-Victor et le château bas","gps":"","images":["../image/image_30/30_St_Victor_Coste_1.jpg","../image/image_30/30_St_Victor_Coste_2.jpg","../image/image_30/30_St_Victor_Coste_3.jpg","../image/image_30/30_St_Victor_Coste_4.jpg","../image/image_30/30_St_Victor_Coste_5.jpg","../image/image_30/30_St_Victor_Coste_6.jpg","../image/image_30/30_St_Victor_Coste_7.jpg","../image/image_30/30_St_Victor_Coste_8.jpg","../image/image_30/30_St_Victor_Coste_9.jpg"]},"Consult_chateau_formulaire65b4":{"id":"Consult_chateau_formulaire65b4","dept":"30","canton":"Rousson","commune":"Saint-Victor de Malcap","nom":"St_Victor_Malcap","type":"Château","periode":"XIV","histoire":"St-VICTOR-de-MALCAP, cité dès 1243, était une maison forte édifiée pour des hommes d'armes pendant la guerre des Albigeois. C'est là que Pierre de Castillon, seigneur des lieux, reçut Louis XIII à l'occasion de la reddition de Saint-Ambroix, place forte protestante. Au XIVe siècle fief des  Castrevieille qui transmettent par héritage à  Pierre de la Farelle et Pierre Flandin de Porcherrolles  qui se partageait la seigneurie ce dernier la vendit à  en 1440 à André de Budos, son successeur  Barthélemy  de la Garde qui echangea  en 1505 avec Antoine de Barjac. Passa en 1559 à Jean de Cambis et à Firmin de Castillon écuyer dont la seigneurie resta en totalité à ce dernier qui fut élevée au titre de marquisat au profit de Pierre de Castillon en 1629. A la Révolution les biens qui fut saisit appartenait à Louis Victorin Castillon après son arrestation on lui les rendit, en 1847 le dernier marquis de Castillon mourut passa par alliance à monsieur Paulin de Malbosc dont la fille légua les biens pour la construction d'une église. Les biens sont acquis par Emile Silhol dont la famille achetèrent les mines de Bessèges. les propriétaires de Saint-Victor possédaient le château de Saint-Etienne de Sermentin, cité en 1337 de Guillaume de Châteauvieux, puis deux coseigneurs  les Châteauroux et les Laudun de Montfaucon, en 1464 un descendant des Montfaucon cèda  sa part à Jean Brun l'autre part passa à  Marquès Pradel et Firmin Brun en 1551 fut le seul seigneur, le fief fut donné par la descendance  la veuve de  François Brun en 1725 donna les biens à Jacques Chambon.","architecture":"Saint-Victor,  cité dès 1243 ancien château-fort quadrilatère à deux façades  une au sud l'autre à l'Est restauré au XIXe siècle dans un style féodal  est organisé autour d'une cour carrée et est flanqué aux sud de deux grosses tours rondes imposantes avec créneaux mâchicoulis et gargouille sur sa façade sud. La façade à l'Est  ornée à l'angle nord d'une échauguette, sur les autres côtés  se limite à un mur, la cour intérieure  est entourée  d'une galerie couverte à hauteur du premier étage. Il est adossé à l'église du village. Au cour du XVIIe siècle, le seigneur du château Pierre de Castillon y reçu Louis XIII suite à la réédition de Saint-Ambroix, place forte protestante.  En 1830, de longs travaux de restauration débutèrent et donnèrent au château le style romantique quil arbore aujourdhui encore, avec ses profusions de gargouilles, de créneaux et de mâchicoulis.  En 1847, la famille Castillon fit don de son château au village afin dy bâtir une église et la mairie. Cest labbé Pontet, en 1950, qui dirigea la construction de léglise.     Saint-Etienne-de-Sermentin, petit hameau niché sur le plateau, le château se présente sous forme d'un enchevêtrement de bâtiments composites, seule la tour ronde faisait partie d'un château féodal et c'est à partir d'elle qu' ont été construits divers corps de logis délimitant la cour intérieure, accès par porte voûtée à clé, la façade présente une échauguette circulaire.","habitants":"Fief des  Castrevieille\r\n        \"","divers":"Château fort de Saint-Victor de Macalp et bde Sermentin.","gps":"","images":["../image/image_30/30_St_Victor_Malcap_1.jpg","../image/image_30/30_St_Victor_Malcap_2.jpg","../image/image_30/30_St_Victor_Malcap_3.jpg","../image/image_30/30_St_Victor_Malcap_4.jpg","../image/image_30/30_St_Victor_Malcap_5.jpg"]},"Consult_chateau_formulaire6cd0":{"id":"Consult_chateau_formulaire6cd0","dept":"30","canton":"Uzès","commune":"St-Victor des Oules","nom":"St_Victor_Oules","type":"Château fort","periode":"XVI","histoire":"SAINT-VICTOR-des-OULES,  au Nord-Est d'Uzès, le petit village de Saint-Victor-des-Oules recèle quelques monuments chargés d'histoire.  Le village tient son nom des Oules (marmites en provençal), lorsque Saint-Victor vendait de la vaisselle en terre cuite en Avignon et à Nîmes. Le dernier four s'est éteint en 1873. Aujourd'hui, la céramique et les carrières de quartz ont pris la relève. Ce château a connu de nombreux propriétaires. En 1993, lun deux y créa un hôtel-restaurant  qui  fut fermé trois ans plus tard. Le propriétaire actuel est de nationalité suisse, la famille Vieljeux.","architecture":"St-Victor des Oules, avec sa madone, son horloge, son château remanié au XVIIIe siècle, cette cité gardoise semble bien traditionnelle. Cest un village typiquement cévenol où le temps semble sêtre arrêté. Le château de Saint-Victor des Oules de conception quadrangulaire, remanié au XIXe siècle, cette étonnante bâtisse, caractéristique par son mélange de styles, fait partie des constructions de la fin du XIXe siècle. Le plan global du château est à peu près quadratique. Sa façade principale est encadrée par deux tours rondes crénelées. Derrière la grille, on peut apercevoir, au niveau du rez-de-chaussée, une galerie dotée de colonnes à section carrée de style toscan. Celles-ci supportent un balcon avec balustres qui parcourt tout le long de lédifice.","habitants":"Famille Vieljeux.\r\n        \"","divers":"Château de Saint-Victor des Oules","gps":"","images":["../image/image_30/30_St_Victor_Oules_1.jpg","../image/image_30/30_St_Victor_Oules_2.jpg","../image/image_30/30_St_Victor_Oules_3.jpg","../image/image_30/30_St_Victor_Oules_4.jpg","../image/image_30/30_St_Victor_Oules_5.jpg","../image/image_30/30_St_Victor_Oules_6.jpg"]},"Consult_chateau_formulairea8f2":{"id":"Consult_chateau_formulairea8f2","dept":"30","canton":"Le Vigan","commune":"Sumène","nom":"Sumene","type":"Château","periode":"XIV","histoire":"SUMENE, le château de Galon à Sumène, berceau de la famille de Ginestous.  En 1138, la paroisse de Sumène verse une redevance annuelle de 456 litres de châtaignes fraîches au monastère Saint-Sauveur d'Aniane. En 1307, Bertrand de Pierrefort, seigneur de la terre voisine d'Hierle, demande l'établissement de marchés et de foires dans le village. En 1568, Balthazar de Saint-Etienne, baron de Ganges et seigneur de Saint-Martial, tente, en réponse à la Michelade, de reconquérir le village, pris par les Huguenots. Il y arrive temporairement avant de d'être tué lors de la reprise du village.","architecture":"En 1530, le village de Sumène, qui est divisé en sept parties, est protégé par une enceinte percée de huit portes. Cette dernière, présente dès 1412 ou 1414, comme le prouve à cette époque la présence d'un capitaine des fortifications, mesure entre huit et dix mètres de haut, fait environ deux mètres d'épaisseur, est bordée d'un fossé et  jalonnées de six tours. L'entrée principale du village, vers Ganges, est défendue par une tour de trois étages. Il  reste presque plus rien aujourd'hui, le seul vestige encore visible étant le portail de la Font de Ville, qui fut le seul morceau de rempart à ne pas avoir été détruit. Les lieux principaux du village, à l'époque, sont le château féodal, le four banal, la maison Consulaire, la chapelle Saint-Jaume et le Clos Soubeyran.","habitants":"Famille de Bertrand de Pierrefort\r\n        \"","divers":"Château de Sumène, Galon et les touelles sur le pont","gps":"","images":["../image/image_30/30_Sumene_1.jpg","../image/image_30/30_Sumene_2.jpg","../image/image_30/30_Sumene_3.jpg","../image/image_30/30_Sumene_4.jpg","../image/image_30/30_Sumene_5.jpg"]},"Consult_chateau_formulaire5a41":{"id":"Consult_chateau_formulaire5a41","dept":"30","canton":"Roquemaure","commune":"Tavel","nom":"Tavel","type":"Château","periode":"XV-XVIII","histoire":"Deux château à Tavel, le château d'Aquéria  et le Trinquevedel.            ACQUERIA, exploitation viticole de Joseph d'Acquéria premier propriétaire en 1595 qu'il reçu de l'abbé de Saint-André de Villeneuve les Avignon, il passa en 1720  à Marguerite de Bernard veuve de Jean de Perthuis et passa ensuite  à Jean-François David de Serène maire de Roquemaure, passa ensuite dans diverses mains pour arriver en 1920 chez monsieur  Jean Olivier qui créa sa société viticole.                                                     TRINQUEVEDEL, les droits sur Tavel ont été concédé à Jacques Durat par  André Louis de Brancas, Jacques Durat fit construire l'habitation à Trinquevedel qui fut vendu en 1776 à  Jean-Baptiste Barbier puis à Joseph de Parrosel et à Jean-Baptiste Gastaldy, officier du fort Saint-André. Le dernier propriétaire noble de Trinquevedel le comte de Castellan fut assassiné en 1800. La bâtisse changea de mains plusieurs fois et fut abandonné pendant une cinquantaine d'année, en 1935 elle fut racheté parle romancier Joseph  Delteil qu'il revendit à monsieur Demoulin viticulteur.","architecture":"Acquéria, château dans les vignes de plan rectangulaire à trois niveaux de sept travées, les trois travées centrales se trouve sous le fronton triangulaire avec accès par escalier au premier étage.    Trinquevedel bâtisse rectangulaire du XVIIIe siècle à trois niveaux toitures en croupes, des dépendances assez importantes pour l'exploitation viticole.","habitants":"Famille de Jean-François David de Serène                                               Famille de Jacques Durat\r\n        \"","divers":"Château d'Acquéria  et de Trinquevedel.","gps":"","images":["../image/image_30/30_Tavel_1.jpg","../image/image_30/30_Tavel_2.jpg","../image/image_30/30_Tavel_3.jpg","../image/image_30/30_Tavel_4.jpg","../image/image_30/30_Tavel_5.jpg","../image/image_30/30_Tavel_6.jpg"]},"Consult_chateau_formulaire498e":{"id":"Consult_chateau_formulaire498e","dept":"30","canton":"Aigues-Mortes","commune":"Aimargues","nom":"Teillan","type":"Château","periode":"XIV","histoire":"TEILLAN, cité en 841, au Xe siècle fief de Bernard Aton  vicomte de Nimes, puis aux Trincavel. Au XIIe siècle, il fut vendu à l'abbaye de Psalmody, et les moines installèrent un prieuré. Cest Guillaume de Noraquet qui ordonna une nouvelle construction. En 1608, il est racheté par Philippe Magnan de Bornier, fils de notaire d'Aimargues président de la cour des comptes du Languedoc et après avoir épousé  Marguerite de Farges  entreprend la construction du château sur les ruines de l'ancien  prieuré et qui le dote d'une porte Renaissance et un pigeonnier de 1500 nids. Au XVIIe siècle le château passe de Anne de Bornier épouse de Théophile de Montolieu, et sous le règne de Louis XV, Charlotte de Montolieu par alliance apporte le domaine à son époux Pierre d'Adhémar. C'est d'ailleurs  dans ce château que mourut le préfet Pierre Melchior d'Adhémar en 1821. Le château remit au gout du jour de l'Empire. Le sous sol et la tour carrée qui sélève au-dessus du bâtiment principal témoignent encore aujourdhui de cet aménagement, ce qui a  eu pour résultat la majestueuse noria, la splendide façade et  le pigeonnier. En 1835, le propriétaire du domaine eut la permission dy rassembler de nombreux débris de bornes, certes mais qui demeurent encore des trésors historiques romains. Dans le parc, un bassin de Cérès  restauré en 1870 et un magnifique carrefour des trois milliaires, jonction  bucolique entre le jardin, lallée de lauriers et  lorangerie romantique. Il appartient aujourd'hui à la famille de Cazenove.","architecture":"Teilhan, cet ancien castrum romain portait le nom de \"villa Tellianis\" dont les plus anciens documents retrouvés à ce jour, datent de 814 et 960. Le châ
