om":"Valbonne","commune":"St-Paulet de Caisson","type":"Chartreuse","img":"../image/image_30/30_Valbonne_1.jpg"},{"id":"Consult_chateau_formulaire24c9","nom":"Vallabrix","commune":"Vallabrix","type":"Château","img":"../image/image_30/30_Vallabrix_1.jpg"},{"id":"Consult_chateau_formulaireea30","nom":"Valleraugues","commune":"Valleraugues","type":"Château","img":"../image/image_30/30_Valleraugues_1.jpg"},{"id":"Consult_chateau_formulaire4e36-2","nom":"Valliguieres","commune":"Valliguières","type":"Château","img":"../image/image_30/30_Valliguieres_1.jpg"},{"id":"Consult_chateau_formulaire7dfc","nom":"Vauvert","commune":"Vauvert","type":"Patrimoine","img":"../image/image_30/30_Vauvert_1.jpg"},{"id":"Consult_chateau_formulaire6e27","nom":"Venejan","commune":"Vénéjan","type":"Château fort","img":"../image/image_30/30_Venejan_1.jpg"},{"id":"Consult_chateau_formulairef875","nom":"Verfeuil","commune":"Verfeuil","type":"Forteresse","img":"../image/image_30/30_Verfeuil_1.jpg"},{"id":"Consult_chateau_formulaire9b98-2","nom":"Vestric_Candiac","commune":"Vestric et Candiac","type":"Château","img":"../image/image_30/30_Vestric_Candiac_1.jpg"},{"id":"Consult_chateau_formulaire42c9","nom":"Vezenobres","commune":"Vézénobres","type":"Château vestiges","img":"../image/image_30/30_Vezenobres_1.jpg"},{"id":"Consult_chateau_formulaire688a","nom":"Villevieille","commune":"Villevieille","type":"Forteresse","img":"../image/image_30/30_Villevieille_1.jpg"},{"id":"Consult_chateau_formulairee49e","nom":"Vissec","commune":"Vissec","type":"Manoir","img":"../image/image_30/30_Vissec_1.jpg"}];const FULL={"Consult_chateau_formulaire7a87":{"id":"Consult_chateau_formulaire7a87","dept":"30","canton":"Uzès","commune":"Aigaliers","nom":"Aigaliers","type":"Maison forte","periode":"XIII","histoire":"AIGALIERS, au XIe siècle fief des comtes de Toulouse commandé par le seigneur d'Aigaliers, vassal du comte d'Uzès, lui-même vassal du comte de Toulouse Raymond, vaincu par les seigneurs du Nord lors de la croisade des Albigeois. Ce seigneur semble avoir fait le choix de financer et de partir à la croisade, mais revenu défait et ruiné, il dût se séparer de sa seigneurie des comtes de Toulouse,  celle-ci est alors démantelé et revient à divers propriétaires, ce qui explique la complexité des lieux et la co-seigneurie. Mais cet événement marqua le nord de l'Uzège, car le seigneur d'Aigaliers ne fut pas le seul dans ce cas. Afin de garder sa lignée seigneuriale et sa particule, il bénéficia d'un privilège octroyé par le Roi de France au XIIIe siècle, et reçu le titre de maître verrier, métier que seul des seigneurs déchus pouvaient pratiqués.  La famille de Rossel  en 1635, Jacob de Rossel suite à une mort accidentel, le fils tenu à l'exil, la seigneurie passa par alliance  à la famille Bornier et au XVIIIe siècle  à la famille de Brueys, le domaine étant associé à celle du seigneur d'Aigaliers, permit à la commune d'être élevé au titre de  baronnie.","architecture":"Vestiges du château d'Aigaliers subit des assauts des Tuchins, malgré cela à conservé des murs  intacts. La commune compte également un château médiéval, laissé à l'abandon. Il présente une physionomie originale, sur un modèle complexe comparable au château d'Allèges (Allèges-les-Fumades), et organisé en co-seigneurie, dont celle d'Aigaliers. À noter que ce château disposait d'une ferme dans la plaine.","habitants":"seigneur d'Aigaliers\r\n        \"","divers":"Plusieurs maisons fortes à Aigaliers, Boudiguet, Gattigues et le Mas.","gps":"","images":["../image/image_30/30_Aigaliers_1.jpg","../image/image_30/30_Aigaliers_2.jpg","../image/image_30/30_Aigaliers_3.jpg","../image/image_30/30_Aigaliers_4.jpg"]},"Consult_chateau_formulaired5b7":{"id":"Consult_chateau_formulaired5b7","dept":"30","canton":"La Grand-Combe","commune":"St-Sébastien d","nom":"Aigrefeuille","type":"Vestiges","periode":"XIII","histoire":"AIGREFEUILLE,en 1228,Pons dAigrefeuille, alors chevalier, avait établi son testament à Anduze. Cest donc sur ses descendants que viendra la tourmente qui les dispersera. les Aigrefeuille étaient une seigneurie indépendante, avec le comte de Toulouse pour seul souverain vassaux des Pelet d'Alès. Guillaume et Bernard Pons dAigrefeuille font hommage à Tiburge, veuve de Raimond Pelet, comte dAlès. En 1239, le sénéchal Pierre dAthies envoie un détachement au château des Aigrefeuille, ses hommes détruisent alors les maisons de Pons dAigrefeuille, ainsi que la tour et les constructions attenantes de Guillaume dAigrefeuille. Passa aux Sauvin Saze qui au XVe siècle  firent construire le nouveau château, qui passa par alliance aux Bossurgues d'Espinassous, de retour à Guillaume de Rozel qui avait épousé Louise  de Bossugues et le dernier de cette lignée mourut en 1746 sans succession, ses biens furent céder aux hospices d'Alès qui les gardèrent jusqu'en 1849 ou il furent acquis par l'arrière- grand-père du propriétaire actuel monsieur Dufoix.","architecture":"Sur une motte féodale vestiges d'une tour  de guet faisait partie de l'important  château de Aigrefeuille.  Le château de Saint-Sébastien quadrilatère  long corps de logis à trois niveaux, deux tours carrées à niveaux du bâtiment, seul la tour Est est saillante, à l'extérieur pavillon carrées du XVIe siècle sert de dépendance.","habitants":"Pons dAigrefeuille\r\n        \"","divers":"Vestiges du château d'Aigrefeuille et le château de Saint-Sébastien.","gps":"","images":["../image/image_30/30_Aigrefeuille_1.jpg","../image/image_30/30_Aigrefeuille_2.jpg","../image/image_30/30_Aigrefeuille_3.jpg","../image/image_30/30_Aigrefeuille_4.jpg"]},"Consult_chateau_formulairebf38":{"id":"Consult_chateau_formulairebf38","dept":"30","canton":"Quissac","commune":"Aigremont","nom":"Aigremont","type":"Maison forte","periode":"XIV","histoire":"AIGREMONT, les comtes d'Alés en furent propriétaires, puis passa  à Othon de Montaut, hommage rendu en 1215  à Simon de Monfort, au début du XIVe siècle, Philippe le Bel fait don de la Baronnie d'Aigremont au seigneur Guillaume de Plaisian qui construit le château en 1320. Ce dernier est achevé en 1360. Par alliance passe au Aleyrac, la fille de Pons d'Aleyrac, Catherine de Plaisan en hérita,  toujours par alliance de Marguerite d'Aleyrac transmet le château à Thomas de Rochemaure seigneur de Saint-Michel, sa descendance le baron  Jean-Baptiste-Louis émigra, ses biens sont vendus comme bien National, à son retour se retira au  domaine de Roux à Bragassargues qui appartenait à son épouse.","architecture":"Le château d'Aigremont, construit sur un rocher, est détruit et pillé pendant la Révolution, mobiliers et archives totalement brûlés en avril 1792. Les murailles du château définissent un cercle presque parfait qui laisse supposer qu'Aigremont naquit sous la forme d'une  bâtisse construite en continuité et circulairement autour d'un point fort, ici un donjon semble-t-il. Au centre de la cour du château, remarquable tour donjon d'architecture romane du XII ou XIIIe siècle, hélas défigurée, échauguettes et fenêtres à meneaux ont disparu. Au Nord, se trouve une tourelle de 2 mètres de diamètre. Au sud, le porche d'entrée s'impose avec sa porte charretière en plein cintre sur laquelle on lit les dates de 1360 et 1760.","habitants":"Seigneur Guillaume de Plaisian\r\n        \"","divers":"Maison forte à Aigremont.","gps":"","images":["../image/image_30/30_Aigremont_1.jpg","../image/image_30/30_Aigremont_2.jpg","../image/image_30/30_Aigremont_3.jpg"]},"Consult_chateau_formulairee887":{"id":"Consult_chateau_formulairee887","dept":"30","canton":"Aigues-Mortes","commune":"Aigues-Mortes","nom":"Aigues_Mortes","type":"Forteresse","periode":"XIII","histoire":"AIGUES-MORTES,  en 1240 Louis IX dit Saint-Louis, devenait le premier roi de France  en décidant de fonder une ville nouvelle à posséder un port d'accès en Méditerranée et aux échanges commerciaux avec l'Italie et l'Orient, en imposant politiquement sur une bande de terre cernée à l'est par la Provence. Louis IX obtint ces terres de l'abbaye bénédictine de Psalmodi, y bâtit l'imposante tour du Roi, la Tour de Constance, ainsi qu'un château, aujourd'hui disparu et aménagea des canaux vers la mer, Arles et Montpellier. Ses successeurs, Philippe III le Hardi puis Philippe le Bel, continuèrent son oeuvre et firent bâtir les remparts. Après cette éphémère période d'apogée, la cité cessa de croître, car le port s'ensablait et une fois la Provence rattachée à la France en 1481, Marseille remplaça Aigues-Mortes, qui perdit son intérêt stratégique. Dans cette Tour de Constance fut enfermé les Templiers, des nobles en disgrâce, des protestants et en 1755, Marie Durand  ainsi que d'autres prisonniers Abraham Mazel.","architecture":"L'enceinte d'Aigues-Mortes  construit au XIIIe siècle est un ouvrage redoutable de 1700 mètres de longueur, protégeant l'ancienne cité médiévale. Les remparts à l'angle nord intègre la Tour de Constance, surmontée d'une petite bâtisse qui servit de phare à l'époque où la mer était proche, édifiée un peu plus tôt par Saint-Louis, entre 1242 et 1254, qui avait pour fonction d'abriter la garnison royale. Cette tour de 22 mètres de diamètre atteint les 30 mètres de hauteur. L'ensemble constitue l'un des plus beau ouvrage d'architecture défensive médiévale en Occident, dans ce milieu marécageux où la pierre côtoie les marais salants. On accède aux différents niveaux par des escaliers. La basse-fosse était un lieu de stockage qui servit aussi de prison pendant cinq siècles. La salle des gardes ou salle basse avait 4 archères qui ouvraient sur l'extérieur. L'entrée était formée d'une haute porte fermée par une herse en bois. Du château  résidence des gouverneurs du XVIe siècle, dans la salle des chevaliers ou salle haute étaient emprisonnées les protestants aux XVIII siècle. Entre ces deux salles, le chemin de ronde ou coursière annulaire, sorte de couloir construit en hauteur dans l'épaisseur du mur et qui permettait de surveiller la salle basse. Enfin, la terrasse dominant largement la région, représentait un poste idéal de surveillance, sur cette terrasse se dresse la tourelle, ancien phare qui guidait les bateaux, grâce à un feu maintenu en son sommet, et les surveillait pour qu'ils s'acquittent des droits de douane.","habitants":"Roi Louis IX dit Saint-Louis\r\n        \"","divers":"Aigues-Mortes, la cité, la tour de Constance, le château et les remparts.","gps":"","images":["../image/image_30/30_Aigues_Mortes_1.jpg","../image/image_30/30_Aigues_Mortes_2.jpg","../image/image_30/30_Aigues_Mortes_3.jpg","../image/image_30/30_Aigues_Mortes_4.jpg","../image/image_30/30_Aigues_Mortes_5.jpg","../image/image_30/30_Aigues_Mortes_6.jpg","../image/image_30/30_Aigues_Mortes_7.jpg","../image/image_30/30_Aigues_Mortes_8.jpg"]},"Consult_chateau_formulaire5af7":{"id":"Consult_chateau_formulaire5af7","dept":"30","canton":"Pont-St-Esprit","commune":"Aiguèze","nom":"Aigueze","type":"Forteresse","periode":"XII","histoire":"AIGUEZE, il faut remonté à l'époque de Charles Martel pour la construction de la ligne de défense, fut sous le contrôle des  seigneurs de Balazuc  qui deviennent vassaux des comtes de Toulouse évoque les rivalités entre les barons d'Aiguèze, et les comtes-évêques de Viviers. La concurrence entre ces deux grands seigneurs se termine lors de la croisade contre les Albigeois et la victoire du roi de France allié au pape. Le castrum d'Aiguèze n'est cité pour la première fois qu'en 1193, époque à laquelle Raymond V, Comte de Toulouse, récupère les droits qu'il avait sur le château d'Aiguèze de l'évêque de Viviers. Lors de la Guerre de Cent Ans, la région est régulièrement ravagée par les grandes compagnies, c'est la période des Jacqueries. en 1375 le fief est vendu à Pons Biordon, les Tuchins s'emparent de plusieurs cités, dont celle d'Aiguèze en   1382. Le roi de France mobilise une véritable armée pour reprendre la forteresse qu'il détruit de fond en comble. La baronnie passe par alliance au Beauvoir de Roure, puis aux Harcourt-Lorraine  puis vendu au Rochepierre et les Vogüe qui le gardèrent jusqu'à la Révolution. Les Rommanet prirent possession du château qu'il revendirent à l'archevêque de Rouen Mgr Fuzet  en 1848 descendant des Romanet. Aujourd'hui toujours dans la famille  par alliance de monsieur Fruton.","architecture":"Aiguèze,  perché sur la falaise qui domine l'Ardèche, la forteresse d'Aiguèze  du XIe-XIIe siècle,  il faut parcourir la préhistoire pour deviner les premiers habitants \"Aiguezois\". La commune a en effet le privilège d'abriter de très nombreux vestiges des premiers européens. Les gorges de l'Ardèche faisant partie de ces lieux extrêmement prisés par l'homme préhistorique, lieux où il y trouve le couvert et surtout le gite dans ses innombrables cavités. Le village quant à lui ne remonte qu'au Moyen-Age. Le château du XIIe siècle qui séparé du village fortifié par un fossé, symbolisait l'oppression car appartenant aux visiteurs des gabelles. La cité fut reprise en 1383 par la force et détruite. Durant les guerres de religions le village fut assiégé par les protestants, l'église ainsi que le presbytère furent détruits. Destruction qui occasionna de grands frais à la communauté et un procès avec le prieur qui exigeait qu'on lui rebâtisse une habitation. Dans la deuxième moitié du XVe siècle. Un hôpital fortifié est construit. Au siècle suivant,  de nombreux bâtiments sont relevés. Le château avec porte d'entrée Renaissance surmontée d'un médaillon en terre cuite vernissée.","habitants":"Seigneur Pons Biordon\r\n        \"","divers":"Vestiges de la forteresse d'Aigueze","gps":"","images":["../image/image_30/30_Aigueze_1.jpg","../image/image_30/30_Aigueze_2.jpg","../image/image_30/30_Aigueze_3.jpg","../image/image_30/30_Aigueze_4.jpg","../image/image_30/30_Aigueze_5.jpg","../image/image_30/30_Aigueze_6.jpg","../image/image_30/30_Aigueze_7.jpg","../image/image_30/30_Aigueze_8.jpg","../image/image_30/30_Aigueze_9.jpg"]},"Consult_chateau_formulaire5b7e":{"id":"Consult_chateau_formulaire5b7e","dept":"30","canton":"Aigues-Mortes","commune":"Aimargues","nom":"Aimargues","type":"Château","periode":"XVI","histoire":"Quatre châteaux à Aimargues, château d'Aimargues  et de Teillan  du XVIIIe siècle (voir-Article), le château d'Andron et le mas Grand-Malherbes.                                                                              AIMARGUES, dit d'Andran, en 1161, qui joua un rôle important comme centre de recrutement pour le Temple de Saint-Gilles. On sait que les frères Armand de Bordel, Raimon Alazandi et Pons Arimandi étaient originaires d'Aimargues. La tradition veut également que ce soit le roi Louis IX, dit Saint-Louis, qui, partant pour la croisade en Palestine, fit étape dans la cité avant de s'embarquer au port d'Aigues-Mortes. Mais l'on retient surtout que c'est son frère Alphonse de Poitiers et sa femme Jeanne y séjournèrent en mai 1270. Leurs testaments respectifs, en français et en latin, sont datés d'Aimargues.                                          ANDRON, qui était autrefois la résidence de la grande manadière Fanfonne Guillierme.\r\nGRAND-MALHERBES,  ces vénérables murs érigés au XVI siècle, entre Nîmes et Montpellier, furent la demeure des trésoriers du Roi Louis XV avant dappartenir, bien plus tard à larrière petite-fille de Victor Hugo. Résidence de la famille Hugo, Elle y reçu Cocteau, Eluard, Erik Satie,Blum. De cette époque, le lieu a hérité de son hospitalité et de sa convivialité.","architecture":"Aimargues,  le château à été rasé seul resté le pigeonnier accolé à un corps de logis.                                                                                            Le château d'Andron corps de logis rectangulaire à deux niveaux et attiques, pavillons d'entrée saillants sur deuxième travée.                                                                                       Grand Malherbes,  bâtiment allongé en forme d'un T avec dépendances.","habitants":"Alphonse de Poitiers                                                                              Famille de Victor Hugo\r\n        \"","divers":"Château d'Aimargues,  de D'Andron et du Grand-Malherbe","gps":"","images":["../image/image_30/30_Aimargues_1.jpg","../image/image_30/30_Aimargues_2.jpg","../image/image_30/30_Aimargues_3.jpg","../image/image_30/30_Aimargues_4.jpg"]},"Consult_chateau_formulaire00f7":{"id":"Consult_chateau_formulaire00f7","dept":"30","canton":"Alzon","commune":"Arrigas","nom":"Albignac","type":"Château","periode":"XVI","histoire":"ALBIGNAC, après la destruction du Pont d'Arre, la famille d'Albignac fait construire le château d'Arrigas. Au XVIIe siècle, la famille d'Albignac apporte de sérieuses modifications au château  et s'installe définitivement dans cette belle demeure héritée des Béranger de Caladon. Il porte aujourdhui le nom de « château d'Albignac » C'est là que naît en 1739 Louis-Alexandre d'Albignac, qui sera lieutenant-général des armées du roi, général de division sous la Révolution et l'Empire, chevalier de Saint-Louis et chevalier de la Légion d'Honneur. Après une carrière remarquée, mais brimée, sous l'Ancien Régime, Louis-Alexandre d'Albignac se met au service de la Révolution en acceptant de devenir le premier maire du Vigan (1790) puis en reprenant du service contre les ennemis de la Révolution (camps de Jalès en 1791-1792), à l'armée des Alpes ou à l'armée du Rhin. C'est le plus illustre des enfants d'Arrigas, bien qu'il soit mort dans son hôtel particulier du Vigan. Les d'Albignac y vivent jusqu'à la mort du général Louis Alexandre d'Albignac (1739-1825). Le château devient ensuite la propriété de son neveu, Marc Antoine de la Tour Lisside jusqu'à sa mort en 1848. Acheté en 2011 par des amoureux de la région.","architecture":"lorigine du château d'Albignac semble incertaine. Certains ouvrages le mentionnent déjà au XIVe siècle. Toutefois, les éléments sculptés les plus anciens retrouvés datent de la première moitié du XVe siècle. Il est modifié à toutes les époques qui suivent. De la fin du Moyen-Age, il conserve une petite muraille percée de meurtrières donnant sur la place du village dArrigas et quelques murs. Sa façade présente de belles fenêtres à meneaux des XVe, XVIe et XVIIe siècles, des baies géminées de cette dernière époque également, des corniches en pierre, ainsi que des encadrements de portes en pierre des XVIe et XVIIe siècles. Tout le rez-de-chaussée est constitué de salles voûtées construites très probablement au XVIIe siècle à l'intérieur des murs pré-existants. La seconde moitié du XIXe siècle sonne le début de l'agonie pour ces vieilles pierres; le château est divisé et dépecé. Un aménagement des lieux dans la seconde moitié du XXe siècle le sauve peut-être de la ruine, le château s'apprête à retrouver son allure et vivre une nouvelle aventure, une restauration est en cours.","habitants":"la famille d'Albignac\r\n        \"","divers":"Château d'Albignac.","gps":"","images":["../image/image_30/30_Albignac_1.jpg"]},"Consult_chateau_formulaireff77":{"id":"Consult_chateau_formulaireff77","dept":"30","canton":"Alès","commune":"Alès","nom":"Ales","type":"Citadelle","periode":"XVII","histoire":"ALES; la famille Narbonne Pelet était suzerain d'Alais.  Raymond Pelet, coseigneur d'Alais, prend le parti de Simon de Montfort contre les seigneurs d'Anduze  pour resté fidèle au comte de Toulouse. le château de Soucanton construit par Bermont seigneur d'Anduze et co-Baron d'Alès entre 1050 et 1150 il ne reste plus rien. À l'emplacement du fort Vauban, sur la butte de la Roque furent construits au XIIe siècle deux châteaux appartenant aux Pelet d'Alès et aux Bernard d'Anduze, les deux seigneurs de la ville. En 1565 , les deux châteaux ruinés par les guerres de religion furent tour à tour démolis puis reconstruits. À l'époque où la construction du fort Vauban fut envisagée, le château  des comtes ne subsistait que la tour Sainte-Anne. Le promoteur des fortifications de Nîmes, de Saint-Hippolyte-du-Fort et d'Alès fut l'intendant de Basville qui espérait par ce biais, pouvoir intervenir rapidement contre les assemblées de protestants. En 1686, donc après la révocation de l'édit de Nantes, la construction d'un fort à Alès fut décidée. La tour Sainte-Anne du château des comtes fut démolie, le château des barons rasé, à l'exception de la porte du XIIIe siècle intégrée à la courtine, le couvent des Capucins fut également démoli. Les travaux furent menés très rapidement et se terminèrent dès 1688. Une garnison royale y fut installée, le fort pouvant également servir de prison pour les protestants.","architecture":"Du château de Soucanton au sud ouest de la ville positionner sur un mont rocheux, il en subsiste un pan de mur percé d'une porte plein cintre vestige de la tour maîtresse.                                À l'époque où la construction du fort Vauban fut envisagée, le château des barons, la construction, terminée en 1688.  L'enceinte défensive est composée de six bastions, d'une quarantaine d'embrasures à canon, un fossé, une porte en escalier vers la ville et une de secours défendue par un pont-levis et une grille. Le fort Vauban construit à l'emplacement de l'ancien château féodal est en forme de U avec deux corps de logis, un pour loger le gouverneur et l'état-major et l'autre pour la garnison. Le logis du côté du midi servait de logement au gouverneur et à l'état major. Il s'ouvre sur une terrasse rajoutée a posteriori, l'autre corps était occupé par la garnison et pouvait servir de prison. Au centre du fort, l'ingénieur plaça un grand escalier, rampe sur rampe, qui distribue les ailes en retour.","habitants":"Seigneur d'Anduze,                                                                          Bernard Pelet seigneur d'Alès\r\n        \"","divers":"Fort Vauban d'Alès, le musée, le pavillon de Racine et  Rochebelle.","gps":"","images":["../image/image_30/30_Ales_1.jpg","../image/image_30/30_Ales_2.jpg","../image/image_30/30_Ales_3.jpg","../image/image_30/30_Ales_4.jpg","../image/image_30/30_Ales_5.jpg","../image/image_30/30_Ales_6.jpg","../image/image_30/30_Ales_7.jpg","../image/image_30/30_Ales_8.jpg","../image/image_30/30_Ales_9.jpg"]},"Consult_chateau_formulairebc87":{"id":"Consult_chateau_formulairebc87","dept":"30","canton":"Rousson","commune":"Allègre","nom":"Allegre_30","type":"Vestiges","periode":"XII-XV","histoire":"Deux châteaux à Allégre celui d'Allégres du XIIIe siècle vestiges d'un donjon et le château du Boisson du XVe siècle.                                                                                                                                        ALLEGRE, dit des Templiers apparaît en 1163 lorsque les seigneurs de Ferreyroles rendirent hommage à Bernard Pelet seigneur d'Alès. Le château d'Allègre est donc reconnu depuis le XIIe siècle, et comme vue ci-dessus, l'acte le plus ancien retrouvé et étudié est l'acte où figurent Bemard de Fereyrolles et ses frères. Ces derniers  rendant hommage à Bemard Pelet, baron d'Alès, pour ce qu'ils détiennent au château. Il faut attendre 1211, et un parchemin du roi Philippe Auguste scellé de cire, qui confirme que diverses possessions du château, parmi lesquelles des terres appartenant au seigneur de Fereyrolles, sont tenues par un grand seigneur ecclésiastique, l'évêque d'Uzès. Plusieurs familles seigneuriales se partageront alors le domaine dAllègre sous la suzeraineté de cet évêque. Au XIVe siècle plusieurs vassaux se partagent la forteresse d'Allègre. On peut y voir , Guillem Bérard, Jaussin de Naves, Raymond d'Allègre, Peyre Jadun chevalier, B. del Puech et R. de Cadoine. C'est à la suite de multiples partages et alliances que le château d'Allègre est divisé entre diverses maisons seigneuriales formant ainsi une co-seigneurie. Il y a eu partage  au château d'Allègre et de ses terres au détriment de Raymond de Barjac le vieux et en faveur de Raymond de Barjac le jeune. Aigline d'Allègre, demoiselle, s'unit à Alzias de Hauvillars originaire du Vivarais.  Mais à la fin du XVIIIe siècle, les princes de Conti, héritiers des biens de la maison de Budos, inféodisent le château d'Allègre, qui est alloué au vicomte Bérard de Montalet.                                                                                                                                                     BOISSON, seigneurie partagé par les seigneurs de Portes et les évêques d'Uzés, puis par les Haut-Villar au XVe siècle, au XVIIe siècle passa aux Moreton de Chabrillant qui le vendirent en 1750 aux Boudier de Laribal et acheté en 1965 à monsieur Vaysse  par monsieur Ravenstein et monsieur Van Empel qui l'on  transformé en gites de France  hôtel-restaurant et  camping.","architecture":"Vestiges du château  des templiers d'Allègre qui a eu à affronter les vicissitudes trop classiques de ces époques reculées. Au XVe siècle la décadence du pouvoir des seigneurs d'Allègre doit avoir progressé, car deux siècles plus tard le château est déjà tombé en ruine. De nos jours le château dAllègre offre toujours l'image imposant d'un castrum. On voit un donjon carré percé d'archères, des restes d'enceintes et de logis. Il y a en plus des restes d'un village fortifié. Les pierres du château restent des témoins de neuf siècles d'histoire et d'architecture médiévale. C'est donc à juste titre que le château d'Allègre fut classé monument historique en 1997. Une association très active et méritante s'attache a mettre en valuer le site du château et y font parfois des découvertes intéressantes.\r\nBoisson maison forte  du XVe siècle, corps de logis en quadrilatère à deux niveaux accolé de deux tours  sur la face ouest l'une ronde l'autre carrée.","habitants":"Seigneur de Ferreyroles, Moreton de Chabrillant\r\n        \"","divers":"Vestiges de la forteresse d'Allegre et maison forte de Boisson","gps":"","images":["../image/image_30/30_Allegre_30_1.jpg","../image/image_30/30_Allegre_30_2.jpg","../image/image_30/30_Allegre_30_3.jpg","../image/image_30/30_Allegre_30_4.jpg","../image/image_30/30_Allegre_30_5.jpg","../image/image_30/30_Allegre_30_6.jpg","../image/image_30/30_Allegre_30_7.jpg","../image/image_30/30_Allegre_30_8.jpg","../image/image_30/30_Allegre_30_9.jpg"]},"Consult_chateau_formulaire8332":{"id":"Consult_chateau_formulaire8332","dept":"30","canton":"Alès","commune":"Anduze","nom":"Anduze","type":"Château","periode":"XVI","histoire":"ANDUZE, la seigneurie de Bermont d'Anduze fut établie au début du Xe siècle était l'une des plus anciennes et des plus puissantes du Languedoc. Battant monnaie, la famille d'Anduze régnait en maison souveraine sur les Cévennes,  s'intitulèrent marquis de Gothie et prince d'Anduze. Elle était alliée aux comtes de Toulouse et a participé à la croisade contre les Albigeois, en 1266, elle fut rattachée à la couronne de France. Elle a compté parmi ses possessions les maisons de Sauve, de Roquefeuil (toujours existante), de Sommières, de La Voûlte et de Joyeuse. Le château fut construit au XVIe siècle par les  Airbaudouze seigneurs, Jean Folquier d'Airbaudouze  et son cousin Guy héritiers de Marquèse Airbaudouze deviennent seigneurs en 1547, En 1573, la ville voit la naissance de ce que Janine Garrisson a appelé les Provinces-Unies du Midi. La baronnie fut confisquée par le duc de Montmorency, puis rendu en 1598, érigée en marquisat en 1645  passa par alliance  la marquise d'Anduze qui épousa en 1724  François-Claude Trophime de Saxy,  toujours par alliance à Jacques-Ambroise d'Avignon grand sénéchal de Provence, vendue avant la Révolution à Marie-Jeanine-Madeleine  Bardy épouse de monsieur Hostalier de St-Jean. Aux XVIe et XVIIe siècles, Anduze était un centre important du protestantisme cévenol. Ce château était la demeure de Roger de Beaufort, comte d'Alais et Seigneur d'Anduze. \r\nChateau de Labahou transformé en maison de retraite.","architecture":"Anduze, du château primitif au sommet du village  il ne reste plus rien, le nouveau château fut reconstruit  au XVIe siècle au coeur de la ville, possédait une tour carrée  et des tours crénelées aujourd'hui détruites  reste deux tours rondes arasées à hauteur du toit, Anduze  vit ses remparts démantelés. La tour de l'horloge faisait partie du château du XVIe siècle construit par les derniers seigneurs les Airbaudouze.     \r\nLa tour de Pézène date des XIIIe et XIVe siècle elle fait partie du château, fortifiée elle daterait  du XIVe siècle, vers 1347 vieille maison seigneuriale et résidence des comtes de Beaufort du XVe et XVIe siècles, l'appellation de Pézène lui fut donné par le baron du même nom qui l'habitait au XVIe siècle.                                        Le château Neuf, c'est une demeure seigneuriale des XVIe et XVIIe siècles. À l'occasion de sa construction, il fut intégré dans les remparts. Il comprend deux tours en façade. La ville fortifiée,  devient le quartier général des forces protestantes du Midi.","habitants":"Comte Roger de Beaufort\r\n        \"","divers":"Plusieurs châteaux à Anduze avec tour, le château de Labahou de Monac-Bagard et la tour de Pézéne.","gps":"","images":["../image/image_30/30_Anduze_1.jpg","../image/image_30/30_Anduze_2.jpg","../image/image_30/30_Anduze_3.jpg","../image/image_30/30_Anduze_4.jpg","../image/image_30/30_Anduze_5.jpg","../image/image_30/30_Anduze_6.jpg","../image/image_30/30_Anduze_7.jpg","../image/image_30/30_Anduze_8.jpg","../image/image_30/30_Anduze_9.jpg"]},"Consult_chateau_formulaire3a18":{"id":"Consult_chateau_formulaire3a18","dept":"30","canton":"Villeneuve les Avignon","commune":"Les Angles","nom":"Angles","type":"Château","periode":"XVIII-XIX","histoire":"Deux châteaux aux Angles, le château des Issarts et de Pontmartin.                                                                             ISSARTS, cité au XIIIe siècle par Raymond et Guillaume d'Aramon  qui vendent la quatrième partie à Vayran et Pierre Bermond   coseigneurs vassaux du comte de Toulouse, passa au roi de France en 1299 le roi Philippe le Bel cite la seigneurie des Issarts en toute justice d'ou intervient la construction du château, au XIVe siècle copropriété partagé entre les Rostang de Venasque et Lauger de Bermond. Helie de Sade qui en 1979 possédé la moitié fit donation à Jean du Chemin passa ensuite par alliances et héritages et au XVIe siècle à la famille de Galéan, au XVIIe siècle par alliance passa au Galéan Forbin,  en 1665, avec le mariage dHenri de Forbin et Marguerite de Galéan (Galliani) des Issarts que le titre et le domaine des Issarts entreront dans la branche des Forbins. La demoiselle Marguerite était la descendante au sixième degré de Claude Galliani,  qui avait lui-même acquis la terre et le titre des Issarts,  la famille du marquis de  Forbin le garde jusqu'à la Révolution, le château ne fut pas vendu  et rendu à son propriétaire, toujours dans cette  famille.                                PONTMARTIN, les Ferrari  conseiller à la cour des aides de Montpellier, famille venus d'italie construisirent une métairie sous le nom d'Aubeterre qui fut transformé   par Pontmartin. Par alliance  en 1780  de Joseph-Antoine qui épousa Jeanne Calvet, fille unique son oncle avait fait construire le château de Calvet qui devient Pontmartin, demeure d'Armant de Pontmartin, célèbre critique politique du XIXe siècle. C'est dans ce château que vécut l'un de ses descendants, le critique littéraire Armand de Pontmartin, qui fut maire des Angles de 1858 à 1864. Le peintre Louis Montagné  l'achète aux enchères en 1938 et en fait une maison d'été.  y habita jusqu'a sa mort en 1960.  Marie-Christine Pouchelon qui a aujourd'hui repris le domaine transformé en chambres d'hôtes.","architecture":"Issarts forteresse à 4 km du village  sur un contrefort de la colline qui dominent la Durance, quadrilatère flanqué de quatre tours, entrée du château sur la façades sud, deux tours crénelées à mâchicoulis du XIXe siècle, une cour fermée, a l'angle sud-ouest une tour carrée, ancienne tour de guet du XIIIe siècle.                                   Pontmartin  Il y a près de mille ans, sur ce terrain, les moines Bénédictins avaient érigé une église romane et une métairie, dont il reste encore des traces sur ses pierres. Traversant les siècles et les époques, elle devient \"château\", par son agrandissement effectué au début du XVIIIe siècle, de plan en L à trois niveaux porte plein cintre surmonté d'un balcon en pierre également orné des refends aux angles et autour des fenêtres, le deuxième bâtiment en équerre se prolonge sur deux arcades du XIIIe siècle.","habitants":"Famille de Galéan                                                                                 Famille d'Armand de Pontmartin\r\n        \"","divers":"Châteaux des Issarts et de Pontmartin.","gps":"","images":["../image/image_30/30_Angles_1.jpg","../image/image_30/30_Angles_2.jpg","../image/image_30/30_Angles_3.jpg","../image/image_30/30_Angles_4.jpg","../image/image_30/30_Angles_5.jpg","../image/image_30/30_Angles_6.jpg","../image/image_30/30_Angles_7.jpg","../image/image_30/30_Angles_8.jpg","../image/image_30/30_Angles_9.jpg"]},"Consult_chateau_formulaire300a":{"id":"Consult_chateau_formulaire300a","dept":"30","canton":"Beaucaire","commune":"Aramon","nom":"Aramon","type":"Château","periode":"XIII-XIX","histoire":"Deux châteaux à Aramon dont celui d'Aramon du XIII-XIXe siècle et le château  du Plaisir du XVIIIe siècle.                                      ARAMON, dés le XVe siècle on trouve cinq familles nobles en possession de trois parties de la juridiction basse. Ce sont les co-seigneurs jouissant de droit de privilèges effectifs ou honorifiques et ce jusquau XVIIIe siècle. Ces familles étaient les Posquières, les Laudun, les Joussaud, les Du-Jardins et les Malavettes. En 1426 Charles VII échangea ses parts avec Jacques de Poitiers seigneurs de Saint-Vallier contre des droits sur le comté valentinois, le maréchal de Boucicaut y vécut, en 1489 Aimar de Poitiers  vendit à Pérette Sarrate veuve d'Antoine de Luetz, Gabriel de Luetz  baron d'Aramon , la cession  du château par la famille de Poitiers déclenche des procès et des confiscation du château au profit de Diane de Poitiers, favorite du roi Henri II, duchesse du Diois et Valentinois  en 1547 à 1566, elle obtient  en 1551 du roi la donation d'Aramon, sa fille Françoise épousa Robert de la Marck duc de Bouillon qui vendit le château à Jacques de Gondin. Puis passa au marquis de Grimaut et en 1635 acheté par Jacques de Sauvan  conseiller du roi qui obtient l'appellation de sa terre en marquisat, et en 1650 par Hector de Monteynard sénéchal  de Nimes y demeurat  au château avec  Honoré de Gondin. Puis rendu au Sauvan qui le reconstruisit en partie en 1858. Aujourd'hui propriété du marquis d'Aramon.\r\nPLAISIR, de la famille Choisity famille bourgeoise d'Aramon, appartient depuis 1994 à monsieur Hollander possédant une chaine hôtelière en Belgique. Aujourd'hui société civile immobilière depuis vingt ans.","architecture":"Le château-fort du village d'Aramon fut érigé au XIIIe siècle,  donjon et une maison à l'origine, il est amélioré au fil des siècles, enceinte du château médiéval entourant un pavillon classique, deux corps de logis  en 1639, tour haute de 12 m et remparts. Un pont de pierre relie le château à un très joli parc. La porte de Montfrin à l'entrée ouest du village bâtie sur le site dune plus ancienne porte démolie en 1771. Elle fut reconstruite en 1774 grâce à la comtesse de Sauvan dAramon, telle quelle nous apparait aujourdhui. Devant se trouvait un pont-levis remplacé plus tard par un pont dormant en pierre  qui permettait de franchir les fossés qui faisaient le tour des remparts de la ville sauf coté Rhône.\r\nChâteau Plaisir du XVIIIe siècle en pierre de taille  de style classique, en façade au centre deux échauguettes encadrant la baie du deuxième étage, surmonté d'un grand clocheton de plan carré orné au sommet  de chaque côté d'un petit fronton triangulaire.","habitants":"Famille de Jacques de Poitiers                                                            Famille Choisity \r\n        \"","divers":"Château-fort d'Aramon et le château de Plaisir.","gps":"","images":["../image/image_30/30_Aramon_1.jpg","../image/image_30/30_Aramon_2.jpg","../image/image_30/30_Aramon_3.jpg","../image/image_30/30_Aramon_4.jpg","../image/image_30/30_Aramon_5.jpg","../image/image_30/30_Aramon_6.jpg"]},"Consult_chateau_formulairee3a1":{"id":"Consult_chateau_formulairee3a1","dept":"30","canton":"Alès","commune":"Alès","nom":"Arenes","type":"Château fort","periode":"XVI","histoire":"ARENES, au XIIe siècle commanderie des templiers,  au XIIIe siècle aux Barral d'Arènes acquise en 1343, Raymond de Soucanton sous l'autorité  des comtes d'Alès décide de se faire construire un château et de prendre sous sa protection léglise de Saint-Martin dArènes  en lenglobant dans lenceinte du château.  La fille de Pons de Soucanton, Maragde par alliance apporta le fief à Antoine de Tourtoulon ils eurent deux  filles qui épousèrent les deux frères Jean et Bertrand de Saussan de la Roque Aynier. Au milieu du XVe siècle les Seigneuries de Soucanton et  dArènes passent  dans la maison des Saussan par le mariage dIsabeau de Soucanton avec Bertrand de Saussan. En 1565 Il devint la propriété de François de Cambis (de la famille du Baron d'Alais). le château endommagé et à la fin du XVIe siècle reconstruit par François de Saussan. Il a suivi les héritages successifs, des Saussan aux de la Tour du Pin de La Charce-Gouvernet, des de Roquefeuil de Gabriac,  et en 1760 à Guillaume  dAlphanty conseiller secrétaire du roi. Ses descendants les Courtois de Pélissier-St Ferréol, dernière famille à porter le titre de Seigneur dArènes, puis le baron Courtois de Pélissier jusquen 1932, date de la vente à maître Lhermenier, notaire à Quimper, puis à la famille Bekaria en 1951 jusqua nos jours. La marquise de Sévigné décrit dans nombre de ses lettres la splendeur de ses charmilles et  de ses eaux. Alphonse Daudet  aurait également séjourné au château, se rappelant peut-être lépoque où il était maître détudes au Lycée dAlès. Aujourd'hui Arènes  appartient à une société civile immobilière.","architecture":"Arènes; forteresse médiévale flanquée de tours rondes reconstruit au XIV et XVIIe siècles, quadrilatère avec corps de logis rectangulaire s'élevant de deux étages flanqué aux angles de tours rondes rasées à la Révolution. Au XIXe siècle les tours encadrant la façade principale ont été restaurées  et munies de créneaux.","habitants":"Famille d'Isabeau de Soucanton\r\n        \"","divers":"Château fèodal d'Arènes","gps":"","images":["../image/image_30/30_Arenes_1.jpg","../image/image_30/30_Arenes_2.jpg","../image/image_30/30_Arenes_3.jpg","../image/image_30/30_Arenes_4.jpg"]},"Consult_chateau_formulaire9b60":{"id":"Consult_chateau_formulaire9b60","dept":"30","canton":"Redessan","commune":"Argilliers","nom":"Argilliers","type":"Château","periode":"XVI","histoire":"ARGILLIERS, château dit de Castille, au XIIIe siècle faisait partie du domaine Royal , en 1292 à Gancelin d'Uzés et au XVIe siècle aux de la Croix de Meirargues, acquis en 1661 par les de Froment d'Argilliers on  doit son allure actuelle à Gabriel-Joseph de Froment, troisième baron de Castille qui obtient en 1748 l'appellation de sa terre en baronnie. Né à Uzès en 1747,  Gabriel-Joseph de Froment  baron de Castille page de Louis XV, devint officier des gardes françaises, puis lieutenant du roi pour Uzès, fit construire le château. Personnage très ouvert aux idées nouvelles, il se passionne pour les voyages et se découvre un goût immodéré pour les colonnes, comme en témoigne l'imposant péristyle de l'édifice. En 1783, il épousa Epiphanie du Long, une Uzétienne. Gabriel rapportait le goût des colonnes de son voyage en Italie et de son séjour parisien à l'hôtel de Rohan. Il en orna systématiquement le château et son environnement d'une cinquantaine de colonnes. La grande colonnade elliptique de style toscane fut terminée en 1805. Jusqu'à sa mort il ne cessa d'agrémenter son parc de petits monuments commémorant les événements marquants de sa vie. On sait par une lettre du baron à la comtesse d'Albany qu'il est en train de construire d'espèces de temples monoptères en 1804. Le baron est mort en 1826. Le château est acheté en 1924 par Paul Grousset à M. Seguin-Vassieux, héritier des barons de Castille. Le château est racheté en 1950 par Douglas Cooper pour le revendre aux Bykhovetz.","architecture":"bastide d'Argilliers; fortifiée au XIVe siècle pour faire face aux menaces des routiers,  plusieurs campagnes de restauration ont été entreprises à partir de 1962. Le château de Castille; pavillon XVIe siècle de plan carré, flanqué de tours d'angle circulaires, entouré de colonnades, avant-cour en hémicycle, inspirée de la colonnade du Bernin à Rome (extérieur). Les travaux ont duré jusqu'en 1815. Le pigeonnier coiffé d'une coupole à lanternon et croissant figurant le C de Castille appelé \"le château d'eau\", l'ancien cimetière: tombeau du Baron et de la Princesse de Rohan, monument d'Edouard (fils du Baron).","habitants":"Famille de Gabriel-Joseph de Froment\r\n        \"","divers":"Château dit de Castille à Argilliers et son parc","gps":"","images":["../image/image_30/30_Argilliers_1.jpg","../image/image_30/30_Argilliers_2.jpg","../image/image_30/30_Argilliers_3.jpg","../image/image_30/30_Argilliers_4.jpg","../image/image_30/30_Argilliers_5.jpg"]},"Consult_chateau_formulaire61ad":{"id":"Consult_chateau_formulaire61ad","dept":"30","canton":"Uzès","commune":"Arpaillargues","nom":"Arpaillargues","type":"Château","periode":"XV","histoire":"ARPAILLARGUES,  au XVe siècle les seigneurs étaient les Bertha, passa par alliance au Ginestoux, en 1559 les Bargeton  achetèrent le château  toujours par alliance passa à la famille d'Agoult de Montmaur en 1619 de Mondette de Bargeron avec Charles d'Agoult de Piégon, leur petite fille reçut  en dot  en épousant Jean de Barjac de Rochegude lors de son exil  et la seigneurie fit retour aux d'Agoult en 1723, en 1790 naissance de Charles d'Agoult époux de Marie de Flavigny,  cette demeure  abrita les amours tumultueuses avec Franz Listz  et Marie de Flavigny qui le vendit à Gabriel Puget. Le château passa  à l'écrivain François Nourissier qui le vend en 1968 à Benjamin Savry qui en a fait un Hôtel.","architecture":"Château d'Arpaillargues de plan rectangulaire à deux niveaux  prolongé en retour d'équerre par un corps latéral taluté, deux avant-corps  sur flanc extérieur fronton sur sur porte fenêtre du premier étage, aujourdhui, transformé en hôtel on goûte à lélégance de cette demeure des Arts et des Lettres, prédestinée aux rêveries,  dans les senteurs fleuries de Provence. Derrière les vieilles pierres, 30 chambres au calme absolu, le village est remarquable par ses belles maisons en pierre de pays groupées autour de son château, élégante demeure du XVIIIe siècle.","habitants":"Famille D'Agoult de Montmaur\r\n        \"","divers":"Château d'Arpaillargues","gps":"","images":["../image/image_30/30_Arpaillargues_1.jpg","../image/image_30/30_Arpaillargues_2.jpg","../image/image_30/30_Arpaillargues_3.jpg","../image/image_30/30_Arpaillargues_4.jpg","../image/image_30/30_Arpaillargues_5.jpg","../image/image_30/30_Arpaillargues_6.jpg"]},"Consult_chateau_formulaire5e04":{"id":"Consult_chateau_formulaire5e04","dept":"30","canton":"Aigues-Mortes","commune":"Aubais","nom":"Aubais","type":"Château","periode":"XIV","histoire":"AUBAIS, les premiers seigneurs cité en 1179 étaient les chevaliers des Arènes acheté par  Guillaume de Bacassi en 1227 et par les Languissel, dont le dernier du nom mourut en 1356 à la bataille de Poitiers. La seigneurie changea plusieurs  fois de propriétaire  passa en 1591 dans la famille Baschi, par le mariage de Marguerite du Faur avec Balthazar de Baschi, trisaïeul de Charles de Baschi, cette famille fit construire le château baptisé à l'époque le Versailles du Languedoc. Charles de Baschi naquit le 20 mars 1686 au château de Beauvoisin. Sa famille, originaire de lOmbrie, région du centre de lItalie,  et alliée aux Médicis, aux Farnèse et aux Borromée, était lune des plus anciennes du Languedoc.  Charles de Baschi, après une brillante éducation, au collège de Toulouse, puis au collège de Clermont, à Paris, il entra aux mousquetaires dès lâge de 18 ans et fit la campagne de 1705 en Flandre.  Mais la passion des livres lui fit rapidement donner sa démission et revenir dans son château dAubais. Il épousa en 1708 Diane de Rozel, dame de Cors et Beaumont, dune ancienne famille originaire de Nîmes, et partagea désormais sa vie entre sa famille et ses livres. dont la bibliothèque contenait plus de 30 000 livres.  En 1792 son gendre le marquis d'Urre vendit la château qui fut pillé  et incendié à un maçon qui y fit des transformations servit de carrière pour la construction de maisons dans le grand parc. Aujourd'hui le château à plusieurs propriétaires.","architecture":"Château d'Aubais  est un vaste et imposant édifice du XIVe siècle, composé de deux châteaux accolés, dominé dans la partie centrale d'un pavillon saillant surmontait d'un dôme entre deux ailes, restes magnifiques d'un monument autrefois majeur. Qualité exceptionnelle de son architecture, en particulier du pavillon Nord ou corps central contenant l'escalier,  le corps principal du château avec sa terrasse ouest et son mur de soutènement ainsi que le rez-de-chaussée des ailes en retour. Le château offre un accès direct, à l'est, sur la place du village, ancienne cour d'honneur, la distribution intérieure était entièrement structurée à partir  de l'escalier haut de 25 m, en arcs  dont les volées convergent autour d'une seule volée centrale, le palier  du haut est porté par une voûte plate, la partie supérieure est décorée de niches  finement ouvragées et le départ  de l'escalier est sculpté. Le pavillon affirme sa domination sur les bâtiments  qui l'entourent. Propriété de la commune et propriété privée.","habitants":"Famille de Charles de Baschi\r\n        \"","divers":"Château d'Aubais","gps":"","images":["../image/image_30/30_Aubais_1.jpg","../image/image_30/30_Aubais_2.jpg","../image/image_30/30_Aubais_3.jpg","../image/image_30/30_Aubais_4.jpg","../image/image_30/30_Aubais_5.jpg"]},"Consult_chateau_formulaireb923":{"id":"Consult_chateau_formulaireb923","dept":"30","canton":"La Grand-Combe","commune":"Miallet","nom":"Aubignac","type":"Maison forte","periode":"XVI","histoire":"AUBIGNAC,  Les origines du château remontent aux XVIe siècle. Il a appartenu aux marquis Charles de Baschi et aux Savins de la Forest, vieille famille noble dont les aînés embrassaient des carrières d'armes aux services du roi. Par alliance de Marie de Savins  passa en 1659 à François de Vignolles capitaine d'infanterie.  Entre 1600 et 1789, on retrouve les Savins de la Forest officiers de cavalerie et chevaliers de Saint-Louis. Durant les guerres de religion, deux frères Savins s'enrôlent dans les troupes camisardes et l'un d'eux, Gabriel, devient un principal lieutenant de Roland Laporte. En 1703, sur ordre du Maréchal Montrevel, deux cents hommes pillent, brûlent et démolissent les maisons du sieur Savin de la Forest et Aubignac, que l'on accusait d'avoir reçu en sa demeure le chef rebelle Roland et sa troupe. En 1709, les héritiers des Savins (Jean Jacques de Vignolles seigneur d'Aubignac, de Colognac et de Vabres) vendirent les terres et la seigneurie d'Aubignac à Jacob de Raynaud de Boulogne, seigneur de Lascours qui en 1720 revendit à Pierre du Puy seigneur de Nozières, descendant d'une vieille famille du Dauphiné, qui défendit ardemment les idées de l'église réformée. Un de ses descendants, Louis du Puy-Montbrun d'Aubignac fut maire de St Jean du Gard de 1817 à 1830. Les descendants de son gendre, Guillaume de Girard de Miellet, baron Van Coëhorn restèrent propriétaire du château et des terres jusqu'en 1980. Racheté en 1981 par la famille Ludwig.","architecture":"Château construit au XVIe siècle de plan rectangulaire, à deux niveaux, prolongé à droite d'un bâtiment carré dit tour, la façade à l'est  est flanquée sur sa droite d'une échauguette et d'une tourelle d'angle à gauche assez éloignée sert de tombeau familiale.","habitants":"Famille de Charles de Baschi\r\n        \"","divers":"Maison forte d'Aubignac","gps":"","images":["../image/image_30/30_Aubignac_1.jpg","../image/image_30/30_Aubignac_2.jpg"]},"Consult_chateau_formulaire65bf":{"id":"Consult_chateau_formulaire65bf","dept":"30","canton":"Uzès","commune":"Aubussargues","nom":"Aubussargues","type":"Manoir","periode":"XVI","histoire":"AUBUSSARGUES,  en 1265 à Guillaume de Vézenobres, puis  à Jean Millon, co-seigneur d'Aubussargues,  la co-seigneurie d'Aubussargues du XVe et XVIe siècles, et n'a jamais été vendu  toujours transmis par les femmes qui le firent changer de noms plusieurs fois. En 1547, elle passe aux familles de Joncherettes, puis de Jausserand. Elle est vendue à Claude de Vergèze d'Aubussargues, en 1579. En 1676, elle est vendue par Madelaine de Gasc, épouse de Claude de Vergèze, à la famille Nouet. En 1804, il passe à la famille Boileau de Castelnau, puis en 1860 au marquis Camille Mathéi de Valfons, qui le transmet à sa fille Marie, épouse de Balthazar d'André. En 1921, le château passe au baron Félix d'André, époux de Maria de Althaus. Il est ensuite la propriété du marquis Joseph d'André, époux de Denise Bailhache puis de son fils Emmanuel.","architecture":"Aubussargues; le manoir et constitué d'un corps de logis rectangulaire couvert d'ardoises, flanqué aux extrémités de deux grosses tours rondes à toitures en poivrières avec faux mâchicoulis. Le décor et la fenêtre à meneau sont de style Renaissance, les armoiries du XVe siècle, et la porte ogivale du XIVe siècle, le château a été remanié au XXe siècle. Il remonte dans sa construction actuelle du début du XVIIe siècle.","habitants":"Famille de Claude de Vergèze\r\n        \"","divers":"Manoir d'Aubussargues","gps":"","images":["../image/image_30/30_Aubussargues_1.jpg","../image/image_30/30_Aubussargues_2.jpg"]},"Consult_chateau_formulaire77e1":{"id":"Consult_chateau_formulaire77e1","dept":"30","canton":"Sommières","commune":"Aujargues","nom":"Aujargues","type":"Château","periode":"XV","histoire":"AUJARGUES, il a appartenu vers 1150 à la famille Bernard Aton, chevaliers des Arènes. Vers 1306, Philippe le Bel donne ce château à Guillaume de Nogaret pour le remercier de son rôle dans le conflit qui lopposait au pape Boniface VIII (attentat dAnagni). Le château et le domaine resteront 494 ans dans la famille des Nogaret.  Le 1er avril 1792, le château est incendié, le même jour que les châteaux d Aubais et Gallargues-le-Montueux. En 1800, Joseph de Nogaret le vend à M. Causse dAigues-vives.","architecture":"Château dAujargues. Dabord château fort situé hors du village Ancien et remarquable pigeonnier appartenant au château, de lautre côté de la petite route qui va à Junas. Une pierre porte la date de construction 1699. À signaler sous le château, une glaciaire dépoque Louis XIV appartenant elle-aussi au château. Corps de logis rectangulaire à deux niveaux, entre deux tours rondes à toitures plates.","habitants":"Famille Bernard Aton\r\n        \"","divers":"Château d'Aujargues","gps":"","images":["../image/image_30/30_Aujargues_1.jpg","../image/image_30/30_Aujargues_2.jpg","../image/image_30/30_Aujargues_3.jpg"]},"Consult_chateau_formulaire95a9":{"id":"Consult_chateau_formulaire95a9","dept":"30","canton":"Le Vigan","commune":"Aulas","nom":"Aulas","type":"Château","periode":"XIV","histoire":"Deux châteaux dans la commune d'Aulas château de Clapices du XIV-XVe siècle  et du Bousquet du XIVe siècle                             AULAS, le siège de la baronnie d'Hierle est transféré à Aulas en 1243. En 1275, le baron accorde de nombreux droits et franchises à la cité et à ses habitants. Par la suite, les Bermond cèdent la baronnie à Pons de Saint-Just, évêque de Béziers, lequel la transmet à la famille de Pierre de Pierrefort avant qu'une autre lignée, les Montfaucon, n'en fassent l'acquisition en 1541.  Le baron d'Hierle Fulcrand de Montfaucon s'oppose avec violence à l'installation de la réforme et aux pasteurs envoyés prêcher celle-ci. Le dernier baron d'Hierle mourut en 1747, sans postérité \"léguant\" tout à sa femme. Après la mort de la marquise, c'est le marquis de la Tour du Pin qui en hérite et le gardera jusqu'à la Révolution. À son château d'Aulas, il préfère séjourner dans sa forteresse de Vissec située en terres restées catholiques ou bien au château Lombard au Vigan (actuel Hôtel de Vissec).                                     CLAPICES  cité en 1409 à toujours appartenu aux Caladon, un Henri de Caladon s'est rendu célèbre au XVIIIe siècle par sa coutume de combat en duel tous les ans à Berthelasse, une de ses nièces,  fille de Jean-Pierre   épousa François Chabrand, En 1760, Jeanne de Lapoyade et quitta Ste-Foy pour se retirer au château de Clapices, le château passa par alliance à Emile Pelon en 1837 dont le petit fils Raymond Pelon  épousa Geneviève de Bousquet de Florian. Propriétaire aujourd'hui monsieur  de Dinnechin.                              BOUSQUET, bâtiment à double fin orangerie et filature de soie figurant sur le cadastre de 1835, dépendant du château du Bousquet. Filature liée au domaine agricole de la famille Arnal. Reprise vers 1857 par H. Pelon.","architecture":"Château des barons d'Hierle, Porte de la Capelle. Château de Clapices modifié en maison forte à deux niveaux avec tour carrée.  Manoir du Boisset (pas d'informations).\r\nChâteau de La Capelle, ancienne propriété des Quatrefages devenue au XIXe siècle la résidence de la famille Bousquet de Florian après son départ de Saint-Hippolyte-du-Fort.\r\nProbablement arrêtée lors de la mise en service de l'atelier de filature de l'usine Pelon en 1866. Sert de magnanerie puis de remise.","habitants":"Famille de Pierre de Pierrefort\r\n        \"","divers":"Château d'Aulas et de Clapices","gps":"","images":["../image/image_30/30_Aulas_1.jpg","../image/image_30/30_Aulas_2.jpg","../image/image_30/30_Aulas_3.jpg"]},"Consult_chateau_formulairedfd7":{"id":"Consult_chateau_formulairedfd7","dept":"30","canton":"Le Vigan","commune":"Aumessas","nom":"Aumessas","type":"Château","periode":"XVI-XVIII","histoire":"AUMESSAS, RODES, au Moyen-Age, le village d'Aumessas dépendait des possessions de la famille de Roquefeuil, puis aux Rolland. Leurs vassaux, les Azémar, demeuraient au château de La Rode (dit aussi du Cornier),  il est remanié en grande partie au XVIe siècle. A  la Révolution appartenait à la famille du Pont de Rode.  En 1430, le château devient propriété des du Pont. Cette famille donnera, en 1703, deux martyrs pour la foi protestante; Rostang du Pont de la Rode et son cousin Louis du Pont de Bonnels. Après la destruction du temple, en 1688, le culte réformé a lieu au château. Son propriétaire, Lévy du Pont de la Rode, met la grande salle du château à la disposition des catholiques d'Aumessas, leur église étant inutilisable.   De l'an mil jusqu'à Charles Gounelle décédé le 5 mars 2007, au château d'Amessas se sont succéder les familles d'Azemar , de Cantobre, de Guilhem Du Pont, d'Almessas, de Capluc, de Montvaillant, du Pont de la Rode, de même souche que du Pont de Serres et de Roquedol, de Malbois, Béranger de Caladon, Roland de Maureillan, de Manoël.  Aujourd'hui hôtel restaurant de Murielle Letexier et Didier Tournot.   \r\nA deux kilomètres, vestiges du château fort de Caladon, nid d'aigles du XIIIe siècle, Jadis se dressait là un château fort appartenant à la famille de Caladon. Les armes de cette famille étaient un aigle aux ailes déployées au-dessus de deux bassets, accompagnés de la fière devise \"Leurs clameurs ne m'atteindront pas\". Le seigneur du lieu était le vassal du seigneur de Bréau. Détruit lors de la guerre des Albigeaois. Vers le XIIIe siècle, le seigneur du Caladon et son suzerain ont adopté les idées cathares. Après la croisade dirigée par Simon de Montfort contre les Albigeois, en représailles, le château du Caladon a été détruit, tout comme ceux de Roquedur et d'Esparon.","architecture":"le château d'Aumessas-Rodes-Cornier est remanié à partir au XVIe siècle. Deux corps de logis de plan en L à trois niveaux toitures à deux pans peu prononcées,  avec une grosse tour  ronde crénelée en angle intérieur, escalier extérieur contournant la tour accède une porte au premier étage.                                                                                        Du château de Caladon il ne reste plus que quelques pans de murs accrochés dans les rochers.","habitants":"Famille de Roquefeuil,                                                                          Famille du du Pont de la Rode\r\n        \"","divers":"Château de Rodes dit aussi de Cornier à Aumessas","gps":"","images":["../image/image_30/30_Aumessas_1.jpg","../image/image_30/30_Aumessas_2.jpg","../image/image_30/30_Aumessas_3.jpg","../image/image_30/30_Aumessas_4.jpg","../image/image_30/30_Aumessas_5.jpg"]},"Consult_chateau_formulaired9f3":{"id":"Consult_chateau_formulaired9f3","dept":"30","canton":"Le Vigan","commune":"Avéze","nom":"Aveze","type":"Château","periode":"XIV","histoire":"Deux châteaux à Avèze le château de Montcalm, le Pont-d'Andon et de Teissier.                                                                       MONTCALM, La terre d'Avèze faisait partie de la baronnie d'Hierles possédée par Pierre Bermond \"Le Satrape de Sauve\" parent du comte de Toulouse. D'autres Seigneurs se sont succédé dont le plus connu l'intrigant abbé de Frézals. Ce château était fortifié.  Le maréchal de Schomberg  s'en empara et fit démolir les fortifications. Avèze passa par alliance  à Claude de Gabriac  lieutenant général. A sa mort le fief fut attribué à Victor de Frézal ce qui déclenchait un procès qui opposait les Frézal aux Montcalm descendant de Gabriac, en 1657,  Avèze titré marquisat au profit de Etienne Laurent de Mazade avocat à la cour des comptes de Montpellier.  Après le grand procès des Cévennes qui durera 150 ans, le château d'Avèze, puissant édifice construit à partir du IXe siècle, revint en 1789 à Pierre-Louis Marie Gilbert de Montcalm-Gozon, fils du héros succombé glorieusement au Canada et plus précisément à Québec en 1759, le lieutenant général Louis-Joseph, marquis de Montcalm de Saint-Véran. Le château fut restitué  au comte de Montcalm-Gozon fils du défenseur du Québec qui conservera le château tout le XIXe siècle, passa ensuite à la famille de M. Brun d'Arre. Depuis 1989, ce château abrite une maison de vacances.                                                                  TEISSIER, demeure bourgeoise de la fin du XIXe siècle, abrite aujourd'hui le centre d'aide par le travail (C.A.T) \" Le Castelet\" propriété de monsieur Edouard de Cazalet.                            PONT-D'ANDON construit au XVIe siècle qui appartenait au XVIIe siècle à dAssas, grand-père du célèbre chevalier.","architecture":"Ce château de Montcalm  d'Avèze, puissant édifice construit à partir du IXe siècle se compose d'un corps de logis de deux étages, flanqué de deux avant-corps carrés, le tout recouvert en tuiles creuses. Les façades sont en pierre de taille, sauf la façade postérieure qui est enduite. A l'intérieur, un escalier à la française  conduit aux étages. Des portes classiques donnent accès aux appartements.                                                                              Château du Pont d'Andon construit à la fin du XVIe siècle par Pascal Maystre sa petite fille l'apporta par mariage  à François d'Assas capitaine cette maison forte était importante au XVIIe siècle.                                                                                           Château Teissier dit Lou Castelet de la  famille Teissier, demeure bourgeoise de la fin du XIXe siècle.","habitants":"Comte de Montcalm-Gozon\r\n        \"","divers":"Château de Montcalm-Rodes et le château de Teissier.","gps":"","images":["../image/image_30/30_Aveze_1.jpg","../image/image_30/30_Aveze_2.jpg","../image/image_30/30_Aveze_3.jpg","../image/image_30/30_Aveze_4.jpg"]},"Consult_chateau_formulaireac37":{"id":"Consult_chateau_formulaireac37","dept":"30","canton":"Bagnols sur Cèze","commune":"Bagnols-sur-Cèze","nom":"Bagnols_Ceze","type":"Château","periode":"XV-XIX","histoire":"Trois châteaux à Bagnols-sur-Cèze, le château du Val-de-Cèze du XVIIe siècle, le manoir de Maransan du XV-XVIe siècles, et le château de Paniscoule. Pas d'information historiques sur ces deux derniers.                                                                                  BAGNOLS-sur-Cèze,  en 1631, le duc de Montmorency, gouverneur du Languedoc et seigneur de Bagnols se révolte contre Louis XIII. Il est battu, condamné et exécuté. En signe de représailles, le Roi ordonne la démolition du château et des murailles de la ville, reconstruite au XVIIIe siècle pour se défendre d'éventuels assauts des Camisards.                                      MARANSAN, au XVIe siècle Guillaume de Joyeuse, abbé des Chambons, au XVIII siècle, Monseigneur de Belzunce, évêque de Marseille et abbé de Chambons. Aujourd'hui propriété  de monsieur  Broche qui le restaure.                                                          PANISCOULE;   situé aux abords du château du VAL de CEZE.  Ces deux châteaux font partie de la même famille. En 1623, création de la gentilhommière raccrochée au château de Paniscoule, par un membre de la famille de Castries. En  1900, la comtesse de Castries meurt dans son château à Gaujac. Le château du Val de Cèze est alors vendu à Abel Sautel et son épouse qui en font une résidence dété. En 1930, leur fille se marie avec Paul Clap, chasseur alpin et plus tard apiculteur de Bagnols sur Cèze. En 1936, le jeune couple cède le domaine à leur voisine Jacqueline André-Thome. Sa fille Eléonore Patenôte épouse le baron Sapion du Roure de Beaujeu et en 1969 les descendants de Joseph Thome quittent le berceau familial. Seule Georgette Thome demeure au château. Le 7 Août François Brahin le transforme en hôtel et le rebaptise \"Ventadous\", propriété de  monsieur Ali Garsallah, du XVIIe siècle transformé en hôtel restaurant, est implanté au sein de l'ancien repère de chasse du seigneur du château de Paniscoule.","architecture":"Bagnols sur Céze, la mairie est situé dans un château.                          Château de Maransan, corps de logis central au nord à trois niveaux deux ailes en retour formant une cour autrefois fermé par un mur  crénelé et portail. Dans l'angle intérieur une tour octogonal  de quatre étages pour  escalier à vis de style Renaissance, ce château resté longtemps à l'abandon, fut transformé en exploitation agricole.     Val de Cèze du XVIIe siècle  est implanté au sein de l'ancien repère de chasse,  quadrilatère à deux niveaux flanqué de tours à trois niveaux carrées  en angles, toitures à balustrades,  créneaux sur façade avec pavillon saillant plein cintre crénelé, fenêtres à meneaux, le château du Val de Cèze porte la trace de nombreux siècles qui ont transformé sa construction primitive. \r\nPaniscoule; du XIXe siècle, corps de logis rectangulaire à trois niveaux et attiques, toitures terminant par une tourelle centrale à clocheton,  deux tourelles rondes en façade de même niveau sur les deux angles.","habitants":"Famille de Castries\r\n        \"","divers":"Patrimoine dans Bagnols sur Céze le château de Maransan du Val de Cèze et de la Paniscoule.","gps":"","images":["../image/image_30/30_Bagnols_Ceze_1.jpg","../image/image_30/30_Bagnols_Ceze_2.jpg","../image/image_30/30_Bagnols_Ceze_3.jpg","../image/image_30/30_Bagnols_Ceze_4.jpg","../image/image_30/30_Bagnols_Ceze_5.jpg","../image/image_30/30_Bagnols_Ceze_6.jpg","../image/image_30/30_Bagnols_Ceze_7.jpg","../image/image_30/30_Bagnols_Ceze_8.jpg"]},"Consult_chateau_formulaired6a6":{"id":"Consult_chateau_formulaired6a6","dept":"30","canton":"Rousson","commune":"Barjac","nom":"Barjac","type":"Château","periode":"XVII","histoire":"Deux châteaux à Barjac dont celui de Barjac et la Vigne du XVII-XVIIIe siècle. BARJAC, cité en 1186, aussi appelé château des Comtes du Roure est un château situé dans le village Barjac. Il tire son nom de ses commanditaires et propriétaires jusqu'à la Révolution Française,  Le troisième étant réservé à la famille seigneuriale  de Raymond Gaucelm au XIIe siècle, puis les cadets de la maison de Châteauneuf de Randon, la veuve de Guillaume de Barjac l'apporta en 1405 à Antoine de Seyssel par seconde alliance.  Au XVe siècle acheté par les frères Philippe et Cathelin de Combes transformèrent le château qui était ruiné par les guerres de religion. La partie détruite fut construite entre 1634 et 1639 par Jacques de Grimoard de Beauvoir du Roure et son fils. L'ensemble de ces bâtisses restera propriété de la famille des Roure jusqu'en 1899.  puis devient la propriété de l'abbé Charles Arnal du Curel, futur évêque de Monaco.  L'évêché de Nîmes, devenu propriétaire y installe l'école catholique du village il devient musée  et en 1925 propriété d'une agence immobilière  et l'ensemble trop onéreux à entretenir revient à la mairie qui en a fait lacquisition en 1982. L'école Saint-Laurent est alors transférée dans de nouveaux locaux.","architecture":"Trois châteaux d'âges et de styles différents, séparés par une cour intérieure avec la tour seigneuriale, bâtie  sur un rocher au lieu-dit \"Bargacum\" datée de la seconde moitié du Xe siècle. Le château vieux ou \"Castel Viel\" où se situeront plus tard les prisons de Barjac fut construit au cours du XIIe siècle, le château est à l'origine un simple donjon de trois niveaux surmonté d'un clocher. La cité prospère s'entoure de remparts dont il subsiste encore aujourd'hui les vestiges, notamment la porte basse de la ville. Au XVIIe siècle, un nouveau logis est construit et relié au premier bâtiment par de grandes écuries et une galerie voûtée.  La partie supérieure de cet édifice,  construite au XIIe siècle  sur l'emplacement de la tour seigneuriale, le clocher fut, quant à lui, construit en 1649 de  plan carré vaste corps de logis de forme  quadrilatère de 25m et de 20 m de haut se développe sur 4 niveaux; au rez-de-chaussée un appartement d'apparat où séjourna le cardinal de Richelieu. On peut observer le nombre important de fenêtres à meneaux laissant pénétrer très fortement le jour, surmontée de jardins suspendus. Un incendie  en 1790 détruisit un dépôt d'archives  et seigneuriales des comtes du Roure.","habitants":"Famille de Guillaume de Barjac\r\n        \"","divers":"Château de Barjac et maisons fortes environantes","gps":"","images":["../image/image_30/30_Barjac_1.jpg","../image/image_30/30_Barjac_2.jpg","../image/image_30/30_Barjac_3.jpg","../image/image_30/30_Barjac_4.jpg","../image/image_30/30_Barjac_5.jpg","../image/image_30/30_Barjac_6.jpg","../image/image_30/30_Barjac_7.jpg","../image/image_30/30_Barjac_8.jpg"]},"Consult_chateau_formulairefa5b":{"id":"Consult_chateau_formulairefa5b","dept":"30","canton":"Alès","commune":"Monteils","nom":"Basse_Cour","type":"Maison forte","periode":"XVII","histoire":"BASSE-COUR, au XVe siècle,  fief de Guillaume de Monteils, chevalier de Saint-Jean de Jérusalem, en 1438 commandeur de Saint-Maurice de Cazevieille, au XVIIe siècle plusieurs co-seigneurs François  Bertrand, César d'Hérail, seigneur de la Blachères, G. Fontanel et Julien de Mallérargues. Passa ensuite par alliance en 1548  de Gilette de Monteils à François de Saulsan seigneurs d'Arènes, il fut acquis par le docteur Carrière qui le revendit à monsieur Vigne.","architecture":"Château de la Basse-Cour du XVIIe-XVIIIe siècle, corps de logis que délimite la tour carrée avec deux ailes en retour d'équerres  dans l'angle Nord-Est de la cour la tour du château, avec escalier tournant résidence templière du XIe-XIIe siècle, les vestiges d'un chemin de ronde avec meurtrières, les fenêtres à meneaux à l'est du village.","habitants":"Famille de Guillaume de Monteils\r\n        \"","divers":"Maison forte de Basse-Cour","gps":"","images":["../image/image_30/30_Basse_Cour_1.jpg","../image/image_30/30_Basse_Cour_2.jpg","../image/image_30/30_Basse_Cour_3.jpg"]},"Consult_chateau_formulaire2b78":{"id":"Consult_chateau_formulaire2b78","dept":"30","canton":"Uzès","commune":"La Bastide d","nom":"Bastide_Engras","type":"Château","periode":"XIII","histoire":"BASTIDE-ENGRAS, commanderie des templiers, après la suppression de Philippe le Bel, le fief resta à l'évêché d'Uzès qui y firent construire le château, puis en 1565 à la famille de la Fare, Jacques de la Fare prieur  devient seigneur, neveu et héritier du prieur restaure le château que ses descendants le céderont aux d'Algoult et ensuite à la famille des Rochemore, puis à la famille Julien. Au XVIe siècle Henri I duc de Montmorency gouverneur du Languedoc assiégea le château durant les guerres de religion.  En 1745 les la Fare vendent la Bastide à  Joseph de Thomas comte palatin,  ce dernier prendra le nom du fief qu'il a acquit en même temps la seigneurie de Saint-Laurent la Vernède, le château est restauré par le comte  de Thomas de Saint-Laurent, en 1952 à la mort de la  comtesse  Baguenault de Puchesse héritière de St-Laurent le château et les archives furent  dispersés,  vendus aux enchères. Inhabité depuis la mort de la comtesse de Saint-Laurent en 1940, racheté ensuite par un notaire qui le revendit à Bob Schootmeyer et à Paul Hambury, cette bastide vendu au docteur Roger Périer et en 1987 acquit par Gordon Turner.","architecture":"Bastide d'Engras; construction du donjon au XIIIe siècle et  construction du château au XIVe siècle, remanié au XVIIe siècle en style Renaissance mais à conservé son allure féodale, restauré à nouveau au XIXe siècle. Un donjon carré limitant la partie nord est cantonné de deux tours rondes est accosté latéralement par une aile en retour d'équerre. La cour d'honneur surplombée d'un parapet crénelé protégé par un chemin de ronde. Corps de logis rectangulaire à trois niveaux accolé de deux tours rondes prolongé à l'opposé par un bâtiment en équerre de même niveau. Prolongé par une enceinte crénelée flanquée de tours et d'échauguettes rejoint celle qui contourne le village, l'ensemble forme un village fortifié tout en assurant la surveillance de la Plaine.","habitants":"Famille des Rochemore\r\n        \"","divers":"Château de la Bastide d'Engras","gps":"","images":["../image/image_30/30_Bastide_Engras_1.jpg","../image/image_30/30_Bastide_Engras_2.jpg","../image/image_30/30_Bastide_Engras_3.jpg","../image/image_30/30_Bastide_Engras_4.jpg","../image/image_30/30_Bastide_Engras_5.jpg","../image/image_30/30_Bastide_Engras_6.jpg","../image/image_30/30_Bastide_Engras_7.jpg","../image/image_30/30_Bastide_Engras_8.jpg"]},"Consult_chateau_formulaire1f12":{"id":"Consult_chateau_formulaire1f12","dept":"30","canton":"Beaucaire","commune":"Beaucaire","nom":"Beaucaire","type":"Forteresse","periode":"XII","histoire":"BEAUCAIRE, dit des \"Montmorency\" la ville prend le nom de Beaucaire qui signifie \"belle pierre\", sans doute en référence à ses nombreuses constructions, à ses carrières, ou encore au fait que les collines de la triple levée forme le premier massif lorsqu'on remonte le Rhône depuis la mer. Le comte Raymond VII de Toulouse résista à Simon de Montfort tente d'assiéger la ville en 1216, mais y subit un de ses plus importants échecs. Passe au domaine royal en 1229. Au XIIIe siècle, Louis IX se rend plusieurs fois à Beaucaire. La ville sétend et sa population augmente. Malgré la guerre de Cent Ans et les guerres de religion du XIVe au XVIe siècle, le faste et le raffinement de larchitecture samplifient, parallèlement à la richesse des marchands beaucairois.  En 1579, Beaucaire est tenue par Montmorency-Damville, gouverneur catholique du Languedoc, mais tolérant. Le capitaine de la ville est Jean de Parabère, qui joue bientôt son propre jeu. Damville provoque alors une émeute pour récupérer la ville, mais même si Parabère est décapité, la ville reste aux mains des huguenots, grâce aux renforts envoyés par Châtillon, le fils de lamiral de Coligny.   C'est en 1830 que la ville achète la forteresse.","architecture":"Forteresse médiévale de Beaucaire, construit au XIe siècle, le château de Beaucaire constitue un des plus beaux ensembles fortifiés du sud de la France construit sur les ruines d'un ancien castrum romain, se dresse majestueusement et domine la ville de son promontoire rocheux. Véritable forteresse aux dimensions impressionnantes, elle fut détruite puis restaurée au XIIIe siècle. Le caractère défensif de l'ouvrage avait pour vocation la surveillance du Rhône et était à l'origine entouré d'une gigantesque enceinte fortifiée, agrémentée d'un fossé. Deux entrées distinctes, munies de Pont-levis existaient alors, entourées de magnifiques tours rondes. Sur la face nord-est de l'ouvrage, une tour triangulaire de plus de 24 mètres de hauteur domine le reste de l'édifice.  Originellement entouré d'une vaste enceinte, dont seuls quelques vestiges subsistent, le château fut démantelé sur ordre de Richelieu en 1632. Ce magnifique site comprend  trois tours dorigine ainsi  que le châtelet dentrée que lon ne peut rejoindre que par un escalier escarpé. Les fouilles ont pu mettre à jour un château bien plus complexe  car il comprenait une basse-cour avec le monument gallo-romain.  Par la porte fortifiée on aperçoit la tour triangulaire près de la chapelle et de la tour ronde. A lintérieur du jardin se trouve le musée Auguste Jacquet. Le château présente une silhouette pittoresque avec sa tour polygonale et sa tour d'angle circulaire.","habitants":"Duc de Montmorency\r\n        \"","divers":"Forteresse médiévale de Beaucaire","gps":"","images":["../image/image_30/30_Beaucaire_1.jpg","../image/image_30/30_Beaucaire_2.jpg","../image/image_30/30_Beaucaire_3.jpg","../image/image_30/30_Beaucaire_4.jpg","../image/image_30/30_Beaucaire_5.jpg","../image/image_30/30_Beaucaire_6.jpg","../image/image_30/30_Beaucaire_7.jpg","../image/image_30/30_Beaucaire_8.jpg","../image/image_30/30_Beaucaire_9.jpg"]},"Consult_chateau_formulaire0abe":{"id":"Consult_chateau_formulaire0abe","dept":"30","canton":"Vauvert","commune":"Beauvoisin","nom":"Beauvoisin","type":"Château","periode":"XII","histoire":"BEAUVOISIN, cité en 1121,  passe sous la juridiction Vauverdoise lorsque Rostaing II de Posquières (ancien nom de Vauvert) épouse Ermessinde, fille de Bernard Aton IV, vicomte de Nîmes et Béziers. Elle apporte en dot les châteaux de Beauvoisin, Calvisson et Marguerittes.  En 1143, Pierre de Beauvoisin est témoin de la donation par Pons-Guilhem de ses terres de Francavallis à l'abbaye de Franquevaux. Puis en 1145, Bernard Raymond de Beauvoisin est témoin de l'acte de Bernard Aton IV en faveur des foires de Nîmes. Pour garder ses juridictions, Rostaing III de Posquières rachète en 1146 à Bernard Aton la dot de sa mère Ermessinde , cest-à-dire la justice des châteaux et le pouvoir d'exiger serment de fidélité de tous leurs habitants.  vers 1150 le château fut détruit par le comte de Toulouse  Raymond V, il fut retiré de la famille Posquières au profit  de Pierre Bernis. En 1197, Raymond VI comte de Toulouse l'assiège et le délivre. Passa par alliance à Louis de Bernis en 1581 avec Melchior de Génas, vendu en 1747 au Baschi  marquis d'Aubais. Au XIXe siècle propriété de la famille Roque puis fut racheté par L'évêché avant d'être transformé en appartement.","architecture":"Beauvoisin installée depuis le XIIe siècle sur un site antique, le village sest constitué sur lun des lieux perchés de la Costière, permettant ainsi une surveillance du territoire. Motte castrale probable, elle fut transformée en château fort et bourg castral. Ruiné pendant les guerres de religion, il est reconstruit au XVIIe  siècle alors que le village est totalement acquis à la Réforme. La Révolution aura raison dune chapelle sur laquelle sera construit le temple début du XIXe siècle. Bâtiment en forme de U avec deux grosses tours rondes.","habitants":"Famille de Louis de Bernis\r\n        \"","divers":"Château de Beauvoisin, de Baubois et tour du moulins","gps":"","images":["../image/image_30/30_Beauvoisin_1.jpg","../image/image_30/30_Beauvoisin_2.jpg","../image/image_30/30_Beauvoisin_3.jpg","../image/image_30/30_Beauvoisin_4.jpg"]},"Consult_chateau_formulaire18f5":{"id":"Consult_chateau_formulaire18f5","dept":"30","canton":"Beaucaire","commune":"Bellegarde","nom":"Bellegarde_(30)","type":"Vestiges","periode":"XII","histoire":"BELLEGARDE,  le château subira quelques sièges, en 1216 lors de la croisade albigeoise, Simon de Montfort lassiégera et lutilisera comme base arrière pour accomplir le siège du château de Beaucaire,  en 1226 assiégé par Amaury de Montfort Philip le Bel donna le territoire de Bellegarde  aux barons de Crussol qui deviendront  ducs d'Uzès. Le 8 Juin 1570, le maréchal de Damville et le vicomte de Joyeuse reprirent la tour au parti des huguenots et condamnèrent les seize personnes qui sy trouvaient. Ils furent tous brûlés pour ne pas avoir abjuré. Lhistoire raconte que les vainqueurs firent graver une stèle à lentrée du château. Cette stèle fut par la suite intégrée dans le mur intérieur nord de la chapelle de Broussan. Fief du duc dUzès, les pierres du rempart du château seront offertes aux bellegardais pour la reconstruction de léglise au XVIIe siècle. Quant à la vierge de Notre-Dame de Bellegarde installée sur le sommet de la Tour, elle ne date que de 1875 lors de la consécration de léglise actuelle. Cest depuis cette époque que le site du château est dénommé par les Bellegardais « La Madone ».","architecture":"Mentionné pour la première fois sous le nom de « Castrum Bellae-Gardae » en 1208 (dans le cadre dun contrat entre les représentants des villes de Nîmes et Arles, qui se réunirent au château de Bellegarde situé, dit le texte, « à égale distance » des communautés concernées pour apporter une solution au brigandage qui sévit dans les environs), ce donjon rectangulaire de 14,25 m sur 10,98 m est typique du Moyen-Age. Lieu idéal en matière de surveillance, cette tour installée à 56 m de hauteur domine le village et toute la plaine. Elle sintégrait dans un ensemble fortifié beaucoup plus vaste qui jouait un rôle dissuasif et de prestige (on retrouve quelques vestiges de cette fortification sur le dénivelé Est).","habitants":"Barons de Crussol\r\n        \"","divers":"Vestiges du château de Bellegarde","gps":"","images":["../image/image_30/30_Bellegarde_(30)_1.jpg","../image/image_30/30_Bellegarde_(30)_2.jpg"]},"Consult_chateau_formulaire5b0d":{"id":"Consult_chateau_formulaire5b0d","dept":"30","canton":"Alès","commune":"Belvezet","nom":"Belvezet","type":"Vestiges","periode":"XII","histoire":"BELVEZET, le castellas de Belvezet peut se comparer à celui d'Allègre, de Montalet à Molières-sur-Cèze, de Gicon à Chusclan ou à l'arque de Baron et au castellas de Saint-Victor-la-Coste,\r\npour ne citer que quelques édifices situés non loin de là, au lieu de Fontjan qui s'appela par la suite Belvezet appartenait alors au seigneur d'Uzès. En 1207 Raymond de Rascas en fait aveu au Prévôt du chapitres d'Uzès. Rajout à contrôler La guerre de cent ans débuta en l'an 1337, pour se prolonger jusqu'au milieu du XVe siècle, c'est-à-dire jusqu'en 1453. La commune propriétaire envisage avec l'aide de l'association de sauvegarde du patrimoine paysager, architectural et historique de Belvezet d'entreprendre un débroussaillage et une mise en valeur du site après consolidation des ruines.","architecture":"Ruines du Castellas du château de Belvezet du XIIe siècle, est remarquable par son plan et par la qualité de construction du donjon carré qui domine la vallée des Seynes au sud du mont Bouquet, reste d'une grande enceinte enveloppant un corps de logis, celui-ci est composé d'une enceinte rectangulaire de 15 x 20, entouré de fausses-baies  de 22 x 28 m flanquées de tour semi-circulaires aux ang
