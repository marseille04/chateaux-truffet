30/30_Cheylard_Aujac_6.jpg"]},"Consult_chateau_formulaire8a18":{"id":"Consult_chateau_formulaire8a18","dept":"30","canton":"Bagnols sur Cèze","commune":"Chusclan","nom":"Chusclan_Gicon","type":"Vestiges","periode":"XIII","histoire":"Trois château à Chusclan, celui de Gicon vestiges du XIIe siècle, Jonquier XIIe siècle et St-Emetery du XVIe siècle.                 CHUSCLAN-GICON au début de 1382, les Tuchins campèrent dans les gorges de la Cèze où ils furent rejoints par des nobles dont Régis de Saint-Michel-d'Euzet, Étienne Augier, dit Ferragut du Pin, Vachon de Pont-Saint-Esprit et Verchère de Vénéjan qui prirent leur tête. Ils semparèrent alors de Cavillargues, Chusclan et Tresques, avant de piller les châteaux de Sabran, La Roque-sur-Cèze, Saint-Laurent-des-Arbres et Cornillon. Dans ce dernier château se trouvait le trésor de Clément VI. Son neveu, Guillaume III Roger de Beaufort, alors lieutenant des armes du Sénéchal de Beaucaire, organisa la répression. En septembre 1382, il recruta des mercenaires et fit venir une compagnie darbalétriers dAvignon. Ses troupes cantonnées à Bagnols-sur-Cèze attaquèrent alors Cornillon. Dirigées par Gantonnet d'Abzac, commandant du Saint-Père pour le Païs de Saint-Esprit, elles semèrent la terreur. Guillaume III fit ensuite intervenir son capitaine des gardes de Bagnols, Jean Coq, ce dernier réussit à pacifier le pays en expulsant les chefs du Tuchinat. Ce qui permit de signer la paix en février 1383.                                                                      GICON, en 1211 donation  aux évêques d'Uzès par Philippe Auguste. On apprend aussi le rôle important qu'a joué ici la grande famille de Sabran, jusqu'en 1790 les  seigneurs qui se succédèrent depuis le XVe siècles, les Fages et les Etables, puis les David seigneur de Jonquier et de Gicon qui le rachetèrent à la Révolution  passa aux Durand de Fontmagne, en ruines depuis plusieurs siècle servit de carrière. Aujourd'hui entourait de vignoble.                           JONQUIER,  château du XIIe siècle  remanié au XIXe siècle, au XVIe siècle aux  David du Buisson seigneur de Jonquier et de Gicon. Au XXe siècle le château appartenait à Louis Martin  et retour à Monsieur David.                                                                ST-EMETERY pas d'information historique, aujourd'hui transformé en  maison de retraite.","architecture":"Le château de Gicon, donné en 945 aux Bénédictins de Saint Saturnin, ils construisent un château forteresse dont l'enclos abrite une garnison: logis seigneurial, tours de garde, donjon central. Il hébergea le roi Saint Louis sur le chemin de la croisade. Plusieurs fois ruiné et séparé à la Renaissance, le donjon est miné selon la technique du temps en 1631-1632, fin du pouvoir féodal local contre le centralisme de Louis XIII et Richelieu. Délaissé par ses cinq propriétaires successifs de 1816 à 1973, le site pendant trois siècles est une carrière de pierres d'où un retour à la végétation naturelle, qui domine le village, ancienne forteresse  abandonné depuis longtemps signalé au XIXe siècle en état de ruines.  Aujourd'hui  entouré de vestige de plusieurs bâtiments. Une association depuis 1985 s'occupe à le restaurer. \r\nJonquier forteresse,  deux corps de logis  flanqué de tours rondes crénelées séparés par une enceinte crénelée  néo-médiéval : tour carrée. Ruines de l'ancien château fort de la Parasque du XIIe siècle.\r\nSaint-Emétéry, corps de logis rectangulaire  à deux niveaux,  pavillon carré saillant sur partie central, une aile en retour et tourelle octogonale sur façade et sur angle.","habitants":"Famille de Sabran\r\n        \"","divers":"Vestiges de Gicon, de Jonquier et château de Saint-Emétéry","gps":"","images":["../image/image_30/30_Chusclan_Gicon_1.jpg","../image/image_30/30_Chusclan_Gicon_2.jpg","../image/image_30/30_Chusclan_Gicon_3.jpg","../image/image_30/30_Chusclan_Gicon_4.jpg","../image/image_30/30_Chusclan_Gicon_5.jpg","../image/image_30/30_Chusclan_Gicon_6.jpg","../image/image_30/30_Chusclan_Gicon_7.jpg","../image/image_30/30_Chusclan_Gicon_8.jpg","../image/image_30/30_Chusclan_Gicon_9.jpg"]},"Consult_chateau_formulaire3ec8":{"id":"Consult_chateau_formulaire3ec8","dept":"30","canton":"Alès III","commune":"Saint-Hippolyte de Caton","nom":"Condamine","type":"Château","periode":"XVIII","histoire":"CONDAMINE,  il a appartenu au duché d'Uzès, puis à deux grandes familles qui ont marqués son histoire: En effet,  la famille Delom de Bussas, il entre par mariage en 1488 dans la famille des Montolieu. Ceux-ci l'ont gardé jusqu'à la Révolution et sont donc à l'origine de nombreux travaux,  les Naudin de Biarges en son propriétaire, le vend  au baron Louis-Augustin d'Hombres en 1804 et l'ont transmis de manière indirecte jusqu'aux propriétaires actuels les Benoit de Coignac; ceux-ci ont conservé les archives familiales et celles du château. En 1823, le jardin est agrandi et replanté par le savant Louis Augustin d'Hombres Firmas. Transformé aujourd'hui en hôtel restaurant.","architecture":"Condamine, château de village datant du XVIIIe siècle avec des structures de la fin du XVe siècle, organisé autour de deux cours, celle des bâtiments d'habitation et celle des communs. Cette répartition remonte au début du XVIe siècle, ces dispositions intérieures remontent au XVIIIe siècle. A l'est, le corps de logis reconstruit en 1724 s'accompagne de la création d'un jardin. Cette aile est rythmée par un faux avant corps central et deux pavillons latéraux en saillie. Les pièces conservent un   décor de gypseries et témoignent de l'adoption, par la noblesse provinciale, des créations parisiennes. Limposante façade dun corps de logis du XVIIIe siècle domine le jardin, tandis que de pittoresques bâtiments médiévaux sagencent autour dune cour pavée pleine de charme. Au fil du temps, larchitecture de lédifice a évolué. Les fondations sont celles dune villa romaine. Le bâtit sagence autour dune cour intérieure médiévale. Les meurtrières percées sur les murs de lescalier à vis montrent le caractère défensif du château au XIVe siècle.  Brûlé en 1703, la façade est reconstruite au XVIIIe siècle, alliant de vastes volumes et de grandes ouvertures vers le parc.","habitants":"Famille de Benoit de Coignac\r\n        \"","divers":"Château de Condamine","gps":"","images":["../image/image_30/30_Condamine_1.jpg","../image/image_30/30_Condamine_2.jpg","../image/image_30/30_Condamine_3.jpg","../image/image_30/30_Condamine_4.jpg"]},"Consult_chateau_formulaire54ed":{"id":"Consult_chateau_formulaire54ed","dept":"30","canton":"Bagnols sur Cèze","commune":"Connaux","nom":"Connaux","type":"Vestiges","periode":"XIII","histoire":"CONNAUX, au XIIe siècle des moines Bénédictins de Saint-Pierre-de- Castres bâtirent sur un rocher, situé sur une vaste plaine marécageuse, une enceinte flanquée de quatre tours et érigèrent les premières maisons autour d'une modeste église de style romano-byzantin, ils fondirent ainsi la paroisse de Conatis (en latin Connassium ou Connaussium). Les premiers habitants furent les gens du village Daton, situé à quelques kilomètres au sud, rasé par ordre du roi mécontent du comportement du seigneur de ce village.","architecture":"Le village prendra le nom de Connaux en 1789 sous le mandat du premier maire Alexis Gensoul, après le départ des moines.  Château avec deux tours rondes à trois niveaux, toitures en terrasses et remparts.","habitants":"Seigneurs locaux\r\n        \"","divers":"Vestiges et tour à Connaux","gps":"","images":["../image/image_30/30_Connaux_1.jpg","../image/image_30/30_Connaux_2.jpg","../image/image_30/30_Connaux_3.jpg","../image/image_30/30_Connaux_4.jpg"]},"Consult_chateau_formulaireebf5":{"id":"Consult_chateau_formulaireebf5","dept":"30","canton":"Pont St-Esprit","commune":"Cornillon","nom":"Cornillon_30","type":"Vestiges","periode":"XII","histoire":"CORNILLON, fief des évêques d'Uzès, passa en 1379  à Guillaume  Roger comte de  Beaufort et d'Alès  frère du pape Grégoire VI à l'époque de l'installation des papes à Avignon. La révolte des Tuchins en 1383 et les guerres de religion en 1559 furent sanglantes. au XVIe siècle passa à la famille Desmartin, et en 1679 passa dans la famille des Sibert baron et marquis de Cornillon.","architecture":"Cornillon, fut construit au XIIe siècle  comportait deux parties, une plus anciennes l'autre avec grandes tours et corps de logis à quatre niveaux, aujourd'hui vestiges des remparts et les vestiges de l'ancien château féodal témoignent d'un passé glorieux. Commencée au début de l'ère chrétienne, l'histoire de Cornillon fut mouvementée et le premier château est mentionné en 1121.","habitants":"Famille Desmartin\r\n        \"","divers":"Vestiges à Cornillon","gps":"","images":["../image/image_30/30_Cornillon_30_1.jpg","../image/image_30/30_Cornillon_30_2.jpg","../image/image_30/30_Cornillon_30_3.jpg","../image/image_30/30_Cornillon_30_4.jpg","../image/image_30/30_Cornillon_30_5.jpg","../image/image_30/30_Cornillon_30_6.jpg"]},"Consult_chateau_formulaire5944":{"id":"Consult_chateau_formulaire5944","dept":"30","canton":"St-Ambroix","commune":"St-Florent","nom":"Crouzoul","type":"Maison forte","periode":"XVI","histoire":"CROUZOUL,  la seigneurie de Saint-Florent occupe approximativement le territoire actuel des communes de Saint-Florent et du Martinet. Elle appartenait à la famille Randon, co-seigneurs de Naves, puis aux Grimoard de Beauvoir du Roure. Au début du XIV siècle, se crée la seigneurie de Crouzoul, appartenant à la famille Maistre, vendue en 1611 aux Despeisses. De 1540 à 1621, Jean Despeisses, marié en 1576 à Jeanne de Valette, capitaine dInfanterie puis entrepreneur de renom, propriétaire de la moitié du martinet du Crouzoul. Vers lan 1600, Jean Despeisses édifie le joli château de la Plaine (Castel de la Plana), entre le Martinet et lAffenadou. Le 14 Juillet 1611,  Charlotte de Montmorency, comtesse dAlès, par acte signé au château de la Bastille à Paris, vend à Jean Despeisses, la justice moyenne et basse des seigneuries de Crouzoul, Pradel et Mercoirol. De 1763 à 1821  Joseph-Christophe Despeisses, célibataire, qui vend le château à André Chalmeton , le 30 août 1811.","architecture":"Crouzoul, il en ressort quun important castrum (ensemble féodal) aurait existé sur lemplacement de lactuel château de Crouzoul. Des vestiges viennent dêtre découverts à loccasion de la réhabilitation de cet édifice, qui semble totalement abandonné en 1400. La famille Despeisses a connu quelque notoriété puisquau XVIe siècle, Jean Despeisses construit la citadelle de Mende et reconstruit la cathédrale de cette ville, endommagée par les troupes protestantes du capitaine Merle.","habitants":"Famille de Despeisses\r\n        \"","divers":"Maison forte de Crouzoul","gps":"","images":["../image/image_30/30_Crouzoul_1.jpg","../image/image_30/30_Crouzoul_2.jpg","../image/image_30/30_Crouzoul_3.jpg","../image/image_30/30_Crouzoul_4.jpg","../image/image_30/30_Crouzoul_5.jpg","../image/image_30/30_Crouzoul_6.jpg"]},"Consult_chateau_formulaire6425":{"id":"Consult_chateau_formulaire6425","dept":"30","canton":"Redessan","commune":"Domazan","nom":"Domazan","type":"Château","periode":"XVIII","histoire":"Deux châteaux à Domazan dont celui de Domazan et du Bosc.                DOMAZAN, du XIVe siècle à Pierre Hugues, au XVIIIe siècle à Etienne de Guerrin de Flaux trésorier à Montpellier, son fils Claude le céda à Nicolas Janin Pallier qui en 1741 le vendit à Nicolas-François de Salles-Benoit qui le perdit à la Révolution et le château est acquis par monsieur Barbier comte de Rochefort puis acheté par Charles Pérroud  et acheté en 1820 par la famille Reynaud, Célestine Mathieu en hérite  et le cède en 1932  à son neveu à Christian Chauderac.                                                                    BOSC,  issue d'une famille de peintres,  Simone Reynaud  construit sous Napoléon III, le château de Bosc est une charmante demeure blottie dans un parc de cèdres séculaires agrémenté de roses blanches. Musée de la moto et du vélo.","architecture":"le château de Domazan possède une porte à arc en anse de panier, une grosse tour carrée sur la droite couverte à un pan, au fond de la cour  ancienne une maison bourgeoise utilisée pour l'exploitation viticole.                                                                                  Bosc, château du XIXe siècle corps de logis rectangulaire à deux niveaux  pavillon central en façade avec fronton en Calotte et piliers doriques sur porte d'entrée avec escalier  et pavillons carrées aux extrémités  toitures à quatre pans.","habitants":"Famille de Simone Reynaud \r\n        \r\n        \"","divers":"Château du Bosc","gps":"","images":["../image/image_30/30_Domazan_1.jpg","../image/image_30/30_Domazan_2.jpg","../image/image_30/30_Domazan_3.jpg","../image/image_30/30_Domazan_4.jpg"]},"Consult_chateau_formulaireaff7":{"id":"Consult_chateau_formulaireaff7","dept":"30","canton":"Quissac","commune":"St-Martin de Sassenac","nom":"Durfort","type":"Château fort","periode":"XII","histoire":"DURFORT, au début du XIIe siècle, la forteresse étant la possession des Bernard d'Anduze, servait à défendre la maison d'Anduze qui dominait quelques 35 villages, elle se divise en deux parties, la famille Bernard conserve Anduze ainsi que Saint-Martin de Sossenac, la famille Bermond obtient Sauve ainsi que Durfort. Par la suite, la forteresse n'évolua que très peu puisque celui-ci n'était d'aucune utilité militaire.                                                    VIBRAC,  la baronnie est mentionnée dès 1252 qui passa en seigneurie à l'évêque des Magdelonne, puis à Guillaume  Bertrand de la Barre et aux Planchamp. Le château construit au XVIe siècle par les Duranc, barons de Vibrac. En 1737 propriété de la famille Limery, et  le baron Jacques-Louis Duranc de Vibrac était resté en France après le début de la Révolution. Le château, incendié en avril 1792, il est acquit par les Rivet de Sabatier vers 1854, puis par les Fossat toujours dans la famille par son gendre monsieur Bonhomme.","architecture":"Durfort,  forteresse avec quatre ouvertures, trois existent encore. C'est à la fin du Xe siècle que celle-ci fut certainement édifiée. Au XIIe siècle la construction du donjon, tour Bermonde grenier des habitants en cas de conflits, ainsi que les tours cylindriques. Tour à feu remplaçant ou se raccordant à l'ancien réseau, date du  XIIIe siècle. Durfort fait aujourd'hui partie de l'association des \"Circulades\" qui regroupe les villages organisés autour d'un château ou d'un donjon.                                                                         Vibrac constituerait ainsi l'avant poste de Durfort pour surveiller la route d'Anduze et dans ses parties les plus anciennes, médiéval dénaturé s'est doté d'un formidable patrimoine à travers les siècles, construit aux XVe et XVIe siècles dispose d'un donjon crénelé des XIIe et XIIIe siècles et d'une chapelle. On devine également des traces de fortification dont il reste aujourd'hui notamment une tour du XIIe siècle.  château construit au XVIe siècle  lui même, entouré dun donjon, en 1524, un acte notarié parle encore de la tour du mas de Vibrac après les troubles du début de l'année 1792,. Valfons est dévasté puis Vibrac dont il ne reste plus que les murs de façade et les voûtes du premier étage.  Isolé sur le rebord du plateau, le château a encore belle allure, dominé par un donjon carré, massif, couronné de créneaux au début du XXe siècle. Ce donjon n'est attesté avec certitude qu'en fin du XVe siècle.","habitants":"Famille Bermond\r\n        \"","divers":"Tour du château fort de Durfort et de Vibrac","gps":"","images":["../image/image_30/30_Durfort_1.jpg","../image/image_30/30_Durfort_2.jpg","../image/image_30/30_Durfort_3.jpg","../image/image_30/30_Durfort_4.jpg","../image/image_30/30_Durfort_5.jpg","../image/image_30/30_Durfort_6.jpg","../image/image_30/30_Durfort_7.jpg","../image/image_30/30_Durfort_8.jpg","../image/image_30/30_Durfort_9.jpg"]},"Consult_chateau_formulaire5c20":{"id":"Consult_chateau_formulaire5c20","dept":"30","canton":"St-Gilles","commune":"St-Gilles","nom":"Espeyran","type":"Château","periode":"XIX","histoire":"ESPEYRAN, le domaine d'Espeyran témoigne d'une longue histoire liée, dès le  Moyen-Age à la célèbre Abbaye de Saint-Gilles, devient bien national, acquis en 1791 par Guillaume Sabatier, membre dune famille de grands commerçants et d'hommes daffaires de Montpellier. Ce dernier le lègue à sa sur, Marie, qui elle-même le lègue à son neveu Félix. En 1818, le domaine est hérité par Frédéric Sabatier, qui en fait une ferme moderne. Il aménage le parc, en ayant le souci dy introduire des essences variées et innovantes. Son fils, Guillaume, est en charge du domaine à partir de 1864, et entreprend de grands travaux dans les années 1880, donnant au château son aspect actuel. En 1963, Guy Sabatier lègue le domaine dEspeyran à lÉtat qui le place alors sous la tutelle du ministère de la Culture.En 1963, Guy Sabatier fait don de son domaine aux Archives de France qui gèrent depuis le château et ses collections.","architecture":"Espeyran,  fin XIXe siècle , propriété de lÉtat. Ensemble typique de l'architecture bourgeoise sous le Second Empire et la IIIe République, corps de logis rectangulaire avec un retour d'équerre à deux niveaux et attiques flanqué d'un pavillon carré à trois niveaux avec balcons sur façades extérieures, mâchicoulis avec tourelles sur les angles et toit pointus de la tour, à l'opposé une tour carrée à trois niveaux, toiture en terrasse avec balustres, les dépendances forment une cour d'honneur sur la façade  plein cintre balcon saillant supporté par des colonnes.  le parc  grand paysage de ce château, notamment par l'importance des frondaisons du parc paysager, le domaine est inscrit lui-même dans un environnement naturel et agricole de grande qualité. Le parc a vraisemblablement été créé entre 1840 et 1844, avant les grands communs (1863) et le remaniement du château qui intervient après 1880. L'image de la belle \" campagne \" gardoise est encore très sensible avec château, parc et nom de propriétaire prestigieux.                                       L'hôtel de ville dans un bâtiment fortifiè fin XIXe siècle, surplombant la ville et la plaine de Camargue.","habitants":"Famille de Frédéric Sabatier\r\n        \"","divers":"Château d'Espeyran","gps":"","images":["../image/image_30/30_Espeyran_1.jpg","../image/image_30/30_Espeyran_2.jpg","../image/image_30/30_Espeyran_3.jpg","../image/image_30/30_Espeyran_4.jpg","../image/image_30/30_Espeyran_5.jpg","../image/image_30/30_Espeyran_6.jpg","../image/image_30/30_Espeyran_7.jpg"]},"Consult_chateau_formulaire792b":{"id":"Consult_chateau_formulaire792b","dept":"30","canton":"Le Vigan","commune":"L","nom":"Estrechure","type":"Château","periode":"XII","histoire":"Deux châteaux à l'Estréchure, le château de Bussas du XIIe siècle et le château de Saint-Martin du XVIIe siècle.                                   BUSSAS, Autrefois passage obligé sur l'antique chemin reliant St-Jean du Gard à L'Estréchure, le château de Bussas est dissimulé dans un méandre abandonné du Gardon. Des textes anciens nous signalent l'existence de Bussas dès 1197, sous la seigneurie de Bérenger de la Baume,  en  1330   passe à  Pons de Sampzon dit Foucard. La fille de Bermond de Sampzon, Rance fit passer par alliance à Jean de la Blanquière qui en rendit hommage en 1400 à Jean Lemingre de Boucicaut, comte d'Alès. Le château passe  par alliance en 1448  à Guillaume Delhom qui conserve Bussas jusqu'au XVIIIe siècle, il fut cédé à Jacques de Rozel de Bossuge seigneur de Saint-Sébastien qui le légua  à l'hôpital de la charité de Nimes, et revendu au XXe siècle à monsieur René Richard qui le restaura et revendu à un anglais  monsieur Campbell.\r\nST-MARTIN, en 1604 était en co-seigneurie de Jean-Batisde et Pierre Aubanel qui furent autorisés par Hélix del Puech dame de la Salendrinque à construire le château. La famille d'Assas succède aux Bastide, puis par héritage  passa aux Tourtoulon et a la fin du XIXe siècle  Charles de Tourtoulon  vendit le château à la famille de Seynes, puis les de Luze en héritèrent et en 1981 se succèdent trois propriétaires, transformé en relais et châteaux.","architecture":"Château de Bussas du XIIe siècle, restauré au XXe siècle; tour médiévale carrée, l'ensemble à l'aspect d'une ferme, le donjon tour carrée médiévale du début du XIIIe siècle est construit en schiste et s'appuie sur un bâtiment présentant une baie à croisée. Le bâtiment de plan rectangulaire contigu est du XVIIIe siècle à deux étages.\r\nChâteau de Saint-Martin  début du XVIIe siècle bâtiment en longueur à deux niveaux fenêtres à meneaux et portes d'entrées Renaissance. Une tour ronde sur la partie arrière.","habitants":"Famille de Bérenger de la Baume\r\n        \"","divers":"Château de Bussas et d'Estechure","gps":"","images":["../image/image_30/30_Estrechure_1.jpg","../image/image_30/30_Estrechure_2.jpg","../image/image_30/30_Estrechure_3.jpg","../image/image_30/30_Estrechure_4.jpg","../image/image_30/30_Estrechure_5.jpg","../image/image_30/30_Estrechure_6.jpg"]},"Consult_chateau_formulairecef0":{"id":"Consult_chateau_formulairecef0","dept":"30","canton":"Rousson","commune":"St-Privat de Champclos","nom":"Ferreyroles","type":"Vestiges","periode":"XII","histoire":"FERREROLES, du Moyen-Age, se situe au cur des gorges de la Cèze. Vestiges du château qui fut édifié sur un piton rocheux  par les ducs de Bannes dominant un méandre des gorges de la Cèze, cité au XIIe siècle par les Ferrairolis seigneur allié aux Barjac vassaux des comtes de Toulouse, hommage fut fait à l'évêque d'Uzès avant d'être intégré au domaine royal. Philippe le Bel le laissa  à Guillaume de Plaisians passa par héritage à  Gabriel de Laudun Montfaucon élevé au titre de baronnie en 1542 et fut échangé avec  la famille de Banne dAvéjan, seigneur de Terris, de Lontgros, de Lignemaille, de Cabiac, de Revegueis, co-seigneur de Castillon, de Banne et baron de Ferrayrolles. La branche aînée de cette maison sest éteinte en 1787.  Claude de Banne, seigneur dAvéjan, baron de Ferrayrolles, épouse en 1567 Dauphine de Montcalm, dont il eut;  Pierre de Banne, seigneur dAvéjan, baron de Ferrayrolles, épouse le 2 mai 1593 Anne de Caladon de la Valette, dont il eut  Jacques de Banne, comte dAvéjan, Lanuéjols, Montjardin, baron de Ferrayrolles, qui épouse le 16 septembre 1635 Marguerite de la Fare ; il fut maintenu dans sa noblesse par jugement souverain du 29 octobre 1668. Lors des guerres de religion,  fut assiégé sans succès le 9 février 1703 par Jean Cavalier, ils ont abandonné le siège. Aujourd'hui propriété de la famille Delafosse.","architecture":"Château de Ferreyroles vestiges dominant un méandre des gorges de la Cèze, en date des Xe et XIIe siècles, construite sur un piton rocheux, est un édifice féodal aujourd'hui en ruine, place forte au Moyen-Age avait pour vocation de protéger les terres des ducs de Banne et faisait office de poste avancé en période conflictuelle. Le château semble avoir eu une petite enceinte défensive, puissant quadrilatère tout en longueur 18,5 sur 7,40  mètres, il s'articule sur trois à quatre niveaux plus un souterrain naturel faisant office de cave fraîche dans le piton calcaire des fondations. Aujourd'hui envahi par la végétation,  se dégrade lentement. L'ouvrage compte encore de nombreuses archères et meurtrières très variées. La porte à l'entrée du donjon est en biais sans doute pour épouser la forme du rocher mais aussi pour défavoriser les attaquants les empêchant d'utiliser l'épée et donnant ainsi l'avantage aux défenseurs. L'escalier qui permet de monter dans les étages supérieurs et disposé lui aussi en travers et avec des marches irrégulières pour gêner ladversaire dans sa progression. La façade se compose d'un mur défensif en pierres de taille pour résister aux attaques au côté nord (côté colline) et d'un mur de petite maçonnerie moins résistant du côté opposé, cette partie aujourd'hui affaissée abritait sans doute les logements. Une citerne est installée au centre du château (son enduit est encore étanche).","habitants":"Famille des Ferrairolis\r\n        \"","divers":"Vestiges du château de Ferreyroles.","gps":"","images":["../image/image_30/30_Ferreyroles_1.jpg","../image/image_30/30_Ferreyroles_2.jpg","../image/image_30/30_Ferreyroles_3.jpg","../image/image_30/30_Ferreyroles_4.jpg"]},"Consult_chateau_formulaire3a0e":{"id":"Consult_chateau_formulaire3a0e","dept":"30","canton":"Quissac","commune":"Vic le Fesq","nom":"Fesq","type":"Château","periode":"XVII","histoire":"FESQ, fief en 1292 de Guillaume de Thézan seigneur de Saint-Baudille et plusieurs famille se succédèrent et au XVe siècle aux Pierre Pons d'Alès, puis les Béziers de Vénézan et au XVIe siècle les Montgros de Saint-Bénézet passa aux  Hauteville qui entreprennent vers 1630 la construction du château et le vendirent en 1647 aux Bousanquet qui finirent la construction, vende ensuite en 1718 à Jean Guillot directeur de la monnaie à Montpellier, ce dernier fit faillite, la seigneurie adjugée par le roi fit acquérir cette dernière aux enfants de Jean de Salles banquier à Paris, passa ensuite à Jean-Charles Lecointe colonel de la garde à Nimes ce qui permit au château d'être protégé à la Révolution, passa en 1821 par alliance de sa fille Jeanne-Pierrette qui épousa Charles Donzel. Au XIXe siècle le château est la propriété de la famille Randon de Grolier qu'il vendirent à Charles de Mourier et aujourd'hui la famille Comte descendant exploite la propriété. Transformé en plus en Hôtel.","architecture":"Fesq fut construit au XVIIe siècle, sur une partie haute du village, l'édifice est un quadrilatère flanqué de tours dangles circulaires en façade dépassant le toit, à trois niveaux, façade à fronton triangulaire, pilastres plats et chapiteaux ioniques; cadran solaire en façade, belle cour carrée intérieure.  Le parc comprend un jardin de buis, une fontaine Louis XIV ; un grand réservoir de pierre, un bassin avec sculpture d'ornement végétal habité d'animaux.","habitants":"Colonel Jean-Charles Lecointe \r\n        \"","divers":"Château de Fesq.","gps":"","images":["../image/image_30/30_Fesq_1.jpg","../image/image_30/30_Fesq_2.jpg","../image/image_30/30_Fesq_3.jpg"]},"Consult_chateau_formulaire4c74":{"id":"Consult_chateau_formulaire4c74","dept":"30","canton":"Quissac","commune":"Logrian-Florian","nom":"Florian","type":"Château","periode":"XVII","histoire":"Deux châteaux à Logrian-Florian, celui de Florian du XVIe siècle, la Rouvière du XVe siècle.                                                             FLORIAN, la seigneurie  relevait de la baronnie de Sauve, et possession des évêques de Montpellier, acquise au XVIIe siècle par une  famille de notaires de Charles de Claris époux de Marguerite Fizes qui cédera ses biens à Florian et la Rouvière à son fils Jean, qui ce dernier  fit une carrière militaire et terminera au siège présidial  de la sénéchaussée et conseiller du roi maîtres à la cour des comptes de Montpellier, il eu trois enfants d'un premier mariage et en 1707  épouse Marie-Magdeleine de Perdrix dont-il aura treize enfants, trois fils l'aîné Philippe-Antoine capitaine de cavalerie et marquis de Florian épousera la nièce de Voltaire Marie-Elisabeth Mignot en 1762. Jean Claris respectable magistrat ruinés par une vie fort agitée entraînant des procès coûteux, à sa mort en 1767 c'est Philippe-Antoine qui hérite avec toutes les créances  doit en 1780 vendre le domaine de Florian à Jean-Pierre Bousquet. Acheté en 1805 par la famille Cabane qui passera en 1960 à monsieur Monticelli et en 1773 à la famille Rico.          ROUVIERE, au XIVe siècle résidence de la famille de Deaux puis celle des Montlaur de Murles, passa en 1555 à Robert Blanc, juge à Nimes et passa à une famille de notables,  Rouvière dont-il prit le nom, par mariage passa à Grégoire de Gardies qu'il cèda en 1658 à François de Ginestoux et au XVIIIe siècle les Pelet d'Anduze en deviennent propriétaire, prirent le nom de Pelet de la Rouvière et aux de Rivet au XIXe siècle.","architecture":"Florian, construit en 1640, au centre d'un grand bois en 1792 est endommagé par des émeutes et pillés à la Révolution, restauré  au XIXe siècle, il est composé d'un corps de logis rectangulaire flanqué de deux tours carrées plus élevées à toit pointu, sur l'axe central de la façade principale une porte à ébrasement intérieur concave entourée de deux pilastres, au dessus  un fronton triangulaire.                                                                                  Rouvière, dans un site boisé, l'édifice de plan rectangulaire à deux niveaux avec avancée à chaque extrémité,  escalier à double révolution.","habitants":"Famille de Claris\r\n        \"","divers":"Château  de Florian et de la Rouvière","gps":"","images":["../image/image_30/30_Florian_1.jpg","../image/image_30/30_Florian_2.jpg","../image/image_30/30_Florian_3.jpg","../image/image_30/30_Florian_4.jpg","../image/image_30/30_Florian_5.jpg"]},"Consult_chateau_formulaire7674":{"id":"Consult_chateau_formulaire7674","dept":"30","canton":"Uzès","commune":"Fontarèches","nom":"Fontareches","type":"Château","periode":"XIII","histoire":"FONTARECHES, Dépendait des évêques comtes d'Uzès, qui le perdirent au XIIIe siècle, confié à la famille des  Gardies, en 1430 par alliance de Douce des Gardies passe à Antoine de Gaujac, toujours par alliance en 1514  de Catherine de Gaujac avec Jacques de Sarratz seigneur de Bernis, ce dernier échangea  Fontarèches avec Pierre de Village en 1514 pour être gouverneur de Fourques. Fontarèches titré de Baronnie en 1664 et passe à Jacob de Rossel d'Auberne échoie ensuite par héritage à Gabriel de Rossel conseiller à la cour de Montpellier, cette famille gardera la baronnie jusqu'au XIXe siècle. le domaine passe au général d'Entraigues du Pin, descendant de Vauban et parent du dernier baron de Fontarèches qui ce dernier  lègue la baronnie à son neveu le marquis de Saint-Agathe qui à son décès en 1973, le château sera mis en vente par ses filles et acquis par Bob Scootmeyer et Paul Hambury, aujourd'hui a un américain Jhon Boyd Matchett en est propriétaire.                                                                                   Le domaine viticole de Fontarèches  devient la propriété de la famille Mignard dont les descendants, la famille de Lamy, sont les actuels propriétaires du domaine. A deux kilomètres à l'ouest le château de la Bruguières.","architecture":"Fontarèches, avant poste  de défense de la ville d'Uzès, fortifiés surveillant l'accès à la ville, au XIIIe siècle c'était un donjon carré aujourd'hui noyé dans la construction, repérable dans le mur nord. Il était entouré de fossés qui furent comblés et défendu par un pont-levis, après maintes fois remanié, il est un  quadrilatère avec cour intérieure, l'entrée côté sud flanqué de deux tours rondes avec traces des rainures du pont-levis surmonté de  bretèche crénelée, le corps de logis au fond de la cour cantonné de deux pavillons, son portail encadrés de pilastres et d'un fronton triangulaire.","habitants":"Famille des  Gardies\r\n        \"","divers":"Château de Fontarèches, le domaine et de Bruguières","gps":"","images":["../image/image_30/30_Fontareches_1.jpg","../image/image_30/30_Fontareches_2.jpg","../image/image_30/30_Fontareches_3.jpg","../image/image_30/30_Fontareches_4.jpg","../image/image_30/30_Fontareches_5.jpg"]},"Consult_chateau_formulairec2f0":{"id":"Consult_chateau_formulairec2f0","dept":"30","canton":"Villeneuve les Avignon","commune":"Villeneuve les Avignon","nom":"Fort_St_Andre","type":"Fort","periode":"XII","histoire":"FORT-ST-ANDRE, anciennement appelé Villeneuve Saint-André du XIII-XIVe siècles construit  sous Philippe IV le Bel. La fortification du Mont-Andaon, elle doit affirmer la puissance royale face aux terres de l'Empire et des papes d'Avignon. Le fort est également destiné à protéger l'abbaye bénédictine et le bourg Saint-André dont l'existence, est attestée depuis le Xe siècle. En 1292, un traité de parrainage entre le roi de France, Philippe le Bel, et l'abbé de Saint-André, prévoyait la construction d'un château-fort, le fort Saint-André, et d'une tour située face à Avignon. Une bastide royale fut alors créée sur les rives du Rhône portant le nom de Villeneuve Saint-André. Les papes et les cardinaux édifient à Villeneuve des résidences somptueuses qui aujourd'hui encore, marquent la physionomie de la ville. En 1290, Philippe le Bel échange le Maine et l'Anjou contre une part de seigneurie en Avignon. Pour protéger un point stratégique à la frontière du royaume marquée par le Rhône, il décide de la construction entre 1300 et 1307 d'une tour carré dit donjon dit la tour Philippe le Bel est ainsi construite. Cette forteresse à protégé des garnisons de l'armée royale et autres  et les habitants de Villeneuve pendant cinq siècles, en 1792 le fort est abandonnée  et les moines chassés de l'abbaye qui se dégrade mais le fort est confié depuis 1903 aux Beaux-Arts qui en assure la restauration.\r\nLe fort Saint-André, tel que nous le connaissons aujourd'hui, a eu comme dernier architecte Jean de Loubières, dit Jean du Louvre, l'architecte du palais des papes d'Avignon. Il a terminé l'actuelle construction sur ordre de Charles V.","architecture":"Le fort Saint-André est constitué d'une vaste enceinte fortifiée  longue de 750 mètres, l'enceinte qui entoure l'abbaye a été construite en plusieurs étapes durant la deuxième moitié du XIVe siècle, flanqué de tours rondes de guet dont deux forment le châtelet d'entrée d'une porte monumentale encadrée par deux tours jumelles, du haut desquelles on a une vue panoramique. Le châtelet d'entrée, appelé château royal ou tours jumelles, porte une couronne de mâchicoulis et fait la jonction avec le chemin de ronde. Il abritait les locaux de fonction du châtelain et du viguier. L'entrée était fermée de deux herses. La salle des herses, au-dessus de l'entrée, contenait les treuils qui permettaient de les manuvrer. La salle du viguier, à droite de l'entrée, porte les armes royales sur une clé de voûte, dans cette enceinte, comprend une tour à son point le plus élevé, la tour des masques, qui renferme une seule salle, très haute, marquée de nombreux graffitis de soldats et de prisonniers, se trouve encore une chapelle du XIIe siècle, la chapelle du Belvezet. et l'abbaye Saint-André. Construite à la fin du XIIIe siècle, la Tour Philippe Le Bel est le seul vestige d'une forteresse bâtie pour contrôler l'entrée du pont reliant les deux rives du Rhône. De belles salles voûtées accueillent des expositions artistiques. Elle se compose de trois étages aux belles salles voûtées dogives, au XVe Siècle, on lui ajouta une tour de guet. Du sommet, panorama exceptionnel sur le Rhône.","habitants":"Le roi  Philippe IV le Bel\r\n        \"","divers":"Le fort Saint-André et la tour de Philippe le Bel.","gps":"","images":["../image/image_30/30_Fort_St_Andre_1.jpg","../image/image_30/30_Fort_St_Andre_2.jpg","../image/image_30/30_Fort_St_Andre_3.jpg","../image/image_30/30_Fort_St_Andre_4.jpg","../image/image_30/30_Fort_St_Andre_5.jpg","../image/image_30/30_Fort_St_Andre_6.jpg","../image/image_30/30_Fort_St_Andre_7.jpg","../image/image_30/30_Fort_St_Andre_8.jpg"]},"Consult_chateau_formulaire2ff6":{"id":"Consult_chateau_formulaire2ff6","dept":"30","canton":"Beaucaire","commune":"Fourques","nom":"Fourques","type":"Forteresse","periode":"XII","histoire":"FOURQUES, au XIe siècle  accord cité entre l'évêché d'Arles et le comte de Toulouse par Raymond de Saint-Gilles le détenait en fief, le domaine subit les assauts des guerres de religion, Simon de Montfort l'assiégea, prit et reprit, puis en 1598  passa au domaine royal   et vendu par  Louis XIV au sieur  de Créquy  qui le remit en 1604  au connétable  de Lesdiguières,  ce dernier le céda  en 1613 à M. de Moynier trésorier général de France, puis racheté après une mise en vente par Simon de Moynier et le château fut élevée au rang de Baronnie en 1738, puis  la baronnie passa à François Xavier de Bon premier président à la cour des comptes de Montpellier qui en fut propriétaire à la Révolution, en 1810 acquit par  madame  Leboeuf de Brossette, fille  du conventionnel Boissy d'Anglas. Au XXe siècle Paul Blanchon hérite, le restaure et le domaine reste dans sa descendance.","architecture":"Fourques du XIIe siècle,  ensemble quadrangulaire, à été  remanié au XVe siècle, élévation du corps de logis sur la face nord, au XVIIIe siècle démantèlement des tours et au siècles suivant  campagne de restauration et construction de dépendances, en 1792 des émeutiers tentèrent de le ruiner heureusement  peu de dégâts par son système de défense  est un vaste quadrilatère de courtines avec chemin de ronde à l'intérieur, mais ont perdu leur créneaux, flanqué à chaque angles de tours de plan carrées et entouré de fossés aujourd'hui disparus, les tours  autrefois crénelés et équipées d'archères ont été démantelées, deux sont encore munis de dômes en calotte, des hourds saillants et archères réparties sur trois niveaux complétaient le système défensif.","habitants":"Sieur  de Créquy                                                                                 famille de Simon de Moynier\r\n        \"","divers":"Château de Fourques","gps":"","images":["../image/image_30/30_Fourques_1.jpg","../image/image_30/30_Fourques_2.jpg","../image/image_30/30_Fourques_3.jpg"]},"Consult_chateau_formulaireecde":{"id":"Consult_chateau_formulaireecde","dept":"30","canton":"Quissac","commune":"Fressac","nom":"Fressac","type":"Vestiges","periode":"XII","histoire":"FRESSAC, le château de Fressac aurait été construit sans doute par les Bermond d'Anduze et de Sauve, une des plus puissantes familles de la région à l'époque, alliée par mariage au comte de Toulouse. Dans la première moitié du XIIe siècle, après la croisade des Albigeois et la soumission du comte de Toulouse à la couronne de France, il sera rattaché au domaine royal, ensuite, il servit surtout de refuge aux habitants lors de la guerre des camisards. La mère de Saint-Louis, Blanche de Castille, y aurait perdu aux alentours du château sa magnifique bague en or. En 1307, le château de Fressac et les terres qui en dépendent se verront confiées à l'hôpital puis à l'évêque du Puy en Velay, fut vendu en 1587 au seigneur de la Garde et de Durfort à Jean de Nogarède. Celui-ci en restera propriétaire jusqu'en 1539, date à laquelle le château deviendra propriété des seigneurs locaux. Propriété de Joseph de Cadolle, il est vendu en 1808 à Simon de Verdelhan. En 1992, leurs héritiers le cèdent à la commune de Fressac.","architecture":"Ce château  de Fressac aurait été construit au cours du XIIe et début du XIIIe siècle, aujourd'hui en ruine se situe au sommet dune colline rocheuse des contreforts cévenols à quelques kilomètres dAnduze, bien que dallure altière, reste une construction modeste surtout remarquable par son architecture militaire, il fut, dans un premier temps, habité par des militaires qui contrôlaient lentrée des Cévennes. Un ancien fossé clos, des hauts murs d'enceinte dont la courtine faciliterait le raccordement avec la tour maîtresse de plan carré avec mâchicoulis, l'accès du château devait s'effectuer par cinq portes, l'une d'elle est bien conservée est surmontée de mâchicoulis.  En forme de quadrilatère avec ses quatre tours dangle et ses courtines crénelées est un spécimen remarquable et très bien conservé de larchitecture civile et militaire du Moyen-Age certainement du XIIe siècle. Les amoureux de vieilles ruines le restaure petit à petit. A lorigine, deux portes protégeaient et donnaient accès en son centre, au pied du donjon, avec aussi comme défense, la traditionnelle herse.","habitants":"La mère de Saint-Louis, Blanche de Castille\r\n        \"","divers":"Vestiges du château de Fressac","gps":"","images":["../image/image_30/30_Fressac_1.jpg","../image/image_30/30_Fressac_2.jpg","../image/image_30/30_Fressac_3.jpg","../image/image_30/30_Fressac_4.jpg","../image/image_30/30_Fressac_5.jpg","../image/image_30/30_Fressac_6.jpg","../image/image_30/30_Fressac_7.jpg"]},"Consult_chateau_formulaire3d85":{"id":"Consult_chateau_formulaire3d85","dept":"30","canton":"Calvisson","commune":"Gajan","nom":"Gajan","type":"Fort","periode":"XII","histoire":"GAJAN, dans le mur qui donne sur la rue de la Glacière, une pierre sculptée, brisée à moitié, réemployée lors d'aménagements ultérieurs révèle l'appartenance du château à la famille d'Albenas; on y aperçoit en effet un fragment d'aile et des étoiles, conformément aux armoiries de cette famille qui fut propriétaire des lieux de 1373 à 1783. C'est Jean d'Albenas, qui fut le premier représentant de cette lignée de seigneurs à s'y installer, en pleine période de peste noire; notable et juriste nîmois, La famille de Paradès, propriétaire de l'ancien château embrassa, elle, la religion protestante; mais la guerre des camisards d'une part, les dragonnades et les attaques des « Cadets de la Croix » d'autre part menèrent la vie dure tant aux uns qu'aux autres.  Devant la résistance rencontrée ils mettent le feu, dans les salles basses du château, aux meubles, livres, papiers et autre biens appartenant au seigneur de Gajan, Blaise d'Albenas, réfugié avec ses gens dans le donjon. Ce même Blaise d'Albenas était par ailleurs propriétaire du domaine de Pié Bouquet, entre Sommières et Boisseron, lequel fut à son tour pillé et incendié par les camisards. Brisé par tant de malheurs, en souvenir de son château de Gajan, il rebaptisa alors à ce domaine du nom de « Domaine de Gajan », nom que porte encore aujourd'hui le camping de Boisseron, attenant au château, actuelle propriété des Lafont. Se séparant peu à peu de ses biens à Gajan, la famille d'Albenas vendit le château en 1758 à celle des Causse de Vallongue, puis la Révolution conduisit à la vente comme bien national; il fut alors partagé entre les familles Roman et Vincent. Samuel Vincent, célèbre pasteur gardois, y naquit, et c'est son père qui, en 1835, vendit à la commune le bâtiment.","architecture":"Cet ensemble architectural datant du XIIe siècle  le donjon et son prolongement vers le nord hormis le temple et le presbytère qui sont d'une époque plus tardive. C'est l'occasion de rappeler ici les grandes lignes de l'histoire de ces lieux. Etabli à la limite nord du village ancien, le château de Gajan comporte un donjon de plan carré qui s'élève sur quatre niveaux et un corps de bâtiment rectangulaire comportant des salles basses voûtées, servant probablement de salles d'armes à l'origine dont une partie est devenue temple en 1830  est surmontées d'un étage constituant l'actuel presbytère. Une tour circulaire, dotée d'un toit de tuiles en plan incliné, flanque en outre le bâtiment du côté nord, dominant la plaine de la Braune et le Bois des Lens.","habitants":"Famille d'Albenas\r\n        \"","divers":"Donjon de Gajan","gps":"","images":["../image/image_30/30_Gajan_1.jpg","../image/image_30/30_Gajan_2.jpg","../image/image_30/30_Gajan_3.jpg","../image/image_30/30_Gajan_4.jpg"]},"Consult_chateau_formulaire546c":{"id":"Consult_chateau_formulaire546c","dept":"30","canton":"Aigues-Mortes","commune":"Gallargues le Monteux","nom":"Gallargues","type":"Patrimoine","periode":"XII-XIV","histoire":"GALLARGUES, d'un premier château évoqué avec le nom du seigneur des lieux Rostaing en 1027,  la seigneurie est rattachée à la baronnie de Lunel. Et en 1295, acquis à la baronnie par le roi de France Philippe IV le Bel, en 1356, le sénéchal de Beaucaire ayant ordonné sa mise en défense, un second château, dont la tour subsiste aujourdhui son château et la seigneurie qui en dépend sont considérés comme une possession suffisamment importante pour que la reine de Majorque Isabelle qui y réside et meurt en 1404, accepte de les recevoir du roi de France Charles VI en compensation du prix de la vente de Montpellier que Jaume III son père avait conclue le 25 octobre 1349 avec le roi de France Philippe VI sans recevoir le paiement convenu.                                  Tour de guet quadrangulaire du XIIIe siècle dépendant du castrum médiéval de Gallargues le Montueux. Cachot durant les Guerres de Religion, la Tour Royale sert aujourd'hui de belvédère et accueille une exposition sur le télégraphe optique Chappe pour lequel elle servit de relais au XIXe siècle.","architecture":"Gallargues, d'un premier château évoqué avec le nom du seigneur des lieux Rostaing en 1027 un second château, dont la tour subsiste aujourdhui, est édifié et la cité est fortifiée par un rempart construit avec le même matériau et le même appareillage que celui dAigues-Mortes, de 6 mètres de hauteur, 1,30 à 2 mètres dépaisseur, sur 600 mètres de pourtour, défendu par 5 grosses tours, avec 3 portes en ogives hersées, lenceinte de Philippe Auguste qui défend Paris à la même époque n'est que 8 fois plus étendue. Le 11 octobre 1628, les armées de Louis XIII commandées par le duc de Montmorency assiègent la ville qui refuse de renier sa foi, démolissent ses remparts, au sommet de la colline (côte 65 mètres) sur laquelle la cité est construite, derrière le temple, il reste du second château de Gallargues la « Tour royale » du XIVe siècle, haute de 15 mètres au sommet de la tourelle circulaire qui la domine. Elle vient d'être ré-équipée en 2010, à son sommet, du grand mat de son ancien télégraphe Chappe. À peu de distance dans les murs du troisième château quavait édifié au milieu du XVIIIe siècle le marquis de Rochemore se trouve lactuel temple de style néoclassique construit à partir de 1810. Il possède de vastes tribunes soutenues par d'importantes colonnades, ainsi qu'un très haut plafond à caissons (environ 12 mètres). Il est lun des plus imposants temples de la plaine du Languedoc.","habitants":"Philippe IV le Bel\r\n        \"","divers":"Vestiges et château de Gallargues","gps":"","images":["../image/image_30/30_Gallargues_1.jpg","../image/image_30/30_Gallargues_2.jpg","../image/image_30/30_Gallargues_3.jpg"]},"Consult_chateau_formulairec6ea":{"id":"Consult_chateau_formulairec6ea","dept":"30","canton":"Marguerittes","commune":"Garons","nom":"Garons","type":"Château","periode":"XII","histoire":"GARONS, lévêque Remessarius donna au diocèse de Nîmes son domaine de Garons. Lhôtel de ville de Garons est une ancienne résidence des évêques de Nîmes. A lemplacement de la mairie se trouvait déjà sa demeure et une église dédiée à Saint Estève. En 1567, à la suite des troubles religieux qui opposèrent catholiques et protestants, le château de Garons fut rasé. En 1658, Anthime-Denis Cohon qui fut à deux reprises évêque de Nîmes à la demande de Richelieu puis de Mazarin, fit reconstruire à ses frais le château et léglise (la chapelle actuelle). A la Révolution, léglise et le château épiscopal furent pillés et saccagés. Comme tous les biens de lEglise de France, le château, son parc et le domaine furent vendus le 21 décembre 1791. Une possession de onze siècles prenait fin. Il fut acquis en 1950 par la famille Dalmas, devenue hôtel de ville et bureau de poste.","architecture":"Garons reconstruit au XIIe siècle  le château et léglise (la chapelle actuelle). A lintérieur, la cage descalier est importante. Au rez-de-chaussée, trois salons en enfilade servaient de pièces de réception. Corps de logis en L, la cave voûtée en pierre occupe la longueur du bâtiment principal, grand bâtiment à deux niveaux flanqué à droite par un corps en avancée. Reconstruit au  XVIe siècle.","habitants":"Famille Dalmas\r\n        \"","divers":"Château à Garons","gps":"","images":["../image/image_30/30_Garons_1.jpg"]},"Consult_chateau_formulairece77":{"id":"Consult_chateau_formulairece77","dept":"30","canton":"Bagnols sur Cèze","commune":"Gaujac","nom":"Gaujac","type":"Château","periode":"XV-XVII","histoire":"GAUJAC, le château était depuis le XIVe siècle une possession de la maison de Gaujac, et des Sabran. Il passa ensuite par mariage à la famille de Sarrats à la fin du XVe siècle, puis à la famille Rodulphe de Saint-Paulet au XVIe siècle et aux Piolenc de Pont-st-Esprit. En 1586, Montmorency sempara de Gaujac et assiégea le château qui résista pendant 14 jours. Dès lors deux grandes familles se succéderont à Gaujac.  La famille Piolenc, au XVIIe siècle,  en 1679,  Anne de Piolenc lapporta en dot à Gaspard de La Croix de Castries, baron de Meyrargues et de Collias, sénéchal dUzès, chef de la branche cadette de la maison de Castries, et il y fixa la résidence de sa lignée pour trois siècles, au cours desquels, chaque génération apporta sa pierre à lédifice, sacrifiant lancien donjon accolé au sud, remaniant  le château dans le goût du XVIIIe puis du XIX siècle.  Cest en 1979 que le château inhabité depuis plusieurs années, depuis Gabriel Bellecombe de Gaujac jusqu'au dernier propriétaire, fut racheté à René de Castries,  descendant d'une  très illustre et ancienne famille de la noblesse du Languedoc et membre de lAcadémie Française et historien,  à qui le château fut racheté, occupèrent les lieux jusqu'au XVIIe siècle. La famille Boussaguet les propriétaires actuels l'ont acquis en 1979  poursuivent la restauration.","architecture":"Gaujac, lancien château médiéval, aujourdhui disparu,  le château actuel du XVe siècle au centre du village englobé dans les vestiges d'une enceinte fortifiée remanié au XVIIe siècle façade classique à trois niveaux  deux bâtiments  en équerre cour fermée par des murs à l'opposé et tours aux angles, a été sauvé de l'abandon il y a une trentaine d'années. Au fil du temps, cette ancienne place forte fut  remanié au XVIIIe siècle et au début du XIXe siècle  dans un style italien, l'ancien donjon  accolé au sud fut supprimé.","habitants":"famille Piolenc\r\n        \"","divers":"Château de Gaujac","gps":"","images":["../image/image_30/30_Gaujac_1.jpg","../image/image_30/30_Gaujac_2.jpg","../image/image_30/30_Gaujac_3.jpg","../image/image_30/30_Gaujac_4.jpg","../image/image_30/30_Gaujac_5.jpg"]},"Consult_chateau_formulaire8b1f":{"id":"Consult_chateau_formulaire8b1f","dept":"30","canton":"St-Gilles","commune":"Générac","nom":"Generac","type":"Château","periode":"XII-XVIII","histoire":"GENERAC, au XIe siècle fief des comtes de Toulouse  passa au roi de France par le traité de Meaux, puis occupé par les Templiers. Au début du XIVe siècle, la seigneurie de Générac passe sous le contrôle de Guillaume de Nogaret, qui y exerce la justice. Juriste et conseiller du roi Philippe IV le Bel, Nogaret est également seigneur de Marsillargues, Calvisson, Vergèze et de la Vaunage. Ces fiefs lui sont octroyés suite à l'arrestation et à la mort du pape Boniface VIII, dont le roi ne pouvait supporter l'autorité sur l'église de France. Au XVe siècle, des troubles juridiques apparaissent concernant la seigneurie de Générac, notamment à l'encontre des descendants de Guillaume de Nogaret. En 1508, l'application définitive du concile de Vienne par le parlement de Toulouse permet le rétablissement des droits du grand prieur. Ce dernier aménage largement le château vers 1540. Quant au rachat, après la Révocation de lÉdit de Nantes, soit en 1685, du château par le Grand-Prieur de Saint-Gilles aux moines de Franquevaux. La Révolution vit la fin de la seigneurie de Générac. Les biens de lOrdre de Malte sont aliénés aux biens nationaux et vendus aux citoyens le 28 ventôse de lan III. Ce qui permet de juger de limportance des propriétés de lOrdre à cette époque, cest le nombre des actes de vente et des acquéreurs.                          VALCOMBE viticole  de Dominique Ricome dans cette famille depuis trois siècle.","architecture":"Générac, construit du XIIe siècle et remanié au XVIIIe siècle, il est actuellement en cours de rénovation. On peut y découvrir un escalier à vis et une façade Renaissance. Le château de Générac est une construction importante pour la région où l'architecture de la Renaissance est peu représentée. Il présente des détails, modénatures des baies représentatifs de la fin de la Renaissance (date 1545 inscrite sur la tour sud-est). L'intérieur a été peu modifié ; certaines pièces ont conservé leur volume et leur plafond à la Française. Corps de logis  percé de grandes baies à meneaux  flanqué de deux tours rondes massives aux angles et une cour d'escalier polygonale en saillie.","habitants":"Famille de Guillaume de Nogaret\r\n        \"","divers":"Château de Générac.","gps":"","images":["../image/image_30/30_Generac_1.jpg","../image/image_30/30_Generac_2.jpg","../image/image_30/30_Generac_3.jpg","../image/image_30/30_Generac_4.jpg","../image/image_30/30_Generac_5.jpg","../image/image_30/30_Generac_6.jpg","../image/image_30/30_Generac_7.jpg","../image/image_30/30_Generac_8.jpg"]},"Consult_chateau_formulaireabdb":{"id":"Consult_chateau_formulaireabdb","dept":"30","canton":"La Grand-Combe","commune":"Génolhac","nom":"Genolhac","type":"Patrimoine","periode":"XI-XVIII","histoire":"GENOLHAC,  en face de léglise, dans cette ville bâtie sur lancienne voie romaine, la Régordane, une tour carrée du XIe ou XIIe siècle, accolée à un logis du XVIIIe siècle, est le seul vestige bien conservé du château de Génolhac. La seigneurie de Génolhac était en paréage entre les évêques dUzès et les seigneurs de Randon, de Polignac, Budos de Porte et Conti. En 1777, les princes de Conti vendirent leurs biens de Génolhac à Claude-François de Roche, descendant de Jacques de Roche, le célèbre chef catholique.                                                                                              La tour appartient à la famille du docteur Pelet.","architecture":"Le plan de la tour de Génolhac est presque carré avec 6,60 mètres sur 6,66 mètres de cotés extérieurs. En grand appareil de granit, rehaussé par endroits de bossages, les murs ont une épaisseur de 1,90 mètre environ. Aucune ouverture à la base. La tour nest accessible que par une petite porte, à 4 mètre de hauteur, en partant dune salle du bâtiment adjacent. Deux portes condamnées existent toutefois au même niveau, sur deux faces, larges de 0,75 mètre, avec un  linteau droit sous un arc de décharge en plein cintre, avec tympan plein, un peu en retrait. Lintérieur ne comporte aucune voûte, seulement des planchers reliés par un petit escalier moderne. A mi-hauteur, une sorte de niche avec quatre gradins dont le plus élevé, percé dun trou pourrait être des latrines, bien quon ne voit pas dévacuation. La toiture en pavillon, couverte de tuiles canal, est bien entretenue.","habitants":"Famille de Jacques de Roche\r\n        \"","divers":"Patrimoine et maison forte à Génolhac","gps":"","images":["../image/image_30/30_Genolhac_1.jpg","../image/image_30/30_Genolhac_2.jpg","../image/image_30/30_Genolhac_3.jpg","../image/image_30/30_Genolhac_4.jpg"]},"Consult_chateau_formulaire47cd":{"id":"Consult_chateau_formulaire47cd","dept":"30","canton":"Pont St-Esprit","commune":"Goudargues","nom":"Goudargues","type":"Château","periode":"XII","histoire":"GOUDARGUES,  château dit de la bastide d'Orniols au XIIe siècle, il appartenait, ainsi que la plupart des biens de la Bastide, à l'évêque d'Uzès comtes d'Uzés par les Orniols. En 1436, par un échange avec Bertrand de Cadoine, la tour, le château, la forteresse et les terres sont donnés à François de Larque, contre des possesions de Sanilhac. Puis cédé à Jean Faret, puis à Pons d'Oriole qui l'apporte en 1529 en dot  par sa fille Jeanne de Maubuisson,  en 1596, Jean De Pellegrin devient possesseur de toute la justice de Goudargues,  à Jean François de Pellegrin, toujours par alliance passa à René de Juge, baron de Cadoène en 1716 à François de Cadolle et au Voguë en 1767. Pendant la réforme, il devient un haut lieu du protestantisme de la vallée de la Cèze, toutes les assemblées des Calvinistes s'y tiendront pendant 145 ans. Au XIXe siècle, c'est le fils du ministre Guizot,  Guillaume  qui  après avoir épousé la fille du vicomte de Flaux, devient propriétaire et exploite le château et les terres. Après la visite, un petit tour au lavoir s'impose, il y coule dit-on une source aux vertus thermales qui lui ont valu le nom de Fontaine Chaude. Propriété de monsieur Méric.","architecture":"Goudarques; la bastide d'Ornioles, corps de logis rectangulaire à deux niveaux, flanqué de tours rondes aux extrémités.","habitants":"Famille de François de Larque\r\n        \"","divers":"Bastide d'Ornioles Goudargues.","gps":"","images":["../image/image_30/30_Goudargues_1.jpg","../image/image_30/30_Goudargues_2.jpg"]},"Consult_chateau_formulaired559":{"id":"Consult_chateau_formulaired559","dept":"30","canton":"Alès","commune":"Saint-Martin de Valgagues","nom":"Lacoste_Gard","type":"Château","periode":"XVIII","histoire":"LACOSTE, le fief d'Alais appartenait, au Moyen-Age, à la maison de Pelet, ils gardèrent ce fief à moitié sous le titre de baronnie, jusqu'au milieu du XVIIe siècle. L'autre moitié, devenue partie du domaine de la couronne par la cession d'Amaury de Montfort, fut élevé au titre de comté et passa successivement par mariage ou par vente aux Beaufort, aux Montmorency et aux Conti. Issu d'une haute et vieille famille languedocienne, vivant au château de Lacoste, près de Cendras, proche d'Alais. François de La Fare, né le 26 mars 1628 à la Bastide d'Englas, fils de Jacques II de La Fare et de Gabrielle d'Audibert De Lussan, est le fondateur de la branche La Fare d'Allais. Il sera baron de la Salle, seigneur de Saint Félix, capitaine de cavalerie du baron d'Alais. Il épouse, le 11 avril 1655 Anne de Gambis, fille de Jacques de Cambis, baron d'Alès, premier baron du Languedoc, lieutenant général des armées du roi, et de Catherine d'André. Gustave de La Fare y naquit en 1791. Gustave Christophe Valentin, né sans titre à Saint-Martin de Valgalgues au château de Lacoste.  portera le titre de marquis. Il épouse, Anne-Françoise-Emilie Soustelle née vers 1799. Puis il siègera au conseil municipal d'Alais, sans descendance. Le château passa au baron Xavier Reille  président des forges et fonderies d'Alès, passa aux Bérard et au Chazel et depuis 1992 à monsieur Lugand.","architecture":"Le château de Lacoste construit au XVIIIe siècle sur des bases anciennes, façades à l'ouest sur le Gardon à quatre étages, le corps central en retrait deux pavillons saillants  reliés par terrasses et balustrades, les terrasses du premier étages soutenue par deux grandes arcades. le château étant adossé au coteau sur une forte pente l'entrée s'effectue à mi-hauteur sur  le flanc du pavillon au sud.","habitants":"Famille de la Fare d'Allais\r\n        \"","divers":"Château de Lacoste à Saint-Matin de Valgagues","gps":"","images":["../image/image_30/30_Lacoste_Gard_1.jpg"]},"Consult_chateau_formulaire91d5":{"id":"Consult_chateau_formulaire91d5","dept":"30","canton":"Pont St-Esprit","commune":"Pont St-Esprit","nom":"Lamartine","type":"Château","periode":"XIII","histoire":"LAMARTINE, par alliance les Lamartine firent passer le domaine au Piollenc en 1740 en domaine des Chanziergues qui le vendirent au Madier,  par l'alliance de la fille du général Madier le fit passer aux Digoine.   Agathange de Digoine, capitaine dinfanterie, chevalier de Saint Louis .  Claude Paul de Digoine, chevalier de Saint-Louis, décède en 1789 à Nîmes, comte de Digoine, marié à Virginie de Vanel de Lisleroy, doù  Charles né en 1824 , marié en 1851 à Valentine de Talode du Grail, château de Bélair, près de Pont Saint Esprit. Philippe François, marquis de Digoine du Palais, épousa Marcelline de Vanel. Plusieurs enfants Irène de Digoire du Palais, de Pont-St-Esprit, Hypolite Malgouyre d'Alairac, fils de Victor et de Julie Bleys. Louise de Digoire du Palais,  Ludovic Mazoyer de Clarensac, fils de Fortuné et de Thérèse Deroulouard. Alexias de Digoire du Palais, Louis de Beauregard de la Prugne,  fils de Jacques et d'Anne de Montaudrand. Humbert Pierre Henri, marquis de Digoine du Palais, qui épousa en 1852 à Marie Alexia Madier de Lamartine, petite-nièce du général baron.  Faïne de Digoire, de Pont-St-Esprit, Gabriel de Plantin, fils de feu Charles et de Françoise de Vibrac 1851 à Valentine de Talode du Grail, 1834, château de Bélair. Aujourd'hui la famille  de Verduzan descendant des Madier l'ont transformé en chambres d'hôtes.","architecture":"Lamartine, château du XIIIe siècle corps de logis rectangulaire à deux étages remanié rajout de deux tours rondes couronné de balustrade, prolongé de chaque côté d'une construction basse reliant deux pavillons en retour projetés vers l'avant.","habitants":"Famille de Claude-Paul de Digoine\r\n        \"","divers":"Château de Lamartine","gps":"","images":["../image/image_30/30_Lamartine_1.jpg","../image/image_30/30_Lamartine_2.jpg","../image/image_30/30_Lamartine_3.jpg","../image/image_30/30_Lamartine_4.jpg"]},"Consult_chateau_formulaire131d":{"id":"Consult_chateau_formulaire131d","dept":"30","canton":"Sommières","commune":"Langlade","nom":"Langlade","type":"Château","periode":"XV","histoire":"LANGLADE, ce domaine viticole est en activité depuis le XVe siècle. Plusieurs écrits attestent que le roi René et d'autres seigneurs étrangers venaient s'y approvisionner. Fut créé en 1891 par Antoine Paul Dombre, sur les terres de son grand-père David Dombre et attenant à la propriété de ce dernier. Tony Dombre était maire du village de Langlade, responsable de l'administration des Ponts et Chaussées dans le département du Gard, officier de l'instruction publique. Il est l'arrière-grand-père des propriétaires actuels. Les frères Michel et Jacques Cadène de château Langlade la famille Cadène.","architecture":"Château du XVe siècle de plan rectangulaire à deux niveaux, prolongé sur les extrémités par deux pavillons à toits plats et des dépendances en retour d'équerre.","habitants":"Famille Antoine-Paul Dombre\r\n        \"","divers":"Château de Langlade","gps":"","images":["../image/image_30/30_Langlade_1.jpg","../image/image_30/30_Langlade_2.jpg"]},"Consult_chateau_formulairea0fa":{"id":"Consult_chateau_formulairea0fa","dept":"30","canton":"Le Vigan","commune":"Lanuéjols","nom":"Lanuejols","type":"Château","periode":"XII-XV","histoire":"Deux maisons fortes à Lanuéjols, celui d'Espinassous et celui de Rogers.                                                                                        Lanuéjols appartenait, avant 1790, à la viguerie du Vigan et Meyrueis et au diocèse de Nimes, archiprêtré de Meyrueis. On a trouvé sur le territoire de cette commune des tombeaux antiques. Elle possède des bois considérables. Il n'existait pas d'armoiries. Cette commune qui s'appelait Lamejol en 1102, Faissae de Lanéjol en 1150, a en grande partie adhéré vers 1560 à la religion réformée. En 1663, Louis XIV fait raser le temple. La révocation de l'Edit de Nantes se traduit par de nombreuses conversions, les croix que l'on remarque au-dessus des portes de maisons signalaient aux soldats les familles catholiques et leur évitaient ainsi une répression.\r\nESPINASSOUS, fief au XVe siècle des Bossuges, en 1571 aux Dupont de Serres de Roquedols et aux Delpuech du Vigan en 1720, passa après la Révolution à Henri Meynier de Salinelles, et les fermiers les Libourel l'achetèrent en 1880, toujours dans la descendance par Pascal Rémy agriculteur.                                            ROGERS, cité dès le XIIe siècle, le domaine des évêques de Nimes, passa en 1582 à Jean de Fesc seigneur de Sumène resta dans cette famille par les Lansade de Jonquières, aujourd'hui les Lansade et les Drier de Laforte.","architecture":"Lanuéjols appartenait, avant 1790, à la viguerie du Vigan et Meyrueis et au diocèse de Nîmes, archiprêtré de Meyrueis.                                Espinassous, château et ferme de Rogers, ancien château dEspinassous au bord dune ravine, dorigine très ancienne, remanié. corps de logis à trois niveaux flanqué d'une haute tour  d'escalier ronde. Au XVIe siècle possédait encore la deuxième tour ronde, remplacé aujourd'hui par une terrasse.                               Château de Rogers, de forme quadrilatère avec un corps de logis rectangulaire à trois niveaux accolé de deux grosses tours rondes et petite tour à la limite du Parapet, cour intérieure fermée par un bâtiment de dépendance.","habitants":"Famille des Bossuges                                                                        Famille de Jean de Fesc\r\n        \"","divers":"Château d'Espinassous et de Rogers","gps":"","images":["../image/image_30/30_Lanuejols_1.jpg","../image/image_30/30_Lanuejols_2.jpg","../image/image_30/30_Lanuejols_3.jpg"]},"Consult_chateau_formulaireac8a":{"id":"Consult_chateau_formulaireac8a","dept":"30","canton":"Le Vigan","commune":"Lasalle","nom":"Lasalle","type":"Château","periode":"XIII-XVI","histoire":"Quatre châteaux à Lasalle, château d'Algues du XIII -XVIe siècle , de Calviac du XIII- XIXe siècle avec tours d'angles, de Solier du XIXe siècle et la gentilhommière de Cornelly.                                       ALGUES, cité en 1270 n'a jamais été vendu toujours transmis par les femmes, de la branche de Manoël de Nogaret,  Manoël d'Algues  au XVIIe siècle famille d'officier du roi est toujours dans la descendance.                                                                         CALVIAC, cité au Xe-XIIe siècle, fief des seigneurs de Sauve et d'Anduze qui le firent tenir par les moines de Tornac qui après leur départ le chevalier Raymond d'Aleyrac  en 1244 transforme le domaine en château et en rendit hommage aux prieurs  de Tornac pour trois parts la quatrième aux Mandajors. Claude de Montfaucon au XVe siècle récupère une part passa aux de la Croix à la mort de Louis de la Croix  baron de Castries,  son épouse Jeanne de Montfaucon  cèda en 1470  à la famille de  Janet d'Ursi,  dit des Hours,  cette famille rassembla en 1525  toute les parts, et le domaine resta dans cette famille jusqu'à la fin du XIXe siècle, à la famille de Jules de Marveille qui l'obtient  par alliance passa  à son petit fils Latour Dejean jusqu'en 1996 et acquis par la famille Pougnadoresse, aujourd'hui  à  Marcel Fanguet.                               CORNELLY, cité au XVIe siècle par les Blimard  notaires de Lassalle, au XVIIe siècle à Jean de l'Hom, puis passa par alliance au Bringuier de Cornely et en 1770 acquis par Louis Deshours de Calviac. Durant la guerre des Camisards, les trois soeurs Bringuier épousèrent deux chefs de camisards dont Roland qui y trouvèrent asile. Aujourd'hui  à monsieur Henri Dollard.                        SOLIER, depuis le XIIIe siècle  de la famille Solier  jusqu'en 1872 qui passa par alliance au Coste qui le vendit à Raoul de Cazenove  son fils Roger fit reconstruire son château  en 1885.","architecture":"Algues construit au XIIIe siècle, de forme trapézoïdale à deux niveaux avec cour intérieure avec entrée côté Est,  très longue façade de six travées encadré de deux tours rondes aux angles à toits arasées à hauteur  de l'ensemble. Calviac, construit sur un rocher, la demeure domine le hameau de Calviac. Plusieurs fois assiégé, incendié, détruit, il ne subsiste rien du château primitif construit au XIIIe siècle. L'édifice actuel fut  en partie reconstruit au XVIe siècle, et restauré XIXe siècle. Le château de Calviac se compose d'un logis de plan rectangulaire, à deux niveaux, flanqué de trois tours rondes dépassant la toiture d'environ deux mètres, ornées de mâchicoulis décoratifs.                                                   Cornelly, gentilhommière construite au XVIe siècle, de plan quadrangulaire dont la façade principale est flanquée de deux tours rondes  arasées au niveau du toit. Le château servit de refuge aux prédicateurs protestants. Le 16 juin 1944, lors d'un combat entre maquisards et troupes allemandes au château de Cornély, celui-ci fut brûlé par  les allemands, il fut entièrement reconstruit  au milieu du XXe siècle. Grande terrasse à balustrades et beau panorama.                                Solier, château de style Moyenâgeux et Renaissance et d'un donjon de style germaniques sur la partie arrière, corps de logis rectangulaire à deux niveaux, accolée de pavillons carrées à trois niveaux saillants aux extrémités accolé sur le côté gauche d'une tour ronde à toit en poivrière.","habitants":"Famille de Manoël de Nogaret                                                                      Famille Solier\r\n        \"","divers":"Château  d'Algues, de Cornelly, de Calviac, de Solier et de Nougaréde","gps":"","images":["../image/image_30/30_Lasalle_1.jpg","../image/image_30/30_Lasalle_2.jpg","../image/image_30/30_Lasalle_3.jpg","../image/image_30/30_Lasalle_4.jpg","../image/image_30/30_Lasalle_5.jpg","../image/image_30/30_Lasalle_6.jpg","../image/image_30/30_Lasalle_7.jpg","../image/image_30/30_Lasalle_8.jpg","../image/image_30/30_Lasalle_9.jpg"]},"Consult_chateau_formulaire0e4f":{"id":"Consult_chateau_formulaire0e4f","dept":"30","canton":"Roquemaure","commune":"Laudun","nom":"Laudun","type":"Château vestiges","periode":"XII-XVI","histoire":"Quatre châteaux à Laudun, Lascours, de Bord, St-Maurice  et de Ribas                                                                                     LASCOURS, au  XIIe siècle  résidence  familiale des Laudun de Montfaucon, en 1559, Guillaume de Panisse-Passis, époux de Jeanne de Montfaucon, vendra  à Guillaume de Joyeuse. Il améliore le système de défense et  ajoute une aile  à l'Est. Son fils cadet, François de Joyeuse hérite, il sera nommé cardinal en France par le Pape Paul V. Henriette-Catherine de Joyeuse, nièce du  Cardinal, héritera, épouse  de Claude de Lorraine, duc de Guise et héritier du duché de Joyeuse vend Lascours à Henri des Porcelets d'Ubaye. En 1681 aux  Brancas-Villeneuve  par aliance de  de Louise de Porcelets avec  Henri de Brancas-Villeneuve.  En 1792, la municipalité préservera le château déserté, qui fut sauvé de la tourmente révolutionnaire. Le château fut récupéré par ses propriétaires, la famille Jouenne  d'Esgrigny, qui l'entretient  jusqu'à la  deuxième guerre mondiale. En 1972, Lascours est  restitué au ministère des armées qui, en 1979, le fait vendre  aux enchères. Acquis par Jacqueline Gurnari se sont chargés  de sa restauration, de son entretien et de son animation de musique, décéda prématurément céda le château à la famille de  Bastouil qui continue son oeuvre.\r\nBORD,  fief du comté de Toulouse, en 1211, le roi Philippe Auguste reconnaît les droits de l'évêque d'Uzès sur le château et en 1209 au roi de France. En 1583 ruiné acquis par Guillaume de Joyeuse propriétaire de Lascours et en 1620 passa  à Jehan de Cabiac, écuyer, puis à son neveu Pierre de Chansiergues, confisqués à la Révolution, ce qui en restait passa par alliance au Bimard et fut acquis par monsieur Brotten ces ruines se trouvant au centre de son vignoble.\r\nRIBAS, propriété en 1352 à Bermond Béranguier, passa aux Béraud du XV au XVIe siècle aux Giraud  et à Gilles de Ribas et fut acquis dans les années 1920 par larrière grand-père de Thierry Vignal et depuis lors, se perpétue la tradition vigneronne sur cette exploitation familiale.                                                                            St-MAURICE, à L'Ardoise aujourd'hui viticole   M. Christophe Valat, en tant que gérant, est dirigeant de la société.","architecture":"Lascours, ses origines remontent à la fin du XIIe siècle, il dresse ses trois hautes tours et ses élégantes façades dans un décor de plaine viticole. Remanié au cours du XVIe siècle, ce petit pavillon de chasse fut complété par une série  de bâtiments,  Il fait terminer l'aménagement de la grande salle qui deviendra la salle des états Généraux. Un petit oratoire  est créé. Le château devient une magnifique maison de style Renaissance Française  et devint une exploitation agricole. C'est dans le Gard l'unique demeure entourée de douves en eau vive. Exemple très rare en Languedoc de construction d'une terrasse avec boulevards et bastions, sur laquelle se développent trois corps de bâtiments disposés en U sur trois de ses angles tours rondes dépassant légèrement la toiture. Cette cohérence a été altérée par les transformations du XVIIIe siècle. Bord,  cest un domaine niché au coeur de ses vignes, aux frontières du territoire communal,  dominant la plaine du sommet d'une petite colline détachée du plateau de Lacau, qui avait dû être construit entre le XIe et le XIIe siècle. Le château de Bord ne présente plus que quelques traces de ce qui devait être un édifice défensif Le monument fut en partie détruit par les protestants au cours des guerres de religion.                                                          Ribas, bâtiment  avec deux tours engagées sur façades opposées à l'est, autrefois crénelée transformée par un toit pointu hexagonal la deuxième tour moins haute de diamètre plus importante avec des créneaux modernes.                                                                        St-Maurice, construction du XIXe siècle rectangulaire à trois niveaux.","habitants":"famille des Laudun de Montfaucon                                                          Famille de Guillaume de Joyeus\r\n        \"","divers":"Vestiges de Bord, château de Lascours , de Ribas et de Saint-Maurice","gps":"","images":["../image/image_30/30_Laudun_1.jpg","../image/image_30/30_Laudun_2.jpg","../image/image_30/30_Laudun_3.jpg","../image/image_30/30_Laudun_4.jpg","../image/image_30/30_Laudun_5.jpg","../image/image_30/30_Laudun_6.jpg","../image/image_30/30_Laudun_7.jpg","../image/image_30/30_Laudun_8.jpg"]},"Consult_chateau_formulaire63a2":{"id":"Consult_chateau_formulaire63a2","dept":"30","canton":"La Grand-Combe","commune":"Laval-Pradel","nom":"Laval_Pradel","type":"Château vestiges","periode":"XV","histoire":"Deux châteaux à Laval celui de Pradel et de Trouillas.                          PRADEL,  la terre et la seigneurie du Pradel entrent dans la famille Roquefeuil-Gabriac en 1652  jusqu'en 1770, puis elle sera cédée au sieur de Trouillas, Joseph Mathieu Deleuze qui la revendra à Charles-Eugène  Gabriel de la Croix, marquis de Castries. Après la révolution, le château et ses dépendances appartiennent à André Francezon  dont l'héritier le céda en 1886 à Clovis Rouquette  négociant en vins. En mai 1918, il est vendu à la Compagnie des mines de la Grand-Combe. En 1990, la commune de Laval-Pradel le rachète aux Charbonnages de France.                                   TROUILLAS, au XVe siècle, les seigneurs de Saint-Andéol de Trouillas étaient les Martinas, puis les Duranc et en 1513 la famille Bony. En 1700, Jeanne Gabrielle de Bony vend à Antoine Deleuze, fermier  général de la comté dAlais.  En 1782, le marquis de Castries, suite à un conflit avec Tubeuf concessionnaire des mines d'Alès, violente bagarre au pied du château qui fut brûlé pillé et abandonné, depuis dans les ronces.","architecture":"Pradel, Il est composé de deux étages sur rez-de-chaussée plus un comble. Aux quatre angles se trouvent des échauguettes circulaires en briques. Des moellons de calcaire irréguliers ont été utilisés pour le gros oeuvre, et des pierres taillées pour les chaînages d'angle et les encadrements de baies, la porte d'entrée  se compose d'un encadrement en légère saillie, les fenêtres sont à croisées avec linteaux et arc de décharge cintré ou en bâtière, les combles prennent jour sur l'extérieur par cinq oculis de chaque côté du bâtiment, le corps du bâtiment est partagé en appartements d'habitation. L'aile droite rénovée s'est transformée en salle polyvalente utilisée pour les fêtes et les animations culturelles de la commune. Trouillas; au XIXe siècle, deux ailes à vocation agricole sont rajoutées au bâtiment d'origine rectangulaire pour lui donner sa configuration actuelle en forme de U.","habitants":"Famille Roquefeuil-Gabriac                                                                   Famille Bony\r\n        \"","divers":"Château de Laval, de Pradel et vestiges de Trouillas","gps":"","images":["../image/image_30/30_Laval_Pradel_1.jpg","../image/image_30/30_Laval_Pradel_2.jpg","../image/image_30/30_Laval_Pradel_3.jpg","../image/image_30/30_Laval_Pradel_4.jpg","../image/image_30/30_Laval_Pradel_5.jpg","../image/image_30/30_Laval_Pradel_6.jpg"]},"Consult_chateau_formulaire39ec":{"id":"Consult_chateau_formulaire39ec","dept":"30","canton":"Le Vigan","commune":"Le Vigan","nom":"Le_Vigan","type":"Château","periode":"XVIII","histoire":"Six châteaux aux Vigan, château de Faventines dit maison dAssas du  XVIIIe siècle, façades et toitures,  Mareilles du XVIIIe  siècle, modernisé en 1922, Tessan du XVIIIe siècle; parc. Château Rond (de la Judie), de Valamont.\r\nASSAS,  dit aussi ancien hôtel Faventines, les Faventines riches marchands du Vigan au XVIIIIe siècles le fermier général Pierre Faventines fit construire ce château  de 1750 à 1755 pour loger son fils Pierre-Jacques, cette famille y vécurent une quarantaine d'année, le fermier général  y mourut en 1776, confisqué à la Révolution pour être utilisé comme prison, magasin et Hôtel de ville puis restitué au d'Assas en 1850 , héritiers des Faventines, aujourd'hui propriété du syndicat ecclésiastique du diocèse de Nimes occupé par un foyer de jeunes filles.                                   TESSAN, dans cette famille de Dortet de 1760 à 1852  Adalbert d'Ortet de L'Espigarie de Tessan Seigneur de L'Espigarie, seigneur d'Ense et de Tessan, vues de Tessan né le 6 octobre 1672, décédé le 17 janvier 1753  au château de Tessan, Le Vigan, à lâge de 80 ans, capitaine d'Infanterie. Le château de Tessan n'a jamais été vendu il est passé par alliance à la famille de Lamiral Auphan propriétaire actuel.\r\nMAREILLES, fief du comte de Mareilles descendant de Gauthier de la Rue et en 1826,  Mélanie  de la Rue de Mareilles femme du comte de Grignan vivait en ce château, la marquise de Sévigné y aurait séjourné, il fut acquis par madame de Pilleboue toujours dans cette famille.","architecture":"Assas, l'hôtel, les bâtiments du portail, ceux des dépendances, ainsi que la cour et le jardin sont classés aux monuments historiques depuis le 9 avril 2002, alors que le bâtiment des communs est inscrit depuis le 9 avril 2002. Belle demeure du XVIIIe siècle, construite entre cour et jardin. Plans et devis mentionnés en 1750 (attribués à François Tureau, l'architecte de la ville du Vigan). L'hôtel possède une distribution et un décor intérieurs de grande qualité (cage d'escalier, alcôves, gypseries, cheminées et menuiseries).                                                            Mareilles du XVIIIe siècle remanié en 1922. importante bâtisse à deux étages sur rez-de-chaussée deux pavillons carrées saillants en façades et balustrades  cachant la toiture en croupe. \r\nTessan du XVIIe et XVIIIe siècle en plan de U à trois niveaux flanqué de tours carrées.","habitants":"Famille  Faventines                                                                             famille de Dortet \r\n        \"","divers":"Château d'Assas, de Mareilles et de Tessan","gps":"","images":["../image/image_30/30_Le_Vigan_1.jpg","../image/image_30/30_Le_Vigan_2.jpg","../image/image_30/30_Le_Vigan_3.jpg","../image/image_30/30_Le_Vigan_4.jpg","../image/image_30/30_Le_Vigan_5.jpg"]},"Consult_chateau_formulairef761":{"id":"Consult_chateau_formulairef761","dept":"30","canton":"Calvisson","commune":"Lecques","nom":"Lecques","type":"Château","periode":"XV","histoire":"LECQUES, cité dès le XIIe siècle possessions des évêques de Nimes et en 1229 au domaine royal, en 1572  possession d'Antoine  Dupleix de Grémian qui en fut seigneur, sa fille le fit  passer par alliance  à Abdias  de Chaumont-Guitry sieur de Bertichères  qu'il gardèrent le domaine jusqu'à la Révolution, repris par la famille Masse fermier, toujours dans la descendance.","architecture":"les Lecques au bord de la Vidourle était à l'origine une tour féodale fortifiée  qui fut reconditionnée au XIIe siècle, il fut incendié à la Révolution est restauré au
