t-Victor, l'église de Sainte-Marie d'Adryen pour y faire un prieuré, un siècle plus tard les moines le cédèrent à leur tour à ceux de Saint-Honorat du Lérins dans la première moitié du XIIIe siècle. Paul Négrel évêque de Riez en revendique la possession et en 1385, la reine Jeanne fille de Raymond Béranger qui épousa Charles d'Anjou  ( reine de Naples, comtesse  de Forcalquier)   confiera la juridiction de ce fief à Foulques de Pontevès à cette époque le village fut entièrement dévasté par la peste et aux guerres de succession, il reprit vie au XVe siècle avec l'arrivée des familles génoises et espagnoles et en 1654 Antoine II de Thoron originaire de Digne devient le premier seigneur d'Artignosc conseillé au parlement de Provence, son château de Thoron aujourd'hui mairie,                                                                       Dans la commune château du Grand-Jardin et manoir ferme Fontayne des templiers.","architecture":"Artignosc; le château de Thoron bâtisse du XIVe siècle présente un large perron, dont l'un des angles est évidé en forme de proue de navire en un campanile.   Dans le village vestiges et portiques du XIIIe siècle, le Grand jardin et Fontayne maison forte.","habitants":"Famille d'Antoine II de Thoron\r\n        \r\n        \"","divers":"Château de Thoron et maison forte de Fontayne","gps":"","images":["../image/image_83/83_Artignosc_1.jpg","../image/image_83/83_Artignosc_2.jpg","../image/image_83/83_Artignosc_3.jpg","../image/image_83/83_Artignosc_4.jpg","../image/image_83/83_Artignosc_5.jpg","../image/image_83/83_Artignosc_6.jpg"]},"Consult_chateau_formulaire4a73":{"id":"Consult_chateau_formulaire4a73","dept":"83","canton":"Le Luc","commune":"Vidauban","nom":"Astros","type":"Château","periode":"XIX","histoire":"ASTROS; Les Templiers s'installèrent  au XIIe siècle au pied du massif des Maures dans les terres du vicomte de Marseille,une commanderie  fut élevée  appelé \"Astros\" qui passa aux Chevaliers de Saint-Jean de Jérusalem,  sur les terres de la commanderie fut construit un château par une famille de Marseille les Maurel. La commanderie  fut vendu à la Révolution à un industriel marseillais  sur ces terres par Marc-Maximin Martin son fils fit édifier le château actuel en 1860 sans  descendance légua la propriété et le château au petit fils de son cousin germain  Joseph Maurel grand-père du propriétaire actuel. Ce château fut utilisé à tourner les célèbres scènes de la famille Pagnol \"le château de ma mère\" et le domaine qui l'entoure produit du vin  renommé haut de gamme faisant honneur à l'appellation Côtes du Provence.; Dans le parc fut tourné le film \"le château de ma mère\".","architecture":"Astros; ce château construit en 1860 sur l'emplacement de l'ancienne commanderie d'Astros, de style villa Italienne à trois niveaux, deux avant corps de faible saillie encadrent un long balcon, lui  même soutenu par un portique à colonnade ionique, côté parc avant corps en saillie accolé de chaque côté de deux tourelles d'escalier dépassant largement la toiture.","habitants":"Monsieur Marc-Maximin Martin                                                \r\nFamille Maurel\r\n        \r\n        \"","divers":"Le château d'Astros","gps":"","images":["../image/image_83/83_Astros_1.jpg","../image/image_83/83_Astros_2.jpg","../image/image_83/83_Astros_3.jpg","../image/image_83/83_Astros_4.jpg","../image/image_83/83_Astros_5.jpg"]},"Consult_chateau_formulaireff1b":{"id":"Consult_chateau_formulaireff1b","dept":"83","canton":"Aups","commune":"Aups","nom":"Aups","type":"Château","periode":"XII","histoire":"AUPS; Aups au Xe siècle fut ravagé par les Sarrasins. devient le fief dela famille ducale de Blacas d'Aups, cette seigneurie d'origine de Vérignon dont Pierre d'Aups issu de la famille des Baux, premier seigneur  né à Aups, puis Blacas de Blacas III dit le Grand-Guerrier ( 1160-1235 ),  Boniface de Blacas (1221-1211) , Blacas de Blacas IV de Provence ( 1240-1300 ) et Pierre de Blacas, ce dernier né à Vérignon en 1771 mort à Vienne en 1839, homme politique officier en 1789, il émigra et devient à la restauration ministre de Louis XVIII et suivit Charles X en exil en Autriche.  Le roi René avait érigé Aups en bailli indépendante   en détachant la communauté  de la bailli de Barjols dont-elle  faisait partie, un an plus tard elle devait retomber dans l'autorité de cette dernière jusqu'à ce que François Ier  en fit une circonscription indépendante en 1533.  Le village fut attaqué en 1574 par les protestant;    ses habitants furent massacrés  par le baron d'Allemagne.  La  région à également souffert à la Révolution Française.                              Au environ d'Aups plusieurs châteaux, le château de Verignon, belle demeure dans un parc, le château fort de Taurenne du XIVe siècle fut la propriété du baron Isnard, puis passa à une famille toulonnaise, la famille Gérard au XIXe siècle garderont le domaine jusqu'en 1950.                                                                        Château de Creisson, château de Bresc, château Fabrègues et le château de Locquier.","architecture":"Aups; les ruines du château des Blacas dominent encore la vieille ville à 880 mètres d'altitude, remparts encore visibles, portail des Aires et porte du XIII  XVIe siècle, porte sarrasine et tour de l'horloge édifice fortifié qui était probablement une tour de guet au XVIe siècle. Château  de Taurenne bâtisse flanqué de tours rondes crénelées.","habitants":"Seigneurs de Blacas\r\n        \"","divers":"Vestiges de la ville fortifié d'Aups et du château de Blacas.","gps":"","images":["../image/image_83/83_Aups_1.jpg","../image/image_83/83_Aups_2.jpg","../image/image_83/83_Aups_3.jpg","../image/image_83/83_Aups_4.jpg","../image/image_83/83_Aups_5.jpg","../image/image_83/83_Aups_6.jpg"]},"Consult_chateau_formulairee39f":{"id":"Consult_chateau_formulairee39f","dept":"83","canton":"Ollioules","commune":"Bandol","nom":"Bandol","type":"Château","periode":"XIX","histoire":"BANDOL; Ce n'est qu'au début de l'époque moderne que Bandol réapparait par le duc d'Epernon à la fin des guerres de religion y fait construire un fort qu'Henri IV donne en 1596 comme fief a un valeureux militaire Antoine Boyer, ce dernier fut anoblie et ces descendants crée en 1715 un village avec sept familles pionnières dans la viticulture (connu à la table de Louis XV) pour cela Bandol se développa. En 1793 s'ouvre à Bandol une section fédéraliste qui soutenait la révolte de Toulon, ces deux responsables le curé Jonquier et le tonnelier Barthélémy seront guillotinés.                             Divers châteaux viticoles dans la commune, le Pibarnon du comte Victor depuis 1941  à la Cadière, le Saint-Come, les Salettes viticole depuis 1600 et le Romazan du XVIIIe siècle ancien monastère.","architecture":"Bandols;  Hameau de Poulié donjon carré. Château de Pibarnon.","habitants":"Monsieur Antoine Boyer\r\n        \r\n        \"","divers":"Chatelet de Bandol et château de Pibernon.","gps":"","images":["../image/image_83/83_Bandol_1.jpg","../image/image_83/83_Bandol_2.jpg"]},"Consult_chateau_formulaire066a":{"id":"Consult_chateau_formulaire066a","dept":"83","canton":"Comps-sur-Artuby","commune":"Bargéme","nom":"Bargeme_Ponteves","type":"Vestiges","periode":"XII","histoire":"BARGEME; Château appelé \"Pontevès\" dans le plus haut village du Var (1097 m),  fief au XIIe siècle des Sabran-Pontevès qui firent construire la forteresse, Foulques  d'Agoult de Pontevès devient en 1313 seigneur du village, son descendant fit édifié le château. La branche  Pontevès Bargéme s'intitule vicomté dès 1360; Fouquet III de Pontevès conseillé et chambellan du roi Robert d'Anjou en 1330 commandant des armées. Fouquet IV grand sénéchal de Provence Jean II de Pontevès vicomte de Bargème grand chambellan de Louis III en 1429 et Jean-Baptiste de Pontevès lieutenant du roi.  Au XVIe siècle, événement tragique associé dans le même drame châtelain et villageois  en période des guerres de religion. Trahi par Jean-Baptiste de Pontevès seigneur de Callas qui  s'appropria des biens, aidé par son cousin Hubert de Vins qui  pillèrent et détruisirent le château,  Jean- Baptiste fut assassiné le 24 mai 1579. Deux ans plus tard c'est Balthazar de Pontevès fils de Jean Baptiste nouveau seigneur du lieu après la mort de Joseph fils aussi de Jean Baptiste lors d'une messe, en 1595 les habitants égorgèrent le petits-fils Antoine de Pontevès pour mettre fin à la ligné des châtelains. Les biens passent à un cadet  Foulques VII de Pontevès-Bargème En 1607  Le parlement de provence (tribunal d'Aix) fit condamné les coupables à la torture (supplice de la roue) et les habitants construisirent une chapelle expiatoire Nôtre Dame des sept douleurs. Le village s'est dépeuplé et resté malgré tout toujours dans la famille des Sabran de Pontevès propriétaire du château d'Ansouis en Vaucluse.","architecture":"Bargéme; Bourg féodal sur un éperon, grande enceinte du XIIe siècle, remanié au XIVe siècle percé deux portes d'enceintes. Ruines du XVIIIe siècle du château médiéval, quadrilatère flanqué de tours rondes en angles et d'un donjon carré cité en 1235; le château fut pillé et ruiné en 1579 pendant les guerres de religion.","habitants":"Famille Sabran-Pontevès\r\n        \"","divers":"Vestiges de la forteresse médiéval de Bargeme.","gps":"","images":["../image/image_83/83_Bargeme_Ponteves_1.jpg","../image/image_83/83_Bargeme_Ponteves_2.jpg","../image/image_83/83_Bargeme_Ponteves_3.jpg","../image/image_83/83_Bargeme_Ponteves_4.jpg","../image/image_83/83_Bargeme_Ponteves_5.jpg","../image/image_83/83_Bargeme_Ponteves_6.jpg","../image/image_83/83_Bargeme_Ponteves_7.jpg","../image/image_83/83_Bargeme_Ponteves_8.jpg","../image/image_83/83_Bargeme_Ponteves_9.jpg"]},"Consult_chateau_formulaireff27":{"id":"Consult_chateau_formulaireff27","dept":"83","canton":"Callas","commune":"Bargemon","nom":"Bargemon","type":"Vestiges","periode":"XII","histoire":"BARGEMON:  Au VIIe siècle  à l'abbaye de Saint-Victor de Marseille, puis au XIe siècle aux vicomtes de Marseille. Du XIIe siècle au XVIIe siècle de fief de la grande seigneurie des Sabran-Pontevès puis passa aux Villeneuve, passa à la famille de Charrin jusqu'en 1977.  Souvenir de Christophe de Villeneuve de Bargemon  né en 1771 au château fut conseillé d'état décéda en 1825 sa descendance  Alban de Bargemon  homme politique  1784-1850. Le château fut racheté aux enchères par les Pontevés qui le laissent en ruines.   Dans la commune le château du Reclos et de Favas et le domaine Saint-Vincent acquis par David Beckham.","architecture":"Bargemon; Village fortifié au Xe siècle vestiges d'enceintes  Maison seigneuriale  du XIIe siècle avec tour sarrasine remanié XVIe siècle au   XVIe siècle, le château  est incorporé dans le village jouant un rôle de remparts, La Tour du Clos( possible Reclos) constitués de deux tours accolées, avec la porte de la prison non loin des vestiges du château construit en 920-950.","habitants":"Famille de Sabran-Pontevès\r\n        \"","divers":"Château de Bargemon et domaine de Saint-Vincent","gps":"","images":["../image/image_83/83_Bargemon_1.jpg","../image/image_83/83_Bargemon_2.jpg","../image/image_83/83_Bargemon_3.jpg","../image/image_83/83_Bargemon_4.jpg","../image/image_83/83_Bargemon_5.jpg","../image/image_83/83_Bargemon_6.jpg"]},"Consult_chateau_formulaire6069":{"id":"Consult_chateau_formulaire6069","dept":"83","canton":"Barjols","commune":"Barjols","nom":"Barjols_Ponteves","type":"Vestiges","periode":"XI","histoire":"BARJOLS; Au Moyen-Age Barjols occupé par les Ligures et les Romains, au XIe siècle le bourg dépendait du castrum de Pontevès puissante famille seigneuriale de Provence. Cette famille possède une résidence à Barjols. Lors de la grande peste en 1348 et les troubles,  la population déserte le village et en 1433 les Pontevès réintègrent leur demeure et le village se repeuple . Au XIVe siècle le château devient résidence des comtes de Provence, au XVe siècle les Pontevès vende le château et vont s'installer à Barjols avant de le réintégrer au début du XVIe siècle ou ils firent une nouvelle demeure en 1532. Jacques Deuze prêvot de Barjols  devient pape sous le nom de  Jean XXII en 1322 le roi de Sicile  comte de Provence  fit de Barjols chef lieu  de bailliage jusqu'au XVIe siècle, comme les autres villes subit les ravages de la peste et des guerres de religion. Dans la commune château de St-Estève domaine viticole par Jacques Kester.","architecture":"Barjols : Château construit au XIe siècle, remanié en 1650 puis à l'abandon et en 1862 en ruines, vestiges du château en ville et de remparts et portes défensives quatre sur les seize subsistent du XVIe siècle.","habitants":"Famille des Pontevès\r\n        \"","divers":"Vestiges de la ville fortifié de barjols et porte de l'hôtel.","gps":"","images":["../image/image_83/83_Barjols_Ponteves_1.jpg","../image/image_83/83_Barjols_Ponteves_2.jpg","../image/image_83/83_Barjols_Ponteves_3.jpg","../image/image_83/83_Barjols_Ponteves_4.jpg","../image/image_83/83_Barjols_Ponteves_5.jpg","../image/image_83/83_Barjols_Ponteves_6.jpg","../image/image_83/83_Barjols_Ponteves_7.jpg"]},"Consult_chateau_formulaire8454":{"id":"Consult_chateau_formulaire8454","dept":"83","canton":"Aups","commune":"Baudinard-sur-Verdon","nom":"Baudinard_Verdon","type":"Vestiges","periode":"XV","histoire":"BAUDINARD sur Verdon;  En 1389  Elzéar  de Sabran baron d'Ansouis devient seigneur par alliance avec Beaucette dame de Baudinard du XVe siècle de la famille de Sabran qui garderont la seigneurie jusqu'à la Révolution, puis passa dans diverses mains en 1980 le conservatoire du Littoral est intervenu pour éviter les constructions individuelles dans le parc.                                    Dame de Baudinard; ancienne chapelle du prieuré de Valmogne transformé en ferme.","architecture":"Baudinard; Subsistent base d' un important donjon rectangulaire du XIVe siècle avec deux nefs romanes en arcs brisés.","habitants":"Famille de Sabran  Beaudinard\r\n        \"","divers":"Vestiges du château de baudinard et maison des templiers","gps":"","images":["../image/image_83/83_Baudinard_Verdon_1.jpg","../image/image_83/83_Baudinard_Verdon_2.jpg","../image/image_83/83_Baudinard_Verdon_3.jpg","../image/image_83/83_Baudinard_Verdon_4.jpg","../image/image_83/83_Baudinard_Verdon_5.jpg","../image/image_83/83_Baudinard_Verdon_6.jpg"]},"Consult_chateau_formulaire0b09":{"id":"Consult_chateau_formulaire0b09","dept":"83","canton":"Aups","commune":"Bauduen","nom":"Bauduen","type":"Vestiges","periode":"XVI","histoire":"BAUDUEN: Au Xe siècle Baldini  Castri est cité, de l'abbaye de saint  Victor de Marseille . En 1549 les habitants s'insurgèrent contre leur seigneur  et réduisèrent le village en cendres. En 1720 Jacques de Granier seigneur des Baux fut assassiné par François Brouillony seigneur de saint-Barthélémy, suite à un long procès le parlement de Provence condamne le coupable,  tous ses biens furent confisqués en faveur de Marguerite de Pontevès  veuve de la victime. Fut la propriété du marquis de Piozin .","architecture":"Bauduen; Cité médiéval  vestiges d'une tour, remparts, porte et ancien château  du XVIe siècle utilisé par la maison de la commune grande bâtisse dans le village et reste de portes.","habitants":"Marquis de Piozin\r\n        \"","divers":"Vestiges de la ville fortifiée, reste de portes.","gps":"","images":["../image/image_83/83_Bauduen_1.jpg","../image/image_83/83_Bauduen_2.jpg","../image/image_83/83_Bauduen_3.jpg","../image/image_83/83_Bauduen_4.jpg","../image/image_83/83_Bauduen_5.jpg"]},"Consult_chateau_formulaire0386":{"id":"Consult_chateau_formulaire0386","dept":"83","canton":"Beausset","commune":"St-Cyr-sur-Mer","nom":"Baumelles_St_Cyr","type":"Manoir","periode":"XIV","histoire":"BAUMELLES;  Au XIIIe siècle propriété de l'abbaye de la Cadière dépendant  de l'abbaye  Saint-Victor de Marseille, le château du XIVe siècle érigé en arrière fief à Vincent Lombard en 1617.         En 1825 il appartenait au chevalier d'Arquier; aujourd'hui appartient au docteur Jean-H.  Grand.                                                               Dans la commune Donjon de la Renette trés remanié dans une maison .                                                                                           A la Mure haute tour carrée faisait partie d'un château avec meurtrières et bâtiment attenant.                                                 A Narlette, maison forte du XV-XVIe siècle logis carré flanqué de deux tours rondes a fort empattements.                                       \r\n  A Pontié donjon inclus dans les habitations porte cintré escalier à vis médiéval et château de Pradeaux (voir article) et château de la Frégate.","architecture":"Baumelles; Se présente comme une grosse bâtisse provençale du XVIIe siècle est cernée d'une enceinte,  grande courtine quadrangulaire flanquée de cinq tourelles aux angles qui furent arasées à la Révolution est relevées au XXe siècle, dans la cour corps de logis d'une maison forte du XV-XVIe siècle très remanié.","habitants":"Famille de Vincent Lombard\r\n        \"","divers":"Manoir de Baumelles avec ces tourelles.","gps":"","images":["../image/image_83/83_Baumelles_St_Cyr_1.jpg","../image/image_83/83_Baumelles_St_Cyr_2.jpg","../image/image_83/83_Baumelles_St_Cyr_3.jpg"]},"Consult_chateau_formulaire3c31":{"id":"Consult_chateau_formulaire3c31","dept":"83","canton":"Fayence","commune":"Mons","nom":"Beauregard_Mons","type":"Château","periode":"XVI","histoire":"BEAUREGARD: Lorsque Roseline décéda en 1329, dans son château des Arcs, son frère Hélion de Villeneuve, se fit  grand maître de l'ordre de Malte et lointain ancêtre des Villeneuve de Beauregard.  Antoine  de Villeneuve  marquis de Trans et Jean II  de Villeneuve son fils seigneur et baron des Tourettes marquis de Trans fit construire le château au environ de 1550, Charles fils de Jean II de Villeneuve  seigneur de la Napoule et baron des Tourettes, passa le cap de la Révolution  sans trop de dommage étant donné l'affection que la population portait à son propriétaire, seulement le découronnement des tours qui furent reconstruites en 1800 par J-B de Villeneuve de Beauregard. Aujourd'hui par le comte J.de Clarens.","architecture":"Beauregard; Du XVIe siècle, de renaissance provençale grosse bâtisse toiture à quatre pans de plan carré à deux étages, cantonné de quatre tours rondes coiffées de poivrières, découronnées à la Révolution et remanié en 1800; jardin à la française  de buis taillés dessinant une croix de Malte en souvenir d'Hélion de Villeneuve  frère de sainte Roseline, et qui fut grand maître de l'ordre de Malte au XIVe siècle.","habitants":"Famille des Villeneuve de Beauregard \r\n        \"","divers":"Château de beauregard à Mons","gps":"","images":["../image/image_83/83_Beauregard_Mons_1.jpg","../image/image_83/83_Beauregard_Mons_2.jpg","../image/image_83/83_Beauregard_Mons_3.jpg"]},"Consult_chateau_formulaire9373":{"id":"Consult_chateau_formulaire9373","dept":"83","canton":"Beausset","commune":"Beausset","nom":"Beausset","type":"Vestiges","periode":"XI","histoire":"BEAUSSET;  Au XIe siècle dépendait des seigneurs évêques de Marseille, vestiges de l'ancien château fort du XIe siècle détruit au XVIIe siècle sur ordre de Richelieu, dans le village du Beausset pans de fortifications, gentilhommière dit \"château\" du XVIIIe siècle relevé de la famille Segond grand propriétaire terrien, passe en héritage à la comtesse Marie Joseph Seran de la Tour puis aux Villeneuve Bargemon. Cette propriété  fut acheté par Martin-Antoine Colonna à la fin du XIXe siècle pour être ensuite vendu par son épouse à Paul Vincent qui la cède à la commune, la transforme en école communale, puis refuge pour les blessés pendant la guerrre et pensionnat de jeunes filles en 1947 et en 1955 aux activités de la paroisse, aujourd'hui association méditerranéenne    \" Large-Horizon\".                                                Le château de Saint-Anne  propriété familiale ou plusieurs générations qui donna de nombreux officiers de marine.","architecture":"Beausset; le château fut détruit en 1615 sur ordre de Richelieu, reste de pans de fortifications.                                                                Gentilhommière du XVIIe siècle des Séran.","habitants":"Seigneurs évêques de Marseille\r\n        \"","divers":"","gps":"","images":["../image/image_83/83_Beausset_1.jpg","../image/image_83/83_Beausset_2.jpg","../image/image_83/83_Beausset_3.jpg","../image/image_83/83_Beausset_4.jpg","../image/image_83/83_Beausset_5.jpg","../image/image_83/83_Beausset_6.jpg","../image/image_83/83_Beausset_7.jpg"]},"Consult_chateau_formulaire247b":{"id":"Consult_chateau_formulaire247b","dept":"83","canton":"Brignoles","commune":"Besse-sur-Issole","nom":"Besse_Issole","type":"Vestiges","periode":"XVIII","histoire":"BESSE sur Issole; En 1045 le village de Besse devient indépendant au cours du XIIe siècle, en 1246 le castrum de Besse appartient à une collégiale de Pignans, une à l'église Saint  Pierre et en 1380 fait partie du diocèse d'Aix. Mis à par la porte de la ville , il ne reste pas de vestiges antérieurs au XVIe siècle. Un château a été reconstruit  au début  du XVIIIe siècle (1702) date à laquelle la marine de Toulon prend le titre de seigneur de Besse et d'autres châteaux dans la commune, le Pairassol; la Croix de Bontar à l'est du château de Blanquafort.","architecture":"Besse sur Issole; château du XVIIIe siècle façade percée de larges baies, reste d'un donjon et courtines du XIIIe siècle.","habitants":"collégiale de Pignans\r\n        \"","divers":"Château de besse et vestiges de portes tour et beffroi.","gps":"","images":["../image/image_83/83_Besse_Issole_1.jpg","../image/image_83/83_Besse_Issole_2.jpg","../image/image_83/83_Besse_Issole_3.jpg","../image/image_83/83_Besse_Issole_4.jpg","../image/image_83/83_Besse_Issole_5.jpg","../image/image_83/83_Besse_Issole_6.jpg"]},"Consult_chateau_formulaire7d47":{"id":"Consult_chateau_formulaire7d47","dept":"83","canton":"Rians","commune":"Artigues","nom":"Blacas_Artigues","type":"Vestiges","periode":"XVI","histoire":"BLACAS:  En 994 Geoffroy de Blacas seigneur d'Artigues épouse Scocie. Sa seigneurie passe en comté en 1233 par le comte de Provence qui passera ensuite dans les mains  de la reine Jeanne. Louis Ier d'Anjou et Charles Duras se disputèrent le fief.                    Au XVIIIe siècle ce  comté fut partagé en co-seigneurie entre les Artigues et les Valbelle. Pierre-Louis-Jean-Casimir de Blacas nommé par Louis XVIII maréchal de camp en 1814 ministre de la maison du roi,  Pair de France puis ambassadeur  à Naples et en  1828 membre de l'académie.","architecture":"Blacas; le château du XVIe siècle fut construit sur l'emplacement de l'ancien du XIIIe siècle; construit par Jean Baptiste de Gautier de la Molle avocat au parlement d'Aix. Dans la commune deux tours gallo-romaine d'un diamètre de 5 à 6 mètres.","habitants":"Famille Geoffroy de Blacas                                                        \r\nJean Baptiste de Gautier de la Molle\r\n        \"","divers":"Château des Blacas","gps":"","images":["../image/image_83/83_Blacas_Artigues_1.jpg","../image/image_83/83_Blacas_Artigues_2.jpg","../image/image_83/83_Blacas_Artigues_3.jpg","../image/image_83/83_Blacas_Artigues_4.jpg","../image/image_83/83_Blacas_Artigues_5.jpg","../image/image_83/83_Blacas_Artigues_6.jpg"]},"Consult_chateau_formulaireff03":{"id":"Consult_chateau_formulaireff03","dept":"83","canton":"Collobrières","commune":"Bormes-les-Mimosas","nom":"Bormes_Mimosas","type":"Vestiges","periode":"XIII","histoire":"BORMES les Mimosas; Site Gaulois \"Bormani\", au IXe siècle  les habitants émigrent sur les hauteurs pour échapper aux attaques des Sarrasins pour lequel ils construisirent un château en 1056 Borma par des Celtes, fief des comtes de Provence et en 1482 décimés par la peste et délivrés du fléau par Saint-François de Paul, moine calabrais débarqué au Lavandou.  Le château  dominant le village construit entre le XIIIe et le XIVe siècle  des seigneurs de Fos, même famille que les vicomtes de Marseille, passa successivement aux de Grasse,  aux Covet de Borgnes, puis aux Lenfant qui firent érigé la seigneurie en baronnie est le témoignage  du passage du règne des comtes de Provence.                      A la fin du XVIe siècle le comte de Carcés fit assassiner le seigneur de Bormes. Aujourd'hui les ruines appartiennent à Lady Cochrane de Cults.  Dans la commune.où se trouve le château du Cap-Benat qui faisait partie de la baronnie qui appartenait à Simon Camille au XIIe.                                                                                   Le  château du Cap-Bénat fut la propriété de la famille de Retz, le dernier propriétaire de ce vaste domaine \"domaine de Benat\"  en 1850 fut marié à Louise de Retz-Bressolles, qui cette dernière vendit une partie ( 250 hectares) à Georges Marie Haardt se réservant le château, mais les acquéreurs se construisirent un petit château qui sera inachevé à la vente aux enchères en 1937 la partie sud est acquise par la société artistique du Cap Benat, la partie nord acquise par la société des plages du Benat. La société du domaine du Gaou Benat acquit le domaine habité par Vincent Auriol puis l'explorateur cinéaste Marcel Ichac.                              Le fort de Brégançon( voir article) et château de Malherbe.","architecture":"Bormes les Mimosas; château des seigneurs de Fos construit au sommet du village entre le XIII  et le XIVe siècle, vestiges du corps de logis seigneurial  et de la courtine polygonale et remparts du XIIe siècle. Le château de Cap Bénat à la pointe et le château de Retz du XVIIe siècle flanqué de tours.","habitants":"Seigneurs de Fos\r\n        \"","divers":"Vestiges du château à Bormes  et château de Benat au cap Benat","gps":"","images":["../image/image_83/83_Bormes_Mimosas_1.jpg","../image/image_83/83_Bormes_Mimosas_2.jpg","../image/image_83/83_Bormes_Mimosas_3.jpg","../image/image_83/83_Bormes_Mimosas_4.jpg","../image/image_83/83_Bormes_Mimosas_5.jpg","../image/image_83/83_Bormes_Mimosas_6.jpg","../image/image_83/83_Bormes_Mimosas_7.jpg","../image/image_83/83_Bormes_Mimosas_8.jpg"]},"Consult_chateau_formulaire2f31":{"id":"Consult_chateau_formulaire2f31","dept":"83","canton":"Le Luc","commune":"Cannet-des-Maures","nom":"Bouillidou_Cannet","type":"Château","periode":"XIII  XIX","histoire":"BOUILLIDOU; Cannet des Maures; possède au sommet du village une place du vieux château des Glandevès; l'historique du Cannet des Maures est lié au château de Bouillidou, au IXe siècle, les sarrazins occupent et pillent la région,  du castrum de caneto au IXe siècle. En 1442 la seigneurie érigée en commune toujours avec plusieurs co-seigneurs qui se partagèrent le fief, en 1754 Françoise-Elisabeth-Maxime de Rascas épouse Michel Colbert de Turgis qui habite le château de Bouillidou, les Colbert sont les derniers seigneurs \"domaine de Colbert\" c'est depuis le XIIIe siècle que le seigneur du Cannet occupe un important domaine vinicole en 1740, le roi Louis XIV érige les terres en marquisat.  Le jeune général Bonaparte s'arrêta au château de Bouillidou la première fois lors de son ralliement à l'armée italienne et la deuxième fois  Napoléon s'y arrêta en 1814  pour son départ à l'île d'Elbe pour y rendre visite à sa soeur Pauline  princesse Borghèse qui y résidait .                               Le marquis Colbert-Cannet de retour d'immigration acheta le château aux héritiers de Charles député ami de la princesse Pauline, le remaniera, le château se trouve toujours dans la descendance.                                                                                  Dans la commune  le château de Roux aujourd'hui viticole, le château de la Reillanne et du Riotor et du château Rougiers qui possède la porte Henry III viticole également.","architecture":"Bouillidou: Château quadrangulaire à trois niveaux flanquais en façade aux extrémités de tours carrées.","habitants":"marquis Colbert-Cannet\r\n        \r\n        \"","divers":"Château de Bouillidou, de Rougiers, de Riotor et de Roux.","gps":"","images":["../image/image_83/83_Bouillidou_Cannet_1.jpg","../image/image_83/83_Bouillidou_Cannet_2.jpg","../image/image_83/83_Bouillidou_Cannet_3.jpg","../image/image_83/83_Bouillidou_Cannet_4.jpg","../image/image_83/83_Bouillidou_Cannet_5.jpg","../image/image_83/83_Bouillidou_Cannet_6.jpg"]},"Consult_chateau_formulaire9d30":{"id":"Consult_chateau_formulaire9d30","dept":"83","canton":"Barjols","commune":"Bras","nom":"Bras","type":"Vestiges","periode":"XI","histoire":"BRAS; Un Pons de Bras construisit sur la colline Saint-Pierre au XIe siècle, en 1294 des fortifications, propriété des Templiers qui passa ensuite au Hospitalliers en 1338 et aux religieuses qui possédaient des droits sur Bras décidèrent de vendre; et  en 1502 Louise de Prottane  fait retour dans ces lieux où elle a été élevé de voir les ruines  du château de son enfance  fut construit  avec les pierres du castrum de nouvelles habitations.","architecture":"Bras; du château féodal il ne reste que quelques pans de murs","habitants":"Madame Louise de Prottane\r\n        \"","divers":"Vestiges et pigeonnier.","gps":"","images":["../image/image_83/83_Bras_1.jpg","../image/image_83/83_Bras_2.jpg","../image/image_83/83_Bras_3.jpg"]},"Consult_chateau_formulairee3e3":{"id":"Consult_chateau_formulairee3e3","dept":"83","canton":"Collobrières","commune":"Bormes-les-Mimosas","nom":"Bregancon_Bormes","type":"Château","periode":"XVI","histoire":"BREGANCON; A la séparation du fief par la couronne de France en 1786 Pierre Rouard seigneur  de l'ancienne dépendance du marquisat de Brégançon, achète le domaine et fait construire la bâtisse, vendu a une famille d'armateurs marseillais, le château passe par alliance à Hermann Sabran président du conseil des hospices de Lyon, son neveu Françis Sabran hérite, ce dernier les  revendra par lot, la parcelle du château racheté par la famille Ducale du Luxembourg depuis sept générations, les Tézenas possèdent ce domaine viticole.","architecture":"Brégançon; Corps de logis carré à trois niveaux flanqués de quatre  tours rondes à toits plats rajouté en 1840, les communs entourent une vaste cour.","habitants":"Famille de Sabran\r\n        \"","divers":"Château de Brégançon.","gps":"","images":["../image/image_83/83_Bregancon_Bormes_1.jpg","../image/image_83/83_Bregancon_Bormes_2.jpg"]},"Consult_chateau_formulairef19c":{"id":"Consult_chateau_formulairef19c","dept":"83","canton":"Collobrières","commune":"Bormes-les-Mimosas","nom":"Bregancon_Fort","type":"Fort","periode":"XI","histoire":"BREGANCON: Une forteresse existe sur l'îlot de Brégançon depuis l'installation des Ligures en Provence (118 ans avant J.C). Ce fort est cité dès le XIe siècle \"Castrum Bragansone\" était la propriété des seigneurs de Marseille, comte de Provence, port d'escale pour le trafic méditerranéen antique, En 1257 cédé aux Génois sous contrôle des rois de France, En 1347 la forteresse accueille la reine Jeanne, occupé par Charles Quint disputé entre  le pouvoir royal et la ligue en 1539 sous contrôle du comte de Carcés, aliéné sous Louis XIII,  fortifié au XVIe siècle. Au XVIIe siècle cette forteresse devient indépendante de celle de la seigneurie et le fort est laissé à l'abandon jusqu'à la Révolution.       En 1793 Bonaparte oeuvre a sa réfection et le réarme occupé par une garnison jusqu'en 1918. Et à partir de 1924 le fort est restauré. En 1964  le Général de Gaulle y séjourna pour présidé l'anniversaire du débarquement allié en Provence et fut le 5 Janvier 1968 affecté définitivement au ministère des affaires  culturelles et résidence officielle pour chef de l'Etat.                                               Dans la commune voisine le Lavandou sur le Cap-Nègre se trouve la maison forte des \"Bruni-Tedeschi\" beau-parents de Nicolas Sarkosy qui possède  depuis 1970, cette maison forte construite en 1930 par l'architecte Maurice Chatelan pour les Faraghi, au port de Traouquet .","architecture":"Brégançon; fort du XIe siècle sur un piton rocheux à trente cinq mètres d'altitude, pour surveiller la rade de Hyères et de Toulon architecture militaire, défendu par une enceinte basse, témoin architectural de la présence de la famille d'Anjou en Provence remanié et fortifié au XVIe siècle, laissé à l'abandon deux siècles remanié est réarmé en 1793 restauré en 1924, des parties anciennes remontent au XVIe siècle, double enceinte crénelée avec chemin de ronde et pont levis flanqué de deux tours.              Maison forte des Bruni.","habitants":"Seigneurs de Marseille Bonaparte et le Général de Gaulle\r\n        \"","divers":"Fort de Bregançon et maison forte de la famille Bruni-Tedeschi.","gps":"","images":["../image/image_83/83_Bregancon_Fort_1.jpg","../image/image_83/83_Bregancon_Fort_2.jpg","../image/image_83/83_Bregancon_Fort_3.jpg","../image/image_83/83_Bregancon_Fort_4.jpg","../image/image_83/83_Bregancon_Fort_5.jpg"]},"Consult_chateau_formulaire3cbf":{"id":"Consult_chateau_formulaire3cbf","dept":"83","canton":"Brignoles","commune":"Brignoles","nom":"Brignoles","type":"Château","periode":"XIII","histoire":"BRIGNOLES; fief des comtes de Provence depuis le XIIe siècle, ils y firent leur résidence d'été, firent construire un palais à côté de l'emplacement de l'église paroissiale actuelle qui servit  de cadre aux assemblées du parlement de Provence lors du rattachement de la Provence à la France, palais comprenant le château tour carrée percée porte plein cintre. Brignoles  verra la naissance de Saint-Louis d'Anjou 1274-1297, fils de Charles II  et de Marie de Hongrie neveu de Louis IX en 1481 et accueillit par la suite de nombreux hôtes illustres : François Ier, Charles IX, Louis XIV accompagné d'Anne d'Autriche et du Cardinal de Mazarin. En 1539, la ville fut mise à sac par Charles Quint et envahie  par les guerres de religion 1563 Huguenots 1589 catholiques. Aujourd'hui abrite le musée du pays Brignolais qui renferme diverses collections.  Dans la commune château  de la Présidente construit sur les vestiges d'une importante villa gallo-Romaine par Jean de Bellon de Sainte-Marguerite gentilhomme de la Chambre du roi Louis XIII, puis embelli au XVIIIe siècle par Lazare du Chaine neveu de l'évêque de Senez et président du parlement d'Aix, habité aujourd'hui par la même famille depuis cinq générations.                                             Château de la Margillière du XVIIe siècle, le château d'Annibals viticole et le Tivoli  hôtel.","architecture":"Brignoles; sur  une butte au bord du Caramy, château urbain du XIIIe siècle sur l'emplacement de l'ancienne forteresse du Xe siècle qui occupe le sommet de la vieille ville, système défensif  de la cité intégré dans les remparts médiévaux. Palais des comtes de Provence du XV-XVIe siècle comprenant le château du XIIe siècle avec tour carrée à porte percée plein cintre.","habitants":"Comte de Provence Saint-Louis d'Anjou\r\n        \"","divers":"Château et vestiges dans Brignoles, château dit la presidente, le Fontlade et Margilière.","gps":"","images":["../image/image_83/83_Brignoles_1.jpg","../image/image_83/83_Brignoles_2.jpg","../image/image_83/83_Brignoles_3.jpg","../image/image_83/83_Brignoles_4.jpg","../image/image_83/83_Brignoles_5.jpg","../image/image_83/83_Brignoles_6.jpg","../image/image_83/83_Brignoles_7.jpg","../image/image_83/83_Brignoles_8.jpg","../image/image_83/83_Brignoles_9.jpg"]},"Consult_chateau_formulaire5cc0":{"id":"Consult_chateau_formulaire5cc0","dept":"83","canton":"Barjols","commune":"Brue-Auriac","nom":"Brue_Auriac","type":"Vestiges","periode":"XVIII","histoire":"BRUE-AURIAC; cité en 1032 les terres furent cédés à l'abbaye de Saint-Victor de Marseille et aux Templiers mais les seigneurs  de Brue et  d'Auriac  se disputèrent pendant des siècles les terres. En 1730 George Roux achète les terres de Brue et fonde le village actuel, un château fut construit par lui même et son fils Barras qui ce dernier se fit élever au titre de marquis émigra à la Révolution,  mais avant fit raser son château.","architecture":"Brue  Auriac; vestiges du château et reste d'une tour ronde transformée en pigeonnier.","habitants":"Monsieur Geoge Roux\r\n        \"","divers":"Vestiges de l'ancien château, château réçent et pigeonnier","gps":"","images":["../image/image_83/83_Brue_Auriac_1.jpg","../image/image_83/83_Brue_Auriac_2.jpg","../image/image_83/83_Brue_Auriac_3.jpg","../image/image_83/83_Brue_Auriac_4.jpg","../image/image_83/83_Brue_Auriac_5.jpg","../image/image_83/83_Brue_Auriac_6.jpg"]},"Consult_chateau_formulaireaff6":{"id":"Consult_chateau_formulaireaff6","dept":"83","canton":"Beausset","commune":"La Cadière-d`Azur","nom":"Cadiere_Azur","type":"Vestiges","periode":"XI","histoire":"CADIERE d'Azur: A l'origine lié a Saint-Cyr, à Bandols et au Lecques puis séparé en 1745. Ces  villes  dépendaient  des vicomtes de Marseille, puis  en co-seigneurs avec les comtes des Baux et  de l'Abbaye de Saint-Victor de Marseille.  En 1365 Hugues  comte des Baux cède à l'Abbaye de St Victor, en 1788 à la mort de l'abbé dernier seigneur,  jusqu'à la Révolution la ville est géré par un conseil. Charles IX y passa la nuit du 4 au 5 Novembre  lors de son tour de France royal en 1564 et en   1566 accompagné du duc d'Anjou, Catherine de Médicis, d'Henry de Navarre et les cardinaux de Bourbon et de Lorraine.                                          Plusieurs châteaux dans la commune dont celui de Verrières de Pibarnon à Bandol du comte de Saint-Victor,  château de la Vannières d'André Lombard seigneur du  Castellet au XVIe siècle en 1957 le grand père d'Eric Boisseaux Lucien Baudot acquis le château et le château de Salettes.","architecture":"Cadière d'Azur; sur un piton rocheux a gardé son aspect féodal avec un castrum du XIe siècle remanié en une bâtisse qui abrite aujourd'hui l'hôtel de ville. Vestiges des remparts du XIVe siècle  la porte Saint-Jean, et "nom":"Chateaudouble_Garde","type":"Vestiges","periode":"XI","histoire":"CHATEAUDOUBLE; Au nord de Draguignan au bord de la falaise, village médiéval du XIe siècle avec deux châteaux qui explique le nom Châteaudouble  \"château du Diable\" et celui des Templiers tour de garde sarrasines du XIe siècle.                              \r\nChâteau de la GARDE comme châteaudouble appartenait à la même seigneurie en 1304 propriété des comtes de Provence, Charles II d'Anjou en 1348 la reine Jeanne l'inféode à Raymond de Cotignac, le château passa  à Charles Arnaud de Villeneuve, cette famille gardera ce château jusqu'au XVe siècle à cette époque  il est déclaré inhabitable. Au XVIe siècle Figanières est aux mains de la famille  de Puget et en 1543 Marguerite de Puget l'apporte en dote à son mari Philibert de Vintimille, en 1660 suite à des troubles Gaspard de Vintimille fait prisonnier et eu la tête tranchée.       Dans la commune château de Lagarde ( privé-du commandant de Vaisseau César de Ramardis demeure du XVIIIe siècle viticole) et de  Reboullon du XVIe siècle.","architecture":"Chateaudouble: sur une plate forme a 540 m d'altitude sur les gorges de la Nartuby au-dessus du village les vestiges du donjon de l'ancien château et de l'autre côté de la route de Figanières se dressent les vestiges du château de la Garde du XVIe siècle.                             Le château de Figanières fut construit au XIIe siècle et détruit au XVIe siècle actuellement en ruines, le village fut construit autour et la commune a aménagée le parc en jardin botanique.","habitants":"Famille Philibert de Vintimille\r\n        \"","divers":"Vestiges du château.","gps":"","images":["../image/image_83/83_Chateaudouble_Garde_1.jpg","../image/image_83/83_Chateaudouble_Garde_2.jpg","../image/image_83/83_Chateaudouble_Garde_3.jpg","../image/image_83/83_Chateaudouble_Garde_4.jpg","../image/image_83/83_Chateaudouble_Garde_5.jpg","../image/image_83/83_Chateaudouble_Garde_6.jpg","../image/image_83/83_Chateaudouble_Garde_7.jpg"]},"Consult_chateau_formulaire2974":{"id":"Consult_chateau_formulaire2974","dept":"83","canton":"Barjols","commune":"Châteauvert","nom":"Chateauvert","type":"Château","periode":"XIII","histoire":"CHATEAUVERT;   Lieu attesté par les vestiges d'une villa romaine à l'est de la commune ainsi qu'une importante découverte nécropole médiévale.  Au XIe siècle le village est constitué autour d'un château aujourd'hui en ruines, au XIIIe siècle Châteauvert était administré par diverses familles, le seigneur Bertrand de Châteauvert , les Villenevois et les Flayosc a qui Charles d'Anjou racheta des droits, puis les cèdent à l'évêque de Marseille. La seigneurie de Châteauvert contre la juridiction de la ville de Marseille.  Au XVIIIe siècle le lieu inhabité suite à la peste noire qui ravagea la région, les rescapés s'installèrent dans des bastides aux environs encore au XIXe siècle la population est à l'extérieur, seul la mairie représente le village.  Dans le voisinage le château Margui repris en 2000 par Marie Christine Guillanton.","architecture":"Châteauvert; Vestiges du château  avec tour fortifiée et château du XIX e siècle.","habitants":"Seigneur Bertrand de Châteauvert\r\n        \"","divers":"Vestiges et château à Châteauvert.","gps":"","images":["../image/image_83/83_Chateauvert_1.jpg","../image/image_83/83_Chateauvert_2.jpg","../image/image_83/83_Chateauvert_3.jpg","../image/image_83/83_Chateauvert_4.jpg","../image/image_83/83_Chateauvert_5.jpg","../image/image_83/83_Chateauvert_6.jpg","../image/image_83/83_Chateauvert_7.jpg"]},"Consult_chateau_formulairee73e":{"id":"Consult_chateau_formulairee73e","dept":"83","canton":"Comps-sur-Artuby","commune":"Châteauvieux","nom":"Chateauvieux_Var","type":"Château","periode":"XVIII","histoire":"CHATEAUVIEUX; Au Xe siècle une abbaye de femmes sur la commune à Saint-Pierre en Demeyes relevé de l'ordre de Citeaux existé encore aux XIVe siècle a pour abbesse Huguette de Villeneuve  et Béatrice de Castellene avant d'être détruite par Raymond de Turenne. Fief des Castellane-Châteauvieux géré par des  co-seigneurs les  Raphaelis les Demandolx de la Palud les Bresc et les Arbaud. En 1575 le château fut rasé par les ligueurs du baron de Vins.                                                                       Dans la commune ( voir si correspond au lieu) de nombreux châteaux viticoles et autres, le château des Quatre-Tours, le château de Beaudron, le château de Méoulx et la bastide de Gourdon.","architecture":"Châteauvieux; petit château du XVIIIe siècle.","habitants":"Seigneurs  Raphaelis                                                                                les Demandolx de la palud \r\n        \"","divers":"Vestiges sur motte féodal.","gps":"","images":["../image/image_83/83_Chateauvieux_Var_1.jpg"]},"Consult_chateau_formulairee3ec":{"id":"Consult_chateau_formulairee3ec","dept":"83","canton":"Grimaud","commune":"Cogolin","nom":"Cogolin","type":"Vestiges","periode":"XI","histoire":"COGOLIN; en 1000 Cucullinus, en 1100 Cugulino et au XIII Coglino, fief des moines de Saint-Victor fut soumis aux razias sarrasines et en  972 Guillaume Ier comte de Provence repoussa les sarrasins, puis passa sous le contrôle des moines de Saint-Victor et des Templiers. Au XVe siècle devient communauté autonome, au XIVe siècle invasion des troupes de Raymond de Turenne fin du XVIe siècle les troupes du comte de Carcés se replièrent dans le château.                                                         Château de Saint-Maur domaine viticole  vestiges de l'occupation  romaine abrite aujourd'hui un superbe ensemble du XVIIIe siècle avec une tour carrée entouré de quatre cadrans surmontés d'un carillon.                                                                                            Au sud de Cogolin le château de Trémouriés. Château des Garcinières construit par les Féraporte à la fin du XVIIIe siècle ,viticole de la famille Valentin.","architecture":"Cogolin; château détruit au XVIe siècle, la tour de l'horloge est le seul vestige de l'ancienne fortification.","habitants":"Famille de  Guillaume Ier comte de Provence\r\n        \"","divers":"Tour ancienne fortification et château de St-Maur.","gps":"","images":["../image/image_83/83_Cogolin_1.jpg","../image/image_83/83_Cogolin_2.jpg","../image/image_83/83_Cogolin_3.jpg","../image/image_83/83_Cogolin_4.jpg","../image/image_83/83_Cogolin_5.jpg","../image/image_83/83_Cogolin_6.jpg"]},"Consult_chateau_formulaire1c4e":{"id":"Consult_chateau_formulaire1c4e","dept":"83","canton":"Fayence","commune":"Montauroux","nom":"Colle_Noir","type":"Château","periode":"XV","histoire":"COLLE-NOIR; appelé aussi la \"colle-Narbonne\" propriété d'un abbé de Cluny Saint-Mayeul. La vieille bastide au XVe siècle propriété de la famille Rostagno. Cette bâtisse fut acquise est reconstruite  par  Henri Emmanuel Poulle 1792-1877 député du Var et premier président de la cour d'Aix en Provence, issu de la famille de Montauroux prend le nom de la Colle-Noir par la culture de la vigne et du jasmin à la rose parfumée.    Par alliance passe à maître Félix Reibaud maître des postes  passe à son fils Paul Félix Reibaud chef du bureau du ministère de la justice à Paris vend en 1894 à Pierre Gosselin.   Mémoires aux jeunes du village de Montauroux fusillés dans le parc du château par vengeance des allemands lors  du  débarquement des alliés. En 1950 Christian Dior achète le château  il y décédera en 1957 sa soeur héritière épousera monsieur  Laroche propriétaire du célèbre hôtel \" réserve de Beaulieu\" racheté en 1976 par les époux Tassou qui le remette en état.   Aujourd'hui lieu de réception, villégiature et  mariage.","architecture":"Château Dior ; belle maison bourgeoise Colle-Noir; imposant édifice comportant plusieurs bâtiment très anciens , reste d'une chapelle du XIe siècle un bâtiment flanqué d'une tour carrée du XIVe siècle relais de poste  transformé en auberge au XVIe siècle.","habitants":"Monsieur Henri Emmanuel Poulle\r\n        \"","divers":"Château de la Colle-Noir","gps":"","images":["../image/image_83/83_Colle_Noir_1.jpg","../image/image_83/83_Colle_Noir_2.jpg","../image/image_83/83_Colle_Noir_3.jpg","../image/image_83/83_Colle_Noir_4.jpg"]},"Consult_chateau_formulaire26dd":{"id":"Consult_chateau_formulaire26dd","dept":"83","canton":"Collobrières","commune":"Collobrières","nom":"Collobrieres","type":"Vestiges","periode":"XI","histoire":"COLLOBRIERES; Village existant depuis le Xe siècle lieu ou fut fondé la chartreuse de Verne et l'abbaye Nôtre-Dame des Anges par Pierre Isnard évêque de Toulon et Frédal d'Anduze évêque de Fréjus, qui depuis 1982 le bâtiment accueille à nouveau la famille monastique de l'assomption de la Vierge et de Saint-Bruno.                                    Dans la commune  le château de Farembert viticole par Monsieur Perrat.","architecture":"Collobrières; la chartreuse de Verne toujours en état  et l'abbaye de Nôtre  Dame des Anges en ruines.","habitants":"L'évêque Pierre Isnard \r\n        \"","divers":"Abbaye et vestiges.","gps":"","images":["../image/image_83/83_Collobrieres_1.jpg","../image/image_83/83_Collobrieres_2.jpg","../image/image_83/83_Collobrieres_3.jpg","../image/image_83/83_Collobrieres_4.jpg","../image/image_83/83_Collobrieres_5.jpg","../image/image_83/83_Collobrieres_6.jpg"]},"Consult_chateau_formulaire599f":{"id":"Consult_chateau_formulaire599f","dept":"83","canton":"Comps-sur-Artuby","commune":"Comps-sur-Artuby","nom":"Comps_Taulane","type":"Vestiges","periode":"XVI","histoire":"COMPS sur Artuby; Les templiers possédaient la maison du Ruou, en 1312 chef lieu de la commanderie de Malte.   Au début du XVIe siècle les chevaliers de Saint-Jean de Jérusalem deviennent seul seigneur de Comps en acquérant la part de la seigneurie de la famille d'Arnaud et Bertrand de Comps quatrième et dix septième  grand maître, en 1381 qui avait été inféodée à Fulco  de Pontevès et qui dépendait du comte de Provence.                                    T  quartiers médiévaux en partie détruit, subsiste le fort  Gibron, vaste quadrilatère flanqué d'une tour en cours de restauration.","habitants":"Brad Pitt et Angelina Jolie\r\n        \"","divers":"Vestiges du château de Correns, château de Margui, domaine de Miraval et fort de Gibbon.","gps":"","images":["../image/image_83/83_Correns_1.jpg","../image/image_83/83_Correns_2.jpg","../image/image_83/83_Correns_3.jpg","../image/image_83/83_Correns_4.jpg","../image/image_83/83_Correns_5.jpg","../image/image_83/83_Correns_6.jpg","../image/image_83/83_Correns_7.jpg"]},"Consult_chateau_formulaire6e17":{"id":"Consult_chateau_formulaire6e17","dept":"83","canton":"Cotignac","commune":"Cotignac","nom":"Cotignac","type":"Vestiges","periode":"X","histoire":"COTIGNAC; fief des Castellane en 1033, passa ensuite  aux vicomtes de Provence dont l'un deux Raymond Béranger V l'inféoda à Guillaume de Rezza en 1232, puis passa Pontevès et au Simiane. Cotignac connut des apparitions en 1519 par Jean de la Beaume et Gaspard Ricard. C'est au XIXe siècle que Cotignac doit son importance économique à sa production d'huile d'olive. Les Pontevés jouèrent un rôle important étant comte de Cotignac fortifications de la ville. En 1659 le 21 février Louis XIV et sa mère Anne d'Autriche passèrent pour remercier sa naissance vingt ans plus tôt.","architecture":"Cotignac: Le château de Cotignac fut construit en 734, au XIe siècle, deux tours médiévales dites sarrasines, carrées.                                  Sur la colline vestiges d'un château des Castellane, la maison du prince de condé  construite au XVe siècle, la plus petite servait de tour de guet la plus importante faisait partie du château médiéval, la tour de l'horloge de la même époque, la porte de la Puade seul porte conservée sur les huit que comptait les remparts du XVIe siècle.","habitants":"Comte Raymond Béranger V\r\n        \"","divers":"Vestiges du Château, pressoirs et château de Nartuby.","gps":"","images":["../image/image_83/83_Cotignac_1.jpg","../image/image_83/83_Cotignac_2.jpg","../image/image_83/83_Cotignac_3.jpg","../image/image_83/83_Cotignac_4.jpg","../image/image_83/83_Cotignac_5.jpg","../image/image_83/83_Cotignac_6.jpg","../image/image_83/83_Cotignac_7.jpg","../image/image_83/83_Cotignac_8.jpg"]},"Consult_chateau_formulairec5ef":{"id":"Consult_chateau_formulairec5ef","dept":"83","canton":"Cuers","commune":"Cuers","nom":"Cuers","type":"Vestiges","periode":"X","histoire":"CUERS;  En 993 après avoir combattu et expulsé les Sarrasins, le comte Guillaume II de Marseille reçoit en récompense le fief et y fit construire un château  sur la partie la plus haute, en 1032 Aicard vicomte de Marseille seigneur de Cuers donne les terres aux moines de Saint-Victor de Marseille, en 1265 mariage de Guillaume de Giraud de Glandevès avec Béatrice  de Marseille qui fait passer la seigneurie aux Glandevès. En 1373 un noble Cuersois Jean de Gantès capitaine de la reine Jeanne chasse les Tuschins qui avaient assiégés le château et aussi en 1383 par Charles Duras de Toulon ennemi de la reine Jeanne, la ville sera libéré par les alliés d'Isnard de Glandevès  seigneurs de Cuers qui subira de nombreux déboires  en 1391 la division suite au décès de la soeur de la reine Jeanne, en 1579 guerre de religion, puis la peste au XVIe siècle et les attaques des Autrichiens  en 1707 par le duc de Savoie qui détruisirent tous sur leur passage. En 1790 Cuers devient chef lieu de district pour l'administration des municipalités.                        Dans la commune plusieurs châteaux viticoles.","architecture":"Cuers; château d'origine construit au Xe siècle  et a la fin du XIVe siècle construction  des fortifications avec portes , dont l'une d'elle existe. Le château est les remparts furent détruit pendant les guerres de religion. Aujourd'hui il reste un oppidum avec remparts","habitants":"Comte Guillaume II de Marseille \r\n        \"","divers":"","gps":"","images":["../image/image_83/83_Cuers_1.jpg","../image/image_83/83_Cuers_2.jpg","../image/image_83/83_Cuers_3.jpg","../image/image_83/83_Cuers_4.jpg","../image/image_83/83_Cuers_5.jpg"]},"Consult_chateau_formulaireb5f5":{"id":"Consult_chateau_formulaireb5f5","dept":"83","canton":"Draguignan","commune":"Draguignan","nom":"Draguignan","type":"Vestiges","periode":"XII","histoire":"DRAGUIGNAN: A l'origine, celte Ligure avec quatre oppidums bâtis sur les collines, les Romains dans les plaines. Raymond Béranger V comte de Provence fait construire un château fort et en 1200 la ville est fortifiée au XVe siècle devient la propriété de la reine Jeanne, suite au rattachement de la Provence à la couronne de France, puis au prince angevin suite à la fin tragique de la reine.            La ville devient chef lieu et de nouveaux remparts sont construits au XVIe siècle et tout sera détruit pour agrandissement de la ville au XIXe siècle sur l'initiative du baron Azémar. Et en 1848 hôtel préfectoral.","architecture":"Draguignan; Au Ve siècle un prieuré fut bâti, la basse ville fut fortifié au XIIIe siècle, construction du château dont le donjon féodal de 1660 devient tour de l'horloge, flanquée de tourelles en angles, haute de 24 mètres  des remparts subsistent, la porte de l'enceinte Est du XVe siècle et la porte Portaiguières haute tour carrée (XIV) à l'Ouest. Le préfet Hausmann y entreprit d'énormes démolitions, mais la vieille ville a conservée ses parties médiévales.","habitants":"Raymond Béranger V comte de Provence \r\n        \"","divers":"Donjon du château tour de l'horloge aujourd'hui.","gps":"","images":["../image/image_83/83_Draguignan_1.jpg","../image/image_83/83_Draguignan_2.jpg","../image/image_83/83_Draguignan_3.jpg"]},"Consult_chateau_formulaire1cfe":{"id":"Consult_chateau_formulaire1cfe","dept":"83","canton":"Cotignac","commune":"Entrecasteaux","nom":"Entrecasteaux","type":"Château","periode":"XI  XVII","histoire":"ENTRECASTAUX; Ce grand château du Var, fief des Châteaurenard depuis le XIe siècle, en 1498 passa à Gaspard Ier de Castellane baron d'Entrecastaux qui épousa Blanche-Adhémar de Monteil de la famille des comtes de Grignan, leur fils  Gaspard II héritier  fondera la branche Castellane-Adhémar comte de Grignan, François de Castellane petit fils  de Gaspard II gouverneur de la Provence  et gendre de madame de Sévigné  vendit à un négociant fortuné récemment anobli, François-Raymond Bruni trésorier de France ancêtre de  l'amiral Bruny d'Entrecasteaux qui fut envoyé par Louis XVI à la recherche de la Pérousse ce dernier décéda sur son retour en 1793.  Le château resta dans cette famille jusqu'à la Révolution et grace à l'intervention du curé d'Entrecasteaux,  le château fut sauvé de la démolition. Confisqué par l'état et restitué aux filles du marquis, dont l'aîné Marie-Félicité-Pulchérie épousa en 1798 Jean-Pierre Gérard de Lubas,  lequel et sa descendance gardèrent le château jusqu'en 1949 date d'acquisition par la commune, tomba dans l'oubli jusqu'en 1974, acheté par Ian Mac Garvie Munn jusqu'en 1977 et fut racheté par la famille Girard.","architecture":"Entrecasteaux;  sur un socle rocheux domine le village médiéval  bâtisse imposante et hautaine dont les origines remontent au Xe siècle, et complété au XVI-XVIIe siècle de forme rectangulaire a trois  niveaux a égale hauteur, tour carrée d'escalier accolée  édifié au XIe siècle remanié au XVIIe siècle jardin à la française par le Nôtre.","habitants":"Famille d'Entrecasteaux\r\n        \"","divers":"Plusieurs vues sur le château d'Entrecastaux.","gps":"","images":["../image/image_83/83_Entrecasteaux_1.jpg","../image/image_83/83_Entrecasteaux_2.jpg","../image/image_83/83_Entrecasteaux_3.jpg","../image/image_83/83_Entrecasteaux_4.jpg","../image/image_83/83_Entrecasteaux_5.jpg","../image/image_83/83_Entrecasteaux_6.jpg","../image/image_83/83_Entrecasteaux_7.jpg","../image/image_83/83_Entrecasteaux_8.jpg","../image/image_83/83_Entrecasteaux_9.jpg"]},"Consult_chateau_formulaire13fe":{"id":"Consult_chateau_formulaire13fe","dept":"83","canton":"Barjols","commune":"Esparron","nom":"Esparron_Palieres","type":"Château","periode":"XVI","histoire":"ESPARRON:  Au XIe siècle fief de Geoffroy de Rians de Hugues des Baux  passera aux vicomtes d'Esparron alliés à la vicomté de Marseille au XIVe siècle; le fief fut divisé en deux parties, une partie a  Veran Ier d'Esclapon qui fait édifier deux tours, puis en 1466 passera au Arcussia qui cette famille rachètera et par alliance l'autre moitié qui était passé par différents propriétaires  est vendu en 1610 à Charles d'Arcussia qui conserveront ces propriétés jusqu'en 1758 et le dernier de cette famille Charles-Joseph vend a Jean-François de Lordonnet  famille de juristes acheta toute la seigneurie d'Esparron qui reconstruisit le château. Marie Madeleine Allègre veuve de Louis François Antoine de Lordonné acheva la construction du château actuel, garderont le château jusqu'à la Révolution, En 1810  Cécile de Lordonné qui épousa Antoine-Marie-Louis de Sinety, ils eurent six enfants dont un prêtre et une religieuse. Leur fils Alphonse-Marie, comte de Sinety épousa en 1836 Marie Sophie d'Estagnet, fut conseiller général du Var et maire d'Esparron. A sa mort le domaine fut partagé entre ses quatre filles, le cadet Georges reconstitua en partie grâce à un legs de son oncle Augustin d'Estagnet, il fit d'Esparron sa résidence habituelle et se consacra à la mise en valeur du domaine, il avait épousé Elisabeth de Lyle Taulane.   En 1918 Germaine de Jerphanion propriétaire du domaine.","architecture":"Esparron; Le château qui domine le village a été reconstruit en 1373 possédait à l'origine deux tours rondes qui représentait les deux tiers du château presque en ruine, remanié au XVIIe siècle, une aile principale a été rajouté.","habitants":"Famille de Charles d'Arcussia \r\n        \"","divers":"Château d'Esparron palières.","gps":"","images":["../image/image_83/83_Esparron_Palieres_1.jpg","../image/image_83/83_Esparron_Palieres_2.jpg","../image/image_83/83_Esparron_Palieres_3.jpg","../image/image_83/83_Esparron_Palieres_4.jpg","../image/image_83/83_Esparron_Palieres_5.jpg","../image/image_83/83_Esparron_Palieres_6.jpg"]},"Consult_chateau_formulaire0953":{"id":"Consult_chateau_formulaire0953","dept":"83","canton":"Ollioules","commune":"Evenos","nom":"Evenos","type":"Vestiges","periode":"XII","histoire":"EVENOS: Fief des seigneurs de Marseille; Guillaume Ier de Signes seigneur d'Ollioules épouse Cécile, fille du vicomte Bertrand de Marseille. Guillaume II fils co-seigneur d'Ollioules  et d'Evenos puis Guillaume III, son fils Bertrand III  Viguier de Marseille en 1281 et Avignon en 1300 devient Sénéchal de Provence et en 1315 lègue à son petit neveu Bertrand de Vintimille, fils de Boniface II de Philippe de Sabran. En 1350 la seigneurie passe aux Marseille-Vintimille puis aux comtés de Vintimille jusqu'en 1585 érigé en baronnie jusqu'en 1727 et en marquisat à Jean-Baptiste-Félix-Hubert de Vintimille du Luc marquis du Luc et des Arcs et d'autres lieux en Languedoc et Seine et Oise, général des armées du roi inspecteur de la cavalerie royale  épousa le 28 septembre 1739 Pauline  de Mailly-Nesle la succession s'arrête à la Révolution.  Dans le village d'Evenos le château  Saint-Anne d'Evenos  de Françoise Dutheil de la Rochère (viticole classé AOC et chambres d'hôtes).","architecture":"Evenos: Construit en roches basaltiques au XIIe siècle remanié au XVIe siècle  donjon pentagonal du XVI et fort Pipaudon.","habitants":"Seigneur Guillaume Ier de Signes \r\n        \"","divers":"Vestiges du château d'Evenos et château St-Anne","gps":"","images":["../image/image_83/83_Evenos_1.jpg","../image/image_83/83_Evenos_2.jpg","../image/image_83/83_Evenos_3.jpg","../image/image_83/83_Evenos_4.jpg","../image/image_83/83_Evenos_5.jpg","../image/image_83/83_Evenos_6.jpg","../image/image_83/83_Evenos_7.jpg","../image/image_83/83_Evenos_8.jpg","../image/image_83/83_Evenos_9.jpg"]},"Consult_chateau_formulaire1225":{"id":"Consult_chateau_formulaire1225"," .      Au XVIe siècle; Figanières passe aux mains des Puget. En 1543 Marguerite l'apporte en dot à son mari, Philibert de Vintimille. En 1660  maille à partie avec le parlement sauva sa tête mais dut payer une amende considérable de 12000 livres. Le domaine du château est aujourd'hui réhabilité grace à ses propriétaires (jardins).                               Sur la commune de Figanières sur la colline du château de Lagarde du XVIIIe siècle de César de Raimondis commandant du vaisseau pendant la guerre d'indépendance des Etats-Unis en était le propriétaire. Le château primitif fut détruit au XVIe siècle.","architecture":"Figanières; Village pittoresque perché sur une butte, vestiges du château féodal des comtes de Vintimille du XVIe siècle et porte de l'enceinte, et le château de Lagarde du XVIII siècle, à I km  sud-est, donjon imposant du XIIIe siècle et logis renaissance et sur la colline dans la végétation, quelques pans de murs d'un village et d'un couvent.                                                                                                 Quartier des Fourches, restes du Gibet seigneurial.","habitants":"Famille de Raymond de Cotignac\r\n        \"","divers":"Vestiges et tour à Figanières, maison forte de la Garde et motte féodale.","gps":"","images":["../image/image_83/83_Figanieres_1.jpg","../image/image_83/83_Figanieres_2.jpg","../image/image_83/83_Figanieres_3.jpg","../image/image_83/83_Figanieres_4.jpg","../image/image_83/83_Figanieres_5.jpg","../image/image_83/83_Figanieres_6.jpg","../image/image_83/83_Figanieres_7.jpg","../image/image_83/83_Figanieres_8.jpg"]},"Consult_chateau_formulairecc1d":{"id":"Consult_chateau_formulairecc1d","dept":"83","canton":"Besse-sur-Issole","commune":"Flassans-sur-Issole","nom":"Flassans","type":"Vestiges","periode":"XIII","histoire":"FLASSANS; Fief des Pontevès  famille venant des Agoult  du  Vaucluse, Les Pontevès furent comte de Carcès baron de Cotignac,  branche formé  en 1374 par Fouquet V qui s'éteignit en rt militaire et cité épiscopale. La ville sera détruite au XVe siècle incendiée par les barbares puis pillée en 1536 par les soldats de Charles Quint.                                             L' Amphithéâtre \"arènes\"  de 114 sur  82 mètres est encore utilisé a des spectacles. L'Aqueduc cité dès les années 50 après J.C vestiges, le Théâtre romain du premier siècle arasé au niveau des fondations, ruines de la citadelle romaine et des ruines de remparts du haut empire ( Ier siècle) sont encore visibles.","habitants":"Pape Jacques d'Euze\r\n        \"","divers":"Vestiges de l'aqueduc, tour crénelée, cloitre, Gallièni, arène et villa aurélienne.","gps":"","images":["../image/image_83/83_Frejus_1.jpg","../image/image_83/83_Frejus_2.jpg","../image/image_83/83_Frejus_3.jpg","../image/image_83/83_Frejus_4.jpg","../image/image_83/83_Frejus_5.jpg","../image/image_83/83_Frejus_6.jpg","../image/image_83/83_Frejus_7.jpg"]},"Consult_chateau_formulairedfb5":{"id":"Consult_chateau_formulairedfb5","dept":"83","canton":"Hyères","commune":"Giens","nom":"Giens","type":"Vestiges","periode":"X","histoire":"GIENS; Dépendait du fief des Pontevès qui possédait un château au sommet du village, aujourd'hui disparu.                                                    Le fort dit \"La Tour Fondu\"; batterie vestige d'un fortin érigé sur ordre de Richelieu en 1634 pour compenser la disparition du château de Hyères démoli suite au guerre de religion.","architecture":"Giens; du château des Pontevés, vestige d'enceinte quadrangulaire entourant un jardin.                                                                            Le fort de la tour Fondue, ouvrage  polygonal sans bastion mais des angles, la construction date de 1634 sous Richelieu remanié au XVII et au XIXe siècle.","habitants":"Seigneurs de  Pontevès\r\n        \"","divers":"Fort de la tour Fondue.","gps":"","images":["../image/image_83/83_Giens_1.jpg","../image/image_83/83_Giens_2.jpg","../image/image_83/83_Giens_3.jpg","../imag inquante ans plus tôt, en 1665 le château est démantelé sur ordre de Mazarin à la fin du XVIIe appartient aux Castellane-St-Juers qui le restaure et le remanie pour apporter du confort mais en 1791 démantelé par les révolutionnaires,  sert de carrière de pierres, 1928 inscrit M.H.","architecture":"Grimaud; Sur un piton dominant le village château du XVe siècle, et détruit au XVIIe siècle par un arrêt du conseil du roi; rectangulaire comprenait trois enceintes dont la première est partiellement conservée possédait quatre tours rondes en angles ; donjon central  construit sur une citerne fort ancienne.","habitants":"Seigneur Gabelin de Grimaldi                                                          Seigneur Florin de Castellane\r\n        \"","divers":"Vestiges de la forteresse.","gps":"","images":["../image/image_83/83_Grimaud_1.jpg","../image/image_83/83_Grimaud_2.jpg","../image/image_83/83_Grimaud_3.jpg","../image/image_83/83_Grimaud_4.jpg","../image/image_83/83_Grimaud_5.jpg","../image/image_83/83_Grimaud_6.jpg","../image/image_83/83_Grimaud_7.jpg","../image/image_83/83_Grimaud_8.jpg"]},"Consult_chateau_formulaire2e17":{"id":"Consult_chateau_formulaire2e17","dept":"83","canton":"Hyères","commune":"Hyères","nom":"Hyeres","type":"Château","periode":"XIX","histoire":"En 1924 construction de la villa Noailles (moderne) de Charles vicomte  de Noailles  et de sa femme Marie Laure Bischoffheim; Charles qui a fait fortune dans les locomotives et le cinéma; un film a été tourné en 1928 dans ses lieux en 1973, à la mort de la vicomtesse la villa fut acquise par  la ville pour des festivals.                           Villa Alberti-Tholozan construit en 1858 pour Honoré d'Albert duc de Luynes passa par successions au Sabran de Pontevès et au Marquis de Lareinty-Tholozan.                                                    Le Château San-Salvadour construit en 1869 par Auguste Parent industriel belge bourgeois du second-Empire acheté en 1879  par Edmond Magnier directeur du q   qui deviendra propriétaire du domaine en 1881 découvre et fonde la société des mines de Bormettes qui cessera son activité en 1929, fut racheté par le groupe Schneider et en 1940 la marine s'installe aux Bormettes bâtiment de l'Astrolabe, école de la Marine et en 1972 reprit par le ministére des PTT et France Telecom.                       Dans la commune plusieurs châteaux et domaines viticoles, Pascalette, Valcros,  la Valentines et Sainte Marguerite etc.","architecture":"Londes des Maures; château des Bormettes du XVIIIe siècle sur plan d'Horace Vernet de style cathédralitique à dominante médiévale divers style ancien est moderne.","habitants":"Sieur Antoine Lemonnier\r\n        \"","divers":"La Londe, château d'Horace Vernet et château de Maravenne.","gps":"","images":["../image/image_83/83_La_Londe_1.jpg","../image/image_83/83_La_Londe_2.jpg","../image/image_83/83_La_Londe_3.jpg","../image/image_83/83_La_Londe_4.jpg","../image/image_83/83_La_Londe_5.jpg","../image/image_83/83_La_Londe_6.jpg","../image/image_83/83_La_Londe_7.jpg"]},"Consult_chateau_formulaire8bbb":{"id":"Consult_chateau_formulaire8bbb","dept":"83","canton":"St-Tropez","commune":"La Môle","nom":"La_Mole","type":"Château","periode":"XI","histoire":"La MOLE; Domaine très ancien  en 1008 Ponthius évêque de Marseille fait don au monastère de Saint-Victor de la demeure en 1257 le château \"la Mola\" appartenait aux comtes de Provence.                Il passe à la maison de Fos, aux Boniface, aux  Arcussia, aux Gauthier et  à la maison Guiran  puis  en 1717 Jean-Baptiste de Suffren marquis de Saint-Cannat et seigneur de Saint-Tropez en hérite et fut acquis en 1770 par la famille Boyer de Fonscolombe conseiller au parlement d'Aix au  début du XIXe siècle. Emmanuel  de Fonscolombe nommé baron de la Môle par Napoléon III qui apportera des aménagements, le château toujours dans la famille.                Antoine de Saint-Exupery dit le Petit-Prince  y passa ses vacances  auprés de ses grands-parents mate _Meounes_Montrieux_5.jpg","../image/image_83/83_Meounes_Montrieux_6.jpg","../image/image_83/83_Meounes_Montrieux_7.jpg","../image/image_83/83_Meounes_Montrieux_8.jpg"]},"Consult_chateau_formulaire24b7":{"id":"Consult_chateau_formulaire24b7","dept":"83","canton":"St-Tropez","commune":"St-Tropez","nom":"Messardiere","type":"Manoir","periode":"XIX","histoire":"La MESSARDIERE; Le nom de la Messardière apparu dès le VIIe siècle,  plus connu en 1669 par le mariage de Renée fille du seigneur de la Messardière  avec le comte Léonard le Brun ce château fut offert au début de ce siècle lors du mariage de Henri Brisson de la Messardière officier à Louise Dupuy d'Anjac artiste et musicienne. Au décès prématuré de Henri de Brisson le château tomba à l'abandon,  la jeune veuve le transforma en chambres d'hôtes de classe. Le château fut reprit et restauré agrandit en 1989 par Jean-Claude Rochette architecte des monuments historiques, racheté en 1992 par un groupe Français  pour le maintenir en hôtel de Lux.","architecture":"La Messardière; château construit au XIXe siècle, de plan rectangulaire à trois niveaux flanqué d'échauguettes sur angles.","habitants":"seigneur de la Messardière\r\n        \r\n        \r\n        \"","divers":"Château de la Messardière.","gps":"","images":["../image/image_83/83_Messardiere_1.jpg","../image/image_83/83_Messardiere_2.jpg"]},"Consult_chateau_formulairee33c":{"id":"Consult_chateau_formulairee33c","dept":"83","canton":"Tavernes","commune":"Moissac-Bellevue","nom":"Moissac","type":"Vestiges","periode":"XIII","histoire":"MOISSAC-Bellevue; au XIe siècle fief des seigneurs des Castellane, par le mariage de Laure de Castellane avec Blacas d'Aulps dit le \"Grand Guerrier\" devient au XIIIe siècle seigneur de Moissac, en 1201 ce dernier cède aux chevaliers du temple de Saint-Maurin tous les droits sur les biens de Moissac. Boniface et Bertaud de Blacas seigneurs de Moissac et en 1219 cèdent à leur tour par l'intermédiaire de Guillaume de Salernes tous les droits sur la seigneurie aux Templiers. La seigneurie passe ensuite aux Linche de Marseille, aux Grimaldi-Régusse, aux Hesmini puis aux Coriolis qui la possédèrent jusqu'à la Révolution.  C'est dans ce château que le conseillé au parlement de Provence, Jean-Louis-Hyacinthe d'Hesmini  seigneur et baron de Moissac composa une partie de son \"histoire du Parlement\".","architecture":"Moissac; Village fortifié quelques vestiges  et château de Moissac du XVIIe siècle, corps de logis rectangulaire à deux niveaux.","habitants":"seigneur Guillaume de Moissac \r\n        \"","divers":"Vestiges de la ville fortifié et château de Moissac et de Bellevue.","gps":"","images":["../image/image_83/83_Moissac_1.jpg","../image/image_83/83_Moissac_2.jpg","../image/image_83/83_Moissac_3.jpg","../image/image_83/83_Moissac_4.jpg","../image/image_83/83_Moissac_5.jpg","../image/image_83/83_Moissac_6.jpg","../image/image_83/83_Moissac_7.jpg","../image/image_83/83_Moissac_8.jpg","../image/image_83/83_Moissac_9.jpg"]},"Consult_chateau_formulaire8bda":{"id":"Consult_chateau_formulaire8bda","dept":"83","canton":"Fayence","commune":"Mons","nom":"Mons","type":"Château","periode":"XX","histoire":"MONS: Dans ce village à 814 mètres d'altitude, outre le château de Beauregard  qui dépendait au XIe siècle à la principauté de Callian avant de devenir le fief des Villeneuve qui en était seigneur jusqu'à la Révolution.  Dans la commune construction d'un château moderne, de plus du château de Bourigaille, le château Esclapon-Bas, le château de la Lubi et les ruines du château de St-Marcellin en ruines.","architecture":"Mons: Quatre châteaux se sont ajoutés à celui de Beauregard dans cette commune, il existe des traces  de ruines base de tour ronde du château féodal.","habitants":"Famille des Villeneuve\r\n        \"","divers":"Differents châteaux à Mons.","gps":"","images":["../image/image_83/83_Mons_1.jpg","../image/image_83/83_Mons_2.jpg","../image/image_83/83_Mons_3.jpg","../image/image_83/83_Mons_4.jpg","../image/image_83/83_Mons_5.jpg","../image/image_83/83_Mons_6.jpg"]},"Consult_chateau_formulaire986c-2":{"id":"Consult_chateau_formulaire986c-2","dept":"83","canton":"St-Maximin-la-Ste-Baume","commune":"St-Zacharie","nom":"Mont_Vert","type":"Château","periode":"XIX","histoire":"MONT-VERT; Au XIIIe siècle était en co-seigneurie avec Bertrand de Châteauvert et des Villeneuve  seigneur de Flayosc racheté par Charles Ier d'Anjou en 1257, le cède à d'autres seigneuries rurales dont les Fonscolombe qui possède le château et à l'évêque de Marseille. Adolphe de  Saporta  a épousé en 1870 mademoiselle de Fonscolombe le château rentre dans la famille de Saporta, en 1823 Gaston qui naquit au château de Mont-Vert marquis de Saporta poête en 1850 à la mort de sa femme Valentine de Forbin de la Barben qu'il avait épousé en 1846, se lance dans la botanique et épouse en 1854 Emilie de Gabrielli de Cubbio. après avoir transformé son château en Arboretum avec le soutient de monsieur Drée, alla s'installer dans le château du Moulin-Blanc de Monsieur Revoil.  Il décéda à Aix en Provence  en 1895  Aujourd'hui le château transformé en clinique et maison de repos.","architecture":"Saint-Zacharie; château du XIXe siècle des  Saporta; bâtisse modifié au XXe siècle prolongé en longueur.","habitants":"Seigneur Bertrand de Château-Vert\r\n        \"","divers":"Château-Vert et Moulins Blanc.","gps":"","images":["../image/image_83/83_Mont_Vert_1.jpg","../image/image_83/83_Mont_Vert_2.jpg","../image/image_83/83_Mont_Vert_3.jpg","../image/image_83/83_Mont_Vert_4.jpg","../image/image_83/83_Mont_Vert_5.jpg","../image/image_83/83_Mont_Vert_6.jpg","../image/image_83/83_Mont_Vert_7.jpg"]},"Consult_chateau_formulaire9fad":{"id":"Consult_chateau_formulaire9fad","dept":"83","canton":"Cotignac","commune":"Montfort-sur-Argens","nom":"Montfort_Argens","type":"Château","periode":"XIII","histoire":"MONTFORT sur Argens: Au XIe siècle Monte-Fortis cité médiévale et château des Templiers du XII-XIIIe siècle, ancienne commanderie des Templiers don du comte Alphonse II d'Aragon en 1207. Château appelé château des commandeurs édifié par les comtes de Provence qu'ils reçurent en fief des commandeurs, en 1308 après leur procès  tous les biens confisqués et le château fut confié  en 1411  aux Hospitaliers chevalier  de Malte de Marseille. En 1793 servait de résidence aux commandeurs de Marseille fut transformé en prison révolutionnaire ce qui évita sa destruction.           Montfort est le village natal de Joseph-Louis  Lambot inventeur du ciment armé.  Dans la commune château de Roberniers en 1804 André Jaubert militaire de carrière  achète le domaine sur lequel, était construit une bâtisse, en 1870 son petit-fils, Emilien Paul fait élever le château prolongé d'une orangerie, transformé en hôtel restaurant et pour grandes réceptions familiales mariages, séminaires  etc.","architecture":"Montfort sur Argens; Le château du XII  XIIIe siècle détruit au XIVe siècle reconstruit en style médiéval sur les bases de l'ancien  au XVIe siècle, la façade principale encadrée par deux tours carrées  à contreforts trois à l'origine déterminant la cour intérieure du château primitif, les fenêtres à meneaux ont remplacés  les meurtrières, vestiges de remparts et porte à herse. Château de Roberniers; corps de logis rectangulaire flanqué en façade de deux tours rondes toit en poivrière retour en équerre  formant une cour d'honneur fermé par des dépendances et une façade en arcade.     Commanderie dit des templiers du XVIe siècle.","habitants":"les comtes de Provence\r\n        \"","divers":"Château de Montfort et de Robernier","gps":"","images":["../image/image_83/83_Montfort_Argens_1.jpg","../image/image_83/83_Montfort_Argens_2.jpg","../image/image_83/83_Montfort_Argens_3.jpg","../image/image_83/83_Montfort_Argens_4.jpg","../image/image_83/83_Montfort_Argens_5.jpg","../image/image_83/83_Montfort_Argens_6.jpg","../image/image_83/83_Montfort_Argens_7.jpg","../image/image_83/83_Montfort_Argens_8.jpg"]},"Consult_chateau_formulaire5c0e":{"id":"Consult_chateau_formulaire5c0e","dept":"83","canton":"Tavernes","commune":"Règusse","nom":"Montmeyan","type":"Vestiges","periode":"XIV","histoire":"MONTMEYAN. En 1135 \"Monte Méjano\" fief de la famille de Blancas  d'Aups en 1200, puis à Pons Albert et aux seigneurs de Riez.  Spata et G. Augier font donation de leurs droits sur Quinson. Les templiers deviennent  propriétaires du château de la tour, puis passe en 1300 aux mains des hospitaliers de Saint-Jean de Jérusalem, puis revendu aux Arnaud de Trians en 1400  la famille de Castellane prenne le territoire suite à l'alliance de la petite fille d'Arnaud, puis c'est son fils Honoré, qui hérite  des Régusses et Montmeyan. Au XVIe siècle sept co-seigneurs se partageaient la seigneurie qui fut érigé en 1651 en marquisat en faveur de Jean-Auguste de Foreste, les Grimaldi furent les derniers seigneurs du lieu avant la Révolution.                                                                              Dans la commune château de l'Eouvières du XVIIIe siècle.","architecture":"Montmeyan;  Village fortifié vestiges de murailles d'enceinte, tours carrées  et rondes, tour du château féodal.","habitants":"Seigneur Arnaud de Trians            Seigneur Grimaldi\r\n        \"","divers":"Fortifications de Montmeyan, de son château et château de Eouvières","gps":"","images":["../image/image_83/83_Montmeyan_1.jpg","../image/image_83/83_Montmeyan_2.jpg","../image/image_83/83_Montmeyan_3.jpg","../image/image_83/83_Montmeyan_4.jpg","../image/image_83/83_Montmeyan_5.jpg","../image/image_83/83_Montmeyan_6.jpg","../image/image_83/83_Montmeyan_7.jpg","../image/image_83/83_Montmeyan_8.jpg"]},"Consult_chateau_formulairece45":{"id":"Consult_chateau_formulairece45","dept":"83","canton":"St-Maximin-la-Ste-Baume","commune":"Nans-les-Pins","nom":"Nans_les_Pins","type":"Vestiges","periode":"XIII","histoire":"NANS les Pins: Vestiges de l'ancien château; Le château actuelle transformé en hôtel res
