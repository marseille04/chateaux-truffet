","../image/image_83/83_Neoules_7.jpg"]},"Consult_chateau_formulairef437":{"id":"Consult_chateau_formulairef437","dept":"83","canton":"St-Maximin-la-Ste-Baume","commune":"Ollières","nom":"Ollieres_Ste_Baume","type":"Château","periode":"X","histoire":"OLLIERES; D'origine médiévale le château  des vicomtes d'Agoult, Félix d'Ollières au Xe siècle seigneur d'Ollières est toujours dans cette famille depuis mille ans. Le dernier seigneur Félix  devenu général de la République réussit à préserver le château.                 Aujourd'hui propriété de la famille de Pierrefeu, descendant des Ollières. domaine viticole avec réception de fêtes de familles mariages, séminaires  etc.","architecture":"Ollières; A l'origine du Xe siècle reconstruit moitié XVII-XVIIIe siècle rasé sur demande de Richelieu reconstruit en 1630 en demeure de style Louis XIV provençal quadrangulaire flanqué d'une tour carrée englobant un donjon médiéval du XIe siècle.","habitants":"SeigneurFelix d'Ollieres\r\n        \"","divers":"Château d'Ollières.","gps":"","images":["../image/image_83/83_Ollieres_Ste_Baume_1.jpg","../image/image_83/83_Ollieres_Ste_Baume_2.jpg","../image/image_83/83_Ollieres_Ste_Baume_3.jpg","../image/image_83/83_Ollieres_Ste_Baume_4.jpg","../image/image_83/83_Ollieres_Ste_Baume_5.jpg","../image/image_83/83_Ollieres_Ste_Baume_6.jpg","../image/image_83/83_Ollieres_Ste_Baume_7.jpg","../image/image_83/83_Ollieres_Ste_Baume_8.jpg"]},"Consult_chateau_formulaire3588":{"id":"Consult_chateau_formulaire3588","dept":"83","canton":"Ollioules","commune":"Ollioules","nom":"Ollioules","type":"Vestiges","periode":"XIII","histoire":"OLLIOULES; Depuis la préhistoire, fut occupé par des tribus  Celte, Ligure des Canatulici  qui appartiennent à la confédération  des Salyens (Salluvii), ils construisirent sur la colline un vaste oppidum, subsistent d'importants vestiges.                               Ollioules appartient à la fin du Xe siècle aux vicomtes de Marseille qui y établiront un château féodal au XIIIe siècle autour duquel s'établira le château définitif  avec remparts,  le fief passera  aux seigneurs de Signes aux Vintimille et aux Simiane.                        Saint-Louis s'y arrêta lors d'un passage pour se rendre en croisade.           Ollioules pris parti contre Charles Duras en 1384.  Favorable à la ligue le village s'associa au capitaine Isnard IX lors du Siège de Toulon en 1713.  propriété de la commune.                                  MONTAUBAN:  Construit  au XVIIe siècle par un descendant de Raynaud de Montauban, seigneur du Revest, il fut occupé en 1793 pendant le siège de Toulon par le général Carteaux  et abrita du 12 au 17 septembre,  le capitaine d'artillerie Bonaparte. Propriété de monsieur Gindre.                                                                       Autres châteaux dans la commune; Châteauvallon,  fortin du XVIIe siècle.","architecture":"Ollioules; Village médiévale ruines de l'enceinte, du château féodal il ne reste que des ruines d'une tour quadrangulaire, quelques pans de murs  du château du XIIIe siècle.                                                    Montauban;  bâtiment  du XVIIe siècle quadrangulaire massif flanqué de quatre tours cylindriques parc avec dédales de grottes et rocailles en galeries.                                                                            Chateauvallon fortin du XVIIe siècle  flanqué de tourelles et porte du XVIe siècle.","habitants":"seigneurs de Signes\r\n        \"","divers":"Vestiges du château d'Ollioules et de Montauban.","gps":"","images":["../image/image_83/83_Ollioules_1.jpg","../image/image_83/83_Ollioules_2.jpg","../image/image_83/83_Ollioules_3.jpg","../image/image_83/83_Ollioules_4.jpg","../image/image_83/83_Ollioules_5.jpg","../image/image_83/83_Ollioules_6.jpg","../image/image_83/83_Ollioules_7.jpg"]},"Consult_chateau_formulairebee0":{"id":"Consult_chateau_formulairebee0","dept":"83","canton":"Pierrefeu","commune":"Pierrefeu","nom":"Pierrefeu","type":"Château","periode":"XVII","histoire":"PIERREFEU; Village médiéval  dont le nom vient des pierres de silex dit de feu à l'origine \"Pétrofou\", \"Petrofog\", \"Rocafog\" et \"Pierrefeu\"  au XIe siècle. A appartenu a différents seigneurs et comtés avant d'être érigé en marquisat au XVIIe siècle. Ils reste encore quelques vestiges des hameaux du Castellas, du Peyrol  et Termes. Le château féodal  de Pierrefeu qui a disparu suite aux guerres de religion garde le souvenir de Rostangue, dame de Pierrefeu, de Mabile de Fos dame d'Hyères et de Bertanne dame de Signes.  Dans la commune le château de l'Aumerade, de Cordonne, de Montaud, de Montane et de la tour de l'Evêque de la seigneurie des vicomtes de Marseille qui ces derniers intentèrent un procés à la population en 1859 dont-ils n'eurent pas gain de cause.","architecture":"Pierrefeu: en remplacement du château féodal, les constructions des châteaux cités sont classiques du XIX-XXe siècle.","habitants":"Rostangue dame de Pierrefeu,\r\n        \"","divers":"Différents châteaux viticoles dans la plaine de Pierrefeu; Aumerade, Cordonne Montagne et Montaud.","gps":"","images":["../image/image_83/83_Pierrefeu_1.jpg","../image/image_83/83_Pierrefeu_2.jpg","../image/image_83/83_Pierrefeu_3.jpg","../image/image_83/83_Pierrefeu_4.jpg","../image/image_83/83_Pierrefeu_5.jpg","../image/image_83/83_Pierrefeu_6.jpg"]},"Consult_chateau_formulaire02a1-2":{"id":"Consult_chateau_formulaire02a1-2","dept":"83","canton":"Besse-sur-Issole","commune":"Pignans","nom":"Pignans","type":"Vestiges","periode":"","histoire":"PIGNANS; Seigneurie des vicomtes de Marseille, puis des chapitres de la collégiale et un couvent d'Ursulines.  Au XIIIe siècle la collégiale le monastère faisant figure de château avec de hautes murailles est treize tours qui furent incendiées en 1590.                     Dans la commune  château de Barbeiranne lieu de la Pellegrine du XVIIIe siècle, domaine vinicole à pour origine la famille Pourcel passera à plusieurs propriétaires est reprit en 2006 par Henry Hebel et Marie Noëlle Fébvre.","architecture":"Pignans; Vestiges pans de murs du château féodal et portes sarrasines                                                                       \r\nBarbeiranne bâtisse du XVIIIe siècle.","habitants":"Famille Pourcel\r\n        \"","divers":"Beffroi et Nôtre-Dame.","gps":"","images":["../image/image_83/83_Pignans_1.jpg","../image/image_83/83_Pignans_2.jpg"]},"Consult_chateau_formulairecbd1":{"id":"Consult_chateau_formulairecbd1","dept":"83","canton":"Barjols","commune":"Ponteves","nom":"Ponteves","type":"Vestiges","periode":"XIII","histoire":"PONTEVES. Dès le début du XIe siècle chef lieu d'une puissante seigneurie de Saint-André et de Bauduen qui s'était détachée de la branche en 1650 a donné plusieurs chevaliers de Malte avant de s'éteindre et  le fief d'une célèbre famille provençale; Foulques d'Agoult de Pontevés devient seigneur en 1393 le dernier de cette descendance Antoine de Pontevès fut égorgé en 1595. A l'Est  la seigneurie construisit l'habitat qui prendra le nom de bastide de Pontevès au début du XVIIe siècle.  Les Pontevès réintègrent le château.   En 1650 François de Pontevès vend le château et les terres à un homme d'affaire aixois Paul Maurel  qui entreprend  de grand travaux d'agrandissements et quatre tours d'angles. A la Révolution le château est pratiquement en ruines, quatre co-seigneurs se partageaient le fief.","architecture":"Pontevès; Village perché au pied du massif des Bessillons, les ruines du château qui fut construit au XIIIe siècle avec enceinte  de cette dernière il ne reste que des vestiges  quadrangulaire flanquée de quatre tours du XV-XVIe siècle aujourd'hui arasés et en partie ruinés.","habitants":"Seigneur Foulques d'Agoult de Pontevés \r\n        \"","divers":"Vestiges du château de Pontevès et château Duvivier.","gps":"","images":["../image/image_83/83_Ponteves_1.jpg","../image/image_83/83_Ponteves_2.jpg","../image/image_83/83_Ponteves_3.jpg","../image/image_83/83_Ponteves_4.jpg","../image/image_83/83_Ponteves_5.jpg","../image/image_83/83_Ponteves_6.jpg","../image/image_83/83_Ponteves_7.jpg","../image/image_83/83_Ponteves_8.jpg","../image/image_83/83_Ponteves_9.jpg"]},"Consult_chateau_formulaire73af":{"id":"Consult_chateau_formulaire73af","dept":"83","canton":"Hyères","commune":"Porquerolles","nom":"Porquerolles","type":"Fort","periode":"XVIII","histoire":"PORQUEROLLES (Iles de), elle fut confié par Charles II comte de Provence à Pierre Mégre de Toulon en 1304, en 1471 Porquerolles appartenait à Palamède de Forbin ministre du roi René en 1522 à l'ordre de Saint-Jean de Jérusalem (Viviers de L'isle Adam de Malte). En 1579 Henri III de France racheta Porquerolles aux comtes de Carcés  pour y installer une garnison qui sera géré en 1578 par Alphonse d'Ornano, son fils François à sa mort en 1635 sa veuve vend l'ile  qui est érigée en marquisat à François Malé maître des requêtes de Louis XIV.                                                 En 1707 attaqué par Victor-Amédée II de Savoie l'ile devient la propriété de la famille de Lenoncourt en 1740. A la Révolution les Lenoncourt émigre, racheté par la famille Marquant en 1793  les anglais s'en emparèrent ainsi que Toulon, reprit par Napoléon qui fortifia les lieux, les ouvrages de défense date de cette époque.                        En 1856 le duc de Vicence marquis de Coulaincourt achète l'ile puis en 1881 racheté par monsieur Roussen et en 1905 à la compagnie foncière qui y firent des travaux importants mal gérés, revendu à monsieur François-Joseph Fournier qu'il garda jusqu'à sa mort en 1935 et acquise en 1971 par l'état qui la confie au parc national de Port-Cros et en devienne propriétaire en 1985.                   ST-AGATHE; Afin de faire face aux actes de piratages  nos rois durent construirent des forts tel que Saint-Agathe, construit sous François Ier en 1531 du XVIe siècle; sur l'emplacement d'un ancien château  sur un surplomb  à 142 m d'altitude sous François Ier, aujourd'hui musée.                                                                                  Le fort du petit Langoustier est postée en vigie avancé sur un îlot à la pointe ouest de Porquerolles, comme toutes les tours à canon  de Richelieu  est pourvu de locaux d'habitation.                                    Le fort d'Alycastres tour à canons édifié en 1635.                                 Le fort de la Repentance édifié durant la seconde moitié du XIXe siècle sous le règne de Napoléon III est le seul a protéger l'île.                        Les Batteries de Bon-Renaud du Lequin et du Galéas son munis de bretèches à l'aspect médiéval.","architecture":"Porquerolles; Iles de 7,5 km de long sur 3 km de large, la plus grande des trois îles d'Hyères, qui subissait tous les piratages éxistants aux cours des siècles.                                                \r\n Le Fort Sainte-Agathe du XVIe siècle; sur l'emplacement d'un ancien château  sur un surplomb  à 142 m d'altitude  avec une enceinte en forme de trapèze.   Les forts répondent à des principes architecturaux semblables, leurs formes géométriques diffèrent selon l'adaptation de leur fonction militaire.","habitants":"Charles II comte de Provence.                                                            Palamède de Forbin                                                                 famille de Lenoncourt \r\n        \"","divers":"Fort Saint-Agathe, Fort d'Alycastre et le petit Langoustier.","gps":"","images":["../image/image_83/83_Porquerolles_1.jpg","../image/image_83/83_Porquerolles_2.jpg","../image/image_83/83_Porquerolles_3.jpg","../image/image_83/83_Porquerolles_4.jpg","../image/image_83/83_Porquerolles_5.jpg","../image/image_83/83_Porquerolles_6.jpg"]},"Consult_chateau_formulaireece4":{"id":"Consult_chateau_formulaireece4","dept":"83","canton":"Hyères","commune":"Port-Cros","nom":"Port_Cros","type":"Fort","periode":"XVI","histoire":"PORT-CROS: Ile fortifiée. Cité comtale sous le Moyen-Age, sous le règne du duc d'Anjou, hôte du bon roi Saint-Louis ou encore de Catherine de Médicis et du roi de Navare une vie s'était organisé autour du castéou  mais  afin de faire face aux actes de piratages nos rois durent construire des forts, le fort du Moulin édifié sous François Ier, présente plusieurs époques d'architecture militaire, également ruiné par les anglais en 1794 et remanié en 1862, le  fort de l'Estissac construit sur ordre de Richelieu, ruiné par les anglais au début de 1794 après leur départ de Toulon.                                  D'autres forts tel que l'Estissac et l'Eminence et à l'autre extrémité de l'île le fort de port Man.                                                              Ile de port-Cros  est la zone maritime qui la ceinture est classé parc national en 1963.","architecture":"Port-Cros, sur une arrête dorsale de l'île le fort comporte une tour dressée au centre d'une enceinte à redans et bastions, ce fort à l'origine était circulaire a été reconstruite sur plan mixte.","habitants":"Duc d'Anjou                                                                                              Roi François Ier\r\n        \"","divers":"Fort de Port-Cros, de l'Estissac, du moulins et petit manoir sur l'ile.","gps":"","images":["../image/image_83/83_Port_Cros_1.jpg","../image/image_83/83_Port_Cros_2.jpg","../image/image_83/83_Port_Cros_3.jpg","../image/image_83/83_Port_Cros_4.jpg","../image/image_83/83_Port_Cros_5.jpg","../image/image_83/83_Port_Cros_6.jpg","../image/image_83/83_Port_Cros_7.jpg","../image/image_83/83_Port_Cros_8.jpg"]},"Consult_chateau_formulaire448b":{"id":"Consult_chateau_formulaire448b","dept":"83","canton":"St-Maximin-la-Ste-Baume","commune":"Pourcieux","nom":"Pourcieux","type":"Vestiges","periode":"XVIII","histoire":"POURCIEUX; Fief des vicomtes de Marseille Guillaume Ier divise la seigneurie entre ses enfants qui en l'an 1000 et 1020 en donnent les deux tiers à l'abbaye de Saint-Victor, puis le fief passa aux Burgondon de Trests, En 1444 à la famille de Verriers  émigrés d'Altarre qui demeurèrent dans le premier castrum des Porcils passe ensuite aux Mobile et aux Agoult de Pontevès que cette famille est encore présente au XVIIIe siècle. La famille de Marc Antoine de Vitali,  anoblie en 1529 possédait les deux tiers de la jurédictions furent reconnu seigneurs en 1645, Gaspard Honorat et Auguste d'Agoult possédaient tout deux un tiers seulement mais été résidant au château et Gaspard d'Agoult  frères de Gaspard d' Ollières marquis,  récupèrent un tiers de la juridiction.                           En 1756 Jules- Symphorien Pezery seigneur de Thorame achète Porcieux et fit construire le château  en 1764 conseillé au Parlement de Provence, le domaine  toujours dans la descendance qui se sont transformé en viticulteur malgré sa disparition par assassina à la Révolution. Des nobles habitèrent dans la commune tel que la marquise de Forbin, Alexandre de Cariolis, des Roquefort, Pierrre de Rougemont et monsieur Gaspagnet.","architecture":"Pourcieux:  Un premier castrum du XIIIe siècle  était flanqué de tours  à disparu,remplacé par un nouveau château  construit en 1764  d'un style moderne. Au dessus dominant la ville de Pourcieux à l'ouest de Saint  Maximin  sur le mont Aurélien.                                                    Vestiges du château primitif.","habitants":"Seigneur Jules- Symphorien Pezery \r\n        \"","divers":"Vestiges dans village et château de Pourcieux","gps":"","images":["../image/image_83/83_Pourcieux_1.jpg","../image/image_83/83_Pourcieux_2.jpg","../image/image_83/83_Pourcieux_3.jpg","../image/image_83/83_Pourcieux_4.jpg","../image/image_83/83_Pourcieux_5.jpg"]},"Consult_chateau_formulaire5303":{"id":"Consult_chateau_formulaire5303","dept":"83","canton":"Beausset","commune":"St-Cyr-sur-Mer","nom":"Pradeaux","type":"Château","periode":"XVI","histoire":"PRADEAUX; Château construit au XVIe siècle, en 1752 par les Beaussetane-Portalis, vieille famille varoise, famille de juriste  dont le comte Jean-Marie-Etienne de Portalis ministre de Napoléon et coateur du code Civil et négociateur du concordat sous Napoléon Ier, défendit Madame de Mirabeau lors de son divorce, élu en 1778 administrateur de la Provence en 1792 élu député au conseil des Anciens, doit se réfugier en Suisse le 18 Fructudor et Napoléon Bonaparte le rappelle 18 Brumaire pour devenir conseiller d'état en 1800, en 1804 ministre et comte de l'Empire, il hérita de sa grand-mère du château, il décédera en 1807. Ses descendances toujours dans les affaires du gouvernements, député, conseiller d'état,  pair de France, ministres etc, En 1940 Arlette de Portalis replante le vignoble toujours dans cette famille par sa descendance à Cyrille Portalis qui maintient l'appelation \"Bandols\".","architecture":"Les Pradeaux; La demeure remanié aux cours des siècles bâtiment allongé à un étage en forme de U renfermant une cour  pavée.","habitants":"Seigneur  Beaussetane-Portalis\r\n        \"","divers":"Château de Pradeaux.","gps":"","images":["../image/image_83/83_Pradeaux_1.jpg","../image/image_83/83_Pradeaux_2.jpg"]},"Consult_chateau_formulaire9d03":{"id":"Consult_chateau_formulaire9d03","dept":"83","canton":"La Garde","commune":"Pradet","nom":"Pradet_Carqueiranne","type":"Château","periode":"XVII","histoire":"PRADET; Le château du clos Meunier date de la fin du XVIe siècle.                Au XVIIe siècle  appartenait aux seigneurs de la Garde , à Joseph de Catelin, c'est Jean Louis Raymond Mallard qui se porta acquéreur du château en 1790 le conserva jusqu'en 1862 et le revendit à Monsieur Meunier sous le nom de château du Pradet, la commune en fit l'acquisition en 1973 rénové,  utilisé pour l'hôtel de ville et le parc fut baptisé parc \"Cravero\".","architecture":"Pradet; Dans la commune plusieurs châteaux; châteaux de la Voulte restauré au XVIe siècle et deux autres un à l'est servait de cachette à monsieur Marquery durant la Révolution, l'autre au sud  Est en trés mauvais état.                                                                                      Villa de Mandrat construite par le Corbusier en 1930  et fort de la Caravese.","habitants":"Monsieur Jean Louis Raymond Mallard \r\n        \"","divers":"Château de Maurie et de la Voulte.","gps":"","images":["../image/image_83/83_Pradet_Carqueiranne_1.jpg","../image/image_83/83_Pradet_Carqueiranne_2.jpg","../image/image_83/83_Pradet_Carqueiranne_3.jpg","../image/image_83/83_Pradet_Carqueiranne_4.jpg"]},"Consult_chateau_formulaireb8fb":{"id":"Consult_chateau_formulaireb8fb","dept":"83","canton":"Cuers","commune":"Puget-Ville","nom":"Puget_Ville","type":"Vestiges","periode":"XI","histoire":"PUGET; les seigneurs se succédèrent, les Albanis, les Glandevès et les Faucon dont  il reste la tour du XIIe siècle appelé aussi tour des défends de la famille Faucon-Glandevès qui possédait au XIVe siècle les trente pour cent de la seigneurie,le village s'est construit autour du château des Albanis.                                                        Dans les environs le château de Castellas, le château Marouine de Marie Odile Marty, le château viticole de l'Aumerade  de Yannick Audibert et le château de Gipery, pavillon construit par un seigneur du Puget qui participa à l'expédition en 1164 cette demeure fut agrandit devient la maison des Entrechaux aux XVIIIe siècle remanié au XXe siècle..","architecture":"Puget tour sarrasine du XIe siècle (tour de Guet).","habitants":"famille Faucon-Glandevès\r\n        \"","divers":"","gps":"","images":["../image/image_83/83_Puget_1.jpg","../image/image_83/83_Puget_2.jpg","../image/image_83/83_Puget_3.jpg","../image/image_83/83_Puget_4.jpg"]},"Consult_chateau_formulairef009":{"id":"Consult_chateau_formulairef009","dept":"83","canton":"St-Tropez","commune":"Ramatuelle","nom":"Ramatuelle","type":"Château","periode":"XX","histoire":"RAMATUELLE, ancien village sarrasin appelé Camatulli-Corum possède un important panorama sur la baie. Château de Volterra, une construction de 1906 par un aristocrate anglais amoureux d'une belle tropézienne, acquit en 1926 par Léon Voltera  impressario parisien y reçut beaucoup  de personnalités théâtrales tel que Raimu, Josephine Baker, Colette, Jean Cocteau etc. En 1989 au décès de monsieur Voltera son épouse garda le château, à son décés le château à l'abandon pendant dix ans,  fut acheté en 1999 par un groupe canadien de Josef Schegili.","architecture":"Ramatuelle; Ancien village sarrasin appelé Camatulli-Corum possède un important panorama sur la baie maison fortifié rempart portail tour sarrasine.","habitants":"Monsieur Josef Schegili. \r\n        \"","divers":"Château de Voltera et vestige d'une tour de Garde.","gps":"","images":["../image/image_83/83_Ramatuelle_1.jpg","../image/image_83/83_Ramatuelle_2.jpg","../image/image_83/83_Ramatuelle_3.jpg"]},"Consult_chateau_formulairea155":{"id":"Consult_chateau_formulairea155","dept":"83","canton":"Tavernes","commune":"Règusse","nom":"Regusse","type":"Château","periode":"XV","histoire":"REGUSSE; a gardé des traces de ses châteaux, le premier fief des Templiers du XIe au XIVe siècle , il fut rattaché à l'ordre du Temple et à la Commanderie de Saint-Martin, et a l'arrestation des Templiers en 1309 tous les biens sont saisies sur ordres de Charles II, puis ses biens sont remis  aux Hospitaliers de Saint-Jean de Jérusalem en 1319. En 1322  Régusse passe par alliance aux mains des Castellane,  avant d'être vendu en 1564 à César Antoine d'Albert qui en 1613 la seigneurie à Michel de Grimaldi  et en 1649 érigé en marquisat par Louis XIV pour Gaspard de Grimaldi.","architecture":"Regusse; des templiers du XIIe au XIVe siècle, vestiges de portes et cour du château des Castellane du XIVe au XVIIe siècle, porte seigneuriale et deux tours sur quatre tours du château, les portes furent rasées à la Révolution, vestiges de remparts du XIIe et celle munie de meurtrières et créneaux du XVIIe siècle.","habitants":"Seigneur Gaspard de Grimaldi\r\n        \ ous le nom de Michel Pacha né à Saint-Nazaire, étant à Marseille chez les Bons-Pères et suite à l'épidémie de choléra partie en mer avec son père sur la goélette la \"Torche\" sera mousse, changea plusieurs fois de navires puis marin, officier, et capitaine au long cours en 1844, dans les messageries nationales et impériales,  arrivera a être commandant, il épousera en 1849 Marie-Louise Seris.  En 1854 son bateau échoue devant Alexandrie au lieu dit le pharo, suite à divers naufrages inventa les balises marines; nommé directeur des phares de l'empire Ottoman. en 1855, il vendit 111 feux  au  Sultan Abdul Mejid.  Décoré de la légion d'honneur en 1863, Il obtient une importante concession sur Constantinople de la, il prit le nom de Pacha et en 1863 après avoir fait fortune décida de rentrer,  deviendra maire de Sanary jusqu'en 1872, de récompense en récompense ont lui conféra le titre de Comte  Michel de Pierredon, se lança dans des constructions  fera de Tamaris un premier quartier résidentiel construira un château féérique aujourd'hui disparu, immeubles casino le Belvédère,  l'institut biologique de la marine, la villa le Croissant, la villa Pierredon et la villa l'Orientale etc à Tamaris.","architecture":"Sanary sur Mer; du château du XIXe siècle il ne reste plus rien, reste  l'institut maritime, bâtiment de l'infanterie naval, villa du Croissant, villa la Lézardine, villa Pierredon et la villa orientale àTamaris.","habitants":"Monsieur Blaise-Marius-Michel Pacha Pierredon\r\n        \"","divers":"Quelques constructions faites sur demande du Pacha.","gps":"","images":["../image/image_83/83_Sanary_Tamaris_1.jpg","../image/image_83/83_Sanary_Tamaris_2.jpg","../image/image_83/83_Sanary_Tamaris_3.jpg","../image/image_83/83_Sanary_Tamaris_4.jpg","../image/image_83/83_Sanary_Tamaris_5.jpg","../image/image_83/83_Sanary_Tamaris_6.jpg","../image/image_83/83_Sanary_Tamaris_7.jpg","../image/image_83/83_Sanary_Tamaris_8.jpg","../image/image_83/83_Sanary_Tamaris_9.jpg"]},"Consu lane, le marquis Elzéar d'Agoult qui reconstruisit le château.","architecture":"Sillans; Village fortifié dont-il reste des vestiges de remparts avec de belles tours  et des créneaux  du XIe siècle, le château fut reconstruit au XVIIIe siècle est actuellement en rénovation depuis le rachat par la commune.","habitants":"Marquis Elzéar d'Agoult\r\n        \"","divers":"Château de Sillans et de ses remparts.","gps":"","images":["../image/image_83/83_Sillans_1.jpg","../image/image_83/83_Sillans_2.jpg","../image/image_83/83_Sillans_3.jpg","../image/image_83/83_Sillans_4.jpg","../image/image_83/83_Sillans_5.jpg","../image/image_83/83_Sillans_6.jpg","../image/image_83/83_Sillans_7.jpg","../image/image_83/83_Sillans_8.jpg"]},"Consult_chateau_formulaire1249":{"id":"Consult_chateau_formulaire1249","dept":"83","canton":"Toulon","commune":"Six-Fours-les-Plages","nom":"Six_Fours","type":"Fort","periode":"XVI","histoire":"SIX-FOURS; Le village qui se trouvait sur la colline a était abandonné et un fort s'est construit avec la collégiale romane de Saint-Pierre,  château Isoar et à l'archipel des Embiez ruines du château de Sabran donjon cylindrique du XIVe siècle; villa Cécille  bastide du XVIIIe siècle.","architecture":"Six-Fours les plages ; possède un patrimoine militaire pour la défense de la ville de Toulon. Vieux village rasé reste d'enceinte urbaine et porte dites d'Ollioules, vestiges d'une tour de vigie du XVIe siècle et fort de Six Fours du XIXe siècle, fort de la Coudoulière.  Villa Cécille  bastide du XVIIIe siècle de style palladien.","habitants":"Famille de Sabran\r\n        \"","divers":"Vestiges , Fort et Villa.","gps":"","images":["../image/image_83/83_Six_Fours_1.jpg","../image/image_83/83_Six_Fours_2.jpg","../image/image_83/83_Six_Fours_3.jpg"]},"Consult_chateau_formulaireea9f":{"id":"Consult_chateau_formulaireea9f","dept":"83","canton":"Toulon","commune":"Solliès-Pont","nom":"Sollies_Pont","type":"Château","periode":"XVI","histoire":"SOLLIES-Pont; En 1468 Jean de Beauvard vend sa seigneurie  qu'il détenait du roi René a Palaméde  de Forbin, le comte Geoffroy donne Solliès aux vicomte de Marseille, puis passa aux Piégut et à la famille de Riquier, aux de Morace, aux de Baveau de nouveau aux Forbin dit le \"Grand\" et aux Porcellets et encore aux Forbin ensuite à la famille Barben, des Beaux, des Bois, des Dreux, des de Tarante, des de Gonsalve de Morance et à ses successeurs.                         Sous Louis XIV  eurent des gouverneurs de Toulon.                                   Solliès-Pont reçut la visite de Charles IX, Catherine de Médicis et Louis XIV. Sous la Révolution les soldats cantonnés dans le château y mirent le feu,  il fut reconstruit en 1862, racheté par la famille de Saporta qui le conservèrent  jusqu'au XXe siècle.                    Dans la commune le château de Castille du XVIIIe siècle construit par Jean Louis de Selle conseiller du roi et trésorier de la marine à Toulon, transformé aujourd'hui en hôtel restaurant par Josiane Liégois.                                                                                        Dans le canton château de Belgentier dit de Peirese du XVIe siècle construit par Nicolas-Claude Fabri de Peirese.","architecture":"Solliès-Pont;  édifié au XVe siècle, incendié à la Révolution fut reconstruit en 1862, corps de logis à  trois niveaux flanqués de grosses tours rondes en façade coiffées en poivrière, une cour d'honneur  fermée par une grille surmontée d'armoiries s'appuie sur deux ailes cantonnées de tours rondes à mâchicoulis.","habitants":"Famille de Saporta\r\n        \"","divers":"Beau château de Sollies-Pont, vestiges, et le château de Castill, de Belgentier.","gps":"","images":["../image/image_83/83_Sollies_Pont_1.jpg","../image/image_83/83_Sollies_Pont_2.jpg","../image/image_83/83_Sollies_Pont_3.jpg","../image/image_83/83_Sollies_Pont_4.jpg","../image/image_83/83_Sollies_Pont_5.jpg","../image/image_83/83_Sollies_Pont_6.jpg","../image/image_83/83_Sollies_Pont_7.jpg","../image/image_83/83_Sollies_Pont_8.jpg"]},"Consult_chateau_formulaire9a0b-2":{"id":"Consult_chateau_formulaire9a0b-2","dept":"83","canton":"Cotignac","commune":"St-Antonin","nom":"St_Antonin","type":"Château","periode":"XVII","histoire":"ST-ANTONIN; En 420 un pèlerin nommé St-Maur s'y installa et construisit une chapelle et en accord avec le pape Sixte III, elle prit le nom de Saint-Antonin sur un territoire qui dépendait de l'abbaye de Saint  Victor de Marseille, bien que la seigneurie fut lié aux seigneurs d'Entrecasteaux, en 1135, le village se regroupa autour de la chapelle qui prit ensuite le nom de Nôtre-Dame de l'Assomption.                                                                                Dans cette commune plusieurs châteaux dont celui de Mentonne dont une partie en façade remonte au XIe siècle, il fut la propriété de la famille des Châteaurenard seigneurs d'Entrecasteaux, plusieurs familles se succédèrent et en 1840 Charles Gasquet en devient propriétaire et le revendra en 2003 à Marie Pierre Caille, autres châteaux, le Salgues, Noé etc.","architecture":"St-Antonin du château de Mentonne  belle trace féodal, pour les autres classique du XIXe siècle.","habitants":"seigneurs d'Entrecasteaux\r\n        \"","divers":"Château de Saint-Antonin de Mentonne et de Salgues","gps":"","images":["../image/image_83/83_St_Antonin_1.jpg","../image/image_83/83_St_Antonin_2.jpg","../image/image_83/83_St_Antonin_3.jpg","../image/image_83/83_St_Antonin_4.jpg","../image/image_83/83_St_Antonin_5.jpg","../image/image_83/83_St_Antonin_6.jpg","../image/image_83/83_St_Antonin_7.jpg","../image/image_83/83_St_Antonin_8.jpg"]},"Consult_chateau_formulaire5af7-3":{"id":"Consult_chateau_formulaire5af7-3","dept":"83","canton":"Rians","commune":"St-Julien-le-Montagnier","nom":"St_Julien_Montagnier","type":"Vestiges","periode":"XII","histoire":"St-JULIEN, au XIe siècle le village était fortifié entourant un castrum  qui aujourd'hui a disparu à cette époque plusieurs co-seigneurs le plus ancien est Dame Laure au XIIe siècle, puis passa aux vicomte de Marseille, les seigneurs des Baux, les Templiers, les Hospitaliers, les seigneurs de Trians neveu du pape au XIVe siècle, les Castellane et les Meynier d'Oppède  aux XVIe siècle.      Village voisin Vinon qui du XII au XVe siècle dépendait de l'abbaye de Villeneuve les Avignon, subirent les guerres de religion et en 1710 la révolte des mulets de sel.","architecture":"St-Julien; reste des vestiges de remparts et la porte de Gourdanne du XIIIe siècle.","habitants":"seigneur Meynier d'Oppéde\r\n        \"","divers":"Vestiges de Saint-Julien de Montagnier et de Vinon.","gps":"","images":["../image/image_83/83_St_Julien_Montagnier_1.jpg","../image/image_83/83_St_Julien_Montagnier_2.jpg","../image/image_83/83_St_Julien_Montagnier_3.jpg","../image/image_83/83_St_Julien_Montagnier_4.jpg","../image/image_83/83_St_Julien_Montagnier_5.jpg","../image/image_83/83_St_Julien_Montagnier_6.jpg"]},"Consult_chateau_formulaire0cf5":{"id":"Consult_chateau_formulaire0cf5","dept":"83","canton":"Barjols","commune":"St-Martin-de-Pallières","nom":"St_Martin_Pallieres","type":"Château","periode":"XIII","histoire":"ST-MARTIN de Pallières; Mentionné en 1256, acquis en 1274 par Manuel de Vintimille seigneur de la Verdière, au XVe siècle passe aux Castellane. En  1529 François de Forbin seigneur de Solliès l'achète mais ne le garda pas, époux  d'une petite fille naturelle du roi René  l'échangera avec celui de Charles de Glandevez, le fils de celui-ci seigneur de Carossio, protestant rigide, détesté de ses sujets, les habitants de Rians viennent lui chercher querelle, en 1578  Glandevez  fut chargé  par le grand prieur de France  d'exécuter le comte de Montausier, ce que tenta Glandevez qui fut assassiner par un cuisinier.  Le fief  passa à un de ses cousins Charles d'Arcussia qui vécut beaucoup à la cour de Louis XIII.                  Au XVIIe siècle  acheté par Pierre de Laurens, le domaine érigé en marquisat.  Au XVIIIe siècle sous l'influence de François de Laurens avec son épouse Antoinette de Meulun font  d'importants remaniements en forteresse médiévale,  passa par alliance en 1774 à Gilles Dominique de Boisgelin qui épousa Marguerite de Laurens, il  décéda sur l'échafaud en 1793.  Le château subit des dégats, tours en partie détruites mais son fils Armand -Natal de Boisgelin en 1820 le restaure, releva les tours et une aile fut rajouté, toujours dans la famille des Boisgelin.","architecture":"Saint-Martin de Pallières : Village sur la colline entoure le château  de style forteresse médiévale construit au XIIe siècle,sur les bases d'un château féodal du XVIIe siècle, bâtiment carré cantonné de trois tours rondes crénelés sur corps de logis, tour en bout de l'aile rajouté au XIXe siècle remanié au XVIIe siècle et début XVIIIe siècle.","habitants":"Manuel de Vintimille Gilles                                                 \r\nDominique de Boisgelin\r\n        \"","divers":"Beau château forteresse médiévale de Saint-Martin de Pallières.","gps":"","images":["../image/image_83/83_St_Martin_Pallieres_1.jpg","../image/image_83/83_St_Martin_Pallieres_2.jpg","../image/image_83/83_St_Martin_Pallieres_3.jpg","../image/image_83/83_St_Martin_Pallieres_4.jpg","../image/image_83/83_St_Martin_Pallieres_5.jpg","../image/image_83/83_St_Martin_Pallieres_6.jpg","../image/image_83/83_St_Martin_Pallieres_7.jpg","../image/image_83/83_St_Martin_Pallieres_8.jpg","../image/image_83/83_St_Martin_Pallieres_9.jpg"]},"Consult_chateau_formulairecee7":{"id":"Consult_chateau_formulairecee7","dept":"83","canton":"Brignoles","commune":"St-Maximin-la-Ste-Baume","nom":"St_Maximin_Ste_Baume","type":"Vestiges","periode":"XVII","histoire":"St-MAXIMIN, la Sainte-Baume; renommé par le massif  de la Sainte-Baume, château couvent royal appelé \"Racine\" au cur du village   fondés en 1295 par Charles II d'Anjou roi de Sicile et comte de Provence, il fut confié à l'ordre des Dominicains jusqu'en 1959.  Le plus important du patrimoine de cette ville est la basilique  Ste-Marie-Madeleine construite en 1295  la construction dura trois siècles.  Château Maissonnier qui domine le village en 1912 fut acquit pour être transformé en hôtel,  Au hameau de plan d'Aups la colline abrite une grotte ou Sainte-Marie-Madeleine ou elle décida il y a prés de vingt-siècle d'y finir ses jours  dans la prière aujourd'hui lieu de Pèlerinage.","architecture":"Saint-Maximin; vestiges d'un château médiéval du XVIIe siècle quartier médiéval, hôtel de ville de 1305 rempart du XIVe siècle avec tour carrée à archères.  Dans le patrimoine:  La basilique Sainte-Marie Madeleine grand édifice gothique édifié au XIII-XIVe siècle, possède des orgues mondialement connues et une crypte abritant les reliques de Sainte-Marie-Madeleine, couvent royal et son magnifique cloître.","habitants":"Comte Charles II d'Anjou\r\n        \"","divers":"","gps":"","images":["../image/image_83/83_St_Maximin_Ste_Baume_1.jpg","../image/image_83/83_St_Maximin_Ste_Baume_2.jpg","../image/image_83/83_St_Maximin_Ste_Baume_3.jpg","../image/image_83/83_St_Maximin_Ste_Baume_4.jpg","../image/image_83/83_St_Maximin_Ste_Baume_5.jpg","../image/image_83/83_St_Maximin_Ste_Baume_6.jpg","../image/image_83/83_St_Maximin_Ste_Baume_7.jpg","../image/image_83/83_St_Maximin_Ste_Baume_8.jpg","../image/image_83/83_St_Maximin_Ste_Baume_9.jpg"]},"Consult_chateau_formulaire4ea0-2":{"id":"Consult_chateau_formulaire4ea0-2","dept":"83","canton":"St-Raphaël","commune":"St-Raphaël","nom":"St_Raphael","type":"Vestiges","periode":"XIV","histoire":"St-RAPHAEL; Fief des abbayes du Lerins au Xe siècle, puis St-Victor de Marseille qui élevèrent une église à l'archange Raphaël d'où le nom de Saint-Raphaël. Au Moyen-Age conflit entre les comtes de Provence et les comtes de Toulouse deviendra commanderie qui sera dissoute en 1312 et  passera à l'ordre de St-Jean de Jérusalem, puis à l'évêché de Fréjus. En 1636 un gouverneur sera nommé Jean-Vincent de Roux,  en 1754 le Vicomte Paul Barras  homme politique influant à la Révolution et en 1770 François Giraud seigneur d'Agay qui construisit un château qui sera rasé en 1793. St-Raphaël connut le passage de Bonaparte  retour d'Egypte et l'embarquement de l'Ile d'Elbe.                        Agay; un château fut construit en 1635 appelé  \"Agay\" demeure de la famille de Saint-Exupéry fut détruit en 1944 par les allemands  A l'origine Saint-Raphaël était un petit village de pêcheurs aux fils des ans est devenue une station balnéaire recherché pour son climat.                                                                                       Villa MAGALI; sur l'emplacement d'un château  à Valescure, de Léon Carvalho directeur de l'Opéra fit construire en 1875-1882 avec 43 vestiges du palais des Tuileries étalés dans le parc  avec temple d'amour, pavillons marsan, fontaines et colonnes, aujourd'hui transformé en treize appartements de luxe.                                    A Boulouris belle villa Mauresque transformé en hôtel restaurant par Sylvain Ceccoto.","architecture":"St-Raphaël;   Peu de vestiges historiques seulement des remparts du XIIe sièle avec une tour de guet haute de 30 mètres, le sémaphore du Dremont construit en 1562, la tour d'Armont propriété de la Marine nationale.                                                     Le château \"Agay\" de Saint-Exupéry fut détruit en 1944.                   Magali; pavillon néo-antique  de plaisance s'élève de quatre étages avec atiques et prolongé d'un corps de bâtiment rectangulaire à trois nivaux à ballustrades, en façade deux avant corps avec ballustrades.  Sémaphore du Dramont et Camp-Long ruine d'une tour de guet dite tour de la reine Jeanne et tour crénelée de l'Ile d'Or.","habitants":"Famille de François Giraud seigneur d'Agay\r\n        \"","divers":"Patrimoine de Saint-Raphaël, et villa mauresque.","gps":"","images":["../image/image_83/83_St_Raphael_1.jpg","../image/image_83/83_St_Raphael_2.jpg","../image/image_83/83_St_Raphael_3.jpg"]},"Consult_chateau_formulaired7d5":{"id":"Consult_chateau_formulaired7d5","dept":"83","canton":"Roquebrussanne","commune":"Rocbaron","nom":"St_Sauveur","type":"Vestiges","periode":"XII","histoire":"ST-SAUVEUR ; Le petit village de Rocbaron perché sur la colline à 517 mètres d'altitude sur une plate forme de trente mètres sur douze dominant une partie de la plaine de l'Issole, sur la colline entre les ruines de Forcalqueiret et le village de Saint-Anastasie les ruines du château féodal de saint-Sauveur.  En 1206 Guillaume de Rocbaron donne droit de pâturage sur ses terres au monastère de Montrieux, en 1228 Vend le château à Geoffroy de Reforciat baron de Forcalqueiret, membre de la famille des vicomtes de Marseille, qu'il venait d'acheter en 1217 aux frères Brémond et Raymond d'Auriol Forcalqueret ainsi que le bourg de Saint-Anastasie.","architecture":"St-Sauveur; il ne reste que des vestiges de pans de murs et de tours.","habitants":"Famille de Guillaume de Rocbaron\r\n        \"","divers":"Vestiges du château.","gps":"","images":["../image/image_83/83_St_Sauveur_1.jpg","../image/image_83/83_St_Sauveur_2.jpg","../image/image_83/83_St_Sauveur_3.jpg","../image/image_83/83_St_Sauveur_4.jpg"]},"Consult_chateau_formulaire5ab4":{"id":"Consult_chateau_formulaire5ab4","dept":"83","canton":"St-Tropez","commune":"St-Tropez","nom":"St_Tropez","type":"Château","periode":"XVI","histoire":"SAINT-TROPEZ; Petit port phocéen colonisé par les romains et à la chute de ces derniers, le pays fut ravagé par les pirates et les Sarrasins; Guillaume  d'Arles en 972  libère la presqu'île fait construire une tour à l'emplacement de la tour de Suffren. Les vicomtes de Marseille donnèrent les terres à l'Abbaye de Saint-Victor de Marseille, de 1079 à 1218, les moines  bâtissent un castrum à l'emplacement de la citadelle.   Un seigneur Génois  Raphaël Garezzio  qui sur demande de Jean de Cossa  rebâtit la ville en 1558 un capitaine de ville Honorat Coste est installé avec armée etc., 1596 premier siège de la citadelle par les tropéziens et les troupes royales, révolte contre le roi qui fit rasé la citadelle. En 1602  construction de la nouvelle citadelle par le maréchal Villars sur ordre d'Henri IV, Sully  poursuit la construction ainsi que le donjon. Siège de l'amirauté en 1649, sur ordre de Louis XIV; Colbert met fin à ses privilèges en 1672.                                                Le bailli Pierre André de Suffren remporta de grandes victoires aux Indes. En 1793 les tropéziens occupent la citadelle. Aujourd'hui musée naval. Au XVIIe siècle saint-Tropez a su prospérer en développant ses activités  tout en participant à la défense du Royaume et à la marine.                                                           La ville  en 1950 s'est développé par l'attirance  d'artistes peintres, d'acteurs cinéastes(Brigitte Bardot) et touristes qui construisirent de nombreux domaines et châteaux tel que le château Borrely, la Manssardière (article)  Bertaud, Minuty, Moutte (article),etc","architecture":"Saint-Tropez. La première citadelle fut détruite par les tropéziens en 1596 et fut relevée en 1602 par Henri IV ; fort de forme hexagonnal régulier renforcé de trois tours rondes du XVIe siècle avec bretèches et mâchicoulis et d'une vaste enceinte bastionnée du  XVIIe siècle, bâti sur un roc avec profondes douves complétés au XVIIIe siècle par une esplanade entièrement dégagée, aujourd'hui surplombé d'un chemin de ronde,   la citadelle musée naval. Château de Suffren tour massive édifié en 990 par Guillaume Ier comte de Provence,  Tour de Daumas.                 Tour de Jarlier du XVIe siècle forme un éperon face à la colline, ancienne prison  racheté par Borloo, transformé en villa et revendu depuis.                                                                                  \r\n Tour du Portalet faisait partie avec la tour Vieille des premiers éléments de défense mis en place vers la fin du XVe siècle  sur les quais, braque ses canons vers la elieu  en 1639 fonda une marine militaire et voulu  faire de Toulon un centre stratégique mais c'est sous Louis XIV que prendra une réelle expansion, par  des  fortifications et  arsenal  que fait agrandir Colbert  qui sera amélioré par Vauban en 1678. En 1707 Toulon est attaqué par Victor Amédée II,  servira de base de départ pour beaucoup d'expédition Afrique Egypte etc.               Bonaparte reconquérir la cité suite aux attaques des armées de la Convention, deviendra un centre de la force navale française. En 1825, attaqué de nouveau en 1918 et 1942, libéré  par Delattre de Tassini en 1944.                                                           \r\nAujourd'hui premier port de guerre français, redevenu évêché en 1958 et préfecture en deuxième plan.                                    \r\n Sainte Marguerite; Pons de Fos seigneur de la Garde  fit construire ce château-fort au XIe siècle et en resta propriétaire jusqu'en 1212 passa à Etienne évêque de Toulon, ensuite en échange à Honoré de Castellane en 1478 puis fut vendu à Pierre Thomas en 1527 restera dans cette famille jusqu'en 1767, occupé en 1793 par le général Lapoipe.","architecture":"Toulon; vestiges de la tour Royale 1514 ancienne forteresse de défense de la rade puis prison jusqu'à la deuxième guerre mondiale, fort Lamalgue, Saint  Antoine, Saint  Louis, des Pomets, Tour Beaumont Croix Faron et fort Faron et Porte de l'arsenal.  En 1852  l'enceinte de Vauban est remplacée par une nouvelle ceinture bastionnée et en 1923 les remparts sont en parties détruits.","habitants":"Comte Charles d'Anjou\r\n        \r\n        \"","divers":"Toulon et son patrimoine avec la Corderie, fort Royal, fort Balaguier, le Morillon, son musée, sa préfecture maritime et sa base naval.","gps":"","images":["../image/image_83/83_Toulon_1.jpg","../image/image_83/83_Toulon_2.jpg","../image/image_83/83_Toulon_3.jpg","../image/image_83/83_Toulon_4.jpg","../image/image_83/83_Toulon_5.jpg","../image/image_83/83_Toulon_6.jpg","../image/image_83/83_Toulon_7.jpg","../image/image_83/83_Toulon_8.jpg","../image/image_83/83_Toulon_9.jpg"]},"Consult_chateau_formulaire348f":{"id":"Consult_chateau_formulaire348f","dept":"83","canton":"Fayence","commune":"Tourettes","nom":"Tourettes_Puy","type":"Château","periode":"XIV","histoire":"TOURETTES,   Tourettes à conservé une villa  à la grande Bastide en  1348 Bertrand de Villeneuve qui a épousé Scaucie de Signes en 1331 s'installe à Tourettes  après avoir fait construire le château. En 1590 mission de le raser ou de le démolir,  le château qui servait de refuge des Caristes; était la propriété des évêques de Fréjus ;  André Hercule Fleury cardinal est ministre des finances le fit détruire en 1710, du château il ne reste que la tour de l'horloge. En 1830 Jacques Alexandre Fabre lieutenant colonel sous Napoléon Ier,  fut l'un des premiers polytechnicien ingénieur des ponts et chaussées, fut prisonnier   lors des guerres de Russie  puis envoyé en Sibérie. Le Tsar Alexandre Ier le fit venir à Saint-Pétersbourg et lui confia de nombreuses infrastructures  routières et d'édifices militaires, suite à cela Alexandre l'autorise a rentrer en France avec le grade de Général de l'armée de Russie et a son retour  il entreprit la construction du château des Tourettes appelé aussi Du Puy réplique parfaite de l'école des cadets de Saint-Pétersbourg.","architecture":"Touettes; Ruines du village féodal  de Puybresson  du donjon carré du castellet de Valmasque; Château du Puy  dit \"Fabre\" du XIXe siècle.","habitants":"Famille de Jacques-Alexandre Fabre\r\n        \"","divers":"Château des tourettes.","gps":"","images":["../image/image_83/83_Tourettes_Puy_1.jpg","../image/image_83/83_Tourettes_Puy_2.jpg","../image/image_83/83_Tourettes_Puy_3.jpg","../image/image_83/83_Tourettes_Puy_4.jpg","../image/image_83/83_Tourettes_Puy_5.jpg","../image/image_83/83_Tourettes_Puy_6.jpg","../image/image_83/83_Tourettes_Puy_7.jpg"]},"Consult_chateau_formulairee1c1":{"id":"Consult_chateau_formulairee1c1","dept":"83","canton":"Salernes","commune":"Tourtour","nom":"Tourtour","type":"Château","periode":"XVII","histoire":"TOURTOUR; A 630 mètres d'altitude village médiéval, En 973 une victoire fut remporté par le comte  Guillaume Ier de Provence sur les sarrasins venant de la Garde Freinet une autre victoire fut remporté par le seigneur de Grimaldi au XIIe siècle toujours contre les sarrasins ou une tour sarrasine fut construite en sa mémoire.  En 1235 Raymond Béranger IV de Provence cède aux Blacas d'Aups le droits sur Tourtour et Fox-Amphoux contre la seigneurie de Séranion, la seigneurie passe aux Puget avant d'être partagé au XVIIe siècle par des co-seigneurs  dont les de Castellane,les Esparon, les Forbin,les la Tour,les Pontevès  et les Villeneuve. Les Raphaëlis qui firent construire leur château et les Fabry également. A la veille de la Révolution Tourtour comptait douzeco-seigneurs dont aucun n'était d'ancienne noblesse provençale. Souvenir d'Anne d'Autriche lors d'un passage en 1638 pour Cotignac.  Le château de Raphaëlis du XVIe siècle abrite aujourd'hui poste et mairie. Un autre château médiéval dit \"château-Vieux\" appelé hôtel de la Bastide.                                                                              Dans la commune château de Puget abrite une galerie d'Art,  le château de la Baume  chapelle et pigeonnier et cascade au nord du village demeure de Bernard Buffet et de sa femme Annabel, et la tour Grimaldi dites\" sarrasines\" du XIIe siècle.","architecture":"Tourtour: Village fortifié au XIIIe siècle du château il ne reste quelques ruines sur le sommet dans le village château de Raphaëlis du XVIe siècle carré flanqué de quatre tours rondes  où est implanté la mairie, autre château médiéval appelé\"château-Vieux \" avec vestiges et remparts transformé en hôtel au sommet du village bâtisse en équerre à trois niveaux  flanqués d'une tour ronde toit plat appelé hôtel de la bastide, une autre tour des Grimaldi dites  \"sarrasines\" monte la garde, donjon à deux niveaux percé de meurtrières.","habitants":"Famille Raphaélis\r\n        \"","divers":"Manoir de Tourtour dit de Raphaëlis sert d'hôtel de ville entre autre, le vieux château médièval dit de la Tour (privé) reste d'une tour appelée \"tour Grimaldi\", et bastide château restaurant gastronomique de monsieur Pierre Jugy.","gps":"","images":["../image/image_83/83_Tourtour_1.jpg","../image/image_83/83_Tourtour_2.jpg","../image/image_83/83_Tourtour_3.jpg","../image/image_83/83_Tourtour_4.jpg","../image/image_83/83_Tourtour_5.jpg","../image/image_83/83_Tourtour_6.jpg","../image/image_83/83_Tourtour_7.jpg","../image/image_83/83_Tourtour_8.jpg","../image/image_83/83_Tourtour_9.jpg"]},"Consult_chateau_formulairea7fa":{"id":"Consult_chateau_formulairea7fa","dept":"83","canton":"Draguignan","commune":"Trans-en-Provence","nom":"Trans","type":"Château","periode":"XIII","histoire":"TRANS; Les protestants élevèrent en 1571 le château à Esclans des Villeneuve, famille d'origine catalane règne de 1200 à 1790  habité le château dit forteresse, qui  fut construit par Giraud de Villeneuve et détruit pendant les guerres de religion, la façade du château existe toujours (mairie). Du portail d'entrée on voit encore un montant mais le bâtiment tellement restauré ne ressemble plus à un château.  Dans la commune le château du Rouët, ferme templière. En 1840  la famille Savatier acquit le domaine viticole, en 1880 trois générations son propriétaire les Reverdit, les Lazane et les Savatier qui décidèrent de construire le château qui est inchangé depuis et toujours dans la famille Savatier.                       La gentilhommière de Font du Broc hôtel restaurant.                                A Trans, les puits aériens ( tour de récupération de la rosée ambiante ) de l'ingénieur Achile Knepp en 1930 malheureusement ce système conçu pour l'Afrique  n'a pas donné satisfaction dans la Provence.","architecture":"Trans en Provence; château construit au XIII, dont la façade existe toujours (mairie).","habitants":"Famille de Giraud de Villeneuve \r\n        \"","divers":"L'ancien château aujourd'hui mairie  et les puits aériens.","gps":"","images":["../image/image_83/83_Trans_1.jpg","../image/image_83/83_Trans_2.jpg","../image/image_83/83_Trans_3.jpg","../image/image_83/83_Trans_4.jpg","../image/image_83/83_Trans_5.jpg","../image/image_83/83_Trans_6.jpg"]},"Consult_chateau_formulaire8bdc-3":{"id":"Consult_chateau_formulaire8bdc-3","dept":"83","canton":"Comps-sur-Artuby","commune":"Trigance","nom":"Trigance","type":"Château","periode":"XII","histoire":"TRIGANCE.Village au IXe siècle fief de l'abbaye de  Saint-Victor de Marseille avant de devenir le fief du comte de Provence au XIe siècle. En 1247 fief des Alasaciè, à la mort du seigneur, sa veuve qui hérita les seigneuries de Rougon, de la Palud, de la Martre et de Brénon fit don de tous ses biens en 1248 à l'Ordre de l'Hôpital.     En 1250  Romée de Villeneuve principal conseillé  du comte de Provence Raymond Béranger V  fit partager le fief entre co-seigneurs, notamment  Fouquet III de Pontevès, aux Demandolx puis à Jean Ier de Raimondis dit le \"Gros\" qui deviendra le seigneur majeur de Trigance au XVe siècle, homme de guerre de la reine Jeanne. Claude de Demandolx qui épousa Brigitte-Claudine de Lascaris, succède à son père  qui passera de père en fils jusqu'en  1704   qui perdirent la seigneurie suite aux alliances avec Vesto-Cosme-Maximilien  de Valbelle seigneur de Trigance et passera ensuite à Henri de Majastres jusqu'à la Révolution.  Propriété de monsieur Hartmann aménagé en hôtel restaurant.","architecture":"Trigance; Sur un éperon rocheux  au XIe siècle les moines de Saint-Victor édifièrent la puissante forteresse féodale   à quatre tours rondes crénelées, tombé à l'abandon en 1960 a été restauré par deux famille successives.","habitants":"Famille de Jean de Raimond\r\n        \"","divers":"Château et vestiges à Trigance","gps":"","images":["../image/image_83/83_Trigance_1.jpg","../image/image_83/83_Trigance_2.jpg","../image/image_83/83_Trigance_3.jpg","../image/image_83/83_Trigance_4.jpg","../image/image_83/83_Trigance_5.jpg","../image/image_83/83_Trigance_6.jpg","../image/image_83/83_Trigance_7.jpg","../image/image_83/83_Trigance_8.jpg","../image/image_83/83_Trigance_9.jpg"]},"Consult_chateau_formulairecc48":{"id":"Consult_chateau_formulairecc48","dept":"83","canton":"Brignoles","commune":"Tourves","nom":"Valbelle_Tourves","type":"Vestiges","periode":"XI","histoire":"VALBELLE; Ancienne station de la via Aurélia sur la voie romaine au XIVe siècle fut donné  aux Arcussia par la reine Jeanne de Naples comtesse de Provence et de Forcalquier, puis passa aux Vintimille et  à Jean Baptiste de Valbelle conseiller au parlement de Provence,  qu'il reçu en dot de son épouse  Marguerite de Vintimille héritière de la seigneurie  en 1650.  Issu d'une grande famille provençale Joseph-Alphonse-Omer de Valbelle  né en 1729, Comte, marquis de Tourves, baron de Saint-Symphorien, seigneurs de Signes de Cadaraches, du Revest et de Cucuron, maréchal de camp et lieutenant du roi Louis XVI en Provence,  transforma à son gout l'ancien château médiéval en un vaste palais copie de celui de Sextius de Rome. Après sa mort en 1778 le château passa aux Castellane, saisi comme bien national à la Révolution transformé en garnison militaire, puis en hôpital pour les troupes des armées italiennes,  en 1799 commence la démolition et il fut incendié.                              Aujourd'hui propriété de la ville de Tourves, le parc existe.","architecture":"Valbelle; du château dont les fondations date du XIe siècle vaste palais qui fut élevé à la fin du XVIIIe siècle sur l'emplacement de l'ancien château féodal, détruit par un incendie, ses ruines témoignent du XVIIIe siècle pour l'antiquité gréco-romaine, colonnade de la façade du château, l'obélisque repris d'après la pyramide de Sextius à Rome et la Vacherie en forme de Temple (ancienne laiterie du château).","habitants":"Famille des seigneurs de Jean-Baptiste de Valbelle                            Joseph-Alphonse-Omer de Valbelle\r\n        \"","divers":"Château de Valbelle avec sa partie ruinée et sa Vacherie, et le château de Lafoux","gps":"","images":["../image/image_83/83_Valbelle_Tourves_1.jpg","../image/image_83/83_Valbelle_Tourves_2.jpg","../image/image_83/83_Valbelle_Tourves_3.jpg","../image/image_83/83_Valbelle_Tourves_4.jpg","../image/image_83/83_Valbelle_Tourves_5.jpg","../image/image_83/83_Valbelle_Tourves_6.jpg","../image/image_83/83_Valbelle_Tourves_7.jpg","../image/image_83/83_Valbelle_Tourves_8.jpg","../image/image_83/83_Valbelle_Tourves_9.jpg"]},"Consult_chateau_formulairefb88-2":{"id":"Consult_chateau_formulairefb88-2","dept":"83","canton":"Draguignan","commune":"La Motte","nom":"Valbourges","type":"Château","periode":"XVIII","histoire":"VALBOURGES: Au XIIIe siècle le comte de Provence offrit le fief de Valbourges à une famille les Villanova devenus les Villeneuve qui deviendront les premiers marquis de France.                           A la fin du XVIIIe siècle les Villeneuve-Flayosc dont le château avait été  brûlé à la Révolution apportèrent une nouvelle façade.                                 En 1870 le marquis de Villeneuve dut se séparer de son château  suite à des dettes de jeux,  passa à un de ses cousins les Boisgelin qui en firent une résidence  estivale il fut racheté en 1918 par une famille de constructeur d'automobiles marseillais, les Turcat-Mery il est toujours dans la descendance.","architecture":"Valbourges ; construit  au XIIIe siècle reconstruit  en 1790 corps de logis rectangulaire à trois niveaux pavillons en retrait sur la partie droite avec tour d'escalier incorporé au trois quart.","habitants":"Famille Villanova\r\n        \"","divers":"Château de Valbourges.","gps":"","images":["../image/image_83/83_Valbourges_1.jpg"]},"Consult_chateau_formulaire1b43":{"id":"Consult_chateau_formulaire1b43","dept":"83","canton":"Toulon","commune":"Valette-du-Var","nom":"Valette","type":"Vestiges","periode":"XVIII","histoire":"VALETTE; Le bon roi René comte de Provence autorisa la donation du domaine de Beaudouvin et du château de la Valette à Eléon de Glandevès seigneur de la Garde.  Gaspard de Thomas  baron de la Garde vendit en 1612 le château à Claude Cabasson écuyer de la Valette, le fief de Beaudouvin, passa par alliance avec Blanche de Cabasson à Jacques Rippert seigneur du Revest.                      En 1785 le château est remplacé par le celui actuel propriété de  la famille Calabro. Au XIXe siècle l'héritière de monsieur Benêt épouse monsieur Félix Vincent et Henri de Rothschild en devient propriétaire en 1926 grâce à monsieur Bonnefoy, en 1942 résidence du préfet maritime jusqu'en 1986 date à laquelle la commune le racheta.                                                                                     Plusieurs forts Caudon Baou et Redon.","architecture":"Valette: reste d'un donjon du château et des courtines, quelques rares vestiges des fortifications et du château devenu école reste porte Dindre sur la vieille ville  et porte du château.","habitants":"Famille de Claude Cabasson                                                          Famille Calabro.\r\n        \"","divers":"Château de Valette","gps":"","images":["../image/image_83/83_Valette_1.jpg"]},"Consult_chateau_formulaired599":{"id":"Consult_chateau_formulaired599","dept":"83","canton":"Rians","commune":"La Verdière","nom":"Verdiere","type":"Château","periode":"X","histoire":"VERDIERE; Au cur et au sommet du village du même nom dont les origines remontent au Xe siècle, une forteresse fut bâti par la puissante famille de Castellane au XIIe siècle. Par alliance  d'Aymare de Castellane passe avec Vincent-Anne de Forbin d'Oppède en 1613 qui donnèrent à la forteresse une allure conviviale. En 1750 Louis Roch de Forbin, marquis d'Oppède,  officier du roi, vient se fixer à la Verdière, fit exécuter des travaux importants dans son château, le transformant en style de plaisance.  Pillé à la Révolution, les Forbin qui récupérèrent une partie de leurs mobiliers et objets d'arts s'en séparèrent et les Barben en héritèrent au XIXe siècle.","architecture":"Verdière; du château primitif  du Xe siècle il ne reste que des murs épais l'édifice soutenue par des voûtes cette  forteresse devient maison de plaisance avec   plusieurs corps de logis à trois étages en équerre sur deux côtés d'une cour spacieuse et d'une cour des communs, escalier dans la tour ronde, construit au XIIe siècle remanié au XVIIIe siècle en plaisance, y rajouta une aile au sud et  dota l'intérieur d'un riche décor de stuc de style néoclassique.","habitants":"Famille de Louis Roch de Forbin                                        \r\naujourd'hui à la famille Champervière\r\n        \"","divers":"Château de la Verdière.","gps":"","images":["../image/image_83/83_Verdiere_1.jpg","../image/image_83/83_Verdiere_2.jpg","../image/image_83/83_Verdiere_3.jpg","../image/image_83/83_Verdiere_4.jpg","../image/image_83/83_Verdiere_5.jpg","../image/image_83/83_Verdiere_6.jpg"]},"Consult_chateau_formulaire54c5":{"id":"Consult_chateau_formulaire54c5","dept":"83","canton":"Aups","commune":"Verignon","nom":"Verigon","type":"Château","periode":"XI","histoire":"VERIGNON, au Xe siècle les seigneurs de Blacas qui étaient seigneur d'Aups s'installèrent à Vérignon y firent construire un château dont les ruines son voisines au château actuel.  Ils conservèrent la seigneurie jusqu'en 1947 puis passa à la famille de Rémusat et toujours dans sa descendance.","architecture":"Vérignon, le château des Blacas dans le village sur un éperon rocheux ruiné au XVIIIe siècle enceinte flanqué de tours rondes et d'un corps de logis rectangulaire dans un angle au nord.                                         Le nouveau château construit au milieu du parc au XVIIIe siècle style grande bâtisse rectangulaire à deux niveaux avec échauguettes en angles.","habitants":"Famille de Blacas\r\n        \"","divers":"Vestiges de l'ancien et nouveau château.","gps":"","images":["../image/image_83/83_Verignon_1.jpg","../image/image_83/83_Verignon_2.jpg","../image/image_83/83_Verignon_3.jpg","../image/image_83/83_Verignon_4.jpg","../image/image_83/83_Verignon_5.jpg","../image/image_83/83_Verignon_6.jpg","../image/image_83/83_Verignon_7.jpg"]},"Consult_chateau_formulaire5901":{"id":"Consult_chateau_formulaire5901","dept":"83","canton":"Salernes","commune":"Villecroze","nom":"Villecroze","type":"Maison forte","periode":"XVI","histoire":"VILLACROZE; Vers 1150 du fief des seigneurs de Salernes, passa aux Entrecastaux, aux Tourtour et aux Falyosc donnent aux templiers le domaine du Ruou, Salgues et Salguettes. En 1157 ces biens sont remis à Pierre de la Rovière maître de la milice du temple de Provence. Tous ces biens furent détruit au XIVe siècle la commanderie transférée à Montfort sur Argens  puis à Saint-Jean de Marseille au XVIe siècle. En 1626 l'unique héritière les Castellane Louis de Gallian des Issarts. Dans la commune le château Thuerry viticole de Croquet Jean-Louis.","architecture":"Villacroze: du château féodal il ne reste plus rien sinon quelques vestiges  dans le village et au sommet de celui-ci  grosse bâtisse accolée d'une tour ronde arasée.","habitants":"Famille de Pierre de la Rovière \r\n        \"","divers":"patrimoine et Château de Villecroze et de Thuerry.","gps":"","images":["../image/image_83/83_Villecroze_1.jpg","../image/image_83/83_Villecroze_2.jpg","../image/image_83/83_Villecroze_3.jpg","../image/image_83/83_Villecroze_4.jpg","../image/image_83/83_Villecroze_5.jpg","../image/image_83/83_Villecroze_6.jpg"]},"Consult_chateau_formulaireefd4":{"id":"Consult_chateau_formulaireefd4","dept":"83","canton":"Brignoles","commune":"Vins-sur-Caramy","nom":"Vins","type":"Château","periode":"XVI","histoire":"VINS sur Caramy; le castrum Vincinis  fut érigé en 1060 le petit village est évacué dans la plaine pour y créer un nouveau château; fief des Entrecastaux qui passa aux de Garde. Un château fut construit en 1543 par  Hubert de Garde baron de Vins qui possédait la seigneurie de Saint-Marc, prés d'Aix et président au parlement d'Aix officier de cavalerie fait des campagnes militaire avec le duc d'Anjou futur Henri III, il épouse Marguerite d'Agoult qui lui apporte la seigneurie de Forcalqueiret, succède à son oncle Jean de Pontevés comte de Carcés devient chef de la ligue de Provence, il meurt au combat en 1586 au siège de Grasse.  Le château est resté  intact, Erigé en marquisat en 1641.  Vendu comme bien national à la Révolution, divisé  en dix lots, au XXe siècle le château se dégrade,  jusqu'en 1930 avant d'être vandalisé et abandonné, puis rénové par un nouveau propriétaire monsieur Bonnet qui  l'acquis en 1959. l'inscrit aux M.H  appuyé depuis 1982 par une association des amis du château . Aujourd'hui  le conseil général l'utilise pour diverses manifestations, réception de fêtes familiales mariages séminaires etc.","architecture":"Vins sur Caramy; château construit en 1543 de forme quadrilatère à deux  étages sur assises de défense percées de meurtrières, avec cour d'honneur de 200 mètres avec doubles loggias à arcade et porte à voûte romane, carré flanqué de quatre tours rondes en angles, au XVIIIe siècle les meurtrières sur la façade nord ont été remplacées par des fenêtres à meneaux.","habitants":"Famille de Hubert de Garde\r\n        \"","divers":"Château de Vins en Caramy","gps":"","images":["../image/image_83/83_Vins_1.jpg","../image/image_83/83_Vins_2.jpg","../image/image_83/83_Vins_3.jpg","../image/image_83/83_Vins_4.jpg","../image/image_83/83_Vins_5.jpg","../image/image_83/83_Vins_6.jpg","../image/image_83/83_Vins_7.jpg","../image/image_83/83_Vins_8.jpg","../image/image_83/83_Vins_9.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','83 — Var'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
