type":"Château","periode":"XVII","histoire":"Grand-Lemps: Au XIIIe siècle le village s'appelle Lemps, divisé en deux  hameaux, le plus petit au lieu dit les vignes et  dessous le château féodal, l'autre sis à la Montagne, la seigneurie était aux de Bressieux .   En  1250 et 1316 subirent des attaques par les ducs de Savoie et par Humbert de Paladru. Aymar de Bressieux voulut se venger, mais un traité fut signé à Burcin en 1326 par l'intermédiaire de Geoffroy de Clermont et Hugues de Bressieux  qui permit de repeupler le village. Geoffroy de Bressieux  fils d'Aymar retrouva la baronnie et en 1378 laissa les terres de Lemps à son gendre Aymar de Clermont; cette branche des Bressieux s'éteignit en 1403.  En 1413 le domaine passa a son frère Antoine qui habitait au château de Chirens et en 1346, le futur roi Louis XI transmet le domaine à Jean Copier-Paillet, lieutenant au gouvernement du Dauphiné et en janvier 1448 il est revendu à Aymar de Poissieu, en 1509 repasse à Philibert de Clermont, branche des Montaison Claude succéda à son père puis vint Antoine qui revendit en octobre 1614 à Arthur Prunier seigneur de Saint -André en Royans,  président du parlement à Grenoble, et en 1617 Françoise de Prunier entra dans les Dames de Montfleury,  reçut en dot la seigneurie de Lemps. Adrien deuxième fils d'Arthur et d'Honnorade de Simiane fit reconstruire le château  et l'intérieur des murs ainsi que les halles. Adrien II seigneur de Lemps épouse en 1665  Marie de Montchenu, son fils François de Prunier épousa en 1703  Barbe de la Croix de Chevrières de Saint-Vallier. \r\nPuis en 1711 leur fils  Jean-Baptiste Prunier  marquis de Lemps capitaine au régiment de Bretagne , maréchal de camp en 1759 et commandant du régime en Vivarais, épouse Anne Armande  de la Vincelaye, ils eurent une fille Nicole qui épousa Bertrand, comte de Pérouse, gentilhomme du duc de Savoie, elle était propriétaire du domaine, mourut sans enfant.   \r\nA la Révolution, le châtelain était Charles  Sappeay; notaire au Grand Lemps.  \r\nVers 1800 le domaine fut vendu aux seigneurs de Virieu qui  y vivèrent jusqu'en 1886 ( leur château de la Pupetières ayant beaucoup souffert pendant la Révolution.","architecture":"Le château serait l'ancien beffroy","habitants":"Seigneur de Bressieux                                                                      Jean coppet Paillet                                                                      Seigneur de Clermont\r\nFamille Prunier\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Grand_Lemps_1.jpg","../image/image_38/38_Grand_Lemps_2.jpg"]},"Consult_chateau_formulaire8f9f":{"id":"Consult_chateau_formulaire8f9f","dept":"38","canton":"Tour-du-Pin","commune":"Montrevel","nom":"Grange (38)","type":"Maison forte","periode":"XVI","histoire":"Grange: Au XVe siècle le mandement fut vendue à Claude de Virieu, dés le XVIe siècle, la branche des Virieu-Pupetières y séjourna . \r\nL'artiste peintre Stéphanie de Virieu et son frère Aymon, l'ami de Lamartine, y vécurent au début du XIXe siècle.","architecture":"Dans ce village il reste les vestiges d'un ancien château dit le château de \"Montenvers\"qui était un point stratégique de défense. Il subit en 1347 des assauts du comte de Savoie et il fut détruit pendant les guerres de religion. La maison forte de la Grange ensemble du XVIe siècle n'a subit très peu de transformation depuis sa construction, le corps de logis à une toiture en tuiles écaillées,et  a conservé les fenêtres à meneaux.","habitants":"Famille de Claude de Virieu\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Grange_Montrevel_1.jpg"]},"Consult_chateau_formulaireb0ad":{"id":"Consult_chateau_formulaireb0ad","dept":"38","canton":"Pont-de-Beauvoisin","commune":"Granieu","nom":"Granieu","type":"Vestiges","periode":"","histoire":"Granieu: La seigneurie a été acquise le 19 Juin 1545 par Antoine de Gratet originaire du Bugey, de François de Virieu-Beauvoir  seigneur de Faverges, elle était donc à l'origine aux Virieu, comme de nombreuses autres de cette région . Pierre Jacques de Gratet, fils du précédent , après avoir pris une part active aux guerres de religion devint trésorier général du Dauphiné et anobli par Henri IV en 1594. En 1604 François de Gratet acquiert terres et seigneuries de Leyssin, Chimilin et Aoste. En 1609 son frère Pierre acquiert celle des Avenières, du Bouchage et de Brangues , cette branche porte le titre de vicomte de Bouchage.  En 1640 Etienne de Garsanlan avait épousé Marie Magnin de la Cornière, qui après sa mort se remaria à Pierre Belot de Rosarges ,Pierre de Garsanlan capitaine châtelain de Granieu épousa Françoise de Loras, ils eurent une fille , Laurence qui épousa en 1697 Joseph de Corbeau de Lansrey, elle épousa en secondes noces Gaspard Gallin, médecin, qu'elle fit son héritier.","architecture":"Granieu; château construit au XIIIe siècle.De plan rectangulaire à trois niveaux, flanqué de lucarnes.","habitants":"Famille de Virieu Beauvoir\r\nFamille de Gratet\r\n        \r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Granieu_1.jpg"]},"Consult_chateau_formulairea2f4":{"id":"Consult_chateau_formulairea2f4","dept":"38","canton":"Grenoble","commune":"Grenoble","nom":"Grenoble_Palais","type":"Palais","periode":"XV","histoire":"Grenoble: A son emplacement s'élevait primitivement le Palais Dalphinal, construit au début du XIIIe  dont la cour du trésor, rue Hector Berlioz , demeure l'unique vestige, le palais fut agrandi au fil des siècles , en 1343, Humbert II, y fit construire des bâtiments destinés à abriter l'hôtel, le conseil delphinal et la chambres des comptes. En Juin 1453, le Dauphin Louis,  futur roi Louis XI, entreprend  l'élévation du conseil Delphinal au rang de parlement; Grenoble, capital du Dauphiné devient la troisième ville parlementaire du Royaume ,  après Paris et Toulouse, le bâtiment médièval jugé indigne de cette prestigieuse fonction,  décision est prise de le rebâtir, chose faite au XVe siècle.  Au XVIIIe siècle les Evéques de Grenoble étaient nommés  prince de la ville tel que Paul de Chaulnes, Jean Caulet,  etc... La présence du parlement devait fortement influer sur le développement de Grenoble. Magistrats et avocats devinrent progressivement l'élite, tant financier qu'intellectuelle, se faisant construire de somptueux hôtels particuliers.  Du  parlement Delphinal passa  palais de justice le 30 septembre 1790, privé  de ses prérogatives législatives, le bâtiment demeure toutefois le siège de la justice du nouveau département de l'Isère, il le restera jusqu'en 2003.  Hôtel  Lesdiguières résidence Grenobloise du connétable, construit en 1630 au sommet de sa gloire fut acheté en 1719 par la municipalité pour abriter la maison de la ville  jusqu'en 1967, ce bâtiment  complexe où subsiste encore une tour du palais dalphinal, est procédé d'un jardin à la française.  La famille Villeroy sera l'héritière des biens du Duc de Lesdiguières.","architecture":"Le Palais commencés à la fin du XVe siècle, les travaux s'achevèrent sous Henri IV. La partie centrale, comprenant la chapelle et le passage voûté, relevant du gothique flamboyant, est la partie la plus ancienne. La partie droite de la façade, érigée à partir des années 1520, témoigne de l'art de la renaissance qui s'imposait à l'époque en France. Remanié à la fin du XIXe siècle. l'aile gauche, qui abritait la prison, est rebâtie en style renaissance.","habitants":"Louis XI \r\nFamille de Lesdiguières\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Grenoble_Palais_1.jpg","../image/image_38/38_Grenoble_Palais_2.jpg","../image/image_38/38_Grenoble_Palais_3.jpg","../image/image_38/38_Grenoble_Palais_4.jpg"]},"Consult_chateau_formulaire231f":{"id":"Consult_chateau_formulaire231f","dept":"38","canton":"Grenoble","commune":"Grenoble","nom":"Grenoble_Patrimoine","type":"Tour","periode":"XIII","histoire":"Grenoble qui s'appelait en 43 avant J.C  Cularo et en 252  toujours sous la domination de l'autorité de Vienne fut ceinturée d'une enceinte fortifiée avec trente tours, vers 379  pris le nom de Gratianopolis, plus tard Gragnavol, puis Grenoble. Cette ville fut sertie  durant 1200 ans par son enceinte romaine, fut agrandie par deux fois au XVIIe siècle. Cette enceinte bastionnée, mal conçue et peu entretenue, fut critiquée par Vauban qui l'améliora et l'agrandissant sur le sud.  Capitale des Dauphins à la ville de parlement à l'unique seigneurie au sortir des siècles obscurs succéda la concurrence de deux pouvoirs , ecclésiastique et laïc, évolution acquise dès l'épiscopat de Saint-Hugues entre le palais et la cathédrale.                                                                     \r\n Tour de l'Isle, date d'une catastrophique inondation , c'est en 1390 qu'elle fut bâtie  par les consuls de la ville qui en firent leur demeure avant d'être intégrée dans l'enceinte fortifiée, sous Louis XIII, à l'extrémité du rempart, un  massif édifice quadrangulaire couronné de mâchicoulis sur console et hébergea  jusqu'à la révolution le gouverneur de la ville et de 1887 à 1954 elle abrita les 300 pigeons des services colombophiles de l'armée. Cette tour archaïque dans sa conception est avant tout la manifestation du pouvoir consulaire de la bourgeoisie grenobloise. Aujourd'hui  incluse dans le musée, elle abrite le cabinet de dessins.                       La porte Saint-Laurent construite en 1395 sous le règne des Dauphins, elle fut entièrement reconstruite plusieurs fois, notamment en 1406, 1595 et en 1615 sur ordre de Lesdiguières pour agrandir la ville de Grenoble La porte commandait la route de Chambery.  François de Bonne duc de Lesdiguières , gouverneur du  Dauphiné , établit en 1614  une courtine (mur) et un fossé, cet espace remplacé par une série de \"casemates\" dont le profil plongeait dans l'Isère.                                                                La Porte de France passage qui permit de contrôler les accès en hauteur et servait d'accueil aux personnalités, cette dernière est ornée de bas reliefs attribués à Jacob Richier, sculpteur.","architecture":"La tour de l'Isle:  plan légèrement Barlong, de 23 m de haut, carrée, compte quatre niveaux séparés par des planchers et reliés entre eux par des escaliers de bois. Le deuxième niveau, aux ouvertures rares, abritait les archives. Au troisième, largement éclairé par des fenêtres à meneaux  se tenait les réunions du conseil municipal. Les éléments  défensifs étaient concentrés sur les façades ouvertes sur l'extérieur et aux niveaux inférieurs. Quatre archères étaient percées sur la face est, deux sur la face nord et une sur la face sud. Sous cette dernière, une bouche à feu complétait le dispositif.  Pavillons de la porte de France construit en 1620 par Lesdiguières. La porte de Chalamont et  la Perrière en rives droites ces dernières aujourd'hui disparues mais reste la Porte Saint-Laurent d'aspect monumental avec ses trois ouvertures voûtées,  ses herses et ses créneaux,  la porte Saint-Laurent dispositif défensif sera réhabilitée vers l'intérieur au début du XVIIIe siècle. Conservée dans les ouvrages du XIXe siècle, elle est encadrée aujourd'hui par les casemates et des murs élevés dans la période  1835-1840. Les casemates de Saint-Laurent, du XIXe siècle desservaient les embrasures d'artilleries, l'étage inférieur  des quais porte à bonne hauteur les \"casemates haxo\"  du nom du général qui en établit le principe.                                                           Elles accueillent aujourd'hui le centre culturel scientifique et technique.","habitants":"Louis XI Lesdiguières\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Grenoble_Patrimoine_1.jpg","../image/image_38/38_Grenoble_Patrimoine_2.jpg","../image/image_38/38_Grenoble_Patrimoine_3.jpg","../image/image_38/38_Grenoble_Patrimoine_4.jpg","../image/image_38/38_Grenoble_Patrimoine_5.jpg"]},"Consult_chateau_formulaire37ef":{"id":"Consult_chateau_formulaire37ef","dept":"38","canton":"Voiron","commune":"St-Nicolas-de-Macherin","nom":"Hauteford","type":"Château","periode":"XVII","histoire":"Hauteford: Ce château à l'origine maison forte construit au XVIIe siècle  par la famille de Clermont, puis passa à la famille Gumin, puis aux  Meffrey et au Morand de Jouffrey. Aujourd'hui abrite plusieurs locataires.","architecture":"Le château d'Hautefort, corps de logis quadrangulaire flanquait de quatre tours en angles,  rondes à l'avant et carrées à l'arrière.","habitants":"Famille de Clermont\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Hauteford_1.jpg"]},"Consult_chateau_formulaired128":{"id":"Consult_chateau_formulaired128","dept":"38","canton":"Tour-du-Pin","commune":"St-Geoire-en-Valdaine","nom":"Hauterives (38)","type":"Maison forte","periode":"XI","histoire":"Hauterives: Dépendance du château de la Rochette, bâtie au XIe siècle, elle fut longtemps la propriété de l'évêque de Vienne, et vit naître le Bienheureux  Amédée d'Hauterives , neveu du premier dauphin Guigues d'Albon qui, vers 1119, se retira avec son fils à l'abbaye cistercienne de Bonnevaux. \r\nLa maison abrita également le couvent des bénédictines qui s'établirent par la suite au centre ville , dans l'ancien château devenu aujourd'hui l'hôtel de ville.","architecture":"Le château d'Hauterives, bâtie au XIe siècle, se compose de deux bâtiments légèrement décalés portant des fenêtres à meneaux.","habitants":"Famille d'Amédée d'Hauterives\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Hauterives_1.jpg"]},"Consult_chateau_formulaireb5bd":{"id":"Consult_chateau_formulaireb5bd","dept":"38","canton":"Monestier-de-Clermont","commune":"Treffort","nom":"Herbelon","type":"Maison forte","periode":"XVII","histoire":"Herbelon: Inféodé  à la famille Béranger était rattaché au mandement de la Mure en 1448 et à celui de la Cluse de Paquier. \r\nAu XVIIIe siècle  André-Claude Ravier  seigneur de Treffort fit rénover le château d'Herbelon construit auparavant  en 1603 par un seigneur  Claude Sarrazin qui faisait parti des biens du chevalier de Sinard.  Marie Vignon maîtresse du duc de Lesdiguières aurait résidé dans cette maison forte (une légende) ?, elle a probablement pris naissance du fait que la femme du drapier Ennemond Matel fut faite marquise de Treffort. \r\nLe Château fut acheté par Léonce-Emile Durant-Savoyat  1847-1903, né à Monestier de Clermont , sénateur de l'Isère en 1891 et depuis 1979  il fut racheté par la famille Castillan qui le transforma en hostellerie.","architecture":"Bâtisse carrée flanquée de deux tours d'angles restantes opposées, les fenêtres à meneaux doublées en façade.","habitants":"Famille Claude Sarrazin \r\nFamille André-Claude Ravier \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Herbelon_1.jpg","../image/image_38/38_Herbelon_2.jpg"]},"Consult_chateau_formulaire5e0a":{"id":"Consult_chateau_formulaire5e0a","dept":"38","canton":"Echirolles","commune":"Herbeys","nom":"Herbeys","type":"Château","periode":"XIV","histoire":"Herbeys: Résidence épiscopal; de 1343 à 1790 le château a été la propriété des Evêques de Grenoble, cette propriété fut donnée par Humbert II dernier dauphin du Viennois aux évêques qui l'on progréssivement aménagée;   (aménagements commencées par Pierre Scarron évêque de 1620 à 1668, poursuivis par le cardinal le Camus  avec la collaboration de l'architecte Dieulamant ), le dernier prélat à y avoir résidé été Monseigneur Hay de Bouteville, qui s'y suicida le 7 Octobre 1788. Il a été vendu en 1791 comme bien national, racheté par la famille Finas qui le restaure, puis vendu à la  famille le Camus  jusqu'au début du XXe siècle, puis la  famille Piat-Desvial  dont le souvenir est encore vivant.","architecture":"Au départ c'était une maison forte peu confortable, composé d'un pavillon central et de deux corps de logis, l'état actuel date du XVIIe siècle ou  a cette époque le cardinal le Camus transforma la tour carrée se trouvant sur le domaine en un énorme dôme, lui rajoutant deux ailes.","habitants":"Cardinal Pierre Scarron  \r\n Cardinal le Camus\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Herbeys_1.jpg"]},"Consult_chateau_formulaire70c3":{"id":"Consult_chateau_formulaire70c3","dept":"38","canton":"St-Egrève","commune":"Quaix-en-Chartreuse","nom":"Herculais","type":"Manoir","periode":"XIII","histoire":"Herculais: Au XIIIe siècle, il était un rendez-vous de chasse apprécié par le dauphin. Ce manoir conserve le souvenir de Marie Vignon, maîtresse du duc de Lesdiguières, et plus proche de nous, du Général Brun,  maréchal de camp, baron d'empire  qui prit part au siège de Toulon sous les ordres de Bonaparte. Prisonnier  à Leipzig en 1813, il s'éteindra  à Quaix ou un monument est élevé en sa mémoire .","architecture":"D'un aspect simple se manoir se compose d'un corps de logis carré, flanqué de deux tours , dont l'une ronde, abrite un escalier à vis.","habitants":"Famille de Marie Vignon     \r\nFamille du Général Brun\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Herculais_1.jpg"]},"Consult_chateau_formulairedea9":{"id":"Consult_chateau_formulairedea9","dept":"38","canton":"St-Marcellin","commune":"Chatte","nom":"Hieres","type":"Maison forte","periode":"XVII","histoire":"Hieres: Cette maison forte connu dés 1305 appartenait  aux  Brochenu, jusqu'en 1680 puis passa aux du Vache Seigneur de l'Albenc et passa à la famille Chaberlière qui en sont toujours propriétaire.","architecture":"La maison forte d'Hières corps de logis rectangulaire à trois niveaux avec il de buf en série et flanqué d'une tour ronde et d'une superbe chapelle.","habitants":"Famille Chanberlière\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Hieres_1.jpg"]},"Consult_chateau_formulaire6091":{"id":"Consult_chateau_formulaire6091","dept":"38","canton":"Goncelin","commune":"Cheylas","nom":"Hurtières","type":"Manoir","periode":"XV","histoire":"Hurtières: Ce manoir de style renaissance fut le quartier général de Lesdiguières lors de la bataille de Villars-Noir qui opposa les Dauphinois aux  Savoyard en 1591","architecture":"Manoir d'Hurtières du XVe siècle a gardé sa tour ronde d'entrée avec ses fenêtres à meneaux.","habitants":"Duc de Lesdiguières\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Hurtieres_1.jpg","../image/image_38/38_Hurtieres_2.jpg"]},"Consult_chateau_formulairecd24":{"id":"Consult_chateau_formulairecd24","dept":"38","canton":"Pont-en-Royans","commune":"Izeron","nom":"Izeron","type":"Manoir","periode":"XVI","histoire":"Izeron, bien que signalé au XIIe siècle, fut reconstruit et modifié au cours des ans, les seigneurs connut on relève les noms de Saint-Jean d'Ossarts, de Saint-Jean d'Yssaire, de Saint-Jean d'Yzeron et de Saint-Jean d'Ozeron pour désigner la paroisse. \r\nCe château fut prit en 1575, les Atuyer seigneurs à l'époque se retirèrent à Malleval à la Sauvagère et le château actuel fut reconstruit au XIXe siècle. \r\nAujourd'hui propriété de la commune qui en a fait une école.","architecture":"Corps de logis a deux étages de forme carré toit à la Mansard flanqué d'une tour ronde.","habitants":"Famille Attuyer\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Izeron_1.jpg","../image/image_38/38_Izeron_2.jpg"]},"Consult_chateau_formulaire914e-2":{"id":"Consult_chateau_formulaire914e-2","dept":"38","canton":"Crémieu","commune":"St-Romain-de-Jalionas","nom":"Jalionas","type":"Maison forte","periode":"XV","histoire":"Jalionas: En 1315 le Dauphin Jean  l'échangea avec Tignieu, Jameysieu, Saint Marcel du Milieu et Vénérieu, contre la ville de Pérouges et son mandement qui appartenait à Louis d'Anthon; Dernière de sa lignée Isabelle d'Anthon avait fait hommage au Dauphin en 1323 à la mort de son époux, Hugues de Genève, les biens passèrent à la famille Saluces. \r\nMais la disparition de Bertrand de Saluces, à la bataille de Verneuil  en 1424, multiplia les prétendants à son patrimoine, la \"terre d'Anthon\"  fut revendiqué d'une part par le Dauphin fort d'un acte signé par Hugues de Genève, déclarant que faute d'héritier  direct la seigneurie reviendrait au Dauphin, d'une part par la veuve de Bertrand, Anne de Chambre et à sa mort par son neveu Louis de Saluces et enfin par Louis de Chalon, prince d'Orange qui étayait ses droits sur sa descendance d'une fille du Dauphin Humbert, ce dernier  n'hésita pas  a prendre les armes pour s'en emparer, ce fut la cause de la bataille d'Anthon (juin 1430). L'étendard delphinal flotta à nouveau sur le château de Saint-Romain et la baronnie d'Anthon, et aprés un long procés, revint au marquis de Saluces. \r\nEn 1487, il la vendit à Humbert de Barthenay , le dernier des Barthenay mourut en 1467 ses biens furent vendus à Benoit de Grôlée, ils passèrent à son fils Gabriel, puis par substitution passa à Gabriel Aymard Dauphin de Saint-Etienne, seigneur de Vernas. Le château appartenant à Gabriel de Grolé était en ruine à la fin du XVIe siècle.                                                                          \r\nDans la commune il y a la maison forte de Jalionas du XVe siècle  Gaspard II de Loras qui épousa Catherine du Train en 1559 fut le chef de la branche Loras-Jalionas.  Elle s'éteignit avec Louise de Loras en 1750. Entre temps les biens passèrent au Dauphin de Saint-Etienne en 1677, cette charmante gentilhommière traversa la révolution et put-être conservée  par la même famille qui l'on restaurée dernièrement.","architecture":"La maison forte de Jalienas du XVe siècle elle comportait une tour avec au rez-de-Chaussée une grande pièce et un petit oratoire de l'autre côté de la cour intérieure s'élevait un bâtiment annexe couronné d'échauguettes.\r\n A l'extérieur se dresse un très beau colombier de forme circulaire et de dimensions imposantes.","habitants":"Famille saluce \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Jalionas_1.jpg","../image/image_38/38_Jalionas_2.jpg"]},"Consult_chateau_formulaire11f6-2":{"id":"Consult_chateau_formulaire11f6-2","dept":"38","canton":"Beaurepaire","commune":"Jarcieu","nom":"Jarcieu","type":"Château","periode":"XV","histoire":"Jarcieu: En 1318 fut la propriété du Dauphin Guigues, ces biens furent confisqués, par le roi Charles VIII qui désigna le Marquis de la Saluces. Jarcieu  fut le témoin d'événements historiques et religieux importants, notamment la venue du roi Charles IX et de sa mère Catherine de Médicis, le 15 Août 1564.  En 1679 Le roi Louis XIV érigea en comté la terre d'Anjou qui fut vendue par les Falcoz de la Blache en 1785 à Joseph-Antoine-Augustin de la Roque Pluvinel. \r\nUne vieille famille de Jarcieu, les Rostaing la Valuse semblent issus des Rostaing la Rivoire dont un membre était fixé à Ternay en 1450 par Jean Rostaing sieur de la Boline, second fils de Melchior de Rostaing et de Marie de Theys.\r\n En 1604 Jean de Rostaing épousa demoiselle Prégente de Vif de Barbiere, dont la famille habitait Jarcieu dans le XIV e siècle; Il laissa deux  fils dont l'un fut le grand-père de Joseph Rostaing de la Valuse colonel au régiment d'Armagnac qui se distingua dans les guerres d'Amérique sous Louis XVI, il commandait les troupes de débarquement de Laperouse et prit en 1782 le fort de l'Hudson.\r\nBoniface Ribaud, avocat au parlement du dauphiné, lieutenant, juge du comté d'Anjou et de la baronnie de Jarcieu épouse en 1780 Marie-Benoit-Elisabeth de Rostaing.\r\n Aujourd'hui transformé en musée de la faïences.","architecture":"Ce château  appelé \"Valuze\"de la fin du Moyen-Age, remanié en partie au XVIIe siècle, il ne reste peu d'éléments de ce château un corps de logis rectangulaire avec fenêtre à meneau, un cadran solaire et d'une tour  pigeonnier construite en galets roulés.","habitants":"Famille Rostaing\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Jarcieu_1.jpg"]},"Consult_chateau_formulaire2df6":{"id":"Consult_chateau_formulaire2df6","dept":"38","canton":"Tour-du-Pin","commune":"St-Geoire-en-Valdaine","nom":"Lambertiere","type":"Manoir","periode":"XVIII","histoire":"Lambertiere: Ce château   fut construit en 1770 par la famille Dode, Guillaume Dode militaire qui s'illustra sous Napoléon dans ses campagnes, il fut maréchal et pair de France, anoblie par l'empereur et prit le titre de la Brunerie du nom d'un château qu'il acquit prés de Voiron.","architecture":"Manoir très caractéristique par ses tours ventues dans une ville où l'on compte sept châteaux, Corps de logis de forme quadrangulaire allégé  par deux tours rondes dont l'une plus importante est coiffée en poivrière.","habitants":"Famille Nicollet\r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Lambertiere_1.jpg"]},"Consult_chateau_formulaire876c":{"id":"Consult_chateau_formulaire876c","dept":"38","canton":"Monestier-de-Clermont","commune":"Miribel-Lanchâtre","nom":"Lanchatre","type":"Maison forte","periode":"XVIII","histoire":"Le château de Miribel-Lanchâtre voisinait avec un autre château, ce dernier au XIVe siècle  appartenait à la famille Grinde; Guillaume Grinde se maria avec Philippa de Miribel et devint seigneur de Miribel, plus tard, la famille de Jean François Copin de Miribel seigneur rassembla en 1770 les terres de Château-Bernard et de Lanchâtre.\r\n En 1789, l'un des châteaux  était en ruines; l'autre fut incendié, sur son emplacement fut construit la maison forte qui existe toujours. De la famille de Miribel qui a formée  plusieurs branches dont certains devinrent illustres  tel que Artus Copin de Miribel ( maire de Grenoble 1842-1845 ); François Copin de Miribel , chef d'état major (1831-1893 ) et la fille du comte de Miribel qui fut la secrétaire personnelle du général de Gaulle.\r\nDans cette maison forte appelé Château de Lanchâtre, construite entre 1780 et 1782 par Jean Eymard  notaire royal, fut également maire et juge de paix.","architecture":"Cette maison forte \"appelé château de Lanchâtre \" n'est qu'une ferme construite au XVIIIe siècle de forme rectangulaire.","habitants":"Famille de Miribel\r\nFamille de Jean Eymard\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Lanchatre_1.jpg"]},"Consult_chateau_formulaire8790":{"id":"Consult_chateau_formulaire8790","dept":"38","canton":"Morestel","commune":"Courtenay","nom":"Lancin","type":"Château","periode":"","histoire":"LANCIN: du XIVe siècle château néoclassique de Marc Bouchet dit de Meillan, fut le château de la famille de Courtenay dérivé des Curtis.             Dans la commune de Courtenay riche en châteaux  en possède six le château de Vaulfin, de Chanizieu important avec ses tours rondes et ses échauguettes, et le domaine de Boulieu.","architecture":"De style néo-gothique construit en 1878, sur l'emplacement d'une maison forte, corps de logis en équerre flanqué de deux tours dont une ronde et une plus massive carrée.","habitants":"Famille de Marc Bouchet\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Lancin_1.jpg","../image/image_38/38_Lancin_2.jpg"]},"Consult_chateau_formulaire4e7e":{"id":"Consult_chateau_formulaire4e7e","dept":"38","canton":"Roybon","commune":"Lentiol","nom":"Lentiol","type":"Vestiges","periode":"XIII","histoire":"Lentiol: Ce château construit  au XII-XIIIe siècle par la famille Alleman, il fut donné en hommage par Guichard Allemand en 1338 au Dauphin, et, en 1540  la seigneurie appartenait à la famille  de la Tour qui la revendit cinquante ans plus tard, à Antoine de Lestang, seigneur de Moras qui l'érigea en marquisat et sans dessaisirent en 1645   au profit de Barthélemy du Boucher, qui la cède ensuite à Philippe du Vivier, puis à Joly de Fusselet Jean Baptiste, conseiller au parlement en 1737-1760 son fils succéda à sa charge seigneur des Sablons de Lentiol; Cette famille la conserve jusqu'au XIXe siècle.","architecture":"Il ne reste que des vestiges qui sont inclus dans des propriétés privées dont les habitations sont construites avec les matériaux du château.","habitants":"Famille Alleman\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Lentiol_1.jpg","../image/image_38/38_Lentiol_2.jpg","../image/image_38/38_Lentiol_3.jpg"]},"Consult_chateau_formulaire5df2":{"id":"Consult_chateau_formulaire5df2","dept":"38","canton":"St-Jean-de-Bournay","commune":"St-Jean-de-Bournay","nom":"Lesdiguieres","type":"Vestiges","periode":"","histoire":"Lesdiguieres: pas d'information historique","architecture":"Vestiges d'une tour du XI  XIIe siècle de l'ancien château féodal  qui en comptait cinq, dont une aux oubliettes on l'appelle aujourd'hui la tour de Lesdiguières.","habitants":"Charles Emmanuel de Lesdiguiéres\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Lesdiguieres_1.jpg","../image/image_38/38_Lesdiguieres_2.jpg"]},"Consult_chateau_formulaireb78d":{"id":"Consult_chateau_formulaireb78d","dept":"38","canton":"Roybon","commune":"Roybon","nom":"Loives","type":"Maison forte","periode":"XIII","histoire":"Loives: Cette maison forte construite au XIIIe siècle, propriété à l'époque de l'ordre des Templiers, puis les moines Antonins, de l'ordre hospitalier de Saint-Antoine rachetèrent la terre  en 1312  pour en faire un hôpital, il y restèrent jusqu'à la Révolution. Aujourd'hui propriété agricole.","architecture":"Bâtiments  juxtaposés d'ouest en est, correspondant à plusieurs phases de construction entre XII et XVIIe siècles. Du XII  il ne reste qu'un mur d'enceinte crénelé et un donjon rectangulaire de cinq niveaux.","habitants":"Abbés de Saint-Antoine\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Loives_1.jpg","../image/image_38/38_Loives_2.jpg"]},"Consult_chateau_formulaire9ad5":{"id":"Consult_chateau_formulaire9ad5","dept":"38","canton":"Tour-du-Pin","commune":"St-Geoire-en-Valdaine","nom":"Longpra","type":"Château","periode":"XIII","histoire":"Longpra: Au XIIIe siècle cette maison forte relevait de la seigneurie de Montferrat, à Eymard de Paladru, puis à son fils Eymard de Clermont, seigneur du Crolard, à sa mort sans enfant, le domaine passe à son épouse  descendante de la puissante seigneurie des Clermont,  la cour décida que l'héritage revint à son neveu  Jean de Reynard dont la fille Antoinette de Paladru épousa le seigneur de Montferrat. \r\nCe domaine fut vendu en 1536 à Pierre-Antoine  Pascalis, notaire, conseiller et président au parlement de Grenoble. Les descendants de Pascalis accéderont à la noblesse par achat de charges sur le titre de seigneur de Longpra. Jean de Pascalis défendit vaillamment en 1590 contre les troupes protestants du baron des Adrets , cela dura sept jours et ne put relever les ruines et c'est pour cela que Pierre Antoine de Longpra le  fit  reconstruire  en 1770-1780 . Conservèrent les fondations, les douves et le pont-levis. \r\nA la Révolution de 1789, Longpra fut occupé, la famille emprisonnée, et fut libéré par les villageois. \r\nEn 1814 le château et le village fut occupé par les troupes autrichiennes. En 1840 à la mort du dernier des Pascalis de Longpra, le château revient à sa nièce Eugénie Chausson du Colombier, qui épousa le Baron Anselme Pasquier de Franclieu, originaire de l'Ile de France, installé en Bigorre, sous le règne de Louis XV artiste peintre amateur, de nombreuses  toiles ont été conservées et exposées. \r\nEn 1945 le château échut au comte Hugues de Franclieu et à son épouse née des Monts de Savasse, toujours dans la famille par le comte et la comtesse Albert de Franclieu. Ouvert au public depuis 1985.","architecture":"Cette maison forte construite au XIIIe siècle a gardée ses fondations, ses douves de 380 mètres de long et son pont  levis, possède un corps de logis rectangulaire, deux ailes en retour et petit pavillons carrés en angle arrière, sur la façade sud un fronton triangulaire s'ouvre sur un parterre à la française, les toits a forte pentes en tuiles écaillées.","habitants":"Famille Clermont Famille Pascalis seigneur de Longpra         \r\nFamille du comte de Franclieu\r\n        \"","divers":"Château de Longpra","gps":"","images":["../image/image_38/38_Longpra_1.jpg","../image/image_38/38_Longpra_2.jpg","../image/image_38/38_Longpra_3.jpg","../image/image_38/38_Longpra_4.jpg","../image/image_38/38_Longpra_5.jpg"]},"Consult_chateau_formulairea6a5-2":{"id":"Consult_chateau_formulairea6a5-2","dept":"38","canton":"La Côte-St-André","commune":"La Côte-St-André","nom":"Louis_XI","type":"Château","periode":"XVII","histoire":"Château-Louis-XI: Le château d'origine fut a moitié détruit, ce dernier avait été construit en 1274 pour Philippe de Savoie, à vocation défensive il comportait quatre tours et cernés de Fossés, il fut la résidence du futur roi Louis XI, malheureusement il fut en partie détruit au cours des guerres de religion , ses ruines furent \"albergées\" par le roi à Jean  Girard de Saint-Paul. Reconstruit en 1600, il passera aux Gratet de Dolomieu qui apporteront  de nombreux embellissements. \r\nEn 1870 le château fut racheté par les frères Maristes qui feront rajouter un étage ainsi que le belvédère et le transformeront en pensionnat . \r\nEn 1905, la commune l'achète et y installera les écoles primaires et supérieure.","architecture":"De constructions classiques administratifs de l'époque trois étages et attique corps de logis rectangulaire avec ailes.","habitants":"Louis XI Famille Gratet\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Louis_XI_1.jpg","../image/image_38/38_Louis_XI_2.jpg","../image/image_38/38_Louis_XI_3.jpg","../image/image_38/38_Louis_XI_4.jpg"]},"Consult_chateau_formulaireabb6":{"id":"Consult_chateau_formulaireabb6","dept":"38","canton":"Beaurepaire","commune":"Primarette","nom":"Louvier","type":"Château","periode":"XVII","histoire":"La famille de Louvier commence à apparaître en 1326 avec Guillaume-Pierre de Louvier et Humbert-Pierre de Louvier, témoins au procès entre Pierre de Virieu commandeur de la châtellenie et les communautés de Beaurepaire, Loras, Revel, Bellegarde et D'Albon.\r\nMonsieur de Blainville anoblie par Charles VII en 1434 propriétaire du Louvier, lieutenant du régiment de Bretagne, tué par un boulet de canon à l'armée de Soubise; Henriette de Luzy, fille de Louis de Luzy, seigneur de Bresson et de Marie d'Inguibert, hérita en 1802 du château de Louvier.","architecture":"Ce château du XVIIe siècle de forme rectangulaire est   flanqué de quatre tours carrées en angles à toit  pointue.","habitants":"Famille de Louvier \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Louvier_1.jpg"]},"Consult_chateau_formulaire9f1b":{"id":"Consult_chateau_formulaire9f1b","dept":"38","canton":"Tour-du-Pin","commune":"St-Didier-de-la-Tour","nom":"Maison_Blanche","type":"Maison forte","periode":"XIII","histoire":"Maison_Blanche: Dépendait en 1365 à l'abbaye de Bonnevaux fut ensuite acquise par Guillaume de Bonnevent, puis aux mains de Messire de Pierre de Veyronne (abbé de Bonnevaux). \r\nAu  XVe siècle propriété de la famille Ruims, puis passa au seigneur de Boissac les chanoinesses l'occupèrent  jusqu'à la Révolution. Vendue comme bien national. Elle fut acquise par le marquis du Vivier, châtelain de Cuirieu qui l'échangea en 1842 contre une autre propriété appartenant à Auguste  Fontanel, conseiller d'arrondissement  d'ou son  issus les actuels propriétaires.","architecture":"Maison forte la plus ancienne du pays, du corps de logis en équerre  flanqué de deux tours rondes.","habitants":"Famille Riums  \r\nFamille Fontanel\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Maison_Blanche_1.jpg","../image/image_38/38_Maison_Blanche_2.jpg"]},"Consult_chateau_formulaire8069":{"id":"Consult_chateau_formulaire8069","dept":"38","canton":"St-Marcellin","commune":"La Sône","nom":"Mallein_Combe_Longue","type":"Manoir","periode":"XIX","histoire":"Mallein_Combe_Longue: Construit au XIXe siècle dans le hameau de Combelongue par la famille de Mallien dans un style néo Louis XIII, ressemble plus à une maison bourgeoise qu'à un château comme elle est définie.","architecture":"Deux corps de bâtiment accolés d'un un plus haut à toit à forte pente en ardoises. Belle véranda en fer forgé.","habitants":"Famille Mallein\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Mallein_Combe_Longue_1.jpg"]},"Consult_chateau_formulairea6de-2":{"id":"Consult_chateau_formulairea6de-2","dept":"38","canton":"Crémieu","commune":"Villemoirieu","nom":"Mallin","type":"Manoir","periode":"XVI","histoire":"Mallin: Construit par la famille Fayet  vers la fin du XVIe siècle. Pierre Fayet fut nommé monnayeur par Louis XI ( atelier monétaire de Crémieu ). Cette maison forte a changé plusieurs fois de mains, les Maleyssieu, les Thupinier. Dépourvue de toute vengeance, elle ne fut pas saccagée  à la Révolution.  \r\nSerait actuellement dans les mains de la famille Sallmard.","architecture":"Maison forte de Mallin mentionnée au XIVe siècle , la partie la plus ancienne est le donjon. Une intéressante  galerie renaissance soutenue par des piliers le relie sur quatre niveaux au corps de logis qui lui est encadré de trois tours rondes.","habitants":"Famille Fayet\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Mallin_1.jpg","../image/image_38/38_Mallin_2.jpg"]},"Consult_chateau_formulaire05c7":{"id":"Consult_chateau_formulaire05c7","dept":"38","canton":"St-Etienne-de-St-Geoirs","commune":"St-Etienne-de-St-Geoirs","nom":"Mandrin","type":"Maison forte","periode":"XVI","histoire":"Mandrin: Capitaine dauphinois  de contrebandiers,  née en 1725, famille de neuf enfants dont le père décède en 1742. \r\nLouis  dont la lutte contre les fermiers généraux, la ténacité, les ruses et les exploits populaires par la légende firent un personnage célèbre. \r\nOn dit que le dauphinois aiment à se reconnaître en ce bagarreur intrépide, grand amateur de belles filles, qui devait finalement tomber entre les mains de ceux qu'il avait longtemps bernés, il fut capturé devant le château de Rochefort en 1754,  et condamné à mourir roué vif en 1755 sur la place du marché à Valence, devant des milliers spectateurs.","architecture":"Cette maison forte à deux niveaux, fenêtres à meneaux et bretèches flanqués de deux tours rondes","habitants":"Famille Mandrin\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Mandrin_1.jpg","../image/image_38/38_Mandrin_2.jpg"]},"Consult_chateau_formulairede57":{"id":"Consult_chateau_formulairede57","dept":"38","canton":"Monestier-de-Clermont","commune":"Avignonet","nom":"Marceaux","type":"Manoir","periode":"XVII","histoire":"Marceaux: Raymond de Roux  acheta la seigneurie d'Avignonet en 1680 qui  fut transmise à Charles de Nantes seigneur d'Avignonet qui y fit construire le manoir, la tradition affirme qu'Henri IV l'aurait édifié pour sa favorite, Gabrielle d'Estrées,  vers 1650,  il appartenait au duc de Beaufort, roi des halles petit fils d'Henri IV et de Gabrielle d'Estrées. La famille des de Nantes l'habita de 1748 à 1790 . Alexandre Deloche devint propriétaire  du château en 1835;  Il était né à Grenoble en 1756 d'une famille originaire de St-Baudille et Pipet, avocat élu député à la convention, emprisonné à la terreur, puis relâché  sur intervention de Couthon, il fut maire de Grenoble  en 1828, mourut à Avignonet en 1842. Ce château passa à la famille Luthy, puis à son petit fils Jean-Bernard Messerli et en 1996 à la famille Demarchi qui le revendit en 2001 à madame Rocca.","architecture":"Ce manoir qui fut en partie incendié en 1883 fut remanié dans un style classique par l'architecte propriétaire, monsieur Henri Bennet Brewster, a conservé ses deux pavillons d'entrées.","habitants":"Famille de Charles de Nantes( Avignonet)\r\n        \"","divers":"Manoir de Marceau","gps":"","images":["../image/image_38/38_Marceaux_1.jpg"]},"Consult_chateau_formulaired44b":{"id":"Consult_chateau_formulaired44b","dept":"38","canton":"Bourgoin-Jallieu","commune":"St-Chef","nom":"Marchil","type":"Manoir","periode":"XV","histoire":"Marchil: Ce petit manoir daterait de la fin du XVe siècle et fut la propriété d'une des plus grandes familles dauphinoises; Les Alleman en 1622, les Loras au XVIIIe siècle et les Murinais au XIXe siècle.","architecture":"Marchil , corps de logis carré flanqué de quatre tours  rondes en angle, la façade est est dotée de loggias en plein cintre reposant sur une double arcade dans un style Italien.","habitants":"Famille Alleman\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Marchil_1.jpg"]},"Consult_chateau_formulaire259e":{"id":"Consult_chateau_formulaire259e","dept":"38","canton":"Tullins","commune":"Poliénas","nom":"Marcouse","type":"Vestiges","periode":"XII","histoire":"Marcouse: Les de châteauneuf étaient les occupant du château qui fut démoli à plusieurs reprises , surtout par le gouverneur Gordes pendant les guerres de religion.","architecture":"De ce château de Marcouse  il ne reste que la base d'une tour ronde ruinée.","habitants":"Famille Châteauneuf\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Marcouse_1.jpg"]},"Consult_chateau_formulaire68ad-2":{"id":"Consult_chateau_formulaire68ad-2","dept":"38","canton":"St-Geoire-en-Valdaine","commune":"Montferrat","nom":"Mariniere","type":"Manoir","periode":"XVI","histoire":"Mariniere: Ce manoir aurait été la propriété en 1772 de monsieur Giroud, avocat au parlement de Grenoble.","architecture":"Corps de logis rectangulaire flanquait de deux tours rondes.","habitants":"Mr Giroud\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Mariniere_1.jpg"]},"Consult_chateau_formulaireffdb":{"id":"Consult_chateau_formulaireffdb","dept":"38","canton":"Tour-du-Pin","commune":"Ste-Blandine","nom":"Marlieu","type":"Château","periode":"XVIII","histoire":"Marlieu: Ce château fut construit au XVIIIe siècle par le Marquis de Murinais, en remplacement du vieux châtelard de Montagnieu, la redoutable forteresse étant utilisée comme carrière de pierres pour édifier la nouvelle demeure.  Connut par son histoire qui remonte à Claude de Lay  Seigneur du Châtelard en 1300.   \r\nA la Révolution ce château  abrita les prêtres pourchassés.  \r\nLe château fut acquis en 1895 par monsieur Arnauld des Essarts, toujours dans la descendance.","architecture":"Le nom vient du mot carrière de marbre, construction  en forme de T à trois étages , toit mansardé couvert d'ardoises, la façade  et le fronton au-dessus de la poterne présente d'intéressant  fragments sculptés d'un grand balcon précédant l'entrée.","habitants":"Les marquis de Murinais\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Marlieu_1.jpg"]},"Consult_chateau_formulaire5171":{"id":"Consult_chateau_formulaire5171","dept":"38","canton":"Morestel","commune":"Sermérieu","nom":"Marteray","type":"Château","periode":"XVIII","histoire":"Marteray: La seigneurie appartenait en 1300 à Jean Philibert de Dortans, seigneur de Marteray et de la Barre. \r\nEn 1425, la maison forte du Marteray est occupée par Lancelot de Mondragon  et sa femme Guigoune de Briorde de Serrat.  Philibert de la Beaume , seigneur de Périeu en Bresse et de la maison forte du Martenay, en est propriétaire en 1540.  Par alliance , Catherine de la Baume transmit la maison forte à Pierre-Antoine de Dortans. Au début du XVIIIe siècle, le seigneur de Marteray se nommait Victor-Amédée de Dortans. Puis survint le comte  Jean-Antoine de Gruel, qui fit construire le château actuel, plus vaste, sans descendance en fit don à sa nièce Jeanne-Madeleine. En 1790 le château fut habitait par dame Marie-Thérése  Bolian, veuve du comte de Gruel, puis passa à Gaspard-Thérése-Adolphe de Flocard de Mépieu, député au corps législatif, membre du conseil général de l'Isère, ce dernier n'a pas contracté d'alliance et le château passa au début du XXe siècle à Monsieur d'Arcollière.\r\n le château aujourd'hui fait partie d'une association laïques.                      Non loin du centre du village, une construction récente le château de Saint-Martin.","architecture":"Château de style classique construit en 1732 par le comte de Gruel en remplacement de la maison forte du XIVe siècle dont il reste que quelques vestiges, quelques pans de murs ruinés.","habitants":"Famille de Dortans\r\nFamille de Jean Antoine de Gruel\r\n        \"","divers":"Château de Marteray","gps":"","images":["../image/image_38/38_Marteray_1.jpg"]},"Consult_chateau_formulaire8a77":{"id":"Consult_chateau_formulaire8a77","dept":"38","canton":"Vienne","commune":"Chuzelles","nom":"Martiniere","type":"Château","periode":"XVI","histoire":"Martiniere: Ce château fut construit par François Guerrin , conseiller du roi au parlement du Dauphiné et garde des sceaux. Toujours habité par un autre Guerrin au XVIIIe siècle mais sans lien de parenté, recteur de l'hôpital et maire de Saint-Chamond. Les Lombard de Quincieux, anoblis sous l'empire rachetèrent le château en 1811, l'un de ses membres fut un célèbre avocat des barreaux de Nîmes et de Lyon.","architecture":"Corps de logis de style Louis XIV avec toit à la Mansard.","habitants":"Famille Guerrin\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Martiniere_1.jpg"]},"Consult_chateau_formulaire48a0":{"id":"Consult_chateau_formulaire48a0","dept":"38","canton":"Morestel","commune":"Creys-Mépieu","nom":"Mepieu","type":"Maison forte","periode":"XV","histoire":"Mepieu: Cette maison forte du XVe siècle fut la possession de la famille de Grolée. Jean de Joly de Chion possédait la seigneurie de Mépieu, Saint-Romain et de Bouvesse, leur fils François-Melchior de Joly, baron de Chion possédait encore ces biens en 1699 qui furent rachetés ainsi que les terres de Bouvesse et une partie des terres de Quirieu  par Gabriel de Flocard, troisième fils de Pierre de Musy secrétaire d'ambassade en Savoie, conseiller du roi et seigneur de Marville. Il avait épousé, en 1691 Nicole de Richier dont ils eurent trois enfants dont Christophe. En 1710 Christophe de Flocard seigneur de Mépieu, Bouvesse et Quirieu qui épousa Pétronille d'Angelin, ils eurent 14 enfants dont la plupart capitaines et les filles religieuses. En 1764 Joseph de Flocard seigneur de Mépieu etc, capitaine des grenadiers au régiment d'Enghien, chevalier de Saint-Louis épousa Marguerite-Guilhemlmine  dont-ils eurent cinq enfants, Jean-François-Joseph de Flocard de Mépieu l'ainé officier au régiment de Navarre, épousa  en 1797 Anne-Marie-Angélique- Beatrix du Villard de Crucillieux de laquelle vint Christophe-Octavien de Flocard  de Mépieu mort au château de Mépieu en 1854 sans être marié. \r\nDe la troisième branche Abel-Christophe de Flocard de Mépieu deuxième fils de Joseph hérite épousa en 1798 Mélanie de Monthoux du Barrion,il eurent cinq enfants dont le second Joseph-Marie-Emmanuel de Flocard de Mépieu, officier au service du roi de sardaigne châtelain de Mépieu, pas marié. La descendance se fit dans une branche  venue de Philippe de Flocardau cinquième degré, sénateur de Chambery.\r\nFrançois de Sales y séjourna.","architecture":"Cette maison forte de Mépieu est composée de trois constructions d'époques différentes, comporte trois tours , une échauguette et un corps de logis à forte pente et à l'extrémité, un pavillon de style néo-gothique et l'ensemble couvert de tuiles écaillés.","habitants":"Famille de Flocard de Mépieu\r\nFamille de Grolée\r\nFamille Joly de Chion\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Mepieu_1.jpg","../image/image_38/38_Mepieu_2.jpg","../image/image_38/38_Mepieu_3.jpg"]},"Consult_chateau_formulaire85a1":{"id":"Consult_chateau_formulaire85a1","dept":"38","canton":"Morestel","commune":"Creys-Mépieu","nom":"Merieu","type":"Château","periode":"XIII","histoire":"Merieu: Edifié par la famille de Mérieu. Pierre de Mérieu vivait au milieu du XIIIe siècle , en 1276 son fils rendait hommage à Humbert de la Tour pour les biens qu'ils détenaient à Creys et à Brangues . Le fiéf des Mérieu passa par suite d'un mariage à la famille Auguste de Saint-Germain  qui en prit le nom . \r\nEn 1698, Marie-Anne de Saint-Germain Mérieu dernière du nom , accorda sa main à Claude-Joseph  seigneur de Quinsonnas et  président de la chambre des comptes du Dauphiné. \r\nToujours dans la famille des Mérieu au Comte de Saint-Pern. \r\nEn 2006 les Mérieu sont toujours propriétaire du château.","architecture":"Ce château de Mérieu du XIIIe siècle remanié au XVII et XIXe  siècle, trois corps de logis du Moyen-Age  en forme de quadrilatère disposé en U cernant une cour intérieure fermée par un remarquable pavillon d'entrée style Louis XIII flanqué en façade de pavillon donjon sur le côté gauche et d'une tourelle ronde à l'arrière.","habitants":"Famille Mérieu\r\nFamille de Quisonnas Merieu\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Merieu_1.jpg","../image/image_38/38_Merieu_2.jpg","../image/image_38/38_Merieu_3.jpg"]},"Consult_chateau_formulaire9ba3":{"id":"Consult_chateau_formulaire9ba3","dept":"38","canton":"Bourgoin-Jallieu","commune":"Succieu","nom":"Millassiere","type":"Château","periode":"XVI","histoire":"Le château de la Millassière a appartenu à un avocat du parlement de Grenoble qui fut anobli par la suite, puis fut la propriété du Baron Lombard de Buffière qui avait acheté à la même époque le château de Quisonnas, ce château resta dans les mains des comtes de Buffière  jusqu'en 1943, date à laquelle il fut racheté par monsieur Fontaine qui revenait du Mexique.","architecture":"Ce château fut construit au XVIe siècle sur l'emplacement d'une maison forte appelée le \"château de Buffevent\" du nom d'une des plus anciennes familles du Dauphiné. Le château fut restauré en 1813 et sur la partie nord on y rajouta un bâtiment à arcades, et il fut encore agrandi en 1913 , toujours avec les pierres de la maison forte des Buffevent.","habitants":"Famille de Buffevent   \r\nFamille de Lombard de Buffière\r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Milliassiere_1.jpg"]},"Consult_chateau_formulaired3b0":{"id":"Consult_chateau_formulaired3b0","dept":"38","canton":"Domène","commune":"Villard-Bonnot","nom":"Miribel (38)","type":"Château","periode":"XIII","histoire":"Miribel: A l'origine c'était une maison forte des évêques de Grenoble. Ce château qui date du XIIIe siècle par la famille de Vors,puis à Godet de Gallifet seigneur capitaine de Miribel et de Saint-Laurent du Pont, puis passa aux  de Commiers, François Copin de Commiers seigneur de Montbonnot, Saint-Martin, Saint-Ismier et conseiller au Parlement en 1716 et à la famille Pierre d'Armand qui apporta de nombreuses transformations au XVIIe siècle et passera au XVIIIe siècle à la famille de Miribel, André Copin de Miribel seigneur dudit lieu conseiller au parlement en 1744, Adrien de Miribel dont il portera le nom, a un fils de mademoiselle de Forton.","architecture":"Ce château du XVe siècle fut transformé au XIXe siècle par l'architecte  Berruyer Emile de Viollet le Duc. Corps de logis rectangulaire flanqué de tour rondes et crénelée, remaniés aux XXe siècle.","habitants":"Famille de Vors\r\nFamille Copin de Miribel\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Miribel_crolles_1.jpg"]},"Consult_chateau_formulaire597a":{"id":"Consult_chateau_formulaire597a","dept":"38","canton":"Verpillière","commune":"Bonnefamille","nom":"Moidière","type":"Château","periode":"XVII","histoire":"Les Moidière sont connus dés le XIIe siècle, fief relevant des seigneurs de Fallavier. Le seigneur de Moidière était donc seigneur du moulin. \"modurier\" et Moidière, nom de la première maison forte. \r\nEn 1655, rachetait par les Guillet de la Platière et changeront de nom  immédiatement en Guillet de Moidière et Nicolas Scipion Guillet de Moidière, maréchal de batailles des armées du roi Louis XIV  fit construire le château, il restera dans la famille jusqu'à nos jours en changeant de propriétaire par alliance tel que les Murat de Lestang, lignée de parlementaires grenoblois. \r\nA la révolution les biens furent mis sous séquestre et furent loué aux enchères, n'ayant pas émigré Nicolas de la Moidière avait le droit de récupérer ses biens, il se les fit restituer mais il resta  à Lyon, son fils Othon travailla dans les pépinières municipal de Lyon, par cette formation embellit le parc de la Moidière. \r\nEn 1811 Othon revint à Menue-famille son père étant décédé en 1798, entreprit la restauration du château et fut élu maire de 1840 à 1848, après lui ses successeurs exercèrent à plusieurs reprises des mandats municipaux. Puis les Dugon dont les descendants occupent toujours le château est crée en 1980 un parc animalier.","architecture":"Ce château de la Moidière de style dauphinois,  construit en 1660 sur l'emplacement de la maison forte ,  très endommagé lors de l'incendie de juillet 1789, il fut reconstruit à l'identique, en 1811, corps de logis de plan rectangulaire élevé sur trois niveaux dont un en comble, toit pentus à tuiles écaillées et sur la façade deux pavillons en forte saillie.","habitants":"Famille de Guillet de Moidière \r\nfamille Dugon\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Moidiere_1.jpg","../image/image_38/38_Moidiere_2.jpg","../image/image_38/38_Moidiere_3.jpg"]},"Consult_chateau_formulaire46e8":{"id":"Consult_chateau_formulaire46e8","dept":"38","canton":"Tour-du-Pin","commune":"St-Victor-de-Cessieu","nom":"Molette","type":"Manoir","periode":"XV","histoire":"Molette: En 1440 Alexandre de Vallin  seigneur de la Molette, puis passe aux  Musy, famille de parlementaires, anoblie en 1579, il eut de nombreuse postérité, alliée à toutes les familles nobles du bas Dauphiné. Leur descendance, la très riche Gabrielle de Musy, épousa son cousin  Pierre Alexandre de Vallin.  Veuve en 1765, d'un caractère difficile, elle chercha à rétablir certains usages féodaux tombés en désuétudes et par de nombreux procès s'attira l'hostilité des populations . Le pillage de sa maison en ville de la Tour du Pin et de ses châteaux .\r\n A la Révolution en juillet 1789 sa descendante, Sabine de Vallin, la dernière du nom , périt dans l'incendie du bazar de la charité au côté de la duchesse d'Alençon. \r\nLe château occupé par madame du Content, fut pillé et saccagé .","architecture":"Molette, maison forte du XVe siècle corps de logis rectangulaire à deux niveaux flanqué de tours rondes.","habitants":"Famille de Mongellaz\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Molette_1.jpg"]},"Consult_chateau_formulaire1ce4-3":{"id":"Consult_chateau_formulaire1ce4-3","dept":"38","canton":"St-Marcellin","commune":"St-Marcellin","nom":"Mollard (38)","type":"Château","periode":"XIV","histoire":"La famille du Mollard est attestée dans la première moitié du XIVe siècle, le château fut construit par André du Mollard, puis passa aux de Maugiron au XVIe siècle, lieutenant général du Dauphiné.","architecture":"Ce château construit au XVe siècle, de forme rectangulaire à trois niveaux,  au bord des remparts attenant à une maison forte plus ancienne de forme rectangulaire à deux niveaux, flanqué de tours rondes.","habitants":"Famille Mollard  Famille Maugiron\r\n        \"","divers":"Château  du Mollard sur la partie arrière du bâtiment avec sa tour ronde, transformé en restaurant \"la Tivolière\".","gps":"","images":["../image/image_38/38_Mollard_1.jpg","../image/image_38/38_Mollard_2.jpg","../image/image_38/38_Mollard_3.jpg"]},"Consult_chateau_formulaireb2f6":{"id":"Consult_chateau_formulaireb2f6","dept":"38","canton":"Verpillière","commune":"Vaulx-Milieu","nom":"Monbaly","type":"Maison forte","periode":"XVI","histoire":"Monbaly: La seigneurie de Vaulx-Milieu dépendait des Ponchon de Fallavier, puis passa aux  Chapperon de Vienne.\r\n A cette époque la maison forte de Monbaly fut achetée par  Octavien  Emé de Saint-Julien, président au parlement de Grenoble et maître des requêtes de l'hôtel du roi  (François Ier) il fut aussitôt qualifié de seigneur de Vaulx-Milieu.  Le domaine commençait à tomber en ruines. Pierre -Marie de Vaulx  émigra, le château fut pillé et brûlé , puis vendu comme bien national, il fut presque démoli, du moins ce qu'il en restait, par ses acquéreurs; de nos jours subsisterait , et encore en très mauvais état, l'abside de son ancienne chapelle. Pierre-Marie de Vaulx décéda à Grenoble en 1807, sans descendance, Monbaly reste le seul  vestige de la splendeur des seigneurs de Vaulx-Milieu sous l'ancien régime. \r\nDevenu ferme juste avant la Révolution, vendu en plusieurs lots en 1820, après un début de ruines le domaine fut racheté  par monsieur Charvet un architecte professeur à l'école des Beaux-Arts de Lyon qui le restaurera. \r\nIl appartient aujourd'hui à un syndicat de co-propriétaires.","architecture":"Cette maison forte est plus un château qui est parmi l'un des plus beau  du Dauphiné, possède un corps de logis rectangulaire de trois niveaux de style renaissance flanqué d'échauguettes et d'un donjon carré.","habitants":"Famille de Octavien-Emé de Saint-Julien\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Monbaly_1.jpg","../image/image_38/38_Monbaly_2.jpg"]},"Consult_chateau_formulaire856d":{"id":"Consult_chateau_formulaire856d","dept":"38","canton":"Vinay","commune":"Vinay","nom":"Mont_Vinay","type":"Maison forte","periode":"XIX","histoire":"Mont-Vinay: Construit en 1875 et  1876 dans un style Louis XIII à l'emplacement d' un autre qui avait été construit par Gilbert de Montagnyet qui  fut détruit par Louis XI.  \r\nLe château  du seigneur de Montagny, dévasté pendant  la révolution  fut vendu par  les Talleyrand Périgord qui en furent les derniers seigneurs, seul élément conservé à cette époque fut la salle des gardes  qui  fut démoli en 1874 que Mr Brun-Faulquier  prit soins d'en faire démonter, transporter et reconstituer pierre par pierre un double portique au colonnes annelées; témoins du prestigieux passé. A la mort de Monsieur Brun Faulquier en 1886, sa veuve fit don du château au diocèse pour en faire une maison de soins par les religieuses du rosaire de Pont de Beauvoisin. \r\nActuellement il est le siège des amis du Mont-Vinay.","architecture":"Corps de logis quadrangulaire à trois niveaux dont attiques, flanqués en angle de pavillons carrés, constructions en briques roses et les murs d'angles en refends en font la beauté.","habitants":"Famille de Gilbert de Montagny\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Mont_Vinay_1.jpg"]},"Consult_chateau_formulaire4af1":{"id":"Consult_chateau_formulaire4af1","dept":"38","canton":"St-Marcellin","commune":"Montagne","nom":"Montagne","type":"Maison forte","periode":"XVI","histoire":"La seigneurie de Montagne  est noble Pierre Jourdan en  1347, noble Graton de 1352 à 1389 auquel succède son neveu Jean de Romestan qui vendit aux  religieux de Saint  Antoine, mais les Romestan  restèrent à Montagne. En 1453 Jean de Roussillon prête hommage aux Antonins de Montagne, puis en 1561 André Iserand de Lemps seigneur de Mouchet prête Hommage à l'abbé de Saint-Antoine. Le 20 Juin 1695 c'est Marguerite  de Rostaing  fille d'Henri seigneur du Mouchet qui fait hommage au seigneur Abbé pour la seigneurie de Montagne .  En 1789 Montagne fait partie du marquisat de Montmirail dont le seigneur était le marquis de Marcieu.","architecture":"Aujourd'hui cette maison forte qui a gardée face à la cour des fenêtres à meneaux, se compose d'un bâtiment en forme de U à différents niveaux et toiture, devenue une ferme agricole.","habitants":"Famille Romestan Marquis de Marcieu\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Montagne_1.jpg"]},"Consult_chateau_formulaire479a":{"id":"Consult_chateau_formulaire479a","dept":"38","canton":"Crémieu","commune":"Soleymieu","nom":"Montagnieu","type":"Maison forte","periode":"XIV","histoire":"Montagnieu: La seigneurie est cité en 1307 par Graton seigneur de Montagnieu, puis le domaine passa aux Amblard de Machy seigneur de Sablonnières, qui mourut à la bataille d'Azincourt en 1415, son fils Charles écuyer du Dauphin Charles, rendit hommage le 3 novembre 1415 pour la maison forte de Montagnieu, passa en 1556 à Gabriel de la Poype seigneur de Saint-Jullin,  la seigneurie resta dans la famille jusqu'en 1751 puis fut vendu à François David, bourgeois de Chanissieu. \r\nAujourd'hui a vocation agricole.","architecture":"Cette maison forte édifié au XIVe siècle (appelé aussi château de Couvaloup)  est formée d'un grand et austère bâtiment,  corps de logis rectangulaire qui conserve, dans les  parties hautes, les traces d'ancrage d'un ancien chemin de ronde en bois, la tour  carrée d'escalier a vis avec sa tourelle en échauguette est ajoutée au XVe siècle et deux pavillons accolés au mur d'enceinte .","habitants":"Famille Graton\r\nFamille de Gabriel de la Poype\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Montagnieu_1.jpg"]},"Consult_chateau_formulairedba8":{"id":"Consult_chateau_formulairedba8","dept":"38","canton":"Domène","commune":"Villard-Bonnot","nom":"Montalieu","type":"Maison forte","periode":"XIV","histoire":"Cette maison forte construite au XIVe siècle fut la demeure de François du Puy de Bellecombe, elle fut achetée en 1528 par le chevalier de Boutière, puis passe dans les mains de la Famille Prunier de Saint-André en Royans. A la fin du XIXe siècle, les Marcieu entreprennent la transformation de la maison forte en château, puis suite à un accident le château fut laissé à l'abandon et racheté en 1988 par Monsieur François  Savigny qui continu à le restaurer  pour  l'habiter.","architecture":"la maison forte de  Montalieu à un corps de logis rectangulaire à trois niveau, flanqué de tours carrées et d'échauguettes à l'opposée.","habitants":"François du Puy de Bellecombe\r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Montalieu_1.jpg","../image/image_38/38_Montalieu_2.jpg"]},"Consult_chateau_formulaire8269":{"id":"Consult_chateau_formulaire8269","dept":"38","canton":"Roussillon","commune":"Chanas","nom":"Montbreton","type":"Château","periode":"XVII","histoire":"La seigneurie de Montbreton dépendait de l'autorité, au XIIe siècle des seigneurs de Roussillon, seigneurs d'Anjou. Il  fut vendu par Jean Henri de Moret de Grolée de Peyre par acte du 29  Vendèmière de l'an II à Monsieur Jean-Marie Rostaing Feyra. Toujours dans la descendance.","architecture":"Château remanié au cours des années, corps de logis quadrangulaire de trois niveaux  flanqué de deux pavillons carrées en angle qui date de 1835 et 1855.","habitants":"Famille de Jean-Henri de Grolée\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Montbreton_1.jpg"]},"Consult_chateau_formulaire15f6":{"id":"Consult_chateau_formulaire15f6","dept":"38","canton":"Tour-du-Pin","commune":"Montcarra","nom":"Montcarra","type":"Château","periode":"XIV","histoire":"Le château de Montcarra  dépendait à l'origine de l'importante  Abbaye, construit par Bertrand Carra en 1300, celui-ci  légua sa propriété à Françoise de Rivoire , épouse de Guigues de Torchefelon, le second de ses fils Georges devint seigneur de Montcarra. En 1402, le château  revient à Thibaud de  Rougemont, archevêque et comte de Vienne  qui le brûlera, car son propriétaire d'alors Jean de Torchefelon refusait  de reconnaître sa suzeraineté. Passa par la suite à la famille Alleman  ( grandes familles dauphinoises dont descend la mère du chevalier Bayard). Puis les Murinais, les Valbonnais et en 1871 il passa aux  Thomasset qui le détiennent toujours.","architecture":"Ce château possède trois corps de logis de trois niveaux accolées  en forme de U, Tour donjon carrée à mâchicoulis sur l'aile nord . Au XIXe siècle un incendie accidentel détruira l'aile sud ce qui n'enlèvera pas sa robustesse.","habitants":"Famille de Bertrand Carra   \r\nfamille Alleman\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Montcarra_1.jpg"]},"Consult_chateau_formulaire7716":{"id":"Consult_chateau_formulaire7716","dept":"38","canton":"Morestel","commune":"Courtenay","nom":"Montchalin","type":"Château","periode":"XIV","histoire":"Montchalin: Cette maison forte du XIVe siècle doit sa transformation en château à la famille de la Balme qui le posséda du XVe au XVIIIe siècle, à l'extension de la famille, le château passa successivement  aux familles de Vaulserre, de Virieu, aux  Lombard et aux Claret de Fleurieu. Aujourd'hui propriété de la famille Vigneau.","architecture":"Cette maison forte  de Montchalin  transformée en château par sa diversité d'architecture, l'arc de la porte d'entrée se prononce entre deux tours, une ronde à mâchicoulis et gargouilles,  une hexagonale portant de belles fenêtres à meneaux.","habitants":"Famille de la Balme\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Montchalin_1.jpg","../image/image_38/38_Montchalin_2.jpg"]},"Consult_chateau_formulairec9dd":{"id":"Consult_chateau_formulairec9dd","dept":"38","canton":"Roybon","commune":"Montfalcon","nom":"Montfalcon","type":"Vestiges","periode":"XII","histoire":"Le château de Montfalcon était un poste de défense  de  la commanderie des hospitaliers de Saint-Jean de-Jérusalem, construit sur ordre du Dauphin  Guigues VIII et le Commandeur Humbert de la Balme. \r\nEn 1327 sur une motte féodal et protégeait  un village fortifié qui était tenu par des co-seigneurs désigné par le Dauphin joua un rôle militaire.","architecture":"Le château de Montfalcon était constitué d'une tour quadrangulaire (donjon) était la partie essentielle du château de vingt mètres de haut  centre résidentiel, administratif et judiciaire de la commanderie. Le  bourg se tenait en dessous, fortifié avec douves, pont-levis et remparts avec tour de guet, de tout ceci  il ne reste qu'un pan de mur de la tour.","habitants":"Famille de Guigues VIII\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Montfalcon_1.jpg","../image/image_38/38_Montfalcon_2.jpg"]},"Consult_chateau_formulairecca6":{"id":"Consult_chateau_formulairecca6","dept":"38","canton":"Domène","commune":"Laval","nom":"Montfollet","type":"Vestiges","periode":"XIII","histoire":"Montfollet: Poste de garde pour prévenir les incursions savoyardes dans le Grésivaudan, plusieurs tours de Guet jalonnaient la vallée dont les châtelains  disposaient d'un système d'alerte, et ces derniers garantissaient leur propre défense.","architecture":"Montfollet, Tour haute de seize mètres, dans un style archaïque  date du XIIIe siècle.","habitants":"Seigneur de Montfollet\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Montfollet_1.jpg","../image/image_38/38_Montfollet_2.jpg"]},"Consult_chateau_formulaire9276":{"id":"Consult_chateau_formulaire9276","dept":"38","canton":"Vienne","commune":"Eyzin-Pinet","nom":"Montfort_Volonne","type":"Château","periode":"XIV","histoire":"Montfort: Ancienne maison forte dépendait de la châtellenie de Pinet. Elle appartint au Moyen-Age à la famille des Clavel jusqu'en 1595, Antoine Clavel de Montfort gouverneur d'Abbeville époux de Yppolite Cassé ( famille du maréchal de Cassé Brissac), sans postérité fut exécuté en 1595. Puis passa à la famille des Sallamard des Ressis en 1595,( les sallamard  connus les croisades originaire de Néronde 42, ils avaient occupés les maisons fortes de Lafaye et de Ressis en Forez et en Beaujolais avant de prendre Montfort en Dauphiné, puis  aux  de Montfort dont-il garda le nom et à  A.  Montjaure,  inspecteur général honoraire des eaux et forêts,  puis fut acquis en 1962 dans un état de délabrement avancé par des propriétaires qui le remettent en état avec beaucoup de courage et goût.","architecture":"Maison forte massive d'un seul tenant du XIVe siècle  avec bâtiment rectangulaire flanquée de trois tours rondes et une tour carrée plus petite fut transformée en château fut pillé  et saccagé à la Révolution.                               Un quartier de Eyzin Pinet situé en contrebas porte aussi le nom de Montfort, cette maison forte citée depuis le XIVe siècle","habitants":"Famille clavel   \r\nFamille de Sallmart\r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Montfort_1.jpg","../image/image_38/38_Montfort_2.jpg","../image/image_38/38_Montfort_3.jpg"]},"Consult_chateau_formulaire5f22":{"id":"Consult_chateau_formulaire5f22","dept":"38","canton":"Vienne","commune":"Jardin","nom":"Montleans","type":"Vestiges","periode":"XIII","histoire":"Ce château de Montléans dit \"Mauléon\" appartenait au Moyen-Age à la seigneurie des Guigue seigneur de Beauvoir de Marc, puis passa dans la possession du Dauphin Humbert II, puis fut dépendant de l'archevêque  comte de Vienne. \r\nEn 1525 Montléans passe dans la famille des Maugiron dont  Guy est seigneur et comte d'Ampuis, terminera avec ses brillants services militaires lieutenant général du Roi. Sa fille Marie-Catherine-Françoise-Charlotte hérita du comté de Montléans, et à la Révolution ses droits seigneuriaux disparurent, même le mandement de Montléans changea pour devenir la commune de Jardin.","architecture":"Du château il ne reste que le vestige d'une tour ronde, il a été démantelé sur ordre de Richelieu.","habitants":"Famille des Maugiron\r\n        \r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Montleans_1.jpg"]},"Consult_chateau_formulaire81da":{"id":"Consult_chateau_formulaire81da","dept":"38","canton":"St-Marcellin","commune":"St-Appolinard","nom":"Montluisant","type":"Maison forte","periode":"XV","histoire":"Montluisant: D'après les armureries deux familles de Saint-Marcellin, passa par alliance à la famille de Garagnol, les Gilbert  Collonges y figurent. Henri de Garagnol, vi-bailli de Saint-Marcellin avait épousé en 1624  Françoise Gilbert de Verdun.                                            \r\nSaint-Appolinard fut rattaché au marquisat de Chevrières.","architecture":"Cette maison forte de Montluisant, construite au XVe siècle, corps massif rectangulaire flanquée de tour rondes arasées, une seul reste intact pour  son escalier à vis, les fenêtres à meneaux ont disparues.","habitants":"Famille de Garagnol\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Montluisant_1.jpg","../image/image_38/38_Montluisant_2.jpg","../image/image_38/38_Montluisant_3.jpg"]},"Consult_chateau_formulaire4c78":{"id":"Consult_chateau_formulaire4c78","dept":"38","canton":"Mens","commune":"St-Baudille-les-Pipet","nom":"Montmeilleur","type":"Château","periode":"XV","histoire":"Montmeilleur: Ce château qui daterait du XVe siècle ou Louis XI en avait fait  un de ses relais de chasse, au XIVe siècle aurait été confié à son origine aux comtes de Morges, puis vendu au XVIIe siècle à Geoffroy de Colignon maître des comptes à Grenoble, au XVIIIe siècle au marquis  Nicolas de Langon député de la noblesse aux Etats Généraux de 1789, émigra en 1791, ses biens confisqués et vendus  a un nommé  Jacques Sibey, négociant à Mens, puis changea plusieurs fois de mains pour atterrir dans celle de monsieur Lamberger.","architecture":"Ce château de Montmeilleur dont le corps de logis à toit haut en tuiles écaillées, en forme de L possède en angle intérieur une tour d'escalier  à base carrée dont le sommet se termine en octogone pour accéder au trois niveaux, les trois angles extérieurs  sont munis  de tours rondes à toit pointu.","habitants":"Louis XI\r\nFamille de Geoffroy de Colignon \r\nFamille de Nicolas de Langon\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Montmeilleur_1.jpg","../image/image_38/38_Montmeilleur_2.jpg","../image/image_38/38_Montmeilleur_3.jpg","../image/image_38/38_Montmeilleur_4.jpg","../image/image_38/38_Montmeilleur_5.jpg","../image/image_38/38_Montmeilleur_6.jpg"]},"Consult_chateau_formulaire7eee":{"id":"Consult_chateau_formulaire7eee","dept":"38","canton":"Crémieu","commune":"Villemoirieu","nom":"Montmiracle","type":"Manoir","periode":"XV","histoire":"Montmiracle: Ce manoir dépendait d'une commanderie, maison des hospitaliers  pour les gens de l'ordre et les pèlerins  malades, elle dépendait de la commanderie de Saint-Georges de  Lyon. Le grand prieur en fut le Sieur de Montmorillon. Ce manoir  fut confisqué à la révolution et vendu comme bien national.","architecture":"Le manoir de Montmiracle à un corps de logis de forme carré se compose d'une grosse tour carrée accolé d'un pavillon à deux tours  rondes.","habitants":"Sieur de Montmorillon\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Montmiracle_1.jpg","../image/image_38/38_Montmiracle_2.jpg","../image/image_38/38_Montmiracle_3.jpg"]},"Consult_chateau_formulairece5c":{"id":"Consult_chateau_formulairece5c","dept":"38","canton":"Crémieu","commune":"St-Hilaire-de-Brens","nom":"Montplaisant","type":"Maison forte","periode":"XIII","histoire":"Montplaisant: La famille de Loras fit ériger à la fin du XIIIe siècle le massif donjon  carré,  les autres apports  de bâtiment datent du XIV et XVe siècle. \r\nCette famille de Loras posséda cette forteresse pendant cinq cent cinquante ans, jusqu'en 1850  date de la mort d'Henriette Petronille de Loras de Montplaisant qui légua la maison forte à  son mari François de Murinais, tout lui appartint  jusqu'en 1910 et fut racheté par des paysans, utilisé comme ferme jusqu'à son rachat en 1970, il est devenu un établissement public de la ville de l'Isle d'Abeau.","architecture":"Cette imposante maison forte , dominant les collines de Damptézieu et de Saint-Chef, fut construite au début du XIVe siècle par la famille de Loras. Composée d'une tour maîtresse à base taluté et entourée d'une enceinte, au XVe siècle adjonction d'un corps de logis, d'une salle d'apparat et d'une chapelle. Au XIXe siècle des dépendances et un four construit à l'extérieure de l'enceinte.","habitants":"Famille de Loras\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Montplaisant_1.jpg","../image/image_38/38_Montplaisant_2.jpg"]},"Consult_chateau_formulaire1038":{"id":"Consult_chateau_formulaire1038","dept":"38","canton":"Beaurepaire","commune":"Montseveroux","nom":"Montseveroux","type":"Château","periode":"XIII","histoire":"Montseveroux: Au XIIIe siècle Pierre Armand abbé de Saint-Pierre de Vienne, avec le noble Hugues Geoffroy de Revel avaient chacun une part du fief de Montséveroux,  Guigues de Montseveroux en 1414 forme trois branche, les Virieu-Beauvoir seigneur de Varacieux, les Montfort et les Saint-Savin, puis le domaine fut acquit  par Guillaume de  Tournon  en 1459.  \r\nSes descendants  Just de Tournon épouse en 1535 Claudine de la Tour d'Auvergne de Turenne, et en 1540 le château est  ruiné et inhabitable. \r\nAu début du XVIIIe siècle Jean Baptiste et Antoine de Mazières  sont seigneur de Montséveroux et Bozencieux. \r\nAu XIXe siècle Claude Verger de la Villardière seigneur de Montséveroux, de Cour et Buis avocat au parlement de Grenoble qui épousa Françoise Tholon de Vatières, Claude meurt  sans enfant.  \r\nLe château fut racheté ou donné à  la commune en 1864  pour ses besoins administratifs , mairie école etc.","architecture":"Château du XIIIe siècle se composait de quatre murailles, flanquées de quatre tours d'angles rondes, une grosse tour portière surmonte le porche d'entrée.","habitants":"Famille de Guillaume Tournon\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Montseveroux_1.jpg","../image/image_38/38_Montseveroux_2.jpg","../image/image_38/38_Montseveroux_3.jpg","../image/image_38/38_Montseveroux_4.jpg"]},"Consult_chateau_formulaire0efa":{"id":"Consult_chateau_formulaire0efa","dept":"38","canton":"Crémieu","commune":"Moras","nom":"Moras","type":"Maison forte","periode":"XIV","histoire":"Moras: Mentionné au XIIe siècle acte signé au XVe siècle par le futur Louis XI. Un Mathieu de Moras en 1380 avec le titre de Damoiseau parmi les plus anciens vices  châtelains de Crémieu. La famille de Bovet, déjà propriétaire de la maison forte de Mure, acheta  Moras en 1510 et a partir du milieu du XVIe siècle , se fit appeler  \"Bovet de Moras\" , mourut en 1860 dans la tour.\r\nCette famille en un nommé Jacques Bovet de Moras d'Arier était professeur à l'université de Valence en 1680.","architecture":"Moras a un corps de logis carré et haut flanqué d'une tour ronde.","habitants":"Famille de Mathieu de Moras\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Moras_1.jpg"]},"Consult_chateau_formulairef30a":{"id":"Consult_chateau_formulairef30a","dept":"38","canton":"Morestel","commune":"Morestel","nom":"Morestel","type":"Château","periode":"XI","histoire":"Morestel: Au XIe siècle le seigneur ; baron de la Tour qui revendiquait sa suzeraineté  fit de Morestel  une bourgade fortifiée, pour se défendre des puissants seigneurs, les comtes d'Albon et de Savoie.\r\nCette forteresse  devenu château delphinal au XIIIe siècle, Guiffrey de Miollans seigneur de Moretel qui avait épousé Alix de Beauvoir en 1318 par sa descendance apporta le domaine aux de Bordes,  aux Bourcieu, aux Fontaine de Lafont et aux de Roussillon qui furent seigneur de Morestel en 1450. \r\n Eriger en Baronnie, à la mort de Ymbert de Barthenay, Morestel fait retour au domaine royal, ensuite se multiplia les conflits religieux en 1560 entre le baron des Adrets, Lesdiguières, et fut démantelé par de  Gordes gouverneur de la province . \r\nPlusieurs seigneurs régneront encore sur Morestel , puis  resta dans les mains des Lauberivière de Quinsonnas jusqu'en 1789.","architecture":"De cette bourgade médiévale fortifiée  sur un éperon rocheux date du XIe siècle il ne reste du château démantelé en 1576 que le donjon  du XIIe siècle \"tour carrée\" remaniée en 1960, sur la partie basse de nombreuses  maisons fortes étaient protégées à l'intérieur des remparts et il y avait deux portes d'accès, la porte Murine et  St-Symphorien.","habitants":"Famille du  Baron de la Tour \r\nFamille d'Ymbert de Barthenay\r\nFamille de Lauberivière de Quinsonnas\r\n        \"","divers":"Vestiges du château (Donjon et maison forte)","gps":"","images":["../image/image_38/38_Morestel_1.jpg","../image/image_38/38_Morestel_2.jpg","../image/image_38/38_Morestel_3.jpg","../image/image_38/38_Morestel_4.jpg"]},"Consult_chateau_formulaire5f4f":{"id":"Consult_chateau_formulaire5f4f","dept":"38","canton":"La Mure","commune":"La Motte-St-Martin","nom":"Motte_les_Bains","type":"Château","periode":"XIV","histoire":"Motte-les-Bains: Appartenait à la fin du XIe siècle au premier dauphin du Viennois et en 1286 aux Aynard . \r\nIl y eu sur l'emplacement du château une première enceinte de 80 mètres à l'intérieur de laquelle se trouvait en avant une tour ronde, ensuite une habitation, une citerne et un pont levis qui en permettait l'accès. Au XIVe siècle y fut construit un beau manoir , dont le portail de tuf de style romain est la partie la plus ancienne, propriété de  la famille de Morges   \"Dame de Morges\". \r\n A la famille Morges succéda  François de Philibert, marquis de Venterol, cette famille le gardera jusqu'à la révolution; capitaine des gardes du duc de Lesdiguières sous Henry IV qui y logea  la garnison de  François de Bonne futur connétable de Lesdiguières, ce dernier en 1594  fut guéri d'une sciatique par les eaux,  fit transformer indirectement le château en établissement thermal. puis sous le contrôle du Baron de Venterol seigneur de la Motte. \r\nSous la Révolution le château fut saisi et vendu, des fermiers devenus propriétaires continuèrent l'activité jusqu'en 1830 ou un négociant lyonnais Monsieur Subit l'acquit et entreprit de gros travaux  hydrauliques pour monter les eaux jusqu'au château qui eu jusqu'à 160 chambres, mais des projets furent long à venir,  de nombreux propriétaires se succéderont et en 1926 l'exploitation cessa, en 1962 les eaux furent noyées par le barrage de Monteynard et la même année le château fut acheté par la ville de la Seyne-sur-Mer pour un centre de vacances, en 1986 c'est l'association du \"Patriarche \" qui le rachetait, aujourd'hui nouveau  propriét
