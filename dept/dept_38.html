ult_chateau_formulaire6904","dept":"38","canton":"Crémieu","commune":"St-Baudille-de-la-Tour","nom":"Brotel","type":"Maison forte","periode":"XII","histoire":"Brotel: Sur un piton rocheux, surveillant le Val d'Amby, elle appartenait à une branche de la famille des Laure, Guichard de Laure seigneur de Brotel de 1247 à 1303 Guillaume jusqu'en 1339 et Louis-Girin- Laure seigneur de Veyssilieu et de Brotel et Louis Laure  seigneur de Brotel et de la maison forte de la Roche situé à Saint-Victor de Morestel qui la vendit à Benoit Morin seigneur de Charrey en 1575. En 1410 par alliance de Béatrix Laure  dernière héritière fut mariée à Humbert de Grôlée, bailli de Lyon et sénéchal.\r\nLa seigneurie fut ensuite acquise par la famille de Putrein, à la révolution , elle appartenait à Louis Claude de la Poype, frère d'un général qui servait dans les armées révolutionnaires, ce qui permit de ne pas avoir de dégât sur cette bâtisse, ensuite passa à divers propriétaires; et en 1938 le Président  du conseil Edouard  Herriot  l'acquit pour se reposer et y fut soumit à résidence par les allemands avant être déporté en Allemagne. La maison forte fut revendue au Marquis d'Oncieu de Charffardon.","architecture":"Cette maison forte de Brotel appelait château fut remaniée au XVe siècle.","habitants":"Seigneurs des Laure.                                                          \r\nPrésident E. Herriot\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Brotel_1.jpg","../image/image_38/38_Brotel_2.jpg","../image/image_38/38_Brotel_3.jpg"]},"Consult_chateau_formulairef9f5":{"id":"Consult_chateau_formulairef9f5","dept":"38","canton":"Voiron","commune":"Voiron","nom":"Brunerie","type":"Château","periode":"XVII","histoire":"Brunerie: Ce château  fut acquis par Guillaume  Dode, vicomte de la Brunerie, Maréchal et pair de France, (1775  1851),  en 1823 rappelé par Louis XVIII pour commander le génie de l'armée des Pyrénnées, puis nommé président du génie et prit la direction de la mise en défense de la place de Paris, anoblie par l'empereur dont il prit le nom de la Brunerie. \r\nAujourd'hui centre culturel et sportif.","architecture":"La Brunerie possède un corps de logis rectangulaire, à trois niveaux flanqué d'une tourelle sur la droite de la  façade et pavillon saillant sur l'aile gauche.","habitants":"famille Guillaume Dode\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Brunerie_1.jpg"]},"Consult_chateau_formulaire1ce4":{"id":"Consult_chateau_formulaire1ce4","dept":"38","canton":"Vienne","commune":"Vienne","nom":"Bâtie","type":"Vestiges","periode":"XIII","histoire":"Bâtie-Vienne: Sur le mont Salomon, la forteresse de la Bâtie surplombe la vallée. En 743 quand Charles Martel chassa les Musulmans sous l'autorité du Comte Theudoin installé à Vienne dont une certaine complicité s'était établie entre Bourguignons et Sarrasins , en 843 le territoire Dauphinois fait partie de la Lothoringie pour un peu plus tard à la Provence, au profit  du  Comte Girard de Vienne.   En 870 Charles le Chauve s'empare de Vienne  et nomme gouverneur le Comte Boson beau frère de Charles le Chauve . Le 15 octobre 879 réunion du conseil entre évêques et Boson et grand féodaux à Mantaille, ou le nouveau territoire s'étend sur tout le sud-Est de la Basse Bourgogne à la Provence du Lyonnais jusqu'à Lausanne. Vienne fut assiégé par les Carrolingiens en 882 en 884  Boson reprend la capitale et en fait hommage à l'empereur Charles le Gros. En 890 à la mort du roi son fils reconnu comme  roi, sacré à Valence la même année devient Empereur d'Italie, son rival Bérenger l'ayant capturé lui arrache les yeux et le renvoya en Viennois. A la fin de son règne la vallée du Rhône fut ravagée par les Hongrois, puis ce fut Charles Constantin, fils de Louis L'aveugle qui est reconnu comme roi de Bourgogne et de Provence. Les deux derniers roi de Bourgogne Conrad surnommé le Pacifique et son fils Rudolphe III surnommé le Fainéant firent de brefs séjours à Vienne, Conrad est enterré à Vienne. En 993 Rudolphe III engage le royaume de l'Empereur et remet le comté de Vienne à sa femme , la reine Hermangarde, laquelle en investie l'Archevêque de Vienne Burchard. En 1029 celui ci inféode la partie nord du Viennois au comte de Savoie et la partie Sud aux comtes d'Albon. Le Dauphiné est né en 1032,  l'Empereur d'Allemagne hérite du royaume de Bourgogne, pendant quatre siècles Vienne est ville d'Empire.","architecture":"Ce château qui fut construit par ( l'archevêque) Jean de Bernin en (1217  1266)fut démantelé par  richelieu en 1633, il était relié à l'enceinte médiévale il n'en reste qu'un ensemble de vestiges de remparts et de tours surplombe la ville de Vienne.","habitants":"Famille de Jean de Bernin\r\n        \r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Batie_1.jpg","../image/image_38/38_Batie_2.jpg"]},"Consult_chateau_formulaire87a3-2":{"id":"Consult_chateau_formulaire87a3-2","dept":"38","canton":"Meylan","commune":"St-Ismier","nom":"Bâtie_Champrond","type":"Maison forte","periode":"XIII","histoire":"Bâtie-Champrond: Elle appartenait au XIIIe siècle à Odon Alleman, important conseiller du Dauphin Guigues André. La Bâtie passera ensuite à Guillaume Sibut de Laval, puis aux seigneur de Revel  Siboud Alleman, en 1305 la Bâtie fut échangée  avec Pierre Avallon, juriste, en 1339 le fils Hugues D'Avallon, fait partie des Nobles  de Montbonnot, possède deux maisons fortes avec tour;  la Bâtie Champrond et la Bâtie Meylan.      \r\nEn 1362 la petite fille d'Hugues d'Avallon, prénomé Philippa,  apporte en dot cette maison forte à son mari Roux de Commiers. \r\nLa Bâtie Champrond faisait partie d'un ensemble  qui comprenait aussi la Bâtie Haute de Meylan. vendu au père de la charité en 1790, pour devenir une ferme école de St-Ismier puis hébergea un hospice et un centre de retraite.","architecture":"Corps de logis rectangulaire à trois niveaux flanqué d'une tour ronde.","habitants":"Famille d'Odon-Alleman\r\n        \r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Batie_Champrond_1.jpg","../image/image_38/38_Batie_Champrond_2.jpg"]},"Consult_chateau_formulaire6ccb":{"id":"Consult_chateau_formulaire6ccb","dept":"38","canton":"Le Touvet","commune":"La Terrasse","nom":"Carre","type":"Château","periode":"XV","histoire":"Carre, ce château fut construit au XIVe siècle par les évêques de Grenoble qui exploités les vignes, il fut racheté en 1927 par Henri Fabre, inventeur de l'hydravion  qui avait épousé Mlle Germaine de Montgolfier en 1910.","architecture":"Ce château est  composé de deux bâtiments quadrangulaires disposés en équerre reconnaissable  à sa masse carrée et renforcé de trois tours rondes d'angles du XVe siècle.","habitants":"famille de Henri Fabre\r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Carre_1.jpg","../image/image_38/38_Carre_2.jpg","../image/image_38/38_Carre_3.jpg","../image/image_38/38_Carre_4.jpg"]},"Consult_chateau_formulairef591":{"id":"Consult_chateau_formulairef591","dept":"38","canton":"St-Egrève","commune":"St-Martin-le-Vinoux","nom":"Casamaures","type":"Villa","periode":"XIX","histoire":"Casamaures, construite entre 1855 et 1878 par Joseph Jullien dit \"Cochard\" dans un style Mauresque, appelé \"Villa les Magnolias\",  plusieurs fois vendue et rachetée, et en 1950 par la firme \" le bon lait\" qui la laissèrent a l'abandon et c'est en 1981 que Christiane Guichard artiste grenobloise  l'acheta.  Classé monument historique en 1986 sert à des expositions artistiques.","architecture":"Cette villa construite en ciment moulé rebaptisé \" Casamaures\" d'un style mauresques de couleurs bleu outre-mer et ocre-rose de ses façades, de 52 colonnes et vitraux polychromes gravés en calligraphies en arabe classique donne un style orientale.","habitants":"Famille de Joseph Jullien\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Casamaures_1.jpg","../image/image_38/38_Casamaures_2.jpg","../image/image_38/38_Casamaures_3.jpg"]},"Consult_chateau_formulaire1f3b":{"id":"Consult_chateau_formulaire1f3b","dept":"38","canton":"Côte-St-André","commune":"Bossieu","nom":"Cellier Bossieu","type":"Maison forte","periode":"XVI","histoire":"Cellier-Bossieu: Demeure des seigneurs de Boissieu qui n'habitèrent pas sur les lieu, elle fut habité par le notaire de l'abbaye de Bonnevaux au XVIIe siècle, c'est son fils qui harangua ( discours) les foules dans les bois des Burettes et les souleva contre le Marquis de la Croix de Chevrières en 1789.","architecture":"Maison forte de Cellier-Bossieu flanquée d'une tour ronde.","habitants":"Famille de Boissieu\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Cellier_1.jpg"]},"Consult_chateau_formulaire8dba":{"id":"Consult_chateau_formulaire8dba","dept":"38","canton":"Crémieu","commune":"Frontonas","nom":"Certeau","type":"Maison forte","periode":"XIV","histoire":"Certeau: Ruines de l'ancien fief des barons des Adrets (tristement connus) qui avait épousé en 1544  la fille d'Antoine de Gumin, seigneurs des lieux, passa ensuite par alliance à la famille de Sassenage et deviendra la propriété de Jean André Barge, juge au tribunal et maire de Bourgoin Jallieu.","architecture":"De cette maison forte de Certeau il ne reste que les vestiges d'une tour en ruine, avec des murs de deux mètres d'épaisseur, et possède une deuxième tour d'escalier. Entre les deux un corps de logis modeste qui sert aujourd'hui de ferme.","habitants":"Famille de François de Beaumont (Baron des Adrets)\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Certeau_1.jpg","../image/image_38/38_Certeau_2.jpg"]},"Consult_chateau_formulaire0e99":{"id":"Consult_chateau_formulaire0e99","dept":"38","canton":"Tour-du-Pin","commune":"La Chapelle-de-la-Tour","nom":"Chabons","type":"Maison forte","periode":"XVII","histoire":"Chabons: Fut la propriété de la famille de Geoffrey de Girin puis à la famille  de Gallien de Chabons et François Gallien fut procureur général du Dauphiné.","architecture":"Cette maison forte  de Chabons en forme de L, flanquée de tours  rondes et carrées  et d'une tourelle.","habitants":"Famille de François Gallien\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Chabons_1.jpg","../image/image_38/38_Chabons_2.jpg"]},"Consult_chateau_formulaire1020":{"id":"Consult_chateau_formulaire1020","dept":"38","canton":"Crémieu","commune":"Chamagnieu","nom":"Chamagnieu","type":"Château","periode":"XIV","histoire":"Chamagnieu: Ce château construit au XIVe siècle,  remanié au XVII et XVIIIe siècle, Au XIVe siècle la famille Lantelme Aymard était propriétaire du domaine et en 1329 Albert Vetule le reçu de la part du Dauphin Guigues, passa au XVIIIe siècle à la famille de Lauras-Montplaisant qui le garda  jusqu'au XIXe siècle, à la révolution il fut seulement pillé en juillet 1789 et fut acheté par la ville de Villeurbanne en 1929 qui en fit un internat jusqu'en 1973 et un centre aéré pour l'été.","architecture":"Chamagnieu, gros bâtiment en forme de U flanqué de deux grosses tours rondes et de deux tourelles à l'opposée accompagné sur le côté d'une belle orangerie.","habitants":"Famille  de Lauras-Montplaisant\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Chamagnieu_1.jpg"]},"Consult_chateau_formulaire45cc":{"id":"Consult_chateau_formulaire45cc","dept":"38","canton":"Pont-de-Beauvoisin","commune":"Corbelin","nom":"Champ_Levet","type":"Maison forte","periode":"XVI","histoire":"Champ-Levet: Cette maison forte construite au XVIe siècle par la famille de Jean d'Angelin, seigneur des Avenières  qui la conservera jusqu'à la révolution. Au XIXe siècle une famille de soyeux  lyonnais les Roches l'acheta.","architecture":"Champ-Levet possède un corps de logis rectangulaire flanqué en façade gauche d'un pavillon de pierre et mâchicoulis et fenêtres à meneaux.","habitants":"Famille de Jean d'Angelin\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Champ_Levet_1.jpg"]},"Consult_chateau_formulaire8191":{"id":"Consult_chateau_formulaire8191","dept":"38","canton":"Vizille","commune":"Champ-sur-Drac","nom":"Champs_sur_Drac","type":"Vestiges","periode":"XIII","histoire":"Champ sur Drac: Vestige du château du XIII de la famille  des Alleman ( puissante famille dont faisait partie la mère de Bayard)","architecture":"De ce château de Champ sur Drac il ne reste qu'une tour réhabilitée et un pan de mur avec des éléments à meneaux.","habitants":"Famille Alleman\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Champs_sur_Drac_1.jpg"]},"Consult_chateau_formulaire2b56":{"id":"Consult_chateau_formulaire2b56","dept":"38","canton":"Roybon","commune":"Marcilloles","nom":"Chantemerle","type":"Manoir","periode":"XVII","histoire":"Chantemerle: Ce manoir appelé autrefois château  Jourdan a subit des remaniement au siècle dernier.","architecture":"Chantemerle, corps de logis rectangulaire à trois niveaux avec lucarnes accolé d'un pavillon rectangulaire saillant flanqués de tourelles rondes à toit en poivrières.","habitants":"Famille Jourdan\r\n        \r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Chantemerle_1.jpg","../image/image_38/38_Chantemerle_2.jpg","../image/image_38/38_Chantemerle_3.jpg"]},"Consult_chateau_formulaireb05a":{"id":"Consult_chateau_formulaireb05a","dept":"38","canton":"Tour-du-Pin","commune":"Vignieu","nom":"Chapeau_Cornu","type":"Château","periode":"XIII","histoire":"Chapeau-Cornu: Louis Pierre de Chapeau-Cornu, était châtelain Delphinal de la tour du Pin en 1351.\r\nLe château fut construit par la seigneurie de Vignieu, au XIVe siècle, le dauphin en fit don à Amédée de Roussillon, seigneur de Brangues et Morestel qui deviendra bailli de la Tour du Pin, à gardé le nom de son propriétaire \"cappelli cornuti\" a été racheté par plusieurs communes pour en faire un lieu de stage et séminaire avec restaurant.","architecture":"M F  de plan fermé  flanquée de deux grosses tours  rondes et d'une tour carrée.","habitants":"Famille d'Amedée de Roussillon\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Chapeau_Cornu_1.jpg","../image/image_38/38_Chapeau_Cornu_2.jpg","../image/image_38/38_Chapeau_Cornu_3.jpg","../image/image_38/38_Chapeau_Cornu_4.jpg","../image/image_38/38_Chapeau_Cornu_5.jpg"]},"Consult_chateau_formulairedc96":{"id":"Consult_chateau_formulairedc96","dept":"38","canton":"St-Laurent-du-Pont","commune":"St-Pierre-de-Chartreuse","nom":"Chartreuse","type":"Couvent","periode":"XI-XVIII","histoire":"Ce monastère fondé en 1084 par Saint-Bruno ( Bruno Chartrousse) et six compagnons, fut aussi foyer actif de l'économie du massif de la Chartreuse. Tandis que les pères gardaient la cellule, les frères convers, établis à la Correrie, furent cultivateurs et métallurgistes. Vivant de toutes les ressources de la nature local, et vont jusqu'à devenir maître de forges et sont aujourd'hui reconnus comme les initiateurs de la métallurgie moderne. Dépossédés  de leurs biens à la révolution, ils développèrent la fabrication des élixirs, qu'ils avaient découverts en 1605 et c'est en 1737 qu'il produiront leur premier élixir végétal (55°). Ce monastère abritait 110 religieux et l'ordre comptait  160 maisons éparpillé dans le monde, après être chassé à la Révolution, les moines revinrent en 1816. une application sévère de la loi de 1901 sur les associations les obligea à s'exiler en Italie; ils n'en revinrent qu'en 1940.","architecture":"Ce monastère qui était de simples cabanes en bois , servira de modèle pour l'édification de tous les autres monastères de l'ordre; subit de nombreux drames naturels, jusqu'à l'incendie  de 1676, il fut alors rebâti tel qu'il nous apparaît aujourd'hui.","habitants":"Saint  Bruno\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Chartreuse_1.jpg","../image/image_38/38_Chartreuse_2.jpg"]},"Consult_chateau_formulaire62f0":{"id":"Consult_chateau_formulaire62f0","dept":"38","canton":"Vienne","commune":"Chasse-sur-Rhône","nom":"Chasse","type":"Château","periode":"XIX","histoire":"Chasse sur Rhône: La châtellenie de Chasse comprenait un château avec un hameau qui appartenait à partir de 1583 à la famille de Sautereau, famille de Robins de Grenoble. Cette année là François de Sautereau, conseillé au parlement de Grenoble , épouse Marie Gilbert, fille de Claude Gilbert, seigneur de Chasse, la grande famille de Sautereau se succédèrent jusqu'à la révolution.                             Dans la commune sur la crête jolie manoir des Etournelles à deux tours rondes toitures à tuiles vernissées.","architecture":"Ce château qui surplombe la vallée, de forme rectangulaire est aujourd'hui transformer en hôtel des postes.","habitants":"Famille Sautereau\r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Chasse_1.jpg"]},"Consult_chateau_formulairecf80":{"id":"Consult_chateau_formulairecf80","dept":"38","canton":"Vinay","commune":"Chasselay","nom":"Chasselay(38)","type":"Maison forte","periode":"XVI","histoire":"Chasselay: Cette maison forte  du XVI et XVIIe siècle s'appélle aussi la Falcotière qui s'est transformé en ferme  faisait partie des domaines des Antonins.","architecture":"Cette maison forte transformé en ferme garde son cachet  fortifiée  par sa tour carrée les autres ont disparues, il fut remanié en 1900 et 1998.","habitants":"Les Antonins\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Chasselay_1.jpg","../image/image_38/38_Chasselay_2.jpg","../image/image_38/38_Chasselay_3.jpg","../image/image_38/38_Chasselay_4.jpg"]},"Consult_chateau_formulaire75b0":{"id":"Consult_chateau_formulaire75b0","dept":"38","canton":"St-Marcellin","commune":"St-Bonnet-de-Chavagne","nom":"Chatelard_St_Marcellin","type":"Maison forte","periode":"XIV","histoire":"Chatelard-St-Marcellin: Ferme fortifié dominée par un donjon carré, ses possesseurs connus depuis Beillion du Châtellard au XIVe siècle dont le petit fils, Robert est cité en 1475 parmi les nobles du mandement de Saint-Lattier, la famille Sollier au XVIe siècle, et du marquis de la Porte.\r\n Acheté en 1938 par monsieur Griot minotier à la Sône et passera ensuite par plusieurs mains, il y a quelques années monsieur Christian Ocel a entrepris la restauration et depuis revendu, aujourd'hui le bâtiment abrite un laboratoire de datation archéologique  \"Archéolabs\".","architecture":"Le Châtelard est un gros donjon carré de 5 à 6 étages où l'on a accolé un corps de logis rectangulaire avec aile en retour et au centre  une tour a escalier à vis qui date du XVe siècle.","habitants":"Famille Beillion du Châtellard\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Ch%c3%a2telard_1.jpg","../image/image_38/38_Ch%c3%a2telard_2.jpg","../image/image_38/38_Ch%c3%a2telard_3.jpg","../image/image_38/38_Ch%c3%a2telard_4.jpg"]},"Consult_chateau_formulaireacf0":{"id":"Consult_chateau_formulaireacf0","dept":"38","canton":"St-Marcellin","commune":"Chatte","nom":"Chatte","type":"Maison forte","periode":"XIII","histoire":"Chatte: Ce château appelait aussi château \"des Pauvres\". La co-seigneurie de Chatte et son château a une branche cadette de la famille des Clermont, dont il eu dans cette lignée 19 générations.  Saint  Amédée évêque de Lausanne ou il mourut en 1159. Parmi les célébrité, citons François de Chaste qui s'illustra en 1541 au  siège de Metz et son frère Eymard grand maître de l'ordre de Saint Lazarre ambassadeur d'Angleterre mourut en 1602 , en 1672  Claude Nicolas de Clermont-Chaste sénéchal du Puy vend le château et la co-seigneurie à Felicien de Boffin seigneur de la Sône que ses descendants garderont jusqu'à la Révolution. Le dernier propriétaire le marquis de la Roque de Pluvinel fut porté sur la liste des émigrés.","architecture":"Attestée du XIIe siècle, se compose d'un édifice dont peu d'éléments remontent au Moyen Age, tour d'escalier à vis et fenêtres à meneaux  du XVe siècle.","habitants":"Famille de François de Chaste\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Chatte_1.jpg","../image/image_38/38_Chatte_2.jpg"]},"Consult_chateau_formulaired9ba":{"id":"Consult_chateau_formulaired9ba","dept":"38","canton":"Fontaine","commune":"St-Jean-de-Noyarey","nom":"Chaulnes","type":"Manoir","periode":"XVII","histoire":"Le nom de la famille des Chaulnes viendrait du latin de Chaonis, famille originaire de Picardie Jean de Chaulnes vivait en 1540 avait deux fils Antoine et Pierre qui s'établirent en Dauphiné: Antoine président au bureau des finances en 1628 et Claude conseillé au parlement. Antoine seigneur de Veurey; Claude son fils le succéda également au finance et sur les terres de Noyarey, Veurey, Saint-Quentin  en 1684. \r\nC'est après 1670, qu'un membre de la famille, Joseph, porte le premier titre de Marquis de Chaulnes. En 1677 dans les démêlés avec les religieux de Saint  Robert, le seigneur de Chaulnes est dit \"seul seigneur de Noyarey, Veurey et co-seigneur de St-Quentin\".            Au début du XVIIIe siècle, c'est Monseigneur Messire Paul de Chaulnes  évêque de Sarlat, conseiller du Roy, qui est marquis du dit lieu .  Il devient de Janvier 1721 à  sa mort en 1725, évêque et prince de Grenoble.  En 1743 le château  de est acheté par messire Jean de Caulet évêque et prince de Grenoble, habite Grenoble  en  hiver  et à Noyarey en été; le château passera ensuite à son neveu Tristan de Caulet  Marquis de Grammont chevalier de Saint-Louis, le domaine restera dans cette famille jusqu'en juin 1831, puis vendu au Baron Thomas \"intendant militaire\".","architecture":"Ce manoir  de Chaulne, simple à l'origine de forme rectangulaire à fronton a reçu en 1830 les deux tourelles.","habitants":"Famille de Joseph de Chaunes\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Chaulnes_1.jpg"]},"Consult_chateau_formulaireb9e9":{"id":"Consult_chateau_formulaireb9e9","dept":"38","canton":"Bourgoin-Jallieu","commune":"St-Chef","nom":"Chivallet_Chamond","type":"Maison forte","periode":"XIV","histoire":"En  1356 Pierre de Chivallet  épouse mademoiselle  d'Ambroise de Michallis,  cette maison forte restera dans cette famille jusqu'au XIXe siècle,  à cette époque s'appela Chamond et passa dans plusieurs mains  dont celle de Doncieu et après être tombé dans l'oubli la famille Scrive l'acheta et le restaura.","architecture":"Cette maison forte  du XIV e siècle a été incendié plusieurs fois, abandonné et repris pour être restauré en respectant l'architecture d'origine. De forme quadrangulaire flanqué de tours carrées.","habitants":"Famille de Chivallet\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Chivallet_Chamond_1.jpg"]},"Consult_chateau_formulaire019b":{"id":"Consult_chateau_formulaire019b","dept":"38","canton":"Vienne","commune":"Chonas-l`Amballan","nom":"Chonas","type":"Château","periode":"XIV","histoire":"Chonas: Au milieu du XVIe siècle, le propriétaire était la seigneurie de Guillaume de Bésignan. Guillaume de Bourrellon dont la famille possédait  St-Bonnet de Mures avec les titres de seigneur de Mures, inclut Chonas à ses possessions, et après cette inclusion en 1550 devient ainsi seigneur de Mures, Chonas et Marennes (prés de Chandieu). Il mourut  en 1566. Ses descendants céderont Chonas à la puissante famille des Maugiron. \r\nAprès la Révolution le château est la propriété de la famille Denantes. L'avocat Pierre Denantes, premier maire de la commune de Chonas crée en 1790, fut élu cette même année au premier conseil général du département de l'Isère.","architecture":"Château massif et austère, fenêtres à meneaux.","habitants":"Famille Maugiron\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Chonas_1.jpg","../image/image_38/38_Chonas_2.jpg","../image/image_38/38_Chonas_3.jpg"]},"Consult_chateau_formulaire3573":{"id":"Consult_chateau_formulaire3573","dept":"38","canton":"Roybon","commune":"Roybon","nom":"Château_Rocher","type":"Gentilhommière","periode":"XVIII","histoire":"Château-Rocher: Gentilhommière très modernisée avec des dépendances rapportées tout cela est aujourd'hui un centre d'animation.","architecture":"De l'origine il ne reste qu'un bâtiment rectangulaire.","habitants":"\"","divers":"","gps":"","images":["../image/image_38/38_Chateau_Rocher_1.jpg"]},"Consult_chateau_formulaireb631":{"id":"Consult_chateau_formulaireb631","dept":"38","canton":"Goncelin","commune":"La Pierre","nom":"Château_Vieux","type":"Manoir","periode":"XV","histoire":"Château-Vieux: Cité en 1104; Le château construit par la famille  de Monteynard sur l'emplacement d'un ancien château féodal, maison forte ou naquit Louis François de Monteynard en 1713 qui entrera à l'age de 14 ans au service du roi dans le régiment de Royal Vaisseaux, puis ministre de Louis XV.  La maison forte  fut en partie détruite par les guerres de religion  mais ce qu'il en reste est du XVe siècle. Cette famille fit construire ensuite le château de Tencin.","architecture":"Cette maison forte dit le \"château\" de forme carrée à quatre niveaux est flanqué de fenêtres à meneaux et d'une tourelle d'entrée construit au XVe siècle.\r\nDans la commune il y a un manoir appelé \"Vaubonnais\" de plan carré flanqué d'une tour du XVe siècle.","habitants":"Famille de Louis François de Monteynard\r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Chateau_Vieux_1.jpg","../image/image_38/38_Chateau_Vieux_2.jpg","../image/image_38/38_Chateau_Vieux_3.jpg"]},"Consult_chateau_formulairea4cc":{"id":"Consult_chateau_formulairea4cc","dept":"38","canton":"Tour-du-Pin","commune":"Montagnieu","nom":"Châtelard_Montagnieu","type":"Maison forte","periode":"XV","histoire":"Châtelard-Montagnieu: Le plus ancien  seigneur connu remonte à Claude de Lay seigneur du Châtelard  et d'autres lieux en 1300. La révision des feux du mandement de la Tour du Pin, le châtelard faisait partie des domaines de la couronne, finit en 1522.\r\n Le roi vend en 1637, le domaine à Jean  de la Porte seigneur de Bocsozel, très illustre famille Dauphinoise descendante des Bayard.  Le château passa ensuite dans la famille des Murinais , aujourd'hui propriété d'une très ancienne famille dauphinoise et  savoyarde les Greyfié de Bellecombe.","architecture":"L'histoire du château se confond avec celle de la commune. Il ne reste qu'une faible partie de la forteresse, celle-ci est utilisée comme carrière de pierres en 1760 pour construire l'actuel château de Marlieu. Le château occupe une position stratégique remarquable, il semble avoir été fortifié depuis une époque très ancienne et à la base d'une tour soutenant la terrasse passe pour être un des reste du donjon. Corps de logis rectangulaire avec un retour en équerre flanqué d'une tour ronde, la façade et le fronton au dessus de la poterne présentent d'intéressants fragments sculptés d'un grand blason, précédant l'entrée, se trouvent des bâtiments agricoles avec une grange doté d'une charpente  remarquable  du XVe siècle.","habitants":"Famille de Claude de Lay\r\n        \r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Chatelard_Montagnieu_1.jpg","../image/image_38/38_Chatelard_Montagnieu_2.jpg"]},"Consult_chateau_formulaired288":{"id":"Consult_chateau_formulaired288","dept":"38","canton":"Crémieu","commune":"Verna","nom":"Cingle","type":"Château","periode":"XIV","histoire":"Cingle-Verna, ancienne maison forte du début du XIVe siècle, elle appartenait à l'époque aux  Pèlerins de Quincieu, seigneur de Verna et d'Hières, famille de notaires anoblis; Au XVIe , une autre famille de notaire, les dauphins de Crémieu \"Pierre Dauphin\" en fit l'achat et y installa en 1520 son honorable fils Berlioz Dauphin seigneur du Single, cette famille gardèrent la seigneurie pendant trois siècles. \r\nTransformé en ferme elle se dégradera, et en 1968, monsieur et madame Crapie sauveront ce château qui n'était plus qu'une ruine, aujourd'hui inscrit à l' I M H.","architecture":"Maison forte construite au XVe siècle , elle est formée de sa tour maîtresse  construite sur l'affleurement du rocher et de deux ailes de logis qui furent prolongées au XVIe siècle, les bâtiments encadrent une cour intérieure, accessible par un portail d'entrée en arc plein cintre. Au fond de la cour une tourelle recevait une chapelle au XVe siècle.","habitants":"Famille Dauphin \r\nFamille Pelerien de Quincieu\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Cingle_1.jpg","../image/image_38/38_Cingle_2.jpg","../image/image_38/38_Cingle_3.jpg"]},"Consult_chateau_formulaireb49c":{"id":"Consult_chateau_formulaireb49c","dept":"38","canton":"Fontaine","commune":"Noyaray","nom":"Clairefontaine","type":"Manoir","periode":"XVII","histoire":"Clairefontaine: Manoir appartient aujourd'hui à la commune","architecture":"Clairefontaine, de plan carré à deux étages flanqué d'une tour carré plein cintre nord.","habitants":"\"","divers":"","gps":"","images":["../image/image_38/38_Clairefontaine_1.jpg"]},"Consult_chateau_formulaired342":{"id":"Consult_chateau_formulaired342","dept":"38","canton":"Vienne","commune":"Chonas-l`Amballan","nom":"Clairefontaine_Chonas","type":"Château","periode":"XVIII","histoire":"Clairefontaine-Chonas: Ce domaine transformait en Hôtel restaurent.","architecture":"De plan carré à deux étages flanqué d'une tour carré plein cintre nord.","habitants":"Famille Girardon\r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Clairefontaine_Chonas_1.jpg"]},"Consult_chateau_formulaire2a50":{"id":"Consult_chateau_formulaire2a50","dept":"38","canton":"Vif","commune":"Claix","nom":"Claix","type":"Vestiges","periode":"XI","histoire":"Claix: Construit au XIe siècle par les Barons de Sassenage, Amblart de Claix seigneur de Champs  vendit à Odon Alleman en 1270  les terres de Varces, Claix et Pariset. \r\nC'est en 1433 que Jean le Beaux Dunois seigneur et compagnon de combat de Jeanne d'Arc, soucieux d'assurer l'avenir de sa mère, Mariette d'Enghein, lui fit don d'une pension mensuelle de 40 florins à prendre sur les revenus de la terre de Claix qu'il possédait depuis le 4 novembre 1421 par suite à une donation que lui avait faite le dauphin ( futur Charles VII en considération de consanguinitè).  \r\nIl ne semble pas que Dunois soit venu à Claix hormis peut-être vers 1440 pour rendre visite à sa mère,  celle-ci en revanche, semble avoir fini ses jours à Claix dans sa maison médiévale, toujours existante située sur le promontoire rocheux du Pertuis du château féodal .","architecture":"Ce château construit sur le mont Pertuis, aujourd'hui en ruines, sur un point stratégique, il figuré dans la liste des châteaux  recensés et décrits en 1339 à la demande d'Humbert  II, ce qui permit de savoir qu'il était entièrement ceint de murs , et qu'il y avait une grande salle à sept fenêtres et qu'il possédait une belle chapelle. il était encore en bon état au XVe siècle.","habitants":"Famille des Barons de Sassenage\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Claix_1.jpg"]},"Consult_chateau_formulaire9d20":{"id":"Consult_chateau_formulaire9d20","dept":"38","canton":"Clelles","commune":"Clelles","nom":"Clelles","type":"Maison forte","periode":"XVI","histoire":"Clelles: La seigneurie appartenait a une branche des Béranger \"les Morges\" fils de Pierre de Morges  1288. \r\nA la fin du XIVe siècle les Morges vendirent à Raymond de Theys, et vers le milieu du XVIe siècle Geneviève de Theys porta par mariage  la famille de Thiennes: Jules de Thiennes démembra le domaine en vendant les terres de Saint-Martin de Clelles et de Thorane à  Alexandre Ier de Bardonnenche, Catherine de Thiennes reçut en dot ce qu'il restait du mandement lors de son mariage avec Jean de Mussy en 1730.\r\nModeste Novel de Lacontessière, héritier de Pierre mourut sans enfant en 1791.\r\nLe manoir de Bachelard-Monval du XVIIe siècle pour la famille Segond, elle fournissait  des avocats et des conseillers au parlement.\r\nUn autre manoir de la famille de Reneville qui passa à Michal Ladichier et à Albert Eugéne Gallet.","architecture":"Du château il ne reste presque plus rien des vestiges, dans le village un manoir dont la façade a été refaite touché d'alignement, une porte du XVIIe siècle. \r\nEn contre bas du bourg un autre petit manoir trapu une tour ronde accolé à un bâtiment.\r\nManoir Bachelard-Monval idem avec une tour ronde.","habitants":"Famille de Jules de Thiennes\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Clelles_1.jpg"]},"Consult_chateau_formulaire9bb0":{"id":"Consult_chateau_formulaire9bb0","dept":"38","canton":"Voiron","commune":"Chirens","nom":"Clermont_Chirens","type":"Vestiges","periode":"XI","histoire":"Clermont-Chirens: Le château de Clermont tel qui se présente aujourd'hui, occupe au pied d'un massif de la Chartreuse à plus de 600 m d'altitude.\r\nConstruit par la famille de Clermont, inféodé en 1203 à l'église de Vienne par  Guillaume de Clermont. \r\nParmi les membres de cette famille citons: Siboud au XIe siècle. Aymard II que le Dauphin Humbert II nommé capitaine général des troupes, charge qui devenait héréditaire dans sa maison: Antoine III en faveur de qui la baronnie de Clermont fut érigée en comté par le roi Henri  II en 1547 grand maître de l'administration des eaux et forêts de France , lieutenant -gouverneur  du Dauphiné .     En 1571 le roi de France Henri II confère le titre de Duc et Pair au comte de Clermont-Tonnerre. Aimé de Clermont-Tonnerre fut Ministre de la guerre et ministre de la marine sous la restauration.            Le domaine reste aux  mains de ses derniers  jusqu'au XVIIIe siècle, époque où il passe dans la famille de Tourzel, cependant mis aux enchères en 1846,  il est adjugé à Marie Gaspard, duc de Clermont-Tonnerre, et fait ainsi retour aux descendants de la branche aînée de cette famille qui en est toujours propriétaire.","architecture":"Le premier édifice de Clermont du XVe siècle a remplacé le château en terre et bois du XIIe siècle qui constituait au moyen age une position militaire stratégique aux limites de la Savoie et du Dauphiné. Il subsiste de ce château qui possédait un puissant donjon pentagonal  sur motte protégé par une première enceinte massive, flanquée d'une petite tour ronde et de deux enceintes aux murs de tuff et de galet délimitant deux basses cours. Il fut démantelé au XVIIe siècle il reste qu'un donjon de 20 mètres de haut et quelques éléments d'enceinte.","habitants":"Famille de Clermont\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Clermont_Chirens_1.jpg"]},"Consult_chateau_formulaire0f00":{"id":"Consult_chateau_formulaire0f00","dept":"38","canton":"Tour-du-Pin","commune":"St-Geoire-en-Valdaine","nom":"Clermont_St_Geoires","type":"Château","periode":"XIII","histoire":"Clermont-St-Geoires: Au XIIIe siècle appartenait à la famille de Clermont était le siège du comté de Clermont, qui le gardèrent jusqu'à la révolution, leur fief fut érigé en duché au XVIe siècle par le Roi Charles IX. \r\nA la Révolution le château passa à la famille de Lannion, de Pons et de Tourzel.  \r\nEn ruine après un incendie, il sera racheté en 1846  par monsieur André-Michal Ladichère sénateur de l'Isère, qui le céda à son  neveu à qui  l'on doit la reconstruction actuelle dans le style renaissance en 1869. \r\nIl appartient aujourd'hui à la banque Nationale de Paris pour colonie de vacances.","architecture":"Reconstruit en 1870 dans un style renaissance,  avec une tour hexagonale et ses  fenêtres à meneaux  et petite chapelle sur la gauche.","habitants":"Famille de Clermont\r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Clermont_St_Geoires_1.jpg"]},"Consult_chateau_formulaire753d":{"id":"Consult_chateau_formulaire753d","dept":"38","canton":"Fontaine","commune":"Seyssinet-Pariset","nom":"Clos_aux_Combes","type":"Maison forte","periode":"XVI","histoire":"Clos aux Combes: La famille de Pariset apparaît au XIIe siècle avec Guillaume de Pariset et en 1318 le mandement se trouve partagé entre plusieurs seigneurs  jusqu'à  l'inféodation d'Humbert II en 1342 dont la famille Pariset n'ayant plus d'héritier mâle, Philippe de Pariset vend sa part à son oncle Benoit . \r\nAu XVIe siècle le fief des Pariset passe à la famille de Lovat qui en demeurent propriétaire pendant deux siècles.  Elle appartenait à l'époque de sa construction du XVI-XVIIe siècle à la famille Garcin, à la Révolution le propriétaire ayant émigré, elle fut vendue comme bien national.\r\nA la fin du XIXe siècle, elle servit de cadre à une école des pères missionnaires. \r\nFrançois de Sales y aurait séjourné.","architecture":"La gracieuse construction actuelle daterait de 1642 mais l'origine serait une maison plus ancienne, la date sur le fronton est 1512.","habitants":"Famille Garcin\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Clos_aux_Combes_1.jpg"]},"Consult_chateau_formulaire6854":{"id":"Consult_chateau_formulaire6854","dept":"38","canton":"Mens","commune":"Saint-Jean-d`Hérans","nom":"Collet_de_Vulson","type":"Maison forte","periode":"XVI","histoire":"Collet-de-Vulson: Construite par le comte de Vulson en 1616, lieutenant du connétable de Lesdiguières. Ce château servit d'expérience alchimique.","architecture":"Le château de Collet de Vulson, corps de logis rectangulaire flanqué de deux tours rondes arasées et d'une tour carrée à l'opposé.","habitants":"Comte de Vulson\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Collet_de_Vulson_1.jpg","../image/image_38/38_Collet_de_Vulson_2.jpg"]},"Consult_chateau_formulaire6427":{"id":"Consult_chateau_formulaire6427","dept":"38","canton":"Echirolles","commune":"Eybens","nom":"Commanderie","type":"Manoir","periode":"XIV","histoire":"Commanderie: Lié à l'histoire du Dauphiné,a été la maladerie de la Levade après avoir été hôspitalerie des Templiers, puis devient le château de la commanderie, il fut la propriété du prince Dauphin, puis échangé avec une autre possession des chevaliers de Malte, ces derniers le conservèrent du XIVe siècle à la Révolution. \r\nEn 1870 ce domaine  passa à la famille Perrier; déja propriétaire du château de Vizille, fut la propriété de Joseph Dastier, puis à la famille de Renneville dela Brosse et de Tournadre.","architecture":"Le château de la commanderie a un corps de logis quadrangulaire,un donjon saillant en façade côté jardin, de quatre niveaux et tours rondes à l'opposée .","habitants":"les Chevaliers de Malte\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Commanderie_1.jpg"]},"Consult_chateau_formulaire84c9":{"id":"Consult_chateau_formulaire84c9","dept":"38","canton":"Echirolles","commune":"Echirolles","nom":"Commanderie_Echirolles","type":"Commanderie","periode":"XIV","histoire":"Commanderie-Echirolles: Construite par l'Ordre du  Temple en 1312, ensuite propriété de Saint  Jean de Jérusalem , en 1540. \r\nEn 1590  Antoine de Villeneuve commandant des troupes de Lesdiguières détruisit en partie la commanderie. \r\nEn 1674 cette dernière fut réunie à celle de Valence et son dernier commandeur Bertrand de Moreton de Chabrillan.","architecture":"La commanderie possède un corps de logis rectangulaire du XVIe siècle flanqué en angle d'une tour carrée.","habitants":"Les templiers\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Commanderie_Echirolles_1.jpg"]},"Consult_chateau_formulaireb9ee":{"id":"Consult_chateau_formulaireb9ee","dept":"38","canton":"Meylan","commune":"Corenc","nom":"Condamine (38)","type":"Maison forte","periode":"XIV","histoire":"Condamine: A l'origine fut fondé par Humbert II, mais brûla plusieurs fois reconstruit en style moderne, aujourd'hui occupé par un  établissement d'enseignement et mairie.","architecture":"le château de la Condamine à un corps de logis rectangulaire avec fronton sur pavillon saillant.","habitants":"Humbert II\r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Condamine_1.jpg"]},"Consult_chateau_formulaire2979":{"id":"Consult_chateau_formulaire2979","dept":"38","canton":"Vizille","commune":"cornage","nom":"cornage","type":"Maison forte","periode":"XVIII","histoire":"Cornage: Aujourd'hui hôtel restaurent.","architecture":"Corps de Logis rectangulaire à trois niveaux, construction  du XVIIIe siècle","habitants":"\"","divers":"","gps":"","images":["../image/image_38/38_Cornage_1.jpg"]},"Consult_chateau_formulaire7354":{"id":"Consult_chateau_formulaire7354","dept":"38","canton":"Meylan","commune":"Bernin","nom":"Crapanoz","type":"Maison forte","periode":"XV","histoire":"Crapanoz: Cette maison forte a appartenu aux  Montfort, puis les Vachon de Belmont, connus par François dit  \"Soutane de fer\"  envoyé au Canada en 1680 pour évangéliser les Iroquois.  Les seigneurs de Bernin par alliance aux Terrail y entrèrent.\r\nLa famille de Craponoz s'est éteinte dans les années 1600.\r\nParmi les personnages célèbres né à Bernin citons le général d'empire Bourgeat et le peintre Urbain Bonnet. Aujourd'hui à la famille Sabatier.","architecture":"La maison forte de Crapanoz du XIII siècle il y avait une tour carrée qui fut complétée par la suite par un bâtiment rectangulaire au XVe siècle et au  XVIe siècle par des tours rondes à toits poivrières.","habitants":"Famille Montfort\r\nFamille Craponnoz\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Crapanoz_1.jpg"]},"Consult_chateau_formulaire7a84-2":{"id":"Consult_chateau_formulaire7a84-2","dept":"38","canton":"Touvet","commune":"Crolles","nom":"Crolles","type":"Château","periode":"XIV","histoire":"Crolles: Château construit en 1340 par  Amblart de Beaumont \"Chancelier\" sur une terre que lui a donné le dernier Dauphin Humbert II, ce château resta trois siècles dans la même famille ( Béatrix de Hongrie, mère des deux derniers Dauphins, s'y retira jusqu'en 1349). Henri IV y séjourna  et en 1639, Louis XIII et  Richelieu furent reçu en ce château. \r\nAu XVIIIe siècle Antoine Guerin seigneur de Tencin, président au parlement du Dauphiné racheta le château à son cousin. Son arrière petite fille épousera Henri Benoit de Pierre de Bernis, ancêtres des propriétaires actuels.                                         \r\nDans la commune le château de Bernis; maison forte élevé au XIVe siècle de forme rectangulaire  remanié au XVIe siècle.","architecture":"Du château de Montfort qui appartenait aux Beaumont est en Ruines.\r\nEn 1340, maison forte qui fut construite, remaniée par la suite pour devenir château, deux corps de bâtiments accolés, aux extrémités une tour cylindrique.","habitants":"Famille d'Amblart de Beaumont\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Crolles_1.jpg"]},"Consult_chateau_formulaired9ab":{"id":"Consult_chateau_formulaired9ab","dept":"38","canton":"Crémieu","commune":"Crémieu","nom":"Crémieu","type":"Château","periode":"XII","histoire":"Crémieu: En 1107 il fut mention d'une donation par Adhémar Wautier de Crimei  de L'abbaye de Cluny, en 1190 Albert II baron de la Tour du Pin. Ce dernier en partance pour la croisade, confie à sa femme l'administration de Crémieu.  En 1349, la cession du Dauphiné à la France ne diminue pas son rôle militaire, qui fut considéré comme porte du Dauphiné et cette cité  participa à la bataille d'Anthon. \r\nEn 1465 à l'occasion  du mariage de Louis, bâtard  de Bourbon, avec la fille naturelle de Louis XI et de Marguerite de Sassenage se virent confié la seigneurie de Crémieu qui en 1498,  fit retour au domaine royal  de France, elle y installa Bernardin Botu comme seigneur et châtelain trois générations se succédèrent, et en 1543 Crémieu retombait sous la domination des engastistes, la seigneurie fut achetée par  Guyot Henri, riche bourgeois lyonnais dont cette famille la conservera  jusqu'en 1571 et passe au seigneur  de Saint-Jullien, président de Turin puis à César Martin de Dizimieu et  en 1638, la seigneurie fut vendue à Melchior de la Poype et en sortie de cette famille qu'au milieu  du XVIIIe siècle.  \r\nAu XVIIe siècle Crémieu perd sa valeur militaire, en 1601 le traité de Lyon met fin à la lutte engagée par Henri IV contre le duc de Savoie et en 1626 le château fut en partie détruit sur ordre de Richelieu et les remparts  étaient déjà ruinés. \r\nLa ville de Crémieu devint la ville des couvents.","architecture":"Crémieu fut une place forte militaire, le château construit au XIIe siècle détruit sur ordre de Richelieu. La ville a gardé son aspect moyenâgeux, ruelles étroites , remparts  du XIVe siècle et  des portes monumentales, la porte de la loi, ( XIVe S.) la  porte de Quirieu, ( XIVe S), la porte du faubourg,  la porte François Ier du XVIe siècle et la porte des moulins démolie vers 1850 ; des maisons du XVe siècle, le château dalphinal du XIIe siècle qui  domine le tout. \r\nCrémieu possédait quatorze tours et neuf portes qui formaient une enceinte fortifiée. Le bâtiment le plus remarquable est sans doute la \"Halle\"qui fut construite entre 1315 et 1321 et qui n'a pas été modifiée depuis.  \r\nDu château il reste  qu'un élément renaissance.","habitants":"Famille de Bourbon\r\nBaron de la Tour du Pin \r\nFamille Melchior de la Poype\r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Cremieu_1.jpg","../image/image_38/38_Cremieu_2.jpg","../image/image_38/38_Cremieu_3.jpg","../image/image_38/38_Cremieu_4.jpg","../image/image_38/38_Cremieu_5.jpg","../image/image_38/38_Cremieu_6.jpg","../image/image_38/38_Cremieu_7.jpg","../image/image_38/38_Cremieu_8.jpg","../image/image_38/38_Cremieu_9.jpg"]},"Consult_chateau_formulaire7083":{"id":"Consult_chateau_formulaire7083","dept":"38","canton":"Tour-du-Pin","commune":"St-Jean-de-Soudain","nom":"Cuirieu","type":"Maison forte","periode":"XIV","histoire":"Cuirieu: Cette maison forte serait  construite en 1400 par la famille Leflaive, qui l'ont perdu peu après, puis  la  récupéreront après cinq siècles et qui la  possède à l'heure actuel.   \r\nLe nom de Cuirieu proviendrait de la curée ou cuirée au loup et servait de rendez vous de chasse.  \r\nAu XVe siècle elle protégeait la Tour du Pin des invasions savoyardes.  \r\nAu XVIe siècle Pierre de Boissat transforma le château au nom de Boissat après l'avoir remanié puis fut érigé en marquisat François de Boissat en 1700  capitaine au service de Parme, puis à Charles de Boissat seigneur  de Cuirieu et de Saint-Didier de la Tour, en 1770 François de Boissat président de la chambre des comptes en Dauphiné et marquis de Boissat, son fils Charles-Louis Mestre de Camp des Dragons seigneur et marquis et seigneur engagiste  de Saint-Didier malgré une soeur  abbesse à Laval-Bressieu, il  parut à l'assemblée des Etats Généraux en 1788 il fut exécuté à Lyon en 1793, bien qu'ayant prêté serment civique en 1793, après l'écrasement de l'insurection fédéraliste.\r\nLe château fut pillé en 1789. \r\nPar héritage le château passa à un neveu des Boissat, le marquis du Viviers, Charles-Marie du Viviers de Veaune, compagnon du naturaliste Jussieu, il rapporta du Moyen-Orient un cèdre identique à celui du jardin des plantes de Paris, planté sur la terrasse il a dut être abattu en 1978 . \r\nMais le plus original fut l'un des descendants du dernier marquis du Vivier, connut par ses  extravagances notoires, ayant de nombreuses maîtresses qu'il  louait par contrat devant notaire et qu'il se promenait avec un lion en laisse dans les rues de la Tour du Pin ce qui paniqué la population.","architecture":"Construite sur des vestiges carolingiens en maison forte en 1400, transformé en défensive au XVe siècle puis remanié au XVIe siècle d'un sobre corps de logis en L avec trois tours rondes en angle, perdant ses douves elle perdit son aspect défensif qui la transformera en une belle demeure que nous admirons encore aujourd'hui.","habitants":"Famille de Boissat \r\nFamille Leflaive du Villard\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Cuirieu_1.jpg","../image/image_38/38_Cuirieu_2.jpg"]},"Consult_chateau_formulairef749-2":{"id":"Consult_chateau_formulairef749-2","dept":"38","canton":"St-Marcellin","commune":"St-Sauveur","nom":"Cumane","type":"Maison forte","periode":"XVI","histoire":"Cumane: Dés 1309 le Dauphin Jean II alberge à noble Bernard Tardif le moulin sur la Cumane et le droit d'y faire construire toutes sortes d'artifices. Durant le XV et le XVIe siècle les eaux de la Cumane  seront tenues par sa descendance puis par les Blanchin, ces derniers  vendent Cumane en 1554 à Jean de Vache, constructeur de la maison forte.\r\nLe domaine passa à Dominique de Dijon de Cumane seigneur de Pizieu et lieutenant colonel au régiment de Penthieve, Antoine Dijon conseiller de la chambre des comptes des dauphins épousa Marguerite Bouffier et lui apporta en dote le château et les terres de Cumane. Edmond Debono ancien maire est toujours le propriétaire.","architecture":"Ce château possède un corps de logis du XVIIe siècle  rectangulaire flanqué de tours médiévales aux extrémités, les dépendances entourent la cour d'honneur.","habitants":"Jean de Vache\r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Cumane_1.jpg","../image/image_38/38_Cumane_2.jpg","../image/image_38/38_Cumane_3.jpg"]},"Consult_chateau_formulaireee08":{"id":"Consult_chateau_formulaireee08","dept":"38","canton":"Crémieu","commune":"St-Baudille-de-la-Tour","nom":"Dames","type":"Maison forte","periode":"XV","histoire":"Dames: Construite au XVe siècle par les de Virieu, transformé en ferme agricole, abrite aujourd'hui les roulottes du Dauphiné.","architecture":"La maison forte de s Dames à un corps de logis rectangulaire flanqué d'une tour ronde.","habitants":"Famille de Virieu\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Dames_1.jpg","../image/image_38/38_Dames_2.jpg","../image/image_38/38_Dames_3.jpg"]},"Consult_chateau_formulaire8102":{"id":"Consult_chateau_formulaire8102","dept":"38","canton":"Voiron","commune":"St-Julien de Ratz","nom":"Dauphins","type":"Château","periode":"XIV","histoire":"Dauphins: Château Delphinal construit au XIVe siècle qui passera dans la famille des Expilly,  puis à Hector Blanchet, historien et maire de Coublevie qui le remania.\r\nPuis il fut transformé en hôtel en 1924 et en préventorium par la suite auquel on donnera le nom de Henri Bazire, aujourd'hui  maison de convalescence.","architecture":"Ce château fut construit sur les ruines due la forteresse qui fut prises par le dauphins Guigues VIII qui y mourut en 1333 où la forteresse fut rasé. De construction en  forme de T à trois étages remanié en moderne, a gardé une tour carrée et une tour ronde avec fenêtres à meneaux.","habitants":"Famille Expilly\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Dauphins_1.jpg"]},"Consult_chateau_formulaire0a47":{"id":"Consult_chateau_formulaire0a47","dept":"38","canton":"Bourgoin-Jallieu","commune":"St-Savin","nom":"Demptezieu","type":"Maison forte","periode":"XI","histoire":"Demptezieu: Cette maison forte qui fut detenu à l'origine par Guillaume Bigot  en 1337 puis elle fut habitée pendant trois siècle par la famille Alleman seigneur de Demptézieu  qui l'achetère en 1484 ou naquit  Héléne Alleman , mère du célèbre chevalier Bayard.  \r\nEn 1686, il échut   à Pierre Alleman Vallin, neveu de Pierre Alleman et en fut les seigneurs jusqu'à la Révolution.","architecture":"Cette maison forte d'aujourd'hui   était construite en forteresse au XIe siècle, de plan quadrangulaire comportait un donjon circulaire (tour existante) percé d'archères relié a une quinzaine de tours d'angles reliées entre elles par un mur d'enceinte de I m 30 d'épaisseur et de 800 m de périmètre couronné d'un chemin de ronde crénelé et protégé au sud par un large fossé. \r\nTransformé en château résidentiel au XVe siècleavec un rajout de la tourelle d'escalier à fenêtres renaissances. \r\nAu XVIe siècle disparition de divers bâtiments, du mur d'enceinte ainsi que l'aile nord et certaine tour d'angle.","habitants":"Famille Falques Alleman\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Demptezieu_1.jpg","../image/image_38/38_Demptezieu_2.jpg","../image/image_38/38_Demptezieu_3.jpg"]},"Consult_chateau_formulaire9e8d-2":{"id":"Consult_chateau_formulaire9e8d-2","dept":"38","canton":"Crémieu","commune":"Dizimieu","nom":"Dizimieu","type":"Maison forte","periode":"XIII","histoire":"Dizimieu: Maison du XIIIe qui appartenait aux familles de Loras , de Beaumont, puis au XVe siècle au Martin devenus  par la suite \"Martin de Disimieu\". Antoine de Disimieu participe aux guerres d'Italie d'abord dans la compagnie de Bayard, puis dans l'armée de François Ier retour au château en 1535. \r\nPuis Baltazard de Disimieu reprend au protestant la ville de Morestel, César de Disimieu, son fils fut gouverneur de Vienne en 1591 et en 1613 les terres de Disimieu sont érigées en Comté, Il devient maréchal de camp d'un régiment d'enfanterie, puis grand maître des eaux et forêt du Dauphiné, et bailly du Viennois et en 1614 fut chevalier de l'ordre du Saint-Esprit,  le plus grand de France et  meurt en 1635;    Il était le beau-frère par alliance au duc de Montmorency, connetable de France. \r\nEn 1722  Louis Angelique de Disimieu en hérita  entreprit de gros travaux et conserva les grosses tours.","architecture":"Cette maison forte fut élevée au XIVe siècle, a gardé plusieurs tours rondes dont sa grosse tour maîtresse. Au XVe siècle, l'aspect défensif des tours, reliées à l'origine  par une enceinte, est renforcé ( base talutée de la tour nord et percement d'archères canonnières, (ajout de mâchicoulis). \r\nRemaniée au XVIIe siècle.\r\nCette maison forte était devenue ferme à la Révolution.","habitants":"Famille de César de Disimieu\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Dizimieu_1.jpg","../image/image_38/38_Dizimieu_2.jpg","../image/image_38/38_Dizimieu_3.jpg","../image/image_38/38_Dizimieu_4.jpg"]},"Consult_chateau_formulaire27d3":{"id":"Consult_chateau_formulaire27d3","dept":"38","canton":"Tour-du-Pin","commune":"Dolomieu","nom":"Dolomieu","type":"Château","periode":"XV","histoire":"Dolomieu: Château appelé aussi Buffières. En 1450 la seigneurie fut donné au capitaine Marin Garcia en récompense pour service rendu.  En 1691 la terre de Dolomieu est dirigée en marquisat en faveur d'un François Gratet, qualifié en même temps de seigneur de Saint-Didier et de Champagne c'est la famille du célèbre géologue Déodat de Dolomieu 1750-1801 dont son nom fut donné au \"dolomies\" et par extension aux dolomites.  François de Gratet seigneur de Dolomieu au XVIe siècle construisit le château qui resta dans la famille jusqu'au XIXe siècle par la comtesse de Drée descendante de cette famille par alliance qu'elle revendit au Baron de Buffières. Depuis les années 50 ce château reçoit les colonies de vacances.","architecture":"Dolomieu, corps de logis rectangulaire, porte d'entrée saillante sur façade plein cintre, deux niveaux et attiques en il de buf, fronton triangulaire et toiture en écailles style dauphinois.","habitants":"Famille de François de Gratet\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Dolomieu_1.jpg"]},"Consult_chateau_formulairee7c2":{"id":"Consult_chateau_formulairee7c2","dept":"38","canton":"Bourgoin-Jallieu","commune":"Domarin","nom":"Domarin","type":"Manoir","periode":"XIX","histoire":"Domarin: La seigneurie de Domarin était sous la dépendance de la Baronnie des Maubec, un seigneur Aymar de Beauvoir, vassal des barons de Maubec, habitait la maison forte construite au XVe siècle, mais qui fut détruite pendant la Révolution.","architecture":"Le château de Domarin actuel de construction du XIX e siècle ( classique)","habitants":"Famille d'Aymar de Beauvoir\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Domarin_1.jpg"]},"Consult_chateau_formulairefbec":{"id":"Consult_chateau_formulairefbec","dept":"38","canton":"Morestel","commune":"Charette","nom":"Ecottier","type":"Maison forte","periode":"XV","histoire":"Ecottier: Cette maison forte construite  au début du XVe siècle par Jean de la Balme, elle conservera sa tour carrée ainsi que la partie de l'enceinte originelle munie d'archères, devenue  ferme sera ensuite acquise au XIXe siècle par le comte de Virieu.","architecture":"La maison forte d'Ecottier, Tour carrée occupant l'angle d'une cour fermée par une enceinte, un bâtiment en longueur, le bas est éclairé par des fenêtres à meneaux et traverses, est accolé à la tour fin du XVe siècle et escalier à vis dans une tourelle pentagonale.","habitants":"Famille de Jean de la Balme\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Ecottier_1.jpg"]},"Consult_chateau_formulairef2b9":{"id":"Consult_chateau_formulairef2b9","dept":"38","canton":"Morestel","commune":"Bouvesse-Quirieu","nom":"Enieu","type":"Château","periode":"XVI","histoire":"Enieu: Château construit au XVIe siècle par François de Gervaisie, passa par alliance aux Amat de Villard.","architecture":"Corps de logis carré flanqué de deux pavillons carrés.","habitants":"Famille de François de Gervaisie\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Enieu_1.jpg","../image/image_38/38_Enieu_2.jpg"]},"Consult_chateau_formulairec77c":{"id":"Consult_chateau_formulairec77c","dept":"38","canton":"Tour-du-Pin","commune":"Blandin","nom":"Epinay","type":"Maison forte","periode":"XV","histoire":"Epinay: Au XVIe siècle cette maison forte était la propriété de la famille de sainte Blandine portée le nom de \"Egeadat\"  dont Marie la fille épousa Aymar de l'Espinay en 1547 et en pris le nom. Puis fut la propriété de la famille Belmont, puis Louis de Vachon qui était seigneur d'Epinay et de Bellegarde, était également conseillé au parlement de Grenoble, ses descendants Artus et Nicolas furent seigneur  d'Epinay. Aujourd'hui le domaine est utilisé comme ferme.                                                                                                  Dans la commune le château de la Molinière utilisé comme agence immobilière et château Gaillard.","architecture":"Corps de logis quadrangulaire flanqué de tours rondes en angles.","habitants":"Famille d'Espinay\r\nFamille Belmont \r\nFamille Vachon\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Epinay_1.jpg","../image/image_38/38_Epinay_2.jpg"]},"Consult_chateau_formulairebb4d":{"id":"Consult_chateau_formulairebb4d","dept":"38","canton":"Echirolles","commune":"Eybens","nom":"Eybens","type":"Maison forte","periode":"XVI","histoire":"Eybens: Ce château a eu plusieurs propriétaires, l'origine remonte au Moyen-Age vers 1120, les premières familles citées se sont les Briançon, entre le XIIIe et le XVIe siècle. De 1620 à 1650 à la famille de Surville et à la famille  Christine de France, fille de Henri IV et de Marie de Médicis alors qu'elle était régente de Savoie. Elle avait  épousé Victor Amédée Ier duc de Savoie, et à sa mort en 1637.  Ensuite passa aux Chaponnay jusqu'en 1650, de 1700 à 1754 le château fut habité de nouveau par la famille de Surville, puis passa à la  seigneurie de Pierre-Charles de Leclet, qui était aussi seigneur du Muret co-seigneur de Seyssins, Seyssins, Pariset et Saint-Nizier, décéda sans postérité. La seigneurie passa au Perrier et à leurs descendants  Eugène Chaper jusqu'en 1810 avant d'arriver aux  Faure Desforges. Aujourd'hui à la famille Bassani qui envisage de le céder à la commune.                           Dans la commune au hameau de Poisat le château de Bel-air.","architecture":"Dominant le bourg, sa construction date de 1610, de forme quadrangulaire flanqué de pavillons carrées en angle à deux étages laissé longtemps à l'abandon.                                                          Bel-Air, corps de logis de forme carré flanqué sur une partie de tours rondes et dépendances à tours rondes.","habitants":"Famille de Chritine de France ou de Bourbon\r\nFamille de Leclet\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Eybens_1.jpg","../image/image_38/38_Eybens_2.jpg","../image/image_38/38_Eybens_3.jpg"]},"Consult_chateau_formulairee873":{"id":"Consult_chateau_formulairee873","dept":"38","canton":"Meylan","commune":"St-Nazaire-les-Eymes","nom":"Eymes","type":"Maison forte","periode":"XVI","histoire":"Eymes: pas d'information historique.","architecture":"De construction classique de la région, corps de logis quadrangulaire flanqué de pavillon carré.","habitants":"\"","divers":"","gps":"","images":["../image/image_38/38_Eymes_1.jpg"]},"Consult_chateau_formulaire5de1":{"id":"Consult_chateau_formulaire5de1","dept":"38","canton":"Vienne","commune":"Eyzin-Pinet","nom":"Eyzin_Pinet","type":"Vestiges","periode":"XII","histoire":"Eyzin-Pinet: Le château fort a  appartenu aux puissants seigneurs de Beauvoir de Marc depuis le milieu du XIIe siècle jusqu'à la mort de Guigue de Beauvoir en 1336.  Le dauphin Humbert II en prit la succession, mais dés 1349 vendait ses biens à la France .\r\nLa seigneurie a été confié à des nobles tel que Guillaume de Buffevent en 1461 qui la gardèrent  et habitèrent certainement dans le manoir jusqu'à la Révolution. \r\nDans cette commune il y a une gentilhommière appelait aussi \" Château Lambert\" propriété de la famille de Sallmart qui s'en sépare en 1906.","architecture":"Du château il n'en resterait que le vestige d'une  tour ronde sur motte féodale, du manoir voisin flanqué d'une tour ronde et la maison forte a gardé sa jolie tour demi  hexagonal et des fenêtres à meneaux.","habitants":"Guigue de Beauvoir\r\nFamille Sallmart\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Eyzin_Pinet_1.jpg","../image/image_38/38_Eyzin_Pinet_2.jpg","../image/image_38/38_Eyzin_Pinet_3.jpg"]},"Consult_chateau_formulaire6c59":{"id":"Consult_chateau_formulaire6c59","dept":"38","canton":"Verpillière","commune":"St-Quintin-Fallavier","nom":"Fallavier","type":"Vestiges","periode":"VIII-XI","histoire":"Fallavier: Mentionné au VIIIe siècle sous Charles le Chauve,  vers l'an mil il appartenait aux seigneurs de Beauvoir qui le gardèrent jusqu'au  XIIIe siècle. Sa défense fut ensuite confié aux Bocsozel.  En 1242 il est vendu à Hugues de la Tour, évêque de Clermont qui le cède ensuite au comte de Savoie,  Pierre II de Savoie, ce dernier le fit agrandir  et renforça son appareil défensif. En 1280 au seigneur de Bozon châtelain pour le Comte de Savoie. En 1349 transfert du Dauphiné à la France, Fallavier devient la possession  dalphinal mais contrairement aux autres châteaux   il appartenait directement au roi et le premier seigneur engagiste fut Guillaume de Vergy gouverneur du Dauphiné. En 1369 le roi  Charles V céda le château au comte Jean de Genève, à Jean succéda Pierre son cadet, Robert de Genève qui devint Pape en Avignon sous le nom de Clément VII lui succéda. En 1391 Humbert de Villars hérita de Pierre de Genève et se retira à Fallavier. Sous Charles VII,  Fallavier appartenait à la famille de Saluce allié au comte de Genève; Bertrand de Saluce ayant été tué à Verneuil, sa veuve faute de postérité, vendit à Louis de Châlon Prince d'Orange, mais Louis marquis de Saluce revendiqua l'héritage et en 1418 le prince d'Orange  s'empara de Fallavier par la force et nomme Pierre de Burge gouverneur. Raoul de Gaucourt , gouverneur du Dauphiné décida de réagir repris la place forte de Fallavier et le prince d'Orange perdit la bataille d'Anthon en 1430. Et fut donné par le roi de France à François Comte de Dunois et de Longeville, bâtard d'Orléans grand capitaine et compagnon d'arme de Jeanne d'Arc, gouverneur du Dauphiné en 1483 ne séjourna jamais à Fallavier, à cette époque le château commençait à être inconfortable. Malgré cela au XVIIe siècle il appartint au connétable de Lesdiguières, et suite aux guerres de religion Richelieu le fit démanteler en 1633. En 1697 Jacques Perrin représentait l'autorité ducale de la région , mais le château n'était plus qu'une ruine et laissé à l'abandon Jacques Perrin habita la maison forte des Allinges un peu plus bas, Après cela le château changea  plusieurs fois de propriétaire, les Villeroy de Senozan et de Moidieu, les Talleyrand de Périgord. Une restauration fut entreprise par le dernier acquéreur en 1970 Monsieur Gabriel Mérard puis aidé par des bénévoles.","architecture":"Cette forteresse féodal sur la colline du Relong a été conçu dans un but défensif, cet ouvrage militaire de cinquante mètres de diamètre environ d'une levée de terre avec fossé et chemin de ronde. Entre ce sommet et le château , sur la ligne de  crête, se trouvent les traces d'une ancienne tour . le château  lui-même, séparé du haut de la colline par un fossé large et profond, est formé d'une première enceinte englobant prés d'un hectare et demi . L'entrée dans ce premier rempart est au sud-est entre deux postes de garde. Le château appuyé au rempart par le mur nord de la chapelle, a sa porte dans un angle rentrant pour assurer une meilleure défense. Il est divisé en deux parties par un mur percé d'une porte étroite qui mène dans les dernières défenses, avec donjon apparent dont les murs ont 3,50 mètres d'épaisseur isolé des autres constructions. On devait accéder à sa porte au premier étage par un pont-levis ou une passerelle,  des salles se trouvaient au nord et au sud du donjon. Dans l'autre partie du château; la chapelle au nord, et la grande salle à l'ouest.","habitants":"Seigneurs de Beauvoir \r\nFamille de Guillaume de Vergy \r\nMaréchal de Lesdiguières \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Fallavier_1.jpg","../image/image_38/38_Fallavier_2.jpg","../image/image_38/38_Fallavier_3.jpg","../image/image_38/38_Fallavier_4.jpg"]},"Consult_chateau_formulairee0c2":{"id":"Consult_chateau_formulairee0c2","dept":"38","canton":"Tour-du-Pin","commune":"Faverges-de-la-Tour","nom":"Faverges","type":"Château","periode":"XIII","histoire":"Faverges: Ce château mentionné au XIIIe siècle, un Martin de Virieu chevalier était seigneur  de Faverges et de Montrevel, puis Albert II de Virieu et à Marguerite de Virieu ,François et Jacques de Virieu-Beauvoir étaient seigneur en 1550, les seigneurs de Virieu-Beauvoir, conseillés au parlement de Grenoble. Le château  fut pillé à la Révolution par la bande du sinistre Vauquoy. Le château passa après la Révolution  aux mains de Sébastien Marion, régisseur des Virieu et fut longtemps occupé par la famille Saint-Olive, il est actuellement un  hôtel dirigé par Monsieur  Fournier.","architecture":"Ce château a prit son aspect actuel au XVIIIe siècle suite à des dégâts causés  par la révolution dont la tour de vigie a été réduite par respect de \" l'égalité républicaine\" mais un cercle de mâchicoulis lui fut rajouter en 1880.  Corps de logis quadrangulaire avec cour intérieure et pavillon d'entrée saillant avec hall majestueux et escalier à double volé.","habitants":"Famille de Marguerite de Virieu\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Faverges_1.jpg","../image/image_38/38_Faverges_2.jpg"]},"Consult_chateau_formulaire15f1":{"id":"Consult_chateau_formulaire15f1","dept":"38","canton":"Touvet","commune":"Barraux","nom":"Fayet_Barraux","type":"Maison forte","periode":"XII","histoire":"Fayet-Barraux: Cette maison forte au hameau du Fayet dite aussi  \"Château du Maniquet\" fut construite au XIIe siècle par la famille du Cardinal Cassard, ancien archevêque de Tours, a appartenu ensuite à la famille Rodes au XVe siècle et racheté par Arthaud de Maniquet en 1543, son fils proche de Charles IX  et témoin de ses amours avec   Marie Touchet qui  l'hébergea  pour l'accouchement dans cette maison, et c'est la qu'est   né  Charles de Valois,  futur duc d'Angoulême, le château  restera dans la famille de Maniquet  jusqu'à la fin du XVIIIe siècle.\r\nAprès être passé de mains en mains, il sera abandonné en 1840 à l'état de ruines, dont se porte  acquéreur en 1894  Gustave Rivet, député et sénateur de l'Isère, ancien secrétaire de Victor Hugo qui le remit en état et ses descendants sont toujours dans ce château.","architecture":"Maison forte construite au XIIe siècle, transformé en château corps de logis rectangulaire prolongé de deux ailes entourant une cour bordée d'un côté par une galerie  de style Toscan, avec donjon qui a était démoli en 1550 et sera rajouté deux tours rondes en angles de façade remanié XVIIe siècle.\r\nDans le village de Barraux, il y a un château de construction presque identique au \"Maniquet\" de style  cartusien avec un toit de tuiles écaillées et de tourelles carrées en façade, bâti en 1703 à l'emplacement du château fort.","habitants":"Cardinal Cassard\r\nFamille Arthaud Maniquet \r\nMonsieur Gustave Rivet\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Fayet_Barraux_1.jpg","../image/image_38/38_Fayet_Barraux_2.jpg","../image/image_38/38_Fayet_Barraux_3.jpg"]},"Consult_chateau_formulairefd5b":{"id":"Consult_chateau_formulairefd5b","dept":"38","canton":"Voiron","commune":"Forteresse","nom":"Forchieux","type":"Maison forte","periode":"XI","histoire":"Forchieux: Ce château daterait du XIe siècle, Il subit les guerres de religion, il fut un poste idéal pour les huguenots, ils en sortirent vainqueur d'une bataille  contre les catholiques de la Côte-Saint-André, commandée par le seigneur de Montoison.","architecture":"Ce château qui ressemble plus à une maison forte avec une tour de 25 m de haut, des murs épais avec de nombreuses meurtrières.","habitants":"Famille Forchieux\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Forchieux_1.jpg","../image/image_38/38_Forchieux_2.jpg"]},"Consult_chateau_formulairef09c":{"id":"Consult_chateau_formulairef09c","dept":"38","canton":"Rives","commune":"La Murette","nom":"Francoz","type":"Manoir","periode":"XIV","histoire":"Francoz: Fièrement posé sur une terrasse, à coté de l'église, le château de la famille Francoz pourrait dater de la fin du XIVe siècle, il fut au XVIIIe siècle la propriété d'un avocat au parlement du Dauphiné: Peigné du Parc, ses descendants l'habitent toujours. Au XVIIIe siècle, le château était habité par un avocat au parlement du Dauphiné : Peigné du Parc.\r\nPendant la Révolution Française un Peigné du Parc fut arrêté. Conduit à Grenoble, il fût relâché en cours de route, à Voreppe, où dans le bourg en fête on venait d'apprendre l'arrestation de Robespierre.\r\nUne des nièces de Peigné du Parc devait épouser un des trois frères Jacquemet qui essayèrent de restaurer dans la région l'industrie de la toile qui avait périclité pendant la période révolutionnaire.\r\nMadame Francoz, décédée en 1975 et mère de l'actuel propriétaire du château, en était la petite fille.","architecture":"Ce manoir de Francoz du XIVe siècle corps de logis rectangulaire à deux niveaux flanqué de tours  rondes aux  angles.A l'intérieur, une cheminée abrite une plaque de foyer armoriée, dont le double blason écartelé présente à dextre en pointe, une bande chargée de trois \"clefs\". Au centre, si l'on retourne la plaque de 180°, on lit la date de 1287.","habitants":"famille de Francoz\r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Francoz_1.jpg","../image/image_38/38_Francoz_2.jpg"]},"Consult_chateau_formulaire9296":{"id":"Consult_chateau_formulaire9296","dept":"38","canton":"St-Etienne-de-St-Geoirs","commune":"St-Siméon-de-Bressieux","nom":"Gautefred","type":"Manoir","periode":"XIII","histoire":"Ce manoir appelé aussi \"Gautefred\" ou \"Goutefrey\" était autrefois un avant poste des Bressieux.\r\nEtait connu en 1600 un Eymard Berard sa descendance conseillière  correctrice à la chambre des comptes acquirent en 1780 le marquisat et la seigneurie de Bressieu. François Bérard  de Goutrefrey l'un des quatre premier baron du Dauphiné et seigneur de Brézins, il laissa ses biens à Marguerite Dervieu de Villieu, ses descendants Calixte Bérard de Goutefrey vivant en 1808 dernier héritier de cette maison.\r\nLes biens passa par alliance à la famille  Gardon de Callamand puis à la famille de Bovet.","architecture":"le château de Gaudefret,construit au XIIIe siècle en maison forte dont la tour centrale est l'un des vestige de l'époque, en forme d'équerre à trois étages, toit à inclinaison importante flanqué de trois tours rondes à toits en poivrières.","habitants":"Famille De Gautefred\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Gautefred_1.jpg","../image/image_38/38_Gautefred_2.jpg"]},"Consult_chateau_formulairedf1d":{"id":"Consult_chateau_formulairedf1d","dept":"38","canton":"Roussillon","commune":"St-Maurice l`Exil","nom":"Givray","type":"Château","periode":"XII","histoire":"Givray: Son nom d'époque s'écrit \"Givret\". Construit au XIIe siècle sur l'emplacement d'une maison forte est occupa une grande place dans l'histoire de Saint Maurice. Au XVIe siècle il est toujours sous la dépendance du comté de Roussillon. En 1540 un dénombrement fourni par Claude de Givret le place sous la suzeraineté de Monseigneur de Tournon.  En 1633, Laurent de Lusse, avocat à la cour des Aydes de Vienne le racheta en échange de son domaine de Reventin, et en 1793 le domaine fut vendu à Monsieur Laurent Raffard de Serrières, les descendants de cette famille le gardèrent jusqu'au XXe siècle.","architecture":"A l'origine une maison forte  remanié au XVIIe siècle par la suite en château  avec une imposante architecture mais a souffert des guerres de religion, de forme carré flanqué de tourelles en encorbellement dans les angles.","habitants":"Famille de Claude de Givret\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Givray_1.jpg","../image/image_38/38_Givray_2.jpg"]},"Consult_chateau_formulairebe85":{"id":"Consult_chateau_formulairebe85","dept":"38","canton":"Roussillon","commune":"Agnin","nom":"Golat","type":"Château","periode":"XIX","histoire":"Golat: Ce château fut construit au XIX e siècle par Monsieur Jourdan , ancien maire,  il est aujourd'hui dans sa descendance. \r\nLa famille Golat de la Garenne connut aux XIVe siècle a donnée son nom au domaine.","architecture":"Le château du Golat de construction rectangulaire flanquée de deux tours  rondes côté parc.","habitants":"Famille Jourdan\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Golat_1.jpg"]},"Consult_chateau_formulairec13b-2":{"id":"Consult_chateau_formulairec13b-2","dept":"38","canton":"St-Marcellin","commune":"Chevrières","nom":"Gollard","type":"Château","periode":"XI","histoire":"Gollard: Château mentionné en 1093. Au XIIIe siècle les seigneurs de Chevrières en ont portés le nom et plus tard  la famille   Constantin  posséda le fief pendant deux siècles. Passa ensuite aux Poitiers, hypothéqué en 1287-1288 au comtes de Poitiers à Diane de Poitiers, en dédommagement  de sommes versées pour la lutte contre le duc de Bourgogne et le comte de Savoie, le château de Chevrières est remis en fief, à titre viager à Hugues et  Louis de Bressieux, en 1426,  le château est remis à Jean de Poitiers.   Au milieu du XVIe siècle le domaine fut acquit par la famille de la Croix. Guillaume de Poitiers Saint-Vallier semble avoir été le premier seigneur de Chevrières peut après son mariage en octobre 1526 avec Claude de Miolans. A sa mort en 1546  Guillaume de Poitiers fait son héritière universelle sa soeur Diane 1500-1566 épouse de Louis de Brézé sénéchal de Normandie , la célèbre favorite du roi de France Henri II . Diane vendit  en Avril 1560  aux  Félix de Lacroix et restera dans la branche aînée de cette famille jusqu'en 1789, ce domaine qui passa en marquisat en 1682.","architecture":"Juché sur un coteau, le château du Golard anciennement Golat, bâti sur les fondations d'une maison forte du XIe siècle, il laisse encore apparaître des vestiges du XVIe siècle, dont la tour semi -hexagonale et le porche qui était à l'entrée, des restes de pont-levis et de remparts se remarquent aux alentours. Ce château a était remanié au XVe siècle.","habitants":"Famille de Guillaume de Poitiers     \r\nDiane de Poitiers \r\nFamille de Felix et Jean de la Croix\r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Gollard_1.jpg","../image/image_38/38_Gollard_2.jpg"]},"Consult_chateau_formulairebec3":{"id":"Consult_chateau_formulairebec3","dept":"38","canton":"Domène","commune":"Laval","nom":"Gordes Laval","type":"Maison forte","periode":"XIII","histoire":"Gordes-Laval: Dans cette maison forte du  XIIIe siècle est née Hélène Alleman, mère du chevalier Bayard, la famille Alleman gardèrent ce domaine jusqu'en 1522, ensuite Bertrand de Simiane, baron de Gordes, épouse Guigonne Alleman;  le château fait partie de sa dot. Bertrand de Simiane apporta des modifications à cette maison forte.  En 1740 Madame de Pontevés de Simiane lègue son domaine à Charlotte de Rohan-Soubise, épouse du prince de Condé. Les Condé vendent la seigneurie à Claude Perrier en mai 1787. Le domaine fut racheté en 1832 par la famille Rebuffet et le cède en 1886 à la famille Charrel. Depuis 1953 il est la propriété de Monsieur Prallet, toujours dans la famille.","architecture":"Maison forte construite au XIIIe siècle. Une grosse tour arrondie date de cette époque. Remanié au XVIe siècle,  possède des canonnières dans les tourelles d'entrées et des meurtrières dans la grande tour. Ce château fut abandonné à la révolution et un incendie détruisit la partie ouest, certaines pierres subissent les assauts des pillards.","habitants":"Famille de Anthelme de Laval\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Gordes_Laval_1.jpg","../image/image_38/38_Gordes_Laval_2.jpg","../image/image_38/38_Gordes_Laval_3.jpg"]},"Consult_chateau_formulaire2c24":{"id":"Consult_chateau_formulaire2c24","dept":"38","canton":"Pont-de-Cherruy","commune":"Pont-de-Cherruy","nom":"Grammont (38)","type":"Manoir","periode":"XIX","histoire":"Grammont:  Ce manoir fut la propriété de la famille de Grammont au XIXe siècle,  Monsieur A. Grammont, industriel, créa un centre d'hygiène social à Charvieu et un hôpital  et bien autres choses.       Le château de la Serra dans la commune fut transformé en maison de retraite.","architecture":"Le manoir style villa flanqué d'une tour carrée à toit pointu","habitants":"Famille Gramont\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Grammont_1.jpg","../image/image_38/38_Grammont_2.jpg","../image/image_38/38_Grammont_3.jpg"]},"Consult_chateau_formulairef012":{"id":"Consult_chateau_formulairef012","dept":"38","canton":"Verpillière","commune":"St-Alban-de-Roche","nom":"Gramond","type":"Maison forte","periode":"XIV","histoire":"Gramond: Construite au XIVe siècle par la famille Brunel pour une fonction agricole jusqu'en 1654  passe au de Malatrait, puis par alliance à  la famille de la Poype et au  XVIIe siècle c'est le descendant d'une ancienne famille italienne des Planelli , vers le milieu du XVIIIe siècle qui en firent l'acquisition.                           A la Révolution , considéré comme ferme ne fut pas brûlée mais vendue comme bien national, elle fut acheté par Antoine Drevet, à sa mort elle fut partagé par ses enfants.","architecture":"Cette maison forte qui possédait des infrastructures défensives sont encore visibles, lourd portail, des meurtrières percées au premier et second étage de la tour d'angle ainsi que d'étroites ouvertures du rez de chaussée étaient bardées de barreaux de fer. \r\nDes travaux vers 1767 ne changea pas l'aspect de la maison forte, elle a conservé ses fenêtres à meneaux , sa tour hexagonale de l'escalier à vis mais l'intérieur a été transformé en plusieurs appartements  pour loger toute la famille","habitants":"Famille Brunel   \r\nfamille de la Poype \r\nFamille d'Antoine Drevet\"","divers":"","gps":"","images":["../image/image_38/38_Gramond_1.jpg"]},"Consult_chateau_formulairebda1":{"id":"Consult_chateau_formulairebda1","dept":"38","canton":"Grand-Lemps","commune":"Grand-Lemps","nom":"Grand_Lemps","
