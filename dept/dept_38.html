doue jusqu'en 1827.Aujourd'hui et depuis 2000 transformé en société le domaine est dirigée par Philippe Martinenghi.","architecture":"De construction défensive  du XIIIe siècle, de plan carré, les deux tours rondes sont équipées de meurtrières, aux angles est-ouest deux échauguettes en encorbellement du XVIe siècle.","habitants":"Famille de Bressieu de Cordoue\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_St_Jean_de_Chepy_1.jpg","../image/image_38/38_St_Jean_de_Chepy_2.jpg"]},"Consult_chateau_formulaire0e9b":{"id":"Consult_chateau_formulaire0e9b","dept":"38","canton":"Crémieu","commune":"Siccieu-St-Jullin","nom":"St_Jullin","type":"Château","periode":"XIII","histoire":"Siccieu Saint-Jullin: Au XIIe siècle la maison forte existante appartenait au seigneur Louis de Saint-Jullin, puis passa au seigneur de la Poype, Etienne de la Poype connétable du Dauphiné en 1260, il eut deux fils, Girerd et Guillaume, Girerd  hérita de Serrières , et  Guillaume de Saint-Jullin, famille d'officiers qui participèrent à des batailles, Crécy  et Poitiers. \r\nFrançois Ier y séjourna. \r\nGabriel de la Poype de Saint-Jullin chef  ligueur résista à Lesdiguières, marié en à Catherine d'Arces, il eut un fils Melchior; ce dernier  fut premier engagiste de Crémieu  en 1638, puis épousa  Anne de Granet qui cette dernière fonda le couvent des Visitandines de Crémieu.  \r\nSaint-Jullin érigé en comté en 1739, par Louis-Antoine de Saint-Jullin de Granet, puis à son fils qui occupait la tache de président du parlement de Grenoble. \r\nEn 1752 le domaine fut acheté par le comte Louis Angélique de Disimieu et par héritage passa au De Chaponnay. Ce château sert aujourd'hui de colonie de vacances.","architecture":"Ce château construit sur une ancienne maison forte au XIIe siècle, il fut remanié au XIII par le seigneur de la Poype. A subit d'énormes dégâts à l'époque des guerres de religion , reconstruit en 1836 . \r\nD'un corps de logis imposant flanqué sur la partie arrière d'une tour ronde à toit pointu d'une échauguette à l'opposé, et de l'autre partie d'un donjon à mâchicoulis et échauguettes en  plein cintre ou son accolée deux pavillons a échauguettes,  flanqué tout deux de tours inférieures crénelées l'ensemble faisant face à un poste de garde agençait d'une porte-donjon accolée de chaque côté de deux corps de garde flanqué de tour rondes.","habitants":"Famille de la Poype\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_St_Jullin_1.jpg","../image/image_38/38_St_Jullin_2.jpg"]},"Consult_chateau_formulaire2934":{"id":"Consult_chateau_formulaire2934","dept":"38","canton":"St-Marcellin","commune":"St-Lattier","nom":"St_Lattier","type":"Vestiges","periode":"XI","histoire":"Les premiers seigneurs de Saint-Lattier apparaissaient  dès le milieu du XIe siècle  par Lanthelme et Ugo de Saint-Lattier mais cette famille disparaissait au XIIIe siècle . \r\nLa famille de Saint  Quentin en fut propriétaire jusqu'à la passation au Dauphiné, puis par la suite la seigneurie de Saint-Lattier fut tenue par des co-seigneurs descendants des seigneurs de Saint-Quentin, cette seigneurie vivait surtout de droits de passage, et s'est érigée en marquisat au profit de Claude Mathias de la Porte seigneur de l'Artaudiere, petit-fils de joseph Nicolas colonel soissonnais infanterie dernier marquis de Saint-Lattier meurt sans postérité en 1838. Cette forteresse fut détruite aux  premières guerres de religion.","architecture":"De cette forteresse de saint-Lattier , il ne reste que des vestiges en pierres de molasse taillés.","habitants":"Famille de Saint  Lattier\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_St_Lattier_1.jpg","../image/image_38/38_St_Lattier_2.jpg"]},"Consult_chateau_formulaired4a7":{"id":"Consult_chateau_formulaired4a7","dept":"38","canton":"St-Marcellin","commune":"St-Marcellin","nom":"St_Marcellin","type":"Vestiges","periode":"XIII","histoire":"Saint-Marcellin devient ville qu'au XIVe  siècle grâce au Dauphin Humbert II et sous son contrôle, chaque année quatre consuls sont chargés d'administrer la ville.  \r\nSiège présidial du Baillage du Bas Viénnois et du Valentinois et cela jusqu'à la Révolution.   \r\nVers 1628 Jean Dutour lieutenant capitaine châtelain  de saint-Marcellin  avocat de la ville, puis au parlement de Grenoble.                                Saint-Marcellin connut des péripéties, en 1563 était occupé par le fameux Baron des Adrets qui siégea pendant six ans et cela sous la domination des protestants.  \r\nLe couvent des Récollets,  le fondateur Jean de la Vache seigneur de l'Albenc en 1632. Naissait le 21 Janvier 1758 à Saint-Marcellin Joseph Hugues de Boissieu plus connu sous le surnom de la Martinière docteur en médecine  1776-1779 de la faculté de Montpellier, monte à Paris devint élève botaniste au jardin du Roi et accompagne la Perouse pour le tour du monde.","architecture":"Au XIVe siècle Saint  Marcellin était cernait de remparts avec quinze tours et quatorze portes. En montant au calvaire il reste les vestiges de la base d'une grosse  tour, belle maison bourgeoise à tuiles rondes.","habitants":"Humbert  II\r\nFamille de Jean Dutour\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_St_Marcellin_1.jpg"]},"Consult_chateau_formulaire20d5":{"id":"Consult_chateau_formulaire20d5","dept":"38","canton":"Tour-du-Pin","commune":"St-Ondras","nom":"St_Ondras","type":"Château","periode":"XIX","histoire":"Saint-Ondras: Fut la propriété d'Antonin Dubost, maire de la Tour du Pin et président du sénat, il fut occupé par les allemands lors de la débâcle de 1940.","architecture":"Saint-Ondras du XIXe siècle, corps de logis rectangulaire à deux étages flanqué de Pavillons carrés en angles.","habitants":"Famille d'Antonin Dubost\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_St_Ondras_1.jpg"]},"Consult_chateau_formulaire6087":{"id":"Consult_chateau_formulaire6087","dept":"38","canton":"Tullins","commune":"St-Quentin-d`Isère","nom":"St_Quentin","type":"Vestiges","periode":"XII","histoire":"St-Quentin: En 1291 Aynard  seigneur de Saint-Quentin  a épousé Béatrix de Clérieu, Jean de Saint-Quentin maria sa fille Béatrix  à Adebert de Châteauneuf. Les seigneurs de Châteauneuf étaient parmi les premiers barons du Dauphiné avec les Clermont  Tonnerre en 1334, puis la seigneurie passa au dauphin et le château fut détruit en 1567 par les guerres de religions.  (voir si autres informations).","architecture":"Du château il ne reste qu'un pan de mur de 6 à 7 m de haut.","habitants":"Famille de Saint-Quentin et de châteauneuf\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_St_Quentin_1.jpg","../image/image_38/38_St_Quentin_2.jpg","../image/image_38/38_St_Quentin_3.jpg"]},"Consult_chateau_formulaire94c8":{"id":"Consult_chateau_formulaire94c8","dept":"38","canton":"Pont-en-Royans","commune":"St-Romans","nom":"St_Romans","type":"Maison forte","periode":"XV","histoire":"Saint-Romans: Autrefois il s'appelait château de la Grange à un kilomètre du village,  il fut édifié au Moyen Age et garde quelques parties gothiques, mais il fut modifié au XVIe siècle, ils eut plusieurs possesseurs, à la famille Copier, aux Alleman de Rochinard; et au XVIe siècle, Claude Izeran le transforma en utilisant les matériaux du château de Beauvoir qui était en ruines. \r\nAu XVIIe siècle des transformations furent apportées par le chanoine Canel, directeur de l'hôpital de Grenoble.  C'est dans ce château que se rencontrèrent en 1589 le connétable de Lesdiguières et Alphonse d'Ornano, lieutenant en Dauphinè pour signer l'alliance pour maintenir la province sous l'autorité d'Henri IV et réduire les places qui restaient encore à la ligue.                                  La famille de Lyonne dont Hugues était ministre de Louis XIV en fut propriétaire.\r\nClaude-Daniel de Canel de Saint-Romans conseiller au parlement en 1771; Dans cette famille un descendant fut représenter aux Etats Généraux de 1788 et le dernier de Saint-Romans est mort il y a peu d'années fit héritier du château à M.M de Grimaldi.\r\nUn cousin  descendant du chanoine  Canel était ami du Général Marquis de Grimaldi  1775-1846 et de son fils le vicomte Ferdinand de Grimaldi 1850 qui hérita vécut au château, et ce dernier  fut ensuite la propriété par d'autres familles.\r\nC'est aussi dans ce château que le général  Ordeneau prépara la défense de la rive gauche de l'Isère en Avril 1814.","architecture":"La maison forte de saint-Romans à un corps de logis quadrangulaire à trois niveaux flanqué de tours  rondes du XVe siècle.","habitants":"Famille du Chanoine Canel\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_St_Romans_1.jpg","../image/image_38/38_St_Romans_2.jpg"]},"Consult_chateau_formulairea500-3":{"id":"Consult_chateau_formulairea500-3","dept":"38","canton":"Morestel","commune":"St-Sorlin-de-Moretel","nom":"St_Sorlin","type":"Maison forte","periode":"XIII","histoire":"St-Sorlin: Première famille connue, la famille de Macon, puis vendu en 1343 à  Amédée de Rossillon et en 1353 elle fut légué à Pierre Louis de Chapeau Cornu qui en hérite (neveu d'Amédée ) puis par alliance passe au chevalier Etienne Labre, puis passa sous la domination des seigneurs de Morestel suite à un impayé du chevalier, citons un propriétaire en 1740 Jean-Chrisostome de Grandval .","architecture":"La maison forte de Saint-Sorlin à ,un corps de logis rectangulaire flanqué d'un donjon carré.","habitants":"Famille de Macon \r\nFamille de Grandval\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_St_Sorlin_1.jpg","../image/image_38/38_St_Sorlin_2.jpg"]},"Consult_chateau_formulaire99f6":{"id":"Consult_chateau_formulaire99f6","dept":"38","canton":"Voiron","commune":"Voreppe","nom":"St_Vincent_38","type":"Maison forte","periode":"XV","histoire":"St-Vincent, édifié au XVe siècle en maison forte.  Au XVIe siècle, le seigneur de Saint-Vincent Soffrey de Calignon,  président de la chambre de l'édit et chancelier du roi de Navarre, terminera sa carrière président au parlement de Grenoble, puis léguera le château à ses descendants ; Antoine de Calignon qui portera au XVIIe siècle le titre de grand prévôt du Dauphiné. \r\nEn 1675, la famille  Dupuy devient propriétaire du château jusqu'a  la révolution et cette famille  émigra , le château fut vendu comme bien national, les biens furent divisés et acquis par plusieurs propriétaires, la famille Faure acheta le château et essaya de reconstituer  le domaine, et s'en séparent en 1826 et en 1827  fut racheté  par la famille Pal;  dont son fils Camille épouse la soeur de Berlioz ; Hector Berlioz  y séjourna à plusieurs reprises.  A la mort de Monsieur Pal le château passa à sa fille qui avait épousé monsieur Masciet, ses descendants, les Reboul, le conservent jusqu'en 1961.\r\n Il fut acheté par la famille Borganetti et depuis 1998 est la propriété de monsieur Laffond qui le restaure pour en faire un hôtel.","architecture":"Construit en maison forte  entourée de douves,  aujourd'hui comblés, au XVIe siècle fut remanié au XVIIe siècle de forme quadrangulaire,  corps de logis  à trois niveaux flanqué de tourelles en angles  et l'ensemble couvert de tuiles en écailles.","habitants":"Famille Dupuy \r\nFamille Pal    \r\nFamille Berlioz\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_St_Vincent_38_1.jpg"]},"Consult_chateau_formulairee0bf-2":{"id":"Consult_chateau_formulairee0bf-2","dept":"38","canton":"Fontaine","commune":"Veurey-Voroise","nom":"Templiers","type":"Tour","periode":"XIII","histoire":"La tour des Templiers, forteresse construite au XIIIe siècle, élevée sur les restes d'une villa gallo-romaine, c'est vers 1050 que se constituent les seigneuries, la plus puissante est celle de Sassenage,  dont Veurey en fait partie: puis fief de Sassenage, vers 1284,  Raymond Bertrand  chevalier seigneur de Veurey et vassal,  cette seigneurie fit construire la tour de l'ordre du temple; le mot Templier viendrait de cet acte de construction et peut-être confusion avec une maison forte des Templiers dans le village de Vourey, les seigneurs Bertrand  habitaient dans un château  construit dans les hauteurs du village. \r\n La tour en 1530 qui n'était plus utilisée fut vendu par Anne Montaud à François Vacon seigneur de Veurey qui en rend hommage au Roi. \r\nAu XVII siècle les seigneurs étaient les Chorot-Boisverd.","architecture":"Tour rectangulaire de 15 sur 13 et de 17 mètres de haut construite sur les restes d'une villa gallo-romaine, comprenant trois étages,  était à l'origine renforcée de créneaux  et des  meurtrières encore visibles et possède des baies au deuxième étage caractérisée par des arcs trilobés sur colonne centrale  polygonale. \r\nCette tour  n'est plus utilisé depuis le XIVe siècle, elle fut endommagée par des boulets de canon en 1814 par l''armée Napoléonienne et en 1984 inscrite aux  M-H.","habitants":"Famille Bertrand\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Templiers_1.jpg"]},"Consult_chateau_formulaire5f39":{"id":"Consult_chateau_formulaire5f39","dept":"38","canton":"Domène","commune":"Tencin","nom":"Tencin_Monteynard","type":"Château","periode":"XVIII","histoire":"Guerrin de Tencin seigneur de Tincin, Crolles, Froges, Laval, Revel et Lagnieu en Royans; Antoine Guerrin anobli en  1585, son fils Henri seigneur de Froges, François fils de Henri seigneur de Tencin, passa en comté, Le comte, épousa en seconde noces Madame de Monteynard elle même veuve, dont la fille issue d'un premier lit était mariée au fils du comte de Tencin. \r\nA la mort du comte il laissa le domaine à sa veuve, qui le vendit à son fils Louis-François de Monteynard; Le domaine reprit le nom de ses ancêtres et fit construire le château sur les ruines d'un château médiéval détruit par les protestants en 1775.  \r\nLouis François de Monteynard, lieutenant général, marquis et ministre de la Guerre de Louis XV, fondateur de l'école de la cavalerie de Saumur.\r\n La ville garde le souvenir de Claudine  Alexandrine Guerrin de Tencin (1682-1749), femme de lettre et mère de d'Alembert et de son frère, Pierre, ministre d'Etat, cardinal-archevêque de Lyon (1679-1758). \r\nToujours dans la descendance par la petite fille des Monteynard, la Comtesse de Luart.","architecture":"Ce château  de style \"Ile de France\" rectangulaire à trois niveaux  de style néoclassique s'exprime par ses lignes rigides, possède un grand fronton triangulaire richement décoré portant les armes des Monteynard, un toit à la Mansard recouvrant l'ensemble du bâtiment.","habitants":"Famille de Monteynard\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Monteynard_1.jpg","../image/image_38/38_Monteynard_2.jpg"]},"Consult_chateau_formulaire64c0-2":{"id":"Consult_chateau_formulaire64c0-2","dept":"38","canton":"Roussillon","commune":"Ville-sous-Anjou","nom":"Terrebasse","type":"Château","periode":"XV","histoire":"Terrebasse: Au XVe siècle la seigneurie d'Anjou possédait le mandement, qui restera en leur possession jusqu'en 1683. \r\nFut vendue à Mr Rousset de St-Eloy, trésorier de France, cette famille revendit le château en 1751 à Mr Julien Rigod, échevin en 1747, trésorier de France et il en était encore propriétaire en 1789.  \r\nEn 1790 Pierre Jacquier  acquit la seigneurie et cette famille fut anoblie le 18 novembre 1814 et  les actuels propriétaires qui sont les descendants de Pierre Jacquier,  famille du comte de Varax qui occupe toujours le château. \r\nAu XIXe siècle,  Alfred Jacquier de Terrebasse, député de l'Isère; Terrebasse reçut d'illustres hôtes tel que Paul de Labarthe maréchal de France,  François de Revol évêque d'Oleron, Louis Gabriel  Suchet et Edouard Hériot maire de Lyon.","architecture":"Ce château qui a été construit au XVIe siècle avec avant corps central avec fronton encadré de deux pavillons symétrique du XVIIe siècle a était remanié au XVIIIe siècle   et fut remanié après la Révolution, car il fut saccagé par des pillards et sauvé de l'incendie par les dragons de Vienne et des villageois ; Il est constitué  d'un corps de logis rectangulaire à trois niveaux , flanqué de deux pavillons symétriques, deux autres pavillons d'entrée de style néogothique coiffés d'ardoise encadrent la façade principale, surmontée d'un fronton triangulaire portant les armoiries des Jacquier de Terrebasse .","habitants":"Famille Pierre Jacquier\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Terrebasse_1.jpg","../image/image_38/38_Terrebasse_2.jpg","../image/image_38/38_Terrebasse_3.jpg"]},"Consult_chateau_formulaire8302":{"id":"Consult_chateau_formulaire8302","dept":"38","canton":"St-Etienne-de-St-Geoirs","commune":"Sillans","nom":"Thivolliere","type":"Maison forte","periode":"XII","histoire":"De cette maison forte qui a été construite au XIIe siècle remaniée au XVIe siècle fut un pavillon de chasse de François Ier, les seigneurs de cette époque n'habitaient pas le château, ils chargeaient les châtelains résidant de s'occuper des terres et de prélever les impôts. En 1314 le Dauphin Jean II donne la terre à la famille Lanthelme en échange de ses droits sur la châtellenie de Saint-Etienne.  Les  propriétaires suivant sont les familles Veyer, Theys et Porte-Villon, puis passa en 1563 à la famille Dorgeoise de la Thivolière, dont un des membres Jean de Dorgeoise était déja  seigneur de Voiron et Sillans et maréchal des camps des armées du roi. De 1430 et de 1671 à la révolution trois familles se partageront les bénéfices du domaine, la famille  de Grolée,  les Tallord et  les de Sassenage.   En 1764 passa dans la famille de Hugues-Eusèbe Rozier de Linage, officier supérieur de cavalerie, mort en 1842.","architecture":"Cette maison forte construite au XIIe siècle, elle fut remaniée au XVIe siècle, les fenêtres à meneaux représentatives de l'époque en témoignent, les derniers propriétaire s'inspirant de Virieu y fit reconstruire des tours coiffées en poivrières avec mâchicoulis.","habitants":"Famille Dorgeoise de la Thivolière\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Thivolliere_1.jpg"]},"Consult_chateau_formulaireadfe":{"id":"Consult_chateau_formulaireadfe","dept":"38","canton":"Roybon","commune":"Thodure","nom":"Thodure","type":"Maison forte","periode":"XIII","histoire":"Le mandement de Thodure appartenait au XIIIe siècle au de Bréssieux, par mariage, il passe à la fin du XIVe siècle aux Montchenu qui le garderont jusqu'à la Révolution.\r\n Aujourd'hui privée.","architecture":"De cette maison forte de Todhure  dont il resta deux tours dont une arasée faisaient parties du château féodal et des remparts de la ville.","habitants":"seigneur de Bressieux\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Thodure_1.jpg","../image/image_38/38_Thodure_2.jpg","../image/image_38/38_Thodure_3.jpg"]},"Consult_chateau_formulaire344d":{"id":"Consult_chateau_formulaire344d","dept":"38","canton":"Morestel","commune":"Veyrins-Thuellin","nom":"Thuellin","type":"Maison forte","periode":"XV","histoire":"Thuellin: Au XVe siècle  érigé en marquisat en faveur de la famille de Gratet, qui prenait le titre de seigneur de Thuellin comme marquis de Dolomieu dont relevé cette terre, mais sans en possédait la maison forte qui eut toujours ses seigneurs particuliers, tel que la famille de Penessin en 1486 et passa ensuite dans plusieurs mains,  les François, les  Périer-Lagrange, ensuite se succédèrent à ces lieux Louis Henri Tivollier( beau-frère de F. Perrier-Lagrange ) Le vicomte de Henri Théodore d'Agoult, le comte Amédée d'Andigné et enfin Mme Lombard de Buffières , c'est un de ses héritiers qui l'acquit à  la famille Bourbon. \r\nHenri Beyle intendant militaire, auditeur au Conseil d'Etat y séjourna.","architecture":"La maison forte de  Thuellin un corps de logis en équerre à trois niveaux prolongé de dépendances  terminant par des tours rondes à toit en poivrières.","habitants":"Famille de Gratet\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Thuellin_1.jpg","../image/image_38/38_Thuellin_2.jpg"]},"Consult_chateau_formulaireecd5":{"id":"Consult_chateau_formulaireecd5","dept":"38","canton":"Voiron","commune":"Coublevie","nom":"Tivolliere","type":"Manoir","periode":"","histoire":"Tivolliere: Ce manoir a été conçu  et habité par une famille de tisserands prospères.","architecture":"Corps de logis rectangulaire flanqué d'une tour octogonale sur la façade nord.","habitants":"\"","divers":"","gps":"","images":["../image/image_38/38_Tivolliere_1.jpg"]},"Consult_chateau_formulaire62ec":{"id":"Consult_chateau_formulaire62ec","dept":"38","canton":"Vinay","commune":"Cognin-les-Gorges","nom":"Tour_Cognin","type":"Maison forte","periode":"XV","histoire":"Ce manoir était l'une des propriétés dépendantes du château féodal d'Izeron . Au XVIIe siècle, le duc de Lesdiguières a résidé quelques temps chez le seigneur huguenot surnommé le \"Capitaine La Tour\".","architecture":"Maison forte  de Cognin est   imposante se compose d'un donjon massif et d'un corps  bas et allongé avec fenêtres à meneaux.","habitants":"Capitaine de la Tour\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Tour_Cognin_1.jpg"]},"Consult_chateau_formulairefd8e":{"id":"Consult_chateau_formulairefd8e","dept":"38","canton":"Tour-du-Pin","commune":"Tour-du-Pin","nom":"Tour_du_pin","type":"Vestiges","periode":"XII","histoire":"Tour du Pin: En 1190 Albert II seigneur de la Tour du Pin, ce dernier partait en croisade.  A l'époque féodale le château domine la ville, cernée par une enceinte fortifiée, et au XIIIe siècle, les seigneurs de la Tour en feront une puissante baronnie. \r\nEn 1273, Humbert, baron de la Tour épouse Anne de Bourgogne, sur du Dauphin  Jean premier, ce dernier décédera sans héritier et léguera le Dauphiné à la maison de la Tour du Pin.\r\nGuillaume de Brenc châtelain delphinal en 1341, Guy Coppier chevalier était châtelain de la Tour du Pin en 1365. Gale Jean châtelain delphinal en 1376. Donjon Michel écuyer châtelain également en 1478.\r\n Louis XI séjourna à la Tour du Pin en 1447 et en 1516 François Ier s'arrêta cinq jours.\r\n Attaquée par les comtes de Savoie et par le baron des Adrets au cours des guerres de religion en  août 1562, ce dernier s'empare de la ville, défendue par son beau-frère le capitaine de Gumin et en 1591 les troupes napolitaines de Philippe II mettent à sac la cité et détruisent le château.\r\n La cité sous le régime des Bourbons  retrouvera sa prospérité qu'au XVIIe siècle. \r\nLe château qui appartenait au seigneur Georges de Musy en 1560 ne sera pas reconstruit.\r\nLa ville possédait la maison de la Nation, qui appartenait à la comtesse de Vallin, vendue comme bien national à la révolution, cette belle demeure du XVIIe siècle fut la propriété d'une famille Polonaise.                                                                                              La maison des Dauphins a été reconstruite en 1504 sur les bases antérieures de la Maisons des Dauphins au centre du village de la Tour du Pin. La \"Maison des Dauphins\" ainsi nommé  en  l'honneur des seigneurs de la Tour qui gouvernèrent le Dauphiné, servit de demeure au vice-châtelain qui possédait le château dominant la ville. \r\nAu XIXe siècle elle fut la propriété de Mr Sambin, juge de paix, beau-frère de Stendhal, son fils , prêtre, en fit don à la ville pour établir un hôpital, ce projet n'eut  pas lieu et la ville revendra la maison au Baron de Sainte-Julie en 1872 qui lui donna l'aspect d'aujourd'hui et devint depuis 1983 la propriété de la ville.","architecture":"Du château il ne reste plus rien , La maison de la Nation fut transformée en 17 logements sociaux.     Cette maison possède une façade renaissance , malgré son  remaniement au XIXe siècle a gardée ses portes, fenêtres et ils-de-buf.","habitants":"La famille de la Tour du Pin\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Tour_du_pin_1.jpg","../image/image_38/38_Tour_du_pin_2.jpg","../image/image_38/38_Tour_du_pin_3.jpg","../image/image_38/38_Tour_du_pin_4.jpg","../image/image_38/38_Tour_du_pin_5.jpg","../image/image_38/38_Tour_du_pin_6.jpg"]},"Consult_chateau_formulaire9564":{"id":"Consult_chateau_formulaire9564","dept":"38","canton":"Fontaine","commune":"Seyssinet-Pariset","nom":"Tour_Sans_Venin","type":"Vestiges","periode":"XI","histoire":"Tour Sans Venin: Sur le plateau de Pariset, il est à peu près certain qu'il existait un castrum romain remplacé par une forteresse, puis un château, la tour châtellenie de Pariset était les la \"Tour était le donjon de Pariset; la sans Venin\",  on la retrouve en 1492 dans les rapports des Evêques .\r\n Au XVIe siècle le château était déjà en ruines.","architecture":"Construit au XIIe siècle comportant une tour, qui deviendra la tour sans-Venin, de cette tour il ne reste aujourd'hui qu'un pan de mur.","habitants":"Les la Tour-Sans Venin\r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Tour_Sans_Venin_1.jpg","../image/image_38/38_Tour_Sans_Venin_2.jpg","../image/image_38/38_Tour_Sans_Venin_3.jpg"]},"Consult_chateau_formulairee520":{"id":"Consult_chateau_formulairee520","dept":"38","canton":"St-Marcellin","commune":"Montagne","nom":"Tourne","type":"Maison forte","periode":"XV","histoire":"Tourne: Cette maison forte fut construite au XVe siècle par la famille Fayolle , les Blaise Fayolle , un des descendants  Etienne Fayolle notaire épouse en 1525  Isabeau de Rochas, leur fils Gilbert, bourgeois de Saint-Etienne de Saint-Geoir devient seigneur de la Tourne, épouse en 1563 Gabrielle de Colonneau sera notabilité de la région. En 1580, cette maison forte à eu des dégâts suite aux guerres de religion.","architecture":"Ce qu'il en reste un corps de logis à trois niveaux remanié par les propriétaires actuels, apparence d'une tour ronde et une fenêtre à meneaux.","habitants":"Famille Fayol\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Tourne_1.jpg"]},"Consult_chateau_formulaire8df2":{"id":"Consult_chateau_formulaire8df2","dept":"38","canton":"Pont-de-Beauvoisin","commune":"Corbelin","nom":"Tournelles","type":"Maison forte","periode":"XVI","histoire":"Tournelles: Cette bâtisse qui est un ancien couvent, appartenait au XIIIe siècle  aux  prieurs de Dolomieu , de Corbelin et de l'ordre de Saint-Ruff, en Gratet, seigneur de Dolomieu et en 1773 suppression de l'ordre de Saint-Ruff , les biens de l'église reviennent à 1695  il fut restauré par la famille de l'évêque de Bellay.","architecture":"Corps de logis quadrangulaire à trois niveaux flanqués de tours rondes en angle.","habitants":"Famille de Gratet\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Tournelles_1.jpg"]},"Consult_chateau_formulaireb22f":{"id":"Consult_chateau_formulaireb22f","dept":"38","canton":"Tour-du-Pin","commune":"Tour-du-Pin","nom":"Tournin","type":"Château","periode":"XVI","histoire":"Tournin: Ce château était en 1439 à noble Symphrien Borin, conseiller maître de la chambre des comptes et en 1450 propriété de Pierre de Virieu; Si l'on en croit les armoiries de la grande salle, il appartenait ensuite à la famille de Clermont-Tonnerre, passa aux de Boissat et au XVIIIe siècle, aux Picot de la Buissonnière dit \"Picot\" et les Baume en 1756. \r\nCe château a eu peu de dégradation à la Révolution, la dame Picot et son intendant ayant mis à l'abri le mobilier.  \r\nDepuis 1923 propriété de la famille Courbier qui l'on bien restauré.","architecture":"Ce château fut construit au XVe siècle, et remanié au XVIIIe siècle, bâtiment en équerre flanqué de deux pavillons carrés et trois tours dont une ronde qui fut une période décoiffée transformée en terrasse pour observatoire, les toitures en poivrières et de deux échauguettes en encorbellement, les fenêtres à meneaux furent remplacées par de grandes fenêtres.","habitants":"Famille Virieu    \r\nFamille Courbier\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Tournin_1.jpg","../image/image_38/38_Tournin_2.jpg","../image/image_38/38_Tournin_3.jpg","../image/image_38/38_Tournin_4.jpg","../image/image_38/38_Tournin_5.jpg"]},"Consult_chateau_formulaire5623":{"id":"Consult_chateau_formulaire5623","dept":"38","canton":"Le Touvet","commune":"Le Touvet","nom":"Touvet","type":"Château","periode":"XVII","histoire":"Le Touvet: A l'origine  une tour de guet transformée en tour  défensive érigée au XIIe siècle sur la frontière du comté de Savoie, qui fut remplacé au XIVe siècle par une maison forte féodale, puis au XVIe-XVIIe siècle  par le château actuel construit par le comte Pierre de Marcieu.\r\nFief qui a donné son nom à illustre famille dont est issu le féroce Baron des Adrets marquisat sous Louis XIV. \r\nAu XIIIe siècle appartenait aux familles d'Entremont jusqu'en 1361, puis aux Bellecombe  et en 1528 à la famille de Guigues Griffrey; seigneur de Boutières, compagnon de Bayard, qui prendra part sous François-Ier à la victoire de Cérisoles,  ambassadeur près du roi d'Angleterre. \r\nPar alliance passa aux Monteynard de Marcieu, puis aux Aimé de Marcieu  en 1750 propriété du comte de Pierre de Marcieu lieutenant général en Dauphiné, ce dernier fit les transformations au château qui donne  l'aspect actuel. Erigé en  marquisat sous le régne de Louis XIV.\r\n Le château transmis par descendance passa par alliance  au XXe siècle aux  Marquis de Quinsonnas-Oudinot. \r\nToujours dans la famille","architecture":"D'une maison forte fortifié au Moyen-Age, transformé en château médiéval au XVIIIe siècle et en résidence de plaisance avec l'adjonction de  gros pavillons carrées  au corps de logis et d'un grand hall d'entrée qui abrite les escaliers, a conservé une tour ronde. \r\nA l'extérieur de magnifiques jardins à la française avec des escaliers d'eau en cascades.","habitants":"Famille du marquis de Marcieu et famille des Quinsonnas-Oudinot\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Touvet_1.jpg","../image/image_38/38_Touvet_2.jpg","../image/image_38/38_Touvet_3.jpg","../image/image_38/38_Touvet_4.jpg","../image/image_38/38_Touvet_5.jpg","../image/image_38/38_Touvet_6.jpg","../image/image_38/38_Touvet_7.jpg"]},"Consult_chateau_formulairec581":{"id":"Consult_chateau_formulairec581","dept":"38","canton":"Allevard","commune":"Allevard","nom":"Treuil","type":"Tour","periode":"XIV","histoire":"Treuil: La famille Barral règne sur le pays d'Allevard entre 1675 et 1822. Seigneurs du lieu, maîtres des forges et président au parlement du Dauphiné, les Barral font la fortune des mines et fabriques de toute la province.\r\n Le dernier seigneur fut Paulin de Barral, a été assimilé par les chroniques contemporaines au personnage de Valmont des liaisons dangereuses , de son cousin Choderlos de Laclos.","architecture":"Cette tour du Treuil a gardé ses poutres d'origine , des énormes pièces de bois de dix mètres de volée.","habitants":"Famille Barral Famille Merle\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Treuil_1.jpg"]},"Consult_chateau_formulaire7459-2":{"id":"Consult_chateau_formulaire7459-2","dept":"38","canton":"Tullins","commune":"Tullins","nom":"Tullins","type":"Vestiges","periode":"IX","histoire":"Tullins. Il semblerait que le premier seigneur de Tullins fut la famille du comte de Poitiers.   La première mention des seigneurs de la maison de Tullins outre Athanulphe,  est celle de Guy de Tullins fils de Raymond qui épousa Armande de Rives en 1155; Guillaume de Tullins recevra en suzeraineté les possessions  de son frère Didier de Tullins, en 1276 Guigues de Tullins recevra le droit sur Tullins de sa soeur Béatrix  Comtesse de Vienne et d 'Albon et de son fils Jean Dauphin en échange du fief de Saint-Quentin et du château de Moirans; Guigue de Tullins a eu trois enfants connus Béatrix qui se maria à Antelme de Saint-Quentin, Françoise marié à Rudolphe d'Entremont  eu un fils Aimar en 1286. \r\n Le fils d'Aimar Guy, un des quatre enfants d'Aimar de Tullins,  Françoise a épousé Aynard de Paladru, Guy a été uni en 1283 à Béatrix  fille de Guy de Montluel et il y eut Antelme  qui cédera en 1290 à son frère tous les droits sur Tullins en échange du château de Savel et de la paroisse de Morette qu'il promet de tenir en fief de Guy; qui ce dernier eux six filles; Guigonne qui épousera Guychard  de Clérieu et Jordanne qui fut marié a Girard de Roussillon, leur fille Humilie héritera et présidera aux destinées du fief jusqu'à sa mort en 1346. Son successeur fut Jacques de Tullins son neveu fils de Françoise de Tullins et de Aynard de Roussillon; Ce dernier assurera la régence jusqu'à ce que Jacquemet puisse gouverner.   Le 29 Janvier 1354  épouse  Dauphine fille de Briand de Retourtour seigneur de Beauchastel qui mourut en 1404, après s'être mariè trois fois eut  quatre enfants légitimes et des bâtards deux filles, dont  Marie  qui épousera Josserand de Saussac, Françoise marié à Gaspard Gerbois eu deux fils Jean et Claude qui fut le dernier seigneur de Tullins qui mourut sans enfant le 29 novembre 1428 à l'auberge de la Cloche.","architecture":"Du château de Tullins construit au IX e siècle,  il ne reste qu'un pan de mur et une tour tronquée, il fut détruit en 1730 par un incendie.","habitants":"Les seigneurs de Tullins\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Tullins_1.jpg","../image/image_38/38_Tullins_2.jpg"]},"Consult_chateau_formulairea50a":{"id":"Consult_chateau_formulairea50a","dept":"38","canton":"Vizille","commune":"St-Martin d`Uriage","nom":"Uriage","type":"Château","periode":"XI","histoire":"Uriage: Ce château fut construit par la puissante seigneurie du Dauphiné les Alleman,  passa aux Boffin en 1630, en 1874, le comte de Saint  Ferréol s'y retira après avoir vendu son château de Virieu.\r\n La station thermale blottie dans le parc verdoyant fut développée par l'impulsion de la marquise de Goutheron. Le comte Louis-Xavier de Sibeud de Saint-Ferréol, neveu de la marquise, et le comte Pélissier de Féligonde poursuivirent son oeuvre; La station attira l'aristocratie locale et devint à la fin du XIXe siècle le rendez-vous traditionnel des écrivains et artistes. Le château  abrita entre 1940 et 1943  la fameuse école nationale des cadres organisée sous l'occupation par le \"vieux chef  \" Dunoyer de Ségonzac. Le château beaucoup délabré suite aux passages de la Milisse et des Marquisards, il fut abandonné une trentaine d'années,  puis transformé en studios dans les années 80 pour faire face aux  lourdes charges d'entretien.","architecture":"Cette forteresse médiévale surplombe la station thermale d'Uriage les Bains, elle fut maintes fois remaniée et restaurée présente une architecture assez disparate deux corps de logis appelés Châteauvieux et châteauneuf,  séparés par une terrasse, et reliés par une galerie et flanqués de quatre tours d'angles rondes et un donjon central précédé par un bâtiment d'entrée ou châtelet.","habitants":"Famille Alleman\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Uriage_1.jpg","../image/image_38/38_Uriage_2.jpg","../image/image_38/38_Uriage_3.jpg","../image/image_38/38_Uriage_4.jpg","../image/image_38/38_Uriage_5.jpg"]},"Consult_chateau_formulaire10f4":{"id":"Consult_chateau_formulaire10f4","dept":"38","canton":"Rives","commune":"La Murette","nom":"Vachon","type":"Maison forte","periode":"XV","histoire":"Vachon fut la seigneurie de cette famille. Pas d'autre information historique","architecture":"Edifice du XVIIe siècle composé de deux ailes disposées en équerre entre lesquelles se loga la tourelle d'escalier, dont la porte est surmontée d'un blason aux armes des Vachon, beau toit en tuiles écaillées à quatre pans.","habitants":"Famille Vachon\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Vachon_1.jpg","../image/image_38/38_Vachon_2.jpg"]},"Consult_chateau_formulaire07d0-2":{"id":"Consult_chateau_formulaire07d0-2","dept":"38","canton":"Rives","commune":"Vourey","nom":"Val_Marie","type":"Château","periode":"XV","histoire":"Val-Marie: Construit sur les ruines  d'un ancien manoir, par Denis Salvaing de Boissieux seigneur de Vourey; Denis Salvaing fut premier président de la chambre des comptes de Grenoble au XVIIe siècle, succédant ainsi à son beau -père par le mariage de sa fille, il s'allia à une des plus grandes familles du Dauphiné  les Sassenage; Le domaine fut donc transmis en 1663 à Charles de Sassenage  jusqu'en 1746,  et fut acheté en 1966 par l'association  \"Bon Secours\"; maison de retraite tenue par les soeurs de Pont de Beauvoisin.","architecture":"Le château de Val-Marie possède un corps de logis rectangulaire à trois niveaux  flanqué de tours rondes en angles.","habitants":"Famille de Salvaing de Boissieux\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Val_Marie_1.jpg","../image/image_38/38_Val_Marie_2.jpg"]},"Consult_chateau_formulaireabd9":{"id":"Consult_chateau_formulaireabd9","dept":"38","canton":"Valbonnais","commune":"Valbonnais","nom":"Valbonnais","type":"Maison forte","periode":"XIV","histoire":"Valbonnais a constitué une entité féodale du XIe siècle à 1789, avec Valbonnais,  Entraigues, le Perrier, Chantelouve et Valjouffrey.\r\nLes premiers seigneurs étaient la grande et puissante  famille dauphinoise des Alleman; Ils  s'y succédèrent jusqu'à  Guigues  Alleman mort en 1375, sans postérité mâle et dont la seigneurie échut au domaine Delphinale. \r\nEn 1421 Charles VII l'éleva au rang de Baronnie et en fit don à Jean Dunois, bâtard d'Orléans ( compagnon de Jeanne d'Arc pour ses brillants services). \r\nElle resta dans sa descendance jusqu'en 1593, puis devint la propriété de Lesdiguières, François de Créquy de Bonne, son petit fils, la vendit en 1632 à Pierre de Poligny, c'est ensuite Jacques son fils qui devint baron de Valbonnais en 1670 mais peu de  temps après,  en 1677, des difficultés financières lui firent échanger la Baronnie contre la seigneurie de Tréminis, propriété de Pierre Moret de Bourchenu qui prêta hommage en 1667; A sa mort, Jean Pierre son fils, fit de même 1687 et en 1694  la baronnie sera érigée en marquisat. \r\nJean-Pierre Moret de Bourchenu marquis de Valbonnais, conseiller au parlement du Dauphiné, fut nommé en 1690 premier président de la chambre des comptes et  c'est lui qui sous le nom de Valbonnais, publie la première grande histoire du Dauphiné. Les Bailly de Bourchenu  lui succédèrent jusqu'à la Révolution.","architecture":"Le plus ancien des château de Valbonnais XIe siècle  était situé à Bourcheny , il ne reste plus rien ils construisirent ensuite le château de Nicolas XIV qui existe encore du fief de la branche aînée des Alleman et au-dessous le château dit le \"Grand Château\" construit en 1608 devenu  maison forte. corps de logis central avec fronton triangulaire en date de 1679, flanqué de pavillons.","habitants":"Famille Alleman\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Valbonnais_1.jpg","../image/image_38/38_Valbonnais_2.jpg","../image/image_38/38_Valbonnais_3.jpg"]},"Consult_chateau_formulaire08e8":{"id":"Consult_chateau_formulaire08e8","dept":"38","canton":"Tour-du-Pin","commune":"St-Victor-de-Cessieu","nom":"Vallin","type":"Château","periode":"XIV","histoire":"Vallin:  Fief de Guillaume de Vallin au XIIe siècle, il le reçu de l'abbaye cistersienne de Bonneaux Guillaume et Pierre qui  participèrent à la troisième croisade, en 1415 Girard et Jean de Vallin  combatirent à Azincourt aux côtés  de la fleur de la chevallerie Française, défaite de la guerre de cent ans, face aux troupes du roi  d'Angleterre d'Henri V.                                            La famille Vallin possédait le château jusqu'en 1858, il fut pillé en juillet 1789,  il fut remit en état par Laurent Vallin qui passa par alliance aux de Virieu, aux Lastic, puis aux Bonalt. aujourd'hui appartient a monsieur Olivier Auriol de Bussy.","architecture":"Ce château construit au XIVe siècle d'un corps de logis surmonté d'une tour ronde datant de l'origine, qui fut remanié au XVIIe siècle est resté longtemps à l'abandon reprend forme, en cours de restauration  du bâtiment central.","habitants":"Famille Vallin\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Vallin_1.jpg","../image/image_38/38_Vallin_2.jpg"]},"Consult_chateau_formulairec61b":{"id":"Consult_chateau_formulairec61b","dept":"38","canton":"Roussillon","commune":"St-Clair-du-Rhône","nom":"Vallongue","type":"Manoir","periode":"XVII","histoire":"Vallongue: Ce manoir qui a remplacé le château féodal a été établi au-dessous des ruines de ce dernier au XVIIe siècle. \r\nIl a appartenu en 1670 à Pierre Lériget de la Faye, comte de France, seigneur de Condé Saint-Clair secrétaire du Roi. \r\nEn 1787 devint la propriété de la famille Faure ( Emile Faure maire de 1839 à 1852 ), en 1946, Mr Robert Dugas vendit la propriété à madame des Pomeys.","architecture":"Corps de logis quadrangulaire flanqué de tours aux extrémités.","habitants":"Famille Leriget\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Vallongue_1.jpg"]},"Consult_chateau_formulaire70d0":{"id":"Consult_chateau_formulaire70d0","dept":"38","canton":"Vinay","commune":"Varacieux","nom":"Varacieux","type":"Château","periode":"XV","histoire":"Varacieux: Ancienne possession des Dauphins du Viennois, elle fut cédé le Ier Octobre 1314 à Aymar de Bressieu dont la fille du dernier descendant épousa Guillaume de Grolée en 1375; Ils eurent un fils Aymar qui hérita en 1404 et vendit ce château et les terres en 1456 à Amédée de Beauvoir seigneur de Villeneuve de Marc; Antoinette de Beauvoir , dame de Varacieux , fille d'Amédée, épousa en 1460 Sibond de Virieu qui prit le nom de Virieu-Beauvoir, ses biens sont confisqués par le Roi Louis XI, par manquement, et  les enfants de Sibond vendirent le château à Louis Albi qui le revendit vers 1530 à Philippe de la Tour, ce dernier avait épousé Louise de Sassenage mais leur fils mourut sans enfant. \r\nLe château passa ensuite à Guillaume de Gotefrey, seigneur du Mollard à Saint-Marcellin, qui ayant épousé Marguerite de la Porte de l'Arthaudière ,eut une fille unique, laquelle épousa Gabriel de Maugiron seigneur de la Tivelière, cette famille gardera ce domaine jusqu'en 1682 dont  Claude de Maugiron fut nommé maréchal de Camp en 1643, son frère Louis lui succéda épousa en 1645 Louise de Barjac, une de ses filles épousa en 1667 Louis de Fassion seigneur de Sainte-Jay, leur fils Augustin en 1700 épousa  Madeleine D'Algoult, les Fassions toujours seigneur et passa marquis du Menon qui fut propriétaire en 1789; Il fut chassé, est la propriété fut vendue à Claude Ferouillat, leur fils André  épousa Louise Férouillat sa cousine germaine, mais n'eut pas d'enfant, il fit don du château à Régis Férouillat ,oncle de Louis maire de Saint-Marcellin.","architecture":"Cette maison forte de Varacieux construite au XIVe siècle, sur un monticule, sa tour et son long mur donnent l'aspect d'une forteresse, a gardé son cachet d'époque malgré son incendie partiel à la Révolution, il est transformé aujourd'hui en ferme.","habitants":"Aymar de Boissieu\r\nFamille Maugiron \r\nFamille Ferouillat\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Varacieux_1.jpg","../image/image_38/38_Varacieux_2.jpg","../image/image_38/38_Varacieux_3.jpg"]},"Consult_chateau_formulaire0de2":{"id":"Consult_chateau_formulaire0de2","dept":"38","canton":"Vif","commune":"Varces-Allieres-Risset","nom":"Varces","type":"Château","periode":"XIV","histoire":"Varces:  En 1069 le fief de Varces appartenait à la maison du même nom, cédé en 1255 au dauphin, en 1289, son successeur échangea avec la famille de Briançon (originaire de savoie)son fief contre des domaines en Savoie.\r\nCette famille de Briançon demeura au château de saint-Giraud jusqu'au XVIIe siècle et elle alla s'installer à la maison forte de la tour.\r\nEn 1634, le seigneur d'Allieres, Samson de Périsol habitait le château du même nom fit l'acquisition des paroisses  de Fontagneux et Risset dont Allières se rattacha et forma la commune. \r\nLes descendants  des Briançon , les Vachon de Belmont gardèrent la seigneurie jusqu'en 1793, les biens furent vendues, le marquis Planelli de la Valette en fut propriétaire et maire de Varces de 1837 à 1854.","architecture":"Dés le XIe siècle se dressait sur la colline une maison forte, mais le manoir d'aujourd'hui date de 1608; Corps de logis rectangulaire à trois niveaux flanqué de quatre tours carrées en angle.","habitants":"Famille Briançon\r\n        \"","divers":"Château d'Allieres","gps":"","images":["../image/image_38/38_Varces_1.jpg"]},"Consult_chateau_formulairee438-2":{"id":"Consult_chateau_formulairee438-2","dept":"38","canton":"Goncelin","commune":"La Pierre","nom":"Vaubonnais","type":"Maison forte","periode":"XV","histoire":"Vaubonnais: Ce château fut édifié  par la famille  de Briançon, par alliance passa en 1848 aux Ducruy et appartient aujourd'hui à leur descendance.","architecture":"Vaubonnais: Ce château fut édifié sur l'emplacement d'une ancienne forteresse ruinée au XVIIe siècle, de plan carré à trois niveaux, flanqué d'une tour ronde sur la droite.","habitants":"Famille Briançon\r\n        \r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Vaubonnais_1.jpg","../image/image_38/38_Vaubonnais_2.jpg","../image/image_38/38_Vaubonnais_3.jpg"]},"Consult_chateau_formulairefa5f":{"id":"Consult_chateau_formulairefa5f","dept":"38","canton":"Pont-de-Beauvoisin","commune":"St-Alban-de-Vaulserre","nom":"Vaulserre","type":"Château","periode":"XV","histoire":"Vaulserre: Ce fief appartenait à l'origine à la puissante famille des Clermont qui en rendirent hommage en 1203 à l'archevêque de Vienne dont le vassal qui prit le titre de seigneur de Saint-Franc Antelme de Corbeau,  et en 1340 au vassal du dauphin Humbert II.\r\nUn Antoine  de Garnier était seigneur de Vaulserre, du Golard et de Charpenay.\r\n En 1455 mariage de  Pierrette de Corbeau de Saint-Alban avec un cousin Pierre de Corbeau, seigneur de Saint-Franc.  Les terres de Vaulserre furent achetés en 1567 par Jacques Corbeau au comte de Clermont pour son fils Aubert Gouverneur de la ville des Echelles. \r\nEn 1751 Antoine de Corbeau, conseiller au parlement de Grenoble et avait épousé en 1731, la fille du président de la chambre des comptes du Dauphiné Marie Anne Allois, est fait Marquis , parmi les enfants issus de ce mariage, Aymé François deviendra vicaire général et représentant du clergé en 1788. \r\nLa famille de Corbeau avait une véritable vocation sociale, le premier marquis fut appelé \"père des pauvres\", en 1808  Claudine-Pierrette de Corbeau  fonde un hospice à St-Albin pour soigner gratuitement les malades de quatre communes du mandement de Vaulserre, aidée par sa belle-soeur qui elle même avait fait construire sept maisons, qu'elle donna à sept familles pauvres avec terre et animaux.  \r\nLe château fut occupé en 1940 par le maquis  et servit d'hôpital de campagne et ensuite a  héberger une colonie de vacances pendant douze ans; A la mort du marquis de Vaulserre, le château passa dans la famille du marquis d'Aubigny, époux de la dernière descendante des de Corbeau, habité maintenant par la famille de Courville, qui en hérita en 1969; Alain de Courville qui  remet en valeur le domaine.","architecture":"Le château ancienne maison forte, fut remanié à la fin du XVIIe siècle et prit la forme actuelle au XVIIIe siècle,avec fronton sur la façade aux armes de Vaulserre.","habitants":"Famille de Corbeau  \r\nFamille de Courville\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Vaulserre_1.jpg"]},"Consult_chateau_formulaire5389":{"id":"Consult_chateau_formulaire5389","dept":"38","canton":"Verpillière","commune":"Villefontaine","nom":"Vellein","type":"Château","periode":"XV","histoire":"La famille Velleins fut anoblie  au XVIIe siècle , Piertre de Velleins fut conseillé au parlement de Metz. Au XVIIIe siècle, les propriétaires en firent une résidence de campagne , car ils s'installèrent à Vienne. Epargné à la Révolution,  les occupants purent conserver leurs biens. Au  XIX et XXe siècle le château changea de propriétaire.                       Aujourd'hui il appartient à la Epida.","architecture":"Le château de Vellein possède un corps de logis rectangulaire flanqué de deux tourelles et d'un donjon .","habitants":"Famille Velleins\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Vellein_1.jpg","../image/image_38/38_Vellein_2.jpg"]},"Consult_chateau_formulairef446":{"id":"Consult_chateau_formulairef446","dept":"38","canton":"Pont-de-Beauvoisin","commune":"St-André-le-Gaz","nom":"Verel","type":"Maison forte","periode":"XVII","histoire":"Verel: Le vrai nom est St-André le Gà qui désigne une commune sur un gué, deux châteaux sur cette commune; le château de Verel et une maison forte; ces deux dépendaient du mandement de la Palude qui restera jusqu'à la Révolution, elle comprenait les paroisses de Palude, Fitilieu, les Adrets et St-André.","architecture":"Cette maison forte appelait \"Castel\" date de 1610, deux tours rondes sur la façade principale, remanié en 1820, malheureusement les fenêtres à meneaux disparaissent.    \r\nDe la maison forte du Gaz classique à deux niveaux.","habitants":"Famille de Verel\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Verel_1.jpg","../image/image_38/38_Verel_2.jpg","../image/image_38/38_Verel_3.jpg"]},"Consult_chateau_formulairef17d":{"id":"Consult_chateau_formulairef17d","dept":"38","canton":"Crémieu","commune":"Verna","nom":"Verna","type":"Maison forte","periode":"XV","histoire":"Verna: Ce château  a appartenu successivement aux Verna d'Ameysin, famille  de noblesse militaire.\r\nA la renaissance  aux  Dupré, puis  aux Loras, et aux Alleman. \r\nA partir de 1638 aux Dauphin de St-Etienne qui deviendront ensuite en 1677 aux  Dauphin  de Verna; Joseph Aymard Dauphin de Verna, seigneur des maisons fortes de Verna et du  Cingle, était président de la chambres des comptes du Dauphiné en 1708; Son fils lui succéda dans cette charge, son petit-fils fut fusillé à Lyon le 29 juillet 1793.\r\n Après la Révolution , la famille de Verna fut l'un des soutiens de la monarchie en  bas Dauphiné .\r\n Malgré l'incendie en 1793  le château  fut restauré est habité.","architecture":"Ce château  qui a gardé le donjon carré  de la maison forte primitive de la fin du XIVe siècle, composé de trois corps de logis formant un U qui datent du XVIIIe siècle,  quatre tours cylindriques rehaussent l'ensemble des bâtiments. \r\nA la Révolution le château subit des dégâts importants par un incendie.","habitants":"Famille Dauphin \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Verna_1.jpg","../image/image_38/38_Verna_2.jpg","../image/image_38/38_Verna_3.jpg","../image/image_38/38_Verna_4.jpg"]},"Consult_chateau_formulaire37c6":{"id":"Consult_chateau_formulaire37c6","dept":"38","canton":"Beaurepaire","commune":"Pisieu","nom":"Verrerie_38","type":"Maison forte","periode":"XVI","histoire":"Le domaine de la Verrerie au bois de Char  était un établissement   industriel,  qui appartenait en 1726 aux héritiers de monsieur de Montdragon.  Le 23 Août 1733 noble Pierre de Fassion, sieur de la Bathie propriétaire de la Verrerie, s'associe avec sieur François Glasson. \r\nAujourd'hui exploitation agricole.","architecture":"Cette bâtisse  de la Verrerie rectangulaire à deux étages est flanquée d'une tour ronde.","habitants":"Famille de Pierre Fassion\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Verrerrie_1.jpg"]},"Consult_chateau_formulaire910c":{"id":"Consult_chateau_formulaire910c","dept":"38","canton":"Crémieu","commune":"Vertrieu","nom":"Vertrieu","type":"Château","periode":"XII-XVII","histoire":"Vertrieu: A l'origine  du \"vieux château\", propriété dalphinale, servait aux troupes, au XIIIe siècle propriété à la famille de la Balme, en 1340 à Amblart de la Balme de Vertrieu, Philibert de la Balme seigneur de Vertrieu, échasson du roi Louis XI épousa Françoise Bouchard de Montflory. Françoise de la Balme-Vertrieu dernière du nom épousa  en 1481 Claude de La Poype, seigneur de Serrières et suite aux rivalités  entre Dauphiné et  Savoie le château fut démantelé à la fin du XVIe siècle. Puis abandonné au  XVIIe siècle, aujourd'hui en cours de rénovation par le propriétaire Régis de la Roullière conseillé par Marie-Françoise Bonnard responsable du patrimoine.                                                        Le nouveau château en contrebas appelé \"château moderne\" fut construit de 1630 à 1650 par Abel de la Poype, il fut acheté par la famille Bathéon en 1712, qui devint gouverneur militaire de la ville de Vienne,  puis le château  passa ensuite aux Broffier de la Rouillère originaire de Lyon, leur fille hérita, toujours dans la descendance par leur fils.   \r\nCe château a eu la visite  de Pauline Borghèse, soeur de Napoléon pour un court séjour..","architecture":"Le\"vieux château\" édifice fortifié était un poste frontalier munit d'un donjon adossé au mur d'enceinte, tour de garde avec tourelle en échauguette. Démantelé à la fin du XVIe siècle. Il reste des vestiges importants.\r\nDu nouveau \"château moderne\" du XVIIe siècle est composé d'un corps de logis  rectangulaire à trois niveaux flanqué de quatre tours carrées deux à toits pointus et les deux tours antérieures sont couvertes de toits à l'impériale surmontés d'un clocheton.","habitants":"Famille de La Poype                                                                         Famille Banthéon\r\n        \"","divers":"Vieux château \r\nChâteau moderne","gps":"","images":["../image/image_38/38_Vertrieu_1.jpg","../image/image_38/38_Vertrieu_2.jpg","../image/image_38/38_Vertrieu_3.jpg","../image/image_38/38_Vertrieu_4.jpg","../image/image_38/38_Vertrieu_5.jpg","../image/image_38/38_Vertrieu_6.jpg","../image/image_38/38_Vertrieu_7.jpg","../image/image_38/38_Vertrieu_8.jpg"]},"Consult_chateau_formulaire8668":{"id":"Consult_chateau_formulaire8668","dept":"38","canton":"Crémieu","commune":"Leyrieu","nom":"Vieille_Mure","type":"Vestiges","periode":"XV","histoire":"Vieille-Mure: Ce domaine appartenait à la famille de Bovet seigneur de Mure, au XVe siècle; Eienne de Bovet y  fit construire une chapelle dans l'église de Sainte-Marie de Tortas pour y être inhumé, ses descendants  s'y firent aussi enterrer.\r\n Son fils Zacharie de Bovet fut un savant juris-consulte que Louis XI envoya en mission à plusieurs reprise à Rome et en 1510  il acheta la seigneurie de Moras à son fils Antoine, celle-ci  demeura aux  mains de ses descendants jusqu'au milieu du XIXe siècle .","architecture":"La vieille Mure fut transformé en auberge, puis cette maison forte disparaît,  il ne reste que la porte d'entrée flanquée de tours en ruines dans la végétation.","habitants":"Famille Bovet\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Vieille_Mure_1.jpg"]},"Consult_chateau_formulaire252a-2":{"id":"Consult_chateau_formulaire252a-2","dept":"38","canton":"Vienne","commune":"Vienne","nom":"Vienne","type":"Vestiges","periode":"III-Avant-JC","histoire":"Vienne: Les premiers habitants néolithiques s'installèrent, à Estressin à la fin du IIIe millénaire avant J C. Puis à partir du Ve siècle avant J-C, un habitat Gaulois se développa  là où se trouve actuellement le cur de la ville. Métropole des Allobroges au Ier siècle avant J.C. \r\nVille militaire à l'époque de César et cité jusqu'à la fin de la république romaine englobant les cinq collines de la rive gauche. \r\nAu IVe siècle la ville  devenue chrétienne s'était rétracté, devient capitale d'une nouvelle province, la Viennoise. L'installation des peuples barbares Burgons, puis Francs; L'évêque Saint-Avit (450-518) entretient des relations privilégiées avec la dynasties des souverains Burgondes. Au moyen âge, les divisions mouvementées de l'Empire carolingien (IXe siècle) modifièrent l'orientation de la ville et subit plusieurs sièges, elle fut la résidence de Charles le Chauve (879-887); et les évêques devinrent vassaux jusqu'en 1450. faisant parti du domaine de Humbert II. Fut donc rattaché au royaume de France.","architecture":"Construite sur les bords du Rhône, de cette ville qui fut une capitale Gallo-Romaine du IIIe siècle avant J.C, Vienne fut tellement marqué par le christianisme que la ville porta le surnom de \"cité sainte\", les guerres de religion provoquèrent de nombreuses destructions dont souffrirent les établissements religieux et l'économie locale. En 1633 les fortifications de la ville furent démantelées.\r\nDu  patrimoine il nous reste:  le théâtre Romain, le temple d'Auguste et de Livie, le théâtre municipal, le jardin archéologique de  Cybéle, la tour de la poterne vestige de l'enceinte romain, la Pyramide, église et le cloître St  André le Bas, Cathédrale primatiale St-Maurice; église St  André le Haut, la Tour des Valois, Pont médiéval à St-Martin, le mont-Salomon vestige du remparts romain, la Bâtie (château) ruine apparente.","habitants":"\"","divers":"","gps":"","images":["../image/image_38/38_Vienne_1.jpg","../image/image_38/38_Vienne_2.jpg","../image/image_38/38_Vienne_3.jpg","../image/image_38/38_Vienne_4.jpg","../image/image_38/38_Vienne_5.jpg","../image/image_38/38_Vienne_6.jpg","../image/image_38/38_Vienne_7.jpg","../image/image_38/38_Vienne_8.jpg","../image/image_38/38_Vienne_9.jpg"]},"Consult_chateau_formulaire1080":{"id":"Consult_chateau_formulaire1080","dept":"38","canton":"St-Etienne-de-St-Geoirs","commune":"La Frette","nom":"Villardiere","type":"Manoir","periode":"XVI","histoire":"Villardière ou château de la Frette d'une famille d'origine de Bizonnes qui donna son nom au château acheté par Claude de la Villardière après la Révolution.  A l'origine en 1299 fief donné par Humbert Ier aux Vehier déjà seigneur de Sillans, et qui garderont le fief jusqu'en 1540 à l'époque c'était une maison forte qui se trouvait derrière l'actuelle château.  Passa aux Louvat Charles et Jacques deviennent seigneur de la Frette descendant d'une grande famille d'Artaud de Louvat seigneur  de Bocsozel gouverneur de la Côte st-André en 1291. Puis le domaine passe en 1600 par alliance  de Louise de Louvat dame de la Frette avec Jacques de Virieu Pointières, grande  famille qui eut plusieurs branches, Jacques fit construire le château actuel et cette famille s'éteint en 1750 avec André de Virieu capitaine gendarme sans enfants.                Racheté par Emé de Marcieu, lieutenant des armées du roi gouverneur de Valence commandant en chef du Dauphiné,  à la mort de Pierre Louis Emé comte de Marcieu  et de Boutières même fonction que son père en 1804 après la Révolution, le domaine qui n'était pas habité par les comtes de Marcieu ni les Picot de la Buissonnière avocat à la cour qui y installèrent des fermier châtelains fut acheté (comme signalé au début) par Claude Berger de la Villardière, grande famille  d'avocat de Montseveroux.    Etienne de la Villardière Berger de la Villardière épousa Henriette Robert de Gardier  en 1802, Arthur Berger de la Villardière  épousa mademoiselle  Gamon de Montval, ce dernier reçu Joseph Bonaparte, Arthus décéda en 1883, son fils Charles-Antoine-Armand Berger de la Villardière lui succède et devient maire de la Frette (1884 à 1919) il a épousé Marie-Elisabeth-Héléne Richard de Lagarde. Toujours dans la famille.","architecture":"Manoir du XVIe siècle, corps de logis rectangulaire flanqué d'une tour plein cintre en décalé deux pavillons qui  sont accolés à deux tours rondes qui se trouvent sur les extrémités à toits en poivrières Joli manoir transformé aujourd'hui en exploitation agricole.","habitants":"Famille de la Villardière\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Villardiere_1.jpg","../image/image_38/38_Villardiere_2.jpg","../image/image_38/38_Villardiere_3.jpg"]},"Consult_chateau_formulaire86e8":{"id":"Consult_chateau_formulaire86e8","dept":"38","canton":"Crémieu","commune":"Villemoirieu","nom":"Villemoirieu","type":"Vestiges","periode":"XV","histoire":"Villemoirieu: Ce château a appartenu à plusieurs familles nobles de Vénérieu, les Rochevieille et les Bernières, Gaspard de Bernières épousa en 1600 Huguette de Copier qui lui apporta la maison forte  de Villemoirieu, qui la vendirent en 1692 à Laurent du Bourg seigneurs de Cézargues, puis elle vit se succéder, au gré des mariages ou achats des filles et des cadets des grandes familles  dauphinoises: les de Beaumont, Alleman, Boscozel. \r\nVendue comme bien national. Il connut un nouvel avatar en 1919 avec un incendie .","architecture":"Ce château possédait un donjon, mais ses tours étaient plus larges et carrées mais cette dernière disparut emportée par la folie moyenâgeuse  du siècle dernier, responsable aussi des mâchicoulis avantageux qui couronnaient les tours.","habitants":"Famille de Rochevieille\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Villemoirieu_1.jpg","../image/image_38/38_Villemoirieu_2.jpg"]},"Consult_chateau_formulaireeb86":{"id":"Consult_chateau_formulaireeb86","dept":"38","canton":"St-Marcellin","commune":"Chevrières","nom":"Vincendon","type":"Château","periode":"XVII","histoire":"Vincendon: Dans ce château a vécut Clément-Adrien Vincendon Dumoulin ce dernier est né au château de Foras à Chatte. Grand explorateur il embarqua pour la terre Adélie sur l'Astrolade de Dumont Durville de 1837 à 1840, il fut médaillé cinq fois,  décéda en 1858.","architecture":"Vincendon: Ce château situé dans un vaste parc, possède une ferme , une chapelle et des dépendances. Corps de logis rectangulaire à deux niveaux  accolé à des dépendances qui le relie à un autre corps de logis plus ancien flanqué d'un donjon carré.","habitants":"Famille Vincendon\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Vincendon_1.jpg","../image/image_38/38_Vincendon_2.jpg"]},"Consult_chateau_formulaireb56f":{"id":"Consult_chateau_formulaireb56f","dept":"38","canton":"Tour-du-Pin","commune":"Virieu-sur-Bourbre","nom":"Virieu","type":"Château","periode":"XI- XVIII","histoire":"Virieu: Ce château qui fut au départ une maison forte, fut bâti par Wilfrid de Virieu au XIe siècle, Béatrix de Virieu  épousa  Siboud de Clermont en 1220  et  le château passa aux Clermont qui le garderont pendant sept générations, puis passa au Dauphin en 1349 et en 1573 le château  fut vendu à Artus Prunier de Saint-André en Royans; lieutenant général des armées du roi, car Antoine de Clermont avait décidé de se retirer en son domaine d'Ançy-le-Franc. \r\nC'est la famille de Prunier qui entreprit de transformer le château dans son aspect actuel, et,  le fils de Laurent Prunier, Nicolas,  premier président au parlement de Grenoble et ambassadeur de Venise, n'ayant que des filles,  qu'il transmit le château  à son décés à un neveu.\r\n A la génération suivante, René Prunier de Saint André, lieutenant des armées du roi, mort en 1765, sans descendance mâle, le château passe à sa fille, la comtesse de Langon, qui parvient a faire passer le château sans dégât  sous la Révolution.\r\nLa propre fille de la comtesse de Langon  Magdeleine-Françoise marquise Gautheron légue à sa mort en 1818 le château et les terres à son neveu comte de Sibuet de Sain-Férriol, dernier descendant des Prunier  qui  préféra s'installer à Uriage  en 1874,  vendit le château  à  Alphonse de Virieu, filleul du poète Lamartine qui fut souvent l'hôte de son père au château de Pupetières, et  qui après 700 ans le château de Virieu retrouvait à nouveau la famille de Virieu,  ces derniers habitaient au château de Brangues et le vendirent à Paul Claudel. \r\nEn 1924 des travaux de restauration sont entrepris par Henri de Virieu avec l'architecte Sainte-Marie Perrin, frère de madame Claudel, et passa ensuite à son fils Xavier (1898-1953) officier au ministère de la guerre  et journaliste sous la résistance  qui transforma son château en refuge pour les résistants  et de cache d'armes qui ont servit à ces derniers et aujourd'hui François-Henri de Virieu journaliste en est propriétaire; le château est  ouvert  au public depuis 1935.","architecture":"Ce château du XIe siècle qui était une maison forte sera remanié au XVe siècle dans un style féodal  puis au XVIIe siècle pour prendre l'aspect actuel, puis complétait au XIXe siècle, il se compose de bâtiment formant un quadrilatère irrégulier et  qui sont reliés entre eux par une courtine surmontée d'un chemin de ronde à créneaux et mâchicoulis, sur le bâtiment de droite se détache une tourelle en encorbellement, un donjon lui fait face et une tour d'angle abrite l'escalier à vis du XVe siècle . Deux grosses tours cylindriques sur la façade ouest, l'ensemble des tours ont la toiture en poivrières.","habitants":"Famille de Virieu  \r\nFamille Prunier\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Virieu_1.jpg","../image/image_38/38_Virieu_2.jpg","../image/image_38/38_Virieu_3.jpg","../image/image_38/38_Virieu_4.jpg","../image/image_38/38_Virieu_5.jpg"]},"Consult_chateau_formulairee2ab":{"id":"Consult_chateau_formulairee2ab","dept":"38","canton":"Roybon","commune":"Viriville","nom":"Viriville","type":"Château","periode":"XIII","histoire":"Viriville: Du XIe au XIIe siècle la seigneurie était la puissante famille de Bréssieux,  celle-ci alternativement alliée des comtes de Savoie. Au  XVe siècle, érigé en marquisat, la famille de Grôlée prend possession du château et devient seigneur de Viriville.\r\n Le dernier seigneur fut une femme; Magdelaine Henriette Sabine Olivier de Sonezan de Viriville qui avait épousé en 1779 à l'age de treize ans Archambaud Joseph comte puis duc de Talleyrand-Périgord, elle mourut sur l'échafaud deux jours avant la mort de Robespierre laissant deux enfants dont Alexandre Edmond, duc de Talleyrand-Perigord  neveu du célèbre prince de Talleyrand-Perigord.","architecture":"Le château de Viriville était implanté sur la bordure septentrionale du plateau sur le promontoire en limite de rupture de pente, était un massif corps de bâtiment en briques et galets, formant un quadrilatère et flanqué de tours , il ne reste qu'un mur de courtine ,et une tour ronde de dix mètres de haut  et au sud un mur en galets long de deux mètres.","habitants":"Famille de Grôlée Talleyrand-Perigord\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Viriville_1.jpg","../image/image_38/38_Viriville_2.jpg"]},"Consult_chateau_formulaire0378":{"id":"Consult_chateau_formulaire0378","dept":"38","canton":"Vizille","commune":"Vizille","nom":"Vizille","type":"Château","periode":"XVI","histoire":"Vizille: Au Xe siècle une forteresse qui dépendait de l'abbaye de Cluny est construite sur un promontoire  rocheux  situé à la jonction des vallées d'Uriage et de la Romanche par la maison d'Albon qui furent les premiers à porter le nom de Dauphins, puis transmise à la maison de la Tour du Pin  à  Humbert II, qui en 1349 passa le Dauphiné  au  roi de France, Charles V premier Dauphin séjournera à plusieurs reprises au château, Louis XI également y séjourna, ainsi que Charles VIII, Louis XII et François Ier, puis le château en mauvais état s'installe une garnison dès 1562, puis privé d'utilité  fut  démoli. \r\nEn 1593 Henri IV vendit à François de Bonne, futur duc de Lesdiguières en 1611, chef des protestants du Dauphiné, qui entreprend la construction du nouveau château de 1600 à 1620; où il reçu Louis XIII en 1622.\r\n(François de Bonne entra comme cadet dans les troupes du baron de Gordes, il rejoint en 1562, Fumeyer pour combattre les catholiques, par son courage il fut nommé par Henri de Navarre, capitaine général des protestants du Bas-Dauphiné en 1577, son ascension est rapide , Maréchal de France en 1620 et maréchal de camps et armées du roi en 1621, il accède au titre de connétable de France en 1622.)\r\n A la mort du duc en 1626 le château passa à son gendre Charles de Créqui  maréchal de France, puis à son petit-fils François qui obtint aussi le titre de duc de Lesdiguières. \r\nPar héritage le château passe au  duc de Villeroy et ce dernier en 1780 le  vendit à Claude Perier industriel et restera dans cette famille jusqu'en 1895; Claude qui donnera asile  en 1788  à l'assemblée des municipalités du Dauphiné. et ce château  est devenu un haut lieu d'histoire.\r\nLe pape Pie VI, s'y arrêta en 1799 avant de mourir à Valence, un terrible incendie ravagea  l'édifice qui fut reconstruit immédiatement par Augustin Perier qui y reçut quatre ans plus tard le général de la Fayette dont la petite fille avait épousé son fils Adolphe. \r\nVizille racheté par le beau-père d'Auguste-Casimir Périer qui est le général Fonténillat, qui le laissa à Casimir Perier fils du ministre de Louis Philippe.\r\nLe château brûla une seconde fois en 1865 l'aile anéantie ne fut pas relevée et s'en sépare  en 1894 suite à sa démission de l'Elysée. \r\nIl fut acquis par Monsieur Imbert industriel stéphanois qui le céda en 1902 à une société anglaise  pour en faire un hôtel de luxe, suite à une faillite qui permit à monsieur de Marone industriel de Turin de le racheter  en 1906.  \r\nL'état français le racheta en 1924, et  jusqu'en 1971 servit de résidence d'été au président de la République; Albert Lebrun puis René Coty,  passa ensuite au département, il abrite aujourd'hui le musée de la Révolution Française.","architecture":"De ce château parti au Xe siècle d'une forteresse qui fut complètement rasée en 1562 , reconstruit en un grand et magnifique château construit sur une terrasse, il fit bâtir ses bâtiments autour d'une cour d'honneur, fermée par un mur dans lequel est percé un portail monumental. A gauche , un pavillon flanqué d'une tourelle cylindrique constitue un vestige du château dalphinal. Un pavillon formant la partie droite  de la cour,  raccordé par un gros pavillon rectangulaire à l'aile est, est  rattaché par derrière à une aile en retour d'équerre . A l'articulation de deux corps de bâtiments s'élève une tour carrée d'escalier que coiffe un dôme quadrangulaire. L'aile ouest est cantonnée d'une tour cylindrique. Ce château eut un incendie en 1825 qui détruisit  l'aile est: reconstruit à peu prés à l'identique et en 1865, un nouvel incendie , plus terrible encore, ravage les bâtiments occupant le fond et le côté gauche de la cour d'honneur,qui ne seront pas reconstruit.","habitants":"Duc de Lesdiguières      \r\nFamille de Camille Perrier\r\n        \"","divers":"Château, porte d'entrée et Pavillon","gps":"","images":["../image/image_38/38_Vizille_1.jpg","../image/image_38/38_Vizille_2.jpg","../image/image_38/38_Vizille_3.jpg","../image/image_38/38_Vizille_4.jpg"]},"Consult_chateau_formulaire09c4":{"id":"Consult_chateau_formulaire09c4","dept":"38","canton":"St-Geoire-en-Valdaine","commune":"Voissant","nom":"Voissant","type":"Château","periode":"XV","histoire":"Voissant: Cette maison forte du XVIe siècle appelé \"Vieux Château\" fut habité par la famille Garnier, dont un des  membres fut conseiller, maître à la cour des comptes du Dauphiné, puis la famille Sozey de la Croix au XVIIIe siècle, puis les de  La Coste, les  Vaulserres et la famille Garnier  des Garets au XIXe siècle .","architecture":"Ce vieux châteaux ,bâtiments en équerres remanié au XVIIe siècle, se compose de deux corps de Logis  en équerre dont l'un est flanqué de deux  tours carrées. Les façades sont ornées de belles fenêtres à meneaux et des grands toits  de tuiles plates et écaillées.","habitants":"Famille Garnier\r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Voissant_1.jpg","../image/image_38/38_Voissant_2.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','38 — Isère'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
