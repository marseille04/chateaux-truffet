aire.monsieur Perrin.","architecture":"Ce château de style gothique de forme quadrangulaire, qui a subit un incendie, le détruisant de moitié a été reconstruit à l'origine, flanqué de pavillon en angles et un pavillon d'entrée sur la partie sud.","habitants":"Famille Morges  \r\nFrançois de Philibert\r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Motte_les_Bains_1.jpg"]},"Consult_chateau_formulaire8fa0":{"id":"Consult_chateau_formulaire8fa0","dept":"38","canton":"Roussillon","commune":"Sablons","nom":"Murat_38","type":"Maison forte","periode":"XVI","histoire":"Murat: La première seigneurie de Sablons est liée à la famille de Roussillon, la troisième  branche des seigneurs  de Roussillon  (Sablons,  Montbreton et Tullins)   finit par Humbert de Roussillon mort sans postérité, il légua la terre de Sablons à son fils naturel  Jean de Roussillon. Humbert de Roussillon  fut tué en 1424 à la bataille de Verneuil, il y eu plusieurs Murat de Lestang, seigneur de Sablons, présidents au parlement du Dauphiné Antoine en 1698 et 1716, Victurien-Alexandre en 1783. \r\nLes Murat de Lestang conservèrent la seigneurie jusqu'à la Révolution.","architecture":"Cette maison forte de Murat  de trois niveaux flanquée de trois tours rondes  et la quatrième a servit de Chapelle.","habitants":"Famille de Murat de Lestang\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Murat_1.jpg"]},"Consult_chateau_formulaire1cb7":{"id":"Consult_chateau_formulaire1cb7","dept":"38","canton":"Bourg-d`oisans","commune":"Bourg-d`Arud","nom":"Muzelles","type":"Gentilhommière","periode":"XVIII","histoire":"Muzelles: Construit au XVIIIe siècle, à l'initiative des colporteurs de draps et de Jacques Rochette, conseiller  maître à la chambre des comptes de Grenoble, transformé aujourd'hui en hôtel restaurant.","architecture":"Corps de logis rectangulaire flanqué de trois niveaux et de deux pavillons aux extrémités.","habitants":"Famille de Jacques Rochette\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Muzelles_1.jpg","../image/image_38/38_Muzelles_2.jpg"]},"Consult_chateau_formulaire0b7a-2":{"id":"Consult_chateau_formulaire0b7a-2","dept":"38","canton":"Vienne","commune":"Serpéze","nom":"Neyves","type":"Château","periode":"XVI","histoire":"Neyves: En 1540 un château était construit par les Musino,puis appelé maison forte de Neyve ou mourut Gauthier de Vilette en 1652. \r\nEn 1677, cette demeure passa à la famille Revoyat du Viennois. François Revoyat ,conseiller du roi s'établit à vienne en 1696, Philibert Revoyat de Neyve , seigneur de Châlon , chevalier de Saint-Louis fut le dernier seigneur. En 1738 sa soeur épousa Méssire de Mitifiot de Bel Air, Capitaine châtelain du marquisat de Saint-Symphorien d'Ozon et de Solaise, le château passa par alliance à aux de Gallier, leur fils Philibert vendit à Antoine de Portalés en 1786, vendut comme bien nationale à la révolution ( les Portalés furnt guillotinés).\r\n Les futurs propriétaire industriel famille Valluit et d'acquéreurs en acquéreurs termina chez Emmaus en 1985","architecture":"Neyves de plan rectangulaire à trois niveaux toit en croupes flanqué de deux pavillons saillants sur les côtés et d'une tour carrées sur la droite","habitants":"Famille Revoyat \r\nFamille Portalés\r\n        \r\n        \r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Neyves_1.jpg"]},"Consult_chateau_formulaire3bce":{"id":"Consult_chateau_formulaire3bce","dept":"38","canton":"Voiron","commune":"Coublevie","nom":"Orgeoise","type":"Maison forte","periode":"XIV","histoire":"Orgeoise: Auparavant, cette maison forte s'appelait de \"Dorgeoise\" en raison de son propriétaire Roux de Dorgeoise qui s'installa à la Trinconnière , vers  1284.  Guigues de Dorgeysia occupe à son tour la maison forte en 1497.  \r\nPar alliance le domaine passe en 1543 à  la famille Gratet de Dolmomieu et c'est en 1622 que Catherine de Trinconnière dernière des Dorgeoise épouse Alexandre de Galbert. En 1747 la maison forte devient la propriété de Jean-Baptiste de Beauregard, puis après la Révolution eu plusieurs propriétaire pour terminer comme résidence des frères chartreux.","architecture":"La maison forte d'Orgeoise, de plan rectangulaire à trois étages flanquée de deux tours rondes en façade bien remanié par la ville dernièrement.","habitants":"Famille de Roux de Dorgeoise\r\n        \"","divers":"Maison forte Orgeoise","gps":"","images":["../image/image_38/38_Orgeoise_1.jpg","../image/image_38/38_Orgeoise_2.jpg"]},"Consult_chateau_formulaire5c39":{"id":"Consult_chateau_formulaire5c39","dept":"38","canton":"Pont-de-Cherruy","commune":"Chavanoz","nom":"Panettes","type":"Château","periode":"XVIII","histoire":"Panettes: Cette maison forte, plutôt château fut acheté en 1789 par le marquis de Daffau, peu soucieux de la Révolution qui grondait.","architecture":"Ce château de Panettes, quadrangulaire flanqué de quatre tours carrées à trois niveaux dont deux sont crénelées et à l'opposée de l'entrée une tour ronde a toit pointu, sur la façade un pavillon saillant  de même niveau.","habitants":"Famille du Marquis Daffau\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Panettes_1.jpg"]},"Consult_chateau_formulairee662":{"id":"Consult_chateau_formulairee662","dept":"38","canton":"Monestier-de-Clermont","commune":"St-Martin-de-la-Cluze","nom":"Paquier","type":"Maison forte","periode":"XV","histoire":"Paquier: En 1262 le mandement dépendait de Odon Alleman, en 1566 André Alleman de Valbonnais Seigneur de la Cluze et  Paquier  acheta le vicomté du Trièves  à  Antoine de Clermont, il eut deux enfants Alexandre et Louise . André mourut en 1569.  Alexandre Alleman 1562-1637 gouverneur de la Maurienne sous Henri IV de Chambery et sous Louis XIII  maréchal de camp. Il eut plusieurs enfants dont une fille appelé Louise;  Louise Alleman de Paquier s'était mariée avec Borel de Ponsonnas, devenu pieuse fonda la maison des Bernardines réformées à Grenoble. Vers le milieu du XVIIe siècle Charlotte Alleman était vicomtesse du Trièves, mariée à  Jean Fléard de Pressins,   Charlotte  vendit le mandement de la Cluze à   Jacques de Béranger seigneur du Gua, Puis fut vendu de nouveau à Georges Chevalier des Oches, passa à  Jacques Chevalier d'Istra qui perdit le château et le domaine à la Révolution. Vendu comme bien nationale, racheté par de riche fermier  et aujourd'hui  Jacques et Hélène Rossi en ont fait un hôtel.","architecture":"la maison forte de Paquier a deux corps de bâtiment accolés en L  à trois niveaux  et une tourelle ronde en angle portant l'escalier à vis.","habitants":"Famille Alleman de Valbonnais\r\n        \"","divers":"Château Paquier","gps":"","images":["../image/image_38/38_Paquier_1.jpg"]},"Consult_chateau_formulaire707b-2":{"id":"Consult_chateau_formulaire707b-2","dept":"38","canton":"Tour-du-Pin","commune":"Le Passage","nom":"Passage","type":"Manoir","periode":"XVII","histoire":"Le Passage: Ce manoir fut d'abord une maison forte avant de devenir au XVIIe siècle cette belle bâtisse qu'on appelle \"château\". \r\nAu XIVe siècle les seigneurs de Clermont se virent confier le mandement par le dauphin Humbert II et  Aynaud de Clermont se fit construire une maison forte  en 1342.\r\n Des vestiges sont encore visibles dans l'aile droite du château, le domaine  passa dans la famille de Poisieu, Marquis du Passage et seigneur de Saint-Georges d'Espéranche, construisit le château en 1650 qui le gardèrent jusqu'à la fin du XVIIe siècle, puis vendue  aux  Gallien de Chabons; Joseph  Gallien de Chabons, conseiller au parlement de Grenoble et seigneur du Passage remania le château.\r\nAprès la Révolution délaissé jusqu'en 1818 et fut acquit par le général Quiot, baron d'Empire natif de la Drôme, fut maire du Passage et conseiller général du canton de Virieu, il mourut en 1849 et son nom est inscrit sur l'Arc de Triomphe de l'Etoile. \r\nEnsuite les Durieux occupèrent le château et aujourd'hui  Monsieur et Madame  de Saint-Romain  ont la lourde tâche de poursuivre  la maintenance de ce beau  fleuron de l'architecture Dauphinoise.  On note en 1829  la visite de la Duchesse du Berry.","architecture":"Construit au XVIIe siècle de façon simple du bas Dauphiné à deux niveaux en forme de U avec un toit vastes à quatre pans de tuiles écaillées dauphinoises. Fronton  triangulaire sur façade portant les armoiries du général Quiot.","habitants":"Famille de Poisieu\r\nFamille du Général Quiot\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Passage_1.jpg","../image/image_38/38_Passage_2.jpg","../image/image_38/38_Passage_3.jpg"]},"Consult_chateau_formulairea3a2":{"id":"Consult_chateau_formulairea3a2","dept":"38","canton":"Clelles","commune":"Chichilianne","nom":"Passiere","type":"Manoir","periode":"XV","histoire":"Passiere: Ce château au XVe siècle, abrita avant 1789  les seigneurs de Morges, de Roux , de Veynes  et à partir de 1736  Nicolas Caire.\r\n Aujourd'hui transformé en hôtel restaurant  par  Monsieur Perli, et présente une riche collection de peintures d'Edith Berger.","architecture":"Manoir de la Passière a deux corps de logis accolés par une tour ronde et une autre à l'extérieur.","habitants":"Seigneurs Morges\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Passiere_1.jpg"]},"Consult_chateau_formulaire4e28":{"id":"Consult_chateau_formulaire4e28","dept":"38","canton":"St-Marcellin","commune":"St-Hilaire du Rosier","nom":"Perrier","type":"Maison forte","periode":"XVII","histoire":"Perrier Au XIIIe siècle, la maison  du Perrier et le domaine de Fontfroide  appartenait  au Mistral du Dauphin.      Au XIVe siècle propriété de la famille Chosson, dont Claude Chosson déjà châtelain de Saint-Lattier est autorisé de construire un colombier ( privilège de la noblesse). François Chosson , son petit-fils, capitaine protestant, est nommé le 30 Juin 1562 par le baron des Adrets super-intendant et commandant des communes environnantes. Son  arrière petit-fils François-André Chosson du Colombier devenu conseiller au parlement de Grenoble en 1720 et sera le père de César du   Colombier seigneur du Perrier de la Sône et de Rochechinard de 1731 à 1735, député de la noblesse en 1788. Henry du Colombier fils de François-André et ses soeurs revendront en 1855  le domaine à Pierre Noël  Dayon,  industriel, le domaine toujours dans la famille.","architecture":"Cette maison forte de forme quadrangulaire à un niveau, flanqué de pavillons carrées et une tour carrée plus haute style donjon, ces tours ont une toiture à tuiles  écailles  colorées, dans le parc, un château d'eau de style forteresse néo-médiéval servait à  alimenter la maison forte qui a été reconstruite au XVIIe Siècle.","habitants":"Falmille Chosson\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Perrier_1.jpg","../image/image_38/38_Perrier_2.jpg"]},"Consult_chateau_formulaire842d":{"id":"Consult_chateau_formulaire842d","dept":"38","canton":"Bourgoin-Jallieu","commune":"Bourgoin-Jallieu","nom":"Petit_Mont","type":"Maison forte","periode":"XIX","histoire":"Petit-Mont: Monsieur Auguste Genin industriel fit construire cette maison forte en 1876 en utilisant les matériaux de l'ancienne maison forte. \r\nCette maison forte a appartenu également à Jean de Bienvenu.","architecture":"La maison forte a un corps de logis de trois  niveaux  flanqué de tours  carrées et  rondes à  mâchicoulis.","habitants":"Famill d'Auguste Genin\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Petit_Mont_1.jpg","../image/image_38/38_Petit_Mont_2.jpg"]},"Consult_chateau_formulaire8e6e":{"id":"Consult_chateau_formulaire8e6e","dept":"38","canton":"Bourgoin-Jallieu","commune":"St-Savin-Damptézieu","nom":"Peythieu","type":"Maison forte","periode":"XIV","histoire":"Peythieu: Les seigneurs de Demptézieu possédaient plusieurs fiefs, chaque  fief dépendait de vassaux  dont le premier connu à Peythieu fut la famille de Bourg, puis par alliance passa à la famille de  Menon, qui devint une des plus puissantes qui finit  par acquérir tout le mandement et à la veille de la Révolution le pouvoir était passé dans leurs mains et prirent le nom de Menon de Ville qui venait de se faire construire le château de Saint-Savin. \r\nCe mandement l'emportait sur Damptézieu qui n'était plus qu' un hameau de la commune de Saint-Savin.","architecture":"De cette maison forte de Peythieu il ne reste qu'une tour ronde avec fenêtre à meneau et canonnière.","habitants":"Famille Menon\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Peythieu_1.jpg","../image/image_38/38_Peythieu_2.jpg","../image/image_38/38_Peythieu_3.jpg"]},"Consult_chateau_formulairec85a":{"id":"Consult_chateau_formulairec85a","dept":"38","canton":"Tour-du-Pin","commune":"St-Didier-de-la-Tour","nom":"Pin_St_Didier","type":"Château","periode":"XVII","histoire":"Pin-St-Didier: Le vieux château, actuellement transformé en séminaire pour industriels dit \"ferme du Pin\" semble remonter à la fin du XIVe siècle et faisait partie du camp retranché de la baronnie de la Tour du Pin.  L'actuel château de Pin a été construit en 1674 par Jean de Vincent et Dorothée de Gallien; décédé sans postérité, ils laissèrent leur fortune aux pauvres de l'hôpital de Grenoble.\r\nLe château fut revendu à un neveu de madame de Vincent, Gaspard de Gallien de Cléret , d'une famille de parlementaires de Grenoble, d'où sont issus les propriétaires actuels; Leur fille, Gasparde, épousa le marquis de Rachais. A la Révolution le château fut seulement pillé mais le marquis n'émigra pas, le fils de Gasparde, Antoine de Rachais, épousa  Catherine de Deux-Brézé, fille du lieutenant général des armées du roi.\r\nLe château aujourd'hui appartient à la  comtesse du Parc-Locmaria.","architecture":"La ferme du Pin est une maison forte du XIVe siècle avec un corps de logis rectangulaire à quatre niveaux  flanqué d'une tour ronde, fenêtres à meneaux.    Le château, grosse bâtisse de quatre niveaux d'un corps de logis rectangulaire avec pavillons saillant en angle.","habitants":"famille de Jean de Vincent\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Pin_St_Didier_1.jpg"]},"Consult_chateau_formulaire9d30-2":{"id":"Consult_chateau_formulaire9d30-2","dept":"38","canton":"Fontaine","commune":"Fontaine","nom":"Planta_Rochette","type":"Maison forte","periode":"XIV","histoire":"Planta-Rochette: Cette maison forte a appartenu au seigneur Jacques de Sassenage au XVe siècle, puis par les Falquet jusqu'au  XVIe siècle dont un des fils d'une des branches de cette famille devient receveur des domaines du Roi en Dauphiné, la famille Falquet présent à la Révolution, l'un des héritiers, Sébastien, mène une carrière militaire difficile est mouvementée: il quitte l'armée et la réentégre en 1825, prit sa retraite à Fontaine en 1833 jusqu'à sa mort en 1839. \r\nEn 1847 la commune fait acquisition des terrains environnant pour faire des écoles; en 1850 le domaine amputé est habité encore pendant des décennies par la famille Falquet de Planta puis vendu, appelé château de la Rochette par la famille Dotto qui en est le propriétaire, il a découvert qu'il était construit sur un rocher.","architecture":"Maison forte à construction rectangulaire  à  trois niveaux avec donjon rectangulaire.","habitants":"Famille de Sassenage    \r\nFamille Falquet de Planta\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Planta_Rochette_1.jpg","../image/image_38/38_Planta_Rochette_2.jpg"]},"Consult_chateau_formulaire5e58":{"id":"Consult_chateau_formulaire5e58","dept":"38","canton":"Crémieu","commune":"Chozeau","nom":"Poizieu","type":"Château","periode":"XIV","histoire":"Les seigneurs de Poisieu  furent de valeureux soldats, l'un à Poitiers avec Jean le Bon, l'autre à Verneuil, où moururent tant de nobles dauphinois en 1424, un autre au siège d'Orléans avec Jeanne d'Arc. \r\nLa famille de Poisieu trés ancienne par Girard de Poisieu au XIe siècle. le château actuel construit par la Famille de Copier au début du XVe siècle; Jean Copier fidèle au roi Charles VII, refusa de suivre le dauphin quand il se révolta contre son père,  ses biens furent confisqués, condamné à mort sa veuve et son fils attendirent longtemps pour récupérer leur biens. \r\nPuis par alliance et héritage le château passa à la famille Noir et Gotefrey, puis saisi de nouveau en 1659  pour une affaire de meurtre où était impliqué Joseph Gotefrey, il passa à Melchior de la Poype jusqu'en 1752 où François Gesse ancien secrétaire du roi acquit la seigneurie ainsi que celle de Janeyrias et de Malatrait, sa descendance était par N. Gesse seigneur de Poissieu , et lieutenant général en la sénéchaussée de Lyon en 1779, cette famille s'est éteinte au commencement du XIXe siècle les biens sont passé par succéssion dans la famille de Riverieulx de Chambost dont une branche habita le château;  échappant aux incendies pendant la Révolution.\r\nLe château appartient aujourd'hui au comte Guy Palluat de Besset.","architecture":"la maison forte  de Poizieu  mentionnée pour la première fois en 1390  fut remaniée à plusieurs reprises XV-XVI-XIXe siècle pour devenir château, elle à gardé sa tour circulaire  haute de vingt mètres couronnée de mâchicoulis, et coiffée de lauzes. Sur le mur de clôture de l'entrée, remaniée à l'époque contemporaine, deux archères-canonnières sont placées de chaque côté de la porte surmontée d'une bretèche.","habitants":"famille Jean Copier    \r\nFamille Joseph Gotefrey\r\nFamille de Gesse\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Poizieu_1.jpg","../image/image_38/38_Poizieu_2.jpg","../image/image_38/38_Poizieu_3.jpg"]},"Consult_chateau_formulaire85d6-2":{"id":"Consult_chateau_formulaire85d6-2","dept":"38","canton":"La Mure","commune":"Ponsonnas","nom":"Ponsonnas","type":"Château","periode":"XV","histoire":"Ponsonnas: Le seigneur au XVe siècle était la famille de Borel de Ponsonas;  Humbert de Borel prêta hommage au dauphin le futur Louis XI. \r\nJean Borel de Ponsonas, embrassa le parti de la réforme de devenir l'un des lieutenants du baron des Adrets, puis en 1590 passa dans l'armée des catholiques. Le domaine fut transmis ensuite au Philibert  par l'intermédiaire du duc de Lesdiguières; François de Philibert marquis   de Venterol  fit construire le château  féodal sur l'emplacement d'une maison forte qu'il avait acquis à Jean-François- Paul  Créquy. \r\n L'un des descendants de Laurent  de Philibert,  ayant émigré en 1793 le château fut vendu comme bien national. Aujourd'hui ce château abrite une maison de retraite.","architecture":"Ce château  de Ponsonnas de forme rectangulaire à trois niveau flanquais d'une tour à toit poivrière.","habitants":"Famille de Philibert de Venterol\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Ponsonnas_1.jpg"]},"Consult_chateau_formulaire7c50":{"id":"Consult_chateau_formulaire7c50","dept":"38","canton":"Pont-en-Royans","commune":"Pont-en-Royans","nom":"Pont_en_Royans","type":"Vestiges","periode":"","histoire":"Pont en Royans: En 1251 fief de Raymond de Béranger, prince du Royans et seigneur de Sassenage, cède à Guigues VIII la terre de Beauvoir en échange de Saint-André, de Champverse et de Presles, puis fief d'Humbert II et passa en 1349 à la France. \r\nHenri de Sassenage vassal d'Humbert II fait construire le fort appelé \"les trois châteaux\" bastion militaire pour surveiller la vallée de la Bourne.\r\nPont en Royans au XVIe siècle possédait 6000 habitants avait plusieurs usines de draperies et de tisserands et une activité autour de la laine de mouton produit récupéré sur le plateau du Vercors, au XVIIIe ils se trouvèrent seulement 1000 habitants et 900 actuellement et il ne reste une seule usine.\r\nJusqu'à la Révolution Pont en Royans faisait toujours partie du fief de la seigneurie de Sassenage, mais depuis 1560 cette ville ne possédant plus de château il n'y avait donc pas de châtelain, de plus les Béranger habitaient à Versailles.","architecture":"Pont en Royans a subit les guerres de religion et le fort fut détruit en 1560, il ne reste aujourd'hui quelques pans de murs des ruines de l'ancien château  nommé \"Trois Châteaux\" sur la motte rocheuse et des traces de renaissance dans le vieux village suspendu.","habitants":"Famille Béranger de Sassenage\r\n        \"","divers":"Vestiges du château dans les murs de soubassements et vestiges au dessus du village.","gps":"","images":["../image/image_38/38_Pont_en_Royans_1.jpg","../image/image_38/38_Pont_en_Royans_2.jpg","../image/image_38/38_Pont_en_Royans_3.jpg"]},"Consult_chateau_formulaire4d42-2":{"id":"Consult_chateau_formulaire4d42-2","dept":"38","canton":"Côte-St-André","commune":"Guillonay","nom":"Pontieves","type":"Château","periode":"XIV","histoire":"Pontieves: Les familles de ce château fournirent des militaires à la France et conseiller au Parlement.","architecture":"le château de Pontièves Corps de logis rectangulaire flanquée de tours rondes aux extrémités côté sud et d'un donjon à l'opposé.","habitants":"\"","divers":"","gps":"","images":["../image/image_38/38_Pontieves_1.jpg","../image/image_38/38_Pontieves_2.jpg","../image/image_38/38_Pontieves_3.jpg"]},"Consult_chateau_formulaire52eb":{"id":"Consult_chateau_formulaire52eb","dept":"38","canton":"Roussillon","commune":"Bougé-Chambalud","nom":"Porte","type":"Château","periode":"XVII","histoire":"Porte: Ce château qui à l'origine était un manoir,  fut construit vers 1620 par Gallia Christiana ou d'après lui ce n'est qu'en 1902 qu'un architecte lyonnais monsieur  Desplaques suréleva la toiture à la  Mansard  ainsi que les tours qui deviennent coniques avec des tuiles vernissées. \r\nLa propriété  aujourd'hui appartient au comte Raoul de Mont de Savasse.","architecture":"Le château de Porte de forme carrée, toit à la Mansard flanqué en chaque angle d'une tourelle à toit en poivrières et couvert de tuiles de Bourgogne vernissées.","habitants":"famille de Gallia Christiana\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Porte_1.jpg"]},"Consult_chateau_formulaire7b03":{"id":"Consult_chateau_formulaire7b03","dept":"38","canton":"Crémieu","commune":"Hyeres-sur-Amby","nom":"Poype","type":"Château","periode":"XVI","histoire":"Poype: Au XIIIe siècle le château appartenait à Humbert  d'Hières, écuyer , qui prêta hommage au seigneur de la Tour pour ses biens au fort d'Hières.\r\nEn 1498 une famille de Chatte Claude Bullier en était propriètaire.  \r\nAu XVIe siècle, noble Jean Pellerin occupait le château d'Hières et en mai 1680 passa à noble Alexandre  de Vallin, chevalier, et passa ensuite à la famille de la Poype ou il prit le nom.","architecture":"Ce château s'élève sur une butte d'ou il surveillait la campagne et l'entrée du Val d'Amby, il est difficile d'imaginer l'ancien château, brûler sous la révolution, il fut restauré plusieurs fois et se présente actuellement comme une haute et grosse demeure, corps de logis rectangulaire flanqué d'un donjon carré.","habitants":"Famille de Jean Pellerin\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Poype_1.jpg"]},"Consult_chateau_formulaire8fe7":{"id":"Consult_chateau_formulaire8fe7","dept":"38","canton":"Roussillon","commune":"St-Clair-du-Rhône","nom":"Prailles","type":"Maison forte","periode":"XVI","histoire":"Prailles: Ce château a été construit sous Henri IV, et a eu comme premier propriétaire Olivier de Serres qui expérimenta la culture du verre à soies.","architecture":"De cette maison forte qui a gardé son style ancien, grand bâtiment rectangulaire avec les bases de deux tours rondes, aujourd'hui tronquées.","habitants":"Famille d'Olivier de Serres\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Prailles_1.jpg"]},"Consult_chateau_formulaire0382":{"id":"Consult_chateau_formulaire0382","dept":"38","canton":"Crémieu","commune":"Parmilieu","nom":"Pressieu","type":"Vestiges","periode":"XVI","histoire":"Pressieu: Petit manoir rustique dit la \"vieille tour\" dépendait des prieurs de Vaulx jusqu'en 1770, puis confisqué comme bien national, des carrières et des exploitations de bois se sont développées après la Révolution dans ce domaine et la maison forte tombe en ruine.","architecture":"De cette maison forte de Pressieu il ne reste qu'une tour accolée à un bâtiment rectangulaire.","habitants":"Prieurs de Vaulx\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Pressieu_1.jpg"]},"Consult_chateau_formulairece52":{"id":"Consult_chateau_formulairece52","dept":"38","canton":"Grand-Lemps","commune":"Châbons","nom":"Pupetieres","type":"Château","periode":"XVI","histoire":"Pupetieres: Ce château appartient à la famille de Virieu depuis des siècles, qui eux aussi donnèrent plusieurs chevaliers de Saint-Jean de Jérusalem, leur noblesse est ancienne, Guiffrey  de Virieu est à la croisade , Martin de Virieu est choisi en 1224 par le comte de Savoie avec Aymard de Bressieux comme arbitre dans un différent entre lui et  Pierre de Villard . \r\nEn 1309 Albert de Virieu  seigneur de Faverges suit l'empereur en Italie, on trouve un Aymon de Virieu à la bataille de Varey. Sibnet de Virieu  (1320-1380 ) et avec Dugesclin en Espagne.\r\nClaude de Virieu seigneur de Pupetières et de Torcheflon en 1540 ce dernier épousa Marguerite de Bernard.\r\nToujours dans la famille à la Révolution, François-Henri de Virieu député de la noblesse  du  Dauphiné à l'Assemblée constituante, refusa d'émigrer, prit part à la révolte de Lyon ou il fut tué en commandant l'arrière garde; La veuve parvint a récupérer le château l'héritier son fils Aymon, ami de Lamartine acquit le château voisin du Grand-Lemps dans l'attente de la reconstruction du château de Pupetières par Viollet-le Duc  qui s'acheva en 1871.\r\nToujours dans la descendance.","architecture":"Ce château de Pupetières  qui fut incendié à la révolution  a été entièrement restauré par Viollet le Duc au XIXe siècle, multiples tours coiffées en poivrière de tuiles vernissées lui confèrent un charme particulier, rare dans la région.","habitants":"Famille de Virieu\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Pupetieres_1.jpg","../image/image_38/38_Pupetieres_2.jpg","../image/image_38/38_Pupetieres_3.jpg","../image/image_38/38_Pupetieres_4.jpg","../image/image_38/38_Pupetieres_5.jpg","../image/image_38/38_Pupetieres_6.jpg"]},"Consult_chateau_formulaired23b":{"id":"Consult_chateau_formulaired23b","dept":"38","canton":"St-Marcellin","commune":"St-Vérand","nom":"Quincivet","type":"Maison forte","periode":"XV","histoire":"Quincivet: Au XVe siècle la seigneurie appartenait aux  Bressieux , Louis de Bressieux seigneur de Beaucroisant , laissa une fille qui épousa en 1602 Antoine de la Porte dit \" Mr de Saint  Verand\"; Il hérita en 1628 de l'Arthaudière après la mort de son frère Claude et vendit Saint-Vérand aux la Croix de Chevrières comtes de Saint Vallier.\r\n A partir de cette date Saint-Vérand  fait parti du marquisat de Chevrières  jusqu'en 1714 date à laquelle Henri Bernard de la Croix marquis de Chevrières, vend à l'abbé Carrel puis à Clément de Chabert, Trésorier de France qui   restera  jusqu'à  sa  mort  en 1785 à l'âge de 101 ans; Sa petite fille Anne Marie de la Merlière, fille de Catherine de Chabert et d'Andrieu Bocon de la Merlière colonel d'enfanterie et seigneur de Saint-Verand  jusqu'à la Révolution épouse en premiere noce en 1784  de Tour de Fréminville et en seconde noce de Roch de Quinson ,vers 1850 le château de Saint-Verand passa  à Charles Rostaing de Castelet, une famille originaire de Valence; Son fils Ernest  1870-1942 sans enfant de mademoiselle Perettier adoptera Henri de Rostaing qui vendit il y a une vingtaine d'années la maison forte à Maître Greffe avocat à Paris.","architecture":"Cette maison forte de Qincivet massive de trois niveaux  de forme carrée flanquée d'une tour circulaire  sur un angle, des constructions ont été effectués sur la partie arrière abritant un oratoire.","habitants":"Famille de Pierre de Bréssieux\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Quincivet_1.jpg","../image/image_38/38_Quincivet_2.jpg"]},"Consult_chateau_formulairefc45":{"id":"Consult_chateau_formulairefc45","dept":"38","canton":"Grenoble","commune":"Grenoble","nom":"Rabot","type":"Fort","periode":"XV","histoire":"Rabot: Appelé à l'origine tour Rabot a été intégrée aux  fortifications de Lesdiguières  ( 1591 à 1620 ) puis au nouveau système défensif construit en 1823 à 1848 par le général Haxo pour les militaires occupant le lieu du fort de la Bastille. \r\nCette bâtisse est devenue citée universitaire et musée dauphinois.","architecture":"le fort de Rabot à un corps de logis rectangulaire flanqué d'une tour crénelée plein cintre.","habitants":"Général Haxo\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Rabot_1.jpg","../image/image_38/38_Rabot_2.jpg","../image/image_38/38_Rabot_3.jpg"]},"Consult_chateau_formulaire6473-2":{"id":"Consult_chateau_formulaire6473-2","dept":"38","canton":"La Mure","commune":"St-Pierre-de-Miarotz","nom":"Ratier","type":"Vestiges","periode":"XII","histoire":"Ratier; La seigneurie au XIIe siècle appartenait aux Alleman de Valbonnais, était une seule communauté jusqu'en 1591.                                Nantes(en Mathesyne) formait une Mistralie en 1369, Guigues Alleman concéda la liberté et franchise aux menants, à sa morts en 1375, la seigneurie est reprise par le roi. \r\nLe Bâtard d'Orléans, comte de Dunois, compagnon de Jeanne d'Arc en devient propriétaire en 1421 par une donation de Charles VI. \r\n En 1449 le Dauphin Louis II le futur roi Louis XI en donna jouissance à sa maîtresse Félize Reynaud, la seigneurie appartint ensuite à la famille de Combourcier . \r\nLa  destruction commença en 1684 et en 1750 par un glissement de terrain.","architecture":"Ce château fort de Ratier sur un sommet conique, boisé, isolé de trois côté par le torrent de la Roizonne, se dresse encore une haute muraille, dernier vestige important du château médiéval du XIIIe siècle qui fut  ruiné en 1527.","habitants":"Famille de Guigues Alleman\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Ratier_1.jpg"]},"Consult_chateau_formulaire591b":{"id":"Consult_chateau_formulaire591b","dept":"38","canton":"Rives","commune":"Réaumont","nom":"Reaumont","type":"Château","periode":"XIX","histoire":"Réaumont: Au Xe siècle appelé Planése qui était le siège d'une commanderie du temple et sa fondation daterait de 1325. Le mandement dépendait de la seigneurie de Clermont . \r\nHumbert II fait fortifier plusieurs points stratégiques du mandement, fait entourer les murailles, le bourg de Réaumont et de village voisins.  Le seigneur de Réaumont a été nommé Bailli et capitaine du Briançonnais vers 1368.                                                                 Le château fut vendu à la Révolution.","architecture":"Le château actuel a été construit au XIXe siècle sur l'emplacement d'un ancien château féodal du XIIe siècle et qui fut incendié à la révolution, ses ruines furent démantelées et les pierres servirent à la construction, vers 1860.  Corps de logis de forma carré à quatre niveaux flanqué de tours rondes et carrées  avec prolongation au nord d'un bâtiment accolé à une tour donjon carrée à créneaux en style moderne.","habitants":"Famille de Clermont\r\n        \"","divers":"Château Réaumont","gps":"","images":["../image/image_38/38_Reaumont_1.jpg","../image/image_38/38_Reaumont_2.jpg"]},"Consult_chateau_formulaire0ff8":{"id":"Consult_chateau_formulaire0ff8","dept":"38","canton":"Roussillon","commune":"Salaise-sur-Sianne","nom":"Rebatiere","type":"Maison forte","periode":"XV","histoire":"Rebatière:  Cette maison forte du XVe siècle qui était au départ une ferme fortifié, fut construite par Antoine Rebat seigneur d'Ozon, ses neveux Thomassin et Geoffroy Baron, et seigneurs d'Ozon, en Vivarais occupèrent cette maison forte jusqu'en 1520. \r\nLa famille Baron originaire  de Roussillon, avait été anoblie en 1489 par le roi Charles VIII. \r\nLe domaine passa aux  Mussino de Vienne  1520-1664  cette famille acquit la noblesse par Antoine de Mussino sous le roi Henri II; Antoine de Mussino fit hommage  de ses biens au comte de Roussillon. \r\nEn 1698 la  Rebatière appartient à Françoise le Jeune; veuve, elle se remaria le 22 Août 1702 avec Guillaume- Henri Pérouse, conseiller du Roi; veuve une seconde fois, le 14 juillet 1714, retirée à la Rebatière, Mme Pérouse eut recours à Mr Pierre François Fornand pour administrer ses biens. \r\nLa Rebatière passa à la famille Fornand par donation que fit Mme Pérouse à l'occasion du mariage  de Joseph-Pierre-Marie de Fornand qui épousa sa parente Magdeleine Pérouse du Vivier le 9 Mai 1755. \r\nEn 1788 la Rebatière fut achetée par monsieur Joseph de Moret du Rozoy,  puis passa ensuite après la Révolution à Marc Morand, puis a sa veuve et aujourd'hui appartient à la famille Lecouvey- Braille; logis de France.","architecture":"Cette maison forte  de la Rebatière fut construite au XVe siècle était à l'origine une ferme défendue par une ceinture de hautes murailles crénelées, flanquées au sud-ouest  de trois tourelles, celle du milieu comportant mâchicoulis et poterne.                                                                                                        A la Révolution la tour d'angle fut décapitée, elle fut reconstruite avec une nouvelle forme.","habitants":"Famille d'Antoine Régis \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Rebatiere_1.jpg","../image/image_38/38_Rebatiere_2.jpg"]},"Consult_chateau_formulaire3555":{"id":"Consult_chateau_formulaire3555","dept":"38","canton":"Domène","commune":"Revel","nom":"Revel","type":"Vestiges","periode":"XII","histoire":"La seigneurie de Revel connut dès le XIIe siècle,un de ses membres, Hugues de Revel était grand maître de l'ordre  de malte,  entre 1255 et 1277. \r\nLa seigneurie de Revel passa sous la suzeraineté direct du Dauphin en 1395 qui soustrait l'influence des comtes de Genève, possesseurs de nombreuses  terres en  Grésivaudan; Passa ensuite aux Alleman au XVe siècle et cette famille qui s'éteint au XVIIe siècle laissa le château à l'abandon, malgré la reprise de la seigneurie des de Boffin, baron d'Uriage et conseiller du roi, puis en 1707 Pierre-François  Francon, conseiller au parlement, un de ces fils Pierre seigneur de la Combe, St-Mury, Monteymont, st-Jean-le-Vieux, Villard-Bonnot, Revel, Lancey, le Versoud, coseigneurs de Vinsobres puis passa à Joachim de Francon, conseiller au parlement en 1688, son fils François de Francon de Revel conseiller au parlement en 1727 et le fils de ce dernier Joachim de Francon, écuyer, seigneur de Revel qui épousa en 1717 demoiselle Anne- Françoise Coppin de Commiers.\r\nLe château passa  la famille du marquis de Montauban qui émigre en 1789, les biens sont vendues comme bien national, le château servit de carrière de Pierres.","architecture":"Ce château qui fut construit au XIIe siècle, forteresse  qui contrôlée la majorité des localités de Grenoble, a commencé sa détérioration au XVIIe siècle à l'extinction de la famille Alleman, les murs de défense commencèrent à tomber et deux à trois pièces habitables en 1700 et presque détruit en 1789 servit de carrière de pierre malgré tout une partie restante qui est en cours de sauvegarde.","habitants":"Famille francon de Revel    \r\nFamille Alleman d'Uriage\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Revel_1.jpg","../image/image_38/38_Revel_2.jpg"]},"Consult_chateau_formulaire8a10":{"id":"Consult_chateau_formulaire8a10","dept":"38","canton":"Beaurepaire","commune":"Revel-Tourdan","nom":"Revel-Tourdan","type":"Vestiges","periode":"","histoire":"Revel-Tourdan; La tour de lanterne au site du Saut du Chevalier appartenait au XIIe siècle aux bénédictins et sur la motte castrale il y avait le château  du XIe siècle construit par les seigneurs locaux.                                  Dans la commune une maison forte du XVIe siècle, le château Barbarin (voir article)et un pigeonnier seigneurial.","architecture":"Perché sur la colline, Revel est un ancien bourg fortifié, des ruines du château du XIIe siècle révèle la structure du  lieu.","habitants":"\"","divers":"Vestiges  du château féodal, maison forte dans le village  et pigeonnier seigneurial.","gps":"","images":["../image/image_38/38_Revel_Tourdan_1.jpg","../image/image_38/38_Revel_Tourdan_2.jpg","../image/image_38/38_Revel_Tourdan_3.jpg","../image/image_38/38_Revel_Tourdan_4.jpg","../image/image_38/38_Revel_Tourdan_5.jpg"]},"Consult_chateau_formulaire1b98":{"id":"Consult_chateau_formulaire1b98","dept":"38","canton":"Rives","commune":"Rives","nom":"Rives_Chateaubourg (38)","type":"Château","periode":"XVI","histoire":"deux châteaux à Rives celui de Châteaubourg et celui d'Orgère.  Chateaubourg: Le fief  appartenait aux Bouqueron en 1216 qui en rendit hommage à Radolphe d'Entremonts en 1380, passa ensuite aux Coêt et à Jean Bouilloud de Châteaubourg et à  Antoine Besson, secrétaire  du Roy au parlement de Grenoble qui racheta les terres, sur lesquelles il fit construire le château en 1850.  Passa à plusieurs propriétaires, puis à Joseph et Pierre Marchand, familles de maîtres forges, ancêtres des propriétaires actuels.           Orgère dit des Russes  La famille Kleber a acheté le château pour ces familles venues de Russie  de 1924 à 1970 les Russes travaillant dans la petite ville et dans ses alentours, plus de 400 personnes logèrent dans le château.","architecture":"Châteaubourg du XVIe siècle, corps de logis en retour d'équerre, à conservé sa tour hexagonnal et son escalier à vis de l'époque                                  Orgère, aujourd'hui le château est abandonné et le parc accueille des annexes de la mairie de Rives. En 2013 une exposition photographique retraçant la vie des russes entre 1920 et 1974 a été organisée par André Moussine Pouchkine au château.","habitants":"Famille Besson\r\nFamille Marchand                                                                           Famille Kleber\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Rives_Chateaubourg_1.jpg","../image/image_38/38_Rives_Chateaubourg_2.jpg","../image/image_38/38_Rives_Chateaubourg_3.jpg","../image/image_38/38_Rives_Chateaubourg_4.jpg"]},"Consult_chateau_formulaireeb8a":{"id":"Consult_chateau_formulaireeb8a","dept":"38","canton":"Tullins","commune":"La Rivière","nom":"Riviere","type":"Manoir","periode":"XVIII","histoire":"La Rivière, Antoine Faure seigneur de la Rivière en 1660 sa fille unique épousa Nicolas Prunier seigneur de Saint André, ambassadeur à Venise et premier président au parlement.  \r\nCe manoir  du XVIIIe siècle, passa à la famille de N. de Fournet puis fut  la propriété de la famille de Ferrier de Montal qui l'habite encore aujourd'hui. Le comte Arthur de Ferrier du Montal transforma ce château en y rajoutant deux tours rondes. Monsieur du Montal était ardent défenseur du tourisme en Dauphiné, fut à l'origine du premier syndicat d'initiative de France. \r\nIl contribua aussi à l'exploitation de la noix de Grenoble et de son exportation aux Etats Unis.","architecture":"Ce château de la Rivière de forme quadrangulaire, flanqué de tours  rondes en façade, à trois niveaux a été construit au XVIIIe siècle  et remanié en 1845 dans l'aspect actuel.","habitants":"Famille Faure\r\nFamille Ferrier de Montal\r\n        \"","divers":"Château de la Rivière","gps":"","images":["../image/image_38/38_Riviere_1.jpg"]},"Consult_chateau_formulaire1012":{"id":"Consult_chateau_formulaire1012","dept":"38","canton":"Monestier-de-Clermont","commune":"St-Paul-les-Monestiers","nom":"Rivoiranche","type":"Maison forte","periode":"XIII","histoire":"Rivoiranche: Au féodal cette maison forte était habitée par la famille Meyssenas;  En 1267 occupait par les Gautier de Meyssenas puis par Guillaume de Meyssenas et un Guillon de Meyssenas en 1334.\r\nPlusieurs familles nobles se succédèrent jusqu'à la révolution, vendu comme bien national  les Guironnet de Massas l'acquit au XIXe siècle et en 1931 vendu à Mr Zayas riche mécène Espagnol qui le restaura.\r\nDéserté depuis 1965 les descendants de Mr Zayas le vendent à Madame Béatrice de Hautecloque dans le cadre d'une S.C.I. et effectue une activité d'hébergement qui aujourd'hui est géré par Madame Muriel Martin et Stéphane Brette.                                   Le château actuel a dut être construit au XVIe siècle sur l'emplacement d'une maison forte ( fenêtre à meneaux).      Il fut habité par la famille Galien puis vendu comme bien national à la révolution , au début du XIXe siècle devient la propriété d'Alexandre Guironnet de Massas. \r\nLa famille Guironnet de Massas originaire de Massas en Languedoc s'établit en Dauphiné au XVIIe siècle .Charles le père d'Alexandre se maria avec Marie Mounier soeur du constituant en 1796 Alexandre 1801-1879 avocat de profession, fut maire de Monestier de Clermont de 1858 à 1874 et conseillé général du canton. \r\nLa famille de Massas quitta notre région vers 1930 le château de Rivoiranche fut vendu à monsieur de Zayas toujours propriétaire.","architecture":"Ce château fut construit au XVIe siècle sur l'emplacement d'une maison forte","habitants":"Famille Meyssenas \r\nFamille Gallien \r\nMonsieur Zayas\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Rivoiranche_1.jpg","../image/image_38/38_Rivoiranche_2.jpg","../image/image_38/38_Rivoiranche_3.jpg"]},"Consult_chateau_formulaire03f1":{"id":"Consult_chateau_formulaire03f1","dept":"38","canton":"Roussillon","commune":"St-Romain-de-Surieu","nom":"Roche_Pingolet","type":"Manoir","periode":"XX","histoire":"Roche-Pingolet: En 1467 Antoine de Clavel était seigneur de Montfort et de la Roche Pingolet chevalier de l'ordre du roi, gouverneur d'Abbeville qui laissa en 1590 ses biens à Géoffroy de Sallemard son cousin.\r\nCe moulin manoir a joué un rôle important sous l'occupation de 1940 à 1945 est devenu un centre aéré, puis racheté par des particuliers pour exploitation agricole.","architecture":"Le manoir de Roche Pingolet à un corps de logis rectangulaire  flanqué d'un donjon carré et d'une tour ronde.","habitants":"Famille de Clavel\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Roche_Pingolet_1.jpg"]},"Consult_chateau_formulairebe2d":{"id":"Consult_chateau_formulairebe2d","dept":"38","canton":"Tour-du-Pin","commune":"St-Geoire-en-Valdaine","nom":"Rochette","type":"Château","periode":"XIX","histoire":"Rochette: Ce petit château  fut construit au XIXe siècle  sur l'emplacement d'une maison forte  par la famille Pascalis de la Rochette et depuis  1832 appartient à la famille Ferrier de Montal.","architecture":"Ce petit castel semble sortir d'un comte de fée, corps de logis rectangulaire à trois niveaux  flanquée de tourelles en angles.","habitants":"Famille de Ferrier de Montal\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Rochette_1.jpg","../image/image_38/38_Rochette_2.jpg"]},"Consult_chateau_formulaired94f":{"id":"Consult_chateau_formulaired94f","dept":"38","canton":"Crémieu","commune":"Vénérieu","nom":"Rochevieille","type":"Maison forte","periode":"XV","histoire":"Rochevieille: Cette maison forte du XVe siècle du mandement de Saint-Romain elle appartenait à la fin du XVe à Jean Vétule, au décès de ce dernier elle passa à la famille de Rochevieille qui s'éteignirent au XVIIe siècle avec la dernière héritière Françoise de Rochevieille épouse de Pierre de Gayant, tomba en décrépitude et servit de ferme. Après la Révolution le marquis de Loras en devient propriétaire passe ensuite à Antelme Jaboulet.","architecture":"Rochevieille maison forte avec corps de logis carré à trois niveaux flanqués d'une tour ronde au nord-est avec toit conique en dalle de Calcaire.","habitants":"Famille de Rochevieille\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Rochevieille_1.jpg"]},"Consult_chateau_formulaire57bb":{"id":"Consult_chateau_formulaire57bb","dept":"38","canton":"Tour-du-Pin","commune":"Rochetoirin","nom":"Romaneche","type":"Vestiges","periode":"XII","histoire":"Romanèche: De ce château qui était une importante forteresse au XIII-XIVe siècle, le lieu porte le nom d'une des plus anciennes familles connues du Dauphiné, le nom de Drogon de Romanèche apparaît en 1090 dans un cartulaire de l'Archevêché de Vienne, cette famille disparaît au XIIIe siècle en se fondant dans la famille de Gumin.  \r\nUne de leur descendante, Claude de Gumin , veuve de Guillaume de Vachon épousa en seconde noce, Françis de  Beaumont plus connu sous le nom sinistre de baron des Adrets. Il devait assiégé  la Tour du Pin en 1562, la ville étant défendu par son beau frère, Antoine de Gumin, ce qui n'empêcha pas  au  baron des Adrets d'hérité du château de Romanèche, puis par héritage direct, le château passa aux  Sassenage qui le revendirent à la famille de Musy vers1620 dont la descendante la querelleuse Gabrielle de Musy, dame de Romanèche  épousa son cousin Pierre de Vallin.  La propriété, reconnu \"bien national\" fut vendue en 1793","architecture":"Voir s'il reste la tour ?","habitants":"Famille de Drogon de Romanèche\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Romaneche_1.jpg"]},"Consult_chateau_formulaireb4d3-2":{"id":"Consult_chateau_formulaireb4d3-2","dept":"38","canton":"Roussillon","commune":"Péage-de-Roussillon","nom":"Roussillon (38)","type":"Château","periode":"XVI","histoire":"C'est avec Aymar de Roussillon (1316  1365) que se termina la branche aînée des Roussillon.  \r\nLe 12 Février 1465 Louis XI, fit comte de Roussillon, Louis, bâtard de Bourbon qui reçut pour épouse, Jeanne, fille naturelle de Louis XI et de Marguerite de Sassenage; Leur fille Suzanne de Bourbon comtesse du Roussillon épouse Jean de Chabannes, vendit sa part du comté à Blanche de Tournon soeur du cardinal qui cette dernière en fit don au Cardinal,  son frère François de Tournon qui lui en fit hommage au Dauphin  le 17 mai 1535, et il acquit la seconde part de Nicolas de Mézières, héritier du reste des biens de la famille de Roussillon. Le château fut construit de 1548 à 1552 sur un terrain acquit par le père du Cardinal François de Tournon à Claude Chorier dit Girbolet, une terre prés de l'étang de Reyneux (place actuel du Bourg). \r\nLe cardinal de Tournon fut successivement ministre de François Ier, de Henri II, de François II, et de Charles IX.  Ce château reçut la visite de Catherine de Médicis du 16 juillet au 15 Août 1564.  Et c'est dans ce lieu que fut signé l'Edit de Roussillon le 9 Août 1564 par le Roi Charles IX.   \r\nDans ce château fut installé en 1608 par Just de Tournon un couvent de minimes où s'installa par la suite une communauté religieuse. \r\nLe comte du parc vend le château en 1805 à monsieur Albert et fut ensuite revendu par sa petite fille à la commune en 1868.","architecture":"Ce château fut construit au XVIe siècle de style renaissance italienne. La tour qui domine le château actuel à l'ouest  serait un vestige du château fort sur lequel s'appuya la construction renaissance dans un style florentin. \r\nLa partie qui fut transformé en couvent appartient aujourd'hui à Rhône Poulenc, le château qui passa la révolution sans trop de problème servit à cette époque de grange à foin, puis atelier pour le traitement de verres à soie, puis la mairie, la poste, la gendarmerie, l'enregistrement, la perception, les écoles, la justice de paix, et même un café restaurant.\r\n Aujourd'hui remis en état pour les visites.","habitants":"Famille d'Aymard de Roussillon \r\nCardinal François de Tournon\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Roussillon_1.jpg","../image/image_38/38_Roussillon_2.jpg","../image/image_38/38_Roussillon_3.jpg","../image/image_38/38_Roussillon_4.jpg","../image/image_38/38_Roussillon_5.jpg","../image/image_38/38_Roussillon_6.jpg"]},"Consult_chateau_formulaire44e3":{"id":"Consult_chateau_formulaire44e3","dept":"38","canton":"Roybon","commune":"Roybon","nom":"Roybon","type":"Vestiges","periode":"","histoire":"Roybon: En 1335 le roi et son fils remettent à Hugues et Aymonde de Genève la terre de Roybon, puis passa aux Fermon de Cize.\r\nLa ville fut édifié par Humbert II au XIIIe siècle.\r\nLa terre de Roybon fut acquise par françois et Claude Berger le 20 Avril 1539, la seigneurie de Roybon passa à Jeanne de la Tour.\r\n En 1771 le gouverneur du Dauphiné Monsieur de Monteynard lieutenant général des armées du roi avait acheté la seigneurie de Roybon a Morel d'Arcy conseillé au parlement, qui lui les avait acheté a Antoine de Beaumont-Carra en 1746. \r\nLe château fut habité en 1882 par Monsieur de Saint-Romme.","architecture":"De ce château de Roybon il ne reste qu'une tour ronde accolée à un bâtiment récent ou aménagé moderne qui sert de centre médical.  Quelques vestiges de remparts dans le village un pavillon de l'ancien castel attenant au château.","habitants":"Famille de Saint-Romme\r\n        \"","divers":"Maison du Gouverneur\r\nVestige du Château(tour)","gps":"","images":["../image/image_38/38_Roybon_1.jpg","../image/image_38/38_Roybon_2.jpg"]},"Consult_chateau_formulairec626":{"id":"Consult_chateau_formulairec626","dept":"38","canton":"Clelles","commune":"Chichilianne","nom":"Ruthieres","type":"Maison forte","periode":"XV","histoire":"Ruthieres: Rendez vous de chasse du Dauphin Louis II, gouverneur du Dauphiné et futur Louis XI roi de France. Construit sur une maison forte en 1590  par les seigneurs de Darne, passa par alliance aux Durand de la Molinière et il fut acquis vers le milieu du XIXe siècle par Claudius Cunit  ingénieur où il est resté dans cette famille .","architecture":"De la maison forte de Ruthières corps de logis carré flanqué de deux tours une carrée l'autre ronde;","habitants":"Famille Darne\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Ruthieres_1.jpg","../image/image_38/38_Ruthieres_2.jpg"]},"Consult_chateau_formulairea4f6":{"id":"Consult_chateau_formulairea4f6","dept":"38","canton":"Crémieu","commune":"Balme-les-Grottes","nom":"Salette","type":"Château","periode":"XIX","histoire":"Salette: Ce château se trouve au couvent de Chartreusines, le monastère fut fondé en 1299 par Humbert Ier, recrutant les filles de grand seigneur. le couvent fut détruit à la Révolution, le château actuel situé à l'extrémité d'une majestueuse  allée de platanes, fut construit par un bourgeois au XIXe siècle.","architecture":"Du château de la Salette à un corps de logis rectangulaire flanquée de pavillon-portail aux extrémités.","habitants":"Humbert I\r\n     \"","divers":"","gps":"","images":["../image/image_38/38_Salette_1.jpg","../image/image_38/38_Salette_2.jpg"]},"Consult_chateau_formulaire495f":{"id":"Consult_chateau_formulaire495f","dept":"38","canton":"Bourgoin-Jallieu","commune":"Ruy-Montceau","nom":"Saliere","type":"Manoir","periode":"XV","histoire":"Saliere: Au XVIe siècle une partie de la maison forte servit de dépôt de sel, d'où le nom de \"Salarière\". \r\nSous Louis XIII, le manoir de la Salière fut la propriété de Claudine-François Mignot dite la belle Lhauda , elle termina sa \"carrière\" en épousant le roi de Pologne, Jean Casimir. \r\nEn face de la maison forte se construisit en 1764 le château proprement dit par la famille de Mercy. Cette dernière   à la Révolution  émigra en Allemagne, le château fut vendu à la famille Faucon et depuis Juillet 1985 il est le siège de la mairie.","architecture":"le manoir de Salière, bâtiment en équerre à trois étages. Aujourd'hui hôtel de ville.","habitants":"Claudine-François Mignot et la famille de Mercy\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Saliere_1.jpg","../image/image_38/38_Saliere_2.jpg"]},"Consult_chateau_formulaire9644":{"id":"Consult_chateau_formulaire9644","dept":"38","canton":"La Mure","commune":"Mayres-Savel","nom":"Savel","type":"Vestiges","periode":"X","histoire":"La forteresse de Savel au XIIIe siècle était la propriété de la famille  Lanthelme Aynard, ces derniers avait également le château de Marcieu au lieu dit des \"Bricon\" aujourd'hui disparu reste malgré tout des bases de murs. \r\nLes familles s'installèrent au manoir de Marcieu  propriété des de Marcieu ( Résidence d'été de la famille Degannay). Le château de Savel passa à  Guy de Saint-Savin . Les derniers descendants Antoine de Souchon de Loubière,  chevalier de Saint-Louis ancien capitaine de cavalerie et garde du corps de louis XVIII, descendant par sa mère et de Charles II de Combourcier, dernier seigneur de Beaumont, ancienne et puissante famille chevaleresque du Dauphiné (XVe siècle). Il épousa en seconde noce  Victoire de Chanterel .","architecture":"Le château de Savel était une puissante forteresse dont on aperçoit encore aujourd'hui quelques pans de murs, le  manoir de monsieur de Souchon à Mayres est devenu ferme agricole, elle possède de belles portes et fenêtres en tuf.","habitants":"Famille de Lanthelme Aynard  \r\nfamille Guy de Saint-Savin\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Savel_1.jpg","../image/image_38/38_Savel_2.jpg","../image/image_38/38_Savel_3.jpg","../image/image_38/38_Savel_4.jpg","../image/image_38/38_Savel_5.jpg"]},"Consult_chateau_formulaire837a":{"id":"Consult_chateau_formulaire837a","dept":"38","canton":"Vizille","commune":"Séchilienne","nom":"Sechilienne","type":"Vestiges","periode":"XV","histoire":"Séchilienne: Du château construit au XIIIe siècle, il ne reste qu'un donjon à mâchicoulis où est accolée deux tours rondes, il était à l'époque la propriété de la famille Alleman.","architecture":"Déjà mentionné au XIIIe  siècle , le donjon est du XVe siècle flanqué de deux tours rondes, fenêtres à bossages.","habitants":"Famille Alleman\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Sechilienne_1.jpg","../image/image_38/38_Sechilienne_2.jpg","../image/image_38/38_Sechilienne_3.jpg","../image/image_38/38_Sechilienne_4.jpg"]},"Consult_chateau_formulaire3744-2":{"id":"Consult_chateau_formulaire3744-2","dept":"38","canton":"Côte-St-André","commune":"Semons","nom":"Semons","type":"Manoir","periode":"XVI","histoire":"Semons, cette famille joua un grand rôle à Sardieu","architecture":"Manoir à tour hexagonal.","habitants":"Famille Cattin\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Semons_1.jpg"]},"Consult_chateau_formulairee6cc":{"id":"Consult_chateau_formulairee6cc","dept":"38","canton":"Vienne","commune":"Septème","nom":"Septeme","type":"Château","periode":"XV","histoire":"Septème: Ce château était déjà cité en 1066 par une famille  de l'Archevêque de Vienne, puis passa en 1230 à la famille Beauvoir et à la famille de Pierre de Savoie en 1249,  frère du comte Amédée. Et en 1349 le Dauphiné rentrant dans le domaine royal, passa aux  Maugiron et fut vendu en 1480 à Antoinette de Poisieu, son fils sans descendance transmet le domaine à la fille née de sa seconde union, Anne de Saint-Chamond laquelle l'apporte à son époux  Louis Aymar de Grignan, eux aussi sans descendance, Louis-Aymar laissent le château à son frère et beau frère Christophe de Saint-Chamond dont la fille épousera le ligueur Mitte de Chevrières. \r\nUn siècle après Abel  Servien surintendant des finances, en est propriétaire passa ensuite à Claude Pécoil, puis les Brissac  et par alliance  les Noailles. \r\nIl fut acquit de nouveau par Jean-Jacques de Viennois en 1779 et par alliance passa aux Albon, ensuite au Kergolay, toujours dans la descendance de la comtesse de Kergolay. \r\nDans ce château en 1564 Catherine de Médicis avec son fils Charles IX  passa la nuit du 16 juillet 1554.","architecture":"Cité au XIe siècle par une première construction, au XIIe siècle construction de sa longue enceinte du XIIIe siècle pour protéger le manoir  des comtes de Savoie, le donjon  de plan Barlong au XVe siècle et au XVIe siècle de nombreuses transformations furent apportés par Louis-Aymar de Grignan qui apporta le style renaissance.  \r\nCe château avait perdu  une partie de sa constitution défensive lors des guerres de religion qui fut occupé pendant cinq mois par le baron des Adrets. Sa construction actuelle de forme quadrangulaire de quatre corps de bâtiment flanqués en angles de tours et pavillons dont le plus important et le donjon .","habitants":"Louis-Aymar de Grignan                                                                    famille Kergolay\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Septeme_1.jpg","../image/image_38/38_Septeme_2.jpg","../image/image_38/38_Septeme_3.jpg","../image/image_38/38_Septeme_4.jpg","../image/image_38/38_Septeme_5.jpg","../image/image_38/38_Septeme_6.jpg"]},"Consult_chateau_formulaire61c3":{"id":"Consult_chateau_formulaire61c3","dept":"38","canton":"Crémieu","commune":"Trept","nom":"Serrieres_Crémieu","type":"Château","periode":"XIV","histoire":"Serrieres: Ce château construit au XIVe siècle eut  pendant 700 ans, dix neuf générations de la Poype  qui  furent seigneurs de la terre de Serrières,  qui le possédèrent encore au XIXe siècle, il fut sauvé à la révolution , grâce aux  idées républicaines du général de la Poype  général des armées Jean-François de la Poype, né à Lyon en 1758, entra trés jeune dans l'armée, épousa Jeanne Thérése Fréron et hérita du fief de Serrières terres et château,  mis à la retraite à la restauration il s'occupa de ses domaines de Lyon et du Dauphiné  en 1822  il est élu député du Rhône. \r\nIl n'eut qu'une fille qui se maria en 1810 à Jacques-Christian Paulze d'Yvoy sans enfant,  c'est en 1850 qu'il se sépara du château, le vendit à Jean-Marie Louis dont ses descendants gardèrent le château jusqu'en 1965, depuis cette date de nouveau propriétaire.","architecture":"Construit au XIV et XVe siècle, il fut remanié par la suite, de forme d'un quadrilatère flanqué de deux  tourelles  rondes d'escalier à vis, une galerie de passage, et de tour carrée, de l'ensemble  se détache un puissant donjon, un chemin de ronde à mâchicoulis cernant le tour.","habitants":"Famille de la Poype\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Serrieres_1.jpg","../image/image_38/38_Serrieres_2.jpg","../image/image_38/38_Serrieres_3.jpg","../image/image_38/38_Serrieres_4.jpg"]},"Consult_chateau_formulaire50cf":{"id":"Consult_chateau_formulaire50cf","dept":"38","canton":"Meylan","commune":"Biviers","nom":"Serviantin","type":"Château","periode":"XVI","histoire":"Serviantin: Construit en 1500, ce château appelé autrefois château de \"Biviers\" il a appartenut en premier aux Monard d'Arces qui passa par alliance à Catherine d'Arces avec Jean Servien père d'Abel, né en novembre 1593  ( 1593-1659 ) ministre de Louis XIII et de Louis XIV, négociateur du traité de Westphalie procureur général au parlement de Grenoble, ambassadeur en Italie, ministre d'état et surintendant des finances. Malgré cela fut endetté revendit le château a un capitaine des gardes Suisses,  Antoine de Reynold. Il y eu ensuite plusieurs acquéreurs dont Monsieur Gournier qui l'acquit avant la Révolution et un Rimal Gournier fut maire de Biviers le revendit  en 1855 à Alphonse Rallet  industriel, le château est toujours dans la descendance par Marthe Blanchet que sa petite fille épousa Paul Jordan et ensuite au Jacquemot.","architecture":"Ce château construit au XVe siècle en complément d'une maison forte  comprend deux corps de bâtiments à trois niveaux en équerre, flanqué de deux tours rondes, les fenêtres de façade ont perdues leurs meneaux, mais la porte renaissance est surmonté d'un écusson aux armes des Monard d'Arces. \r\nLa partie la plus ancienne de l'édifice  est une tour carrée datant du XIIe siècle.","habitants":"Famille d'Abel Servien\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Serviantin_1.jpg","../image/image_38/38_Serviantin_2.jpg"]},"Consult_chateau_formulairefd12":{"id":"Consult_chateau_formulairefd12","dept":"38","canton":"St-Marcellin","commune":"La Sône","nom":"Sone","type":"Château","periode":"XI","histoire":"La Sône: C'est au XIIe siècle que les moines bénédictins fondent la Sône, appelé au départ maison forte de \"la Reffreyrie\" en 1262 par les Riffrey de la Sône et en 1345 Ardenchon  Refredy seigneur de Saint-Quentin en rendit hommage au Dauphin. \r\nCe fief passera à Aynard  de Quincieu en 1446 et par alliance passera aux Béraud  de  Murat de L'Estang, puis en 1539 à Briand de Fay toujours par alliance avec Benoite de Roussillon belle-soeur de Aynard fils du précédent. \r\nLe fils de Jean de Fay, capitaine de 250 hommes de gardes, le château passera à sa fille unique héritière  Claudia de Fay qui se fait enlever à 16 ans par Jean de Saint-Priest ancien archevêques d'Aix, devenus chefs protestants, ce dernier meurt en 1578 et Clauda put se remarier avec Antoine de Bron comte de Liégue, conseiller d'Henri II. \r\nEn 1584 Clauda vend la Sône à Jean de Brunier seigneur de Larnage qui trois ans plus tard céda à Guillaume du Rivail  ( lieutenant de Lesdiguières), puis pour payer ses dettes son fils  Horace vend en 1602 à Phélicien de Boffin, avocat général au parlement de Grenoble, son fils Aymard fit ériger le fief en marquisat en 1733, puis son fils unique, Noêl-Phélicien dernier marquis de la Sône meurt célibataire à Paris en 1786, faisant héritier son cousin Pierre Georges Phélicien de Boffin colonel du Royal-Lorraine (régiment de cavalerie),  s'empressa de vendre à Paul César du Colombier conseiller au parlement de Grenoble, il fut le dernier seigneur. Vendu en 1852 par les héritiers de César du Colombier à Benoit Mauvernay, puis en 1875 au baron de Jarent, en 1890 au docteur Collignon ou Carignon, sa veuve en deuxième noces Mme Massier vend en 1931 à  un Anglais Thomas Huss, qui lui le vend à Charles Morel en 1952 qui l'avait déjà loué depuis 1938 et en 1978  il est la propriété de monsieur Jean-Louis Pons, Industriel d'Avignon.  (Françoise Sagan née de nom Françoise Quoirez habitat dans ce château en 1942, famille bourgoise, son père dirigé la compagnie électrique de Saint Marcelin).","architecture":"Ce château de la Sône qui au départ était une maison forte au XIe siècle a été remanié au cours des ans, il se compose de trois corps de bâtiments  avec deux tours carrées à toits de tuiles vernissées, l'une au nord-ouest, une seconde au nord-est, le donjon du XIVe siècle  couronné de mâchicoulis sur consoles, la seconde tour moins importante prolonge le mur d'enceinte qui borde le fossé. Le grand  corps de logis , de plan rectangulaire sur trois niveaux datent du XVIe siècle.","habitants":"Famille de la Refredy                                                                           Famille Pons\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Sone_1.jpg","../image/image_38/38_Sone_2.jpg","../image/image_38/38_Sone_3.jpg","../image/image_38/38_Sone_4.jpg","../image/image_38/38_Sone_5.jpg","../image/image_38/38_Sone_6.jpg"]},"Consult_chateau_formulaired450-2":{"id":"Consult_chateau_formulaired450-2","dept":"38","canton":"Pont-en-Royans","commune":"St-André-en-Royans","nom":"St-André-Prunier","type":"Château","periode":"XIII","histoire":"Prunier; Saint-André en Royans: appartenait jusqu'en 1250 aux Dauphins du Dauphiné, les comtes d'Albon  de Guigues dit \"le Vieux\" à Guigues VII que son fils échangea en 1251 St-André en Royans contre Beauvoir fief de Raymond Béranger Ier, son fils Raymond Béranger II, il eut deux fils Reynaud et Lambert, Reynaud eut un fils Aymard, ce dernier épousa Alix de Bressieu il eut Hugues Béranger dit \"Hugonet\" à son deuxième mariage avec Béatrix de Sassenage deux enfants Henri et Chabert de Sassenage. En 1342 Henri rendit l'hommage à Humbert II, marié à Huguette de la Tour-du-Pin en 1339 il eut Aymard II marié à Humilie Aynard de Gières en 1373 en quatrième enfant il eut  Antoine Béranger de Sassenage qui épousa Anne de Trians vicomtesse de Tallard, il eut un fils Jean Béranger de Sassenage seigneur de St-André  marié à Françoise de Montmajour deux filles , Françoise et Marie cette dernière épousa Jacques de Miolans leur fils François d'Algout racheta st-André en 1546  Françoise Beranger de Sassenage Dame de St-André vicomtesse de Tallard épouse Antoine II de Clermont ( Fondatrice de la branche des Clermont-Tonnerre) un fils Bernardin de Clermont, le fils de Bernardin Antoine III de Clermont chevalier, vicomte de Clermont de Tallard premier baron du Dauphiné, sieur de St-André et d'Ancy le Franc épousa Françoise de Poitiers soeur de Diane, vendit en 1546 St-André à François d'Agoult sieur de Sault devient seigneur de St-André. Le fief fut acheté par Artus Prunier conseiller du roi en 1561 avait épousé Jeanne de la Colombière en 1537 ils eurent six fils et six filles. Artus II Prunier seigneur, premier président au parlement de Grenoble épousa Honorade de Simiane, ils eurent quatorze enfants dont Laurent II Prunier seigneur de St-André et de Virieu, président au parlement épousa Marguerite de Bellièvre en 1674 eurent également quatorze enfants, dont Nicolas I Prunier marquis de Virieu premier président au parlement de Grenoble épousa Marie du Faure, transmet son titre à son frère Gabriel dit \"Nicolas\" Prunier de St-André Baron de Beauchéne marquis de Virieu, il épousa Christine-Thérése de Sassenage, il doit le cours St-André à Grenoble, ambasadeur à Venise.  A la Révolution, la fille d'Ismidon Prunier, la marquise de Marcieu recouvra ses biens et fut  obligée d'en  vendre les deux tiers ( ses fils ayant émigrés ) mais elle garda le château, la vente du château s'effectua en 1825 par les héritiers,  six exploitants locaux l'acquièrent, puis au fil du temps la commune l'acquit en partie pour établir une école, et au début du XXe siècle  fut acheté par monsieur Peigne qui le remit en état.","architecture":"Prunier; Ce château qui fut construit au XIIIe siècle subit des dégâts considérables lors des guerres de religion  de 1560, 1574 et 1575, il a  servit de casernement d'ou la construction de remparts, à la Révolution a été partagé par divers propriétaires qui ont apportés des modifications, puis en 1842 un incendie détruit une partie du donjon, transformé en séchoir à noix, et ce n'est qu'après le rachat de monsieur  Peigne qu'il fut remanié afin de le tenir en état. Corps de logis rectangulaire, trois niveaux, flanqué d'une échauguette et d'une tour ronde à toit arasé, le bâtiment supérieur \"donjon\" arasé flanqué au nord d'une tourelle également arasée.","habitants":"Les comtes d'Albon                                                                                                 Les Beranger de Sassenage                                                         Famille Prunier \r\nMonsieur Peigné\r\n        \"","divers":"Château des comtes d'Albon appelé maintenant Prunier à Saint-André en Royans.","gps":"","images":["../image/image_38/38_Prunier_1.jpg","../image/image_38/38_Prunier_2.jpg","../image/image_38/38_Prunier_3.jpg","../image/image_38/38_Prunier_4.jpg"]},"Consult_chateau_formulaireb125-3":{"id":"Consult_chateau_formulaireb125-3","dept":"38","canton":"Roussillon","commune":"St-Alban-du-Rhône","nom":"St_Alban","type":"Château","periode":"XIII","histoire":"Saint-Alban du-Rhône: Le premier seigneur connu est François de Nièvre qui en 1534 était propriétaire à Saint-ALban, il était le bisaïeul de Gaspard, Jean-Pierre-Marie de Fornand épouse, en 1755, Magdeleine de Pérouse du Vivier qui lui apporta en dot la terre de Rabatière  à  Salaise; Il était l'arrière petit fils d'Isabeau de Nièvre,  fille de Gaspard. \r\nLa famille de Pérouse de Saint-Alban et sur le territoire depuis le XIIIe siècle; Toujours dans la famille de la Pérouse.","architecture":"Ce château était certainement construit au XIII  XIVe siècle, il a était remanié au XIXe siècle dans une propriété très vaste  est entourée de murs d'une  longueur impressionnante.","habitants":"Famille Pérouse\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_St_Alban_1.jpg"]},"Consult_chateau_formulaire96cb":{"id":"Consult_chateau_formulaire96cb","dept":"38","canton":"St-Marcellin","commune":"St-Antoine-l`Abbaye","nom":"St_Antoine","type":"Abbaye","periode":"XII XV","histoire":"Saint-Antoine l'Abbaye: Les origines restent entourés de mystères et de légendes . \r\nAu milieu du XIe siècle un chevalier dauphinois Jocelyn, fils de Guillaume seigneur de  la Motte  ramena de Constantinople, grâce à l'appui  de l'Empereur de Byzance Diogéne le corps de Saint-Antoine, l'Anachorète de  Thébaïde célèbre pour avoir subi et vaincu les fameuses \"tentations\" du démon. \r\nDéposés dans l'église de la Motte de Saint-Didier, qui devient Saint-Antoine.  \r\nLa présence du corps du  Saint-Ermite attira les pèlerins  et  malades en pleine épidémie  de \"mal ardents\" à l'annonce de nombreuses guérisons miraculeuses. Cet afflux  nécessita la création d'une confrérie, les frères de l'aumône près du château de la Motte au Bois qui deviendront ordre Hospitalier de Saint-Antoine se construisit  un hôpital géré par le chevalier Gaston seigneur de la Valloire et par son fils Gérin, il se construisit également une église qui deviendra Abbaye. \r\nIl devait revenir à Aymon de Montagny dixième grand maître de l'ordre, de régler les rapports entre Montmajour et Saint-Antoine, suite aux difficultés des moines de Montmajour,  ceci a été réglé par l'évêque de Vienne en 1289,  qui unissait l'hôpital et le monastère.\r\nDe nombreux dégâts lors des guerres de religion en 1562  par le baron des Adrets, au XVIIe siècle Saint-Antoine connait une certaine prospérité, mais qui se réduit au XVIIIe siècle pour enrayer;  un traité est signé en 1775 unissant Saint-Antoine et l'ordre de Malte; Une fois en possession de Malte malgré l'afflux de gens importants ils s'en séparèrent d'une partie  et crée un chapitre noble institué Grand Prieuré et insigne l'église des chanoinesses hospitalières et absorbant la maison de Notre-Dame de Grâce à Tullins.  \r\nCréation confirmé en 1783 par lettre de Louis XVI.              \r\nA la Révolution, l'abbaye fut saisie et vendue comme bien national,  en 1793 Madame de Montcla devenue grande prieuse  fut arrêtée et conduite à Grenoble puis à Voiron.","architecture":"Elle se compose d'une église  XII-XVIIe siècle. Bien que ravagée par le baron des Adrets en 1562 et en 1567, elle fut relevée par l'intervention de Prosper Mérimée. \r\nEn 1768 l'Abbaye se libère des enceintes à gros murs, montre ses édifices à trois corps de style Louis XIII, longue cour ombragée, bâtiments conventionnels et communs, palais abbatial, église d'époque gothique qui n'est pas antérieur au XIIe siècle et fut achevée à la fin du XVe siècle.","habitants":"Seigneurs de la Valloire\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_St_Antoine_1.jpg","../image/image_38/38_St_Antoine_2.jpg","../image/image_38/38_St_Antoine_3.jpg","../image/image_38/38_St_Antoine_4.jpg"]},"Consult_chateau_formulaire7be8-2":{"id":"Consult_chateau_formulaire7be8-2","dept":"38","canton":"Bourgoin-Jallieu","commune":"St-Chef","nom":"St_Chef","type":"Vestiges","periode":"XII","histoire":"Saint-Chef: Cité en 1129 fief des Teyssier de Savy. Le village qui possédait au XIIe siècle une châtellenie ecclésiastique résidence des archevêques de Vienne devient au XVIIe siècle la propriété de Pierre de Martel qui l'avait dans la riche succession de Jacques de Joffrey écuyer de Bayard, dont les territoires s'étendaient au village de Salagnon, Vignieu, et Vasselin. \r\n Du château il ne reste que les vestiges de la Tour-au-Poulet, géré par l'archevêque de Vienne à travers les abbés et les seigneurs locaux  ( les Joffrey, les Loras, les Chivallet, les Lay etc ...).  \r\nDans le bourg un château du XVIe de la famille puissante les Larrivé, les Dornonet et  les Yvrard qui fournissaient des consuls et des administrateurs au bourg.","architecture":"Vestiges d'une tour  à Saint-Chef carrée ruinée au sommet et à la base et dans le bourg  tours de l'ancien château \"dite tour du Poulet\".","habitants":"Famille de Larrivé\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_St_Chef_1.jpg"]},"Consult_chateau_formulaire7e46":{"id":"Consult_chateau_formulaire7e46","dept":"38","canton":"Roussillon","commune":"St-Clair-du-Rhône","nom":"St_Clair_du_Rhone","type":"Vestiges","periode":"XI","histoire":"Saint-Clair du Rhône: Site antique et préhistorique, beaucoup d'objets ont été trouvés  qui permet d'affirmer la présence humaine dans cette région depuis des millénaires avant J C. Au féodal: un château fort se trouvait sur la colline de la Madone, ce dernier fut détruit en 1330. \r\nReconstruit et fut de nouveau ruiné sous Henri III, il ne reste aujourd'hui q'un pan de mur.   \r\n En 1634 Louis son petit fils achète une ferme au Gabion , c'est le début des Grubis à Saint-Clair, l'un des membres Pierre de Grubis  bachelier sera conseiller du roi en 1690 seigneur de Saint-Clair  Barthelèmy Laurent autorise Pierre Grubis à construire un pigeonnier. \r\nLe château de Clarason ou Chanson prés de Chavanay proprriété de Mr Grubis remonte au temps d'Henri II originaire de Savoie.","architecture":"Du château féodal il ne reste qu'un pan de mur.","habitants":"Famille de Grubis\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_St_Clair_du_Rhone_1.jpg"]},"Consult_chateau_formulaire4680":{"id":"Consult_chateau_formulaire4680","dept":"38","canton":"Meylan","commune":"Sapey-en-Chatreuse","nom":"St_Eynard","type":"Fort","periode":"XIX","histoire":"Ce fort de St-Eynard dominant Grenoble à 1000 mètres au dessus, n'a jamais servi pendant les guerres trop loin de la ville, a surtout servi de relais de transmission et de poste d'observation, l'aviation à modifié tout les stratèges, il a été acheté  en 1963 par la ville de Corenc et par  le Sappey en 1991.\r\n Une société du  nom de l'entretien immobilier en devient le nouveau propriétaire qui l'exploite à ce jour comme restaurant ouvert de mai à septembre.","architecture":"Ce  fort a  été  construit  en  cinq ans de 1874  à  1879  le  coût  de    1 173 000 franc de l'époque  d'une surface de 2375 m².   \r\nPouvant abriter 240 à 477 Hommes, construction en calcaire à l'altitude de 1310 M.  La citadelle de la Bastille ne servant plus à rien mauvais emplacement géographique et trop petite capacité de tir au canon , il fallut construire une deuxième citadelle plus importante avec des canons pouvant tirer plus loin afin d'empêcher l'ennemi de passer par la Chartreuse ( voir l'Italie) car la Savoie fut annexée en 1860 donc plus de crainte de ce côté-là..                      Gros problème de communication  avec le fort d'où la création en 1887 d'un téléphone optique permettant de communiquer avec Grenoble et le Moucherotte.","habitants":"Ville de Corenc\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_St_Eynard_1.jpg"]},"Consult_chateau_formulaireb1bd":{"id":"Consult_chateau_formulaireb1bd","dept":"38","canton":"Tour-du-Pin","commune":"St-Geoire-en-Valdaine","nom":"St_Geoire","type":"Manoir","periode":"XVI","histoire":"St-Geoire: Ce manoir a appartenu à la famille Gumin de Hautefort  qui le vendirent aux Isabeau de Pouchon, abbesse de Saint-André de Saint-Geoire en 1663, en 1762 le manoir fut vendu à monsieur Gely de Montcla,  maître de la chambre des comptes, et la commune l'acheta en 1886,  le  transforma en hôtel de Ville et en appartement pour le personnel de l'éducation.","architecture":"Bâtiment en équerre à trois niveaux flanqué de deux tours  rondes.","habitants":"Famille Gumin\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_St_Geoire_1.jpg","../image/image_38/38_St_Geoire_2.jpg"]},"Consult_chateau_formulaireb93f":{"id":"Consult_chateau_formulaireb93f","dept":"38","canton":"Verpillière","commune":"Isle-d`Abeau","nom":"St_Georges","type":"Commanderie","periode":"X","histoire":"St-Georges: Au Xe siècle la commanderie appartenait au seigneur Garin de Vaulx qui en fit don à l'ordre du Temple.     Philippe le Bel intenta un procès à Jacques de Molay  pour s'emparer des biens et des richesses qu'ils avaient récupérés lors des croisades, la commanderie fut récupérée par l'Ordre Hospitalier de Saint-Georges qui l'occupèrent jusqu'à la Révolution, puis fut vendue comme bien national en 1791.  Aujourd'hui elle sert de cadre à un centre équestre.","architecture":"Les bâtiments en retour d'équerre comportent un corps de logis avec tour carrée, la partie de droite  a été reconstruite en 1858  à l'emplacement de la seconde tour carrée qui abritait la salle des archers.","habitants":"Famille de Garin de Vaulx\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_St_Georges_1.jpg"]},"Consult_chateau_formulaired922":{"id":"Consult_chateau_formulaired922","dept":"38","canton":"Heyrieux","commune":"St-Georges-d`Espéranche","nom":"St_Georges_d_Esperanche","type":"Vestiges","periode":"XII","histoire":"Saint-Georges d'Espéranche. Le premier seigneur connu, Ervis de Beauvoir, puis Guillaume de Beauvoir  seigneur de Septème ruiné par les croisades, vendit ses biens à Pierre de Savoie, cadet de la maison de Savoie, c'est Philippe frère de Pierre qui fit construire le château de Saint-Georges qui devient leur demeure favorite, et en 1271 crée la châtellenie, puis devient un domaine de la couronne delphinale, le château fut mis dans un mauvais état pendant les guerres de religion, fut  cédé à Aymard de Poisieu qui le restaura.\r\n A la Révolution fut vendu à Antoine Volland qui se mit à le détruire, il n'en reste que de solides vestiges.","architecture":"St-Georges d'Espéranche; La forteresse médiévale possédait des fortifications construite en 1303 avec quatre portes, la porte Revoireau où Malatrait, la porte de Septéme, la porte du Mezet et la porte de Bourgoin.     En 1349 après le passage du Dauphiné à la France, cette forteresse devient un retranchement militaire ou l'ensemble se dégrada et il ne reste aujourd'hui qu'une tour carrée.","habitants":"Famille de Pierre de Savoie\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_St_Georges_d_Esperanche_1.jpg"]},"Consult_chateau_formulairee218-2":{"id":"Consult_chateau_formulairee218-2","dept":"38","canton":"Vif","commune":"St-Georges-de-Commiers","nom":"St_Georges_de_Commiers","type":"Vestiges","periode":"XIII","histoire":"Appartenait au Moyen Age aux seigneurs de Commiers.","architecture":"Ce château  de saint-Georges de Commiers à fonction défensive il ne reste qu'un corps de logis quadrangulaire flanqué d'une haute tour, fenêtres à  meneaux.","habitants":"Famille Alleman\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_St_Georges_de_Commiers_1.jpg"]},"Consult_chateau_formulairebde1":{"id":"Consult_chateau_formulairebde1","dept":"38","canton":"Tour-du-Pin","commune":"Trorchefelon","nom":"St_Georges_du_Mont","type":"Maison forte","periode":"XV","histoire":"St-Georges du-Mont: Au XVIIIe siècle appartenait à la famille de Querrenet, dont un des membres prit part active à la guerre de l'indépendance  en Amérique sous les ordres du Général marquis de la Fayette, puis il fut la propriété de 1790 au début du XXe siècle à la famille Picot la Baume qui possédait la moitié du village.","architecture":"Construite au centre du village sur les fondations d'un ancien château-fort, flanqué de deux tours carrées dont une a  les traces de la chapelle, la porte d'entrée surmontée des armes de la famille Doissin et de Dortan.","habitants":"Famille Querrenet\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_St_Georges_du_Mont_1.jpg"]},"Consult_chateau_formulaire0f20":{"id":"Consult_chateau_formulaire0f20","dept":"38","canton":"Tullins","commune":"Tullins","nom":"St_Jean_de_Chépy","type":"Manoir","periode":"XIII","histoire":"St-Jean de Chépy: Ce manoir était au XIIIe siècle un rendez-vous de chasse des seigneurs de Tullins, dans la famille de Bressieu de Cor
