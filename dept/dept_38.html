ent encore sur une gravure de 1810.","habitants":"famille de Jean-Jacques Gabet\r\n        \"","divers":"Manoir d'aiguebelle, le château de Craz, le château Guerre ou Flurieu et le manoir de la Gabetière.","gps":"","images":["../image/image_38/38_Aiguebelle_1.jpg","../image/image_38/38_Aiguebelle_2.jpg","../image/image_38/38_Aiguebelle_3.jpg","../image/image_38/38_Aiguebelle_4.jpg","../image/image_38/38_Aiguebelle_5.jpg"]},"Consult_chateau_formulaire9034":{"id":"Consult_chateau_formulaire9034","dept":"38","canton":"Tullins","commune":"Albenc","nom":"Albenc","type":"Vestiges","periode":"XII   XVII","histoire":"Albenc: Les vestiges qui se trouvaient sur les lieux et qui ont été détruit en partie en 1578 et en 1976 sont  les vestiges des seigneurs de l'Albenc. Jocelyn de Châteauneuf, ce dernier ramena de Constantinople,  les reliques de St Antoine.\r\n Vers 1413, François de Chateauneuf  légua ses biens à sa sur et par alliance les biens passèrent aux Alleman; Joffrey Alleman seigneur et baron d'Uriage et de Châteauneuf de l'Albenc, son fils Jacques de châtelet seigneur de Sorcy et de Châteauneuf gardera cette seigneurie jusqu'en 1599 et la vendit à Laurence de Monteynard, veuve de Gaspard de Baronnat.    \r\nJean de la vache, président de la chambre des comptes du Dauphiné acquit la Baronnie de l'Albenc en 1639 qui a dut être le constructeur de la maison forte, les biens ont été acquis par Jean Baptiste de Chaléon en 1740 et resta dans cette famille jusqu'en 1789","architecture":"Maison forte classique  du XVIe siècle, corps de logis rectangulaire à deux niveaux flanqué de tours rondes en angles, l'ensemble a été remanié au cours des ans.","habitants":"Famille de Châteauneuf\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Albenc_1.jpg","../image/image_38/38_Albenc_2.jpg","../image/image_38/38_Albenc_3.jpg","../image/image_38/38_Albenc_4.jpg"]},"Consult_chateau_formulaire176c":{"id":"Consult_chateau_formulaire176c","dept":"38","canton":"Rives","commune":"Renage","nom":"Allivet","type":"Château","periode":"XIX","histoire":"Allivet: A partir du Xe siècle en raison des incursions des Sarrazins  de nombreuses forteresses vont surgir . Cest ainsi que fut construit le château de Rives appelé « Castrum Ripis ». \r\nAu XIII e siècle, cest le seigneur de Moirans qui devient propriétaire de la seigneurie de Rives. Le fief de Rives appartient à Geoffroy de Moirans, le dernier de ses trois enfants, Guillaume de Moirans cède le fief de Rives à  la famille  Guigues de Tullins qui lui même le cède au Dauphin Humbert Ier, vers 1278  Guigues Seigneur de Tullins rachète le fief de Rives et en 1338,  le tout  revient à  Humbert II Dauphin du Viennois.\r\nHumilie, fille dAymar de Tullins cède en 1342 à Humbert seigneur de Beaucroisant, crée 29 ans plus tôt, cette seigneurie formait le mandement avec Renage et Alivet Antoine Blanc seigneur d'Alivet en 1520, en 1550 Aymar Blanc enfin en 1343, la famille Blanc puis  le fief jusqu'à la révolution  a été gérée par 44  Châtelains. Puis fut habité en 1812 par Alexandre Mortillet, membre du conseil de Saint-Marcellin et président du collège électoral de Tullins, et élu député le 25 février 1824.\r\nle château d'Alivet fut construit au XIXe siècle, il fut acquis en 1878 par un industriel papetier de Rives, Augustin Blanchet.","architecture":"Château de fière allure, construit au XIXe siècle haut de trois niveaux, flanqué de tourelles rondes en angles, de plus dans un beau parc paysager.","habitants":"famille d'Augustin Blanchet\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Allivet_1.jpg","../image/image_38/38_Allivet_2.jpg"]},"Consult_chateau_formulairee18c":{"id":"Consult_chateau_formulairee18c","dept":"38","canton":"Crémieu","commune":"La Balme-les-Grottes","nom":"Amblerieu","type":"Château","periode":"XV  XVII","histoire":"Amblérieu: Le château Delphinal d'Amblérieu fut construit au XIIIe siècle, suite à une transaction  entre Philippe élu de Lyon et Albert de la Tour et ses fils qui le reçoive en fief. Après le passage du Dauphiné à la France le château reste la propriété de Humbert II dauphin jusqu'à sa mort, il a appartenu à différentes familles; en 1423 Charles VII le donne à Humbert de Grolée, puis il passe  à Malortie  en 1454 et en 1531 il appartient à Claude de Montepeys, puis les  Putrain qui y rajouta une aile au XVIe siècle ,il fut en partie détruit en 1775 racheté et restauré par Mr de Boulieu qui y fit bâtir deux pavillons.   La maison forte primitive aurait été détruite au cours des premières guerres de Savoie à la fin du XVIe siècle, un château plus aimable fut reconstruit vers le milieu du XVIIe siècle, sans doute par Pierre des Portes d'Amblérieu, célèbre par son mariage avec Claudine Mignot, jeune et belle lingère de Grenoble, celle-ci devenue veuve se remaria avec le maréchal de l'Hospital, seigneur de Rosnay, qui la fit introduire à Versailles se maria ensuite avec Jean Casimir Wasa, ex-roi de Pologne et fut veuve pour la troisième fois.                                                          Château de la Salette.  Fondation du XIIIe siècle d'une chartreuse de femmes dont trois bâtiments subsistent. A la Révolution la chartreuse est vendue et abrite un certain temps une fabrique de faïence.                                                                                         Dans la commune de la Grotte les Balmes; le château de Serve et une maison forte dite d'Amblérieu.","architecture":"Ce château d'Amblérieu, aujourd'hui il ne reste que des ruines était constitué d'une tour  et accolée de deux corps de logis à deux niveaux.                                                                                       La maison forte a conservé de l'origine la tour carrée, et  possède un corps de logis rectangulaire à deux étages, avancée en saillie sur la façade et vestiges de tour sur la partie gauche.   Chartreuse de la Salette ( château reconstruit de 1870 à 1880).","habitants":"Famille de Claudine Mignot\r\n        \"","divers":"Manoir ou maison forte d'Amblérieu, manoir de Serve,  château de la salette.","gps":"","images":["../image/image_38/38_Amblerieu_1.jpg","../image/image_38/38_Amblerieu_2.jpg","../image/image_38/38_Amblerieu_3.jpg","../image/image_38/38_Amblerieu_4.jpg","../image/image_38/38_Amblerieu_5.jpg"]},"Consult_chateau_formulaire95bf":{"id":"Consult_chateau_formulaire95bf","dept":"38","canton":"Pont-en-Royans","commune":"St-Just-de-Claix","nom":"Anges","type":"Manoir","periode":"XIV","histoire":"Anges; En 1349 Humbert II acheta à Ogier Riverie, Damoisseau, la maison forte de Saint-Just de Claix, pour y  fonder un couvent de religieuses Cisterciennes pour sa mère Béatrix de Hongrie pour abriter trente religieuses et sept religieux dont un vicaire. La Dauphine Béatrix mourut  à  Saint-Just en 1354.","architecture":"Ancienne abbaye royale cistersienne du XIVe siècle , aujourdhui transformée en hôtel","habitants":"Famille de Beatrix de Savoie\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Anges_1.jpg"]},"Consult_chateau_formulaireceeb":{"id":"Consult_chateau_formulaireceeb","dept":"38","canton":"Roussillon","commune":"Ville-d`Anjou","nom":"Anjou","type":"Vestiges","periode":"XIII","histoire":"Anjou: En 1236, intervient le partage des biens des Roussillons entre les deux frères , Artaud IV et Gérard, fils de Artaud III. Artaud garde tous les droits sur le château de Roussillon et son mandement, Gérard prend les  droits sur Anjou et ses dépendances.  Ainsi les de Roussillon se séparent en deux branches , cette famille s'éteindra en 1365 avec le Grand Aymar, et  celle des seigneurs d'Anjou, dont la tige est Gérard,  on ne sait trop à la date que se termina cette seigneurie. Louis de Chalon, prince d'Orange allié des Bourguignons au plus fort de la guerre de cents ans, envahit le Dauphiné en 1426 forcèrent le château d'Anjou, le pillèrent, violèrent les femmes, Marguerite, petite fille de Geoffrey de Bressieu et de Jordanne de Roussillon subit le même sort. En 1429, le château passa aux neveux  de Jordanne de Roussillon Jacques et Louis de Miolans.   En 1679 Louis XIV nomma comte d'Anjou Alexandre de Falcoz, seigneur de la Blache.                              Aujourd'hui propriété de Monsieur  Achille Duchéne paysagiste.","architecture":"A la révolution les biens furent dispersés et du château il ne reste qu 'un élément imposant de la forteresse avec une tour ronde d'angle.","habitants":"Famille d'Artaud\r\nFamille de Jordanne de Rousssillon                                    \r\nFamille d'Alexandre de Falcoz\r\n        \"","divers":"Vestiges d'Anjou et manoir","gps":"","images":["../image/image_38/38_Anjou_1.jpg","../image/image_38/38_Anjou_2.jpg","../image/image_38/38_Anjou_3.jpg"]},"Consult_chateau_formulaire96ba":{"id":"Consult_chateau_formulaire96ba","dept":"38","canton":"Pont-de-Cherruy","commune":"Pont-de-Cherruy","nom":"Anthon_Combles","type":"Vestiges","periode":"XVIII","histoire":"Anthon-Combles:Le premier seigneur fut Guichard Ier, un des successeurs de Guichard IV de 1240 à 1256 fit élever une laproxie en 1447, Louis XI donna les terres à Imbert de Batenay jusqu'en 1502 et Louis XI vint à Crémieu en 1512 il fit restaurer les fortifications d'Anthon.    Perturbé par les troupes de François Ier et par les troupes du Baron des Adrets, le village fut sauvé,  mais les habitants furent décimés par la peste en 1645 .    Le dernier seigneur d'Anthon fut Jean Charles de Combles, conseiller du roi à la cour de Lyon qui fit bâtir un château au goût du jour et avait auparavant acquis les terres, les biens et négoce de madame veuve Vidaud. La Baronnie d'Anthon fut acquise par le Menestrier et avant la Révolution par   Jean Charles de Combles  qui était en 1788 aux Etats Généraux de Vienne, émigra en  Suisse et  le château des Combles fut détruit par un incendie, puis fut restauré par la famille Brossier de la Rouilliére qui le conserva jusqu'en 1916.  Monsieur de Combles qui avait émmigré, décéda à Lyon le 26 ventôse an XI de la république.  Le château est habité actuellement par Monsieur Albert Wildig et sa soeur Madame Claude Giroud.  \r\nQuand au Château installé à l'emplacement de la forteresse des seigneurs d'Anthon et que l'on dénomme le\" Donjon\", il a appartenu à la famille de Leusse  en 1885, il a été occupé par Madame Cherel et appartient actuellement à la famille Mouraret et ce depuis 1957.","architecture":"Du château installé sur la forteresse des seigneurs  d'Anthon que l'on dénomme le Donjon, est une propriété privée,  il reste quelques pans de murs de l'enceinte du château fort.","habitants":"Famille du Baron d'Anthon \r\nFamille de Jean-Charles de Combles\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Anthon_Combles_1.jpg"]},"Consult_chateau_formulaire3208":{"id":"Consult_chateau_formulaire3208","dept":"38","canton":"Crémieu","commune":"Anthouillet","nom":"Anthouillet","type":"Maison forte","periode":"XIV","histoire":"Anthouillet: Au XIV à la famille de Monsieur Mechin, en 1311, le Dauphin Jean II, faisant usage de ses droits de mainmorte l'alliéna à Jacquemin Richerme, puis passa dans beaucoup de famille pour terminer en 1345 au Dauphin Humbert II, celle-ci entra en héritage dans la famille de Beaumont et fut vendue à  noble  Pierre de la Poype, un de ses fils, Claude de la Poype seigneur de Serrières et de Sablonnières entreprit sa restauration et restera dans cette famille jusqu'à la révolution. Puis vendu à monsieur Jacques Poulet de Jameyssieu.","architecture":"Malgré le partage de cette maison forte, les amènagements ont permi aux propriétaires actuels  d'habiter   la partie ouest, mais l'ensemble à permit de garder l'aspect moyennageux","habitants":"Famille  Mechin \r\nFamille Poulet \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Anthouillet_1.jpg","../image/image_38/38_Anthouillet_2.jpg"]},"Consult_chateau_formulaire7202":{"id":"Consult_chateau_formulaire7202","dept":"38","canton":"Meylan","commune":"St-Ismier","nom":"Arce","type":"Vestiges","periode":"XIII","histoire":"Arce; l'existance de la famille d'Arce qui posséda de nombreuses terres entre Saint-Ismier et Grenoble est attestée en 1160.  Elle posséda un important domaine dans la commune où se trouve les vestiges actuels.La première maison de ce nom s'est éteinte avec Guiffrède d'Arces, mariée en 1216 à Hugues de Morard Chevalier originaire de Theys, mort en 1266, qui en releva le nom et les armes et dont les descendants s'illustrèrent dans les ordres chevaleresques de la Provence. Antoine dit le \"chevalier Blanc\" vice Roi d'Ecosse et un des derniers errants  serait né vers 1475 dans le château . La vieille tour carrée en grande partie détruite remonte au XIIIe siècle. Au milieu du XVIIe siècle le domaine fut cédé à Paul Aymon,  membre du Parlement de Grenoble. Le dernier propriétaire fut François Berlioz  négociant à Grenoble (.1794).  En 1805, le général Marchand racheta le domaine de Pierre Lagrange, conseiller au parlement de Grenoble . Son neveu s'y installa , le maréchal Randon ( 1795-1871)  ministre de la guerre sous Napoléon III et Gouverneur d'Algérie.","architecture":"Des  ruines du XIIIe siècle subsistent encore sur la commune de saint-Ismier.","habitants":"Famille d'Arces\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Arce_1.jpg"]},"Consult_chateau_formulairedc41":{"id":"Consult_chateau_formulairedc41","dept":"38","canton":"Vienne","commune":"Seyssuel","nom":"Archevêques_Seyssuel","type":"Vestiges","periode":"XI","histoire":"Archevêques-Seyssuel: Guy de Bourgogne, archevêque de Vienne avait acquis en 1023 le château de Seyssuel avant de devenir pape Calixte II. les seigneurs de Seyssuel dont le château était inféodé par moitié et \" rendable\" tenaient leur terre en fief sous l'autorité de l'Archevêque,  et devaient la rendre à toute réquisition de ce dernier. En 1401   le château appartenait à l'Archevêque Thibault de Rougemont, il fut en partie détruit par des gentilhommes campagnards de la famille les  frères de Torcheflon, seigneurs de Montcarra. De tout temps les conflits furent nombreux entre les dauphins et les archevêques; ils prendront fin avec le Dauphin Louis II, futur Louis XI qui assurera le gouvernement du Dauphiné en 1447.  L'archevêque de Vienne, Jean de Poitiers reconnaîtra alors le Dauphin comme son suzerain et lui rendra hommage de ses biens . IL gardera ainsi son château de Seyssuel. Reconstruit puis à nouveau saccagé par les huguenots lors des guerres de religion, le château restera dans l'état tel qu'il est aujourd'hui  mais les archevêques le garderont  jusqu'à la Révolution.","architecture":"Des vestiges du château il ne reste qu'un pan imposant côté ouest avec tour.","habitants":"Archevêques de Vienne\r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Archeveques_Seyssuel_1.jpg","../image/image_38/38_Archeveques_Seyssuel_2.jpg"]},"Consult_chateau_formulaire4ec1":{"id":"Consult_chateau_formulaire4ec1","dept":"38","canton":"Côte-St-André","commune":"Balbins","nom":"Armanais","type":"Château","periode":"XIX","histoire":"Armanais: Louis  Xavier de Monts de Savasse fit reconstruire le château à l'occasion de son alliance avec une Monteynard en 1885. Toujours dans la famille depuis 1692","architecture":"Corps de logis rectangulaire flanqué en angle de tourelles en encorbellement.","habitants":"Famille des Monts de Savasse\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Armanais_1.jpg","../image/image_38/38_Armanais_2.jpg","../image/image_38/38_Armanais_3.jpg"]},"Consult_chateau_formulaire2d51":{"id":"Consult_chateau_formulaire2d51","dept":"38","canton":"St-Marcellin","commune":"St-Bonnet-de-Chavagne","nom":"Arthaudiere","type":"Vestiges","periode":"XV  XVII","histoire":"Arthaudiere: Ce château doit son nom à ses premiers propriétaires. les Arthod. connus depuis le XIIIe siècle, l'un deux, Jacques, fit hommage au Dauphin en 1345 pour la maison forte de l'Arthaudière, son arrière petit fils, Guillaume Arthod, ne laissa de Guigonne, qui, épousa en 1483 André de La Porte qui devient seigneur de L'Arthaudière, son petit fils, autre André de La Porte de L'Arthaudière, fut un des principaux chefs catholiques  durant les guerres de religion. Pendant plus de vingt ans il va se battre sous les ordres  de Laurent de Maugiron , du maréchal de Tavanes et du Baron de Gordes.  Son descendant à la cinquième génération, Joseph Nicolas de La Porte de L'Arthaudière, grâce à sa fortune sa terre sera transformé en marquisat,  Marquis de Saint-Lattier 1752- 1838, Chevalier de Saint Louis, colonel du Soissonnais infanterie, rayé des cadres en 1782 se trouve à l'Arthaudière en Juin 1793 lorsqu'il est arrêté, détenu à Grenoble jusqu'en septembre 1794.  A la mort de sa femme en 1848, c'est le neveu de celle-ci Albéric de Marcieu, qui héritera d'une trés importante terre   que son fils Guy vendra vers 1870 a un Monsieur Cotte de Lyon.   En 1938, les Héritiers de Mr Cotte vendront,il est  acquis par un commerçant de Saint-Marcelin, sera revendu ensuite après la guerre 39-40 aux Oeuvres  de Marseille. L'Arthaudière nom donné à une rose \"Rubis de L'Arthaudière\" créée par Monsieur Alain Voinchet de Clérieux 26; valorisé par les amis de sauvegarde de l'Arthaudière","architecture":"Il fut détruit en 1585 par Lesdiguières, il fut reconstruit sous le règne de Louis XIV, il a eu des aménagements au XVIIIe siècle, malheureusement en 1953 une grande partie fut détruite par un incendie, seul restera la partie la plus ancienne. Actuellement le bâtiment, se présente sous la forme de trois ailes formant une cour intérieure, sur la gauche une belle galerie voûtée sur croisées d'ogives.","habitants":"Famille des Arthaud,\r\nFamille des La Porte\r\n        \"","divers":"Vestiges du Château de l'Arthaudière","gps":"","images":["../image/image_38/38_Arthaudiere_1.jpg","../image/image_38/38_Arthaudiere_2.jpg","../image/image_38/38_Arthaudiere_3.jpg","../image/image_38/38_Arthaudiere_4.jpg","../image/image_38/38_Arthaudiere_5.jpg","../image/image_38/38_Arthaudiere_6.jpg","../image/image_38/38_Arthaudiere_7.jpg"]},"Consult_chateau_formulairea900":{"id":"Consult_chateau_formulairea900","dept":"38","canton":"Pont-de-Cherruy","commune":"Vilette-d`Anthon","nom":"Asnieres","type":"Vestiges","periode":"XVI","histoire":"Asnieres: La villette d'Anthon. Le château de la Serra a Villette d'Anthon construit au XVIIIe siècle de Gaspard  François Berger, chevalier, seigneur de Moydieu, fut surveillé et contraint de ne pas quitter le château lors des émeutes de 1789.    Aujourd'hui ce château abrite une maison de retraite.","architecture":"Vilette d'Anthon château de la Serra du XVIIIe siècle corps de Logis rectangulaire partie centrale saillante flanqué d'échauguettes en façade d' angles et tour ronde  d'escaliers sur flanc gauche  deux étages avec attiques.                                                                   Du château d'Asnières il ne reste qu'un corps de logis rectangulaire avec des fenêtres à moitié bétonnées.","habitants":"Famille de Moydieu\r\n        \"","divers":"Château de la Serra à Vilette d'Anthon et château d'Asnières","gps":"","images":["../image/image_38/38_Asnieres_1.jpg","../image/image_38/38_Asnieres_2.jpg","../image/image_38/38_Asnieres_3.jpg","../image/image_38/38_Asnieres_4.jpg"]},"Consult_chateau_formulaire1bc2":{"id":"Consult_chateau_formulaire1bc2","dept":"38","canton":"Goncelin","commune":"St-Maximin","nom":"Avalon","type":"Vestiges","periode":"XIII","histoire":"Avalon: Au XIe siècle c'était une importante communauté des seigneurs  du mandement d'Avalon qui occupaient la maison forte située un peu plus au nord de la tour actuelle, avait un fils Hugues, né en 1140.  Entré très jeune  à la grande Chartreuse, il fut nommé procureur et envoyé en Angleterre pour fonder la chartreuse de Witham, dont il devint le premier Prieur, il fut fait évêque de Lincoln, et conseiller de Henri II de Plantagenêt, il fit construire la superbe cathédrale de la ville de Lincoln.. La  tour d'Avalon a été restaurée en 1870 par les chartreux en  l'honneur de Hugues, ce dernier fut canonisé, peu connu en France, il est resté célèbre dans sa patrie d'adoption, il avait prit une  part importante à la vie politique  Anglaise fut conseiller des  rois d'Angleterre Henri II et Richard-Coeur-de-Lion et mourut en 1200,  l'édifice est construit sur les ruines du château médiéval .","architecture":"Autour de la place forte qui était une ligne de défense du Dauphiné contre la Savoie, à l'emplacement actuel de la tour d'Avalon sur la  motte castrale qui domine le Grésivaudan l'édifice est construit sur les ruines du château médiéval, de ce  château il reste qu'une tour du XIe et des remparts, la tour d'Avalon est haute de 33 mètres  et 8 mètres de côté, avec des murs de 2 mètres d'épaisseur est accessible jusqu'au sommet.","habitants":"Famille de St-Hugues D'Avalon\r\n        \"","divers":"Vestiges et tour","gps":"","images":["../image/image_38/38_Avalon_1.jpg","../image/image_38/38_Avalon_2.jpg"]},"Consult_chateau_formulaire78fd":{"id":"Consult_chateau_formulaire78fd","dept":"38","canton":"St-Marcellin","commune":"St-Hilaire-du-Rosier","nom":"Balan","type":"Vestiges","periode":"XIII","histoire":"Balan: Ce château fut l'une des  résidences des abbés de saint Antoine. Une famille du nom attestée au XIVe siècle, mais c'est en 1400 que le chapitre de St-Antoine acquit le domaine qui appartenait à l'époque à nobles Jacquemet  et Henry de Quincieu, héritiers de nobles Aymard de Bellecombe, dés 1482, les Antonins font d'importants travaux et ce lieu  va devenir une annexe de l'Abbaye, louée à différents dignitaires de l'ordre tel que Antoine de Grammont, Jean Rasse, Claude Sup et Antoine Pain de la Jasse, au XVIIIe siècle par Nicolas Gasparini et son successeur Etienne Galland.","architecture":"Malgré tout les passages difficiles et destructeurs  il reste à Ballan une tour d'escalier du XVe siècle, un grand corps de logis  allongé et étroit.","habitants":"Les Antonins\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Balan_1.jpg","../image/image_38/38_Balan_2.jpg","../image/image_38/38_Balan_3.jpg","../image/image_38/38_Balan_4.jpg","../image/image_38/38_Balan_5.jpg"]},"Consult_chateau_formulaire62c9":{"id":"Consult_chateau_formulaire62c9","dept":"38","canton":"St-Marcellin","commune":"Murinais","nom":"Balme","type":"Vestiges","periode":"XII","histoire":"Balme-Murinais: L'ancienne famille de Murinais semble en avoir partagé, dés le XIIe siècle, avec les dauphins du Viennois. Cette seigneurie était donc une co-seigneurie qui s'est terminée le 16 Février 1615, par l'échange que fit le dauphin Jean avec Pierre de Murinais, de tous les droits seigneuriaux, justice etc.. contre des droits équivalents sur les paroisses de la forteresse , Sillans et St-Etienne de St-Geoirs.  En 1390 Falcon de Murinais en reçut l'investiture d'Antoine de la Tour seigneur de Vinay, sans postérité à la fin du XIVe siècle la seigneurie passe à sa soeur Aynarde, épouse d'Artaud du Puy. \r\n Au XVIe siècle par alliance aux  d'Auberjon seigneur de Buissonrond qui le conserveront jusqu'à la Révolution, et même jusqu'en 1872 à la mort du dernier marquis d'Auberjon, c'est un frère de sa seconde femme, le comte Maurice du parc qui en hérita,  son fils Henry, après le décès de sa tante Adéle vendit le château à Monsieur Saint-Remy-Pélissier.  En 1943  du 19 au 20 décembre pendant la guerre le descendant de Saint-Rémy-Pélissier qui avait prit le maquis, les Allemands mirent le feu au château, âgé de 18 ans, fut déporté et n'en revint pas. Les ruines du château furent achetés par l'abbé Petit Biguet pour y installer une colonie de vacances et ensuite vendu en plusieurs lots .","architecture":"Du château construit par Pierre d'Auberjon , Il subsiste aujourd'hui en fort mauvais état  et possède des communs dont certains bâtiments gardent la  marque du XVIIIe siècle.","habitants":"Famille deFalcon de Murinais \r\nFamille D'Auberjon\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Balme_1.jpg","../image/image_38/38_Balme_2.jpg"]},"Consult_chateau_formulaire2f7b":{"id":"Consult_chateau_formulaire2f7b","dept":"38","canton":"Beaurepaire","commune":"Revel-Tourdan","nom":"Barbarin","type":"Maison forte","periode":"XIV","histoire":"Barbarin a été cité pour la première fois au XIIe siècle,  la maison forte a été construite  probablement par François de Revel et son fis Reynaud . Le vaste édifice  remonte, pour ses parties les plus anciennes  au XIVe siècle date à laquelle il est la propriété de Jean de Barbarin.   Au XVIe siècle fut la propriété de la famille de Saulsac. Actuellement appartient a Philippe-Regis Seigle.","architecture":"La Maison forte est précédée d'une terrasse flanquée de deux pavillons, de ce lieu panoramique exceptionnel fût un observatoire militaire au début du XIVe siècle, remaniée au XVe et XVIIIe  siècle, devenu château a cette époque.","habitants":"Jean de Barbarin\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Barbarin_1.jpg","../image/image_38/38_Barbarin_2.jpg","../image/image_38/38_Barbarin_3.jpg","../image/image_38/38_Barbarin_4.jpg","../image/image_38/38_Barbarin_5.jpg"]},"Consult_chateau_formulaire90bb":{"id":"Consult_chateau_formulaire90bb","dept":"38","canton":"Monestier-de-Clermont","commune":"Monestier-de-Clermont","nom":"Bardonnenche","type":"Château","periode":"XVI","histoire":"Bardonnenche: En 1340, le dauphin Humbert II récompensa le vassal Aynard de Clermont, créa  pour lui le vicomté du Triéves qui comprenait quatre paroisses,  Saint-Paul,  Avignonet,  Roissard et Monestier de Clermont. Aynard de Clermont était aussi capitaine général de l'armée du Dauphiné, troisième personnage du Dauphiné. Ses descendants, Antoine deuxième du nom qui fut nommé Comte de Clermont en Viennois par Henri II.  \r\nLa vicomté du Triéves fut vendue en 1566 à André Alleman seigneur de Paquier, passa ensuite à Alexandre II de Bardonnenche seigneur de Thorane et de Saint-Martin de Clelles en 1679. Le nouveau vicomte du Triéve \"Clermont Tonnerre\" se fit construire le château aux environs des années 1590, et fut racheté par Alexandre de Bardonnenche en 1679, Alexandre II abjura la religion protestante en 1682, sa fille Jeanne se maria à son cousin germain César de Bardonnenche de Champiré  qui était seigneur de Roissard  1685. \r\nLes descendants d'Alexandre gardèrent la vicomté du Trièves jusqu'à la Révolution. \r\nLe dernier seigneur fut nommé colonel en 1779, il émigra et ne revint en France qu'en 1815,  il mourut à Arras en 1820.  Aujourd'hui chambres d'hôtes par madame Juliette Marin.","architecture":"Le premier château qui était \"dalphinal\" se trouvait au-dessus à flan de colline, il ne reste plus rien de ce dernier. le château actuel, bien que ravagé par un incendie en 1770, il sera reconstruit ainsi que ses dépendances,  de construction rectangulaire à trois  niveaux flanqués de deux  pavillons saillants aux extrémités.","habitants":"Famille de Clermont-Tonnerre  \r\nFamille d'Alexandre de Bardonnenche\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Bardonnenche_1.jpg","../image/image_38/38_Bardonnenche_2.jpg","../image/image_38/38_Bardonnenche_3.jpg","../image/image_38/38_Bardonnenche_4.jpg"]},"Consult_chateau_formulaire4ac1":{"id":"Consult_chateau_formulaire4ac1","dept":"38","canton":"Monestier-de-Clermont","commune":"Roissard","nom":"Bardonnenche_Roissard","type":"Maison forte","periode":"XIV","histoire":"Bardonnenche-Roissard: Maison forte appelé \"château\". Au XIVe siècle le Dauphin créa la vicomté de Trièves, en faveur d'Aynard de Clermont . Roissard fut l'une des cinq paroisses qui la composèrent . La vicomté passa aux mains des Alleman, seigneurs de Pâquier  en 1566, puis à celles des Bardonnenche 1679. Alexandre Ier de Bardonnenche seigneur de Saint-Martin de Clelles et de Thorane, avait eu deux garçons . L'ainé Alexandre, deuxième du nom acheta la vicomté du Trièves , Le cadet prénommé César, ajouta à son nom Champiré, son fils César deuxième du nom reçut de son oncle  Alexandre Ier la seigneurie de Roissard en 1685. Il se maria avec la fille de son oncle devient Vicomte du Trièves. César le deuxième du nom  construit le château en 1664,  le seigneur y habita après son mariage, mourut en 1746 et enterré à Roissard . Le château fut vendu comme bien national à la Révolution . Et  la commune le racheta en 1877 pour des colonnies de vacances.","architecture":"Cette maison forte: corps de logis rectangulaire à deux niveaux , fenêtres à meneaux.","habitants":"Famille de Bardonnenche de Champiré\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Bardonnenche_Roissard_1.jpg","../image/image_38/38_Bardonnenche_Roissard_2.jpg"]},"Consult_chateau_formulaire9ea2-3":{"id":"Consult_chateau_formulaire9ea2-3","dept":"38","canton":"Touvet","commune":"Barraux","nom":"Barraux","type":"Fort","periode":"XVIII","histoire":"Barraux: Duc Charles Emmanuel de Savoie fit construire le premier fort au XVIe siècle, barrières aux Savoisiens, fortifications bastionnés  modifier au  XVIIe.  Lesdiguières  s'en empare  par ruse le 15 mars 1598 et le met définitivement à la disposition de la France. Transformé par Vauban (1692-1700). Toujours a la disposition de l'armée, jusqu'en 1989 que l'ouvrage fut déclassé fut vendu à la commune de Barraux. La forteresse a servi de geôle à Barnave en 1793 avant son transfert à Paris. Au cours de la première guerre mondiale, on y hébergea des prisonniers allemands, tandis qu'au cours de la seconde on y enferma trafiquants et résistant, repris de justice et souteneurs, même des \"étrangers de sexe masculin dangereux pour l'ordre public\", mais l'impossibilité d'organiser la sécurité du site fit abandonner cette idée.","architecture":"La forteresse de Barraux est restée dans l'état de l'époque  de Vauban, Fortification bastionnée, bien conservée. de  ce fort ont peu distinguer la saillie des bastions qui encadrent les courtine, protégées par des demi-lunes, un fossé entoure l'ensemble, bordé à l'extérieur par un chemin couvert. L'entrée, crée sur l'ordre de Vauban selon la formule habituelle, s'encadre entre deux pilastres doriques qui portent un fronton. En arrière le bâtiment abrite le corps de garde et logements.","habitants":"Constructeur; Duc charles Emmanuel de Savoie et  Vauban\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Barraux_1.jpg","../image/image_38/38_Barraux_2.jpg","../image/image_38/38_Barraux_3.jpg"]},"Consult_chateau_formulairee8ab":{"id":"Consult_chateau_formulairee8ab","dept":"38","canton":"Verpillière","commune":"Meyrié","nom":"Barre","type":"Maison forte","periode":"XIII","histoire":"Barre: La  seigneurie de Meyrié  faisait partie de la baronnie puis du marquisat de Maubec. Elle était la propriété de deux familles vassales des seigneurs de Maubelans: les Traffey et les Joffrey, lesquels en devinrent les seuls maîtres au XIVe siècle. En 1392 enfin, Jean Joffrey fit l'acquisition de la maison forte de Meyrié. Son fils n'eut qu'une fille, Joffréde, qui épousa en 1469 Jean de la Barre de Maubec. La maison forte prit le nom de la Barre, la famille dont on peut encore voir les armureries dans l'église. En 1570, Pierre de La Barre, qui avait épousé Claudine de Maubec, mourut sans enfants.  La seigneurie échut à son second mari, Arthaud de Virieu.","architecture":"Bâtisse de forme carrée à trois niveaux et toit à quatre pans, tours arasé accolé.","habitants":"Famille de Jean de la Barre de Maubec\r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Barre_1.jpg"]},"Consult_chateau_formulaire071a":{"id":"Consult_chateau_formulaire071a","dept":"38","canton":"Grenoble","commune":"Grenoble","nom":"Bastille","type":"Fort","periode":"XIX","histoire":"Bastille: Construction militaire édifiée entre 1823 et 1848, sous les ordres du général Haxo, objectifs de défense contre le duché de Savoie.  La Bastille possède des remparts, des casemates et des escaliers sur 300 mètres  de dénivelée, soit 380 marches d'escaliers souterrains, avec porte d'entrée sur l'extrême sud. Cette place forte date depuis des siècles marqué par des personnalités de Lesdiguières, Vauban et Haxo.","architecture":"Cet ouvrage étagés sur un dénivelé de 300 mètres, interdisant l'accès par la montagne et empêche l'ennemi d'occuper la hauteur dangereuse pour la ville. Cette place forte a conservée une échauguette, des vestiges de l'enceinte du XVIe siècle, des remparts, des galeries et des banquettes de tirs.","habitants":"Général Haxo\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Bastille_1.jpg","../image/image_38/38_Bastille_2.jpg","../image/image_38/38_Bastille_3.jpg","../image/image_38/38_Bastille_4.jpg"]},"Consult_chateau_formulairea775":{"id":"Consult_chateau_formulairea775","dept":"38","canton":"Goncelin","commune":"Pontcharra","nom":"Bayard","type":"Maison forte","periode":"XIV","histoire":"Bayard: Maison forte construite en 1404  par l'arrière grand père de Pierre Ponson de Terrail plus connu sous  le nom de \" Chevalier et seigneur Bayard \" ce dernier naquit  dans cette demeure en 1476-1524. Jeune page du duc Charles Ier de Savoie, passe ensuite au service du roi Charles VIII; de nombreux  exploits  militaires,  fut prisonnier par les Anglais en 1513, libéré peu après, nommé lieutenant général du Dauphiné, mais c'est en 1524 au cours d'un combat qu'il est mortellement blessé il sera inhumé à St Martin d'Hères.  La maison forte  restera dans la descendance du frère de Bayard jusqu'en 1559 sera cédée à la famille de Saint-Marcel d'Avançon, ensuite les  Simiane de  Gordes,  jusqu'en 1677 passa aux Simiane de la Coste, enfin en 1735 les Durey de Nionville qui la conserveront jusqu'à la Révolution.  Le seigneur de Bayard émigre laissant la maison en mauvais état, elle est confisquée et vendue en adjudication.  de 1795 et 1811, huit propriétaires se succèdent, certaines  parties  du château sont démolies pour récupérer les pierres et en 1819 la bâtisse est achetée  par Jean  Delandine et en 1858  revendue à Jacques Raffin qui autorisa l'abbé Bertrand de constitué une habitation dont il y résidera jusqu'en 1895, classée  monument historique,  une association se créa pour la remise en état,  mais la  revende en 1942 aux papeteries de Moulin-vieux  qui en assure la reconstruction de la \"Maison carrée\" qui deviendra musée.","architecture":"Au XIXe siècle  on y implanta une carrière , des murs s'écroulèrent; elle fut sauvée de la ruine par la société des papeteries de Moulin-vieux qui entreprit la restauration. Aujourd'hui du château,  il reste un garde  corps  du XIXe siècle  flanquée de deux tours rondes d'un corps de logis  carrée du XVe siècle voisine à une tour ronde cette dernière accolée à une grande dépendance.","habitants":"Famille de Pierre III de Terrail\r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Bayard_1.jpg","../image/image_38/38_Bayard_2.jpg","../image/image_38/38_Bayard_3.jpg","../image/image_38/38_Bayard_4.jpg"]},"Consult_chateau_formulaire3839":{"id":"Consult_chateau_formulaire3839","dept":"38","canton":"Pont-en-Royans","commune":"St-André-en-Royans","nom":"Beaujour","type":"Manoir","periode":"XVI","histoire":"Beaujour: La maison forte de Lyonne a été érigée vers les années 1562 à 1587 devant le château de Saint-André en Royans leur cachant la vue  (et rappelant par son nom Beaujour le but de sa construction), ceci est  fait par  les Prunier  Seigneur de Saint-André qui avait refusé à ses descendants toute mésalliance avec  les Lyonne (Hugues de Lyonne ministre de Louis XIV). Au rachat de la M F par les Prunier les Lyonne se retirèrent à  St-Romans dans la M F des Ferries.","architecture":"Construction à deux niveaux de style renaissance, reconstruit en partie avec des éléments du château de la Peccatières et de Beauvoir ( fenêtres à meneaux et cheminées).","habitants":"Famille de Sébastien de Lyonne\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Beaujour_1.jpg","../image/image_38/38_Beaujour_2.jpg"]},"Consult_chateau_formulaire082f":{"id":"Consult_chateau_formulaire082f","dept":"38","canton":"La Mure","commune":"La Mure","nom":"Beaumont_Isere","type":"Château","periode":"XV","histoire":"Beaumont: La Mure était une petite ville fortifié possession des Dauphins, privilèges accordés au XIVe siècle par les huguenots contre le duc de Mayenne en 1580. Au XVe siècle, dominée par une citadelle est un château fort; mais elle eût beaucoup a souffrir des guerres de religion pendant de longues années d'ou la destruction complète de la citadelle et du château fort. Elle possédait également un château à l'emplacement de la maison Caral qui est construite sur les ruines d'un château delphinal, abrite aujourd'hui le musée Matheysin. Le château de Beaumont cité en 1339 a été reconstruit au XVe siècle par Humbert de Combourcier, châtelain royal de la Mure. En 1543 François Ier rendit hommage les terres et châteaux de la Mure et ce qui représentent aujourd'hui le canton  plus Theys , Claix, La Pierre,  Doméne, Valbonnais et autres à la comtesse de Nemours et en 1593  François de Bonne (duc de Lesdiguières) racheta les mandements Bourg d'Oisans et de la Mure.                                                                                     La ville acquit le château de Beaumont en 1906 pour en faire une école, aujourd'hui en appartements sociaux. Patrie de Saint-Julien Eymart.","architecture":"Corps de bâtiment rectangulaire flanqué de deux tours cylindriques à mâchicoulis, à l'origine il en possédait quatre, la tour de droite, plus basse date du XVe siècle la tour de gauche et la façade ont été refaites au XIVe siècle.  Remanié au XIXe siècle.","habitants":"Famille d'Humbert de Comboursier\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Beaumont_1.jpg"]},"Consult_chateau_formulaire39d0":{"id":"Consult_chateau_formulaire39d0","dept":"38","canton":"Touvet","commune":"Touvet","nom":"Beaumont_La_Frette","type":"Vestiges","periode":"XIII","histoire":"Beaumont-la Frette: Le château  fut élevé par la famille de Beaumont au début du XIIIe siècle, à la place d'un premier château en bois sur motte. En 1340 Amblard Ier de Beaumont,  vassal du Dauphin Humbert II et négociateur du traité de Romans, fait reconstruire le château ainsi que celui de Crolles, épousera en 1349 Béatrix Alleman des Alleman de Laval et d'Uriage.         Douze générations se succéderont dans ce fief aux services du Dauphin et du roi.\r\nBien que le château fut le siège d'une petite châtellenie indépendante coincée entre les possessions des Dauphins, c'est dans la maison de la Frette que naquit François de Beaumont; Baron des Adrets (1513-1586), chef de guerre  protestant puis catholique, dont les exactions sont restées célèbres.       La maison forte de la Frette  au Mollard, les nobles du mandement Arthaud de Beaumont, Dragonet d'Entremont, Arthaud du Touvet, Vivien et Pierre du Touvet, les enfants de Raynier du Touvet, Guigonet Saint-Jean, Pierre et Aymard de Saint-Jean fut également l'habitation des Beaumont qui eurent une descendance de vingt générations.","architecture":"Les ruines du château de Beaumont au sommet d'un rocher (566m) couronnant un promontoire largement boisé, à un peu plus d'un kilomètre au sud-ouest du Touvet.                                                                     Le château  de pierre était constitué d'une enceinte rectangulaire s'appuyant au Nord-Est sur un puissant donjon quadrangulaire, au sud-Est de l'enceinte était occupé par le bâtiment seigneurial et l'entrée (au sud) flanquée de deux tours d'inégales  importances.           Une seconde enceinte à l'ouest protégeait le château en contre-bas, flanquée de deux ou trois tours semi-circulaires.                  \r\nLa maison forte de la Frette  construction de bâtiment autour d'une tout carrée aujourd'hui en ruine.                                                        Le château du Mollard du XVe siècle ou naquit Guigues de Guiffrey seigneur de Boutières fils de Sébastien-Pierre Mistral du Touvet et de Claude Robert qui fut le compagnon de Bayard.","habitants":"Famille de François de Beaumont  (Barons des Adrets)\r\n        \"","divers":"Motte du château du baron  des Adrets vestiges de la tour et manoir du Mollard.","gps":"","images":["../image/image_38/38_Beaumont_La_Frette_1.jpg","../image/image_38/38_Beaumont_La_Frette_2.jpg","../image/image_38/38_Beaumont_La_Frette_3.jpg"]},"Consult_chateau_formulaired39f":{"id":"Consult_chateau_formulaired39f","dept":"38","canton":"Beaurepaire","commune":"Beaurepaire","nom":"Beaurepaire","type":"Château","periode":"XIV","histoire":"Beaurepaire: Au XIVe siècle faisait partie du domaine Delphinal vendu par M.Panète au Dauphin Jean le Bon en 1316. En 1328 la seigneurie appartenant à Guillaume III, fut vendu à Jacquenet de Champagnon et en 1345 par Jubert II à Aymar d'Hauterives.\r\nLe dauphin Louis II, futur Louis XI, qui fit construire le château, transmet les revenus de cette seigneurie à son écuyer Jean de Héraulmont en 1448. En novembre 1465 à l'occasion du mariage de sa fille  Jeanne de France avec Louis le bâtard de Bourbons cette seigneurie lui revient et restera dans le royaume de France jusqu'en 1536, François Ier la transmet à Galéas Visconti, puis passa à Guillaume de Poitiers donc à Diane de Poitiers jusqu'en 1566. De retour au domaine royal,la seigneurie est tenue à la demande du roi à la famille de Lestang. Le 20 septembre 1638 elle est vendue à noble Charles de Lestang seigneur de Sablon puis à ses héritiers, ensuite passa au comte de Miolans qui la revendit en 1651 à Renaud de la Rouillasse seigneur de Darne qui la céde à Olivier Sénézan Seigneur de Viriville ainsi que les terres de Chatenay , Malleval et Virieu dont l'héritière fut sa veuve Anne-Nicole Lamoignon  qui perdit son fief en 1785.Elle fut la derniere responsable de la seigneurie de Beaurepaire, elle demeura à Paris ; sur de Malesherbes avocat du roi Louis XVI, ce dernier mourut à l'échafaud en 1794 en compagnie de Madame Elisabeth de France","architecture":"Du château primitif était construit sur la colline ou une tour de Garde surveillée la plaine, Il ne reste plus rien de ce dernier ainsi que des remparts construit au XIVe siècle que trois portes où l'on rentrait dans la ville, la porte du Faubourg, la porte St-Genis et la porte du Milieu. Les ruines du château médiéval, figurent encore sur une gravure de 1810, elles devaient être remplacées quelques années plus tard par la vaste demeure ombragée appelée aussi \"château\" de beaux arbres que nous voyons de nos jours , dominant Beaurepaire et la Valloire. Propriété de la famille \"De Barrin\".","habitants":"Famille  de Lestang  \r\nFamille Olivier Sénézan \r\nFamille Anne-Nicole Lamoignon\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Beaurepaire_1.jpg","../image/image_38/38_Beaurepaire_2.jpg"]},"Consult_chateau_formulairefd3d":{"id":"Consult_chateau_formulairefd3d","dept":"38","canton":"Fontaine","commune":"Sassenage","nom":"Beaurevoir","type":"Château","periode":"XIX","histoire":"Beaurevoir: Construit à la fin du XIXe siècle par un riche industriel grenoblois, le gantier Alphonse Terray, grand père de l'alpiniste Lionnel Terray, acheté en 1914 par André Papet, ensuite par un ingénieur, Paul Corbin.  Vers 1948 devient la propriété de la  SNCF qui y installe son service social. Appartient  aujourd'hui à une société qui le loue de manière occasionnelle.","architecture":"Réalisé  en pierres provenant de l'ancien château féodal appelé château des côtes, architecture baroque flamboyante d'une bourgeoisie industrielle prospère.","habitants":"Famille d'Alphonse Terray\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Beaurevoir_1.jpg","../image/image_38/38_Beaurevoir_2.jpg"]},"Consult_chateau_formulaire5825":{"id":"Consult_chateau_formulaire5825","dept":"38","canton":"Pont-en-Royans","commune":"Beauvoir-en-Royans","nom":"Beauvoir","type":"Vestiges","periode":"XII","histoire":"Le châteu de Beauvoir fut la résidence principale  des princes du Dauphiné 1258 -1350 avec bourg Fortifié.  \r\nCette terre fut acquise par Guigue VII, Prince souverain du Viennois .   \r\nLe nom Dauphin se présente par le surnom de baptême de Guigue IV évoqué par la figure de Saint-Delphinus.  En 1250, Le Dauphin Guigue II l'acquit à Raymond Bérenger  seigneur du Royans; Les Guigue descendand des comtes d'Albon  Guigue VII épousa en 1270 Béatrix de Savoie, dans leur descendance de neuf enfants, Jean Ier  qui épousa Béatrix de Hongrie  ( soeur de Clémence de Hongrie épouse du roi de France Louis X le Hutin ) prit le nom de Guigue VIII en 1318  et régna  sur le domaine, à sa mort en 1333, du fait qu'il na pas eu de descendance avec Isabelle de France ( fille de Philippe le Long,roi de France) le pouvoir passa à son frère Humbert de la Tour du Pin qui avait épousé Marie des Baux .  S'installa au château de Beauvoir.  Humbert prit le titre de Dauphin Humbert II, il eu un enfant André qui mourut en 1335 en bas âge et de la se créa la légende qu'une de leur nourice a laissé tomber d'une fenêtre le jeune dauphin,  ceci pour masquer une maladie enfantile. A Partir de cela  Humbert II désespéré laissa le palais à l'abandon et en 1349 vendit le Dauphiné à la France, mais gardèrent  leurs biens, châteaux et terres ainsi que le château de Quirieu et de la Balme, le château fut sommairement entretenu jusqu'en 1420, Henri de Sassenage,  gouverneur du Dauphiné envisage de résider à Beauvoir avec sa famille,  mais le château en très mauvais état, y renoncèrent et en 1424 les terres furent données en gage par le roi Charles VII à Louis seigneur de Joyeuse ce dernier les échanges avec Béatrix de Bressieux, qui veuve et sans enfant remet l'ensemble des biens au Dauphins Louis II ( futur roi Louis XI ), qui ce dernier les transmet à son écuyer  Jean Copier, donation requise en 1450, au XVIe siècle servit de refuge aux huguenots, d'ou le baron  des Adrets s'y installe en 1561 pour torturer ses adversaires, suite aux assauts des guerres de religion le château fut en partie détruit. Aprés cela servit de carrière.","architecture":"Ce château avait à l'origine quatres tours  dont trois seulement situé sur l'enceinte qui encerclé la plate forme: tour du mytan et le dojon, aujourd'hui de ce beau palais il ne reste que des remparts et une tour carrée de la porte  et un pan de mur de la chapelle.","habitants":"Famille d'Humbert II (Prince du Dauphiné)\"","divers":"","gps":"","images":["../image/image_38/38_Beauvoir_1.jpg","../image/image_38/38_Beauvoir_2.jpg","../image/image_38/38_Beauvoir_3.jpg","../image/image_38/38_Beauvoir_4.jpg","../image/image_38/38_Beauvoir_5.jpg","../image/image_38/38_Beauvoir_6.jpg"]},"Consult_chateau_formulairec72d":{"id":"Consult_chateau_formulairec72d","dept":"38","canton":"Roussillon","commune":"Anjou","nom":"Bectoz","type":"Manoir","periode":"XIX","histoire":"Bectoz: Le premier maire de cette commune fut le comte Louis Camille de Bectoz seigneur de Vaubonnais, Le château fut acheté par le centre mutuel du Sud-est,abrite une école d'agricultures.","architecture":"Grand corps de logis rectangulaire à trois niveaux  sur assise de galerie.","habitants":"Famille de Louis-Camille de Bectoz\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Bectoz_1.jpg"]},"Consult_chateau_formulaire9727":{"id":"Consult_chateau_formulaire9727","dept":"38","canton":"Voiron","commune":"Voiron","nom":"Beegue","type":"Manoir","periode":"XX","histoire":"Beegue: Ce château est une maison bourgeoise dont la construction est du siècle dernier.","architecture":"Beegue corps de logis rectangulaire à trois niveaux flanquée d'une tour ronde et d'une échauguette à l'opposée.","habitants":"\"","divers":"","gps":"","images":["../image/image_38/38_Beegue_1.jpg"]},"Consult_chateau_formulaire6ebf":{"id":"Consult_chateau_formulaire6ebf","dept":"38","canton":"Bourgoin-Jallieu","commune":"St-Marcel-Bel-Acceuil","nom":"Bel_Accueil","type":"Château","periode":"XV","histoire":"Saint-Marcel Bel-Acceuil: Le territoire était administré par le châtelain du château de Bel-Accueil, assisté de consuls. La presque totalité des terres étaient la propriété de quelques familles nobiliaires: messire Louis de Loras, marquis et seigneur de Bel-Accueil, Loras, Vénérieu,  St-Hilaire; Mr de Perret, Mr de St- Innocent qui possédait la maison forte de Chaudenou: Mr Reynaud, notaire et châtelain de Bel-Accueil. La dernière des Loras épousa en 1832 Antoine-Charles-François d'Auberjon marquis de Murinais, à qui elle légua à sa mort en 1850 le château; le marquis le laissa à ses soeurs. l'édifice était dans un triste état lorsque le comte Nolder l'acquit en 1897 qui le restaura et à sa mort en 1932 le transmis à son gendre le comte Victor-Himbert de Chevron-Villette, toujours dans la famille.","architecture":"Maison forte du XVe siècle remanié complètement en château au XVIIe siècle comporte trois corps de bâtiment en fer à cheval à quatre niveaux flanqué de pavillons d'un de style renaissance.","habitants":"Famille de Loras\r\nFamille d'Auberjon\r\nFamille Nolder \r\nFamille de Chevron Vilette \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Bel_Acceuil_1.jpg","../image/image_38/38_Bel_Acceuil_2.jpg"]},"Consult_chateau_formulaire899b":{"id":"Consult_chateau_formulaire899b","dept":"38","canton":"Tour-du-Pin","commune":"Chassignieu","nom":"Bellegarde","type":"Maison forte","periode":"XV","histoire":"Bellegarde: Cette maison forte construite au XVe siècle par la famille de Bellegarde, à la fin du XVe siècle, la veuve de Philippe de Bellegarde légua sa maison forte à Jean de Poisieu, seigneur du Passage qui restera dans cette famille jusqu'en 1656, date à  laquelle Aymar de Poisieu la vendit à noble Antoine de Perrotin, maréchal de camp, gouverneur de Pignerol et restera dans cette famille jusqu'au milieu du XIXe siècle. Puis d'autres propriétaires  se succéderont et aujourd'hui appartient a une famille d'agriculteur.","architecture":"Bellegarde: Corps de logis rectangulaire à toiture quatre pans encadrés par deux tourelles arasées, fenêtres à meneaux, bretèche avec logette servant de défense. belle porte à panneau cloutée en pointe de diamant.","habitants":"Famille de Philippe de Bellegarde\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Bellegarde_1.jpg","../image/image_38/38_Bellegarde_2.jpg"]},"Consult_chateau_formulaire8df0":{"id":"Consult_chateau_formulaire8df0","dept":"38","canton":"Grand-Lemps","commune":"Belmont","nom":"Belmont","type":"Maison forte","periode":"XVI","histoire":"Belmont: Attestée depuis le XVIe siècle cette demeure a appartenu jusqu'à la révolution à la famille Vachon de Belmont.","architecture":"Situé au pied du Châtelard, cette bâtisse quadrangulaire est couverte d'un toit à quatre pans de douze mètres de haut en tuiles écaillées.","habitants":"Famille Vachon\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Belmont_1.jpg"]},"Consult_chateau_formulaire5a08":{"id":"Consult_chateau_formulaire5a08","dept":"38","canton":"Crémieu","commune":"Villemoirieu","nom":"Belmont (Crémieu)","type":"Maison forte","periode":"XIV","histoire":"Belmont: Cette maison forte a été construite au XIVe  siècle par la famille de Palanin  qui possédait aussi \"la tour de Chozeau \" aujourd'hui disparue. Elle  devint possession de plusieurs membres des familles de Grôlée et de Vallin sa dernière propriétaire , Marie-Gabrielle de Vallin, comtesse de la Tour du Pin. En 1789 émigra ses biens furent vendus et partagés transformés en ferme, à reçu des restaurations dernièrement.","architecture":"Cette maison forte de Belmont est un ensemble de bâtiments importants, deux ailes carrées à plusieurs étages, celle de gauche a été détruite . une petite tour ronde conserve encore son escalier à vis.","habitants":"Famille de  Palanin\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Beptenoud_1.jpg"]},"Consult_chateau_formulaire3f4b":{"id":"Consult_chateau_formulaire3f4b","dept":"38","canton":"Fontaine","commune":"Sassenage","nom":"Beranger_Sassenage","type":"Château","periode":"XVI","histoire":"Beranger-Sassenage: Le  château féodal fut abandonné par les seigneurs et barons de Sassenage qui s'installèrent au début du XVIIe siècle en faisant édifier le château actuel à la place de l'ancien.  Il fut construit par l'architecte valentinois maître Laurent Sommaire surnommé \"la Rampe\" sur demande de Charles-Louis Alphonse de Sassenage entre 1662 et 1669; cette famille d'illustres ancêtres les \"Béranger de Sassenage\" baron du Dauphiné on peut occupé le château, par leurs  fonctions civiles et militaires les obligèrent à résider à Versailles, le château a conservé l'essentiel de ses décors d'origine, l'édifice a accueilli la manufacture des blondes du docteur Ducoin de 1772 à 1786. Légué par la marquise de Béranger en 1971 au conseil international de la langue française, le château est désormais utilisé comme centre de séminaires.","architecture":"Ce château de Béranger construit au XVIIe siècle sur l'emplacement d'un château du XIIIe siècle, corps de logis rectangulaire de style Louis XIII flanqué de deux  pavillons saillant aux extrémités, ce dernier présente à l'intérieur un bel escalier de pierre avec rampe à balustres soutenues par des arcades. \r\nUne importante cheminée portée par deux colonnes anime la grande cuisine. Blason au-dessus  de la porte d'entrée gardée par deux lions de pierre.","habitants":"Famille de Charles-Louis-Alphonse de Sassenage\r\n        \"","divers":"Vestiges du premier château féodal de Sassenage et nouveau","gps":"","images":["../image/image_38/38_Beranger_Sassenage_1.jpg","../image/image_38/38_Beranger_Sassenage_2.jpg","../image/image_38/38_Beranger_Sassenage_3.jpg"]},"Consult_chateau_formulaireade3":{"id":"Consult_chateau_formulaireade3","dept":"38","canton":"Domène","commune":"Villard-Bonnot","nom":"Berlioz","type":"Manoir","periode":"XII","histoire":"Berlioz; né à la Côte Saint  André le 11 décembre 1803, Hector Berlioz quitta le Dauphiné pour Paris en 1821. alors que ses parents le destinaient à la carrière médicale, il consacra très vite corps et âme à la musique, il conjugua un éclatant génie de l'orchestration et de la mélodie. Déçu dans sa vie amoureuse, il s'éteignit à Paris le 8 mars 1869.","architecture":"La maison de son enfance qu'il reçut de son père fut transformait en musée.","habitants":"Hector Berlioz\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Berlioz_1.jpg"]},"Consult_chateau_formulaireaa65":{"id":"Consult_chateau_formulaireaa65","dept":"38","canton":"Roussillon","commune":"Assieu","nom":"Berthon_Richoux","type":"Château","periode":"XV","histoire":"Berthon-Richoux: Mr de Bertail premier propriétaire connu aurait été trésorier du roi, puis a appartenu à la famille Reymond depuis le XVIIe siècle,  puis à la famille Berthon, Louis Berthon  en 1876 connut par ses tableaux et a  reçu de nombreux peintres en son château.","architecture":"Berthon-Richoux, corps de logis rectangulaire à créneaux quatre étages flanqué d'une tour carrée crénelée et d'une tour ronde à tourelles.","habitants":"Famille Berthon\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Berthon_Richou_1.jpg","../image/image_38/38_Berthon_Richou_2.jpg"]},"Consult_chateau_formulaire2638":{"id":"Consult_chateau_formulaire2638","dept":"38","canton":"Crémieu","commune":"Villemoirieu","nom":"Bienassis","type":"Château","periode":"XV","histoire":"Bienassis: Ancienne M F du XVe siècle a subi d'heureuses transformations notamment au XIX : Possession , sans doute à la famille de Rivoire au début du XVe siècle, au XVIe siècle appartenait à la famille Vallin  puis aux Vallier de Quirieu, aux du Bourg et au Chapuis  seigneur de Morestel. En 1789 son propriètaire Nicolas-Prosper de Montlevon, grâce à ses idées libérales et grâce à son médecin et ami le docteur Guichard, traversa sans trop de difficultés les années révolutionnaires, c'est son filleul et héritier  Nicolas-Prosper Guichard qui  ami du jeune  Lamartine vint  séjourner à plusieurs reprise, dont sa chambre est toujours soigneusement conservée. \r\nAujourd'hui dans la famille Bénédic.","architecture":"Château à caractère médiéval, en trois corps de logis de hauteur différente de forme rectangulaire à mâchicoulis flanquées de tourelles rondes différentes également. C'est en 1893 que fut construit le donjon flanqué de mâchicoulis et échauguettes.","habitants":"Famille Vallin \r\nFamille Guichard\r\nFamille Bénédic\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Bienassis_1.jpg","../image/image_38/38_Bienassis_2.jpg"]},"Consult_chateau_formulairea3ab":{"id":"Consult_chateau_formulairea3ab","dept":"38","canton":"Vinay","commune":"Vinay-Beaulieu","nom":"Blache","type":"Château","periode":"XV","histoire":"Blache: Ce domaine revient par testament de noble Jean Alleman, seigneur de Rochechinard , à sa fille Marguerite épouse de noble Eynard  Vallin de Beauvoir, en 1433, mais  c'est la famille Falcoz, originaire de Vourey, en comté en 1679  pour Alexandre de Falcoz, Capitaine d'armée, ce dernier étant déjà propriétaire de la seigneurie d'Anjou  par héritage. Le petit fils d'Alexandre Joseph de Falcoz  (1739-1799) député à la noblesse à l'assemblée nationale de 1789, émigra en 1791 revint en France et fut emprisonné en 1793, puis libéré le 9 Thermidor; les scellés apposés au château de la Blache en 1792 furent levés en 1794 et la propriété ne fut pas vendue, et les derniers propriétaires, les familles Taulier et Guérimard en 1875 acquièrent à monsieur Tournier, grand-père de Monsieur Chevalier propriétaire actuel.","architecture":"Cette maison forte du XVIIe siècle possède un corps de logis quadrangulaire avec de belles fenêtres à meneaux ; trois niveaux  flanqués de deux tours rondes arasé aux extrémités et même prit dans la végétation.","habitants":"Famille de Michel de Falcoz\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Blache_1.jpg","../image/image_38/38_Blache_2.jpg","../image/image_38/38_Blache_3.jpg"]},"Consult_chateau_formulairedddc":{"id":"Consult_chateau_formulairedddc","dept":"38","canton":"Verpillière","commune":"Four","nom":"Blaches","type":"Maison forte","periode":"XIV","histoire":"Blaches: Elle fut construite en 1340, ses propriétaires furent les seigneurs de Girin, en 1509 Antoine de Girin vendit a Hugues et François de Lemps dont la devise était le  \"temps, j'attends\", cette famille gardèrent la seigneurie jusqu'en 1610, à la mort de Baltazard de Lemps elle passa aux seigneurs d'Yvours, puis à partir de 1668 à Joseph de Vante seigneur de Saint-Pinsart, qui était plus brigand que gentilhomme. La maison forte changea de propriètaire passa à Pierre Germain, châtelain de Vaulx, puis fut cédée à  Serre de Saint-Clair  qui renonça à ses titres de noblesses à la Révolution, soutient les Girondins qui lui valut sa tête le 25 décembre 1793.","architecture":"Blaches, corps de logis rectangulaire, flanqué de deux tours rondes aujourd'hui arasées, celle de gauche arasée également envahie par le lierre.","habitants":"Famille de Lemps\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Blaches_1.jpg"]},"Consult_chateau_formulairefabe":{"id":"Consult_chateau_formulairefabe","dept":"38","canton":"St-Marcellin","commune":"Chevrières","nom":"Blagneux","type":"Manoir","periode":"XVI","histoire":"Blagneux: Au XVIe siècle fut la possession de Aymard de Rivail et pavillon de chasse de Diane de Poitiers,","architecture":"Ce château de Blagneux a été reconstruit au XIXe siècle, conserve encore des éléments du XV, très remanié a l'allure d'un manoir,  est sert aujourd'hui aux  colonies de vacances.","habitants":"Famille D'Aymard de Rivail\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Blagneux_1.jpg","../image/image_38/38_Blagneux_2.jpg","../image/image_38/38_Blagneux_3.jpg","../image/image_38/38_Blagneux_4.jpg","../image/image_38/38_Blagneux_5.jpg"]},"Consult_chateau_formulaire9c86":{"id":"Consult_chateau_formulaire9c86","dept":"38","canton":"Fontaine","commune":"Sassenage","nom":"Blondes","type":"Château","periode":"XVIII","histoire":"Blondes-Sassenage, ce château accueille aujourd'hui  l'hôtel de ville de Sassenage, a été construit à la fin du XVIIIe siècle par le docteur Antoine  Henri Ducoin qui créa la manufacture des Blondes de Sassenage  ( dentelles)  en 1772, au château des Béranger pendant une quinzaine d'années. Le nouveau château servit de manufacture et maison  hospitalière, la fabrique dura jusqu'en 1791, et a appartenu par la suite à divers personnages tel que Monsieur de Gratet Dubouchage, ancien préfet de la Drôme (1831-1829), André Blanc maire de Sassenage (1831-1944), avant d'accueillir un centre d'apprentissage pour les métiers du bâtiment (1952-1971). Laissé à l'abandon durant de nombreuses années, il est entièrement réhabilité pour accueillir l'hôtel de ville en 1988.","architecture":"Ce château construit au XVIIIe siècle de forme rectangulaire a quatre étages et deux pavillons d'entrée.","habitants":"Famille d'Antoine-Henri Ducoin\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Blondes_1.jpg"]},"Consult_chateau_formulairecf89":{"id":"Consult_chateau_formulairecf89","dept":"38","canton":"Côte-St-André","commune":"Mottier","nom":"Bocsozel","type":"Tour","periode":"XVI","histoire":"Bocsozel: Au XVIe siècle, la famille de Bocsozel possédait une maison \"en ville\", la tour hexagonal qui subsiste témoigne de la noble origine de ses habitants,  elle fut donnée en jouissance à Jeanne du Terrail, fille du chevalier Bayard qui avait épousé François de Bocsozel. Un de leur fils fut décapité,  victime de sa trop grande passion pour la reine Marie Stuart d'Angleterre.","architecture":"Du château il ne reste q'une tour ronde seul élément du château en ruines.","habitants":"Famille de Jeanne du Terrail\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Bocsozel_1.jpg","../image/image_38/38_Bocsozel_2.jpg","../image/image_38/38_Bocsozel_3.jpg","../image/image_38/38_Bocsozel_4.jpg","../image/image_38/38_Bocsozel_5.jpg","../image/image_38/38_Bocsozel_6.jpg"]},"Consult_chateau_formulaire59b0":{"id":"Consult_chateau_formulaire59b0","dept":"38","canton":"Vizille","commune":"Jarrie","nom":"Bon_Repos","type":"Château","periode":"XV","histoire":"Bon-Repos: La haute-Jarrie dépendait du X au  XIIIe siècle à l'Ordre des Templiers le château servit à Lesdiguières de casernement. Guillaume Armuet, auditeur à la chambre des comptes de Grenoble fut le premier habitant de ce château qui le fit construire en 1450, Louis XI y séjourna. Ce château  fut en 1587 un lieu  sanglant lors de la bataille  entre catholiques et protestants. \r\nCe château fut transformé ensuite en agréable demeure des tourelles en angles furent apportées, il fut abandonné en 1906.\r\nRacheté par Monsieur Jouvin, reprit par la commune qui le rénove actuellement.","architecture":"De ce château de Bon-Repos construit au XVe siècle a connut l'état de ruines aux début du XXe siècle, corps quadrangulaire avec quatre tours altières, entourait d'un mur d' enceinte et un fossé; Grâce à la passion des bénévoles, il est maintenu en état et les toitures des tourelles sont refaites.","habitants":"famille Guillaume Armuet \r\nFamille Jouvin\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Bon_Repos_1.jpg","../image/image_38/38_Bon_Repos_2.jpg"]},"Consult_chateau_formulairecfc5":{"id":"Consult_chateau_formulairecfc5","dept":"38","canton":"Verpillière","commune":"Verpillière","nom":"Bonce","type":"Château","periode":"XVIII","histoire":"Bonce: Le plus ancien seigneur connu est Guichard Vavre de Bonce au XIIIe siècle, il avait reçu la seigneurie en récompense de sa vaillance et de ses services des mains de son suzerain, Humbert Ier Dauphin.  Les Vavre de Bonce conserveront cette seigneurie jusqu'en 1290.  \r\nC'est Louis Vavre de Bonce qui fit construire le château au XVe siècle, tous les seigneurs du nom l'ont habités  jusqu'en 1760, date à laquelle il brûla et c'est François-Christophe Vavre qui profita de cette malheureuse circonstance pour  moderniser et déplacer cette demeure en utilisant  les pierres du précédant. Les seigneurs de Bonce, militaires  de père en fils depuis le Moyen Age, atteignirent le sommet de leur puissance et rachetèrent aux Talleyrand Périgord  tous leur droits de seigneurie sur la région, le Colombier, Saugnieu, Planéze, Chesne, La Verpillière, St Laurent de Mure, etc.                              En 1780 le seigneur étant Jean-Baptiste Vavre,  il n'a  qu'une fille qui épousa  Jean-Honoré Lyon, Marquis de Regnauld  de Bellescize issu d'une ancienne famille de consuls de Lyon, qui au retour d'émigration à grand procès récupéra une partie des biens des Vavre de Bonce. Leur descendant Pierre de Bellescize, occupe toujours le château de ses ancêtres.","architecture":"De l'ancien château il ne reste plus rien, le château construit a côté de l'emplacement d'une maison forte en 1767 est une bâtisse de forme rectangulaire à deux étages à toit plat et fronton , deux pavillons à terrasses sur les côtés.","habitants":"Famille de Guichard Vavre de Bonce                                                  Famille de Jean-Honoré de Bellescize\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Bonce_1.jpg","../image/image_38/38_Bonce_2.jpg"]},"Consult_chateau_formulairee083":{"id":"Consult_chateau_formulairee083","dept":"38","canton":"St-Jean-de-Bournay","commune":"Giray","nom":"Bonnevaux","type":"Manoir","periode":"XVII","histoire":"Le château de Bonnevaux est constitué d'un ancien relais de chasse construit au XVIIe siècle et d'un manoir construit à la fin du XIXe siècle par le propriétaire du domaine, un célèbre chirurgien Lyonnais.  Aujourd'hui  restaurant d'hôtes et séminaires.","architecture":"Bonnevaux; corps de logis en équerre à trois niveau flanqué d'une tour donjon carrée et à l'opposée une tourelle carrée en angle à toit  pointue.","habitants":"Famille Bonnevaux\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Bonnevaux_1.jpg","../image/image_38/38_Bonnevaux_2.jpg","../image/image_38/38_Bonnevaux_3.jpg"]},"Consult_chateau_formulaireb765":{"id":"Consult_chateau_formulaireb765","dept":"38","canton":"La Côte-St-André","commune":"St-Hilaire-de-la-Côte","nom":"Bouchet (38)","type":"Manoir","periode":"XIV","histoire":"Bouchet:Ce château appartenait au XIVe siècle à la famille de la Balme, puis passa aux Alleman, déjà propriétaire de Saint  Hilaire de la maison forte de la Tour aujourd'hui disparue. Bouchet fut le berceau de cette grande famille jusqu'au XIXe siècle quant au château de Bouchet, il connut au cours des deux derniers siècles différents propriétaires, et il semble qu'il ne leur ait pas porté bonheur , un incendie en 1960 et   fut racheté par le district de la Côte Saint-André en 1975.","architecture":"Ce manoir du XIVe siècle flanqué de tours  rondes, incendié en 1960 a été remanié.","habitants":"Famille Bouchet\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Bouchet_1.jpg"]},"Consult_chateau_formulaired8e6":{"id":"Consult_chateau_formulaired8e6","dept":"38","canton":"Meylan","commune":"Correnc","nom":"Bouqueron","type":"Château","periode":"XIII","histoire":"BOUQUERON, dans la commune de Corenc. Cité en 732 au XIe siècle Corennes, puis Coren, Corentz, Courenc et Corenc est un lieu attiré par la noblesse ; les Bouchayer, les Balthazar, les Cartier-Millon habitaient au XIIIe siècle et les Bouqueron qui possédaient le château au XVe siècle, cette famille n'avait pas une bonne réputation, rançonneur de voyageurs puis passa  par alliance aux Alleman, puis aux Sassenage, racheté ensuite par  Claude de Coct, riche trésorier du Dauphiné, ami du Dauphin, Louis XI qui l'anoblira, c'est ce dernier qui transformera la bâtisse ancienne en château, les descendants des de Coct, les de Chaillol et les de Coste garderont le château jusqu'à la Révolution.     Laurent de La Coste, président du parlement, dernier propriétaire de Bouqueron s'exilera en Italie en 1792. \r\nAu XIXe siècle le docteur Rey y installe un établissement thermal. Puis au docteur  Girard et  en 1908 le château est reprit par la famille Detrie. Tour des Chiens; maison forte construite sur les hauteurs de Corenc était la propriété d'André Dauphins  qui donna la maison forte d'Arvillier aux châtreusines de Prémol.  En 1211 elles échangèrent la MF contre les terres  appartenant aux chanoines de l'église de Saint-André de Grenoble .  Au XVIe siècle plusieurs propriétaires se succèdent, en 1789 Louis Besson  chevalier de l'ordre national, le dernier des seigneurs  d'Arvilliers  émigre.","architecture":"Ce château à conservé en partie l'aspect du XVe siècle, la vieille tour était encore habité au XXe siècle.                                                        La Tour du Chiens; au XIXe siècle appelé ferme car des bâtiments se construisirent autour de la tour s'appuyant contre, en 1904 ravagé par un incendie  il ne reste que la tour et au XXe siècle sept familles vivent sur ce site fortifié.","habitants":"Famille de Pierre de Bouqueron\r\nFamille de Coct\r\nFamille Détrie\r\n        \"","divers":"Château de Bouqueron. Tour du Chiens.","gps":"","images":["../image/image_38/38_Bouqueron_1.jpg","../image/image_38/38_Bouqueron_2.jpg"]},"Consult_chateau_formulairebe13":{"id":"Consult_chateau_formulairebe13","dept":"38","canton":"Chamagnieu","commune":"Bourcieu","nom":"Bourcieu","type":"Maison forte","periode":"XIV","histoire":"Bourcieu fut construit au XIIe siècle par la famille de Bourcieu, passa ensuite par alliance à la famille de La Fontaine, qui la gardèrent pendant deux siècles ; Ancelin de La Fontaine vendit en 1509 une partie de ses biens et en 1654 Nicole de Falaise Dame de Bellegarde épousa  Gaspard Noir , cette bâtisse modeste échappa à la destructions lors de la révolution.","architecture":"Maison forte,remontant au début du XIVe siècle bâtisse modeste reliés à deux grosses tours une ronde l'autre octogonale,  fenêtres à meneaux.","habitants":"Famille Bourcieu\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Bourcieu_1.jpg"]},"Consult_chateau_formulaire4f1e":{"id":"Consult_chateau_formulaire4f1e","dept":"38","canton":"Bourgoin-Jallieu","commune":"Bourgoin-Jallieu","nom":"Bourgoin_Jallieu","type":"Château","periode":"XII","histoire":"Bourgoin Jallieu: Au XIIe siècle plusieurs seigneurs se partagèrent la possession de Bourgoin, dont un Jean de Briord châtelain en 1317, puis absorbé par leurs puissants voisins, Henri de Brenc, chevalier et  sires de la Tour du Pin et le comté de Savoie. Humbert II vendit sa principauté au petit fils de Philippe VI de Valois, futur  Charles V en 1355, ce qui mit fin au conflit entre seigneurs. Le château de Bourgoin dont l'administration fut confié a un châtelain nommé par le Dauphin et dépendant de lui même, Guillaume de Roussillon était noble, il devait veiller à la défense et à l'entretien dans lequel il résidait. \r\nEn 1322 le seigneur Guy de Loras, passa ensuite sous le contrôle de Louis Pierre de Chapeau-Cornu, châtelain de la Tour du Pin, en 1410 il passe par dot à Humbert de Grolée, sénéchal et Bailli de Lyon, passa à la famille de Loras de nouveau en la personne d'Abel, puis aux de Carrier , vers 1540 Antoine de Maugiron,  ensuite aux  Micha de Burdin, passe  ensuite entre les mains de noble louis Gabriel de Planelli auxquels succédèrent de 1693 à la révolution le marquis de Grammont de Caderousse. Au Cours des journées de Juillet 1789, le château fut pillé, les fenêtres brisées, le duc de Caderousse en route pour l'émigration à Chambery  y séjourna en 1790 et vendit le château à Jean Barge, dont le fils fut anobli, Michel Barge de Certeau, avocat général à la cour de Grenoble, puis passa à Luc-Antoine Donin Champagneux avocat au parlement, maire et châtelain de Bourgoin secrétaire général au ministère de l'intérieur en 1807, les descendants occupèrent la propriétée jusqu'a la fin du XIXe siècle. \r\nCette ville possède un manoir qui fut construit pour Louis Antonin Lupin , industriel qui connut des déboires, vendit le château à un magistrat, Maître Patricot, puis à un entrepreneur  jallésien qui revendit  en 1927, ce manoir appartient à la commune de Jallieu  pour en faire l'hôtel de ville de Bourgoin-Jallieu.","architecture":"Le château primitif de Beauregard,  dont il ne reste que deux pans de murs fut bâti au XIIIe siècle au bord du plateau de Planbourgoin, il fut délaissé vers la fin du XIV au profit du château que l'on voit encore  aujourd'hui, le nouvel édifice devait se composer d'une grande maison carrée situé entre deux tours, la porte d'entrée se trouvait du côté de la cour Carnot, la tour hexagonal est pourvue d'un large escalier à vis, est la seul partie à peu prés conservée intacte. Le bourg entouré de remparts formait une enceinte de plus d'un kilomètre de mur, renforcée par des tours rondes ou carrées et quatre portes: la porte de Vienne, la porte St-Antoine, la porte de la Bourbe  et la porte neuve.                                                           Le manoir  de l'hôtel de ville est une bâtisse de forme rectangulaire flanquée d'un donjon de même hauteur que le corps de logis, ce dernier possède deux tourelles dont une en encorbellement.","habitants":"Famille de Louis-Antonin Lupin \r\n        \"","divers":"Vieux château des Quinsonnas","gps":"","images":["../image/image_38/38_Bourgoin_Jallieu_1.jpg","../image/image_38/38_Bourgoin_Jallieu_2.jpg","../image/image_38/38_Bourgoin_Jallieu_3.jpg","../image/image_38/38_Bourgoin_Jallieu_4.jpg","../image/image_38/38_Bourgoin_Jallieu_5.jpg","../image/image_38/38_Bourgoin_Jallieu_6.jpg","../image/image_38/38_Bourgoin_Jallieu_7.jpg","../image/image_38/38_Bourgoin_Jallieu_8.jpg","../image/image_38/38_Bourgoin_Jallieu_9.jpg"]},"Consult_chateau_formulaire4433":{"id":"Consult_chateau_formulaire4433","dept":"38","canton":"Tullins","commune":"Tullins","nom":"Boussiniere","type":"Maison forte","periode":"XVIII","histoire":"Boussiniere: Propriété acquise en 1644 par Louis de Glasson dont le fils ( François) fut anoblie, né vers 1650, nommé docteur en 1671, avocat à la cour de Grenoble.\r\nEn 1676 est nommé  \"conseiller\", secrétaire du Roy .","architecture":"Bâtisse rectangulaire flanquée de deux tours carrées.","habitants":"Famille de Frederic\r\nFamille de  Gaspard de Glasson\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Boussiniere_1.jpg"]},"Consult_chateau_formulaire2956":{"id":"Consult_chateau_formulaire2956","dept":"38","canton":"Morestel","commune":"Brangues","nom":"Brangues","type":"Château","periode":"XVII","histoire":"Brangues: Acquis  par François de Gratet en 1609 qui transformera la maison forte en château d'aujourd'hui, Racheté en 1830 par le Marquis de Quinsonas  dont la fille épouse le comte de Virieu et s'en sépare en 1927 en le vendant à Paul Claudel \"ambassadeur de France au Japon  et  à Washington \"qui l'acquit pour se retrouver avec sa famille lors des retours de voyages  et il  décéda en Février 1955 où il fut enterré dans le parc. Depuis 1972 ses descendants  s'associent aux souvenirs et aux oeuvres du Grand Poète.","architecture":"Château de Brangues de forme en un demi cercle fermé par deux bâtiments à deux étages et une tour ronde, prolongé par une dépendance flanquée d'une tourelle ceci dans un grand parc avec pavillon qui servait d'orangerie qui abrite la tombe de Paul Claudel.","habitants":"Famille de François de Gratet \r\nFamille de Paul Claudel\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Brangues_1.jpg","../image/image_38/38_Brangues_2.jpg","../image/image_38/38_Brangues_3.jpg","../image/image_38/38_Brangues_4.jpg"]},"Consult_chateau_formulairef229":{"id":"Consult_chateau_formulairef229","dept":"38","canton":"St-Etienne-de-St-Geoirs","commune":"Bressieux","nom":"Bressieux","type":"Vestiges","periode":"XIII","histoire":"Bressieux est dominé par les ruines de son château féodal, construit au XIIIe siècle, haut lieu de l'histoire de la province du Dauphiné, Bressieux fut, de l'an mil à la révolution, le siège d'un fief seigneurial important, et l'une des grandes baronnie du Dauphiné. La famille chevaleresque est connue depuis le Xe siècle, les seigneurs quittèrent le château pour délivré Jérusalem mené par l'empereur Frédéric Barberousse,  Philippe Auguste et Richard Cur de Lion, mais cette famille s'éteint en 1400. \r\nReprit par Antoine de Grolée, lieutenant général du roi du Dauphiné, il remania la forteresse en la transformant en maison de plaisance, fenêtres à meneaux remaniement du corps de logis ; les descendants des Grolée le gardèrent jusqu'en 1643, après l'avoir transformée en baronnies du Dauphiné en 1612. \r\nDans ce château séjourna François Ier.\r\nCette baronnie  passa aux Baume-Suze et ensuite mis en vente en 1720 et fut acheté en 1780 par François Joseph de Goutefrey qui en profitèrent jusqu'à la révolution , date de sa destruction  presque complète. Les propriétaires suivants essayèrent de  maintenir le peu qui restait puis le léguèrent à la commune de Bréssieux en 1966.","architecture":"les vestiges de Bressieux dans un style militaire construit en brique au XIIIe siècle, les courtines étaient flanquées de huit tours crénelées à mâchicoulis maçonnées en briques roses longueur de 50 mètres x  35 mètres de forme polygonale, des murs épais de 2 mètres renforcés par un fossé large de 30 mètres profond de 12 mètres et pont levis. Le châtelet d'entrée  élément restant  partiellement est composé de deux tours portières crénelées et mâchicoulis.","habitants":"Famille de Grolée\r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Bressieux_1.jpg","../image/image_38/38_Bressieux_2.jpg","../image/image_38/38_Bressieux_3.jpg","../image/image_38/38_Bressieux_4.jpg","../image/image_38/38_Bressieux_5.jpg"]},"Consult_chateau_formulaire1cf6-2":{"id":"Consult_chateau_formulaire1cf6-2","dept":"38","canton":"Beaurepaire","commune":"Moissieu-sur-Dollon","nom":"Bresson","type":"Château","periode":"XVI","histoire":"Bresson: Une première maison forte fut bâtie en 1400 par les Fromenton de Bresson, Amédée de Fromenton seigneur de Bresson, passa à Jean de Fromenton chevalier de Malte en 1561. La seigneurie passa à Gérard de Fromenton puis à son fils Claude de Fromenton, ses deux filles Françoise sa fille qui épousa en 1654 Claude de Luzy de Pelissac à qui elle apporta la maison forte de Bresson et Claudine eut pour mari François-Alphonse de Simiane seigneur de la Coste dont elle était veuve en 1704 dernière descendante de cette famille.","architecture":"Château  de Bresson de style Louis XIII  construit au XVIe siècle puis remanié au XVIIe siècle,","habitants":"Famille de Fromenton de Bresson\r\nFamille de Luzy de Pelissac\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Bresson_1.jpg","../image/image_38/38_Bresson_2.jpg","../image/image_38/38_Bresson_3.jpg"]},"Consult_chateau_formulaired082":{"id":"Consult_chateau_formulaired082","dept":"38","canton":"Echirolles","commune":"Bresson","nom":"Bresson_Echirolles","type":"Manoir","periode":"XVIII","histoire":"Bresson-Echirolles: Ce manoir du XVIIIe siècle remanié avec tours et tourelles, a été occupé par diverses familles les Pourroy, les seigneurs de Cras, les Montferrier, les Voissac,  les Vaulserre et les Saint-Alban. L'entrée possède les armes de la Famille de Renéville.","architecture":"Bâtisse de Bresson rectangulaire flanquée de deux tours et tourelles d'angles.","habitants":"Famille de Pourroy\r\nFamille de Renéville\r\n        \"","divers":"","gps":"","images":["../image/image_38/38_Bresson_Echirolles_1.jpg"]},"Consult_chateau_formulaire6904":{"id":"Cons
