sse","img":"../image/image_52/52_St_Dizier_1.jpg"},{"id":"Consult_chateau_formulaire67e6","nom":"Trémilly_Nully","commune":"Trémilly","type":"Château","img":"../image/image_52/52_Tr%c3%a9milly_Nully_1.jpg"},{"id":"Consult_chateau_formulaire3c79","nom":"Vaudrémont","commune":"Vaudrémont","type":"Château","img":"../image/image_52/52_Vaudr%c3%a9mont_1.jpg"},{"id":"Consult_chateau_formulaire544f","nom":"Vignory","commune":"Vignory","type":"Château fort","img":"../image/image_52/52_Vignory_1.jpg"},{"id":"Consult_chateau_formulairebb1a-2","nom":"Villars_en_Azois","commune":"Villars en Azois","type":"Château","img":"../image/image_52/52_Villars_en_Azois_1.jpg"},{"id":"Consult_chateau_formulaireb18c","nom":"Vivey","commune":"Vivey","type":"Manoir","img":"../image/image_52/52_Vivey_1.jpg"},{"id":"Consult_chateau_formulaire63e6","nom":"Vraincourt","commune":"Vroncourt la côte","type":"Château","img":"../image/image_52/52_Vraincourt_1.jpg"}];const FULL={"Consult_chateau_formulaireed34":{"id":"Consult_chateau_formulaireed34","dept":"52","canton":"Châteauvillain","commune":"Arc en Barrois","nom":"Arc en Barrois","type":"Château","periode":"XVI-XVIII","histoire":"ARC en BARROIS, Au XIe siècle  était la possession des seigneurs de Bar sur Aube puis passa par alliances aux Broyes, aux Montagu, puis à Guillaume de Vienne, au XVe siècle Françis II de Vienne sans postérité, légua ses biens à son neveu Antoine de Beaufremont conseiller d'état gentilhomme  de la chambre du roi et capitaine, obtient du roi Henri III l'érection de son domaine. En 1622    Arc est vendu à Nicolas  de L'Hôpital marquis de Vitry , maréchal de France, pour son fils François  et son épouse  Lucrèce Bouhier qui son à l'origine de la construction du château. François duc de Vitry meurt sans enfants en 1679 le domaine est acquis par  Jean André d'Aldebert  comte de Morsteim, son fils Michel en 1690, la seigneurie d'Arc et de Châteauvillain sont adjugées en 1700 à Louis  Alexandre  de Bourbon, comte de Toulouse fils légitime de Louis XIV et de Mme de Montespan. Le  château actuel fut construit vers 1845, à la demande de la Princesse Adélaïde dOrléans, sur cadette du roi des Français Louis-Philippe Ier. A la mort de celle-ci, en 1847, le château alla dans les mains de son filleul, le Prince de Joinville,  est, aujourdhui, un domaine privé, fermé au Public. La Maison d'Orléans racheta les restes à la fin de l'Empire et le troisième château fut construit pour le Roi Louis-Philippe, par sa sur Adélaïde. Elle avait prévu d'y placer sur le perron la statue de son frère, mais le château terminé, il n'était plus Roi. Son neveu, le Prince de Joinville, hérita du domaine. le duc de Guise, le prétendant au trône de France passa en indivie entre ses quatre enfants, comte de Paris , Christophe de Grèce, la duchesse d'Aoste et Pierre  Murat et le vendirent  en 1971 à une société pour y  installer un hôtel de luxe.","architecture":"ARC en BARROIS,  au XIIIe siècle un premier château-fort édifié à l'emplacement d'un camp romain sur la colline de la Motte a été détruit par les invasions successives. Au Moyen-Age, à l'emplacement du château fut construite la Tour de l'Horloge. Elle était située dans une première enceinte de murs de 2,64 m de large, 5 m de haut, avec dix petites tours de guet et un pont-levis. Des fossés entouraient ce mur. Une deuxième enceinte de deux mètres de haut protégeait tout le village. A la Révolution tout a été détruit et les fossés comblés.  le château quadrilatère élevé sur un rez-de-chaussée, soubassement et étages  coiffé d'un toit en croupes. Cantonné à ses angles de trois pavillons carrés  et d'une tour à pans  coupés. Ces deux façades principales comporte à leur centre un avant corps  à ouvertures cintrées formant loggia à colonnes.  Le château et le parc ont connu des propriétaires successifs, le prince de Joinville, hérita du domaine, c'est lui qui fit bâtir la Machine à vapeur et la Glacière pour son château, ainsi qu'une pompe à eau. Le château servi d'hôpital militaire de 1915 à 1918. La forêt de 11000 hectares, appartenant à la Maison d'Orléans a été vendue en 1971, à l'État.  \r\nÉléments protégés MH : le château d'Arc-en-Barrois : le décor du salon et de la salle à manger: les boiseries, les cheminées et les toiles de Durand-Brager et de Morel-Fatio illustrant les bombardements de Mogador et de Tanger : inscription par arrêté du 2 juillet 2015.","habitants":"Famille de  François  de L'Hôpital duc de Vitry, et la      Princesse Adélaïde dOrléans\r\n        \r\n        \"","divers":"Arc en Barrois  GPS : 47° 56' 51\" Nord, 5° 00' 25\" Es","gps":"47° 56' 51\" Nord, 5° 00' 25\" Es","images":["../image/image_52/52_Arc_en_Barrois_1.jpg","../image/image_52/52_Arc_en_Barrois_2.jpg","../image/image_52/52_Arc_en_Barrois_3.jpg","../image/image_52/52_Arc_en_Barrois_4.jpg","../image/image_52/52_Arc_en_Barrois_5.jpg"]},"Consult_chateau_formulaire8d16":{"id":"Consult_chateau_formulaire8d16","dept":"52","canton":"Chaumont","commune":"Chaumont","nom":"Ars_Tour","type":"Manoir","periode":"XIII-","histoire":"TOUR D'ARSE, la Tour d'Arse est une tour bâtie à Chaumont. La construction date du XIIIe siècle. Elle appartient à la ceinture des remparts, et se situe au Sud-Ouest de la cité. Elle servait d'arsenal pour la défense militaire de la ville de Chaumont. Alors que la défense était, de moins en moins, à l'esprit des habitants, la Tour d'Arse est devenue une boulangerie. Elle a conservé de nombreuses structures en bois.                                                                                               Le Couvent des CARMELITES, est devenu une bibliothèque municipale. Après la Révolution Française, il fut occupé par la Préfecture. Façade de la chapelle reconstruite vers 1866 (installation musée, bibliothèque). Le plafond de la salle du 1er étage de l'ancienne chapelle a été classé partiellement aux M.H. depuis le 24/07/1972. Le Couvent des Carmélites de Chaumont a été classé aux M.H. depuis le 24/07/1972.","architecture":"TOUR D'ARSE, l'ancien château du XIIe siècle domine la vallée de la Suize et de la Marne, pour des raisons stratégiques. Il est l'effigie de la puissance des comtes de Champagne. Il est composé de 12 tours et de trois portes. Le donjon a été construit à la même époque. Dernier témoignage du château des comtes de Champagne, est considéré comme le \"berceau de la ville\". La tour médiévale haute de 19 m a conservé son aspect d'origine avec ses murailles à bossage épaisses de 2,60 m (au pied  et de 1,50 m (au sommet). À l'origine élément du système défensif du château, il sera par la suite transformé en prison  (vers 1830). Ses murs intérieurs conservent encore de nombreux témoignages de cette époque sous forme de graffitis gravés dans la pierre par les prisonniers. Au pied du donjon, les salles basses de l'ancien château abritent le Musée d'art et d'histoire de la ville. Le donjon est aussi dénommé la Tour Hautefeuille, par le simple fait que les Comtes d'Hautefeuille, connus par leurs présences au Mont Aimé et en Picardie furent les seigneurs de ces lieux, avant les comtes de Champagne. Le Château de Chaumont date du XIe et XIIe siècle.                                                                                                                               La construction de l'Hotel de Ville date de 1787 à 1790, sur les plans de l'Architecte François-Nicolas Lancretu.","habitants":"Comtes d'Hautefeuille,\r\n        \r\n        \"","divers":"TOUR GPS : 48° 06' 42\" Nord, 5° 08' 20\" Est                                                                  Couvent GPS : 48° 06' 50\" Nord, 5° 08' 26\" Est","gps":"48° 06' 42\" Nord, 5° 08' 20\" Est","images":["../image/image_52/52_Ars_Tour_1.jpg","../image/image_52/52_Ars_Tour_2.jpg"]},"Consult_chateau_formulaire081a":{"id":"Consult_chateau_formulaire081a","dept":"52","canton":"Villegusien-le-Lac","commune":"Auberive","nom":"Auberive","type":"Château","periode":"XII- XVIII","histoire":"AUBERIVE, le château d'Auberive, a été construit dans le style du XVIIIe siècle par Camille Moine, maître de forges à Auberive. Cette vaste demeure bâtie au XIXe siècle et ses dépendances sont visibles en remontant la côte vers la rue des gardes des bois de l'abbaye. On y distingue le parc, vestige d'un authentique jardin anglais avec son orangerie édifiée également au XIXe siècle.","architecture":"AUBERIVE, ancienne et riche abbaye cistercienne, Auberive fut fondée en 1135 sur les bords de l'Aube par Saint Bernard et l'évêque de Langres, Villain d'Aigrement, avec l'appui des seigneurs environnants (Les Grancey, les Champlitte, les Rochetaillée et leurs vassaux).  Le monastère, particulièrement prospère au XIIe siècle, subit les ravages de la guerre de Cent Ans, des guerres de Religion au XVIe siècle, puis de la guerre de Trente Ans du XVIIe siècle  situé à la frontière champenoise et bourguignonne. Les vieux bâtiments furent reconstruits au XVIIIe siècle dans le grand mouvement de reconstruction des abbayes initié par St Denis à Paris. Au XIXe siècle, elle devient une maison centrale pour femme. Sa plus célèbre prisonnière fut Louise Michel, incarcérée 20 mois après les événements de la Commune.  L'abbaye d'Auberive est aussi un haut lieu culturel avec de nombreux évènements tout au long de l'année.","habitants":"seigneur local\r\n        \r\n        \"","divers":"Auberive  GPS : 47° 47' 19\" Nord, 5° 03' 39\" Est","gps":"47° 47' 19\" Nord, 5° 03' 39\" Est","images":["../image/image_52/52_Auberive_1.jpg","../image/image_52/52_Auberive_2.jpg","../image/image_52/52_Auberive_3.jpg","../image/image_52/52_Auberive_4.jpg","../image/image_52/52_Auberive_5.jpg"]},"Consult_chateau_formulaire26a3":{"id":"Consult_chateau_formulaire26a3","dept":"52","canton":"Châteauvillain","commune":"Autreville sur la Renne","nom":"Autreville","type":"Château","periode":"XVIII-XIX","histoire":"AUTREVILLE, édifice bâti autour de 1738 selon les plans de l'architecte Jean-Baptiste Bouchardon, pour Claude Courtet mousquetaire du roi. Le château est vendu comme bien national en 1792.   Éléments protégés MH : les bâtiments entourant la cour d'honneur en totalité, la clôture de la cour sur la rue avec sa grille, les façades et les toitures des bâtiments de la cour nord et le parc : inscription par arrêté du 26 juillet 2004.","architecture":"AUTREVILLE, le château, darchitecture classique, date du XVIIIe siècle vers 1730.  Ce château est une propriété privée. Il date du 2ème quart du XVIII siècle. Il fut construit autour de 1738, Le plan de Bouchardon n'a pas été respecté : les ailes de remises n'y apparaissent pas. A l'intérieur, le grand escalier qui avait été prévu dans le hall d'entrée n'a pas été réalisé. Il a été placé sur le côté et semble avoir subi une reprise importante au XXe siècle. La cheminée et les lambris du mur sud sont un remontage du XIXe siècle. La salle à manger et l'ancien appartement de madame ont conservé leur distribution ancienne et une partie de leurs lambris du XVIIIe siècle. La chambre a conservé son alcôve et son parquet Versailles. Dans la partie nord, la chambre de monsieur possède toujours son alcôve et la cuisine a gardé sa cheminée ancienne. La pièce de rangement a conservé ses placards XVIIIe, et la salle de bain, son dallage. Le parc a perdu son dessin original. Un dôme à l'impériale a été employé sur les deux petites ailes. Le Château d'Autreville-sur-la-Renne fut vendu, après la Révolution, comme bien national, en 1792.","habitants":"Famille de Claude Courtet\r\n        \r\n        \"","divers":"Autreville GPS : 48° 06' 55\" Nord, 4° 58' 34\" Est","gps":"48° 06' 55\" Nord, 4° 58' 34\" Est","images":["../image/image_52/52_Autreville_1.jpg","../image/image_52/52_Autreville_2.jpg"]},"Consult_chateau_formulaire7a84":{"id":"Consult_chateau_formulaire7a84","dept":"52","canton":"Eurville-Bienville","commune":"Eurville-Bienville","nom":"Bienville_Eurville","type":"Château","periode":"XVII-XVIII","histoire":"BIENVILLE, château édifié au milieu du XVIIIe siècle. Le corps de bâtiment est prolongé par deux ailes de communs en retour dessinant un plan en U. Des deux ailes, l'aile sud est la plus ancienne, représentée sur un plan de route des années 1760.Ce château a été construit, pour Maurice Jean-Baptiste Thomassin de Bienville (1716-1782) à lemplacement dun ancien manoir, propriétaire des forges.   Éléments protégés MH : les façades et les toitures du château, des communs, des dépendances et de la maison du jardinier ; le parc, y compris son mur de clôture ; le jardin potager, en totalité : inscription par arrêté du 26 décembre 2001.                                                                  EURVILLE; le baron François de Lespérut, anobli par Napoléon 1er suite à ses faits darmes remarquables en Silésie, est à la tête dune fortune considérable, il possède les usines dEurville, des fermes à Eurville, Bienville et à Narcy, une tuilerie au Bois Sottier à Narcy, des bois à Gourzon, Chevillon, Chatonrupt, 650 hectares en forêt du Val où il organise des chasses à courre. Le domaine est resté dans la famille jusquen 1954 ; descendants des de Lespérut, les familles de Monicault et les marquis des Réaulx, derniers propriétaires. Le château, lorangerie, la maison du régisseur, le pigeonnier, la conciergerie, les communs et le parc ont été achetés par la commune qui aménagera trois salles de classe et des logements pour les enseignants dans le château. La dernière classe sera fermée en 1988.","architecture":"EURVILLE; construit au XVIIIe siècle, le château dEurville a été rénové et agrandi en 1838 ; construction dun 2ème étage avec des mansardes par ses propriétaires, les barons de Lespérut. Pendant 76 ans, de 1808 à 1884, 3 barons vont se succéder à la mairie dEurville. Les trois seront également conseillers généraux, un sera député et un autre président du conseil général de Haute-Marne. \r\nBIENVILLE,  le château de Bienville date du XVIIIe siècle, son parc à l'anglaise, sa cour d'honneur et son potager muni de ses murs, ses grilles et ses serres d'origine, a été rénové.  Le plan du bâtiment principal est rectangulaire et sur les côtés, se trouvent deux ailes en retour. Laile Nord Ouest semble la plus récente et comporte une chapelle dont lexistence était attestée en 1771.  L'aile nord renfermant une chapelle dédiée à Saint-Jean-Baptiste est citée en 1780, indiquant une seconde campagne de construction au XVIIIe siècle. Le corps de logis comprend des cheminées en marbre du XIXe siècle et des pièces lambrissés. Le parc est représentatif des parcs romantiques du XIXe siècle. Dessiné après 1837, il comprend 2 pigeonniers, dont l'un a été transformé en orangerie, des dépendances et un jardin potager à l'ouest. La maison du jardinier date de 1808. Le château de Bienville est une propriété privée, fermée au Public.\r\nÉléments protégés MH : les façades et les toitures du château, des communs, des dépendances et de la maison du jardinier ; le parc, y compris son mur de clôture ; le jardin potager, en totalité : inscription par arrêté du 26 décembre 2001.","habitants":"Famille de Maurice Jean-Baptiste Thomassin de Bienville      Famille du baron François de Lespérut\r\n        \r\n        \"","divers":"Bienville GPS : 48° 35' 09\" Nord, 5° 02' 14\" Est","gps":"48° 35' 09\" Nord, 5° 02' 14\" Est","images":["../image/image_52/52_Bienville_Eurville_1.jpg","../image/image_52/52_Bienville_Eurville_2.jpg","../image/image_52/52_Bienville_Eurville_3.jpg","../image/image_52/52_Bienville_Eurville_4.jpg","../image/image_52/52_Bienville_Eurville_5.jpg","../image/image_52/52_Bienville_Eurville_6.jpg"]},"Consult_chateau_formulaire84c8":{"id":"Consult_chateau_formulaire84c8","dept":"52","canton":"Châteauvillain","commune":"Colombé les deux églises","nom":"Boisseries","type":"Manoir","periode":"XIX-XX","histoire":"BOISSERIE, lieu de mémoire où vécurent Mr et Mme De Gaulle, Général puis Président de la République. Sa construction date de 1919 et 1946. Bourdelle était le Sculpteur. De Gaulle acquiert la \"Boisserie\" le 9/06/1934. En 1946, il fit construire la tour pour y installer son bureau, dans lequel il écrira ses mémoires.","architecture":"BOISSERIE; de plan en équerre, à deux niveaux, une tour hexagonal  à été rajoutée au XXe siècle de trois niveaux Les pièces du rez-de-chaussée (salle à manger, salon, bibliothèque, bureau ont conservé l'aménagement qu'elles avaient, au décès du Général De Gaulle. Le jardin est orné de 2 statues dont l'une fut réalisée par le sculpteur Bourdelle en 1919, et fut offerte au général, en 1944. La Boisserie et son parc, y compris la clôture sur rue ont été inscrits aux M.H. depuis le 6/09/2004. La Boisserie est privée.\r\nÉléments protégés MH : les façades et les toitures du château, des communs, des dépendances et de la maison du jardinier ; le parc, y compris son mur de clôture ; le jardin potager, en totalité : inscription par arrêté du 26 décembre 2001.","habitants":"Famille du général de Gaulle\r\n        \r\n        \"","divers":"Boisserie GPS : 48° 13' 07,68\" Nord, 4° 52' 59,52\" Est","gps":"48° 13' 07,68\" Nord, 4° 52' 59,52\" Est","images":["../image/image_52/52_Boisserie_1.jpg","../image/image_52/52_Boisserie_2.jpg"]},"Consult_chateau_formulaire8856":{"id":"Consult_chateau_formulaire8856","dept":"52","canton":"Bologne","commune":"Bologne","nom":"Bologne","type":"Château","periode":"XVI-XVIII-XIX","histoire":"MARAULT,  c'est au XIXe que l'on assistera à son réaménagement par la famille d'Hennezel, propriétaire des lieux à cette époque.                                                                                                       A trois K.M. à l' Est BRIAUCOURT, ce château a appartenu aux familles de Giey, de Grand et Labbé et fait toujours partie du patrimoine de leur descendance.","architecture":"BRIAUCOURT, le château domine la vallée de la Marne, il se compose de bâtiments de styles différents, construits au XVIIIe siècle en s'appuyant sur une partie moyenâgeuse dont il subsiste d'ailleurs des tours. La façade principale est en forme de croissant ce qui lui confère son originalité. La construction du château de Briaucourt date du XIIIe et XVIIIe siècle, il est inscrit aux M.H. depuis 1981.Éléments protégés MH : les façades et toitures du château, des deux tours de guet, du donjon, du pigeonnier, des granges et des communs et l'escalier du salon avec sa rampe en fer forgé.                                                                                                           MARAULT, La construction  date du XVIe, XVIIIe et XIXe siècle, il est  basé sur un site ancien encore entouré de douves, présente un ensemble de bâtiments datant de différentes époques. La porterie, reconstruite au XVIe siècle, est le bâtiment le plus ancien et présente un bel exemple d'architecture fortifiée que les modernisations n'ont pas dénaturé. Le système de bretèches protégeant les ouvertures, l'emplacement des bouches à feu, l'absence d'ouverture dans les murs sont encore visibles. Au XVIIIe siècle, un pigeonnier est construit. Le bâtiment du logis a également été reconstruit et conserve une cage d'escalier avec rampe en fer forgé ainsi que quelques cheminées datant du XVIIIe siècle. Le château de Marault a été inscrit aux M.H. depuis 2007. C'est un château ouvert au public, qui se visite. Éléments protégés MH : la porterie d'entrée en totalité ; le pont d'accès ; les douves, le pigeonnier, le logis (à l'exception du petit bâtiment accolé au sud), les parcelles contenues dans l'espace circonscrit par les douves et leur sous-sol : inscription par arrêté du 24 janvier 2007.","habitants":"Briaucour; famille de Giey,                                                       Marault, famille d'Hennezel\r\n        \r\n        \"","divers":"Briaucourt  grav 1 GPS : 48° 12' 41,75\" Nord, 5° 11' 18,05\" Est                                                                                                Marault grav 2-3-4 GPS : 48° 11' 13\" Nord, 5° 06' 15\" Est","gps":"48° 12' 41,75\" Nord, 5° 11' 18,05\" Est","images":["../image/image_52/52_Bologne_1.jpg","../image/image_52/52_Bologne_2.jpg","../image/image_52/52_Bologne_3.jpg","../image/image_52/52_Bologne_4.jpg"]},"Consult_chateau_formulaire5193":{"id":"Consult_chateau_formulaire5193","dept":"52","canton":"Bourbonne-les-Bains","commune":"Bourbonne-les-Bains,","nom":"Bourbonne","type":"Château","periode":"XVII-XIX","histoire":"BOURBONNE les BAINS, station thermale,  depuis la fin du XIe siècle, avec Renier, la seigneurie appartient aux Choiseul. Le 26 Mai 1324 Renard vend au roi de France une portion de seigneurie de Bourbonne les Bains et conserve le château, les fossés alentour, la grange devant, la place jusqu'à ladite grange et jusqu'au châtel. Devenu par mariage propriétaire du château en 1777, le comte d'Avaux remploie ses pierres dans la reconstruction des thermes, en 1783. Pour le remplacer, un manoir a été élevé dans la basse-cour, avant 1731. Le 7 Avril 1821, le comte d'Ogny le vend à Victor Lahérard. Son successeur de 1859 à 1869, Renard Olive Tonnet, est l'auteur d'importants travaux de rénovation, de la maison et de la porterie, aménagements intérieurs, fenêtres, crénelages. Georges Chevandier de Valdrome l'acquiert en 1880 et en 1909 il le lègue, en reconnaissance des bienfaits des eaux thermales, à la commune de Bourbonne les Bains.","architecture":"BOURBONNE, en 1770, Diderot évoque le château dont les ruines, vues le soir de la hauteur du prieuré, font un effet pittoresque. La construction du château de Bourbonne date du XVe au XVIIIe siècle. Lors de l'incendie de 1717 qui ravagea une partie de la ville, la demeure seigneuriale fut détruite. Tout au long du XVIIe siècle, son état se dégrada.  le château de Bourbonne, en reconnaissance des bienfaits des eaux thermales, à la commune de Bourbonne-les-Bains. Si le château est privé, seul le parc  est accessible et ouvert au public.","habitants":"Famille du  comte d'Ogny\r\n        \"","divers":"GPS : 47° 57' 14\" Nord, 5° 45' 01\" Est","gps":"47° 57' 14\" Nord, 5° 45' 01\" Est","images":["../image/image_52/52_Bourbonne_1.jpg","../image/image_52/52_Bourbonne_2.jpg","../image/image_52/52_Bourbonne_3.jpg","../image/image_52/52_Bourbonne_4.jpg"]},"Consult_chateau_formulaire9946":{"id":"Consult_chateau_formulaire9946","dept":"52","canton":"Villegusien-le-Lac","commune":"Chalancey","nom":"Chalancey","type":"Château","periode":"XVI-XVII","histoire":"CHALANCEY,  ancienne forteresse médiévale, le château de Chalancey reçut le roi Louis XIII et logea la \"Montespan\" durant plusieurs années avant qu'elle ne vive à Versailles.","architecture":"CHALANCEY, la construction du château date du XVIe siècle et XVIIe siècle. La demeure a été reconstruite au XVIIe siècle. Les façades et les toitures  y compris celles de la porterie, le mur d'enceinte extérieur avec ses 2 passerelles en forme d'arche, au dessus de la rue Basse et l'enceinte intérieure avec les douves ; les pièces suivantes avec leur décor : au rez-de-chaussée : le hall d'entrée, la salle à manger, la chambre à alcôve, la chambre de la Baronne avec alcôve, au premier étage : le grand salon, la chambre rose, la chambre du Roi avec alcôve, le cabinet orné de stucs, montrant des griffons, la chambre bleue à alcôve, le cabinet voûté décoré à caissons, la chambre à 2 alcôves. Le château de Chalancey est inscrit aux M.H. depuis 1982.","habitants":"Comtesse de Montespan\r\n        \"","divers":"Chalancey, GPS : 47° 40' 37,84\" Nord, 5° 08' 29,01\" Est","gps":"47° 40' 37,84\" Nord, 5° 08' 29,01\" Est","images":["../image/image_52/52_Chalancey_1.jpg"]},"Consult_chateau_formulaireff49":{"id":"Consult_chateau_formulaireff49","dept":"52","canton":"Chaumont-2","commune":"Chamarande-Choignes","nom":"Chamarande","type":"Château","periode":"XVI-XVIII","histoire":"CHAMARANDE, la famille Poiresson possédait le château depuis 1560. Le château fut construit pour Jean II de Poiresson. Les aménagements du château et de son parc ont été réalisés vers 1740, probablement par larchitecte Jean Baptiste Bouchardon, très actif à Chaumont en Haute-Marne et ses environs, pour un de ses descendants, Adrien François De Poiresson.","architecture":"CHAMARANDE, château construit au XVIIIe siècle entouré d'un magnifique parc ; ile de verdure enserrée dans une boucle de la Marne qui forme un bief, ce parc réuni un ensemble de jardins allant du classicisme au jardin romantique à langlaise et qui sallie au beau jardin du XVIIIe siècle, à la française, conçu sur les plans du célèbre architecte et sculpteur Chaumontais Jean-Baptiste Bouchardon. Splendide vue sur la belle façade classique du château de Chamarande côté cour et côté jardin. Beau pigeonnier datant également du XVIIIe siècle.","habitants":"Famille Poiresson \r\n        \r\n        \r\n        \"","divers":"Gps 48° 30' 46\" nord, 2° 13' 15\" est","gps":"","images":["../image/image_52/52_Chamarandes_1.jpg","../image/image_52/52_Chamarandes_2.jpg","../image/image_52/52_Chamarandes_3.jpg"]},"Consult_chateau_formulaireddc9":{"id":"Consult_chateau_formulaireddc9","dept":"52","canton":"Nogent","commune":"Changey","nom":"Changey","type":"Château","periode":"XVIII","histoire":"CHANGEY,  le château de Changey est construit en 1740 pour Jean-Baptiste Delecey, maire de Langres de 1738 à 1740.  Musée d art et d histoire de Langres .","architecture":"CHANGEY, la construction du château de Changey date de 1740, Le château de Changey est inscrit partiellement aux M.H. pour le Logis, l'espace de la cour d'entrée, les 2 tours d'angle de la cour d'entrée, le mur qui sépare les 2 tours depuis le 25/08/1994. Le château de Changey se visite, totalité du logis, l'espace de la cour d'entrée, les deux tours d'angle de la cour d'entrée, et le mur qui sépare les deux tours sont inscrits à l'Inventaire Supplémentaire des M.H. depuis le 25 août 1994. Le parc possède un jardin potager, un puits, une terrasse en terre plein, un verger, une conciergerie, une clôture de jardin, un four à pain, et un beau portail.","habitants":"Famille de Jean-Baptiste Delecey\r\n        \"","divers":"GPS : 47° 55' 38\" Nord, 5° 23' 11\" Est","gps":"47° 55' 38\" Nord, 5° 23' 11\" Est","images":["../image/image_52/52_Changey_1.jpg","../image/image_52/52_Changey_2.jpg","../image/image_52/52_Changey_3.jpg","../image/image_52/52_Changey_4.jpg","../image/image_52/52_Changey_5.jpg"]},"Consult_chateau_formulaire05e8":{"id":"Consult_chateau_formulaire05e8","dept":"52","canton":"Joinville","commune":"Charmes en l","nom":"Charmes_en_Angles","type":"Château","periode":"XVIII","histoire":"CHARMES EN l'ANGLES,    le château de Charmes en l'Angle a été construit au XVIIIe siècle,  la porte monumentale provenant de la maison sise Grande Rue à Joinville (Haute Marne). L'édifice est situé au centre d'un magnifique parc arboré..","architecture":"CHARMES EN l'ANGLES,  la construction du château de Charmes-en-L'Angle date du XVIIIe siècle. Le château possède une porte monumentale qui vient de la maison à Joinville protégée par les M.H. le 12/07/1934. Le château de Charmes-en-l'Angle est inscrit partiellement  aux M.H. depuis 1934.","habitants":"\"","divers":"GPS : 48° 22' 24\" Nord, 5° 00' 19\" Est","gps":"48° 22' 24\" Nord, 5° 00' 19\" Est","images":["../image/image_52/52_Charmes_en_Angles_1.jpg"]},"Consult_chateau_formulaire0897":{"id":"Consult_chateau_formulaire0897","dept":"52","canton":"Nogent","commune":"Rolampont","nom":"Charmoilles","type":"Château","periode":"XV-XVII","histoire":"CHARMOILLES-ROLAMPONT ,  le village de Charmoilles fut partagé plus tard entre trois seigneurs qui y avaient chacun leur château : il paraît que pendant longtemps, les droits de ces seigneurs n'étaient pas fixés d'une manière bien précise , il y a eu des seigneurs du nom de Charmoilles dés le XIIe siècle. Thierry, chevalier, vivait en 1164. De Teicie, sa femme, il avait eu deux fils, Garnier et Eudes, et une fille, Mabilie. C'est vers celte époque que la seigneurie fut divisée, car à la fin du XIIe siècle Renier de Nogent en possédait une partie, qu'Elisabeth, sa fille, apporta en dot en 1228 à Guy de La Roche, seigneur de Châtillon. On trouve Erard de Charmoilles en 1236, et vingt-cinq ans plus tard Jean, écuyer, le  fils du chevalier Hugues. Au XVe siècle, l'une des seigneuries laïques appartenait déjà aux Montarby de Dampierre, et l'on voit dans l'église la tombe de Perceval de Montarby, capitaine de Coiffy ; il est représenté en pied et revêtu de son armure. L'autre était aux Saint-Seine. Mais à cette époque le village était à peu près dépeuplé, « le territoire en désert et de nulle valeur», ainsi que le prouve un dénombrement que Guillaume de Saint-Seine présenta au roi en 1414. D'après ce document, les habitants étaient de serve condition, de main-morte, poursuite et for-mariage, taillables à volonté une fois l'an, le château fort appartenait à ce Guillaume de Saint-Seine, seigneur dominant. C'est celui qui est au nord ; le ruisseau en arrosait les fossés. Il a encore conservé ses vieilles tours. Le second, appelé La Baronnie, est dans une position plus agréable, du côté de Langres .","architecture":"CHARMOILLES,  château fortifié, dont les fossés sont alimentés par les eaux de la Coudre, qui est devenu au cour des siècles demeure de plaisance. Il garde son caractère défensif  malgré les modifications intervenues au XVe siècle.: site privée visible uniquement de l'extérieur.  C'est un château fortifié, dont les fossés sont alimentés par les eaux de la Coudre. Il est devenu, au cours des siècles, une demeure de plaisance. Il a conservé son caractère défensif, malgré certaines modifications qui sont intervenues au XVe siècle. Le château de Charmoilles est privé.                                                                                                          ROLAMPONT, la construction du château de Rolampont date du XVIIe siècle. Il est fermé au Public. Le site est privé, visible uniquement de la route.","habitants":"Famille d'Erard de Charmoilles  et de  Guillaume de Saint-Seine\r\n        \"","divers":"Charmoilles grav-1-2                                                                        GPS : 47° 56' 48\" Nord, 5° 21' 35\" Est                                                               Rolampont    grav-3-4                                                                GPS : 47° 57' 02\" Nord, 5° 17' 15\" Est","gps":"47° 56' 48\" Nord, 5° 21' 35\" Est","images":["../image/image_52/52_Charmoilles_1.jpg","../image/image_52/52_Charmoilles_2.jpg","../image/image_52/52_Charmoilles_3.jpg","../image/image_52/52_Charmoilles_4.jpg"]},"Consult_chateau_formulaire154e":{"id":"Consult_chateau_formulaire154e","dept":"52","canton":"Chateauvillain","commune":"Chateauvillain","nom":"Chateauvillain","type":"château","periode":"XV-XVI","histoire":"CHATEAUVILLAIN, la Tour de l'Auditoire marquait quant à elle la limite est du château. Elle était affublée de nombreuses barbacanes qui aujourd'hui ont disparu. C'est dans cette tour que le seigneur rendait la justice. Il est même arrivé qu'on y juge des animaux comme cela se pratiquait au moyen-âge. La partie supérieure de la Tour était anciennement un colombier. Aujourd'hui, la Tour de l'Auditoire dont l'intérieur a été entièrement rénové, accueille le petit musée de la ville avec sa salle des maquettes. La salle du colombier reçoit les uvres de Jean Rouot, ancien maire de la ville et conseiller. L'ancienne salle du tribunal a été transformée en lieu d'expositions éphémères. Des animations y sont proposées chaque année en période estivale. On accède à ces trois niveaux par un escalier à vis monumental. On entre dans la Tour de l'Auditoire par la cour dont l'accès se trouve rue de Penthièvre. Un second château a été construit dans la cour du château médiéval en 1627 par Nicolas de L'Hospital duc de Vitry (Capitaine des gardes de Louis XIII).","architecture":"CHATEAUVILLAIN,  en 1160, Simon de Broyes, premier seigneur de Châteauvillain aménage le donjon en demeure résidentielle. Trente ans plus tard un château entouré de remparts est construit. Le périmètre occupé par le château médiéval et ses dépendances se suit encore aisément sur le plan actuel de Châteauvillain. On y entrait par une tour-porte monumentale bâtie en pierres à bossages. Elle était équipée d'un double pont-levis qui enjambait un large fossé entourant le château. Cette porte a été abattue en 1830 pour y faire passer la rue de Penthièvre. De part et d'autre de la porte s'étendaient les écuries du château. A l'angle sud-ouest, on trouve encore aujourd'hui la tour de guet, de plan carré, construite en place de la tour circulaire initiale qui s'était éboulée. Cette tour a été équipée d'ouvertures sur ses quatre faces pour permettre le tir à l'arquebuse. musée de la ville avec salle des maquettes. Ce château date du XVe et XVIe siècle. Quatre rues permettent d'accéder à l'ancien château :  Il n'en reste que des ruines. Fortifiée aux XIIe et XIVe siècles, Châteauvillain possède encore une vingtaine de tours (Il en existait une soixantaine). La ville de Châteauvillain s'est construite, au XIIe siècle, autour d'un imposant donjon de 45 mètres de hauteur, doté de murs de 5 mètres d'épaisseur. Un premier château médiéval fortifié date de cette époque.  Ce château a été partiellement détruit au XIXe siècle pour tracer la rue principale actuelle de la ville en 1835. Le donjon a également disparu à cette époque, possède aussi un très beau Parc aux Daims de 272 ha, éléments protégés MH : les vestiges du château : inscription par arrêté du 27 juin 1983. La partie du mur d'enceinte : inscription par arrêté du 24 janvier 1927.","habitants":"Chateauvilain famille de Nicolas de L'Hospital duc de Vitry \r\n        \"","divers":"GPS : 48° 02' 06\" Nord, 4° 54' 55\" Est","gps":"48° 02' 06\" Nord, 4° 54' 55\" Est","images":["../image/image_52/52_Chateauvillain_1.jpg","../image/image_52/52_Chateauvillain_2.jpg","../image/image_52/52_Chateauvillain_3.jpg","../image/image_52/52_Chateauvillain_4.jpg","../image/image_52/52_Chateauvillain_5.jpg","../image/image_52/52_Chateauvillain_6.jpg"]},"Consult_chateau_formulaire6e2e":{"id":"Consult_chateau_formulaire6e2e","dept":"52","canton":"Chaumont","commune":"Chaumont","nom":"Chaumont_52","type":"Château-Vestiges","periode":"XII-XVIII","histoire":"CHAUMONT, élevé sur un éperon naturel dominant la vallée de la Suize, le donjon est le seul vestige du château des comtes de Champagne, berceau de la ville. Le bossage des pierres dans la partie inférieure indique une datation tardive, deuxième moitié du XIIe siècle. A lorigine ouvrage défensif construit par le seigneur du château, jadis surmonté dun hourd, il sert par la suite de prison jusquen 1886  Le musée dart et dhistoire de la ville de Chaumont se trouve à ses pieds. Il est inscrit aux M.H. Bien qu'elle ait subi plusieurs transformations, la Tour carrée a conservé son aspect Médiéval. A l'origine, c'était un ouvrage défensif puis une tour devenue le symbole du pouvoir des Comtes de Champagne et ensuite, est devenue une prison. Depuis sa terrasse, vous bénéficierez d'un superbe panorama.\r\nHÖTEL de VILLE, création dune époque mouvementée (1787-1790),  remplace lancienne tour de Barle aujourdhui disparue, devenue trop exiguë pour accueillir ladministration municipale dune ville estimée à 6200 habitants en 1760. Les lignes droites, les courbes régulières, lusage des symétries, la sobriété reflètent lesprit de lépoque, mis en uvre par larchitecte François-Nicolas Lancret (1717-1789), notamment laménagement dun petit théâtre, abandonnées dans la tourmente révolutionnaire.Inscrit à l'inventaire supplémentaire des M.H. , le bâtiment bénéficie depuis 2012 d'une mise en lumière qui souligne l'élégance de la façade.","architecture":"CHAUMONT, l'ancien château du XIIe siècle domine la vallée de la Suize et de la Marne, pour des raisons stratégiques. Il est composé de douze tours et de trois portes. Le donjon a été construit à la même époque. Dernier témoignage du château des comtes de Champagne, il fut construit sur un éperon rocheux qui domine la vallée de la Suize, et est considéré comme le « berceau de la ville ». La tour médiévale haute de 19 m a conservé son aspect d'origine avec ses murailles à bossage épaisses de 2,60 m (au pied) et de 1,50 m (au sommet). À l'origine élément du système défensif du château, il sera par la suite transformé en prison (vers 1830). Ses murs intérieurs conservent encore de nombreux témoignages de cette époque sous forme de graffitis gravés dans la pierre par les prisonniers. Au pied du donjon, les salles basses de l'ancien château abritent le musée d'art et d'histoire de la ville. Le donjon est aussi dénommé « tour Hautefeuille », par le simple fait que les comtes d'Hautefeuille, connus par leurs présences au Mont Aimé et en Picardie furent seigneurs de ces lieux avant les comtes de Champagne. \r\nÉléments protégés MH : le donjon : inscription par arrêté du 13 juillet 1926. le musée d'art et d'histoire de Chaumont, inscrit Musée de France.                                                                    VAL des ESCHOLLIERS,  5 K.M au sud -eszt a été construit à Verbiesles au XVIIIe siècle. Bouchardon en fut le maître de l'oeuvre. Ce château, construit dans le style Renaissance, devient le quartier général du Général Pershing en 1917. Le château est situé au milieu dun parc clos de 70 hectares avec prairie, forêt, étang, rivière; lui même situé dans une propriété de 1000 hectares. Location d'une maison dhôtes de luxe et de charme pour un séjour inoubliable dans une nature préservée.","habitants":"Comtes de Champagne \r\n        \r\n        \r\n        \"","divers":"Donjon et Corgebin grav 5-6-7  GPS :48° 06' 42\" Nord, 5° 08' 20\" Est                    \r\nVal grav 8-9  GPS : 48° 04' 13\" Nord, 5° 11' 10\" Est","gps":"48° 06' 42\" Nord, 5° 08' 20\" Est","images":["../image/image_52/52_Chaumont_52_1.jpg","../image/image_52/52_Chaumont_52_2.jpg","../image/image_52/52_Chaumont_52_3.jpg","../image/image_52/52_Chaumont_52_4.jpg","../image/image_52/52_Chaumont_52_5.jpg","../image/image_52/52_Chaumont_52_6.jpg","../image/image_52/52_Chaumont_52_7.jpg","../image/image_52/52_Chaumont_52_8.jpg","../image/image_52/52_Chaumont_52_9.jpg"]},"Consult_chateau_formulaire9546":{"id":"Consult_chateau_formulaire9546","dept":"52","canton":"Eurville-Bienville","commune":"Chevillon","nom":"Chevillon_52","type":"Manoir","periode":"XVI","histoire":"CHEVILLON, Le manoir de Chevillon accueille aujourd'hui la médiathèque. Le jardin de Chevillon est situé au pied du manoir du XVIe siècle récemment restauré et contient plus de 50 espèces végétales différentes: plantes médicinales ou aromatiques, cultures maraîchères et un verger.  Il existe au moins deux tableaux du château de Chevillon, possédés pendant deux siècles, par la famille De Fresne, Marie de L'Isle, veuve de Humbert De Fresne, avait épousé en 1615, en seconde noces, Pierre de France seigneur du Chesnoy (51), gouverneur de Lourdon. Ancienne demeure des seigneurs de Chevillon.","architecture":"CHEVILLON  Ancienne demeure des seigneurs, manoir  est entouré d'un beau jardin de style médiéval.  avec le panorama vu du château, ils datent du XVIIIe siècle.  le château de Chevillon et ses vestiges est entouré d'un jardin médiéval au XVIe siècle récemment restauré et contient plus de 50 espèces végétales différentes: plantes médicinales ou aromatiques, cultures maraîchères et un verger. Evoquer l'esprit d'un jardin de la fin du Moyen-Age, telle est l'intention qui a guidé la conception de cet enclos, verger, carreaux bouquetiers et potagers constituent ce jardin vivrier auquel répondent le préau, la tonnelle et le berceau du jardin d'agrément.","habitants":"famille De Fresne,\r\n        \r\n        \"","divers":"GPS : 48° 31' 46\" Nord, 5° 07' 56\" Est","gps":"48° 31' 46\" Nord, 5° 07' 56\" Est","images":["../image/image_52/52_Chevillon_52_1.jpg","../image/image_52/52_Chevillon_52_2.jpg","../image/image_52/52_Chevillon_52_3.jpg","../image/image_52/52_Chevillon_52_4.jpg"]},"Consult_chateau_formulaire65cc":{"id":"Consult_chateau_formulaire65cc","dept":"52","canton":"Joinville","commune":"Cirey sur Blaise","nom":"Cirey","type":"Château","periode":"XVI-XVII-XVIII","histoire":"CIREY,  Voltaire, en 1734, il est menacé demprisonnement à la suite de la publication des \"Lettres Philosophiques\", vive critique des institutions françaises. C'est alors que son amie, la marquise du Châtelet, lui donne asile en son château de Cirey. Si le château de Ferney ou Voltaire passa les dernières années de sa vie est bien connu, le château de Cirey abrita quant à lui la plus brillante et la plus grande histoire intellectuelle et sentimentale que connût le XVIIIe siècle entre Voltaire et Emilie. Emilie du Châtelet sera le grand amour de Voltaire de 1734 jusqu'à la mort de cette dernière en 1749. Durant la Révolution le duc et la duchesse du Châtelet sont guillotinés en 1794 et la propriété, déclarée comme bien national, est vendue en lots. La comtesse de Simiane est également emprisonnée, mais échappe à la guillotine. De retour au château de Cirey, auquel elle est très attachée, Adélaïde se bat et obtient de ladministration les droits sur les biens non aliénés. Concernant ce qui a déjà été vendu, elle est dans lobligation de traiter avec les différents acheteurs. A force de persévérance, elle finira petit à petit par reconstituer lensemble de la propriété au bout de cinquante quatre adjudications. Cirey connaît alors un nouvel élan. Après avoir reconstitué lensemble de la propriété, décoré et meublé le château quelle avait retrouvé dépouillé, elle sintéresse aux jardins, quelle entretient et quelle développe, créant ainsi un jardin pittoresque le long du canal. De grands personnages comme Charles X ou encore le Marquis de La Fayette dont elle sera la maîtresse, séjourneront à Cirey. Connue pour sa grande beauté, mais aussi sa bonté, Diane-Adélaïde de Damas comtesse de Simiane, séteint à Cirey en 1835.","architecture":"CIREY,  de son vrai nom François Marie Arouet, Voltaire est né le 21 novembre 1694 à Paris. Fils de notaire, il est élevé chez les jésuites et reçoit une solide formation, notamment de rhétorique. Il prend alors le goût de la discussion, du théâtre et de la littérature antique. Il est présenté aujourd'hui comme un des plus célèbres écrivains français et apparaît également comme l'un des plus grands chefs de file du courant philosophique du siècle des lumières. Emprisonné à la Bastille, exilé en Angleterre, ses prises de positions lui valent une vie tumultueuse.                  Le château de Cirey-sur-Blaise a été fortement marqué par la présence de Voltaire, autre brillant esprit du XVIIIe siècle.  Voltaire succomba très vite à ceux de cette belle demeure et y passera 15 années. Ce monument historique privé est habité du XVIIe et XVIIIe siècle.L'ensemble des bâtiments permet de comprendre la vie du château sur trois siècles. Reconstruit à partir de 1642, le château comprend un pavillon et deux ailes latérales. Une aile a été ajoutée par Voltaire vers 1734. Au XIXe siècle, l'aile de Voltaire est complétée par une aile en retour et une nouvelle chapelle est construite et décorée par le peintre Constant Ménissier. Sur le site des anciens communs du château du XVIIe siècle, une grande cave formée de locaux voûtés en anse de panier et une fruiterie sont élevées. Distribués autour d'une cour rectangulaire, les communs se composent des écuries, du bâtiment du fermier, de la maison du berger, de granges et d'étables. Dans le parc, présence d'un pont métallique et d'un chalet à décor de bois découpé caractéristique du goût de la fin du XIXe siècle. Le bâtiment du directeur de la forge est caractéristique de l'architecture rurale du XVIIIe siècle. Pavillons d'entrée construits en 1915. Éléments protégés MH : les façades et les toitures des ailes du XVIIe et du XVIIIe siècles , ainsi que les façades et les toitures de l'aile du XIXe siècle.","habitants":"François Marie Arouet \"Voltaire\" et  Emilie du Châtelet \r\n        \"","divers":"GPS : 48° 19' 47,36\" Nord, 4° 56' 23,5\" Est","gps":"48° 19' 47,36\" Nord, 4° 56' 23,5\" Est","images":["../image/image_52/52_Cirey_1.jpg","../image/image_52/52_Cirey_2.jpg","../image/image_52/52_Cirey_3.jpg","../image/image_52/52_Cirey_4.jpg","../image/image_52/52_Cirey_5.jpg","../image/image_52/52_Cirey_6.jpg"]},"Consult_chateau_formulaire199d":{"id":"Consult_chateau_formulaire199d","dept":"52","canton":"Bourbonne-les-Bains","commune":"Clefmont","nom":"Clefmont_52","type":"Château","periode":"XVII","histoire":"CLEFMONT, les seigneurs de Clefmont étaient au moyen-âge les plus considérables du Bassigny, ils firent de nombreuses donations aux établissements religieux, comme l'abbaye de Morimond et l'abbaye de la Crête. Le premier seigneur connu de Clefmont fut Simon 1er. Il est fait mention du château de Clefmont pour la première fois au début du XIe siècle, mais il aurait été construit au siècle précédant, vers 930 par le duc de Bourgogne, Hugues le Noir, alors en conflit avec Hugues le Grand. En 1395, par le mariage de Raoline de Clefmont avec Girard de Choiseul, la seigneurie passa à la branche Choiseul-Clefmont, puis au commencement du XVIIe siècle, par un nouveau mariage, à la maison d'Achey, et peu après par une troisième alliance à la famille Rouxel de Médavy de Grancey. Ensuite, par de nouvelles alliances le domaine passa au marquis du Châtelet, puis au marquis de Fervaques et en dernier lieu à la vicomtesse de Laval-Boulogne qui le possédait à l'époque de la Révolution. Le château conserve de nos jours des vestiges imposants de sa grandeur passée : tours rondes arasées, chapelle seigneuriale Sainte-Catherine avec fresques et un logis du XVIe siècle, remanié au cours des siècles. A l'origine, il présentait l'aspect d'un véritable château fort, protégé par des fossés taillés dans la roche. Son portail d'entrée bien gardé, était muni de deux imposantes tours rondes avec pont-levis.","architecture":"CLEFMONT Le Château de Clefmont est un château construit au XIe siècle. C'était à l'origine un castrum, c'est-à-dire une construction de bois et de terre, construit sur une colline qui domine le Bassigny. D'abord motte castrale, il devient à partir du XIIe siècle un véritable château fort protégé par des fossés taillés dans la roche et accessible par une entrée défendue par deux imposantes tours rondes avec pont-levis.   Au XVIIe siècle, les Choiseul aménagent le château afin de le rendre plus agréable à vivre dans le style de la Renaissance française et y percent de nombreuses fenêtres. Au XVIIe siècle, le château est dévasté par un important incendie dont il reste encore des traces. Aujourd'hui propriété privée, le château conserve encore d'imposants vestiges : tours rondes arasées, chapelle castrale Sainte-Catherine et ses fresques ainsi qu'un logis du XVIe siècle remanié au cours du temps.  Le château a été modifié aux XVIe et XVIIe siècle. Le château de Clefmont est inscrit aux M.H. depuis 13/02/1928. Éléments protégés MH.","habitants":"Famille de    Girard de Choiseul\r\n        \"","divers":"GPS : 48° 05' 46\" Nord, 5° 30' 42\" Est","gps":"48° 05' 46\" Nord, 5° 30' 42\" Est","images":["../image/image_52/52_Clefmont_52_1.jpg","../image/image_52/52_Clefmont_52_2.jpg","../image/image_52/52_Clefmont_52_3.jpg","../image/image_52/52_Clefmont_52_4.jpg","../image/image_52/52_Clefmont_52_5.jpg"]},"Consult_chateau_formulaire24f1":{"id":"Consult_chateau_formulaire24f1","dept":"52","canton":"Chaumont","commune":"Condes","nom":"Condes_52","type":"Château","periode":"XIX-XX","histoire":"CONDES, le village de Condés dépendait au XIIe siècle des comtes de Champagne. Henri II de Champagne engagea l'Avouerie de Condes à Jobert de Chaumont, mais en 1182, les habitants non contents du nouveau propriétaire, remboursèrent Jobert et furent à nouveau placés sous le comte. La seigneurie comprenait alors Condes, Jonchery, Treix, Laharmand et Bonmarchais. Situé au cur d'un parc à l'anglaise, le château a été construit au XIXe siècle, mais s'orne d'une statue du XIVe siècle représentant Saint Gegnoulf et son épouse. Une villa gallo-romaine a été découverte en 1875 dans le parc du château. On peut y voir également une glacière dans un très bon état dentretien et de conservation.","architecture":"CONDES, château du XIXe siècle, découverte de bains romains dans la cour du château. De plan  rectangulaire à trois niveaux sur soubassement et attiques toit en croupe, accolé de pavillons de deux étages et tour hexagonale à toit pointu  du 22/04/2022.","habitants":"Famille d'Henri II de Champagne \r\n        \"","divers":"gps 48° 08' 40\" nord, 5° 08' 46\" est","gps":"","images":["../image/image_52/52_Condes_52_1.jpg","../image/image_52/52_Condes_52_2.jpg"]},"Consult_chateau_formulairee39b":{"id":"Consult_chateau_formulairee39b","dept":"52","canton":"Nogent","commune":"Neuilly-l","nom":"Dampierre_52","type":"Château","periode":"XVII","histoire":"DAMPIERRE  lactuelle construction a commencé au XVIIe siècle (entre 1650 et 1680). Auparavant, existait un autre château, probablement bâti au XVe et dont il ne subsiste rien. On sait seulement quil sélevait face à lactuelle demeure. Certains éléments de charpente et de grosses pierres de la construction daujourdhui en proviennent très certainement. Le bâtiment le plus ancien de la propriété est le colombier daté exactement de 1619 par une inscription gravée sur la pierre du linteau. La grange qui lui fait face est sans doute de la même période. A lorigine, le château de Dampierre se composait du corps central flanqué de deux tours carrées en saillie sur larrière. Au cours du XVIIIe siècle, des aménagements successifs ont conduit à laspect quon lui connait aujourdhui. Lhistoire du château est étroitement liée à celle de la famille qui y a habité et y habite encore depuis plusieurs siècles.","architecture":"DAMPIERRE, du XVIIe siècle, le portail d'entrée, les façades et les toitures du château de Dampierre ainsi que celles de l'aile Sud des dépendances et du colombier son inscrits depuis le 23/12/1981. \r\nFORT de DAMPIERRE ou MAGALOTTI. Sa superficie est de 52 hectares. Il est constitué dune vaste enveloppe de 1 200 mètres de développement et dun énorme réduit à cavalier. L'ensemble a été construit entre 1875 et 1878 et faisait partie du dispositif de protection de la ville de Langres. Son armement était composé de 142 pièces d'artillerie dont 82 pièces de rempart, 27 pièces à tir indirect et 26 pièces de flanquement. L'ensemble des infrastructures, réalisé en moellons, est recouvert de terre. Il semble que le Fort de Dampierre ait été occupé jusque dans le début des années 1920, puis un gardien en a assuré la surveillance. Ensuite il ne servit que de dépôt de munitions et plus récemment de carrière de pierre. Depuis, le fort abandonné se meurt, lentement. Ce fort appartient toujours à l'autorité militaire et fait partie du projet Natura 2000.   Éléments protégés MH : le portail d'entrée, les façades et les toitures du château ainsi que celles de l'aile sud des dépendances et du colombier : inscription par arrêté du 23 décembre 1981.   Ce fort d'arrêt est le plus vaste de la place de Langres et même de l'ensemble du système défensif Séré de Rivières. C'est également le plus éloigné de Langres. Il protégeait le déploiement vers la Meuse de l'armée regroupée dans le camp retranché tout en assurant le pivot de la défense Nord de la Place.","habitants":"Seigneurs locaux\r\n        \"","divers":"GPS : 47° 57' 15\" Nord, 5° 23' 33\" Est","gps":"47° 57' 15\" Nord, 5° 23' 33\" Est","images":["../image/image_52/52_Dampierre_52_1.jpg","../image/image_52/52_Dampierre_52_2.jpg","../image/image_52/52_Dampierre_52_3.jpg"]},"Consult_chateau_formulaire2599":{"id":"Consult_chateau_formulaire2599","dept":"52","canton":"Châteauvillain","commune":"Dinteville","nom":"Dinteville","type":"Château","periode":"XIII-XVI","histoire":"DINTEVILLE, a été construit au XVIe siècle autour d'un important donjon datant du XIIIe siècle. Du XIIIe au XVIe siècle (jusqu'en 1608), le château était la propriété de la famille de Jaucourt. La famille était très active en Champagne sous François 1er en partie sous le patronyme Dinteville, elle s'éteindra en 1607. passa aux Le Goux. famille de parlementaire, érigé en marquisat, est racheté en  1647 pour Pierre le Goux de la Berchère et en 1703 érigé  de nouveau en marquisat pour Guillaume le Brun. Il est resté depuis cette époque dans la même famille. A souffert à la Révolution passa en héritage aux Ferrière Sauveboeuf, aux Sainte-Maure, aux Rougé et aux Ville Baugé propriétaires actuels.  Le canal se déverse dans les douves par une cascade importante. Son orangerie est toujours intacte. Le parc mêle des éléments réguliers et paysagers témoignant dune création continue. Dune composition régulière, Dinteville conserve une allée deau alimentée par les douves du château et bordée dalignements de tilleuls. La composition paysagère sordonne de part et dautre dune rivière à langlaise. Le parc comprend en outre deux petits pavillons du XVIIIe siècle.","architecture":"DINTEVILLE, restauré selon les critères du XVIIIe siècle.  Des dépendances ont été construites entre 1809 et 1848. L'actuel château fut construit sur le plan d'origine du XIIIe siècle. Il fut transformé au XVIIIe et au XIXe siècle. La plate-forme rectangulaire entourée de douves et les deux tours circulaires cantonnant le corps de bâtiment sont peut-être des vestiges de la construction primitive. Le corps de logis daté de 1706 est un gros corps de bâtiment sous haut comble bordant un des côtés de la plate-forme. L'avant-corps central et les deux courtes ailes du corps de logis sont des aménagements du début du XVIIIe et du XIXe siècle. La grille du jardin est datée de 1753. Le parc possède des aménagements hydrauliques.  Le château de Dinteville et son parc sont inscrits aux M.H.. Cet ancien château fort date du XVIe siècle. On visite les pièces du XVIe siècle, une tour, la cuisine et la salle des gardes. On y voit aussi une maquette exposée de ce que furent les lieux au XVIe siècle,  ouvert au Public. Éléments protégés MH : les façades et les toitures ; la cour d'honneur ; les douves avec leur pont ; les trois pièces suivantes avec leur décor : le salon et la salle de chasse du premier étage, la pièce du rez-de-chaussée servant actuellement de cuisine : inscription par arrêté du 15 juillet 1971. L'orangerie ; les deux anciens pavillons d'entrée ; le pigeonnier : inscription par arrêté du 30 janvier 1996. L'ancienne vinée et le pressoir ; le parc, y compris ses aménagements hydrauliques et son mur de clôture: inscription par arrêté du 19 juin 2000.","habitants":"Famille de Jaucourt\r\n        \"","divers":"Dinteville GPS : 48° 01' 58,78\" Nord, 4° 48' 21,89\" Est","gps":"48° 01' 58,78\" Nord, 4° 48' 21,89\" Est","images":["../image/image_52/52_Dinteville_1.jpg","../image/image_52/52_Dinteville_2.jpg","../image/image_52/52_Dinteville_3.jpg","../image/image_52/52_Dinteville_4.jpg"]},"Consult_chateau_formulairee7f6":{"id":"Consult_chateau_formulairee7f6","dept":"52","canton":"Joinville","commune":"Donjeux","nom":"Donjeux","type":"Forteresse","periode":"XVIII","histoire":"DONJEUX,   construit dans le plus pur style du XVIIIe siècle, cet édifice demeure lun des fleurons de larchitecture civile haut-marnaise. Les bâtiments sont élevés sur un promontoire, à 238 m daltitude, dominant les méandres du Rognon dont les eaux vont grossir la Marne à peu de distance de là. Le choix de ce site na pas été le fait du hasard, car lactuel château occupe lemplacement dune forteresse féodale, aujourdhui entièrement disparue. Sa construction devait remonter à Etienne de Vaux, mort vers 1060. Mais linfluence des romans de chevalerie aidant, on préférerait attribuer au vieux castel une origine surnaturelle : cétait la fée Mélusine, la mère et la patronne des Lusignan qui lavait fait sortir de terre un jour que le caprice de ses envolées à travers lespace, lavait égarée sur les confins champenois. Les seigneurs de la contrée, dont plusieurs étaient apparentés à la considérable maison de Broyes, fondatrice de Joinville, savaient bien que celle-ci létait aussi de Donjeux. Sur cette butte, se succédèrent dillustres familles: les Joinville, puis les dAnglure, Guise, Thomassin, Choisy et de 1706 à 1810. Lactuel château de Donjeux a été construit en 1755 par le Marquis de Lesperoux, les Gestas de Lespéroux à qui nous devons le château que nous admirons de nos jours. Il appartient à la Famille Levesque et Bernard Vinay. Une ferme abritant un pressoir, une orangerie et surtout un imposant colombier ainsi que des jardins à la française complètent lensemble.","architecture":"DONJEUX, éléments protégés MH : les façades et les toitures du château et des communs : inscription par arrêté du 8 septembre 1965. Les dépendances : les façades et les toitures des bâtiments de la ferme, le pigeonnier, le jardin à la française avec ses murs de clôture et ses éléments maçonnés et décoratifs (abris de jardin, vases, murs de soutènement des terrasses et rampes d'accès à celles-ci), y compris sa partie supérieure de part et d'autre des façades Sud et Est du bâtiment de la ferme, les grilles de clôture du jardin et du château, y compris leurs piliers avec leur décor sommital, la cour d'honneur et les deux allées plantées d'arbres reliant les ailes des communs et la ferme à l'entrée principale, l'allée plantée d'arbres longeant le côté Ouest du château, des communs et de la cour d'honneur et les deux glacières : inscription par arrêté du 25 octobre 1989.                                                                                             Construit  sur lemplacement dun ancien château fort dont la légende lattribuerait à la fée Mélusine.  L'ancien parc ou jardin : Aménagé au milieu du XVIIIe siècle, le Jardin à la Française est fermé de grilles en fer forgé, de 3 terrasses environnées de forêts. Le niveau inférieur servait à lépoque de potagers et de parterres de fleurs. Le château de Donjeux est inscrit aux M.H. depuis 1965, il est ouvert au Public.","habitants":"Famille des Joinville, les Guise et le marquis de Lespéroux\r\n        \"","divers":"Donjeux par GPS : 48° 21' 30' Nord, 5° 10' 26\" Est","gps":"48° 21' 30' Nord, 5° 10' 26\" Est","images":["../image/image_52/52_Donjeux_1.jpg","../image/image_52/52_Donjeux_2.jpg","../image/image_52/52_Donjeux_3.jpg","../image/image_52/52_Donjeux_4.jpg","../image/image_52/52_Donjeux_5.jpg","../image/image_52/52_Donjeux_6.jpg","../image/image_52/52_Donjeux_7.jpg","../image/image_52/52_Donjeux_8.jpg"]},"Consult_chateau_formulaire8e8c":{"id":"Consult_chateau_formulaire8e8c","dept":"52","canton":"Poissons","commune":"Echenay-Pimodan","nom":"Echenay_Pimodan","type":"Château","periode":"XVI-XVII","histoire":"ECHENAY-PIMODAN,  en 1294-1295, le seigneur Aubert de Poissons (chevalier) dit \"Civot\" qui avait deux fils Aubert et Hugues donna une partie de leur propriété à l'abbaye de Saint-Urbain. De 1609 à 1660, le château changea plusieurs fois de propriétaire. Georges de la Vallée de Rarecourt, marquis de Pimodan (29/01/1822 Échenay - 18/09/1860 Castelfidardo), militaire français, était au service de l'Autriche et des États Pontificaux. Au moment de la Révolution, ses nobles hôtes, les familles Mollerat de Riaucourt et Marquette de Fleury ne paraissent pas avoir été gravement inquiétés. Cette tranquillité relative fut achetée, au prix de quelques sacrifices. Une perquisition fut faite au château d'Echenay, au cours de 1793, les représentants de la nation et Mr J-B Evre Mollerat de Riaucourt dut remettre ses armes, consistant en : 3 fusils à 2 coups, 2 fusils simples, 4 pistolets, 2 épées à poignée, etc. Pendant la plus grande partie du XIX siècle, le château de Poissons fut habité par la famille de Maupas, qui était originaire du Berry et avait quelques liens d'attache et de parenté avec la famille Mollerat de Riaucourt. Le marquis de Maupas entra très jeune dans l'armée. Il participa à la guerre au Portugal en 1807 et se distingua dans les dernières campagnes de l'Empire. Sous la restauration il prit part, comme lieutenant colonel, à l'expédition d'Espagne en 1823.","architecture":"ECHENAY-PIMODAN,  était entouré autrefois de murailles crénelées, rendues inaccessibles par de larges fossés, remplis d'eau, au commencement du règne de Charles X , il fut nommé sous gouverneur du duc de Bordeaux (futur Henri V). C'est en cette qualité qu'il suivit la famille royale en Ecosse, après la révolution de 1830. En 1832, il se retira au château de Poissons, avec les croix de Saint-Ferdinand d'Espagne, de Saint Louis de France et de la Légion d'honneur. Il décéda en 1862. Il eut à Poissons de magnifiques funérailles. Son corps fut transporté à Paris pour être inhumé dans le caveau de famille. Le  corps de logis imposant de trois niveaux avec arches sur les deux premiers, lucarnes sur comble sur toit recouvert de tuiles. l'édifice est accolés de Trois tours carrées  de quatre niveaux toit à l'impérial   accolé de l'ancien corps de logis et de deux pavillons d'entrée . Le vieil Échenay fut presque entièrement détruit sous Louis XV et remplacé par un bâtiment sans élégance, beaucoup trop long pour sa hauteur. Les constructions neuves s'adossèrent à trois vieilles tours coupées au niveau des toits et développèrent leur ordonnance sur un large terre-plein à balustre.","habitants":"Famille de  Mollerat de Riaucourt\r\n        \"","divers":"Echenay, GPS : 48° 27' 49\" Nord, 5° 18' 38\" Est","gps":"48° 27' 49\" Nord, 5° 18' 38\" Est","images":["../image/image_52/52_Echenay_Pimodan_1.jpg","../image/image_52/52_Echenay_Pimodan_2.jpg"]},"Consult_chateau_formulaired4ad":{"id":"Consult_chateau_formulaired4ad","dept":"52","canton":"Bologne","commune":"Ecot la combe","nom":"Ecot_Combe","type":"Forteresse","periode":"XIV-XV","histoire":"ECOT la COMBE,  fief dépendant du comté de Reynel, la seigneurie, occupait un point stratégique,  Simon de Mailly, chevalier, chambellan du Roi aurait reçu la terre dÉcot de son mariage avec Henriette de Saint-Seine, dite « dame de Clinchamp et dÉcot » autour de 1490. Africain de Mailly dit dÉcot (baron dÉcot de 1509 à 1560) accumule les charges au cours dune longue existence : « capitaine de Nogent le Roi,La seigneurie passe à une famille champenoise : les de lhoste (ou hostel). François de lHostel, seigneur dEcot (1622-1667), baron de Semoutiers obtient lérection de la terre dÉcot en marquisat avant 1655, ce dernier réside à Paris rue du Temple, paroisse Saint-Nicolas des Champs. Le château est embelli notamment d'une porterie et les dépendances sont reconstruites formant la basse-cour. Camille Antoine de Capichussi, marquis de Bologne et de Bonnecourt, baron dEcot, capitaine au régiment de Toulouse cavalerie hérite dÉcot en 1735 de sa tante Elizabeth. Son fils, « haut et puissant seigneur Charles Camille de Capichussi de Bologne, marquis de Bonnecourt et dÉcot, seigneur dAndilli, Choiseul, Choinou, Maracq et autres lieux, Capitaine des carabiniers chevalier de Saint Louis. Cités parmi les premiers maîtres de forge du Premier Empire et première fortune du département sous la Restauration, les frères Michel entreprennent d'importants travaux au château.  Sans héritier, les Michel font donation du domaine en 1839 aux descendants des comtes de Foudras : Charlotte Lallemant qui épouse Louis François de Beurges, comte de Beurges en 1816. Un jardin à l'anglaise est dessiné entre 1807 et 1832 en remplacement du grand parterre à la française coté Est. Henri Charles Louis de Beurges, comte de Beurges, député de la Haute-Marne, meurt sans héritier à Écot en 1912, le domaine est alors vendu en 1968 à monsieur Hubert Abt.","architecture":"ECOT la COMBE, La forteresse construite au XIVe et XVe siècles subsiste dans le plan général malgré les transformations de lépoque classique : seule la façade nord-Est est  une reconstruction à neuf amorcée en 1796 sur le niveau inférieur dune courtine médiévale et les trois ailes actuelles du château correspondent au plan en trapèze de l'origine. Le castrum ou castellum du XIIIe siècle, (attesté dans la liste des forteresses dites « jurables et rendables » au profit du comte de Champagne) ne nous est pas connu, seule la chapelle pourrait en avoir été un vestige jusquà sa destruction à la fin du XVIIIe siècle. Le corps de logis de l'aile Nord est encadré par deux tours rondes du XIVe siècle dun peu plus de 8 m de diamètre, avec des murs de 2,10 mètres dépaisseur au niveau inférieur. La tour « Saint Jacques » (en raison de la coquille sculptée qui orne le linteau dune fenêtre) forme langle Est de la forteresse, elle présente aussi une bretèche au 2e étage et a été percée de trois hautes fenêtres à traverse (ou demi croisées) aux linteaux en accolade.  La courtine Ouest (murs de 1,50 m dépaisseur) est percée de trois archères basses encore visibles, datée sans doute de la fin du XIVe siècle, Une tour carrée de défense plus modeste est accolée à la courtine sud. Une petite archère est encore visible au premier niveau tandis qu'une batterie au premier étage est équipée de deux canonnières rectangulaires. Une imposante échauguette à encorbellement couverte de plomb protège l'angle Sud-Ouest de la forteresse, de petites fenêtres cintrées ont remplacé à lépoque moderne les arquebusières du XVIe siècle lorsque l'oratoire de la chambre basse est créé,  est percée de trois archères basses encore visibles, datée sans doute de la fin du XIVe siècle,  Le château d'Ecot-la-Combe, est inscrit aux M.H. depuis 1994.","habitants":"Famille de François de lHostel et  Camille Antoine de Capichussi\r\n        \"","divers":"GPS : 48° 12' 32,25\" Nord, 5° 22\" 58,83\" Est","gps":"48° 12' 32,25\" Nord, 5° 22\" 58,83\" Est","images":["../image/image_52/52_Ecot_Combe_1.jpg","../image/image_52/52_Ecot_Combe_2.jpg","../image/image_52/52_Ecot_Combe_3.jpg","../image/image_52/52_Ecot_Combe_4.jpg","../image/image_52/52_Ecot_Combe_5.jpg"]},"Consult_chateau_formulaire06a0":{"id":"Consult_chateau_formulaire06a0","dept":"52","canton":"Villegusien-le-Lac","commune":"Rouvres sur aube","nom":"Etuf_Rouvres","type":"Château","periode":"XVII","histoire":"ETUF. Au XVIe siècle,le château et son domaine appartenaient à la famille d'Esquilly qui possédait aussi les domaines de Bay-sur-Aube et de la Cude.  Le château d'Etuf à Rouvres fut transmis par alliance à la Maison de Vienne, puis aux Brûlart, et au XVIIIe siècle à la famille de Tiffard avec le titre de comté, et enfin, en 1749, la maison de Montarby en devint propriétaire.  Mr de Charlay, gascon d'origine, le laissera à sa fille qui le revendit à Mr Cauvigny, Avocat à Chaumont. Il sera ensuite cédé à Mr le comte de Montmort,  A présent, le château de Rouvres appartient à Mr et Mme Read. , à présent, à Mr De Thomasson, qui en a fait sa propriété privée. Non loin de là, coule la légendaire cascade d'Etuf.","architecture":"ETUF, la construction du château date du XVIIe siècle. Il est bien conservé. Avant la Révolution, il était fortifié et protégé par des fossés profonds.  La propriété d'Etuf était autrefois une ferme, fut construite pour un ancien Préfet de Paris, le comte Frochot.  Etuf est un château bâti à Rouvres-sur-Aube,  bien conservé, c'était un château fortifié, avant la Révolution. Il était protégé par des fossés profonds. La seigneurie qui relevait de l'évêché et de la prévôté de Gurgy-le château appartenait à un laïque. Il devait foi et hommage à l'évêque, était autrefois un château fortifié avant la Révolution, protégé par des fossés profonds. A l'époque de la Révolution Française.","habitants":"Etuf; Famille d'Esquilly \r\n        \"","divers":"Etuf  Rouvres  GPS : 47° 51' 30\" Nord, 4° 59' 44\" Est","gps":"47° 51' 30\" Nord, 4° 59' 44\" Est","images":["../image/image_52/52_Etuf_Rouvres_1.jpg","../image/image_52/52_Etuf_Rouvres_2.jpg","../image/image_52/52_Etuf_Rouvres_3.jpg","../image/image_52/52_Etuf_Rouvres_4.jpg"]},"Consult_chateau_formulaire99e8":{"id":"Consult_chateau_formulaire99e8","dept":"52","canton":"Bourbonne-les-Bains","commune":"Parnoy en Bassigny","nom":"Fresnoy","type":"Château","periode":"XVIII","histoire":"FRESNOY,   En 1601, la seigneurie de Fresnoy appartenait à Étienne Perret, lieutenant-général au bailliage de Chaumont, puis elle passa à Robert Merceron, époux de Colombe Perret. Enfin, dans la seconde moitié du XVIIe siècle, Fresnoy devint la propriété de la famille Rose-Provenchères et fut réuni au marquisat de Dammartin, créé en 1719 en faveur de cette famille. Cependant, en 1737, le marquis de Rose le revendit avec Doncourt et ces deux fiefs qui furent achetés par M. Nicolas Auberthot, avocat au Parlement. En 1789, ce village fait partie de la province de Champagne dans le bailliage de Langres et la prévôté de Montigny-le-Roi. Le 1er avril 1973, la commune de Fresnoy-en-Bassigny est rattachée sous le régime de la fusion-association à celle de Parnot qui devient Parnoy-en-Bassigny.","architecture":"FRESNOY, construit dans le deuxième quart du XVIIIe siècle (1743), le château dont le parc est fermé côté rue par un portail en forme de demi-lune. De 1928 à 1932, selon les plans de larchitecte M Gayet, un nouveau château, au style anglo-normand fut alors reconstruit. Le parc fût dessiné par larchitecte paysagiste, Monsieur Chevalon, architecte de grande renommée dans la région. A lorigine, le parc couvrait 10 hectares, dont 4 hectares de bois, 3 hectares de pâtures, et 3 hectares de jardin dagrément.   Le château de Fresnoy en Gohelle fit alors lobjet de plusieurs réquisitions, tantôt pour lhébergement dofficiers allemands, et tantôt pour permettre le cantonnement de troupes britanniques.  A lemplacement du plan deau construit en 1930, les allemands, pendant leur occupation au château Colombel, ont monté les parois du plan deau afin den faire une piscine. Elle fut détruite par les propriétaires à la fin de la guerre. Il est inscrit, en totalité (corps central et deux ailes basses latérales), sur l'inventaire des M.H. depuis le 9 mars 1987,","habitants":"Famille de Étienne Perret et de la  famille Rose-Provenchères\r\n        \r\n        \"","divers":"Fresnoy  GPS : 48° 02° 26' Nord, 5° 39' 28\" Est","gps":"48° 02° 26' Nord, 5° 39' 28\" Est","images":["../image/image_52/52_Fresnoy_1.jpg","../image/image_52/52_Fresnoy_2.jpg","../image/image_52/52_Fresnoy_3.jpg"]},"Consult_chateau_formulaire7fe7":{"id":"Consult_chateau_formulaire7fe7","dept":"52","canton":"Joinville","commune":"Gudmont-Villiers","nom":"Gudmont","type":"Château","periode":"XVI-XVIII","histoire":"GUDMONT,  à Gudmont-Villiers,   le château fut construit au XVIe siècle par le chevalier Guillaume de Thélin, originaire d'Auvergne, secrétaire de Claude de Lorraine premier Duc de Guise, Sénéchal de Champagne et seigneur de Joinville. Il fit l'acquisition du domaine en 1546 alors que celui-ci était encore un bien d'Eglise rattaché à l'abbaye de Gorze fondée en 749 par l'évêque Chrodegang, de Metz, à qui avaient été confiées les reliques de Saint Gorgon. On doit à la famille Thélin la décoration intérieure d'une des pièces ouvertes au public constituée de fresques datant de 1578, réalisées par des artistes italiens de l'Ecole de Fontainebleau représentant notamment les sept vertus chrétiennes et les quatre saisons. Habité par la même famille depuis 1676 et remanié au XVIIIe siècle avec une nouvelle chapelle bâtie en 1753 par les ancêtres des propriétaires actuels, le comte et la comtesse Emmanuel Aved de Magnac. Le château comporte trois parties construites aux XIe, XVIe et XVIIIe siècles.","architecture":"GUDMONT,   date du XVIe au XVIIIe siècle. Le château de Gudmont-Villiers abrite de splendides fresques murales et est ouvert à la visite, est inscrit aux M.H. depuis 1965,  participe aussi aux Journées Européennes du Patrimoine et ouvre ses portes au Public, Éléments protégés MH : le château en totalité : inscription par arrêté du 8 mars 1965.","habitants":"Gudmont;  Comte et la Comtesse Emmanuel Aved de Magnac                  \r\n        \"","divers":"Gudmont grav 1-2 GPS : 48° 20' 42\" Nord, 5° 08' 12\" Est","gps":"48° 20' 42\" Nord, 5° 08' 12\" Est","images":["../image/image_52/52_Gudmont_1.jpg","../image/image_52/52_Gudmont_2.jpg","../image/image_52/52_Gudmont_3.jpg"]},"Consult_chateau_formulairecc79":{"id":"Consult_chateau_formulairecc79","dept":"52","canton":"Joinville","commune":"Joinville","nom":"Joinville_Gd_Jardin","type":"Château","periode":"XVI","histoire":"GRAND-JARDIN-JOINVILLE,  construit par Claude de Lorraine premier duc de Guise. En 1688 le Grand-Jardin passe à la Grande Demoiselle puis aux Orléans et en 1856   M. Salain Captain maître de forges acquiert le château, et en 1978 acquis par le conseil général de la Haute Marne.  Le château correspond d'abord au désir de représentation politique et territoriale d'un duc à l'ambition dévorante, il constitue alors un élément important de la manifestation du pouvoir des Guises. En bordure de la Marne, ce bel édifice dédié aux réceptions constitue l'un des fleurons de l'architecture Renaissance.  L'harmonie de l'architecture végétale et de l'architecture de pierre est telle, qu'il est impossible de dissocier le château des jardins. Remarquablement restaurés, ces derniers, d'une superficie de 4 ha, peuvent être visités toute l'année. Ils comportent deux parties distinctes, le jardin formel (aux formes géométriques), d'époque Renaissance et classique et le parc pittoresque, dit aussi \"parc romantique\". A proximité du château, prolongeant les douves et l'esplanade, se déploie un jardin d'esprit renaissance composé de parterres compartimentés et fleuris, de carrés fruitiers et bouquetiers, de douves et d'un labyrinthe.          MONTREMY A NOMECOURTa cinq K.M. à l'ouest de Joinville. Le château du Montrémy ou château du Mont-Rémy a été reconstruit au XIXe siècle. C'est le bâtiment le plus ancien du Domaine. Il a 6 salles à votre disposition.  Jacques De Montremy,","architecture":"GRAND-JARDIN-JOINVILLE, construit entre 1533 et 1546, est l'un des plus anciens témoins de l'engouement de la noblesse française pour l'architecture venue d'Italie et les décors inspirés de l'Antiquité.  dénommé château d'en-bas, par opposition à l'imposante forteresse médiévale qui surplombait alors Joinville, il reçoit l'appellation flatteuse de château du Grand-Jardin eu égard au luxuriant jardin l'entourant. L'art topiaire est très présent. Les 70 variétés de fruitiers rares et anciens se développent en espaliers dans le reste du jardin devant et derrière le château, soit contre des murets, soit sur des palissades. Plus loin, le parc romantique offre un bel exemple des jardins du XIXe siècle. Le ruisseau serpente entre les arbres, les allées se perdent dans des sous-bois où se nichent des sculptures en fonte, témoins de la tradition métallurgiste du nord de la Haute-Marne. Le château du Grand-Jardin constitue aujourdhui la cinquième collection française de buis, car il rassemble sur site 120 variétés différentes. La moitié est présentée dans le jardin pittoresque à lombre des grands arbres, en bordure des allées. Lautre moitié, rassemblée dans les couches froides, est plantée dans dautres îlots du parc. Cette importante collection est la seule publique avec les jardins de Marqueyssac (Dordogne) et a reçu en 2010 le label de collection agréé par le conservatoire des collections végétales spécialisées. Lieu de visite tout au long de l'année avec des expositions, des conférences et des manifestations autour des jardins.\r\nÉléments protégés MH: le jardin du XVIe siècle transformé en verger, le potager au XVIIIe siècle puis en parc anglais au XIXe siècle. Site classé le 20 septembre 1973.","habitants":"Famille de Claude de Lorraine\r\n        \"","divers":"Joinville GPS : 48° 26' 47,04\" Nord, 5° 08' 26,16\" Est                                                     Montrèmy Grav 4-5   GPS : 48° 26' 19\" Nord, 5° 04' 28\" Est à Nomécourt","gps":"48° 26' 47,04\" Nord, 5° 08' 26,16\" Est","images":["../image/image_52/52_Joinville_Gd_Jardin_1.jpg","../image/image_52/52_Joinville_Gd_Jardin_2.jpg","../image/image_52/52_Joinville_Gd_Jardin_3.jpg","../image/image_52/52_Joinville_Gd_Jardin_4.jpg","../image/image_52/52_Joinville_Gd_Jardin_5.jpg"]},"Consult_chateau_formulaireb467":{"id":"Consult_chateau_formulaireb467","dept":"52","canton":"Châteauvillain","commune":"Juzennecourt","nom":"Juzennecourt","type":"Château","periode":"XVIII","histoire":"JUZENNECOURT  Le château de Juzennecourt a été construit en 1717, à la place d'une maison-forte plus ancienne,  par l'architecte Jean Baptiste Bouchardon.","architecture":"JUZENNECOURT,  de part et d'autre du corps de logis à deux niveaux sur plan rectangulaire, accolés de  deux pavillons couverts d'une toiture en dôme à l'impériale. Un parc paysager entoure le bâtiment. Deux canaux délimitent un espace paysager avec pelouse et couvert.Éléments protégés MH : le logis, les dépendances, le parc et les canaux : inscription par arrêté du 14 septembre 2001. C'est une propriété privée. Il date du 1er quart du XVIIIe siècle.","habitants":"Seigneurs locaux\r\n        \"","divers":"Juzennecourt  GPS : 48° 11' 05\" Nord, 4° 58' 48\" Est","gps":"48° 11' 05\" Nord, 4° 58' 48\" Est","images":["../image/image_52/52_Juzennecourt_1.jpg","../image/image_52/52_Juzennecourt_2.jpg","../image/image_52/52_Juzennecourt_3.jpg","../image/image_52/52_Juzennecourt_4.jpg"]},"Consult_chateau_formulaire73d2":{"id":"Consult_chateau_formulaire73d2","dept":"52","canton":"Poissons","commune":"Lafauche","nom":"Lafauche","type":"Vestiges","periode":"XI-XII","histoire":"LAFAUCHE, le premier seigneur connu par des chartes est Hugues de Lafauche qui vivait au XIIe siècle.   Éléments protégés MH : les restes du château-fort : inscription par arrêté du 4 février 1927. Par sa superficie de 5 ha, le château Lafauche témoigne de son importance stratégique au Moyen-Age. Il fut le dernier bastion du royaume dans le comté de Champagne. Bâti à 400m d'altitude, au sommet de la montagne, c'était un château fortifié et imposant, entouré d'un mur de 1,5 mètre d'épaisseur.","architecture":"LAFAUCHE, sa construction daterait du XIe siècle. Le château est une ancienne forteresse construite au XIIe siècle, dont le millésime retrouvé sur une serrure de porte, en pierre de taille, provenant de la  carrière de Chalvraines. Il semble que Lafauche n'ait consisté qu'en un château dont l'enceinte extérieure abritait le peuplement du lieu. Du fait de sa position topographique sur un éperon barré relativement étroit et escarpé, le château  est étagé sur deux niveaux : la plate-forme haute coiffant une arête rocheuse aménagée, constitue le \"donjon\" ou noyau résidentiel et défensif  depuis le XIIe siècle, avec son enceinte, épousant les contours du socle rocheux, peu fortifiée du côté Est. Autour et en contrebas de cette \"cour haute\", une vaste enceinte fossoyée définit la basse-cour établie sur un adoucissement des pentes de l'éperon. Cette enceinte extérieure se rattache à celle du donjon du côté le plus exposé, le front ouest, ou la demeure est retranchée du plateau par un fossé particulièrement profond. Ce front ouest, le plus puissamment fortifié, est percé d'une des deux portes du château, accédant directement à la cour du donjon. . Par sa superficie de 5 ha, le château Lafauche témoigne de son importance stratégique au Moyen-Age. Ses flancs étaient gardés par 18 tours. Deux ponts-levis permettaient d'accéder à l'enclos du château. Les armes de France et de Lorraine se trouvaient au-dessus de la porte principale, appelée la Porte des Griffons, qu'on retrouvait sur la porte de la tour féodale. Le château  surplombe la Plaine de Prez à 400 mètres d'altitude.","habitants":"Hugues de Lafauche\r\n        \"","divers":"Lafauche  GPS : 48° 17' 52\" Nord, 5° 29' 55\" Est","gps":"48° 17' 52\" Nord, 5° 29' 55\" Est","images":["../image/image_52/52_Lafauche_1.jpg","../image/image_52/52_
