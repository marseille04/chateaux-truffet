Lafauche_2.jpg"]},"Consult_chateau_formulaire444d-2":{"id":"Consult_chateau_formulaire444d-2","dept":"52","canton":"Langres","commune":"Langres","nom":"Langres","type":"Patrimoine","periode":"XVI-XVIII-XIX","histoire":"LANGRES, Hôtel de ville,  la construction de l'Hôtel de Ville de Langres date de 1776 à 1783 (XVIIIe et XIXe siècles). Ce don du roi Louis XV, construit à l'emplacement de l'ancienne maison de ville, fut plusieurs fois ravagé par des incendies, dont le plus grave fut celui de 1892. Le fronton triangulaire, supporté par 4 colonnes corinthiennes, dressées au-dessus d'un perron de l'escalier à double volée, est sculpté d'un cartouche aux armes de la Ville de Langres. Sa réfection eut lieu en 1893. A été inscrit partiellement aux M.H. le 21/11/1989 et classé le 4/06/1993 aux M.H.\r\nCITADELLES, la place forte de Langres date du XIXe siècle. Elle est dotée d'une architecture bastionnée construite à la fin du XIXe siècle, sous la direction de Auguste Chauchard. La citadelle de Langres devint ensuite le siège de la caserne Turenne. C'est une zone de 9 Ha, en pleine ville, à reconvertir  entièrement. Depuis le départ de ses militaires, la BSMAT, l'ancienne caserne de Langres, est désormais la propriété de la ville et fait l'objet de très nombreux projets.                                                                                                           MELAY;   c'est devenu une auberge B & B. Chambre spacieuse et excellent accueil par les propriétaires, construction classique  de plan rectangulaire à trois niveaux, toits en croupes.","architecture":"LANGRES, la Porte des Moulins appelée aussi la Porte des anciens remparts a été Classée aux M.H. depuis le 23/06/1924. Fortifications, les remparts de Langres ont été construits sur 2 000 ans. Les fortifications, dont une partie de type bastionné, ont été remaniées par le génie militaire. Elles couvrent 3,6 km, faisant le tour de lancienne ville avec ses 7 tours fortifiées, ses six portes et la porte gallo-romaine rappelant que Langres fut, au IIe siècle, la capitale du Peuple des Lingons. Au XIXe siècle, le système des fortifications de la ville s'est étendu à des forts, bâtis à 10 et 15 km qu'on peut découvrir, enfouis dans les forêts, du côté de Chauffour.\r\n Pavillon LOUIS XIII a été modifié au XVIe siècle et en 1854. C'est la Porte de l'Hôtel de Ville. Le Pavillon Louis XIII était, autrefois, le corps de garde, . Le Pavillon Louis XIII est inscrit aux M.H. depuis le 23/12/1925, est devenu la propriété de la commune de Langres.                                                                   MONT date du XVIe siècle. C'est la construction civile la plus importante du Moyen-Age encore visible de nos jours. Une tour octogonale contient un escalier. Chaque pan est séparé par un contrefort et chaque étage est souligné par une moulure et des gargouilles. Le Château du Mont est devenu, depuis, un Hôtel, pour un séjour très agréable.","habitants":"Auguste Chauchard.\r\n        \"","divers":"Langres    hotel de villle grav-5                                                       GPS : 47° 51' 31\" Nord, 5° 19' 58\" Est                                                                          GPS : 47° 51' 56,16\" Nord, 5° 19' 52,68\" Est                                                        citadelle  GPS : 47° 51' 12' Nord, 5° 20' 02\" Est                                                       Melay GPS : 47° 53' 32\" Nord, 5° 48' 46\" Est                                                         Pavillon louis XIII                                                                              GPS : 47° 51' 56,88\" Nord, 5° 19' 48,72\" Est.                                                       Mont   GPS : 47° 51\" 12\" Nord, 5° 20' 02\" Est","gps":"47° 51' 31\" Nord, 5° 19' 58\" Est","images":["../image/image_52/52_Langres_1.jpg","../image/image_52/52_Langres_2.jpg","../image/image_52/52_Langres_3.jpg","../image/image_52/52_Langres_4.jpg","../image/image_52/52_Langres_5.jpg","../image/image_52/52_Langres_6.jpg","../image/image_52/52_Langres_7.jpg","../image/image_52/52_Langres_8.jpg","../image/image_52/52_Langres_9.jpg"]},"Consult_chateau_formulaire979b":{"id":"Consult_chateau_formulaire979b","dept":"52","canton":"Langres","commune":"Marac","nom":"Marac","type":"Château","periode":"XIV-XV","histoire":"MARAC, en 1260, Jean de Marac fait construire (ou fortifier) le château champenois dominant l'étang. En 1353, nous trouvons un Jean Ier de Chauffour, seigneur de Marac, marié à Marguerite d'Echalot. Puis la seigneurie de Marac est transmise en ligne directe à son fils Jean II de Chauffour, puis de nouveau à ses enfants, Jean III dit l'Ainé, Garnerot, Jeanne, dame de Deuilly et surtout Guillaume de Chauffour écuyer, dit Raillard, qui reprend en 1400 cette seigneurie pour la transmettre à son fils, Jean IV de Chauffour, bailli de Chaumont de 1420 à 1429, lequel réunira les deux fiefs dans la même famille. Le château champenois fut occupé par les ligueurs jusqu'en 1592, qui opérèrent des razzias contre la ville de Langres, interceptant les communications de cette ville avec Châteauvillain. Après la reprise du château par les Langrois sur les Anglais, celui-ci deviendra par alliance la propriété de la famille des Barres qui réunira les deux fiefs de Marac. Enfin, en 1746, Gabrie-Rose des Barres apporte Marac en mariage à Philibert-Charles-Nicolas Pietrequin, qui vendra vers 1750 sa portion de seigneurie champenoise au marquis Charles Camille de Capisucchi-Bologne habitant le château de Thivet. Quant au château, il sera brûlé en 1814 par les Russes et les Prussiens, et sera entièrement reconstruit de 1817 à 1820 à la mode romantique sur ses fondations médiévales par le comte de Messey.","architecture":"MARAC  La visite du colombier au lieu-dit « la basse-cour », nous montre que nous sommes sur l'emplacement de la ferme médiévale (disparue) du château champenois qui la domine de l'autre côté de la Suize, dans la verdure. Il s'agit d'un colombier dit « de pied » qui a traversé avec bonheur la Révolution (alors que c'est généralement le premier symbole de la féodalité qui était détruit), lequel n'est probablement guère antérieur au XV-XVIe siècle, contrairement aux panneaux touristiques installés autour du village (« Colombier XIIe siècle. »).\r\nCe colombier reste cependant d'un modèle médiéval, sans salle basse, avec les trous de boulins partant de la base des murs (d'où son nom de « colombier de pied ») représentant un total de 1491 boulins. Il correspond à un droit de colombage ? ou privilège ? du châtelain, qui doit être possesseur des cens de sa seigneurie ou de terres (en principe deux arpents par boulin selon la Coutume de Paris). On remarquera que les quelques rangées inférieures des boulins ont été fermées par un enduit lisse à une époque inconnue (soit 146 boulins obturés) ; sans doute pour éviter que les rongeurs ne viennent piller les nids ; un détail qui vient en complément du larmier extérieur (ou radière) placé à mi-hauteur, pour le même usage et de l'unique lucarne haute, orientée à l'Est, permettant l'envol des pigeons (avec volet fermant en période de semailles).\r\nCe colombier a été entièrement restauré par l'office de tourisme d'Arc-en-Barrois entre 1982 à 1984 sous la présidence de Pierre Béguinot, infatigable restaurateur des souterrains de Beauvoisin près de Bugnières, mais qui n'en verra pas l'achèvement. La charpente fut réalisée par les Compagnons du Devoir dans leur atelier de Muizon près de Reims, recouverte au moyen de 9000 tuiles « gironnées » (taillées en sifflet).","habitants":"Jean de Marac de Chauffour\r\n        \r\n        \"","divers":"Marac gps 47° 55' 40\" nord, 5° 11' 47\" est","gps":"","images":["../image/image_52/52_Marac_1.jpg","../image/image_52/52_Marac_2.jpg","../image/image_52/52_Marac_3.jpg"]},"Consult_chateau_formulaire0602":{"id":"Consult_chateau_formulaire0602","dept":"52","canton":"Langres","commune":"Saint-Martin-lès-Langres","nom":"Melville","type":"Château","periode":"XVIII","histoire":"MELVILLE, édifié en 1780 pour la famille Caroillon.  Caroillon Pierre fut le Maître d'oeuvre du château de Melville. Il appartient aujourd'hui, à la Famille Renard.  A l'origine le Chapitre de Langres y possédait une papeterie, marquée du sceau de Saint-Mammés.\r\n  Chambres d'hôtes.","architecture":"MELVILLE, de  style Renaissance et Classique, c'est un château dont la construction date de 1780.  le château de Melville et ses dépendances est l'authenticité même de l'architecture du XVIIIe siècle, a été construit sur les bords de la Mouche, la rivière langroise. Il est situé en contrebas, à quelques kilomètres, de la forteresse fortifiée de Langres. Le domaine de Melville comprend le château de Melville, qui est une demeure privée, le centre-équestre qui utilise les ailes du château et une ancienne papeterie (Papeteries Navarre) reconvertie en chambre-d'hôtes sur les bords de la Mouche, à quelques encablures de Hûmes, au lieu-dit Melville. Éléments protégés MH : les façades et les toitures du château, y compris le rez-de-chaussée voûté d'arêtes et l'escalier en bois du XVIIIe siècle; les deux pavillons circulaires (façade, toiture et cheminée centrale); les façades et les toitures des deux bâtiments de ferme encadrant la cour d'entrée : inscription par arrêté du 25 avril 1990.","habitants":"famille Caroillon\r\n        \r\n        \"","divers":"GPS : 47° 53' 33\" Nord, 5° 16' 35\" Est","gps":"47° 53' 33\" Nord, 5° 16' 35\" Est","images":["../image/image_52/52_Melville_1.jpg","../image/image_52/52_Melville_2.jpg","../image/image_52/52_Melville_3.jpg"]},"Consult_chateau_formulaire39ab":{"id":"Consult_chateau_formulaire39ab","dept":"52","canton":"Bologne","commune":"Doulaincourt-Saucourt","nom":"Montrol","type":"Château","periode":"XVII-XVIII","histoire":"MONTROL, au début du XIe siècle, la seigneurie du Val-du-Rognon était complètement dévastée et occupée par les fils du comte de Reynel. Pour reprendre le territoire, les chanoines de Reims ont traités  en 1014 avec le comte de Troyes, il en résulta la division du pouvoir entre le chapitre de Reims et les comtes de Champagne. Ainsi Dolencort apparaît en 1155 dans une charte du comte de Troyes, la première mention connue de Doulaincourt. C'est des comtes de Champagne que l'abbaye de Clairvaux obtient au XIIIe siècle son pouvoir sur Doulaincourt. Plusieurs chartes de l'abbaye de Clairvaux traitent de Doulaincourt à partir de 1245 mention dans plusieurs actes d'un curé, d'un prévôt, d'un pont de Doulaincourt et en 1246 mention de la prairie de Saint-Brice au-dessus de l'écluse ; en 1245 mention de la maison de l'abbaye qui est près du pont de Doulaincourt.  Vers 1760, un autre notable avec des possessions à Doulaincourt est Henri Toupot, seigneur de Bévaux, gendarme réformé de la garde ordinaire du roi, membre de l'Assemblée d'élection de Joinville, chevalier de Saint-Louis, habitant de Doulaincourt. Henri Toupot de Bévaux est le père du député Henri Simon Toupot de Bévaux, qui à son tour est le père du député Henri Camille Toupot de Bévaux et le beau-père de l'écrivain et député François Mongin de Montrol. La rue de Toupot de Bévaux porte leur nom, la maison de Montrol porte le nom de l'écrivain.En 1844, une école de jeune filles est fondée par la commune dans le château de Montrol et dirigée par des surs de la Providence de Langres.","architecture":"MONTROL la maison familiale rurale de Montrol ( internat dans le château de Montrol et ses annexes ) est un établissement privé d'enseignement agricole sous la tutelle du ministère de l'Agriculture, de l'Agro-alimentaire et de la Forêt. Il accueille des élèves des classes de 4e, de 3e et baccalauréat professionnel   La maison de Montrol doit son nom à une famille de députés et magistrats du département de la Haute-Marne. Après être restée la propriété de cette famille pendant des générations, elle est devenue propriété communale. Elle héberge depuis 1965 un établissement de type maison familiale et rurale. Le portail d'entrée ainsi que les façades et les toitures des deux tours de la porterie de style oriental  sont classées monument historiques.","habitants":"les  comtes de Champagne\r\n        \r\n        \"","divers":"Montrol  grav-2  GPS : 48° 19' 26,66\" Nord, 5° 12' 20,64\" Est","gps":"48° 19' 26,66\" Nord, 5° 12' 20,64\" Est","images":["../image/image_52/52_Montrol_1.jpg","../image/image_52/52_Montrol_2.jpg"]},"Consult_chateau_formulairedbf6-2":{"id":"Consult_chateau_formulairedbf6-2","dept":"52","canton":"Villegusien-le-Lac","commune":"Montsaugeon","nom":"Montsaugeon","type":"Forteresse","periode":"XIV-XV","histoire":"MONTSAUGEON,  était une châtellenie importante qui était située dans le duché de Bourgogne et le diocèse de Langres, qui avait le titre de comté, qui relevait du bailliage de Sens et dont dépendaient trente-neuf seigneuries. Au sommet de la motte a été construit un château fort de neuf tours qui était le siège dune puissante châtellenie située à une journée de marche de Dijon: La Terra Montis Salionis.   Ce sont les moines de Saint-Symphorien d'Aubigny, qui implantèrent au XIe siècle la vigne sur les coteaux de cette région située au pied et au sud du plateau de plateau de Langres. Jean III d'Amboise, archevêque de Langres, et à ce titre duc et pair de France, portait en 1496 le titre de comte de Montsaugeon. Le titre de seigneur de Montsaugeon continuait à être porté en 1505 par Pierre de Choiseul, baron de Clefmont, chambellan du duc François II de Bretagne, puis par Christophe de Tabouret, calviniste, et par son fils Josias Tanbouret, seigneur de Crespy, marié en 1597 à Catherine de Simony. Pendant les démêlés entre le roi Louis XI et Marie de Bourgogne, fille de Charles le Téméraire, le château de Montsaugeon fut pris en 1480 par Claude de Toulongeon qui y plaça une garnison qui ravagea tout le pays jusqu'à ce que le roi reprenne la place et mette le comté de Bourgogne à l'abri du pillage. En 1498, le château est à nouveau pris et incendié par Guillaume de Vergy, seigneur de Champlitte, maréchal de Bourgogne et gouverneur de cette province pour le duc, puis repris par les troupes royales. Le duc de Nevers, gouverneur de Champagne établi à Langres réunit une armée et assiège le château en 1589, prend le village et commence à saper les fortifications. En septembre, une armée de ligueurs commandés par Rougemont repoussent les troupes royales et reprennent le château dont ils réparent les fortifications.","architecture":"MONTSAUGEON, est pris par des bandes calvinistes qui sont chassés en 1592 par Jean Thomassin, seigneur de Montmartin, marquis de Mirebel, marié en 1588 à Louise de Bourbon-Busset, qui s'y installa et s'y fortifia avant d'aller reprendre le château de Couchey.Montsaugeon fut pris en 1594, cette fois par un des chefs de la Ligue, Jean de Tavannes, seigneur de Tavannes.  Sa tante Marguerite de Tavannes était mariée depuis 1504 avec Jean de Saulx, seigneur d'Arc-sur-Tille et de Prangey, grand écuyer du duc de Bourgogne. Après l'avènement du roi Henri IV, il fait sa soumission. Le château est investi en décembre 1595 par les troupes royales, puis entièrement rasé sur ordre du duc de Nevers.","habitants":"Famille, Pierre de Choiseul, baron de Clefmont, \r\n        \r\n        \r\n        \"","divers":"gps 47° 40' 00\" nord, 5° 18' 35\" est","gps":"","images":["../image/image_52/52_Montsaugeon_1.jpg","../image/image_52/52_Montsaugeon_2.jpg","../image/image_52/52_Montsaugeon_3.jpg"]},"Consult_chateau_formulaire6e58":{"id":"Consult_chateau_formulaire6e58","dept":"52","canton":"Bologne","commune":"Cirey-lès-Mareilles","nom":"Morteau_Cirey","type":"Maison-forte","periode":"XVI","histoire":"MORTEAU, maison-forte, ses anciens propriétaires étaient liés aux chanoines de Saint-Jean-Baptiste. Cette famille jouera un rôle important, en 1617, dans l'installation du Collège des Jésuites. La construction du château fut achevée en 1599.  Du coup, cette modeste maison-forte possède ce qu'on appelle un plan bastionné, ce qui est tout à fait exceptionnel pour une modeste maison fortifiée et très novateur à l'époque où elle fut édifiée par Nicolas de Hault, maire de Troyes, au XVIe siècle. Morteau était la plus petite commune de France au XIXe siècle. Le château actuel fut construit en 1599 sur les bases d'une maison noble du XVe siècle par Nicolas de Haut au retour de son pèlerinage à Jérusalem.\r\nDans le dernier tiers du XVIIIe siècle, le château sera repris en main par le comte de Beaujeu qui cherchera à lui donner un autre visage en le modernisant. Entre autres travaux, un nouvel étage y est ajouté ainsi que deux pavillons, agrandissant ainsi la demeure.","architecture":"MORTEAU,  fut construit au XVIe siècle. Son pigeonnier date du XVIIIe siècle et est classé aux M.H.  est une construction du XVIe siècle, son plan avec quatre tours en forme de bastion est remarquable, qui possède la particularité très rare d'être flanquée, à chacun de ses angles, par des tours qui sont en forme de losange (comme le furent tous les bastions des citadelles à partir du milieu du XVIe siècle) avec un toit pentu. Le rez-de-chaussée, entièrement voûté, se compose d'une grande salle basse et d'une cuisine. Un oratoire dédié à la Vierge est installé en partie haute d'une des tours. Ses murs sont décorés de peintures murales qui datent de 1640. L'étage a été modifié à la fin du XVIIIe siècle et l'aspect de cette époque demeure inchangé encore aujourd'hui (plancher, lambris, cheminées). Deux pavillons furent ajoutés, à cette période, contre les façades Nord, Sud, ainsi qu'un étage sous combles. Un pigeonnier du XVIIIe siècle se dresse proche du château de Morteau, avec son aménagement intérieur (boulins, échelle tournante),  est classé aux M.H. depuis le 26.10.2010.","habitants":"Famille de Nicolas de Hault,\r\n        \"","divers":"GPS : 48° 13' 28,47\" Nord, 5° 18' 49,46\" Est","gps":"48° 13' 28,47\" Nord, 5° 18' 49,46\" Est","images":["../image/image_52/52_Morteau_Cirey_1.jpg"]},"Consult_chateau_formulaire87aa":{"id":"Consult_chateau_formulaire87aa","dept":"52","canton":"Chaumont","commune":"Neuilly-sur-Suize","nom":"Neuilly_sur_Suize","type":"Château","periode":"XVI-","histoire":"NEUILLY sur SUIZE,  dans un état de délabrement total, M. Pierre Pellerin le racheta en 1967 et le restaura. Lorganisation du parc date de 1830. Il a conservé son plan : une grande pelouse ponctuée de quelques buis, longée par une allée sablée, qui elle même se trouve bordée par de grands arbres. Sur le côté, se trouve une île rattachée au parc par un pont. Lîle est longée par la Suize et possède un belvédère et quelques arbres. La tempête a emporté certains arbres, mais il reste cependant, parmi les nombreux arbres plantés après 1967, un tilleul et un peuplier centenaires tous les deux, le propriétaire actuel a replanté des arbres plus exotiques dans son parc après la tempête de 1999.","architecture":"NEUILLY sur SUIZE, ancien château fort du XVIe siècle, il fût remanié par la suite. Le château fut vendu comme bien national à la Révolution ensuite il passa pendant deux siècles dans diverses mains, a été initialement construit à la période médiéval (1247). L'ensemble était bien plus important. Il était défendu par quatre tours rondes, une enceinte et des douves. Au cours du temps, il a été passablement remanié et la dernière modification importante est dû à l'effondrement de la tour Nord-Est et, d'une partie de la façade Nord, au début du siècle dernier. Heureusement, son propriétaire actuel l'a fait restaurer entièrement. Les éléments protégés sont les façades, les toitures, le petit salon lambrissé du château, la chapelle, y compris la voûte d'ogives, la cave et l'étage supérieur, inscrits aux M.H. le 12/09/1991.","habitants":"Famille de M. Pierre Pellerin\r\n        \"","divers":"Neuilly  GPS : 48° 03' 05\" Nord, 5° 08' 56\" Est","gps":"48° 03' 05\" Nord, 5° 08' 56\" Est","images":["../image/image_52/52_Neuilly_sur_Suize_1.jpg","../image/image_52/52_Neuilly_sur_Suize_2.jpg"]},"Consult_chateau_formulairebb2d":{"id":"Consult_chateau_formulairebb2d","dept":"52","canton":"Nogent","commune":"Nogent","nom":"Nogent","type":"Château-tour","periode":"XIX-XX","histoire":"NOGENT, la construction du château de Nogent date du XIXe siècle. Il possède 2 ailes en retour à usage des communs, 780m2 de surfaces habitable dans 15 pièces, de vastes salles de réception lumineuses, 8 chambres et 3 salles de bain et 1 pièce d'eau. La propriété est en bon état. Elle est mise en vente..","architecture":"NOGENT, le donjon, reconstruit au XIXe siècle, témoigne de l'existence d'un château féodal, dont les premières mentions remontent en 610. Il marque bien l'implantation de la cité, sur le rebord d'un plateau, en position stratégique. Cette forteresse est à rapprocher d'autres places-fortes comme Langres, Montigny-le-Roi, Clefmont qui jalonnaient la frontière du royaume de France face à l'empire Germanique. Ce rôle défensif fut définitivement abandonné à la fin du XVIIe siècle, avec l'occupation de la Lorraine et le rattachement de la Franche-Comté.","habitants":"Seigneur locaux\r\n        \"","divers":"Nogent GPS : 48° 0' 49\" Nord, 5° 20' 45\" Est","gps":"48° 0' 49\" Nord, 5° 20' 45\" Est","images":["../image/image_52/52_Nogent_1.jpg","../image/image_52/52_Nogent_2.jpg","../image/image_52/52_Nogent_3.jpg"]},"Consult_chateau_formulairef67f":{"id":"Consult_chateau_formulairef67f","dept":"52","canton":"Poissons","commune":"Noncourt-sur-le-Rongeant","nom":"Noncourt","type":"Château","periode":"XVI","histoire":"NONCOURT   La principale activité du village était métallurgique avec La Batterie, au sud du village, mise en place par les frères Michel en 1829, puis dirigée par François de Beurges. L'usine comportait un haut-fourneau, four à puddler, four à réchauffer et deux marteaux mus par l'énergie hydraulique. La Forge à un écart de l'entrée du village (forge basse), installée par les frères Michel en 1839 comportait deux affineries, un haut-fourneau, bocard et patouillet. Elle appartint à F. de Beurges, fut transformée en fonderie en 1864. Elle sera achetée par Viard en 1904, puis Champenois en 1914. Elle devint la S.U.R.A.M. Convertie en fonderie de deuxième fusion pour pièces mécaniques, elle cessera ses activités en 1946.  Le Vieux Noncourt, à la sortie du village vers Thonnance les Moulins est à la place d'une ancienne forge du XIIIe siècle. Le marquis de Reynel y installa un haut-fourneau en 1784. En 1837, le propriétaire est Pigorot, puis Adam en 1842 et Maupas jusqu'en 1860.","architecture":"NONCOURT, le château de Noncourt est à tours carrées, propriété d'un couple de Hollandais, il est à peine visible de la hauteur se trouvant près de l'église. De construction récente, il a été bâti au XVIe siècle par le chevalier Dupuis de Clinchamps, on l'aperçoit depuis la route à la sortie du village vers Thonnance les Moulins. A cette place même, un ancien château fut assiégé par les paysans en juillet 1789.","habitants":"chevalier Dupuis de Clinchamp\r\n        \"","divers":"noncourt gps  48° 25' 13\" nord, 5° 14' 38\" est","gps":"","images":["../image/image_52/52_Noncourt_1.jpg","../image/image_52/52_Noncourt_2.jpg","../image/image_52/52_Noncourt_3.jpg","../image/image_52/52_Noncourt_4.jpg"]},"Consult_chateau_formulaireecff":{"id":"Consult_chateau_formulaireecff","dept":"52","canton":"Poissons","commune":"Orquevaux","nom":"Orquevaux","type":"Château","periode":"XVIII-XIX","histoire":"ORQUEVAUX, il semble qu'Orquevaux fut tout d'abord une simple ferme militaire annexée à une colonie agricole, chargée de cultiver le sol et de nourrir avec ses produits les petites garnisons qui y séjournaient. Après les invasions des Visigoths puis des Huns, un village franc fut bâti à Orquevaux. Construit en 1850, le château d'Orquevaux a dabord servi de relais de chasse avant d'être agrandi et embelli. Depuis, le château d'Orquevaux, situé dans un parc d'un hectare et demi à flan de colline, a conservé son caractère authentique de style Napoléon III.    Le Castel d'Orquevaux est un château du XIXe siècle dans lequel nous vous proposons de séjourner en chambre d'hôtes. A la fin du XIXe siècle, le Castel d'Orquevaux. Chambres d'hôtes.","architecture":"ORQUEVAUX,   la ferme du fourneau et la forge Jacquot, chemin du Cul du Cerf, qui appartiennent au baron de Thiers. Elles sont acquises par l'industriel Langrois Abel François Nicolas Caroillon de Vandeul. Il exploite le fourneau jusqu'au milieu du XIXe siècle où il cesse définitivement son activité. Abel François Nicolas Caroillon de Vandeul (1746-1813), premier commis des finances (1785) et directeur des Domaines du Roi. Il épouse Marie-Angélique Diderot, fille de Denis Diderot et exploite une forge sur la commune.   Le château d'Orquevaux est un château français et un monument historique. C'est une maison privée et une résidence internationale d'artistes et d'écrivains.","habitants":"baron de Thiers\r\n        \"","divers":"Orquevaux  Gps  48° 18' 07\" nord, 5° 23' 56\" est","gps":"","images":["../image/image_52/52_Orquevaux_1.jpg","../image/image_52/52_Orquevaux_2.jpg","../image/image_52/52_Orquevaux_3.jpg","../image/image_52/52_Orquevaux_4.jpg"]},"Consult_chateau_formulaire4777-2":{"id":"Consult_chateau_formulaire4777-2","dept":"52","canton":"Chalindrey","commune":"Pailly","nom":"Pailly","type":"Château","periode":"XVI-XIX","histoire":"PAILLY, de style Renaissance en Pays de Langres. pour Nicolas Ribonnier qui conserva  le plan général le donjon  deux tours des douves et orna la cour d'honneur d'un décor  Renaissance. Progressivement abandonné ensuite par la famille de Saulx-Tavannes, il fut acheté par une famille franc-comtoise en 1764, il fut « envahi et pillé par les gens d'Heuilley Cotton en 1793 », en pleine Révolution. Vendu comme bien national à la Révolution, Il est ensuite confisqué et vendu par l'administration centrale de la Haute-Marne en 1799. Le château reprend vie à la fin de la période napoléonienne grâce à la famille du Breuil de Saint-Germain qui l'acquiert en 1821, L'architecte qui supervisa les travaux était Nicolas Ribonnier.  Les du Breuil de Saint-Germain restaurent la tourelle, la chapelle, les cheminées, le bas-relief, la lucarne du pavillon de lescalier sur cour et le jardin à la française très probablement réaménagé à la fin du XIXe siècle ou au début du XXe. La famille le cèdera en 1936 aux Mutuelles agricoles de l'Est.  Éléments protégés MH : le château en totalité : classement par arrêté du 27 juillet 1921.","architecture":"PAILLY,  château construit de 1563 à 1570 par Gaspard de Saulx-Tavannes, compagnon d'armes de François Ier le château reste propriété privée jusqu'en 1936, date à laquelle il est acquis par la caisse de réassurance agricole contre les accidents de l'est, avant d'être donné à l'Etat par arrêté du 28 mars 1963. Ce château, témoin de la richesse architecturale de la Renaissance bourguignonne et champenoise, a été construit à partir d'un ancien château de plaine comprenant un massif donjon de plan barlong du XIVe siècle et un ensemble de courtines et de corps de logis dessinant un trapèze irrégulier flanqué à ses angles de tours rondes. Le château du Pailly n'a conservé que son donjon, forme les 3 cotés d'une quadrilatère majestueux avec des douves en eau, qui l'entourent. Les façades du château sont décorées, coté cour, par de belles colonnes à pilastres. Le Jardin à la Française fut réaménagé de belles pièces d'eau, à la fin du XIXe siècle. Vous découvrirez en vous promenant dans son parc, une belle allée odorante de tilleuls, orchestrée en marquise. Dans le jardin romantique du château du Pailly, on peut admirer une vaste parcelle composée d'arbres rares, comme un marronnier rose, un noyer noir d'Amérique ou un Catalpa.","habitants":"famille des du Breuil de Saint-Germain\r\n        \"","divers":"Pailly  GPS : 47° 47' 30,84\" Nord, 5° 24' 49,68\" Est","gps":"47° 47' 30,84\" Nord, 5° 24' 49,68\" Est","images":["../image/image_52/52_Pailly_1.jpg","../image/image_52/52_Pailly_2.jpg","../image/image_52/52_Pailly_3.jpg","../image/image_52/52_Pailly_4.jpg","../image/image_52/52_Pailly_5.jpg","../image/image_52/52_Pailly_6.jpg"]},"Consult_chateau_formulairebcc9":{"id":"Consult_chateau_formulairebcc9","dept":"52","canton":"Villegusien-le-Lac","commune":"Longeau-Percey","nom":"Percey_le_Pautel","type":"Château","periode":"XVII-XVIII","histoire":"PERCEY le PAUTEL,  remplaçant un édifice détruit au début du XVIIe siècle. Cette disposition traditionnelle, date de la construction dans la seconde moitié du XVIIIe siècle.  Deux pièces d'eau sont encore visible. Un chalet a été ajouté au XIXe siècle.\r\nÉléments protégés MH : les façades et les toitures du château et des communs ; le portail d'entrée avec ses grilles ; les pièces suivantes avec leur décor : la salle à manger, le petit salon et la chapelle : inscription par arrêté du 28 juillet 1975. L'ensemble de l'intérieur du logis, l'ensemble du parc (y compris les murs de clôture, l'entrée des communs, le chalet et les murs du potager).","architecture":"PERCEY le PAUTEL,  sa construction date de 1752 à 1755.  L'édifice actuel présente un bon exemple de petit château de plaisance du XVIIIe siècle. A l'intérieur, les pièces sont sur le côté jardin et sont desservies par un corridor situé côté cour. Cette disposition date de la construction, déjà traditionnelle dans la seconde moitié du XVIIIe siècle. Les pièces ont conservé leur décor XVIIIe, composé de lambris en bois et stuc, dessus de porte peints, cheminées à trumeaux. L'escalier d'origine conserve une belle rampe en fer forgé. Le parc à la française présente une disposition d'ensemble conforme aux dispositions d'origine. La composition est axée sur deux grandes allées se croisant devant la terrasse. Le décor des parterres a disparu. Deux pièces d'eau sont encore visible et l'emplacement du potager se devine grâce à ses murs de clôture. Un chalet fut ajouté au XIXe siècle. Le Château de Percey-le-Pautel est inscrit aux M.H. depuis le 24.08.2005.","habitants":"Seigneur local\r\n        \"","divers":"GPS : 47° 45' 32\" Nord, 5° 19' 01\" Est","gps":"47° 45' 32\" Nord, 5° 19' 01\" Est","images":["../image/image_52/52_Percey_le_Pautel_1.jpg"]},"Consult_chateau_formulaire7d7a":{"id":"Consult_chateau_formulaire7d7a","dept":"52","canton":"Villegusien-le-Lac","commune":"Villegusien-le-Lac","nom":"Piepape","type":"Château","periode":"XVIII","histoire":"PIEPAPE, en 1789, le village de Piepape fait partie de la province de Champagne dans le bailliage de Langres. Le 1er août 1972, la commune de Piépape est rattachée sous le régime de la fusion-association à celle de Villegusien qui devient Villegusien-le-Lac. Le 1er janvier 2016, Piépape perd son statut de commune associée. Le château de Piepape, situé dans la commune de Villegusien-le-Lac en Haute-Marne, a été construit dans le troisième quart du XVIIIe siècle.","architecture":"PIEPAPE, Il est de style Louis XVI et fut créé par un architecte Dijonnais. Le château de Piepape est une demeure de plaisance, qui se situe au cur d'un parc magnifique où se trouve une statue de Neptune. On peut y admirer les façades et les toitures, un escalier conduisant au sous-sol, ainsi qu' une salle à manger, un grand salon du rez-de-chaussée ainsi qu'une chambre à coucher, les trois chambres à coucher avec leurs alcôves, situées à l'étage donnent sur le côté parc et sont inscrits sur l'Inventaire supplémentaire des Monuments Historiques, depuis le 25/10/1971. Le château de Piepape ne se visite pas. Il est toutefois visible de l'extérieur. Éléments protégés MH : les façades et les toitures ; l'escalier conduisant au sous-sol.","habitants":"\"","divers":"Piepape  GPS : 47° 43' 16\" Nord, 5° 19' 27\" Est","gps":"47° 43' 16\" Nord, 5° 19' 27\" Est","images":["../image/image_52/52_Piepape_1.jpg","../image/image_52/52_Piepape_2.jpg","../image/image_52/52_Piepape_3.jpg"]},"Consult_chateau_formulaireb27d":{"id":"Consult_chateau_formulaireb27d","dept":"52","canton":"Poissons","commune":"Poissons","nom":"Poissons","type":"Château","periode":"XVI-XVII","histoire":"POISSONS, en 1294-1295, le seigneur Aubert de Poissons (chevalier) dit \"Civot\" qui avait deux fils Aubert et Hugues, donna une partie de leur propriété à l'abbaye de Saint-Urbain. De 1609 à 1660, le château changea plusieurs fois de propriétaire.  Nicolas Maillot de Gevoncourt, en 1708, fit construire l'aile Louis XIV, pour des réceptions. Au moment de la Révolution, ses nobles hôtes, les familles Mollerat de Riaucourt et Marquette de Fleury ne paraissent pas avoir été gravement inquiétés.  Au XIXe siècle, il fut la propriété de la famille de Maupas jusqu'au début du XXe siècle.. En 1832, il se retira au château de Poissons, avec les croix de Saint Ferdinand d'Espagne, de Saint Louis de France, et de la légion d'honneur. Il mourut en 1862. Son épouse Madame la marquise de Maupas, mourra 12ans plus tard. Le château sera revenu à une société civile de la haute-Marne en 1920, face aux réparations à faire. Monsieur Paul Festugière, dernier de trois générations de maîtres de forges et directeur d'une entreprise de métallurgie, s'en rendit acquéreur. Il y vécut avec sa famille plusieurs années, puis l'offrit, en 1942, à sa fille Odette Festugière, épouse du Colonel Laurent Ballif, qui y est décéda le 6/06/1961.","architecture":"POISSONS,  c'était une simple maison de campagne appartenant à de paisibles seigneurs qui venaient la visiter, à l'époque de la chasse ou des vendanges. De 1609 à 1660, le château changea plusieurs fois de propriétaire, Nicolas Maillot de Gevoncourt, en 1708, fit construire l'aile Louis XIV, pour des réceptions.  L'entrée principale est encadrée de deux pilastres engagés au mur et surmontés d'un fronton triangulaire. Au milieu de ce frontispice, se détache en bas relief; le portrait du Roi Soleil. La base porte la date de 1709. Cette tranquillité relative fut achetée, il faut le dire, au prix de quelques sacrifices comme la remise de ses armes et renoncer à ses droits féodaux.   Éléments protégés MH : la totalité de l'aile Louis XIII (y compris la tour et la porterie), de l'aile du XVIIIe siècle, de l'auditoire ; les façades et les toitures des communs ; la pièce d'eau ; le mur de clôture : inscription par arrêté du 2 juin 1986. Le château actuel se divise en deux parties; les anciens bâtiments, l'aile Louis XIII, et les nouveaux. Le château sera revenu à une société civile de la haute-Marne. Les sociétaires en feront une maison de retraite, dont ils confièrent la direction à Sur Léonie, religieuse de La Providence de Langres. La façade est éclairée par de hautes et imposantes fenêtres, outre le rez-de-chaussée, l'édifice ne possède que des soubassements et des combles. La demeure est entourée d'une belle cour et d'un vaste jardin où se trouve une pièce d'eau. Il faut habité par le sire de Joinville et détruit à la Révolution.","habitants":"famille de Maupas\r\n        \"","divers":"GPS : 48° 25' 26\" Nord, 5° 13\" 14' Est","gps":"48° 25' 26\" Nord, 5° 13\" 14' Est","images":["../image/image_52/52_Poissons_1.jpg","../image/image_52/52_Poissons_2.jpg","../image/image_52/52_Poissons_3.jpg"]},"Consult_chateau_formulaire5fc9":{"id":"Consult_chateau_formulaire5fc9","dept":"52","canton":"Villegusien-le-Lac","commune":"Villegusien-le-Lac","nom":"Prangey","type":"Château","periode":"XVIII","histoire":"PRANGEY  On connaît déjà lexistence du château de Prangey en 1211. Au XIVe siècle, le château appartient à la famille de Baudoncourt, puis par mariage à la famille de Saulx. Le petit-fils aliéna le domaine qui fut racheté par une famille de magistrat de Dijon. En 1566, le maréchal Saulx-Tavannes récupère Prangey jusquà la fin du XVIIe siècle. Cest la famille Piétrequin qui releva le titre de seigneur de Prangey et le posséda jusquà la Révolution.  Propriété de Mme Poinsotte et de Mr Charles Cusinberche.","architecture":"PRANGEY, vestige du château féodal, une muraille flanquée de deux tours, la demeure du XVIIIe siècle offre une façade agrémentée d'un fronton triangulaire  et d'un haut toit en tuiles avec quatre belles lucarnes, au Sud, une passerelle donne accès au parc dessiné dit-on par Le Nôtre, le créateur des jardins de Versailles. Les façades et toitures de l'ensemble du château, douves, ponts, grille en fer forgé du fossé ouest, portail d'entrée, grand escalier avec sa rampe en fer forgé sont inscrits sur l'Inventaire supplémentaire des M.H. depuis le 12 janvier 1987. Située aux frontières du royaume de France en 1636, le château fut remanié au XVIIIe siècle. Le parc actuel est ordonnancé, cest un jardin régulier, il est composé de deux terrasses, il existe un grand bassin supérieur entouré dun mur au niveau de la seconde terrasse et un petit bassin inférieur. Le parc est parsemé de buis taillés et de parterres floraux. De nombreux arbres tels que des conifères, des feuillus bordent le parc.  Éléments protégés MH : les façades et les toitures de l'ensemble du château (corps de logis principal, ailes est et sud, tours); les douves et les deux ponts qui les franchissent ; la grille en fer forgé du fossé ouest ; le portail d'entrée ; le grand escalier du corps de logis principal avec sa rampe en fer forgé : inscription par arrêté du 12 janvier 1987.","habitants":"famille Piétrequin\r\n        \"","divers":"gps 47° 44' 22\" nord, 5° 16' 57\" est","gps":"","images":["../image/image_52/52_Prangey_1.jpg","../image/image_52/52_Prangey_2.jpg","../image/image_52/52_Prangey_3.jpg","../image/image_52/52_Prangey_4.jpg"]},"Consult_chateau_formulairef282":{"id":"Consult_chateau_formulairef282","dept":"52","canton":"Villegusien-le-Lac","commune":"Prauthoy","nom":"Prauthoy","type":"Château","periode":"XVII-XVIII","histoire":"PRAUTHOY, en avril 2000 Daniel Berchard et Pierre Louis Bugnod acquièrent le château et entreprennent sa rénovation. Ils réaménagent avec le plus grand soin toutes les pièces, dont certaines nétaient plus ouvertes depuis des années. Frédéric Mailfait tombe sous le charme du château et le rachète en 2008 pour sy installer avec ses enfants, chambres d'hôtes et suites.","architecture":"PRAUTHOY, le château est composé de plusieurs bâtisses dépoques différentes, deux corps de bâtiment du XVIIe siècle encadrent la façade principale, bâtie au XVIIIe siècle. Elle fut surélevée dun étage à la fin du XIXe siècle. Le parc, les dépendances dont la tourelle, et la grotte artificielle ont été aménagés au milieu du XIXe siècle. En sous-sol, accessible depuis la grotte, le cellier du XVIe siècle est aujourdhui converti en caveau de dégustation. Le domaine était vaste ; au XVIIe siècle, il sétendait sur plusieurs bourgs alentour et avait une vocation agricole et commerciale pour alimenter les autres maisons, les caves ont contenu jusquà 117 pièces de vin à la Révolution Française. Aujourdhui, le domaine est réduit au parc et conserve une superficie dun peu plus de cinq hectares.  Deux corps de bâtiment du XVIIe siècle encadrent la façade principale, édifiée en 1721. Elle fut surélevée dun étage à la fin du XIXe siècle. Le château de Prauthoy, dont la construction sétale du XVIe au XIXe siècle, est devenu, aujourdhui, un hôtel luxueux qui accueillera toutes vos cérémonies ou réceptions. Vous pourrez louer une salle au château de Prauthoy pour fêter vos évènements privés (mariage, séminaire).","habitants":"Famille  Pierre Louis Bugnod \r\n        \"","divers":"Prauthoy GPS : 47° 40' 43\" Nord, 5° 17' 40\" Est","gps":"47° 40' 43\" Nord, 5° 17' 40\" Est","images":["../image/image_52/52_Prauthoy_1.jpg","../image/image_52/52_Prauthoy_2.jpg"]},"Consult_chateau_formulairea806":{"id":"Consult_chateau_formulairea806","dept":"52","canton":"Bologne","commune":"Reynel","nom":"Reynel","type":"Château","periode":"XV-XVII","histoire":"REYNEL,  au XVe siècle possession de la famille des Joinville et  d'Amboise. Le château endommagé par les guerres de Religion et la guerre de Trente Ans, était dans un état de délabrement lors de son achat en 1763, Claude Adrien de la Rue, comte de Mareilles,  qui reconstruisirent le château  et rajout d'un pavillons par le comte de Beurges. A l'intérieur, une importante collection de peintures de Jeff  Leempoels célèbre peintre dorigine belge. Au XIXe siècle, le château était la propriété de Louis François de Beurges (1782-1860), comte de Beurges, député de la Haute-Marne époux en 1816 de Charlotte Louise Mélanie Lallemant. Leur fils unique fut Henri Charles Louis de Beurges en 1822, fut propriétaire des Forges de Manois, rue de l'Université à Paris, épouse le 12/6/1851 d'Alexandrine de Rohan-Chabot, dont une fille unique Osine de Beurges (1853-1877), amie d'enfance de Mathilde Mauté (1853-1914) épouse de Paul Verlaine, et qui vint souvent faire des séjours au château avec ses parents.   M. Walter  Leempoels l'acquit en 1942 Depuis, plusieurs restaurations ont été effectuées par l'actuel propriétaire et permirent de sauver le château de l'abandon.","architecture":"PORTE du donjon à REYNEL, situé sur un éperon escarpé,  Du fait de sa situation stratégique. Au milieu du XVIIe siècle, il était dans un état de délabrement tel que, lors de son achat en 1763, Claude-Adrien de la Rue, comte de Mareilles, en fit disparaître les vestiges à l'exception d'une tour ronde. Le château fut reconstruit de 1763 à 1772 tel qu'il se présente dans son ensemble aujourd'hui il se compose d'un long corps de logis rectangulaire, flanqué de deux pavillons placés de biais dont l'un abritant une chapelle qui délimite la cour d'honneur. L'axe central de la composition est marqué par un avant corps à une travée, délimité par des chaines d'angle appareillées à refends et amorti par un fronton sculpté.  le reste de l'élévation à trois niveaux dont un attique, se caractérise par sa sobriété, seul demeure, sur la façade nord, une tour de l'ancien château. Au XIXe siècle le propriétaire fit bâtir entr les deux tours un pavillon à haute toiture dont la façade percée au niveau de l'étage de porte fenêtres cintrées et couronné par un fronton triangulaire portant un décor sculpté.\r\nÉléments protégés MH : les façades et les toitures ;  au premier étage : le grand salon ovale XVIIIe siècle avec son décor sculpté dans l'aile nord-est, la bibliothèque avec ses lambris du  XVIII siècle, les chambres avec leurs lambris du XVIIIe siècle dans l'aile sud-est, les salles voûtées de la tour nord-ouest : inscription par arrêté du 21 novembre 1989.  Des visites y sont organisées ainsi que de prestigieuses réceptions.","habitants":"famille des Joinville\r\n        \"","divers":"Reynel GPS : 48° 17' 31\" Nord, 5° 20' 15\" Est","gps":"48° 17' 31\" Nord, 5° 20' 15\" Est","images":["../image/image_52/52_Reynel_1.jpg","../image/image_52/52_Reynel_2.jpg","../image/image_52/52_Reynel_3.jpg","../image/image_52/52_Reynel_4.jpg","../image/image_52/52_Reynel_5.jpg"]},"Consult_chateau_formulaired199":{"id":"Consult_chateau_formulaired199","dept":"52","canton":"Bologne","commune":"Rimaucourt","nom":"Rimaucourt","type":"Château","periode":"XVI-XVII-XVIII","histoire":"ANDELOT à Blancheville  village voisin,  château construit en 1659 , c'est aujourd'hui une propriété de la municipalité qui l'a transformé en école, seul les extérieurs et le parc sont dignes d'intérêt. En Juillet, au parc du château d'Andelot se tient un grand spectacle du Far-West avec chevaux, danse country, voitures américaines, indiens, barbecue géant, saloon, grand repas sur réservation, et nombreuses animations.                                                                           RIMAUCOURT, en 1616, le fief de Rimaucourt est acheté par Claude dAnglure comte de Bourlemont marquis de Sy. Ses descendants l'occupent jusqu'en 1732. En 1756 un riche financier ayant fait fortune comme munitionnaire des campagnes  du maréchal de Saxe : Pierre Guillaume Tavernier de Boullonge, marquis de Buzancy,  baron de Rimaucourt,  trésorier de l'Extraordinaire des guerres et secrétaire du Roi Louis XV, Sa fille Catherine, maitresse de Talleyrand pendant près de 50 ans, échappe à la guillotine par l'entremise de Mme de Staël, fille de Necker et émigre en Suisse.  Les sires de Joinville furent seigneurs de Rimaucourt. Le 20 avril 1809, le Duc Decrès devint propriétaire du château ministre de la marine de Napoléon Ier. A la mort du Duc, en 1820, la Duchesse hérita de l'immense domaine. Au décès de cette dernière, en 1864, son neveu Louis Napoléon d'Albufera hérita du château de Rimaucourt et de la famille Suchet qui lui était apparentée du côté de son épouse.","architecture":"RIMAUCOURT, la construction du château de Rimaucourt date de la 1ère moitié du XVIIe et du XVIIIe et de la 1ère moitié du XIXe siècle. L'aile Nord du château de Rimaucourt fut construite au XIXe siècle. Le château de Rimaucourt aurait été construit à partir des pierres provenant de la forteresse de Montéclair. La construction du château (qui à l'époque était en fait une maison forte occupée par des chevaliers milites, dépendant du seigneur de Reynel) débuta au XIIe siècle.  La façade principale porte un décor à bossages, typique Renaissance, et flanquée de deux pavillons carrés ornementés de baies et de pilastres cannelés d'ordre toscan avec un superbe entablement. Le toit est de forme trapézoïdale et se termine par un lanternon. L'aile nord fut bâtie au XIXe siècle. Les haut fourneau, construit au XVIIIe siècle, ainsi qu'une fonderie appartiennent à la famille Décrès au début XIXe siècle et sont exploités par Capitain. Actuellement ne subsistent que les logements d'ouvriers construits en 1875.  Le château de Rimaucourt est inscrit aux M.H. depuis le 16/01/1991.","habitants":"Famille de Claude dAnglure\r\n        \"","divers":"Andelot grav 1-2-3                                       \r\ngps 48° 14' 38\" nord, 5° 17' 58\" est\r\nRimaucourt, grav 4-5-6                                                                    GPS : 48° 15' 03\" Nord, 5° 19' 47\" Est","gps":"48° 15' 03\" Nord, 5° 19' 47\" Est","images":["../image/image_52/52_Rimaucourt_1.jpg","../image/image_52/52_Rimaucourt_2.jpg","../image/image_52/52_Rimaucourt_3.jpg","../image/image_52/52_Rimaucourt_4.jpg","../image/image_52/52_Rimaucourt_5.jpg","../image/image_52/52_Rimaucourt_6.jpg"]},"Consult_chateau_formulairebdaf":{"id":"Consult_chateau_formulairebdaf","dept":"52","canton":"Villegusien-le-Lac","commune":"Rivière-les-Fosses","nom":"Rivière_Fossés","type":"Maison forte","periode":"XVII","histoire":"RIVIERE les FOSSEES,  au Moyen Âge, faisait partie des trente-neuf seigneuries du bailliage viticole de Montsaugeon, ce comté est placé sous l'autorité des évêques de Langres, jusqu'à la Révolution.  En 1209, Robert de Châtillon, évêque de Langres, fait don de l'église.  Cette maison-forte, symbole du fief laïc de la famille dite de Rivière, commandait autrefois le carrefour du chemin du vallon de Lavaux (vallon de la Coulange), avec l'ancien chemin de Chatoillenot à Boussenois. Ses fossés rejoignaient le cimetière entourant l'église. On remarquera à l'extérieur les grilles provenant du domaine de Girault de Prangey à la Villa des Tuaires à Courcelles-Val-d'Esnoms, ramenées ici au début du XXe siècle. Éléments protégés MH : la Maison-Forte avec ses façades et toitures, y compris la galerie Troubadour, l'escalier intérieur à vis, le grand salon et la salle à manger du rez-de-chaussée et leur décor : inscription par arrêté du 5 mai 1972. Les deux tours fortifiées, la chambre à alcôve du premier étage, les murs de soutènement des terrasses : inscription par arrêté du 12 mai 1989.","architecture":"RIVIERE les FOSSEES,  une tour de guet avec meurtrières toujours en élévation et escalier intérieur à vis permettait la défense du château, et dominait les terrasses. De sa plate-forme aujourd'hui transformée, le guetteur dominait toute la vallée ainsi qu'un vaste horizon. Une deuxième tour, dite \"tour d'ardoise\" en bordure de la grande place, comportait une salle des gardes voûtée en ses murailles très épaisses (début XVIe siècle), et la statue de la Vierge en marbre blanc de Carrare (école italienne), de facture non conventionnelle, a été transférée à l'église toute proche.                                                                                                              A deux K.M. au nord CHATOILLENOT, situé sur la commune du Val-d'Esnoms en Haute-Marne, a été construit dans le troisième quart du XVIIIe siècle (1771).  Éléments protégés MH : le château en totalité ; le portail d'entrée avec sa grille en fer forgé ; le mur de soutènement de la terrasse ; la façade et la toiture du petit pavillon situé au sud du portail ; le petit pont du parc au-dessus du passage piétonnier : inscription par arrêté du 26 août 1988.","habitants":"famille dite de Rivière,\r\n        \r\n        \"","divers":"Rivières les Fossées grav de 1-2-3    47° 39' 35\" nord, 5° 14' 02\" est                                                                                   Chatoillenoit grav 4-5","gps":"","images":["../image/image_52/52_Rivi%c3%a8re_Foss%c3%a9s_1.jpg","../image/image_52/52_Rivi%c3%a8re_Foss%c3%a9s_2.jpg","../image/image_52/52_Rivi%c3%a8re_Foss%c3%a9s_3.jpg","../image/image_52/52_Rivi%c3%a8re_Foss%c3%a9s_4.jpg","../image/image_52/52_Rivi%c3%a8re_Foss%c3%a9s_5.jpg"]},"Consult_chateau_formulaire78b9":{"id":"Consult_chateau_formulaire78b9","dept":"52","canton":"Bologne","commune":"Roches-Bettaincourt","nom":"Roches_Rognon","type":"Château","periode":"XVII","histoire":"ROCHES sur ROGNON,  est construit au XVIIe siècle, il fut la maison natale du marquis Claude François de Jouffroy d'Abbans, inventeur du premier bateau à vapeur. A noter que sa toiture n'est pas celle construite au XVIIe siècle, car le marquis dut vendre toutes les ardoises afin de financer ses inventions.                                                                    Le village de Roches-Bettaincourt est la réunion de deux communes, Roches-sur-Rognon et Bettaincourt. Roches est elle-même divisée en deux hameaux, un principal et un faubourg, délimité par la route départementale, appelé Cultru, ancien Curtru dont le nom latin est, peut-être, Curtus Rivus.","architecture":"ROCHES SUR ROGNON a été construit au XVIIe siècle. Un des inventeurs de la navigation à vapeur, Claude François Jouffroy d'Abbans, (1751-1832), y est né. Le château de Roches-sur-Rognon est situé au N°23 avenue Jouffroy d'Abbans, à 25 km de la ville de Chaumont, au cur d'un parc à l'Anglaise de 7 Ha, aménagé avec des étangs et une rivière. Le château de Roches-sur-Rognon est remarquablement aménagé et conservé, est, actuellement, la propriété de Bernard et Marie-Thérèse Lugnier qui vous proposent leurs chambres d'hôtes et tables d'hôtes, ouvert toute l'année.","habitants":"maison natale du marquis Claude François de Jouffroy d'Abbans\r\n        \"","divers":"Roches GPS : 48° 18' 04\" Nord, 5° 15' 22\" Est","gps":"48° 18' 04\" Nord, 5° 15' 22\" Est","images":["../image/image_52/52_Roches_Rognon_1.jpg","../image/image_52/52_Roches_Rognon_2.jpg"]},"Consult_chateau_formulaireb7f8":{"id":"Consult_chateau_formulaireb7f8","dept":"52","canton":"Poissons","commune":"Romain sur Meuse","nom":"Romain_sur_Meuse","type":"Château","periode":"XVIII","histoire":"ROMAIN sur MEUSE  Ce petit village français, qui fut connu pour avoir été un haut lieu de Cisellerie (fabrication de ciseaux) pendant le XIXe et XXe siècles, a un château , du XVIIIe siècle, dont la construction fut entreprise par Gabriel de Messey, chambellan Du duc de Lorraine. A la mort de Gabriel de Messey qui survint en 1765, le château n'était pas achevé et il fallut attendre 1788 pour voir le premier propriétaire habité les lieux. Il s'agissait de Jean-Baptiste de Thumery, un colonel du régiment du Royal Lorraine.\r\nA la Révolution française, Mme de Bienville, fille du colonel de Thumery,","architecture":"ROMAIN sur MEUSE, le château a été construit dans la deuxième moitié du XVIIIe siècle, le château n'était pas encore terminé, habité les lieux, fit les derniers aménagements en faisant débroussailler les terrains entourant le château pour y créer des jardins et des vergers,  y fit installer dans la cour d'honneur, deux tapis de pelouses, bordant une grande allée principale.  Sa construction date de 1753 à 1794. Son pigeonnier et son décor intérieur font partie des éléments protégés. Le château a été inscrit aux M.H. en 1992.","habitants":"Famille Jean-Baptiste de Thumery\r\n        \"","divers":"Romain GPS : 48° 10' 15\" Nord, 5° 32' 07\" Est","gps":"48° 10' 15\" Nord, 5° 32' 07\" Est","images":["../image/image_52/52_Romain_sur_Meuse_1.jpg","../image/image_52/52_Romain_sur_Meuse_2.jpg"]},"Consult_chateau_formulaire47d7":{"id":"Consult_chateau_formulaire47d7","dept":"52","canton":"Chalindrey","commune":"Savigny","nom":"Savigny_52","type":"Château","periode":"XVIII","histoire":"SAVIGNY, C'était devenu l'Auberge de la Renaissance. Elle est mise en vente, Le domaine Le Bocage est situé à Savigny, un village dans l'environnement authentique et rural . «Ons» Savigny est situé à la pointe sud de la région Champagne-Ardennes  Le domaine du Bocage est un centre de repos et de tranquillité, où il bourdonne toujours des  activités, gérer par Jachtslot st- Hubert.","architecture":"SAVIGNY, a découvrir cette magnifique demeure de 440 m² sur un terrain de 70 ares totalement rénovée avec goût comprenant: un hall d'entrée avec une partie accueil, un séjour salon avec un ancien bar, une salle de restaurant de 70 m², cuisine professionnel de restauration, toilette, buanderie, pour monter a l'étage: très beau escalier. Ensuite: palier, 7 chambres avec salle d'eau ou salle de bain. Cave voûtée, et une grange. Idéal investisseur hôtellerie, restauration ou chambres d'hôtes, vous serez séduits par l'excellente rénovation de cette demeure.","habitants":"Jachtslot st- Hubert\r\n        \"","divers":"Savigny grav 1-2-3-                                                                             le Bocage grav4                                                                                              Gps 47° 42' 58\" nord, 5° 38' 51\" est","gps":"","images":["../image/image_52/52_Savigny_52_1.jpg","../image/image_52/52_Savigny_52_2.jpg","../image/image_52/52_Savigny_52_3.jpg","../image/image_52/52_Savigny_52_4.jpg"]},"Consult_chateau_formulairec889":{"id":"Consult_chateau_formulairec889","dept":"52","canton":"Villegusien-le-Lac","commune":"Cohons","nom":"Silières","type":"manoir","periode":"XVII","histoire":"SILIERES  ce domaine, que la légende prétend avoir servi de résidence au Cardinal de la Luzerne évêque de Langres, a cependant toujours été privé. Après avoir appartenu longtemps à la famille Méat, il a été la propriété des familles langroises. Le Picard-De Novilliers, puis Le Picard-d'Ascourd, puis en 1783 à François le Febvre avocat au parlement et à M. Dhouzet. En 1812, il échoit à François Bertrand (frère du sculpteur langrois Antoine-Henri Bertrand), puis à sa fille Zilia, épouse de Pierre Jacquinot avocat à Langres, et enfin à Marie Jacquinot sa petite fille, qui épouse Nicolas-Augustin Massin de Pressigny procureur impérial. Le domaine échoit ensuite successivement à Etienne Massin, Jacques Massin, et enfin à Pierre et Christiane Massin qui l'ont entretenu avec passion depuis 1972, avant de le transmettre à leur fille en 2012.  Le manoir de Silière a été édifié par le langrois Nicolas Méat en 1659, ainsi qu'en atteste une tuile gravée , conseiller au bailliage et présidial de Langres, apparenté à Hubert Méat, avocat et maire de Langres en 1657, seigneur de Pisseloup. Sa fille, Zilia, la lègue à son tour à sa fille, Marie Jacquinot, épouse Massin. Quatre générations de Massin se sont alors succédé: Nicolas-Augustin, Etienne, Jacques et Pierre. Pierre et Christiane Massin ont entretenu le jardin avec passion pendant 40 ans avant de le transmettre à leur fille, Isabelle, épouse de Robert Sauvegrain début 2012.","architecture":"SILIERES,  le manoir offre une façade sur jardin avec deux ailes en retour, donnant sur un vaste jardin ordonné (dit « à la française ») montant dans le coteau.  Le jardin à la française a été créé dans les années qui ont suivi. A-t-il été dessiné par Le Nôtre  n'a laissé que très peu de documents mais le jardin, avec sa rigueur géométrique, ses jets d'eau et ses compartiments de buis, est bien dans l'esprit des créations de ce génial jardinier. Une extension de la maison a été réalisée en 1842. C'est probablement dans cette décennie qu'a été mise en place la promenade romantique représentée sur le plan du jardin de 1849. \r\nÉléments protégés MH : le jardin d'agrément (tel qu'il est délimité par son mur de clôture, y compris le portail d'entrée) et les façades et les toitures de la demeure lui correspondant (à l'exclusion de l'aile prolongeant à l'est le bâtiment principal) : inscription par arrêté du 24 décembre 1986.","habitants":"famille Méat\r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_52/52_Sili%c3%a8res_1.jpg","../image/image_52/52_Sili%c3%a8res_2.jpg","../image/image_52/52_Sili%c3%a8res_3.jpg"]},"Consult_chateau_formulaire1e10":{"id":"Consult_chateau_formulaire1e10","dept":"52","canton":"St-Dizier","commune":"St-Dizier","nom":"St_Dizier","type":"Forteresse","periode":"XIII-XV-","histoire":"ST-DIZIER, château du XIIIe siècle bâti par les seigneurs de Dampierre (famille originaire de Moëslain). Le seigneur Gui II de Dampierre, proche du Roi de France, Philippe Auguste, choisit dimplanter son domaine au confluent des rivières Marne et Ornel. L'enceinte en pierre flanquée de tours, est une création typique du premier tiers du XIIIe siècle, elle affirme la puissance territoriale des seigneurs de Dampierre. Au début du XVe siècle, le passage de la seigneurie  à celle des de Vergy a un impact sur larchitecture du château avec de nombreux travaux de restauration. Au XVIe siècle, les fortifications et les systèmes défensifs ont été améliorés par les ingénieurs royaux, notamment Marini. Larchitecte de François 1er est à lorigine de la création des fronts bastionnés et du cavalier à lextrémité sud du château il a accueilli plusieurs souverains dont François 1er en 1542, Marie Stuart qui fut Dame de Saint-Dizier en 1560, Henri IV et Marie de Médicis en 1603. En 1633, Louis XIII y vint plusieurs fois, puis Richelieu qui était tombé malade dut y rester une quinzaine de jours.  le château dit de la sous préfecture servait de remparts il est reconstruit en 1945 par la famille Viry .   Il est de style médiéval. La construction du château de Saint-Dizier date de 1189 à 1228. Sa porte date du XIIIe siècle. Il appartenait à Guy II de Dampierre. Il reste dans la famille Dampierre jusqu'en 1401 avec la mort de Édouard de Dampierre (Dampierre Saint-Dizier ou De Flandre) où il passe au de Vergy lorsque sa veuve se remarie avec Jean III de Vergy. Le château de Saint-Dizier abrite, dans ses murs, la Sous-Préfecture de la Haute-Marne. Il est inscrit aux M.H. depuis 1994.","architecture":"CLOS MORTIER,  la construction du château  date de la fin du XVIIIe siècle. C'est une ancienne maison de maîtres de forges. Vous y trouverez des chambres d'hôtes de caractère. En 1980, Elisabeth et Vital Mathieu, les parents de lactuelle propriétaire achetèrent la maison pour en faire une maison de retrouvailles entre frères et surs, cousins et cousines, éparpillés aux 4 coins de la France. Près de 30 ans plus tard, Pascale et Francis prirent la décision de conserver ce bien familial dans cet esprit daccueil et de convivialité en aménageant cette demeure en maison dHôtes au sein dun parc de 2 ha proche de Saint-Dizier.                                ST-DIZIER, dès le XIIIe, les seigneurs de Dampierre décidèrent de construire une ville fortifiée, dans le but de protéger les frontières du royaume de France. Saint-Dizier, ville stratégique, devint une importante Place forte Royale, au XVe siècle. Le château de Saint-Dizier a accueilli au cours des siècles, des seigneurs de hauts rangs et des personnages importants comme au XVIe siècle, Marie-Stuart en 1560, le Cardinal de Lorraine en 1573 ou encore la Duchesse de Montpensier en 1588. La Tour des Remparts est ouverte au Public et se visite.\r\nÉléments protégés MH : les vestiges du château et de son enceinte, tours d'entrée, ancienne porte, tours de la terrasse, du moulin, de la batterie et du Saint-Esprit,  le bastion en terre dit le Cavalier : inscription par arrêté du 2 mars 1994. propriété du département, sous préfecture aujourd'hui.","habitants":"famille Dampierre et la famille Viry\r\n        \"","divers":"Clos mortier  grv 7-8                                                                      GPS : 48° 38' 21\" Nord, 4° 57' 09\" Est                                                  St-DIZIER grav 1 à 6 GPS : 48° 38' 7,69\" Nord, 4° 57' 5,93\" Est                                                                                                 GPS : 48° 38' 21\" Nord, 4° 57' 09\"","gps":"48° 38' 21\" Nord, 4° 57' 09\" Est","images":["../image/image_52/52_St_Dizier_1.jpg","../image/image_52/52_St_Dizier_2.jpg","../image/image_52/52_St_Dizier_3.jpg","../image/image_52/52_St_Dizier_4.jpg","../image/image_52/52_St_Dizier_5.jpg","../image/image_52/52_St_Dizier_6.jpg","../image/image_52/52_St_Dizier_7.jpg","../image/image_52/52_St_Dizier_8.jpg"]},"Consult_chateau_formulaire67e6":{"id":"Consult_chateau_formulaire67e6","dept":"52","canton":"Joinville","commune":"Trémilly","nom":"Trémilly_Nully","type":"Château","periode":"XVII","histoire":"TREMILLY, les textes citent Trémilly dès 1027, mais le château a été bâti en 1713 sur des plans de Jean-Baptiste Bouchardon.  C'est grâce au testament de la Duchesse de Broglie, que Trémilly entra en possession de Mr de Maisoncelle, Officier de Mérite, de la Guerre de Hanovre. Le château est partiellement détruit par un incendie en 2002. Le propriétaire, M. Jean-François Darcier, prévoit sa restauration pour 2012.  Éléments protégés MH : les façades et les toitures du château : inscription par arrêté du 19 août 1975.                                                                            Village voisin à deux K.M à l'ouest à Nully-Trémilly;                                                                   NULLY,  a été construit pour François de Montmorency sur les substructures d'un ancien château datant des XIIe et XIIIe siècles. Le bâtiment était fortifié au Moyen-Âge et comportait une fosse remplie d'eau. Après la Révolution française la demeure fut réaménagée par la famille Mandat Grancey qui occupe toujours la propriété.","architecture":"TREMILLY,  actuel fut reconstruit en 1713, sur les plans de l'architecte Girardon, ne conserva que peu d'éléments de l'ancienne demeure. Sa façade principale de 40 m, est composée d'une partie centrale, large de 7 travées et de 2 avant-corps latéraux. Plusieurs lucarnes s'ouvrent au niveau des combles. Le château a le mérite de conserver les traces de son histoire; les fabriques qui ornent le parc, le puits de Moïse, la porte au cavalier sans tête et le portique ionique, sont des vestiges du château Renaissance. Quant au logis classique, il est assis sur le bastion du château médiéval auquel on accède par deux ponts de trois arches lancées sur des douves sèches. Un grand parc aux beaux arbres, avec communs du XVIe siècle, orangerie et citerne en forme de tour, complète le domaine. À l'ouest, la façade est cantonné par deux tours circulaires de l'ancien château médiéval, deux escaliers en vis à vis accèdent à la terrasse inférieure. Le beau parc qui l'entoure, avec de très beaux arbres et clos de murs a conservé des ensembles intéressants qu'il faut protéger. Le château de Trémilly entouré de ses douves est disposé de telle façon que l'une de ses façades ouvre sur une vaste pelouse plantée, tandis que l'autre regarde vers une terrasse, cantonnée de bastions maçonnés aux angles.  Ainsi, les communs, le puits Renaissance, les portes monumentales qui ouvrent sur les allées du parc, font partie intégrante de l'ensemble pour constituer un site de grande qualité. Un portique imposant surmonte la statue du Cavalier Gérome, et un puits de Moïse en pierre, avec ses cadrans solaires, surmonté d'une statue ayant perdu la tête à la Révolution. Le château de Trémilly fut partiellement détruit par un nouvel incendie en 2002 (le toit et une partie de larrière de la façade furent brûlés). Sa reconstruction eut lieu en 2012, grâce à son propriétaire Jean-François Dacier.","habitants":"Famille de Mr de Maisoncelle                          Jean-François Dacier\r\n        \"","divers":"Tremilly grav-1-2  GPS : 48° 21' 59\" Nord, 4° 46' 55\" Est                                 Nully grav 3-4","gps":"48° 21' 59\" Nord, 4° 46' 55\" Est","images":["../image/image_52/52_Tr%c3%a9milly_Nully_1.jpg","../image/image_52/52_Tr%c3%a9milly_Nully_2.jpg","../image/image_52/52_Tr%c3%a9milly_Nully_3.jpg","../image/image_52/52_Tr%c3%a9milly_Nully_4.jpg"]},"Consult_chateau_formulaire3c79":{"id":"Consult_chateau_formulaire3c79","dept":"52","canton":"Châteauvillain","commune":"Vaudrémont","nom":"Vaudrémont","type":"Château","periode":"XV-XVI","histoire":"VAUDREMONT, appartenait à la famille de Saint-Belin,  originaire de la Saxe. La famille des comtes de Saint-Belin occupait déjà au XIIe siècle de hautes fonctions à Chaumont et à Langres.  depuis les croisades jusquau XVIIe siècle, plusieurs membres masculins de la famille, souvent chevaliers de lordre de Malte, ont été au service de la couronne de France surtout comme commandants de troupe. En 1489, Georges de Saint-Belin acheta à ses cousins Tristan de Bourmont et Jean de Montarmentier.  Les comtes de Saint-Belin ont été épargnés par la Révolution et leurs successeurs, parfois des parents institués héritiers comme par alliance le comte de Messey, le marquis de Ragny ou Clotilde de Malartic ont géré le château, jusquen 1882. En 1882, le banquier belge Jenard acquit le château, qu'il utilisa, avec sa famille, comme résidence d'été jusqu'en 1928. Il changea plusieurs fois de propriétaire avant d'être acheté par le peintre allemand, Klaus Jürgen-Fischer, en 1983.                                 chambres d'hôtes, salles pour réceptions, parc ouvert au public, gérant  Alain et Stéphanie.","architecture":"VAUDREMONT, le château Renaissance actuel, massif, sans ornements, a été édifié sur les anciennes fondations et date environ de 1580. Il a été conçu avec une cour carrée, comme château fortifié, entouré de douves. Le corps de logis de plus de 60 m de longueur est relié par deux tours d'angle à deux ailes plus courtes. A l'origine, le château avait trois étages, mais l'étage supérieur fut détruit lors d'un incendie ayant éclaté pendant les guerres de religion ; il fut reconstruit par la suite sans troisième étage et n'était, encore au siècle dernier, accessible que par des ponts levis,  Cette propriété comportait des biens ruraux très étendus et la suzeraineté alternante sur plusieurs localités environnantes. Lors des rénovations, les fondations du château primitif ont été découvertes.","habitants":"famille de Saint-Belin\r\n        \"","divers":"GPS : 48° 07' 45\" Nord, 4° 54' 20\" Est","gps":"48° 07' 45\" Nord, 4° 54' 20\" Est","images":["../image/image_52/52_Vaudr%c3%a9mont_1.jpg","../image/image_52/52_Vaudr%c3%a9mont_2.jpg","../image/image_52/52_Vaudr%c3%a9mont_3.jpg","../image/image_52/52_Vaudr%c3%a9mont_4.jpg"]},"Consult_chateau_formulaire544f":{"id":"Consult_chateau_formulaire544f","dept":"52","canton":"Bologne","commune":"Vignory","nom":"Vignory","type":"Château fort","periode":"XiI-XV- XVII","histoire":"VIGNORY  La première trace écrite du château remonte à 1050-1052. Cétait à lorigine un castrum détenu par Gui Ier, seigneur de Vignory. Un inventaire de 1773 fait état dune basse-cour entourée par des remparts flanqués de sept tours, dont limposante tour canonnière, qui accueillait la ferme, les étables, la bouverie, le colombier, les jardins et une haute-cour flanquée de trois tours, comprenant le donjon, la tour au Puits, une chapelle, un manoir seigneurial, une citerne et des dépendances. Cette partie était exclusivement réservée au seigneur, à sa famille et à sa suite. Il reste de nombreux vestiges du donjon, de la tour du Puits du XVe siècle et des remparts. Depuis 2003, les vestiges du château fort font lobjet de campagnes de restauration estivales au travers de chantier de jeunes bénévoles organisés par Histoire et Patrimoine. Lobjectif est de protéger du temps les remparts des XVe et XVIe siècles de la Haute Cour.","architecture":"VIGNORY, les monuments visibles aujourd'hui sont plus récents : le donjon (milieu du XIIe siècle) qui servait au seigneur pour recevoir ses sujets ; la tour au Puits (milieu du XVe siècle) destinée à la défense de lentrée du village côté Chaumont ; différents remparts et tours de défenses côté Valnoise ; la grosse tour Canonnière (fin XVe siècle). La façade, vers la vallée, fut complétée d'une porte Renaissance armoriée donnant de plain-pied sur la salle basse, probablement au temps d'Henri de Lenoncourt, pour qui Vignory fut érigé en baronnie en 1555. De l'enceinte du château ne restent que des segments de courtine et une grosse tour d'artillerie dominant la vallée et le village, dite tour du Puits, écrêtée en 1846. Deux autres tours de l'enceinte, démolies au cours du XIXe siècle, comportaient des canonnières, attestant l'importance de l'adaptation du château à l'artillerie. Le logis, auquel tenait une de ces tours, encore couverte en 1840, a complètement disparu. La tour s'est écroulée le 7 juin 1913. Des travaux de rénovation de la tour ainsi qu'un nettoyage des remparts côté Valnoise sont actuellement en cours,  a été construit au début du Xe siècle, par Guy de Vignory. Son donjon date du XIIe siècle. Il ne reste aujourd'hui que des vestiges du château de Vignory.\r\nÉléments protégés MH : le donjon ; la tour ronde à l'est dite \"Tour du Puits\" ; les courtines subsistantes : classement par arrêté du 2 octobre 1989.","habitants":"Seigneurs locaux\r\n        \"","divers":"Vignory GPS : 48° 16' 36\" Nord, 5° 06' 05\" Est","gps":"48° 16' 36\" Nord, 5° 06' 05\" Est","images":["../image/image_52/52_Vignory_1.jpg","../image/image_52/52_Vignory_2.jpg","../image/image_52/52_Vignory_3.jpg"]},"Consult_chateau_formulairebb1a-2":{"id":"Consult_chateau_formulairebb1a-2","dept":"52","canton":"Châteauvillain","commune":"Villars en Azois","nom":"Villars_en_Azois","type":"Château","periode":"XVI-xix","histoire":"VILLARS EN AZOIS   Un premier château fut construit au XVIe siècle pour Jean de Chastenay. Le bâtiment se composait d'un corps de logis ceinturé par une muraille, des tours et des douves ainsi que d'un pont-levis. C'est une résidence qui appartient à la famille Renard. La demeure actuelle fut construite pour Gabriel François Joseph de Giey, baron de Villars; l'adjudication des travaux de réparation du vieux château eut lieu le 29 mai 1771 (le devis descriptif serait conservé dans les archives du château); mais après consultation des entrepreneurs de Villars, le vieux château fut condamné et la nouvelle résidence construite entre 1771 et 1780, sur une partie des fondations de l'ancienne maison-forte. La demeure est une construction régulière, de style Louis XVI provinciale, qui subsiste encore intacte aujourd'hui.","architecture":"VILLARS EN AZOIS, Iil fait partie du domaine de Villars-en-Azois. C'est un château d'époque Renaissance et classique dont la construction date du XIXe siècle.  Si le château de Villars-en-Azois est privé, le reste du domaine dont les ailes du château et l'ancienne papeterie de Navarre ont été transformées en chambres d'hôtes et en Centre équestre, pour des concours équestres.           \r\nÉléments protégés MH : les façades et les toitures ; la cheminée du salon du rez-de-chaussée ; la tour du XVIe siècle en totalité (cheminée comprise) : inscription par arrêté du 26 août 1988.","habitants":"Famille de  Jean de Chastenay\r\n        \"","divers":"GPS : 47° 43' 33\" Nord, 5° 16' 35\" Est","gps":"47° 43' 33\" Nord, 5° 16' 35\" Est","images":["../image/image_52/52_Villars_en_Azois_1.jpg","../image/image_52/52_Villars_en_Azois_2.jpg","../image/image_52/52_Villars_en_Azois_3.jpg","../image/image_52/52_Villars_en_Azois_4.jpg","../image/image_52/52_Villars_en_Azois_5.jpg"]},"Consult_chateau_formulaireb18c":{"id":"Consult_chateau_formulaireb18c","dept":"52","canton":"Villegusien-le-Lac","commune":"Vivey","nom":"Vivey","type":"Manoir","periode":"XVIII","histoire":"VIVEY, est une seigneurie qui a presque toujours appartenu à la maison de Grancey. C'est un seigneur de cette maison, François Rouxel de Médavy, frère d'un maréchal de France, qui a bâti l'actuel château au XVIIe siècle. La demeure devait lui servir de maison de plaisance. Après la famille Grancey, plusieurs familles se sont succédées. C'est à la famille Delecey qu'appartenait la demeure à la fin du XIXe siècle. Au début du XVIIIe siècle, le château et le fief appartenaient aux Seurot, seigneurs de Vaux, Isômes et Cusey (canton de Prauthoy actuel). Ces riches bourgeois de Langres ne se rendaient à Vivey que durant la belle saison. Lors de son mariage avec Jean Léaulté (issu d'une famille de parlementaires de Dijon) le 14 octobre 1728, Rose-Gabrielle, fille de Jean Seurot et d'Anne Pillot, reçut en dot le fief de Vivey. Les jeunes mariés eurent ensemble quatorze enfants, neuf filles et cinq garçons dont un mourut en bas-âge. Etablis à Langres, les Léaulté nouèrent des alliances avec plusieurs familles de cette ville (les Guyot de St-Michel, Lallemand de Pradine, Delecey, de Marivetz, etc...). Les quatre fils de Jean Léaulté furent anoblis par un édit d'Avril 1771. Selon la coutume de l'Ancien Régime, ils joignirent à leur nom patronymique celui de leurs fiefs. Ainsi, Bernard, l'aîné, prit le nom de Léaulté de Lécourt, Louis, le second, de Léaulté de Blondefontaine, Jean-Baptiste, le troisième, de Léaulté de Grissey, comme son père. Le dernier, Jean-Christophe, garda le seul nom de Léaulté de Vivey et, plus que ses frères, il appartient à l'Histoire de Vivey.","architecture":"VIVEY. Son charme romantique a inspiré André Theuriet, membre de l'Académie française, pour son roman Raymonde. Le château revint ensuite à la comtesse Mercier qui, sans héritier, revendit le domaine en 1936. Ce n'est que quelques années plus tard que le château abrita pendant douze ans un hôtel-restaurant, Le Relais du Lys, qui ouvrait ses portes durant la saison estivale. C'est avec sa bonne réputation qu'il accueillait des visiteurs venant parfois de très loin, et même des visiteurs célèbres quoique incognito. On y servait des produits frais et des plats originaux teintés de nouvelle cuisine dans un cadre presque historique..                                                                   Le Château de Vivey fut construit, pour François Rouxel de Médavy, au XVIIe siècle. C'est un château de style Médiéval. Il comporte des tours rondes. Le château de Vivey est privé, fermé au Public.D'inspiration médiévale, le château se fait remarquer par ses deux tours aux toits coniques recouverts d'ardoises.","habitants":"Famille de François Rouxel de Médavy,\r\n        \"","divers":"GPS : 47° 44' 03\" Nord, 5° 04' 01\" Est","gps":"47° 44' 03\" Nord, 5° 04' 01\" Est","images":["../image/image_52/52_Vivey_1.jpg","../image/image_52/52_Vivey_2.jpg"]},"Consult_chateau_formulaire63e6":{"id":"Consult_chateau_formulaire63e6","dept":"52","canton":"Poissons","commune":"Vroncourt la côte","nom":"Vraincourt","type":"Château","periode":"XVII","histoire":"VRAINCOURT, Louise Michel est née, en 1830, à Vraincourt-la-Côte, en Haute-Marne et décéda, en 1905, à Marseille. Fille naturelle d'un châtelain et d'une servante, celle-ci eut une une solide instruction et devint institutrice. Louise Michel alias Enjolras (son pseudo d'écrivain), naquit le 29/05/1830 au château de Vraincourt. C'était une militante anarchiste et un des personnages principaux de la Commune de Paris. Première à arborer le drapeau noir, elle popularisa celui-ci au sein du mouvement anarchiste.","architecture":"VRAINCOURT; construction classique   de plan rectangulaire à deux niveaux sur soubassement avec attiques et lucarnes sur combles toit en croupes.","habitants":"Famille d'Enjolras \r\n        \r\n        \"","divers":"GPS : 48° 14' 32\" Nord, 5° 07' 32\" Est","gps":"48° 14' 32\" Nord, 5° 07' 32\" Est","images":["../image/image_52/52_Vraincourt_1.jpg","../image/image_52/52_Vraincourt_2.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','52 — Haute-Marne'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
