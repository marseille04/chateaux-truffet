 du lieu. Cest Guilhem de Montanhagol (1233-1268), famille de troubadour.","architecture":"construction de Gaulcem  date du : XIIIe siècle au XIXe siècle. Ensemble formé par la tour des prisons, le porche Notre-Dame, l'ancienne viguerie, en totalité,  les façades et les toitures de l'ancienne halle aux poissons Les Gaucelm possédaient pas mal de biens dans le village : De toute façon ces édifices sont tous collés les uns aux autres. Le château n'a pas conservé sa façade extérieur, très belle mais moderne. De nos jours, c'est la maison de la justice et du droit qui y est abritée.  Une visite qui nous amène dans les sombres cachots de cette Tour des Prisons, c'est une tour carrée qui sélève à 16 m de hauteur. On découvre une première cellule au rez-de-chaussée, deux cachots au 1er étage (se trouvent le plus grand nombre de graffitis), au 2e étage le chemin de ronde avec deux salles et un dernier étage en haut de la coupole dite la salle des passagers. Témoignage dans l'histoire des institutions de la ville ; qualités architecturales, tant pour les parties médiévales de l'enceinte castrale avec le porche et la tour, de la Renaissance pour le décor de façade et de l'escalier en vis du logis, que du premier quart du XIXe siècle pour la façade néoclassique de l'ancienne halle aux poissons. Indéniable intérêt historique et archéologique de cet ensemble.  Propriété de la commune.","habitants":"Famille de Guilhem de Montanhagol\r\n        \"","divers":"Patrimoine à Gaucelm","gps":"","images":["../../jctruffet.com/image/image_34/34_Gaucelm_1.jpg","../../jctruffet.com/image/image_34/34_Gaucelm_2.jpg","../../jctruffet.com/image/image_34/34_Gaucelm_3.jpg","../../jctruffet.com/image/image_34/34_Gaucelm_4.jpg"]},"Consult_chateau_formulairef5ef":{"id":"Consult_chateau_formulairef5ef","dept":"34","canton":"Gignac","commune":"Gignac","nom":"Gignac_Capion","type":"Château","periode":"XVI-XVII","histoire":"Quatre châteaux à Gignac  le château Capion, des Laurès du XVIIe siècle, la maison de Navas du XVIIe siècle et celui de St-Jean d'Aumières   et à quelques kilomètres au Nord à Saint-Jean de Fos le château de Valloubière, viticole  chambres d'hôtes.                  GIGNAC, village fortifié remparts et tours, la Tour de l'Horloge dernier vestige de défense médiévale de la ville. Lors de la Révolution Française, les citoyens de la commune se réunissent au sein de la société révolutionnaire, baptisée « société des amis de la constitution » en décembre 1791.  Après la chute de la monarchie, elle change de nom pour « société des sans-culottes », puis « société républicaine et régénérée ». \r\nCHATEAU CAPION, la construction initiale du château au XVIe siècle. Mais les premières preuves concrètes retrouvées datent de lan 1873, lorsque le domaine de Capion (ou Capiou pour les anciens) est acquis par la famille Keittinger.  Monsieur Keittinger restaura le château dans les années 1880 . Le domaine, toujours daprès les documents retrouvés, fut revendu en 1891. Il connut différents propriétaires jusquen 1960, année où la famille Salasc en fit lacquisition, domiciliée à Gignac, elle est spécialisée dans le secteur d'activité de la culture de la vigne et chambres d'hôtes. En 1996, la famille Buhrer, vigneron sud-africain rachète la propriété. La passion de la nouvelle équipe de Capion.                                           Le Château LAURES du XVIIe siècle, hôtel de Laurès, qui appartenait à la famille de Laurès, Claude-Daniel de Laurès (1701-1776), conseiller à la cour des comptes, aides et finances de Montpellier. Antoine de Laurès (1708-1779), écrivain, ami de Voltaire, traducteur de la Pharsale de Lucain, et auteur notamment de la fête de Cythère, opéra en un acte créé le 19 novembre 1753 au château de Berny. Il habitait le château de Gignac. Actuellement l'office du tourisme.\r\n la maison de NAVAS du XVIIe siècle, château Saint-Jean d'Aumières viticole Manuela et Paul Tori font le pari de racheter le château en 2001.","architecture":"Gignac, vestige médiéval, visible à des kilomètres depuis la plaine, \"la Tour de Gignac\" est lun des éléments darchitecture militaire des plus importants du canton, sa construction remonterait au XIe siècle. Située sur un promontoire abrupt dominant le site, elle fit partie dun ensemble fortifié, occupé par une citadelle protestante au XVIe siècle. La \"Tour Sarrasine\" ou le donjon, la tour médiévale de Gignac est implantée sur le point culminant de la vieille ville,  c'est une tour quadrangulaire haute de 12 mètres, longtemps désaffectée, la tour a été utilisée comme réservoir, lors de la mise en service d'adduction d'eau en 1861.  Beffroi communal surmonté d'un campanile de fer abritant une cloche du milieu du XVIIIe siècle réalisée par le maître fondeur montpelliérain Jean Poutingon. Le centre historique est un aménagement du XIIIe siècle, en contrebas dun Castrum connu depuis 1094 et dont il ne subsiste quune tour carrée.                                                                      CAPION; corps de logis rectangulaire à trois niveaux, escalier en fer à cheval sur les deux façades donnant au premier étage sur un pavillon saillant avec fronton dépassant le toit par une ouverture de chiens assis, une tour carrée à mâchicoulis et crénelée dépassant l'ensemble et échauguette à toit pointu sur l'angle du bâtiment.","habitants":"Famille Keittinger\r\n        \"","divers":"Gignac  le château Capion, des Laurès du XVIIe siècle, la maison de Navas du XVIIe siècle, celui de St-Jean d'Aumières  à Saint-Jean de Fos le château de Valloubière.","gps":"","images":["../../jctruffet.com/image/image_34/34_Gignac_Capion_1.jpg","../../jctruffet.com/image/image_34/34_Gignac_Capion_2.jpg","../../jctruffet.com/image/image_34/34_Gignac_Capion_3.jpg","../../jctruffet.com/image/image_34/34_Gignac_Capion_4.jpg","../../jctruffet.com/image/image_34/34_Gignac_Capion_5.jpg","../../jctruffet.com/image/image_34/34_Gignac_Capion_6.jpg","../../jctruffet.com/image/image_34/34_Gignac_Capion_7.jpg","../../jctruffet.com/image/image_34/34_Gignac_Capion_8.jpg","../../jctruffet.com/image/image_34/34_Gignac_Capion_9.jpg"]},"Consult_chateau_formulaire90ab":{"id":"Consult_chateau_formulaire90ab","dept":"34","canton":"Clermont l","commune":"Graissessac","nom":"Graissessac","type":"Château","periode":"XVII","histoire":"GRAISSESSAC   En 1516, Rutor de Gressiaco. Les troubles avaient repris dès 1622 dans les Cévennes. Le fort de Graissessac est pris d'assaut par M. Rignac. En 1789, la concession de Graissessac était délimitée.  Château réquisitionné pour le directeur des mines.  Aujourd'hui il sert de location aux vacanciers. Sous l'égide de la nouvelle compagnie des mines de Graissessac, créée en 1925, la commune  du charbon Le château, à Graissessac, siège de la compagnie des quatre mines réunies.","architecture":"Château des mines, corps de logis rectangulaire à trois niveaux toitures crénelées  en croupe, accolé d'une tour octogonal avec des mâchicoulis et terrasses crénelées.","habitants":"M. Rignac\r\n        \"","divers":"Château des Houillières à Graissessac et mairie.","gps":"","images":["../../jctruffet.com/image/image_34/34_Graissessac_1.jpg","../../jctruffet.com/image/image_34/34_Graissessac_2.jpg","../../jctruffet.com/image/image_34/34_Graissessac_3.jpg","../../jctruffet.com/image/image_34/34_Graissessac_4.jpg","../../jctruffet.com/image/image_34/34_Graissessac_5.jpg"]},"Consult_chateau_formulairec11e":{"id":"Consult_chateau_formulairec11e","dept":"34","canton":"Montpellier","commune":"Montpellier","nom":"Grammont(34)","type":"Château","periode":"XVIII","histoire":"GRAMMONT, partiellement ruiné pendant les conflits religieux du XVIe siècle, l'édifice sera donné en 1701 au séminaire de Montpellier, puis vendu comme bien national en 1790. Le général Frégeville, fait reconstruire le domaine. En 1867, Etienne Bouisson, professeur  à la faculté de médecine de Montpellier, fait l'acquisition du domaine; sa veuve, Amélie Bertrand, lègue par testament en 1893, l'ensemble à la faculté de médecine qui  fonde à Grammont  l'institut Bouisson-Bertrand. La chapelle actuelle a été construite entre 1895 et 1897,  à l'emplacement de l'ancienne par l'architecte Pierre Arribat; sculptures d'Auguste Baussan; vitraux de Charles Champigneulle.   A la fin du XIXe siècle, le domaine est devenu suite à de nouveaux rachats la propriété de la faculté de médecine. Désormais, ce domaine de 90 hectares appartient à la ville de Montpellier. Le château a été reconverti en mairie annexe où les mariages sont célébrés dans une salle datant du XIIe siècle.  A côté, sont installés le théâtre des Treize Vents, la salle de concert aux 6 000 places du Zénith Sud et de nombreux équipements sportifs.  Grammont héberge aussi le conservatoire national du canna, la fleur emblématique de Montpellier avec les lauriers roses.","architecture":"Le domaine de Grammont a été initialement construit par des moines venus du prieuré Saint-Michel-de-Grandmont, à la fin du XIe siècle. A lexception de la salle capitulaire, datée du XIIe siècle , il ne reste aucun vestige de cette époque ancienne. Les bâtiments actuels furent en fait construits au début du XIXe, date à laquelle le nouveau propriétaire, le général Frégeville, fait reconstruire le domaine. L'aile occidentale sera reconstruite au cours du 1er quart du XIXe siècle. Le domaine est désormais propriété municipale, il accueille la mairie annexe, un centre aéré, la salle de mariage municipale et de nombreuses installations sportives . Grand bâtiment rectangulaire à trois niveaux, escalier en prolongement du bâtiment avec sur partie central  terrasse sur arcades cette terrasse supporte par des colonnes ioniques le balcon du deuxième étages, une chapelle accolée sur la partie droite.","habitants":"Famille d'Etienne Bouisson                                                                     général Frégeville,\r\n        \"","divers":"Château de Grammont à Monpellier","gps":"","images":["../../jctruffet.com/image/image_34/34_Grammont(34)_1.jpg","../../jctruffet.com/image/image_34/34_Grammont(34)_2.jpg","../../jctruffet.com/image/image_34/34_Grammont(34)_3.jpg","../../jctruffet.com/image/image_34/34_Grammont(34)_4.jpg"]},"Consult_chateau_formulaire327e":{"id":"Consult_chateau_formulaire327e","dept":"34","canton":"St-Pons de Thomières","commune":"Le Soulier","nom":"Grandsagnes","type":"Château","periode":"XVII","histoire":"GRANDSAGNES, ancienne ferme fortifiée située sur le plateau du Somail, à 15 kilomètres de la commune de La Salvetat . La famille Tabarié fut une des plus répandues du pays au XVIIIe siècle. Elle était originaire du Roussillon et dut sa fortune à un de ses membres, Jean, qui étant sans enfants fit le bonheur de ses nombreux neveux. Il avait été fournisseur de la viande de boucherie pour les armées françaises vers 1715 . il vint après fortune faite, s'établir à Saint-Pons; le 21 avril de l'année suivante il dut fournir au roi l'état détaillé de ses biens, qui étaient alors très importants.  Jean Tabarié, le protecteur de la famille, mourut à Saint-Pons. Jacques,  notaire eut cinq enfants de son mariage avec Françoise Blezy :  Barthélémy , (branche de Rozières), époux de Marie Guibbal, eut sept enfants: Antoine, époux Labarthe, marchand à Perpignan ;  héritier de tous les biens de son oncle Jean Tabarié, par testament du 1er mai 1726 et Barthélémy, receveur des tailles, époux de Françoise Gavoy  mariage en 1725 dans la chapelle du château de Grandsagnes,  sa fille Marie-Thérèse vendit, le 10 décembre 1751, à Jean Reboul, marchand de Saint-Chinian, l'office de son père.  Les Tabarié possédèrent la propriété de Rozières passée par alliance à la famille Castelbon, celle de Grandsagnes. Le château de Grandsagnes passée de la même manière aux Reboul et aux Flottes, l'Espinasse, Navines, Cousines, Vaisseplegade, la Miechlougane,le Pont.","architecture":"Reconstruction et mise en valeur du château de Grandsagnes ainsi que le corps de ferme historique attenant afin de créer un centre européen de rencontres culturelles du haut Languedoc ; activités enseignées   Bâtiment principal sur trois niveaux comprenant deux tours en façade avec échauguettes. Vastes dépendances agricoles à côté.\r\nPropriété ayant été utilisée en colonie de vacances et désaffectée depuis plusieurs années.  Restauration importante à prévoir.","habitants":"Famille Tabarié \r\n        \"","divers":"Château de Grandsagnes à le Soulier","gps":"","images":["../../jctruffet.com/image/image_34/34_Grandsagnes_1.jpg","../../jctruffet.com/image/image_34/34_Grandsagnes_2.jpg","../../jctruffet.com/image/image_34/34_Grandsagnes_3.jpg"]},"Consult_chateau_formulaire259f":{"id":"Consult_chateau_formulaire259f","dept":"34","canton":"Pézenas","commune":"Pézenas","nom":"Grange_des_Près","type":"Château","periode":"XIX","histoire":"GRANGE DES PRES; Henri 1er de Montmorency fait en 1587 l'acquisition des terres, Il y fait construire t une résidence et aménager le jardin.  Ce château est retiré de la ville entre Pézenas et Montagnac près des rives de l'Hérault. Mais Pézenas possédait un autre château au milieu de la vieille ville fortifiée sur la butte qui  porte son nom. Le prince de Condé, acquit  en 1633 le domaine des Montmorency, va poursuivre les travaux augmentant l'ensemble des deux tiers. En 1738, la création par la province d'une caserne dont il reste le monumental portail d'entrée est une ultime étape dans la disparition du château. En 1741, le château vieux est acheté  par les oratoriens. Vendu comme bien national, le domaine est racheté en 1812. Le château vieux  disparaît et les parties de l'édifice correspondant aux agrandissements du XVIIe siècle sont transformés en dépendances agricoles. Un château est reconstruit vers 1850, en style néo-gothique et le jardin est reconstitué  dans le goût de la seconde moitié du XIXe siècle.","architecture":"La Grange des Près était le château où Armand de Bourbon, Prince de Conti tenait cours, dans les Etats du Languedoc dont Pézenas était la capitale. Achevé en 1595, l'édifice primitif, désigné plus tard  sous le nom  de \"château vieux\", présentait quatre corps de bâtiment  développés autour d'une cour. Ce château est retiré de la ville entre Pézenas et Montagnac près des rives de l'Hérault.    Dès 1601, le maître maçon Claude Bastide, chargé des premiers  travaux d'agrandissement, élève deux galeries à arcades et entoure le domaine d'un mur d'enceinte couronné de merlons, cependant les deux châteaux subirent le même sort puisqu'ils furent rasés sous les ordres de Richelieu. Du château de la Grange des Près il ne subsiste qu'une tour et un domaine viticole.","habitants":"Armand de Bourbon  Prince de Conti \r\n        \r\n        \r\n        \"","divers":"Château de la Grange des Près et sa tour à Pézenas","gps":"","images":["../../jctruffet.com/image/image_34/34_Grange_des_Pres_1.jpg","../../jctruffet.com/image/image_34/34_Grange_des_Pres_2.jpg","../../jctruffet.com/image/image_34/34_Grange_des_Pres_3.jpg","../../jctruffet.com/image/image_34/34_Grange_des_Pres_4.jpg","../../jctruffet.com/image/image_34/34_Grange_des_Pres_5.jpg","../../jctruffet.com/image/image_34/34_Grange_des_Pres_6.jpg"]},"Consult_chateau_formulaire197e":{"id":"Consult_chateau_formulaire197e","dept":"34","canton":"Cazouls les Béziers","commune":"Laurens","nom":"Grèzan","type":"Forteresse","periode":"XII-XIV","histoire":"GREZAN, dit de Laurens au XIIe siècle était une ancienne commanderie templière,  au XIVe siècle passe à l'ordre de Malte en lieu et à la place de nombreuses habitations se sont succédé au cours des siècles, une villa romaine, une halte  pour les pèlerins, qui se rendaient à Saint-Jean de Compostelle. A la Révolution achat du domaine de Grézan par un bourgeois de Servian, Granal également adjudicataire du domaine de Conas n'a put régler son achat remis en vente et en 1795 acquit par Jean Laborde fabricant d'eau de vie, son fils Pierre épouse  en 1808 Emilie Cavalié qui hérita le domaine voisin du Canet, la génération suivante madame Eugène Genson née Hortense Laborde qui hérita de Grézan cède la propriété à Gabriel Mirepoix, fils d'un ancien bâtonnier de Béziers. Cette vaste enceinte d'inspiration médiévale a été imaginée par Gabriel Mirepoix , qui a demandé en 1890 à l'architecte bordelais, Louis Garros de la lui réaliser, faites moi du Carcassonne, au décès de Gabriel Mirepoix en 1924 le domaine passe à sa nièce Mme Rozier, son fils Jacques Rozier Mirepoix hérita et y demeura jusqu'à son décès en 1971, et vendu en 1977 à la famille de Michel Lubac . C'est actuellement une demeure privée et habitée par Marie France Lanson et sa famille qui l'on transformés en chambres d'hôtes.","architecture":"Le château de Grézan, souvent qualifié de \"Petit Carcassonne\". Mais ne vous y trompez pas, les murailles qui entourent les caves et les bâtiments d'exploitation, ne datent que de la fin du XIXe siècle.   Ces fortifications, purement décoratives, sont ponctuées de tours en trompe l'oeil, vaste enceinte étendue sur plusieurs centaines de mètres, formée de courtine crénelées et percées de meurtrières  et régulièrement flanquées de demi-tourelles  cylindriques supportés par des contreforts jumelés, l'entrée du domaine se fait par un châtelet sous lequel s'ouvre un arc plein cintre. Bâtiments et donjon jouxtent le corps de logis formé de deux ailes en équerre, à l'angle desquelles s'élève une massive tour carrée à trois niveaux  surmontée d'une plate forme bordée par un garde-corps en pierre ajourée et cantonnée d'échauguettes. En retrait le pavillon terminal présente  du côté des deux façades principales un haut mur-pignon dentelé, l'aile donne sur le parc à l'ouest est coiffée d'un comble en ardoise, l'aile sud ouvrant sur cour offre à son centre une tourelle carrée en encorbellement et dans les parties supérieures, une rangée de corbeaux supporte un crénelage décoratif. Au rez-de-chaussée, une avancée  percées de deux arcades et de deux petites ouvertures cintrées soutiennent une terrasse.","habitants":"Famille Granal\r\n        \r\n        \"","divers":"Forteresse de Grèzan avec ses remparts.","gps":"","images":["../../jctruffet.com/image/image_34/34_Grezan_1.jpg","../../jctruffet.com/image/image_34/34_Grezan_2.jpg","../../jctruffet.com/image/image_34/34_Grezan_3.jpg","../../jctruffet.com/image/image_34/34_Grezan_4.jpg","../../jctruffet.com/image/image_34/34_Grezan_5.jpg","../../jctruffet.com/image/image_34/34_Grezan_6.jpg","../../jctruffet.com/image/image_34/34_Grezan_7.jpg","../../jctruffet.com/image/image_34/34_Grezan_8.jpg","../../jctruffet.com/image/image_34/34_Grezan_9.jpg"]},"Consult_chateau_formulaire2154":{"id":"Consult_chateau_formulaire2154","dept":"34","canton":"Jonquières","commune":"Jonquières","nom":"Jonquières","type":"Château","periode":"XVI","histoire":"JONQUIERES, la seigneurie  relevant des évêques de Lodève appartenait au XIIIe siècle à une famille de Saint-Jean, cette seule et même famille occupe le domaine depuis 9 siècles ; seul le nom de famille a changé en fonction du hasard des alliances. Ainsi, il fut par la suite  la propriété des Vissec de Latude, Raymond de Saint-Jean épousa sa cousine germaine  Jeanne de Vissec de Latude n'ayant pas d'enfant le domaine passe en 1454 au frère de sa femme. au XVIe siècle le descendant de son frère, Arnaud de Vissec seigneur de Latude et de Jonquières s'allie à Souveraine de Montbrun, fille de Pierre de Lodève,  son fils appelé aussi Arnaud épouse Françoise de Pluviès dont la soeur Louise mariée en 1604 à Charles de Lauzières son fils Bernardin de Vissec transforme le château entre 1656 et 1666  le dernier de la branche de Bernardin cède Jonquières à son neveu Henri de Loriol, fils de sa soeur Souveraine, une autre Souveraine de Loriol épouse Raymond de Massol leur fille Louise l'apporte à Pierre de Lansade en l'épousant en 1787, et enfin par  héritage de la famille Cabissole au début des années 1963. En 2014, Charlotte et Clément de Bearn, leur fille et gendre prennent leur suite et sinstallent a leur tour au domaine pour continuer le travail et la valorisation de ce beau terroir. C'est à François de Cabissole que revient la tâche de sauver ce vignoble laissé à l'abandon. Après avoir replanté la plupart des parcelles, il se lance alors dans la cave particulière en 1992. Viticole et hôtel restaurant.","architecture":"Le Château de Jonquières, construit au XVIe siècle, n'est pas abandonné, mais remanié au XVIIe siècle, comme en témoigne sa cour de style renaissance agrémentée d'un escalier en \" fer à cheval \" et d'un double balcon. Trois  bâtiment en U positionné autour d'une cour, le corps de logis  qui occupe le fond de celle-ci est flanquée sur sa façade extérieure de deux tours rondes plus élevées du XVIe siècle dont elle possèdent encore les corbeaux, toitures presque plates en tuiles provençales. Cette façade dont la plupart des ouvertures ont été modifiées au XIXe siècle est structurée horizontalement par des bandeaux de pierre, deux oeils de boeuf de chaque côté de la porte d'entrée qui cette dernière est encadrée de deux pilastres et sommée par un fronton triangulaire, côté cour, le corps de logis est précédé par un escalier extérieur  en fer à cheval avec rampes à balustres aboutissant à une loggia  à arcades.","habitants":"Famille des Vissec de Latude\r\n        \r\n        \"","divers":"Château de Jonquières","gps":"","images":["../../jctruffet.com/image/image_34/34_Jonquieres_1.jpg","../../jctruffet.com/image/image_34/34_Jonquieres_2.jpg","../../jctruffet.com/image/image_34/34_Jonquieres_3.jpg","../../jctruffet.com/image/image_34/34_Jonquieres_4.jpg","../../jctruffet.com/image/image_34/34_Jonquieres_5.jpg","../../jctruffet.com/image/image_34/34_Jonquieres_6.jpg","../../jctruffet.com/image/image_34/34_Jonquieres_7.jpg"]},"Consult_chateau_formulaire3382":{"id":"Consult_chateau_formulaire3382","dept":"34","canton":"Lattes","commune":"Juvignac","nom":"Juvignac","type":"Château","periode":"XVI-XVIII","histoire":"A Juvignac domaine de Caunelles et le château de Fourques.                CAUNELLES, ses terrasses sur la rivière Mosson et ses terres sont attestés comme bien noble à la Renaissance. Jean d'Hucher, médecin  du roi Henri III, confirmé dans cette fonction par Henri IV qui lui attribue le titre d'écuyer, fait l'acquisition du domaine et de la seigneurie en 1595. Ses descendants les conservent jusqu'en 1790.   Propriété de la famille Brunelis depuis 250 ans. FOURQUES, datant du XV-XVIIe siècle, ancien mas témoin de l'histoire viticole; éléments architecturaux remarquables.  La présence de la vigne est attestée à Fourques dès le XIe siècle. L'édifice date du XVe siècle, restauré au XVIIIe siècle à la suite dun incendie. Le lieu était autrefois connu sous le nom de métairies de la Tour et Carascaude. Il prend le nom de Fourques en 1891, hérité de Philippe Monié, baron de Fourques, mort en 1737. L'actuelle propriétaire, Lise Fons-Vincent, cinquième génération dune famille de vignerons, a depuis une vingtaine dannées considérablement développé le domaine familial où sont régulièrement organisés des événements mêlant dégustations, visites et soirées à thèmes.","architecture":"Le château de Caunelles connaît des remaniements au XVIIIe siècle. L'édifice Renaissance est profondément modifié pour laisser place à une maison de plaisance, selon la mode des « folies » montpelliéraines de l'époque : toit de tuiles creuses à faible pente, symétrie des ouvertures, moulurations, masques en agrafes de fenêtres. Il conserve cependant des éléments de sa première époque, en particulier quelques fenêtres à meneaux.    La terre noble de Caunelle, le château et ses terrasses, attestées à la Renaissance ont connu deux périodes majeures d'embellissements et  de remaniements au XVIIIe siècle et dans le premier quart du XIXe siècle, les jardins associés aux terrasses n'ont pas beaucoup d'ampleur compte tenu de l'étroitesse du site, le parc (avec ses 2 grandes parties, l'une de garrigue arborée sèche et l'autre de ripisylve humide) et son avant  parc de pinède couvrent près de 9 hectares. Sa composition qui date du début du XIXe siècle, fut l'objet d'une  certaine notoriété, dessiné par Amelin dans un état proche de son achèvement, clos de murs en 1828.            Fourques   La bâtisse a été construite au XVe siècle, puis restaurée au XVIIIe à la suite dun incendie,  corps de logis rectangulaire à deux niveaux.","habitants":"Famille de Jean d'Hucher                                                                                    Famille de Philippe Monié\r\n        \"","divers":"Juvignac domaine de Caunelles et le château de Fourques .","gps":"","images":["../../jctruffet.com/image/image_34/34_Juvignac_1.jpg","../../jctruffet.com/image/image_34/34_Juvignac_2.jpg","../../jctruffet.com/image/image_34/34_Juvignac_3.jpg","../../jctruffet.com/image/image_34/34_Juvignac_4.jpg","../../jctruffet.com/image/image_34/34_Juvignac_5.jpg","../../jctruffet.com/image/image_34/34_Juvignac_6.jpg","../../jctruffet.com/image/image_34/34_Juvignac_7.jpg"]},"Consult_chateau_formulaire8477":{"id":"Consult_chateau_formulaire8477","dept":"34","canton":"Clermont l","commune":"Lamalou les Bains","nom":"Lamalou_Poujol","type":"Château","periode":"XIX","histoire":"A Lamolou les Bains le château de Coubillou; la mairie  et le château à Poujol sur Orb.                                                           LAMALOU , de nos jours, la rééducation fonctionnelle et le thermalisme occupent une place importante dans la vie de la cité, les massifs du Caroux et de lEspinouse et les nombreuses infrastructures de loisirs, dont notamment son casino. Les sources de Lamalou-les-Bains sont apparues à la suite du percement de galeries minières aux XIe et XIIe siècles. La tradition veut quun paysan souffrant de douleurs se soit baigné dans la mare boueuse formée par ces eaux et en ait retiré une sédation appréciable de son mal.  En 1947, la ville rachète l'établissement thermal et la « Chaîne thermale du Soleil » le reprend en 1986. La caisse nationale de sécurité sociale achète l'établissement thermal de Lamalou-le-Haut en 1954 et le transforme en centre de rééducation pour enfants : létablissement thermal de Lamalou le centre est transformé en centre de rééducation pour adultes en 1957 et prend le nom de Bourgès.\r\nCOUBILLOU  Mr Philip Jonshon, affaire personnelle, commerçant est en activité depuis 7 ans, elle est spécialisée dans le secteur d'activité de l'hébergement touristique et autre hébergement de courte durée.                                                                                    A 3 Km POUJOL sur ORB,le château des comtes de Thézan du XVIe siècle domine le village et la vallée de l'Orb. La branche des Thézan, comtes de Poujol commence en 1482 par Guillaume II de Thézan qui épousa Anne de Montlaur ils eurent cinq enfants Antoine de Thézan fils aîné baron de Mercourols épousa Marquése de Combret, six enfants dont Olivier baron épousa  Cassandre Cénami sept enfants dont Raimond de Thézan baron et Vicomte qui  épousa Anne de Caylus huit enfants dont Pons-de Thézan Pierre  baron d'Olargues épousa Jeanne de Mirmand quatre enfants dont Thomas de Thézan baron de Poujols épousa Jeanne de Blaussac. \r\nLe marquisat de Thézan comprend les lieux du Pujol et Terres-Fontaines du Pujol, depuis la fin du XVIIe siècle par le comte du Pujol, marquis de Thézan.  Aujourd'hui transformé en maison de retraite.","architecture":"Lamalou les Bains; son nom vient tout simplement du ruisseau traversant la cité qui sappelait Malou ou Betoulet pour devenir aujourdhui Bitoulet. Le 9 septembre 1878, Villecelle prend le nom de Lamalou-les-Bains.De création récente, Lamalou-les-Bains ne manque donc pas dintérêt pour les amateurs de larchitecture du XIXe siècle et de la Belle Époque. En effet, depuis les grands hôtels en passant par les thermes jusquau théâtre et au casino, tout léclectisme de lépoque y est représenté.                          Coubillou, bâtisse  de forme quadrangulaire à trois niveaux, toits réguliers à deux pans en tuiles.                                                        Poujol sur les rives de l'Orb, Ce village médiéval serré autour du château des Comtes de Thézan, du XVIe siècle, dominé par le château,","habitants":"Mr Philip Jonshon\r\n        \"","divers":"A Lamolou les Bains le château de Coubillou; la mairie  et le château à Poujol sur Orb","gps":"","images":["../../jctruffet.com/image/image_34/34_Lamalou_Poujol_1.jpg","../../jctruffet.com/image/image_34/34_Lamalou_Poujol_2.jpg","../../jctruffet.com/image/image_34/34_Lamalou_Poujol_3.jpg","../../jctruffet.com/image/image_34/34_Lamalou_Poujol_4.jpg","../../jctruffet.com/image/image_34/34_Lamalou_Poujol_5.jpg"]},"Consult_chateau_formulairea954":{"id":"Consult_chateau_formulairea954","dept":"34","canton":"Ganges","commune":"Laroque","nom":"Laroque","type":"Forteresse","periode":"X","histoire":"LAROQUE Guillaume Arnauld, possédait à Laroque des biens et une partie des droits seigneuriaux. Il est cité en 1155 comme un des trois principaux donateurs pour la nomination de la paroisse. Raymond de La Roque est cité en 1155 comme un des trois principaux donateurs. La présence de son fils, ainsi que de nombreux de ses frères à cette donation incite à penser que cette famille y était établie depuis plusieurs générations. La branche dite du Vivarais, toujours représentée de nos jours, issue au XVIIe siècle de Pierre de La Roque, fait surmonter ses armes d'une couronne de marquis, ayant réunie par alliance trois baronnies: celle d'Aubagnac en Auvergne (1675), celle de Mortesaigne en Velay (1684) et celle de d'Ozon en Vivarais (1756). Famille de Saussan,  tire leur nom de la commune de Saussan dans l'Hérault. Ils ont été co-seigneurs de Laroque du XIIIe siècle jusqu'à la Révolution. L'un d'eux, Bertrand de Saussan, a donné en 1630 la cloche qui se trouve toujours sur le donjon. Il est enterré dans la chapelle Saint-Jean. Quelques années plus tard, en 1655, Isabeau de Saussan s'est mariée avec Hector de La Tour, baron de Cornillon et a transmis ses droits sur Laroque à sa fille Marie de La Tour, dame de La Roque et d'Arènes. Henri de Roquefeuil, marquis, marié en 1717 à Françoise de Montaud et qui fut père de François de Roquefeuil, marquis, décédé en 1764. Ces trois générations sont enterrées dans la chapelle Saint-Jean.","architecture":"Le donjon de Laroque  date des Xe siècle et XIIe siècle. Pentagonal, il se dressait à près de 36 mètres de hauteur jusqu'à ce qu'il soit écrêté sur ordre de Richelieu, à la suite des Guerres de Rohan. D'une hauteur actuelle de 27 mètres, sa partie supérieure a été remaniée en pierres à bossage. Il abrite une cloche en son sommet qui a longtemps servi de timbre à l'horloge. Offerte en 1630 par Bertrand de Saussan, co-seigneur de Laroque, cette cloche est classée depuis le 18 novembre 1942.  La chapelle castrale date du XIe siècle. Elle a été agrandie au XIVe siècle sur la cour du château. Sa sacristie a été installée dans une ancienne échauguette militaire, visible de l'extérieur à l'angle du mur du donjon, reconnaissable à ses mâchicoulis.\r\nLa demeure seigneuriale, en léger retrait des précédents bâtiments, est une énorme bâtisse remaniée au XVIe siècle. Parmi ses arcades, figure toujours taillé dans la pierre le blason de la famille de La Roque, co-seigneurs de Laroque et une cour voisine abrite l'ancienne cuve baptismale en pierre de la chapelle castrale.","habitants":"Famille de Saussan \r\n        \"","divers":"Château et vestiges à Laroque","gps":"","images":["../../jctruffet.com/image/image_34/34_Laroque_1.jpg","../../jctruffet.com/image/image_34/34_Laroque_2.jpg","../../jctruffet.com/image/image_34/34_Laroque_3.jpg","../../jctruffet.com/image/image_34/34_Laroque_4.jpg","../../jctruffet.com/image/image_34/34_Laroque_5.jpg","../../jctruffet.com/image/image_34/34_Laroque_6.jpg","../../jctruffet.com/image/image_34/34_Laroque_7.jpg","../../jctruffet.com/image/image_34/34_Laroque_8.jpg","../../jctruffet.com/image/image_34/34_Laroque_9.jpg"]},"Consult_chateau_formulairecd92":{"id":"Consult_chateau_formulairecd92","dept":"34","canton":"Pézenas","commune":"Pézenas","nom":"Larzac","type":"Château","periode":"XVI","histoire":"LARZAC, sa situation sur un éperon rocheux, le parc qui l'environne, et les terrasses sur le jardin, font de cette demeure l'une des plus intéressantes de la vallée de la Peyne. On ne possède pas de renseignements précis sur la Grange de Larzac avant les premières années du XVIIe siècle. On sait seulement que la demeure appartenait avant 1603 à monsieur de Clayrac. George Granjon fermier général du domaine de la Grange des  Prés et procureur du connétable Henri I de Montmorency, en fait l'acquisition vers 1603 et fait mettre en place, cette année là, par le maître fontainier  Daniel Campaigne, une canonnade (réseau de canalisations en terre  cuite). La Grange ainsi que les bâtiments contigus sont acquis  le 17 avril 1627 par Bertrand Cellier,   au diocèse d'Agde, son frère Jacques, écuyer et conseiller du roi. Le vendeur est le fils de Georges Granjon,  docteur et avocat. Les bâtiments menacent ruine et sont reconstruits entre 1639 et 1643 par le maître-maçon Pierre Maux :  La demeure restera longtemps dans la famille Cellier qui le revendra en 1756 à Rouyer, propriétaire jusqu'en 1815.","architecture":"Situé sur la commune de Pézenas,  le château de Larzac dinspiration toscane a été reconstruit au début du XVIIe siècle par l'Intendant des Princes de Montmorency, gouverneurs du Languedoc. Il subsiste quelques parties de la construction de 1639 dont le corps de logis rectangulaire avec ses deux salles voûtées d'arêtes, l'escalier, une grande salle plafonnée, le jeu savant des escaliers extérieurs et des terrasses à balustrades de pierre, et  peut-être aussi l'important dispositif hydraulique ménagé sous la cour, avec citerne et puits mis en place depuis le début du XVIIe siècle ainsi que le parc avec ses terrasses, ses grottes et fontaines en rocaille. La chapelle et  la galerie la reliant au corps de logis primitif  ont sans doute été élevés dans le courant du XVIIIe siècle et l'on peut attribuer les aménagements et agrandissements du XIXe siècle aux successeurs de Rouyer. Le parc se compose de terrasses utilisant la topographie pour bénéficier de la perspective sur la plaine.","habitants":"Monsieur de Clayra\r\n        \"","divers":"Château de Larzac à Pézenas","gps":"","images":["../../jctruffet.com/image/image_34/34_Larzac_1.jpg","../../jctruffet.com/image/image_34/34_Larzac_2.jpg","../../jctruffet.com/image/image_34/34_Larzac_3.jpg"]},"Consult_chateau_formulairead7b":{"id":"Consult_chateau_formulairead7b","dept":"34","canton":"Lodéve","commune":"Lauroux","nom":"Lauroux","type":"Château","periode":"XVII-XVIII","histoire":"LAUROUX   Aujourd'hui, une partie des fortifications datant du Moyen-Age sont visibles au château attenant (actuelle maison Delserieys) formaient le cur du village, dont le seigneur était l'évêque de Lodève. Construction du château de Lauroux au XVIIe et au XVIIIe siècle : la porte d'entrée datée 1784 et la fenêtre sur cour datée 1789.","architecture":"Lauroux, la rue du Four, rue principale où se trouvait le four banal, date aussi du XIVe siècle, mais on ne connaît pas l'étendue du bâti à cette époque. Hormis des fragments de murs et une tour conservée au château, seule la toponymie garde le souvenir des fortifications : le portail, le fort. Dès la fin du XVIIe siècle, le village s'étend, comme en témoignent quelques maisons datées, notamment celle dite du Prieur (1676), mais se développe surtout à la fin du XVIIIe siècle et au début du XIXe siècle. Le château est transformé et mis au goût du jour, du moins en façade : la porte d'entrée est gravée de la date 1784, et une fenêtre de 1789, contre les vestiges d'une enceinte fortifiée, dont il reste une tour et des fragments de mur datant peut-être du XIVe ; balcon en fer forgé de la fin du XVIIIe siècle. La demeure possède un étage carré et étage en surcroît, gros-oeuvre : grès ; moellon.","habitants":"Evêque de Lodève\r\n        \"","divers":"Lauroux, son village et sa mairie","gps":"","images":["../../jctruffet.com/image/image_34/34_Lauroux_1.jpg","../../jctruffet.com/image/image_34/34_Lauroux_2.jpg","../../jctruffet.com/image/image_34/34_Lauroux_3.jpg"]},"Consult_chateau_formulaire3eba":{"id":"Consult_chateau_formulaire3eba","dept":"34","canton":"Clermont l","commune":"Octon","nom":"Lauzières","type":"Vestiges","periode":"XII-XV","histoire":"LAUZIERES, en 1650, Catherine de Lauzières épouse du duc dEstrées, vendit la baronnie quelle avait héritée de son frère Charles de Lauzières-Thémines à Antoine Jougla, trésorier général du Bas Languedoc. La baronnie était intacte mais le château de Lauzières était en mauvais état. Le château et le hameau furent abandonnés au profit des villages proches. Ce transfert aurait eu lieu dans les années 1630.  En 1755, sous Louis XV, nouveau changement de propriétaire pour la baronnie. A partir de 1792, il ny a plus de seigneurie ni de juridiction seigneuriale et le « château » à Octon na gardé que son nom de prestige. Après la Révolution, tous les biens de la famille furent divisés, le « château » devint bien national En 1809,  fut vendu à monsieur Castanier qui  le revendit à son tour en 1845 à M Reynes. Ce dernier fit forger et placer les grilles et le portail surmonté de ses initiales « F.R ». Sa fille épousa en 1861 Jules Vigné, notaire. Cétait le fils de Blaise Vigné époux de Marie Antoinette Desalasc fille aînée du dernier propriétaire seigneurial du château. Au décès prématuré de sa femme, Blaise Vigné se remaria et eut un fils en 1825, Jules, qui épousa en 1861 Melle Reynes, fille de Fulcran Reynes alors propriétaire du château. Jules eut plusieurs filles dont Madeleine Vigné qui épousa Paul Vigné dOcton en 1859. A la mort de sa femme, Paul hérita de ses biens quil légua à sa seconde épouse qui le revendit au milieu des années 50 à la famille Dupin, le sculpteur. Aujourd'hui la famille  de Guillaume lefèvre entreprenne la restauration avec des bénévoles.","architecture":"Lauzières, fondé au XIIe siècle par la famille du même nom, comme la plupart des châteaux de cette époque, ses fortifications avaient été détruites sur ordre de Richelieu au cas où il aurait pu servir de fort, résistant au pouvoir du roi. De plus, les populations délaissaient peu à peu les vieux châteaux-forts insalubres pour des villages de plaines où ils construisirent des demeures plus spacieuses entourées de vastes terrains le château était initialement un beau château féodal qui protégeait un hameau accolé à lenceinte fortifiée et contrôlait le chemin. Le château a été ensuite entièrement remanié au XIVe et XVe siècle, puis vendu au  XVIe siècle. Peu à peu abandonné, seul le hameau fut occupé jusquà la fin du XIXe siècle. Aujourdhui il ne reste que des vestiges de différentes époques  qui sont restaurés et préservés au fil des chantiers dans le village dOcton à la Vialle. En premier lieu fut construit  lescalier, la grande salle du premier qui servait de salle de juridiction où se rendait la justice locale par le viguier\r\nseigneurial. Sur une des portes, il est mentionné la date de 1676. Le château avait sa propre chapelle au fond du parc dont il reste les vestiges dune petite abside.","habitants":"Charles de Lauzières\r\n        \r\n        \r\n        \"","divers":"Vestiges du château de Lauzières à Octon","gps":"","images":["../../jctruffet.com/image/image_34/34_Lauzieres_1.jpg","../../jctruffet.com/image/image_34/34_Lauzieres_2.jpg","../../jctruffet.com/image/image_34/34_Lauzieres_3.jpg","../../jctruffet.com/image/image_34/34_Lauzieres_4.jpg","../../jctruffet.com/image/image_34/34_Lauzieres_5.jpg","../../jctruffet.com/image/image_34/34_Lauzieres_6.jpg"]},"Consult_chateau_formulaireb8b1":{"id":"Consult_chateau_formulaireb8b1","dept":"34","canton":"Montagnac","commune":"Montagnac","nom":"Lavagnac","type":"Château","periode":"XVI-XVIII","histoire":"LAVAGNAC, citée en 1126 . la demeure est acquise par la famille de Grasset au XVIe siècle. Elle passe ensuite dans celle des Mirman par le mariage en 1619 de Marie de Grasset et de Jean de Mirman, Trésorier du Languedoc. En 1632, les Mirman, avec une partie de la noblesse languedocienne, suivent la révolte du gouverneur du Languedoc, Henri  de Montmorency, la maison est alors totalement démantelée sur ordre de Richelieu. Mais la disgrâce des Mirman ne fut que passagère. La fortune des Mirman, restée intacte, qui permit au trésorier de reconstruire sa demeure puisqu'en 1640 la structure ancienne disparaît presque totalement. En 1715, l'héritière de Lavagnac, Françoise de Mirman, épouse le seigneur de Saint-Pons-de-Mauchiens, Jean-Baptiste de Polastron. Leur fils vend ensuite le château vers 1765 au prince de Conti. A la veille de la Révolution, les Conti vendent Lavagnac au marquis de Roquefeuil qui meurt en 1793. Pillé à la Révolution et mis sous séquestre, le château est ensuite rendu en 1806 à l'héritière du marquis de Roquefeuil, Clémence de Faventines. Après l'incendie qui ravagea une partie du château en 1810, Mme de Faventines et son mari le vicomte d'Alzon entreprennent des rénovations qui apportent au château son caractère « Empire ». De nos jour, resté dans la famille d'Alzon durant tout le XIXe siècle, le château passe dans la famille d'Aulan en 1896 par le mariage du comte Suares d'Aulan avec une demoiselle d'Alzon. La famille restera propriétaire de Lavagnac jusqu'en 1980, date à laquelle le château est acheté par une société japonaise, la société Nippon Sangyo, dont la presse a relaté en France, à la suite de ses nombreuses acquisitions de châteaux, les péripéties et les déboires qui en résultèrent.","architecture":"Lavagnac, maison forte au Moyen-Age reconstruit au XVIIe siècle  corps de logis en forme de U à deux niveaux et attiques  flanqué de tourelles d'angles sur culot fronton triangulaire sur porte donnant sur balcon, les ailes basses sur rez-de-chaussée à arcades sur lequel passe la terrasse de 46 mètres de long largeur de 6 mètres relié de chaque côté par des escaliers latéraux qui accède à la terrasse inférieure. Sur les côtés des ailes une avec toitures et à l'opposée l'orangeraie en forme de U à un étage avec terrasses. Le site de Lavagnac offre un immense domaine de 70 hectares dont le jardin à la Française. Au début des années 2000 est devenu propriété de la société château Holding qui a conclu avec la SAFER Languedoc Roussillon un accord permettant de lui transférer à la date du 30 juin 2006 la propriété de ce magnifique domaine.  Grand casting pour le complexe hôtelier de Lavagnac  \r\nà  Montagnac.  Les frères Cox ont acheté en 2006 pour y aménager un vaste complexe hôtelier de grand luxe, d'ici deux ans.","habitants":"Famille de Grasset \r\n        \"","divers":"Château de Lavagnac à Montagnac","gps":"","images":["../../jctruffet.com/image/image_34/34_Lavagnac_1.jpg","../../jctruffet.com/image/image_34/34_Lavagnac_2.jpg","../../jctruffet.com/image/image_34/34_Lavagnac_3.jpg","../../jctruffet.com/image/image_34/34_Lavagnac_4.jpg","../../jctruffet.com/image/image_34/34_Lavagnac_5.jpg"]},"Consult_chateau_formulaire1b0d":{"id":"Consult_chateau_formulaire1b0d","dept":"34","canton":"Lunas","commune":"Lavalette","nom":"Lavalette_34","type":"Forteresse","periode":"XIII-XVII","histoire":"LAVALETTE, un premier château a été construit en 1162 puis modifié au XIIIe et XIVe siècle. Au XVe siècle,  les seigneurs de Lavalette sont vassaux  des évêques de Lodève  et enfin reconstruit au XVIIe par les Fabre de Latude, seigneurs de Lavalette, après sa destruction pendant les guerres de religions, soubassement, courtine et tour ronde au nord-ouest et mur ouest du XIIIe ou XIVe siècle. Reconstruction partielle  au début XVIIe siècle, après les guerres de Religion pour la famille des Fabre de Latude seigneurs de Lavalette,","architecture":"Lavalette,  château fortifié dès 1162. soubassement, courtine et tour ronde au nord-ouest et mur ouest du XIIIe ou XIVe siècle. Vestiges visibles du château fort partiellement détruit en 1585 par Joyeuse. Reconstruction partielle  au début XVIIe siècle,  constitué  de trois  corps de logis, de l'escalier et de la porte d'entrée, courtine crénelée flanqué de tours rondes","habitants":"Famille des Fabre de Latude\r\n        \"","divers":"Forteresse de Lavalette.","gps":"","images":["../../jctruffet.com/image/image_34/34_Lavalette_1.jpg","../../jctruffet.com/image/image_34/34_Lavalette_2.jpg","../../jctruffet.com/image/image_34/34_Lavalette_3.jpg","../../jctruffet.com/image/image_34/34_Lavalette_4.jpg","../../jctruffet.com/image/image_34/34_Lavalette_5.jpg","../../jctruffet.com/image/image_34/34_Lavalette_6.jpg","../../jctruffet.com/image/image_34/34_Lavalette_7.jpg","../../jctruffet.com/image/image_34/34_Lavalette_8.jpg"]},"Consult_chateau_formulairea02f":{"id":"Consult_chateau_formulairea02f","dept":"34","canton":"Lattes","commune":"Lavérune","nom":"Lavérune_Engarran","type":"Château","periode":"XV-XVIII","histoire":"Deux châteaux à Laverune dont celui de Laverune  du XVe siècle  appelé château des évêques et celui d'Engarran du XVIIIe siècle.\r\nLAVERUNE , après de multiples acquisitions, il devient la propriété des évêques de Montpellier. En 1622 Louis XIII y installe son poste de commandement,  en 1626  Daniel de Gallières est chargé d'agrandir son domaine et d'aménager le parc. A partir de 1692 la seigneurie passe entre les mains des évêques dont le plus notable fut Joachim Colbert de Croissy (c'était le neveu de Colbert)  qui y vécu 40 ans. En 1754 à Monseigneur de Villeneuve et  en 1789, la demeure est saisie comme tous les biens du Clergé. Le 2 janvier 1791, le domaine est vendu à la famille de Pierre Cambon de Montpellier. Au XXe siècle propriété de monsieur Louis Petit qui arrache les arbres pour planter la vigne. Le château et son parc sont  en 1973, acheté par la mairie de Lavérune.                          ENGARRAN, aux portes de Montpellier, le château de l'Engarran  monument historique classé \"Folie\" du XVIIIe siècle siège du gouvernement et d'une de deux intendances du Languedoc  construit en 1750 par Jean Vassal  conseiller à la cour des comptes, vendu à la famille Adélys Bertrand puis à monsieur Alain Grill ingénieur en chef du génie maritime.","architecture":"Laverune, c'est un véritable château du Moyen-Age puisque le premier bâtiment date du XIIIe siècle au cours des siècles, il a souvent été retouché. Il possède, du côté Est, tous les attributs d'une bâtisse militaire avec des mâchicoulis. Au rez-de-chaussée, on peut voir le salon de musique classé monument historique. Il est orné de magnifiques gypseries italiennes. cet espace est accessible lors dexpositions de peinture ou de concerts.\r\nAu 1e étage, auquel on accède par un grand escalier avec une rampe en fer forgé, il y a le musée Hofer Bury qui est un musée de peinture contemporaine. Au XVIIe et XVIIIe siècles, un grand parc et un jardin à la française furent plantés tout autour du château suivi par un jardin \"à l'anglaise\". Ce parc est inscrit à linventaire des monuments historiques. c'est un des plus beaux parc du midi de la France.                                                                                    Engarran, fait partie de la guirlande des châteaux de Montpellier. De récentes découvertes attestent qu'il a été construit sur les murs d'une ancienne métairie. Depuis sa construction au XVIIIe siècle corps de logis rectangulaire à deux niveaux à six travées  avec un avant corps  central en forte saillie, relié aux ailes  par des quarts de rond, la porte d'entrée encadrée de deux atlantes supportant un magnifique balcon en fer forgé,  lors de la vente du château de Mosson récupération de  vases et statues qui sont venus orner le parc  ainsi que le portail. N'a pas eu à souffrir des tourmentes révolutionnaires.","habitants":"Famille de Pierre Cambon \r\n        \r\n        \r\n        \"","divers":"Château de Lavérune, de Engarran mairie et porte de ville.","gps":"","images":["../../jctruffet.com/image/image_34/34_Laverune_Engarran_1.jpg","../../jctruffet.com/image/image_34/34_Laverune_Engarran_2.jpg","../../jctruffet.com/image/image_34/34_Laverune_Engarran_3.jpg","../../jctruffet.com/image/image_34/34_Laverune_Engarran_4.jpg","../../jctruffet.com/image/image_34/34_Laverune_Engarran_5.jpg","../../jctruffet.com/image/image_34/34_Laverune_Engarran_6.jpg","../../jctruffet.com/image/image_34/34_Laverune_Engarran_7.jpg"]},"Consult_chateau_formulaire11c7":{"id":"Consult_chateau_formulaire11c7","dept":"34","canton":"Le Crés","commune":"Baillargues","nom":"Layrargues","type":"Château","periode":"XVIII","histoire":"LAYRARGUES, au XIIIe siècle le domaine relève de l'évêché de Maguelone, qui passa aux Massane au XVIIe siècle dont les petits enfants  de Daniel de Massane vendent  en 1747 le château  à Claude Estienne d'Estable lieutenant du roi en Languedoc qui à sa mort en 1760, le domaine passa par achat à la famille de Jean et Jacques  Pomier, Jean banquier à Montpellier et Jacques  capitaine d'infanterie et chevalier de l'ordre de Saint-Louis, les héritiers André fils de Jeanet de Marguerite Davidjean se marie vers 1800 avec une veuve et décéde sans postérité en 1830, il légue ses biens au petit fils de sa soeur Marguerite Eugène Vialars qui prendra le nom de Pomier-Layrargues, ce nom sera illustré par Marcel en 1885-1969 président de la fédération méridionale des distilleries coopératives et président de la chambre d'agriculture de l'Hérault. Le château vendu par cette famille, abrite aujourd'hui une école  et les terres au golf de Massane.","architecture":"Château de Layrargues : transformé aux XVIIIe- XIXe siècle ,  corps de logis  à deux niveaux et attiques  s'élève au fond de la cour d'honneur façade à fronton triangulaire, avec portail de fer forgé, perron en hémicycle,  couvert d'un toit  à faible pente en tuiles, la façades  de style néoclassique est animée par des chaînes à refend et par des bossages en table, au centre se détache un avant corps souligné par un fronton  triangulaire, parc planté de pins d'Alep.","habitants":"Famille de Claude Estienne d'Estable\r\n        \"","divers":"Châteaux de Layrargues à Baillargues","gps":"","images":["../../jctruffet.com/image/image_34/34_Layrargues_1.jpg","../../jctruffet.com/image/image_34/34_Layrargues_2.jpg"]},"Consult_chateau_formulairef7fc":{"id":"Consult_chateau_formulairef7fc","dept":"34","canton":"Béziers","commune":"Lespignan","nom":"Lespignan","type":"Château","periode":"XVIII","histoire":"LESPIGNAN, à l'est du village, le château féodal dominait tout le village. Son propriétaire, le duc de Fleury  pouvait apercevoir Narbonne et Pérignan. Aujourd'hui hostellerie.\r\nLa CLAUTINIERE, pas d'information historique.","architecture":"Les remparts présentent une brèche due à l'artillerie de Louis XIII, ouverte lors du siège de Lespignan en 1632. Les remparts n'ayant plus d'utilité, la trouée ne fut pas réparée. Cette brèche est l'actuelle route de Béziers.\r\nLa mer s'étant retirée, la plaine de Lespignan est demeurée inculte jusqu'en 1793. Les apports de la rivière Aude l'ont rendue propre à la culture. Dans cette plaine, ou la matte, en raison de la salinité, pousse la salicorne qui permet de produire de la soude. D'où deux ou trois maisons Renaissance à Lespignan, bâties par des Italiens (une succession de prélats italiens ont dominé l'évêché de Béziers de 1547 à 1669) qui exportaient la soude à Murano pour la fabrication du verre. Il ne reste aujourd'hui du château qu'une des deux tours.                                                                                            La Clautinière, de plan carré  à deux niveaux plus maison de maître que château.","habitants":"Famille du duc de Fleury\r\n        \"","divers":"Château de Lespignan et de la Clautinière.","gps":"","images":["../../jctruffet.com/image/image_34/34_Lespignan_1.jpg","../../jctruffet.com/image/image_34/34_Lespignan_2.jpg","../../jctruffet.com/image/image_34/34_Lespignan_3.jpg"]},"Consult_chateau_formulaire90b0-2":{"id":"Consult_chateau_formulaire90b0-2","dept":"34","canton":"Béziers","commune":"Lignan sur Orb","nom":"Lignan","type":"Château","periode":"XVII","histoire":"LIGNAN,  château  construit par les romains, puis château-fort au IXe siècle, et résidence d'été des évêques du Languedoc au XVIe siècle, est aujourd'hui dans une nouvelle dynamique.   Nombreuses sont les personnalités historiques à lavoir fréquenté et aimé, nombreux aussi sont les propriétaires qui se sont vantés de lavoir possédé.  Ainsi, sous le règne dHenri IV, la nouvelle reine, Marie de Médicis remercie dans une lettre datée de 1604, lévêque de Bonsi dun envoi dhuile et de fruits récoltés dans le domaine de Lignan.\r\nLignan sera évoqué lors de la Révolution Française, lordonnance mettant les biens ecclésiastiques à la disposition de la Nation. Cest ainsi que dépossédé de son dernier propriétaire, Mr Nicolaë  81e évêque de Béziers, le mobilier du château se vendit le 22 mars 1790. Largenterie seule fut sauvée par les nouveaux acquéreurs. Signalons que lempereur des Français accorda les armoiries spéciales pour Lignan.\r\nEn 1800, la commune se dote d'armoiries, encore conservées de nos jours, soit « d'hermine au sautoir losangé d'or et de gueules ».\r\nAujourd'hui hôtel restaurant lieu est devenu une étape gastronomique incontournable du pays languedocien.","architecture":"Lignan, désormais dans une nouvelle jeunesse, le château est un hôtel 4 étoiles avec son restaurant l'Orangeraie, proposant une cuisine gourmande et raffinée. Tour à tour forteresse imprenable, ruine ou lieu de plaisance, cet établissement prestigieux peut se vanter davoir traversé le temps sans se défaire de son caractère et de son identité. Au cur dun parc de six hectares et bordé par la rivière de lOrb, cet établissement en forme de L  à deux niveaux et attiques fronton triangulaire en façades  flanqué de deux  tours carrés en angles avec  toitures en coupoles.","habitants":"Famille de  Vincent Tarto\r\n        \"","divers":"Château à Lignan sur Orb.","gps":"","images":["../../jctruffet.com/image/image_34/34_Lignan_1.jpg","../../jctruffet.com/image/image_34/34_Lignan_2.jpg","../../jctruffet.com/image/image_34/34_Lignan_3.jpg"]},"Consult_chateau_formulaired820":{"id":"Consult_chateau_formulaired820","dept":"34","canton":"Lodève","commune":"Lodève","nom":"Lodève","type":"Château","periode":"XVIII","histoire":"Plusieurs châteaux à Lodève, la tour du Portalet des côtes, de Mallet , de Campestre, de Monplaisir et de Saint-Jean de Blaquière.                                                                                  LODEVE, le château fût durant des siècles, la résidence d'été des évêques de Lodève jusqu'à la Révolution française.  Cest en 1922 quAugustin Mallet rachète la propriété pour la transformer en exploitation viticole jusquau début des années 1980, lui donnant lappellation de château Mallet.  Le château de l'Aiglon est un domaine privé ancien, appartenant à une vieille famille lodévoise: les Fraïsse, cette  famille possédait les usines Fraïsse: une entreprise de métaux et de tôlerie qui a marqué l'histoire industrielle de Lodève. Le château de l'Aiglon (construit en 1910) a été mis en vente aux enchères en 2011, sans trouver preneur. Il est donc resté propriété de la famille Fraïsse. Il a été en grande partie détruit par les flammes.                                                                        MONTPLAISIR, Gaspard Barbot, un négociant et riche fabricant de draps, acheta aux héritiers Luchaire en 1824. Cette famille attestée à Lodève dès le XVIe siècle était une famille de fabricants de draps . Bernard-Louis Luchaire (1734-1837) fut représentant de lHérault à la Chambre des Cent-Jours. Une de ses filles, Marie Camille, se maria avec Fournier, le couple eut une fille  Emma, qui épousa en 1845 Michel Chevalier, Sa fille Cordélia (1848-1913) épousa en 1870 Paul Leroy-Beaulieu  Cette famille posséda longtemps le domaine qui fut ensuite vendu avant dêtre acquis par le russe  Oleg Chirkunov. société civile immobilière est active depuis 1 an.      CAMPESTRE; institut médico éducatif.                                             MALLET Chambres d'hôtes. St-Jean de Blaquières du XIVe siècle.","architecture":"Lodève, tour du portalet de Côtes,                                              Montplaisir situé sur la commune dOlmet-et-Villecun, cest une vaste maison de maître aux allures de château  de plan carré à trois niveaux toitures en terrasse.  A la suite de la nomination d'un liquidateur, le château de l'Aiglon (construit en 1910) a été mis en vente aux enchères en 2011, sans trouver preneur. Il a été en grande partie détruit par les flammes.                                              Mallet le château est propice à la découverte dun environnement, dun terroir et ces vignobles, dun patrimoine dune richesse exceptionnelle au cur du haut Languedoc.                      Campestre, grand bâtiment en longueur  avec pavillon carrés sur angles de façades dépassant  d'un étage l'ensemble à toits brisés et au centre au dessus d'une entrée vitrifié un fronton triangulaire , les ailes de prolongement à deux niveaux  avec terrasses           Saint-Jean de Blaquière style maison forte à deux niveaux avec tours rondes aux angles en façades.","habitants":"Famille d'Augustin Mallet\r\n        \r\n        \"","divers":"châteaux à Lodève, la tour du Portalet des côtes, de Mallet , de Campestre, de Monplaisir et de Saint-Jean de Blaquière.","gps":"","images":["../../jctruffet.com/image/image_34/34_Lodeve_1.jpg","../../jctruffet.com/image/image_34/34_Lodeve_2.jpg","../../jctruffet.com/image/image_34/34_Lodeve_3.jpg","../../jctruffet.com/image/image_34/34_Lodeve_4.jpg","../../jctruffet.com/image/image_34/34_Lodeve_5.jpg","../../jctruffet.com/image/image_34/34_Lodeve_6.jpg","../../jctruffet.com/image/image_34/34_Lodeve_7.jpg","../../jctruffet.com/image/image_34/34_Lodeve_8.jpg","../../jctruffet.com/image/image_34/34_Lodeve_9.jpg"]},"Consult_chateau_formulaire3a73":{"id":"Consult_chateau_formulaire3a73","dept":"34","canton":"Pézenas","commune":"Pézenas","nom":"Loubatières","type":"Château","periode":"XV-XVIII","histoire":"LOUBATIERES  Demeure seigneuriale du XVe siècle, modifiée ultérieurement, à la fois rendez-vous de chasse et retraite  discrète, témoin d'un certain art de vivre au XVIIIe siècle par son décor intérieur, son jardin, ses inscriptions  épicuriennes. Chapelle avec retable de gypseries. \r\n La seigneurie et la Grange de Loubatières appartiennent durant tout le XVIe siècle, sans doute même au cours du siècle précédent, à la famille de Pavie, très ancienne dynastie de notaires et conseillers du roi, appelée plusieurs fois au consulat. Par suite de l'alliance entre les familles de Pavie et de Mourcairol, le titre, la maison et les terres (dont une partie avait été cédée en 1590 au connétable de Montmorency pour la création de son parc de chasse, l'actuel château du Parc) échoient à cette dernière avant 1614. Les Roquemont, alliés aux Mourcairol, possèderont Loubatières dans le dernier quart du XVIIe siècle. Le domaine passe ensuite en 1725 à Jean d'Audiffret, conseiller du roi et correcteur en la Cour des Comptes, Aides, et Finances de Montpellier, puis à Barthélémy de Mestre de Roquessol en 1769.  Devenue bien communal, la motte du château fut inféodée à plusieurs reprises, puis vendue le 25 août 1802 au notaire Joseph Ebrail qui y créa un jardin, ce dernier qui fit bâtir la maison actuelle.","architecture":"La construction primitive de Loubatières de la fin XVe siècle se développait en équerre autour d'une cour fermée à l'ouest par la chapelle. La tour d'escalier polygonale en demi-hors-oeuvre, défendue par une bretèche, est logée dans l'angle, à la jonction des deux corps de logis. Une seconde tour a été construite, à l'extrémité de l'aile est au cours des vingt premières années du XVIe siècle. Au siècle suivant, la demeure agrandie est désormais orientée vers l'est, du côté du jardin. Le portail, avec ses refends et ses ailerons à volutes, est contemporain de cette seconde campagne. Son élégante ferronnerie, qui a remplacé à la fin du XVIIIe siècle les vantaux de bois d'origine, porte le monogramme des Roquessol, à qui il faut attribuer également la longue inscription d'inspiration libertine de la première cour et le décor intérieur de gypserie. La chapelle à chevet plat, contrefort sur angles, a été élevée en même temps que le premier corps de logis. Elle ne possède qu'une seule travée voûtée d'ogives.","habitants":"Familles de Pavie\r\n        \r\n        \"","divers":"Château de la Loubatières à Pézenas","gps":"","images":["../../jctruffet.com/image/image_34/34_Loubatieres_1.jpg"]},"Consult_chateau_formulaire4404":{"id":"Consult_chateau_formulaire4404","dept":"34","canton":"Clermont l","commune":"Gravézon","nom":"Lunas","type":"Château","periode":"XVII","histoire":"LUNAS, l'histoire de ce château et des seigneurs qui y résidèrent, peut se décomposer en quatre périodes:  la période Vicomtale, des origines à 1201.  Les Seigneurs de Faugères de 1201 à 1516.  Les Barons de Narbonne-Caylus de 1516 à 1706.  Ce dernier, formé par l'extrémité nord-ouest du Pioch de Lintil et de Poussel-Roux, entre les ruisseaux de Saint Georges et de Nize, est constitué par un à pic vertical d'une centaine de mètres, dont la base flanque la rive gauche de la rivière de Gravezon. Connue sous la dénomination de \"Redondel\", cette abrupte et imposante masse rocheuse représentait de ce fait un point stratégique de premier ordre, commandant l'accès vers le Lodévois et les plaines du \"Pays-Bas\".   La période contemporaine depuis 1706  Pieter et Catherine Burgers, propriétaire, vous reçoivent en toute simplicité et convivialité dans leur restaurant  un cadre historique.","architecture":"Château construit au XVIIe siècle par Henri de Narbonne, le château précédent ayant dû être détruit en application de l'édit de grâce d'Alès.  De l'ancien château, nid d'aigle sur le Redondel, détruit en 1629, il ne reste que des ruines, au bord du Gravezon, fut construit par Henri de Narbonne, en remplacement de l'ancien château, en 1641  Tant et si bien que très tôt s'éleva sur cette plate-forme en nid d'aigle un château dominant le croissant des habitations qui, à son tiers inférieur, constituait la bourgade primitive. L'endroit d'implantation de ce château était particulièrement bien choisi: Inaccessible sur les trois côtés formant l'à pic, un large fossé de sept mètres sur dix mètres de profondeur, réalisé de main d'homme, ne permettait l'accès par le quatrième côté communiquant que par un pont-levis. S'il ne reste rien de la construction elle-même, il est toutefois possible de trouver de-ci, de-là, quelques gros pans de murs abattus et démantelés, et surtout de noter la curieuse particularité du mur d'enceinte, qui épouse le dessin sinueux de la falaise. Le nouveau château au bord du torrent de la Gravezon sur mur de protection en forme de U à trois niveaux flanqué de tours carrées en angles.","habitants":"Famille de Pieter et Catherine Burger\r\n        \"","divers":"Château de Lunas  à Gravézon","gps":"","images":["../../jctruffet.com/image/image_34/34_Lunas_1.jpg","../../jctruffet.com/image/image_34/34_Lunas_2.jpg","../../jctruffet.com/image/image_34/34_Lunas_3.jpg","../../jctruffet.com/image/image_34/34_Lunas_4.jpg"]},"Consult_chateau_formulaire09ab":{"id":"Consult_chateau_formulaire09ab","dept":"34","canton":"Lunel","commune":"Lunel-Viel","nom":"Lunel_Viel","type":"Patrimoine","periode":"Xv-XVII","histoire":"Plusieurs châteaux à Lunel outre le patrimoine le château  de la Farges ( voir articles) l'orangerie et le château de Grès Saint-Paul.                  LUNEL du XVIIe au XIXe siècles, les plus anciennes parties du château de Lunel-Viel datent du XVIIe siècle. La protection du village avant cette époque aurait été assurée par le château de Lunel tout proche et par limposant clocher-donjon de léglise Saint-Vincent. Construit par la famille de Trémollet, seigneurs du lieu, il fut vendu au sieur Durand, maire de Montpellier à la veille de la Révolution, le château fut ensuite vendu  au maire de Montpellier puis au XIXe siècle à Paul Manse, un riche avocat qui le modifia beaucoup. Le parc du château accueillit au même moment une grande orangeraie encore visible,même si il ny a plus dorangers.\r\nLe château de GRES ST-PAUL, au Moyen-Age, une petite église se dressait le long de lantique voie Domitienne, entre Nîmes et Montpellier, au cur du Languedoc : Saint-Paul de Cabrières. En témoignage de ce patrimoine aujourdhui disparu, le domaine reconstruit sur ses ruines porte son nom : Grès Saint-Paul. est un domaine familial viticole depuis 1830. Il propose une belle diversité de vins. Jean-Philippe Servière est la 7e génération sur Grès Saint-Paul. Son aïeul acquît plus de 100 ha vers 1830. Son arrière-grand-père fit construire la demeure au début du XXe siècle, qui conserve la mémoire dune opulence viticole omniprésente en Languedoc à cette époque.","architecture":"château de Lunel-Viel date du XIIe siècle pour sa partie la plus ancienne,  restant sous la protection défensive de la Tour de l'église et du château de Lunel, du XVIIe siècle, avec un grand escalier Louis XIII desservant les services de la mairie, installée là depuis la fin du XXe siècle. Transformé à la fin du XIXe siècle, il se verra adjoindre une chapelle gothique bien conservée. De multiples décorations en volutes, coquilles et grappes de raisin, le blason du lieu sur la tour crénelée, le parc arboré en font un lieu à découvrir.   La tour, sorte de donjon néo-médiéval domine le village et la plaine d'une hauteur imposante de 30 mètres. Dans le parc fut construit en 1876 une grande orangeraie de style Napoléon III, avec fronton rodondant latéraux et sa couverture dardoise en écaille et son décor sculpté lui a valu d'être classé monument historique par les bâtiments de France en 1990. Au sein du parc se trouve aussi un carillon de trois cloches datant de 1898 installé sur la façade du château.                                                                   Château  de Grés Saint-Paul du XXe siècle, corps de logis rectangulaire à deux niveaux, terrasses en toiture, accolé à un pavillon rectangulaire dépassant d'un étage avec terrasses.","habitants":"Famille de Trémollet\r\n        \"","divers":"Châteaux à Lunel outre le patrimoine le chateau  de la Farges, l'orangerie et le château de Grès Saint-Paul.","gps":"","images":["../../jctruffet.com/image/image_34/34_Lunel_Viel_1.jpg","../../jctruffet.com/image/image_34/34_Lunel_Viel_2.jpg","../../jctruffet.com/image/image_34/34_Lunel_Viel_3.jpg","../../jctruffet.com/image/image_34/34_Lunel_Viel_4.jpg","../../jctruffet.com/image/image_34/34_Lunel_Viel_5.jpg","../../jctruffet.com/image/image_34/34_Lunel_Viel_6.jpg","../../jctruffet.com/image/image_34/34_Lunel_Viel_7.jpg"]},"Consult_chateau_formulairedab0-2":{"id":"Consult_chateau_formulairedab0-2","dept":"34","canton":"Méze","commune":"Lézignan la Cèbe","nom":"Lézignan","type":"Château","periode":"XV-XVII","histoire":"Trois châteaux à Lézignan, le château dit de la Cèbe, la Condamine, la Roches Fleuries.                                         LEZIGNAN,  Marie-Félicie des Ursins y séjourna souvent jusqu'à la mort de son époux le duc de Montmorency décapité à Toulouse en 1632. le château fut  acquis  en 1660 par  Jean-Louis de Ribes, fils de Pierre, commande la construction d'un nouveau  auquel il est prévu de faire des murs et des tours de même hauteur que les autres. A la fin du XVIIe siècle la propriété est partagée entre les familles de Ribes et de Mazeran, Passat en  1757 au Marquis de Carrion-Nizas, lieutenant général des armées du roi et les Lefèvre d'Ormesson l'ont tour à tour bâti, maintenu et l'habitent toujours et depuis  1968 par héritage passe à la  famille d'Ormesson. Wladimir d'Ormesson ambassadeur de France et membre de l'académie française.                                                                                                  CONDAMINE BERTRAND, société à responsabilité limitée a été créée en mai 1984. Emmanuelle Andreu en est le dirigeant principal est active depuis 15 ans, elle est spécialisée dans le secteur d'activité du commerce de détail de boissons en magasin spécialisé. Bernard Jany est issu d'une famille prestigieuse liée au travail du vin\r\nLa ROCHES fleurie, les propriétaires du château des Roches Fleuries bénéficieront de tarifs préférentiels sur les services proposés par la \"Distillerie des Templiers\", la nouvelle résidence \"Luxe et spa\" de Garrigae, située à quelques minutes du domaine, qui ouvrira au printemps 2012 soins et spa, salle de sport, restaurant, hôtel,  au cur de la propriété, le château du XIXe siècle entièrement réhabilité.","architecture":"Lézignan,  le château de Lézignan-la-Cèbe construit en 1615 par la famille Ribes est typiquement languedocien. Il comprend un bâtiment central sur lequel s'appuient quatre tours rondes n'a pratiquement pas subi de modifications depuis le XVIIe siècle. Il s'organise en trois corps de bâtiment disposés en U autour d'une cour d'honneur et cantonnés par quatre tours rondes  une à chaque coin du bâtiment. Les façades construites « avec pierre, chaux et sable » sont crépies. Les fenêtres s'alignent sur trois niveaux. L'entrée principale s'ouvre sur l'escalier d'honneur au « degré à repos de quatre montées pour deux planchiers ». Rien ne subsiste de l'entrée de la « basse-cour » prévue en 1614, ni de la toiture , ni les « deux impériales ». Elles ont été soit détruites, soit jamais été réalisées.  Bâti en 1614, terminé en 1616.  Les pièces du rez-de-chaussée ont conservé leur structure d'origine. Les étages ont été réaménagés au XIXe siècle dans le style néo-classique.      Condamine-Bertrand, ce château du XVIIIe siècle  corps de logis rectangulaire à trois niveaux  à toit presque plat l'entrée en façades encadrées des piliers supportant le balcon du premier étages,une tour carrée est accolé au bâtiment.                                             La Roche Fleurie, le château du XIXe siècle entièrement réhabilité corps de logis de plan carré avec fronton sur les deux façades opposée et échauguettes sur angles.","habitants":"Famille des Lefèvre d'Ormesson\r\n        \r\n        \"","divers":"Lézignan, le château dit de la Cèbe, la Condamine, la Roches Fleuries.","gps":"","images":["../../jctruffet.com/image/image_34/34_Lezignan_1.jpg","../../jctruffet.com/image/image_34/34_Lezignan_2.jpg","../../jctruffet.com/image/image_34/34_Lezignan_3.jpg","../../jctruffet.com/image/image_34/34_Lezignan_4.jpg","../../jctruffet.com/image/image_34/34_Lezignan_5.jpg","../../jctruffet.com/image/image_34/34_Lezignan_6.jpg","../../jctruffet.com/image/image_34/34_Lezignan_7.jpg"]},"Consult_chateau_formulaire1432":{"id":"Consult_chateau_formulaire1432","dept":"34","canton":"Lunas","commune":"Mérifons","nom":"Malavieille","type":"Vestiges","periode":"XI","histoire":"MALAVIEILLE, les plus anciens indices sont des noms de personnes, une famille dite de Malavieille étant attestée dans les textes dès la fin du XIe siècle. Le nom « Castellas » nest bien sûr jamais employé : ce terme récent ne désigne les lieux que depuis leur ruine. A cette époque, il y a un lien entre Malavieille et Saint Fulcran. Le grand évêque de Lodève (de 949 à 1006) serait né à Lignous et aurait été baptisé à Mérifons, deux lieux situés dans la commune. Cest, semble-t-il, à ce moment-là que la seigneurie passe sous linfluence des évêques de Lodève, comme ce sera le cas jusquà la Révolution. Au XIIIe siècle, la dernière héritière de la famille seigneuriale de Malavieille épouse un membre des Guilhem de Clermont. Malavieille devient alors une co-seigneurie détenue par les familles de Faugères et de Clermont,  du fait de sa position  à la frontière des deux diocèses. Le principal bénéficiaire de ce mouvement est sans doute le mas Canet ou Canet-le-Noir, dénomination qui proviendrait des Clermont-Nigri, seigneurs de Malavieille ainsi que du Bosc à partir du XVe siècle. Cest un membre de cette famille qui abandonne, lui aussi, le castrum et fait construire son nouveau château, de style renaissance, en bordure des terres fertiles proches du Salagou, dans la nouvelle métairie de Malavieille. Le seigneur ny vient quépisodiquement. Mais un fermier gère sur place ses intérêts. Il en est déjà ainsi au XVIIe siècle, époque à laquelle le Castellas est en ruines et inhabité. Seule une tour de lancien château reste encore couverte au milieu.","architecture":"Château de Malavieille du Xe-XIIIe siècle la première époque de construction du château de Malavieille (Malvilar au Moyen-Age) daterait du Xe siècle. Le château est en effet cité pour la première fois en lan 922. Le donjon notamment remonterait en partie à cette époque lointaine. Véritable prouesse architecturale, le château se situe au sommet dune butte qui domine la vallée du Salagou et qui est un des rares passages faciles daccès entre le bassin de lHérault dun côté et la vallée de lOrb de lautre.\r\nLes vestiges comprennent le reste du donjon et de 3 salles de différentes époques comprises entre le Xe et le XIIIe siècle.\r\nSur les pentes en bordure du château se trouvent aussi les ruines dun village qui sétait développé autour des fortifications, village qui a été abandonné au fil des siècles et qui était déjà inhabité au XVIIIe siècle.\r\nLes ruines sont visitables librement, néanmoins la montée ne sera pas aisée pour les enfants et quelques endroits sont dangereux.","habitants":"Famille de Malavieille\r\n        \"","divers":"Vestiges du château de Malavieille à Mérifons","gps":"","images":["../../jctruffet.com/image/image_34/34_Malavieille_1.jpg","../../jctruffet.com/image/image_34/34_Malavieille_2.jpg","../../jctruffet.com/image/image_34/34_Malavieille_3.jpg","../../jctruffet.com/image/image_34/34_Malavieille_4.jpg","../../jctruffet.com/image/image_34/34_Malavieille_5.jpg"]},"Consult_chateau_formulairea0df":{"id":"Consult_chateau_formulairea0df","dept":"34","canton":"Roujan","commune":"Margon","nom":"Margon_Pouzolles","type":"Château-fort","periode":"XV-XVIII","histoire":"MARGON, cité au XIe siècle, le fief d'une baronnie des Trencavel qui revient en 1220  au roi de France, elle est possédée en indivision en 1270 par les familles de Margon et d'Autignac. Au XVIe siècle les Plantavit de la Pause achète la seigneurie , ces derniers édifia les deux ailes latérales  qui se terminent par des tours rondes. En 1719 la seigneurie est vendu à René le Moine et en 1910 les le Moine de Margon, toujours dans la famille du comte  de Margon.                                                                                        A deux kilomètres à l'Ouest, POUZOLLES, deux châteaux , celui de Pouzolles, et de St-Preignan.  Le village est dominé par le château et ses deux tourelles, Pouzolles est construit à l'emplacement des remparts. La porte Saint-Martin est encore visible, groupement foncier agricole est en activité depuis 13 ans. Pierre Laures, est gérant de la société GFA .\r\nSt-PREIGNAN à Pouzolles viticole et location logements de Pastor Pierre.","architecture":"Margon,  Il a été construit au XIIIe siècle sur les ruines d un ancien château, la construction du château féodal remonte au XIVe siècle pour la partie ancienne et les trois tours rondes à mâchicoulis flanquées de tourelles en nid d'aronde,  dont la tour comportant lescalier et la cour. Juché sur une butte, ruiné pendant les guerres de religion, et endommagé à la Révolution, il a gardé son style renaissance en demeure seigneuriale, le corps de logis et les tours sont ceinturés par des corniches continues venant souligner les appuis et les linteaux des fenêtres à meneaux. Il est entouré du village médiéval qui sarticule en circulation. Le château était séparé de son jardin par un large fossé jusquau XVIIIe, le seigneur de lépoque fit aménager un système darceaux accompagné de terrasses et dun double escalier, de manière à pouvoir descendre facilement dans le jardin directement depuis les terrasses du château. Ce magnifique château féodal est un des mieux conservés dans lHérault.                                                       Pouzolles de plan rectangulaire à trois niveaux flanqués de deux tourelles sur angles","habitants":"Famille de Margon \r\n        \"","divers":"Château fort à Margon  et à St-Preignan le château de Pouzolles.","gps":"","images":["../../jctruffet.com/image/image_34/34_Margon_Pouzolles_1.jpg","../../jctruffet.com/image/image_34/34_Margon_Pouzolles_2.jpg","../../jctruffet.com/image/image_34/34_Margon_Pouzolles_3.jpg","../../jctruffet.com/image/image_34/34_Margon_Pouzolles_4.jpg","../../jctruffet.com/image/image_34/34_Margon_Pouzolles_5.jpg","../../jctruffet.com/image/image_34/34_Margon_Pouzolles_6.jpg","../../jctruffet.com/image/image_34/34_Margon_Pouzolles_7.jpg","../../jctruffet.com/image/image_34/34_Margon_Pouzolles_8.jpg","../../jctruffet.com/image/image_34/34_Margon_Pouzolles_9.jpg"]},"Consult_chateau_formulaire2113-2":{"id":"Consult_chateau_formulaire2113-2","dept":"34","canton":"Lunel","commune":"Marsillargues","nom":"Marsillargues","type":"Château","periode":"XV-XVIII","histoire":"MARSILLARGUES, le fief est donné en 1295 par Philippe le Bel à Guillaume de Nogaret, en 1305 par Guillaume de Nogaret, qui obtint les seigneuries de Marsillargues ; Calvisson, Congénies, Aujargues, Manduel, Beauvoisin, Générac, Vergèze, entre autres, en récompense de ses services rendus au roi Philippe IV le Bel. Echoit  à la famille d'Apcher, puis par alliance passe aux Murat et aux Louet en 1449, Marguerite de Murat et Louis de Louet, baron et lieutenant du sénéchal de Beaucaire, et en  1560, leurs descendants entreprennent la construction dun nouveau château à lemplacement de celui de son ancêtre. Laile sud est construite en 1679 à la demande de Jean-Louis II de Louet de Murat de Nogaret, lieutenant général du roi en Languedoc, président des États et marquis de Calvisson, en 1709 le château passe par alliance à une branche cadette de Louet marquis d'Aujargues,  les Louet le conservèrent jusqu'à la Révolution qui l'épargne, un incendie en 1936 détruit une partie des  décors intérieurs, en 1837 passa aux Calvière et en 1875 les de Saizieu de Calvière et en 1948 acquis par la commune dont les ailes abritent un musée Paul-Pastré.","architecture":"Du château féodal de Marsillargues, il ne subsiste quune partie du sous sol, les grandes cuisines et  le donjon avec sa tourelle carrée, édifier au pied du donjon, construction forme un quadrilatère  enserrant une cour intérieure.   Laile nord est refaite : façade et escalier intérieur à mur noyau. le corps du bâtiment flanqué à ses extrémités  de deux tours carrées, dominé par une façade Renaissance, qui est une des plus belles réalisations  méridionales   à pilastres ioniques et rapprocher de celle du château ducal dUzès. En 1679,  reconstruction dune partie de laile nord avec son  grand escalier suspendu ainsi  que le portail dentrée en demi-lune. Au XVIIIe, les gypseries des salles dapparat  sont refaites. Laile sud est bâtie en 1679  abritant les écuries, ce bâtiment est agrémenté dune façade   quasiment identique à celle de laile nord. Lorangerie est construite en 1767  afin de fermer lensemble constitué  par les ailes nord et sud. Le 19 mai 1936 un incendie se déclare dans lenfilade de salles jouxtant la galerie Louis XVI, qui est détruite ainsi que létage supérieur et lescalier dhonneur. l'ensemble à toit plat et terrasse. A l'intérieur, la salle a été restaurée comme avant la Révolution, avec ses lambris et son plafond suspendu.","habitants":"Famille d'Apcher\r\n        \"","divers":"Château féodal de Marsillargues","gps":"","images":["../../jctruffet.com/image/image_34/34_Marsillargues_1.jpg"
