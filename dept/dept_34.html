,"../../jctruffet.com/image/image_34/34_Marsillargues_2.jpg","../../jctruffet.com/image/image_34/34_Marsillargues_3.jpg","../../jctruffet.com/image/image_34/34_Marsillargues_4.jpg","../../jctruffet.com/image/image_34/34_Marsillargues_5.jpg","../../jctruffet.com/image/image_34/34_Marsillargues_6.jpg"]},"Consult_chateau_formulairef7ac":{"id":"Consult_chateau_formulairef7ac","dept":"34","canton":"Maugio","commune":"Maugio","nom":"Maugio","type":"Château","periode":"XVIII","histoire":"MAUGIO, la ville de Melgueil a eu, pendant plusieurs siècles, une importance politique comparable à celle de Toulouse, possédant une monnaie qui avait cours dans tout le Languedoc : le denier melgorien.  était au Moyen-Age le chef-lieu d'une puissante famille de comtes. Les comtes de Melgueil débuteraient avec un homme germanique Malgeriu, ils étaient suzerains du territoire de la région de Montpellier, dont le chef-lieu était à l'origine Maguelone. Ils se fondirent dans les familles des comte de Provence par le mariage de Béatrix, comtesse de Melgueil, avec Bérenguer Raymond Ier. Un personnage éminent issu de cette famille est Pons de Melgueil, septième abbé de Cluny, successeur de saint Hugues de Semur. Son abbatiat (1109-1126) marque l'apogée de la puissance de Cluny. Il construit les parties hautes de l'abbatiale Cluny III, développe une intense activité diplomatique auprès des papes Pascal II, Gélase II (mort à Cluny) et Calixte II (élu à Cluny et bourguignon). Il jouera notamment un rôle important dans la conclusion du Concordat de Worms, de l'instauration du pélerinage de Compostelle. Le nom de Melgueil passa progressivement à Mauguio au début du XVIIe siècle.\r\nChâteau dit de la Banquière.  est dans la famille de Marie Varenne de Bordas depuis six générations transformé en hôtel restaurant par Pauline et Guy Varenne.","architecture":"Maugio, la motte est ce qui reste du Moyen-Age (vers 960), pour servir de base au château des comtes de Melgueil. Le château féodal et les remparts furent détruit après 1622, durant les guerres de religion. Les comtes évêques de Montpellier reconstruisirent un nouveau château style Renaissance sur les ruines. Le nom de Melgueil passa progressivement à Mauguio au début du XVIIe siècle                                                                                                Château de la Banquière style  à l'italienne rectangulaire à trois niveaux balcon au premier étage sur colonnes doriques.","habitants":"Ponce de Melgueil\r\n        \"","divers":"Château de la Banquière à Maugio et sa motte féodale","gps":"","images":["../../jctruffet.com/image/image_34/34_Maugio_1.jpg","../../jctruffet.com/image/image_34/34_Maugio_2.jpg","../../jctruffet.com/image/image_34/34_Maugio_3.jpg"]},"Consult_chateau_formulaire69e2":{"id":"Consult_chateau_formulaire69e2","dept":"34","canton":"Cazouls les Béziers","commune":"Maureilhan","nom":"Maureilhan","type":"Forteresse","periode":"XIV-XVII","histoire":"MAUREILHAN, au XIIe siècle la famille des Maureilhan construit Castel Novo. Le vicomte de Béziers possédait le domaine de la Trésorière, prénommé à ce moment la Maura. La famille va donner son nom au village de Maureilhan a un quartier de Béziers et à un de leur domaine à Vic-la-Gardiole qui porte toujours le nom de Maureilhan. Ils sont fortement implantés à Narbonne ville et à Marcorignan. La famille s'éteint à la fin du XIIe siècle. Botta, la fille du dernier seigneur , disparait entre 1262 et 1265.  En 1392,  le fief de Maureilhan (village, terre, vieux château et titre). Une nouvelle famille du narbonnai se mets en place. La branche cadette des De Montbrun devient nouveau seigneur de Maureilhan jusqu'à la fin du XVe siècle. La dernière descendante de la famille va se marier avec Jean De Beaumont du Roure. Vers 1545, Jean de Beaumont vend la seigneurie à de riches commerçants de Béziers. Récemment anoblie (en 1547), la famille Bonnet s'installe à Maureilhan. Les Bonnet vont construire le château actuel vers 1550.  Ils vont mener la grande vie. On les retrouvent au début du XVIIe à la cour du duc de Montmorency . Après plus d'un siècle de vie dissolu, les Bonnet se trouvent ruinés à la fin du XVIIe siècle.  Joseph De Bonnet en 1692. Il ne peut apurer les dettes de son père menacé de contrainte par corps, il s'enfui dans l'ouest carcassonnais, le pays de son épouse. Il décède en 1710, sa famille couverte de dette vend la seigneurie en 1720 à leur voisin les De Bermond de Puisserguier.\r\nAujourd'hui société commerciale recense 1 établissement actif et le dernier événement notable de cette entreprise date du 15-02-2012. Philippe Eschasseriaux, est gérant de la société du château, elle est spécialisé dans le secteur d'activité de la culture de la vigne.","architecture":"Maureilhan, quadrilatère a trois niveaux flanqué de quatre hautes tours rondes crénelées  avec courtines Est et Sud. inscription par arrêté du 18 décembre 1980 Façades et toitures des quatre tours d'angle, peintures murales de la grande salle du premier étage.","habitants":"Famille Bonnet\r\n        \"","divers":"Château fort de Maureilhan","gps":"","images":["../../jctruffet.com/image/image_34/34_Maureilhan_1.jpg","../../jctruffet.com/image/image_34/34_Maureilhan_2.jpg","../../jctruffet.com/image/image_34/34_Maureilhan_3.jpg","../../jctruffet.com/image/image_34/34_Maureilhan_4.jpg","../../jctruffet.com/image/image_34/34_Maureilhan_5.jpg","../../jctruffet.com/image/image_34/34_Maureilhan_6.jpg"]},"Consult_chateau_formulairee856":{"id":"Consult_chateau_formulairee856","dept":"34","canton":"Méze","commune":"Les Aires","nom":"Mercoirol","type":"Vestiges","periode":"Xe","histoire":"MERCOIROL, château féodal est édifié sur le site gallo-romain de Mercure qui contrôlait l'accès de la voie Béziers Cahors. Les lieux  dépendent de plusieurs nobles successifs tels les Mercoirol et les Thézan-Poujol.   En  990 Le château appartient à Guillaume, vicomte de Béziers, dont la fille Garsinde se marie avec le comte Raymond Ier de Carcassonne. Leur fils Pierre hérite du château.  En 1112 A la suite d'une guerre entre le comte de Barcelone Bernard Aton et son frère, vicomte de Narbonne, Bernard Aton cède Mercoirol à son frère. En 1247 Les terres du vicomté de Béziers, incluant Mercoirol, passent à la couronne royale.  En 1560-1600, en partie détruit pendant les guerres de religions par les Huguenots, les maîtres du lieu, les Thezan Poujols, étant du côté du roi et des catholiques. Au XVIIIe Le château est ruiné pendant la Révolution à l'exception de la chapelle reconstruite au XVIIe siècle.","architecture":"Mercoirol, sur un piton rocheux, à 468 m daltitude, la chapelle de Saint-Michel se dresse au-dessus des ruines du château de Mercoirol. Ce fort contrôlait lancienne voie romaine qui reliait Béziers à Cahors en longeant Mercoirol et Rhèdes. Le château, dont certaines murailles présentent un appareil wisigothique intact, est signalé dès 990 dans un testament du vicomte de Béziers. Pélerinage principal le 8 mai. Accés automobile possible jusquau remparts par un chemin débutant sur la route des Aires, à 500 m du pont de la Vernière, au niveau du panneau indicateur Le Moulinas. Le site fut probablement fortifié à la suite des invasions sarrasines dans la région. Il permettait de surveiller le passage de Ramat.  Au XIIIe La légende dit que le château fut détruit par Simon de Montfort durant la croisade contre les Albigeois mais aucun texte ne l'atteste.","habitants":"Famille de  Bernard Aton\r\n        \"","divers":"Vestiges du château de Mercoirol aux Aires","gps":"","images":["../../jctruffet.com/image/image_34/34_Mercoirol_1.jpg","../../jctruffet.com/image/image_34/34_Mercoirol_2.jpg","../../jctruffet.com/image/image_34/34_Mercoirol_3.jpg","../../jctruffet.com/image/image_34/34_Mercoirol_4.jpg","../../jctruffet.com/image/image_34/34_Mercoirol_5.jpg"]},"Consult_chateau_formulaire8ef4":{"id":"Consult_chateau_formulaire8ef4","dept":"34","canton":"St-Pons de Thomières","commune":"Minerve","nom":"Minerve","type":"Vestiges","periode":"XIII","histoire":"MINERVE,  au XIIe siècle, les vicomtes de Minerve reconnaissent l'autorité des Trencavel, vicomtes de Carcassonne. le catharisme débute en 1209 par la prise de Béziers, la reddition de Carcassonne et l'emprisonnement de Raimond-Roger de Trencavel , vicomte d'Albi, de Béziers et de Carcassonne, ainsi que la confiscation de ses domaines. Quelques mois plus tard, Simon de Montfort, le croisé désigné pour succéder à Trencavel à la tête de ces vicomtés, la famille des vicomtes de Minerve perd définitivement sa forteresse. Guilhem de Minerve reprend plusieurs fois en vain la lutte contre les croisés; son fils, également prénommé Guilhem, participe à la dernière révolte des seigneurs languedociens, en 1240, avant de se rallier au roi de France. Entre 1500 et 1632, les barons de Rieux se succèdent comme gouverneurs du château royal de Minerve. En 1632, lors de la rebellion du dernier duc de Montmorency contre Louis XIII, François de Rieux, gouverneur de Minerve, s'associe à cette révolte et s'oppose au pouvoir royal, avec ses troupes armées. Dès lors, Minerve n'est plus qu'une modeste seigneurie appartenant au domaine royal et cédée  en engagement à différents nobles : à Mgr Jean-Jacques Fleyres, au comte François de Monstiers de Rieux qui prendra le titre de vicomte de Minerve, puis aux comtes de Thézan, héritiers des Fleyres, et qui conservent la seigneurie jusqu'à la Révolution. A la fin du XVIIe siècle et au cours du XVIIIe siècle, la vie de la petite communauté rurale est marquée par la présence d'une famille de notables, les Michelet.             Manoir Aliberts Une vieille bastide du XIIIe siècle, perchée au sommet dune colline, entourée de vignes et de garrigue. Chambres d'hôtes , Monique et Pascal Bourgogne,","architecture":"Minerve est la capitale historique du pays minervois. Ce petit village est perché sur un éperon rocheux, au confluent des gorges de la Cesse et du Brian.   Les assaillants disposent de machines de siège, qui pilonnent les remparts et la rampe fortifiée conduisant à l'unique puits. En 1229, C'est de cette époque que date la reconstruction du château et de ses fortifications. Lors de la Guerre de Cent ans, le château de Minerve est un des dispositifs de défense de la région, notamment lorsque le Prince de Galles, dit le Prince Noir, investit le minervois en 1355. Le château de Minerve est un élément fortifié important dans ces guerres de position qui opposent des troupes armées diverses, et ravagent le minervois.\r\nLe syndic représentant le diocèse civil de Saint-Pons obtient en 1637 le démantèlement du château de Minerve. Les ruines actuelles datent de la destruction de cette forteresse royale, et non de la période de la croisade.                                                                    Manoir Aliberts, une vieille bastide du XIIIe siècle, corps de logis rectangulaire à deux niveaux et attiques.","habitants":"Famille de Guilhem de Minerve\r\n        \"","divers":"Vestiges à Minerve et  manoir Aliberts","gps":"","images":["../../jctruffet.com/image/image_34/34_Minerve_1.jpg","../../jctruffet.com/image/image_34/34_Minerve_2.jpg","../../jctruffet.com/image/image_34/34_Minerve_3.jpg","../../jctruffet.com/image/image_34/34_Minerve_4.jpg","../../jctruffet.com/image/image_34/34_Minerve_5.jpg","../../jctruffet.com/image/image_34/34_Minerve_6.jpg","../../jctruffet.com/image/image_34/34_Minerve_7.jpg"]},"Consult_chateau_formulaireb294":{"id":"Consult_chateau_formulaireb294","dept":"34","canton":"Montpellier","commune":"Montpellier","nom":"Mogère","type":"Château","periode":"XVIII","histoire":"MOGERE, construit pendant la première décennie du XVIIIe siècle, par Jean-Antoine Giral, architecte,  en 1706, Fulcrand Limozin secrétaire du roi, maison et couronne de France et contrôleur de la chancellerie de Montpellier achète la métairie de la Mogère. Celui-ci ne devait alors plus quitter cette famille et, à partir du second propriétaire, sera transmis de façon directe jusqu'à nos jours.  Il reste depuis dans la même famille. Il a appartenu entre autres à Jacques-Joseph de Boussairolles (1741-1814) qui fut conseiller à la cour des comptes, puis président de la cour impériale et baron d'Empire en 1813.  Jean-Joseph de Boussairolles hérite  en 1774 également propriétaire par alliance du château de Flaugergues. A sa mort le château passe à sa fille la comtesse de Cadolle et en 1885 à sa petite fille la comtesse Antoine de Saporta. Le fils de cette dernière le vicomte René de Saporta.  Depuis 1941 il est  géré par le Vicomte Gaston de Saporta.","architecture":"Construite au début du XVIIIe siècle, la Mogère est l'une de ces demeures appelés \"folies\" édifiées dans la campagne montpelliéraine. \"Maison dans les feuillages\", elles sont le fait d'une nouvelle aristocratie enrichie au service du roi, le château de la Mogère se présente comme une vaste et austère façade largement ouverte sur un jardin à la française, coiffée d'un toit presque plat en tuiles, de forme d'un parallélépipède rectangle, consiste dans un corps central surmonté d'un fronton et flanqué de deux ailes, celles-ci se prolongent du côté de la cour d'honneur par deux bâtiments bas supportant une terrasse couronnée de ballustres.\r\nSituée au milieu d'un domaine rural, elles sont entourées de magnifiques jardins. Dominant l'ancien potager du domaine, le buffet d'eau témoigne d'une influence italienne.\r\nGrande fontaine de style rocaille, il présente une décoration polychrome (bouquets en coquillages, mosaïques sur fond orange et rouge,  il est alimenté par un aqueduc intérieur au domaine d'une longueur de 55 mètres.","habitants":"Famille de Fulcrand Limozin\r\n        \r\n        \"","divers":"Château de la Mogère à Montpellier","gps":"","images":["../../jctruffet.com/image/image_34/34_Mogere_1.jpg","../../jctruffet.com/image/image_34/34_Mogere_2.jpg","../../jctruffet.com/image/image_34/34_Mogere_3.jpg","../../jctruffet.com/image/image_34/34_Mogere_4.jpg","../../jctruffet.com/image/image_34/34_Mogere_5.jpg","../../jctruffet.com/image/image_34/34_Mogere_6.jpg"]},"Consult_chateau_formulaire8747":{"id":"Consult_chateau_formulaire8747","dept":"34","canton":"Cazouls les Béziers","commune":"Montady","nom":"Montady","type":"Château","periode":"XII-XVII","histoire":"A Montady tour et château.                                                                   TOUR de MONTADY, la colline située au cur du village est surplombée par une tour féodale du XIIe siècle la tour de Montady, vestige d'un château aujourd'hui disparu. Cette tour Sarrazine, seul témoignage du passé à avoir subsisté sur les quatre que le château comptait à l'origine, servait de donjon, sa position stratégique offre une vue panoramique sur une bonne partie du vignoble languedocien,\" l'Etang de Montady\".  En 1226, Pierre de Montady est propriétaire du château. Jusquen 1600, il reste dans la famille des Cabrières puis retombe dans les mains du roi. Le sieur de la Ricardelle possède ensuite la seigneurie de Montady jusquen 1660. En 1661, le château est vendu au chapitre de Saint-Nazaire à l'exclusion de la tour qui, elle, est revendue comme bien communal en 1792. Le château, complètement détruit en 1846, ne laisse comme seule trace actuelle que la très belle tour sarrasine illuminée chaque nuit qui semble veiller sur le village de Montady.        MONTADY, Le château dit mas de la tour, est situé sur la commune de Montady, à lEst de loppidum dEnsérune, entre la tour de Montady et le Belvédère de Béziers, château dit le domaine du Mas de la Tour a été acquis en 1974 par la famille Bonfils.  Le château se distingue par sa hauteur et sa grande tour ronde dangle à lorigine de son nom. Le domaine du Mas de la Tour est lun des tout premiers  à sêtre équipé dun système dirrigation par goutte à goutte.","architecture":"Mas de la Tour, le château se remarque par sa hauteur et sa grande tour ronde dangle, à quatre niveaux, toiture ronde galbée se terminant par un clocheton,  corps de logis principal à trois niveaux toitures en croupes, une tourelles carrées à l'opposée de la tour rondes à toit pointu.  Un parc, ses clôtures et ses portails, la serre et l'orangerie, ainsi que les façades et toitures des bâtiments entourant l'ancienne cour des communs attenante au château, à l'exclusion des bâtiments annexes. un plateau de 30 m sur 20 m environ. Acquis en 1974, le domaine Mas de la Tour sétend sur 60 ha situés à lEst de lOppidum dEnsérune, entre la Tour de Montady et le Belvédère de Béziers. Le château en totalité (corps de logis principal) , avec son parc, ses clôtures et ses portails, la serre et l'orangerie, ainsi que les façades et toitures des bâtiments entourant l'ancienne cour des communs (attenante au château) , à l'exclusion des bâtiments annexes.  Le donjon: C'est tout ce qui reste du château de nos jours, c'est une tour carrée de 20 m de haut, 6 m de côté avec des murs de 1 m d'épaisseur. Elle comportait 3 étages : le premier posé sur des poutres, le second voûté en coupole avec un passage central pour une échelle, il comporte une série de trous extérieurs qui prouve l'existence d'une galerie ou hourds en bois et le troisième semblable au second et supportant une plateforme. L'entrée se faisait par la salle basse, porte nord, puis il fallait emprunter  les échelles pour accéder aux niveaux supérieurs.  Outre cette tour, il semblerait qu'une autre tour « tour vieille » se soit située en avant à l'est.","habitants":"Famille de  Pierre de Montady                                                              Famille Bonfils\r\n        \"","divers":"Tour de Montady et château de la Tour","gps":"","images":["../../jctruffet.com/image/image_34/34_Montady_1.jpg","../../jctruffet.com/image/image_34/34_Montady_2.jpg","../../jctruffet.com/image/image_34/34_Montady_3.jpg","../../jctruffet.com/image/image_34/34_Montady_4.jpg","../../jctruffet.com/image/image_34/34_Montady_5.jpg","../../jctruffet.com/image/image_34/34_Montady_6.jpg","../../jctruffet.com/image/image_34/34_Montady_7.jpg","../../jctruffet.com/image/image_34/34_Montady_8.jpg"]},"Consult_chateau_formulaired326":{"id":"Consult_chateau_formulaired326","dept":"34","canton":"Aniane","commune":"Montarnaud","nom":"Montarnaud","type":"Château","periode":"XVII","histoire":"MONTARNAUD, le château est l'un des plus anciens châteaux du Bas Languedoc, mentionné dès le XIe siècle et en 1111 comme propriété des Guillaume, seigneurs de Montpellier. Il a connu une histoire mouvementée depuis sa première construction  au XIe siècle. Tout dabord propriété des seigneurs de Montpellier, il fut reconstruit  au XIVe siècle, assiégé et en partie détruit pendant les guerres de religion, démantelé par Richelieu  avant dêtre reconstruit au XVIIe siècle. Il est à ce moment là la propriété de la famille Turennes dAynac. Les propriétaires successifs Pierre Carbonnel 1326, Arnaud de Roquefeuil 1346, Jean de Montlaur 1410, Jean de Brignac 1521, Amédée de Turenne d'Aynac 1719. La marquise May de Nicolay au XXe siècle et aujourd'hui, Mme Eliane Donn-Byrne avec sa fille Brenda de Nicolay Donn-Byrne, descendants des Turenne, Le château fait aujourdhui parti du domaine des Corrèges, un domaine viticole. Il nest  pas visitable, même si ses abords et la chapelle castrale sont accessibles.","architecture":"Montarnaud est riche en histoire. Son château, lun des plus anciens de la région, a connu bien des événements depuis sa construction au XIe siècle. Tout dabord propriété des seigneurs de Montpellier, il fut reconstruit au XIVe siècle, assiégé et en partie détruit pendant les guerres de religion, puis démantelé par Richelieu avant dêtre reconstruit au XVIIe siècle,  il a conservé son visage ancien et la plupart des fortifications. Le château enceinte de fortifications affecte la forme d'un pentagone irrégulier, murailles en quadrilatère, quatre tours d'angle  en calcaire doré.","habitants":"Famille Turennes dAynac\r\n        \"","divers":"Château de Montarnaud","gps":"","images":["../../jctruffet.com/image/image_34/34_Montarnaud_1.jpg","../../jctruffet.com/image/image_34/34_Montarnaud_2.jpg","../../jctruffet.com/image/image_34/34_Montarnaud_3.jpg","../../jctruffet.com/image/image_34/34_Montarnaud_4.jpg","../../jctruffet.com/image/image_34/34_Montarnaud_5.jpg"]},"Consult_chateau_formulaire37f4":{"id":"Consult_chateau_formulaire37f4","dept":"34","canton":"Méze","commune":"Montbazin","nom":"Montbazin","type":"Fort","periode":"XII-XIV","histoire":"MONTBAZIN château seigneurial, du Xlle siècle, dit château de Lavergnes appartenait en 1344 au marquisat de Marquerose attribué aux évêques de Maguelone. Les de Lavergne abandonnent une position géographique dominante pour s'installer au-delà des habitations, dans un espace totalement dégagé.\r\nLe château a été acheté par la mairie en 1897 pour être utilisé comme école pour filles, les garçons se trouvant dans l'actuelle mairie.","architecture":"Montbazin, la construction fait partie intégrante du château et de son système défensif, la situation sur le promontoire du territoire de la commune fait ressortir une façade imposante par rapport aux volumes intérieurs de la nef et du coeur.  Les colonnades du château du seigneur de Lavergne était une ancienne école de fille, actuel bureau de poste, le château des colonnades va donc être construit dans cette période par les de Lavergne.  En 1990, les colonnes dégradées qui risquaient de s'effondrer ont été restaurées. Une partie des pierres, celles en bon état, ont été nettoyées et réutilisées, c'est ainsi qu'apparaissent les colonnades telles que nous les connaissons. La magnifique colonnade a été construite ultérieurement, elle ouvrait sur un vaste parc qui descendait jusqu'à la rivière. Il ne reste aujourd'hui que l'une des premières terrasses.\r\nEnfin, la porte à bretèche de la seconde enceinte fortifiée, construite au XIVe siècle pour protéger le faubourg.","habitants":"Famille de  de Marquerose\r\n        \"","divers":"Château de Montbazin","gps":"","images":["../../jctruffet.com/image/image_34/34_Montbazin_1.jpg","../../jctruffet.com/image/image_34/34_Montbazin_2.jpg","../../jctruffet.com/image/image_34/34_Montbazin_3.jpg","../../jctruffet.com/image/image_34/34_Montbazin_4.jpg","../../jctruffet.com/image/image_34/34_Montbazin_5.jpg","../../jctruffet.com/image/image_34/34_Montbazin_6.jpg","../../jctruffet.com/image/image_34/34_Montbazin_7.jpg"]},"Consult_chateau_formulaire591e":{"id":"Consult_chateau_formulaire591e","dept":"34","canton":"Pézenas","commune":"Montblanc","nom":"Montblanc","type":"Château","periode":"XV-XVIII","histoire":"A Montblanc le château de Coussergues, au environ le château de Saint-Pierre du XIXe siècle et de Nadalhan.                      COUSSERGUES-MONTBLANC,  villa romaine le long de la voie Dominitienne, ancienne seigneurie royale, est la propriété de la famille de Sarret de Coussergues depuis 15 générations  viticole. En 1495, Charles VIII, roi de France, cède la seigneurie de Coussergues à Pierre Raymond de Sarret, pour services rendus durant la guerre d'Italie. La première mention des consuls à Montblanc date de 1550. Le 14 octobre 1663, le conseil général des habitants autorise les consuls qui étaient, cette année là, Sébastien Gasc et Guillaume Dijous, à construire une maison de ville ou maison consulaire et un local de boucherie à l'emplacement où se trouvaient les pressoirs vinaires c'est à dire « à l'avant du mur du château-vieux ». A Montblanc s'y arrêtèrent en 1533, François Ier et la reine Eléonore de Habsbourg, sur de Charles Quint. Aujourd'hui, il est propriété privée.                                  NADALHAN  viticole et chambres d'hôtes de monsieur et madame Boyé.                                                                                                        Saint-PIERRE de style néo-renaissance  a été construit en 1887 par Charles de Grasset et a été légué à lassociation des Paralysés de France en 1962, centre d'accueil médicalisé pour adultes handicapés (FAM)","architecture":"A Montblanc, le château féodal  au Moyen-Age, le centre du village et le lieu le plus élevé. Sur les trois autres côtés du château s'élevaient des murailles et, à chaque angle, une tour assurait le complément indispensable pour une défense efficace. C'est une de ces deux tours que l'on peut admirer encore aujourd'hui et qui est le seul vestige de ce château féodal. Cette tour qui domine toujours le village a conservé l'architecture militaire classique avec ses deux mâchicoulis voûtés en plein cintre selon l'art lombard du haut Moyen-Age. Ce château a donné son nom au quartier du « château vieux », le plus ancien de Montblanc. En effet, un autre château dit de Coussergues de style Renaissance fut construit au XVe siècle de l'autre côté de l'église dans un jardin attenant à la maison claustrale, adossé au presbytère et joint à lui par un passage voûté laissait libre un passage pour accéder à l'église. En forme de U à trois niveaux, côté parc façade avec fronton triangulaire. Ce château aujourd'hui restauré, propriété privée.                              Nadalhan corps de logis rectangulaire   à deux niveaux, terrasse au premier et au deuxième étages.                                                           Saint-Pierre  de style renaissance corps de logis  rectangulaire à deux niveaux et attiques flanquées de deux tours carrées sur les angles  à toits pointus","habitants":"Famille de  Pierre Raymond de Sarre\r\n        \"","divers":"Montblanc le château de Coussergues, au environ le château de Saint-Pierre et de Nadalhan.","gps":"","images":["../../jctruffet.com/image/image_34/34_Montblanc_1.jpg","../../jctruffet.com/image/image_34/34_Montblanc_2.jpg","../../jctruffet.com/image/image_34/34_Montblanc_3.jpg","../../jctruffet.com/image/image_34/34_Montblanc_4.jpg","../../jctruffet.com/image/image_34/34_Montblanc_5.jpg","../../jctruffet.com/image/image_34/34_Montblanc_6.jpg","../../jctruffet.com/image/image_34/34_Montblanc_7.jpg","../../jctruffet.com/image/image_34/34_Montblanc_8.jpg"]},"Consult_chateau_formulaire66d6":{"id":"Consult_chateau_formulaire66d6","dept":"34","canton":"St-Gély le Fesc","commune":"St-Mathieu de Tréviers","nom":"Montferrand(34)","type":"Vestiges","periode":"XII","histoire":"MONTFERRAND, en 1103,  le comte de Toulouse fait valoir ses droits sur le château de Montferrand et sur une partie du comté de Melgueil,  il est fait mention dès 1132 de son appartenance aux comtes de Melgueil.  En  1215  confisqué au comte de Toulouse Raymond VI durant la croisade des Albigeois (avec également le château de Mornas), il est confié par le Pape à l'évêque de Maguelone qui devient également comte de Melgueil et de Montferrand. Il s'agit d'un alleu pontifical, ne relevant d'aucun seigneur et donc exempté de toute redevance.  En 1245  le commandement est confié par l'évêque à un châtelain capitaine. Début du XIIe siècle : le comté de Melgueil est partagé en 2 districts : celui de Melgueil (devenu Mauguio et dont le château féodal a totalement disparu) et celui de Montferrand. En1536 : le diocèse de Maguelone est transféré à Montpellier. En 1568 : mort du diplomate Guillaume Pellissier au château de Montferrand. En 1574 : les protestants s'emparent du château dans le cadre des guerres de religion. En 1584 : Antoine de Cambous reprend le château qui redevient catholique. Le site lui est confié pour \"services rendus\". Il s'inspire de la Renaissance pour le faire modifier. Sa fille va s'y marier avec Jean de Ratte. En 1611 : l'évêque Pierre de Fenouillet renforce la défense  En 1623 : après avoir conquis Montpellier pour le compte des catholiques, le capitaine Jacques Valat est nommé par l'évêque Pierre de Fenouillet châtelain à vie du château de Montferrand. En1659 : mort de Jacques Valat et début de la décadence du château.","architecture":"Le château de Montferrand est construit sur un éperon calcaire de larête est du pic Saint-Loup et domine le village de Saint-Mathieu-de-Tréviers. Il domine une garrigue à chêne vert et nest accessible quà pied., les ruines du château de Montferrand défient le temps et nous racontent son lourd passé figé dans la pierre. Cet habitat n'a jamais été un habitat seigneurial, mais un dispositif de défense pour contrôler le nord du comté de Melgueil. Il était occupé par un capitaine, un bayle (économe), des officiers et des soldats. Il est probable que les effectifs soient montés à 200 personnes au XVIIe siècle. Les ruines occupent un rectangle denviron 100m sur 60m : les vestiges, dont certains sont à létat de lambeaux sont composés des deux enceintes, des communs, des logis, de caves voûtées et de la base du donjon.\r\nEn 1611  renforcement la défense du château pour résister à l'artillerie : un fossé est taillé dans la roche à coup de barre à mine et la 1ère enceinte est ajoutée. Les protestants du duc de Rohan assiégeront le château sans succès : ils lèveront le siège après avoir été bombardés par l'artillerie ! au XVIIe siècle : Louis XIV autorise l'évêque Colbert de Croissy à faire détruire les bâtiments : les pierres sont offertes en dédommagement à ceux qui acceptent de procéder à sa démolition, mais les difficultés de transport limiteront les destructions.","habitants":"Comte de Melgueil\r\n        \"","divers":"Vestiges du château-fort de Montferrant à Saint-Mathieu de Tréviers","gps":"","images":["../../jctruffet.com/image/image_34/34_Montferrand(34)_1.jpg","../../jctruffet.com/image/image_34/34_Montferrand(34)_2.jpg","../../jctruffet.com/image/image_34/34_Montferrand(34)_3.jpg","../../jctruffet.com/image/image_34/34_Montferrand(34)_4.jpg","../../jctruffet.com/image/image_34/34_Montferrand(34)_5.jpg","../../jctruffet.com/image/image_34/34_Montferrand(34)_6.jpg","../../jctruffet.com/image/image_34/34_Montferrand(34)_7.jpg","../../jctruffet.com/image/image_34/34_Montferrand(34)_8.jpg"]},"Consult_chateau_formulaire2ff0":{"id":"Consult_chateau_formulaire2ff0","dept":"34","canton":"Montpellier","commune":"Montferrier-sur-Lez","nom":"Montferrier","type":"Château","periode":"XVII-XVIII","histoire":"MONTFERRIER, cité au XIIe siècle de la famille  de ce nom, les premiers seigneurs de Montferrier; en 1386 passe par héritage à Catherine de Montferrier épouse de Guillaume du Caylar,  veuf convole avec Louise de Saint-Bonnet -Toiras, en 1612 une partie  dans les mains des Toiras l'autre partie propriété de la famille de Hauteville, au XVIIe  siècle le château est racheté en totalité par le marquis Antoine Duvidal, est reconstruit sur les bases de l'ancienne forteresse, dans le goût du marquis, premier consul de Montpellier, titulaire de la seigneurie de Montferrier. sa descendance obtiendra en 1762 l'élévation au titre de marquisat.\r\nAprès la Révolution le château vendu à l'an  VII  par Jean-Jacques -Philippe Duvival  de Montferrier, le château changera six fois de propriétaires entre 1809 à 1842 et appartient durant deux ans au statuaire David d'Angers conservés jusqu'en 1840  et en 1848 acquit par la commune pour y installer l'hôtel de ville. Les jardins divisés en lot vendu à une cinquantaine de particulier. En 1850, ce quil restait du château a été rendu à la commune et depuis un siècle une partie du bâtiment est reconstituée pierres par pierres.\r\n La mairie en occupe une aile, ses caves et cuisines ont été réhabilitées pour accueillir des expositions. Ses terrasses doù la vue est imprenable, sont dagréables lieux de promenade et la scène de manifestations culturelles.","architecture":"Montferrier domine ses alentours. ce château qui à souffert pendant les guerres de Religion victimes en 1622 de nouvelles guerres entre le pouvoir royal et les protestants sera démantelé sur ordre de Richelieu avant d'être reconstruit dans les dernières années de Louis XIII.  reconstruit au XIIIe siècle  dans un style néoclassique de plan complexe, magnifique résidence dominant  des jardins en terrasses, à conservés les escalier à vis une cour d'honneur ovale sur laquelle donne la façade du corps de logis, des travées  dans lesquelles s'encadrent des baies rectangulaires entourées de colonnes doriques,  le vieux village ainsi que le reste des fortifications sont construits de pierres basaltiques qui expliquent sa couleur gris fer. Le château dominait la pente de la colline sur laquelle sétendaient trois étages de larges terrasses en gradins, aménagées de jardins à la française, jusquà un vaste parc traversant le Lez. Il fut pillé à la Révolution et en partie détruit. Avant la Révolution, le bourg et la commune de Montferrier avec son château étaient un marquisat érigé par lettres patentes royales.","habitants":"Famillle de d'Hauteville\r\n        \"","divers":"Château de Montferrier","gps":"","images":["../../jctruffet.com/image/image_34/34_Montferrier_1.jpg","../../jctruffet.com/image/image_34/34_Montferrier_2.jpg","../../jctruffet.com/image/image_34/34_Montferrier_3.jpg","../../jctruffet.com/image/image_34/34_Montferrier_4.jpg","../../jctruffet.com/image/image_34/34_Montferrier_5.jpg","../../jctruffet.com/image/image_34/34_Montferrier_6.jpg"]},"Consult_chateau_formulaire07d8":{"id":"Consult_chateau_formulaire07d8","dept":"34","canton":"Le Crés","commune":"Montaud","nom":"Montlaur","type":"Vestiges","periode":"XI","histoire":"MONTLAUR, il appartenait déjà aux seigneurs de ce nom dans lannée 1095, Pons et Bernard de Montlaur se croisèrent avec Raymond comte de Toulouse pour délivrer les lieux saint en conséquence du concile de Clermont. Il fut transmis de père en fils depuis lors jusquà Hector de Montlaur commandant pour le roi en 1424 la garde de Montpellier, dont le fils Antoine sans héritier, transmit tous ses biens à son cousin Jean III de Montlaur Baron de Murles. En 1592, le château et la baronnie appartenaient à Marthe de Montlaur. Elle les cède à son proche parent Jean de Bousquet-Verlhac, de cette maison du Quescy ayant donné un cardinal au XIIIe siècle, qui venait dépouser en 1590 une petite fille de Jean V de Montlaur. Pour sa descendance le fief sera érigé en marquisat en vertu de lettres patentes données par Louis XIV à Saint-Germain-en-Laye le 25 décembre 1679, enregistré en 1680. En 1748, Jacques-Josèphe-Toussaint-Hercule IIe marquis de Montlaur meurt sans enfant laissant son héritage à sa petite nièce, fille de Étienne de Montlaur et de Marie de Faur, mariée en 1740 à Henri-Josephe-Engène de Villardi, comte de Quinson, de cette maison originaire du Milanais, positionné en Provence avant 1350 qui rend hommage cette même année 1748, comme IIIe marquis de Montlaur. Son fils Gabriel-Josèphe-Raymond, baron des états de Languedoc en 1784 fera substitué son nom et armes à celles de Montlaur et Louis XVI ré-érigera pour lui en marquisat par lettres patentes données à Versailles en 1782, enregistrées en 1787. Depuis cette époque le château appartient à la même famille.","architecture":"Montlaur  occupe une position stratégique entre Nîmes et Montpellier   qui le mette au cur des guerres de religion Les enceintes  et les bâtiments annexes  couvrent une surface de deux ha. Le château, flanqué dune chapelle  castrale, et deux tours  ont traversé les époques sans trop de dommage. Construit au XIe siècle  et agrandi au  XIVe siècle,  limposant bâtiment principal, élevé sur trois étages, est protégé  par deux enceintes fortifiées qui  témoignent de la puissance des seigneurs de Montlaur au Moyen-Age. Ce nest quau XVIe quun corps de logis Renaissance  est dressé en façade sud afin de transformer le château fort en résidence seigneuriale. Les ruines des bâtiments composant la basse-cour sont encore visibles.","habitants":"Marquis de Montlaur \r\n        \"","divers":"Vestiges du château de Montlaur à Montaud","gps":"","images":["../../jctruffet.com/image/image_34/34_Montlaur_1.jpg","../../jctruffet.com/image/image_34/34_Montlaur_2.jpg","../../jctruffet.com/image/image_34/34_Montlaur_3.jpg","../../jctruffet.com/image/image_34/34_Montlaur_4.jpg","../../jctruffet.com/image/image_34/34_Montlaur_5.jpg","../../jctruffet.com/image/image_34/34_Montlaur_6.jpg","../../jctruffet.com/image/image_34/34_Montlaur_7.jpg","../../jctruffet.com/image/image_34/34_Montlaur_8.jpg","../../jctruffet.com/image/image_34/34_Montlaur_9.jpg"]},"Consult_chateau_formulaire17a3":{"id":"Consult_chateau_formulaire17a3","dept":"34","canton":"Lodève","commune":"Montoulieu","nom":"Montoulieu","type":"Vestiges","periode":"XII","histoire":"A Montoulieu, vestiges du castellas et manoir de Pradines du XIXe siècle transformé en gîtes de France par la famille Lapousterle.              MONTOULIEU, sest particulièrement illustrée dans les métiers darmes, rendant en cela hommage à son appartenance à la noblesse de robe et à son ancienneté. Sur les 5 fils de Pierre de Montoulieu, 3 firent des carrières militaires. Théophile qui releva la seigneurie de Montoulieu et qui fut seigneur de Saint Hippolyte de Caton, de Saint-Jean de Ceirargues, de Teillan devint capitaine au régiment de Normandie, chevalier de Saint-Louis. A partir du début du XVIIe siècle, lhistoire du château ne peut plus être dissociée de celle de lavancée du protestantisme dans les Cévennes et le Bas Languedoc. A partir de 1624, la région de Saint-Hippolyte sombre dans les Guerres de Religion et le château de Montoulieu offre une position avantageuse. Il permet de surveiller la route de la Cadière. En 1626, les religionnaires sétaient en effet défendus depuis ce château et avaient harcelé les troupes royales, certainement avec la bienveillance des propriétaires. La même année, sur les ordres du Cardinal de Richelieu qui souhaite mettre au pas la noblesse provinciale trop virulente, le château subit un démantèlement. Les Tourelles sont abattues.  Pierre de Montoulieu, seigneur de Saint-Hippolyte de Caton, défenseur de la RPR avait accueilli en son château, quil semblait ne plus habiter*, des camisards en déroute. Montrevel, commandant des troupes royales en Languedoc, agacé par le soutient de la famille de Montoulieu aux camisards ordonna larrestation de ce puissant seigneur. Il laccusa davoir reçu dans son château des camisards en déroute le 24 décembre 1703. Le château fut brûlé sous les yeux de son propriétaire et cet épisode marqua la fin de loccupation de cette bâtisse.","architecture":"château de Montoulieu sous la forme de ruines massives envahies par les taillis. Ce texte énumère les quelques éléments encore visibles du château à cette époque : Une tour, dassez belle taille ouvrant à lOuest, Une autre tour située à lextrémité Est du site quelques pièces écroulées, une muraille imposante en surplomb de la route de la Cadière, une rampe daccès au château amenant à une porte derrière laquelle se tenait un petit édifice assez bien conservé, une chapelle avec sa maison curiale attenante. Les seules descriptions fiables du château dont nous disposons émanent de sources militaires. Lordonnance de Richelieu en 1624 avait entraîné, comme on a pu le dire précédemment, la destruction de deux tourelles.                                                                                  Le manoir de Pradines constitué d'un ensemble d'habitation,  un donjon accolé à un bâtiment rectangulaire à deux niveaux toiture en croupe,.","habitants":"Famille de Pierre de Montoulieu\r\n        \"","divers":"Vestiges du Castellas à Montoulieu et le manoir de Pradines","gps":"","images":["../../jctruffet.com/image/image_34/34_Montoulieu_1.jpg","../../jctruffet.com/image/image_34/34_Montoulieu_2.jpg","../../jctruffet.com/image/image_34/34_Montoulieu_3.jpg","../../jctruffet.com/image/image_34/34_Montoulieu_4.jpg","../../jctruffet.com/image/image_34/34_Montoulieu_5.jpg","../../jctruffet.com/image/image_34/34_Montoulieu_6.jpg"]},"Consult_chateau_formulaire53f0":{"id":"Consult_chateau_formulaire53f0","dept":"34","canton":"Montpellier","commune":"Montpellier","nom":"Montpellier","type":"Château","periode":"XIII-XVIII","histoire":"Plusieurs châteaux à Montpellier,   voir  article pour le château de Bionne, de Bon,  d'Alco de Flaugergues , de Grammont, de d'O et de la Piscine, de la Mogère et de Bonnier de la Mosson , le château de Levat, de Haguenot-Azais et le musée Fabre.                        LEVAT, association syndicale libre est en activité depuis 24 ans.\r\nHAGUENOT-AZAIS,  au XIIIe siècle, l'endroit où s'élève aujourd'hui l'hôtel Haguenot appartient à Étienne Arnaud, frère de l'inquisiteur Guillaume Arnaud, personnage redouté et haï qui sera assassiné en 1242 sur ordre et dans la chambre même de Raymond VII.  En 1709, la descendante des métayers, une dame Burgues, est considérée comme la seule propriétaire par acte notarié. Elle vend le terrain cinquante ans plus tard à l'abbé Devèze, ancien prieur de Castelnau, qui le cède à son tour à Géraud de Lagarde, chanoine de la cathédrale Saint-Pierre. Le dernier propriétaire est Henri Haguenot, qui donne son nom à la villa, ou hôtel, que nous connaissons aujourd'hui. Hygiéniste et anatomiste, Henri Haguenot (1687-1775) est un scientifique brillant du XVIIIe siècle. Ce professeur et doyen de l'université de Montpellier cumule ses fonctions avec celle de magistrat à la Cour des aides de Montpellier. Après le décès de Haguenot en 1775, la maison parvient par héritage à son neveu, Jean Belot, qui la revend aussitôt. Elle connaît d'autres propriétaires avant d'être acquise en 1979 par la famille de Frédéric de Parseval qui l'occupe encore aujourd'hui.","architecture":"Rieucoulon, qui appartient à la famille Lacombe depuis plusieurs générations. Ce domaine est vinicole et comprend vingt hectares d'un seul tenant sur les communes de Montpellier et Saint-Jean de Védas. Il a sa propre cave.\r\nLevat, le bâtiment s'élève sur de larges terrasses auxquelles on accède par quatre marches. Il comprend un étage sur rez-de-jardin sous toit de tuiles creuses à faible pente. Dans sa longueur, il développe à chaque étage une enfilade de huit ouvertures, les trois situées au milieu du niveau inférieur étant des portes-fenêtres en plein cintre. La totalité de ce niveau présente un appareillage à refends, caractéristique du vocabulaire néoclassique.             Haguenots, l'ensemble de style Louis XV constitué par les façades et toitures de l'hôtel, le jardin, y compris le portail d'entrée et la fontaine monumentale, fait lobjet dun classement au titre des monuments historiques depuis le 8 février 1963. L'ensemble constitué par les façades et toitures de l'orangerie et des communs, ainsi que la fontaine adossée au Nord-Ouest, fait lobjet dun classement au titre des monuments historiques Le musée Fabre est le principal musée d'art de Montpellier. Il est créé à la suite d'une proposition en 1824 du baron François-Xavier Fabre (1766-1837), peintre et collectionneur, de faire don à la ville de ses collections, à condition quelles soient à l'origine dun musée.  Après trois ans de travaux financés par la municipalité, le musée ouvre ses portes le 3 décembre 1828. Le Musée Fabre est l'un des plus importants musées de province en France. Il a le statut de musée de France.","habitants":"Famille de Guillaume Arnaud\r\n        \"","divers":"Montpellier,  château de Bionne, de Bon,  d'Alco de Flaugergues , de Grammont, de d'O et de la Piscine, de la Mogère et de Bonnier de la Mosson , le château de Levat, de Haguenot-Azais et le musée Fabre.","gps":"","images":["../../jctruffet.com/image/image_34/34_Montpellier_1.jpg","../../jctruffet.com/image/image_34/34_Montpellier_2.jpg","../../jctruffet.com/image/image_34/34_Montpellier_3.jpg","../../jctruffet.com/image/image_34/34_Montpellier_4.jpg","../../jctruffet.com/image/image_34/34_Montpellier_5.jpg","../../jctruffet.com/image/image_34/34_Montpellier_6.jpg","../../jctruffet.com/image/image_34/34_Montpellier_7.jpg","../../jctruffet.com/image/image_34/34_Montpellier_8.jpg","../../jctruffet.com/image/image_34/34_Montpellier_9.jpg"]},"Consult_chateau_formulaire0e03":{"id":"Consult_chateau_formulaire0e03","dept":"34","canton":"Gignac","commune":"Montpeyroux","nom":"Montpeyroux(34)","type":"Vestiges","periode":"XII","histoire":"MONTPEYROUX, Castellas dit du Barry du XIe siècle à Montpeyroux,  fondé en 1070 par un descendant de Saint-Guilhem, Bernard, le castellas assurait la protection de Montpeyroux, village stratégique, carrefour des chemins dAuvergne, du Rouergue, du chemin de St-Jacques et des transhumances. Les comtes de Montpeyroux qui sy succédèrent assuraient la sécurité des ces routes importantes tout en noubliant pas de faire payer un droit de passage. Au XVe siècle, les seigneurs abandonnèrent le castellas au profit d'un bâtiment plus confortable en contrebas, dans le quartier du Barry. Les populations continuèrent à s'y abriter à l'occasion, tout en noubliant pas de faire payer un droit de passage. Construction probable à la fin du XVe siècle pour Augier de Roquefeuil, pour  remplacer  le château médiéval du Castellas de Montpeyroux. Détruit en 1791 à l'exception d'une tour d'angle et les communs.","architecture":"Le Castellas, avant dentrer dans le Castel Viel, faites le tour des hautes murailles crénelées, flanquées de quelques tours rectangulaires, pour en admirer la robustesse, le mur denceinte qui épouse les courbes naturelles du terrain, sur plusieurs centaines de mètres, est dune grande qualité architecturale. Cependant, il nabrite quun vaste enclos de garrigue et quelques ruines  cette imposante forteresse médiévale, qui domine la vallée de lHérault, fut  détruite par les anglais en 1384, durant la guerre de Cent Ans, puis à la fin du XVe siècle il fût abandonné au détriment dun château plus confortable dans le Barry. Les ruines présentent dans lenceinte à lheure actuelle proviennent dun établissement religieux (incluant la chapelle Notre-Dame-de-la-Salette) construit en 1863 et qui a malheureusement effacé les traces des bâtiments plus anciens. Le Castellas est un bâtiment protégé depuis 1943.","habitants":"famille d' Augier de Roquefeuil\r\n        \"","divers":"Vestiges du castellas de Montpeyroux","gps":"","images":["../../jctruffet.com/image/image_34/34_Montpeyroux(34)_1.jpg","../../jctruffet.com/image/image_34/34_Montpeyroux(34)_2.jpg","../../jctruffet.com/image/image_34/34_Montpeyroux(34)_3.jpg","../../jctruffet.com/image/image_34/34_Montpeyroux(34)_4.jpg","../../jctruffet.com/image/image_34/34_Montpeyroux(34)_5.jpg","../../jctruffet.com/image/image_34/34_Montpeyroux(34)_6.jpg","../../jctruffet.com/image/image_34/34_Montpeyroux(34)_7.jpg","../../jctruffet.com/image/image_34/34_Montpeyroux(34)_8.jpg"]},"Consult_chateau_formulaire0525":{"id":"Consult_chateau_formulaire0525","dept":"34","canton":"Pézenas","commune":"Pézenas","nom":"Montpezat_Pézenas","type":"Château","periode":"XIX","histoire":"MONTPEZAT,  Les pères cédaient sept ans plus tard Montpezat à Félix de Juvenel, commissaire du roi et secrétaire du duc d'Angoulême dont la famille s'était fixée à Pézenas à la suite des Montmorency. François le Carrion, seigneur de Nizas, possédait ce château de la rive gauche de la Peyne qu'il vendit en 1646 aux pères de l'Oratoire du collège de Pézenas. Les Juvenel,  ont bénéficiés de leur alliance avec les Reboul dont la gloire Henri Reboul (1763-1839) attend une solide biographie. Distingué tout jeune comme bon géologue et chimiste, lié à Lavoisier, il s'établit en Bourgogne d'où il revint à Pézenas en 1803, à la mort de son père. Membre correspondant de l'Institut, il fut l'auteur de la motion ayant créé le Muséum National au Louvre et l'un des quatre chargés d'organiser les collections. Dans la présentation générale, nous l'avons vu recevoir, à Peyrat, M. le Jouy qu'on avait averti de ses expériences agricoles. Membre aux premières heures à la société archéologique de Béziers, son éloge révèle que ce savant chimiste s'improvisa industriel et mourut ruiné, en 1839, ayant fait des cessions en famille. Peyrat passa à ses petites-nièces: Félicité, Louise devenue Mme Lépine et Marie épouse en 1840  son voisin Henri de Juvenel. Mais ce dernier ménage résida à Montpezat où Henri décéda en 1875 et Marie en 1902, laissant à leurs fils, Pierre et Xavier, Peyrat qui résista à la modernisation mais non à la crise car il fut vendu en 1907 à M. Fajon, puis en 1910 à Gustave Fayet, si souvent évoqué, qui l'a réuni au domaine contigu de Saint-Palais (acquis des Juvenel en 1917-1918). Ses petites-filles, Mme Viennet et Mlle Bacou, ont redonné vie aux bâtiments et jardins de Peyrat, bénéficiaires d'une nouvelle ère de prospérité et d'élégance. En 1923, Montpezat et Saint-Palais devinrent la propriété de M. Louis Guy et, après sa mort, en 1970, Montpezat est attribué à sa fille, Mme Blanc, et Saint-Palais, à son fis, M. Gérard Guy.","architecture":"Montpezat, ancienne seigneurie des Juvenel, fût voué par eux à la viticulture et doté, vers 1884, de l'actuel château à l'architecture assez froide, un fronton armorié rappelant le souvenir de leur longue possession. Corps de logis rectangulaire à deux niveaux toitures en croupe, fronton sculptée sur fenêtre de la  façade   accolé d'une tourelle sur angle  gauche,  domaine viticole familial de 38 ha conduit en agriculture biologique.","habitants":"Famille de Félix de Juvenel\r\n        \r\n        \"","divers":"Château de Montpezat à Pézenas","gps":"","images":["../../jctruffet.com/image/image_34/34_Montpezat_Pezenas_1.jpg","../../jctruffet.com/image/image_34/34_Montpezat_Pezenas_2.jpg","../../jctruffet.com/image/image_34/34_Montpezat_Pezenas_3.jpg","../../jctruffet.com/image/image_34/34_Montpezat_Pezenas_4.jpg","../../jctruffet.com/image/image_34/34_Montpezat_Pezenas_5.jpg"]},"Consult_chateau_formulaire5087":{"id":"Consult_chateau_formulaire5087","dept":"34","canton":"Clermont-L","commune":"Mourèze","nom":"Mourèze","type":"Vestiges","periode":"Xe","histoire":"MOUREZE, lhomme du néolithique trouvait dans ce lieu de quoi sabriter et de quoi se nourrir. On ignore lorigine du village actuel mais cest autour de lun des plus imposants piliers dolomitiques quil sest peu à peu structuré. Depuis le Xe siècle, au moins, la vie locale sest organisée autour de cette forteresse ancienne. Le Roc Castel permettait non seulement de contrôler les marges méridionales de la cité de Lodève frontalière avec celle de Béziers, mais aussi un vieil itinéraire mettant en contact le bassin moyen de lHérault avec les monts dOrb. Cette vieille place forte agrandie et remodelée tout au long du Moyen-Age passa dans la sphère dinfluence des seigneurs de Clermont-lHérault et fut abandonnée au seuil de lépoque moderne.","architecture":"Mourèze, vestiges du  site ancien, avec son village accroché au pied du roc de son château,sinsère dans lun des paysages ruiniformes les plus anciennement signalés en France avec le chaos dolomitique de Montpellier-le-Vieux dans lAveyron. Le nom de Mourèze serait dorigine pré-indo-européen « murr » signifiant « museau ». En occitan, le « mourre » veut également dire le museau. Dans le cas de Mourèze, cela signifie le\r\n« promontoire » en raison de ses rochers spectaculaires.","habitants":"Seigneurs de Clermont\r\n        \r\n        \"","divers":"Vestiges du château de Mourèze","gps":"","images":["../../jctruffet.com/image/image_34/34_Moureze_1.jpg","../../jctruffet.com/image/image_34/34_Moureze_2.jpg","../../jctruffet.com/image/image_34/34_Moureze_3.jpg","../../jctruffet.com/image/image_34/34_Moureze_4.jpg","../../jctruffet.com/image/image_34/34_Moureze_5.jpg"]},"Consult_chateau_formulaire4948":{"id":"Consult_chateau_formulaire4948","dept":"34","canton":"Les Matelles","commune":"Murles","nom":"Murles","type":"Vestiges","periode":"XIII","histoire":"Deux châteaux à Murles celui de Murles (vestiges du XIIIe siècle) et le château de Caravettes du XIIIe siècle.                       MURLES, en 1121, Bernard IV, comte de Melgueil  donne à sa future femme Guillemette « le château de Murles avec tout son territoire et tout ce que jai dans la paroisse de St-Jean de Murles » Cette seigneurie modeste va générer de nombreux hommes remarquables (Pierre de Murles, Consul de Montpellier en 1243, Jean de Montlaur, présent aux Etats Généraux du Languedoc en 1435 et 1440, François de Montlaur, gouverneur et sénéchal de Montpellier en 1614, Charles Joseph Marie Montlaur, Comte de Murles, Maréchal des Camps et armées du Roy, Chevalier des Ordres royaux et militaire de St Louis et de la Légion dhonneur en 1810) LHotel Cambacéres-Murles, place de la Canourgue à Montpellier, a été construit par larchitecte Jean Giral pour Dominique Cambacéres, devenu Montlaur de Murles par mariage au début du XVIIIe siècle. Nationalisé à la Révolution avec les autres biens de la famille de Murles,  le château fut finalement récupéré en 1819 par le comte de Murles, après quelques démêlées, puis vendu à Pierre Gounel, fermier des Montlaur, en 1824. Il est resté, jusquà nos jours, propriété de cette famille.\r\nCARAVETES La baronnie de Caravettes était un fief noble dépendant des Comtes de Melgueil. En 1215, Raimond de Caravettes disposait dun domaine sétalant sur Murles. Après la croisade des Albigeois, le pape Innocent III reprend en 1215 le Comté de Melgueil et linféode à lévêque de Maguelonne, Guillaume dAutignac. la famille de Caravettes délaisse peu à peu le domaine et en 1273, Bernard de Caravettes, petit fils de Raimond, vend sa seigneurie aux consuls de Montpellier, la baronnie de Caravettes et le bois de Valène sont vendues à la ville (avant dêtre finalement vendus en 1792 à la famille de Barbeyrac qui sen sépare en 1876 au profit de Pierre Fargues, dans cette famille depuis. Aujourd'hui Mathilde Lartigue baronne de Caravètes.","architecture":"Château de Murles vestiges du XIIe siècle, son rôle politique était important sur toute la région de Montpellier, car les seigneurs de Murles étaient assez influents. Nationalisé après la Révolution, il est racheté par des propriétaires agricoles qui vont peu à peu utiliser les vieilles pierres pour leurs propres demeures et hangars agricoles. Très délabré, les dernières voûtes du château seront détruites par certains jeunes habitants du village au début du XXe siècle, qui y cherchent un trésor. Laccès aux ruines est difficiles et se fait par le nord. Les vieux pans de murs qui restent sont très instables. Déjà fortement dégradé au moment de la vente, il va être à la fin du XIXe siècle et au début du XXe siècle lobjet de prélèvement systématique de matériaux afin de construire divers bâtiments agricole (bergerie, caves) Il ne reste aujourdhui que des ruine.","habitants":"Dominique Cambacéres\r\n        \"","divers":"Vestiges du château de Murles et le château de Caravettes","gps":"","images":["../../jctruffet.com/image/image_34/34_Murles_1.jpg","../../jctruffet.com/image/image_34/34_Murles_2.jpg","../../jctruffet.com/image/image_34/34_Murles_3.jpg"]},"Consult_chateau_formulaire9e0f":{"id":"Consult_chateau_formulaire9e0f","dept":"34","canton":"Cazouls les Béziers","commune":"Murviel les Béziers","nom":"Murviel_Béziers","type":"Château","periode":"XVI-XIX","histoire":"MURVIEL lès Béziers, dès lantiquité les romains avaient construit un castrum à lemplacement du château actuel. Installation qui témoigne de limportance, en terme demplacement stratégique, quavait Murviel-lès-Béziers sur la route de Béziers à Cahors. Le village médiéval, quon retrouve en partie aujourdhui,  possède trois propriétaires dont la mairie  et la famille Martin, sarticule autour de lensemble château seigneurial que possède la famille Martin depuis 1906 et à la Mairie et avant cela en 1778 un de ces ancêtres était intendant de la marquise de Spinola et du marquis  François Henry de Carion en avait fait l'acquisition, une descendante qui habitait dans la région bordelaise,  Véronique Martin s'installa à Murviel les Beziers en 2011 et décide de le restaurer. Aujourd'hui hôtel restaurant par monsieur Yves Cousquer.\r\nChâteau de Saint-Martin-des-Champs, le domaine a été divisé en deux lots : le château est aujourd'hui un hôtel-restaurant.","architecture":"Le Château de Murviel du XVe siècle, situé au sud du Pech Bellet, il domine la plaine de l'Orb. Il s'agit d'un château féodal avec une grande terrasse dominant le vieux village.  La complexité géométrique de l'ensemble castral indique qu'il a été remanié ou reconstruit plusieurs fois. Le vocable castrum sous-entend une occupation militaire solide. L'ensemble castral actuel prend la vague forme d'un carré. Aux XIIIe et XIVe siècles (Guerre de 100 ans, invasion du Prince Noir), des murs clos étaient la garantie d'une survie possible. Le tracé actuel du village, par la direction des rues, donne la direction approximative des murs de clôture. 2 ou 3 enceintes devaient ceinturer le site. Le château  était un centre militaire et politique. Sa puissance militaire contribua à la renommée de ses maîtres, les marquis de Murviel, qui siégèrent aux Etats du Languedoc jusqu'à la Révolution.                                                                                                                                                    Château de Saint-Martin-des-Champs, La maison de maître, flanquée de deux tours, possède un avant-corps surmonté d'un fronton pourvu d'une horloge.","habitants":"Famille de François Henry de Carion\r\n        \r\n        \r\n        \"","divers":"Château de Murviel les béziers et le château de Saint-Martin des Champs","gps":"","images":["../../jctruffet.com/image/image_34/34_Murviel_Beziers_1.jpg","../../jctruffet.com/image/image_34/34_Murviel_Beziers_2.jpg","../../jctruffet.com/image/image_34/34_Murviel_Beziers_3.jpg","../../jctruffet.com/image/image_34/34_Murviel_Beziers_4.jpg","../../jctruffet.com/image/image_34/34_Murviel_Beziers_5.jpg","../../jctruffet.com/image/image_34/34_Murviel_Beziers_6.jpg","../../jctruffet.com/image/image_34/34_Murviel_Beziers_7.jpg"]},"Consult_chateau_formulaire5b79":{"id":"Consult_chateau_formulaire5b79","dept":"34","canton":"Piignan","commune":"Murviel les Montpellier","nom":"Murviel_Montpellier","type":"Château","periode":"XV","histoire":"MURVIEL-lès-Montpellier, outre les ruines romaines, indiquées bien qu'elles soient d'un accès difficile, le village possède un logis rectangulaire de 10 x 12 mètres datant de la fin du XIIIe siècle. Il s'agit d'un ancien château appartenant aux évêques de Maguelonne (la cathédrale de Maguelone est aujourd'hui cernée par la mer et les étangs, entre Sète et Palavas-les-Flots, dont les noms font plus penser à la période estivale qu'à l'histoire de la région). Le vieux village est établi au XIe siècle autour du château des Guilhem de Montpellier et dAumelas. Il passe aux mains des évêques de Maguelone en 1272. Ceux-ci en resteront propriétaires jusquà la Révolution. Léglise actuelle, dont labside du XIIe siècle est inscrite aux monuments historiques, était léglise du château, devenue ensuite église paroissiale. Le village a été pris et incendié en 1562 par les troupes protestantes. Les maisons ont été reconstruites au cours du XVIIe siècle, mais leurs fondations, les enceintes, labside de léglise et le bastion du château des évêques sont médiévaux. Le clocher, initialement à peigne, sera reconstruit au XVIIIe siècle.","architecture":"Mais remontons dans le temps, pour découvrir les ruines de l'oppidum romain. Un oppidum, mot d'origine latine, désigne un lieu fortifié, généralement établi sur une hauteur. Celui de Murviel-lès-Montpellier est beaucoup plus discret que celui d'Ensérune ou bien évidemment du théâtre de Nîmes, ou encore du Pont du Gard. L'ensemble est cependant très intéressant car associé à la Via Domitia, voie romaine qui reliait l'Italie et l'Espagne. Murviel-lès-Montpellier est donc peu mis en valeur et c'est bien dommage car le peu qui reste visible aujourd'hui permet tout de même de reconstruire  avec un minimum d'imagination  le temple qui y était érigé. Certes, de nombreuses pierres ont servi pour d'autres construction au fil des siècles, mais les fouilles devraient permettre de mieux comprendre l'importance du lieu du temps de la suprématie romaine dans le pourtour méditerranéen.","habitants":"évêques de Maguelone\r\n        \"","divers":"Château des évêques à Murviel lès Montpellier","gps":"","images":["../../jctruffet.com/image/image_34/34_Murviel_Montpellier_1.jpg","../../jctruffet.com/image/image_34/34_Murviel_Montpellier_2.jpg","../../jctruffet.com/image/image_34/34_Murviel_Montpellier_3.jpg","../../jctruffet.com/image/image_34/34_Murviel_Montpellier_4.jpg","../../jctruffet.com/image/image_34/34_Murviel_Montpellier_5.jpg","../../jctruffet.com/image/image_34/34_Murviel_Montpellier_6.jpg"]},"Consult_chateau_formulaire46ae":{"id":"Consult_chateau_formulaire46ae","dept":"34","canton":"Cazouls les Béziers","commune":"Murviel les Béziers","nom":"Mus","type":"Château","periode":"","histoire":"MUS, le domaine tient son nom d'une antique place-forte du nom de \"Murus\" (\"rempart\" en Latin), bâtie en promontoire au-dessus de la rivière l'Orb. Mus fut doté d'une église romane en 1070, aujourd'hui en court de restauration, et d'un des six premiers châteaux du département. Détruite à deux reprise lors de la croisade contre les cathares au XIIIe siècle, l'ancienne seigneurie fut remplacée en 1848 par un château de style renaissance, préfigurant ainsi la grande époque des châteaux du vin. Mus; appartient dès le XVIe siècle à la famille du mas de Soustre. Plusieurs châteaux se succèdent sur le site. Au début du XVIIe siècle, le château qui a subi des dommages pendant les guerres de religion est réparé. Au milieu du XVIIIe siècle, il passe à la famille d'Hertault de Beaufort, puis des Sahuc. Le dernier château est construit au milieu du XIXe siècle. l'ancienne seigneurie fut remplacée en 1848 par un château de style renaissance, préfigurant ainsi la grande époque des châteaux du vin par La famille Julien.","architecture":"Mus;  le dernier château  de style renaissance est construit au milieu du XIXe siècle ; il possède une grande façade sur une cour flanquée de tours avec fronton central de style néo-gothique, un grand escalier extérieur et une orangerie. Le domaine est adjugé en 1884 à la famille Lagarrigue, à la famille Sol en 1962 et aujourd'hui à la famille Jullien qui a entrepris la replantation du vignoble.","habitants":"Famille d'Hertault de Beaufort\r\n        \"","divers":"Château de Mus à Murviel les Bézier","gps":"","images":["../../jctruffet.com/image/image_34/34_Mus_1.jpg","../../jctruffet.com/image/image_34/34_Mus_2.jpg","../../jctruffet.com/image/image_34/34_Mus_3.jpg"]},"Consult_chateau_formulairec388":{"id":"Consult_chateau_formulairec388","dept":"34","canton":"Mèze","commune":"Mèze","nom":"Mèze","type":"Château","periode":"XVI-XVII","histoire":"Plusieurs châteaux à Mèze dont le château Girard du XVIIe siècle,  de Cressel, et de Félines du XVIIe siècle.                                          MEZE-GIRARD en 1611 la métairie des Horts en possession de Guillaume de Muret ces descendants construisirent le château en 1660. En 1782 , Jean-Jacques de Muret conseiller à la cour des comptes de Montpellier et gouverneur de Mèze, fait don du château à sa nièce Fernande-Caroline,  à l'occasion de son mariage avec Pierre-Dominique Ronzier, elle décéde en 1805, son époux convole avec Marie-Madeleine Félicité Roussac dont il aura deux enfants, de nouveau veuf  il s'allie en 1815 à Guillamette de Borie qui lui donnera cinq enfants, l'aînée sera l'héritière au décès de son père en 1847 elle épouse en 1840 Frédéric de Girard  fils du maire de Fabrègues anoblie en 1820, reste dans la famille jusqu'en 1995 qui le cède à la commune.                                                                 CRESSEL, le bassin de Thau réserve bien des surprises, en séloignant un peu du littoral on découvre Creyssels, ancienne ferme fortifiée du XVIe siècle, au cur des garrigues et des bois entre voie domitienne et étang de Thau. Henri et Josiane Benau ont acheté le domaine en 1982,  était alors à labandon, la vieille pierre demande sans cesse des investissements. Ainsi il a fallu compléter lactivité viticole. En 2000, Julie leur fille, décide de reprendre le domaine dans son ensemble.                                    FELINES, le domaine de Félines Jourdan appartient à la famille Jourdan depuis 1983. Vignerons depuis plusieurs générations dans le Languedoc, cette famille sest attachée à produire les meilleurs vins.","architecture":"Mèze,  le château de Girard  a été édifié sur une ancienne métairie, un peu à l'écart de la ville, en dehors des remparts, larchitecture est relativement classique mais on notera la présence dun très bel escalier central et de jolies pièces voûtées, se compose d'un corps de logis central à trois niveaux couvert d'un toit plat et de deux étroits pavillons latéraux  en légère saillie sur la façade principale. Doublant le corps de logis  deux galeries en arcades en plein cintre  forment la terrasse en étages. On peut y voir un escalier central et des pièces voûtées de part et d'autre ainsi que deux tourelles symétriques. \r\n Creyssels, cette ancienne ferme fortifiée du XVIe  siècle, au cur des garrigues et des bois entre voie domitienne et  étang de Thau,  en forme de U dont une face possède deux tours carrées à niveau inférieur du corps de logis   rectangulaire  à deux niveaux et attiques,  flanqué sur un angle une échauguette, l'ensemble à toits plats.    Félines; ensemble de bâtiment en longueur à trois niveaux.","habitants":"Famille de  Guillaume de Muret                                                              Famille Benau\r\n        \"","divers":"Château Girard, Cressel et Féline à Méze","gps":"","images":["../../jctruffet.com/image/image_34/34_M%c3%a8ze_1.jpg","../../jctruffet.com/image/image_34/34_M%c3%a8ze_2.jpg","../../jctruffet.com/image/image_34/34_M%c3%a8ze_3.jpg","../../jctruffet.com/image/image_34/34_M%c3%a8ze_4.jpg","../../jctruffet.com/image/image_34/34_M%c3%a8ze_5.jpg","../../jctruffet.com/image/image_34/34_M%c3%a8ze_6.jpg","../../jctruffet.com/image/image_34/34_M%c3%a8ze_7.jpg","../../jctruffet.com/image/image_34/34_M%c3%a8ze_8.jpg","../../jctruffet.com/image/image_34/34_M%c3%a8ze_9.jpg"]},"Consult_chateau_formulaire75d8-2":{"id":"Consult_chateau_formulaire75d8-2","dept":"34","canton":"Lodève","commune":"Notre-Dame de Londres","nom":"Notre_Dame_Londres","type":"Forteresse","periode":"XV","histoire":"NOTRE-DAME-DE-LONDRES, château féodal de la famille Roquefeuil, l'une des plus illustres du Languedoc, était largement implantée dans le secteur et le château de Notre-Dame était l'une de leurs possessions en garrigues. Construit au milieu du XVIe siècle par l'un de ses membres, il conserve toutefois des traits marqués par l'architecture militaire du Moyen-Age. Il appartient aujourd'hui à la famille de Bernis.\r\nA quelques kilomètres au Sud-Ouest Saint-Martin de Londres, un bâtiment qui semblerait être le château et la tour des remparts.","architecture":"Londres;  reconstruit au Moyen-Age, en pleine Renaissance au XVIe siècle, le château de Notre-Dame de Londres a pris la place dun château féodal auquel était rattaché la très singulière église romane castrale. Le château défendait le bourg de Notre-Dame de Londres lui même fortifié. Le château, très remanié, a tout de même gardé quelques uns de ses éléments marquants : chemin de ronde, fenêtres renaissances, fortifications. Deux tours de protection rondes et le donjon sont surmonté de créneaux et de mâchicoulis intacts gardent encore le vieux village. Le château possède encore deux salles Renaissance à plafond peint. Le château nest pas visitable à lintérieur mais le remarquable village médiéval permet den faire le tour extérieur.","habitants":"Famille Roquefeuil                                                                                   Famille de Bernis\r\n        \"","divers":"Forteresse de Notre-Dame de Londres","gps":"","images":["../../jctruffet.com/image/image_34/34_Notre_Dame_Londres_1.jpg","../../jctruffet.com/image/image_34/34_Notre_Dame_Londres_2.jpg","../../jctruffet.com/image/image_34/34_Notre_Dame_Londres_3.jpg","../../jctruffet.com/image/image_34/34_Notre_Dame_Londres_4.jpg","../../jctruffet.com/image/image_34/34_Notre_Dame_Londres_5.jpg","../../jctruffet.com/image/image_34/34_Notre_Dame_Londres_6.jpg","../../jctruffet.com/image/image_34/34_Notre_Dame_Londres_7.jpg","../../jctruffet.com/image/image_34/34_Notre_Dame_Londres_8.jpg","../../jctruffet.com/image/image_34/34_Notre_Dame_Londres_9.jpg"]},"Consult_chateau_formulaireb861":{"id":"Consult_chateau_formulaireb861","dept":"34","canton":"Montpellier","commune":"Montpellier","nom":"O_Montpellier","type":"Château","periode":"XVIII","histoire":"D'O,  première mention au XIe siècle sous le nom de mas Villars et dépendait du comté de Melgueil, propriété des seigneurs de Figaret puis passa aux Montferrier au XVIe siècle, le domaine prit le nom de  Puech Villa. Charles de Perdrix président aux comptes l'acheta en 1685 et  fut acheté en 1729 et  édifié entre 1743 et 1750 par l'architecte Montpelliérain, Charles Gabriel Leblanc. Jean-Etienne de Duranty racheta le domaine et continua la construction,    les héritiers de Duranty  cèdent le domaine en 1743 à Jean-Emmanuel de Guignard, vicomte de Saint-Priest, futur intendant du roi en Languedoc  en 1762  réalisa les aménagements hydraulique. En 1774 construction du château d'eau du Peyrou \"eau\" sera désormais appelé \"O\". sous la restauration le domaine passe à l'évêché de Montpellier qui le conserve jusqu'en 1905, acheté l'année suivante par le département pour un asile d'aliénés, qui entame un long déclin, Passé en de nombreuses mains, le domaine est acquis en 1906 par le conseil général de l'Hérault qui décide en 1980 de faire du château un lieu artistique.","architecture":"D'O, l'édifice présente une grande simplicité. Un avant-corps central de trois travées avec au sommet un fronton triangulaire suffit à animer la façade qui comporte un étage noble sur rez-de-jardin, deux ailes latérales dépourvues de tout ornement. Sous le toit de tuiles creuses, le fronton de l'avant-corps montre un deuxième niveau percé d'oculus à la manière méridionale.  \r\nles aménagements hydraulique  grand bassin autour duquel s'élève des tribunes qui  permettent à mieux voir les distractions. La vaste pièce d'eau en forme de polygone décorée de sculptures ainsi que d'autres aménagements comme les jardins ainsi que d'autres curiosités.","habitants":"Famille de Jean-Etienne de Durant\r\n        \"","divers":"Château d'O à Montpellier","gps":"","images":["../../jctruffet.com/image/image_34/34_O_Montpellier_1.jpg","../../jctruffet.com/image/image_34/34_O_Montpellier_2.jpg","../../jctruffet.com/image/image_34/34_O_Montpellier_3.jpg","../../jctruffet.com/image/image_34/34_O_Montpellier_4.jpg","../../jctruffet.com/image/image_34/34_O_Montpellier_5.jpg"]},"Consult_chateau_formulairef02b":{"id":"Consult_chateau_formulairef02b","dept":"34","canton":"Pézenas","commune":"Pézenas","nom":"Parc","type":"Château","periode":"XVI","histoire":"PARC, en 1590, Henri 1er de Montmorency, qui venait de faire construire le château de la Grange-des-Prés, achète de nombreuses terres pour y aménager une résidence et un domaine de chasse, l'un de ces \"parcs à bêtes forestières\" qui connaissaient une grande vogue en France depuis le Moyen-Age. Il fait clore le parc d'une muraille et y fait \"mettre toute sorte de gibier et autres rares animaux\". Louis XIII et Louis XIV vinrent chasser au Parc en 1622 et 1660. Le Parc est acquis en 1634 à Henri de Bourbon, prince de Condé, époux et procurateur de Charlotte-Marguerite de Montmorency, soeur du duc Henri II, par Jean Despinaud, gentilhomme ordinaire de la chambre du roi. Achat sans aucun doute fictif puisque le parc et ses dépendances sont très vite remises en 1641 sur le nom de Henri de Bourbon. En 1773, le prince de Conti, Louis-François de Bourbon, représenté par Jean-François de Grasset, fait effectuer d'importants travaux sous la direction de l'architecte lodévois Blaquière. Le domaine est revendu quatre ans plus tard à Théodore de Barral d'Arènes, lieutenant du roi en Languedoc et écuyer de madame Sophie de France. Il deviendra en 1827 la propriété des descendants directs du facteur d'orgue de  Jean-François L'Epine.","architecture":"Château du Parc description  Le mur d'enceinte, d'une longueur totale d'environ 4900 m, construit en grossiers moellons de basalte, est flanqué de place en place de tours rondes en hors-oeuvre ou sur l'angle dépourvues de tout caractère défensif. Le domaine étant traversé par le chemin de Pézenas à Caux, deux portes monumentales furent ouvertes dans la clôture. Il ne subsiste du corps de logis primitif que le mur pignon occidental et la cheminée monumentale de la salle. La demeure a été remaniée et agrandie au début du XIXe siècle et la tour carré abritant l'escalier été élevée dans la décennie 1880. La chapelle, de style néo-roman, a été construite en 1903. La façade nord présente une originale génoise à trois rangs faisant ressaut au-dessus des fenêtres de l'étage de comble, disposition sans doute inspirée par une maison piscénoise de la seconde moitié du XVIIIe siècle, impasse des Calquières-Hautes.","habitants":"Famille de Théodore de Barral d'Arènes\r\n        \"","divers":"Château du Parc","gps":"","images":["../../jctruffet.com/image/image_34/34_Parc_1.jpg"]},"Consult_chateau_formulaire5529":{"id":"Consult_chateau_formulaire5529","dept":"34","canton":"St-Pons de Thomières","commune":"Pardailhan","nom":"Pardailhan","type":"Château","periode":"XV","histoire":"PARDAILHAN;  Dès 1381, le roi Charles VI accorde des libertés et franchises au Pardailhan, et notamment le droit pour les habitants d'élire des consuls pour les représenter. Pardailhan est occupé jusqu'au début du XVe siècle par un châtelain royal, représentant le roi. Plusieurs familles nobles se succèdent pendant près de trois siècles. Vers 1650, un nouveau château est construit au hameau de Pontguiraud, par la famille seigneuriale de Brugairoux. En 1789, le seigneur baron Thomas de Treil de Pardailhan prend parti en faveur de la Révolution et est élu député de Paris à l'Assemblée Législative en 1791-92. Armand Beaulieu, philosophe et historien en 1791, il fut élu député du département de Paris.  En 1800, ruiné, il se rallia au régime de Bonaparte. Poursuivi par ses créanciers, il sexila en 1806 à Milan en Italie, doù il apprit son expropriation du domaine de Pardailhan, par son propre frère Alexandre. Revenu en France, il sinstalla définitivement au château de Pardailhan, racheté par son épouse Charlotte. À la Restauration en 1815 il fut nommé maire de la commune.","architecture":"L'ancien château fortifié, déjà abandonné au XVIe siècle, est totalement ruiné de nos jours. En contrebas, se trouvent les restes de l'église Sainte-Marie et sa chapelle Ste-Euphémie.\r\nL'ancien château seigneurial, bâti vers 1650, a été remanié au cours des siècles; Pardailhan, une vaste demeure XVIe siècle à l'entrée du village, ouvrant sur les collines du Haut Languedoc. De grandes pièces avec cheminées, une déco classique dans les parties communes et dans les chambres, sobres et élégantes, certaines avec terrasse, les suites avec une cuisine équipée, dans une ambiance assez familiale.  le bâtiment se compose d'un corps central, il a conservé ses deux tours du XVIIe siècle, prolongé en équerres et prolongé par deux ailes de bâtiments à deux niveaux.","habitants":"Famille de Thomas de Treil de Pardailhan\r\n        \"","divers":"Château de Pardailhan.","gps":"","images":["../../jctruffet.com/image/image_34/34_Pardailhan_1.jpg","../../jctruffet.com/image/image_34/34_Pardailhan_2.jpg","../../jctruffet.com/image/image_34/34_Pardailhan_3.jpg","../../jctruffet.com/image/image_34/34_Pardailhan_4.jpg","../../jctruffet.com/image/image_34/34_Pardailhan_5.jpg"]},"Consult_chateau_formulaire7594":{"id":"Consult_chateau_formulaire7594","dept":"34","canton":"Cazouls les Béziers","commune":"Maraussan","nom":"Perdiguier","type":"Château","periode":"XIV","histoire":"PERDIGUIER, en 1280 dite la bastide d'En'Auger, en 1375 Jean Perdiguier reçoit du roi Charles V les fiefs de Villenouvette et de Maraussan dont faisait partie la bastide construite en 1250.  Succèdera à Jean  son fils bourgeois à Montpellier qui le cède à Jean Tallepan et ensuite passe  en 1449 à Etienne Petit trésorier  général du Languedoc et acquit en 1540 par Pierre de Plantavit qui possède déjà la seigneurie de Margon. En 1572 le château passe par alliance au lieutenant Jacques de Rouch d'Arnoye époux  de Jeanne de Plantavit et en 1793 vendus aux enchères comme bien national appartient aujourd'hui à la famille Feracci exploitant viticole depuis plusieurs générations.","architecture":"Perdiguier, château médiéval et classique, vaste quadrilatère, deux ensembles d'époques différentes, au nord le corps de bâtiment du XIVe siècle est flanqués sur les angles extérieurs de deux tours rondes abritent les escaliers dont les toits ont été arasés à la Révolution. Ce corps de logis est prolongé du côté Nord-Est par un pavillon carré coiffé d'un haut de comble (ancien donjon). Au XVIIe siècle le château est agrandi par la construction de deux ailes qui ont remplacé des courtines sont flanqués de tours rondes, la cour d'honneur est fermée par un mur de clôture interrompu par un porche plein cintre. Les fenêtres à meneaux ont été conservés sur cour, de petites fenêtres à fronton cintré se détachent  sur le toit trés incliné en croupe couvert de tuiles de couleur.","habitants":"Famille de  Jacques de Rouch d'Arnoye\r\n        \"","divers":"Château de Perdiguier à Maraussan","gps":"","images":["../../jctruffet.com/image/image_34/34_Perdiguier_1.jpg","../../jctruffet.com/image/image_34/34_Perdiguier_2.jpg","../../jctruffet.com/image/image_34/34_Perdiguier_3.jpg","../../jctruffet.com/image/image_34/34_Perdiguier_4.jpg","../../jctruffet.com/image/image_34/34_Perdiguier_5.jpg","../../jctruffet.com/image/image_34/34_Perdiguier_6.jpg","../../jctruffet.com/image/image_34/34_Perdiguier_7.jpg"]},"Consult_chateau_formulairea980":{"id":"Consult_chateau_formulairea980","dept":"34","canton":"Pézenas","commune":"Tourbes","nom":"Peyrat","type":"Château","periode":"XVII","histoire":"PEYRAT, la famille de Peyrat, établie à Pézenas dès le XVe siècle, habitait, en cette ville l'hôtel du connétable de Montmorency où s'arrêta Louis XIV le 6 avril 166O ; elle possédait, en outre, une \"maison des champs\" connue au XVIIe et XVIIIe siècle sous le nom de \"Métairie de Montplaisir\". L'adjonction de tours, au XVIe siècle transforma cette demeure en château que le  XVIIe siècle embellit. En 173O Joseph de Peyrat fit don de \"Montplaisir\" à son cousin René de Peyrat de la Redoute en échange d'une rente viagère. Les responsabilités, en matière d'entretien étant mal définies, le château entra dès lors dans une période de semi-abandon. Dans la seconde moitié du XVIIIe siècle, passa aux mains de la famille Reboul. François-Jacques Reboul, janséniste de coeur, aurait, fait abaisser les tours, par souci d'austérité et débaptisé la demeure. A sa mort en 18O3, c'est son troisième fils, Henri, homme de sciences et homme politique qui se fixa à Peyrat. Par la suite le domaine passa à Jacques-François Reboul neveu d'Henri, puis, à sa mort en 1828 à sa fille cadette Marie épousa en 184O Henri de Juvenel. Les nouveaux époux s'établirent au château de Montpezat, sur l'autre rive de la Peyne, ce changement valut à Peyrat d'échapper aux modifications du XIXe siècle. Le château fut vendu en 19O7 à M. Fajon qui le revendit en 191O à Gustave Fayet ;  ce dernier, bien que n'y résidant pas, entretient les bâtiments. A sa mort, le château de Peyrat resta en indivision entre ses deux filles Mme Paul Bacou et Mme d'Andoque de Seriège, jusqu'en 1954 où, Mme Bacou en devint la seule propriétaire. Depuis le décès de cette dernière, en 1961, \"Peyrat\" se trouve en iindivision entre ses deux filles ; Mme Viennet et Mlle Roseline Bacou.","architecture":"Le château de Peyrat
