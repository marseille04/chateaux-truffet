pat,  le château abritait , du temps de sa splendeur médiévale, les services administratifs et le tribunal de larchevêque.  Mais, comme de la plupart de leurs autres 18 châteaux, les archevêques se désintéressèrent de leur logis capestanais à la période moderne. Dès le milieu du XVIIe siècle, la chapelle est en ruines. Au XVIIIIe siècle, le château ne sert plus quà abriter la salle de justice (appelé auditoire), sera vendu en 1791, comme bien national subit de profondes transformations dans la deuxième moitié du XIXe siècle. Les propriétaires construisirent, à la place de la salle de justice, une vaste maison qui empiéta sur la salle dapparat En 1855, les propriétaires firent faire  des relevés d'aquarelles, des décors et en 1875, à Louis Fouchère un dessin de la cheminée monumentale qui disparut ensuite, les uns et les autres conservés à la Médiathèque de larchitecture et du Patrimoine. Le château fut acheté par la mairie en 1937.                                                                             CARRASSES,  en 1896, le propriétaire M. Emile Hue fait appel à larchitecte-paysagiste Fleury P. Du Sert pour un projet de transformation du parc. Puis, les Carrasses sont rachetés en 2008 pour être transformés en résidence hôtelière de luxe, associée à une exploitation viticole. Les bâtiments ont été entièrement restaurés.  Aujourd'hui Françoise Davidenko-Holzer, directrice générale du château.","architecture":"A Capestang, cest entre 1237 et 1270, quau-dessus dun bâtiment bas et plus ancien aurait été élevée la grande salle de ce château. Une vaste enceinte sajouta au logis seigneurial, désormais desservi par un escalier monumental (détruit dans les années 50). La grande salle, qui nest pas tout à fait rectangulaire, mesure environ 20 m de long et 8,40m de large. Le décor du plafond peint couvre tout lespace de la vaste et primitive salle dapparat du château. La salle d'apparat du château est le point fort de la visite avec ses murs où alternent les armes de France et de B. de Fargues du XIVe et, véritable joyau.  Château de l'Archevêque, classé monument historique. Château fort au XIIe siècle, résidence de l'Archevêque de Narbonne. Il abrite un magnifique plafond peint datant du XVe siècle, illustré et expliqué par le centre d'interprétation.  Les Carrasses est un domaine viticole du XIXe siècle rénové,  bâtis en 1886 par larchitecte bordelais Louis Garros sur les ruines dun relais pour les pèlerins sur le chemin de Saint-Jacques-de-Compostelle, le château Les Carrasses et ses dépendances composent lancien domaine viticole de la Bastide Neuve.  Corps de logis rectangulaire à deux niveaux et attiques, accolés à deux pavillons, l'un style donjon carré  à toit pointu à l'opposé l'autre pavillon rectangulaire les deux dépassant l'ensemble accolé d'une échauguette à toit en poivrière.               Rotondes; château viticole un corps de logis rectangulaire à deux niveaux toiture en croupe.","habitants":"Archevêques de Narbonne                                                                          M. Emile Hue\r\n        \"","divers":"Vestiges à Capestang , château des archevêques , la Rotonde et le château de Carasses.","gps":"","images":["../../jctruffet.com/image/image_34/34_Capestang_1.jpg","../../jctruffet.com/image/image_34/34_Capestang_2.jpg","../../jctruffet.com/image/image_34/34_Capestang_3.jpg","../../jctruffet.com/image/image_34/34_Capestang_4.jpg","../../jctruffet.com/image/image_34/34_Capestang_5.jpg","../../jctruffet.com/image/image_34/34_Capestang_6.jpg","../../jctruffet.com/image/image_34/34_Capestang_7.jpg","../../jctruffet.com/image/image_34/34_Capestang_8.jpg"]},"Consult_chateau_formulaire0c7c":{"id":"Consult_chateau_formulaire0c7c","dept":"34","canton":"Roujan","commune":"Roujan","nom":"Cassan","type":"Abbaye","periode":"XIII","histoire":"CASSAN, le XIIIe siècle marque un tournant décisif pour le prieuré. Le pape Innocent III, à l'origine de la croisade contre les Cathares, promulgue une bulle d'exemption à l'encontre du prieuré conventuel de Cassan, le soumettant directement au Saint-Siège ; le prieuré échappe ainsi à la juridiction des évêques de Béziers. Au niveau du temporel, les chanoines se donnent le roi de France Louis IX pour suzerain en 1268. Au XIVe siècle, le monastère est fortifié pour protéger la communauté des méfaits des routiers. Les guerres de religion vont aggraver les difficultés. En 1539, puis de nouveau en 1563, les troupes protestantes avec à leur tête Jacques de Crussol et Claude de Caylus (Seigneur de Faugères) incendient et pillent le monastère. Le déclin amorcé au XIVe siècle se poursuit dans les siècles suivants ; en 1605 le prieuré n'héberge plus que sept ou huit chanoines. En 1671 le prieuré est rattaché à l'abbaye Sainte-Geneviève de Paris. Dans la seconde moitié du XVIIIe siècle, le prieur commendataire, Pas de Beaulieu rebâtit le monastère. \r\nÀ la Révolution Française, les chanoines, qui ne sont plus que cinq, sont chassés. Le prieuré est déclaré bien national ; il est vendu en mars 1791 à Marc Antoine Thomas Mérigeaux, avocat à Pézenas, qui l'aurait acheté pour le compte du Prince de Conti afin d'y loger sa maîtresse madame de Brimont. Au cours du XIXe siècle et XXe siècle le site passe par diverses mains est acquis en 1947 par  l'état  pour y héberger des centres de formations administrés par le ministère de l'Éducation nationale puis par le ministère des Dom-Tom.  En 1995, Cassan retourne dans le domaine privé. Le château est acheté en 2002 par un groupe immobilier qui y développe actuellement (mars 2011) des programmes dinnovation pour entreprises et vise à en faire un centre européen de prévention et de recherches sur le bien-être au travail. Ce projet est mené par Gabor Mester de Parajd, architecte en chef des monuments historiques.","architecture":"Les bâtiments médiévaux sont entièrement rasés et reconstruits dans le style de l'époque. Le somptueux palais conventuel serait l'uvre d'un membre de la famille Giral, qui compta plusieurs architectes à Montpellier. L'église voit son chevet modifié, mais pour le reste elle n'est heureusement que remanié, ce qui en fait le seul témoin architectural du monastère roman élevé par saint Guiraud au début du XIIe siècle. Le monastère prend alors sa nouvelle appellation laïque de « Château de Cassan ». L'édifice et ses abords sont ouverts à la visite et accueillent différents événements culturels.\r\nLe prieuré Notre-Dame de Cassan (façades et toitures), sur tois niveaux cinquante-sept ouvertures rebâties sur dix-neuf  travées, treize pour le corps central et trois pour chacun des pavillons en légère saillie qui le flanquent au centre de la façade un avant corps  avec fronton triangulaire avec une porte d'entrée cintré et un balcon au-dessus, les ferronneries, la cour de lancien cloître, sa grande galerie au rez-de-chaussée, le grand escalier avec sa rampe en ferronnerie, l'ancien réfectoire devenu le grand salon aux boiseries, les terrasses avec leurs ferronneries, le jardin avec les constructions qu'il abrite, dont le pavillon sud-ouest font lobjet dun classement au titre des monuments historiques depuis le 26 janvier 1998.","habitants":"Madame de Brimont\r\n        \"","divers":"L'Abbaye de Cassan à Roujan.","gps":"","images":["../../jctruffet.com/image/image_34/34_Cassan_1.jpg","../../jctruffet.com/image/image_34/34_Cassan_2.jpg","../../jctruffet.com/image/image_34/34_Cassan_3.jpg","../../jctruffet.com/image/image_34/34_Cassan_4.jpg","../../jctruffet.com/image/image_34/34_Cassan_5.jpg","../../jctruffet.com/image/image_34/34_Cassan_6.jpg"]},"Consult_chateau_formulaire0b5e":{"id":"Consult_chateau_formulaire0b5e","dept":"34","canton":"Pézenas","commune":"Castelnau de Guers","nom":"Castelnau_Guers","type":"Château","periode":"XIV","histoire":"CASTELNAU-de-GUERS, fief des barons de Guers, dont lempreinte fut si forte quà partir du XIVe siècle, ils lui léguèrent leur nom, le village de Castelnau De Guers entra dans lhistoire. Selon la tradition, lun des barons partit combattre en Terre Sainte lors des croisades, c'est pourquoi les De Guers eurent sur leurs armoiries un croissant versé, signe de victoire contre les infidèles. La lignée séteignit en 1655, à la mort dHenry de Guers qui mourut sans héritier. Sa demi-sur, Laurence de Veyrac, épouse du marquis de Vins, hérita de la baronnie de Castelnau. Ses successeurs ne furent pas moins célèbres. Seigneur de Castelnau qui émigra en 1790, Charles-Emmanuel-Marie Magdelon de Vintimille du Luc était un fils naturel de Louis XV. En effet, c'était l'enfant de Jean Baptiste Félix Hubert qui vivait à la cour et qui épousa en 1739 Pauline Félicité de Mailly Nesle, maîtresse du roi. Château, demeure des barons de Guers, en grande partie détruit à la Révolution. On ne peut dater avec précision le château mais la chapelle Saint-Jean, l'ancienne chapelle , date du XIIe siècle. À la fin du XIXe siècle le château abritait une exploitation agricole.","architecture":"Le château de Castelnau-de-Guers est un vieux château féodal, demeure principale des Barons de Guers. Très abîmé par lhistoire, le château a été quasiment détruit en 1792.\r\nAujourdhui, sur le promontoire qui accueille la bâtisse, on peut encore retrouver de nombreux vestiges : meurtrières, façade crénelée, fenêtres à meneau, les montants de la porte qui donnait sur le pont-levis.\r\nLe château possède toujours son église castrale romane, qui fut aussi la première église paroissiale. Tout autour du château se trouve lancien village médiéval protégé par une partie des remparts.","habitants":"Henry de Guers\r\n        \"","divers":"Château de Castelnau de Guers","gps":"","images":["../../jctruffet.com/image/image_34/34_Castelnau_Guers_1.jpg","../../jctruffet.com/image/image_34/34_Castelnau_Guers_2.jpg","../../jctruffet.com/image/image_34/34_Castelnau_Guers_3.jpg","../../jctruffet.com/image/image_34/34_Castelnau_Guers_4.jpg","../../jctruffet.com/image/image_34/34_Castelnau_Guers_5.jpg","../../jctruffet.com/image/image_34/34_Castelnau_Guers_6.jpg"]},"Consult_chateau_formulaire952f":{"id":"Consult_chateau_formulaire952f","dept":"34","canton":"Castelnau le Lez","commune":"Castelnau le Lez","nom":"Castelnau_Lez","type":"château","periode":"XVII-XIX","histoire":"Trois châteaux à Castelnau le Lez  ville fortifié dont les remparts , celui de  Verchant du XVIe siècle  et de Méric du XIXe siècle.                     CASTELNAU le LEZ Au cours du XIIe siècle, la cité perd de son influence en devenant une possession des seigneurs de Montpellier. En 1674, Castelnau change de main : la famille de Castries devient propriétaire de la seigneurie qui comprend également le Crès et Salaison. En 1791  pendant l'ancien régime, elle a formé une seule paroisse avec Le Crès sous les noms successifs de Castelnau-lès-Montpellier et Castelnau-Le Crès.        MERIC,  la propriété date du XVIIe siècle, tirant son nom de son propriétaire de l'époque Etienne d'Americ.   la famille du peintre Frédéric Bazille, né en 1841, avait sa propriété familiale. C'est aussi un tableau dénommé \"Vue du village de Castelnau\" qui a fait découvrir la peinture de Frédéric. D'ailleurs Pissarro et Monet viendront souvent lui rendre visite dans ses ateliers. Il mourra en 1870, à l'age de 29 ans, durant l'assaut de Beaune-la-Rolande. Pissarro dira de lui : \"il était l'un des plus doués parmi nous. Les bâtiments du XIXe siècle appartiennent à la ville, qui souhaite faire du Domaine de Méric un de ses hauts lieux culturels.                 VERCHANT, ce domaine doit son nom à la comtesse de Verchant qui l'a acquis de l'évêque de Montpellier en 1523. On peut y voir parc et fossés, grotte avec puits, noria, potager, allées plantées d'arbres. Hôtel restaurant de Véronique Brugie.","architecture":"Le château de Castelnau le Lez domine la rive gauche : le Castellum Novum. Bâti au début du XIe siècle à proximité de l'église Saint Jean sur ordre des Comtes, il devint propriété des seigneurs de Montpellier au XIIe siècle. Il connut de multiples propriétaires entre le XVIIe et le XIXe siècle.\r\nAujourd'hui, les restes du château se résument au rempart Ouest, intact sur 31 mètres, à la tour d'angle située au Nord-Ouest, ainsi qu'à un escalier en colimaçon, derrière les murailles donnant accès à une poterne et à une grotte qui servit un temps de glacière.\r\nMeric, corps de logis en équerre à trois niveaux avec fronton triangulaire surélevé, le domaine de Méric possède une orangerie et un jardin anglais qu'entoure un écrin de verdure aux essences méditerranéennes.   Propriété de la mairie de Montpellier depuis peu, la plus grande partie de la propriété (excepté les bâtiments du mas et lorangerie) sont ouverts au publics et aménagés au fil du temps.                                                                                        Verchant, de forme en U avec  corps de logis principal de quatre  niveaux.","habitants":"Famille de Castries                                                                               Famille de Frédéric Bazille\r\n        \"","divers":"Ville fortifiée de Castelnau sur Lez, avec château de Verchant et de Méric","gps":"","images":["../../jctruffet.com/image/image_34/34_Castelnau_Lez_1.jpg","../../jctruffet.com/image/image_34/34_Castelnau_Lez_2.jpg","../../jctruffet.com/image/image_34/34_Castelnau_Lez_3.jpg","../../jctruffet.com/image/image_34/34_Castelnau_Lez_4.jpg","../../jctruffet.com/image/image_34/34_Castelnau_Lez_5.jpg","../../jctruffet.com/image/image_34/34_Castelnau_Lez_6.jpg"]},"Consult_chateau_formulaire4535-2":{"id":"Consult_chateau_formulaire4535-2","dept":"34","canton":"Castries","commune":"Castries","nom":"Castries","type":"Château","periode":"XVI","histoire":"CASTRIES, le  seigneur Dalmace, chevalier croisé et premier possesseur de Castries, participe à la première croisade et meurt en Palestine. Le fief de Castries entre alors, par mariage et testaments, dans le patrimoine de Guilhem VII, seigneur de Montpellier. \r\nEn 1495, la famille de la Croix achète la baronnie de Castries à Jean de Pierre. Vers 1520, l'ancien château fort est rasé et reconstruit sur les bases du château actuel, Jacques de La Croix (1536-1575) construit un château de style Renaissance,  sous Louis XIV, la famille vient à la Cour et intéresse le duc de Saint-Simon. Le domaine fut nommé en marquisat en 1645. René-Gaspard de La Croix (1611-1674) reste la figure du grand siècle. Alors que son père a connu la disgrâce pour son soutien au duc de Montmorency, pendant les troubles de la Fronde ; il est promu marquis grâce à ses actions valeureuses lors de la guerre de Trente Ans. Il choisit de rénover le château dans le goût de lépoque. A la Révolution, le château sert un temps dhôpital militaire, il est rapidement vendu comme bien national à quatorze propriétaires.   Sous séquestre revient aux Castries  Armand-Charles -Augustin qui s'est illustré au cours de la guerre de l'indépendance américaine à obtenu le titre de duc  et en 1828 son fils 2eime duc de Castries  Edmond-Eugène-Philippe-Hercule de La Croix (1787-1866) parvient à racheter une partie du domaine. En 1935, René de La Croix, lécrivain-historien, achète à son tour le château. Il entreprend de le restaurer et décide de retirer le jardin à langlaise de la cour dhonneur, et passa par alliance aux vicomte Harcourt second époux de la duchesse  de Castries. En 1985, le château,  depuis 1966, est légué à l'Académie française, sur décision de son propriétaire, le comte René de la Croix de Castries, dit « le duc de Castries », héritier de la maison.\r\nMis en vente en septembre 2013, le domaine devient la propriété de la commune de Castries.","architecture":"Le château actuel a été construit au XVIIe siècle de style Renaissance. Il comporte deux corps de logis en équerre (un troisième aurait dû terminer le U entourant la cour mais n'a pas été construit). Ces logis sont cantonnés de trois pavillons carrés coiffés de toits à brisés récemment restitués, couverts de tuiles vernissées.\r\nLe château de Castries, nommé « petit Versailles du Languedoc » profite d'un jardin à la française du XVIIe siècle,  dessiné par Le Nôtre, jardinier du roi Louis XIV. Il fut alimenté en eau par l'aqueduc, ouvrage unique en France, également classé monument historique conçu par Paul Riquet, ingénieur du canal du Midi. Les voûtes d'ogives du rez-de-chaussée de l'aile nord sont tout ce qui subsiste du château fort rasé en 1622.\r\nDe la cour dhonneur, on accède aux grandes terrasses offrant une superbe vue sur les allées en forme détoile, les bassins et un paysage de vignobles. En septembre 2013, le « château phare » de la région a été acheté par la ville de Castries.","habitants":"Famille de  Jacques de La Croix \r\n        \"","divers":"Château de Castrie","gps":"","images":["../../jctruffet.com/image/image_34/34_Castries_1.jpg","../../jctruffet.com/image/image_34/34_Castries_2.jpg","../../jctruffet.com/image/image_34/34_Castries_3.jpg","../../jctruffet.com/image/image_34/34_Castries_4.jpg","../../jctruffet.com/image/image_34/34_Castries_5.jpg"]},"Consult_chateau_formulaire11eb":{"id":"Consult_chateau_formulaire11eb","dept":"34","canton":"Cazouls les Béziers","commune":"Caussiniojouls","nom":"Caussiniojouls","type":"forteresse","periode":"XII","histoire":"CAUSSINIOJOULS, le village se distingue par sa tour vestige dun ancien château qui appartenait aux seigneurs de Faugères avant le XVIe siècle. Cette tour aujourdhui entièrement restaurée par son propriétaire sélève fièrement en haut du village. La seigneurie de Caussiniojouls était comprise dans la viguerie de Béziers, cétait la propriété de la maison de Narbonne qui résulte dun testament fait en 966 par Malfred, vicomte de Narbonne et sa femme Adélaïde. On trouve en 1170 Bernard de Caussiniojouls mentionné dans une charte du XIIe siècle ce qui prouve la possession de ce fief par les barons de Faugères. Au XVIe siècle, il est fait mention de la famille De Gailhac comme propriétaire des lieux. Au moment de la Révolution, la famille Carrion de Nizas obtient le château suite à un mariage dun de ses membres avec la fille du dernier de Gailhac.","architecture":"Les remparts de Caussiniojouls  datent du XIe et XIIe siècle, leurs vestiges sont encore visibles aujourdhui ainsi que les porches et les ruelles étroites bordées de maisons. Le donjon rectangulaire haut de cinq niveaux, crénelés.","habitants":"Famille Carrion de Nizas\r\n        \"","divers":"Donjon de Caussiniojouls","gps":"","images":["../../jctruffet.com/image/image_34/34_Caussiniojouls_1.jpg","../../jctruffet.com/image/image_34/34_Caussiniojouls_2.jpg","../../jctruffet.com/image/image_34/34_Caussiniojouls_3.jpg","../../jctruffet.com/image/image_34/34_Caussiniojouls_4.jpg","../../jctruffet.com/image/image_34/34_Caussiniojouls_5.jpg"]},"Consult_chateau_formulairee64e":{"id":"Consult_chateau_formulairee64e","dept":"34","canton":"Lodève","commune":"le Caylar","nom":"Caylar","type":"Vestiges_Château","periode":"XII","histoire":"Au Caylar en plus des vestiges le château de Sorbs du XVIIe siècle (voir article)  CAYLAR, le Roc Castel, qui surplombe le village du Caylar, constitue les vestiges du Castellas (château) daté du XIIe siècle et qui abrite la chapelle Notre-Dame du Roc Castel également datée du XIIe siècle et entièrement restaurée. Vous pourrez y admirer les dolomies naturelles qui étaient parties constituantes des anciennes fortifications du Caylar. Les premières traces d'occupation du site remonteraient à l'Age de Fer. Des maisons carolingiennes (avant le Xe siècle) peuvent encore être observées. Certaines datées de la Renaissance sont encore habitées. Du haut du Roc Castel, vous pourrez admirer le merveilleux panorama qui couvre à perte de vue le Larzac méridional.                                                                                            A 10 Km à l'Est dans la commune de Sorb un château dit de Sorbs                  A quelques kilomètres à L'est, vestiges de l'ancien château à Saint-Michel d'Alajou où il ne reste que quelques pans de murs, pas d'informations historiques.","architecture":"Construit par lévêque de Lodève, le château du Caylar contrôlait les limites nord du diocèse et la route reliant Millau à Montpellier. Le sommet rocheux était intégré au dispositif défensif. Lil avisé repère de discrètes traces creusées à même le roc : banquettes, escaliers, parapets. La « tour de monseigneur », taillée dun bloc dans un rocher, était peut être un moulin à vent où une tour de guet. Lenquête se poursuit plus bas, dans le village primitif. Le regard fouille dans la pénombre : un dormant de porte, un pan de mur, une alcôve, toute une habitation troglodyte. Tout en bas, le village du XIVe séloigne du rocher. Le village moderne sen affranchit totalement pour sétirer vers la route. En grimpant la rue Notre-Dame, on arrive aux vestiges du château du Caylar, accrochés à la pente. Le principal reste est cette belle arche en plein cintre. Derrière, noyées dans le lierre, se dressent les  ruines d'un important corps de bâtiment du XVe ou XVIe siècle. Les fenêtres à meneaux de la maison voisine (à droite de l'arche) indiquent que cette dernière date également de la même époque.","habitants":"Seigneur du Caylar.      \r\n        \"","divers":"Vestiges du château du Caylar et  les vestiges de l'ancien château à Saint-Michel d'Alajou.","gps":"","images":["../../jctruffet.com/image/image_34/34_Caylar_1.jpg","../../jctruffet.com/image/image_34/34_Caylar_2.jpg","../../jctruffet.com/image/image_34/34_Caylar_3.jpg","../../jctruffet.com/image/image_34/34_Caylar_4.jpg","../../jctruffet.com/image/image_34/34_Caylar_5.jpg","../../jctruffet.com/image/image_34/34_Caylar_6.jpg","../../jctruffet.com/image/image_34/34_Caylar_7.jpg","../../jctruffet.com/image/image_34/34_Caylar_8.jpg"]},"Consult_chateau_formulaire6220":{"id":"Consult_chateau_formulaire6220","dept":"34","canton":"Claret","commune":"Lauret","nom":"Cazeneuve","type":"Château","periode":"IX","histoire":"CAZENEUVE est situé à 1 Km du village de Lauret, sur une petite route traversant les vignes du Pic Saint Loup, il est le cur dun domaine viticole de 35 hectares. Dès 820, le mas est répertorié sous le nom de Casanova. Dans les années 1080-1100, il est appelé « de Trimon », puis on le retrouve sous le nom de Cazas Novas, puis Cazanova en 1270. Jusqu&#146;au XIVe siècle, il a fonctionné en autarcie grâce à son activité viticole. Pendant la Révolution Française, le domaine a été morcelé. Toutefois, le développement intense des voies de communication a entraîné une culture généralisée de la vigne dans la région. Le mas sest dès lors immédiatement adapté en produisant du vermouth blanc. Le domaine a été récupéré plus tard par un prêteur qui a planté du raisin de table. En 1988, André Leenhardt a repris le domaine, sinscrivant dans la logique de lappellation Coteau-du-Languedoc Pic-Saint-Loup, afin de restructurer le vignoble. Après quatre ans de travaux, 1991 marque enfin le premier millésime du château  Cazeneuve André Leenhardt - Vigneron en Pic Saint Loup.","architecture":"Cazeneuve, Vieille bâtisse du IXe siècle deux grands corps de logis en équerre à deux niveaux et attiques sur le corps  de logis  côté sud flanqué de deux tours carrées hors uvres à toits pointus, l'ensemble est fermé par les dépendances et courtines.","habitants":"Famille d' André Leenhardt\r\n        \"","divers":"Château de Cazeneuve à Lauret","gps":"","images":["../../jctruffet.com/image/image_34/34_Cazeneuve_1.jpg","../../jctruffet.com/image/image_34/34_Cazeneuve_2.jpg","../../jctruffet.com/image/image_34/34_Cazeneuve_3.jpg","../../jctruffet.com/image/image_34/34_Cazeneuve_4.jpg"]},"Consult_chateau_formulaire6ae4":{"id":"Consult_chateau_formulaire6ae4","dept":"34","canton":"Clermont l","commune":"Le Bousquet d","nom":"Cazilhac","type":"Château","periode":"XVI","histoire":"Trois château au Bousquet d'Orb, le Saint-Pierre, Cazilhac et Verrerie                                                 CAZILHAC,  château construit par les moines de l'abbaye bénédictine de Joncels, au XIIe siècle. Au XVe siècle  le domaine est entre  les mains de la famille de Lauzières de Thémines, et acheté en 1512 par les Peyrottes qui le reconstruisirent au cours du XVIe siècle. La terre est alors mentionnée comme une seigneurie. Le château est rasé en février 1627 sur ordre du duc de Montmorency, gouverneur du Languedoc. Les Peyrottes ne se découragent pas et reconstruisent un nouvel édifice.  Le descendant   Gabriel seigneur de Cazilhac, épouse  Hélène de Sarret, veuve elle épouse en 1610 Jean-Jacques de la Treille de Fozières, ils auront une fille Diane qui sera la mère du cardinal de Fleury qui séjourna à Cazilhac,  iIls conservent le domaine jusqu'à la Révolution. Passera par alliance aux Montagnol qui conserve le château jusqu'au règne de Louis-Philippe est acquis  par un industriel  de Lodève René Fournier dont la fille épouse Michel Chevalier économiste et homme politique (1806-1879), dont l'influence sur le domaine et son exploitation viticole est déterminante. Soucieux de productivité, Michel Chevalier fait notamment construire un aqueduc vers 1851 pour alimenter les jardins, irriguer les terres et amener l'eau à la ferme du château. À sa mort sans héritier mâle direct (il est père de quatre filles), son gendre, économiste et essayiste Paul Leroy-Beaulieu (1843-1916), reprend la propriété. Le château de Cazilhac entre ainsi par mariage dans la famille Leroy-Beaulieu qui le possède toujours.        VERRERIE transformé en maison de retraite EHPAD château de la Verrerie, est un établissement médicalisé situé à Le Bousquet-d'Orb.","architecture":"Cazilhac; les moines de Joncels construisent sur ce site une maison forte. L'époque de la construction est confuse du XIIe ou XIIIe siècle, cet édifice est le noyau du château visible aujourd'hui, reconstruisirent au cours du XVIe siècle.  Dominé par les crêtes de l'Escandorgue et du Méguillou, s'élève sur un éperon rocheux, corps de logis principal à trois niveaux, l'édifice est de taille moyenne, coiffé d'un toit à faible pente de tuiles creuses, cantonné à l'arrière de deux tours carrées, plus élevées que le corps principal, des bases et vestiges de baies sont des traces visibles de l'ancienne maison forte. Devant le château, vastes esplanade limitée sur les côtés par deux tours rondes vestiges de l'enceinte protégeant l'ancienne maison forte, des jardins en terrasse surplombent un paysage de prairies et de vignes.  Le château de Cazilhac est membre du conservatoire des jardins et paysages.      \r\nSaint-Pierre, manoir à trois niveaux avec attiques sur un pavillons carré, le corps de logis rectangulaire flanqué  d'un pavillon saillant sur la gauche, l'ensemble à toits pointus.\r\nVerrerie, Le décor extérieur de cet EHPAD privé est superbe, avec une belle façade et le fond verdoyant de la forêt domaniale des Monts d'Orb. L'intérieur du bâtiment est totalement différent, vétuste, peu fonctionnel, peu de lieux de vie, pas de confort et des chambres simples ou doubles équipées de douche à rebord. corps de logis rectangulaire à trois niveaux flanqué en façades d'une tour octogonal toiture en terrasse.","habitants":"Famille Leroy-Beaulieu\r\n        \r\n        \"","divers":"Au Bousquet d'Orb, château  de Saint-Pierre,de  Cazilhac et de la Verrerrie","gps":"","images":["../../jctruffet.com/image/image_34/34_Cazilhac_1.jpg","../../jctruffet.com/image/image_34/34_Cazilhac_2.jpg","../../jctruffet.com/image/image_34/34_Cazilhac_3.jpg","../../jctruffet.com/image/image_34/34_Cazilhac_4.jpg","../../jctruffet.com/image/image_34/34_Cazilhac_5.jpg","../../jctruffet.com/image/image_34/34_Cazilhac_6.jpg"]},"Consult_chateau_formulaire7245":{"id":"Consult_chateau_formulaire7245","dept":"34","canton":"Murviels les Béziers","commune":"Cazouls les Béziers","nom":"Cazouls_Béziers","type":"Château","periode":"XII-XVII","histoire":"Cinq  châteaux à Cazouls les Béziers;  château de Gauphine  du XIXe siècle, Savignac, celui de la commanderie  du XIIe siècle, celui de Rouvignac du XVIIe siècle transformé en hôtel restaurant par la famille de Guy et Constance de Saint-Victor et de Pignas.                CAZOULS les BEZIERS Le village garde également des traces de la période médiévale, où il fut entouré de remparts destinés à le protéger des invasions.                                                            SAVIGNAC le haut, modifié aux XVIIe et XVIIIe siècles.  La tour carrée et la courtine ouest, les restes des courtines et l'escalier, le plafond décoré de la salle Nord du premier étage.                        GAUPHINE  SCI La Gauphine, Société civile immobilière, a débuté son activité en août 1989. Alain Faucher est co-gérant de la société. Le siège social de cette entreprise est actuellement situé au château de la Gauphine.","architecture":"Cazouls les Béziers. Tour carrée et courtine ouest ; restes des courtines Est ; escalier ; plafond décoré de la salle Nord du premier étage : inscription par arrêté du 22 mars 1983  château de Savignac-le-Haut : tour romane du XIIe siècle au crénelage obturé ; plafond et escalier Renaissance. Hospice à l'emplacement d'un château.                                                                                              La Gauphine, avec chapelle du XVIe siècle.                                 Château de Rouvignac du XVIIe : belle façade du XIXe siècle chambres d'hôtes. Château de Pignas  scr viticole   Le dirigeant de la société groupement foncier agricole de Pignas est : Mme. de  Grandsignes Alyette, associé-gérant .","habitants":"Famille de Guy\r\n        \r\n        \"","divers":"Cazouls les Béziers ville fortifiée, commanderie,  château de la Gauphine, de Rouvignac  de Savignac et de Pignans","gps":"","images":["../../jctruffet.com/image/image_34/34_Cazouls_Beziers_1.jpg","../../jctruffet.com/image/image_34/34_Cazouls_Beziers_2.jpg","../../jctruffet.com/image/image_34/34_Cazouls_Beziers_3.jpg","../../jctruffet.com/image/image_34/34_Cazouls_Beziers_4.jpg","../../jctruffet.com/image/image_34/34_Cazouls_Beziers_5.jpg","../../jctruffet.com/image/image_34/34_Cazouls_Beziers_6.jpg","../../jctruffet.com/image/image_34/34_Cazouls_Beziers_7.jpg"]},"Consult_chateau_formulaired574":{"id":"Consult_chateau_formulaired574","dept":"34","canton":"Montagnac","commune":"Cazouls d","nom":"Cazouls_Hérault","type":"Château","periode":"XIV","histoire":"Cazouls d'Hérault, ville fortifié avec remparts et tours , et Nizas             CAZOULS, cest au cur du paisible village de Cazouls dHérault que le château, dit La commanderie des Templiers traverse le temps. Propriété de lordre des Templiers, le bâtiment recèle des bases médiévales. Outre le château où logeaient les chevaliers, la commanderie comprenait lenclos fermé qui abrite la « mesnie » ou bâtiment pour les visiteurs et personnel. Cest en 1312, lors de la suppression de lOrdre du Temple, que tous ses biens passent aux Hospitaliers de Saint-Jean de Jérusalem. En 1329 a lieu la visite du grand prieur de Saint-Gilles. À la fin du XIVe siècle, les chevaliers se retirent sur Pézenas et inféodent le château aux Dupuy, seigneurs de Mourèze. En 1634, Timothée de Monchal achète lancien donjon des Templiers. Sa fille, épouse Gaspard de Murviel, et en fait sa résidence principale. Dans le dernier quart du XVIIIe siècle, Ferdinand Spinola, doge de Gênes, sy marie avec lhéritière de Carrion. La co-seigneurie se maintient jusquà la Révolution. Au début du XXe siècle, le château appartient au comte de dEspous, dont les héritiers restaurent les bâtiments. Respecté par lensemble de ses propriétaires successifs le château de Cazouls a conservé toute sa richesse historique.\r\nAujourdhui, cest dans le plus grand respect architectural que le château souvre en résidence avec la mise en évidence des vestiges de lhistoire.\r\nA 4 Km  la commune de Nizas avec son château féodal à vocation viticole.","architecture":"C'est au coeur du paisible village de Cazouls d'Hérault que le château, dit la commanderie des Templiers, traverse le temps. La façade nord avec sa tour et sa tourelle d'angle ainsi que la toiture correspondante, le plafond à la française de la grande salle, la chapelle, les restes du mur d'enceinte avec son portillon et ses deux canonnières.                                                                          Nizas; féodal plus maison forte que château en forme de U à deux niveaux toitures en croupe pour le bâtiment central avec deux tours rondes en façade à toit légèrement incliné.","habitants":"Famille de Timothée de Monchal \r\n        \r\n        \"","divers":"Cazouls d'Hérault, ville fortifié avec remparts et tours , et le château de Nizas","gps":"","images":["../../jctruffet.com/image/image_34/34_Cazouls_Herault_1.jpg","../../jctruffet.com/image/image_34/34_Cazouls_Herault_2.jpg","../../jctruffet.com/image/image_34/34_Cazouls_Herault_3.jpg","../../jctruffet.com/image/image_34/34_Cazouls_Herault_4.jpg","../../jctruffet.com/image/image_34/34_Cazouls_Herault_5.jpg","../../jctruffet.com/image/image_34/34_Cazouls_Herault_6.jpg","../../jctruffet.com/image/image_34/34_Cazouls_Herault_7.jpg","../../jctruffet.com/image/image_34/34_Cazouls_Herault_8.jpg"]},"Consult_chateau_formulaire79dd":{"id":"Consult_chateau_formulaire79dd","dept":"34","canton":"St-Chinian","commune":"Cessenon sur Orb","nom":"Cessenon","type":"Donjon","periode":"X-XVI","histoire":"CESSENON,   au Xe siècle, un château appartient au vicomte  de Béziers. Garsinde, veuve du comte de Toulouse donne son château à l'abbaye de Saint Pons.  En 1130, l'abbaye inféode le château à une famille qui prend le nom de Cessenon. Vers 1207, durant la croisade des Albigeois, l' armées de Simon de Monfort attaque et détruit partiellement le château.  De Garsinde à sa fille Adelaïde, de Aton IV à sa femme Cécile de Provence, de Raymond de Trencavel à Hugues de Cessenon, seigneurs et rois convoitèrent le village.\r\n Mais au XIIIe siècle la guerre n'épargne pas Cessenon. Les Cathares ou Albigeois, Hérétiques occupaient le Midi de la France. Le pape Innocent III fait alors prêcher une croisade contre eux et en 1229 une armée conduite par Simon de Montfort, puis par Louis VIII opposa les croisés du nord aux seigneurs du midi. La période féodale se termine par le rattachement du Languedoc au domaine royal, la période royale commence. En 1247, Saint-Louis donne la seigneurie de Cessenon au sénéchal de Carcassonne Hugues d'Arcis. Pour Cessenon commence une époque néfaste opprimée par les baillis, les épidémies (la peste), les intempéries (destruction par le froid de la vigne et des oliviers). Au début du XVIe siècle, une vrai dynastie de châtelains héréditaires, les Fraissinet de Vessas voit le jour. Le village se relève, cependant le château pris et repris à plusieurs époques subit de nombreux outrages. Le passage des soldats équivaut chaque fois à un fléau dévastateur. Les plus grandes mutilations lui sont infligées en 1582 au cours des guerres de religion par les hommes du capitaine Bacon et en 1585 par Henri de Joyeuse. Dès 1640 et durant un siècle et demi la famille des princes de Condé de Conti jouissent de notre châtellenie. Après avoir été nommé par Louis XIII gouverneur du Languedoc, le comte de Provence frère de Louis XVI achète celle-ci. La Révolution le dépossède 5 ans après. La providence le dédommage: il deviendra le roi Louis XVIII.","architecture":"Cessenon,  posée sur un rocher, la tour surveille aujourd'hui le petit parc et ses passants, mais sa fonction première était l'observation de la plaine et de la rivière Org qui coule à ses pieds. Au XIIIe siècle, le château est reconstruit, de plan quadrangulaire, d'une hauteur de 13 mètres, on entre dans la tour par une porte romane, construite  au XIIIe siècle.  L'absence d'archère sur les parois. Le manque de trace de  trou de boulin. La disparition des créneaux et mâchicoulis. L'absence de bretèche et de latrines. Ce donjon indique l'emplacement de l'ancienne forteresse. L'horloge de la Tour sera installée au milieu du XVIIe siècle suite aux consolidations ou bien c'était qu'une tour de guet.  En 1633, la forteresse est démantelée sur ordre de Louis XIII . En 1985, le bourg de Cessenon prend le nom de Cessenon sur Orb.","habitants":"Famille de Fraissinet de Vessas\r\n        \"","divers":"Tour de Cessenon","gps":"","images":["../../jctruffet.com/image/image_34/34_Cessenon_1.jpg","../../jctruffet.com/image/image_34/34_Cessenon_2.jpg","../../jctruffet.com/image/image_34/34_Cessenon_3.jpg","../../jctruffet.com/image/image_34/34_Cessenon_4.jpg"]},"Consult_chateau_formulaire10e0":{"id":"Consult_chateau_formulaire10e0","dept":"34","canton":"St-Pons de Thomières","commune":"Cesseras","nom":"Cesseras","type":"Château","periode":"XIII-XV","histoire":"Trois châteaux à Cesseras celui de Cesseras , de Fauzan et la tour de Saint-Salvy.                                                                      CESSERAS, au XIe siècle la famille de Cesseras, en 1182 l'abbaye de St-Pons possède 1/4 du château. Au XIIIe siècle, au moment de la croisade contre les Albigeois, le seigneur Pierre-Raymond de Casseras accusé d'hérésie est dépossédé de ses biens et emprisonné à Carcassonne. En 1222 le fils Bernard Arnaud de Cesseras est dessaisie du château et de ses biens.  En 1255, Saint Louis donne Cesseras à Raimond II Trencavel, en dédommagement des biens confisquées par la couronne. C'est d'ailleurs dans le château seigneurial que serait mort cet avant-dernier des Trencavel, vers 1263, après avoir servi le roi de France lors de la septième croisade. Cesseras aurait accueilli, selon la légende, le dernier ressortissant de la lignée des Trencavel, Raymond II, qui serait mort dans le château seigneurial vers 1267. En 1298 Philippe le Bel roi de France donne la seigneurie à Guillaume Voisin fils du sénéchal de Carcassonne, en 1455  Louis de Panat seigneur de Cesseras vend la château à Bertrand de Coursier. Au XVIIIe siècle, le baron de Fabrezan avait la seigneurie entière et directe comme étant le mari d'Anne de Loubens.              Le village de Cesseras est le berceau familial de Nancy Fabre, révérende mère Mechtilde Fabre (Cesseras 1839/Lima 1919), supérieure principale des surs de St-Joseph de Cluny qui fonda au Pérou de nombreuses maisons d'éducation et qui reçut en marque de reconnaissance du gouvernement français les palmes d'Officier d'Académie en 1917.                                                     Chateau de Fauzan  à Cesseras  agriculture,  viticulture  dirigeant : Jean-philippe Bourrel","architecture":"Cesseras : installé au coeur du vignoble minervois,Le site du village, niché sous les premiers contreforts du Massif Central, est particulièrement séduisant, le vieux village conserve des vestiges de ses remparts à savoir tours et courtines. Il possède aussi quelques vieilles maisons aux fenêtres à meneaux et des éléments de l'ancien château, démantelé à partir de la Révolution : de plan en U à trois niveaux et attiques, deux tours rondes, dont une couronnée d'une couverture à tuiles vernissées. A voir dans ce village également, la tour St-Salvy du XIIIe siècle de plan carré.","habitants":"Famille de Cesseras\r\n        \"","divers":"Cesseras château de Cesseras, de Fauzan et la tour de Saint-Salvy","gps":"","images":["../../jctruffet.com/image/image_34/34_Cesseras_1.jpg","../../jctruffet.com/image/image_34/34_Cesseras_2.jpg","../../jctruffet.com/image/image_34/34_Cesseras_3.jpg","../../jctruffet.com/image/image_34/34_Cesseras_4.jpg","../../jctruffet.com/image/image_34/34_Cesseras_5.jpg","../../jctruffet.com/image/image_34/34_Cesseras_6.jpg"]},"Consult_chateau_formulaire815a":{"id":"Consult_chateau_formulaire815a","dept":"34","canton":"Clermont-l","commune":"Clermont-l","nom":"Clermont_Hérault","type":"Forteresse","periode":"XII","histoire":"CLERMONT L'HERAULT, au XIIe siècle, un membre de la famille de Guilhem, mentionné en 1130 en tant que seigneur de Clermont l'Hérault, prend conscience de la position stratégique du site et entreprend la reconstruction d'un ensemble fortifié. En effet, carrefour de différentes voies de circulation, notamment vers Bédarieux et sur les hauts cantons, il offrait également un point de vue imprenable sur toute la vallée de l'Hérault. C'est cette situation privilégiée qui propulsa l'expansion économique et démographique de Clermont l'Hérault. Installé sur la colline du Puech Castel, ce château domine depuis la commune et assurait pendant le Moyen-Age un rôle protecteur et défensif. Présentant un état de conservation relativement mauvais, le château aujourd'hui classé monument historique a subi à la fin du XXe siècle des travaux de restaurations.","architecture":"Le château féodal de Clermont l'Hérault a été construit au XIIe siècle sur le Puech Castel, sur le site d'une ancienne forteresse. Cette première muraille dont la position était idéale pour surveiller toute la plaine de l'Hérault . De ce premier édifice, seules les tours ont subsisté. Elles sont d'ailleurs aujourd'hui intégrées à des maisons et immeubles existants. Le site fut  abandonné au XVIe siècle après de nombreuses périodes de troubles pendant lesquelles il servit d'abri à la population. Aujourd'hui, s'il ne reste que peu de vestiges à l'intérieur de l'enceinte, la muraille reste tout de même impressionnante, avec ses 8 tours semi-circulaires bien conservées. Sa tour-donjon (ou Tour Guilhem) qui servait à l'époque de tour de guet, évoque encore cette place forte imprenable et semble encore défier quiconque voudrait attaquer Clermont l'Hérault. Demeurent également quelques salles voûtées et soubassements qui entraînent l'imagination dans les mystères du passé. Le donjon, l'enceinte et la tour font lobjet dune inscription au titre des monuments historiques depuis 1927.","habitants":"Famille des Guilhem\r\n        \r\n        \r\n        \"","divers":"Vestiges de la forteresse de Clermont-l'Hérault","gps":"","images":["../../jctruffet.com/image/image_34/34_Clermont_Herault_1.jpg","../../jctruffet.com/image/image_34/34_Clermont_Herault_2.jpg","../../jctruffet.com/image/image_34/34_Clermont_Herault_3.jpg","../../jctruffet.com/image/image_34/34_Clermont_Herault_4.jpg","../../jctruffet.com/image/image_34/34_Clermont_Herault_5.jpg","../../jctruffet.com/image/image_34/34_Clermont_Herault_6.jpg","../../jctruffet.com/image/image_34/34_Clermont_Herault_7.jpg","../../jctruffet.com/image/image_34/34_Clermont_Herault_8.jpg","../../jctruffet.com/image/image_34/34_Clermont_Herault_9.jpg"]},"Consult_chateau_formulaire24ef-2":{"id":"Consult_chateau_formulaire24ef-2","dept":"34","canton":"Olargues","commune":"Colombières sur Orb","nom":"Colombières_Orb","type":"Vestiges","periode":"XIV-XVII","histoire":"A Colombières-sur-Orb, deux châteaux celui de Battut dit la tour carrée  du XIVe siècle et le château féodal  du XVIIe siècle.                             BATTUT, le château dit de Caroz, le Carous est au XIIe siècle possession des vicomtes de Carcassonne, en 1338, Guillaume de Carous.  Le village fut aussi un fief de la famille de Caylus. En novembre 1389, Marguerite de 'Carombes', fille de Pierre de Brusques  et , petite-fille de Guillaume de Carous et de Colombières, épousa Raymond de Caylus, quatrième du nom, fils de Déodat II, en 1408, dans la maison des Claps, dont il prit alors possession.    Le Château-Donjon du Battut appartient à la commune.  Le château actuel de Colombières  construction  du XVIIe siècle, fut un projet de Pierre Caylus III du nom, (arrière petit-fils de Raymond). Il était seigneur de Colombières et du Rouairoux, guidon de la compagnie de gendarmes de Guillaume, vicomte de Joyeuse en 1575, gouverneur de la ville de Saint-Pons-de-Thomières en 1585, chevalier de l'ordre du Roi, gentilhomme ordinaire de sa cour et chevalier de l'ordre de Saint-Michel en 1593. Son fils unique, François, issu de son second mariage avec Aldonce de Peyrusse, dame de Boisseson de Matviel, fut  le premier à y habiter. Cette branche familiale de Caylus, seigneurs de Colombières et aussi de Madalet, possédant entre autres les seigneuries de Rouairoux et d'Olargues, puis chevaliers de l'ordre de Saint-Louis, marquis et barons de Venez et des états du Languedoc s'est  éteinte lors du décès du dernier marquis de Caylus. Au cours du XVIIIe siècle, la terre de Colombières fut acquise par la famille d'Astruc, devenue citoyenne au cours de la Révolution.                                                                                    COLOMBIERES SUR ORB  Propriété de la famille Martin-Salavin depuis 200 ans.","architecture":"Battut, la tour-carrée, seul  vestige du château de Caroz, donjon du XIVe siècle du castrum de Carous et sa cascade appelée « le voile de la mariée ».\r\n Ce donjon fait l'objet d'un travail de restauration (2014). Il date du XIVe siècle. Son architecture est féodale. Le château actuel de Colombières  dont la construction remonterait à la première moitié du XVIIe siècle, construction rectangulaire  à trois niveaux toitures en croupes flanqué de deux  tours rondes, ce domaine situé au pied du Mont Caroux, permet de découvrir un des plus beaux cadres du Languedoc Roussillon. Les terres du château sont dominées par une tour du XIIe siècle, entourées de bois centenaires de chênes vert et bordées d'un ruisseau où salternent gouffres et cascades naturelles. Le château de Colombières est une société qui est située au  château dans la ville de Colombières sur Orb. Cette entreprise exerce son activité dans le domaine suivant :  chambres d'hôtes  et pratique de la pêche et de la chasse.","habitants":"Famille Martin-Salavin \r\n        \r\n        \"","divers":"Colombières sur Orb; le château de Colombière, la tour de Battut","gps":"","images":["../../jctruffet.com/image/image_34/34_Colombieres_Orb_1.jpg","../../jctruffet.com/image/image_34/34_Colombieres_Orb_2.jpg","../../jctruffet.com/image/image_34/34_Colombieres_Orb_3.jpg","../../jctruffet.com/image/image_34/34_Colombieres_Orb_4.jpg","../../jctruffet.com/image/image_34/34_Colombieres_Orb_5.jpg","../../jctruffet.com/image/image_34/34_Colombieres_Orb_6.jpg","../../jctruffet.com/image/image_34/34_Colombieres_Orb_7.jpg","../../jctruffet.com/image/image_34/34_Colombieres_Orb_8.jpg"]},"Consult_chateau_formulairee5f1":{"id":"Consult_chateau_formulairee5f1","dept":"34","canton":"Pézenas","commune":"Pézenas","nom":"Conas_Fondouce","type":"Château","periode":"XVII","histoire":"CONAS, la seigneurie du lieu sera partagée à partir du milieu du XIIIe siècle entre la famille de Conas et diverses lignées alliées avant de passer en 1388 à Bertrand de Cases et d'entrer  dans les titres des Lauzières puis des Thézan-Poujol par le mariage en 1606, de Raymond de Thézan-Poujol avec Antoinette d'Avanson, fille de Marguerite de Lauzières, ils resteront seigneurs de Conas jusqu'en 1791. A cette date, le château et  le domaine, confisqués pour fait d'émigration  sur le nom de Jean-François-Béranger de Thézan  Poujol, sont vendus comme biens nationaux. La famille Mel, de Pézenas, s'en portera ensuite acquéreur au cours du XIXe siècle.                                                                                                    FONDOUCE, le site de Fondouce est connu depuis la plus haute antiquité comme l'attestent les vestiges de l'habitat datant du 1er âge de fer, situé sur le domaine. En 1615, une des métairies a appartenu à Antoine d'Agde, puis en 1665, la métairie et les terres deviendront propriété d'Henri de Carrion de Nizas. En 1806, c'est la famille Maigret de Pézenas qui l'achètera, avant que Jean-Jacques Guillaume Costes ne l'acquière en 1825 c'est lui qui l'équipera de 36 foudres en chêne du Nord de 220 hectolitres chacun, qu'il fit venir de Sète. La demeure a été reconstruite en 1834 comme l' indique le chronogramme inscrit sous le fronton du corps central. Les ailes ont été élevées en 1922 à l' imitation du bâtiment préexistant. Le vestibule sur lequel s' ouvre un escalier de bois d' inspiration  du XVIIe siècle aurait été dessiné, selon une tradition locale, par l' architecte bordelais Louis Garros, auteur à la fin du XIXe siècle, de nombreux châteaux dans le Biterroirs et le Narbonnais. Ce château connut alors diverses transformations, dont les dernières ont été réalisées en 1834 et 1922. De 1890 à 1940, une distillerie y fonctionnera, avant d'être prise par les allemands (lors de la seconde guerre mondiale).","architecture":"Le château des Conas  actuel date des XVIIe - XIXe siècle. Il ne reste plus rien du château datant d'avant le XVIIe siècle. il apparaît dès 1140 comme un village déjà constitué, avec son enceinte fortifiée (reconstruite en 1367) et son église paroissiale dédiée à Saint Martin. En 1446, la population de Conas est réduite à quatre familles et les habitants, ne pouvant subvenir à sa garde et au paiement des tailles et charges, signent avec la communauté de Pézenas une transaction aux termes de laquelle ils consentent à la réunion de leur terroir à celui de Pézenas. L'escalier rampe sur rampe avec coupoles en pendentifs sur les paliers, logé dans une tour formant corps central, a été conçu d'après les modèles piscénois de la maison consulaire et de l'hôtel Bazin de Bezons. L'aile comprend deux salles couvertes l'une d'un berceau plein cintre,  l'autre d'une voûte d'arêtes.  Au cours de la seconde moitié du XIXe siècle, la demeure a reçu  un habillage néo-gothique (mâchicoulis, hautes échauguettes d'angle et crénelage) supprimé en grande   partie en 1936.                                                                      Le site de Fondouce  Il s'agit du domaine actuel possédé plus tard, le château connut diverses transformations au cours des siècles dont la dernière date de 1834. Un corps de logis de plan rectangulaire à quatre niveaux, toiture en croupe, en façade pavillon saillant avec fronton au niveau de la toiture, deux ailes aux extrémités du bâtiment à deux niveaux avec terrasses .","habitants":"Famille de  Raymond de Thézan Poujol                                                 Famille de Jean-Jacques Guillaume Costes\r\n        \"","divers":"A Pézenas outre les autres châteaux, le château de Conas et de Fondouce (abbaye)","gps":"","images":["../../jctruffet.com/image/image_34/34_Conas_Fondouce_1.jpg","../../jctruffet.com/image/image_34/34_Conas_Fondouce_2.jpg","../../jctruffet.com/image/image_34/34_Conas_Fondouce_3.jpg","../../jctruffet.com/image/image_34/34_Conas_Fondouce_4.jpg","../../jctruffet.com/image/image_34/34_Conas_Fondouce_5.jpg","../../jctruffet.com/image/image_34/34_Conas_Fondouce_6.jpg","../../jctruffet.com/image/image_34/34_Conas_Fondouce_7.jpg","../../jctruffet.com/image/image_34/34_Conas_Fondouce_8.jpg","../../jctruffet.com/image/image_34/34_Conas_Fondouce_9.jpg"]},"Consult_chateau_formulairef534":{"id":"Consult_chateau_formulairef534","dept":"34","canton":"Murviel les Béziers","commune":"Murviel les Béziers","nom":"Coujan","type":"Château","periode":"XVII","histoire":"COUJAN, est cité dès 966 : Matfred, vicomte de Narbonne et Adélaïde sa femme, donnent Coujan et son église à son fils Raymond. Les comtes de Toulouse possèdent des biens à Coujan : la comtesse Garsende les donne à l'église Saint-Pierre de Cessenon vers 972. Coujan entre dans le patrimoine du chapitre Saint-Nazaire de Béziers à une époque indéterminée. Une bulle du pape Eugène III (1153) leur en confirme la propriété. Les seigneurs de Murviel sont propriétaires de la métairie de Coujan sous l'ancien régime, le chapitre de Béziers reste propriétaire du prieuré. En 1806, Coujan devient propriété de Louis Mailhac, le domaine est vendu  en 1868 à la famille Guy  qui le possède toujours transformé en domaine  viticole.","architecture":"La chapelle a subi des dégâts importants pendant les guerres de religion. Elle est remaniée au XVIIe siècle. Le château possède encore quelques éléments anciens : une baie géminée, une fenêtre Renaissance et des ouvertures datables des XVIIe et XVIIIe siècles, C'est à cette époque qu'une grande cave, à trois vaisseaux est construite contre la cave primitive.","habitants":"Famille de Louis Mailhac\r\n        \"","divers":"Château de Coujan à Murviels les Béziers.","gps":"","images":["../../jctruffet.com/image/image_34/34_Coujan_1.jpg","../../jctruffet.com/image/image_34/34_Coujan_2.jpg","../../jctruffet.com/image/image_34/34_Coujan_3.jpg"]},"Consult_chateau_formulaire9978":{"id":"Consult_chateau_formulaire9978","dept":"34","canton":"St-Gély du Fesc","commune":"St-Gély du Fesc","nom":"Coulondres","type":"Château","periode":"XVII","histoire":"COULONDRES, le mas d'Euzet de Saint-Gély-du-Fesc existait déjà en 1406, comme le montre le contrat de mariage d'Aymoin Euzet  ; c'est probablement le même mas qui est signalé par Germain en 1404 . Il est donc probable qu'il existait auparavant, tout au moins au XIVe siècle. La famille Euzet  y habitait et en était propriétaire. En 1469, André Coulondres, Antoine André et son frère, Pierre André, sont les héritiers du \"mas d'Euzet\". Rester dans cette famille jusqu'au 7 janvier 1680, \"messire Jean Paul de Girard, chevalier, seigneur de Coulondres, président, trésorier de France de Montpellier\" fait baptiser son fils Claude Gaspar, sur les fonds baptismaux de l'église de Notre-Dame-des-Tables, à Montpellier. Cet acte montre bien que la cession aux de Girard était complètement accomplie à cette date, un peu moins d'un siècle après le contrat de 1592. Rester dans cette famille.","architecture":"La visite du mas montre que le château a été bâti sur le mas précédent, du moins pour le rez-de-chaussée où l'on peut retrouver une partie des murs très épais de ce mas. Il semble donc que les murs actuels aient été \"plaqués\" sur les murs anciens. La photographie inédite  montre le château encore inachevé, la chapelle en moins.","habitants":"Famille d' André Coulondres\r\n        \"","divers":"Château de Coulondres à St-Gély sur Fesc.","gps":"","images":["../../jctruffet.com/image/image_34/34_Coulondres_1.jpg","../../jctruffet.com/image/image_34/34_Coulondres_2.jpg","../../jctruffet.com/image/image_34/34_Coulondres_3.jpg","../../jctruffet.com/image/image_34/34_Coulondres_4.jpg","../../jctruffet.com/image/image_34/34_Coulondres_5.jpg","../../jctruffet.com/image/image_34/34_Coulondres_6.jpg"]},"Consult_chateau_formulaire76f0":{"id":"Consult_chateau_formulaire76f0","dept":"34","canton":"Pignan","commune":"Cournonterral","nom":"Cournonterral","type":"Château-tours","periode":"XI-XVIII","histoire":"COURNONTERAL;  en 1365 et 1373 Charles V accordent des lettres de sauvegarde aux Cournonterralais. Il les prend \"en sa spéciale protection et sauvegarde\" et leur permet d'apposer \"les armes du Roy, fleurs de lis et panonceaux royaux dans les lieux et endroits où ils seront troublés\".En 1395, est annexé à la couronne de France. La Réforme (1560-1598), qui les a entraînés dans les luttes de religion, fait son entrée officielle au village en 1561. En 1609, Cournonterral devient vassal des évêques de Montpellier. Au XVIIIe siècle, ils combattent avec succès de 1772 à 1793 pour sauver leur patrimoine collectif de l'avidité d'un notable. Lors de la Révolution Française, les citoyens de la commune se réunissent au sein de la société révolutionnaire, baptisée « société populaire républicaine », fin 1791.                                                              MALLET, Le château fût durant des siècles, la résidence d'été des évêques de Lodève jusqu'à la Révolution Française. Par la suite, les industriels du textiles lodévois assurent la gestion du domaine et cest en 1922 quAugustin Mallet rachète la propriété pour la transformer en exploitation viticole jusquau début des années 1980, lui donnant lappellation de château Mallet, en fait un centre aéré Pôle Jeunesse ALSH ado et salles pour réception.","architecture":"Bâti pour la première fois au XIe et XIIe siècles, lensemble fortifié de Cournonterral était situé au sommet de la butte surplombant le Coulazou ( sur un lieu doccupation antique, près dune source abondante). Cest de cette époque que date les deux principaux vestiges du château, la tour Sarrasine et la tour située près du manoir (les deux tours restantes dun ensemble ). Fortifiée et reconstruite au cours des siècles au XIVe et au XVIe siècle, lenceinte fut en grande partie détruite par un affaissement de terrain à la fin du XVIIe siècle. Se dressant toujours aussi fièrement au dessus du village, les deux tours sont situées au coeur du vieux village  L'enceinte des remparts de 1344, réparée et fortifiée en 1393 avait 6 tours et 2 tourelles. Au XVIIe siècle, l'ouverture d'une porte provoqua l'effondrement du rempart au nord et à l'est.\r\nLe château Mallet date du XVIIIe siècle, corps de logis rectangulaire à deux niveaux flanqués de pavillons carrés en angles à toits pointus.","habitants":"Famille d'Augustin Mallet\r\n        \"","divers":"Vestiges de la forteresse de Cournonterral et le château de Mallet","gps":"","images":["../../jctruffet.com/image/image_34/34_Cournonterral_1.jpg","../../jctruffet.com/image/image_34/34_Cournonterral_2.jpg","../../jctruffet.com/image/image_34/34_Cournonterral_3.jpg","../../jctruffet.com/image/image_34/34_Cournonterral_4.jpg","../../jctruffet.com/image/image_34/34_Cournonterral_5.jpg","../../jctruffet.com/image/image_34/34_Cournonterral_6.jpg","../../jctruffet.com/image/image_34/34_Cournonterral_7.jpg"]},"Consult_chateau_formulaire95ae":{"id":"Consult_chateau_formulaire95ae","dept":"34","canton":"Salvetat d","commune":"Cros","nom":"Cros","type":"Manoir","periode":"XVI","histoire":"CROS, la situation du château du Cros, au cur de lhéritage Templiers et Hospitaliers transformé en hôtel restaurant. La seigneurie du Cros est restée sous dépendance directe des évêques de Lodève jusquen 1562. Lévêque René de Birague vendit la seigneurie du Cros à Jacques dAlbesquier, consul de Lodève de 1562 à 1586.  Il occupait le rang premier Consul lorsque en octobre 1585, la ville de Lodève fut prise par le duc de Montmorency. Jacques dAlbesquier traita avec le duc, puis complota contre lui et fut mis au secret à la Couvertoirade en 1586.  La seigneurie du Cros fut alors vendue à Pierre de Julien qui est à lorigine de la construction du château. Ancienne maison des évêques, la seigneurie du Cros était auparavant une maison à trois étages, une construction fort rare pour lépoque.  François de Julien, consul de Lodève, vendit le château du Cros à la famille de La Treilhe en 1627.  C ette famille était installée en Lodévois depuis 1430 date de la nomination de Pierre de La Treilhe comme évêque de Lodève. Jean-Jacques de La Treilhe, seigneur de Foziéres et du Cros entreprend dimportants aménagements du château actuel.\r\nEn 1723 Jean François de La Treilhe vend la seigneurie du Cros à Antoine de Mazeran, major général de cavalerie.    A partir de la Révolution en 1789 le château du Cros ne représente plus une seigneurie et devient une propriété de familles.","architecture":"Entièrement restauré par ses nouveaux propriétaires en 2007, le château du Cros est aujourdhui une table et un château dhôtes de charme situé entre montagne et mer (750 mètres daltitude) avec une table pleine de surprises et des suites et chambres de caractère.\r\n Sa situation au cur de lhéritage Templier, sur le plateau du Larzac, avec accès direct par lA75, en fait un lieu idéal pour des séjours conviviaux et festifs.  corps de logis rectangulaire à trois niveaux et attiques, flanqué d'une tour  ronde et d'une tour carrée l'ensemble au même niveau, prolongé par une aile de bâtiment sur l'arrière à deux niveaux de construction plus récente.","habitants":"Famille de La Treilhe\r\n        \"","divers":"Manoir le Cros","gps":"","images":["../../jctruffet.com/image/image_34/34_Cros_1.jpg","../../jctruffet.com/image/image_34/34_Cros_2.jpg","../../jctruffet.com/image/image_34/34_Cros_3.jpg","../../jctruffet.com/image/image_34/34_Cros_4.jpg","../../jctruffet.com/image/image_34/34_Cros_5.jpg","../../jctruffet.com/image/image_34/34_Cros_6.jpg"]},"Consult_chateau_formulairecce7":{"id":"Consult_chateau_formulairecce7","dept":"34","canton":"Clermont-Ll","commune":"De-Dio et Valquières","nom":"De_Dio","type":"Forteresse","periode":"XII-XVII","histoire":"DE-DIO,  forteresse du XIIe - XVIIe siècle. Lhistoire du château de Dio remonte à lépoque wisigothique située à lemplacement même du château. Pour autant, la construction du nouveau château commence au XIIe siècle, en pleine période romane, et nombre de vestiges encore présents datent de cette époque lointaine. Le château est la propriété des seigneurs de Boussagues. Laissé à labandon au fil du temps, le château devient propriété de la famille Fleury, les Fleury qui vont rester les seigneurs de Dio jusquau XIXe siècle. La famille Fleury transforme peu à peu le château pour en faire une demeure de plaisance, et son aspect définitif date de cette époque. Après la Révolution, le château va connaître une histoire mouvementée et passera aux mains de plusieurs propriétaires qui le laisseront à labandon.\r\nIl faudra attendre ces dernières années pour voir enfin des travaux de restauration menés par les nouveaux propriétaires, la caisse des monuments historiques ainsi quune association qui oeuvre désormais pour la remise en état complète de ce merveilleux site. Bertrand Fleutiaux a sauvé d'une mort certaine le château de Dio.","architecture":"le château de Dio de l'époque des Wisigoths une forteresse du XIIe siècle rénovée au XVIIe siècle par la famille du cardinal de Fleury. Son château du XIIe remanié à la Renaissance et sous Louis XII, aux portes plein cintre et fenêtre géminée, son église et portail Ouest décoré de triangles bichromes. abandonné,  il n'y avait plus de toiture, plus de plancher, juste des murs. La direction régionale des affaires culturelles était sur le point de le classer en ruine. Dix-sept ans plus tard, les travaux ne sont pas tout à fait terminés. Mais le château revit. Pour réussir à boucler son budget, le propriétaire a monté un projet intégrant les petites maisons autour du château, transformées en gîtes, café, restaurant.","habitants":"Famille Fleury\r\n        \"","divers":"Forteresse de Dio à De-Dio et Valquières","gps":"","images":["../../jctruffet.com/image/image_34/34_De_Dio_1.jpg","../../jctruffet.com/image/image_34/34_De_Dio_2.jpg","../../jctruffet.com/image/image_34/34_De_Dio_3.jpg","../../jctruffet.com/image/image_34/34_De_Dio_4.jpg","../../jctruffet.com/image/image_34/34_De_Dio_5.jpg","../../jctruffet.com/image/image_34/34_De_Dio_6.jpg","../../jctruffet.com/image/image_34/34_De_Dio_7.jpg","../../jctruffet.com/image/image_34/34_De_Dio_8.jpg"]},"Consult_chateau_formulaire7762":{"id":"Consult_chateau_formulaire7762","dept":"34","canton":"Pignan","commune":"Fabrégues","nom":"Fabrégues","type":"Château","periode":"XII-XIV","histoire":"Trois châteaux à Fabrègues, ville fortifiée,  le château d'Agnac, la commanderie de Launac et le vieux  Mujolan.                                  AGNAC,  monsieur Daniel Salas, a  transformé le château en commerce depuis 30 ans.\r\nLAUNAC  chambres d'hôtes,  véritable mémoire du passé médiéval de notre région, la commanderie a vu le jour au XIIe siècle grâce aux Templiers,   puis propriété des chevaliers de Malte, reconstruite au XIVe par les Hospitaliers, elle a pris sa forme définitive aux XVIe et XVIIe siècle, elle fut vendue comme bien national à la Révolution. Aujourd'hui chambres d'hôtes.\r\nMUJOLAN au XIIe siècle, date à laquelle est érigé le donjon à la limite du massif de la Gardiole, cette bâtisse sera la résidence des seigneurs de Fabrègues pendant plusieurs siècles,  sera racheté au début du XVIIIe siècle par Alexandre Brondel de Roquevaire. L'une de ses descendantes, Sylvie, décide en 1850 de faire construire sur la plaine et au milieu des vignes une ferme modèle d'une centaines d'hectares de terres. Ces bâtiments vont prendre le nom de mas de Mante, plus communément connu sous le nom de Domaine de Mujolan.","architecture":"Fabrègues, portes fortifiées, maisons médiévales et Renaissance.\r\nChâteau d'Agnac  : site préhistorique occupé ensuite par les Romains.\r\nChâteau de Launac  : site préhistorique occupé ensuite par les Romains. \r\nHameau de Mujolan, château du vieux Mujolan et restes de la chapelle. Composé d'une maison de maître (23 pièces sur 3 étages) encadrée par la cave d'un côté (85 m) et les écuries de l'autre, ces bâtiments sont aujourd'hui conservés à l'identique depuis cette époque. Viticole.\r\nLe domaine avec la tour et le bâtiment de l'ancien prieuré qui lui est directement accolé au Sud (excepté les bâtiments et hangars ajoutés à l'Ouest et au Nord),","habitants":"Famille d'Alexandre Brondel de Roquevaire\r\n        \r\n        \"","divers":"Fabrègues, ville fortifiée,  le château d'Agnac, la commanderie de Launac et le vieux  Mujolan.","gps":"","images":["../../jctruffet.com/image/image_34/34_Fabregues_1.jpg","../../jctruffet.com/image/image_34/34_Fabregues_2.jpg","../../jctruffet.com/image/image_34/34_Fabregues_3.jpg","../../jctruffet.com/image/image_34/34_Fabregues_4.jpg","../../jctruffet.com/image/image_34/34_Fabregues_5.jpg","../../jctruffet.com/image/image_34/34_Fabregues_6.jpg"]},"Consult_chateau_formulaire42f5":{"id":"Consult_chateau_formulaire42f5","dept":"34","canton":"Lunel","commune":"Lunel-Viel","nom":"Farges_Lunel","type":"Château","periode":"XVII","histoire":"FARGES, en 1600 la propriété appartient à Jacques de Farges, apothicaire et parfumeur de Montpellier, le dernier des Farges se pendit aux poutres fumantes de son magasin en 1789 (à moins qu'on ne l'y eut accroché). Depuis la fin du XVIIIe siècle , la tour de Farges appartient à la famille Sabatier d'Espeyran.\r\nFrançois Sabatier propriétaire au cours du XIXe siècle, était un de ces amateurs d'art qui, comme Fabre, Bruyas, Valedeau et quelques autres, avait su lier amitié avec des artistes de talent qui se mirent à fréquenter le château, puis François épouse la célèbre cantatrice viennoise Caroline Ungher qui vient s'installer au château . Les frères Devéria, Dominique Papety, et Gustave Courbet viennent souvent. Caroline Ungher donnait des représentations lyriques dans le parc. Jules Michelet et Karl Marx séjournèrent au château et Jeanne Cros y prit sa retraite.\r\nLa descendante de Sabatier d'Espeyran et son mari vivent au domaine et ne souhaitent pas de visites, mais l'accès à la zone commerciale viticole permet de bien voir les bâtiments qui ont bien besoin d'être restaurés.","architecture":"FARGES,De l'ancien château, il ne reste que 2 tours, dont l'une fut un pigeonnier. La troisième qui orne le domaine date du XIXe siècle et fut une tour du réseau de télégraphe Chappe.  corps de logis en forme de U à deux niveaux à toits presque plats flanqué d'une tour ronde avec toiture à plusieurs  pans avec collerettes à la base.","habitants":"Famille de  Jacques de Farges\r\n        \r\n        \"","divers":"Château de la Farges à Lunel","gps":"","images":["../../jctruffet.com/image/image_34/34_Farges_Lunel_1.jpg","../../jctruffet.com/image/image_34/34_Farges_Lunel_2.jpg","../../jctruffet.com/image/image_34/34_Farges_Lunel_3.jpg","../../jctruffet.com/image/image_34/34_Farges_Lunel_4.jpg","../../jctruffet.com/image/image_34/34_Farges_Lunel_5.jpg","../../jctruffet.com/image/image_34/34_Farges_Lunel_6.jpg","../../jctruffet.com/image/image_34/34_Farges_Lunel_7.jpg","../../jctruffet.com/image/image_34/34_Farges_Lunel_8.jpg","../../jctruffet.com/image/image_34/34_Farges_Lunel_9.jpg"]},"Consult_chateau_formulaire04e2":{"id":"Consult_chateau_formulaire04e2","dept":"34","canton":"Montpellier","commune":"Montpellier","nom":"Flaugergues","type":"Château","periode":"XVIII","histoire":"FLAUGERGUES,    construit à la fin du XVIIe siècle, Flaugergues est l'une de ces demeures appelées \"folies\" édifiées dans la campagne montpelliéraine, elles sont le fait d'une nouvelle aristocratie enrichie au service du roi. Situées au milieu du domaine rural, elles sont entourées de magnifiques jardins. Elles deviennent ainsi les résidences d'été des notables de Montpellier au XVIIIe siècle.  Propriété de famille depuis 1696, Etienne de Flaugergues, conseiller au parlement de Toulouse et à la cour des comptes de Montpellier, fait l'acquisition d'un domaine auquel il donnera son nom. Pendant 45 ans, il agrandit et embellit cette \"maison des champs\" pour lui donner son aspect définitif, en 1793 le domaine revient à un neveu des derniers propriétaires le comte Henri de Colbert descendant du ministre de Louis XIV. Henri et Brigitte de Colbert y reçoivent aussi les visiteurs pour leur faire partager lhistoire de la famille, leur passion du beau, du bon, de la vigne et des arts. En 1811 passe par héritage aux Boussairolles grande famille de conseillers à la cour des comptes. A l'extinction de la famille de Boussairolles, le château passe à la famille Barthelémy de Saizieu. Dans la ville de Montpellier sur un terroir deux fois millénaire, Le château de Flaugergues est un cadre prestigieux pour organiser séminaires et réceptions. Aujourd'hui propriété  du baron de Saizieu.","architecture":"Flaugergues, la terrasse devant le château qui présente un aspect classique, vaste parallélépipède à trois niveaux, flanqué d'un pavillon à chacun de ses angles côté jardin la porte d'entrée avec colonnes doriques,  des balcons en fer forgé sur  la partie centrale des pavillons d'angle, toitures en tuiles à la romaine légèrement incliné,  dépouillé et laisse le soin du décor à l'architecture et aux sculptures parmi lesquelles deux statues en pierre par Guyon (1728), la Paix et l'Abondance situées de part et d'autre du perron. Le parc  au sud-ouest du château. Il s'agit d'un jardin à l'anglaise, jardin botanique créé en 1850 avec le triple souci du décor floral, de l'exotisme et de la priorité donnée aux grands arbres qui s'étend sur trois hectares. Les vignes, autrefois situées autour du château, sont aujourd'hui  implantées à l'est.","habitants":"comte Henri de Colbert\r\n        \r\n        \"","divers":"Château de Flaugergues à Montpellier","gps":"","images":["../../jctruffet.com/image/image_34/34_Flaugergues_1.jpg","../../jctruffet.com/image/image_34/34_Flaugergues_2.jpg","../../jctruffet.com/image/image_34/34_Flaugergues_3.jpg","../../jctruffet.com/image/image_34/34_Flaugergues_4.jpg","../../jctruffet.com/image/image_34/34_Flaugergues_5.jpg","../../jctruffet.com/image/image_34/34_Flaugergues_6.jpg"]},"Consult_chateau_formulaire71a8":{"id":"Consult_chateau_formulaire71a8","dept":"34","canton":"Lodéve","commune":"Fozières","nom":"Fozières","type":"Forteresse","periode":"XII-XVII","histoire":"FOZIERES,    Possession de la famille de Fozières vers lan 1000, le château est entré, au XVe siècle, dans lhistoire des Latreilhe  qui appartenait aussi les châteaux du Cros, de Sorbs, de Pégairolles.   ancienne demeure seigneuriale batie au XIIe siècle par la famille de Fozières qui a donné son nom au village. Elle a été modifiée au XVIIe siècle et aujourd'hui inscrite au registre des monuments historiques. Les documents publics ne comportent, hélas, aucune péripétie notable concernant cet édifice ou ceux qui l'ont édifié.","architecture":"Castrum de Fozières mentionné à partir de 1031 ; les tours en place du château fort pourraient dater du XIIIe siècle ;    grand logis aménagé au XVIIe et au XVIIIe siècle. Deux étages carrés, gros-oeuvre : calcaire ; grès;   pierre de taille ; enduit partiel, type de couverture : toit à longs pans ; croupe recouvert en tuiles creuses.  La tour médiévale domine le village de ses 30 m de hauteur.","habitants":"Famille de Fozières\r\n        \r\n        \"","divers":"Forteresse de Fozières","gps":"","images":["../../jctruffet.com/image/image_34/34_Fozieres_1.jpg","../../jctruffet.com/image/image_34/34_Fozieres_2.jpg","../../jctruffet.com/image/image_34/34_Fozieres_3.jpg","../../jctruffet.com/image/image_34/34_Fozieres_4.jpg","../../jctruffet.com/image/image_34/34_Fozieres_5.jpg","../../jctruffet.com/image/image_34/34_Fozieres_6.jpg"]},"Consult_chateau_formulaire4d18":{"id":"Consult_chateau_formulaire4d18","dept":"34","canton":"Frontignan","commune":"Frontignan","nom":"Frontignan","type":"Château","periode":"XVI-XVIII","histoire":"Quatre châteaux viticoles à Frontignan; de la Peyrade, de Stony , de Peyssonnie et la maison Voltaire.                                       FRONTIGNAN;  au XIe siècle : premier édifice, l'église et sa tour de guet. Frontignan dépendait du diocèse de Maguelone; en1204 : à la suite du mariage de Marie de Montpellier, Frontignan est rattachée à la maison de Barcelone, en 1349 : la ville revient à la couronne de France, en 1361 : Frontignan est pris par des routiers commandés par Seguin de Badefol et partiellement détruite, en 1560 :  attaquée et pillée par les protestants, en 1629 : le cardinal de Richelieu assiste au premier tournoi de joutes nautiques tenues à Frontignan. Le 16 juin 1642 : le roi Louis XIII et Richelieu se retrouvent.                                                                                PEYRADE, de Yves Pastourels viticole a été construit à la fin du XVIIIe siècle.  Propriété de monsieur Ratie, alors maire de la ville, le domaine devient vicomté quand son propriétaire fût anobli par Louis XVIII. Le vicomte de La Peyrade habita le château jusqu'en 1849.                                                                                      PEYSSONNIE, les origines de cette propriété, fondée par lévêché de Montpellier, remontent au XVIe siècle.  Au fil des siècles, le domaine a connu plusieurs propriétaires dont monsieur La Peyssonnie. Ce médecin spécialisé dans les maladies tropicales la rachète au début du XXe siècle et lui donne son nom. La famille Artassonne-Astruc devient propriétaire, après la deuxième guerre mondiale. André Astruc (72 ans), a été président du syndicat de défense du cru muscat de Frontignan jusquen 2010.                            STONY, En 1860, il crée le domaine de Stony (20 hectares) sur lemplacement de lancien domaine médiéval de Mattemale. Cest en 1854 que lancêtre savoyard Hippolyte Chavasse sinstalle à Sète pour établir sa fabrique de vermouth : aujourd'hui propriété d'Henri et Frédéric Nodet.\r\nVOLTAIRE, appartenait à une famille de négociant viticulteur frontignanais. La ville rachète l'ensemble des bâtiments en 1987 et ne conserve que cette maison, qu'elle dédie aux services municipaux.","architecture":"Frontignan 1362 : la ville est fortifiée : construction des remparts.  Maison Voltaire, cette demeure de maître construite à la fin de XIXe siècle, appartenait à une famille de négociant viticulteur frontignanais. En 1957, la propriété dominait le canal et comprenait trois chais, trois bureaux et deux maisons.  Devant, elle créée un joli jardin public: \"le parc Victor-Hugo\", en suivant les plans d'origine des premiers propriétaires.  Cette maison accueille au premier étage la salle Voltaire, salle polyvalente où ont lieu de nombreuses manifestations.\r\nStony, Il y achève en 1866 la construction dune maison bourgeoise dans le style architectural des « Folies du Languedoc ». Ses fils Jules et Paul prendront la suite de la fabrique et des entrepôts.                                Autre château viticole; la Peyssonnie pas de Gravure .                            La Peyrade petit manoir rectangulaire à deux niveaux toitures en croupes flanqué d'une tour carrée à toit pointu.","habitants":"Famille d'Yves Pastourels\r\n        \"","divers":"Quatre châteaux viticoles à Frontignan; de la Peyrade, de Stony , de Peyssonnie et la maison Voltaire.","gps":"","images":["../../jctruffet.com/image/image_34/34_Frontignan_1.jpg","../../jctruffet.com/image/image_34/34_Frontignan_2.jpg","../../jctruffet.com/image/image_34/34_Frontignan_3.jpg","../../jctruffet.com/image/image_34/34_Frontignan_4.jpg","../../jctruffet.com/image/image_34/34_Frontignan_5.jpg","../../jctruffet.com/image/image_34/34_Frontignan_6.jpg"]},"Consult_chateau_formulairee9d0":{"id":"Consult_chateau_formulairee9d0","dept":"34","canton":"Ganges","commune":"Ganges","nom":"Ganges","type":"Château","periode":"XIX","histoire":"GANGES, au Moyen-Age, Ganges prend son essor et crée sa physionomie architecturale que lon retrouve dans son tracé actuel. La vieille ville est caractéristique des villes cévenoles médiévales. Cest un dédale de ruelles étroites, de traverses voûtées, darcs, de jardins et cours en étage. La place Fabre dOlivet, anciennement place couverte abritait le marché médiéval. Aujourdhui on peut aller à la découverte des « chemins de traverses » qui relient les ruelles entre elles. Au passage, on pourra admirer une des neufs fontaines qui alimentaient la ville au XVIIIe siècle (rue Frédéric Mistral). \r\n Au n°27 de la grandrue lhôtel Bertrand de Maisonneuve a gardé laspect des demeures de ces aristocrates industriels quétaient les soyeux du XVIIe siècle.                                                            VALMARIE;   le domaine a été construit en 1870 par le vicomte de Rodez Bénavent. Initialement, le château était la maison secondaire de la famille qui habitait alors à Montpellier et venait profiter le week-end du charme du lieu, ainsi que du climat.","architecture":"Le « vieux » Ganges était un village médiéval entouré de murailles. Pour entrer dans la ville, il y avait 4 portes : la porte du Bouquié (face au pont de St Hippolyte du Fort), la porte de la Croix (face au Temple protestant), la porte du Four (Rue des Barrys), la porte de Laroque (que lon situe aujourdhui au n°21 rue Portail de Laroque).\r\nA lemplacement des halles actuelles se dressait le château (détruit en 1905). A côté de ce dernier se trouvait léglise dédiée à St Pierre construite au XIIe siècle.                                                            Le château de Val-Marie est une place forte des inscrite au titre des monuments historiques. Ancien poste de guet surveillant l'accès à la vallée de l'Hérault, cet édifice domine le village de Laroque, de construction rectangulaire à deux niveaux et attiques, flanqué de quatre tours rondes crénelées recouvertes d'une toiture presque plates. Protection L'escalier d'accès, les façades et toitures.","habitants":"Famille de  Bénavent vicomte de Rodez \r\n        \r\n        \"","divers":"Château de Val-Marie","gps":"","images":["../../jctruffet.com/image/image_34/34_Ganges_1.jpg","../../jctruffet.com/image/image_34/34_Ganges_2.jpg","../../jctruffet.com/image/image_34/34_Ganges_3.jpg"]},"Consult_chateau_formulaire6590":{"id":"Consult_chateau_formulaire6590","dept":"34","canton":"Lunel","commune":"Lunel","nom":"Gaucelm","type":"Vestiges","periode":"XIII","histoire":"GAUCELM, Bernard III dAnduze , duc dAquitaine, de Toulouse et de Septimanie, cest à dire Guilhem de Gellone, pour trisaïeul.  Les Gaucelm furent les seigneurs de la ville de 1007 à 1295 et ils prirent soin à ce que cette ville soit fortement développés, Gaucelm était son cousin. Le dernier seigneur de Lunel, Rosselin II, vendit en 1293, une partie de la baronnie de Lunel à un Juif nommé Thauros, ce que le pouvoir royal lui fit chèrement payer. Sans héritier direct, Rosselin légua ses possessions à un neveu par alliance, mais Philippe le Bel confisqua le domaine à son profit en 1295. Mais ces hostilités entre tous ces descendants de Guilhem au Courb-nez cessèrent en 1185. Et cest ainsi que la maison des seigneurs de Lunel devint au XIIIe siècle un lieu de rencontre privilégié pour les comtes de Toulouse, les comtes de Foix et les rois dAragon. Guilhem de Montanhagol.    Les Gaucelm possédaient pas mal de biens dans le village : La tour des prisons, la porte notre dame et enfin le château. Les Gaucelm furent les seigneurs de la ville de 1007 à 1295 et ils prirent soin à ce que cette ville soit fortement développés. Cependant au XIIIe siècle, Philippe le Bel s'installe sur ses terres et revoit selon ses gouts l'ancien château. Un troubadour a chanté Lunel, et sa dame, Gauserande, châtelaine
