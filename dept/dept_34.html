ais noyée dans des habitations accolées au XIXe siècle. Le portail du puits est le seul accès fortifié de cette période qui soit parfaitement conservé. Saint-Geniès est connu pour son célèbre clocher couvert de tuiles vernissées vertes. Edifié entre 1629 et 1635, il conserve dans ses murs les vestiges du clocher mur primitif ainsi quune cloche fondue en 1401,  il sagit de lune des plus anciennes cloches du département. Le village actuel est en forme dellipse, une des trois portes de fortification est toujours en place. En finalité, Saint-Geniès possède les vestiges de trois châteaux localisés bien distinctement : le castrum primitif (fin du XIe-début XIIe siècle), une tour romane et le château seigneurial du XVIe siècle. Adossé sur la muraille, ce dernier était pourvu dun système défensif adapté à lère du canon (tour talutée, canonnières à double embrasement, escarpe et contre-escarpe). Le château du XIVe siècle a été en partie remodelé au XVIIe siècle.","habitants":"Famille de Thézan\r\n        \r\n        \r\n        \"","divers":"Château de Saint-Geniès","gps":"","images":["../../jctruffet.com/image/image_34/34_St_Genies_1.jpg","../../jctruffet.com/image/image_34/34_St_Genies_2.jpg"]},"Consult_chateau_formulaire9757":{"id":"Consult_chateau_formulaire9757","dept":"34","canton":"Gignac","commune":"St-Guilhem le Désert","nom":"St_Guilhem","type":"Vestiges","periode":"XII-XVII","histoire":"A Saint-Guilherm le Désert en plus de la forteresse du Géant le château de Popian (voir article) et le château de Bellargua (voir article).                                                                                       Le GEANT de Gellone;  d'après la légende, un géant demeurant au château terrorisait la vallée de Gellone. Le chevalier Guilhem, appelé aussi Guillaume d'Orange délivra le village de ce géant. Le village prit le nom de Saint Guilhem le Désert.  Un jour, Guilhem, las de devoir gérer la peur que procurait le Géant sur les populations villageoises, décida de se déguiser en servante et de faire mine de transporter de leau au château pour aller combattre cet imposteur. Il se munit de « Joyeuse », son épée légendaire, et fit marche vers la forteresse. Lors de son parcours, la pie qui rodait dans les parages saperçut que la servante qui faisait route vers le château navait pas la même allure que dhabitude. Interpellé, loiseau reconnu Guilhem et sen alla avertir le Géant en ces termes :« Géant, ce nest pas ta servante qui vient tapporter de leau, cest Guilhem qui sen vient pour te tuer. Mais sûr de son fait et ne doutant pas de sa supériorité, le Géant ne tint pas compte des mises en garde de sa compagne et ouvrit la porte de sa forteresse. Sen suivit un âpre combat qui vit la victoire de Guilhem précipitant son adversaire au bas des falaises du château. La pie dépourvue, ayant perdu son protecteur, prit la fuite pour aller se cacher on ne sait où. Depuis ce jour, les habitants du village vivent en toute quiétude et bien que la vallée de Gellone soit fréquentée par de nombreuses espèces doiseaux, on ne revit jamais de pie.","architecture":"Elle défendait la vallée de lHérault et lentrée du cirque de lInfernet.\r\nDe cette fière forteresse il ne reste plus que des ruines qui dateraient du XIIe siècle. Laccès est un peu difficile mais le point de vue vaut la peine\r\nLa tour des prisons et le château du Géant, éléments de fortification et de défense du bourg.","habitants":"Chevalier Guilhem\r\n        \"","divers":"Vestiges du château du Géant à St Guilhem le Désert","gps":"","images":["../../jctruffet.com/image/image_34/34_St_Guilhem_1.jpg","../../jctruffet.com/image/image_34/34_St_Guilhem_2.jpg","../../jctruffet.com/image/image_34/34_St_Guilhem_3.jpg","../../jctruffet.com/image/image_34/34_St_Guilhem_4.jpg","../../jctruffet.com/image/image_34/34_St_Guilhem_5.jpg","../../jctruffet.com/image/image_34/34_St_Guilhem_6.jpg","../../jctruffet.com/image/image_34/34_St_Guilhem_7.jpg","../../jctruffet.com/image/image_34/34_St_Guilhem_8.jpg","../../jctruffet.com/image/image_34/34_St_Guilhem_9.jpg"]},"Consult_chateau_formulairec053":{"id":"Consult_chateau_formulairec053","dept":"34","canton":"Montpellier","commune":"St-Jean de Védas","nom":"St_Jean_Védas","type":"Château","periode":"XVIII","histoire":"Quatre châteaux à Saint-Jean de Védas; le Claud, le Castelet, le Lauze et le Terral ( voir article).                                                          ST-JEAN de VEDAS dit du Claud,  château de Saint-Jean, passé des mains des seigneurs de Sarret aux seigneurs de Vallat en 1680, a appartenu au marquis de Girard, descendant des Vallat jusqu'en 1782. A cette date, il a été vendu à madame de Vassal. Celle-ci l'a conservé durant la Révolution et ce n'est que vers 1810 qu'il a été acheté par le baron Huc. Les bâtiments étaient déjà vétustes. En 1855, le baron Huc ayant fait construire un château neuf dans le domaine du Claud, vendit à la municipalité le vieux château.                                                                                   CASTELET,   est aujourd'hui un établissement de santé bien connu et très apprécié. A l'origine, au début du XXe siècle,  il existait une maison d'habitation qui fut achetée par Augustin Albagnac, négociant en vins.                                                                     LAUZE,  remonte au XIIe siècle. il avait appartenu aux rois d'Aragon. la famille Leenhardt avaient eu cinq enfants : Roger qui avait épousé sa cousine germaine Juliette Listentein ; Pierre qui s'était marié avec sa cousine germaine Albertine Bazille ; Suzanne, la mère ; Délie qui avait épousé son cousin issu de germain Georges Castelnau et Marthe qui était devenue la femme de Charles Warnery, d'une famille suisse,   Il appartient ensuite à Charles Warnery, époux de Marthe Leenhardt. le domaine de la Lauze dont les bénéfices revenaient au Prévôt de Maguelonne. l'autre partie appartenait au seigneur de Montpellier, Jacques d'Aragon, roi de Majorque.","architecture":"St-Jean de Védas, en 1855, le baron Huc ayant fait construire un château neuf dans le domaine du Claud, vendit à la municipalité le vieux château. Celui-ci servit de mairie et d'école jusqu'en 1904, date à laquelle de nouveaux locaux ont été bâtis. Il a été alors démoli et la porte de la cour du château a été remontée pierre par pierre dans la propriété du baron Huc au Claud, ce château de forme quadrilatère à deux niveaux et attiques flanqué de tourelles rondes en angles à mâchicoulis mais ont perdus leurs toits en poivrières, pavillon saillant d'entrée de même niveau  avec fronton triangulaire.                                                                                  Castellet,   corps de logis rectangulaire à deux niveaux à toit brisé, flanqué de deux tours rondes aux angles de la façade  toiture en poivrière.","habitants":"marquis de Girard                                                                                Famille Leenhardt        \r\n        \r\n        \"","divers":"Saint-Jean de Védas; le Claud, le Castelet.","gps":"","images":["../../jctruffet.com/image/image_34/34_St_Jean_Vedas_1.jpg","../../jctruffet.com/image/image_34/34_St_Jean_Vedas_2.jpg","../../jctruffet.com/image/image_34/34_St_Jean_Vedas_3.jpg","../../jctruffet.com/image/image_34/34_St_Jean_Vedas_4.jpg"]},"Consult_chateau_formulaired336":{"id":"Consult_chateau_formulaired336","dept":"34","canton":"Montagnac","commune":"Montagnac","nom":"St_Martin_Garrigues","type":"Château","periode":"XVIII","histoire":"ST-MARTIN la Garrigue,  monsieur Jean Parret, au sud de Montpellier, en mer et garrigues, ce magnifique château Renaissance du XVIIIe siècle avec sa chapelle du  IXe siècle est protégé par 160 ha d'emprise foncière, dont 60 ha de vigne, et  lové dans un parc à la française de 3 ha. Le château Meunier Saint-Louis, un joyau des Corbières, a été acquis par le riche russe, Zao Praskoveyskoe. Le magnat slave est à la tête d?'une importante société dans le secteur viticole. Il est déjà propriétaire d?un château à Montagnac, près de Pézenas. Mais c'?est le français, Jean-Luc Parret qui gère  les affaires du businessman. Le château convient également pour des tournages de films, des mariages, des séances photos, en costume dépoque ou pas, et des séminaires.","architecture":"Le château Saint-Martin de la Garrigue de style Renaissance est lové dans un parc à la française. Récemment rénové par un architecte de renom international, la décoration est un mélange harmonieux dhistoire. Le château de forme rectangulaire à deux niveaux et attiques  flanqué sur sa façade avant d'un donjon carré  dépassant de deux étages l'ensemble accompagné  sur sa gauche d'une tourelle à toit pointu, et à droite un autre corps de logis  en travers formant un T, et sur l'arrière du bâtiment une tour ronde à toit plat.","habitants":"Monsieur Jean Parret\r\n        \"","divers":"Château de Saint-Martin de Guarrigues à Montagnac.","gps":"","images":["../../jctruffet.com/image/image_34/34_St_Martin_Garrigues_1.jpg","../../jctruffet.com/image/image_34/34_St_Martin_Garrigues_2.jpg","../../jctruffet.com/image/image_34/34_St_Martin_Garrigues_3.jpg","../../jctruffet.com/image/image_34/34_St_Martin_Garrigues_4.jpg"]},"Consult_chateau_formulaire449c":{"id":"Consult_chateau_formulaire449c","dept":"34","canton":"Pézenas","commune":"Pézenas","nom":"St_Martin_Graves","type":"Château","periode":"XIX","histoire":"Château Saint-Martin de Graves.    En 1274, une contestation au sujet du terroir de la paroisse de Saint-Martin de Valansaniscis nous renseigne sur la plus grande ancienneté du lieu, mentionné encore comme dîmerie en 1327 et prieuré dépendant de Pézenas en 1336. Au XVe siècle, la Grange de Saint-Martin est la propriété de Jean de Lauret, seigneur d'Aumes, et passe ensuite à son fils, Jean de Lauret, sieur de Carlencas, dont la fille Lucie épouse, vers 1535, Nicolas I de Graves, sieur de La Treille. Le domaine de Saint-Martin au-delà de l'Hérault, appelé aussi Saint-Martin-d'Aumes, entre à ce moment, avec les terres et la seigneurie, dans les biens des Graves qui les posséderont jusqu'en 1989. Le château actuel a été édifié vers 1891 par C. Marcadier, architecte montpelliérain, de style néo-Renaissance d'une assez grande qualité. le propriétaire : Roger Santa, ancien dpg de France Boissons, ex-directeur de Heineken France et à ce titre à l'origine de la création de la Heineken cup ( coupe de rugby européenne ). En 1999, il a un coup de cur pour cette magnifique propriété dans laquelle cet homme d'affaires averti mettra toute sa passion et son courage dans les travaux de rénovation. Cet endroit deviendra aussi le lieu de réception et de partage de tous ses amis, notamment des artistes. \r\nC'est dans cet endroit magique que Johnny Hallyday a découvert lui aussi les vins du Languedoc à Pézenas et s'est investi dans la célèbre cuvée Terre d'Aumes, qui porte sa signature.","architecture":"Le village de Saint-Martin de Grave, fortifié possédait deux châteaux appartenant un à la famille de Lauret et l'autre aux Thézan.\r\n A voir aussi le château de Saint-Martin de Graves appelé aussi Saint Martin d'Aumes.\r\nLa demeure est flanquée de deux tours circulaires empruntées aux châteaux de la Loire.le corps de logis rectangulaire à deux niveaux et attiques toit en croupe,  au-dessus du rez-de-chaussée, traité comme un soubassement à refends, Charles Marcadier a privilégié en manière d'avant corps les trois travées médianes de la façade par l'introduction d'un grand balcon en surplomb, d'un fronton sur la porte-fenêtre centrale.","habitants":"Roger Santa\r\n        \"","divers":"Château de Saint-Martin de Graves à Pézenas","gps":"","images":["../../jctruffet.com/image/image_34/34_St_Martin_Graves_1.jpg","../../jctruffet.com/image/image_34/34_St_Martin_Graves_2.jpg","../../jctruffet.com/image/image_34/34_St_Martin_Graves_3.jpg"]},"Consult_chateau_formulaire326f":{"id":"Consult_chateau_formulaire326f","dept":"34","canton":"Montagnac","commune":"Saint-Pons de Mauchiens","nom":"St_Pons_Mauchiens","type":"Patrimoine","periode":"XII","histoire":"ST-PONS, château. Au moment de la Révolution de 1789, le village fut baptisé Mont Ventôse. Il a repris son nom actuel en 1793.  Le millénaire du village a été célébré en 1989 par de grandes fêtes les Malicanes, au cours desquelles a été présenté un diaporama montrant l'évolution du village. L'animal symbolique est le chien (lou chin) dont l'histoire serait connue depuis l'an 400 de notre ère.","architecture":"De lancien château fort du Xe siècle, il ne reste aujourdhui que très peu de vestiges. Par contre, l'édifice actuel date de la fin du XIIe siècle, il est de style roman. Au XIVe siècle une enceinte de remparts, avec deux portes d'accès encore existantes vint fermer et protéger l'ensemble de l'agglomération. Les plus anciennes demeures datent de 1150. Le clocher et son église de style roman sont du XIIe siècle, les vestiges de remparts et le portalet sont du XIVe siècle, la maison des Consuls est du XVe siècle et la maison des émigrants du XVIe siècle. Le portalet, ou petite porte en occitan, était une des entrées qui régulaient les passages des habitants du village.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Saint-Pons Mauchiens","gps":"","images":["../../jctruffet.com/image/image_34/34_St_Pons_Mauchiens_1.jpg","../../jctruffet.com/image/image_34/34_St_Pons_Mauchiens_2.jpg","../../jctruffet.com/image/image_34/34_St_Pons_Mauchiens_3.jpg","../../jctruffet.com/image/image_34/34_St_Pons_Mauchiens_4.jpg","../../jctruffet.com/image/image_34/34_St_Pons_Mauchiens_5.jpg"]},"Consult_chateau_formulairef8d5-2":{"id":"Consult_chateau_formulairef8d5-2","dept":"34","canton":"St-Pons de Thomières","commune":"St-Pons de Thomières","nom":"St_Pons_Thommières","type":"Château","periode":"XVI","histoire":"PONS de THOMIERES château dit de Corniou du XVIIIe siècle .   \r\nLe château d'Arifat, ancienne métairie  est situé à proximité du petit bourg de La Salvetat. Jusquau milieu du XVIe siècle, la métairie appartient à lévêque de Saint-Pons. Alors quelle menace ruine elle est mise en vente en 1576 , en tant que «bien noble», cest à dire exemptée de la taille et achetée par Jean de Cabrol, dorigine bourgeoise, souhaite «vivre noblement», ce qui passe par lachat dun fief, dune seigneurie ou plus simplement dun «bien noble». La métairie prend alors le nom de château ; le bâtiment tel quil apparaît aujourdhui rappelle les manoirs de la région comme Grandsagnes ou Pardailhan, du XVIIe siècle, avec peut-être la grosse tour carrée plus ancienne. Le domaine dArifat aurait compris à cette époque près de 430 hectares.  En 1745 le nom de Cabrol dArifat séteint et  passe par héritage chez les Ricard de Pomayrac. Ces derniers vendent lensemble du domaine en 1790.","architecture":"Ville dune grande importance au Moyen-Âge, Saint-Pons-de-Thomières a conservé de nombreux vestiges de différentes époques médiévales.\r\nLa plus grande partie de ces témoins de lHistoire sont des éléments de défense : remparts, tours et ponts. Il faut dire quavant le XVIIe siècle.  Saint-Pons-de-Thomières était divisé en deux hameaux bien distincts : Saint-Pons la Ville Mage et Thomières la Ville Moindre.\r\nChacune avait ses propres défenses et protections et le lien entre les deux se faisait via le Pont Entre-Deux-Ville sur le Jaur et la porte Notre-Dame.\r\nOn peut retrouver partout des vestiges variés, la meilleure des solutions étant de suivre le parcours proposé par lOffice de Tourisme de Saint-Pons.\r\nA ne pas rater tout de même : la tour de la Gascagne du XIVe, la tour Saint-Benoît et le passage de la Portanelle, la tour Nostre-Senhe, la tour du comte Pons du XIVe, les quartiers du Pioch et de la citadelle avec leurs maisons du XVIe et du XVIIe, le pont entre deux ville sur le Jaur et la porte Notre-Dame.","habitants":"Famille de Ricard de Pomayrac\r\n        \r\n        \"","divers":"A Saint-Pons de Thomières villages fortifiè le château de Corniou,  d'Arifat, de Ponderach","gps":"","images":["../../jctruffet.com/image/image_34/34_St_Pons_Thomieres_1.jpg","../../jctruffet.com/image/image_34/34_St_Pons_Thomieres_2.jpg","../../jctruffet.com/image/image_34/34_St_Pons_Thomieres_3.jpg","../../jctruffet.com/image/image_34/34_St_Pons_Thomieres_4.jpg","../../jctruffet.com/image/image_34/34_St_Pons_Thomieres_5.jpg","../../jctruffet.com/image/image_34/34_St_Pons_Thomieres_6.jpg","../../jctruffet.com/image/image_34/34_St_Pons_Thomieres_7.jpg","../../jctruffet.com/image/image_34/34_St_Pons_Thomieres_8.jpg","../../jctruffet.com/image/image_34/34_St_Pons_Thomieres_9.jpg"]},"Consult_chateau_formulairec588":{"id":"Consult_chateau_formulairec588","dept":"34","canton":"Lodève","commune":"St-Privat","nom":"St_Privat_Lodève","type":"Vestiges","periode":"XIII","histoire":"SAINT-PRIVAT,  construit au XIIIe siècle, il était la propriété des seigneurs de Saint-Privat et le village sest peu à peu développé autour de ses murailles. Ancien monastère de l'Ordre de Grandmont, situé sur la commune de Saint Privat, dans un lieu isolé, à 440 mètres d'altitude, dans une forêt de chênes.\r\n Le seigneur du lieu avait le droit de haute, moyenne et basse justice. Les maisons sétagent sur la rive droite du Maro.  Fondé en 1259 par Guillaume de Cazouls, évêque de Lodève.  Après la dissolution de l'Ordre en 1772, rattaché à lévêché de Lodève, mais deux moines continuèrent à y vivre jusqu'à leur mort en 1785. \r\n Après la Révolution, exploitation agricole, propriété de la famille Vitalis de 1849 à 1936. Restauration des bâtiments et production de vin. En 1957  rachat par  la famille Bec.","architecture":"Saint-Privat du XIIIe siècle le château féodal, le donjon de Saint-Privat se dresse au-dessus du village et de la vallée du Maro.    Un des mieux préservés des monastères de l'Ordre de Grandmont (ordre religieux fondé vers 1076 dans la région de Limoges par l'ermite Étienne de Muret.  A proximité se trouve une grande salle voûtée, vestige du château à lépoque de sa grandeur.  Toutes sont construites en grès du pays et patinées par le temps. Certaines ont gardés des témoins de l'architecture de la Renaissance (fenêtres à meneaux et traverses, linteaux ouvragés, etc.). Deux artères principales traversent Saint-Privat : l'une (la rue droite), desservant le \"quartier bas\" et aboutissant à la porte nord-est ; l'autre, dessert le \"quartier haut\" jusqu'à la porte sud-ouest.","habitants":"seigneurs de Saint-Privat \r\n        \r\n        \"","divers":"Château de Saint-Privat,  son donjon, de Grandmont","gps":"","images":["../../jctruffet.com/image/image_34/34_St_Privat_Lodeve_1.jpg","../../jctruffet.com/image/image_34/34_St_Privat_Lodeve_2.jpg","../../jctruffet.com/image/image_34/34_St_Privat_Lodeve_3.jpg","../../jctruffet.com/image/image_34/34_St_Privat_Lodeve_4.jpg","../../jctruffet.com/image/image_34/34_St_Privat_Lodeve_5.jpg"]},"Consult_chateau_formulaireaf66-3":{"id":"Consult_chateau_formulaireaf66-3","dept":"34","canton":"Pézenas","commune":"St-Thibéry","nom":"St_Thibéry","type":"Château","periode":"XVIII","histoire":"Deux châteaux à Saint-Thibéry château de Nardalhan, de la Sainte-Cécile et de la Norma.                                                                    SAINTE-CECILE, magnifique \"Folie Vénitienne\" a été la propriété de diverses familles dont la plus connue fut celle de St-Exupéry lillustre écrivain qui venait régulièrement y trouver le repos. Transformé en hôtel restaurant   magnifique \"Folie Vénitienne\".   Aujourd'hui chambres d'hôtes.                                                 NADALHAN  est situé au cur du vignoble du Languedoc-Roussillon, à lécart des grandes villes mais néanmoins à proximité des axes importants. transformé également en chambres d'hôtes de  monsieur et madame Boyé.","architecture":"Sainte-Cécile Le parc de 6 hectares: dans un splendide écrin de verdure il a su garder tout son naturel et vous offre une sensation inédite, celle où le temps semble s'être arrêté.  Sa façade Florentine. L'Orangerie attenante de 150 m2: La terrasse aux lions vénitiens la surplombant est un lieu idéal pour le vin d'honneur.  La salle voûtée prestige de 220 m2: entièrement rénovée avec soins .\r\nLa cour à la française de 500m; le majestueux portail s'ouvre sur la bastide et son jardin à la française face à la discrète et exquise petite chapelle de la \" Sérénité\". Face au château, aux colonnes corinthiennes, à la terrasse aux lions vénitiens, à la succession de perrons et la dégringolade d'escaliers à balustres, le parc reste le lieu idyllique pour un événement unique.\r\nNadalhan est une ancienne  Villa Romaine, remontant au temps de la via Domitia, ancienne route romaine pavée.  Les constructions se sont succéder depuis plus de quinze siècles.","habitants":"Famille  de St-Exupéry\r\n        \r\n        \"","divers":"Saint-Thibéry château de Nardalhan, de la Sainte-Cécile et de la Norma.","gps":"","images":["../../jctruffet.com/image/image_34/34_St_Thibery_1.jpg","../../jctruffet.com/image/image_34/34_St_Thibery_2.jpg","../../jctruffet.com/image/image_34/34_St_Thibery_3.jpg","../../jctruffet.com/image/image_34/34_St_Thibery_4.jpg","../../jctruffet.com/image/image_34/34_St_Thibery_5.jpg","../../jctruffet.com/image/image_34/34_St_Thibery_6.jpg","../../jctruffet.com/image/image_34/34_St_Thibery_7.jpg","../../jctruffet.com/image/image_34/34_St_Thibery_8.jpg","../../jctruffet.com/image/image_34/34_St_Thibery_9.jpg"]},"Consult_chateau_formulaire7782":{"id":"Consult_chateau_formulaire7782","dept":"34","canton":"St-Pons de Thomières","commune":"Cruzy","nom":"Sériège","type":"Château","periode":"XVI","histoire":"SERIEGE, la famille Andoque est connue, dès le XVIe siècle, dans les environs de Cruzy, près de Saint-Chinian, à la limite des diocèses de Saint-Pons et de Narbonne.\r\n A la fin du XVIe siècle, une branche familiale se détache, installée à Béziers, agrégée à la noblesse au début du XVIIIe siècle, mais qui s'éteint, en 1761, au décès sans postérité de François d'Andoque.   L'autre branche Andoque est restée à Cruzy jusqu'à nos jours.\r\n Les acquisitions foncières à Sériège et dans les environs lui ont permis de s'imposer, au fil des années. Les Andoque, alliés aux familles de notables de Quarante et Cruzy, s'associent au milieu du XVIIIe siècle des bourgeois de Sériège. Barthélémy Andoque (1736-1793) achète en 1775 la seigneurie de Sériège  à François Olivier de la Gardie. En 1791, il acquiert le domaine du Terral, bien national, ancien fief de l'abbaye de Fontfroide, situé dans la commune d'Ouveillan (Aude).\r\n Son fils Joseph Barthélémy (1773-1844) se fait appeler d'Andoque de Sériège. Alexandre Andoque (1815-1902), conseiller général et maire de Cruzy, succédant à son père, rachète à ses frères leurs droits sur Sériège et édifie en 1884 l'actuel château. \r\n Alexandre, sans postérité, lègue sa propriété à son petit-neveu, lui aussi prénommé Alexandre (1877-1949). A la suite des grèves de 1905, ce dernier  le vend, finalement racheté en 1910 par son cousin André d'Andoque (1870-1954). Ce dernier venait d'achever la construction de l'imposant château au Terral à Ouveillan, légué par la suite à son fils cadet Pierre.  Devient la propriété de l'aîné, le colonel Alban d'Andoque (1898-1980), marié à sa cousine germaine Yseult Fayet. C'est ainsi que le domaine  est resté dans la même famille depuis plus de deux siècles et en  2003 par Barthélémy d'Andoque de Sériège.","architecture":"château de Sériège, quadrilatère de trois niveaux avec pavillons d'entrée en saillit sur colonnade avec fronton sortant sur toit ce dernier étant plat , accolé sur la façade de deux  pavillons carrés aux angles  cassés à quatre niveaux mâchicoulis et plateformes sortant également sur toit.","habitants":"Famille Andoque\r\n        \r\n        \"","divers":"Château de Sériège à Cruzy","gps":"","images":["../../jctruffet.com/image/image_34/34_Seriege_1.jpg","../../jctruffet.com/image/image_34/34_Seriege_2.jpg","../../jctruffet.com/image/image_34/34_Seriege_3.jpg"]},"Consult_chateau_formulairefb0b":{"id":"Consult_chateau_formulairefb0b","dept":"34","canton":"Séte","commune":"Séte","nom":"Séte","type":"Fort","periode":"XVIII","histoire":"SETE, la plupart des ouvrages qui l'entourent étaient exécutés en 1713. En 1745, on commença le fort Richelieu; en 1761, le fort Saint-Pierre et les redoutes Thomond; en 1792 , les retranchement de la Peyrade et de la plage d'Agde. Les forts de Séte étaient désignés comme postes par la loi de 1791 ; mais, en 1821, on les à mis dans la première série.\r\n Chateau de VILLEROY viticole,   le domaine de Villeroy possède 260 ha de vignes situées entre létang de Thau et la mer Méditerranée. Il accueille également le site dembouteillage de nos vins des Sables.","architecture":"Séte, le fort est souvent décris comme un témoin majeur de la fortification du littoral  languedocien, établie au XVIIIe siècle. Il fait parti d'un système de défense complet qui se décompose comme suit : Le fort du Môle, avec son donjon, sa caserne, sa citerne, le phare Saint-Louis et ses deux batteries, qui se trouve à l'extrémité de la jetée. Le fort Saint-Pierre est bâti en 1710 sur les rochers tout au sud du site : batteries  et magasins de poudre font directement face à la mer. Ces bâtiments constituent aujourd'hui le théâtre de la mer. Dominant l'ensemble sur le Mont Saint-Clair, alors dénué d'habitations lors de la construction, le fort Richelieu est construit en 1744. Doté de pavillons d'observation  et d'une grande batterie, il complète l'arsenal de surveillance côtière.","habitants":"Richelieu\r\n        \r\n        \"","divers":"Séte, le fort Richelieu le fort du Mole et les tour de guet et le château de Villeroy.","gps":"","images":["../../jctruffet.com/image/image_34/34_Sete_1.jpg","../../jctruffet.com/image/image_34/34_Sete_2.jpg","../../jctruffet.com/image/image_34/34_Sete_3.jpg","../../jctruffet.com/image/image_34/34_Sete_4.jpg","../../jctruffet.com/image/image_34/34_Sete_5.jpg","../../jctruffet.com/image/image_34/34_Sete_6.jpg","../../jctruffet.com/image/image_34/34_Sete_7.jpg"]},"Consult_chateau_formulaire71ab":{"id":"Consult_chateau_formulaire71ab","dept":"34","canton":"Montpellier","commune":"St-Jean de Védas","nom":"Terral","type":"Château","periode":"XV","histoire":"TERRAL, du IXe au XIXe siècle, dabord propriété des évêques de Maguelone depuis le IXe siècle (le domaine était leur résidence dété). Les plus anciens écrits témoignent de son existence vers l'an 900 ; il était la résidence de l'évêque de Maguelonne, en 1214  Simon de Montfort loge au Terral à l'occasion du concile de Montpellier. En 1354, l'évêque Durant, y habite. En 1560, les évêques y relogent quand les protestants saccagent leur hôtel de la rue Salle-l'évêque. En 1570, le château est brûlé par l'armée des princes de Navarres et de Condé. En 1622, il fut à nouveau saccagé car abandonné par Fennouillet, pour à nouveau être réparé. En 1659, enfin il est restauré par monsieur de Bousquet. En 1791 acquis par les frères Cambon qui y font d'importanst travaux et sera à partir de 1795 la résidence habituelle de l'ancien conventionnel Pierre-Joseph Cambon élu député de l'Hérault après être sortie de sa retraite politique. Après la chute de Napoléon, poursuivi comme régicide émigra qui décédera en 1820 à Bruxelles sans avoir revu son château, échoit à Jean Cambon qui le transmet à son fils Théodore (1798-1834) décède sans postérité, le château revient  à une de ses soeurs Sophie qui épouse Jean-Jules Bouscaren, leur fils  Alfred crée le jardin et le cellier qui sera continué par son fils Jules dont la veuve  Elmie, la dernière héritière des Cambon  vend en 1981 à Jean Bompaire, puis en 1985 la municipalité le rachète. Restauré en grande partie de 1985 à 1989, le château devient un espace de vie et de culture : hall dexposition, salle des mariages, salle de réunions et rencontres. Le Chai du domaine est transformé en salle de spectacle dédiée au théâtre, à la musique et la danse.","architecture":"Domaine du Terral ; propriété des évêques de Maguelone depuis le IXe siècle, le château du Terral était un vaste bâtiment fortifié  au coeur dun grand domaine. Plusieurs fois détruit  par les guerres, notamment  en 1570, il est  reconstruit en partie à chaque fois. En 1789, le domaine est saisi  comme tous les biens du clergé, puis vendu par acte du 21 mai 1791 à Pierre Cambon adjudicataire, déclare avoir agit  tant pour lui-même  que pour ses 3 frères,\r\n(les bambous d'Anduze viendraient en partie de ce parc). L'école de musique et de danse municipale y possède ses locaux. Le château du Terral était un vaste bâtiment fortifié au cur dun grand domaine.","habitants":"les frères Cambon\r\n        \"","divers":"Château du Terral à st Jean de Vedas","gps":"","images":["../../jctruffet.com/image/image_34/34_Terral_1.jpg","../../jctruffet.com/image/image_34/34_Terral_2.jpg","../../jctruffet.com/image/image_34/34_Terral_3.jpg","../../jctruffet.com/image/image_34/34_Terral_4.jpg","../../jctruffet.com/image/image_34/34_Terral_5.jpg"]},"Consult_chateau_formulaire3159-2":{"id":"Consult_chateau_formulaire3159-2","dept":"34","canton":"Clermont l","commune":"Nébian","nom":"Tour_Nébian","type":"Château","periode":"XIX","histoire":"TOUR-NEBIAN, situé sur un promontoire dominant la moyenne vallée du fleuve Hérault, au centre géographique du département, dans une zone agricole aux oliveraies et vignobles réputés (Clermont-lHérault, Cabrières, Adissan, Aniane, Montpeyroux, Saint-Saturnin, Jonquières), cet ancien domaine viticole a pour projet de simposer comme un lieu remarquable de rencontres et déchanges pour tous les esthètes passionnés par lart et la culture languedocienne. Fort dun passé glorieux (Tour de guet du XIIIe siècle) et dune occupation humaine dau moins deux millénaires, doté de bâtiments bien proportionnés et dun parc aux essences rares, ce lieu tend à retrouver son prestige dautrefois par un accueil de qualité et des prestations haut de gamme. Propriétaire  monsieur Olivier Pauwels","architecture":"Un lieu qui allie élégance, insouciance et authenticité au coeur de l'Hérault. Le château du XIXe siècle abrite une galerie d'art et des salons cossus. Il s'ouvre sur un immense parc arboré , clôturé avec une vue sur la vallée de l'Hérault. De conception carré  à trois niveaux  toits en croupes.","habitants":"Propriétaire Olivier Pauwels \r\n        \r\n        \"","divers":"Château de la Tour à Nébian","gps":"","images":["../../jctruffet.com/image/image_34/34_Tour_Nebian_1.jpg","../../jctruffet.com/image/image_34/34_Tour_Nebian_2.jpg"]},"Consult_chateau_formulaireff01":{"id":"Consult_chateau_formulaireff01","dept":"34","canton":"Montpellier","commune":"Montpellier","nom":"Tour_Pins","type":"Tour","periode":"XII","histoire":"TOUR-PINS, la tour des Pins et la tour de la Babote construites à la fin du XIIe siècle.\r\nUne plaque à la mémoire de Jacques d'Aragon, roi d'Aragon et de Majorque, seigneur de Montpellier de 1213 à 1276 et qui vit le jour dans la ville le 1er Février 1208 est apposée sur la tour. Rédigée en langue Occitane elle nous renseigne sur son passé. \r\n  A celui qui prit trois royaumes aux Sarrazins (Majorque, Valence et Murcie), donna de justes lois à ses peuples, défendit les faibles, assista les laboureurs, les marchands, les savants et les troubadours, renonça par amour de Saint-Louis et de la reine Margueritte aux droits de son héritage sur une grande partie du Languedoc et de la Provence, et mourut à Valence le 26 juillet 1276. \r\nDes pins dont elle était coiffée à compter des années 1700, et qui lui valent son nom, il ne reste aujourd'hui que deux modestes cyprès. Ces derniers replantés en 1827 après l'arrachage des pins originels dont les racines commençaient à menacer l'édifice, ont pour mission d'éviter que ne s'accomplisse une prophétie attribuée (par une légende) à Nostradamus qui séjourna à Montpellier dans les années 1530 et qui aurait décrété : La ville périra lorsque les pins de la tour disparaîtront. \r\n Deux associations de la ville symbolisant la mémoire et les traditions de Montpellier (La Baronnie de Caravètes et le groupe Folklorique \"La Garrigua\") y sont aujourd'hui hébergés en ses murs.","architecture":"Tour des Pins, XIIe et XIVe siècle,  des 25 tours qui composaient l'enceinte fortifiée de Montpellier, appelée la \"Commune Clôture\", ne restent que la tour des Pins et la tour de la Babote construites à la fin du XIIe siècle.\r\n Sa construction commencée en 1196, fut achevée au siècle suivant sous le règne des rois d'Aragon. De style à la fois roman et gothique, elle est l'oeuvre concrétisée d'une association pour le moins hétéroclite : la population de la ville, le roi et l'évêque. On la considère donc comme Montpelliéraine, épiscopale et Aragonaise.","habitants":"seigneur de Montpellier\r\n        \"","divers":"La tour du Pins à Montpellier","gps":"","images":["../../jctruffet.com/image/image_34/34_Tour_Pins_1.jpg","../../jctruffet.com/image/image_34/34_Tour_Pins_2.jpg","../../jctruffet.com/image/image_34/34_Tour_Pins_3.jpg"]},"Consult_chateau_formulaired470":{"id":"Consult_chateau_formulaired470","dept":"34","canton":"Bédarieux","commune":"La Tour sur Orb","nom":"Tour_sur_Orb","type":"Château-fort","periode":"XI","histoire":"TOUR-sur-ORB, Jusqu'en 1884, le nom de la commune est Boussagues nom du château.\r\nCité médiévale. En 863, la forteresse de Boussagues est démantelée par le roi Charles II le Chauve,  puis rebâtie aussitôt, sa reconstruction fut entreprise par les seigneurs de Boussagues au XIIe siècle,  protègent encore des maisons gothiques de XVIe et XVIIe siècles, telle la demeure du Bailli, et une église romane du XIIIe siècle.  Au XVIe siècle elle devint la propriété de la Famille d'Alichoux de Sénégra, le système défensif médiéval, propriété des seigneurs de Déodat, comprenait en outre le Castellas, le château Bas  ancienne propriété des seigneurs de Boussagues puis, à partir du XVIe siècle, de la famille d'Alichoux de Sénégra, Amandine de Sénégra, transmet le château au dernier propriétaire de cette lignée n'étant autre que le peintre Toulouse Lautrec, mais ce dernier n'y mis jamais les pieds préférant de beaucoup les plaisirs de Paris .\r\n Jadis, les communications des puissants étaient assurées par les pigeons voyageurs. Ce monopole était un privilège qui revenait de droit aux seigneurs locaux. Le Roi en avait la discrétion et c'était un insigne honneur pour les nobles que de recevoir cette charge. Voilà pourquoi, ces volatiles si précieux étaient installés dans de splendides pigeonniers !                                                                     ROCHE, à quelques kilomètres au nord de Lamalou à Saint-Gervais sur Mare le château de la Roche-Rochemare transformé en maison de retraite EHPAD.","architecture":"Cité médiévale, joyau de la commune par sa richesse architecturale et historique, Boussagues attire de nombreux touristes toute l'année. Solidement campée en retrait de la Haute Vallée de l'Orb, elle apparaît, impressionnante par ses vieilles murailles, ses édifices médiévaux et autres vestiges, signes de grande puissance et de grande histoire.\r\nDes ressources minières importantes (plomb, argent) ont permis un essor continu jusqu'au XIVe siècle. Boussagues comptait alors 3000 âmes et dominait la haute vallée de l'Orb quand la grande peste la décima. Néanmoins, seigneurs, consuls, archiprêtres conservèrent la citadelle.\r\nAncien village fortifié, Boussagues recèle deux châteaux (du XIIe au XVIIe siècle) .                                                                               Tour sur Orb vestiges du château il ne reste que des tours carrées.        Boussagues forterresse, corps de logis rectangulaire flanqué de chaque côté de tour carée et rectangulaire, l'ensemble à deux niveaux.                                                                                      La tour dite de la Prison.  La grande demeure qui est à l'entrée principale, fut en son temps la maison du Bailli (le maire des temps modernes). Cette superbe résidence, de style Renaissance, possède une poterne que surmonte un magnifique pigeonnier.   Manoir de Toulouse de Lautrec flanqué d'une tourelle  ronde   et le château de la Roche corps de logis rectangulaire à deux niveaux accolé d'une tour carrée à toit pointu.","habitants":"Famille d'Alichoux de Sénégra                                                                    Peintre Toulouse Lautrec\r\n        \"","divers":"Vestiges du château de la Tour sur Orb, le château de Boussagues et de la Roche Rochemare","gps":"","images":["../../jctruffet.com/image/image_34/34_Tour_sur_Orb_1.jpg","../../jctruffet.com/image/image_34/34_Tour_sur_Orb_2.jpg","../../jctruffet.com/image/image_34/34_Tour_sur_Orb_3.jpg","../../jctruffet.com/image/image_34/34_Tour_sur_Orb_4.jpg","../../jctruffet.com/image/image_34/34_Tour_sur_Orb_5.jpg","../../jctruffet.com/image/image_34/34_Tour_sur_Orb_6.jpg","../../jctruffet.com/image/image_34/34_Tour_sur_Orb_7.jpg","../../jctruffet.com/image/image_34/34_Tour_sur_Orb_8.jpg","../../jctruffet.com/image/image_34/34_Tour_sur_Orb_9.jpg"]},"Consult_chateau_formulaire86ab":{"id":"Consult_chateau_formulaire86ab","dept":"34","canton":"Lodève","commune":"Usclas le Bosc","nom":"Usclas_le_Bosc","type":"Château","periode":"XIV","histoire":"USCLAS-du-BOSC, Jean de Romieu, seigneur d'Usclas, docteur en droit, avocat, juge de Lodève, il avait épousé Marguerite Soubeyran en 1617.  Jean-Hyppolite de Romieu (fils du précédent), seigneur d'Usclas, docteur en droit, avocat. Il avait épousé Marguerite Des Andrieux en 1654. Grégoire-Joseph Romieu d'Usclas, (fils du précédent), seigneur d'Usclas, conseiller du Roi. Il avait épousé Hélène de Fabre de Madières de Latude en 1710 à Lodève. Il offre la cloche de l'église en 1713. Jean de Romieu avait racheté la seigneurie d'Usclas à Robert II Bernard. Robert Ier Bernard avait acquis cette seigneurie de l'évêque de Lodève en 1577. Il n'est pas impossible que Jean de Romieu soit à l'origine de la reconstruction du château.","architecture":"Deux châteaux à Usclas du Bosc celui d'Usclas et de Vaillé transformé en exploitation agricole. A Saint-Michel de Grandmont, la maladie du « Tout-Compostelle » a frappé, comme partout ailleurs et le touriste moderne est invité, faute de preuves évidentes, à voir sur les chapiteaux des coquilles à la place de feuillages, et à considérer la porte d'entrée comme une \"porte des pèlerins\", manifestant quil se trouve sur une station sur la route de Compostelle. Tout ceci au détriment du très ancien culte à saint Michel qui a été célébré dans ces lieux pendant des siècles.","habitants":"Grégoire-Joseph Romieu d'Usclas\r\n        \"","divers":"Château d'Usclas le Bosc","gps":"","images":["../../jctruffet.com/image/image_34/34_Usclas_le_Bosc_1.jpg","../../jctruffet.com/image/image_34/34_Usclas_le_Bosc_2.jpg","../../jctruffet.com/image/image_34/34_Usclas_le_Bosc_3.jpg"]},"Consult_chateau_formulaire2de6":{"id":"Consult_chateau_formulaire2de6","dept":"34","canton":"Méze","commune":"Villeveyrac","nom":"Valmagne","type":"Abbaye","periode":"XII","histoire":"Abbaye de Valmagne: monument historique et vignoble est une des plus belles abbayes cisterciennes de France et un des plus anciens vignobles du Languedoc. Labbaye de Valmagne fut fondée en 1138 par le vicomte de Béziers, Raymond Trencavel, sur la commune de Villeveyrac, près de Mèze et de l'étang de Thau. L'abbaye fut ensuite rattachée à l'ordre cistercien en 1159. Entre le XIIe et le XIVe siècle, labbaye fut considérée comme lune des plus riches du Sud de la France, notamment grâce à la vigne que les moines cisterciens plantèrent peu de temps après sa fondation. Dès lors, les terres de labbaye de Valmagne nont jamais cessé de produire du vin.Elle subit de plein fouet la guerre de Cent Ans (1337-1453) et les guerres de religion. Ainsi, lors d'une attaque des Huguenots en 1575, tous les vitraux furent brisés,  la  Révolution finit par sonner le glas de l'abbaye. En 1789, les derniers moines quittèrent le monastère juste avant l'arrivée des paysans révoltés qui saccagèrent le lieu en brûlant les archives, les tableaux et le mobilier. L'abbaye devint un bien national et fut vendue trois ans plus tard à M. Granier-Joyeuse dont les héritiers cédèrent le monastère au comte de Turenne en 1838. L'abbaye est aujourd'hui la propriété des héritiers du comte.","architecture":"L'abbaye de Valmagne est une abbaye cistercienne fondée en 1138. On peut y visiter une église gothique de 83 m de long et de 23 m de haut, un cloître du XIVe siècle avec son lavabo et sa fontaine et une salle capitulaire. On peut également profiter du jardin médiévale et du jardin potager qui fournit les produits pour l'auberge. L'église fût transformée en chai après la Révolution. Le vignoble était présent depuis le XIIe siècle, elle est de style gothique classique, elle date de 1257. S'élevant sur les fondations d'une église romane devenue trop étroite, l'église reprend le style des grandes cathédrales du Nord. Aujourd'hui, l'église abrite des foudres de chêne où mûrissent des vins renommés.","habitants":"Vicomte de Béziers, Raymond Trencavel\r\n        \"","divers":"Abbaye de Valmagne à Villeveyrac","gps":"","images":["../../jctruffet.com/image/image_34/34_Valmagne_1.jpg","../../jctruffet.com/image/image_34/34_Valmagne_2.jpg","../../jctruffet.com/image/image_34/34_Valmagne_3.jpg","../../jctruffet.com/image/image_34/34_Valmagne_4.jpg","../../jctruffet.com/image/image_34/34_Valmagne_5.jpg","../../jctruffet.com/image/image_34/34_Valmagne_6.jpg"]},"Consult_chateau_formulaired086":{"id":"Consult_chateau_formulaired086","dept":"34","canton":"Agde","commune":"Preignes le Vieux","nom":"Vias_Preignes","type":"Vestiges-Châteaux","periode":"XII","histoire":"Deux châteaux à Vias celui de Preignes le Vieux celui de Gardies (voir atricle) et les vestiges de Vias.                                                  PREIGNES   a été rattaché  à la commune de Vias. Le château de Preignes le vieux  est resté longtemps le fief des évêques dAgde. Inféodé au viomte de Pézenas. Habité par de nombreux  personnages célèbres, tel Amoury de Montfort, fils de Simon de Montfort, ce château s'est transmis  de famille en famille au fil  du temps, se succédèrent des nobles propriétaires dont: Le vicomte de Béziers,  le trésorier de France Mille de Marion  Maurice de Lagarrigue ( Maire de Béziers 1865-1870) vend Preignes le Vieux à la famille Vic en 1905. Il appartient à la famille  Vic   depuis 1905. Longtemps inhabité, sa rénovation date des années 50, sur l'initiative   du père et du grand père des exploitants actuels qui l'habitent. A la tête du domaine Jérôme Vic.","architecture":"Vias, ancienne forteresse médiévale de la fin du XIIe siècle, remanié au XVIe siècle. Malgré la présence d'une importante exploitation viticole, le château a subi peu de transformations.   édifiée par le Vicomte de Pézenas. Entièrement construit en pierre de lave, il est constitué de plusieurs bâtiments  datant d'époques différentes. En 1355, les Anglais commandés par le Prince de Galles causèrent en Languedoc des désolations épouvantables, Preignes  bien enclos dans ses remparts, a résisté aux assauts du Prince Noir. Puis il a traversé les siècles et subi des modifications  architecturales.                                                                                La tour médiévale de Vias, sans doute construite au XIIe siècle, s'intégrait à un modeste château dont il ne reste quasiment rien aujourd'hui. Superbes ouvrages romans, les vestiges actuels de cette tour impressionnent encore par leur puissance, notamment l'épaisseur des murs. La fonction de telles tours, bien que mystérieuse encore, semble toutefois liée à la surveillance de points stratégiques, ainsi qu'à la transmission de divers types de signaux.  Eléments protégés MH : façades et toitures du château et des bâtiments annexes anciens avec la chapelle et la tour-pigeonnier (à l'exclusion des dépendances agricoles du XIXe siècle), avec le parc et l'allée de pins.  Château Neuf  de la fin du XIXe siècle aux imposantes tours jumelles est intimement liée.","habitants":"Famille d' Amoury de Montfort\r\n        \"","divers":"Vias , château de Preignes le Vieux, de Gardies, les vestiges de Vias et le château neuf.","gps":"","images":["../../jctruffet.com/image/image_34/34_Vias_Preignes_1.jpg","../../jctruffet.com/image/image_34/34_Vias_Preignes_2.jpg","../../jctruffet.com/image/image_34/34_Vias_Preignes_3.jpg","../../jctruffet.com/image/image_34/34_Vias_Preignes_4.jpg","../../jctruffet.com/image/image_34/34_Vias_Preignes_5.jpg","../../jctruffet.com/image/image_34/34_Vias_Preignes_6.jpg","../../jctruffet.com/image/image_34/34_Vias_Preignes_7.jpg","../../jctruffet.com/image/image_34/34_Vias_Preignes_8.jpg"]},"Consult_chateau_formulaire405d-2":{"id":"Consult_chateau_formulaire405d-2","dept":"34","canton":"St-Pons de Thomières","commune":"Vieussan sur Orb","nom":"Vieussan","type":"Patrimoine","periode":"XII-XIII","histoire":"VIEUSSAN  est dominée par un paysage de vignes, dont on tire un excellent vin AOC Saint Chinian, coteaux du Languedoc. Très étalée, elle regroupe de nombreux hameaux, le plus à l'ouest Mézeilles au pied du pic de Naudech, à l'est Plaussenous vers Bédarieux, au sud le village du Pin et le hameau du Lau vers Roquebrun. \r\nAvec les ruines de son château «Le Castellas» du XIIe siècle, dont il reste le donjon, et ses vieilles églises, avec ses nombreuses constructions en pierres, ses arches, la commune est marquée par une histoire très ancienne.\r\nVieussan sert également d'écrin à un splendide jardin agrémenté d'anciennes variétés de roses aux mille senteurs.","architecture":"Avec les ruines de son château «Le Castellas» du XIIe siècle, dont il reste le donjon, et ses vieilles églises, avec ses nombreuses constructions en pierres, ses arches, la commune est marquée par une histoire très ancienne. ulaire à deux niveaux et attiques flanqués de pavillons carrées en angles et deux échauguettes en façades. Le village  de forensac était entouré d'une enceinte et de fossés, percée de quatre portes : la porte Sainte-Suzanne (proche de l'église Sainte-Suzanne, aujourd\"hui disparue), la porte de Saint-Thibéry, le Portail Neuf et la porte d'Agde. Le chemin de Saint-Thibéry devait traverser l'Hérault grâce à un bac. Le premier pont a été construit au XIXe siècle.","habitants":"Famille Vulliod\r\n        \"","divers":"Château de Vulliod à Florensac","gps":"","images":["../../jctruffet.com/image/image_34/34_Vulliod_1.jpg","../../jctruffet.com/image/image_34/34_Vulliod_2.jpg"]},"Consult_chateau_formulaire7beb-2":{"id":"Consult_chateau_formulaire7beb-2","dept":"34","canton":"Lunel","commune":"Vérargues","nom":"Vérargues","type":"Château","periode":"XVII","histoire":"Trois châteaux à Vérargues du XVIe siècle, de Devèze du XVIIIe siècle et celui de Pouget.                                                            DEVEZE, la seigneurie de la Devèze appartient au XVIIe siècle a une famille de Rochemore. Cette famille originaire de Lunel compta parmi ses membres un président a la cour des comptes de Montpellier, un conseiller du roi, En 1504, Pierre de Rochemore, juge royal de la ville et la Baronnie de Lunel, est seigneur de la Devèze. La famille exercera dès lors  un pouvoir important sur le pays de Lunel pendant des décennies. en 1718  Guillaume seigneur de la Devèze né en 1724 . En 1743 il est fait état de deux châteaux à Vérargues, l'un appartenant à , V. Dupuis, l'autre à M, d'Alayrac . En 1768 il est fait mention de Guillaume Castaing de la Devèze.  Au XVIIIe siècle elle appartient aux Castaing d'Alayrac, famille de conseillers à la cour des comptes de Montpellier.                               VERARGUES, la famille Coulondre  vignerons de pères en fils, son origine remonte à :  Gaston Coulondre (1857-1922) politicien de métier, il fut député de la circonscription dAvignon en 1902, réélu en 1906, il siégea à la commission de lagriculture puis en 1912, devint juge dinstruction à Marseille et maire de Vérargues pendant 14 ans. Il possédait dimportantes propriétés agricoles. Eric Coulondre né en1938, acquit le château  et son prestigieux vignoble en 1968, il délaisse peu à peu la vente en gros et restructure le vignoble. Rodolphe Coulondre né en 1973, décide alors, à la fin de ses études, dépauler son père à la propriété. En 1993 il se tourne vers la vente directe au caveau et en 2001, il crée une société civile agricole avec ses frères et soeurs et en devient le gérant.                                                                                                   POUGET,   Yves Coulondre (1911-1972) épouse Claire Senglat, fille de négociant en vin en 1936. Ils avaient plusieurs propriétés sur la commune de Saint Laurent dAigouze, Saint Christol et Vérargues dont le château du Pouget.  Place fortifiée appartenant à la commanderie des chevaliers de l'Ordre de Malte, puis rattaché à la baronnie de Lunel, donc à Louis duc de Nemours, comte d'Armagnac, et seigneur des lieux de Condé et de Lunel, le château du Pouget   Transformé en hôtel restaurant","architecture":"DEVEZE, elle fut la résidence des Rochemore, famille originaire de Provence, installée dans la région depuis le XVe siècle. .  Aujourd'hui la S.C.E.A.(Société Civile d'Economie Agricole) du domaine est organisé autour d'une complémentarité familiale.  Devèze quadrangulaire à trois niveaux avec pavillons carrées en angles. Façades et toitures (y compris la terrasse avec son escalier) et le salon avec son décor de gypseries: inscription par arrêté du 13 novembre 1974                                                                  Le château de Vérargues, très simple, est formé d'un corps de bâtiment principal de plan rectangulaire cantonné au sud de deux petits pavillons en léger décrochement et au nord corps de bâtiment de  deux ailes en retour.\r\nLe château fait aujourd'hui parti d'une exploitation agricole, il est entouré de diverses constructions utilitaires modernes. Les deux ailes au nord (peut-être les communs) ne présentent plus un grand intérêt. Un escalier d'accès a été construit.                                Pouget   vous offre lauthenticité et lélégance dune demeure de charme familiale, édifié aux environs du XVIIIe siècle sur les fondations dun site romain Entre Nîmes et Montpellier, se dresse ses deux tours au coeur du vignoble languedocien. Place fortifiée appartenant à la commanderie des Chevaliers de l'Ordre de Malte, situé à Saint-Christol, à quelques centaines de mètres au nord de Vérargues, le château du Pouget est doté d'un magnifique parc de 15000m² ou vous pourrez admirer ses arbres tri centenaires.","habitants":"Famille de  Gaston Coulondre\r\n        \r\n        \"","divers":"Vérargues , de Devèze  et de Pouget.","gps":"","images":["../../jctruffet.com/image/image_34/34_Verargues_1.jpg","../../jctruffet.com/image/image_34/34_Verargues_2.jpg","../../jctruffet.com/image/image_34/34_Verargues_3.jpg","../../jctruffet.com/image/image_34/34_Verargues_4.jpg","../../jctruffet.com/image/image_34/34_Verargues_5.jpg","../../jctruffet.com/image/image_34/34_Verargues_6.jpg","../../jctruffet.com/image/image_34/34_Verargues_7.jpg","../../jctruffet.com/image/image_34/34_Verargues_8.jpg","../../jctruffet.com/image/image_34/34_Verargues_9.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','34 — Hérault'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
</script></body></html>
