const FULL={"Consult_chateau_formulaire266e":{"id":"Consult_chateau_formulaire266e","dept":"34","canton":"Agde","commune":"Agde","nom":"Agde","type":"Château","periode":"XVII","histoire":"A Agde le château de Laurens, de Batipaume  et  le fort de Brescou.                                                                                      AGDE est l'une des plus anciennes villes de France, surnommée parfois « la perle noire de la Méditerranée » à cause de ses monuments construits en pierre basaltique, a une longue histoire. Fondée au VIe siècle av. J.-C. par des Phocéens venus de Marseille, elle a été dès l'an 500 et jusqu'à la Révolution le siège d'un évêché. Face à l'évêque, qui détient dès le XIIe siècle le pouvoir temporel du vicomté d'Agde, la ville fut très tôt, vers le début du XIIIe siècle, administrée par des consuls, préfiguration des municipalités modernes.                                                    BATIPAUME transformé en centre  de vacances pour familles, Le centre est composé de 4 bâtiments                                        BRESCOU, situé au large du Cap d'Agde, le fort de Brescou est construit sur la partie immergée d'un ancien volcan sous-marin, construit par le vicomte de Joyeuse en 1586, il a d'abord un rôle défensif, puis sous la directive du cardinal de Richelieu, qu'il prévoyait une grande entrée du port,   mais les travaux ont été arrêtés après sa mort, ses modestes fortifications ne résistent pas à la révolte de Montmorency, il est  détruit en 1632. Relevé de ses ruines, il est reconstruit tel que nous le voyons aujourd'hui en 1680, d'après les plans de Vauban. Il devient une prison d'état au XVIIIe siècle.                                                                                     LAURENS  Agde, la villa a été construite pour le docteur Emmanuel Laurens entre 1898 et 1900 héritier d'une immense fortune, grand voyageur et amateur d'art. Il choisit d'aménager son château en s'inspirant des souvenirs de ses fabuleux voyages. Le décor est d'inspiration Art-Nouveau. La salle de bains est équipée d'une baignoire-piscine décorée de faïences des ateliers de Sarreguemines, due à Eugène Martial Simas. Les petits appartements sont signés Eugène Simas et Théophile Laumonnerie.  Aujourd'hui propriété de la Ville d'Agde.","architecture":"Agde, ancien domaine agricole de 12 hectares devient une île au XVIIe siècle, lors des travaux de construction du Canal du Midi. Délimitée par le Canalet, l'Hérault et le Canal du Midi, la situation de Belle-Isle est exceptionnelle avec un parc, véritable oasis de fraîcheur. Une passerelle pour franchir le Canalet permet d'accéder au domaine dans lequel se trouve le château. Le château de Laurens L'architecture est de style néoclassique du début XXe siècle et l'ornementation, avec vitraux, ferronneries, peintures et couleurs d'inspiration orientale.  en cours de restauration, et seul son parc ombragé est pour l'instant accessible au public. La « Tour des Anglais » inscrite à l'inventaire des monuments historiques en 1939 est une tour de défense côtière, crénelée, datant du XVIIIe siècle,                                                                                               La tour du Castellas, se trouve à quelques kilomètres plus à l'est, dans la commune de Sète.                                                          Le fort de Brescou inscrit à l'inventaire des monuments historiques en 1996-98, sur l'îlot du même nom, situé devant l'entrée du port de plaisance du Cap-d'Agde, remonte au dernier quart du XVIIe siècle et est généralement attribué à Vauban. Il succède à un premier fort construit en 1586 par le vicomte de Joyeuse dans sa lutte contre les protestants.","habitants":"Docteur Emmanuel Laurens\r\n        \"","divers":"Agde; le château de Batipaume, de Laurens, le fort de Brescou, la tour des Anglais, les remparts d'Agde et le château verts.","gps":"","images":["../../jctruffet.com/image/image_34/34_Agde_1.jpg","../../jctruffet.com/image/image_34/34_Agde_2.jpg","../../jctruffet.com/image/image_34/34_Agde_3.jpg","../../jctruffet.com/image/image_34/34_Agde_4.jpg","../../jctruffet.com/image/image_34/34_Agde_5.jpg","../../jctruffet.com/image/image_34/34_Agde_6.jpg","../../jctruffet.com/image/image_34/34_Agde_7.jpg","../../jctruffet.com/image/image_34/34_Agde_8.jpg","../../jctruffet.com/image/image_34/34_Agde_9.jpg"]},"Consult_chateau_formulaire5467":{"id":"Consult_chateau_formulaire5467","dept":"34","canton":"St-Pons de Thomières","commune":"Agel","nom":"Agel","type":"Château","periode":"XII-XVII","histoire":"AGEL, seigneurie d'Aigues-Vives, aliénée par le domaine royal,  La seigneurie d'Agel était alors composée d'une part appartenant au domaine royal, comprenant les droits de justice, en indivision avec une part composée de plusieurs fiefs appartenant à des seigneurs particuliers. En 1559, les Beauxhostes ont acquis de Gabriel de Verzeille les fiefs composant la moitié des droits seigneuriaux d'Agel. Après avoir acheté l'autre moitié de la seigneurie appartenant au roi, ils ont obtenu, en 1563, une reconnaissance de leurs droits par les habitants d'Agel. La famille Beauxhostes a aussi possédé le fief de Sériège, à Cruzy, et des parts de la seigneurie de Pardailhan au XVIIe siècle.  ses descendants ont conservé la seigneurie et le château d'Agel pendant deux siècles et établie au diocèse de Saint-Pons.  Les Beauxhostes sont devenus d'importants propriétaires féodaux, au cours du XVIe siècle. A partir de 1762, les héritiers de Pierre de Beauxhostes ont vendu la terre et le château d'Agel, à Jean Hyacinthe d'Augier, viguier de Narbonne, devenu ainsi, le dernier seigneur du lieu. Au XIXe siècle, le château a été transmis par héritage à la famille Ecal.   Viticole et chambres d'hôtes.","architecture":"Le château, construit à la fin du XVIe et au début du XVIIe siècle, est un édifice sur plan massé, flanqué de tours aux angles. remparts à enceinte multiple, des traces de ponts-levis. La tour sud-est, de plan octogonal, correspond à l'ancien donjon et tour carrée renferme un escalier en vis. Elle s'ouvre par une porte surmontée d'une corniche à larmier sur rang d'oves et encadrée de pilastres cannelés d'inspiration ionique. Au XIXe siècle, certaines parties du château ont été remaniées (modification de la façade sur le parc, ordonnance des baies, dissimulation de certains plafonds à la française). Sur la façade postérieure, à l'ouest, apparaissent quelques éléments de l'ordonnance du début du XVIIe siècle et un ensemble de baies géminées à frontons rompus, apparemment plus tardives. L'édifice conserve encore quelques éléments défensifs (crénelage, bouche à feu, archères). Un mur d'enceinte, en partie crénelé et flanqué de tours, clôture l'ensemble. \r\nL'ensemble comprenant les façades et toitures du château, la cheminée de l'ancienne cuisine au rez-de-chaussée, l'escalier à vis de chacune des deux tours, le mur d'enceinte avec les trois tours d'angle rondes et les vestiges des deux tours carrées, fait lobjet dune inscription au titre des monuments historiques depuis le 16 mai 1979.","habitants":"Famille de Jean Beauxhostes\r\n        \"","divers":"Château d'Agel","gps":"","images":["../../jctruffet.com/image/image_34/34_Agel_1.jpg","../../jctruffet.com/image/image_34/34_Agel_2.jpg","../../jctruffet.com/image/image_34/34_Agel_3.jpg","../../jctruffet.com/image/image_34/34_Agel_4.jpg","../../jctruffet.com/image/image_34/34_Agel_5.jpg","../../jctruffet.com/image/image_34/34_Agel_6.jpg"]},"Consult_chateau_formulaire40bc":{"id":"Consult_chateau_formulaire40bc","dept":"34","canton":"Montpellier","commune":"Montpellier","nom":"Alco","type":"Château","periode":"XVIII","histoire":"ALCO, cité au XIIIe siècle par la famille Alamandrin qui passera au XVe siècle à la famille Galopin puis aux de Comte. En 1699  Catherine de Comte l'apporte en dot ainsi que les domaine de la Colombière et de Montmaur à Antoine Bonnier, d'une famille de drapiers reconvertis dans la finance. Vers 1744, Antoine-Samuel Bonnier commence la construction du château dAlco et des jardins. Il est le fils dAntoine Bonnier, riche marchand drapier de Montpellier. Trésorier royal, Antoine Bonnier acheta la charge de Président de la Cour des Comptes, Aides et Finances du Languedoc et prit le patronyme de Bonnier dAlco. Son frère Joseph Bonnier est le propriétaire du château de la Mosson.  Le domaine resta longtemps propriété de la famille dAlco. Après la mort dAntoine-Samuel, en 1769, sa veuve prit la direction des affaires. Son fils Ange-Elisabeth Bonnier dAlco (1750-1799), ouvert aux idées de la Révolution, devint un conventionnel important. Il essaya en vain de le protéger, au moment de sa disgrâce qui entraîna la vente du domaine Bonnier de la Mosson et la dispersion de ses biens.  Vendu en 1806 à Louis-Joseph-Fortuné de Venel ancien capitaine de Vaisseaux du roi, passa à divers propriétaires à Joseph Rey ancien président du tribunal de Montpellier et au docteur Mathieu Combal  professeur en médecine à la faculté, à son décés en 1888 laisse Alco à sa fille unique marié au baron de Pins, en 1910 passe à Maurice Chassant professeur à l'école de l'agricuture dont les héritiers vendront en janvier 1980 au conseil général de l'Hérault. Il fait l'objet, entre 1985 et 1989, d'un vaste programme incluant la construction de l'Hôtel du département, situé désormais face à lui.","architecture":"Alco, loin d'être aussi monumental que d'autres folies montpelliéraines, édifice construit vers 1740 apparaît comme une petite résidence de campagne de l'époque Louis XV. Un large perron de quelques marches entoure le bâtiment, de dimensions modestes. L'encadrement à refends vigoureux de la porte d'entrée n'en paraît que plus imposant. Un faux avant-corps étroit, couronné d'un fronton en cintre surbaissé, anime la façade.\r\nLes jardins s'échelonnent selon un axe symétrique, sur deux plans horizontaux reliés par un escalier à double volée, avec bassins et fontaines. Il domine aujourd'hui un environnement urbanisé, où pavillons et immeubles ont remplacé les vignes. La cour d'honneur était annoncée par deux pavillons d'entrée et entourée de vastes communs destinés à l'exploitation viticole, aujourd'hui disparus.","habitants":"Famille d'Antoine Bonnier\r\n        \"","divers":"Château d'Alco","gps":"","images":["../../jctruffet.com/image/image_34/34_Alco_1.jpg","../../jctruffet.com/image/image_34/34_Alco_2.jpg","../../jctruffet.com/image/image_34/34_Alco_3.jpg"]},"Consult_chateau_formulaire277f":{"id":"Consult_chateau_formulaire277f","dept":"34","canton":"Gignac","commune":"Arboras","nom":"Arboras","type":"Château","periode":"XVII","histoire":"ARBORAS, cité au IXe siècle par une villa relevant de l'abbaye de Gellone possession des moines de Saint-Guilherm le Désert, transformé au XIIIe siècle en château qui sert de guet ruiné en 1384 par les anglais sera reconstruit au XVIe siècle appartient à Arnaud de Bozène. en 1627 Jean de Palissa hérite ce sera son fils  Raymond de Palissa  qui entreprend la reconstruction en 1654.  Au XVIIIe siècle la famille de Palissa déserte les lieux victime de persécutions après l'édit de Nantes, en 1728 la seigneurie est acquise par  Jean-Jacques de Fonbon  président à la cour des comptes de Montpellier dont-il obtiendrat la nomination de Baronnie, le titre passera ensuite aux Vissec de Latude qui le garderont jusqu'à la Révolution, après un pillage passera en 1791 aux Laurès qui le conservent jusqu'en 1885, après des divisions le domaine est acquis  en 1961 par un britanique M. William Garrad. Son propriétaire actuel est Mr Coltier qui l'exploite, en société civile immobilière est active depuis 8 ans, elle est spécialisée dans le secteur d'activité de la location de terrains et d'autres biens immobiliers.","architecture":"Arboras, mentionné comme castrum en 1224, à vocation défensive, place forte protestante, il trônait sur un site pourvu dun fort dénivelé. Situé sur une importante route de transhumance, au point darrivée de lancien chemin de Montpeyroux, le château-fort dArboras fut abandonné et a totalement disparu, il ne reste du château féodal  qu'une tour carrée et une partie des remparts. Démoli au XVIe siècle sur ordre des Etats Généraux du Languedoc, il fut remplacé au XVIIe par une demeure seigneuriale à caractère résidentiel, avec un corps central en équerre à trois niveaux flanqué de tours rondes  aux extrémités de la façade sud, portant à leur sommet des corbeaux  sur lesquels repose directement la toiture, canonnières percées sur ses tours : Ensemble des façades et des toitures plates (y compris les vestiges médiévaux) ; éléments de décor intérieur,  deux cheminées au trumeau de gypseries et au foyer de céramiques, le sol armorié de la tour au premier étage du corps Ouest","habitants":"Famille de Jean de Palissa \r\n        \"","divers":"Château d'Arboras","gps":"","images":["../../jctruffet.com/image/image_34/34_Arboras_1.jpg","../../jctruffet.com/image/image_34/34_Arboras_2.jpg","../../jctruffet.com/image/image_34/34_Arboras_3.jpg","../../jctruffet.com/image/image_34/34_Arboras_4.jpg","../../jctruffet.com/image/image_34/34_Arboras_5.jpg"]},"Consult_chateau_formulaire6294":{"id":"Consult_chateau_formulaire6294","dept":"34","canton":"Gignac","commune":"Argelliers","nom":"Argelliers","type":"Château fort","periode":"X","histoire":"Dans la commune le château d'Argelliers et  de Gardiès.                          ARGELLIERS, au IXe siècle, Saint-Benoît dAniane est probablement le premier seigneur dArgelliers, mais ne résidant pas à Argelliers, il délègue ses droits à des bayles pour ses intérêts matériels et à des curés pour les soins de lâme. Déjà, le 12 avril 1679, Jacques Cambon et Jean Bougette demandent au Cardinal de Bonzy, Seigneur-Justicier dArgelliers, la permission de percer et douvrir les murailles des remparts. Ils oublient de lui dire que Guillaume Sérane avait déjà, sans permission, percé lesdites murailles et fait un trou de 8 pans et demi de haut pour prendre et donner du jour à un appartement de sa maison.                            Gardiès devenu domaine agricole et viticole  GARDIES, Le célèbre Louis Garros construit le château de la Gardies,  En 1742, un Jean Bacat habite la métairie . En 1743, un Joseph Granier épouse Marguerite Bacat.Plus précisément, il réalise une copie conforme du château d'Azay- le-Rideau (1518-1529), près de trois cent ans plus tard, en 1897. A cette époque, la famille Bouniol mène la grande vie. En 1904, nous trouvons un M. Giraud et Mme Vve Joullié. Le faste est au rendez-vous, avec l'architecte d'abord. Le célèbre Louis Garros construit le château de la Gardies, à quelques kilomètres de Vias, au milieu  des vignes. Il privilégie la première renaissance française et s'inspire des châteaux de la Loire.  Famille Granier et seigneurie d'Argelliers. 1746-1843. Aujourd'hui, La Gardies appartient aux Bessière, qui ont racheté le château en 1979 et qui s'appliquent depuis à rendre toute sa splendeur à cette bâtisse. Le château n'est pas visitable, mais Jean Bessière ouvre souvent ses portes pour diverses activités, qui vont de la protection de l'environnement à l'accueil d'enfants. Aujourd'hui propriété de Michel Doutre gérant de la SCI.","architecture":"Le château d'Argelliers, en ruine,   les remparts, le château, le cimetière, le presbytère et le groupement de maisons sont entourés par de hautes murailles et protégés par deux tours.\r\n Dans le compoix de 1664, les habitations situées dans l'enceinte des remparts, sont décrites comme faisant partie du \"fort\" d'Argelliers.\r\n De ces remparts, on ne retrouve aujourdhui que peu de vestiges. Seule une tour existe encore avec de part et d'autre l'amorce de l'ancien chemin de ronde. Victime de l'agrandissement du village sur l'extérieur, ces remparts ont dû subir au fil du temps de nombreuses agressions. il fait place en 1856 à l'église actuelle. Sur le cadastre Napoléonien du début du XIXe siècle, on peut noter que l'emplacement du château est porté en tant que four communal. Les seuls vestiges que nous ayons aujourd'hui, sont quelques pierres taillées récupérées lors de sa démolition et éparpillées dans diverses constructions du village et très probablement dans le mur de l'église neuve, côté ouest le château de la Gardies, à quelques kilomètres de Vias, du XVIIe siècle,  était un grand domaine agricole regroupant un corps de logis et des dépendances.","habitants":"Cardinal de Bonzy\r\n        \"","divers":"Argelliers village fortifié et château de Gardies remaniè.","gps":"","images":["../../jctruffet.com/image/image_34/34_Argelliers_1.jpg","../../jctruffet.com/image/image_34/34_Argelliers_2.jpg","../../jctruffet.com/image/image_34/34_Argelliers_3.jpg","../../jctruffet.com/image/image_34/34_Argelliers_4.jpg","../../jctruffet.com/image/image_34/34_Argelliers_5.jpg"]},"Consult_chateau_formulaire8210":{"id":"Consult_chateau_formulaire8210","dept":"34","canton":"Montpellier","commune":"Assas","nom":"Assas","type":"Forteresse","periode":"XVIII","histoire":"ASSAS, une \"folie\" du XVIIIe siècle, construit en 1760 sur un site médiéval.  La famille de  Rostang d'Assas ocupant les lieux jusqu'au XVe siècle est celle d'Assas,, le chevalier dAssas (1733-1760) a donné son nom à une rue du quartier Latin à Paris, ainsi quà luniversité de Paris  'Panthéon-Assas'  dite Fac dAssas.\r\nEn 1486, Hugues de Rostang vend la moitié de sa seigneurie à Guillaume Bonnal, un riche commerçant de Montpellier, puis au Pluviès, aux Montchal,  à Joseph Boyer marquis de Sorgues et enfin en 1720   le successeur Guillaume de Castagnier, comte de Clermont cède le château en 1747, à Jean Mouton qui avait acquit le château de la Clotte à Salinelles, Gard, en 1722. Le nouveau propriétaire, issu d'une famille de banquiers anoblie au XVIIIe siècle, son fils Jacques Mouton de la Clotte décide de raser la forteresse afin d'y faire construire sa résidence d'été dans les années 1760. A la Révolution, les armoiries sont détruites et les tours écrétées, mais en définitive le château lui-même est épargné. un nouveau propriétaire, Louis Gillet y séjourna son gendre M.Robert Demangel  ancien directeur de l'école d'Athènes  en fit l'acquisition en 1949, il appartient aujourd'hui aux héritiers de  Robert Demangel. Ceux-ci y perpétuent une tradition musicale ancrée dans son salon par le biais d'une belle collection d'instruments à clavier, chaque année, s'y déroule en effet un festival en l'honneur du célèbre musicien américain (1951 -1989) décédé à Assas, qui en aima la convivialité et l'informalité.","architecture":"Assas,  Le château actuel date de 1758 et a été bâti par Mouton de la Clotte, . Il le fit construire un peu à l'ouest de l'ancien édifice, de façon à le placer à cheval entre deux jardins de petites dimensions. Pour édifier cette résidence au goût du jour, il s'adressa à l'architecte Jean Antoine Giral. Le plan est caractéristique, l'escalier si souvent placé sur l'axe principal étant ici déporté sur l'un des côtés tandis que se trouve au centre, à la place d'honneur, un vestibule permettant d'apercevoir les deux jardins, reliés par des dégagements à deux galeries qui servent d'entrée. En élévation, deux particularités sont à noter : tous les angles sont remplacés par des gorges en arrondi ; les quatre pavillons d'angle forment une sorte de second étage cantonnant la toiture du bâtiment central. L'accès à ces pavillons se fait par deux terrasses latérales surélevées au-dessus du sol du grenier et garnies de balustrades.  A l'ouest, la porte est le motif principal de la façade. L'arc et son ébrasement en gorge doivent être l'oeuvre de d'Aviler.","habitants":"Famille de  Rostang d'Assas\r\n        \r\n        \"","divers":"Forteresse d'Assas et remparts","gps":"","images":["../../jctruffet.com/image/image_34/34_Assas_1.jpg","../../jctruffet.com/image/image_34/34_Assas_2.jpg","../../jctruffet.com/image/image_34/34_Assas_3.jpg","../../jctruffet.com/image/image_34/34_Assas_4.jpg","../../jctruffet.com/image/image_34/34_Assas_5.jpg","../../jctruffet.com/image/image_34/34_Assas_6.jpg","../../jctruffet.com/image/image_34/34_Assas_7.jpg","../../jctruffet.com/image/image_34/34_Assas_8.jpg"]},"Consult_chateau_formulaire7f8a":{"id":"Consult_chateau_formulaire7f8a","dept":"34","canton":"Gignac","commune":"Aumelas","nom":"Aumelas","type":"Vestiges","periode":"XI-XIV","histoire":"AUMELAS, le château  Haut a été construit par les Guilhem dAumelas en 1036, au début du XIIe siècle Guilhem de Montpellier  établit  en la seigneurie d'Aumelas son fils cadet qui épousa Tiburge veuve et héritière de Rimbaud II d'Orange, c'est ainsi  qu'Aumelas devient le berceau de la maison royale de Hollande, les Orange Nassau Aumelas fut aussi la résidence du troubadour Raimbaut dOrange et fut érigé en vicomté au XIVe siècle. Siège dun pouvoir local fort, le château fut comme tant dautres démantelé par Richelieu.Propriété de la commune.\r\nAUMELAS, château Bas d'Aumelas est un ravissant vignoble et domaine du XIVe siècle situé dans les hauteurs de l'Hérault au coeur de la garrigue. Au XVIe siècle un sieur Bonnet l'acquit, propriété de la famille d'Albenas depuis des siècles, le domaine a été repris depuis 2002 par deux jeunes frères de la famille qui lui ont rendus son activité originelle. le baron Philippe d'Albenas toujours propriétaire. Transformé en  hôtel restaurant.","architecture":"Le château d'Aumelas le château Haut dominant la plaine conserve un puissant rempart, des restes de donjon et une chapelle castrale.  les fossés sont doublés de puissants remparts qui protègent un austère donjon qui ce dernier conserve une très belle salle romane au rez-de-chaussée. Le site est progressivement abandonné tout au long du XVe siècle. Il retrouvera un temps sa fonction militaire lors des guerres de religion du XVIe siècle où il deviendra un refuge pour de nombreux protestants qui semparent de la place. Il sera finalement démantelé par les troupes royales en 1622. Le château a été classé monument historique le 12 juin 1989. Aujourdhui les ruines du château sont toujours en place et on découvrira sur place des fortifications toujours debout, ainsi quune partie du donjon et de lancienne chapelle, tous deux darchitecture romane. \r\nAumelas , dit du bas,  corps de logis rectangulaire à trois niveaux  flanquées de tours rondes presque engagées et toitures presque à plats.","habitants":"les Orange Nassau Aumelas                                                                   Famille d'Albenas\r\n        \"","divers":"Vestiges du château d'Aumelas avec son château Bas","gps":"","images":["../../jctruffet.com/image/image_34/34_Aumelas_1.jpg","../../jctruffet.com/image/image_34/34_Aumelas_2.jpg","../../jctruffet.com/image/image_34/34_Aumelas_3.jpg","../../jctruffet.com/image/image_34/34_Aumelas_4.jpg","../../jctruffet.com/image/image_34/34_Aumelas_5.jpg","../../jctruffet.com/image/image_34/34_Aumelas_6.jpg","../../jctruffet.com/image/image_34/34_Aumelas_7.jpg","../../jctruffet.com/image/image_34/34_Aumelas_8.jpg","../../jctruffet.com/image/image_34/34_Aumelas_9.jpg"]},"Consult_chateau_formulaire2b7a":{"id":"Consult_chateau_formulaire2b7a","dept":"34","canton":"Mèze","commune":"Aumes","nom":"Aumes","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux à Aumes château de Marennes  et de Saint-Martin de Graves.                                                                                    ST-MARTIN de GRAVES,  en 1274, une contestation au sujet du terroir de la paroisse de Saint-Martin de Valansaniscis nous renseigne sur la plus grande ancienneté du lieu, mentionné encore comme dîmerie en 1327 et prieuré dépendant de Pézenas en 1336. Au XVe siècle, la grange de Saint-Martin est propriété de Jean de Lauret, seigneur d'Aumes. Elle passe ensuite à son fils, Jean de Lauret, sieur de Carlencas, dont la fille Lucie épouse vers 1535 Nicolas I de Graves, sieur de La Treille. Le château actuel a été construit entre 1891 et 1895 par l'architecte montpelliérain Charles Marcadier dans un style néo-Renaissance d'une assez grande qualité.  Propriété de Roger Santa, ancien PDG de France Boissons, ex-directeur de Heineken France et à ce titre à l'origine de la création de la Heineken cup. En 1999, il a un coup de cur pour cette magnifique propriété dans laquelle cet homme d'affaires averti mettra toute sa passion et son courage dans les travaux de rénovation. Cet endroit deviendra aussi le lieu de réception et de partage de tous ses amis, notamment des artistes. C'est dans cet endroit magique que Johnny Hallyday a découvert lui aussi les vins du Languedoc à Pézenas et s'est investi dans la célèbre cuvée Terre d'Aumes, qui porte sa signature.                                 MARENNES   résidence du XVIIe siècle propriété de la famille Kruger.","architecture":"St-Martin de Grave, château du XIXe siècle quadrilatère à trois niveaux et attiques, en façade trois travées saillantes avec balcon au premier étage et chien assis sur fenêtres  du dernier étage toitures en  croupes en  ardoises. Isolée sur une   large terrasse avec perrons latéraux,la demeure est flanquée de deux tours rondes  toitures en poivrières. Au dessus du rez-de-chaussée, traité comme un soubassement à refends,  privilégié en manière   d'avant corps les trois travées médianes de  la façade par l'introduction   d'un grand balcon en surplomb, d'un fronton sur la porte-fenêtre centrale et de chaînages d'angle.                         Château de Marennes, corps de logis rectangulaire à deux niveaux, pavillons rectangulaires sur flanc droit et tour carrée et ronde à l'opposée.","habitants":"Monsieur Roger Santa                                                                      Famille Kruger pour Marennes\r\n        \"","divers":"Châteaux de Marennes et de St-Martin de Grave à Aumes","gps":"","images":["../../jctruffet.com/image/image_34/34_Aumes_1.jpg","../../jctruffet.com/image/image_34/34_Aumes_2.jpg","../../jctruffet.com/image/image_34/34_Aumes_3.jpg","../../jctruffet.com/image/image_34/34_Aumes_4.jpg","../../jctruffet.com/image/image_34/34_Aumes_5.jpg"]},"Consult_chateau_formulaireeeff":{"id":"Consult_chateau_formulaireeeff","dept":"34","canton":"Murviel-lès Bèziers","commune":"Autignac","nom":"Autignac","type":"Château","periode":"XVII","histoire":"Dans la commune  le château  d'Autignac  de Ciffre  dit  moulins de Ciffre et  le château  de Lavit.                                                           AUTIGNAC, Eric de Turckheim, cofondateur du groupe Trafigura, spécialisé dans le négoce de minéraux et de pétrole, injecte 7,5 millions d'euros dans la rénovation du château pinardier d'Autignac.  Eric de Turckheim est gérant de la société sci du château d'Autignac évolue sur le secteur d'activité : Activités immobilières.  CIFRE dit le moulins, viticulteur et chambres d'hôtes par Jacobs Sabine.                                                                                           LAVIT et la famille de Lavit. Ce thème, qui ne pouvait passer inaperçu vue limplantation de la famille Rouanet de Lavit au XIXe siècle dans la commune, a été traité par Jean-Pierre Rouanet de Vigne Lavit, descendant des fondateurs du château à la fin de la première moitié du XIXe siècle. On y produit aussi des vins de Pays  des coteaux de Murviel et vins de pays d'Oc.","architecture":"Autignac,  le premier propriétaire de ce château du XIXe siècle avait rapporté de l'exposition universelle de Paris de 1900 de nombreux végétaux encore présents sur le site cinq chambres d'hôtes quatre étoiles, suite privative, vinothèque, salles de séminaire.                                                                                        Lavit le château à peu changer malgré ses modifications de la toiture du corps de logis rectangulaire, les parties arrondies ont été supprimés, ont gardé le fronton triangulaire, la façade présente toujours trois niveaux balcon au premier étage, les tourelles d'angles ont recu un toit pointu en poivrière.","habitants":"Famille d'Eric de Turckheim\r\n        \"","divers":"Château à Autignac, Autignac de Ciffre et de Lavit.","gps":"","images":["../../jctruffet.com/image/image_34/34_Autignac_1.jpg","../../jctruffet.com/image/image_34/34_Autignac_2.jpg","../../jctruffet.com/image/image_34/34_Autignac_3.jpg","../../jctruffet.com/image/image_34/34_Autignac_4.jpg","../../jctruffet.com/image/image_34/34_Autignac_5.jpg"]},"Consult_chateau_formulaireae42":{"id":"Consult_chateau_formulaireae42","dept":"34","canton":"St-Martin de Londes","commune":"St-Jean de Bègues","nom":"Baulx","type":"Vestiges","periode":"XII-XVIII","histoire":"BAULX;  point de contrôle et de surveillance de la baronnie de Pégairolles, dépendante de cette baronnie, la seigneurie de Saint-Jean-de-Buèges est mentionnée dans des documents historiques dès l'an 990, ce donjon n'abrite qu'une faible garnison commandé par les Calladour famille qui se transmet la charge de capitaine de 1280 à 1418. Passa en 1420 à Jean de Trinquière puis en 1679, le seigneur de Cambous issu d'un puissant lignage et riche propriétaire, rachète le château et entreprend sa transformation. Puis en 1625 à Jean Desflours,  ensuite à Marc-Antoine de Ratte auquel succède son fils François en  1690 et par alliance entre dans la famille de Turenne en 1799 qui s'en sépare quinze ans plus tard, l'édifice ruiné des pierres sont uitilisées par les habitants du village pour leurs constructions.  En 1813, la famille de Turenne vend ces ruines à Hilaire de Girard du Lac, gentilhomme verrier, dont l'héritière en 1848, épouse Henri Sicard. Si certains remparts sont reconstruits, le château est converti en bergerie. En 1987, Joseph Sicard, maire de Saint-Jean et propriétaire du château, en fait don à la commune et, à partir de 1990 les travaux de sauvegarde et de restauration sont entrepris.","architecture":"La seigneurie perché sur son piton rocheux, le château de Baulx, domine le village. Simple tour de guet , érigé aux environs du XIIe siècle, une tour maîtresse servant de point de contrôle et de surveillance, ce donjon n'abrite qu'une faible garnison, est agrandi aux XIIIe et XIVe siècles et devient un véritable château entouré d'une première enceinte avec meurtrières, d'une citerne et d'un magasin. l'ensemble connaît au cours des siècles différents aménagements. Au XIXe siècle il est décrit en ruine. Laissé à l'abandon, le monument couvert de végétation, en partie démoli, est légué à la commune en 1987, des campagnes de fouilles sont réalisées sous le contrôle des monuments historiques. Il ne s'agissait pas de reconstruire à une époque précise, mais de montrer aux visiteurs les transformations au gré des périodes d'insécurité et de calme. Au cours de la Révolution Française, la commune porte les noms de La Sentinelle, Roche-au-Midi et Rochemidy.","habitants":"Famille de Calladour\r\n        \"","divers":"Vestiges du château des Baulx à Saint-Jean de Buègues","gps":"","images":["../../jctruffet.com/image/image_34/34_Baulx_1.jpg","../../jctruffet.com/image/image_34/34_Baulx_2.jpg","../../jctruffet.com/image/image_34/34_Baulx_3.jpg","../../jctruffet.com/image/image_34/34_Baulx_4.jpg","../../jctruffet.com/image/image_34/34_Baulx_5.jpg","../../jctruffet.com/image/image_34/34_Baulx_6.jpg","../../jctruffet.com/image/image_34/34_Baulx_7.jpg"]},"Consult_chateau_formulaire5fff":{"id":"Consult_chateau_formulaire5fff","dept":"34","canton":"Olonzac","commune":"Beaufort","nom":"Beaufort(34)","type":"château","periode":"XVI-XIX","histoire":"BEAUFORT le pittoresque village est entouré de vignes avec un château dominant. Le village s'est développé au XIXe siècle grâce à lextraction de lignite dans les mines de la Serre, aujourd'hui fermées. Le seigneur Isarn, ayant participé à la défense de la cité de Minerve, est dépossédé de son château en 1210 durant la Croisade des Albigeois. C'est Lambert de Thury qui s'y installe en 1234. Le bourg eut à souffrir des guerres de religion en 1590.  En 1711 et 1712, Pierre et Claude Amieu sont élus capitouls de Toulouse, c'est à dire consuls de la ville; cette fonction est anoblissante, et modifie définitivement le statut social de la famille.  Jean, fils aîné de Claude obtint, en 1716, l'office de Président des Trésoriers de France à Montauban avec son père, il achète plusieurs seigneuries : Blagnac, près de Toulouse, Monbrun, dans le Volvestre et Beaufort dans le Minervois. Claude Amieu s'intitule dès lors baron de Blagnac. Ses fils et leurs descendances prennent les noms d'Amieu de Blagnac, Amieu de Monbrun et Amieu de Beaufort.   Beaufort, modeste seigneurie du diocèse de Saint-Pons, François d'Amieu de Beaufort, fils de Claude est en terrain de connaissance : Joseph, son frère est curé de la paroisse d'Olonzac, petit bourg à proximité. Il s'allie, en 1731, à Marie Vitalis de Latour, d'une famille d'Olonzac. Son fils aussi prénommé François, Mousquetaire du roi, capitaine de dragons, chevalier de Saint-Louis épouse, en 1777, sa cousine Catherine Elisabeth Vitalis de Latour. Il n'a pas d'enfant et adopte en 1818 François Saint-Maurice, dont la naissance est mystérieuse.  Ce dernier épouse en 1818  Marie Claire Sahuc. La famille s'est éteinte en la personne de leur fils François-Achille, contraint de vendre le domaine de Beaufort au milieu du XIXe siècle. Le patronyme a été relevé par la descendance féminine, sous le nom  de Moulins d'Amieu de Beaufort.   Aujourd'hui le château  est une société  dirigé par Pierre Passerieux.","architecture":"Les seigneurs de Beaufort sont cités dans les chartes des XIe et XIIe siècles. Ils furent dépossédés après la guerre albigeoise. Le château est à trois corps de bâtiment disposés en U autour d'une large terrasse qui regarde au sud. L'aile sud-ouest paraît avoir été rajouté au XVIIIe siècle sur le corps principal, plus ancien mais largement remanié à cette époque. A l'origine, l'édifice semble avoir été composé d'un corps de bâtiment en retour d'équerre, formé du corps principal et de l'aile sud-est. Il était flanqué, aux angles de la façade nord, par deux tours . La tour nord-ouest a été en partie englobée dans l'aile sud-ouest. A l'intérieur, la distribution des étages est assurée par un escalier à volées droites, placé dans l'axe du corps principal. En façade, la cage d'escalier se manifeste par un surcroît qui interrompt la toiture du corps de bâtiment. L'ensemble constitué par les façades et toitures du château, le grand escalier avec sa cage.","habitants":"Famille Amieu\r\n        \"","divers":"Château de Beaufort","gps":"","images":["../../jctruffet.com/image/image_34/34_Beaufort(34)_1.jpg","../../jctruffet.com/image/image_34/34_Beaufort(34)_2.jpg"]},"Consult_chateau_formulaire14b7":{"id":"Consult_chateau_formulaire14b7","dept":"34","canton":"Gignac","commune":"Belarga","nom":"Belarga","type":"Château","periode":"XVIII","histoire":"BELARGA, le castrum, devenu château au XIIIe siècle, est cité avec toutes les seigneuries environnantes (Adissan, Paulhan, Plaissan, Puilacher, Clermont, Aumelas, Tressan) . Construction probable au XIVe siècle d'un premier château ; remanié au XVe siècle, il  présente  une belle façade Renaissance au sud. Longtemps abandonné, servant de poulailler, il a retrouvé, grâce à ses propriétaires actuels un lustre nouveau.","architecture":"Ce château reconstruit au XVIe et XVIIe siècle, situé sur les berges de lHérault, le petit village viticole de Bélarga forme une enceinte urbaine quadrilatérale mise à part dans sa partie sud où elle rejoint lenclos castral primitif. Le bourg, qui sétend en contrebas du château, semble être un aménagement du XIIIe siècle.\r\n La position du château est strictement stratégique, en effet, il fût bâti de façon à contrôler la route du littoral à larrière-pays ainsi que le passage de la rivière à gué, ou par barque comme cela se faisait il y a peu de temps.\r\n Se dressant sur un remblai naturel, le château et son moulin étaient autrefois séparés par un marécage qui fut asséché. Le château médiéval fut remanié à plusieurs époques, ne conservant quune petite partie de ses murs dorigine.\r\n Instrument de puissance du pouvoir seigneurial, le moulin rythmait la vie au village : les populations villageoises sy rendaient fréquemment pour moudre leur grain en contrepartie dune taxe. Le moulin à eau banal de Bélarga est lexemple même du petit moulin à retenue, autrefois muni dune roue à aubes.","habitants":"Seigneur de Belarga\r\n        \"","divers":"Château de Belargua","gps":"","images":["../../jctruffet.com/image/image_34/34_Belarga_1.jpg","../../jctruffet.com/image/image_34/34_Belarga_2.jpg","../../jctruffet.com/image/image_34/34_Belarga_3.jpg"]},"Consult_chateau_formulaire0697":{"id":"Consult_chateau_formulaire0697","dept":"34","canton":"Agde","commune":"Bessan","nom":"Bessan","type":"Château","periode":"XVIII","histoire":"Deux châteaux à Bessan ville fortifiée, château de Saint-Louis et de Hortes                                                                                 BESSAN, Vers 1050-1100, commence à se construire le village fortifié de Bessan.\r\nEn 1209, l'armée des croisés, dont le chef militaire est Simon de Montfort, s'empare de la région, sous prétexte de chasser les Cathares, et dix ans plus tard les châteaux de Bessan et Touroulle deviendront propriété de son fils Amaury. En 1278, les Bessanais ont déjà obtenu du seigneur le droit d'élire des consuls (maires) pour s'occuper des affaires politiques. Lors de la Révolution Française, les citoyens de la commune se réunissent au sein de la société révolutionnaire, baptisée « société populaire des sans-culottes régénérée », avec 172 membres en l'an III. En 1851, lors du coup d'État de Napoléon III, le canon est pointé sur la grand'rue et une trentaine de Bessanais républicains sont déportés. En 1907, les Bessanais participent activement à la révolte des vignerons du Midi. En novembre 1942, les troupes allemandes entrent dans Bessan pour l'occuper.                                                            HORTES,  dès le XVIIIe siècle en la personne d'un certain Mr Malibran d'Hortes député de Bessan. C'est en 1845 à l'occasion du mariage d'Alphonse Viennet  avec Angélique Sicard  que le domaine d'Hortes entre dans le famille, Alphonse et Angélique font construire dans les années 1860 l'actuel château qui n'a subi à ce jour aucune modification. Leur fils Charles (1851-1938) héritera du domaine . Il faudra attendre les années 1930 pour que le château soit à nouveau habité par Charlotte Viennet  et son époux Pierre d'Andoque de Sériège. Ils s'y installeront quelques années après leur mariage et y vivront avec leurs 3 enfants.\r\nSAINT-LOUIS   est une demeure familiale située au cur dun parc, entre lHéraut et la montagne dAgde, une société qui est située à Marseillan, cette entreprise exerce son activité dans le domaine suivant : location de salles  château de Saint-Loup.","architecture":"Bessan l'ensemble patrimoine architectural intéressant , une fenêtre à meneau de la fin du Gothique (vers 1480) dans la rue de la République ; une maison médiévale restaurée dans la rue des Cours ; un encadrement de porte et balcon de 1830 dans la rue du Four ; l'intérieur d'un hôtel particulier de 1770 dans la rue de l'Opéra . En partant de la porte Saint-Pierre, le mur d'enceinte semble suivre les façades de la rue des Soleillers. Il était renforcé d'une tour à hauteur de la rue de la Brèche ; une tour qui, en ruine, sera démolie, permettant l'ouverture de la rue. Le conseil municipal siège dans l'ancienne tour des remparts, appelée aujourd'hui salle du conseil et des mariages. Au sein de cette salle est placée une Marianne en bronze de Georges Saupique.                                      Saint-Louis  est une demeure  de style italienne avec des colonnes et des terrasses de mosaïques lui confèrent un charme exceptionnel et une allure de majestueuse villa romaine.  Corps de logis rectangulaire à un niveau sur rez-de-chaussée                             Château d'Hortes corps de logis à deux niveaux, inséré entre deux pavillons saillants rectangulaires à trois niveaux toiture en croupe. Le domaine est alors constitué de vignes et de bâtiments en forme de cour carré abritant les bâtiments à usage viticole  et à usage d'habitation. Si les bâtiments d'exploitation sont intacts, il ne reste, aujourd'hui, de l'ancienne demeure qu'une partie du corps de bâtiment et une tour.","habitants":"Mr Malibran d'Hortes\r\n        \"","divers":"Bessan, village fortifie château de Saint-Louis et de Hortes","gps":"","images":["../../jctruffet.com/image/image_34/34_Bessan_1.jpg","../../jctruffet.com/image/image_34/34_Bessan_2.jpg","../../jctruffet.com/image/image_34/34_Bessan_3.jpg","../../jctruffet.com/image/image_34/34_Bessan_4.jpg","../../jctruffet.com/image/image_34/34_Bessan_5.jpg"]},"Consult_chateau_formulaire88d6":{"id":"Consult_chateau_formulaire88d6","dept":"34","canton":"Montpellier","commune":"Montpellier","nom":"Bionne","type":"Château","periode":"XVIII","histoire":"BIONNE, anciennement château de Mont-Louis, de la fin du XVIIe siècle, Le nom du château de Mont-Louis apparaît pour la première fois en 1685, quand il est la propriété du puissant Nicolas de Lamoignon de Basville, « intendant de justice, police et finances, commissaire départi pour l'exécution des ordres du roi dans la province de Languedoc ».  ce dernier conserve le château jusqu'à son retour à la Cour, en 1718.\r\nL'édifice passe ensuite en différentes mains dont celle des Bonnier, qui possèdent également le château de la Mosson et le château d'Alco. C'est à cette période qu'il prend le nom actuel de château de Bionne. Une légende locale raconte que Bonnier de la Mosson utilisait des souterrains non trouvés jusqu'à aujourd'hui  pour venir de chez lui visiter une demoiselle de Bionne. Au cours du siècle suivant, il échoit aux familles de Pourtalès, de Montpezat, Thibault et enfin, Leenhardt dont sont issus l'historien Albert Leenhardt et le journaliste Étienne Leenhardt. Il devient ensuite un centre de colonie de vacances géré par l'association des amis de l'école laïque, puis le premier centre d'IVG de Montpellier.\r\nC'est aujourd'hui un château-hôtel. Le 3 avril 2010, s'y sont déroulées des épreuves de la Poker Cup.","architecture":"Bionne diffère des autres folies montpelliéraines du XVIIIe siècle en ce qu'il présente un toit à la Mansard. Il a subi certaines modifications à la fin du XIXe début du XXe siècle qui altèrent son aspect initial, notamment, des ardoises et chéneaux de zinc ont remplacés la couverture traditionnelle de tuiles creuses. Le principe architectural  un corps de bâtiment entouré de deux courtes ailes  est à rapprocher de celui du château de Flaugergues, également de la fin du XVIIe siècle. Sous la terrasse, une grotte-fontaine,  de l'époque de Nicolas de Basville, fin XVIIe siècle début XVIIIe siècle, a été conservée.","habitants":"Nicolas de Lamoignon de Basville\r\n        \"","divers":"Château de Bionne","gps":"","images":["../../jctruffet.com/image/image_34/34_Bionne_1.jpg","../../jctruffet.com/image/image_34/34_Bionne_2.jpg","../../jctruffet.com/image/image_34/34_Bionne_3.jpg"]},"Consult_chateau_formulaireeb5a":{"id":"Consult_chateau_formulaireeb5a","dept":"34","canton":"Lodève","commune":"St-Jean de la Blaquière","nom":"Blaquière","type":"Château","periode":"XIV-XVII","histoire":"BLAQUIERE, le château de la Blaquière des XIVe et XVIIe siècles, recensé à l'Inventaire général du patrimoine culturel. Un dolmen et des mobiliers métalliques, découverts dans une sépulture par un agriculteur, permettent de penser que le site de la commune a été habité dès le Néolithique. En 983, un moine de l'abbaye de Gellone à Saint-Guilhem-le-Désert fait don au monastère de deux manses lui appartenant, localisées sur le territoire de la commune. La première mention officielle figure dans le testament de saint-Fulcran. Il signale une église consacrée à saint Jean-Baptiste, sa villa (domaine romain) nommée Pleuis et les six manses qui font partie du domaine. Au XIIe siècle et XIIIe siècle, des documents royaux font mention de la villa « Saint Jean de Pleus ».","architecture":"l'actuel château de la Blaquière, dans son gros-uvre, ne semble pas antérieur au XIVe siècle. Ce monument occupe l'angle nord-est de l'ancienne fortification d'agglomération, dont il reste de nombreux vestiges dans la partie nord du village. La construction est faite de grès, moellons et pierre de taille, sur une élévation à quatre travées. À son angle nord-est, elle est flanquée d'une tour d'angle à toit conique avec pigeonnier orienté au sud. Une toiture à longs pans conique pour la tour, emploie la tuile creuse et les dalles de schiste. La porte d'entrée de l'édifice date du XVIIe siècle et présente un blason récemment restitué  d'après une sculpture conservée au cloître de la cathédrale Saint-Fulcran de Lodève, réputée provenir de Saint-Jean-de-la-Blaquière. Une porte secondaire, dans la rue des Quatre Coins, possède des montants creusés destinés à recevoir deux colonnes cylindriques.\r\nJusqu'au XIXe siècle, la façade nord, ouverte sur des jardins, était entièrement dégagée. Elle est aujourd'hui cachée en partie par des constructions modernes.","habitants":"Domaine eccléssiastique\r\n        \r\n        \"","divers":"Château de Blaquière à Saint-Jean de Blaquière","gps":"","images":["../../jctruffet.com/image/image_34/34_Blaquiere_1.jpg","../../jctruffet.com/image/image_34/34_Blaquiere_2.jpg","../../jctruffet.com/image/image_34/34_Blaquiere_3.jpg","../../jctruffet.com/image/image_34/34_Blaquiere_4.jpg"]},"Consult_chateau_formulaire09d4":{"id":"Consult_chateau_formulaire09d4","dept":"34","canton":"Castries","commune":"Jacou","nom":"Bocaud","type":"Château","periode":"XVIII","histoire":"BOCAUD, Raoul ou Rolin Bocaud, procureur général à la cour des aides en 1477, achète Jacou entre 1469 et 1476. Son arrière petit-fils, Pierre Bocaud est premier président à la cour des aides de 1603 à 1629. C'est lui qui fait construire le château (la stèle du jardin indique la date de 1618). Issu de cette famille de magistrats protestants déjà très puissante, Pierre abjure sa foi en 1625 et devient un familier de Richelieu qu'il aurait reçu dans son hôtel de Montpellier et peut-être aussi à Jacou en 1632 et 1642. Les Bocaud, successivement présidents de la cour des aides, conservent leur domaine sans morcellement jusqu'à la mort de Thomas Marie en 1788. Sa succession passe par sa femme Jeanne Marie Emilie de Guignard de Saint-Priest à Thomas Marie de Masclary en 1802. Napoléon le dote d'un majorât avec le titre de baron en 1813 . Au début du XIXe siècle le marquis de Masclary hérite des biens, aménage le jardin romantique et creuse le lac.  Proche du lac, la Coquille est une grotte ornée  de coquillages. Accolée, une bâtisse abritait un puits à roue et une noria.  Après 1846, on verra se succéder cinq propriétaires.\r\nLa ville de Jacou rachète le domaine en 1995 : elle entreprend depuis 2005 des travaux de restauration dans le château et dans le jardin.","architecture":"Bocaud, Le site dans son ensemble est considéré par les spécialistes comme l'une des plus anciennes «folies» de la région. Ainsi, le château, le jardin et le domaine agricole attenant ont appartenu à la même famille pendant quatre siècles. En 1618, édification du château actuel, remanié au cours du XVIIIe et XIXe siècles. Le bâtiment ouest abrite une enfilade de pièces aux menuiseries du XVIIe siècle. Vers 1760, un salon est orné de gypseries à décor de fables. Le décor le plus important est d'inspiration napoléonienne (1873-1878). Première mention des jardins en 1712. De plan rectangulaire à trois niveaux à toits plat avec fronton triangulaire en façade plein cintre.","habitants":"Famille de  Rolin Bocaud\r\n        \"","divers":"Château de Bocaud à Jacou","gps":"","images":["../../jctruffet.com/image/image_34/34_Bocaud_1.jpg","../../jctruffet.com/image/image_34/34_Bocaud_2.jpg","../../jctruffet.com/image/image_34/34_Bocaud_3.jpg","../../jctruffet.com/image/image_34/34_Bocaud_4.jpg","../../jctruffet.com/image/image_34/34_Bocaud_5.jpg"]},"Consult_chateau_formulaire86cd":{"id":"Consult_chateau_formulaire86cd","dept":"34","canton":"Lunel","commune":"Boisseron","nom":"Boisseron","type":"Château","periode":"XIV","histoire":"BOISSERON, en 1110 cartulaire de Nîmes (castro buxedone), 1160 cartulaire d'Aniane (castri boixezonis), 1168 manuscrit d'Aubais (castri de Boisedono), Hommages des seigneurs de Boisseron, la famille Bermond de Sauve, à l'évêque de Maguelone en 1243 à  1333. La seigneurie reste dans les mains de cette famille jusqu'au XVIe siècle. En 1591, elle passe dans la famille de Gondin. En 1620, un avocat de Nîmes, Anne Rulman établit une esquisse complète du village et du château avec une enceinte fortifiée complète comprenant remparts, douves et château. En 1789, c'est un Thomas Le Sage d'Hauteroche d'Hulst qui vote sous le nom de seigneur de Boisseron aux assemblées de la noblesse. Par alliance, le château passe de la famille Le Sage d'Hauteroche d'Hulst à la famille de Galard comte de Béarn Brassac et par vente en 1847 à la famille Moynier Chamberand. En 1856, le château est vendu à la famille Silhol.  La propriété passe ensuite aux familles Kléber, Pagesi puis  aux de Fleurieu. En 1965, le château est vendu à \"l'association nationale des membres du mérite sportif et des médaillés de la jeunesse et des sports\". En 2004, une société de promotion immobilière d'Amiens CPI achète le château et met en place un projet immobilier de 119 logements avec démolition de 9 bâtiments autour du château. Les remparts et les douves ont fait l'objet d'une protection suite à leur inscription le 3 mai 2006 par la préfecture de l'Hérault.","architecture":"Boisseron, ceinture d'un bourg castral attesté depuis le XIIe siècle, ayant résisté à l'urbanisation de la seconde moitié du XXe siècle, elle a été conservée dans sa continuité. Les douves, creusées dans la roche, ont été asséchées et transformées en jardins. Le château de base médiévale a fait l'objet de modification, de forme en U il est passé en forme en L suite à un incendie vers 1870.  A deux niveaux et attiques avec parcours sur cours intérieures sur arcades, la porte fortifiée, construite entre le XIIIe et le XVe siècle, est inscrite à l'inventaire supplémentaire des Monuments Historiques.\r\nLes remparts et les douves ont fait l'objet d'une protection par la préfecture de l'Hérault.","habitants":"Famille Bermond de Sauve\r\n        \"","divers":"Château de Boisseron","gps":"","images":["../../jctruffet.com/image/image_34/34_Boisseron_1.jpg","../../jctruffet.com/image/image_34/34_Boisseron_2.jpg","../../jctruffet.com/image/image_34/34_Boisseron_3.jpg","../../jctruffet.com/image/image_34/34_Boisseron_4.jpg","../../jctruffet.com/image/image_34/34_Boisseron_5.jpg"]},"Consult_chateau_formulaire5391":{"id":"Consult_chateau_formulaire5391","dept":"34","canton":"Montpellier","commune":"Montpellier","nom":"Bon","type":"Château","periode":"XVII-XIX","histoire":"BON; en août 1694, Philibert de Bon, premier président à la cour des comptes, aides et finances de Montpellier, souhaite que sa demeure soit construite sur l'emplacement du « mas de Terrade », domaine agricole qu'il possède à l'ouest de Montpellier. L'édifice construit entre 1694 et 1700 par d'Aviler, architecte majeur du Languedoc, est, selon certains auteurs, exemplaire de ses apports à l'architecture de la région : par ce château de campagne, d'Aviler introduit à Montpellier « le modèle de la maison de plaisance inspirée par Val, Saint-Cloud ou même Marly ». Perclus de dettes, Philibert de Bon, devenu entre temps marquis de Saint-Hilaire, se sépare du château qui porte son nom avant sa mort en 1711. Le château passe ensuite en différentes mains jusqu'à être acquis au XIXe siècle par un propriétaire qui transforme résolument son apparence entre 1858 et 1862. Le parc est réaménagé et planté d'essences rares par les paysagistes Denis et Eugène Bühler.","architecture":"Château Bon, les travaux du XIXe siècle n'ayant pas touché au gros-uvre, l'édifice conserve le plan de masse, un corps de bâtiment central entouré de deux courtes ailes. C'est le principe utilisé dans les autres folies montpelliéraines de même époque, le château de Flaugergues et le château de Bionne, quoiqu'ici inversé, les deux ailes se développant sur cour d'entrée et non sur jardin.\r\nL'aspect extérieur est cependant profondément modifié. La toiture languedocienne à longs pans de tuiles creuses a été remplacée par un toit à la Mansard en ardoises, orné d'encadrements de lucarnes Napoléon III. Les deux échauguettes d'angle d'emploi similaire à celles utilisées au château de Lavagnac, se sont ornées d'un clocheton. Les façades sont parées d'un décor dans le goût Louis XIII. Le jardin (1,13 ha) présente entre autres des bassins et une fontaine « de Diane ».","habitants":"Famille de Philibert de Bon\r\n        \"","divers":"Château de Bon à Montpellier","gps":"","images":["../../jctruffet.com/image/image_34/34_Bon_1.jpg","../../jctruffet.com/image/image_34/34_Bon_2.jpg"]},"Consult_chateau_formulairef388":{"id":"Consult_chateau_formulairef388","dept":"34","canton":"Montpellier","commune":"Juvignac","nom":"Bonnier_Mosson","type":"Château","periode":"XVIII","histoire":"BONNIER la Mosson; Joseph Bonnier Ier achète la baronnie grâce au poste de trésorier des états du Languedoc  qui augmente la richesse paternelle dont il dispose déjà. Il entreprend la reconstruction de la demeure a priori en 1723, et meurt trois ans plus tard. Le domaine revient alors à son fils Joseph Bonnier II. Celui-ci hésite à renoncer à sa vie militaire et parisienne, mais achève finalement la réhabilitation. Il en vient même à décorer et meubler le château dun grand luxe. Joseph Bonnier de la Mosson, aristocrate et grand financier donnait dans le domaine de somptueuses fêtes et concerts . Joseph II est amateur de jolies filles, quil trouve dans les \"coulisses de lOpéra\". Il emmène lune de ses conquêtes, chanteuse parisienne qui cette dernière sennuyant rapidement, à la Mosson.  Lévêque de Montpellier résidant au château de Lavérune, fait savoir à Joseph II Bonnier, quil napprécie pas ses pratiques.  Joseph se fait alors plus discret et finit par rentrer à Paris, sa chanteuse le laisse pour reprendre la scène et meurt à 33 ans des suites dun avortement. Il épouse finalement une demoiselle honorable en 1740, qui lui donnera une fille avant quil ne succombe à la maladie en 1744.  À sa mort sa fortune est dilapidée, sa veuve vend une grande partie des biens, notamment le mobilier du château de la Mosson. En 1750 il ne reste que des ruines, seulement 30 ans après sa construction.\r\n Ainsi contrairement aux autres folies montpelliéraines le château de la Mosson nest pas une demeure familiale conservatrice duvres dart.  Une tentative de reconstruction, sans succès, à lieu au XIXe siècle. Seuls ont subsisté quelques éléments de la décoration intérieure dans le salon, et le pavillon central.  On peut apercevoir une somptueuse fontaine baroque du XVIIIe qu'on appelle le buffet deau avec ses coquillages, quartz et sculptures (long de 100 m et 12 m de hauteur) voilà tout ce quil reste de cette fastueuse folie montpelliéraine.","architecture":"Cest dans ce grand parc, au bord de la Mosson, que la famille Bonnier fit construire sa \"folie\" au début du XVIIIe siècle. Larchitecte du château nétait autre que Giral, architecte de la promenade du Peyrou. Démantelé 30 ans seulement après sa construction, suite à la ruine de la famille Bonnier, la demeure fut ensuite occupée par des usines artisanales, le château fut définitivement ruiné à la fin du XVIIIe siècle, et seuls subsistent le pavillon central et le buffet deau (long de 100m).\r\nEntre temps classé, le parc est ouvert au public depuis 1984 et propose plus de 16 hectares de nature aux promeneurs et aux coureurs à la porte de Montpellier. Aujourdhui on ne trouve que des vestiges du château, le corps central, des uvres qui lhabitaient et lentouraient. Quelques statues très dégradées décorent encore la terrasse mais les meilleures réalisations on été transférées au château dÔ, au château de lEngarran, et au Jardin de la Fontaine de Nîmes etc.","habitants":"Famille de  Joseph Bonnier\r\n        \"","divers":"Château de Bonnier-Mosson à Juvignac","gps":"","images":["../../jctruffet.com/image/image_34/34_Bonnier_Mosson_1.jpg","../../jctruffet.com/image/image_34/34_Bonnier_Mosson_2.jpg","../../jctruffet.com/image/image_34/34_Bonnier_Mosson_3.jpg","../../jctruffet.com/image/image_34/34_Bonnier_Mosson_4.jpg","../../jctruffet.com/image/image_34/34_Bonnier_Mosson_5.jpg","../../jctruffet.com/image/image_34/34_Bonnier_Mosson_6.jpg"]},"Consult_chateau_formulairef383":{"id":"Consult_chateau_formulairef383","dept":"34","canton":"Maugio","commune":"Mudaison","nom":"Bosc","type":"château","periode":"XIX","histoire":"Le château du Bosc-Fesc, édifice néo-Renaissance datant du XIXe siècle, était la propriété des de Cadsolle. Aujourd'hui hôtel de ville, ce monument recensé par l'Inventaire général du patrimoine culturel est situé à Mudaison,  la chapelle du château, antérieure à ce dernier, date de 1760. Le château du Bosc est une propriété privée. Il fait l'objet d'un recensement à l'Inventaire général du patrimoine.","architecture":"Le château du Bosc, édifice néo-Renaissance datant du XIXe siècle. Corps de logis rectangulaire à deux niveaux fronton triangulaire en façade.                                                                                                  Maisson forte du Fesq en forme de L à trois niveaux flanquée de tours sur de Angles de la façade sud.","habitants":"Famille des de Cadsolle\r\n        \"","divers":"A Mudaison château du Bosc mairie  et maison forte à Fesq","gps":"","images":["../../jctruffet.com/image/image_34/34_Bosc_1.jpg","../../jctruffet.com/image/image_34/34_Bosc_2.jpg"]},"Consult_chateau_formulaire6989":{"id":"Consult_chateau_formulaire6989","dept":"34","canton":"Ganges","commune":"Ganges","nom":"Brissac_Villarel","type":"Château","periode":"XIV-XVIII","histoire":"Deux châteaux à Brissac celui de Brissac du XI-XVIe siècle et celui de Villarel  du XIXe siècle                                                 BRISSAC, La construction du château de Brissac date du XIe siècle : cest en effet à cette époque que furent baties les  tours, appartenait aux seigneurs de Brissac, eux même vassaux du seigneur dAgonès. Première mention   en 1189, sous le nom de \"Bisturris\". En 1230, Brissac revient au comte Hugues de Rodez par mariage  avec Elizabeth fille de Raymond de Roquefeuil. Devenu possession des évêques de Maguelone au XIIIe siècle, le XVIIe siècle, verra la transformation du château en une demeure dhabitation : des étages sont construits sur   le logis dorigine, le parc voit le jour à cette époque. En 1904 le château est acheté par Henri de Rodez Benavent  et c'est en 1965 que débute la restauration du château.                                                            VILLAREL; en labsence du seigneur des lieux, le vieux Thibaut le Fou a célébré un mariage fort peu chrétien, selon les rituels druidiques interdits par la Sainte Église. Heureusement, le seigneur de Villarel est rentré de croisade. Les épousés ont tout de même prononcé leurs vux devant Méredwen et Kernunnos, déesses de la fertilité et Dieu cornu. Transformé en gîtes de France.","architecture":"Brissac,  du XIe siècle, agrandi au XIVe siècle : les tours sont surélevées, lenceinte est construite et le donjon est couronné. Corps de logis rectangulaire à trois niveaux flanqué de deux donjons un rectangulaire ayant perdu ses échauguettes et un carré tout deux crénelé  dépassant largement l'ensemble tour ronde à l'extérieur.                                                                                             Villarel, le château  a été construit au Second Empire vers 1860.\r\nEn face du château, la paroisse de Saint Etienne d'Issensac du XIIe siècle  et à ses pieds un pont gothique en dos d'âne forment un ensemble médiéval classé monument historique, château et ses anciens bâtiments de ferme, le corps de logis rectangulaire à deux niveaux  sur assise  à toiture en croupe flanqué dans les angles de belles échauguettes à toit en poivrières avec meurtrières et escalier d'accès sur façade principale.","habitants":"Famille de Raymond de Roquefeuil\r\n        \"","divers":"Château de Brissac et de Villarel à Ganges","gps":"","images":["../../jctruffet.com/image/image_34/34_Brissac_Villarel_1.jpg","../../jctruffet.com/image/image_34/34_Brissac_Villarel_2.jpg","../../jctruffet.com/image/image_34/34_Brissac_Villarel_3.jpg","../../jctruffet.com/image/image_34/34_Brissac_Villarel_4.jpg","../../jctruffet.com/image/image_34/34_Brissac_Villarel_5.jpg","../../jctruffet.com/image/image_34/34_Brissac_Villarel_6.jpg","../../jctruffet.com/image/image_34/34_Brissac_Villarel_7.jpg","../../jctruffet.com/image/image_34/34_Brissac_Villarel_8.jpg","../../jctruffet.com/image/image_34/34_Brissac_Villarel_9.jpg"]},"Consult_chateau_formulaire7aea":{"id":"Consult_chateau_formulaire7aea","dept":"34","canton":"St-Gely du Fesc","commune":"Buzignargues","nom":"Buzignargues","type":"Château","periode":"XVII","histoire":"BUZIGNARGUES, dit château des Guilleminet au XVIIe siècle propriété de la famille de  Guilleminet seigneur de Buzignargues et de Gallargues cette famille donnera plusieurs membres à la cour des comptes de Montpellier, passa dernièrement à la famille de l'Espine avant d'être revendu.","architecture":"Buzignargues  construit au XVIIe siècle de plan en H comporte un corps de logis central et de deux ailes perpendiculaires à trois niveaux  dont un demi-étages sous combles, toitures à faible pentes, porte d'entrée surmonté d'un fronton brisé et par un pont de pierre franchissant de fausses douves. les ouvertures des fenêtres modifiées au XIXe siècle, remplacement des fenêtres à meneaux.","habitants":"Famille de  Guilleminet \r\n        \"","divers":"Château de Buzignargues","gps":"","images":["../../jctruffet.com/image/image_34/34_Buzignargues_1.jpg","../../jctruffet.com/image/image_34/34_Buzignargues_2.jpg"]},"Consult_chateau_formulairede21":{"id":"Consult_chateau_formulairede21","dept":"34","canton":"Clermont l","commune":"Bédarieux","nom":"Bédarieux","type":"Vestiges","periode":"XII","histoire":"BEDARIEUX; Les archives de la ville conservent par ailleurs de nombreux documents qui retracent la gestion et le fonctionnement de la ville, dont les premières mentions remontent au XIIe siècle. Bâtie au carrefour des voies de communication routières, au confluent du fleuve Orb et du torrent Vèbre, elle était très prisée. Signalée par lessor dune industrie florissante dès la fin du XIIe siècle, la ville voit donc se développer rapidement des activités manufacturières. Au Moyen-Age, l'industrie lainière s'y développe, ainsi que les tanneries et les filatures. Les marchés deviennent plus importants. Les mines de bauxite et de charbon sont exploitées et Bédarieux se modernise au cours des ans. Marquée par les guerres de religion ou la destruction danciens remparts, ces événements sont autant de soubresauts nayant pas toutefois freiné lextension industrielle. Bédarieux est dotée dun conseil municipal dès 1790 et devient chef-lieu de canton à cette même période. Lors de la Révolution Française, les citoyens de la commune se réunissent au sein de la société révolutionnaire, baptisée « société des amis de la constitution » et créée le 1er juin 1790. Elle compte 250 inscrits.\r\nAprès le coup d'État du 2 décembre 1851 de Louis-Napoléon Bonaparte, les républicains de Bédarieux et de ses environs s'insurgent pour défendre la République. Ils réussissent à tenir la ville quelques heures, les insurgés n'ont pas comme le prétendit la presse, dévoré le cadavre du maréchal des logis Léotard luttant pour la mise en place de Napoléon III. Mais ils semblent bien avoir uriné sur son cadavre et brûlé ses moustaches.","architecture":"Bédarieux marquée par les guerres de religion ou la destruction danciens remparts, il ne reste qu'un bâtiment d'un moulin du XIIe siècle faisant partie des remparts et un donjon carré.","habitants":"Maréchal des logis Léotard\r\n        \r\n        \"","divers":"Vestiges de tour et châteaux à Bédarieux","gps":"","images":["../../jctruffet.com/image/image_34/34_Bedarieux_1.jpg","../../jctruffet.com/image/image_34/34_Bedarieux_2.jpg","../../jctruffet.com/image/image_34/34_Bedarieux_3.jpg","../../jctruffet.com/image/image_34/34_Bedarieux_4.jpg","../../jctruffet.com/image/image_34/34_Bedarieux_5.jpg"]},"Consult_chateau_formulaire3cc5":{"id":"Consult_chateau_formulaire3cc5","dept":"34","canton":"Béziers","commune":"Béziers","nom":"Béziers","type":"Château","periode":"XVIII-XIX","histoire":"Plusieurs châteaux à Béziers, le Libouriac, Poussan le Haut, de la Roche, de Saint-Jean d'Aureillans et de  St-Bauzille (voir article).                 LIBOURIAC; l'ensemble est conçu et réalise pour la famille Gaujal en 1883-1885, L'épouse d'Abel Gaujal, fille du banquier Lagarrigue, avait hérité du banquier Jean-François Mas le vieux domaine de Libouriac ,qui fut d'une certaine importance au milieu du XVIIe siècle sous le marquis de Gayon. Marie Lagarrigue, épouse d'Abel Gaujal, commande à Louis Garros la construction d'un château sur le domaine hérité de son oncle Jean-François Mas.  L'ancien château, propriété de la famille de Gayon puis des membres de la famille de Dom Bedos de Celles fût détruit et le domaine complètement reconstruit. La date de 1885 sur la façade du château correspond à la fin de la construction.\r\nPOUSSAN le HAUT, en 1370, « Guillaume de Narbonne du château de Poussan » est mentionné parmi les chefs de l'armée du duc d'Anjou commandée par Bertrand Du Guesclin. Le château fut construit à la fin du XVIIIe siècle pour la famille de Nattes de Montpellier.                                                                             CHATEAU LA ROCHE, société civile immobilière est en activité depuis six ans. elle est spécialisée dans le secteur d'activité de la location de terrains et d'autres biens immobiliers. M Philippe et Pierre  Roger.  \r\n ST-JEAN D'AUREILLANS  il sagit plutôt ici dun grand domaine qui possède une tour néo-gothique du XIXe siècle.","architecture":"château de Libouriac  datant du dernier quart du XIXe siècle, cet édifice représentatif de l'architecture éclectique, les façades et toitures des dépendances et bâtiments annexes tels que chapelle, maison des jardiniers, du régisseur.  Le style associe le néo-gothique au néo-Renaissance. Le vaste hall présente une galerie d'étage et s'ouvre sur l'escalier éclairé par une verrière au décor de fleurs et d'oiseaux. Isolée au sud-ouest se trouve la chapelle octogonale avec clocher. Le parc se développe en contrebas, vers la vallée du Libron. Les bâtiments d'exploitation sont situés au sud.                        Château de Poussan le haut, les façades et toitures des ailes nord  ainsi que le portail d'entrée du château. De plan carré, l'édifice est formé de quatre corps de bâtiments entourant une cour et cantonné de pavillons décrochés. L'entrée dans la cour centrale s'effectue par un porche monumental et un passage voûté en anse de panier. L'aile  est précédée par une cour dite \"cour des lions\". Cette façade est cantonnée par deux pavillons fortement décrochés. Au centre se dresse un porche monumental orné de pilastres colossaux à chapiteaux ioniques, surmonté d'un fronton circulaire. Sous ce porche s'ouvre le passage en anse de panier qui permet d'accéder à la cour intérieure. L'aile nord donne sur le parc qui entoure le château au nord. Cette façade est également cantonnée de deux pavillons en fort décrochement. Elle a pour seul décor des masques qui ornent la corniche et les clefs des fenêtres. Un haut perron permet d'y accéder. L'intérieur n'a pas conservé de décor ancien.                                                                                                     St-Jean d'Aureilhans  a été entièrement réaménagé  est devenu un beau jardin public, il accueille aussi un centre de loisirs pour enfants.","habitants":"Famille Gaujal                                                                                    Famille de Nattes\r\n        \r\n        \"","divers":"Béziers plusieurs châteaux, celui de Gayonne, de Libouriac, de Poussan le Haut, de la Roche, de Saint-Jean d'Aureillans et de Saint-Bauzille.","gps":"","images":["../../jctruffet.com/image/image_34/34_Beziers_1.jpg","../../jctruffet.com/image/image_34/34_Beziers_2.jpg","../../jctruffet.com/image/image_34/34_Beziers_3.jpg","../../jctruffet.com/image/image_34/34_Beziers_4.jpg","../../jctruffet.com/image/image_34/34_Beziers_5.jpg","../../jctruffet.com/image/image_34/34_Beziers_6.jpg","../../jctruffet.com/image/image_34/34_Beziers_7.jpg","../../jctruffet.com/image/image_34/34_Beziers_8.jpg"]},"Consult_chateau_formulaire2013":{"id":"Consult_chateau_formulaire2013","dept":"34","canton":"Murviel les Béziers","commune":"Cabrerolles","nom":"Cabrerolles","type":"Vestiges","periode":"Xe","histoire":"CABREROLLES; son premier seigneur mentionné est « Atracerius de Cabrairol », les guerres de religion sont fatales au château. En 1569, le baron de Faugères, un des chefs de la Réforme, commande de détruire la chapelle (seule une partie de l'abside s'écroule). Le duc de Montmorency s'attaque ensuite aux murailles. Ce qui reste est définitivement démantelé en 1630, lors de la campagne de Richelieu pour l'éradication des places fortes féodales. Restaurée au XVIIe siècle, la chapelle, placée sous l'invocation de Notre-Dame de La Roque, devient l'église du village puis est vendue comme bien national à la Révolution. Depuis 1990, le château de Cabrerolles fait l'objet de soins attentifs, soutenus par la commune et une active association locale.\r\nDans la commune le château de la Liquière depuis plusieurs générations \"La Liquière\" le vin est un véritable sacerdoce familial et ce depuis le début du  XVIIIe siècle. Jean Vidal, grand-père des vignerons actuels,  est une belle histoire de famille inscrite avec force, passion et sincérité dans le terroir de Faugères couvre une superficie de 64 hectares. Famille Vidal-Dumoulin.","architecture":"Tout là haut sur l'éperon rocheux sur lequel se dresse la forteresse commande le passage de la haute vallée de l'Orb à la plaine biteroise un puissant château fort de Cabrerolles fut construit dès le Xe siècle, sûrement par un puissant seigneur très chrétien, car lédifice le plus beau, est la chapelle dédiée à Notre Dame des Roches. Le donjon  est cité dès 980. Le site se développe jusqu'à devenir au XIIe siècle l'ensemble fortifié visible aujourd'hui.  L'édifice présente deux tours de guet, l'une tournée vers la montagne, l'autre vers la plaine. Dans la partie haute du site, se dresse une chapelle fortifiée construite en à-pic sur le rocher, et constituant elle aussi un élément de défense active. Son clocher et la tour nord du château ne forment qu'un. Le logis seigneurial s'élève au sud et s'accompagne d'un petit habitat médiéval, le tout protégé par une enceinte fortifiée.","habitants":"Baron de Faugères\r\n        \"","divers":"Vestiges du château de Cabrerolles et le château d'Espondelhan.","gps":"","images":["../../jctruffet.com/image/image_34/34_Cabrerolles_1.jpg","../../jctruffet.com/image/image_34/34_Cabrerolles_2.jpg","../../jctruffet.com/image/image_34/34_Cabrerolles_3.jpg","../../jctruffet.com/image/image_34/34_Cabrerolles_4.jpg","../../jctruffet.com/image/image_34/34_Cabrerolles_5.jpg","../../jctruffet.com/image/image_34/34_Cabrerolles_6.jpg","../../jctruffet.com/image/image_34/34_Cabrerolles_7.jpg"]},"Consult_chateau_formulaire8624-2":{"id":"Consult_chateau_formulaire8624-2","dept":"34","canton":"Lodève","commune":"Viols en Laval","nom":"Cambous","type":"Château","periode":"XVII","histoire":"deux châteaux à Viols en Laval celui de Cambous du XVIe siècle et celui de Ceyras du XIIIe siècle                                                     CAMBOUS; en 1346 première mention de la seigneurie de  Pons de Cambous dont il ne reste plus rien de sa demeure de l'époque, Durant les guerres de religion, Antoine de Cambous est un partisan catholique des plus engagés. En 1584, lors des engagements autour du château de Montferrand, il reprend la forteresse aux protestants. Ce fait d'armes lui vaut les félicitations du roi qui lui accorde le fief de Montferrand et le récompense. La générosité royale permet à Antoine de reconstruire, non loin, son château familial de Cambous et de commencer à en faire le centre d'un domaine qui, trois siècles plus tard, comptera près de 24 km2 d'étendue. En 1584 son descendant Antoine de Cambous rachète les droits seigneurial qui était passé aux mains de l'archevêque de Maguelonne et y fait construire le château qui passa en 1649 à Marc-Antoine de la Ratte qui entreprend de le rénover  d'un style italien. Marc-Antoine de la Ratte, fils de Jeanne de Roquefeuil dit la sainte de Cambous, et petit neveu de l'évêque de Montpellier Guitard de Ratte  fit élever un portail qui symbolise le renouveau de la foi catholique. Le château ce que lon en savait par les inventaires réalisés en 1808 au décès de sa dernière seigneuresse, Marguerite Rigol Marie Elisabeth Alexandrine Berthier, princesse de Wagram (1849-1932), épouse depuis 1874 dEtienne Guy, marquis de Turenne dAynac (1837-1905), avait acheté en 1889 aux héritiers Vogüé,  le château de Cambous, à Viols-en-Laval, et les immenses domaines qui en dépendaient alors, effectuant par la suite quelques petites transactions supplémentaires (acquisitions, ventes ou échanges). Son époux devait y décéder en 1905. Par acte du 13 mars 1914, le député Pierre Leroy-Beaulieu, d'une famille normande installée en Languedoc se rend acquéreur du château.\r\nAujourd'hui hôtel restaurant.","architecture":"Lobjet de cette intervention a été le château de Cambous, monument historique du XVIIe siècle, situé dans la commune de Viols en Laval, (Hérault). Le château, une bâtisse  du XVIIe siècle  imposante d'un quadrilatère flanqué de tours rectangulaires, d'une hauteur dépassant celle du logis dominant l'aile orientale, un donjon carré est couronné de créneaux  et flanqué d'échauguettes.","habitants":"Famille d' Antoine de Cambous\r\n        \"","divers":"A Viols en Laval le château fort de Cambous","gps":"","images":["../../jctruffet.com/image/image_34/34_Cambous_1.jpg","../../jctruffet.com/image/image_34/34_Cambous_2.jpg","../../jctruffet.com/image/image_34/34_Cambous_3.jpg","../../jctruffet.com/image/image_34/34_Cambous_4.jpg","../../jctruffet.com/image/image_34/34_Cambous_5.jpg","../../jctruffet.com/image/image_34/34_Cambous_6.jpg","../../jctruffet.com/image/image_34/34_Cambous_7.jpg","../../jctruffet.com/image/image_34/34_Cambous_8.jpg","../../jctruffet.com/image/image_34/34_Cambous_9.jpg"]},"Consult_chateau_formulairebd27":{"id":"Consult_chateau_formulairebd27","dept":"34","canton":"Maugio","commune":"Candillargues","nom":"Candillargues","type":"Château","periode":"XVII","histoire":"CANDILLARGUES; au XIIIe siècle, le cartulaire de Maguelone mentionne un castrum de Candilhanicis. Jean de Lauzelergues achète la seigneurie de Candillargues en 1624 et y fait construire le bâtiment visible aujourd'hui. De Lauzelergues en 1624, à De la Croix en 1755, 6 générations se léguèrent sans y habiter et gardèrent jusquà la Révolution la seigneurie de Candillargues.  Au début du XIXe siècle, le château fût vendu  à un certain Keyton de Saint Georges. En 1931 et 1935, le domaine est morcelé entre héritiers et vendu à différents acquéreurs. Le château, lui, est divisé en lots dans les années 1980. Dans la seconde moitié du siècle, Emile Galtayries lacheta pour en faire un immense et exemplaire domaine viticole.","architecture":"château XVIIe siècle, propriété privée,était en mauvais état.\r\n Le château que nous connaissons date du XVIIe siècle.  Corps de logis à deux niveaux et attiques, tour carrée en façade dépassant largement la toiture accompagné d'un clocheton. À l'intérieur, le monument présente des voûtes dogives et un intéressant escalier à volées droites se poursuivant en vis sans jour.","habitants":"Famille de La Croix\r\n        \"","divers":"Château de Candillargues.","gps":"","images":["../../jctruffet.com/image/image_34/34_Candillargues_1.jpg","../../jctruffet.com/image/image_34/34_Candillargues_2.jpg"]},"Consult_chateau_formulairedcce":{"id":"Consult_chateau_formulairedcce","dept":"34","canton":"Clermont-l","commune":"Canet","nom":"Canet","type":"vestiges","periode":"XIII","histoire":"CANET, les premiers seigneurs de Canet sont les Guilhem, puissants seigneurs de Clermont-Lodève. Au XIe siècle, Raymond Bérenger de Clermont reçoit de Gausfred II, comte du Roussillon, « divers gages et garants pour une portion de la ville de Torelles (Torreilles) et pour le château de Canet ». En 1215, par une clause de son testament, le baron Aymeri de Clermont demande à son fils aîné Bérenger d'employer les rentes du château de Canet à des uvres pieuses pour le repos de son âme.\r\n Le site originel de Canet se situait plus près du fleuve, à l'emplacement actuel de la tour Saint-Martin (ancienne église du XIIIe siècle), à côté de laquelle fut construit un château aujourd'hui disparu. À cause des inondations de l'Hérault, les habitants ont reconstruit le village plus à l'écart du cours d'eau.\r\nLe château du seigneur était important (sa superficie était à peu prés le quart de celle du village.) Après la Révolution un hôtel sinstalle sur une partie du château ; lHôtel de la paix.\r\nLa mairie actuelle est lancien presbytère construit pour le curé de Canet : Rigaud, en 1779.\r\nCe bâtiment important, presbytère devient la mairie après la Révolution en 1789.","architecture":"Tours des anciens remparts.  En effet, le Canet dantan était établi au bord de lhéraut, ainsi quen atteste la Tour Saint-Martin ( XIIIe). Un château fortifié fut construit à proximité de cette église mais il ne résista pas au temps et surtout aux inondations. Le village se construira alors à proximité, en retrait du fleuve, et à lemplacement actuel des Barrys.    Edifice englobant  des vestiges de l'enceinte et du château médiéval ; tour et mur d'enceinte en grande partie reconstruit au XIXe siècle. Un étage carré ; étage en surcroît, gros-oeuvre : calcaire, moellon; pierre de taille , enduit, type de couverture : toit à longs pans couvert de tuile creuse.\r\nAu Moyen-Age, les canétois vont construire un nouveau village protégé par une enceinte appelée le château et suivant un plan précis avec des rues en maillage rectangulaire. A chaque angle se dressait une tour de guet. Ces tours peuvent être aujourdhui identifiées, elles marquent \" le Quartier de la Ville\". Les remparts furent détruits après la Révolution.","habitants":"Baron Aymeri de Clermont\r\n        \"","divers":"La tour de Canet","gps":"","images":["../../jctruffet.com/image/image_34/34_Canet_1.jpg"]},"Consult_chateau_formulaire9ef4":{"id":"Consult_chateau_formulaire9ef4","dept":"34","canton":"Capestang","commune":"Capestang","nom":"Capestang","type":"Château","periode":"XIV-XIX","histoire":"Trois  châteaux à Capestang celui des archevêques, celui de Redonde à Montels chambres d'hôtes par Hugues de Rodez Bennevent et celui de Carasses du XIXe siècle.                                 CAPESTANG, est un édifice médiéval des XIVe et XVe siècles  des archevêques de Narbonne. La magnificence du château où siégèrent les états du Languedoc et où séjourna le Duc de Berry. Les Gaucerand furent pourchassés et éliminés. Les archevêques restèrent seuls maîtres de Capestang devenu une ville active. Puis Bernard de Fargues (1311-1341), neveu du pape Clément V, sattacha à décorer le château début du XIVe siècle. Au milieu du XVe siècle, les Harcourt, Jean (1436-1451) puis Louis (1451-1460), qui se succèdent à larchiépisco
