 reprend le plan traditionnel de la villa gallo-romaine, quatre corps de bâtiment enserrant une cour intérieure carrée, appelée \"cour du propriétaire\". Il est flanqué à l'Est d'une seconde cour carrée bordée de bâtiments \"cour du fermier\" et à l'Ouest de bâtiments agricoles. La cour du fermier était cantonnée à l'origine de deux tours cylindriques, dont seule, subsiste la tour Nord-Est.  Escalier du perron avec sa balustrade ; chapelle avec son décor: classé par arrêté du 4 novembre 1983 ; Porche d'entrée ; façades et toitures du château ainsi que celles des bâtiments entourant la cour.","habitants":"Famille de Peyrat\r\n        \"","divers":"Château de Peyrat à Tourbes","gps":"","images":["../../jctruffet.com/image/image_34/34_Peyrat_1.jpg","../../jctruffet.com/image/image_34/34_Peyrat_2.jpg"]},"Consult_chateau_formulaireb00c":{"id":"Consult_chateau_formulaireb00c","dept":"34","canton":"Pignan","commune":"Pignan","nom":"Pignan_Turenne","type":"Château","periode":"XIII-XVII","histoire":"PIGNAN-TURENNE, lieu fortifié avec château et enceinte. Sous l'autorité des Guilhem cousins des seigneurs de Montpellier, passera par héritage aux Bossavin puis aux Terrail, les derniers du nom ayant épousé Elisabeth Ricard sans postérité transmet la seigneurie de Pignan et son château à son neveu François de Ricard époux de Louise d'Hèbles. Après la mort de François  la seigneurie est administré par le baron de Las- Ribes et de Pignan Gabriel d'Hèbles, qui entreprend en 1676 la construction du nouveau château qui est continué en 1690 par  Henri de Baschi marquis  du Caylar qui a épousé Elisabeth de Ricard héritière, à l'occasion du mariage de la fille d'Henri et Anne marie de l'Estrade le domaine élevé au rang de marquisat en 1721, leur fille  Suzanne en 1745 prend pour époux son cousin germain François du Baschi marquis d'Aubais. Gabrielle-Pauline de Baschi mariée en seconde noces à Marie-René-Joseph de Turenne marquis d'Aynac maître de camp de cavalerie meurt en 1777 et Gabrielle convole en 1782 avec le vicomte de Lostanges, le fils de sa première union  Henri-Amédée Mercure maréchal de camp héritier de la fortune  des Baschi et des Turenne épousa une demoiselle Brignac de Montarnaud, après deux générations le château est acquit par François Gablier qui le revend en 1892 au baron Maurice de Hirsch de Guereult banquier et en 1895 le château est acquis par la commune qui y installe l'hôtel de ville.\r\n VIGNOUGOUL, ce château dit de Saint-Martin  a été construit par Bertrand Adhémar d'Olivet au XVIe siècle le domaine passa aux Bermont du Caylar en 1669 et resta dans cette famille jusqu'en 1789,  vendu  à monsieur Paul-Louis  Bret.  Devenu aujourd'hui centre psychothérapique pas d'informations historiques.","architecture":"Pignan,   de nombreux vestiges médiévaux sont visibles, dont plusieurs hautes tours bâties en Opus monspelliensis  (l'une d'elle est surmontée d'un campanile) et d'anciennes portes de rempart.    La tour carrée (aussi appelée tour du Fort Viel).   La tour de l'Horloge, dont la porte fortifiée est un reste de murs neufs de 1386. Les maisons Burlon et Jourdan,  c'est l'actuel Fort Viel.  À la fin du XIVe siècle,   baronnie de Montpellier toute entière, passe sous la souveraineté du roi de France. les remparts du village seront démolis sur l'ordre de Louis XIII,     Il faudra attendre 27 ans (1652) pour que le roi permette la construction de murailles simples.                                  Château des Turenne mairie élevé sur l'emplacement d'un château plus ancien cette construction, de style Louis XIII, a été  réalisée et menée à bien en deux campagnes de 1673 à 1698 . On remarquera l'aspect austère, , dans sa rigoureuse géométrie, de la façade primitive. Aussi a t'on pris soin plus tard de le remanier pour le mettre à la mode en lui donnant un air plus gai, en particulier en ajourant les pièces par la destruction de meneaux et en lui apportant de nombreuses modifications intérieures, jusqu'au Directoire et à l'Empire. Outre le très bel escalier, les visiteurs seront frappés par les caves que l'on prétend en général d'époque médiévale. En fait pour l'essentiel, elles datent du XVIIe et XVIIIe siècle. Seul un imposant pan de mur, en appareil régulier, est un vestige des remparts construits après 1386 que l'on retrouve à l'extérieur du château. En symétrie avec ce grand mur on avait dressé une fort belle orangerie dont on peut voir les restes coté nord.\r\nChâteau de Saint-Martin de Vignougoul du XVIIe siècle corps de logis carré à trois niveaux et trois travées flanqués de tourelles  en angle toit en poivrières.","habitants":"Famille de  Gabriel d'Hèbles                                                                        Famille de Bertrand Adhémar d'Olivet \r\n        \"","divers":"Vestiges du château des Turenne, le nouveau château transformé en Mairie et le château de vignougoul","gps":"","images":["../../jctruffet.com/image/image_34/34_Pignan_Turenne_1.jpg","../../jctruffet.com/image/image_34/34_Pignan_Turenne_2.jpg","../../jctruffet.com/image/image_34/34_Pignan_Turenne_3.jpg","../../jctruffet.com/image/image_34/34_Pignan_Turenne_4.jpg","../../jctruffet.com/image/image_34/34_Pignan_Turenne_5.jpg","../../jctruffet.com/image/image_34/34_Pignan_Turenne_6.jpg","../../jctruffet.com/image/image_34/34_Pignan_Turenne_7.jpg","../../jctruffet.com/image/image_34/34_Pignan_Turenne_8.jpg","../../jctruffet.com/image/image_34/34_Pignan_Turenne_9.jpg"]},"Consult_chateau_formulaire4400":{"id":"Consult_chateau_formulaire4400","dept":"34","canton":"Montpellier","commune":"Montpellier","nom":"Piscine","type":"Château","periode":"XVII","histoire":"PISCINE, a lemplacement du château, sélevait lancien mas de la Peyssine (1435), domaine de chasse appartenant à Charles de Boucicot, cette folie du XVIIIe , mais qui a laissé son nom, un peu déformé au domaine actuel.   François Gaspard Richer de Belleval, confie à Jean Antoine Giral, lauteur de la perspective du Peyrou à Montpellier, le soin de construire le château que nous connaissons. Lédifice est terminé en 1771.  En 1814, Elisa Bacciochi, grande-duchesse de Toscane et sur de Napoléon, fuyant ses états italiens envahis, le loue durant trois semaines. En 1817, le château fut acquis par mademoiselle de Bachy du Cayla qui le légua à sa nièce la princesse de Beauvau-Craon. Puis la propriété passe en diverses mains pour être acquise en 1883 par le collectionneur Alfred Henry Chaber, cest à cette époque que le nom de lédifice est transformé en château de la Piscine.  Son fils André, apportera tous ses soins à restituer les jardins à la française dans la première  moitié du XXe siècle. Cest sa petite-fille qui veille aujourdhui sur le château et ses jardins. En avril 1965, le domaine a reçu la visite de la reine Elizabeth, la reine mère lors dun voyage privé en  France. Cette propriété ne se visite que très rarement lors de la Journée des jardins et de la Journée du patrimoine.","architecture":"Piscine, protégée par deux belles grilles, cette élégante demeure ne dévoile que sa façade nord ouvrant sur la cour d'honneur  avec une grande porte encadrée  avec des motifs de chasse. Côté jardins   à deux niveaux, neuf travées, dont trois sur pavillons d'entrée légèrement saillant avec fronton triangulaire. La façade sud donne sur la magnifique perspective d'un jardin à la française avec ses vases de pierre monumentaux, ses statues représentant les quatre saisons et un bassin.    Les extérieurs du château, façades, y compris la porte principale dentrée avec ses ferrures, les toitures,  lensemble du parc et des ouvrages dart, en particulier la façade de lancienne chapelle, le petit pavillon à deux ailes, les bassins, les statues, les vases et la grande grille de la cour dhonneur fait lobjet dun classement au titre des monuments historiques depuis le 11 décembre 1942.","habitants":"famille de François Gaspard Richer de Belleval\r\n        \"","divers":"Château de la Piscine à Montpellier","gps":"","images":["../../jctruffet.com/image/image_34/34_Piscine_1.jpg","../../jctruffet.com/image/image_34/34_Piscine_2.jpg","../../jctruffet.com/image/image_34/34_Piscine_3.jpg","../../jctruffet.com/image/image_34/34_Piscine_4.jpg","../../jctruffet.com/image/image_34/34_Piscine_5.jpg","../../jctruffet.com/image/image_34/34_Piscine_6.jpg"]},"Consult_chateau_formulaire1a91":{"id":"Consult_chateau_formulaire1a91","dept":"34","canton":"Gignac","commune":"Popian","nom":"Popian","type":"Château","periode":"Xe","histoire":"POPIAN à lépoque carolingienne, Popian était le siège de la seule viguerie de la moyenne vallée de lHérault. Le viguier était le représentant du vicomte de Béziers et dAgde, chargé dexercer  la justice royale. Construit au Xe siècle, le castrum de Popian fut rattaché au domaine des seigneurs de Montpellier au XIe siècle, on retrouve le château de Popian parmi les biens de Guillaume de Montpellier en 1114. Fortement implantés au Pouget, les  Guillaume ont  contribué au maintien du siège de la viguerie, la plus haute autorité régionale. En 1535, les terres et seigneuries de Popian sont recensées  au nom de  Girard de Popian. Apparaissent les noms de Antoine de Tavaux, seigneur de Popian, et de François Tuffet, chanoine de la cathédrale Saint-Nazaire de Béziers et archiprêtre du Pouget.","architecture":"Situé au centre dune butte, lancien château de Popian offre les vestiges dune tour et dun escalier menant à léglise paroissiale Saint-Vincent.  Isolé par un fossé à lendroit où lescarpement était le moins important, le château est accessible par un pont à deux arches et garde-corps à balustres. Les maisons sétagent en éventail sur les versants les plus escarpés à louest et au sud de la butte. Il est encore possible de lire le tracé de lenceinte féodale grâce à lalignement des maisons situées au sud, au pied du château. Par ailleurs, la place de lOrmeau fut aménagée à cet endroit précis autour dune fontaine du XVIIe siècle.   Popian est un lieu singulier dans lequel on retrouve de très nombreux vestiges médiévaux mais aussi des époques moderne et contemporaine.     De l'édifice Moyen-Ageux, seule demeure la tour datant  du XIVe siècle. Construction du corps principal au début  du XIXe siècle.    La Tour de lHorloge en est un exemple flagrant : cette tour de plan rectangulaire était aménagée dune herse et composait lun des principaux ouvrages dentrée du village. Elle fut dabord un beffroi, doté dune cloche, puis modernisée dune horloge publique, scandant le rythme de la vie villageoise.","habitants":"Famille des  de Guillaume \r\n        \"","divers":"Château de Popian","gps":"","images":["../../jctruffet.com/image/image_34/34_Popian_1.jpg","../../jctruffet.com/image/image_34/34_Popian_2.jpg","../../jctruffet.com/image/image_34/34_Popian_3.jpg","../../jctruffet.com/image/image_34/34_Popian_4.jpg"]},"Consult_chateau_formulaireaccd-2":{"id":"Consult_chateau_formulaireaccd-2","dept":"34","canton":"Méze","commune":"Poussan","nom":"Poussan","type":"Château","periode":"XIV-XVII","histoire":"A Poussan trois châteaux dans cette ville chargé d'histoire, château de la Garenne, des Montlaur et de Malbois.          GARENNE, de la lignée des Malbois qui possédait  le domaine dès 1443 et expropriée en 1789,   construit par Jacques de Tournezy à la fin du XVIIe siècle, comme résidence  de Jacques de Tournesy, conseiller à la cour des Aydes de Montpellier. Aujourd'hui propriété de madame Dane   qui à entreprit la restauration.                             MONTLAUR  tient son nom de la famille Montlaur qui prend possession de la seigneurie en 1210. C'est l'élément fondateur du village. Aujourd'hui, on trouve dans l'aile droite une salle voûtée que les surs St Charles ont réaménagés en chapelle au XIXe.         MALBOIS  quand à lui na de château que peu dapparat. Son attrait réside dans sa façade. Il date du XIVe siècle. Cet édifice porte, également, le nom de Château de Lévis de Mirepoix, du nom de la famille qui le fit construire. Il est en partie inscrit au titre des monuments historiques, en ce qui concerne sa façade qui présente des nombreux détails ainsi que les vestiges dune loggia. A lintérieur se trouve une salle « Vinas » avec parait-il des plafonds peints datant du milieu du XVe siècle.","architecture":"Poussan; Les remparts de 1340, le dernier mur à bossage visible du rempart se trouve derrière l'église sur 160 mètres .\r\n Portalet du XIVe siècle, cette porte, qui remplace une ancienne  porte romane a été reconstruite en 1652 sur décision seigneuriale. Cet édifice de style néoclassique rappelle les bâtiments administratifs du XVII et XVIIIe siècle notamment avec son fronton triangulaire. Porte Notre Dame du XIVe siècle, en revanche la porte en plein cintre et la bretèche semble plus récentes du XVI ou XVII siècle. Porte de la Ferrage du XIVe siècle.                              Garenne  construction de 1680 de style Renaissance italienne, la façade présente un corps central encadré par deux pavillons massifs plus haut évoquant des tours.                                    Montlaur, le château présente un plan en U avec une cour centrale dans laquelle se trouvait probablement un puits. De nombreux remaniements ont altéré les corps de bâtiments. Les tourelles d'angle ou poivrières semblent dater du XVIIe. À l'origine, le château en possédait une dans chaque angle, les deux encore conservées présentent un travail de sculpture élaboré\r\nChâteau Malbois de 1330. La construction du bâtiment démarre au XIVe siècle et comprend plusieurs étapes. Les éléments conservés de cette première phase sont le portail en tiers point, orné de moulures et de croisillons, avec pierre de blason, surmonté d'une bretèche sur arc mouluré en plein cintre porté par des culots figurés, ainsi que la tourelle polygonale, abritant un escalier,  à droite à l'angle du bâtiment. Les travaux de confort et de raffinements des espaces intérieurs interviennent au cours du XVe siècle en style gothique flamboyant: galeries de communications entre les espaces.","habitants":"Famille de Jacques de Tournezy                                                           Famille de Lévis de Mirepoix,\r\n        \"","divers":"Poussan château de la Garenne, des Montlaur et de Malbois.","gps":"","images":["../../jctruffet.com/image/image_34/34_Poussan_1.jpg","../../jctruffet.com/image/image_34/34_Poussan_2.jpg","../../jctruffet.com/image/image_34/34_Poussan_3.jpg","../../jctruffet.com/image/image_34/34_Poussan_4.jpg","../../jctruffet.com/image/image_34/34_Poussan_5.jpg","../../jctruffet.com/image/image_34/34_Poussan_6.jpg","../../jctruffet.com/image/image_34/34_Poussan_7.jpg","../../jctruffet.com/image/image_34/34_Poussan_8.jpg"]},"Consult_chateau_formulaire13c3":{"id":"Consult_chateau_formulaire13c3","dept":"34","canton":"Gignac","commune":"Puilacher","nom":"Puilacher","type":"Château","periode":"XVII","histoire":"PUILACHER, le château a été reconstruit au XVIIe siècle sur des bases plus anciennes. Ainsi les soubassements des deux tours remontent au XIVe ou au XVe siècle, ainsi que la porte située à proximité de la cheminée du premier étage. La façade actuelle date en grande partie  du début du XVIIe siècle, avec peu d'ouverture,  des fenêtres à meneaux  et une tour d'angle, des aménagements ont été effectués au XVIIIe siècle. L'escalier principal est remarquable avec, en particulier,  des voûtes à pendentif  du premier tiers du XVIIe siècle. La restauration du château qui était devenu un bâtiment agricole a été entreprise à partir de 1975. L'édifice inscrit Monument Historique en 1984, a été restauré avec le concours des bâtiments de France.                                                     A un kilomètre au Sud-Est TRESSAN, pas d'informations historiques.","architecture":"Le château actuel a été construit sur un château médiéval dont témoigne une tour ronde englobée dans le bâtiment. Les divers travaux d'aménagement du XVIIe siècle, qui lui ont donné son aspect actuel, ont totalement remodelé l'ancien château, restituant toutefois la topographie médiévale du lieu. L'escalier principal avec des voûtes à \"pendentif\", la façade avec ses baies (à croisée, à meneaux et à traverse) et sa tour, le plafond à la française à 3 moulures de la salle de séjour sont  remarquables. \r\n Le château, inscrit aux monuments historiques depuis 1984, est accolé à léglise.  Les propriétaires actuels l'ont entièrement restauré depuis 1975 avec le concours des Bâtiments de France. Tressan, à la fin du XVe siècle, reconstruction presque totale du château fort médiéval dont restent les parties  basses ; au XVIIe siècle, construction du corps sud et composition du décor peint de la grande salle dont il subsiste des vestiges; cage d'escalier datant de 1780, date portée. L'édifice comprend deux étages carrés. Gros-oeuvre en calcaire ; pierre de taille et moellon. Toit à longs pans recouvert de tuiles creuses.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Puilarcher et de Tressan","gps":"","images":["../../jctruffet.com/image/image_34/34_Puilacher_1.jpg","../../jctruffet.com/image/image_34/34_Puilacher_2.jpg","../../jctruffet.com/image/image_34/34_Puilacher_3.jpg","../../jctruffet.com/image/image_34/34_Puilacher_4.jpg","../../jctruffet.com/image/image_34/34_Puilacher_5.jpg","../../jctruffet.com/image/image_34/34_Puilacher_6.jpg","../../jctruffet.com/image/image_34/34_Puilacher_7.jpg","../../jctruffet.com/image/image_34/34_Puilacher_8.jpg"]},"Consult_chateau_formulairee4f2":{"id":"Consult_chateau_formulairee4f2","dept":"34","canton":"Pézenas","commune":"Puissalicon","nom":"Puissalicon_Puimisson","type":"Château","periode":"XI-XIV","histoire":"PUISSALICON, à 1 km du village actuel, presque au fond d'un bassin que parcourt le fleuve Libron, sélève au milieu du cimetière communal, Le saint patron de la commune est saint Guiraud, qui naquit à Puissalicon en 1070, il meurt le 5 novembre 1123 à Saint-Aphrodise, il est alors évêque de Béziers. Il occupait ce siège, depuis que l'évêque précédent, Arnaud de Lévezou, avait été élu archevêque de Narbonne, en 1121. La légende rapporte que sa mère ne le porta que sept mois dans son sein et que, lorsqu'on lui administra le baptême, l'eau des fonts baptismaux se mit à bouillonner comme si on y avait planté du fer rouge. Ce prodige fut regardé comme le présage de la sainteté de l'enfant.  La légende veut aussi qu'il soit pauvre, pourtant, des biographies antérieures se référant à don Vaissette estiment que plusieurs actes et chartes portant la signature Guiraud, de Puissalicon, sont la preuve qu'il était de famille noble : celle des \"Puissalicon\". Il fut évêque de Béziers de 1121 à 1123, année de sa mort..\r\nA trois kilomètres le château de PUIMISSON, ancien château féodal, au centre d'un village de plan circulaire, aménagé au XVIIIe siècle. Décor  de papier peint daté  de 1789. Il a été au cours des temps  modifié, cest actuellement un des plus  beaux ensembles architecturaux du XVIIe siècle de la région.","architecture":"Le château féodal de Puissalicon fut construit au XIe siècle dessus de léglise paroissiale de style gothique. Deux grosses tours sélèvent et surmontent un donjon en ruines. Pour y accéder, un grand escalier à vis, construit dans une tour hexagonale qui conduit au donjon. Le château possédait deux portes dentrée de style roman, aujourdhui il nen reste quune. La façade Nord-Est ne doit pas remonter plus haut que le XVIe siècle. Du côté Sud-Ouest sélève la chapelle du château de pur style gothique. Non loin, on voit les traces dun carcan et les débris dun escalier permettant au seigneur de descendre dans léglise paroissiale.                              La tour de Puissalicon, qui est une tour romane du Xe siècle, d'influence lombarde, et de forme rectangulaire, chacun des côtés mesure 4,30 mètres de largeur pour une hauteur de 26 mètres.  Cette tour fut primitivement isolée, indépendante de tout autre édifice, et il est probable qu'elle devint ensuite le clocher de l'église ogivale qui lui fut accolée. Elle comprend 5 étages séparés par des cordons de pierres noires. La base n'offre aucune décoration jusqu'au 1er étage dont elle est séparée par une frise en dents d'engrenage, surmontée d'une large corniche qu'on remarque à près de trois mètres du sol. Les autres étages sont séparés par des cordons saillants. Au 1er étage une fenêtre géminée dont les arcs sont formés de claveaux blancs et noirs. Aux deux étages supérieurs  s'ouvrent sur chaque façade 3 baies n'offrant sur chacune des faces que des baies géminées. Le quatrième étage est éclairé par un grand oculus aux encadrements de pierres noires. Il est surmonté d'une frise formée de sept arcatures, semblable à un cordon de pierres noires, connu sous le nom de Cordon de Charlemagne.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Puissalicon et  de Puimisson (féodal)","gps":"","images":["../../jctruffet.com/image/image_34/34_Puissalicon_Puimisson_1.jpg","../../jctruffet.com/image/image_34/34_Puissalicon_Puimisson_2.jpg","../../jctruffet.com/image/image_34/34_Puissalicon_Puimisson_3.jpg","../../jctruffet.com/image/image_34/34_Puissalicon_Puimisson_4.jpg","../../jctruffet.com/image/image_34/34_Puissalicon_Puimisson_5.jpg","../../jctruffet.com/image/image_34/34_Puissalicon_Puimisson_6.jpg","../../jctruffet.com/image/image_34/34_Puissalicon_Puimisson_7.jpg"]},"Consult_chateau_formulaire77fd":{"id":"Consult_chateau_formulaire77fd","dept":"34","canton":"Caylar","commune":"Pégairolles-de-lEscalette","nom":"Pégairolles","type":"Château","periode":"XV","histoire":"PEGAIROLLES du XIIe-XVIIe siècle.En 1571,Louis de Fabre achète la seigneurie de Pégairolles. L'aliénation de nombreuses seigneuries ecclésiastiques, au cours des guerres de religion, profite à une nouvelle catégorie de bourgeois de Lodève, qui,le plus souvent, sont en même temps des marchands. Le type le plus représentatif de ces nouveaux seigneurs  est  Louis Fabre, à l'origine, bourgeois et marchand dans la ville épiscopale. En 1571, il achète la seigneurie de Pégairolles, à l'évêque Alphonse de Verceil, ses descendants garderont jusqu'au milieu du XVIIIe siècle. Son  petit-fils, Louis, épousera, en 1615, Jeanne de Latude, de l'antique famille  des Vissec de Latude. transformé en chambres d'hôtes.","architecture":"Pégairolles-de-lEscalette, les vestiges du vieux château féodal sont le centre du village médiéval de Pégairolles-de-lEscalette, site classé. Place forte dès le début du XIIe siècle, date à laquelle lévêque de Montpeyroux en charge de la défense de la région fit construire une tour de guet avec fortification.  La majeure partie des bâtiments quil reste du château féodal sont du XIIIe et XVIIe siècle, quadrangulaire à trois niveaux  flanqué de tours rondes en angles dont une arasée.","habitants":"Famille  des Vissec de Latude\r\n        \r\n        \"","divers":"Château féodal de Pégairolles.","gps":"","images":["../../jctruffet.com/image/image_34/34_Pegairolles_1.jpg","../../jctruffet.com/image/image_34/34_Pegairolles_2.jpg","../../jctruffet.com/image/image_34/34_Pegairolles_3.jpg","../../jctruffet.com/image/image_34/34_Pegairolles_4.jpg","../../jctruffet.com/image/image_34/34_Pegairolles_5.jpg","../../jctruffet.com/image/image_34/34_Pegairolles_6.jpg"]},"Consult_chateau_formulaire66f6":{"id":"Consult_chateau_formulaire66f6","dept":"34","canton":"Pézenas","commune":"Pézenas","nom":"Pézenas","type":"Château","periode":"XIII-XVII","histoire":"plusieurs châteaux à Pézenas à chacun son article, Fondouce, Conas, Larzac, Loubatières, Montpezat, Parc, Roquelune, la Grange des Prés et celui de Pézenas.                                          PEZENAS Le château est mentionné pour la première fois en 990. Il suivra les vicissitudes de la ville jusqu'au rattachement du comté à la couronne. C'est ainsi qu'acquis par Simon de Montfort, il fut revendu à Raymond Salvignac.  Un siècle plus tard, en 1563, Anne de Montmorency fera bâtir un donjon, logement du gouverneur et des abris pour recevoir trois cents hommes de garnison, les appartements furent garnis d'un mobilier nouveau. Cependant la révolte de juillet 1632, allait devoir à l'édifice un funeste avenir. Le premier octobre 1632, un édit de Louis XIII en ordonne la démolition. Le prix fait est passé tout d'abord avec Jean Pithon qui confie le 4 mars du même mois, la besogne à Jean Thomas maître-charpentier.  Après la démolition, les consuls firent entourer les ruines d'un parapet et élevèrent sur les anciens murs deux guérites carrées, qu'un ouragan démolit le 22 janvier 1689. Devenue bien communal, la motte du château fut inféodée à plusieurs reprises, puis vendue le 25 août 1802 au notaire Joseph Ebrail qui y créa un jardin. Peut-être est-ce dernier qui fit bâtir la maison actuelle.","architecture":"Pézenas;  La motte qui le supporte est en réalité composée de deux buttes superposées, c'est sur la seconde plus réduite que se dressait le château. L'édifice nous est mal connu. On sait qu'il était séparé de la ville par un fossé que l'on franchissait par un pont-levis. La courtine était percée de deux portes, dont la porte gaillarde. Le château possédait neuf tours, dont deux tours d'angle circulaires au toit en poivrière, les autres étant couvertes d'une terrasse, et une tour-porte de plan carré. Au centre se dressait le donjon. Le château renfermait également une prison, des communs, un four et une citerne. De nombreuses réparations furent effectuées  jusqu'à sa démolition. En 1454, le pont-levis est refait tout neuf, à la fin du XVIe siècle, l'enceinte médiévale est encore entretenue, mais au cours des dernières années, devant l'extension irrésistible de la ville vers l'ouest, la nécessité d'une nouvelle fortification se fait sentir. Les nouveaux remparts, précédés d'un fossé, entouraient ce qui étaient jadis le \"barri\" ou faubourg et qui deviendra bientôt dans les textes le \"nouvel enclos\". Sa forme générale n'est que l'agrandissement du dessin du Moyen-Age, avec la même orientation et une disposition identique des accès. Raccordée à la courtine médiévale à l'angle Sud Est de la commanderie, la nouvelle fortification longeait la promenade du pré, puis, suivant l'actuelle avenue de Béziers, empruntait  le boulevard Sarrasin, le chemin de la Faissine, l'avenue Gabriel-Mazel, où elle subsiste encore en partie dans les jardins de l'hôpital, pour rejoindre le rempart médiéval près de la Porte Faugères, place Ledru-Rollin. Cinq nouvelles portes ont été ouvertes, pour la plupart dans le prolongement de celles du Moyen-Age, les portes de la Grave, de Castelnau, Conti, de Béziers, de Faugères.","habitants":"Famille de Raymond Salvignac\r\n        \r\n        \"","divers":"Pézenas, Peyrat office du tourisme,Bébian,Fondouce, Conas, Larzac, Loubatières, Montpezat, Parc, Roquesol, st-Martin de Graves","gps":"","images":["../../jctruffet.com/image/image_34/34_Pezenas_1.jpg","../../jctruffet.com/image/image_34/34_Pezenas_2.jpg","../../jctruffet.com/image/image_34/34_Pezenas_3.jpg","../../jctruffet.com/image/image_34/34_Pezenas_4.jpg","../../jctruffet.com/image/image_34/34_Pezenas_5.jpg","../../jctruffet.com/image/image_34/34_Pezenas_6.jpg","../../jctruffet.com/image/image_34/34_Pezenas_7.jpg"]},"Consult_chateau_formulairea681":{"id":"Consult_chateau_formulairea681","dept":"34","canton":"Pézenas","commune":"Pézenas","nom":"Pézenas_chateaux","type":"Château","periode":"XVII-XVIII","histoire":"Châteaux cité ci-dessous, Roquelune,  Roquessol, St-Bébian et St-Julien.                                                                                     PEZENAS,  Des fréquents séjours de Molière à Pézenas est né le mouvement moliériste du XIXème siècle. Ce qui fera dire plus tard à Marcel Pagnol que « si Jean Baptiste Poquelin est né à Paris, Molière est né à Pézenas. »                                                                ROQUELUNE  Transformée en hôtel restaurant , ancienne résidence de la Famille de Boudoul, capitaine-châtelain de Pézenas au XVII siècle.                                                                          ROQUESOL  la métairie Bonnet n'est pas connue avec précision. Il s'agit d'un bâtiment agricole construit sur un terre-plein,  lancienne résidence du capitaine-châtelain de Pézenas, organise pour ses hôtes des séjours à la carte et satisfait toutes leurs exigences. modeste dans ses proportions mais encore évocateur de ce qu'étaient les granges piscénoises.                                       St-BEBIAN, il figure au compoix de 1688 au nom des héritiers d'Etienne II de Goudon, fils d'Etienne I de Goudon, grènetier au grenier à sel de Pézenas, qui le possédait peut-être avant lui, c'est à dire dans les années 1600-1615. Le domaine passe ensuite, à la fin du 17e siècle ou au début du 18e siècle à Jean Andrau, bourgeois de Pézenas. La \"métairie Andreau\" passe la famille Mazel en 1738, à la suite de l'achat par François I Mazel, maître de poste et négociant enrichi dans le commerce des eaux-de-vie. C'est cependant à François II Mazel, son fils, membre d'une puissante dynastie bourgeoise du XVIIIe siècle piscénois, conseiller du roi, lieutenant criminel en la châtellenie de Pézenas depuis 1743, qu'il faut attribuer le développement considérable du domaine qu'il reçoit en avril 1750 par contrat de mariage et qu'il agrandit en achetant la même année une importante quantité de terres.                                                                                                  St-JULIEN  dont on peut attribuer la construction à Guillaume de Bizerobert, sieur de Bousquet, écuyer et trésorier général de France en la généralité de Montpellier. Elle passe ensuite à la famille de Pastre du Bousquet, qui la possède de la seconde moitié du XVIIe siècle à la fin du XVIIIe siècle. Domaine Saint-Julien de Marie-Louise Ruand","architecture":"Roquelune  dans la vallée de l´Hérault, dans un parc  endroit idéal pour des vacances dexception et pour lorganisation de réceptions dans un cadre  privatisé, à quelques minutes des axes majeurs de communication du Languedoc,. Les lieux sont entièrement aménagés en fonction des événements : séminaires ,  cocktails, conférences, concerts, banquets, mariageset séjours de vacances en famille. le château  du XVIIe, la chapelle, lorangerie, le parc et ses arbres centenaires ainsi que sa fontaine classée et ses bassins.                                                                             Roquesol, agrandie et remaniée au XIXe siècle, la construction originelle, disposée en équerre autour d'une cour centrale, doit être attribuée au XVIIe siècle.                                                             St-Bébian   l'ancienneté du domaine est attesté depuis au moins la seconde moitié du XIIIe siècle                                                      St-Julien  Le site de Saint-Julien mérite l'attention à bien des égards. C'est tout d'abord dans le domaine que fut découvert en 1962 une très importante nécropole protohistorique, correspondant sans doute à l'oppidum gaulois de Saint-Siméon et qui a fourni un grand nombre d'urnes funéraires du VIe siècle avant J.-C. C'est ensuite l'une des demeures de la vallée de la Peyne qui possède encore les vestiges architecturaux les plus anciens.","habitants":"Famille Jean Baptiste Poquelin \r\n        \r\n        \"","divers":"Château de Roquelune, Roquesol,Saint-Bébian, st Julien","gps":"","images":["../../jctruffet.com/image/image_34/34_Pezenas_Chateaux_1.jpg","../../jctruffet.com/image/image_34/34_Pezenas_Chateaux_2.jpg","../../jctruffet.com/image/image_34/34_Pezenas_Chateaux_3.jpg","../../jctruffet.com/image/image_34/34_Pezenas_Chateaux_4.jpg"]},"Consult_chateau_formulaireb166":{"id":"Consult_chateau_formulaireb166","dept":"34","canton":"Pézenas","commune":"Pézenas","nom":"Pézenas_Patrimoine","type":"Patrimoine","periode":"XVII","histoire":"Hôtel-particuliers à Pézenas qui est une ville chargée dhistoire comme en témoigne son centre historique, écrin de demeures de la fin du Moyen-Age et de nombreux hôtels particuliers des XVIIe et XVIIIe siècles. Mais lhistoire de la ville est bien plus ancienne puisque lorigine du nom Pézenas remonterait à loccupation romaine ; déjà Pline lancien vantait les mérites de « Piscenae » pour la qualité des eaux de sa rivière, la Peyne.  Certains ne sont pas mentionnés.                                                                           Alfonce en 1590 la propriété de Vital de Plantade. Sa petite fille épouse en 1615 Pierre dAlfonce qui laissa son nom à lédifice.  Bezons connétable de Montmorency. Épine,  fut construit  par Félix de Grave de Maussac. Puis sa fille Félicité le récupère et le vend à J.B. Bouisset, un négociant piscénois. C'est en 1806, que Marie-Augustin l'Epine, deuxième fils du facteur d'orgue Jean-François l'Epine qui est l'auteur de l'orgue de la Collégiale Saint Jean, acquiert le bâtiment qui restera dans la famille jusqu'en 1914.   Flottes de Sébazan.  Grasset  et son escalier du XVIIe siècle. Grave du XV-XVIIe siècles.  Lacoste du XVe-XVIe siècles. Landes. Saint-Palais. Loubatières. Malibran  Marie Malibran, propriétaire de cet édifice, fut député au conseil des Cinq-Cents représentant le département de l'Hérault, épousa les idées révolutionnaires. conseiller général du département, il devint chef de la légion de la garde nationale.  Mazel,  Baron de Carrion-Nisas : tour gothique dans la cour.   Peyrat abrite le Scénovision Molière actuellement office du tourisme, Hôtel de Ribes Pierre de Ribes, Seigneur de Lézignan, agrandit et aménage cet hôtel entre 1615 et 1645. est couvert sur trois travées de voûtes d'ogives reposant sur des culots sculptés. Saint-Germain Musée de Vulliod-Saint-Germain. Wicque, Maison des Commandeurs de Saint Jean de Jérusalem (XVIe siècle) a été édifiée à l'emplacement de l'ancienne Maison des Templiers du XIe siècle.","architecture":"Alfonse façade en galeries sur trois niveaux  superposée sur colonnes doriques.                                                                     Boudoul façade renaissance à trois niveaux.                                  Carion-Nisas cour intérieur avec montée d'escalier  fermé dans un carrée soutenue par un pilier.                                                    Flottes de Sebazan   immeuble à trois niveaux et attiques.                 Hôtel du commandeur Renaissance à cinq niveaux échauguettes sur angles.                                                                                  Epine construit vers le milieu du XVIIIe siècle, portes styles Renaissances.                                                                               Grasset  intérieur d'escalier   du XVIIe siècle, style Chambord.             Grave  façades avec porte Renaissance du XVe siècle surmontée d'un bel arc en accolade.                                                                 Malibran, cet édifice, construit vers le milieu du XVIIe siècle, subit des transformations au XVIIIe. Il fallait que la lumière rentre. On augmenta le nombre de fenêtres que l'on protégea par un balcon en fer forgé. Possède des fenêtres surmontées d'agrafes représentant des visages souriants de femmes, étages sous-toit ouverture par oeils de boeufs.                                                                                   Peyrat  corps de logis à trois niveaux avec attiques tour carrée en angles à mâchicoulis toit en croupe presque  plat.","habitants":"Connétables\r\n        \r\n        \r\n        \"","divers":"Patrimoine de Pézenas; hôtel Alphonse, Boudoul, Commandeurs, Grasset, Carion-Nisas, Flotte de Sébazan, Malibran, Ribes, des Graves","gps":"","images":["../../jctruffet.com/image/image_34/34_Pezenas_Patrimoine_1.jpg","../../jctruffet.com/image/image_34/34_Pezenas_Patrimoine_2.jpg","../../jctruffet.com/image/image_34/34_Pezenas_Patrimoine_3.jpg","../../jctruffet.com/image/image_34/34_Pezenas_Patrimoine_4.jpg","../../jctruffet.com/image/image_34/34_Pezenas_Patrimoine_5.jpg","../../jctruffet.com/image/image_34/34_Pezenas_Patrimoine_6.jpg","../../jctruffet.com/image/image_34/34_Pezenas_Patrimoine_7.jpg","../../jctruffet.com/image/image_34/34_Pezenas_Patrimoine_8.jpg","../../jctruffet.com/image/image_34/34_Pezenas_Patrimoine_9.jpg"]},"Consult_chateau_formulaire2e4d":{"id":"Consult_chateau_formulaire2e4d","dept":"34","canton":"Clermont l","commune":"Pézenes les Mines","nom":"Pézènes","type":"maison forte","periode":"XVI","histoire":"PEZENES, le baron R.M de Gobert de Sardans a durant les dernières décennies du XXe siècle acheté et rénové plusieurs habitations de cette commune. Connu pour ses restaurations de constructions médiévales, il donna l'impulsion au début des années 1970 à un mouvement de restauration du patrimoine du village. A trouvé une partie de la bibliothèque dont les annales de Tacite de Pierre-Maurice-Emmanuel, capitaine d'infanterie, chevalier de Saint-Louis. Pézènes au diocèse de Béziers, élevé au rang de  marquisat en 1750.                                                                             FOS,  en 1834, Louis Antoine baron de Sénégra et dernier seigneur de Fos, vend son domaine aux habitants.","architecture":"Château féodal de Pézènes du  XIe et XIIe siècles (privé).\r\nLa construction du château de Pézènes-les-Mines débuta en pleine période romane. De nombreux témoignages écrits laissent penser que se fondation remonterait au IXe siècle, voire à lépoque romaine. Situé dans la vallée de la Peyne, il protégeait le passage sur une route qui menait aux hauts cantons du département. De nombreux vestiges de lépoque de sa construction sont encore présents sur place, notamment les fortifications et léglise castrale ruinée. Le château fut remanié une première fois au XVIIe siècle, époque doù proviennent les deux portails monumentaux. Récemment restauré, le château de Pézènes est un magnifique ouvrage médiéval qui nest pas visitable.                                             FOS, construit au XVIe siècle, ce  n'est qu'une maison forte. A l'origine, il y avait trois tours, dont une carrée. Une seule subsiste, face à l'église. Près de cette tour se trouve une porte romane qui à l'origine servait d'entrée. Le château communiquait autrefois, par un passage  par-dessus  la rue, avec l'église. Le châtelain pouvait ainsi  assister aux offices, sans sortir de chez lui. Du coté du verger, au deuxième étage, dans le haut de la tour, une  meurtrière verticale tournée vers le nord et une horizontale à coté d'une porte au rez-de-chaussée, protégeaient le château. Une autre meurtrière, horizontale également, se voit sur la façade de la rue côté sud tout près de la   porte,  tandis qu'une autre en forme de croix est caractéristique du XIVe siècle, époque à laquelle l'arquebuse et   l'arbalète étaient en usage. Au premier étage de la construction du XVIe siècle,  la grande salle avait des croisillons et un plafond à poutrelles.","habitants":"le baron R.M de Gobert de Sardans\r\n        \r\n        \"","divers":"Maison forte de Pézènes et château de Fos à Pézènes les Mines","gps":"","images":["../../jctruffet.com/image/image_34/34_Pezenes_1.jpg","../../jctruffet.com/image/image_34/34_Pezenes_2.jpg","../../jctruffet.com/image/image_34/34_Pezenes_3.jpg","../../jctruffet.com/image/image_34/34_Pezenes_4.jpg","../../jctruffet.com/image/image_34/34_Pezenes_5.jpg","../../jctruffet.com/image/image_34/34_Pezenes_6.jpg","../../jctruffet.com/image/image_34/34_Pezenes_7.jpg"]},"Consult_chateau_formulaireb040-2":{"id":"Consult_chateau_formulaireb040-2","dept":"34","canton":"St-Pons de Thomières","commune":"Quarante","nom":"Quarante","type":"Château","periode":"XVIII-XIX","histoire":"Quatre châteaux à Quarante dont celui de Quarante, celui de Carasses( voir article sur Capestang), de Roueïre et de Salies. QUARANTE   château du XIXe siècle, transformé en chambres d'hôtes  la famille de  Nicole et Klaus Neukirch.                               ROUEIRE, le château a été construit en 1887, pendant la période faste de la viticulture dans le Biterrois, par la famille d'Andoque de Sériège ; auparavant, le domaine de Roueïre appartenait aux Tarboriech, anciennement implantés et la transmission s'est effectuée à l'occasion d'une alliance des deux familles, en 1919 décés de Gabriel d'Andoque sans enfants, sa nièce Gabrielle de Gineste hérite épouse de Paul Bouniol chatelain de la Gradie, la fille de son neveu  Henri de Gineste, Jeannne marquise de Laurisson-Bourbers cède la propriété à la Safer en 1964 . Aujourd'hui propriété de l'union des vignerons de Rouïere, musée de la vigne et du vin dans les caves.                                             SALIES, château de Saliès, berceau de la famille Viennet, actuellement propriété de la famille Gombert et domaine viticole.","architecture":"Quarante Anciennes fortifications du vieux village.                          le château de Quarante, quadrangulaire à façade différente à trois niveaux et attiques, côté parc,  deux pavillons carrés  saillant aux angles à toits pointus.                                                                      Rouïere;  de style néogothique anglais construit sur plan de l'architecte  Louis-Michel Garros; appareillé en moellons irréguliers donnant le caractère rustique,  le bâtiment se compose de trois corps disposés parallèlement, côté entrée partie centrale  encadré entre une tour carrée et une tour ronde engagée dans un bâtiment perpendiculaire. Un corps intermédiaire, terminé par deux pignons découverts reliés avec l'autre façade par une tour ronde coiffée en poivrière et à l'autre par une tour carrée étroite avec terrasse crénelées qui occupe l'un des angles d'un bâtiment à trois niveaux, flanqué à l'autre angle d'une échauguette à dôme de pierre, fenêtres à meneaux sur façade extérieur encadrements à arc brisés et frontons des lucarnes pour les corniches.","habitants":"Famille de Tarboriech                                                                        Famille  Fleury P. Du Sert                                                                     Famille Viennet\r\n        \"","divers":"Quarante dont celui de Quarante, celui de Carasses, de Roueïre et de Salies.","gps":"","images":["../../jctruffet.com/image/image_34/34_Quarante_1.jpg","../../jctruffet.com/image/image_34/34_Quarante_2.jpg","../../jctruffet.com/image/image_34/34_Quarante_3.jpg","../../jctruffet.com/image/image_34/34_Quarante_4.jpg","../../jctruffet.com/image/image_34/34_Quarante_5.jpg","../../jctruffet.com/image/image_34/34_Quarante_6.jpg","../../jctruffet.com/image/image_34/34_Quarante_7.jpg","../../jctruffet.com/image/image_34/34_Quarante_8.jpg"]},"Consult_chateau_formulaire97d0":{"id":"Consult_chateau_formulaire97d0","dept":"34","canton":"Béziers","commune":"Béziers","nom":"Raissac","type":"Château","periode":"XVII","histoire":"RAISSAC, la seigneurie au XVIe siècle entre dans la famille du Mas, au XVIIe siècle Charles du Mas s'allie avec une riche héritière Marthe de Barrès, le couple décéde sans héritier, Raissac passe en héritage à la famille Barrès, Thomas de Barrès marquis de Pouzolles dont l'une des filles épousera en 1768 Joseph-Gabriél de Gleizes de la Blanque conseiller à la cour impériale de Nimes et sa soeur madame de Reboul s'en défait en 1828, en 1837 réunion par mariage des domaines de Raissac et du Puech-Cocut.  Le château  est acquis par Joseph-Louis-Barthélémy Viennet receveur des financiers à Béziers va s'attacher  à la modernisation du domaine ainsi que son fils Louis avocat et futur député de l'Hérault qui lui donnera ce qu'il est aujourd'hui, toujours dans la même famille depuis 1828, Christine Viennet le gère en chambres d'hôtes.","architecture":"Raissac  est une bâtisse languedocienne datant du XIVe siècle, restauré au XIXe siècle. L'agrandissement du château de Raissac effectué suivant plan de l'architecte Garros de plan en U corps de logis central à deux niveaux et attiques cantonné sur sa face externe par deux pavillons carrés, sur l'autre façade, le bâtiment est encadré par deux ailes terminées par des pavillons carrées plus élevés. Dans la cour la décoration  se concentre sur l'avancée en saillie, rythmée par trois baies  cintrées aux agrafes ornées de cartouches surmontée par une terrasse  limitée par une balustrade. Le corps de logis comme les autres pavillons d'angle sont coiffés  d'un toit plat dissimulé par une balustrade de pierres.","habitants":"Famille de Joseph-Louis-Barthelemy Viennet\r\n        \"","divers":"Château de Raissac à Béziers","gps":"","images":["../../jctruffet.com/image/image_34/34_Raissac_1.jpg","../../jctruffet.com/image/image_34/34_Raissac_2.jpg","../../jctruffet.com/image/image_34/34_Raissac_3.jpg","../../jctruffet.com/image/image_34/34_Raissac_4.jpg"]},"Consult_chateau_formulaire546a":{"id":"Consult_chateau_formulaire546a","dept":"34","canton":"Matelles","commune":"Prades le Lez","nom":"Restinclieres","type":"Château","periode":"XVI-XVII","histoire":"RESTINCLIERES, au XIIe siècle, le domaine appartenait à Pierre de Castries, vassal du comte de Toulouse. Acheté par Raymond Guilhem de Montferrier qui passe en 1384 à la famille du Cayla, au début du XVIe siècle passe aux Montlaur qui le cèdent aux St-Bonnet-Toiras en 1712, Elisabeth-Marie-Louise de Bermont de St-Bonnet-Toiras comtesse d'Aubijou vend le domaine à Dominique de Cambacérès, conseiller à la cour des comptes aides et finances de Montpellier,  dans ce château de Jean-Jacques-Régis y passa ses vacances qui sera plus tard le rédacteur du code civil et élu à la convention en 1792. Vers 1820 le château est vendu aux Bentham, Samuel Bentham botaniste anglais, et en  1895 la propriété passe à la famille Huc et Sicard qui le conserve jusqu'en 1956 et à monsieur Queyrel et en 1990 le département de l'Hérault le rachète pour en faire une maison de l'environnement.","architecture":"construction du château du XVI-XVIIe siècle possède un grand parc, Il semblerait quun premier édifice fût construit sous Louis XIII, édifice dont il ne reste que très peu dindices aujourdhui.  se compose   d'un corps de logis à trois niveaux avec un avant corps central en légère saillie, que flanquent  deux tours carrées légèrement plus hautes que le corps principal, les douves ont disparues. Au nord du côté cour d'honneur la demeure paraît plus rustique avec sa façade presque aveugle et ses deux courtes ailes prolongées par des dépendances.  Aujourdhui aménagé en domaine départemental, dune très grande richesse écologique. La façade du château est de plus bordée par un jardin à la française étagé, malheureusement plus visitable.    La façade est bordée par un jardin à la française étagé en plusieurs terrasses dû à la déclivité du terrain. En bas on   découvre l'harmonie de la perspective du château, des terrasses et des escaliers soulignés par des bordures de buis et organisés  sur trois niveaux de façon  très classique. Ce point de vue permet d'observer la mise en scène autour  de l'eau  qui anime la montée des escaliers. L'axe central est rythmé par la présence du bassin ovale  à l'arrière du château, du buffet d'eau à l'entrée du jardin, d'une salle de fraîcheur sous le jardin et d'un bassin au fond du parc. Restinclières a été, en grande partie, remanié au XVIIIe siècle, à la grande époque des \"Folies\" montpelliéraines.","habitants":"Famille de Dominique de Cambacérès\r\n        \"","divers":"Château de Restinclieres à pPrades le Lez","gps":"","images":["../../jctruffet.com/image/image_34/34_Restinclieres_1.jpg","../../jctruffet.com/image/image_34/34_Restinclieres_2.jpg","../../jctruffet.com/image/image_34/34_Restinclieres_3.jpg","../../jctruffet.com/image/image_34/34_Restinclieres_4.jpg","../../jctruffet.com/image/image_34/34_Restinclieres_5.jpg","../../jctruffet.com/image/image_34/34_Restinclieres_6.jpg","../../jctruffet.com/image/image_34/34_Restinclieres_7.jpg"]},"Consult_chateau_formulaire5c30":{"id":"Consult_chateau_formulaire5c30","dept":"34","canton":"Béziers","commune":"Lieuran les Béziers","nom":"Ribaute(34)","type":"Château","periode":"XV-XVI","histoire":"RIBAUTE, du latin ripa alta (« rive haute »), est cité en 1200. Témoin de l'évolution des styles entre les périodes Renaissance et moderne, fut la propriété de Hubert de Montal   \r\nDans les années 2000, le château est loué par des britanniques qui, n'ayant pu en faire l'acquisition, quittent le château en été 2002. Depuis août 2004, les propriétaires actuels procèdent à la remise en état du château et du parc à l'anglaise de huit hectares.\r\naujourd'hui Frédéric et Delphine Thiebaut, chambres d'hôtes et hôtels.","architecture":"Le château de Ribaute médiéval remanié renaissance est constitué d'un logis formant le corps de bâtiment central, dont les voûtes en pendentifs et les toitures en pavillon remontent à la fin du XVIe siècle. Cette partie de style Renaissance est complétée par des constructions ultérieures.  Le château est cité en 1200. Témoin de l'évolution des styles entre les périodes Renaissance et moderne.   Le corps de bâtiment central, avec son escalier, ses voûtes en pendentifs, ses trompes, ses toitures en pavillon  date du règne de Henri IV. Le château de Ribaute est constitué d'un logis formant le corps de bâtiment central, dont les voûtes en pendentifs et les toitures en pavillon remontent à la fin du XVIe siècle.    Le parc du Château  de plus de huit hectares est un jardin paysager, style né en Angleterre au XVIIIe siècle qui  redécouvre la nature, il est conçu comme une longue promenade circulaire ponctuée de vues.","habitants":"Famillz d'Hubert de Montal \r\n        \"","divers":"Château de la Ribaute à Lieuran les Béziers","gps":"","images":["../../jctruffet.com/image/image_34/34_Ribaute(34)_1.jpg","../../jctruffet.com/image/image_34/34_Ribaute(34)_2.jpg","../../jctruffet.com/image/image_34/34_Ribaute(34)_3.jpg","../../jctruffet.com/image/image_34/34_Ribaute(34)_4.jpg","../../jctruffet.com/image/image_34/34_Ribaute(34)_5.jpg","../../jctruffet.com/image/image_34/34_Ribaute(34)_6.jpg","../../jctruffet.com/image/image_34/34_Ribaute(34)_7.jpg","../../jctruffet.com/image/image_34/34_Ribaute(34)_8.jpg"]},"Consult_chateau_formulaire4c2a":{"id":"Consult_chateau_formulaire4c2a","dept":"34","canton":"Murviels les Béziers","commune":"St-Pangoire","nom":"Rieutort","type":"Château","periode":"XVIII","histoire":"RIEUTORD, le château Rieutort est le petit Versailles dans l'Hérault. Cet élégant domaine vinicole, datant du XVIIIe siècle,  chambres ou suites aménagées dans un style néo-baroque.  Le château abrite également un domaine viticole qui produit de grands vins de terroir, dit le château Haut-Blanville, un grand domaine viticole du Languedoc, un domaine vinicole familial dont les chais sont adossés à Rieutort, une élégante bâtisse construite\r\n en 1755 près de Pézenas, en bordure de lHérault. La création du château Haut-Blanville est inscrite sous le signe de la passion pour le vin, de lamour du travail bien fait et de la convivialité. Cest sur ce socle de valeurs communes que notre équipe sest soudée et enrichie de  nouveaux talents au fil du temps.\r\nle château Haut-Blanville, régulièrement classé parmi les meilleurs vins du Languedoc. Sur demande, Isabelle Bely, sommelière, vous initiera à la confection et à la dégustation des vins, illustrée par une visite des chais et de nos trois vignobles. Chambres d'hôtes de Mme Tomczyk Karina","architecture":"Rieutord,   bâtisse du milieu XVIIIe siècle avec vue sur parc, corps de logis rectangulaire  à trois niveaux avec fronton triangulaire sur façade, deux ailes en avancées.","habitants":"Famille de Tomczyk Karina \r\n        \"","divers":"Château de Rieutord à Saint-Pangeoire","gps":"","images":["../../jctruffet.com/image/image_34/34_Rieutort_1.jpg","../../jctruffet.com/image/image_34/34_Rieutort_2.jpg"]},"Consult_chateau_formulaire00c9":{"id":"Consult_chateau_formulaire00c9","dept":"34","canton":"Olargues","commune":"Roquebrun","nom":"Roquebrun","type":"Vestiges","periode":"Xe","histoire":"ROQUEBRUN, construction de la tour au Xe siècle, peu après lan 900,  seul vestige du château carolingien de Roquebrun, qui protégeait laccès à la vallée de lOrb. Possession des vicomtes de Béziers et de Toulouse, le château devint après le passage de Simon de Montfort et des albigeois une garnison royale puis tomba peu à peu en ruine. Elle prolonge un piton rocheux mince et très difficilement accessible. Ce château, qui devait être muraillé, a appartenu successivement aux vicomtes de Béziers et de Toulouse.","architecture":"Il était une fois un grand château au-dessus du village,mais maintenant, tout ce qui reste du château est une tour solitaire, La tour de guet Carolingienne. La tour continuera à marquer le visage de Roquebrun, qui ne serait définitivement pas le même sans ce vieux donjon carolingien plus que millénaire, aux environs de 900, que le château de Roquebrun fut édifié. Le seul vestige qui en demeure est sa tour. Cest une petite tour carrée, exiguë et inhabitable qui prolonge un piton rocheux très mince et abrupt, sérigeant au bout dune crête. Au pied de ce piton se dressait  une ou deux salles adossées au mur dune minuscule terrasse remparée. Dans la partie supérieure de la tour, des trous marquent la place des hourds, échafaudages en bois employés dès les premiers temps de la féodalité et auxquels ont été substitués les mâchicoulis et les créneaux. Il apparaît que des salles et des terrasses étaient situées au bas de ce piton, tandis que le haut de la tour laisse apparaître des trous qui ont servi à la mise en place déchafaudage en bois.","habitants":"Vicomtes de Béziers\r\n        \"","divers":"Vestiges à Roquebrun, tour.","gps":"","images":["../../jctruffet.com/image/image_34/34_Roquebrun_1.jpg","../../jctruffet.com/image/image_34/34_Roquebrun_2.jpg","../../jctruffet.com/image/image_34/34_Roquebrun_3.jpg","../../jctruffet.com/image/image_34/34_Roquebrun_4.jpg","../../jctruffet.com/image/image_34/34_Roquebrun_5.jpg"]},"Consult_chateau_formulaire6d90":{"id":"Consult_chateau_formulaire6d90","dept":"34","canton":"St-Martin de Londres","commune":"Rouet","nom":"Roquette_Vivioures","type":"Vestiges","periode":"XII","histoire":"ROQUETTE, le château de la Roquette (aussi connu, aujourd'hui, sous le nom de château de Viviourès, il avait vocation de défense et d'habitation. La première mention du site date de 1130   elle a pour objet lhommage pour la terre et le château de la Roquette, fief du comte de Melgueil. Au début du  XIIIe siècle, c'est Guillaume de Pian, chevalier, qui possède le château, quil veut faire reconstruire. En 1459, la demeure est vendue à Antoine de Lautrec. Au XVIe siècle, le château est en ruine, à cette époque, la seigneurie appartient à Claude Vabre, puis passe à Henri de Roquefeuil en 1530.   Au  XVIIe siècle, la lecture dun dénombrement  de la baronnie de la Roquette, nous apprend quelle consiste en un vieux château ruiné et inhabitable. En 1658, la baronnie est érigée en marquisat. Un nouveau château est construit.  Jean-Baptiste Raimon de Pavée est marquis de Villevieille de la Roquette en 1749.","architecture":"Le château de Viviourès  est mentionné dès le XIe siècle sous le nom de château de la Roquette (Castrum de Rocheta), le château est bientôt abandonné et tombe en ruines au XVIe siècle,  servit autrefois de place forte mais également dhabitation. Son nom actuel viendrait dune famille qui occupa un mas à côté de la forteresse jusquau XVIIIe siècle. Cette famille sappelait \"Bevieures\" qui viendrait de loccitan \"bien viure\" (lieu où il fait bon au château de Viviourès, connu également sous le nom du château de la Roquette, se situe sur la montagne de lHortus à plusieurs centaines de mètres daltitude.  Le coté de l'attaque est défendu par une tour circulaire dont il ne reste plus grand chose. Une basse-cour repérable à quelques ruines s'étendait sur la pente au sud du château.","habitants":"Famille d'Antoine de Lautrec\r\n        \"","divers":"Vestiges du châteaux de la Roquette","gps":"","images":["../../jctruffet.com/image/image_34/34_Roquette_Vivioures_1.jpg","../../jctruffet.com/image/image_34/34_Roquette_Vivioures_2.jpg","../../jctruffet.com/image/image_34/34_Roquette_Vivioures_3.jpg","../../jctruffet.com/image/image_34/34_Roquette_Vivioures_4.jpg","../../jctruffet.com/image/image_34/34_Roquette_Vivioures_5.jpg","../../jctruffet.com/image/image_34/34_Roquette_Vivioures_6.jpg"]},"Consult_chateau_formulaire37e7":{"id":"Consult_chateau_formulaire37e7","dept":"34","canton":"St-Pons de Thomières","commune":"Salvetat sur Agout","nom":"Salvetat_Caraman","type":"Château","periode":"XII-XVIII","histoire":"A Salvetat sur Agoût, les vestiges du château et à quelques kilomètres au sud  le château de Caraman.                                  SALVETAT,  au cours du XIIe Siècle,  le château du seigneur de La Salvetat, Guillaume de Jourdain, fut édifié au plus haut. Tous avaient à se défendre des fréquentes attaques dennemis voisins, notamment de celles du vicomte de Lautrec. Le nom du village naquit alors, issu du latin « salvare » traduit en vieux français : « la sauveté ». De nos jours, qui vient visiter le vieux village franchit soit le portail vieux, à lentrée de la rue de la Poterne, antérieurement entrée principale de la cité médiévale, soit la Portanelle, petit passage dominant un ancien escalier reliant le « bas nouveau » au « haut historique » de La Salvetat-sur-Agoût. Ce dernière endroit est célèbre; cest de la Portanelle que les Salvetois et le comte dEspradels ont repoussé un violent assaut protestant en 1567.\r\nLes évêques de Saint-Pons-de-Thomières nont pas été les seuls à sintéresser et à profiter des bienfaits de La Salvetat-sur-Agoût. Jusquen 1961, il a existé, dans le village, un hôtel particulier appartenant aux seigneurs de Montarnaud, de la maison dAzémar, grande famille du Languedoc. Pour le vestige de cet hôtel, il reste un cadran solaire.                                                                        Le château de CARAMAN dit de Joyce, chambres d'hôtes  pas d'information historique.","architecture":"Chateau de  la Salvetat, à la suite de différents entre seigneurs, le château et les remparts furent ruinés en 114 puis reconstruits entre 1171 et 1175. Il allait en être ainsi au fil des siècles : Incendies, destructions, reconstruction.  Il subsiste aujourdhui divers vestiges, témoins de plus de mille ans dexistence.  Une chapelle des Pénitents Blancs a été la première église du village, vers 1100. L' église du château, elle a été fréquentée, entretenue et  restaurée par les évêques ,ensuite abandonnée, elle a été détruite en 1952 pour cause de vétusté. La très belle croix de pierre, datée  de 1673, qui en subsiste marque son emplacement à un angle de la « plateforme », une promenade née de la construction, par les évêques, de nouveaux remparts devant les anciennes fortifications du village.                                                                                   Caraman le château semble être du XVIIIe siècle, corps de logis rectangulaire à deux niveaux toiture en croupes, accolé de deux pavillons rectangulaires sur les côtés et en façade deux échauguettes à toits pointus.","habitants":"Famille de  Guillaume de Jourdain\r\n        \"","divers":"Vestiges à Salvetat sur Agout et son château et celui de Caraman","gps":"","images":["../../jctruffet.com/image/image_34/34_Salvetat_Caraman_1.jpg","../../jctruffet.com/image/image_34/34_Salvetat_Caraman_2.jpg","../../jctruffet.com/image/image_34/34_Salvetat_Caraman_3.jpg","../../jctruffet.com/image/image_34/34_Salvetat_Caraman_4.jpg"]},"Consult_chateau_formulaire5dc7-2":{"id":"Consult_chateau_formulaire5dc7-2","dept":"34","canton":"Béziers","commune":"Servian","nom":"Servian","type":"Château","periode":"XVI-XVII","histoire":"Cinq châteaux à Servian; château de Servian, de  Cantaussels, celui de Caussat, de l'Hermitage de Combas et de Millegrands                               CANTAUSSELS, Cantaussels vient de Cantaucèls, forme languedocienne de « Chante oiseaux ». Acquis en 1995, il est aujourdhui lun des domaines phares de la famille Bonfils. SERVIAN  les vestiges permettent d'imaginer Servian médiéval, édifié sur le rocher. Cet itinéraire va d'un château à l'autre.           COUSSAT, folie languedocienne, l'Hermitage de Combas  et Cantaussels viticole  La société Grau Sylvain est dirigée par Sylvain GRAU (Exploitant).                                                    HERMITAGE de COMBAS Hotel restaurant et viticole par Alexandre Rech.  et   Sarl et  activités immobilières / Location d'autres biens immobiliers.  Au XIXe siècle, ce lieu riche dhistoire occupé depuis lépoque romaine, fut lhermitage du Marquis de Saint-Génies et la demeure de lacadémicien français le Duc de Mirepoix.                                                                           MILLEGRANDS  de Bonfils Jérôme c'est une société civile d'exploitation agricole et viticole.","architecture":"Servian, du chemin de ronde à léglise classée bâtie au XIIe siècle, des vestiges de Servian médiéval sont édifiés sur le rocher et protégés par les remparts.                                                              Château de l'hermitage du XIXe siècle.                                    Cantaussels vient de Cantaucèls,  de plan rectangulaire à deux niveaux  et attiques, pavillons saillant sur les angles et pavillons d'entrée sur les deux façades très saillantes côté jardin.      Coussat;   corps de logis rectangulaire à deux niveaux et attiques, flanqué d'un pavillon rectangulaire  à trois niveaux , a l'opposé sur angles, une tour carrée et une tourelle sur l'autre angle         Millegrands; corps de logis rectangulaire à deux niveaux flanqué de tours rondes et d'échauguettes.","habitants":"Famille Bonfils\r\n        \"","divers":"Servian; château de Servian, de  Cantaussels, celui de Caussat, de l'Hermitage de Combas et de Millegrands","gps":"","images":["../../jctruffet.com/image/image_34/34_Servian_1.jpg","../../jctruffet.com/image/image_34/34_Servian_2.jpg","../../jctruffet.com/image/image_34/34_Servian_3.jpg","../../jctruffet.com/image/image_34/34_Servian_4.jpg","../../jctruffet.com/image/image_34/34_Servian_5.jpg","../../jctruffet.com/image/image_34/34_Servian_6.jpg","../../jctruffet.com/image/image_34/34_Servian_7.jpg","../../jctruffet.com/image/image_34/34_Servian_8.jpg","../../jctruffet.com/image/image_34/34_Servian_9.jpg"]},"Consult_chateau_formulaire76fc":{"id":"Consult_chateau_formulaire76fc","dept":"34","canton":"Olonzac","commune":"Siran","nom":"Siran","type":"Château","periode":"XV","histoire":"SIRAN, sous Saint-Louis, en 1261, une charte mentionne Raymond de Siran comme  tenancier des leudes de Béziers , cest-à-dire, chef des hommes ayant prêté serment de fidélité au roi. En 1290, Bernard de Siran devient seigneur de Cassagnoles. En 1309, Philippe le Bel donne le château de Siran à Amaury II de Narbonne en échange du fief de Leucate, afin dy ouvrir un port.\r\nSiran dépendra de lillustre archevêché de Narbonne jusquau 18 février 1318, en effet Jean XXII, pape dAvignon érige à cette date là le petit évêché de Saint-Pons-de-Thomières, et pour ce faire, dépouille larchevêché de Narbonne, Siran entre dans le diocèse de Saint-Pons jusquen 1801, date à laquelle il est supprimé pour être adjoint à lévêché de Montpellier. En 1421, Raymond de Siran par son union avec Aspaïs de la Roque acquiert le marquisat de Cavenac. Au cours des guerres de la Fronde et de la Ligue (fin XVIe siècle) Siran fut tantôt au pouvoir de Joyeuse, tantôt en celui de Montmorency. Robert de Juin épouse sous la pression de Louis XV la marquise Anne Roman dAvignon qui offrit à léglise paroissiale actuelle de Siran la magnifique table de communion en fer forgé. Madame Blet l'à transformé en hôtel restaurant.","architecture":"L'ancien château de Siran abrite un superbe hôtel-restaurant ainsi que la maison du Minervois, haut lieu de la viticulture minervoise. De plan rectangulaire à deux niveaux flanqué d'une tour carrée à trois niveaux.","habitants":"Famille de Robert de Juin\r\n        \"","divers":"Château de Siran","gps":"","images":["../../jctruffet.com/image/image_34/34_Siran_1.jpg","../../jctruffet.com/image/image_34/34_Siran_2.jpg"]},"Consult_chateau_formulaireca5a":{"id":"Consult_chateau_formulaireca5a","dept":"34","canton":"Caylar","commune":"Sorbs","nom":"Sorbs","type":"Maison forte","periode":"XVII","histoire":"SORBS, construction probable au XVIIe siècle pour la famille de la Treilhes de Fozières dont les armoiries sont sculptées sur la porte d'entrée.  Le fief de Sorbs fut très tôt une co-seigneurie et devait le rester jusqu'au milieu du XVIIe siècle. Le château dans son aspect actuel est une construction de la seconde moitié du XVIe siècle ou du début du XVIIe siècle.  Eléments protégés MH: façades et toitures extérieures et sur cour, les galeries et l'escalier.","architecture":"Sorbs; cette construction du XVIIe siècle offre un spécimen assez curieux de l'architecture de cette époque et elle est une des plus intéressantes du canton. La façade est flanquée de deux tours reliées par une galerie. On pénètre d'abord dans une cour donnant accès aux différentes pièces du rez-de-chaussée. Sur la porte un écusson.Il est formé de trois corps de logis disposés autour d'une cour intérieure, fermée sur son quatrième côté par un mur de clôture couronné par un rang de mâchicoulis qui en défend l'entrée. Au revers de ce mur, deux galeries à balustres superposés, permettaient la communication, à deux niveaux, entre les ailes du château. Au fond de la cour, dans l'axe du corps central, s'ouvre la porte d'entrée du château, encadrée de pilastres plats et surmontée d'un fronton rompu au centre duquel règnent les armes de la famille de La Treilhe. Quatre tours d'angle rondes, cantonnent l'ensemble, les tours nord et nord-ouest ayant en grande partie été détruites ou arasées.","habitants":"Famille de la Treilhes de Fozières\r\n        \"","divers":"Maison forte de Sorbs.","gps":"","images":["../../jctruffet.com/image/image_34/34_Sorbs_1.jpg","../../jctruffet.com/image/image_34/34_Sorbs_2.jpg","../../jctruffet.com/image/image_34/34_Sorbs_3.jpg","../../jctruffet.com/image/image_34/34_Sorbs_4.jpg","../../jctruffet.com/image/image_34/34_Sorbs_5.jpg"]},"Consult_chateau_formulaire307d":{"id":"Consult_chateau_formulaire307d","dept":"34","canton":"Lodève","commune":"Soubès","nom":"Soubès","type":"Château","periode":"XIV-XVI","histoire":"SOUBES, village médiéval, fondé au Xe siècle par Saint Fulcran évêque de Lodève. Au XVIe siècle, ce fief catholique s'opposa aux protestants du baron de Faugères puis aux partisans du duc de Montmorency qui en 1584 continua cette lutte idéologique. Vieille tour qui faisait partie des remparts Est et qui fut rattachée au château féodal construit à partir de 1507 par le seigneur André de Peyrottes. En 1631, dans \"l'inventaire des biens prétendus nobles\", Michel de Peyrottes figure, avec comme propriété le château, alors que son co-seigneur, Charles de Carcassonne y est porté pour la tour. Les Peyrottes deviendront plus tristement célèbres, a la fin du XVIIe siècle, avec Gabriel de Peyrottes (1778-1808) qui passera à la postérité sous le surnom de \"seigneur brigand\".\r\n Les Soubèsiens doivent à cette famille d'avoir, en reconstruisant le château et réhabilité une partie des murailles, redonné une cohérence à la partie haute du village. La région connut à partir du XVIIIe siècle un essor économique grâce à l'industrie textile locale. De nombreux petits ateliers cardaient et lavaient la laine des moutons élevés sur les plateaux du Larzac voisin pour le compte des filatures de Lodève. L'activité a commencé à péricliter au début du XXe siècle. Le château seigneurial bâti sur la partie sommitale de la colline, a été sauvé de la ruine dans les années 1966-1968 à linitiative dune famille dorigine soubésienne qui l'a reconstruit sur ses bases.","architecture":"Soubès. ses ruelles étroites, ses maisons bâties sur le rocher, ses fontaines, ses deux châteaux, ses anciens remparts, témoignent dune histoire moyenâgeuse palpitante et authentique, le château du XIIe siècle qui jadis surveillait le passage de la route stratégique du sel de Camargue.  Dès le XIIe siècle, le village était ceinturé de remparts. Magnifique vestige de la fortification Est du XIIe siècle, en pierres de tuf située en contre-bas du château seigneurial. On remarque les meurtrières. La porte bien que cintrée n'est pas d'époque, elle a été percée par les propriétaires du terrain vers 1970. Vestige situé dans une propriété privée. Vieille tour qui faisait partie des remparts Est et qui fut rattachée au château féodal. A droite, le pont (XVIe) construit dans les fossés secs permettant d'accéder, au-dessus, au château.                                                   LA TOUR, dite de Carcassonne, est un imposant bâtiment de plan polygonal. \r\n La tour des XI-XIIe siècles, aujourdhui la plus vieille maison du village, est un vestige remarquable de larchitecture romane civile des XI et XIIe siècles. Ses meurtrières, ses baies géminées, sont autant de témoins vivants du système défensif médiéval. Sa façade Est porte une remarquable baie romane, sous archivoltes. Plusieurs ouvertures de la façade nord sont géminées. De belles colonnettes, aux corbeilles cubiques décorées de feuilles lancéolées, forment la séparation centrale.","habitants":"Seigneur André de Peyrottes\r\n        \r\n        \"","divers":"Château et remparts de Soubès","gps":"","images":["../../jctruffet.com/image/image_34/34_Soubes_1.jpg","../../jctruffet.com/image/image_34/34_Soubes_2.jpg","../../jctruffet.com/image/image_34/34_Soubes_3.jpg","../../jctruffet.com/image/image_34/34_Soubes_4.jpg","../../jctruffet.com/image/image_34/34_Soubes_5.jpg","../../jctruffet.com/image/image_34/34_Soubes_6.jpg","../../jctruffet.com/image/image_34/34_Soubes_7.jpg","../../jctruffet.com/image/image_34/34_Soubes_8.jpg"]},"Consult_chateau_formulaire5a60":{"id":"Consult_chateau_formulaire5a60","dept":"34","canton":"Béziers","commune":"Béziers","nom":"St_Bauzille_Béziers","type":"Château","periode":"XIX","histoire":"St-BAUZILLE est sur l'emplacement d'un site gallo-romain et médiéval et serait connu dès la deuxième moitié du XIIe siècle comme possession des chanoines de Cassan, il ne présente plus de vestiges anciens et  réapparaît comme ferme qu'au début du XIXe siècle. Félix Coste d'Espagnac a dû l'acquérir  vers la fin du  XIXe siècle. En 1903 ce sont ses enfants qui en héritent puis sa petite fille. En 1920 celle-ci devient marquise de Malet, les armoiries de cette dernière famille figurent au château. Saint-Bauzille est délaissé et ne sera  pratiquement plus habité jusqu'au début des années 80, avec  l'arrivée de Jean-Claude Gisclard. Son but, en  s'installant dans cette immense propriété où tout et aussi à reconstruire, et aussi de restaurer cette maison.","architecture":"St-Bauzille, architecture caractéristique des châteaux viticoles du Biterrois. Qualité des aménagements intérieurs. Importance du parc.  Le château est  du XIXe siècle inscrit au titre des monuments historiques. Cet édifice représentatif des grands châteaux viticoles du biterrois, de plan en L corps de logis rectangulaire à trois niveaux flanqué en angles de pavillons carrés à toits brisés possédant  oculus  côté parc .","habitants":"Famille de Félix Coste d'Espagnac \r\n        \r\n        \"","divers":"Château de Saint Bauzille à Béziers","gps":"","images":["../../jctruffet.com/image/image_34/34_St_Bauzille_Beziers_1.jpg","../../jctruffet.com/image/image_34/34_St_Bauzille_Beziers_2.jpg","../../jctruffet.com/image/image_34/34_St_Bauzille_Beziers_3.jpg"]},"Consult_chateau_formulaired0d1":{"id":"Consult_chateau_formulaired0d1","dept":"34","canton":"Lodève","commune":"Saint-Bauzille de Putois","nom":"St_Bauzille_Putois","type":"Château","periode":"XVI","histoire":"ST-BAUZILLE-PUTOIS, construit vers 1643 par Jacques de Valat, Jean de Valat, prieur de Valleraugue est accusé par les protestants d'avoir utilisé les pierres du  temple détruit pour construire sa  \"grande maison\" et incorporé le cimetière dans son parc. En 1779, Pierre de Valat vend maison et jardin à Antoine Martin  magistrat. De ces Martin seigneurs du Bosc, le bien passe à la famille de Rodez Bénavant en 1808 avec Hugues-Charles-Anne Barthélémy de Bénavant Rodez. En 1899, le comte  Marie-Louis-François-Léon de Rodez-Bénavant se voit attribuer toutes les terres de Saint Bauzille et de Brissac avec château et maisons; le domaine comprend alors \"une maison de maître avec cour\" qui est partagé  entre ses deux enfants, Henriette et son fils, le comte Henri qui épouse Jacqueline de Mauléon en 1876. Les bâtiments sont alors rendus homogènes à la fin du XIXe ou au début du XXe siècle. A la mort du vicomte Jacques en 1995 la propriété passe à Joëlle de Mauléon, épouse du comte Gilles de Mauléon Narbonne.","architecture":"Le château de Saint-Bauzille en Putois construit vers 1643  de plan rectangulaire à deux niveaux flanqué de tours rondes à trois niveaux  à mâchicoulis, Il est classé au titre des monuments historiques depuis juillet 2009. Un deuxième château à Saint-Bauzille en forme de L à trois niveaux  flanqué d'un donjon carré sur la partie arrière.","habitants":"Famille de Jacques de Valat\r\n        \"","divers":"Château de Saint-Bauzille en Putois","gps":"","images":["../../jctruffet.com/image/image_34/34_St_Bauzille_Putois_1.jpg","../../jctruffet.com/image/image_34/34_St_Bauzille_Putois_2.jpg","../../jctruffet.com/image/image_34/34_St_Bauzille_Putois_3.jpg"]},"Consult_chateau_formulaire46f8":{"id":"Consult_chateau_formulaire46f8","dept":"34","canton":"le Crès","commune":"St-Drézéry","nom":"St_Drézéry","type":"Château","periode":"XV-XVII","histoire":"SAINT-DREZERY  a été fondé aux IV et Ve siècles.  Propriété de lEvêché de Maguelone au Moyen-Age, le petit hameau de Saint-Drézéry poursuivit sa croissance au travers des siècles. Le château date de 1351 partiellement détruit par un incendie en 1790. Le château fût la propriété de Jean-Jacques-Régis de Cambacérés, avocat, homme politique, principal rédacteur du Code Civil français. Jean-Jacques de Cambacéres y séjourna de nombreuses fois en vacances avec son oncle, Étienne-François de Cambacérès, archidiacre de Montpellier Vice-président du conseil municipal, Jean-Jacques-Régis de Cambacérès ne peut se porter acquéreur de Saint-Drézéry, il se sert donc d'un prête-nom pour acheter le domaine. Saint-Drézéry. En 1791 au sieur Claris, procureur à Montpellier, qui le revend à Cambacérès le 12 janvier 1791 . À sa mort, Cambacérès lègue en 1823 le château à la cathédrale de Montpellier.                                                             PUECH-HAUT   construit  au XVIIe siècle appelé à être détruit mais Gérard Bru l'acheta qui le déplaça et reconstruit pierre par pierre dans sa nouvelle propriété pour un atelier dnologie.","architecture":"St-Drézéry, le château du XVIIe siècle ensemble quadrangulaire,   était transformé en monastère, corps de logis rectangulaire à deux niveaux à toit plat avec enceintes importantes.                                                 Puech-Haut d'inspiration italienne du XVIIe siècle corps de logis rectangulaire à deux niveaux,  oeils de boeuf au premier niveaux, toit en croupe.","habitants":"Famille de  Jean-Jacques de Cambacéres\r\n        \r\n        \"","divers":"Château de Saint-Drézéry et de Puech Haut","gps":"","images":["../../jctruffet.com/image/image_34/34_St_Drezery_1.jpg","../../jctruffet.com/image/image_34/34_St_Drezery_2.jpg","../../jctruffet.com/image/image_34/34_St_Drezery_3.jpg","../../jctruffet.com/image/image_34/34_St_Drezery_4.jpg","../../jctruffet.com/image/image_34/34_St_Drezery_5.jpg","../../jctruffet.com/image/image_34/34_St_Drezery_6.jpg"]},"Consult_chateau_formulaire1019":{"id":"Consult_chateau_formulaire1019","dept":"34","canton":"Lodève","commune":"St-Etienne de Gourgas","nom":"St_Etienne_Gourgas","type":"Château","periode":"XIV-XVII","histoire":"Trois châteaux à Saint-Etienne de Gourgas celui d'Aubaigues, celui de Gourgas et de la Roques.\r\nAUBAIGNES, le castrum d'Aubaigues, du latin Alba acqua, « eau blanche », est mentionné dès le XIe siècle dans le cartulaire des évêques de Lodève. En 1140, le chevalier Bérenger  d'Aubaigues est cité comme vassal et viguier de l'évêque Pierre I de Raymond.  Il lui rend l'hommage en ces termes :  Moi, Béranger, fils d'Alixende, je ne te tromperai pas, toi, Pierre, évêque de Lodève, fils de Marie, au sujet du château d'Aubaigues, de la tour et de tout ce qui appartient à ce château. \r\nROQUES, maison forte château féodal du XVIe siècle appartenant au seigneur de Lodève Dupuy-Montbrun vers 1530, laissé à l'abandon depuis le XIXe siècle et restauré avec passion à partir des années 2000 par les propriétaires Dominique et Michel Vinitzky.                                                                                               GOURGAS,  il appartiendrait actuellement  au comte de Beaumevieille.","architecture":"Aubaignes, mentionné comme castrum  du XIIe siècle ; la demeure actuelle a pu être construite au XVIIe siècle sur des bâtiments plus anciens datant du XIVe siècle. L'édifice comprend  un  étage de soubassement et  un étage en surcroît. Gros oeuvre en grès et pierre de taille, toit à longs pans recouvert de tuiles creuses. L'appareil de grès et pierre de taille s'élève sur deux étages avec un escalier extérieur. Le château est coiffé d'un toit à long pans de tuiles creuses. Gourgas, le gros-oeuvre du château et de la chapelle peut dater de la fin du XVIe ou du début du XVIIe siècle ; dans le courant du XIXe siècle,  adjonction de granges.  L'édifice comprend un étage carré ; étage en surcroît, le gros-oeuvre en grès ; pierre de taille ; enduit partiel, toit à longs pans, tuiles creuses.                                  Château fort de Gourgas, construction probable du XIVe ; remanié à la fin du XVIIIe siècle, détruit en 1956 à l'exception d'une tour d'angle et du soubassement des murs .","habitants":"Chevalier Bérenger                                                                               Famille de Michel Vinitzky\r\n        \"","divers":"Saint-Etienne de Gourgas château d'Aubaigues, de Gourgas et de la Roques.","gps":"","images":["../../jctruffet.com/image/image_34/34_St_Etienne_Gourgas_1.jpg","../../jctruffet.com/image/image_34/34_St_Etienne_Gourgas_2.jpg","../../jctruffet.com/image/image_34/34_St_Etienne_Gourgas_3.jpg","../../jctruffet.com/image/image_34/34_St_Etienne_Gourgas_4.jpg","../../jctruffet.com/image/image_34/34_St_Etienne_Gourgas_5.jpg","../../jctruffet.com/image/image_34/34_St_Etienne_Gourgas_6.jpg","../../jctruffet.com/image/image_34/34_St_Etienne_Gourgas_7.jpg","../../jctruffet.com/image/image_34/34_St_Etienne_Gourgas_8.jpg","../../jctruffet.com/image/image_34/34_St_Etienne_Gourgas_9.jpg"]},"Consult_chateau_formulaire5f87":{"id":"Consult_chateau_formulaire5f87","dept":"34","canton":"Cazouls les Béziers","commune":"St-Geniès de Fondedit","nom":"St_Geniès","type":"Château","periode":"XII-XVI","histoire":"SAINT-GENIES DE FONTEDIT est un village circulaire qui possède encore à son épicentre les vestiges du castrum de Sancto-Genesio, cité en 1206, à la veille de la croisade contre les Albigeois. \r\nPlace féodale mineure, en 1323, Saint Geniès de Fontedit entre dans les possessions de la famille de Thézan, qui constitue autour du château un honneur et une possession féodale homogène, élevés au titre de marquisat par Louis XV. La famille de Thézan-Saint Geniès est éteinte depuis 1943 et son tombeau est à la chapelle rurale Saint-Fulcran.","architecture":"Le village de Saint-Geniès de Fontedit  a connu une forte extension au XIVe siècle, comme en attestent léglise de style gothique méridional et la fontaine située au rez-de-chaussée de lancienne tour consulaire. Lenceinte construite pour protéger cette extension est toujours présente m
