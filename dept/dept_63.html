ier époux depuis 1846 de l'infante Louise d'Espagne. En 1886 il est cédé par les ducs de Montpensier à Alfred Guérinet qui finira de transformé le bâtiment en un véritable château qui sera transformé ensuite en hôtel par la famille Bosman. Deux châteaux dans la commune  Saint-Priet  et Asselot.","architecture":"Maulmont d'une commanderie hospitalière du XIIIe siècle sera transformé en un rendez-vous de chasse en 1829, par Adélaïde qui en avait fait l'acquisition de l'ancien duché de Randan et entreprit sa réhabilitation. En dix ans elle  fit agrandir, restaurer et meubler le château, construire les dépendances et créer le parc paysager. Les travaux furent réalisés sous la direction de Pierre François Léonard  Lafontaine (1762-1853), premier architecte du royaume, avec la complicité de Louis-Philippe. Après la chute de la Monarchie de juillet (1848), Randan connut de nombreuses vicissitudes mais à la fin du XIXe siècle, le domaine reprit vie grâce à la comtesse de Paris (1848-1919) qui entretient et modernisa avec passion la propriété auvergnate, surélévation des ailes sud et ouest. En 1925, la château marqua le déclin du domaine Royal qui ferma ses grilles et tomba dans l'oubli. Heureusement reprit et transformé en hôtel.","habitants":"Famille de Maulmont\r\n        \"","divers":"Château de Maulmont et de Maulemont et Asselot à Saint-Priest.","gps":"","images":["../image/image_63/63_Maulmont_1.jpg","../image/image_63/63_Maulmont_2.jpg","../image/image_63/63_Maulmont_3.jpg","../image/image_63/63_Maulmont_4.jpg","../image/image_63/63_Maulmont_5.jpg","../image/image_63/63_Maulmont_6.jpg","../image/image_63/63_Maulmont_7.jpg"]},"Consult_chateau_formulaire51c4":{"id":"Consult_chateau_formulaire51c4","dept":"63","canton":"Billom","commune":"Mauzun","nom":"Mauzun","type":"Vestiges","periode":"XIII","histoire":"MAUZUN, site stratégique fortifié depuis lantiquité, le château de Mauzun a été plusieurs fois rebâti par les d'Eustorge comte dAuvergne au cours du Moyen-Age, pour protéger le Livradois contre les invasions normandes. Au début du XIIIe  siècle, tandis que lAuvergne est le théâtre de la guerre franco-anglaise, Mauzun est lenjeu dune lutte acharnée entre le comte,  pro-anglais, et lévêque de Clermont, pro-français. Après le rattachement de lAuvergne à la France, le château est une dernière fois rebâti, entre 1230 et 1240, sur le modèle  des grandes forteresses royales. Cette construction gigantesque, destinée à marquer  les esprits, est alors le symbole de la domination française. Leffet dissuasif est tel que la région bénéficie dun siècle et demi de paix, le château passa aux évêques de Clermont-Ferrand, qui tenait Mauzun commandait lAuvergne. La forteresse est à nouveau disputée durant la guerre qui  a eu lieu en 1632, lors de la révolte des grands. Dans les intervalles de paix qui séparent ces périodes de troubles, elle sert aux évêques  de résidence dété. Mais à la fin  du XVIIe siècle, en 1792 il est racheté par des citoyens zélés  qui s'engagent à détruire ce symbole de la féodalité, ils renoncent à ce séjour inconfortable et  cessent de lentretenir, il sert encore de prison durant le XVIIIe siècle. Aujourd'hui une association s'éfforce de le sauver de la ruine.  En 2001 la forteresse de Mauzun est rachetée par la famille Charrier qui, après avoir sauvé deux châteaux en Auvergne, deux châteaux  du Limousin et une abbaye  du Languedoc, sest fixé pour but de stopper la ruine inexorable, du château de Mauzun  de ce grand témoin de lhistoire de France.","architecture":"La forteresse de Mauzun dresse la saisissante silhouette de ses gigantesques ruines sur les marches du Livradois, visible de loin, la place forte couronne la butte dun vieux volcan dont elle tire sa pierre noire. Ceinturée d'une triple enceinte au cur du système défensif,  réunissant 20 tours et 1600 m de courtines, quatorze sont encore debout. À lépoque de sa construction, au XIIIe siècle, Mauzun représentait la formule la plus aboutie de larchitecture militaire. Aujourdhui encore, ses hautes tours déchiquetées nous livrent le secret des méthodes de défense et de survie des grandes forteresses du Moyen-Age.  Il existe une chapelle, peut-être dans la tour nord-est, des lettres patentes de Louis XV du 29 mars 1732 autorise l'évêque Massillon à faire démolir le château du fait de son état. A cette époque, l'enceinte basse abrite toujours les greniers et, situées sur la porte, la maison du concierge   et celle des fermiers, prisons attenantes à la porte de la 2e enceinte, du côté sud, appartements inhabitables et accès au donjon impossible.\r\n En 1744,  démolitions faites : les tours éventrées  et les murs les moins résistants abattus. Les prisons et quelques dépendances agricoles conservées. En 1792, la Nation ayant confisqué les biens du clergé, il est vendu comme bien national à un groupe de 11 acquéreurs, à charge pour eux de le démolir. Ceux-ci rebutés par lénormité du chantier,  se contentent dextraire et de vendre les plus belles pierres. Suivent deux siècles de pillage, de vandalisme et dérosion continue.","habitants":"Famille Charrier\r\n        \"","divers":"Vestiges du château fort de Mauzun","gps":"","images":["../image/image_63/63_Mauzun_1.jpg","../image/image_63/63_Mauzun_2.jpg","../image/image_63/63_Mauzun_3.jpg","../image/image_63/63_Mauzun_4.jpg","../image/image_63/63_Mauzun_5.jpg","../image/image_63/63_Mauzun_6.jpg","../image/image_63/63_Mauzun_7.jpg","../image/image_63/63_Mauzun_8.jpg","../image/image_63/63_Mauzun_9.jpg"]},"Consult_chateau_formulaire7ecc":{"id":"Consult_chateau_formulaire7ecc","dept":"63","canton":"Issoire","commune":"Meilhaud","nom":"Meilhaud","type":"Château","periode":"XIV","histoire":"Fort de MEILHAUD, en 1260, le château est à une famille éponyme vassale des sires de Vinzelles. A la fin du XIIIe siècle, il est acquis par les comtes-dauphins d'Auvergne. A partir de 1302, il appartient à un apanage d'une branche cadette   des dauphins. De  1385 à 1391,  plusieurs ayant-droits cèdent  le château et la seigneurie au chevalier Morinot de Tourzel, seigneur d'Allègre, chambellan du duc de Berry. Au XVIIIe siècle, ils sont encore à ses descendants. Paul Girot de Langlade (1894-1980), arrière-petit-fils du précédent, général de division, grand-croix de la légion d'honneur. Gilles Girot de Langlade (10 novembre 1921 ? 2001), 5e baron Girot de Langlade, fils du précédent, maire de Meilhaud (1975-2001), Paul Girot de Langlade (né en 1946), préfet en retraite. Rémy Girot de Langlade (né en 1951), notaire.  Marc Girot de Langlade (né en 1954).","architecture":"Meilhaud est une haute enceinte quadrangulaire est commandée sur une face par un donjon carré surmonté d'une guette, sur la face opposée, une porte-tour carrée est accolées. Sur trois faces s'étalent une vaste basse-cour polygonale avec un parapet crénelé et des poivrières d'angle.  Château-fort construit au XIIIe siècle, situé près   de l'église. Enceinte quadrangulaire conservée sur deux faces,  sans tour de flanquement,  mais avec échauguettes. La base de l'enceinte est percée d'archères cruciformes. La  porte est défendue par un flanquement carré.","habitants":"chevalier Morinot de Tourzel,                                                            Famille des de  Girot de Langlade\r\n        \"","divers":"Château de Meilhaud et de Langlade.","gps":"","images":["../image/image_63/63_Meilhaud_1.jpg","../image/image_63/63_Meilhaud_2.jpg","../image/image_63/63_Meilhaud_3.jpg"]},"Consult_chateau_formulaire3e80":{"id":"Consult_chateau_formulaire3e80","dept":"63","canton":"La Tour-d`Auvergne","commune":"La Tour-d`Auvergne","nom":"Mesnil","type":"Château","periode":"XIX","histoire":"MESNIL, le château à été construit vers 1860 par Hyacinthe Burin des Roziers, conseiller à la cour de Paris, a épousé  le 10 mars 1902  Madeleine Heurteau   fille de Charles Emile Heurteau , directeur de la compagnie des chemins de fer d'Orléans 1848-1927  et Louise Solacroup 1854-1929 ) dont  François Burin des Roziers , Assureur  Louis-Guillaume Guy Burin  des Roziers, Ingénieur Général Maritime 1904-1994. Catherine Burin  des Roziers  1906-1988.  Solange Burin  des Roziers 1907. Michel Claude Burin  des Roziers, Vice-Amiral d'Escadre 1910-1973. Louise Burin  des Roziers 1912,  et  Etienne Burin  des Roziers, Ambassadeur de France, à Rome  en 1913.\r\nChâteau de la Tour d'Auvergne il n'existe plus. Il a été construit au XIe siècle sur l'emplacement d'une tour romaine. Forteresse imprenable et jamais prise, aux murs épais, avec créneaux et meurtrières, il pourrait être comparé de par sa conception avec l'actuel château de Murol. En 1625, dans un souci de fermeté vis-à-vis d'une noblesse turbulente qui pourrait y trouver le refuge de nouvelles conspirations. Le château de La Tour est donc entièrement détruit, pierre par pierre après les \"Grands Jours d'Auvergne\" à Clermont-Ferrand en 1665-1666, de façon à ce que la place ne puisse plus être fortifiée.","architecture":"Château du Mesnil construit dans le style néo-renaissance,  sur un terrain dépendant du domaine de Mégnaud au milieu d'un parc, sur le rebord de la coulée de  lave. La demeure comporte en demi hors oeuvre en façade,   deux tourelles d'angle à toit conique, flanquent la façade principale, côté jardin, rythmée par trois travées régulières. Les encadrements des baies et la corniche sont en andésite. En arrière deux étables à chevaux disposées symétriquement au château, abritent également des logements. La remise à bois est rejetée  vers le fond du jardin. Sur la pente, en avant  du château, un petit  pavillon isolé, de plan hexagonal, au toit en sextuple bâtière, abrite une remise à outils et un petit poulailler. En arrière de l'étable, une porcherie et un pigeonnier sont installés dans un pavillon. Le logement des gardiens est à l'entrée du parc.","habitants":"Famille de Hyacinthe Burin des Roziers\r\n        \"","divers":"Château de Mesnil.","gps":"","images":["../image/image_63/63_Mesnil_1.jpg"]},"Consult_chateau_formulairedd7c":{"id":"Consult_chateau_formulairedd7c","dept":"63","canton":"Vertaizon","commune":"Mezel","nom":"Mezel","type":"Château","periode":"XIII","histoire":"MEZEL,  au début du XIIIe siècle  prise de Mezel par lévêque Robert dAuvergne avec laide de Guy II comte dAuvergne; la famille de Mezel, se distingue alors avec Etienne de Mezel, évêque de Famagouste vers 1230, Imbert de Mezel à la croisade en 1250. Le château a connu plusieurs propriétaires depuis sa construction de 1330 à 1429  Louis de Mezel, ensuite ses descendants, Robert de Mezel en 1378, Guyot de Mezel, Antoine de Mezel qui y réside jusquen 1427, passe à la famille de Murol, en juillet 1558, Marie de Murol apporte le château par mariage à Jacques de Montmorin  famille de Montmorin de la Barge.  Louis de la Barge devient seigneur de Saint-Bonnet en 1595. Jean-Baptiste Barge vend le château,  en 1652 à François Chardon, conseiller à la cour daide de Clermont-Ferrand, en 1785 à la famille Chardon-Guérin acquiet le château. Le conseiller lègue  à son second fils, celui-ci le vend quelques temps après à sur qui est mariée à François Guérin, seigneur de Saint-Bonnet. En  1783, on trouve au château Marie Forget veuve dAlexis Guérin qui fut la dernière « Dame de Saint Bonnet », en 1885 à la famille Chaudesaigues de Tarrieux,  Il passe par héritage à Anne Chazelade puis la propriété revient à son fils Marie-Jean-Casimir, puis à Marie-Jean-Guy qui le vend à madame Marie Imbert en 1885 , sa descendance le   vend en  1953  à M. Francisque Dubois, frère de madame Sauvadet. en 1995 la famille Dubois mais occupé par la famille Sauvadet. Ils ont remis la propriété en exploitation de 1995 à nos jours par la famille Poil Pau.","architecture":"Château  de Mezel construit au XIIIe siècle, est constitué dune enceinte quadrangulaire  cantonnée avec au moins  trois tours,  lenceinte primitive présente encore une façade sud qui a perdu sa bretèche dont subsistent les corbeaux et la moitié de la porte dentrée, elle a conservé la quasi-totalité de ses créneaux et embrasure, lentrée se faisant  au sud par une grande porte en ogive défendue par une bretèche, des corps de logis sadossant aux murs nord sud et ouest de l'enceinte. Le corps de bâtiment restera tel quel jusquau XVIIe siècle. Il est réaménagé avec un grand portail au rez-de-chaussée et  des fenêtres rectangulaires sur cour. Enfin au XVIIIe siècle réalisation de la grande salle voûtée du rez de chaussée, et  lexécution des fenêtres latérales sur cour.  Lescalier desservant le premier étage est bâti consécutivement à la disparition de laile Sud. De lautre côté de la cour, le logis Est, était probablement en mauvais état avant sa reconstruction au XVe siècle avec la mise en place de baies moulurées à traverses et  croisées de meneaux. Plus tard, au début du XVIIe siècle, un escalier central est inséré au milieu du logis éclairé  par des fenêtres à meneaux en arkose. Puis, vers la fin du XVIIIe siècle, lensemble  des appartements est réaménagé, avec ladjonction de la tour carrée de langle Sud- Est.   Il est situé au sommet de la commune.  Cest un bâtiment presque carré, avec deux tours rondes. Il a été détruit en parti par Richelieu. Ses murs mesurent plus dun mètre dépaisseur. Les ouvertures sont de style Renaissance.","habitants":"Famille Etienne de Mezel\r\n        \"","divers":"Vestiges du château  et château de Mezel, château de Léobard.","gps":"","images":["../image/image_63/63_Mezel_1.jpg","../image/image_63/63_Mezel_2.jpg","../image/image_63/63_Mezel_3.jpg","../image/image_63/63_Mezel_4.jpg"]},"Consult_chateau_formulairefdc9":{"id":"Consult_chateau_formulairefdc9","dept":"63","canton":"Vic-le-Comte","commune":"Mirefleurs","nom":"Mirefleurs","type":"Vestiges","periode":"XIV","histoire":"MIREFLEURS, qui en 1316 elle se nommait Castrum novum puis est connue sous le nom de Châteauneuf d'Allier. On cite parmi ceux qui y commandaient, Gilbert du Lac, qualifié dans un acte de 1560  capitaine du château de Mirefleurs et de celui de Busseol, c'est Louis XI qui, en hommage à la beauté du site lui donna le nom de Mirefleurs par lettres patentes du 15 décembre 1470.  Terre du comté d'Auvergne, Les Comtes d'Auvergne qui, depuis le XIII siècle avaient pour chef-lieu Vic-le-Comte en possédaient par suite le château, importante forteresse flanquée de sept tours qu'on appelle  \"Palais des Comtes\". Celui-ci avait été acheté par le Comte Bertrand VII de la Tour le 18 mai 1469, qui le fit agrandir et restaurer.  Jean Stuart, duc d'Albany, régent d'Ecosse, et comte d'Auvergne, y  résida. Il était devenu comte d'Auvergne par son mariage en 1505 avec Anne de la Tour, héritière de nos comtes, il y mourut le 2 juin 1536. En 1714, Jean de Freydefond, président de Clermont, est seigneur de Mirefleurs et de Saint-Romain. Dans la commune le château de Chalendrat ( voir article);  château médiéval privé.","architecture":"Mirefleurs était fortifié Le 19 Floréal, la guerre s'étend à tout le territoire. A Mirefleurs la collecte du salpêtre est ordonnée (c'est le temps des assignats). C'est aussi celui qui voit le démantèlement du château.  Aujourd'hui il ne reste que des vestiges du château de Mirefleurs pans de murs et tour rondes arasées.","habitants":"Famille de Jean de Freydefond\r\n        \"","divers":"Vestiges du château de Mirefleurs","gps":"","images":["../image/image_63/63_Mirefleurs_1.jpg","../image/image_63/63_Mirefleurs_2.jpg","../image/image_63/63_Mirefleurs_3.jpg","../image/image_63/63_Mirefleurs_4.jpg","../image/image_63/63_Mirefleurs_5.jpg"]},"Consult_chateau_formulairef9b7":{"id":"Consult_chateau_formulairef9b7","dept":"63","canton":"Pontaumur","commune":"Miremont","nom":"Miremont","type":"Château","periode":"XIV","histoire":"MIREMONT, le plus célèbre seigneur de Miremont fut Pierre de la Rochette mort à la bataille de Poitiers  en 1356. Pour lui rendre hommage, le château a donné son nom à la grande salle de réception, salon  Pierre de la Rochette. La cour dhonneur  est composée dun parterre  de rosiers disposés  en constellations, et les  jardins  ont été restaurés. Une fontaine du  XVIIIe siècle avec miroir d'eau aux 4 jets  centraux orne la cour d'honneur. L'édifice a été modifié au XIXe siècle  sous linspiration Viollet-le-Duc. Depuis  1986 il a changé de propriétaire qui a effectué de nombreuses restaurations, cour d'enceinte, tour de garde du XVe siècle, location de salles pour mariage restaurant etc.","architecture":"Le château de Miremont construit au XIVe siècle, est situé à 1 km du bourg de Miremont, sur un petit mont. Le château fait face à léglise romane du XIIe siècle, elle aussi sur un petit mont, doù le nom de Miremont. Les terres du château sont délimitées par les chanceliers, baigné dhistoire, a été modifié au XIXe siècle sous linspiration Viollet-le-Duc ,  de type néo-renaissance. De nombreuses restaurations ont été effectuées (cour d'enceinte, tour de garde du XVe siècle) Les jardins ont été redessinés et replantés en 2009 par un architecte paysagiste de l'école de Versailles, ils sont accessibles au public gracieusement.                                                                                                                                                                  Vestiges du château féodal de Miremont.","habitants":"Famille de Pierre de la Rochette \r\n        \"","divers":"Château de Miremont dit de la Rochette.","gps":"","images":["../image/image_63/63_Miremont_1.jpg","../image/image_63/63_Miremont_2.jpg","../image/image_63/63_Miremont_3.jpg","../image/image_63/63_Miremont_4.jpg","../image/image_63/63_Miremont_5.jpg","../image/image_63/63_Miremont_6.jpg"]},"Consult_chateau_formulaire90b7-2":{"id":"Consult_chateau_formulaire90b7-2","dept":"63","canton":"St-Amant-Roche-Savine","commune":"Le Monestier","nom":"Monestier_Lac","type":"Château","periode":"XV-XVII","histoire":"Plusieurs châteaux à le Monestier,  château des ESCURES, il abritait les écuries du seigneur de Roche Savine.  Ce fut un château particulier et des écuyers du roi y ont vécu.   En 1450, les armoiries de Jean des Escures sont enregistrées dans l'armorial de Revel. il fut le lieu de naissance dAntoinette Micolon;  En 1592, le château est à Jean Micolon, bourgeois d'Ambert, époux de Françoise Grandon des Escures. En 1674, François de  Saint-Priest, écuyer, seigneur du Crozet, habite aux Escures. LAC, en 1286  est cité le chevalier Etienne du Lac dans l'entourage de la comtesse d'Auvergne. En 1316, le damoiseau Béraud du Lac fait aveu au chevalier Pierre-Maurice de Roche Savine et Saint-Bonnet pour sa maison appelée le Fornel du Lac qu'il a   dans la châtellenie de Roche-Savine. En 1370, c'est un autre Béraud du Lac  qui rend hommage à l'évêque  de Clermont pour sa maison du Lac. En 1499 le \"château et forteresse\" est à Annet de Moriat; les tenanciers qui en dépendent doivent les corvées d'entretien en échange de quoi ils ont le droit de s'y réfugier en cas de danger.  Vers 1588, le château endommagé est acheté par Jean Bedias, marchand d'Olliergues, qui se qualifie de seigneur  du Lac. Son remariage avec Marie du Floquet   fait entrer le château par héritage  dans la famille du Floquet. Après 1615, Blaise du Floquet, écuyer, seigneur  de Chaméane entreprend  de restaurer le château qui est  en mauvais état. Ses descendants prennent alors le nom de du Lac. Vers 1700, il passe aux Madur jusqu'en 1852.               ROUSSE, manoir,  vers 1450, Antoine de Pélacot est dit seigneur de La Rousse. En 1527, Jacques de Pélacot est sieur de La   Rousse, puis en 1632 Damien de Pélacot. En 1675, Issac de Pélacot de la Priat épouse Marguerite de Montservier,   il meurt sans postérité.","architecture":"Château des Escures  édifié au XVIe siècle, à 2 km à l'ouest du village, au site de Roche-Savine, dominant à  quadrangulaire fortement talutée  avec une tour tronconique à un angle,  la porte-tour carrée de deux niveaux est  pourvue d'une poivrière d'angle sur tas de charge, elle s'appuie à une  construction antérieure, Le logis de deux  niveaux et demi est accosté côté cour d'une tourelle circulaire d'escalier arasée et recoiffée en appentis.   Château du Lac des XVe-XVIe siècles, situé à 1,8 km à l'est du bourg. Enceinte quadrangulaire à flanquements circulaires d'angle; il en reste 3 accolés à un logis en équerre   de trois niveaux et demi. La porte en plein-cintre ouverte dans la courtine est défendue par une bretèche  dont il reste les cinq consoles à triples ressauts. Le logis a été remanié en 1828, mais conserve des croisées anciennes.    Manoir de la Rousse construit  au XVIe siècle, situé à 1,5 km au nord du village. Logis en équerre, de 2 niveaux et demi, desservi à l'angle intérieur par une tourelle circulaire d'escalier, sa porte, sous linteau à accolade, a pour modénature un chanfrein se terminant sur un congé avec un décor en pyramide.      Le château de Roche-Savine  dont il ne reste que des ruines est mentionné au Xe siècle sur la cartulaire de Sauxillanges. Construit en bois sur un éperon rocheux, le château fut renforcé dune motte castrale et entouré de douves. On pense que le château fut reconstruit en pierres dès le début du XIe siècle. Il est devenu une importante forteresse vers le XIIIe siècle. La seigneurie est passée entre plusieurs mains au cours des siècles avant que le château soit détruit.","habitants":"famille de  Jean Micolon                                                                      Famille de Annet de Moriat                                                           Famille de   Antoine de Pélacot\r\n        \"","divers":"Château des Escures, du Lac, de la Rousse (manoir), Baudry  et de la Roche -Savine","gps":"","images":["../image/image_63/63_Monestier_Lac_1.jpg","../image/image_63/63_Monestier_Lac_2.jpg","../image/image_63/63_Monestier_Lac_3.jpg","../image/image_63/63_Monestier_Lac_4.jpg"]},"Consult_chateau_formulaire7c58":{"id":"Consult_chateau_formulaire7c58","dept":"63","canton":"Champeix","commune":"Montaigut-le-Blanc","nom":"Montaigut_Blanc","type":"Vestiges","periode":"XI-XV","histoire":"MONTAIGUT,  dit le chastel de Montaigut cité au XIe siècle,  la seigneurie appartient à la famille de Montaigut, vassale des Dauphins dAuvergne jusquen 1550, date où elle sera divisée entre plusieurs seigneurs, puis elle fut partagée entre plusieurs  héritiers. Au début du XVIIe siècle Emmanuel d'Allègre, l'un d'eux, put en reconstruire l'unité et l'attribut au marquisat de Tourzel qu'il le possédait déjà. En 1755, Montaigut  Reignat et Saint-Julien  a été vendu à Jean Charles de Laizer, son fils avait toujours la seigneurie en 1789. Montaigut donne son nom à une famille illustre. Protégé monument historique en 1926 pour son intérêt architectural, le château, qui  appartenait alors à la commune, a été acheté par des propriétaires privés, amateurs de vieilles pierres.  Transformé en chambres d'hôtes par la famille Sauvadet.                                                     St-JULIEN, à 1 km au nord-est de Montaigut, le village de Saint-Julien. En 1396, Antoine de Sailhans est seigneur de Saint-Julien. Entre 1560 et 1652, le château passe successivement   dans les familles de Montaigut,  Gilbertès,  de Modène et Motier de Champetières pour finir dans la famille d'Allègre. En 1733, il appartient au maréchal Yves d'Allègre.","architecture":"Superbe construction féodale de Montaigut du XVe siècle, donjon rectangulaire du XIIe siècle, sur le point le plus élevé du piton rocheux, vestiges de la grande enceinte de la ville et bases de tours avec archères. Porte de ville, à l'Est  Le château comprend un gros  donjon primitif carré probablement d'origine romane avec une tour crénelée, moins haute que celle-ci une enceinte flanquée de tours entoure le village, Près du donjon il y avait une chapelle. Le château fut habité jusqu'à la Révolution. La Révolution passa sans incidents sérieux mais vendu comme bien national, le château subit d'irréparables dommages et les matériaux ont dû être réutilisés pour la construction du hameau de la croix du Bois.  Aujourd'hui le donjon carré occupe le point le plus élevé du piton. Sa porte est surmontée d'un tympan décoré d'un  écu et d'archivoltes  en arc brisé (à droite inscription indiquant  la date de la construction 1477). Restes de courtine avec plusieurs tours, à l'est et grande cour intérieure. Le Bourg est entouré d'une bonne muraille percé de portes et flanquée de tours.                             St-Julien, château construit au XVe siècle, situé à 2 km au nord Est du bourg, au plus haut du hameau.  Tracé d'une enceinte en arc de cercle flanquée à chaque extrémité par une haute échauguette en poivrière sur tas-de-charge. Dans l'enceinte s'élève une grosse bâtisse rectangulaire qui pourrait  être un donjon-logis réhabilité et transformé au XIXe siècle.","habitants":"Famille de Montaigut\r\n        \r\n        \r\n        \"","divers":"Vestiges du fort de Montaigut le Blanc, château de Saint-Julien.","gps":"","images":["../image/image_63/63_Montaigut_Blanc_1.jpg","../image/image_63/63_Montaigut_Blanc_2.jpg","../image/image_63/63_Montaigut_Blanc_3.jpg","../image/image_63/63_Montaigut_Blanc_4.jpg","../image/image_63/63_Montaigut_Blanc_5.jpg","../image/image_63/63_Montaigut_Blanc_6.jpg","../image/image_63/63_Montaigut_Blanc_7.jpg","../image/image_63/63_Montaigut_Blanc_8.jpg","../image/image_63/63_Montaigut_Blanc_9.jpg"]},"Consult_chateau_formulaire05cf":{"id":"Consult_chateau_formulaire05cf","dept":"63","canton":"Cunlhat","commune":"Cunlhat","nom":"Montboisier","type":"Manoir","periode":"XVI","histoire":"MONTBOISIER, en 1413, Louis, seigneur de Montboissier reconnait le duc de Bourbon comme seigneur d'Auvergne, En 1529, Antoine de Terraules, notaire royal, est châtelain-prévôt de Montboissier. Cette année-là, le 4 novembre il rend la justice au nom du seigneur Jacques de Montboissier, chevalier,  baron de Montboissier,  Aubusson, Boissonnelle, Le  Montel et Vaumeode, marquis de Canillac, comte de Beaufort et Alais, vicomte de Palerne et de La Mothe, aux Etats  tenus à Montferrand pour la ratification du traité de Verdun et Cambrai.  En 1568 François de Montboissier,  chevalier de l'ordre du Roi, gentilhomme ordinaire de sa chambre, est seigneur et baron de Montboissier, Aubusson, Le  Monteil et  Boissonnelle. En 1675, Philippe de Beaufort Canillac-Montboissier, chevalier, vicomte de Dienne, habite dans son manoir  de Cunlhat. En 1689, Jean-Gaspard de Montboissier-Canillac, marquis de Montboissier, seigneur  de Dienne et Chars, habite le manoir avec son père.","architecture":"Manoir bâti au XVIe siècle, dit de Montboissier, en contrebas de l'église à l'ouest. Logis de deux niveaux et demi à croisées.  Une porte moulurée à tympan sous arc brisé du début du XVIe siècle ouvre sur un escalier intérieur à vis. Un angle est pourvu d'une tourelle circulaire dont le tas-de-charge est entre le premier et le deuxième niveau, une seconde tourelle de même type est prise dans l'agrandissement moderne de la bibliothèque municipale.","habitants":"Famille d'Antoine de Terraules                                                    Famille de François de Montboissier\r\n        \r\n        \"","divers":"A Cunlhat trois manoir le Montboisier  le Terolles et le Verdier.","gps":"","images":["../image/image_63/63_Montboisier_1.jpg","../image/image_63/63_Montboisier_2.jpg","../image/image_63/63_Montboisier_3.jpg"]},"Consult_chateau_formulaire153d":{"id":"Consult_chateau_formulaire153d","dept":"63","canton":"St-Germain-Lembron","commune":"Vichel","nom":"Montcelet","type":"Vestiges","periode":"XII","histoire":"MONTCELET, en 996, le château appartenait à Amblard Comptour-d'Apchon.  Du Xe au XIIe siècle au seigneurs de Moncelles.  En 1241, Béraud de Mercoeur fait hommage à Alphonse de Poitiers pour le castrum de Monceles. En 1253, Hugues Alchier engage sa part du fief à Guillaume de Pagnat et à Robert Dauphin. A cette même époque,  Etienne Alchier rend hommage à  l'évêque de Clermont pour certaines dépendances du château. En 1333, Jambert Alchier est seigneur du castrum \"Montis Celesi\", puis les Albins. Au XVe siècle, les Beaufort . En 1409, Bertrand  Latour de Malgoit rend hommage au seigneur de Mercoeur pour sa part du chastel comprenant la salle-vieille et autres salles près du cellier,  une partie de l'enceinte et   de la cour. En 1575 Jacques d'Oradour est seigneur de Montcellet.  En 1592 la tour de Montcellet est occupée par des maraudeurs qui  dévastent la région. Le sénéchal de Clermont en fait le siège pour les chasser. En 1624-1634 Jacques d'Oradour  archiprêtre d'Issoire est seigneur de St-Gervazy,  village voisin. Entre 1669 et 1724, la famille   de Ronzière  possède le château de Montcelet et le fief de Vichel,   ses descendants le possédaient en 1789.","architecture":"A la fin du XVIIIe siècle, le château de Montcelet en bon état est à l'abandon. Château-fort du XIIe siècle ruiné, isolé du plateau par un fossé en croissant. Reste d'un donjon-beffroi quadrangulaire roman. Le petit appareil en pierres non taillées mais litées est soigneusement chainé aux angles. A l'étage s'ouvre une porte en plein cintre.","habitants":"Famille de Jacques d'Oradour \r\n        \"","divers":"Vestiges sur motte féodal du fort de Montcelet.","gps":"","images":["../image/image_63/63_Montcelet_1.jpg","../image/image_63/63_Montcelet_2.jpg"]},"Consult_chateau_formulaire09af":{"id":"Consult_chateau_formulaire09af","dept":"63","canton":"Aigueperse","commune":"Aubiat","nom":"Montclavel","type":"Manoir","periode":"XIX","histoire":"MONTCLAVEL, bâti entre 1828 et 1842, au lieu-dit Montclavel, le manoir de Montclavel est une jolie bâtisse typique de la bourgeoisie du début du XIXe siècle. monsieur Augustin Baron de Frétat de Chirat et son épouse madame Catherine Pauline de Rochefort semblent être les bâtisseurs de cette demeure. Les époux Augustin de Frétat et madame de Rochefort eurent cinq enfants dont Alexandrie qui fut propriétaire du manoir. Un autre de leur enfant Charles de Frétat et son épouse rachetèrent une partie du manoir où se tenait le château et il détenait d'autres parcelles suite à des échanges.\r\nCharles de Frétat est décédé en 1887 sans laisser de descendance et sa veuve madame de Paraize légua Montclavel à sa mort à ses cinq frères et surs.\r\n Mais le 14 juin 1891 Jean-Baptiste Martin a acheté le manoir par acte notarié. Il décéda en 1895 et légua le manoir à ses quatre enfants. En 1903, Alphonse Gagnon a acheté le manoir à la veuve de Martin. Puis Marcel Gagnon qui avait hérité le manoir de son père, le vendit en 1913 au comte Tron de Bouchony et son épouse. Il est décédé en 1953 et avait 8 enfants. En 1954, ces derniers ont procédé à la liquidation et au partage des biens et c'est leur mère qui obtient Montclavel. Elle décéda en 1961, les héritiers vendirent le manoir à madame et monsieur Thénot. Transformé en hôtel restaurant.","architecture":"Manoir de Montclavel, bâti entre 1828 et 1842, jolie bâtisse typique de la bourgeoisie du début du XIXe siècle, comprend au midi une cour rectangulaire attenante au nord. La face nord de ce rectangle est occupée par une grange avec écurie. Le manoir de Montclavel comprend au midi une cour rectangulaire attenante au nord. La face nord de ce rectangle est occupée par une grange avec écurie et chambre de bouvier à l'intérieur. La face orientale est limitée par un pavillon à usage de cuvage, hangar, soute à charbon, buanderie avec grenier et chambres de domestiques au-dessus. Le coté occidental est limité par un pavillon de même forme que le précédent qui comprend écurie à chevaux. Dans la cour se trouve un puit.  Aujourd'hui le manoir de Montclavel est toujours identique à cette description.","habitants":"Monsieur Augustin Baron de Frétat de Chirat \r\n        \"","divers":"Château de Montclavel","gps":"","images":["../image/image_63/63_Montclavel_1.jpg"]},"Consult_chateau_formulaire0965":{"id":"Consult_chateau_formulaire0965","dept":"63","canton":"Vic-le-Comte","commune":"Laps","nom":"Montfleury_Laps","type":"Château","periode":"XVI","histoire":"MONTFEURY à St-Maurice, ce château a été édifié pour le fils de François de la Guesle, bailli et gouverneur du comté d'Auvergne,  maître  d'hôtel de Catherine de Médicis. L'architecture marque bien les influences méridionales  qui ont eu une grande faveur en Auvergne au XVIIIe siècle.                                                    QUAYRES,  château des Quayres est une maison dEnfants à caractère social située dans la commune de Laps, qui a pour but daccueillir des enfants et adolescents jusquà 17 ans confiés par lAide Sociale à lenfance, dans le cadre de la protection administrative ou judiciaire.","architecture":"Château de Montfleury à usage dhabitation comprenant un sous-sol, un rez-de-chaussée et trois étages,   édifié au XVIe siècle et très remanié au XVIIIe siècle, le château est composé en L avec une tour ronde à chaque extrémité et une tourelle carrée coiffant l'escalier placé à l'intersection des deux ailes. L'intérieur montre, au rez-de-chaussée, de belles salles voûtées avec une importante cheminée dans l'aile nord. La plupart des pièces à l'étage sont ornées de plafonds à la française, de cheminées et de lambris de style Louis XV rustique.                                                   \r\nQuayres, le château possède un parc aménagé au XVIIIe siècle en terrasses successives utilisant la pente naturelle du terrain. Ces terrasses, au nombre de cinq, possèdent chacune un bassin formant motif central,  dégagé par des talus gazonnés  avec des rampes d'accès.  Les trois terrasses inférieures plantées de vignes  s'étendent latéralement retenues par des murs de soutènement. Les eaux alimentant les bassins donnent  naissance à des jets d'eau.   Eléments protégés MH: Parties des terrasses du parc délimitées comme suit, partie supérieure, crête du talus et première marche de l'escalier  donnant accès à la plate-forme située  devant le château, partie inférieure  arête de la dernière terrasse dominant le ravin, à droite et à gauche, mur suivant le profil de la déclivité.","habitants":"Famille de François de la Guesle\r\n        \"","divers":"Château de Montfleury et du Quayres.","gps":"","images":["../image/image_63/63_Montfleury_Laps_1.jpg","../image/image_63/63_Montfleury_Laps_2.jpg","../image/image_63/63_Montfleury_Laps_3.jpg","../image/image_63/63_Montfleury_Laps_4.jpg","../image/image_63/63_Montfleury_Laps_5.jpg","../image/image_63/63_Montfleury_Laps_6.jpg","../image/image_63/63_Montfleury_Laps_7.jpg","../image/image_63/63_Montfleury_Laps_8.jpg","../image/image_63/63_Montfleury_Laps_9.jpg"]},"Consult_chateau_formulaire7827":{"id":"Consult_chateau_formulaire7827","dept":"63","canton":"Sauxillanges","commune":"Vernet-la-Varenne","nom":"Montfort_Vernet","type":"Château","periode":"XIV-XVI","histoire":"MONTFORT,  en 1565, le château appartient  à Pierre du Fraysse, époux dAntoinette de la Reynerie, sy succèdent les  familles  de Beauverger-Montgon, de Chauvigny du Blot, du Croc, avant quil soit vendu à Guillaume de La Rochelambert, dans la famille duquel il reste jusquau milieu du XIXe siècle. Les familles Lapire et Faugières à la fin du XIXe siècle, puis les surs de Saint-Vincent de Paul  dIssoire loccupent jusquà la seconde moitié du XIXe siècle. La commune en fit l'acquisition dans la seconde partie du XXe siècle et le transforma en centre culturel.     CHERY,  en 1385, Alissante de Cisterne est dame du Chéry. En 1426. Amblard de Cisterne est seigneur. En 1571, Claude de Cisterne, époux d'Anne de Cussac, est seigneur. En 1578 Louis de la Richardie est seigneur. Avant 1600, Jean de Basse de la Richardie, chevalier, donne le fief à son fils cadet, François, marié à Riom à Jeanne de la Blanchisse. En 1674 Jean de Besse de la Richardie,  écuyer,  âgé de 86 ans,  est seigneur du Chéry y  habite . Vers 1680, Antoine de Matharel achète le château. Au XIXe siècle, celui-ci est encore à  ses descendants.     \r\nREYNERIE, en 1523, le seigneur en est Jean de la Reynerie. Un autre Jean y habite en 1689  et pour  doter ses filles,  il le vend en 1705 à Gilbert Joseph Cellin,  seigneur du Montel,  secrétaire du roi.  En 1768  Marguerite Cellin se marie à François de Gibanel, comte de Combarel. Mathieu Louis désiré de Combarel de  Leyval, né au château en 1808, fut député du Puy-de-Dôme de 1839 à 1848.  Les familles Cornudet des Chomettes puis Faugières  sy succèdent à la fin  du XIXe siècle. Devenu un centre  de colonie de vacances au   début  des années 1970  pour les enfants des salariés de l'usine Cegedur d'Issoire, il fut racheté dans les années 2000 par une personne privée.","architecture":"Monfort  ce château-fort du XIIe siècle, remanié au XVIIe siècle, domine le bourg et le plan d'eau du Vernet-la-Varenne. Maison-forte de Montfort, du XVe siècle. Donjon logis de trois niveaux, flanqué de trois tours rondes et au milieu du grand côté, dune tourelle polygonale descalier, dont une bretèche défend lentrée.  Enclos dans une enceinte quadrangulaire, dont  il reste deux tours rondes dangle.\r\nPropriété communale, il abrite au rez-de-chaussée la maison de l'Améthyste. Expositions temporaires pendant la saison estivale.  Il est acheté par la municipalité qui laménage en centre culturel consacré à l'art contemporain et à un musée de  laméthyste, dont la commune possède un filon.                                                     Château de Chery  situé à 1,5 km au nord-ouest du bourg à l'ouest.  Enceinte quadrangulaire à flanquements circulaires qui dominent aux angles,  ils sont accolés à un logis de deux niveaux et demi, une chaîne verticale à  1/3 de longueur signale que le logis a été allongé avant la construction des tours. Un deuxième logis en retour d'équerre est une construction tardive en dehors du tracé originel.                                                                                   Reynerie maison-forte du XVe remaniée au XVIe siècle, puis au XVIIIe siècle pour prendre son aspect final à  la  fin du XIXe siècle. Trois tours sont accolées à un logis en équerre dont langle intérieur est occupé par une tourelle descalier.","habitants":"famille  Pierre du Fraysse,                                                                     Famille de Jean de Besse de la Richardie                            \r\n Famille de  Jean de la Reynerie\r\n        \"","divers":"Château-Fort de Montfort, château de Chery et de la Reynerie.","gps":"","images":["../image/image_63/63_Montfort_Vernet_1.jpg","../image/image_63/63_Montfort_Vernet_2.jpg","../image/image_63/63_Montfort_Vernet_3.jpg","../image/image_63/63_Montfort_Vernet_4.jpg","../image/image_63/63_Montfort_Vernet_5.jpg","../image/image_63/63_Montfort_Vernet_6.jpg","../image/image_63/63_Montfort_Vernet_7.jpg","../image/image_63/63_Montfort_Vernet_8.jpg","../image/image_63/63_Montfort_Vernet_9.jpg"]},"Consult_chateau_formulaire813f":{"id":"Consult_chateau_formulaire813f","dept":"63","canton":"Thiers-Courpiere","commune":"St-Agathe-Escoutoux","nom":"Montguerlhe","type":"Château","periode":"XI","histoire":"MONTGUERLHE Les textes anciens connus permettent daffirmer que cette forteresse a été active du XIe jusquau XVIe siècle (ruiné en 1610). La taxe de péage et les impôts seigneuriaux seront néanmoins toujours perçus jusquà la Révolution. De 1789 jusquau milieu du XXe siècle, Montguerlhe servira de carrière et alimentera les constructions de nombreux bâtiments alentours. Ceci explique en partie son état de ruine avancé. La charte de Vollore (1312) est la plus vieille mention connue. Du XIe au début du XIVe siècle, Montguerlhe dépend de la seigneurie de Thiers. Il passe ensuite sous la possession des seigneurs de Vollore jusquà la Révolution.\r\nA Escoutoux le château de MAUBEC.  Au XIIIe siècle, la seigneurie est aux sires de Thiers. Avant 1280, Alix de Thiers la porte par mariage à Hugues  de Dalmas. chevalier, seigneur d'Aubuère. En 1481, Anne de Dalmas héritière de Maubec, fait passer la demeure par mariage à Antoine Motier de la Fayette. En 1615, Louise de La Fayette l'apporte à François d'Apchier, chevalier. Vers 1643, Françoise d'Apchier, toujours par mariage, passe la propriété à Balthazard de Langlade, chevalier, capitaine au régiment du Coudary-Montpensier. La famille de Langlade la conserve jusqu'à la Révolution.                                                          VAULX,  au coeur du Parc Naturel Régional Livradois-Forez, dans un site préservé et boisé, Martine et Philippe vous accueillent dans le cadre authentique de la demeure médiévale de leurs ancêtres.  Chambres d'hôtes.","architecture":"Montguerlhe, sa motte, ses fossés et talus, les fondations des ses trois enceintes ainsi que certains murs  sont encore visibles. Ce château dépoque romane était très compact (environ 600 m2 au sol) et possédait une tour maîtresse carrée encore identifiable sur certaines photographies du début du XXe siècle. Ce bâtiment avait une fonction purement militaire de surveillance et de contrôle de la route Clermont-Lyon. Seule, une petite poignée dhomme en assurait la gestion, la corvée (garde, entretien) était probablement assumée par les habitants de la seigneurie.                               Maubec,   château situé à 1,5 km au sud ouest du bourg.  Il est composé d'un donjon carré accolé à une enceinte polygonale centrée. Les logis sont remaniés à partir du XVIIe siècle.","habitants":"Seigneurs de Vollore\r\n        \"","divers":"Vestiges du château de Montguerlhe et château de Vaux.","gps":"","images":["../image/image_63/63_Montguerlhe_1.jpg","../image/image_63/63_Montguerlhe_2.jpg","../image/image_63/63_Montguerlhe_3.jpg","../image/image_63/63_Montguerlhe_4.jpg","../image/image_63/63_Montguerlhe_5.jpg","../image/image_63/63_Montguerlhe_6.jpg"]},"Consult_chateau_formulaire2897":{"id":"Consult_chateau_formulaire2897","dept":"63","canton":"Billom","commune":"Billom","nom":"Montmorin_Billom","type":"Vestiges","periode":"X","histoire":"MONTMORIN, cité à l'an mille par Calixte Ier du château fort devenu  forteresse au XIIe et XIIIe siècles fut le berceau de la puissante famille de Montmorin,  en 1147  Hugues III de Montmorin se joint à Louis VII, roi de France, lors de la onzième croisade.  Au XVIIe siècle, grâce à leur dévouement pour le roi et les fonctions qu'ils exercent dans le royaume, les seigneurs de Montmorin se sont pas ennuyés par la politique de Richelieu sur la destruction des châteaux, tandis que 2000 autres seront démantelés.\r\nEn 1790, le château ne traverse cependant pas sans encombres la Révolution puisqu'il sera saisi et divisé en parcelles agricoles, après l'arrestation de son propriétaire, Armant-Marc de Montmorin, qui fournit à Louis XVI les faux-papiers permettant sa fuite. Fut acquit en 1965  par la famille Delaire qui entretiennent les vestiges de ce château,   Henri Delaire est pour cela élevé au rang de Chevalier des Arts et des Lettres en 1995. Actuellement, lassociation des Amis du château de Montmorin tente de faire revivre cet édifice.                                                                   TEILLET à Montmorin   Ancien fief de la famille de Bard puis de La Salle,  vers 1767, date de la vente du domaine à Louis Marcellin.","architecture":"Montmorin, cette forteresse des XIIe et XIIIe siècles  présente un des exemples les plus remarquables de l'architecture médiévale en Basse Auvergne,   la forteresse se composait  d'une première enceinte  délimitant la basse cour du château  proprement dit, flanqué de tours dont certaines ont entièrement disparu Le corps de garde adossée à la courtine,  cette première enceinte conserve sa poterne et l'ancien corps de garde. L'enceinte intérieure date des XIIe et XIIIe siècles. Le sommet de la tour de guet a été transformé au XVe-XVIe siècle, l'enceinte extérieure ainsi que le portail d'entrée sont du XIVe siècle. La porte fortifée surmontée de mâchicoulis, encadrée de ses deux tours, est parvenue jusqu'à nous comme l'ensemble du château, sans remaniement ultérieur. Le corps de garde, adossé à la courtine, abrite dans ses quatre salles une collection richement pourvue, une salle d'armes du XIIe au XVIIIe siècle, un musée de l'outil, une salle commune véritable musée d'arts et traditions populaires auvergnats. Du chemin de ronde, un exceptionnel panorama s'étend de la chaîne des Puys aux Monts du Forez en passant par la Limagne.                    \r\n Teillet,  les bâtiments d'origine remontent   au XVIe siècle, la tour du pigeonnier, au nord de la cour, a conservé des vestiges de canonnières,  transformations  au XVIIIe siècle, remaniements en particulier  dans le logis principal, comme en témoignent  des portes, une cheminée et  des plafonds à la Française au rez de chaussée. Château transformé en ferme depuis  le XIXe siècle, entre 1834 et 1859, construction  d'un bâtiment d'aisance au sud ouest de la cour, après le partage du domaine en 1859, construction d'une maison à la fin du XIXe siècle ou au début du XXe siècle.","habitants":"Famille d'Hugues III de Montmorin\r\n        \"","divers":"Vestiges du château-fort de Montmorin et château de Teillet.","gps":"","images":["../image/image_63/63_Montmorin_Billom_1.jpg","../image/image_63/63_Montmorin_Billom_2.jpg","../image/image_63/63_Montmorin_Billom_3.jpg","../image/image_63/63_Montmorin_Billom_4.jpg","../image/image_63/63_Montmorin_Billom_5.jpg","../image/image_63/63_Montmorin_Billom_6.jpg","../image/image_63/63_Montmorin_Billom_7.jpg","../image/image_63/63_Montmorin_Billom_8.jpg","../image/image_63/63_Montmorin_Billom_9.jpg"]},"Consult_chateau_formulaired488":{"id":"Consult_chateau_formulaired488","dept":"63","canton":"Aigueperse","commune":"Montpensier","nom":"Montpensier","type":"Château","periode":"XV","histoire":"MONTPENSIER, à partir du XIe siècle est évoquée la seigneurie de Montpensier, qui passe de la maison de Thiers à la maison de Beaujeu en 1176. Le 8 novembre 1226, le roi de France Louis VIII dit Louis le Lion meurt au château de Montpensier suite à de fortes fièvres contractées lors de la croisade contre les Albigeois. En 1308, la seigneurie de Montpensier passe à la maison de Dreux. En 1384, la seigneurie est vendue au duc de Berry Jean de France, et alors érigée en comté.En 1434, par l'intermédiaire de Marie de Berry, dont Montpensier constitue la dot, le comté passe à sa mort à la maison de Bourbon. Charles III de Bourbon, connétable trahit François Ier et se met au service de Charles Quint. C'est pourquoi le comté de Montpensier est confisqué en 1525, et ne sera rendu qu'en 1539 à sa sur Louise de Montpensier et alors érigé en duché. En 1566, François de Montpensier épouse Renée d'Anjou, qui deviendra l'héroïne de la nouvelle La princesse de Montpensier de madame de La Fayette (1662) et du film de Bertrand Tavernier (2010) du même nom. En 1627, le duché passe à la maison d'Orléans après la mort de Marie de Bourbon, duchesse de Montpensier, mariée avec Gaston de France, duc d'Orléans.","architecture":"Montpensier a pris le nom de la colline autour de laquelle le village s'articule, le Mons Pancheri, littéralement \"Mont de la Panse\", évocation de la forme naturelle de la butte. Butte de Montpensier, en haut de laquelle s'élevait le château de Montpensier.  C'est autour de cette butte de 440 mètres que s'est constitué le village de Montpensier. A cet endroit se dressait, jadis, un château féodal, centre d'une puissante seigneurie, démantelé par Richelieu.","habitants":"Seigneurie de Montpensier,                                                             duchesse de Montpensier\r\n        \"","divers":"Château de Montpensier","gps":"","images":["../image/image_63/63_Montpensier_1.jpg","../image/image_63/63_Montpensier_2.jpg","../image/image_63/63_Montpensier_3.jpg","../image/image_63/63_Montpensier_4.jpg","../image/image_63/63_Montpensier_5.jpg"]},"Consult_chateau_formulaire41e9":{"id":"Consult_chateau_formulaire41e9","dept":"63","canton":"Issoire","commune":"Antoingt","nom":"Montpentier","type":"Château","periode":"XVI","histoire":"MONTPENTIER, à la fin du Xe siècle, ancienne maison forte de Montpentier ou le Pentier, à partir de 1336 divers vassaux des dauphins en prêtent hommage. Maurice de Courcelles en est le propriétaire en 1280. Plusieurs familles loccupent ensuite dont Hugues de Griffer de Montpentier, sa petit fille Marie de Monclar épouse Louis I de Scorailles en 1364. Un descendant, en 1530, vend à Jean Chambon de Mazerat. Jacques de Montmaurin lacquiert ensuite. Charles Louis de Bonlieu (ou Boulieu) est seigneur  de Montpentier en 1674 (comme son père Nicolas-François, seigneur du Breuil), son fils Louis est comte de Montpentier. En 1721 cest Jean de Beaufort Boissier Canillac qui achète le château, Enfin,  en 1735, la seigneurie fut achetée  par Mathieu Rodde. Mathieu Rodde de Vernière, arrière petit-fils de Mathieu et fils de Jacques, en était seigneur à la Révolution.                              Dans la commune la maison forte de Montel                                    A quelques kilomètre au nord  de  SOLIGNAT  En 1674, Jean d'Eraudy est seigneur de Saint-Diery et de Roques, baron de Ludesse, du Treuil, de Montplaisir  et de Solignat. Antoine Goubayre est alors bailli de Montplaisir et \"châtelain\" y réside. Avant 1680, à la mort   d'Antoine Goubayre, sa fille Isabeau hérite   des seigneuries de Solignat et   Montplaisir, elle se marie en 1681 avec Henri Louis Escharlard, comte de la Marck et capitaine du duc de Savoie.","architecture":"À lorigine (XIIIe-XIX siècle), Montpentier, aujourdhui Le Pentier, semble nêtre quune maison forte dépendant de Vodable. Dans larmorial de Guillaume de Revel moitié XVe siècle, le château, en haut  dune butte, est entouré  dune enceinte flanquée dune tour rectangulaire. Il est composé dune enceinte carrée, partiellement crénelée, de hauteur irrégulière, deux corps de bâtiment sont adossés à la muraille ouest et est.  Une tour à langle sud-ouest, couronnée   dun lanternon ajournée, que Gabriel Fournier identifie à une  cuisine à plan centré, le lanternon permettant lévacuation des fumées. Aujourdhui, trois corps de logis  enserrent une petite cour, une tour a été rajoutée au XVe siècle à langle sud ouest. Les tours de lenceinte (postérieures au XVe), arasées, subsistent en soutènement dune terrasse, sauf celle du nord-est, devant les dépendances.                                                                                   Le château  de Solignat est situé en contrebas de l'église,  au midi.  Cest un logis de deux niveaux et demi flanqué de deux tours circulaires en diagonale.","habitants":"Famille de Charles Louis de Bonlieu\r\n        \"","divers":"Château de Montpentier.","gps":"","images":["../image/image_63/63_Montpentier_1.jpg","../image/image_63/63_Montpentier_2.jpg","../image/image_63/63_Montpentier_3.jpg","../image/image_63/63_Montpentier_4.jpg","../image/image_63/63_Montpentier_5.jpg","../image/image_63/63_Montpentier_6.jpg"]},"Consult_chateau_formulaire1d4a":{"id":"Consult_chateau_formulaire1d4a","dept":"63","canton":"Issoire","commune":"Montpeyroux","nom":"Montpeyroux","type":"Vestiges","periode":"XIII","histoire":"MONTPEYROUX, en 1212, Philippe Auguste prend le château  et en inféode à Bertrand de La Tour.  Le donjon circulaire est élevé comme symbole du pouvoir royal. En 1518, par son mariage avec Madeleine de la Tour d'Auvergne, Laurent de  Médicis, hérite   d'une partie   de la baronnie  des de La Tour. Catherine  de Médicis puis Marguerite de Valois en sont  seigneurs.  L'enceinte fortifiée de Montpeyroux dont lorigine demeure mystérieuse est confiée en fief par Philippe Auguste aux prestigieux seigneurs de la Tour dAuvergne. En effet Madeleine de la Tour dAuvergne épouse le fameux Laurent de Médicis et hérite ainsi du château en 1518. leur fille Catherine de Médicis deviendra seigneur de Montpeyroux ainsi que sa propre fille Marguerite de Valois, plus connue sous le nom de la Reine Margot. le château de Montpeyroux, a été acquis au XIXe siècle par le docteur Picard de Grandchamp, médecin et chercheur, qui lui a donné sa forme actuelle, après de nombreux remaniements.","architecture":"Vestige du château de Montpeyroux, la tour du XIIe siècle offre une vue à 360°. Donjon circulaire du début du XIIIe siècle, haut de 35 m,  en moyen appareil irrégulier de pierres de granite mal  équarries et à tout-venant   assemblés à larges joints   de mortier,  avec   des chaînes horizontales   faites de trois rangs   de pierres taillées. Les trous d'échafaudage en hélice accompagnent   de petites fentes éclairant   l'escalier  en rampe épargné dans le mur.   On y décèle facilement   deux campagnes de construction,  la partie basse date du début du XIIIe siècle,  la partie haute est un surhaussement   réalisé vers la deuxième moitié du XIIIe siècle. Cette partie haute est percée de hautes archères à étrier à tir plongeant   disposées en quinconce sur 2 niveaux.  Le donjon est pourvu de latrines encorbellées semi-circulaires. Le couronnement a été restauré en 2004  La tour est classée en 1957 au titre des monuments historiques. Elle appartient à l'académie des sciences, belles-lettres et arts de Clermont-Ferrand (legs de Mme Pierre Rougier). Vestiges des remparts qui entouraient le château et le village médiéval. Le mur denceinte, décrivant une forme ovoïde  était jalonné par de petites tours  sur le versant Nord de Montpeyroux. Celles, qui au nombre de cinq, ont résisté à leffet du temps,  sont en partie découronnées ou détruites partiellement par les démolisseurs. Elles témoignent de la présence dun  chemin de ronde, appelé autrefois chemin de tralume. Au sud, face au village de Coudes, ce mur denceinte navait pas été prolongé en raison de la déclinaison du terrain.","habitants":"Marguerite de Valois\r\n        \"","divers":"Vestiges du château de Montpeyroux.","gps":"","images":["../image/image_63/63_Montpeyroux_1.jpg","../image/image_63/63_Montpeyroux_2.jpg","../image/image_63/63_Montpeyroux_3.jpg","../image/image_63/63_Montpeyroux_4.jpg"]},"Consult_chateau_formulairee892":{"id":"Consult_chateau_formulairee892","dept":"63","canton":"Aigueperse","commune":"Aydat","nom":"Montredon_63","type":"Château","periode":"XIII-XIX","histoire":"MONTREDON, en 1245, le château est entre les mains de Faucon II de Montgâcon, vassal des évêques de Clermont. En 1256,   à la mort de Faucon II, le comte d'Auvergne Robert V,  en tant que tuteur du jeune Faucon, prétend tenir le château de Montredon, cela crée un différend avec l'évêque de Clermont  qui est le suzerain, alors le comte reçoit la garde  du château pendant 3 ans moyennant l'hommage lige et la fidélité à l'évêque, le château revient ensuite à Faucon de Montgâcon. En 1279,  il passe par mariage aux comtes d'Auvergne et en 1375, encore par mariage, aux vicomtes de Beaufort,  puis par héritage aux La Tour-d'Auvergne. De 1366 à 1385, le château est occupé par une compagnie au service des Anglais.  En 1423 il est à Bertrand de la Tour d'Auvergne,  seigneur d'Olliergues. Mais à partir de 1450 environ,  il n'aurait plus été occupé par ses propriétaires. Après 1519 Catherine de Médicis s'approprie l'héritage des  La Tour-d'Auvergne. En 1568, l'écuyer Antoine du Cros est seigneur (par donation de Catherine de  Médicis). En 1587, la Reine ordonne la destruction du château et  fait payer des entrepreneurs de démolition et les matériaux sont réutilisés pour la construction de l'église de Ponteix.                                                                           Dans la commune d'Aydat le château de MONTLOSIER de François Dominique de Reynaud de Montlosier, Lorsquil regagne la France en 1802 après de longues années passées à létranger, le comte de Montlosier est las de ses années de charges et dintrigues politiques au service des privilèges de la noblesse. En 1816, il se retire enfin en ses déserts et montagnes et sétablit à Randanne. Ces terres de province, il en a hérité de son père.  Aujourd'hui siège du parc naturel régional des volcans d'Auvergne et centre hippique.","architecture":"Montredon est en ruine  château-fort ruiné, du XIIIe siècle, sur un pic à 872 m d'altitude. Vestige d'un donjon carré et reste d'une chemise polygonale centrée flanquée de tours rondes très dérasées. Son architecture du XIIe siècle est connue grâce à un document appelé l'armorial Revel. Le centre était occupé par une grosse construction quadrangulaire, crénelé qui semble être un donjon. Il est renforcé par une tour circulaire à mâchicoulis et de créneaux sans que l'on sache si elle y est accolée. Ce bâtiment est enserré par une enceinte crénelée dont un angle sur deux est renforcé par des tours. On pénètre dans cette enceinte par une porte flanquée de deux tours. L'enceinte est doublée en contrebas d'un mur en mauvais état dont on ignore s'il s'agit des restes d'une enceinte plus ancienne ou d'une construction destinée à protéger l'enceinte.                                                                                Montlosier Lédification de la maison de maître débute quant à elle en 1820, dune symétrie parfaite, ce château de style restauration est fait de matériaux locaux, pierre de Volvic et ardoise. Seul obstacle pour lopiniâtre comte et ses douze maçons venus de La Marche, linstabilité du sol de pouzzolane qui nécessite la construction dimportants contreforts.","habitants":"Famille de Bertrand de la Tour d'Auvergne,                               Famille de François Dominique de Reynaud de Montlosier\r\n        \r\n        \"","divers":"Vestiges du château de Montredon et château de Montlosier.","gps":"","images":["../image/image_63/63_Montredon_63_1.jpg","../image/image_63/63_Montredon_63_2.jpg","../image/image_63/63_Montredon_63_3.jpg","../image/image_63/63_Montredon_63_4.jpg","../image/image_63/63_Montredon_63_5.jpg","../image/image_63/63_Montredon_63_6.jpg","../image/image_63/63_Montredon_63_7.jpg"]},"Consult_chateau_formulaire61db":{"id":"Consult_chateau_formulaire61db","dept":"63","canton":"Romagnat","commune":"Ceyrat","nom":"Montrognon","type":"Vestiges","periode":"XII","histoire":"MONTROGNON, vers 1196, Il est érigé dans les dernières années du XIIe siècle par Robert Ier, le château de Montrognon était le centre de la seigneurie de la famille de Montrognon relevant de la famille d'Opme qui était parents et vassaux des Dauphins d'Auvergne établis dans la châtellenie voisine de Chamalières. le Dauphin d'Auvergne fait construire un château sur cette butte.  Au XIIIe siècle et encore dans la première moitié du XIVe siècle, plusieurs maisons, blotties au pied de la tour, forment un village. Le village ne semble pas survivre aux crises de la seconde moitié du XIVe siècle (pestes, ravages perpétrés par les routiers). Quant au château, il est démantelé et partiellement rasé en 1633 dans le cadre de la politique entreprise par Richelieu contre la noblesse.","architecture":"Le château présentait une enceinte fossoyé en forme de trapèze, flanquée de tourelles à demi-engagées, surmontées de créneaux, auquel on accédait par une porte précédée d'un pont-levis. Quant au château, il est démantelé et partiellement rasé en 1633 dans le cadre de la politique entreprise par Richelieu contre la noblesse.\r\nAux revers de hautes courtines sappuyait différents bâtiments qui abritait une cour dans laquelle se trouvait une citerne. La tour ruinée de forme circulaire que l'on voit encore et ce qui reste du donjon bâtie à la fin du XIIe siècle. Il était haut de trois étages voûtés. Une guette en occupait sa plate-forme.  Une tour s'effondra en 1828, tandis que le vent en février 1840 abattait un pan de murailles et une partie du donjon. Il servit alors de carrière pour les habitants de Ceyrat.","habitants":"Famille de Montrognon\r\n        \"","divers":"Vestiges du château de Montrognon château de Johanel.","gps":"","images":["../image/image_63/63_Montrognon_1.jpg","../image/image_63/63_Montrognon_2.jpg","../image/image_63/63_Montrognon_3.jpg","../image/image_63/63_Montrognon_4.jpg","../image/image_63/63_Montrognon_5.jpg","../image/image_63/63_Montrognon_6.jpg","../image/image_63/63_Montrognon_7.jpg","../image/image_63/63_Montrognon_8.jpg"]},"Consult_chateau_formulairebf9c":{"id":"Consult_chateau_formulairebf9c","dept":"63","canton":"St-Germain-Lembron","commune":"Moriat","nom":"Moriat","type":"Château","periode":"XIV","histoire":"MORIAT, en 1330 est citée une famille seigneuriale. En 1402, le  fief passe aux Chaslus, seigneurs de Cordès.  Vers 1614,   le fief est acheté par François d'Allègre, seigneur de Viverols et Beauvoir.  Le château de Moriat dominant l'église du bourg, a été construit au XIVe siècle, et restauré au XIXe siècle.","architecture":"Le château de Moriat féodal on ne retrouve que le tracé de l'enceinte qui englobait l'église. Le château actuel sur une hauteur est une construction de la fin du XVIe siècle, très restauré au XIXe siècle. Sa porte fortifiée laisse deviner l'ancien pont-levis. dominant l'église du bourg, a été construit au XIVe siècle, et restauré au XIXe siècle. Enceinte quadrangulaire à flanquements   circulaires d'angle,  il en reste deux accolés à  un grand donjon-logis quadrangulaire de trois niveaux et demi. On pénètre dans  l'enceinte par une porte-tour qui laisse deviner l'ancien pont-levis et conserve une fenêtre de la deuxième moitié du XIVe siècle.","habitants":"Famille de François d'Allègre,\r\n        \"","divers":"Château de Moriat.","gps":"","images":["../image/image_63/63_Moriat_1.jpg","../image/image_63/63_Moriat_2.jpg","../image/image_63/63_Moriat_3.jpg","../image/image_63/63_Moriat_4.jpg","../image/image_63/63_Moriat_5.jpg","../image/image_63/63_Moriat_6.jpg","../image/image_63/63_Moriat_7.jpg"]},"Consult_chateau_formulaire5a8c":{"id":"Consult_chateau_formulaire5a8c","dept":"63","canton":"Rochefort-Montagne","commune":"St-Pierre-Roche","nom":"Mothe_Choisy","type":"Château","periode":"XVI","histoire":"MOTHE-CHOISY, avant 1400 le lieu est mentionné comme dépendance du prieuré de Ris. De 1523 à 1543, Eustache de Chantoin, seigneur de la Mothe-Chantoin et de la Mothe-Choisy, rend hommage pour les deux seigneuries. En  1666, Antoine   de Boyer est seigneur de Choisy et de la Mothe-Chantoin, il habite au château. La même année, François Rougier âgé   de 35 ans, est seigneur   de La Motte-Chantoin et y réside. Après 1725, La Mothe Choisy passe par   héritage à François de Saint-Julien, seigneur  de La Rodde. Il vend la propriété vers 1739 à Geoffroy Sicaud, secrétaire du Roi   en la  chancellerie près de la cour des monnaies de Lyon. Le château appartient aujourd'hui à M. de Bonnevie.","architecture":"Château situé à 600 mètres au sud-est du bourg.  Donjon-logis de trois niveaux,  repercé de grandes baies au XVIIe siècle. Il est saillant  sur le côté d'une enceinte quadrangulaire sans flanquement; celle-ci était autrefois cernée de douves (rétablies en eau à l'ouest).","habitants":"Famille d'Eustache de Chantoin\r\n        \"","divers":"Château de la Mothe-Choisy.","gps":"","images":["../image/image_63/63_Mothe_Choisy_1.jpg"]},"Consult_chateau_formulaire7394":{"id":"Consult_chateau_formulaire7394","dept":"63","canton":"Ennezat","commune":"Pessat-Villeneuve","nom":"Mothe_Pause","type":"Château","periode":"XV-XVII","histoire":"MOTHE,  Avant 1501, Jehan de Colonges, lieutenant-général de la sénéchaussée d'Auvergne à Riom, est seigneur de la Mothe et Villeneuve.  Avant 1551,  ses héritiers vendent le château à Léonard Le Mareschal, qui le revend à Antoine  Arnauld, anobli en 1577, auditeur en la chambre des comptes de Paris, procureur général de Catherine de Médicis  en 1585. Ses fils, Jean Arnauld, trésorier de France à Riom (mort en 1592) et Pierre, colonel de régiment (mort en 1624) sont seigneurs de la Mothe.  Après 1600 ce dernier vend le château à Christophe du Bois, contrôleur général des Finances à Riom. En 1666, il est à Pons du Bois et en 1705, à Antoine et François du Bois.                                                      La PAUSE, la Pause était un petit fief dépendant à l'origine de la seigneurie de Pessat, mentionné pour la première   fois en 1560. Christophe Duboys, contrôleur général des finances à Riom, fut sans doute le commanditaire de la demeure actuelle au XVIIe siècle.","architecture":"Château de la Mothe édifié au XVIe siècle, situé au sud de Villeneuve, en direction de Pessat. Donjon-logis de trois niveaux, il a été accosté à un angle d'une fine tourelle aux niveaux soulignés par des corniches, un autre angle a été pourvu  d'une poivrière sur tas-de-charge. La tour était à l'angle d'une enceinte actuellement sur bâtie.     la Pause est constituée d'une gentilhommière du XVIIe siècle entourée de   dépendances  agricoles. A l'origine, le corps de logis  était accosté, pour sa façade  antérieure ouest, de deux  avants-corps latéraux, et flanqué  en son centre  d'une tourelle d'escalier  circulaire hors-oeuvre. L'avant-corps sud   qui comprenait une chapelle a été détruit, cette demeure mérite une attention particulière de par le décor  intérieur original qui a été conservé dans toute son authenticité depuis le XVIIe siècle, outre les sols, plafonds  et cheminées, il présente un décor peint  avec motifs géométriques, blasons, vue du château.  Il s'agit d'une  imitation en peinture d'un décor de lambris  à grands cadres tel  qu'on en trouve en France dans le milieu du XVIIe siècle.","habitants":"Famille de Jehan de Colonges                                                        Famille de Christophe Duboys\r\n        \"","divers":"Château de la Mothe et de la Pause.","gps":"","images":["../image/image_63/63_Mothe_Pause_1.jpg","../image/image_63/63_Mothe_Pause_2.jpg","../image/image_63/63_Mothe_Pause_3.jpg","../image/image_63/63_Mothe_Pause_4.jpg","../image/image_63/63_Mothe_Pause_5.jpg"]},"Consult_chateau_formulairee9d5":{"id":"Consult_chateau_formulairee9d5","dept":"63","canton":"Murol","commune":"Murol","nom":"Murol","type":"Forteresse","periode":"XIII","histoire":"MUROL, le bourg, auprès duquel il y a deux châteaux: château haut,  cité au XIIe siècle de la famille  de Chambe  qui passa ensuite par alliance à la famille de Sam qui portera le nom de Murol.  Guillaume de Murol mort à la bataille de Poitiers  en 1356 Jehan son fils hérite et le transmet en 1380  à son neveu  Guillaume, c'est son frère Amblard qui relève la forteresse. En 1429 Jehan épouse  Gabrielle de Lastic mais sans descendance male , la forteresse échoit à  sa fille Johanne qui épouse en 1455 un Giscard d'Estaing,  passe en Baronnie sous la vicomté des d'Estaing. La forteresse reste dans cette famille jusqu'en 1780, puis  acquit  par la famille  Chabrol de Volvic , leur fille  cèdent la forteresse à monsieur de  la Garlaye, évêque de Clermont à sa mort les héritiers le démantèlent. Pratiquement abandonné au XIXe siècle dans un délabrement avancé, le comte de Chabrol en fait don au département qui fait le nécessaire pour le restaurer et consolider, il  l'utilise à des manifestations féodales.","architecture":"La forteresse de Murol édifié au XIIIe siècle sur l'emplacement d'un ancien camp romain, protégée par une vaste enceinte polygonale, cantonnée de tours avec de rares ouvertures, à l'angle nord-est est édifié une puissante tour relié par une courtine à une autre tour moins puissante à l'angle sud-est, dans la cour  intérieure les logis  sont adossés aux courtines  et une chapelle un peu à l'écart, remanié au XV-XVIe siècles par les d'Estaing qui apportent deux tours d'escalier et de fenêtres à meneaux et pendant les guerres de religion  doublage de l'enceinte primitive par une enceinte d'artillerie percées de canonnières et renforcée de puissants bastions.   Epargné  par  Richelieu   en raison du prestige de la famille d'Estaing, et ne subit pas de dégât lors de la Révolution Française. Cependant, elle sert alors de prison, de repaire de brigands, puis de carrière de pierres.","habitants":"Famille d'Estaing                                                                              Famille de Pierre de Tersac \r\n        \"","divers":"Forteresse de Murol.","gps":"","images":["../image/image_63/63_Murol_1.jpg","../image/image_63/63_Murol_2.jpg","../image/image_63/63_Murol_3.jpg","../image/image_63/63_Murol_4.jpg","../image/image_63/63_Murol_5.jpg","../image/image_63/63_Murol_6.jpg","../image/image_63/63_Murol_7.jpg","../image/image_63/63_Murol_8.jpg"]},"Consult_chateau_formulaire0fc1-2":{"id":"Consult_chateau_formulaire0fc1-2","dept":"63","canton":"St-Amant-Tallende","commune":"St-Amant-Tallende","nom":"Murol_Tour_Fondue","type":"Château","periode":"XVI","histoire":"MUROL, mentionnée  dès 1262  comme appartenant à Bertrand de La Tour,  une maison-forte  est alors désignée  comme  forteresse de déglise  de Saint Amant, car attenante  à léglise  utilisée pour  le service paroissial.  La maison-forte, celle-ci a peut-être  été restaurée en 1390  par Jean de Murol,  évêque de Genève en  1378.  En 1411,  Guillaume de Murol obtient laccès direct à létage supérieur de léglise, qui compte trois niveaux.  Le château passe ensuite aux Saint-Avit,  puis aux Le Loup. En 1629  il est vendu à Annet Bouchard, conseiller au présidial. En 1762,  lunique héritière se marie  avec Gilbert Cousin de la Tour Fondue. Au XIXe siècle, tandis   que la nef romane est détruite  et quune nouvelle église paroissiale  est construite, larchitecte Bruyère réalise une importante restauration pour Anatole Cousin de La Tour Fondue.  Martial Giscard se marie en 1818 avec Gilberte Cousin de La Tour Fondue, fille de Lucie-Madeleine d'Estaing. Leur fils Théodore aura 3 enfants, Valéry, Philippe et Joseph. René et Edmond, enfants de Valéry et Henri, fils de Joseph, ne pouvant relever le nom de la Tour Fondue de leur ancêtre, sont alors autorisés à sappeler Giscard d'Estaing par décret du Conseil d'Etat du 17 juin 1922. Lancien président de la République est le second enfant dEdmond.","architecture":"Au centre du village de Saint-Amant-Tallende, fief des La Tour dAuvergne, se dresse le château de Murol, appelé parfois de la Tour Fondue. Un corps de logis (face est) est flanqué de deux ailes, lune au sud, surmontée\r\ndéchauguettes et surplombant la vallée de la Monne. Lautre au nord intégrant une tour dangle, une entrée latérale face au bourg et le chur dune église romane. Une galerie reposant sur un arc gothique de style Troubadour relie les deux ailes au dessus de la cour, qui est lancien  cimetière. Lintérieur est également décoré en style néo-gothique, avec un escalier interne en vis et à claire-voie.","habitants":"Famille Giscard d'Estaing\r\n        \"","divers":"Château Bas dit la tour Fondue et la  tour fondue de Murol et le château de la Barge.","gps":"","images":["../image/image_63/63_Murol_Tour_Fondue_1.jpg","../image/image_63/63_Murol_Tour_Fondue_2.jpg","../image/image_63/63_Murol_Tour_Fondue_3.jpg","../image/image_63/63_Murol_Tour_Fondue_4.jpg","../image/image_63/63_Murol_Tour_Fondue_5.jpg"]},"Consult_chateau_formulairedf67":{"id":"Consult_chateau_formulairedf67","dept":"63","canton":"Rochefort-Montagne","commune":"Gelles","nom":"Neuffont","type":"Château","periode":"XV","histoire":"NEUFFONT, cité en 1240, les Plaignes sont seigneurs de Neuffont. Vers 1505, la seigneurie est à Jacques de La Volpilière marié  à Damienne du Puy-Vatan. Avant 1597, elle est à Louis Autier, seigneur de Villemonteix. En 1641 et 1674, Claude   Richard de Prades, sieur de Neuffons, habite à Prades en Saint-Pierre Roche. En 1681 Louis Richard de Prades, fils de Claude, écuyer, est seigneur de Neuffont et habite son château. En 1789, la demeure est encore possédée par cette famille de Prades.                  BANSON, à la fin du XIIe siècle serait mentionnée une famille éponyme. En 1360, le château est pris par les routiers  anglais. En suite de quoi, il sert de repaire à des brigands avant d'être repris en 1375 par Louis de Bourbon. En 1434,  Erard de Banson lègue le château à son parent Guillaume d'Aubusson, à charge de relever les armes et le  nom. En 1674 François d'Aubusson, écuyer, seigneur de Banson et de la Mallerée de Cébazat, habite le château de Banson, il a servi dans les mousquetaires du roi et est alors capitaine d'une compagnie d'infanterie dans le  régiment de Champaigne. Ses descendants le conservent jusqu'en 1789.","architecture":"Château  de Neuffont  situé à 3 km au nord-est du village, vers Pontgibaud. Le château est un grande construction rectangulaire de cinq travées sur deux niveaux et demi,  flanqué à un angle d'un donjon carré de trois niveaux et à deux autres de flanquements circulaires. \r\nBanson  En 1669, le château possède quatre tours avec leur mâchicoulis. Deux tours cylindriques arasées ainsi qu'une salle basse sont les vestiges d'une enceinte quadrangulaire à flanquements circulaires d'angle. La plate-forme fossoyée se trouve à 500 m au nord-ouest d'une motte  qui   est au hameau de Villevieille. Le logis est profondément remanié au XVIIIe siècle, mais une porte datée 1575 est conservée.","habitants":"Famille de Louis Autier,                                                                    Famille d'Erard de Banson \r\n        \"","divers":"Château de Neuffont et de Banson.","gps":"","images":["../image/image_63/63_Neuffont_1.jpg","../image/image_63/63_Neuffont_2.jpg","../image/image_63/63_Neuffont_3.jpg","../image/image_63/63_Neuffont_4.jpg"]},"Consult_chateau_formulaired9b0":{"id":"Consult_chateau_formulaired9b0","dept":"63","canton":"St-Germain-Lembron","commune":"Nonette","nom":"Nonette","type":"Vestiges","periode":"X-XV","histoire":"NONETTE, l'ancêtre serait Amblard, cité en 947, il est possessionné près de Riom, Brioude, Nonette,  Usson et en Planèze. En 1027,  Amblard II Malhiverné est  seigneur du château. En 1060, la famille éponyme représentée par Armand  est renforcée en 1188 par le Roi Philippe Auguste. Après 1213, le château est rattaché â la terre royale d'Auvergne. En 1241, il fait partie, comme le reste de cette terre, de l'apanage d'Alphonse de Poitiers, frère de Saint-Louis, puis  retourne en 1271 à la couronne,  le château devient le siège d'une prévôté royale, confié à un chevalier et gardé par un guetteur et un portier.  En 1290 le roi Philippe IV le Bel y fait des réparations et rappelle  aux habitant et l'obligation de  faire le guet. En 1358, Charles V, régent   du royaume, donne le château avec  celui d'Auzon, à Thomas de la Marche. Mais en 1360, la donation est révoquée par le roi Jean II le Bon et le château est donné en apanage au duc Jean de Berry. Vers 1371, celui-ci y fait d'importants travaux pour le transformer en l'une de ses résidences. En 1413, il est habité par  Jeanne de Boulogne, belle-mère   du duc de Bourgogne. En 1425, Charles VII   donne à  Jean, duc de Bourbon, le duché d'Auvergne et le château de Nonette. En 1562, le château retourne à la couronne. En 1569. Pierre Fabre est lieutenant de Nonette,  et en 1592, celui-ci résiste à un siège des Ligueurs. En 1629, Jean de La Guesle est gouverneur du château de Nonette. Le château est détruit à la mine sur ordre de Richelieu.","architecture":"Château-fort de Nonette ruiné sur   une butte isolée de la rive droite   de l'Allier, dominant le village.  Reste d'une grande enceinte  à tours cylindriques et au sommet vestiges d'une autre enceinte et de bâtiments. Sur la face nord sont conservées 2 assises de pierres de moyen appareil, sur   environ un tiers de la circonférence   d'un donjon polygonal à contreforts.  A l'est, à l'aplomb du fossé,  subsistent les piédroits de l'entrée du château  en moyen appareil, avec les rainures de la herse. Une défense avancée est séparée du château principal par un fossé.                                              BRAURECUEIL,  Demeure fortifiée au XVe siècle, modifiée depuis sa construction, notamment par le percement de fenêtres à différentes époques. L'édifice conserve du XVe siècle sa masse générale (quadrilatère garni d'une tour circulaire arasées à chaque angle),  la poterne et la galerie en bois de la cour intérieure. Le château est précédé d'une cour fermée, au nord de laquelle  s'élèvent les bâtiments d'exploitation, au sud  les communs précédés  d'une chapelle.  Au XVIIIe siècle, abaissement du niveau des tours et création d'une façade avec perron à l'est.","habitants":"Famille d'Amblard II Malhiverné\r\n        \"","divers":"Vestiges du fort de Nonette sur motte féodale, château de Nonette et de Beaureceuil","gps":"","images":["../image/image_63/63_Nonette_1.jpg","../image/image_63/63_Nonette_2.jpg","../image/image_63/63_Nonette_3.jpg","../image/image_63/63_Nonette_4.jpg","../image/image_63/63_Nonette_5.jpg","../image/image_63/63_Nonette_6.jpg","../image/image_63/63_Nonette_7.jpg","../image/image_63/63_Nonette_8.jpg","../image/image_63/63_Nonette_9.jpg"]},"Consult_chateau_formulairef5a9":{"id":"Consult_chateau_formulairef5a9","dept":"63","canton":"Olliergues","commune":"Olliergues","nom":"Olliergues","type":"Château","periode":"XIII-XV-XVIII","histoire":"Plusieurs châteaux à OLLIERGUES , en  1110 existent deux châtellenies; celle d'Olliergues et celle de Meymont aux mains d'Agne de Meymont.  Hugues Dalmace, seigneur de Couzan en Forez, dispute le château d'Olliergues à Agnon de Meymont mais il finit  par lui abandonner la totalité   de ses droits. En 1352, une charte est accordée aux habitants et en 1357, Jean de  la Tour, seigneur, autorise la construction   d'une enceinte commune. En 1577, pendant les guerres de Religion, le capitaine Merle vient incendier le village avec   une centaine d'hommes, Henri de La Tour, âgé de 22 ans, qui était au château, prend la tête de la résistance   des habitants. Ils arrivent à chasser les envahisseurs, mais un tiers de la ville est  détruit par les flammes. En 1634, la couverture  de la tour carrée s'effondre à l'intérieur de celle-ci. En 1699, Henri Losse est capitaine du château.  château d'Olliergues ayant appartenu aux comtes d'Auvergne, aux la Tour d'Auvergne et vicomtes de Turenne  en 1357 jean de la Tour qui fit construire cinq tours pour renforcer les murailles, vers 1470 Agne IV de la Tour édifia un donjon carré crénelé muni de de 4 poivrières et qui abrite aujourd'hui le musée des métiers et traditions du Pays d'Olliergues, tous sont privés.  Restauré, il abrite le musée des vieux métiers, riche de la tradition artisanale régionale.                                   CHANTELAUZE, le Château de Chantelauze, érigé sur un rocher surplombant le village pittoresque d'Olliergues, vous comblera par son authenticité et ses multiples activités. Chambres d'hôtes. MONTMARIE, dressé au coeur d'une superbe châtaigneraie, est de style néo-renaissance.                                                     BLANCHISSE  à Saint-Gervais sous Meymont,  Imbert de La Blanchisse. En 1622, Mathieu de La  Blanchisse est seigneur des Dagneaux, La Blanchisse, Beauvezeix-Grandval, Lodant et La Satonie en Courptère.   En 1631, à Mathieu de la Blanchisse.","architecture":"Château-fort d'Olliergues du XIIIe siècle sur une butte rocheuse au plus haut de la ville, donjon carré haut d'une quinzaine de  mètres (dérasé de 6 mètres pendant la Révolution) avec un fragment de logis ancien auquel on a accolé un logis reconstruit. Grande enceinte polygonale flanquée (pentagone irrégulier). Du côté de l'attaque, à l'ouest, l'enceinte forme   un éperon encadré  de deux tours cylindriques. L'angle nord est occupé par une grosse tour semi-circulaire, l'angle sud-ouest a été remanié. Le paysage se ponctue aussi de châteaux d'époques différentes.                              le château de Chantelauze date des XVe et XVIIe. Il vous propose chambres d'hôtes, espaces de réception ainsi que des collections à admirer, réservées aux hôtes, tandis que celui de la Montmarie, dressé au coeur d'une superbe châtaigneraie, est de style néo-renaissance.\r\nBlanchisse à l'ouest sur l'autre rives de la Dore à Saint-Gervais sous Meymont manoir,   la tour nord semble le seul vestige du château médiéval datant proba
