nsult_chateau_formulaire54b9-2","nom":"Verrieres","commune":"Verrières","type":"Château","img":"../image/image_63/63_Verrieres_1.jpg"},{"id":"Consult_chateau_formulaire58bb","nom":"Veygoux","commune":"Charbonnières-les-Varennes","type":"Manoir","img":"../image/image_63/63_Veygoux_1.jpg"},{"id":"Consult_chateau_formulaire34a5-2","nom":"Vic_le_Comte","commune":"Vic-le-Comte","type":"Château","img":"../image/image_63/63_Vic_le_Comte_1.jpg"},{"id":"Consult_chateau_formulaire0dea","nom":"Villemont","commune":"Vensat","type":"Vestiges","img":"../image/image_63/63_Villemont_1.jpg"},{"id":"Consult_chateau_formulaire8b5c","nom":"Villeneuve_Lembron","commune":"St-Germain-Lembron","type":"Château","img":"../image/image_63/63_Villeneuve_Lembron_1.jpg"},{"id":"Consult_chateau_formulairee302","nom":"Viverols","commune":"Viverols","type":"Château","img":"../image/image_63/63_Viverols_1.jpg"}];const FULL={"Consult_chateau_formulaireb731":{"id":"Consult_chateau_formulaireb731","dept":"63","canton":"Aigueperse","commune":"Aigueperse","nom":"Aigueperse","type":"Château","periode":"XV","histoire":"AIGUEPERSE, au XIIe siècle  dépendance de la maison de Thiers la seigneurie d'Aigueperse est passée dans celle des Beaujeu, ensuite dans la maison de Dreux. Après 1345 elle passa à Bernard de Ventadour, descendant de Jean de Dreux. Véritable chevalier brigand il voulut imposer sur la ville la taille aux quatre cas.  Comté, puis Duché, étant à Montpensier, les seigneurs n'avaient pas de château dans la ville. Louis Ier de Bourbon le fit construire dans le Près de la chapelle Saint-Louis. En 1486, Gilbert de Bourbon le fit démolir et éleva à sa place une splendide maison. Cette habitation à été  détruite par un incendie en 1574.                      Dans la commune plusieurs châteaux, d'Aubiat (voir article), de Montpensier (voir article) de Montussant, de Bérangers et la villa Lieu-Choisy à Vinsat.","architecture":"Très tôt fortifiée Aigueperse se développa en dehors de ses murailles. De 1396 à 1407 le duc Jean de Berry fit agrandir les fortifications, creuser des fossés où les habitants eurent le droit de pêche et ouvrir de nouvelles portes, celle des Oulles au nord, celles de Saint-Nicolas et de Saint-Quintin avec de l'artillerie à l'est, celle de la Chaussade au sud et celles des Chèvres, de la Prison et des Bufs à l'Ouest. Les portes devenues inutiles et gênant la circulation seront démolies en 1873. Quant à la grande rue une partie était pavée depuis 1439.                                                    Le château d'Aigueperse possédait un très beau parc de 19 ha, appelé aujourd'hui Pré-Monsieur, fut adjugé comme bien national en 1794 à la commune d'Aigueperse qui l'a revendu à divers propriétaires.                                                                           hôtel de ville   beffroi ; porche ; élévation ; toiture   construction   XVII-XVIIIe siècle,  l'édifice actuel fut construit pour servir de monastère aux Ursulines, sur l'emplacement occupé par les ruines de l'ancien collège qui, commencé en 1579, fut détruit pendant les guerres de la Ligue. En 1650, la ville abandonna aux Ursulines l'emplacement et les débris de ce collège, et les autorisa à se servir des matériaux pour la construction du nouvel édifice. En retour, les religieuses s'engagèrent à instruire les jeunes filles de la ville.                                                                                        \r\nCe monastère fut supprimé à la Révolution et converti plus tard en mairie. Vendu en 1792 comme bien national, il fut cédé à la ville par le propriétaire en 1802, l'édifice se compose, sur cour, d'un bâtiment du 17e siècle avec galerie à arcades au rez-de-chaussée et deux étages surmontés d'un comble. Ce bâtiment se retourne aux extrémités par deux amorces d'ailes en retour qui n'ont jamais été achevées. Sur la rue, il présente une ordonnance de la fin du 18e siècle comprenant un portail monumental formant beffroi calé par deux petits bâtiments bas de trois travées et, à chaque extrémité, par deux fontaines. La tour carrée couronnant le portique d'entrée a été construite de 1794 à 1798, ainsi que les deux pavillons qui lui sont annexés. Ornée sur sa façade d'un cadran solaire, cette tour fut bâtie spécialement pour recevoir une horloge destinée à remplacer celle qui se trouvait sur le clocher de l'église.","habitants":"Famille de Bernard de Ventadour\r\n        \"","divers":"Château de Bérangers, de Montlussant et la villa Choisy à vinsat","gps":"","images":["../image/image_63/63_Aigueperse_1.jpg","../image/image_63/63_Aigueperse_2.jpg","../image/image_63/63_Aigueperse_3.jpg"]},"Consult_chateau_formulaire5185":{"id":"Consult_chateau_formulaire5185","dept":"63","canton":"St-Germain-l`Herm","commune":"Aix-la-Fayette","nom":"Aix_la_Fayette","type":"Château","periode":"XV","histoire":"Trois châteaux à AIX la FAYETTE, le château construit sur une ancienne motte castrale serait  le premier fief de la famille Motier de La Fayette. Famille ayant fourni à la France une lignée dofficiers supérieurs  valeureux, dont le plus célèbre est certainement (surtout aux États-Unis), Marie-Joseph-Paul-Yves-Roch-Gilbert du Motier, Marquis de La Fayette  (1757-1834). Toutefois, à l'époque où celui-ci vivait, la famille avait déjà migré depuis plus d'un siècle vers des terres au climat plus clément, à Chavaniac-Lafayette (Haute-Loire) puis à Versailles et à Paris.          FANGONNET, en 1460, fief de Anne du Bourg, châtelain de Châteauneuf du Drac, époux d'Anne de La Mercy, qui en prend possession.  A  partir de 1484 il est notaire, procureur et receveur du mandement de Guérines, pour Charles de Laqueuille. En 1520. Fangonnet appartient   à Etienne du Bourg, contrôleur   général des finances d'Auvergne;  en 1555, il est dit \"seigneur de Guérines\". En 1557,  son fils Claude du Bourg en hérite,  il est seigneur de Guérines et Macholles, conseiller du roi, secrétaire de ses finances, trésorier de France à Lyon. A sa mort en 1586, la demeure passe à son neveu Michel du Bourg, président du présidial de Riom, qui y réside. Après 1600, le château est acheté par Antoinette Fournier de La Brugière, dame de Fangonnet, l'apporte  à Louis Bastier de Meydat.   \r\nBESSIERE, avant 1600, le fief est par héritage à Antoine Moreau châtelain de La Fayette. En 1680, il passe à Antoine   Joseph Morgue, avocat en parlement. En 1773,  le domaine est vendu à Gilbert Motier de La Fayette de Chavagnac.","architecture":"Aix la Fayette, vestige d'un château en ruine, il ne subsiste que des soubassements, sur lesquels fut édifiée une habitation particulière. Le château actuel, quadrilatère à trois niveaux flanqué de tours rondes en angles et donjon carré.  \r\nFangonnet bâti au XIVe siècle  au sud du village sur un rebord dominant le Chomeil, logis de deux niveaux et demi dont les fenêtres ont été repercées et qui conserve des baies-créneaux, reste d'une enceinte quadrangulaire flanquée d'une tour cylindrique arasée et d'un donjon carré  dont il reste quatre niveaux.\r\n Le château de  la Bessière est composé d'un  logis de trois niveaux prenant le jour par des croisées. Il est flanqué à un angle d'une tour circulaire.","habitants":"Famille Motier de La Fayette\r\n        \"","divers":"Vestiges du château d'Aix la fayette, château du Fangonnet et de la Bessière","gps":"","images":["../image/image_63/63_Aix_la_Fayette_1.jpg","../image/image_63/63_Aix_la_Fayette_2.jpg","../image/image_63/63_Aix_la_Fayette_3.jpg"]},"Consult_chateau_formulairea7e6":{"id":"Consult_chateau_formulairea7e6","dept":"63","canton":"Rochefort-Montagne","commune":"Ceyssat","nom":"Allagnat","type":"Château","periode":"XVI","histoire":"ALLAGNAT,  ancien château fort appartenant aux seigneurs de Murat , au XVIIe siècle les de Chabannes, seigneurs de Nébouzat,  puis les Roussel, seigneurs de la Bâtisse. Au XVIIIe siècle   la propriété appartient  aux Jouvenceau, aux  Sieur Champflour d'Allagnat qui le fait passer en 1797 aux Culhat de Chamond, reste dans cette famille jusqu'en 1911.  Cette dernière fait ajouter un avant corps à la partie sud-est, au début du XIXe siècle ainsi que Le jardin d'agrément, à l'est  de la propriété, est refait. Au XXe siècle ce sont les Rochette de Lempdes, et à  madame des Mazis, qui le  possèdent  toujours.","architecture":"Château d'Allagnat,  bâti autour d'une cour, sur les vestiges d'un ancien château fort , dont il reste essentiellement un ancien donjon circulaire, probablement du XIIIe ou du XIVe siècle. Le  pont-levis a disparu. Les bâtiments accolés à cette tour médiévale, à l'ouest de la cour,  abritent aujourd'hui le  logis, datent principalement  du XVIIe siècle. Une  tourelle d'escalier en vis  dessert la partie sud  des bâtiments. Le corps de logis  se situe alors au nord, il a été  incendié  en 1945, après avoir été occupé. Les restes de ce logis sont aujourd'hui des dépendances. Le château a conservé une communication directe avec une tribune privée de l'église voisine.","habitants":"Sieur Champflour d'Allagnat\r\n        \"","divers":"Château d'Allagnat","gps":"","images":["../image/image_63/63_Allagnat_1.jpg","../image/image_63/63_Allagnat_2.jpg","../image/image_63/63_Allagnat_3.jpg","../image/image_63/63_Allagnat_4.jpg","../image/image_63/63_Allagnat_5.jpg"]},"Consult_chateau_formulaireee8b":{"id":"Consult_chateau_formulaireee8b","dept":"63","canton":"Ambert","commune":"Ambert","nom":"Ambert","type":"Château","periode":"XVII","histoire":"AMBERT,  naissance de la commune le 14 novembre 1791 par rattachement à Job de la petite paroisse de la Tour-Goyon. Le premier maire élu ce jour-là fut Annet-Joseph Molin, bourgeois du bourg, important propriétaire terrien.\r\n En 1874  la création de la commune de la Forie par la loi de 1874 se fit surtout au détriment de celle de Job qui céda à la nouvelle collectivité, soit le bourg de la Forie et les hameaux de la Cartonie, Layre, le Pré de Job et le Château.   Pierre Pourrat, sous-préfet , maire , conseiller général  et député d'Ambert, à l'origine de la mairie ronde.","architecture":"Ambert hôtel de ville la mairie ronde, à l'origine halle aux grains, construite en 1816 pour libérer la nef de l'église où se faisait le commerce des céréales depuis la Révolution. En 1823 est décidée une extension verticale de l'édifice, pour héberger certains services (salle du conseil, contributions indirectes).                         \r\nChâteau des Mélèzes à Job du XIXe siècle corps de logis quadrangulaire à trois niveaux et attiques, flanqué de  tours rondes en angles, pavillon arrondie sur façade côté jardin, ce château est transformé en hôtel restaurant.      \r\nL'hôtel de ville présente un plan circulaire, le bâtiment s'appuie sur trois murs concentriques, le plus petit délimitant la halle originale et la grande salle du conseil au-dessus, le second ménageant sanitaires et escalier d'accès à l'étage, le troisième abritant deux niveaux, un large passage à arcades et, au-dessus, les locaux de la mairie.","habitants":"Famille d'Annet Joseph Molin\r\n        \"","divers":"Hôtel de ville château d'Ambert et château des mélézes","gps":"","images":["../image/image_63/63_Ambert_1.jpg","../image/image_63/63_Ambert_2.jpg","../image/image_63/63_Ambert_3.jpg"]},"Consult_chateau_formulaire2d34":{"id":"Consult_chateau_formulaire2d34","dept":"63","canton":"Ardes","commune":"Apchat","nom":"Apchat","type":"Château","periode":"XV-XVIII","histoire":"APCHAT;  château du XV-XVIIIe siècle, le manoir dépendait à l'origine des ducs de Mercoeur .                                                                       Dans la commune le château de Perpezat du XVIIIe siècle,","architecture":"Apchat, bâti au XVe siècle, modifié au XVIIIe, l'édifice se compose de trois corps de bâtiments entourant une cour rectangulaire fermée par  un portail monumental, le premier corps de bâtiment est  un ancien donjon  du XVe siècle à base carrée auquel est accolé un bâtiment plus récent. L'ancien donjon présente un aspect massif et a conservé un contrefort marquant sa destination défensive. A l'angle donnant   sur la cour, se trouve la tourelle d'escalier qui a conservé trois  bretèches à sa partie supérieure. Le troisième bâtiment, formait les anciens communs. Le commun est un édifice caractéristique de la région, petit bâtiment rectangulaire prolongé par un pavillon à base carrée un peu plus élevé. Le porche situé sur le mur reliant le donjon au commun, comportait autrefois deux portes, l'une à gauche pour les piétons, l'autre au centre pour les attelages.                                                                      \r\n Perpezat;  manoir dont le corps de logis rectangulaire à deux niveaux est flanqué de deux pavillons saillants de même niveaux.","habitants":"des ducs de Mercoeur\r\n        \"","divers":"Château d'Apchat et de Perpezat","gps":"","images":["../image/image_63/63_Apchat_1.jpg","../image/image_63/63_Apchat_2.jpg","../image/image_63/63_Apchat_3.jpg","../image/image_63/63_Apchat_4.jpg"]},"Consult_chateau_formulaire19f9":{"id":"Consult_chateau_formulaire19f9","dept":"63","canton":"Ardes-sur-Couzes","commune":"Ardes-sur-Couzes","nom":"Ardes","type":"Château","periode":"XVIII","histoire":"Deux châteaux à ARDES, aux portes du Cézallier se dresse  les vestiges du château qui dominent la ville. Son histoire est liée à celle de la puissante famille des Mercur, les seigneurs de Mercoeur s'implantèrent d'abord à Blesle et dans le Cezalier puis vers 1150 dans la vallée de la Couze d'où naîtra Ardes-sur-Couze. Le comte Guy d'Auvergne y séjourna à plusieurs reprises et c'est en 1209 qu'il rédigea le sinistre acte de  marcher contre les hérétiques. En 1371  en l'église de ce château Anne-Dauphine fille de Béraud II de Mercoeur  épouse Louis II le bon duc de Bourbon.   En 1719 Le duché de Mercoeur entre  dans la maison de Vendôme  est vendu ensuite au marquis de Lassay  et à Louis-Armand de Bourbon  et en 1772 vendu au roi Louis XV qui en fait don au comte d'Artois  qui le réunira au domaine royal.                                 A quelques kilomètres à l'ouest à Mazoires VEZE au lieu-dit Vèze. Maison fortifiée du XIIe siècle citée à partir de 1304, belle ruine composée d'un bâtiment principal, d'un donjon carré, poivrières d'angle, chemin de ronde, dépendances, en 1304,  le château appartient à Guillaume de Vèze, vers 1561, c'est Antoine de Besse qui est seigneur de  Vèze, en 1667, Antoine de Gouzel est sieur de Vèze, en 1674, François de Bouchut, écuyer, sieur d'Apcher, habite le château. En 1769,  la terre de Vèze est vendue à Joseph Guillaume Peydière,  marchand d'Ardes,  qui se  fait appeler Peydière de Vèze.","architecture":"Dominant le bourg et la vallée de Rentières,  Les vestiges du château dominent la ville,« le doigt de Mercur », tour ruinée, vestige du château,  la villes d'Ardes s'entoure  d'une ceinture de créneaux et de tours. Dans le bourg, quelques vestiges d'un autre château, détruit en 1633 sur ordre de Richelieu.\r\n La base de la tour montre une surface peu importante. Ce donjon n'était pas habitable. Les 2 pans de mur formant un angle de la tour sont très intéressants. Ils montrent des parements médiocres et une taille de pierre \"rudimentaire\". Ce château devait être une fortification de garde et non le logis d'un grand seigneur. \r\nDu château dans la ville en forme de U avec trois corps de logis à trois niveaux  flanqués de tours rondes et carrées en angles avec échauguette et donjon crénelé  je n'ai malheureusement pas d'informations.                                                                          Vèze château-fort construit  au XIIIe siècle, à moitié ruiné, situé à 1 km au sud-est du village, donjon quadrangulaire   ruiné et logis avec une poivrière d'angle sur consoles.","habitants":"Louis II le bon duc de Bourbon\r\n        \"","divers":"Vestiges du château d'Ardes dit des Mercoeur, maison forte de Rivière l'évêque, château d'Ardes sur Couzes et maison forte de Véze","gps":"","images":["../image/image_63/63_Ardes_1.jpg","../image/image_63/63_Ardes_2.jpg","../image/image_63/63_Ardes_3.jpg","../image/image_63/63_Ardes_4.jpg","../image/image_63/63_Ardes_5.jpg","../image/image_63/63_Ardes_6.jpg","../image/image_63/63_Ardes_7.jpg"]},"Consult_chateau_formulaire773d":{"id":"Consult_chateau_formulaire773d","dept":"63","canton":"Arlanc","commune":"Arlanc","nom":"Arlanc","type":"Château","periode":"XIV-XVII","histoire":"Plusieurs châteaux à  ARLANC,  château de MONS  Étienne de Vissac, seigneur d'Arlanc et de Vissac, fut chancelier de France. Jacques de Tournon, seigneur d'Arlanc, frère du cardinal de Tournon, fut page de François Ier.  François Vignon, conseiller et secrétaire de la chambre du roi et de la reine mère, lieutenant général au bailliage et mandement d'Arlanc. Au XVII e siècle, la famille Reynard de Mons en devient propriétaire et fait construire en lieu et place de la bâtisse médiévale, le château actuel, sur un moule des villas des Médicis. Camille d'Hostun, maréchal de France, a été baron d'Arlanc. Au XIX e siècle, un marchand de dentelle d'Arlanc, anobli, Bravard de Boiserie, en fait l'acquisition. De nouveau, il lui redonne  son aspect de plaisance. Pour rester dans l'esprit des villas italiennes,  Maurice Faucon (1858-1907).  Aujourd'hui propriété de monsieur Philippe Hugot depuis 2007.         COISSE, En 1398, Etienne de Coisse rend hommage à Antoine de Vissac, seigneur d'Arlanc, pour les biens qu'il  tient de son épouse Andizie, son \"chastel de Monteilhs, appelé Leschrefaut\". Vers 1430, Etienne  seigneur  de Coisse, son fils Jean lui succède  vers 1445. En 1564, Guillaume de Coisse et de Monteil  réside à Montis où il restaure l'édifice ruiné. En 1603, la demeure passe par mariage à Jacques de Fay, seigneur de Lérins et St-Quentin. En 1666, son fils Nicolas de Faye est sieur de Coisse. En 1689, Balthazar de Fay, écuyer, seigneur de Coisse, habite le château. En 1754, les héritiers vendent  la propriété.     Aujourd'hui gite de France par  Fiona et Graham Sheldon.","architecture":"Situé sur les hauteurs dArlanc, entre Ambert et La Chaise-Dieu, le château de MONS, la salle à manger renferme une cheminée en bois surmontée d'un médaillon en terre cuite à l'effigie d'Henri IV.  est une vaste demeure construite au début du XIVe siècle, a été remanié au XVIIe siècle, puis rénové dans le style Viollet-Le-Duc. Il dispose de vastes salles restaurées, de style italien, ou, pour être plus précis, une vaste \"maison de plaisance\", construite au XVIIe siècle à partir dun fort médiéval dont lexistence est attestée en 1300.  en forme de U à deux niveaux et attiques, tour rondes en angles à toits pointus dont une avec créneaux construite au XIVe siècle et refaite au XVIIe siècle dans le style des villas médicis.  Il dispose de vastes salles  en cours de restauration, composé dun hall dentrée  particulièrement majestueux,  avec un escalier monumental  et le plafond de dix mètres de hauteur est orné dune vaste peinture du peintre Italien Dedominicci.  La maison forte  du XV-XXe siècle de Coisse  au hameau de Montis, grande bâtisse de style allongée à trois niveaux  Il subsiste trois tours, l'une  accolée à un logis, une autre prise dans des appentis et une autre du XVe siècle isolée abritant un pigeonnier au  dernier  étage. Le logis a été agrandi d'une maison de maître du XIXe siècle. La cour est close par un portail du XVIIe siècle.","habitants":"Famille de Camille d'Hostun\r\n        \"","divers":"Château de Coisse  et de Mons","gps":"","images":["../image/image_63/63_Arlanc_1.jpg","../image/image_63/63_Arlanc_2.jpg","../image/image_63/63_Arlanc_3.jpg","../image/image_63/63_Arlanc_4.jpg","../image/image_63/63_Arlanc_5.jpg","../image/image_63/63_Arlanc_6.jpg","../image/image_63/63_Arlanc_7.jpg"]},"Consult_chateau_formulaire72a8":{"id":"Consult_chateau_formulaire72a8","dept":"63","canton":"Aigueperse","commune":"Artonne","nom":"Artonne","type":"Château","periode":"XV-XVII","histoire":"Artonne, cette commune possède cinq châteaux, dont celui de la   BEAUME,   le fief de La Beaume a appartenu à la famille Tersac durant  le XVe au  XVIe  siècle,  est une vaste demeure. Il passe ensuite à la famille Begon de La Rouzière durant le XVIe siècle. La famille de La Barbodière le possède durant la première moitié du XVIIe siècle. Jean-François de l'Hospital, arrière petit neveu  du chancelier Michel de l'Hospital, est seigneur de La Beaume  à la fin du XVIIe siècle. Sa fille, Marie-Claire de l'Hospital  le lègue à son filleul, Jean  François Montanier. Cette dernière famille le possédait toujours à la Révolution.                                                             BICON  Le château de Bicon fut le siège du fief de la famille de Marillac à partir de la fin du XVe siècle jusqu'en 1649   où Jeanne de Marillac vend  le fief de Bicon à Antoine Bergier. Son fils mourut sans postérité, laissa Bicon à sa  femme  c'est remariée en 1667 avec Claude Antoine de Rochefort d'Ally. Le fief sera revendu à Annet Foucher, trésorier général de France. Vers 1765, la terre de Bicon passa, par achat, à Pierre-Jacques Mac Grégor Drumonond, capitaine  au régiment écossais. Son épouse possédait toujours  la propriété pendant la Révolution.                                                       GLENAT  le château de Glénat était le fief de la famille d'Aurière.  Cette famille s'est éteinte au milieu du XVIIIe siècle. Thérèse Charrier, veuve d'Amable François d'Aurière vend la propriété à un cousin de son mari, Jean de Servières, seigneur du Teilhot à Saint Priest des Champs. Le domaine  appartenait toujours à cette dernière famille au XIXe siècle.                                   \r\nRONZIERE;   le fief de La Ronzière a appartenu à la famille Begon de la Rouzière au XVIe siècle. Puis il passe par mariage dans la famille de Chavagnac à la fin du XVIe siècle. La famille Arnaud l'achète au début du XVIIIe siècle. Elle le possède  toujours au XIXe siècle. Aujourd'hui chambres d'hôtes.                                      Dans la commune le château des Vergers du XVII-XXe siècle avec pigeonnier.","architecture":"Beaume;  château du XVIe siècle. La partie ouest  est la plus ancienne de la demeure. Elle est composée d'un donjon carré, de la partie du corps de logis où se trouve la cuisine et d'une tour de fortification. Les deux tours  sont équipées d'un piétement ainsi que de  belles canonnières. La porte d'entrée, du XVIIe siècle, est décorée de pilastres soutenant un linteau orné d'un  blason bûché à la Révolution.                                                                                 Bicon, le château  du XVIe siècle  est une très belle gentilhommière avec quelques restes du moyen-âge (rempart, donjon, tours).                                                                           Glenat, du château primitif, du XVIe siècle il reste la tour d'escalier ainsi que la partie nord  du corps de logis, qui est composée  d'une cave voûtée, d'une cuisine voûtée et  de la chambre du maître ouvrant avec sa double fenêtre sur la plaine de la Limagne.                Les Vergers, première  moitié du  XVIIe et au XXe siècle, hôtel restaurant. de style gentilhommière à deux étages.                         Ronzière, l'ensemble a conservé son plan féodal  avec une cour carrée protégée par une porte fortifiée. Les bâtiments qui entourent la cour, sont composés, au nord, d'un corps de logis avec une tour  d'escalier, à l'est, d'une ancienne chapelle dont le toit et la voûte se sont écroulés dans les années 1940, au sud des écuries et d'autres dépendances qui ont perdu leur toitures.","habitants":"Famille de La Barbodière                                                                                Famille de Marillac                                                             Famille d'Aurière \r\n        \"","divers":"Château à Artonne, château de Beaume, de Bicon, de Glenat, les Ronzières et les Vergers","gps":"","images":["../image/image_63/63_Artonne_1.jpg","../image/image_63/63_Artonne_2.jpg","../image/image_63/63_Artonne_3.jpg","../image/image_63/63_Artonne_4.jpg","../image/image_63/63_Artonne_5.jpg","../image/image_63/63_Artonne_6.jpg"]},"Consult_chateau_formulaireb335":{"id":"Consult_chateau_formulaireb335","dept":"63","canton":"Aigueperse","commune":"Aubiat","nom":"Aubiat","type":"Château","periode":"XVI-XVII","histoire":"Cinq châteaux sur la commune d'AUBIAT,  qui était le fief des Lavors du comte de Bonnevie de Pogniat,  remonte au moins au début du XVIe siècle.  Il fut une forteresse stratégique en arrière de la frontière entre l'Auvergne et le Bourbonnais, cependant il ne reste rien de la partie médiévale car il fut reconstruit au XIXe siècle.                                                                      \r\nMONTCLAR a été la propriété des familles d'Allemaigne et de Bayard. La première partie fut vendu au seigneur de Nozerolles.                              MONS, le fief de Mons appartenait depuis la fin du XVe siècle à la famille de ce nom. Ce château fut vendu à la famille Pascal en 1515, et  changea de propriétaire vers 1618 pour appartenir au lieutenant général criminel en la sénéchaussée de Riom, Gilbert Rigaud. Il fut la propriété de Forget, conseiller au présidial de Riom, du général Becker nommé comte de Mons par Napoléon Ier. Enfin, il entra dans le giron de la famille de Bonnevie vers 1890.            PERSIGNAT, en 1250, Humbert de Beaujeu, chevalier, seigneur de Montpensier,   pour Persignat fut la propriété de la famille Chauvigny de Blot qui le vendit en 1720 au seigneur de Montclar Hugues Teilhard,  passa aux de Gilbert II de Bonnevie, du capitaine au régiment de  Chartres François-Charles de Champs et à partir de 1756, à François Charles Dijon, enfin,  à la famille de Gans.             REYNAUDE, en 1635, le château appartient à Blaise d'Allemaigne, écuyer, seigneur de Lafont à Riom. En 1681, sa fille.   Rosalie d'Allemaigne apporte la demeure par mariage à J.-G. de  La Roche-Aymond, baron de La Farge. En 1689, Jacques-Geoffroy de La Roche-Aymond  St-Maixant, âgé de 35 ans, réside à La Raynaude. En 1720 Catherine porte la propriété par mariage à François de  la Come, seigneur de Chaptes. Le domaine est acheté en 1731 par Antoine Joseph de Reclesne, chevalier en 1735, celui-ci demeure au château. \r\nDans la commune le château de MONTCLAVEL. (voir article).","architecture":"Lavors  Il fut une forteresse stratégique en arrière de la fontière entre l'Auvergne et le Bourbonnais, cependant il ne reste rien de la partie médiévale car il fut reconstruit au XIXe siècle.                 Montclar;  aujourd'hui, il ne reste que deux petits bâtiments du XVIIe siècle.    Persignat.  Château du XIVe siècle, tourelle carrée et enceintes.\r\nReynaude;   château du XVIe siècle avec tourelles circulaires et canonnières Il fut démantelé à partir de 1788 par une série de ventes en trois domaines distincts. Aujourd'hui, il ne reste qu'un corps de logis rectangulaire flanqué d'une tour ronde est situé à 9 km au nord du bourg. Il subsiste des restes d'une enceinte  quadrangulaire.  Le logis de 2 niveaux est accolé d'une tourelle cylindrique d'escalier percée d'une canonnière.","habitants":"Famille d'Allemaigne                                                                       Famille Chauvigny de Blot\r\n        \"","divers":"Château d'Aubiat, de Lavors, de Mons,  de Montclar, de Persignat et de la Reynaude","gps":"","images":["../image/image_63/63_Aubiat_1.jpg","../image/image_63/63_Aubiat_2.jpg","../image/image_63/63_Aubiat_3.jpg","../image/image_63/63_Aubiat_4.jpg","../image/image_63/63_Aubiat_5.jpg","../image/image_63/63_Aubiat_6.jpg","../image/image_63/63_Aubiat_7.jpg","../image/image_63/63_Aubiat_8.jpg"]},"Consult_chateau_formulaire1e81":{"id":"Consult_chateau_formulaire1e81","dept":"63","canton":"Aubière","commune":"Aubière","nom":"Aubiere","type":"Château","periode":"XIII-XV","histoire":"AUBIERE, en 1235, le château est tenu par les Comptour d'Apchon en fief des Dauphins d'Auvergne, en arrière fief de l'évêque. En 1257, les Comptour jurent fidélité à l'évêque. En 1263, le château passe par mariage aux Dalmas qui  en  font hommage aux comtes d'Auvergne, mais il reste la propriété de l'évêque. En 1306, Bernard Dalmas refuse l'hommage au dauphin pour ne reconnaître que celui de l'évêque. Mais en 1315, il est obligé de céder, il reconnait alors tenir le château et la ville à l'intérieur des remparts du dauphin et les terres à l'extérieur de l'évêque de Clermont. En 1390, Louis Dalmas, seigneur d'Aubière, est  chambellan de Louis de Bourbon, bailli du Dauphiné d'Auvergne et du Comté de Clermont. En 1488, la seigneurie passe par mariage aux Montmorin, puis en 1542 aux Jarrie, et en 1588 aux La  Rochebriant.","architecture":"La mairie d'Aubière  occupe un édifice du XV-XVIIIe siècle sur l'emplacement d'un corps de logis du XVe siècle. Une tour ronde de  l'enceinte est adossée à un étroit logis qui est  couronné sur l'une de ses façades dont reste des mâchicoulis. Un côté  étroit est pourvu d'une bretèche-latrines avec meurtrière. Cette porte était lune des trois portes de lenceinte moyenâgeuse dAubière, avec la porte de la Quaire au nord et la porte des Ramacles au sud.","habitants":"Famille de Bernard Dalmas \r\n        \"","divers":"Château d'Aubière","gps":"","images":["../image/image_63/63_Aubiere_1.jpg","../image/image_63/63_Aubiere_2.jpg"]},"Consult_chateau_formulaire4aed":{"id":"Consult_chateau_formulaire4aed","dept":"63","canton":"Augnat","commune":"Augnat","nom":"Augnat","type":"Château","periode":"XIV-XVII","histoire":"Trois châteaux à AUGNAT, Les seigneurs d'Augnat sont assez mal connus. Au XIVe siècle, on trouve une famille portant le nom du village, puis au XVe siècle, les de Pons qui rendaient hommage au duc de Bourbon, seigneur de Mercoeur. Ensuite Augnat dut être réuni à Mercoeur car au XVIIIe siècle, son seigneur était le même, c'est-à-dire le prince de Conti. Les Templiers possédèrent des biens dans la paroisse.                                                             LETZ,  le hameau du Letz formait une seigneurie distincte qui, depuis le XVIe siècle, appartenait à la famille de Chany. A la fin du XVIIe siècle elle fut vendue à Joseph Morin, bourgeois d'Ardes, elle resta dans sa descendance jusqu'en 1789.                            \r\nA Augnat, ancienne maison-forte remontant sans doute au XVe-XVIe  siècle, comme en témoignent les quatre tours qui la cantonnent, transformée au XVIIIe et au début du XIXe siècle pour en faire une demeure rurale. \r\nMARGE. Manoir,en 1590,Gabriel d'Aurelle, écuyer, capitaine de Mercoeur, est seigneur de La Marge. En 1674, Robert d'Aurelle âgé de 75 ans, est seigneur de La Marge  y habite. Après 1700, le manoir est acquis par les Rodde, bourgeois  d'Ardes-sur-Couze.","architecture":"Le château  de Letz actuel, édifié au XVe siècle sur une terrasse, se compose de trois corps de bâtiments entourant une cour rectangulaire, le  corps de logis,  un  commun au sud, un bâtiment contenant l'ancienne chapelle. Ce château est un très bon  représentant de l'architecture auvergnate traditionnelle.               Le manoir de Marge bâti au XVIe siècle est situé à 1 km au sud-est du bourg, enceinte quadrangulaire avec échauguettes circulaires d'angle, côté cour, le logis est accosté  d'une haute tourelle ronde d'escalier, au rez de chaussée,  le logis est percé,  vers l'extérieur.","habitants":"Seigneur de Mercoeur.                                                                        Famille de Chany\r\n        \"","divers":"Château d'Augnat, de Letz et de Marge","gps":"","images":["../image/image_63/63_Augnat_1.jpg","../image/image_63/63_Augnat_2.jpg","../image/image_63/63_Augnat_3.jpg","../image/image_63/63_Augnat_4.jpg","../image/image_63/63_Augnat_5.jpg","../image/image_63/63_Augnat_6.jpg"]},"Consult_chateau_formulaire9714":{"id":"Consult_chateau_formulaire9714","dept":"63","canton":"Issoire","commune":"Aulhat-St-Privat","nom":"Aulhat","type":"Château","periode":"XIV_XV","histoire":"Trois châteaux à Aulhat st-Privat,  le château de la Suchère, en partie détruit, le château de Péchot (XIVe-XVIIIe siècles) et le château d'Aulhat, avec sa cour d'honneur et son architecture classique (XVIIe-XVIIIe siècles).                                                PECHOT, du XIVe siècle remanié au XVIIIe siècle,   Guillaume de Peuchot seigneur du lieu au début du XVe siècle, puis par succession le château passe dans la famille de la Reynerie dans les années 1600 et ensuite aux Montboissier Beaufort Canillac,   cest à cette époque que des travaux importants, visibles aujourdhui, ont permis de le remettre en état, il passe  ensuite  à la famille de Douhet, puis de Colombette, et enfin aux de Lastic (famille dont une branche est toujours à Parentignat) Le château fut vendus par Philibert de Lastic à Mr Robert, il a servi de résidence épisodiquement,  il est certain quil na plus était habité par ses propriétaires à partir de 1750 jusquà son achat par l'aïeul des propriétaires actuels qui le transforma en ferme et habitation.   Depuis 1977, la famille Chanal ont entrepris d'importantes restaurations qu'ils mènent en fonction de leurs possibilités, la plus voyante est la couverture toiture et charpente des trois tours qui avaient été arasées. Le château d'Aulhat, avec sa cour d'honneur et son architecture classique (XVIIe-XVIIIe siècles).                                SUCHERES en partie détruit En 1395 le damoiseau Pierre d'Aubeyrat époux de Sibille de Montclar, est seigneur. En 1450, le château est   à son fils Robert, mentionné dans l'armorial de Guillaume Revel. Vers 1506, Antoine d'Aubeyrat rend hommage à l'évêque de Clermont pour le fief. En 1569,  le contrat de mariage de Jacqueline d'Aubeyrat, fille de François, et de Jean de Monteynard, est passé au château de la Suchère. En 1581, Annet d'Aubeyrat, écuyer, épouse Gilberte de  La Mer de Matha ; en 1616, elle est veuve et réside à La Suchère. En 1624, il passe par mariage aux Cordebeuf, aux  Beauverger et aux Montgon. En 1669 et 1683, Charles-Alexandre de Beauverger, Comte de Montgon, rend   hommage au  roi pour le fief.","architecture":"Château féodal  de Péchot datant du XIIe siècle probablement mais on ne sait pas pour quel seigneur et pour quelle raison il fut construit à cet endroit. Le château est un quadrilatère composé de trois ailes et dune muraille, flanqué de quatre tours dangles, et du fait de son implantation, il dispose de deux cadrans solaires pour indiquer lheure toute la journée. Il ny a jamais eu de douves car le socle rocheux ne le permettait   pas et on peut se demander si son usage le nécessitait,  une citerne deau  alimentée par des drainages est située dans  la cour intérieure avec un  puits. Un escalier colimaçon a été accolé à la tour donjon postérieurement, la porte daccès à cette tour est  remarquable. Avant 1600 lentrée était sur une autre aile, des corbeaux sous le toit indiquent quil devait y avoir  un plan incliné relevable, une peinture murale dans une maison de Sauxillanges représente Péchot avec cette entrée. Le grand portail à été ouvert dans la muraille par l'aïeul des propriétaires actuels en 1906, lautre entrée en passage voûté semble dater du XVIIe siècle. La demeure domine la vallée de l'Ailloux depuis le  Moyen  Age.                                                    Château Suchères construit au XIVe siècle sur un sommet,  grande enceinte quadrangulaire à gros flanquements circulaires d'angle,  tallutés et percés d'archères et canonnières, il en reste trois dont l'un est crépi. Une basse-cour est accolée sur la pente, elle a 75 m de côté et conserve deux tours rondes aux angles.","habitants":"Famille de Guillaume de Peuchot                                            \r\nFamille de Pierre d'Aubeyrat\r\n        \"","divers":"Château de Péchot et de Surchères","gps":"","images":["../image/image_63/63_Aulhat_1.jpg","../image/image_63/63_Aulhat_2.jpg","../image/image_63/63_Aulhat_3.jpg","../image/image_63/63_Aulhat_4.jpg","../image/image_63/63_Aulhat_5.jpg","../image/image_63/63_Aulhat_6.jpg","../image/image_63/63_Aulhat_7.jpg"]},"Consult_chateau_formulaire3de5":{"id":"Consult_chateau_formulaire3de5","dept":"63","canton":"Courpière","commune":"Sermentizon","nom":"Aulteribe","type":"Château","periode":"XV-XIX","histoire":"AULTERIBE, forteresse  cité en 1261,les premiers  propriétaires de l'époque les d'Harcourt, puis  à la famille d'Odon de Chaulet, le fief changera de mains successivement par alliances de Catherine Chaulet qui  le fit passer par son mariage  en 1450 à Charles Mottier seigneur de la Fayette et de Pontgibaud, succédait en 1486 par Jean de Montboissier seigneur d'Aubusson et de Boissonnelle, puis à ses descendants, les Beaufort-Montboissier Canillac qui conserveront de fief jusqu'en 1662, qui passera ensuite par alliance de Anne Gabrielle de Beaufort-Montboissier qui épousa  Antoine de Montagu, leur fils Joachim de Montagu, maréchal de camp, lieutenant général pour le roi en Basse Auvergne, vendit en 1775 Aulteribe  au marquis Jacques de Pierre de Bernis. Son petit-fils Joseph héritier épousa en 1833 Henriette Onslow, fille du célèbre compositeur, il sera député du Puy de Dôme de 1852 à 1863 et fut un agronome remarquable. Le dernier marquis de Pierre, décédé sans enfant en 1954, léguera son château et son mobilier à la caisse nationale des monuments historiques depuis 1960 , il constitue la fondation Onslow de Pierre. De nombreux souvenir du compositeur Georges Onslow et de sa famille sont conservés dans le château.","architecture":"Aulteribe Bâti à la fin du Moyen-Age, il fut remanié et restauré dans la deuxième moitié du XIXe siècle, situé sur un petit promontoire au-dessus dun ravin, il surveille un point de passage obligé emprunté par la voie romaine, modeste maison forte,  reste en dehors des grands épisodes militaires de la province. La construction actuelle résulte de remaniements réalisés, à partir dun noyau du XIV-XVe siècles, aux XVII et XIXe siècles, ces derniers lui ayant conféré ses aspects néo-gothiques. Restauré avec beaucoup de soins.  Quatre tours  cantonnent le quadrilatère et une grosse tour cylindrique occupe le centre de la façade ouest, parapets crénelés et échauguettes mâchicoulis et bretèches complètent le système de défense.","habitants":"Marquis Jacques de Pierre de Bernis                                                   Compositeur Georges Onslow\r\n        \"","divers":"Château d'Aulteribe","gps":"","images":["../image/image_63/63_Aulteribe_1.jpg","../image/image_63/63_Aulteribe_2.jpg","../image/image_63/63_Aulteribe_3.jpg","../image/image_63/63_Aulteribe_4.jpg","../image/image_63/63_Aulteribe_5.jpg","../image/image_63/63_Aulteribe_6.jpg","../image/image_63/63_Aulteribe_7.jpg"]},"Consult_chateau_formulaire70ac":{"id":"Consult_chateau_formulaire70ac","dept":"63","canton":"St-Germain-Lembron","commune":"Villeneuve","nom":"Aureilhe","type":"Forteresse","periode":"XV","histoire":"AUREILHE, Villeneuve apparaît dans les textes aux XIe, et XIIe siècles, on trouve la trace de chevaliers ( Astorg de Villeneuve 1303, Jean de Villeneuve fin XIVe) sur lesquels nous n'avons que peu de renseignement et aucune  certitude quant à leur lieu de résidence. La famille d'Aureilhe apparaît à Villeneuve au début du XVe siècle, Jean d'Aureilhe (écuyer) épouse Isabeau de Chavagnac en 1397  et obtient le droit de fortifier en 1435. Puis son fils Pierre lui succède, il épousera en 1446 Dauphine d'Aurelle de Colombine comme en témoigne l'écu éclaté de la cheminée de l'hôtel. Puis c'est Rigaud baron en 1501 qui, après avoir habité l'hôtel et contribué à son évolution.","architecture":"Villeneuve Lembron abrite un autre château dit le « vieux château »,  l'origine de ce château semble remonter à 1435 et l'autorisation donnée à Jean puis Beraud d'Aureilhe de construire et de renforcer le bâtiment. Cet édifice ne convenant plus à Rigaud d'Aureilhe, il édifia un autre château dans le dernier quart du XVe siècle, la tour carrée serait plus ancienne et remonterait à la fin du XIIe siècle. Elle aurait eu pour fonction principale d'être tour de guet.     Château d'Aureilhe forteresse dont reste deux tours carrées intercalées d'un corps de logis à trois niveaux à fenêtres à meneaux asymétriques de la face nord, terminera  avec la période féodale en déménageant après avoir construit à la fin  du XVe siècle le château renaissance.","habitants":"Jean de Villeneuve\r\n        \"","divers":"Château d'Aureilhe à Villeneuve Lembron","gps":"","images":["../image/image_63/63_Aureilhe_1.jpg","../image/image_63/63_Aureilhe_2.jpg","../image/image_63/63_Aureilhe_3.jpg","../image/image_63/63_Aureilhe_4.jpg","../image/image_63/63_Aureilhe_5.jpg","../image/image_63/63_Aureilhe_6.jpg","../image/image_63/63_Aureilhe_7.jpg"]},"Consult_chateau_formulaire339b":{"id":"Consult_chateau_formulaire339b","dept":"63","canton":"Veyre-Monton","commune":"Authezat","nom":"Authezat","type":"Château","periode":"XVIII","histoire":"Deux châteaux à AUTHEZAT, au début du  XIVe siècle fief des aux Bussières, seigneurs de Châlus. passe ensuite à la seigneurie  d'Authezat et Châlus  qui  ne forment plus qu'un seul fief. Jean de Pierrevive, médecin du Roi, est seigneur d'Authezat en 1486. Vers 1570,  le baron Antoine de Sarlant achète le château et la seigneurie du baron de Cordès. En 1584,  à la mort d'Artoine II de Sarlant la seigneurie passe à sa fille Claudia, dame de Buron et d'Authezat, marié avec  Jacques d'Oradour depuis 1557. En 1588, Jacques d'Oradour, chevalier, seigneur et baron de Buron, Sarlant, Saint Gervazy et Authezat, épouse Magdelaine du Bast. En 1772, Antoine d'Oradour, chevalier, comte d'Authezat, vend à  son cousin Charles-François d'Oradour, seigneur de St-Gervazy et Sarlant, les seigneuries et châteaux d'Authezat, la Vernède et Lambre. En 1778, après la mort  d'Antoine d'Oradour, Magdelaine  de La Rochemonteix de Nastrac,   épouse de Joseph de Bouillé, seigneur du Tronsey, en 1796, le château est vendu comme bien national.  \r\nCHADIEU;  au XIIIe siècle fief de  la famille de Bussières, en 1577   Amblard de Chadieu lieutenant de Catherine de Médicis, puis vendu en 1627 aux Beaufort Canillac, passe ensuite  en 1689 aux de Tana qui le garderont jusqu'en 1788, racheté  avant d'émigré en 1791 par Joseph de la Rochelambert et le revend  la même année à Antoine Sauzay banquier, le revend à monsieur Wallier citoyen suisse et au baron de Batz, en 1836 la veuve du baron revend le domaine à Alfred-André d'Arbelle qui par alliance passera au marquis de Biliotti son héritier et Jean Théodat qui le revend en 1986 par le syndicat  de Chandieu.","architecture":"Authezat, quadrilatère flanqué de tours rondes toiture à bulbe et carré(donjon) corps de logis rectangulaire à trois niveaux   les tours sur l'arrière sont arasées.                                                                                Chandieu du XVe et XIXe siècle avec enceinte quadrangulaire, pavillons carrées sur angles et pavillon central   à toits pointus,  corps de logis sur côté gauche  à deux niveaux et attiques flanqués  d'échauguettes sur les angles.","habitants":"Famille d'Antoine d'Oradour                                                   Amblard de Chadieu \r\n        \"","divers":"Château d'Authezat et Chandieu","gps":"","images":["../image/image_63/63_Authezat_1.jpg","../image/image_63/63_Authezat_2.jpg","../image/image_63/63_Authezat_3.jpg","../image/image_63/63_Authezat_4.jpg","../image/image_63/63_Authezat_5.jpg","../image/image_63/63_Authezat_6.jpg","../image/image_63/63_Authezat_7.jpg","../image/image_63/63_Authezat_8.jpg"]},"Consult_chateau_formulaire0516":{"id":"Consult_chateau_formulaire0516","dept":"63","canton":"Besse-et-St-Anastaise","commune":"Besse-et-St-Anastaise","nom":"Bailly_Besse_Chandesse","type":"Château","periode":"XV","histoire":"BESSE  en 1208,  est une ville libre administrée par 2 Consuls élus par les le bourgeois. Au XVe siècle, l'insécurité et les pillages engendrent la construction de fortifications. En 1790, avec le vent de modernité révolutionnaire, les fortifications sont détruites. Ce bourg est plus une cité touristique et vacancière qu'un site médiéval. \r\nChâteau du BAILLI, à Besse  Saint-Anastasie.  en  1270, Bernard VII de la Tour accorde le statut de ville libre à la ville de Besse. La ville devient une place commerciale qui se renforcera au cours des siècles.                                                                              \r\nGrotte de JONAS dit le château  à Saint-Pierre Colamine,  seigneur de ces lieux, Dalmas de Jaunac  dont le nom s'altéra en Jonas, chevalier de l'ordre de Saint-Jean de Jérusalem, en fit don en 1306 à un monastère de Clermont tout en continuant à y habiter. Quelques années plus tard, une forteresse fut taillée dans la roche (un tuf volcanique friable) avec une salle pour une bombarde, une salle d'armes, un escalier à vis de sept étages et des écuries.","architecture":"La ville de Besse fut fortifiée, il reste quelques morceaux de remparts ainsi que le château du Bailli, cet édifice était la résidence du juge-châtelain, bailli, représentant le seigneur suzerain. Le mur nord et la tour en saillie à son extrémité ouest, appartenaient  aux remparts que les habitants eurent permission d'élever en 1406 et 1417,  du XVe siècle la maison des Consuls ; le manoir Sainte-Marie des Remparts,  la porte de la ville et la tour du Beffroi.\r\nLa maison dite du bailli possédait un mur-nord et une tour en saillie à l'ouest intégrés aux remparts de la cité et elle constituait un élément essentiel dans la défense de la ville. Elle a conservé ses mâchicoulis et une tourelle d'angle, qui faisait certainement office de prison. De l'ancien château ne subsiste plus qu'un corps de logis qui était appuyé au rempart et perpendiculaire à celui-ci,  c'est un bâtiment du début du XVe siècle dont il reste la masse principale avec une tour, le pignon sur le rempart avec des restes de mâchicoulis et d'échauguette et une façade latérale.  Le bâtiment présente, au sud, une façade entièrement refaite au XIXe siècle. La façade la plus intéressante et la  mieux conservée est celle qui s'ouvre au nord, dans l'alignement des anciens remparts.   \r\nFlanquée de six tours et entourée de larges fossés, l'enceinte ouvrait par une poterne et trois portes. Une partie des remparts en rénovation se trouvent près de l'église de Besse.                                   Les grottes de Jonas troglodyte dit le château.","habitants":"Bernard VII de la Tour\r\n        \"","divers":"Château de Besse à st-Anastasie, la maison  du Bailly et les grottes de Jaunas","gps":"","images":["../image/image_63/63_Bailly_Besse_Chandesse_1.jpg","../image/image_63/63_Bailly_Besse_Chandesse_2.jpg","../image/image_63/63_Bailly_Besse_Chandesse_3.jpg","../image/image_63/63_Bailly_Besse_Chandesse_4.jpg","../image/image_63/63_Bailly_Besse_Chandesse_5.jpg","../image/image_63/63_Bailly_Besse_Chandesse_6.jpg","../image/image_63/63_Bailly_Besse_Chandesse_7.jpg","../image/image_63/63_Bailly_Besse_Chandesse_8.jpg"]},"Consult_chateau_formulairef8fc":{"id":"Consult_chateau_formulairef8fc","dept":"63","canton":"Sauxillanges","commune":"Bansat","nom":"Bansat","type":"Château","periode":"","histoire":"BANSAT, la seigneurie appartenait au XVIIe siècle à Antoine Ribeyre. Par le mariage de sa fille, en 1653, elle devient la propriété de Pierre Cisternes.\r\nÀ Bansat existaient deux confréries, celle de Sainte-Foy et celle du Saint-Sacrement.\r\nPRIAS, en 1559, Louis de La Salle est seigneur de La Prias. En 1594, le fief passe par mariage à François de Pélacot, seigneur de La Rousse. En 1666, 1674 et 1689, Isaac de Pélacot, écuyer, est seigneur de La Prias et habite le Château. Mais en 1689, Gabriel de Montservier  est aussi seigneur de Montservier et de La Prias en Bansat. En 1861, le château passe par le mariage d'Elisabeth-Louise Charlotte de Pélacot au comte d'Arcy, de Normandie. \r\nCHASSAGNE en 1539, Jean de Bar, chevalier, est seigneur de Vazeilles et de La Chassagne. En 1564, sa fille Marguerite  l'apporte par mariage à Jacques Autier, chevalier, seigneur de Chateauneuf et de Villemonteix. En 1602, Jean de  Villemonteix est qualifié de seigneur de La Chassagne.","architecture":"Le château de Bansat  fait partie des villages fortifiés qui ont été construits le long de la vallée vigneronne de l'Allier. La partie ancienne du village forme un quadrilatère entourant l'église fortifiée Saint-Julien auquel on accède par un porche. L'ancien château a un plan en L qui possède encore trois tours sur le côté nord. Ces fortifications ont été construites pour assurer la défense du village pendant la Guerre de Cent Ans (1337-1453).                                Le château  de Prias situé  à 1,2 km au nord-ouest du bourg, par la D-24, est composé d'un logis de 3 niveaux accosté d'une haute tour circulaire d'escalier. Reste d'enceinte avec un flanquement carré.                                                                                  Chassagne, château construit au XIVe siècle, est situé à trois km à l'est du bourg. D'une enceinte quadrangulaire,  il reste un flanquement circulaire d'angle. Le grand logis semble être un donjon-logis de trois niveaux et un niveau de baies-créneaux.","habitants":"Famille de Pierre Cisternes                                                                 Famille de Jean de  Villemonteix \r\n        \"","divers":"Château de Bansat, de Prias et de Chassagne","gps":"","images":["../image/image_63/63_Bansat_1.jpg","../image/image_63/63_Bansat_2.jpg","../image/image_63/63_Bansat_3.jpg","../image/image_63/63_Bansat_4.jpg","../image/image_63/63_Bansat_5.jpg","../image/image_63/63_Bansat_6.jpg"]},"Consult_chateau_formulaire5bb5":{"id":"Consult_chateau_formulaire5bb5","dept":"63","canton":"Thiers","commune":"Dorat","nom":"Barante","type":"Château","periode":"XVII","histoire":"BARANTE,  terre acquise en 1627 par Antoine Brugière, marchand de Thiers, qui prend également le nom de Barante. Ses descendants qui reçurent le titre de baron sous le 1er Empire  conserveront la propriété jusquà nos jours. A la suite d'un incendie, la demeure fut reconstruite en 1843. L'édifice  a appartenu à Prosper de Barante, écrivain, historien, académicien, préfet de Vendée puis ambassadeur de France  en Sardaigne et à Saint-Pétersbourg, nommé Pair de France par Louis XVIII.","architecture":"Le château de Barante a été bâti au XVIIe siècle  surplombant la vallée, la propriété possède un magnifique parc d'une centaine d'hectares et offre une très belle  vue sur la chaîne des Puys. Dans le parc se trouve une belle chapelle néo-romane, dessinée et conçue par Prosper Mérimée alors inspecteur des monuments historiques. Lédifice à 2 niveaux et attiques, en forme de U  flanqué aux angles de tours polygonales en façade qui cette dernière est surmontés dun comble brisé  à mansardes.","habitants":"Famille d'Antoine Brugière,\r\n        \"","divers":"Château de Barante","gps":"","images":["../image/image_63/63_Barante_1.jpg","../image/image_63/63_Barante_2.jpg"]},"Consult_chateau_formulaireeeb4":{"id":"Consult_chateau_formulaireeeb4","dept":"63","canton":"Courpière","commune":"Courpière","nom":"Barge_Sauviat","type":"Château","periode":"XII-XVI","histoire":"BARGE, fief cité en 1257 Guy de la Barge comte du Forez rend hommage à l'évêque de Clermont pour ce fief tenu par l'un de ses vassaux  Etienne de Thiers, sire de Vallore, le domaine passe à Fayditt III de la Barge jusqu'en 1700 dont le dernier de cette famille  Christophe-François de la Barge sans descendant le transmet à sa soeur mariée avec Charles-Alexandre de Coreboeuf de Beauverger-Montgon, puis par alliance en 1745 aux de Montmorin. Gaspard-Marc de Montmorin Gouverneur de l'Auvergne, naquit dans cette famille en 1768 Pauline  de Montmorin future comtesse de Beaumont l'amie de Châteaubriand, cette famille fit aménager l'extérieur, vaste jardin-potager ornemental jusqu'en 1784 date à laquelle Armand-Marc de Montmorin ministre des affaires étrangères de Louis XVI en 1787, cède le domaine à l'un de ses cousins le marquis de Montmorin Saint-Hérem branche aînée des Montmorin, à l'extinction  des de Montmorin, la fille du châtelain de la Barge Louise-Françoise-Nicole épouse  Jean d'Aurelle des Cornets, toujours dans la famille des Cornets-Montmorin Saint-Hérem. Proche de la commune de Courpierre à Sauviat château.","architecture":"Barge, château date de 1190  qui à l'origine simple maison forte implanté sur une rive de la Dore, édifice féodal remanié à la Renaissance,  entouré par des douves et un quadrilatère flanqué de tours cylindriques,  d'élégantes poivrières coiffent les tours et une colonnade ionique soutient un balcon à balustres qui conduisent à une jolie chapelle ou se trouvent, à l'intérieur, de très beaux vitraux qui datent du XVIe siècle, et entouré au XVIIIe siècle de magnifiques jardins en terrasses. Dans l'axe du château  se trouve dans le prolongement d' une terrasse. Celle-ci a permis la création d'un jardin-potager ornemental, dans le style des jardins créés par Le Nôtre. C'est l'une des réalisations les plus réussies d'un projet du parc exprimé sur des plans et lettres retrouvés.              \r\n Sauviat, château du XVe siècle avec tour ronde crénelée.","habitants":"Famille de Guy de la Barge\r\n        \"","divers":"Château de la Barge et de Sauviat","gps":"","images":["../image/image_63/63_Barge_Sauviat_1.jpg","../image/image_63/63_Barge_Sauviat_2.jpg","../image/image_63/63_Barge_Sauviat_3.jpg","../image/image_63/63_Barge_Sauviat_4.jpg","../image/image_63/63_Barge_Sauviat_5.jpg","../image/image_63/63_Barge_Sauviat_6.jpg","../image/image_63/63_Barge_Sauviat_7.jpg","../image/image_63/63_Barge_Sauviat_8.jpg","../image/image_63/63_Barge_Sauviat_9.jpg"]},"Consult_chateau_formulaire7ce7":{"id":"Consult_chateau_formulaire7ce7","dept":"63","canton":"Chanonat","commune":"Chanonat","nom":"Batisse_la","type":"Château","periode":"XV","histoire":"La BATISSE,   au XIIe siècle fief  appartient à la seigneurie de Chanonat, qui dut passer  du comté d'Auvergne  aux dauphins d'Auvergne et aux la Tour d'Auvergne.  Entre le XIVe et XVe siècle  les d'Aultier de Villemonteix également tenanciers du fief de Châteauneuf, passera par alliance en 1550 à la famille de la Volpillière qui en 1569 Pierre de la Volpillière se suicida, une nièce hérita Renée de Marsay qui vendit  le domaine en 1622 par Claude Roussel  trésorier royal de Clermont,  racheté en 1697 par Jean Girard  qui prendra le nom de Jean-Girard de Chasteauneuf  conseiller à la cour, qui fit appel  à l'école d'André le Nôtre basé à Clermont-Ferrand qui décédera en 1700, sur les conseils de ce dernier aménagera parc et jardins, le château passera la Révolution sans problème, et restera dans cette famille jusqu'en 1961 passera par héritage  au général  d'Arnoux de Maison-Rouge, vieille famille de magistrat, connue à Riom depuis le XVIIe siècle.","architecture":"L'actuel château de La Bâtisse nichée au fond de son vallon,  cité au Xe siècle par une tour de garde a été construit en étapes successives, indépendantes les unes des autres. Chaque siècle a apporté sa partie de bâtiments supplémentaires. Au XIVe siècle construction d'une maison forte avec édification des trois autres tours réunies. Au XIVe siècle, trois autres tours furent adjointes à la première puis réunies par des corps de bâtiment, au XVe siècle par les corps de logis et coiffées, au XVIIe siècle par les fameuses calottes à lanternons dont l'une d'elle est surmonté d'une girouette portant ses armoiries. qui font le charme de la toiture se transforma en un quadrilatère flanqué de quatre tours rondes  dont deux subsistent aujourd'hui, constituant un véritable château-fort, avec sa cour d'honneur et son bayle.  En raison de sa situation au cur de la vallée, les défenses de cette maison forte pouvaient tout au plus prévenir des attaques éventuelles mais sûrement pas tenir un siège face à un ennemi organisé, rôle dévolu aux forteresses de hauteur, de fondations féodales. Les mâchicoulis et les créneaux des trois tours restantes furent également détruits, le pont-levis sera détruit au XVIIe siècle.","habitants":"Famille de la Volpillière \r\n        \"","divers":"Château de la Bâtisse","gps":"","images":["../image/image_63/63_Batisse_la_1.jpg","../image/image_63/63_Batisse_la_2.jpg","../image/image_63/63_Batisse_la_3.jpg","../image/image_63/63_Batisse_la_4.jpg","../image/image_63/63_Batisse_la_5.jpg","../image/image_63/63_Batisse_la_6.jpg"]},"Consult_chateau_formulairee238":{"id":"Consult_chateau_formulairee238","dept":"63","canton":"Menat","commune":"St-Quintin-sur-Sioule","nom":"Beaudeduit","type":"Château","periode":"XV","histoire":"BEAUDEDUIT, vers 1420, Jean de Girard, écuyer, est seigneur de Beaudéduit. En 1493, Antoine de Beaufort,  seigneur de  Beaudéduit. En 1576, Catherine du Buisson, fille d'Antoine du Buisson,  seigneur  de Beaudéduit   et lieutenant   général de la châtellenie   de Chantelle, porte le château par  alliance  à Loys de Basmaison. En 1690, Jean de Chauvigny de Blot, seigneur   du Vivier, achète le château et   ses dépendances. Après 1730, l'ensemble est  acheté par Antoine Rabusson.                                Le fief de Saint-Quintin est à Roger de Saint-Quentin, chevalier, qui en rend hommage vers 1250 à Alphonse de Poitiers. Il restera dans la même famille jusquau début du XVIe siècle où il est vendu à Maximilien de La Mer. Sans doute vers 1740 les de Saint-Quentin rachetèrent la terre.","architecture":"Saint-Quintin, le château a conservé son caractère médiéval,  les autres époques étant surtout marquées dans les percements. A l'intérieur, un ensemble de peintures serait l'oeuvre du peintre Moillon  et aurait été exécuté vers 1653. également, cheminées gothiques. Edifié au XIIIe ou XIVe siècle, le château illustre les styles qui se sont succéder jusqu'au XVIIe siècle.  Enceinte quadrangulaire à flanquements circulaires d'angle, il en reste deux accolés à un logis remanié. L'édifice se compose d'un corps de logis principal encadré d'un pavillon rectangulaire au nord et d'une tour ronde au  sud. Dans cette tour s'imbrique l'aile sud qui fait retour vers l'ouest. Prolongeant le pavillon et décrochée par rapport   à celui-ci, l'aile nord dessine une forte avancée vers l'ouest. Dans l'angle de l'aile nord et du corps de logis s'élève la tour de l'escalier que flanque une sorte de redan.","habitants":"Famille d'Antoine du Buisson,\r\n        \"","divers":"Château de Beaudeduit","gps":"","images":["../image/image_63/63_Beaudeduit_1.jpg","../image/image_63/63_Beaudeduit_2.jpg","../image/image_63/63_Beaudeduit_3.jpg"]},"Consult_chateau_formulaireb9da":{"id":"Consult_chateau_formulaireb9da","dept":"63","canton":"St-Germain-Lembron","commune":"Beaulieu","nom":"Beaulieu_Roche","type":"Château","periode":"Xv-XVI","histoire":"BEAULIEU, en 1277, propriété du fief du chevalier Amaury de Saint-Clerc qui l'échange avec Robert de Courcelles. En 1472, Isabeau de Langeac, veuve de Louis de Courcelles, apporte le château par mariage à Jean d'Urfé. A la fin du XVe siècle, Beaulieu est possédé en indivis par plusieurs seigneurs. En 1507, une part est acquise par Jean Jacques de  Monteynard. En 1540,  une part est passée par alliance à la famille Courtenay. En 1634 Jean de Monteynard meurt  sans enfant et son lot  passe à son cousin   Hector de Monteynard. En 1689, François de Malras, Comte d'Yolet, est  seigneur de Beaulieu .                                              la ROCHE, en 1524, Martin Larges possède par succession du fief de La Roche à Jean-Jacques de Monteynard, seigneur de Beaulieu.  En 1604, Louis de Verdonnet est seigneur de La Roche. Après 1692, le château est acheté par Damas Calmard du   Mont-de-Montjoly, lieutenant général de Craponne.","architecture":"Beaulieu,  ce château construit au XIVe siècle est situé au nord-est du bourg.  La demeure est composée d'un donjon carré de quatre niveaux,  couronné de mâchicoulis, accolé à un grand logis en équerre de deux niveaux, muni de contreforts et percé de meurtrières.      La Roche, ce château est situé sur un éperon dominant l'Allagnon, au nord du barrage. Enceinte quadrangulaire, formée par des logis de trois niveaux, flanquée d'une tour circulaire et une tour carrée d'angle.","habitants":"Famille Courtenay                                                                          Louis de Verdonnet  \r\n        \"","divers":"Château de Beaulieu et de la Roche","gps":"","images":["../image/image_63/63_Beaulieu_Roche_1.jpg","../image/image_63/63_Beaulieu_Roche_2.jpg","../image/image_63/63_Beaulieu_Roche_3.jpg","../image/image_63/63_Beaulieu_Roche_4.jpg","../image/image_63/63_Beaulieu_Roche_5.jpg","../image/image_63/63_Beaulieu_Roche_6.jpg"]},"Consult_chateau_formulaire5e30":{"id":"Consult_chateau_formulaire5e30","dept":"63","canton":"Vertaizon","commune":"Beauregard-l`Evéque","nom":"Beauregard_Eveque","type":"Château","periode":"XII-XVII","histoire":"Trois châteaux à BEAUREGARD-L'EVEQUES, en 1103, Itier de Beauregard possède des droits à Beauregard sous la suzeraineté des comtes d'Auvergne.   Au début du XIIIe siècle, le château est confisqué au Dauphin d'Auvergne par Philippe-Auguste et donné à Robert d'Auvergne, évêque de Clermont. Un nouveau château est édifié par les évêques de Clermont. En 1312, l'évêque de Clermont oblige les habitants de Lezoux possédant des chevaux et des bufs à lui transporter son avoine, son bois et son foin au château. En 1444, propriété de  l'évêque Martin Gouge de Charpaigne. Vers 1487, l'évêque Charles de Bourbon y fait  d'importants travaux, il y meurt en 1504. Ses travaux sont  poursuivis par son successeur, Jacques  d'Amboise. Au XVIIIe siècle, l'évêque   Jean-Baptiste Massmon y entreprend  de nouveaux travaux et fait rebâtir le  village. En 1797, le château est vendu comme bien national.                                                         SAINT-PARDOUX, en 1447, Jean de Saint-Pardoux est seigneur. En 1664, Gilbert de Saint-Pardoux, seigneur de Saint-Pardoux  et   du Pouyet, âgé de 21 ans, déclare servir le ban et l'arrière-ban du roi.  Après 1674, le château devient la léproserie  de l'abbaye de Mirabeau.","architecture":"Château des évêques, de 1724 à 1731, Massillon entreprit une série de travaux et restauration importants dans sa résidence seigneuriale conjointement à ceux du palais épiscopal de Clermont, terrasses entourant le château de toute part, chapelle garnie dune riche argenterie à ses armes, et ornée de boiseries sculptées identiques à celles de Clermont. Ce chef duvre, selon les témoins, a été réalisé par Pierre Sureau, maître menuisier  de Saint-Julien-de-Coppel. Ces pièces ont été transférées à la Révolution en léglise de Lempdes avant dêtre vendues à un brocanteur.  Le château est composé d'un donjon-logis de quatre niveaux. Des fenêtres modernes y sont percées et une petite verrue avec un encadrement de porte du XVIe siècle est accolée. Il reste des fragments d'enceinte percée de meurtrières, une fenêtre  murée du XVIe siècle, une salle voûtée dans une dépendance et une cave taillée dans le roc.  Démoli en 1797 \r\n le château  de Saint-Pardoux a été construit au  XVe siècle,  il est situé à 100 m de Mirabeau. Enceinte quadrangulaire à flanquements circulaires d'angle.","habitants":"Robert d'Auvergne                                                                           Gilbert de Saint-Pardoux,\r\n        \"","divers":"Portes de la ville de Beauregard-l'Evêque,  son château et le château de Saint-Pardoux","gps":"","images":["../image/image_63/63_Beauregard_Eveque_1.jpg","../image/image_63/63_Beauregard_Eveque_2.jpg","../image/image_63/63_Beauregard_Eveque_3.jpg","../image/image_63/63_Beauregard_Eveque_4.jpg","../image/image_63/63_Beauregard_Eveque_5.jpg","../image/image_63/63_Beauregard_Eveque_6.jpg","../image/image_63/63_Beauregard_Eveque_7.jpg"]},"Consult_chateau_formulaire8efb":{"id":"Consult_chateau_formulaire8efb","dept":"63","canton":"Vic-le-Comte","commune":"Coudes","nom":"Beauvezeix","type":"Château","periode":"XVI","histoire":"BEAUVEZEIX, le château de Beauvezeix se trouve dans la vallée glaciaire de la Couze Chambon. A partir d'un édifice construit à la fin du XVIe siècle, ce château fut  reconstruit au XIXe siècle pour prendre l'aspect d'une villa néo-classique,","architecture":"Beauvezeix, à partir d'un édifice construit à la fin du XVIe siècle, ce château fut  reconstruit au XIXe siècle, rythmée de travées régulières marquées sur la façade sud par deux pilastres en Volvic. A l'intérieur,  le grand vestibule est dallé et voûté d'arêtes reposant sur des pilastres. Les jardins accompagnés de communs furent aménagés à la fin du XVIIIe siècle selon un plan reproduit dans une série de dessins d'époque. Ces  jardins comprennent  une partie à la française, aménagée à l'ouest  du château de Beauvezaix sur différents niveaux de terrasses avec bassins, parterres, allées et escaliers. Au-dessus subsiste une ancienne garenne  également aménagée au XVIIIe siècle, comprenant un réseau de chemin, un système d'adduction d'eau avec  réservoirs ainsi que plusieurs grottes dont une transformée en chapelle et pigeonnier. Ce jardin est significatif  de l'histoire  de la fin du XVIIIe siècle.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Beauvezeix","gps":"","images":["../image/image_63/63_Beauvezeix_1.jpg","../image/image_63/63_Beauvezeix_2.jpg","../image/image_63/63_Beauvezeix_3.jpg"]},"Consult_chateau_formulaire0f0b":{"id":"Consult_chateau_formulaire0f0b","dept":"63","canton":"Ennezat","commune":"Varennes-sur-Morge","nom":"Benistand","type":"Château","periode":"XVI","histoire":"Deux châteaux à Varennes;  BENISTANT, en 1618, Jean de Loberie,  avocat et substitut du procureur du roi au Présidial de Riom, est dit seigneur lors  de son contrat de mariage avec Marguerite Escot. En 1636, sa fille Gilberte porte le château par mariage à  Amable  Soubrany, conseiller au Présidial de Riom. La seigneurie reste dans la famille jusqu'en 1789.                    VARENNES, avant 1535 Alix Petifrère, dame de Varennes, veuve d'Antoine Chazettes, fait don de tous ses biens à Michel   Veyny, seigneur d'Arbouze. En 1542 Michel Veyny, qualifié de seigneur de Varennes est élu pour le Roi au bas-pays  d'Auvergne.  Le château appartenait au début du XIXe siècle à la famille Tournadre de Noailles.  Il passe par mariage au général Simmer, maréchal dEmpire. Il revient par héritage, à M. de Place. Depuis 1928, il appartient à la famille  Rochette Delande.","architecture":"Le château Bénistant est situé en bordure du village, au bord de la rivière. Logis rectangulaire de trois niveaux accosté côté cour d'une tourelle cylindrique d'escalier. Vers l'extérieur, la façade a été largement repercée et encadrée de deux  pavillons deux étroites tourelles carrées pourvue d'une terrasse et   d'un balcon. Une verrue du logis remploie une petite fenêtre trilobée. Le château est appelé aujourdhui château de la Roche.                            \r\nChâteau de Varennes situé dans le village. Donjon-logis rectangulaire de trois niveaux. Sur l'un des grands côtés il a été accosté  d'une tourelle polygonale d'escalier.","habitants":"Famille d'Amable  Soubrany                                                    \r\nFamille Tournadre de Noailles\r\n        \"","divers":"Château de Bénistant et de Varennes","gps":"","images":["../image/image_63/63_Benistand_1.jpg","../image/image_63/63_Benistand_2.jpg"]},"Consult_chateau_formulaire8ff5":{"id":"Consult_chateau_formulaire8ff5","dept":"63","canton":"Billom","commune":"Billom","nom":"Billom","type":"Château","periode":"XV-XVIII","histoire":"plusieurs châteaux à  BILLOM, au Moyen-Age, Billom est constitué de deux quartiers distincts, Saint-Cerneuf et Saint-Loup. Au XVe siècle, un enseignement de droit civil et de droit canon est dispensé au XVIe siècle. Plus significatif, Billom connaît en 1556, à l'initiative de l'évêque Guillaume du Prat, la création du premier collège jésuite de France, ce collège se trouvait à l'emplacement de l'actuel collège public.  Billom décline au XVIIe et au début du XVIIIe siècle. La ville est très touchée par les crises frumentaires de 1693-94 et 1709. Le déclin de Billom se poursuit au XIXe siècle après l'abandon du chanvre. La culture de l'ail se développe après 1850  : Arrivée du train en 1875. Création en 1886 de l'école militaire préparatoire des enfants de troupe de Billom (fermée en 1963).    Dans cette commune de nombreux châteaux peut-être certains ont disparu ou utilisé à des fin sociales ou diverses, comme   MOLIERE  transformé en école d' agriculture construite vers 1883 sur l' emplacement des bâtiments de ferme du château de la Molière-Voisin ; seule la maison du directeur existait déjà et date sans doute du début du XIXe siècle, avant 1834, fondateur et premier directeur : M. Chaumont.                                              ROUSSILLE actuellement centre Adapei. BELLEVUE, CORNETS, HAUT-TERRAS, LEOBARB et RANQUET.","architecture":"La ville de Billom comporte une première enceinte entoure Saint-Cerneuf et son église au XIIe et XIIIe siècle. Au XIVe siècle, les deux quartiers sont réunis par une muraille qui sera remanié au XVIe siècle (pour faire face à la menace de bandes protestantes),une ruine du château  sur une propriété privée, sa découverte est sujette à une demande au propriétaire. Le risque de recevoir une pierre existe. la ville a un quartier médiéval.\r\nMaisons des Bouchers, du Chapitre, des échevins, (XVe siècle), maison du Doyen (XVIe siècle), maison du Bailli (XVe et XVIe siècle), beffroi du XVIe siècle.","habitants":"Evêque Guillaume du Prat\r\n        \"","divers":"Porte de la ville de Billom, motte féodal  et divers châteaux du lieu tel que la Roussille, la Rosière, le Bellevue etc.","gps":"","images":["../image/image_63/63_Billom_1.jpg","../image/image_63/63_Billom_2.jpg","../image/image_63/63_Billom_3.jpg","../image/image_63/63_Billom_4.jpg","../image/image_63/63_Billom_5.jpg","../image/image_63/63_Billom_6.jpg","../image/image_63/63_Billom_7.jpg","../image/image_63/63_Billom_8.jpg","../image/image_63/63_Billom_9.jpg"]},"Consult_chateau_formulairecec4":{"id":"Consult_chateau_formulairecec4","dept":"63","canton":"Menat","commune":"Blot-l`Eglise","nom":"Blot_St_Quintin","type":"Vestiges","periode":"XVI","histoire":"BLOT, près 1520, Pierre de Chauvigny fait construire un nouveau château, détaché de l'ancienne baronnie de Blot  (dont-il reste le château de Blot-le-Rocher, sur la commune de Saint-Rémy-de-Blot) ; en 1545, il vient y habiter. En 1674, Charles de Chauvigny de Blot, sieur de Sainte-Catherine, habite son château. En 1693 Amable de Chauvigny de Blot, capitaine de cavalerie, et son épouse Gasparde y habitent.  Cette famille  le conserve jusqu'en 1785.                                                                                      Sur les bord de la Sioule le château de Saint-Quintin pas d'histhorique mais ok pour architecture.","architecture":"Château  de Blot construit au XVe siècle, d'une enceinte quadrangulaire, il subsiste une grosse tour cylindrique ; elle est accolée à l'angle d'un logis remanié au XIXe siècle. Sur les bord de la Sioule a été édifié au XIIIe ou XIVe siècle, illustre les styles qui se sont succédé jusqu'au XVIIe siècle.   L'édifice se compose d'un corps de logis principal encadré d'un pavillon rectangulaire au nord . Prolongeant le pavillon et décrochée par rapport   à celui-ci, l'aile nord dessine une forte avancée vers l'ouest. Dans l'angle de l'aile nord et du corps de logis s'élève la tour de l'escalier que flanque une sorte de redan.                                                                       Le château de Saint-Quintin a conservé son caractère médiéval,   le corps de logis en équerre, à trois niveaux flanqués de tours carrées sur les angles extérieures et d'une tour d'escalier  polygonale  en cour intérieure, toiture en poivrières .","habitants":"Famille de Charles de Chauvigny de Blot\r\n        \"","divers":"Château de Blot","gps":"","images":["../image/image_63/63_Blot_St_Quentin_1.jpg","../image/image_63/63_Blot_St_Quentin_2.jpg"]},"Consult_chateau_formulaire7d36":{"id":"Consult_chateau_formulaire7d36","dept":"63","canton":"Riom","commune":"Volvic","nom":"Boisredon","type":"Château","periode":"XIV-XVIII","histoire":"Trois châteaux à Volvic,  BOISREDON, le château primitif  (avec donjon et tourelles) fût bâti de 1373 à 1390 par Gérard Dachert de Bosredon, dit le Camus. Le château actuel est un exemple de demeure auvergnate du XVIIIe siècle, construit dans le goût italien aujourd'hui musée, superbe donation du peintre Marcel Sahut né à Grenoble de père auvergnat. Au Moyen-Age, le bourg de Volvic appartenait mi-partie aux barons de Tournoël, mi-partie aux seigneurs de Volvic.                                                                   BROSSON  Michel et François Brosson sont nés en 1786 et 1792.  En 1826, ils héritent des jardins du manoir de Bosredon, quils revendront aux Conchon. Grace au comte de Chabrol-Volvic, préfet de la Seine, François  Brosson détiendra  jusquen 1830 le monopole de la fourniture de lave pour les trottoirs  de Paris. En 1831, leur société est liquidée.   Ils se reconvertiront dans le thermalisme à Vichy, puis à Chatelguyon en 1842.          \r\nRATIERS, en 1590, Ligier Bauduy, boucher et bourgeois de Riom et seigneur des Ratiers. En 1665, Marie Bauduy porte le manoir par la mariage à François de Sarrazin, maitre écuyer de l'Académie Royale de Riom, sieur de la Fosse. En 1753, il est vendu à Antoine Valette de Rochevert, chevalier, seigneur de Boisredon.                                VINZELLES  manoir,  avant 1702, Christophe-Olier de Bessac. maître à la chambre des comptes de Paris, est dit seigneur de  Vinzelles en Volvic. En 1720, le manoir est acheté par Jean Lombard, prêtre de l'église de Paris. Sa nièce hérite de la demeure et la porte par mariage à Antoine Chefdeville. Leur fille, Marie-Denise Chefdeville le porte par mariage  à René Tournaire procureur de Riom.","architecture":"Boisredon, Au Moyen-Age, le bourg de Volvic appartient mi partie aux barons de  Tournoël, mi partie aux seigneurs de Volvic. Le château primitif « avec donjon et tourelles » est bâti en 1390 par Gérard Dagbert de Bosredon dit Le Camus.  Aujourdhui,  le bâtiment du four abrite le musée Marcel Sahut, ce fut un ancien hôtel particulier, transformé pour  Jean -François Pierre Valette de Rochevert, par le célèbre architecte de la ville de Riom Attiret de Mannevil  en 1784. Il fait construire les grands escaliers extérieurs en fer à cheval et la terrasse. Les jardins plantés sur un dessin de Le Nôtre, jardinier du roi, sont une réalisation antérieure. En 1904, le bâtiment, désormais propriété communale, est aménagé en « hospice » qui fonctionnera jusquau début des années 1980, date à laquelle la nouvelle maison de retraite est construite dans les jardins attenants.                                                              \r\nRatiers, manoir situé à 3 km au sud-est   de la ville. Logis quadrangulaire de trois travées sur   trois niveaux et   demi, accosté  postérieurement à un angle   d'une haute tourelle polygonale   d'escalier. Les cheminées sont  adossées à un refend. Au XIXe siècle, un autre bâtiment. de deux niveaux a été appuyé le long du grand côté opposé à la tourelle. Vinzelles, manoir situé à proximité d'une maison de maître, de l'autre côté de la ruelle derrière un pigeonnier carré. C'est un logis rectangulaire de 3 travées sur 3 niveaux avec un court retour d'aile.  Côté cour,  il est accosté de  deux tourelles  d'escalier desservant 2 niveaux de coursières. La tourelle originelle se trouve vers le milieu de la façade. A la suite d'un partage, on a agrandi la partie septentrionale et ajouté une nouvelle tourelle à l'angle sud-est.","habitants":"Famille de Gérard Dachert de Bosredon\r\n        \"","divers":"Château de Boisredon, de Brosson,de Ratiers et de Vinzelles","gps":"","images":["../image/image_63/63_Boisredon_1.jpg","../image/image_63/63_Boisredon_2.jpg","../image/image_63/63_Boisredon_3.jpg","../image/image_63/63_Boisredon_4.jpg","../image/image_63/63_Boisredon_5.jpg","../image/image_63/63_Boisredon_6.jpg"]},"Consult_chateau_formulaire7392":{"id":"Consult_chateau_formulaire7392","dept":"63","canton":"Sauxillanges","commune":"Usson","nom":"Boisrigaud","type":"Château","periode":"XIV","histoire":"Plusieurs châteaux, à USSON (voir article)              \r\nBOISRIGAUD, en 1318, Gilles II Aycelin, chevalier, seigneur de Montaigut, Châteldon, Malintrat et Boisrigaud se marie  avec Mascarone de La Tour.  Leur fille Isabelle vend le château à Antoinette Damas d'Aubière dite de Maubec,  veuve  de Pons de Langeac. En 1436, le château est acheté par Thibaut de Gaudet. En 1451, ses héritiers le cèdent à Jean  d'Augerand. En 1543, Louis Augerand, seigneur de Boisrigaud et la Garde de Bort, est ambassadeur de Savoie en Allemagne. En 1548, Anne d'Augerand porte le château par mariage à François de Seneret, seigneur du Chassaing. Molles et Montpéroux. En 1564,  celui-ci obtient des lettres de rémission pour avoir assassiné sa femme. En 1573,  sa fille Diane porte  la demeure par   mariage à Claude du Saix. Avant 1582 la seigneurie est en indivision à leurs   deux filles Jeanne et Simonne. En 1608, Simonne, épouse de Jean de La Queuille, seigneur   de Châteaugay, hérite de la  totalité de Boisgiraud. En 1639, leur fille Hélène le porte par mariage à   Jean-Louis de Bourbon, comte de Busset et  baron de Chaslus et   vers 1669, son fils en rend hommage. En 1675, il le  vend à Etienne de Varennes, seigneur de  Condat et du Cendre, en 1682. Le château restera dans la famille de Varennes jusqu'à la fin du XVIIIe siècle.","architecture":"Château  de Boisrigaud   édifié à la fin du XVe siècle situé à 500 mètres à l'est du village. Enceinte quadrangulaire à flanquements circulaires d'angle, il en subsiste deux arasées.","habitants":"Famille de Gilles II Aycelin\r\n        \"","divers":"Château de Boisrigaud et de beaulieu Saint-Quentin","gps":"","images":["../image/image_63/63_Boisrigaud_1.jpg","../image/image_63/63_Boisrigaud_2.jpg","../image/image_63/63_Boisrigaud_3.jpg","../image/image_63/63_Boisrigaud_4.jpg","../image/image_63/63_Boisrigaud_5.jpg"]},"Consult_chateau_formulaireedb2":{"id":"Consult_chateau_formulaireedb2","dept":"63","canton":"St-Dier-d`Auvergne","commune":"St-Dier-d`Auvergne","nom":"Boissonelle","type":"Vestiges","periode":"XII","histoire":"BOISSONELLE, avant 1049 est citée une famille avec Hugues de Bozartella.  Vers 1104  a Pierre de Boscanelle. Au XIIIe siècle, le dernier des Boissonnelle, Adalard, seigneur  de Sauviat,  lègue Boissonnelle et Vaux-Méaudes aux Montboissier. En 1310, Eustache de Montboissier, son fils Eracle s'accordent avec l'évêque pour fixer les  limites entre les châtellenies et  Mauzun appartenant à l'évêque avec les mandements  de Montboissier et de Boissonnelle. le Monteil et   Aubusson. Ainsi la seigneurie de Boissonnelle s'étend sur le Cunlhat et Ceilloux, à ce noyau primitif s'était ajouté celui   de Vauméode avec la Tour-de-Miodet à l'est de St Jean des Ollières. En 1350, Eracle de Montboissier meurt. En 1403. son fils, Louis de Montboissier, accepte de transiger avec les habitants de cinq de ses châtellenies:  Aubusson,  Boissonnelle,  Montboissier,  Le Monteil, Vauméode (Vaux-Méaude). Pierre de Montboissier marié an 1425 à Jeanne de Châtillon, récupère les fiefs, et il continue la lignée avec son fils Jean III, seigneur d'Aubusson puis de Boissonnelle. En 1553 et en 1568,  François de Montboissier,  chevalier de l'ordre du roi,  gentilhomme, reçoit le titre de  baron . En 1572, Gilberte de Montboissier porte la seigneurie en dot à Jacques de La Fin.   Son fils, Alexandre de la Fin,   seigneur d'Aubusson, Boissonnelle, Le Montel et Vauxméode, sans enfant, se dessaisit de tous ses biens en faveur de son épouse, Jacqueline de la Souchère. En 1624,
