blement du XVe siècle, vers 1870 la tour est qualifiée de ruine, l'escalier et  une cheminée du rez de chaussée sont datés par inscription 1874, il semble que le château a été reconstruit vers 1870, 1875. L'édifice se compose d'un étage carré et un étage en surcroît, le gros-oeuvre en granite, moellon et  enduit, élévation à travées surmontée  de toit à longs pans, croupe et toit conique, recouverts de tuiles plates.","habitants":"Famille du maréchal de Turennes\r\n        \"","divers":"Château fort d'Ollièrgues, de Chantelauze, de la Blanchisse et de Montmarie","gps":"","images":["../image/image_63/63_Olliergues_1.jpg","../image/image_63/63_Olliergues_2.jpg","../image/image_63/63_Olliergues_3.jpg","../image/image_63/63_Olliergues_4.jpg","../image/image_63/63_Olliergues_5.jpg","../image/image_63/63_Olliergues_6.jpg","../image/image_63/63_Olliergues_7.jpg","../image/image_63/63_Olliergues_8.jpg","../image/image_63/63_Olliergues_9.jpg"]},"Consult_chateau_formulaire499c-2":{"id":"Consult_chateau_formulaire499c-2","dept":"63","canton":"St-Amant-Tallende","commune":"Olloix","nom":"Olloix","type":"Commanderie","periode":"XII","histoire":"OLLOIX, délaissant ce site primitif, une commanderie va sétablir sur lemplacement du haut du village actuel. Bien que son origine soit inconnue, la présence délément romans dans léglise laisse supposer quelle existe depuis le XIIe  siècle ou au moins le début du XIIIe siècle. La dédicace de léglise à Saint Jean-Baptiste laisse à penser que ce fut demblée une création des Hospitaliers. Si la tête de la commanderie resta à Olloix, le commandeur décida, à la fin du XVIIe siècle ou au début du XVIIIe siècle, daller sinstaller dans la dépendance de Chaynat (on dit un membre et il y en d'autres : Aydat , Montauzun, Espinasse, Gailloux, Diane, Clémensat, La Sauvetat, Polagnat). En mauvais état le château est alors en grande partie détruit.","architecture":"Le centre de la commanderie (vue ici du sud-ouest) est occupé par un château  (derrière léglise , on peut voir actuellement les restes de la tour nord-ouest et une partie du rempart). Entre les deux tours, la façade occidentale correspond à un corps de logis (rez de chaussée avec cuisine et grande salle, trois salles au premier étage dont une pour le commandeur). Autour de la cour centrale il y a trois autres corps de logis à destination résidentielle ou utilitaire. Le château proprement dit est protégé par une enceinte extérieure composé dun mur bas et dun fossé. Léglise sélève dans langle sud-ouest de lenceinte, elle aurait été composée de deux chapelles superposées, celle du haut étant réservée au commandeur.  De nos jours il ne reste plus que quelques vestiges de la commanderie d'Olloix, essentiellement un reste de tour et un pan de la muraille.","habitants":"Commandeurs\r\n        \"","divers":"Commanderie d'Olloix.","gps":"","images":["../image/image_63/63_Olloix_1.jpg","../image/image_63/63_Olloix_2.jpg","../image/image_63/63_Olloix_3.jpg"]},"Consult_chateau_formulaire1e48":{"id":"Consult_chateau_formulaire1e48","dept":"63","canton":"Aubière","commune":"Romagnat","nom":"Opme","type":"Forteresse","periode":"XII","histoire":"OPME, la ville aux 7 châteaux. Forteresse des comtes d'Auvergne. Le fils de Guillaume II à son retour de croisade récupère le château que son oncle gardait. Le comte de Clermont échange Opme avec le seigneur de Montrognon vasseaux des Dauphins d'Auvergne qui  garderont cette seigneurie pendant trois siècles. Pris par les Anglais en 1381, le château fut libéré en 1393 par les maréchaux de Boucicaut et Sancerre. Au XVe et XVIe  siècle la seigneurie se transmet aux familles de Grivel-Grossoure et ensuite aux Clos-Murat. Au  dèbut du XVIIe siècle la seigneurie est acquise par Paul de Tissandier lieutenant du roi à Clermont. En l'an 1613, Antoine de Ribeyre  trésorier de France devient propriétaire d'Opme et y effectua des travaux considérables dans  le goût de l'époque. Passera ensuite par héritage aux Lefèvre d'Ormesson qui n'y réside pas  et à la fin du XVIIe siècle est acquis par M. de Reboul-Fonfreyde et par alliance de la fille  le fera revenir aux de Tissandier, le conserveront jusqu'à la fin du XIXe siècle et passera ensuite aux ancêtres de Monsieur Durin actuel propriétaire. En 1940, le général de Lattre de Tassigny, maréchal de France, a séjourné au château. C'est alors qu'il créa l'école des cadres d'Opme qui devait former des officiers pour l'armée Française rénovée. Au moment de l'invasion de la zone sud, le futur maréchal,  après quelques velléités de résistance, réussit à s'enfuir, avec la complicité de la population, et à rejoindre la France libre. Un petit musée rappelle des épisodes de cette époque. Le château d'Opme et ses jardins constituent un ensemble classé monument historique.","architecture":"Forteresse d'Opme commandant le col où passait la voie romaine de Clermont au Puy-en-Velay,  sa construction primitive date de la fin du XIe siècle, ce qui en fait un des plus anciens château de la province. Bâti autour d'une cour intérieure, le logis est flanqué de cinq tours rondes, dont trois subsistent encore. Au XIIIe siècle, un donjon carré  de 22 mètres de haut couronné de mâchicoulis et d'un chemin de ronde a remplacé une tour d'angle,  un pont-levis situé au premier étage de la cour intérieure  en commande  seul l'accès, une entrée d'honneur et un escalier intérieur, percé de larges fenêtres à meneaux donnant clarté et élégance à cette demeure autrefois si austère. Il fut aménagé aussi, dans le style de Le Nôtre, deux jardins en terrasses. Celui du haut est un parterre entourant un grand bassin circulaire. Le jardin du bas est réservé à l'usage potager. Au centre, une exceptionnelle fontaine Renaissance, attribuée à Androuet Du Cerceau, anoblit cet harmonieux ensemble, à la fois utilitaire et d'agrément, que les propriétaires actuels maintiennent dans son état d'origine.","habitants":"Familles de Grivel-Grossoure.                                                                Général de Lattre de Tassigny\r\n        \"","divers":"Forteresse d'Opme.","gps":"","images":["../image/image_63/63_Opme_1.jpg","../image/image_63/63_Opme_2.jpg","../image/image_63/63_Opme_3.jpg","../image/image_63/63_Opme_4.jpg"]},"Consult_chateau_formulaire503b":{"id":"Consult_chateau_formulaire503b","dept":"63","canton":"Royat","commune":"Orcines","nom":"Orcines","type":"Château","periode":"XVIII-XIX","histoire":"Deux châteaux à ORCINES, lhistoire dOrcines est intimement liée à celle du Puy-de-Dôme, à laquelle il faut se reporter pour les données concernant lédification du temple de Mercure par les Gallo-Romains au début de notre ère, ou encore les expériences sur la pression atmosphérique menées par Blaise Pascal. Le village lui-même a longtemps vécu de lélevage des moutons, ainsi que de la cueillette des genêts, que les boulangers des alentours achetaient aux habitants pour chauffer leurs fours. Aujourdhui le village vit toujours de lélevage, mais aussi des céréales et du bois, et bénéficie de lessor touristique de la région.                                   SARCENAT, château de la famille de  Pierre Teilhard de Chardin est issu d'une très ancienne famille auvergnate de magistrats originaire de Murat, et d'une branche qui a été anoblie sous le règne de Louis XVIII. Alexandre-Victor-Emmanuel Teillard de Chardin savant historien académicien de lettres décédé en 1955 en son château que sa famille possédait. Pierre Teilhard de Chardin  est un jésuite, chercheur, paléontologue, théologien et philosophe français. En 1946, le Père Teilhard est promu officier de la légion d'honneur au titre des affaires étrangères en reconnaissance de son brillant travail en Chine. Il entre en 1950 à l'académie des sciences où René de Mallemann lui succédera, et est nommé directeur de recherche au CNRS en 1951. Pierre Teilhard de Chardin meurt le 10 avril 1955                                                TERNANT, était la propriété de Théodore Lacombe  racheté par monsieur Piollet pour le transformer en chambres d'hôtes.","architecture":"Manoir de Sarcenat corps de logis  à deux niveaux  toitures en croupes avec donjon carré et à l'opposée tourelle à toit en poivrière.                                Ternant, château du XIXe siècle, corps de logis à deux étages rectangulaires entre deux pavillons rectangulaires à trois étages.","habitants":"Famille d'Alexandre-Victor-Emmanuel                                                              Famille de Teillard de Chardin                                                              Famille de Théodore Lacombe \r\n        \"","divers":"Château d'Orcines de Sarcenat et de Ternant.","gps":"","images":["../image/image_63/63_Orcines_1.jpg"]},"Consult_chateau_formulaire4aec":{"id":"Consult_chateau_formulaire4aec","dept":"63","canton":"Randan","commune":"St-André-le-Coq","nom":"Pagnant","type":"Château","periode":"XVII","histoire":"PAGNANT,  Jean-Baptiste de Forget, seigneur de Pagnant (fils de Claude, 1682-1760), y fait ajouter en le remaniant laile nord en 1771, à la Révolution, Jean-Claude Forget, 32 ans, commandant général de la Fauconnerie, capitaine au régiment   Royal Plogne  et chevalier de Malte est appelé à témoigner  en justice à Paris (Procédure criminelle instruite au Châtelet de Paris sur la dénonciation des faits arrivés à Versailles le 6 octobre 1789, Paris, 1790).  Claude de Forget né à Riom en 1760,  poursuit les travaux de son père en respectant la symétrie avec lédification de laile. François-Albert de Forget a été maire de Saint-André-le-Coq  de 1830 à 1832. Lami de la religion du 13 octobre   1836 annonce que M. de Forget ancien préfet de Riom, sest noyé le 4 du mois, en voulant secourir son fils, leur voiture ayant versé au passage dun gué de lAllier.","architecture":"Pagnant,  Il semblerait quun premier logis de maître, le corps central, ait existé au XVIe siècle, sud en 1808 (on peut différencier les dessus de fenêtres, tantôt en linteau, tantôt en plusieurs claveaux). Larchitecte peut en être  Michel-Amable Richier, qui construit   et aménage   les dépendances (écurie, grande, serre,  pigeonnier à pan de bois  sur poteau, sans doute remonté) en 1826,  réunissant cours du château  et du domaine pour former le nouveau parc.  Celui-ci est agrémenté de bassins circulaires et, derrière le nouveau portail, conserve les piédroits de lancien. À lintérieur, un décor néo-classique typique  du début du XIXe siècle. Dans la commune la maison forte de Prouillat.","habitants":"Famille de Jean-Baptiste de Forget\r\n        \"","divers":"Château de Pagnant et la maison forte de Prouillat","gps":"","images":["../image/image_63/63_Pagnant_1.jpg","../image/image_63/63_Pagnant_2.jpg","../image/image_63/63_Pagnant_3.jpg","../image/image_63/63_Pagnant_4.jpg"]},"Consult_chateau_formulaireb56e":{"id":"Consult_chateau_formulaireb56e","dept":"63","canton":"Issoire","commune":"Pardines","nom":"Pardines","type":"Vestiges","periode":"XIII","histoire":"PARDINES, en 1460 Pardines fut vendu à Bohier qui sera anobli en 1490. En 1511,  le duc de Bourbon Charles III donne à Thomas Bohier ou Boyer, secrétaire des Finances et chambellan du roi, le fief de Pardines en récompense de ses services. Celui-ci construit le château de Saint-Cirgues. Il acquiert aussi Champeix et plusieurs seigneuries voisines dont Chidrac, Perrier, Saurier, tenus en fief des ducs de Bourbon Montpensier, dauphins d'Auvergne. En 1565, à la mort   de son fils Antoine, ses biens passent au connétable Henri de Montmorency. En 1575, le château de Pardines passe par échange à Marc de Montboissier-Beaufort-Canillac. En 1732 il sera vendu au Maréchal Yves d'Allègre et rentrera ainsi dans le vaste marquisat de Tourzel. La fille du maréchal épousa le comte de Rupelmonde, en 1735 la seigneurie passa à un petit neveu, Louis de Souches, dont la femme sera la gouvernante des enfants de Louis XVI (de 1789 à 1792). Il  appartient au maréchal d'Allègre avant 1733.  Dans la commune les grottes de Perrier à Pardines.                                             BOISSAC,   En 1620, Paul Ardier, seigneur de Beauregard et sa soeur tiennent le château de Boissac. Avant 1632, Antoine  Ardier, commissaire ordinaire des guerres, est dit seigneur de Boissat. En 1656, le château est à Salomon Ardier. Il  passe ensuite par achat à Jean de Ribeyre, seigneur de Fontenilles, Seychalle et  Ligonnès,  qui le revend à François de Saint-Pardon. En 1689, Jacques de Bonnafos, écuyer, seigneur de Bélinay et  de Boissat, habite son château de Bélinay, paroisse de Paulhac (Cantal).","architecture":"Vestiges du village fortifié de Pardines, la demeure est composée d'un donjon carré et reste d'une enceinte avec deux hautes tours en fer à cheval. Boissac, château construit au XVIIe siècle,  situé à 1,5 km à l'est du bourg.  Enceinte quadrangulaire à trois niveaux à flanquements d'angle,  il en subsiste un carré et un circulaire accolés à un logis de trois niveaux soulignés par des bandeaux.","habitants":"Maréchal d'Allègre                                                                         Famille de Jacques de Bonnafos\r\n        \"","divers":"Vestiges du château de Pardines et château de Boissac.","gps":"","images":["../image/image_63/63_Pardines_1.jpg","../image/image_63/63_Pardines_2.jpg","../image/image_63/63_Pardines_3.jpg","../image/image_63/63_Pardines_4.jpg","../image/image_63/63_Pardines_5.jpg"]},"Consult_chateau_formulaire3001":{"id":"Consult_chateau_formulaire3001","dept":"63","canton":"Issoire","commune":"Parentignat","nom":"Parentignat","type":"Château","periode":"XVIII","histoire":"Plusieurs châteaux à  PARENTIGNAT ,  déjà cité au XVIIIe siècle,  par la famille de Sommyière.  Maximilien de Sommyière, ses descendantes (quatre nièces) ne s'entendant pas, la maison reconstruite en 1682, suite à un incendie, achetée par Jean Antoine de Lastic, vicomte de Murat, prieur de Bredon en 1707 pour son neveu François II de Lastic  marquis de Sieujac et sa nièce Marie de la Roche Aymont. François de Lastic épousa Claude de St-Genis, et ils adoptèrent Georges de Lastic. En 1779  le comte  de Lastic, lieutenant général époux de Melle de Ménars  petite nièce de Colbert finit les remaniements jusqu'en 1782. est  resté dans la descendance, Vers 1960, pour leur  succéder à la tête de Parentignat. Georges de Lastic épousa Françoise Gouin.  Leur fils, Anne-François de Lastic, est  depuis le décès de Georges de Lastic en janvier 1988, le propriétaire actuel de Parentignat avec sa mère.                                                                                                        A deux kilomètres à l'Est à Varennes-sur-Usson le château de MAZEL.  En 1478, Chatard du Mazel, écuyer, est seigneur. En 1524, à Vidal du Mazel seigneur. En 1557, Antoine de Fredeville, prieur de Moissat et chanoine, Comte de Bnoude, fait donation de sa maison du Mazel près Usson.  Acquise par lui du seigneur de Pierrefitte en Limousin. Avant 1569, le fief   est acheté par Antoine Vigier de la Valette qui décède peu après. Avant 1628, à la mort de Christophe , il passe à Marguerite sa  nièce, mariée à   Jean des Maignoux. En 1628, leur   fille Anne l'apporte par   mariage à   Jean de Valadoux. En 1689. Pierre Hector de Damas, écuyer, est seigneur de Treydieux et du Mazel, il habite à Brioude. FOUILHOUSE  Vers 1320, appartient à Guillaume de Riom. Vers 1440, à  Aubert de Péchaud, qui a épousé Gaillarde de Riom. Son neveu Antoine de Sailhens  hérite avant 1450. Françoise de Sailhens  se marie avec Pierre de Malras, issu dune famille protestante anoblie par Henri IV. En 1675 un François de Malras est seigneur de Fouilhouse, bien quil ny habite pas. François de Lastic, seigneur de Parentignat, son beau-frère, lui achète le château en 1719, ce dernier est désormais une dépendance de Parentignat.","architecture":"Parentignat   C'était une maison forte simple quadrilatère flanqué aux angles de quatre tours. richement meublées de la province,  En quelques années, cette bâtisse fit place à un insolite château, au plan inspiré de Versailles où l'arkose blonde de Montpeyroux contraste avec les entourages de porte en pierre de Volvic et les toitures de petites tuiles rouges. En 1779, des travaux eurent lieu  pour terminer la façade   donnant sur le parc et remanier la disposition intérieure,   totalement épargné par la Révolution, on  y trouve encore une grande partie de son mobilier d'origine.                 Mazel, enceinte quadrangulaire à flanquements circulaires d'angle, il en reste un isolé et un autre à l'angle d'un logis de deux niveaux et un demi niveau de baies-créneaux. Des canonnières participent à la défense et les modénatures des baies conservées datent du XVIe siècle. Mais à l'intérieur, l'une des cheminées parait nettement plus ancienne.                                                             Fouilhouse   Maison-forte du XIVe siècle. Grand donjon rectangulaire de trois niveaux, aux angles arrondis. Tour semi-circulaire descalier sur un des grands côtés, un petit côté conserve des latrines.","habitants":"Famille de Sommyière\r\n        \"","divers":"Château de Parentignat de la Fouilhouse et du Mazel.","gps":"","images":["../image/image_63/63_Parentignat_1.jpg","../image/image_63/63_Parentignat_2.jpg","../image/image_63/63_Parentignat_3.jpg","../image/image_63/63_Parentignat_4.jpg","../image/image_63/63_Parentignat_5.jpg","../image/image_63/63_Parentignat_6.jpg","../image/image_63/63_Parentignat_7.jpg","../image/image_63/63_Parentignat_8.jpg","../image/image_63/63_Parentignat_9.jpg"]},"Consult_chateau_formulaire08d3":{"id":"Consult_chateau_formulaire08d3","dept":"63","canton":"Sauxillanges","commune":"St-Rémy-de-Chargnat","nom":"Pasredon","type":"Château","periode":"XVII","histoire":"PASREDON,  fief offert à Guillaume Odol en 1341 par Robert dauphin dAuvergne. Occupé au XVIe siècle par les Mas Boyer  et les Preghat, les Bonlieu au XVIIe siècle, les marquis de La Rochelambert de 1716 à la Révolution. aménagé  par Victor Augustin de Matharel entre 1885 et 1888, à partir dun édifice acheté en 1832 par son père, le comte Melchior de Matharel général des armées de lempire, les descendants occupent le château jusquen 1961. Transformé aujourd'hui en chambres d'hôtes par la famille Marchand.","architecture":"Construction du XVIIe siècle remanié au XIXe siècle, aménagé (partie centrale,  tour descalier coiffée dun dôme, toits recouvert dardoises) quadrilatère à trois niveaux et attiques flanqué d'un pavillon saillants en angles et d'une tourelle à l'opposée.","habitants":"Famille de Victor-Augustin de Matharel\r\n        \"","divers":"Château de Pasredon.","gps":"","images":["../image/image_63/63_Pasredon_1.jpg","../image/image_63/63_Pasredon_2.jpg","../image/image_63/63_Pasredon_3.jpg","../image/image_63/63_Pasredon_4.jpg","../image/image_63/63_Pasredon_5.jpg"]},"Consult_chateau_formulaire003f":{"id":"Consult_chateau_formulaire003f","dept":"63","canton":"Randan","commune":"Mons","nom":"Perigeres","type":"Château","periode":"XV","histoire":"PERIGERES, la première mention de la seigneurie de Périgère date de 1382. La mention d'une tour apparaît  en 1486. De 1592 à 1760  l'édifice reste la propriété de la famille de Lorme de Pagnat. Durant cette période le  fief  s'agrandit, absorbant la terre  de Limons et la seigneurie de Mons.","architecture":"L'édifice de Périgère,  plusieurs pièces d'archives datées des XVe, XVIe et XVIIe siècles donnent des descriptions sommaires des bâtiments, est probablement une maison forte ou  un manoir  au XVIe siècle. La partie nord-ouest  de la demeure actuelle semble en être le vestige. Le  bâtiment nord-est remanié aux XVIIIe et au XIXe siècles, semble en fait composé de constructions du XVIIe siècle englobant des bâtiments plus anciens. Cette campagne de travaux est contemporaine de la construction du  pigeonnier-porche au toit à l'impériale  qui porte la date 1686. Une aile du château, construite à l'est en retour d'équerre du corps principal, est détruite dans la seconde moitié du XVIIIe siècle. Après 1835 les dépendances sont en partie détruites.  Constitué de deux groupes de bâtiments répartissant parties habitation et communs autour d'une cour s'ouvrant au nord-est en terrasse. Les vastes dépendances au sud  font face à la demeure composée de deux bâtiments communiquant à l'angle. Les corps de bâtiment nord-ouest sont flanqués de deux tours. Le bâtiment nord-est est formé de 3 corps et flanqué d'un pavillon carré sur la façade postérieure. Les principales dépendances, étables, fenil, logements, composent un bâtiment au plan en S dont le corps central comprend un pigeonnier-porche en pans de bois couvert d'un toit à l'impérial.","habitants":"Famille de Lorme de Pagnat\r\n        \"","divers":"Château de la Périgères","gps":"","images":["../image/image_63/63_Perigeres_1.jpg","../image/image_63/63_Perigeres_2.jpg","../image/image_63/63_Perigeres_3.jpg"]},"Consult_chateau_formulaire63da":{"id":"Consult_chateau_formulaire63da","dept":"63","canton":"Aubière","commune":"Pérignat-lès-Sarliève","nom":"Perignat_Sarlieve","type":"Château","periode":"XIV","histoire":"PERIGNAT connue depuis le XIIIe siècle. En 1240 ce fief appartenait à Robert, Dauphin d'Auvergne, qui en rendit alors foi-hommage à l'évêque de Clermont.  Par la suite diverses familles possédèrent successivement la seigneurie depuis Alix de la Roche-Donnezat, veuve en 1312 de Guillaume de Pérignat, chevalier. On trouve ainsi, au XVe siècle, les de Bosredont, avec notamment Louis, écuyer et favori de la reine Isabeau de Bavière, assassiné par ordre du roi Charles VI qui fit ensuite jeter son corps dans la Seine, enfermé dans un sac sur lequel on lisait \"laissez passer la justice du Roi\". Possédée temporairement, vers la fin du XVIe siècle par une autre lignée de vieille noblesse, celle des marquis de Langeac, la seigneurie appartenait le plus souvent à des familles d'origine bourgeoise et notamment, depuis le début du XVIIe siècle, à la famille Durant, encore présente à la Révolution. Aujourd'hui hôtel de ville.\r\nBONNEVAL, en 1356, Béraud Dauphin d'Auvergne accorde à l'abbé de Bonnaigue le droit de construire une maison-forte  sur le domaine de Bonneval en la châtellenie de Montrognon.  En 1164, Pierre-François-Benoit Guerrier, chevalier,  est seigneur de Bezance, Romagnat, Prat, Bonneval et Clémensat. En 1778, Anne-Joseph-René guerrier est seigneur de Bezance, Romagnat,  Bonneval et conseiller au parlement de Paris,  épouse Adelaïde Marie Durant,  fille du seigneur de Pérignat-le-Grand.","architecture":"Perignat lès Sarlièves,  château du XVIIIe-XIXe siècle flanqué de tour et de tourelles tous à trois niveaux.                                                 Bonneval  bâti au XIVe siècle. Il se compose d'un donjon-logis de trois niveaux. Au XVIe siècle, il est augmenté d'une tourelle carrée d'escalier. Aujourd'hui hôtel de ville.","habitants":"marquis de Langeac                                                                           Famille de Pierre-François-Benoit Guerrier\r\n        \"","divers":"Château de Bonneval, de Sarliève","gps":"","images":["../image/image_63/63_Perignat_Sarlieve_1.jpg","../image/image_63/63_Perignat_Sarlieve_2.jpg","../image/image_63/63_Perignat_Sarlieve_3.jpg"]},"Consult_chateau_formulairedb8a":{"id":"Consult_chateau_formulairedb8a","dept":"63","canton":"Veyre-Monton","commune":"Plauzat","nom":"Plauzat","type":"Château","periode":"XV","histoire":"PLAUZAT, avant la fin du XIIIe siècle, les comtes dauphins, à la suite dun mariage, concédèrent Plauzat en fief aux Comtour dApchon, ils leur cédèrent la maison forte, qui devint ainsi la résidence des seigneurs de Plauzat et le siège de leur fief. En 1580, le seigneur qui appartenait alors à la famille dApchon Le château dominait le bourg de Plauzat, Joachim Charles Laure de Montagu, vicomte de Beaune, comte dAlps, marquis de Bouzols, né en 1734, en fut le dernier seigneur. Petit-fils du maréchal de Berwick, il avait embrassé la carrière militaire. Colonel au régiment  des grenadiers de France, il prit le commandement du régiment de Bretagne infanterie, parvint au grade de brigadier des armées du roi. Il avait épousé, en 1760, une dame du palais de la reine, Marie-Hélène-Charlotte Caillebot de la Salle, dont il eut un fils. Il émigra, ainsi que son fils et  sa bru, soeur de Mme de Lafayette. Le château était  une grande demeure dont les parties anciennes abritèrent les jeunes années de Guérin de Montagu qui s'illustra à Damiette en 1219. Pendant les Guerres de Religion, Plauzat  prit partie pour la Ligue.","architecture":"Plauzat,  trois tours d'inégale grandeur  reliaient entre eux les différents corps de bâtiment, au moins depuis la fin du XVe siècle, le village possédait un fort. En 1580, le seigneur fit ouvrir dans le rempart et le fossé, contre la volonté des habitants, un passage afin de mieux desservir son château, inclus dans le système fortifié.  Au XVIIe - XVIIIe siècles, Le fort est un quartier bien défini, appuyé à léglise de construction romane et au château reconstruit à lépoque moderne et délimité sur les autres faces par une auréole de maisons et de rues en arc de cercle, le fort était occupé essentiellement par des caves et des celliers, dont plusieurs relevaient de la censive des moines de Sauxillanges. Les troubles qui suivirent la Révolution ruinèrent définitivement son château dont il ne reste aujourd'hui que les murailles.","habitants":"Famille dApchon\r\n        \"","divers":"Château de Plauzat.","gps":"","images":["../image/image_63/63_Plauzat_1.jpg","../image/image_63/63_Plauzat_2.jpg","../image/image_63/63_Plauzat_3.jpg","../image/image_63/63_Plauzat_4.jpg"]},"Consult_chateau_formulaire2d49":{"id":"Consult_chateau_formulaire2d49","dept":"63","canton":"Poinsat","commune":"Poinsat","nom":"Poinsat","type":"Château","periode":"XIV","histoire":"Plusieurs châteaux à POINSAT   La construction du premier château de Pionsat remonte à la fin du XIVe siècle  uvre de Guy Aubert, seigneur de Pionsat. En 1482 Jacques de Chazeron acheta la terre de Pionsat et embellit le château. Ses descendants, François et  Antoine de Chazeron, eurent des projets plus grandioses. C'est un édifice inachevé  que Charlotte de  Chazeron transmit à la famille Chabannes par son mariage. En 1789, Louise-Olive-Elisabeth-Bernard de Coubert, veuve de Jean-Baptiste de Chabannes  a conservé la propriété de lédifice   par nécessité, elle est contrainte de vendre le château en 1792 avec ses dépendances. En 1879, Gustave Alexis Farin devient propriétaire de la partie renaissance du château et le lègue en 1911 à la commune pour y installer la mairie et la Justice de Paix. La municipalité effectue alors des aménagements intérieurs permettant laccueil du public et la tenue de manifestations.                           À la fin du XIXe siècle Désiré Chaffraix, de retour de Louisiane où il avait fait fortune, entrepris de construire dans le bourg de Pionsat, à Durat et aux Gannes trois grandes bâtisses qui finalement ne furent jamais achevées. Seule celle située dans lactuelle rue du Collège a trouvé une affectation définitive en devenant la maison de retraite de la commune. Létablissement porte dailleurs le nom de « La Louisiane ».                            MONTROY  quelques kilomètres du bourg, dominant la vue, se dresse le magnifique château de Montroy actuellement propriété privée.","architecture":"Poinsat, du château primitif, bâti au XIVe siècle, composé d'un logis allongé flanqué de quatre tours rondes destinés à renforcer la défense sur l'Auvergne. Au XVe siècle la forteresse est transformée pour devenir une résidence,  une première tour carrée sera construite, deux pavillons et deux ailes seront terminés en 1610, le style Renaissance était prévu pour être très vaste,  sa construction, si elle avait été entièrement menée à bien, aurait vraisemblablement fait disparaître la forteresse médiévale,  et au XIXe siècle une partie du château est démolie, il ne reste que l'angle du sud-est. Au XVIe siècle les Chazeron lui adjoignirent une demeure néo-classique décorée de bossages et de panneaux en briques, dont le pavillon du corps de garde reste la partie la plus intéressantes. Il  reste  des vestiges de l'aile avec ses bossages vermiculés.","habitants":"Famille de Guy Aubert, seigneur le Pionsat\r\n        \"","divers":"Ch^$ateau de Poinsat, de Montroy de Gannes et de Durat.","gps":"","images":["../image/image_63/63_Poinsat_1.jpg","../image/image_63/63_Poinsat_2.jpg","../image/image_63/63_Poinsat_3.jpg","../image/image_63/63_Poinsat_4.jpg","../image/image_63/63_Poinsat_5.jpg","../image/image_63/63_Poinsat_6.jpg","../image/image_63/63_Poinsat_7.jpg","../image/image_63/63_Poinsat_8.jpg"]},"Consult_chateau_formulairef403":{"id":"Consult_chateau_formulairef403","dept":"63","canton":"Randan","commune":"St-Sylvestre-Pragoulin","nom":"Poivriere","type":"Maison forte","periode":"XIV","histoire":"POIVRIERE, fief cité au XIIIe siècle, au XIVe siècle  propriété de Jean le Groing qui épousa en 1392 Jehanne de Neyrat de Pontgibaud, après la mort de Gabriel le Groing en 1666 sans descendance , le château passe par achat   en 1670  à Louis Ier de Bourbon comte de Busset.  Le château passe ensuite en 1707 à Gaspard Colin de Gévaudan  sa famille sera propriétaire jusqu'en 1777 date  à laquelle la seigneurie passe  à Gilbert de Chauvigny de Biot qui le conserve jusqu'à la Révolution. En 1809 monsieur de Soalhat possède le château. Sa fille en hérite, il sera  ensuite vendu successivement en 1928 à un architecte qui entreprend des travaux d'aménagements intérieurs et extérieurs, en 1949 vendu à un avocat, maître Barthe, puis en 1968 vendu à madame Audemart d'Alençon. Le château de la Poivrière est supposé avoir hébergé madame de Sévigné durant un été lorsqu'elle venait prendre les eaux à Cusset et à Vichy.","architecture":"le château de La Poivrière situé sur une motte féodale, dominant la vallée de l'Allier La structure de l'édifice, construit au XVe siècle autour d'un donjon du XIIIe siècle,  carré et ses cinq tours coiffées de hauts toits en poivrière, mais les toitures et surtout les aménagements intérieurs   ont été remaniés ou modifiés  entre les XIXe et XXe siècles. Son architecture est typique des châteaux de la fin du Moyen-Age.  Il est entouré d'un parc de deux hectares. Le château est composé de trois corps de bâtiments accolés adoptant un plan irrégulier en L et flanqués de cinq tours et un bâtiment de plan carré isolé. Les trois premiers corps sont couverts de toits à croupes. Le bâtiment isolé possède un toit en pavillon.  Les tours sont couvertes de toits coniques à l'exception d'une tour circulaire et de la tour hexagonale  qui possèdent des toits polygonaux. Le portail de la tour hexagonal est surmonté d'un gâble en accolade encadré de pinacles et son tympan est orné d'armoiries non identifiées, l'écu est tenu par deux anges et surmonté d'un casque.","habitants":"Famille de Jean le Groing\r\n        \"","divers":"Maison forte de la Poivrière","gps":"","images":["../image/image_63/63_Poivriere_1.jpg","../image/image_63/63_Poivriere_2.jpg","../image/image_63/63_Poivriere_3.jpg","../image/image_63/63_Poivriere_4.jpg","../image/image_63/63_Poivriere_5.jpg"]},"Consult_chateau_formulairefd5c-2":{"id":"Consult_chateau_formulairefd5c-2","dept":"63","canton":"Rochefort-Montagne","commune":"St-Bonnet-Prè-d`Orcival","nom":"Polagnat","type":"Château","periode":"XV","histoire":"POLAGNAT, le fief de Polagnat remonte à 1270, de Jean Genols. En 1315, le seigneur du lieu est Gérard de Pérol, damoiseau  tandis qu'Oudin de Polagnat fera partie, en 1328, de la haute noblesse auvergnate. Au XVIe siècle le château  appartient à la famille de Chabannes, François 1er de Chabannes, marquis de Curton et comte de Rochefort   est seigneur d'Aurières et  de Polagnat. Mort en 1604, il est enterré  dans l'église d'Orcival. Jusqu'en 1775, le château  reste dans cette famille, quand Jean-Charles de Chabannes, vend presque toutes  les possessions des Chabannes. Polagnat est acquis  par René-Jacques  de Ribeyre conseiller à la cour  des aides de Clermont. Il en était toujours propriétaire en 1794, mais en 1806 un certain Guillemin vend  le domaine à M. Daubusson. Un de ses descendants, Magaud Daubusson restaure le château vers 1880 et  son neveu le vend en 1893 à Mr. Chomette. De la demeure médiévale antérieure au  château actuel.","architecture":"Polagnat, la construction actuelle, très remaniée, a conservé des éléments du château élevé au XVe siècle. à l'origine une enceinte quadrangulaire, flanquée de tours rondes, protégeait un logis situé dans l'angle nord-ouest. Un coup de sabre, visible dans le mur ouest du château, semble marquer la liaison entre deux corps de bâtiments. Une courtine joignait la tour nord-est à son homologue placée au sud-est, des traces de départ d'un mur épais sont visibles sur cette dernière. Le château était naturellement  protégé à l'ouest et au sud par l'escarpement du relief, les deux autres côtés étaient ceints de fossés qui furent comblés lors de l'installation de l'esplanade.  Au XVIIe  siècle, des travaux sont entrepris et une aile est adossée au sud, en retour d'équerre, au logis primitif en 1660.   La nouvelle aile comporte une tourelle demi hors-oeuvre  disposée au centre de la façade sur cour, elle abrite un escalier en vis qui dessert les étages qui comportaient deux pièces disposées de part et d'autre de l'escalier. C'est vraisemblablement  à cette époque que les fossés sont comblés et  que l'esplanade orientale est érigée. Au XVIIe siècle, de nouveaux travaux donnent au château son aspect presque définitif,  l'aile nord, disposée également en retour d'équerre, elle ne servait qu'au service, des remises occupent le rez  de chaussée,  des pièces de service sont installées à l'étage.  Vers 1880,   le pignon méridional de l'aile ouest est reconstruit en style néo-gothique. L'étage de l'aile nord  est aménagée   en appartement.","habitants":"Famille de Chabannes                                                                      Famille de Magaud Daubusson\r\n        \"","divers":"Château de Polagnat","gps":"","images":["../image/image_63/63_Polagnat_1.jpg","../image/image_63/63_Polagnat_2.jpg","../image/image_63/63_Polagnat_3.jpg","../image/image_63/63_Polagnat_4.jpg","../image/image_63/63_Polagnat_5.jpg"]},"Consult_chateau_formulairedaf4":{"id":"Consult_chateau_formulairedaf4","dept":"63","canton":"Pont-du-Château","commune":"Pont-du-Château","nom":"Pont_du_Chateau","type":"Château","periode":"XVII","histoire":"PONT du CHATEAU, château cité au XIIe siècle par les comtes d'Auvergne, famille de Montboissier-Beaufort-Canillac, famille noble du Gévaudan. La famille de Montboissier, attestée avant l'an Mil, est originaire du site de Montboissier en Auvergne. en 1343 le fief fut acquit par Guillaume Roger seigneur de Rosiers d'Egleton en Limousin et frère du pape Clément VI veuf de premières noces de Marie de Chambon eurent cinq enfants, convole avec Guérine de Cadillac un enfant né de cette relation qui portera  à celui de Beaufort,  elle a relevé le nom de Beaufort,  par mariage le 4 juillet 1459 de Jean de Montboissier avec Isabeau de Beaufort, fille de Louis de Beaufort, seigneur de Canillac , entrée dans la maison de Beaufort, et de Jeanne de Noury, sa première femme, sur de Jacques de Beaufort qui, étant resté dernier du nom, légua tous ses biens à Jacques de Montboissier, petit-fils de sa sur, en 1511, à la charge pour lui et ses descendants de relever et porter à perpétuité le nom et les armes de Montboissier-Beaufort-Canillac. Suite aux guerres de religion  en 1590 incendie du château. Reconstruction du château par Henri de Montboissier, sénéchal de Clermont tué au siège  de Montauban  en 1621, son fils Guillaume ami de Mazarin poursuit l'oeuvre de son père, dans cette famille jusqu'à la Révolution Philippe-Claude émigre et meurt en 1797 à Londres, le château vendu comme bien national qui sera acquit au XXe siècle par la commune.","architecture":"PONT du CHATEAU, le château édifice construit au XVIIe siècle, conservant, à l'intérieur, des détails décoratifs tels que plafonds à poutres apparentes, décorations peintes, une grande salle de style Louis XVI avec cheminée et lambris, l'édifice présente un ensemble complet de cette époque la façade du côté ville se compose d'un pavillon central à deux étages de trois  travées séparées par des pilastres à bossages d'un pavillon à chaque extrémité, entre le centre et les extrémités, de  chaque côté, une partie de bâtiment  de deux travées. Le pavillon  central est couronné  par une  terrasse avec balustrade. Un perron d'ordre dorique  et à double révolution permet de communiquer avec le premier étage, hôtel   de ville du Pont du Château abritent aujourd'hui le musée Pierre-Mondanel de l'ancienne batellerie de l'Allier et de la Dore qui fait revivre l'intéressante histoire de cette navigation.","habitants":"Famille de Beaufort\r\n        \"","divers":"Château du Pont du Château.","gps":"","images":["../image/image_63/63_Pont_du_Chateau_1.jpg","../image/image_63/63_Pont_du_Chateau_2.jpg","../image/image_63/63_Pont_du_Chateau_3.jpg","../image/image_63/63_Pont_du_Chateau_4.jpg"]},"Consult_chateau_formulaireb046":{"id":"Consult_chateau_formulaireb046","dept":"63","canton":"Riom","commune":"Mozac","nom":"Pontaberaud","type":"Château","periode":"XVII","histoire":"PONTABERAUD, ancienne place forte de l'abbaye où Louis XI aurait signé un traité de paix en 1463, devenue gentilhommière au XVIIIe siècle.  Le premier seigneur mentionné du fief de Pontabéraud est Michel Mercier, conseiller au présidial de Riom, à la fin du XVIIe siècle. Son petit-fils Gabriel Mercier, écuyer, seigneur de la Tour, Lamende et Portabéraud (1716-1793), premier maire de Mozac en 1791, marié à Jeanne de Fretat en 1751, fait élever sur une construction antérieure le petit château actuel avec ses dépendances dit \"La Folie Mercier\".   Les Mercier, famille éminente de procureurs au présidial de Riom, sont possesseurs de Portabéraud depuis 1615. Le baron Gabriel Mercier, cinquième du nom, en hérite en 1744 et, dès 1753 achète la seigneurie de La Tour.","architecture":"Cette gentilhommière de Pontaberaud  a été construite au sud de l'abbaye au XVIIe siècle.  la propriété comprend le château, la chapelle, les communs et le parc décoré de statues en terre cuite. Cette demeure seigneuriale fut transformée et réaménagée au XVIIIe siècle par l'architecte Legay. C'est un parfait exemple des folies construites par les notables du siècle des Lumières. Il faut admirer le portail et les escaliers ornés de ferronneries très typiques de l'art auvergnat du XVIIIe siècle, les statues de pierre du jardin, les pièces principales du château avec leurs portes sculptées, les plafonds à la française, les boiseries de style Louis XV, les sols en pierre de Volvic. Remarquables portails en fer forgé, elle constitue un exemple de ces folies telles qu'ont pu en faire construire les notables riomois. Elle a été entourée à la fin du XVIIIe siècle d'un jardin composé probablement par le célèbre architecte Attiret. Quelques modifications aux XIXe début XXe siècles, vers 1840, toit refait à la Mansart, porte d'entrée de la façade sud du château. Vers 1910, adjonction d'un petit bâtiment contre la façade nord du château.","habitants":"Seigneur Michel Mercier                                                       \r\nSeigneur Gabriel Mercier,\r\n        \"","divers":"Château de Pontaberaud.","gps":"","images":["../image/image_63/63_Pontaberaud_1.jpg","../image/image_63/63_Pontaberaud_2.jpg","../image/image_63/63_Pontaberaud_3.jpg"]},"Consult_chateau_formulairef4f7":{"id":"Consult_chateau_formulairef4f7","dept":"63","canton":"Chateldon","commune":"Puy-Guillaume","nom":"Puy_Guillaume","type":"Château","periode":"XVI","histoire":"Plusieurs châteaux dans la commune de PUY-GUILLAUME de la Bâtisse, de Genestoux, de Saint-Alyre et de la Mothe. Mentionné en 1267 dans la correspondance d'Alphonse de Poitiers, frère de Saint-Louis et suzerain de la terre d'Auvergne, le nom de Puy-Guillaume est la transcription de Podium Guillelmi, littéralement \"Montagne de Guillaume\". Le château primitif de Déthé, siège de la seigneurie de la Bâtisse, se trouvait sur une petite motte castrale, ce qui pourrait expliquer cette terminologie. Jusqu'à la Révolution de 1789, le siège de la paroisse se situe à Saint-Alyre  sur la route de Châteldon où était construite une église semblable à celle de Paslières, hélas démantelée et dont il ne reste rien, les deux autres pôles étant Montpeyroux, avec sa riche abbaye dépendant de l'ordre de Cîteaux et Puy-Guillaume, simple village où régnait la puissante corporation des mariniers.\r\nMOTHE,  à l'origine un manoir construit au XVIe siècle par les seigneurs de Châteldon, entre 1728 et 1752, André  Hébert, seigneur de Châteldon, y fait faire d'importants travaux, le château est appelé, folie Hébert, puis au  XIXe siècle, des aménagements concernant les décors intérieurs, au troisième quart  du XXe siècle, le comité d'entreprise Michelin le fait remanier pour y installer une colonie de vacances.                                                                  A cinq kilomètres à l'ouest à Limons le château  de BRAVARDS, édifié au milieu du XVIIIe siècle, peut-être vers 1750 ou 1760, il n'a sans doute jamais été habité à cette époque, ce n'est que dans le dernier quart du XIXe siècle que les travaux  de finition ont été effectués, en particulier l'escalier en andésite du vestibule.","architecture":"BATISSE à PUY-Guillaume, dans son état actuel, le château serait issu d'un manoir érigé au XVIe siècle à l'emplacement de l'édifice primitif. Le  bâtiment s'organisait  selon un plan en L, sur une cour intérieure avec une galerie en étage installée au XVIIe  ou du XVIIIe siècle. Trois tours rondes flanquent  les façades Est et  sud. Le château  est  entouré de nombreuses  dépendances et constitue une enceinte close dont l'accès principal s'effectue par l'intermédiaire d'un pigeonnier  transformé en porche.   La tour pigeonnier a certainement été élevée au  cours de la première campagne  de construction du château du XVIe siècle.  Le pigeonnier-porche en bois et pisé se présente sous  une forme classique en Limagne.  Carré, il repose  sur 4  poteaux renforcés d'aisseliers, et soutiennent le plancher, chacune des faces pleines est à pans de bois divisés en quatre travées de potelets calés à mi hauteur par une rangée d'entretoises. Les compartiments à 2 niveaux ainsi délimités sont garnis de décharges en croix de Saint-André avec hourdis. La tour pigeonnier présente une   pièce basse ornée de dessins et graffitis pouvant remonter au XVIe siècle. \r\nMothe; la façade sur cour est défigurée   par deux escaliers de secours en béton, percements modifiés et le premier étage transformé par adjonction de  cloisons, travaux interrompus en 1985.                                                                                         Bravards, logis à corniche moulurée en  pierre, lucarne à croupe en charpente,  remise en rez de chaussée, grange en comble, pigeonnier carré à lanterneau .","habitants":"Seigneurs de Châteldon\r\n        \"","divers":"Château de Puy-Guillaume, de la Mothe et des Bravards","gps":"","images":["../image/image_63/63_Puy_Guillaume_1.jpg","../image/image_63/63_Puy_Guillaume_2.jpg","../image/image_63/63_Puy_Guillaume_3.jpg","../image/image_63/63_Puy_Guillaume_4.jpg","../image/image_63/63_Puy_Guillaume_5.jpg"]},"Consult_chateau_formulairea895":{"id":"Consult_chateau_formulairea895","dept":"63","canton":"Billom","commune":"Pérignat-sur-Allier","nom":"Pérignat","type":"Vestiges","periode":"XIII","histoire":"PERIGNAT,  seigneurie des Cournon au XIIIe siècle, puis des Montmorin au XVe siècle. Avant 1402,  Jean Gouge est seigneur de Charpaigne et du petit Pérignat. En 1421, Martin Gouge de    Champaigne, évêque de Clermont, chancelier de France, est seigneur de Pérignat. A cette date, sa nièce, Jeanne  Gouge de Charpaigne, son héritière, épouse Jacques de Montmorin. En 1634, Gilbert Gaspard de Montmorin vend  cette terre à Pierre Chalier. En 1674, François Chalier, sieur de Pérignat, réside à Montferrand,   mais en 1689 et 1693,  il habite son château de Pérignat. En 1762, Pierre Chalier obtient l'érection de Pérignat en  comté.               BELLERIVE, George Onslow, compositeur français, 1784-1853, propriétaire du château de Bellerive.  George Onslow est un compositeur français, né à Clermont-Ferrand le 27 juillet 1784 et décédé dans cette même ville le 3 octobre 1853. Il fit construire le château de Bellerive à Pérignat-ès-Allier. Il est un des bienfaiteurs du village. Il était le fils dun seigneur anglais et dune dame de Lembronnais. En 1794, sous la Terreur, la famille Onslow émigra en Allemagne. Cest dans ce pays que Georges Onslow étudia le piano. Revenu à Paris, il étudia lharmonie et la composition, puis se mit à écrire avant de devenir compositeur ainsi que chef dorchestre. Aujourd'hui hôtel restaurant.","architecture":"Vestiges d'enceinte fortifiée du château qui  a été démoli dans les années 1990 et il ne reste aujourdhui quun escalier enfoui sous la végétation. Château situé en contrebas de l'église. Flanquement circulaire près d'un logis reconstruit.","habitants":"Famille de François Chalier                                                          Famille de  George Onslow \r\n        \"","divers":"Vestiges du château foret de Pérignat sur motte féodale de Saint-Georges, château de Bellerive, et de Fontenay.","gps":"","images":["../image/image_63/63_Perignat_1.jpg","../image/image_63/63_Perignat_2.jpg","../image/image_63/63_Perignat_3.jpg"]},"Consult_chateau_formulairee07b":{"id":"Consult_chateau_formulairee07b","dept":"63","canton":"Randan","commune":"Randan","nom":"Randan","type":"Vestiges","periode":"XVIII","histoire":"RANDAN, châtellenie citée au XIIe siècle. Château reconstruit sous le règne de François Ier. En 1661, la terre est érigée en duché. En 1821, Adélaïde d' Orléans, soeur du roi Louis Philippe, acquiert le duché et en entreprend la réhabilitation, agrandi et restaure le château, construit de nombreuses dépendances et réalise un parc. Après sa mort, la chute de la royauté, Randan subit de nombreuses vicissitudes. Après la chute de la Monarchie de juillet (1848), Randan connut de nombreuses vicissitudes mais à la fin du XIXe siècle,  le domaine reprit vie grâce à la comtesse de Paris , petite fille de Louis Philippe (1848-1919) qui entretient et modernise avec passion la propriété auvergnate. En 1925, la château marqua le déclin du domaine Royal qui ferma ses grilles et tomba dans l'oubli.  Pendant la première guerre mondiale, il est   transformé en hôpital.","architecture":"Chateau de Randan  édifié de 1821 à 1825. Vers 1821, travaux exécutés par Fontaine, architecte officiel de la première moitié du XIXe siècle. La façade nord du château est formée d'un corps de logis encadré par deux tourelles hexagonales et deux pavillons en  retour d'angle.,  il résulte de la restructuration et de l'agrandissement d'un édifice du XVIe siècle, il offre une silhouette romantique qui conserve un niveau de réception original organisé autour d'une salle à manger souterraine éclairée par des verrières et accolée à une enfilade de salons. Edifié en briques polychromes et était couvert de hauts toits en ardoise, le bâtiment des cuisines a été élevé en 1828 dans le prolongement du château il possède huit salles voûtées et était couvert d'une vaste terrasse, la chapelle, de style néo-classique a été terminée en 1831, elle conserve l'ensemble de son décor  intérieur (parquets, verrières, stucs,  et trompe l'oeil). La maison de l'inspecteur, le grand commun et l'orangerie constituent les principales dépendances.  Le grand commun est un bâtiment bâti sur un plan en H et comprenait les principaux services liés au fonctionnement du domaine: laiterie, écurie,   sellerie, ateliers.  Détruit par un incendie en 1925.","habitants":"Famille d'Adélaïde d' Orléans, soeur du roi Louis Philippe\r\n        \"","divers":"Vestiges du château de Randan.","gps":"","images":["../image/image_63/63_Randan_1.jpg","../image/image_63/63_Randan_2.jpg","../image/image_63/63_Randan_3.jpg","../image/image_63/63_Randan_4.jpg","../image/image_63/63_Randan_5.jpg","../image/image_63/63_Randan_6.jpg","../image/image_63/63_Randan_7.jpg"]},"Consult_chateau_formulaired916":{"id":"Consult_chateau_formulaired916","dept":"63","canton":"Vertaizon","commune":"Ravel-Lezoux","nom":"Ravel","type":"Forteresse","periode":"XII-XVIII","histoire":"RAVEL, cité en 1147, son premier occupant fut Pierre de Ravel. Entre 1241 et 1271 le comté d'Auvergne avait été donné en apanage à Alphonse de Poitiers, c'est au début du XIIIe siècle que le château est agrandi, à la suite de la prise de l'Auvergne par Philippe Auguste. En 1283 Chatard de Ravel vend la seigneurie au roi Philippe III le Hardi. Propriété royale sous Philippe III le Hardi et Philippe IV le Bel, il fut donné en mai 1294  à Pierre Flotte pour le récompenser de ses service, Il eut de son mariage avec Flandrine de Châtillon-en-Bazois deux enfants, Françoise de Flotte et Guillaume de Flotte de Ravel, sénéchal de Toulouse avant de devenir lui aussi, en 1339, chancelier de France.  Le fils de Guillaume, Pierre, mourut avant lui, après avoir eu de sa femme Marguerite de Chatillon un fils prénommé Guillaume. Sa fille Jeanne n'ayant pas eu d'enfant, elle laissa à sa mort en 1431 la seigneurie à André de Chauvigny.  La fille d'André de Chauvigny, Catherine, l'apporta par son mariage en 1460 à Charles d'Amboise. Guy, issu de leur union, n'a eu qu'une fille, Antoinette d'Amboise, veuve de son cousin Jacques d'Amboise, mariée en 1518 à Antoine de la Rochefoucauld, seigneur de Barbezieux, sénéchal d'Auvergne, fils de François Ier de La Rochefoucauld et de Louise de Crussol. À la Renaissance la famille de Combourcier du Terrail. Leur quatrième fils, François, seigneur de Ravel en 1549, eut trois filles de son union avec Éléonore de Vienne. En août 1584, Gilberte, une de leurs filles en 1647 épousa Jean IV d'Estaing marquis de Saillans qui fit rentrer le château dans cette famille. A la mort de Charles-Henri-Théodat, comte d'Estaing, amiral guillotiné en 1794 pas d'enfant, revient par héritage à une demi-soeur  la marquise de Boysseulh qui le  vendit en 1806  et une partie de son mobilier et des souvenirs des d'Estaing à Charles de Riberolles-Beaucène, dont les héritiers le firent protéger en 1958, le possèdent encore et l'entretiennent. A ce jour, les Brochot et Ramos descendants de cette famille en reste toujours propriétaire.","architecture":"Cette puissante forteresse de Ravel quadrangulaire  irrégulier du XIIe siècle  donjon roman circulaire du  XIIIe siècle et ses cinq tours, dont une octogonale, fut embellie fin XVIIIe siècle par l'amiral d'Estaing, qui laissa son empreinte de nombreux souvenirs de marine. La transformation en demeure seigneuriale classique au XVIIIe siècle a respecté l'ossature gothique et la grande façade sur cour s'appuie sur les tours médiévales. La galerie d'entrée, l'escalier et la salle à manger au rez-de-chaussée, la grande galerie et le salon de musique au premier étage sont des pièces d'ordonnance classique.\r\nLe château remanié aux cours des ans, la chapelle, les terrasses avec leurs murs de soutènement et le petit parc ont été classés MH le 2O mai 1958.","habitants":"Famille de Pierre de Ravel                                                        Famille d'André de Chauvigny\r\n        \"","divers":"Château de Ravel","gps":"","images":["../image/image_63/63_Ravel_1.jpg","../image/image_63/63_Ravel_2.jpg","../image/image_63/63_Ravel_3.jpg","../image/image_63/63_Ravel_4.jpg","../image/image_63/63_Ravel_5.jpg","../image/image_63/63_Ravel_6.jpg","../image/image_63/63_Ravel_7.jpg","../image/image_63/63_Ravel_8.jpg"]},"Consult_chateau_formulaire9abd":{"id":"Consult_chateau_formulaire9abd","dept":"63","canton":"Combronde","commune":"Teilhède","nom":"Raynauds","type":"Château","periode":"XV-XIX","histoire":"RAYNAUDS, cette demeure, d'origine templière, puis hospitalière,  en 1792, à l'époque révolutionnaire le château fit l'objet des fameuses visites domiciliaires afin de rechercher d'éventuels réfractaires. Les états généraux de l'Auvergne   s'étant  rapidement rattachés  à la convention, de  nombreux châteaux de la province  dont celui ci furent sauvés de la destruction. Il fut transformé en relais de  chasse au XIXe siècle, a appartenu dès le début à une famille de bourgeois, tanneurs à Riom dont on peut reconnaître le blason sur la cheminée en pierre de Volvic du grand salon au rez de chaussée.  Du mariage avec la noblesse le nom de famille devint Valeix d'Auteroche, cette dernière intégrant rapidement la magistrature du Roi.  Henri Pourrat a toutefois  séjourné en ces lieux. Aujourd'hui transformé en chambres d'hôtes par la famille Simon.","architecture":"Le château des Raynauds possède trois tours, deux en façades et une à l'arrière,  la tour de gauche en façade aurait été une petite chapelle. On y trouve des pierres sculptées et un vitrail rapporté au XIXe siècle, provenant probablement de l'ancien prieuré ruiné  de Teilhède (ce prieuré était roman et la forme du vitrail  laisse à penser qu'il est également d'origine romane). Toutes les tours datent du XIXe siècle, cet enjolivement ayant été réalisé  par les différents propriétaires à partir du XIXe siècle. Les pierres qui sont au-dessus des portes  et des fenêtres des tours  seraient des pierres rapportées\r\n prises soit à l'ancienne église ou à l'ancien prieuré de Teilhède. \r\n Au  XIXe et XXe siècles, la demeure continua d'être habitée  par des juristes et  par des écrivains à la diffusion très  confidentielle. Une colonne située  dans le couloir a été rajoutée au  XIXe siècle à l'époque  où les parties arrières  ont été aménagées. Elle se trouve exactement à  la jonction des parties anciennes et plus récentes. Un escalier à vis faisant partie du cube templier d'origine permet l'accès à l'étage.","habitants":"Famille de Valeix d'Auteroche                                                 \r\nFamille de Henri Pourrat\r\n        \"","divers":"Château des Raynauds.","gps":"","images":["../image/image_63/63_Raynauds_1.jpg","../image/image_63/63_Raynauds_2.jpg","../image/image_63/63_Raynauds_3.jpg"]},"Consult_chateau_formulaire9413":{"id":"Consult_chateau_formulaire9413","dept":"63","canton":"Sauxillanges","commune":"St-Genès-la-Tourette","nom":"Real_Tourette","type":"Château","periode":"XVII","histoire":"REAL, avant 1540, Jean du Floquet, seigneur du Réal, de Terreneyre, du Cerf et de la Tourette,  est lieutenant  général en la châtellenie d'Usson.  A sa mort, ses fils, François et Damien se partagent le Réal. Vers 1588 Vidal du Floquet, fils de Damien du Floquet, co-seigneur du Réal,  En 1631 Marguerite du Floquet,  dame du Réal pour la part héritée de François,  épouse René de Girard,  seigneur de  la Richerie, trésorier général de France à Riom. En 1670, leur fils   Alexandre en rend   hommage. En 1788, il appartient à Jacques Boyer,  seigneur de Saunat,  Avant 1723, Pierre Antoine du Floquet   donne sa part   du Réal à Jean Marie de  La Chassaigne de Sereys.  La paroisse fut longtemps découpée en de multiples petits domaines et fiefs, le plus important restant le Réal avec sa maison forte. Les familles nobles du Floquet puis de la Chassaigne de Sereys s'y sont succédé. Cette dernière fit ensuite construire le château de Saint Genés au milieu du XVIIe siècle, dit château de la Tourette. Au XVIIIe siècle, le château appartint aux de La Chalambelle, originaires de Saint Germain lHerm. Ils lembellirent, occupèrent le château jusquau XIXe siècle. Entre 1885 et 1887, la propriété changea plusieurs fois de mains. En 1888, un certain M. Vialar, originaire de St Germain LHerm, ayant fait fortune dans la confection acheta le domaine. Il en entreprit la restauration. Le domaine appartint ensuite au petit-fils de Mme Vialar, le docteur Roland Cailleux.","architecture":"Château construit  au XVIIe siècle, situé à 1,8 km au nord-est  du bourg. D'une enceinte quadrangulaire, il subsiste un flanquement circulaire dérasé percé d'une canonnière horizontale à la base. Reste d'un grand logis remanié. De la bergerie il fit faire une vaste salle à manger dont les murs sont tapissés dAubusson avec cheminée et niches murales en buis. Il fit refaire les toitures des tours du jardin en tuiles plates et fit remettre des grilles aux entrées principales.","habitants":"Famille de René de Girard,                                                    \r\nSeigneur de  la Richerie\r\n        \"","divers":"Château de Réal et de Tourette.","gps":"","images":["../image/image_63/63_Real_Tourette_1.jpg","../image/image_63/63_Real_Tourette_2.jpg","../image/image_63/63_Real_Tourette_3.jpg"]},"Consult_chateau_formulaire865b":{"id":"Consult_chateau_formulaire865b","dept":"63","canton":"Riom","commune":"Riom","nom":"Riom","type":"Château","periode":"XV-XVII","histoire":"RIOM, plusieurs châteaux dans cette commune.                                  DAGNEAUX, avant 1500, Vincet Faure est seigneur.  Sa fille Jeanne, porte le château par mariage à Bértrand de Veyny, fils d'Aubert seigneur de Fernoel. Puis la fille de celui-ci le porte à Imbert de La Blanchisse. En 1622, Mathieu de La Blanchisse est seigneur des Dagneaux, La Blanchisse, Beauvezeix-Grandval, Lodant et La Satonie en Courptère. En 1631, à Mathieu de la Blanchisse. Transformé en hôtel restaurant.                           MIRABEL ,  château du XVIIe siècle qui a été remanié dans le dernier tiers du XVIIIe siècle. Il semble qu'à  cette époque  le bâtiment ait été doublé d'appartements s'exprimant en façade par une ordonnance  d'architecture Louis XVI. L'ensemble des façades a conservé presque toutes ses menuiseries anciennes.\r\n A l'intérieur, appartements décorés dans les styles des XVIIe et XVIIIe siècles. La salle à manger est couverte de voûte décorée   de peintures et  possède une curieuse cheminée à  personnage figurant Philémon et Baucis.  L'aile des communs,  qui fait suite au sud et dont le pendant nord n'a sans doute jamais existé,  est également  d'époque Louis XVI.                                         MACHOLLES grande,  avant 1525, Antoine de Ceriers, trésorier de France à Riom, est seigneur. Le château passe ensuite à son petit-fils  Michel du Bourg. En 1689, Pierre Duboy achète les Grandes et Petites Macholles aux héritiers du Bourg. En 1773,  sa soeur, Marguerite Duboy le porte par mariage à Amable Soubrany de Bénistant. En 1792, leur fils est député à la convention.","architecture":"Château Dagneaux édifié au XIVe siècle situé à l'est du bourg en direction d'Ennezat.  Deux logis-tours voisins sont réunis par  un corps intermédiaire. Ils sont arasés et recoiffés  en appentis. L'une des tours, haute encore de quatre niveaux, est flanquée d'une tour circulaire qui contient un escalier accessible depuis l'intérieur. L'autre tour   est haute de trois niveaux   dont un haut rez-de-chaussée aveugle, il contient  un escalier en vis intérieur. Un autre logis rectangulaire, de trois niveaux, ferme une cour.                       Mirabel  Le château apparait ainsi divisé en trois parts. le châteaux de Mirabel-Marsatet un grand patrimoine dans la ville, le château de la Grande Macholles   château construit à la fin du XVIe siècle et au XVIIe siècle, situé à 3,5 km au sud-est de Riom sur la rive nord. Logis de trois niveaux flanqué sur l'un des côtés de tours carrées, sur l'autre d'une tour ronde, le quatrième angle  est transformé.  On trouve en face des Grandes Macholles, le château des Petites Macholles, composé d'une grande enceinte à flanquements cylindriques d'angle, il en reste deux dont l'un est souligné par des cornons plats. Il abrite aujourd'hui une exploitation agricole.","habitants":"Famille de Mathieu de La Blanchisse\r\n        \"","divers":"Château de Dagneaux, de Macholles, de Marsat Mirabel, tour de l'horloge et patrimoine divers","gps":"","images":["../image/image_63/63_Riom_1.jpg","../image/image_63/63_Riom_2.jpg","../image/image_63/63_Riom_3.jpg","../image/image_63/63_Riom_4.jpg","../image/image_63/63_Riom_5.jpg","../image/image_63/63_Riom_6.jpg","../image/image_63/63_Riom_7.jpg"]},"Consult_chateau_formulaire3cb8":{"id":"Consult_chateau_formulaire3cb8","dept":"63","canton":"Poinsat","commune":"Roche-d`Agoux","nom":"Roche_Agoux","type":"Vestiges","periode":"XI","histoire":"ROCHE d'AGOUX, au XIe siècle apparait une famille éponyme. Vers 1255, le fief est à Guillaume de Rochedagoux,  chevalier.  En 1248, Archambaud de Bourbon cède sa suzeraineté sur Pionsat et la Roche à Alphonse de Poitiers, frère du roi  Louis IX, en 1271, ces droits passent à la couronne. Après cette date, le Roi Philippe III le Hardi donne ses droits  sur la Roche à Humbert de Beaujeu, seigneur de Montpensier,  (Aigueperse et Herment à la mort de son frère). Au court du XIVe siècle, sont cités des membres de la famille éponyme qui tiennent le fief, en 1311 Guillaume, en 1351 Pierre, et en 1396 Guillaume.  En 1524,  Gilbert de Rochedagoux fait don du fief à son neveu Pierre d'Anglard. En 1675, Henri d'Anglard, écuyer, seigneur de Roche-d'Agoux et   Rochedragon, habite au château, Avant   1710,  la  seigneurie est achetée   par Antoine-Joseph Rollet, seigneur  de Lauriat, trésorier-général   de France à Riom, qui en rend hommage au roi. En 1740, sa fille Pérette l'apporte en dot à Pierre Chardon des Roys.","architecture":"Petit bourg, bâti sur les flancs dun piton  de quartz, entoure ce dôme dit « château Banu » qui culmine à 732 m daltitude. En ce lieu témoin dun passé prestigieux, le château féodal dune superficie très importante et délimitable encore aujourdhui par ses murailles denceinte, a des mensurations de 300 m sur 70 m.  Cette forteresse a eu toute sa notoriété puisque les seigneurs du IX-XIe siècle disposaient de lensemble domanial du canton et débordaient même sur lAllier. Les vestiges de ce château sont encore impressionnants.  Château-fort ruiné sur une plate-forme. Reste d'une grande enceinte polygonale talutée et flanquée, très dérasée, vestiges de bâtiments. Une enceinte extérieure est percée de courtes archères.","habitants":"Famille de  Humbert de Beaujeu\r\n        \"","divers":"Vestiges du château féodal sur motte.","gps":"","images":["../image/image_63/63_Roche_Agoux_1.jpg","../image/image_63/63_Roche_Agoux_2.jpg"]},"Consult_chateau_formulaire3e2e":{"id":"Consult_chateau_formulaire3e2e","dept":"63","canton":"Aigueperse","commune":"Chaptuzat","nom":"Roche_Chaptuzat","type":"Forteresse","periode":"XIII-XV","histoire":"ROCHE, il a été construit entre 1250 et 1270 à l'initiative de Guichard IV et d'Humbert de Beaujeu, seigneurs de Montpensier, probablement à partir d'une tour de guet du XIIIe siècle, avant poste du puissant château de Montpensier perché sur une colline environnante, qui contrôlait l'accès à la plaine de Limagne.\r\nLa Roche est érigé en fief au XVe siècle pour Louis de Bosredon,  un logis est construit avec de simple fortification et devient une habitation seigneuriale. Le château reviendra ensuite à Jean de l'Hospital, conseiller de Charles de Bourbon, comte de Montpensier puis à son fils, le chancelier Michel de L'Hospital qui y était né. Il le transforma au XVIe siècle édifiera une seconde muraille avec deux tours d'entrée en façade sud et sa famille le conserva jusqu'au XVIIIe siècle.Le château de la Roche a été inscrit monument historique le 9 octobre 1965 et la tour ovale a été classée le 25 janvier 1981.","architecture":"Une enceinte fortifiée en forme de fer à cheval édifiée vers 1250 composée d'une première tour ovale en extrémité du ravin exposée Nord, puis d'un donjon circulaire exposé Sud. Le donjon rectangulaire actuel a lui été édifié au XIVe siècle sur les fondations du donjon circulaire très endommagé suite au siège de la forteresse à la fin de la guerre de cent ans. Le logis et les autres bâtiments ont été construits au XVe siècle, adossés à l'enceinte surmontée d'un chemin de ronde et se répartissent autour d'une cour. Une seconde enceinte édifiée au XVIe siècle dont il reste des parties de murailles et deux tours rondes coiffées de créneaux et de mâchicoulis récents abritait la basse-cour, et un fossé formait la défense extérieure « château de La Roche», base Mérimée, ministère français de la Culture.","habitants":"Famille de  Louis de Bosredon\r\n        \"","divers":"Château de la Roche.","gps":"","images":["../image/image_63/63_Roche_Chaptuzat_1.jpg","../image/image_63/63_Roche_Chaptuzat_2.jpg","../image/image_63/63_Roche_Chaptuzat_3.jpg","../image/image_63/63_Roche_Chaptuzat_4.jpg","../image/image_63/63_Roche_Chaptuzat_5.jpg","../image/image_63/63_Roche_Chaptuzat_6.jpg","../image/image_63/63_Roche_Chaptuzat_7.jpg","../image/image_63/63_Roche_Chaptuzat_8.jpg","../image/image_63/63_Roche_Chaptuzat_9.jpg"]},"Consult_chateau_formulaire37fb-3":{"id":"Consult_chateau_formulaire37fb-3","dept":"63","canton":"Aigueperse","commune":"Charbonnières-les-Vieilles","nom":"Rochegude(63)","type":"Château","periode":"XVIII","histoire":"ROCHEGUDE, appartenait en 1523 à Jacques Masuer, en 1599, le domaine était entre les mains de Claude dAnglards. Le château actuel date  du XVIIIe siècle ,  remanié  par Louis Desaix  seigneurie de Gioux, qui avait épousé, en 1757, Claudine Charlotte de Bouchereau de Pognat, dont la grand mère, née dAnglards, sétait mariée avec Anselme de Bouchereau de Pognat.  Louis Desaix, chevalier et capitaine au régiment de Nice, était le fils de Sylvain Desaix, Seigneur de Veygoux, sur Charbonnières-les-Varennes. Le frère de Louis, Gilbert Antoine, eut pour fils Louis Charles Antoine, le célèbre général tué à Marengo le 14 juin 1800. Ce futur héros des campagnes de Bonaparte vint, alors enfant, à plusieurs reprises à Rochegude pour des séjours dété chez son oncle et sa cousine Marie Amable Alix, laquelle épousera Gabriel Amable Auguste Onslow, frère de Georges, compositeur de musique.   Jusquen 1846, la propriété de Rochegude sera donc entre les mains de la famille Onslow, qui agrandit les bâtiments existants. Auguste vendit lensemble à Jean-Félix Hom, négociant à Paris, fils dun notaire de Charbonnières.  En 1864, Jean-Félix cède à son tour la propriété à Jean-Constant Durand, natif du Cantal , ex-commerçant en tissus à Lyon. Monsieur Durand sera maire de Charbonnières de 1865 à 1870.  Dans les années 1880, lécrivain Guy de Maupassant séjournera à Rochegude à plusieurs reprises, et y composera le roman de Mont-Oriol. Célibataire, Jean-Constant Durand mourra en 1899. Le domaine sera vendu et morcelé. Le château passera au groupe Goyon, avoués et avocats de Riom, puis revendu à Gilbert Croisier, de Combronde. Pendant la guerre de 14-18, il abritera un cantonnement de prisonniers allemands.  En 1928, Étienne Martin acquit le château.   Maître Détruit, notaire à Riom, succédera à Étienne Martin, réhabilitant les bâtiments. Disparu prématurément, cest son épouse qui a actuellement la charge de la propriété.","architecture":"Rochegude, situé à quelques centaines de mètres au sud du Gour de Tazenat, fut dans la nécessité dy faire des aménagements indispensables en 1928  à son exploitation agricole. Ainsi, la salle à manger sera transformée en étable pour loger le bétail de ce nouveau propriétaire.  \r\nCorps de logis en équerre à trois niveaux toitures peu élevé en croupes.","habitants":"Famille de Louis Desaix  seigneur de Gioux\r\n        \"","divers":"Château de Rochegude.","gps":"","images":["../image/image_63/63_Rochegude(63)_1.jpg"]},"Consult_chateau_formulaire13bb":{"id":"Consult_chateau_formulaire13bb","dept":"63","canton":"Menat","commune":"St-Remy-de-Blot","nom":"Rocher","type":"Vestiges","periode":"XI","histoire":"ROCHER sur la commune de Saint-Rémy-de-Blot. Château de la fin du XIe siècle dominant la Sioule et construit par Archambaud IV le Fort de la maison de Bourbon. Le château est situé en surplomb du pont de Menat (commune de Menat) et permettait de contrôler le passage par ce pont enjambant la Sioule, entre Auvergne et Bourbonnais, (appelé à l'origine « Blot-le-Château ») est situé sur une falaise de 150 mètres qui surplombe la Sioule. La forteresse a été construite à la fin du XIe siècle à l'initiative d'Archambaud le Fort, seigneur de Bourbon. Aujourd'hui, le château est en ruines, mais depuis 1964, l'association Château-Rocher a entrepris des travaux de consolidation. L'accès au site est gratuit une partie de l'année. En juillet et août, et propose des visites guidées.  Château de Saint-Quintin, à Saint-Quintin-sur-Sioule, en bordure de rivière, à droite, avant Ébreuil.","architecture":"Château Rocher, encore appelé château fort de Blot le rocher, est un château fort médiéval en ruines, situé à 438 m d'altitude, sur une falaise de 150 mètres qui surplombe la Sioule. Son objectif était la surveillance de la vallée , lieu de passage entre l'Auvergne et le Bourbonnais. L'édification et l'agrandissement du château-fort se sont poursuivis jusqu'au XIIIe siècle, mais il semble avoir perdu de son importance  stratégique à partir du XVe siècle. Il aurait été abandonné au cours du XVIIe siècle.  On accédait  à Château Rocher par un  pont en maçonnerie franchissant le fossé et la porte percée dans l'enceinte extérieure. Une seconde enceinte existait devant les deux tours Est. Trois tours principales flanquaient les fronts  Est et Nord.","habitants":"Famille d'Archambaud IV \r\n        \"","divers":"Vestiges de la forteresse Rocher","gps":"","images":["../image/image_63/63_Rocher_1.jpg","../image/image_63/63_Rocher_2.jpg","../image/image_63/63_Rocher_3.jpg","../image/image_63/63_Rocher_4.jpg","../image/image_63/63_Rocher_5.jpg","../image/image_63/63_Rocher_6.jpg","../image/image_63/63_Rocher_7.jpg","../image/image_63/63_Rocher_8.jpg","../image/image_63/63_Rocher_9.jpg"]},"Consult_chateau_formulaire95bb":{"id":"Consult_chateau_formulaire95bb","dept":"63","canton":"Pontgibaud","commune":"St-Ours","nom":"Roches_Coffins","type":"Château","periode":"XV","histoire":"ROCHES-COFFINS, en 1160 est cité Hugues de Coffins. En 1222 Le Turc de Meyronne reçoit le fief de Guillaume Dauphin. En 1344, son descendant Béraud Le Turc de Meyronne possède la Tour des Roches de Coffins. En 1362, Amédée Dauphin   vend le fief à Pierre Aymé (ou Eymé), chanoine de Clermont. En 1450, Pierre Aymé, seigneur des Roches, figure dans l'armorial de Revel. En 1674. François Aymé des Roches, chevalier,  en 1689, il déclare  \"devoir plus que son bien ne vaut\", la famille Aymé reste seigneur des Roches jusqu'en 1756.","architecture":"Château construit au XVe siècle, situé à 3.5 km au sud est du bourg, rive sud. Reste d'une enceinte  quadrangulaire à flanquements circulaires d'angle; il en reste deux accolés à un logis très remanié au XIXe siècle.","habitants":"Famille de Béraud Le Turc de Meyronne\r\n        \"","divers":"Château à Saint-Ours","gps":"","images":["../image/image_63/63_Roches_Coffins_1.jpg"]},"Consult_chateau_formulairee9dd":{"id":"Consult_chateau_formulairee9dd","dept":"63","canton":"St-Dier-d`Auvergne","commune":"Estandeuil","nom":"Rochette_Estandeuil","type":"Vestiges","periode":"XVI","histoire":"ROCHETTE, à Estadeuil, le plus ancien propriétaire connu est Hugues de Bohenc, marié à Blanche de Montmorin.  En 1864, la Rochette est achetée par des fermiers du pays. La tour, utilisée comme bâtiment agricole, tombera bientôt en ruines. Les propriétaires s'en sont définitivement retirés au début du XXe siècle. Elle a été rachetée en 1972 par les propriétaires actuels, restaurée puis habitée à nouveau à partir de 1994. Ceux-ci ouvrent les portes de cet édifice restauré avec goût au cours des Journées Européennes du Patrimoine.","architecture":"Le village d'Estandeuil  abrite aux abords de son bourg les vestiges d'un château au lieu-dit La Rochette dont la partie la plus singulière en est sa grosse tour cylindrique de 16 mètres de diamètre.  Au XIIe siècle, construction d'un château. Au XVe siècle, le château est transformé  La tour actuelle n'a été construite qu'à la fin du XVe siècle, constituant  le donjon du XVIe siècle  s'appuyant en partie sur les restes des murs du château en ruine. Ce n'était pas un bâtiment de défense mais une demeure seigneuriale.  Au XXIe siècle, la découverte de l'extérieur depuis le sentier est possible.  Le plus surprenant est la présence de fenêtres à meneau en croix. Ces ouvertures importantes et nombreuses sont incompatible avec un donjon défensif. Les grandes fenêtres ont certainement remplacé les archères et ce donjon paraît indéfendable.  Mais avec un peu d'attention il est possible de voir des vestiges de construction en encorbellement correspondant à des bretèches.","habitants":"Famille d'Hugues de Bohenc\r\n        \"","divers":"","gps":"","images":["../image/image_63/63_Rochette_Estandeuil_1.jpg","../image/image_63/63_Rochette_Estandeuil_2.jpg","../image/image_63/63_Rochette_Estandeuil_3.jpg","../image/image_63/63_Rochette_Estandeuil_4.jpg"]},"Consult_chateau_formulaire33ae":{"id":"Consult_chateau_formulaire33ae","dept":"63","canton":"Aubière","commune":"Romagnat","nom":"Romagnat","type":"Château","periode":"XV","histoire":"ROMAGNAT, ces cinq châteaux dont le château dOPME, qui, seul, offre une tour fortifiée (voir article), et les châteaux de BEZANCE  (mairie), de LA PRUGNE, de SAULZET-LE-CHAUD et de CLÉMENSAT, qui sont plutôt des castelets que de véritables châteaux.\r\nCLEMENSAT, au XVe siècle, la maison forte relève du château de Montrognon qui est dans le domaine royal.  En 1764,  elle  est    vendue avec les seigneuries de Romagnat et de Montrognon, par Charles Geoffroy de La Tour d'Auvergne, duc de   Bouillon, à Pierre-François-Benoit Guerrier, seigneur de Bezance, avocat-général à la cour des Aides de Clermont.\r\nPRUGNE, en 1301, Hugues de Montrognon, seigneur d'Opme, rend hommage pour le fief de la Prugne. Vers 1495 Antoinette de Montrognon porte le château par mariage à Pierre de Rochefort, seigneur de Villette et d'Esparcieux. En 1607, il est acheté par René Faure, trésorier   général de France à Riom, en 1626, sa veuve le revend à Amable Pommier, concierge des prisons et capitaine   du château de Riom. Avant 1630, la demeure est saisie et adjugée  à  François de Girard, écuyer,  qui en rend hommage en 1664 et 1669. En 1713 Jeanne de Girard le porte par mariage à Pierre de Freydefont, seigneur de Sauvagnat, conseiller à la cour des Aides de Clermont. En 1768,  Auguste Jean François Chaillon, chevalier, seigneur de Joinville, président au grand conseil du parlement de Paris,  épouse Anne   Marie de Freydefont et   devient co-seigneur de La Prugne. En 1789, Jean Gabriel de Freydefont est seigneur de La   Rochette et de La Prugne.   Bezance devenue hôtel de ville.","architecture":"Clemensat,  château remanié, situé à 1,5 km au sud-est de Ceyrat. C'est un haut   logis-tour rectangulaire de trois travées sur trois niveaux;  un refend auquel sont adossées les cheminées,  isole une travée. Deux tours circulaires sont accolées  à un pignon. Au pignon opposé, les tours ont été détruites lorsque le logis a été allongé d'une construction plus basse.                               \r\nChâteau de la Prugne édifié au XVe siècle, situé en limite Ouest de l'agglomération sur la rive nord de la route vers Clémensat.  Enceinte quadrangulaire à flanquements circulaires d'angle, il en reste deux accolés à un logis, côté cour, le logis de trois travées sur deux niveaux est accosté d'une tour polygonale d'escalier.","habitants":"Famille de Pierre de Rochefort\r\n        \"","divers":"Château de Romagnat,  de Clémensat, de Bezance et de la Prugne","gps":"","images":["../image/image_63/63_Romagnat_1.jpg","../image/image_63/63_Romagnat_2.jpg","../image/image_63/63_Romagnat_3.jpg","../image/image_63/63_Romagnat_4.jpg"]},"Consult_chateau_formulaire831b-2":{"id":"Consult_chateau_formulaire831b-2","dept":"63","canton":"Combronde","commune":"Beauregard-Vendon","nom":"Rouzat","type":"Château","periode":"XIX","histoire":"ROUZAT, le château, tel qu'il se présente aujourd'hui, date du XIXe siècle, mais édifié sur les bases anciennes d'une maison-forte du XVe siècle. En 1511 Gilbert de Courtaurel est cité sieur de Rouzat. En 1666, Pierre de Courtaurel est sieur de Rouzat. En 1674, Jean de Courtaurel, seigneur de La Tour, habite le château. En 1689, Charles de Courtaurel, écuyer, est  seigneur de Rouzat, il habite Le Bourgnon en Tours sur Meymont. En 1785, le château est vendu par le comte de Courtaurel à Gilberte de Laval, femme de Bernard de Fretat, seigneur de Chirat.  Le château de Rouzat, acheté en 1905 par le banquier Henry Lartigue, père du photographe Jacques-Henri Lartigue. Provisoirement ruiné par des spéculations, il doit le revendre en 1923.","architecture":"Le château est composé d'un logis rectangulaire de trois niveaux à poivrières d'angle sur consoles. A quelques   mètres derrière le logis,  est conservée la base de la tour de Rouzat,  donjon cylindrique de 6 à 7 m de diamètre.  On y a découvert deux tombeaux médiévaux des seigneurs de ce lieu.","habitants":"Famille de Gilbert de Courtaurel\r\n        \"","divers":"Château de Rouzat.","gps":"","images":["../image/image_63/63_Rouzat_1.jpg","../image/image_63/63_Rouzat_2.jpg"]},"Consult_chateau_formulaire92cd":{"id":"Consult_chateau_formulaire92cd","dept":"63","canton":"Royat","commune":"Royat","nom":"Royat","type":"Château","periode":"XV","histoire":"ROYAT,  est essentiellement connue pour ses eaux thermales, depuis l'installation de bains romains, qui furent utilisées notamment par Napoléon III et l'Impératrice Eugénie et qui demeurent l'un des principaux attraits de la ville. \r\nPARADIS, très belle bâtisse aux allures de château médiéval dominant toute l'agglomération, restaurant Le Paradis, propriété de la famille Blanc qui vous reçoit depuis 1964 dans la tradition pour vos mariages,                                                                         CHARADE, transformé en chambres d'hôtes.","architecture":"Royat est située sur les hauteurs qui dominent Clermont-Ferrand, sur les contreforts du plateau granitique constituant la chaîne des puys. Cette ville se situe donc sur la faille de la Limagne.                                Paradis, l'histoire commence au temps des Gaulois, ou sur l'emplacement du Paradis fut érigé une construction cyclopéene par les druides. Vercingétorix s'en servit comme réserve pendant sa lutte contre César. Plus tard, c'est le même Jules César qui construisit à proximité les thermes de Royat. Le lieu, agrandit par César fut pendant près de 4 siècles un poste romain et un observatoire, de par sa position en hauteur. Pendant le Moyen-Age, tout fut détruit et sa reconstruction ne se fit qu'à la fin du XIXe siècle dans un style moyenageux corps de logis en équerre à cinq niveaux flanqué de tours rondes arasées sur angle sud.                                                                                                                     Charade, corps de logis rectangulaire à deux niveaux et attiques flanqué de tours rondes et tourelles à l'opposée toitures en poivrières.","habitants":"Impératrice Eugénie\r\n        \"","divers":"A Royat station thermal donc  plusieurs châteaux, le Charade, le Paradis etc.","gps":"","images":["../image/image_63/63_Royat_1.jpg","../image/image_63/63_Royat_2.jpg","../image/image_63/63_Royat_3.jpg","../image/image_63/63_Royat_4.jpg","../image/image_63/63_Royat_5.jpg","../image/image_63/63_Royat_6.jpg","../image/image_63/63_Royat_7.jpg"]},"Consult_chateau_formulairef8b1":{"id":"Consult_chateau_formulairef8b1","dept":"63","canton":"Gerzat","commune":"Gerzat","nom":"Sampigny","type":"Château","periode":"XVI","histoire":"SAMPIGNY,  le château de Sampigny est construit en 1668 pour Pierre de Vernaison, receveur des consignations de Riom. En 1732, par mar
