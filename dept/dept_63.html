it-on, était: « Garde le traître et la dent ». Autrement dit, une forteresse aussi imprenable n'avait d'autres dangers à redouter qu'un traître ou la famine. Fortement marqué par les deux décennies durant lesquelles Marguerite de Valois, surnommée \"la Reine Margot\", séjourna entre ses murs, le village d'Usson préserve son patrimoine et le met en valeur.\r\n Classé parmi les plus beaux villages de France, Usson est perché sur une butte volcanique où prônait, autrefois, une puissante forteresse. Du sommet, un panorama exceptionnel s'offre aux visiteurs sur la chaîne des Puys, le massif du Sancy et les monts du Livradois - Forez. Chef-lieu d'une viguerie au Xe siècle et siège d'une prévôté royale du bailliage d'Auvergne au XIIIe siècle, Usson présente d'impressionnants vestiges de la triple enceinte, flanquée de tours, et du château lui-même, détruit sur ordre royal au XVIIe siècle. Cet édifice, embelli par Jean de Berry et restauré par Louis XI, est célèbre pour avoir abrité Marguerite de Valois, jeune épouse turbulente d'Henri de Navarre entre 1586 et 1605.","architecture":"De sa splendeur passée, Usson conserve quelques vestiges de la triple enceinte de l'ancienne forteresse, mais également de belles demeures des XVe et XVIe siècles, ainsi qu'une charmante église romane. Aujourd'hui le château a disparu, mais l'empreinte de la Reine Margot est encore là, en particulier le souvenir de sa générosité pour les plus démunis. De sa splendeur passée le village conserve de superbes demeures, ainsi que d'anciennes maisons de vignerons. Au sommet de la butte, une vierge monumentale, dédiée aux aviateurs, fut érigée en 1893.","habitants":"Marguerite de Valois\r\n        \"","divers":"Vestiges du château féodal d'Usson","gps":"","images":["../image/image_63/63_Usson_1.jpg","../image/image_63/63_Usson_2.jpg","../image/image_63/63_Usson_3.jpg","../image/image_63/63_Usson_4.jpg","../image/image_63/63_Usson_5.jpg","../image/image_63/63_Usson_6.jpg","../image/image_63/63_Usson_7.jpg","../image/image_63/63_Usson_8.jpg"]},"Consult_chateau_formulairefdf2-2":{"id":"Consult_chateau_formulairefdf2-2","dept":"63","canton":"Arlanc","commune":"Dore-l`Eglise","nom":"Varette","type":"Château","periode":"XVI","histoire":"VARETTE, vers 1600, Amable de Myet, écuyer, est seigneur de Varette et La Reveille. En 1639,  sa fille Madeleine l'apporte par mariage à Louis de la Rochenégly. En 1674, Jean Baptiste de Vallard, écuyer, seigneur de Varette (ou Vabrette)  habite La Revoute, paroisse de Dore l'Eglise. En 1787, le fief est vendu en deux parties, le domaine avec moulin,   un laboureur du nom de Couderc et le reste appelé la directe à Catherine de la Rochenégly, dame de la Reveille et de La Redoute, proche parente, épouse de Thomas-Marie du Puy de la Frédière.  \r\nA quelques kilomètres à l'ouest à Saint-Alyre d'Arlanc le château de  CHENERAILLES,   en 1668, Antoine Bardon est seigneur de Chénérailles et réside au château avec ses frères Guillaume et François.                                                                               EYSSAC, au XIe siècle, Etienne Bravard figure avec Pons de Clavelier parmi les officiers de l'abbaye de La Chaise-Dieu. En 1252, Robert Bravard, chevalier, est seigneur. En 1275 et 1283, Etienne Bravard, damoiseau, seigneur d'Essay, doit l'hommage pour une partie de ses biens à l'abbaye de La Chaise-Dieu. En 1330, son fils Robert est seigneur.  En 1426, Jean Bravard, vassal   du seigneur   de Clavelier, fait   aveu pour   son \"hostel   d'Ayssac\".","architecture":"le château de Varette  construit au XVIe siècle, est situé à 500 mètres au sud ouest du bourg vers la Chaise-Dieu. Reste d'une enceinte quadrangulaire à   flanquements cylindriques d'angle. L'une des tours est  conservée à l'angle d'un logis de deux niveaux; une autre très dérasée, percée à la base d'une canonnière, est à l'angle d'une dépendance.                               Chenerailles à st-Alyre d'Arlanc, ce château est situé à 3 km à l'ouest du bourg sur la rive sud . Dans un logis très remanié  après deux incendies, porte en accolade sur une face et six canonnières sur les trois autre faces (deux par face)  et  au XVIIe siècle.     Le  château d'Eyssac est encore aux Bravard, château situé à 2 km au nord-est du bourg, au hameau. Base d'un donjon-logis (salle à voûte effondrée)  et pierres à modénature (dont une porte)  récupérées par les maisons du hameau.  La tour était encore debout au XIXe siècle.","habitants":"Famille d 'Amable de Myet\r\n        \"","divers":"Château de la Varette.","gps":"","images":["../image/image_63/63_Varette_1.jpg"]},"Consult_chateau_formulaire6042":{"id":"Consult_chateau_formulaire6042","dept":"63","canton":"St-Amant-Tallende","commune":"Chanonat","nom":"Varvasse","type":"Château","periode":"XVI","histoire":"VARVASSE est devenu la propriété de la famille de Valéry Giscard d'Estaing, quand son père  maternel Jacques Bardoux, fut maire de Chanonat, lacheta dans les années 1933 à Marie de Bellaigue de Soulhat. Elle tenait Varvasse de son arrière-grand-père Augustin de Bellaigue de Bughas (1795-1876) qui l'a acheté en 1848 à M. de Riberolles. C'est le fils d'Augustin, le vicomte Victor de Bellaigue de Bughas (1828-1894), inspecteur général des finances qui restaure le château en 1886 et élève l'aile gauche d'un étage, son frère le père Henri de Bellaigue a fait construire la chapelle, dessiné et exécuté les gargouilles et le bas relief.  Valéry Giscard d'Estaing  y a habité lorsquil était maire de Chamalières (1967-1974) puis président de la région Auvergne (1986-2004).","architecture":"Château de La Varvasse, d'origine médiévale, remanié aux XVIe, XVIIIe et XIXe siècles. Décor intérieur caractéristique des réalisations du début du XIXe siècle. Jardin à la française et système hydraulique caractéristiques du goût du début du XVIIIe siècle (appliqué ici tardivement) . Chapelle de la fin du XIXe siècle. Ferme réaménagée vers 1860.date protection MH 1995/11/24 : inscrit MH Ensemble du domaine comprenant le château en totalité, y compris les pièces suivantes avec leur décor : salle à manger, pièce dite de Savaron, chambre à alcôve ; le portail extérieur, la chapelle, la ferme avec son enclos et son pigeonnier, lensemble des jardins (parterres, verger, potager, bois, terrasses) avec leur système hydraulique (canal, bélier, bassin, fontaine)","habitants":"Valéry Giscard d'Estaing\r\n        \"","divers":"Château de Varvasse","gps":"","images":["../image/image_63/63_Varvasse_1.jpg","../image/image_63/63_Varvasse_2.jpg","../image/image_63/63_Varvasse_3.jpg","../image/image_63/63_Varvasse_4.jpg"]},"Consult_chateau_formulaire54b9-2":{"id":"Consult_chateau_formulaire54b9-2","dept":"63","canton":"Champeix","commune":"Verrières","nom":"Verrieres","type":"Château","periode":"XV","histoire":"VERRIERES,   après avoir été en possession de plusieurs familles (Sailhant, Dorette), la petite seigneurie passe par le mariage  de lunique  héritière, Antoinette de Rochefort, en 1574, à François II de Guilhem. Mademoiselle de Verrières, née au château en  1653,  morte à Londres en 1710,  a écrit de nombreux livres aujourdhui tombés dans loubli, mais  qui avaient en leur temps retenu lattention de labbé de La Porte. La famille se maintient jusquen 1826.","architecture":"Verrières, au sud, un donjon-logis du XIVe siècle, avec   des petites échauguettes sur   consoles aux angles et une tour circulaire.Le donjon carré date du XVIIIe siècle. La porte dentrée en tiers-point, portes les armes de la famille.","habitants":"Famille d'Antoinette de Rochefort\r\n        \"","divers":"Château de Verrières","gps":"","images":["../image/image_63/63_Verrieres_1.jpg","../image/image_63/63_Verrieres_2.jpg","../image/image_63/63_Verrieres_3.jpg","../image/image_63/63_Verrieres_4.jpg"]},"Consult_chateau_formulaire58bb":{"id":"Consult_chateau_formulaire58bb","dept":"63","canton":"St-Ours","commune":"Charbonnières-les-Varennes","nom":"Veygoux","type":"Manoir","periode":"XVII","histoire":"VEYGOUX, construit au XVIIe siècle, le domaine du manoir de Veygoux a accueilli lenfance du général Desaix, fidèle de Napoléon Bonaparte. Le général Desaix, né en 1768 à Saint-Hilaire dAyat, prés de Riom, qui vécut toute son enfance au château de Veygoux, prés de Charbonnières-les-Varennes, fit ses études au collège dEffiat et qui écrivit à sa sur restée en Auvergne,  mort ainsi à lâge de 32 ans, aura des obsèques grandioses et Bonaparte, alors premier consul, ordonnera le transfert de son corps au couvent du Grand Saint-Bernard. Héros à Marengo, Louis-Charles-Antoine Desaix sétait déjà brillamment illustré dans plusieurs batailles menées par les armées de la Révolution et avait même, par sa conduite et celle de ses soldats, suscité ladmiration des populations vaincues : ne lavaient-elles pas, en Égypte, surnommé « Le Sultan Juste »  Aujourdhui, le domaine du manoir de Veygoux est dédié aux révolutions, qu'elles soient politiques, artistiques ou technologiques. Ce thème est en effet abordé à travers quatre scénovisions, consacrés aux aventures du général Desaix pendant la Révolution Française mais aussi à travers des expositions temporaires et un programme d'animations.","architecture":"Dans un cadre historique, le domaine du manoir de Veygoux, demeure du XVIIe siècle, offre charme et authenticité. Corps de logis rectangulaire et attiques flanqués de deux pavillons saillants en angles à deux niveaux,\r\nancien château féodal des Roches, du XVIe siècle.","habitants":"Général Desaix\r\n        \"","divers":"Château de Veygoux","gps":"","images":["../image/image_63/63_Veygoux_1.jpg","../image/image_63/63_Veygoux_2.jpg","../image/image_63/63_Veygoux_3.jpg","../image/image_63/63_Veygoux_4.jpg","../image/image_63/63_Veygoux_5.jpg"]},"Consult_chateau_formulaire34a5-2":{"id":"Consult_chateau_formulaire34a5-2","dept":"63","canton":"Vic-le-Comte","commune":"Vic-le-Comte","nom":"Vic_le_Comte","type":"Château","periode":"XV_XVII","histoire":"VIC le COMTE, plusieurs châteaux dans la commune et environs.                 ENVAL, actuellement nous ne possédons pas d'historique sur ce château, situé à Vic le Comte, édifié vraisemblablement au début du  XVIe siècle et remanié au XVIIIe siècle.                    LACHAUX  En 1295, le damoiseau Dalmas de La Chalin est propriété du comte d'Auvergne Robert IV. En 1510,  Jeanne d'Albret, veuve de Bernard Comptour de Gioux. Vers  1519, sa fille Eléonor Comtour apporte le fief par mariage au chevalier   Pierre de Rochebriant, seigneur de Chovance, En 1632, Annet de La Rochebriant est seigneur de La Chaux, La Chenal et Gioux. En 1657, François-Annet de La Rochebriant, seigneur et baron de Gioux, La Chenal et la Chaux, comte de Claravaux,  obtient du roi l'autorisation de jouir de ses biens. En 1614, il est au ban de la noblesse de Riom .                                                                 LANGLADE  Avant 1427, Alix de Saillant est dame de Langlade. Vers 1440, Jeanne d'Aubière est dame de Langlade. En   1589, à la mort de François de la Guesle succède son fils Jean. En 1599, celui-ci est dit seigneur de La Guesle,  Langlade, Charriol et Chadreu; il est gouverneur du château de Murat.                            A quelques kilomètres à l'est à Pigols le château de  FREDIERE, en 1371, Jean de la Fredière est sergent de Jean 1er comte d'Auvergne et de Boulogne. En 1461, le damoiseau Gilbert de Freydeyra, seigneur de La Frèdière et du Vinhal, fait aveu et dénombrement de ses terres qu'il tient du comte d'Auvergne. En 1570, Benoit Dupré,  alias Duclos, panetier de Catherine de Médicis et capitaine du château de Buron,  est sieur du Clos et de La Frédière. En 1654, François de Faydit vend le château et le domaine avec ses dépendances à Alexandre de Gironde, prévôt et chanoine de l'église royale de Saint Quinace de Provins. En 1660  celui-ci le revend à Charles Fouchier, prêtre et   prieur de l'église   de Beaulieu en Velay et à Marguerite Fouchier sa sur. Avant 1663, le fief est acquis par Antoine Ymonet, bourgeois de Clermont. Il passe ensuite à son fils ainé,  Gabriel Ymonet.","architecture":"Lachaux, château construit au XVIe siècle, enceinte quadrangulaire dont il reste deux flanquements carrés et un flanquement circulaire. Logis à deux retours d'aile de trois niveaux et demi.  Langlade, château situé à 2 km à l'est   du village, à 1 km au sud . Donjon quadrangulaire de quatre niveaux  accosté d'un logis très remanié de deux niveaux et demi.  \r\nFredière du XIIIe siècle possède un petit donjon carré de trois niveaux, élevé contre l'attaque. Cette tour bien appareillée date du début  du XIIIe siècle et conserve une baie en plein cintre. Un logis de deux niveaux et demi sur trois travées est accolé en enfilade; une fenêtre à modénature du XVIe siècle est installée dans une baie plus ancienne en plein-cintre. Les cheminées sont adossées à un retend délimitant une travée de chambres au pignon opposé au donjon, une colonne de latrines est adossée à ce pignon.  Une enceinte basse à flanquement circulaire clôture une cour.","habitants":"Seigneur locaux\r\n        \"","divers":"Château de Vic le comte,  d'Enval, de Lachaux et de la Frédière à Pignols","gps":"","images":["../image/image_63/63_Vic_le_Comte_1.jpg","../image/image_63/63_Vic_le_Comte_2.jpg","../image/image_63/63_Vic_le_Comte_3.jpg","../image/image_63/63_Vic_le_Comte_4.jpg","../image/image_63/63_Vic_le_Comte_5.jpg","../image/image_63/63_Vic_le_Comte_6.jpg","../image/image_63/63_Vic_le_Comte_7.jpg","../image/image_63/63_Vic_le_Comte_8.jpg"]},"Consult_chateau_formulaire0dea":{"id":"Consult_chateau_formulaire0dea","dept":"63","canton":"Vensat","commune":"Vensat","nom":"Villemont","type":"Vestiges","periode":"XVI","histoire":"VILLEMONT, était à l'origine un modeste domaine qualifié, au début du XVIe siècle. Il dépendait du comté de Montpensier appartenant alors au connétable de Bourbon (Charles III de Bourbon) et fut confisqué par François Ier qui fit alors payer au connétable le prix de sa trahison. Échu à Michel de Veyny d'Arbouse, beau-frère du chancelier Duprat, il resta dans la même famille  jusqu'à sa vente en 1958. Les Veyny, propriétaires de Villemont, prospèrent tout au long du XVIIe siècle, s'illustrent dans les armées, l'église et se font pourvoir de père en fils à la charge de bailli de l'ancien comté devenu duché de Montpensier. La seigneurerie de Villemont est érigée en marquisat, en 1720 par le régent. En 1740, elle appartient à Gilbert de Veyny « Mestre de Cavalerie » et constructeur du château actuel dont la légende veut qu'en disgrâce de la cour de Louis XV il aurait fait édifier l'immense ensemble que l'on connait aujourd'hui pour y loger son régiment. La Révolution et le début du XIXe siècle correspondent à une période de déclin au cours de laquelle les héritiers de Gilbert de Veyny se déchirent en un procès successoral qui ne se termine qu'en 1846. Pendant tout ce temps, mal entretenu, le château se dégrade le jugement  accorde la propriété à madame de Mallet de Vendègre fille de Veyny d'Arbouse  mariée  au vicomte Maisniel qui  s'attache à partir de 1870  à redonner à la demeure sa splendeur d'antan. A la mort du vicomte de Maisniel le château passe par légue au comte de Sampigny cousin de la comtesse et c'est la petite fille de ce dernier  qui le vendit en 1958 à un particulier pour un centre d'acceuil pour enfants défavorisés  et en juillet 1958 un incendie détruit   le bâtiment, à l'abandon pendant quarante ans. Repris en 1995, par monsieur Jean-Michel de Rocquigny à l'état de ruines.","architecture":"La première construction importante est donc l'uvre de Michel de Veyny :  L'édifice présente des caractéristiques de l'architecture auvergnate, portail d'entrée avec clocheton, murs sommés  de balustres carrées,  longues écuries basses couvertes de toits à la Mansart, c'est alors un bâtiment en L, flanqué sur sa façade, orientée au Sud, de deux tours coiffées de toitures coniques. Au sud toujours, on a des jardins à la française tandis qu'au nord partent des allées cavalières en étoile.  Situé au bord de la Toulaine, ce château a été construit au XVIe siècle, puis modifié et considérablement agrandi au XVIIIe siècle. Il s'appelait primitivement Neufville et a pris au cours du XVIIe siècle le nom du château qui lui était contigu. Détruit par un terrible incendie en 1958, cet édifice a le profil mystérieux des ruines romantiques. Un élégant portique ouvre sur l'ancienne cour d'apparat, vaste comme un champ de mars. La cour intérieure est accessible au public mais, en raison des travaux, l'accès aux parties bâties est interdit et dangereux, il ne reste aujourd'hui de ce château  qu'une ruine, suite à un incendie  en 1958.  Après une période d'agonie un espoir réapparaîtra  en 1995, année à partir de laquelle une opération de sauvegarde sera entreprise qui permettra la renaissance de ce joyau du XVIIIe siècle Auvergnat.","habitants":"Famille de Michel de Veyny d'Arbouse\r\n        \"","divers":"Vestiges du château Renaissance de Villemont, et château de Vinsat","gps":"","images":["../image/image_63/63_Villemont_1.jpg","../image/image_63/63_Villemont_2.jpg","../image/image_63/63_Villemont_3.jpg","../image/image_63/63_Villemont_4.jpg","../image/image_63/63_Villemont_5.jpg","../image/image_63/63_Villemont_6.jpg","../image/image_63/63_Villemont_7.jpg","../image/image_63/63_Villemont_8.jpg"]},"Consult_chateau_formulaire8b5c":{"id":"Consult_chateau_formulaire8b5c","dept":"63","canton":"St-Germain-Lembron","commune":"St-Germain-Lembron","nom":"Villeneuve_Lembron","type":"Château","periode":"XV","histoire":"VILLENEUVE-LEMBRON, faisait parti au XIVe siècle de la possession des dauphins d'Auvergne, des comtes de Montpensier, château construit à la fin du XVe siècle par Rigaud d'Aureille, premier seigneur, maître d'hôtel de quatre rois (Louis XI, Charles VIII,  Louis XII  et François Ier)  et ambassadeur auprès des souverains d'Europe. François Ier fait halte au château le 15  juillet 1533 quand il se rend à Marseille pour marier le dauphin, futur Henri II, à Catherine de Médicis. Le château fut modifié sous Louis XIII.  transformé en baronnie,  à la mort de Rigaud d'Aureille en 1517  la baronnie passe à son fils Maximilien, qui ce dernier sans descendance légua le château à son arrière petit-neveu en 1577  à  Gaspard de Montmorin qui  embellit le château. En 1643, Villeneuve-Lembron fut acquis par Isaac Dufour, trésorier de France, qui aménagea l'ancienne forteresse. Il transforma la cour intérieure, aménagea une galerie à portique et décora les plafonds et les cheminées du premier étage. Le château fut ensuite transmis en 1797 par alliance à la famille Pélissier de Féligonde, qui le conservera jusqu'en 1919,  vendu à Georges Tixier qui ce dernier le céda  à l'état en 1937.                                                                    A quelques kilomètres HUBEL, avant 1600, Giron de Combettes, écuyer est seigneur d'Ubel et du Chastelet (Vodable). Sa veuve se remarie avec César d'Aurelle et lui apporte le fief. En 1693, Claude d'Aurelle, écuyer, sieur du Chastelet, habite au château.  Pas trés loin le manoir  La GARDE,  vers 1552, Jean de la Roche, écuyer, seigneur de La Garde, se marie avec Catherine de Sarrazin. Avant 1660   François de La Roche est seigneur de La Garde Saint-Herem. En 1674, Charles de La Roche, âgé de 18 ans, et Jean  de La Roche, âgê de 30 ans, écuyers, sieurs de La Garde, habitent leur château.","architecture":"Villeneuve, l'édifice présente une cour carrée bordée de trois corps de logis et d'une terrasse. Une porte en anse de panier donne accès à une basse cour  avant d'entrer dans l'enceinte intérieure qui est entourée de fossés, elle  présente une forme carrée  flanquée de quatre tours cylindriques. Sous Louis XIII sont ajoutées les ailes Ouest et Est, les portes et fenêtres sont refaites. La cour intérieure est ornée, sous la galerie du rez-de-chaussée,  de peintures humoristiques à fresque.  Les quatre tours rondes et les larges fossés témoignent de la persistance du  rôle défensif quand l'aménagement intérieur évoque celui d'un château de plaisance.  Dans le village de Villeneuve-Lembron, on peut également visiter l'Hôtel d'Aureille (ou d'Aureilhe), ancienne résidence des Aureille de Villeneuve avant la construction du château. Ce périmètre fortifié du Moyen-Âge, sauvé in-extrémis de la ruine, comprend, une tour carrée du XIIe siècle du haut de laquelle on admire un panorama exceptionnel. Récemment restaurée, elle semble être la seule tour de ce type encore debout en France.  \r\nLe château d'hubel est situé à 1,5 km au nord est du bourg, dans le carrefour entre la route de Boudes et celle  de Saint-Hérent. Logis de deux niveaux flanqué d'une tour circulaire au milieu des deux grands côtés; celle qui est du côté route est percée d'une canonnière.  Manoir  de la Garde construit au XVIe siècle sur le plateau à 500 mètres à l'ouest du bourg. Grand logis de trois travées sur deux niveaux et demi; les cheminées sont adossées aux pignons. Côté cour, il conserve une belle fenêtre. Il est flanqué, vers l'extérieur, d'une tourelle carrée d'escalier dont l'accès se fait par une pièce.","habitants":"Famille de Rigaud d'Aureille\r\n        \"","divers":"Vestiges des remparts et du château de Villeneuve-Lembron, d'Hubel et de la Garde","gps":"","images":["../image/image_63/63_Villeneuve_Lembron_1.jpg","../image/image_63/63_Villeneuve_Lembron_2.jpg","../image/image_63/63_Villeneuve_Lembron_3.jpg","../image/image_63/63_Villeneuve_Lembron_4.jpg","../image/image_63/63_Villeneuve_Lembron_5.jpg","../image/image_63/63_Villeneuve_Lembron_6.jpg","../image/image_63/63_Villeneuve_Lembron_7.jpg","../image/image_63/63_Villeneuve_Lembron_8.jpg","../image/image_63/63_Villeneuve_Lembron_9.jpg"]},"Consult_chateau_formulairee302":{"id":"Consult_chateau_formulairee302","dept":"63","canton":"Viverols","commune":"Viverols","nom":"Viverols","type":"Château","periode":"XIII-XIV","histoire":"VIVEROLS, au XIe siècle. Dalmas de Baffie possédait cette seigneurie en 1070. Eléonore de Baffie, fille de Guillaume le Vieux et dEléonore du Forez, à la mort de son frère, resta seule héritière. Eléonore épousa Robert V, comte dAuvergne.  À la mort dEléonore (1285), la terre de Viverols entra dans le domaine des comtes dAuvergne et y resta un siècle. Jean II, comte dAuvergne au XIVe siècle vendit Viverols à Morinot de Tourzel, seigneur dAllègre, chambellan du roi. Morinot eut pour fils Yves Ier et pour petit-fils Jacques dAllègre.Yves II, fils de Jacques, qui fut lieutenant-général des armées de Charles VIII et de Louis XII mourut  à Ravenne, il était seigneur de Viverols en 1510. Le troisième fils dYves II, Christophe, qui épousa en 1530 Madeleine Le Loup de Beauvoir, devint ensuite possesseur de Viverols. Il eut pour fils Gaspard, chevalier de lOrdre du roi, qui épousa Charlotte de Beaucaire.  La terre de Viverols resta dans la maison d'Allègre jusquau XVIIe siècle. En 1665, Claude d'Allègre, marquis de Beauvoir, fit un échange avec François dAurelle, marquis de Colombine. Claude prit la moitié du domaine de Crest et François dAurelle devint seigneur de Viverols. Jeanne Henriette dAurelle, héritière de cette maison, épousa au début du XVIIIe siècle Joseph de Montagut, comte de Bouzol, inspecteur général de la cavalerie. Les Montagut gardèrent leur terre jusquà la Révolution. Cette famille possédait le beau château de Bouzol dans la vallée de la Loire, et les châteaux de Plauzat et de Montravel en Auvergne. Les Montagut séjournaient peu à Viverols, ils habitaient surtout à Plauzat, cependant ils ne délaissèrent pas tout à fait leur vieux manoir du Livradois, puisquils y firent dimportantes réparations en 1740. Vers le milieu du XVIIIe siècle, la famille de Montagut sallia par mariage à la famille de La Salle,  de cette union naquit Joachim de Montagut, dernier seigneur de Viverols. En 1783, il épousa Anne-Pauline de Noailles, fille du duc dAyen et arrière-petite-fille, par sa mère, du chancelier dAguesseau.","architecture":"Il ne reste plus du château de Viverols que l'enceinte polygonale en ruines du XIIIe -XIVe siècle,  Lemplacement de cette forteresse avait été judicieusement choisi. La butte de Viverols se trouve en effet placée à un point stratégique important au débouché de la vallée de lAnce,  du château fort subsiste une enceinte flanquée de trois  tours rondes et d'un pavillon d'entrée, dont la forme générale est à peu près pentagonale. La face ouest de l'enceinte est occupée par un corps de logis flanqué d'une tour  à chaque extrémité. Le front sud se compose  de deux parties. Celle de gauche  possédait un corps de logis. Le plan général du château est pentagonal. De profonds fossés entouraient jadis les bâtiments seigneuriaux, les écuries, les communs ; ces fossés sont malheureusement comblés. Au sud et à louest, la forteresse profitait dune défense naturelle disparu. Deux tours sont percées d'archères elles semblent dater du XIIIe, ainsi  que leurs courtines et les parties basses du corps de logis ouest, ce corps de logis a été remanié au XVIe siècle et percé de fenêtres à meneaux. Il renferme des cheminées, un escalier à vis dans l'angle qui se termine par une voûte. Le bâtiment d'entrée doit remonter au XVIIe siècle,  et garde les traces des chaines  et du tablier de l'ancien pont-levis. Le bâtiment situé à sa gauche, de la même époque, est flanqué d'une échauguette.  Au pied de la courtine sud se trouve une poterne du XIIIe siècle. Le pavillon situé au centre de la cour remonte au XVIe siècle, ainsi que le large puits à armoiries situé dans la deuxième cour.","habitants":"Famille de Dalmas de Baffie \r\n        \"","divers":"Vestiges des remparts du château de Viverols","gps":"","images":["../image/image_63/63_Viverols_1.jpg","../image/image_63/63_Viverols_2.jpg","../image/image_63/63_Viverols_3.jpg","../image/image_63/63_Viverols_4.jpg","../image/image_63/63_Viverols_5.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','63 — Puy-de-Dôme'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
