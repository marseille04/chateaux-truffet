iage le château devient la propriété du comte Gabriel-François de Sampigny d'Issoncourt, marquis d'Effiat.                     GERZAT,  depuis le IXe siècle les comtes d'Auvergne étaient suzerains de Gerzat. Au début du XIIIe siècle la famille de Mercoeur hérita du territoire. Un des membres, nommé Guillaume de Mercoeur, signa et donna en 1292 la charte de privilèges à la population gerzatoise. Plus tard, en 1529, le château et le bourg furent transmis à un neveu des Mercoeur, Antoine, duc de Lorraine, qui vendit ses droits à ses cousins de la maison de La Tour d'Auvergne. En conséquence, le seigneur de Gerzat s'appellera François de La Tour d'Auvergne, grand-père de Henri, l'illustre maréchal de Turenne. Par la suite le frère du maréchal, Frédéric-Maurice, duc de Bouillon, hérita de la terre de Gerzat, transmise à son fils Godefroy de Bouillon, époux de Marie Mancini, nièce de Mazarin. Godefroy de Bouillon mourut en 1796, dernier seigneur du lieu. Le château délabré fut vendu à plusieurs acquéreurs qui le firent raser complètement. Ainsi se termine l'histoire de cet antique castellum, devenu forteresse féodale, puis demeure des hommes d'armes, et disparut dans la bourrasque de 1789. Ainsi le nom modeste de Gerzat permet d'évoquer le souvenir du héros de Sasbach et du ministre de Louis XIV.","architecture":"Sampigny, le château constitue un ensemble hétérogène qui se compose d'un corps de logis principal de plan carré, édifié à la fin du XVIIe siècle, dont l'architecture est animée de tourelles d'angle, de lucarnes et d'une haute toiture. Il a été prolongé au XVIIIe siècle par une aile d'aspect plus sévère que coiffe un toit plat. Indépendante par rapport au corps de logis du XVIIe siècle, s'étend une longue aile de communs, typiquement auvergnate, qui paraît de la même époque. Dans le parc, subsiste un petit bassin quadrilobé au sud du logis, et un étroit plan d'eau. Le château est protégé par une grille côté place, dans laquelle s'ouvre le portail principal.                                                                                                Gerzat, au Moyen-Age, le vieux bourg de Gerzat était enserré dans une enceinte de murailles et de remparts constituée de 9 tours et de 3 portes. On trouvait dans ces fortifications son castellum avec sa chapelle et son prieuré, puis successivement les cimetières de l'Aumône et du Painchaud et enfin, le grand champ des morts entourant l'église à la fois romane et gothique.\r\nLa Tour de la Barrière appelée actuellement Tour de l'Horloge, et la Tour Sapis placée derrière le presbytère, sont les seuls vestiges visibles et convenablement entretenus de ce passé prestigieux.","habitants":"Comte Gabriel-François de Sampigny d'Issoncourt                              Famille de Godefroy de Bouillon \r\n        \"","divers":"Château de Sampigny avec tour de l'horloge et château de Gerzat.","gps":"","images":["../image/image_63/63_Sampigny_1.jpg","../image/image_63/63_Sampigny_2.jpg","../image/image_63/63_Sampigny_3.jpg","../image/image_63/63_Sampigny_4.jpg","../image/image_63/63_Sampigny_5.jpg"]},"Consult_chateau_formulaire3dbc-2":{"id":"Consult_chateau_formulaire3dbc-2","dept":"63","canton":"Herment","commune":"Vinzelles","nom":"Sauvagnat","type":"Château","periode":"XV","histoire":"SAUVAGNAT, en 1480, Antoine de Thiers est seigneur  possédait le fief. En 1614, le château appartient à Louis de Thiers. En 1674, Gabrielle Henriette de Sédières, dame de Sauvagnat et Vinzelles, veuve de François de Bonne, de son vivant, marquis de Bonne, habitant au château de Sauvagnat, n'a pas d'enfant,  les héritiers sont les neveux de son mari.  En 1669, Gabrielle-Henriette de Bonne, fille du marquis de Bonne et Catherine de la Forest, rendit foi-hommage au roi pour les seigneuries de Sauvagnat, Vinzelles et Crevant. En 1683,Jacques de Vidal, écuyer, est seigneur. Jean de Freydefont (mort en 1714) possède le château, cette famille le conserve jusqu'en 1718.  En 1789, le fief appartenait à monsieur Chaillon de Jionville, veuf de mademoiselle de Fraeydefont, dame de Sauvagnat et tuteur de leur fils mineur.                                        FAYE, vers 1505, Gabriel de Neuville, chevalier, est seigneur de la Faye et en partie de Prodines. Vers 1510. Gabriel de Neuville. son fils, hérite de la seigneurie. Avant 1569, Michel de Neuville est dit seigneur de la Faye en la paroisse   de Sauvagnat. En 1631, Gilbert de Neuville est seigneur de La Faye.","architecture":"Château  de  Sauvagnat  construit au XVe siècle situé à 400 mètres au sud est du village. Donjon-logis quadrangulaire de quatre  niveaux à trois   flanquements circulaires   d'angle. On lui accolé un retour   d'aile troubadour, plus bas, encadré de  deux tourelles circulaires.   Château de la Faye construit vraisemblablement au XVIe siècle,  situé à 1 km au sud-ouest du bourg.  Enceinte quadrangulaire à flanquements circulaires d'angle, il en subsiste deux dérasés.  Logis rectangulaire ancien de deux hauts niveaux.","habitants":"Famille de Louis de Thiers                                                                   Famille de Gabriel de Neuville\r\n        \"","divers":"Château de Sauvagnat, de Vinzelles et de Faye","gps":"","images":["../image/image_63/63_Sauvagnat_1.jpg","../image/image_63/63_Sauvagnat_2.jpg","../image/image_63/63_Sauvagnat_3.jpg","../image/image_63/63_Sauvagnat_4.jpg"]},"Consult_chateau_formulairee018":{"id":"Consult_chateau_formulairee018","dept":"63","canton":"Veyre-Monton","commune":"La Sauvetat","nom":"Sauvetat","type":"Château-fort","periode":"XII-XIII","histoire":"SAUVETAT, au début du XIIIe siècle, le nom de la Sauvetat a été donné au lieu après l'intervention du roi de France et l'implantation des Hospitaliers. En 1212,  le Roi de France confisque le comté d'Auvergne et fait   dresser un certain nombre de donjons \"à l'imitation de celui du Louvre\" pour affirmer l'autorité royale. Authezat dont La Sauvetat était une dépendance, et  le château voisin de Châlus-les-Bussières sont incorporés dans les terres royales. Après la restitution d'une partie des seigneuries, le château de La Sauvetat se présente comme une implantation royale en concurrence avec le château de Châlus.  En 1329, Odon de Montaigut (prieur des Hospitaliers d'Auvergne   depuis 1312) acquiert les droits seigneuriaux et les justices sur La Sauvetat, le roi confirme cette acquisition, c'est de cette époque que datent les travaux et extensions  que l'on remarque   dans le château,  reprise du donjon cylindrique et construction de nouveaux logis. En 1341, un   accord avec Robert Dauphin, seigneur de Combronde et de Châlus raffermit les contours de la seigneurie. En 1343 les droits des Hospitaliers sont une nouvelle fois confirmés. En 1373 il existe à La Sauvetat un \"bon et grand fort\" à cette date une enquête signale un donjon   dont la construction est en cours et   qui est un des plus beaux et des plus puissants donjons d'Auvergne. En 1567 la seigneurie est acquise par le baron Antoine II de Sariant. En 1586, à la mort  d'Antoine II de Sariant, la seigneurie de La Sauvetat   passe à sa fille Claudia mariée depuis 1557 avec Jacques d'Oradour.","architecture":"Château-fort construit du XIIe au XIIIe siècles,  commanderie des Hospitaliers du XIVe siècle, situé à côté de l'église. Donjon cylindrique en grande partie   du XIIIe siècle, de 9.60 m de diamètre, et   haut de 24 m, au mur   épais d'environ 2,20 m à la base  avec une partie haute surélevée au XIVe siècle.  Il est divisé  en 4 niveaux voûtés l'accès est au 3e niveau:  la communication avec les étages supérieurs,  plus tardifs,  se fait par un escalier épargné   dans l'épaisseur du mur. Les armoiries de Odon de Montaigut, acquéreur de la seigneurie en 1329, sont visibles, en remploi, au-dessus de la porte basse et sur un bâtiment à proximité.   Le logis conserve une petite   fenêtre à moulure d'intrados   du XIVe siècle. Il est accosté d'une tourelle cylindrique, la  porte est défendue par une bretèche. Dans le donjon cylindrique, on remarque des chaines horizontales faites de  pierres identiques à l'appareil de la partie basse. Cela signifie   que la tour a sans doute été endommagée, en partie  détruite,  et les pierres rendues ainsi disponibles sont remployées lors des réfections.  Un terrier de 1453 signale  la \"grande maison du prieur, une tour vieille du prieur et une grande tour, un logement surmontant et jouxtant le four\".\r\n Au XVIe siècle, on distingue un ancien château autour de la chapelle avec une tour carrée et   une commanderie dit  aussi La Claustre. En 1617. le Château est \"rompu et inhabitable\" et ses masures sont concédées à des particuliers;  de la commanderie subsiste la chapelle,  la tour carrée avec un dernier niveau en colombier,  le donjon cylindrique est devenu prison.","habitants":"prieur  Odon de Montaigut                                                         \r\nBaron Antoine II de Sariant\r\n        \"","divers":"Château de Sauvetat.","gps":"","images":["../image/image_63/63_Sauvetat_1.jpg","../image/image_63/63_Sauvetat_2.jpg","../image/image_63/63_Sauvetat_3.jpg"]},"Consult_chateau_formulaire310f":{"id":"Consult_chateau_formulaire310f","dept":"63","canton":"Tauves","commune":"Savennes","nom":"Savennes","type":"Château","periode":"XVII","histoire":"SAVENNES. Bertrand de La Tour, seigneur de Savennes, mort en 1286 transmit ce fief à son fils Guillaume. Sa sur, Dauphine avait épousé Guigues alias Aymeric de la Roche. En 1298 son frère lui abandonna le château de Savennes et en lannée 1330, elle rendit foi hommage à lévêque de Clermont. En 1368, Guillaume Roger, comte de Beaufort, seigneur dHerment, de Saint-Exupéry, de Pont du Château, frère du Pape Clément VI. Sa petite fille, Marguerite, dame de Tauves, Granges, Savennes, épousa en 1423 Bertrand de La Tour, seigneur de Murat le Quaire, Le Mont Dore, Olliergues etc. Bertrand mourut en 1450. Son fils Agne IV de La Tour, vicomte de Turennes, seigneur de Savennes, épousa en 1455 Anne de Roger Beaufort. Il décéda en 1489 et fut enterré à Brive. Son fils Antoine, dit Raymond, épousa en 1517 Marie de la Fayette. En 1586, Savennes passa à la famille de la Forest Bulhon, lors dun contract de mariage en septembre 1586 établi entre Jeanne Le Loup, fille de Blain, seigneur de Préchonnet, et Bertrand de la Forest Bulhon, écuyer dont la famille. Ces époux laissèrent un enfant, Gaspard, seigneur de Savennes marié une première fois à Dianne de Vichy en février 1618 et une seconde fois le février 1634 à Anne le Groing de la Poivrière.  Du second lit, deux enfants sont nés, Charles et Guillaume, écuyer, seigneur de Savennes, maintenu dans sa noblesse en 1666. Il sétait marié le 28 novembre 1638 à Philiberte de Cornouillère. Leur fils, Guillaume, chevalier, rendit foi hommage au roi en 1669,  pour la terre de Savennes. Il eut deux fils, François, chevalier, seigneur de Savennes en 1745 et Etienne, chevalier, marié à Marguerite du Bois de Saint Julien. Leur fils, Jean, seigneur de Savennes épousa le 1er juin 1765 Françoise Blanchet. De cette union est né François, officier dinfanterie, marié le 9 décembre 1790 à Marie Claudine de Chamflour, dont une fille épousa le comte de la Roche Fontenilles. La famille de la Forest Bulhon aurait émigré en 1792 dans la région de Cologne.","architecture":"Savennes, bâtisse imposante rectangulaire à trois niveaux avec attiques  toitures en  croupes avec échauguettes en angles. Aujourd'hui transformé en hôtel restaurant par la famille Martin.","habitants":"Famille d'Agne IV de La Tour, vicomte de Turennes\r\n        \"","divers":"Château de Savennes.","gps":"","images":["../image/image_63/63_Savennes_1.jpg","../image/image_63/63_Savennes_2.jpg"]},"Consult_chateau_formulaired377":{"id":"Consult_chateau_formulaired377","dept":"63","canton":"St-Dier-d`Auvergne","commune":"Fayet-le-Château","nom":"Seymiers","type":"Château","periode":"XV-XVIII","histoire":"SEYMIERS, le fief de Seymiers est qualifié de baronnie de 1584 à 1789. François-Gaspard de Montmorin fit réparer  le château féodal et sans doute aménager au côté de ce dernier  la construction d'ordonnance classique, pour recevoir Louis XV en 1740.            Dans la commune de Fayer-le-Château, un château dont les seigneurs étaient les Prullières, par alliance et héritage  passa aux Estandeuil, aux Duvert et aux Dutheil.                                          A Fayet-le-Château, le château de Léobard.","architecture":"le château féodal et sans doute aménager au côté de ce dernier  la construction d'ordonnance classique, pour recevoir Louis XV en 1740.  Le donjon fut   remanié au XIXe siècle en style troubadour. Au pied de ce donjon du XVe siècle se trouve le château du XVIIIe siècle ruiné par un incendie en 1927. Il était formé d'un corps de logis rectangulaire prolongé par  des pavillons aux extrémités. Le rez-de-chaussée s'ouvre  sous un arc en plein cintre  dont les pilastres doriques supportent  l'entablement dont la corniche est  surmontée d'un fronton interrompu vers le haut, contenant deux médaillons du lion rampant des Montmorin. A l'intérieur, restes de la rampe en fer forgé, de menuiserie, de décor stuqué. Sont également encore visibles une cheminée gothique et  une cheminée en faïence. A l'intérieur, restes de la rampe en fer forgé, de menuiserie, de décor stuqué. Une autre cheminée en faïence du XVIIIe siècle a été remployée dans une salle du donjon.                                   Château de Léobard corps de logis rectangulaire à trois niveaux flanqué de pavillons aux extrémités  et un en façade avec tourelles en angles sur le corps de logis.","habitants":"Famille de François-Gaspard de Montmori\r\n        \"","divers":"Château de Seymiers et de Léobard.","gps":"","images":["../image/image_63/63_Seymiers_1.jpg","../image/image_63/63_Seymiers_2.jpg","../image/image_63/63_Seymiers_3.jpg","../image/image_63/63_Seymiers_4.jpg","../image/image_63/63_Seymiers_5.jpg","../image/image_63/63_Seymiers_6.jpg"]},"Consult_chateau_formulaire41aa":{"id":"Consult_chateau_formulaire41aa","dept":"63","canton":"Courpière","commune":"Aubusson-d`Auvergne","nom":"Souches","type":"Château","periode":"XVI","histoire":"SOUCHES du XIXe siècle, en 1553,  appartient à François de Montboissier, baron, seigneur de Boissonnelle. Le domaine sera vendu plusieurs fois, dabord à un certain Dinasse, puis à Antoine de Bonnevie, écuyer, marié le 21 novembre 1612 avec dame Antoinette de Beaubost. Leur fils Alexandre de Bonnevie mourut sans laisser dhéritier, léguant le domaine à sa sur Jacqueline de Bonnevie, épouse de Jean de Matussières,(Hommage rendu en 1669). Leur fils, héritier du fief, vend château et domaine à ses trois nièces. Laînée, Jacqueline de Ronat, «dame de La Souche», mariée à Benoît Masdorier, puis à Etienne Ymonet, transmit le fief à Jean Ymonet, né du second mariage. Une recherche reste à faire concernant les possesseurs de La Souche jusquà la fin du XIXe siècle où les bâtiments et une partie du domaine furent acquis par Monsieur Grissonnange. Le château de La Souche sera vendu en 1968.","architecture":"De nombreux travaux de réfection ont passablement remanié les bâtiments. Construit sur un plan carré, il est flanquée de deux tours saillantes, rondes au quart engagé. La plus haute garde sa hauteur initiale de 18 mètres, ses ouvertures dépoques, dont celle du salon du premier étage, une étroite meurtrière, au-dessus du « talutage », la sortie dune pierre dévier, des latrines sont accolées au premier étage de la tour. Elle donne au sud-ouest et peu surveiller toute une partie de la vallée du Couzon. Le rez-de-chaussée de la tour aurait servi de chapelle. Lautre tour, à la diagonale de la première est percée dune porte, le tympan est orné dun écusson muet. Lescalier à vis primitif, a vraisemblablement disparu après avoir été démonté et remplacé par des marches de bois, taillées dans des madriers et assemblées sans noyau. Le  donjon central  comportait rez-de-chaussée, premier étage, où était resté ancré le jambage dune cheminée Renaissance et un second étage peut être aménagé, actuellement grenier, qui a gardé une unique poutre, de section importante (0,30 m x 02,25) de 7,50 mètres de longueur, avec arêtes arrondies. Létat dabandon a nécessité alors dimportants travaux de consolidation, de reprise du gros uvre, de restauration pour que La Souche retrouve cet aspect élégant de manoir fortifié, et son unité architecturale.","habitants":"Famille de François de Montboissier\r\n        \"","divers":"Chateau de Souches.","gps":"","images":["../image/image_63/63_Souches_1.jpg","../image/image_63/63_Souches_2.jpg"]},"Consult_chateau_formulaire6d9f-2":{"id":"Consult_chateau_formulaire6d9f-2","dept":"63","canton":"Vertaizon","commune":"St-Bonnet-les-Allier","nom":"St_Bonnet","type":"Château","periode":"XIV","histoire":"St-BONNET, château de Saint-Bonnet les Allier Au XIVe siècle, les Mezel sont seigneurs de Saint-Bonnet. En 1429, Alix de Mezel épouse Jacques de Murol, seigneur du Broc et de Bergonne. En 1559, Gabrielle de Murol épouse Jean de Montmorin, seigneur de Saint-Hérem. En 1595, Françoise de Montmorin épouse Louis de La Barge, seigneur. En 1652, son fils, Jean Baptiste vend  la terre de Saint-Bonnet à François Chardon, seigneur de Lavaure, conseiller à la cour des  aides de Clermont. En 1674, celui-ci habite Clermont.","architecture":"Château édifié au XIVe siècle,  situé à l'extrémité d'un éperon à l'ouest de l'église, dominant la route. C'est un logis rectangulaire de trois niveaux, il est flanqué de   deux tours circulaires posées en diagonale, celle du côté de l'attaque est beaucoup plus grosse. Il est entouré de braies flanquées.","habitants":"Famille de  Jean de Montmorin,\r\n        \"","divers":"Château féodal de Saint-Bonnet.","gps":"","images":["../image/image_63/63_St_Bonnet_1.jpg","../image/image_63/63_St_Bonnet_2.jpg"]},"Consult_chateau_formulaire42a6":{"id":"Consult_chateau_formulaire42a6","dept":"63","canton":"Champeix","commune":"St-Cirgues-de-Couze","nom":"St_Cirgues","type":"Château","periode":"XV","histoire":"ST-CIRGUES,  Austremoine Bohier naît à Issoire  dans la première moitié du XVe siècle, secrétaire du roi Charles VII, il s'installe à Tours où il épouse Anne du Prat. Il achète, en 1460, le château et la terre de Saint- Cirgues. A la mort de Charles VII (1461), il reste le secrétaire de Louis XI, puis de Charles VII qui l'anoblit en 1490.  Son fils Thomas est qualifié en 1494 noble homme maître Thomas Bohier,  seigneur de St-Cirgues, conseiller, maître des comptes  et secrétaire des finances du roi. Marié à Catherine Briçonnet. En 1496, il achète le château de Chenonceau en Touraine, quil reconstruit de 1515 à 1522. Il est maire de Tours en 1497. Son fils Antoine Bohier, baron de Saint-Cirgues, seigneur de Chenonceau, Chidrac, Périers, Pardines, Sauriers , Champeix, le Mas, la Tour Boyer, cédera Chenonceau à François 1er. Sans héritier, Antoine fait don  de la baronnie de S t-Cirgues  au connétable de France, Anne de Montmorency. En  1575, Henry 1er de Montmorency, fils dAnne, échange la seigneurie de St Cirgues contre un autre fief avec les Montboissier  Beaufort Canillac, qui obtiennent en 1578 que la baronnie de Saint-Cirgues soit érigée en comté.   Le dernier Montboissier meurt en 1725 sans héritier. Le château est acquis en 1732 par Yves de Tourzel d'Allègre. Les transformations au XVIIIe siècle sont effectuées  par sa fille, Marie-Marguerite, marquise de Tourzel,  qui épouse Philippe de   Recourt-Lens-Licques-Boulogne, comte de Rupelmonde (Flandres) survivant 7 ans à son fils (tué en 1741), sans descendance, la comtesse de Rupelmonde  entre dans les ordres et  lègue ses biens aux enfants  de sa sur, « la brune », Marie-Emmanuelle de Maillebois. Elle aura une fille, Marie-Henriette, mariée à  Louis du Bouchet de Sourches. Leur fils,  Louis François, épouse Louise Élisabeth de Croÿ, gouvernante   des enfants de France. Cest par un fils de ces derniers, Yves , que le château passe à Hélène du Bouchet de Sourches de Tourzel. Elle se marie à  Paul-Louis Marie Vogt dHunolstein. En 1889, il est encore  propriétaire du château, appartient à Hervé dHunolstein. À noter que le frère aîné dHervé, Félix (1861-1952), a épousé une Montmorency.","architecture":"Château de St-Cirgues rebâtit  en 1495, un quadrilatère défendu par 4 tours rondes, des murs crénelés  et un fossé,  on doit  au comte de Rupelmonde les dômes des tours et façades percées de larges ouvertures. Vers 1889 on remplace la clôture ouest  par une arcature ouverte sur le parc et que lon aménage le décor intérieur dans   le style troubadour,  on ne connaît pas le nom de larchitecte. A la veille de la deuxième guerre mondiale, le château, fut remanié.   En 1991, un incendie dévaste les toitures  et une partie du décor. Linscription  à linventaire supplémentaire, le 14    juin 2002, protège le château en totalité,  y compris ses décors intérieurs (chapelle, escaliers, boiseries, cheminées)   et le parc avec ses clôtures. Le château est en cours de restauration, en attendant un réemploi.","habitants":"Famille de Montboissier  Beaufort Canillac\r\n        \"","divers":"Château de Saint-Cirgues","gps":"","images":["../image/image_63/63_St_Cirgues_1.jpg","../image/image_63/63_St_Cirgues_2.jpg","../image/image_63/63_St_Cirgues_3.jpg","../image/image_63/63_St_Cirgues_4.jpg","../image/image_63/63_St_Cirgues_5.jpg","../image/image_63/63_St_Cirgues_6.jpg","../image/image_63/63_St_Cirgues_7.jpg","../image/image_63/63_St_Cirgues_8.jpg"]},"Consult_chateau_formulaire38e8":{"id":"Consult_chateau_formulaire38e8","dept":"63","canton":"Besse-et-St-Anastaise","commune":"St-Diery","nom":"St_Diery","type":"Forteresse","periode":"XV","histoire":"ST-DIERY,  au XVe siècle cette seigneurie avait qu'un seul propriétaire qui se transmettait par héritage, la famille de Sailhant, aux de Peyrols, aux  de Lastic et aux d'Allégre, en 1640 ces derniers la vendirent aux Héraudy qui prirent le titre de marquis de Saint-Diery, passa ensuite par succession aux Eschalard de la Marck, en 1730 Henri-Louis Eschalard échangea avec Jean-Baptiste Dulac le domaine contre des titres  sur rente sur la ville de Paris,  entreprennent d'énormes travaux d'aménagements étant de la famille avec l'architecte  du petit Trianon. Le château fut transmit par héritage jusqu'en 1924 dans la famille d'Oradour, ensuite au Ligonnès et aux de Boisrambaud  qui le léguèrent  aux religieuses de Loubeyrat laissé à l'abandon, le château fut sauvé par un industriel parisien.\r\nCOTTEUGE, appartenait au XIVe siècle aux de la Tour d'Auvergne qui le vendirent en 1498 aux Langeac puis passa par héritage dans différentes mains et en 1789 il appartenait aux Guilhem seigneur de Verrières dans le canton de Champeix.                                       SAURIER, Le château fut construit contre les remparts de la ville, probablement au début du XVIe siècle. L'édifice est enfin un logis noble avec   une tourelle d'escalier. Le corps de logis quadrangulaire est flanqué par une tour ronde  de l'ancien rempart, et  par une tourelle d'escalier polygonale. La tourelle présente  des percements de style   médiéval. La porte à chambranles moulurés  sur bases prismatiques est couverte  d'un arc en tiers-point délimitant un tympan de pierre autrefois timbré d'un blason, les fenêtres ont aussi des chambranles moulurés. La façade est percée de 3 travées de fenêtres du XVIIe siècle. Les intérieurs ont été détruits en presque totalité.","architecture":"Château médiéval à Saint-Diéry le Bas, construit sur une plate-forme prolongeant à l'ouest une butte circulaire qui aurait été l'emplacement d'un château primitif disparu. A l'est de cette butte, s'élève la jolie chapelle romane.  se présente sous l'aspect d'une construction féodale élevée dès la fin du XIIIe ou du XIVe siècle, à la suite d'un donjon roman qui subsiste à l'angle sud-est des constructions actuelles. Ce donjon, de plan rectangulaire et construit en appareil irrégulier, comporte au rez-de-chaussée une pièce voûtée d'arrêtes ayant servi de citerne, et trois étages de salles couvertes d'un berceau légèrement brisé. A l'ouest du donjon est accolé un corps de logis.\r\nChâteau de Cotteuges,  construction du XIIIe siècle flanquée de quatre tours rondes dont deux ont aujourd'hui disparues, seule celle du nord-est subsiste. Le logis lui-même, bien que dégradé  par son utilisation agricole au XIXe siècle et  les percements disparates, a conservé une salle voûtée en berceau éclairée par  des baies en pénétration. Des anciennes courtines extérieures subsiste également une tour porche  formant passage couvert au rez-de-chaussée et dotée d'un escalier en surplomb et de baies gothiques à encadrement sculpté. Le château neuf élevé au XVe siècle comme résidence de plaisance, comportait un logis à tourelle qui fut agrandi de trois travées et d'une chapelle au XVIIIe siècle, avant de connaître une nouvelle extension vers 1830. L'édifice a conservé des aménagements intérieurs de différentes époques dont un escalier en vis du XVe siècle et un ensemble de pièces dotées de boiseries, cheminées et parquets à compartiments. Le  jardin   à la Française a disparu, mais il reste le mur de clôture.","habitants":"Famille de Sailhant\r\n        \"","divers":"Château de St Diery, de Cotteuge, du  Saurier et du Moulin.","gps":"","images":["../image/image_63/63_St_Diery_1.jpg","../image/image_63/63_St_Diery_2.jpg","../image/image_63/63_St_Diery_3.jpg","../image/image_63/63_St_Diery_4.jpg","../image/image_63/63_St_Diery_5.jpg","../image/image_63/63_St_Diery_6.jpg","../image/image_63/63_St_Diery_7.jpg"]},"Consult_chateau_formulaire5a01":{"id":"Consult_chateau_formulaire5a01","dept":"63","canton":"Champeix","commune":"St-Floret","nom":"St_Floret","type":"Vestiges","periode":"XIII","histoire":"ST-FLORET, construit vers le IVe siècle, au début du XIIIe siècle, le site primitif est abandonné. En 1225, Guillaume Dauphin, comte de Clermont échange ses terres de Saint-Floret à Robert de Champeix contre son château de Champeix. Ce dernier change son nom en Robert de Saint-Floret. En 1269, Jambert de Saint-Floret rend hommage au nouveau Dauphin  Robert II. Vers 1280, la famille Saint-Floret s'allie avec le seigneur de Crest. Ces deux châtellenies appartiennent à la même famille. En 1370, Athon Pierre de Floret et sa femme Isabelle de Chalus commandent des décorations pour leur logis. En 1436, les nouveaux propriétaires sont les Jéhan de Bellemave. En 1450 le château est représenté dans  l'Armorial de Guillaume Revel. En 1494, c'est la famille Le Loup qui détient le fief,  mariage de lhéritière, Charlotte de Bellenave, avec Blain Le Loup. Un autre mariage en 1615 donne à Pierre de  Lauriol, le château que son fils Paul vend en 1676 à Emmanuel dAllègre. La terre, qui dépend de Champeix, sera érigée en marquisat en  1732 sous le maréchal Yves dAllègre.  Sa fille Marguerite comtesse de Rippelmonde,  égérie de Voltaire, vendit le château à Jean Andraud, médecin et donne le domaine à son neveu le Marquis de Tourzel en 1746. Classé MH, restauré en 1936 puis récemment,  transféré de lÉtat à la commune en 2007.","architecture":"Le Château, dominant le village et la Couze-Pavin, figure dans lArmorial de Guillaume de Revel (1450). L'enceinte  triangulaire implantée sur un éperon rocheux, est dominée par un donjon cylindrique du XIIIe siècle,  dont le rez de chaussée est creusé de trois mètres dans le rocher. Hors de lenceinte, le corps de logis inférieur de 1380, remanié au XVIe siècle, de plan rectangulaire, sadosse au rocher. Flanqué dune échauguette sur consoles,Le site comporte deux bâtiments différents,  le château \"supérieur\" posé en haut de la colline, le château \"inférieur\" adossé au rocher. l'imposante masse du château ne cache pas ses origines médiévales, ni sa fonction de défense. Les courtines ont perdu leur hauteur, et les tours flanques se devinent plus qu'elles se voient mais cette construction posée sur le rocher ressemble bien à un château du XIIIe siècle.  Sur la partie la plus élevé du rocher est posé le donjon cylindrique. Bien qu'ayant perdu ses créneaux, sa hauteur marque le respect. En haut de ce donjon, des corbeaux sont visibles. Cette \"tour maîtresse\" n'étant pas habitable, j'opte pour une bretèche et non des latrines.   Adossé au rocher, ce château parait plus \"léger\", plus luxueux, moins primitif. Cette construction rectangulaire du XIVe siècle était l'habitation du seigneur. Sa façade comporte des fenêtres à meneaux  et des occulis à rosace quadrilobée.  Une tour sur la face au Nord-Ouest.","habitants":"Famille Saint Floret\r\n        \"","divers":"Vestiges du château féodal de Saint-Floret","gps":"","images":["../image/image_63/63_St_Floret_1.jpg","../image/image_63/63_St_Floret_2.jpg","../image/image_63/63_St_Floret_3.jpg","../image/image_63/63_St_Floret_4.jpg","../image/image_63/63_St_Floret_5.jpg","../image/image_63/63_St_Floret_6.jpg"]},"Consult_chateau_formulaireff80":{"id":"Consult_chateau_formulaireff80","dept":"63","canton":"Riom","commune":"Malauzat","nom":"St_Genest","type":"Château","periode":"XVII","histoire":"St-GENEST-LENFANT, en 1525, trois fiefs composaient le territoire. Un fief appartenait à Jean du Cros, le second à Gilbert du Cros, le frère et le dernier à la famille Du Bourg. Au XVIe  siècle, Saint-Genest lEnfant était un fief des Murat.   Dans la seconde partie du XVIe siècle, Antoine Du Bourg devint seigneur de toute la terre de Malauzat. En 1658, le domaine passa à la famille De Féligonde qui le possède toujours.","architecture":"St-Genest-Lenfant, Vers 1650, une demeure est élevée, répondant au goût de l'époque, mais dans le style sobre prisé dans la  région : le corps de logis rectangulaire, cantonné à ses angles postérieurs de deux pavillons carrés, présente une façade principale orthogonale et symétrique, animée par le contraste sur l'enduit clair des encadrements de baies  et des chaînes d'angle harpées en pierre de Volvic.  Au XVIIIe siècle agrandissement de certaines baies et réfection du décor des pièces, disposées en enfilade de part et d'autre d'un escalier à mur noyau, reçurent cheminées, boiseries et  stucs.   Limplantation géographique et historique de la pisciculture du château de St Genés-lEnfant est dans la faille du bassin de Volvic a été créée en 1853 par Gabriel de Féligonde, un précurseur. Dans un ancien moulin à eau datant du XVIe siècle entièrement restauré, aux portes de la ville de Volvic.","habitants":"Famille de Féligonde\r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Saint-Genest Lenfant","gps":"","images":["../image/image_63/63_St_Genest_1.jpg","../image/image_63/63_St_Genest_2.jpg","../image/image_63/63_St_Genest_3.jpg","../image/image_63/63_St_Genest_4.jpg"]},"Consult_chateau_formulaireb95f-2":{"id":"Consult_chateau_formulaireb95f-2","dept":"63","canton":"St-Gervais-d`Auvergne","commune":"St-Gervais-d`Auvergne","nom":"St_Gervais_Auvergne","type":"Château","periode":"XVI","histoire":"St-GERVAIS, Depuis 1522, Saint-Gervais est une co-seigneurie. En 1616. elle est partagée entre Pierre de Rochefort, seigneur  de Salvert, gentilhomme ordinaire de la chambre du roi et Gilbert-Gaspard de Montmorin, seigneur de Saint-Hérem et Châteauneuf. En 1647, ce dernier récupère la totalité du domaine lorsque Françoise-Julie de Rochefort   meurt au   château. Jusqu'au début du XVIIIe siècle, la propriété est à ses héritiers directs.  En 1767,  elle est achetée par Jean-Baptiste Thomas, marquis de Pange, dont les héritiers en sont seigneurs jusqu'en 1789.","architecture":"Château bâti en 1616, composé   d'un logis en équerre de 2 niveaux,  desservis par une haute tour carrée d'escalier, pourvue à un angle d'une haute guette circulaire sur tas-de-charge. Au Moyen-âge, Saint-Gervais était fortifiée par un rempart eux-mêmes protégés par des fossés. Plusieurs portes permettaient l'accès à la cité. Dans l'enceinte de la ville il existait un château féodal, lui-même entouré de fossés. Une bourgeoisie nombreuse habitait Saint-Gervais et vivait dans des maisons avec pignon sur rue, tourelle pour l'escalier et blason de la famille. Il existe encore quelques-unes de ces vieilles demeures qui datent du XVe siècle. Au milieu du XVe siècle l'église fut fortifiée (pour se protéger des Anglais qui s'était tristement illustrés dans la région). En 1601, la plate-forme sur laquelle est située l'église, est ornée de tilleuls dits \"Sully\", dont il subsiste quelques exemplaires. Au XVIIe siècle, Saint-Gervais changea de physionomie, les fossés furent comblés, les remparts et les portes détruits. La vieille forteresse seigneuriale fut également détruite. On construisit alors le nouveau château qui existe aujourd'hui. Le Château de la Vilatelle, détruit par un incendie.","habitants":"Famille de Pierre de Rochefort\r\n        \"","divers":"Château de St-Gervais d'Auvergne","gps":"","images":["../image/image_63/63_St_Gervais_Auvergne_1.jpg","../image/image_63/63_St_Gervais_Auvergne_2.jpg"]},"Consult_chateau_formulaire7f6f":{"id":"Consult_chateau_formulaire7f6f","dept":"63","canton":"St-Germain-Lembron","commune":"St-Gervazy","nom":"St_Gervazy","type":"Château","periode":"XIV","histoire":"ST-GERVAZY  Ce Château a appartenu à Golfier, à Henri, puis à Jean de Saint Gervazy ; ensuite à la famille d'Oradour jusqu'en 1820 date à laquelle il fut vendu en trois parties dont la partie centrale à la municipalité qui y a installé la mairie et le presbytère. Depuis 1986, l'association de sauvegarde du château a oeuvré à la restauration de ce patrimoine en péril.","architecture":"Saint-Gervazy, la construction de ce château semble remonter à la fin du XIVe siècle. Un siècle après, on abattit également la courtine nord afin d'ouvrir le château vers le bourg de Saint-Gervazy. Il est situé sur une butte composée d'une roche argileuse, sa forme est un quadrilatère irrégulier cantonné de tours sur trois angles seulement. Le quatrième est surmonté d'une échauguette articulant le chemin de ronde. La partie la plus ancienne semble remonter à la fin du XIIIe siècle. Il s'agit de la tour maîtresse, haute de 22 mètres. Son sommet est percé de grandes archères meurtrières.\r\nFin XVIe-début XVIIe siècle, le logis principal sud sur cour a été complètement modifié pour abandonner son caractère défensif et en faire un lieu de vie plus agréable,  galerie, escalier droit à balustres. Enfin, le mur qui fermait la cour au nord a également été abattu. (Le château est inscrit aux sites remarquables du territoire). Aujourd'hui les travaux sont conduits par la commune devenue propriétaire de l'ensemble de l'édifice et par la communauté de Communes Lembron Val d' Allier dans le cadre de l'intervention de chantiers d'insertion cofinancés par le conseil général.","habitants":"Famille d'Oradour\r\n        \"","divers":"Château de Saint-Gervazy","gps":"","images":["../image/image_63/63_St_Gervazy_1.jpg","../image/image_63/63_St_Gervazy_2.jpg","../image/image_63/63_St_Gervazy_3.jpg","../image/image_63/63_St_Gervazy_4.jpg","../image/image_63/63_St_Gervazy_5.jpg","../image/image_63/63_St_Gervazy_6.jpg","../image/image_63/63_St_Gervazy_7.jpg"]},"Consult_chateau_formulaire2d24":{"id":"Consult_chateau_formulaire2d24","dept":"63","canton":"Emezat","commune":"St-Ignat","nom":"St_Ignat","type":"Château","periode":"XVI","histoire":"Saint-IGNAT, vers 1263 Hugues du Vernet dit de Saint-Ignat est seigneur. Au XIVe siècle est citée une famille éponyme. En 1445 Béatrix du Vernet porte le château par mariage à Léonnet de Vassel, seigneur de Vassel et de la Tour-Fondue. En 1522, Antoinette de Polignac,  veuve de Godefroy II de la Tour d'Auvergne,  seigneur de Montgascon et du Livradois, échange le fief de St-Ignat contre les seigneuries de Beissat et Nérestang avec Béraud Reynaud bourgeois  de Maringues.  En 1530, Michel   de Pons possède le fief. En 1536-1543, Amable   de Cériers, seigneur des Martres sur Morges, Saint-Ignat, et Champyroux,  se dit baron de Palerne. Au courant du XVIIe siècle, Saint-Ignat passe par mariage à Imbert Regin, puis à René de Besse de la Richardie.","architecture":"Château de St-Ignat construit   au XVIe siècle, situé au lieu-dit \"Le Château\", à 800 mètres du bourg vers Villeneuve-l'Abbé. Reste d'une grande  enceinte quadrangulaire d'environ 60 X 40 m  à flanquements circulaires d'angle, il en reste  deux, l'un accolé à un logis de deux niveaux,  et l'autre beaucoup plus gros percé d'une canonnière horizontale, est maintenant isolé et effondré sur une moitié.","habitants":"Famille de René de Besse de la Richardie\r\n        \"","divers":"Château de Saint-Ignat","gps":"","images":["../image/image_63/63_St_Ignat_1.jpg","../image/image_63/63_St_Ignat_2.jpg"]},"Consult_chateau_formulaire4663":{"id":"Consult_chateau_formulaire4663","dept":"63","canton":"Sauxillanges","commune":"St-Martin-des-Pleins","nom":"St_Martin_Plains","type":"Vestiges","periode":"XVI","histoire":"St-MARTIN le Plains. En 1537, passe  à Marguerite de Saint-Martin, veuve de Jean de Chaslus, seigneur de Cordès. Vers 1560, Marthe,  fille de Jacques de Chaslus, apporte la seigneurie en dot à Gabriel de Serment, écuyer,  seigneur de Condat, Montrodès et Le Montel. Peu après 1612, sa fille, Diane de Serment est dite   dame de Montrodès. En 1644, le Château passe par   mariage au baron Henri de Salers. En 1666, le baron est condamné pour meurtre et sa baronnie confisquée par le roi. Mais ses châteaux et seigneuries de St-Martin des Plains et   du Montel restent à sa veuve Diane de Serment. En 1674, celle-ci est dite dame de Saint-Martin. En 1689, Claude Panel est chatelain de Saint-Martin et fondé de procuration de Louis de Guilhem, seigneur des Aiguilles.                        BETHEL  Vers 1400, Urbain d'Oradour, chevalier, est seigneur d'Oradour, Béthel et Malbet. En reconnaissance pour ses qualités de chevalier et pour sa bravoure dans la guerre contre les Anglais, Bertrand V de la Tour lui fait épouser, Marguerite de la Tour. Vers 1436,  Robert d'Oradour est seigneur de Lemandié. Béthel et Le Colombier, fiefs situés dans la châtellenie de Nonette. Jacques d'Oradour, petit-fils de Robert, est seigneur de St-Gervazy et Béthel en 1532. En 1557 Jacques d'Oradour, chevalier, seigneur de St-Gervazy, épouse Claudia, héritière  du baron Antoine de Saillant. En 1572, Jacques  d'Oradour habite le château de Béthel. En 1593, Anne d'Oradour est dame de Béthel.                                     COLOMBIER, Avant 1406, lors de son mariage avec Marguerite de La Tour, Urbain d'Oradour est dit seigneur de Béthel et du Colombier. En 1436 et 1444, Robert d'Oradour est seigneur de Béthel et du Colombier. En 1490, Henri du Breuil  seigneur   du Colombier, épouse Isabeau de Villeret. En 1519, sa fille Anne porte le château par mariage à Jean de la Salle, chevalier, seigneur de la Volpilière. Vers 1625,  le château est à la famille de Faydides qui le vend en 1690 à Claude Gilbert Aldebert de Seveyrac. En 1748, il passe par mariage à François Hector de Simiane.","architecture":"Château de Saint-Martin le Plains du XVIe siècle, reste d'une enceinte quadrangulaire à tours circulaires d'angle, il en subsiste deux  percés de canonnières horizontales, accolés à un logis de 3 niveaux à retour d'aile, desservi à l'angle intérieur par   une tourelle polygonale d'escalier. \r\nChâteau de Béthel situé à deux km du bourg par un chemin (entre Orsonnette et Les Pradeaux). Enceinte quadrangulaire à flanquements circulaires d'angle, il en subsiste deux accolés à un logis de deux niveaux et demi. Au XIXe siècle logis et tours ont été surhaussés et remaniés.                                                             Château du Colombier situé au nord ouest de St Martin des Plains.  Enceinte quadrangulaire à tours circulaires d'angles, il reste une  grosse tour cylindrique coiffée en appentis et transformée en pigeonnier.","habitants":"seigneur d'Oradour\r\n        \"","divers":"Vestiges du château de Saint-Martin le Plains, château de Bethel et du Colombier","gps":"","images":["../image/image_63/63_St_Martin_Plains_1.jpg","../image/image_63/63_St_Martin_Plains_2.jpg","../image/image_63/63_St_Martin_Plains_3.jpg","../image/image_63/63_St_Martin_Plains_4.jpg","../image/image_63/63_St_Martin_Plains_5.jpg","../image/image_63/63_St_Martin_Plains_6.jpg","../image/image_63/63_St_Martin_Plains_7.jpg"]},"Consult_chateau_formulairebc09":{"id":"Consult_chateau_formulairebc09","dept":"63","canton":"Champeix","commune":"St-Nectaire","nom":"St_Nectaire","type":"Château","periode":"XIX-XX","histoire":"SAINT-NECTAIRE, le premier établissement thermal est construit vers 1810 par Jacques Mandon.  Vers 1820 Mandon reconstruit ces installations, construction toujours existante, correspondant à la partie inférieure et à la moitié Est des bains actuels. Au début des années 1820, un garçon baigneur du nom de Boëtte, employé par Mandon, découvre trois sources : la source du Rocher, la source Boëtte et la source Saint-Cézaire. En 1824  Boëtte fait construire un second établissement de bains, qui gardera son nom jusqu'en 1890, il comporte au rez-de-chaussée une salle avec 9 cabines, et au premier étage les réservoirs de deux sources très chargées en acide carbonique. En 1832 un troisième établissement thermal est construit par Mr. Serre au Mont-Cornadore, et lHôtel Mandon (futur Hôtel du Mont-Cornadore) est bâti en son voisinage en 1841 par Joseph Mandon, un fils de Jacques Mandon.  Jules Mandon, frère de Joseph Mandon, cède les bains de Saint-nectaire-le-Bas à Boëtte Rochette en 1865. Boëtte Rochette en donne la direction à son gendre Vauzy-Boëtte vers 1879. Vauzy-Boëtte restaure létablissement et en double les capacités.                    LAMBRE  En 1331, le chevalier Jean de Chaste, fait hommage de la seigneurie à l'évêque de Clermont. Ën 1450, Pierre de Tersac est seigneur de Ligonnés et de Lambre. Au XVe siècle, le château appartient aux Tersac, Jusqu'au début   du XVIIe siècle, le château reste dans cette famille. En 1612, Henri de Tersac est seigneur de Lambre, La Chaize, Fontmarcel et  Borde. En 1713, M. de Montagut de Bouzols vend Lambre à Gabrielle d'Aurelle de Terreneyre, veuve de   Jacques-Marie d'Oradour. Son fils   puis son petit-fils possèdent Lambre. En 1759, Antoine d'Oradour, chevalier, comte d'Authezat, capitaine de dragons, est   seigneur de Lambre et de La Vernède. En 1772, il vend à son cousin Charles-François d'Oradour, seigneur   de St-Gervazy et Sarlant, les seigneuries châteaux d'Authezat, La Vernède  et Lambre.","architecture":"Vers 1820 Mandon reconstruit ces installations, construction toujours existante, correspondant à la partie inférieure et à la moitié Est des bains actuels   Cette prospérité dure environ 20 ans. Mais les propriétaires de la station thermale mettent avant tout l'accent sur le développement des revenus hôteliers.                                Lambre, château situé à 2 km au nord du village. D'une enceinte quadrangulaire, il subsiste un flanquement circulaire d'angle dérasé et recoiffé en appentis.","habitants":"Famille de Jacques Mandon\r\n        \"","divers":"Station thermale  château de St-Nectaire, de Lambre, de Chambert,etc.","gps":"","images":["../image/image_63/63_St_Nectaire_1.jpg","../image/image_63/63_St_Nectaire_2.jpg","../image/image_63/63_St_Nectaire_3.jpg","../image/image_63/63_St_Nectaire_4.jpg","../image/image_63/63_St_Nectaire_5.jpg","../image/image_63/63_St_Nectaire_6.jpg","../image/image_63/63_St_Nectaire_7.jpg","../image/image_63/63_St_Nectaire_8.jpg"]},"Consult_chateau_formulaire0d09":{"id":"Consult_chateau_formulaire0d09","dept":"63","canton":"Rochefort-Montagne","commune":"St-Pierre-Roche","nom":"St_Pierre_Roche","type":"Château","periode":"XVI","histoire":"St-PIERRE-ROCHE, le château de la  Motte-Choisy avant 1400 le lieu est mentionné comme dépendance du prieuré de Ris. De 1523 à 1543, Eustache de Chantoin, seigneur de la Mothe-Chantoin et de la Mothe-Choisy, rend hommage pour les deux seigneuries. En  1666, Antoine de Boyer est seigneur de Choisy et de la Mothe-Chantoin. La même année, François Rougier, est seigneur   de la Motte-Chantoin  y réside. Après 1725, la Mothe-Choisy passe par   héritage à  François de Saint-Julien, seigneur   de La Rodde. Il vend la propriété vers 1739 à Geoffroy Sicaud, secrétaire du Roi   en la  chancellerie près de la cour des monnaies de Lyon. Le château appartient aujourd'hui à M. de Bonnevie.                \r\nRIOUX,  L'origine de l'actuel château des Rioux remonte au XVe siècle, mais il a sans doute été construit sur un  édifice plus ancien, puisqu'un fief de Rioux aurait existé antérieurement, il se trouve au nord de Saint-Pierre Roche, bâti sur des orgues basaltiques.","architecture":"St-Pierre-Roche, dit de la Motte Choisy, donjon-logis de trois niveaux,  repercé de grandes baies au XVIIe siècle. Il est saillant   sur le côté d'une enceinte quadrangulaire sans flanquement; celle-ci était autrefois cernée de douves (rétablies en eau à l'ouest).            Rioux. La tour d'escalier, au centre, et l'avant corps de droite, au nord, sont des témoins de cette époque. Le château a, par la suite fait l'objet de plusieurs aménagements:  Le corps central  a peut-être  été remanié à cette époque, ou au début  du XIXe siècle. C'est dans le premier quart du XIXe siècle  en tout cas, qu'est construite  l'aile sud : la date 1822 est portée  sur le linteau de porte  situé au sud-ouest. Le château, encore debout dans la première moitié du XXe siècle, a été laissé à l'abandon et il est actuellement complètement ruiné.","habitants":"Famille d'Antoine de Boyer\r\n        \"","divers":"Château de  Saint-Pierre de Roche et des  Rioux,","gps":"","images":["../image/image_63/63_St_Pierre_Roche_1.jpg"]},"Consult_chateau_formulaire2858-2":{"id":"Consult_chateau_formulaire2858-2","dept":"63","canton":"Menat","commune":"St-Quintin-sur-Sioule","nom":"St_Quintin","type":"Château","periode":"XIV","histoire":"ST-QUINTIN, historique idem à Beaudeduit (Voir article). Le fief de Saint-Quintin est à Roger de Saint-Quentin, chevalier, qui en rend hommage vers 1250 à Alphonse de Poitiers. Il restera dans la même famille jusquau début du XVIe siècle où il est vendu à Maximilien de La Mer. Parmi les successeurs, on trouve plusieurs militaires, ainsi Alexandre de Saint-Quentin capitaine dinfanterie au régiment de la Roche Aymon puis à celui de Hainait vers 1760-1770. Le domaine de Chantemerle est à Gilbert de Saint-Quentin lorsquil léchange en 1599 avec Louis de Basmaison, lieutenant général en la châtellerie de Chantelle, contre des droits, actions, hypothèques pouvant appartenir à celui-ci sur Salpalaine et le moulin du Bouchet. Près du village de Chantemerle, un territoire porte le nom de Camp. \r\nDans la commune le château de la Grave.","architecture":"Saint-Quintin sur Sioule,   édifié au XIIIe ou XIVe siècle, le château illustre les styles qui se sont succédé jusqu'au XVIIe siècle.  L'édifice se compose d'un corps de logis principal encadré d'un pavillon rectangulaire au nord et d'une tour ronde au sud. Dans cette tour s'imbrique l'aile sud qui fait retour vers l'ouest. Prolongeant le pavillon et décrochée par rapport   à celui ci, l'aile nord dessine une forte avancée vers l'ouest. Dans l'angle de l'aile nord et du corps de logis s'élève la  tour de l'escalier que flanque une sorte de redan.   Le château a conservé son caractère médiéval,  les autres époques étant surtout marquées dans les percements. A  l'intérieur, un ensemble de peintures serait l'oeuvre du peintre Moillon  et aurait été exécuté vers 1653. Egalement, cheminées gothiques. Plus ancienne que le château, de la chapelle ne subsiste que la partie orientale faite de trois vaisseaux accolés que prolonge une abside entre deux absidioles. Il s'agit d'un ancien sanctuaire  antérieur au XIe siècle et transformé au  XIIe siècle. A l'intérieur, restes de sculpture semblant se rattacher à l'art paléochrétien.","habitants":"Famille de Roger de Saint-Quentin\r\n        \"","divers":"Château de Saint-Quintin et de la Grave.","gps":"","images":["../image/image_63/63_St_Quintin_1.jpg","../image/image_63/63_St_Quintin_2.jpg","../image/image_63/63_St_Quintin_3.jpg"]},"Consult_chateau_formulaire993e-2":{"id":"Consult_chateau_formulaire993e-2","dept":"63","canton":"Sauxillanges","commune":"St-Rémy-de-Chargnat","nom":"St_Remy_Chargnat","type":"Château","periode":"XVI","histoire":"Plusieurs châteaux à St-REMY de CHARGNAT dont Pasredon (voir article).                                                                        AIGUILLES, vers 1590, François de Guilhen est seigneur de la Rochette, Verrières et Les Aiguilles. En 1689, Louis de Guilhen, écuyer, seigneur des Aiguilles, il est extrêmement pauvre. En 1720,  sa fille Catherine porte le château par alliance  à Antoine de Rochemaure. Transformé en chambres d'hôtes.                  CHARGNAT  La seigneurie de Chargnat faisait partie d'Usson. En 1518, le garde du sceau royal du château d'Usson, Alain  de Termes, réside à Chargnat. Charles-Louis d'Oradour, né vers 1694, chevalier, est marquis d'Authezat, seigneur  de La Vernède et de Chargnat.                                                                                  VERNEDE, ancien pavillon de chasse de la reine Margot, transformé en folie néo-gothique au XIXe siècle, vous accueille toute l'année.  transformé aussi en chambre d'hôtes   par la famille Chauve.                                                                               PERTHUS  manoir de  Guillaume de Quincampoix mort, en 1548 est dit seigneur du Perthus près de Chargnat. En 1601, Perre  de  La Reynerie seigneur de La Viale, hérite de Perthus. Vers 1665 Catherine de La Reynerie porte le fief par mariage  à Jean d'Oradour, seigneur de Parent. En 1647,  est cité au ban de la noblesse Jean d'Oradour, écuyer, seigneur de Parent et de Perthus. En 1683, il donne ses biens à Françoise de Chaslus, femme de Jean Marc Perron, avocat au parlement, mais en 1689,  sa veuve Catherine de La Reynerie jouit encore de la seigneurie de  Perthus. Vers 1700, elle vend le manoir à   Jean de Moreau, seigneur   de Brohet, qui avait épousé sa soeur Marie. La famille est encore propriétaire après 1782.","architecture":"Aiguilles, château situé à 500 mètres à l'est   de l'église. Donjon-logis  arasé, il en reste deux niveaux flanqué de deux tours circulaires recoiffées en appentis style maison forte à deux niveaux flanqué de tours rondes arasées.                                             Chargnat, château bâti au XIVe siècle en bordure nord-ouest du village, un donjon cylindrique flanquant, à talus interrompu, maintenant  arasé, commande une enceinte quadrangulaire   d'environ 50 mètres de côté, dont   subsiste en outre un flanquement carré.                                                              Manoir de Perthus, situé à 1,3 km au sud-est du bourg, c'est un logis rectangulaire de deux niveaux accosté d'une haute tourelle circulaire d'escalier. \r\nVernède, devenu folie néo-gothique au XIXe siècle, corps de logis à deux niveaux à hautes toitures, flanqué d'un pavillon à trois niveaux et attiques, accolé d'une échauguette en angle ainsi qu'une tourelle à l'opposé du bâtiment.","habitants":"Famille de François de Guilhen                                                           Famille de  Charles-Louis d'Oradour\r\n        \"","divers":"Château  de Chargnat, des Aiguilles, du Bois-Rigaud, manoir de Perthus et château  de la Vernède.","gps":"","images":["../image/image_63/63_St_Remy_Chargnat_1.jpg","../image/image_63/63_St_Remy_Chargnat_2.jpg","../image/image_63/63_St_Remy_Chargnat_3.html","../image/image_63/63_St_Remy_Chargnat_4.jpg","../image/image_63/63_St_Remy_Chargnat_5.jpg","../image/image_63/63_St_Remy_Chargnat_6.jpg","../image/image_63/63_St_Remy_Chargnat_7.jpg","../image/image_63/63_St_Remy_Chargnat_8.jpg"]},"Consult_chateau_formulaire6f23":{"id":"Consult_chateau_formulaire6f23","dept":"63","canton":"St-Amant-Tallende","commune":"St-Saturnin","nom":"St_Saturnin","type":"Forteresse","periode":"XIII","histoire":"ST-SATURNIN, une forteresse médiévale devenue demeure royale l'architecture militaire du XIIIe siècle, l'influence de la Renaissance et de la destinée prestigieuse de la famille La Tour d'Auvergne. Château Royal qui eut pour hôte Catherine de Médicis et Charles IX,  Saint-Saturnin fut la résidence des barons de la Tour d'Auvergne, qui devinrent comtes d'Auvergne. C'est de cette famille dont est issue Catherine de Médicis, fille de Laurent II de Médicis et de Madeleine de la Tour d'Auvergne. Elle devint reine de France après son mariage avec Henri II, et à Marguerite de Valois puis au Roi Louis XIII.  Fut la propriété des filles de la Charité et de monsieur André Chomette. Devenues aujourd'hui sous l'appellation \"Château Royale de St-Saturnin\" hôtel restaurant par la famille Penicaud.","architecture":"Bâtisse du XIIIe siècle restaurée, Une forteresse médiévale devenue demeure royale et située dans un site magnifique. Tours, douves et chemins de ronde expriment toute la puissance de l'architecture militaire du XIIIe siècle. Fenêtres à meneaux, grands escaliers à vis, immense toit et remarquable charpente témoignent de l'influence de la Renaissance et de la destinée prestigieuse de la famille La Tour d'Auvergne,  le château Royal de Saint Saturnin ouvre ses portes à quelques privilégiés qui pourront profiter d'une chambre d'hôte au cur de l'Auvergne. Cette forteresse fait aujourd'hui partie des plus beaux châteaux du Puy-de-Dôme. Remanié aux XIVe et XVe siècles, le château est agrémenté d'un jardin à la française, il est classé depuis 1889 au titre des monuments historiques alors que le mur d'enceinte, les douves et les jardins sont inscrits depuis 1992.\r\nParfait exemple de grand château médiéval et remarquablement restauré, cette importante forteresse témoigne de larchitecture militaire du Moyen Age : douve sèche, remparts et chemin de ronde, tours à créneaux et mâchicoulis. Il a été agrandi et embelli jusqu'au XVIe siècle, sous linfluence de la Renaissance.","habitants":"Famille La Tour d'Auvergne\r\n        \"","divers":"Château de Saint-Saturnin.","gps":"","images":["../image/image_63/63_St_Saturnin_1.jpg","../image/image_63/63_St_Saturnin_2.jpg","../image/image_63/63_St_Saturnin_3.jpg","../image/image_63/63_St_Saturnin_4.jpg","../image/image_63/63_St_Saturnin_5.jpg"]},"Consult_chateau_formulaire349f":{"id":"Consult_chateau_formulaire349f","dept":"63","canton":"Sauxillanges","commune":"Surgères","nom":"Surgeres","type":"Château","periode":"XVI","histoire":"SURGERES-Fournial, en 1580, Louis de la Foresterie, écuyer, et  seigneur, réside dans sa maison du Fournial. Avant 1600, sa fille Jacqueline,  veuve de Joseph de Bard,  en fait don à son fils Philbert de Bard. En 1675, Joseph de Bard,  fils de Philibert,  est seigneur du Fournial, habite le château.  En 1706 Marguerite de Bard le porte par mariage à Antoine de Vaux,  seigneur du Chambon. En 1751  propriété de Jean Baptiste Laville.","architecture":"Château situé à 1,5 km au nord-ouest du bourg, au midi du hameau, dominant de façon vertigineuse d'une cinquantaine   de mètres le ruisseau   de l'Ailloux. C'est un   donjon-logis rectangulaire de 3 niveaux cantonné aux angles d'étroites tourelles-contreforts. Il a été augmenté d'une tour carrée.","habitants":"Famille de Louis de la Foresterie\r\n        \"","divers":"Château de Surgères","gps":"","images":["../image/image_63/63_Surgeres_1.jpg","../image/image_63/63_Surgeres_2.jpg","../image/image_63/63_Surgeres_3.jpg"]},"Consult_chateau_formulaire692f":{"id":"Consult_chateau_formulaire692f","dept":"63","canton":"Herment","commune":"Verneughéol","nom":"Teyssoniere","type":"Château","periode":"XVIII","histoire":"TEYSSONNIERE  En 1330, Pierre de la Roche tient la seigneurie de l'évêque. Vers 1350, sa fille Béatrix de la Roche épouse  Pierre de Rochemaure. Vers 1380, leur fille unique Marguerite, dame de Rochemaure et de Teyssonnières, épouse  Armand de Murat qui relève le nom et les armes des Rochemaure.  En 1425,  passe à  Bérenger de Murat de Rochemaure, puis à Philibert de Murat de Rochemaure. puis en 1666, à Jean de Murat Rochemaure qui  réside à Vemeughéol. Après 1700 le dernier Murat de Rochemaure lègue la seigneurie de Teyssonnière à son neveu Pierre de Bort, seigneur de Pierrefitte.    Aujourd'hui la famille Merle en est propriétaire.","architecture":"Château  de Teyssonnière  en forme de U à deux niveaux et attiques, l'ancien château situé à 5 km  au sud du village .  Sur une croupe,  deux mottes sont proches d'une vingtaine de  mètres. L'une,  fouillée,  contient la base d'un donjon. L'autre est surmontée des restes d'un donjon rectangulaire de trois niveaux et un niveau de cave, qui a été allongé.","habitants":"Famille de Murat de Rothemaure\r\n        \"","divers":"Château de la Teyssonière.","gps":"","images":["../image/image_63/63_Teyssoniere_1.jpg"]},"Consult_chateau_formulaire7672":{"id":"Consult_chateau_formulaire7672","dept":"63","canton":"Beaumont","commune":"St-Genès-Champanelle","nom":"Theix","type":"Château","periode":"XVI","histoire":"THEIX,  Pierre de Cisternes, seigneur du Theix, Vinzelles, Fontfreyde, Nadaillat, Malsaigne, élu en l'élection de Clermont, mourut le 3 février 1663, laissant la seigneurie à  Marie Vachier, sa femme.   Etienne de Cisternes, écuyer, seigneur de Theix, Vinzelles, Banssat, Nadaillat, Plaisance, Fontfreyde, président la cour des aides de Clermont en 1667, marié à Françoise de Ribeyre , dont Pierre, chevalier, baron de Theix, seigneur de Vinzelles, né à Clermont en 1660, mort dans cette ville en 1733, président à la cour des aides de cette ville en 1690, marié à Henriette-Élisabeth Le Verrier , dont: Nicolas-François, chevalier, baron de Theix, seigneur de Vinzelles, né en 1703, reçu président à la cour des aide de Clermont en 1731, marié en 1736, à Perette Rollet de Lauriat, il mourut sans enfant en 1754. Sa soeur Marie épousa, en 1719, Jean-François Dauphin, chevalier, seigneur de Leyval, Montrodès, procureur-général à la cour des aides de Clermont, après la mort de son frère, elle hérita de la terre de Theix, dont elle fit donation à sa fille Marguerite Dauphin de Montrodès, mariée à Pierre-Gilbert-Philippe de Veyny d'Arbouse, marquis de Villemont, page du roi en sa grande écurie, bailli de Montpensier; celui-ci était seigneur de Theix en 1789.    M. Franc Chauvassaignes, conseiller général du Puy-de-Dôme, est le propriétaire actuel du château de Theix.","architecture":"Le château de Theix deux ensembles côte à côte l'un féodal l'autre moderne, le féodal de plan triangulaire à deux niveaux avec tours rondes en angles dont deux à trois niveaux toitures en poivrières, le corps de logis  central toiture à deux pans. Le château moderne du XXe siècle  à deux niveaux flanqué de pavillons carrées en façades, toitures en ardoises.","habitants":"Famille de Pierre de Cisternes\r\n        \"","divers":"Château de Theix.","gps":"","images":["../image/image_63/63_Theix_1.jpg","../image/image_63/63_Theix_2.jpg","../image/image_63/63_Theix_3.jpg","../image/image_63/63_Theix_4.jpg"]},"Consult_chateau_formulairea098":{"id":"Consult_chateau_formulairea098","dept":"63","canton":"Thiers","commune":"Thiers","nom":"Thiers","type":"Château","periode":"XV-XVI-XX","histoire":"Plusieurs châteaux à Thiers dont 'histoire de la ville semble remonter à 1371.  la baronnie de Thiers passe aux ducs de Bourbon. je n'ai pas information pour certain.                           CROC, de la famille du Croc, on se souviendra de Philibert, maître d'hôtel ordinaire de Charles IX, nommé ambassadeur auprès de Marie Stuart, reine d'Écosse, en 1565.  le Croc devient propriété de la famille Perdrigeon qui lui donne son nom.                       HORTS, construit au XVIe siècle par la famille Ossandon, il passe ensuite aux Riberolles.                                          FRANCSEJOUR (ou Freiz-séjour), près du Moûtier, a été construit à la fin du XVe siècle pour Jehan Petidé, prévôt de l'église de Thiers et conseiller de Jean de Bourbon.                     CHASSAIGNE, le manoir remonte au XVe siècle. En 1720, le marquis de Simane, arrivant dAix-en-Provence, acquiert la propriété et y crée des jardins, transforme la propriété. Les propriétaires actuels achètent le domaine en 1986 et décident de recréer les jardins.                                                            BERAUX furent édifiés au XVIe siècle par Jean Archimbaud, un riche marchand.                                                                     CHAMPS, manoir , avant 1590 la terre appartient à Samard de Névrezé,  contrôleur des guerres, construit au XVIIe siècle pour la famille Grandsaigne, qui s'alliera avec celle de Blaise Pascal. Au XVIIIe siècle, son nouveau propriétaire, subdélégué de Thiers, y a implanté une magnanerie.                                                       MOLLES,  manoir  a peut-être abrité les derniers jours du comédien Montdory. Sa fille Catherine avait en effet épousé son propriétaire l'année précédente.                                                   \r\nPERDIGON, le 15 mars 1545, Philibert du Croc rend hommage au Dauphin d'Auvergne pour sa seigneurie du Croc. En 1714, la fille de  Jean-Claude  du Croc épouse Emmanuel Gaspard, marquis du Bourg, auquel elle apporte tous ses biens.  Le château passe aux de La Mure du Chautois, puis aux Fabry. En 1805, François Perdrigeon,  notaire, l'achète . En 1868, Hélène Perdigeon le porte par mariage à Charles Octave de Viry.                          \r\nVALLERIE; relais de Chasse du XVIIIe siècle chambres d'hôtes.","architecture":"Croc au nord de la ville, date du début du XIVe siècle comme en témoignent les inscriptions sur les deux tours, et présente encore un bel aspect de demeure fortifiée Les murs ont jusqu'à deux mètres d'épaisseur avec une base en pierre, le reste est maçonné avec un pisé très dur. On franchit le fossé qui borde le château sur un pont de pierre qui a remplacé le pont-levis au XVIIIe siècle. L'édifice a défendu la ville pendant les guerres de religion. Un vaste parc et une ferme très ancienne jouxtent l'édifice.   Horts   situé au sommet de la ville a subi des modifications aux XVIIIe et XIXe siècles mais conserve lui aussi un aspect de château fort. Les remparts forment un carré encadrant une cour centrale et sont flanqués d'une tour à chaque angle.                                         Francsejour. Cette élégante gentilhommière a conservé son bel ensemble de bâtiments agricoles.                                          Chassaigne  manoir gothique, sa construction date de la fin du XVe siècle. Au premier étage, on trouve la grande galerie ainsi qu'une chapelle bien conservée.                                                           Perdrigon  construit au XIVe siècle,  situé à 3.5 km du bourg,  au  nord des Gamiers vers Puy-Guillaume. Enceinte   quadrangulaire à flanquements circulaires d'angle (il en reste deux), cernée de douves. La porte-tour est  défendue par une archère;  sa partie supérieure (refaite) présente deux courtes ouvertures d'un pont-levis à chaine et un couronnement en pan de bois.","habitants":"Ducs de Bourbon\r\n        \"","divers":"Château de Thiers, de Francsejour, de Moutiers, de Chassaigne, de Beraux, de  Molles, de Perdigon  de Croc, de Horts et de Vallerie","gps":"","images":["../image/image_63/63_Thiers_1.jpg","../image/image_63/63_Thiers_2.jpg","../image/image_63/63_Thiers_3.jpg","../image/image_63/63_Thiers_4.jpg","../image/image_63/63_Thiers_5.jpg","../image/image_63/63_Thiers_6.jpg","../image/image_63/63_Thiers_7.jpg","../image/image_63/63_Thiers_8.jpg"]},"Consult_chateau_formulaireb52c":{"id":"Consult_chateau_formulaireb52c","dept":"63","canton":"Ambert","commune":"Job","nom":"Tour_Goyon","type":"Château","periode":"XIX","histoire":"TOUR-GOYON, dès 1112 est citée une famille éponyme avec Jean de La Tour, au service d'un sire de Baffie. En 1366, le damoiseau Guillaume de La Farge, époux de Béatrice Motier de la Fayette, fait aveu du fief de sa maison de la  Tour-Goyon à Geoffroy de Boulogne, en raison de la châtellenie de Boulonnargues. En 1391,  son fils Jean de La Farge, habite la tour Gayon, paroisse de Job. En 1580, à la mort du dernier La Farge,  le château passe  à Antoine du Bois, seigneur   de Montgaland, puis par mariage à la génération suivante aux Pons, seigneurs de La Grange. En 1683, les Vidal en sont seigneurs. En 1706, Jean-Baptiste Delaire prend possession   de la Tour-Goyon.  A cette date,  le château est une masure, n'ayant point de matériaux qui puissent servir, ni portes, ni fenêtres. Le nouveau château est relevé après la destruction du château roman pendant la guerre de Cent-Ans. Restes d'une  enceinte à flanquements ronds d'angle. Il en reste un percé de courtes meurtrières et les traces d'un deuxième. Les murs sont soigneusement liés de pierres calibrées,  mais non équarries. Le logis est abondamment repercé au  XIXe siècle de fenêtres à encadrements de bois.                                                           JOB  Naissance de la commune le 14 novembre 1791 par rattachement à Job de la petite paroisse de la Tour-Goyon. Le premier maire élu ce jour-là fut Annet Joseph Molin, bourgeois du bourg, important propriétaire terrien.","architecture":"Le château de La Tour Goyon est situé à Saint Etienne des Ouillères. La tour du château a été construite au XIIe siècle pour protéger les fermiers et repousser les dangers.\r\nChâteau des Mélézes du XIX transformé en hôtel restaurant.","habitants":"Famille d'Annet Joseph MOLIN\r\n        \"","divers":"Tour de Château Guyon à Job","gps":"","images":["../image/image_63/63_Tour_Goyon_1.jpg"]},"Consult_chateau_formulaireaf61":{"id":"Consult_chateau_formulaireaf61","dept":"63","canton":"Combronde","commune":"Montcel","nom":"Tour_Serviat","type":"Vestiges","periode":"XV","histoire":"TOUR-SERVIAT, en limite de la commune de Montcel, est situé à lemplacement dun domaine gallo-romain, une villa appartenant à un nommé Servatius. Il remonte au haut Moyen-Age. On relève en effet un hommage du seigneur de cette époque à Alphonse de Poitiers, le frère de Saint Louis, en plein XIIIe siècle. Deux siècles plus tard, en 1497, Antoine de Charais est seigneur de Latour-Serviat. Il est  lartisan de la construction du logis central et de ses tours, quil accole à la grosse tour féodale qui date, elle, du XIIe siècle. En 1520, Catherine de Charais, descendante directe dAntoine dame de la Tour-Serviat, veuve, la porte par remariage , épouse Gilbert de la Mer, seigneur de Matha. La dynastie de la Mer garde la possession du fief jusquen 1620.  En 1628, Gaspard de La Mer vend sa part de la seigneurie à Anne de Sauzay,  veuve de Louis de Bonnevie la seigneurie au seigneur de Mazières, Louis de Bonnevie.  Par le jeu des héritiers, puis par mariage à la famille de Larochelambert, dont un descendant vend le domaine en 1757 à Pierre Amable Duboys, seigneur de Macholles. Ce dernier mourant sans descendance en 1773, sa soeur Marguerite hérite de la propriété. Marguerite épousera Pierre Amable Soubrany, seigneur de Verrières, Les 2 parts du domaine sont  de nouveau réunies   par le mariage d'une fille de Bonnevie en 1790,    avec   Charles Ignace de Beauverger-Montgon. Puis la propriété est vendue en 1798 à douze propriétaires locaux.  Il est ensuite acquis par M.  Changarnier en  2004, qui entreprend sa restauration complète afin de retrouver son état dorigine.   MONTCEL, cest seulement en 1790 que la municipalité de Montcel obtient par soumission ce fief faisant partie des biens nationaux. Aujourdhui au XXIe siècle, un vestige du château de Catherine de Médicis est resté, trois tours qui dominent la vallée de la Morge.","architecture":"Château  de Serviat édifié au XVe siècle, situé à 1,8 km du bourg,  donjon-logis quadrangulaire flanqué  d'une tour du XVe siècle et de trois tours rondes sur angles,  il est dérasé et il ne reste que deux niveaux du corps de logis. Une tourelle d'escalier circulaire est demi hors-oeuvre. Lensemble de la propriété est vendue en 1798 à douze propriétaires locaux. Le château est alors utilisé comme bâtiment agricole, ce qui en sauve le gros oeuvre.                     Montcel fait partie de la communauté de Communes des Côtes de Combrailles et se mobilise pour les actions dintérêts communautaires et principalement pour le développement économique. La commune a conservé un caractère champêtre par la diversité du paysage que lon préserve pour le bien être de tous.  Les restes de muraille et les 3 tours surplombent encore la route et dissimulent le cimetière de la commune. L'histoire de ce château ainsi que sa seigneurie sont confuses. Seule la prise de possession par la reine Catherine de Médicis en 1552 est connue.","habitants":"Famille de Gaspard de La Mer \r\n        \"","divers":"Vestiges  de Montcxel et château de la tour Serviat","gps":"","images":["../image/image_63/63_Tour_Serviat_1.jpg","../image/image_63/63_Tour_Serviat_2.jpg","../image/image_63/63_Tour_Serviat_3.jpg","../image/image_63/63_Tour_Serviat_4.jpg"]},"Consult_chateau_formulaire94c3":{"id":"Consult_chateau_formulaire94c3","dept":"63","canton":"Riom","commune":"Volvic","nom":"Tournoel","type":"Vestiges","periode":"XII","histoire":"TOURNOEL, autour de Guy II de la Tour, seigneur de Tournoël, vrai bandit féodal, rançonnant les voyageurs, pillant les abbayes, telle celle de Mozat près de Riom, c'est ainsi que Robert, évêque de Clermont, n'était autre que le frère de Guy II. Lassé de l'agitation de cette noblesse indisciplinée, Philippe-Auguste,  en 1212 entra en lutte contre Guy II. Il s'empara de Tournoël et confisqua le comté d'Auvergne.  Plus tard, en 1299, Blanche de Castille restitua au fils de Guy II quelques terres qui formèrent un nouveau comté avec Vic-le-Comte pour capitale. En 1306 Philippe le Bel  échange Tournoël contre des possessions  détenus par la famille de Maumont. En 1345 à la mort de Pierre de Maumont le fief  revient à  sa fille qui épouse Géraud sire de la Roche, Hugues de la Roche, reconstruisit le château et s'attacha à le rendre imprenable, notamment en fortifiant les soubassements contre les sapes. Tournoël connut alors une époque brillante.  L'arrière petit fils de Hugues de La Roche, Antoine épouse en 1448 Jeanne de Vieuville et au XVIe siècle  Charlotte de la Roche apporte le château à Jean d'Albon  leur fils Jacques  maréchal de Saint-André qui le conserva jusqu'à sa mort en 1562  reviendra à sa soeur veuve du baron d'Apchon gouverneur d'Auvergne, puis à son neveu  Charles d'Apchon. Dévasté par la ligue en 1594 en triste état lors de la récupération par les Apchon et par alliance passe aux Montvallat qui le loue à des fermiers, puis passe aux Naucaze en 1766 et vendut à Guillaume de Chabrol conseiller d'état, toujours dans la descendance.","architecture":"Le château de Tournoël, campé sur un éperon rocheux, domine la plaine de la Limagne à 600 mètres d' altitude. Admirable forteresse médiévale remarquablement conservée, il nous restitue l'atmosphère de la vie du Moyen-Age, derrière les enceintes de pierres des châteaux forts.    Chemin de ronde,  pont-levis qui garde le dernier réduit de défense,  deux donjons  dont le  cylindrique du XIIIe siècle  haut de 32 mètres, du haut de ce donjon, une vue superbe s'étend sur plus de 100 kilomètres au-dessus de la Limagne jusqu'aux monts du Forez. Défiant les siècles, témoin vivant d'une histoire agitée, pendant la guerre de cent ans comme pendant les guerres de religion, au cours desquelles la châtelaine, qui avait été chassée de la forteresse, dût la reprendre de haute lutte, Tournoël illustre à la perfection la vie au Moyen-Age et à la Renaissance. A proximité de l'entrée, on pourra voir une curieuse cuve de pierre.   Château qui a subit d'énormes dégats lors des conflits et des remaniements au cours des ans.","habitants":"Famille de Blanche de Castille\r\n        \"","divers":"Vestiges de la forteresse féodal de Tournoel château de vinzelles et Brosson.","gps":"","images":["../image/image_63/63_Tournoel_1.jpg","../image/image_63/63_Tournoel_2.jpg","../image/image_63/63_Tournoel_3.jpg","../image/image_63/63_Tournoel_4.jpg","../image/image_63/63_Tournoel_5.jpg","../image/image_63/63_Tournoel_6.jpg","../image/image_63/63_Tournoel_7.jpg"]},"Consult_chateau_formulaire0083":{"id":"Consult_chateau_formulaire0083","dept":"63","canton":"St-Amant-Tallende","commune":"St-Sandoux","nom":"Travers","type":"Château","periode":"XIV","histoire":"TRAVERS,  fief appartenait, en 1574, à Pierre de Girard, seigneur de la Chau, du Chastel, secrétaire de Catherine de Médicis, reine de France, capitaine des châteaux de la Rodde et de Ravel. Pierre de Girard eut pour fils François, seigneur de Travers et d'Orcines, procureur fiscal d'Aurières en 1585, marié à Charlotte Ravel, père de François de Girard qui acheta Saint-Sandoux.  Jean III de la Tour, comte d'Auvergne, la reine Margot, fait donation, par lettres patentes, de la terre de Saint-Sandoux à Antoine de Sarlans (mort en 1586), son premier maître d'hôtel, pour le récompenser de divers services. Marguerite de Valois ratifie cette donation le 4 septembre 1589, sous la réserve du ressort. Bien en cour, Antoine de Sarlans, deuxième du nom, possède aussi Buron, Saint-Yvoine, Authezat et en partie Chaslus-les-Bussières. Le 18 juillet 1584, Antoine de Sarlans, seigneur, chevalier de l'ordre du Roi et premier maître d'hôtel de la Reine, donne les terres et seigneurie de Saint-Sandoux et d'Authezat à Claude de Sarlans, sa fille, veuve de Jacques d'Oradour, écuyer, seigneur de Saint-Gervasy, et au fils de ces derniers, Jacques d'Oradour; le 10 août 1588, Claude de Sarlans,  vend la terre de Saint-Sandoux à son fils Jacques, Jacques d'Oradour vendra Saint-Sandoux, en 1607, à François de Girard, seigneur de Travers. François de Girard tenait de ses parents le château et le fief de Travers, situés au nord de Saint-Sandoux, à une faible distance du village.Il appartient aujourd'hui à la famille de Quatrebarbes. Cette famille, originaire d'Anjou, compte parmi ses  ascendants un historien réputé de la guerre de Vendée, Théodore de Quatrebarbes ( 1807-1871)","architecture":"TRAVERS, édifié au XIVe siècle,  c'est une propriété privée. Le château proprement dit comporte des éléments des XIVe, XVIIe et XVIIIe siècles.   le château montre encore dans son plan le tracé de la forteresse médiévale dont il ne   subsiste plus qu'une tour ronde à l'angle nord. L'édifice a entièrement été remanié aux XVIIe et XVIIIe siècles.  Ses   façades sont percées de baies composées avec des chaînages en pierre, lucarnes et portes. La façade de l'orangerie aménagée sous la première terrasse, présente une architecture de bossages. Ce château constitue  un ensemble  remarquable, aussi bien par son aspect architectural   que par ses décors intérieurs et ses jardins transformés au XIXe siècle par Edouard André, paysagiste de renom.","habitants":"Famille d'Antoine de Sarlans ,                                                          Famille de  Pierre de Girard\r\n        \"","divers":"Vestiges des remparts de Travers à st-Sandoux et château de Travers.","gps":"","images":["../image/image_63/63_Travers_1.jpg","../image/image_63/63_Travers_2.jpg","../image/image_63/63_Travers_3.jpg","../image/image_63/63_Travers_4.jpg"]},"Consult_chateau_formulairedc8d":{"id":"Consult_chateau_formulairedc8d","dept":"63","canton":"St-Anthème","commune":"Grandif","nom":"Tremiolles","type":"Château","periode":"XV","histoire":"TREMIOLLES,  en 1319 est cité Robert de Tremiolles. En 1669, Grégoire Thomazet, avocat en parlement, est seigneur de Trémiolles. Vers 1678, le château passe par mariage dans la famille Imbert, dite depuis \"de la Trémiolles\", qui le  possède encore   vers 1747. Au XVIIIe siècle, le château avait changé de propriétaire, on y   trouve de nombreuses   traces (mariages et baptêmes) concernant la famille Colombier, papetier à Barot.  Le démembrement du château a  eu lieu au début du XIXe siècle; plusieurs propriétaires se sont partagé le lieu.","architecture":"Château  de la Trémiolles construit   au XIVe siècle, donjon-logis rectangulaire   de trois niveaux  dérasé et recoiffé en appentis. Il est pourvu à un angle d'une poivrière, dont   il reste le tas-de-charge et   la naissance de la maçonnerie. Il se présente  actuellement   comme un corps plus élevé sur une travée accosté d'un logis plus  bas sur 2 travées. En réalité, c'est un seul  grand bâtiment dont un étage a été enlevé sur deux travées, il  n'y a pas de solution de continuité,  il n'y a   pas de chaines d'angles  dans la partie haute du côté de la partie basse. Côté cour, une tour  circulaire d'escalier s'élève à l'angle intérieur d'un retour d'aile.","habitants":"Famille de Grégoire Thomazet\r\n        \"","divers":"Vestiges du château de la Trémiolles","gps":"","images":["../image/image_63/63_Tremiolles_1.jpg","../image/image_63/63_Tremiolles_2.jpg"]},"Consult_chateau_formulaire0d1e":{"id":"Consult_chateau_formulaire0d1e","dept":"63","canton":"Sauxillanges","commune":"Brenat","nom":"Treydieu","type":"Château","periode":"XVII","histoire":"Dans la commune de Brenat  plusieurs châteaux;         \r\nTREYDIEU, propriété de Gaston Gautier de Breuvand 1847-1920,  Lucie Fabre de Saint-Mande 1859-1935, Marié le 11 février 1908 à Chambéry, avec Edmée Aladane de Paraize , née le 6 janvier 1886 à Moulins, Allier , décédée le 14 octobre 1950 - Brenat à lâge de 64 ans .Parents : George Edmé Maurice Aladane de Paraize 1855-1929  et   Marguerite Courtois 1855-1943  dont Odette Gautier de Breuvand 1909-1970  mariée le 19 août 1942,, avec Jean de Laval 1907-1970  dont  Hugues de Laval 1944  marié avec   Bernard Gautier de Breuvand 1914-2007  marié avec Henriette Rochat 1927-2010  dont  Henri Gautier de Breuvand 1921-2001  marié le 24 août 1946 à Autun, avec Elisabeth de Champeaux de la Boulaye 1920-2000  dont  Jean Gautier de Breuvand 1928    Hippolyte-Thomas Gabriel Marie Guy Gautier de Breuvand 1881-1935.\r\nDURETTE,  En 1385, Guillaume de Dorette est seigneur. En 1450, Jacques de Dorette, seigneur du lieu, figure dans l'armorial de Guillaume Revel. En 1506, Claude de Dorette rend hommage pour le fief à l'évêque de Clermont. En 1626, François Riom  seigneur de Dorette, sa famille conservera le fief jusqu'au XVIIIe siècle.","architecture":"Château de Treydieu; corps de logis rectangulaire à trois niveaux toiture en croupe peu élevé flanqué d'une tour ronde crénélée plein cintre en façade côté parc et de deux tourelles à toitures en poivrières.                                                                              Château de Durette, Ce château construit au XVIe siècle, est situé à 1,8 km du bourg vers Parentignat et Issoire.                                Le château de la Riges et de la Grange, enceinte  quadrangulaire à flanquements circulaires d'angle, logis à retour d'aile de deux niveaux et demi.","habitants":"Famille de Gaston Gautier de Breuvand \r\n        \"","divers":"Château de Treydieu, de la Riges à Brenat, de la Grange à Brenat et de Durette","gps":"","images":["../image/image_63/63_Treydieu_1.jpg","../image/image_63/63_Treydieu_2.jpg","../image/image_63/63_Treydieu_3.jpg","../image/image_63/63_Treydieu_4.jpg","../image/image_63/63_Treydieu_5.jpg"]},"Consult_chateau_formulaire7786":{"id":"Consult_chateau_formulaire7786","dept":"63","canton":"Sauxillanges","commune":"Usson","nom":"Usson","type":"Vestiges","periode":"XIII","histoire":"Le château d'Usson, démoli sur l'ordre du cardinal de Richelieu, avait été auparavant, de 1585 à 1605, lieu de résidence surveillée de Marguerite de Valois (1553-1615), dite la Reine Margot, première épouse (1572-1599) du roi de France Henri IV.\r\nD'après le dessin que Revel en a fait au XVe siècle, la forteresse devait être imposante (triple enceinte, vingt tours) et redoutable. On comprend que Richelieu ait pu y voir une menace pour l'autorité centrale. La devise du château, d
