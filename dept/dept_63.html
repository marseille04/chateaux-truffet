 siècle.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Saint-Georges et de Fontanay.","gps":"","images":["../image/image_63/63_Fontanay_1.jpg","../image/image_63/63_Fontanay_2.jpg","../image/image_63/63_Fontanay_3.jpg","../image/image_63/63_Fontanay_4.jpg","../image/image_63/63_Fontanay_5.jpg","../image/image_63/63_Fontanay_6.jpg","../image/image_63/63_Fontanay_7.jpg","../image/image_63/63_Fontanay_8.jpg"]},"Consult_chateau_formulaire01d7":{"id":"Consult_chateau_formulaire01d7","dept":"63","canton":"Billom","commune":"Bort-l`Etang","nom":"Garde","type":"Château","periode":"XII-XIX","histoire":"La-GARDE, édifice dont l'origine remonte sans doute au XIe ou au XIIe siècle,  le premier seigneur de la Garde connu en 1102,  de cette période, l'édifice a conservé une tour carrée, appelée improprement tour Charlemagne, et comportant des ouvertures romanes,  au XVe siècle. Le château actuel a été remis en état au XIXe siècle par la famille Goyon, actuellement propriété de monsieur Lafarge.                                                                          Villa Gagère ce monument date du deuxième quart XIXe siècle et fait partie des trois constructions répertoriées de Bort-l'Étang.","architecture":"Château de la Garde a subi d'importantes  transformations,    au XVe siècle, construction   de la majeure partie du corps de logis actuel, avec ses tourelles d'angle et la tour  ronde au nord, l'escalier en fer à cheval, sur l'élévation nord ainsi que l'orangerie, au sud-est, sont des ajouts  du XVIIe siècle, début XIXe siècle, avant 1834, les tours sont remaniées, les toitures refaites avec lucarnes, un  bâtiment entre le corps du logis et la tour carrée et un logement de jardinier sont construits,  des bâtiments de  ferme sont ajoutés au sud-est du château contre l'orangerie après 1834,  un logis, un grenier et  une sellerie sur écurie et un bâtiment abritant  sans doute un chenil, fin du XIXe siècle ou au début du XXe siècle, des travaux de restauration sont effectués à l'orangerie,  l'aménagement du parc et de la pièce d'eau tels qu'ils existent actuellement datent sans doute de la première moitié du XXe siècle, la tour Charlemagne a été restaurée dans le dernier quart du XXe siècle.","habitants":"Famille Goyon \r\n        \"","divers":"Château de la  Garde.","gps":"","images":["../image/image_63/63_Garde_1.jpg","../image/image_63/63_Garde_2.jpg","../image/image_63/63_Garde_3.jpg","../image/image_63/63_Garde_4.jpg","../image/image_63/63_Garde_5.jpg","../image/image_63/63_Garde_6.jpg","../image/image_63/63_Garde_7.jpg","../image/image_63/63_Garde_8.jpg"]},"Consult_chateau_formulaire0344":{"id":"Consult_chateau_formulaire0344","dept":"63","canton":"Pontaumur","commune":"Montel-de-Gelat","nom":"Gelat","type":"Château","periode":"XVI","histoire":"Le Montel de Gelat était Ie centre d'une importante seigneurie qui fut qualifiée du nom de baronnie. En 1224 elle appartenait à Guillaume, comte de Clermont. Plus tard on trouve Ies Ventadour,  en 1356 Bernard de Ventadour vendit Ie Montel a Guy (ou Guillaume) Aubert. Ses descendants conserveront la seigneurie jusqu'en 1423. Ensuite par des mariages elle échut aux Daillon, puis aux Roquelaure. En 1735, elle passa à Charles Louis de Lorraine par son mariage avec Elisabeth de Roquelaure. Le hameau de Fréteix (Freytet en 1408) formait une seigneurie distincte, mais vassale du Montel. On y voit une belle fontaine médiévale.","architecture":"Le château seigneurial existe toujours mais très remanié, au XVIe siècle, corps de logis à trois niveaux, donjon crénelé et une tour a été percée de belles fenêtres Renaissance toiture en poivrière.","habitants":"Famille de Roquelaure\r\n        \"","divers":"Château de Gelat.","gps":"","images":["../image/image_63/63_Gelat_1.jpg","../image/image_63/63_Gelat_2.jpg","../image/image_63/63_Gelat_3.jpg","../image/image_63/63_Gelat_4.jpg"]},"Consult_chateau_formulaire4908":{"id":"Consult_chateau_formulaire4908","dept":"63","canton":"Lezoux","commune":"Nèronde-sur-Dore","nom":"Genestoux","type":"Château","periode":"XV","histoire":"GENESTOUX, avant 1310. Etiennette fille du chevalier Perre Uffan, porte le château par mariage à Guy Chaulet. En 1315,  Audin Chaulet est seigneur de Genestoux, En 1350, le fief est par héritage à Albert Aycelin. En 1517, Jacques de Genestoux,  écuyer, fils d'Umbert et  en 1540 Christophe de Genestoux sont seigneurs, et en 1561 Jean de Besse de La Richardie,  puis en 1666 Jérôme de Besse de La Richardie . En 1723, Gabriel d'Aurelle, chevalier, est seigneur de Terreneyre et Genestoux. En 1771, le château de Génestoux est acheté par Gilbert des Ollières, seigneur de Néronde.                                                                 OLLIERES, avant 1320, Audin Chaulet, damoiseau, est seigneur de Néronde. En 1390, le fief est à Pierre de Saint-Aignan. Il passe ensuite par mariage à la famille de Mezel,  puis dans celle des Boulier du Chariol. En 1518,  le château est acheté par François de La Pauze. En 1667, Jacques Louis de Girondie est seigneur  de Buron, Montel et Néronde.\r\n En 1760, le château est acheté  par Gilbert Desollières du Peron   qui fait construire un nouveau logis à côté de la maison-forte.","architecture":"Genestoux, château situé à 1,8 km à l'Ouest du bourg, près d'un affluent  de la Dore. Reste d'une enceinte quadrangulaire à flanquements cylindriques d'angle; il en reste deux accolés à un logis rectangulaire de deux niveaux. L'un des flanquements est équipé  d'une bretèche-latrine. Coté cour, le logis est accosté d'une haute tour carrée d'escalier, sa porte à modénature de tore est sous arc affaissé, avec un larmier de même dont la pointe se termine en fleuron. A la fin du XVIIIe ou au début du XIXe siècle, cette tour  a été englobée dans un élargissement du logis et une nouvelle tour de plan sermi-cylindrique a été adossée à côte d'une nouvelle porte à fronton ouverte à l'étage. Les cheminées anciennes sont adossées à un refend. \r\nOllières  Le château de l'Ollière est situé à côté de l'église, près d'une demeure des XVIIe et XIXe siècles. Reste d'une enceinte quadrangulaire à flanquements d'angle (il en reste un) et un flanquement carré faisant office de donjon. L'entrée en arc surbaissé, percée dans la courtine, est défendue par une bretèche sommitale sur six consoles à trois ressauts.","habitants":"Famille de Jacques de Genestoux\r\n        \"","divers":"Château de Genestoux et des Ollières.","gps":"","images":["../image/image_63/63_Genestoux_1.jpg","../image/image_63/63_Genestoux_2.jpg","../image/image_63/63_Genestoux_3.jpg","../image/image_63/63_Genestoux_4.jpg"]},"Consult_chateau_formulaire767a":{"id":"Consult_chateau_formulaire767a","dept":"63","canton":"Billom","commune":"Glaine_Montaigut","nom":"Glaine_Montaigut","type":"Vestiges","periode":"XII-XVI","histoire":"Plusieurs châteaux à GLAINE-MONTAIGUT, en 1295 Le  château appartenait à Philippe IV le Bel est acquis par Guillaume  1er Aycelin, seigneur de Brousillière. Il épousa Alix du Breuil.  son fils Gilles 1er  hérite du château. Il épouse Blanche Chastel-Montagne, dame de Saligny et meurt en 1325  Gilles II, fils de Gilles I, hérite. le château passe à Bernard Aycelin de Montaigut (mort en 1373), seigneur de Châteldon et de Montgilbert dit le Griffon de Montaigut. Il fut un des compagnons de Louis II de Bourbon, il se maria à Jeanne de Bourbon-Clessy. Louis Aycelin de Montaigut de Listenois. En 1410 le château passa à la famille de Vienne par le biais de sa fille, Isabeau Aycelin marié à Jean de Vienne, et en 1535  passa à Louis Motier de la Fayette qui épousa Anne de Vienne. Passa à Guy de Daillon comte du Lude sénéchal d'Anjou  et qui épousa Jacqueline de Vienne . Au XVIIe siècle vente du château par le comte de Lude à Etienne Ranvier qui l'échangea avec Jean d'Estaing de Ravel contre la seigneurie de Neschers.       CORNETS, en 1488, Guillaume de Layre, écuyer, seigneur des Cornets,  comparait au ban de la noblesse. En 1588, Jacques d'Auteyras est seigneur des Cornets. En 1598,  Claude Duprat est devenu seigneur par son mariage avec Marguerite  de Ribbes, dame des Cornets. En 1638. Jean-François du Prat est sieur des Cornets. En 1675, Jean Joseph du Prat,  son fils, en hérite. En 1693, Françoise de Bournat, veuve de   Jean-Joseph du Prat, y habite . En 1697 son fils Robert du Prat, seigneur du Prat et des Cornets, demeure aux Blanchetons, paroisse de Bort. En 1710, Françoise du Prat, dame des Cornets, épouse Louis Hector d'Aurelle. Après 1752,  le fief est passé par   héritage à la  famille d'Aurelle de La Frédière.                                                                      MOLIERES  construit au  XIIIe siècle, propriété en 1295 de Guillaume Aycelin, chevalier, seigneur de La Broussolière.  Vers 1420, Gaignon de la Chassaigne, chevalier, est seigneur de La Molière et d'Arnières. Après 1455, à ia mort de Tristan de Castelnau, baron de Clermont-Lodève, le fief est en indivision à ses 3 fils. En 1581, le château passe dans la famille de Montmorin, puis vers 1729, la propriété échoit aux Aurelle de Terreneyre.","architecture":"Le Château de Montaigut se situe sur la Commune de Glaine-Montaigut dans le département du Puy de Dôme, dans la Région d'Auvergne. Sur l'actuel lieu dit, La Motte.  Il est situé sur une hauteur lui permettant de dominer toute la région environnante.  Les restes du château sont enfouis sous une végétation assez dense; ce qui le rend invisible le bâti vu du ciel, le château est en ruines mais deux tours encore bien préservés laisse penser que l'édifice a conservé les traces de ces débuts, certains murs de 75cm à 160cm d'épaisseur dépassent les 10 mètres de hauteur.\r\nChâteau de Cornets édifié au XVe siècle, situé à 2 km à l'est de Montaigut et à 1,5 km au sud de Glaine. Donjon  carré à l'angle   d'une enceinte quadrangulaire. Côté cour, il est accosté d'une tourelle circulaire d'escalier qui dessert également le logis attenant.       Château de Molières construit au XVe siècle,  situé à 800 mètres au nord-est de Glaine. La Molière se compose d'un donjon-logis quadrangulaire. Il flanque l'angle   d'un grand logis de trois niveaux. Une tourelle polygonale d'escalier se dresse à la rencontre des deux bâtiments.                                                                                On peut encore voir sur la commune de Glaine, les restes d'un château-fort (enceinte et logis en ruine)","habitants":"Famille de Louis Aycelin de Montaigut                                                           Famille de Guillume de Layre\r\n        \"","divers":"Vestiges du château de Glaine Montaigut, des Cornets et de la Molière.","gps":"","images":["../image/image_63/63_Glaine_Montaigut_1.jpg","../image/image_63/63_Glaine_Montaigut_2.jpg","../image/image_63/63_Glaine_Montaigut_3.jpg","../image/image_63/63_Glaine_Montaigut_4.jpg","../image/image_63/63_Glaine_Montaigut_5.jpg","../image/image_63/63_Glaine_Montaigut_6.jpg","../image/image_63/63_Glaine_Montaigut_7.jpg","../image/image_63/63_Glaine_Montaigut_8.jpg","../image/image_63/63_Glaine_Montaigut_9.jpg"]},"Consult_chateau_formulaireaccd":{"id":"Consult_chateau_formulaireaccd","dept":"63","canton":"Cournon-d`Auvergne","commune":"Le Cendre","nom":"Gondole_Cournon","type":"Château","periode":"XII-XVII","histoire":"GONDOLE, édifié sur loppidum, la construction du château remonte au VIIe siècle. Un commerçant de  Clermont, Gondolonus, père de St Priest, évêque de cette même ville, en serait à lorigine. Jusquà la Révolution,  Gondole relève juridiquement de la paroisse de Cournon. Cest donc le hasard des découpages administratifs qui rattache ce lieu chargé dhistoire à la commune du Cendre. Le château était une seigneurie auquel venaient  sajouter  un domaine et  un moulin. Il ne reste quasiment  plus rien de la première construction. Les parties les plus anciennes de l'édifice actuel datent  du XIVe siècle. Il sagit de soubassements et dune tour intérieure qui abrite un escalier daté de 1392. Un souterrain aujourdhui éboulé en grande partie, permettait par ailleurs daccéder au cur de lédifice.\r\nMONTSEJOUR, demeure de style Renaissance, construite au XVIIe siècle, entourée dun grand parc arboré et fleuri. Propriété successive de plusieurs grandes familles locales, notamment les Petit de Montséjour (Jean,Pierre,Laurent, Félix Petit de Montséjour, Maire du Cendre de 1856 à 1871) et les Verdier de Latour (Edmond Verdier de Latour, consul de France), le château et ses occupants tenaient une place importante dans la vie du Village.                            Pour les châteaux de Ribeyre et de Sarlièves à Cournon d'Auvergne je n'ai pas d'historique.","architecture":"Le château de Gondole était une seigneurie indépendante du Cendre, auquel venaient sajouter un domaine et un moulin. Il ne reste quasiment plus rien de la première construction. Les parties les plus anciennes de la bâtisse actuelle datent du XIVe siècle.          Montsejour  Les anciennes écuries sont, avec leur portail (impasse de lAbreuvoir) et le Cèdre (à lintersection de lavenue de Lourme et de la route des Martres), les seuls vestiges du château de Montséjour, demeure de style renaissance, construite au XVIIe siècle. Restaurée en 1880, la bâtisse a continué de se détériorer au fil du temps.  le château fut détruit à la fin des années 1960. Les terrains sur lesquels il sétendait ont été vendus et ont permis la construction de plusieurs lotissements, La Saunière, à lemplacement des vignes, Les Jardins de Lourme, à lemplacement du château et de son parc. Lespace Verger du Caire et lancien stade se situent, quant à eux, à lemplacement des vergers .                                                                                 A une dizaine de km, deux châteaux à Cournon d'Auvergne; Ribeyre, château dont la construction remonte au XVIe siècle, ayant subi de nombreuses transformations qui lui ont enlevé son caractère d'origine. A l'intérieur, escalier du XVIe siècle et papiers peints néo-classiques de la fin du XVIIIe ou du début du XIXe siècle.  \r\nSarlièves cet édifice est l'un des rares châteaux de la fin du XVIIe siècle conservé aux environs de Clermont. Son architecture très sobre, soulignée de lave, est caractéristique des maisons de campagne limagnaises de cette époque. C'est également le dernier élément  d'une série de châteaux du XVIIe siècle  dont beaucoup ont été démolis. A l'intérieur, les menuiseries ont disparu, de même que tous les décors intérieurs et cheminées.","habitants":"Père de Gondolonus\r\n        \r\n        \"","divers":"Château de Gondole, de Montséjour, de Rybére et de Sarlièves.","gps":"","images":["../image/image_63/63_Gondole_Cournon_1.jpg","../image/image_63/63_Gondole_Cournon_2.jpg","../image/image_63/63_Gondole_Cournon_3.jpg","../image/image_63/63_Gondole_Cournon_4.jpg","../image/image_63/63_Gondole_Cournon_5.jpg","../image/image_63/63_Gondole_Cournon_6.jpg"]},"Consult_chateau_formulaireece0":{"id":"Consult_chateau_formulaireece0","dept":"63","canton":"Rochefort-Montagne","commune":"Mazaye","nom":"Grand_Chambois","type":"Manoir","periode":"XVI","histoire":"GRAND-CHAMBOIS, Mazaye a connu une présence gallo-romaine révélée par des vestiges à plusieurs endroits de la commune. Ce territoire a ensuite été la possession des Montgascon puis, du XIIIe siècle et au XVIIe siècle, celle de l'évêché de Clairmont, à environ 30 kilomètres de Mazaye. Baronnie au XVIe siècle, on peut encore y voir les traces de son statut de fief avec le château fort de Chambois.                                                                                       A la fin du XVIe siècle, l'ancien château occupé par les ligueurs est détruit par les royalistes,  Pierre Chabran,  son propriétaire, afin de se soustraire aux droits de francs-nefs, fait alors construire un manoir dans le village de Chambois. Après 1682, François Sevin, neveu de   Jérôme Chabron, hérite du fief. En 1719, Jeanne Sévin le porte  par mariage à Amable de Bouchard d'Aubeterre de Saint-Privat.","architecture":"Manoir construit au XVIe siècle, situé à 2 km à l'est du bourg. Le logis rectangulaire de deux niveaux est accosté  d'une tour circulaire d'escalier recoiffée en appentis. Il a été allongé et augmenté d'une aile oblique.","habitants":"Famille de Pierre Chabran\r\n        \"","divers":"Manoir du Grand-Chambois.","gps":"","images":["../image/image_63/63_Grand_Chambois_1.jpg","../image/image_63/63_Grand_Chambois_2.jpg","../image/image_63/63_Grand_Chambois_3.jpg","../image/image_63/63_Grand_Chambois_4.jpg"]},"Consult_chateau_formulaire3b60":{"id":"Consult_chateau_formulaire3b60","dept":"63","canton":"Issoire","commune":"Les Pradeaux","nom":"Grange_Fort","type":"Forteresse","periode":"XIV","histoire":"GRANGE-Fort, en 1370, est cité Jacques d'Ambilion seigneur de La Grange-d'Ambilion. En 1445.  Morinot d'Ambilion vend La Grange à Hugues de Pons, seigneur à Augnat et en rend   hommage à Charles de Bourbon   pour son fief. En 1592, Gilbert de Pons, seigneur de La Grange et le Roquet, capitaine et  châtelain de Nonette est chargé de le défendre  contre les ligueurs. Ceux-ci se vengent en brûlant et pillant le château de La Grange. Il fut reconstruit peu de temps après, au début du règne de Henri IV. À la Révolution, Grange-Fort eut un sort commun à la plupart des édifices du même genre, c'est-à-dire qu'il fut d'abord partiellement démoli, puis vendu eux enchères comme bien national. Une fois mis aux enchères, Michel-Denis de Pons, qui était alors marquis de Pons, put racheter le château.  Gilbert de Pons fait restaurer la demeure, En 1849, Antoine de Pons,  évêque de Moulins, propriétaire,  y  meurt. Son neveu Antoine-Arthur de Pons le vend au vicomte Marie-Victor de Matharel, trésorier   général du Puy de  Dôme, qui y réside en 1877 .  Les Matharel sont une ancienne famille venue d'Italie. Victor de Matharel a restauré et embelli le château d'après les plans de Viollet-le-Duc. Quelques années après, les travaux furent finis pour donner l'apparence solennelle et magnifique que l'on connaît encore aujourd'hui au château. Le fils de Victor était héritier mais mourut sans postérité. La famille de Lastic racheta ensuite la Grange-Fort, le prêta quelques années plus tard à des moines et le loua aussi à la famille de la Poype. Aux alentours des années 1960, il fut vendu à un notaire nommé Me Colombier. C'est enfin en 1985 que la famille Van Bronkhorst rachète les lieux. Aujourd'hui chambres d'hôtes et camping.","architecture":"Grange-Fort,  au cur de lAuvergne, sur les hauteurs dune colline surplombant le Val dAllier, le site offre une vue imprenable sur les alentours.  Château-fort remanié de style néo-féodal, reste d'une enceinte quadrangulaire à flanquements circulaires à trois angles, percés de canonnières   horizontales. Le donjon carré   fut reconstruit   ou chargé de falbalas troubadours. Logis restauré vers 1600, puis reconstruit ou remanié au XIXe siècle. Château médiéval du XVe siècle constitué d'un bâtiment en forme de U avec pavillon saillants sur les côtés celui de gauche inférieure à celui de droite possède un donjon accolé d'une tourelle carrée et d'échauguette, une tour ronde à l'arrière du pavillon de l'aile droite et sur la face centrale un pavillon saillant avec échauguettes sur les angles, et tour carrée sur l'arrière droit l'ensemble à différents niveaux se termine par des couvertures à toits presque plats ou terrasses flanquées de créneaux.","habitants":"Famille de Michel-Denis de Pons\r\n        \"","divers":"Forteresse de Grange-fort.","gps":"","images":["../image/image_63/63_Grange_Fort_1.jpg","../image/image_63/63_Grange_Fort_2.jpg","../image/image_63/63_Grange_Fort_3.jpg","../image/image_63/63_Grange_Fort_4.jpg","../image/image_63/63_Grange_Fort_5.jpg","../image/image_63/63_Grange_Fort_6.jpg","../image/image_63/63_Grange_Fort_7.jpg"]},"Consult_chateau_formulaire80e2-2":{"id":"Consult_chateau_formulaire80e2-2","dept":"63","canton":"Courpière","commune":"Augerolles","nom":"Grimandies","type":"Vestiges","periode":"XIII-","histoire":"GRIMARDIES,   avant 1096, la paroisse de Saint-Georges d'Augerolles relève de Cluny. En 1210 le prieur de Sauxillanges   promet à son oncle Robert de Clermont, seigneur d'Olliergues, de défendre le lieu fortifié aussi longtemps que   l'abbé de Cluny lui conservera sa fonction de prieur.    Aux XIIIe et XIVe siècles la seigneurie est en partage entre le prieuré de Cluny et les Clermont d'Olliergues, qui semblent en être les fondateurs et avoués. De 1443  à 1447, le bâtiment est en très mauvais état,  il est alors restauré par un nouveau prieur Jean de Bosqueto. Mais vers 1478, le prieuré disparaît et son patrimoine est uni à celui de Thiers. Deux familles importantes se succèdent dans l'histoire d'Augerolles, pendant près de cinq siècles, les  de Frédeville, qui doivent leur nom à un hameau du même nom. Leur château est aujourd'hui en ruines. Les  de Provenchères, qui ont fait fortune dans le commerce du bois entre l'Auvergne et Paris et qui habitent depuis trois siècles le château des Grimardies,   construit dans sa structure actuelle dans les années 1700 par agrandissement d'un domaine et qui conserve une belle allure.   Il appartenait à la famille Faugière, acquit en 1697 par la famille de Jacques de Provenchères.  C'est Alexis-Annet de Provenchères 1765-1831 écuyer seigneur de la Faye, du Chassaing, des Grimardies et autres lieux chevalier de Saint-Louis procède à l'embellissement des Grimandies, les de Provenchères  en sont toujours propriétaire.","architecture":"Augerolles, château féodal  du XIIe siècle.  Le château prieural bâti au XVIe siècle,  est situé près de l'église.  C'est un donjon-logis de trois niveaux accosté à un angle  d'une tourelle cylindrique d'escalier. Le retour  d'aile est moderne. De 1746 à 1763, à l'occasion de réparations, le château est décrit comme une maison-tour se composant d'une cuisine et d'une cave au premier  niveau, de deux chambres à l'étage, d'un appartement au troisième niveau.       \r\nChâteau des Grimardies,  édifice du XVII-XIXe siècle, de plan en U, composé d'un long bâtiment central datant du XVIIe siècle, auquel ont été ajoutées   au début du XVIIIe siècle deux ailes en retour entourant une cour intérieure fermée par un portail. A l' intérieur, présence de décors parfaitement conservés (boiseries, cheminées, dessus de portes peints, ferronneries).","habitants":"Famille des Provenchères \r\n        \"","divers":"Château d'Augerolles et de Grimandies.","gps":"","images":["../image/image_63/63_Grimandies_1.jpg","../image/image_63/63_Grimandies_2.jpg","../image/image_63/63_Grimandies_3.jpg"]},"Consult_chateau_formulairec3e0":{"id":"Consult_chateau_formulairec3e0","dept":"63","canton":"Randan","commune":"St-Priest-Bramefant","nom":"Guerinet","type":"Château","periode":"XVII","histoire":"GUERINET, datant de fin du XVIe début XVIIe siècle et dernière demeure du petit fils de Charles Perrault, se trouve être le relais de chasse de son voisin le château de Molmont qui est lui-même le relais de chasse du château de Randan où Adélaïde à vécut avec Louis-Philippe avant d'être couronné roi de France.  Les serres et sa chaufferie d'époque datant du XVIIe siècle qui ont été pensées et édifiées par le créateur des serres du château de Versailles, propriété de monsieur Saillard.","architecture":"Guérinet, le corps central du logis et la tour carrée nord, située sur l'angle de la façade principale, correspondent probablement à l'édifice primitif, peut-être édifié au XVIIe siècle. Les communs sont détruits après 1835. Le logis, à l'origine simple en profondeur, est remanié dans sa partie postérieure peut être lors de l'importante campagne de travaux datant de la fin du XIXe siècle.  A cette époque est édifiée la tourelle d'escalier, la tour carrée sud est remanié, une partie de l'élévation de la façade principale et la toiture du corps central sont également reprises. La demeure est composée  d'un corps central flanqué  de trois tours carrées aux angles  nord-est, nord-ouest et sud-ouest. Une tourelle d'escalier est engagée en façade latérale nord. Le petit corps de bâtiment adossé en façade sud, consiste en un rez-de-chaussée au toit couvert en terrasse. Le corps central comprend un étage en façade principale. L'extension arrière comprend un rez de chaussée surmonté d'un étage de comble. Les tours carrées comprennent deux étages. L'ensemble de la construction a reçu un enduit qui sur la tour nord-ouest masque un premier enduit en faux appareil.  La tour nord-est est bâtie en pisé et possède des chaînes d'angle et des encadrements de baie en andésite alors que la tour nord-ouest est construite en moellons de calcaire et présente des encadrements et chaînes d'angle en calcaire. La tourelle d'escalier est couverte d'un toit conique. Les deux tours nord sont couvertes d'un toit en pavillon. Des toits en pavillon plus importants surmontent le vestibule du corps central du logis et la tour sud. Sur ces deux toits, les tuiles arêtieres, les crêtes et  les épis de faîtage en terre cuite  sont émaillées. Les toits de la tour sud et de la tourelle d'escalier sont soutenus par des aisseliers. Le corps central possède un toit à longs pans.","habitants":"monsieur Saillard\r\n        \"","divers":"Château de Guerinet.","gps":"","images":["../image/image_63/63_Guerinet_1.jpg","../image/image_63/63_Guerinet_2.jpg","../image/image_63/63_Guerinet_3.jpg","../image/image_63/63_Guerinet_4.jpg","../image/image_63/63_Guerinet_5.jpg"]},"Consult_chateau_formulairef541-2":{"id":"Consult_chateau_formulairef541-2","dept":"63","canton":"Issoire","commune":"Issoire","nom":"Hauterive_Issoire","type":"Château","periode":"XV","histoire":"HAUTERIVE, premier bâtiment  construit au Xe siècle, au XVe siècle fief de Claude de du Prat chancelier et par alliance de sa fille  Jeanne  à la famille de Bonniol, qui cette famille vend en 1620 à Etienne de Chaudessole  commissaire ordinaire des guerres, son fils Paul   en vendra une partie à  Annet-Charles de Brezons Marguerite  Chaudessole  fille unique héritière fait passer le domaine par alliance  en 1690 à Louis Gon seigneur de Vasigny et en 1706 leur fille Marie-Louise Gon de Vasigny apporte en alliance le domaine  à  Chrétien de Lamoignon   président au parlement de Paris. Le domaine sera vendu en 1761 à François  Lecourt de Saint-Agnés. Le domaine passe à Jean-Antoine-François de Paule Lecourt-d'Hauterives, leur fils Ernest épouse en 1830 Georgine Onslow fille du compositeur auvergnat d'origine anglaise, la soeur de Georgine  Henriette se marie   avec le marquis de Pierre. leur fils George se marie en 1861 à Léontine de Leusse, arrière petite fille  de Chrétien-Guillaume de Lamoignon  de Malesherbes, le domaine devient la propriété de Paul  Lecourt d'Hauterives  puis passe  en 1913 à George Lecourt d'Hauterives toujours dans la descendance. Lié à Ernest d'Hauterive, écrivain et militaire.                   A quelques kilomètres à l'est d'Issoire le château de   Dorette à Brenat. En 1385, Guillaume de Dorette est seigneur. En 1450, Jacques de Dorette, seigneur du lieu, figure dans l'armorial de Guillaume Revel. En 1506, Claude de Dorette rend hommage pour le fief à l'évêque de Clermont. En 1626, François Riomet est dit seigneur de Dorette, sa famille conservera le fief jusqu'au XVIIIe siècle.","architecture":"Hauterives, cette demeure, de style classique, sur les hauteurs de la ville dIssoire, très complet, n'ayant pratiquement pas changé depuis 1780,  avec château, chapelle, communs accompagnés de jardins, douves et terrasses d'origine. Décor intérieur du XIXe siècle.  Les dispositions des constructions et du  parc permettent de montrer  le fonctionnement d'un grand domaine  à la fin du XVIIIe siècle,  le jardin d'agrément servant également de jardin potager,  les dépendances regroupant tout ce qui est utile à la vie du château (fournil, écuries, étables). Les dernières transformations datent du XIXe siècle. Deux constructions sont élevées en 1820 et prolongent le corps de bâtiment d'origine en formant pour l'une d'elle un  méchant  placage en hors d'oeuvre sur la façade arrière. De ce balcon, on peu découvrir, lart et la manière depuis le XVIIe siècle, de joindre harmonieusement les plaisirs champêtres dune villégiature de plaisance à la pratique dune bonne gestion des biens de la campagne.                                                              Dorette, ce château construit au XVIe siècle, enceinte   quadrangulaire à flanquements circulaires d'angle, logis à retour d'aile de deux niveaux et demi.","habitants":"Famille de Claude de Du Prat                                                            Famille de Guillaume de Dorette \r\n        \"","divers":"Château de Hauterives et de Dorette.","gps":"","images":["../image/image_63/63_Hauterive_Issoire_1.jpg","../image/image_63/63_Hauterive_Issoire_2.jpg","../image/image_63/63_Hauterive_Issoire_3.jpg","../image/image_63/63_Hauterive_Issoire_4.jpg"]},"Consult_chateau_formulaireecfb":{"id":"Consult_chateau_formulaireecfb","dept":"63","canton":"Aigueperse","commune":"St-Genès-de-Retz","nom":"Jayet","type":"Maison forte","periode":"XV","histoire":"JAYET,  au XIIIe siècle, le fief est acquis par Archambaud VIII, sire de Bourbon, avec Jozerand, Montcel, et St-Agoulin. De 1456 à 1482, Pierre de Giat, chevalier,  est seigneur de Joserand et Jayet.  Vers 1550, Michel de Veyny d'Arbouse  est seigneur de Villemont et baron de Jayet. En 1557, il achète le fief de Saint-Genès. En 1689, Jacques de Vény  d'Arbouze, chevalier, bailli et  gouverneur-capitaine  du duché-pairie de Montpensier, seigneur de Villemont et de  Neuville, baron de Jayet, Poizat, Lafont, Chancel et S- Genès du Retz, habite son château de Villemont en Vensat.  Ses héritiers le possèdent jusqu'en 1789.","architecture":"Château construit aux XVe-XVIe siècles,  situé à 2 km à l'ouest du bourg.  Enceinte quadrangulaire à deux niveaux toiture en croupe flanqué de tours  circulaires d'angle, il en subsiste deux accolés à un logis remanié au XVIIe siècle.","habitants":"Famille de Michel de Veyny d'Arbouse \r\n        \"","divers":"Maison forte de Jayet.","gps":"","images":["../image/image_63/63_Jayet_1.jpg","../image/image_63/63_Jayet_2.jpg","../image/image_63/63_Jayet_3.jpg"]},"Consult_chateau_formulairee430":{"id":"Consult_chateau_formulairee430","dept":"63","canton":"Combronde","commune":"Josserand","nom":"Josserand","type":"Château","periode":"XV","histoire":"JOSSERAND, au XIIe siècle est cité a une famille éponyme. Au XIIIe siècle, le fief est acquis par Archambaud VIII, sire   de  Bourbon, avec Jayet, Montcel et Saint-Agoulin. Il passe aux Beaujeu en 1221, aux de Dreux de 1292 à 1345 puis  aux Ventadour et aux de Giac. En 1470 Louise de Giac, dame héritière de Châteaugay, Beaune et Josserand épouse  Jacques de Laqueuille. Vers 1500, les Laqueuille reconstruisent le château. En 1545 les Rochefort d'Amy l'acquièrent  par mariage avec l'héritière, Gilberte de Laqueuille. Ils refont l'aile nord et le posséderont   jusqu'au XVIIIe siècle. De 1760 à 1830, il est aux Champtour. En 1845, il passe à Gaspard Marie Amédée, comte de Chabrol-Toumoëlle et actuellement à leur fils le comte de Chabrol de Tournoëlle.","architecture":"Château  de Josserand du XVe siècle  possède de  l'origine de hauts logis en équerre bordant une cour fermée par un châtelet d'entrée. Restauré au XIXe siècle, agrandit et le modifié dans un style Néo-Renaissance, influencé par le néo-gothique  anglais.  L'aile ouest fut en partie rebâtie, surélevée et cantonnée d'une tour surmontée d'un belvédère  panoramique et tourelle polygonale en angles.  A l'angle des ailes ouest et nord  fut installé une grosse tour renfermant un escalier à vis.   Parc dessiné par le comte de Choulot.  Orangerie néo-classique, communs d'inspiration italienne, éléments provenant de l'ancien palais ducal de Riom.","habitants":"Famille des de Laqueuille\r\n        \"","divers":"Château de Josserand.","gps":"","images":["../image/image_63/63_Josserand_1.jpg","../image/image_63/63_Josserand_2.jpg","../image/image_63/63_Josserand_3.jpg","../image/image_63/63_Josserand_4.jpg","../image/image_63/63_Josserand_5.jpg","../image/image_63/63_Josserand_6.jpg"]},"Consult_chateau_formulaire22d5":{"id":"Consult_chateau_formulaire22d5","dept":"63","canton":"Tour-d`Auvergne","commune":"Chastreix","nom":"Labro","type":"Château","periode":"XVI","histoire":"LABRO,  château et ferme de Labro (Chastreix). Il appartenait au XVIIe siècle à François Neyron, conseiller au présidial de Clermont.  Aujourd'hui M. Chazeaud, propriétaire du château de Labro.","architecture":"Le château de Labro, de plan allongé, est flanqué de deux tours circulaires demi hors-oeuvre, côté cour. La façade   située entre les deux  tours comprend une porte centrée ouvrant en demi palier. Le rez-de-chaussée se trouve en étage de soubassement par rapport à la cour.  La façade sur jardin présente des remaniements complexes, difficiles à comprendre. Des contreforts massifs soutiennent le mur gouttereau qui tend à s'ouvrir. Une partie de la façade en pierre de taille pourrait appartenir à l'édifice primitif.  L'étage de soubassement semble abriter des pièces secondaires et une remise.  Des lucarnes cylindriques éclairent l'étage de comble. Le côté ouest de la cour est occupé par le logis de la ferme à bâtiments distincts qui dépend du château. Les deux passages ménagés entre le château et les dépendances sont fermés par des portails couverts,  disposés en vis à vis.  Le logis  se compose d'une aile destinée au logement (3 travées, un étage carré), complété par un grand cellier non éclairé qui dépendait du château. La grange étable dépendant du logis est édifiée à l'ouest,  à contre pente. Une fontaine monumentale ainsi qu'un abreuvoir complètent l'équipement.","habitants":"Famille de François Neyron\r\n        \"","divers":"Château de Labro.","gps":"","images":["../image/image_63/63_Labro_1.jpg","../image/image_63/63_Labro_2.jpg","../image/image_63/63_Labro_3.jpg"]},"Consult_chateau_formulairea897":{"id":"Consult_chateau_formulairea897","dept":"63","canton":"Jumeaux","commune":"Lamontgie","nom":"Lamontgie","type":"Château","periode":"XVI","histoire":"LAMONTGIE, fort, ces fortifications ont été édifiées  à l'époque troublée des guerres de religion,  pour la conservation de leurs personnes, de leurs biens contre les troubles et ravages, à partir de 1589. Construites  dans l'urgence et sans autorisation seigneuriale, ce n'est que quelques années plus tard que le roi Henri IV leur permit de les conserver par lettre patente datée de Lyon, au mois de septembre 1595.                                                          CHATEAUNEUF;   à quelques kilomètres au nord le village,  en 1233, Guillaume et Etienne de Châteauneuf étaient les seigneurs du lieu. Ensuite (sans doute avant 1299) le fief passa aux de Maumont, puis vers 1325 aux de La Roche, seigneurs de Tournoël. En 1555, Jean de Châteauneuf, époux de Jeanne de Montmorin, étant décédé sans enfant, la seigneurie passa à leur neveu Jean de Montmorin, représentant d'une des plus grandes familles d'Auvergne, qui possédait déjà quelques droits à Châteauneuf. \r\nLa famille de Montmorin possédait le château, conservera Châteauneuf jusqu'en 1760, date de sa vente (avec Saint-Gervais) à Marie-Louis de Gironde, gouverneur de l'Île-de-France, qui le revendit en 1767  à J.B. Thomas de Pange, trésorier général , ses filles et héritières cèderont Châteauneuf en 1784  à J. Chevarrier, qui sera guillotiné à Lyon en 1793. Le château actuel  a été totalement reconstruit par J.B. Thomas, marquis de Pange, acquéreur des fiefs de Châteauneuf et de Saint-Gervais en août 1767. \r\nPOUGET Le 1er septembre 1469, Jean de Bourdeilles fait aveu de sa seigneurie du Pouget à Louis, bâtard de Bourbon. Avant 1669, Marie-Françoise de Bourdeilles apporte le château par mariage à la famille de Sévérac, de laquelle il passe ensuite dans celle des comtes de Simiane.","architecture":"Lamontgie a possédé un fort villageois à l'emplacement actuel du quartier du \"fort\". Ce fort représentait un rectangle régulier, de 80 m de long, du Nord au Sud, sur 50 m de large, d'Est en Ouest. Celui-ci était flanqué d'une tour à chacun de ses angles. Ces tours ont aujourd'hui toutes disparues, la plus imposante se situait sur la place du village et fut détruite en 1886 afin d'agrandir la place. La dernière d'entre elle fut démantelée au tout début du XXe siècle, suite à l'élargissement de la route menant au village du Terrail.   Le château fait face au hameau de La Mongie. Il est certain qu'au Xe siècle, une motte castrale existait déjà au sommet de la butte qui domine la Sioule, à proximité du pont de Bordas et du grand chemin menant de la terre d'Auvergne au Limousin. A la construction primitive succéda vers 1200 . De cet édifice qui avait certainement subi de profondes transformations, notamment au XVI° siècle,  rien ne subsiste.                                                 Châteauneuf les Bains   C'était donc une construction neuve lorsque éclata la Révolution. D'importantes modifications y furent réalisées par ses propriétaires du XIXe siècle, notamment par Eugène Talon, député du Puy-de-Dôme.                            \r\n Château dit   Le Pouget situé près de l'église. D'une enceinte quadrangulaire, il subsiste un flanquement circulaire  d'angle à canonnières.","habitants":"Famille de Etienne de Châteauneuf\r\n        \"","divers":"Fort de Lamontgie,château à châteauneuf les Bains  et château du Pouget.","gps":"","images":["../image/image_63/63_Lamontgie_1.jpg","../image/image_63/63_Lamontgie_2.jpg","../image/image_63/63_Lamontgie_3.jpg","../image/image_63/63_Lamontgie_4.jpg","../image/image_63/63_Lamontgie_5.jpg"]},"Consult_chateau_formulaireb712":{"id":"Consult_chateau_formulaireb712","dept":"63","canton":"Pontaumur","commune":"Landogne","nom":"Landogne","type":"Château","periode":"XV-XIX","histoire":"Deux châteaux à LANDOGNE, celui de Landogne construit en 1845 par Charles-Jacques Martinat de Chaumont,  avait épousé Marie-Adeline Maignol en 1824, héritière de Marie-Joseph Maignol de Neufvaille, leur fille  Léoni héritière  avait épousé  Jacques-Anthème  Chapot-Laroche qui hérite  et à son décès les biens passent  à son amie Léonce Rochettes de Lempes   et c'est sa fille Germaine  épouse de René Ligier de Laprade qui en hérite et passera à leur fille Yvonne  qui à épousé  monsieur Soury-Lavergne.  Le château a été bâti de 1840 à 1844 par la dernière descendante de la famille Maignols, dynastie de notaires à Landogne,  et en 1966 passe par achat à madame Camus avocate, revendu en 1996 à Monsieur Guillot-Malveau qui ces derniers le revendent en 2006 à monsieur Sabatier et à Gérard Nizet.      SAUNADE, en 1491, Antoine de Rochedagoux, chevalier, est seigneur de St-Bauzille, le Cheix, Merle, le Puy du Prat et Saunade. Le 6 février 1580, Jacques de Renaud  Gaspard Le Loup vend le château à Henri de Montboissier-Beaufort-Canillac. En 1633, les fortifications sont de Beaufort Canillac, chevalier, seigneur de lignat et de Saunade,  habite dans son château. En 1698, Eustache de Montboissier-Beaufort-Canillac  rend hommage  au baron d'Herment  pour Saunade. La famille de Val achète, en 1729, la baronnie de Saunade aux Montboissier. En 1789, propriété de monsieur Michel de Val .                                               VIALLEVELOURS, en 1380, la seigneurie est à Bernard de Prondines. Vers 1400,  sa fille Marguerite l'apporte par mariage  à  Guillaume de Chalus, fils de Jean de Chalus, seigneur de Cordès. En 1427, Amblard, seigneur de Viallevelours, fils du chevalier Guillaume de Chalus,  épouse Louise de Varvasse. Jusqu'au XVIIIe siècle le château est à une branche de la famille de Chalus. En 1674,  propriété de Jean de Chalus.  En 1689, Françoise de Pannetier,  veuve de  Jean de Chalus, et   Gabriel de Chalus, sieur   de Chalus. En 1693, François-Alexandre de Chalus, écuyer, sieur  de Viallevelours, propriétaire du château à Larzat en Chirat-l'Eglise (Allier).","architecture":"Landogne, bel exemple de château classique construit sous la Restauration, sur des vestiges plus anciens. Ce château est situé au coeur d'un village des Hautes Combrailles, il fut édifié à l'époque de Louis  Pilippe dans  un style classique.  Le château se compose de deux niveaux de sept pièces,  chacun coiffé de hautes toitures. La façade principale comporte pas moins de 64 fenêtres. Le parc, en pente douce côté sud, est joliment arboré, doté   de trois bassins  dont un avec jet d'eau, d'un oratoire, d'un four à pain et d'un cuvier. Une chapelle  est actuellement en cours de restauration.  L'ancien manoir bâti au XVIe siècle, appartenant à la famille Maignols  abrite l'écurie et   sa sellerie.  Une association a été créée en 2008 afin de le restaurer et y organiser également des animations, soutenir cette association.                              Saunade;  édifié au XVe siècle, à 2,8 km du bourg.  Enceinte quadrangulaire à flanquements circulaires d'angle dont un érasé et un donjon circulaire couronné de mâchicoulis et percé de longues canonnières . Tour avec  canonnières à rotule. Côté cour, le logis est accosté d'une tour ronde d'escalier, arasée et recoiffée en appentis.                                                                             Viallevelours;  bâti au XIVe siècle, à 1.7 km au nord-ouest du village. Donjon cylindrique arasé à l'angle d'une enceinte quadrangulaire disparue. Logis rectangulaire de deux niveaux à deux travées   principales séparées par  une travée  d'escalier  plus étroite. Les fenêtres d'étage sont à appui débordant. Les cheminées sont adossées aux 2 pignons. Sauf la porte, le rez-de-chaussée était aveugle. Les fenêtres conservées ont des modénatures du XVe siècle.","habitants":"Famille de Marie-Joseph Maignol de Neufvaille                           Famille de Charles-Jacques Martinat de Chaumont\r\n        \"","divers":"Château de Landogne, de Saunade et de Villevelours.","gps":"","images":["../image/image_63/63_Landogne_1.jpg","../image/image_63/63_Landogne_2.jpg","../image/image_63/63_Landogne_3.jpg","../image/image_63/63_Landogne_4.jpg"]},"Consult_chateau_formulairec152":{"id":"Consult_chateau_formulairec152","dept":"63","canton":"Lezoux","commune":"Neschers","nom":"Lavaure","type":"Château","periode":"XV-XVIII","histoire":"LAVAURE,  Édifié en 1710 par Joaquim d'Estaing, évêque de Saint-Flour.                                                                         NESCHERS le premier manoir dit d'Artaud. En 1229 le roi de France restitue des seigneuries occupées par ses hommes à Guillaume, dauphin d'Auvergne, à la condition de raser les châteaux d'Aurière,  Neschers et Plauzat. En 1275,  Pierre de Neschers, écuyer, seigneur. En 1298 Guillaume de Neschers est seigneur, au début du XIVe siècle Neschers est une co-seigneurie, en 1308 Gaston Chambe de Murol et en 1310 Guillaume d'Usson ont des parts. En 1377  Marguerite de  Montespedon est dame de Neschers. Avant 1543, Jacques d'Artaud est seigneur dans la ville de Neschers. En 1551  le château est à son fils Artaud d'Apchon, capitaine du château de Creimps. En 1621, Jeanne d'Artaud le porte par mariage à Guyot de la Rochemonteix, puis   en 1624,  à Hugues de Faydit, en 1633 à Gabriel de Durat et vers 1640, à Jacques d'Estaing.","architecture":"Manoir d'Artaud  construit au XVe siècle,  dit des Artauds, â l'angle de la rue Pierre Fournel. Logis sous un crépi jaune accosté d'une tourelle polygonale d'escalier. La porte est sous tympan en tiers point.                                                                                  le château de Lavaure se compose d'un corps de bâtiment principal comportant un rez de chaussée,  un étage noble et un comble à la Mansart, et deux ailes de communs en retour d'équerre sur la cour d'honneur. La cour ainsi déterminée, est fermée par des douves sèches bordées d'une balustrade de pierre et s'ouvre par  une porte en fer forgé  ornée de volutes. Face au château se tient le  bassin  circulaire d'Adam et  d'Eve. Le groupe central y est traité à la manière baroque, avec les 2 personnages drapés disposés symétriquement,  et séparés par diverses plantes stylisées.  Dans le parc se tient la fontaine du Diable, sorte de mur   orné d'une palmette et encadré de deux pilastres cannelés, orné d'une figure grimaçante.  L'intérieur comprend quelques salles lambrissées. La cage d'escalier présente un plafond orné, en motif central d'un médaillon ovale entouré de guirlandes. Quatre atlantes semblent soutenir le plafond.","habitants":"Famille d'Artaud d'Apchon\r\n        \"","divers":"Château de Lavaure et de Neschers dit d'Artaud.","gps":"","images":["../image/image_63/63_Lavaure_1.jpg","../image/image_63/63_Lavaure_2.jpg","../image/image_63/63_Lavaure_3.jpg","../image/image_63/63_Lavaure_4.jpg"]},"Consult_chateau_formulaire4731":{"id":"Consult_chateau_formulaire4731","dept":"63","canton":"Lezoux","commune":"Lezoux","nom":"Lezoux","type":"Château","periode":"XV","histoire":"LEZOUX, en 1199, le château est au comte Guy II d'Auvergne.  En 1212,  le roi Philippe Auguste le confisque et en  fait donation à l'évêque Robert de Clermont. En 1254, le comte Robert V conteste la spoliation et reçoit le château d'Issandolanges en compensation. Lezoux reste aux mains des évêques jusqu'en 1557,  date à laquelle Catherine  de Médicis conteste la donation  de Philippe-Auguste aux évêques et  fait reconnaître   par les juges  qu'elle n'était que provisoire. En conséquence, Catherine de Médicis, héritière des comtes d'Auvergne, en devient propriétaire et  réuni à la couronne. En 1661, le Roi de France le donne à Jean de Ribeyre, seigneur de Fontenilles, conseiller d'état. En 1716, Charles de Ribeyre est seigneur de Lezoux, Fontenilles, Ligonne et Lempty.                                                                                CROPTES, en 1346, Amédée Uffon est seigneur de Croptes. En 1454, sa descendante Agnès de Tinières vend le domaine  au damoiseau Bertrand de Benaud. Celui-ci fait construire une maison haute qui est alors flanquée de trois tours.   En 1470, il fait aveu et dénombrement au comte d'Auvergne,  pour le château de Crotis. En 1584, le château est acheté par   Joseph de Montrogon, seigneur du Mas. En 1698, Guillaume de Montrognon, écuyer, est sieur de Croptes.  En 1756, le château passe par mariage à Etienne François Kayr de Blumensteln. En 1878, il passe  par héritage à Edouard de Roquefeuille, puis à la fin du XIXe siècle à son petil-fils Fulcran de Roquefeuille.","architecture":"Château-fort de Lezoux en partie roman, situé au sud de l'église. Reste d'une enceinte  quadrangulaire dont il subsiste deux flanquements circulaire talutés. L'un d'eux est accolé à un donjon-logis de 4 niveaux. A lui est adossé un logis de 2 niveaux  et demi qui conserve les vestiges d'une fenêtre gothique  à larmier du XIVe siècle.  Parallèlement s'élève  une chapelle castrale à contreforts aux angles et sur les grands côtés. La travée orientale est éclairée au nord et  au sud par  une haute baie géminée gothique du XIIIe siècle. A l'intérieur une belle peinture murale représentant   un saint Georges. Beaubois de plan compact, ce château comprend deux bâtiments d'époque différente. Une maison forte des XIVe XVe siècles, flanquée  d'une tour ronde à l'est, les trois autres   ayant sans doute été arasées au cours de la  Révolution. Cette construction a été dénaturée par l'aménagement de logements dans les combles au XIXe siècle. A la suite de la précédente, se présente un corps de logis  édifié au XVIIe siècle, année 1629 portée  sur une dalle encadré de deux tours carrées.                      Croptes, ce château construit au XVe siècle, est un   donjon-logis rectangulaire   de trois niveaux et demi sur deux travées, à base talutée. Il est flanqué à deux angles  de tours circulaires  signalant une enceinte quadrangulaire. Côté cour, il est  accosté d'une grêle tourelle circulaire d'escalier plus tardive,  il compte deux pièces par étage,  le  rez de chaussée  et   le premier étage étant voûtés. Les cheminées sont adossées à un mur de refend. Au XVIIe ou XVIIIe siècle, ce logis a été augmenté au midi d'un bâtiment perpendiculaire encadré au XIXe siècle de deux pavillons.","habitants":"Famille de Jean de Ribeyre,                                                           Famille de Bertrand de Benaud.\r\n        \"","divers":"Château fort de Lezoux, de Fontenille, de Montsablé et château de Croptes.","gps":"","images":["../image/image_63/63_Lezoux_1.jpg","../image/image_63/63_Lezoux_2.jpg","../image/image_63/63_Lezoux_3.jpg","../image/image_63/63_Lezoux_4.jpg","../image/image_63/63_Lezoux_5.jpg"]},"Consult_chateau_formulaire304a":{"id":"Consult_chateau_formulaire304a","dept":"63","canton":"Manzat","commune":"Charbonnières-les-Vieilles","nom":"Lord_Dawis","type":"Château","periode":"XIX","histoire":"LORD-DAWIS, dans le haut du bourg de Charbonnières un imposant immeuble a été élevé dans les années 1879-1881, dans un contexte assez particulier. Sur son emplacement se trouvait la ferme de la famille Bouchat, dont avait hérité un fils, Mathieu, huissier à Riom. Lune de ses filles, Antoinette Léontine, grâce à une bonne instruction, partit en Grande-Bretagne comme préceptrice dans une riche famille de laristocratie, les Mortimer. Lun des fils, John Dawis, devenu amoureux de linstitutrice, lépousa, et le couple sinstalla à Charbonnières, nanti de la part dhéritage dévolue au jeune Lord, soit environ 9 millions \"or\". En 1885, Antoinette Davis se retrouvera seule, sans descendance, après le divorce prononcé à son bénéfice. Elle décédera en décembre 1918. La propriété passera alors de mains en mains, connaissant des fortunes diverses.  Dans les années 1990, le château est acquis par monsieur Viguier qui, après une restauration des intérieurs, y ouvre un restaurant. Les propriétaires actuels, monsieur et madame Pierre-Luc Basset, ont entrepris des travaux considérables dans la construction et ses abords pour une remise en état complète dans son état primitif. Depuis Mars 2006, ce château est inscrit à linventaire des Monuments Historiques.","architecture":"la  demeure de Lord Dawis, construite sur trois niveaux, remplaça bientôt lancien logis des Bouchat. Tout concourut à faire une réalisation hors du commun: murs tendus en cuir de Cordoue, parquets Versailles, salles de bain en glaces, escalier dhonneur en fer forgé. Le portail de la grille avait figuré à lExposition universelle de 1878. Proche du bâtiment principal, reliées par un souterrain passant sous un chemin communal, des écuries abritaient de nombreuses montures. A noter que les anciennes écuries, devenues propriété de la commune, furent cédées à une fonderie dart. Elles ont été gravement endommagées par plusieurs sinistres, détruisant en particulier le corps central dont le tympan sculpté qui lornait a pu être heureusement sauvé.","habitants":"Famille Bouchat,                                                                              Famille deJohn Davis,\r\n        \"","divers":"Château de Lord Dawis.","gps":"","images":["../image/image_63/63_Lord_Dawis_1.jpg","../image/image_63/63_Lord_Dawis_2.jpg","../image/image_63/63_Lord_Dawis_3.jpg","../image/image_63/63_Lord_Dawis_4.jpg"]},"Consult_chateau_formulairee99b":{"id":"Consult_chateau_formulairee99b","dept":"63","canton":"Issoire","commune":"Vodable","nom":"Mallesaigne","type":"Château","periode":"XIV","histoire":"MALLESAIGNE, parmi les familles qui gravitaient autour des dauphins, existaient les Volpillière qui,  depuis la fin du XIIIe siècle, tenaient en fief deux hôtels, fours, des terres et une tour dite de Morat. En 1343, Jean de la Volpillière  rend hommage au Dauphin. En 1456, le fief passa, par le mariage dIsabeau de la Volpillière  avec Étienne Autier de Villemontier, à une famille de Mallesaigne, dans les Combrailles. Elle donna son nom au château  quelle fit bâtir. En 1554, Antoine Autier,  gentilhomme de la maison du roi,  fait hommage pour un domaine, une chapelle dite Sainte-Magdeleine et une grosse tour.   Le 24 décembre 1587, le château fut pris par surprise  par Virmont, un capitaine protestant, mais celui-ci fut surpris  à son tour  par les paysans des environs. Les chefs de la garnison protestante se réfugièrent dans la  maison  de  Mallesaigne, ils furent massacrés par les paysans menés par le sieur de Chalus tandis que Gaspard de Montmaurin reprenait Vodable.   En 1605, Jacques de Ronzières, écuyer, sire de Laval, qui a épousé la nièce dAntoine Autier, rend hommage pour   un château  composé de deux corps de logis  et dune cour. Au milieu du XVIIIe siècle, celui-ci passe par mariage   aux Faugères qui à partir de 1683, se qualifièrent de seigneurs de Vodable, en 1780 François de Faugères acheta les droits de Louis-Philippe (le futur Philippe-Égalité).   Mallesaigne fut vendu à un banquier à la Révolution, puis au marquis de Laubespin en 1810, et enfin les dAubier de Condat lacquirent en 1861. Les propriétaires actuels sont M. et Mme Malavié et Mme Hadden.","architecture":"Mallesaigne, construit principalement au XVIe siècle, se compose dun corps de bâtiment à trois niveaux, flanqué en  son milieu dune tour ronde descalier, et de deux pavillons saillants carrés à deux travées de même hauteur, à toiture en croupe, reliés au premier étage par une galerie extérieure et prolongés dune travée dun étage de moins puis de communs  vers le nord.  La tour ronde, assez importante, abrite un escalier à vis de pierre  en très bon état. Le couronnement nest pas dorigine, il était orné naguère  dune balustrade en bois. La terrasse du rez-de-chaussée,, et la galerie supportée par cinq arcades en très bel appareil de Volvic datent de la même époque que les ouvertures et le décor du XVIIIe siècle.  À lintérieur, on peut admirer des éléments de décorations  de style Louis XV tardif, une galerie avec balustrade en bois au premier étage, correspond avec les appartements et permettait aux seigneurs dassister séparément à loffice. \r\nVodable, au sommet de la butte basaltique, trace d'une courtine et d'un donjon circulaire, une famille portait le nom à partir de la seconde moitié du XIe siècle, en 1262 le dauphin d'Auvergne fait hommage à Alphonse de Poitiers, vers la fin du XIIIe siècle le château fut transformé et agrandi. A la mort du dernier dauphin en 1426 le gendre Louis duc de Bourbon en hérite. Détruit en 1633.","habitants":"Famille de Mallesaigne\r\n        \"","divers":"Château de Mallesaigne et porte de Vodable.","gps":"","images":["../image/image_63/63_Mallesaigne_1.jpg","../image/image_63/63_Mallesaigne_2.jpg","../image/image_63/63_Mallesaigne_3.jpg","../image/image_63/63_Mallesaigne_4.jpg","../image/image_63/63_Mallesaigne_5.jpg"]},"Consult_chateau_formulairebd19":{"id":"Consult_chateau_formulairebd19","dept":"63","canton":"Vic-le-Comte","commune":"Manglieu","nom":"Manglieu","type":"Château","periode":"XV-XVI","histoire":"Trois châteaux dans la commune de Manglieu, château d'Auger  de Montel et de Montmoy;                                                               AUGER, en 1174. Louise de Dienne l'apporte en dot à Claude de  Chambarlhac. seigneur de Rochebeaubert, vers 1695, Gabriel de Dienne est seigneur d'Auger, en 1768,  leur fille Antoinette de Chambarlhac, dame d'Auger, le porte    par mariage à louis de La Rochette, chevalier, seigneur de la Bastide.                             MONTEL, en 1374, le damoiseau Pierre Serment,  habitant dans la paroisse de Manglieu. En 1588, Pierre de Serment, époux de Jeanne  de La  Faye, est seigneur. Vers 1612 Diane de Serment est dame de Montrodès,  du Montel,  de Condat et de Chanonat. En  1615, le fief est  acquis par  le chevalier Antoine Mallet, seigneur de Bien-Assis et La Forest. En 1618, Louis-Gabriel   Mallet, fils d'Antoine, naît au château du Montel. En 1644 Henri de Salers, qui a épousé Diane de Serment en 1630   intente un procès à Antoine Mallet sur la nullité de l'acte d'acquisition du Montel et  obtient gain de cause. En 1666, le baron est condamné pour meurtre et sa baronnie est confisquée par le Roi.  Mais le château du Montel reste à sa veuve Diane de Serment. En 1674 sa fille Gilberte, dame du Montel, l'apporte en dot à Charles de la Rochelambert,  seigneur  de Roche-Lambert et de Marcillat. En 1686, Gilbert de La Rochelambert se dit   comte du Montel, seigneur d'Orsonnette et de la Roche-Mirefleurs.                   MONTMOY, au XIIIe siècle, l'abbaye bénédictine de La Chaise-Dieu possède un prieuré sur le territoire de Manglieu. Dans la seconde moitié du XIIIe siècle ou vers 1300,  le prieur Bertrand de Creins fait bâtir le château.  Au XIVe siècle sans doute au début de la guerre de Cent Ans le donjon-logis est  complété par le prieur Godefroy de Doyat d'une nouvelle enceinte.","architecture":"Auger, Château construit au XVe siècle, situé à 5 km à l'est du bourg,  à l'entrée du  village en direction   du Puy d'Auger, sur   une hauteur. Logis de deux niveaux flanqué à un angle d'une haute tour   circulaire, un grand logis de trois niveaux lui a été accolé au XIXe siècle.                                                                               \r\n Montel  vers 1745, le château est endommagé par un incendie. Enceinte quadrangulaire, il reste un flanquement circulaire fortement taluté à l'angle nord-est d'un logis du XVIe siècle, remanié au XVIIe siècle. Un angle de la basse-cour est   pourvu d'une haute et étroite tourelle.                                             Montmoy;  Au XIIIe siècle,  de cette époque  sont conservés le volume initial, des archères, une petite fenêtre du côté de l'accès, une autre fenêtre murée et  camouflée sur la face opposée.   Au début du XVIe siècle, ce donjon  logis est  transformé en logis-manoir. Le bâtiment est allongé et  de nouvelles fenêtres sont percées. La tourelle d'escalier dessert   des balcons-coursières appuyés au premier niveau sur  de grands arcs. Ce  donjon rectangulaire, haut de 3 niveaux,  le premier étant voûté,  son couronnement est défendu par des archères  à étrier.  Le logis est dans une grande  enceinte dont il reste un flanquement rond à un angle à profil de barrique typique  du XIVe siècle. La courtine présente la particularité, souvent constatée dans des enceintes du XIVe siècle,  d'être litée en suivant la pente.","habitants":"Famille de Claude de  Chambarlhac.                                               chevalier Antoine Mallet\r\n        \"","divers":"Château d'Auger, de Montel et de Montmoy.","gps":"","images":["../image/image_63/63_Manglieu_1.jpg","../image/image_63/63_Manglieu_2.jpg"]},"Consult_chateau_formulairedc98":{"id":"Consult_chateau_formulairedc98","dept":"63","canton":"Olliergues","commune":"Marat","nom":"Marat","type":"Vestiges","periode":"XI-XVII","histoire":"MARAT, trois châteaux dans cette commune châteaux de Génilhat, deTeilhet et de Montmarie,  et celui du Bouchet (Vertolaye) dominent la vallée.                                                           GENILHAT, en 1323-28, Guillaume de Genilhat est dans l'entourage de Bertrand de La Tour, seigneur d'Oliergues. Entre 1345 et 1366 est cité Jean de Genilhat. En 1417, les héritiers de Jean de Génilhas sont vassaux des Montboissier. Avant 1500, Guillaume d'Oradour, écuyer, est seigneur   des châteaux   de Mezel, Gérimbault et Genilhat. En 1526, Jean d'Oradour, éuyer, est seigneur  de La Perche, de Mazel et  de Génilhat. En 1580, le manoir est à Guillaume Dînasse. En 1590 il est acheté par Christophe Bardon. En 1674,  Christophe Bardon,  prêtre de l'église de Marat est sieur  de Génilhat. En 1689 Jacques de Bardon,  gentilhomme de la fauconnerie du roi,  possède le manoir et y habite. Dans le seconde moitié du XXe siècle le manoir est restauré.                                                                       \r\n TEILHET, MONTMARIE,  pas d'historique.\r\nTour GRIPEL, ouvrages fortifiés qui témoignent du passé régional. Bertrand de la Tour, seigneur d'Olliergues, donne permission à Pierre de la Tour de fortifier son château en 1429. C'est probablement à la suite de cette autorisation que fut construite ou la tour fut profondément remanié dont le couronnement n'est pas antérieur à la fin du XVe siècle.","architecture":"Genilhat, le bâtiment primitif du XVe siècle est entouré de douves visibles de 1811 et comporte à  l'angle sud une tour, disparue; les écuries et la remise datent du début du XXe siècle; l'aile nord du manoir a été rajoutée par l'actuel propriétaire en utilisant des encadrements de fenêtres et de portes provenant du château de la Faye.                                                                                 Teilhet,  La plus ancienne mention du fief remonte au XIVe siècle. Il s'agit d'une petite forteresse de masse  quadrangulaire flanquée de tours circulaires, S'ils présentent des similitudes formelles, leur silhouette massive évoque un art médiéval tardif (XIVe), rien a priori ne permet de les lier d'un point de vue historique. Entre ces deux châteaux, la Tour du Gripel (Marat), donjon d'un ancien logis seigneurial du XVe dont il subsiste un fier pan de mur, était autrefois protégée par des douves et un pont-levis. la plus ancienne mention du fief remonte au XIVe siècle. Il s'agit d'une petite forteresse de masse  quadrangulaire flanquée de trois tours circulaires,  Les fenêtres des élévations ouest et sud sont des remaniements ou des percements datables du XVIe siècle. L'intérieur a gardé quelques traces des différentes occupations  cheminées monumentales, escalier en vis.  Ses dépendances comprennent  des parties agricoles, ce château est un exemple d'architecture vernaculaire du Livradois.                                 Montmarie    dressé au coeur d'une superbe châtaigneraie, est de style néo-renaissance.","habitants":"Famille de Bertrand de la Tour                                                             Famille de Guillaume de Genilhat\r\n        \"","divers":"Château de Genilhat,  de Theillet de Montmarie et la tour de Gripel dit de Marat.","gps":"","images":["../image/image_63/63_Marat_1.jpg","../image/image_63/63_Marat_2.jpg","../image/image_63/63_Marat_3.jpg"]},"Consult_chateau_formulaireb58a":{"id":"Consult_chateau_formulaireb58a","dept":"63","canton":"Champeix","commune":"Champeix","nom":"Marchidial","type":"Vestiges","periode":"XII-XV","histoire":"MARCHIDIAL, c'est vers 1155, lors du partage du comté d'Auvergne, que Champeix échoit au dauphin d'Auvergne. Vers 1200, une famille éponyme tient le château pour les dauphins. Au début du XIIIe siècle, le château est occupé par le Roi qui y  dresse un donjon. En 1217, il a fait retour à Guillaume, dauphin d'Auvergne. En 1225 celui ci échange les droits que René de Champeix possède à Champeix contre le fief de St-Floret. En 1240, son fils Robert Dauphin prête hommage à l'évêque. Vers le milieu du XIIIe siècle, ce château apparaît comme l'une des principales résidences des Dauphins. Après 1296, Hugues Dauphin, chanoine et prévôt   de l'église de Brioude, a pour apanage Champeix et Chamalières. En 1285, Guérin de Montaigut est coseigneur de Champeix.   En 1426, Jeanne Dauphin apporte l'héritage  delphinal  à Louis 1er de Bourbon-Montpensier, qui  devient dauphin d'Auvergne. En 1500, Antoine Enjobert  est nommé capitaine de Champeix par le connétable de  Bourbon. Au début  du XVIe siècle, Charles III, duc de Bourbon, vend à Thomas Boyer, secrétaire des finances et chambellan de Charles VIII (puis de Louis XII), les châteaux et seigneuries de Champeix, Saint Cirgues, Chidrac  Pardines, Perrier et Saurier  relevant  du Dauphiné d'Auvergne. En 1565 à la mort  de son fils Antoine, ses biens  passent au connétable Henri de Montmorency. En 1575, le fils  de celui-ci cède Champeix, par échange à Marc de Montboissier-Beaufort-Canillac. En 1633, le château est démoli sur ordre de Richellieu. \r\nMARTRE, à la fin du XVe siècle, Guillaume de Baron est seigneur de La Martre. En 1550, le château est à Jean III de Baron.  Après sa mort le fief est partagé entre ses deux enfants, Michel de Baron et Marguerite qui épouse en  1576, Louis   de Mascon.  En 1633 Louis de Mascon est sieur de la Martre. De 1674 à 1689, Louis de Mascon, écuyer,  seigneur de  la Martre et de Saulzet, y  habite. En 1693, Charles-Emmanuel et Gabriel de Mascon, frères, écuyers, sont sieurs de la Martre et du Sauzet. Vers 1700, la part restée aux descendants de Michel de Baron est vendue à la famille de Bayle. En 1789, Jean-Baptiste de Mascon, chevalier, seigneur de la Martre, est député de la noblesse aux Etats Généraux.","architecture":"Château de Marchidial Champeix  ce qui signifie grenier et palais du marquis, est perché sur un éperon rocheux granitique  surplombant le village de Champeix. Ce château remonte au XIIIe siècle et est composé d'une enceinte avec donjon rond en angle. Les jardins scéniques situés autour du château médiéval et de la chapelle de Marchidial, soutenus par des murets de pierres sèches et sillonnés de sentiers et d'escaliers, sont inspirés de l'histoire des jardins, ils associent la pierre, les fleurs ordinaires et les légumes oubliés.   Une tour ruinée du château XIIIe siècle, base du donjon et vestiges dune salle voûtée du donjon carré du XIVe siècle et de lenceinte reconvertie en mur de soutènement de terrasses.\r\nLe Château de la Martre est composé d'un logis de plan rectangulaire de trois niveaux avec tour ronde d'angle. Le  fossé est conservé sur deux côtés.","habitants":"Famille de Guillaume, dauphin d'Auvergne                                                                   Famille de Louis de Mascon \r\n        \"","divers":"Vestiges du château de Marchidial et de la Martre.","gps":"","images":["../image/image_63/63_Marchidial_1.jpg","../image/image_63/63_Marchidial_2.jpg","../image/image_63/63_Marchidial_3.jpg","../image/image_63/63_Marchidial_4.jpg","../image/image_63/63_Marchidial_5.jpg","../image/image_63/63_Marchidial_6.jpg","../image/image_63/63_Marchidial_7.jpg","../image/image_63/63_Marchidial_8.jpg"]},"Consult_chateau_formulaire740a":{"id":"Consult_chateau_formulaire740a","dept":"63","canton":"Mareugheol","commune":"Mareugheol","nom":"Mareugheol","type":"Fort","periode":"XII","histoire":"MAREUGHEOL, fort villageois,  Philippe de Gévaudan, épouse de Guillaume IV (1000-1064) comte dAuvergne parents dArchambault IV, comte de Bourbon et de Robert II dAuvergne, donne Mareugheol au prieuré de Sauxillange. Dès le XIIe siècle, le village appartient au Dauphiné dAuvergne et dépend de la justice de Vodable. On note un Gérard  de Mareugheol  en 1262,  Etienne de Montaigut est seigneur du lieu en 1248, Arnaud Barast en 1316. Géraud de  Rochefort vend la terre au Dauphin  en 1377, et la famille des dauphins dAuvergne a conservé ce fief  jusquà la  Révolution.  Les fortifications datent vraisemblablement de la seconde moitié du XIVe ( pont-levis, mâchicoulis) époque troublée par les conflits seigneuriaux et les ravages des routiers.  En 1577, lors de la prise dIssoire par le duc dAnjou, les religionnaires se réfugient à Mareugheol, preuve que les  fortifications sont encore aptes à la défense. Au XVIIe, la paix retrouvée, les fossés sont comblés, les caves, puis les façades souvrent vers lextérieur. Petit à petit, les habitants préféreront  des logements clairs et mieux aérés,   à lextérieur du fort, tandis que celui-ci ne sert plus guère quà lentrepôt et à la remise.","architecture":"Mareugheol,  enceinte rectangulaires pourvues de tours d'angles rondes. Elle  protégeait une soixantaine de constructions: des habitations permanentes, en 1330, Robert de Riom y possédait une maison-forte, rebâtie en 1434, à lintérieur desquelles subsistent  de nombreuses et  riches peintures murales, une église paroissiale  et un chapitre de chanoines qui possédait également  une maison-forte pour conserver ses archives,  mais aussi,  au nord, des loges (abris temporaires  de 4 m x 6 m,   composés dune cave,  dune pièce dhabitation et dun grenier, sans liaison verticale), aujourdhui en ruines. La courtine nord est la moins modifiée, appareil de moellons darkose et de basalte, parement de blocs réguliers,  deux latrines, meurtrières.  Les autres ont subi des percements du XVIIe au XIXe siècles. Hautes de 10 à 12 m,  elles étaient surmontées dun chemin de ronde  dont il subsiste quelques restes  au sud-est. Lentrée principale  se trouve dans la façade sud, on aperçoit les rainures  qui permettaient  lencastrement des flèches du pont-levis et les trois corbeaux  qui devaient supporter la bretèche défendant la porte. Lentrée Est, en plein cintre,  est plus petite. Les percées effectuées au nord datent du XVIIe siècle. Les tours, de 4 à 6 m  de diamètre, étaient  crénelées,  la plus grosse au Nord ouest, face au cimetière, garde des traces de meurtrière.","habitants":"Famille d'Arnaud Barast\r\n        \"","divers":"Vestiges du Fort de Mareughéol","gps":"","images":["../image/image_63/63_Mareugheol_1.jpg","../image/image_63/63_Mareugheol_2.jpg","../image/image_63/63_Mareugheol_3.jpg","../image/image_63/63_Mareugheol_4.jpg","../image/image_63/63_Mareugheol_5.jpg","../image/image_63/63_Mareugheol_6.jpg","../image/image_63/63_Mareugheol_7.jpg","../image/image_63/63_Mareugheol_8.jpg","../image/image_63/63_Mareugheol_9.jpg"]},"Consult_chateau_formulaire1235":{"id":"Consult_chateau_formulaire1235","dept":"63","canton":"Maringues","commune":"Maringues","nom":"Maringues","type":"Château","periode":"XV-XVII","histoire":"Plusieurs châteaux dans la commune de Maringues;   BIESSAT, BULHON, MOULIN-NEUF, TERASSE et PONTLIERE .            BESSAT,  reconstruit à l'emplacement de la maison forte du fief de Beissat; reconstruction effectuée entre 1749 et 1764, à l'occasion de la donation du domaine de Beissat par Jean Espinasse, receveur des tailles en élection de Clermont, à sa fille.              MOUILINS neuf, en 1245, Pierre de Pagnat, damoiseau, est seigneur de Moulin-Neuf. En 1341, Jean de Pagnat,   chevalier, seigneur de Moulin-Neuf. En 1553. Jean de Pagnat, jeune écuyer, seigneur de Moulin Neuf. Vers 1570, François   de Lorme,  écuyer,  originaire du Bourbonnais,  héritier des Pagnat, est seigneur de Moulin-Neuf. Vers 1674, Antoine  de Chandieu, écuyer, seigneur d'Apany et du Moulin-Neuf.  En 1689, Anne de Valadoux, sa veuve, habite le château avec ses enfants. En 1789, le dernier seigneur est le comte Gabriel Joseph Alexandre de   Bosredon.                              PONTLIERE,   reconstruit probablement au milieu du XIXe siècle, après 1812,   l'emplacement d'un édifice plus ancien, probablement du XVe ou du XVIe siècle ; un des deux pigeonniers, celui du sud-est, en pans de bois, existait déjà en 1812  et pourrait dater des XVIIe ou XVIIIe siècle mais a été remanié à la base, l'autre pigeonnier sur resserre et les autres dépendances sont des constructions du XIXe siècle, comme le château  Moulin-neuf  construit au XIVe siècle.                                                           Au sud de Maringues à Crevant-Laveigne le château de Terasse et Bulhon châteaux  voir article architecture.","architecture":"Bessat reconstruit à l'emplacement de la maison forte du fief de Beissat; . Murs vraisemblablement en moellons de pierre, avec enduit; bandeaux,  chaînes d'angles et encadrements en andésite.       Bulhon  Edifice reconstruit à la fin du XVIIIe siècle à partir de bases médiévales. Décor intérieur des XVIIIe et XIXe  siècles. Le château, y compris son parc et les pièces suivantes avec leur décor.                                                                              \r\nMoulins Neuf, château construit au XIVe siècle, situé à 800 mètres à l'est du bourg par un chemin qui s'embranche au sud vers Luzillat.  Enceinte quadrangulaire à flanquements cylindriques d'angle,  il en reste deux accolés à un logis de deux niveaux et demi sur quatre travées remanié au XVIIe siècle. Les cheminées sont adossées aux pignons.                                                     Pontlière; reconstruit probablement au milieu du XIXe siècle, après 1812, à l'emplacement d'un édifice plus ancien, probablement du XVe ou du XVIe siècle (vestiges dans l'angle nord-est  du logis : tourelle et porte).\r\nTerasse, le château actuel a remplacé, sous la fin de l'ancien régime, une construction féodale alors en partie  ruinée  qui existait déjà en 1245. Construction de plan rectangulaire avec  un hémicycle en saillie sur  sa façade ouest. Le milieu de la façade sud  est occupé par  un avant-corps en saillie, limité de chaque côté par  un pilastre à chapiteau ionique à guirlandes  supportant une architrave formant l'auvent du balcon à balustrade, le balcon est porté par 2 colonnes galbées à  chapiteaux ioniques à guirlandes. A l'intérieur, le décor et le mobilier d'époque ont été intégralement conservés.","habitants":"Famille de Jean de Pagnat\r\n        \"","divers":"Château  de Bessat, de Bulhon, du Moulins neuf, de Pontlière et de la Terasse.","gps":"","images":["../image/image_63/63_Maringues_1.jpg","../image/image_63/63_Maringues_2.jpg","../image/image_63/63_Maringues_3.jpg","../image/image_63/63_Maringues_4.jpg","../image/image_63/63_Maringues_5.jpg","../image/image_63/63_Maringues_6.jpg","../image/image_63/63_Maringues_7.jpg","../image/image_63/63_Maringues_8.jpg","../image/image_63/63_Maringues_9.jpg"]},"Consult_chateau_formulaire52d0":{"id":"Consult_chateau_formulaire52d0","dept":"63","canton":"Riom","commune":"Marsat","nom":"Marsat","type":"Vestiges","periode":"XII","histoire":"MARSAT, dans larmorial de Guillaume de Revel (milieu XVe),  le château  fut partiellement détruit en septembre 1590 par les royalistes, les habitants ayant pris fait et cause pour la Ligue, puis démantelé à partir de la Révolution. En 1465, lors de la guerre du bien public, Louis XI séjourna à Marsat, et François 1er au XVIe siècle. Il est vraisemblable que le château fut érigé par un seigneur chargé de la protection du monastère, vers le début  du XIIe siècle, mais ce nest quau milieu du XIIIe que lon voit apparaître un seigneur laïc de Marsat.","architecture":"Deux tours du château de Marsat restent visibles. Si une de ces tours est encore relativement intacte la deuxième est plus abîmée, plus ou moins en ruines, avec de hauts murs et des échauguettes aux angles. Celles-ci ont été remplacées par quatre tours au XVIe (les deux  demi-croisées à traverse et chambranle moulurés datent de cette époque), il nen reste que deux aujourdhui.","habitants":"Famille de Guillaume de Revel \r\n        \"","divers":"Vestiges du château de Marsat.","gps":"","images":["../image/image_63/63_Marsat_1.jpg","../image/image_63/63_Marsat_2.jpg","../image/image_63/63_Marsat_3.jpg","../image/image_63/63_Marsat_4.jpg","../image/image_63/63_Marsat_5.jpg","../image/image_63/63_Marsat_6.jpg"]},"Consult_chateau_formulairee8b5":{"id":"Consult_chateau_formulairee8b5","dept":"63","canton":"St-Dier-d`Auvergne","commune":"St-Dier-d`Auvergne","nom":"Martinanches","type":"Château","periode":"XVI","histoire":"MARTINANCHES, le château fut construit en 1070 par une grande famille d'origine aveyronnaise, la famille des Comptour d'Apachon, en 1267 Robert Comptour chanoine comte de Brioude, il servait de dépôt pour les fiefs de Boissonnelle, Montboissier et Mauzun. En 1516 Antoine de Comptour  avait  épousé Antoinette de Roure, le fief passe par leur fille Françoise de Comptour  en 1532 par alliance  avec Jacques d'Ouradour  chevalier et seigneur d'Ouradour, de Brétheil, de Saint-Gervazy et autres lieux, leur fils Jacques III d'Ouradour sénéchal de Clermont honoré par la faveur de Charles IX devient  gentilhomme de la chambre et maître d'hôtel meurt en 1590 aux combats. Claude d'Ouradour dame de Martinanches, épouse François Cistel écuyer, seigneur de Montglandier, leur fils sans postérité fit donation à sa femme, Anne de Chènerailles qui le lègue à sa nièce Gabrielle, alliée à Pierre de Valadoux, seigneur de Mazet, puis à Pierre de Bertaud seigneur de Pouzadour et en 1686 le fief revient à Antoine Groslier apothicaire à Clermont, sa fille Jeanne par alliance apporte le domaine en 1688 à Antoine Cosme-Chantelou docteur, ils eurent un fils Jean-Baptiste avocat au parlement qui a comme successeurs sa fille et son gendre Annet Ferrand notaire royal à Volvic et la    propriété passe  à la famille de Riberolles en 1742, Claire de Riberolles toujours par alliance à Charles-Amable de Cadier de Veauce en 1892 qui en son toujours propriétaire.                                                                                  A quelques kilomètres au Nord-Est à Ceilloux le château de  GAUDON, se trouve dans une région appelée La Toscane d'Auvergne. Il s'agit d'une région située entre les villes de Clermont-Ferrand, Thiers, Ambert et Issoire, et qui doit son nom à Catherine de Médicis ainsi qu'à la reine Margot, d'origine Toscane, prisonnière en Auvergne, à Usson au XVIIe siècle.","architecture":"Martinanches, situé au fond d'un vallon dans un parc et entouré de douves, il est situé dans une dépression ce qui le rend invisible,  sur la voie romaine allant du Puy à Clermont-Ferrand, le guerrier romain chargé de faire payer cet octroi s'appelait Martinus, d'où le nom de \"Martinanches\" par la suite. Le château du XIe siècle était un véritable château-fort :  L'architecture du château était à l'époque toute autre, il était protégé par deux ceintures de douves, l'accès au château se faisait par pont-levis, qui est aujourd'hui fixe; le château était entièrement entouré de murs crénelés qui tombaient à pic sur les douves avec un porche d'entrée qui renfermait l'assommoir, enfin, il était composé de trois tours et d'un donjon, aujourd'hui, il possède cinq tours et une aile secondaire, en effet le château, date du XIe siècle,  le château a surtout été remanié à la fin du XVe siècle lorsque la famille Comptours d'Apchon s'est installée en Auvergne, il a alors pris son rôle de \"Demeure Seigneuriale : façade typiquement XVIe siècle avec ses ouvertures à meneaux donnant sur le \"miroir d'eau\". Construction de la tour hexagonale contenant le magnifique escalier à volutes permettant d'accéder au premier et deuxième étages.                   Gaudon de style classique du XIXe siècle, corps de logis rectangulaire avec pavillon saillant sur la droite, l'ensemble de même niveau à deux étages.","habitants":"Famille d'Antoine Groslier\r\n        \"","divers":"Château de Martinanches et de Gaudon à Ceilloux.","gps":"","images":["../image/image_63/63_Martinanches_1.jpg","../image/image_63/63_Martinanches_2.jpg","../image/image_63/63_Martinanches_3.jpg","../image/image_63/63_Martinanches_4.jpg","../image/image_63/63_Martinanches_5.jpg","../image/image_63/63_Martinanches_6.jpg","../image/image_63/63_Martinanches_7.jpg","../image/image_63/63_Martinanches_8.jpg","../image/image_63/63_Martinanches_9.jpg"]},"Consult_chateau_formulaire40f4":{"id":"Consult_chateau_formulaire40f4","dept":"63","canton":"Randan","commune":"St-Priest-de-Bramefrant","nom":"Maulmont","type":"Château","periode":"XIII-XV","histoire":"MAULMONT; au XIIIe siècle siège  d'une commanderie hospitalière établie par Renaud de Vichy, grand maître  de l'ordre du temple qui passera ensuite aux hospitaliers de Saint-Jean de Jérusalem avant de devenir la propriété de la famille de Maulmont qui lui donne son nom, cette famille possédait les seigneuries de Thiers  de Tournoël  et deviennent en échange avec le roi Philippe le Bel, les propriétaires des forteresse de Châlus  et de Châlucet du vicomté de Limoges. Le Fief de Maulmont  au XVe siècle est compris dans la seigneurie de Randan, propriété de la famille du Puy, passera aux Pastrin puis aux Grollier qui le cèderont  en 1821 aux Rollat du Bourget . Madame Adélaïde soeur du futur roi Louis Philippe acquiert le domaine en 1829 fait reconstruire le château en 1835 qui sera terminé en 1841. A la mort d'Adélaïde en 1847, le domaine passe à son neveu Antoine d'Orléans duc de Montpens
