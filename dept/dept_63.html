la fille de celle-ci apporte le château à François de Beauverger. En 1711, Boissonnelle passe par mariage aux Montmorin.                 \r\nChâteau des Martinanches classé Monument Historique en 1968.(voir article).","architecture":"Boissonnelle change de propriétaire à chaque génération  La terre est mentionnée, dès le XIe siècle, comme appartenant à Hugues Boissonnelle. De cette époque subsiste la motte castrale primitive, au sud du château en pierre.\r\nRuines du château de Boissonnelle (XIIe siècle) des XIIe et XIVe siècles à 5 km du bourg. A l'extrémité d'une large crête, une enceinte oblongue est défendue   du côté de l'attaque par   un donjon semi-circulaire haut de 15 mètres, percé   d'une archère. Au donjon est accolé un logis de trois niveaux. Une tour semi cylindrique flanque l'angle sud-est et domine l'entrée dans la basse-cour. Celle-ci est accolée en contrebas à l'ouest, elle a été agrandie plus tard sur le flanc occidental. Aux XIXe et XXe siècles, le château-fort est vandalisé par des fermiers. Les derniers d'entre eux dépècent la ruine et vendent les fenêtres et l'escalier à vis avant de la céder à l'actuel propriétaire qui a entrepris d'importants travaux.","habitants":"Famille de Louis de Montboissier\r\n        \"","divers":"Vestiges du château de Boissonelle","gps":"","images":["../image/image_63/63_Boissonelle_1.jpg","../image/image_63/63_Boissonelle_2.jpg"]},"Consult_chateau_formulaire162a":{"id":"Consult_chateau_formulaire162a","dept":"63","canton":"Pontgibaud","commune":"St-Pierre-le-Chastel","nom":"Bonnabaud","type":"Château","periode":"XIII-XV","histoire":"Deux châteaux à Saint-Pierre le Chastel;                             BONNABAUD, Aimon de Bonnabaud de la Maison de Blot, branche de la famille de Bourbon. En 1328 il était Bailli des Montagnes d'Auvergne. Le personnage le plus important de cette famille fut Jean de Bonnabaud, né vers 1340. Il fut élevé à l'Hôtel de Bourbon à Moulins avec le futur Duc Louis II de Bourbon. En 1465, Martin Chouvigny de Blot, petit-fils de Jean de Bonnabaud vend la terre à Antoine de  Langhac. Son père, Jean Ier  de Langhac, était Sénéchal d'Auvergne et de Beaucaire, Chambellan du Roi Charles VII. Onze propriétaires de la famille de Langhac se succéderont à la seigneurie de Bonnebaud jusqu'à la veille de la Révolution en 1787. Le plus illustre fut Jean de Langhac, qui hérite de ce bénéfice ecclésiastique en 1525.  Gilbert Allyre Antoine, marquis de Langhac, maréchal de Camp reçu grand sénéchal d'Auvergne le 25 juillet 1757, son fils Joachim Claude Gilbert Allyre, dit Jean Marquis de Langhac nommé maréchal de Camp en 1767 et enfin son fils Anne Joseph Gilbert Allyre, Comte , maréchal de Camp le 1er janvier 1770 reçu grand sénéchal d'Auvergne le 5 décembre 1788.Le château fut vendu le 23 février 1787 à Aimable Jacques Soubrany de Benistant, conseiller au Présidial de Riom puis le 5 mars 1824 à Blaise Achille de Falvard de Montluc.  Le 26 avril 1869, le château fut vendu à Jean Collier Trintinhac, depuis plus de 130 ans, il appartient à la même famille Collier-Deschamps-Bourgeau qui l'entretient avec respect et amour dans son intégrité médiévale.\r\nTOURNEBISE, En 1351, le château est à Jean de Chambost. En 1523, l'écuyer Pierre de Grandville est seigneur. En 1595, Etienne Déségaux , échevin de Clermont est seigneur de Tournebise, puis en 1679 Jean Déségaux lui succède.  En 1703, Louis Bon, époux de Marguerite Déségaux, rend hommage au roi pour son fief de Tournebize. Ensuite  Tournebize passe par   héritage à Gilbert Bérard, puis à Jean de Tissandier. En 1774  nait  au château Etienne de Tissandier.","architecture":"Construction du château de Bonnabaud, au XIIIe siècle d'un donjon carré,  agrandi aux XIVe et XVe siècle par l'adjonction d'une tour   ronde au sud, puis la construction  d'une enceinte quadrangulaire   délimitant une cour fermée. Aménagement du  logis aux XVIIe et XVIIIe siècles,  avec présence de boiseries et de décors peints du XVIIe siècle. Au XVIIIe siècle, création de jardins formés de parterres.  Ajout de décors fin XIXe siècle. Le plan de l'édifice traduit une continuité ininterrompue  du Moyen-Age à l'époque moderne. Vers 1630, au cours de la lutte de Richelieu contre les féodaux, le donjon et les tours du château furent abaissées à la hauteur du chemin de ronde et les terrasses crénelées remplacées par des toits en poivrière couverts de lauze.                                  Château  de Tournebise situé à 1,5 km au nord du village. Reste d'une enceinte, porterie en   demi cercle (barbacane) encadrée par deux tourelles percées de courtes meurtrières, le portail monumental semble refait au XIXe siècle.  Un grand  logis de deux niveaux, reconstruit au XVIIe siècle est souligné par des bandeaux.","habitants":"Famille d'Aimon de Bonnabaud                                                          Famille de Jean de Langhac\r\n        \"","divers":"Château de Bonnabaud et de Tournebise","gps":"","images":["../image/image_63/63_Bonnabaud_1.jpg","../image/image_63/63_Bonnabaud_2.jpg","../image/image_63/63_Bonnabaud_3.jpg","../image/image_63/63_Bonnabaud_4.jpg","../image/image_63/63_Bonnabaud_5.jpg"]},"Consult_chateau_formulairec7fa":{"id":"Consult_chateau_formulairec7fa","dept":"63","canton":"Viverols","commune":"Saillant","nom":"Bostfranchet","type":"Vestiges","periode":"XII","histoire":"BOSTFRANCHET, occupé dès le XIIe siècle par la famille Pelet, originaire du Narbonnais, Bostfranchet est le berceau de cette famille où Pelet de Beaufranchet y nacquit. Une gentilhommière   était  fortifiée  sous le règne de Charles Ier, duc  de Bourbon et d'Auvergne. En 1636, Antoine de Beaufranchet  s'unit à  Bonne-Rochette et s'installe au fief d'Ayat  que lui apporte sa femme. Leur arrière-petite-fille Amable, donnera naissance   au futur général Desaix. L'un des seigneurs des lieux de Bostfranchet, Louis-Charles-Antoine de Beaufranchet, partisan de la Révolution, aurait commandé  les troupes présentes lors de l'exécution de Louis XVI.","architecture":"Bostfranchet, Il ne reste actuellement plus qu'une tour en ruine de cet ancien château : murailles, tours créneaux et fossés. Il ne reste plus  qu'une tour ruinée de ce château.   Une ferme occupe désormais son espace principal. Dans la cour centrale, on peut voir gravé, sur un vieux puits en pierre, les restes du blason de la famille de Beaufranchet.                                                         Différents châteaux ou maisons fortifiées étaient situés sur la commune, outre celui de  Montpeloux entièrement disparu, citons Bostfranchet (Beaufranchet) de la famille du même nom,  Recuyer  (construit par la puissante famille bourgeoise  des Calemard) et le château de Montcelard.","habitants":"Famille de Pelet de Beaufranchet\r\n        \"","divers":"Vestiges du château de Bostfranchert","gps":"","images":["../image/image_63/63_Bostfranchet_1.jpg","../image/image_63/63_Bostfranchet_2.jpg","../image/image_63/63_Bostfranchet_3.jpg"]},"Consult_chateau_formulaire73d1":{"id":"Consult_chateau_formulaire73d1","dept":"63","canton":"Olliergues","commune":"Vertolaye","nom":"Bouchet_Vertolaye","type":"Château","periode":"XVIII","histoire":"deux châteaux à Vertolaye;                                                   BOUCHET,  achat en  1776 par Vimal du Bouchet qui fait  un banc monumental adossé à la tour d'escalier, fontaine et aménagement du jardin régulier probablement à la même époque.                                                                         GRANGE manoir, en 1534,  Jacques de Pons est dit seigneur de la Grange lors de son mariage avec Aymare Motier de Champetières. En 1662, François-Alexis de Pons, religieux du couvent des Récollets à Montferrand, fait don de tous ses biens à son frère François, dont le fief de La Grange, paroisse de Vertolaye.","architecture":"Château de Bouchet  essentiellement construit au XVe siècle,  au début du XXe siècle effondrement de la tour nord-est, reconstruite peu après, du jardin  régulier ne subsistent que deux charmilles. Corps de logis avec escalier hors-oeuvre en vis, logé dans tourelle à toit polygonal,  tours d'angle du corps de   logis et pigeonnier à toit conique, escalier extérieur descendant au jardin.  Manoir de la Grange édifié au XVIe siècle, à 1,2 km au nord-est   du bourg,  hameau dans les bois. Logis rectangulaire de  deux niveaux très remanié, accosté  d'une grosse tour circulaire  d'escalier; la porte est surmontée d'un grand blason et les chambranles sont décorés de pilastres.","habitants":"Famille de Vimal du Bouchet                                                                 Famille de  Jacques de Pons\r\n        \"","divers":"Château deu Bouchet et le manoir de la Grange","gps":"","images":["../image/image_63/63_Bouchet_Vertolaye_1.jpg","../image/image_63/63_Bouchet_Vertolaye_2.jpg"]},"Consult_chateau_formulaire7ddd":{"id":"Consult_chateau_formulaire7ddd","dept":"63","canton":"Olliergues","commune":"Tour-sur-Meymont","nom":"Bourgnon","type":"Château","periode":"XVI","histoire":"Deux châteaux à Tour sur Meymont; BOURGNON    Une famille  de Bourgnon est citée  en 1337. En 1505, Marguerite, fille de Guillaune  de Bourgnon, lapporte en  dot à Jean de Mouricaud. Un François de Mouricaud est attesté vers 1617. En 1664, Madeleine de Mouricaud  lapporte à François de La Salle. Celui-ci, écuyer, sieur du Teillet, y habite  de 1674 à 1693. Puis le château est acheté par Jean-François II Micolon de Blanval (1697-1759), seigneur de Guérines, en 1749. Il a 12 enfants, dont : Joseph Micolon de Blanval, le second, né en 1730, abbé de Beaulieu, prieur de  Saint-Just de Meymont, chanoine de la cathédrale de Clermont, secrétaire perpétuel de la société littéraire de Clermont, mort en 1792   au château. Jacques-Christophe, né en 1734, qui sinstalle  au château  où il mourra le 3 avril 1818. De lunion de ce dernier avec Charlotte Teyras de Grandval naît, en 1759, Côme Damien, et en 1760, Joseph Michel, futur évêque de Nantes  où il meurt en 1838. Claude-Marie Micolon de Bourgnon, (1735) mort célibataire au château en 1819 maréchal de camp. La famille habite toujours le château !","architecture":"À lorigine, existait un donjon-logis de trois niveaux, entouré dune enceinte quadrangulaire, dont il reste une tour, à gauche de lentrée. Le logis fut ensuite remanié au XVIIIe siècle : agrandissement en 1772, jardins dessinés en 1777, une aile est aménagée  entre 1787 et 1792. Le décor intérieur est exceptionnel : cage descalier  Louis XVI, chapelle, salon lambrissé, salon de la guerre de Troie, etc.  Eléments protégés MH : le château, les jardins avec l'allée d'entrée bordée par la pièce d'eau, le bosquet Louis XVI et son portillon, le mur de clôture  avec son portail, le pigeonnier, les terrasses, la tonnelle avec son décor peint.","habitants":"Famille  de Bourgnon \r\n        \"","divers":"Château de Bourgnon","gps":"","images":["../image/image_63/63_Bourgnon_1.jpg","../image/image_63/63_Bourgnon_2.jpg","../image/image_63/63_Bourgnon_3.jpg","../image/image_63/63_Bourgnon_4.jpg","../image/image_63/63_Bourgnon_5.jpg"]},"Consult_chateau_formulaire633a":{"id":"Consult_chateau_formulaire633a","dept":"63","canton":"Riom","commune":"Menetrol","nom":"Bourrassol","type":"Château","periode":"XVII","histoire":"BOURRASSOL Le fief de Bourrassol au sud de Ménétrol appartient au seigneur du même nom au XIIIe siècle.. Pour les besoins du célèbre \"procès de Riom\" ladministration  pénitentiaire  avait loué ce château. Y furent détenus, outre Léon Blum (qui y séjourna de décembre 1940 à mars 1943), Édouard Daladier, le général Laure, ancien secrétaire général du chef de lÉtat, et le général Gamelin. Léon Blum y a rédigé son ouvrage \"A léchelle humaine\" et sa description du château nest pas flatteuse : la masure de  Bourrassol, mangée par la ladrerie et la saleté. (gîtes de France).","architecture":"Le château de Bourrassol a été construit sur une butte le long de la route royale Riom Clermont. Il est composé dun corps de logis flanqué dun donjon qui sert parfois de barrière de péage. A la fin du moyen âge le château est détruit par la  volonté des habitants de Riom qui ne supportent plus les exactions des soldats des seigneurs de Bourrassol.  Lépoque moderne voit  la construction dun nouveau château de style Louis XIII (XVIIe siècle) en contrebas de la butte à lemplacement des anciennes dépendances.","habitants":"Famille d'Édouard Daladier\r\n        \"","divers":"Château de Bourrassol","gps":"","images":["../image/image_63/63_Bourrassol_1.jpg","../image/image_63/63_Bourrassol_2.jpg","../image/image_63/63_Bourrassol_3.jpg","../image/image_63/63_Bourrassol_4.jpg"]},"Consult_chateau_formulaire51d6":{"id":"Consult_chateau_formulaire51d6","dept":"63","canton":"Ambert","commune":"Champétières","nom":"Bouy","type":"Maison forte","periode":"XVI","histoire":"BOUY,   maison-forte plutôt que château, l'édifice a été bâti vers l'an 1500 sur l'emplacement d'un château plus ancien dont la tour ronde de l'extrémité nord-est constituerait un témoignage. Berceau de la famille du général de Lafayette.","architecture":"Le château du Bouy, maison forte construite au XVIe siècle sur lemplacement dun château plus ancien. Ce manoir est entouré d'un   ensemble comportant une maison d'habitation et divers bâtiments à destination agricole. L'intérêt de cette ferme fortifiée est de constituer un bon exemple du rôle à la fois militaire et agricole que ce type d'édifice joua en Auvergne. En élévation ouest  est encastrée une pierre remployée  d'époque romaine portant une  inscription latine. Au cours de la dernière guerre mondiale, un incendie a détruit  l'intérieur et endommagé  le gros oeuvre.","habitants":"Famille du général de Lafayette\r\n        \"","divers":"Château du Bouy","gps":"","images":["../image/image_63/63_Bouy_1.jpg"]},"Consult_chateau_formulairec95c":{"id":"Consult_chateau_formulairec95c","dept":"63","canton":"Issoire","commune":"Le Broc","nom":"Broc_Couze","type":"Fort","periode":"X-XII","histoire":"Trois châteaux à Le-BROC,  depuis la fin du Xe ou début du XIe siècle est citée une famille éponyme. Au milieu du XIIe siècle, en 1230 Bertrand du Broc fait hommage pour son château  au dauphin, puis vers 1250-1263 à Alphonse de Poitiers. En 1262 Pierre du Broc est seigneur du Broc, de Chambon, de Plauzat et de Bergonne. La dauphine du Broc qui vit encore en 1340, fille de Bertrand, dame de Bergonne et du Broc, épouse d'abord Louis de Beaujeu, seigneur de Montferrand, puis Bertrand de La Rochebriant. Alasie de La Rochebriant, fille de Bertrand, épouse un seigneur de Murol.  En 1404, Bertrand,  dernier représentant de la famille, sans descendant direct,  installe Guillaume de Murol et son frère Amblard, doyen du chapitre de Brioude, qui étaient les  petits-fils d'Alasie de La Rochebriant, pour ses héritiers de la moitié de la seigneurie du Broc. En 1408 ceux-ci achètent  l'autre moitié à la veuve   de Bertrand du Broc.  En 1446, Jacques 1er de Murol, fils de Guillaume, rend hommage au duc  d'Auvergne. En 1507, Jacques II de Murol fait d'importants travaux au château. En 1559,  une petite fille de Jacques de  Murol porte le château par mariage a Jean de Montmorin-St-Hérem. \r\nCOUZE  En 1460, Jacques de Couze est seigneur du lieu et de Saint-Aignes. En 1491, Isabelle de Couze apporte la demeure par mariage à Antoine du Prat, bourgeois d'Issoire.  Le fief reste dans cette famille jusqu'à la fin du XVIIe  siècle.","architecture":"Château fort du Broc, château fort du XIIe siècle, sur le rebord d'un plateau basaltique dominant la vallée de l'Allier. Donjon-logis rectangulaire, de trois niveaux et demi, datant dans sa partie inférieure du XIIe siècle et dans la supérieure du XIIIe  siècle. Il conserve comme seule ouverture originelle une porte en tiers-point donnant sur la chapelle.  Au XVe siècle, il a été augmenté à un angle d'une tourelle carrée et  au XVIe siècle à l'autre angle (sur la même face), d'une tourelle  en quart de cercle. Logis du XVIe siècle avec fenêtres à modénatures. Au XIIIe siècle, on a adjoint  au logis-tour une enceinte polygonale sur plan centré flanquée de tours rondes, complétée au XIVe siècle   de tours carrées et plus tard de poivrières. La chemise a été percée de grandes baies lorsqu'en 1761 le château déjà en ruine, est acheté par des  propriétaires qui le lotissent en plusieurs habitations. Côté cour, une tourelle polygonale d'escalier avec une porte du  XVe siècle, s'élevant à l'angle intérieur de logis en équerre.  \r\nChâteau de Lavaur  Maison-forte médiévale ayant conservé sa silhouette primitive. Ce fief est connu début 1500. Edifice médiéval modifié au XVIIe siècle, décoré à la fin du XVIIIe siècle, remanié en 1898. L'ensemble  de toiles peintes, signées Moulianeuf, furent réalisées  vers 1782 d'après les dessins de Coypel et illustrent Don Quichotte de Cervantès. Le grand salon du 1er étage est également orné de papiers peints  marouflés sur toiles  tendues sur châssis. Ce modèle, acheté en 1782 à la manufacture de Réveillon,                                                                                       Manoir  de Couze construit au XVIe siècle,  Ce manoir est composé d'un  logis rectangulaire de deux niveaux et demi accosté d'une tour carrée d'angle. L'édifice a été augmenté d'un retour d'aile au XIXe siècle dans le prolongement de la tour.","habitants":"Famille de Pierre du Broc \r\n        \"","divers":"vestiges du château fort du Broc, de Lavaur et le manoir de Couze","gps":"","images":["../image/image_63/63_Broc_Couze_1.jpg","../image/image_63/63_Broc_Couze_2.jpg","../image/image_63/63_Broc_Couze_3.jpg","../image/image_63/63_Broc_Couze_4.jpg","../image/image_63/63_Broc_Couze_5.jpg","../image/image_63/63_Broc_Couze_6.jpg","../image/image_63/63_Broc_Couze_7.jpg","../image/image_63/63_Broc_Couze_8.jpg","../image/image_63/63_Broc_Couze_9.jpg"]},"Consult_chateau_formulaire764e":{"id":"Consult_chateau_formulaire764e","dept":"63","canton":"Billom","commune":"Bongheat","nom":"Brosselieres","type":"Château","periode":"XII-XIV","histoire":"Trois châteaux à Bongheat;  BROSSELIERES , peut-être édifié au XIIe ou au  XIIIe siècle aurait été au XIVe siècle la propriété de la famille Aycelin; c'est à cette époque probablement,  qu'a été aménagée la chapelle de la tour carrée (bâtie à l'époque romane) dont les murs sont décorés de peintures très endommagées ; au XVIIe ou XVIIIe siècle, la propriété est transformée en fief  des vestiges de bâtiments agricoles ; au XXe siècle, des travaux de restauration ont transformés la propriété en résidence secondaire : la tour nord-ouest est détruite en 1920, et  la tour carrée sud-est est restaurée dans les  années 1960 ; réaménagements divers après 1969. \r\nMAS  Fief du Mas connu dès le XIVe siècle, en 1317 appartient à Hugon Royrald du Mas; au XIVe siècle  partage, en deux co-seigneuries : celle de Jean Crespin et  celle de Marguerite Crespin.  SALLES Le château daterait de la première moitié du XVIe siècle, appartient en 1540 à Gilbert des Salles, chevalier, seigneur des salles et de la Frédière.","architecture":"Brosselières, tour carrée à trois niveaux ; voûte en berceau brisé à l'étage de soubassement ; voûtes d'ogives arrachées au  premier étage; toit en pavillon ; escalier extérieur droit, en pierre; logis principal en rez-de-chaussée sur étage de soubassement  toit en appentis ; tour ronde à un étage carré ; coupole en rez-de-chaussée ; toit conique escalier extérieur droit, en pierre.                         \r\n Mas le domaine est  actuellement une petite exploitation dont le logis à conservé des parties qui datent  du XIVe ou du XVe siècle:  tour d'angle avec vestiges   de meurtrières, fenêtre à meneau. La cheminée du premier étage est daté du XVIe siècle. Les dépendances agricoles   au nord de la cour et  une partie nord du logis figurant  sur le cadastre de 1834, peut  être antérieur au XIXe siècle; ajout d'un bâtiment agricole dans l'angle nord est de la propriété après 1834 Coupole de la tour d'angle ; voûte en berceau sur cave ; élévation à travées sur partie la plus  récente du logis ; cheminée au premier étage de la partie renaissance du logis.  Salles, la demeure a subie apparemment d'importantes transformations au XVIIe siècle et  au XVIIIe siècle, le linteau de porte de l'étable à chevaux  de l'aile est porte la date 1780, plusieurs  bâtiments agricoles ont été bâtis après 1834, en particulier les remises et étables à vaches situées au nord est.","habitants":"Famille Aycelin\r\n        \"","divers":"Château de Brosselières","gps":"","images":["../image/image_63/63_Brosselieres_1.jpg","../image/image_63/63_Brosselieres_2.jpg"]},"Consult_chateau_formulaire07ea":{"id":"Consult_chateau_formulaire07ea","dept":"63","canton":"Vic-le-Comte","commune":"Yronde-et-Buron","nom":"Buron_Sarlan","type":"Vestiges","periode":"XIII-XIV","histoire":"BURON, Le château de Buron a été construit au sommet d'une butte rocheuse. Il faisait partie du plan du territoire que Philippe Auguste avait consenti à laisser aux fougueux seigneurs locaux et centré sur le bourg de Vic-le-Comte, le château fut détruit par un immense incendie  au XIIIe siècle, la légende veut qu'un jour le seigneur du lieu, un brigand de la pire espèce surnommé Le Garou,  attaqua le monastère  du village, massacrant tous les moines, pillant  leurs richesses. Auteur d'une orgie dans le   lieu saint, un violent orage éclata, un incendie réduisit  le château en cendre, le seigneur et ses soudards prirent la fuite. La forteresse ne fut jamais rebâtie et le Garou disparut à jamais.                               SARLAN,  en 1321  est cité le chevalier Baudoin d'Auvergne que l'on suppose être un fils naturel du comte.  Il possède    le  fief de Sarlant détaché du domaine comtal sur lequel s'élève un manoir. En 1450, Antoine Ier de Sarlant figure  dans l'armorial de Revel. En 1462, Morinot   de Sarlant, écuyer. En 1463, la propriété  est à Pierre de Sarlant, seigneur de Condat et de Fonterépou en partie. En 1535, le baron Antoine II de Sarlant  entre au service du roi;  il jouit par la suite de la faveur de Catherine de Médicis.  En 1550 il est nommé gouverneur  du comté et  de la ville de Clermont. A sa mort  en 1586, l'héritage passe à sa fille Claudia, mariée   depuis 1557  avec Jacques d'Oradour, chevalier, seigneur de St-Gervazy, Unsac, Segonzal, Bethel, Montcellet, les Martinanches  et Boisse.  En 1588, Jacques d'Oradour, chevalier,  seigneur et baron de Buron, Sarlant, Saint Gervazy,  Authezat, se  remarie avec Magdelaine du Bost. Marie de Bosredon,  veuve de Charles Gilbert d'Oradour, habite le château avec ses enfants en 1766.","architecture":"Buron de son pic basaltique domine la paysage de la commune d'Yronde et Buron. Construit au IXe siècle, il fut embelli et agrandi à la fin du XIIIe siècle. A l'origine Buron était composé d'un grand corps de logis, de deux enceintes  flanquées de quatre puissantes tours rondes  C'était un vaste corps de logis doté de quatre tours d'angle, avec un renforcement au nord où la défense naturelle du plateau rocheux présentait une faiblesse. Le tout était défendu par une double enceinte fortifiée. On ajouta vers l'an 1650 une habitation contre la courtine car la citadelle, bien qu'ayant été épargnée par Richelieu, commençait à perdre de son efficacité.   Château de Sarlan, qui remonte au XIIIe siècle domine le village et constitue un élément important. Flanqué de quatre tours rondes, il était entouré de deux enceintes fortifiées, la tour de langle sud-est renfermait la chambre des tortures.   Château édifié en 1472, enceinte   quadrangulaire avec   deux flanquements circulaires et un carré d'angle: un donjon quadrangulaire pourvu d'un avant-corps occupe le quatrième angle.   Le logis jadis à deux étages a été abaissé d'un niveau et un nouveau couronnement a été réalisé après 1830.","habitants":"Famille de Morinot de Sarlant\r\n        \"","divers":"Château de Buron  et de Sarlan","gps":"","images":["../image/image_63/63_Buron_Sarlan_1.jpg","../image/image_63/63_Buron_Sarlan_2.jpg","../image/image_63/63_Buron_Sarlan_3.jpg","../image/image_63/63_Buron_Sarlan_4.jpg","../image/image_63/63_Buron_Sarlan_5.jpg","../image/image_63/63_Buron_Sarlan_6.jpg","../image/image_63/63_Buron_Sarlan_7.jpg","../image/image_63/63_Buron_Sarlan_8.jpg","../image/image_63/63_Buron_Sarlan_9.jpg"]},"Consult_chateau_formulaire4802":{"id":"Consult_chateau_formulaire4802","dept":"63","canton":"Vic-le-Comte","commune":"Busséol","nom":"Busseol","type":"Vestiges","periode":"XII","histoire":"BUSSEOL, en 1170, fief de  Guillaume VIII comte d'Auvergne et vassal du roi d'Angleterre fait construire une fortification. Le château-fort appartint successivement, dès l'origine, aux comtes d'Auvergne, le Pape Alexandre III, Jean Stuart Prince d'Écosse, Blanche de Clermont petite-fille de St-Louis.  En 1229 Guillaume X fils de Guy II, obtient du roi Louis IX une partie de ses biens, dont la seigneurie de Busséol. En 1332 à la mort de son père, Guillaume II, Jeanne de Bouilogne devient comtesse d'Auvergne et dame de Busséol. Veuve de Philippe de Bourgogne, elle épouse en 1350 Jean, duc de Normandie futur roi de France \"Jean II le Bon\" le fief devient possession de la reine de France. En 1399 Jeanne II d'Auvergne épouse de Georges de la Trémoille. Busséol comme le comté d'Auvergne passe à la famille de la Tour. Jean Stuart, duc d'Albany époux d'Anne de la Tour y fera de nombreux séjours, à sa mort Catherine de Médicis hérite, comtesse d'Auvergne qui y séjourna avec son fils Charles IX en 1566 lors de son voyage en Auvergne. La reine Margot Marguerite de Valois héritière, releva du domaine royal. Il est ainsi considéré comme le plus historique de la province,  en 1589 le château subit des attaques des ligueurs, il est ensuite l'objet de dispute entre Charles d'Angoulême et la reine Margot qui l'offre  à Louis XIII en 1605. En 1654 Louis XIV vend le château à Gilbert Simon de Frèdeville et l'érige en comté, le château fut habité jusqu'à la  Révolution . En 1880  la famille de Vichy héritière des Mascon qui le possédait avant sa vente comme bien national, le cédèrent à des cultivateurs locaux qui le négligèrent. En 1970, les propriétaires actuels la famille Houlier l'ont transformé  en demeure habitable.","architecture":"Busséol se présente en masse primitive sur un rocher volcanique dominant la Limagne à 650 mètres d'altitude, exemple d'architecture militaire romane en Auvergne, a conservé son donjon roman. Cette construction du XIIe siècle a été oubliée des architectes après le XIVe siècle. il se compose d'une enceinte , cantonnée à deux de ses angles d'un donjon cylindrique et d'une tour de guet crénelée, à l'intérieur de la cour logis seigneurial et des bâtiments de dépendances,  Il a été remanié, consolidé, restauré et même remonté.   La courtine ensoleillée est très instructive, elle ne comporte aucune fente de tir, ni archère, ni bouche à feu. La courtine possède de belles fenêtres romanes et au sommet les ouvertures rectangulaires correspondent à l'ancien chemin de ronde. Au début du XVIIe siècle, Richelieu fait araser ou ordonne la destruction de nombreux châteaux fortifiés. Curieusement, Busséol échappe à ce \"massacre\" du patrimoine. Vers 1792, les habitants du château fuient devant les révolutionnaires.","habitants":"La reine Margot Marguerite de Valois \r\n        \"","divers":"Forteresse de Busséol","gps":"","images":["../image/image_63/63_Busseol_1.jpg","../image/image_63/63_Busseol_2.jpg","../image/image_63/63_Busseol_3.jpg","../image/image_63/63_Busseol_4.jpg","../image/image_63/63_Busseol_5.jpg","../image/image_63/63_Busseol_6.jpg","../image/image_63/63_Busseol_7.jpg","../image/image_63/63_Busseol_8.jpg"]},"Consult_chateau_formulaire4e47":{"id":"Consult_chateau_formulaire4e47","dept":"63","canton":"Aigueperse","commune":"Thuret","nom":"Caniere_Thuret","type":"Château","periode":"XIII-XX","histoire":"Deux château à Thuret;                                                 \r\nCANIERE  dans l'ancien château le  banquier John Law, qui y séjourna dix mois en 1720  fut adjugé en 1728 à Honoré Bérard,  Son fils seigneur de Chazelles et de la Canière, se marie en 1772 à Jacquette de Champflour. Se succèdent ensuite   Etienne Bérard de Chazelles, Pierre Léon, Pierre-Marie-Etienne qui épouse Marie de Berthier, et Marie-Madeleine morte en déportation en 1945, le nouveau château fut construit en 1889 par la famille Bérard de Chazelles pour abriter les collections du  savant chimiste français Antoine Lavoisier. Membre de lAcadémie des sciences, Antoine-Laurent Lavoisier (17431794) est considéré comme le père de la chimie moderne. Il fut guillotiné à Paris lors de la Terreur, le 8 mai 1794, et tous ses biens furent récupérés et conservés par son épouse Marie-Anne Pierrette Paulze (1758-1836). Le frère de madame Lavoisier, Joseph Paulze d'Ivoy (1755-guillotiné en 1793), avait deux enfants : Jean, qui fut conseiller d'état et préfet, et Hélène, qui épousa Marie Gabriel Vital Ramey de Sugny. L'une de leurs filles, Gabrielle, épousa en 1834 Pierre-Léon Bérard de Chazelles (1804-1876), député du Puy-de-Dôme et maire de Clermont-Ferrand, et apporta à cette famille les souvenirs de Lavoisier.  La famille de Chazelles, originaire dAigueperse, est restée propriétaire des terres pendant deux siècles. La dernière du nom, Magdeleine Bérard de Chazelles (18841944) a été infirmière au front lors de la première guerre mondiale. Elle fit partie dun réseau de la Résistance lors de la seconde guerre mondiale. Elle abrita des aviateurs anglais. Dénoncée, elle fut arrêtée par la Gestapo en 1943 et fut déportée au camp de Ravensbrück où elle mourut en 1944. Aujourd'hui transformé en hôtel restaurant.                        THURET, le premier château qui se tenait sur la \"motte de châtel Veyl\" fut rasé au XIIIe siècle. Au Moyen-Age, Thuret est rapidement devenu le siège d'une viguerie d'après un acte de Pépin II d'Aquitaine édité en 848, ce qui en faisait un village assez important.","architecture":"château de la Canière,se dresse au sommet des vertes collines et des forêts de Thuret. Le fief, démembré du marquisat dEffiat après la faillite eu le financier Law.  Construit, certainement à la place dun château plus ancien, en 1888, en belle pierre blanche de Chaptuzat, par Étienne, le château récemment restauré, abrite aujourdhui un restaurant et hôtel de charme demeure de la fin du XIXe siècle,   se dressait une demeure de trois niveaux, de forme rectangulaire avec deux avant-corps surmontés de frontons. Ce bâtiment datant de 1808 a été imaginé par larchitecte Pierre Rousseau, qui a réalisé nombre dédifices à Clermont-Ferrand. Des traces dautres constructions remontant au XVe siècle montrent également la présence dun château plus ancien.  En 1925, les uvres de Lavoisier conservées au château ont été dispersées dans différents musées, dont le Musée Lecoq à Clermont-Ferrand et le conservatoire national des arts et métiers à Paris. Le célèbre tableau des époux Lavoisier de David est aujourdhui conservé au métropolitain muséum of art à New York.                                  Lactuel château de Thuret est bâti sur une large butte qui domine le village. Le bâtiment le plus ancien, à lécart, est un haut donjon quasi circulaire en pierre, du XIIIe ou XIVe siècle. De la rue de la Garenne on voit un portail en cintre du XVIIIe siècle qui donne accès à une cour carrée, entourée de bâtiments d'époques différentes. Face à lentrée existe un corps de logis principal du XVIe siècle avec de chaque côté une grosse tour. Des agrandissements et transformations ont lieu aux XVIIe siècle et au XVIIIe siècle. Le bâtiment de droite serait construit sur danciennes cryptes néolithiques.","habitants":"Famille d'Antoine Laurent Lavoisier \r\n        \"","divers":"Château de Canière et de Thuret","gps":"","images":["../image/image_63/63_Caniere_Thuret_1.jpg","../image/image_63/63_Caniere_Thuret_2.jpg","../image/image_63/63_Caniere_Thuret_3.jpg","../image/image_63/63_Caniere_Thuret_4.jpg","../image/image_63/63_Caniere_Thuret_5.jpg","../image/image_63/63_Caniere_Thuret_6.jpg","../image/image_63/63_Caniere_Thuret_7.jpg","../image/image_63/63_Caniere_Thuret_8.jpg"]},"Consult_chateau_formulaireb741":{"id":"Consult_chateau_formulaireb741","dept":"63","canton":"Gerzat","commune":"Cebazat","nom":"Cebazat","type":"Château","periode":"XV-XVIII","histoire":"Trois châteaux à CEBAZAT,  le  château de La MALLAREE, en 1301, Jean de La Garde, chevalier, fait aveu pour son fief de La Mallarée.  La seigneurie reste dans sa   famille jusqu'à Jacques de La Garde, mort après 1477 sans postérité. Avant 1525, Gabriel de Langeac, chevalier,   seigneur de La Mallarée.  Sa soeur Antoinette fait passer le château par mariage à Jacques d'Aubusson,  chevalier,  seigneur de Banson, dont la famille le garde jusqu'en 1725.                                                                              \r\n     PRADE. uvre de la famille Pyrent de la Prade, cette construction date de la fin du XIXe siècle. Vers 1920, le docteur Castaigne en devient propriétaire et le restera jusquà la libération, ensuite le domaine est cédé à la Société Richard et Poinas. Dans les années soixante-dix, la demeure et ses dépendances sont vendues à gaz de France. De nouvelles constructions voient alors le jour et ce site devient un centre de formation (salles, restauration et hébergement) pour les cadres dEDF et GDF. En 2006, la municipalité décide de se porter acquéreur de ce bien patrimonial, fermé depuis 2003, la commune l'acquit, en juin 2007.\r\n BLANZAT,  on trouve la trace de seigneurs de Blanzat au XIIIe siècle. Le village appartient jusqu'en 1614 à la famille de Cébazat, qui le vend alors à Blain le Loup, seigneur de Préchonnet, à Bourg-Lastic. En 1640, des créanciers saisissent le village, et il est racheté par Jacques Tuboeuf, président à la chambre des comptes de Paris. La famille Tuboeuf revendra finalement Blanzat en 1788 à Jean Alexis de la Salle de Chaynat.","architecture":"Cébazat, Cette tour est la seule qui reste des quatre tours qui cernaient la ville au XVe siècle. Elle a été reconstruite en 1754.     Le château construit au XIIIe siècle dans Cébazat, à 250 m de l'église, rue des Fossés,  au bord de l'ancien tracé des remparts, possède un donjon-logis  de trois niveaux du XIIIe ou  début du XIVe siècle. Il a été intégré dans un logis   en équerre, remanié au XVIIe siècle qui borde une enceinte quadrangulaire  non flanquée. On pénètre dans celle-ci par une porte-tour pentagonale de plan carré avec un pan coupé, surmontée d'une tour de guet au  dessus de la rive du toit au XIXe siècle. Blanzat Construite au XVIIIe siècle par l'architecte Attiret, cette demeure d'aspect composite a été remaniée au siècle suivant par l'adjonction d'un comble à la française  qui lui donne une allure de château XVIIe siècle. Les façades conservent leur ordonnance de l'époque néo-classique. Jardin avec orangerie et allées sinueuses dans  le goût anglais. Les décors intérieurs correspondent à l'époque de construction ou de remaniement. Eléments protégés MH : château, et les pièces suivantes avec leur décor : escalier, chambre à alcôve, salle de  bains et  ses installations, salon à plafond peint, grand salon lambrissé à plafond à caissons.                                            \r\n Prade  à deux kilomètres à  l'ouest,  lexistence du site de Blanzat est très ancienne est attesté jusqu'en 1686. En 1888, des fouilles attestent la présence de premiers habitants à lépoque magdalénienne, de nombreux outils en silex taillé, des restes d'un foyer, un bois de cerf travaillé sont découvert,  corps de logis rectangulaire  à trois niveaux flanqué de chaque côté de pavillons différents saillants dont un avec angles en arrondie avec toitures à la Mansart et attiques.","habitants":"Famille de Jacques de La Garde                                                      Famille Pyrent de la Prade                                                             Famille de Cébazat \r\n        \"","divers":"Vestiges du château de Cébazat, château de Blanzat et de Prade.","gps":"","images":["../image/image_63/63_Cebazat_1.jpg","../image/image_63/63_Cebazat_2.jpg","../image/image_63/63_Cebazat_3.jpg","../image/image_63/63_Cebazat_4.jpg"]},"Consult_chateau_formulaire6194":{"id":"Consult_chateau_formulaire6194","dept":"63","canton":"Chateldon","commune":"Paslière","nom":"Chabanne","type":"Château","periode":"XVI-XIX","histoire":"CHABANNE, château de Chabanne (début du XIXe siècle). Bâti vers 1830 par Christophe de Chabrol de Crouzol qui y mourut en 1836. Le château passa à son second fils, le vicomte Victor, mort en 1867 sans enfant. Le château passa à sa sur Anne Clémence, dite madame Marcellin de Pommereau, morte en 1870. Celle-ci le transmit à son fils Maurice qui, en 1872, transforma l'habitation en lui donnant son aspect actuel.\r\nCHASTEL, le fief du Chastel est signalé en 1512, il est acheté au XVIIe siècle par la famille Androdias.  Le château reste leur propriété jusqu'au XIXe siècle.","architecture":"Chabanne, Un premier château du XVIIIe siècle menace ruiné en 1796 ; le deuxième  a probablement été reconstruit entre 1796 et 1835, le plan masse actuel est le même que celui qui figure sur le cadastre de 1835,  mais le château semble différent des descriptions de la fin du XVIIIe siècle, les dépendances actuelles: écuries,  remise, logement de domestiques, porcheries datent de la reconstruction du château première moitié du XIXe siècle. Le premier château se composait de 2 corps de bâtiments en L, bâtis en moellons et coiffés  de tuiles creusés et plates; les dépendances comprenaient: buanderie, cuvage, 2 étables, colombier, grange, écuries, le tout  en pisé recouvert de tuiles creusés d'ormeaux et tilleuls                                             \r\nChâteau du Chastel, deuxième moitié du XIXe siècle.  le château et les communs sont reconstruits après 1835, la porte de la remise est daté de 1692; la fontaine date de 1809. L'édifice se compose d'un étage carré et un étage de comble, gros-oeuvre: granite, enduit, brique et moellon, élévation à travées, surmontée de toit à longs pans, croupe et toit conique, recouverts de tuiles plates et tuiles creuses","habitants":"Famille de Christophe de Chabrol de Crouzol \r\n        \r\n        \"","divers":"Château de Chabanne","gps":"","images":["../image/image_63/63_Chabanne_1.jpg"]},"Consult_chateau_formulairee378":{"id":"Consult_chateau_formulairee378","dept":"63","canton":"Vic-le-Comte","commune":"Mirefleurs","nom":"Chalendrat","type":"Château","periode":"XIX","histoire":"CHALENDRAT, ou vécut le compositeur George Onslow (1784-1853). juillet 1784 : naissance à Clermont-Ferrand. George est le premier fils d'Edward Onslow (1758-1829) et de Marie-Rosalie de Bourdeilles (1761-1842) qui auront trois autres fils: Maurice, Arthur et Auguste, en 1789 : Edward Onslow achète le château de Chalendrat et sy installe avec sa famille. En 1808, au mois de juillet, George épouse Charlotte-Françoise-Delphine de Fontanges (1790-1879). En 1839 : Après avoir perdu son procès contre ses frères, George doit se séparer du château de Chalendrat et commence la construction du château de Bellerive à Perignat sur Allier, aujourd'hui restaurant.  Sa ressemblance avec le château de Clandon park, propriété des Onslow en Angleterre, est saisissante. L'histoire de ce château, à l'époque où il était habité par la famille Onslow, est relatée et illustrée dans l'ouvrage de Baudime Jam intitulé \"George Onslow et l'Auvergne\". Située sur la place Jean DOMAT, cette maison a appartenu à Jean Domat (1625-1696), juris-consulte Auvergnat, ami de Blaise Pascal et avocat du roi Louis XIV au présidial de Clermont.                                            Château de Chalendrat, centre de vacances du CCAS d'EDF GDF (sur les hauteurs en direction de Busséol).","architecture":"Château de Chalendrat, sur les hauteurs en direction de Busséol,  Mirefleurs était fortifié,  et il reste  quelques vestiges des anciennes murailles.  La maison Domat située dans le bourg, daterait du XVe siècle avec des travaux aux XVIIe siècle et XVIIIe siècle, elle a été construite fin du XVe siècle début du XVIe siècle et remanié au cours des siècles, on peut y admirer des fenêtres à meneaux et, à l'arrière, une tour ronde. La maison est inscrite comme monument historique par arrêté du 7 novembre 2000 et tout particulièrement les pièces intérieures avec leurs décors. Le cabinet circulaire situé en haut de la tourelle d'escalier est orné de 225 graffitis, des dessins tracés à l'ocre rouge ou à la mine de plomb dont plusieurs sont des portraits, des caricatures, dont trois pourraient représenter Pascal. Cet immeuble est privé et mis à disposition de l'association ARAFA (Association pour la Recherche sur l'Age de Fer en Auvergne).","habitants":"compositeur George Onslow\r\n        \"","divers":"Château à chalendrat, le Mirefleurs, la maison de Domat. Et de Bellerive","gps":"","images":["../image/image_63/63_Chalendrat_1.jpg","../image/image_63/63_Chalendrat_2.jpg","../image/image_63/63_Chalendrat_3.jpg","../image/image_63/63_Chalendrat_4.jpg","../image/image_63/63_Chalendrat_5.jpg","../image/image_63/63_Chalendrat_6.jpg","../image/image_63/63_Chalendrat_7.jpg"]},"Consult_chateau_formulaire994f":{"id":"Consult_chateau_formulaire994f","dept":"63","canton":"St-Germain-Lembron","commune":"Boudes","nom":"Chalus_Boudes","type":"Vestiges","periode":"XII-XIII","histoire":"CHALUS , cité au Xe siècle, une fortification Carolingienne existait déjà.  Au  début du XIe siècle, un château est attesté. Vers 1060, un des fils du seigneur de Châlus entre au monastère de Sauxilange.  Au début  du XIIIe siècle, le seigneur de Châlus rend hommage au dauphin d'Auvergne.                                               CHALUS-BOUDES, vers 1200, le donjon est dressé par les seigneurs de Châlus.  En 1290,  à la mort d'Hugues de  Châlus, Sansac et Boudes sont partagées entre ses 4 enfants. Vers 1335, les fiefs de Châlus et Boudes sont de nouveau réunis. En 1376 et en 1408,  un conflit oppose Hugues de Châlus et Béraud III Dauphin d'Auvergne, Hugues est seigneur de Châlus et de Boudes. Vers  1430, Géraud en est seigneur. Au XVIe siècle,  Gabrielle de Châlus porte Boudes par mariage à Thomas du Prat, écuyer et juge d'Issoire,  mort en 1540. Pierre de Douhet, sieur de Marlat,  épouse Maximilienne  Gasparde du Prat, dame de Boudes.  En 1669 est cité François de Douhet, chevalier, seigneur,  baron de Boudes.  En 1670,  les Douhet sont seigneurs de Marlat Tour, Esteaux et Boudes. En 1674 Nicolas de Villers achète Chalus et en 1689 François de Douhet, chevalier,  mousquetaire noir, est seigneur de Boudes, Peuchaud et La Tourrette. et, après quelques tribulations, David Dufour devient propriétaire. En 1802, le château est acheté par Charbon du Ranquet.  A la fin du XXe siècle, la découverte du site est libre à l'extérieur. Le château est une propriété privée non visitable. Au début du XXIe siècle, le château s'ouvre au public. propriété de monsieur Jean Nuger.","architecture":"Boudes, château-fort construit au XIIe ou au début  du XIIIe siècle. C'est un donjon-logis carré de quatre niveaux communiquant par un escalier rampant épargné. La partie haute, débordant de l'enceinte visible de l'extérieur, est plus soignée que la partie basse. Les chaînes d'angle et l'encadrement de la porte sont en pierres de taille   bien ajustées. La porte d'entrée s'ouvre   dans la façade sud, au premier niveau. La cheminée\r\n d'angle à foyer circulaire, qui se trouvait au 2e niveau a été achetée par le propriétaire du château de Busséol. \r\nChalus,  conservant de très rares témoignages d'aménagements intérieurs civils d'époque: ordonnance de la salle polygonale du corps de logis central, cheminée du donjon et peintures murales du logis sud. Le château occupait autrefois l'ensemble d'une butte  commandant la vallée de l'Allier et le bassin du Lembron. Il fut divisé en 2 châteaux et il ne reste aujourd'hui, comme témoin homogène de l'époque médiévale, que la partie antérieure qui défendait l'accès à l'éperon.  Ces vestiges sont dominés par un donjon cylindrique construit vers 1300, sur lequel différents corps de logis se sont greffés au XIVe et au XVe siècle. A l'intérieur,  chaque étage comporte une salle voûtée en coupole. 2 corps de logis s'articulent au pied du donjon. Le corps de logis sud présente une salle polygonale dite salle du conseil, chaque pan  est garni d'un arc de décharge brisé reçu sur colonnettes engagées par l'intermédiaire de chapiteaux.","habitants":"Seigneur Hugues de Châlus\r\n        \"","divers":"Château-fort de Chalus-Boudes","gps":"","images":["../image/image_63/63_Chalus_Boudes_1.jpg","../image/image_63/63_Chalus_Boudes_2.jpg","../image/image_63/63_Chalus_Boudes_3.jpg","../image/image_63/63_Chalus_Boudes_4.jpg","../image/image_63/63_Chalus_Boudes_5.jpg","../image/image_63/63_Chalus_Boudes_6.jpg","../image/image_63/63_Chalus_Boudes_7.jpg","../image/image_63/63_Chalus_Boudes_8.jpg","../image/image_63/63_Chalus_Boudes_9.jpg"]},"Consult_chateau_formulaireca31":{"id":"Consult_chateau_formulaireca31","dept":"63","canton":"Chamalières","commune":"Chamalières","nom":"Chamalieres","type":"Château","periode":"XV-XVI","histoire":"CHAMALIERES, Vestiges et quatre châteaux dans la commune.                   BEAULIEU, magnifique manoir fut construit en 1587.                           SAULCES, avant 1500 est cité le domaine de las Salsas (salices). En 1556, le château est à Gilbert Assolent qui, par la suite, acquiert aussi  Beaulieu. Vers 1598, le château est à Jean de Combelles, seigneur de Beaulieu. Vers 1610, il passe par achat à Antolne Vachier, trésorier de France à Riom. En 1631, il appartient à Michel Laville, conseiller à la Cour des Aides. En 1653, sa fille l'apporte à François Pellissier de Féligonde, conseiller au Présidial de Clermont. Leurs descendants étaient encore les propriétaires en 1789. Le château était autrefois fortifié avec créneaux et pont-levis mais ces fortifications furent démolies en 1713. Il est  aujourdhui propriété privée.  \r\nROCHE, en 1524, Martin Larges fait aveu du fief de La Roche à Jean-Jacques.                                                                  MONTJOLI, aujourd'hui hôtel de ville,  château mentionné dés le milieu du XVIe siècle, cest au chanoine Michel Girard de La Bâtisse, propriétaire en 1751 de Montjoli que lon doit le bâtiment tel que nous le connaissons aujourdhui. Sous le Second Empire, la famille  Marpon, nouveau propriétaire y accueille le duc de Morny et le  Prince Impérial, fils de Napoléon III à plusieurs reprises.\r\nSAINT-VICTOR :  château au lieu dit connu depuis le Xe siècle, il sagissait dun domaine géré par un château comprenant église et dépendances dont un moulin à papier.","architecture":"Chamalières,  murs des Sarrazins, il est le reste d'un donjon carré du XIe siècle de 16 mètres de côté  construit en un petit appareil assez irrégulier avec chaînages d'Angles et un chaînage horizontal de blocs  d'arkose épais de 1,80 mètre à la base.                    Beaulieu,  manoir du XVIe siècle, il se présente sous la forme dun bâtiment rectangulaire sur  deux niveaux, avec une tour polygonale en saillie sur la façade. Cette propriété répertoriée en 1942 est aujourdhui une demeure privée. siècle composé de deux tours carrées formant avant-corps, reliées au corps principal par des murs auxquels s'appuient des escaliers menant aux étages des tours, formant cour intérieure. Des douves  en partie comblées entouraient le manoir. L'intérieur entièrement sous voûte, est décoré en style Louis XIII, la  salle-à-manger est ornée  de peintures.                                                                                    Saulces, le Château était autrefois fortifié avec créneaux et pont-levis mais ces fortifications furent démolies en 1713. Cest  lun des domaines qui a structuré  le territoire chamaliérois  avant la révolution industrielle.  Le domaine est une vaste  propriété seigneuriale qui fut également un moulin à papier; deux édifices longeant la Tiretaine sont dédiés à cette   activité. Enceinte quadrangulaire à flanquements circulaires d'angle. Un angle est occupé par un donjon carré.\r\nSt-Victor, en 1835, un terrible orage provoqua une crue centennale de la Tiretaine causant dirréparables dégâts. Il fut reconstruit quelques années après lui  donnant son allure actuelle.","habitants":"aux seigneurs locaux et à Michel Laville pour la Saulces.                      Famille  Marpon\r\n        \"","divers":"Château de Chamalières, de Beaulieu, de la Saulces, de la Roche, Montjoli et de Saint-Victor","gps":"","images":["../image/image_63/63_Chamalieres_1.jpg","../image/image_63/63_Chamalieres_2.jpg","../image/image_63/63_Chamalieres_3.jpg","../image/image_63/63_Chamalieres_4.jpg","../image/image_63/63_Chamalieres_5.jpg","../image/image_63/63_Chamalieres_6.jpg","../image/image_63/63_Chamalieres_7.jpg"]},"Consult_chateau_formulaire972c":{"id":"Consult_chateau_formulaire972c","dept":"63","canton":"Sauxillanges","commune":"Chaméane","nom":"Chameane","type":"Maison forte","periode":"XIV","histoire":"CHAMEANE, fort  mentionné  en 995. Au XIVe siècle, la seigneurie appartient pour moitié à la Chaise-Dieu dont les abbés achètent l'ensemble des droits et dépendances seigneuriaux en 1336.  Au XIXe siècle, sont effectués des travaux de modernisation  pour y introduire le confort de l'époque. En 1880, Mathilde Ruinart, comtesse de la Tour, y apporte des améliorations pour y tenir son salon d'été. Les Allemands, en 1944, dynamitèrent le donjon et incendièrent le reste des bâtiments qui brûlèrent avec les archives.                                                                              A quelques kilomètres  au sud-ouest à Saint-Etienne sur Usson le château de la Forie  XVe, XVIIIe et XIXe siècles.","architecture":"Chaméane  constituait pour l'abbaye  un poste avancé   qui surveillait l'accès occidental  de la seigneurie. Au XVIe siècle, la maison forte reçut son apparence définitive avec fenêtres à meneaux, escalier droit, plafonds à caissons, peut être  les fausses bretèches qui lui donnent un aspect militaire. Vestige et maison forte  du XIVe siècle occupait,  avec l'église,  tout le centre du village.  Il est encore partiellement entouré d'une enceinte fortifiée flanquée de tours rondes. Une porte charretière doublée d'une porte piétonne perce cette enceinte.  Le château se compose d'un corps de logis allongé et central portant à l'ouest la façade principale. L'angle sud ouest était flanqué d'un donjon qui contenait un escalier à volées droites, la façade sud est prolongée à l'est par une autre tour rectangulaire hors oeuvre. La tour angulaire des archives flanque l'angle nord ouest du logis tandis qu'une autre tour lui fait  pendant à l'angle nord est. De la façade ouest ne reste   qu'une travée composée d'une porte plein cintre   menant aux anciennes caves, et surmontée de trois grandes fenêtres.   La porte d'entrée introduisait à la salle d'armes dont il ne subsiste plus que la cheminée. Le parc fut planté d'essences rares, l'enceinte couronnée de créneaux  et de merlons et dotée à l'entrée d'une  bretèche, des toits en poivrières à pans coupés de tuiles plates lui donnèrent sa silhouette.                                                                  Château de la Forie, corps de logis quadrangulaire à deux niveaux et attiques toit en croupes flanquées en angles d'un donjon carré et de tours rondes à l'opposé et sur l'arrière du château, toitures en poivrières.","habitants":"Famille de Mathilde Ruinart, comtesse de la Tour\r\n        \"","divers":"Vestiges du château de Chaméane et de la Faurie","gps":"","images":["../image/image_63/63_Chameane_1.jpg","../image/image_63/63_Chameane_2.jpg","../image/image_63/63_Chameane_3.jpg","../image/image_63/63_Chameane_4.jpg","../image/image_63/63_Chameane_5.jpg","../image/image_63/63_Chameane_6.jpg","../image/image_63/63_Chameane_7.jpg"]},"Consult_chateau_formulairea919":{"id":"Consult_chateau_formulairea919","dept":"63","canton":"Aigueperse","commune":"Vensat","nom":"Chancel_Vensat","type":"Château","periode":"XV-XVI","histoire":"Plusieurs châteaux dans la commune de Vinsat;                            CHANCEL, ce domaine faisait partie des quatre baronnies du château de Villemont.  Les seigneurs de Chouvigny de Blot furent pendant longtemps propriétaires du territoire de la commune  avec siège au château du Chancel et ont laissés leurs armoiries, des  lions, dans celles du village. Charles du Broc du Chancel est mentionné pour la première fois   en 1561. Cest lui qui est responsable de la plupart des transformations du domaine pour lexploitation du vignoble.  En 1740 ladministrateur de  lensemble des terres du  marquis de Villemont habite au Chancel. Après la Révolution Française, le château ne fut  plus que le siège de plusieurs familles importantes de la région. Actuellement,  il appartient à la famille Weiss qui a su conserver, grâce à une tradition agricole de plus de 500 ans, aujourd'hui gîtes de France.\r\nLAFONT,  en 1591, le château fût surpris par le capitaine Ligueur Chanot et reprit par les habitants d'Aigueperse. En 1746,  appartenait au Marquisat de Villemont. Terres acquises par le sieur D'Arbouze qui possédait  le château de Villemont ,  et, cinq autres gros domaines dont celui de Lafont.  Des fenêtres du château, le sieur Villemont pouvait apercevoir toutes ces propriétés dont il cultivait les terres.  En 1772, le comte de Brion rachète  le château de Lafont. Il est revendu en 1848 et à ceci se succède plusieurs ventes au fil des ans.                                                                MARAICHERE  Le domaine se compose de deux ensembles, une ferme très ancienne, dite la Maraîchère. Cette ferme en L comprend une partie habitation.                                                    USSEL,  Véritable villégiature à la campagne, cette propriété semble voir le jour dans la deuxième moitié du XIXe siècle, grâce à la fortune d'un avocat éclairé qui connaissait les jardins.     Dans la commune la villa Lieu-Choisy.","architecture":"Chancel, des parties de bâtiment comme la tour qui remonte au XIIIe siècle et dautres restes témoignent dune occupation.  Chapelle, cet édifice de plan allongé comporte une toiture à deux fortes pentes animée de lucarnes Renaissance. Il est encadré de deux tours d'époque médiévale mais très remaniée: celle de gauche est une tour carrée avec  une toiture à croupes, celle de droite est ronde avec un toit conique. Le bâtiment conserve quelques vestiges  architecturaux  d'époque Renaissance mais a également subi des modifications  pas très heureuses en 1855 dans un faux style médiéval.                                                                  Le domaine de Maraîchère  se compose de deux ensembles : une ferme très ancienne, cette ferme en L comprend une partie habitation, un pigeonnier sur base carrée, et des bâtiments agricoles et une grosse maison  bourgeoise aux allures de château \"dite Maison neuve\" construite à la fin du XIXe siècle  présente un certain emprunt néogothique. Devant le château, c'est un jardin à l'anglaise qui fût très recherché.                                                      Ussel, nous avons à faire à une construction savante  entre: un château et son parc, un parc et son environnement. Ce jardin se constitue  sur une structure  tournante  mêlant les  effets d'irrégularité  du site et de contraste de  clair   obscure,  on retrouve dispersé des grottes qui correspondent à ce que Buffon appelait les \"époques de nature\"  un mausolée parsemé de référents aux législateurs antiques, la glacière, le pavillon religieux, le belvédère.","habitants":"Famille de Charles du Broc du Chancel\r\n        \"","divers":"Château de Chancel, de Lafont, d'Ussel, le domaine de la Maraichère et la villa du Lieu-Choisy.","gps":"","images":["../image/image_63/63_Chancel_Vensat_1.jpg","../image/image_63/63_Chancel_Vensat_2.jpg","../image/image_63/63_Chancel_Vensat_3.jpg","../image/image_63/63_Chancel_Vensat_4.jpg","../image/image_63/63_Chancel_Vensat_5.jpg","../image/image_63/63_Chancel_Vensat_6.jpg","../image/image_63/63_Chancel_Vensat_7.jpg","../image/image_63/63_Chancel_Vensat_8.jpg","../image/image_63/63_Chancel_Vensat_9.jpg"]},"Consult_chateau_formulaire41de":{"id":"Consult_chateau_formulaire41de","dept":"63","canton":"St-Amant-Tallende","commune":"Chanonat","nom":"Chanonat","type":"Commanderie","periode":"XII","histoire":"CHANONAT, vers la fin du XIIe siècle, les templiers et les hospitaliers se sont implantés en Auvergne. Ces moines soldats avaient pour mission de défendre les lieux saints, de protéger et de soigner les pèlerins et d'assurer une infrastructure destinée à alimenter les croisades en hommes et en argent. Les actes de fondation de diverses commanderies auvergnates ont disparu et de ce fait, il règne de nombreuses incertitudes sur l'appartenance à l'ordre du Temple ou à l'ordre de l'Hôpital de telle ou telle commanderie à son origine. Certaines de ces commanderies ont été attribuées aux templiers plus par tradition populaire que sur la base de preuves historiques. En 1293, Jean de Trie, bailli d'Auvergne, donne le nom de 25 commanderies de l'ordre de Saint-Jean de Jérusalem du diocèse de Clermont. Parmi celles-ci on trouve celle de Chanonat. Dès le début du XIVe siècle Philippe le Bel irrité par la puissance de l'ordre du Temple ordonne l'arrestation de tous les membres de l'ordre. En 1312 le pape Clément V proclame la suppression de l'ordre puis le transfert les biens du Temple à l'Hôpital. En 1313 les hospitaliers d'Auvergne prennent possession des biens des templiers.                                          Chanonat, après avoir appartenu au comté d'Auvergne, relève du Dauphiné d'Auvergne au milieu du XIIe siècle et en 1423, la cité entre dans la maison de la Tour d'Auvergne. Elle y restera jusqu'en 1789. En plus de vestiges des hospitaliers, sur la commune de Chanonat on trouve aussi de nombreux sites chargés d'histoire: Tordes, Viallevelours, Condat, Chagourdat, la Varvasse, la Condamine et la Bâtisse remarquable château bâti aux XVe et XVIIe siècles dans la vallée de l'Auzon, avec ses célèbres jardins dessinés par le Nôtre.","architecture":"La bâtisse (voir article). Commanderie des chevaliers de Malte : forteresse de forme carrées à trois niveaux  flanqués de tours rondes  et carrées éléments protégés MH élévation ; toiture époque de construction du XVIe siècle.                                                            Varvasse (Voir article)","habitants":"Famille de Jean de Trie\r\n        \"","divers":"Vestiges de la commanderie de Chanonat","gps":"","images":["../image/image_63/63_Chanonat_1.jpg","../image/image_63/63_Chanonat_2.jpg","../image/image_63/63_Chanonat_3.jpg"]},"Consult_chateau_formulaireba12":{"id":"Consult_chateau_formulaireba12","dept":"63","canton":"Charbonnières-les-Vieilles","commune":"Charbonnières-les-Vieilles","nom":"Charbonnieres_Vieilles","type":"Château","periode":"XIV","histoire":"CHARBONNIERES-les Vieilles, cette commune possède cinq châteaux, Rochegude, Tour Serviat (voir article), Lord-Davis (voir article), Vestiges de Falvard (voir article) et   le château du Puy-saint-Bonnet. La première mention du Puy-Saint-Bonnet remonte en avril 1268, date à laquelle le nom du chevalier dAlexandre, possesseur du fief. A cette famille  succède, en 1347, un certain Lourdain, passe à Pierre de la Rochebriant, seigneur de Prompsat. En 1612, cest Pierre Chartier, baron de Rochefort, qui en est propriétaire.  En 1618, par alliance, passe à la famille de Combes, puis, en 1752, aux Dubois de Macholle.  Une des descendantes de cette famille épouse Pierre Amable de Soubrany. Député de Riom à la convention, ce dernier est guillotiné le 18 Juin 1795. Par héritage, le château passe alors à la comtesse de Macheco, de Riom, qui le lègue à sa mort en 1873 aux filles du Comte Alfred de Lauzanne, dont laïeul avait épousé en 1782 la soeur de Soubrany. Une des petites filles dAlfred, héritière du château, épouse Frédéric de Surel, qui mourra accidentellement le 25 octobre 1919.  Au décès de la veuve de Frédéric de Surel, la propriété est acquise par monsieur Chabassière, trésorier payeur général, puis passe à monsieur Tournaire , dirigeant des économats du centre. Elle appartient actuellement à monsieur de Guilli.","architecture":"Puy-St-Bonnet est un ensemble de bâtiments du XIVe au XIXe siècles, élevé à flanc de coteau autour dune cour intérieure, dont trois cotés sont occupés par le château, la chapelle et les communs, un mur ferme la quatrième face. Le château lui-même est formé de corps accolés dépoques très différentes. Le plus ancien, de la fin de lépoque gothique, est cantonné dune tour et de deux tourelles descalier. Une façade de style classique a été élevée au devant au cours du XVIIe siècle. Devant le château s'étendent  des jardins en terrasse dont l'établissement sur ce terrain en pente a nécessité, la construction de murs de soutènement. L'intérêt de Puy-Saint-Bonnet tient dans la coexistence de deux châteaux d'époque très différentes (XIXe-XVe siècles, cantonné de trois tours et fin du XVIIe siècle, avec façade classique) plaqués l'un contre l'autre et formant  un ensemble  disparate. La chapelle est  décorée de peintures murales. Les communs comprennent plusieurs corps de bâtiments formant de nombreux décrochements.","habitants":"Famille de Pierre de la Rochebriant\r\n        \"","divers":"Château du Puy St-Bonnet et de la Tour-Serviat","gps":"","images":["../image/image_63/63_Charbonnieres_Vieilles_1.jpg","../image/image_63/63_Charbonnieres_Vieilles_2.jpg","../image/image_63/63_Charbonnieres_Vieilles_3.jpg"]},"Consult_chateau_formulaire4ae9":{"id":"Consult_chateau_formulaire4ae9","dept":"63","canton":"Vertaizon","commune":"Chauriat","nom":"Chas_Bard","type":"Château","periode":"XIV","histoire":"CHAS, après 1370, Jean Gouge de Charpaigne, seigneur de Chatz, est trésorier du duc de Berry. En 1421, sa fille Jeanne, dame de Chas, Saint-Hérem, Espirat, et Pétignat, porte le château en dot à Jacques de Montmorln, seigneur  d'Auzon et de Rilhat. La terre reste dans la famille de Montmorin jusqu'au début du XVIIIe siècle. La garde du village de Chas est assurée par  un capitaine qui habite la maison-forte.                                                                BARD, En 1333, Eldin Tays, seigneur de Bard, rend hommage pour son château à l'évêque de Clermont. En 1506, les Seguin sont seigneurs de Bard. Avant 1669, le fief est acheté par Jean Delaire, président de la cour des aides de Clermont. En 1736 Michene Delaire, l'apporte par mariage à Martial de Clary de Saint-Angel.","architecture":"Chas, château  à cinq kilomètres au sud-est. La porte du XIVe siècle, flanquée d'une tour ronde accostée d'une haute guette pourvue d'une horloge, dernier reste de l'enceinte qui ceintura le village, est inscrite, et  on aperçoit  la tour carrée du château derrière.                                                                                               Le  château de Bard édifié au  XIVe siècle est situé à un km au sud du bourg. Grand donjon logis quadrangulaire de quatre niveaux, repercé de croisées  augmenté d'un avant-corps auquel est accolée une tourelle circulaire d'escalier.  Le château se dresse à une centaine de mètres des dépendances et logis construits du XVIe au XVIIIe siècle.","habitants":"Famille de Jean Gouge de Charpaigne\r\n        \"","divers":"Château de Chas et de Bard.","gps":"","images":["../image/image_63/63_Chas_Bard_1.jpg","../image/image_63/63_Chas_Bard_2.jpg","../image/image_63/63_Chas_Bard_3.jpg","../image/image_63/63_Chas_Bard_4.jpg","../image/image_63/63_Chas_Bard_5.jpg","../image/image_63/63_Chas_Bard_6.jpg","../image/image_63/63_Chas_Bard_7.jpg","../image/image_63/63_Chas_Bard_8.jpg","../image/image_63/63_Chas_Bard_9.jpg"]},"Consult_chateau_formulaire0e4b-2":{"id":"Consult_chateau_formulaire0e4b-2","dept":"63","canton":"St-Amant-Tallende","commune":"St-Amant-Tallende","nom":"Chateau_Bas_Barge","type":"Château","periode":"XIV","histoire":"BARGE dit aussi château bas et château de La Tour-Fondue, mentionnée  dès 1262  comme appartenant à Bertrand de La Tour,  une maison-forte  est alors désignée  comme  forteresse de léglise  de Saint-Amant . Au centre du village de Saint-Amant-Tallende, fief des La Tour dAuvergne  fortifiée et  crénelée, telle quelle apparaît  sur larmorial de Guillaume de Revel, a dabord appartenu  à la famille de Monton, puis aux Paulhac, avant de passer par mariage aux Murol, qui donnèrent alors leur nom  à la maison-forte contigue. Celle-ci a peut-être  été restaurée en 1390  par Jean de Murol,  évêque de Genève en 1378 et mort en 1397. En 1411,  Guillaume de Murol obtient laccès direct à létage supérieur de léglise, qui compte trois niveaux. Margot de Valois y a séjourné après son arrestation en 1586.  La famille Boyer (ou Bohier), qui  possédait aussi Saint-Cyrgues. À la mort dAntoine Bohier, en 1565, elle passe à un seigneur de la Barge, qui la garde quelques années Barge Le château passe ensuite aux Saint-Avit,  puis aux Le Loup. En 1629  il est vendu à Annet Bouchard, conseiller au présidial. En 1762,  lunique héritière se marie  avec Gilbert Cousin de la Tour Fondue.  Martial Giscard se marie en 1818 avec Gilberte Cousin de La Tour Fondue, fille de Lucie-Madeleine d'Estaing. Dans le quartier nord du bourg,  au XIXe siècle, propriété de la famille Giscard d'Estaing.","architecture":"Barge, ou tour Boyer, présente aujourdhui un ensemble de plan carré autour dune cour , les angles sont flanqués déchauguette. Il est dominé par une tour polygonale flanquée dune tourelle descalier. La tour Boyer est représentée sur larmorial  de Guillaume Revel, et supposée  à lextérieur de lenceinte du premier bourg, haute tour circulaire et crénelée, flanquée dune tour descalier et dune enceinte crénelée. Cette maison forte, une des trois de Saint-Amant, voir Murol et la Tour fondue, existait donc dès le XVe siècle; mais ses seigneurs ne sont connus quà partir du XVIe.","habitants":"Famille Giscard d'Estaing\r\n        \"","divers":"Château de Barge appelé aussi tour Boyer ou tour Fondue","gps":"","images":["../image/image_63/63_Chateau_Bas_Barge_1.jpg","../image/image_63/63_Chateau_Bas_Barge_2.jpg","../image/image_63/63_Chateau_Bas_Barge_3.jpg"]},"Consult_chateau_formulaire0ee3":{"id":"Consult_chateau_formulaire0ee3","dept":"63","canton":"Pontgibaud","commune":"Pontgibaud","nom":"Chateau_Dauphin","type":"Forteresse","periode":"XII-XV","histoire":"CHATEAU-DAUPHIN est le nom du château de la ville de Pontgibaud.  Il doit son nom aux armes de celui qui le fit construire  en 1190, Robert I dauphin, comte d'Auvergne, il fut assiégé et pris par les troupes du roi de France au début du XIIIe siècle. Passe ensuite en 1229  sous la suzeraineté d'Alphonse de Poitiers  frères de Louis IX. Passera par alliance au XIVe siècle à Marguerite  de Brun de Peschin héritière qui l'apporte en dot à Guillaume Motier de la Fayette, en 1438 leur fils Gilbert III  de la Fayette maréchal de France et compagnon d'armes de Jeanne d'Arc renforce les  défenses  et la dote d'une enceinte  et agrandit le  donjon. Au XVIe siècle  la dernière des La Fayette  épouse Guy de Daillon comte du Lude qui passera un demi siècle plus tard au duc de Roquelaure  suite à l'alliance avec Charlotte-Marie de Daillon, mais le duc héritier du château de Champchevrier en Touraine le  néglige, à la mort du Duc de Roquelaure en 1738 le château passe à sa fille épouse de Jacques de Lorraine prince de Mortagne. Vingt ans plus tard  il sera vendu à  César de Moré  seigneurs de Chaliers qui obtiendra de Louis XV l'érection du fief en comté. Endommagé lors de la Révolution française   le château sera finalement restauré à la fin du XIXe siècle par le comte César III de Pontgibaud. Le château est habité  depuis 1756  par la même famille issue  d'un mousquetaire du roi, César I de Moré. Les actuels propriétaires, le comte et la comtesse Gabriel le Bègue  de Germiny en sont les descendants.","architecture":"Le bâtiment principal est un double donjon du XIIe siècle de trente trois mètres de haut couronné  d'un chemin de ronde crénelé, le corps de logis  de forme rectangulaire flanquée de tours percées de rares meurtrières et pourvues d'un chemin de ronde à mâchicoulis,  en effet, un donjon rond forme un des angles du puissant donjon carré. Les deux parties sont indépendantes. Le donjon carré s'articule autour   d'une cour intérieure couverte  au XIXe siècle  par une verrière. L'enceinte fortifiée  du XVe siècle comportait sept tours, six sont toujours  debout aujourd'hui. Le château comprend  également un jardin potager du XVIe siècle,  lui aussi classé Monument Historique,  et le musée des mines d'argent  du canton de Pontgibaud.","habitants":"Famille de Gilbert III  de la Fayette\r\n        \"","divers":"Foreteresse de Château-Dauphin","gps":"","images":["../image/image_63/63_Chateau_Dauphin_1.jpg","../image/image_63/63_Chateau_Dauphin_2.jpg","../image/image_63/63_Chateau_Dauphin_3.jpg","../image/image_63/63_Chateau_Dauphin_4.jpg","../image/image_63/63_Chateau_Dauphin_5.jpg","../image/image_63/63_Chateau_Dauphin_6.jpg","../image/image_63/63_Chateau_Dauphin_7.jpg","../image/image_63/63_Chateau_Dauphin_8.jpg","../image/image_63/63_Chateau_Dauphin_9.jpg"]},"Consult_chateau_formulaire0410-2":{"id":"Consult_chateau_formulaire0410-2","dept":"63","canton":"Riom","commune":"Chateaugay","nom":"Chateaugay","type":"Forteresse","periode":"XIII-XIV","histoire":"CHATEAUGAY, Pierre de Giac fils de Jean de Giac qui avait épousé  en 1250, la petite fille  Gaillarde de Guillaume de Vigosche  fait rentrer le fief  dans cette famille  qui le tiendront jusqu'à la Révolution, Jean de Giac  eu un fils de ce mariage Pierre qui sera trésorier des duc de Berry et de Bourgogne,  terre donné en 1360 par Jean le Bon roi de France à son fils le duc de Berry, puis chancelier du roi Charles VI , Pierre fit construire le château en 1381  sur les ruines de la maison forte il pris le nom de Châteaugay.  A la mort de Jean en 1407, le château resta dans cette famille jusqu'à la fin du XVe siècle,  la fille Louise de Giac avait épousé Jacques de Laqueille  est le  fait agrandir au XVIe siècle , érigé en marquisat en  XVIIIe siècle, Jean-Claude-Marie, marquis de Châteaugay, colonel du corps de mousquetaires, représente la noblesse aux Etat généraux  de 1789 ami de La  Fayette il dut s'exiler pour le comte d'Artois le futur Charles X. Avant d'être vendu comme bien national sous la Révolution. La ville  de Châteaugay  en est propriétaire.","architecture":"Châteaugay, le château, qui domine la Limagne, se dresse au-dessus du village du même nom. Le château s'appelait \"Vigosche\" jusqu'en 1350, date à laquelle, son nouveau propriétaire le dénomma \"châteaugay\". Architecture du Moyen-Age et de la Renaissance. Il le reconstruisit à la fin du XIVe siècle. Perché sur une éminence basaltique,  le bastion, en pierre de Volvic conserve un superbe donjon carré en basalte, à la base fortement talluté. Les logis sont disposés autour d'une cour intérieure. Le beau donjon carré, en lave, entièrement intact, épargné par Richelieu au XVIIe siècle pendant la campagne de démantèlement des châteaux forts auvergnats, est étonnamment bien conservé. Le donjon, n'a jamais été restauré. Du haut de ses 162 marches. Le château a été en partie dégradé lors de la Révolution et menacé à la démolition en 1829.","habitants":"Famille de Guillaume de Vigosche  \r\n        \"","divers":"Forteresse de Châteaugay","gps":"","images":["../image/image_63/63_Chateaugay_1.jpg","../image/image_63/63_Chateaugay_2.jpg","../image/image_63/63_Chateaugay_3.jpg","../image/image_63/63_Chateaugay_4.jpg","../image/image_63/63_Chateaugay_5.jpg","../image/image_63/63_Chateaugay_6.jpg","../image/image_63/63_Chateaugay_7.jpg"]},"Consult_chateau_formulaire6e0c":{"id":"Consult_chateau_formulaire6e0c","dept":"63","canton":"Chateldon","commune":"Chateldon","nom":"Chateldon","type":"Château","periode":"XIII-XV","histoire":"CHATELDON. En 1216, Archambaud tient le château en fief de Dampierre, sire de Bourbon. En 1283, Humbert de Beaujeu, seigneur de  Montpensier et Herment, connétable de France, achète Châteldon à Guillaume de Saint-Gérand. En 1292,  sa fille Anne de Beaujeu, dame de Châteldon, épouse Jean, comte de Dreux. Vers 1301, elle vend le fief à Jean Aycelin, évêque de Clermont. De 1310 à 1336, Gilles Aycelin, son neveu, seigneur de Montaigut sur Billom est seigneur de Châteldon. En 1410, Jeanne Aycelin,  fille de Louis Aycelin et de Marguerite de Beaujeu, porte par mariage à Jean de Vienne, de Listenois, maréchal et sénéchal du Bourbonnais, les seigneuries de Montaigut, Le Breuil, Châteldon et Le Donjon. En 1433, le duc de Bourbon qui est le suzerain, met provisoirement la main sur Châteldon. En effet, à cette date la dot   de Marguerite de Bourbon, fille naturelle du duc Jean 1er, en épousant  Rodrigo de Villandrando, reçoit la seigneurie d'Ussel, mais ce château n'étant pas habitable, il faut y adjoindre provisoirement Châteldon. Dès 1434 la résidence est transportée à Montgilbert. Au début du XVIe siècle, Anne de Vienne est dame de Chateldon, Montaigut et en partie du Crest.   Vers 1723, Joachim de Rochepierre, chevalier de Saint Jean de Jérusalem, vend les terres de Châteldon, Charnat et du Cherriol, formant le comté de Ferrières, à Jean Lefranc de  Brunpré, écuyer.  Appartient à la fondation  Josée et René de Chambrun.\r\nA quelques kilomètres au nord ouest le château de RIS, en 952, le prieuré est fondé par Amblard de Thiers, archevêque de Lyon. Vers 1048, il est reconstruit par   saint Odilon, abbé de Cluny. En 1333, il compte 20 moines. En 1167, les bâtiments sont en mauvais état. Château prieural situé dans le village.  La demeure  est composée d'un donjon cylindrique de quatre  niveaux desservi par une tourelle circulaire   d'escalier accolée   dominant en guette. Restes   de l'enceinte à flanquements cylindriques. Le logis est reconstruit au XVIIIe siècle.","architecture":"Chateldon du XIIIe-XVe siècles,  reconstruit au XVe siècle placé au sommet dune pente abrupte, domine de façon imposante le bourg  et la vallée.  Double  enceinte polygonale à flanquements circulaires d'angle. On y pénètre par un donjon-porte carré du XIVe siècle carré de quatre niveaux, couronné de faux mâchicoulis. C'est un haut logis rectangulaire de trois niveaux.  Dans la basse-cour, remploi d'un linteau sculpté du XIIIe siècle.","habitants":"Famille d'Humbert de Beaujeu\r\n        \"","divers":"Porte-Donjon et  château de Chateldon, de la Mothe et le château du Ris.","gps":"","images":["../image/image_63/63_Chateldon_1.jpg","../image/image_63/63_Chateldon_2.jpg","../image/image_63/63_Chateldon_3.jpg","../image/image_63/63_Chateldon_4.jpg","../image/image_63/63_Chateldon_5.jpg","../image/image_63/63_Chateldon_6.jpg","../image/image_63/63_Chateldon_7.jpg","../image/image_63/63_Chateldon_8.jpg","../image/image_63/63_Chateldon_9.jpg"]},"Consult_chateau_formulaire606d":{"id":"Consult_chateau_formulaire606d","dept":"63","canton":"Vic-le-Comte","commune":"Sallèdes","nom":"Chaux_Montgros","type":"Château","periode":"XVI","histoire":"CHAUX-MONTGROS, . Construit vers 1550 pour le duc d'Albany, appartient à la fin du Moyen-Age à la famille de Guesle, François de Guesle, écuyer du duc d'Albany, ce dernier  diplomate et guerrier, est à côté de Louis XII et de François Ier durant les guerres d'Italie. Le château ruiné en 1945 fait l'objet d'une restauration depuis quelques années par une association,  C'est un monument majeur unique en Auvergne  et qui n'a pas encore  livré tous ses secrets. Le château de la Chaux Montgros est un lieu de mystères. La légende raconte que la reine Margot y venait visiter sa mère, alors propriétaire du site.","architecture":"Le Château de La Chaux Montgros apparaît à flanc de colline, dominant le vaste Pays du Comté d'Auvergne,  Dapparence médiévale de lextérieur, le château renferme un décor et une architecture de la Renaissance. Les études archéologiques ont quant à elles daté le site du XVIIe siècle. Construit vers 1550 pour le duc d'Albany, ce château présente une architecture d'un type assez inhabituel en Auvergne,   plan massé rappelant le Moyen-Age,  entrée fortifié portant des traces  de rainure d'un pont-levis, de plan massé avec logis carré flanqué de quatre tours rondes style Moyen-Age; utilisation assez rare de chaînages de briques; position centrale et  majesté de l'escalier. Il a cependant adopté les grands caractères de symétrie et de régularité de l'architecture classique. Les toitures viennent d'être restaurées dans leur état du XIXe siècle, sa silhouette miraculeusement intacte mais cependant découronnée. Construction charnière entre château-forteresse médiévale et château-grande résidence rurale, construction Renaissance d'influence italienne du début du XVI e siècle, il constitue, d'avis unanime, un monument majeur unique en Auvergne.","habitants":"Famille de François de Guesle duc d'Albany\r\n        \"","divers":"Château de Chaux Montgros.","gps":"","images":["../image/image_63/63_Chaux_Montgros_1.jpg","../image/image_63/63_Chaux_Montgros_2.jpg","../image/image_63/63_Chaux_Montgros_3.jpg","../image/image_63/63_Chaux_Montgros_4.jpg","../image/image_63/63_Chaux_Montgros_5.jpg"]},"Consult_chateau_formulairebd98":{"id":"Consult_chateau_formulairebd98","dept":"63","canton":"Tauves","commune":"Avèze","nom":"Chazelles_Aveze","type":"Château","periode":"XVII","histoire":"CHAZELLES,  le corps principal du château est construit au début du XVIIe siècle, en 1691, la porte principale de la façade  antérieure est refaite. Aujourd'hui Le château est transformé en centre de colonie  de vacances du comité d'entreprise  de Palport à Clermont-Ferrand et hôtel pour groupes.","architecture":"Chazelles, au XVIIIe, les deux pavillons d'angle  sont adossés aux deux tours d'angle demi  hors oeuvre de la façade principale. C'est à cette époque que les deux tours sont réaménagées en escalier. Au début du XIXe, l'espace compris entre les tours, sur les deux côtés du corps principal,  est construit. Des travaux mineurs sont réalisés sur les deux pavillons carrés   hors-oeuvre existent en périphérie du château  dont elles dépendent. Aucune ne subsiste mais quatre fermes sont bâties, entre  1824 et 1900, dans les parages immédiats du château. Corps de bâtiment principal de plan rectangulaire  flanqué de quatre tours d'angles, les deux tours disposées sur la façade  sont plus saillantes latéralement  mais elles sont alignées  sur le plan   de la façade. Chapelle voûtée d'arêtes au rez-de-chaussée, cage d'escalier au centre du corps principal. Cave-haute sous la moitié du corps principal.","habitants":"Noble locale\r\n        \"","divers":"Château de Chazelles.","gps":"","images":["../image/image_63/63_Chazelles_Aveze_1.jpg","../image/image_63/63_Chazelles_Aveze_2.jpg","../image/image_63/63_Chazelles_Aveze_3.jpg"]},"Consult_chateau_formulaire9bfa":{"id":"Consult_chateau_formulaire9bfa","dept":"63","canton":"Manzat","commune":"Loubeyrat","nom":"Chazeron","type":"Forteresse","periode":"XII","histoire":"CHAZERON ,  Afin  d'assurer la sécurité du côté ouest de ce dernier château,  la famille des Autier de Villemontée qui prendront le nom de Chazeron  bâtissent une tour de garde au début  du XIIe siècle  sur la butte de Chazeron. Pendant la guerre de cent ans forteresse militaire féodale construite aux XIVe siècle par Oudard de Chazeron, cette famille prend du prestige dans sa lignée, renforcé, au XVe siècle par le mariage de son fils Jacques de Chazeron avec la soeur du cardinal Georges d'Amboise premier ministre de Louis XII. Gilbert de Chazeron épouse Marie-Gabrielle de la Guiche-Saint-Géran, ce ménage sans enfant, le c
