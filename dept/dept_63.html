hâteau passe à une soeur épouse de Gilbert de Monestay qui se dernier en 1677  se couvre de gloire sur les champs de batailles,  Louis XIV, se rend à Chazeron pour le  décorer  de l'ordre  du Saint-Esprit  le marquis François de Monestay de Chazeron en remerciement de ses faits de guerre  et pour l'accueillir, le marquis de Chazeron commande à l'architecte Jules Hardouin Mansart la transformation du château médiéval en résidence, à l'image de Versailles.   Le château restera dans cette famille jusqu'en 1859 puis par alliance  de  Marie-Pauline de Monestay-Chazeron  avec Louis-Albertde Brancas duc de Cereste qui léguera ses biens à son décès à son neveu le marquis de Sinèty, passera ensuite à plusieurs propriétaires dont maître Léouzon-le-Duc en 1920 qui le remanie. Durant la seconde guerre mondiale,  le château sert de lieu de captivité, Léon Blum, Georges Mandel, Édouard Daladier, Paul Reynaud et Maurice Gamelin furent emprisonnés. Racheté en 1960 par messieurs Bruni et Mangematin qui remanièrent entièrement le château pour en faire un lieu culturel.","architecture":"Chazeron , au XIIe siècle construction d'une tour de garde pour assuré la défense avancée  de la forteresse de Chatel-Guyon, au XIVe siècle le seigneur Oudard  de Chazeron remanie probablement le donjon en le transformant en château fort, le logis principal, que prolonge le donjon  s'articule avec deux ailes en retour dont les angles rentrants sont occupés de deux tours d'escalier polygonales. L'aspect résidentiel de Chazeron  cache des salles résolument féodales  dans sa partie centrale, côtoyant dans les ailes nord et sud, la grandeur militaire du XVIIe siècle, transformée au XVIIe siècle, devant la forteresse, qui est elle même agrémentée, deux ailes de style classique sont construites de part et d'autre d'une grande cour.","habitants":"Famille d'Oudard de Chazeron\r\n        \"","divers":"Forteresse de Chazeron","gps":"","images":["../image/image_63/63_Chazeron_1.jpg","../image/image_63/63_Chazeron_2.jpg","../image/image_63/63_Chazeron_3.jpg","../image/image_63/63_Chazeron_4.jpg","../image/image_63/63_Chazeron_5.jpg","../image/image_63/63_Chazeron_6.jpg","../image/image_63/63_Chazeron_7.jpg","../image/image_63/63_Chazeron_8.jpg"]},"Consult_chateau_formulaire7f0c":{"id":"Consult_chateau_formulaire7f0c","dept":"63","canton":"Billom","commune":"Neuville","nom":"Cheix","type":"Château","periode":"XIII-XIV","histoire":"CHEIX, Guillaume Rastier est seigneur du Cheix en 1303. Le château passe à Pierre de Mascon, seigneur du Cheix et de Neuville, dont la famille du même nom en fut propriétaire pendant cinq siècles. Le dernier des Mascon, François Balthazar, se marie  en 1774 à Marie-Anne de La Saigne de Saint-Georges. Ils ont pour fille unique Elisabeth de Mascon qui épouse en 1790 son voisin Joseph Benoït de Pierre, marquis dAulteribe, seigneur de la Chassaigne, décédée sans prospérité en 1842. Puis le château passe à Louis Dessaigne, décédé au Cheix en 1913. Passe à Joseph Dessaigne en Août 1944, suite au décès de sa mère, née Marie Thialler en juillet 1944. Il est vendu à Henri Rabet et Madame née Marie-Camille Pintrand qui le laisse à labandon. Il est acheté pour les terres en 1962 par la famille Dauzat, agriculteurs,  vendu à Michel Pancracio le 26 janvier 1970. Vendu en quasi-ruine à la famille Cornut-Gentille le 23 novembre 1974 qui, durant vingt cinq ans, jusquà la mort de monsieur Jean-Jacques Cornut Gentille, le restaurèrent . Enfin, il est vendu le 17 août 2004 à monsieur Pierre Chassaigne, président fondateur du groupe immobilier Mercure France et madame née France Sauzier, son épouse, qui oeuvrent avec autant de passion que leurs prédécesseurs pour terminer loeuvre gigantesque de ces derniers.\r\nMOULINS, un bâtiment existe aux Moulins dans le dernier quart du XVIe siècle, mais aucun vestige de cette époque ne semble avoir été conservé, le bâtiment actuel date probablement de la 1ère moitié du XIXe siècle, après cette date, passe de la famille Théallier à la famille de Chamerlat qui le transforme, dans la deuxième moitié  du XIXe siècle.\r\nPERCHE  En 1440, Urbain d'Oradour est seigneur de Bêthel et La Perche. Son fils puîné, Bertrand d'Oradour, est la tige des seigneurs de La Perche et de Mezel. En 1526 et 1550, Jean d'Oradour, écuyer, est seigneur de La Perche, Mezel et Janilhat. En 1686 le fief est toujours aux Oradour. Avant 1699,  Jacques de Lobière du Bouchet est seigneur.  Après 1726, Blaise de Bournat et en 1771, Anne de Bournat sont dits seigneurs de La Perche.","architecture":"Château de Cheix  construit au XIIIe siècle, importants réa ménagements au XVIIe siècle, il est à l'état de ruine dans la 2e moitié du XXe  siècle,  mais a  conservé son  organisation générale, quatre corps de bâtiments  assemblés autour d'une cour rectangulaire et  flanqués à chaque angle par une tour ronde, le tout sans doute entouré d'eau,  le corps de bâtiment à l'est, en particulier, a été entièrement reconstruit; utilisation pour la restauration de remplois provenant de Clermont Ferrand et des environs, encadrements d'ouvertures en andésite, la ferme du château du Cheix au sud, de l'autre côté de l'allée d'entrée, date peut-être du XVIIe siècle,  à la Révolution, les quatre tours sont considérées comme signe de la féodalité à abattre, mais elles ne seront pas détruites, c'est peut être à  partir de cette époque que le château est laissé à l'abandon.                                         \r\nChâteau du Moulins ajout en particulier des trois petites tourelles d'angle et de l'étage de comble, construction des écuries et  du bâtiment agricole attenant, à l'est du bâtiment principal, et aménagement  d'une chapelle dans  l'angle sud-est du logis, après 1834 également, mais à une date indéterminée, il s'agit vraisemblablement de dépendances agricoles, au sud et au nord  du château, et d'un premier logis de ferme qui était accolé à la ferme actuelle située au nord du château.                                   Le château de La Perche est situé face à l'église, enceinte quadrangulaire à flanquements cylindriques d'angle, il en  reste deux accolés à un logis de deux niveaux, les cheminées sont adossées aux pignons. Chambres d'hôtes  Sylvia Van-der-Tol.","habitants":"Famille de Guillaume Rastier                                                  \r\nFamille Théallier                                                                                 Famille de Bertrand d'Oradour\r\n        \"","divers":"Château de Cheix, du Moulins et de la Perche","gps":"","images":["../image/image_63/63_Cheix_1.jpg","../image/image_63/63_Cheix_2.jpg","../image/image_63/63_Cheix_3.jpg","../image/image_63/63_Cheix_4.jpg","../image/image_63/63_Cheix_5.jpg","../image/image_63/63_Cheix_6.jpg","../image/image_63/63_Cheix_7.jpg","../image/image_63/63_Cheix_8.jpg"]},"Consult_chateau_formulairee1bf":{"id":"Consult_chateau_formulairee1bf","dept":"63","canton":"Vertaizon","commune":"Vertaizon","nom":"Chignat_Vassel","type":"Château","periode":"XIV-XVI","histoire":"CHIGNAT; vers 1314, le dauphin de Viennois, seigneur de Pont du Château et l'évêque se disputent la seigneurie  de Chignat à cause des foires et au Péage sur l'Amer. En 1438, le château est acheté par  Louis Beaufort, sieur   de  Pont du Château. En 1441, Guillaume de Montvital, damoiseau, est seigneur   de Chignat. En 1536, Jehan de  Lamyne est aussi seigneur de Chignat. En 1606, Annet Laville, bally de Montrognon et Chamalières est seigneur   de Chignat. En 1753, le château passe par   héritage à François de Varennes   de Champfleury, seigneur   de Bien-Assis, à condition de régler les dettes et les charges de la succession.                               VIVAL, en 1520. Antoine de Laire est dit seigneur du Vival lorsqu'il épouse Madeleine du Puy de Celles. Le fief reste   dans la famille de Laire jusqu'au XVIIe siècle.                                                       VASSEL   Château mentionné  en 1450 comme possession de Bertrand de Vassel.","architecture":"Château de Chignat situé à 2 km au nord-ouest   du bourg. D'une enceinte   quadrangulaire, il subsiste deux flanquements circulaires d'angle accolés à un logis de trois niveaux remanié ou reconstruit.                              Vival, donjon-logis de plan rectangulaire   de 3 niveaux, situé en bordure sud-est de la ville, rue de la  Roussille. On lui a adossé un logis rectangulaire   de trois travées sur deux niveaux et demi, desservis près d'un angle par   une tourelle circulaire d'escalier; le logis a été allongé au-delà de cette tourelle hors du tracé originel. L'ensemble occupe une enceinte quadrangulaire dont il reste un flanquement carré maintenant isolé.                                              Vassel, l'édifice se compose d'un bâtiment  rectangulaire flanqué d'une tourelle d'escalier. S'il a été modifié extérieurement, l'édifice conserve, à l'intérieur, quelques menuiseries d'époque Louis XIII, ainsi qu'un plafond à poutrelles apparentes de la même époque.  La tourelle d'escalier  date du XVe siècle. Sa porte d'entrée est ornée de crochets  de pinacles et surmontée de  trois niches à dais et  culs-de-lampe. Les fenêtres de cet  escalier ont des linteaux  d'ornementation variée. En 1671, le château était entouré de fossés avec une basse cour, la tourelle d'escalier du XVe siècle comprise dans l'ancien château. En 1671, le château était entouré de fossés avec une basse cour.","habitants":"Famille de Guillaume de Montvital                                                    Famille de Laire \r\n        \"","divers":"Château de Chignat, de Vial et de Vassel","gps":"","images":["../image/image_63/63_Chignat_Vassel_1.jpg","../image/image_63/63_Chignat_Vassel_2.jpg","../image/image_63/63_Chignat_Vassel_3.jpg","../image/image_63/63_Chignat_Vassel_4.jpg","../image/image_63/63_Chignat_Vassel_5.jpg"]},"Consult_chateau_formulairec94c":{"id":"Consult_chateau_formulairec94c","dept":"63","canton":"Pessat-Villeneuve","commune":"Clerlande","nom":"Clerlande","type":"Château","periode":"XVI-XVII","histoire":"Plusieurs châteaux dans la commune de CLERLANDE, au XVIIe siècle, cest Clerlande (dont le fort appartient au Duc de Bouillon) qui saffirme avec de gros domaines qui senorgueillissent parfois dun château (Bellevue, La Pauze, de Lauzanne). Tout cet ensemble fait partie de la seigneurie de Benistan et de la paroisse de Varennes et, à la Révolution de la commune du même nom.           Manoir de BELLEVUE, en 1621, Géraud de Lalande, lieutenant-général à Riom, est dit seigneur lorsqu'il épouse Louise de Basmaison. En 1656, le manoir est à son fils, Ligier de Lalande, avocat du roi à Riom, lorsqu'il se marie avec Madeleine Delozt,    il décède sans postérité. \r\nGRAVIERES, vers 1520 Claude Barthélemy Bernard est seigneur de La Gravière. En 1737, le château est acheté par François Nicolas Le Normand, écuyer, receveur des tailles de la province d'Auvergne. Avant 1780, il est acheté par la famille Maigne qui le possède encore vers 1880.                                                                 La PAUZE  est à Guillaume de Courteix, bourgeois de Riom. En 1700, il est à Louis du Bois, contrôleur des finances à Riom.                                     La PETITE-PAUZE, le blason, un Huchet ou Cor de Chasse, qui est sur le tablier  de la cheminée est identique   pour trois familles auvergnates, celle de Goy (en Bourbonnais), celle de La Molette (en Cantal) et celle de Rolland (établie dans le Haut-livradois).","architecture":"Manoir de Bellevue  du XVe siècle est situé, dans un parc. Donjon carré de trois  niveaux. Dans son prolongement  un logis rectangulaire de deux niveaux et demi, est accosté d'une haute tourelle circulaire d'escalier.\r\nChâteau de Gravières   construit au XVIe siècle. Reste d'une enceinte avec porte-tour.  Logis du XVIe siècle de deux niveaux et demi agrandi au XVIIe siècle.                                                    Le manoir  de la Pauze  est situé à 300 m à l'ouest du hameau qui est sur Cerlande. C'est un haut logis de trois niveaux accosté d'une haute tourelle cylindrique d'escalier, défendue par une bretèche. Il est adossé à un pavillon carré pourvu d'un  avant-corps, peut-être un donjon dérasé. le logis a une travée d'égale largeur de part et d'autre de la tourelle. Les cheminées sont appuyées aux deux pignons. \r\nManoir de la Petite Pauze construit au XVIe siècle, situé de l'autre côté du chemin de Villeneuve. Un logis de deux niveaux est accosté à un angle d'une tourelle ronde d'escalier desservant une coursière. La tourelle est pourvue d'une bretèche et elle est percée d'arquebusieres.","habitants":"Duc de Bouillon\r\n        \"","divers":"château de Gravières, manoir de Bellevue , de la Pauze et de la Petite Pauze.","gps":"","images":["../image/image_63/63_Clerlande_1.jpg","../image/image_63/63_Clerlande_2.jpg","../image/image_63/63_Clerlande_3.jpg","../image/image_63/63_Clerlande_4.jpg"]},"Consult_chateau_formulaire9101":{"id":"Consult_chateau_formulaire9101","dept":"63","canton":"Clermont-Ferrand","commune":"Clermont-Ferrand","nom":"Clermont_Ferrand","type":"Patrimoine","periode":"XII-XVIII","histoire":"CLERMONT-FERRAND, en 1120, pour contrecarrer le pouvoir des évêques, les comtes dAuvergne fondent à proximité de la ville épiscopale la cité de Montferrand selon un plan orthogonal qui n'est pas sans rappeler celui, ultérieur, des bastides du Sud-Ouest, ces villes nouvelles du Midi. Pendant tout le Moyen-âge et jusquà lépoque moderne, Clermont et lactuel quartier de Montferrand sont deux villes distinctes: Clermont est la cité épiscopale, Montferrand, la ville comtale. En 1202, le comte Guy II abandonne à l'évêque les droits qu'il possède sur la cité de Clermont. Désormais et jusqu'au milieu du XVIe siècle, l'évêque et le chapitre cathédrale sont les maîtres de la ville. En août 1480, par ses lettres patentes, le roi Louis XI crée un consulat à Clermont.\r\nEn 1490, la ville de Clermont subit de gros dommages à cause dun tremblement de terre. Douze tours de lenceinte seffondrent totalement ou partiellement ainsi qu'une tour de la basilique Notre-Dame-du-Port. La cathédrale subit également des dommages. (Une fissure sur le portail sud est toujours visible).\r\nEn 1551, Clermont devient ville royale, puis en 1610, propriété inséparable de la Couronne. Henri II transforme ladministration de Clermont en échevinage le 18 octobre 1556 (4 échevins puis 3 en 1559).\r\nChâteau des VERGNES   édifiée au XVIIe siècle.","architecture":"L'hôtel Savaron (1513).  L'Hôtel de Fontfreyde (XVIe siècle). L'hôtel de Chazerat en relief, construit par le président de la cour des aides, Charles-Antoine-Claude de Chazerat à la suite de l'incendie de sa maison en 1759. Les travaux sont achevés en 1769. Le bâtiment de style Louis XVI comporte, entre autres, une cour ovale bordée de pilastres cannelés et surmontés par des chapiteaux ioniques. Il est occupé depuis 1982 par la Direction régionale des Affaires culturelles d'Auvergne.\r\nVergnes, édifiée au XVIIe siècle, modifiée au XVIIIe siècle, cette ancienne gentilhommière est de plan rectangulaire avec deux pavillons en retour d'équerre. Les seuls éléments pittoresques sont les couronnement des pavillons d'angle et de la travée centrale, en façade sud-ouest, ainsi qu'un petit pavillon octogonal à l'ouest.                                  Rabanesse, le château comprenant une tour et un logis attenant, inscription par arrêté en décembre 2009 propriété d'un établissement public départemental,  Époque: XVe siècle; XVIIe siècle; XVIIIe siècle.","habitants":"Les comtes dAuvergne \r\n        \"","divers":"Patrimoine important à Clermont-Ferrand, château de Vergnes, de Rabanesse, hôtels particuliers etc.","gps":"","images":["../image/image_63/63_Clermont_Ferrand_1.jpg","../image/image_63/63_Clermont_Ferrand_2.jpg","../image/image_63/63_Clermont_Ferrand_3.jpg","../image/image_63/63_Clermont_Ferrand_4.jpg","../image/image_63/63_Clermont_Ferrand_5.jpg","../image/image_63/63_Clermont_Ferrand_6.jpg","../image/image_63/63_Clermont_Ferrand_7.jpg","../image/image_63/63_Clermont_Ferrand_8.jpg","../image/image_63/63_Clermont_Ferrand_9.jpg"]},"Consult_chateau_formulaireead6":{"id":"Consult_chateau_formulaireead6","dept":"63","canton":"St-Germain-l`Herm","commune":"St-Bonnet-le-Châstel","nom":"Cluzel_St_Bonnet","type":"Château","periode":"XIV","histoire":"CLUZEL, en 1308 est cité Hugues de Cluzel. En 1365, Godefroy de Boulogne, agissant comme seigneur de Saint-Bonnet et de Novacelles donne licence à Hugues de Cluzel de réparer  son hôtel et maison du Cluzel et mettre en manière forte qu'elle  puisse défendre des ennemis du royaume de France.  En 1450 cette famille est inscrite  à l'Armorial de Revel, elle portait   comme armes; \"D'azur au chevron de gueules accompagné de trois vases d'or\". En  1494,  après le décès d'Antoine de Cluzel le Château passe à Guillaume de Coisse. En 1666-1693,  la demeure est   Michel du Lac, seigneur de Puydenant, sa fille, Catherine Charlotte du Cluzel de la Charbrerie (1737-1756), première femme de Louis Le Peletier de Morfontaine Antoine-Marie de Cluzel, comte de la Charbrerie, officier de l'armée du condé Augustin-Pierre Cluzel, né à Montclar (Aveyron), ordonné prêtre en 1841, préfet apostolique de Perse en 1858, archevêque d'Héraclée en 1874 Bernard Cluzel, (1893-1982) homme politique français, maire de Montel-de-Gelat dans le Puy-de-Dôme (1957-1967) Étienne Cluzel, écrivain et bibliophile français François Cluzel, contre-amiral français, commandant du Charles de Gaulle lors de la mission en Afghanistan en novembre 2001 François-Pierre de Cluzel, fermier-général, propriétaire de l'Hôtel de Courtonne, Place Vendôme (1755-1766)\r\nGabrielle Cluzel, écrivain français, journaliste-animatrice sur Radio Courtoisie. Guy de Cluzel, évêque de Limoges (1226-1235) Jean Cluzel (1923-), homme politique français, Jean-Paul Cluzel, haut fonctionnaire français, président de la RMN et du Grand Palais.","architecture":"Château de Cluzel édifié vers 1400, donjon-logis rectangulaire de 3 niveaux et demi, le dernier percé de baies créneaux, les  étages sont desservis par une tourelle ronde, flanquante vers l'extérieur, dont l'escalier   est accessible  à l'extrémité  d'un couloir intérieur. De ce côté, le bâtiment n'est percé que de petites baies pouvant servir à la défense. Au XVIe  siècle, l'édifice a été remodelé, la façade côté cour   a été rhabillée en style Renaissance aux niveaux soulignés par des corniches. La porte, à encadrement de la Renaissance, est défendue par une bretèche sommitale. Les baies   ont été refaites, mais sur l'un des côtés sont conservées des baies à modénatures anciennes; l'une de la fin du XIVe ou début du XVe siècle, deux autres du XVIe siècle.","habitants":"Famille d'Hugues de Cluzel\r\n        \"","divers":"Château de Cluzel.","gps":"","images":["../image/image_63/63_Cluzel_St_Bonnet_1.jpg","../image/image_63/63_Cluzel_St_Bonnet_2.jpg","../image/image_63/63_Cluzel_St_Bonnet_3.jpg","../image/image_63/63_Cluzel_St_Bonnet_4.jpg","../image/image_63/63_Cluzel_St_Bonnet_5.jpg"]},"Consult_chateau_formulaire316b":{"id":"Consult_chateau_formulaire316b","dept":"63","canton":"Jumeaux","commune":"Auzat-sur-Allier","nom":"Cocu_Auzat","type":"Vestiges","periode":"XIII","histoire":"COCU, château du XIIIe siècle, était la possession de Bernard Cocci. Vers 1260, le chevalier Bompar II d'Auzon est seigneur d'Auzat.  En 1375, fief  d'Aubert de Peuchaud  d'Auzat avec le mas de Monlet. En 1611 Anne d'Oradour est veuve de Claude de Peuchaud, seigneur d'Auzat. Vers  1650, la seigneurie est   vendue en deux lots: l'un à la famille de Montservier, l'autre à Pons, seigneur du Rocquet.  En 1675, Alexandre   de Montservier, écuyer, seigneur  d'Orsonnette. En 1689, Antoinette, fille de feu  Alexandre   de Montservier, habite Auzat. En 1723, Jean-Baptiste de Pons, chevalier, seigneur  de Frugières, Sainte-Florine, Auzat, rend hommage au Roi.  Au XIVe siècle, Aubert de Penchard est seigneur du château et du bourg. En 1840, il semble que le château soit encore habité. A la fin du XXe siècle, les communes d'Auzat sur Allier et de La Combelle fusionnent pour former Auzat la Combelle. Au XXIe siècle, la découverte de l'extérieur est libre et gratuite.","architecture":"Ruine du château Cocu surplombant l'Allier et le bourg d'Auzat-sur-Allier.\r\nRuine d'un moulin à vent sur le plateau entre Auzat-sur-Allier et Lamontgie.\r\n Au sommet de cette colline, les vestiges d'un bâtiment seigneurial jouent avec les arbres. Château-fort ruiné bâti aux XIIIe et XIVe siècles,  situé à l'extrémité d'un plateau rocheux dominant l'Amer. Donjon rond dressé du côté de l'attaque, restes d'une enceinte à flanquements circulaires.  Ces ruines sont assez récentes, le dernier habitant connu remonte à 1840.  Cette ruine est composée de 2 tours rondes encadrant une courtine. Il me semble que ce bâtiment a été habité ou utilisé récemment car de telles ouvertures ne sont point du Moyen-Age  et un ciment cache partiellement les pierres.\r\nDétail minimal et pourtant fascinant, au milieu des lianes, une petite fente verticale en angle rappelle la classique archère pour la défense de la courtine.","habitants":"Famille de Bernard Cocci\r\n        \"","divers":"Vestiges du château de Cocu et château de Combelle","gps":"","images":["../image/image_63/63_Cocu_Auzat_1.jpg","../image/image_63/63_Cocu_Auzat_2.jpg","../image/image_63/63_Cocu_Auzat_3.jpg","../image/image_63/63_Cocu_Auzat_4.jpg","../image/image_63/63_Cocu_Auzat_5.jpg","../image/image_63/63_Cocu_Auzat_6.jpg","../image/image_63/63_Cocu_Auzat_7.jpg"]},"Consult_chateau_formulaire279d":{"id":"Consult_chateau_formulaire279d","dept":"63","canton":"Lezoux","commune":"Bort-l`Etang","nom":"Codignat","type":"Château","periode":"XV","histoire":"CODIGNAT, deux châteaux, Ravel et, sur l'autre versant, Codignat, qui était à l'origine une tour de guet du château de Ravel.  à l'origine la tour de protection des seigneurs de Ravel et de leur château. Par conséquent, il y a une partie datant du XIIe siècle avec sa tour carrée et un côté plus récent datant du XVe siècle. Le fief appartenait en 1328 au chevalier Eudes de Codegnat. Il passa ensuite à la famille de Ravel, puis à celle du Bost. Au XVIIIe siècle, il entra dans les biens des dEstaing, seigneurs de Ravel. Au début du XIXe siècle, il devient la propriété des princes Obolenski.  transformé en hôtel restaurant. Ré-aménagement complet de l'intérieur du château au XXe siècle pour sa transformation en hôtel.   Depuis 2006 le château appartient à Sorgente Group, groupe financier et immobilier international, qui en a acquis aussi la gestion en novembre 2010.","architecture":"Tour de guet du château de Ravel, Codegnat devint une maison forte à la fin du Moyen Age. La façade principale, au sud, est encadrée par deux tours dangle, lune carrée, aux chaînes dangle appareillées et couronnement avec créneaux et merlons en brique du XIXe siècle, lautre ronde, couverte en poivrière. La tour circulaire ouest fait pendant par sa masse, sa hauteur et son pseudo crénelage, à la tour carrée, légèrement ta-lutée à sa base, elle comprend quatre niveaux percés de fenêtres rectangulaires. La plupart des ouvertures sont divisées par une traverse de pierre aux deux tiers de leur hauteur. Le château actuel se compose dun corps de logis rectangulaire cantonné de trois tours dangle et flanqué sur les façades nord et sud de deux tours.  Par conséquent, il y a une partie datant du XIIe siècle avec sa tour carrée et un côté plus récent datant du XVe siècle  comme en témoignent certaines ouvertures,  un escalier, des canonnières dans les tours, et ajout de créneaux en brique, en arkose du pays, les encadrements sont généralement ornés dun simple chanfrein et, plus rarement, dune accolade sur le linteau.","habitants":"Chevalier Eudes de Codegnat\r\n        \"","divers":"Château de Codignat.","gps":"","images":["../image/image_63/63_Codignat_1.jpg","../image/image_63/63_Codignat_2.jpg","../image/image_63/63_Codignat_3.jpg","../image/image_63/63_Codignat_4.jpg","../image/image_63/63_Codignat_5.jpg","../image/image_63/63_Codignat_6.jpg","../image/image_63/63_Codignat_7.jpg","../image/image_63/63_Codignat_8.jpg"]},"Consult_chateau_formulairea045":{"id":"Consult_chateau_formulairea045","dept":"63","canton":"St-Germain-Lembron","commune":"Collanges","nom":"Collanges_(63)","type":"Château","periode":"XV","histoire":"COLLANGES, en 1427, Antoine de Mezei est dit seigneur de Saint-Bonnet et Collanges. En 1438, sa fille Alixe de Mezel  apporte le château par alliance à Guillaume IV de Boulier, chevalier, seigneur du Chariol. En 1548 Antoine V Boulier du Chariol, chevalier, est seigneur de  Couzances et de Collanges. En 1667, ses héritiers le vendent à Paul Chabre, lieutenant-criminel à Riom, en 1670,  celui ci en rend hommage. Avant 1699,  le château est acheté par Jean Baptiste de Pons, chevalier, seigneur de Frugières. En 1775, Pierre II Pons de La Grange, marquis de Frugières, est seigneur de Collanges et de  Couzances. En 1787, ses héritiers le vendent à Pierre Sarry.","architecture":"Château de Collanges construit au XVIe siècle. Donjon-beffroi carré   auquel on a accolé un corps de logis rectangulaire allongé à trois niveaux, reconstruit au XVIIe siècle dont la façade est encadrée de tourelles en angles à toitures galbées, remanié au XVIIIe siècle.","habitants":"Famille d'Antoine de Mezei \r\n        \"","divers":"Château de Collanges","gps":"","images":["../image/image_63/63_Collanges_(63)_1.jpg","../image/image_63/63_Collanges_(63)_2.jpg","../image/image_63/63_Collanges_(63)_3.jpg","../image/image_63/63_Collanges_(63)_4.jpg"]},"Consult_chateau_formulaire2381":{"id":"Consult_chateau_formulaire2381","dept":"63","canton":"Pontaumur","commune":"Combrailles","nom":"Combrailles","type":"Château","periode":"XVI","histoire":"COMBRAILLES,   vers 1550, André de Pannevère est dit coseigneur de Combrailles pour une part et Claude Le Groing pour  l'autre part. En 1601 Marguerite Le Groing porte le fief à Jean Mathelin de Bosredon, seigneur du Puy-St-Gulmier. En 1604,  le château de Châlus qui dominait le bourg est rasé sur ordre du roi Louis XIII. Son seigneur Gabriel de Bosredon fait alors construire le château de Combrailles.  Le  bâtiment date de 1645. En 1689 , François Aymé de Bosredon,  chevalier est seigneur de Vatanges et de Combrames y habitent. Le château reste dans la famille de Bosredon jusqu'en 1862.","architecture":"le château de Combrailles possède  une tour carrée flanqué à l'angle d'un grand logis rectangulaire de deux niveaux sans baies anciennes. Côté cour, un angle de ce logis est pourvu d'une poivrière   sur tas de charge. Vers l'extérieur, il a été augmenté au XIXe siècle d'un monumental pavillon d'entrée. Les cheminées sont adossées à un refend qui divise  le bâtiment en deux plus deux travées.  Le logis a  été remanié et sans doute allongé au XIXe siècle,  à l'origine il devait  y avoir en plus deux travées.  Le château a réutilisé de nombreux éléments provenant de l'ancien château de Châlus qui était situé au dessus du lieu-dit La Halle au nord de la commune.","habitants":"Seigneur Gabriel de Bosredon \r\n        \"","divers":"Château de Combrailles, de  Courtioux et du Mas","gps":"","images":["../image/image_63/63_Combrailles_1.jpg","../image/image_63/63_Combrailles_2.jpg","../image/image_63/63_Combrailles_3.jpg","../image/image_63/63_Combrailles_4.jpg"]},"Consult_chateau_formulaire7fed":{"id":"Consult_chateau_formulaire7fed","dept":"63","canton":"Combronde","commune":"Combronde","nom":"Combronde","type":"Château","periode":"XVII","histoire":"COMBRONDE, le château actuel occupe l'emplacement d'un édifice plus ancien appartenant à l'origine à la maison d'Apchon, puis en 1220 aux dauphins d'Auvergne.  Le château des Capponi, où est installée la mairie. Les Capponi étaient un rameau installé en France d'une grande famille florentine, Lorenzo Capponi s'installa comme banquier à Lyon,  décéda en 1573 à Lyon. Son descendant Gilbert François de Capponi (1730-1788) acheta le marquisat de Combronde le 14 juin 1764 à la succession du ministre Jean-Jacques Amelot de Chaillou. A la Révolution,  le château fut vendu comme bien national  et  devint le centre administratif de la commune avec une partie de logements.","architecture":"l'édifice comprend un corps de logis  principal rectangulaire  dont les extrémités sont marquées  par deux  pavillons comportant un étage supplémentaire.  La façade nord donne sur une cour fermée à l'ouest par les anciens communs. La façade sud ouvre sur le jardin, amputé d'une partie de sa superficie depuis la Révolution. Le château semble  ne rien avoir conservé de l'édifice antérieur, et entièrement reconstruit  par les Capponi après leur installation en  1764. L'intérieur, fortement remanié au XIXe siècle, est traité dans un style où dominent les ouvrages de gypserie. Ce château est représentatif des demeures aristocratiques auvergnates du XVIIIe siècle.","habitants":"Famille de Lorenzo Capponi\r\n        \"","divers":"Château de Combronde et de Chavanon","gps":"","images":["../image/image_63/63_Combronde_1.jpg","../image/image_63/63_Combronde_2.jpg","../image/image_63/63_Combronde_3.jpg"]},"Consult_chateau_formulaire13f7":{"id":"Consult_chateau_formulaire13f7","dept":"63","canton":"St-Germain-l`Herm","commune":"Condat-les-Montboissier","nom":"Condat_Liberty","type":"Château","periode":"XVIII","histoire":"LIBERTY  Siège d'un fief, le château aurait été fondé en 1580. Sa reconstruction, au XVIIIe siècle, s'est achevée en  1761.","architecture":"Château de Liberty  se présente avec l'ordonnance très classique d'un corps de logis flanqué de quatre pavillons  et complété par deux ailes de communs  qui délimitent une cour d'entrée rectangulaire fermée par  un mur percé d'un portail. Côté jardin,  la façade est soulignée par des emmanchements qui descendaient vers des parterres à la française remplacés par un parc à l'anglaise. Les façades portent la marque de l'architecture provinciale du XVIIIe siècle. L'aménagement et le décor intérieurs ont été exécutés vers 1750 par une équipe d'ébénistes  italiens. Toutes les pièces ont été habillées de boiseries d'un style provincial. La plupart des boiseries étaient peintes. Dans les pièces principales, les lambris  sont complétés par  des panneaux de tapisserie d'Aubusson  ou de Felletin.                                          Château de Meydat du XVe siècle ou XVIe siècle.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Liberty, de Meydat et de Montboisier.","gps":"","images":["../image/image_63/63_Condat_Liberty_1.jpg","../image/image_63/63_Condat_Liberty_2.jpg","../image/image_63/63_Condat_Liberty_3.jpg","../image/image_63/63_Condat_Liberty_4.jpg","../image/image_63/63_Condat_Liberty_5.jpg","../image/image_63/63_Condat_Liberty_6.jpg"]},"Consult_chateau_formulaire129f":{"id":"Consult_chateau_formulaire129f","dept":"63","canton":"St-Germain-l`Herm","commune":"Condat-de-Combrailles","nom":"Condat_Vatanges","type":"Château","periode":"XIV-XVII","histoire":"VATANGES,  en 1310, Aymon de Villelume est co-seigneur de Barmontet, Verneugheol, Villelume et  Vatanges. En 1436,  le château est aux nobles de Courtes. En 1543 il est à Raymond de Jonas,  chevalier. Il passe ensuite par mariage   aux Aymé des Roches. En 1600, Gabrielle Aymé des Roches porte la seigneurie par mariage à Guy de Thianges.  En 1645, l'édifice est acheté par la famille de Bosredon, seigneur de  Combrailles. En 1674,  Gabriel de Bosredon, écuyer, est seigneur de Manoux et de Vatanges. En 1689 et 1693, François-Aymé de Bosredon, chevalier, est  seigneur de Vatanges et de  Combrailles, il habite le château de Vatanges et y fait faire des travaux, ses héritiers le possèdent en 1789.","architecture":"Château de Vantages, château construit au XIVe siècle, grande enceinte quadrangulaire à flanquements ronds aux angles et au milieu  des grands côtés. Il en reste trois accolés à un grand logis remanié du XVIIe siècle et encadré côté cour de deux pavillons carrés.","habitants":"Famille d'Aymon de Villelume \r\n        \"","divers":"Château de Vantages","gps":"","images":["../image/image_63/63_Condat_Vatanges_1.jpg","../image/image_63/63_Condat_Vatanges_2.jpg","../image/image_63/63_Condat_Vatanges_3.jpg"]},"Consult_chateau_formulaire01a7-2":{"id":"Consult_chateau_formulaire01a7-2","dept":"63","canton":"Billom","commune":"St-Julien-de-Coppel","nom":"Coppel","type":"Vestiges","periode":"XIII","histoire":"ST-JULIEN de COPPEL(voir article Coppel).                CHALARD, en 1519, Jean de La Salle, chevalier est seigneur du Challard et de La Volpilière. En 1633, Anne de la Salle porte le château par mariage à François de Miremont, seigneur d'Enval.  De 1675 à 1689 Jean-Philibert de Miremont,  habitant au Joug, paroisse de Varennes-sur-Usson, est seigneur.  \r\nCONTOURNAT Le premier seigneur de Contournat connu à ce jour,  Etienne d'Auzon, est mentionné à la fin du XIIIe  siècle.                                  LAVAURE, avant 1630 Antoine de Boisseret, bourgeois de Sauxillanges, surintendant des Coches de France, est seigneur de Lavaure, sa veuve  remarié à Dominique Dreux, fait saisir Lavaure comme créancière de son premier mari et obtient   en 1835  une sentence adjugeant le fief à Jacques Chardon, avocat au parlement   de Clermont. En 1654, le fils de celui-ci le vend à Etienne Trottier, conseiller à la cour des Aides de Clermont. En 1729 le même Etienne Trottier fait   donation à Jean de Freydefont, seigneur   de Marcillat. Le château reste dans cette famille   jusqu'à la  Révolution.                                                                               COPPEL, au milieu du Xe siècle, une famille Coupeilh est citée, elle possède quelques terres dans la région. Au  XIe siècle, une fortification est signalée sur la commune. Elle aurait été construite à la demande de Godefroy de Bouillon. Au XIIIe siècle, il semble qu'un château soit construit sur la colline. Seigneurie de Contournât, Les milites d'Auzon sont au XIIIe siècle propriétaires de la seigneurie et de son château. Les vestiges actuels sont ceux d'un château du XVe siècle qui posent ses fondations sur celui d'un précédent édifice vraisemblablement construit avant le XIIIe siècle.","architecture":"St-Julien de Coppel est partiellement arasé.                                    Château de Chalard est situé au sud-ouest du bourg,  au lieudit Chalard le Haut. Donjon-logis carré de quatre niveaux  du XIIIe siècle, le dernier est percé de baies-créneaux et   conserve une haute et étroite archère. Malgré le bourrage abusif des joints, on voit   que les angles sont soigneusement chaînés avec des pierres de taille en attente après le harpage. Un logis rectangulaire de deux niveaux et demi sur trois travées lui a été accolé, il a été prolongé par la suite.                                                                                   Contournat auquel appartiennent les vestiges actuels a été bâti au XVe siècle sur les bases d'un précédent  édifice,  il ne semble pas avoir subi  de grosses transformations  au XVIe siècle, la partie ruinée à l'est, pourrait même être à l'abandon depuis cette époque,  il a conservé des ouvertures, une meurtrière, un escalier à vis et des cheminées d'origine,  une description de 1674 laisse supposer que le château possédait trois étages plus un galetas, des bâtiments agricoles ont été bâtis, à l'est sur la partie ruinée du château, en partie  avant 1834, la fontaine, daterait  de 1813, restauration  respectant les vestiges d'origine, par les actuels  propriétaires, vraisemblablement au cours de la 2e moitié du XXe siècle.                                                                                        Lavaure  situé à 1 km au sud ouest du bourg. Petit donjon-logis de trois niveaux auquel est accolé un logis de 2 niveaux sans solution de continuité, le tout est fortement talluté. Enceinte avec un flanquement.  Les vestiges de Coppel  semble remonter au XIIIe siècle car la tour qui subsiste est circulaire, avec un épais mur de protection. Il ne semble pas avoir été conçu comme résidence d'un seigneur local  du même nom car il ne possédait que peu de moyens de défense. Il était sans doute utilisé comme moyen de surveillance de la vallée et comme relais de signaux visuels entre tous les châteaux .                                                                Coppel, ces vestiges actuels sont ceux d'un château du XVe siècle qui posent ses fondations sur celui d'un précédent édifice  construit avant le XIIIe siècle.","habitants":"Famille Coupeilh \r\n        \"","divers":"Plusieurs châteaux à Saint-Julien de Coppel, contournat et Lavaure le plus typique sont les vestiges de Coppel.","gps":"","images":["../image/image_63/63_Coppel_1.jpg","../image/image_63/63_Coppel_2.jpg","../image/image_63/63_Coppel_3.jpg","../image/image_63/63_Coppel_4.jpg","../image/image_63/63_Coppel_5.jpg","../image/image_63/63_Coppel_6.jpg","../image/image_63/63_Coppel_7.jpg","../image/image_63/63_Coppel_8.jpg"]},"Consult_chateau_formulaire20fe":{"id":"Consult_chateau_formulaire20fe","dept":"63","canton":"Rochefort-Montagne","commune":"Orcival","nom":"Cordes_Orcival","type":"Château","periode":"XIII","histoire":"CORDES, en 1268, le château et la seigneurie d'Orcival appartenait à Guillaume de Chalus, la famille de Chalus le conserva pendant près de 400 ans, et en 1659   vendit la seigneurie à Emmanuel dAllègre qui possédait déjà le château de Tourzel. Son fils, Yves de Tourzel, marquis dAllègre, devenu maréchal de France en 1724, a contribué à rénover et à embellir son château de manière à en faire une demeure de plaisance,  telle quon les appréciait au début du XVIIIe siècle.  De la même époque datent les soubassements de la cour dhonneur, les bassins et la partie ainsi que le bâtiment des communs  et la porte de la chapelle. Sur le mur,  grille en fer forgé du XVe siècle qui était placée, à lépoque,   sur la porte du donjon,  porte dentrée principale du château. Les jardins à la française, dessinés   par  Le Nôtre en 1695, constituent un cadre agréable pour se promener et contempler le château de l'extérieur. Le maréchal d'Allègre s'éteint en 1733, lors du partage  passa  à l'une de ses filles la duchesse d'Harcourt fille de l'infortunée  Marie-Thérése de Barbezieux.  Le château sera vendu en 1755 à Pîerre Grangier avocat de Riom et anobli secrétaire du roi, les Grangier  se succède  en ligne directe jusqu'en 1850 décès de Louis-Joseph sans postérité, transmît à sa cousine Germaine de Wauthier.  En 1873 passe en alliance part sa fille au marquis de Mons dont les descendant les Bonnevie  vendent le château démeublé et délabré à un américain, quatre propriétaires se succéderont avant d'être acquis en 1965 par la famille  Perchaud.","architecture":"Château  de Cordès reconstruit au XVe siècle sur des soubassements plus anciens, forteresse  en équerre. Couronné de mâchicoulis  flanqué aux angles extérieures   de tours rondes coiffées de toits en poivrières.  Au coeur un donjon autrefois surmonté d'une guette. Remanié au XVIIe siècle les jardins sont classés, leur disposition est extrêmement ingénieuse car, comme il est classique pour les maisons fortes de cette époque, le château est placé à l'extrémité d'un éperon accessible d'un seul coté. C'est donc de ce côté qu'il fallait trouver l'emplacement de jardins un peu étendus mais la déclivité du terrain engendrait des difficultés dont le créateur s'est très habilement tiré. L'avenue d'accès fut établie dans une tranchée creusé à cet effet, que cantonnèrent deux longues terrasses portant les jardins. Bien plus, afin de réserver la surprise aux visiteurs, ils furent bordés de hautes charmilles qui dérobent la vue. \r\nL'entrée dans la cour d'honneur, qui comporte deux bassins chantournés entourés de gazon où se dressent des ifs taillés, se fait par un portail d'architecture surmonté d'une balustrade entre deux tourelles, les jambages sont faits de deux massifs de pierres creusés de niches.","habitants":"Famille de Guillaume de Chalus\r\n        \"","divers":"Château de Cordès","gps":"","images":["../image/image_63/63_Cordes_Orcival_1.jpg","../image/image_63/63_Cordes_Orcival_2.jpg","../image/image_63/63_Cordes_Orcival_3.jpg","../image/image_63/63_Cordes_Orcival_4.jpg","../image/image_63/63_Cordes_Orcival_5.jpg","../image/image_63/63_Cordes_Orcival_6.jpg","../image/image_63/63_Cordes_Orcival_7.jpg","../image/image_63/63_Cordes_Orcival_8.jpg"]},"Consult_chateau_formulairee81c":{"id":"Consult_chateau_formulairee81c","dept":"63","canton":"Champeix","commune":"Courgoul","nom":"Courgoul","type":"Château","periode":"XIV","histoire":"COURGOUL, fut édifié au XIVe siècle, en 1337, au cours des siècles, les seigneurs se sont succédé, Louis de Murat vend le fief à Roger Jehan, seigneur de Saint-Floret. En 1526, la seigneurie est à   François de Creste,  seigneur de Creste, Courgoul et la Garde. En 1655, François de Chauderasse est seigneur de  Creste, Courgoul et Solelhiat, de Chausserasse et au XVIIIe de Malafosse, en 1723, Jacques de Boniol, marchand d'Issoire rendit foi et hommage au Roi pour une dîme dans la paroisse. En 1789  M. de Malafosse du Coufour, officier de cavalerie était seigneur de Courgoul.","architecture":"Grosse bâtisse flanquée dune tour dangle circulaire, entrée du village,  reste d'une  enceinte quadrangulaire, le logis en équerre de deux niveaux,  est appuyé à une tour ronde d'angle percée d'une courte archère, un arc de décharge indique peut-être l'emplacement d'une canonnière rebouchée.","habitants":"Famille de Louis de Murat\r\n        \"","divers":"Château-forteresse de Courgoul et gentilhommière","gps":"","images":["../image/image_63/63_Courgoul_1.jpg","../image/image_63/63_Courgoul_2.jpg","../image/image_63/63_Courgoul_3.jpg","../image/image_63/63_Courgoul_4.jpg","../image/image_63/63_Courgoul_5.jpg"]},"Consult_chateau_formulaire6a97":{"id":"Consult_chateau_formulaire6a97","dept":"63","canton":"Courpière","commune":"Courpière","nom":"Courpiere","type":"Château","periode":"XIII-XV","histoire":"COURPIERE plusieurs châteaux dans cette commune, les Barges (voir article).\r\nBELIME  En 1289, Chatard Chaulet, damoiseau, est seigneur de Ravel, Salmeranges et Bélime, il passe une transaction   avec les habitants au sujet des corvées de charrois. Vers 1350, Philippe de Miremont, chevalier, est seigneur et en 1467, Claude de Miremont est seigneur de Bélime. En 1490, le fief est acheté par Guillaume de  Veyny, seigneur du Bouchet et bourgeois de Montferrand. Vers 1591, Benigne de Veyny d'Arbouze est marié à Anne de La Ronde. En 1617, après divers héritages et ventes,  le flef devient la propriété des La Barge. En 1689, le comte François-Christophe de la Barge est seigneur de Belime.  \r\nLAUDAN, vers 1467 Pierre de Fontsauvage, écuyer, est seigneur. En 1591, la seigneurie est partagée entre la famille  de Lodant et celle de la Blanchisse. Le 26 juillet 1627, Blaise de Cistel épouse Anne de  Lodant. En 1666, leur fils  Charles de Cistel, baron de la Garde et de Chavannes. En 1710,  François de Lodant rachète la part  des Cistel. Sa veuve, Françoise d'Aurelle, donne la propriété réunie à son frère Pierre-Gabriel d'Aurelle de Champetières. Après 1767,  le Château passe à Blaise d'Aurelle, comte de Champetières. Il partage sa résidence entre son château de Domaize celui de la Baronnie près  de Courpière et celui de Bonnefille près de Riom.\r\nRIOUX, l'origine de l'actuel château remonte au XVe siècle, mais il a sans doute été construit sur un édifice plus ancien, puisqu'un fief de Rioux aurait existé antérieurement, de style néo-gothique, il fut rebâti à l'identique par le comte Dupeyroux de Salmagne fin XIXe siècle en lieu et place d'un ancien château du XVIe siècle, ensuite il abrita plusieurs communautés religieuses dont les moines de Lérins, depuis il fut la propriété de plusieurs personnalités de la région, madame Geneviève Thevenet vous accueille toute l'année, transformé en hôtel restaurant.\r\nPas d'historique pour Foulhoux et de Tallades.","architecture":"Rioux, le château a   fait l'objet de plusieurs aménagements, des travaux semblent avoir été entrepris à la fin du XVIIIe siècle, comme en témoigne la construction d'une fontaine datée 1798, adossée au mur de clôture est de la  propriété. Le corps central  a peut-être  été remanié à cette époque, ou au début  du XIXe siècle. C'est dans le  premier quart du XIXe siècle  en tout cas, qu'est construite (ou reconstruite) l'aile sud,  la date 1822 est portée  sur le linteau de porte  situé au sud-ouest. Le château, encore debout dans la première moitié du XXe siècle, a été laissé à l'abandon et il est actuellement complètement ruiné. La tour d'escalier est en pierre de taille d'andésite jusqu'à la hauteur du premier étage,  le reste des murs du château est en moellons de basalte avec un enduit partiel.   Les parties les plus anciennes avant-corps nord et corps central, semblent avoir eu un étage carré et un étage en surcroît,  l'aile du XIXe siècle possède deux étages carrés et un étage en surcroît. Au milieu du XXe siècle, le corps central était couvert d'un toit à longs pans avec pignon couvert, l'avant-corps nord,   d'un toit en pavillon et l'aile sud d'un toit à croupes. \r\nBelime  Ce château (Tour-du-Maure ) fut construit au XVe siècle. C'est un donjon-logis rectangulaire de trois niveaux sur   une haute base talutée aveugle. A un angle, il est accosté d'une haute tour circulaire d'escalier. Logis et tour  sont couronnés de mâchicoulis  dont il reste les consoles à trois ressauts. La porte et une fenêtre de la tour ronde ainsi qu'une fenêtre haute du logis conservent des modénatures du XVe siècle. Laudan ou Lodan est situé à 3 km au sud ouest du bourg,  chemin s'embranchant au sud après Courtesserre. Enceinte quadrangulaire à flanquements circulaires d'angle, il en reste un  très taluté.","habitants":"Famille de Claude de Miremont                                                         Famille de François de Lodant                                             \r\nComte Dupeyroux de Salmagne\r\n        \"","divers":"Château des Rioux,de Foulhoux, de Tallades, de Laudan et de Belime.","gps":"","images":["../image/image_63/63_Courpiere_1.jpg","../image/image_63/63_Courpiere_2.jpg","../image/image_63/63_Courpiere_3.jpg","../image/image_63/63_Courpiere_4.jpg","../image/image_63/63_Courpiere_5.jpg","../image/image_63/63_Courpiere_6.jpg","../image/image_63/63_Courpiere_7.jpg","../image/image_63/63_Courpiere_8.jpg"]},"Consult_chateau_formulaire988e":{"id":"Consult_chateau_formulaire988e","dept":"63","canton":"Veyre-Monton","commune":"Le Crest","nom":"Crest_Creste","type":"Château","periode":"XIII","histoire":"CREST (le), en 980 est connu Aymuin, l'ancêtre de la famille, témoin d'une donation à Cluny par le vicomte de Clermont.   Vers 1017, son fils Elie est dit seigneur du château du Crest . En 1111, un autre Elie est chevalier de l'oppidum du Crest,  terme qui désigne une agglomération fortifiée,  un village est dès lors associé au château. En 1215 Helias du Crest fait hommage au dauphin pour son château. Dans la première moitié du XIIIe siècle le château est toujours à la famille éponyme, se transmettant le prénom Elie. En 1249, une partie du château est passée à un collatéral Robert de Lantoiol, qui se dit seigneur. En 1262 le comte dauphin Robert II fait hommage à Alphonse de Poitiers (frère de St Louis), apanagé de la \"Terre d'Auvergne\", pour le château tenu par les héritiers du Crest. Le Crest est alors devenu une co-seigneurie divisée en deux parts aux mains des gendres,  les Lantoiol, dont héritent  les Bussières, d'une part et les Saint Floret d'autre part. En 1278 est mentionnée la chapelle du château. En 1299, Géraud de Bussières  est seigneur de Châlus et co-seigneur du  Crest  pour moitié;  en 1303 et 1307 il est dit seigneur de Châlus, du Crest et de Saint-Agoulin. En 1452, Henri et Jean Bour sont châtelains et disposent d'une résidence  dans l'enceinte du château. La famille des seigneurs du Crest s'éteignit vers le milieu du XIIIe siècle.\r\nRien à voir  avec le château dans la commune du Creste  canton de Champeix qui au XIIe siècle, Durand de Crestes, seigneur attesté en 1199 au XIIIe siècle 1262, Robert, Dauphin d'Auvergne, rend foi-hommage au Prince Alphonse de Poitiers pour Crestes qu'il reconnut tenir de lui en arrière fief.  Au  XVIe siècle, seigneurie est à la famille d'Apchier, Baron puis marquis de Montbrun au XVII-XVIIIe siècle seigneurie à la famille de Bosredon, Sénéchal de Clermont en 1789 .","architecture":"Château-fort de Crest  ruiné situé sur une butte isolée dominant le village, tour cylindrique surmontée d'une cloche (c'est le flanquement d'une enceinte) et base d'une autre tour. Dès la première moitié du XIe siècle et jusque dans les années 1700, Le Crest était une place forte ceinte de trois puissants remparts successifs comme le montre le dessin de Guillaume Revel daté de 1450.  Ce village est bâti à l'extrémité de la Montagne de la Serre. Il est dominé par une tour, seul vestige d'une place forte, ceinte de trois puissants remparts successifs comme l'a montré le dessin de Guillaume Revel daté du XVe siècle. De la tour, on bénéficie d'un vaste panorama sur le plateau de Gergovie au nord, la vallée de l'Allier et le Livradois à l'est, le Massif du Sancy au sud, et la Chaîne des Puys à l'Ouest.                                                            Creste, forteresse dont je n'ai pas d'historique.","habitants":"Famille d'Helias du Crest\r\n        \"","divers":"Châteaufort de Crest avec sa tour de l'horloge et ses vestiges,  et sa forteresse de Creste.","gps":"","images":["../image/image_63/63_Crest_Creste_1.jpg","../image/image_63/63_Crest_Creste_2.jpg","../image/image_63/63_Crest_Creste_3.jpg","../image/image_63/63_Crest_Creste_4.jpg","../image/image_63/63_Crest_Creste_5.jpg","../image/image_63/63_Crest_Creste_6.jpg","../image/image_63/63_Crest_Creste_7.jpg","../image/image_63/63_Crest_Creste_8.jpg"]},"Consult_chateau_formulaire02a1":{"id":"Consult_chateau_formulaire02a1","dept":"63","canton":"St-Dier-d`Auvergne","commune":"St-Jean-des-Ollières","nom":"Croizat","type":"Fort","periode":"XIII","histoire":"FORT-CROIZAT, en 1330 Guillaume Lambert seigneur de Croizat rend hommage à l'évêque de Clermont. En 1447 Louis de Fredeville, seigneur du lieu, obtient   des lettres de rémission pour   s'être emparé à la mort de sa cousine Louise de Rochefort, veuve de Blain V Le Loup, du château de Croizat, qui revint à son fils Jacques Le loup.  Au XVIIIe siècle, la paroisse de Saint-Jean était considérée comme une « montagne stérile » ;La terre faisait partie de la Seigneurie de Boisonnelle sauf au nord le petit fief de Croizat. À cet endroit il y eut longtemps le même seigneur De Bard de Chauriat ; puis passa à la famille Seguin Avant  1506, Guillaume Seguin   achète le fief et   devient seigneur de Bard et   de Croizat. En 1579, Benigne Seguin, dame de Bard et de Croizat, épouse Guillaume de Bart seigneur de Curmilhat. Il fut vendu en 1669 à Jean Delaire, président à la cour des Aides de Clermont. Sa famille le conserva jusqu'en 1789. Du château il ne reste qu'une tour.\r\nLa tour du Miodet : il s'agit d'un ancien château déjà en ruine en 1403 à l'époque de Boissonnelle. Leurs seigneuries étaient liées. Son emplacement est localisé entre la Vie et Saint-Jean près du ruisseau de Lagas. Il ne reste aucun vestige à nos jours. Le Seigneur de l'époque féodale se qualifiait toujours de seigneur de Boissonnelle et Veaux de Méodes ou Viomiodes. Ce nom dérivé de Val-Méode, désignait une châtellenie dont le territoire, comme son nom l'indique devait comprendre toute la vallée de la Méode (Miodex) rivière qui traverse la commune de Saint-Dier et enserre le bourg dans un lacet de son cours, subitement détourné par les rochers.","architecture":"La Garde était un oppidum gaulois et ensuite un castrum romain. Il y eut ensuite un château et une chapelle. Château-fort ruiné, situé à 2,5 km du bourg.  La tour du Miodet, il s'agit d'un ancien château déjà en ruine en 1403 à l'époque de Boissonnelle.  Donjon du château fort en amande et traces de logis. Le donjon cylindrique à bec a une base fortement talutée et un couronnement conservant des boulins de hourds. La porte  ouverte à l'étage,  était précédée d'un balcon en  encorbellement,  accessible par un escalier extérieur en bois dont on voit encore  les traces.  L'appareil régulièrement lité est en pierres assez sommairement équarries non  surfacées, de formats variables,  assemblées à larges joints de mortier. Les encadrements des baies, des archères sont en grès rose surfacé. A cause de sa forme originale on date généralement cette tour postérieurement au premier quart du XIIIe siècle, cependant l'ouverture percée dans l'éperon et qui l'affaiblit inutilement pose problème et ne plaide pas pour une date trop haute.","habitants":"Famille de Guillaume Lambert \r\n        \"","divers":"Vestiges et château de Croizat","gps":"","images":["../image/image_63/63_Croizat_1.jpg","../image/image_63/63_Croizat_2.jpg","../image/image_63/63_Croizat_3.jpg"]},"Consult_chateau_formulaire3c6b":{"id":"Consult_chateau_formulaire3c6b","dept":"63","canton":"Combronde","commune":"Davayat","nom":"Davayat","type":"Château","periode":"XVI","histoire":"DAVAYAT, construit en 1595 par Blaize Rose bourgeois de Riom, à son décés le domaine passe par héritage à Amable Valleix consul de Riom en 1658, son fils Guillaume  futur doyen des conseillers du roi vendra le domaine à Claude Dutour de Salvert, écuyer secrétaire du roi.  Au XVIIIe siècle, la propriété fut vendue de nouveau  à la famille Dutour, récemment anoblie, mais les agrandissements et les embellissements restèrent inachevés.  Le château passera par alliance au XIXe siècle par Clotilde de Salvert-Bellenave avec Marc-Antoine vicomte de la Bar  de la Condamine, leur fils  Raymond de Bar commandant d'Armée en 1870 représentant le département  à l'assemblée nationale sous la IIIe République et à sa mort lègue le château à sa nièce Germaine de Bar de la Condamine, vicomtesse,  passera aux Saulieu Charles-Amable de Saulieu qui parti avec La Fayette  aux guerres d'indépendances américaine,   Jacques de Saulieu toujours propriétaire de Davayat.                                                              A deux kilomètres à l'ouest, à Gimeaux un château de plaisance le MONTACLIER propriété de la commune à servit d'hôpital pendant la guerre de 1870,et à l'Est  SAULNAT à Cellule  qui fut construit par un ministre de Louis XIV. C'était la plus grande propriété d'Auvergne, clôturée de murs en pierres, au XVIIIe siècle. Transformé en hôtel restaurant.","architecture":"Le château de Davayat fut édifié par campagnes successives à partir d'un pavillon construit à l'extrême fin du XVIe siècle par un magistrat riomois.  Ce pavillon fut d'abord agrandi dans la deuxième moitié du XVIIe siècle, à l'est  et à l'ouest, par un consul  de Riom, Amable Valeix, qui ne put achever  les travaux. Ce corps de bâtiment allongé, sur six travées et trois niveaux, comporte dans la travée axiale de la façade sud, un  oculus à aileron   surmonté d'un fronton à boules. Ces mêmes boules ornent les lucarnes à encadrement de pierre. A cette époque fut probablement aménagé un premier jardin à la française, des deux ailes en retour prévues, seule l'aile Est fut réalisée. le jardin fut organisé en grandes allées, l'entrée d'honneur fut close d'un portail de ferronnerie à fronton. Au XIXe siècle,  le parc fut transformé à l'anglaise, avant de retrouver au XXe siècle  un dessin à la française  grâce à l'intervention du paysagiste moulinois Trèves. \r\nDans le parc, se trouvent une chapelle désaffectée en 1707 puis restaurée en 1837, ayant conservé son décor et  son mobilier, un pavillon, une serre, une pergola en forme de temple antique  et les communs.","habitants":"Famille de Blaize Rose\r\n        \"","divers":"Château de Davayat,de Montaclier et de Saulnat.","gps":"","images":["../image/image_63/63_Davayat_1.jpg","../image/image_63/63_Davayat_2.jpg","../image/image_63/63_Davayat_3.jpg","../image/image_63/63_Davayat_4.jpg","../image/image_63/63_Davayat_5.jpg","../image/image_63/63_Davayat_6.jpg"]},"Consult_chateau_formulaire9f4b":{"id":"Consult_chateau_formulaire9f4b","dept":"63","canton":"St-Dier-d`Auvergne","commune":"Domaize","nom":"Domaize","type":"Château","periode":"xvi","histoire":"DOMAIZE, cité en 1199 par Hugues Huffram, écuyer seigneur de  Domaize, en rend hommage au seigneur Baron Guy de Montboissier pour le fief qui passera en 1238 à Robert de Meymont, seigneur de Domaize et de Meymont, en 1335 le fief passe à la famille d'Uffan jusqu'en 1393  lorsque Astrong d'Uffan seigneur de Domaize  le rendit aux seigneurs de Montboissier. En 1424 par alliance de la famille Uffan avec les Montcelard  qui récupérèrent le fief mais ces derniers sans postérité, le fief passera à la soeur Catherine de Montcelard dernière héritière de Domaize.","architecture":"Château  de Domaize  n'a peut être pas de rapports avec les personnages historiques, il est d'époque Renaissance, remanié aux siècles suivants, présente des dispositions extérieures simples mais bien proportionnées. Il garde l'essentiel de ses structures et recèle d'éléments intérieurs originaux. Le plan centré avec cour intérieure de circulation et quatre tours d'angle, pourrait être issu de l'architecture classique de la Renaissance.  Les remaniements les plus importants ont eu lieu au XVIIe siècle. Les communs conservent, dans la grande salle basse, sur une voûte en berceau, un décor de fausses croisées d'ogives  pouvant remonter à la fin du XVIe siècle ou au  début du XVIIe siècle. L'intérieur présente au rez de chaussée, l'escalier à triple volée possède un décor peint au pochoir. Au premier étage, un petit oratoire ménagé dans la paroi de la tour nord-ouest, présente un décor de  stucs pastichant des lambrequins Renaissance. Le plafond  de la pièce voisine est à caissons peints. Une autre pièce est décorée  de caissons à fleurs en stuc. Au second étage, décors Louis XV avec traces d'aménagements remontant aux années 1830.","habitants":"Famille d'Astrong d'Uffan \r\n        \"","divers":"Château de Domaize","gps":"","images":["../image/image_63/63_Domaize_1.jpg"]},"Consult_chateau_formulaire79a1":{"id":"Consult_chateau_formulaire79a1","dept":"63","canton":"Royat","commune":"Durtol","nom":"Durtol","type":"Château","periode":"XVI","histoire":"DURTOL, les premiers seigneurs des terres de Durtol appartenaient à la famille Escot dès le début du XIe siècle, mais le château est mentionné au XIVe siècle. En 1353, le seigneur de Durtol a rendu hommage au seigneur de Tournoël pour son hôtel de Durtol et la forêt y attenant. La famille Crespat a compté parmi les  plus célèbres dynasties des seigneurs de Durtol. Le bourgeois Géraud Crespat a été anobli par le roi Charles VII  en 1435, et vers 1470 il a acquis de Pierre Escot les seigneuries de Durtol, Chanat, lEtang et Rochedun. Plusieurs générations de Crespat se sont succédé jusquen 1585.","architecture":"Durtol, ni le mot hôtel, ni son emplacement ne suggèrent un château fort.\r\nPeut-être sagissait-t-il à cette époque dun simple bâtiment construit  pour exploiter les ressources de la forêt et  servir comme logis de chasse. Durtol a été modifié maintes fois au fil des siècles,  deux corps de logis rectangulaire à trois niveaux, deux tours rondes en forme de cônes, et non  en forme de dômes comme actuellement, la belle balustrade en pierre de Volvic construite pour mettre en valeur la porte dentrée existe toujours.","habitants":"Famille Crespat\r\n        \"","divers":"Château de Durtol.","gps":"","images":["../image/image_63/63_Durtol_1.jpg","../image/image_63/63_Durtol_2.jpg"]},"Consult_chateau_formulairead74":{"id":"Consult_chateau_formulairead74","dept":"63","canton":"St-Germain-l`Herm","commune":"Echandelys","nom":"Echandelys","type":"Château","periode":"XVIII","histoire":"ECHANDELYS,La famille est connue dès lan 1181 lorsque Jean Roays est un des témoins de la donation faite par Pons de Solignac et sa femme Aigline  Saint-Jean du Puy de leurs droits sur le mas de Noustoulet. La famille est possessionnée à Solignac et au Brignon (Haute Loire) dès 1253. Cette seigneurie se divisât en plusieurs branches, les Vellaves, les Rochemure et les Motier de la Fayette.  La seigneurie d'Echandelys et de Bordes appartenait depuis le XVIe siècle à la famille de Roys, originaire du Velay, ils conserveront leurs biens pendant la Révolution. Avant la Révolution, la haute justice était détenue par les seigneurs de La Fayette pour une grande partie et de Sugères pour la partie nord-est.  On trouve dans le bourg un château toujours propriété de la famille des Roys,  Le 22 Juin 1814  Etienne Annet des Roys épouse Jenny Hoche , fille du général.","architecture":"Echandelys, l'édifice, de plan globalement en U, présente une aile nord de structure médiévale de la fin du  XVIIIe siècle. La face Est a été reprise au XIXe siècle. A l'intérieur,  le rez-de-chaussée conserve trois pièces avec décor en stuc du  XVIIIe siècle et,  au deuxième étage, une chambre Empire. Il existe comme dans beaucoup de communes auvergnates de nombreuses croix disséminées sur tout le finage.","habitants":"Seigneur locaux\r\n        \"","divers":"Château d'Echandelys.","gps":"","images":["../image/image_63/63_Echandelys_1.jpg","../image/image_63/63_Echandelys_2.jpg"]},"Consult_chateau_formulaire0ed0":{"id":"Consult_chateau_formulaire0ed0","dept":"63","canton":"Aigueperse","commune":"Effiat","nom":"Effiat_Denone","type":"Château","periode":"XV","histoire":"EFFIAT, fief  en 1375 de Louis de Martinges, passa aux Neufville et acquit  par Gilbert II de Coëffier qui construit en 1557 et fait partie d'un grand projet d' Antoine Coëffier de Ruzé d'Effiat, dit Ruzé par l'alliance avec Bonne Ruzé, ami de Richelieu et conseiller du roi en 1625, dont les terres furent érigées en marquisat en 1627 et qui devint maréchal de France en 1631. Ses trois fils ne suivent pas les pas  du maréchal d'Effiat. Le second Henri d'Effiat marquis de Cinq Mars lieutenant du roi à quinze ans  et grand écuyer de Louis XIII à dix neuf  grandit au château avant de devenir le favori de Louis XIII entraîné dans une conspiration contre Richelieu. Il fut condamné à avoir la tête tranchée  en 1642, la mère lègue  le château  à son petit fils qui décédera sans postérité en 1719, le château revient à un parent Paul-Jules de la Meilleraye neveu du cardinal de Mazarin, puis passera à Louis de la Tour d'Auvergne et au financier John Law. Le château est racheté  en 1728 par le comte de Sampigny d'Yssoncourt qui y résidera jusqu'en 1846  date à laquelle la dernière  et heritière ruinée s'en débarrasse le vend à un marchand nommé Boucard qui le revend aussitôt  à la famille de Moroges qui le sauve de la destruction.                                                                            DENONE, ce charmant petit château, entouré de douves, d'allées de tilleuls et de marronniers, a été édifié dans les années 1560 par Charles de Marillac qui fut ambassadeur de France au temps de François Ier et de Henri II. Il appartint notamment aux comtes d'Effiat, ainsi qu'à la famille de Louise de Marillac. Marqué par le destin tragique de l'un des leurs, Cinq-Mars qui inspira le roman de Vigny. Le Cardinal de Richelieu, reçu par le Marquis d'Effiat qui avait acheté Denone a une héritière des Marillac, y séjourna du 4 au 8 septembre 1629 lors d'un voyage en Auvergne. Un superbe lit Louis XIII à baldaquins cramoisis rappelle le passage de Richelieu dans la chambre dite \"du Cardinal\" où on peut admirer de ravissants plafonds peints dans un style d'inspiration italienne. Au XVIIIe siècle le domaine appartient au financier John Law, aujourd'hui à la famille Pourtier.","architecture":"château  d'Effiat est situé au milieu d'une enceinte rectangulaire limitée par un canal formant douves. L'entrée se fait par un pont-levis et une porte monumentale. Le château est actuellement constitué d'un corps de logis rectangulaire d'ordonnance classique à trois niveaux encadré de deux pavillons rectangulaires saillants, et les ailes qui les prolongeaient ont disparues. La façade est ornée de pilastres doriques. Les bâtiments des communs et de la ferme datent de la fin du XVIIe siècle, toiture en croupe  avec pente assez prononcé.  Le château d'Effiat a été classé monument historique le 16 avril 1942 puis inscrit 6 juin 1980 et à nouveau classé le 10 mars 2004.      \r\nLe château de Denone, admirable bâtiment dont la construction remonte au XVIe siècle, situé dans le hameau du même nom. Le château a été construit en 1550 à l'emplacement d'un château féodal. Le bâtiment Renaissance s'appuie sur 3 tours plus anciennes, restes d'une petite forteresse antérieure, Il est situé au milieu d'un jardin aménagé au XVIIe siècle bordé à l'ouest de douves, et à l'est de communs dont certaines parties datent du XVIIe siècle. Le château est constitué de deux corps de logis perpendiculaires, flanqués de trois tours circulaires  à leurs angles extérieurs. Ils sont divisés en pièces faisant  toute la largeur des ailes, moins le couloir qui les  dessert.  Ces deux couloirs distribuent l'édifice à partir   d'un escalier droit dont les  volées sont séparées par un mur d'échiffre.  La tour nord renferme un escalier à vis. A l'intérieur l'édifice a conservé au premier étage, deux plafonds en bois à poutres et poutrelles décorés de peintures de la fin du XVIe ou début XVIIe siècle,  les autres pièces présentent des plafonds à la française, des cheminées XVIIe et XVIIIe siècle.","habitants":"Marquis de Cinq Mars                                                            Famille de Charles de Marillac\r\n        \"","divers":"Château d'Effiat et de Denone.","gps":"","images":["../image/image_63/63_Effiat_Denone_1.jpg","../image/image_63/63_Effiat_Denone_2.jpg","../image/image_63/63_Effiat_Denone_3.jpg","../image/image_63/63_Effiat_Denone_4.jpg","../image/image_63/63_Effiat_Denone_5.jpg","../image/image_63/63_Effiat_Denone_6.jpg","../image/image_63/63_Effiat_Denone_7.jpg","../image/image_63/63_Effiat_Denone_8.jpg","../image/image_63/63_Effiat_Denone_9.jpg"]},"Consult_chateau_formulaire14c3":{"id":"Consult_chateau_formulaire14c3","dept":"63","canton":"Billom","commune":"Egliseneuve","nom":"Egliseneuve","type":"Château","periode":"XV-XVI","histoire":"EGLISENEUVE, trois châteaux dans cette commune.                                  AUTEYRAS, avant 1280, Aymeric d'Auteyras est seigneur. Vers 1370, Marguerite, dame d'Auteyras, porte le château par   mariage à Jean Lespes dit  de Valens. Au XVIe siècle, il passe par héritage à Fiacre de Laire, fils de Jacques, qui  est seigneur de Laire, des Cornets et de la Broussolière. En 1571,  Madeleine de Laire l'apporte par mariage à Jacques du Croc, seigneur du Mas et  de Neuville. En 1622 Madeleine du Croc, leur fille. épouse Henri de Malras, seigneur d'Yole   dans le Cantal. En 1675, François de Malras, chevalier, Comte d'Yolet, est seigneur de La Fouilhouse, Beaulieu et Le Cheix, habite au château d'Auteyras. Ses héritiers le conservent jusqu'en 1768.                                     \r\nPEYROUSE,  avant 1645, Charles de Bertaud est seigneur de Pouzadoux et La Peyrouse. En 1667 et 1696 le fief est encore   aux Bertaud, ce sont eux sans doute qui font les grands travaux. En 1762 il appartient aux Jésuites de Billom. En 1921,  la société Michelin en fait une école de filles tenue par les soeurs de Saint-Vincent de Paul.  En 1956, l'école  est reconvertie et devient un établissement public.                                                         ESCOLORE,  en 1455, le château est à Antoine du Cros, seigneur de Saint-Bonnet. Avant 1599, Pierre du Croc est seigneur du Mas, Autheiras et Escolore. En 1672, Louise de Montboissier-Beaufort-Canillac, veuve de François de Maltras, rend  hommage à l'évêque de Clermont  pour sa baronnie d'Escolore. Après 1768, la propriété passe par héritage à Marie de Maltras qui épouse Gilbert-Claude de Montagnac, marquis des lignières.","architecture":"Auteyras, château construit vers 1300, situé à 1 km au nord ouest du bourg,  au lieu dit Mas d'Auteyras. Enceinte quadrangulaire à trois flanquements circulaires et un flanquement carré.  L'enceinte intègre près d'un angle un donjon  logis carré antérieur. Les logis ont été remaniés au XVIIe siècle. Peyrousse, château construit au XIVe siècle,  à 1500 mètres au sud est du bourg près  de la rive sud.  Haut donjon  rectangulaire de cinq étages, un escalier en vis intérieur en occupe un angle. On lui a accolé de part et d'autre des  bâtiments plus récents. Près du château \"La Roche aux Fées\", grande table en pierre, posée horizontalement sur un rocher, creusée  de cavités faites  de main dhomme, c'est le plus ancien  témoignage connu dune occupation humaine sur le territoire de la commune.                                                                             Escolore, cité parfois sous l'appellation château des Méradoux, daterait du XIVe ou du XVe siècle ; , situé au sud-ouest du bourg,  à 200 m au lieu-dit \"le Château\" . Très grande enceinte à flanquements  circulaires d'angle pourvus d'archères-canonnières. La première mention connue de la seigneurie d'Escolore date de 1416 , seuls quelques vestiges de ce château ont été conservés, tour au nord-ouest, vestiges de murs d'enceinte avec meurtrières et canonnières à l'ouest et au nord, lorsque le château est acheté par les seigneurs d'Autheiras  en 1614, la tour est déjà en ruine, il semble que l'édifice continue à se dégrader au cours des XVIIe et XVIIIe siècles, puisqu'en 1820 il est considéré comme château ruiné, c'est sans doute peu après cette date que la propriété est lotie, des fermes sont édifiées sur les vestiges du château, un logis sur étable au nord-ouest daté de 1826, après 1834, à l'ouest, une grange a été bâtie contre l'ancien mur d'enceinte et un ancien bâtiment sur caves a été arasé,  à l'est, un atelier, dit boutique, peut-être pour le traitement du chanvre, est aménagé en 1852, en 1870, une autre ferme est construite au sud-est.","habitants":"Famille d'Aymeric d'Auteyras                                                             Famille de Charles de Bertaud                                                         Famille de Pierre du Croc\r\n        \"","divers":"Château d'Auteyras de la Peyrouse et d'Escolore","gps":"","images":["../image/image_63/63_Egliseneuve_1.jpg","../image/image_63/63_Egliseneuve_2.jpg","../image/image_63/63_Egliseneuve_3.jpg","../image/image_63/63_Egliseneuve_4.jpg"]},"Consult_chateau_formulaire541d":{"id":"Consult_chateau_formulaire541d","dept":"63","canton":"Charbonnières-les-Vieilles","commune":"Charbonnières-les-Vieilles","nom":"Falvard","type":"Vestiges","periode":"XIII","histoire":"FALVARD, Antoine de Falvard, écuyer, est seigneur des Falvard en 1450. Le domaine passe à ses descendants directs, Noël, Gaspard, Guillaume et  Antoine, qui, en 1610, fit construire le château actuellement en ruines.  René de Falvard , fils dAntoine, très endetté, fut poursuivi en justice par ses créanciers. Le château fut saisi et adjugé avec une grande partie des domaines en novembre 1674 à Jean de Brion, conseiller au parlement de Paris, seigneur de Combronde.  Le château resta la propriété de la famille de Brion jusquà Louise-Antoinette de Brion qui épouse Charles Amelot, président du parlement de Paris. Les Amelot avaient loués le château à maître Pierre Hom, notaire Royal. En 1764, le marquis de Capony, noble florentin venu dItalie, acheta les Falvards et le  château de Combronde, seigneur de Combronde , Gilbert François de Capony ne profitera pas longtemps de ses biens, tué en duel à Paris par monsieur de Sampigny, intendant du château de Latour Serviat, suite à un différend lié à la chasse. En 1792, sa veuve se réfugie à Florence, sa terre natale.  \r\nLe sieur Rossignol acquiert la propriété des Falvard. Ses descendants loccupent encore actuellement.  Les de Falvard se sont illustrés au début du XVIIe siècle par une affaire étrange, Antoine ayant fait pendre un de ses serviteurs accusé du vol de la bague de son épouse, dût se repentir après que le bijou ait été retrouvé, en 1615, dans le nid dune pie.","architecture":"le seigneur des Falvard fit construire à ses frais le bas-côté gauche de léglise de Charbonnières où ses armoiries, bien que mutilées, sont toujours visibles de nos jours. Aujourd'hui il ne reste que des vestiges du château pans de murs et tours.","habitants":"Famille d'Antoine de Falvard\r\n        \"","divers":"Vestiges du château de Falvard.","gps":"","images":["../image/image_63/63_Falvard_1.jpg"]},"Consult_chateau_formulaire87be":{"id":"Consult_chateau_formulaire87be","dept":"63","canton":"Courpière","commune":"Olmet","nom":"Faye","type":"Vestiges","periode":"XIII","histoire":"Fort de la FAYE   dut être élevé peu de temps après la guerre féodale ayant opposé les Damas de Couzan en Forez aux Meymont d'Olliergues d'Auvergne. Les Montrevel qui la possédaient alors apportèrent des aménagements et des agrandissements pendant un siècle et demi. C'est à la fin de cette période que ces derniers furent les plus nombreux et les plus importants à tel point qu'ils conditionnent encore l'aspect et la consistance de la majorité des bâtiments de l'ensemble. Ils sont à mettre à l'actif de Guillaume de Montrevel. Sans doute élevé et instruit à l'abbaye voisine de Thiers où son oncle maternel était abbé, guerroyant d'abord simple chevalier avec cinq écuyers sous la bannière des ducs de Berry et de Bourbon prenant part à la croisade des chevaliers teutoniques en Prusse, présents aux batailles de Rosebecque et Verneuil, conseiller et chambellan du roi, assiégeant le palais des papes d'Avignon, ambassadeur à Chypre, en Espagne et en Angleterre, sénéchal de Beaucaire, gouverneur du Dauphin, ce vaillant militaire et diplomate mort en décembre 1413 établit si grandement sa renommée que ses descendants directs et indirects tinrent à porter de génération en génération conjointement à leur nom le surnom de l'Hermite de la Faye. Ses deux fils morts à Azincourt, une de ses deux filles apporta avec d'autres terres qu'il avait acquise, la seigneurie de la Faye aux Boulier du Charriol, petits vassaux de Thiers dont l'un d'eux édifia entr'autres choses le couronnement de mâchicoulis de la grande tour sud-est. Ceux-ci , faute d'héritier, laissèrent par donation la Faye à leur parent Calard de Frissonnet, de Viverols. Christophe de Calard réaménagea certaines parties intérieures du château des Calard tombés en friches, léguèrent la Faye aux Tallaru-Chalmazel qui le vendirent aux Simiane qui presque immédiatement la cédèrent aux Provenchères qui le possède donc depuis trois siècles.  En 2001, Charles-Henri de Provenchères lègue le château de la Faye à sa fille peu de temps après son mariage. Le jeune ménage s'investit depuis pour faire renaître ce site millénaire.","architecture":"Fort de la FAYE   Une famille féodale portant le nom de La Faye apparaît à partir du XIIe siècle. Le système défensif se compose d'une enceinte quadrangulaire cantonnée de tours. Le chemin d'accès était défendu par une tour sud est dominant l'ensemble de l'édifice. A l'intérieur de l'enceinte, deux  corps de logis en vis à vis s'adossaient contre  les courtines nord et sud. Le corps sud était coupé transversalement par la chapelle seigneuriale. Au XVe siècle la courtine sud du château fut largement ouverte pour éclairer le corps de logis qui lui était adossé. Au XVIIe, afin de rendre le château plus habitable,  un long bâtiment à arcades  fut bâti dans le prolongement  de l'entrée principale. Le château est abandonné depuis le XIXe siècle et dépecé, au corps de logis  subsiste qu'une porte dont le chambranle est orné d'une accolade, la tour nord-est était autrefois couronnée de  mâchicoulis dont il ne reste qu'un bandeau mouluré portant les corbeaux.","habitants":"Famille de Guillaume de Montrevel\r\n        \r\n        \"","divers":"Vestiges du château de la Faye.","gps":"","images":["../image/image_63/63_Faye_1.jpg","../image/image_63/63_Faye_2.jpg","../image/image_63/63_Faye_3.jpg"]},"Consult_chateau_formulaireb02c":{"id":"Consult_chateau_formulaireb02c","dept":"63","canton":"Royat","commune":"Sayat","nom":"Filigonde","type":"Château","periode":"XVI","histoire":"FELIGONDE  Le château de Féligonde, dabord maison forte, puis transformé et embelli sous Louis XIII, eut de nombreux démêlés avec le puissant voisin de Tournoël sur les terres de Volvic  et son propriétaire le vendit  à Mathieu Pélissier, Echevin  de Clermont Ferrand, vers 1630. Patrimoine familial  transmis de génération en génération depuis quatre siècles. Le château de Féligonde est entouré d'un parc de 7 hectares. Son histoire  et celle de Sayat se confondent jusquà la Révolution et même au-delà. Transformé en hôtel restaurant                                                                   ETANG, à quelques kilomètres à l'ouest sur la commune de Chanat la Mouteyre le château de l'Etang.   En 1489, Durand Crespat, bourgeois de Clermont, est seigneur de Durtol et de l'Etang. En 1578, Géraud  Crespat est seigneur de Chanat, l'Etang et Rochedun. En 1610, le château est vendu à Michelle Saulnier, épouse de Jean Gontrand. En 1665, il est revendu à Thomas Blau,  cette famille le conservera  jusqu'à la fin du XVIIe siècle.","architecture":"Feligonde, corps de logis rectangulaire à trois niveaux pavillon rectangulaire saillants de même niveau l'ensemble à toits peu inclinés.                 Château de l'Etang  édifié au XVe siècle est situé à deux km au sud-est du village.  Vers 1700,  enceinte quadrangulaire à flanquements  circulaires d'angle; il en subsiste deux accolés à un logis reconstruit de trois niveaux et demi. En 1980, vente du château de Chanat à la mairie de Gerzat pour ouvrir un centre de loisirs.","habitants":"Famille de Mathieu Pélissier                                                       Famille de Géraud  Crespat\r\n        \"","divers":"Château de Filigonde et de l'Etang.","gps":"","images":["../image/image_63/63_Filigonde_1.jpg","../image/image_63/63_Filigonde_2.jpg","../image/image_63/63_Filigonde_3.jpg"]},"Consult_chateau_formulaire81d4-2":{"id":"Consult_chateau_formulaire81d4-2","dept":"63","canton":"Vic-le-Comte","commune":"St-Georges-sur-Allier","nom":"Fontanay","type":"Château","periode":"XVII","histoire":"FONTANAY, par des familles de la bourgeoisie ou de la noblesse de robe. A l'intérieur, les pièces conservent un ensemble de cheminées,   boiseries, sols et plafonds, dont la chapelle aux lambris  de style Louis XVI, et  le salon Directoire. Les jardins, d'abord constitués  d'un parterre en terrasse  accessible par un escalier monumental à balustres de Volvic, ont  été aménagés au XIXe siècle en parc à l'anglaise.\r\nChâteau de Saint-Georges-es-Allier  Le bourg, fortifié au Moyen-Age, bâti sur les flancs du Montfoulhoux domine Cournon et la plaine de Limagne.","architecture":"le château de Fontanay  présente l'aspect sévère des demeures construites au XVIIe ou au début du XVIIIe siècle dans la région clermontoise. Les façades des  trois ailes disposées en U sont  régulièrement percées de baies  à encadrement de Volvic. Les portes  d'entrée présentent un tympan gothique armorié pour l'une, un encadrement à bossage en table pour une  autre, ou encore  une pierre armoriée de 1706  éléments protégés MH : le château en totalité avec ses décors intérieurs  comprenant le grand salon directoire, la bibliothèque, le bureau, la chapelle Louis XVI, la chambre au trophée et son parc avec l'escalier monumental du jardin en terrasse. \r\nSaint-Georges-es-Allier est dominé par un château, une tour et léglise paroissiale dédiée à St-Georges. Le château fut vraisemblablement construit au Moyen-Age (XIIIe ou XIVe siècle), modifié au XIXe
