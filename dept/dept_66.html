 d'histoire de Catalogne Nord Joseph Deloncle.","architecture":"Le Castillet, emblème de la ville de Perpignan est l'ancienne porte principale de l'enceinte. Le corps principal de l'édifice,  édifié en briques et marbre de Baixas remonte à l'époque aragonaise. Il a été construit à partir de 1368 et transformé sous Louis XI qui lui a rajouté sa terrasse actuelle et sa tourelle en brique couronnée d'une coupole. La seconde porte, la porte Notre-Dame a été construite à la même époque.  142 marches doivent être gravies pour accéder au sommet du monument. Les maçons aux XIVe et XVe siècles à Perpignan, utilisaient les galets tirés de la rivière et la brique, mais les constructions militaires étaient faites exclusivement en briques. \r\nLe Grand Castillet donjon polygonal flanqué de tours d'angle semi-circulaire  avec des protubérances en éperon  la tour est couronnée de mâchicoulis  courtine extérieure avec chemin de ronde mesure 31 mètres de longueur et le petit huit mètres. La hauteur des parapets du crénelage est de 20 mètres au-dessus du sol et celle du faîte de la tourelle de 29,20 mètres. Lépaisseur des murs est de 3,50 mètres à la base, de 2,80 mètres au deuxième étage et de 1,60 mètre au troisième. Un escalier en spirale dun diamètre de 2,77 mètres. Un second escalier en colimaçon a été pratiqué dans lépaisseur du mur entre le grand et le petit Castillet. Ils permettent lun et lautre daccéder à la terrasse.","habitants":"Infant Don Joan d'Aragon\r\n        \"","divers":"Le Castillet  Perpignan","gps":"","images":["../image/image_66/66_Perpignan_Castillet_1.jpg","../image/image_66/66_Perpignan_Castillet_2.jpg","../image/image_66/66_Perpignan_Castillet_3.jpg","../image/image_66/66_Perpignan_Castillet_4.jpg","../image/image_66/66_Perpignan_Castillet_5.jpg"]},"Consult_chateau_formulaire282a":{"id":"Consult_chateau_formulaire282a","dept":"66","canton":"Perpignan","commune":"Perpignan","nom":"Perpignan_Palais","type":"Palais","periode":"XIII","histoire":"PERPIGNAN,  délaissant Palma en 1276, le roi de Majorque Jacques II fait de Perpignan sa capitale , il commence  en 1274 à faire construire un palais entouré de jardins qui sera achevé en 1285, il se trouve au cur de la citadelle de Perpignan. Longtemps appelé le château de Perpignan. Le palais fut l'un des endroits clefs des négociations entre l'empereur Sigismond de Luxembourg et l'antipape Benoît XIII, pour permettre au concile de Constance de mettre fin au grand schisme d'Occident. Ce palais a connu quelques transformations lorsque les rois d'Aragon y ont pris la suite des rois de Majorque, et s'ouvre alors au XVe siècle, le siècle d'or catalan. Lors du siège de 1502, une grande partie de l'aile nord du palais fut détruite. Aujourd'hui seule une tour sur les sept qui jalonnaient l'enceinte subsiste à sa hauteur originelle. Le traité des Pyrénées en 1659  formalise une paix conclue entre le royaume d'Espagne et le royaume de France à l'issue d'une partie de la guerre de Trente Ans (1618-1648), la guerre franco-espagnole commencée en 1635,  et qui fait face au quartier populaire et pittoresque de Saint-Mathieu.  Il ne cède aux troupes de Louis XIII qu'après un siège de dix mois, le 9 septembre 1642. En 1680 reconstruction de l'enceinte par Vauban. Occupé par le génie en 1840 puis restauré par la municipalité au XXe siècle accueille des manifestations culturelles et expositions.","architecture":"Palais du roi, l'architecture de l'édifice influence orientale, ainsi qu'on peut le constater avec les remparts, arrondis plutôt que rectangulaires, de plan carré  autour de trois cours de 60 mètres de côté, c'est un palais-forteresse de style gothique, sont disposés quatre corps de bâtiment en galets noyés dans le mortier. Il est composé en entrant d'un donjon porche, au XIVe siècle  se sont ajoutées les tours d'angle en briques. Au XV-XVIe siècle réalisations des fortifications  extérieures que Vauban a remanié. A l'intérieur, la salle banquet, réception, réunion, les premiers appartements du roi lors de la construction. En face l'entrée la première chapelle dite basse ou de la Reine et au-dessus de part et d'autre de la chapelle haute les appartements du Roi et de la Reine. Le portail est  gothique visible par un soubassement avec des angles droits et des sculptures bien détachés de la paroi même si le haut de la porte est arrondi. À l'intérieur les fenêtres sont gothiques ainsi que la voûte. Dans l'alcôve qui cache la porte du Roi se trouve une frise verte qui reprend l'écriture arabe pour signifier Allah « Il n'est de Dieu que Dieu ». C'est un mélange de culture arabo-hispanique avec une architecture en évolution du roman vers le gothique.","habitants":"Roi de Majorque Jacques II \r\n        \"","divers":"Le palais des rois à Perpignan","gps":"","images":["../image/image_66/66_Perpignan_Palais_1.jpg","../image/image_66/66_Perpignan_Palais_2.jpg","../image/image_66/66_Perpignan_Palais_3.jpg","../image/image_66/66_Perpignan_Palais_4.jpg","../image/image_66/66_Perpignan_Palais_5.jpg"]},"Consult_chateau_formulaire6444":{"id":"Consult_chateau_formulaire6444","dept":"66","canton":"Perpignan","commune":"Perpignan","nom":"Perpignan_Patrimoine","type":"Patrimoine","periode":"XV-XX","histoire":"Pour la ville de Perpignan : l'hôtel Drancourt, la villa Les Tilleuls (actuel Musée Puig à Perpignan), l'immeuble François Gibrat (actuel lycée privé Maso avenue des Palmiers), l'hôtel du bureau de Bienfaisance (rue Bardou Job à Perpignan), l'immeuble Parès (boulevard des Pyrénées), l'immeuble Pams-Bouvier (quai Vauban), l'ancien café de la Loge rue de la Loge.  Maison Bausil rue Rabelais maison originale commandée par Louis Bausil vers 1920 à l'architecte catalan Raoul Castan. Des 3 frères Bausil, personnages du milieu culturel Perpignanais du début du XXe siècle, Louis est le peintre, ami de Maillol, Charles dirige la revue La Clavellina et Albert, journaliste et écrivain, fonda le Coq Catalan et conduira le jeune Charles Trenet vers la gloire.","architecture":"Tour à signaux - Château-Roussillon construite en galets de rivière au XIIIe siècle, cette ancienne tour à signaux mesure 20 mètres de hauteur et domine la plaine, de la méditerranée à la chaîne des Corbières. Elle permettait de communiquer avec d'autres tours éloignées, par l'embrasement de feux à son sommet.                                                                                                                                            Maison Bausil sur remparts et des hôtels particuliers.","habitants":"Noblesses perpignanèses\r\n        \"","divers":"Divers édifice du patrimoine de Perpignan","gps":"","images":["../image/image_66/66_Perpignan_Patrimoine_1.jpg","../image/image_66/66_Perpignan_Patrimoine_2.jpg","../image/image_66/66_Perpignan_Patrimoine_3.jpg","../image/image_66/66_Perpignan_Patrimoine_4.jpg","../image/image_66/66_Perpignan_Patrimoine_5.jpg","../image/image_66/66_Perpignan_Patrimoine_6.jpg"]},"Consult_chateau_formulaire30e6":{"id":"Consult_chateau_formulaire30e6","dept":"66","canton":"Argelès sur mer","commune":"Port-Vendres","nom":"Port_Vendres","type":"Vestiges","periode":"XIII","histoire":"A port-Vendres les vestiges  des Albères, de la Galline , le phare, la redoute de Fanal  et le Parès.                                                                                                                                                                            PORT-VENDRES; Abri naturel depuis tout temps, Port-Vendre a toujours connu une activité maritime. Se situe face à la Redoute du Fanal (inscrite monument historique en 1933). Elle a été détruite le 19 août 1944 par les Allemands qui fuirent la région alors qu'ils l'occupaient depuis novembre 1942 et firent sauter leurs entrepôts de munitions et de nombreuses mines marines qui détruisit quasiment toute la ville.                                                                                                          FANAL, la redoute a été construite en 1775 par le comte de Mailly (Augustin-Joseph de Mailly) suite a des subventions de Louis XVI pour améliorer et creuser le port La redoute du Fanal fait partie des nombreux ouvrages réalisés par Vauban entre les années 1673 et 1700 pour assurer la défense du port. Un phare à lanterne verte situé à tribord marque lentrée du port. La lumière du phare avait en 1780 une portée de plus de cinq lieues. Fanal est propriété de l'état. Il fait partie du recensement des immeubles Monuments Historiques en tant qu'ouvrage fortifié.                                                                                                                                                                                BEAR, la redoute Béar est une fortification de type Vauban construite en 1694 et située à Port-Vendres.                                                                                                                                                                                  Fort de la GALLINE, la Rectorie, il possédait une douzaine de maisons construites autour de l'église du même nom.  A la fin du XVIIIe siècle (1793-1795) eu lieu la terrible guerre franco-espagnole.                                                                                                                                                                      Le château PARÈS fut construit au tout début du XXe siècle par la famille de Parès qui faisait commerce de graines.","architecture":"Patrimoine de port-Vendres; La Galline, le village, situé à proximité de la frontière, subit de plein fouet les invasions successives des troupes espagnoles, puis françaises lorsqu'elles purent reconquérir leur territoire. Durant cette période, Banyuls ne put se défendre, contrairement à sa voisine Collioure, dotée d'une citadelle ou même d'Argelès, défendue par la Tour de Pujol.                                                                           Parès, il y aurait actuellement un projet de construction d'un hôtel 4 étoiles sur le site, qui garderait sa structure architecturale actuelle malgré l'ajout de deux bâtiments.                                                                                                              Obélisque : Pour marquer d'un symbole la naissance de Port-Vendres, et à la demande même des habitants d'alors, Louis XVI permet à la Province de faire ériger à sa gloire le premier monument élevé en France en son honneur. De cet obélisque, il ne restait plus rien après 1793, sinon les quatre tortues de bronze placées aux angles du collet entre la colonne et le dé soutenant les draperies. Ceci place Port-Vendres sur la route des tortues en Catalogne.","habitants":"Comte Augustin-Joseph de Mailly\r\n        \"","divers":"Citadelle de la Galline, redoute de Fanal, château de Parès  et l'obélisques  à Port-Vendres","gps":"","images":["../image/image_66/66_Port_Vendres_1.jpg","../image/image_66/66_Port_Vendres_2.jpg","../image/image_66/66_Port_Vendres_3.jpg","../image/image_66/66_Port_Vendres_4.jpg","../image/image_66/66_Port_Vendres_5.jpg","../image/image_66/66_Port_Vendres_6.jpg","../image/image_66/66_Port_Vendres_7.jpg","../image/image_66/66_Port_Vendres_8.jpg","../image/image_66/66_Port_Vendres_9.jpg"]},"Consult_chateau_formulaireeb48":{"id":"Consult_chateau_formulaireeb48","dept":"66","canton":"Prades","commune":"Porté Puymorens","nom":"Porté_Puymorens","type":"Vestiges","periode":"XI","histoire":"PUYMORENS, le village est dominé par le château de Puymorens, dit aussi Tour Cerdane au rôle stratégique essentiel, est mentionnée en 1288 comme inféodée par le roi d'Aragon au seigneur d'Enveitg. En 1310 Jaume II de Majorque la récupère, en renforce les défenses, le transformant en un château appelé parfois \"château de Puymorens\" dans les textes médiévaux. C'est là que la population de la vallée devait se rassembler en temps de guerre au milieu du XIVe siècle, construite au XIe siècle pour défendre l'entrée de la vallée ; elle fut achetée en 1308 par Jacques II de Majorque qui compléta la fortification, avec le château de Carol situé un peu plus bas dans la vallée. La Tour Cerdane, dont il est difficile, encore de nos jours, d'en déterminer son origine historique, est un élément d'un système de défense antérieur au Traité des Pyrénées signé le 7 novembre 1659 sur l'île des Faisans, dans les Pyrénées-Atlantiques, au milieu du fleuve côtier Bidassoa qui marque la frontière entre les royaumes de France et d'Espagne et aux conventions de Céret,  en mai 1660, et de Llivia, 7 novembre 1660.  Sa fonction militaire, au travers des textes anciens consultés, n'apparaît pas clairement d'autant que certains écrits, traduits succinctement, adaptés avec légèreté ou circonstanciels, sèment la confusion dans les esprits. Puymorens  vaste bailliage appartenant aux comtes de Cerdagne, puis au domaine royal, d'abord catalan (puis espagnol), ensuite français à partir du traité des Pyrénées (1659).","architecture":"La tour Cerdane château ruiné par décision royale. Les murs extérieurs enfermaient une surface considérable. Ils ont une épaisseur respectable avec des rangées de crénelages sur lesquels il s'y remarque des merlons de 1,20 à 1,30 mètre de long sur 0,50 de large, avec un chemin de ronde de type primitif du IXe ou Xe siècle, certainement élargi par des constructions en bois posées sur des boulins et des corbeaux. Les deux crénelages, encore décelables, ont été comblés et les murs rehaussés. Leur partie sommitale est trop ruinée pour pouvoir entrevoir la hauteur exacte de ces murs.  La muraille possédait trois portes. La première, murée, sur la partie Est de l'édifice, donnait sur le fossé. La deuxième; face à la vallée, au Sud de la forteresse, se situe à 2 mètres au-dessus du niveau du sol. La troisième est, ou paraît être, la plus moderne, mais effondrée, elle n'est qu'un grand trou béant. Et onze archères sont encore visibles.","habitants":"Jaume II de Majorque\r\n        \r\n        \"","divers":"Vestiges du château de Porté à Puymorens","gps":"","images":["../image/image_66/66_Porte_Puymorens_1.jpg","../image/image_66/66_Porte_Puymorens_2.jpg"]},"Consult_chateau_formulairea6f8":{"id":"Consult_chateau_formulairea6f8","dept":"66","canton":"Prades","commune":"Prades","nom":"Prades_Py._Or.","type":"Château","periode":"XIII-XVI-XIX","histoire":"A Prades  le château de Prades, de Pams actuel mairie et  de Valroc .                                                                                       PRADES, en 843, la villa Prata, terme signifiant \"prairie\" en latin  est donnée par le roi de la Francia Occidentalis, Charles le Chauve, à son fidèle comte de Cerdagne-Urgel-Berga Suniefred. Près de cinq années plus tard, celui-ci donne sa nouvelle possession à une toute nouvelle abbaye fondée sur les rives de lOrbieu, Sainte-Marie-de-Lagrasse. Cette donation sera effective jusqu'en 1589, date à laquelle Prades passe sous domination catalane. La ville sera fortement marquée par lépisode guerrier qui jalonne le commencement du XIVe siècle, entre les royaumes dAragon et de Majorque, du fait de son attachement au souverain majorquin. Malgré la chute de ce royaume en 1344, la quiétude ne reviendra en Conflent que bien plus tard. En effet, suite au conflit armé qui secoue lEurope en plein XVIIe siècle, la France alors en guerre contre lEspagne va semparer du Roussillon. Il faut attendre 1659 pour que cessent les hostilités : Louis XIV trouvera par le Traité des Pyrénées, une épouse en la personne de Marie Thérèse dAutriche, mais il étendra également les frontières de son royaume au-delà des remparts de Perpignan la Fidelissima. Les grands industriels vont financer lembellissement du Roussillon, comme la famille Pams, dont le château construit au XIXe siècle est aujourdhui lHôtel de Ville, ou bien encore le château Vallroc. De grands artistes viennent sinstaller à Prades, notamment Gustave Violet éminemment reconnu en Roussillon, son installation entraîne larrivée dautres artistes. Certains vont faire de Prades un terrain dexpérimentation pour leur art, cest le cas de Joachim Eyt, dont les uvres sont encore présentes sur bon nombre de façades des maisons pradéennes.","architecture":"Prades  de plan en équerre  terminant  sur la gauche par une tour carrée à trois niveaux toit en tuiles à quatre pans les deux corps de logis rectangulaire à deux niveaux dont celui qui flanque la tour balcon surmonté de galerie en arcade et le deuxième à deux niveaux également flanqué de pavillons saillant sur les extrémités de la façade extérieure.                                                          Pams de plan rectangulaire à deux niveaux avec attiques par des oculus  et tour carrée, porte d'entrée en arcade avec colonne et deux portes jumenées en arcade au premier étage avec prolongement des colonnes.                                                                               Valroc de plan quadrangulaire accolée  de pavillon carrée, d'un donjon carrée à terrasses couvertes au quatrième niveaux  et des terrasses au premier étage.","habitants":"Famille Pams\r\n        \"","divers":"Château de Prades  de Pams  et de Valroc","gps":"","images":["../image/image_66/66_Prades_Py._Or._1.jpg","../image/image_66/66_Prades_Py._Or._2.jpg","../image/image_66/66_Prades_Py._Or._3.jpg","../image/image_66/66_Prades_Py._Or._4.jpg","../image/image_66/66_Prades_Py._Or._5.jpg","../image/image_66/66_Prades_Py._Or._6.jpg"]},"Consult_chateau_formulairebf5e":{"id":"Consult_chateau_formulairebf5e","dept":"66","canton":"Prades","commune":"Fontpédrouse","nom":"Prats_Balaguer","type":"Vestiges","periode":"X-XIII","histoire":"PRATS-BALAGUER à Fontpédrouse fut pendant des siècles un simple hameau dépendant de Prats-Balaguer. C'est donc à ce dernier village appelé pendant des siècles Prats de Balaguer  Il est cité en 854-55, relevait de l'ancienne vicomté de Conflent. Le monastère de Saint-André d'Eixalada y possédant alors quelques biens. Ce monastère, emporté par une inondation, sera transféré à Cuixà, et en l'an 961 la comtesse Ava de Cerdagne donne à cette dernière abbaye la totalité du territoire de Prats-Balaguer, y compris ce qui deviendra ensuite Fontpédrouse. Les moines de Cuixà conserveront la seigneurie de Prats jusqu'à la fin de l'Ancien Régime. Le village avait au Moyen-Age son château, dont il ne reste aujourd'hui pratiquement rien, sinon la base d'une tour quadrangulaire, siège de la mairie et de la poste, de la gare du petit train jaune et passage de la route nationale 116 qui mène dun côté vers Mont-Louis citadelle construite par Vauban .","architecture":"le château de Prats-Balaguer cité en 1267  la  ruine de la courtine,   château médiéval  était le gardien du passage qui conduit à l'ermitage de Nuria par le Col de Nou Fons (Neuf sources). Elle pourrait se situer au XIIIe siècle. \r\nLe château se compose d'une tour carrée et d'une enceinte. Etant située au sommet d'un éperon rocheux, l'enceinte se bornait à un rempart presque rectiligne qui barrait à l'ennemi le seul côté accessible. La base de la tour présente des meurtrières actuellement bouchées. Les faces Sud et Est d'un étage sur voûte sont conservées et l'on observe deux grandes archères. A l'angle Sud-Est de la tour se trouve un rempart épais, percé de petites meurtrières et d'une porte avec un arc surbaissé. Au Nord, à 75 mètres, un mur d'enceinte subsiste. Il a deux rangées d'archères, c'est à dire de simples fentes pratiquées dans la paroi.\r\nIl faut tout de même savoir que la tour initiale était un maillon de la chaîne des tours à signaux en Roussillon et Cerdagne, celle là même qui permettait de faire circuler des informations des coins les plus reculés de Cerdagne au Palais des rois de Majorque ou au Palais royal de Collioure. La tour de Prats-Balaguer était en relation directe avec celle de Llar.","habitants":"Seigneurie de Prats \r\n        \"","divers":"Vestiges du château de prats Balaguer","gps":"","images":["../image/image_66/66_Prats_Balaguer_1.jpg","../image/image_66/66_Prats_Balaguer_2.jpg","../image/image_66/66_Prats_Balaguer_3.jpg","../image/image_66/66_Prats_Balaguer_4.jpg","../image/image_66/66_Prats_Balaguer_5.jpg","../image/image_66/66_Prats_Balaguer_6.jpg","../image/image_66/66_Prats_Balaguer_7.jpg"]},"Consult_chateau_formulaire543c":{"id":"Consult_chateau_formulaire543c","dept":"66","canton":"Rivesaltes","commune":"Prats de Sournia","nom":"Prats_Sournia","type":"Tour château","periode":"XI-XIV","histoire":"PRATS de SOURNIA, surnommée le balcon du Fenouillèdes, Prats-de-Sournia se situe à 640 mètres daltitude, aux frontières de Le Vivier, Pezilla-de-Conflent et Rabouillet. \r\nLa commune conserve encore des vestiges du passé : sa tour à signaux du XIe siècle permettait de prévenir les habitants dune éventuelle invasion, la frontière espagnole étant proche et les conflits fréquents. Au Moyen-Age, il fut le chef lieu d'une châtellenie assez importante. Les seigneurs du lieu avaient le droit de haute justice et figurèrent toujours dans les rangs de la noblesse de la province lorsque les rois de France firent appel aux barons et chevaliers pour concourir à la défense du pays.  Au XIVe siècle, Sournia et Pézilla ne faisaient plus partie du Fenouillèdes mais du Conflent.","architecture":"Le château de Sournia a gardé à l'extérieur certains signes de son ancienne importance féodale tels que tours à poivrière et mâchicoulis au dessus des poternes. Mais à l'intérieur le château est devenu un vaste édifice composé de plusieurs habitations distinctes. L'ensemble de son architecture actuelle semble indiquer une reconstruction, du moins partielle, remontant au XVe ou XVIe siècle. Tour -donjon rectangulaire haute de deux ou trois étages au plus, sur planchers, nayant que six à huit mètres carrés despace libre à lintérieur: Une voûte en berceau soutenait la plate-forme supérieur. Les étages communiquaient entre eux par échelles mobile. Le parement est en pierres brutes, un peu mieux appareillé aux angles avec des blocs plus gros. La porte dentrée souvre parfois à deux ou trois mètres au-dessus du sol. Toutes jalonnent la grande voie de transhumance et ses ramifications vers les pasquiers du Capcir. Plus exactement un farahon, élément dun maillage qui en comptait 36 convergeant sur le château comtal de Castelnou. En bon état de conservation mais rabaissée à 14 m, la toiture sétant effondrée dans la première moitié des années 1900. La porte dentrée de plein pied a été remanié à lorigine au-dessus à 3, 50 m du rocher, sans toutefois discerner une occultation, même souci concernant les meurtrières lesquelles en létat paraissent navoir jamais existé. Ce monument a des côtés de 6, 20 m ou 6, 90 m selon deux sources contradictoires et une épaisseur de 1, 70 m à 1, 85 m à la base.","habitants":"Seigneurs locaux\r\n        \"","divers":"Tour de Prats -Sournia","gps":"","images":["../image/image_66/66_Prats_Sournia_1.jpg","../image/image_66/66_Prats_Sournia_2.jpg","../image/image_66/66_Prats_Sournia_3.jpg"]},"Consult_chateau_formulaire50d0":{"id":"Consult_chateau_formulaire50d0","dept":"66","canton":"Rivesaltes","commune":"Rasiguères","nom":"Rasiguères","type":"Vestiges-tour","periode":"IX-XV","histoire":"RASIGUERES, la tour de Trémoine,  tour carrée qui surplombe Rasiguères.  Le deuxième château, nommé \"Al Castillas\" tout simplement \"le château\" en catalan était plus une ferme fortifiée qu'autre chose. Il en reste également des ruines, à 2 Kms en amont du village sur une petite colline dominant l'Agly.  Concernant la seigneurie, il semble qu'elle ait été détenue par la famille du Vivier au moins depuis le début du XIVe siècle : en 1315, Guillem du Vivier était seigneur de Rasiguères et de Tournefort, petit village situé au-dessus de l'Agly, en amont de Rasiguères, dont il reste encore quelques ruines. le château de Trémoine, dont la tour domine encore aujourd'hui le village au début du XVe siècle, une certaine Emenarde, fille et héritière de Guillem de Cucugnan, détenait des biens à Rasiguères. En 1430, Jean Abant vend  le château et les terres à Guillaume de Vivier. Mais, en 1503, ce sont toujours les du Vivier qui possèdent Rasiguères et Tournefort . C'est encore le cas en 1750 et sans doute aussi à la veille de la Révolution.  Il est très probable qu'il se situait autour du château de Castillas. Durant les premiers temps de la chrétienté Rasiguères faisait partie du comté de Bésalù, qui englobait le Fenouillèdes. Par la suite ce comté sera récupéré par le comte de Barcelone qui formera la Catalogne.  En examinant les ruines du site ainsi que la tour elle-même, on peut en déduire qu'il s'agissait d'une construction initiale carolingienne du IXe siècle la tour a la quelle a été ajoutée des archères et une ligne de défense Sud au XIIIe siècle.  Il appartiendrait au Vicomté  de Fonollède.","architecture":"Un ancien donjon  de la Trémoine  du XVe siècle avec des vestiges de remparts ;  Un vieux pont des XVIe et XVIIe siècles sur le Tournefort ; avec  une enceinte du XIIIe et tour, Les ruines d'une tour des XIIe et XIIIe siècles au Castellas ; La tour-donjon est constituée d'un rez-de-chaussée, de deux étages sur planchers et d'une plate forme sur voûte en berceau plein-cintre, chaque étage communiquant avec les autres par des échelles de bois. Des archères ont été percées au rez-de-chaussée, deux à l'est, deux au nord, trois à l'ouest et une oblique au sud, à cote de la porte. Une petite meurtrière du type du Xe siècle se voit au niveau du deuxième étage. L'espace intérieur est de 4 mètres par 5, la maçonnerie est en petit appareil irrégulier à peine équarri. La première enceinte est construite de la même façon, sans flanquement ni crénelage, le reste du mur n'est pas assez épais pour supporter un chemin de ronde. A l'intérieur on trouve trois murs de cloisonnement, un quatrième couvre la tour percé de deux archères battant la porte. La deuxième enceinte, en ruine, comporte trois archères et une porte. Il semble que cette tour ne soit qu'un abri pastoral et non une place forte car le paysage alentour n'offre pas de difficultés particulières pour un éventuel agresseur.","habitants":"Famille du Vivier \r\n        \r\n        \"","divers":"La tour Trémoine à Rasiguères","gps":"","images":["../image/image_66/66_Rasigueres_1.jpg","../image/image_66/66_Rasigueres_2.jpg","../image/image_66/66_Rasigueres_3.jpg","../image/image_66/66_Rasigueres_4.jpg","../image/image_66/66_Rasigueres_5.jpg"]},"Consult_chateau_formulaire526d":{"id":"Consult_chateau_formulaire526d","dept":"66","canton":"Prades","commune":"Molitg les Bains","nom":"Reill","type":"Château","periode":"XIX","histoire":"REILL, la ville de Molitg-les-Bains possède sur son territoire différents éléments du patrimoine. Aux Thermes (un hameau) se trouve le célèbre château de Riel, un hôtel thermal classé dans les \"Relais et châteaux de France\". Il a été construit au XIXe siècle. Toujours dans le hameau des Thermes la chapelle du Bon Secours, qui date également du XIXe siècle, comme d'ailleurs la quasi totalité du hameau.  Le château de Riell est le troisième château de Molitg. Il a été construit en 1895 par la famille de Massia qui avait acquis en 1836 deux des trois établissements thermaux de Molitg. Avec ses tourelles et pignons il est né de la passion de l'époque romantique pour le Moyen-Age, aujourd'hui hôtel de luxe, il fait partie de la chaîne des \"Relais et Châteaux\".","architecture":"Reil, il a été construit au XIXe siècle, de plan carré, au cours du siècle dernier a perdu son toit en croupes et la toiture de la tour hexagonale  des créneaux et des mâchicoulis se sont installés, haut de cinq étages sur soubassement, petits  locaux de dépendances  avec piscine sur la terrasse au sixième étage.","habitants":"Famille de Massia\r\n        \"","divers":"Château de Reill avant et après","gps":"","images":["../image/image_66/66_Reill_1.jpg","../image/image_66/66_Reill_2.jpg","../image/image_66/66_Reill_3.jpg","../image/image_66/66_Reill_4.jpg","../image/image_66/66_Reill_5.jpg","../image/image_66/66_Reill_6.jpg"]},"Consult_chateau_formulaire7f7b":{"id":"Consult_chateau_formulaire7f7b","dept":"66","canton":"Prades","commune":"Nyer","nom":"Roca_Nyer","type":"Vestiges","periode":"XIII","histoire":"NYER, il s'agissait du château initial,  qui relevait de la vicomté du Conflent. Le château de Ça-Rocha est cité en 1276, lorsque le roi Jacques Ier de Majorque donne à Mossem Guillem Ça-Rocha la juridiction civile du château de Laroque. Fidèle ensuite de Jacques II de Majorque, de Sanche de Majorque, puis de Jacques III de Majorque, la baronnie est confisquée à la famille de Ça-Rocha lors de la conquête de la région par Pierre IV d'Aragon.  En 1340, l'unique héritière de la famille de Ça-Rocha épouse Raymond IV de Banyuls de la puissante famille de Banyuls, et lui apporte en dot la baronnie de Nyer. Leur fils Bérenguer de Banyuls leur succède à la tête de la seigneurie, et décède en 1375 sans enfant. Toutefois elle retrouve en 1354 la possession du château de Ça-Rocha avec les justices de Porcinyans et de Nyer. Vers 1375 une fille de cette famille s'est mariée avec Raymond IV, un membre de la très puissante famille de Banyuls, en lui apportant en dot la baronnie de Nyer.  En 1378 suite à la mort de son neveu, Dalmau de Banyuls eut à reconnaître les fiefs de Ca-Rocha, Porcinyans et Anyer, qui lui échu. Cette famille conserva la baronnie de Nyer jusqu'à la Révolution. Les différents barons de Nyer furent, d'en l'ordre chronologique : Jean de Banyuls, Jean-François de Banyuls, Thomas, François, Thomas, Charles, François, Joseph, et Raymond.  A la veille de la Révolution, le baron de Nyer n'était plus qu'un riche propriétaire terrien. Il possédait les titres de noblesse, quelques droits mais les usages avaient abolis naturellement une grande partie de son autorité, le royaume de France lui aussi récupéré les droits de justice. Ruiné par la perte du château et des revenus féodaux, le baron de Nyer s'enfuit à Barcelone le 26 juin 1791 avec quelques autres membres de la famille. Le château fut vendu à Mr Roger, de Prades, puis échangé le 3 mars 1839 contre le le prieuré de Corneilla, acheté par Mr Escanyé. Aujourd'hui hôtel restaurant.","architecture":"il faut savoir qu'il y a à Nyer deux châteaux. L'ancien, que l'on qualifie de médiéval, est au sommet d'un piton rocheux. L'autre, que l'on nomme renaissance ou Bastide  est au dessus du village, on y accède par un simple escalier. De nos jours il a été transformé en restaurant. Le château de la Roca d'Anyer  l'enceinte fortifiée carrée de 10 mètres de côté était flanquée au Nord-Est d'une tour elle aussi carrée dont les fondations abritaient une petite église souterraine Il comprenait une chapelle, devenue ermitage et connue sous le nom de Notre-Dame de la Roca. L'ensemble est remanié plusieurs fois au cours des siècles. Laprès midi, a été consacrée à la visite des vestiges du château fort et demeure seigneuriale des premiers barons de La Roca dAnyer et de la chapelle castrale Notre Dame de Vie, plus connue ici sous le nom de « La Mare de Deu de la Roca ».                                                                             Nyer  ou Bastide, ce château est doté de deux tours rondes et crénelées, et à une forme rectangulaire assez classique. Son élément décoratif le plus intéressant est un superbe balcon ouvragé, mais chaque fenêtre, chaque ouverture est d'une grande finesse. Il faut aussi noter son environnement boisé, magnifique. De nos jours ce château a été reconverti en restaurant haut de gamme, il dispose d'une magnifique terrasse ouverte sur la vallée.","habitants":"Famille de Ça-Rocha                                                                             Famille de Banyuls\r\n        \"","divers":"vestiges de l'ancien château et château de de Nyer","gps":"","images":["../image/image_66/66_Roca_Nyer_1.jpg","../image/image_66/66_Roca_Nyer_2.jpg","../image/image_66/66_Roca_Nyer_3.jpg","../image/image_66/66_Roca_Nyer_4.jpg","../image/image_66/66_Roca_Nyer_5.jpg","../image/image_66/66_Roca_Nyer_6.jpg","../image/image_66/66_Roca_Nyer_7.jpg"]},"Consult_chateau_formulairec1ac":{"id":"Consult_chateau_formulairec1ac","dept":"66","canton":"Amélie les bBains","commune":"Rodès","nom":"Rodès","type":"Vestiges","periode":"XII","histoire":"RODES, construit sous l'époque médiévale, faisait partie d'une commune qui regroupait en tout quatre villages: Croses, Conohétes, Ropidera et Rodès.  cité en 1094, une chapelle dédié Saint-Valentin semble exister dans une fortification. En 1109, Pierre Bernard, seigneur de Rodès, fait serment au comte en 1109, et en 1225, Raimond de Canet, rend hommage à Nunyo Sanche, seigneur souverain de Roussillon et de Cerdagne, pour ses terres et châteaux dont celui de Rodès. Passe à Guillaume de Canet en 1311 rend hommage au roi Sanche de Majorque.  Puis en 1351 à Pierre de Millar châtelain de Rodès.  En 1359, avec la prise de Majorque par le Roi d'Aragon, ce dernier nomme Raimond de Peireillos, nouveau châtelain de Rodès, et en 1368,  il appartient au vicomté de Fonollède.  Raimond de Peireillos achète le château en 1390 et les terres de Rodès.","architecture":"Vestiges du XIIe siècle du château de Rodès qui, a été construit en l'an mille, pour  assurait la surveillance de la vallée de la Têt, il contrôlait le passage du col de Ternère et du canal royal de Thuir (ce dernier alimentait le palais des rois de Majorque à Perpignan). Antique guetteur du millénaire, symbole de la puissance seigneuriale, rassembleur de la population, le château fut un élément familier de la vie quotidienne.","habitants":"Seigneur Pierre Bernard\r\n        \r\n        \"","divers":"Vestiges du château de Rodès","gps":"","images":["../image/image_66/66_Rodes_1.jpg","../image/image_66/66_Rodes_2.jpg","../image/image_66/66_Rodes_3.jpg","../image/image_66/66_Rodes_4.jpg","../image/image_66/66_Rodes_5.jpg","../image/image_66/66_Rodes_6.jpg","../image/image_66/66_Rodes_7.jpg","../image/image_66/66_Rodes_8.jpg"]},"Consult_chateau_formulairecad6":{"id":"Consult_chateau_formulairecad6","dept":"66","canton":"Perpignan","commune":"Castel_Rosello","nom":"Rosello","type":"Tour","periode":"X-XII","histoire":"ROSELLO, la tour de château-Roussillon est un château bâti au lieu dit Castel-Rosello, rattaché à Perpignan. Elle date du XIIIe siècle et  rachetée par la commune. La Tour représente le dernier vestige de l'ancien château. Elle est construite en galets de rivière. La tour du Château-Roussillon est haute de 20 mètres. Une porte étroite s'ouvre au sud. Cependant, une ouverture au nord, avec un arc en plein cintre est située, à hauteur du premier étage, et serait la porte primitive. A l'intérieur de la tour, se trouve un escalier en chêne, qui permet d'accéder à la plate-forme qui est surmontée d'un arc en briques.  Les comtes de Roussillon ont résidé à château-Roussillon entre le VIIIe et le Xe siècle. Ils se sont ensuite établis à Perpignan, ce qui entraîna le développement de cette ville au détriment de château-Roussillon qui perdit alors son importance. Une seigneurie en portant le nom s'y établit alors et y fait construire un château dont il subsiste encore aujourd'hui une tour ronde haute d'une vingtaine de mètres, une chapelle dédiée à sainte Marie et saint Pierre et quelques pans de muraille.","architecture":"Rosello, il  reste un donjon quadrangulaire roman haut de 20 mètres, son architecture entièrement en galets maçonnés permet de situer sa construction au XIIIe siècle, date à laquelle elle devait faire partie de l'ensemble fortifié mentionné dans les textes sous le nom de Castrum Rossilione dont seuls quelques pans de murs en galets sont visibles dans le hameau actuel. La tour fut donnée à  la  ville de Perpignan en 1856. Elle fut inscrite à l'inventaire des Monuments Historiques en 1944, ainsi que l'église romane. Il faudra attendre 1976 pour une réelle mise en valeur de l'édifice comprenant la restauration intégrale de la maçonnerie, la pose d'un escalier permettant d'accéder sur le toit en terrasse, et la démolition d'un transformateur EDF à proximité.","habitants":"Seigneur locaux\r\n        \"","divers":"Tour  de Rosello et la tour de la maison Bigorre","gps":"","images":["../image/image_66/66_Rosello_1.jpg","../image/image_66/66_Rosello_2.jpg","../image/image_66/66_Rosello_3.jpg","../image/image_66/66_Rosello_4.jpg"]},"Consult_chateau_formulairef215":{"id":"Consult_chateau_formulairef215","dept":"66","canton":"Rivesaltes","commune":"Fenouillet","nom":"Sabarda","type":"Vestiges","periode":"X-XIV","histoire":"SABARDA, il n'y a pas énormément de choses à dire sur le château de Sabarda. Il ne n'agit que d'une place-forte de soutien à la défense du château de Fenouillet, siège de la baronnie du même nom. La famille de Fenouillet a eu une grande influence entre les Xe et XIVe siècle dans l'histoire locale. Ce château est en vis-à-vis de celui de St Pierre, à vol d'oiseau ils ne doivent pas être distant de plus d'un kilomètre, probablement quelques centaines de mètres.  Il est un peu plus bas que celui de St Pierre, qui le domine.","architecture":"Sabarda  en amont sur une roche escarpée, semble le plus ancien des trois châteaux  étroit bâtiment quadrangulaire  en petit appareil flanqué de deux tours circulaires, était une haute construction, au mur appareillé de façon simple, peu épais en comparaison des châteaux de la même époque. Il a peu d'emprise au sol mais il faut dire qu'il a été construit sur un éperon rocheux assez étroit, est une place-forte assez petite située sur un éperon rocheux au Sud du château de Fenouillet, dont il ne reste que des pans de murs  ruinés dans une grande enceinte.","habitants":"Famille de Fenouillet\r\n        \"","divers":"Vestiges du Château de Sabarda","gps":"","images":["../image/image_66/66_Sabarda_1.jpg","../image/image_66/66_Sabarda_2.jpg","../image/image_66/66_Sabarda_3.jpg","../image/image_66/66_Sabarda_4.jpg","../image/image_66/66_Sabarda_5.jpg"]},"Consult_chateau_formulaire5636":{"id":"Consult_chateau_formulaire5636","dept":"66","canton":"Saillagouse_Llo","commune":"Saillagouse_Llo","nom":"Saillagouse_Llo","type":"Vestiges-tours","periode":"XI","histoire":"SAILLAGOUSE, vestiges du château datant du XIe siècle, en haut du bourg, aux murs en arête-de-poisson.                                                                                                                                                                           FONT-ROMEU, l'hôtel de ville  à Odeillo avec tour carrée un grand hôtel.                                                                                        la tour de Llo  la tour de guet dit la tour del VACARO construite sur un pic rocheux sur les hauteurs du village,son église romane du XIIIe siècle (église saint-fructueux),  les ruines de la chapelle dédiée à Saint-Féliu, (Saint-Félix), chapelle de l'ancien château, le castelvell de llo.","architecture":"Tour del Vacaro, à Llo ancienne tour de guet ruinée, restaurée en 2003.\r\nVestiges du château datant du XIe siècle, en haut du bourg, aux murs en arête-de-poisson                                                                                                                                  Four solaire d'Odeillo : laboratoire PROMES-CNRS, exposition Héliodyssée.\r\nFont-Romeu , le grand-hôtel, construit entre 1910 et 1914.  Inscrit MH  en 1988.","habitants":"Seigneurs locaux\r\n        \"","divers":"Vestiges château de Saillagouse, la tour Vacaro et l'hôtel de ville et le Grand hôtel de Font-Romeu","gps":"","images":["../image/image_66/66_Saillagouse_Llo_1.jpg","../image/image_66/66_Saillagouse_Llo_2.jpg","../image/image_66/66_Saillagouse_Llo_3.jpg","../image/image_66/66_Saillagouse_Llo_4.jpg","../image/image_66/66_Saillagouse_Llo_5.jpg","../image/image_66/66_Saillagouse_Llo_6.jpg","../image/image_66/66_Saillagouse_Llo_7.jpg"]},"Consult_chateau_formulaireb7f8-2":{"id":"Consult_chateau_formulaireb7f8-2","dept":"66","canton":"Rivesaltes","commune":"Salses-le-Château","nom":"Salses","type":"Citadelle","periode":"XI-XVI","histoire":"SALSES, un premier château fort fut construit au XIe siècle, la forteresse construite à la fin du XVe siècle par Francisco Ramiro Lopez, à l'emplacement de sources fort utiles en cas de siège, l'édifice garde l'ancienne frontière pour le roi d'Aragon Ferdinand II le catholique époux d'Isabelle de Castille. Assiégée, prise et reprise en 1503, 1639, 1640, la place est définitivement conquise par les Français en 1642. Le traité des Pyrénées de 1659 redessine les territoires : moins stratégique, la forteresse perd alors de son importance. À partir de 1691, elle est partiellement restaurée par Vauban, la forteresse est classée aux M.H. depuis 1886. Elle servait à défendre la frontière avec la France. C'est à Salses, petit village du Nord du Roussillon que se dresse le plus bel exemple d'architecture militaire dite \"de transition\".","architecture":"Salses forteresse de forme rectangulaire  de 115 mètres de long sur 90 de large, possédant une tour cylindrique placée à chaque angle. Il a été construit profondément enfoui dans le sol de façon a se dérober en partie aux vues et aux coups de lennemi. Les tours dangle, qui sont des tours dartillerie, sont largement ventilées par des gaines verticales cylindriques autour desquels senroulent les escaliers en colimaçon qui mènent sur la partie supérieure. Ces gaines, que trop de personnes prennent encore pour des oubliettes, servaient aussi de communication acoustique.\r\nLa forteresse se divise en deux parties séparées par un large fossé intérieur et une courtine à éperon. La première partie, celle située à lest, est constituée par une vaste place darmes autour de laquelle sont disposés les logements de la garnison dune capacité de 1000 à 1200 soldats, les magasins et les écuries. La seconde partie comprend principalement en son centre le donjon. Elle est cloisonnée et son seul accès par le pont-levis. En complément, cette forteresse est flanquée au nord-ouest, à lest et au sud de trois ouvrages extérieurs en forme de demi-lune reliés au corps par des tunnels aux galeries voûtées. (Caponnière) ces tunnels sont masqués de lextérieur par leau des douves, abondamment alimentées par une source de fort débit.Lartillerie du fort comprenait 24 canons. Ceux de gros calibres étaient disposés sur la plate-forme extérieure au sommet des tours.","habitants":"Vauban\r\n        \"","divers":"Motte du château primitif et citadelle de Salses","gps":"","images":["../image/image_66/66_Salses_1.jpg","../image/image_66/66_Salses_2.jpg","../image/image_66/66_Salses_3.jpg","../image/image_66/66_Salses_4.jpg","../image/image_66/66_Salses_5.jpg","../image/image_66/66_Salses_6.jpg","../image/image_66/66_Salses_7.jpg","../image/image_66/66_Salses_8.jpg"]},"Consult_chateau_formulaired0a9":{"id":"Consult_chateau_formulaired0a9","dept":"66","canton":"Saint-Laurent de la Salanque","commune":"Saint-Hippolyte","nom":"St_Hippolyte","type":"Château","periode":"X-XII","histoire":"SAINT-HIPPOLYTE ,  le château de Saint-Hippolyte est construit  au milieu du Xe siècle.  Alphonse d'Aragon décide de faire fortifier le village au XIe siècle. Entre les deux tours qui existent encore, se trouve le « Portalet », grand portail constituant lancienne entrée du village. Le château est un fief royal au XIIe siècle, appartenant à des seigneurs locaux sous allégeance  des rois dAragon. Il est vendu aux Templiers du Mas Déu en 1286. Le château demeure en leur possession jusquen 1439, date à laquelle les clés de la ville seront remises aux Hospitaliers de Saint-Jean de Jérusalem. Entre le XIVe et le milieu du XVIIe siècle, Saint-Hippolyte est victime des conflits opposants les royaumes de France et dAragon, dAragon et de Majorque, ou encore des assauts et des pillages étrangers en 1344, sac de Saint-Hippolyte par les berbères. Au cours de ces trois siècles, on compte plusieurs périodes de reconstruction. Les guerres cessèrent en 1659 avec le traité des Pyrénées, qui rattacha le Roussillon à la France.  Au XXIe siècle, la découverte de l'extérieur des remparts est libre et gratuite. La visite de l'intérieur des fortifications est interdite.","architecture":"Le château de Saint-Hippolyte  doté de quatre tours dont deux sont toujours dressées à l'heure actuelle, devient la propriété du roi Jacques 1er au XIIe siècle. A partir du milieu du XIIIe siècle, on assiste à la construction de maisons sur des terrains libres en périphérie de lenceinte. Entre les deux tours qui existent encore, se trouve le « Portalet », grand portail constituant lancienne entrée du village.","habitants":"Seigneurs locaux \r\n        \"","divers":"Château de Saint-Hippolyte et manoir","gps":"","images":["../image/image_66/66_St_Hippolyte_1.jpg","../image/image_66/66_St_Hippolyte_2.jpg","../image/image_66/66_St_Hippolyte_3.jpg","../image/image_66/66_St_Hippolyte_4.jpg","../image/image_66/66_St_Hippolyte_5.jpg","../image/image_66/66_St_Hippolyte_6.jpg"]},"Consult_chateau_formulaire875e":{"id":"Consult_chateau_formulaire875e","dept":"66","canton":"Châteaux","commune":"Saint-Laurent de Cerdans","nom":"St_Laurent_Cerdans","type":"Château","periode":"XVII","histoire":"ST-LAURENT-de-Cerdans, le lieu-dit de Cerdans n'apparaît qu'en 1168 dans l'expression \"Le Mas de Cerdans\". En effet, Saint-Laurent de Cerdans n'était encore qu'un mas doté d'une église, l'église Saint-Laurent. Le village faisait partie de la paroisse de Sainte-Marie de Coustouges, laquelle dépendait dès 1011 de l'abbaye d'Arles sur Têt.  Aux XVIIe et XVIIIe siècles, la situation frontalière du village en fait une zone d'échanges illégaux. C'est grâce à la contrebande que vont se développer les industries de l'espadrille et du tissu, industries qui fleurirent jusqu'en 1950. Avec son architecture catalane et ses couleurs chaudes et lumineuses, la commune de Saint-Laurent-de-Cerdans séduit les visiteurs désireux de découvrir la Catalogne authentique.\r\nInscrit aux Monuments Historiques, le mas de Crémadells a été construit entre le XVIIe et le XVIIIe siècle. On peut encore admirer les ruines de sa chapelle construite au milieu du XVIIe siècle.  Un musée d'art et traditions populaires présente l'histoire de la commune, avec notamment une salle réservée à l'industrie de l'espadrille, et un espace présentant la Retirada, la fuite des Espagnols républicains sous Franco.\r\nChâteau de l'Ille, bâtiment du XIXe siècle, de la chapelle Notre-Dame-de-la-Sort, construite au XVIIIe siècle, ou encore l'église Saint-Laurent et les ruines de la chapelle de la Muga de Dalt.","architecture":"Château de l'ille du XIXe siècle à Saint-Laurent de Cerdans de style manoir de plan rectangulaire à deux niveaux sur soubassement,  toit à l'impérial avec un pavillon d'entrée saillant avec  balcon sur colonne et fronton à pinacle et lucarnes sur toiture.","habitants":"Seigneurs locaux\r\n        \"","divers":"château de l'Ille et château de Saint-laurent de Cerdans","gps":"","images":["../image/image_66/66_St_Laurent_Cerdans_1.jpg","../image/image_66/66_St_Laurent_Cerdans_2.jpg","../image/image_66/66_St_Laurent_Cerdans_3.jpg","../image/image_66/66_St_Laurent_Cerdans_4.jpg","../image/image_66/66_St_Laurent_Cerdans_5.jpg"]},"Consult_chateau_formulaire5e9b":{"id":"Consult_chateau_formulaire5e9b","dept":"66","canton":"Prades","commune":"Saint-Martin du Canigou","nom":"St_Martin_Canigou","type":"Abbaye","periode":"XI","histoire":"SAINT-MARTIN du CANIGOU,  c'est vers l'an 1000 que Guifred II, comte de Cerdagne et du Conflent, décide de construire sur ce versant du Canigou un monastère destiné à recevoir une communauté de l'ordre de Saint-Benoît. Il est appuyé dans son projet par son frère Oliba, l'un des plus grands abbés de labbaye Saint-Michel-de-Cuixà. Les moines bénédictins occupent l'abbaye jusqu'à la fin du XVIIIe siècle. En 1786, les cinq derniers moines quittent l'abbaye qui est alors officiellement supprimée. C'est alors l'abandon complet pendant 120 ans. Au début du XXe siècle, Mgr de Carsalade du Pont, évêque de Perpignan-Elne, rachète les ruines et entreprend une première campagne de restauration de 1902 à 1932. Une deuxième campagne de restauration a lieu de 1952 à 1982 sous la conduite du Père Bernard de Chabannes, moine bénédictin de labbaye dEn Calcat. En 1988, lévêque de Perpignan-Elne confie labbaye à la communauté des Béatitudes, avec pour mission de perpétuer la vie de prière en ce lieu.                                                                                                                                                                   St-Michel de Cuxa, labbaye Saint Michel de Cuxa est un monastère bénédictin dominé par un impressionnant clocher du XIe siècle. Son accès savère bien plus aisé que celui de labbaye de Saint Martin du Canigou puisque lon peut sy garer à proximité.  La tour-porche ne fait plus que 19 mètres, après sa destruction partielle en 1428. Elle ne fut en effet jamais rétablie totalement. Le crénelage date de la reconstruction.   Le reste des bâtiments conventuels date du début du XXe siècle : il ne restait pratiquement plus rien des anciens locaux.                                                     Au sud ouest de Prades la Tour de Codalet du XIIe siècle, crénelée avec départ de courtine ancienne attenant à un bâtiment d'une autre époque, à partir du IXe siècle possession de la puissante abbaye de Saint-Michel de Cuxa.","architecture":"L'origine de Casteil  de Saint-Martin de Canigou est d'emblée liée à son patrimoine. La plus ancienne mention date de 885 et concerne l'existence d'un château, le \"castrum verneto\". L'origine du village est donc liée au château fort primitif, situé sur un éperon rocheux au-dessus du village actuel sur le chemin de l'abbaye. Cette forteresse était située prés de la chapelle de Saint-Martin le vieux. L'emplacement avait été stratégiquement choisi afin de surveiller l'ensemble de la vallée du Cady. Le village n'était alors qu'une simple ferme ou \"villae\". Ces \"villae\" étaient de grandes propriétés agricoles offertes aux vétérans de l'armée romaine en remerciements des années passées au service de l'Empire. Malgré la chute de l'Empire, elles avaient maintenu les populations et leurs activités agricoles, mais aussi structuré le territoire. Elles furent à l'origine de nombreux villages comme ce fut le cas pour Casteil. Cette chapelle servait aux habitants du château et témoigne de la forte démographie des montagnes au Moyen-Age. Quelques années après, la mention \"domus Sancti Martini\" atteste des débuts des travaux de l'abbaye.","habitants":"Mgr de Carsalade du Pont,\r\n        \"","divers":"Château de Saint-Martin de Canigou et  la tour de Codalet","gps":"","images":["../image/image_66/66_St_Martin_Canigou_1.jpg","../image/image_66/66_St_Martin_Canigou_2.jpg","../image/image_66/66_St_Martin_Canigou_3.jpg","../image/image_66/66_St_Martin_Canigou_4.jpg","../image/image_66/66_St_Martin_Canigou_5.jpg","../image/image_66/66_St_Martin_Canigou_6.jpg"]},"Consult_chateau_formulaire3874":{"id":"Consult_chateau_formulaire3874","dept":"66","canton":"Rivesaltes","commune":"Tautavel","nom":"Tautavel","type":"Vestiges","periode":"XIII","histoire":"TAUTAVEL , cité en 1011 dans le vicomté de Fonollède.  Le château de Tautavel fut un château féodal puis royal, au XIIIe siècle.  Entre 1325 et 1346, Jacques II de Majorque règne sur le Roussillon. A cette époque on trouve quelques noms de châtelains : Bernat de Rivesaltes, François de Perillos, Lope de Puyo. En 1387 le château et ses dépendances sont inféodés à Bérenger de Perpetusa dit d'Ortaffa par le roi Jean II. Un siècle plus tard, en 1493, le salaire du châtelain fut supprimé, et le château est démoli,  suite à la désastreuse occupation de Louis XI, le roi de France. Au début du XVIIe siècle le château de Tautavel fut confié à la famille d'Oms. C'est Bernard d'Oms, par ailleurs seigneur de Taxo et de Villelongue de la Salanque, qui obtient cette charge. Le roi de France Louis XIII fut particulièrement content de ses services, en partie car le châtelain avait fourni lui-même de la nourriture à la garnison pendant une période assez longue. Bernard décèdera en 1624,  son fils Joseph pris la relève. Celui-ci épousa la cause des nobles catalans, opposés au roi de France. En pleine guerre de 30 ans, Louis XIII attaqua le Roussillon en 1639. Après la forteresse d'Opoul, puis celle de Vingrau, le château de Tautavel tombe le 5 septembre. Ce fut le début du discrédit de cette branche de la famille d'Oms.  Son fils, Emmanuel, fut spolié : son château fut donné sur ordre de Louis XIV au duc de Noaille le 12 août 1652, pour finalement être détruit à l'explosif en 1658 de façon à être sûr qu'il n'y ai plus de places fortes dans la vallée. Il sera détruit, en 1659, après le traité des Pyrénées.   La Torre del Far : ancienne tour de signal, perchée entre Cases de Pene et Tautavel. Vigie de la plaine du Roussillon, de la vallée de lAgly et du Verdouble.","architecture":"Tautavel  Il date du XIe et XIIIe siècle et il est d'origine carolingienne. Il ne reste que de belles ruines aujourd'hui du château  féodal puis royal du XIIIe siècle domine le village de Tautavel et la vallée du Verdouble. On y distingue encore son enceinte et son donjon. Cette forteresse connut sa plus haute importance du temps des comtes de Bésalu.  Après lannexion de 1659, le château fut démantelé à lexplosif. Ont subsisté quelques pans de murs, des arrêtes crénelées et un immense moignon escarpé du donjon.  De nos jours il n'en subsiste que les soubassements et des tas de décombres, ainsi qu'une portion du donjon et un pan de muraille. \r\nTour del Far, au sommet du massif qui sépare Tautavel du village de Cases de Pène, domine les Corbières. Cette tour sarrasine fut utilisée dès le Xe siècle pour transmettre des signaux par feu la nuit et par fumée le jour afin de se protéger des attaques barbaresques ou de son voisin du Nord.  Surnommée « lespionne du Roussillon », elle est visible depuis la plaine orientale jusquau châteaux cathares.","habitants":"Jacques II de Majorque \r\n        \"","divers":"Vestiges du château de Tautavel et tour del-Far","gps":"","images":["../image/image_66/66_Tautavel_1.jpg","../image/image_66/66_Tautavel_2.jpg","../image/image_66/66_Tautavel_3.jpg","../image/image_66/66_Tautavel_4.jpg","../image/image_66/66_Tautavel_5.jpg","../image/image_66/66_Tautavel_6.jpg"]},"Consult_chateau_formulairec145":{"id":"Consult_chateau_formulairec145","dept":"66","canton":"Thuir","commune":"Thuir","nom":"Thuir","type":"Château","periode":"XII-XVI-XIX","histoire":"Plusieurs châteaux  à Thuir celui de Thuir,  de Las-Collas, de St-Nicolas à Ponteilla  et Viollet-Rosiers.                                                                                                                                                                                                                                          LAS-COLLAS,  viticole et gîtes, salle de réception, salle de réunion,   l'établissement se distingue aussi par un passé ancestral remontant au XIIe siècle, Jadis habité par les moines Templiers, fût bâti sur les ruines d'un prieuré avant de devenir cette élégante demeure familiale.  Le château Las Collas a été créé au XVIIe siècle où des générations de vignerons se sont ensuite succédé jusqu'à aujourd'hui. Las Collas, c'est aussi un lieu prestigieux pour vos réceptions.                                                                                                                                                                  SAINT-NICOLAS, à 5 kilomètres à l'est à Ponteilla viticole et gîtes, réceptions La salle  est particulièrement adaptée à des festivités telles que mariages, anniversaires et baptêmes ainsi que séminaires professionnels, conventions, événements dentreprise, défilés de mode ou expositions duvres dart.                                                                                                                                              LAURIGA et son vignoble de 55 ha situé aux portes des Aspres. Nous vous accueillons à l'intérieur d'un vieux mas catalan construit au début du XIXe siècle pour vous présenter notre vignoble, nos chai et notre cave. Une large palette de vins du Roussillon forme notre patrimoine viticole, ils vous seront proposés à la dégustation.                                                                                                      CHATEAU DE SAU  propriété familiale depuis 1846 et l'oeuvre de l'architecte Danois Petersen. Vous pourrez découvrir son histoire et son terroir. Béatrice Passama exploite un vignoble de 40 hectares près de Thuir où sont produits des vins souples et fruités en agriculture biologique. Vous êtes invités à venir les découvrir.                                                                                                                  VIOLLET-ROSIERS, vers 1860, Simon et Pallade Violet, bergers et fils dun muletier de Corsavy, fondateur du Byrrh, en 1910, Lambert poursuit également la politique sociale mise en uvre par son père Il sinstalle à la villa Palauda, un élégant château façon XVIIIe siècle qui ressemble à ceux des riches industriels du Nord. Et son frère ­Simon habite la villa Les Rosiers, à Thuir, où il vit .","architecture":"Las-Collas,  viticole et gîtes,  salle de réception, salle de réunion   l'établissement se distingue aussi par un passé ancestral remontant au XIIe siècle, Jadis habité par les moines Templiers, le château fût bâti sur les ruines d'un prieuré avant de devenir cette élégante demeure familiale.   de plan en U avec un corps de logis rectangulaire à trois niveaux, pavillons carrés de même niveaux  toits en terrasses sur l'ensemble.                                                                      St-Nicolas château du XIIe siècle, de plan en U les corps de logis à deux niveaux.                                                                                                        Lauriga, de plan en U à deux niveaux avec attiques                                                                                                                         Sau, corps de logis rectangulaire à cinq niveaux toit en croupes.                                                                                                                                  Viollet,  dit les Rosiers ou villa Palauda de style Renaissance avec pavillons et dépendances  toitures à l'impérial avec lucarnes à galbes.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Las-Colas, de Lauriga, de Saint-Nicolas, de Sau, de Florent de Viollet-Palauda et des Rosiers","gps":"","images":["../image/image_66/66_Thuir_1.jpg","../image/image_66/66_Thuir_2.jpg","../image/image_66/66_Thuir_3.jpg","../image/image_66/66_Thuir_4.jpg","../image/image_66/66_Thuir_5.jpg","../image/image_66/66_Thuir_6.jpg","../image/image_66/66_Thuir_7.jpg","../image/image_66/66_Thuir_8.jpg","../image/image_66/66_Thuir_9.jpg"]},"Consult_chateau_formulaire312f":{"id":"Consult_chateau_formulaire312f","dept":"66","canton":"Amélie les Bains Palalda","commune":"Valmanya","nom":"Valmanya","type":"Vestiges","periode":"XII","histoire":"VALMANYA,  des époques médiévales seuls subsistent une tour carrée, la porte et les vestiges d'enceinte de l'ancien «Castell de Burch» étagé sur son promontoire rocheux à l'écart du village.  Une tour fortifiée construite au XIIe siècle. Au XIIIe siècle, il semble que le château relève du Vicomté de Confluent. Vers 1500, un texte cite une fortification appartenant à l'abbaye de Cuixa.                          \r\nLe village de Vallmanya ainsi que ses mines de fer dépendirent du monastère de Sant-Miquel de Cuixa, jusqu'à la fin de l'ancien régime. Le village de Vallmanya, siège d'un important noyau de résistance au cours de la seconde guerre mondiale, fut rasé par les Allemands, et dut être rebâti ; un monument au pieds du château rappelle cet épisode tragique.","architecture":"Le castell d'el Bruix, ancienne tour à signaux située sur un piton rocheux qui domine le village. elle pourrait dater du XIe ou du XIIe siècle. Outre la tour il subsiste des vestiges de l'enceinte et de bâtiments qui étaient encore habités à la fin du XIXe siècle. Avec sa forme carrée, du XIIe siècle. Les pierre sont mal taillées et peu jointives, confirmant mon hypothèse d'un château de garde.\r\nde  nombreuses archères pour une tour aussi vieille surtout du coté de l'attaque et sont  très rapprochées.\r\n  Leur forme droite et peu haute confirme ma datation.  Les murs comportent des pierres positionnées en \"arrêtes de poisson\".\r\nDe courtes archères  parfois inclinées sont visibles sur un coté.2 ouvertures rectangulaires. La plus basse devait être la porte d'entrée médiévale.","habitants":"Vicomté de Confluent\r\n        \"","divers":"Vestiges et tour de Valmanya","gps":"","images":["../image/image_66/66_Valmanya_1.jpg","../image/image_66/66_Valmanya_2.jpg","../image/image_66/66_Valmanya_3.jpg","../image/image_66/66_Valmanya_4.jpg","../image/image_66/66_Valmanya_5.jpg"]},"Consult_chateau_formulairebcf8-2":{"id":"Consult_chateau_formulairebcf8-2","dept":"66","canton":"Amélie les Bains","commune":"Vernet-les-Bains","nom":"Vernet","type":"Forteresse","periode":"XII-XVI","histoire":"VERNET,    château   qui domine le village fut construit au XVIe siècle par les famille de Lacvivier et Delacroix autour des vestiges d'une tour,  érigée au XIIe siècle par l'abbaye pour protéger la population et stocker les récoltes et partiellement détruite en 1654 par les troupes françaises. En 1710, après une terrible inondation qui détruisit l'antique église Saint-Saturnin et une grande partie de l'ancien village, l'abbaye offre aux habitants les terres situées autour de l'ancien château et de sa chapelle Sainte-Marie del Puig, qui devient alors le siège de la paroisse.\r\nAu XIXe siècle, Vernet devient une station thermale réputée en raison de ses sources. En 1834, monsieur Morat, propriétaire des Bains, revend ces derniers à messieurs de Lacvivier et Courderc, appelés les commandants, qui vont construire le bel établissement plus tard appelé l'hôtel Ibrahim Pacha, en l'honneur du séjour aux bains de Vernet que le professeur Lallemand prescrit à son patient, le prince Ibrahim Pacha, fils du wali d'Égypte, en 1846  le prince y défraiera la chronique sociale et mondaine et dotera Vernet d'une notoriété inédite. Létablissement passe de mains en mains jusquà larrivée du comte Henry de Burnay, riche banquier portugais dorigine belge, unique propriétaire en 1888 avec les 18 hectares, qui termine les travaux. En 1899, il fait construire le grand hôtel du Portugal, lhôtel du Parc et bien dautres édifices encore.","architecture":"Du château médiéval subsiste seule une tour rectangulaire à l'est, le reste de la construction datant des XIXe et XXe siècles.                            L'aiguat de 1940 anéantit la plupart des installations thermales. Un établissement thermal moderne a été créé à Vernet-les-Bains pendant et après les années 1960 . De plus, le Casino a repris son activité et Vernet attire toujours de nouveaux habitants qui veulent profiter de la douceur de son climat et de la beauté de son paysage. Tour de guet \"Goa\" et à signaux restaurée du XIIIe siècle : altitude 1268 m ; vue sur l'abbaye Saint Martin du Canigou, sur son escarpement rocheux, dans un site impressionnant de montagne. \r\nSon diamètre est d'environ 12 mètres ; elle a deux étages voûtés en dôme et à la hauteur de chacun d'eux sont percés de créneaux. Sur la plate forme pas de  trace de mâchicoulis. La maçonnerie est peu soignée et tout semble indiquer une construction du XVe siècle. Des lices devaient entourer et défendre le pied de la muraille contre les approches imprévues, elle transmettait à la tour de Rabastanys située au bout de la crête de Sahrre. Cette dernière servait donc de liaison pour avertir la ville fortifiée de Villefranche située dans son fond de vallées.","habitants":"Famille de Lacvivier \r\n        \"","divers":"Château fort de vernet , le casino; divers châteaux  et la tour de Goa","gps":"","images":["../image/image_66/66_Vernet_1.jpg","../image/image_66/66_Vernet_2.jpg","../image/image_66/66_Vernet_3.jpg","../image/image_66/66_Vernet_4.jpg","../image/image_66/66_Vernet_5.jpg","../image/image_66/66_Vernet_6.jpg","../image/image_66/66_Vernet_7.jpg","../image/image_66/66_Vernet_8.jpg","../image/image_66/66_Vernet_9.jpg"]},"Consult_chateau_formulaire4b2d":{"id":"Consult_chateau_formulaire4b2d","dept":"66","canton":"Argelès sur mer","commune":"Palau  del Vidre","nom":"Villeclare","type":"Château","periode":"XVI","histoire":"VILLECLARE, le domaine est doté d'un cadre exceptionnel, arbres tricentenaires, vignes, vergers (abricots et nectarines) . Les vignes qui s'étendent dans l'ère A.O.C des Côtes du Roussillon et des Vins de pays des côtes Catalanes, sur cinquante hectares de terroirs argilo-shisteux bénéficient d'un climat très ensoleillé, tempéré par la proximité de la mer.\r\nCela fait plus de 150 ans que la vigne existe sur le domaine de Villeclare, la famille Jonquères d'Oriola la cultive depuis trois générations.\r\nLe vignoble du château de Villeclare se situe à l'extrême sud du Roussillon, sur le piémont des Albères, massif montagneux qui termine les Pyrénées en se jetant dans la Méditerranée.","architecture":"le château Villeclare est un ancien château des Templiers du XIIe siècle, construit sur d'anciennes ruines romaines se mêlent à une architecture traditionnelle authentique. Corps de logis rectangulaire à  trois niveaux pavillon carré en angles et à l'opposé tour carré à cinq niveaux.","habitants":"Famille Jonquères d'Oriola\r\n        \"","divers":"Château de Villeclare à Palau del Vidre","gps":"","images":["../image/image_66/66_Villeclare_1.jpg","../image/image_66/66_Villeclare_2.jpg"]},"Consult_chateau_formulaire0f7d":{"id":"Consult_chateau_formulaire0f7d","dept":"66","canton":"Villefranche de Conflent","commune":"Villefranche de Conflent","nom":"Villefranche_Conflent","type":"Citadelle","periode":"XV-XVI","histoire":"VILLEFRANCHE de CONFLENT, le fort Liberia (voir article) Villefranche est fondée par une charte octroyée par le comte de Cerdagne Guillem Ramon le 9 avril 1091. Le comte avait alors sa résidence à Corneilla-de-Conflent et voulait faire de Villefranche sa nouvelle capitale. La cité, fondée en 1090, a conservé son prestigieux passé de capitale du Conflent, un ensemble monumental exceptionnel, bâti dans le marbre rose.  Au coeur d'une ville d'art et d'histoire, Villefranche est aussi un des plus beaux villages de France. On visitera d'abord les remparts, commencés à la fin du XIe siècle, renforcés au XIVe siècle sous le règne de Pierre le Cérémonieux, il fit bâtir douze tours semi-circulaires dont quatre sont encore visibles, au XVe (tour du Diable) et sous Vauban construction des six bastions d'angle, ceux du Roi, de la Reine, du Dauphin, de Corneilla, de la Boucherie et de la Montagne. Les deux grandes portes de France et d'Espagne ont été ouvertes sous Louis XVI. On peut circuler dans les remparts en suivant le double chemin de ronde, le chemin médiéval, couvert et surmonté par celui de Vauban.  Le génie de Vauban réside dans sa capacité à adapter les défenses d'une cité à son identité géographique. D'où l'inscription en juillet 2008 sur la liste du patrimoine mondial de l'UNESCO de douze sites fortifiés* par Vauban en France, dont celui de Villefranche, chacun d'eux témoignant d'une caractéristique de sa pensée architecturale et militaire. Trois cents ans après le passage de Vauban, les remparts encerclant la cité, le fort Libéria surplombant celle-ci et la grotte casematée dite \" Cova Bastera \" sont autant d'incarnations de son talent.","architecture":"Villefranche de Conflent est entourée d'une enceinte de forme rectangulaire allongée. De l'époque médiévale subsiste notamment la tour du Diable, attenante à l'église (angle sud-est). Elle porte par ailleurs l'inscription \"Elle fut commencée l'an 1441 et finie l'an 1454\". De plus il reste la majeure partie de la courtine sud, flanquée de deux tours semi-circulaires (du XIVe siècle, antérieures à la tour du Diable). Cette courtine et ces tours furent renforcées au XVIIIe siècle par l'installation de trois bastions et d'un nouveau chemin de ronde. la deuxième est quant à elle entre la tour du Diable et le bastion de la Reine (angle sud-ouest). Une troisième tour de même plan s'élève à l'angle nord-ouest, englobée dans le Bastion du roi. De cette période subsistent également la porte du Roussillon et la porte de France la nouvelle porte du XVIIe siècle a été construite à sa gauche, respectant ainsi l'édifice médiéval, de même qu'une partie de la porte ouvrant sur le Pont Saint-Pierre. Au XVIIe siècle, Vauban fait donc reconstruire et renforcer les fortifications médiévales, il fait notamment édifier un fort détaché communiquant par un souterrain. De nouveaux bastions sont édifiés  : le bastion du Roi (angle nord-ouest), le bastion de la Reine (angle sud-ouest), le bastion du Dauphin (angle nord-est), le Bastion de Comellà (angle sud-est) et le bastion de la Boucherie (courtine nord, sur le pont Saint-Pierre). A la fin du XVIIIe siècle on reconstruit la Porte de France (en 1783, sur le front Est) et la Porte d'Espagne (en 1791), située à l'ouest de la ville, à l'emplacement de l'ancienne tour-porte.","habitants":"Vauban\r\n        \"","divers":"Citadelle de Villefranche de Conflent","gps":"","images":["../image/image_66/66_Villefranche_Conflent_1.jpg","../image/image_66/66_Villefranche_Conflent_2.jpg","../image/image_66/66_Villefranche_Conflent_3.jpg","../image/image_66/66_Villefranche_Conflent_4.jpg","../image/image_66/66_Villefranche_Conflent_5.jpg","../image/image_66/66_Villefranche_Conflent_6.jpg","../image/image_66/66_Villefranche_Conflent_7.jpg","../image/image_66/66_Villefranche_Conflent_8.jpg"]},"Consult_chateau_formulaire4899":{"id":"Consult_chateau_formulaire4899","dept":"66","canton":"Amélie les Bains","commune":"Vinça","nom":"Vinca","type":"Village fortifiè","periode":"XI","histoire":"VINCA, le vestige de ruine castrale se trouve sur une colline nommée El Castello . En 1245, l'enceinte du château est agrandie. Vers 1245, le Roi d'Aragon, Jacques le Conquérant, accorde divers privilèges aux habitants du bourg, dont le droit de construire des fortifications à leurs frais. En 1247, durant la guerre entre Majorque et Aragon, une partie des défenses est endommagée, en 1330, un nouveau mur est construit entourant le bourg. Des douves sont aménagées en détournant les eaux de la rivière Réal. la guerre de 1344-1374 laissa de nombreuses traces dans la ville. En 1344 Jacques III de Majorque, maître du Roussillon, du Conflent et de la Cerdagne (ces trois régions étaient incluses dans le royaume de Majorque) se fait ravir son royaume par Pierre IV d'Aragon son rival. Le Conflent est alors remis sous gouvernement Aragonais. Mais sans abdiquer pour autant, Jacques III remonte une armée et traverse le Conflent, tentant de renverser les villes perdues.  Il faut dire que Vinça, tout comme les autres villages, étaient en faveur de Jacques III qui les années auparavant leur avait laissé une grande liberté. La ville s'ouvrit donc à son ancien roi en 1347, mais ce fut de courte durée : Défait à nouveau, les troupes de Pierre IV d'Aragon pénétrèrent en ville. La population, effrayée, s'enfuit en traversant la Têt mais celle ci, gonflée par les eaux d'un violent orage, emporta une bonne partie des habitants. Ce fut un désastre qui marqua une baisse considérable dans le nombre de feux de la ville. En 1361, Pierre IV d'Aragon autorise les villageois à reconstruire des remparts. En 1377, de nouveaux travaux de modernisation du système défensif sont entrepris. A la fin du XIVe siècle, un canon (lanceur de pierres) est fondu à Villefranche (proche de Vinça). Le carrier du bourg taille des petits boulets.","architecture":"La ville de Vinça vers 939, sur une butte à l'Ouest, un château est construit  était au Moyen-âge une importante ville du Conflent, passé sous le contrôle aragonais en 1172 comme le reste de la région. Il existe des preuves de l'existence d'une château dès le IXe siècle, et c'est probablement là l'origine du village : le château a fédéré les habitants de  la région de façon a pouvoir être protégé en cas d'attaque.Le bourg possède une deuxième porte presque intacte (bien que très consolidée). Le double vantail en bois a disparu, mais il reste les traces des gonds et de la poutre de blocage. Point de bretèche ni d'assommoir est visible, mais le rêve défensif est possible avec l'emplacement de la herse. Contrairement aux autres murs qui servent de façades aux habitations, celui-ci ressemble à un site désaffecté.","habitants":"Jacques le Conquérant Roi d'Aragon\r\n        \"","divers":"Village fortifié de Vinça","gps":"","images":["../image/image_66/66_Vinca_1.jpg","../image/image_66/66_Vinca_2.jpg","../image/image_66/66_Vinca_3.jpg"]},"Consult_chateau_formulairee3c1-2":{"id":"Consult_chateau_formulairee3c1-2","dept":"66","canton":"Rivesaltes","commune":"Le Vivier","nom":"Vivier_Py_Or","type":"Vestiges","periode":"X-XII","histoire":"VIVIER, ce château à la particularité de n'avoir eu qu'une seule famille seigneuriale durant toute son histoire, et ça jusqu'en 1850 à la mort du dernier seigneur qui avait eu trois filles, toutes mariées ailleurs. La présence d'un château, pour la population, a une très grande importance, c'était l'assurance d'une protection efficace.  C'est la raison pour laquelle les habitants construisirent leurs maisons de plus en plus souvent à proximité immédiate du château, constituant un nouveau site d'habitation qui deviendra au fil du temps le village du Vivier.","architecture":"On trouve une trace du village à partir du Xe siècle grâce aux templiers, qui commençaient leur ascension. Ce sont ceux de la Commanderie du Mas Deu qui vinrent s'installer en différents endroits du Fenouillèdes. Ils étaient particulièrement expansifs et purent acheter de nombreuses terres un peu partout, faisant croître la population du village qui se développa sous leur impulsion. Lors de la chute des templiers, au XIIIe siècle, le Fenouillèdes était sous la férule du Vicomte de Fenouillet, qui administra la vie locale. L'actuel édifice seigneurial a été édifié en 1604 par Henry Monsarrat du Vivier, seigneur né sous le règne du roi Henri et décédé à 83 ans sous le règne de Louis XIII. \r\nUne anecdote à présent. Suite à une victoire sur les Espagnols à Leucate à laquelle avait pris par ledit seigneur, le prince de Condé, le Duc de Jouyeuse et d'autres personnalités de cette époque était venues à Le Vivier fêter dignement ce succès par des ripailles qui auraient duré une bonne semaine.","habitants":"Famille d'Henry Monsarrat du Vivier\r\n        \"","divers":"Vestiges du château de Viviers","gps":"","images":["../image/image_66/66_Vivier_Py_Or_1.jpg","../image/image_66/66_Vivier_Py_Or_2.jpg","../image/image_66/66_Vivier_Py_Or_3.jpg","../image/image_66/66_Vivier_Py_Or_4.jpg","../image/image_66/66_Vivier_Py_Or_5.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','66 — Pyrénées-Orientales'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
