ult_chateau_formulaire5dfb","dept":"66","canton":"Amélies les Bains-Palalda","commune":"Amélie les Bains-Palalda","nom":"Amélie_les_Bains","type":"Vestiges","periode":"XII","histoire":"AMELIE  les BAINS, en 1280 le territoire a été acheté par Nunyo Sanch à l'abbé d'Arles. Vu qu'il se trouve à la limite entre le Haut-Vallespir, les Aspres et les Albères, la région n'a pas été prise de plein fouet par les événements qui se déroulaient dans chacune d'elle.  En 1661 il y a le rétablissement de la gabelle.  La révolte des Angelets a durée de 1663 à 1672, passée sous contrôle de l'état Français après la Révolution la commune vendit les thermes en 1813 à un certain Hermabessière qui fit faire des travaux colossaux pour les remettre en état. Il fit rajouter de nombreux bâtiments, rénova les anciens et parvint à en faire une station thermale à la mode. En 1840 le lieu-dit prit son nom actuel, passant du nom \"La ville des bains d'Arles\" à \"Amélie les bains\" en l'honneur de la reine Amélie. La station fut touchée deux fois par les inondations. La première fois en 1908, la deuxième le 18 novembre 1940 où une crue du Tech la dévasta. En 1942, le petit village de Palalda, cité pour la première fois en 833, fut rattaché à la station thermale. Le nom actuel de la commune est donc \"Amélie les bains-Palalda\".                                                       PADALDA  relevé des la vicomté de Castelnou, le village a une allure médiévale, avec la place au centre de l'ancien château donnant sur l'église Saint-Martin, une famille de Palauda est mentionnée au XIIIe siècle.                                                                                                                                           le château de MONDONY   hameau de Montalba remonte au IXe ou Xe siècle avec la construction du « château de Mondony ».","architecture":"Amélie les Bains, fort du Moyen-Age, il s'agissait d'un ancien château médiéval largement remanié  pour lui donner l'aspect que l'on connait de nos jours. L'ingénieur en était St Hilaire, qui a effectué ces modifications en 1670. Il fut encore modifié en profondeur par Vauban lors de sa tournée en Roussillon. Le fort est de petite taille, de forme  carré. De nos jours c'est une propriété privée. Il s'accompagne d'un hôpital militaire, dans la ville.                                                                                            Encore plus ancien, la tour El Banys se dresse encore un peu au Sud de la ville, très en hauteur. Elle faisait partie du réseau de tours à signaux des rois de Majorque                                                                            Le château de Mondony   hameau de Montalba  situé sur la Roca de Sant-Salvador et dont la présence est attestée en 1020-1021 dans le testament du comte de Bésalu. Il est probable que ce château, dont il ne reste aujourdhui quun vestige navait dautre caractère que celui dun repaire féodal. Peut-être même fut-il, à lorigine, un lieu de défense ou de refuge pour les populations chrétiennes, lors de linvasion des Arabes. Plus tard, sous les rois Francs, il put être la résidence ou le siège des administrateurs locaux, cest-à-dire des vicomtes, lieutenants des comtes de Bésalu dans le Haut Vallespir.","habitants":"Monsieur Hermabessière\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Le Fort d'Amélie les Bains, la maison forte de Mondony et vestiges du château de Palalda.","gps":"","images":["../image/image_66/66_Amelie_les_Bains_1.jpg","../image/image_66/66_Amelie_les_Bains_2.jpg","../image/image_66/66_Amelie_les_Bains_3.jpg","../image/image_66/66_Amelie_les_Bains_4.jpg","../image/image_66/66_Amelie_les_Bains_5.jpg","../image/image_66/66_Amelie_les_Bains_6.jpg","../image/image_66/66_Amelie_les_Bains_7.jpg","../image/image_66/66_Amelie_les_Bains_8.jpg"]},"Consult_chateau_formulaire4b5b":{"id":"Consult_chateau_formulaire4b5b","dept":"66","canton":"Argelès sur Mer","commune":"Argelès sur mer","nom":"Argelès_II","type":"Château","periode":"XII-XIX","histoire":"TAXO d'AVAL, une puissante seigneurie au Xe siècle, qui devient une vicomté dès 1013 et le village s'équipe d'un château. C'est un certain Guillem qui devint vicomte de Tatzo sous le nom de Guillem 1er. A sa mort en 1052 Udalgar 1er prit son titre.  En 1082 Udalgar décède. Jordana, qui s'est mariée avec un membre de la famille de Llupia. En 1145 Jordana décède et laisse la place à son fils Hugues II qui régnera jusqu'en 1163, puis se sera son fils Ramon II jusqu'en 1176 et enfin Ramon III jusqu'en 1251. A partir de là s'arrête la descendance directe de la famille de Taxo au profit de celle de Llupia. Entre temps en 1172 le Roussillon est passé sous la coupe du comte de Barcelone. En 1367 le village fut en grande partie ruiné par l'invasion des mercenaires de Charles V qu'il envoya en Espagne aider la lutte de Henri de Trastamarre contre Pierre de Castille. Vers le XIVe et XVe siècle, la seigneurie de Tatzo d'Avall passe aux mains d'une branche de la famille d'Oms. En 1653, les seigneurs de Tatzo participent à la révolte Tatzo passera entre les mains de nobles plus fidèles au roi (le comte de Noailles en 1656, le baron de Monclar en 1668).                                                                                                                                                             VALMY, le château de Valmy  bâti de style Art-Nouveau, sur les hauteurs de la ville, l'architecte danois qui le conçut était Viggo Dorph-petersen. Il a été bâti  de 1888 à 1900  par l'héritière des papiers à cigarette job Camille et Jeanne Bardou et son gendre Jules Pams devenu ensuite ministre de l'agriculture, en 1930, à la mort de Jules Pams, sa seconde épouse, Mme Holtzer, héritière de la fortune des Pams et d'une partie de celle des Bardou, vendit le château de Valmy à Victor Peix, distillateur à Millas. Ce dernier étendit le domaine viticole et créa les marques Valmy et Valmya.  Malgré quelques périodes brillantes , le château tombe peu à peu dans l'oubli l'exploitation viticole s'arrête en 1986 et les communs et une partie du parc sont cédés à la commune d'Argelès, les vignes  reprit par Bernard Carbonnell  petit-fils qui les développa.  Pierre Bardou, petit fils de la famille Peix qui entreprit sa restauration et lui redonna un nouvel essor.   Aujourd'hui chambres d'hôtes.","architecture":"Le château de Tatzo d'Aval se trouve au village. Il en reste des ruines précieusement conservées, surtout une partie du mur d'enceinte crénelé datant du XIe siècle et deux tours d'angles semi-circulaires édifiées par la suite. Le château était équipé également d'une tour à signaux circulaire datant du XVe siècle. La vue permet de dire qu'elle était en relation avec celle de la Massane et de la Madeloc.   \r\nVALMY   La construction se fit à partir de 1888 et dura 12 ans, jusqu'en 1900, et son inauguration en 1904. C'est une grande demeure bourgeoise  aux dimensions extravagantes, dont les clochetons travaillés, les tourelles élancées, les fenêtres longues et asymétriques, les bow-windows et les médaillons floraux en céramique forment de curieux mélanges de styles  mais harmonieux. Ce château est l'un des premiers bâtiments privés construits à partir d'une charpente en béton armé.","habitants":"Famille d'Oms                                                                                     Camille  Bardou\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Taxo d'Avall et de Valmy.","gps":"","images":["../image/image_66/66_Argeles_II_1.jpg","../image/image_66/66_Argeles_II_2.jpg","../image/image_66/66_Argeles_II_3.jpg","../image/image_66/66_Argeles_II_4.jpg","../image/image_66/66_Argeles_II_5.jpg","../image/image_66/66_Argeles_II_6.jpg","../image/image_66/66_Argeles_II_7.jpg","../image/image_66/66_Argeles_II_8.jpg"]},"Consult_chateau_formulaire3236":{"id":"Consult_chateau_formulaire3236","dept":"66","canton":"Argelès sur Mer","commune":"Argelès sur Mer","nom":"Argelès_sur_Mer","type":"Vestiges","periode":"XIII","histoire":"Plusieurs cites et  châteaux à Argelès sur mer, celui de Poujols et  d' Ultréra vestiges ( Article suivant ), Taxo d'Aval,  et celui de Valmy.                                                                                                                                               PUJOLS. Ce château, appelé  \"Tour de Pujol\", semble avoir été construit durant le XIe siècle sur l'initiative du comte du Roussillon. Il date du XIIIe siècle. Il ne reste que son donjon qui a été restauré et l'enceinte. A la création de la vicomté de Tatzo (Taxo), le comte inféoda cette place forte au nouveau vicomte. Mais en 1143 une guerre locale débuta entre le comte Gaufred et le vicomte Bérenger de Llupia au sujet de Pujol justement. Mieux armé, le comte pu le récupérer militairement. Un accord définitif fut trouvé en 1143 entre les deux parties. On retrouve le château en 1343, année où le roi d'Aragon, ennemi juré du roi de Majorque tente d'envahir le Roussillon par la force, prennent tour à tour Banyuls, Collioure et font le siège devant le château de Pujol. Nous sommes le 2 juin 1343. L'assaut est donné, mais Pujol se défend bien. Repoussé, les assaillants se retirent. Il semble que par la suite Pujol soit restée une possession du comte du Roussillon dont tous les biens passèrent au comte de Barcelone à la mort de Guinard II, puis au roi de Majorque lors de la création de cet éphémère royaume.                                                                                                         ULTRERA . Il est appelé plus souvent le Castell d'Ultréra, se dresse sur un éperon rocheux  surveillant toute la plaine du Roussillon. C'est en effet en 1296 que Jacques 1er d'Aragon rattache le château et la chapelle de La Pave à l'archidiaconat de Sorède et à la seigneurie de Sorède. Ayant un double maître, ce château sera désormais la source de conflits qui prendront fin par l'avantage que prendra l'archidiacre, avantage qu'il conservera jusqu'en 1675, ainsi que les gorges de Lavail.  Le chanoine François de Vilaplane, frère de Jeanne, voulut réparer le forfait de sa sur. Il fit construire une nouvelle chapelle en 1681, Notre Dame du château.  Pour bien marquer la continuité de l'office, il fit apposer les meilleurs morceaux de la chapelle castrale sur le nouvel édifice.","architecture":"PUJOL,  il date du XIIIe siècle.  La tour est si imposante qu'elle fut un donjon habitable et de repli d'un véritable château fort. Elle a été acheté par la mairie d'Argelès il y a quelques années. Une association de bénévoles à désherbé et débroussaillé ses alentours.  En partie basse, une porte a été aménagée. La salle basse est généralement aveugle et accessible uniquement depuis l'étage supérieur par une échelle amovible. L'architecture de cette porte basse n'est pas récente. Elle a été créée il y a plusieurs siècles, après les périodes guerrières du XVIe siècles.                                                                                                                        La tour de la Massane tient son nom du fleuve.  Elle est à l'origine une tour de guet, à l'instar de la tour Madeloc, mise en place par les rois de Majorque,  Jacques II de Majorque. Elle est encore décrite au XVIIIe siècle comme étant habilitée à transmettre des signaux de fumée ou tirer des coups de canon en signe d'avertissement. Vers 1780 sa façade est blanchie afin de servir de repère depuis le large, avec le Fort Saint-Elme, pour mieux situer le port de Port-Vendres.                                                                                    Ultréra,   il ne reste aujourd'hui que des ruines du château, il fait partie d'un ensemble de fortifications, dont la tour de guet de la Massane et l'ancien château de Montbram, situé au-dessus du hameau de Lavail sont destinées à défendre et surveiller un passage naturel entre le Roussillon et la Catalogne. Ce château est en vis-à-vis de celui de St Pierre,  Ces morceaux sont toujours visibles, il s'agit des blocs de marbre blanc plaqués au dessus du portail Nord. De nos jours Ultréra est en ruine, il reste quelques pans de fortifications, les bases du donjon.","habitants":"Vicomte Bérenger de Llupia                                                                  Chanoine François de Vilaplane             \r\n        \r\n        \r\n        \r\n        \"","divers":"Vestiges du château de Poujol, d'Ultréra et la tour de Massane.","gps":"","images":["../image/image_66/66_Argeles_sur_Mer_1.jpg","../image/image_66/66_Argeles_sur_Mer_2.jpg","../image/image_66/66_Argeles_sur_Mer_3.jpg","../image/image_66/66_Argeles_sur_Mer_4.jpg","../image/image_66/66_Argeles_sur_Mer_5.jpg","../image/image_66/66_Argeles_sur_Mer_6.jpg","../image/image_66/66_Argeles_sur_Mer_7.jpg"]},"Consult_chateau_formulaire1c1b":{"id":"Consult_chateau_formulaire1c1b","dept":"66","canton":"Amélie les Bains-Palalda","commune":"Arles sur Tech","nom":"Arles_sur_Tech","type":"Château","periode":"XIII","histoire":"Plusieurs châteaux à Arles sur Tech, le château Bleu, de Batère, l'Abbaye et le château et L'ille à Saint-Laurent de Cerdans                                                                                                                                              ARLES sur TECH,   en 1235 eu lieu une importante révolte de la population contre leur abbé au sujet des droits féodaux : Il était accusé d'abuser de son autorité. Suite à cette révolte la population a pu faire accepter une charte de libertés communales, rendant la vie des habitants un peu plus agréable. Un cloître fut construit par l'abbé Raymond Desbach. En 1515 l'administrateur perpétuel de l'abbaye était Honoré d'Oms. Et en 1564, il s'agissait de Michel d'Oms. Tout se passe sans histoire jusqu'à la Révolte des Angelets, entre 1667 et 1671. Le 8 octobre 1712 l'abbaye concède aux consuls des Bains d'Arles \"les eaux chaudes, bassins et bâtiments servant aux bains, et d'y tenir une prison à la disposition de l'abbé.   Au XVIIIe siècle la vie monacale s'éteint peu à peu à Arles. Le 24 mars 1770 l'évêque d'Elne qui avait le titre d'abbé d'Arles démissionne de cette charge. Un abbé commendataire est nommé, il procédera à la liquidation. A la Révolution française l'abbaye fut menacé de vente en tant que bien national, ce qui a été le cas de bien des sanctuaires religieux. Mais la pression des arlésiens a fait que l'église abbatiale s'est transformée en église paroissiale. L'église s'est dotée d'un grand orgue, toujours sur place, au XVIIIe siècle. Enfin, signalant que tous les 30 juillet a lieu la fête patronale, avec pour point d'orgue la procession de la Rodella (roue dans laquelle est entouré un long fil de cire). Cette tradition fut créé au XVe siècle et elle est toujours en vigueur aujourd'hui.","architecture":"la ville d'Arles sur Tech  sest construite de façon circulaire autour de lAbbaye, durant lépoque féodale, c'est  à cette époque que la ville fut fortifiée, s'équipant notamment de tours dont deux seulement sont toujours en place. Durant le XIIIe siècle le cloître fut construit. Il est gothique, sans aucune sculpture ni fioriture, en marbre blanc sauf les fines colonnes jumelles qui sont en pierres de Gérone.                                                                                                                           Le château Bleu du XIXe siècle de plan en U à quatre niveaux transformé en maison de repos,                                                                              Batère, ce château  propriété  des mines de Batère, de style manoir avec tour carrée à quatre niveaux avec terrasse couverte, corps de logis de plan en T avec fronton.                                                                           Château de l'ille du XIXe siècle à Saint-Laurent de Cerdans de style manoir de plan rectangulaire à deux niveaux sur soubassement,  toit à l'impérial avec un pavillon d'entrée saillant avec  balcon sur colonne et fronton à pinacle et lucarnes sur toiture.","habitants":"abbé Raymond Desbach\r\n        \r\n        \"","divers":"Le château d'Arles sur Tech, de Batère, le château Bleu et l'Abbaye.","gps":"","images":["../image/image_66/66_Arles_sur_Tech_1.jpg","../image/image_66/66_Arles_sur_Tech_2.jpg","../image/image_66/66_Arles_sur_Tech_3.jpg","../image/image_66/66_Arles_sur_Tech_4.jpg","../image/image_66/66_Arles_sur_Tech_5.jpg","../image/image_66/66_Arles_sur_Tech_6.jpg","../image/image_66/66_Arles_sur_Tech_7.jpg","../image/image_66/66_Arles_sur_Tech_8.jpg"]},"Consult_chateau_formulaire2ef3":{"id":"Consult_chateau_formulaire2ef3","dept":"66","canton":"Rivesaltes","commune":"Sournia","nom":"Arsa_Sournia","type":"Vestiges","periode":"XI","histoire":"ARSA-SOURNIA, c'est durant le haut Moyen-Age que Sournia eu son château, en 1020 il n'existait pas encore puisqu'il n'apparaît pas dans le testament du comte de Bésalu alors que toutes les autres places fortes de la région y étaient mentionnées. Simple demeure fortifiée, elle permettait toutefois de mettre à l'abri la plupart des habitants. Ce château sera le lieu d'habitation des seigneurs de Sournia, famille qui apparaît au XIIe siècle dont voici quelques traces : En 1141,  Arnald de Sornian, frère de la milice du temple assiste et signe comme témoin de la fondation d'une commanderie en comté de Barcelone  faite au temple par Udalgar de Fenollet et ses fils, de tous leurs droits sur les Honors de Guillem Ramon de Corbos. En 1142 , Arnald de Sornian reprend à son fils diverses redevances pour les céder à la milice du temple et donne en compensation un manse à Sournia. L'acte est signé par le donateur et ses fils Guillem, Bérenger Arnald et Hug. La même année Bérenger de Sournia signe en qualité de témoin l'acte de donation au temple par le même vicomte du bois de Mata Penista. En 1161  Guillem de Sornian, archidiacre, est témoin d'une donation faite par le vicomte Udalgar à l'abbaye de Fontfroide d'un jardin sis à St-Féliu d'Amont. Il semble que la famille se soit ensuite éteinte et Sornia disparaît jusqu'au XVe siècle, époque où l'on retrouve Pierre-Ramon de Montesquieu, seigneur de Sournia (1438-1459). Au siècle suivant la famille de Casteras a réuni entre ses mains Sournia, Queribus, Lapalme (en Narbonnais), Cucugnan et Ségure. En 1584 Louis de Casteras est châtelain de Quéribus et remonte le nom de la famille de Sournia qui s'était perdu. On trouve donc suite à cet événement une Dona Gabrielle de Sinisterra y de Sournia vers 1640, habitante de Perpignan. A l'époque moderne, le château a été vendu à la municipalité qui l'a démoli et transformé les ruines en habitation.","architecture":"Arsa-Sournia,  il y a aussi un ancien village, Courbous  qui est de nos jours une simple exploitation agricole.   La porte d'entrée se trouvait à l'origine sur la face sud de l'édifice, à l'extrémité d'une rue qui était ouverte entre quelques maisons et la muraille Est du château. Les deux extrémités de cette rue furent bouchées et devinrent propriété privée.  En 1853, on mura l'entrée sud et l'on en construisit une nouvelle, celle qui existe encore sur la face ouest.   Le château de Sournia a gardé à l'extérieur certains signes de son ancienne importance féodale tels que tours à poivrière et mâchicoulis au dessus des poternes. Mais à l'intérieur le château est devenu un vaste édifice composé de plusieurs habitations distinctes. L'ensemble de son architecture actuelle semble indiquer une reconstruction, du moins partielle, remontant au XVe ou XVIe siècle.                                                                                                          à l'époque romane, une période large du XVIIIe au XIVe siècle , une chapelle est construite, et comme un peu partout les habitants vinrent s'y réfugier en cas de nécessité, construisant leurs maisons à proximité.  C'est là l'origine de ce village que l'on retrouve dans quelques écrits concernant les lieux alentours.","habitants":"Famille de Casteras\r\n        \"","divers":"Vestiges du château d'Arsa à Sournia","gps":"","images":["../image/image_66/66_Arsa_Sournia_1.jpg","../image/image_66/66_Arsa_Sournia_2.jpg","../image/image_66/66_Arsa_Sournia_3.jpg","../image/image_66/66_Arsa_Sournia_4.jpg","../image/image_66/66_Arsa_Sournia_5.jpg","../image/image_66/66_Arsa_Sournia_6.jpg","../image/image_66/66_Arsa_Sournia_7.jpg","../image/image_66/66_Arsa_Sournia_8.jpg","../image/image_66/66_Arsa_Sournia_9.jpg"]},"Consult_chateau_formulaire5473":{"id":"Consult_chateau_formulaire5473","dept":"66","canton":"Céret","commune":"Céret","nom":"Aubiry","type":"Château","periode":"XIX","histoire":"AUBIRY, construit  par Pierre Bardou, fils de Joseph Bardou, créateur des papiers à cigarettes JOB qui avait succédé à son père. Pierre avait trois enfants, Justin, Jeanne et Camille. Chacun eu son château. Aubiry pour Justin, Valmy pour Jeanne et Ducup de St Paul pour Camille. Commencé en 1894, il ne fut achevé que six ans plus tard, en 1900. L'architecte était Vigo Dorph Petersen, un danois très en vogue dans le Roussillon, qui construisit également le château de l'Esparrou,  il présente un décor intérieur très abondant, en particulier Art Nouveau. Un parc à l'anglaise comporte des pavillons, un bassin de natation, des terrasses et des serres. Caractéristiques de l'architecture métallique du début du XXe siècle, ces dernières sont construites par la fonderie du Val d'Osne. Trois dômes vitrés de 16 mètres de hauteur sont reliés par des galeries, l'ensemble mesurant 108 mètres de long. \r\nCe château passa de générations en générations aux descendants de la famille Bardou jusqu'en 1973 où il fut racheté par un industriel qui le possède toujours de nos jours.","architecture":"Le château d'Aubiry est  construit  de 1893 à 1904, de style bourgeois Art-Nouveau bavarois comme Valmy et Ducup. Au fil des ans, Aubiry fut très bien entretenu, l'histoire nous a légué un château en bon état. Par contre, les dépendances ont souffert, et surtout les serres. Faites d'une structure métallique sur laquelle on plaqua des carreaux de verres, la rouille fit de grands dégâts. De plus elles ont brûlé il y a quelques années. De nos jours il manque la plupart des verres.  En totalité, le château, la chapelle, les serres, la maison du jardinier, les terrasses, le parc et la totalité du bâti situé à l'intérieur du mur de clôture du domaine (y compris ce mur, son portail d'entrée, la grande allée et la maison du gardien) , ainsi que l'oratoire Sainte-Marguerite, à l'exception des bâtiments de la cave viticole ; les façades et toitures des bâtiments de la cave viticole et des logements correspondants ainsi que l'emprise de toutes les parcelles du domaine concernées par la protection  font l'objet d'une inscription au titre des monuments historiques par arrêté du 19 janvier 2006.","habitants":"Famille Bardou\r\n        \"","divers":"Château d'Aubiry à Céret","gps":"","images":["../image/image_66/66_Aubiry_1.jpg","../image/image_66/66_Aubiry_2.jpg","../image/image_66/66_Aubiry_3.jpg","../image/image_66/66_Aubiry_4.jpg","../image/image_66/66_Aubiry_5.jpg","../image/image_66/66_Aubiry_6.jpg","../image/image_66/66_Aubiry_7.jpg","../image/image_66/66_Aubiry_8.jpg","../image/image_66/66_Aubiry_9.jpg"]},"Consult_chateau_formulaire61a1":{"id":"Consult_chateau_formulaire61a1","dept":"66","canton":"Thuir","commune":"Banyuls sur Mer","nom":"Banyuls","type":"Château","periode":"XVIII","histoire":"A Banyuls divers châteaux tel que le Montana viticole.                                                                     BANYULS, l'organisation du vignoble, implanté par les Grecs et Phéniciens, va être radicalement modifiée, au cours du Moyen-Age, par les Templiers qui mettent en place un système de filtrage et d'écoulement des eaux pluviales qui est d'ailleurs toujours utilisé actuellement. La ville change régulièrement de suzerain, les Banyulencs ont vu le Royaume d'Aragon, puis le Royaume de Majorque du XIIe au XIVe siècle, puis appartient ensuite au Royaume de Castille au XVe siècle.","architecture":"A Banyuls, des manoirs, des maisons fortes avec échauguettes, le domaine de Montana viticole gentilhommière de plan en T.","habitants":"Seigneurs locaux\r\n        \"","divers":"Vue de Banyuls avec ses châteaux et Villa maison forte  et domaine de Montana","gps":"","images":["../image/image_66/66_Banyuls_1.jpg","../image/image_66/66_Banyuls_2.jpg","../image/image_66/66_Banyuls_3.jpg","../image/image_66/66_Banyuls_4.jpg","../image/image_66/66_Banyuls_5.jpg","../image/image_66/66_Banyuls_6.jpg"]},"Consult_chateau_formulaire43a7":{"id":"Consult_chateau_formulaire43a7","dept":"66","canton":"Prades","commune":"Olette","nom":"Bastide(la)","type":"Vestiges","periode":"XIV","histoire":"La BASTIDE, était un château lié au vicomte d'Evol. C'est en effet Jean de So, vicomte d'Evol, qui décida de renforcer ses terres en protégeant leurs accès par l'Est, c'est à dire la vallée de la Têt. Le vicomte avait sa résidence principale à Evol et possédait les terres du Capcir (de Caramat, tout au Nord, à Matemale, sauf Puyvalador et Formiguères, villes royales) plus Estavar et quelques droits et revenus en Haut-Conflent. La construction du château remonte à 1340, mais sa première mention date de 1345 seulement. Il est intéressant de savoir que ce sont les rois de Majorque qui ont élevé Evol au rang de vicomté en  1334. Le second château était aussi un besoin de marquer sa toute nouvelle puissance sur la région. Il était conçu pour être le centre militaire des fortifications du Haut-Conflent et devait accueillir la famille de So elle-même. Mais ceux-ci préférèrent s'installer à la cour du roi plutôt que de vivre dans un château au confort modeste.","architecture":"La Bastide aujourd'hui ruiné il fut bâti selon le modèle du château initial d'Evol : un quadrilatère flanqué de tours rondes, dont deux subsistent encore aujourd'hui. L'originalité par rapport au modèle résidait dans l'absence de donjon.  Ce château joua également un rôle social, comme partout ailleurs, la population se regroupa dans ses murs et forma un embryon de village qui n'a pas survécu à l'abandon de la forteresse. Il était en relation constante avec le château d'Evol grâce à la tour d'Oreilla, une tour à signaux située près d'Olette, sur le territoire d'Oreilla, également une possession du vicomte d'Evol.","habitants":"Famille de So\r\n        \"","divers":"vestiges du château de la Bastide (tour).","gps":"","images":["../image/image_66/66_Bastide(la)_1.jpg","../image/image_66/66_Bastide(la)_2.jpg","../image/image_66/66_Bastide(la)_3.jpg"]},"Consult_chateau_formulairec8f2":{"id":"Consult_chateau_formulairec8f2","dept":"66","canton":"Amélie les Bains-Palalda","commune":"Batère-Corsavy","nom":"Batère_Corsavy","type":"Vestiges","periode":"XII","histoire":"CORSAVY, vestige du château féodal de  la fin du XIIIe siècle, Raimond, seigneur de Termes, se marie à Ermessende de Corsavy.  Le château de Corsavy dit Casteil est antérieur au XIIe siècle. Il nexiste presque plus de traces visibles de celui-ci et son accès nest pas praticable, d'après le nom du col qu'elle surveille. On trouve au XVe siècle la formule tour de la Porte.                                                                                                                                          TOUR de BATERE,  dépendance  au XIIIe siècle du château de Castelnou centre d'une vicomté. Le nom de Batèra apparaît en 1494 et s'impose par la suite.  Au XVIIe siècle la tour  fait partie du système des tours à signaux qui a fonctionné en tant que réseau de communication militaire durant tout le Moyen-Age central, du XIIe au XVe siècle. Elle a été construite sur ordre du roi Jacques II de Majorque entre 1331 et 1344  à  la fin de la période des rois de Majorque vers 1340, dans le but de renforcer la protection du royaume face à la menace représentée par le roi dAragon. Dans le dispositif dinformation militaire du royaume de Majorque puis, après la défaite, dans celui de la Catalogne-Aragon, Batère a joué, avec la tour dEl Far (Tautavel) un rôle charnière de « nud de réseau » vers lequel convergeaient les informations des autres tours, et à partir duquel tout était envoyé vers le point de commandement, à Castelnou et au-delà vers Perpignan. Très en hauteur, visible de loin, offrant une large vue sur la plaine du Roussillon quelle était destinée à protéger, elle exhibe aussi la fonction politique qui était la sienne : être la sentinelle visible qui veille sur la région, la forteresse territoriale chargée dassurer la police, le symbole de lautorité du roi, organisateur de la principauté.","architecture":"Une tour à signaux surplombe le village de Corsavy, elle permettait de communiquer avec les autres tours des vallées du Roussillon pour prévenir des attaques.                                                       Batère est une tour ronde, est un archétype de ce qui se rencontre ailleurs dans la région, reflétant ainsi le fait que plusieurs tours ont été construites sur le même plan dans une même courte période de temps. Sur ce commun dénominateur, on observe bien sûr des variations : certaines sont plus hautes que Batère, ou plus larges, ou avec des murs plus épais.  La pièce centrale habitable est petite, 4,5 m de diamètre intérieur, une superficie de 15,90 m2 . Elle est éclairée par une seule fente d'éclairage et on y accède par une  porte ouverte à 2,50 mètres du sol extérieur, le premier niveau est une citerne. Parfois on peut voir la canalisation dans lépaisseur des murs qui alimente la citerne en eaux pluviales de la terrasse. Un escalier ménagé dans l'épaisseur des murs permet l'accès à la plate-forme sommitale. Certaines conservent leurs deux étages, celui de la salle darmes, celui du dortoir au-dessus, reliés par lescalier taillé dans le mur. Quelques-unes ont conservé les archères pour assurer léclairage et la défense, dautres non. Certaines ont un couronnement, montrant des parapets crénelés portés sur mâchicoulis, dautres pas, sans quon sache sils existaient ou non. Certaines sont pourvues dune enceinte basse, dun chemin de ronde au pied de la tour.","habitants":"Jacques II de Majorque\r\n        \r\n        \r\n        \"","divers":"Vestiges tour de Corsavy et de Batère","gps":"","images":["../image/image_66/66_Batere_Corsavy_1.jpg","../image/image_66/66_Batere_Corsavy_2.jpg","../image/image_66/66_Batere_Corsavy_3.jpg","../image/image_66/66_Batere_Corsavy_4.jpg","../image/image_66/66_Batere_Corsavy_5.jpg","../image/image_66/66_Batere_Corsavy_6.jpg"]},"Consult_chateau_formulaire08bf":{"id":"Consult_chateau_formulaire08bf","dept":"66","canton":"Amélie les Bains-Palalda","commune":"Prunet et Belpuig","nom":"Belpuig","type":"Vestiges","periode":"XII-XIV","histoire":"BELPUIG, difficile à cerner avec précision, l'histoire médiévale de Prunet et de Belpuig est indissociable de celle de la vicomté de Castelnou. Les deux villages en faisaient partie du XIIe au XIVe siècle, et resteront jusqu'à la Révolution liés à la baronnie de Castelnou, dont les derniers seigneurs furent les membres de la famille Llupia. Les structures montrent qu'il a joué un rôle majeur au moins pendant quelques siècles.","architecture":"Belpuig, cité depuis le Xe siècle le lieu s'est d'abord appelé La Serra, le terme serra désignant, au moins en Roussillon, une ligne de crêtes. C'est la construction d'un château, sans doute au XIIe siècle, qui entraîne l'apparition du terme Belpuig (en catalan Bellpuig), autrement dit la belle colline, allusion à l'éminence sur laquelle s'est édifié le château et dont le nom laisse à penser qu'elle est bien protégée et dispose d'une belle vue sur l'ensemble du territoire environnant. La première mention connue  remonte à l'an 1241. Les ruines visibles  sont du XIIIe siècle.","habitants":"Famille Llupia\r\n        \"","divers":"Vestiges du château de Belpuig","gps":"","images":["../image/image_66/66_Belpuig_1.jpg","../image/image_66/66_Belpuig_2.jpg","../image/image_66/66_Belpuig_3.jpg","../image/image_66/66_Belpuig_4.jpg","../image/image_66/66_Belpuig_5.jpg","../image/image_66/66_Belpuig_6.jpg"]},"Consult_chateau_formulaire696f":{"id":"Consult_chateau_formulaire696f","dept":"66","canton":"Le Soler","commune":"Ile-sur-Têt","nom":"Bouleternère","type":"Château","periode":"XII","histoire":"BOULETERNERE, au début du Xe siècle, le bourg est situé en \"province de Confluent\", sous  la seigneurie de Bouleternère   en 1145, puis à  Jacques II de Majorque qui restitue le bourg au Royaume de France en 1309. A la fin du XVe siècle,  obtient le titre de Villa et siège  à Perpignan. En 1542, le dauphin de France, le futur Louis XI assiège Bouleternère, saccage la ville et tue les 3 consuls.","architecture":"Bouleternère, l'enceinte fortifiée du village comportait quatre tours et sept portes. Trois portes et deux tours ainsi qu'une grande partie des remparts existent encore à ce jour. Parfois, le blason de la ville apposé sur les panneaux de rue comporte le symbole stylisé d'une tour ou d'un château, mais à Bouleternère, bien que partiellement détruit, les restes du rempart sont impressionnants. Tours rondes évasées à la base avec fentes d'archère, murs avec crénelage sont les récompenses du touriste qui adore admirer les vieilles pierres.   Bien que la cité ait été partiellement amputée de ses remparts, le plan montre les vestiges existants et supposés.\r\n Le grand rectangle à gauche est l'église du XIIe siècle, inclus dans les remparts. En 1341, un fossé entoure la cité.  Au XXIe siècle, la découverte de l'extérieur des remparts. La visite des tours est impossible.","habitants":"Seigneur locaux\r\n        \r\n        \r\n        \"","divers":"Vestges du château de Bouleternère reste la  tour","gps":"","images":["../image/image_66/66_Bouleternere_1.jpg","../image/image_66/66_Bouleternere_2.jpg"]},"Consult_chateau_formulairee799":{"id":"Consult_chateau_formulairee799","dept":"66","canton":"Prades","commune":"Bourg-Madame","nom":"Bourg_Madame","type":"Château","periode":"XVIII","histoire":"BOURG-MADAME, à l'origine, la Guinguettte d'Hix  était un hameau de la ville du comté de Barcelone, situé près de la nouvelle frontière tracée entre la France et l'Espagne après les traités des Pyrénées de 1659 et de Llivia de 1660. Profitant du développement du commerce transfrontalier et de la contrebande, une grande partie des habitants d'Hix se déplacèrent vers le hameau des Guinguettes, qui finit par devenir plus peuplé que le village original. Lors des Cent-Jours, en 1815, Napoléon Ier avait exilé à Barcelone le duc d'Angoulême Louis-Antoine, fils aîné de Charles d'Artois (futur Charles X) et neveu de Louis XVIII. De retour après la bataille de Waterloo, le duc d'Angoulême s'installa le 10 juillet à Puigcerdà. Le duc décida d'élever le premier village français qu'il allait traverser au rang de ville : les habitants proposèrent alors de rebaptiser la ville Bourg-Angoulême. Mais le duc préféra rendre hommage à son épouse Marie-Thérèse de France (fille aînée de Louis XVI, elle portait donc le titre de « Madame Royale »), et donna à la ville le nom de Bourg-Madame.\r\nDe janvier à mars 1939, le gouvernement Daladier ouvre la frontière aux réfugiés espagnols affluant à travers les Pyrénées par Le Perthus, Cerbère et Bourg-Madame. Cet épisode de la guerre civile espagnole, connu sous le nom de Retirada, inspirera la chanson de Bourg-Madame qui évoque l'entrée des réfugiés dans le bourg.","architecture":"A Bourg-Madame le château  dAlp vers 1940, qui fut transformé en Sanatorium du Poum en 1936-1937,  bâtisse imposante corps de logis à quatre niveaux rectangulaire toit en croupe avec tours et tourelles  et échauguettes en encorbellement, l'ensemble crénelé accolé de dépendance avec terrasses.                                                                           Mas-Blanc, corps de logis carré de deux niveaux avec lucarnes sur toit en croupes avec tour carrée sortante au centre toit à quatre pans. Grande dépendance sur le côté Est de plan quadrangulaire à deux niveaux, aujourd'hui lycée.","habitants":"Marie-Thérèse de France \r\n        \"","divers":"Le château de -ourg Madame et le lycée de Mas Blanc (château)","gps":"","images":["../image/image_66/66_Bourg_Madame_1.jpg","../image/image_66/66_Bourg_Madame_2.jpg","../image/image_66/66_Bourg_Madame_3.jpg"]},"Consult_chateau_formulaire1d2c":{"id":"Consult_chateau_formulaire1d2c","dept":"66","canton":"Amélies les Bains","commune":"Serralongue-Lamanère","nom":"Cabrenc","type":"Vestiges","periode":"X","histoire":"CABRENC,  le site de Serralongue appelé Serra longa ''la longue montagne'' est occupé, au Xe siècle, par le château de Cabrenç de la vicomté de Castelnou, puis  appartient à la puissante famille seigneuriale des seigneurs de Corsavy. Au cours du XIIIe siècle, cette famille va se diviser et l'un des hameaux, installé à Serralongue, en prendra le nom. Le château de Serralongue voit son nom devenir Cabrenç, mais le nom du village et de la famille restera Serralongue. La famille de Serralongue se distingue lors de la croisade d'Aragon en 1284 en prenant le parti de Pierre III d'Aragon contre Philippe III de France et Jacques II de Majorque. Ce dernier, suzerain légitime de Serralongue, va essayer, en vain, de réduire la forteresse au cours des dernières années du XIIIe siècle. La seigneurie de Serralongue-Cabrenç  passera ensuite, au XIVe siècle, dans les mains de la famille de Rocaberti, puis changera à nouveau de mains, au cours de l'époque moderne.  Son dernier possesseur avant la Révolution de 1789, était Abdonennen de Ros. À cette époque, le château de Cabrenc était déjà abandonné depuis longtemps, Serralongue n'étant qu'un simple petit village de montagne. Les tours se trouvent à la limite de Serralongue et Lamanère. Dressé sur un éperon rocheux, le château est composé de 3 tours; il possède aussi une chapelle dédiée à St Michel, en ruine.","architecture":"Cabrenc dominant au nord-est  ensemble de trois châteaux occupant trois pics orientés au nord-sud. Les vestiges du château des seigneurs de Cabrenç du Xe siècle, Implanté sur le piton le plus élevé (1326 m), le château a été construit vers 1086-1088 et détruit par Vauban lors de la \"révolte des Angelets \" en 1663-1673. La tour médiane ou donjon ou fort du XIe siècle,  située à 1310 m d'altitude, au sommet d'un rocher abrupt, la tour médiane avait pour but de renforcer la défense du château. La tour à signaux ou tour Nord du XIVe siècle,  comme son nom l'indique, cette tour (1290 m) était un outil de communication avec les autres forteresses avec le château de Corsavy ou les autres tours à signaux de la région (Tour de Mir, Tour de Cos, Tour de Batère). Ces signaux se faisaient par le biais de feux de nuit ou de fumées le jour. Cet ancien château-fort médiéval, de style Roman, bâti au XIe siècle, est en ruines. Il ne reste que 3 tours. Il date du XIe et XIIIe siècle. Il a été racheté par la commune. La tour médiane et les ruines du château ont été classées aux M.H.en 1988 et la tour nord en 1994.","habitants":"Famille de Serralongue\r\n        \"","divers":"Du château de Cabrenc il ne reste que les deux tours à signaux.","gps":"","images":["../image/image_66/66_Cabrenc_1.jpg","../image/image_66/66_Cabrenc_2.jpg","../image/image_66/66_Cabrenc_3.jpg","../image/image_66/66_Cabrenc_4.jpg","../image/image_66/66_Cabrenc_5.jpg"]},"Consult_chateau_formulaire6223":{"id":"Consult_chateau_formulaire6223","dept":"66","canton":"Rivesates","commune":"Caladroy","nom":"Caladroy","type":"Forteresse","periode":"XIII","histoire":"CALADROY, au XVe siècle, le château sera prit en 1496 par les espagnols avant d'être rendu aux français peu après. Après la guerre de 30 ans opposants français et espagnols, Caladroy ne fut plus considéré comme une forteresse et aucune armée ne fit les transformations nécessaires pour adapter le site militaire aux contraintes nouvelles de la balistique, ce qui permit de le conserver dans le même état que celui qu'il avait au Moyen-Age.  A partir de la fin du XVIIIe siècle le hameau de Caladroy se dépeupla, le site étant trop isolé. Il reste de nos jours quelques maisons de ce hameau. Le domaine devient une propriété viticole, suivant la mode qui consistait à planter de la vigne (typique de la période du XIXe siècle). Il changea de propriétaire plusieurs fois.","architecture":"Le château connu un dernier fait d'arme en 1793 lors de la guerre franco-espagnole de cette année. Mais son faible intérêt stratégique fit que les espagnols l'abandonnèrent vite pour se concentrer sur la plaine et le Conflent, avant leur défaite en 1795. A partir de la fin du XVIIIe siècle le hameau de Caladroy se dépeupla, le site étant trop isolé. Il reste de nos jours quelques maisons de ce hameau. Le 14 avril 1923, le château subit un important incendie. Complètement détruit, il fut aussitôt reconstruit à l'identique. Du château proprement dit il reste un superbe rempart crénelé comme on en voit peu dans le Roussillon, au bout duquel se dresse deux tours : Une carrée, massive, et une ronde, plus petite. La tour carrée date de 1292 (le château, lui, est cité en 1257 et 1262). Dans la cour du château on trouve une chapelle romane dont le mobilier est particulièrement soigné. L'autel est en marbre blanc et les murs intérieurs sont partiellement couverts de boiserie. La chapelle initiale, du XIIe siècle, est toujours visible. Elle se trouve sous les fondations du château et sert de nos jours de caveau de dégustation.","habitants":"Serge Maurin viticulteur\r\n        \"","divers":"Château de Caladroy","gps":"","images":["../image/image_66/66_Caladroy_1.jpg","../image/image_66/66_Caladroy_2.jpg","../image/image_66/66_Caladroy_3.jpg","../image/image_66/66_Caladroy_4.jpg","../image/image_66/66_Caladroy_5.jpg","../image/image_66/66_Caladroy_6.jpg","../image/image_66/66_Caladroy_7.jpg","../image/image_66/66_Caladroy_8.jpg"]},"Consult_chateau_formulaire0880":{"id":"Consult_chateau_formulaire0880","dept":"66","canton":"Saint-Estève","commune":"Calce","nom":"Calce","type":"Château","periode":"XII-XIV","histoire":"Deux châteaux à Calce celui de Calce du XIIe siècle et le mas de Las-Fons du XIVe siècle.                                                                      CALCE,  aujourd'hui  viticole,  quelques grandes familles qui se succédèrent comme seigneurs tutélaires de Calce au fil des siècles. La famille de So,  tire son nom du lieu de SO dans le Donnezan, qu'elle avait reçu des mains de Jacques le conquérant en 1266.                                                                                     Le château de SO, aujourd'hui Usson, se dresse  encore fièrement au-dessus de ce village. A la suite d'un choix politique difficile entre le roi d'Aragon et le roi de Majorque, Calce sera vendu à la famille Vernyola, qui le gardera de 1370 à 1432, à sa mort sans héritier direct du dernier Vernyola, c'est un gendre qui en héritera, Pierre du Vivier. Cette famille assurera la tutelle du village de 1432 à 1665, et réunira sous son nom les fiefs de Calce, Maureillas et de Saint-Martin-du-Fenouillar. La famille d'Oms, très ancienne famille catalane, alliée avec la famille del-Vivier par mariage depuis 1630. C'est un cousin de la dernière héritière du Vivier, Thadée d'Oms, qui est déclaré héritier de Calce, après accord en 1665. Antoine Thadée Pierre d'Oms, seigneur de château Roussillon, Calce et Maureillas sera viguier du Roussillon et du Vallespir en 1751. Joseph Marie Augustin d'Oms meurt lors d'un duel à Perpignan, le 13 septembre 1789, pour soutenir l'honneur de sa compagne illégitime : Anne Antoinette, sa fille bâtarde d'une liaison tenue secrète, meurt en 1863 ; ses héritiers partageront le principal des propriétés de Calce entre 44 acquéreurs du village : la petite propriété rurale de Calce est née de ce démantèlement. La famille des Fonts l'abbaye de Lagrasse gardera la suzeraineté de la seigneurie des Fonts de 1119 jusqu'à la Révolution. Les titulaires en seront la famille des Fonts de 1270 à 1396, puis la famille de Pobols, originaire du Termenès, et plus précisément du château de Segure (près de Tuchan), dont les ruines demeurent bien visibles au sommet de cet ancien volcan. Par stratégie maritale, cette seigneurie retombera entre les mains de la famille d'Oms, à savoir en 1777 Antoine Thadée d'Oms, le viguier du Roussillon.","architecture":"Le château de Calce est un château bâti au-dessus du village de Las-Fons, son appareillage prouve qu'il a été construit bien avant, au moins au XIIe siècle. Il est assez monobloc et se compose d'un lourd mur entourant les éléments de vie d'une petite communauté : un moulin, un puits, des maisons, une place forte partiellement ruiné, il dévoile une enceinte rectangulaire et les restes d'un donjon de forme carrée, on date les vestiges du XIIe siècle, mais certaines de ses parties pourraient remonter au Xe siècle.                                                                                                                         Mas de LAS-FONS,  est un ancien château qui date du XIIe et XVe siècle de plan quadrangulaire à deux niveaux porche d'entrée avec tour ronde et à l'opposé porche avec tour carrée  flanqué d'échauguettes sans couverture. Il est classé au M.H. depuis 1993. lieu de chasse à cours propriété de la commune.","habitants":"Famille de Pierre du Vivier\r\n        \"","divers":"Château de So et Las Fond à Calce","gps":"","images":["../image/image_66/66_Calce_1.jpg","../image/image_66/66_Calce_2.jpg","../image/image_66/66_Calce_3.jpg","../image/image_66/66_Calce_4.jpg","../image/image_66/66_Calce_5.jpg","../image/image_66/66_Calce_6.jpg","../image/image_66/66_Calce_7.jpg","../image/image_66/66_Calce_8.jpg","../image/image_66/66_Calce_9.jpg"]},"Consult_chateau_formulaire7e60":{"id":"Consult_chateau_formulaire7e60","dept":"66","canton":"Canet en Roussillon","commune":"Canet-en-Roussillon","nom":"Canet_P_O","type":"Vestiges","periode":"XI-XVII","histoire":"Plusieurs châteaux au Canet  le château vicomtal de Canet et d'Esparou (voir article)                                                                     CANET  est une pure production des francs du XIe siècle.  C'est sur la colline, facilement défendable, que fut construit un château nommé dans les textes \"Castellum de Caned\". Il est cité une première fois en 1013, puis une seconde en 1017 sous celui de \"Villa de Caneto\" (Une villa, à l'époque, représentait un petit village. En 1052, nous avons encore une trace écrite de ce château, indiqué \"Canetum\". Le château devint rapidement le siège de la vicomté de Canet, dont les membres formèrent une famille puissante au XIIe siècle qui devient le siège d'une Vicomté. Au XIIIe siècle  appartient à une famille nommée : Canet. Au XIVe siècle, le bourg est prospère grâce au commerce maritime. En 1312, Guillaume de Guardia, héritier de la famille Canet, échange avec le roi,  ce château contre la seigneurie de Toreilles. En 1343, durant la guerre entre Aragon et Majorque, le château est attaqué puis pris, et reçoivent de nouvelles défenses. Canet devient une capitale importante du Roussillon. En septembre 1415, l'empereur Sigismond Ier passe une nuit au château, alors qu'il est en route vers Perpignan pour un pseudo-concile avec l'antipape Benoît XIII et le roi d'Aragon Ferdinand Ier. En 1462, le château est attaqué puis pris par les troupes du roi de France Louis XI . Durant deux siècles, le château est l'enjeu de nombreuses batailles entre l'Espagne et la France.                                                                                                                                       Château de REY, Cathy  et Philippe Sisqueillle viticulteur.","architecture":"Vestiges du  château vicomtal est attesté dès le milieu du XIe siècle, avec rempart polygonal, et 14 tours rondes, au centre, un petit bourg, au sud, une ancienne église dans le clocher est une tour de flanquement. Des remaniements furent effectués aux siècles suivants, notamment au XIVe siècle : un patio, entouré par des galeries à colonnes de pierre, fut établi, de même que la majeure partie de l'enceinte extérieure actuelle. C'est à cette époque également que l'abside de la chapelle fut dotée d'une tour fortifiée, ce qui en entraîna la surélévation. En 1688, un remarquable puits à glace fut établi au nord de la chapelle. Abandonné définitivement après la Révolution Française, le château a ensuite servi de carrière de pierre pour les habitants du village. Inscrit au titre de monument historique depuis 1984, il est en cours de restauration par les Amis du Vieux Canet.  Le château Vicomtal sombrera dans l'abandon dans le courant du XVIIe siècle. \r\nLe château Vicomtal est inscrit aux M.H. depuis 1984.","habitants":"Famille Canet\r\n        \"","divers":"Le fort de Canet en Roussillon, le château de REY, de Lesparou et manoir bord de mer.","gps":"","images":["../image/image_66/66_Canet_P.O_1.jpg","../image/image_66/66_Canet_P.O_2.jpg","../image/image_66/66_Canet_P.O_3.jpg","../image/image_66/66_Canet_P.O_4.jpg","../image/image_66/66_Canet_P.O_5.jpg","../image/image_66/66_Canet_P.O_6.jpg","../image/image_66/66_Canet_P.O_7.jpg","../image/image_66/66_Canet_P.O_8.jpg","../image/image_66/66_Canet_P.O_9.jpg"]},"Consult_chateau_formulairee143":{"id":"Consult_chateau_formulairee143","dept":"66","canton":"Rivesaltes","commune":"Caudiès de Fenouillèdes","nom":"Castel_Fizel","type":"Vestiges","periode":"XIII","histoire":"Caudies  de Fenouillèdes,  la ville possède quelques maisons anciennes, dont une avec tour du XIIIe siècle (Tour du Viguier).                                                                                                                                                                    CASTEL-FIZEL, cité au XIIe siècle un château est construit, la signature du traité de Corbeil entre la France et l'Aragon en 1258. Le village, lui, restera sous contrôle royal, ce qui était rare pour l'époque. Il faisait partie du système de défense de St-Pierre. Les fortifications du village furent renforcées en 1346 suite aux menaces d'incursions des anglais dans la région. En 1542 le village subit de très importants dégâts suite à son incendie par les espagnols lors de la guerre franco-espagnole. Il deviendra rapidement le siège de la viguerie du Fenouillèdes, c'est à dire le centre administratif de la région. Aujourd'hui Castel-Fizel est un site touristique situé à 2 kilomètres de Caudiès. En 1839, le duc d'Orléans, en route pour Port-Vendres d'où il s'embarquait pour l'Algérie, pique-niqua au col Saint-Louis. Une inscription datant de 1839 gravée sur un rocher l'atteste encore de nos jours.","architecture":"Castel-Fizel est hélas désormais en ruine, comme bon nombre de places-fortes dans les Pyrénées-Orientales. Il faut dire que la région a été un lieu de confrontation, il y a donc beaucoup de châteaux d'époques différentes, que l'histoire nous a légué dans des états variables.  La fortification de Castel-Fizel du XVe siècle, les défenses sont remaniées et  en 1496, le château est saccagé par les espagnols. Celui-ci  avec un donjon rectangulaire sur un pic escarpé qui domine la Boulezanne, dispose encore d'un pan de mur épais, largement envahi par la végétation. Historiquement ce château est apparu assez tôt dans l'époque carolingienne. Le village de Caudiès-de-Fenouillèdes, lui, restera sous contrôle royal, ce qui était rare pour l'époque. Ce château faisait partie d'un système de défense plus large de Fenouillet, défense qui se compose du château St Pierre, du château de Sabarda, et de Castel-Fizel.","habitants":"Seigneurs locaux\r\n        \"","divers":"Vestiges du château fort de Castel-Fizel","gps":"","images":["../image/image_66/66_Castel_Fizel_1.jpg","../image/image_66/66_Castel_Fizel_2.jpg","../image/image_66/66_Castel_Fizel_3.jpg","../image/image_66/66_Castel_Fizel_4.jpg","../image/image_66/66_Castel_Fizel_5.jpg","../image/image_66/66_Castel_Fizel_6.jpg","../image/image_66/66_Castel_Fizel_7.jpg"]},"Consult_chateau_formulaireec30":{"id":"Consult_chateau_formulaireec30","dept":"66","canton":"Rivesaltes","commune":"Opoul-Périllos","nom":"Castell_Segnou","type":"Vestiges","periode":"XV","histoire":"Deux châteaux à Castell-Segnou le château de Salvaterra et de Périllos.                                                                                        SALVETERRA  Le château et son village ont été créés par Jacques Ier d'Aragon en 1246. Il promet des privilèges aux habitants venant s'établir dans son enceinte. Il est assiégé en 1598 et en 1639 par les troupes françaises. Au XVIe siècle, le village est quasiment abandonné, les habitants l'ayant délaissé au profit du village d'Opoul.   Par la suite il fut assiégé et capitula deux fois. La première en 1598, le seconde en 1639 lors de la guerre de 30 ans. Cette année là les troupes du roi de France envahirent la Salanque jusqu'à la Têt et passèrent par la vallée du Verdouble pour conquérir les châteaux de Tautavel et la Salveterra, alors quasiment déjà abandonné. Passé français à la signature du traité des Pyrénées au XVIIe siècle, il ne fut plus à la frontière et perdit de son intérêt stratégique. Il faut quand même savoir que seul le château avait un intérêt pour les possesseurs du Roussillon, les habitants se contentaient de vivre à sa proximité pour pouvoir se protéger. Le village en tant que tel n'avait donc pas vraiment d'importance au vu de l'histoire régionale.                                                                                            CASTELL-del-Segou, en 1357, Perillos était une seigneurie dépendante de Ramon. Celui-ci obtient de père de Fenollet la seigneurie de Finestret, qui vient grandir ses terres.\r\nEn 1391, Jean 1er d'Aragon accorda à Raymond de Périllos le titre de noblesse de vicomte. Son territoire était alors rattaché au comté du Roussillon et son château, \"Castell dal Segnou\", a été le berceau d'une famille les plus illustres du Roussillon. Il faut dire que Raymond fut nommé cette année là gouverneur du Roussillon, de Cerdagne, du Conflent et du Vallespir. \r\nPlus tard, ce fut également un seigneur de Périllos qui fut l'organisateur de la résistance catalane lorsqu'il fallut se rebeller contre les troupes du roi de France Louis XI.\r\nLa chute de la famille de Perillos eu lieu au milieu du XVe siècle. Eléonora de Perellos mourut sans héritier, fermant ainsi la marche de la dynastie. Tous ses biens passèrent à son neveu, Bernat-Béranger de Pérapertusa, en 1459. Le village poursuivit sa vie sous la coupe de ce nouveau seigneur, et ça jusqu'à la Révolution.","architecture":"Le château de Salveterra qui se trouvait au centre du village était nommé \"Castell del Segnou\" (\"château du seigneur\"). Il s'agissait d'une construction relativement petite, plutôt une maison fortifiée, appelé aussi le château d'Opoul,  à Opoul-Périllos. Il est de style médiéval et date du XIIIe siècle. Il ne reste du château de Salveterra que des ruines. Dressé telle une figure de proue, sur une plate-forme calcaire de 400 mètres de haut qui domine les Corbières Maritimes, l'ancien château fort de Salvaterra, bâti par Jacques Ier d'Aragon en 1246, était le poste de défense le plus avancé du royaume d'Aragon, face au royaume de France, du roi Louis IX de France.                                                                                                Périllos, ce château à d'ailleurs servi à partir du XIIIe siècle de poste avancé à la forteresse de la Salveterra, plus au Sud maintenant injustement appelé \"château de Périllos\". De nos jours il en reste la tour carrée, toujours debout, il s'agit des vestiges d'une place forte impressionnante sise sur le plateau calcaire juste au dessus du village. On le voit de toute la plaine de la Salanque, il est vraiment imposant. De nos jours il ne reste plus que quelques pans de murs et une salle voûtée.","habitants":"seigneur de Périllos \r\n        \"","divers":"Vestiges du château de castell-ségnou et de Périllos","gps":"","images":["../image/image_66/66_Castell_Segnou_1.jpg","../image/image_66/66_Castell_Segnou_2.jpg","../image/image_66/66_Castell_Segnou_3.jpg","../image/image_66/66_Castell_Segnou_4.jpg","../image/image_66/66_Castell_Segnou_5.jpg","../image/image_66/66_Castell_Segnou_6.jpg","../image/image_66/66_Castell_Segnou_7.jpg"]},"Consult_chateau_formulairef719":{"id":"Consult_chateau_formulairef719","dept":"66","canton":"Rivesaltes","commune":"Salses le Château","nom":"Castell_Vell","type":"Vestiges","periode":"XII","histoire":"CASTELL-VELL, le château est cité  vers 1150, fief d'un seigneur nommé Guillaume de Castell-Vell  de l'entourage de la reine d'Aragon qui  possédait le château. Castell-Vell fut reconstruit en 1166 par Alphonse II d'Aragon. Pierre Battle, seigneur de Castell-Vell, rend hommage au comte de Roussillon en 1226.   Jean Malras de Salses possède les terres et château  auparavant détenu par Nuno Sanche en 1235. Pierre IV d'Aragon demande la liste des châteaux à consolider et à moderniser pour défendre son territoire en 1363. Curieusement, Castell Vell n'est pas mentionné. Il semble que le château soit occupé en 1639 par des soldats espagnols.\r\n PRIMITIF, en 943, un lieu nommé Salsulae appartenant à l'abbaye de Lagrasse est cité dans un texte. Une famille nommée Salses  et un château sont cités en 1074,  Alphonse II d'Aragon achète les terres et fonde un village en 1172. A partir de 1173, le village s'entoure de remparts. \r\nLe comte de Foix attaque avec succès les fortifications en 1462, et l'année suivante\r\nappartient de nouveau à l'Aragon, et en 1496, le village est pillé et le château est détruit par le maréchal de Saint-André.","architecture":"Castell-Vell vestiges du château, de forme triangulaire accessible que par un coté est posé sur un plateau. Cette situation facilite la défense. Ce château n'était pas une immense forteresse, ni le château d'un important seigneur mais un poste de surveillance et de contrôle du passage. Il a du être un poste frontière, entre le Languedoc et l'Aragon. Place forte nommée castell-vell,il est situé dans les derniers contreforts des Corbières, à 5 km au sud-ouest de Salses, de nos jours,il en reste que des ruines. Vestige du premier château de Salses.  Construit à la frontière du Roussillon au XIe siècle,il a l'importance capitale du poste frontière du nord du royaume. Beaucoup plus tard ce rôle sera tenu par la citadelle de Salses. Castell-Vell, sa destruction fut totale en 1496 par les français.   De ce château  primitif  des tours d'angle le protégeaient.  Leur forme fait croire qu'elles étaient circulaires. Une fortification aussi \"primitive\" devait comporter des tours carrée.  L'ensemble de ce château, courtines et tours en saillis, devaient avoir une longueur totale de 38 mètres.     Se trouvant sur un axe de circulation important, ce fortin devait servir à la surveillance des routes et à la signalisation d'attaque par la mer et aussi à la collecte des droits de passage. Peut être était ce aussi une sorte de grenier fortifié stockant les nourritures pour les paiements en nature, pratique courante à l'époque Romaine et au début du Moyen-Age.","habitants":"Jean Malras de Salses\r\n        \"","divers":"Vestiges du château de Castell-Vell","gps":"","images":["../image/image_66/66_Castell_Vell_1.jpg","../image/image_66/66_Castell_Vell_2.jpg","../image/image_66/66_Castell_Vell_3.jpg","../image/image_66/66_Castell_Vell_4.jpg","../image/image_66/66_Castell_Vell_5.jpg","../image/image_66/66_Castell_Vell_6.jpg"]},"Consult_chateau_formulaireddcb":{"id":"Consult_chateau_formulaireddcb","dept":"66","canton":"Thuir","commune":"Castelnou","nom":"Castelnou","type":"Forteresse","periode":"X-XV","histoire":"CASTELNOU,  château vicomtal construit  en 990 par le seigneur de Castelnou pour servir de base militaire et administrative à la vicomté de Vallespir. L'ancien château-fort date du XIe siècle. Il est de style médiéval. Il fut pendant 4 siècles la résidence des vicomtes de Castelnou; il est alors le siège du pouvoir comtal de Bésalu en Vallespir. Une dizaine d'années plus tard il est le siège de Guillaume Ier  prend le titre de vicomte de Castelnou en 1018. Ses descendants y  résident jusqu'en 1286. Cette année-là, le château fut pris d'assaut par les troupes de Jacques II de Majorque lors de la croisade d'Aragon. Le château est restitué au vicomte Jaspert V en 1299, par le traité d'Argelès. En 1321, à la mort de Jaspert, le château passe brièvement à sa fille.  Puis après la mort de cette dernière, à la veuve de Jaspert, Galcerande de Narbonne, qui le vend au roi de Majorque. Ce dernier le cède à son tour à la famille de Fenouillet, qui le revend elle-même à Bérenger de Castelnou, dernier représentant de la famille vicomtale. Sans héritier, il vend le château à la fin du XIVe siècle à la famille de Llupia, qui le conserve jusqu'au  XVIIIe siècle. En 1483, le baron de Castelnou se rebelle contre la tutelle de Louis XI. Le château est assiégé par les troupes du gouverneur de Roussillon. Pendant les XVIIe siècle et XVIIIe siècle, le château fut laissé à l'abandon. A la fin du XIXe siècle le château fut racheté et une restauration qu'on peut presque qualifier de reconstruction  fut menée.","architecture":"Castelnou, le village conserve encore son apparence médiévale avec ses remparts rythmés par 8 tours et 4 portes, disposés aux quatre points cardinaux, sa tour de guet et son château vicomtal. Le château médiéval du X-au-XIVe siècle  a un peu la forme d'un pentagone avec deux côtés à angles droits. Les remparts crénelés mesurent trois mètres d'épaisseur. Il est difficile de bien connaître l'aspect original du château, à cause des destructions qu'il eut à subir, mais aussi de la restauration-reconstruction du XIXe siècle. Les photographies antérieures à la restauration ne nous montrent qu'une fenêtre dans la grande salle du château et non quatre comme actuellement. Le crénelage est lui aussi une addition récente. Néanmoins, il est probable que la base des remparts remonte au Xe siècle. Le plan du château, une simple enceinte sans tours de flanquement, est en effet caractéristique d'une époque souvent assaillie. Une chapelle, qui devient ensuite une collégiale augustine, est mentionnée dans le castrum de Castelnou au XIe siècle. Mais le terme de castrum désigne aussi bien le château que le village fortifié, on ne sait donc pas si cette chapelle se trouvait dans l'enceinte du château ou dans celle du village.","habitants":"Famille de Fenouillet\r\n        \"","divers":"Forteresse de Castelnou, remparts et tour.","gps":"","images":["../image/image_66/66_Castelnou_1.jpg","../image/image_66/66_Castelnou_2.jpg","../image/image_66/66_Castelnou_3.jpg","../image/image_66/66_Castelnou_4.jpg","../image/image_66/66_Castelnou_5.jpg","../image/image_66/66_Castelnou_6.jpg","../image/image_66/66_Castelnou_7.jpg","../image/image_66/66_Castelnou_8.jpg","../image/image_66/66_Castelnou_9.jpg"]},"Consult_chateau_formulairecee8":{"id":"Consult_chateau_formulairecee8","dept":"66","canton":"Argelès sur Mer","commune":"Cerbère","nom":"Cerbère","type":"Vestiges","periode":"XIII-XX","histoire":"CERBERE,  vestiges de la tour-château de Querroig,  au XIIIe siècle Jacques de Rabos, seigneur de la vallée des Abeilles, créé en faveur de St-Sauveur un bénéfice simple comprenant la dîme du poisson et du corail pêché en son anse ainsi que les droits de pâturage et d'herbage dans les tenants. Cette famille s'est éteinte vers le XIVe siècle. Son territoire sera récupéré par la famille de Pavo, déjà seigneur de la haute vallée. St-Sauveur et son hameau fut alors intégré dans la paroisse des Abeilles. A la chute de la famille de Pavo, la chapelle sera récupérée par l'évêché d'Elne, puis à partir du XVIIIe siècle, elle passera à la famille de Cosprons qui en sera bénéficiaire jusqu'en 1789.  A la Révolution Française les titres seigneuriaux disparurent, les habitants désireux de cultiver les terres librement recherchèrent de nouvelles terres et en trouvèrent sur les coteaux de Cerbère, la vigne fut la principale source de revenu des habitants.                                                                                                                                                                           Hôtel Belvédère du Rayon Vert, ses heures de gloire furent brèves : la guerre dEspagne, provoquant la fermeture de frontières, empêcha la manne que constituait le trafic ferroviaire et entraîna son déclin. Récemment en février 2015, la fin d'un téléfilm de Josée Dayan pour France télévision, intitulé Capitaine Marleau, qui sera diffusé à l'automne 2015 , a été tourné dans ce bâtiment, avec comme acteur principal Gérard Depardieu. Jean Benguigui, Jean Claude Douot, Corine Masiero.","architecture":"Le patrimoine de Cerbère est assez riche. Il faut citer les vestiges du château-tour de Querroig,  toujours visible de nos jours. En 1820, seule dix familles résident à Cerbère. Mais la contrebande faite avec les habitants d'Espagne impose aux autorités de construire un poste de douane en 1841. Ce bâtiment imposant pour l'époque va introduire à Cerbère une nouvelle vague d'habitants issus tout d'abord de l'administration, vague qui s'amplifiera avec la construction du chemin de fer dont le premier convoi traversera le village en 1876.                                                                                                                                                      Phare du Cap, cette construction fut entreprise pour remplacer le vieux feu du port de Cerbère supprimé en 1980. C'est l'uvre du cabinet parisien d'architecture Lucien Guerra. Le site des hautes falaises du cap Cerbère fut choisi, mais il fallut exclure toute alimentation électrique par ligne aérienne pour ne pas dénaturer le paysage. En 1982 ce phare moderne est achevé et est alimenté par des panneaux solaires. C'est une tour de pierres grises avec un haut rouge.                                                                                                                                       Hôtel Belvédère, construit en ciment armé, il est actuellement en cours de restauration. Ses façades, sa salle de cinéma et sa terrasse supérieure sont inscrites le 9 avril 1987 aux Monuments Historiques. Autrefois, il comptait 30 chambres, de nos jours 9 appartements pouvant accueillir de 2 a 6 personnes.","habitants":"Famille de Jacques de Rabos\r\n        \r\n        \r\n        \"","divers":"Vestiges du château de Quer-Roing, phare du Cap et hôtel Belvédère.","gps":"","images":["../image/image_66/66_Cerbere_1.jpg","../image/image_66/66_Cerbere_2.jpg","../image/image_66/66_Cerbere_3.jpg","../image/image_66/66_Cerbere_4.jpg","../image/image_66/66_Cerbere_5.jpg","../image/image_66/66_Cerbere_6.jpg","../image/image_66/66_Cerbere_7.jpg"]},"Consult_chateau_formulaire68eb":{"id":"Consult_chateau_formulaire68eb","dept":"66","canton":"Argelès sur Mer","commune":"Collioure","nom":"Collioure","type":"Château","periode":"XII-XIII","histoire":"COLLIOURE  Le château royal date du XIIe et XIIe siècle, construction médiévale ayant notamment servi de résidence d'été aux rois de Majorque, puis remanié par les Habsbourg et les Bourbons. Lorsque les rois d'Aragon l'on récupéré ils firent construire la salle des frères du couvent des templiers, appartiennent ensuite aux comtes de Roussillon, puis aux divers rois qui se succèdent en Roussillon : rois dAragon de 1172 à 1276, puis rois de Majorque jusquen 1343, avant de revenir aux rois dAragon. Sous le règne des rois de Majorque, le château, entièrement reconstruit entre 1242 et 1280 au détriment dune maison templière qui lui était accolée, devient résidence royale, la ville étant pour sa part le premier port du Roussillon. Après le mariage des Rois catholiques, Ferdinand V dAragon et Isabelle Ire de Castille, Collioure et le Roussillon tout entier passent sous la domination de la monarchie espagnole, sans quil y ait fusion centralisatrice. La province est occupée de 1475 à 1481 par le roi de France Louis XI, qui fait bâtir des fortifications à Collioure, rebaptisée Saint-Michel, son successeur, Charles VIII, rend le Roussillon à Ferdinand le catholique, dont le successeur lempereur Charles Quint renforce les fortifications de la ville. L'Empereur décida la construction du fort Saint-Elme destiné à protéger les anses de Collioure et de Port-Vendres.     Le château est acquis par le conseil général des Pyrénées-Orientales qui entreprend la restauration.","architecture":"Collioure est une ancienne forteresse royale, elle fut bâtit en 1300 sur les restes d'une construction romaine, possède de nombreux vestiges de son passé militaire.  Renforcement de l'enceinte au XVe siècle, se présente comme un quadrilatère s'organisant autour d'une cour fermée, bordée au nord par une chapelle, au sud par l'aplomb d'un rocher  dominant la mer bâtiment à deux niveaux encadrait de deux tours, dont celle de l'Est est la tour maîtresse. Superbe citadelle dont les fondations plongent dans la mer. L'ancienne commanderie des templiers dont La confusion vient du fait qu'ils avaient eux aussi un château à Collioure, mais il ne s'agissait que d'une maison forte vaste enceinte cantonnée de trois tours carrées fermée du côté de la terre par une muraille couronnée de mâchicoulis. De nos jours le château de Collioure a un donjon carré formé de salles superposées et voûtées d'ogives  fortifications aujourdhui dissimulées par les constructions postérieures.  En 1789 incendie partiel du château et les tours perdent leurs niveaux supérieurs.","habitants":"Ferdinand V dAragon\r\n        \"","divers":"Forteresse de Collioure","gps":"","images":["../image/image_66/66_Collioure_1.jpg","../image/image_66/66_Collioure_2.jpg","../image/image_66/66_Collioure_3.jpg","../image/image_66/66_Collioure_4.jpg","../image/image_66/66_Collioure_5.jpg","../image/image_66/66_Collioure_6.jpg","../image/image_66/66_Collioure_7.jpg","../image/image_66/66_Collioure_8.jpg"]},"Consult_chateau_formulaired0e3":{"id":"Consult_chateau_formulaired0e3","dept":"66","canton":"Argelès sur Mer","commune":"Collioure","nom":"Collioure_II","type":"Fort","periode":"XV-XVI","histoire":"Les forts autour  de Collioure, le fort Carré, le fort Dugommier, le fort Miradou et la tour Madeloc.                                                                                                                                                                        FORT CARRE ou fort de l'Etoile, date de la première moitié du XVIIIe siècle.  Pour se battre au nord, il faut, en effet, être protégé au sud.  Le fort carré occupe une position stratégique, au-dessus de la baie de Collioure, inspiré dun plan type de tour dartillerie imaginé par Vauban pour compléter le système de défense de la ville de Collioure, le Fort Carré, dont lentrée mer était assurée par un pont-levis,  relié par de petits passages à deux autres forts : le Fort Miradou et le Fort Rond.                                                                                                                                            Fort DUGOMMIER, ce fort porte le nom du Général Dugommier  a été construit d'abord en terre de 1813 à 1834 puis en maçonnerie de 1848 à 1851. Edifié sur une position stratégique ; anciennement la Redoute du Palat; sur la crête séparant Collioure et Port Vendres il avait pour rôle avec les autres forts bâtis à cette époque; de protéger de toute attaque extérieure les ports de Port-Vendres et de Collioure, celui qui de cette hauteur écrasa le fort St-Elme tout proche lors de la guerre du Roussillon (1793-1795)                                                                                      Fort MIRADOU, en 1668 lingénieur de Louvois : Louis Nicolas de Clerville, en inspection, vit la nécessité de renforcer Collioure, sa situation était d'une importance primordiale dans la défense du château. Entre 1671 et 1679, le fort Sainte-Thérèse est détruit et on construit à sa place le fort Miradou ou Mirador.\r\nLa tour MADELOC, est érigée sous Jacques II, roi de Majorque et comte du Roussillon, qui veut se protéger du roi de France au nord et de son frère le roi Pierre III d'Aragon au sud. Durant la souveraineté majorquine et aragonaise, elle faisait partie d'un réseau de tours de guet, avec la tour de la Massane  tour de guet du XIIIe siècle. C'est le dernier château fort de style médiéval existant avec celui de Vincennes.","architecture":"Collioure possède de nombreux vestiges de son passé militaire :\r\nLe fort Carré et la tour de l'Étoile.\r\nFort Rond et Fort Carré, construits au XVIIIe siècle,  est une puissante redoute érigée sur un talus descarpe et entourée de profonds fossés. Le Fort Rond est un solide bastion crénelé. Tous deux complètent le système défensif couvrant le front nord. Pour des raisons de sécurité ces monuments ne se visitent pas.                                            Le fort Dugommier, redoute, dit Dugommier, célèbre général révolutionnaire fut construite entre 1844 et 1851. Elle fait partie dun ensemble douvrages militaires appelés à assurer la défense côtière et plus particulièrement Collioure et Port-Vendres. Dès la fin du XIXe siècle, ce fort tombait en ruine et fait lobjet encore aujourdhui de nombreux chantiers de restaurations.\r\nLa tour Madeloc, tour de guet du XIIIe siècle  est perchée à environ 650 mètres de hauteur dans la chaîne des Albères.                                            La tour sur le port,  église du XVII° siècle. Phare du XIIIe siècle, transformé en clocher au XVII° siècle.   En 1693, la tour de lancien phare fut transformée en clocher, cette tour servait de prison depuis 1677.   Sur l'arrière le fort des templiers  à toit en plateforme crénelée.                                                                               Batterie Taillefer ouvrage de défense construit au début de la troisième République, la batterie a été restaurée et abrite un tourneur sur bois ainsi quun atelier de coutellerie.","habitants":"Vauban\r\n        \"","divers":"Fort Dugommier, fort de Taillefer, fort rond, fort Carré, tour Madeloc  et l'hôtel Ortafa à Collioure","gps":"","images":["../image/image_66/66_Collioure_II_1.jpg","../image/image_66/66_Collioure_II_2.jpg","../image/image_66/66_Collioure_II_3.jpg","../image/image_66/66_Collioure_II_4.jpg","../image/image_66/66_Collioure_II_5.jpg","../image/image_66/66_Collioure_II_6.jpg","../image/image_66/66_Collioure_II_7.jpg","../image/image_66/66_Collioure_II_8.jpg","../image/image_66/66_Collioure_II_9.jpg"]},"Consult_chateau_formulaire2ab4":{"id":"Consult_chateau_formulaire2ab4","dept":"66","canton":"Le Soler","commune":"Corbère","nom":"Corbère","type":"Forteresse","periode":"XII-XIV","histoire":"CORBERE, la lignée des seigneurs de Corbère commence à peu près à cette époque. Bernat de Corbera, seigneur de Corbère est cité en 1266 et en 1269. Cette famille n'aura pas la même importance que celle de Vernet, mais elle a pu traverser les époques tout en gardant la seigneurie.  Avant le XVe siècle Corbère appartenait à la famille Gagariga. Son dernier seigneur, François, était conseiller du roi d'Aragon Martin. Or sa fille Marguerite s'est mariée avec Bernard d'Oms, deuxième fils de Bérenger III. Marguerite a apporté Corbère en dot à son mari, qui a fondé une nouvelle branche de la famille Oms. Egalement châtelain de Perpignan, Bernard d'Oms eu un fils Louis qui pris sa succession, mais celui-ci étant décédé sans héritier, c'est son frère Charles qui pris le titre de seigneur de Corbère. Plus occupé par les événements du XV-XVIe siècle à Perpignan, Corbère est laissé de côté par ses seigneurs. Charles eu Bernard,  Louis,  Jean, Marie, sa fille unique. Celle-ci s'est mariée avec Louis de Llupia, et la seigneurie de Corbère passa aux mains de la famille de Llupia à la fin du XVIe siècle. Acheté par le baron Sanger, médecin-psychiatre américain.","architecture":"Le château de Corbère est un édifice  du XIIe siècle encore en bon état de style médiéval  de plan en équerre, deux corps de logis à trois niveaux, les ouvertures sont rares et petites, couverture en terrasses et tour ronde accolée en façade.   il se trouve au Sud-Ouest de Corbère. Il est précédé de la chapelle Notre Dame, construite au XIVe siècle. Il s'agissait initialement de la chapelle castrale, mais elle obtient le titre d'église paroissiale à partir du XVIIe. Elle abrite un retable du maître-autel du XVIIIe siècle, ainsi qu'un autre du Rosaire qui lui est contemporain. Le village de Corbère de Dalt est à ses pieds. Actuellement le château de Corbère a été restauré.","habitants":"Famille   de Llupia                                                                                   Famille Oms\r\n        \r\n        \r\n        \"","divers":"Château de Corbère","gps":"","images":["../image/image_66/66_Corbere_1.jpg","../image/image_66/66_Corbere_2.jpg","../image/image_66/66_Corbere_3.jpg","../image/image_66/66_Corbere_4.jpg","../image/image_66/66_Corbere_5.jpg","../image/image_66/66_Corbere_6.jpg","../image/image_66/66_Corbere_7.jpg"]},"Consult_chateau_formulaire72ff":{"id":"Consult_chateau_formulaire72ff","dept":"66","canton":"Amélie les Bains","commune":"Corneilla de Conflent","nom":"Corneilla_Conflent","type":"Vestiges","periode":"XI","histoire":"Deux châteaux à Corneilla de Conflent dont les vestiges du château  de Corneilla , celui de St-Clément.                                                                                                                                                            CORNEILLA de CONFLENT,   fief de Guillaume de Jorda en 1094 le comte Guillaume-Raymond mourut en laissant comme testament le vu qu'il y ai un jour une communauté religieuse en l'église de Corneilla. En 1097, son fils le comte Guillaume Jorda s'installe à Corneilla  réalisa son vu, une communauté religieuse composée de douze chanoines obéissant à la règle de Saint- Augustin.  Cette communauté reçu la seigneurie de Corneilla et la ville ne fut plus la capitale de la Cerdagne à partir de ce moment là. Par la suite, les religieux restèrent dans les murs de Corneilla jusqu'à la Révolution.\r\nSaint-CLEMENT, à l'ouest  du village, dans un nid de verdure apparaît le château de Saint-Clément ancienne propriété du peintre Georges Daniel de Monfred, contemporain et ami de Gauguin et père du célèbre aventurier Henri de Monfred.  Au cours des siècles suivants, le prieuré, qui détenait la seigneurie du village, eut une importance croissante, acquérant de nombreux biens en Conflent et en Cerdagne. Son déclin commence au XVe siècle, mais jusqu'à la Révolution le prieur restera seigneur de Corneilla.","architecture":"Corneilla-de-conflent, petit village typique, bien abrité, que les comtes de Cerdagne avaient choisi pour leur résidence d'hiver, on y jouit d'une vue magnifique sur le mont Canigou.  Château des comtes de Conflent-Cerdagne (ancien). tour ronde accolé au bâtiment.                                                                                                                       Saint-Clément, manoir de plan en U, corps de logis rectangulaire à trois niveaux sur soubassement, pavillons carrées sur angles avec toit à quatre pans.","habitants":"Comte Guillaume Jorda                                                                       Georges Daniel de Monfred\r\n        \"","divers":"Vestiges tour et porte de conflent et le château de Saint-Clément","gps":"","images":["../image/image_66/66_Corneilla_Conflent_1.jpg","../image/image_66/66_Corneilla_Conflent_2.jpg","../image/image_66/66_Corneilla_Conflent_3.jpg","../image/image_66/66_Corneilla_Conflent_4.jpg","../image/image_66/66_Corneilla_Conflent_5.jpg"]},"Consult_chateau_formulaire46ee":{"id":"Consult_chateau_formulaire46ee","dept":"66","canton":"Prades","commune":"Matemale","nom":"Creu_en_Capsir","type":"Vestiges","periode":"XIV","histoire":"CREU, Ruines du XIVe s
