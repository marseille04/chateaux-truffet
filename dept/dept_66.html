iècle aujourdhui disparu, les premières traces du site apparaissent en 965,  le testament de Sunifred II, comte de Cerdagne lègue Matemale et tous ses hameaux (Matamala, cum villis et villarunculis suis à l'abbaye Saint-Michel-de-Cuxa. L'abbaye en gardera la jouissance jusqu'à la Révolution de 1789 unique vestige du château de Creu, dans le testament du comte Sunfred II de Cerdagne-Bésalu.","architecture":"Creu, bâtie sur le site dun ancien village « villa Cruce ou Creu »,  cest une tour carrée de 4 mètres de côté, érigée directement sur des gros blocs de granit. Elle est construite en gros appareillage irrégulier, avec des chaînages dangles mieux dégrossis, le tout lié au mortier de chaux. Dune hauteur denviron 10 mètres, elle est composée en partie basse dun souterrain, sole inférieure à 4 mètres de hauteur et accessible par une échelle est surmontée dune salle supérieure (salle darmes). Son architecture permet de dater la tour de Creu du XIIe ou XIIIe siècle. Si la façade Est,  présente peu de dégradations, le tiers supérieur de sa façade Sud est effondré, ainsi que son angle Sud-Ouest. La façade Ouest est totalement effondrée, ainsi que la façade Nord, depuis lété 2008.","habitants":"comte Sunfred II \r\n        \"","divers":"Vestiges du château de Creu avant et après restauration","gps":"","images":["../image/image_66/66_Creu_en_Capsir_1.jpg","../image/image_66/66_Creu_en_Capsir_2.jpg","../image/image_66/66_Creu_en_Capsir_3.jpg","../image/image_66/66_Creu_en_Capsir_4.jpg","../image/image_66/66_Creu_en_Capsir_5.jpg"]},"Consult_chateau_formulaire284a":{"id":"Consult_chateau_formulaire284a","dept":"66","canton":"Rivesaltes","commune":"Cassagnes","nom":"Cuxous_Cuchous","type":"Forteresse","periode":"XII-XIII","histoire":"CUXOUS,  en 845 l'église de Cuxous était une possession de l'abbaye de Lagrasse, ce qui en fait l'une des plus ancienne possession de cette abbaye, devenu château-fort, Il faut savoir que la région n'a été pacifiée qu'en 811, et encore, il ne s'agissait que de la récupération définitive des territoires du Roussillon par les forces de Charlemagne et de ses successeurs, mais les sarrasins, restés plus au Sud, faisaient de fréquents raids dans la plaine du Roussillon. Toujours est-il que nous n'avons pas de trace particulière de Cuxous après cette époque. Sa situation géographique plaide pour un développement de la ville autonome, tout à fait normal car le hameau se trouve assez loin de Cassagnes. Toutefois il n'a jamais eu le statut de commune indépendante.","architecture":"Cuxous, château de style féodal, constitué d'une enceinte quadrangulaire qui pourrait dater du XIIe siècle. Situé à la frontière de la France et de l'Espagne. Construit entre les XIe et XIIIe siècle   bien que mentionné pour la première fois en 1119, le style architectural de certains éléments des murs nord et ouest du château, en opus spicatum, permet de le faire remonter jusqu'au XIe siècle. L'édifice sera ensuite remanié au XIIIe siècle puis, beaucoup plus tard aux XVIIIe et XXe siècles.                                                 Le château de Cuxous fait l'objet d'une inscription des monuments historiques depuis le 31 mai 1996. Sur les différentes cartes touristiques ou routières vous pouvez voir plusieurs écritures avec Cuchous , Cuchoux , Cuixós ou Cuxùs . Ce château est privé. Le château et les dépendances avec tout à droite la chapelle. Le château est entouré d'une forêt de pins et des champs de vigne qui font sa réputation et sont toujours médaillés \"château Cuchous\".","habitants":"Seigneurs locaux\r\n        \"","divers":"Château féodal de cuxous","gps":"","images":["../image/image_66/66_Cuxous_Cuchous_1.jpg","../image/image_66/66_Cuxous_Cuchous_2.jpg","../image/image_66/66_Cuxous_Cuchous_3.jpg","../image/image_66/66_Cuxous_Cuchous_4.jpg","../image/image_66/66_Cuxous_Cuchous_5.jpg","../image/image_66/66_Cuxous_Cuchous_6.jpg","../image/image_66/66_Cuxous_Cuchous_7.jpg","../image/image_66/66_Cuxous_Cuchous_8.jpg","../image/image_66/66_Cuxous_Cuchous_9.jpg"]},"Consult_chateau_formulaire4926":{"id":"Consult_chateau_formulaire4926","dept":"66","canton":"Céret","commune":"Céret","nom":"Céret","type":"Village fortifié","periode":"X-XIII","histoire":"CERET au IXe siècle  la ville apparaît d'abord comme un fief des comtes dEmpuries sous contrôle de Pons de Vernet. Le Castellas, ancien château seigneurial de la ville, date de cette époque.  En 1172, Alphonse II, comte de Barcelone et roi d'Aragon hérite du Roussillon dont le Vallespir. Jacques Ier d'Aragon partage en 1262 ses possessions entre ses fils. Jacques II de Majorque hérite du royaume de Majorque, du Roussillon et de Céret.  La rupture politique entre les héritiers de Jacques Ier entraîne la prise des possessions du royaume de Majorque par la couronne d'Aragon. Pierre IV d'Aragon envahit et annexe le Roussillon en 1344. En 1268, Guillaume V, vicomte de Castelnou obtient Céret en dot lors de son mariage avec Ava. Sa fille en hérite en 1312. L'année suivante, en 1313, la fontaine des neuf jets est construite, sous le règne de Sanç Ier de Majorque. En 1640, les représentants de la Généralité de Catalogne signèrent dans la commune un pacte avec le représentant de Louis XIII, le cardinal de Richelieu. Une épidémie de peste touche la ville de 1651 à 1655 et fait une centaine de victimes.  En 1641, en pleine guerre franco-espagnole, la cité privilégiée reçut des droits spéciaux, à l'égal de l'ille. Un second privilège lui fut accordé lors de la conférence de Céret lorsque les représentants des royaumes de France et d'Espagne négocièrent en 1660 la nouvelle frontière entre les deux pays, point laissé ouvert par le traité des Pyrénées signé en 1659.Durant la guerre du Roussillon, la ville est le siège d'une bataille le 20 avril 1793, victoire facile de l'armée espagnole contre l'armée française, peu expérimentée. Dès lors occupée par les Espagnols, elle n'est reprise que le 4 mai 1794 par les Français.","architecture":"Le Castellas,  ancien château seigneurial de la ville du Xe siècles, le seul vestige est le mur en ruine à droite. Porte de la ville  dites de France et d'Espagne  datent du XIIIe siècle, cette porte est l'entrée des anciennes fortifications de la ville par la France et  l'Espagne. Maintes fois reconstruites, cette partie des remparts appelée aussi \"Portail des Maures\" s'ouvre définitivement sous le règne de Napoléon.  Au XIIIe siècle voit la protection de la ville par des remparts et des douves et la construction de l'abbaye bénédictine de Saint-Ferréol. A partir de 1321, la ville fait construire le pont du Diable. Les frais sont partagés entre Céret et les villages en amont du Tech qui en tirent parti. La rivalité entre les capucins et les carmélites vire en un conflit, dont le point final nest posé que par la destruction des deux édifices pendant la Révolution Française. Les remparts fraîchement reconstruits au sortir de cette guerre sont démolis par Napoléon Ier  auquel les Cérétans ferment les portes. Devant l'inutilité de ce type d'ouvrage face aux canons, les remparts sont transformés en arcades.  La tour accueille aujourd'hui la maison du patrimoine archéologique Françoise Claustre.                                                                                           Le Pont du Diable  bâti en 1321 sous le règne des rois de Majorque,  est un véritable chef-d'oeuvre d'architecture médiévale. Construction audacieuse et curieuse, une arche de 45 mètres enjambe la rivière du Tech. La clef de  voûte se situe à 22 mètres 30 de hauteur.","habitants":"Pons de Vernet\r\n        \r\n        \"","divers":"Céret village fortifié et château de Saint-Paul","gps":"","images":["../image/image_66/66_Ceret_1.jpg","../image/image_66/66_Ceret_2.jpg","../image/image_66/66_Ceret_3.jpg","../image/image_66/66_Ceret_4.jpg","../image/image_66/66_Ceret_5.jpg","../image/image_66/66_Ceret_6.jpg","../image/image_66/66_Ceret_7.jpg","../image/image_66/66_Ceret_8.jpg"]},"Consult_chateau_formulaire679a":{"id":"Consult_chateau_formulaire679a","dept":"66","canton":"Elne","commune":"Elne","nom":"Elne","type":"Village fortifiè","periode":"XIII-XIV","histoire":"ELNE, ville du royaume d'Aragon, Elne subit au cours de son histoire de nombreux assauts. En 1285, lors de la croisade d'Aragon, la ville tomba lors d'un siège mené par Philippe le Hardi, roi de France. Elle fut également assiégée au XIVe siècle par Pierre III d'Aragon. Après l'annexion du Roussillon par Louis XI, Elne se souleva contre les Français et fut à nouveau assiégée et prise en décembre 1474, et son capitaine Bernat d'Oms décapité. Cependant, comme le reste du Roussillon, la ville fut restituée à l'Aragon en 1493.                                                                                                                                                                                   EN-BARDOU,   construit de 1901 à 1902, par l'industriel Eugène Bardou, le château est  connu pour avoir été une maternité gérée par la Croix-Rouge suisse entre 1939 et 1944, dans laquelle sont nés de nombreux enfants de femmes déportées ou exilées à cause de la retirada ou la seconde guerre mondiale.  Cet établissement sera un véritable havre de paix pour les internés, d'autant plus qu'ils étaient souvent mis en contact avec des résistants. La maternité est fermée par les allemands en 1944. Parallèlement à ces naissances et à laccueil denfants venus « se refaire une santé », ou dans lobligation de se cacher, pour échapper aux rafles visant les juifs, Élisabeth Eidenbenz apporte son aide aux camps des environs, tout particulièrement ceux dArgelès-sur-Mer, de Saint-Cyprien et de Rivesaltes. Elle les approvisionnait en nourriture et aménageait des baraquements. La maternité, objet d'un rachat par la mairie d'Elne est devenue un lieu de souvenir.","architecture":"Elne, était divisée en ville haute et ville basse. Chacune avait son enceinte fortifiée, dont les vestiges actuels (tours, portes et courtines sur lesquelles se sont appuyées les maisons) remontent aux XIIIe et XIVe siècles. La ville basse fut probablement la première à être occupée, et son sol a livré de nombreuses traces d'occupation. La ville haute est occupée par la cathédrale Sainte-Eulalie-et-Sainte-Julie et son cloître qui forment un remarquable ensemble médiéval.  Après le traité des Pyrénées de 1659 qui fixait la frontière, les murailles de la ville furent détruites, ce qui ne fit quaccentuer son déclin. Il reste à l'heure actuelle quelques pans des murailles médiévales, ainsi que trois portes qui étaient par le passé des entrées de la ville. Elne deviendra par la suite un modeste bourg à prédominance agricole (vigne, fruits et légumes) et gardera néanmoins des traces de sa gloire passée au travers de vestiges tant romains que médiévaux.                                                                                                              Château d'en Bardou ou château Suisse est un château bâti à Elne, C'est un château qui date de 1901. Il est inscrit aux M.H. depuis 2012. Construit en 1901 et 1902 par l'industriel Eugène Bardou.","habitants":"industriel Eugène Bardou\r\n        \"","divers":"Les portes de la ville d'Elne, le château d'en Bardou et l'Heléna","gps":"","images":["../image/image_66/66_Elne_1.jpg","../image/image_66/66_Elne_2.jpg","../image/image_66/66_Elne_3.jpg","../image/image_66/66_Elne_4.jpg","../image/image_66/66_Elne_5.jpg","../image/image_66/66_Elne_6.jpg","../image/image_66/66_Elne_7.jpg"]},"Consult_chateau_formulaireceee":{"id":"Consult_chateau_formulaireceee","dept":"66","canton":"Prades","commune":"Enveitg","nom":"Enveitg","type":"Maison forte","periode":"XVIII","histoire":"A Enveitg, le château de Brangoly et à cinq kilomètres au sud-est le château de UR.                                                            BRANGOLY, situé à 1520 m daltitude, cache une multitude dhistoires sans fin, de grands nobles, de territoires féodaux,  de tout un monde merveilleux. Date du XVIII siècle, son emplacement actuel fut jadis occupé par la route des Templiers, propriété rurale romaine qui a laissé des vestiges tout autour de ce qui configure aujourdhui le domaine du château de Brangoly, il possède une bâtisse en chambres dhôtes par monsieur Joaquin Farias.","architecture":"Brangoly de plan en équerre à quatre niveaux sur soubassement en arcades  sur côté  de la  vallée toit en croupes prolongé par des annexes de même style situé à 1520 m daltitude,  daté au XVIII siècle, son emplacement actuel fut jadis occupé par la route des Templiers et, auparavant, par une propriété rurale romaine qui a laissé des vestiges tout autour de ce qui configure aujourdhui le domaine du château de Brangoly. En arrivant , nous découvrons une  bâtisse à chambres dhôtes.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Brangoly à Envietg","gps":"","images":["../image/image_66/66_Enveitg_1.jpg","../image/image_66/66_Enveitg_2.jpg","../image/image_66/66_Enveitg_3.jpg","../image/image_66/66_Enveitg_4.jpg"]},"Consult_chateau_formulaire6f1c":{"id":"Consult_chateau_formulaire6f1c","dept":"66","canton":"Canet en Roussillon","commune":"Canet en Roussillon","nom":"Esparrou","type":"Château","periode":"XIX","histoire":"ESPARROU, au XVIIIe siècle  le domaine d'Esparrou  devient la propriété  de la famille de Lazerme  et en 1875 acheté par la famille de Sauvy, Joseph Sauvy (1883-1892) juge du tribunal de commerce de Perpignan, et négociant en vins, étant malade et condamné à mourir, décidera de faire construire un château pour marquer la fin de sa carrière. Viggo Dorph-Petersen est chargé de la construction  qui débute en 1889 et se termine en 1891. C'est l'une des premières demeures de prestige créées par l'architecte danois. Joseph Sauvy a adjoint un vignoble ainsi qu'un parc de 5 hectares agrémenté d'essences méditerranéennes (chênes-lièges, chênes-verts, cyprès, eucalyptus, palmiers, pins).  A la mort  de Joseph Sauvy en 1892 le château passe  à ses trois fils et à sa petite-fille unique héritière de sa mère, François Sauvy artiste sera le seul à résider à l'Esparrou. Eugène le frère de François suivra  l'oeuvre de son père, l'Esparrou est demeuré dans sa descendance bien que maire de Perpignan de 1904  à 1907.    Aujourd'hui, le château est toujours un domaine viticole et est désormais le siège de l'association \"Les Amis de l'Esparrou\" qui en a fait un centre culturel de rencontres.  Il est entouré de vignobles et d'un beau parc. Il est classé au M.H. depuis 2011.","architecture":"ESPARROU domaine viticole avec tours rondes, Il est orienté face au soleil levant, sa façade principale  se compose d'un corps de logis double en profondeur  que flanquent sur sa façade principale  deux avant corps latéraux en légère saillie terminés par des pignons découverts  sommés d'acrotères. Il est composé de quatre niveaux : entresol, rez-de-chaussée, premier étage et deuxième étage, l'entresol est composé d'un appartement de garde, d'une salle de chasse avec une grande cheminée, d'une lingerie et de diverses autres dépendances. Passés le grand-hall et un vestibule, le rez-de-chaussée comprend trois chambres, la grande salle à manger, une bibliothèque, une salle de musique et un jardin d'hiver supportant une terrasse forme une avancée sur la façade qui s'encadre entre deux tours rondes coiffées en poivrières dépassant le toit d'ardoise du corps central sur lequel se détachent des lucarnes.","habitants":"Famille de Sauvy\r\n        \"","divers":"Château d'Esparrou","gps":"","images":["../image/image_66/66_Esparrou_1.jpg","../image/image_66/66_Esparrou_2.jpg","../image/image_66/66_Esparrou_3.jpg"]},"Consult_chateau_formulairecc91":{"id":"Consult_chateau_formulairecc91","dept":"66","canton":"Amélie les Bains","commune":"Espira de Conflent","nom":"Espira_Conflent","type":"Vestiges","periode":"XIII","histoire":"ESPIRA de CONFLENT, la première mention date de la fin du Xe siècle sous la forme villa Asperi. C'est en 1081 qu'un prieuré de chanoines Augustins fut fondé par les moines de Serrabone à Espira. Ce prieuré prit rapidement une grande ampleur et eu une influence importante en Conflent. Il fut ramené à l'état séculier au XVe siècle et le prieur devint alors le curé de la paroisse d'Espira.  Au XIIIe siècle, la seigneurie d'Espira appartenait au domaine royal, qui l'inféodera en 1300 à Pere Cadell, fils de Bernat Cadell, de Puigcerdà. Les Cadell resteront seigneurs d'Espira jusqu'au XVIIe siècle. La seigneurie échoit ensuite à la famille de Terreros. Les derniers Terreros étant morts sans héritier, le dernier seigneur d'Espira, au XVIIIe siècle, sera le marquis d'Aguilar (Pierre-François-Ignace de Bon).  La famille de Joch conservera la château jusqu'au XIIIe siècle où un manque d'héritier direct l'obligera à apporter en dot Joch et ses environs au mari de la dernière héritière, Béatrix d'Urg et Hugues de Saissac. Or Hugues hérite peu de temps après de la vicomté de Fenouillet, ce qui inclus Espira et son château dans cette vicomté qui ne sera pas possédée longtemps par cette famille pour des raisons politiques.","architecture":"Du château d'Espira de Conflent il ne reste que quelques pans de murs ouverts au quatre vents,  reste un superbe rempart crénelé comme on en voit peu dans le Roussillon, au bout duquel se dresse deux tours : Une carrée, massive, et une ronde, plus petite. La tour carrée date de 1292 (le château, lui, est cité en 1257 et 1262) Dans la cour du château on trouve une chapelle romane dont le mobilier est particulièrement soigné. L'autel est en marbre blanc et les murs intérieurs sont partiellement couverts de boiserie. La chapelle initiale, du XIIe siècle, est toujours visible. Elle se trouve sous les fondations du château et sert de nos jours de caveau de dégustation.","habitants":"Famille de Cadell\r\n        \"","divers":"Vestiges et  tour à Espira-de-Conflent","gps":"","images":["../image/image_66/66_Espira_Conflent_1.jpg","../image/image_66/66_Espira_Conflent_2.jpg","../image/image_66/66_Espira_Conflent_3.jpg"]},"Consult_chateau_formulaire2865":{"id":"Consult_chateau_formulaire2865","dept":"66","canton":"Rivesaltes","commune":"Estagel-Cases de Pene","nom":"Estagel_Jau_Pena","type":"Château","periode":"XIII_XVI","histoire":"ESTAGEL en 1851, est la commune  qui soppose le plus vigoureusement au coup d'État du 2 décembre 1851. Lopinion, influencée par Arago, soutient le conseil municipal qui proteste contre le coup dÉtat en sappuyant sur larticle 68 de la constitution de 1848. Le 7 décembre, le préfet Pougeard-Dulimbert décide dintervenir, avec lappui de larmée. Il fait quelques arrestations, mais son convoi est pris en embuscade et doit ouvrir le feu pour revenir à Perpignan.                                                                                                                                                                  MAS-JAU à Cases de  Pena,  viticole,   comme beaucoup d'ermitages en Roussillon, Notre Dame de Pène ne fut pas construit directement pour cet usage là.  Le lieu est en fait un ancien château médiéval bâti pour surveiller la vallée de l'Agly.   Ce château est cité en 1011 sous le nom de Castellum de Pena, il se trouve au sommet du pic Rodon à 335 mètres d'altitude.\r\nComme tous les châteaux de cette époque, il contenait une chapelle castrale, chapelle utilisée en temps comme église paroissiale des habitants de Cases de Pène. La première mention de cette chapelle date de 1224 sous le vocable de Sancta Maria de Pèna. Peu à peu le château perdit de son intérêt stratégique et il fut abandonné. On en a une trace encore en 1414 avec la construction d'une citerne, mais plus rien ne ressort dans l'histoire par la suite. Or la pratique de l'érémitisme commençait à se diffuser dans la société catalane. Ca et là quelques ermites avaient élus domicile dans des anciens lieux de culte et vivaient en assez grande autarcie. Ces ermites là étaient un peu les pionniers de cette activité. A Notre Dame de Pène, la première trace d'un ermite arrive assez tôt, en 1488. Il s'agissait de Fra Daniel Benet.","architecture":"Jau,  accroché aux derniers contreforts des Corbières, Jau semble veiller sur la vallée de lAgly où nous produisons des vins du Roussillon: Côtes du Roussillon, Muscat de Rivesaltes, vins de pays  Jaja de Jau.                                                                                                                  Cases de Pena, anciennement les Casasses. On trouve aussi le nom de Cazas d'Espira en 1774. Ce dernier nom s'explique par le fait que Cases-de-Pène dépendait de la paroisse d'Espira-de-l'Agly jusqu'en 17937. Le lieu est mentionné pour la première fois par son château en 1011 (castellum Penna) puis en 1263 (castrum sive rupes de Penna). On trouve une mention du lieu en 1358 (loch de Pena) et le nom actuel en 1772.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château d'Estagel et le mas de Jau","gps":"","images":["../image/image_66/66_Estagel_Jau_Pena_1.jpg","../image/image_66/66_Estagel_Jau_Pena_2.jpg","../image/image_66/66_Estagel_Jau_Pena_3.jpg","../image/image_66/66_Estagel_Jau_Pena_4.jpg","../image/image_66/66_Estagel_Jau_Pena_5.jpg","../image/image_66/66_Estagel_Jau_Pena_6.jpg","../image/image_66/66_Estagel_Jau_Pena_7.jpg","../image/image_66/66_Estagel_Jau_Pena_8.jpg"]},"Consult_chateau_formulaire6672":{"id":"Consult_chateau_formulaire6672","dept":"66","canton":"Prades","commune":"Olette","nom":"Evol","type":"Vestiges","periode":"XIII","histoire":"EVOL, l'histoire de ce château est longue et complexe, la première trace du lieu date de 1162, cet année là on a la preuve que le comte de Cerdagne avait inféodé la vallée d'Evol à Bernat d'Alione. Ce personnage énigmatique, marié à la fille d'Arnau de So, devient l'héritier de la châtellenie de So. Ainsi commence la dynastie des futurs vicomtes d'Evol, la famille de So régnera sur la vallée. Le château de la vicomté d'Évol date du XIIIe siècle. La terre ou villa dEvol est cédée en 957 par le comte de Cerdagne. Sunifred II (petit-fils de Guifre el Pelos) à labbaye de Sainte Marie de Ripoll. Elle appartient avant 1230 à Bernard 1er dAlion puis à son fils Bernard II qui meurt sur le bûcher de lInquisition en 1258. Le roi Jacques II dAragon nomme son descendant Guillem 1er de So, seigneur dEvol, en 1260. Guillem fait construire peut après le château féodal proche de la nouvelle ligne de frontière avec le royaume de France définie par le traité de Corbeil en 1258.  Dès 1343, le vicomte Jean de So fait construire un nouveau château près dOlette (la Bastide) et en fait sa résidence. Dès lors, lancien château nabrite plus quune petite garnison et sert de magasin aux fermiers généraux. Il est vendu en 1812 comme bien national et reste propriété privée jusquen 1990 où il est racheté par la commune dOlette-Evol.","architecture":"Le château d'Evol rattaché au bourg d'Olette qui conserve deux tours, vestiges de la forteresse de la \"Bastida Nova\", le petit hameau médiéval d'Evol situé dans la partie nord d'Olette présente une remarquable homogénéité architecturale. Il possède en effet des murs de schistes et couvertures en lauzes, dont la taille était la spécialité des habitants du village en hiver. Le hameau conserve jalousement son château féodal du XIIIe siècle construit à la base d'une colline qui sert de contrefort au Mont Coronat. Celui ci est assis sur le flanc d'une garrigue aux chênes verts dans un angle formé par un ravin très profond. \r\nLe château  a la forme dun quadrilatère denviron 40 m de côté avec une tour ronde à chaque angle et un donjon rond également au milieu du mur Nord. Le bâtiment dhabitation occupait toute la longueur du mur Ouest et comprenait trois salles communicantes : au midi, une salle (peut-être salle des gardes) de 9 m x 9 m, une grande salle de 16 m x 9 m et une troisième plus petite de 7,50 m x 9 m avec les vestiges dune cheminée (peut-être la cuisine). Les murailles Est et Ouest comportaient une poterne, lentrée principale se faisant par le mur méridional après une montée pénible. A lOuest se trouve une terrasse extérieure appelée la Miranda doù lon a une belle vue sur la vallée. Il existait un étage supérieur au niveau du chemin de ronde.","habitants":"Famille de So\r\n        \"","divers":"Vestiges du château d'Evol","gps":"","images":["../image/image_66/66_Evol_1.jpg","../image/image_66/66_Evol_2.jpg","../image/image_66/66_Evol_3.jpg","../image/image_66/66_Evol_4.jpg","../image/image_66/66_Evol_5.jpg","../image/image_66/66_Evol_6.jpg"]},"Consult_chateau_formulaire081d":{"id":"Consult_chateau_formulaire081d","dept":"66","canton":"Rivesaltes","commune":"Fenouillet","nom":"Fenouillet","type":"Vestiges","periode":"XIII","histoire":"FENOUILLET, trois châteaux distants de 500 mètres l'un de l'autre portent le nom de Sabarda (voir article), de Saint-Pierre et de Castel-Fizel (voir article).  St-Pierre de Fenouillet est le seul vestige cathare qui n'a pas été remanié après son indexation à la couronne française. A la fin du XIIe siècle, le vicomte Arnaud meurt sans héritier mâle, alors que sa femme est enceinte. Sa fille, Ava, épouse un cadet de la famille de Saissac, Pierre, qui relève le titre vicomtal. Dès lors il prend le titre de vicomte de Fenouillet, formant \"une seconde\" dynastie. En 1209, Pierre de Fenouillet de Saissac, fils d'Ava, rend hommage à Aymeri de Narbonne pour le château de Fenouillet.  En 1229, suite au traité de Meaux, Pierre se voit confisquer sa vicomté au profit du régent du roi d'Aragon.  Ils n'obtiennent en échange que la vicomté de Canet à laquelle se rajoute plus tard celle d'Ille sur Têt.  En 1245, Pierre décède laissant à son fils Hugues le titre de vicomte de Fenouillet. Ce nouveau seigneur prend partie contre les catholiques. Il entretient des liens avec les Faidits des Corbières, du Pays de Sault et de Montségur. Durant un siècle, les héritiers tentent en vain de récupérer leurs terres Cette période troublée s'achève en 1255 avec la reddition de Chabert de Barbaira et de Quéribus. La famille de Fenouillet fait les frais de son soutien actif à la rébellion car en 1262, les restes du vicomte Pierre V, enterré à la commanderie Templière du Mas Deu, sont exhumés par l'Inquisition et son héritière.  Le site passe alors sous contrôle du roi de France.   En ce début de croisade, le vicomte de Fenouillet se range du côté des \"cathares\". Vers 1310, Père de Fenouillet obtient de Gueralda de Finestret son village qu'elle avait pourtant apporté en dot à son mari, Arnau de Corsavy et en 1357, le domaine passe à Ramon de Perillos.","architecture":"Le château Vicomtal-St Pierre se compose de différentes parties, le site castral de Saint-Pierre de Fenouillet a été pendant trois siècles le siège dune puissante vicomté médiévale, entre le début du XIe siècle et la deuxième moitié du XIIIe siècle, avant de seffacer en raison de la prise de pouvoir sur ce territoire par lautorité capétienne à la suite du traité de Corbeil (1258). Les vestiges d'une vaste enceinte de  basse avec les vestiges d'un grand donjon d'un logis et d'une chapelle du XII-XIIIe siècle  qui subsistent derrière les dernières maisons du hameau : Dans un pan de mur, une série d'archères est encore visible. Ce premier rempart protégeait le village proprement dit dont les quartiers principaux devaient se situer sur les pentes menant au château. Au dessus de cette zone se trouvait l'enceinte centrale dont une grande partie est encore nettement visible. Une porte fortifiée  était ouverte en son milieu : On distingue dans une base de mur perpendiculaire au rempart, au sommet de la grande rampe d'accès, l'orifice de logement de la barre de bois servant de fermeture. Cette porte franchie, on pénétrait sans doute dans les quartiers aristocratiques. On entrait dans le château en passant par la tour centrale, percée d'archères couvrant la voie d'accès. Elle protégeait une porte fortifiée ouverte sur sa face Ouest dont seul le seuil subsiste aujourd'hui. Vers l'Ouest cette tour est relayée par un rempart, vestige d'un ensemble quadrangulaire où devaient se trouver les bâtiments d'habitation, dont subsiste une magnifique salle voûtée.","habitants":"Famille de Saissac\r\n        \"","divers":"Vestiges du château Vicomtal-St Pierre, château de Peyralade et château de Saint-Paul","gps":"","images":["../image/image_66/66_Fenouillet_1.jpg","../image/image_66/66_Fenouillet_2.jpg","../image/image_66/66_Fenouillet_3.jpg","../image/image_66/66_Fenouillet_4.jpg","../image/image_66/66_Fenouillet_5.jpg","../image/image_66/66_Fenouillet_6.jpg","../image/image_66/66_Fenouillet_7.jpg","../image/image_66/66_Fenouillet_8.jpg","../image/image_66/66_Fenouillet_9.jpg"]},"Consult_chateau_formulaire59c2":{"id":"Consult_chateau_formulaire59c2","dept":"66","canton":"Céret","commune":"Le Perthus","nom":"Fort_Bellegarde","type":"Fort","periode":"XII-XVI","histoire":"BELLEGARDE  puise sa source dans le royaume de Majorque. En 1285, alors que ce royaume existait depuis moins de dix ans, Pierre III d'Aragon était une menace très sérieuse pour le jeune roi de Majorque Jacques II. Afin de se défendre, il fit bâtir une tour de surveillance au-dessus du Perthus, équipée pour se défendre de façon autonome. Mais elle restait une simple tour de surveillance, avec ses 20 mètres de haut et ses murs épais de 1,5 mètre. Lorsque, durant le XIVe siècle, le roi d'Aragon reprit militairement son voisin, la tour fut délaissée d'un point de vue royal, elle ne servait plus qu'au seigneur de la région pour obliger les voyageurs à payer un droit de douane. Le Perthus devient un territoire français après le traité des Pyrénées (1659). Durant la guerre de Hollande, le fort de Bellegarde est pris par les espagnols le 8 mai 16741, puis repris par le comte Frédéric-Armand de Schomberg après dix jours de siège, le 29 juillet 1675.   En 1679, Vauban visite Bellegarde et approuve le plan d'agrandissement considérable que lui propose son ingénieur Christian Rousselot de Monceaux. Il y apporte des corrections, dotant notamment la place d'une fortification double. L'année suivante, Louvois accepte l'essentiel du projet. Les travaux sont engagés. En 1793, les espagnols lancent une offensive d'importance pour envahir le Roussillon. Le général Ricardos passe par le Vallespir et occupe Prats de Mollo le 25 mai 1793. Le 5 juin, le fort Lagarde est occupé. Puis il descend la vallée et prend Bellegarde le 25 juin. Le fort restera espagnol pendant une bonne partie de la guerre, n'étant repris que le 7 septembre 1794 par les troupes du général Dugommier, après un siège de 4 jours. Le fort accueillit d'ailleurs le corps de son libérateur à sa mort, le 17 novembre 1794 à Figueras, mais il fut déplacé plus tard et remplacé par un monument à la mémoire de ce grand général français.  Durant la période révolutionnaire, le fort sera un temps renommé par les français fort de Midi-Libre ou Sud-Libre.","architecture":"le Fort de Bellegarde contrôle le passage du col du Pertus, ancien Portus Pompei, voie de communication facile entre la France et l'Espagne. Possession des rois de Majorque, le site est fortifié en 1285 afin de faire face à la menace du voisin aragonais. Il s'agit, au départ, d'une tour de surveillance, de 20 mètres de haut, au dessus du Pertus, équipée pour se défendre de façon autonome. Les rois d'Aragon reprennent la région au XIVe siècle. La tour est alors utilisée comme péage par les seigneurs locaux. Le fort a une forme générale pentagonale. Le glacis qui l'entoure est assez important, de l'ordre de 1 km. Cinq bastions protègent l'enceinte principale, tous en relation les uns avec les autres. Derrière le rempart, un deuxième mur intérieur protège le cur de la forteresse, marquant ainsi trois niveaux de protection : bastions, remparts, mur de protection. Le cur de la forteresse, c'était les bâtiments de la garnison, pouvant contenir 600 hommes, une chapelle, un hôpital, une boulangerie et son moulin, etc.\r\nLes magasins à poudre étaient enterrés, dans des petits bastions autonomes et parfaitement aérés. La seule entrée du fort, la \"Porte de France\", a été protégée par un fortin en forme de demi-lune. Le puits est gigantesque. D'un diamètre de 6 mètres, il fait 62 mètres de profondeur. Creusé en 1698, il a été suffisant pour permettre de soutenir un siège prolongé.","habitants":"Vauban\r\n        \"","divers":"Citadelle de Bellegarde","gps":"","images":["../image/image_66/66_Fort_Bellegarde_1.jpg","../image/image_66/66_Fort_Bellegarde_2.jpg","../image/image_66/66_Fort_Bellegarde_3.jpg","../image/image_66/66_Fort_Bellegarde_4.jpg","../image/image_66/66_Fort_Bellegarde_5.jpg","../image/image_66/66_Fort_Bellegarde_6.jpg","../image/image_66/66_Fort_Bellegarde_7.jpg","../image/image_66/66_Fort_Bellegarde_8.jpg","../image/image_66/66_Fort_Bellegarde_9.jpg"]},"Consult_chateau_formulaire55d2":{"id":"Consult_chateau_formulaire55d2","dept":"66","canton":"Amélie les Bains","commune":"Prats-de-Molo","nom":"Fort_Lagarde","type":"Fort","periode":"XVI","histoire":"FORT-LAGARDE à Prats de Mollo,  capitale du Haut Vallespir, est devenu un important point stratégique à partir de 1659, date du rattachement du Roussillon à la France. La ville a été fortifiée par le maréchal de Louis XIV, Vauban, qui a également fait construire le fort Lagarde, surplombant les lieux. Le fort Lagarde est classé « monument historique » depuis 1925. Destiné à surveiller la frontière franco-espagnole,  domine la ville fortifiée de Prats-de-Mollo-la-Preste. La tour de Mir, tour d'observation en cours de restauration.","architecture":"Le fort de Lagarde a été construit de manière à résister à une artillerie ennemie selon le concept de fortification bastionnée, développée par Vauban. Il est parfaitement adapté au relief montagneux de Prats-de-Molló. Sur le front Sud, deux lignes de défense se succèdent en avant du donjon. Les fronts Nord et Est sont bordés par des ravins. Le plus vulnérable reste le front Ouest protégé par un système de défense complexe. Il est renforcé par une place d'armes et une traverse dite « tombeau de Mahomet ». Tous ces ouvrages sont érigés en trois matériaux différents : granit du massif du Costabonne, schiste et brique. Une voie de repli militaire existe parallèlement à ce sentier. Partant du monument, un souterrain de 142 marches datant du XVIIIe siècle aboutit à une redoute à mâchicoulis sur arc. Ce poste de défense avancé est également appelé « tour Carrée ». Un chemin couvert, entre ville et redoute, complète cette voie qui permettait aux soldats, en poste dans la ville, de rejoindre le fort en cas d'attaque. Au coeur du monument, une tour à signaux médiévale surplombe le donjon, renforcé par Vauban. Une voie de repli militaire relie le fort à la ville créant ainsi un ensemble architectural remarquable.","habitants":"Vauban\r\n        \"","divers":"Citadelle et tour de guet à Prats de Molo","gps":"","images":["../image/image_66/66_Fort_Lagarde_1.jpg","../image/image_66/66_Fort_Lagarde_2.jpg","../image/image_66/66_Fort_Lagarde_3.jpg","../image/image_66/66_Fort_Lagarde_4.jpg","../image/image_66/66_Fort_Lagarde_5.jpg","../image/image_66/66_Fort_Lagarde_6.jpg","../image/image_66/66_Fort_Lagarde_7.jpg","../image/image_66/66_Fort_Lagarde_8.jpg","../image/image_66/66_Fort_Lagarde_9.jpg"]},"Consult_chateau_formulairebc0d":{"id":"Consult_chateau_formulairebc0d","dept":"66","canton":"Prades","commune":"Villefranche de Conflent","nom":"Fort_Liberia","type":"Fort","periode":"XVI","histoire":"FORT-LIBERIA , construit par Vauban après la division de la Catalogne entre la France et l'Espagne par le traité des Pyrénées, à compter de 1681, en même temps que la citadelle de Mont-Louis qui est plus en amont dans la vallée de la Têt.  Ce fort a un temps servi de prison pour les empoisonneuses de Louis XIV. Après le départ des troupes le « Domaine » met le fort en vente. Un premier propriétaire privé fait son apparition en 1925 : M. Laurens, cette personne, ancien armateur à la retraite, avait dans l'idée d'en faire une maison de retraite pour les marins. Dans le but d'aménager le fort pour ses pensionnaires, M. Laurens fit raser la caserne des officiers située au premier niveau de la forteresse afin d'aménager une cour d'honneur. Du fait de l'accès difficile et de l'éloignement de la mer, son projet n'eut pas le succès escompté. Le fort fut remis en vente et acheté en 1955 par M. Marcel Puy, qui en fit cadeau de mariage à son épouse. Finalement, M. Puy signa en 1984 avec quatre commerçants de la cité et, après trois années de restauration, le fort a été ouvert au public en 1987.","architecture":"Villefranche de Conflent, la ville est entourée d'une enceinte de forme rectangulaire allongée, intégralement conservée. Elle présente des éléments médiévaux mêlés aux reconstructions et adjonctions des XVIIe siècle et XVIIIe siècles.                                                                                Le Fort Libéria, ce fort fut construit par Vauban en 1681 et fortifié sous Napoléon III. Le fort, bien visible, domine la ville fortifiée de Villefranche-de-Conflent avec des chemins de ronde, des galeries de contrescarpe, des bastions, une chapelle, un musée archéologique, spéléologique et un souterrain de 734 marches  L'escalier souterrain dit \"des mille marches\"  qui le relie à la ville, au niveau du pont Saint-Pierre, n'a été bâti qu'au XIXe siècle. Entre le Fort Libéria et la ville de Villefranche, on notera la présence de casemates Haxo, mais qui ne sont pas entretenues. Il est inscrit aux M.H. depuis 2009.","habitants":"Vauban\r\n        \"","divers":"Citadelle du fort Liberia à Villefranche de Conflent","gps":"","images":["../image/image_66/66_Fort_Liberia_1.jpg","../image/image_66/66_Fort_Liberia_2.jpg","../image/image_66/66_Fort_Liberia_3.jpg","../image/image_66/66_Fort_Liberia_4.jpg","../image/image_66/66_Fort_Liberia_5.jpg","../image/image_66/66_Fort_Liberia_6.jpg"]},"Consult_chateau_formulaire87b4":{"id":"Consult_chateau_formulaire87b4","dept":"66","canton":"Collioure","commune":"Collioure","nom":"Fort_Miradou","type":"Fort","periode":"XVI","histoire":"MIRADOU: en 1668 lingénieur de Louvois : Louis Nicolas de Clerville, en inspection, vit la nécessité de renforcer Collioure. En 1669, Vauban qui voulait faire de Collioure une ville de garnison, décide de raser la vieille ville et de créer un fort à lemplacement du vieux. Sainte-Thérèse construit vers 1540 par Charles Quint. Ce fort conte-tenu de sa situation était d'une importance primordiale dans la défense du château.  Le 16-12-1793 le fort capitule devant les Espagnols (Guerra Gran ou Guerre du Roussillon).\r\nAujourdhui, le fort Miradou, propriété de larmée de terre est devenu le centre national dentrainement commando (CNEC), dont la mission est laguerrissement des cadres et personnels de larmée de terre. Il accueille environ 3000 stagiaires par an. Sa devise en pointe toujours.","architecture":"Le fort Miradou, cette extension sinscrit dans un site à la fois exceptionnel par sa qualité et contraint par sa topographie, simple tour dès le XIVe siècle, Charles Quint la renforce dune enceinte en 1554. En 1672, Vauban lui donne sa forme actuelle. le nouveau bâtiment sinsère entre fort et village. Il reprend le principe dimplantation dun bastion Vauban. Ses volumes fonctionnels sont brutalismés en béton, acier et verre. En périphérie les circulations sont capotées dune peau de pierre sèche qui inscrit le bâtiment dans son site. Lextension du fort Miradou a été conçue indépendamment au fort. Cette nouvelle structure de trois étages abrite un service de restauration et une antenne médicale. Une terrasse supérieure accueille, de plain-pied, un parking, une aire de retournement et un espace paysagé. En dessous, cest lespace cuisine et restauration. A létage inférieur se trouve le service médical. Les murs sont recouverts de pierres sèches montées sur une paroi en béton afin de rester dans lesprit du fort. Lintérieur se caractérise par une architecture brute avec des matériaux tels que le béton, le métal et le verre qui révèle le côté contemporain de la structure. Lutilisation du verre est différente à chaque étage en amenant de la luminosité.","habitants":"Vauban\r\n        \"","divers":"Citadelle de Miradou à Collioure","gps":"","images":["../image/image_66/66_Fort_Miradou_1.jpg","../image/image_66/66_Fort_Miradou_2.jpg","../image/image_66/66_Fort_Miradou_3.jpg","../image/image_66/66_Fort_Miradou_4.jpg","../image/image_66/66_Fort_Miradou_5.jpg","../image/image_66/66_Fort_Miradou_6.jpg"]},"Consult_chateau_formulaire1637-2":{"id":"Consult_chateau_formulaire1637-2","dept":"66","canton":"Argelès sur Mer","commune":"Collioure","nom":"Fort_St_Elme","type":"Fort","periode":"XVI","histoire":"FORT-ST-ELME, construit au XVIe siècle sous Charles Quint à partir d'une tour de garde érigée au VIIIe siècle par les Maures, adossé au massif des Albères à l'ouest. Blotti au fond d'une anse de cette côte rocheuse, le village de Collioure dispose d'un riche patrimoine monumental, qui mêle art religieux et architecture militaire. En 1537, l'architecte italien Benedetto de Ravenne attire l'attention de l'empereur sur les faiblesses de la position de Collioure. Après avoir réalisé une inspection, Benedetto obtient l'accord de Charles Quint. Il commença les travaux en 1538 jusqu'en 1552 et transforma la physionomie du fort qui prit son aspect en étoile à six redans à parois inclinées. Malgré cette modernisation et cette adaptation à l'artillerie et aux armes à feu, le 13 avril 1642, les troupes françaises du roi Louis XIII parvinrent à prendre le fort. Après la signature du Traité des Pyrénées en 1659, la menace du voisin espagnol restait d'actualité. Quand Vauban, maître dans la poliorcétique, fit une reconnaissance des structures défensives en 1659 dans la région de Collioure, il décida de construire pour le fort Saint-Elme une contrescarpe, formant avec la base de la muraille une fosse d'une dizaine de mètres duquel l'infanterie et les canons pouvaient facilement être manuvré.  Vers 1780 la façade du fort est blanchie afin de servir de repère depuis le large, avec la tour de la Massane, pour mieux situer le port de Port-Vendres. Le fort Saint-Elme a été démilitarisé en 1903 et laissé à l'abandon. La tour s'effondrait, le pas de tir était  impraticable et de nombreux murs menaçaient de s'effondrer. Le 21 août 1913, létat décida de le vendre aux enchères.","architecture":"Fort de Saint-Elme,  lors de sa construction, l'architecte Benedetto de Ravenne décida de réaliser un tracé à l'italienne : un fort en forme d'étoile à six redans pour répondre aux progrès de l'artillerie. Les pans sont inclinés de façon à empêcher les boulets en métal de  faire trop de dégâts. De plus, le pas de tir situé sur la terrasse présente une vue à 360° pour permettre d'attaquer l'assaillant sans aucun angle mort. Lorsque le fort passe dans le giron français, Vauban ajoute à partir des années 1680 les fossés extérieurs et des ajouts au système défensif. Plusieurs propriétaires vont se succéder mais aucune restauration ne sera entreprise. Le fort est inscrit au titre des monuments historiques par arrêté du 2 avril 1927. Un nouveau propriétaire décide alors de le restaurer. Les travaux ne se terminent qu'en 1936. Pendant la deuxième guerre mondiale, il est occupé par la Kriegsmarine, la marine allemande, de 1942 à 1944. Certains bâtiments sont dynamités à leur départ afin qu'ils ne puissent pas être utilisés par les troupes alliées. Il est à nouveau reconstruit en 1950 mais les grands travaux de restauration débutent en 2004.","habitants":"Vauban\r\n        \"","divers":"Citadelle du fort de Saint-Elme","gps":"","images":["../image/image_66/66_Fort_St_Elme_1.jpg","../image/image_66/66_Fort_St_Elme_2.jpg","../image/image_66/66_Fort_St_Elme_3.jpg","../image/image_66/66_Fort_St_Elme_4.jpg","../image/image_66/66_Fort_St_Elme_5.jpg","../image/image_66/66_Fort_St_Elme_6.jpg","../image/image_66/66_Fort_St_Elme_7.jpg"]},"Consult_chateau_formulaire4a1e":{"id":"Consult_chateau_formulaire4a1e","dept":"66","canton":"Le Soler","commune":"Ille sur Tet","nom":"Ille_sur_Tet","type":"Village fortifiè","periode":"XV","histoire":"ILLE-Sur-TET,  en 1258, traité de Corbeil, à la suite de la Croisade des Albigeois, la frontière séparant le royaume de France de celui d'Aragon est délimitée par saint Louis.   En 1659, traité des Pyrénées, les nombreux succès remportés par Louis XIV le mettent en position de force pour imposer un nouveau tracé de la frontière. Le Roussillon est rattaché à la France, la frontière se déplace jusqu'au col du Perthus et aux limites du Vallespir. Ille devient donc française, et les remparts perdent de leur importance. La ville peut maintenant se développer extra-muros, ce qu'elle ne tardera pas à faire avec l'importante croissance démographique des siècles suivants. On précisera que la seigneurie d'Ille appartenait depuis 1297 à la famille de Fenollet, Pere de Fenollet ayant vu sa seigneurie érigée en vicomté en 1314. Suite à un mariage, les vicomtes d'Ille deviendront également vicomtes de Canet quelques années plus tard. Les Medinaceli furent les derniers seigneurs d'Ille. À la Révolution, la ville apparaît comme nettement républicaine, tendance symbolisée par le conventionnel Montégut, qui vota la mort de Louis XVI. C'est peut-être ce côté un peu trop rouge qui fit qu'on préféra Vinça à Ille comme chef-lieu de canton quelques années plus tard.","architecture":"La ville d'Ille sur Têt  possède encore de nombreux vestiges de ses fortifications, plusieurs pans de remparts étant visibles en faisant le tour du Vieil Ille. Deux portes médiévales ont subsisté, celles de la Paraire et de la Font, auxquelles on ajoutera la porte de la rue du Comte, plus tardive. La promenade le long des remparts débouche presque forcément sur une imposante tour quadrangulaire du XIe siècle, la tour d'Alexis. À noter aussi un important patrimoine civil, avec de superbes hôtels particuliers. L'un d'eux, la maison du Comte, est célèbre pour avoir servi de cadre à la nouvelle de Prosper Mérimée la Vénus d'Ille. En se promenant dans les rues de la ville, on observera aussi les sculptures assez étonnantes que sont les Enamorats et surtout le Cagaïre, situé rue des Carmes.                                                                                        La tour dAlexis est lancien château dIlle-sur-Têt. Il se trouve près de léglise St-Etienne-del-Pédreguet, au Nord-Est. Architecturalement la tour dAlexis mesure 12 mètres de côté, elle a des murs de 2 mètres dépaisseur, comme un donjon, le premier étage nest accessible qu'à laide dune échelle que les occupants pouvaient retirer en cas dattaque. Le rez-de-chaussée est voûté, ce qui est rare pour cette époque.","habitants":"Famille de Medinaceli\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Village fortifiè d'Ille sur Têt et tour alexis","gps":"","images":["../image/image_66/66_Ille_sur_Tet_1.jpg","../image/image_66/66_Ille_sur_Tet_2.jpg","../image/image_66/66_Ille_sur_Tet_3.jpg","../image/image_66/66_Ille_sur_Tet_4.jpg","../image/image_66/66_Ille_sur_Tet_5.jpg","../image/image_66/66_Ille_sur_Tet_6.jpg"]},"Consult_chateau_formulaired7af":{"id":"Consult_chateau_formulaired7af","dept":"66","canton":"Elne","commune":"Corneilla del Vercol","nom":"Jonquère","type":"Château","periode":"XV","histoire":"JONQUERE, est aujourdhui le siège dun important vignoble exploité par Philippe Jonquères dOriola. Un nom qui a fait la fierté de cette terre catalane au travers des exploits sportifs de Pierre Jonquères dOriola et de Christian dOriola qui ont rapporté de nombreuses médailles olympiques dans le domaine de léquitation et de lescrime. Cest  avec le même esprit de challenge que Philippe a refait le vignoble familial qui sétend jusquau plateau de Cabestany, en replantant près dune cinquantaine dhectares depuis ces 20 dernières années ainsi quune belle oliveraie.","architecture":"Jonquère Perché tout en haut du village de Corneilla del Vercol, ce château féodal, dont les fondations remontent au XIIe siècle et dont larchitecture nest pas sans rappeler celle du Palais des Rois de Majorque à Perpignan, de plan quadrangulaire, corps de logis à trois niveaux avec pavillons carrées aux angles toit à deux pans.","habitants":"Philippe Jonquères dOriola\r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Jonquère à Corneilla del Vercol","gps":"","images":["../image/image_66/66_Jonquere_1.jpg","../image/image_66/66_Jonquere_2.jpg","../image/image_66/66_Jonquere_3.jpg","../image/image_66/66_Jonquere_4.jpg","../image/image_66/66_Jonquere_5.jpg"]},"Consult_chateau_formulairedbca":{"id":"Consult_chateau_formulairedbca","dept":"66","canton":"Rivesaltes","commune":"Lansac","nom":"Lansac","type":"Vestiges","periode":"XIII","histoire":"LANSAC, vestiges du château de Lansac à 8 km au Nord-Est de Sournia et à 7 km au Sud-Est de Saint-Paul de Fenouillet. Au XIIIe siècle, il semble que le château dépende de la Vicomté  de Fonollède.","architecture":"Vestiges du château de Lansac, donjon quadrangulaire à deux étages, il ne reste qu'un bâtiment parallélépipédique  d'environ 4m x 5m, sans crénelage, sans échauguette, sans tour , sans bretèche, et vestiges du remparts accolés à ce dernier.","habitants":"Vicomté  de Fonollède\r\n        \r\n        \"","divers":"Vestiges du château de Lansac","gps":"","images":["../image/image_66/66_Lansac_1.jpg","../image/image_66/66_Lansac_2.jpg","../image/image_66/66_Lansac_3.jpg"]},"Consult_chateau_formulaire36a3":{"id":"Consult_chateau_formulaire36a3","dept":"66","canton":"Céret","commune":"Laroque des Albères","nom":"Laroque_Albères","type":"Vestiges","periode":"XI-XII","histoire":"LAROQUE,  cité  au IXe siècle sous le nom Roca.  Pons Hug, comte dAmpurias en  hérite.  L'ancien village de Laroque fut, dès le Moyen-Age, articulé autour du château seigneurial à l'intérieur des remparts.  Ainsi voit-on apparaître Bernat de Laroque (1161-1180), qui épousa Adelaïda de Thuir, Bernat est le premier seigneur. Ensemble ils auront une fille, Alamanda de Laroque, qui épousa Ramon de Vilademuls. Leur fille Maria de Vilademuls se maria avec Hug IV, comte d'Empurias (1200-1230), dont naîtra Pons Hug IV, futur comte d'Ampurias (1230-1269). En tant que propriété comtale, en 1264, le comte Pons-Hug IV prit une décision importante pour la ville. Par la suite la lignée des comtes d'Ampurias s'éteindra (1325), et le comté passera au roi de Majorque. C'est ainsi que Laroque des Albères devient une ville royale, propriété directe du roi. C'est dans le château de Laroque que le roi de France Philippe III le Hardi rencontra le roi de Majorque lors de la croisade d'Aragon. Dès le XVIIe siècle, le village commença sa croissance en dehors des remparts, vers le nord, formant un \"faubourg\". En 1343, le seigneur de Laroque se rend sans combattre au Roi d'Aragon. Durant le XIVe siècle eut lieu l'épisode du royaume de Majorque. Jacques 1er le Conquérant, grand roi d'Aragon,  sépara son royaume en deux pour éviter de léser l'un de ses deux fils : A l'aîné (Pierre III d'Aragon) sa succession, au cadet (Jacques II de Majorque) le nouveau royaume de Majorque, à la mort de Jacques 1er les deux frères furent en conflit, l'aîné voulant récupérer ses terres, le cadet voulant conserver son indépendance. Devant la puissance de Pierre III, Jacques de Majorque tente de se lier avec le roi de France Philippe le Hardi. Mais surpris par le roi d'Aragon, il doit fuir et se réfugie au château de Laroque des Albères.","architecture":"Au XIe Siècle édification dun château de Laroque. Il occupe la totalité de la surface du rocher, délimité par les ruines des fortifications et caractérisé par la tour-donjon, dont on se servait comme tour de surveillance dans le réseau des Rois de Majorque (en relation avec le pic Saint-Christophe au Sud-Ouest et le château d'Ultrera au Sud-Est). La tour est en bel appareillage de galets éclatés, avec une porte et une petite fenêtre,  elle est encombrée par un escalier en pierre. En 1371, lenceinte du château ne pouvant plus contenir de nouvelles maisons, le village sest agrandi en dehors des fortifications. La Tour est tout ce qui reste du donjon qui ne devait pas être habité, il servait  de poste de guet et communiquait par signaux avec Elne et les tours situées sur la  crête des Albères. Les restes de l'ancien château féodal, l'un des plus remarquables dans le Roussillon. Le donjon sest écroulé en 1890 il dominait le château et le vieux village et atteignait près de 25 m de haut. Il était protégé par un fossé et une muraille élevée. Les habitants construisirent leur maison à lextérieur des murailles, pour se protéger, et ils élevèrent des remparts.  La tour de Pérabona  dit de Massane est  reconstruite et consolidée, il est difficile de se hasarder à quelques conclusions. La porte est trop basse pour être l'entrée médiévale, les joints entre les pierres trop importants pour une construction de défense \"inviolable\".","habitants":"Famille de Bernat de Laroque\r\n        \r\n        \"","divers":"Vestiges du château  de Roca à Laroque d'Albères","gps":"","images":["../image/image_66/66_Laroque_Alberes_1.jpg","../image/image_66/66_Laroque_Alberes_2.jpg","../image/image_66/66_Laroque_Alberes_3.jpg","../image/image_66/66_Laroque_Alberes_4.jpg","../image/image_66/66_Laroque_Alberes_5.jpg","../image/image_66/66_Laroque_Alberes_6.jpg"]},"Consult_chateau_formulaire46bd":{"id":"Consult_chateau_formulaire46bd","dept":"66","canton":"Prades","commune":"Porta La tour Carol","nom":"Latour_Carol","type":"Vestiges","periode":"XIII","histoire":"Le patrimoine dans la commune de Porta les vestiges de Latour de Carol.                                                                                                                                              LATOUR de CAROL,  il est aussi difficile de dater l'origine de ce château que de la tour Cerdagne, il est par contre clair qu'elle faisait partie du système de défense de la Cerdagne. On la trouve en tant que possession du baron d'Enveitg, propriétaire de toute la vallée du Carol de l'étang du Lanoux au plateau Cerdan. Ces  cette puissante famille qui l'a faite construire lors de la mise en place du système défensif de la Cerdagne. Ce système était composé de 3 éléments en ce qui concerne la vallée du Carol : En tête, sur la partie la plus septentrionale, la tour Cerdagne, dont il reste quelques ruines, puis plus loin dans la vallée le château de Carol et enfin au troisième plan la tour de Carol, une autre tour défensive qui donna son nom au village actuel de Latour de Carol. A la fin du XIVe siècle, Pierre d'Enveitg se vit confisqué ses terres pour ne pas avoir prêté hommage au roi Jean II, mais le 11 novembre 1395 elles lui furent rendues.  A la fin du XVe siècle Louis XI prend le pouvoir militaire sur toute la Cerdagne. Saturnin reconnaît le roi de France comme nouveau suzerain. En 1718, malgré l'opposition de ses habitants, la seigneurie de la Vallée de Carol est confiée par le roi au cavalier Louis d'Oliva, commandant de la place-forte de Mont-Louis. À la mort de ce commandant en 1729, la seigneurie revient dans le domaine royal, mais la population conserve contre les troupes françaises une rancoeur qui transparaît dans le cahier de doléances de 1789.","architecture":"Le château de la Tour de Carol s'élevait sur un roc surplombant la vallée. Ruines de l'enceinte  et de deux tours du XIIIe siècle. Le bourg de Carol fut fortifié et ses défenses renforcées par les rois de Majorque au XIVe siècle. Le château de Carol, dont les tours se dressent dans la vallée, témoigne dun passé historique. Ses fortifications étaient de grandes épaisseurs, ce qui indique l'importance du lieu. De ce château, il nous reste deux tours appelées de nos jours \"Petit Carol\", elles sont sur le versant droit du Carol en remontant la vallée.                                                                                                                                                                                                                                                                                                                                                                                  Ur,  le castell, manoir avec échauguette, château de la famille De Codol,  flanqué à un angle d'une échauguette en encorbellement.","habitants":"baron Pierre d'Enveitg\r\n        \"","divers":"Vestiges de Latour de Carol","gps":"","images":["../image/image_66/66_Latour_Carol_1.jpg","../image/image_66/66_Latour_Carol_2.jpg","../image/image_66/66_Latour_Carol_3.jpg","../image/image_66/66_Latour_Carol_4.jpg","../image/image_66/66_Latour_Carol_5.jpg","../image/image_66/66_Latour_Carol_6.jpg","../image/image_66/66_Latour_Carol_7.jpg","../image/image_66/66_Latour_Carol_8.jpg","../image/image_66/66_Latour_Carol_9.jpg"]},"Consult_chateau_formulaire3900":{"id":"Consult_chateau_formulaire3900","dept":"66","canton":"Rivesaltes","commune":"Latour de France","nom":"Latour_de_France","type":"Village fortifiè","periode":"IX-XI-XIV","histoire":"Deux châteaux à Latour de France celui de la tour et de Bélesta (musée).                                                                                  LATOUR de FRANCE  au IXe siècle, rattaché au comté de Bésalù, à qui appartenait la vicomté de Fenouillèdes. Pierre II d'Aragon, alors maître de la Catalogne, prit part aux côtés du comte de Foix à ce qu'on a appelé plus tard \" l'hérésie cathare\". Défait, son comté fut coupé en deux en 1258, le Fenouillèdes fut rattaché à la France tandis que le reste resta à l'Aragon.   Pour marquer cette frontière, il fut installé une borne dont l'un des côtés est gravé aux armes de la maison de Montesquieu, seigneurs de Latour de France, de l'autre la croix des rois d'Aragon : la \"Roque d'En Talou\" En 1020, un lieu nommé Triniach (ancien nom du bourg) est cité dans un texte. Il appartient à Bernard de Tailleferet en 1140, Bérenger de Peyrepertuse rend hommage au Comte de Barcelone pour son château de Triniach.    En 1258, le traité de Corbeil signé entre le roi Jacques Ier d'Aragon et du roi de France Louis IX fixe les frontières du royaume de France au Sud des Corbières.  le roi de France Philippe VI de Valois donne le château à Guillaume du Vivier en 1342. Jean de Voisins reconstruit le château en 1480, et en 1639, les troupes du roi de France Louis XIII campent proche de Latour. Le village et le château subissent des saccages.\r\nBELESTA commune voisine à   Latour de France,  cité en 1210, on trouve à cette époque un château à Bélesta qui appartenait à Béatrix de Bellstar, par ailleurs co-seigneur de Vernet en Roussillon. Il semble que la seigneurie appartenait à Jean de Belcastell. Durant la deuxième moitié du XIVe siècle celui-ci vendit \"la moitié de Bélesta\" à Bérenger III d'Oms  fortifiée par Louis IX, qui passa dans de nombreuses familles, avant de devenir la demeure d'une branche de la maison de Niort. Les dernières occupantes du lieu, cinq surs, en furent chassées par la Révolution de 1789. Presque en ruine depuis, elle fut réhabilitée dans les années 1980 et abrite depuis un musée de préhistoire, en rapport avec les découvertes faites le château de Bélestat du XIIe siècle musée de pièces découvertes dans une vaste grotte.","architecture":"Le château ruiné, dont on peut deviner les fortifications, date du XIVe siècle, le village possédait un château datant du XIe siècle, mais c'est bien la tour qui assurait la surveillance du terrain. En 1462, château et fortification sont détruits. De nouveau en 1640, le village et le château sont détruits.                                                                                       Bélestat, Le château qui surveillait le village était situé sur le sommet d'une barre rocheuse. Orienté Est-Ouest, il est  composé d'un bâtiment rectangulaire et d'une construction accolée elle aussi rectangulaire. Les deux bâtiments sont voûtés. Il existe toujours une trace d'une citerne au Sud-Est. Le tout est relié au pignon Ouest de l'église par une courtine crénelée récente, composée d'une tour carrée bâtie entre le XIe et le XIIe siècle, édifice rectangulaire auquel est accolée sur l'angle sud-est une citerne, les bâtiments du château furent construits autour d'une cour intérieure dans laquelle on entrait par les escaliers actuels, l'ensemble date du XIIIe siècle.","habitants":"Famille de Jean de Voisins\r\n        \"","divers":"château de Balestat à Latour de France","gps":"","images":["../image/image_66/66_Latour_de_France_1.jpg","../image/image_66/66_Latour_de_France_2.jpg","../image/image_66/66_Latour_de_France_3.jpg","../image/image_66/66_Latour_de_France_4.jpg","../image/image_66/66_Latour_de_France_5.jpg","../image/image_66/66_Latour_de_France_6.jpg","../image/image_66/66_Latour_de_France_7.jpg","../image/image_66/66_Latour_de_France_8.jpg"]},"Consult_chateau_formulaire7001":{"id":"Consult_chateau_formulaire7001","dept":"66","canton":"Prades","commune":"St-Michel de Cuxa","nom":"Les_Angles","type":"Vestiges","periode":"XII","histoire":"Les-ANGLES sont donné en 965 par Sunifred II comte de Cerdagne, au monastère de Saint-Michel de Cuxa. En 1181, le roi d'Aragon autorise l'abbé de Saint-Michel de Cuxa à fortifier ses possessions. D'ailleurs en 1204 un acte nous prouve que cette abbaye possédait toujours les Angles. Entre temps le tout nouveau roi d'Aragon Alphonse II, issu des comtes de Barcelone, fortifie ses terres. Il encourage l'abbaye de St Michel de Cuxa de faire de même et alors que lui-même construit le château de Puyvalador (1195), l'abbaye construit un château aux Angles (1181). Le hameau de Balcère (Vallsera en catalan), situé au pied de sa petite église Sainte-Marie, appartenait depuis 1011 à l'abbaye Saint-Michel de Cuxa. En 1312, les troupes du comte d'Armagnac pillent le Capcir et en particulier Balcère, mais c'est surtout entre 1347 et 1350 que la peste noire emporte toute la population du village. Celui-ci se repeuplera un peu, et en 1701 l'abbaye de Cuxa cède le territoire aux Angles. Le village n'est plus habité du tout à partir du XVIIIe siècle.","architecture":"Les habitants des Angles  abandonnent alors l'ancien village, construit autour de l'église Saint-Sauveur, pour venir s'installer dans l'enceinte des fortifications du château. C'est le lieu du village actuel, situé sur une légère éminence et à 300 mètres de l'ancien village. Le château est construit à partir d'une ferme forte, le Mansus de Podio, transformée et fortifiée.  Vers 1701 le village des Angles a récupéré de St Michel de Cuxa les derniers habitants du village de Vallsera, qui depuis s'est éteint.\r\nL'église St-Sauveur de la fin du VIIIe ou du début du IXe siècle sera remplacée plus tard par une seconde église, elle aussi dédiée à St-Sauveur, mais qui sera construite un peu plus bas que l'édifice primitif, au sein du château des Angles.      Il ne subsiste plus aujourd'hui que le clocher méridional. Il s'agit d'une tour haute de 33 mètres, décorée de bandes lombardes; ses quatre étages sont percés de baies jumelées surmontées d'oculus. La tour est couronnée par un crénelage, qui n'est pas d'origine. On lui rapporta un contrefort à la base vers le XVe siècle  pour contrebalancer son inclinaison, qui aurait pu causer son effondrement.","habitants":"Comte Sunifred II de Cerdagne\r\n        \"","divers":"Vestiges du château de Balcère et tour de l'abbatial","gps":"","images":["../image/image_66/66_Les_Angles_1.jpg","../image/image_66/66_Les_Angles_2.jpg","../image/image_66/66_Les_Angles_3.jpg","../image/image_66/66_Les_Angles_4.jpg","../image/image_66/66_Les_Angles_5.jpg","../image/image_66/66_Les_Angles_6.jpg"]},"Consult_chateau_formulairec627":{"id":"Consult_chateau_formulairec627","dept":"66","canton":"Prades","commune":"Molitg les Bains","nom":"Molitg_les_Bains","type":"Vestiges","periode":"XI-XIII","histoire":"Trois châteaux Molitg les Bains, Paracolls  et Reill du XVIe siècle (voir article).                                                                                 MOLITG, est inféodé à la seigneurie, puis à la baronnie de Paracolls (dont les ruines du château dominent la vallée de la Castellane). Celle-ci est la possession des rois de Majorque à la fin du XIIIe siècle. Elle passe ensuite entre les mains de plusieurs seigneurs pour aboutir en 1636 dans l'escarcelle de la famille de Llupià jusqu'à la Révolution. C'est à la famille de Llupia que l'on doit le début du thermalisme à Molitg, au développement duquel la famille De Massia est associée tout au long du XIXe siècle. Une ordonnance de 1786 de l'Intendant du roi de France  indique  que les habitants de Molitg peuvent se baigner gratuitement dans les eaux thermales, pratique qui sera poursuivie jusqu'au XXe siècle.     Le château fut transformé en hôtellerie par le marquis de Llupia.                                                                                                                                          PARACOLLS, depuis le Xe siècle de la vicomté de  Fénolède. La famille de Paracolls, en 1175, soit 3 ans après le rattachement du Roussillon au comté de Barcelone, on a une trace dans un document du mariage entre Blanche, dernière héritière de la seigneurie de Conat, de la vallée voisine, et de Guillaume Bernard de Paracolls. Blanche et Guillaume Bernard eurent trois enfants, Guillaume, Séguier et Guillelma. La généalogie de cette famille est incertaine. On y trouve plusieurs Guillaume Bernard dont l'un d'eux jure l'édit de paix et de trêve publié par Nunyo Sanche d'Aragon pour le diocèse d'Elne et de Cerdagne en 1217. En  1235 un autre Guillaume Bernard, puis il faut attendre en 1254  dame Sibille de Paracolls  une possession de la puissante famille de Paracols dont le territoire s'étendait sur toute la vallée de Molitg. les héritiers n'eurent pas d'enfant mâle. Le domaine de Paracolls fut donné à l'évêque d'Elne Bernard de Berga, qui le partagea à sa mort. On pense que c'est à Paracolls qu'est né le troubadour catalan Béranger \"instruit, courtois et vaillant, mais peu fortuné\".","architecture":"Le château de Molitg ne doit pas être confondu avec le château de Paracolls. Ce dernier fut le premier construit, pour défendre la vallée de Molitg au XIe siècle. A partir du XIIIe le village s'était agrandit autour de l'église Ste-Marie et il fut construit une \"motte castrale\", un ensemble fortifié attenant à l'église mais qui n'avait pas la même solidité que le château. Au fil du temps cette motte castrale fut renforcée et reconstruite , c'est elle que l'on peut voir dans toute sa splendeur de nos jours. Il a de très hauts murs qui servaient de fortification. Partant vers le Nord une enceinte fortifiée faisait le tour des maisons pour protéger la ville. D'ailleurs le clocher actuel de l'église était une tour de cette enceinte avant les modifications apportées à l'édifice religieux.  Paracolls au XIIIe ou au XIVe siècle. La belle muraille d'enceinte a été préservée. Ses  quatre tours défensives étaient autrefois reliées par un chemin de ronde. Une de ces tours sert aujourd'hui de clocher. Détail à remarquer sur la façade: la bretèche située au-dessus de la porte.  Dressées sur un éperon de granit dominant la Castellane, les ruines du château de Paracolls gardent depuis des siècles les gorges étroites et profondes creusées par la rivière. Vers le XIe siècle un véritable château y fut construit. Cest une des plus anciennes forteresses du Conflent cité en 948 construite, comme son nom lindique, pour défendre un col.","habitants":"Famille de Llupià                                                                                       Famille de Paracolls\r\n        \"","divers":"Vestiges du château de Paracoll et château de Molitg","gps":"","images":["../image/image_66/66_Molitg_les_Bains_1.jpg","../image/image_66/66_Molitg_les_Bains_2.jpg","../image/image_66/66_Molitg_les_Bains_3.jpg","../image/image_66/66_Molitg_les_Bains_4.jpg","../image/image_66/66_Molitg_les_Bains_5.jpg","../image/image_66/66_Molitg_les_Bains_6.jpg","../image/image_66/66_Molitg_les_Bains_7.jpg","../image/image_66/66_Molitg_les_Bains_8.jpg","../image/image_66/66_Molitg_les_Bains_9.jpg"]},"Consult_chateau_formulaire56ac":{"id":"Consult_chateau_formulaire56ac","dept":"66","canton":"Prades","commune":"Mont-Louis","nom":"Mont_Louis","type":"Citadelle","periode":"XVI-XVII","histoire":"Au environ de Mont-Louis une tour de guet à Eyne.                                                                                       MONT-LOUIS place forte, citadelle construite par Vauban, à la suite du traité des Pyrénées (1659) et à la demande du roi Louis XIV, qui souhaite sécuriser ce territoire annexé à l'Espagne, Vauban, commissaire général des fortifications, conçoit cette place forte en 1679.  À partir des années 1720, il semble que Mont-Louis connaisse une certaine décadence sur le plan militaire.  Annexe des Invalides et hôpital, la place sert aussi de prison pour l'ensemble de la Cerdagne et la viguerie de Saillagouse. Mais la ville et la citadelle de Mont-Louis voient leur mission à nouveau affirmée en 1774, le rôle de base d'opérations l'emporte jusqu'à la Révolution.   Mont-Louis est un centre dessais sur l'énergie solaire depuis 1948 et les expériences de léquipe du professeur Félix Trombe. Linstallation du premier four solaire permet lexpérimentation d'une énergie nouvelle, développée ensuite au four solaire d'Odeillo.","architecture":"À partir de 1808, Mont-Louis devient un vaste camp de passage pour l'Armée d'Espagne. Avec la Restauration, la valeur défensive de Mont-Louis apparaît plus liée à la topographie qu'à la citadelle elle-même, sa valeur offensive semble plus importante, au moins comme dépôt si la place est approvisionnée pour six mois.\r\nLes travaux reprennent avec fébrilité à partir de 1887 pour revaloriser l'organisation défensive de Mont-Louis : des batteries et des redoutes sont établies aux Estagnols et à Bolquère, puis sur les pics de la Tossa (2 038 m) et de Figuema (2 037 m). Un chemin stratégique (dit chemin des canons) relie ces positions à Mont-Louis.  Réunie en 1890, la commission supérieure de défense de Mont-Louis conclut à une défense dynamique avec le gros des forces en réserve au pic de la Tossa. Les derniers conflits mondiaux verront le flot d'émigrés entassés dans l'enceinte de la citadelle, lors de la guerre d'Espagne en 1936 avant une occupation allemande, puis une libération par les forces françaises libres.\r\nEn 1946, la citadelle retrouve sa fonction première de place forte militaire, avec l'installation du 11e BPC, unité politiquement sûre qui avait vocation de pouvoir être rapidement sur un potentiel coup d'État ou sur des grèves.","habitants":"Vauban\r\n        \"","divers":"Citadelle de Mont-Louis","gps":"","images":["../image/image_66/66_Mont_Louis_1.jpg","../image/image_66/66_Mont_Louis_2.jpg","../image/image_66/66_Mont_Louis_3.jpg","../image/image_66/66_Mont_Louis_4.jpg","../image/image_66/66_Mont_Louis_5.jpg","../image/image_66/66_Mont_Louis_6.jpg","../image/image_66/66_Mont_Louis_7.jpg","../image/image_66/66_Mont_Louis_8.jpg"]},"Consult_chateau_formulaire28c9":{"id":"Consult_chateau_formulaire28c9","dept":"66","canton":"Le Soler","commune":"Montalba le Château","nom":"Montalba","type":"Château","periode":"X-XIII","histoire":"MONTALBA, le village prend le nom de son château à l'époque de sa construction, aux alentours du IXe siècle. Il fut construit autour d'une grosse tour carrée.  Montalba appartenait aux seigneurs de Perapertusa au XIIe siècle. En 1118, on voit ainsi Bernard-Bérenger de Perapertusa, fils de Constantia rendre hommage à Ramon comte de Barcelone. En 1130, c'est Bérenger de Perapertusa, fils de Géralda, qui fait de même. Séparation territoriale.\r\nArrive alors l'année 1258. La fusion des familles des comtes de Barcelone, suzerain du Fenollèdes, et de celles des rois d'Aragon a imposé l'établissement d'une frontière claire entre la France et l'Aragon. On retrouve d'ailleurs une trace de  cette famille entre 1325 et 1366, où Séguier de Perapertusa est dit \"seigneur de Montalba\". Il était l'époux d'Huguette de Pontos. C'est leur fils Antoine qui héritera de cette seigneurie, entre 1366 et 1386. Bien évidemment, placé proche de la frontière, le château de Montalba fut jusqu'en 1659, (date du traité des Pyrénées), le siège de multiples accrochages entre français et catalans.  Lorigine du hameau de Montalba remonte au IXe ou Xe siècle avec la construction du « Château de Mondoni » (ou « du Mont Dony ») situé sur la Roca de Sant Salvadoret dont la présence est attestée en 1020-1021 dans le testament du comte de Bésalu.","architecture":"Le château et son enceinte ( Inscrit MH (1984)), dont une tour-donjon, construits du XIIe au XIIIe siècle et remanié aux XVIe et XVIIe siècles. Le village possède une enceinte polygonale du XIVe siècle faite en moellons de granit, elle fait 1 mètre 50 d'épaisseur. Elle est percée de deux rangs d'archères sur le pan de mur Ouest, ces dernières étant particulièrement étroites (8 à 10cm par 80cm de haut) à ébrasement étroit. L'enceinte était percée d'une porte sur arc brisée côté Est. Côté Nord, une poterne couverte d'un demi-cintre permettait le passage vers l'extérieur. Le sommet du rempart est désormais détruit. Le château, lui, a été remanié à plusieurs périodes. Il a été construit autour d'une tour de surveillance carrée. Son plan est en forme de L dont l'aile Ouest a été reconstruite au XVIe et XVIIe.  Le château possédait une citerne et une chapelle castrale qui fut reconvertie en l'église paroissiale.","habitants":"Famille de Bérenger de Perapertusa\r\n        \"","divers":"Château de Montalba le Château","gps":"","images":["../image/image_66/66_Montalba_1.jpg","../image/image_66/66_Montalba_2.jpg","../image/image_66/66_Montalba_3.jpg","../image/image_66/66_Montalba_4.jpg","../image/image_66/66_Montalba_5.jpg"]},"Consult_chateau_formulaire68c1":{"id":"Consult_chateau_formulaire68c1","dept":"66","canton":"Perpignan","commune":"Perpignan","nom":"Parc_Ducup","type":"Château","periode":"XIX","histoire":"PARC-DUCUP, château Ducup de St Paul dit du Parc-Ducup  Il est connu pour être une possession de l'Eglise, fut construit par Pierre Bardou, fils de Joseph Bardou, créateur des papiers à cigarettes JOB qui avait succédé à son père. Pierre avait trois enfants, Justin, Jeanne et Camille. Chacun eu son château. Aubiry pour Justin, Valmy pour Jeanne et Ducup de St Paul pour Camille. L'architecte était Vigo Dorph Petersen, un danois très en vogue dans le Roussillon. Camille Bardou s'est mariée avec un lieutenant-colonel d'artillerie (30 septembre 1841  - 11 septembre 1909), Mr Charles Ducup de St-Paul. C'est lui qui donna son nom au château. Il est enterré au cimetière St-Martin, le buste qui orne sa tombe est d'ailleurs classé aux Monuments Historiques,  A la mort de Camille, en 1934, le château Ducup de St-Paul fut vendu. Il est désormais une propriété de l'Eglise qui y organise diverses activités.    Hôtel, organisation de séminaires et de congrès, village et club de vacances.","architecture":"Ducup  plus palais que château construit au XIXe siècle de style d'art nouveau, grosse villa bourgeoise bavaroise doù l'origine de l'architecte Viggo-Dorph Petersen, en briques rouges flanqué de pavillons à toits impérial.","habitants":"Famille de Pierre Bardou\r\n        \"","divers":"Château de Ducup à St-Paul de Perpignan","gps":"","images":["../image/image_66/66_Parc_Ducup_1.jpg","../image/image_66/66_Parc_Ducup_2.jpg","../image/image_66/66_Parc_Ducup_3.jpg","../image/image_66/66_Parc_Ducup_4.jpg","../image/image_66/66_Parc_Ducup_5.jpg","../image/image_66/66_Parc_Ducup_6.jpg"]},"Consult_chateau_formulaire31c1-2":{"id":"Consult_chateau_formulaire31c1-2","dept":"66","canton":"Thuir","commune":"Passa-Llauro-Tordères","nom":"Passa","type":"Prieuré","periode":"XII-XVI","histoire":"PASSA,  A Llaurio le musée des vins dans une tour du château.                                                                                                                 Prieué du Monastir del Camp, lédifice primitif était une possession de Sainte-Marie del Camp en 1130, en effet Udalgar évêque dElne avait cédé léglise avec tous ses droits. Cette possession est confirmée en 1163, dans une bulle du pape Alexandre II. Dès cette époque, il semble que les prieurs de cette abbaye détiennent une partie des droits seigneuriaux. Lédifice actuel semble dater du XVIe siècle.","architecture":"Ancien prieuré des XI et XIIIe siècle, classé au titre des monuments historiques en 1862 par Prosper Mérimée. Le prieuré est composé d'un cloître gothique aux arcades trilobées,  pierres tumulaires avec épitaphes, d'une chapelle romane à nef unique, d'un portail roman en marbre blanc de Céret à l'archivolte ouvragée dont l'un des chapiteaux sculptés est attribué au Maître de Cabestany.\r\nAu Monastir del Camp vécu François Jaubert de Passa, connu hors frontières principalement pour ses études en hydrologie, correspondant de Mérimée durant 20 ans et auditeur au conseil d'état de Paris.","habitants":"François Jaubert de Passa\r\n        \"","divers":"Le prieuré de Monastir del camp le musée du Vin et manoir à Tordères","gps":"","images":["../image/image_66/66_Passa_1.jpg","../image/image_66/66_Passa_2.jpg","../image/image_66/66_Passa_3.jpg","../image/image_66/66_Passa_4.jpg","../image/image_66/66_Passa_5.jpg","../image/image_66/66_Passa_6.jpg"]},"Consult_chateau_formulaire3359":{"id":"Consult_chateau_formulaire3359","dept":"66","canton":"Perpignan","commune":"Perpignan","nom":"Perpignan_Castillet","type":"Forteresse","periode":"XIV-XV","histoire":"CASTILLET, dit le grand fut construit  par le maître d'uvre Guillaume Gatard sur ordre de l'Infant Don Joan d'Aragon, pour remplacer la porte dite du Vernet qui permettait de traverser les remparts et de faire communiquer la ville avec le faubourg. Le nouveau passage comportait un pont-levis qui nexiste plus. La construction massive du bâtiment était celle dun château fort défensif pour résister à toute offensive venant du nord.  Loccupation éphémère du Roussillon par Louis XI permit den changer la destination. La forteresse devenait inutile puisque tout conflit avec la France était terminé. Les fenêtres furent garnies de grillages en fer. Cependant, il fallait assurer une issue de la ville vers le Vernet et lon juxtaposa le Petit Castillet à la primitive bâtisse en 1478. Ce fut le Portal de Nostra Dona del Pont ou Porte de Notre-Dame du Pont. En 1542, Charles Quint fit couvrir le Castillet au nord au moyen dun bastion polygonal dont la pointe et léchauguette savançaient vers la Basse. Les ouvriers utilisèrent les matériaux provenant de la Chapelle Notre-Dame du Pont qui fut démolie  pour des raisons stratégiques. À la suite de la destruction de cette chapelle on plaça le Castillet sous la protection de Nostra Dona del Pont et la statue de la Vierge qui l'ornait prit place dans la chapelle. Par la suite, la statue fut placée sur la façade dans une simple niche pratiquée dans le mur (la niche concave, visible de nos jours, ornée d'un encadrement gothique date de 1864). Vauban fit renforcer le bastion polygonal de Charles Quint et remit le Castillet en état de défense. En 1904, on démolit lenceinte fortifiée de Perpignan mais on respecta le Castillet. Les béquilles qui le reliaient aux remparts disparurent et le bastion et son échauguette furent dynamités. Bien que classé monument historique en 1889, le Castillet sert de prison pendant encore quelques années du XVIIe et XVIIIe siècle.   Il accueille actuellement le musée
