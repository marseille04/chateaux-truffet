scalier d'honneur. Il supportait à l'origine un campanile. Conformément au modernisme du début du XVIIe siècle,  est composé d'un corps de logis, flanqué de deux ailes latérales. Une galerie pour les fêtes et les bals se trouvait au premier étage de l'aile droite. À la jointure des ailes avec le corps de logis se trouvaient, à droite les cuisines, à gauche la chapelle dont l'autel a conservé son beau retable d'origine. Au milieu des ailes s'ouvrent des passages voûtés qui conduisent à droite aux jardins, à gauche à la cour de ferme. Jusqu'alors, les châteaux étaient conçus avec des ailes de même hauteur, ou presque, que le corps principal. Leurs cours d'honneur présentaient un aspect fermé, défensif, rappelant l'antique besoin de se protéger des brigands. Clermont innove en allégeant  les ailes latérales. Profitant des observations des architectes français à Rome et en Vénétie, elles sont réduites de hauteur et italianisées. En revanche, l'usage ancestral des tourelles d'encorbellement est maintenu. Cette référence aux formes anciennes, tout comme l'introduction de mâchicoulis sur les pavillons d'angle, contribuait à asseoir la demeure dans un idéal chevaleresque et à affirmer une puissance nobiliaire. Le château comporte 30 pièces, 365 fenêtres, de nombreuses dépendances. Revendu  en 1986 à l'association pour le développement des alternatives à l'hospitalisation (ADAH),racheté, en 2005, par un entrepreneur immobilier qui transformera le château, et y fera aménager une quarantaine de logements privés.","habitants":"Famille de Louis de Funès\r\n        \"","divers":"Clermont  47° 19' 29\" Nord et 1° 19' 59,5\" Ouest","gps":"","images":["../image/image_44/44_Clermont_Cellier_1.jpg","../image/image_44/44_Clermont_Cellier_2.jpg","../image/image_44/44_Clermont_Cellier_3.jpg","../image/image_44/44_Clermont_Cellier_4.jpg","../image/image_44/44_Clermont_Cellier_5.jpg","../image/image_44/44_Clermont_Cellier_6.jpg","../image/image_44/44_Clermont_Cellier_7.jpg"]},"Consult_chateau_formulaire063f":{"id":"Consult_chateau_formulaire063f","dept":"44","canton":"Clisson","commune":"Clisson","nom":"Clisson_Fort","type":"Vestiges","periode":"XIII-XV","histoire":"A Clisson le fort, vestiges.                                                                                                                 CLISSON,  en 1217 Guillaume de Clisson entreprend la construction de la nouvelle forteresse,  considéré par les ducs de Bretagne comme une clef de la province était le siège d'une puissante châtellenie couvrant vingt-trois paroisses. Olivier III puis de son fils Olivier IV de Clisson, nommé connétable de France en succession de Du Guesclin en 1380, il était très apprécié comme résident  par le duc François II, père de la duchesse Anne de Bretagne. En 1420  Marguerite de Clisson, femme de Jean de Blois  reconnue coupable de la forfaiture  est privée de tous ses biens. La période troublée des guerres de la ligue nécessite la construction, vers 1590, de trois bastions terrassés à orillons sur le front sud. En  1720 le château échut par héritage à Charles de Soubise qui l'abandonna et le vida de l'ensemble de son mobilier de 1748 à 1793 confisqué au enfants de la princesse de Condé,  fille du prince de Soubise,  le château est incendié par les troupes de Kleber.  En 1962 acquis par le département. Trois lignes de défense échelonnées en profondeur protègent ainsi cette place de guerre.","architecture":"CLISSON, du XII-XIIIe siècle est également remarquable sur le plan des détails, on y trouve par exemple toutes sortes d'embrasures depuis les archères jusqu'aux canonnières. Edifié en grande partie au XIIIe siècle, il se présentait à cette époque sous la forme d'un polygone irrégulier flanqué de tours et isolé du plateau rocheux par un fossé peu profond. Le XIVe siècle voit l'exhaussement d'un châtelet plus ancien constitué de deux tours semi-circulaires qui s'écroulèrent au XVIIe siècle. Au XVe siècle, l'utilisation des canons nécessite la modernisation des fortifications, une deuxième enceinte rectangulaire flanquée de grosses tours d'artillerie est construite par François II, duc de Bretagne. Réutilisé au XVIIe siècle comme résidence, il fut modifié et transformé au goût de l'époque. Délaissé dès la première moitié du XVIIIe siècle, incendié pendant les guerres de Vendée, lors du passage des colonnes infernales de Kléber. Les éléments suivants des remparts, le rempart de liaison entre les bastions sud et sud-est, la tour médiévale de l'ancienne enceinte de la ville, les terrains d'assiette du système de défense entre le château médiéval et les deux bastions sud de la fin du XVIe siècle, les douves nord du château, le pont maçonné reliant la rue du château, les sols nus des fossés, inscription par arrêté du 30 août 2004.","habitants":"Clisson; Famille de Charles de Soubise  \r\n        \"","divers":"Clisson : 47° 05' 13,6\" Nord, 1° 16' 46,06\" Ouest","gps":"","images":["../image/image_44/44_Clisson_Fort_1.jpg","../image/image_44/44_Clisson_Fort_2.jpg","../image/image_44/44_Clisson_Fort_3.jpg","../image/image_44/44_Clisson_Fort_4.jpg","../image/image_44/44_Clisson_Fort_5.jpg","../image/image_44/44_Clisson_Fort_6.jpg","../image/image_44/44_Clisson_Fort_7.jpg","../image/image_44/44_Clisson_Fort_8.jpg","../image/image_44/44_Clisson_Fort_9.jpg"]},"Consult_chateau_formulaireb7e4":{"id":"Consult_chateau_formulaireb7e4","dept":"44","canton":"Clisson","commune":"Clisson","nom":"Clisson_Garenne","type":"château","periode":"XVIII","histoire":"GARENNE-LEMOT dit villa construite à partir de 1824 par l'architecte Pierre-Louis Van Cleemputte.  en 1793 les frères Cacaul décident de faire construire la villa à l'italienne, cest au XIXe siècle que le sculpteur François-Frédéric Lemot élève ici une maison de style toscan et une villa néoclassique. Au milieu de ce parc de 13ha, qui domine la Sèvre et la ville de Clisson, il crée un paysage idéalisé sinspirant des grands jardins paysagers et pittoresques du XVIIIe siècle, ponctués de fabriques ornementales (statues, grottes, tombeau et colonnes). En 1968 le conseil général du département acheta le domaine pour des visites culturelles et pédagogiques.","architecture":"GARENNE-LEMOT, de style néo-palladien,  de plan rectangulaire à deux niveaux avec cordon au premier étage, avant corps côté parc avec terrasse sur colonnes, l'édifice possède sur la façade au centre d'une tourelle carrée prolongeant en hauteur  l'avant corps d'entrée ,  deux bâtiments en retour d'équerre d'un niveau . La cour est fermée par des clôtures bétonnées.","habitants":"sculpteur François-Frédéric Lemot\r\n        \r\n        \"","divers":"Château de Garenne Lemot à Clisson   47° 05' 13,6\" Nord, 1° 16' 46,06\" Ouest","gps":"","images":["../image/image_44/44_Clisson_Garenne_1.jpg","../image/image_44/44_Clisson_Garenne_2.jpg","../image/image_44/44_Clisson_Garenne_3.jpg","../image/image_44/44_Clisson_Garenne_4.jpg","../image/image_44/44_Clisson_Garenne_5.jpg"]},"Consult_chateau_formulaire101c":{"id":"Consult_chateau_formulaire101c","dept":"44","canton":"Vertou","commune":"Saint-Fiacre sur maine","nom":"Coing","type":"Château","periode":"XVIII-XIX","histoire":"COING, la construction date du XVIIIe au XIXe siècle. Il se situe au confluent de la Sèvre et de la Maine. Ce château se caractérise par une architecture de différentes époques. Le château du Coing est une propriété viticole de 45 hectares, d'un seul tenant. Visite de cave et dégustation, des chais et un tour historique des différentes périodes d'architecture. Viticole et hôtel de la famille Gunther-Chéreau.","architecture":"COING,  château du Coing du XVIIIe - XIXe siècle situé au confluent de la Sèvre et de la Maine. Ce château se caractérise par une architecture de différentes époques, dont les communs sont de pur style italianisant de Clisson dû à l'influence de François-Frédéric Lemot et des frères Cacault. Ce château fut le témoin d'un des plus violents combats livrés dans la région entre Chouans et Républicains en 1793.\r\n C'est actuellement un site de production du muscadet, régulièrement médaillé et reconnu, entre autres pour ses millésimes d'exception.","habitants":"Famille Gunther-Chéreau\r\n        \"","divers":"Coing  : 47° 08' 39\" Nord, 1° 24' 56\" Ouest  à Saint-Fiacre sur maine","gps":"","images":["../image/image_44/44_Coing_1.jpg","../image/image_44/44_Coing_2.jpg","../image/image_44/44_Coing_3.jpg","../image/image_44/44_Coing_4.jpg","../image/image_44/44_Coing_5.jpg","../image/image_44/44_Coing_6.jpg"]},"Consult_chateau_formulaireb92d":{"id":"Consult_chateau_formulaireb92d","dept":"44","canton":"Campbon_Blain","commune":"Campbon","nom":"Coislin","type":"Château","periode":"XVI-XIX","histoire":"COISLIN.  Le château est le siège du duché-pairie de Coislin, alors tenu par la famille du Cambout ; celle-ci tient cette propriété par le mariage de René du Cambout qui a épousé Françoise Baye.  Le dernier des Coislin meurt à Paris en 1873. Sa veuve achète alors le château de Buhel où elle se retire. La propriété devient ensuite  à   la famille Le Cour Grandmaison,  dans la lignée des traditions des Folies de la Loire, le château est composé dune bâtisse principale du XIXe encadrée de tours et dépendances du XVIIe siècle, le tout entouré de douves du XIIIe siècle aujourdhui végétalisées. Un travail complet de rénovation a été achevé en 2015 qui permet un accueil dexception. Véritable voyage à travers le temps mélangeant le charme des grandes maisons dautrefois avec le moderne et le confort invitant au bien-être. Chambres d'hôtes.","architecture":"COISLIN, de 1894, ce château remplace un ancien château féodal datant du XII-XIIIe siècle et acquis en 1850 par Jean Baptiste La Cour Grandmaison. Il a des parties anciennes, constituées par des douves, des tours dangle et une antique porte dentrée. Le château actuel est édifié par son fils. Les meurtrières du château datent du XIV-XVIe siècle. En 1663, le marquisat de Coislin est érigé en duché-pairie par lettres patentes de Louis XIV en faveur dArmand du Cambout. Le four à pain date du XVIIe siècle. Les écuries et le logement des gardiens datent de 1633. Coislin est un des rares châteaux où fonctionne encore un pont-levis restauré au XIXe siècle. Dès 1681, cette maison seigneuriale se composait dune « grande cour de trois cents pieds carrés, fermée de murs, flanquée de quatre tours et cernée dun grand fossé de quarante-six pieds de largeur rempli deau vive, avec ses contrescarpes revêtues de pierres, ses demi-lunes au-devant vers  le midi et aux deux côtés vers le  soleil levant et couchant, ayant des doubles fossés de vingt-quatre pieds au-devant vers midi une avant-cour et au septentrion un jardin où est la chapelle dudit château ; le tout cerné de douves et fossés pleins deau, avec une grande avenue vers midi, plantée et pavée, de quarante pieds de largeur et de deux mille pas de longueur, laquelle allée est coupée à trois cents pas du château par une autre allée, aussi plantée et pavée, de pareille longueur allant dOrient à lOccident.","habitants":"famille du Cambout \r\n        \"","divers":"Château de Coislin à Campbon","gps":"","images":["../image/image_44/44_Coislin_1.jpg","../image/image_44/44_Coislin_2.jpg"]},"Consult_chateau_formulaired16c":{"id":"Consult_chateau_formulaired16c","dept":"44","canton":"Guémébé-Panfao","commune":"Conquereuil","nom":"Conquereuil","type":"Château","periode":"XV-XVIII-XIX","histoire":"Trois châteaux de Conquereuil, Grand-Pont-Veix, Sainte-Émilie.                                                                                           CONQUEREUIL, la première bataille de Conquereuil a lieu en 981. La deuxième bataille s'y déroule le 27 juin 992. À son issue, le duché de Nantes est définitivement rattaché au royaume de Bretagne. Le village connaît une nette expansion au XVIIIe siècle avec l'exploitation des carrières locales de schiste ardoisier.   Le château est  bâti à Conquéreuil. Sa construction date du XVe siècle. Il est inscrit aux M.H. depuis 1954. Le château de Conquéreuil est un château privé. Il existe deux autres châteaux dans le village de Conquéreuil : le château du Grand-Pont-Veix et le château Saint-Émilie                                                                      Sainte-EMILIE  vers les années 1870), situé route de Pierric,  propose des chambres d'hôtes.","architecture":"PONT-VEIX, les vieux bâtiments qui composaient la seigneurie de Pontveix, datent du temps du château de la duchesse Anne de Bretagne. En effet, celle-ci avait eu parmi ses précepteurs, maître Maximilien de La Chênaie, seigneur de Pontveix, Anguignac et Montnoël. Après son décès  le domaine revient à la famille de La Motte d'Andigné qui le conserve durant deux siècles. Une demoiselle d'Andigné épouse en 1728, Fabrony de La Préjenterie, dont la fille épousera à son tour Alexis de Martel, famille alliée aux Mirabeau, de Robien et de Freslon. En 1757, meurt au château de Pontveix, dame Françoise de Gennes, veuve de Louis-Ange de La Motte d'Andigné, seigneur de Pontveix, Montnoël, et conseiller du roi au Parlement de Bretagne. Un comte Porzon de Martel remplace le vieux manoir par un château moderne, mais conserve l'hostellerie, la chapelle, la fuie et la vieille avenue. Porzon de Martel avait été préfet de Napoléon III et fut prétendant à la main de Félicité Dosne, la belle-soeur de Thiers, ce dernier s'opposa au mariage pour des raisons politiques. Gyp, comtesse de Martel, l'arrière petite nièce de Mirabeau, a écrit : Petite Bob, Les Flanchards, Le Mariage de Chiffon, Le Bonheur de Ginette, .... Elle est décédée à 82 ans en 1932 et faisait de fréquents séjours à Pontveix. Le dernier Martel propriétaire de Pontveix est décédé en 1904. Un arrière-neveu, un Le Provost de Launay, hérita du domaine et le transmit à Georges Frèrejouan du Saint (né en 1856 et décédé à Pontveix en 1925). L'allée des chênes date du XVe siècle. Les écuries datent du XVIIe siècle. Le colombier date du XVIIe siècle ;","habitants":"famille de La Motte d'Andigné\r\n        \"","divers":"TRois château de Conquereuil grav 3-4, Grand-Pont-Veix grav 1-2, Sainte-Émilie grav 5-6. : 47° 36' 43\" Nord et 1° 43' 56\" Ouest","gps":"","images":["../image/image_44/44_Conquereuil_1.jpg","../image/image_44/44_Conquereuil_2.jpg","../image/image_44/44_Conquereuil_3.jpg","../image/image_44/44_Conquereuil_4.jpg","../image/image_44/44_Conquereuil_5.jpg","../image/image_44/44_Conquereuil_6.jpg"]},"Consult_chateau_formulairef22b":{"id":"Consult_chateau_formulairef22b","dept":"44","canton":"Nort sur Erdre","commune":"Mouzeil","nom":"Cop_Choux","type":"Château","periode":"XVIII","histoire":"COP-CHOUX, construit au XVIIIe siècle, a été l'objet de constantes améliorations. Jusqu'au siècle dernier, le château ne possédait pas ses ailes, ajoutées vers 1900. Les carrières pour les fours à chaux lui ont donné son nom \"Coupe la chaux\". Les 17 cheminées de marbre, les boiseries, les sols de marbres et parquets sont dorigine et en parfait état de conservation. Le parc arboré de 18 hectares comprend des arbres séculaires. Les étangs sont classés site historique depuis le 29 Mars 1943. Selon la légende, les fées rendaient visite aux humains pour les aider. Mais un soir, les villageois décidèrent de chasser les Maimberthes. Pour se venger, les fées lancèrent, en s'enfuyant, d'énormes rochers qui vinrent obstruer le cours du Donneau tout proche. Location chambres d'hôtes et salles de réceptions pour mariages et séminaires.","architecture":"COP-CHOUX a été construit, dans la seconde moitié du XIXe siècle, pour M. Decroix, propriétaire des fours à chaux. Il est possible qu'un bâtiment antérieur et existé sur le domaine. Bâti dans un parc de  9 ha, il se situe à l'Est de Nantes.  Le château de Cop-Choux met à votre disposition les salons Antoinette, 100 m2 en enfilade. Situé au sein du château, cet espace authentique est idéal pour les séminaires jusqu'à 30 personnes. Le complexe de réception Margaux, 485 m2 de réception, à proximité du château, comprend 2 espaces où peuvent être aménagés un espace de travail et un espace pour la restauration pouvant accueillir jusqu'à 200 personnes.","habitants":"Famille Decroix\r\n        \"","divers":"Cop -Choux à mouzeils e 47° 26' 56\" Nord, 1° 20' 49\" Ouest","gps":"","images":["../image/image_44/44_Cop_Choux_1.jpg","../image/image_44/44_Cop_Choux_2.jpg","../image/image_44/44_Cop_Choux_3.jpg"]},"Consult_chateau_formulaire0741":{"id":"Consult_chateau_formulaire0741","dept":"44","canton":"Ancenis","commune":"Saint-Sulpice des Landes","nom":"Coudray_44","type":"Château","periode":"XVI","histoire":"COUDRAY, il n'a pas été relevé de traces de peuplement du territoire de la commune avant le Moyen-Âge. Saint-Sulpice est située dans une région habitée par les Celtes puis les Gallo-romains, avant de devenir bretonne au IXe siècle. L'union à la France a lieu en 1532.\r\nLe monastère Saint-Sulpice-des-Landes aurait été fondé par Robert d'Arbrissel ou un de ses disciples. La présence des moines de Marmoutier est attestée en 1151. Ils gèrent l'église Sainte-Marie-des-Landes. Cependant les religieux quittent la région peu après. C'est sans doute au XIIIe siècle que le nom de l'église devient Saint-Sulpice-des-Landes. Le territoire est un fief de Jeanne de Pannecé en 1272, puis appartient à la famille de Rougé jusqu'en 1415. Il passe successivement entre les mains de la famille de Penhouët, puis de la famille de Rohan, puis de celle de La Rochequairie en 1637. Après avoir dépendu de la paroisse du Pin à partir de 1497, Saint-Sulpice-des-Landes devient paroisse autonome en 1768. Celle-ci sert de base à la création de la commune lors de la Révolution.","architecture":"COUDRAY, le château du Coudray est à l'origine une métairie. Un bail de 1729 le signale encore sous cette forme. La famille Legeard de la Diriays l'acquiert au XIXe siècle et la transforme au XXe siècle, faisant bâtir l'aile ouest. L'édifice se présente dès lors dans un style néo-renaissance. Le parc recèle des arbres centenaires.","habitants":"Famille de  Robert d'Arbrissel                                                                    famille Legeard de la Diriays \r\n        \"","divers":"Château de  Coudray  à Saint-Sulpice des Landes","gps":"","images":["../image/image_44/44_Coudray_44_1.jpg","../image/image_44/44_Coudray_44_2.jpg"]},"Consult_chateau_formulaire2b38":{"id":"Consult_chateau_formulaire2b38","dept":"44","canton":"Ancenis","commune":"Couffé","nom":"Couffé","type":"Château","periode":"XV-XVIII","histoire":"quatre châteaux à Couffé celui de la Roches, de Bougon de Contrie et de Villejegu.                                                                                                              ROCHES,   le château de la Roche (XV-XVIIIe siècle - 1842), situé route de Mouzeil et de Teillé. Le château actuel remplace un édifice du XVe siècle. Il s'agit de l'ancien siège de la seigneurie de La Roche. Le château est pillé durant la Révolution puis restauré à partir de 1842. L'escalier extérieur date de 1910. Propriété de la famille de La Rochemacé ; hôtel restaurant de madame  Rousseau.                                                                                                           CONTRIE, du 1624-1840. Il s'agit de la maison natale de François Athanase Charette de La Contrie, dit le \"Roi de la Vendée\" (1763-1796), général en chef de l'armée catholique et royale du Bas-Poitou dès le 9 décembre 1793. François Charette épouse le 25 mai 1790 Marie Angélique Josnet de la Doussetière. L'édifice actuel date de 1840. La ferme de la Contrie, dépendance du château, date du XIXe siècle ;\r\n VILLEJEGU, du XVII-XVIIIe siècle, encore appelé château du Pont. Ce château est reconstruit au XVIIIe siècle par Olivier Louis Busson. De l'ancien édifice, il ne subsiste que les tours d'angles et les douves ;\r\n BOUGON du XVIII-XXe siècle, situé route de Nantes. La façade nord du château est édifiée au XXe siècle par René Charette de La Contrie ;                                                                                                                              Hôtel restaurant de madame  Rousseau.","architecture":"A COUFFE  cinq kilomètres au nord Villejégu , date du XVIIe et XVIIIe siècle. Son propriétaire est la Famille Jochaud du Plessix. Le château est entouré d'un beau jardin à la Française. Le château est classé aux M.H. depuis 1984. Le château de Villéjégu est privé et fermé au Public.                                                                                   ROCHES, le château de la Roche, à Couffé, rappelle ces imposants manoirs anglais avec créneaux, tours et rangées de fenêtres. Dominant un verdoyant paysage de campagne, le château de la Roche a tous les attributs d'une demeure de Lady.","habitants":"Roche; Famille de La Rochemacé                                       Contrie, François Athanase Charette de La Contrie.                                   Villejegu;  Olivier Louis Busson                                        Bougon René Charette de La Contrie \r\n        \"","divers":"quatre châteaux à Couffé celui de la Roche grav 4-5-6-7_8, de Bougon grav-1 de Contrie grav-2-3 et de Villejegu grav-9.","gps":"","images":["../image/image_44/44_Couff%c3%a9_1.jpg","../image/image_44/44_Couff%c3%a9_2.jpg","../image/image_44/44_Couff%c3%a9_3.jpg","../image/image_44/44_Couff%c3%a9_4.jpg","../image/image_44/44_Couff%c3%a9_5.jpg","../image/image_44/44_Couff%c3%a9_6.jpg","../image/image_44/44_Couff%c3%a9_7.jpg","../image/image_44/44_Couff%c3%a9_8.jpg","../image/image_44/44_Couff%c3%a9_9.jpg"]},"Consult_chateau_formulaire537f-2":{"id":"Consult_chateau_formulaire537f-2","dept":"44","canton":"Saint-Herblain","commune":"Couëron","nom":"Couéron","type":"Château","periode":"XVII","histoire":"A COUERON, le château de Beaulieu du XIVe siècle. Il possédait jadis une fuie, une orangerie et une chapelle privée dans laquelle se déroulaient jadis de nombreuses cérémonies et mariages. Propriété de Jean de Rieux, maréchal de France sous Charles VI (en 1400), puis de Marguerite d'Orléans, mère de François II (en 1430), des familles Charette et Trévelec. En 1788 y mourut Salomon de Trévelec.  Le puits date du XIVe siècle ; le château de Bougon (début du XVIe siècle). Ce château, qui existait semble-t-il déjà en 1420, est mentionné dès 1505.  Propriété successive des familles Boux de Bougon, Binet de Jasson, Guitton de Bougon ; le château du XIXe siècle, situé quai Emile-Paraf, est édifié par les ingénieurs de la fonderie de plomb.\r\nGERBETIERE, la maison du XVIIe siècle, située à La Gerbetière. Propriété successive de Julien Mainguy   en 1643, de René de Launay  en 1665, de Jean Bourdin, procureur fiscal de la Botardière en 1690, de François Blanchard, de Jean Audubon en 1781, la famille Rivière des Héros. Jean Audubon, capitaine de navire, s'était marié richement en 1772 avec la veuve de l'armateur Ricordel, nommée Anne Moynet. Cette demeure possédait jadis une chapelle privée dédiée à Notre-Dame de Recouvrance : en 1763, le marquis Blanchard du Bois de La Musse fit placer une cloche dont la marraine fut sa fille,  est une propriété acquise, en 1781 par Jean Audubon, le père de Jean-Jacques Audubon. Elle doit sa notoriété d'avoir été la demeure de Jean-Jacques Audubon, peintre naturaliste français naturalisé américain, durant son enfance, à la fin du XVIIIe siècle.","architecture":"CARTERIE, le domaine de La Carterie (ou Carterye), citée en 1580, appartenait à Jean Viaud en 1695. Propriété jadis aussi des familles Martin, Vergne et Landais ;  manoir de plan rectangulaire à deux niveaux et petites lucarnes sur comble  assez pentu et sur la partie central lucarne avec fronton triangulaire, cet édifice est accolée de tourelles rondes sur la partie arrières toit en poivrières.                                                                                                            GERBETIERE, la maison date du XVIIe siècle. Sa façade en tuffeau, ordonnancée selon une architecture classique,  de plan rectangulaire à deux niveaux toits en croupes recouvert de tuiles date quant à elle du XVIIIe siècle. La maison a, par la suite, été modifiée au début du XXe siècle : la lucarne d'origine de la façade et les bâtiments formant une cour carrée ont été détruits. Le jardin, protégé par de hauts murs, abrite quelques espèces exotiques telles que le néflier du Japon, if, eucalyptus et de nombreuses essences locales.","habitants":"Couéron  Familles Boux de Bougon.                                             Famille Audubon\r\n        \"","divers":"Château de la Carterie grav-1 et de la  Gerbetière-grav-2-3  à Couéron  grav-4 ;   47° 12' 56\" Nord, 1° 43' 22\" Ouest","gps":"","images":["../image/image_44/44_Cou%c3%a9ron_1.jpg","../image/image_44/44_Cou%c3%a9ron_2.jpg","../image/image_44/44_Cou%c3%a9ron_3.jpg","../image/image_44/44_Cou%c3%a9ron_4.jpg","../image/image_44/44_Cou%c3%a9ron_5.jpg"]},"Consult_chateau_formulaireac41":{"id":"Consult_chateau_formulaireac41","dept":"44","canton":"La Baule-Escoublac","commune":"Croisic","nom":"Croisic","type":"Château","periode":"XV-XVII_XIX","histoire":"Plusieurs châteaux au Croisic; l'Aiguillon, Fort-L'océan, Pen-Castel,  Kervaudu et de Ker-Groaz.                                                                                                                                                                                                                AIGUILLON, est un ancien hôtel particulier, bâti dans les années 1670. Il semble avoir été occupé temporairement par Emmanuel-Armand de Vignerot du Plessis, duc dAiguillon. Une verrière de la chapelle de Pen-Bron à La Turballe, intitulé; Comment notre seigneur Jésus Christ guérit un enfant paralysé, représente lhôtel. Il a accueilli la mairie de 1908 à 2008.\r\nFORT-L-OCEAN, sur la Pointe du Croisic, un trésor de lhistoire : depuis quatre siècles, ce fort de granit rose surplombe les humeurs de l'Océan Atlantique non loin du Golf du Croisic et de la ville de Saint-Nazaire sur la côte sauvage. Remparts, douves et pont-levis de cette patiente vigie de la côte sauvage ont été conservés depuis l'époque de Vauban.  Construit pour résister aux tempêtes et aux assauts, ce monument est aujourdhui une demeure de plaisance qui, sous ses airs autoritaires, recèle les promesses de douceur d'un hôtel très particulier : boiseries en chêne et tissus imprimés, jardins de senteurs, piscine abritée. Le Fort de lOcéan vous propose des chambres confortables et raffinée dans une ambiance paisible.","architecture":"KERVAUDU, est une gentilhommière datant de la fin du XVe siècle. Ce domaine de l'homme noir (« Kervaudu ») semble avoir appartenu successivement à partir du XVIe siècle à plusieurs familles. Vendu comme bien national pendant la Révolution française avant d'être transformé en ferme au XIXe siècle, il devient la résidence de Ferdinand du Puigaudeau, peintre post-impressionniste, en 1907 jusqu'à sa mort en 1930. C'est le premier manoir breton à être classé M.H. en 1921.                                                                                                                          PEN CASTEL est l'ancien fort de la Barrière, du nom du lieu-dit en limite de territoire avec Batz-sur-Mer. Le manoir est construit en 1864, à l'emplacement dune ancienne batterie de 1747, désaffectée en 1853. Henri Becquerel y décède en 1908. Le site accueille depuis 1959 une colonie de vacances appartenant à la fédération des associations d'élèves et d'amis des écoles publiques d'Eure-et-Loir. Autre exemple dun emplacement militaire réhabilité, la vigie de la Romaine est construite sur les fondations dun ancien corps de garde construit en 1744, puis détruit en 1943 pour permettre linstallation dun radar militaire. Elle est rebâtie à partir de 1949 par André Chauvet. Lhabitation doit à sa proximité avec la pierre Longue son nom de vigie, alors que romaine résulte du breton un (« tertre ») et en (« pierre ». Le fort de la Pointe, actuel hôtel du Fort de lOcéan depuis 1997, est, quant à lui, un ancien corps de garde datant de 1861 et désarmé en 1880. À lorigine, le fort est une construction carrée, entourée de douves avec pont-levis. Il est par la suite restauré dans le style néo-gothique sous le nom de fort Hikéric.","habitants":"Kervaudu; famille de Ferdinand du Puigaudeau,                         Aiguillon; Emmanuel-Armand de Vignerot du Plessis                                     Pen castel; famille de Henri Becquerel \r\n        \r\n        \r\n        \"","divers":"Plusieurs châteaux au Croisic grav 1;    l'Aiguillon grav-2, Fort-L'océan grav 3-4,    Pen-Castel grav 5     et  Kervaudu grav_6  Ker-Groaz grav-7.    Marceau grav-8","gps":"","images":["../image/image_44/44_Croisic_1.jpg","../image/image_44/44_Croisic_2.jpg","../image/image_44/44_Croisic_3.jpg","../image/image_44/44_Croisic_4.jpg","../image/image_44/44_Croisic_5.jpg","../image/image_44/44_Croisic_6.jpg","../image/image_44/44_Croisic_7.jpg"]},"Consult_chateau_formulaire319c-2":{"id":"Consult_chateau_formulaire319c-2","dept":"44","canton":"Pontchâteau","commune":"Pontchâteau","nom":"Deffay","type":"Château","periode":"XIX","histoire":"DEFFAY,  la construction du château du Deffay date du XIXe siècle, par les ancêtres des propriétaires actuels Tanneguy et Elisabeth de Vassart. Cinq générations dhistoire familiale vous attendent. Vous découvrirez avec plaisir leur demeure, vous apprécierez le calme, le repos, la vue magnifique sur létang et sur le parc. Vous aimerez la décoration raffinée et le confort des chambres. Nous vous offrons la possibilité dun diner sur réservation, chambres d'hôtes, location de salles pour mariages ou séminaires, etc .","architecture":"DEFFAY, est un important domaine seigneurial depuis le XVe siècle, et l'actuel château néo-renaissance, habité depuis cinq générations par la famille, évoque la riche histoire des lieux, en particulier l'épopée vendéenne de la Duchesse de Berry en 1832. La belle architecture intérieure, grands salons aux meubles anciens, escalier à double volée, chambres spacieuses et confortables sont le cadre de vie du jeune couple qui y habite et donne une nouvelle vie à ces lieux où il vous accueillera en amis, de plan en T se compose  de deux niveaux sur soubassement.","habitants":"Deffay; Tanneguy et Elisabeth de Vassart\r\n        \"","divers":"Deffay  grav 1 à 4 à  Pontchâteau  grav  5-6-7   Cassograv-8                            -47°26' 22,99   Nord, 2° 09' 19,17\"\" Ouest","gps":"","images":["../image/image_44/44_Deffay_1.jpg","../image/image_44/44_Deffay_2.jpg","../image/image_44/44_Deffay_3.jpg","../image/image_44/44_Deffay_4.jpg","../image/image_44/44_Deffay_5.jpg","../image/image_44/44_Deffay_6.jpg","../image/image_44/44_Deffay_7.jpg","../image/image_44/44_Deffay_8.jpg"]},"Consult_chateau_formulairee630":{"id":"Consult_chateau_formulairee630","dept":"44","canton":"Guémené-Penfao","commune":"Derval","nom":"Derval_St_Clair","type":"Vestiges","periode":"XII-XVI","histoire":"Deux châteaux à Derval celui de Derval, de Garelaye, et de Saint-Clair,vestiges .                                                                                                             DERVAL,  en 1341, éclate la guerre pour la succession au Duché de Bretagne. Les seigneurs de Derval et de Rougé choisissent le camp de Charles de Blois contre celui de l'autre prétendant, Jean de Montfort, allié aux Anglais. En 1364, Bonabes de Derval, vaincu, le château est confisqué par le traité de Guérande. Jean de Montfort devient duc de Bretagne et fait don du château de Derval à son allié et ami, l'Anglais Robert Knolles, qui en fait une véritable forteresse.                                                                            GARELAYE  Jusqu'à la Révolution, celui-ci fût l'apanage d'une seule famille, celle des Lemaistre. Il fût le siège d'une seigneurie féodale.\r\nLes membres de cette famille de Chevalerie bretonne se mirent au service des Ducs de Bretagne. A la bataille d'Aauray, en 1364, Alain Lemaistre est dans le camp des Montfort, il commande une compagnie de lanciers. Pierre Lemaistre se rallie à Françoise de Dinan, baronne, pour la résistance à l'annexion de la Bretagne. Isaïe Lemaistre se fait tuer au service de Rois protestants contre la Ligue. Son frère Guillaume adhère aux idées de la Réforme et devient l'un des patrons de l'Eglise réformée de Sion. Grand ami du Roi Henri IV, celui-ci le choisit pour le représenter aux conférences qui se tiennent au château du Grand-Fougeray pour traiter de la paix avec Mercoeur et préparer l'Edit de Nantes. En 1926, le comte Henri Hay  de Slade hérite de la Garrelaye. En 1914, il devient officier de chasseurs à cheval, et en 1916, il passe à l'aviation de chasse.  il est fait grand officier de la Légion d'Honneur et devient maire de DervalL en 1937. Son fils Serge lui succède à la Garrelaye.","architecture":"DERVAL, dit d'un fond de bois,  ce fut une des forteresses les plus puissantes de la Haute Bretagne au XIIe siècle. Elle était flanquée de neuf tours, tant grosses que petites et entourée de fossés et d'un étang rempli d'eau courante. En 1593,  la forteresse fut de nouveau assiégée et prise pour la dernière fois par les troupes d'Henri IV, qui en fit démolir toutes les fortifications dont on ne voit plus aujourd'hui que les ruines. Sa construction date du XIVe au XVIe siècle. C'est un ancien château fort. Il est inscrit aux M.H. depuis 1925. Il ne reste que des ruines de l'ancien donjon encore debout, appelé la Tour Saint Clair. Les ruines du château de Saint-Clair sont privées, fermées au public.                                                                                                                            GARELAYE  Jusqu'à la Révolution, celui-ci fût l'apanage d'une seule famille, celle des Lemaistre. Il fût le siège d'une seigneurie féodale. Il était entouré de douves, seul un pont levis en permettait l'accès de plan d'équerre à deux niveaux série de lucarnes sur comble recouvert de tuiles, pavillons carrées sur angles.","habitants":"Derval;  Famille de Jean de Montfort                              Garelaye Comte Henri Hay  de Slade\r\n        \r\n        \"","divers":"Derval grav -1, de Garelaye grav-2   St-Clair grav-3-4.                             47° 41' 09\" Nord et 1° 39' 31\" Ouest","gps":"","images":["../image/image_44/44_Derval_St_Clair_1.jpg","../image/image_44/44_Derval_St_Clair_2.jpg","../image/image_44/44_Derval_St_Clair_3.jpg","../image/image_44/44_Derval_St_Clair_4.jpg"]},"Consult_chateau_formulaire7eb1":{"id":"Consult_chateau_formulaire7eb1","dept":"44","canton":"Carquefou","commune":"Mauves sur Loire","nom":"Droitière","type":"Château","periode":"XVIII","histoire":"DROITIERE, c'est une ancienne possession de la famille de Malestroit, seigneurs d'Oudon, au XVe siècle, elle fut acquise par Thiercelin, officier de la marine royale au XVIIIe siècle, puis par la famille de la Brosse dont l'un des membres, François, fait reconstruire le château. L'écrivain Jules Verne séjournait régulièrement chez l'une de ses 3 surs, Mathilde, épouse de Victor Fleury, qui fut maire de Mauves de 1870 à 1874 et de 1876 à 1884, lesquels demeuraient au château. La Droitière entra dans le domaine hospitalier en 1932 En tant que maison de convalescence privée, puis, fut transformé en sanatorium, avec l'aménagement d'une galerie de cure.","architecture":"DROITIERE,  fut reconstruit dans un style Louis XVI (le corps de bâtiment central date de 1788).  Le C.H.U. de Nantes acquiert le domaine en 1963 pour y installer un service de convalescents de 124 lits, puis un service de long-séjour de 150 lits, pour personnes âgées dépendantes. L'ensemble des bâtiments a été fermé, en 1990, après le départ des derniers patients pour l'hôpital Saint-Jacques, avant d'être revendu en 2000 à un groupe hôtelier qui souhaitait y ouvrir un hôtel de luxe, mais le projet fut abandonné. L'association qui a repris a pour but la restauration, la rénovation et la réhabilitation du château et du parc de La Droitière. Association ou organisation d'évènement.","habitants":"Famille de Malestroit\r\n        \"","divers":"Droitière  : 47° 17' 49\" Nord 1° 23' 32\" Ouest","gps":"","images":["../image/image_44/44_Droiti%c3%a8re_1.jpg","../image/image_44/44_Droiti%c3%a8re_2.jpg"]},"Consult_chateau_formulaire2d0f":{"id":"Consult_chateau_formulaire2d0f","dept":"44","canton":"Blain","commune":"Prinquiau","nom":"Escuray","type":"Château","periode":"XVI","histoire":"ESCURAY, c'était probablement une motte féodale dans le haut Moyen-Age. En 1443, Jean du Cellier, sénéchal, président de la chambre des comptes de Bretagne, est le premier propriétaire connu de l'Escuray. A la fin du XVIe siècle, René de la Lande et Françoise de Mareil transforme le manoir breton en un château de la Renaissance bretonne. La famille La Bourdennaye, puis les Danguy de Vue et en 1668 les Espivent, riches négociants nantais, aménagent tour à tour le château. Pendant la bataille de Savenay, la marquise de la Rochejaquelein est à l'Escurays, suite au décès du dernier héritier du château en 1993, la commune de Prinquiau rachète la propriété le 15 juin 1994.","architecture":"ESCURAY, le manoir breton en un château de la Renaissance bretonne, la façade est refaite vers 1610, on y ajoute quatre lucarnes de tuffeau.   le château est abimé par les républicains. Vers 1911, il subit des transformations tout en laissant à la vieille demeure son style ; logis à ailes en retour articulée autour d'une tour d'escalier hexagonale en vis; lucarnes à décors sculptés.","habitants":"Famille La Bourdennaye\r\n        \"","divers":"A Prinquiau le château de l'Escuray","gps":"","images":["../image/image_44/44_Escuray_1.jpg","../image/image_44/44_Escuray_2.jpg","../image/image_44/44_Escuray_3.jpg","../image/image_44/44_Escuray_4.jpg","../image/image_44/44_Escuray_5.jpg"]},"Consult_chateau_formulaire97ed":{"id":"Consult_chateau_formulaire97ed","dept":"44","canton":"Guémené-Penfao","commune":"Abbaretz","nom":"Forges_Jahotière","type":"Manoir","periode":"XVII","histoire":"LE MANOIR DES FORGES DE LA JAHOTIERE, en 1824 Achille de Jouffroy d'Abbens fils de l'inventeur du bateau à vapeur, décide de créer, à la Jahotière, une forge à l'anglaise  extrêmement moderne. Mais en 1827  l'établissement fait faillite, à 150 mètres un édifice d'architecture remarquable qui forment les dépendances  de la maison de maître de 1845.","architecture":"LE MANOIR DES FORGES DE LA JAHOTIERE, les bâtiments des anciennes forges de la Jahotière abritent désormais un manoir entièrement rénové, en salles de réception et en hébergement.                                           ancienne forge du XIXe siècle, le manoir de La Jahotière se révèle naturellement comme un lieu exceptionnel pour l animation des séminaires teambuilding ou incentive, séminaires au vert ou journées détude pour des comités de direction.   De plan rectangulaire se compose de deux niveaux avec lucarnes sur combles, pavillons saillants sur flancs droits intercalés d'une tour ronde mis hord-oeuvre toit en poivrières.","habitants":"Famille d'Achille de Jouffroy d'Abbens\r\n        \"","divers":"Manoir des Forges de la Jahotière 47° 33' 29\" Nord et 1° 26' 42\" Ouest","gps":"","images":["../image/image_44/44_Forges_Jahoti%c3%a8re_1.jpg","../image/image_44/44_Forges_Jahoti%c3%a8re_2.jpg","../image/image_44/44_Forges_Jahoti%c3%a8re_3.jpg","../image/image_44/44_Forges_Jahoti%c3%a8re_4.jpg"]},"Consult_chateau_formulaireb0ca":{"id":"Consult_chateau_formulaireb0ca","dept":"44","canton":"Saint-Philbert-de-Grand-Lieu","commune":"Chevrolière","nom":"Freudière","type":"Château","periode":"XVIII","histoire":"deux châteaux à Chevrolière  celui de Freudière, d'Huguetières, et des manoirs  du Mortier  de Trejet  et d'Arsangle.                                                           FREUDIERE, Julien Pépin de Belle-Isle, hef d'escadre des armées navales et chevalier de l'ordre royal et militaire de Saint-Louis, rachètera, en 1751, le domaine de La Freudière à Renée de la Grue, veuve du baron René de Kermoisan de Trésiguidy. C'est au début du XIXe siècle que Jean-Baptiste Pépin de Belle-Isle, fils du précédent, fait entreprendre sa reconstruction,. Le château de la Freudière est inscrit au titre des M.H. en 1990.                                                                       HUGUETIERES,  du XIXe siècle et chapelle Notre Dame des Ombres.\r\nLe fief des Huguetières passa sous l'autorité de la famille de Machecoul, puis de celle de Châteaubriant, avant de relever de la baronnie de Retz. Au XVe siècle, le château des Huguetières était le siège d'une importante seigneurie qui rayonnait sur 17 paroisses du pays de Grand Lieu. C'est sur la commune de La Chevrolière que se trouve d'ailleurs le principal accès au lac de Grand Lieu : le village de Passay, ancien chef-lieu paroissial.                                                \r\nMORTIER manoir. Propriété de la famille Juchault, puis du capitaine du Port de Nantes, Jacques François, en 1793 et du docteur Deausse. \r\n TREJET manoir, situé près de l'embouchure de l'Ognon, avec le \"Port des Roches\" fut successivement le domaine des Brasdane, des Daniel de Trejet, des Vassal (parents des Gruel et de l'évêque Minée), des Lanjuinais, des Toupier, des Bruxon et des Grosse. Un nouveau logis daté de 1890 a remplacé l'ancien.\r\n ARSANGLE manoir. Propriété des familles Charette, Arnous, Couprie et Grignon-Dumoulin.","architecture":"FREUDIERE est un château bâti à La Chevrolière. C'est un ancien château fort, construit en 1765. Construction d'une maison de campagne à l'emplacement de l'ancien manoir. Les plans sont alors établis par l'architecte parisien Pierre Contant d'Ivry. Le château de la Freudière sera totalement incendié en 1794, au cours des guerres de Vendée, sa reconstruction, dont il confie la direction à l'architecte nantais Chagneau. L'édifice sera à nouveau restauré, mais de façon mineure, en 1872-1874 par l'architecte Lenoir.                                               \r\nHUGUETIERES  de 1875-1890. Il remplace un ancien château féodal ruiné dès le XVe siècle. La seigneurie des Huguetières est un démembrement de la seigneurie de Rays. La châtellenie des Huguetières fait partie dès le XVIe siècle du duché de Retz qui dépend du duché de Bretagne. Sa juridiction s'étendait sur Pont-Saint-Martin, Saint-Philbert, Saint-Colombin et Saint-Lumine-de-Coutais. Les Bric-Serrant vendirent aux Pépin de Bellisle,   riche famille d'armateurs et d'officiers de marine venue de Saint-Malo qui occupèrent le château de la Frudière, puis érigèrent dans le sous-bois de la Huguetière près de la Chapelle des Ombres, une autre demeure. Les Pépin de Bellisle étaient alliés aux Perrée de La Villestreux, aux d'Aux de La Montagne, aux Lieutaud de Troisvilles, de Boissy, d'Escoubleau, Fortin qui figuraient parmi les plus riches armateurs de l'Ile Feydeau. La famille Fortin était parent des Toscher de La Pagerie. Le château tombe entre les mains de Joseph de Charrette à la veille de la Révolution Française. La chapelle de l'ancien prieuré renferme une madone sans doute du XVe siècle.","habitants":"Feudrière; Famille de  Julien Pépin de Belle-Isle.                                                    Huguetières; famille de Machecoul.                                            Mortier; famille Juchault.                                                       Trejet,famille de trejet\r\n        \"","divers":"deux châteaux à Chevrolière  grav -1   47° 05' 30\" nord, 1° 36' 37\" ouest  d'Huguetière-grav-2,                                                   Freudière  47° 05' 05\" Nord et 1° 34' 21\" Ouest","gps":"","images":["../image/image_44/44_Freudi%c3%a8re_1.jpg","../image/image_44/44_Freudi%c3%a8re_2.jpg"]},"Consult_chateau_formulairefabe-2":{"id":"Consult_chateau_formulairefabe-2","dept":"44","canton":"St-Brevin-les-Pins","commune":"Frossay_Vue_Rouan","nom":"Frossay_Rouans","type":"Manoir-Château","periode":"XVI-XVII","histoire":"Plusieurs châteaux à Frossay, la Rousselière, Blanchardais à Vue, la Voirie et le Jarrie.                                                                                                ROUSSELIERE,  il s'agit de l'ancien siège de la châtellenie de Frossay. En 1679, Regnault d'Espinoze, seigneur des Renaudières, époux de Michelle Bureau de la Forestrie, devient propriétaire de la châtellenie de Frossay. Le domaine passe à Jean Priou en 1766, puis à Jean-Joseph Geslin, sieur de Châteaumur en 1780. Jean Baptiste Bertrant, compagnon de Napoléon Bonaparte, maire de Nantes, devient propriétaire du domaine par son mariage avec Adelaïde Geslin.  Ensuite La Rousselière appartient à la famille Nouvellon, puis passe par mariage dans la famille Cornulier de Lucinière, chambres d'hôtes.                                                                                        BLANCHARDAIS, à cinq kilomètres au sud -Est à  VUE,  le manoir a été construit au XVIe siècle et remanié au XVIIIe siècle. Propriété ou vécurent des grands noms de l'histoire, tel Jean II, duc de Bretagne, et ensuite les comtes et ducs de Retz. La demeure est transformée en 1530 et laisse la place au XVIIIe siècle à un château comportant deux tours.                                                                                                                                               VOIRIE, est un petit manoir reconstruit au XVIIIe siècle puis rénové entièrement en 2019. Il est l'un des plus anciens domaines seigneuriaux de Frossay. En 1657 le 3 avril, Messire Charles Hubert et Elisabeth du Plessis sa compagne, seigneur et dame de la Veiquerie et de la Voirie, y demeurant paroisse de Frossay, fondent une chapellerie, d'une messe à voix basse chaque dimanche. Chambres d'hôtes                                                                                                                                                                                                                                              VINAUDIERES, le château a été reconstruit sur un ancien lieu dune chatellenie dès 1628, puis siège dune chapellenie du Sieur Cazal, le château actuel est plus récent.                                                                                       PAS à VUE Le château du Pas.","architecture":"La maison de la Cour du Pain (1378-1604), située rue de la Poste. La Cour du Pain appartenait jadis au seigneur de la Ville-Bessac. Propriété de la famille Berthelot de La Glétais.\r\nLe Bois-Péan du XVI siècle, remanié au XIXe. C'est un grand bâtiment d'angle avec chapelle, dont la porte est ornée d'un fronton avec écusson armorié. Des prêtres réfractaires s'y sont réfugiés pendant la Révolution. La chapelle de Bois-Péan date du XVIIe siècle. ROUSSELIERE, le château de la Rousselière, situé route de Nantes, a été bâti aux XVIIe et XVIIIe siècles.  Pendant la Révolution, c'est dans cette demeure que séjourne la compagnie du bonnet rouge de l'armée de Mayence. La propriété possède à cette époque une petite chapelle privée, un pavillon de garde bâti à la fin du XVIe siècle et un parc dessiné par l'architecte Caillé en 1880   de plan d'équerre, le corps de logis central  de trois travées  et fronton triangulaire sur partie central, entre deux gros pavillons saillants à trois niveaux   retour d'équerre d'un bâtiment à deux niveaux à cinq travées et lucarnes sur combles, l'ensemble  de même niveau recouvert d'ardoises.                                                                              VOIRIE, de plan classique  rectangulaire à deux niveaux toit en croupe recouvert de tuiles flanqué en retour d'équerre de dépendances formant la cour.                                                                                                            ROUANS-VUE, dès 1135, Bernard de Clairvaux et Ermengarde, mère du duc de Bretagne, fondent labbaye cistercienne de Buzay. Reconstruite en 1755, elle fut brûlée à la Révolution. Il nen reste aujourdhui que la tour. A la fin du XVIIe, labbé commendataire Caumartin, organise le dessèchement des marais par un système de polders avec 41 km de douves et de tenues.","habitants":"Rousselière; Famille Nouvellon                              Blanchardais; Jean II, duc de Bretagne                                                  Voirie; Messire Charles Hubert \r\n        \"","divers":"Plusieurs châteaux à Frossay grav-1-2, la Rousselière grav 3 -4, Blanchardais grav 5-6 à Vue, la Voirie  grav-8 et le Jarrie grav-7.     Rousselière grav : 47° 14' 42\" Nord, 1° 55' 59\" Ouest","gps":"","images":["../image/image_44/44_Frossay_Rouans_1.jpg","../image/image_44/44_Frossay_Rouans_2.jpg","../image/image_44/44_Frossay_Rouans_3.jpg","../image/image_44/44_Frossay_Rouans_4.jpg","../image/image_44/44_Frossay_Rouans_5.jpg","../image/image_44/44_Frossay_Rouans_6.jpg","../image/image_44/44_Frossay_Rouans_7.jpg","../image/image_44/44_Frossay_Rouans_8.jpg"]},"Consult_chateau_formulaire2b98":{"id":"Consult_chateau_formulaire2b98","dept":"44","canton":"Vallet","commune":"le Pallet","nom":"Galissonnière","type":"Vestiges","periode":"XIII","histoire":"GALISSONNIERE, manoir à le Pallet, maison seigneuriale, appartenait, en 1415, à Pierre Barrin ; son petit-fils fut archer de la garde du roi, et Toussaint Barrin, son frère, officier dans la compagnie du connétable de Montmorency, reçut une blessure à la bataille de Saint-Quentin ; puis se fit prêtre, devint abbé de Saint-Maurice et fut enterré dans la Sainte-Chapelle, à Paris, en janvier 1577.  Sa soeur épousa Gilles Huchet de la Bédoyère, procureur général au Parlement. En 1619, Jacques Barrin de la Galissonnière fut nommé premier président à la chambre des comptes de Bretagne.  En 1660, Henri Barrin, conseiller au Parlement de Rennes, était premier maître d'hôtel du duc d'Orléans. Les château, terre et seigneurie de la Galissonnière furent érigés en marquisat en 1658, en faveur de Jean Barrin, intendant de la généralité de Rouen. Jacques Barrin, d'autre part, avait acquis du marquis de Goulaine la terre de la Grande-Guerche, sise en Saint-Aubin-de-Luigné. Rolland Barrin, marquis de la Galissonnière, né en juin 1643, fut d'abord chevalier de Malte. Il entra ensuite dans la marine et prit part aux expéditions organisées pour secourir Candie. capitaine des vaisseaux du roi en 1677,   Il avait épousé, en premières noces (1690), Catherine Bégon, fille de l'Intendant de La Rochelle et de l'Aunis, Michel Bégon, et de Marie Druillon. Il épousa en deuxièmes noces en 1713, Marie Guiraud. Retiré à Poitiers, il mourut, le 9 mars 1736.  Il laissait trois enfants, Rolland-Michel, Catherine, religieuse à Saintes, enfin Marie-Madeleine. C'est avec grand plaisir que la famille Lusseaud vous accueille  dans leurs chambres d'hotes contemporaines au château de la Galissonniere,dans un cadre viticole et historique.","architecture":"Edifice à le PALLET outre la Galissonnière, le  château de la Mercredière du XIVeXIXe siècles, propriété viticole.\r\n De la Sébinière du XVIIIe??XIXe siècles, propriété viticole ;\r\nDu Plessis-Guéry reconstruit au XIXe siècle, propriété privée, pas d'information ni gravure pour ces châteaux.                                                     GALISSONNIERE manoir à le Pallet , l'édifice primitif était composé d'un logis et d'une étable grange, le logis qui comportait à l'origine un étage carré ou un étage de comble, supprimé au moins depuis la fin du XVIIIe siècle, fut remanié à la fin du XVIe ou au début du XVIIe siècle,  au XIXe siècle une remise élevée dans son prolongement à l'ouest, et au XXe siècle, baies de la face principale; en 1854, fut construit à 250 mètres au sud un nouveau logis accompagné d'un logement de gardien comportant un fournil, remise, écurie et puits, un autre logement fut élevé à proximité de l'ancien logis vers la fin du XIXe siècle. Le nouveau logis possède un rez-de-chaussée surélevé, un étage carré et un étage de comble; ses faces ordonnancées sont enduites; il est couvert de toits à pignons, il est distribué par deux escaliers droits hors-oeuvre et un escalier dans  oeuvre; les baies du logement de gardien et du logement neuf sont aussi en brique.","habitants":"Famille de Barrin\r\n        \"","divers":"A le Pallet,   la Galissonnière,la Mercredière, la Sébinière et de  Plessis-Guéry","gps":"","images":["../image/image_44/44_Galissonni%c3%a8re_1.jpg","../image/image_44/44_Galissonni%c3%a8re_2.jpg","../image/image_44/44_Galissonni%c3%a8re_3.jpg","../image/image_44/44_Galissonni%c3%a8re_4.jpg"]},"Consult_chateau_formulaire9e04":{"id":"Consult_chateau_formulaire9e04","dept":"44","canton":"La Chapelle sur Erdre","commune":"La Chapelle sur Erdre","nom":"Gascherie","type":"Palais","periode":"XV-XIX","histoire":"Deux châteaux à la Chapelle sur Erdre ; la Gascherie et la Couronnerie.                                                                              GASCHERIE, son premier propriétaire fut Arthur L'Epervier, grand veneur de Bretagne.  En 1437, la reine de Navarre s'y rendit.Le château est reconstruit au XVe siècle par Pierre Landais.  La construction a été entreprise à la fin du XVe siècle par Jean de L'Epervier.  François de La Noue, père du célèbre Noue bras de fer , ardent huguenot, compagnon d'Henri IV et vaillant capitaine qui donna asile à la Gascherie, dont il avait hérité, aux protestants chassés de Nantes en 1563.  Louis François de Charette de la colinière, qui en hérita alors, était président du parlement  Louis Charette de la Colinière l'acquiert au début du XVIIe siècle. Il appartient par la suite à son petit-fils, Louis Charette, également maire de Nantes. Son petit-fils obtient l'érection de La Gascherie en marquisat en 1775. Il est vendu comme bien national en 1796.  En 1824, il est acheté par Julien Poydras de Lalande, dont la famille le conserve jusqu'en 1935.  Vers 1840, la Gascherie fut vendue  aux Poydras de La Lande, famille dont l'un des membres s'était illustré pendant la guerre d'indépendance américaine et avait fait fortune en Louisiane. Il légua la moitié de sa fortune aux uvres et lautre moitié à sa famille.   La Gascherie passa ensuite par héritage au  propriétaire actuel, le comte Horace Savelli.                                               COURONNERIE, Foulon. L'un des héritiers fait ériger le somptueux château de La Couronnerie en 1850, qui est aujourd'hui, la propriété de la famille Jamouillé .","architecture":"GASCHERIE,  ce fut le fils de l'acquéreur qui fit restaurer le château dans son style originel vers 1890. De l'ancien manoir le nouveau bâtiment ne conservera que la salle de garde, de plan en équerre  se compose de deux grands bâtiments  à deux étages à six travées chacun et lucarnes à pinacles galbés sur combles aux angles centraux extérieurs et intérieur tours hexagonales à quatre niveaux, et deux chapelles sur les pignons des bâtiments supportées par des colonnes doriques  et arcades.","habitants":"Famille de  Louis Charette de la Colinière\r\n        \"","divers":"à la Chapelle sur Erdre ; la Gascherie et la Couronnerie.","gps":"","images":["../image/image_44/44_Gascherie_1.jpg","../image/image_44/44_Gascherie_2.jpg","../image/image_44/44_Gascherie_3.jpg","../image/image_44/44_Gascherie_4.jpg","../image/image_44/44_Gascherie_5.jpg","../image/image_44/44_Gascherie_6.jpg","../image/image_44/44_Gascherie_7.jpg"]},"Consult_chateau_formulairec64d":{"id":"Consult_chateau_formulairec64d","dept":"44","canton":"Saint-Sébastien-sur-Loire","commune":"Saint-Sébastien-sur-Loire","nom":"Gibraye","type":"Château","periode":"XV","histoire":"GIBRAYE, le domaine de la Gibraye est propriété d'André de La Tullaye en 1588, puis de Jean Imbert en 1688. Le domaine est acquis en 1738 par une famille de tanneurs, les Mérot. Bordé par la Loire, il s'étend alors sur 24 hectares. La demeure, dont les plans sont attribués à Jean-Baptiste Ceineray, est bâtie en 1763 pour Jean-Baptise Mérot, conseiller au parlement de Bretagne. La famille ayant choisi d'émigrer lors de la Révolution, la propriété est confisquée par l'administration du département. Le bâtiment subit des dégradations dans cette période, le domaine est par la suite rendu aux Mérot, dont les descendants restent propriétaire de la Gibraye jusqu'en 1945. La famille de Lyrot notamment y réside. Lors de la guerre de 1914-1918, il a servi d'hébergement pour des soldats américains. Lors du second conflit mondial, il a été réquisitionné par l'armée allemande, qui a notamment stocké poudre et munition dans la chapelle, qui a alors également servi de stand de tir. Propriétaire du domaine monsieur  Bernard Dugast .","architecture":"GIBRAYE, le monument est classé et inscrit au titre des M.H. en 1983. Le manoir a été endommagé et restauré plusieurs fois. La dernière réhabilitation a eu lieu en 1992. Bien que privé, le site est accessible lors des Journées du patrimoine. Car la Gibraye réclame de l'attention et des soins. D'une longueur de 44 mètres sur 8 mètres de large, la vieille dame a été bâtie en 1763 par Jean-Baptise Mérot, héritier d'une famille de tanneur. Le domaine s'étendait alors sur 24 hectares, jusqu'à la Loire.","habitants":"Famille d'André de La Tullaye\r\n        \"","divers":"Saint-Sébastien-sur-Loire le château de Gibraye","gps":"","images":["../image/image_44/44_Gibraye_1.jpg","../image/image_44/44_Gibraye_2.jpg"]},"Consult_chateau_formulairec1f4":{"id":"Consult_chateau_formulairec1f4","dept":"44","canton":"Marchecoul","commune":"Marchecoul","nom":"Gilles_de_Retz","type":"Vestiges","periode":"XIII","histoire":"GILLES de RETZ ou RAIS, ancien château féodal bâti à la fin du XIIIe siècle, comptant trois campagnes de construction. En élévation une tour circulaire du début du XIIIe siècle, un châtelet du XVe siècle, un soubassement de logis du XVIe siècle avec embrasures à la Française. De nouvelles fortifications sont réalisées vers 1580. Pierre de Dreux, duc de Bretagne et seigneur de Machecoul en 1235, élève le château afin de protéger sa terre. Au XVe siècle, Guy de Laval  hérite du domaine a son  décès, en 1415, sa propriété passe à son fils, Gilles de Rais, maréchal de France à 25 ans, il est ruiné par l'armée qu'il entretient au service de Jeanne d'Arc. Pour refaire sa fortune, il se livre à la sorcellerie, mais il est arrêté au château de Machecoul et pendu à Nantes en 1440. Louis XI, en lutte contre la Bretagne détruit le château en 1473, mais reconstruit peu après par la famille Chauvigny. A la fin du XVIe siècle, pendant les guerres de religions, Albert de Gondi, grand chambellan de Catherine de Médicis, maréchal de France et duc de Retz, construira à Machecoul sept hectares de forteresse bastionnée. Henri de Navarre, futur Henri IV en fera le siège, mais sans succès. Le château est démantelé par Louis XIV à la fin du XVIIe siècle. Durant les guerres de Vendée en 1793, il fut occupé par Charrette, puis par les Républicains, le château sera incendié.  \r\nÉléments protégés MH : les éléments bâtis fortifiés subsistants des anciens château et place-forte : inscription par arrêté du 17 mars 2004.","architecture":"MARCHECOUL est composé d'une enceinte quadrangulaire, se rapprochant d'un carré, et flanqué de tours, dont cinq sont circulaires et datant d'à peu près la seconde moitié du XIIIe siècle, soit une fourchette comprise entre 1250 et 1300. Il y a également des fondations de trois grosses contre-tours à plate forme, un donjon, une herse et pont-levis faisaient un, ce devait être un donjon-porche qui était une tour quadrangulaire faisant châtelet d'entrée et les étages supérieurs avaient le rôle de donjon était encadré de deux tours rondes. D'ailleurs, un des vestiges les mieux conservés est ce bloc de ruines comprenant le donjon-porche encadré de ses deux tours. Ce château est de style ogival, c'est-à-dire que les ouvertures et les séparations de niveaux étaient construit sur la base d'arc en ogive, au XVe siècle, sévit le plus grand tueur en série d'enfants de l'histoire de France dont le château fut appelé le château de Barbe Bleue. Gilles de Rais fut maréchal de France, et le compagnon de Jeanne d'Arc, qui fut un personnage immense de l'histoire de France. Mais il dévia complètement dans des recherches sur l'alchimie qui le conduisit aux pires crimes : des meurtres d'enfants à grande échelle puisque 200 enfants disparurent. Ces crimes inspirèrent Charles Perrault pour son célèbre conte de Barbe-Bleue. Ce château a remplacé l'édifice primitif érigé à la fin du XIe siècle, au bord de la rivière Le Falleron, par les seigneurs de Retz de la famille Chabot.","habitants":"Famille de Laval \r\n        \"","divers":"Vestiges à Marchecoul 46° 59' 29\" Nord, 1° 48' 51\" Ouest","gps":"","images":["../image/image_44/44_Gilles_de_Retz_1.jpg","../image/image_44/44_Gilles_de_Retz_2.jpg","../image/image_44/44_Gilles_de_Retz_3.jpg","../image/image_44/44_Gilles_de_Retz_4.jpg"]},"Consult_chateau_formulaire1d86":{"id":"Consult_chateau_formulaire1d86","dept":"44","canton":"Saint-Sébastien-sur-Loire","commune":"Haute-Goulaine","nom":"Goulaine","type":"Forteresse","periode":"XV","histoire":"GOULAINE  depuis le Moyen-Age,ce château est resté  dans la même famille. Les rois Henri IV et Louis  XIV y séjournèrent. Éléments protégés MH : les tours et les vestiges des courtines : inscription par arrêté du 9 juin 1986.","architecture":"GOULAINE, au XVIe siècle, le château comprenait un grand corps de logis flanqué de deux pavillons où se trouvaient les escaliers. La surface a été presque doublée par les adjonctions du XVIIe siècle. Le château de Goulaine est précédé d'une grande cour fermée par une enceinte avec porte charretière et porte bâtarde contigües à un ancien donjon. Forteresse du haut Moyen âge, Goulaine, après le rattachement de la Bretagne à la France, a été reconstruit en pierre de Tuffeau, dans l'esprit Renaissance des grandes demeures du Val de Loire. Une vaste ceinture de marais, site protégé remarquable par sa faune et sa flore, entoure les terres du château et contribue à la beauté de son environnement. Aux portes de Nantes et de locéan, Goulaine est le premier château de la Loire.                                                                                                                   Manoir de la BOULAIE   est un manoir bâti à la Haute-Goulaine, . C'est devenu un restaurant 2 étoiles Michelin et 4 toques Gault et Millau.  Barbara et Laurent Saudeau sont les heureux propriétaires.","habitants":"Seigneurs locaux\r\n        \"","divers":"A Haute-Goulaine le château de Goulaine et de  Boulaie  : 47° 11' 59\" Nord, 1° 25' 39\" Ouest","gps":"","images":["../image/image_44/44_Goulaine_1.jpg","../image/image_44/44_Goulaine_2.jpg","../image/image_44/44_Goulaine_3.jpg","../image/image_44/44_Goulaine_4.jpg","../image/image_44/44_Goulaine_5.jpg","../image/image_44/44_Goulaine_6.jpg","../image/image_44/44_Goulaine_7.jpg","../image/image_44/44_Goulaine_8.jpg"]},"Consult_chateau_formulairef8ee":{"id":"Consult_chateau_formulairef8ee","dept":"44","canton":"Châteaubriand","commune":"Grand-Auverné","nom":"Grand_Auverné","type":"Château","periode":"XV-XVII-XIX","histoire":"Tois châteaux à Grand-Auverné; le Launay, la Petite Haie et le Val et au sud à Voireau le château de la Mailleraie\r\nLAUNAY du XIXe siècle.  Cet édifice dépendait jadis de la seigneurie de Maupiron qui sétendait sur Auverné et Moisdon-la-Rivière. Le château est construit au XVIe siècle par la famille Simon et agrandi au XIXe siècle par Jules de La Pilorgerie. Les familles des anciens propriétaires se déclinent à partir de 1380 en Hazard, Rouxel, Trotereau du Palierne, Simon de Beauvais, de Coussy, Simon, Le Gall, Simon de Launay, Macé de Vaudoré, puis (peut-être) Landays du Pé, de Mailly, Bigot (avec sécurité),et  Luette de la Pilorgerie, Huau de St-Amant et enfin de St Georges jusque vers 1970. Depuis 1975, plusieurs familles sy sont succédées.\r\nPETITE-HAIE, la seigneurie de La Haye était alliée à la famille de Rougé par le mariage de Guillaume de Rougé, seigneur de Rougé et de Derval, avec Macé de la Haye. On voit aussi un four à pain, un pigeonnier et une petite maison, des communs et une chapelle privée.                                                                                                                                       VAL, le manoir, magnifiquement construit au XVIIe siècle en pierres de schiste, fut notamment la propriété de la famille Hamel, appelée ensuite Duhamel de La Bothelière qui demeura dans ces lieux jusquau XXe siècle. Les Duhamel de la Bothelière avaient une demeure dans le quartier bourgeois de la Rue du Pélican à Châteaubriant. Une demoiselle Duhamel de La Bothelière épousa Picot de Plédran, conseiller général et adjoint au maire de Châteaubriant.                                                                                                          D'autres manoirs parsèment la commune : le château-Gaillard à la Nantais date du XVIIe siècle.","architecture":"LAUNAY,  le château de Launay a été bâti au XIXe siècle. Ce dernier contient une cheminée monumentale remarquable.  \r\nVAL, le manoir du Val, situé dans la vallée du Petit Don, était protégé par un vaste fossé toujours rempli deau, et par un amoncellement impressionnant de rochers. (sur la route du Grand Auverné à La Meilleraye). Dans le creux du roc, une statue de Notre Dame de Lourdes. A proximité : les restes de lancien Moulin du Val moulin à vent à cinq vergues.                                                                                                     PETITE HAIE, datant des XVe et XVIe siècles succède au château seigneurial de la Grande-Haie,  Le manoir entouré de hauts murs, manifeste la puissance de ceux qui lhabitaient par la présence dun imposant châtelet dentrée constitué de deux hautes tours, percées de meurtrières et reliées par une vaste voûte. Le châtelet est fermé dun fort portail à deux battants. La voûte est surmontée dune jolie toiture abattue en doucines (moulure composée dont le profil dessine un S) comme en portent beaucoup de pavillons du XVIe siècle. Lentrée franchie, on se trouve dans une large cour. Un escalier extérieur, couvert dun toit supporté par une colonne, donne accès aux chambres seigneuriales.\r\nChâteaux de la Meilleraie, de la Provostière, du Haut-Rocher et maison Noble de la Cour du Bois pas d'information pour ces derniers.","habitants":"Launay seigneurie de Maupiron                                               Petite Haie;  famille de Rougé                                                     Val;   Famille Hamel\r\n        \"","divers":"Tois châteaux à Grand-Auverné; le Launay grav 1-2, la Petite Haie grav 3-4-5-6 et le Val grav et au sud à Voireau le château de la Mailleraie grav-7,  petite haie 47° 35' 32\" nord, 1° 19' 44\" ouest","gps":"","images":["../image/image_44/44_Grand_Auvern%c3%a9_1.jpg","../image/image_44/44_Grand_Auvern%c3%a9_2.jpg","../image/image_44/44_Grand_Auvern%c3%a9_3.jpg","../image/image_44/44_Grand_Auvern%c3%a9_4.jpg","../image/image_44/44_Grand_Auvern%c3%a9_5.jpg","../image/image_44/44_Grand_Auvern%c3%a9_6.jpg","../image/image_44/44_Grand_Auvern%c3%a9_7.jpg"]},"Consult_chateau_formulaire33f3":{"id":"Consult_chateau_formulaire33f3","dept":"44","canton":"Saint-Philbert-de-Grand-Lieu","commune":"St-Aignan-Grandlieu","nom":"Grandlieu","type":"Château","periode":"XVIII-XIX","histoire":"Quatre châteaux à St-Aignan Grandlieu celui de la Plingueterie de Souche, et de St-Aignan.                                                                                      PLINGUETIERE, ce château en brique du XIXe siècle est aujourd'hui propriété du comité départemental de Loire Atlantique de l'UFCV                                                                                                                                                            SOUCHE, ancien manoir d'origine médiéval,  a été acquis en 1830 par Charles Chesneau, notaire à Nantes.","architecture":"PLINGUETIERE, ce château en brique du XIXe siècle est aujourd'hui propriété du comité départemental de Loire Atlantique de l'UFCV (Union française des centres de vacances et de loisirs). Il est à la fois un centre de loisirs pour les enfants (mercredis et vacances scolaires) et un centre d'accueil pour les entreprises (séminaires, rencontres professionnelles), les scolaires (classes découvertes), les seniors, les sportifs... Hébergement (chambres au château et chalets) et restauration sur place.Son parc de 8 hectares, doté d'un parcours de santé, est ouvert à tous.                                                                                                     ST-AIGNAN, fief de la famille Rousseau de Saint-Aignan depuis lépoque féodale, il a été construit vers 1610.\r\nJulie Rousseau, poétesse amie de Stendhal, y vécut au XIXe siècle et écrivit de nombreux textes sous le pseudonyme de Jules dHerbauges. SOUCHE, les communs ont été construits sur le modèle clissonais vers 1830-1840. Une partie de ses façades et de ses toitures ont été inscrites au titre des M.H. en 2000. C'est aujourd'hui une propriété viticole familiale qui produit des vins de Loire de cinq cépages différents. La bande symbolique du blason de la châtellenie de Souché (datant du XVIe siècle) représente une écharpe de chevalier et les trèfles sont donnés à ceux qui possèdent de grands prés où paissent de nombreux bestiaux.","habitants":"Julie Rousseau, poétesse \r\n        \"","divers":"Quatre châteaux à St-Aignan Grandlieu grav-7-8-9,  celui de la Plingueterie grav 6.  de Souche grav-3, et de St-Aignan  Jemonière grav-1-2.  Monceau grav-2 de la Goézonnière grav_4   St-Aignan 47° 07' 28\" nord, 1° 37' 46? ouest","gps":"","images":["../image/image_44/44_GrandLieu_1.jpg","../image/image_44/44_GrandLieu_2.jpg","../image/image_44/44_GrandLieu_3.jpg","../image/image_44/44_GrandLieu_4.jpg","../image/image_44/44_GrandLieu_5.jpg","../image/image_44/44_GrandLieu_6.jpg","../image/image_44/44_GrandLieu_7.jpg","../image/image_44/44_GrandLieu_8.jpg","../image/image_44/44_GrandLieu_9.jpg"]},"Consult_chateau_formulaire03e8":{"id":"Consult_chateau_formulaire03e8","dept":"44","canton":"Marchecoul","commune":"Port-Saint-Père","nom":"Grandville","type":"Château","periode":"XIX","histoire":"GRANDVILLE, le château est édifié par Étienne Jean-Baptiste Blon entre 1820 à 1825 à la demande d'Aristide Locquet de Grandville de 1791-1853, politicien, maire de Port-Saint-Père de 1818 à 1830 et de 1838 à 1848 puis siège à l'assemblée constituante du 23 avril 1848 au 26 mai 1849, puis à l'assemblée législative le 23 mai 1849 où il siège à droite. Propriétaire de la seigneurie de La Tour-Bouvet  avec son frère, Achille Locquet de Grandville, il décide de le mettre en vente, avec l'accord de son frère, suite à leurs mariages respectifs. Aristide de Grandville, le nom Locquet n'est plus utilisé par son porteur après son mariage épouse Sophie de Martel le 1er mai 18186. Cette vente permis à Aristide de Grandville d'acheter un terrain situé sur le coteau de Beaulieu,, le château de Grandville. Son frère, quant à lui, achète le château de la Rivière, situé dans la même commune. Au décès d'Aristide de Grandville, le domaine revient à son gendre, Stéphane de Moulin de Rochefort. Puis le domaine passe par mariage aux Dampierre, puis encore par mariage aux d'Argenlieu, qui le restaurent depuis quelques années. Le château est inscrit au titre des M.H. en 1992.","architecture":"GRANDVILLE  est un château bâti à Port-Saint-Père,  La construction date de 1820 à 1825. Il est d'architecture palladienne et de style Néo-Classique. Le château est inscrit aux M.H. depuis 1992, s'organise selon un plan massé, ou plan centré, c'est-à-dire que son plan est presque carré.  La façade côté jardin est composée dun soubassement accueillant les communs sur lequel se trouve une élévation à trois niveaux. Le premier niveau se compose des pièces de vie. Il est considéré comme létage noble dans les maisons de campagne du XIXe siècle en France. Ce niveau est composé dun avant-corps central à refends continus percé par trois baies en plein cintre composées . Cet avant-corps central est flanqué d'une travée de baies en plein cintre à impostes en soleil  de part et d'autre. Le second niveau est destiné aux chambres Il est caractérisé par sa loggia en saillis occupant lavant-corps central. il est composée de six colonnes dordre ionique en tuffeau dont quatre dentre elles sont des colonnes ioniques jumelées. Ces dernières encadrent les deux colonnes ioniques centrales.","habitants":"Aristide Locquet de Grandville \r\n        \"","divers":"Grandville 47° 08' 28,5\" Nord, 1° 45' 32,68\" Ouest","gps":"","images":["../image/image_44/44_Grandville_1.jpg","../image/image_44/44_Grandville_2.jpg","../image/image_44/44_Grandville_3.jpg"]},"Consult_chateau_formulaire2777":{"id":"Consult_chateau_formulaire2777","dept":"44","canton":"St-Philibert de Grand Lieu","commune":"Saint-Etienne  de Corcoué","nom":"Grange_44","type":"Château","periode":"XV-XIX","histoire":"Le manoir de Bayers, à Saint-Jean-de-Corcoué, construit par la famille de La Rochefoucauld-Bayers. Le château de la Grange, à Saint-Jean-de-Corcoué, remanié au XIXe siècle par la famille de Goulaine.                                                                            GRANGE, les dépendances du château de La Grange du XV-XIXe siècle, situées à Saint-Etienne. Les extrémités des ailes comportent deux tours rondes du XVe siècle. Démoli au XVIIe siècle, le logis est reconstruit et remanié en 1865 par la famille de Goulaine qui en devient propriétaire en 1777, cette famille est également propriétaire des Meslier, en Legé, et de la forêt de Montplaisir, dite forêt du marquis. C'est dans ce château qu'est reçue la duchesse de Berry par le marquis de Goulaine en 1828. Les bâtiments sont rasés en 1975 .","architecture":"GRANGES, les caves de la Grange du XVe siècle attestent de l'ancienneté et de l'importance du domaine, construit au XVe siècle, le château de la Grange Barbastre appartient à la famille Basbastre, seigneur de la Grange, jusqu'à la fin du XVIe. Maintes fois démoli, lors des guerres de religion ou par la volonté des propriétaires, les bâtiments furent quatre fois reconstruits dans un nouveau style. Un Goulaine fut compagnon de Charette, avant de devenir général d'Empire. Deux autres furent tués lors du débarquement des chouans à Quiberon. Baudouin descend d'un de ceux-là, dont les enfants furent cachés par des paysans pendant la révolution.   Depuis, il a repris cette magnifique demeure construite avec les matériaux de château démoli il y a trente ans. En pénétrant dans la cour par un joli porche, vous pouvez apercevoir une bâtisse originale de style poitevin. Cette maison est protégée d'un côté par des corps de bâtiments et de l'autre par les douves de l'ancien château.En souvenir des fondateurs du château, Baudouin de Goulaine a repris les armes des Barbastre pour la commercialisation de sa production viticole. Voir le blason sur les différentes étiquettes.","habitants":"Grange; famille de Goulaine\r\n        \"","divers":"Saint-Etienne  de Corcoué le château de la Grange","gps":"","images":["../image/image_44/44_Grange_44_1.jpg","../image/image_44/44_Grange_44_2.jpg","../image/image_44/44_Grange_44_3.jpg"]},"Consult_chateau_formulairef1e8":{"id":"Consult_chateau_formulairef1e8","dept":"44","canton":"Pornic","commune":"La Bernerie en Retz","nom":"Gressière","type":"Château","periode":"XVIII-XIX","histoire":"GRESSIERE, le seigneur de la Gressière est mentionné au XIe siècle. Le premier seigneur que l'on connaisse, est Pierre Grimaud en 1460. On trouve ensuite Jacques Leborgne en 1589, puis en 1609, René de Saffré, cette famille de Saffré possèdera le domaine jusqu'en 1724. En 1744, naît au château, Catherine Le Ray, fille du sieur Jean Le Ray, officier de navire, et de Catherine Pédeau. En 1745, Julien Chesneau épouse Jacquette Le Ray, fille de Pierre Le Ray et de Jeanne Marcesse. Le château passe ensuite aux Charette de Boisfoucault en 1751. Le deuxième de cette famille, Arthur, fit construire la demeure actuelle. Le château appartient ensuite à la famille Guignard de Saintours, puis à Roger de Boüard de Laforest jusqu'en 1984, hôtel restaurant, location salle réceptions.","architecture":"GRESSIERE, dominant la baie de Bourgneuf avec l'île de Noirmoutier en arrière-plan, a été construit en 1879. de plan classique moderne rectangulaire à deux niveaux, série de lucarnes sur toit en croupes avec fronton central double sur avant corps saillant, flanqué de deux bâtiments sur les flancs latéraux d'un étage avec terrasses.","habitants":"Famille de Saffré\r\n        \r\n        \"","divers":"La Bernerie en Retz le château de la Gressiere","gps":"","images":["../image/image_44/44_Gressi%c3%a8re_1.jpg","../image/image_44/44_Gressi%c3%a8re_2.jpg","../image/image_44/44_Gressi%c3%a8re_3.jpg"]},"Consult_chateau_formulaire4dec":{"id":"Consult_chateau_formulaire4dec","dept":"44","canton":"Nort sur Erdre","commune":"Teillé","nom":"Guibourgère","type":"Château","periode":"XVII","histoire":"GUIBOURGERE, le château de la Guibourgère est un château fort construit en 1610. Le château de la Guibourgère (1610 - 1830 - 1930), est une propriété privée située sur la route menant à Riaillé. Il date du XVIIe siècle. Ses façades et les toitures ainsi que les toitures de la chapelle sont protégées depuis leurs inscription par arrêté, aux M.H. le 17 mai 1982. Le château de la Guibourgère fut la propriété des familles Raoul de La Guibourgère au XVe siècle, puis de la famille Camus de Pontcarré au XVIIIe siècle.","architecture":"GUIBOURGERE, construit initialement par un architecte dont le nom est inconnu, le château de la Guibourgère est modifié dans son ensemble par les architectes Liberge et Moreau. De plan en U, il ne reste que la partie centrale, à laquelle on a donné une symétrie parfaite. Les ailes en retour sont détruites, et des communs sont alors construits au sud du château, ainsi qu'un chenil et un potager à la française.  Le château est édifié sur une plate-forme rectangulaire autrefois entourée de fossés en eau ; on y accédait par trois passerelles. Il reste encore aujourd'hui des traces de ces douves en sifflet. L'accès au domaine se fait par son avenue de 2 kilomètres où un portail marquait l'entrée Est du parc.  Le château de la Guibourgère est actuellement en avant-projet de rénovation.","habitants":"Familles Raoul de La Guibourgère\r\n        \"","divers":"A Teillé le château de Guibourgère 47° 29' 9,64\" Nord, 1° 17' 52,71\" Ouest","gps":"","images":["../image/image_44/44_Guibourg%c3%a8re_1.jpg"]},"Consult_chateau_formulaire8a80":{"id":"Consult_chateau_formulaire8a80","dept":"44","canton":"Guémené-Penfao","commune":"Guémené-Panfao","nom":"Guémené_Panfao","type":"Chateaux","periode":"XVI-XVIII","histoire":"Plusieurs châteaux à Guémené-Panfao, dont celui de Guémené de Beaulieu a Garenne, du Boisfleury, de Brossay, du grand pont-Veix, du Frigueil, du Bruc, de Juzet, de Trénon  et de Tréguel.                                                                         GUEMENE-PANFAO Grand-Logis du XVe siècle avec tour octogonale.\r\nChâteau de Juzet.(Voir article).  Du Trénon, (résidence privée de la famille de Saint-Germain). Du Boisfleury. Du Brossay, de style Empire. De Treguel du XVIIIe siècle. De Friguel du XIXe siècle.                                            BEAULIEU-la Garenne, du  XIXe siècle, ce château est en réalité situé sur le domaine de la Garenne, ancienne possession de la famille Hervé dont les ancêtres étaient sieurs de Beaulieu.  C'est Edouard Jean Hervé de Beaulieu, né en 1804,  qui fit construire, en 1828 - 1829, l'actuel château de Beaulieu. Cette famille ancienne est originaire de l'Anjou et s'est installée en Bretagne au XVIIe siècle, dans la région de Plessé, à quelques kilomètres au sud de Guémené. Un aïeul est ainsi procureur fiscal puis sénéchal de la vicomté de Carheil au début du XVIII siècle.  Et a  cinq kilomètres à l'Est le château de Conquéreuil et le Grand Pont de Veix hôtellerie.
