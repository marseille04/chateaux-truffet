4_St_Et_de_Montluc_7.jpg","../image/image_44/44_St_Et_de_Montluc_8.jpg","../image/image_44/44_St_Et_de_Montluc_9.jpg"]},"Consult_chateau_formulairef994":{"id":"Consult_chateau_formulairef994","dept":"44","canton":"Blain","commune":"St Etienne de Montluc","nom":"St_Etienne_Montluc_II","type":"Château","periode":"XV-XVI-XVIII","histoire":"A St-Etienne de Montluc le château de Vallais, le Manoir,  Bellevue, le Kérrado, le Grand-Juliénnas et Ile de Reilly.                                                                    VALLAIS, fut construit au XVIIIe siècle. Il comporte un pavillon central sur quatre niveaux ainsi quun parc bordé dune belle allée de platanes. La Censive  proche du château de la Vallais, cette habitation du XVe siècle ou du début du XVIe siècle, très bien restaurée, présente toutes les caractéristiques dun petit manoir de lépoque. Le logis et ses dépendances comportent des pigeonniers intégrés aux maçonneries.  Au XVIIIe siècle, propriété successive des familles Bernard et Goguet de La Salmonière.                                                                         Le MANOIR, daterait du XVe siècle. Il servit de presbytère de 1629 jusquà la Révolution, puis devenu bien national, fut vendu à Pierre Perchais, maire de 1793 à 1803. Durant la guerre 14-18, il servit dhôpital pour les blessés et les réfugiés venant du nord de la France et de Belgique. Récemment rénové, il conserve tout son cachet avec sa tourelle qui renferme un escalier en vis distribuant les étages, et ses grands porches en ogive.\r\nBELLEVUE, cest larchitecte Jean-Baptiste Ceineray qui fit construire en 1777 cette propriété qui doit son nom à sa belle exposition sur le coteau, au nord du bourg. Laspect originel na pas changé si ce nest la terrasse à colonnades, au sud, créée il y a un siècle. Vendue en 1855, la propriété connut alors 7 propriétaires successifs avant dêtre rachetée 50 ans plus tard par Pierre Ceineray, son petit-neveu. Au début de la guerre, elle hébergea un état-major anglais, puis fut réquisitionnée par larmée allemande, avant que des bataillons des Forces Françaises de lIntérieur ne loccupent à la fin de la guerre.","architecture":"GRANDE-JULIENNAIS, la propriété doit probablement son nom à un Julien qui y aurait habité. Son premier propriétaire, en 1450, était Jean de Kersy. À l'origine modeste terre noble au nord-est du bourg, le domaine, par le jeu d'alliances familiales et d'acquisitions judicieuses, s'étendit rapidement sous les d'Aiguillon aux XVIe et XVIIe siècle, pour devenir le marquisat de la Juliennais. Mais de lourdes dettes contraignirent à le céder en 1708 à Yves-Marie de LA Bourdonnaye, Conseiller du Parlement, qui s'adjoignit plus tard le titre de comte de Montluc, marquant ainsi toute sa prééminence sur la paroisse. À la Révolution, les biens furent confisqués et vendus. En 1860, lactuel château fut bâti, avant d'être la propriété d'une famille hollandaise d'armateurs, les Van Neunen. Par la suite, 6 propriétaires se succédèrent avant M.Mme Le Masne. De Chermont qui lacquirent en 1969.                                                                                                                                          lLe REILLY,  bâti en 1630, ce manoir Renaissance situé dans le marais, non loin de la Rivière, fut habité par Jean de Moayre, conseiller du Roi et auditeur en la Chambre des Comptes. Elle était aussi pavillon de chasse des évêques de Buzay.                                                                                    KERRADO Ce manoir proche du bourg, à lEst,  porte le nom de celui qui le fit construire en 1896. Henri Rado de Saint Guédas, avocat au barreau de Nantes, fut maire de la commune de 1919 à 1941.","habitants":"Bellevue; famille de r Pierre Ceineray                             vallais; famille Goguet de La Salmonière                                    Le manoir, famille de  Pierre Perchais                          Grand-Juliénnais, Jean de Kersy,                                          Le Reilli ; famille de Jean de Moayre\r\n        \"","divers":"A st-Etienne de Montluc le château de Vallais, le Manoir,  Bellevue, le Kérrado, le Grand-Juliénnais grav-2  et le de Reilly grav_3.","gps":"","images":["../image/image_44/44_St_Etienne_Montluc_1.jpg","../image/image_44/44_St_Etienne_Montluc_2.jpg","../image/image_44/44_St_Etienne_Montluc_3.jpg","../image/image_44/44_St_Etienne_Montluc_4.jpg"]},"Consult_chateau_formulaire421a":{"id":"Consult_chateau_formulaire421a","dept":"44","canton":"Saint-Herblain","commune":"Saint-Herblain","nom":"St_Herblain","type":"Château","periode":"XV-XVII-XVIII","histoire":"châteaux à Saint-Herblain; le Bégraissière, la Gournerie, le Paclais  et le Patissière.                                                                                                                GOURNERIE, le château fut construit en 1623 par Jan de Bruc. Il fut racheté par Charles Maillard seigneur de la Behinière Sionnère, conseiller maître à la chambre des comptes de Bretagne. La famille Maillard devint le premier propriétaire du \"fief au Duc\" qui réunit à la fois, le domaine de la Gournerie, la Béhinnière et la Sionnère en un domaine unique. Pendant plus de 200 ans le château, les terres et les fermes restent la propriété des Maillard de la Gournerie. Durant la Révolution, le château est épargné et au fil des ans subit des modifications. Cest en 1866 que la bâtisse connaît sa forme définitive. En 1973, le domaine de la Gournerie est vendu à la ville de Saint Herblain. Entre 1996 et 1997, dimportants travaux seront réalisés, les façades très dégradées seront entièrement restaurées, la toiture rénovée, lintérieur du bâtiment entièrement refait. Actuellement, le château est géré par la fédération des Amicales Laïques de Loire-Atlantique.                                                                                                          PACLAIS, Mathelin Rodier était l'architecte. Le manoir est lié à Vincent et Jacqueline Auriol. La construction du manoir de la Paclais date du XVe siècle. Il est bâti en équerre autour d'une tourelle d'angle. Le manoir de la Paclais est inscrit aux M.H. depuis le 14/05/1949. Privée .","architecture":"BEGRAISSIERE,  construit en pierre, date de 1622, côté Ouest sa façade présente une tour hexagonale. Au XVIe siècle, apparaît le château de la Garotterie, construit en pierre et tuffeau, il est rebâti aux XVIIe et XVIIIe siècles, seule la chapelle d'origine est préservée. Entre 1835 et 1837 le trésorier des hospices de Nantes Louis-François de Tollenare se fait construire une résidence d'été, le château de Pontpierre. C'est en 1840 que le château de la Patissière est édifié, à l'endroit où se dressait un château médiéval. De cette époque n'est conservé que le colombier, preuve de l'existence d'une seigneurie. La Patissière compte aussi un moulin du XVIIIe siècle qui a cessé de fonctionner en 1952. Le manoir de Plaisance, bâti au XIXe siècle, est entre 1842 et 1844, la demeure temporaire de Jules Sandeau. L'hôtel de ville, construit en 1936, est l'uvre de l'architecte Joëssel. Il a la particularité d'avoir 4 façades d'aspect différent, l'une de l'autre. La Bégraisière est une ancienne propriété noble dont le manoir remonte au XVe siècle.                                                                                                                             PATISSIERE   Le domaine se composait primitivement d'une forteresse médiévale, d'un colombier du XVe siècle, d'un moulin à vent du XVIIIe siècle, d'un moulin à eau et d'une chapelle privée. En 1840, le château de la Pâtissière est construit à l'emplacement de lancien château médiéval. Des trompe-lil ornent le château, sous l'Ancien Régime, il jouissait d'un grand prestige. Il fut la propriété des familles de Rieux, Darquistade, de Boussineau, Pantins de La Guère et de Landemont. La famille de Georges Riom a possédé La Patissière et elle y a accueilli de nombreux artistes, des poètes, des musiciens et des écrivains. Il ne reste que le colombier du XVe siècle et dans le parc se trouvent des ruines du château médiéval.","habitants":"Gournerie;famille Maillard                                                           Paclais; famille Auriol                                                              Begraisssière;   Jules Sandeau                                            Patissière;Famille de Landemont\r\n        \r\n        \"","divers":"Bégrassière grav-5:  47° 12' 44\" Nord, 1° 38' 59\" Ouest        Gournerie grav 1-2   47° 15' 03,62\" Nord - 1° 38' 01,63\" 0uest  Paclais  grav-3-4.    47° 13' 36\" Nord, 1° 40' 05\" Ouest                                      Patissière  grav-6-7-8,  Rivaudière grav-9","gps":"","images":["../image/image_44/44_St_Herblain_1.jpg","../image/image_44/44_St_Herblain_2.jpg","../image/image_44/44_St_Herblain_3.jpg","../image/image_44/44_St_Herblain_4.jpg","../image/image_44/44_St_Herblain_5.jpg","../image/image_44/44_St_Herblain_6.jpg","../image/image_44/44_St_Herblain_7.jpg","../image/image_44/44_St_Herblain_8.jpg","../image/image_44/44_St_Herblain_9.jpg"]},"Consult_chateau_formulaire14cc":{"id":"Consult_chateau_formulaire14cc","dept":"44","canton":"St-Nazaire","commune":"Saint-Nazaire","nom":"St_Nazaire","type":"Château","periode":"XV-XVIII","histoire":"A Saint-Nazaire le château de St-Nazaire, de Saint-Marc et de Porcet.                                                                                      St-NAZAIRE, l'histoire de Saint-Nazaire à connut des affrontements, comme celui de 1380, où Jehan d'Ust défendit la ville au nom du duc Jean IV contre la flotte castillane, lors de la guerre de Cent Ans. Le bourg était le chef-lieu d'une paroisse qui allait de Penhoët à Pornichet, siège d'une châtellenie de la vicomté de Donges. La seigneurie de Saint-Nazaire, fut un démembrement de la vicomté de Donges. Elle fut créée à l'origine du XVe siècle, en faveur de Marguerite de Rieux, fille du vicomte de Donges, lorsqu'elle épousa Charles de Coësmes, seigneur de Lucé.  \r\n St-MARC, cette belle demeure bâtie dans les années 1850 ayant appartenu à Vincent Bolloré est aussi appelée le château de Lourmand, et se nommait à l'origine château du Crépelet du nom dorigine du village de pécheurs de lépoque et qui est, depuis, devenu Saint-Marc sur Mer. Construit par un Lourmand, le château échoit en 1933, par voie de succession, à Gaston Thubé, notre premier champion olympique français en voile, aux jeux de Stockholm en 1912, sur un 6m baptisé Mac Miche. A la barre, entouré de ses frères Jacques et Amédée, il avait remporté la médaille dor à la barbe des équipiers suédois. Chambres d'hôte de la famille  Christian Seyres et sa fille Chantal, le château de Saint Marc sur Mer est visible du chemin côtier.","architecture":"ST-NAZAIRE , chef-lieu de la vicomté de ce nom, se trouvait au bord de la Loire, dans la ville même. Il était très ancien puisque Grégoire de Tours raconte qu'il fut occupé au VIe siècle par Waroch, comte de Vannes. En 1380 ce château, appartenant encore au vicomte de Donges, avait pour gouverneur Jean d'Ust qui sut éloigner les Espagnols menaçant de s'en emparer. En 1561 il ne restait plus à Saint-Nazaire que « l'emplacement de l'ancien château et forteresse dudit lieu ». Sur cet emplacement même s'élevait en 1584 l'église de la paroisse ; à peine quelques vestiges insignifiants du vieux château-fort apparaissaient  à côté du temple.","habitants":"St-Marc; Famille Vincent Bolloré\r\n        \"","divers":"A Saint-Nazaire le château de St-Nazaire, de Bonne Anse-3 de Saint-Marc-1-2 , de Plaisir -4-5-6.   et de Porcet.  De Wilson grav-7.","gps":"","images":["../image/image_44/44_St_Nazaire_1.jpg","../image/image_44/44_St_Nazaire_2.jpg","../image/image_44/44_St_Nazaire_3.jpg","../image/image_44/44_St_Nazaire_4.jpg","../image/image_44/44_St_Nazaire_5.jpg","../image/image_44/44_St_Nazaire_6.jpg","../image/image_44/44_St_Nazaire_7.jpg"]},"Consult_chateau_formulaire5703":{"id":"Consult_chateau_formulaire5703","dept":"44","canton":"St-Brévin-des Pins","commune":"St-Père de Retz","nom":"St_Père_de_Retz","type":"Château","periode":"XVI-XVIII-XIX","histoire":"A  St-Père de Retz le château de la Verrie, de Kermoarel, de Rouardière, de Pinelais                                                                                                 VERRIE, la constuction du château de la Verrie date du XVIe siècle. L'architecte était Charles Suzerain. Il fut bâti pour le marquis René de Bruc de Montplaisir qui était maréchal de camp du roi Louis XIV. Il fut la propriété des 2 premiers marquis de la Guerche. Ensuite, il devint la propriété du Duc de Clermont Tonnerre, puis il fut racheté par des bourgeois nantais et aux Bourmène, dont la veuve, la comtesse de Bourmène épousa le marquis Paul de Roquefeuil, fils de forain et dilapida  la fortune de ses épouses ulcérées. La comtesse de Bourmée divorcera en découvrant la vérité. Quelques années plus tard, cet escroc réapparaitra, sous le nom de Gonzalès, marquis de Valdieu, déclarant vendre le château de la Verrie. Cette histoire rocambolesque défraya la chronique à l'époque. Aujourd'hui, le château de la Verie est privé. On ne peut que constater de l'extérieur, combien le château est en train de ce dégrader.                                                                                                                        KERMOARE, situé dans le bourg, a été construit au XIXe siècle. Ce château moderne, de style Louis XIII, était la propriété de monsieur Viaud ancien notaire. Au XXe siècle c'était la demeure de monsieur Leduc, maire de Saint-Père-en-Retz en 1965.                                                                                                      ROUARDIERE, situé au bord de la rivière du Boivre, les siècles semblent se bousculer sur ce plaisant domaine,  la Rouardière a été construit dans la seconde moitié du XIXe siècle, de jolis bâtiments agricoles révèlent d'intéressants vestiges de l'organisation rurale et sociale de l'époque, château privé où sont organisées chaque année des manifestations culturelles ouvertes au public.","architecture":"PINELAIS, le château a été construit par le commandant Larivière vers 1870, sur un ancien manoir remontant au XVIIIe siècle, ayant appartenu à Saulnier de La Pinelais, peintre de la marine, et précédemment aux Blanchard, sires de la voirie de Saint-Père en Retz et de la Gravelais en Saint-Viaud, puis il passa aux Mesnard, sires de l'Ortail et du Frêne (Armorial de Courcy). La famille Blanchard était autrefois les seigneurs de Blanchardais en vue et possédait un droit de haute justice.                                                                                                          VERRIE, situé sur un promontoire rocheux peu élevé, mais suffisant pour lisoler des zones marécageuses lentourant, le château de la Verrie occupait, au fond de la prairie de Corsept, une place stratégique au XVIIIe siècle. Lié à lévolution du port de Paimboeuf, le site fut choisi par la famille de Bruc pour en faire le centre visible de la seigneurie de la Guerche dont dépendait en partie lavant-port de Paimboeuf. Un incendie a dévasté l'édifice dans la nuit du 23 au 24 janvier 1936, de style classique, avec une belle et élégante façade, il abritait à l'arrière, dun côté, un jardin à la française et de lautre, un parc à langlaise allant sévanouir au bord des prairies avoisinantes.","habitants":"Verrie; Famille du Duc de Clermont Tonnerre                            Kermoare;  Monsieur Viaud                                                       Pinalais; Saulnier de La Pinelais\r\n        \"","divers":"A  St-Père de Retz le château de la Verrie grav-2-3, de Kermoarel grav-1, de Rouardière grav 4, de Pinelais grav-5-6","gps":"","images":["../image/image_44/44_St_P%c3%a8re_de_Retz_1.jpg","../image/image_44/44_St_P%c3%a8re_de_Retz_2.jpg","../image/image_44/44_St_P%c3%a8re_de_Retz_3.jpg","../image/image_44/44_St_P%c3%a8re_de_Retz_4.jpg","../image/image_44/44_St_P%c3%a8re_de_Retz_5.jpg","../image/image_44/44_St_P%c3%a8re_de_Retz_6.jpg"]},"Consult_chateau_formulaire153e":{"id":"Consult_chateau_formulaire153e","dept":"44","canton":"Carquefou","commune":"Sainte-Luce-sur-Loire","nom":"Ste_Luce_Loire","type":"Château","periode":"XV-XVI-XIX","histoire":"Cinq châteaux à  Sainte-Luce, Chassay, Perrier et de Linot.                                                            CHASSAY, en 1462, le duc de Bretagne confisqua tous les biens de lévêché et chassa Amaury dAcigné de Nantes. Il semble que François II transforma Chassay en pavillon de chasse. Le château revint à lévêché probablement en 1500, lorsque Guillaume Guéguen devint évêque de Nantes. Lévènement historique majeur que connut l'édifice fut le passage dHenri IV et de sa suite, le 13 avril 1598, qui vint dîner en compagnie de lévêque avant son entrée à Nantes où il devait signer le célèbre édit, le 30 avril 1598. Le 27 janvier 1791, le château, en tant que résidence épiscopale, et lensemble du domaine furent vendus comme bien national à larmateur Dubois Violette. Il le revendit moins dun an plus tard. La HAIE  est le siège d'une grande seigneurie couvrant 800 hectares, qui disparaît à la Révolution. Deux tours d'angle encadraient son entrée monumentale. En 1626, le cardinal de Richelieu y fait une halte.\r\nGRAND-PLESSIS (ou Lombarderie), appartient en 1471 à Christophe de Tourneuve, est acquis en 1857 par M. Figat qui le fait raser. Entre 1874 et 1876, il fait reconstruire un manoir qui présente 55 ouvertures. À la fin du XXe siècle, il est transformé en restaurant. Le château du Petit-Plessis, du XVIIIe siècle, construit pour un armateur nantais, présente des écuries et une orangerie.                                                                     PERRIER, Il est de style gothique, et date de la fin du XVe siècle. Il appartenait au sire de Lescouet, sommelier et chambellan d'Anne de Bretagne, qui était reine de France. La demeure a été reconstruite à la fin du XVIIIe siècle. Le château du Linot est reconstruit en 1852 par l'architecte nantais Joseph-Fleury Chenantais, dans un style néo-gothique.","architecture":"CHASSAY, il date du XVIe siècle. Il est de style renaissance Italienne.  La mairie a installé ses services dans les murs du château de Chassay, fut construit sur l'emplacement d'une ancienne construction datant de 550. En 1462, Amaury d'Acigné fit creuser des douves et dresser des fortifications. L'évêque nantais Philippe du Bec fit reconstruire le château de Chassay dans la seconde partie du XVIe siècle, dans un style Renaissance italienne. Le corps carré au centre de lédifice avec les tourelles carrées en encorbellement date de la deuxième moitié du XVIe siècle.Plusieurs propriétaires se succédèrent ensuite, le laissant dans un état déplorable. En 1974, la commune acheta le château et y transféra ses services en 1975. Le corps carré au centre de lédifice avec les tourelles carrées en encorbellement date de la deuxième moitié du XVIe siècle, car son architecture est de style renaissance italienne, propriété de la commune, hôtel de ville depuis 1975.  \r\nSAINTE LUCE, le château du Linot est reconstruit en 1852 par l'architecte nantais Joseph-Fleury Chenantais, dans un style néo-gothique. Les autres demeures nobles n'ayant pas été détruite sont La Nobilière,  rue de la Nobilière, La Mignonnerie rue de la Loire et chemin du Perrier, La Thébaudière, La Gironnière, chemin des Rouaudières, La Guichardière, Le Petit Guiche, La Poitevinière, rue de la Poitevinière, Belle-Rivière, ce dernier remonte au XIVe siècle. C'est une gentilhommière, regroupant un logis noble et ses dépendances, surélevée sur des caves maçonnées pour échapper aux effets des crues.Le château du Linot est reconstruit en 1852 par l'architecte nantais Joseph-Fleury Chenantais, dans un style néo-gothique.","habitants":"Chassay; famille de  Dubois Violette                                         Gd_Plessis; famille de Christophe de Tourneuve                            Perrier; sire de Lescoue           \r\n        \"","divers":"à  Sainte-Luce, Chassay grav 7-8-9, Perrier et de Linot.    Chassay grav 6 ; 47° 14' 52\" Nord, 1° 29' 01\" Ouest de Bellevue grav-5,   la Haie, du Grand-Plessis grav-4 et du perrier Mignonnerie-3","gps":"","images":["../image/image_44/44_Ste_Luce_sur_Loire_1.jpg","../image/image_44/44_Ste_Luce_sur_Loire_2.jpg","../image/image_44/44_Ste_Luce_sur_Loire_3.jpg","../image/image_44/44_Ste_Luce_sur_Loire_4.jpg","../image/image_44/44_Ste_Luce_sur_Loire_5.jpg","../image/image_44/44_Ste_Luce_sur_Loire_6.jpg","../image/image_44/44_Ste_Luce_sur_Loire_7.jpg","../image/image_44/44_Ste_Luce_sur_Loire_8.jpg","../image/image_44/44_Ste_Luce_sur_Loire_9.jpg"]},"Consult_chateau_formulaire7774":{"id":"Consult_chateau_formulaire7774","dept":"44","canton":"La Chapelle sur Erdre","commune":"Sucé sur Erdre","nom":"Sucé_sur_Erdre","type":"Château","periode":"XIV-XIX","histoire":"plusieurs châteaux à Sucé-sur-Erdre celui de Chavagne et de la Claverie.                                                                                                                          CHAVAGNE, Pierre de Saffré, seigneur de Bougon, grand veneur à la cour de Jean V dit le Sage, duc de Bretagne de 1399 à 1442 a été le premier seigneur et bâtisseur du château sur les ruines d'une maison, ancien rendez-vous de chasse. Des seigneurs de Saffré, le château de Chavagne passe vers 1489 dans la famille des Goudelin, puis, en 1571, dans celle des Morin, dont Jean, seigneur de la Marchandrye, avocat du roi et maire de Nantes en 1570. Sa fille Anne Morin épouse en 1599, Joachim Descartes, qui, d'un premier mariage avec une demoiselle Brochard, est le père du philosophe René Descartes et de Pierre Descartes. René Descartes, sieur du Perron, est l'auteur du discours de la méthode. De son deuxième mariage vers 1600 avec Anne Morin, Joachim Descartes aura trois enfants, les Descartes s'installent à Sucé à partir de 1609 puisque Anne Morin est devenue, par voie d'héritage, propriétaire du château. En 1688, il est vendu par Joachim III Descartes à Claude Luzeau de la Grande-Noë, conseiller de Louis XIV. En 1756, Louis Maurice Luzeau épouse, dans la chapelle de Chavagne, Madeleine Bidé, fille de Louis Bidé, chevalier, seigneur de la Bothinière. Ils habitent d'abord le manoir de l'Ongle, le château de Chavagne étant occupé par son propriétaire d'alors, Julien de la Bourdonnais marié à Françoise Bidé, la soeur de Madeleine.","architecture":"CLAVERIE, édifié en 1827 par la famille Claveau en utilisant les pierres des ruines de l'Onglette. Puis, propriété de la famille Allard de Grandmaison qui le vend, en 1858, à Jean Marion de Beaulieu, général de Génie en retraite. En 1890, Georges Ganuchaud fait l'acquisition du domaine et l'embellit. En 1914, Georges Ganuchaud achète le côteau du Bois Martin dépendant de Jaille et en 1915, commence à construire la tour Saint-Georges, qui a pour originalité un escalier extérieur et à mi-hauteur de cet escalier se trouve une petite chapelle ornée de deux bas reliefs, oeuvre du sculpteur Sébastien de Boisheraud, et représentant Saint-Georges terrassant le dragon. Cet oratoire est béni en 1921 par Mgr le Fer de la Motte, évêque de Nantes. Georges Ganuchaud décède en 1939 dans sa propriété de La Claverie, celle-ci revient à sa fille, Jane Binet Ganuchaud, puis à Rosy Rossolin Binet, sa petite-fille.","habitants":"Chavagnes, Famille des Goudelin                               Claverie, Famille Allard de Grandmaison\r\n        \r\n        \"","divers":"à Sucé-sur-Erdre celui de Chavagne et de la Claverie grav 5.  Chavagne : 47° 22' 11\" Nord, 1° 31' 58\" Ouest  Grav 1-2","gps":"","images":["../image/image_44/44_Suc%c3%a9_sur_Erdre_1.jpg","../image/image_44/44_Suc%c3%a9_sur_Erdre_2.jpg","../image/image_44/44_Suc%c3%a9_sur_Erdre_3.jpg","../image/image_44/44_Suc%c3%a9_sur_Erdre_4.jpg","../image/image_44/44_Suc%c3%a9_sur_Erdre_5.jpg"]},"Consult_chateau_formulaireae61":{"id":"Consult_chateau_formulaireae61","dept":"44","canton":"La chapelle sur Erdre","commune":"Sucé-sur-Erdre","nom":"Sucé_sur_Erdre_II","type":"Château","periode":"XV-XVI-XVIII-XIX","histoire":"Dans cet article le château Gaillard, la Gamotière de la Jaille de Launay Montretrait, de Nay,  de Bas-Jail et de la Guillonnière et Port-Hubert.                                                 GAILLARD, la Cour-Gaillard est un bâtiment qui date du XVIe siècle, aussi appelée la Tour Gaillard, autrefois appelée la Grande Cour. Cette demeure a appartenu à la famille de Me Grellier, notaire des Régaires, huissier au présidial de Nantes. Elle a été vendu en 1684 à Martial Gaillard, apothicaire à Nantes.\r\nGAMOTERIE, le château-ferme de la Gamoterie date des XVIIIe-XIXe siècles, il eut comme propriétaire la famille Brillaud, la famille Suze.\r\nJAILLE date du XVIIIe siècle.                                                                              LAUNAY, situé route de Petit-Mars, date du XVe siècle, reconstruit en 1803. Il est partiellement inscrit aux M.H. en 1967. Il fût pillé pendant la Révolution. Il est édifié par Jean du Perray, puis est acquis par François de La Henriays en 1573, Olivier de Carheil en 1609.                      MONTRETRAIT , résidence d'été des évêques de Nantes jusqu'au XVIIe siècle, a appartenu à la famille Arondel, la famille de Laleux.                                                                       NAY, date du XIXe siècle, avec une tour, un pigeonnier et une chapelle privée. Il fût la propriété de Jehan et Petronille de NAY, la famille Pontual, la famille de Cornulier, la famille de Lambily.                                                                                  BAS-JAIL, manoir, Joachim Descartes, Louis Alexandre Descartes, la famille Lelièvre de la Touche, la famille Taillard de Kertanguy.\r\nGUILLONNIRE date de la fin du XIXe siècle.Il fût édifié par le marquis de la Touche, puis la propriété de la famille Potier, les Garaud,  de Polignac, et les Robert.","architecture":"PORT-HUBERT,Manoir avant 1700, dépendait de la seigneurie de la Nay. Il eut les propriétaires Guillaume Gérard, en 1691, la famille Potier avant la Révolution, René Letessier  de Bellevue, en 1720, Georges Richard Roullière et son épouse Mme de la Ville de Bris, en 1762, René Nuaud, en 1806, M. Magouet, en 1821, M. Boyrie, en 1837, Miss Louisa Slessor, épouse de James Walsh (protestants anglicans), et leurs deux filles Jane-Eleanor et Sophia, en 1837, Jane-Eleanor Walsh et son mari Thomas Dobrée, en 1876, François Emile Bureau, armateur, en 1896, Gustave Bureau, en 1926, Alain Bureau, en 1951.","habitants":"Gaillard; famille de Martial Gaillard.                                   Gamoterie; famille Brillaud                                                   Launay; Olivier de Carheil                                              Montretrait; famille Arondel,                                                                   Nay;  famille de Lambily.                                 Guillonnière;famille Potier                                          Port_Hubert;famille Potier\r\n        \r\n        \r\n        \"","divers":"A Sucé sur Erdre le château Gaillard grav 1, la Gamotière de la Jaille  grav_2  de Launay Montretrait grav-3, de Naye ,  de Bas-Jail et de la Guillonnière et Port-Hubert grav 4","gps":"","images":["../image/image_44/44_Suc%c3%a9_sur_Erdre_II_1.jpg","../image/image_44/44_Suc%c3%a9_sur_Erdre_II_2.jpg","../image/image_44/44_Suc%c3%a9_sur_Erdre_II_3.jpg","../image/image_44/44_Suc%c3%a9_sur_Erdre_II_4.jpg"]},"Consult_chateau_formulaire6bd6":{"id":"Consult_chateau_formulaire6bd6","dept":"44","canton":"Carquefou","commune":"Thouaré sur Loire","nom":"Thouaré_Loire","type":"Château","periode":"XV-XVI","histoire":"trois châteaux à Thouaré celui d'Hilière, de Thouaré et de Picaudière.                                                                               THOUARE sur LOIRE,  édifié à lemplacement dune villa gallo romaine, remontent au Xe siècle. Il appartint à différentes familles. La plus célèbre propriétaire fut Anne Descartes, demi-sur du célèbre philosophe. Passant aux Césard, puis aux Mathieu, le domaine fut racheté en 1882 par la famille de Vienne qui le possède toujours.                         HILLIERE, On sait également que les Fleuriot, premiers propriétaires connus et maîtres de la monnaie à Nantes, possédaient une résidence Renaissance, comme latteste la découverte dune pierre portant le millésime du XVIe siècle. Le domaine passa ensuite aux Sorin puis à la famille du Guiny ; ce sont ces derniers (en particulier François Marie du Guiny) qui édifièrent le château actuel. Durant la Révolution, la Hillière, ainsi que tout son mobilier, terrains et métairies, furent vendus comme bien national. Passant aux Metois puis changeant souvent de propriétaire, le domaine est occupé depuis 1952 par la communauté des frères de Saint Gabriel. Dans un parc de 8 hectares  se dresse le château. Lavant nest pas traditionnel puisquil sagit dun demi-cercle, sur lequel est situé le perron circulaire menant à lentrée. Celle-ci est entourée de deux petites colonnes ioniques à fût lisse soutenant un entablement suivi dun fronton triangulaire dépourvu des habituelles armoiries. Le rez-de-chaussée est aussi létage noble, car il possède les plus grandes fenêtres rectangulaires. Le 1er étage en possède de plus petites, indiquant la partie privée du château. Le toit possède des chiens assis. Petite particularité, le soubassement de la demeure possède des lucarnes indiquant la présence dune cave ou dun sous-sol. Les pilastres dangle sont à refends.","architecture":"PICAUDIERE, construit par larchitecte nantais Jean-Baptiste Ceineray en 1773, le château est du plus pur style néo-classique. Le domaine passa par alliance à la famille de Monti, puis aux Sénot de La Londe et aux Tinguy et actuellement aux Mitard. Ce château est une folie typique du XVIIIe siècle. La Picaudière est totalement symétrique, l'édifice possède un avant-corps avec des pilastres à refends, surmontés dun fronton triangulaire avec oculus. La porte centrale, avec un perron, et un arc en plein-cintre avec un claveau, le toit est pentu doù la présence de chiens assis aux arcs surbaissé. Sur tout le reste du bâtiment, des fenêtres rectangulaires à petits carreaux, qui, combinées aux lignes régulières, donne un effet délégance à lensemble. Les pilastres de langle du château sont eux aussi à refends. Au Nord-Ouest de la propriété, lancien \"temple de lamitié\", témoignant de la filiation néo classique, a été réaménagé et transformé en chapelle. M. Senot de la Londe propriétaire du château de la Picaudière.                                                                                                     THOUARE sur LOIRE, la façade Est présente un style mêlant des éléments Renaissance (la tour-lanterne à dôme), et dautres issus du Moyen-Âge, tels les créneaux ou la fenêtre à double meneaux datant de la seconde moitié du XIXe siècle, de tuffeau et de pierre, elle est encadrée dun galbe plein, sur lequel apparaissent les armes des familles de Vienne et Boucher dArgis. La façade Sud fut remanié au XIXe siècle, et surtout ne possède plus aucune particularité architecturale.  La toiture a une forme de dôme, elle est surmontée dune tourelle ouvragée percée de trous. À son sommet une sculpture de pigeon rappelle la fonction de lédifice.","habitants":"Thouaré ; famille de Descartes,                                          Hilière; famille du Guiny,                                                           Picaudière; famille de Monti\r\n        \"","divers":"Thouaré grav 1-2-3-4-Hilière  grav-5-6-7.: 47° 16' 06\" Nord 1° 26' 22\" Ouest                                                                                    Picautièrre  47° 16' 06\" Nord 1° 26' 22\" Ouest","gps":"","images":["../image/image_44/44_Thouar%c3%a9_Loire_1.jpg","../image/image_44/44_Thouar%c3%a9_Loire_2.jpg","../image/image_44/44_Thouar%c3%a9_Loire_3.jpg","../image/image_44/44_Thouar%c3%a9_Loire_4.jpg","../image/image_44/44_Thouar%c3%a9_Loire_5.jpg","../image/image_44/44_Thouar%c3%a9_Loire_6.jpg","../image/image_44/44_Thouar%c3%a9_Loire_7.jpg"]},"Consult_chateau_formulaire2cbf":{"id":"Consult_chateau_formulaire2cbf","dept":"44","canton":"St-Herbain","commune":"Orvault","nom":"Tour_Orvault","type":"Château","periode":"XV-XVIII","histoire":"TOUR d'ORVAULT, en 1450, le domaine appartient à un noble breton, le sieur Perrot en 1501. René Perrot meurt en 1546 laissant comme héritière sa fille, Louise. Celle-ci épouse en 1573 un membre de la famille des Lemoyne des Ormeaux. Les nouveaux époux s'installent au château qu'ils rebaptisent \"la Tour des Ormeaux\". Sept générations de Lemoyne vont se succéder. Au début du XIXe siècle, le domaine devient la propriété du baron de Rascas qui épouse Marie Antoinette Lemoyne, dernière représentante de sa famille. En 1874, M. Thibaud de la Nicollière, conseiller général et membre du conseil municipal d'Orvault achète le domaine. En 1900, la fille de Thibaud de la Nicollière, seule héritière, épouse le vicomte Stéphen de Sécillon. De cette union naîtront trois filles : Guyonne, Donatienne et Nanine de Sécillon. En 1982 Nanine de Sécillon, dernière propriétaire privée du château, décède,et en octobre, le domaine est mis en vente. La commune l'achète, restaure la toiture et ouvre le parc au public.","architecture":"TOUR; le château possède un mur d'enceinte d'une hauteur de deux mètres et l'entrée se fait seulement par le côté nord ouest. De 1450 à 1487, le sieur Perrot réalise la rénovation des bâtiments et fait construire la chapelle qu'il intègre au système de défense avec la présence d'une tourelle. En 1501, René Perrot, à 19 ans succède à son père, et reprend les travaux. Il abaisse le mur d'enceinte et achève la construction de la chapelle. C'est avec le vicomte que l'édifice subit ses plus grandes transformations. Les façades sud et nord sont aménagées en style néo-gothique avec des toitures en poivrière et des gargouilles, il aménage les communs avec un puits central puis il édifie l'orangerie dans le style XVIIIe et crée l'allée principale et les bassins. La mort de Stéphen, en 1929, met fin aux travaux qui auront duré plus de vingt ans.","habitants":"Tour; Famille Perrot\r\n        \"","divers":"Tour 47° 17' 17,05\" Nord, 1° 37' 33,23\" Ouest","gps":"","images":["../image/image_44/44_Tour_Orvault_1.jpg","../image/image_44/44_Tour_Orvault_2.jpg","../image/image_44/44_Tour_Orvault_3.jpg","../image/image_44/44_Tour_Orvault_4.jpg","../image/image_44/44_Tour_Orvault_5.jpg","../image/image_44/44_Tour_Orvault_6.jpg"]},"Consult_chateau_formulaireb023":{"id":"Consult_chateau_formulaireb023","dept":"44","canton":"Guérande","commune":"La Turballe","nom":"Turballe_Bréhet","type":"Château","periode":"XV-XVII","histoire":"Trois châteaux  à la Turbaille, Brehet, Lauvergnac, Trevailly.                                                                               BREHET, est un manoir bâti à La Turbale, c'est une maison noble qui date du XVIIe au XIXe siècle. Son propriétaire initial était la famille de Trévelec qui en fit leur résidence principale. La seigneurie de Bréhet relève sous l'Ancien Régime de la sénéchaussée de Guérande, avec un droit de basse justice et de moyenne justice. Elle possède alors des illets dans les marais salants de Guérande et un moulin relevant de la Baronnie de Campzillon. L'architecture du manoir et de Brehet date du XVIIe siècle. L'historien Fernand Guériff en donne la description suivante : « un corps de bâtiment flanqué de deux pavillons identiques, toutes les pièces donnant au midi, alors qu'un long couloir au nord les desservait au rez-de-chaussée comme à l'étage. Les lucarnes des pavillons, avec leurs frontons arrondis, sont nettement de cette époque,  deux autres lucarnes se retrouvent à la façade nord. Quant à celles de la façade sud, elles ont été reconstruites ainsi que le toit à la suite d'un incendie, fin du XIXe siècle, dans le style à la mode de cette époque. Le linteau de la porte d'entrée, avec 2 blasons effacés, ne semble pas provenir de la construction initiale. Un beau puits octogonal en granit orne la cour : il porte sur une des faces un écusson mutilé sur lequel on reconnait la croix et l'étoile du blason des de Combles.","architecture":"LAVERGNAC, est de type Médiéval et Renaissance, attestée en 1395, avec un droit de basse justice et de moyenne justice. La famille de Lauvergnac se serait fondue, par alliance, au XVe siècle, à celle des Le Pennec. Pierre Le Pennec a été anobli  en 1433 par le Duc Jean V de Bretagne, pour services rendus, au cours du siège de Pouancé, en 1432. L'hébergement de Lauvergnac  entre dans son patrimoine en 1463 et il agrandit la seigneurie par rachat de terres aux alentours. En 1673, le domaine de Lauvergnac est vendu à Pierre de la Haye, seigneur de Silz. En 1749, Marie Vincente de la Haye le cèda à Jacques Anne de la Bourdonnaye, seigneur de Boishullin. Son fils, Anne François Augustin de La Bourdonnaye, né à Guérande en 1747, grandit à Lauvergnac. Lauvergnac va passer, par mariage, dans la famille Le Pourceau de Mondoret en 1773, puis, en 1855, il ira dans la famille de Geloes d'Elsloo. Cette dernière fait des travaux d'aménagement dans un style médiéval : construction de la galerie vitrée qui donne sur le parc, déplacement et surélévation d'une des deux tours crénelées qui était liée au mur denceinte, porte en faux arc, gargouilles,                                                                                                                           TREVALLY, au XIIIe siècle, dépendait de la baronnie de Campzillon. Jean de Muzillac, seigneur de Trévaly, voit ses biens saisis à la suite d'un procés intenté, en 1487, par le Duc François II de Bretagne, pour trahison à la cause bretonne (Traité de Montargis).  Le manoir de Trévaly va subir plusieurs transformations au cours du XVIIe siècle. A la Révolution française, il sera confisqué et vendu à deux habitants du Croisic. En 1922, il est à nouveau revendu au propriétaire du château de Bréhet. Celui-ci entreprend de grands travaux de restauration et fait adjoindre, sur la façade Ouest, le portail en arcade, du manoir de Kerslio de Guérande, prélevé en 1926.","habitants":"Brehet; Famille de Trévelec                                          Lauvergnac; famille de Pierre  Le Pennec,                                                                                          Trévally; famille de  Jean de Muzillac,\r\n        \r\n        \"","divers":"Brehet  grav-4-5 : 47° 20' 38\" Nord, 2° 28' 35\" Ouest                     Lauvergnac:  grav 1-2-3,  47° 21' 44\" Nord, 2° 30' 14\" Ouest                                           Trevally grav-6","gps":"","images":["../image/image_44/44_Turballe_Br%c3%a9het_1.jpg","../image/image_44/44_Turballe_Br%c3%a9het_2.jpg","../image/image_44/44_Turballe_Br%c3%a9het_3.jpg","../image/image_44/44_Turballe_Br%c3%a9het_4.jpg","../image/image_44/44_Turballe_Br%c3%a9het_5.jpg"]},"Consult_chateau_formulairef56f-3":{"id":"Consult_chateau_formulairef56f-3","dept":"44","canton":"Vallet","commune":"Vallet","nom":"Vallet","type":"Château","periode":"XV-XVIII-XIX","histoire":"Les châteaux et domaines de Vallet ont tous été rasés durant la Révolution. Les châteaux remplaçants datent du XIXe siècle, comme le château de la Botinière, la tourelle du logis Bregeon, du XVIe siècle,  de la Noë Bel-Air,  du Clairay, la seigneurie du Bois-Benoît du XVe siècle,  des Dorices,  de la Ferté, de Fromenteau et son labyrinthe des vignes, de la Haye-Tessante,  de la Pommeraie,  de Vénérand et d'Yseron.     \r\nA VALLET, existe actuellement  le château de la Botinière, du Cléray, de la Ferté, de Fromenteau,  de la Guipière,  de la Noë Bel-Air, dYseron.                                                                                                                           NOE-BEL-AIR, est reconstruit entre 1835 et 1837 par un élève de Lemot, Louis Joseph Chaigneau, influencé par les grands architectes nantais de l'époque Empire, Crucy et Ceineray, pour le compte d'Armand de Malestroit de Bruc de Montplaisir, sur les ruines du bâtiment brûlé.  La villa possède une loggia à ordre colossal toscan sur la façade antérieure de style très néo-palladien.  Son propriétaire actuel est le comte de Malestroit.  Cette maison noble fut détruite, par un incendie, durant les Guerres de Vendée.   L'orangeraie et les communs du château de la Noë Bel-Air datent de 1823-1826, est classé aux M.H. en 1974.                                                                                                                    A six km  au nord ouest à la Chapelle Heulin le château  CLAIRAY,  il date du 2ème quart du XIXe siècle. La propriété fut acquise en 1824 par Léon-Richard de la Vergne. Villa construite avant 1840 pour son fils Charles-Marie dans le style néo-classique.","architecture":"NOE-de-BEL-AIR,  construit en 1836 de style des villas palladiennes, construit à l'emplacement d'une maison noble du XVIIe siècle, détruite pendant la Révolution, reconstruction de l'ensemble de la Noë dans la première moitié du XIXe siècle. De  plan rectangulaire dont les extrémités sont en légère saillie, élevé sur un rez-de-chaussée   un étage et un attique surmonté d'un acrotère  qui dissimule le toit, la façade antérieure présente sur sa partie centrale une loggia à huit colonnes doriques occupant la totalité des deux niveaux supérieurs. La façade opposée s'ordonne autour d'un avant corps à quatre pilastres colossaux sommé par un fronton triangulaires à denticules. L'orangerie et les communs, bâtis sans doute vers 1823, sont ordonnés autour d'une cour carrée et construits selon le modèle toscan avec encadrements de briques  et un ensemble exceptionnel d'architecture rustique à l'italienne. L'Orangerie est le témoin de cette époque construite selon le modèle toscan avec encadrements de briques. Sa construction fut entreprise entre 1835 et 1837. Les orangeries sont implantées.","habitants":"Botinière, viticole. Cassemichère Cléray, Ferté, de Fromenteau, la Guipière, Noé-Bel Air, Yzeron\r\n        \"","divers":"Clairay grav-2 : 47° 09' 13\" Nord, 1° 14' 31\" Ouest                  Noe  Bel Air grav--3-4-5-8  : 47° 10' 42\" Nord, 1° 17' 16\" Ouest    Venerand grav- 6,                   Yseron :  grav-7                   47° 09' 44\" Nord, 1° 15' 56\" Ouest","gps":"","images":["../image/image_44/44_Vallet_1.jpg","../image/image_44/44_Vallet_2.jpg","../image/image_44/44_Vallet_3.jpg","../image/image_44/44_Vallet_4.jpg","../image/image_44/44_Vallet_5.jpg","../image/image_44/44_Vallet_6.jpg","../image/image_44/44_Vallet_7.jpg","../image/image_44/44_Vallet_8.jpg"]},"Consult_chateau_formulaire1cc3":{"id":"Consult_chateau_formulaire1cc3","dept":"44","canton":"Vallet","commune":"Vallet","nom":"Vallet_II","type":"Château","periode":"XVI-XVIII-XIX","histoire":"CLAIRAY, il date du 2ème quart du XIXe siècle. La propriété fut acquise en 1824 par Léon-Richard de la Vergne. Villa construite avant 1840 pour son fils Charles-Marie dans le style néo-classique (architecte non connu)                                                                                                                                                                                                                                                                                                                                                                                               YSERON c'est une belle demeure d'époque Directoire. Vous y trouverez des chambres d'hôtes. Les propriétaires du château d'Yseron Olivier et Ghislaine de Saint-Albin, seront heureux de vous accueillir dans leur maison de famille.                                                                                                            CASSEMICHERE, à quatre kilomètres à l'ouest à  la Chapelle Heulin, le  château date de 1601, pour Roland Giraud  Celui-ci est consul, puis échevin de la ville de 1620 à 1622,   En 1739, le domaine est vendu par une Giraud de la Tourelle à François Cottineau, négociant, échevin, consul de Nantes de 1749 à 1751. La famille Cottineau compte plusieurs marchands, très impliqués dans le commerce maritime, y compris la traite négrière. François Cottineau est procureur du Roi à l'Amirauté. La famille Le Loup de La Biliais en hérite peu avant la Révolution Française mais le châtelain et son épouse sont guillotinés sur la place du Bouffay, à Nantes, en 1794, pour avoir caché un prêtre réfractaire. La propriété est alors mise sous séquestre, puis racheté, plus tard, par leur fils. Durant le Second Empire, la propriété laissée à l'abandon est morcelée. Rachetée par un négociant en vin, Donatien Bahuaud, le château de la Cassemichère est rénové et remanié par ce dernier entre 1955 et 1960.","architecture":"POMMERAIE, On accède au château de la Pommeraie par une allée bordée de vieux chênes, le visiteur pénètre dans une cour intérieure. En face, se trouve le château de la Pommeraie, qui fut reconstruit entre 1843 et 1847, sur les ruines dune maison noble détruite pendant la Révolution. La maison de maître sétale sur 3 niveaux, reliés par des escaliers en bois, avec des salles de cours au rez-de-chaussée, et des chambres sur deux étages. Tout autour, les ailes qui faisaient autrefois office décuries ou de chapelle, abritent les commodités : un réfectoire et sa cuisine,  aux normes, insiste Jean-Pierre Simon, président de lassociation CFP La Pommeraie, une chaufferie  en conformité, des bureaux et de nombreuses salles de formation, de tailles variables, rappelant la récente vocation des lieux qui était un centre de formation.                                                                                                 FROMENTEAU, au château de Fromenteau, fief des Barin de la Galissonnière au XVIIIe siècle. Anne et Christian Braud, les maîtres des lieux représentent la quatrième génération de la famille Braud, les propriétaires. Et ils sont de formidables artisans de l'entretien de l'ensemble du site, un des bastions historiques du pays valletais.Le premier acte du château date de 1260. Il s'étendait sur 1 500 m² au sol. La Révolution française et les guerres de Vendée ont causé de gros dommages. Il reste les communs et les caves souterraines.  On parlait peu ou pas du petit patrimoine il y a 40 ans. On découvre des choses très intéressantes, souligne Joseph, Valletais d'adoption.","habitants":"Cassemichère, famille Cottineau                                          Fromenteau, famille Braud,                                                           Clairay; Léon-Richard de la Vergne\r\n        \"","divers":"Cassemichère  grav-1   47° 09' 44\" Nord, 1° 22' 13\" Ouest    Pommeraie  grav-3, 47° 09' 44\" Nord, 1° 15' 56\" Ouest Fromenteau-grav-1-2.","gps":"","images":["../image/image_44/44_Vallet_II_1.jpg","../image/image_44/44_Vallet_II_2.jpg","../image/image_44/44_Vallet_II_3.jpg"]},"Consult_chateau_formulaire85c2":{"id":"Consult_chateau_formulaire85c2","dept":"44","canton":"Ancenis","commune":"Vallon-de-l","nom":"Vallon_Erdre","type":"Château","periode":"XIV-XVI","histoire":"Deux châteaux à Vallon celui de Bourmond , de Ferronnays. BOURMOND, est un château bâti à Vallons-de-l'Erdre. Il date du XVIe siècle. Situé dans la Baronnie de Candé, à la lisière de l'Anjou et de la Bretagne, la seigneurie de Bourmont fut établie dès le XIVe siècle, en faveur des La Tour-Landry, puis Maillé de La Tour-Landry. Par l'alliance, en 1691, de Marie-Hélène de Maillé de La Tour-Landry (1670-1752) avec Marie-Henry, comte de Ghaisne (1662-1710), le château passa dans la famille de Ghaisne de Bourmont, à qui, il appartient toujours. En 1773, le château de Bourmont est le lieu de naissance de Louis Auguste Victor de Ghaisne de Bourmont, auteur de la prise d'Alger, en 1830 et, qui fut le lieu de son décès, en 1846. Cette conquête lui valut d'être nommé maréchal de France. En 1795, lors de la chouannerie, le vicomte de Scépaux y fit établir son quartier général. Le château de Bourmont est inscrit aux M.H. depuis 1993.","architecture":"FERRONNAYS,  le premier édifice nexiste plus, un château fort fut édifié au XIVe siècle et détruit sur l'ordre du roi Henri IV, vers 1598 et, par celui de Richelieu, vers 1618. Le pigeonnier, transformé en château d'eau, est le seul témoin du domaine primitif. Les plans dun nouveau château sont établis en 1764 par l'abbé Pierre Charles Gaignard, natif de Bonnuvre et principal du collège d'Ancenis. La main duvre pour la construction est fournie, sous forme de corvées, par la population des villages de la seigneurie, suscitant un mécontentement qui sexprime par exemple dans le cahier de doléances des habitants de Maumusson. Fortement endommagé sous la Révolution, vendu par lot comme bien national, la famille de la Ferronnays reconstitue la propriété au milieu du XIXe siècle. Le logis principal (la partie centrale du château), réduit avant restauration, inhabité, est démoli entre 1912 et 1914  dans le dessein de le reconstruire. Du fait de la guerre et de manque de fonds, ce projet nest pas réalisé. Mais les dépendances datant de 1765 sont restaurées entre 1906 et 1908. Le parc datant du XVIIIe siècle, l'actuelle propriété de la famille de Cossé-Brissac. Le château de la Feronnays est inscrit aux M.H., il fait partie des « Jardins de France ».","habitants":"Bourmond;  famille de Ghaisne de Bourmont,                       Ferronnays;  famille de la Ferronnays\r\n        \"","divers":"Bourmond: 47° 32' 41,41\" Nord, 1° 6' 3,39\" Ouest          Ferronnays   47° 31' 34\" Nord, 1° 11' 01\" Ouest","gps":"","images":["../image/image_44/44_Vallon_Erdre_1.jpg","../image/image_44/44_Vallon_Erdre_2.jpg","../image/image_44/44_Vallon_Erdre_3.jpg","../image/image_44/44_Vallon_Erdre_4.jpg","../image/image_44/44_Vallon_Erdre_5.jpg"]},"Consult_chateau_formulaire0484-2":{"id":"Consult_chateau_formulaire0484-2","dept":"44","canton":"Vertou","commune":"Vertou","nom":"Vertou","type":"Château","periode":"XV-XVII-XVII","histoire":"à Vertou le manoir de Salmonière,  de Porthereau, Bareille, Angebardière, Prémoire, Ebaupin,  Portillon et Aulnay.                                                          SALMONIERE, manoir construit au XVe siècle. La demeure subit des dommages en 1793, et seules quelques parties sont d'origine, a été habité par Charles Marionneau.                                                              PORTHEREAU,  date du XVe siècle, mais est refait au XIXe siècle ;  au XVIIIe siècle apparaît le manoir de La Noé Rocard qui doit son nom à Yves Rocaz, maire de Nantes.\r\nBAREILLE, manoir  du XVIIIe siècle, détruit par un incendie lors des combats en 1793\r\nANGEBARDIERE, reconstruit en 1856 pour l'industriel Théodore Dubigeon.\r\nFREMOIRE,  château  du XVIIIe-XIXe siècles,\r\nEBAUPIN,  château.\r\nPORTILLON, est un château bâti à Vertou, Il se situe sur les berges de la Sèvre nantaise.                                                                                                 AULNAY ou LAUNAY de la fin du XVIIIe siècle, propriété successive des familles Du Bot (aux XVIe  et XVIIe siècles), La Bourdonnaie, Mosneron (en 1785), GrandJouan (au XXe siècle). La propriété appartient depuis 1989 à Mr et Mme Clerfeuille. Monsieur Lieubeau, viticulteur, entretient les vignes situées autour de l'Aulnaye : il est propriétaire de quelques hectares situés à proximité du château et il fait sa mise en bouteilles dans le pressoir de l'Aulnay.","architecture":"ANGEBARDIERE, du  XVIIIe siècle, appartient, en 1855, à Théodore Auguste Dubigeon (1803-1875), fils d'Augustin Jean Baptiste Dubigeon (1769-1851) propriétaire des chantiers navals Dubigeon fondés en 1760 par Julien Dubigeon. Il est reconstruit vers 1856. \r\nFREMOIRE, de 1725. Propriété de la famille Pantin (du XVIe au XVIIIe siècle), de Joseph Charet (en 1720), de Claude François Lemoine (en 1791), est partiellement détruit par un incendie lors des combats de 1793. Après avoir été restauré par la famille Rousseau (amie de l'architecte Bourgerel qui aménagea la demeure et le parc), qui en était propriétaire, vers 1860, la demeure passe entre les mains de la famille Baillargeau  La \"Maison des appellations\" (syndicat des producteurs de vin) est logée aujourd'hui au château.                                        SALMONIERE,  du XV-XIXe siècle. Ce nom apparaît dans les écrits dès 1460. L'ancien édifice est partiellement détruit en 1793. Il ne reste que le porche d'entrée avec ses tourelles, et au fond de la cour au coin de la demeure un belvédère.\r\nPORTEREAU,  du XVI-XIXe siècle, situé route du Chêne à Rezé. Propriété de Gilles Courgeon (en 1567), de la famille Couperie (au XVIIe siècle), de M. Méry (au XIXe siècle), puis de la famille Lefèvre-Utile qui en a revendu une partie avec le logis, aux Pères Montfortains. On mentionne aussi les familles Lelardic de la Ganrie et Charles de Novion (1800-1864), cousin du général Lamoricière.  \r\nBAREILLE, du XVIIIe siècle, situé route de Portillon-aux-Pégers. La seigneurie  dépendait jadis de la vicomté de Rezé. Propriété de Jean Le Bonnetier (en 1723), de René Jean Andrieux en 1775. La demeure est restaurée à la fin du XVIIIe siècle par la famille Andrieux.","habitants":"Porthereau ;famille d' Yves Rocaz,                                   Bareille; famille Andrieux                                                                 Launay; familles Du Bot.                                                           Salmonières;  famille de  Charles Marionneau.       Agebardière;   Théodore Dubigeon.                                Aulnay; Familles Du Bot \r\n        \"","divers":"à Vertou le manoir de Salmonière,  de chatelière grav-4 de FremoirePorthereau, Bareille, Angebardière, Prémoire, Ebaupin,  Portillon grav-3  et Aulnay.  Verrerie grav-5","gps":"","images":["../image/image_44/44_Vertou_1.jpg","../image/image_44/44_Vertou_2.jpg","../image/image_44/44_Vertou_3.jpg","../image/image_44/44_Vertou_4.jpg","../image/image_44/44_Vertou_5.jpg"]},"Consult_chateau_formulaire9fa0":{"id":"Consult_chateau_formulaire9fa0","dept":"44","canton":"La Chapelle sur Erdre","commune":"Vigneux-de-Bretagne","nom":"Vigneux_Bretagne","type":"Château","periode":"XIV-XV-XIX","histoire":"Trois châteaux à Vigneux de Bretagne; Bois-Rignoux, Buron  et de Bretonnière.                                                                                                                                                  BOIS-RIGNOUX, en 1870, la famille Cosse-Duval, prospères industriels nantais, fit édifier, sur trente hectares de bois et prairies agrémentées de deux étangs, une belle maison de maître et sa chapelle attenante, situé à la Paquelais. En 1962, le château appartenait à monsieur et madame Egonneau, négociants en porcs, qui le vendirent à la Caisse Primaire d'Assurance Maladie de Nantes pour en faire une maison de convalescence.                                                                                                              BURON, le château du Buron, dont les travaux de construction débutèrent en 1345 pour s'achever en 1385, fut durant quatre siècles, la propriété des ducs de Rohan. En 1408, Béatrice de Clisson, femme d'Alain VIII, vicomte de Rohan, hérita de la châtellenie de Blain, le marquisat s'étendait sur 17 paroisses. En dehors de Blain et du Buron, les Rohan possédaient 34 autres seigneuries. A la suite de mariages, le château du Buron appartenait au XVIIe siècle, à Mme de Sévigné. La marquise de Sévigné y séjourna très souvent entre 1646 et 1689. Le château devient ensuite propriété des familles du Breil, Poullain, Brillet de Candé et Guibourg. Vers 1700, il fut vendu à la famille de la  Hersart de La Villemarqué qui le possède encore.","architecture":"BRETONNIERE; il n'existe malheureusement aucun document connu concernant la construction du château de la Bretonnière. Elle remonterait au XVe siècle. Il semblerait qu'il ait été un ancien pavillon de chasse des Rohan. La partie restante, la plus ancienne, est une petite tour du XVIe siècle. Le reste du château de la Bretonnière date des XVIIIe et XIXe siècle. Le château passa à la famille Charette de Tiersant en 1567, la propriété possédait à cette époque une chapelle. En 1850, la famille de Monti de Rezé en est propriétaire, ensuite le domaine passe à M. d'Izarn. En 1932, il appartient à la famille de la Grandière qui le possède encore.","habitants":"Boix-Rignoux; famille Cosse-Duval                          Bretonnière; famille Charette de Tiersan                                    Buron; Mme de Sévigné\r\n        \"","divers":"Trois châteaux à Vigneux de Bretagne; Bois-Rignoux grav -3-4, Burongrav-5-6  et de Bretonnière grav-1-2 -7-8  ;47° 20' 04\" Nord, 1° 44' 51\" Ouest","gps":"","images":["../image/image_44/44_Vigneux_Bretagne_1.jpg","../image/image_44/44_Vigneux_Bretagne_2.jpg","../image/image_44/44_Vigneux_Bretagne_3.jpg","../image/image_44/44_Vigneux_Bretagne_4.jpg","../image/image_44/44_Vigneux_Bretagne_5.jpg","../image/image_44/44_Vigneux_Bretagne_6.jpg","../image/image_44/44_Vigneux_Bretagne_7.jpg","../image/image_44/44_Vigneux_Bretagne_8.jpg"]},"Consult_chateau_formulaire59a8":{"id":"Consult_chateau_formulaire59a8","dept":"44","canton":"Vertou","commune":"Les Sorinières","nom":"Villeneuve_Sornières_44","type":"Abbaye","periode":"XIII-XV-XIX","histoire":"VILLENEUVE, les corps de Constance en 1200, de Guy de Thouars en 1213 et de leur fille Alix de Thouars en 1221 sont transplantés dans léglise de labbaye lorsque cette dernière est consacrée le 25 octobre 1223 par Étienne de La Bruère, évêque de Nantes, assisté des évêques dAngers, de Bretagne. La cérémonie se déroule devant un nombre important de barons : on note, parmi eux, Aimery VII, vicomte de Thouars, Amaury Ier de Craon, vicomte de Beaumont, sénéchal dAngers. Dans cette église abbatiale, reposeront également les corps de :  Guy de Thouars en 1213 à Chemillé, baillistre de Bretagne, troisième époux de Constance de Bretagne ;  Alix de Thouars en 1201-1221, duchesse de Bretagne, fille de Guy de Thouars et de Constance de Bretagne, et première épouse de Pierre Ier de Bretagne ; Nicole en 1232, seconde épouse de Pierre Ier de Bretagne ;  Yolande de Bretagne (1218-1272, comtesse de Penthièvre et de Porhoet, dame de Fère-en-Tardenois, fille de Pierre Ier de Bretagne et dAlix de Bretagne ;  Amicie de Coché 1235-1268, marquise de Souché, dame de Coché, de La Bénate et du Coutumier, première épouse dOlivier Ier de Machecoul, fils de Pierre Ier de Bretagne et de Nicole ;  Olivier Ier de Machecoul vers 1231-1279, seigneur de Machecoul, de La Bénate, du Coutumier, de Saint-Philbert-de-Grand-Lieu, de Montaigu et de La Garnache, fils de Pierre Ier de Bretagne et de Nicole ; Louise de Machecoul de 1276-1307, fille dOlivier Ier de Machecoul et dEustachie de Vitré ; Jean Ier de Machecoul vers 1255-1308, seigneur de Machecoul, de Coché, de La Bénate, de Bourgneuf, du Coutumier et de Bouin, fils dOlivier Ier de Machecoul et dAmicie de Coché.","architecture":"VILLENEUVE, très importante au XVe siècle, labbaye de Villeneuve est en partie détruite pendant la Révolution française et les guerres de Vendée. Labbaye na plus que six moines quand elle est vendue pendant la Révolution. L'église est ensuite détruite, les tombes des seigneurs cités plus haut sont profanées et leurs cendres sont jetées au vent. Abandonnée depuis la Seconde Guerre mondiale, elle est entièrement restaurée en 1977. La bâtisse actuelle date du début XVIIIe siècle et fut lancienne hostellerie des moines cisterciens.\r\nSitués sur le territoire de la commune des Sorinières, les bâtiments rénovés accueillent désormais un luxueux ensemble hôtelier (ainsi quun restaurant baptisé lÉpicurien) qui accueille parfois dillustres visiteurs, à limage du Dalaï-lama, lors de son séjour à Nantes du 15 au 20 août 2008.","habitants":"Villeneuve;  Étienne de La Bruère\r\n        \r\n        \r\n        \"","divers":"A Sornières l'abbaye de Villeneuve","gps":"","images":["../image/image_44/44_Villeneuve_Sorni%c3%a8res_44_1.jpg","../image/image_44/44_Villeneuve_Sorni%c3%a8res_44_2.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','44 — Loire-Atlantique'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
