                                                                                 BRUC, reconstruit aux XVe et XIXe siècles. Depuis Guethenoc de Bruc, parti du château en 1190 à la troisième croisade, le château de Bruc est dans la même famille depuis un millénaire. Aujourdhui, le château appartient à Antoine et Emmanuela de Bruc de Monplaisir, depuis dix ans.","architecture":"BEAULIEU, l'ancien manoir croulant fut quant à lui démoli en 1867 pour y faire passer la ligne de chemin de fer de Rennes à Redon, qui court au pied de la colline de la Garenne.                                                                                    BRUC, château de construction classique de deux niveaux sur plan rectangulaire toit en croupe recouvert de tuiles flanqués d'une tourelle sur un angle toit en poivrière.                                                                                                                    GRAND PONT-VEIX  C'est devenu une hôtellerie. Le château moderne se trouve à coté.                                                                                                             SAINTE-EMILIE, vous propose des chambres d'hôtes. Demandez Minot Luc, Il existe 3 châteaux à découvrir sur la commune : le château de Conquereuil.                                                                                                                      FRIGUEL est un château bâti à Guéméné-Panfao.","habitants":"Famille d'Antoine et Emmanuela de Bruc\r\n        \"","divers":"Plusieurs châteaux à Guémené-Panfao, dont celui de Guémené de Beaulieu a Garenne grav 1, du Boisfleury grav_2, de Conquereuil grav 3-4  de Brossay grav 5,  du Grand Pont-Veix, du Frigueil, du Bruc, de Juzet grav_3, de Trénon grav_7 et   de Tréguel  Grav_6  Friguel grav-8  ; 47° 37' 51\" Nord, 1° 49' 53\" Ouest","gps":"","images":["../image/image_44/44_Gu%c3%a9men%c3%a9_Panfao_1.jpg","../image/image_44/44_Gu%c3%a9men%c3%a9_Panfao_2.jpg","../image/image_44/44_Gu%c3%a9men%c3%a9_Panfao_3.jpg","../image/image_44/44_Gu%c3%a9men%c3%a9_Panfao_4.jpg","../image/image_44/44_Gu%c3%a9men%c3%a9_Panfao_5.jpg","../image/image_44/44_Gu%c3%a9men%c3%a9_Panfao_6.jpg","../image/image_44/44_Gu%c3%a9men%c3%a9_Panfao_7.jpg","../image/image_44/44_Gu%c3%a9men%c3%a9_Panfao_8.jpg","../image/image_44/44_Gu%c3%a9men%c3%a9_Panfao_9.jpg"]},"Consult_chateau_formulaire232a":{"id":"Consult_chateau_formulaire232a","dept":"44","canton":"Guérande","commune":"Guérande","nom":"Guérande","type":"Forteresse","periode":"XIII-XIV-XX","histoire":"A Guérande ville fortifié et château de Bissin, de Kerpordarmes et Villeneuve.                                                                                                                                                   GUERANDE, l'enceinte fortifiée au XIIIe siècle,  de la ville close, les remparts actuels  excède 1,4 km sont élevés à partir du XIIIe siècle. L'enceinte est renforcée ou reconstruite  par Guillaume du Verger, au lendemain du sac de Guérande en 1342. Afin déviter tout risque de destruction, les remparts sont classés M.H. en 1877.  Les dix tours (dont six subsistent), et les courtines datent du XVe siècle.  L'enceinte est percée de quatre portes : la porte de Saint Michel à l'est  déjà vers 1350, elle est réaménagée vers 1452., la porte Vannetaise au nord, la porte de Saillé au sud et la porte de Bizienne à l'ouest. Les portes Saint-Michel et Vannetaise sont flanquées de tours  aujourd'hui démantelées. Les portes Saillé et Bizienne sont surmontées de meurtrières. Les archères et canonnières datent du XIVe-XVe siècle.  Vers 1900, la porte Saint-Michel, alors hôtel de ville, fait lobjet dune importante restauration. A partir de 1970, la ville de Guérande engage des travaux de consolidation et de restauration sur les tours et les courtines. Aujourdhui, la ville assure la mise en valeur des remparts qui participent, avec le sel de Guérande, à sa notoriété. Une partie du chemin de ronde est accessible dans le cadre de la visite du musée du pays de Guérande, en effet, depuis 1928, la porte Saint Michel abrite le musée d'arts et traditions populaires appelé Château-Musée ou Musée du Vieux Guérande.","architecture":"KERPORDARMES, est un manoir construit au XVe siècle constitué d'un seul bâtiment rectangulaire avec, par niveau, une grande salle chauffée et une petite salle. Il constitue un témoin de l'architecture nobiliaire bretonne modeste, de cette époque. Jean Meschinot est le seigneur de Kerpodarmes à la fin du XVe siècle. Maître d'hôtel principal de la jeune duchesse Anne de Bretagne, il est également l'auteur de l'uvre littéraire. Les lunettes des Princes. Il a été déclassé en métairie, à la fin du XVIIe siècle, date de construction du château de Tuloc, qui se trouve à proximité.                                                                       VILLENEUVE, ce beau manoir date du XIIIe siècle et vous accueillera pour vos cérémonies privées ou professionnelles, dans un parc paysager de 12 Ha. Le site naturel protégé abrite des hérons.  A l'entrée de Guérande, et aux portes de La Baule, ce manoir du XIIIe siècle, propriété de monsieur Jean-François David.","habitants":"Ville de Guérande\r\n        \"","divers":"A Guerande ville fortifié et château de Bissin grav 9, de Kerpordarmes et Villeneuve grav 3-6-7.                  Kerpordarmes grav-7-8.     47° 20' 05\" Nord, 2° 27' 53\" Oues             Villeneuve : 47° 19' 41\" Nord 2° 25' 46\" Ouest","gps":"","images":["../image/image_44/44_Gu%c3%a9rande_1.jpg","../image/image_44/44_Gu%c3%a9rande_2.jpg","../image/image_44/44_Gu%c3%a9rande_3.jpg","../image/image_44/44_Gu%c3%a9rande_4.jpg","../image/image_44/44_Gu%c3%a9rande_5.jpg","../image/image_44/44_Gu%c3%a9rande_6.jpg","../image/image_44/44_Gu%c3%a9rande_7.jpg","../image/image_44/44_Gu%c3%a9rande_8.jpg","../image/image_44/44_Gu%c3%a9rande_9.jpg"]},"Consult_chateau_formulaire0509":{"id":"Consult_chateau_formulaire0509","dept":"44","canton":"Vertou","commune":"La Haie Fouassière","nom":"Haie_Fouassière","type":"Château","periode":"XV-XIX","histoire":"Deux châteaux à la Haie Fouassière celui de la Haies Fouassière , du Breil  et de Rochefort.                                                                                           BREIL,  bâti à la Haie-Fouassière, la construction date du XIXe siècle,  est une maison de vacances dotée d'une piscine extérieure ouverte en saison. Un parking privé est disponible gratuitement sur place. \r\nHAIE-FOUASSIERE, au Moyen-Age, était occupé par plusieurs seigneuries (La Haie, du Breuil ou Breil, de Rochefort, de La Ferronnière, de La Battardière, de La Fraubretière, du Hallay, de La Foliette) qui dépendaient de la châtellenie, puis du marquisat de Goulaine. La haute justice s'exerçait au château de Rochefort, situé à La Haie-Fouassière. La seigneurie de la Haie appartenait à Jean de Ridelière, sieur de Briacé, en 1480  son fils fut maître de l'artillerie du duc François II, en 1484. Les principales familles de notables de La Haie-Fouassière au milieu du XIXe siècle sont : Guisselin  à La Rairie et La Bretonnière, Cormerais  à La Carizière, Baudry du Plessis à La Ferronnière, de La Vauguyon au Patisseau, Hallouin  à Rochefort, de Lisle à La Giraudière, Boitard au Breil, Gourdon à La Batardière, Delhoumeau à La Gillière, Renaud à La Houssaye.","architecture":"ROCHEFORT, vers 1750-1760, propriété de Guillaume de Rochefort en 1426, de Louis de La Haye en 1484, puis des seigneurs de Montauban jusqu'au milieu du XVIIe siècle. La chapelle privée du manoir renfermait jadis une pierre tombale du XVe siècle représentant Guillaume de Rochefort et son épouse qui avaient offert pour l'église de Haie-Fouassière  une chaire avec bas-relief en bois sculpté, représentant le Christ entre les deux larrons. Le château actuel est édifié par la famille Goyon vers 1750-1760. Il devient ensuite la propriété successive des familles Halloin de La Penissière, Lelièvre de La Touche et Gallion de Saint-Sauveur .    La construction du château Rochefort date du XVIIIe siècle. Pour la 3ème fois, le propriétaire du château de Rochefort a confié de nouveau les clefs de sa cour d'honneur, pour fêter la Fête des Plantes, qui reflète avec magnificence la beauté de ces charmantes plantations.","habitants":"Haie; Famille de   Jean de Ridelière                                             Breil; famille  Boitard                                                                     Rochefort; Famille Guillaume de Rochefort \r\n        \"","divers":"Breil grav-1-2 Hallay grav -3  Rochefort grav-4: 47° 09' 23\" Nord, 1° 23' 53\" Ouest","gps":"","images":["../image/image_44/44_Haie_Fouassi%c3%a8re_1.jpg","../image/image_44/44_Haie_Fouassi%c3%a8re_2.jpg","../image/image_44/44_Haie_Fouassi%c3%a8re_3.jpg","../image/image_44/44_Haie_Fouassi%c3%a8re_4.jpg"]},"Consult_chateau_formulaire6f46":{"id":"Consult_chateau_formulaire6f46","dept":"44","canton":"Nantes","commune":"Nantes","nom":"Haultière","type":"Manoir","periode":"XV","histoire":"HAULTIERE en 1400 Guillaume Boislève fut le propriétaire initial. Michel Ragaud et son épouse Françoise d'Achon, seigneurs de la Haultière et de Lusançay, étaient propriétaires du manoir, en 1610. En 1661, Louis XIV, en visite pour présider les États de Bretagne, passa une nuit au manoir de la Hautière, en 1670 passa aux Nort descendants d'Agnès Prudance Ragaud   puis les  Carré de Lusançay l'achèta, en 1709 Nicolas Philippe Carré de Lusançay était commissaire de la Marine à Nantes. A la Révolution, elle en fut privée. Le manoir sera transformé en prison ou l'amiral Duchaffaut mourra, en 1794. Sous l'Empire, la famille Carré de Lusançay récupèra le manoir, en mauvais état. Il sera revendu par les héritiers de Nicolas Michel, dernier membre de la famille à être propriétaire et résident de la Hautière, décédé au manoir en 1791. Il  sera racheté par la famille Saint-Pern, puis, en 1825, par Édouard Thominé C'est une demeure bourgeoise avec ses dépendances. En 1863, la propriété passera aux mains de la famille Gaboriaud. Le manoir de la Hautière devient, en 1870, lors de la guerre franco-allemande, le lieu de rassemblement des volontaires nantais de l'Armée de la Loire. En 1883, Mme Lac devint propriétaire, puis, par héritage, il sera la propriété de sa fille, Mme Perodeau. René Foucaud, Pierre Charette, la marquise de La Tullaye furent aussi propriétaires du manoir. La commune de Chantenay-sur-Loire rachète la propriété, en 1906, et y installe les services d'octroi.  Le manoir de la Haultière servit de lieu de rassemblement pour des festivités de la communauté des Bretons de Haute-Bretagne.","architecture":"HAULTIERE, il s'agit de 3 vieilles maisons accolées qui constitue l'ancien château couverts de toits à forte pentes, fenêtres à meneaux et les combles éclairés par des lucarnes en tuffeau  dont les pignons triangulaires sont ornés de crochets décorés de choux frisés, sur la façade sud subsiste une tour hexagonal aujourd'hui découronnée dont le sommet servait de polate forme de guet. Le manoir de la Haultière a été construit à la fin du XIVe siècle, situé rue Claude-Guillon-Verne, à Nantes. Ce petit manoir seigneurial comporte des parties dont la construction remonte à la fin du XIVe siècle. C'est une demeure bourgeoise avec ses dépendances, après 1945, le manoir de la Haultière fut laissé à l'abandon et occupé de manière illégale par des marginaux. En 1968, l'Union Compagnonnique réhabilita le site, et y installa un lieu d'exposition des uvres et de vieux outils des « Compagnons du Tour de France des Devoirs Unis », y compris pour des métiers depuis disparus. Le manoir de la Haultière a été inscrit à l'inventaire supplémentaire des M.H. le 7/01/1926.","habitants":"Nicolas Philippe Carré de Lusançay \r\n        \r\n        \r\n        \"","divers":"Haultière 47° 12' 10\" Nord, 1° 34' 58\" Ouest","gps":"","images":["../image/image_44/44_Haulti%c3%a8re_1.jpg","../image/image_44/44_Haulti%c3%a8re_2.jpg","../image/image_44/44_Haulti%c3%a8re_3.jpg","../image/image_44/44_Haulti%c3%a8re_4.jpg"]},"Consult_chateau_formulaire1eba-2":{"id":"Consult_chateau_formulaire1eba-2","dept":"44","canton":"Vertou","commune":"Treillières","nom":"Haut_Gesvres","type":"Château","periode":"XIX","histoire":"HAUT-GESVRES dit manoir de la Rivière,  du temps de sa splendeur, il fut la résidence de propriétaires fortunés : Élise et Pierre-Joseph Maës négociants-armateurs nantais, Edmond Doré-Graslin  homme d'affaires, député et maire de Treillières, Paul Bergue négociant, vice-consul d'Allemagne, Étienne Sébert ingénieur agronome, maire de Treillières. En 1956, ce dernier lèguera la propriété à une congrégation religieuse nantaise qui y créa un centre d'accueil pour jeunes filles en difficulté. Mais en 1977, un litige concernant le legs éclate entre la fille d'Étienne Sébert et ladite congrégation. Au coeur d'un imbroglio judiciaire, le Haut-Gesvres sera abandonné, squatté, pillé et saccagé pendant plus de 12 ans. En 1990, l'héritière obtient qu'il soit fait don du parc et du château à la commune de Treillières. Depuis un quart de siècle, si la commune s'est préoccupée d'aménager le parc et de rénover certains bâtiments annexes, le château est resté dans son état délabré. Émile Savary, maire de 2001 à 2012, tenta, en vain, de le réhabiliter.","architecture":"HAUT -GESVRES, il est situé au coeur de la Vallée du Gesvres. La construction du château du Haut-Gesvres en 1836. Cette fière demeure bourgeoise, plantée comme un fantôme, au milieu d'un parc public de 7,5 ha, est en cours de réhabilitation. Le château du Haut-Gesves était à l'abandon depuis près de 40 ans, avec ses façades taguées et ses ouvertures murées. Construit en 1837, agrandi en 1867, le manoir de la Rivière, connu sous le nom de château du Haut-Gesvres, a vécu bien des péripéties. Du temps de sa splendeur,      le domaine, laissé à son triste sort depuis 38 ans, le manoir ne voit toujours rien venir. Faudra-t-il se résoudre à le détruire afin de réveiller les consciences des élus et des habitants, à l'invitation de François Allard, un groupe de citoyens vient de créer l'association Renaissance du Haut-Gesvres. Renaissance du Haut-Gesvres vient de mettre en ligne, sur son site, un projet de réhabilitation. Alain Royer se félicite de l'initiative.  La création de l'association et ses propositions nous donnent à nouveau l'envie de croire à une possible rénovation , a récemment déclaré le maire. Une chose est sûre. Rien ne pourra être entrepris, sans le feu vert de la commune, propriétaire du site.","habitants":"Famille d' Étienne Sébert\r\n        \"","divers":"Haut Gesvres 47° 19' 51\" Nord, 1° 37' 27\" Ouest","gps":"","images":["../image/image_44/44_Haut_Gesvres_1.jpg","../image/image_44/44_Haut_Gesvres_2.jpg"]},"Consult_chateau_formulaire0956":{"id":"Consult_chateau_formulaire0956","dept":"44","canton":"Ancenis","commune":"Varades la chapelle st-Sauveur","nom":"Jallière","type":"Château","periode":"XIX","histoire":"JALLIERE, le premier château, bâti sur le site de la Basse Jallière, plus ou moins détruit à la Révolution, appartenait  à la famille Le Bell.  En effet tous les membres de la famille sont à ce jour inhumés sous la chapelle et les emplacements sont prévus pour lavenir.  Le château, tel quil est aujourdhui, a été achevé par Thérèse de Perrusse des Cars dAnthenaise, femme de Charles dAnthenaise, vers 1880-1890. Cette famille est encore propriétaire de la Jallière à ce jour.","architecture":"JALLIERE, le premier château, bâti sur le site de la Basse Jallière, plus ou moins détruit à la Révolution. Cétait un château fort avec quatre grosses tours, château défensif à la frontière de lAnjou et de la Bretagne. Il en reste lescalier central. Après la Révolution, construction à lemplacement actuel de la Jallière, dun petit château, dune orangerie et de la chapelle (de 1815 à 1820 environ).La chapelle date de 1820. Cest une chapelle funéraire, doù lautel noir.","habitants":"Famille Le Bell\r\n        \"","divers":"Madeleine 47° 22' 50\" Nord, 1° 01' 12\" Ouest","gps":"","images":["../image/image_44/44_Jalli%c3%a8re_1.jpg","../image/image_44/44_Jalli%c3%a8re_2.jpg","../image/image_44/44_Jalli%c3%a8re_3.jpg"]},"Consult_chateau_formulaireb077":{"id":"Consult_chateau_formulaireb077","dept":"44","canton":"Nort sur Erdre","commune":"Joué sur erdre","nom":"Joué_sur_Erdre","type":"Château","periode":"XVII-XVIII","histoire":"trois châteaux à Joué  celui de la Chauvelière (voir article), de Lucinière et de Prévenchères pas d'information pour ce dernier.                                                                                                                              LUCINIERE, en 1460 appartenait  à Pierre de Cornulier La construction de Lucinière date des XIVe-XIXe siècles. Le château a abrité un haras, appelé « le haras de Lucinière ». En 1485, le château de Lucinière est vendu par la famille Montfort-Laval à Pierre Landais. Le nom de la seigneurie était alors « Roche-en-Nort », qui était alors sous la dépendance de la seigneurie de La Roche-Bernard. Le château appartiendra ensuite au Cardinal Robert Guibé. Les fortifications qui entouraient le château furent démolies en 1589. Le Conseil de la Ligue voulait la démolition du château, mais la famille Cornulier fit appel à la duchesse de Mercur et obtint l'annulation de la décision. Le château subira alors 3 modifications, de 1681 à 1682. Hippolyte de Cornulier-Lucinière (1809-1886), militaire et homme politique français René de Cornulier (1811-1886), officier de marine et un homme politique français, d'orientation monarchiste, né au château de Lucinière.  Adolphe Le Gualès de Mézaubran, est venu à Lucinière par mariage en 1884, avec Marie-Thérèse de Cornulier (1865-1903). Durant l'occupation, le comte et la comtesse Le Gualès de Mézaubran, propriétaires du château de Lucinière, protègèrent 10 Juifs, dont plusieurs enfants. Ils reçurent, le 10 octobre 1999, la médaille des Justes, décernée par Yad Vashem. Sa chapelle, son orangerie, sa salle à manger et son décor intérieur sont classés aux M.H. depuis cette date. Le château de Lucinière est classé aux M.H. depuis le 9/12/1985.","architecture":"LUCINIERE, le château de style Renaissance, de plan en U trois corps de logis  à deux niveaux encadré de tours, sera augmenté par un corps de logis central et un fronton regardant vers l'Erdre. André Le Nôtre, jardinier du roi, a élaboré les avenues du château de Lucinière. A la même période, André Le Nôtre, jardinier du parc royal de Versailles, vint tracer les avenues. Fin du XVIIIe siècle, le château de Lucinière fut pillé et incendié. Il ne reste de l'ancienne demeure que 3 tourelles faisant partie de l'actuel château et une petite chapelle qui renferme quelques tombeaux de famille.","habitants":"Famille Cornulier \r\n        \"","divers":"Chauvelière grav-2    Prévenchères grav-1  Lucinière grav-3-4-5-6               Joué ; 47° 28' 59\" Nord, 1° 27' 56\" Ouest","gps":"","images":["../image/image_44/44_Jou%c3%a9_sur_Erdre_1.jpg","../image/image_44/44_Jou%c3%a9_sur_Erdre_2.jpg","../image/image_44/44_Jou%c3%a9_sur_Erdre_3.jpg","../image/image_44/44_Jou%c3%a9_sur_Erdre_4.jpg","../image/image_44/44_Jou%c3%a9_sur_Erdre_5.jpg","../image/image_44/44_Jou%c3%a9_sur_Erdre_6.jpg","../image/image_44/44_Jou%c3%a9_sur_Erdre_7.jpg"]},"Consult_chateau_formulaire9092":{"id":"Consult_chateau_formulaire9092","dept":"44","canton":"Guérande","commune":"Assérac","nom":"Karougas","type":"Château","periode":"XVI-XIX","histoire":"KAROUGAS,  est un manoir bâti à Assérac. Deux compagnons du chef normand Bernard  fondateur de La Roche-Bernard, selon la tradition créent, au XIe siècle un oratoire à Pen-Bé. Ils s'établissent à Faugaret. Jusqu'au XIIe siècle, c'est là que les seigneurs d'Assérac résident. Ensuite, le siège de la seigneur se situe à Herbignac. Le territoire fait partie des possessions des familles de Rochefort et de Rieux. En 1574, Jean de Rieux est fait marquis d'Assérac. Le marquisat passe aux mains de Nicolas Fouquet de 1656 à 1658, avant de revenir à la maison de Rieux. En 1679, Jean-Gustave de Rieux vend son marquisat à la famille Lopriac. La dernière marquise de la lignée, Félicité de Lopriac, est guillotinée en 1794, et le dernier seigneur d'Assérac, Louis Charles Marie de Rieux d'Assérac, est fusillé en 1795.","architecture":"KAROUGAS, après avoir été brûlée en 1590, lancienne motte féodale a été reconstruite en quatre périodes soit 1650, 1714, 1820 et 1890. Les bâtiments encadrent une belle cour dhonneur de 3000 m², abritée du vent et exposée au soleil couchant. Quatorze lucarnes habillent les toitures auxquelles sajoutent des sculptures notamment celle de lAnge Gabriel envoyé par Dieu dans la légende sur la masse darmes des sires de Kerougas. Le manoir de Kerougas a été restauré à partir de 1970 et transformé en lieu de réceptions en 1990 avec quatre salons dune surface totale de 200 m² pouvant accueillir 200 personnes assises pour le dîner, et avec le pavillon Saint-Hubert de 100 m² pour le cocktail si le temps est incertain.","habitants":"Famille Lopriac.\r\n        \r\n        \"","divers":"Kérougas: 47° 25' 48\" Nord, 2° 23' 21\" Ouest","gps":"","images":["../image/image_44/44_Kerougas_1.jpg"]},"Consult_chateau_formulaire74dc":{"id":"Consult_chateau_formulaire74dc","dept":"44","canton":"","commune":"La Baule -Escoublac","nom":"La_Baule_Escoublac","type":"Château","periode":"XV-XIX","histoire":"LESNERAC, le château de La Baule, anciennement château de Lesnerac, fut construit au XVe siècle sous légide de grandes familles seigneuriales.  Le château actuel existe déjà partiellement en 1460, étant lancienne seigneurie de la famille Le Pennec. Il passe ensuite en la possession de la famille Lesnerac puis en celle du comte de Sesmaisons de 1818 à 1836. Il s'agit du début du lotissement de la future station balnéaire de La Baule. En 1844, Jean-Alexandre Cavoleau écrit : « le château de Lesnerac, dont l'aspect console de la vue des dunes, était autrefois la seigneurie des deux prieurs d'Escoublac et de Saint-André-des-Eaux ». À son tour, le baron de Frénilly le décrit en 1908 : « Lesnérac, gros vieux château entouré de futaies qui seraient belles si le vent le permettait, est moitié élégant et rajeuni, moitié antique et confortable ». les propriétaires  de 1553 à 1999,  les Drezeuc, les le Pennec, les Sesmaisons, les Monti, Baronne du Chesne de Denant, Marquis de Moulins de Rochefort  et Jean-Yves Bonfils en 1999.    A la Baule le manoir de Marie Louise relais et châteaux","architecture":"LESNERAC.  les écuries de la ferme sont plus récentes que le château puisqu'elles datent du XIXe siècle. Une des fenêtres du château arbore une coquille Saint-Jacques.\r\nUn parc de jeux a s'est installé en 2016 dans le parc  ainsi qu'un  golf.","habitants":"Marquis de Moulins de Rochefort\r\n        \"","divers":"Lesnerac        Castel-Marie grav-1-2 Labaule-Lesnerac grav-3 -4  la Soudraye grav_5      Lesnerac  47° 10' 38\" nord, 2° 28' 03\"ouest","gps":"","images":["../image/image_44/44_Labaule_Escoublac_1.jpg","../image/image_44/44_Labaule_Escoublac_2.jpg","../image/image_44/44_Labaule_Escoublac_3.jpg","../image/image_44/44_Labaule_Escoublac_4.jpg","../image/image_44/44_Labaule_Escoublac_5.jpg"]},"Consult_chateau_formulaire572b-2":{"id":"Consult_chateau_formulaire572b-2","dept":"44","canton":"La Chapelle sur Erdre","commune":"Sucé-sur-Erdre","nom":"Launay_Sucé","type":"Château","periode":"XV-XVI","histoire":"Quatre châteaux à sucé sur Erdre; Granchamps, de Launay et de Chalonge à Heric mis à part Launay pas d'information de ces châteaux.                                                                                                    .LAUNAY, situé route de Petit Mars, a été édifié en 1471 pour Jean du Perray sur une terre appartenant aux évêques de Nantes. Propriété de François de La Henriays en 1573, puis d'Olivier de Carheil en 1609. Les de Carheil se sont alliés aux de Cadaran, Poulpiquet du Halgouet et de Goué. On a probablement eu tendance à exagérer, à la suite de linventaire et des rapports du commissaire Pierre Pont, lampleur des dégâts causés au château de Launay par lincendie allumé par Pinard et sa bande, du moins en ce qui concerne le bâtiment. Celui-ci na pas eu à être reconstruit, comme ce fut le cas de nombreux châteaux incendiés durant la Révolution mais simplement restauré. Et la restauration ne lui a pas fait perdre son caractère dorigine. C'est un bâtiment homogène, qui conserve lélégance simple, les proportions très justes et la disposition intérieure en enfilade traditionnelle, propres aux constructions du début du XVIIIe siècle, en effet, la première mention dune cérémonie célébrée dans la chapelle remonte à 1712. Mais il existait déjà un château à Launay depuis au moins le XVe siècle.","architecture":"LAUNAY, le corps de bâtiment principal est prolongé  dune aile courte, sans décrochement en plan, mais plus basse, coiffée dun toit à croupe, mais de pente plus forte que le corps principal, percée douvertures plus petites et avec des linteaux en bois. Il se pourrait que cette aile soit le reste du manoir ayant précédé le château actuel ; on la daterait volontiers du XVIe siècle. A lautre extrémité du château, un édifice bas, de plan carré, coiffé en pavillon était sans doute la loge du concierge, laccès se faisait par une large avenue dont laxe était parallèle à celui du château et qui débouchait de ce côté. Lancienne avenue subsiste sous laspect dune sorte de levée. Dautres bâtiments délimitaient la cour au sud, en retour déquerre vers lEst par rapport au précédent et dautres annexes plus petites, se trouvaient sur les deux autres côtés de la cour, la petite annexe que lon voit encore de ce côté, à quelque distance de la façade du château, semble avoir été bâtie à lemplacement dune annexe ancienne. On voit aujourdhui dautres communs, au Nord du château, daxe perpendiculaire à sa façade Est. La partie de ces communs la plus éloignée de la façade du château abritait une écurie de la seconde moitié du XIXe siècle. Mais la partie la plus proche du château est ancienne. Elle date probablement de la même époque que le château ; sa charpente est magnifique. Cette remise abrite aujourdhui un pressoir à long fût qui daterait du XIXe siècle; on ne voit plus guère de pressoirs de ce type à Sucé. Un chêne superbe se trouve du côté de ces communs, près de lentrée actuelle du parc. En vis-à-vis de la façade Ouest du château se trouve un théâtre de verdure.","habitants":"Famille de Carheil \r\n        \"","divers":"châteaux à sucé sur Erdre; Granchamps grav 1-2-3-4, de Launay grav-6 et de Chalonge à Heric grav-5","gps":"","images":["../image/image_44/44_Launay_Suc%c3%a9_1.jpg","../image/image_44/44_Launay_Suc%c3%a9_2.jpg","../image/image_44/44_Launay_Suc%c3%a9_3.jpg","../image/image_44/44_Launay_Suc%c3%a9_4.jpg","../image/image_44/44_Launay_Suc%c3%a9_5.jpg","../image/image_44/44_Launay_Suc%c3%a9_6.jpg"]},"Consult_chateau_formulaire74c1":{"id":"Consult_chateau_formulaire74c1","dept":"44","canton":"Nort sur Erdre","commune":"le Cellier","nom":"Le_Cellier","type":"Château","periode":"XIV-XVI-XIX","histoire":"A le Cellier le château de la Forêt, de Gérardière, de Vignette, la couronne, le prieuré st-Philibert et les vestiges de Coindassière.                                                                           La VIGNETTE  est inscrit au titre des M.H.  La Forêt, construit vers 1815. Les Folies Siffait sont un labyrinthe de terrasses et d'escaliers, envahi par la nature, édifié de 1816 à 1830 par Maximilien et Oswald Siffait ; le site, en restauration, qui surplombe la Loire est l'occasion de balades nostalgiques.  « Villa Roy », villa construite sur la Loire au milieu du XIXe siècle pour la famille Pichery, transmise à leurs descendants, les Roy, qui l'habitent jusqu'à la mort de Mlle Augustine Roy, qui la donne à sa nièce Marie-Joseph Ecomard ; celle-ci la vend à la commune qui la rase pour créer un promontoire sur la Loire et un jardin public.                                                                                                                       La GERARDIERE du XIXe siècle, ancienne propriété de la famille Guillet de La Brosse, de Louis-François de Tollenare et de la famille Siffait.  Du Cerny, propriété de la famille Couillaud.\r\nPE-BERNARD, manoir du XVIIe siècle, propriété de la famille Hay de Slade, Viot, Couillaud et Delaunay.  Villa Château-Guy », du XIXe siècle, ancienne propriété du général Louis-Étienne Thouvenin, de la famille Juchault des Jamonières. Villa Saint-Méen », construit au XXe siècle pour Francis Athimon, devenue par la suite propriété de Robert Diat                                                                                                                                 FORET, monsieur Perraudeau. Une autre source l'attribue aux frères Fonteneau, qui étaient des armateurs nantais. Appelé le château de La Forêt, il se rapprocherait surtout des \"Folies\" de la région nantaise.","architecture":"FORET, situé sur la route de Ligné, la Forêt est de style néoclassique. Le château de La Forêt a été construit de 1812 à 1814, par un entrepreneur de Nantes, A l'instar des \"malouinières\" du côté de Saint-Malo, ou des \"chartreuses\" dans le Bordelais, les Folies nantaises sont de magnifiques maisons de campagne édifiées par de riches négociants, armateurs, ou magistrats de la seconde moitié du XVIIIe (le Grand Blotereau en est un bel exemple). Elles marquent d'abord la réussite sociale de leurs propriétaires et les distinguent des catégories inférieures du commerce ou du petit négoce. Généralement, la folie est au cur d'une exploitation agricole ou viticole qui rapportait des revenus complémentaires. Le château de La Forêt a accueilli entre 1942 et 1945 une soixantaine de garçons réfugiés des bombardements de St-Nazaire et de Nantes. Le Poète René Guy Cadou, y écrira son seul et unique roman \"La maison d'été\", véritable testament spirituel, inspiré par les lieux.                                                                                                        VIGNETTE manoir, fut construit à partir de 1881 dans un style mêlant l'inspiration flamboyante du XVe siècle au mouvement néo-gothique. Le propriétaire fit appel à l'architecte Evariste Simon, mais cette belle demeure porte véritablement l'empreinte du maître des lieux qui attacha un soin particulier au second uvre et en particulier aux éléments de ferronnerie. La conception globale de la maison est inspirée de l'imagerie médiévale et des fantaisies de la nature. Situé sur un site naturel, le manoir de la Vignette s'accompagne d'un jardin paysager aménagé à flanc de coteau,","habitants":"Foret;  Monsieur Perraudeau.\r\n        \"","divers":"A le Cellier le château de la Forêt grav-2, de Gérardière-3, de Vignette; la Couronne grav-5 , leprieuré st-Philibert grav-4 et les vestiges de Coindassiere  grav-1. Foret 47° 19' 13\" Nord, 1° 20' 43\" Ouest","gps":"","images":["../image/image_44/44_le_Cellier_1.jpg","../image/image_44/44_le_Cellier_2.jpg","../image/image_44/44_le_Cellier_3.jpg","../image/image_44/44_le_Cellier_4.jpg","../image/image_44/44_le_Cellier_5.jpg"]},"Consult_chateau_formulaireda2e":{"id":"Consult_chateau_formulaireda2e","dept":"44","canton":"Vallet","commune":"Le Loroux Bottereau","nom":"Loroux_Bottereau","type":"Château","periode":"XII-XVI-XIX","histoire":"A Loroux Bottereau les vestiges de Loroux; de Dixmèrie, de Berrière de Vrillière de Divattes.                                                                                    LOROUX-BOTTEREAU,   château appartenant à la famille Botterel au XIIe siècle.  Le fief appartient ensuite aux Machecoul, puis à Pierre Landais, trésorier du Duc de Bretagne, François II.  Son histoire remonte au XIIe siècle. Il a été successivement  la propriété du seigneur Botterel, puis à la Maison de Machecoul, de Gilles de Rais et de Pierre Landais (décédé en 1485). Ce dernier a fait reconstruire le château, qui passera ensuite entre les mains de la famille de Goulaine, puis de la famille de Rosmadec.                                                                                                               DIXMERIE, ancien domaine seigneurial sur plate forme entourée de fossés en eau, remontant au XVIIe siècle. Le domaine s'accompagne de communs. Il est occupé, pendant la guerre de Vendée, par le général Kléber qui l'incendie avant de se replier. Entre 1796 et 1809, l'architecte François Léonard Seheult le reconstruit. A l'intérieur les décors datent également de cette époque.                                                                                                                                                                         BERRIERE,  le château de la Berrière est un édifice du XVIIIe siècle, construit sur une plateforme médiévale, entourée de douves en eau. Le corps de logis est reconstruit sous lEmpire après avoir été incendié en partie en 1794 pendant les guerres de Vendée.\r\nAu début du XXe siècle notre ancêtre Joseph de Bascher, peintre amateur, modifie la symétrie néoclassique du château en transformant les combles de laile ouest en un atelier dartiste surmontée dune terrasse.","architecture":"LOROUX-BOTTEREAU,  Pierre Landais fit aussi construire un nouveau château, dont il subsiste encore deux tours qui se mirent dans létang, restaurer les fortifications de la ville, dont les 700 à 800 mètres de murailles étaient percées de cinq portes Elle permettait de voir au loin, de faire «le guet», doù le nom de la voie qui va de la rue des Forges à la place Bretagne : la rue de la Guetterie.                                                           VRILLIERE; à cinq kilomètres au nord à la chapelle basse-mer, château   reconstruit au début du XVIIe siècle à partir d'un logis de la fin du XVe siècle. L'ensemble s'articule autour d'une cour rectangulaire à laquelle on accède par un portail de style classique. Au sud-Est du jardin se trouve un pigeonnier cylindrique qui a perdu sa coupole en pierre de taille, mais qui conserve ses boulins en pillettes de terre cuite. et à deux kilomètres à l'est de la chapelle le château de DIVATTES  trois manoirs à Divattes sur Loire; Berrière, Mazure et Monderie.  Pierre LANDAIS, le chateau a succédé à plusieurs châteaux. Il ne reste aujourd'hui que ces deux tours comme vestiges. Le château de Pierre Landais était de forme rectangulaire (32m X 35m). Il possédait 6 tours et 2 tours permettant d'accèder au pont-levis. Le château fut rebâti en 1474, pour Pierre Landais. Ses tours et murailles étaient couronnées de créneaux et mâchicoulis, et surmontées d'une courtine couverte formant un étage en saillie dans lequel pouvaient circuler les défenseurs en cas de siège. Au pied des vestiges du château, une plaque explicative retrace aujourd'hui l'histoire. Sur l'une des tours flotte le drapeau de Bretagne et l'oriflamme aux armes de Pierre Landais. Visite : Accès libre toute l'année.","habitants":"Loroux; Famille de  Pierre Landais\r\n        \"","divers":"A Loroux Bottereau les vestiges de Loroux grav -1 ; de Dixmèrie,  de Gauvelière grav-8 de Berrière-grav 2-3-4-5, de mouchetière grav 7 de Vrillière de Divattes  grav-6 -9 .  Pierre Landais 47° 14' 20\" Nord, 1° 20' 52\" Ouest","gps":"","images":["../image/image_44/44_Loroux_Bottereau_1.jpg","../image/image_44/44_Loroux_Bottereau_2.jpg","../image/image_44/44_Loroux_Bottereau_3.jpg","../image/image_44/44_Loroux_Bottereau_4.jpg","../image/image_44/44_Loroux_Bottereau_5.jpg","../image/image_44/44_Loroux_Bottereau_6.jpg","../image/image_44/44_Loroux_Bottereau_7.jpg","../image/image_44/44_Loroux_Bottereau_8.jpg","../image/image_44/44_Loroux_Bottereau_9.jpg"]},"Consult_chateau_formulaire6780":{"id":"Consult_chateau_formulaire6780","dept":"44","canton":"St-Philibert de Grand -Lieu","commune":"Légé","nom":"Légé","type":"Château","periode":"XVII","histoire":"Deux châteaux à Légé le Bois-Chevalier et le Retail                                            BOIS-CHEVALIER, l'édifice fut élevée en 1655 pour Olivier du Bois Chevalier, écuyer, échevin, président du tribunal de Nantes; son fils, Charles-César Chevalier, conseiller du roi, devient maire de Nantes entre 1676 et 1678. Cette seigneurie de Bois Chevalier sera érigée en châtellenie en 1666, en faveur de Hugues Olivier Chevalier. En 1793, la propriété est occupé par le chef vendéen Charette lors des Guerres de Vendée. Reconstruit en 1800.La propriété appartient à la famille Lepage en 1781. En 1965, le château servit au tournage du film \"le Tonnerre de Dieu\" avec Jean Gabin, Michèle Mercier et Robert Hossein.                                                                                                                                  RETAIL, fut la propriété de la famille de Saint-Hilaire, seigneurs de Grand Landes et du Retail en 1583, , et des familles Gaignard, de Germond, Baudry d'Asson et Baudry, de la famille Goulard par le mariage de Marie de Saint-Hilaire avec René Goulard en 1646. Au XIXe siècle les Baudry d'Asson en hérite.En 1863, la Marche du Retail fut rattachée à Legé Il est vendu une première fois en 1902, puis à nouveau en 1969 à la famille des propriétaires actuels.","architecture":"BOIS-CHEVALIER, le château de style classique, entouré de douves en eaux, est construit en granit couvert d'enduit. Il est constitué d'un pavillon central autour duquel les façades sont organisées symétriquement, et est constitué de six pavillons.   se compose d'un corps de logis rectangulaire, le central avec un dôme à clochetons dominée par un élégant campanile le tout encore entouré de douves. Cette belle demeure porte véritablement l'empreinte du maître des lieux qui attacha un soin particulier au second uvre et en particulier aux éléments de ferronnerie. La conception globale de la maison est inspirée de l'imagerie médiévale et des fantaisies de la nature.                                                                                                     RETAIL, sest développé autour dune ancienne forteresse avancée du Poitou face à la Bretagne. On y voit une tour du XIVe ou XVe siècle et un ensemble imposant de bâtiments construits aux XVe, XVIe et XVIIe siècles disposés sur trois côtés dune cour où lon pénètre par un porche. Deux autres porches donnent accès à la ferme. La façade principale du bâtiment date du XVIIe siècle. Le château possède une remarquable chapelle de type gothique flamboyant construite aux XVe et XVIe siècles, dont on peut admirer la porte dentrée et lautel de granit. Durant la Révolution, la chapelle du Retail servit déglise paroissiale à labbé Barbedette, curé du Luc.","habitants":"Bois-Chevalier;  famille Lepage                                                 Retail; famille de Saint-Hilaire\r\n        \"","divers":"à Légé le Bois-Chevalier  grav 1 à 4    et le Retail grav de 5 à 9.   Bois-Chevalier; 46° 54' 43,29\" Nord, 1° 34' 15,49\" Ouest                                         Retail 46° 52' 18\" Nord et 1° 34' 03\" Ouest","gps":"","images":["../image/image_44/44_L%c3%a9g%c3%a9_1.jpg","../image/image_44/44_L%c3%a9g%c3%a9_2.jpg","../image/image_44/44_L%c3%a9g%c3%a9_3.jpg","../image/image_44/44_L%c3%a9g%c3%a9_4.jpg","../image/image_44/44_L%c3%a9g%c3%a9_5.jpg","../image/image_44/44_L%c3%a9g%c3%a9_6.jpg","../image/image_44/44_L%c3%a9g%c3%a9_7.jpg","../image/image_44/44_L%c3%a9g%c3%a9_8.jpg","../image/image_44/44_L%c3%a9g%c3%a9_9.jpg"]},"Consult_chateau_formulaire0ea6":{"id":"Consult_chateau_formulaire0ea6","dept":"44","canton":"Carquefou","commune":"Carquefou","nom":"Maubreuil","type":"Château","periode":"XIX","histoire":"MAUBREUIL,  fut détruit au cours de la Révolution Française. Acheté et reconstruit, en 1815, par Félix Cossin, négociant et armateur de navires corsaires nantais, il revint en héritage, à l'époux de la petite-fille de Cossin, le marquis de Dion, qui, en 1934, le céda au département. Le château actuel est édifié en 1815 pour le négociant et armateur de navires corsaires nantais Félix Cossin . En 1934, le marquis de Dion cède le domaine au département qui y fait construire un sanatorium dans le parc.","architecture":"MAUBREUIL, reconstruit à l'emplacement d'un ancien château incendié durant la Révolution dont il ne subsiste qu'un pigeonnier, une chapelle privée et un pavillon de chasse, datant du XVIIe siècle. Les bâtiments sont inaugurés en 1938. En 1972, le château de Maubreuil est devenu un centre de rééducation fonctionnelle. En 2013, un comité de pilotage composé du centre hospitalier, du conseil général de Loire-Atlantique, de Nantes Métropole, et de la commune de Carquefou a validé la cession du centre hospitalier et des terrains adjacents au crédit mutuel pour la construction d'un centre de formation. Il a aussi opté pour la cession du château, des dépendances, de la maison de l'étang et de l'ancienne ferme à la société Astrolade. Le reste du domaine a fait l'objet d'une acquisition par la commune.","habitants":"Famille de Félix Cossin\r\n        \r\n        \"","divers":"Maubreuil 47° 17' 46\" Nord, 1° 29' 13\" Ouest","gps":"","images":["../image/image_44/44_Maubreuil_1.jpg","../image/image_44/44_Maubreuil_2.jpg"]},"Consult_chateau_formulaire58af":{"id":"Consult_chateau_formulaire58af","dept":"44","canton":"St-Herbain","commune":"Indret","nom":"Mercoeur_44","type":"Château","periode":"XII-XV","histoire":"MERCOEUR,  l'île d'Indret appartenait, en 1420, au Duc de Bretagne, Jean V. Le Duc François Ier donna le château à Marguerite d'Orléans, comtesse d'Etampes et de Vertou. L'île est remise ensuite à Gilles de Condest, par un contrat rédigé par maître Rolland de La Villéon, agissant au nom de la duchesse Anne. Après le mariage d'Anne de Bretagne, l'île et ses dépendances reviennent à la couronne de France. Cette île est donnée en 1588 par Henri II au duc de Mercoeur. Elle est ensuite la propriété de Louis Duplessis, sieur de Genonville, qui la revend en 1642 au roi Louis XIII, en échange des fiefs de la Rairie de Biesse et du pont de Vertais. En 1650, la régente Anne d'Autriche donne en apanage la terre et le château au chef d'escadre Abraham Duquesne pour le dédommager des sommes que lui avait coûtées l'armement de la flotte qui battit les Anglais et les Espagnols à l'embouchure de la Gironde. Mais Duquesne, militant huguenot, dut se retirer en Suisse, après la révocation de l'Edit de Nantes.  Ce château a subi plusieurs remaniements à partir du XVe siècle.  .","architecture":"MERCOEUR, situé au centre de l'île d'Indret, c'était à l'origine un château fort flanqué de quatre tours. Construit au XIe siècle, il a subi des remaniements à partir du XVe siècle.  Il a sans doute été édifié une première fois au XIIe siècle.  En 1828, les fossés sont comblés et le pont-levis supprimé. Le château était jadis flanqué de quatre tours ; Située sur la rive sud de la Loire, Indret a d'abord été le site d'un château fort, le  château Mercur  et depuis la fin du XVIIIe siècle c'est celui d'un arsenal de l'État, jadis une fonderie de canons, actuellement l'unité propulsion de la DCNS , association des bâtiments industriels plus ou moins anciens et des bâtiments résidentiels encore utilisés.","habitants":"Famille de Louis Duplessis\r\n        \"","divers":"Mercoeur  : 47° 11' 45\" Nord 1° 40' 52\" Ouest","gps":"","images":["../image/image_44/44_Mercoeur_44_1.jpg","../image/image_44/44_Mercoeur_44_2.jpg"]},"Consult_chateau_formulaire5e37":{"id":"Consult_chateau_formulaire5e37","dept":"44","canton":"Clisson","commune":"Monnières","nom":"Monnières","type":"Château","periode":"XV-XVIII","histoire":"Deux châteaux à Monnières, Plessis Blezot et Court des Mortiers.  A trois km au nord -Est à  le Pallet le château de Subinière du XVIIIe siècle chambres d'hôtes de  Anne Cannaterina.                                                        MONNIERES-GALISSONNIERES, au XVIIe siècle, les Barrin de la Galissonnière sinstallent au château seigneurial de la Janière. Jacques Barrin étend ses possessions sur plusieurs communes aux alentours. Lun de ses descendants, Rolland-Michel Barrin, devint gouverneur de la Nouvelle-France.                                                                                                                                          PLESSIS-BREZOT, à deux pas de la Sèvre nantaise, cette superbe demeure du XIIIe siècle a été entièrement restaurée et meublée avec soin et passion. Ainsi, les meubles de style, la porte intérieure en pierre sculptée et les boiseries Régence vertes et jaunes du salon aideront les visiteurs à se dépayser complètement.  La  Scea du château Plessis  Brezot, société civile d'exploitation agricole est en activité depuis 17 ans, elle est spécialisée dans le secteur d'activité de la culture de la vigne.  Luc, est gérant de l'entreprise, et chambre d'hôtes par Annick et Didier Calonne.","architecture":"COURT des MORTIERS  viticole de Gilles Rineau. A l'origine Baronnie des Clisson, le château fut incendié en 1794 par les colonnes infernales. Court des mortiers si le vieux manoir à fait place au XIXe siècle à une maison bourgeoise il témoigne encore de sa présence par quelques vestiges. A la fin du siècle dernier , le corps de logis principal était flanqué de deux tourelles en encorbellement percées de larges baies à croisées de pierre. Coiffé d'une toiture à ardoise  et repose sur un joli cul-de-lampe en granit, sur la façade sud une construction semi-circulaire surmontée d'une poivrière qui prend appui sur la base d'une ancienne tour, autour du logis on découvre des restes de fortification dans un bâtiment servant de Cellier.                                        GALISSONNIERE, devient un quartier général pour les généraux vendéens. En juin 1793, Charrette y séjourne avant le siège de Nantes. En septembre 1793, Bonchamps et Lyrot et leurs 7 000 combattants de la Grande Armée essayent de stopper le général Canclaux et ses troupes dans leur retraite vers Nantes après la défaite de la Bataille de Torfou. Après un long combat dans les environs du château contre les 15 000 Mayançais de Canclaux, Bonchamps ordonne la retraite sur Aigrefeuille. Un groupe de soldats de républicain traverse la Sèvre et dans leur poursuite des Royalistes, ils incendient le bourg et léglise.","habitants":"Court-Mortiers                                                                                         Plessis-Blezot;famille Calonne ; Gilles Rineau\r\n        \"","divers":"Deux châteaux à Monnières, Plessis Blezot-4-5 et Court des Mortiers  Grav-1-2-3.  Monnières 47° 07' 57\" nord, 1° 21' 17\" ouest .   Subinière grav-6","gps":"","images":["../image/image_44/44_Monni%c3%a8res_1.jpg","../image/image_44/44_Monni%c3%a8res_2.jpg","../image/image_44/44_Monni%c3%a8res_3.jpg","../image/image_44/44_Monni%c3%a8res_4.jpg","../image/image_44/44_Monni%c3%a8res_5.jpg","../image/image_44/44_Monni%c3%a8res_6.jpg"]},"Consult_chateau_formulaire4b3e":{"id":"Consult_chateau_formulaire4b3e","dept":"44","canton":"St-Philibert de Grand Lieu","commune":"Montbert","nom":"Montbert","type":"Château","periode":"XVI-XVII","histoire":"Trois châteaux à Montbert celui de Montbert, de la Ridelières et de Bellecour.                                                                                                                 MONTBERT, a été édifié en 1656 et a été successivement la propriété des seigneurs de Montbert, Menou jusqu'à la Révolution Française et, enfin, de Maurice Menant au début du XIXe siècle. La demeure de Brenière est, à l'origine la propriété des La Touche-Limouzinière, qui l'ont vendu à la famille de Charette. Gabrielle Charette de Montbert épouse d'abord en 1743 Henri de Bretagne, baron d'Avaugour, de Vertus et de Clisson, puis Anne-Léon de Montmorency, cousin des Rois. La BRENIERE est vendue en 1757 à Françoise Thérèse Descamps, épouse de Charles de Tollenare, puis revendue au comte de Menou, époux de Bonne Cochon de Maurepas. Les Menou, alliés aux Cochon de Maurepas, aux de Montagnac, de Montesquieu et aux Lageard de Cherval sont ensuite les propriétaires au moment de la Révolution. Les Menou de Maurepas et de Montagnac vivaient surtout à la Cour. Ils sont arrêtés dès 1791 comme suspects. L'héritière vend la Brenière, en 1804, à Maurice Menant et à Marie Claude Reynolds son épouse, négociants à Nantes. Le château avait été incendié et la partie principale détruite, Adèle Menant, leur fille, épouse en 1819 François Gervais Clémansin du Maine, chevalier des ordres royaux et militaires de Saint-Louis et de l'ordre national de la Légion d'honneur, membre du conseil général de la Loire-Inférieure. Victor Clémansin du Maine décède en 1891 et le domaine passe alors à son fils.","architecture":"RIDELIERES,  le château date originellement du XVIe siècle, dont la seule trace reste une tourelle d'époque. La seigneurie, dont les fiefs s'étendaient jadis jusqu'au Bignon, avait un droit de basse justice : elle relevait des Rohan et subit l'influence du protestantisme. Un démembrement s'ensuivit et l'on trouve de nombreux propriétaires du domaine : Leroux des Ridelères, les Marbuf  qui modifient le manoir à tourelle et la murailles à mâchicoulis, Betuel, Tatin, Dupas de La Garnache. La famille Harmange, parente des Leroux, va reconstituer le domaine des Ridelières en 1832.\r\nBELLE-COUR, manoir, est une propriété privée qui date du XVIIe siècle  de la famille Guillon, membres du parlement de Bretagne, puis des seigneurs de Fouinard et de la famille Delaville. Ce domaine se rattachait auparavant au Fouinard dont les propriétaires étaient les Guillon. Par alliance, Suzanne Guillon porte ensuite le domaine aux négociants nantais, Delaville. Armand François Delaville construit sa fortune sur le négoce : il arme, de 1783 à 1793, six navires négriers qui ramènent à chaque voyage une moyenne de 300 noirs aux Antilles.","habitants":"Montbert; famille de Charrette                                              Ridelières; Famille Harmange                                                 Belle-Cour; famille Guillon\r\n        \"","divers":"Trois châteaux à Montbert celui de Montbert grav-1-à 5  de Brenière grav-6, de la Ridelières et de Bellecour grav-7.   Montbert 47° 03' 31\" nord, 1° 29' 16\" ouest","gps":"","images":["../image/image_44/44_Montbert_1.jpg","../image/image_44/44_Montbert_2.jpg","../image/image_44/44_Montbert_3.jpg","../image/image_44/44_Montbert_4.jpg","../image/image_44/44_Montbert_5.jpg","../image/image_44/44_Montbert_6.jpg","../image/image_44/44_Montbert_7.jpg"]},"Consult_chateau_formulaire3f31":{"id":"Consult_chateau_formulaire3f31","dept":"44","canton":"Chäteaubriand","commune":"La Chapelle-Glain","nom":"Motte_Glain","type":"Forteresse","periode":"XII-XV","histoire":"MOTTE-GLAIN vers  1050 aux Rougé  par alliance aux Rohan  et toujours par alliance au XVe siècle aux Châteaugiron, aux Malestroit et  aux Penhoët. L'édifice n'était pas encore achevé, lorsqu'en 1497, Pierre de Rohan sieur de Gié maréchal de France qui a épousé Françoise de Penhoët eut l'honneur d'y recevoir le roi Charles VIII et la reine Anne de Bretagne, puis Charles IX accompagné de sa mère Catherine de Médicis en 1565. Lorsque les princes de Rohan Guémené eurent vendu la Motte Glain à la famille Le Lou, Louis XIV prit le château sous sa sauvegarde, et par lettres du 16 février 1652, il autorisa Michel Le Lou, seigneur de la Motte-Glain, à faire apposer les armoiries royales de France sur la façade de sa somptueuse demeure. La dernière des le Lou, épouse en 1722 Joachim Robineau marquis de Rochequairie et habilement restauré par ses soins, leur descendance n'ayant pas émigré  traverse la Révolution sans dommage, bien que le terrier fut brûlé en 1794 par les autorités municipales. En 1910 le dernier des Rochequairie entreprend la restauration du château mais meurt peu après. La Motte-Glain revient alors à sa soeur à madame de Charette de Contrie dont la belle fille sans descendance directe le  transmet à Aymar de la Lézardière qui le modifie, entretient et restaure le château pour les générations futures.","architecture":"MOTTE-GLAIN, constitué d'un châtelet d'entrée dans lequel s'ouvre, au centre d'un pavillon, un portail argrèmenté d'un pont-levis appelé petit château en raison de ses importantes dimension, le pavillon abritant l'entrée accosté d'une tourelle carrée accueillant  un escalier, se prolonge par une aile cantonnée, à son extrémité, d'une seconde tour carrée flanquée d'une tourelle en encorbellement. Sur la face extérieure du châtelet apparaisse les rainures de l'ancien pont-levis, la galerie  couverte   reposant sur des mâchicoulis ajourés  comme les gracieuses lucarnes gothiques.  Avec le concours de nos partenaires culturels, le patrimoine est conservé, embelli et ouvert aux visiteurs.  Le château est une belle et agréable demeure.  La demeure du maréchal, le corps de logis à l'ouest élevé sur un rez-de-chaussée, un étage principal et un étage de combles, il présente quatre travées toutes montées sauf une de lucarnes à meneaux, ces lucarnes sont sommées de hauts galbes à pinacles  et encadrés de pilastres torsadés. La façade extérieure du corps de logis à cinq travées, flanqué de deux tours rondes coiffées de toits en poivrière. Un escalier dans une tour pentagonale occupant l'angle côté cuisine.","habitants":"Famille Le Lou\r\n        \"","divers":"La Motte Glain; 47° 37' 13\" nord, 1° 11' 57\" ouest","gps":"","images":["../image/image_44/44_Motte_Glain_1.jpg","../image/image_44/44_Motte_Glain_2.jpg","../image/image_44/44_Motte_Glain_3.jpg","../image/image_44/44_Motte_Glain_4.jpg","../image/image_44/44_Motte_Glain_5.jpg","../image/image_44/44_Motte_Glain_6.jpg","../image/image_44/44_Motte_Glain_7.jpg"]},"Consult_chateau_formulairea87c":{"id":"Consult_chateau_formulairea87c","dept":"44","canton":"Ancenis","commune":"Mésanger","nom":"Mésanger","type":"Château","periode":"XV-XVI-XVII","histoire":"quatre châteaux à Mésanger; de Hardière, de Quetraye, de Roches, de Rigaudières, de Salles et de Varennes.                                                                     PAS-NANTAIS, la commune de Mésanger comporte 4 châteaux et 3 manoirs à découvrir. La construction du château du Pas-Nantais date du XVIe au XIXe siècle. Cette ancienne seigneurie est attestée en 1426. Le château du Pas-Nantais fut la propriété successive des Familles du Pas-Nantais, La Poëze au XVIe siècle, Lefebvre d'Ancenis en 1810, Palierne de la Houdussais, Collineau de Mezemaker au XIXe siècle.                                                                                                                                    QUETRAYE; la construction du manoir date du XVe au XVIe siècle. Il était mentionné déjà au XIIe siècle. Le manoir de la Quétraye fut agrandi de 1580 à 1584. Il appartenait aux familles Irodouez et de Boussineau. Le manoir de la Quétraye sera ensuite revendu aux Familles Dupuy, Mahot, de Boussineau (famille noble d'Orvault, Saint-Herblain et Barbechat) qui s'alliera aux Bascher, Bertrand de Cuvres et Becdelièvre.                                                                                                                    SALLES, la construction du manoir des Sales date du XVIIe siècle. C'était le siège de la Seigneurie de Salles. Ce manoir possédait lui aussi une chapelle privée. Il fut la propriété successive des familles d'Eonnet, Pantin de La Hamelière, Bouillau et de Bruc. De 1679 à la Révolution, le manoir des Salles est la propriété des seigneurs de Galisson. Le manoir des Salles fut vendu comme bien national, en 1794.","architecture":"HARDIERE du XVIIIe siècle, propriété de la famille Rigaud au XIVe siècle. Cette famille avait édifié l'ancienne chapelle Rigaud, aujourd'hui disparue. Le château devient au XIXe siècle la propriété de la famille Charrette de Bois-Foucault. Dans la tour de contrôle du Pont-levis se trouve la chapelle privée de La Hardière.\r\nROCHE ancien château du XVe siècle, situées à La Roche. La seigneurie de La Roche appartient au Moyen Âge à la famille de Saint-Gilles. Seules subsistent quelques dépendances.\r\nRIGAUDIERES, manoir, propriété de la famille d'Achon (ou Dachon), alliée aux Eustace et aux Van Alstein. Vers 1810, la Rigaudière est achetée par les Guitard, d'Ancenis, qui le vendent ensuite à la famille Dubar. La chapelle date de 1608.                                                                            VARENNES, la construction du château de la Varenne date du XVIIe au XVIIIe siècle. Propriété de Bertrand de Tréal en 1520, il fut reconstruit au début du XVIIIe siècle. Ce château possédait autrefois une chapelle privée du XVIe siècle. Il est aussi la propriété de la famille Dieuzie. Le dernier seigneur de la Varenne s'appelait Gabriel Blondin d'Esigny : il fut, avec son fils, à la tête de l'armée vendéenne. Il sera arrêté à la Varenne le 15 janvier 1794 et condamné à mort. Les héritiers sont les Duquesny et de la Vieuxville. Le château de la Varenne passera ensuite dans les mains de la famille de Larlan. La marquise de Larlan parente des Becdelièvre de la Seilleraye.","habitants":"Famille du Pas-Nantais                                                           Quetraye ; Famille Irodouez                                                           Sales; Famille d'Eonnet                                                               Varennes;  Famille Dieuzie\r\n        \"","divers":"Pas-Nantais grav-2    47° 26' 02\" Nord, 1° 13' 49\" Ouest                                                       Quétraye grav-3 -4     47° 26' 02\" Nord, 1° 13' 49\" Ouest          Sales : 47° 26' 02\" Nord, 1° 13' 49\" Ouest                             Varennes : 47° 26' 02\" Nord, 1° 13' 49\" Ouest","gps":"","images":["../image/image_44/44_M%c3%a9sanger_1.jpg","../image/image_44/44_M%c3%a9sanger_2.jpg","../image/image_44/44_M%c3%a9sanger_3.jpg","../image/image_44/44_M%c3%a9sanger_4.jpg"]},"Consult_chateau_formulairef0b7":{"id":"Consult_chateau_formulairef0b7","dept":"44","canton":"Nantes","commune":"Nantes","nom":"Nantes_44","type":"Château","periode":"XVI-XVIII","histoire":"Dans cet article de Nantes; quatre châteaux, la Chantrerie, la Couronnerie, la Hautière, et la Gaudinière.                                                                                               CHANTRERIE,  une \"folie\" construite en 1820,  est un grand domaine agricole quand l'architecte Étienne Blon en fit l'acquisition. Il collabora avec son beau-frère, François-Léonard Seheult, pour faire construite une première maison. En 1825, le corps de logis fut achevé. En 1831, la fille d'Étienne Blon, Anne-Clémence épousa Louis Levesque, fils du maire de Nantes Louis-Hyacinthe Levesque. Celui-ci fit édifier la chapelle, en 1836, puis, en 1860, il fit agrandir la maison de son beau-père en faisant rajouter un étage.    Sur la rive gauche de l'Erdre, autour du château de la Chantrerie, un parc paysager de 18 ha, a été dessiné au XIXe siècle par Dominique Noisette. La Chantrerie abrite actuellement lécole vétérinaire et atlanpole, siège du Technopole de Nantes.\r\nHAUTIERE, sur les hauteurs de la butte Sainte-Anne, s'élève le manoir de la Hautière, construit au XVIe siècle. C'est l'ancienne résidence des ducs de Chantenay, qui abrite aujourd'hui le musée des Compagnons du Tour de France des Devoirs Unis. Il présente quelques chefs d'oeuvres des compagnons mais aussi des outils anciens qui témoignent de l'histoire du compagnonnage. Ce manoir restauré à partir de 1968 par les compagnons, présente dans ses salles des chefs-d'oeuvre exécutés par les compagnons ainsi qu'un conservatoire de vieux outils utilisés afin de travailler le bois, le verre, le métal, la peinture. Musée des compagnons du Devoir.","architecture":"COURONNERIE;   est un exemple typique des folies du XIXe siècle. Le domaine se prolonge sur 2 km de bois au nord. On y croise une tour carré qui semble faire le guet.                                                                                                                           GAUDINIERE, la construction du manoir date du XVIIIe siècle. Avant la Révolution, il fut la propriété de la famille Chaurand, une riche famille d'armateurs nantais en relation avec les Beauharnais et les Tascher de la Pagerie. Il devient la propriété des familles d'Aux, puis de Perrien en 1814. Sous la Restauration, il est acquis par la famille Goüin, amis et anciens voisins des Balzac à Tours. La propriété est alors composée d'une maison d'habitation avec une cour d'honneur, une chapelle. En 1857, le château et son parc de 8 hectares passe au banquier J. Brousset, parent des Goüin. Le parc connaît alors des extensions et des embellissements notables avec le concours de l'architecte-paysagiste Provost. C'est notamment lui qui fait édifier, entre 1864 et 1873, le château actuel sur l'emplacement de la précédente demeure. La Gaudinière était la propriété des familles Rochefort et de Andouard. En 1918, une famille de banquiers, les Belot, devient propriétaire  vendent le château et ses abords à la fondation d'Auteuil en 1942. En 1948, la caisse régionale d'assurance maladie (CRAM) l'acquiert. La ville de Nantes rachète le château et ses abords en 1992, et fait raser les bâtiments construit par la CRAM, durant les dernières décennies afin que la bâtisse retrouve son aspect extérieur d'origine. Néanmoins, au début du XXIe siècle, le château de la Gaudinière était inoccupé.","habitants":"Chanterie: Famille Levesque                                                          Hautière; ducs de Chantenay                                                             Gaudinière, famille Chaurand\r\n        \"","divers":"quatres châteaux, la Chantrerie grav 1-2-3-4, la Couronnerie-grav 5, la Hautière grav-9, et la Gaudinière-7_8.                        Chanterie, 47° 17' 15\" Nord, 1° 31' 33\" Ouest            Gaudinière   : 47° 14' 39\" Nord, 1° 34' 40\" Ouest","gps":"","images":["../image/image_44/44_Nantes_44_1.jpg","../image/image_44/44_Nantes_44_2.jpg","../image/image_44/44_Nantes_44_3.jpg","../image/image_44/44_Nantes_44_4.jpg","../image/image_44/44_Nantes_44_5.jpg","../image/image_44/44_Nantes_44_6.jpg","../image/image_44/44_Nantes_44_7.jpg","../image/image_44/44_Nantes_44_8.jpg","../image/image_44/44_Nantes_44_9.jpg"]},"Consult_chateau_formulaire9eba":{"id":"Consult_chateau_formulaire9eba","dept":"44","canton":"Nantes","commune":"Nantes","nom":"Nantes_Chateaux","type":"Château","periode":"XV","histoire":"Dans cet article de Nantes; trois châteaux celui de Bois-Briand, de Psalette et de la Touche.                                                                                           BOIS-BRIAND,  l'orangerie de Bois-Briand est ouverte tout au long de l'année pour des expositions de peinture, de sculpture, l'enregistrement de concerts, l'organisation de master-classes de violon, l'enregistrement d'émissions de radio, de télévision et d'émissions pédagogiques de formation à distance. L'orangerie héberge, également, des réunions de travail pour des programmes de recherche et développement et des actions de coopération internationale. Des ateliers sont à la disposition d'artistes pour des résidences dans le domaine musical et les arts appliqués.  \r\n La PSALETTE , construite dans la dernière décennie du XVe siècle, est un hôtel destiné à Guillaume Gueguen archidiacre de la Mée. La tour descalier hexagonale hors doeuvre et la porte en anse de panier sont caractéristiques de cette architecture régionale. En 1837, lévêché de Nantes y installe lécole de chant liturgique. Ce qui lui vaut son nom de la Psalette (du latin psallere: chanter). La ville, propriétaire depuis 1912, y abrite des services administratifs.                                                            TOUCHE manoir   musée Dobrée.  Le fief de la Touche s'étendait des remparts de Nantes jusqu'à la Chézine, appartenant, depuis l'époque médiévale à l'évêché de Nantes. Jean de Malestroit, évêque, fait bâtir un manoir entre 1420 et 1441. Le duc de Bretagne, Jean V y séjournera plusieurs fois et y décèdera le 29 août 1442.  La Touche prend le nom de \"manoir des Irlandais\", car, de 1695 à 1793, il devient une résidence des prêtres irlandais, expulsés de leur pays pour leur foi. En 1857, il est vendu à Thomas Dobrée,","architecture":"TOUCHE,  le manoir est édifié à l'emplacement d'une construction dont certaines pierres auraient été réemployées dans la cathédrale de Nantes. Le domaine seigneurial devient le centre d'une exploitation rurale avec garenne, bois, prairies. Lors des guerres de Religion, le manoir est transformé en hôpital pour protestants. Au début du XVIIe siècle, alors que la ville est ravagée par la peste, le manoir abrite la maison de convalescence. Thomas Dobrée, qui entreprend des restaurations se voulant plus conformes au style de l'édifice. Les lucarnes du XVIIe siècle sont remaniées sur un modèle inspiré du XVe siècle et qu'un escalier extérieur est ajouté au pignon Est pour desservir une pièce. Invraisemblable destinée pour ce rescapé des siècles et des révolutions, le manoir est transformé en écurie et effacé au bénéfice d'un nouveau palais, solide et fonctionnel. Il joue un rôle de caution artistique pour l'architecte du palais Dobrée","habitants":"Jean de Malestroit, évêque\r\n        \"","divers":"Dans cet article de Nantes; trois châteaux celui de Bois-Briand, de Psalette Palais Dobrée grav-1 à 3  et de la Touche.               Bois-Hué  : 47° 28' 37\" Nord, 1° 45' 44\" Ouest                                   Bois-Briand   47° 14' 57\" Nord et 1° 29' 41\" Ouest","gps":"","images":["../image/image_44/44_Nantes_Chateaux_1.jpg","../image/image_44/44_Nantes_Chateaux_2.jpg","../image/image_44/44_Nantes_Chateaux_3.jpg","../image/image_44/44_Nantes_Chateaux_4.jpg","../image/image_44/44_Nantes_Chateaux_5.jpg","../image/image_44/44_Nantes_Chateaux_6.jpg","../image/image_44/44_Nantes_Chateaux_7.jpg","../image/image_44/44_Nantes_Chateaux_8.jpg"]},"Consult_chateau_formulaire78af":{"id":"Consult_chateau_formulaire78af","dept":"44","canton":"Nantes","commune":"Nantes","nom":"Nantes_Ducs_Bretagne","type":"Palais des ducs","periode":"XIII-XIX","histoire":"DUCS  DE  BRETAGNE , de style Gothique et Renaissance, des Ducs de Bretagne depuis le XIIIe siècle était défensif et de plaisance, pour constituer une base défensive à Nantes, le château est devenu, sous François II, la résidence principale ducale bretonne. Sa fonction militaire fut utilisée par le duc lors de la guerre folle au cours de laquelle il s'oppose au roi de France. Sa fille, la duchesse Anne, fut, plus tard, contrainte d'épouser 2 rois de France, successifs, Charles VIII et Louis XII. Ces mariages entraînèrent l'union de la Bretagne à la France, définitivement scellée par un édit signé au château  en 1532, par François Ier. Dès lors, le château perdit son statut de résidence ducale pour devenir une forteresse royale. Il vit passer la plupart des rois de France, lorsque ceux-ci visitèrent la Bretagne. Il est aussi la résidence officielle des gouverneurs de la province, même si leur jour est bref. Seul le duc de Mercur, gouverneur, y tiendra sa cour, durant les guerres de Religion. Sous l'ancien régime, le château servit aussi de prison d'État, de caserne et d'arsenal militaire. Il ne subira aucune dégradation durant la Révolution, mais l'explosion des réserves de poudre, en 1800, détruisit une bonne partie du château. Au XIXe siècle, le château des ducs de Bretagne conservera sa fonction militaire, mais son intérêt patrimonial est, peu à peu, découvert et quelques restaurations seront entreprises. Devenu en 1915, la propriété de Nantes, il deviendra un Musée Jean V dès 1924. De 1990 à 2007, il va bénéficier dune importante rénovation et il accueillera, dès 2007, le Musée d'Histoire de Nantes.","architecture":"DUCS DE  BRETAGNE, sa construction remonte au début du XIIIe siècle et porte le nom de château de la Tour Neuve, avec celle de la Tour du vieux donjon, forteresse consolidée en 1365. En 1466, François II de Bretagne, face aux menaces contre l'indépendance du duché de Bretagne, décide d'élever quatre tours : la tour des Espagnols, la tour de la Boulangerie, la tour du Pied de Biche et la tour des Jacobins, et fait bâtir , le palais ducal et la tour de la couronne d'Or. 25 ans plus tard, Anne de Bretagne, devenue reine de France, termine l'oeuvre de son père, en ajoutant la tour du Port, la tour du Fer à Cheval et la tour de la Rivière, la demeure est percée de trois accès, l'ancien pont-levis, la courtine du pont de secours et la poterne de Loire. La fonction défensive devient désormais moins essentielle, la duchesse fait rehausser le grand logis et la tour de la Couronne d'Or par des lucarnes et loggias. Elle fit aussi construire le Logis du Roy, dans le style renaissance français. En 1582, Philippe Emmanuel de Lorraine, duc de Mercoeur fait rehausser les courtines, pose de bastion, un recouvrant la tour du Port et l'autre derrière le vieux donjon. Ce dernier rajout transforme alors le château en un Bunker militaire de l'époque, par des constructions utilitaires défigurant le logis des Rois en un lieu de garnison. Parmi les nombreux événements dont fut témoin le château, le plus important est la déclaration de l'édit de Nantes par Henri IV, en 1598. En 1670, un incendie détruit une partie du palais ducal reconstruit dans l'architecture de l'époque. En 1800, l'explosion de la Tour des Espagnols, utilisée comme entrepôts de munitions. En 1862, le château est classé M.H.","habitants":"DUCS de Bretagne\r\n        \"","divers":"Nantes; Ducs : 47° 12' 56\" Nord, 1° 32' 59\" Ouest","gps":"","images":["../image/image_44/44_Nantes_Ducs_Bretagne_1.jpg","../image/image_44/44_Nantes_Ducs_Bretagne_2.jpg","../image/image_44/44_Nantes_Ducs_Bretagne_3.jpg","../image/image_44/44_Nantes_Ducs_Bretagne_4.jpg","../image/image_44/44_Nantes_Ducs_Bretagne_5.jpg","../image/image_44/44_Nantes_Ducs_Bretagne_6.jpg","../image/image_44/44_Nantes_Ducs_Bretagne_7.jpg"]},"Consult_chateau_formulaire0e5f":{"id":"Consult_chateau_formulaire0e5f","dept":"44","canton":"Nantes","commune":"Nantes","nom":"Nantes_IIII","type":"Château","periode":"XV-XVIII","histoire":"Dans cet article de Nantes quatre châteaux; le grand Blottereau,  Pigossière, Clermont-Ranzay et le Tertre.                                                 GRAND-BLOTTEREAU, le château fait partie de la trentaine de folies nantaises construites par de riches commerçants ou armateur nantais. De 1742 à 1747, Gabriel Michel, directeur de la compagnie des Indes et seigneur de Doulon, fait construire le château du Grand Blottereau. Il est revendu à la famille Deseigne et à la famille Barbier, puis à leurs descendants jusqu'à l'acquisition par Thomas Dobrée dont la famille s'est enrichie par le commerce négrier. En 1895, à sa mort, Hippolyte Durand Gasselin est nommé légataire universel. Vers 1905, il fait don de la propriété du Grand Blottereau à la ville de Nantes. En 1902, sont construits un jardin, des serres, ainsi qu'une vacherie dont le lait est destiné aux oeuvres sociales. Pendant la première guerre mondiale, 10 ha sont mis à disposition des autorités militaire qui y installe un hôpital militaire pour l'armée américaine. Durant la seconde guerre mondiale il accueille des soldats britanniques puis allemand. En 1970 les serres coloniales deviennent municipales et tropicales.\r\nPIGOSSIERE, depuis 1987, Édouard et Adeline de Lambilly vous accueillent au sein de leur propriété de caractère pour faire de vos événements professionnels ou privés  une réussite incontestable. En 2003, la succession familiale simpose. Edouard de Lambilly renonce à son métier dexpert-comptable et, avec son épouse Adeline, scellent leur pierre à lédifice en rénovant et procédant à un agrandissement de létablissement devenu trop étroit pour répondre à une demande accru du public.","architecture":"CLERMONT RANZAY. En 1469, le duc François II récompense son secrétaire Jacques Raboceau en exemptant à jamais d'impôts sa \"maison et métairie nommée et vulgairement appelée Ranzay\". Au XVIIIe siècle, le manoir de Clermont Ranzay a appartenu à Michel Leclerc, commissaire de la marine au Croisic, puis à son frère Pierre Leclerc, marchand de draps et soie, puis à leur soeur Thérèse, épouse de René Lelasseur. Ce qui explique l'arrivée des Lelasseur dans la propriété. En 1851, Clermont-Ranzay ne sert plus qu'aux récoltes, selon le registre du recensement. Le dernier propriétaire privé a été un cultivateur, M. Yves Abguillerm, qui l'a cédé à la ville lors de l'aménagement de la Beaujoire. Amputé de ses annexes, le manoir a été sauvé de la destruction, il est devenu la mairie du quartier en janvier 1977.                                                                                                               TERTRE, le château du Tertre, a été racheté par l'Université de Nantes, il abrite un centre de recherche donnant sur l'Erdre. Ses espaces verts, réhabilités, sont aujourd'hui accessible en navette fluviale,  l'origine l'ancien château du Tertre  a été occupé par monsieur André qui fut maire de Nantes.  Le nouveau  château du Tertre a été construit en 1885. Vers 1960 l'université de Nantes a acquis le domaine.","habitants":"Gd-Blottereau;  famille Deseigne                                 Pigossière, Famille de Lambilly.                                                          Clermont-Ranzay; Famille leclerc                                              Tertre; monsieur André\r\n        \"","divers":"Dans cet article de Nantes quatre châteaux; le grand Blottereau Grav-1-2-3-4,  Pigossière, Clermont-Ranzay grav-7    bignon-Grav-9     et le Tertre grav 5-6.     Fort-Portricq-en-Saint-Joseph . Gd-Blottereau 47° 13' 34\" Nord et 1° 30' 39\" Ouest   Pigossière  47° 07' 23\" Nord, 1° 35' 02\" Ouest","gps":"","images":["../image/image_44/44_Nantes_Chateau_44_1.jpg","../image/image_44/44_Nantes_Chateau_44_2.jpg","../image/image_44/44_Nantes_Chateau_44_3.jpg","../image/image_44/44_Nantes_Chateau_44_4.jpg","../image/image_44/44_Nantes_Chateau_44_5.jpg","../image/image_44/44_Nantes_Chateau_44_6.jpg","../image/image_44/44_Nantes_Chateau_44_7.jpg","../image/image_44/44_Nantes_Chateau_44_8.jpg","../image/image_44/44_Nantes_Chateau_44_9.jpg"]},"Consult_chateau_formulaireac53":{"id":"Consult_chateau_formulaireac53","dept":"44","canton":"Nantes","commune":"Nantes","nom":"Nantes_Patrimoine","type":"Château","periode":"XVI-XVIII-XIX","histoire":"Trois châteaux dans cet article de Nantes ; la Poterie, l'Eraudière et le Petit-Plessis.                                                                                                                                                                 POTERIE, (1789), édifié par l'architecte Ceineray pour la famille Vanasse. La Poterie appartient  dès 1600 à  monsieur André négociants nantais, alliée aux Grilleau de La Vinaudière et aux Pontdavy. Les héritiers sont les Vanasse armateurs, demeurant à La Fosse, alliés aux Clanchy (nobles irlandais alliés aux  Monti et  Freslon). En 1850, La Poterie appartient encore à Madame veuve de Freslon.  Aux environs de 1850, la Poterie est acquise par Louis Lespervier député de Nantes et propriétaire de la Forêt de Paimpont. Le domaine devient ensuite la propriété des Lévesque, alliés aux Jollan de Clerville, Guillet de La Brosse.  Cette demeure fut construite à la fin du XVIIIe siècle à l'emplacement d'une ancienne tuilerie romaine. Le château, de style Louis XVI est attribué à l'architecte Ceineray. Seule Folie Nantaise sur les bords de l'Erdre, elle fut achevée en 1789 sur un domaine de plus de 100 hectares.  En 1863, la Poterie fut acquise par Louis-Auguste Levesque, alors député-maire de Nantes.                                                                                                                ERAUDIERE  superbe manoir du XVIe siècle.La façade qui donne   sur l'Erdre est de pur style XVIIIe siècle. La  propriété  servait de résidence d'été aux évêques de Nantes. Dans les communs l'évêché avait aménagé un vaste dortoir qui abritait jusqu'à 60 séminaristes.  Vers 1880 le domaine fut racheté par la famille de la Tullaye qui y habite encore. De nombreux jeunes Nantais sy sont rencontrés il y a 40 ans lors de soirées mémorables...","architecture":"PETIT-PLESSIS  C'est un manoir du XIXe siècle. L'orangerie date du XVIIIe siècle. Son parc de 2,8 ha est classé aux M.H. avec ses arbres bicentenaire, son potager de tomates de collection et sa terrasse plein Sud d'une superficie de 800 m². Le Domaine Le Petit Plessis est à seulement 10 km du cur de ville de Nantes, avec 8 salles et un lieu de réception soit 600 m² modulables pour organiser vos séminaires, réceptions, mariages, road show, congrès. Restaurant et traiteur.","habitants":"Poterie;  monsieur André                                        Eraudière;famille de la Tullaye                                                     Petit Plésssis\r\n        \r\n        \"","divers":"Trois châteaux dans cet article de Nantes ; la Poterie, l'Eraudière grav_1 et le Petit-Plessis.    Portillon 47° 9' 2\" Nord, 1° 28' 7\" Ouest.  Psalette grav-7-8 Colassière-7   Potherie","gps":"","images":["../image/image_44/44_Nantes_Patrimoine_1.jpg","../image/image_44/44_Nantes_Patrimoine_2.jpg","../image/image_44/44_Nantes_Patrimoine_3.jpg","../image/image_44/44_Nantes_Patrimoine_4.jpg","../image/image_44/44_Nantes_Patrimoine_5.jpg","../image/image_44/44_Nantes_Patrimoine_6.html","../image/image_44/44_Nantes_Patrimoine_7.jpg","../image/image_44/44_Nantes_Patrimoine_8.jpg"]},"Consult_chateau_formulairefdc9-2":{"id":"Consult_chateau_formulairefdc9-2","dept":"44","canton":"Nort sur Erdre","commune":"Nort sur Erdre","nom":"Nort_sur_Edre","type":"Château","periode":"XVIII-XIX","histoire":"Trois châteaux à Nort-sur-Erdre , Port-Mulon, Montreuil et la Gazoire. Le château de Montreuil (XIXe siècle). Ancienne propriétaire des familles de Cornulier et du Bois de Maquillé. Le château du Port-Mulon construit au XVIIIe siècle. Ancienne propriété du maire Prosper Coinquet. Le manoir de la Garenne, manoir du XVIIIe et XIXe siècles.\r\nLe manoir de l'Onglée, construit au XIVe siècle.\r\nGAZOIRE. Ancienne propriétaire de la famille Boux de Casson. MONTREUIL Le domaine de Montreuil est une ancienne seigneurie avec juridiction. Il appartenait en 1564 à Jean Godelin. Jean de Cornulier l'acquit en 1612 dans la succession d'Esther Godelin, femme de Jean Guymier. La branche de Montreuil de la famille de Cornulier en fait sa résidence ordinaire de 1612 à 1756. Au début du XVIIIe siècle, la famille fait construire le deuxième château.  En 1756, la famille Boux en devient propriétaire suite à un mariage. Puis en 1793, la famille de Monti de Rezé en devient propriétaire toujours suite à un mariage. En 1833, la famille du Bois de Maquillé en devient propriétaire suite au mariage d'Euphrasie de Monti de Rezé avec Constant Antoine du Bois de Maquillé, page de Charles X, maire de Nozay, conseiller général de Loire-Atlantique, fils de Charles André comte du Bois de Maquillé. Il n'y a pas dinformation sur létat du château de Montreuil à son entrée dans la famille du Bois de Maquillé en 1833. Il existe une lithographie du château de Montreuil de Félix Benoist (1818-1896), lithographe chez le graveur et éditeur Henri Charpentier à Nantes datant du milieu du XIXe siècle.                                                                                                                                                        PORT MULON, château du XVIIIe siècle, qui a appartenu à la famille Coinquet.","architecture":"MONTREUIL , il est de style néo-Renaissance. On le doit à larchitecte nantais Marie-Louis Liberge. À lextérieur, sur les façades Nord et Sud du corps central on retrouve les blasons sculptés de la famille du Bois de Maquillé et de la famille de Monti de Rezé surmontés dun heaume de comte couronné. À lintérieur, dans la salle à manger et le hall dentrée on retrouve les blasons sculptés de la famille du Bois de Maquillé et de la famille
