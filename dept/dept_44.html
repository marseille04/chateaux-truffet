de la Gonnivière surmontés dune couronne de comte. Toujours dans le hall dentrée, on retrouve une arche peinte avec la devise « Dieu avecque qui contre ». Cette devise est celle de la famille du Bois de Maquillé.  Enfin toujours dans la chapelle sur le vitrail central on retrouve une rosace avec les initiales A et M au centre pour Antoine du Bois de Maquillé entourée de 8 anges avec pour chacun le blason de la famille correspondant aux 8 enfants de Constant Antoine du Bois de Maquillé.","habitants":"Famille de Cornulier maire Prosper Coinquet\r\n        \"","divers":"Trois châteaux à Nort-sur-Erdre , Port-Mulon grav-6-7, Montreuil grav-2-3-4 et la Gazoire grav -6-7. Nort   47° 26' 25? nord, 1° 29' 50? ouest","gps":"","images":["../image/image_44/44_Nort_sur_Erdre_1.jpg","../image/image_44/44_Nort_sur_Erdre_2.jpg","../image/image_44/44_Nort_sur_Erdre_3.jpg","../image/image_44/44_Nort_sur_Erdre_4.jpg","../image/image_44/44_Nort_sur_Erdre_5.jpg","../image/image_44/44_Nort_sur_Erdre_6.jpg","../image/image_44/44_Nort_sur_Erdre_7.jpg"]},"Consult_chateau_formulaire8b44":{"id":"Consult_chateau_formulaire8b44","dept":"44","canton":"Gémené-Penfao","commune":"Nozay","nom":"Nozay","type":"Château","periode":"XV-XVI","histoire":"Dans cet article  de Nozay deux châteaux celui de la Touche et de Saffrée.                                                                                                                             TOUCHE, les premiers propriétaires connus de La Touche, avant 1498, furent Du Moulin, De Mérhan et Sorin. En 1534, Pierre Pirault, conseiller du Roi et secrétaire du gouverneur de Bretagne Jean de Laval, achète la Touche. Avant 1553, Toussaint de Comaille, contrôleur général de la marine du Ponant, avait acquis La Touche et ses dépendances des Pirault qui abandonnèrent la Bretagne . Cette terre et ses annexes échurent en partage à sa fille aînée, Claude de Comaille. En 1815, il fut occupé par les Prussiens qui y firent d'importantes dégradations et le rendit inhabitable. Il fut vendu le 29 janvier 1821 au comte François de Monti de Rezé et à dame Olympe Le Roux de Commequiers son épouse, ils le donnèrent à leur fille Euphrasie de Monti de Rezé, mariée à Constant Antoine, comte du Bois de Maquillé.                                                                                                  SAFFREE, en 1542, les dAvaugour, cette famille restera aussi longtemps propriétaire du château de Saffrée jusqu'au début du XVIIIe siècle. Dans un aveu de 1679, le château est décrit ainsi, le château de Saffrée avec ses tours, Les O'Riordan succédèrent aux dAvaugour. Leur fille épousa un riche et ambitieux marin, Jacques-Edme Cottin, originaire de Saint-Domingue, qui acheta un titre de noblesse et devint à son tour l'un des propriétaires du château. À partir de 1824, Hubert Le Loup de Beaulieu, puis Alexis Ricordeau. En 1990, la commune de Saffrée a acquis cette propriété.","architecture":"TOUCHE, la porte d'entrée monumentale est faite pour frapper le visiteur qui la franchit avec une ouverture cochère et une piétonnière, cette porte est surmontée par une rangée de faux mâchicoulis uniquement ornementaux, qui symbolisent la puissance. Le portail est construit en tuffeau, matériau traditionnellement utilisé dans le Val de Loire. L'ornementation est sobre et inspirée de l'antiquité. De fausses colonnes qui sont posées en légère saillie et le fronton décoré qui est surmonté d'une niche de faîtage, rappellent le pouvoir religieux comme le blason seigneurial rappelle le pouvoir aristocratique. L'allée d'honneur passe au milieu des communs qui abritent une magnifique charpente. Ces bâtiments servaient à loger l'importante domesticité des propriétaires.  Proche du portail, la maison des gardiens est d'apparence médiévale avec ses fenêtres à meneaux, l'entourage des ouvertures en pierre de Nozay comme l'appareillage des murs.  Pendant la dernière guerre, l'occupant était installé au château de La Touche. A la libération, il sera remplacé par les troupes américaines. Le portail étant trop étroit pour faire entrer les chars, un côté a été détruit en partie. Le portail que nous pouvons voir aujourd'hui est donc une reconstruction d'après guerre. En 1821, il était dans un état de délabrement fort avancé que François de Monti de Rezé le fit raser pour bâtir en 1827 l'actuel château. Il fut ravagé par un incendie le 6 avril 1987, il est aujourdhui restauré.","habitants":"Touche, comte François de Monti de Rezé                                                     Saffrée; famille des Avaugour\r\n        \r\n        \"","divers":"Deux châteaux celui de la Touche grav -3-4 -5-6 -7-8  et de Saffrée grav 1-2. Touche  47° 34' 12\" Nord et 1° 37' 12\" Ouest","gps":"","images":["../image/image_44/44_Nozay_1.jpg","../image/image_44/44_Nozay_2.jpg","../image/image_44/44_Nozay_3.jpg","../image/image_44/44_Nozay_4.jpg","../image/image_44/44_Nozay_5.jpg","../image/image_44/44_Nozay_6.jpg","../image/image_44/44_Nozay_7.jpg","../image/image_44/44_Nozay_8.jpg"]},"Consult_chateau_formulaire7f17":{"id":"Consult_chateau_formulaire7f17","dept":"44","canton":"Clisson","commune":"Geoges","nom":"Oiselinière","type":"Château","periode":"XVI-XVIII","histoire":"OISELINIERE;  était avant la Révolution française une seigneurie. Elle est signalée dans les Actes du chartrier déjà depuis 1335 et elle sétendait sur les communes de Gorges et de Clisson, et relevait féodalement des seigneurs de Clisson et du Pallet. Durant 643 ans la seigneurie ne change que quatre fois de propriétaires, cest Maurice le Meignen qui en est le premier propriétaire connu, puis en 1460, lun de ses descendants par alliance, M. Claude Grézeau. Sa famille vend la seigneurie à Jean Goulet de la Fosse de Nantes en 1613. Vient ensuite par acquisition  à Louis de la Bourdonnaye en 1658. Puis, en 1767, vente de la seigneurie aux ancêtres de la famille Audibert. de l'Oiselinière propriété nobiliaire rachetée en 1858 par l'historiographe Charles Dugast-Matifeux et le docteur Ange Guépin afin d'y installer une ferme expérimentale -, témoignent de l'histoire de la cité.  En 2006, la famille Verdier devient propriétaire du château.   Jean Goulet de la Fosse de Nantes loue à plusieurs particuliers de la paroisse de Gorges une pièce de 78 boisselées appelée « Les Grands Gâts » dépendant de la terre de lOiselinière pour la planter en vignes blanches de Muscadet. Pendant la seconde guerre mondiale, la propriété fut un haut lieu de la résistance, la famille Aulanier en payant un fort tribu. Le général Louis-Alexandre Audibert (1874 -1955), résistant et député de la Loire-Inférieure, se retira au château après sa carrière politique et y passa ainsi les neuf dernières années de  sa vie, quatre chambres dhôtes.","architecture":"OISELINIERE, cest le premier bail connu à ce jour. Pendant la seconde guerre mondiale, la propriété fut un haut lieu de la résistance, la famille Aulanier en paya un fort tribu. En 2016, le château servit de cadre principal au tournage de l'épisode \"Retour à Nantes\" de la série Le Sang de la vigne. Le parc a été aménagé de 1807 et 1809. La galerie des Illustres est composée de bustes d'hommes illustres, probablement sculptés par Debay. La villa, les communs et l'orangerie sont inscrits aux M.H. le 14/11/1997.","habitants":"oiselinière;  famille de Louis de la Bourdonnaye \r\n        \"","divers":"Oiselinière   47° 06' 24\" Nord, 1° 17' 34\" Ouest","gps":"","images":["../image/image_44/44_Oiselini%c3%a8re_1.jpg","../image/image_44/44_Oiselini%c3%a8re_2.jpg","../image/image_44/44_Oiselini%c3%a8re_3.jpg"]},"Consult_chateau_formulaire9404":{"id":"Consult_chateau_formulaire9404","dept":"44","canton":"St-Herbain","commune":"Orvault","nom":"Orvault","type":"Château","periode":"XVIII-XIX","histoire":"deux châteaux dans cet article d'Orvault celui  de Raffuneau et de Gobinière.                                                                                                                GOBINIERE, en 1791, les Chaurand, famille de riches armateurs acquièrent le domaine de la Gaubinière et créent le parc. En 1814, l'édifice change de propriétaire avant de passer dans les mains des Gouin sous la Restauration. En 1857, le domaine est acheté par un banquier, M. Brousset, qui fait édifier, entre 1864 et 1873, le château actuel sur l'emplacement de l'ancien bâtiment, et le parc connaît des extensions et des embellissements avec le concours de l'architecte paysagiste Provost. En 1918, la famille Belot devenue propriétaire, fait restaurer le parc par les frères Lizé, paysagistes nantais. La famille Belot qui avait conservé le château et ses dépendances dans le démembrement du parc, le vend en 1942 à la Fondation des Orphelins Apprentis dAuteuil. En 1948 la Caisse Régionale dAssurance Maladie rachète le château afin dy créer un centre de rééducation. En 1992, la ville de Nantes acquiert le domaine, les communs et le écuries sont rénovés afin de servir de locaux pour les agents du service espaces verts et environnement de la Ville, service en charge de la gestion du parc.                                                                                                                                   RAFFUNEAU, le château de Raffuneau ou du Raffunault, situé dans un beau parc, a été construit au XIXe siècle par la famille Hardy propriétaire du château de Blain à l'emplacement d'un ancien bâtiment ayant appartenu aux familles Sallentin et Marais.","architecture":"GOBINIERE   Joseph et Jeanne Vincent, propriétaires d'un ensemble de tanneries quai de Versailles à Nantes décident de construire un château avec des dépendances. En cette fin de XIXe siècle, il règne à la Gobinière une douceur de vivre et les mariages au château revêtent un faste particulier. Pendant un temps, les deux fils de Joseph, Léon et Félix, se partagent la propriété. A la mort de Léon en 1907, Félix rachète la part de son frère, parvenant à conserver l'intégrité du domaine. Le 21 septembre 1913 Félix meurt, c'est son fils, prénommé aussi Félix, qui hérite du domaine. En 1923, le train de vie et les charges d'entretien contraignent Félix Vincent fils, à vendre. Les surs Dominicaines contemplatives achètent la propriété et la transforment en cloître. En 1976, une fois de plus, le domaine est à vendre. La commune d'Orvault le rachète et en janvier 1987, un incendie se déclare dans la charpente. Très vite, la toiture et le dernier étage sont ravagés par le feu. La toiture sera rapidement refaite. En 1995, le château est restauré et accueille la Direction des affaires culturelles et du sport de la Ville. Les écuries devenues espace Toulouse Lautrec sont réaménagées en salle de spectacle. Le théâtre de la Gobinière est né. Centre culturel de la commune.","habitants":"Gaudinière;Famille de Guoin                                      Gobinière;  Famille vincent.                                                   Raffuneau; famille Hardy \r\n        \"","divers":"dans cet article d'Orvault Garnison-grav-1    de Grée grav-2        de Bertholière grav-3     de Briancelière grav-4         celui  de Raffuneau et de   Gobinière  grav-5-6-     de Loret  et de Plessis.   47° 16' 18\" Nord et 1°37' 21\" Ouest","gps":"","images":["../image/image_44/44_Orvault_1.jpg","../image/image_44/44_Orvault_2.jpg","../image/image_44/44_Orvault_3.jpg","../image/image_44/44_Orvault_4.jpg","../image/image_44/44_Orvault_5.jpg","../image/image_44/44_Orvault_6.jpg"]},"Consult_chateau_formulairee94e":{"id":"Consult_chateau_formulairee94e","dept":"44","canton":"St-Herbain","commune":"Orvault","nom":"Orvault_II","type":"Château","periode":"XVIII-XIX","histoire":"quatre châteaux dans cet article; celui de Briancelière de  Loret, de Morlière et de la Tour (voir article).                                                                                                                            BRIANCELIERE, on ne connait malheureusement que peu de chose sur lhistorique de ce château, si ce nest les familles qui ont vécues sur le domaine. Les Guibourd des Hils, du Breil du Châtelier et Luette de La Pilorgerie sont autant de familles qui sy sont succédé. Adelson Nogues se rend ensuite acquéreur du domaine et fait reconstruire le château actuel.Aujourdhui il est habité par la famille Guemas.                                                                                                LORET, cette terre appartient à l'origine aux seigneurs d'Orvault. Le château actuel, de style néo-ghotique, est reconstruit en 1850 par Mme Louis de La Brosse et ses deux filles, Marcelle et Cécile de La Brosse. C'est un bel exemple de site boisé dominant un magnifique plan d'eau. Les communs datent du XIXe siècle et comportent un manoir avec tourelle. Ce manoir de la Bussonnière, propriété de la famille de Charette, seigneurs de la Gascherie en 1714, puis de Charles André Boucher de La Ville en 1776, fait partie du domaine, il contient quelques éléments du XVIe sièle. Le château du Loret a reçu, pendant quelques heures en 1949, le Général de Gaulle, le temps pour lui de rencontrer les délégués ouvriers du rassemblement du Peuple Français de la région nantaise. Les de la Brosse, perpétuant la tradition familiale depuis plus de cent vingt ans, se succèderont comme maire d'Orvault.","architecture":"MORLIERE, ce château, de dimensions modestes, présente une cour d'honneur, des communs ainsi qu'un jardin arboré. Il est caractéristique des habitats bourgeois nantais en vogue dans la deuxième moitié du XVIIIe siècle. Il conserve, dans les deux pièces de réception du corps de bâtiment principal, des décors intérieurs dignes d'intérêt; ensemble de lambris dans lesquels sont intégrés des tableaux en-dessus de la porte inspirés des oeuvres du peintre François Boucher, constitue l'atout principal de cette Folie, par ailleurs austère, raideur sans doute liée à l'absence totale de décor sur les façades. La chapelle a été transformée en musée. Il est inscrit au titre des M.H., depuis le 22.12.2011. \r\nLa TOUR, au début du XIXe siècle, le domaine devient la propriété du baron de Rascas qui épouse Marie-Antoinette Lemoyne, dernière représentante de sa famille. En 1850, le baron de Rascas fait don au musée Dobré de la Piéta qui ornait lautel de la chapelle de la Tour. Cette oeuvre remarquable en pierre de Loire date du XVe siècle  début XVIe siècle. En 1999, la ville a fait réaliser une copie de cette piéta. En 1874, le domaine change une nouvelle fois de propriétaire. Monsieur Thibaud de la Nicollière alors conseiller général et membre du conseil municipal dOrvault achète les 125 hectares du domaine.\r\nVers 1900, la fille de Thibaud de la Nicollière, seule héritière, épouse le vicomte Stéphen de Sécillon. La famille de Sécillon est une famille de vieille lignée bretonne, originaire de Vannes. De cette union naîtront trois filles : Guyonne, Donatienne et Nanine de Sécillon. Cest avec le vicomte que le domaine subit ses plus grandes transformations. Le mur denceinte est détruit, les façades sud et nord  sont aménagées en style néo-gothique avec des toitures en poivrière et des gargouilles.","habitants":"Loret; famille de la Brosse.                                                             Morlière  peintre François Boucher, \r\n        \"","divers":"A Orvault dans cet article; celui de Briancelière de  Loret grav  1 et Morlière   et de la Tour grav 2-3.  Raguenet grav -4 Raffuneau grav-5               Plessis grav_6","gps":"","images":["../image/image_44/44_Orvault_II_1.jpg","../image/image_44/44_Orvault_II_2.jpg","../image/image_44/44_Orvault_II_3.jpg","../image/image_44/44_Orvault_II_4.jpg","../image/image_44/44_Orvault_II_5.jpg","../image/image_44/44_Orvault_II_6.jpg"]},"Consult_chateau_formulaire1670":{"id":"Consult_chateau_formulaire1670","dept":"44","canton":"Ancenis","commune":"Oudon","nom":"Oudon","type":"Château","periode":"XII-XVII-XIX","histoire":"Plusieurs châteaux à Oudon; Haute-Roche,  Oudon et Couffé.                                                                                         HAUTE-ROCHE, construit au XIXe siècle, par Lemarié de Champtenay.  devient ensuite la propriété de Jacques Nicolas de Fleuriot, de Marie de Boussineau, de René du Plessix, d'André Clarac en 1949.                                                                     \r\nOUDON, est attesté dès le XIIe siècle. Il est possédé pendant trois siècles par une famille du même nom. Il est assiégé par le roi de France en 1230 et 1234. En 1392, Jean IV, duc de Bretagne, autorise le seigneur de Oudon, Alain de Malestroit, à reconstruire le château abîmé par les guerres de successions, travaux terminés en 1415, à la fin de ses travaux les soeurs de Alain de Malestroits Madeleine et Jeanne rachètent le château qui passera par héritage à leurs enfants. Vers 1526, cette famille s'illustre dans le faux monnayage et François Ier les condamne à la peine capitale et ils sont exécutés sur la prairie de Biesse, à Nantes. Au XVIe siècle, le château devient la propriété d'Anne de Montmorency, puis de la famille Condé au XVIIe siècle. A la Révolution, le château est confisqué et devient bien national. En 1807, il est acheté par les Granger qui vendent les marches d'escaliers, les planchers, les pierres.","architecture":"HAUTE-ROCHE, magnifique parc avec jardins de rocailles naturelles, à flanc de coteau. Les failles des rochers ont été plantées de conifères nains, arbustes et plantes vivaces. Les escaliers et sentiers aménagés offrent de magnifiques points de vue sur la Loire.                                                       OUDON,  Il est racheté en 1820 par le département, l'architecte Ruprich Robert rétablit les mâchicoulis,  l'enceinte fortifiée flanquée de deux tours qui garde le portail d'entrée  du XVe siècle, le chemin de ronde, la couverture sur l'ensemble du donjon haut de 70 mètres, les meneaux des fenêtres, les travaux de restauration de la maçonnerie de la tour et de consolidation de l'enceinte sont entrepris de 1974 à 1981. En 1984, l'effort se poursuit sur les parties supérieures d'enceinte : la porte murée entre les deux tours de défense est dégagée et réouverte. De 1992 à 1995, l'escalier à vis est reconstruit et les étages sont restitués. Dans la salle du rez-de-chaussée, un pêcheur nous conte sa vie quotidienne. En pénétrant dans la salle du deuxième étage le visiteur se trouve propulsé en pleine Guerre de Vendée.","habitants":"Haute Roche; famille de René du Plessix.                                              Oudon; Famille d'Oudon\r\n        \"","divers":"Haute Roche grav-3-4-5 Oudon- tour grav-1-2-6.  47° 20' 43,98\" Nord, 1° 17' 19,34\" Ouest Couffé  : 47° 23' 10\" Nord et 1° 17' 58\" Ouest","gps":"","images":["../image/image_44/44_Oudon_1.jpg","../image/image_44/44_Oudon_2.jpg","../image/image_44/44_Oudon_3.jpg","../image/image_44/44_Oudon_4.jpg","../image/image_44/44_Oudon_5.jpg","../image/image_44/44_Oudon_6.jpg"]},"Consult_chateau_formulaire7f98":{"id":"Consult_chateau_formulaire7f98","dept":"44","canton":"Machecoul","commune":"Paulx","nom":"Paulx","type":"Château","periode":"XV-XVIII-XIX","histoire":"A Paulx, cinq châteaux dans cet article dont celui de Paulx,  de Patelière, de la Giranière, de la Choltière et de Caraterie.\r\nPAULX, bien que situé à proximité de Paulx, il se trouve en réalité en commun sur les secteurs de Saint-Etienne-de-Mer-Morte et de Paulx.  Le château date du XIXe siècle. Mais, il remplace un édifice plus ancien incendié en 1832, car c'est à cette date que la duchesse du Berry décida de soulever le pays contre Louis Philippe (dynastie des Orléans). Elle voulait le destituer, en portant son fils (dynastie des Bourbons, légitimistes) sur le trône de roi de France.                                                                                            Le logis de l'ILAIR du  XVIIIe au XIXe siècles : propriété successive des familles Praud de la Nicollière et Vidal de Lauzun.\r\nPATELIERE, le logis date du  XVIIIe au XIXe siècles ; : la chapelle, qui jouxte lancienne propriété des familles Moliès et Dubois, est dédiée à Saint-Clair.                                                                                                             GIRAINIERE,   le logis date du XIXe siècle.\r\nCHOLTIERE,  (XVII-XIXe siècle) : ancien fief des familles Imbert et De Nouël. Société civile immobilière est en activité depuis 15 ans. André Moreau, est gérant de l'entreprise.\r\nCARATERIE, du XVe siècle, reconstruit au XIXe siècle. Ce château hébergea des familles influentes de Paulx : De Cornulier et De La Biliais l'origine propriété de la famille de La Jou, il passa ensuite aux familles de Cornulier  alliance en 1651 de Charles de Cornulier avec Louise de La Jou, dame de la Caraterie, d'Escrots d'Estrée, Le Loup de La Biliais.","architecture":"PAULX  château de la Caraterie construit sur une  plateforme entouré d'eau, corps de logis de plan rectangulaire sur soubassement à deux niveaux et série de lucarnes sur comble flanqué de part et autre de pavillon rectangulaire,  Le château actuel date du XIXe siècle et remplace un édifice plus ancien, incendié lors de l'insurrection royaliste de 1832.                                                                                                GIRAINIERE,   le logis date du XIXe siècle.\r\nCHOLTIERE,   le château  a conservé une chapelle bénite en 1749 ;Le Château de la Choltière (XVII-XIXe siècle).\r\nCARATERIE, du XVe siècle, reconstruit au XIXe siècle. Même sil est situé sur le territoire de Saint-Etienne-de-Mer-Morte.","habitants":"Caraterie , famille de la Jou\r\n        \"","divers":"A Paulx, celui de Paulx,  et de la Choltière grav 3","gps":"","images":["../image/image_44/44_Paulx_1.jpg","../image/image_44/44_Paulx_2.jpg","../image/image_44/44_Paulx_3.jpg"]},"Consult_chateau_formulairec2de":{"id":"Consult_chateau_formulairec2de","dept":"44","canton":"Nort sur Erdre","commune":"Casson","nom":"Plessis_Casson","type":"Château","periode":"XVIII","histoire":"PLESSIS-CASSON, la terre du Plessis est mentionnée comme seigneurie des 1260. Le premier seigneur était Main du moulin. En 1753, le château médiéval devenu trop inconfortable est reconstruit et remplacé par celui que nous pouvons voir actuellement, de style classique par Martin de Boux. En 1760, eu lieu la bénédiction de la chapelle du château, elle fût détruite à la Révolution. Parmi les plus illustres occupants du domaine, nous pouvons citer : François Dollier de Casson (1636-1701), capitaine de cavalerie puis prêtre, qui fût envoyé en mission à Québec, il dessina une partie des plans de la ville de Montréal.    Sa collection d'arts est aujourd'hui en grande partie visible au musée d'arts de Nantes grâce à sa généreuse donation. Le domaine devint la propriété de la famille Boux de Casson. Il passa ensuite par héritage aux Urvoy de Saint-Bedan puis par alliance en 1843 au comte de Bouillé qui prépara la fuite de Louis XVI a Varennes.  Aujourd'hui le comte et la comtesse Jacques de Bouillé  y réside toujours.","architecture":"PLESSIS-CASSON, Il a été construit à l'emplacement d'un ancien château fort. le château actuel est dû à Jean-Baptiste Ceineray, l'architecte notamment de l'hôtel qui accueille la préfecture de Nantes. Sa construction débuta en 1753 par le corps central et le pavillon gauche avec un avant corps coiffé d'un fronton et de solide pavillons d'angle. Le château fût achevé après la Révolution par la construction du pavillon droit en 1805. Le parc abrite un charmant monument érigé au XIXe siècle. Il est composé d'un étang, surplombé par une grotte et un obélisque de grès rose.  Ancienne seigneurie connue depuis le XVIe siècle, avec château fort qui fut remplacé, au XVIIIe siècle, par un château de plaisance par Martin Boux  de Casson, vers 1753, date inscrite au fronton. Laissé inachevé à la Révolution, et partiellement brulé il fut complété par le Marquis Urboy de Saint-Bedan après son retour d'exil vers 1800-1805. Quelques légères transformations eurent lieu vers 1846 au 1er étage. La chapelle et les anciennes dépendances ont disparu. Le domaine s'est transmis dans les mains des descendants d'Urvoy de Saint-Bedan jusqu'à nos jours.\r\n Le bâtiment fût inscrit au titre des M.H. en 1989.","habitants":"Famille François Dollier de Casson \r\n        \"","divers":"Château de Plessis Casson à Casson","gps":"","images":["../image/image_44/44_Plessis_Casson_1.jpg","../image/image_44/44_Plessis_Casson_2.jpg","../image/image_44/44_Plessis_Casson_3.jpg"]},"Consult_chateau_formulairebe3b":{"id":"Consult_chateau_formulairebe3b","dept":"44","canton":"Ancenis","commune":"Anetz","nom":"Plessis_de_Vair","type":"Château","periode":"XII-XV-XVII","histoire":"PLESSIS de VAIR dit Atlantique, forteresse construite pour Samuel de Vair au XIIe siècle. Au XVe siècle un château remplace cette place forte féodale. Il subsiste de cette période deux tours rondes, le colombier et les archives. En 1518, le roi François Ier séjourne au château de Vair avec sa femme la reine Claude de France enceinte du futur Henri II. La reine restera deux mois au château durant les déplacements de François Ier. Anne Boleyn future reine dAngleterre, accompagne Claude de France comme dame de compagnie. Au XVIIe siècle le Marquis de Cornulier, conseiller de Louis XIV et président du Parlement de Bretagne, construit les deux tours carrées.                    L'édifice appartient à la famille Allizon depuis 2011. La location du château pour divers événements  réceptions privées et professionnelles, festival, ouverture au public, etc. sert à financer son entretien.","architecture":"PLESSIS,  au XIIe siècle, forteresse puissante entourée de douves en eau, il inspire Chrétien de Troyes pour les romans des légendaires chevaliers de la table ronde. Le château de Vair serait le château du Graal. Au XVe siècle un château remplace cette place forte féodale. Il reste de cette période deux tours rondes, le colombier et les archives.   Au XVIIe siècle le marquis de Cornulier, Conseiller de Louis XIV et président du parlement de Bretagne, construit les deux tours carrées, la chapelle, lorangerie et les deux pavillons de lentrée. Au XIXe siècle est élevé le bâtiment central et son enfilade de salons lumineux. Fous de patrimoine a pour but de contribuer à la sauvegarde des quatre tours du XVe et XVIIe siècle du château de Vair qui sont inscrites MH. Cette opération vous permet de faire un don pour restaurer les charpentes, les pierres de tuffeau, les couvertures en ardoise, les enduits à la chaux et les huisseries en chêne. Au XIXe siècle est bâti lédifice central et son enfilade de salons lumineux.","habitants":"Famille de  Samuel de Vair\r\n        \"","divers":"Vair 47° 23' 42\" Nord et 1° 05' 00\" Ouest","gps":"","images":["../image/image_44/44_Plessis_de_Vair_1.jpg","../image/image_44/44_Plessis_de_Vair_2.jpg","../image/image_44/44_Plessis_de_Vair_3.jpg","../image/image_44/44_Plessis_de_Vair_4.jpg","../image/image_44/44_Plessis_de_Vair_5.jpg","../image/image_44/44_Plessis_de_Vair_6.jpg","../image/image_44/44_Plessis_de_Vair_7.jpg","../image/image_44/44_Plessis_de_Vair_8.jpg"]},"Consult_chateau_formulaire5b5b":{"id":"Consult_chateau_formulaire5b5b","dept":"44","canton":"St-Philibert de Grand Lieu","commune":"Pont-Sain-Martin","nom":"Plessis_Pont_st_Martin","type":"Château","periode":"XV-XVII","histoire":"PLESSIS-Pont-St-Martin, appartient à partir de 1404 au  de Jean d'Ust chambellan de Jean IV,  vendu à Jehan de Trevecar capitaine de Guérande son fils devient seigneur du Plessis en 1453 et porte le titre de  vicomtes de Rezé, passe ensuite aux Guémadeuc, en 1555 passe  à Gilles Bernard, puis aux Martel, puis aux Bérand avant d'être acquis en 1632  par Michel Sauvaget, conseiller du roi et receveur des fouages qui modernisa le vieux manoir, son fils Pierre prit sa relève. Puis son neveu Pierre Brossard  seigneur de la Trocardière, la nièce de ce dernier  Margurerite-Jacquette Brossard sera dame du Plessis elle épouse en 1724 le chevalier Pierre-Eustache de Cornulier du Vernay. Il devient le siège de la seigneurie de Pont-Saint-Martin sous Louis XV (1715-1774) et la propriété de Nicolas Roche de Fermoy, négociant, armateur nantais, en 1754. Ce dernier est anobli par Louis XV en 1759 et devient seigneur de Fermoy et du Plessis, sa fille  Renée-Jeanne à épousée Michel-Julien-Alain Picot  de Limoëlan qui sera guillotine en 1793 , la propriété passe au Rozier en 1830 Puis la demeure sera la propriété des Irlandais O'Brien, Shéridan, alliés aux Picot de Limoélan.\r\nPlus récemment, en 1972 les Brigode deviennent propriétaires, puis passe  à la famille Belorde avant d'être racheté en 2011 par Eliane et Philippe Hanin qui viennent y habiter.","architecture":"PLESSIS Pont-st-Martin, construit au XVe siècle est en partie classé depuis 1975 pour sa toiture et ses élévations.  Situé sur la route des Sorinières, au cur du vignoble, date du XIVe et a été remanié aux XVe et XVIIe siècles. se compose d'un corps de logis  cantonné de deux pavillons à toitures indépendantes, à gardé sur la façade en son centre une tourelle demi-hord oeuvre abritant l'escalier, la façade sur cour perçée d'ouvertures régulièrement disposées et couronnée à sa travée centrale d'une lucarne à fronton cintrée chevauchant le toit en forte pente. les autres Lucarnes sont sommées d'un fronton triangulaire. Il a gardé toute la majesté des siècles passés et continue de présenter beaucoup de charme, notamment avec ses jardins et ses roseraies. Le monument est inscrit au titre des M.H.depuis 1975, et ouvre les portes de ses jardins lors des journées nationales du patrimoine. Un an de travaux a été nécessaire pour rénover extérieur et intérieur, y compris le parc de deux hectares, pour une nouvelle jeunesse avec trois chambres d'hôtes (meublées d'époque) à l'intérieur même du château et deux gîtes dans les dépendances.","habitants":"Famille de  Nicolas Roche de Fermoy\r\n        \"","divers":"Pigossière grav-3","gps":"","images":["../image/image_44/44_Plessis_Pont_st_Martin_1.jpg","../image/image_44/44_Plessis_Pont_st_Martin_2.jpg","../image/image_44/44_Plessis_Pont_st_Martin_3.jpg"]},"Consult_chateau_formulaire65dc":{"id":"Consult_chateau_formulaire65dc","dept":"44","canton":"Châteaubriand","commune":"Saint-Aubin des châteaux","nom":"Plessis_St_Aubin","type":"Château","periode":"XIV-XV","histoire":"PLESSIS, construit pour Gallois de la Tour, premier président au parlement d'Aix en Provence, demeure bien insérée dans un site boisé dominant la Chère. Occupation du site dès l'époque médiévale, construction d'un manoir aux XIVe-XVe siècles, les bâtiments sont \"modernisés\" aux XVIIe siècle (partie ouest vers 1640) et XVIIIe siècle (partie Est vers 1738), façade brique et pierre. \r\nÉléments protégés MH : les façades et les toitures du château, des communs et du petit pavillon subsistant du XVIIe siècle : inscription par arrêté du 9 décembre 1992.","architecture":"PLESSIS, la construction du Plessis date des XVe (partie centrale appelée « manoir-porche ») et XVIIe siècles (les trois ailes du château). Cette demeure des XVIIe et XVIIIe siècles est bien insérée dans un site boisé, et domine la Chère. C'est un château d'époque médiévale. Construction d'un premier manoir aux XIVe-XVe siècles. Les bâtiments furent \"modernisés\" aux XVIIe (partie ouest vers 1640) et XVIIIe siècles (partie est vers 1738). Au XIXe siècle, la propriété s'organise comme une unité de production : fournil, pressoir à pommes, bâtiments agricoles. Le château, et ses dépendances, sont inscrits aux M.H. depiis le 9/12/1992. Malgré des efforts de protection du château, le bâtiment est désormais à l'état de « ruine » mais ses propriétaires espèrent bien pouvoir entreprendre des travaux de rénovation dans les prochaines années. Régulièrement ouvert au public depuis 1993, le château du Plessis est une propriété privée à Saint-Aubin-des-Châteaux, en direction de Ruffigné.","habitants":"Famille de Gallois de la Tour\r\n        \"","divers":"Plessis 47° 43' 15\" Nord, 1° 29' 06\" Ouest","gps":"","images":["../image/image_44/44_Plessis_St_Aubin_1.jpg","../image/image_44/44_Plessis_St_Aubin_2.jpg","../image/image_44/44_Plessis_St_Aubin_3.jpg"]},"Consult_chateau_formulaire8c0d":{"id":"Consult_chateau_formulaire8c0d","dept":"44","canton":"Pontchâteau","commune":"Plessé","nom":"Plessé_Carheil","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux à Plessé celui de Carheil et d'Epinay.                           CARHEIL,  a appartenu à six générations de la famille du Cambout de Coislin, entre 1619 et 1842. Ruinée à la suite des événements de 1832, le château de Carheil est alors acquis par le prince de Joinville, fils de Louis- Philippe, en 1842. La marquise de Coislin se retire dans le manoir voisin de Buhel et le comte de Coislin dans son hôtel parisien de la place de la Concorde. Le prince de Joinville fait remanier le château. Il fait enduire d'un crépissage imitant des rangées de briques, fait construire la terrasse enduisant le cours de l'Isac et la chapelle actuelle, dont les vitraux sont réalisés par la manufacture de Sèvres d'après des dessins d'Ingres. Après la révolution de février 1848, l'ensemble du domaine est vendu, par acte  privé, le 25 janvier 1853, à Mme Pauline de Guaita, épouse de Jean Baptiste Robert de Mesny, et petite-fille de Franz Maria Schweitzer et d'Antoine-Marie Guaita. Il revient ensuite à sa fille Adèle de Mesny, épouse du baron Charles-Maurice Gourlez de La Motte, fils du général Auguste Gourlez de La Motte et oncle du Dr Alexis Carrel. Le château de Bogdelin, en Guenrouët, est bâti par la famille Gourlez de Lamotte et devient un partage de Carheil. En 1923, Mme de la Motte, née Anne de Montaigu, vend la terre de Carheil au comte Jacques Armand et son épouse, née Levesque du Rostu, dont les parents, les Arnous-Rivière, Levesque du Rostu et La Rochefoucauld, étaient respectivement fixés au château de Fresnay, au château de l'Épinay et au château de Pont-Forêt, à Plessé. La guerre survenant, la propriété est revendue en 1943 à M. Lefièvre-Binet, tout en en gardant la jouissance du château jusqu'à la fin des hostilités. Au début de janvier 1945, le château est détruit par un incendie. Le monument est inscrit au titre des M.H en 1980","architecture":"EPINAY, sur les restes d'un vieux château très endommagé lors des Guerres de religion, Guillaume Harouys en fait construire un nouveau entre 1642 et 1650. Il confie le projet à l'architecte François Mansart. Les propriétaires successifs sont les Harrouys, les Becdelièvre, Taverne, Linsens, Bourcher d'Argis et de Montbeillard.Le premier cadastre de Plessé (1845) est une mine dinformations pour la reconstitution de lhistoire foncière de la paroisse de Plessé, à la lumière des textes anciens. Il est aussi dune grande importance pour lhistoire des Lespinay et de la construction de leur patrimoine. La mention de toponymes anciens permet de faire le lien avec les textes des XVe et XVIe siècles. Le plan du château-fort de LEspinay, construit après 1492 et partiellement rasé au XVIIIe siècle, apparaît clairement avec ses douves, disparues depuis, de même que lon peut avoir une idée des limites danciens fiefs qui ont appartenu aux premiers Lespinay (Polignac, Bodouan, Couédan, Le Haut-Espinay, les Rôtiz, La Haute-Ville, Kerguemer, etc.) et à leurs alliés du Guiniou (Le Guiniou, La Perchette) et de Marbré (Malarit, Le Breil, Les Bignons). Le monument est inscrit au titre des M.H. en 1963.","habitants":"Carheil famille du Cambout de Coislin,                                       Epinay , famille Harrouys\r\n        \"","divers":"à Plessé celui de Carheil grav 1-2-3 et d'Epinay grav-4-5.","gps":"","images":["../image/image_44/44_Pless%c3%a9_Carheil_1.jpg","../image/image_44/44_Pless%c3%a9_Carheil_2.jpg","../image/image_44/44_Pless%c3%a9_Carheil_3.jpg","../image/image_44/44_Pless%c3%a9_Carheil_4.jpg","../image/image_44/44_Pless%c3%a9_Carheil_5.jpg"]},"Consult_chateau_formulaire6ec2-2":{"id":"Consult_chateau_formulaire6ec2-2","dept":"44","canton":"St-Brevin-les_Pins","commune":"Saint-Viaud","nom":"Pléssis_St_Viaud","type":"Château","periode":"XIV-XVI","histoire":"PLESSIS-GRIMAUD, en 1869, le propriétaire du château du Plessis Grimaud, Guillaume Leray, le lègue au département pour en faire un orphelinat. Ce couple a subitement perdu leurs enfants de la tuberculose. Un bâtiment annexe fut construit et les orphelins furent formé au métier de l'agriculture. Le château appartient à la famille De Villepin, dont Dominique de Vilepin est le petit neveu. Les propriétaires sont également apparenté à Gérard d'Aboville, une grande famille de marins et de militaires.                                                                                          PLESSIS-MAREIL  C'est un château dont la construction date du XIVe au XVIe siècle. Le château du Plessis-Mareil a été la propriété de la famille de Mareil, puis de la famille Carné au XVIIe siècle. A la Révolution, le château du Plessis-Mareil appartenait à la famille du Bot de Talhouët. Le château est inscrit au titre des M.H. en 1978.","architecture":"PLESSIS-GRIMAUD  La villa Palatine fut construite sur un ancien manoir, détruit en 1826. C'est une demeure cossue à l'intérieur et richement meublée. Le château ne se visite qu'aux 2 Journées du Patrimoine. Le château du Plessis-Mareil est inscrit aux M.H. depuis 1978.","habitants":"Plessis-Mareil, famille de Mareil                                  Plessis-Grimaud; famille De Villepin,\r\n        \"","divers":"Plessis  47° 15' 59\" Nord, 1° 57' 47\" Ouest                   Grimaud 47° 15' 22 Nord, 2° 01' 06\" Ouest   Grav-2                   Mareil 47° 16' 3\" Nord 1° 57' 41,76\" Ouest   grav 1","gps":"","images":["../image/image_44/44_Plessis_St_Viaud_1.jpg","../image/image_44/44_Plessis_St_Viaud_2.jpg","../image/image_44/44_Plessis_St_Viaud_3.jpg"]},"Consult_chateau_formulaire7aa1":{"id":"Consult_chateau_formulaire7aa1","dept":"44","canton":"Pontchâteau","commune":"Avessac","nom":"Pordor","type":"Château","periode":"XIV","histoire":"PORDOR, la construction du château du Pordor date du XIVe au XVIIe siècle. C'était un ancien poste de surveillance connu dès le XIIe siècle. Le domaine du Pordor fut le siège d'une puissante seigneurie dès le début du XIIIe siècle.  Le château du Pordor fut la propriété de Pierre de Luzanger, seigneur de Derval, puis des Familles de Theillac, Le Breton de Villaudry, de Durfort de Lorges, de Mauger, Sablentin, de Goulaine, Figat et Pommier. La famille Sallentin, fut propriétaire du château et des terres du Pordor. Cette famille est connue depuis le XVIe siècle dans le patrimoine de la ville de Pont-Sainte-Maxence (Oise). Installée à Nantes, la branche du Pordor fit fortune à la fin du XVIIIe et au début du XIXe siècle, dans le négoce des céréales, puis dans le commerce triangulaire. Le château du Podor se découvre après une longue allée qui descend en pente douce du village d'Avessac vers les marais de Redon. Blotti entre les bois et son étang.\r\nÉléments protégés MH : le corps de logis central, en totalité : inscription au M.H.  par arrêté du 19 novembre 2009.","architecture":"PORDOR, les premières mentions d'une résidence remontent au XIVe siècle. Au XIXe siècle, l'orientation générale du château change. Il fut agrandi et modifié, plusieurs fois, au XVIe, XIXe et au début du XXe siècle. Le château du Pordor actuel a conservé, dans sa partie centrale, les éléments essentiels du manoir médiéval, du début de XIVe, qui fut miraculeusement préservé des incendies et bouleversements révolutionnaires. Ce dernier se compose d'un ensemble de constructions s'étalant du XIVe au début du XXe siècle, avec un grand corps de logis abritant les dispositions originelles d'une salle sous charpente du XIVe siècle, les extensions du XVIIe siècle et les modernisations du XVIIIe siècle. Au XIXe siècle a été ajouté un grand pavillon à l'extrémité nord et en 1900, les petites constructions à bow-window aménagées par l'architecte Libaudière, les extensions du XVIIe siècle et les modernisations du XVIIIe siècle.","habitants":"Famille de Pierre de Luzanger,\r\n        \"","divers":"Pordor 47° 39' 47,84\" Nord, 2° 00' 24,62\" Ouest","gps":"","images":["../image/image_44/44_Pordor_1.jpg","../image/image_44/44_Pordor_2.jpg","../image/image_44/44_Pordor_3.jpg"]},"Consult_chateau_formulaire11b4":{"id":"Consult_chateau_formulaire11b4","dept":"44","canton":"Pornic","commune":"Pornic","nom":"Pornic","type":"Forteresse","periode":"XII-XV-XVIII","histoire":"PORNIC, le château est bordé d'un côté par l'océan et est construit sur un site défensif, il assurait au Moyen-Âge la défense du port.\r\nAu Xe siècle, Alain Barbetorte, Duc de Bretagne le construit en bois et en fait une place forte, il est alors occupé par une garnison qui protège l'entrée de Pornic.  Au XIIe siècle, il est la propriété des seigneurs de Rais qui le reconstruisent en pierre et lui donnent de la valeur. Au XVe siècle, le tristement célèbre Gilles de Rais, également compagnon darmes de Jeanne dArc, en devient le propriétaire.  il appartient à Gilles de Rais puis est confisqué par le duc de Bretagne au moment de son procès. Au XVIIIe siècle,   A la fin du XVIIIe siècle, le château est la propriété du marquis de Brie Serrant  économiste distingué, achète la baronnie de Retz en 1778. Ses biens sont confisqués pendant la Révolution Française, puis de mauvais placements financiers, l'ont totalement ruiné. Le baronnie de Retz n'est réglée que partiellement et tous les châteaux de son duché sont en ruine lorsqu'il décède en 1814. Au XIXe siècle, le château de Pornic, appartient à Casimir Perier, Jacques Laffitte et Philippe-François-Didier Usquin, banquiers, créanciers de la succession du marquis. En 1824, il est racheté par le négociant Joseph Le Breton, adjoint au maire de Nantes et fondateur de l'établissement des bains de mer. Il réalise une première restauration du château.","architecture":"PORNIC,  baigné par la mer sur l'un de ses côtés, est construit sur un site défensif autrefois entouré d'eau de part et d'autre. C'est Alain, dit Barbe-Torte, duc de Bretagne, qui ordonne la construction de cette forteresse au Xe siècle pour faire face à l'invasion viking. Il en fait une place forte, occupée par une garnison vouée à protéger l'entrée du port de Pornic. Au XIIIe siècle, le château appartient aux seigneurs de Rais qui construisent un nouveau château en pierre. Avec la Révolution Française, ses biens sont confisqués et le bâtiment tombe en ruine. C'est l'architecte nantais Bougouin qui, à la fin du XIXe, lui donne son aspect actuel avec sa toiture en forme de poivrière et sa gargouille. La tour Nord du XIIIe siècle est la plus ancienne ; la tour Sud, elle, daterait du XVe siècle. Aujourd'hui, le château est privé et ses jardins se visitent dans le cadre des visites guidées proposées par l'Office de tourisme de Pornic. En 1886, ses descendants, font appel à l'architecte nantais François Bougoüin, pour lui donner son aspect actuel, avec des fenêtres en plein cintre appareillées en briques, dans l'esprit de l'architecture italienne du château de Clisson. En 1986, le château est inscrit au titre des M.H. Situé sur la rive nord du port de Pornic, le château est depuis longtemps l'un des symboles de la ville.","habitants":"marquis Alexandre de Brie-Serrant\r\n        \"","divers":"Château de Pornic","gps":"","images":["../image/image_44/44_Pornic_1.jpg","../image/image_44/44_Pornic_2.jpg","../image/image_44/44_Pornic_3.jpg","../image/image_44/44_Pornic_4.jpg"]},"Consult_chateau_formulaire4410":{"id":"Consult_chateau_formulaire4410","dept":"44","canton":"La Baule-Escoublac","commune":"Pornichet_Croisic","nom":"Pornichet_Croisic","type":"Château","periode":"XV-XIX","histoire":"A la Baule  le château  de Lesnerac et le manoir Castel-Marie-Louise de la famille Desseijo Barrico et à cinq kilomètres au sud à Pornichet la Baule le château de Ker-Juliette,  la villa Lakmé et la villa Sigur de 1900, et des Tourelles.                                                                                                                            LESNERAC,  la construction date du XVe au XIXe siècle. Du XVIe siècle à 1789, Escoublac demeure sous la juridiction seigneuriale de Lesnerac. Le château actuel existait déjà, partiellement, en 1460, étant lancienne seigneurie de la famille Le Pennec. Il passe ensuite en la possession de la famille Lesnerac puis en celle du comte de Sesmaisons, de 1818 à 1836. Le 26 août 1818, une ordonnance royale charge le comte de Sesmaisons avait été chargé de boiser 628 hectares de létendue sableuse du domaine. Il s'agit du début du lotissement de la future station balnéaire de La Baule. Au début du XIXe siècle, son propriétaire, le comte de Sesmaisons, va créer la grande allée, qui rejoint le château à la route de Guérande et fait construire 2 pavillons italianisants au bord de cette route. Il contient également une chapelle privée et des dépendances. Ils appartient à des particuliers. Les écuries de la ferme datent du XIXe siècle. Une des fenêtres du château arbore une coquille Saint-Jacques. Un parc de jeux a été installé, en 2016, dans le parc du château ainsi qu'un  golf. La destination actuelle du château sert d'habitation, et de location de salles pour des réceptions.","architecture":"La villa KER, souveraine, datant de 1925, dite aussi villa Rose ou villa des Sirènes, est située sur le boulevard des Océanides, mais a été construite avant le percement de cette voie. De style néoclassique italien, elle est due aux architectes Georges Vachon et Adrien Grave. Sa façade est ornée de quatre sirènes. Cette villa fait lobjet dune inscription au titre des M.H. depuis le 19 septembre 2002.\r\nLa villa l'Orientale, signée par Antonin Ville aurait été construite pour ce que l'on appelait alors pudiquement une « danseuse », une femme entretenue. Elle serait luvre d'Antonin Viale en 1909. Destinée à une famille de retour des Indes, elle est d'inspiration mauresque. Ses deux façades dont identiques. Détruite par deux incendies, elle est réhabilitée à l'identique en 1995 par le maître duvre Jean-Pierre Mayas ; seuls éléments non restitués : un petit minaret juché sur le toit et les vitraux, éléments jugés trop chers à reconstituer.                                                     TOURELLES, la villa dite château des Tourelles est située sur l'avenue Léon-Dubas. Elle est construite en 1830 pour un aristocrate d'origine belge, le baron Wanters, faite à base de granit, elle doit son surnom aux éléments d'architecture inspirés du style médiéval. Cédée à Louis Flornoy, négociant et armateur, dont le fils vend le « château » à M. Legrand. Le château des Tourelles, est acquis dans les années 1930 par la mairie du XIIe arrondissement de Paris qui en fait une colonie de vacances. En 2013, la villa devient un établissement de thalassothérapie 4 étoiles du Groupe Phélippeau.","habitants":"Lesnerac; famille Le Pennec.                                                Tourelles; baron Wanters\r\n        \"","divers":"Pornichet  47° 15' 30\" nord, 2° 19' 23\" ouest                        Lesnerac 47° 17' 34\" Nord, 2° 19' 24\" Ouest                       Tourelle-grav-4                                                                                           Ker marie grav 2-3","gps":"","images":["../image/image_44/44_Pornichet_Croisic_1.jpg","../image/image_44/44_Pornichet_Croisic_2.jpg","../image/image_44/44_Pornichet_Croisic_3.jpg","../image/image_44/44_Pornichet_Croisic_4.jpg","../image/image_44/44_Pornichet_Croisic_5.jpg","../image/image_44/44_Pornichet_Croisic_6.jpg"]},"Consult_chateau_formulaire8c20":{"id":"Consult_chateau_formulaire8c20","dept":"44","canton":"Marchecoul","commune":"Port-Saint-Père","nom":"Port_St_Père","type":"Château","periode":"XVIII","histoire":"Trois châteaux à Port-St-Père  celui de Grandville (voir article) . Château de Briord, construit au XVIIIe siècle et inscrit aux M.H. depuis 1977. Château de Grandville (ou château de Granville), d'architecture néo-palladienne, construit au XIXe siècle et inscrit aux monuments historiques depuis 1992.  Château de La Tour, reconstruit en 1800.                                                                                                                                                BRIORD, la seigneurie de Briord dont l'origine remonte à 1225 . Séris de Rezay, vidame de Rezay et du Pallet, possédait dès 1225 la seigneurie de Briord en la paroisse de Port-Saint-Père.  L'un de ses successeurs fut en 1341 Sévestre de Rezay qui rendit aveu au seigneur des Huguetières pour partie de sa terre de Briord en 1390. Au XVe siècle appartient à Pierre Landais, puis vinrent Aimery de Rezay, seigneur de Briord en 1412 et Martin de Rezay qui obtint en 1437 l'érection de Briord en haute justice. Martin de Rezay vendit vers 1444 la seigneurie de Briord à Jean Labbé seigneur de la Rochefordière chambellan du duc François Ier. Le château est la propriété de Joseph de Charette qui le reconstruit en 1770. Il devient ensuite la propriété des familles de Lautrec, Etienne et Say. Une chapelle privée dédiée à Saint-Germain est édifiée par Joseph Charette en 1780 vendu comme bien national en 1798. Le château de Briord fut racheté par l'armateur nantais Dubois-Violette, propriétaire du château de Chassay, en 1800 et puis passa dans les mains de son fils jusqu'en 1833. Il est restauré par  M. le comte Pelet de Lautrec. modifié par le Jean-baptiste Etienne, nouveau propriétaire, petit fils de l'industriel nantais Jean-Simon Voruz Le château de Briord appartient toujours à la famille Etienne et à ses descendants qui sont les Say des sucriers de Nantes.","architecture":"BRIORD, c'est un château fort. Sa construction date de 1770, pour Joseph de Charette de la Contrie fait démolir  l'ancien manoir médiéval mais conserve les douves et les bases de  l'édifice. Il a été bâti sur l'emplacement d'une ancienne construction médiévale. Le château de Briord a ensuite appartenu au comte de Lautrec, général des armées du roi des Deux-Siciles, qui y fit édifier la tour, vers 1860, sur le corps central du château, et qui sera modifié par  Jean-baptiste Etienne, nouveau propriétaire, petit-fils de l'industriel nantais Jean-Simon Voruz.  De plan à deux niveaux sur soubassements, lucarnes sur combles, escalier en fer à cheval,  fronton sur avant corps d'entrée.  Accolé côté opposé d'une tour ronde  toit en dôme avec lanternon. Il est entouré de profondes douves et une grosse tour a été ajoutée à la façade nord de l'ancien manoir féodal. L'entrée de la vaste cour du château est située au sud, est inscrit aux M.H. en 1977.","habitants":"Famille de Rezay                                                                              M. le comte Pelet de Lautrec\r\n        \r\n        \"","divers":"a Port St-Père; Briord : 47° 09' 36\" Nord, 1° 46' 04\" Ouest       grav-1-2-3-4","gps":"","images":["../image/image_44/44_Port_St_P%c3%a8re_1.jpg","../image/image_44/44_Port_St_P%c3%a8re_2.jpg","../image/image_44/44_Port_St_P%c3%a8re_3.jpg","../image/image_44/44_Port_St_P%c3%a8re_4.jpg"]},"Consult_chateau_formulaire84d7-2":{"id":"Consult_chateau_formulaire84d7-2","dept":"44","canton":"Blain","commune":"Bouvron","nom":"Quéhillac","type":"Château","periode":"XVI-XVII","histoire":"QUEHILLAC, est un ensemble architectural, du XVIe siècle et XVIIe siècle, composé du château, de la chapelle Saint-Matthieu, du logis du chapelain, des écuries, de la fuie, des ponts et des douves. En 1640, Nicolas Fouquet, Ministre des Finances du roi Louis XIV épouse en premières noces Louise Fourché de Quéhillac qui lui apporte une dot et la terre de Quéhillac. Cette terre reviendra à la Famille Fourché de Quéhillac, grace à son rachat, par son cousin par alliance, Jean Fourché (1617-1675), mort sans postérité. Le château est encore actuellement la propriété de ses héritiers.  La seigneurie de Quéhillac était la plus importante de Bouvron. La première présence seigneuriale est située au nord-est de la Voliais, sur le lieu de La Motte, vestige d'une ancienne motte castrale. C'est à la fin du XVIe siècle que Quéhillac passe des comtes de Maure à une famille de petite noblesse de robe, les Fourché. Edifié pour Jean Fourché, maire de Nantes en 1597 et maître à la chambre des comptes de Bretagne ensuite. La petite-fille de Jean Fourché, Louise Fourché, épousera à Nantes, en janvier 1640 un homme célèbre, Louise Fourché, petite-fille de Jean Fourché, dame de Quéhillac, née en 1620, épouse en 1640 Nicolas Fouquet, surintendant des Finances.  Le 5 septembre 1661, Louis XIV fait arrêter, par d'Artagnan, son surintendant Nicolas Fouquet","architecture":"QUEHILLAC, Le manoir et ses dépendances (chapelle, logis du chapelain, écuries, pigeonnier, potager clos de murs, pont et douves) composent un ensemble architectural des XVIe et XVIIe siècles.  Après un procès, celui-ci est condamné à la prison à vie. 60 ans plus tôt Henri IV ayant été satisfait des talents de Jean Fourché comme diplomate dans la reddition de Mercoeur, avait accordé à celui-ci, pour compenser la perte de sa charge de maire de Nantes, celle de maître des Comptes de Bretagne. Jean Fourché, seigneur de la Courousserie, avait alors fait édifier ou remanier le château de Quéhillac, de style Henri IV, que l'on peut admirer encore aujourd'hui.  Inscrit aux M.H. par arrêté du 22 Novembre 2002.","habitants":"Nicolas Fouquet\r\n        \"","divers":"Quehillac  47° 25' 59\" Nord et 1° 54' 12\" Ouest","gps":"","images":["../image/image_44/44_Qu%c3%a9hillac_1.jpg"]},"Consult_chateau_formulaire50ed":{"id":"Consult_chateau_formulaire50ed","dept":"44","canton":"Guérande","commune":"Herbignac","nom":"Ranrouet","type":"Vestiges","periode":"XIII-XV-XIX","histoire":"A Herbignac deux châteaux celui de Coet-Caret et celui de Ranrouet.                                                                                 RANROUET  par Alain dAssérac, un proche du duc de Bretagne. A la fin du XIIIe siècle, la seigneurie dAssérac-Ranrouët passa par mariage aux seigneurs de Rochefort, barons dAncenis et vicomte de Donges. Dans la deuxième moitié du XIVe siècle, Guy de Rochefort apporta des changements au château. Il neut pas d'héritier, la seigneurie passa aux mains de la famille de Rieux par le mariage de la nièce de Guy de Rochefort avec Jean II de Rieux son neveu, lun des personnages importants de cette famille était Jean IV de Rieux, maréchal de Bretagne et lieutenant général des armées, il hérita de la propriété à la mort de son frère en 1478. Grâce à une donation dAnne de Bretagne, pour dédommagement des destructions quil a subi lors des attaques du Roi Charles VIII, mais aussi pour acheter sa fidélité, alors propriété de Jean VIII de Rieux. En 1598, lEdit de Nantes mit fin aux guerres, et les habitants déposèrent une requête pour obtenir le démantèlement du château, lordre fut enregistré au Parlement de Bretagne à Rennes après avoir été décrété par Louis XIII le 11 avril 1618. Au début du XVIIe siècle, Jean IX de Rieux frère de Jean VIII, décida de relever les ruines du château. A sa mort en 1630, son fils, Jean-Emmanuel, poursuivit les travaux. Le château passera ensuite à Jean Gustave de Rieux qui sera le dernier du nom, car ruiné, il vendra son marquisat en 1679 à René Lopriac, baron de Coetmadeuc.","architecture":"COET-CARET château du XIXe siècle transformé en hôtel  relais de france par la famille de Monneraye, habité et transmis par mes ancêtres depuis 1545, il se présente en un corps de logis à deux niveaux avec série de lucarnes sur un toit en croupe accolés d'un pavillon transversales de même niveaux.                                                                                                           RANROUET,  ce chateau fort, de style Médiéval, du XIIe siècle. Au XIIIe siècle, l'enceinte est composée de six tours reliées par cinq courtines. En haut des courtines se trouvent des créneaux, doublés d'un système de hourds, puis de mâchicoulis. Les ouvertures situées au niveau des tours sont des archères.  présentent plusieurs siècles dhistoire et darchitecture. Dans la deuxième moitié du XIIIe siècle fut construit à Ranrouët le premier château en pierre. Jean IV apporta des modifications à la forteresse médiévale en la transformant en résidence seigneuriale luxueuse et confortable. Au XVIe siècle, lors les Guerres de Religions, le château servit de base pour des expéditions contre les protestants de la région. Ce fut une période de remise en état du château, Le château sera  abandonné au cours du XVIIIe siècle. En 1794, pendant la Révolution, une troupe révolutionnaire mit à sac et incendia Ranrouët, abandonné, il servit de carrière de pierre aux habitants dHerbignac.","habitants":"Ranrouet; Famiile de Rochefort                                                       Coet-Caret; Famille de Monneraye\r\n        \"","divers":"Coet-Carré grav-1-2-3 Ranrouet  47° 26' 41,6\" Nord, 2° 18' 58,02\" Ouest   grav-4-5-6-7-8","gps":"","images":["../image/image_44/44_Ranrouet_1.jpg","../image/image_44/44_Ranrouet_2.jpg","../image/image_44/44_Ranrouet_3.jpg","../image/image_44/44_Ranrouet_4.jpg","../image/image_44/44_Ranrouet_5.jpg","../image/image_44/44_Ranrouet_6.jpg","../image/image_44/44_Ranrouet_7.jpg","../image/image_44/44_Ranrouet_8.jpg"]},"Consult_chateau_formulaire5005":{"id":"Consult_chateau_formulaire5005","dept":"44","canton":"Clisson","commune":"Remouillé","nom":"Remouillé","type":"Château","periode":"XVIII-XIX","histoire":"Deux châteaux à Remouillé, celui de l'hermitage et d'Adrére.                                                                           HERMITAGE,  construit au XIXe siècle, dont le domaine avant la Révolution, appartient alors aux Kérémar.                                                     ARDREVE, est bâti au XIXe siècle. Au Moyen Âge, la terre de l'Ardrère appartient à Gilles de Rais. Le bâtiment actuel est édifié par La famille Jaillard de la Maronière. La duchesse du Berry fit halte au château, se rendant à Nantes durant L'insurrection Royaliste de 1832.\r\nREMOUILLE, la mairie actuelle est aménagée dans lancien presbytère datant du XVIIe siècle. Lors du passage des Colonnes infernales en 1794, une partie de celui-ci est incendiée. Gilles Delahaye, recteur de Remouillé de 1802 à 1829 réunit les fonds pour réhabiliter lédifice.","architecture":"HERMITAGE, les dépendances du château XVIIe siècle, plus anciennes que le château lui-même, comportent une fuie (un petit colombier) datant du XVIIe??XVIIIe siècle. Des écuries luxueuses sont construites par les Dufour (négociants de Nantes et du Havres) vers 1860.                       ARDRERE, il existait auparavant une demeure au hameau du Mortier appelée château du Mortier, construit au XIXe siècle. Cet édifice est aujourd'hui disparu. La duchesse du Berry fit halte au château, se rendant à Nantes durant L'insurrection Royaliste de 1832.","habitants":"Famille de Kérémar\r\n        \r\n        \"","divers":"Hermitage grav 1-2-3  Ardrève grav-4                         Rémouillé   47° 03' 23? nord, 1° 22' 33? ouest","gps":"","images":["../image/image_44/44_Remouill%c3%a9_1.jpg","../image/image_44/44_Remouill%c3%a9_2.jpg","../image/image_44/44_Remouill%c3%a9_3.jpg","../image/image_44/44_Remouill%c3%a9_4.jpg"]},"Consult_chateau_formulaireb487":{"id":"Consult_chateau_formulaireb487","dept":"44","canton":"Rezé","commune":"Rezé","nom":"Rezé","type":"Château","periode":"XVII-XVIII-XIX","histoire":"Quatre châteaux à Rezé ; Rezé-Chalonnière, de Balinière, de la Classerie et de la Morinière.                                                                                           REZE-CHALONNIERE,  était jadis le siège de la Vicomté de Rezé (ou Rezay) et du comté des Monti, le château de Rezé était composé en 1679 et en 1749  d'un dôme avec deux corps de logis aux côtés, accompagnés de deux pavillons et suivis de deux ailes finies aussi par deux autres pavillons joints ensemble par une balustrade qui ferme la première cour, et qui mène dans l'avant-cour close de murailles et terminée par deux tours dont l'une sert de fuie, et l'autre de porterie ; au milieu, un grand portail avec, en face, une avenue. La haute-justice du comté de Rezé s'étendait sur 12 paroisses. La prison était à Pont-Rousseau et les fourches patibulaires s'élevaient près de Saint-Eutrope. Le château de Rezé fut détruit afin d'y établir le coeur du nouveau Rezé.                                                                                                          BALINIERE, construit sous Henri IV, le château de la Balinière date pour l'essentiel du XVIIIe siècle, fut édifiée pour la famille Ducoudray Bourgaud. Aménagé et embelli au cours des siècles, certaines parties remontent au XVIIe siècle et d'autres du XXe siècle, cet édifice classique a toutefois gardé une grande unité stylistique. Achetés en 1978 par la commune de Rezé, le château et les dépendances accueillent aujourd'hui l'école de musique et de danse, classée \"Conservatoire à rayonnement communal\".","architecture":"MORINIERE, cette ancienne maison noble a appartenu à la famille Paulmier en 1414, à la famille Lecomte, puis à René de Pouillé marié à Jeanne Lecomte en 1493. Du XVIIe siècle à la Révolution, c'est la famille Frain qui en est devenue propriétaire, revint par alliance en 1848 à M. Charles Bourcier. Il fit bâtir sur le côteau,  la Morinière, en 1853, dans un style Napoléon III. Le Bélier du château  vient d'être restauré récemment. Le château  est devenu un hôtel-restaurant 4 étoiles.                                                                                                                     CLASSERIE, bâti au XVIIe siècle par la famille Le Meneust, mais c'est la famille Darquistade, de riches négociants, qui le transforme, la famille de René Darquistade, au XVIIIe siècle. Étienne Mabille des Granges, issu d'une famille de fonctionnaires royaux, devient propriétaire des lieux à la veille de la Révolution Française. À 83 ans, il est accusé par le comité révolutionnaire d'avoir utilisé sa demeure comme lieu de retraite aux insurgés, le château est incendié, puis restauré. Le commandant Banal acquiert la propriété en 1924. En 1940, la propriété est réquisitionnée par les Allemands et abrite une maison de repos. À la fin de la guerre, le bâtiment est en piteux état, les propriétaires n'ont pas  les moyens de le restaurer, c'est l'association Espérance sport qui en fait l'acquisition en 1958. Depuis, la classerie héberge une école d'éducateurs spécialisés, gérée par l'association l'Arifts des Pays de la Loire en 2014. Depuis l'été 2015, le site héberge 20 associations soutenues par la mairie. Deux ailes prolongent le bâtiment central, qui possède côté jardin un fronton sculpté représentant une corbeille de fleurs C'est devenu la Maison des Associations.","habitants":"Réze Cholonnière;  Comté des Monti.                                   Balinière;  famille Ducoudray Bourgaud.                                            Morinière; Famille Frain                                                          Classerie; Famille Le Meneust,\r\n        \"","divers":"Balinière grav-1-2     47° 11' 26\" Nord et 1° 34' 10\" Ouest       grav-1-2            Classerie 47° 11' 26\" Nord et 1° 34' 10\" Ouest    grav 3-4             Morinière  47° 10' 38\" Nord, 1° 32' 57\" Ouest  Grav-5-6-7","gps":"","images":["../image/image_44/44_R%c3%a9z%c3%a9_1.jpg","../image/image_44/44_R%c3%a9z%c3%a9_2.jpg","../image/image_44/44_R%c3%a9z%c3%a9_3.jpg","../image/image_44/44_R%c3%a9z%c3%a9_4.jpg","../image/image_44/44_R%c3%a9z%c3%a9_5.jpg","../image/image_44/44_R%c3%a9z%c3%a9_6.jpg"]},"Consult_chateau_formulairea507":{"id":"Consult_chateau_formulairea507","dept":"44","canton":"Nort sur Erdre","commune":"Riaillé","nom":"Riaillé","type":"Maisons fortes","periode":"XV-XVI","histoire":"A Riaillé  châteaux de la Meilleraie, de la Provostière, du Haut-Rocher et maison Noble de la Cour du Bois.                                                                                  RIAILLE, l'activité principale de Raillé, durant plusieurs siècles, est la production de fer : bas-fourneaux puis haut-fourneau à la Poitevinière, forges à la Provostière. L'énergie est fournie par des roues à aubes alimentées par les étangs du Jeanneau (disparu de nos jours), de la Poitevinière, de la Provostière, de la Vallée  paroisse de Joué-sur-Erdr, du Pas-Chevreuil (paroisse de la Meilleraye-de-Bretagne, disparu de nos jours). Le combustible (charbon de bois) est produit par la forêt dAncenis-les-Bois, le minerai provient initialement de carrières de Riaillé, puis de la Meilleraye-de-Bretagne et dAbbaretz ; le fondant (castine) est amené des carrières d'Erbray.\r\nDurant des périodes instables, ces installations industrielles sont saccagées au début du XVIIe siècle par les troupes du duc de Vendôme (gendre de la propriétaire) et, sous la Révolution, par les Chouans du Bas-Anjou et de Haute-Bretagne. Sont reconnus comme meneurs : Joseph Coquereau (Daon), Louis Le Meignan (Petit-Auverné) et Pierre Gourlet (Pannecé). Le personnel des Forges est hostile au nouveau régime qui a mis fin à son droit de chasse dans la forêt d'Ancenis-les-Bois, ainsi qu'aux privilèges des corporations.\r\nAprès la fermeture des installations métallurgiques vers 1870, l'activité de la commune se limite à lagriculture, à l'exploitation forestière (scieries) et, depuis quelques décennies, soriente vers le tourisme.","architecture":"PROVOSTIERE maison des maîtres de forges, fin du XVIe siècle, et étang. Liée au fourneau de la Poitevinière dépendait de la  baronnie d'Ancenis\r\nLa vallée de l'Erdre : moulin de la Benâte, moulin Pelé, fontaine minérale, lavoir.","habitants":"Maitres de forges\r\n        \"","divers":"A Riaillé  châteaux de la Meilleraie grav 2-3-4-6, de la Provostière-5-7-8, du Haut-Rocher et maison Noble de la Cour du Bois.","gps":"","images":["../image/image_44/44_Riaill%c3%a9_1.jpg","../image/image_44/44_Riaill%c3%a9_2.jpg","../image/image_44/44_Riaill%c3%a9_3.jpg","../image/image_44/44_Riaill%c3%a9_4.jpg","../image/image_44/44_Riaill%c3%a9_5.jpg","../image/image_44/44_Riaill%c3%a9_6.jpg","../image/image_44/44_Riaill%c3%a9_7.jpg","../image/image_44/44_Riaill%c3%a9_8.jpg"]},"Consult_chateau_formulairec0a6":{"id":"Consult_chateau_formulairec0a6","dept":"44","canton":"Rezé","commune":"Rézé","nom":"Rézé_Praud","type":"Château","periode":"XIX","histoire":"A Rezé la Balinière, la Classerie et la Morinière.                                                                                       PRAUD, le manoir de Praud actuel fut construit en 1845, et habité par le conseiller général et maire de Rezé Philémon Chenantais. Le parc conserve des restes d'un manoir plus ancien. Une partie du quartier du château  est marquée par la présence du plus vaste parc d'habitat social de la ville, construit après la destruction du château de Rezé  domaine de la famille Monti de Rezé dans les années 1960. On y trouve la médiathèque. L'autre partie du quartier, la Trocardière, est constituée de maisons individuelles. C'est là que sont implantés un complexe sportif important, incluant la piscine municipale, et la halle de la Trocardière, salle d'expositions et de concerts.","architecture":"a deux kilomètres à gauche BOUGON,  le château Bougon servit de décor, en 1987, pour une partie du film \"Soigne ta droite\" de Jean-Luc Godard.","habitants":"famille Monti de Rezé\r\n        \r\n        \r\n        \"","divers":"Praud  47° 10' 38\" Nord, 1° 32' 57\" Ouest          grav-1-2                         Bougon  47° 10' 48\" Nord, 1° 37' 25\" Ouest   bougon grav-2","gps":"","images":["../image/image_44/44_R%c3%a9z%c3%a9_Praud_1.jpg","../image/image_44/44_R%c3%a9z%c3%a9_Praud_2.jpg"]},"Consult_chateau_formulaire36d1":{"id":"Consult_chateau_formulaire36d1","dept":"44","canton":"Savenay","commune":"Savenay","nom":"Savenay","type":"Château","periode":"XV-XVII-XIX","histoire":"A SAVENAY,  château de Therbet, des Cordeliers  et de l'Hopital, à  quatre kilomètres au nord à Campbon le château de Coislin.                                                                                                                        SAVENAY  En 1450, Jean de Châteaugiron, recteur de la paroisse de Savenay, fonde par testament l'aumônerie de Saint-Armel, futur hôpital.  Il transmet à celle-ci un legs important, qui sera amplifié au fil du temps. En 1464, apparaît le premier registre paroissial de Savenay, un des plus anciens connus en Bretagne. Le fief passe aux mains de Jean de Laval, baron de la Roche Bernard. En 1487 s'installe un couvent de Clarisses. En 1547, « la Roche en Savenay » devient la propriété du Sire de Rieux, vicomte de Donges, et en dépend jusqu'à la Révolution. Au début du XVIIe siècle, le siège de la baronnie s'implante au manoir du Matz, en Savenay. Après la conspiration de Cellamare en 1720, une garnison fut expédiée à Savenay pour protéger le littoral contre un éventuel débarquement de troupes du roi d'Espagne Philippe V. Le 17 février 1800, Savenay devient sous-préfecture. En 1814, après l'abdication de Napoléon et durant les Cent-Jours, la ville reste fidèle à la monarchie.                                            COISLIN, le château est le siège du duché-pairie de Coislin, alors tenu par la famille du Cambout ; celle-ci tient cette propriété par le mariage de René du Cambout qui a épousé Françoise Baye.  Le dernier des Coislin meurt à Paris en 1873. Sa veuve achète alors le château de Buhel où elle se retire. La propriété devient ensuite à la famille Le Cour Grandmaison.","architecture":"SAVENAY, plusieurs demeures remarquables font état des traditions aristocratiques puis notabiliaires passées. Ainsi, l'ancien manoir du Matz du XVIe siècle, le château de Therbé  du XIXe siècle ou encore le manoir de Bellevue, situé rue Saint-Michel et édifié par la famille Huet de Coëtlizan (hommes de loi). Le couvent des Cordeliers est un édifice fondé en 1419 par Jean V de Bretagne. Il est devenu bien national durant la Révolution,  il est utilisé successivement comme sous-préfecture, tribunal, gendarmerie, maison d'arrêt puis école. Il abrite un hôpital lorsque la croix-rouge américaine sy installe durant la première guerre mondiale. Après avoir hébergé la poste, il est inoccupé au début du XXIe siècle.                                                                                                                                                                                                               COISLIN, est composé dune bâtisse principale du XIXe siècle encadrée de tours et dépendances du XVIIe, le tout entouré de douves du XIIe) aujourdhui végétalisées, travail complet de rénovation a été achevé en 2015 qui permet un accueil dexception. Véritable voyage à travers le temps mélangeant le charme des grandes maisons dautrefois avec le moderne et le confort invitant au bien-être.","habitants":"Coislin; famille du Cambout                                            Savenay; Jean de Laval\r\n        \"","divers":"A Savenay deux châteaux le Savenay grav -4-5-6, le Coislin grav-1 et le Therbe grav 2-3","gps":"","images":["../image/image_44/44_Savenay_1.jpg","../image/image_44/44_Savenay_2.jpg","../image/image_44/44_Savenay_3.jpg","../image/image_44/44_Savenay_4.jpg","../image/image_44/44_Savenay_5.jpg","../image/image_44/44_Savenay_6.jpg"]},"Consult_chateau_formulaire364f":{"id":"Consult_chateau_formulaire364f","dept":"44","canton":"St-Philibert de Grand Lieu","commune":"Saint-Colomban","nom":"St_Colomban","type":"Château","periode":"XV-XVII","histoire":"A Saint- Colomban, château du Grand-Bois ,  la Roulière, la Mouchetière, la Babatelière, la Bretinière, de Pay-Richereau,  la Noel, de Pay -Millon et de Noyers.                                                                                            GRAND-BOIS, propriété du seigneur de La Touche Limouzinière jusqu'au XVIIe siècle. Le domaine des Grand Bois constituait jadis une châtellenie à haute justice. Propriété de la famille Rohan Soubise au XVIIIe siècle. Cette famille avait les hautes prééminences en l'église et leurs fonctionnaires étaient des hommes de loi, Hervouet de La Robrie, Levaulle, Dargent, Monnier, Texier, Bélineau, Papin et Lejeune du Cerclais. Les héritiers des Rohan vendent le château du Grand Bois en 1810 à des négociants nantais, Bernard et Lemasne. Il ne reste que les communs et une entrée monumentale. Cette demeure possédait jadis une chapelle privée et un colombier. Aujourd'hui  chambres d'hôtes.                                                                                                                   ROULIERE, du XVIIIe siècle. Propriété de Jean Roquet de La Tribouille au XVe siècle et de Jean Baptiste Anne Richard de La Roulière en 1780. Il ne subsiste de l'ancien château que les douves et le colombier qui date de 1784.                                                                                                           MOUCHETIERE de  1781, érigé par la famille Guillermo, alliée aux de Charette et à Julien Lebebvre. Il est en partie incendié en 1793-1794. Il appartient à la famille Hervouet de La Robrie qui l'avait acheté à J. B. Pélieu, à Clotilde de Guillermo de Tréveneuc. La duchesse de Berry s'y cache en 1832.\r\n BRETINIERE  du XIXe siècle. Propriété du seigneur de La Touche-Limouzinière au XVIIe siècle et de la famille Lambert-Broustra au XXe siècle. Propriété aussi des familles Baudry du Plessis, puis en 1809, elle est acquise par les familles Babin, Pellerin, Noeau et Harmange.","architecture":"PAY-RICHEREAU, du XVIIIe siècle. Il relevait jadis de la seigneurie des Huguetières, propriété de la famille Tournemine, barons de La Hunaudaye. Ce manoir appartient, en 1689, à Clément Mainguy, puis en 1748 à Lefebvre de La Ferronière, époux de Claire Mainguy. Il est vendu aux Burot de Carcouet, puis passe aux Cosson, notaires, Lallié, Chéguillaume, M. Manceron. Ce manoir est incendié le 10 février 1794 par les troupes du général Duquesnoy. Restauré, il appartient ensuite à la famille Perdroux, puis à Alfred Lallié à la fin du XXe siècle .\r\nLa NOEL, manoir, il s'agit de l'ancienne seigneurie du bourg dont les bâtiments ont été rénovés par les familles Rostaing du Rivas et Fleury. Propriété de la famille de Vay de La Fleuriais et du procureur fiscal Clériceau de La Cléricaye, au XVIIIe siècle. La famille des Fleury alliée aux Dessaulx et Vilmain s'y implante après la Révolution. En 1817 a lieu le mariage de Paul Fleury avec Louise Dessaulx, et en 1848 celui de Norbert Fleury avec Cécile Lallié.\r\nPAY MILLON. manoir propriété de la famille Fournier de La Pommeraye.\r\nBABATELIERE, manoir propriété des Templiers des Essarts, Levaulle et de La Robrie. Au moment de la Révolution, la famille de Fourray, alliée aux Galbaud du Fort et possessionnée en l'île de la Grenade, y habitait.\r\nNOYERS, manoir propriété de la famille Gouin du Fief, possessionnée en Saint-Domingue, puis de Charles Goéau, époux de Claire Jamont.","habitants":"Grand-Bois Famille Rohan Soubise\r\n        \r\n        \"","divers":"A Saint-Colomban, château du Grand-Bois grav-4,  la Roulière, la Mouchetière, la Babatelière, la Bretinière grav-1-2-3, de Pay-Richereau grav-5,  la Noel, de Pay -Millon et de Noyers.","gps":"","images":["../image/image_44/44_St_Colomban_1.jpg","../image/image_44/44_St_Colomban_2.jpg","../image/image_44/44_St_Colomban_3.jpg","../image/image_44/44_St_Colomban_4.jpg","../image/image_44/44_St_Colomban_5.jpg"]},"Consult_chateau_formulaire697f":{"id":"Consult_chateau_formulaire697f","dept":"44","canton":"Blain","commune":"Saint-Etienne de Montluc","nom":"St_Etienne_de_ Montluc","type":"Château","periode":"XV-XVII","histoire":"Saint-Etienne de Montluc,  le manoir du XVe siècle (vers 1470)  La Peltancherie du XIXe siècle, de la Biliais du XVIIIe siècle, de la Juliennais, de Haie-Mahéas, de Saint-Thomas, de la Vallais, du Perrorteau et de Rouillonnais.                                                                                                                                                                        La BILLIAIS, un certain BILLY aurait donné son nom à ce grand domaine situé au nord, dont on sait que le premier propriétaire connu, Pierre de Saffré, le vendit au début du XVe siècle. Lui succéderont les de Langle en 1510, puis Charles de La Bourdonnaye en 1691, enfin les Le Lou de la Billiais en 1708, qui conserveront le domaine durant deux siècle et demi. De nouveaux bâtiments sont construits en 1764 et 1770, le parc redessiné, avant quune partie de la famille ne soit guillotinée sous la Terreur, en 1793, pour avoir hébergé un prêtre réfractaire. Depuis 1946, la Biliais est la propriété de la famille Le Gouais\nPERRORTEAU du 1770, édifié par François Morin de La Masse ;  procureur fiscal, avocat et notaire, fut bâti vers 1770, à la façon des folies nantaises de lépoque, le manoir du XVe siècle, situé place de la Mairie. Cet édifice abrite jusqu'en 1791 le presbytère.  En 1820, le domaine de La Peltancherie appartenant à Madame Fromont sert de cure jusqu'en 1866 ; procureur fiscal, avocat et notaire, fut bâti vers 1770, à la façon des folies nantaises de lépoque, sur les plans de larchitecte Jean-Baptiste Ceineray, célèbre architecte à qui lon doit entre autres la préfecture de Nantes. Sa descendance le conserva un siècle avant que le domaine ne passe par alliance à Henri Dubois de la Patellière, qui fut maire de la commune durant 45 ans. Ses descendants y demeurent toujours.","architecture":"St-THOMAS, situé en bordure des marais, le château de Saint-Thomas est cité en 1231 comme appartenant à Guiton de Saint Thomas. Il devint ensuite la propriété des Lespervier, jusquen 1578, des Le Houx puis des de Chevigné, de 1721 à 1897, dont un des descendants, le comte Louis-Marie de Chevigné, fut maire de la commune au début du XIXe siècle. Le château fut rebâti en 1840, puis la propriété cédée en 1898 à Numa Croux qui y installa la laiterie de Saint-Thomas dont la renommée s'étendait jusqu'à la cour de Nicolas II en Russie. Une chapelle existait avant lactuelle, et servit même déglise aux habitants du bourg durant lépidémie de peste en 1627. Depuis 50 ans, ses deux derniers propriétaires ont restauré l'intérieur du château.                                                                                                                       HAIE-MAHEAS château du 1650-1700 , situé à La Haie-Mahéas et réédifié par Michel Le Lou. La seigneurie est attestée dès 1610. Ce château possédait déjà une chapelle privée au temps des d'Acigné, des Cochon de Maurepas et de Coutances. Le domaine de Haie-Mahéas est vendu par la famille Le Lou aux Dodun, puis aux Cochon de Maurepas. Durant tout le XVIIIe siècle, ce sont les Maurepas et leurs descendants, les de Coutances  et de Bourmont  à la Révolution qui vont occuper le domaine. Les de Bourmont vendent ensuite le domaine et leurs successeurs vont être les Bascher, de La Rochette et enfin Marie Veillet, fille d'un percepteur de Châteaubriant et future soeur Marie de l'Immaculée Conception, décédée en 1890, bienfaitrice des orphelins et des abandonnés. Le château est modifié au XIXe siècle.","habitants":"Biliais,  Pierre de Saffré,            Perrorteau;  Madame Fromont                                  ST-Thomas, comte Louis-Marie de Chevigné                                                           Haie-Mahéas; famille Le Lou \"","divers":"Saint-Etienne de Montluc,  le manoirGrav-1;  La Peltancherie, de la Biliais , de la Juliennais grav 3, de Haie-Mahéas, de Saint-Thomas grav-4-5-6-7-8, de la Vallais, du Perrorteau grav-2  et de Rouillonnais.","gps":"","images":["../image/image_44/44_St_Et_de_Montluc_1.jpg","../image/image_44/44_St_Et_de_Montluc_2.jpg","../image/image_44/44_St_Et_de_Montluc_3.jpg","../image/image_44/44_St_Et_de_Montluc_4.jpg","../image/image_44/44_St_Et_de_Montluc_5.jpg","../image/image_44/44_St_Et_de_Montluc_6.jpg","../image/image_44/4
