riode":"XII-XVI","histoire":"ANCENIS, le fort est fondé vers 980 par Aremberge comtesse de Nantes  et de Guérech, fils d'Alain Barbe Torte. Un fossé creusé dans la roche isolait le château de la ville, elle même fortifiée. Dès 987, le château est assiégé par Geoffroy d'Anjou qui périt devant ses murs. Le fils de Guérech, Alain, n'ayant pas fait souche, le comte de Nantes donne à l'un de ses vaillants soldats Alfrid en l'an 1000, le soin de défendre le château, et il en devient le premier seigneur. Lui succèdent Maurice Guihenoc II, Geoffroy Ier, Guihenoc III et six Geoffroy. Propriété des barons d'Ancenis, le château est pris en 1173 par Henri II, roi d'Angleterre, qui augmente les fortifications et en confie la garde à Maurice de Craon. Philippe Auguste reprend la place, mais elle est de nouveau emportée en 1213-1214 sous Philippe de Dreux. En effet le château-fort est assiégé par les Anglais en 1214, puis à nouveau par l'armée française en 1220 (Saint Louis, alors âgé de 16 ans est assisté de sa mère Blanche de Castille). C'est par le mariage de Jeanne II, baronne d'Ancenis, que ce fief passe à l'illustre famille de Rieux.  Le château-fort est démoli en 1487 sur ordre de Charles VIII et en 1490 sur ordre d'Anne de Bretagne, est ensuite reconstruit vers 1530 pour être de nouveau démantelé en 1626 sur ordre de Louis XIII. Il est pillé au XVIIIe siècle par les Vendéens. pendant la guerre de Vendée, Ancenis est occupé à trois reprises par les royalistes. Les troupes du général Westermann remportent à Ancenis une victoire sur l'armée vendéenne en 1793. Reconstruit vers 1746, il fait lobjet dun classement au titre des M.H. depuis le 2 novembre 1977.","architecture":"ANCENIS, cette protection concerne lensemble des fortifications, ainsi que les façades et toitures des bâtis , logis Renaissance, ancienne chapelle et du logis dit « de Marie Fouquet ». Il s'agissait, à l'origine, d'une motte castrale, c'est-à-dire un donjon en bois élevé sur un tertre. Il possédait des défenses rudimentaires, à savoir un fossé, une simple palissade avec un enclos pour abriter la population. De par sa position, il devint rapidement un endroit idéal pour surveiller le fleuve, exerçant ainsi un contrôle militaire et économique. Le châtelet dentrée édifié à la fin du XIVe et au début du XVIe, présente un dispositif défensif particulier : un pont-levis précède la herse, dans une galerie couverte, disposée en chicane.La forteresse médiévale (XVe siècle) possède un système d'accès unique :  A partir du XVIIe siècle, l'histoire d'Ancenis se réduit à quelques faits de peu d'importance. Louis XIII traverse la ville d'Ancenis en 1614 et en 1622 et Louis XIV s'y arrête en 1661. Le château se dégrade au fil du temps et des pans de murs entiers vont disparaitre. Ses douves seront comblées pour permettre la création des quais, en 1840. Il devra attendre 1977, pour être inscrit aux M.H. et sera racheté par la commune en 1987. Le châtelet d'entrée sera restauré, la chapelle du XIXe siècle sera détruite, ainsi que le lycée bâti en 1960. En 2010, une partie des services du Conseil Général de la Loire-Atlantique sera installée dans l'enceinte du château malgré de nombreuses contestations.","habitants":"seigneur Alfrid\r\n        \"","divers":"Forteresse d'Ancenis et son château; 47° 21' 52\" Nord et 1° 10' 36\" Ouest","gps":"","images":["../image/image_44/44_Ancenis_1.jpg","../image/image_44/44_Ancenis_2.jpg","../image/image_44/44_Ancenis_3.jpg","../image/image_44/44_Ancenis_4.jpg","../image/image_44/44_Ancenis_5.jpg","../image/image_44/44_Ancenis_6.jpg"]},"Consult_chateau_formulaire078a":{"id":"Consult_chateau_formulaire078a","dept":"44","canton":"Saint-Brevin-les-Pins","commune":"Montagne","nom":"Aux_Montagne","type":"Château","periode":"XVII-XVIII","histoire":"AUX; propriété de Jean de Peillac en 1626, Pierre de Peillac  en 1678, Nicolas Jacques de Peillac, président de la chambre des comptes en 1736, François Vincent d'Aux (né à Saint-Domingue, en 1735) qui y bâtit un grand château (dont l'architecte est Ceineray) et lui donna son nom  en 1764, Pauline d'Aux de Bournay, épouse de N. Perrée de la Villestreux  en 1801, de Linier en 1816, de Mauclerc en 1832.                                                                                                                                          édifié par la famille d'Aux de Bournay sur les ruines d'un ancien château, propriété de la famille Peillac au XVIIe siècle et de la famille Vincent d'Aux au XVIIIe siècle. En 1793, les républicains occupèrent le château d'Aux. Jusqu'en 1879, les héritiers du comte d'Aux , les Villestreux, Linier, conservent cette propriété mais ne s'en occupent guère. Ils vendent le château à monsieur Cadou qui essaie de le restaurer. Pendant la première guerre mondiale, des prisonniers allemands y séjournent. Le château est depuis le 27 janvier 1923 la propriété de la ville de Nantes qui l'a acheté. L'immense propriété avait été démembrée en 1923.","architecture":"AUX, le château d'Aux ou de la Hubaudière en 1764, La terre de la Hubaudière, puis château d'Aux, aujourd'hui située dans la commune de Montagne. L'immense propriété avait été démembrée et en 1923 il ne reste plus avec le château délabré, que 3 ha, de parcs et de jardins ; corps de logis central long de 25 mètres  à deux niveaux  et série de lucarnes sur toit brisés flanqués de deux pavillons saillant aux extrémités avec fronton côté parc, constitue un château de lignes sobres, deux retours d'équerre d'un niveau côté parc.","habitants":"Famille de  Jean de Peillac\r\n        \"","divers":"Châteaux d'Aux à Montagne","gps":"","images":["../image/image_44/44_Aux_Montagne_1.jpg","../image/image_44/44_Aux_Montagne_2.jpg","../image/image_44/44_Aux_Montagne_3.jpg"]},"Consult_chateau_formulaire4186":{"id":"Consult_chateau_formulaire4186","dept":"44","canton":"Vallet","commune":"Divattes-sur-Loire","nom":"Berrière","type":"Château","periode":"XVIII","histoire":"BERRIERE  Sur une base probablement médiévale, il s'agit d'un ensemble seigneurial remontant au XVe siècle, successivement propriété de Pierre Eder, puis des familles Goulaine, Vaux et Sesmaisons. Ces derniers transforment cette ancienne place forte fossoyée en château résidentiel. Il est agrandi et remanié au début du XVIIIe par la famille Bertrand de Cuvres qui plante le vignoble et installe les bâtiments annexes. Le corps principal est partiellement incendié le 10 mars 1794, pendant la guerre de Vendée, détruisant l'aile ouest et le corps central. Entre 1800 et 1810, le logis est reconstruit par la famille de Bascher, sur le même plan que celui de 1737, mais en adoptant le style Directoire. Vers 1850, la façade sur le parc du corps principal est modifié par l'ajout d'une excroissance pentagonale, pour y loger un nouvel escalier face au vestibule. Entre 1908 et 1912, Joseph de Bascher, peintre, fait transformer les combles de l'aile ouest, en un atelier. Cette modification en béton est ornée d'un décor néo-renaissance. Antony de Bascher, père de Jacques de Bascher, en hérite en 1951. À sa mort en 1975, sa veuve, née Armelle Petit, exploite le domaine viticole. Le monument est inscrit au titre des M.H. en 2011.","architecture":"BERRIERE, corps de logis principal et deux avant corps formant les communs, cette plateforme est entourée de douves en eau franchissables par deux ponts dont le principal, dans l'axe, est fermé par une grille encadrée de piliers amortis par des lions couchés. Sur le côté Est se développe la basse-cour, développée en U pour l'activité viticole.  À l'arrière de ces bâtiments est dessiné une cour en demi-lune dont le centre est magnifié par la présence d'un pédiluve ovale pour les chevaux, muni de deux rampes plongeantes.  Sur le côté Ouest, a été érigée la chapelle Saint-Roch à laquelle on accède par l'intermédiaire d'une grille et d'une allée plantée d'arbres. Ce bâtiment présente de nombreux désordres graves dont l'altération de la couverture et de la charpente ouest et la dégradation du vitrail axial qui menace de s'effondrer. Entre la chapelle et le château existent un puits dont l'eau à la réputation d'être « miraculeuse » et un très grand vivier auquel on accède par l'intermédiaire de large degrés. Au sud, de l'autre côté de la route, les bâtiments de service regroupent étables. Et plus en arrière, face aux vignes s'élève la fuie dont la coupole sommitale a disparu accidentellement dans les années 1960. La maçonnerie du pigeonnier présente de très profonde fissure menaçant son intégrité. L'ensemble est actuellement soutenu par l'association des Amis du château de la Berrière qui organise de nombreuses manifestations et par l'Architecte du Patrimoine Régis Ribet. Un dossier de restauration a été présenté et retenu pour le Loto du patrimoine organisé par Stéphane Bern.","habitants":"Famille de Bascher\r\n        \"","divers":"Domaine de Berrière à Divattes sur loire  ; 47° 16' 39\" nord, 1° 19' 06\" ouest","gps":"","images":["../image/image_44/44_Berri%c3%a8re_1.jpg","../image/image_44/44_Berri%c3%a8re_2.jpg","../image/image_44/44_Berri%c3%a8re_3.jpg","../image/image_44/44_Berri%c3%a8re_4.jpg"]},"Consult_chateau_formulaired38e":{"id":"Consult_chateau_formulaired38e","dept":"44","canton":"Blain","commune":"Blain","nom":"Blain_Groulais","type":"Forteresse","periode":"XII-XVI-XIX","histoire":"BLAIN-GROULAIS, c'est fin XIe, début XII, que les premières fondations de la forteresse voulue par Alain IV Fergent, sont posées. En 1208 commence l'histoire d'Henri I de Blain et sa descendance  celle des Guegon premier seigneur,  en 1262 Les Clisson qui en hérite, jusqu'à Olivier V, haut et puissant seigneur breton, et connétable de France, agrandiront cet énorme château fort qui s'étend sur quatre hectares. Il entre dans le patrimoine dune des plus grandes familles de lépoque, en 1409 la fille d'Olivier IV ayant épousé  le vicomte  Alain VIII de Rohan : les Rohan qui le garderont de 1407 à 1802. \r\n ils y résideront avec leur cour du XVe jusqu'à la Révolution.\r\nLe plus grand d'entre eux : Henri II, le duc, y naîtra en 1579.\r\nLes guerres de religion, dont le long siège des troupes espagnoles en 1591, les démantèlements ordonnés par Richelieu, les actes des révolutionnaires occasionneront de lourdes destructions. Toutefois subsistent encore d'impressionnants logis, tours et murailles. En 1645, Marguerite de Rohan  épousa Henri de Chabot prit le nom de duc de Rohan jusqu'en 1783, c'est une ruine que le comte de Chanzé acheta en 1802. Plusieurs propriétaires se succédèrent ensuite, en 1918 dont\r\nMarie Bonaparte sauvera le château de la ruine dans les années 1900, en 1950 les frères des écoles chrétiennes de Saint-Jean Baptiste de la Salle y installent un noviciat de la province de Nantes, vendu en 1989 a un agent immobilier en fit un hôtel château relais  et la commune en 1977 devient propriétaire des parties classées MH.","architecture":"BLAIN GROULAIS, grands constructeurs ceux-ci apporteront tout le luxe et le confort à cette bâtisse qui avait jusque là une vocation purement militaire. Les guerres de religion, dont le long siège des troupes espagnoles en 1591, les démantèlements ordonnés par Richelieu, les actes des révolutionnaires occasionneront de lourdes destructions, initialement, la courtine possédait neuf tours dont une au centre appelée tour de l'horloge,  détruit a la fin du XIIe siècle puis reconstruit. La tour du pont levis du XVIe siècle avec son toit en poivrière domine les douves sèches et la façade Renaissance\r\ndotée de gargouilles et de hautes fenêtres. La tour du Connétable date de 1366 se dresse toujours dans le décor.  Toutefois subsistent encore dimpressionnants logis, tours et murailles. Depuis un lourd travail de réhabilitation a été effectué. Gravement endommagé par la Révolution, le château  en flammes emporta les archives et la tour de l'horloge. Néanmoins, le château de la Groulaie fut à lorigine, comme toutes les autres fortifications de cette époque, un ouvrage assez simple : deux rangées de douves larges et profondes se terminant sur la rivière en fer à cheval ; enserré dans ces douves, un terrain surélevé avec les déblais, au milieu une très vaste butte avec palissades et donjon en bois : tel en était laspect.","habitants":"Famille de Guegon\r\n        \r\n        \r\n        \"","divers":"Forteresse u de Groulais à Blain  ; 47° 28' 00\" nord, 1° 45' 53\" ouest                                                                                    Court-Mortiers grav 9","gps":"","images":["../image/image_44/44_Groulais_Blain_1.jpg","../image/image_44/44_Groulais_Blain_2.jpg","../image/image_44/44_Groulais_Blain_3.jpg","../image/image_44/44_Groulais_Blain_4.jpg","../image/image_44/44_Groulais_Blain_5.jpg","../image/image_44/44_Groulais_Blain_6.jpg","../image/image_44/44_Groulais_Blain_7.jpg","../image/image_44/44_Groulais_Blain_8.jpg","../image/image_44/44_Groulais_Blain_9.jpg"]},"Consult_chateau_formulairebea2":{"id":"Consult_chateau_formulairebea2","dept":"44","canton":"Châteaubriand","commune":"Châteaubriant","nom":"Bois_Briand","type":"Château","periode":"XVI-XVIII","histoire":"Manoir du BOIS-BRIAND,  ont été construits à l'ouest d'une motte élevée dans un méandre de la Chère qui en alimentait les douves ; d'autres douves délimitaient un vaste quadrilatère autour de l'édifice, on y accédait par un corps de passage flanqué d'un pavillon au sud, détruits, l'un au XIXe siècle et l'autre au début du XXe siècle ; peu avant 1876, on a asséché les douves et arasé la motte dont les vestiges sont toutefois encore visibles ;le logis à été construit suivant un plan en équerre au cours de trois campagnes à la fin du XVe et au début du XVIe siècle : d'abord la partie ouest du corps principal, flanquée d'une tour d'escalier hors-oeuvre ; puis l'aile en retour d'équerre au sud, construite à partir d'un bâtiment préexistant dont on a surélevé le rez-de-chaussée ; ce corps intègre en partie la tour ; enfin la partie orientale du corps principal dont la charpente a été remaniée au XVIIIe siècle","architecture":"BOIS-BRIAND ; les dépendances agricoles antérieures à 1832 consistent en une étable remise grange, élevée au sud du logis, et un fournil situé près du corps de passage ; l'édifice a été transformé en ferme au XIXe siècle ; l'aile en retour d'équerre a été convertie en étable : percement de jours sur sa face ouest ; dans le 1er quart du XXe siècle, ont été bâtis un logement à la place du pavillon flanquant le corps de passage, une étable et une porcherie ; de cette époque aussi daté sans doute la destruction du corps prolongeant le logis à l'est ; situé sur la chère au nord de l'édifice, le moulin à été détruit entre 1832 et 1876. Autrefois couverte d'un toit polygonal, la tour d'escalier l'est aujourd'hui par un toit en appentis massé ; les baies du logis sont en schiste taille; le logement est appareillé en moellon avec des chaînes d'angle en brique et schiste taille ; les baies du logis et de la porcherie sont en brique.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Château de Bois-Briand","gps":"","images":["../image/image_44/44_Bois_Briand_1.jpg","../image/image_44/44_Bois_Briand_2.jpg","../image/image_44/44_Bois_Briand_3.jpg","../image/image_44/44_Bois_Briand_4.jpg"]},"Consult_chateau_formulairee01e":{"id":"Consult_chateau_formulairee01e","dept":"44","canton":"Nantes","commune":"Saint-Joseph-de-Porterie","nom":"Bois_Hue","type":"Château","periode":"XVI-XVIII","histoire":"Deux châteaux à Saint-Joseph-de-Porterie, le Bignon  et le Boie-Hue.                                                                               BIGNON,  de style Restauration. Edifié par la famille Ferrus. Construite sur un rocher donc sans cave, la maison est de dimensions assez modestes. Elle a été conçue comme un lieu de chasse. Elle fut modernisée en 1836 par la famille Fénéant et agrandi en 1842 par les nouveaux propriétaires, les Ferrus. Ils y ajoutèrent un véritable jardin d'hiver. Actuellement cette magnifique propriété appartient à la famille Grandjouan.                                                                                                         BOIS-HUE, le nom de Hue, aux diverses orthographes, est très commun en Bretagne. Parmi les propriétaires de ce château qui remonterait au XVIIe siècle, on peut citer la famille Lelasseur qui lagrandit à la fin du XIXe siècle, vers 1880. Les Ursulines vont également lacquérir en 1921 pour le revendre en 1929 à la société civile immobilière du Bois-Hue. Aujourdhui, le château du Bois-Hue nest plus habité et a subi les ravages dun incendie en 1999. Depuis, il est à létat dabandon. Bien que propriété privée, la dégradation de l'édifice est inquiétante quant au devenir de cette bâtisse située dans un quartier en pleine évolution. La Ville devrait pouvoir prendre des mesures incitatives à légard du propriétaire pour lui demander de prendre les dispositions conservatoires et éviter une issue fatale à ce bâtiment qui se dégrade au fil du temps.","architecture":"BOIS-HUE, cette vaste demeure est  située sur la hauteur de lErdre, un peu à lécart des berges. Ses  deux grandes ailes construites au XIXe siècle lui donnent un air néo-XVI. La partie centrale date cependant de Louis XIV époque où elle devait être un repos de chasse. En 1821 la propriété appartenait à la famille Devay de la Fleuriais. Cest la famille Lelasseur  avocat général de la Chambre des Comptes de Bretagne- propriétaire depuis 1852 qui a fait construire la première aile. Vers la fin du XVIIIe siècle la propriété appartint à la famille de Portzamparc avant dabriter la communauté religieuse des Ursulines  1921 1929-. En 1932 la famille Tiriau lachète. Elle est toujours propriétaire mais malheureusement les lieux sont à labandon.","habitants":"Bignon; Famille Ferrus                                                              Boie-Hue, Famille Lelasseur,Famille Devay\r\n        \"","divers":"Château de Bois -Hue et de bignon à st Joseph de la Porterie","gps":"","images":["../image/image_44/44_Bois_Hue_1.jpg","../image/image_44/44_Bois_Hue_2.jpg","../image/image_44/44_Bois_Hue_3.jpg","../image/image_44/44_Bois_Hue_4.jpg","../image/image_44/44_Bois_Hue_5.jpg"]},"Consult_chateau_formulaire735a":{"id":"Consult_chateau_formulaire735a","dept":"44","canton":"Marchecoul","commune":"Chéméré","nom":"Bois_Rouaud","type":"Château","periode":"XVII","histoire":"BOIS-ROUAUD, du XVe siècle,   Alain de la Loherie, issu de cette union, laissa en 1502 le Boisrouaud à sa fille Anne de la Loherie ; cette dame épousa successivement en 1° Jean de Trévécar, seigneur du Verger , en 2° Regnaud de Brignac, seigneur de Kervily, en 3° enfin Pierre de Plouër, seigneur de la Bastardière. La seigneurie appartint ensuite en 1555 et 1587 à Charles de Plouër, en 1631 à Samuel d'Avaugour, sire de Saffré, fils de René d'Avaugour et de Renée de Plouër, en 1655 à Renée d'Avaugour, sur de Samuel et femme de Gabriel de Machecoul, seigneur de Vieillevigne. Le Boisrouaud suivit ensuite le sort de Vieillevigne et se trouvait en 1762 et 1789 la propriété de Gabriel Le Clerc, marquis de Juignée. La seigneurie du Boisrouaud, écrit M. du Cornulier, formait une châtellenie avec ses annexes de Maubusson, Villemorice, La Hunaudaye, La Sicaudaye et Vue, tous fiefs s'étendant en les paroisses de Saint-Hilaire de Chaléons, Arthon et Chémeré. Le domaine proche du Boisrouaud comprenait en 1789, le château de ce nom et sa retenue  les métairies du Boisrouaud, Beauchesne, la Jarrie, le Tronc, le Pinier, la Lorière, la Gaillarderie, Maubusson, la Petite-Mazure et la Charpenterie  le moulin de Maubusson, etc. Ruiné par les guerres de Vendée, le château du Bois-Rouaud a été relevé en 1903 , uvre de l'architecte Coulon pour le marquis de Juigné apparenté à la famille Schneider du Creusot. Ancienne propriété de Eustache Brochereul, veuve de Jean Mesléart.","architecture":"BOIS-ROUAUD, ancien site avec plate-forme fossoyée remanié une première fois en 1865, création d'un haras, reconstitution d'un domaine. On a trouvé dans l'un des murs des communs quelques soubassements d'une forteresse féodale, sa toiture curieuse rappellerait les casques prussiens de la guerre de 1870. Les jardins sont de l'architecte paysagiste Edouard André puis de son fils René Edouard André,  le château est reconstruit en 1905 par l'architecte A. Coulomb. Les jardins sont de l'architecte paysagiste Edouard André (1865), puis de son fils René Edouard André (vers 1913). Les murs du salon sont recouverts de lambris  au  XVIIIe siècle. Ceux de la salle-à-manger reprennent les lambris du Jockey-club de Paris, démonté vers 1912.","habitants":"Famille Schneider du Creusot\r\n        \"","divers":"Chateaux de Bois-Rouaud à Chémeré grav 1-2-3            Pierre Levé grav 4","gps":"","images":["../image/image_44/44_Bois_Rouaud_1.jpg","../image/image_44/44_Bois_Rouaud_2.jpg","../image/image_44/44_Bois_Rouaud_3.jpg","../image/image_44/44_Bois_Rouaud_4.jpg"]},"Consult_chateau_formulaire996b":{"id":"Consult_chateau_formulaire996b","dept":"44","canton":"Rezé","commune":"Bouaye","nom":"Bouaye","type":"Château","periode":"XV-XVI-XVIII","histoire":"A Bouaye le château de Bois de la Noé, de Meveillière et Senaigerie.                                                                                  BOIS de la NOE, en 1688, la maison  appartient à Isabelle Elisabeth Biré. Isabelle, puis Thomas Biré y habitent jusqu'en 1731. En 1749, Nicolas Arnous, constructeur naval nantais, transforme La Noé en folie nantaise. Après quelques acheteurs intermédiaires, la propriété est revendue en lan 11 (1803) à René Giraud et son épouse Marie-Anne Blanchard. La famille Giraud restera propriétaire du domaine jusqu'à la fin du XIXe siècle. En 1884, Pierre Auguste Giraud meurt et débute une succession longue et laborieuse, une partie du parc seront vendus en 1892 au comte de Melquié. En 1927 M. Bonnet entrepreneur à Alger acquiert la Noë, le domaine est confié en gérance à M. Huguel, et devient un hôtel de luxe, le 25 avril 1932, un incendie se déclare dans la tour ouest, puis dans la nuit du 31 juillet 1934, éclate un deuxième et important incendie. Le château est revendu en létat à monsieur Guichaud, il le restaure et y habite avec sa famille, sous la pression de ses héritiers et de lurbanisation de Bouaye. Monsieur Guichaud décide de quitter la Noë en 1966. Trois familles sy succéderont jusquà l'arrivée en 2005 de Patrick et Valérie Guffroy.                                                                                                               MEVEILLIERE, propriété de la famille Guérin au milieu du XIXe siècle, le château a été acheté en 1930 par M. René Poisson, pilote de chasse pendant la première guerre mondiale. C'est ensuite son fils qui l'a racheté à ses frères et  soeurs dans les années 1970. Fin 2005, le château de la Méveillière et son parc ont été acquis par la commune tout en garantissant à son ancien propriétaire, monsieur Poisson, le droit dusage et la jouissance exclusive des lieux. Propriété de la commune,","architecture":"BOIS de la NOE, en 1884, Pierre Auguste Giraud meurt et débute une succession longue et laborieuse. Celle-ci conduira au démantèlement du domaine  il se compose d'un corps de logis rectangulaire à deux niveaux belles lucarnes à pinacle triangulaire trois pavillons en façade dont celui de l'entrée au centre est carrée, toit à l'impérial les deux autres aux extrémités polygonales.                                                                                                   MEVEILLIERE, le domaine  s'étend sur 52 hectares et constitue un enjeu important de conservation du patrimoine bâti et naturel. Remontant au XVIIIe siècle, le château est particulièrement chargé d'histoire et a connu de nombreux remaniements et restaurations au fil des années, notamment les façades, la cour d'honneur, les allées, les jardins et les plans d'eau. Le château s'accompagne d'un patrimoine naturel intéressant avec un parc boisé et ornemental, le verger et l'étang. Les bâtiments sont en U et forment une cour au nord, fermée par des douves et une grande grille.                                                                        SENAIGERIE, maison seigneuriale mentionnée au XVe siècle. Le logis, la fuie et la chapelle, construits aux XVIe et XVIIe siècles, ont conservé leurs caractères de représentativité originaux. Les dépendances ont été rebâties dans la première moitié du XIXe siècle. La chapelle est édifiée au XVIIIe siècle. La fuie ronde est couverte d'un dôme en tuffeaux appareillés surmonté d'un lanterneau.   Inscrit au  MH : le logis et la fuie : inscription par arrêté du 4 mars 1999.","habitants":"Bois de la Noé, Isabelle Elisabeth Biré                     Meveillière; Famille Poisson et  Guérin \r\n        \"","divers":"Château à la Bouaye Merveillière grav 4-5             47° 08' 39\" Nord, 1° 41' 16\" Ouest                                                                                       Senaigerie grav 6 à 9.  47° 8' 9,13\" Nord, 1° 40' 46,11\" Ouest   Bois de la Noé grav 1-2-3","gps":"","images":["../image/image_44/44_Bouaye_1.jpg","../image/image_44/44_Bouaye_2.jpg","../image/image_44/44_Bouaye_3.jpg","../image/image_44/44_Bouaye_4.jpg","../image/image_44/44_Bouaye_5.jpg","../image/image_44/44_Bouaye_6.jpg","../image/image_44/44_Bouaye_7.jpg","../image/image_44/44_Bouaye_8.jpg","../image/image_44/44_Bouaye_9.jpg"]},"Consult_chateau_formulaire542d":{"id":"Consult_chateau_formulaire542d","dept":"44","canton":"Nort sur Erdre","commune":"Missillac","nom":"Bretesche","type":"Château","periode":"XV-XVIII","histoire":"Deux château à Missilac  celui de Bretesche  et celui de Briandais.                                                                                   BRETESCHE,   la Bretesche est l'ancienne résidence des barons de la Roche-Bernard. Il tient son nom de Bertesca, ouvrage extérieur surplombant la porte principale d'un château pour en défendre l'entrée. Le château est édifié entre 1430 et 1470 par Guy XIV de Laval, baron de La Roche Bernard. Durant les guerres de Religion, le château est un haut lieu du protestantisme et subit en 1591, le siège du duc de Mercoeur. De 1636 à 1648 Charles de Cambout marquis de Coslin, cousin du cardinal de Richelieu, procède aux réparations et aux agrandissements du château . Le 17 octobre 1793, il est incendié par le général républicain Avril. Détruit à la Révolution, le château de la Bretesche fut reconstruit au XIXe siècle, pour Jacques Perron. Puis en 1847, la famille de Montaigu rachète le château. Ses membres deviendront maires de Missillac durant 45ans, du XIXe au XXe siècle. En 1965, il est rendu à nouveau et racheté par une société Immoblière. Le château de la Bretesche sera divisé en appartements. Quand aux dépendances, elles seront transformées en hôtel-restaurant d'Alain Besse.                                                                                                                                 BRIANDAIS,  est un manoir bâti à La Briandais, situé sur un domaine de 7 hectares,le long du Lac de la Roche-Hervé, cet hôtel traditionnel est aménagé dans un manoir en pierres, du XVIIIe siècle. C'est devenu un hôtel 2 Etoiles.","architecture":"BRETESCHE,  la demeure des barons restera à l'état de ruines jusqu'en 1813, date à laquelle elle est achetée par un M. Formont, député sous Charles X. En 1840, la Bretesche est vendue au baron Jean Jacques Perron, qui la vend, en novembre 1847 au marquis Auguste de Montaigu, et reste la propriété de cette famille jusqu'en 1965. Le château est restauré par Pierre de Montaigu et son épouse, Caroline de Wendel. Il a eu pour hôtes les ducs de Bretagne, Jean V, François Ier et François II qui venaient chasser. Le château est édifié sur une terrasse crénelée, entouré sur trois côtés par des douves, le quatrième baignant directement dans un vaste étang de 13 hectares...","habitants":"Famille de   Charles de Cambout\r\n        \"","divers":"Bretesche grav de 1 à 7. 47° 28' 58\" Nord et 2° 10' 19\" Ouest.                  Briandais  grav-8.   47° 28' 59\" Nord, 2° 09' 28\" Ouest                                           Bouguenais  grav_9","gps":"","images":["../image/image_44/44_Bretesche_1.jpg","../image/image_44/44_Bretesche_2.jpg","../image/image_44/44_Bretesche_3.jpg","../image/image_44/44_Bretesche_4.jpg","../image/image_44/44_Bretesche_5.jpg","../image/image_44/44_Bretesche_6.jpg","../image/image_44/44_Bretesche_7.jpg","../image/image_44/44_Bretesche_8.jpg","../image/image_44/44_Bretesche_9.jpg"]},"Consult_chateau_formulaire588b":{"id":"Consult_chateau_formulaire588b","dept":"44","canton":"Vallet","commune":"Landreau","nom":"Briacé","type":"Château","periode":"XV-XIX","histoire":"Deux châteaux à Landreau  celui de Briace  et de Lacour.                            BRIACE, c'est un château de style Renaissance, qui appartenait aux Frères de Saint-Gabriel, date des XVe et XIXe siècles. Manoir du XIIe siècle. Partiellement détruit durant la guerre de Vendée, il est reconstruit au XIXe siècle, y compris ses douves, mais toute la partie Ouest n'a pas été achevée au-delà des caves, d'où un pignon aveugle avec les saillies de pierre destinées à la liaison avec les murs futurs. Le parc, le chais et les communs  datent aussi du XIXe siècle et l'organisation générale correspond aux principes des châteaux de ce siècle (parc anglais avec étang, ruisseau parcourant le parc, le potager ceinturé de murs et serre). La propriété a été cédée aux Frères de Saint-Gabriel au décès du propriétaire Gilbert Blanchard des Crances, en 1950, pour y construire un lycée agricole.                                                                                                                                La COUR,   lorigine du château remonte au début du XIXe siècle. Joseph Boutin acquît pour son frère Vincent-Yves, un domaine comportant des vignes et le vieux château de la Houdinière. Vincent-Yves Boutin est né au Loroux Bottereau en 1772. Officier de lArmée de Napoléon, il est envoyé à Constantinople pour conseiller le Sultan Sélim III dans la défense de la ville contre les Anglais Il est décoré de lOrdre du Croissant par le Sultan . Une partie de cette somme sera consacrée à lacquisition du domaine. Il meurt assassiné en Syrie en 1815. Ses descendants la cèderont à Pierre Sauvetre en 1938, grand-père de lactuel propriétaire-viticulteur ( pas d'image)","architecture":"BRIACE; des bâtiments annexes abritent les chais du centre de formation professionnelle et le Lycée y a été construit au milieu des années 1970. Il se situe au Sud-Ouest du Landreau.  Il appartient aux Frères de Saint-Gabriel. Le château de Briacé est en pierres de taille ocre et tuffeau. Il date en grande partie du XIXe siècle. Le pignon Nord est plus ancien. Il est entouré de larges douves maçonnées dont il ne reste que les parties Ouest et Sud. Le lycée privé existe depuis 1957. En 1960, est construit, dans le parc, un ensemble scolaire Briacé qui comprend un lycée d'enseignement général, un lycée professionnel, un collège, un campus d'enseignement supérieur et un centre de formation continue de la filière Agro-Viticole, dont les caves occupent les dépendances du château. Il est entouré d'un parc de 7 ha où se trouvent plusieurs arbres pluri-centenaires. C'est le siège d'un centre de formation.","habitants":"Briacé; Frères de Saint-Gabriel                                              La Cour; Famille de Joseph Boutin\r\n        \"","divers":"Deux châteaux à Landreau  celui de Briace grav 1  et de Lacour grav 2-3 .                                                                           Briacé  47° 12' 5,03\" Nord, 1° 19' 3,66\" Ouest","gps":"","images":["../image/image_44/44_Briac%c3%a9_1.jpg","../image/image_44/44_Briac%c3%a9_2.jpg","../image/image_44/44_Briac%c3%a9_3.jpg"]},"Consult_chateau_formulaire9705":{"id":"Consult_chateau_formulaire9705","dept":"44","canton":"Varades","commune":"Varades","nom":"Briau","type":"Château","periode":"XIX","histoire":"BRIAU,  a été construit par l'architecte Edouard Moll pour l'ingénieur et entrepreneur François Briau, constructeur de lignes de chemins de fer pour l'Ouest de la France. À la suite de son expansion économique, il se fait bâtir vers 1854 « le château de la Madelaine », de style villa palladienne. Sa fille se marie avec Octave Prudent-Crouan, cousin germain de l'armateur nantais Fernand Crouan, qui arma le Belem et qui était propriétaire du château des Jamonières à Saint-Philbert-de-Grand-Lieu, du château de la Houssinière à Nantes et du château de Pierre-Levée dans la forêt de Princé en Chéméré. Un autre de ses cousins est notaire à Sainte-Pazanne et possède l'hôtel particulier Nau. Briau à l'abandon  depuis une trentaine d'années,  en 1995 François et Thérése Devouge ont décidé de le faire renaître.\r\nLe monument est inscrit au titre des M.H. en 1998. Aujourd'hui chambres d'hôtes.","architecture":"BRIAU, dominant la Vallée de la Loire et face à l'abbaye de Saint-Florent-le-Vieil, le château de la Madelaine a été rebaptisé récemment \" Palais Briau \" du nom de son commanditaire, François Briau. Au milieu d'un parc de 18 ha clos de murs, très aménagé en promenades et vues autour des ruines de l'ancien château de la Madelaine, de l'ancien bras de Loire devenu \"boire\" avec la création de la voie ferrée Nantes-Angers, des terrasses de la nouvelle orangerie, l'architecte angevin Edouard Moll, édifie des communs de ferme et fabrique dans les années 1850, puis en 1862-63, le \"château\" de style palladiens à fortes références italiennes (plans, matériau de briques et calcaires, toitures basses, décors d'architecture et revêtements de stucs). Le modernisme de l'époque y est glorifié et abondamment utilisé dans les constructions (l'électricité, le chemin de fer).","habitants":"Briau; François Briau.  Famille de François et Thérése Devouge\r\n        \"","divers":"A Varades château de Briau; 47° 22' 50\" nord, 1° 01' 12\" ouest","gps":"","images":["../image/image_44/44_Briau_1.jpg","../image/image_44/44_Briau_2.jpg","../image/image_44/44_Briau_3.jpg","../image/image_44/44_Briau_4.jpg","../image/image_44/44_Briau_5.jpg","../image/image_44/44_Briau_6.jpg"]},"Consult_chateau_formulaire7a11":{"id":"Consult_chateau_formulaire7a11","dept":"44","canton":"Châteaubriand","commune":"Louisfert","nom":"Caratel","type":"Château","periode":"XVII","histoire":"CARATEL, situé entre étangs et forêts, à proximité du bourg de Louisfert, le château de Caratel a été construit au milieu du XVIIe siècle, époque à laquelle des constructions antérieures, du XVe siècle probablement, ont été profondément remaniées. L'édifice  aurait été  commandité par Isabelle dIspanays qui aurait été propriétaire des terres de Caratel avant 1644, année dacquisition de ce château par Pierre Dreux, écuyer et conseiller au Parlement de Bretagne. Avant de mourir vers 1650, il obtient de la Princesse de Condé, Dame de Châteaubriant, lanoblissement et l'érection en fief de la Vallée de Caratel. Le domaine est anobli en mai 1659 par Louis XIV. Le château appartient ensuite à la familles Thierry de la Prevalaye, de Bouexic de la Driennais puis pendant environ un siècle et demi, il est occupé par des directeurs de forges. Un anglais notamment, William Thoneton, attiré par le minerai de fer et désireux de développer lindustrie sidérurgique dans la région, sinstalle à Caratel de 1823 à 1830, année où il rentre chez lui, en Angleterre, après avoir échoué dans son entreprise. Caratel entre dans le patrimoine de la famille de Cambourg en 1874 et en 1980, Patrick de Cambourg hérite du château de Caratel.","architecture":"CARATEL, a été construit dans sa composition d'ensemble actuelle vers 1650, c'est-à-dire à la moitié du XVIIe siècle, époque à laquelle des constructions antérieures, au XVIe siècle, ont été profondément remaniées. Il date du XVe au XVIIe siècle. Il fut construit entre 1648 et 1653 sur des fondations datant du XVIe siècle, construit de façon symétrique, sarticule autour du bâtiment central, terminé par une tour à chaque extrémité, et encadré par deux pavillons identiques qui sont légèrement avancés; celui de droite appelé la lingerie servait à stocker tout le nécessaire dune maison. Ce bâtiment est prolongé par les écuries réservées aux chevaux dattelage et le garage où étaient parquées les voitures de lépoque, avec son large porche dentrée. Il y avait également une sellerie et peut-être un local pour le maréchal-ferrant; celui de gauche composé de la chapelle et de lorangerie. La  chapelle possède un autel du XVIIe siècle provenant de lancienne église Saint-Nicolas de Châteaubriant.","habitants":"familles Thierry de la Prevalaye\r\n        \"","divers":"A Louisfert; Caratel S : 47° 40' 11\" Nord, 1° 27' 42\" Ouest","gps":"","images":["../image/image_44/44_Caratel_1.jpg","../image/image_44/44_Caratel_2.jpg","../image/image_44/44_Caratel_3.jpg"]},"Consult_chateau_formulaire2ac0":{"id":"Consult_chateau_formulaire2ac0","dept":"44","canton":"Guérande","commune":"Guérande","nom":"Careil","type":"Château","periode":"XIV-XVI","histoire":"CAREIL, il a été un site défensif construit au XIVe siècle, époque dont il a conservé un chemin de ronde avec ses mâchicoulis. Il fut érigé en châtellenie en 1572 ce qui lui conférait de nombreux droits tel que la haute justice, avec ses gibets à quatre piliers, le droit de four et le droit de marché. Du XVIe siècle il a gardé une aile Renaissance Bretonne. Propriété de Jean du Bois, sieur de Baulac dans la seconde moitié du XVIe siècle, il accueillait en 1558, les protestants chassés du Croisic. Fief protestant à cette époque et lieu de culte et de refuge pour les calvinistes, il fut en effet attaqué, pillé par la Ligue Catholique et remanié peu après. En 1699, le château est saisi et vendu aux enchères à une famille catholique, les Charrault ancêtres des Foucher. Une troisième aile brûle au XVIIIe siècle lors d'un incendie accidentel. Paul Féval écrivain du \"Bossu\" séjourna à Careil en 1850. Après le passage de plusieurs familles, dont Careil constituait souvent la dot, il a été transformé en restaurant \"A l'Auberge Fameuse\", à la réputation frivole, en 1924. Transformé à nouveau en habitation, il peut être visité de manière traditionnelle, aux chandelles, ou sous forme de jeu en costumes d'époque.","architecture":"CAREIL, il est bâti dans un style renaissance. Les fenêtres à meneaux d'origine sont modifiées à la suite de l'impôt sur les portes et fenêtres institué en 1798. Le donjon d'origine, qui se situait à l'arrière du logis seigneurial, s'effondre au milieu du XIXe siècle par manque d'entretien. Une partie de l'escalier qui y conduisait est encore visible dans le vestibule du logis seigneurial. À l'ouest, l'aile militaire, toujours visible de nos jours, accueillait à l'origine une garnison de quarante soldats. Au rez-de-chaussée se situaient les écuries et une salle commune. A l'étage se trouvait le dortoir des soldats.  Deux ouvertures fermées par des volets blancs situées sous les lucarnes aux extrémités permettaient d'évacuer directement la paille usée dans la cour du château et de hisser la paille fraîche, l'escalier en colimaçon d'accès au dortoir rendant ces opérations difficiles. Au XIXe siècle, alors que le château a perdu sa fonction défensive, des ouvertures sont percées dans les murs du rez-de-chaussée, notamment des fenêtres et une porte-fenêtre. L'aile située à l'est disparaît dans un incendie accidentel au XVIIIe siècle. Elle comportait une cuisine d'où l'incendie est parti, un four banal, une chapelle et un pigeonnier. Les éléments endommagés par l'incendie ne sont pas restaurés et les pierres sont remployées. Il ne reste aucune trace de ces différents éléments de nos jours. Après l'incendie, une cuisine plus petite et une chapelle sont aménagées dans l'aile de l'ancienne garnison.","habitants":"Famille des  Charrault\r\n        \"","divers":"A Guérande; Careil  47° 17' 56,08\" Nord, 2° 23' 56,09\" Ouest","gps":"","images":["../image/image_44/44_Careil_1.jpg","../image/image_44/44_Careil_2.jpg","../image/image_44/44_Careil_3.jpg","../image/image_44/44_Careil_4.jpg"]},"Consult_chateau_formulairecbf8":{"id":"Consult_chateau_formulairecbf8","dept":"44","canton":"Carquefou","commune":"Carquefou","nom":"Carquefou","type":"Château","periode":"XIV-XVI-XIX","histoire":"Trois châteaux à Carquefou celui de Bel-Air, de l'Epinay et celui de Seilleraye.                                                                                                                                                            BEL-AIR, ce château du XIXe siècle est situé dans un parc centenaire (bois classé de plus de deux hectares, entouré par un mur) ; vous y découvrirez un crucifix, la pierre tombale des fondateurs, un four à pain et un chenil. M. Pellerin de la Vergne (famille Capétienne) bâtit en 1864 le château de Bel Air, alors appelé Bellair. Il construit aussi deux autres résidences, proche de Nantes. Le château de Bel Air est destiné à sa femme. Le domaine est ensuite habité par son fils aîné, M. Albert Pellerin de la Vergne, marié à Mme Marguerite-Marie Querqui de la Pouzaire. Puis y habitent son fils, M. François Pellerin de la Vergne et sa femme, Mme Solange de Fremond de la Merveillère. Le château, en pierre de taille, est inscrit au titre du patrimoine bâti protégé (500 m² sur 4 niveaux). Une cheminée du XVIe siècle, illumine le rez-de-chaussée.","architecture":"L'EPINAY, le premier seigneur de l'Epinay est Perroné de Carné en 1390. Cette terre passe ensuite aux de Saro. Perronnay de Saro paraît comme seigneur de l'Epinay dans la réformation de la noblesse de Bretagne en 1429. Sa fille, Jeanne de Saro, dame de l'Epinay, apporte cette terre à Jean des Savonnières, qu'elle épouse vers 1450.  L'Epinay passe ensuite par achat aux Chauvin. Charles de Harouys, seigneur de la Rivière, la Seilleraye, devient par achat seigneur de l'Epinay à la fin du XVIe siècle. C'est Guillaume Harouys qui fait construire un nouveau château sur l'emplacement du manoir Barnier entre 1642 et 1650 par François Mansart sur les restes du premier château ruiné par les Guerres de religion. Les propriétaires successifs sont les Becdelièvre, Taverne, Linsens, Bourcher d'Argis et de Montbeillard vendus en 1733 et depuis cette famille est rester propriétaire.                                                                                                       SEILLERAYE, reconstruction en 1671 sur les plans de l'architecte parisien Delahaye, et de Mansart, construit , pour Guillaume de Harouys, le château fut achevé en 1730, pour le marquis de Becdelièvre, le château a été acheté  par André Jallais, homme d'affaires nantais, puis il a été occupé par les allemands. Après guerre ce dernier a été exproprié pour la création d'un hôpital. Le château a été utilisé comme maison de cure médicale dépendant du CHU de Nantes. S'est reconverti en logements privés à été inscrit et classé aux M.H. en 1994. Se compose d'un grand corps de logis de trente toises  de faces, deux ailes, deux pavillons. Madame de Sévigné y séjourna, la ville de Nantes en est propriétaire.","habitants":"Bel-Air famille de M. Pellerin de la Vergne.                                Epinay; Famille de Charles de Harouys                                    Seilleraye; famille d' André Jallais\r\n        \"","divers":"châteaux à Carquefou celui de Bel-Air   grav -3 , de Chambre grav -9 de l'Epinay grav-4-5-6   de Seilleraye grav 1-2.   Bel de Montreuil gracv-7  : 47° 17' 51\" Nord, 1° 29' 29\" Ouest                       Epinay   : 47° 17' 16\" Nord et 1° 29' 25\" Ouest    Seilleraye  47° 17' 58\" Nord et 1° 25' 14\" Ouest","gps":"","images":["../image/image_44/44_Carquefou_1.jpg","../image/image_44/44_Carquefou_2.jpg","../image/image_44/44_Carquefou_3.jpg","../image/image_44/44_Carquefou_4.jpg","../image/image_44/44_Carquefou_5.jpg","../image/image_44/44_Carquefou_6.jpg","../image/image_44/44_Carquefou_7.jpg","../image/image_44/44_Carquefou_8.jpg","../image/image_44/44_Carquefou_9.jpg"]},"Consult_chateau_formulaire9182":{"id":"Consult_chateau_formulaire9182","dept":"44","canton":"Nort sur Erdre","commune":"Casson","nom":"Casson","type":"Château","periode":"XVII","histoire":"PERVANCHERE, en 1430, le domaine avait pour nom « La Pernochère » en référence à son fondateur Jean Pernochère1. Il s'agit alors d'un petit manoir construit au milieu de terres vastes et giboyeuses. En 1774, la Pervechère est acquise par Georges Richard de la Pervenchère , issu une grande famille d'armateurs nantais, les Richard, qui embellissent le château. son fils Pierre Richard de la Pervenchère deviendra maire de Nantes avant la Révolution. En 1840, le château connait l'apogée de son rayonnement : les fils du roi Louis-Philippe y viennent souvent pour participer à des chasses qui se terminent par de somptueux banquets. En 1965, la ville de Nantes acquiert le domaine (accueille alors un élevage de visons) pour en faire un centre aéré et un lieu de séminaires. En 1982, on y organise les championnats de France de montgolfières, puis un an plus tard les championnats du monde.\r\nDepuis 2004, La Pervenchère est redevenue une propriété privée, mais est louée pour l'organisation de séminaires et de loisirs (golf). Sa propriétaire actuelle est une femme d'affaires chinoise qui l'a acquis au milieu des années 2010 et qui souhaite s'en séparer. Une vente aux enchères a été organisé en février 2018. Le président du FC Nantes Waldemar Kita qui souhaitait délocaliser la section professionnelle du club en dehors de l'actuel centre sportif de la Jonelière était intéressé par le domaine, mais a dû y renoncer face au coût de l'opération.","architecture":"PERVENCHERE, un château romantique aux dimensions humaines sur 3 niveaux. Au rez-de-chaussée : hall d'entrée ouvrant sur deux belles salles de réception de 56 m² chacune sur parquet chevron en parfait état avec plafond caisson entièrement rénové, deux autres pièces en enfilade. La lumière est traversante sur ce plateau de 250m².\r\nAu premier étage avec accès par escalier de maître et escalier de service par les tours, un plateau avec une distribution identique au rez-de-chaussée mais à rénover sur 250m². Au deuxième étage sous la charpente un plateau de 250m² avec la même configuration qu'au rez-de-chaussée, à rénover. Au troisième étage : un plateau avec vue panoramique sous une magnifique charpente. Les dépendances sur une cour carrée d'une surface au sol de 400 m² environ sur 2 niveaux, le tout à rénover. A l'écart, d'architecture contemporaine, un ensemble immobilier comprenant une partie habitation type loft avec prestations haut de gamme d'une surface de 357m², une partie pour logement de gardien d'une surface de 124 m² et une dernière partie de locaux à usage de bureaux.","habitants":"Pierre Richard de la Pervenchère\r\n        \"","divers":"Prévenchère 47° 23' 34\" N, 1° 30' 48\" Ouest","gps":"","images":["../image/image_44/44_Casson_1.jpg","../image/image_44/44_Casson_2.jpg","../image/image_44/44_Casson_3.jpg","../image/image_44/44_Casson_4.jpg","../image/image_44/44_Casson_5.jpg"]},"Consult_chateau_formulaire85d2":{"id":"Consult_chateau_formulaire85d2","dept":"44","canton":"Chapelle sur Erdre","commune":"Chapelle sur Erdre","nom":"Chapelle_Erdre","type":"Château","periode":"XVII-XVIII","histoire":"Dans cet article le château de la Desnerie,  la Gandonnerie de Chantrerie, de Gache, de  Nay de port-Hubert et de Saz.              DESNERIE, le domaine  est mentionné dès 1371, il est la propriété de Jean Leet alias Lect, compagnon d'armes de Du Guesclin et du connétable Olivier de Clisson, devient au XVIIe siècle la propriété de la famille de la Roche Saint André qui l'agrandit. Il possède une chapelle privée qui date de 1624 ou 1634. La famille Trévelec, qui en est propriétaire au XVIIIe siècle, l'agrandit également et ajoute l'aile ouest (uvre de l'architecte Ceineray). La famille de Sesmaisons obtient le domaine de la Desnerie par alliance avec les Leloup de Chasseloire. La tour jumelle, vestige du château primitif, date du XV-XVIe siècle.  Propriété de la famille de Sesmaisons                    \r\n GANDONNIERE, un édifice primitif existait déjà en 1660 : il était alors la propriété de la famille Priou. Le château actuel est construit au XVIIIe siècle (1750), et appartient à la famille Tiby alliée aux de Foligné durant la Révolution, puis il passe à la famille de Gray et à la famille Poydras. Depuis 1998, la demeure, dont la beauté fût reconnue par François 1er et bien d'autres ensuite, abrite aujourdhui trois chambres de caractère et vous offre le calme de ses jardins en terrasses donnant sur le plan d'eau...","architecture":"SAZ, bien avant le château, s'élevait sur le parc une villa romaine. On ne situe pas exactement la date de la construction du manoir. La plus ancienne mention de la seigneurie du Saz connue, remonte au début du XVIe siècle. Le château est la propriété du sieur Thomas, d'une famille d'officiers des finances bretonnes. Vers le milieu du XVIe siècle, la propriété change de mains et passe à Mathurin de la Brunelière, seigneur du Plessis Gesté. En 1556, les héritiers la vendent à Louis Péchin, conseiller et légataire du duc de Mercoeur. Ensuite la propriété demeurera près de deux siècles aux mains de la famille de Bariller. À la Révolution, le château est occupé par la famille Hervé de la Bauche, propriétaire du château de l'Hopital, et se voit dépouiller de tous leurs biens, déclarés biens nationaux. En 1821, il est racheté par Mlle Gonichon. En 1880, la famille Moriceau l'acquiert. Jules Moriceau l'agrandit en ajoutant deux ailes à la partie centrale, on y trouve alors Charles Moriceau, puis Pierre, le mari de l'ancienne propriétaire, qui vit dans les communs. Depuis une quinzaine d'années, il appartient à M. Rialland, ancien entrepreneur, il y a conduit d'importants travaux de rénovation.                                                      \r\nGACHE, aux beaux jours, son débarcadère accueillait les bateaux de lErdre remplis de promeneurs attirés par la célèbre guinguette où lon venait se restaurer et danser. \r\nNAY a été construit au XIXe siècle. Il possède une tour, un pigeonnier et une chapelle privée.\r\nPORT-HUBERT  De style directoire, bâtie sur des caves voûtées, il aurait été construit vers 1810. Il fut la demeure du célèbre armateur et collectionneur Thomas Dobrée.","habitants":"Desnerie; famille Trévelec                                       Gandonnerie;  famille Priou                                               Chantrerie; chapitre de Nantes                                                  Saz; famille De Bariller.                                                                     Port-Hubert; Thomas Dobrée\r\n        \r\n        \"","divers":"château de la Desnerie,  la Gandonnerie de  la Potherie grav 3-4-5  Chantrerie, de Gache, de  Nay de port-Hubert grav 1-2 et de Saz.  Desnerie : 47° 16' 21,55\" Nord, 1° 32' 7,18\" Ouest","gps":"","images":["../image/image_44/44_Chapelle_Erdre_1.jpg","../image/image_44/44_Chapelle_Erdre_2.jpg","../image/image_44/44_Chapelle_Erdre_3.jpg","../image/image_44/44_Chapelle_Erdre_4.jpg","../image/image_44/44_Chapelle_Erdre_5.jpg","../image/image_44/44_Chapelle_Erdre_6.jpg"]},"Consult_chateau_formulaire1b7c":{"id":"Consult_chateau_formulaire1b7c","dept":"44","canton":"Chapelle sur Erdre","commune":"Chapelle sur Erdre","nom":"Chapelle_sur_Erdre","type":"Château","periode":"XV-XVI-XVIII","histoire":"quatre châteaux à la Chapelle sur Erdre, l'Eraudière, la Gascherie (voir article), la Gilière  et la Poterie.                                                                                 GASCHERIE, son premier propriétaire fut Arthur L'Epervier, Grand veneur de Bretagne. En 1437, la reine de Navarre s'y rendit. Le château est reconstruit au XVe siècle par Pierre Landais. Il est notamment le lieu de naissance de François de La Noue (1531-1591), dit La Noue Bras de Fer, capitaine huguenot et philosophe. Louis Charette de la Colinière l'acquiert au début du XVIIe siècle. Il appartient par la suite à son petit-fils, Louis Charette, également maire de Nantes. Son petit-fils obtient l'érection de La Gascherie en marquisat en 1775. Il est vendu comme bien national en 1796.  En 1824, il est acheté par Julien Poydras de Lalande, dont la famille le conserve jusqu'en 1935. Il passe par la suite à la famille Savelli. Dominique Savelli puis Horace Savelli seront maires de la Chapelle-sur-Erdre. Le monument est inscrit au titre des M.H.n 2001.                                                                                                                                                                                                                               GILIERE, est construit au XIXe siècle (1840) pour le docteur Ollivry, puis propriété des familles Say en 1858, La Tocnaye en 1865, Lamisse en 1868 et Say. Le domaine appartient ensuite à la famille Terriens, Fleury de Quiry et Grassal, avant de passer entre les mains des Ollivry. Le château est acquis par la commune de La Chapelle sur Erdre en 1977, transformé en hôtel de ville depuis 1980.   . Le domaine appartient ensuite à la famille Terriens, Fleury de Quiry et Grassal, avant de passer entre les mains des Ollivry. Le château est acquis par la commune en 1977, transformé en hôtel de ville depuis 1980.","architecture":"GASCHERIE,  le château fut la maison seigneuriale de La Chapelle-sur-Erdre à la fin XIIIe siècle. à la fin du XVe siècle dans le style gothique flamboyant de celui de Goulaine.  Les dépendances du château abritent un centre hippique très fréquenté. Une agréable promenade  part du port de la Grimaudière, passe au pied du château et longe lErdre jusquà La Gandonnière.\r\nERAUDIERE, superbe manoir du XVIe siècle. La façade qui donne sur lErdre  et  du XVIIIe siècle. La  propriété  servait de résidence dété aux évêques de Nantes. Dans les communs, lévêché avait aménagé un vaste dortoir pour les séminaristes.                                                      POTERIE, construite à l'emplacement d'une ancienne tuilerie romaine, cette élégante folie Nantaise fut bâtie aux portes de Nantes à la fin du XVIIIe siècle, de style Louis XVI, le château est attribué à l'architecte Ceineray. Seule \"Folie Nantaise\" sur les bords de l'Erdre, elle fut achevée en 1789 sur un domaine de plus de 100 ha. En 1863, la Poterie fut acquise par Louis Auguste Levesque, député maire de Nantes. La famille Lesveque était également propriétaire de la Forêt de Paimpont à Brocéliande ce qui explique les nombreux souvenirs de chasse présents à la Poterie. Au début du siècle, la Poterie a été l'un des plus hauts lieux de la vénerie française. En 1988, Rogatien Levesque, fils de Louis Auguste, installa un chenil à la Poterie en donnant naissance à une nouvelle famille canine: le chien Lesveque, reconnu par tous les grands équipages pour sa grande maîtrise du courre du chevreuil.","habitants":"Gascherie; Famille de Pierre Landais                                     Gilière; Famille Say                                                                              Poterie;Famille de  Louis Auguste Levesque\r\n        \"","divers":"quatre châteaux à la Chapelle sur Erdre, la Desnerie grav 2-3-4-5 l'Eraudière grav- 1, la Gascherie (voir article),  la chantrerie grav-6, la Gilière  grav-3   et la Poterie grav 7, Saz grav_8","gps":"","images":["../image/image_44/44_Chapelle_sur_Erdre_1.jpg","../image/image_44/44_Chapelle_sur_Erdre_2.jpg","../image/image_44/44_Chapelle_sur_Erdre_3.jpg","../image/image_44/44_Chapelle_sur_Erdre_4.jpg","../image/image_44/44_Chapelle_sur_Erdre_5.jpg","../image/image_44/44_Chapelle_sur_Erdre_6.jpg","../image/image_44/44_Chapelle_sur_Erdre_7.jpg","../image/image_44/44_Chapelle_sur_Erdre_8.jpg"]},"Consult_chateau_formulaire9a25":{"id":"Consult_chateau_formulaire9a25","dept":"44","canton":"Vertou","commune":"Château_Thébaud","nom":"Chateau_Thébaud","type":"Château","periode":"XV-XVII","histoire":"CHATEAU-THEBAUD,   le nom de « Thébaud » fait référence à la famille Thébaud de Kerbernard qui y possédait le fief au Moyen Âge. Dans un document daté de 1297, l'endroit est mentionné sous l'appellation de Castrum Téobaldi.                                                                                               RAFFAY: Maison-mère des Petites Servantes de Saint-Jean-Baptiste. La communauté, dont l'office divin est mené selon le rite tridentin, a une vocation dite hospitalière. La chapelle Notre-Dame du XIXe siècle. À côté, l'ancienne résidence de personnes âgés est devenue en 2008, le cours Saint Albert le Grand, une école de jeunes filles dirigée par des surs Dominicaines.\r\nla BOURDINIERE,  du XV-XVIIIe siècle par Pierre Landais, trésorier du duc François II. Il devient ensuite la propriété des familles Thébaud de La Garnache et d'Estourbeillon. Il possède une belle tourelle gothique et de hauts murs à créneaux.\r\n BEL-ABORD, du XIX-XXe siècle. Propriété de la famille Le Bonnetier, avant 1836, du baron de Noury en 1836, et des familles Bonnard du Hanlay, Le Masne, Desclos Le Peley ; aujourd'hui viticulture de monsieur Vincent Pogu.\r\nla PLACELIERE,  manoir du XVIIIe siècle. Le domaine est acquis par Luc O'Shiell, armateur et personnalité en vue de la communauté jacobite des irlandais de Nantes. Il y maria notamment ses trois filles Agnès, Mary et Anne dans la chapelle du château avec de riches armateurs nantais, en 1733 (pour Agnès) et 1741 (pour Mary et Anne). Ce type de mariage à la Placelière se déroula jusqu'à la vieille de Révolution. À la mort de Luc O'Shiell en 1745, ses trois filles et son fils Luc Nicolas héritent du domaine. Le mari d'Anne, Guillaume Grou s'en porte alors acquéreur en 17471. Le couple est également propriétaire d'un hôtel particulier à Nantes, baptisé hôtel Grou situé sur l'île Feydeau.                                                                              Le Manoir de la Commanderie de la Templerie du XIIIe siècle  vestiges.","architecture":"PLACELIERE  est un manoir, rebâti après 1740 par l'armateur Guillaume Grou, puis une nouvelle fois en 1808 après sa destruction au cours de la Guerre de Vendée, le site devient un hôpital, d'abord centre de rééducation pour soldats handicapés, puis maison de retraite dépendant du centre hospitalier universitaire de Nantes jusqu'en 2009. Depuis, il a été racheté par la fraternité sacerdotale Saint-Pie-X, qui y a installée une école privée de garçons.                                       BOURDINIERE, est également un haut lieu médiéval dont l'importance était reconnue, ses seigneurs avaient droit de lisière, de banc et enfeu, cet à dire d'apposer leurs armoiries sur le mur de l'église, d'y siéger et y être ensevelis. Ils étaient alliés à la seigneurie de la Templerie.  le château  de plan en équerre à deux niveaux toit en croupe avec tour carrée sur angle intérieur à quare niveaux toit pointu à quatre pans,  l'édifice est prolongé de dépendance à un niveau.                                                                                                                                             CHATEAU THEBAUD, vestiges de remparts avec porte cochère.","habitants":"famille Thébaud                                                               Boudinière  Famille Thébaud                                                                     Bel Abord Famille Le Bonnetier                                Placelière; Famille de Luc O'Shiell \r\n        \"","divers":"a Château Thébaud ; grav-1-2 ; Raffay; Bourdinière grav-4  ;    Bel-Arbord grav -3  ; Placelière  grav 5-6-7.    47° 07' 33\" nord, 1° 25' 07\" ouest","gps":"","images":["../image/image_44/44_Chateau_Th%c3%a9baud_1.jpg","../image/image_44/44_Chateau_Th%c3%a9baud_2.jpg","../image/image_44/44_Chateau_Th%c3%a9baud_3.jpg","../image/image_44/44_Chateau_Th%c3%a9baud_4.jpg","../image/image_44/44_Chateau_Th%c3%a9baud_5.jpg","../image/image_44/44_Chateau_Th%c3%a9baud_6.jpg","../image/image_44/44_Chateau_Th%c3%a9baud_7.jpg"]},"Consult_chateau_formulaire8cf0":{"id":"Consult_chateau_formulaire8cf0","dept":"44","canton":"Châteaubriant","commune":"Châteaubriant","nom":"Chateaubriant","type":"Château","periode":"XI-XVI","histoire":"CHATEAUBRIANT, la citadelle de Châteaubriant tient son nom de celui qui la fit bâtir en 1040,  par le jeu des héritages et alliances la baronnie passe aux mains  de lillustre famille de Dinan. Héritière de la lignée, Françoise de Dinan épousa Guy de Laval et devint la gouvernante de la duchesse Anne de Bretagne. Mais en prenant ainsi parti pour la France, Françoise de Dinan trahit son duc. Le Traité de Châteaubriant livra la Bretagne à la France. Les seigneurs bretons se sentant trompés se révoltèrent. Charles VIII, roi de France, soumit le Duché par la force. En 1488, Châteaubriant est détruit par les armées royales de La Trémoille. Anne de Bretagne fut forcée dépouser Charles VIII en 1491. Jean de Laval, petit-fils de Françoise de Dinan qui hérite du château en 1503, devient gouverneur de Bretagne et entreprend de le relever. Après lui Anne de Montmorency laisse à Jean Delorme le soin de poursuivre les travaux et à Henri II de bourbon-Condé   assure de 1634 et 1638 une complète remise en état  Au XVIIe  siècle, le château de Châteaubriant appartiendra a la famille des Bourbon-Condé jusqu'à la Révolution, le château est vendu comme bien national, puis racheté en partie par la ville. A cette époque un jeune lieutenant républicain, du nom de Brutus Hugo rencontre une Castelbriantaise, Sophie Trébuchet. De leurs amours naîtra le célèbre littérateur Victor Hugo. Autre célébrité séjournant à Châteaubriant, l'officier Pierre de Cambrone qui, poésie en moins se fera un nom sous l'Empire. Châteaubriant doit sa sauvegarde à son rachat par le département en 1853, le château est désormais la propriété du conseil général de Loire-Atlantique.","architecture":"CHATEAUBRIANT, Cette ancienne forteresse médiévale du XIe siècle, il ne reste que de rares vestiges, l'ensemble s'étire sur un périmètres de 180 m  de long de 120m de large, le château fut remaniée de façon importante à la Renaissance. Avec le donjon, le grand logis élevé de trois étages s'appuie sur une aile en retour d'équerre elle-même adossée au donjon, encerclé par des remparts et armé de quatre tours dont une au sud-Est placée à cheval sur le rempart percés de hautes archères disposées en quinconce, et le gros donjon quadrangulaire environ de 18 mètres de côté. L'épaisseur des murs  de 2 mètres 50  couronné par un chemin de ronde au dessus duquel fut ajouté un étage coiffé d'un toit en pavillon surmonté d'un clocheton, dans l'angle sud de la tour, un large escalier à vis formait au Moyen Âge un véritable complexe résidentiel pour les maîtres des lieux. Le château Neuf  de style  Renaissance  édifié par Jean de Laval entre 1532 et 1539 s'articule autour d'un corps de logis  principal à trois niveaux d'une longueur de 45 m, large de 11 m, il forme le fond  d'une cour bordée par trois ailes aboutissant à des pavillons. Reliée à un pavillon d'escalier éclairés par des baies rampantes, l'aile sud comporte au rez-de-chaussée une galerie à arcades, les fenêtres à l'étages sont encadrées de pilastres, il existait une seconde galerie symètrique fermant la cour à l'ouest dont-il ne reste que huit arcades. Il a abrité la sous-préfecture jusqu'en 2012 le trésor public et le tribunal d'instance jusqu'en 2009 puis est devenu une gendarmerie et palais de justice.","habitants":"Famille de Dinan.                                                                      Famile des Bourbon-Condé \r\n        \"","divers":"Chateaubriant grav 1 à  9                                                                   : 47° 43' 12\" Nord 1° 22' 24\" Ouest","gps":"","images":["../image/image_44/44_Chateaubriant_1.jpg","../image/image_44/44_Chateaubriant_2.jpg","../image/image_44/44_Chateaubriant_3.jpg","../image/image_44/44_Chateaubriant_4.jpg","../image/image_44/44_Chateaubriant_5.jpg","../image/image_44/44_Chateaubriant_6.jpg","../image/image_44/44_Chateaubriant_7.jpg","../image/image_44/44_Chateaubriant_8.jpg","../image/image_44/44_Chateaubriant_9.jpg"]},"Consult_chateau_formulaire1d66":{"id":"Consult_chateau_formulaire1d66","dept":"44","canton":"Châteaubriant","commune":"Châteaubriant","nom":"Chateaubriant_44","type":"Château","periode":"XI-XVI-XIX","histoire":"A Châteaubriant  dans cet article le manoir de Bourg-Gérard , du Grand-Fougeray.  et au nord  du département à Feté le caâteau de Boispéan pas d'information.                                                                                              BOURG-GERARD, manoir,  la cité s'est développée sur le flanc ouest du château fort construit à la fin du XIe siècle au confluent de la Chère et du Rollard. Couéré et la Torche. La ville close était environnée par quatre faubourgs : au nord-ouest, le faubourg de Couéré, autour de l'hôpital élevé en 1680, relie la ville à Béré, noyau primitif de l'agglomération qui s'est développé autour des églises, le faubourg de la Barre, autour d'un manoir ; au sud-est, le faubourg Saint-Michel, autour d'un couvent d'augustins fondé au début du XIIIe siècle et au nord-est, le faubourg de la Torche, autour d'un autre manoir. Le manoir du Bourg Gérard a été construit au XVe ou au XVIe siècle. Le corps de bâtiment couvert en appentis à droite du logis date du XIXe siècle. Les souches des cheminées, et les ouvertures en brique de la face gauche ont été faites ou refaites à la fin du XIXe ou au début du XXe siècle. La fenêtre gauche de la face antérieure est en schiste taille.","architecture":"GRAND-FOUGERAY, manoir   dès le XVIe siècle, l'édifice primitif comportait des parties agricoles du XVIe ou XVIIe siècle, remaniées vers 1880, une chapelle et une motte entourée de douves. Celle-ci a  été détruite en 1854, année de la reconstruction du logis dont le pavillon Est utilise en partie la structure d'un bâtiment ancien. Acheté en 1931  par un médecin, le docteur André Bernoux, l'édifice fut alors converti en clinique spécialisée dans le traitement de la tuberculose. Le jardin qui s'élève au sud de cet ensemble est dû aux architectes paysagers Dima Boutin, Dima et Koskareff. Le manoir est composé d'un corps principal couvert d'un toit à longs pans et flanqué de 2 ailes couvertes de toits en croupe; le coeur de l'ancienne chapelle est couverte d'une croupe polygonale; la galerie qui le relie au logis est couverte en terrasse en béton ; la salle à manger du personnel est couverte en appentis. Acheté par l'hôpital  en 1966,  converti en maison de retraite.                                                                                                          BOURG-GERARD manoir,il était protégée par un mur de défense construit entre le XIIIe et le XVe siècle, lui-même entouré de douves alimentées au nord par la Chère et au sud par le Rollard dont le cours principal traverse la ville dans sa moitié orientale. Le mur d'enceinte délimitait un espace rectangulaire orienté est-ouest. Elle s'ouvrait par cinq portes : Saint-Jean au nord-ouest, la Torche au nord-est, les portes neuves et de la Poterne au sud et Saint-Michel au sud-est. L'axe longitudinal formé par les rues de Couéré et grande rue constituait l'artère principale et permettait de communiquer avec le château. Des moulins se trouvaient sur la Chère depuis le Moyen-Age.","habitants":"Biourg-Gérard; seigneurs locaux\r\n        \"","divers":"Chateaubriant grav 1 à  5: 47° 43' 12\" Nord 1° 22' 24\" Ouest                                            Bois Péan grav-6","gps":"","images":["../image/image_44/44_Chateaubriant_44_1.jpg","../image/image_44/44_Chateaubriant_44_2.jpg","../image/image_44/44_Chateaubriant_44_3.jpg","../image/image_44/44_Chateaubriant_44_4.jpg","../image/image_44/44_Chateaubriant_44_5.jpg","../image/image_44/44_Chateaubriant_44_6.jpg"]},"Consult_chateau_formulaired2d8":{"id":"Consult_chateau_formulaired2d8","dept":"44","canton":"Châteaubriant","commune":"Châteaubriant","nom":"Chateaubriant_III","type":"Château","periode":"XVI-XVII-XIX","histoire":"Dans cet article trois châteaux, la Mercerie, la Ferrière et Torche.\r\nMERCERIE, manoir primitif consiste en un corps comprenant un logis de maître, remanié au XVIIIe siècle et recouvert en 1922, un logement de fermier remontant au XVIe ou du XVIIe siècle, et des parties agricoles. Un nouveau logis a été élevé à l'ouest de cet ensemble dans le deuxième quart du XIXe siècle, après 1832, prolongé de deux ailes, d'un logement avec four et de dépendances agricoles vers 1862. Enfin, le nouveau logis a été augmenté d'un corps postérieur dans le premier quart du XXe siècle. Le corps de logis est en rez-de-chaussée et couvert d'un toit à pignon, à l'exception de la partie centrale à un étage carré distribué par une vis en bois et couvert d'un toit en pavillon; le nouveau logis est en moellon enduit avec chaînes en brique ; le corps principal couvert en croupe, les ailes en terrasses, le corps postérieur en pavillon.","architecture":"FERRIERE, du XIXe siècle et uvre de l'architecte Emile Heurtin  Ce château du début du XIXe siècle est idéalement situé dans le pays de Châteaubriant. La construction  date du XIXe siècle. Il est entouré d'un parc composé d'arbres centenaires. Vous y trouverez des salles à louer pour fêter vos évènements privés. C'est aussi un hôtel 3 étoiles  de monsieur Duboc.                                                                                              TORCHE, manoir, la cité s'est développée sur le flanc ouest du château fort construit à la fin du XIe siècle au confluent de la Chère et du Rollard. Elle était protégée par un mur de défense construit entre le XIIIe et le XVe siècle, lui-même entouré de douves alimentées au nord par la Chère et au sud par le Rollard dont le cours principal traverse la ville dans sa moitié orientale. Le mur d'enceinte délimitait un espace rectangulaire orienté est-ouest. Elle s'ouvrait par cinq portes : Saint-Jean au nord-ouest, la Torche au nord-est, les portes neuves et de la Poterne au sud et Saint-Michel au sud-est. L'axe longitudinal formé par les rues de Couéré et Grande Rue constituait l'artère principale et permettait de communiquer avec le château. Des moulins se trouvaient sur la Chère depuis le Moyen Age : Couéré et la Torche.  l'actuel manoir de la Torche a été construit au XVIIIe siècle, les élévations ont été remaniées en 1873: enduit, chambranles en schiste et décor sculpté. Le logis, de plan en équerre, est composé d'un corps principal couvert en croupe et flanqué d'un toit en pavillon.","habitants":"Gd-Fougeray; docteur André Bernoux,\r\n        \"","divers":"trois châteaux, la Mercerie grav-7 , la Ferrière grav 1 -2-3-4-5-6          et Torche_grav-7-8.                                              Ferriere 47° 43' 04\" Nord, 1° 22' 30\" Ouest","gps":"","images":["../image/image_44/44_Chateaubriant_III_1.jpg","../image/image_44/44_Chateaubriant_III_2.jpg","../image/image_44/44_Chateaubriant_III_3.jpg","../image/image_44/44_Chateaubriant_III_4.jpg","../image/image_44/44_Chateaubriant_III_5.jpg","../image/image_44/44_Chateaubriant_III_6.jpg","../image/image_44/44_Chateaubriant_III_7.jpg","../image/image_44/44_Chateaubriant_III_8.jpg"]},"Consult_chateau_formulaire6a40":{"id":"Consult_chateau_formulaire6a40","dept":"44","canton":"Marchecoul","commune":"Chaumes -en-retz","nom":"Chaumes_Retz","type":"Château","periode":"XIII-XVIII-XX","histoire":"Trois châteaux à Chaumes en Retz  celui de Bois -Rouaud (voir article),  Noirbreuil et le château de Prince.                                                                                                                                                                                                                              NOIRBREUIL, Il fut la propriété de la famille Levesque du Rostu, puis de lentreprise Saint-Gobin et en 1976 de lassociation Apalos qui convertit le château de Noirbreuil en centre de loisirs. Le manoir de Noirbreuil fut transformé en hôpital pendant la guerre de 1914-1918,   est aujourd'hui la propriété de Magali et Franck Bérieau qui organisent des évènements pour les particuliers et les entreprises.                                                                                PRINCE, ruines. Plusieurs châteaux furent construits sur le territoire de la Forêt de Princé. Le plus ancien était le château féodal entouré de douves cité en 1382 : Jeanne Chabot, dame de Retz, surnommée Jeanne la Folle, y a vécu. En 1400, elle donne la seigneurie de Princé à son petit-fils, Guy de Laval. Gilles de Rais (de Laval), né vers 1405, est surtout célèbre car il fut chargé par Gilles de la Trémouille d'accompagner Jeanne d'Arc pour combattre les Anglais.En 1641,  pour faire face aux dépenses des propriétaires. Henri de Gondi meurt le 12 août 1659 au château de Princé, où il s'était retiré depuis la démission de son titre de duc de Retz en faveur de son gendre et cousin Pierre en 1634. En 1774 le domaine fut vendu en 2 lots : le vieux château de Princé, les étangs et la partie Nord-Ouest ; le pavillon, les terres et le bois à l'Est. En 1778, Princé le vieux est acheté par Jean Guillon, écuyer et secrétaire du roi.","architecture":"NOIRBREUIL, situé au bout dune longue route rectiligne bordée par la forêt, le domaine de Noirbreuil se dessine entre les vieux chênes : 17 ha de plaines, de prairie et de bois, avec son étang, sa chapelle et son château construit en 1878.  d'un corps de logis de forme carrée à deux niveaux sur soubassement  avec lucarnes sur comble accolé de deux pavillons saillant sur angles de la façade à trois niveaux  et lucarne sur comble toit à l'impérial.                                                                                PRINCE, ruinés. Il a donné son nom à une tour du château de Princé de cinq étages, « la Tour de Barbe-bleue », dont les ruines ont disparu au début du XXe siècle ; une petite tour d'angle, nommée « la chapelle » est encore visible sur le terrain. En 1641,  pour faire face aux dépenses des propriétaires,  qui construit un château moderne et un belvédère quadrangulaire sur la Tour. Au XVIIe siècle, à l'initiative d'Henri de Gondi, un pavillon Renaissance avait été édifié tout près de là, en lien avec l'aménagement du jardin des Îles enchantées. La légende du plan de 1678, très détaillée, mentionne explicitement deux monuments, le « Château de Prinçay » et le « Château Neuf ». Il aurait brûlé en 1793, puis aurait été partiellement reconstruit, avant d'être définitivement abandonné.","habitants":"Noirbreuil, famille Levesque du Rostu,                                          Princé, famille de Jean Guillon\r\n        \"","divers":"Bois-Rouaud   47° 6' 58\" Nord, 1° 51' 27\" Ouest                                          Pierre Levé grav 6 -à 9    Noirbreuil grav-1 à 4 grav_5                           Princé  : 47°08' 33,8\" Nord, 1° 51' 05,6\" Ouest","gps":"","images":["../image/image_44/44_Chaumes_Retz_1.jpg","../image/image_44/44_Chaumes_Retz_2.jpg","../image/image_44/44_Chaumes_Retz_3.jpg","../image/image_44/44_Chaumes_Retz_4.jpg","../image/image_44/44_Chaumes_Retz_5.jpg","../image/image_44/44_Chaumes_Retz_6.jpg","../image/image_44/44_Chaumes_Retz_7.jpg","../image/image_44/44_Chaumes_Retz_8.jpg"]},"Consult_chateau_formulaire322f":{"id":"Consult_chateau_formulaire322f","dept":"44","canton":"Nort sur Erdre","commune":"Joué sur Erdre","nom":"Chauvelière","type":"Château","periode":"XVII-XIX","histoire":"CHAUVELIERE, les principaux propriétaires du château ont été : les De La Rivière ; les Crapado, amis des barons de Châteaubriant ; Angier de Lohéac alliés aux ducs de Retz ; Goyon-Matignon de Marcé marquis de La Chauvelière et du Ponthus, cousins des Fourché de Quéhillac ; Perrin de La Courbejolière de Monaco ; Richard de La Rivière d'Abbaretz ; de Charette. Dans le château et au Ponthus sont conservés plusieurs portraits dont ceux de dame Crapado, un de Goyon maréchal de camp, une de Saint-Julien épouse de Goyon.\r\nLe château était le siège d'une haute juridiction dont les fonctionnaires seigneuriaux furent les Mazureau de L'Auvinière, les Leconte alliés aux Sagory, les Lhotellier, Roussel, et Guibourd.","architecture":"CHAUVELIERE  du XVII-XIXe siècle. Durant la Révolution, le château est la propriété de la famille Goyon. Cette famille élève, au nord-ouest du château, une chapelle à Saints Donatien et Rogatien au bord d'une fontaine miraculeuse. La chapelle tombée en ruines a été remplacée par la croix de Choizeau. Dans la chapelle privée, se trouvait jadis un gisant ou une statue représentant la Viorelle (dame d'honneur de Françoise de Foix et morte après un bal nocturne à Vioreau à la suite d'une chasse royale). A l'intérieur du château, ainsi qu'au Ponthus, sont conservés des portraits : dame de Crapado, un de Goyon maréchal de camp, une de Saint-Julien (épouse de Goyon). La Chauvelière avait son moulin à eau, puis son moulin à vent à La Mouzinière. Se compose d'un plan en U avec trois corps de logis dont un plus important des deux autres sur le flanc Est à trois niveaux et lucarnes sur un toit brisés et fronton imposant sur pignon, le deuxième corps  de logis en façade idem  flanqué sur les angles dont une ronde à l'opposé tour polygonale, les deux à toit pointu et retour en équerre pour le troisième corps d'une travée de même hauteur avec fronton sur pignon.","habitants":"Famille Goyon\r\n        \"","divers":"La Chauvelière à Joué sur Erdre","gps":"","images":["../image/image_44/44_Chauveli%c3%a8re_1.jpg","../image/image_44/44_Chauveli%c3%a8re_2.jpg","../image/image_44/44_Chauveli%c3%a8re_3.jpg"]},"Consult_chateau_formulaireb0bd":{"id":"Consult_chateau_formulaireb0bd","dept":"44","canton":"Nort sur Erdre","commune":"le Cellier","nom":"Clermont_Cellier","type":"Palais","periode":"XVII","histoire":"CLERMONT, il date du XVIIe siècle. Il a été bati de 1643 à 1646.  Le château fut construit pour les Chenu, une famille de grands administrateurs militaires, vassaux des princes de Condé dont ils obtinrent une vive reconnaissance consécutive à d'importantes prises d'armes. Cette reconnaissance dut participer aux proportions princières de Clermont. René Chenu, le père (1599-1672) fut longtemps gouverneur des places fortes d'Oudon et de Champtoceaux qui commandaient le cours de la Loire plus en amont. Hardy Chenu, son fils (1621-1683) fut conducteur et visiteur général des fortifications, villes, châteaux et places fortes de Bretagne. Le château de Clermont passa par alliance à la famille de Claye en 1711, puis en 1737 aux La Bourdonnaye. C'est à la fin du XVIIIe siècle que fut établie la bergerie royale de Clermont « destinée à essayer dans les départements de l'Ouest l'éducation des moutons mérinos ». Puis le domaine passa par héritage aux Juchault des Jamonières en 1791. Pendant la Révolution, le château fut occupé par les troupes républicaines pour surveiller la Loire. Sous la Restauration, la terre de Clermont fut érigée en baronnie. Le domaine fut vendu en 1853 au baron de Lareinty, puis de nouveau en 1861 au comte Léon Nau de Maupassant. Celui-ci eut un fils, Charles, qui épousa en 1912  Marie Barthélémy. Le célèbre acteur Louis de Funès qui épousa Jeanne nièce de Marie, y résida entre 1967 et 1983.  Le château de Clermont est inscrit aux M.H. depuis 1941. Ce fut la dernière demeure de l'acteur Louis de Funes. Celui-ci est décédé en 1983 et enterré à Cellier, Il l'avait acheté avec le cachet qu'il avait touché en jouant dans le film la Grande Vadrouille.","architecture":"CLERMONT Les diverses parties du corps de logis, en brique rouge et pierre blanche reçoivent de façon indépendante de hautes toitures d'ardoise bleue. Ces contrastes chromatiques saisissants caractérisent le style Louis XIII dont la réalisation la plus emblématique est, à Paris, la Place des Vosges. Dans le corps de logis, le pavillon central surélevé d'un attique, sert de cage à l'e
