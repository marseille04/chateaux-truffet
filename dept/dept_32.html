en de Pouydraguin,  Il abrite aujourd'hui un gîte de charme . En effet, le château a appartenu aux seigneurs de la Roque dont un des membres fut tué, au XVIIe siècle, en prenant deux galères turques. Plus tard, au XVIIIe siècle, un seigneur de la Roque servant comme officier de l'armée du roi se distingua à la bataille de l'Assiette dans le Piémont. Au début du XXe siècle, c'était la propriété d'un soutien de Paul de Cassagnac, le duelliste le plus célèbre de France. En 1905, il devait y avoir, dans le parc du château, un duel entre Paul de Cassagnac et Joseph Noulens, député puis sénateur de la gauche radicale et de l'union démocratique qui fut ambassadeur de France en Russie de 1914 à 1920. Mais ce jour-là, il pleuvait des hallebardes si bien que le duel eut lieu sous la halle de Riscle. Au cours de ce duel à l'épée, Cassagnac blessa au foie Noulens. Blessure superficielle dont le député se remit très vite.  L'histoire ne dit pas si Kate et William ont humecté leurs lèvres d'un vin de saint-mont, avant de quitter le pays d'Artagnan.                             DARRECH pas d'information historique, château construit dans la moitié du XIXe siècle et toujours dans la même famille, chambres d'hôtes de Myriam Plancade.","architecture":"Comme toutes les nobles demeures de l'Armagnac, le château  de Pouydraguin devait avoir la forme d'une tour-salle. Tombé en ruines, il a été reconstruit à la fin du XVIIIe siècle. Il se présente sous la forme d'une grosse maison rectangulaire entourée d'un très beau parc de 3 hectares. Tout autour, des vignes, car nous sommes ici au cur de l'appellation Saint-Mont AOC. A l'instar de ses voisins de Sabazan et de Saint-Gô, à Bouzon-Gellenave, Larroque est un de ces châteaux qui ont participé à façonner l'image qualitative des vins de Saint-Mont à l'international.\r\nLe duc et la duchesse de Cambridge  au château de la Roque de Pouydraguin, à une vingtaine de kilomètres de Vic-Fezensac.\r\nDarrech,  château de plan en U corps de logis rectangulaire à deux niveaux toit à deux pans flanqué en façade de deux pavillons carrés toit à quatre pans, accolé sur les côtés en retrait et  en prolongement des bâtiment à deux niveaux également.                           La tour, ancien moulin dit de Régudé fortifié du XIIe siècle implanté sur un bief de lArros à une époque ou il fallait  à tout prix protéger lalimentaire pour tenter de survivre. Une simple tour rectangulaire en bel appareil de calcaire ocre, coiffée dune terrasse crénelée.","habitants":"Seigneurs de la Roque\r\n        \r\n        \"","divers":"Châteaux de Pouydraguin, de Darréch et la tour de Tasque","gps":"","images":["../image/image_32/32_Pouydraguin_1.jpg","../image/image_32/32_Pouydraguin_2.jpg","../image/image_32/32_Pouydraguin_3.jpg","../image/image_32/32_Pouydraguin_4.jpg","../image/image_32/32_Pouydraguin_5.jpg","../image/image_32/32_Pouydraguin_6.jpg"]},"Consult_chateau_formulairee805":{"id":"Consult_chateau_formulairee805","dept":"32","canton":"Pardriac-Rivière-Basse","commune":"Pouylebon","nom":"Pouylebon","type":"Château","periode":"XIII","histoire":"le village de Pouylebon, comme c'est souvent le cas en Lomagne, était entouré d'un mur d'enceinte de tour-portes et de fossés.","architecture":"Implanté sur un contrefort élevé des coteaux du Gers, l'ancien Podium Bonum du Moyen Age domine à 268 mètres d'altitude les vallées de l'Osse et du Bouès. Le château semble avoir été précédé dès le Xe siècle par une motte féodale. Le noyau ancien, englobant l'église et le cimetière, était jadis entouré de remparts et percés de deux portes donnant sur une unique rue. La tour-porte (monument classé) est du XIIIe siècle (l'autre porte de la même époque est incorporée dans le château, qui a subi une importante réhabilitation en 1767).","habitants":"Famille de Montesquiou \r\n        \r\n        \"","divers":"Porte et château à Pouylebon","gps":"","images":["../image/image_32/32_Pouylebon_1.jpg","../image/image_32/32_Pouylebon_2.jpg","../image/image_32/32_Pouylebon_3.jpg","../image/image_32/32_Pouylebon_4.jpg","../image/image_32/32_Pouylebon_5.jpg"]},"Consult_chateau_formulaire4caf-2":{"id":"Consult_chateau_formulaire4caf-2","dept":"32","canton":"Riscles","commune":"Projan","nom":"Projan_Segos","type":"Château","periode":"XVII","histoire":"A deux kilomètres au nord de Projan  à Ségos le château de Méracq  hôtel et de Sauverméa dont je n'ai pas d'information historique.                                      PROJAN, chambres d'hôtes Christine et Richard Poullain seront heureux de vous accueillir dans leur château labellisé.                                                        BASSIBE relais et châteaux à Ségos à quelques kilomètres au nord.","architecture":"Projan, bénéficiant d'un hôtel 3 étoiles. Situé au sommet d'une colline offrant une vue incroyablement dégagée sur les Pyrénées, le château de Projan saura vous faire profiter de la beauté de la nature entourant le domaine, de plan rectangulaire à deux niveaux toit en tuiles en croupe  flanqué d'une tour carrée sur un angle et dépendances accolée à l'opposée.                                               Bassibé de plan rectangulaire à deux niveaux, toit en croupes accolé en prolongement de dépendances de deux niveaux également mais inférieur.","habitants":"Christine et Richard Poullain\r\n        \r\n        \"","divers":"Divers châteaux à Projan dont celui de Bassibé","gps":"","images":["../image/image_32/32_Projan_Segos_1.jpg","../image/image_32/32_Projan_Segos_2.jpg","../image/image_32/32_Projan_Segos_3.jpg","../image/image_32/32_Projan_Segos_4.jpg","../image/image_32/32_Projan_Segos_5.jpg","../image/image_32/32_Projan_Segos_6.jpg"]},"Consult_chateau_formulairebf4c":{"id":"Consult_chateau_formulairebf4c","dept":"32","canton":"Prégnian","commune":"Prégnian","nom":"Prégnian","type":"Château","periode":"XIV-XVIII","histoire":"PREGNAN, les vestiges du château médiéval qui sont relativement bien conservés à l'ouest du castelnau.  Le village actuel s'est formé en contrebas.                                              TESTERE, était initialement inclus dans le Duché de Roquelaure, qui comprenait par ailleurs le château du Rieutort. En 1756, les terres du duché ainsi que quelques dépendances sont vendues à Victor de Riquetti, comte de Mirabeau, par l'une des deux héritières du duc de Roquelaure, Françoise, princesse de Léon et duchesse de Rohan. Ainsi, le 1er septembre 1761, Jean-François-Joseph de Filhol, capitaine de cavalerie au régiment de Noailles, inspecteur des haras de la généralité d'Auch depuis 1758, en fait l'acquisition . Plusieurs propriétaires se succèdent au cours du XIXe siècle. Jean Boutan, marié à l'une des nièces de Jean-François-Joseph de Filhol, hérite du domaine avant 1793 et le conserve une trentaine d'années. Vers 1825-1827, le domaine devient la propriété du marquis Edouard de Carcado-Molac capitaine de cavalerie, chevalier des ordres royaux et militaires. Il est ensuite vendu le 17 octobre 1850 à Jean-François Josserand et sa femme , avant d'être légué par la veuve Josserand à Jean-Baptiste Arnoux, son petit neveu alors mineur, vers 1880. L'héritier de Filhol ne semble pas avoir réalisé de travaux au château. En revanche, les propriétaires suivants, Carcado-Molac et Josserand, ont engagés d'importantes transformations qui lui ont donné sa physionomie actuelle.","architecture":"Testère, le corps de logis principal a quant à lui subit de nombreux remaniements,  plusieurs sont effectués  adjonction des tourelles d'angle au sud et du portique au nord, modification des ouvertures de l'étage, réalisation de la haute toiture en ardoise, aménagements et décors intérieurs. C'est  la famille Josserand qui est à l'initiative de la construction des tourelles et de la nouvelle toiture. Elle fait par ailleurs construire avant 1877,  la chapelle dans l'aile orientale, par le peintre et sculpteur lectourois Prosper Lasseran.    La vente du domaine à Angélique Lengard le 19 juillet 1897, vers 1921, la propriété est revendue à Léopold et Elisabeth Verguin avant d'être acquise le 22 novembre 1924  par plusieurs familles italiennes originaires de Ruda, en Italie. La propriété, y compris la métairie, est partagée l'année suivante en sept lots entre les familles Ulian, Urizzi, Tomazin et Férigini. Le château proprement dit est divisé en quatre lots répartis autour de la cour commune et une école est installée dans la chapelle, une cour est aménagée côté nord. Les familles occupent le domaine jusqu'en 1956.  Le château de la Testère constitue un exemple remarquable de demeure aristocratique de la fin du XVIIIe siècle, complétée par une importante exploitation agricole édifiée dans le même temps. L'adjonction des tourelles d'angle et de la haute toiture en ardoise au milieu du XIXe siècle a néanmoins sensiblement modifié son architecture.","habitants":"Victor de Riquetti, Comte de Mirabeau\r\n        \r\n        \r\n        \"","divers":"Plusieurs châteaux à Prégnian dont celui de Testère","gps":"","images":["../image/image_32/32_Pregnian_1.jpg","../image/image_32/32_Pregnian_2.jpg","../image/image_32/32_Pregnian_3.jpg","../image/image_32/32_Pregnian_4.jpg","../image/image_32/32_Pregnian_5.jpg","../image/image_32/32_Pregnian_6.jpg","../image/image_32/32_Pregnian_7.jpg","../image/image_32/32_Pregnian_8.jpg"]},"Consult_chateau_formulaire9ca6":{"id":"Consult_chateau_formulaire9ca6","dept":"32","canton":"Fezensac","commune":"Roquebrune","nom":"Pujos","type":"Château","periode":"XVI","histoire":"ROQUEBRUNE, château de Pujos du XVIe siècle (visite extérieure). Chapelle de Saint-Jean de Lamans. Tour de lancien château fort du Cos du IXe siècle en ruines.   Porte et château de Saint-Yors.","architecture":"Pujos se situe à l'extrême fin des demeures fortifiées du XVIe siècle, meurtrières, bouches à feu. A voir également sur la commune la pile gallo-romaine dite de La Montjoie, c'est un temple de forme rectangulaire ouvert sur une face et voûté en berceau. Chacune des parois latérales intérieures contient une petite niche à fond plat, tandis que le mur du fond en possédait une sur plan semi-circulaire.\r\nEléments protégés MH : les façades et les toitures, l'escalier à vis, les deux cheminées d'origine du rez de chaussée et celle du premier étage: inscription par arrêté du 30 mars 1978.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Roquebrune, Porte et châteaux de Saint-Yors et de Pujos","gps":"","images":["../image/image_32/32_Pujos_1.jpg","../image/image_32/32_Pujos_2.jpg","../image/image_32/32_Pujos_3.jpg","../image/image_32/32_Pujos_4.jpg","../image/image_32/32_Pujos_5.jpg"]},"Consult_chateau_formulairede72":{"id":"Consult_chateau_formulairede72","dept":"32","canton":"Fleurance","commune":"Puységur","nom":"Puységur","type":"Vestiges","periode":"XII","histoire":"A Puységur un château et à 3 km au sud le château de Roquefort                                                                           PUYSEGUR,  il appartenait à un comte d'Armagnac, Bernard VI qui a décidé de le donner en douaire  à sa femme, Cécile de Rodez.  En 1360, il est offert à Bernard Maurin, alias Maurin de Biran, un sénéchal de L'Agenais et fils de Jean 1 er, comte d'Armagnac. Il reste dans les mains de cette famille jusqu'à ce qu'en 1528, le château soit vendu à un marchand très riche de Lectoure : Nicolas Chastenet. On considère que la plupart des restes du château doit dater de cette période là. Le château devient l'héritage des générations Chastenet suivantes. L'une d'entre eux, Anne-Thérèse, épouse un certain Gilles Gervais de la Roche Loumaigne, le marquis de Gensac. Ce dernier décède en 1732 et sa veuve décide de revenir vivre au château de Puységur avec son fils Paul-Emmanuel.  Elle décide de moderniser  et entame de nombreuses restaurations et modifications dès 1735. Après 1824, racheté par une branche de la famille Chastenet vivant du côté de Tours le rachète. Le château est très peu habité et se délabre de lui-même. Il est vendu en 1895 et devient une propriété privée  très rapidement abandonnée.","architecture":"Le village de Puységur est un castelnau installé à une date inconnue. Le castelnau pourrait s'être formé dans la seconde moitié du XIIe siècle ou la première du XIIIe siècle. Il n'apparaît dans la documentation écrite que vers 1300. Il ne subsiste aucun vestige bâti du château médiéval. Les éléments visibles de cet édifice ne remontent qu'aux XVIIe et XVIIIe siècles. La seule construction médiévale observée, hormis une partie de l'église, est le pan de mur d'enceinte du côté sud du village. Ce mur d'enceinte pourrait dater de la fin du XIIIe siècle ou du début du XIVe siècle. La plupart des maisons du village ont été fortement remaniées au XVIIIe siècle et à l'époque contemporaine.      Roquefort  château impressionnant, cette grosse tour carrée, large, avec à son sommet une belle charpente apparente sur les côtés.   Par contre on admet que laspect du château actuel date bien du XVe siècle.\r\nIl est bon den admirer le côté massif et surtout les mâchicoulis ainsi que le « bois » qui supporte le toit. Nous ne nous sommes pas privées en crapahutant comme nous le pouvions autour du château pour lapercevoir entre la végétation de son jardin.","habitants":"Famille de Puységur\r\n        \r\n        \r\n        \"","divers":"Château de Puységur","gps":"","images":["../image/image_32/32_Puysegur_1.jpg","../image/image_32/32_Puysegur_2.jpg","../image/image_32/32_Puysegur_3.jpg"]},"Consult_chateau_formulaire9925-2":{"id":"Consult_chateau_formulaire9925-2","dept":"32","canton":"Fleurance","commune":"Castelnau-d","nom":"Quinsac","type":"Château","periode":"XIX","histoire":"QUINSAC est situé dans un vallon boisé, au pied d'une colline qui domine l'imposant village de castelnau d'Arbieu fondé par Arbieu de Labatut en 1263. Le château de Quinsac a été bâti vers le milieu du XIXe siècle sur les ruines d'un ancien manoir féodal qui dépendait de la très importante  seigneurie de Castelnau d'Arbieu mouvante  du comté  d'Armagnac dont les principaux seigneurs ont été les de Galard  (463 ans) et les  Montaut, actuellement il appartient à monsieur M.L.Ricard, éleveur.","architecture":"Le château de Quinsac  a été construit vers le milieu du XIXe siècle sur les ruines d'un ancien manoir féodal,  corps de logis central de plan carré à deux niveaux avec lucarnes sur toit brisé pavillon saillant en façade avec lucarne à pilastre, deux pavillons saillants de un niveau sur soubassement  ces derniers servent de terrasses.","habitants":"Famille des de Galard\r\n        \r\n        \"","divers":"Château de Quinsac à Castelnau d'Arbrieux","gps":"","images":["../image/image_32/32_Quinsac_1.jpg","../image/image_32/32_Quinsac_2.jpg"]},"Consult_chateau_formulairec63e":{"id":"Consult_chateau_formulairec63e","dept":"32","canton":"Montréal du Gers","commune":"Montréal-du-Gers","nom":"Quintarets","type":"Manoir","periode":"XVIII","histoire":"QINTARETS, manoir abandonné depuis six ans squatté dernièrement  sublime manoir datant du XVIIIe siècle. Marie-Pierre Tranier, propriétaire du domaine.","architecture":"Les travaux de restauration du manoir, laissé à labandon depuis plusieurs années, se poursuivent tout comme les négociations entre la propriétaire, Marie-Pierre Tranier a des problèmes avec des squatters qui nont, aujourd'hui aucun accord.  Corps de logis de plan carré avec tour octogonale d'entrée toit en poivrière, flanqué  sur l'arrière d'un pavillon saillant de même niveaux et de deux tourelles en encorbellement sur angles de la façade arrière à toit très pointus.","habitants":"Marie-Pierre Tranier\r\n        \r\n        \"","divers":"Château de Quintarets à Montréal du Gers","gps":"","images":["../image/image_32/32_Quintarets_1.jpg","../image/image_32/32_Quintarets_2.jpg","../image/image_32/32_Quintarets_3.jpg","../image/image_32/32_Quintarets_4.jpg","../image/image_32/32_Quintarets_5.jpg"]},"Consult_chateau_formulaireecfd":{"id":"Consult_chateau_formulaireecfd","dept":"32","canton":"Gimone-Arrats","commune":"Razengues","nom":"Razengues","type":"Château","periode":"XV","histoire":"RAZENGUES, l'établissement, chambres d'hôtes du château  vous accueille dans le décor authentique d'un château du XVe siècle  en brique, ancien fief de la famille d'Albis de Razengues. Aujourd'hui la famille Fray.","architecture":"château du XVe siècle en brique, quadrilatère avec corps de logis rectangulaire de deux niveaux de dix travées fronton triangulaire sur façade, flanqué en angles de deux tours carrées de trois niveaux prolongé en retour d'équerre de deux bâtiments de dépendance à deux niveaux.","habitants":"famille d'Albis de Razengues\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Razengues","gps":"","images":["../image/image_32/32_Razengues_1.jpg","../image/image_32/32_Razengues_2.jpg","../image/image_32/32_Razengues_3.jpg"]},"Consult_chateau_formulaire3bfe":{"id":"Consult_chateau_formulaire3bfe","dept":"32","canton":"Auch","commune":"Roquelaure","nom":"Rieutord_Gers","type":"Château","periode":"XVII","histoire":"RIEUTORD, le maréchal Antoine de Roquelaure, souhaitant recevoir  lors de ses séjours en Gascogne il réhabilitera également le château de Lavardens, envisage la construction d'une demeure seigneuriale moins austère que le vieux château féodal de Roquelaure. il meurt en 1625 dans le château des comtes d'Armagnac à Lectoure. Son fils Gaston-Jean-Baptiste de Roquelaure poursuit et termine la construction des bâtiments, Il avait hérité ou fait l'acquisition d'une quantité de terres, de domaines, de fiefs et de villages  Ces possessions, faisant de lui le plus puissant des seigneurs gascons, sont apportées à la maison de Rohan par le mariage avec le duc de Rohan-Chabot, en 1708, de sa petite-fille, Françoise, fille d'Antoine-Gaston, dernier duc de Roquelaure.  En 1757, les Rohan cèdent les terres de Roquelaure et le château du Rieutort au marquis de Mirabeau qui le revend au roi pour son haras en 1761. Lorsque Louis XV décide, en 1772, de supprimer le haras, le duché de Roquelaure est acquis par Guillaume Dubarry qui s'y éxile à la suite de son mariage blanc avec la fameuse comtesse puis l'échange, contre le château de Reynerie, avec le conseiller au parlement de Toulouse, Reversat Célès de Marsac, guillotiné en 1794. Après le démembrement des terres de Roquelaure qui fait suite à la Révolution, le château du Rieutort devient la propriété des familles Gèze en 1860, puis Duffaut en 1870, et aux de Montal depuis la fin du XIXe siècle.","architecture":"Enfermé dans plusieurs enceintes de remparts, le château de Rieutort est construit dans les vastes prairies verdoyantes le long du Gers, à l'écart du bourg et du château féodal abandonné.\r\nLes vastes bâtiments sans étage sont conçus selon un plan encore assez peu répandu, les constructions de l'époque et de la région comportant encore couramment des parties fortifiées rappelant les châteaux gascons des siècles précédents.  bâtie entre 1650 et 1850 environ, à simple rez-de-chaussée, fortement barlongue, comportant des éléments architecturaux extérieurs et une finition intérieure tranchant sur l'ordinaire, et manifestant un certain art de vivre  par sa structure quadrangulaire construite autour d'une cour. L'entrée principale, ouverte au couchant, du côté du village, donne en effet sur une grande cour carrée. Le bâtiment d'habitation occupe l'aile qui est face à l'entrée. À l'ouest, au nord et au sud sont répartis des communs, des écuries et des caves voûtées. L'édifice présente une belle ordonnance avec les plans d'eau, les allées, les bosquets et les prés alentours, indissociables de l'ensemble.","habitants":"Maréchal Antoine de Roquelaure\r\n        \r\n        \"","divers":"Château de Rieutord de saint-Aubin et la tour d'Arcamont à Roquelaure","gps":"","images":["../image/image_32/32_Rieutord_Gers_1.jpg","../image/image_32/32_Rieutord_Gers_2.jpg","../image/image_32/32_Rieutord_Gers_3.jpg","../image/image_32/32_Rieutord_Gers_4.jpg","../image/image_32/32_Rieutord_Gers_5.jpg","../image/image_32/32_Rieutord_Gers_6.jpg","../image/image_32/32_Rieutord_Gers_7.jpg"]},"Consult_chateau_formulairebf1b":{"id":"Consult_chateau_formulairebf1b","dept":"32","canton":"Auch","commune":"Roquefort","nom":"Roquefort_Gers","type":"Forteresse","periode":"XIII-XV","histoire":"ROQUEFORT  sa construction daterait du XIIIe et XVe siècle. Ce serait un château de salle et de tour  du XIIIe siècle qui aurait été acheté par un certain Maurin de Biran, fils de Jean 1er dArmagnac.  Il reste dans la famille des Biran, puis à la famille Secondat fut durant des siècles baron de Roquefort, édifié au XIIIe siècle, et après des recherches aux archives  de 1365, par lequel  la terre de Roquefort, sa tour et ses moulins sont vendue à noble Maurin Bernadius de Biran bourgeois dAuch enrichi par les charges départementales dont il résulte, qu'en 1562 Jeanne d'Albret donna à la baronnie de Secondat, le château qui le conserva jusqu'à la fin du XVIIIe siècle. Il fut ensuite délaissé au XVIe siècle, pendant près de deux cents ans, puis sauvé de la ruine au XVIIIe siècle. Des transformations et des ajouts eurent lieu au XIXe et au XXe siècle, mais il a été entièrement restauré par les propriétaires actuels qui en ont fait une élégante résidence privée.","architecture":"Roquefort, le château, propriété privée entièrement rénovée, est remarquable par sa situation sur un éperon rocheux. impressionnant, cette grosse tour carrée, large, avec à son sommet une belle charpente apparente sur les côtés.   Par contre on admet que laspect du château actuel date bien du XVe siècle  au XIIIe siècle, le château se résumait à une tour de guet. Elle était carrée, denviron 6 mètres de côté, avec des murs épais de 1 mètre 40.  A lintérieur, cette tour renferme la plus grande curiosité de tout le monument. A partir du sol et jusquà environ 2 mètres de hauteur, elle était bâtie en maçonnerie pleine comme pour défier toutes les tentatives de la sape. Au-dessus de cette maçonnerie pleine se trouvait un compartiment carré de 3 m 50 de côté, haut denviron 5 mètres, sans aucune ouverture sur les parois latérales. Il servait de prison, Les malheureux quon y enfermait étaient descendus par une ouverture carrée pratiquée dans la voûte et cest par là quil recevaient aussi le jour, lair et les vivres,  toujours est-il que la tour fut absorbée par la construction du donjon. Ce dernier, fort majestueux, fut construit sur la base dun carré denviron 12 mètres de côté, dans un bel appareil très bien conservé et restauré, et dune hauteur de plus de 18 mètres.  Il est bon den admirer le côté massif et surtout les mâchicoulis ainsi que le « bois » qui supporte le toit.","habitants":"Famille Secondat \r\n        \r\n        \"","divers":"Château de Roquefort","gps":"","images":["../image/image_32/32_Roquefort_Gers_1.jpg","../image/image_32/32_Roquefort_Gers_2.jpg","../image/image_32/32_Roquefort_Gers_3.jpg","../image/image_32/32_Roquefort_Gers_4.jpg","../image/image_32/32_Roquefort_Gers_5.jpg","../image/image_32/32_Roquefort_Gers_6.jpg","../image/image_32/32_Roquefort_Gers_7.jpg","../image/image_32/32_Roquefort_Gers_8.jpg"]},"Consult_chateau_formulaire6d50":{"id":"Consult_chateau_formulaire6d50","dept":"32","canton":"Miradoux","commune":"Gimbréde","nom":"Rouillac_32","type":"Forteresse","periode":"XIV","histoire":"ROUILLAC, La seigneurie de Rouillac était mentionnée en 1280. Le château fut bâti par Bertrand de Goth, vicomte de Lomagne, entre 1311 et 1323. nous trouvons dans les archives un extrait d'une transaction, conclue vers 1280, entre Elye de Talleyrand, comte du Périgord, agissant au nom de sa femme, Philippia de Peyratort, vicomtesse de Lomagne et le commandeur du temple de Gimbrède, au sujet des juridictions de Gimbrède et de Rouillac que réclamaient les deux parties. Il fut convenu que, pour le lieu de Rouillac, la haute seigneurie appartiendrait à la vicomtesse de Lomagne et le reste de la Juridiction par indivis entre les deux compétiteurs, tandis que les Templiers auraient en entier la haute  moyenne et basse justice du lieu de Gimbrède, tout en étant tenus à l'hommage envers leur suzerain.    Le château fait aujourdhui partie dun ensemble de bâtiments habités et à usage agricole. Il se compose d\"un corps principal rectangulaire, flanqué de deux tours carrées alignées sur la façade. Les étages sont desservis par un escalier en demi-hors-uvre, et un escalier à vis, sans ouvertures.\r\nLaustère forteresse rectangulaire fut, comme la plupart des châteaux gascons, aménagée au XVIIIe siècle par le percement de fenêtres et divers aménagements. Lintérieur présente des décors en stuc.  Le château a été recensé par lInventaire général du patrimoine culturel en 1987. Un des contes facétieux recueillis par Jean-François Bladé, \"Les deux Moines\", se passe au château de Rouillac qui était en contact visuel avec le château de Sainte-Mère.","architecture":"Edifice  de Rouillac typiquement gascon, construit pour Bertrand de Goth, vicomté de Lomagne, de 1311 à 1323; remanié et agrandi au XVIIIe siècle. Aujourdhui il fait partie dun ensemble de bâtiments habités à usage agricole. Il se compose d'un corps de logis principal rectangulaire flanqué de deux tours carrées alignées sur la façade, le corps principal tour crénelée flanquée sur l'angle Sud d'une tour polygonale contenant un escalier à vis en pierre ; la pièce au  rez-de-chaussée est voûtée en berceau,  Aile  en rez-de-chaussée rajoutée du XVIIIe siècle.\r\nun  pigeonnier polygonal sur colonnes.","habitants":"Vicomte Bertrand de Goth\r\n        \r\n        \"","divers":"Château de Rouillac à Gimbréde","gps":"","images":["../image/image_32/32_Rouillac_1.jpg","../image/image_32/32_Rouillac_2.jpg","../image/image_32/32_Rouillac_3.jpg","../image/image_32/32_Rouillac_4.jpg","../image/image_32/32_Rouillac_5.jpg","../image/image_32/32_Rouillac_6.jpg","../image/image_32/32_Rouillac_7.jpg"]},"Consult_chateau_formulairecff4":{"id":"Consult_chateau_formulairecff4","dept":"32","canton":"Auch","commune":"Mirepoix","nom":"Réveillon_Gers","type":"Château","periode":"XVI","histoire":"REVEILLON, fut construit entre 1607 et 1617 par Claude dAncienville, seigneur de Réveillon, à la place dun château médiéval du XIIIe siècle, ruiné par les guerres de cent ans et de religions.  Jean Galland de 1642  à 1672 . En 1663 Jean Galland fait planter lallée de Retourneloup.   En 1719, le château passe aux mains de René-Louis Le Voyer de Paulmy, marquis dArgenson, qui sera ministre des affaires étrangères de Louis XV. Celui-ci entreprit de grosses transformations architecturales à Réveillon. Il changea tout dabord la forme du toit quil éclaira par des lucarnes. Il transforma également les fenêtres.  Le château fut acquis par Jules-Robert de Cotte, architecte du roi Louis XV.  Sa petite-fille revendit le domaine en 1809 au général Haber. Les Haber Colle en furent propriétaires jusquen 1947. Au tournant des XIXe et XXe siècles, le château était la résidence dété de  Madeleine Lemaire, surnommée par Anatole France « limpératrice des Roses ». Madeleine qui tenait un salon littéraire réputé à Paris, recevait tout ce que cette époque comptait dartistes, écrivains et intellectuels. Le jeune Marcel Proust fréquenta le salon parisien de madame Lemaire. Celle-ci se lia damitié avec ce jeune écrivain, lencouragea à lécriture et linvita en 1894 et 1895 à Réveillon. Il y entreprit lécriture de son premier roman dessai « Les Plaisirs et les jours »  dans lequel il décrit les marronniers du jardin à la française de la propriété de son hôte. Madeleine Lemaire illustra de gravures cette première uvre.","architecture":"Le château, de style Louis XIII, se compose dun corps en fond de cour, de deux ailes au nord et au sud, qui se terminent par une tour à chaque  angles. Les douves semi-sèches sont drainées par un fossé captant les eaux de la fontaine Saint-Fiacre.\r\nRéveillon fut construit pour être une résidence de campagne. Il changea très régulièrement de propriétaires tout au long des XVIIe et XVIIIe siècles. Si la composition générale du château est celle de larchitecture de la première moitié du XVIIe siècle, le décor intérieur est de style Louis XIV. Réveillon fut le quartier général dun haut fait darmes le 13 juin 1940. Le 58 ème régiment dartillerie commandé par le colonel Rousset, perdit la moitié de ses hommes en interdisant vingt quatre heures le franchissement du Grand Morin à une division Panzer en marche vers Paris. Au siècle dernier, le château fut laissé presque quatre vingts ans sans entretien. Depuis 1992 les propriétaires actuels ont entamés une restauration denvergure destinée à rendre son lustre dantan au château.","habitants":"Famille de Claude dAncienville\r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Réveillon à Mirepoix","gps":"","images":["../image/image_32/32_Reveillon_Gers_1.jpg","../image/image_32/32_Reveillon_Gers_2.jpg","../image/image_32/32_Reveillon_Gers_3.jpg","../image/image_32/32_Reveillon_Gers_4.jpg","../image/image_32/32_Reveillon_Gers_5.jpg"]},"Consult_chateau_formulaire28f4":{"id":"Consult_chateau_formulaire28f4","dept":"32","canton":"Adour Gersoise","commune":"Sabazan","nom":"Sabazan","type":"Château","periode":"XVI","histoire":"SABAZAN ,  Pas moins de huit familles différentes s'y sont succéder depuis la fin du XIIIe siècle, où les Sabazan le possédaient encore, jusqu'à la Révolution sans que l'on puisse attribuer avec certitude sa construction à l'une d'entre-elles. le premier personnage connu au milieu du XIIe siècle est Raymond-Guillaume de Sabazan, seigneur  et co-seigneur de Montesquiou. Il abandonne ses biens au chapitre de la cathédrale d'Auch.  En 1339, Arnaud de Sabazan participe aux guerres de cent ans. Sabazan est alors le siège d'un archiprêtré. En 1649, l'archevêque d'Auch, Dominique de Vic, érigea en archiprêtré l'église d'Aignan en enlevant six paroisses à celui de Sabazan (Aignan, Lupiac, Séailles, Meymes, Aubezies et Castelnavet). Parmi les seigneurs de Sabazan figurent de nombreux membres de la famille de Montesquiou. Le roi Henri IV a été seigneur de Sabazan en tant que comte d'Armagnac par héritage et après avoir confisqué la seigneurie de Sabazan en 1595. On cite, pour le 7 septembre 1672, l'enterrement de Jeanne Darrieux, enfant de cinq ans, fille de cagots. Un arrêt du parlement de Toulouse pris en 1700 avait cité la présence de cinq cagots dans la paroisse de Sabazan.\r\nLe site seigneurial était protégé par trois fossés, à l'est, à l'ouest et au midi. La tour et l'église se trouvaient au nord. Ce site a été abandonné quand le château a été transformé au XVIe siècle.","architecture":"Sabazan,  son corps de logis carrés  aux angles cantonnés de tours rondes, sous son haut  comble à quatre versants de tuiles plates, évoque assez bien l'art de bâtir du XVIe siècle. Le site seigneurial était protégé par trois fossés, à l'est, à l'ouest et au midi. La tour et l'église se trouvaient au nord. Au XVIe siècle, le château fort subit des aménagements pour être transformé en gentilhommière. L'édifice a conservé son allure féodale avec, sur la façade nord, les restes d'un ancien pont-levis, ainsi que les quatre tours d'angle et leurs arquebusiers. Par la suite, les façades perdirent cet aspect austère pour être percées de fenêtres éclairant largement les pièces. Au XIXe siècle, le sous-sol fut aménagé en cave, un autre rez-de-chaussée fut créé et les fenêtres à meneaux supprimées au premier étage. A l'est, les communs sont isolés du château proprement dit. Cette construction est caractéristique des petits châteaux du Gers.","habitants":"Famille de Montesquiou\r\n        \r\n        \"","divers":"Château de Sébazan","gps":"","images":["../image/image_32/32_Sabazan_1.jpg","../image/image_32/32_Sabazan_2.jpg","../image/image_32/32_Sabazan_3.jpg","../image/image_32/32_Sabazan_4.jpg"]},"Consult_chateau_formulaireb145":{"id":"Consult_chateau_formulaireb145","dept":"32","canton":"Gd-Bas Armagnac","commune":"Salles-Armagnac","nom":"Salles_Armagnac","type":"Gentilhommière","periode":"XVIII","histoire":"SALLES, les bâtiments entourant la gentilhommière datent du XVIIIe siècle. Les chais semi-enterrés, que l'on visite, sont uniques dans la région. Ce domaine familial situé au coeur du bas armagnac perpétue la tradition de la distillation et de l'élevage de millésimes régulièrement primés.  Benoît et Dominique Hébert, propriétaires du domaine, travaillent les cépages plantés ici depuis plusieurs générations et menant à la fabrication de flocs de Gascogne et de bas armagnacs millésimés régulièrement primés. Dominique et Benoît Hébert, viticulteurs passionnés, vous accueillent dans leur domaine du XVIIIe siècle composé dune gentilhommière, entourée par des bâtiments sur 3 côtés. Ils vous invitent à y visiter leur chai de vieillissement semi-enterré, particularité unique sur  leur territoire. En contre-bas, au bord dun lac, La famille possède ce domaine depuis trois générations","architecture":"La construction actuelle date du début du XVIIIe siècle. Mais avant celle-ci, il existait  ce quon appelle dans le grand sud-ouest, une  tour salle, désignant la maison forte du vassal dun seigneur local, construction réservée au aîné dune famille. En fait une ferme fortifiée, plus quun château fort. Au XVIIIe siècle, ce terme est peu à peu remplacé par le mot château. Cest ce que lon constate sur les différents cadastres. Le nom de notre village en découle.  Au XIXe siècle, le poète et député Alphonse de Lamartine vint y séjourner. La tombe du précédent propriétaire, élu député le 13 mai 1849, en même temps que Lamartine, est gravée dun extrait de lettre que celui-ci lui avait adressé.","habitants":"Famille Hebert\r\n        \r\n        \r\n        \"","divers":"Château de Salles d'Armagnac","gps":"","images":["../image/image_32/32_Salles_Armagnac_1.jpg","../image/image_32/32_Salles_Armagnac_2.jpg"]},"Consult_chateau_formulaire3f82":{"id":"Consult_chateau_formulaire3f82","dept":"32","canton":"Samatan","commune":"Samatan","nom":"Samatan","type":"Château","periode":"XVII","histoire":"Deux châteaux à Samatan celui de Latour et de Bérézil  à quelques kilomètres au Nord-ouest                                          LATOUR construit en 1697 par François de Pélegrin, gouverneur de Samatan, On doit la construction du château en 1697 à un membre de la famille Pélegrin, gouverneur de Samatan. Acquis par la famille Belloc, membres du parlement de Toulouse, il est transformé dans le style Louis XVI. La chapelle de 1709 sera reconstruite en 1733. En 1872-1873, aménagement du parc ; des améliorations du château permettent des conditions de vie, demeure ancestrale d'Alain d'Antin de Vaillac,   lui-même héritier du château en 1987, il veillera à en poursuivre la restauration pendant ces douze dernières années, avec une forte implication de son épouse.","architecture":"Château Latour  construit en 1697 par François de Pélegrin.  Au cours de la Révolution, le château fut entièrement pillé. En 1872-1873, le parc fut aménagé et le château subit des améliorations permettant des conditions de vie plus agréables. L'édifice présente une disposition traditionnelle avec deux ailes en retour délimitant une cour. La façade nord est cantonnée de deux tours. La cour d'honneur est fermée au sud par un bâtiment en rez-de-chaussée, au centre duquel est ménagé un portail.  La chapelle est élevée en 1709, puis reconstruite en 1733.  \r\nEléments protégés MH : façades et toitures, la grille d'entrée, l'escalier intérieur avec sa rampe en fer forgé.","habitants":"Famille de François de Pélegrin\r\n        \r\n        \"","divers":"Château de Latour à Samatan","gps":"","images":["../image/image_32/32_Samatan_1.jpg","../image/image_32/32_Samatan_2.jpg","../image/image_32/32_Samatan_3.jpg","../image/image_32/32_Samatan_4.jpg"]},"Consult_chateau_formulaire0d26":{"id":"Consult_chateau_formulaire0d26","dept":"32","canton":"Mirande","commune":"Saint-Justin","nom":"Samazan","type":"Château","periode":"XVI","histoire":"SAMAZAN, il y avait au XIe siècle et  au XIVe siècle, une abbaye qui fut changée en prévôté.  Jusquen 1685 le château et son domaine était la propriété de la famille dAntras. En 1685, noble Emanuel de Monlezun était le seigneur de Samazan Ricourt, et le nouveau propriétaire noble Henri-Robert, comte de Villemur, marquis de Pailhez et se signant haut et puissant seigneur de Samazan, vivait encore du temps du vicariat de M. labbé Daignan-Belloc dans le dix huitième siècle,en 1776, et lui succéda comme propriétaire. Lille née Toujouze propriétaire jusquen 1906,  la famille Lahens propriétaire jusquen 1979, la famille Fontan  jusquen 1993 et depuis cette date, Mr Magnin de La Cornière Jacques-Henri est le propriétaire du château de Samazan.","architecture":"Le château de Samazan du XVIe siècle, tour et tourelles rondes composé dun rez de chaussée et dun étage, dun large escalier en pierre tournant en limaçon, divisé en bas et en haut en de grandes salles, flanqué à ses quatre angles de tour à créneaux  rasé au niveau du bas de la toiture pendant la révolution en 1789, jadis entouré de fossés et montrait encore quelque vestige de vitrage à plomb, quelque de ses grandes escobelles et de ses anciennes tables, démontre sa propre antiquité et combien il remonte dans le moyen âge. Depuis les années 1980 le château est restauré par les propriétaires successifs.","habitants":"Famille dAntras\r\n        \r\n        \"","divers":"Château de Samazan","gps":"","images":["../image/image_32/32_Samazan_1.jpg","../image/image_32/32_Samazan_2.jpg","../image/image_32/32_Samazan_3.jpg"]},"Consult_chateau_formulairecefc":{"id":"Consult_chateau_formulairecefc","dept":"32","canton":"Saramon","commune":"Saramon-Lartigue","nom":"Saramon_Lagouarde","type":"Vestiges-Château","periode":"XIII","histoire":"SARAMON, en 2004 la fondation Köck a acquis le château du Karabé à Saramon. Un des objectifs de la fondation est de promouvoir la culture et plus particulièrement la musique classique en direction de nouveaux publics.","architecture":"Saramon, le village  a été fondé auprès de l'abbaye du même nom  au début du XIIe siècle. Il a ensuite connu plusieurs agrandissements à la fin du Moyen-Age. De toutes les formes urbaines gasconnes, la bourgade est peut-être celle qui offre le caractère le plus identitaire du terroir.                                                                  LAGOUARDE à 4 km  de Saramon, au XIIIe siècle, une fortification est  construite sur la colline, au XXIe siècle, la découverte de l'extérieur est possible de loin depuis le sentier de randonnée ou la route en contrebas. La propriété privée est interdite à la visite.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Château de Krabé de Lartigues et de Pontéjac à Saramon","gps":"","images":["../image/image_32/32_Saramon_Lagouarde_1.jpg","../image/image_32/32_Saramon_Lagouarde_2.jpg","../image/image_32/32_Saramon_Lagouarde_3.jpg","../image/image_32/32_Saramon_Lagouarde_4.jpg"]},"Consult_chateau_formulaire49fb-2":{"id":"Consult_chateau_formulaire49fb-2","dept":"32","canton":"Gimone-Arrats","commune":"Sarrant","nom":"Sarrant","type":"Bastide","periode":"XV","histoire":"SARRANT, au XVe siècle, trois châteaux existent dans la juridiction. Le château de Savailhan, appartient à la famille de Mauléon. Denis de Mauléon est un fidèle compagnon d'armes et ami d'Henri de Navarre. Le château de Reychac, aujourd'hui disparu,  le château de Cédailh, tout proche du village, est habité par Jean de Cédailh, bourgeois et marchand de Beaumont-de-Lomagne.  Pendant les guerres de religion, la communauté subit attaques et pillages. En 1590, Sarrant est occupé, sa tour endommagée. La ville est libérée contre une importante rançon, payée en mettant en gage l'argenterie de l'église, ce qui a évité sa destruction.  Le XVIIe siècle est marqué par la terrible épidémie de peste de 1628-1631 qui fera une centaine de morts dans la paroisse. Pendant la période de la Révolution, la communauté est victime de brigandages et incendies des gerbiers, des patrouilles armées sont mises en place. À partir de 1793, Sarrant deviendra un foyer de contre révolution, la population se révolte contre les abus du pouvoir républicain et entre en résistance en dissimulant les prêtres réfractaires qui célèbrent des messes clandestines dans les hameaux.","architecture":"A 35 km dAuch, en terre gasconne, Sarrant, est une bastide. Vu du ciel, Sarrant ressemble à une coquille descargot fermement enroulée autour de son église du XVe siècle. Une porte fortifiée du XIVe siècle commande laccès aux ruelles. Classé parmi les  plus beaux villages de France, Sarrant demeure ancré dans sa culture médiévale. Une fois la porte ogivale franchi, les petites ruelles et leurs habitations, son église Saint-Vincent et son jardin vous plongent dans une ambiance médiévale des plus dépaysantes. Sarrant ne manque pas datouts pour vous offrir un moment de détente lors dune escapade durant votre séjour.","habitants":"Famille de Mauléon\r\n        \r\n        \"","divers":"Porte de la ville et la maison jaune à Sarrant","gps":"","images":["../image/image_32/32_Sarrant_1.jpg","../image/image_32/32_Sarrant_2.jpg"]},"Consult_chateau_formulaire2cb5":{"id":"Consult_chateau_formulaire2cb5","dept":"32","canton":"Val de Save","commune":"Sauveterre","nom":"Sauveterre_Gers","type":"Château","periode":"XVI","histoire":"SAUVETERRE, c'est en ce lieu, qu'à l'époque de la féodalité, était érigé un château fort dont les derniers vestiges, un pan de mur, ont été démolis il y a quelques années. Le château actuel est construit, au XVIe siècle par la famille Auxillon. Les propriétaires actuels sont toujours les descendants de ces fondateurs. Cette famille venue de Picardie, doit son installation à un chevalier qui se distingue à la bataille de Bouvines en 1214, avant de se croiser et guerroyer avec Simon de Montfort et se voit octroyer un fief. Les propriétaires du château  ruinés vendent le site en l'état  à la famille Auxillon en 1452. On ne sait s'il était sur le même lieu que le castrum incendié deux siècles plus tôt. Sa ruine est en partie due à la guerre de cent ans qui fait des ravages dans le coin, au point qu'il ne reste que trois feux en 1407 dans le village. Autrefois, ce terrain appartenait à la famille de Rességuier.","architecture":"Le château est à nouveau abîmé durant les guerres de religion, puis durant la Révolution, lorsque les propriétaires émigrent. Le château, confisqué et pillé, est rendu aux propriétaires lors de la Restauration. De très importants travaux sont exécutés entre 1818 et 1825, sous la direction de l'architecte Bernard Charles.   Le bâtiment principal de quarante mètres date de la Renaissance, mais façades et aménagement intérieur ont été remaniés : un escalier néoclassique et des peintures en trompe-lil. Deux tours encadrent la façade côté extérieur et une petite tour du château ancien a été transformée en pigeonnier dans le parc. Une corniche crénelée soutient la toiture. L'ancienne chapelle du château qui lui est adossée est devenue l'église paroissiale Sainte-Croix de Sauveterre. Elle conserve un accès avec le château et abrite des sépultures de nombreux membres de la famille Auxillon.","habitants":"Famille Auxillon\r\n        \r\n        \"","divers":"Château de Sauveterre","gps":"","images":["../image/image_32/32_Sauveterre_Gers_1.jpg","../image/image_32/32_Sauveterre_Gers_2.jpg"]},"Consult_chateau_formulaire0e03-2":{"id":"Consult_chateau_formulaire0e03-2","dept":"32","canton":"Val de Save","commune":"Savignac-Mona","nom":"Savignac_Mona","type":"Château","periode":"XV","histoire":"Plusieurs châteaux à Savignac-Mona.  La seigneurie passe aux Lambès-Savignac, une puissante famille qui a joué un grand rôle dans la région. Arnaud-Guilham de Lambès-Savignac a ses deux frères tués à la Saint-Barthélemy de Toulouse (1572). Cest lui qui a dû édifier le château sur plan carré entre 1540 et 1580.","architecture":"Un château existait depuis en 1540, et en 1668, est mentionné un château de briques, quadrilatère cantonné par quatre tours  dépassent de peu de hauteur le toit, entouré de fossés. En 1760, est abattu le quatrième côté qui servait de mur de clôture. A cette époque, le bâtiment devait avoir le même plan que l'édifice actuel,  ce château a sans doute été repris au début du XVIIe siècle, dans la seconde campagne de travaux. Le plan a été conservé, mais le logis central a été élevé et les percements changés. En 1880, ajout du baldaquin qui couvre le perron par l'architecte Rocher. L'édifice est entièrement construit en briques, inscrit à linventaire supplémentaire en 1976.","habitants":"Arnaud-Guilham de Lambès-Savignac \r\n        \r\n        \"","divers":"Château de Savignac-Mona et de Lahillare à Montblac","gps":"","images":["../image/image_32/32_Savignac_Mona_1.jpg","../image/image_32/32_Savignac_Mona_2.jpg","../image/image_32/32_Savignac_Mona_3.jpg","../image/image_32/32_Savignac_Mona_4.jpg","../image/image_32/32_Savignac_Mona_5.jpg","../image/image_32/32_Savignac_Mona_6.jpg"]},"Consult_chateau_formulaire68c6":{"id":"Consult_chateau_formulaire68c6","dept":"32","canton":"Astarac-Gimone","commune":"Seissan","nom":"Seissan","type":"Château","periode":"XII","histoire":"plusieurs  châteaux à Seissan celui des abbés de Faget et celui de Garanée et dArtiguedieu.\r\nLe château du Garranée date du XIe, 4e quart du XIIIe, du 1er quart du XIVe siècle et du XVe siècle, et  le château de Lasplagnes                                                                                 SEISSAN, de nombreux vestiges découverts au lieu-dit le Gleyzia, sur la rive droite du Gers, attestent une présence gallo-romaine.\r\nLancien Seissan a disparu, mais un castelnau a vu le jour au XIIe siècle,   dont dépendait la bastide, sur la rive gauche du Gers, autour dun château, dont il ne reste que la tour, érigé par les abbés de Faget-Abbatial, propriétaires de la ville de Seissan. La bastide est fondée en 1266, par le comte Bernard IV d'Astarac, en paréage avec labbé Bernard II, représentant labbaye de Faget-Abbatial. La bastide, aménagée autour du château, reçoit une charte de coutumes en 1288 mais se développa peu par la suite.\r\nVers 1775, l'aménagement de la nouvelle route menant d'Auch vers le sud dans la vallée d'Aure modifie profondément la structure de Seissan qui s'agrandit alors le long de ce nouvel axe.                    Le château du Garranée est classé aux M.H. depuis 1978.","architecture":"Seissan,  au XIIe siècle, les abbés de Faget sont les \"seigneurs\" du lieu. En 1266, signent un paréage avec le comte d'Astarac : Bernard II. Celui-ci doit assurer la défense des villageois. A la fin de XIIIe siècle, un château est construit.   Il ne reste qu'une tour du château de Seissan. Cette tour constitue le reste principal du château qui était déjà en ruine, en partie, avant la Révolution. La tour est de forme carrée. Primitivement, le rez-de-chaussée ne devait comporter aucune ouverture autre que la petite baie du mur sud. Il est voûté en berceau avec une trappe carrée. Du premier étage, un escalier mène au second. Le château de Seissan est un ouvrage caractéristique de l'architecture militaire médiévale des environs d'Auch.\r\nGarranée, situé sur l'emplacement d'un château plus ancien dont il subsiste une tour carrée comprenant la chapelle du XIe siècle, l'ensemble du bâtiment actuel fut reconstruit au XIVe siècle et comporte, en façade ou à l'intérieur, quelques éléments datant d'un réaménagement au XVe siècle. Au XVIIIe siècle, la famille des Luppé s'étant installée à Besmaux, le château fut utilisé comme simple métairie et tomba dans l'abandon, faute d'entretien. Le bâtiment actuel présente un plan rectangulaire. L'angle sud-ouest est constitué par une tour dont la partie la plus ancienne remonte au XIIe siècle. L'extrémité Est du château, comprenant l'escalier à vis, s'est partiellement écroulée en 1870.                                                   Artiguedieu édifice rectangulaire a trois niveaux, fenêtres à meneaux.","habitants":"Abbés de Faget-Abbatial\r\n        \r\n        \"","divers":"Château de Garrané et vestiges du château de Seissanet de  d'Artiguedieu","gps":"","images":["../image/image_32/32_Seissan_1.jpg","../image/image_32/32_Seissan_2.jpg","../image/image_32/32_Seissan_3.jpg","../image/image_32/32_Seissan_4.jpg","../image/image_32/32_Seissan_5.jpg","../image/image_32/32_Seissan_6.jpg"]},"Consult_chateau_formulaireefb6":{"id":"Consult_chateau_formulaireefb6","dept":"32","canton":"Lectoure","commune":"Sempesserre","nom":"Sempesserre","type":"Château","periode":"XVI","histoire":"Deux châteaux à Sempesserre, celui de Sempesserre et des Martres pas d'information pour ces deux châteaux.","architecture":"Sempessere, la tour, qui seule subsiste, date de la 2e moitié du XVIe siècle ou de la 1ère moitié du XVIIe siècle. Le système défensif de Sempesserre était constitué d'une enceinte doublée d'un fossé. L'accès au village se faisait par deux portes situées aux extrémités Est et ouest de la rue principale et commandées chacune par une demeure seigneuriale. Les fossés étaient encore en partie visibles au XIXe siècle. Ils ont été comblés depuis. Il subsiste quelques vestiges de l'enceinte attribuables à la fin du XIIIe ou au début du XIVe siècle. Certaines parties de la fortification, notamment dans l'angle nord-est, ont pu être remontées au moment de la guerre de cent ans.","habitants":"seigneurs locaux\r\n        \r\n        \"","divers":"Château de Semperresse","gps":"","images":["../image/image_32/32_Sempesserre_1.jpg","../image/image_32/32_Sempesserre_2.jpg","../image/image_32/32_Sempesserre_3.jpg","../image/image_32/32_Sempesserre_4.jpg","../image/image_32/32_Sempesserre_5.jpg"]},"Consult_chateau_formulaireb63f":{"id":"Consult_chateau_formulaireb63f","dept":"32","canton":"Valde Save","commune":"Simorre","nom":"Simorre_Monbardon","type":"Abbaye","periode":"XIV","histoire":"SIMORRE, dominant du haut de ses tours et créneaux, le joli village de Simorre et le pays d'Astarac, l'église abbatiale Notre-Dame fut édifiée au XIVe siècle, puis remaniée par Viollet-le-Duc au XIXe siècle. Agrémenté d'une tour-lanterne octogonale, ce bel édifice en brique, aux allures de forteresse, abrite des verrières des XIVe et XVe siècles, des stalles sculptées du XVe siècle, ainsi que, dans la sacristie, des peintures murales du XIVe siècle.\r\nAutour de l'église fortifiée, rues et places pittoresques, bordées de maisons à colombages et à encorbellements, se succèdent au gré de la promenade.                                                                     MONBARDON château à la limite du dépatement à 10 kilomètre au sud de Simorre pas d'information historique dommage qu'il soit à l'abandon.                                                                        PELLEFIGUE, est remarquable par létendue et lancienneté de ses bâtiments et sa position sur un plateau élevé.","architecture":"L'abbaye, attestée dès 817, a été construite au VIe siècle sur l'emplacement d'un ancien oratoire élevé au Ve siècle par Saint-Cerats dont le tombeau se trouve dans la chapelle de Saintes. L'abbaye fut ravagée par les Sarrasins et par les Normands.  Fortifiée aux XIIe et XIVe siècles pour servir de refuge, remaniée au XIXe, labbatiale est unique en son genre. Aujourd'hui, village avec sa vieille halle centrale, ses maisons à colombages et à encorbellements, son foirail et ses placettes ombragées qui invitent à la visite, Simorre surprend et émerveille. La nef n'a que deux travées et demi, terminée par un mur de pierre. La quasi totalité de l'édifice est en brique rose. Dans le sacraire, qui sert actuellement de sacristie, ont été, lors de travaux de restauration, découvertes en 1964 de très belles peintures murales du XIVe siècle . On peut aujourd'hui y admirer de nombreux objets du culte, simples ou fastueux du XVIIe, XVIIIe siècle.\r\n4 statues sont à admirer : piéta en bois du début VIIIe, piéta en pierre du VIIe, la statue de St Cérats du XVe et une croix de procession du XIVe siècle. Au XIXe siècle, Violet le Duc entreprend la restauration de l'édifice modifiant son aspect extérieur qui s'est transformé en église fortifiée. Des visites guidées sont proposées pendant la saison estivale.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Eglise fortifiée à Simorre, le château de Monbardon et de Pellefigue","gps":"","images":["../image/image_32/32_Simorre_Monbardon_1.jpg","../image/image_32/32_Simorre_Monbardon_2.jpg","../image/image_32/32_Simorre_Monbardon_3.jpg","../image/image_32/32_Simorre_Monbardon_4.jpg","../image/image_32/32_Simorre_Monbardon_5.jpg","../image/image_32/32_Simorre_Monbardon_6.jpg","../image/image_32/32_Simorre_Monbardon_7.jpg","../image/image_32/32_Simorre_Monbardon_8.jpg","../image/image_32/32_Simorre_Monbardon_9.jpg"]},"Consult_chateau_formulaire3acc":{"id":"Consult_chateau_formulaire3acc","dept":"32","canton":"Lectoure","commune":"Saint-Antoine-sur-l","nom":"St_Antoine_Arrats","type":"Commanderie","periode":"XII","histoire":"St-ANTOINE,  Saint-Antoine tient son nom des religieux Antonins qui s'y installèrent en 1204 à la suite d'un legs fait par Gaillard d'Ascot, mort en pèlerinage. Ils y vécurent jusqu'en 1777.\r\nDe leur hôpital, ils surveillaient le pont et le moulin sur l'Arrats derrière lequel un pont-barrage, qui a perdu une travée, était emprunté par les pèlerins pour traverser.","architecture":"La commanderie de Saint-Antoine inscrite au titre des monuments historiques en 19729. La commanderie de Saint-Antoine a dû être une des premières annexes dépendant de celle de Toulouse. Elle a été installée sur la route reliant Agen à Lectoure. Un hôpital y est fondé ainsi qu'une chapelle. Le pape Pie VI supprime l'ordre des Antonins en 1776 et transfère ses biens aux chevaliers de l'ordre de Saint-Jean de Jérusalem en 1777. Les biens sont saisis à la Révolution et l'hôpital disparaît.\r\nLa porte fortifiée nord datant probablement de la fin du XIIIe siècle.","habitants":"Gaillard d'Ascot\r\n        \r\n        \"","divers":"Château de Saint-Antoine et sa porte","gps":"","images":["../image/image_32/32_St_Antoine_Arrats_1.jpg","../image/image_32/32_St_Antoine_Arrats_2.jpg","../image/image_32/32_St_Antoine_Arrats_3.jpg","../image/image_32/32_St_Antoine_Arrats_4.jpg"]},"Consult_chateau_formulairea118":{"id":"Consult_chateau_formulairea118","dept":"32","canton":"Fezensac","commune":"Saint-Arailles","nom":"St_Arailles","type":"Vestiges","periode":"XIV","histoire":"Saint-ARAILLES   les châteaux de Saint-Arailles, Castrum de Sancta Raylha et de Saint-Jean d'Anglès Sancto Johanne.   En 1901, un trésor de 381 pièces d'or du XIVe siècle, enfermées dans un pot de grès, a été découvert par Honoré Dupouy dans son champ au pied du village. Son origine est inconnue mais les pièces, pour l'essentiel étrangères, semblent avoir été enterrées par un hôte de passage plutôt que par un habitant du village. Le parlement de Toulouse attribue, en 1479, le fief à la fille d'Arsieu de Montesquiou. Il passera ensuite de mains en mains, par mariage ou à la suite de ventes. Les derniers seigneurs de Saint-Arailles, issus de la famille Saint-Lary, portent le titre de comtes de Comminges, un puits de l'ancien château porte d'ailleurs l'inscription comte de Comminges, à la suite d'une alliance, en 1730, avec Jeanne-Françoise de Gaillon, seigneuresse de Saint-Arailles et Bianne. J.-F. de Caillon épouse de Messire Bernard de Commenge seigneur de St-Lary, capitaine au régiment de Veyne-dragon fit son testament le 22 janvier 1735, son mari étant à l'armée d'Italie. Il fut ouvert le 24 décembre 1750. Elle nomme héritier son fils unique Joseph-Marie. Son fils, Marie-Joseph de Comminges, n'a pas été inquiété au moment de la Révolution. Il meurt sans postérité en 1807. Son demi-frère, le baron de Comminges, hérite alors des propriétés de Saint-Arailles. Il y meurt, en son château, le 31 décembre 1835. En 1847, les terres sont vendues, ainsi que le château qui avait subi, au cours du XVIIIe siècle, de nombreuses transformations, a appartenu à la famille de Barry jusqu'à la fin du XXe siècle.","architecture":"e château de Saint-Arailles dit le castet, actuellement propriété privée, est à l'origine une maison-forte flanquée d'échauguettes, dont une subsiste encore. Les parties les plus anciennes remontent au XIIIe siècle. Le château a été modifié dans la deuxième moitié du XVIIIe siècle pour lui donner l'aspect d'une chartreuse en créant une vaste terrasse qui domine les alentours. Vendu par lots vers 1845, le bâtiment n'a retrouvé que récemment son unité. Les parties les plus anciennes remontent au XIIIe siècle. Son château, fortement restauré. Le pigeonnier du XIXe siècle à six arceaux est remarquable.  Deux tours-portes, ou  porches, permettent laccès au village, lune à lest qui a perdu sa pièce haute, un pigeonnier, et lautre à louest dont la construction comporte encore un étage percé de deux archères, sorte de meurtrières pour tirer à larc ou à larbalète.","habitants":"Famille  Saint-Lary\r\n        \r\n        \"","divers":"Château de Saint-Arailles","gps":"","images":["../image/image_32/32_St_Arailles_1.jpg","../image/image_32/32_St_Arailles_2.jpg","../image/image_32/32_St_Arailles_3.jpg","../image/image_32/32_St_Arailles_4.jpg"]},"Consult_chateau_formulairefe9a":{"id":"Consult_chateau_formulairefe9a","dept":"32","canton":"Astarac-Gimone","commune":"Saint-Blancard","nom":"St_Blancard","type":"Forteresse","periode":"XIII-XIX","histoire":"ST-BLANCARD, Un château existait au XIIIe siècle. En 1303, un accord est signé entre les habitants du village et Pierre d'Orbessan pour la construction d'un nouveau château, érigé du XIVe siècle. Le propriétaire était la famille de Gontaut Biron. Le maréchal de Biron, décapité pour avoir conspiré contre Henri IV après l'avoir servi, y vit le jour en 1562. En 1559 aux comtes de Comminges et des Ornezan se sont maintenus jusqu'en 1959 , Il fut érigé du XIVe siècle au XIXe siècle.  En 1959, Armand de Gontaut Biron vend le château qui est par la suite transformé en maison de repos et de convalescence.   Depuis 1990, le château est la propriété d'une société anonyme, dont le président  Andrew Harding.  Au cours de la seconde guerre mondiale, le château de Saint-Blancard joue un rôle important, grâce à l'ingéniosité de Jacques Jaujard et de Christiane Desroches Noblecourt, dans la préservation des uvres du département des antiquités égyptiennes. Le 22 octobre 2000, une association se crée pour la défense du château et de son parc, laissé à l'abandon depuis quelques années par la société britannique qui l'a racheté.","architecture":"Le château de Saint-Blancard, existait au XIIIe siècle. Des maçonneries sont réalisées au XIVe siècle. Des percements sont réalisés au XVIe siècle date des XIVe et XVIe siècles. Il fut reconstruit au XIXe après un incendie. Des fouilles réalisées en 1889, ont montré une occupation du site depuis l'Antiquité et pendant toute la période médiévale. Un château existait au XIIIe siècle.  Le bâtiment a conservé l'essentiel des maçonneries du XIVe siècle. Percements du XVIe siècle. Au XIXe siècle, création d'un donjon à l'ouest et réalisation de décors intérieurs néo-gothiques après un incendie en 1888. Ainsi les murailles ouest et sud ont été abattues pour dégager la vue sur les Pyrénées. La serre et les communs ont été construits à la fin du XIXe siècle. La dernière portion d'enceinte, copie de la seconde enceinte de Carcassonne, date de 1926.\r\nEléments protégés MH: les façades et les toitures avec au rez-de-chaussée la grande salle, la chambre de Marguerite de Navarre, la salle à manger, l'escalier en bois néo-gothique, les pièces décorées du donjon avec leurs cheminées, la cour. Les façades et les toitures des dépendances et de la serre.","habitants":"Famille de Gontaut Biron.\r\n        \r\n        \"","divers":"Forterresse de Saint-Blancard","gps":"","images":["../image/image_32/32_St_Blancard_1.jpg","../image/image_32/32_St_Blancard_2.jpg","../image/image_32/32_St_Blancard_3.jpg","../image/image_32/32_St_Blancard_4.jpg","../image/image_32/32_St_Blancard_5.jpg","../image/image_32/32_St_Blancard_6.jpg","../image/image_32/32_St_Blancard_7.jpg","../image/image_32/32_St_Blancard_8.jpg","../image/image_32/32_St_Blancard_9.jpg"]},"Consult_chateau_formulaire2d0d":{"id":"Consult_chateau_formulaire2d0d","dept":"32","canton":"Fleurance","commune":"Saint-Clar","nom":"St_Clar","type":"Château","periode":"XVII","histoire":"ST-CLAR,   fut remaniée au XIVe siècle. Il faut y admirer les neuf enfeus sur les murs gouttereaux, désaffectée au XIXe siècle. La bastide neuve : ce quartier correspond à la bastide qui fut fondée en 1289 à la suite d'un paréage entre Géraud de Monlezun, évêque de Lectoure, seigneur de Saint-Clar et le duc d'Aquitaine, roi d'Angleterre.\r\nSaint-Clar est une des rares bastides du Gers à avoir deux places à cornières.","architecture":"Le quartier du château-Vieux : ce quartier prend aussi le nom de Castel Bielh. C'est le noyau primitif et historique. Les habitations se regroupent autour du château comtal et de l'église. Les rues sont étroites. Les maisons sont basses et à colombage. L'ancienne église daterait du XIIe siècle. Le quadrillage se compose de trois rues orientées nord-sud et de trois est-ouest. Dans un ilot non attribué, s'est élevée la halle avec tout autour des galeries couvertes ou garlandes. C'est là que se tenaient les marchands de la ville.\r\n La bastide vieille : ce quartier correspond à une bastide située au nord de Saint-Clar qui fut lotie dès le Moyen Âge. Toutefois,les constructions visibles à l'heure actuelle ne datent que du XIXe siècle. À son extrémité, on a une belle vue sur la vallée de l'Arrats.\r\n Le faubourg ou le barry : ce quartier se développe le long de l'axe conduisant à Fleurance.\r\nSaint-Clar est une des rares bastides du Gers à avoir deux places à cornières.","habitants":"Geraud de Monlezun\r\n        \r\n        \"","divers":"Château de Saint-Clar","gps":"","images":["../image/image_32/32_St_Clar_1.jpg","../image/image_32/32_St_Clar_2.jpg","../image/image_32/32_St_Clar_3.jpg","../image/image_32/32_St_Clar_4.jpg"]},"Consult_chateau_formulaire2a64":{"id":"Consult_chateau_formulaire2a64","dept":"32","canton":"Gimone-Arrats","commune":"Saint-Cricq-Auch","nom":"St_Cricq","type":"Château","periode":"XV","histoire":"ST-CRICQ , au début du XVe siècle, comme beaucoup de châteaux gersois c'était une salle gasconne située non loin d'une église dont St-Quirice en était le saint patron, d'où le nom du lieu. Lasalle à la fin du XVIe siècle appartenait à la famille des Verduzan de St-Cricq. Elle est alors transformée en château par l'adjonction de 3 étages. Au cours du XVIIIe siècle cette famille se trouva réduite à deux frères, tous deux prêtres. Comme il n'y avait plus de succession, les deux frères après avoir fait une donation au dernier vivant, décidèrent qu'après la mort du survivant, serait transmis à Louis-Thomas de Verduzan chanoine de Sainte-Marie d'Auch qui légua  leurs biens  à l'hôpital Saint-Augustin d'Auch qui fut désigné comme héritier. C'est ainsi que le domaine resta jusqu'en 2005, la propriété de l'hôpital d'Auch.  Depuis le château a été vendu à une société immobilière girondine qui doit le rénover afin d'en faire des appartements de standing.","architecture":"L'imposante silhouette de Saint-Cricq, ouvrage du XVe siècle, se meurt. La bâtisse de grandes dimensions est rectangulaire flanquée d'une tour ronde au nord-ouest, et d'une tour carrée à l'angle opposé. Cette façade est la plus visible de l'extérieur. L'entrée se situe du côté sud et donne sur une cour intérieure fermée par des murailles à créneaux. Dans l'angle sud-ouest on distingue une petite tour ronde  échauguette  destinée à défendre le lieu des envahisseurs potentiels. Sur la façade sud du corps du château une tour octogonale dans laquelle est percée la porte d'entrée  est accolée à la façade, c'est le plus vieux patrimoine de la ville d'Auch, bâti en 1411.","habitants":"Famille des Verduzan\r\n        \r\n        \"","divers":"Château de Saint-Cricq","gps":"","images":["../image/image_32/32_St_Cricq_1.jpg","../image/image_32/32_St_Cricq_2.jpg","../image/image_32/32_St_Cricq_3.jpg","../image/image_32/32_St_Cricq_4.jpg","../image/image_32/32_St_Cricq_5.jpg"]},"Consult_chateau_formulaire5c3b":{"id":"Consult_chateau_formulaire5c3b","dept":"32","canton":"Gimone-Arats","commune":"Saint-Germier","nom":"St_Germier","type":"Château","periode":"XII","histoire":"ST-GERMIER,  situé sur la commune même, fut construit vers l'an 1200 et a eu la visite d'Henri IV en 1579. Aujourd'hui  hôtel de ville","architecture":"Château de Saint-Germier, grande demeure en pierre du Gers, en forme d'un L, pour la partie habitation. Le château de 1524 sintégrait probablement aux fortifications du village. Les bâtiments au toit couvert de tuiles sorganisent en U autour de la cour. Deux tours rondes, à toit en poivrières, plus hautes que les bâtiments, garnissent les angles, une autre tour polygonale abrite lescalier à vis. Léglise, proche du château, a été déplacée, rebâtie et restaurée maintes fois surtout au XIXe siècle. Deux bâtisses parallèles devance l'habitation, où autrefois se trouvaient les écuries. Un parc privé entoure aux trois-quarts le château.","habitants":"Henri IV \r\n        \r\n        \"","divers":"Château de Saint-Germier","gps":"","images":["../image/image_32/32_St_Germier_1.jpg","../image/image_32/32_St_Germier_2.jpg","../image/image_32/32_St_Germier_3.jpg","../image/image_32/32_St_Germier_4.jpg","../image/image_32/32_St_Germier_5.jpg"]},"Consult_chateau_formulaire05cb":{"id":"Consult_chateau_formulaire05cb","dept":"32","canton":"Saramon","commune":"Castelnau-Barbarens","nom":"St_Guiraud","type":"Château","periode":"XV","histoire":"Saint-GUIRAUD de Sabius Sabiniatus, général Romain qui résidait sur place, dont la stèle vautive dédiée a la déesse Minerve fut découverte par monsieur de la Noue, d'écrite par le marquis d'Orbessan et transféré a Toulouse de madame Cassagne a Mr de la Noue de Vair avec son fidéle Edouart Lartet comme adjoint au maire,","architecture":"Depuis le milieu du Moyen-Age et jusqu'au début du XIXe siècle, plusieurs communautés indépendantes ont coexistés sur ce territoire. Ce sont celles de Grenadette, Pépieux et Saint-Guiraud. Toutes dépendent à la fin du Moyen-Age de la châtellenie de Castelnau-Barbarens, l'une des quatre châtellenies du comté d'Astarac. L'histoire de ces différentes communautés est intimement liée depuis le Moyen-Age et plus encore depuis leur regroupement en 1822 pour donner naissance à la commune de Castelnau-Barbarens. En 1294 par exemple, le comte d'Astarac souhaita fonder à Pépieux une bastide mais les consuls de Castelnau-Barbarens s'y opposèrent car cette fondation aurait pu entraîner la désertion du castelnau. Le château de Saint-Guiraud conserve quelques éléments médiévaux visibles depuis la voie publique. Il semble avoir été remanié à l'époque moderne. La demeure située à proximité de l'église conserve des éléments visibles d'un bâtiment médiéval, appareil à assise régulière de certains murs et porte à arc brisé. Le village de Castelnau-Barbarens présente un certain nombre de vestiges bâtis attribuables au Moyen Age. Il a fait l'objet d'une étude partielle dans le cadre de l'inventaire thématique sur les transformations des agglomérations en Gascogne gersoise à la fin du Moyen-Age.","habitants":"marquis d'Orbessan\r\n        \r\n        \"","divers":"Château de Saint-Guiraud","gps":"","images":["../image/image_32/32_St_Guiraud_1.jpg","../image/image_32/32_St_Guiraud_2.jpg","../image/image_32/32_St_Guiraud_3.jpg","../image/image_32/32_St_Guiraud_4.jpg","../image/image_32/32_St_Guiraud_5.jpg"]},"Consult_chateau_formulaire5c69":{"id":"Consult_chateau_formulaire5c69","dept":"32","canton":"Jegun","commune":"Saint-Lary","nom":"St_Lary","type":"Château","periode":"XIII-XV","histoire":"ST-LARY, le premier seigneur de Saint-Lary est Barthélemy de Biran, signalé en 1270, auquel lui succéda sa fille, Mabille de Biran. Par mariage, la seigneurie passe ensuite dans la famille des Monlezun, branche détachée de celle des comtes de Pardiac, et y reste jusquen 1780. Anne de Lozières, veuve de Georges de Monlezun, habite réellement le château lors du règne dHenri IV et y meurt,  en 1630.  vers la fin du XVIIe siècle, la famille de Monlezun perd ses droits sur le château, néanmoins  on retrouve les Monlezun à Saint-Lary de 1728 jusquen 1780, date de la mort du marquis Henri de Monlezun, dernier représentant mâle de cette ancienne famille.  Le 2 septembre 1792, le château de Saint-Lary est confisqué et vendu comme biens démigrés avec ses dépendances, sa cour et son puits, à Augustin Quinsac. En 1927 la comtesse de Colloredo-Mansfield dAutriche acquiert le château de St Lary. Sollicités comme interprète par les nazis durant la seconde guerre mondiale, elle réalise le tour de force de se soumettre aux ordres des allemands tout en cachant des Juifs dans les combles.\r\nEnfin, en 1985, Claude Jean Du Barry lui succède, avec sa femme, Daphné Du Barry qui réalise des statues figuratives monumentales en bronze, exposées dans les plus grandes villes du monde. En 2003, la ville de Sienne, en Italie, lui a notamment commandé un Blaise de Monluc de 1 m 80 de haut.","architecture":"Sa première construction est  du XIIIe elle a toutes les caractéristiques du château gascon, si ce nest des proportions plus  grandioses . En effet, le corps de logis initial est un rectangle de 18 mètres par 17 mètres, flanqué de deux tours au Nord-Est et au Nord-Ouest ; la seconde mesurant, tout de même, 8 mètres sur 7 mètres. Par ailleurs, le château est entouré dune enceinte, qui nest actuellement visible quau Nord et qui isole le château du village par une cour close.De nombreux changements ou restaurations sont survenus et la lecture de lédifice nest pas facile.\r\nDune part, le rez-de-chaussée était hermétique, comme cela était dusage. Il est aujourdhui percé de portes extérieures et intérieures, destinées à rendre la circulation plus aisée à lintérieur du château.  Du XVIe siècle, nous avons un bâtiment accolé à la face Sud de la petite tour et de même largeur quelle. Cest une tour-escalier avec un pilier central carré de 1 mètre de côté autour duquel se développent onze volées de quatre marches. Ces dernières sont constituées de dalles de 1 m 75 de long reposant sur des corniches engagées dans les murs. Lensemble est très vaste, solidement construit et dune simplicité harmonieuse. Du XVIIe siècle, nous avons la partie du corps de logis qui constitue langle Sud-Ouest du bâtiment primitif.","habitants":"Famille des Monlezun,\r\n        \r\n        \"","divers":"Château de Saint-Lary","gps":"","images":["../image/image_32/32_St_Lary_1.jpg","../image/image_32/32_St_Lary_2.jpg","../image/image_32/32_St_Lary_3.jpg","../image/image_32/32_St_Lary_4.jpg"]},"Consult_chateau_formulaireb9f1":{"id":"Consult_chateau_formulaireb9f1","dept":"32","canton":"Fleurance","commune":"Saint-Léonard","nom":"St_Léonard","type":"Château","periode":"XIII-XVIII","histoire":"ST-LEONARD, la seigneurie  a appartenu à la famille de Sérillac du XIIIe au XVIIIe siècle. Le château a été fortement remanié dans la seconde moitié du XVIIIe siècle. Des états antérieurs ne subsistent que les caves voûtées du sous-sol et une porte du quatrième quart du XVIe siècle. Du XIX au XXe siècle, le domaine connaît une période de troubles. Le château est revendu à un agriculteur, Candelon qui revend une grande partie du mobilier et rase une partie du parc à la Française pour le mettre en culture.  La construction des communs démarre au XVII siècle, Alexandre de Sérillac fait bâtir une grange à trois arcs diaphragmes dont  un seul subsiste. Le château appartient aujourdhui à la famille Boyer qui sattache à faire retrouver à lancienne demeure de caractère son état dorigine depuis 1974.","architecture":"Saint-Léonard, architecture et décor typiques du XVIIIe siècle, reconstruit sur un bâtiment antérieur médiéval. Le château s'ordonne autour d'une cour carrée développant les trois ailes principales, fermées au sud par un corps de portique couvert en terrasse, enserrée par les façades des deux ailes latérales flanquées de leurs tours d'angle. L'aile nord est occupée par l'escalier d'honneur, la rampe est un bel exemple d'ouvrage en fer forgé fin du XVIIIe siècle. Les pièces à vivre sont réparties dans les ailes Est et ouest. Les chambres s'ornent d'un décor du XVIIIe siècle avec alcôve, cheminées, gypseries, boiseries, plafonds à solives apparentes. Les pièces de service, dont la cuisine, sont au sous-sol dans des salles voûtées. A l'ouest se trouvait une grange. Un bâtiment bordant la rue du village abritait les communs. Au sud se trouvait la chapelle castrale.  Eléments protégés MH : château avec la grange et la chapelle : inscription par arrêté du 3 juin 1996.   Les premières constructions défensives, à savoir la tour Nord-Ouest avec les meurtrières ainsi que la salle et le mur denceinte qui laccompagnent datent du XIIIe siècle, meurtrières, latrines, fenêtres à meneaux. Au XVe siècle sont ajoutées les ailes nord et est.  Il fait également aménager un jardin à la française ainsi quun bâtiment bordant la rue du village pour accueillir la suite des communs : écuries, étables et logements agricoles. Au XVIII est érigé le porche qui donne au château laspect dun hôtel particulier toulousain.","habitants":"Famille Boyer \r\n        \r\n        \r\n        \"","divers":"Château de Saint-Léonard","gps":"","images":["../image/image_32/32_St_Leonard_1.jpg","../image/image_32/32_St_Leonard_2.jpg","../image/image_32/32_St_Leonard_3.jpg","../image/image_32/32_St_Leonard_4.jpg","../image/image_32/32_St_Leonard_5.jpg","../image/image_32/32_St_Leonard_6.jpg"]},"Consult_chateau_formulaireffc0-2":{"id":"Consult_chateau_formulaireffc0-2","dept":"32","canton":"Grand -Bas-Armagnac","commune":"Saint-Martin-d","nom":"St_Martin_Armagnac","type":"Château","periode":"XIV-XVI","histoire":"SAINT-MARTIN, le château a été édifié vers le milieu du XVIe siècle. Apporté jadis en dot par une jeune comtesse d'Armagnac.","architecture":"Saint-Martin, formé en 1830 par la réunion de trois communes avec Castagnet et Mauriet  a pris le nom de son saint patron. Des vestiges gallo-romains, ainsi que des sarcophages en calcaire ont été découverts près du château où ils sont encore conservés. Léglise de St Martin, à lorigine près du château,  fut démolie en 1788 et reconstruite à son emplacement actuel, le tout en 3 ans !.  Le château a été construit en 1563 et assez peu remanié par la suite.","habitants":"Blaise de Lasseran Massencome, seigneur \r\n        \r\n        \"","divers":"Château de Saint-Martin d'Armagnac","gps":"","images":["../image/image_32/32_St_Martin_Armagnac_1.jpg","../image/image_32/32_St_Martin_Armagnac_2.jpg","../image/image_32/32_St_Martin_Armagnac_3.jpg"]},"Consult_chateau_formulaire082a":{"id":"Consult_chateau_formulaire082a","dept":"32","canton":"Mirande","commune":"Mirande","nom":"St_Mont","type":"Château","periode":"XVIII","histoire":"St-MONT, cest le village  de la famille Françoise Laborde à la voix posée et souriante. Depuis son enfance elle sest imprégnée de lhistoire des comtes dArmagnac, elle qui vit une partie de lannée dans lancien monastère de Saint-Mont, aujourdhui racheté par son mari. « Je connaissais déjà la maison à lépoque de la vieille baronne, on y venait de temps à autre. En fait, cest un peu comme dans Pagnol, relève-t-elle, heureuse rien quen songeant au lieu dont  parle Françoise Laborde ne se lasse pas de narrer lhistoire du monastère, intimement liée à celle de tout le village.","architecture":"Tout le monde a rebaptisé le monastère  de château, qui a été reconstruit en partie au XVIIIe siècle, avec des pièces plus grandes pour y faire des chambres bien plus confortables, aujourdhui certaines sont des chambres dhôtes. Le château conserve de nombreux passages avec léglise voisine, dédiée à Saint-Jean-Baptiste,  Il y a tellement eu dhistoire ici, les guerres de religions entre catholiques et protestants, on sent que cest un endroit où des personnes ont beaucoup souffert. Lors de la Révolution, les ecclésiastiques y ont été réunis et priés de se convertir, sinon ils étaient exécutés. Résidence du directeur  du festival d'Aix.","habitants":"Françoise Laborde\r\n        \r\n        \"","divers":"Château de Saint-Mont à Mirande","gps":"","images":["../image/image_32/32_St_Mont_1.jpg","../image/image_32/32_St_Mont_2.jpg","../image/image_32/32_St_Mont_3.jpg","../image/image_32/32_St_Mont_4.jpg"]},"Consult_chateau_formulaireb048-2":{"id":"Consult_chateau_formulaireb048-2","dept":"32","canton":"Lectoure","commune":"Saint-Mézard","nom":"St_Mézard","type":"Château","periode":"XVIII-XVIII","histoire":"Deux châteaux à Saint-Mézard le Feuga du XIXe siècle et le Jauquet du XVIIIe siècle                                                      \r\nFEUGA, seigneurie tenue en toute justice par l'illustre et puissante famille de Lagarde -Fimarcon descendant des comtes de Lomagne. aujourd'hui  la société SCI chateau de Feuga, dirigée à ce jour par Peter John de Savary, a été fondée en octobre 2006. C'est donc une entreprise qui bénéficie d'une forte ancienneté. Société civile immobilière , elle se situe à St-Mézard. gérante madame Valérie Manissol Barbot.                                   \r\nJAUQUET, l'édifice appartient en 1781 à Messire Joseph baron d'Esparbès de Lussan, ancien capitaine de grenadiers du régiment de Provence, chevalier de l'ordre royal et militaire de Saint-Louis, seigneur de Saint-Mezard et autres lieux, habitant en son château noble de Jauquet.","architecture":"Feuga, édifié au XVIIIe siècle sur l'emplacement d'une ancienne construction féodale dépendant des Fimarcon, corps de logis oblong à deux niveaux toit en croupe accolé de deux tours carrées aux extrémités et d'un donjon carré à mâchicoulis et créneaux et tourelles                                                                                                            Jauquet pas d'image","habitants":"Messire Joseph baron d'Esparbès de Lussan\r\n        \r\n        \r\n        \"","divers":"Château de Saint-Mézard","gps":"","images":["../image/image_32/32_St_Mezard_1.jpg","../image/image_32/32_St_Mezard_2.jpg","../image/image_32/32_St_Mezard_3.jpg","../image/image_32/32_St_Mezard_4.jpg","../image/image_32/32_St_Mezard_5.jpg","../image/image_32/32_St_Mezard_6.jpg","../image/image_32/32_St_Mezard_7.jpg"]},"Consult_chateau_formulaire2560":{"id":"Consult_chateau_formulaire2560","dept":"32","canton":"Gimone-Arrats","commune":"Sainte-Gemme","nom":"Ste_Gemme","type":"Château","periode":"XV","histoire":"Deux châteaux à Sainte-Gemme celui de Sainte-Gemme et celui de Lauret.                                                                                           Ste-GEMME Géraud V, comte dArmagnac, Bernard de Sainte-Gemme et Pilfort de Léaumont. Confirmées par Antoine de Gère en 1497. Les seigneurs de Sainte-Gemme nomment chaque année les consuls du lieu. Les seigneurs de Sainte-Gemme sont cités dans le cartulaire du XIIe siècle.  En 1824, la commune de Sainte-Gemme fut rattachée à Lauret, qui se situe à 2 km au sud-ouest du village, par lintervention de M. de Castelbajac, pair de France.                                                                                                    La première mention de LAURET apparaît en 1295 comme étant un Castrum Seu Villa ; ce qui suggère lhypothèse dun petit bourg fortifié dont il ne reste plus aucune trace. En 1861, la commune de Sainte-Gemme récupère également les terres spoliées par Monfort en 1826. Il a été successivement la propriété des familles Lautrec, Percin et Castelbajac, le
