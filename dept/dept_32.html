32_Homps_2.jpg","../image/image_32/32_Homps_3.jpg","../image/image_32/32_Homps_4.jpg","../image/image_32/32_Homps_5.jpg","../image/image_32/32_Homps_6.jpg"]},"Consult_chateau_formulairefa7b":{"id":"Consult_chateau_formulairefa7b","dept":"32","canton":"Lectoure","commune":"L","nom":"Isle_Bouzon","type":"Vestiges-Château","periode":"XII-XVI","histoire":"ISLE-BOUZON, vestiges des fortifications : échauguette.\r\nVestiges du château, du XIIe siècle, reconstruit au XVIe siècle, ils sont la propriété de la famille de Galard, marquis de l'Isle-Bouzon. Les Galard furent une des plus illustres familles de Gascogne avec celle des Montesquiou. Joseph de Galard fut guillotiné à la Révolution. Son fils, Gustave de Galard, émigra en Espagne, puis en Amérique et devint peintre avant de revenir en France. La « fille du marquis de l'Isle-Bouzon » est l'héroïne d'un comte de Gascogne recueilli par Jean-François Bladé : Le Roi des hommes cornus.    Il est inscrit aux M.H. depuis 1995                          LANDIRAN,  château bâti à Isle-Bouzon.  La construction du château date du XIII au XVIIIe siècle. Le château de Landiran est également la propriété de la famille de Galard.","architecture":"Isle-Bouzon,cet agréable village fortifié a conservé à son angle nord une partie de ses remparts protégeant les vestiges dun château féodal. Une tour carré est encore visible depuis le centre du bourg.\r\nA lopposé vers le sud une belle échauguette du XVIe siècle domine la vallée. Pour bien la voir, il faut descendre sous lesplanade posée sur le rocher en face de léglise.                                                              Landiran, ce château de plan rectangulaire à deux niveaux  avec série de lucarnes sur toit en croupes pavillon légèrement saillant en façade flanqué de tourelles rondes aux angles toit en poivrières.","habitants":"Famille des Montesquiou                                                              Famille de Galard\r\n        \r\n        \"","divers":"Vestiges du château et celui de Landiran à l'Isle-Bouzon.","gps":"","images":["../image/image_32/32_Isle_Bouzon_1.jpg","../image/image_32/32_Isle_Bouzon_2.jpg","../image/image_32/32_Isle_Bouzon_3.jpg","../image/image_32/32_Isle_Bouzon_4.jpg","../image/image_32/32_Isle_Bouzon_5.jpg","../image/image_32/32_Isle_Bouzon_6.jpg","../image/image_32/32_Isle_Bouzon_7.jpg","../image/image_32/32_Isle_Bouzon_8.jpg","../image/image_32/32_Isle_Bouzon_9.jpg"]},"Consult_chateau_formulaire7d61":{"id":"Consult_chateau_formulaire7d61","dept":"32","canton":"Plaisance","commune":"L","nom":"Isle_de_Noé","type":"Chartreuse","periode":"XVIII","histoire":"L'ISLE de NOE, anciennement L'Isle-Arbéchan, On doit sa construction, achevée en 1756, au marquis Jacques-Roger de Noé qui sétait assuré le concours de larchitecte Pierre Racine.  En avril 1799, trois ans avant la proclamation de l'indépendance d'Haïti, un vieux noble ruiné écrit à Toussaint Louverture. Surprenant renversement des rôles : le comte Louis-Pantaléon de Noé  appelle à l'aide un ancien esclave. Maître de la plantation Bréda où naquit Toussaint, grand propriétaire sucrier dont le domaine inspira Victor Hugo pour Bug Jargal, l'aristocrate gascon est représentatif de ces riches planteurs blancs alors malmenés par la tourmente révolutionnaire.  A un moment où beaucoup s'interrogent sur le passé colonial de la France, cette biographie invite à plonger au coeur du système esclavagiste et de la \"plantocratie\" d'ancien régime, tout en rappelant les liens solides tissés entre les provinces françaises et les lointaines îles à sucre. Amédée, comte de Noé de 1819 à 1879 prit le nom de Cham, le dernier marquis de Noé mort à la fin du XXIe siècle cèda le château à la commune. Il abrite le centre permanent d'initiatives pour l'environnement du Gers  et une école maternelle. Le château, propriété de la commune depuis 1975,  chaque été, une exposition consacrée principalement au caricaturiste Amédée de Noé, dit Cham, et à Toussaint Louverture, esclave affranchi des Noé, avant de devenir le héros de labolition de lesclavage.","architecture":"Le château a été construit au XVIIIe siècle  sur des plans de l'architecte Pierre Racine. Il est ceinturé par un parc de 12 ha qui s'étend au sud du château.  La partie architecturale  est une chartreuse. Une recherche de symétrie commande l'ordonnance des façades principales d'où se détachent deux imposants perrons. \r\nCôté parc, la façade s'ouvre sur une grande pelouse ; au nord, le château est séparé du village par les bâtiments en hémicycle des anciennes écuries qui dessinent une élégante cour d'honneur.\r\nLe corps principal est percé de 12 fenêtres. Au centre, se trouve une grande porte-fenêtre en plein cintre, surmontée d'un fronton triangulaire. L'accès à l'étage se fait par un escalier monumental, orné d'une rampe en fer forgé. Sous l'escalier, s'ouvre un passage voûté donnant accès au rez-de-chaussée où se trouvent les pièces de service et les caves. Ce corps principal est bordé, par deux ailes prolongées par les communs, délimitant une cour intérieure en hémicycle. A l'intérieur, le premier étage regroupe toutes les salles d'apparat. La décoration reprend toute la gamme du style Rocaille. Certaines pièces conservent leurs papiers peints d'origine. Les chambres se situent dans les ailes.","habitants":"Marquis Jacques-Roger de Noé \r\n        \r\n        \r\n        \"","divers":"Château de l'Isle de Noé","gps":"","images":["../image/image_32/32_Isle_de_Noe_1.jpg","../image/image_32/32_Isle_de_Noe_2.jpg","../image/image_32/32_Isle_de_Noe_3.jpg","../image/image_32/32_Isle_de_Noe_4.jpg"]},"Consult_chateau_formulaire6726":{"id":"Consult_chateau_formulaire6726","dept":"32","canton":"L","commune":"L","nom":"Isle_Jourdain","type":"Château","periode":"XVI-XVIII","histoire":"Plusieurs châteaux à l'Isle-Jourdain, celui de Qintarets et de Panat.                                                                                        ISLE-JOURDAIN,  vers le XIIe siècle, une puissante famille de  l'Isle est cité,  au XIVe siècle, la seigneurie devient un comté. En 1421, sans héritier, le dernier comte de l'Isle vend ses terres à Jean IV d'Armagnac.  En 1443, Charles VII envoie son fils Louis II pour saisir les biens de Jean IV et remettre de l'ordre dans la région (Jean IV qui s'était proclamé \"comte par la grâce de Dieu\", avait renié son hommage au roi de France et tentait d'annexer le Comminges. Voyant la puissance Royale, Jean IV souhaite proposer la paix, mais Louis II ne s'embarrasse pas de scrupules et le fait arrêter ainsi que sa famille.  En 1473, les troupes du Roi Louis XI  tuent Jean V à Lectoure. Vers 1620, les guerres de religion font rage. Les catholiques pillent cette ville protestante.   En 1621, Richelieu donne l'ordre de détruire le château de L'Isle en Jourdain. A partir de 1778, la collégiale est reconstruite  ainsi que la tour   intégré à la construction.\r\nPANAT  a été édifié à la fin du XIXe siècle par Joseph Samuel Brunet de Castelpers, marquis de Panat, et son épouse Marguerite Sales. appartenait à la famille de Rudelle dAlzon, elle possédait deux terrains vis à vis, de part et dautre, de la rue de Save. Sur la partie septentrionale, le marquis de Panat, descendant de Victoire de Rudelle dAlzon, qui en avait hérité, et de son époux le premier marquis de Panat, vendu par Emeric de Panat. Le dernier des de Panat, Emeric (1886  1965) fut un pastelier de talent                                                                                  QINTARETS,  famille d' Arnaud Alexandre et  Marie-Pierre Tranier.","architecture":"Isle jourdain,   détruit au XVIIe siècle, il existe un autre château construit au XIXe siècle par le marquis de Panat, au style composite. L'Isle de Jourdain, puis semble avoir été appelé L'Isle en Jourdain, et finalement L'Isle Jourdain.   Cette tour-horloge surprend par sa forme.                                                              Panat;  Château de Panat cette demeure na rien en commun avec lancien château des comtes de lIsle, rasé en 1621. Elle a été construite à la fin du XIXe siècle sur un emplacement qui appartenait à la famille de Rudelle dAlzon. \r\nQintarets, sublime château datant du XVIIIe siècle. Au cur des sept hectares de parc clos du domaine,  de plan rectangulaire, à trois niveaux, pavillon plein cintre côté parc octogonale toits pointus à six pans.","habitants":"Famille l'Isle                                                                                      Famille de Rudelle dAlzon                                                          Famille d' Arnaud Alexandre      \r\n        \r\n        \r\n        \"","divers":"La tour de l'horloge, le château de Panat et du Quintaret à L'Isle-Jourdain","gps":"","images":["../image/image_32/32_Isle_Jourdain_1.jpg","../image/image_32/32_Isle_Jourdain_2.jpg","../image/image_32/32_Isle_Jourdain_3.jpg","../image/image_32/32_Isle_Jourdain_4.jpg","../image/image_32/32_Isle_Jourdain_5.jpg","../image/image_32/32_Isle_Jourdain_6.jpg","../image/image_32/32_Isle_Jourdain_7.jpg","../image/image_32/32_Isle_Jourdain_8.jpg","../image/image_32/32_Isle_Jourdain_9.jpg"]},"Consult_chateau_formulairebda2":{"id":"Consult_chateau_formulairebda2","dept":"32","canton":"Prégnian","commune":"Jegun","nom":"Jegun","type":"Château","periode":"XVI","histoire":"JEGUN, ville fondée au XIe siècle fortifiée et aménagée en bastide par  Bernard IV comte d'Armagnac en 1180. dans cette bastide la maison d'Henri IV ou ce dernier aurait séjourné et château de Lescout. Actuellement  instituts thérapeutiques, éducatifs et pédagogiques (ITEP).","architecture":"Le château de Lescout, à l'écart du village, avec un corps de logis rectangulaire  à trois niveaux, toit recouvert de tuiles en croupe, flanqué de tours d'angle carrées en façade  couvertes d'ardoises et deux ailes en retour d'équerre.   Au centre de la grand rue , une maison Renaissance est désignée sous le nom de « maison Henri IV », car c'est là qu'il logea probablement.","habitants":"Henri IV\r\n        \r\n        \"","divers":"Château de Lescout à Jegun","gps":"","images":["../image/image_32/32_Jegun_1.jpg","../image/image_32/32_Jegun_2.jpg","../image/image_32/32_Jegun_3.jpg","../image/image_32/32_Jegun_4.jpg"]},"Consult_chateau_formulaireac7c":{"id":"Consult_chateau_formulaireac7c","dept":"32","canton":"Lectoure","commune":"La Romieu","nom":"La_Romieu","type":"Château","periode":"XIV-XVI","histoire":"Deux châteaux à la Romieu celui de Madirac du XVIe siècle et celui de Saint-Aignan, de Gensac  et la Collégiale.                                                                         MADIRAC, le château est élevé en 1582 par François Georget, sculpteur et géomètre, pour Bertrand du Bousquet, président au tribunal de Condom. Une inscription gravée sur la tourelle d'angle, donne la date de construction du château. Il a été construit en 1582 par François Georget, sculpteur et géomètre, pour Bertrand du Bousquet, président au tribunal de Condom.  Gentilhommière gasconne qui se distingue par le caractère accentué de sa décoration avec fenêtres à meneaux cruciformes et tourelles en surplomb. Motifs sculptés sur une des tourelles d'angle.                                                                             La COLLEGIALE, fondée au XIVe siècle par le cardinal Arnaud d'Aux, la Collégiale de La Romieu constitue un magnifique exemple de l'architecture gothique méridionale. Étape sur les chemins de Saint-Jacques de Compostelle, l'ensemble collégial Saint-Pierre, classé Monument Historique et inscrit sur la liste du patrimoine mondial de l'UNESCO, forme un tout remarquable, avec son église à nef unique, ses deux imposantes tours, sa sacristie ornée de fresques polychromes du XIVe siècle, son cloître aux arcades géminées et son jardin. La visite des lieux permet en outre de bénéficier d'un beau panorama sur le village et la campagne gersoise depuis le belvédère de la tour octogonale.","architecture":"La Tour du Cardinal d'Aux est classée au titre des monuments historiques en 1928.  mur d'enceinte, le seul élément subsistant du palais cardinalice que s'était fait construire le cardinal d'Aux au sud-ouest de la collégiale.                                                                 Ce château est inscrit au titre des monuments historiques par arrêté du 28 avril 1964.\r\nle château de Saint-Aignan, berceau de la famille de Saint-Gresse de Merens, avec son allée de cèdres classée monument historique.                                                                               Madirac, le château se compose de deux corps juxtaposés à angle droit. Aux deux angles du premier corps, couvert dun toit à deux pentes, plus bas que le second corps, se trouvent deux tourelles cylindriques à encorbellement, dont le couronnement a disparu. Des fenêtres à meneaux paraissent à létage, tandis que des ouvertures simples, probablement plus tardives, souvrent au rez-de-chaussée. Langle des deux corps constitue lentrée, avec une porte dentrée remarquable par sa décoration sculptée : après un perron surélevé, des colonnes torses se terminant en personnages masculin et féminin encadrent la porte en plein cintre, sous un entablement et un fronton triangulaire orné dune coquille sculptée. Un oculus ovale se trouve de chaque côté de la porte, puis à gauche une grande porte cochère, en arc surbaissé doté dune clé saillante. À létage unique au-dessus, deux fenêtres à meneaux. Sur le mur du second corps formant l'angle, se trouve une autre porte à arc en plein cintre, surmontée de fenêtres à meneaux, sur deux étages.","habitants":"Famille de Bertrand du Bousquet\r\n        \r\n        \"","divers":"Château de Madirac et la collégiale à La Romieu.","gps":"","images":["../image/image_32/32_La_Romieu_1.jpg","../image/image_32/32_La_Romieu_2.jpg","../image/image_32/32_La_Romieu_3.jpg","../image/image_32/32_La_Romieu_4.jpg","../image/image_32/32_La_Romieu_5.jpg","../image/image_32/32_La_Romieu_6.jpg","../image/image_32/32_La_Romieu_7.jpg"]},"Consult_chateau_formulairecbdb":{"id":"Consult_chateau_formulairecbdb","dept":"32","canton":"Gimont","commune":"Labrihe","nom":"Labrihe","type":"Maison forte","periode":"XVI","histoire":"Deux châteaux à Labrihe dont celui de Labrihe  et celui de Bouvées.                                                                                 LABRIHE, quelques traces d'oppida néolithiques, attestent un très vieil habitat. En 1293, Guillaume-Asner de Sobole, co-seigneur de Labrihe est désigné pour provoquer la concession des privilèges du Fezensaguet.  Le château de Labrihe a été reconstruit à la fin du XVIe siècle par Mgr de Saint-Julien, évêque d'Aire sur les ruines d'un bâtiment antérieur. La terre de Labrihe fut vendue par la famille de Preissac à Melchior François Reversac de Celez au XVIIIe siècle, puis elle passa à la famille de Saint-Blanquat. Le site où se trouve le village était nommé Hourment.\r\nA voir sur la commune de Labrihe, le château de Bouvées construit également par Monseigneur de Saint-Julien, évêque d'Aire sur Adour.","architecture":"Le château de Labrihe a été reconstruit à la fin du XVIe sur les ruines d'un bâtiment antérieur, l'actuel de plan rectangulaire à trois niveaux sur soubassements,  flanqué d'une tour polygonale à toit presque plat  et d'une échauguette en encorbellement d'angle.              Bouvées, château bâti de 1530 à 1560 par monseigneur de Saint-Julien, évêque d'Aire sur Adour, sur les ruines d'un bâtiment primitif. L'édifice fut vendu à la Révolution comme bien national. Il se déployait sur trois ailes délimitant une cour intérieure, flanquées aux angles de tours circulaires. Seules subsistent les parties Est et sud les hangars agricoles, adossés aux anciennes murailles, reproduisant la disposition primitive. Des tours, il ne reste que celle du sud-Est et des traces de celle du sud ouest, le pigeonnier a été élevé sur les bases d'une tour. La chapelle conserve ses culots sculptés et deux fenêtres à meneaux moulurées. Une tour ronde sur soubassement à quatre niveaux. Une cave voûtée en sous sol permettait la surveillance des abords par une série de trous de guet. A l'intérieur, cheminées des XVe et XVIIIe siècles, pavage en terre cuite, plafond à poutres et solives apparentes.","habitants":"Famille de Preissac\r\n        \r\n        \"","divers":"Château de Labrihe et de Bouvées","gps":"","images":["../image/image_32/32_Labrihe_1.jpg","../image/image_32/32_Labrihe_2.jpg","../image/image_32/32_Labrihe_3.jpg","../image/image_32/32_Labrihe_4.jpg","../image/image_32/32_Labrihe_5.jpg","../image/image_32/32_Labrihe_6.jpg","../image/image_32/32_Labrihe_7.jpg"]},"Consult_chateau_formulaire76de":{"id":"Consult_chateau_formulaire76de","dept":"32","canton":"Lombez","commune":"Montadet","nom":"Labusquière","type":"Château","periode":"XVII","histoire":"LABUSQUIERE, Montadet est cité pour la première fois en 1149 ; le comte de Comminges y donne les terroirs de Brogal, Querelac et Larié. Le lieu dAurusse est le site dun ancien château médiéval disparu au début des années 1900.   Depuis le début du XIIIe siècle se dresse le château de Labusquière admirable sur son promontoire.\r\nLes châtelains possédaient une grande partie des terres de la commune, plusieurs métairies et les trois moulins, dont deux moulins à vent, lun au lieu-dit la Côte, lautre sur les hauteurs de Lacassagne. Seul subsiste lancien moulin à eau sur lEspienne, qui a été rénové.  Henry Bernard  baron de Labusquière de Passama en 1796, et en 1856 à François Paul, marquis de Pins et   François, baron de Labusquière de Passama, Baron de Labusquière,  transformé aujourd'hui en hôtel restaurant de classe.","architecture":"Labusquière, de plan d'équerre à trois niveaux  toit peu élevé  en croupe, flanqué côté Est de deux tours carrées toit à quatre pans.","habitants":"Baron de Labusquière\r\n        \r\n        \r\n        \"","divers":"Château de Labusquière à Montadet","gps":"","images":["../image/image_32/32_Labusquiere_1.jpg","../image/image_32/32_Labusquiere_2.jpg","../image/image_32/32_Labusquiere_3.jpg","../image/image_32/32_Labusquiere_4.jpg","../image/image_32/32_Labusquiere_5.jpg"]},"Consult_chateau_formulairebb07":{"id":"Consult_chateau_formulairebb07","dept":"32","canton":"Lectoure","commune":"Saint-Avit-Trandat","nom":"Lacassagne","type":"Château","periode":"XIII-XIX","histoire":"LACASSAGNE, à Saint-Avit-Frandat   est connu pour abriter la réplique de la salle du conseil des grands maîtres de lordre de Saint-Jean de Jérusalem, ou chevaliers de Malte, dont loriginal se trouve à La Valette, sur lîle de Malte. Le château  au XVe siècle fief des Thieuras puis par alliance passe aux Vézins en 1517.    Aux Luppé par alliance de l'héritière qui épouse Carbon de Luppé, seigneur de Garrané qui le détiennent dès le XVIe siècle et y sont toujours représentés, Lacassagne doit de considérables transformations au XVIIe et XIXe siècles, notamment dans la grande salle ou J.-B. de Luppé, grand prieur de St-Jean de Jérusalem, mort en 1664, aurait voulu reconstituer la salle du grand conseil de l'ordre de Malte, Jean-Bertrand de Luppé du Garrané (mort en 1664), chevalier dans lordre de Saint-Jean de Jérusalem, prieur de Saint-Gilles, auteur de mémoires sur ses voyages en Méditerranée. Le château, depuis 1582, est resté propriété de sa famille jusquà une époque récente. En 1743 Louis de Luppé rachètera les deux tiers  de la seigneurie au duc de Rohan. Madame Edange descendante  des Luppé ouvre son château aux public depuis 1988.","architecture":"Le château de Laccassagne  la construction sest étalée des XIIIe au XIXe siècles.  Autour de la tour-salle du XIIIe siècle, se sont ajoutés des éléments architecturaux. La tour salle dans un nouveau corps de logis de plan rectangulaire, le  corps de logis du XVIIe siècle, certaines ouvertures sont murées,  la tour ronde hors oeuvre  sur la façade nord-est, contient lescalier à vis qui desservait trois étages, deux aujourdhui, puis furent ajoutées au XVIIe les deux tours rondes qui encadrent le corps central. À la même époque lensemble est recouvert dune toiture à comble brisé, à la Mansart, avec tuiles canal et tuiles plates. Au XVIIIe les deux tours sont reliées, au niveau du premier étage, par un balcon supporté par des corbeaux. Laile ouest a été rajoutée au XIXe siècle, ainsi que les communs de 1850 qui délimitent la cour.\r\nLe château a été inscrit et classé Monument Historique le 20 février 1980 : sont protégées les façades et toitures du château, des communs et de lorangerie, ainsi que la salle des chevaliers de Malte avec son décor.","habitants":"Famille de Carbon de Luppé\r\n        \r\n        \"","divers":"Château de Laccassagne à  Saint-Avit-Trandat","gps":"","images":["../image/image_32/32_Lacassagne_1.jpg","../image/image_32/32_Lacassagne_2.jpg","../image/image_32/32_Lacassagne_3.jpg","../image/image_32/32_Lacassagne_4.jpg","../image/image_32/32_Lacassagne_5.jpg","../image/image_32/32_Lacassagne_6.jpg"]},"Consult_chateau_formulaire5474":{"id":"Consult_chateau_formulaire5474","dept":"32","canton":"Lectoure","commune":"Lagarde","nom":"Lagarde_Gers","type":"Château","periode":"XVII","histoire":"LAGARDE, dit de Firmacon, de la famille de Clément V.\r\nA louest du village, un château du XVIIe siècle sert de porte à un village dont il est difficile de définir lintra et lextra-muros.\r\nAux angles nord et sud une tour massive, au centre la porte en forme de tunnel plein cintre dune bonne dizaine de mètres. A létat dabandon .","architecture":"Seule subsiste du château de Lagarde l'aile des communs, située à l'entrée de l'esplanade au fond de laquelle devait se trouver le château. C'est un bâtiment à étage flanqué de deux pavillons d'angle et muni d'un portail monumental. Ce dernier est constitué de pilastres plats alternés de bossages de couleurs différentes. Ces pilastres soutiennent un entablement à triglyphes et métopes, qui soutient une corniche où s'appuient deux volutes inversées. Dans l'axe se trouve une fenêtre à meneau. La couverture a été modifiée par une toiture à deux pans. Dans l'axe du portail monumental, passage voûté en berceau qui donnait accès à l'esplanade. Eléments protégés MH : façades et toitures de l'aile subsistante : inscription par arrêté du 16 juillet 1984.","habitants":"Famille de Clement V\r\n        \r\n        \"","divers":"Château de Lagarde","gps":"","images":["../image/image_32/32_Lagarde_Gers_1.jpg","../image/image_32/32_Lagarde_Gers_2.jpg","../image/image_32/32_Lagarde_Gers_3.jpg","../image/image_32/32_Lagarde_Gers_4.jpg","../image/image_32/32_Lagarde_Gers_5.jpg","../image/image_32/32_Lagarde_Gers_6.jpg","../image/image_32/32_Lagarde_Gers_7.jpg","../image/image_32/32_Lagarde_Gers_8.jpg","../image/image_32/32_Lagarde_Gers_9.jpg"]},"Consult_chateau_formulairee54c":{"id":"Consult_chateau_formulairee54c","dept":"32","canton":"Condom","commune":"Lagardère","nom":"Lagardère","type":"Vestiges","periode":"XIII","histoire":"LAGARDERE, le château de Lagardère est lun des seul château gascons à être daté avec quelque précision : en 1270, le comte dArmagnac Géraud V fait don à Auger, abbé de Condom, du territoire de La Gardère, avec autorisation dy construire un ouvrage fortifié. En contrepartie, il se réserve le droit doccuper lédifice avec ses soldats lorsque les circonstances lexigeront. Le château est construit par Guillaume de Nérac pour labbé Auger. Il reste en la possession des abbés, puis des évêques de Condom jusquen 1571, où il est vendu à Pierre de Lavardac. En 1621, il est racheté par Jean de Maniban et reste propriété familiale jusquen 1791. À partir de là commencent son abandon et sa ruine. De nos jours, une association a entrepris létude et la restauration du château. Le château est classé Monument Historique en 1922","architecture":"Le château, massif malgré son état de ruine actuel, se présente comme un parallélépipède (en fait, de plan légèrement trapézoïdal) de 25 m de long sur 12 m (au nord) et 10 m (au sud). Une tour massive de même largeur le prolonge au sud, avec une échauguette carrée à langle sud-est, et sur la façade opposée, au nord, se trouvent deux hautes tourelles carrées. Laspect extérieur, en dépit des aménagements apportés aux XVIe et XVIIe siècles, est assez homogène car on na pratiquement pas modifié les ouvertures dorigine, comme cest le cas dans la plupart des autres châteaux gascons. Laccès se faisait par une porte au rez-de-chaussée à louest. Ce premier niveau, éclairé et aéré par quatre étroites meurtrières, servait de cellier. On y trouve un évier dans une niche. Les deux tourelles sont, à ce niveau, pleines : sans doute jouaient-elles un rôle de contreforts. Aux deux niveaux supérieurs, les tourelles ont des chambres de tir pour un archer ou un arbalétrier.\r\nÀ une époque indéterminée, des aménagements furent apportés à lintérieur : on créa des murs de refend, le niveau inférieur, haut de 5 m, fut divisé en deux par la création dun entresol. On ouvrit une porte à 2 m du sol, munie dun pont-levis reposant sur une structure qui permettait laccès. Le premier étage était équipé de deux fours, dont un à pain.","habitants":"Abbé Auger\r\n        \r\n        \r\n        \"","divers":"Vestiges du château de Lagardère","gps":"","images":["../image/image_32/32_Lagardere_1.jpg","../image/image_32/32_Lagardere_2.jpg","../image/image_32/32_Lagardere_3.jpg","../image/image_32/32_Lagardere_4.jpg","../image/image_32/32_Lagardere_5.jpg","../image/image_32/32_Lagardere_6.jpg","../image/image_32/32_Lagardere_7.jpg"]},"Consult_chateau_formulairee9cf":{"id":"Consult_chateau_formulairee9cf","dept":"32","canton":"Montréal du Gers","commune":"Lagraulet","nom":"Lagraulet","type":"Maison forte","periode":"XIX","histoire":"LAGRAULET, à  l'heure où cet ancien nologue pourrait tranquillement tailler les rosiers de son jardin, monsieur Vernhes a décidé, avec son épouse, de transformer cette immense bâtisse oubliée en un hôtel de charme. Acquis il y a douze ans par le couple avec un projet encore diffus, le château de Lagraulet, qui date pour certaines parties de l'époque médiévale avec ses remparts, ses douves, son donjon, ses tours seigneuriales et surtout une vue à couper le souffle, ne pouvait que se transformer en une hôtellerie haut de gamme.  Aujourd'hui chambres d'hôtes","architecture":"Reste de l'ancien château médiéval : une tour carrée du XIIIe siècle et logis, vestiges d'une seconde tour carrée du XIVe siècle, enceinte fortifiée et douves en eau.                                                                                   Château de Lagraulet en pleine campagne gersoise, au milieu des vignes, se dresse telle une vénérable sentinelle l'architecture du château de Lagraulet du Gers. Au coeur d'une enceinte fortifiée (Castelnau), gardé par une tour du XIIIe siècle,  le logis du XIXe siècle totalement réhabilité .","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Vestiges de Saint-Lanes et château de Lagraulet","gps":"","images":["../image/image_32/32_Lagraulet_1.jpg","../image/image_32/32_Lagraulet_2.jpg","../image/image_32/32_Lagraulet_3.jpg","../image/image_32/32_Lagraulet_4.jpg","../image/image_32/32_Lagraulet_5.jpg","../image/image_32/32_Lagraulet_6.jpg"]},"Consult_chateau_formulaire3dea":{"id":"Consult_chateau_formulaire3dea","dept":"32","canton":"Fleurance","commune":"Lamothe-Goas","nom":"Lamothe_Goas","type":"Château","periode":"XVIII","histoire":"A Lamothe Goas bastide avec porte, le château de Lamothe, de Goas,  et de Camette.                                                          LAMOTHE, fut la seigneurie de la famille de Goas qui donna le nom au village. Le château construit sur l'ancienne motte féodale appartient d'abord aux Lomagne, seigneurs de Firmacon et le lieu s'appela  Lamothe Pellegrue puis La Motte Lauze (en raison du ruisseau), et Lamothe Goas.    Nous citerons : Amanieu de Biran, grand sénéchal de Toulouse sous François 1er (décédé en 1544)  Jean III de Biran, chambellan du duc d'Anjou (décédé en 1573),   Louis de Biran, filleul de Louis XIII et lieutenant général du Roi,  Marie-Jacqueline de Biran dite Jacquette, épouse du comte de Beaumont, dame d'honneur à la cour du Roi Louis XV. Pendant la Révolution, elle hébergera de nombreuses victimes de la terreur dans son château de Lamothe Goas. \r\nEn 1801, Madame de Goas de Beaumont demanda à Mgr Jacoupy, évêque d'Agen, de maintenir le culte pour \"les vieillards et infirmes qui s'y rendaient pour la célébration des offices\", mais en 1854, Madame de Preissac fit don d'un champ dit de \"la Croix Blanche\" pour y faire édifier une église paroissiale dont la construction commencée en 1860 se terminera en 1864. Elle est sous le vocable de St-Charles de Borromée et fut rénovée en 1992 par un groupe de scouts.  Les seigneurs successifs du château se distinguèrent à diverses époques.","architecture":"Château construit sur une ancienne motte, seconde demeure du XVIIe entourée de fossés dont il ne reste qu'une partie. Trois tours carrées ont été accolées au château au XVIIIe siècle, deux d'entre elles ont été démolies avant la seconde guerre mondiale. Le château a été la proie des flammes en 2003 et est actuellement en rénovation. Un joli parc aménagé abouti vers une garenne ou trône, une statue bronze de Diane chasseresse. La chapelle du château servit longtemps d'église paroissiale. Aujourd'hui il reste la propriété de la famille Rieu. Le château XVIIe qui servit très longtemps déglise paroissiale. \r\nTour carrée XVIIIe accolée au château et parc du XIXe.                                                                                château de CAMETTE construit au XIXe siècle en style néo classique qui évoque une villa palladienne par la simplicité et l'harmonie de ses formes  Une partie du mobilier a cependant pu être sauvegardée et mise en sécurité. Le château date de 1460 et a été remanié au XVIIIe siècle. Propriété de la famille Rieu depuis la fin du XIXe siècle, il compte 18 pièces dont la bibliothèque récemment restaurée.","habitants":"seigneurs de Firmacon                                                          Famille d'Amanieu de Biran\r\n        \r\n        \"","divers":"Château de Lamothe-Goas et de Camette","gps":"","images":["../image/image_32/32_Lamothe_Goas_1.jpg","../image/image_32/32_Lamothe_Goas_2.jpg","../image/image_32/32_Lamothe_Goas_3.jpg","../image/image_32/32_Lamothe_Goas_4.jpg"]},"Consult_chateau_formulairee096":{"id":"Consult_chateau_formulairee096","dept":"32","canton":"Condom","commune":"Larressingle","nom":"Larressingle","type":"Vestiges","periode":"XII","histoire":"Deux châteaux à Larressingle dont celui de Larressingle du XIIIe siècle ruinés et le château de Beauhas du XIXe siècle viticole.                  LARRESSINGLE,  entre dans l'histoire au début du XIe siècle. Par l'abbé Hugues, fondateur de l'abbaye de Condom, qui  hérite des ducs de Gascogne. Devenu évêque d'Agen et de Bazas, il laisse sa charge abbatiale de Condom et fait don à son successeur de ses terres de Larressingle. C'est ainsi que les abbés puis les évêques de Condom sont devenus les seigneurs des lieux.  Au XIIIe siècle, les couronnes de France et d'Angleterre se disputent l'Aquitaine. On voit alors dans la région, les bourgs se fortifier (Sauvetés, Bastides). Ce sont les abbés de Condom qui font réaliser cette forteresse. Le village ne sera jamais attaqué jusqu'en 1589 où les huguenots dirigés par Montespan s'en emparent pour l'utiliser comme base afin de réaliser leurs razzias et méfaits et ce jusqu'en 1596.  Dès le XVIIe siècle, le château est délaissé par les évêques au profit de celui de Cassaigne plus moderne. Et c'est à la fin du XVIIIe siècle que Mgr d'Anteroches, dernier évêque de Condom, fait démonter la toiture et transporter les bois de charpente à Cassaigne. Vendu comme bien national, il est dépecé et vidé. Sauvé en 1920 par Edouard Mortier  duc de Trévise le fait classé monuments historique.  Petit et peu commode, on habite plus facilement à l'extérieur. Le château donjon   propriété de la famille Papelorey depuis quatre générations.                                                          BEAUHAS château de Tramont Pierre-Jean exploitation viticole armagnac.","architecture":"Larresingle bourg fortifié d'un 1/2 ha, domaine des abbés puis des évêques de Condom. On doit à l'Abbé Arnaud de Lomagne (1285-1305) les parties hautes du château abbatial et trois tours de l'enceinte cernée de douves. Mrg Hérard de Grossoles (1521-1543) reperce l'édifice à la mode du temps et le dote sans doute de la tour polygonale encore couronnée de courtines et de créneaux 12 à 14 m de haut renforcés de tours carrées et de l'escalier à vis. \r\nAu voisinage immédiat, l'église St-Sigismond au milieu du XIIe siècle, est surmontée d'une salle-refuge qu'une passerelle joignait à l'étage noble du château.  Entrer par le pont-levis de la bastille et participer au déclenchement de tir des machines de guerre : catapulte, trébuchet.  A l'assaut avec bélier, tour roulante, bombarde. Tirez à l'arc et à l'arbalète. Métiers d'autrefois : frappe de monnaie, corde en chanvre, cotte de maille, boulet de pierre. Essayer les casques et heaumes du chevalier. Tir au canon. Joute à la quintaine. Combat à l'épée. Spectacle en musique médiévale.","habitants":"Famille Papelorey\r\n        \r\n        \"","divers":"Vestige de la forteresse de Larressingle et le château de Bauhas.","gps":"","images":["../image/image_32/32_Larressingle_1.jpg","../image/image_32/32_Larressingle_2.jpg","../image/image_32/32_Larressingle_3.jpg","../image/image_32/32_Larressingle_4.jpg","../image/image_32/32_Larressingle_5.jpg","../image/image_32/32_Larressingle_6.jpg","../image/image_32/32_Larressingle_7.jpg","../image/image_32/32_Larressingle_8.jpg","../image/image_32/32_Larressingle_9.jpg"]},"Consult_chateau_formulaire8c75":{"id":"Consult_chateau_formulaire8c75","dept":"32","canton":"Lectoure","commune":"Larroque-Engalin","nom":"Larroque_Engalin","type":"Vestiges","periode":"XIII","histoire":"LARROQUE,  de la famille de Saint-Orens, la seigneurie du lieu passa à celle de La Roque. Au moment de la transaction relative au bailliage du 23 février 1354, Gailhard de La Roque était marié avec Bernarde de Saint-Orens. Géraud de Lomagne, seigneur de Fimarcon, fait hommage à Jean IV, comte d'Armagnac. La Révolution Française confisquera l'édifice et  bâchera  les armoiries  durant assez longtemps, le château restera peu entretenu. Néanmoins, pendant la seconde guerre mondiale, le château accueillera des réfugiés d'Alsace et des résistants car si le château avait été en des temps anciens un lieu de vengeance mortelle, il a fini par devenir un lieu qui sauva des vies.","architecture":"Larroque-Engalin depuis 1595, anciennement appelé Larroque- Fimarcon, ou Larroque-du-Lau, Larroque-en-Galin (en 1789) est un tout petit village du canton de Lectoure, situé à l'ouest, sur le chemin de La Romieu. Construit sur les ruines dun village abandonné, Larroque-Engalin compte notamment un château fort de belle allure, remanié à la renaissance et comportant un donjon carré et une tourelle à vis heptagonale. Parmi les autres curiosités, vous pourrez y découvrir léglise du XIXe siècle, la fontaine St-Jean Baptiste au lieu dit Saint-Jouan, le monument de St-Amand, quelques puits en pierre en forme de ruche au lieu dit « La Manchette ». Tour en ruine du XIIIe ou XIVe siècle ; adjonction d'un corps de logis et d'une tour d'escalier dans la 2 eime moitié du XVe siècle ou la 1ère moitié du XVIe siècle.  Larroque-Engalin est un ancien Castelnau, cest-à-dire un village fortifié créé au Moyen-Age, à partir dun château et de maisons à labri des remparts. Il reste aujourdhui des éléments de fortification et une porte médiévale. Le château, de type gascon, a été augmenté dune tour renaissance et dun corps de logis du XVIIe siècle. La mise en valeur du patrimoine restaurations, plantations, fleurs, fait de ce petit village un cadre de vie très agréable.","habitants":"Famille de Gailhard de La Roque\r\n        \r\n        \"","divers":"Château de Larroque-Engalin","gps":"","images":["../image/image_32/32_Larroque_Engalin_1.jpg","../image/image_32/32_Larroque_Engalin_2.jpg","../image/image_32/32_Larroque_Engalin_3.jpg","../image/image_32/32_Larroque_Engalin_4.jpg","../image/image_32/32_Larroque_Engalin_5.jpg","../image/image_32/32_Larroque_Engalin_6.jpg"]},"Consult_chateau_formulaire1ab4":{"id":"Consult_chateau_formulaire1ab4","dept":"32","canton":"Eauze","commune":"Larroque-sur-l","nom":"Larroque_Luzan","type":"Vestige","periode":"XV","histoire":"LARROQUE, LUZAN site castral du XVe siècle perdu en pleine campagne, il  ne reste qu'une tour qui possède encore ses mâchicoulis et une porte en ogive, site castral perdu en pleine campagne,                                                                              \r\nSTAUZIS pas d'information historique.","architecture":"Tour de Luzan, site castral du XVe siècle perdu en pleine campagne, il en reste une tour qui possède encore ses mâchicoulis et une porte en ogive.  La tour  devait faire partie d'un ensemble aujourd'hui disparu. De forme carré elle fait 5 mètres de largeur, et mesure environ 12 mètres de hauteur. Elle est située sur une parcelle privée dans un petit sous bois. Ce bâtiment est classé aux monuments historiques. Si l'aspect extérieur semble relativement en bon état l'intérieur est totalement détruit.                                                          Stauzis, corps de logis de plan rectangulaire à deux niveaux flanqué aux extrémités de tours carrées toit à l'impérial.","habitants":"seigneurs locaux\r\n        \r\n        \"","divers":"Vesztiges du château de Larroque-Luzan à Larroque sur l'Osse et château de Strauzis","gps":"","images":["../image/image_32/32_Larroque_Luzan_1.jpg","../image/image_32/32_Larroque_Luzan_2.jpg","../image/image_32/32_Larroque_Luzan_3.jpg","../image/image_32/32_Larroque_Luzan_4.jpg","../image/image_32/32_Larroque_Luzan_5.jpg","../image/image_32/32_Larroque_Luzan_6.jpg"]},"Consult_chateau_formulaire5718":{"id":"Consult_chateau_formulaire5718","dept":"32","canton":"Plaisance","commune":"Lasserade","nom":"Lasserade","type":"Château","periode":"XIX","histoire":"Deux châteaux à Lasserrade celui de Lasserade  et celui de Lasserre  du XVIIIe siècle                                        \r\nLASSERRADE, un des plus vieux château de la région toulousaine, fief au Moyen-Age de Sicard dAlaman, le second du Raymond IV, Comte de Toulouse. Il est reconstruit en 1559 par la famille de Bernuy.   Le château acquiert le titre de terre noble par décret de Louis XI en remerciement de Guillaume Le Brun son propriétaire, qui le restaure alors.   Henri IV et les troupes protestantes de Coligny, y résidèrent en 1570. Le château sera épargné par la Révolution. Acquis par la famille du général Latterade en 1797  (famille noble de Plaisence de Gers).  Le domaine passe ensuite à M. Louis, François, Charles de Ricard,qui sera maire de Montastruc de 1825 à 1830, puis à la famille Barthe de Mandebourg,  par son mariage, le château devient la propriété du célèbre général de Castelnau, le grand chef de larmée française en 14/18, à qui lon doit indirectement la victoire de la Marne ; attribué à Joffre, le château et son sobre et magnifique parc de 2 ha.  Il est racheté en 1903 par monsieur Gaston Ecomard, originaire de Sainte-Pazanne, arrière-grand-père du propriétaire actuel, le vicomte Clicquot de Mentque. descendante de Louise Bonnafont et de Gaston Ecomard.  Aujourd'hui hôtel restaurant.                                                             Lasserre chambres d'hôtes de Jean-Louis et Marie-Claire Baric","architecture":"Château de Lasserade, nouveau château de style classique-Louis XV, reconstruit au XIXe siècle, il est inscrit au titre des monuments historiques le 8 août 2013.  Le château de Lasserade, de style Louis XV, situé sur la commune de Lasserrade a été construit sous la monarchie de Juillet entre 1837 et 1840 à l'emplacement du vieux château médiéval .                                           \r\n LASSERRE  corps de logis rectangulaire à trois niveaux toit en croupes  deux pavillons sur flans légèrement décalé à deux niveaux toit également en croupes.","habitants":"Famille de Bernuy \r\n        \r\n        \"","divers":"Château de Lasserade et de Lasserre","gps":"","images":["../image/image_32/32_Lasserade_1.jpg","../image/image_32/32_Lasserade_2.jpg","../image/image_32/32_Lasserade_3.jpg"]},"Consult_chateau_formulaire47eb":{"id":"Consult_chateau_formulaire47eb","dept":"32","canton":"Auch","commune":"Lasseube-Propre","nom":"Lasseube_Propre","type":"Vestiges","periode":"XIII","histoire":"LASSEUBE-PROPRE, ce n'est pas un puissant château , mais les vestiges d'une ancienne tour que beaucoup qualifient de donjon. Au début du XIIIe siècle, un petit village fortifié semble exister en ce lieu.  Vers 1265, plusieurs chevaliers vivent dans l'enceinte.","architecture":"Ce vestige est une tour à base rectangulaire de 7m x 8m. L'ouverture inférieure n'est évidemment pas l'entrée médiévale qui devait logiquement se trouver à 7m du sol. C'est une porte créée au XIXe ou XXe siècle pour utiliser cet ancêtre comme cabane de stockage. Le mur semble épais, supérieur à 1 mètre.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Vestiges d'une tour à Lasseube-Propre.","gps":"","images":["../image/image_32/32_Lasseube_Propre_1.jpg"]},"Consult_chateau_formulaire6528":{"id":"Consult_chateau_formulaire6528","dept":"32","canton":"Nogaro","commune":"Laujuzan","nom":"Lau_Laujuzan","type":"Château","periode":"XVII","histoire":"LAU-LAUJUZAN, son nom lui vient d'un seigneur, Inigo Lopez de Lod, neveu du roi de Biscaye, qui passa en Navarre et fonda un château dans un faubourg de Lescar, en Béarn. Le château de Lau fut pillé et rasé mais il fut reconstruit et habité.","architecture":"Laujuzan a été fondé au XIe siècle et s'étendait à l'époque sur une surface de 680 hectares. Des vestiges remarquables ont survécu à l'épreuve du temps, notamment à Lau, une importante seigneurie qui a conservé un château du XVIIe siècle en cours de restauration, situé sur un coteau au nord de l'Izaute, un affluent du Midou. Le château de Lau fut pillé et rasé mais il fut reconstruit et habité jusqu'en 1724.  L'édifice est accolé à une aile de l'ancien château, dont il ne reste plus que trois façades formant cour. Après la porte en arc brisé, l'espace voûté est couvert en berceau brisé. Le fond est occupé par une tribune en bois.","habitants":"Inigo Lopez de Lod\r\n        \r\n        \"","divers":"Château de Lau-Lajuzan","gps":"","images":["../image/image_32/32_Lau_Laujuzan_1.jpg","../image/image_32/32_Lau_Laujuzan_2.jpg"]},"Consult_chateau_formulaire7267":{"id":"Consult_chateau_formulaire7267","dept":"32","canton":"Preignan","commune":"Lavardens","nom":"Lavardens","type":"Forteresse","periode":"XII-XVII","histoire":"LAVARDENS, berceau des comtes d'Armagnacs  du XIIe siècle, en 1585, la seigneurie de Lavardens est offerte en récompense à Antoine de Roquelaure par la famille d'Albret. En 1610, Antoine de Roquelaure assiste encore le Roi lors de l'attentat de Ravaillac. En 1615, il obtint le grade de maréchal de France. À partir de 1620, pour l'amour de sa jeune épouse Suzanne de Bassabat, Antoine de Roquelaure entreprend la construction du château actuel sur les fondations médiévales, il meurt en 1625 et ne voit que le début de la reconstruction, son fils Jean -Baptiste-Gaston de Roquelaure poursuit la construction. En 1653, la peste sévit à Lavardens, chasse quelques 200 ouvriers et le château n'est pas achevé à l'étage supérieur, en 1738 passe en héritage aux Rohan Chabot. En 1752, une arrière-petite fille d'Antoine de Roquelaure vend l'édifice à Victor de Riquetti, marquis de Mirabeau qui se ruine en travaux et revend l'ensemble en 1766 à un capitaine des dragons : Laclaverie de Soupex. Une de ses filles, Philippine-Catherine épouse en 1777, le marquis de Pins d'Aulagnières. Celui-ci émigré, mais le château reste dans cette famille jusqu'en 1852, le marquis des Pins  décède en 1849. Vendu à un marchand de biens qui en fait des appartements, en 1938 accueil des réfugiés espagnols. Restauré à nouveau en 1966 partagé par plusieurs propriétaires, en 1979  Hubert Mothe copropriétaire reprend l'entreprise  et en 1986 l'association  de sauvegarde devient propriétaire du château.","architecture":"Lavaredens édifié au XIIe siècle, au XIIIe siècle le deuxième château fut construit de 1620 à 1653. Les fontaines et pièces d'eau sont l'uvre du maître fontainier gascon Jacques Reilhes. Voulant se débarrasser de lédifice, les enfants de Pins ne trouvent pas repreneur en 1850 . La cause : le château était inachevé et vidé de son mobilier sous la Convention en 1793. Le château de Lavardens est donc la proie des marchands de biens qui le lotissent en copropriété en 1852. Douze familles se partagent lensemble de lédifice et faute dentretien la toiture seffondre en 1923. La ruine sinstalle. le château comtal restera à l'état de ruine, la forêt pousse à létage supérieur et en 1957, lorsque la municipalité décrète la destruction en carrière, Vincent Steux arrive sur les lieux et change le destin du château qui est classé monument historique en 1961. Il sera aux mains des spécialistes. Lencorbellement et la toiture sont alors restaurés (1970-75).  Hubert Mothe crée lassociation pour la sauvegarde du château en 1979 avec deux buts essentiels : restauration et animation.","habitants":"Famille d'Antoine de Roquelaure\r\n        \r\n        \"","divers":"Forteresse de Lavardens","gps":"","images":["../image/image_32/32_Lavardens_1.jpg","../image/image_32/32_Lavardens_2.jpg","../image/image_32/32_Lavardens_3.jpg","../image/image_32/32_Lavardens_4.jpg","../image/image_32/32_Lavardens_5.jpg","../image/image_32/32_Lavardens_6.jpg","../image/image_32/32_Lavardens_7.jpg"]},"Consult_chateau_formulaire970f":{"id":"Consult_chateau_formulaire970f","dept":"32","canton":"Lectoure","commune":"Lectoure","nom":"Lectoure_Chateaux","type":"Château","periode":"XV-XVII","histoire":"LECTOURE  Château de Vacquié. (voir article)\r\nChâteau-salle noble de Tulle, mentionnée en 1491 et en 1597 dans le Terrier de Lectoure comme salle noble. Possédé par le dernier évêque de Lectoure à la Révolution, Mgr Louis-Emmanuel de Cugnac. Il ne subsiste que le logis du XVIIe siècle, partiellement détruit et remanié en 1824. Propriété de lavocat et écrivain Alcée Durrieux, puis de lamiral Boué de Lapeyrère.                                                                          Aurignac, possédé par la famille Chastenet de Puységur au XVIIIe siècle, puis vendu à Joseph Monbrun, procureur du présidial de Lectoure en 1782. Le château actuel date du XVIIIe siècle, reconstruit sur la base d'une tour-salle.   Cette salle noble est qualifiée de maison en 1715 au moment où elle est léguée par Guillaume de Chastenet de Puységur à sa femme, Claire de Monlezun,  alors que l'acte de vente intervenu en 1782 entre la baronne Jacques de Chastenet  de Puységur et Joseph Monbrun, procureur du présidial de Lectoure, désigue l'édifice comme un château.                                                                           \r\nChartreuse d'Arton, reconstruite sur un édifice antérieur vers 1870. De nombreux éléments architecturaux proviennent du château d'Aurignac. Possédé par la famille Montal.                                    Chateau Bastard du XVIIIe siècle hôtel  de monsieur  jean-Luc Arnaud                                                                                 \r\nChateau de la Salle de Lesquière,   ancienne salle du XIIIe ou XIVe siècle, remaniée au XVe siècle,  adjonction d' un corps de logis entre 1817 et 1818 pour Jean-Baptiste Fabre, aménagements intérieurs à partir de 1856 pour Ariste Duffour.                                    Salle du Castaing , tour-salle du XIIIe ou XIVe siècle ; adjonction d'une tour d'escalier au XVIIe.","architecture":"Aurignac, l'édifice actuel a pu être construit entre ces  deux dates. Le pigeonnier figure dans la plan cadastral ancien de 1824, ce plan signale   également un autre pigeonnier à l'angle Nord-Ouest des anciennes dépendances.                                                                  Château-salle de Combarrau, l'actuel corps d'entrée est une salle du XIIIe ou XIVe siècle, considérablement agrandie au cours des XVIe ou XIXe siècles.                                                                             Château-salle de Crabé, ancienne salle du XIIIe ou XIVe siècle, remaniée au XVe siècle. Adjonction de corps de logis en 1817. Aménagements intérieurs à partir de 1856 pour la famille Dufour.                  Château-salle de la Cassagne Salle fortifiée au XVIe siècle pour Mademoiselle de Bordis, agrandie au XVIIe siècle pour Mademoiselle de Cère.                                                            Château de la Coupette, construit à la fin du XVIe ou au début du XVIIe siècle. Actuellement exploitation agricole.                                                                             Château de Cujon Édifice du XVIIe siècle, remanié au XIXe.                                                                                Château de Hustarrau  de Pitrac, Ancienne salle, agrandie pour Jean-François Pérès, sieur de Hustarrau, au XVIIe siècle ; remaniée au XIIIe ou XIVe siècle.                                                                               Château de Castel-Picon, salle du XIVe siècle mentionnée dès 1491, avec son seigneur Michel de Lisle. Reconstruite au XVIe siècle, puis au XVIIe. Possédée par la famille Chastenet de Puységur. Remaniée aux XIXe-XXe siècles.","habitants":"Mgr Louis-Emmanuel de Cugnac                                                  Famille Montal                                                                                     Famille Dufour                                                                                      Famille deJean-François Pérès                                             \r\nFamille Chastenet de Puységur\r\n        \r\n        \"","divers":"Plusieurs châteaux à Lectoure, celui d'Aurignac, d'Arton, Bastard, de la Salle de Lesquière et du Castaing, de Combarrau, de Cabré, de Hustarrau de Pitrac.","gps":"","images":["../image/image_32/32_Lectoure_Chateaux_1.jpg","../image/image_32/32_Lectoure_Chateaux_2.jpg","../image/image_32/32_Lectoure_Chateaux_3.jpg","../image/image_32/32_Lectoure_Chateaux_4.jpg","../image/image_32/32_Lectoure_Chateaux_5.jpg","../image/image_32/32_Lectoure_Chateaux_6.jpg","../image/image_32/32_Lectoure_Chateaux_7.jpg","../image/image_32/32_Lectoure_Chateaux_8.jpg"]},"Consult_chateau_formulaire28ca":{"id":"Consult_chateau_formulaire28ca","dept":"32","canton":"Lectoure","commune":"Lectoure","nom":"Lectoure_Patrimoine","type":"Forteresse","periode":"XVI","histoire":"LECTOURE, c'est au milieu du XIVe siècle que Lectoure entre dans la mouvance des comtes d'Armagnac, mais c'est à Lectoure qu'ils établissent la capitale de tous leurs états et qu'ils installent leur château-résidence à l'extrémité ouest de l'éperon, sur les vestiges d'un château préexistant. Lors des guerres franco-anglaises les Armagnacs prennent le parti du roi de France mais Jean IV et Jean V ont une politique moins claire et leurs possessions sont si grandes qu'elles inquiètent les rois de France. Au XVe siècle le château subit d'importantes destructions puis il est ensuite réparé et aménagé jusqu'au XVIIe siècle par le pouvoir royal devenu propriétaire. On ne connait bien que l'état fin XVIe - XVIIe siècle du château, grâce à un texte et deux plans.   Après que Louis XV lui ait fait don du vieux château de Lectoure, l'évêque Claude François de Narbonne-Pelet fait construire un grand hôpital de plan en U, à l'emplacement des vestiges, de 1758 à 1766. Le double bastion Est séparant le château de la ville est supprimé, le niveau du sol est élevé. Et c'est cette aile qui est parvenue jusqu'à nous. L'effondrement du bastion nord du château survient au cours du XIXe siècle, après 1824, puisque ce dernier est encore représenté sur le cadastre ancien en tant que cimetière des soeurs de l'hôpital. L'Elévation Est de la moitié nord des vestiges du château n'est pas encore refaite en 1824, elle sera au cours du XIXe siècle.","architecture":"Seule l'extrémité ouest du château de Lectoure est conservée pour servir de dépendance. Avant son effondrement au cours du XIXe siècle, le bastion nord sert de cimetière aux soeurs.  \r\nLaxe principal est constitué par la rue nationale, ancienne rue royale et rue impériale, où se trouvent plusieurs hôtels particuliers des XVIIe et XVIIIe siècles, la tour d'Albinhac du XVIIe siècle, dernière des  maisons fortes  subsistant du Moyen-Âge, le portail des Cordeliers, sur l'emplacement du château des comtes dArmagnac. Au Nord et au Sud, les boulevards suivent le tracé des anciens remparts de la ville, encore présents bien que portes fortifiées et tours aient disparu : le boulevard du Nord à la base des remparts, et le boulevard du Midi établi sur lancien chemin de ronde. La seule tour conservée à l'est, à langle nord-est, la tour du Bourreau du XIVe siècle, tour dAlbinhac.\r\nHôtel de ville et sa salle des illustres. On apprend l'existence de deux éléments aujourd'hui disparus : une aile sud et une entrée Est protégée par deux tours rondes. Entre 1583 et 1590 le château est séparé de la ville par un double bastion aux dimensions imposantes et un plus petit bastion est construit au nord. Une partie du château sert de prison.","habitants":"l'évêque Claude François de Narbonne-Pelet \r\n        \r\n        \"","divers":"tour  du Boureau et autres châteaux du patrimoine à Lectoure","gps":"","images":["../image/image_32/32_Lectoure_Patrimoine_1.jpg","../image/image_32/32_Lectoure_Patrimoine_2.jpg","../image/image_32/32_Lectoure_Patrimoine_3.jpg","../image/image_32/32_Lectoure_Patrimoine_4.jpg","../image/image_32/32_Lectoure_Patrimoine_5.jpg","../image/image_32/32_Lectoure_Patrimoine_6.jpg","../image/image_32/32_Lectoure_Patrimoine_7.jpg"]},"Consult_chateau_formulairef54c":{"id":"Consult_chateau_formulairef54c","dept":"32","canton":"Lectoure","commune":"Lectoure","nom":"Lectoure_Vacquier","type":"CHartreuse","periode":"XIV","histoire":"VACQUIER, un Vaquier qui fut sénéchal de Lectoure, connu par lélégie sur la mort du sénéchal Vacquier du poète lectourois André Du Pré. Il est probable quune ancienne chapelle, dédiée à saint Mamet, existait à cet emplacement et avait donné son nom au plateau parallèle au nord à celui de la ville de Lectoure. Le château a appartenu aux Pâris, une famille de robe installée de longue date à Lectoure, et qui a ajouté à son nom celui de Vacquier. Les Pâris font partie de ces familles de la bourgeoisie et de la petite noblesse qui adhérèrent très vite au mouvement janséniste : dans leur maison de maître de Vacquier. Louis Pâris-Vacquier de Villers fils dun conseiller à la sénéchaussée. Il sera contraint de sexiler à Utrecht, tandis que son frère, avocat, demeure à Lectoure. En 1784, M. de Pâris remplace sa vieille maison par un château.","architecture":"Le corps principal du bâtiment est rectangulaire, avec un pavillon légèrement saillant à chaque extrémité. Il est couvert dun toit à deux ressauts, la partie haute en tuiles canal, la partie basse en tuiles rondes plates. Des lucarnes sélèvent sur la partie basse du toit. On arrive au château par lEst, par une cour dhonneur carrée bordée au nord par les communs. À lopposé du bâtiment, à lOuest, la pente a permis dajouter un double perron avec un garde-corps formé de balustres typiques de la région lectouroise de lépoque. Une terrasse à deux niveaux, plantée de marronniers, se termine par un petit bassin circulaire. Une petite chapelle se trouve au nord-ouest du bâtiment principal.\r\nLe plan sorganise sur un long couloir central qui court sur la longueur du bâtiment. On entre par la porte principale dans un  vestibule  qui sert de salle à manger. Des salons de compagnie et de jeu, un  atelier , des cabinets de toilette et des  lieux à langlaise  témoignent dune vie simple, sans apparat, mais avec un souci de confort. Un escalier mène aux pièces sous les combles. Des caves doublent la superficie du bâtiment.","habitants":"Famille de Pâris\r\n        \r\n        \"","divers":"Château de Vacquier à Lectoure","gps":"","images":["../image/image_32/32_Lectoure_Vacquier_1.jpg"]},"Consult_chateau_formulaired8ad":{"id":"Consult_chateau_formulaired8ad","dept":"32","canton":"Lectoure","commune":"Ligardès","nom":"Ligardès","type":"Château","periode":"XV-XVIII","histoire":"Deux châteaux à Ligardès bastide avec porte d'entrée de la ville, vestiges d'une tour, château  celui de Bazignan et celui de Campaigno  et la maitairie  Germain.                                                                           BAZIGNAN, Geneviève Doussau née en 1943 au château de Bazignan à Ligardes, Geneviève Doussau de Bazignan était la sixième d'une fratrie de douze enfants. De son métier de directrice des études à l'Institut supérieur de gestion de Paris, elle appréciait le côté ouvert sur les autres et était entourée de beaucoup d'amis,   gites de France.                                                                   CAMPAIGNO, Jusqu'au XVe siècle, le château était un fief des Révignan, vassaux du marquis de Firmaçon et co-seigneurs de Ligardes. En 1446, Jeanne de Revignan épouse Bernard de Patras qui adjoint à son nom celui de l'ostal de Campaigno. L'ensemble devient possession de la famille de Soubairan lorsque Jean-François de Soubayran épouse, le 5 février 1719, Paule de Patras de Campaigno, fille de Bernard de Patras. Les Campaigno conservèrent la propriété jusqu'au XIXe siècle, actuellement le château de Campaigno appartient à la famille de Redon.","architecture":"Bazignan corps de logis rectangulaire à trois niveaux  toit en croupes, l'édifice est flanqué en retour d'équerre de bâtiments de dépendances à deux niveaux formant une cour d'honneur                                                  Campaigno, la construction du château actuel est postérieure à cette alliance. Toutefois rien ne vient préciser la date exacte à laquelle est intervenue la reconstruction de l'ancienne salle médiévale, ni quel fut le maître d'oeuvre.  Corps de logis rectangulaire à deux niveaux flanqué en façade d'un fronton triangulaire sur deux travées accolés aux extrémités de pavillons carrés et sur l'arrière deux pigeonniers  à toit brisés.","habitants":"Famille de Soubairan \r\n        \r\n        \r\n        \"","divers":"Porte tour, château de Bazignan, de Campagno et la maitérie Germain à Ligardès","gps":"","images":["../image/image_32/32_Ligardes_1.jpg","../image/image_32/32_Ligardes_2.jpg","../image/image_32/32_Ligardes_3.jpg","../image/image_32/32_Ligardes_4.jpg","../image/image_32/32_Ligardes_5.jpg","../image/image_32/32_Ligardes_6.jpg"]},"Consult_chateau_formulaire5679":{"id":"Consult_chateau_formulaire5679","dept":"32","canton":"Mirande","commune":"St-Maur","nom":"Loran","type":"Château","periode":"XVIII","histoire":"LAAS à quelques kilomètre de Saint-Maur, le château de Laas est la propriété d'une société privée.                                                                            LORAN à St-Maur chambres d'hôtes","architecture":"Le Château de Laas est une Ferme-Manoir bâti à Laas, est une Ferme-Manoir dont le corps de bâtiment central est flanqué de part et d'autre de deux ailes formant une cour. Le rez-de-chaussée est surmonté d'un étage de fenêtres. Dans l'axe, une porte-fenêtre plus grande est délimitée par un arc surbaissé. Elle est surmontée d'une seconde porte-fenêtre donnant accès à un balcon en fer forgé. Cet élément central est couronné d'un fronton triangulaire. Pas de décor intérieur. L'accès à la tour se fait par un porche ouvert dans la base de la tour-pigeonnier, laquelle porte le millésime 1755.                                                                               LORAN corps de logis rectangulaire à deux niveaux toit en croupe entre deux tours carrées de trois niveaux flanqué de toit quatre pans à l'impérial.","habitants":"\"","divers":"Chateau de Loran à Saint-Maur et de Laas commune voisine.","gps":"","images":["../image/image_32/32_Loran_1.jpg","../image/image_32/32_Loran_2.jpg","../image/image_32/32_Loran_3.jpg","../image/image_32/32_Loran_4.jpg"]},"Consult_chateau_formulaire4657":{"id":"Consult_chateau_formulaire4657","dept":"32","canton":"Mirande","commune":"Loubersan","nom":"Loubersan","type":"Forteresse","periode":"XIV","histoire":"LOUBERSAN, Galaubie de Panassac : sénéchal de Guyenne du XIVe siècle, seigneur de Lobersan, il a fait édifier autour de 1331 les deux tours, transformant ainsi le manoir en forteresse. Sa fille Jeanne de Panassac épouse en 1340 Bernard V de Castelbajac au château de Loubersan qui devient ainsi le berceau de la branche aînée des Castelbajac ; la dot de Jeanne comprenait le château de Bernet où le couple s'établit à partir de 1349, ajoutant ainsi le patronyme de Bernet à celui de Castelbajac.  Le grand bouleversement architectural se fait au XVe siècle avec l'arrivée d'un grand seigneur : Galaubie de Panassac, sénéchal de Guyenne, qui de retour de son épopée avec Jeanne d'Arc aux côtés de Galard,  Xaintrailles, la Hire. La famille d'Antras possède le château au XVIIe puis un procès l'oppose aux Rohan-Chabot, qui transforment Loubersan en rendez-vous de chasse.\r\nAu XVIIIe siècle, c'est la famille de Bourdonnié qui  a acheté l'antique demeure.   Au XXe siècle le destin de Loubersan bascule, le château sert tour à tour de ferme, de stock à grain, et temporairement de refuge pour des enfants. L'acteur Jean Marais y sera en garnison. Il a été racheté en 1993 par le couturier Jean-Charles de Castelbajac.","architecture":"Loubersan est un long bâtiment avec des meurtrières au rez-de-chaussée, les grandes ouvertures n'étant qu'au premier étage, de part et d'autre de la salle et des logis seigneuriaux, il est surmonté par un chemin de ronde, cerné de mâchicoulis. Il reste dans cette famille durant quatre siècles. Lensemble est alors entouré de douves en eaux. La chapelle seigneuriale est alors à l'Est hors de l'enceinte, entourée du cimetière. Le village est alors au sud-est du château dans une combe transforme l'antique manoir en forteresse imprenable. La construction vers le nord d'une enceinte carrée de plus de 5 mètres de haut, et la ponctuation de deux tours massives aux angles, font du château de Loubersan une place forte, remarquable et rare dans le paysage bigourdan.  L'appareillage militaire des tours est impressionnant, plus de 26 bouches à feu les ponctuent  Jean et Gaspard Bureau introduisent l'artillerie dans l'ost royale, amenant à l'ultime victoire de Castillon  rendant tout assaut improbable. Fait assez rare pour être noté, les tours rondes sont carrées à l'intérieur et leurs murs font jusqu'à 1,90 m de large. Le corps de logis principal, construit en pierre jaune, domine la vallée.\r\nDes fortifications restent du côté nord les deux tours reliées par le mur d'enceinte. Sur les autres côtés elles ont été remplacées par d'un côté des cuisines, de l'autre une chapelle au plafond peint en bleu de Lectoure pastel des teinturiers.  Les oubliettes, cachots et souterrains font partie intégrante de son architecture.","habitants":"Galaubie de Panassac\r\n        \r\n        \"","divers":"Château de Loubersan","gps":"","images":["../image/image_32/32_Loubersan_1.jpg","../image/image_32/32_Loubersan_2.jpg","../image/image_32/32_Loubersan_3.jpg","../image/image_32/32_Loubersan_4.jpg"]},"Consult_chateau_formulaire6d86-2":{"id":"Consult_chateau_formulaire6d86-2","dept":"32","canton":"St-Clar","commune":"Magnas","nom":"Magnas","type":"Château","periode":"XVI","histoire":"MAGNAS, la commune de Magnas tire son origine de la famille Manas qui possédait la seigneurie de Marsac en 1277 et le château d'Avezan en 1285, il s'agissait de Sans Garcie de Manas seigneur d'Avezan dont la compagnie était au service du Roi d'Angleterre et qui se chargea en 1388 de détruire le village d'Enconde proche de Maubec. Restauration par Clément Parent à la fin du XIXe siècle et une  partie a été modelée ou construite par Hector de Galard à la fin du XIXe siècle.","architecture":"le château  de Magnas est un vaste édifice remanié du XVIe siècle consistant en deux tours carrées et une circulaire. Le logis actuel du XVIIIe siècle a été reconstruit, aménagé de 1881 à 1884,  les parties anciennes du château remontent au XVIe siècle. Sur une importante cave voûtée en plein cintre, s'élève un bâtiment percé d'une porte en plein cintre et d'une fenêtre à croisillon et meneau. Il est cantonné d'une tour circulaire donnant sur les jardins autrefois à la française. Le château actuel, bordant la cour en équerre, est cantonné de deux tours carrées et prolongé au sud par la chapelle. Un porche situé entre la chapelle et les écuries permet de contourner le château. La partie ouest, côté jardin, est bordée d'une terrasse dominant un fond de vallon.","habitants":"Famille Manas\r\n        \r\n        \"","divers":"Château de Magnas","gps":"","images":["../image/image_32/32_Magnas_1.jpg","../image/image_32/32_Magnas_2.jpg","../image/image_32/32_Magnas_3.jpg","../image/image_32/32_Magnas_4.jpg","../image/image_32/32_Magnas_5.jpg","../image/image_32/32_Magnas_6.jpg","../image/image_32/32_Magnas_7.jpg","../image/image_32/32_Magnas_8.jpg"]},"Consult_chateau_formulaireeea4":{"id":"Consult_chateau_formulaireeea4","dept":"32","canton":"Eauze","commune":"Mansencôme","nom":"Mansencome","type":"Château","periode":"XIII","histoire":"Deux châteaux à Mansencôme celui de Mansencôme et celui de Busco Maniban  (voir Article). Au centre du village s'élève un   château gascon  du XIIIe siècle. Semblable à ses voisins, les châteaux de Lagardère et du Tauzia (voir article).                                  MANSENCOME, château gascon  qui date du XIIIe siècle. Semblable à ses voisins, les châteaux de Lagardère et du Tauzia, le château de Mansencôme est le mieux conservé, a été construit et  resté pendant plusieurs siècles la propriété de la famille Lasseran. En 1319, Vital de Lasseran rend hommage au comte dArmagnac. En 1636, Louis XIII érige les terres de Mansencôme en baronnie. En 1736, François de Lasseran Monluc vend le château au marquis Gaspard de Maniban, qui entreprend des travaux pour laméliorer, rapidement interrompus par manque dargent. Après la Révolution Française, le château très abîmé change très souvent de propriétaire.  En 1927, le château est inscrit aux Monuments Historiques.","architecture":"Mansencôme, les  tours sont construites,  sur les 2 angles opposés en diagonale. L'architecture avait prévu d'en construire 4  et que la construction s'est figée à 2, mais cela donne à cette bâtisse une caractéristique rare. Quoique,  pas si rare que cela, le château de Tauzia à quelques kilomètres lui ressemble un peu.\r\n Les tours elles ne sont pas identiques :  Celle de gauche à l'Ouest semble être le donjon. Évidemment ses dimensions ne la rendent pas habitable. Sa fonction devait être la défense et le repli. La tour de droite à l'Est donc,  possède en partie basse une porte. Ou un donjon-porte comme à Quillan. Au sommet, les créneaux ont disparus. Il mesure 15m x 18m, il est composé de 2 étages avec un rez de chaussée. Différentes époques de construction  sont visibles. Des murs épais de défense aucune archère, même bouchée, puis une magnifique fenêtre géminée, et enfin des classiques ouvertures à meneaux en croix.","habitants":"Famille Lasseran\r\n        \r\n        \"","divers":"Château de Mansencome","gps":"","images":["../image/image_32/32_Mansencome_1.jpg","../image/image_32/32_Mansencome_2.jpg","../image/image_32/32_Mansencome_3.jpg","../image/image_32/32_Mansencome_4.jpg","../image/image_32/32_Mansencome_5.jpg","../image/image_32/32_Mansencome_6.jpg"]},"Consult_chateau_formulaireb492":{"id":"Consult_chateau_formulaireb492","dept":"32","canton":"Marciac","commune":"Marciac","nom":"Marciac","type":"Château","periode":"XIII-","histoire":"Quatre châteaux au village voisin de  Marciac  dont celui d'Armentieux,  de Juillac,  de Guitou.                                    MARCIAC,  est une bastide royale, fondée à la toute fin du XIIIe siècle en 1298 à la suite d'un paréage entre Étienne de Lupé, abbé de la Case-Dieu, Arnaud-Guilhem III, comte de Pardiac et le sénéchal de Toulouse, Guichard de Marzé, qui construisit la bastide, lui donna ses coutumes et lui laissa son nom. Les coutumes furent confirmées en 1300 par le roi de France Philippe IV le Bel. La ville originelle était entourée d'une enceinte percées de huit portes, comportant des tourelles tout  autour de laquelle était creusé un large fossé. De larges privilèges firent le succès rapide de cette bastide.                                                               JUILLAC, chambres d'hôtes  d'Yves et Héléne Rességuier, Juillac à 1 km : Yves et Hélène vous accueillent dans une chartreuse du XVIIIe siècle, grand parc ombragé et fleuri aux arbres centenaires, dominant les coteaux gersois, vue jusqu'au Pyrénées.                                                                      ARMENTIEUX, pas d'information historique.","architecture":"Armentieux, corps de logis central rectangulaire  à trois niveaux   avec fronton  accolé de deux édifice carrés  en retrait   de quatre travées chacun à toit presque plats.                                                                                  Juillac ensemble de construction quadrangulaire avec en façade principale le corps de logis   de deux niveaux avec   tours rectangulaires en angles.                                                     Château de Guitou corps de logis rectangulaire  avec fronton triangulaire en façade accolé à   un bâtiment rectangulaire de trois niveaux.\r\nChâteau de Saint-Christaud, dit de Garac, corps de logis rectangulaire à deux niveaux toit en croupe surmontée sur partie centrale d'un toit réduit en ardoises, bâtisse accolée, d'un côté d'une tour polygonale crénelée à mâchicoulis et à l'opposé d'une tour carrée à trois niveaux,  pas d'information historique.","habitants":"Famille Pébéreau                                                                          Famille de Résséguier\r\n        \r\n        \"","divers":"Marciac château  dont celui d'Armentieux,  de Juillac, de Marciac,  de Guitou  et de St-Christaud","gps":"","images":["../image/image_32/32_Marciac_1.jpg","../image/image_32/32_Marciac_2.jpg","../image/image_32/32_Marciac_3.jpg","../image/image_32/32_Marciac_4.jpg","../image/image_32/32_Marciac_5.jpg","../image/image_32/32_Marciac_6.jpg","../image/image_32/32_Marciac_7.jpg","../image/image_32/32_Marciac_8.jpg"]},"Consult_chateau_formulaire78ba":{"id":"Consult_chateau_formulaire78ba","dept":"32","canton":"Pardiac-Rivière -Basse","commune":"Bars","nom":"Marignan_Gers","type":"Château","periode":"XVII","histoire":"MARIGNAN, la famille de Lasseran-Mansencôme se perpétua dans la seigneurie de Moncla, jusqu'à messire François de Lasseran, seigneur de Mansencôme et de Moncla, qui mourut sans postérité en 1725. La seigneurie,  acheté par Jean-Bernard Seissan de Marignan, président présidial au sénéchal d'Auch, qui déjà possédait dans le voisinage des terres considérables et le château de Marignan. Ses descendants sont encore propriétaires de Moncla, aujourd'hui vendue par morceaux.  à partir de 1725, fut habité par un bordier. Le 12 avril 1728, par acte notarié, Jean-Bernard de Seissan de Marignan, conseiller du Roy et premier président au présidial d'Auch, qui avait en son château de Marignan une chapelle domestique.  Le 25 août 1868 est décédé au château de Marignan près Mirande, monsieur Jean-Charles-Louis-Théophile de Seissan, baron de Marignan, inscrit dans l'arbre filiatif de Caumon-Dade.  Il a laissé  Thérèse, Marguerite, Lucie, Antoine de Marignan, sous la tutelle de la noble descendante du vaillant Robert Knolle. Plus proche de nous l'ouvrage \"Ces grandes familles qui ont fait la France\", nous donne quelques informations contemporaines sur un événement survenu au château :  Hector de Galrad Terraube est marié avec   Patricia Monnoyeur a aussi des origines gasconnes par sa grand-mère, née Anne de Seissan de Marignan, et le mariage a eu lieu  au château, au mois d'octobre 1969.","architecture":"Le château  de Marignan construit au XVIIe siècle est remanié dans la première moitié du XVIIIe siècle. Pigeonnier hexagonal sur arcades en plein cintre, dont l'accès se fait par un escalier à vis en pierre, ménagé dans un noyau central circulaire sur lequel reposent les poutres du plancher. Il est dépourvu de boulins et est ceinturé à deux reprises par deux corniches évidées à l'intérieur, ayant pour but d'empêcher les bêtes nuisibles d'y pénétrer. La toiture est surmontée d'un lanternon pyramidal à base carrée. Mis a part une mention relativement succincte du ministère de la culture qui nous apprend que le château de Marignan est doté d'un pigeonnier datant de la seconde moitié du XVIIIe siècle, il faut se tourner vers diverses archives en ligne pour en apprendre un peut plus sur cette bâtisse.","habitants":"Jean-Bernard de Seissan de Marignan\r\n        \r\n        \"","divers":"Château de Marignan","gps":"","images":["../image/image_32/32_Marignan_Gers_1.jpg","../image/image_32/32_Marignan_Gers_2.jpg","../image/image_32/32_Marignan_Gers_3.jpg"]},"Consult_chateau_formulaire8431":{"id":"Consult_chateau_formulaire8431","dept":"32","canton":"Auch-2","commune":"Marsan","nom":"Marsan","type":"Château","periode":"XVIII","histoire":"MARSAN, dès le XIIe siècle ce village appartient à la famille de Montesquiou. Vers 1170, elle fortifia l'église pour faire face à une agression du comte Bernard d'Armagnac qui à l'occasion d'un conflit avec l'archevêque d'Auch, s'empara de la forteresse et fit raser le castrum de Marsano habité d'abord par les anciens barons de Montesquiou. C'est actuellement la résidence de Aimery de Montesquiou-Fezensac d'Artagnan, dit  duc de Montesquiou-Fezensac, ancien député, député européen et sénateur du Gers. Fut reconstruit au XVIIIe siècle et au XIXe siècle.  Depuis cette date il est resté dans la famille de Montesquiou. La branche subsistante de cette famille en hérita en 1913 à l'extinction de la branche de Marsan. Le château de Marsan appartient, aujourd'hui, au sénateur Aymeri de Montesquiou. Le château fait lobjet dun classement au titre des monuments historiques depuis le 23 août 1991","architecture":"le comte d'Armagnac  fait rasé Le castrum de Marsanoest fut ensuite rebâti avec la contribution du chapitre de Sainte-Marie d'Auch. L'ancienne forteresse subit diverses modifications au cours des siècles, notamment après les ravages des guerres de religions.\r\nUn nouveau château fut construit sur le même emplacement au XVIIIe siècle. Les transformations essentielles datent de 1750. À partir de 1833, la tour carrée du sud-ouest est terminée et la couverture est réalisée.  Les éléments primitifs ont probablement été repris dans les fondations du château actuel. Les transformations essentielles datent de 1750, jusqu'en 1770, la route royale Toulouse-Auch traversait l'actuelle cour d'honneur entre l'église et le château. A partir de 1833, la tour carrée du sud-ouest est terminée et la couverture est réalisée. Le château présente deux ailes perpendiculaires délimitant une cour d'honneur bordée au nord par les communs dessinant un U fermé par une grille et l'ancienne chapelle devenue l'église paroissiale. La façade sud est cantonnée de deux tours carrées. Le rez-de-chaussée présente les pièces d'apparat. A l'étage, se trouvent les chambres avec des tapisseries et un décor de gypserie.","habitants":"Famille de Montesquiou\r\n        \r\n        \"","divers":"Château de Marsan","gps":"","images":["../image/image_32/32_Marsan_1.jpg","../image/image_32/32_Marsan_2.jpg","../image/image_32/32_Marsan_3.jpg","../image/image_32/32_Marsan_4.jpg"]},"Consult_chateau_formulaire309e":{"id":"Consult_chateau_formulaire309e","dept":"32","canton":"Lectoure","commune":"Marsolan","nom":"Marsolan","type":"château","periode":"XV","histoire":"Deux châteaux à Marsolan celui de Bouziques et celui de Liet.   MARSOLAN, l'édifice se trouve actuellement au centre d'une exploitation agricole. Mention en 1555 de noble Pons du Bouzetet de Roquepine de Lassalle au château de Las Bouzigues.   L'histoire de Marsolan au Moyen-Age est assez mal connue. Le territoire de Marsolan dépendait de la seigneurie de Fimarcon. La fondation du castelnau s'inscrit probablement dans le mouvement général de création de ces villages au XIIIe siècle. Le village de Marsolan paraît s'être formé en trois temps. Un castelnau de plan quadrangulaire semble avoir été élevé entre le château disparu, à l'ouest et l'église, à l'est. Ce faubourg parait enfin avoir été fortifié comme témoignent les vestiges de la porte visibles à l'ouest du village.","architecture":"Le village de Marsolan conserve quelques vestiges de son passé de castelnau médiéval, notamment  dans sa morphologie générale et au niveau des fortifications.   Ce faubourg parait enfin avoir été fortifié comme témoignent les vestiges de la porte visibles à l'ouest. La mise en oeuvre de la fortification du faubourg est identique à celle du castelnau. Elle peut être attribuée à la fin du XIIIe siècle ou au début du XIVe siècle. Les maisons de Marsolan ont pour la plupart été remaniées aux époques moderne et contemporaine. Seule une maison située dans l'angle nord-est du village,  présente des maçonneries médiévales similaires à celles de la fortification. La maison  conserve plusieurs éléments architecturaux de la fin du Moyen-Age ou du début de l'époque moderne. Cependant, la plupart de ceux-ci semblent être utilisés en remploi.","habitants":"seigneurie de Fimarcon\r\n        \r\n        \"","divers":"Château de Bouzigues et de Marsolan","gps":"","images":["../image/image_32/32_Marsolan_1.jpg","../image/image_32/32_Marsolan_2.jpg","../image/image_32/32_Marsolan_3.jpg"]},"Consult_chateau_formulaire1484":{"id":"Consult_chateau_formulaire1484","dept":"32","canton":"Lectoure","commune":"Mas-d","nom":"Mas_Auvignon","type":"Château","periode":"XIV-XVIII","histoire":"MAS-AUVIGNON, ce château a été construit au temps dOdon II de Fimarcon de 1250 à 1314,  il est mentionné dans un texte de 1337. Il appartenait à Bernard Trencaléon (1314-1377), très lié au roi Edouard Ier, ce qui expliquerait les analogies architecturales avec des constructions anglaises de lépoque.","architecture":"Mas dAuvignon, bâti sur une bute, cest un village a rue fortifié, au plan régulier, que termine à lOuest un grand château de la fin du XIIIe siècle. Jusquà la Révolution, le village sappelait le Mas de Fimarcon. Des pans de muraille encore importants restent visibles autour du village, ainsi quune portion de fossé réaménagée vestiges de douves également visibles au sud. Une tour-porte est conservée à lEst à lentrée de la rue, dans laxe de la tour-porte du château. Des vestiges dune seconde tour-porte apparaissent au nord-ouest.\r\nle château datant de la fin du XIIIe siècle, château reconstruit dans la 2e moitié du XVIIe siècle, en conservant quelques murs de l'édifice antérieur ; reconstruction partielle au XVIIIe siècle, très remanié.  Le bâtiment présente un quadrilatère irrégulier délimitant une cour centrale dont le niveau est élevé par rapport aux fossés. Les courtines subsistent jusquau niveau du chemin de ronde, le mur denceinte est cantonné aux angles de quatre tours hexagonales et dune quadrangulaire jouant le rôle de donjon. Laccès se fait à louest par un portail flanqué dune échauguette carrée. Le deuxième accès de faisait par un passage ménagé à lest, à la base de la tour carrée, protégé à lextérieur par une bretèche. A louest et à l
