 en 1805 par un enfant du pays, négociant à Bordeaux et pendant la période révolutionnaire, acquéreur de biens nationaux. La famille Pébereau  a acquis cette propriété en 1990. Sans oublier un parc très équilibré ainsi qu'une salle de papiers peints restitués dans l'état d'origine panoramique du début XIXe siècle inscrite à l'inventaire des monuments historiques.","architecture":"Argenteins,  fut conçu par des architectes bordelais. Il se caractérise par des frontons  en mitre, des baies et par les cannelures à arêtes vives  en plein cintre du rez-de-chaussée,   pendant la Révolution française, ce qui lui a permis de s'enrichir.   La première mention du château remonte à 1805. L'édifice est significatif de l'architecture de la période révolutionnaire de la Gascogne gersoise. A l'intérieur, la disposition elliptique de la salle-de-manger et semi-elliptique du grand salon, témoignent d'une certaine recherche. Le château a connu un décor important de papier peint, comme en témoignent les traces visibles sous les papiers récents. Un ensemble presque intact de panoramiques orne le salon à l'est. Il s'agit de papiers peints à la main, représentant des bergeries sur fond de paysages champêtres. Les dépendances droite et gauche oblongue à un niveau entourent une cour immense se terminant par deux pavillons carrés à toits à quatre pans flanqués de petites lucarnes sur chaque pans.","habitants":"Famille Pébereau \r\n        \r\n        \r\n        \r\n        \"","divers":"Château d'Argenteins à Sainte-Radegonde","gps":"","images":["../image/image_32/32_Argenteins_1.jpg","../image/image_32/32_Argenteins_2.jpg","../image/image_32/32_Argenteins_3.jpg","../image/image_32/32_Argenteins_4.jpg","../image/image_32/32_Argenteins_5.jpg","../image/image_32/32_Argenteins_6.jpg","../image/image_32/32_Argenteins_7.jpg"]},"Consult_chateau_formulairedd1c":{"id":"Consult_chateau_formulairedd1c","dept":"32","canton":"Plaisance","commune":"Couloumé-Montdebat","nom":"Arlens_St_Gervazy","type":"Château","periode":"XVIII","histoire":"Trois  châteaux à Couloumé-Mondebat  dont  celui d'Arlens  de Richard Pouces hôtel et de Saint-Gervazy et de Couloumé (voir article).     Pas d'information historique pour Arlens et de Saint-Gervasy.","architecture":"Arlens,  de plan rectangulaire à deux niveaux et série de cinq lucarnes  sur le toit à deux pans accolés sur les extrémités de deux tours rectangulaires à trois niveaux.                                                                            Plaisance, tour carrée, vestige de l'ancien rempart du village, détruit au XVIIIe siècle. Elle fut un temps prison, durant la Révolution. Française.                                                                          St-Gervasy, manoir  de plan rectangulaire à deux niveaux et attiques accolés de deux tours carrées à trois niveaux toit à l'impérial, la bâtisse est prolongé sur les flans  de bâtiments de dépendance à deux niveaux.","habitants":"Famille d'Armagnac\r\n        \r\n        \r\n        \"","divers":"Château d'Arlens et de Saint-Gervasy à Couloumé -Mondebat","gps":"","images":["../image/image_32/32_Arlens_St_Gervazy_1.jpg","../image/image_32/32_Arlens_St_Gervazy_2.jpg","../image/image_32/32_Arlens_St_Gervazy_3.jpg","../image/image_32/32_Arlens_St_Gervazy_4.jpg","../image/image_32/32_Arlens_St_Gervazy_5.jpg"]},"Consult_chateau_formulaire6c34":{"id":"Consult_chateau_formulaire6c34","dept":"32","canton":"Auch","commune":"Auch","nom":"Auch_Chateaux","type":"Château","periode":"XV-XVII","histoire":"AUCH; quatre châteaux celui des Marin du XVIe siècle, de Castagné, de St-Criq (voir article),  des Charmettes  est devenu un hôtel-restaurant.  Le palais des archevêques et  la tour d'Armagnac pour ces deux derniers (voir article suivant)                                      Hôtel de ville d'AUCH ancien château, c'est le fameux intendant de la généralité de Gascogne, Béarn et Navarre, Antoine Mégret dÉtigny, qui fit élever ce bâtiment. Celui-ci aurait été inauguré en 1777 mais il porte sur le fronton la date de 1778.                       MARIN,   plusieurs bâtiments à usage d'habitation, ou bien agricoles sont disposés autour d'une grande cour intérieure.   Propriété de monsieur Manelfe.                                                    La HOURRE, situé  dans le parc du département, actuellement propriété du foyer Ludovic Lapeyrère, a été construit au XVIIe siècle et a été réaménagé successivement aux XIXe siècle et début XXe par les familles David et Decker. Les initiales entrelacées DD sur le tympan du fronton marquent la propriété de ces 2 familles. Irénée David a été maire dAuch sous la Restauration et député du Gers.","architecture":"Auch,  hôtel de ville ancien château pas d'information historique  corps de logis rectangulaire à deux étages à neuf travées avec fronton sur les trois travées centrales et balcon au premier  .                                  Marin, la deuxième moitié du XVIe siècle voit se développer, dans la banlieue d'Auch, des châteaux dont l'architecture révèle qu'il s'agit de maisons fortes où prédomine le souci du confort. Ce château de plan rectangulaire est cantonné d'une tourelle d'escalier à vis dont le dernier étage forme pigeonnier. La façade ouest a été remaniée à l'époque moderne. La façade sud est divisée en deux ailes inégales par la tour hexagonale. Elle présente des arcs en accolade et une fenêtre à meneau cruciforme, élégant château  du XVIe et XXe siècles avec un remarquable espace composé d' arbres centenaires, plusieurs bâtiments à usage d'habitation, ou bien agricoles sont disposés autour d'une grande cour intérieure.                                             La Hourre Les travaux de rénovation qui ont démarré en juin 2014 et dont lachèvement est prévu pour septembre 2015  sinscrivent dans un projet architectural équilibré entre le respect de la charge historique du lieu et lobjectif de fonctionnalité de louvrage finalisé, cette double finalité se traduit par : La création dune extension sur la cour intérieure et rattachée au bâtiment ancien. Elle va permettre de desservir lensemble des locaux au niveau du jardin et à létage du château.                                                      Charmettes; construction de plan rectangulaire  à un niveau flanqué plein cintre d'une tour carrée à toit à quatre pans avec clocheton.","habitants":"Famille d'Antoine Mégret dÉtigny                                                           Famille de David et de Decker\r\n        \r\n        \r\n        \"","divers":"Châteaux de Castagné, des Charmettes, de la Hourre , des Marin et l'Hôtel de ville à Auch","gps":"","images":["../image/image_32/32_Auch_Chateaux_1.jpg","../image/image_32/32_Auch_Chateaux_2.jpg","../image/image_32/32_Auch_Chateaux_3.jpg","../image/image_32/32_Auch_Chateaux_4.jpg","../image/image_32/32_Auch_Chateaux_5.jpg","../image/image_32/32_Auch_Chateaux_6.jpg","../image/image_32/32_Auch_Chateaux_7.jpg","../image/image_32/32_Auch_Chateaux_8.jpg","../image/image_32/32_Auch_Chateaux_9.jpg"]},"Consult_chateau_formulaire71ac":{"id":"Consult_chateau_formulaire71ac","dept":"32","canton":"Auch","commune":"Auch","nom":"Auch_Patrimoine","type":"Palais","periode":"XIV-XVIII","histoire":"AUCH,  le palais des archevêques aujourd'hui préfecture et  la Tour d'Armagnac et  la maison Fedel et d'Henry IV.                                                                PALAIS ARCHEVEQUE, le premier évêque d'Auch apparaît vers 1280.  L'archidiocèse d'Auch dégageait après Strasbourg, Paris et Cambrai le plus de revenus annuels, dus à une dîme importante. La nomination des archevêques d'Auch voyait de longues discussions entre le roi, le pape et les chanoines. L'archevêque d'Auch était jusqu'en 2002, et cela pendant de nombreux siècles, métropolitain d'une immense province ecclésiastique, jadis formée de la Gascogne et de la Navarre française et espagnole.               TOUR-ARMAGNAC  Au XIVe siècle, l'archevêque de Auch fait construire la tour et un bâtiment annexe. Sous l'Ancien Régime, la prison est transformée en salle d'archives épiscopales.  Après 1792, durant la Terreur, cette tour redevient une prison. En 1851, le 2 décembre, c'est le coup d'état de Louis Napoléon Bonaparte. Quelques temps après la tour garde quelques prisonniers. En 1945, la tour du \"Sénéchal d'Armagnac\" est classée aux Monuments Historiques.     Maison d'Henri IV, dans le centre historique, l'intérêt de cette maison à colombage réside dans le magnifique escalier de bois et de pierre que l'on aperçoit dans la cour intérieure.  Petite anecdote historique : Alors qu'il n'était qu'Henri de Navarre, le futur roi Henri IV a en effet séjourné en 1578 dans cette demeure en compagnie de Catherine de Médicis et de Marguerite de Valois, qui deviendra quelques temps plus tard la reine Margot.","architecture":"Tour d'Armagnac,  elle est accrochée à un bâtiment dont les fenêtres  ont des origines diverses.  Même en la contournant, en découvrant les autres faces, cette tour me semble énigmatique.  c'était la prison épiscopale, le dernier étage était une \"vigie\".   Une curieuse échauguette d'angle me fait penser à une tour-escalier desservant le dernier étage. Au sud-est de la cathédrale, la tour dArmagnac domine la ville avec ses 40 mètres de hauteur. Bâtie au XIVe siècle pour servir de prison, elle connut plusieurs fonctions : symbole des attributions judiciaires de l'archevêque au Moyen-Age, dépôt des archives du chapitre sous l'Ancien Régime, prison sous la Terreur gersoise et après le coup d'Etat du 2 décembre 1851.\r\nPALAIS des Archevêques, la place Salinis porte le nom de larchevêque qui décida, avec le Préfet Féart, au XIXe siècle dabattre lancien cloître des chanoines pour créer un îlot de verdure. Un projet daménagement des parties basses de la tour dArmagnac permettra de valoriser sous peu le trésor de la cathédrale, à proximité de lescalier monumental.                    Maison Fedel   a un soubassement percé d'arcs en anse de panier et les murs sont en colombages de chêne garnis de briques rouges.  La maison d'Henri IV,  l'intérêt de cette maison à colombage réside dans le magnifique escalier de bois et de pierre que l'on aperçoit dans la cour intérieure.","habitants":"Archevêque d' Auch\r\n        \r\n        \r\n        \"","divers":"Le Palais des Archevêques, la tour d'Armagnac, la maison Fédel et d'Henri IV à Auch","gps":"","images":["../image/image_32/32_Auch_Patrimoine_1.jpg","../image/image_32/32_Auch_Patrimoine_2.jpg","../image/image_32/32_Auch_Patrimoine_3.jpg","../image/image_32/32_Auch_Patrimoine_4.jpg","../image/image_32/32_Auch_Patrimoine_5.jpg","../image/image_32/32_Auch_Patrimoine_6.jpg","../image/image_32/32_Auch_Patrimoine_7.jpg","../image/image_32/32_Auch_Patrimoine_8.jpg","../image/image_32/32_Auch_Patrimoine_9.jpg"]},"Consult_chateau_formulaire7410":{"id":"Consult_chateau_formulaire7410","dept":"32","canton":"Gimont","commune":"Avensac","nom":"Avensac","type":"Château","periode":"XIV-XIX","histoire":"AVENSAC, du XIIe siècle, le territoire dépendait alors, du point de vue religieux, de la paroisse de Maubec.  Des historiens ont émis l'hypothèse que plusieurs maisons s'élevaient autour de cette église, formant une sorte de petit hameau. Mais ce n'est qu'en 1320, lorsque Béraud Ier de Faudoas, seigneur d'Avensac, décida d'élever un château sur la partie la plus abrupte de la colline, au-dessus et à l'ouest de la vallée de la Gimone pour assurer la défense du territoire, que le village d'Avensac fut réellement fondé. Béraud proposa aux habitants de la région de se regrouper sous les murailles du château, leur offrant ainsi aide et protection et octroya une série de règlements, appelés « Coutumes », qui établissaient les droits et devoirs de la communauté. Petit à petit, se créa sur le territoire alentour à peu près tout ce qui était nécessaire à la vie des habitants.  Le château d'Avensac fait l'objet d'une inscription des monuments historiques depuis le 24 juin 1983.","architecture":"Château reconstruit vers 1830. De l'ancien édifice il ne reste plus que la tour et la porte du XIVe siècle. Large façade à un étage surplombant deux terrasses à flanc de colline. Ce bâtiment se poursuit en arrière plan par deux ailes symétriques délimitant une cour, prolongées par deux bâtiments servant d'orangerie et de garage. La cour est fermée par une grille en fer forgé. \r\nA l'entrée du château et accolé à d'anciennes écuries, se trouve le donjon du XIVe siècle surplombant une poterne. A l'est, prend appui un autre bâtiment qui abrita peut-être la chapelle castrale d'origine. A la base de cet édifice, se trouve un mur ancien et très épais, faisant partie de l'ancien système défensif, il fut remanié au goût du jour à l'occasion de la reconstruction du château. \r\nEléments protégés MH : façades et toitures du bâtiment principal et ses deux ailes ; ancien donjon, actuellement poterne d'entrée ; ancien mur de rempart ; terrasse avec le mur de soutènement et les escaliers : inscription par arrêté du 24 juin 1983.","habitants":"Seigneur Béraud Ier de Faudoas\r\n        \r\n        \"","divers":"Château  d'Avensac et sa porte","gps":"","images":["../image/image_32/32_Avensac_1.jpg","../image/image_32/32_Avensac_2.jpg","../image/image_32/32_Avensac_3.jpg","../image/image_32/32_Avensac_4.jpg"]},"Consult_chateau_formulaire87a3":{"id":"Consult_chateau_formulaire87a3","dept":"32","canton":"Avezan","commune":"Avezan","nom":"Avezan","type":"Forteresse","periode":"XIII-XVII","histoire":"AVEZAN, le château fut une possession des vicomtes de Lomagne. En 1285, il passe par donation dOthon, vicomte de Lomagne et dAuvillar, dans les mains de Sanche Garcie de Manas (ou Raymond Sans de Manas) qui rebâtit le château. Les vicomtes de Lomagne se placent du côté des Anglais dans les conflits incessants qui opposent ceux-ci aux français, espérant ainsi voir préserver leur indépendance vis-à-vis du pouvoir royal français. au décès de Jean II de Manas en 1511  sans héritier le château est abandonné, racheté en 1651 par Alexandre de Larrocan qui fait édifier le massif occidental, puis cest son frère, Jacques de Larrocan, qui en prend possession. Maréchal de camp et armes du roi, il bénéficie de sa confiance comme de celle de Richelieu, et cest sans doute grâce à cela que le château dAvezan nest pas démantelé comme tant dautres à cette époque. Au XVIIe siècle, le château passe aux mains de plusieurs familles qui sen désintéressent et le laissent à labandon. À la Révolution, il est racheté par des métayers puis abandonné. En 1972 Patrice Courneau  avocat à Paris entreprend sa restauration.","architecture":"Le château féodal a été construit  XIIIe siècle, modifié au XVe et XVIIe siècle, sur lemplacement dun château plus ancien dont il ne reste rien. Il faisait partie dun ensemble fortifié qui englobait le village. À lorigine, cest une salle qui constitue le donjon dont les murs épais reposent sur une salle voûtée. Un second corps de bâtiment vient sajouter ensuite : le rez-de-chaussée, ne présente aucune ouverture et on accède au château par une porte haute et un escalier amovible. Le dernier étage est percé de mirandes reliées par un chemin de ronde. Des meurtrières sont les seules ouvertures.\r\nAu XVIIe siècle, on construit le corps occidental et on réalise les aménagements intérieurs, des escaliers, des pièces dhabitation.","habitants":"Comte Sanche Garcie de Manas \r\n        \"","divers":"La forteresse d'Avezan","gps":"","images":["../image/image_32/32_Avezan_1.jpg","../image/image_32/32_Avezan_2.jpg","../image/image_32/32_Avezan_3.jpg","../image/image_32/32_Avezan_4.jpg","../image/image_32/32_Avezan_5.jpg","../image/image_32/32_Avezan_6.jpg","../image/image_32/32_Avezan_7.jpg","../image/image_32/32_Avezan_8.jpg"]},"Consult_chateau_formulaired2c9":{"id":"Consult_chateau_formulaired2c9","dept":"32","canton":"Samatan","commune":"Lombez","nom":"Barbet","type":"Château","periode":"XVIII","histoire":"A Lombez, le château de Barbet et l'abbaye  Ste-Marie du XIVe siècle de style gothique méridional classé monuments historiques en 1846.                                 BARBET de  Francois de Marcelier, seigneur de Gaujac constructeur et propriétaire du château du XVIIIe siècle.  Aujourd'hui restaurant et golf.","architecture":"Barbet, vers la fin des années 1990 a été prise l'initiative de développer le domaine du château de Barbet pour en faire un habitat haut de gamme en vue d'y habiter en permanence ou bien pour des séjours de vacances. Fin 2005 la rénovation du château fut terminé.  Le château est  de plan rectangulaire à deux niveaux  toit en croupe flanqué aux quatre angles de pavillons carrés à toit quatre pans presque plats.","habitants":"Famille de Francois de Marcelier\r\n        \"","divers":"Château de Barbet à Lombez","gps":"","images":["../image/image_32/32_Barbet_1.jpg","../image/image_32/32_Barbet_2.jpg","../image/image_32/32_Barbet_3.jpg","../image/image_32/32_Barbet_4.jpg","../image/image_32/32_Barbet_5.jpg"]},"Consult_chateau_formulaire767f":{"id":"Consult_chateau_formulaire767f","dept":"32","canton":"Auch","commune":"Barran","nom":"Barran","type":"Château","periode":"XIII-XIV","histoire":"Trois châteaux à Barran, celui de Izendon du XVIe siècle pas de gravure ni historique de Mazères du XIVe siècle  et de Nux du XIII-XVIe siècle.                                                                               BARRAN;   Lieu de passage du pélerinage de Saint-Jacques-de-Compostelle sur la via Tolosane, à l'issue d'un paréage entre le comte d'Armagnac-Fézensac et larchevêque d'Auch.  La ville nouvelle vient s'enclencher dans un village préexistant, bourg ecclésial. Barran fut très rapidement peuplée et au XVe siècle, outre l'équipement traditionnel, elle comporte une école municipale.\r\nElle abrita au Moyen-Âge une petite communauté juive. Les archevêques d'Auch y installèrent leur résidence d'été au château de Mazères, qui servit d'hôpital militaire durant la première guerre mondiale.    La tour porte est un carré de 7 m de côté et de 10 m de haut, couronnée à l'origine de créneaux remplacés depuis par une génoise. La Tour fut édifiée vers 1280, pour le Comte dArmagnac Bernard III. Il ne reste debout, que son imposant donjon, devenu le Musée du Panache gascon.                                                      MAZERES, les archevêques d'Auch installèrent à Barran leur résidence d'été au château de Mazères,  vendu en 1792 comme bien national, il connaîtra jusqu'à la fin de la guerre  des fortunes diverses au gré de nombreux propriétaires, assez peu soucieux de son entretien. Pendant la guerre de 1914-1918, le château servira d'hôpital militaire pour blessés et malades. Racheté en 1981 par, monsieur et madame de Margerie.                                                                NUX,  Jean Pierre de Nux, seigneur d'Ardens et lieutenant au régiment de Navarre Infanterie, vendit la Salle de Nux le 10 janvier 1771 et la métairie de Petrachon à Jean Marie Courtade, conseiller du sénéchal d'Auch.","architecture":"Barran  est une bastide fortifiée à plan quadrillé, fondée à la fin du XIIIe siècle. Vous pourrez voir sa tour porte, ses murailles encore debout ainsi que sa halle et ses embans. La collégiale Saint-Jean-Baptiste datant du XIIe siècle, fut reconstruite vers 1569, puis elle subit des modifications importantes au XIXe siècle. Elle a la particularité de posséder un clocher hélicoïdal.   Très meurtrie au XVIe siècle pendant les guerres de religion par les troupes protestantes de Montmorency, elle a toutefois pu conserver son plan octogonal caractéristique des bastides, son église et d'importants éléments de fortification.                                    Mazères, au XIIe et XIIIe siècle de nombreuses transformations seront apportées mais c'est au XVe siècle avec Jean de Trémoille et plus tard au XVIIIe siècle avec Mgr De Montillet que s'achèveront les travaux qui lui donneront son allure définitive.  Cette grande demeure, résidence de campagne des Archevêques d'Auch, une importante exploitation vinicole et repliée en cinq corps de bâtiments irréguliers autour d'une cour intérieure plus longue que large, accentuerait son caractère résidentiel et froid, s'il n'était éclairé par l'emploi de briques et de pierres harmonieusement mêlées, jouant de leurs différences de couleur et de matériaux. Elle est flanquée d'une tour carrée médiévale.                                                  Nux, ancienne « salle gasconne » du XIIIe et  XIVe siècle, transformée au XVIe et au XIXe siècle dans un parc aménagé sous le Second Empire. corps de logis carré de trois niveaux flanquée d'une série de lucarnes sur un toit d'ardoises, accolé d'une tour polygonale crénelée avec mâchicoulis prolongé en hauteur par une tour ronde crénelé et deux échauguettes en encorbellements sur les angles.","habitants":"des Archevêques d'Auch                                                                 Famille de Jean Pierre de Nux \r\n        \r\n        \"","divers":"Porte de la ville de Barran, le château de Mazères et de Nux","gps":"","images":["../image/image_32/32_Barran_1.jpg","../image/image_32/32_Barran_2.jpg","../image/image_32/32_Barran_3.jpg","../image/image_32/32_Barran_4.jpg","../image/image_32/32_Barran_5.jpg","../image/image_32/32_Barran_6.jpg","../image/image_32/32_Barran_7.jpg"]},"Consult_chateau_formulaire55cc":{"id":"Consult_chateau_formulaire55cc","dept":"32","canton":"Gimont","commune":"Saint-Greorges","nom":"Bartas","type":"Maison forte","periode":"XVI","histoire":"BARTAS,  le château du Bartas fut la demeure du poète Guillaume du Bartas, au XVIe siècle. C'est en 1565 que François de Salluste, père du poète, riche marchand gascon, acheta la ferme   de Bernard d'Ornézan évêque de Lombez devenu seigneur de Barthas décide de la construction d'une demeure seigneuriale sur sa terre de Saint-Georges. Devenu seigneur du Bartas, François transmet sa demeure à son fils, Guillaume, célèbre poète gascon, qui y vécut toute sa vie. Transmis de génération en génération, le château du Bartas a été vendu par les derniers descendants du poète, la famille d'Estarac au début du XXe siècle. Il passe entre diverses mains (notamment Margarita de Bourbon et son mari Edwin De Roy van Zuydewijn jusqu'en 2005). Il a été ensuite revendu à un couple d'américains : Liz and Cornelius Bronder qui louent des chambres d'hôtes et des salles de réception.","architecture":"Le château du Bartas plus maison forte que château aurait été construit en quinze mois, se compose d'un logis quadrangulaire à deux étages, flanqué d'une tour d'escalier polygonale surmontée d'une couronne de mâchicoulis et aux angles de trois tours circulaires toitures en poivrières de tuiles plates à ergot. Son plan très ramassé lui donne une allure archaïque, caractéristique de ce milieu de XVIe siècle en Gascogne. Il subsiste quelques fenêtres à meneaux. La cour carrée est entourée de bâtiments de communs.","habitants":"Famille de Francois de Sallustre\r\n        \r\n        \"","divers":"Château de Bartas à Saint Georges","gps":"","images":["../image/image_32/32_Bartas_1.jpg","../image/image_32/32_Bartas_2.jpg"]},"Consult_chateau_formulaire3077":{"id":"Consult_chateau_formulaire3077","dept":"32","canton":"Plaisance","commune":"Bassoues","nom":"Bassoues","type":"Bastide-Tour","periode":"XIVXVII","histoire":"BASSOUES, le village de Bassoues (Bassoa) est fondé sur le sol d'une forêt antique, séjour de druides, ces derniers y célébraient le culte d'une divinité, remplacée plus tard par le dieu Mars, d'où vient le nom Marsoulés qui existe toujours dans la localité un \"castrum\" existait au début du XIe siècle. Il est cédé en 1020 à l'abbaye Saint-Michel de Pessan. Au XIIIe siècle, Bassoues devient une bastide, fondée par les archevêques d'Auch, propriétaires des terres situées autour d'un couvent bénédictin. En 1295, un archevêque accorda des coutumes aux habitants de Bassoues. L'archevêque Arnaud Aubert (entre 1356 et 1371), neveu du pape Innocent VI et camérier de l'église romaine depuis 1361, a fait édifier les remparts de la ville, le château situé à l'angle nord-est avec le grand donjon prestigieuse architecture militaire défensive du XIVe siècle. Les logis du château ont été remaniés par un archevêque d'Auch de la famille de Lévis qui a été titulaire du siège entre 1425 et 1462. Ses armoiries figurent sur le bâtiment. L'archevêque d'Auch Henri de La Mothe-Houdancourt,  entre 1666 et 1684, fit construire un nouveau bâtiment à un seul étage contre le donjon, flanqué de deux tourelles d'angle.","architecture":"Bassoues a un donjon à 5 niveaux du XIVe siècle (hauteur de 43 mètres), a été élevé vers 1370 par Arnaud Aubert, neveu du pape Innocent VI. Dans les comptes de 1370-1371 sont notés comme maîtres d'uvre le tailleur de pierre  Pierre Joc et le charpentier Étienne de Pradères. Les comptes semblent montrer que le donjon était pratiquement terminé à la mort d'Arnaud Aubert. Son aspect massif est accentué par la présence aux quatre angles d'épais contreforts couronnés par une ceinture de mâchicoulis. Les restes du château des Archevêques du XVIe-XVIIe siècle, avec ses tours rondes à mi-hauteur et ses fenêtres à vitraux, tempèrent l'aspect un peu lourd du gros donjon qui le surplombe.  Il en reste les murs extérieurs, le portail du sud, le puits. Mais ses successeurs ont modifié le château. Au XVIIe siècle le château était en ruine quand l'archevêque d'Auch, Mgr de Lamothe-Houdancourt décida de le relever. Il a augmenté la construction d'un grand corps de maison entre les deux tours du côté du levant.","habitants":"Arnaud Aubert                                                                          Famille de Lévis\r\n        \r\n        \"","divers":"Le château les tours et le  donjon  de Bassoues.","gps":"","images":["../image/image_32/32_Bassoues_1.jpg","../image/image_32/32_Bassoues_2.jpg","../image/image_32/32_Bassoues_3.jpg","../image/image_32/32_Bassoues_4.jpg","../image/image_32/32_Bassoues_5.jpg","../image/image_32/32_Bassoues_6.jpg","../image/image_32/32_Bassoues_7.jpg","../image/image_32/32_Bassoues_8.jpg"]},"Consult_chateau_formulairefef1":{"id":"Consult_chateau_formulairefef1","dept":"32","canton":"Vic-Fezensac","commune":"Bazian","nom":"Bazian","type":"Village Fortifié","periode":"XVI-XVII","histoire":"BAZIAN, les barons de Montesquiou apparaissent dès le XIIe siècle, et seraient les commanditaire du château. Ils y séjournent régulièrement. Après le partage de la baronnie en 1479, la terre de Bazian passe par succession aux Lavedan, aux du Lyon et à la famille de Bourbon. Celle-ci transforme le bâtiment aux XVIe et XVIIe siècles par dimportantes adjonctions, créations douvertures, et de tourelles en surplomb. La Révolution narrête pas la lignée des seigneurs de Bazian, elle se perd seulement à la fin du XIXe siècle avec la comtesse de Mesnard qui offrit, vers 1870, une partie de sa fortune pour embellir l'église.  Avant sa mort, elle vend la propriété à une famille dagriculteurs qui laisse la bâtisse à labandon jusqu'au XXe siècle où les propriétaires actuels entreprennent une restauration réussie.  Aujourd'hui propriété de Janine et Pierre Laurent Dufau.","architecture":"Le village, modèle de Castelnau avec son château, le reste de ses remparts, ses vieilles maisons dont certaines très anciennes à colombages, ses ruelles étroites engazonnées. Le prix du patrimoine de la société archéologique, décerné en 2001, est venu récompenser l'effort de restauration réalisé ces dernières années.\r\nLe château de Bazian occupe la tête de l'éperon rocheux au sud-ouest du village. Une partie de son bâti en appareil moyen remonte à la création du château primitif.   La bâtisse actuelle, objet des aménagements des XVIe et XVIIe siècles, s'élève sur trois niveaux. Deux pavillons carrés la flanquent. La partie sud-est fortement dégradée, flanquée de deux tourelles en surplomb en cul de lampe, aujourd'hui découronnées, témoigne de cette aile sur un étage qui se raccordait au bâtiment principal.  le corps de logis clos l'espace en formant une basse cour. Au sud, s'élève un castelet autrefois relié au corps de logis par une galerie. A l'intérieur, les pièces de réception occupent le rez-de-chaussée. L'accès aux étages se fait par une porte à la Serlio commandant l'escalier de la tour, à l'angle sud-est. Dans les étages toutes les pièces ont conservé un décor peint de la fin du XVIe siècle au début du XVIIe siècle. Des murailles délimitent les deux cours. La tour-porte, de plan carré, conservée sur quatre niveaux et coiffée d'une couverture en tuiles canal à quatre eaux.","habitants":"Famille de Bourbon                                                                                 La comtesse De Mesnard \r\n        \r\n        \"","divers":"La porte st-Yors et le château de Bazian","gps":"","images":["../image/image_32/32_Bazian_1.jpg","../image/image_32/32_Bazian_2.jpg","../image/image_32/32_Bazian_3.jpg","../image/image_32/32_Bazian_4.jpg","../image/image_32/32_Bazian_5.jpg","../image/image_32/32_Bazian_6.jpg","../image/image_32/32_Bazian_7.jpg","../image/image_32/32_Bazian_8.jpg"]},"Consult_chateau_formulaire7f87":{"id":"Consult_chateau_formulaire7f87","dept":"32","canton":"Eauze","commune":"Beaumont-sur-Losse","nom":"Beaumont_Losse","type":"Château","periode":"XV-XVII","histoire":"BEAUMONT; Louis de Pardailhan, marquis de Montespan  enterré vivant dans ses terres. Il a été reconstruit de 1606 à 1622 par Pierre Souffron.  En 1606, le château est remanié par l'architecte Pierre II Souffron, avec entre autres la construction de l'actuelle batîsse de style renaissance. Au XVIIe siècle, le marquis de Montespan Louis-Henri de Pardaillan de Gondrin (1640-1691) fait rénover et agrandir la demeure, durant son exil de la cour de France du château de Versailles, par le roi soleil Louis XIV, alors que son épouse madame de Montespan, devient maîtresse favorite du roi entre 1667 et 1683, jusquà sa disgrâce au détriment de madame de Maintenon.     Alors qu'ils vivent à Paris, les parents concertistes de l'animatrice de média Eve Ruggiéri achètent aux enchères ce château tombé en ruine, et le restaurent petit à petit, pièce par pièce, durant de nombreux séjours de vacances de leur vie. Eve Ruggiéri, passionnée par l'histoire de France, le patrimoine et les arts, y passe les vacances de son enfance, s'y marie, rachète le château en 1973, poursuit le long travail de restauration de ses parents, et aspire à lui redonner tout son lustre et faste d'antan.","architecture":"Dans la première moitié du XVe siècle, le \"castrum de Bonmont\" mentionné dès 1266, est l'apanage des Bezolles qui en entreprennent la transformation dès 1603 avec le concours du grand architecte Pierre Souffron.  Par alliance avec les Zamet qui l'auraient acheté à la dernière des Bezolles,  Ses derniers acquéreurs avant la Révolution, dès  1788, le décorent dans le goût de l'époque. Ce château est constitué d'un logis seigneurial d'une quarantaine de pièces, construit sur trois périodes Renaissance, au XVIIe siècle et au XVIIIe siècle, d'un parc dans une cour intérieure circulaire fermée par un mur denceinte circulaire en arcades du XVIIIe siècle, avec une vue panoramique sur les vallons du Gers à perte de vue, d'un jardin à la française, de douves, et de dépendances de ferme. Au XVIIIe siècle, une aile est ajoutée au château, et la muraille qui clôture le parc est percée darcades pour permettre d'admirer les vallons alentour. Le château de Beaumont-sur-l'Osse est un  manoir de style maison forte médiévale Renaissance du XIIIe siècle.","habitants":"Famille de Pardaillan de Gondrin                                                               Animatrice de média Eve Ruggiéri\r\n        \r\n        \"","divers":"Château de Beaumont sur Losse","gps":"","images":["../image/image_32/32_Beaumont_Losse_1.jpg","../image/image_32/32_Beaumont_Losse_2.jpg","../image/image_32/32_Beaumont_Losse_3.jpg"]},"Consult_chateau_formulaire1b93":{"id":"Consult_chateau_formulaire1b93","dept":"32","canton":"Masseube","commune":"Bellegarde","nom":"Bellegarde_Gers","type":"Château","periode":"XIII-XIV","histoire":"Trois châteaux à  Bellegarde, celui de Bellegarde,  de Masseuble et le couvent des Gondrin.                                                         BELLEGARDE  possède un château datant de 1296. Fief des Lagossan dès 1300, puis par alliance des St-Lary de 1418 à 1618. Henri IV y vint souvent avec sa favorite Gabrielle dEstrées, jusquen 1610, année de sa mort. En 1618, le château fut vendu à Jean-Auguste de La Passe, gouverneur du château de Foix, de Seisse en Bresse, seigneur de Poussigan et de la maison Noble de Monts (Mont dAstarac). Marié à Françoise Sariac en 1612, il fit faire des travaux considérables sur lédifice de 1620 à 1624. Il ne restera pas grand-chose du bâtiment de 1300, hormis les dépendances. De 1618 à 1709, les De La Passe issus de cette union se succédèrent puis ce furent les De La Forgue jusquen 1834 et enfin les Monts, dont la lignée séteignit en 1936.  Dans la chapelle du château se trouve le caveau de la famille de Monts.  Bellegarde-Adoulins. aujourd'hui à la famille de Courouble.","architecture":"Bellegarde, il na rien dun château fort médiéval comme on aurait pu limaginer, cest un gros bloc en longueur, avec deux tours assez basses, peut être en forme de U. Il aurait été construit au XVIe siècle et modernisé au XIXe siècle. Le château dispose dun corps principal et une aile en retour déquerre sur les faces Nord et Ouest dune cour dhonneur fermée à lEst et au Sud par une grille et un portail. Le corps de logis, parallélépipédique, dun seul étage, est flanqué sur ses angles Nord-Est et Sud-Est de pavillons de plans trapézoïdal plus hauts dun étage.   Un château est mentionné à cet emplacement depuis le XIVe siècle. La demeure actuellement visible conserve l'appellation de \"château\". La demeure date du XVIIIe siècle. Il y a eu plusieurs remaniements à la fin du  XIXe siècle (cheminées) et dans les années 1970 (tapisseries). Dans le parc se trouve une tombe datée de 1956.  Le château de Bellegarde présente de nombreuses caractéristiques du XVIIIe siècle bien qu'il ait été remanié au XIXe siècle et présente donc aussi des éléments de cette période.                                   Masseuble de plan rectangulaire à deux niveaux et attiques flanqué de trois tours carrées.","habitants":"Famille de Jean-Auguste De La Passe\r\n        \r\n        \"","divers":"Château de Bellegarde  de Masseuble et le couvent des Gondrin à Bellegarde","gps":"","images":["../image/image_32/32_Bellegarde_Gers_1.jpg","../image/image_32/32_Bellegarde_Gers_2.jpg","../image/image_32/32_Bellegarde_Gers_3.jpg","../image/image_32/32_Bellegarde_Gers_4.jpg","../image/image_32/32_Bellegarde_Gers_5.jpg","../image/image_32/32_Bellegarde_Gers_6.jpg","../image/image_32/32_Bellegarde_Gers_7.jpg"]},"Consult_chateau_formulaire9f77":{"id":"Consult_chateau_formulaire9f77","dept":"32","canton":"Mirande","commune":"Betplan-Villecomtal","nom":"Betplan","type":"Château","periode":"XVII","histoire":"BETPLAN, avant 1388, la seigneurie de Betplan dépendait du domaine du comte de Pardiac. Après cette date et jusqu'à la Révolution elle a appartenu à la famille des Monlézun St-Lary.\r\nLe château actuel a été construit au milieu du XVIIe siècle sur l'emplacement de l'ancien château médiéval. Jusqu'en 1951 il est resté la propriété des descendants des Monlézun St Lary. Depuis le début du XIXe siècle, le château a cessé d'être résidence principale et son état s'est dégradé. Depuis 1999, il appartient à Mr et Mme Speck qui en ont entrepris la restauration. Un intéressant pigeonnier en pans de bois du XVIIIe siècle est situé dans le parc du château.\r\nLe village possède une église construite en 1734 par un maître maçon nommé Lamarque dont le nom figure au dessus du portail d'entrée. D'après de nombreuses recherches, une église plus ancienne aurait été construite dans l'enceinte du cimetière.                 Montlezun Pardiac, propriétaire du château de Betplan.","architecture":"Le château de Betplan est construit au début du XVIIe siècle, il présente un corps de logis de plan rectangulaire flanqué de quatre tours carrées, le toit surmonté de combles d'ardoises avec série de lucarnes. La façade principale, précédée sur toute la longueur d'une terrasse avec balustrade, souligné par un bandeau présente un imposant et lourd portail à bossages avec deux pilastres doriques portant un entablement surmonté d'un fronton coupé demi circulaire, les fenêtres possédaient des meneaux de bois, accès par un escalier extérieur  de pierres  comportant une douzaines de marches, la porte axiale se situe immédiatement en arrière. Les fenêtres aux lignes sobres et pures sont dépourvues de meneaux, il n'y a qu'un étage, mais les deux ailes comme le gros oeuvre sont mansardés. Les toitures élégantes sont à très forte pente.  A l'arrière de l'édifice les dépendances forment un plan quadrangulaire autour d'une cour avec galerie de style couvent.","habitants":"Famille des Monlézun St -Lary\r\n        \r\n        \"","divers":"Château de Betplan à Betplan-Villecomtal.","gps":"","images":["../image/image_32/32_Betplan_1.jpg","../image/image_32/32_Betplan_2.jpg","../image/image_32/32_Betplan_3.jpg","../image/image_32/32_Betplan_4.jpg"]},"Consult_chateau_formulaireea1e":{"id":"Consult_chateau_formulaireea1e","dept":"32","canton":"Fezensac","commune":"Bezolles","nom":"Bezolles","type":"Vestiges","periode":"XIII","histoire":"BEZOLLES, château dit de Pardaillan de l'illustre famille de ce nom, l'une des quatre  qui portaient le titre de baron de Fezensac, appartient ensuite aux familles de Béarn Gerderest, de Pardaillan Panja et de Beaudean-Parabère.","architecture":"Bezolles du  XIIIe siècle, il est possible qu'une fortification soit construite  au XIVe siècle, des remparts protègent le château. Au XXIe siècle, la découverte de l'extérieur depuis la route. La tour est privée et la partie supérieure n'est pas ouverte à la visite. Il ne reste rien du logis ni du donjon de l'ancien château médiéval. Seule la tour de défense et un morceau de rempart sont les témoignages du passé. Le vestige le plus important est cette tour sur base carré d'une quinzaine de mètres de haut en saillie extérieure sur le mur d'enceinte au sud. Un escalier a été aménagé sur le reste du rempart pour atteindre la pièce à l'étage. La tour de défense est construite en calcaire blanc. Les angles sont pauvrement appareillés. Au sommet, les créneaux ont disparu, la face côté défense comporte deux fentes de tir. Celle du bas ressemble plus à un puits de lumière, alors que la supérieure est une archère en croix du XIVe siècle.  La quasi totalité des villages gascons possèdent des vestiges de fortifications comprenant au moins une tour.    Une différence de construction entre les deux. La tour aurait elle été rehaussée avec l'amélioration de la puissance des armes de jet. Dans le prolongement de la tour, il y a les vestiges du rempart.  Il a été construit avec la même pierre et la même finition que la tour. Une archère en croix est encore visible proche de la tour, devait certainement protéger l'angle mort.","habitants":"Famille de Pardaillan \r\n        \"","divers":"Porte de la tour et vestiges du château de Pardaillan à Bézolles","gps":"","images":["../image/image_32/32_Bezolles_1.jpg","../image/image_32/32_Bezolles_2.jpg","../image/image_32/32_Bezolles_3.jpg","../image/image_32/32_Bezolles_4.jpg","../image/image_32/32_Bezolles_5.jpg","../image/image_32/32_Bezolles_6.jpg","../image/image_32/32_Bezolles_7.jpg","../image/image_32/32_Bezolles_8.jpg"]},"Consult_chateau_formulairefcf8":{"id":"Consult_chateau_formulairefcf8","dept":"32","canton":"Preignan","commune":"Biran","nom":"Biran","type":"Vestiges","periode":"XII-XIV","histoire":"BIRAN  est un petit village dont lhistoire sétale sur plusieurs siècles: Des environs du premier siècle avec la pile gallo-romaine, au XXe siècle pour les derniers aménagements. Un castelnau ou village rue orienté nord-est sud-ouest sorti dun éperon rocheux qui lui a fourni la pierre nécessaire à la construction de la fortification. Ce n'était pas le château d'un puissant seigneur, mais  un poste de surveillance de la vallée.","architecture":"Le château de Biran se compose d'une épaisse courtine avec un haut donjon non habitable. Au sud-ouest sur la double motte castrale, fut érigé un château fort entre 1080 et 1100, dont il ne reste que la tour de guet (20 m de hauteur). A l'époque Romaine, une cité fortifiée est construite. A la fin du XIIIe siècle, une fortification existé. Au XIVe siècle, une porte fortifiée est construite à l'entrée du village. En 1875, l'enceinte et la tour du château sont classées aux Monuments Historiques.   Sur cette face, il parait très neuf ou plutôt restauré, mais en le contournant, des pierres non jointives trahissent son âge, d'ailleurs un panneau avertit le visiteur. Les portes dans les courtines ont été ouvertes entre le XIXe et le XXe siècle. Cave de stockage était la fonction de ce vieux château.\r\n Le donjon  ses dimensions ne le rendent pas habitable. Sa fonction principale devait être une tour de guet et un refuge ultime en cas d'attaque. A mi-hauteur,  une porte très géométrique devait être l'entrée principale dans la tour. Les corbeaux en dessous supportaient certainement une passerelle en bois. La petite ouverture légèrement au dessus à droite de la porte semble être un puits de lumière.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Vestiges du château de Biran","gps":"","images":["../image/image_32/32_Biran_1.jpg","../image/image_32/32_Biran_2.jpg","../image/image_32/32_Biran_3.jpg","../image/image_32/32_Biran_4.jpg","../image/image_32/32_Biran_5.jpg","../image/image_32/32_Biran_6.jpg"]},"Consult_chateau_formulaire5e0d":{"id":"Consult_chateau_formulaire5e0d","dept":"32","canton":"Fleurance","commune":"Bivès","nom":"Bivès","type":"Château","periode":"XV","histoire":"BIVES, au Xe siècle, Bivès était le fief de la famille de ce nom. Lune ou lautre de ces familles ont pu construire la partie la plus ancienne du château de Bivès. Puis par alliance à partir du XVe siècle, le château est la propriété des Castelbajac. En effet, Pierre de Castelbajac, seigneur de Paridoux épouse en 1520, Rose de Marrenx, dame de Bivès. Les terres sont vendues en 1557 à Bernard de Roquelaure. Son petit fils, Bernard de Castelbajac passe un  bail à bâtir avec les maçons du village  pour entreprendre des démolitions. Sa petite fille, seigneuresse de Bivès, Philiberte de Castelbajac, épousera Octavien II du Bouzet coseigneur de Ligardes, capitaine du régiment de Roquepine, deuxième fils dOctavien I, le 6 juillet 1626. Elle lui apportera donc le village de Bivès en dot.\r\nEn 1629 un contrat passé avec un maître lissier dAubusson témoigne des préoccupations décoratives du château de Bivès.\r\nDevenu par échange la propriété d'Henri de Preissac d'Esclignac qui plus tard émigrera. Le château sera alors vendu comme un bien national le 16 septembre 1792.\r\nEn 1855 Bivès devient la propriété de la famille de Mellis. Le château sera victime d'un incendie. Une reconstruction partielle fera l'objet dune transformation et dun changement de style renaissance. Dorénavant limage actuelle du château na pas changé.","architecture":"À Bivès se trouve quelques curiosités telles que : un château des XIIIe et XIVe siècles remanié Renaissance, des pigeonniers, un moulin à vent  d'importantes transformations du château auquel il a été adjoint un corps de logis dun étage, parallélépipède flanqué au nord-est dune tour ronde. Le château du XIIIe siècle peut se situer dans la partie Nord  du logis actuel, il conserve des meurtrières sur ses faces Ouest, Est  et Nord. La porte du rez-de-chaussée au Nord est couverte d'un arc brisé avec un encadrement chanfreiné. Elle est actuellement masquée par un petit corps de bâtiment construit au XIXe siècle. Une bretèche la surmonte à l'étage. La confrontation des plans cadastraux anciens et récents confirme l'adjonction de la partie sud du logis. Cette adjonction ainsi que le remaniement général (avec destruction partielle) des communs et parties agricoles ne sont pas signalés dans les matrices cadastrales du XIXe siècle antérieur à 1882. Ces transformations pourraient donc être postérieures à cette date de 1882.","habitants":"Famille des Castelbajac\r\n        \r\n        \r\n        \"","divers":"Château de Bivès","gps":"","images":["../image/image_32/32_Bives_1.jpg","../image/image_32/32_Bives_2.jpg","../image/image_32/32_Bives_3.jpg","../image/image_32/32_Bives_4.jpg","../image/image_32/32_Bives_5.jpg","../image/image_32/32_Bives_6.jpg","../image/image_32/32_Bives_7.jpg","../image/image_32/32_Bives_8.jpg","../image/image_32/32_Bives_9.jpg"]},"Consult_chateau_formulaired3e8":{"id":"Consult_chateau_formulaired3e8","dept":"32","canton":"Preignan","commune":"Jegun","nom":"Bonas","type":"Château","periode":"XVII","histoire":"BONAS, le château a appartenu à une longue lignée de seigneurs, d'abord vassaux du roi d'Angleterre, puis des comtes d'Armagnac. La lignée des Pardailhan reconstruit le château au début du XVIIe siècle. le marquis de Pardaillan-Gondris marquis de Bonas, laissa sa succession à sa nièce, dame de Vivent, a condition qu'elle épousa un homme noble, elle épousa messire de Mellet dont un descendant avait combattu à Marignan, le château à toujours appartenu à cette même famille,  a été bâti par le général de Bonas sous le règne du roi Louis XIV et dans ce château se retira la marquise de Pardaillan-Montespan lorsqu'elle du quitter la cour. Les héritiers de monsieur Simon viennent de le vendre à un hollandais.","architecture":"Bonas, l'édifice, de plan en U à deux niveaux, est construit sur le rocher, qui demeure visible dans les grandes caves, où se trouve la base de l'ancien donjon féodal. La terrasse prend appui sur une orangerie voûtée en berceau. A l'intérieur, escalier Louis XIV, deux halls à portiques superposés du XIXe siècle, pièces ornées de boiseries Louis XV, panneaux peints, stucs. L'édifice est agrandi et complété au XIXe siècle, dans un style classique. Le château et le parc se situent sur un éperon dont l'accès se fait par une allée de cèdres bordée des communs et de la distillerie développée par Antoine de Melet. \r\nEléments protégés MH : façades et toitures; hall d'entrée, avec escalier à balustres en pierre; escalier Louis XV avec sa rampe en fer forgé; au rez-de-chaussée, la salle dite des Césars et la bibliothèque, avec leur décor : inscription par arrêté du 15 juin 1976.","habitants":"Famille  de Pardaillan-Gondris\r\n        \"","divers":"Château de Bonas à Jegun","gps":"","images":["../image/image_32/32_Bonas_1.jpg","../image/image_32/32_Bonas_2.jpg","../image/image_32/32_Bonas_3.jpg","../image/image_32/32_Bonas_4.jpg"]},"Consult_chateau_formulaire420c":{"id":"Consult_chateau_formulaire420c","dept":"32","canton":"Riscle","commune":"Maumusson-Laguian","nom":"Bouscassé","type":"Château","periode":"XIX","histoire":"BOUSCASSE,  Alain Brumont viticulteur reconnu et respecté dans le milieu viticole élabore de grands vins de renommée internationale. A propos du domaine : Le château Bouscassé est le berceau de la légendaire famille Brumont. Grand bâtisseur de l'appellation Madiran , Alain Brumont a repris les rênes du domaine en 1978 qu'il a restructuré et passé de 17 à 240 hectares. Principalement plantés sur les crêtes de Maumusson avec une exposition sud, les vins, issus de Tannat et de Cabernet-Sauvignon, sont interprétés dans un style classique et civilisé. Nous préférons le caractère classique de ces vins à ceux de Montus, plus consensuels.","architecture":"Bouscassé  édifice de plan quadrangulaire, corps de logis central à trois niveaux toit en tuiles à l'impériale avec deux lucarnes sur chaque pente et prolongé de dépendances de chaque côtés avec retour en équerre deux pavillons de deux niveaux aux extrémités, fermeture de la cour d'honneur par un mur.","habitants":"Famille Brumont\r\n        \r\n        \r\n        \"","divers":"Le château de Bouscassé, Maumusson-Laguian","gps":"","images":["../image/image_32/32_Bouscasse_1.jpg","../image/image_32/32_Bouscasse_2.jpg","../image/image_32/32_Bouscasse_3.jpg","../image/image_32/32_Bouscasse_4.jpg","../image/image_32/32_Bouscasse_5.jpg"]},"Consult_chateau_formulaireeba6":{"id":"Consult_chateau_formulaireeba6","dept":"32","canton":"Eauze","commune":"Mansencôme","nom":"Busca_Maniban","type":"Château","periode":"XVI-XVII","histoire":"BUSCA-MANIBAN, au XVIe siècle la famille Bousty entre dans la famille de Maniban par le mariage  de l'héritière de Bousty qui l'apporta en dot  à Pierre de Maniban ambassadeur en Suisse le petit fils de ce couple Thomas de Maniban président au parlement de Toulouse entreprend la construction du château sur l'emplacement d'une maison forte.  En  1681 le domaine de Busca  est érigé en marquisat, le fils de Thomas  Jean-Guy  continue les travaux d'aménagements ainsi que le petit fils  Jean -Gaspard (1686-1767) allié à une Lamoignon qui lui succèdèrent tous deux dans sa charge. A la mort de Gaspard de Maniban, une seule fille survivante la marquise de Livry hérite de Busca et le revend en 1780 a Henri Bernard comte  de Faudoas suite à des impayés  du marquis de Faudoas la marquise de Livry récupère le Busca qui traverse la Révolution sans problème en 1803 le vend à Jean-Robert Rizon docteur à Condom, le domaine est demeuré sans descendance et appartient  aujourd'hui à la famille Bazin.","architecture":"Busca-Maniban, un des plus beaux ensembles d'architecture du XVIIe siècle.  Avec sa façade en majesté, largement ouverte sur un jardin à la française, noble demeure d'une illustre famille de magistrats, a des airs de petit Versailles. Le château a sûrement inspiré le désir de grandeur de Thomas de Maniban lorsqu'il fit bâtir la demeure actuelle.\r\n Une première campagne de travaux en 1649 à partir d'un édifice initial plus modeste fut sans doute suivie d'un  second  dans les premières décades du XVIIIe siècle. \r\nLes Faudoas, successeurs des Maniban de 1780 à 1786 doivent être responsables d'une décoration à la mode du jour.  Un portail d'entrée, coiffé d'un chapeau de gendarme, fait pénétrer dans la cour d'honneur. Il porte la date de 1649, le début des travaux qui se poursuivirent jusqu'à la fin du règne de Louis XIV.   De part et d'autre de la cour, les ailes bizarrement crénelées tranchent avec la porte d'entrée, travée dorique surmontée d'un fronton cintré. Logé sous une voûte en arc de cloître, le vestibule occupe toute la moitié nord du corps du logis sur toute sa hauteur et toute sa profondeur, largement éclairé par les fenêtres du palier côté jardin. Il comporte un escalier monumental, avec des pilastres de style ionique et une rampe en fer forgé. Au rez-de-chaussée se trouvent les cuisines, la salle de garde et une cheminée monumentale.\r\nAu premier étage, sous la galerie, une porte conduit à « la salle à l'italienne », sous une voûte aussi majestueuse que celle du vestibule.","habitants":"Famille de Thomas de Maniban \r\n        \"","divers":"Château de Musca-Maniban à Mansencôme","gps":"","images":["../image/image_32/32_Busca_Maniban_1.jpg","../image/image_32/32_Busca_Maniban_2.jpg","../image/image_32/32_Busca_Maniban_3.jpg","../image/image_32/32_Busca_Maniban_4.jpg","../image/image_32/32_Busca_Maniban_5.jpg"]},"Consult_chateau_formulaire7051":{"id":"Consult_chateau_formulaire7051","dept":"32","canton":"Condom","commune":"Béraut","nom":"Béraut","type":"Château","periode":"XVI-XVIII","histoire":"Deux châteaux à Béraut celui de Lassère et celui d'Ensoulés .                                                                     ENSOULES, créée il y a une trentaine d'années par Albert Laporte, et basée à Béraut depuis plus de vingt ans, l'entreprise est désormais portée par Ana Laporte depuis la disparition de son époux, l'an passé. \r\nLASSERRE,  du XIV-XVIIIe siècle monsieur Eric Meste, exploitant agricole est en activité depuis 25 ans. il est spécialisé dans le secteur d'activité de la culture de céréales , de légumineuses et de graines oléagineuses.\r\nPas d'information historique.","architecture":"Ensoulés de plan rectangulaire en trois éléments la partie centrale à toit à deux pans, corps de logis à deux niveaux avec balcon sur la partie central au premier niveau et avec fronton triangulaire au dessus, flanqué de deux tours rondes à trois niveaux crénelés et mâchicoulis.  Des bâtisses du XVIe siècle. Le musée d'Art Naïf de Béraut est considéré comme l'un des plus beaux au monde par les amateurs et collectionneurs d'Art.                                                      Lasserre  est un manoir bâti à Béraut-Lasserre. Il est inscrit aux M.H. depuis 1927.   de plan rectangulaire  à trois niveaux et attiques avec fronton triangulaire  sur trois travées avec oculus.                                            Le manoir de Béraut, installé au bord de la Gèle, fait apparaître des restes de fortifications et des remaniements plus récents.","habitants":"Famille d'Ana Laporte                                                         \r\nMonsieur Eric Meste\r\n        \r\n        \r\n        \r\n        \"","divers":"Châteaux de Lassère de Béraut et d'Ensoulés à Béraut","gps":"","images":["../image/image_32/32_Beraut_1.jpg","../image/image_32/32_Beraut_2.jpg","../image/image_32/32_Beraut_3.jpg","../image/image_32/32_Beraut_4.jpg","../image/image_32/32_Beraut_5.jpg","../image/image_32/32_Beraut_6.jpg"]},"Consult_chateau_formulaire5b03":{"id":"Consult_chateau_formulaire5b03","dept":"32","canton":"Nogaro","commune":"Le Houga","nom":"Béroje","type":"Château","periode":"XIX","histoire":"BEROJE,   « la Jolie » en gascon.  Ce très ancien domaine agricole fut acquis par le comte de Rémont dans la première moitié du XIXe siècle, Le comte Charles-Marie de Rémont entreprit en 1854 de restaurer la vieille bâtisse du XVIe siècle lors du mariage de sa nièce et pupille Berthe de Rémont avec Eugène lHuillier.  Les descendants, la famille lHuillier puis Crombez de Montmort  pérennisent la production, transmettant de génération en génération leur savoir-faire dans lart délever les eaux de vie. Mais cest vraiment Bernard lHuillier (1924 -1999), grand connaisseur et amateur passionné qui fit la renommée des armagnacs millésimés du « Château de La Béroje ».","architecture":"Béroje, ce très ancien domaine agricole   traversé par le ruisseau du Ludon (frontière actuelle entre le Gers et les Landes) cette vaste propriété comportait des prairies pour lélevage, de belles forêts et des terroirs variés propices à la viticulture et aux céréales . De plan quadrangulaire flanqué de pavillon rectangulaire à deux niveaux et attiques aux angles de la façade et sur la partie central possède un pavillon  avec toit à l'impérial avec lucarne, les corps de logis à deux niveaux relient les pavillons d'angles.","habitants":"Comte Charles-Marie de Rémont \r\n        \r\n        \"","divers":"Château de Béroje à la Houga","gps":"","images":["../image/image_32/32_Beroje_1.jpg"]},"Consult_chateau_formulairedbda":{"id":"Consult_chateau_formulairedbda","dept":"32","canton":"Samatan","commune":"Bézéril","nom":"Bézéril","type":"Château","periode":"XVIII","histoire":"Deux châteaux à Bézéril dont celui de Bézéril et celui de Villeneuve.                                                                                 BEZERIL,  était l'apanage des Chapiers, riche famille capitulaire toulousaine. Des réminiscences de vocation défensive apparaissent dans cette construction du début du XVIIe siècle, remise au goût du jour au XVIIIe siècle. Vers les XI et XIIe siècles, la population sest regroupée autour des points naturellement défensifs qui furent fortifiés : sur la crête côté Lahas, on y trouve des traces dhabitations médiévales abandonnés au XVIIe.                                        \r\nLe château de Bézéril, qui a échappé à un partage sous la Révolution, a connu plusieurs propriétaires. Il est aujourdhui le siège social dune exploitation agricole.\r\n VILLENEUVE,  construit sur les ruines de lancien édifice médiéval, sélève lactuel château transformé en sci.   Les dirigeants sont : M Frédéric Turblin, gérant  M. Philippe Turblin, gérant. Pas de vue ni d'information historique.","architecture":"Bézéril,   Au milieu du XVIIIe siècle, par décision des consuls, léglise, longtemps située sur la crête Lahas, a été déplacée près du château.  Château caractéristique, avec son grand parc, sa cour encadrée de longues ailes que prolongent des communs à l'ouest, tandis qu'un escalier à double rampe à l'Est donne sur le parc. La cour d'honneur est fermée symétriquement par de longs bâtiments en retour d'équerre terminés par de forts pavillons. Le corps de logis de brique est à deux niveaux surmontés d'un fronton triangulaire et de tours quadrangulaires.  Les tours d'angle, de plans carrés, sont couvertes de tuiles plates à crochet, elles pourraient remonter de la fin du XVIe ou du début du XVIIe siècle.                                                                                              Villeneuve, sur les ruines de lancien édifice médiéval, sélève lactuel château.","habitants":"Famille des Chapiers\r\n        \r\n        \r\n        \"","divers":"Château de Bézéril et de Villeneuve à Bézéril","gps":"","images":["../image/image_32/32_Bezeril_1.jpg","../image/image_32/32_Bezeril_2.jpg","../image/image_32/32_Bezeril_3.jpg","../image/image_32/32_Bezeril_4.jpg"]},"Consult_chateau_formulaire7ec0":{"id":"Consult_chateau_formulaire7ec0","dept":"32","canton":"Fleurance","commune":"Cadeilhan","nom":"Cadeilhan_Gers","type":"Château","periode":"XIII-XVIII","histoire":"Deux châteaux à Cadeilhac, la tour du château et le château de Saint-Léonard  (voir article)                                                     CADEILHAN,  la seigneurie de Saint-Léonard a appartenu à la famille de Sérillac du XIIIe au XVIIIe siècle. Construction d'un logis avec tours à partir de 1572 pour Charlotte de Biran, dame de Saint Brès, par les Layant, maçon de Monfort,  très remanié.  Cadeilhan doit son nom au domaine romain Catilius.  A proximité du village une tour ronde du XVIe siècle, seul reste du château féodal  siège dune seigneurie de la famille des Preyssac.","architecture":"Le château  de Cadeilhan a été fortement remanié dans la seconde moitié du XVIIIe siècle. Des états antérieurs ne subsistent que les caves voûtées du sous-sol et une porte du quatrième quart du XVIe siècle, très remanié. Vestiges de la villa gallo-romaine de la Tasque du IIIe et Ve siècle.","habitants":"Famille de Sérillac \r\n        \r\n        \"","divers":"Château de Cadeilhan","gps":"","images":["../image/image_32/32_Cadeilhan_Gers_1.jpg","../image/image_32/32_Cadeilhan_Gers_2.jpg","../image/image_32/32_Cadeilhan_Gers_3.jpg","../image/image_32/32_Cadeilhan_Gers_4.jpg","../image/image_32/32_Cadeilhan_Gers_5.jpg","../image/image_32/32_Cadeilhan_Gers_6.jpg"]},"Consult_chateau_formulaire8dd0":{"id":"Consult_chateau_formulaire8dd0","dept":"32","canton":"Lectoure","commune":"Berrac","nom":"Cadreils","type":"Château","periode":"XVII","histoire":"CADREILS, construit à la fin du XVIIe siècle par les seigneurs de Berrac de Cadreils, sur les bases dun bâtiment beaucoup plus ancien le premier bâtiment était un château de type gascon, mais cela reste une possibilité.  Cette propriété étant privée, le château ne se visite pas. Il est la propriété de la famille Gayet depuis 2005. Le père de lactrice, chirurgien renommé, et sa mère, antiquaire, ont rénové la bâtisse,  cette belle propriété de la fin du XVIIe auprès d'anciens agriculteurs alors que la bâtisse était mal en point. Le couple l'a restaurée soigneusement depuis et ouvre aujourd'hui volontiers les abords de leur résidence secondaire aux visiteurs lors des journées du patrimoine ou d'événements locaux.","architecture":"Cadreils, date de 1689, comporte une galerie. Du côté ouest se trouvent deux tours, l'une ronde, l'autre carrée. Façade d'allure classique sorganise à partir dun corps principal quadrangulaire, auquel se raccordent vers lest des bâtiments annexes délimitant une cour, fermée à lest par un mur sur une dénivellation denviron cinq mètres. La façade principale, à louest, est flanquée au nord dune tour ronde, au sud dune tour carrée en légère saillie. À un étage sur rez-de-chaussée, marqué par une moulure simple, elle présente des grandes fenêtres de style classiques sur trois travées. Bien que datée de la fin du XVIIe siècle, la construction demeure dune austérité encore moyenâgeuse, sans vocation militaire ou défensive, le château était cependant entouré de douves, seulement animée par des baies à meneaux et des fenêtres classiques. Le côté nord présente un ensemble de constructions disparates. La façade méridionale offre en revanche une galerie au premier étage, formée de quatre arcades à arcs en anse de panier, bordées dun garde-corps à balustres en double poire. Avec la présence au centre de la façade dun fronton triangulaire dune modénature soignée, on sattendrait à ce que la galerie sétende sur toute la longueur de la façade dans le respect de la symétrie (trois arcades de part et dautre de larcade centrale). Au lieu de cela, le mur nu se poursuit vers lest, percé à gauche dune grande baie à meneaux, et à droite dune fenêtre étroite. Le rez-de chaussée présente quelques ouvertures sans décoration particulière.  Lélévation et les toitures sont inscrites aux monuments historiques depuis 1973.","habitants":"Famille de Berrac de Cadreils                                                       Famille Gayet \r\n        \r\n        \"","divers":"Château de Cadreils à Berrac","gps":"","images":["../image/image_32/32_Cadreils_1.jpg","../image/image_32/32_Cadreils_2.jpg","../image/image_32/32_Cadreils_3.jpg","../image/image_32/32_Cadreils_4.jpg"]},"Consult_chateau_formulairee368":{"id":"Consult_chateau_formulairee368","dept":"32","canton":"Riscle","commune":"Cahuzac-sur-Adour","nom":"Cahuzac_Adour","type":"Château","periode":"XV","histoire":"Deux châteaux à Cahuzac celui de Cahuzac et celui de Saint-Julien.                                                                                         CAHUZAC, du XVe siècle,  Cadusacum qui est  issu dun nom gaulois, Cadus,  que les Romains (ou, sil faut être rigoureux, les Gallo-Romains ) ont latinisé en Cadusius  avant de lui adjoindre le suffixe-acum, habituel dans ces cas dattribution de propriété. Château du XVe siècle, appartenant depuis 1606 à la famille Saint-Julien. Le château a été très remanié au XVIIIe siècle. \r\nST-JULIEN,  ce fut, dès le XIIe siècle, le siège d'une importante seigneurie dont les derniers seigneurs furent les de Saint-Julien.","architecture":"St-Julien à Cahuzac   La demeure, élevée au XVe siècle, remaniée au XVIIIe siècle, est typique de la région, possède le caractère d'une belle gentilhommière avec son corps de logis à un étage cantonné de tourelles quadrangulaires, sa toiture de tuiles plates, ses élégants pavillons et ses communs aux murs bâtis en galets de l'Adour. L'accès se fait par une grande allée d'arbres qui s'ouvre entre deux bornes. La façade Est comporte un bandeau qui souligne le premier étage. La façade ouest est adossée à des communs du XIXe siècle, dont les murs comportent des galets roulés à la mode du pays. Sans doute par suite de saccages révolutionnaires, le mobilier ne comporte pas d'éléments antérieurs au début du XIXe siècle.\r\nEléments protégés MH : les façades et les toitures : inscription par arrêté du 19 décembre 1973.","habitants":"Famille Saint-Julien\r\n        \r\n        \"","divers":"Château de Cahuzac et de St- Julien à Cahuzac sur Adour","gps":"","images":["../image/image_32/32_Cahuzac_Adour_1.jpg","../image/image_32/32_Cahuzac_Adour_2.jpg","../image/image_32/32_Cahuzac_Adour_3.jpg","../image/image_32/32_Cahuzac_Adour_4.jpg","../image/image_32/32_Cahuzac_Adour_5.jpg","../image/image_32/32_Cahuzac_Adour_6.jpg","../image/image_32/32_Cahuzac_Adour_7.jpg"]},"Consult_chateau_formulaireddc8":{"id":"Consult_chateau_formulaireddc8","dept":"32","canton":"Gimont","commune":"Cantonvielle","nom":"Cantonvielle","type":"Château","periode":"XVIII","histoire":"A Cantonvielle le château de Montagnac et à quelques kilomètres au Sud-Est le château de Razenques, chambres d'hôtes.                                                          MONTAGNAC, pas d'information historique mis à part  La société G.F.A. au château, elle a été crée en 1988 et est immatriculée au registre du commerce et des sociétés.  Il s'agit d'un société dont la forme juridique est un groupement foncier agricole.         RAZENGUES, l'établissement chambres d'hôtes vous accueille dans le décor authentique d'un château du XVe siècle.","architecture":"Château de Montagnac de plan rectangulaire a  deux niveaux  deux et trois avec attiques toit à deux pans flanqué mi-hors oeuvre d'une tour  hexagonal avec toits en poivrière à six pans.                                            Razengues de plan en U, trois  corps de logis  a deux niveaux flanqué de tours carrées sur angles à toits plats en terrasses.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Château de Montagnac et de Razengues à Cantonvielle.","gps":"","images":["../image/image_32/32_Cantonvielle_1.jpg","../image/image_32/32_Cantonvielle_2.jpg","../image/image_32/32_Cantonvielle_3.jpg","../image/image_32/32_Cantonvielle_4.jpg","../image/image_32/32_Cantonvielle_5.jpg"]},"Consult_chateau_formulaire5e3a":{"id":"Consult_chateau_formulaire5e3a","dept":"32","canton":"Plaisance","commune":"Couloumé-Mondebat","nom":"Cassagnac_Couloumé","type":"Château","periode":"XVIII","histoire":"Plusieurs châteaux à Couloumé-Mondebat dont celui de Couloumé, celui   de Cassagnac, d'Arlens et de Saint-Gervazy  voir article pour ces trois derniers.                                              CASSAGNAC, les origines se situent au XVe siècle, Guillaume de Montagut, seigneur et vassal du comte d'Armagnac, s'étant rebellé contre l'autorité royale, fut privé de ses droits et de ses biens en 1463 par Louis XI qui les donna à sa fille Anne de Beaujeu en 1482.  Fin XVIIIe siècle, la propriété appartient à l'Abbé de Montesquiou, pair de France, et duc de Fezensac. En 1821, il fait restaurer l'édifice, réédifier les tours, poser les parquets de bois rares, bâtir des communs dont la grande cour ovale achevée en 1818, porte le nom de cour du comte. En 1837, le château passe dans la famille de Cassagnac, qui l'occupa durant trois générations en lui donnant une notoriété nationale de part les diverses fonctions que ses membres avaient occupées,  député du Gers de 1876 à 1893,  il décède en 1904. Lhistoire se poursuit avec ses deux fils Paul et Guy, aussi brillants journalistes que duellistes. Tous deux suivent la lignée paternelle. Guy décède dès les premiers jours de la guerre de 1914/1918. La carrière journalistique de Paul le conduit à livrer quelques duels, dont le célèbre dernier face à Maurras en 1912. Conseiller général du canton de Plaisance jusquen 1937 il sest éteint en 1966 au château. À Auch deux descendants des Granier de Cassagnac étaient présents à la conférence de Gilbert Sourbadère. Marie-Charlotte qui vit a Plaisance et Xavier de Toulouse. En 1953, il a été vendu au général Brutinel qui, trente ans plus tard, le vendait à la ville d'Istres.","architecture":"Cassagnac, comme toutes les nobles demeures de l'Armagnac, le château devait avoir la forme d'une tour-salle. Tombé en ruines, il a été reconstruit à la fin du XVIIIe siècle. Il se présente sous la forme d'une grosse maison rectangulaire entourée d'un très beau parc de 3 hectares. A l'instar de ses voisins de Sabazan et de Saint-Gô, à Bouzon-Gellenave, Larroque est un de ces châteaux qui ont participé à façonner l'image qualitative des vins de Saint-Mont à l'international. L'histoire ne dit pas si Kate et William ont humecté leurs lèvres d'un vin de Saint-Mont, ni si, avant de quitter le pays d'Artagnan, ils ont eu le temps de visiter la splendide petite église de Pouydraguin pour y laisser un mot sur le livre d'or.                              Couloumé, centre de vacances de la ville dIstres depuis 1983, hébergement atypique datant du XVIIIe siècle,  implanté au cur dun parc de 8 hectares,","habitants":"Famille Garnier de Cassagnac\r\n        \r\n        \r\n        \"","divers":"Château de Cassagnac à Couloumé-Montebat","gps":"","images":["../image/image_32/32_Cassagnac_Couloume_1.jpg","../image/image_32/32_Cassagnac_Couloume_2.jpg","../image/image_32/32_Cassagnac_Couloume_3.jpg","../image/image_32/32_Cassagnac_Couloume_4.jpg","../image/image_32/32_Cassagnac_Couloume_5.jpg","../image/image_32/32_Cassagnac_Couloume_6.jpg","../image/image_32/32_Cassagnac_Couloume_7.jpg","../image/image_32/32_Cassagnac_Couloume_8.jpg"]},"Consult_chateau_formulairea0f9":{"id":"Consult_chateau_formulairea0f9","dept":"32","canton":"Eauze","commune":"Cassaigne","nom":"Cassaigne","type":"Château","periode":"XIII-XV","histoire":"Deux châteaux à Cassaigne dont celui de Cassaigne du XIII-XVIIIe siècle et celui de Léberon  du XV-XVIIe siècle.                                                         CASSAIGNE Ancienne résidence d'été des Evêques de Condom, le château construit dans la première moitié du XVIe siècle.  Il restera propriété des évêques de Condom qui en feront leur maison de campagne jusquà la Révolution. Ses descendants en sont encore propriétaires.  possède notamment une cuisine typique avec sa voûte en \"cul de four\".  De plus, c'est un haut lieu de production de vin de pays, de Floc de Gascogne et d'Armagnac  En 1819, Bertrand Duviard, chirurgien à Cassaigne, son fils héritier Joseph, rabaisse les deux tours et sépare le château de l'église. iL a accueilli dans ses murs Blaise de Monluc, auteur des commentaires qui selon Henri IV constituait « le meilleur ouvrage militaire jamais écrit ». Jean Du Chemin, poète contemporain de Du Bellay et de Ronsard, vécut aussi au château. Cassaigne est aujourd'hui une propriété viticole de 35 ha et une vitrine de la production d'eau-de-vie d'Armagnac et de floc de Gascogne.  Appartient aujourd'hui à la famille Faget.  Il est le troisième château le plus visité du Gers, classé au titre des monuments historiques en 1987.                                                                                 LEBERON château de la famille de Rozes viticulteur. A l'intérieur, des peintures murales dans la salle construite au XVIe siècle par les seigneurs de Gélas, neveu et petit-neveu de Blaise de Montluc. est classé au titre des monuments historiques en 1963.","architecture":"Le premier château  de Cassaigne a été construit en 1247 et il a pu participer à la ligne de défense des Français, avec les châteaux de Mansencôme et Lagardère, face aux territoires défendus par les Anglais et leurs alliés. Point fort d'un bourg castral, construit par Montassieu de Galard, abbé de St-Pierre de Condom jusqu'à la Révolution. \r\nLe château  en forme de U dont subsistent de nombreux éléments leur doit d'importantes modifications et de beaux aménagements du XVIIe-XVIIIe siècles. Il était aussi un refuge lors des périodes troubles. Le château a été construit au début du XVIe siècle sur les murailles d'un ancien château gascon.  La façade actuelle avec ses lignes classiques et ses proportions harmonieuses inspire le calme et la sérénité,  sa travée centrale  encadrée de pilastres plats, comporte au rez- de-chaussée une porte surmontée d'un fronton triangulaire et couronné d'un fronton courbé au niveau du toit. Les austères murailles du XIIIe siècle supportent le bâtiment Renaissance aux fenêtres à meneaux et les balcons aménagés au XIXe siècle.                                          Leberon  après le XIIIe siècle à subit  des remaniements importants;    la majeure partie de l'édifice appartient à l'époque de la Renaissance. La tour circulaire peut dater du XIVe siècle. Le corps de logis constitue sans doute la partie la plus ancienne de la propriété, toit octogonal, toiture à pignon aigu, fenêtres à meneaux, lensemble est tapi sous des chênes multi-centenaires. Le château primitif beaucoup plus haut au XVIe siècle ont y installa des baies à tous les étages, le noyau central carré flanqué de trois tours rondes la plus petite escalier à vis.","habitants":"Evêques de Condom                                                                       Famille de Rozes \r\n        \r\n        \"","divers":"Château de Cassaigne et de Leberon à Cassaigne","gps":"","images":["../image/image_32/32_Cassaigne_1.jpg","../image/image_32/32_Cassaigne_2.jpg","../image/image_32/32_Cassaigne_3.jpg","../image/image_32/32_Cassaigne_4.jpg","../image/image_32/32_Cassaigne_5.jpg","../image/image_32/32_Cassaigne_6.jpg","../image/image_32/32_Cassaigne_7.jpg","../image/image_32/32_Cassaigne_8.jpg","../image/image_32/32_Cassaigne_9.jpg"]},"Consult_chateau_formulairebe17":{"id":"Consult_chateau_formulairebe17","dept":"32","canton":"Fezensac","commune":"Lupiac","nom":"Castelmore","type":"Château","periode":"XVI","histoire":"CASTELMORE,   Entre 1610 et 1620, ce château vit la naissance du comte Charles de Batz ou de Montesquiou qui mourut au siège de Maastricht en 1673. Ce lieutenant de la première compagnie des mousquetaires a été immortalisé par Alexandre Dumas et est beaucoup plus connu sous le nom de d'Artagnan. Il est aujourd'hui la figure emblèmatique de la Gascogne. Bertrand II hérite du château de Castelmore,  de la part de son oncle. De son mariage avec Françoise de Montesquiou  naissent sept enfants, trois filles et quatre garçons. Trois des garçons, dont Charles, choisissent le métier des armes et deviennent nobles et gens dépée. Ils ajoutent le nom « dArtagnan », celui de leurs cousins Montesquiou. En fait, comme Castelmore dépendait du parsan de la chapelle de Beaubeste, cest à Beaubeste que ce Charles de Batz dut être baptisé et enregistré. Celui-ci, lors dune vie trépidante au service de Louis XIV, revient une seule fois, dans sa vie d'adulte, sur les traces de son enfance, au château de Castelmore, mais ses parents sont déjà décédés. Cest lors du voyage qui mène le roi à Saint-Jean-de-Luz pour son mariage avec lInfante dEspagne.  Aujourd'hui le plus ancien château du Gers, se trouve le château privé de Castelmore qu'habite le sénateur-maire Yves Rispat depuis une cinquantaine d'année.","architecture":"Castelmore, la construction du XVIe siècle pour l'essentiel, a fait l'objet de transformations importantes au siècle suivant dans l'esprit duquel a été édifiée la petite chapelle du domaine isolée dans la campagne. \r\nÀ voir au village : le musée d'Artagnan et la statue équestre de d'Artagnan.   D'après la tradition, cet édifice serait la maison natale de d'Artagnan (1611). Le château de Castelmore développe une façade à deux étages. La porte d'entrée, légèrement située au-dessus du sol, est desservie par un escalier. Une tour ronde est située au nord et au sud. La façade est étroite et cantonnée de deux tours carrées. A l'intérieur, décor du XVIIIe siècle.  Un escalier mène à la porte d'entrée. Le décor intérieur date des travaux effectués plus tard.","habitants":"Charles de Batz\r\n        \r\n        \"","divers":"Château de Castelmore à Lupiac","gps":"","images":["../image/image_32/32_Castelmore_1.jpg","../image/image_32/32_Castelmore_2.jpg","../image/image_32/32_Castelmore_3.jpg","../image/image_32/32_Castelmore_4.jpg","../image/image_32/32_Castelmore_5.jpg","../image/image_32/32_Castelmore_6.jpg"]},"Consult_chateau_formulairea696":{"id":"Consult_chateau_formulairea696","dept":"32","canton":"Montesquiou","commune":"Castelnau-d","nom":"Castelnau_Anglès","type":"Vestiges tour porte","periode":"XIII","histoire":"CASTELNAU d'ANGLES  dépendait dès le XIIIe siècle de la seigneurie de Montesquiou, au pays de la baronnie d'Anglès.\r\nLes terres et la seigneurie resteront par héritages successifs propriété, en ligne directe ou indirecte et jusqu'au XVIIIe siècle, de personnages issus de cette célèbre famille.   Les Templiers posséderont au XIIIe siècle des biens sur ce territoire (grange d'En-Martin et salle de Rambos) et au XVe siècle une activité de verriers y sera florissante près du bois de Montpellier ; on y trouvera plus tard des tuileries.","architecture":"Tour-Porte,  le village-rue et l'église de ce castelnau étaient jadis protégés de murs d'enceinte percés de deux portes fortifiées. Seule subsiste la tour-porte Ouest : accolée à l'église Saint-Pierre, elle lui sert de clocher. Cette modeste église rurale fut décorée au XVIIe par le moine Jean Lamy, de l'ordre de Saint Antoine.  Le château seigneurial, anciennement maison forte, était curieusement situé hors les murs. Doté d'un donjon et de deux tours de 12 à 14 m de haut, il finit par menacer ruine et fut démoli pour être reconstruit différemment au XIXe siècle, conservant de modestes vestiges à la base d'une tour.","habitants":"Seigneurie de Montesquiou\r\n        \r\n        \r\n        \"","divers":"Porte de la bastide de Castelnau d'Anglès","gps":"","images":["../image/image_32/32_Castelnau_Angles_1.jpg","../image/image_32/32_Castelnau_Angles_2.jpg"]},"Consult_chateau_formulaire5c9a":{"id":"Consult_chateau_formulaire5c9a","dept":"32","canton":"Astarac-Gimone","commune":"Castelnau-Barbarens","nom":"Castelnau_Barbarens","type":"Vestiges tour","periode":"XII","histoire":"CASTELNAU-BARBARENS, au XIIe siècle, les coseigneurs Bernard I comte d'Astarac, et Guillaume Arnaud Desbarats, conclurent un accord, pour édifier à parts égales le \"Château Neuf\" de Barbarens : \"Bastirén et edifiquirén per mici Io castet nàou de Barbarens\".  Le village se construisit ensuite autour du château : pour attirer la population, les coseigneurs promirent aux familles de les protéger. Mais, la famille Desbarats dès le XVe siècle, plus tard les comtes d'Astarac, et plus tard encore les comtes d'Uzès, abandonnèrent leur emprise féodale sur Castelnau Barbarens, tandis que les populations paysannes devenaient maîtresses de leurs destinées.","architecture":"Ce site, difficile d'accès, était spécialement choisi pour éviter toute invasion. Ainsi, il se dressait sur la plate-forme supérieure du site, et le piton rocheux, au centre, servait d'assise au donjon. Le village dominé par le château des comtes d'Astarac, était donc agrippé sur les flancs abrupts des terrasses concentriques. Les arcs des rues s'abaissent en gradins vers la vallée.   Avec Durban, Moncassin et Villefranche d'Astarac, Castelnau Barbarens fut dès le XIIe siècle, l'une des quatre châtellenies de l'Astarac. On ne peut retrouver aujourd'hui que de rares vestiges du château. Elles nous apprennent qu'il y avait trois tours crénelées, reliées par de gros murs. À l'ouest, deux de ces tours gardaient la vallée. La tour qui existe encore, parce que la partie supérieure fut plus tard reconstruite, pouvait abriter des archers. C'était une tour de défense qui protégeait, à l'est, l'unique possibilité d'entrer au château.  De pierre en pierre, le château s'écroula, jusqu'à n'être plus qu'en 1850 un amas informe engendrant légende. Il émergeait une tour carrée de 22 mètres de haut, qui devait son entretien et sa survie à sa reconversion, puisque les habitants lui avaient donné entre temps l'usage de clocher, perçant à la base de la tour deux portes en arc brisé. C'est à partir de 1865, que l'église actuelle fut édifiée sur l'emplacement du château. La pioche et les mèches vinrent à bout de la forteresse imprenable, de même qu'elles détruisirent sur la place d'Uzès,","habitants":"Famille Desbarats\r\n        \r\n        \"","divers":"Château de Castelnau Barbarens","gps":"","images":["../image/image_32/32_Castelnau_Barbarens_1.jpg","../image/image_32/32_Castelnau_Barbarens_2.jpg"]},"Consult_chateau_formulaire1347":{"id":"Consult_chateau_formulaire
