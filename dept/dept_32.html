 changement de famille s'étant effectué, depuis le XIVe siècle, par mariage. Il est actuellement occupé par les descendants de ces familles. Il est inscrit aux monuments historiques depuis 1993.","architecture":"Sainte-Gemme, le château se situait à louest sur une butte isolée par des fossés et la chapelle castrale se trouvait au centre.  Le plan cadastral de 1826 nous montre le tracé dune vaste enceinte ovale située au nord du village.                                                       Lauret  A l'origine se trouvait sûrement un château médiéval délimité par des douves. Les pièces du rez-de-chaussée sont situées nettement au-dessus du niveau du sol, sur une cave éclairée et aérée par une série de soupiraux, l'ensemble de la construction repose sur une série de piliers de bois posés sur des bases en pierre.\r\nDans le sous-sol se trouvent des silos de trois mètres servant autrefois au stockage des provisions. La demeure est flanquée d'une tour quadrangulaire en brique, à laquelle s'adossent les communs.","habitants":"Seigneurs de Sainte-Gemme\r\n        \r\n        \"","divers":"Château de Ste-Gemme","gps":"","images":["../image/image_32/32_Ste_Gemme_1.jpg","../image/image_32/32_Ste_Gemme_2.jpg","../image/image_32/32_Ste_Gemme_3.jpg","../image/image_32/32_Ste_Gemme_4.jpg"]},"Consult_chateau_formulairee882":{"id":"Consult_chateau_formulairee882","dept":"32","canton":"Lectoure","commune":"Sainte-Mère","nom":"Ste_Mère","type":"Château","periode":"XIII","histoire":"Deux château à Sainte -Mère et celui de Clot.                             SAINTE-MERE,  C'est un véritable château gascon qui date du IVe quart du XIIIe siècle. Il fut bâti pour Gérard de Monlezun, évèque de Lectoure, de 1273 à 1301, il servira de résidence des Evêques durant 499 années. Vers 1600, il semble qu'il soit accidentellement incendié.  Après 1792, les révolutionnaires réquisitionnent le château et le vendent à des marchands de biens. Comme souvent, ces personnages démantèlent les murs pour vendre les pierres, boiseries, poutres. En 1977, le château est classé aux Monuments Historiques. Au XXe siècle, le bâtiments est acheté  par un Anglais qui le restaure.                   CLOT, le château, construit en 1816, possède un pigeonnier porche assez typique, daté pour sa part de 1638. Le rez-de-chaussée forme le porche de la cour intérieure du château, il comporte deux arcs plein cintre. Une porte pleine devait autrefois s'appuyer intérieurement sur un arc d'ouverture différente, bloquée par des barres. Meurtrières de chaque côté de la porte sud et une autre du côté est. L'étage unique est souligné par un larmier, auquel a été ajouté au XIXe siècle, une bande de fer blanc, très lisse. Une échelle en bois permettait l'accès à la trappe.","architecture":"Faible surface au sol, construction quadrangulaire en hauteur, deux tours de plan à peu près carré aux angles, ici ce ne sont pas, comme ailleurs, les angles opposés, mais les deux tours se trouvent alignées sur le mur nord, rez-de-chaussée aveugle. Laccès se faisait par un escalier ou une échelle mobile au premier étage. Le corps central, mesurant 18 m sur 11 m, pour une hauteur actuelle de 15 m, était à trois niveaux, le rez-de-chaussée servant de réserve et  de logis pour la garnison, les étages supérieurs, dun seul tenant sans murs de refend en maçonnerie, étant les étages à usage dhabitation. La tour Est la plus grande, mesure 5,5 m de côté et 26 m de haut. Un escalier à vis maçonné permettait den atteindre le sommet. La tour ouest mesure 3 m sur 2 et est haute de 20 m. Il y avait peu douvertures, hormis détroites archères cruciformes et quelques meurtrières. La seule modification fut louverture dune fenêtre à meneaux, au XVe siècle. Létage résidentiel est équipé déviers, placards, cheminées.\r\nLe château, bâti en appareil soigné, na pas de fonctions défensives à proprement parler, pas de défenses extérieures, ni fossé, ni glacis, ni enceinte, pas de bretèches. Les deux tours de la façade nassurent pas un rôle de flanquement. Le couronnement disparu ne permet pas de savoir sil était crénelé ou muni de mâchicoulis. La présence de boulins et de corbeaux peut laisser penser à la présence de hourds en bois et peut-être dun chemin de ronde. Toutefois, le village lui-même devait posséder une enceinte constituée dun simple mur et dune tour-porche, devenue le clocher de léglise. Une demeure du XVIIIe siècle jouxte le château.","habitants":"Famille de Gérard de Montezun\r\n        \r\n        \r\n        \"","divers":"vestiges du château de de Sainte-Mère et château du Clot et de Labritte","gps":"","images":["../image/image_32/32_Ste_Mere_1.jpg","../image/image_32/32_Ste_Mere_2.jpg","../image/image_32/32_Ste_Mere_3.jpg","../image/image_32/32_Ste_Mere_4.jpg","../image/image_32/32_Ste_Mere_5.jpg","../image/image_32/32_Ste_Mere_6.jpg","../image/image_32/32_Ste_Mere_7.jpg","../image/image_32/32_Ste_Mere_8.jpg","../image/image_32/32_Ste_Mere_9.jpg"]},"Consult_chateau_formulaired14b":{"id":"Consult_chateau_formulaired14b","dept":"32","canton":"Ségoufielle","commune":"Ségoufielle","nom":"Ségoufielle","type":"Château","periode":"XV","histoire":"Deux châteaux à Ségoufielle, celui de  Fumet  et celui de Las Néous, dont je n'ai pas d'information historique pour ces deux.                                               SEGOUFIELLE, cet ancien Castelnau du nom de personne germanique apparu à la fin du XIIe siècle est compris en 1288  dans la baronnie de LIsle-Jourdain. F.J. Bourdeau signale quen 1191 un certain Hugues de Ségoufielle fut présent à un accord entre le comte de Toulouse et celui de LIsle-Jourdain. Ce rôle de témoin assuré par ce fameux Hugues révèle le statut pluriséculaire de Ségoufielle : pendant longtemps la commune a été rattachée au comté de lIsle. Cest bien ce que nous apprend labbé dExpilly dans la deuxième moitié du XVIIIe siècle.","architecture":"Las Néous de plan rectangulaire à deux niveaux toit en croupes flanqué de tourelles carrées aux angles et d'un beau pigeonnier de plan carré sur arcades.","habitants":"Seigneurs locaux\r\n        \r\n        \r\n        \"","divers":"Château de Las Néous à Ségoufielle","gps":"","images":["../image/image_32/32_Segoufielle_1.jpg","../image/image_32/32_Segoufielle_2.jpg","../image/image_32/32_Segoufielle_3.jpg","../image/image_32/32_Segoufielle_4.jpg","../image/image_32/32_Segoufielle_5.jpg"]},"Consult_chateau_formulaire7f2e":{"id":"Consult_chateau_formulaire7f2e","dept":"32","canton":"Fleurance","commune":"La Sauvetat","nom":"Sérillac","type":"maison forte","periode":"XIII-XVIII","histoire":"SERILLAC, à la Renaissance, la forteresse est aménagée en demeure de campagne. Dans un des contes de Gascogne recueillis par Jean-François Bladé, le Bâtard, le héros est amoureux de la fille dun noble qui demeurait au château de Sérillac.  Situé aux portes de La Sauvetat, dominant fièrement la campagne environnante, propriété de monsieur Buchet. \r\n Il est inscrit monument historique depuis 2002.","architecture":"Château médiéval est construit au XIIIe siècle. sur une motte féodale, qui laisse penser quune position défensive existait préalablement. Le château doit subir les effets dévastateurs des guerres de religion, comme le village de La Sauvetat. Sa façade classique flanquée de deux tours témoigne des nombreux remaniements subit par le château au cours des cinq siècles suivants sa construction, fortement remanié aux XIVe, XVIe, XVIIe et XVIIIe siècles.  châtelet donnant accès à une cour d'honneur. de plan en U, dont les ailes enserrent une cour étroite. Les ailes nord et sud seraient des tours médiévales arasées. L'aile sud témoigne essentiellement des aménagements réalisés au XVIIIe siècle, La façade médiévale du corps de logis central a été doublée par une grande façade dont la porte d'entrée est couronnée par un fronton curviligne daté de 1744. Pour y accéder, on trouve dabord à lest un castelet du XVIIe siècle, long bâtiment quadrangulaire, formant portique, avec un porche voûté du XVIIe siècle, puis une cour dhonneur bordée au sud par des communs.  Les bâtiments sont couverts de toits de tuiles et des génoises à trois rangs courent à la jonction des murs et des toits. Le bâtiment médiéval central sest vu adjoindre une façade de style classique. Laile sud a principalement bénéficié des aménagements du XVIIIe siècle, des décors de gypseries et des plafonds à la française.","habitants":"monsieur Alain Vircondelet\r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Sérillac","gps":"","images":["../image/image_32/32_Serillac_1.jpg","../image/image_32/32_Serillac_2.jpg","../image/image_32/32_Serillac_3.jpg","../image/image_32/32_Serillac_4.jpg"]},"Consult_chateau_formulairea648":{"id":"Consult_chateau_formulairea648","dept":"32","canton":"Lombez","commune":"Mongausy","nom":"Tancouet","type":"Forteresse","periode":"XVI","histoire":"Tancouet. Un de ses seigneurs nommé Gaspart participe à une revue d'Auch en 1586. A la fin du XVIe siècle, le seigneur de Lamothe-Mongausy était sous les ordres du maréchal de Biron Son activité est classée dans la catégorie Immobilier SCI : Toutes activités de location meublée, hébergement hôtelier ou para-hôtelier, et de gestion de résidences de tourisme ou hôtelières.\r\nSes dirigeants sont MME Agniya LYLE, M. James, Robert, Bryan LYLE gérants.","architecture":"château féodal de Tancouet du XVIe siècle corps de logis  de plan carré à trois niveaux toit en croupe  entre deux tours une ronde l'autre carré à quatre niveaux.","habitants":"seigneur de Lamothe-Mongausy\r\n        \r\n        \"","divers":"Château de Tancouet à Mongausy","gps":"","images":["../image/image_32/32_Tancouet_1.jpg","../image/image_32/32_Tancouet_2.jpg","../image/image_32/32_Tancouet_3.jpg"]},"Consult_chateau_formulaireb07b":{"id":"Consult_chateau_formulaireb07b","dept":"32","canton":"Baïse-Armagnac","commune":"Maignaut-Tauzia","nom":"Tauzia","type":"Vestiges","periode":"XIII-XVI","histoire":"A MAIGNAUT ce château fut la résidence notamment des seigneurs de Maignaut, de Castelbajac ou encore de Cassagnet.\r\nTAUZIA mentionné pour la première fois en 1362 alors quil appartient à Menaud de Barbazan, le château devient la propriété du riche et puissant seigneur de Marestang à la fin du XVe siècle. La maison de Marestang est fort ancienne dans lhistoire de la Gascogne. Issue du comté de lIsle Jourdain, le fief seigneurial se trouve au Sud, sur la Save. Jean de Marestang fit lacquisition de la seigneurie du Tauzia en 1479. Cest à ce moment que le château subit quelques transformations.  Le bien familial des Marestang fut partagé à chaque succession et ainsi jusqu'en 1632 , que Guillaume de Marestang, héritier de droit, reçoit le château, la métairie attenante et le moulin. Il sendetta auprès de son voisin, le seigneur de Léberone  en 1640 ruiné, Guillaume de Marestang donna au seigneur de Léberon le château avec toutes ses dépendances. A partir de cette date, le château ne fut plus habité. En 1710, le Tauzia quitte la famille de Léberon et tombe dans le giron du seigneur de la Forcade de Pin, originaire dOrthez, en Béarn. Ainsi de pères en fils, le château du Tauzia et ses dépendances demeurèrent la propriété de la famille de La Forcade du Pin jusquau XXe siècle, en mai 1953  le château et ses terres sont vendues à M. Alfred Bajolle.","architecture":"Maignaut, construit au XIVe siècle, il fut modernisé entre les XVe et XVIe siècles  Au XVIIIe siècle, il sert de résidence aux fermiers de la terre de Maignaut. Entre 1816 et 1850, la partie du château bordant la place publique a été transformée en habitations Jusqu'au milieu du XIXe siècle, le château est une ferme en plein village : il abrite des granges, un pressoir. Dans les années 80, il était question de le détruire. Un nouveau propriétaire évitera la démolition et le restaurera. Il est actuellement habité.                    Tauzia, il sagit dun corps principal rectangulaire, dont le rez-de-chaussée était dépourvu douvertures. Il est flanqué de deux tours, la principale de plan carré à langle est protégeant une porte, la seconde à langle ouest étant une simple tourelle rectangulaire posée obliquement en encorbellement. Plus tard, lintérieur est divisé sur les deux étages par un mur de refend, qui reçoit des cheminées. Vers 1500 on perce des baies à meneaux et on élève une cage descalier circulaire qui fait légèrement saillie sur la façade sud-est. Encore renforcé à lépoque de la Fronde, le château est ensuite abandonné et tombe lentement en ruine.   Évidemment, les murs du château possédaient des archères en croix, mais la Renaissance et l'envie de confort ont modifié la façade Sud de cette ancienne forteresse. De belles et nombreuses fenêtres à meneaux en croix avec des moulures rondes adoucissent la forme brute de cet ancêtre médiéval.","habitants":"Famille de Jean de Marestang \r\n        \r\n        \"","divers":"Vestiges du château de Tauzia et de Maignaud","gps":"","images":["../image/image_32/32_Tauzia_1.jpg","../image/image_32/32_Tauzia_2.jpg","../image/image_32/32_Tauzia_3.jpg","../image/image_32/32_Tauzia_4.jpg","../image/image_32/32_Tauzia_5.jpg","../image/image_32/32_Tauzia_6.jpg","../image/image_32/32_Tauzia_7.jpg","../image/image_32/32_Tauzia_8.jpg","../image/image_32/32_Tauzia_9.jpg"]},"Consult_chateau_formulaire02bb":{"id":"Consult_chateau_formulaire02bb","dept":"32","canton":"Adour-Gersoise","commune":"Termes-Armagnac-Barran","nom":"Termes_Armagnac","type":"Forteresse","periode":"XIII","histoire":"TERMES d'ARMAGNAC, ancien palais médiéval,  vers 1280, Jean d'Armagnac construisit un château, au début du XIVe siècle, à un cadet ou un bâtard des comtes d'Armagnac.  Naquit vers 1405 Thibault, baron de Termes et compagnon de Jeanne d'Arc pendant la guerre de cent ans. Aujourd'hui, seul le donjon de 36 mètres de hauteur est resté.  La tour fut édifiée vers 1280, pour le comte dArmagnac Bernard III. Il ne reste debout, que son imposant donjon, devenu le musée du panache gascon.  En 1986, un groupe de passionnés bénévoles ont créé une association pour préserver ce bel exemple d'architecture militaire du XIIIe siècle et pour y développer des activités médiévales. Les amis du musée du panache gascon font notamment revivre dans des salles de la tour l'histoire et ses grands personnages tels que Thibault d'Armagnac, Henri IV de Navarre, d'Artagnan et les Mousquetaires. Vers 1900 la commune le reçoit en don.","architecture":"Termes d'Armagnac à l'architecture, austère sur la limite des terres du comté d'Armagnac, comme l'indique le nom de terme.  Logis rectangulaire avec des contreforts aux angles et au milieu des grands côtés, surmontées de poivrières, cette puissante demeure qui porte sa maîtresse tour à 36 mètres de hauteur  sur rez-de-chaussée deux étages habitables dont le second est éclairé par des baies trilobée. Sur un petit côté s'appuie un donjon carré de six étages, reliés par un escalier à vis ménagé dans l'épaisseur d'un angle, le crénelage de la tour a disparu. Elle a fait l'objet d'une restauration soignée.   C'est un donjon de style médiéval. La tour porte est un élément bien conservé des anciennes fortifications entourant la ville. Elle est précédée d'un pont avec une arche en arc brisé cantonné de parapets à deux niveaux. À l'origine, la chaussée du pont était en bois et pouvait se replier pour se loger dans la rainure des parapets flanquant la porte. Le fossé, à cet endroit, est toujours visible. La tour porte est un carré de 7 m de côté et de 10 m de haut, couronnée à l'origine de créneaux remplacés depuis par une génoise.","habitants":"Famille de Jean d'Armagnac\r\n        \r\n        \"","divers":"Vestiges du château de Termes Armagnac","gps":"","images":["../image/image_32/32_Termes_Armagnac_1.jpg","../image/image_32/32_Termes_Armagnac_2.jpg","../image/image_32/32_Termes_Armagnac_3.jpg","../image/image_32/32_Termes_Armagnac_4.jpg","../image/image_32/32_Termes_Armagnac_5.jpg"]},"Consult_chateau_formulairebb1d":{"id":"Consult_chateau_formulairebb1d","dept":"32","canton":"Lectoure","commune":"Terraube","nom":"Terraube","type":"Château","periode":"XII-XVIII","histoire":"TERRAUBE, construit vers 1272, comme latteste une gargouille datée, pour la famille de Galard,  il s'est transmis depuis sa construction à nos jours de père en fils. Il appartient toujours  au marquis de Terraube.\r\nEn 1308 le Roi Philippe le Bel autorise le seigneur de Terraube à  remparer  sa ville. Les remparts toujours visibles en partie datent de cette époque.  Ce château typique est un véritable  château gascon  à l'origine, et date du XIIIe siècle. Depuis sa construction, il appartient aux ducs mérovingiens de Gascogne.  La famille Galard est composée de marquis et de vicomtes. Le château de Terraube s'est transmis de génération en génération et apporte une certaine notoriété au village de Terraube. C'est la famille de Galard qui possède le château de Terraube.","architecture":"Château gascon typique, il se composait à lorigine d\"un corps principal rectangulaire, flanqué de deux tours carrées aux angles opposés nord-est et sud-ouest.   Aux XVIe et XVIIe siècles, le château est agrandi et remanié, les communs sont ajoutés en 1690. À partir de 1768 le logis est agrandi par les maîtres maçons Guillaume Gras et Jacques Lapeyronie et Dominique Ducasse. Vers 1773 les maîtres maçons Guillaume Aurio et Joseph Labarthe ajoutent deux corps de logis. On installe une cheminée et une porte venant de la salle de Ferrières, à côté de Terraube. Depuis le 26 février 1988, le château bénéficie de deux protections au titre des monuments historiques: un classement (pour les façades et les toitures du château, la cage d'escalier et sa rampe en fer forgé, la fontaine dans les jardins et une inscription,  salle à manger au rez-de-chaussée ainsi que les façades et toitures des communs. Le couronnement a été refait au XVe siècle, avec des créneaux et des archères. Chaque merlon est surmonté dun boulet de pierre.","habitants":"Famille de Galard\r\n        \r\n        \"","divers":"Château médiéval de Terraube","gps":"","images":["../image/image_32/32_Terraube_1.jpg","../image/image_32/32_Terraube_2.jpg","../image/image_32/32_Terraube_3.jpg","../image/image_32/32_Terraube_4.jpg","../image/image_32/32_Terraube_5.jpg","../image/image_32/32_Terraube_6.jpg","../image/image_32/32_Terraube_7.jpg","../image/image_32/32_Terraube_8.jpg","../image/image_32/32_Terraube_9.jpg"]},"Consult_chateau_formulairefc57":{"id":"Consult_chateau_formulairefc57","dept":"32","canton":"Mirande","commune":"Tillac-Homps","nom":"Tillac","type":"Tour-Château","periode":"XIV","histoire":"TILLAC  la création de Tillac sétend entre le XIe et XIVe siècles. Le village, doté de fortifications élevées par Bernard VII, comte d'Armagnac, se présente à lépoque sous la forme dun quadrilatère fortifié, dont chaque angle est orienté vers un des points cardinaux, établi autour dun château. Celui-ci, appartenant aux comtes de Pardiac, nexiste plus, mais ses vestiges sont toujours visibles dans langle nord-est du village.                                                                               TILLAC, Raymond de Tillac damoiseau de la vicomté de Lomagne fils de Bertrand de Tillac, périt en avril 1272 au siège du château de Sonpuy, aujourd'hui Saint-Puy, qu'il avait provoqué avec gérard V d'Armagnac, contre Géraud de Cazaubon le seigneur du lieu. Aujourd'hui l'entreprise de monsieur Dominic Shorthouse, gère le domaine d'activité culture de céréales légumineuses, graines oléagineuses. \r\nPALLANE à la sortie de Tillac, est l'un des plus beaux châteaux du XVIIIe siècle de la région. Il a été construit pour Audirac, médecin à la mode à la cour de Louis XVI.","architecture":"Tillac du XIV -XVIe siècle corps de logis en équerre à deux niveaux  flanqué d' une tourelle toit en poivrières à 6 pans, le système défensif de Tillac comporte deux tours : la tour de Mirande à lest, et la tour de Rabastens à louest, soulignant limportance du castelnau dalors. La tour de Rabastens présente une particularité rare dans la région, celle de posséder seulement deux murs et pas de toit. Il sagit dune tour ouverte à la gorge, conçue pour empêcher les ennemis de sy installer si elle venait à être prise. La tour de Mirande, située à l'entrée Est de Tillac.      PALLANE le château-golf de Pallanne est implanté au cur dune vaste propriété à Tillac. Cette demeure avec fronton triangulaire sur le corps de logis central rectangulaire à trois niveaux et travées saillantes sur la partie centrale et prolongé  sur les flans de côté de bâtiments carrés de deux niveaux et quatre travées","habitants":"Famille Audirac\r\n        \r\n        \"","divers":"Tour de Tillac de Rabastens et château de Pallane","gps":"","images":["../image/image_32/32_Tillac_1.jpg","../image/image_32/32_Tillac_2.jpg","../image/image_32/32_Tillac_3.jpg","../image/image_32/32_Tillac_4.jpg","../image/image_32/32_Tillac_5.jpg","../image/image_32/32_Tillac_6.jpg","../image/image_32/32_Tillac_7.jpg","../image/image_32/32_Tillac_8.jpg"]},"Consult_chateau_formulaire414b":{"id":"Consult_chateau_formulaire414b","dept":"32","canton":"Condom","commune":"Touget","nom":"Touget","type":"Château","periode":"XIV","histoire":"TOUGET, dès le début, Touget fut une possession vicomtale qui resta rattachée au vicomté du Fezensaguet  jusquà la Révolution. La capitale était Mauvezin.\r\nTouget était donc à lorigine un  castelnau, village groupé autour du château  puis avec lévolution démographique la structure de la ville deviendra bastide, halle avec des marchés. Au XIVe siècle, dans le cadre de la lutte dinfluence que se livrent Armagnacs et Bourguignons, le château sera enlevé au comte de Pardiac par le comte dArmagnac.\r\nEn 1418, il résistera au comte de Foix, sénéchal de France. Touget dépendait toujours des héritiers des Armagnacs  Albret et Bourbon. Au XVIIe siècle Touget est divisé entre le vicomte du Fezensaguet et les religieux, chacun exigeant ses droits.\r\nUn extrait de reconnaissance de la communauté de Touget en faveur du vicomte et du prieur, datant de 1520, existe dans les archives de la commune.","architecture":"Des vestiges du château. En 1881 on pouvait lire quil restait à Touget les vestiges dune demeure seigneuriale et dun vieux donjon. Il y avait des restes de murs et des tours carrées,  la base carrée et massive dune seule tour aux murs très épais, des restes de fortifications  vestiges des remparts du village fortifié,  de douves, et des maisons du XVe et XVIe siècle en bois et colombages.\r\nDes vestiges du château une seule tour sur les 4. Il y avait deux portes dentrée dans la ville, abattues en 1793  la porte de la ville au sud, la porte de Cologne  à lest.  Le château actuel hôtel, bâtisse rectangulaire à deux niveaux toit en croupe accolé sur angles extérieurs de tours rondes  toit en poivrières.","habitants":"Famille des Albret\r\n        \r\n        \"","divers":"Château de Touget et de Peyrelongue","gps":"","images":["../image/image_32/32_Touget_1.jpg","../image/image_32/32_Touget_2.jpg","../image/image_32/32_Touget_3.jpg","../image/image_32/32_Touget_4.jpg","../image/image_32/32_Touget_5.jpg","../image/image_32/32_Touget_6.jpg","../image/image_32/32_Touget_7.jpg"]},"Consult_chateau_formulairef963":{"id":"Consult_chateau_formulairef963","dept":"32","canton":"Valence sur Baïse","commune":"Valence-sur-Baïse","nom":"Valence_Baïse","type":"Bastide-Château","periode":"XIII_XVII","histoire":"Deux châteaux à Valence sur Baïse celui de Leberon et de la Rouquette,   aussi l'abbaye de Flaran.                                       VALENCE sur BAISE, est une bastide perchée fondée en 1274 en paréage par l'abbé de Flaran et le comte d'Armagnac Géraud V. Frontalière du comté d'Agen, Valence est une bastide défensive assise sur un banc rocheux, à la confluence de la Baïse et de l'Auloue, dominant la vallée de plus de 50 mètres.                                                                  LEBERON du XVI -XVII ayant appartenu à la famille de Gélas viticulteur   où vécut un neveu de Monluc.                           ROUQUETTES, qui appartint à la famille du comte de Galard et dont le pré situé à une vingtaine de mètres accueillit les premières réunions hippiques en 1895, avant sa transformation en terrain de rugby dans les années 1920 avec l'association Les Pélicans.","architecture":"À proximité de la bastide du XIIIe siècle de Valence-sur-Baïse, labbaye de Flaran a été fondée en 1151 dans la vallée de la Baïse. Cest au cur dun parc que les bâtiments monastiques et les jardins présentent une parfaite illustration d'un ensemble cistercien du XIIe siècle, remanié jusqu'au XVIIIe siècle. Monument historique classé, l'abbaye de Flaran abrite l'exceptionnelle collection de Simonov où se découvre une centaine d'uvres du XVIIe au XXe siècle : Ronda, Monet, Steer, Courbet.    Autrefois Valence-sur-Baïse était entouré de remparts de huit mètres de haut avec quatre portes en pierre. Des sections importantes des remparts existent encore avec l'une des portes, la porte d'Espagne aussi connu comme la porte du Hérisson. Les remparts sont illuminés les nuits qui les rend très agréable pour une promenade en soirée.","habitants":"Famille de Gélas                                                                            Famille de Galard\r\n        \r\n        \r\n        \"","divers":"Remparts de la ville de Valence sur Baïse, le château de la Rouquette, de Leberon et l'abbaye de Flaran","gps":"","images":["../image/image_32/32_Valence_Baise_1.jpg","../image/image_32/32_Valence_Baise_2.jpg","../image/image_32/32_Valence_Baise_3.jpg","../image/image_32/32_Valence_Baise_4.jpg","../image/image_32/32_Valence_Baise_5.jpg","../image/image_32/32_Valence_Baise_6.jpg","../image/image_32/32_Valence_Baise_7.jpg","../image/image_32/32_Valence_Baise_8.jpg","../image/image_32/32_Valence_Baise_9.jpg"]},"Consult_chateau_formulaire045a":{"id":"Consult_chateau_formulaire045a","dept":"32","canton":"Fézensac","commune":"Vic-Fézensac","nom":"Vic_Fézensac","type":"Château","periode":"XV-XVI","histoire":"Plusieurs châteaux à Vic Fézensac celui de Belmont, de Gimat, de Pimbat de Cruzalet, de Marteret  et de Pujos à Roquebrune plus au sud                                                                             MARTERET  magnifique château au coeur d'une propriété de 130 ha, dans un environnement verdoyant, calme et reposant, restauré avec soin , luxueux, décoration moderne, parc, grand lac privé, chevaux. Il convient parfaitement à des vacances familiales ou aux rencontres professionnelles.                                                    VIC, comprenait un centre ville et un autre  autour du château  qui servit de   résidence aux comtes de Fezensac jusqu'en 1140, laissant un terrain vague libre en son milieu.                                                           PUJOS aujourd'hui exploitation agricole par Jean Yves Petit   depuis 6 ans, elle est spécialisée dans le secteur d'activité de la culture de la vigne.                                                                     PRENERON au sud ouest de Vic, château du XIXe siècle, aujourd'hui chambres d'hôtes de Lou Prada.","architecture":"VIC, c'est au IXe siècle que le site fut définitivement\r\nchoisi, le long du cours d'eau l'Osse, lieu et site donnèrent enfin naissance à un bourg nommé d'abord Fidentia, du nom d'un ancien propriétaire et qui devint par la suite Fezensac. Le Vic-Fezensac était né.\r\n Erigée en deux noyaux d'habitations, reflet des deux puissances rivales qu'étaient l'église et la féodalité.                                        \r\n Le château de Pujos se situe à l'extrême fin des demeures fortifiées du XVIe siècle meurtrières, bouches à feu. A voir également sur la commune la pile gallo-romaine dite de La Montjoie, c'est un temple de forme rectangulaire ouvert sur une face et voûté en berceau. Chacune des parois latérales intérieures contient une petite niche à fond plat, tandis que le mur du fond en possédait une sur plan semi-circulaire.\r\nEléments protégés MH : les façades et les toitures ; l'escalier à vis, les deux cheminées d'origine du rez de chaussée et celle du premier étage, inscription par arrêté du 30 mars 1978.","habitants":"Maître Pierre Dupouy\r\n        \r\n        \r\n        \"","divers":"Château  de Marteret, de Preneron  à Vic Fézensac","gps":"","images":["../image/image_32/32_Vic_Fezensac_1.jpg","../image/image_32/32_Vic_Fezensac_2.jpg","../image/image_32/32_Vic_Fezensac_3.jpg","../image/image_32/32_Vic_Fezensac_4.jpg","../image/image_32/32_Vic_Fezensac_5.jpg","../image/image_32/32_Vic_Fezensac_6.jpg","../image/image_32/32_Vic_Fezensac_7.jpg"]},"Consult_chateau_formulaire2e7e":{"id":"Consult_chateau_formulaire2e7e","dept":"32","canton":"Fézensac","commune":"Vic-Fézensac","nom":"Vic_Fézensac_II","type":"Château","periode":"XV-XVII","histoire":"BELMONT,  forteresse  pas d'information historique.                  GIMAT,   château d'exploitant d'armagnac des fréres Waterwaud.                                                                      PIMBAT , propriété de maître Pierre Dupouy, notaire à Vic en 1514, et par la suite, en 1628, à Bernard Brunet, consul de Vic-Fezensac, auxquels succédèrent la famille des Grisonis, puis celle des Pardailhan et des Faudoas-Barbazan. Au XVIIIe siècle où un gentilhomme breton, Françoise de Labadie de Barbazan épouse, François-Louis le Borgne de Keruzoret, c'est alors que le château prend le nom de Pimbat de Cruzalet.  Au cours du XIXe siècle, il a appartenu au frère du célèbre journaliste et historien Hippolyte Prosper Olivier Lissagaray et  devenu une exploitation agricole.","architecture":"Belmont du XVIIe siècle style forteresse de plan en H à trois niveaux couvertures  en croupes et à la mansart pour les deux pavillons en façade et fronton triangulaire.                                                                        Pimbat, les propriétaires actuels ont entrepris la restauration après l'avoir fait inscrire à l'inventaire des monuments historiques. L'architecture de ce château et l'expression même de la Renaissance classique en Gascogne gersoise. On remarquera les très belles ouvertures à meneaux, la tour ronde, sa porte dorique, sa bretèche et à l'intérieur, l'escalier à vis hélicoïdal en pierre desservant 4 salles.  On remarquera également les plafonds à solives apparentes et les 5 cheminées exécutées dans un style toscan, remarquables par leurs proportions, leur pureté et leur dessin.  Inscrit à l'inventaire des monuments historiques en 1976 pour les extérieurs et en 1998 pour les cheminées et escalier de la tour.","habitants":"Famille des frères Waterwaud                                                    Famille de  François-Louis le Borgne de Keruzoret\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Belmont, de Gimat, de Pimbat à Vic-Fézensac","gps":"","images":["../image/image_32/32_Vic_Fezensac_II_1.jpg","../image/image_32/32_Vic_Fezensac_II_2.jpg","../image/image_32/32_Vic_Fezensac_II_3.jpg","../image/image_32/32_Vic_Fezensac_II_4.jpg","../image/image_32/32_Vic_Fezensac_II_5.jpg","../image/image_32/32_Vic_Fezensac_II_6.jpg","../image/image_32/32_Vic_Fezensac_II_7.jpg","../image/image_32/32_Vic_Fezensac_II_8.jpg","../image/image_32/32_Vic_Fezensac_II_9.jpg"]},"Consult_chateau_formulairee9ef-2":{"id":"Consult_chateau_formulairee9ef-2","dept":"32","canton":"Mirande","commune":"Viella","nom":"Viella","type":"Château","periode":"XVI-XVIII","histoire":"VIELLA, est un ancien oppidum gallo-romain. Ancien fief de la famille Labay  ou Labaig de Viella dont les armes, deux sangliers de gueules sur fond de sinople, figurent sur le blason de la commune.    Le domaine est situé aux confins du Gers, sur la commune de Viella. Depuis 1952, la famille Bortolussi en est propriétaire. Actuellement, c'est Alain, représentant de la troisième génération de vignerons, qui exploite les 25 hectares de vignes classées en AOC Madiran et Pacherenc du Bilh.\r\nCHARMETTES, ce manoir du XIXe siècle transformé en une luxueuse villa méditerranéenne est aménagé en hôtel 4 étoiles.","architecture":"Le château de Viella est une imposante bâtisse XVIIIe siècle qui surplombe le vignoble. Abandonnée depuis plus d'un siècle, cette demeure vient d'être reconstruite et abrite maintenant un superbe chai à barriques dans ses caves voûtées. Les salles du premier étage sont destinées à l'organisation de réceptions autour du vin.  Château de Viella  du XVIIIe siècle ancienne propriété des marquis de Viella. Le château est une propriété viticole qui propose des visites de vignes et des dégustations gratuites. Parcours ludiques sur le thème de la vigne.","habitants":"Famille Bortolussi \r\n        \r\n        \"","divers":"Château de Viella et des Charmettes à Viella","gps":"","images":["../image/image_32/32_Viella_1.jpg","../image/image_32/32_Viella_2.jpg","../image/image_32/32_Viella_3.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','32 — Gers'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
