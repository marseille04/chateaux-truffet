est reste encore le chemin de ronde, masqué en partie par une volière édifiée en 1902. La partie sud-ouest, habitée, conserve des papiers peints de style Troubadour. Cet édifice est un condensé architectural de tout ce qui se faisait au pays de Galles à cette époque.","habitants":"Famille de Bernard Trencaléon \r\n        \r\n        \"","divers":"Porte et château de Mas d'Auvignon","gps":"","images":["../image/image_32/32_Mas_Auvignon_1.jpg","../image/image_32/32_Mas_Auvignon_2.jpg","../image/image_32/32_Mas_Auvignon_3.jpg","../image/image_32/32_Mas_Auvignon_4.jpg","../image/image_32/32_Mas_Auvignon_5.jpg","../image/image_32/32_Mas_Auvignon_6.jpg"]},"Consult_chateau_formulairef941":{"id":"Consult_chateau_formulairef941","dept":"32","canton":"Masseube","commune":"Masseube","nom":"Masseube","type":"Château","periode":"XVI-XVIII","histoire":"A Masseube et les environ des châteaux tel que Bellegarde, dont je n'ai pas d'information historique.                                  BELLEGARDE il na rien dun château fort médiéval . Cest un gros bloc en longueur, avec deux tours assez basses, peut être en forme de U, mais je nai vu quun côté de lédifice. Il aurait été construit au XVIe siècle et modernisé au XIXe siècle.                                    MASSEUBE  un château du XVIIIe siècle appartenant à la même famille depuis de nombreuses années. Il est situé sur le bord d'un des villages Gascons les plus jolis et fleuris du secteur et comporte trois hectares de parc bordé par une petite rivière. Manoir au centre du village","architecture":"Bellegarde; corps de logis rectangulaire à deux niveaux flanqué d'un pavillon rectangulaire à trois niveaux toit en croupes.                                                  Masseube,  château  de plan rectangulaire à deux niveaux série de lucarnes sur toit brisé avec sur une façade un fronton triangulaire et à l'opposé  sur porte centrale avec pinacle toit en poivrière et deux pavillons saillants sur les côtés.    Manoir dans Masseube corps de logis rectangulaire à deux niveaux à toit brisé deux tours carré à l'opposé à toit pointu et manoir dit des trois tours carrées à deux niveaux et attiques.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Château de Bellegarde, de Ponson Souberan et des trois tours à Masseube","gps":"","images":["../image/image_32/32_Masseube_1.jpg","../image/image_32/32_Masseube_2.jpg","../image/image_32/32_Masseube_3.jpg","../image/image_32/32_Masseube_4.jpg","../image/image_32/32_Masseube_5.jpg","../image/image_32/32_Masseube_6.jpg","../image/image_32/32_Masseube_7.jpg","../image/image_32/32_Masseube_8.jpg"]},"Consult_chateau_formulaired09f":{"id":"Consult_chateau_formulaired09f","dept":"32","canton":"Nogaro","commune":"Loubédat","nom":"Mauhic","type":"Château","periode":"XV","histoire":"MAUHIC, le château de Mauhic a été construit au XVe siècle\r\nIl appartenait à la famille de Médrane, seigneur de Mauhic jusquà la Révolution.  Le dernier seigneur Jean-Marie de Médrane-Mauhic fut décapité en 1793 pour incitation révolutionnaires. A lissue de cette période, une grande partie du château sera laissé à labandon pendant presque trois siècles, le château rayonnait dans le pays par la richesse de son mobilier et son architecture originale. Une chapelle familiale se tenait dans la cuisine actuelle.\r\nLa légende raconte qu'il cache un trésor d'or qui n'aurait pas été découvert suite aux nombreux pillages dont il fut l'objet après la Révolution Française, viticulteur et gîtes de France.","architecture":"La construction du château de Mauhic date du XVe siècle. Il se situe près de la forêt domaniale du Baquieu, où il aurait été construit, vers 1450 et fut remanié plusieurs fois. Il comportait une chapelle dépendant de l'abbaye de Berdoues.  Après son acquisition en 2011, les nouveaux propriétaires décident de se lancer dans la rénovation du château, un projet titanesque mené avec passion, devenu réaliste grâce au temps et à la compétence de Nicolas qui réalise la plupart des travaux : murs, plafonds, boiseries, plâtres, carrelage, peintures Depuis peu, les compétences et le savoir-faire de Nicolas sont également mis à disposition pour la rénovation dautres biens pour les particuliers et les professionnels.                                                                \r\nL'une des tours du château récemment rénovées est destinée à la location saisonnière.","habitants":"Famille de Médrane\r\n        \r\n        \"","divers":"Château de Mauhic à Loubedat","gps":"","images":["../image/image_32/32_Mauhic_1.jpg","../image/image_32/32_Mauhic_2.jpg"]},"Consult_chateau_formulaire50d4":{"id":"Consult_chateau_formulaire50d4","dept":"32","canton":"Nogaro","commune":"Mauléon d","nom":"Mauléon_Maniban","type":"Château","periode":"XVI","histoire":"MAULEON-MANIBAN, fut construit au XVIe siècle à la demande de Pierre la Bassa de Mauléon, qui vers 1544 prit le nom de Maniban.  Puis, le château cessa dêtre habité de façon permanente. Après la construction  par Thomas, troisième Maniban du nom. Le château de Maniban a appartenu ensuite à son fils, Jean Guy de Maniban, au XVIIe siècle puis à son fils, Gaspard de Maniban au XVIIIe siècle, tous les deux présidents du Parlement de Toulouse. A la mort de Gaspard, vers 1762, sa fille, Marie Christine de Maniban, épouse du Marquis de Livry, premier maître dhôtel de Louis XV, reprit le flambeau. Cette position lui permit de faire déguster au roi Louis XV lArmagnac qui entra ainsi à la Cour de France. Habitant à la Cour de France à Versailles, elle revenait pourtant tous les étés dans ses deux propriétés du Gers. Elle avait une affection particulière pour celle de Mauléon dArmagnac dans le Bas-Armagnac, berceau de sa famille, Aujourdhui le domaine de Maniban appartient à la famille Castarède, installée dans le Bas-Armagnac depuis des siècles et qui produit lArmagnac éponyme. La famille Castarède a découvert dans un des bâtiments, des fresques historiques qui ont été restaurées. Le château de Maniban  et ses propriétés alentour furent reprises par ses cousins Campistron de Maniban.","architecture":"le château de Maniban  localisé en Ténarèze, à Mausencôme, sur ce domaine a été construit une maison de maître au XIXe siècle, perpendiculaire au château du XVIe siècle. Ces fresques pourraient représenter un épisode heureux de la vie des propriétaires de Maniban, de fiançailles ou plus probablement, dun mariage. Ce décor peint doit être attribué à un peintre décorateur, sans doute italien, du XVIe siècle. Château du XIVe siècle, formé de trois bâtiments distincts autour d'une cour. A l'est se trouve le chai dont la toiture est supportée par deux rangées de piliers en bois. Une tour ronde à la base carrée en flanque la façade. A l'ouest, le bâtiment ancien a été prolongé au sud et au nord par des éléments plus récents. Le quatrième côté de la cour est protégé par un mur crénelé, flanqué au nord d'une tour ronde percée de meurtrières. Le château semble avoir été rebâti au cours du XVIIe siècle, sur un donjon ou une salle gasconne plus ancienne. Au premier étage, une grande salle située au-dessus de la chapelle conserve des peintures murales de la  fin du XVe-début XVIe siècle, influencées par l'Ile-de-France. De part et d'autre des deux fenêtres à meneaux sont peints des couples sous des rideaux ocres. Une cariatide nue parée de tresses, avec une couronne de feuillage à la taille, enrichit le décor d'architecture. Une frise ornée de putti court au niveau du premier étage. Dans l'angle nord-ouest on retrouve ce même motif enrichi d'un arbre à feuillage exotique.","habitants":"Famille de Pierre la Bassa                                                      famille Castarède\r\n        \r\n        \r\n        \"","divers":"Château de Mauléon-Maniban et le manoir","gps":"","images":["../image/image_32/32_Mauleon_Maniban_1.jpg","../image/image_32/32_Mauleon_Maniban_2.jpg","../image/image_32/32_Mauleon_Maniban_3.jpg","../image/image_32/32_Mauleon_Maniban_4.jpg","../image/image_32/32_Mauleon_Maniban_5.jpg","../image/image_32/32_Mauleon_Maniban_6.jpg","../image/image_32/32_Mauleon_Maniban_7.jpg"]},"Consult_chateau_formulaire4749":{"id":"Consult_chateau_formulaire4749","dept":"32","canton":"St-Clar","commune":"Mauroux","nom":"Mauroux","type":"Château","periode":"XIII","histoire":"MAUROUX, selon les dires de certains maurouxois, l'origine du nom de Mauroux, pourrait provenir de \" maure \", nom donné aux peuples venus du Sud qui envahirent l'Europe au VIIIe siècle. Même si rien n'atteste assurément de cette thèse, il n'en demeure pas moins que sur plusieurs générations les seigneurs de Mauroux portent le prénom de Nègre et que ce fut un Nègre de Mauroux qui livra Puy-l'Evêque aux anglais.  Les seigneurs de Mauroux demeurant en leur château, d'abord chevaliers à Orgueil, devinrent ensuite barons de cette cité comme le stipule un acte de 1779, désignant Jean Baptiste Joseph Marc Duroc de Mauroux, baron d'Orgueil, seigneur haut et bas justicier de Mauroux, Cabanac, Lacapelle, Touzac et Labastide d'Entéroque.D'autre part, il semblerait qu'à la fin du XIVe siècle lorsque la cité d'Orgueil fut désertée, ses habitants vinrent se réfugier dans les paroisses environnantes et notamment, à Mauroux. Le château actuel a été totalement reconstruit au XVIIIe siècle pour les De Grossolles de Flamarens, il reste leur propriété jusqu'en 1878. Des destructions successives de 1876 et 1888 sont mentionnées.","architecture":"Mauroux, une partie du mur Nord conserve les seuls vestiges de l'édifice antérieur.  Dans l'état actuel de nos connaissances, les premières traces écrites permettant de remonter dans le passé du village dateraient du XIIIe siècle. L'existence du hameau semble dès lors se fondre à la vie du site d'Orgueil, cette ancienne cité médiévale maintenant disparue. En effet, Mauroux était sous sa juridiction. Au début du siècle précédent, Mauroux possédait encore des vestiges importants de son château dont les parties les plus anciennes remonteraient au XIVe siècle. Démolitions et transformations n'ont laissé subsister qu'une tour, une partie du corps de logis et quelques dépendances.","habitants":"Joseph Marc Duroc de Mauroux\r\n        \r\n        \"","divers":"Château de Mauroux","gps":"","images":["../image/image_32/32_Mauroux_1.jpg","../image/image_32/32_Mauroux_2.jpg","../image/image_32/32_Mauroux_3.jpg","../image/image_32/32_Mauroux_4.jpg","../image/image_32/32_Mauroux_5.jpg"]},"Consult_chateau_formulaire1e5e":{"id":"Consult_chateau_formulaire1e5e","dept":"32","canton":"Gimone-Arrats","commune":"Mauvezin","nom":"Mauvezin","type":"Château","periode":"XIV-XVI","histoire":"MAUVEZIN, en 1275, les habitants reçurent une charte de coutumes et de libertés, octroyées par Géraud V. En 1472, le Fézensaguet fut intégré par Louis XI dans le domaine royal. Au début du XVIe siècle, il fut donné au duc d'Alençon et reprit son autonomie. Marguerite d'Angoulême reçut confirmation de cette donation au moment de son remariage avec Henri d'Albret, roi de Navarre.  Jeanne d'Albret, mère du futur Henri IV, vicomtesse du Fézensaguet, favorisa le développement de la religion protestante. À cette époque, Mauvezin était qualifié de  Petite Genève. Henri de Navarre vint assez souvent à Mauvezin, notamment en 1576 : il s'empare de la ville ; les troupes causèrent quelques désordres ; les catholiques durent quitter les lieux. Mauvezin connut les guerres de religion et leurs conséquences : querelles, violences, saccages, combats. Le couvent et l'église furent en partie détruits. Louis XIII s'est efforcé d'établir le pouvoir absolu. Ses troupes ont investies les places fortes protestantes dont Mauvezin. La ville fit soumission en 1621. Le duc de Mayenne désarma le château et ses murailles. En 1789, la Révolution, la disette et la « Grande Peur » marquèrent la cité.","architecture":"La tour Jeanne-d'Albret, tour carrée du XIVe siècle, de style austère et dépouillé dominant la basse ville.  Dès le XIIIe siècle, la ville possède la structure qui la caractérise aujourdhui, cest-à-dire une vaste place darmes avec sa halle. Cest le centre de la ville haute, ceinte de remparts et protégée par son château fortifié, sur lemplacement actuel des  terrasses .\r\nLa basse ville qui, dans sa forme actuelle date de cette époque, connait une grande extension à la suite de la charte de 1275 et possède la structure dune bastide.","habitants":"Jeanne d'Albret\r\n        \r\n        \"","divers":"La tour de Jeanne d'Albret à Mauvezin","gps":"","images":["../image/image_32/32_Mauvezin_1.jpg"]},"Consult_chateau_formulaire8d93":{"id":"Consult_chateau_formulaire8d93","dept":"32","canton":"Fleurance","commune":"Miramont-de-Latour","nom":"Miramont_Latour","type":"Château","periode":"XIII-XVII","histoire":"Deux châteaux à Miramont de Latour dont celui de Miramont-Latour du XIIIe siècle, celui de Beaulieu du XVIIe siècle à Astarac                                           MIRAMONT-LATOUR; seigneurie du XIIIe siècle, berceau des mousquetaires qu'un descendant, cadet de Gascogne et agriculteur, Patrick de Lary, agriculteur qui travaille sa ferme, est prêt à répondre à vos questions. Cet « acharné » défenseur du patrimoine, qui restaure ses pierres chargées d'histoires, est doublé d'un collectionneur de l'ensemble du patrimoine rural, qui proposent les outils de nos ancêtres et 14 métiers de nos campagnes, une salle des inventions, une cuisine du XVIIIe et une chambre. Une visite adaptée aux enfants qui découvrent la nature, mais aussi le four à pain et le cachot. Enfin, si vous aimez la poésie, n'hésitez pas de demander à ce disciple des romantiques de vous clamer un poème, il est membre du conservatoire de la poésie classique de Paris. classé monuments historiques en 1930.","architecture":"Miramont-Latour, seigneurie du XIIe siècle. Berceau des Mousquetaires. Rare ensemble sur le travail et la vie rurale de nos ancêtres. Pigeonnier et retable du XVIIe siècle. Chemins de randonnée, aire pique-nique, salle de réunion. Un ensemble de 3 monuments :\r\nLe pigeonnier du XVIIe siècle classé Monument Historique\r\nLe retable de la chapelle Notre Dame des Anges à Miramont-Latour, érigé suite au décès de Charles Louis de Lary  à lage de 25 ans au siège de Dunkerque.  Le château, dont lorigine du début  du XIIIe siècle est une grande salle aux murs de briques flanquées de deux tours. A plusieurs époques et suite aux dégâts de la Révolution se réalisent des agrandissements. La cuisine du XVIIIe siècle se visite après les salles du conservatoire qui renferment, à travers les instruments, les photos, les maquettes, lhistoire de lagriculture depuis le biface jusquà larrivée du moteur.","habitants":"Famille de Patrick de Lary.\r\n        \r\n        \"","divers":"Château de Miramont-Latour et celui de Beaulieu à Astarac","gps":"","images":["../image/image_32/32_Miramont_Latour_1.jpg","../image/image_32/32_Miramont_Latour_2.jpg","../image/image_32/32_Miramont_Latour_3.jpg","../image/image_32/32_Miramont_Latour_4.jpg","../image/image_32/32_Miramont_Latour_5.jpg","../image/image_32/32_Miramont_Latour_6.jpg","../image/image_32/32_Miramont_Latour_7.jpg","../image/image_32/32_Miramont_Latour_8.jpg"]},"Consult_chateau_formulaire61b3-2":{"id":"Consult_chateau_formulaire61b3-2","dept":"32","canton":"Mirande Astarac","commune":"Mirande","nom":"Mirande_Astarac","type":"Vestiges","periode":"XIII","histoire":"MIRANDE, est une bastide du XIIIe siècle. En 1283, Bernard IV et son épouse avaient fondé à l'extérieur de la ville le couvent des Cordeliers, qui fut agrandi vers 1320 sur ordre du pape Jean XXII. Détruit par les protestants, puis reconstruit, il fut fermé en 1790 et abandonné aux injures du temps. De même, en 1320, une révolte des habitants est durement réprimée par le frère du roi : Charles le Bel. En 1338, un Mirandais, P. Arnaud, combattit les Anglais sous les ordres de Raymond-Arnaud de Béarn, capitaine de Marsan. La même année, Philippe VI secourut Mirande, attaquée de tous côtés par les ennemis de la France.  En 1442, Jean III, comte d'Astarac, conduisit plusieurs valeureux Mirandais à l'expédition de Charles VII contre les Anglais et  en 1453  à celle qui leur enleva définitivement la Guyenne.  En 1577, un lieutenant du roi de Navarre, au début de sa lutte contre la Ligue, prit Mirande. Avec l'aide de quelques seigneurs dont le chevalier d'Antras, chef du parti catholique, les habitants se défirent de la garnison béarnaise au terme d'un sanglant combat. Les vainqueurs surent respecter le futur Henri IV qui, parvenu au trône de France, leur accorda de nouvelles faveurs. Ils se montrèrent dignes de la bienveillance royale et se virent confier la garde de leur cité en 1615, à la suite de lettres très flatteuses de la cour, dont deux écrites par Louis XIII.","architecture":"La cité présente un tracé régulier de bastide, avec sa place centrale et ses rues tirées au cordeau. Elle était protégée par une solide enceinte fortifiée percée de quatre portes qui subsistèrent en partie jusqu'au XIXe siècle. Un magnifique château comtal se dressait hors des murailles. La commune compte deux bâtiments administratifs de prestige au style Second Empire très affirmé. Il s'agit d'abord de la mairie devant laquelle a été aménagé un agréable square. Il s'agit ensuite de la sous-préfecture voisine de la place de la Liberté. L'histoire de ces deux bâtiments est à lier à celle du député, candidat de l'Empereur, Garnier de Gassagnac qui uvre alors pour que la ville devienne sous-préfecture. La halle, témoignage de la fin du XIXe siècle, dont une entrée est surmontée d'un campanile,  charpentes de bois et de fer. Sur l'un de ses flancs, elle fait face à l'Hôtel des Impôts qui, avec le lycée Alain-Fournier, constituent deux édifices datant des premières années du XXe siècle.                                                                    La Tour de Rohan Le comte dAstarac Bernard IV et son fils Centulle III veulent que Mirande devienne capitale du pays dAstarac. Ils quittent Simorre pour sétablir dans la ville nouvelle, où ils font édifier un château hors les murs. Mais comme les abbés  y installent à lintérieur de la bastide une résidence seigneuriale avec une tour carrée en brique, encore visible aujourdhui. En 1739, le comté dAstarac passe par voie de mariage à la famille Rohan-Chabot descendants des ducs de Bretagne, doù le nom actuel de la Tour visible. L'ancienne halle démolie en 1850 trônait au centre de la principale place de Mirande. La place d'Astarac est aujourd'hui dotée d'un élégant kiosque.","habitants":"Famille Rohan-Chabot\r\n        \r\n        \r\n        \"","divers":"Tour, vestiges et hôtel de ville de Mirande-Astarac","gps":"","images":["../image/image_32/32_Mirande_Astarac_1.jpg","../image/image_32/32_Mirande_Astarac_2.jpg","../image/image_32/32_Mirande_Astarac_3.jpg","../image/image_32/32_Mirande_Astarac_4.jpg","../image/image_32/32_Mirande_Astarac_5.jpg"]},"Consult_chateau_formulairee064":{"id":"Consult_chateau_formulairee064","dept":"32","canton":"Gimone-Arrats","commune":"Monbrun","nom":"Monbrun","type":"Château","periode":"XV","histoire":"Deux châteaux à Monbrun dont celui de Monbrun et celui de Moulin Ardut dont je n'ai pas d'information historique                                                              MONBRUN,  édifié à la fin du XIIe siècle par Eymeric Brun.    Reconstruit au XVe siècle Par Pierre de Monbrun  évêque de Limoges  dont il portera le nom, au XIV siècle  restauré au XIX siècle  Du fait de l'absence de vestige médiéval significatif pour la problématique de recherche et du peu de documentation historique conservée, cette commune n'a pas été étudiée dans le cadre de l'inventaire thématique sur les transformations des agglomérations en Gascogne gersoise à la fin du Moyen-Age. Il convient tout de même de préciser que le village de Monbrun est un castelnau qui s'est implanté certainement dans la première moitié du XIIIe siècle au sud du château. Il ne subsiste aucun élément bâti visible remontant à l'époque médiévale à Monbrun. Edifié au XIIe siècle, détruit au début du XIVe siècle et reconstruit en 1438, ce château qui compte aujourdhui 40 chambres, a su garder son caractère médiéval tout en bénéficiant de toutes les dernières technologies équipements multimédias, salle de cinéma, salle de conférences, ascenseurs.","architecture":"Château de Monbrun,  édifié à la fin du XIIe siècle  Incendié en 1385 reconstruit au XVe . Le château a été reconstruit à l'époque moderne de plan rectangulaire à deux niveaux et série de lucarne, pavillon saillant plein cintre d'entrée, toit à fronton triangulaire, accolé de quatre tours polygonales aux angles toit en poivrières.","habitants":"Famille De Pins\r\n        \r\n        \"","divers":"Château de Montbrun","gps":"","images":["../image/image_32/32_Monbrun_1.jpg","../image/image_32/32_Monbrun_2.jpg","../image/image_32/32_Monbrun_3.jpg","../image/image_32/32_Monbrun_4.jpg","../image/image_32/32_Monbrun_5.jpg"]},"Consult_chateau_formulaire1835":{"id":"Consult_chateau_formulaire1835","dept":"32","canton":"Mirande Astarac","commune":"Monclar-sur-Losse","nom":"Monclar","type":"Château","periode":"XVI","histoire":"MONCLAR, en 1068, Bertrand de Marrens, neuvième descendant en ligne directe du roi Clovis, reçoit de son père, seigneur de Montesquiou, les terres de Moncla et Marrens dont il prend le nom. Sur un promontoire rocheux, il fait bâtir, en 1088, une tour fortifiée accompagnée de quelques habitations protégées par un mur d'enceinte. Le castelnau de Moncla ainsi formé domine la vallée de l'Osse et permet l'observation et le contrôle des axes qui traversent la seigneurie de Montesquiou.   Vers 1393, la fille d'Hugues de Marrens épouse le frère du comte d'Astarac, Jean d'Astarac. Ce dernier, nouveau seigneur de Moncla, participe à toutes les guerres contre les Anglais aux côtés du roi Charles VII et restaure le château endommagé par un incendie. En 1455, sa fille Catherine épouse Jean de Lasséran.  En 1577, leur arrière-petit-fils, Jean-Alexandre de Lasséran, rassemble à Moncla, sous son commandement et celui du chevalier d'Antras, les garnisons d'Armagnac et du Pardiac avant de délivrer la ville de Mirande, assiégée par les huguenots.\r\nEn 1700, a Jean-Bernard de Séissan de Marignan, leur petite-fille Sophie-Christine et son mari sont les ancêtres directs des propriétaires actuels du château de Moncla.","architecture":"Dans les années 1880, le château de Moncla est restauré dans un style néo-gothique. Du château féodal demeurent aujourd'hui la tour carrée, bâtie en pierre de taille, ainsi que la façade ouest au milieu de laquelle figure deux anciennes fenêtres trilobées, désormais murées. A l'angle sud-ouest, une tour ronde, construite sur une base carrée, sert toujours à surveiller la vallée.","habitants":"Jean-Alexandre de Lasséran\r\n        \r\n        \"","divers":"Château de Monclar sur Losse","gps":"","images":["../image/image_32/32_Monclar_1.jpg","../image/image_32/32_Monclar_2.jpg","../image/image_32/32_Monclar_3.jpg","../image/image_32/32_Monclar_4.jpg","../image/image_32/32_Monclar_5.jpg","../image/image_32/32_Monclar_6.jpg"]},"Consult_chateau_formulaire6ac6":{"id":"Consult_chateau_formulaire6ac6","dept":"32","canton":"Masseube","commune":"Moncorneil-Grazan","nom":"Moncorneil","type":"Forteresse","periode":"XIV","histoire":"MONCORNEIL, le château, détruit en 1588 puis reconstruit en 1608 est vendu sous Napoléon comme bien national à un habitant de Grazan. En 1839, il est séparé en deux parties et appartient aujourd'hui à deux familles distinctes.  Du fait de l'absence de vestige médiéval significatif pour la problématique de recherche et du peu de documentation historique conservée, la commune de Moncorneil-Grazan n'a pas été étudiée dans le cadre de l'inventaire thématique sur les transformations des agglomérations en Gascogne gersoise à la fin du Moyen-Age.","architecture":"Moncorneil de plan oblong à trois niveaux flanquée de grosses tours carrées aux extrémités toit en tuiles quatre pans.","habitants":"\"","divers":"Château de Moncorneil","gps":"","images":["../image/image_32/32_Moncorneil_1.jpg","../image/image_32/32_Moncorneil_2.jpg","../image/image_32/32_Moncorneil_3.jpg"]},"Consult_chateau_formulaire696c":{"id":"Consult_chateau_formulaire696c","dept":"32","canton":"Pardriac-Rivière-Basse","commune":"Monlezun-Pardriac","nom":"Monlezun","type":"Vestiges","periode":"XIII","histoire":"MONLEZUN, au Nord-Ouest du village, sur une motte, visible de toute part, est posé le fantôme du château de Monlezun. Une enceinte devait entourer le château. Le rempart extérieur a disparu mais la forme ovale de la colline n'est pas un hasard. \r\nPour lhistoire, vers 1020, création du comté de Pardiac. Otger de Monlezun, comte de Pardiac, fait  bâtir une fortification au XIIIe siècle. En 1367, le comte Arnaud Guilhem V doit  récupérer son titre et son château, perdu au profit de la couronne pour avoir maltraité un  consul de Marciac. Au début du XVe siècle, une histoire de  jalousie pousse le comte Bernard VI  d'Armagnac vassal du roi d'Angleterre à  attaquer le château. La fortification est partiellement détruite et les terres Françaises annexées au domaine Anglais.   Au XVIe siècle, les ruines deviennent le refuge d'une petite armée Protestante commandée par un certain Sus.  En 1590, les  Catholiques semparent de lédifice qui sera définitivement détruit. Depuis 1939 la commune en est propriétaire.","architecture":"Le château    a été construit par un certain Otger de Monlezun qu'à l'époque féodale pour les comtes de Pardiac qui avaient trouvé le site à leur goût. Mais il est fort possible, et finalement on ne le saura jamais vraiment, que les lieux furent jadis investis d'une forteresse antique ce qui aurait motivé les Pardiac à construire ici.  Au Moyen-âge, un bourg castral s'est peu à peu développé derrière le château, ce qui explique l'oblongue forme du village qui s'étend sur les coteaux. Au XVI siècle, les guerres de religion font un désastre à Monlezun : le village et le château sont détruits et il n'en reste que ces trois pans de mur énigmatiques à celui qui n'en connait pas l'histoire. Le plus haut mur fait 25 m de haut et serait peut-être l'ancien donjon. On trouve encore dans ces murs des fenêtres et si l'on y flâne je pense qu'on peut s'amuser à imaginer à quoi ces restes correspondent.","habitants":"Otger de Monlezun\r\n        \r\n        \"","divers":"Vestiges du château de Monlezun-Padriac","gps":"","images":["../image/image_32/32_Monlezun_1.jpg","../image/image_32/32_Monlezun_2.jpg","../image/image_32/32_Monlezun_3.jpg","../image/image_32/32_Monlezun_4.jpg"]},"Consult_chateau_formulairec7cf":{"id":"Consult_chateau_formulairec7cf","dept":"32","canton":"Condom","commune":"Saint-Puy","nom":"Monluc","type":"Château","periode":"XVI","histoire":"MONTLUC, le château de Saint-Puy est en Ténarèze, une des régions fortes de lArmagnac et la distillation a toujours tenu une grande place dans lactivité de ses vignerons. La juxtaposition de lesprit inventif des Gascons et de leur admirable eau-de-vie devait, on limagine, entraîner le foisonnement de recettes familiales dont certaines étaient tout à fait originales.\r\nCest en mémoire de Blaise de Monluc inventeur de la Rapière, que René Lassus appela son cocktail : « Pousse-Rapière ». En effet, Blaise de Monluc, maréchal de France, né en 1500, conduisit de célèbres batailles en Italie notamment, doù il ramena la Rapière. Cette arme redoutable, rendue célèbre plus tard par les mousquetaires, présentait lavantage dêtre fine et légère, ce qui lui conférait une dramatique efficacité en la poussant vers son adversaire : Pousser la Rapière.  C'est la maison paternelle de l'écrivain et homme d'armes Blaise de Monluc, célèbre pour ses  commentaires. Il est aujourd'hui devenu le berceau d'un fameux apéritif : le Pousse-Rapière.","architecture":"Le château Monluc : vestige du château d'en haut compta au XVIe siècle le maréchal de France, auteur des commentaires, au nombre de ses prestigieux propriétaires des comtes de Toulouse, rois de France, rois d'Angleterre. L'agréable demeure actuelle du XVIIIe siècle a très heureusement réutilisé l'infrastructure de la forteresse. Chais du Pousse-Rapière, dégustation. Situé dans le nord du Gers, sur la partie dominante de Saint-Puy, le château Monluc a été construit sur les vestiges d'un château du XIIIe siècle de plan quadrangulaire à deux niveaux. Cest en approfondissant la démarche de son aïeul, que René Lassus eut lidée de champagniser les vins de son vignoble tout en continuant à en distiller une partie. \r\nEn plus du Pousse Rapière, le château de Monluc produit également des vins de Pays des côtes de Gascogne, du Floc de Gascogne et de lArmagnac.\r\nVisite guidée de l'esplanade, des remparts, de la cave voûtée et dégustation des produits de la propriété.","habitants":"Famille de Blaise de Monluc\r\n        \r\n        \"","divers":"Château de Monluc à Saint-Puy","gps":"","images":["../image/image_32/32_Monluc_1.jpg","../image/image_32/32_Monluc_2.jpg","../image/image_32/32_Monluc_3.jpg"]},"Consult_chateau_formulaire8c95":{"id":"Consult_chateau_formulaire8c95","dept":"32","canton":"Condom","commune":"Caussens","nom":"Mons_Caussens","type":"Château","periode":"XVI","histoire":"MONS,  la famille De Vallès en 1380.  Mons a longtemps appartenu à la famille du Bouzet. Cette famille a été illustrée au XVIIIe siècle par Charles-Maurice de Bouzet, abbé. A la fin de l'Ancien Régime, le château de Mons appartenait au filleul de ce dernier, Jean Baptiste Du Bouzet qui siégea à l'Assemblée de la noblesse du Condomois, le 9 mars 1789. Il n'émigra pas et conserva ses biens sous la Révolution. Une parenté, madame P. Du Bouzet, issue de la famille de Chic d'Arcamont, épouse de l'ancien seigneur de Ligardes. Les petits-fils de Jean Baptiste Du Bouzet, Xavier et Edouard, firent de mauvaises affaires et le domaine de Mons fit l'objet d'une vente judiciaire en 1867. Dix ans plus tard, les deux adjudicataires revendirent le domaine De Mons à Napoléon Camille Jean Lannes, duc de Montebello et descendent  du maréchal. sa femme accoucha au château de Mons le 9 avril 1877 d'un fils. La mort s'acharnant sur les ducs de Montebello, celui-ci mourut à 22 ans, le 28 janvier 1899 alors qu'il comptait parmi les élèves de l'école de Saint-Cyr. Sans descendant, le château se revendit à Jacques-Paul-Louis Leclaire. Il périt dans un naufrage le 25 juin 1917, il n'avait pas de descendance, ses biens revinrent à sa mère. Ce fut elle qui mit Mons à la disposition des Jésuites. Monseigneur d'Herbiguy y aurait séjourné plusieurs années à son retour d'URSS vers 1925.\r\nMadame Leclaire était toutefois restée propriétaire et revendit le domaine en 1947 à une dame Fabre.  La dite association à vendu le domaine de Mons à la Chambre d'Agriculture du Gers le 21 Janvier 1963.       Dans la commune la bâtisse du Vieux-Pressoir chambres d'hôtes.","architecture":"la famille De Vallès  restaura l'ancienne tour,  adoptant le style renaissance, avec le toit d'ardoise à pente rapide, une tourelle élancée en encorbellement, les fenêtres à meneaux cruciformes et surmontant le tout, la girouette avec le grand \"M\"  de Mons, édifié en 1285,, pour le Roi d'Angleterre, Édouard Ier,  la guerre de 100 ans le réduisit en ruine, le château de Mons n'a jamais cessé d'être en activité et de parfaire sa restauration pour devenir la structure d'hébergement qu'il est aujourd'hui. Le château abrite une grande cour intérieure et des terrasses ombragées pouvant accueillir diverses activités, implanté dans un domaine viticole, les bâtiments du château , d'une architecture remarquable, sont situés dans un parc arboré de cèdres et de séquoias. Tous les vins, armagnacs et autres flocs de Gascogne de notre propriété sont chaleureusement élevés dans les chais du château qui est situé sur le chemin de Saint-Jacques-de-Compostelle, sur le site d'une ancienne villa gallo-romaine. Il fut détruit lors de la guerre de cent ans mais fut reconstruit sur ses ruines, à la Renaissance.  C'est l'ancienne résidence du maréchal Lannes qui présente une splendide allée de chênes centenaires. Dans l'angle sud-ouest de la cour intérieure, il est possible de voir une haute tour rectangulaire du XVIe siècle.","habitants":"Famille De Vallès\r\n        \r\n        \"","divers":"Château de Mons à Caussens","gps":"","images":["../image/image_32/32_Mons_Caussens_1.jpg","../image/image_32/32_Mons_Caussens_2.jpg","../image/image_32/32_Mons_Caussens_3.jpg","../image/image_32/32_Mons_Caussens_4.jpg","../image/image_32/32_Mons_Caussens_5.jpg","../image/image_32/32_Mons_Caussens_6.jpg","../image/image_32/32_Mons_Caussens_7.jpg"]},"Consult_chateau_formulaireece2":{"id":"Consult_chateau_formulaireece2","dept":"32","canton":"Masseube","commune":"Mont-d","nom":"Mont_Astarac","type":"Bastide","periode":"XV-XVII","histoire":"MONT-d'ASTARAC, c'est sur le point culminant de la commune que se trouvait le château d'Arnaud Garcia qui s'y établit après avoir hérité le comté d'Astarac de son père le comte de Gascogne,  Garcia Sanche dit le Courbé.   La seigneurie de Mont dAstarac appartient aux vicomtes dAure-Larboust jusquen 1571 pour passer ensuite aux mains des familles Béon-Massés puis Timbrune.    A la Révolution Mont-d'Astarac est un temps chef lieu de canton sous le nom de Montagnard.                               SALLENEUVE   pas d'information historique.","architecture":"une Tour Porte  de Mont d'Astarac en pierre est construite à la fin du XVe siècle, de plan rectangulaire imposant  toit en croupe avec fronton triangulaire, édifice accolé de bâtiment à charpente en bois en retour d'équerre.                                                      Salleneuve,  corps de logis rectangulaire à trois niveaux toit en croupe avec lucarnes,  accolé de chaque côté de pavillon rectangulaire légèrement en retrait à toit brisé.   Près du château se trouve un pigeonnier isolé, construit vers 1742. De plan carré, il est porté par quatre piliers de section carrée, élargis à la base et comportant, au sommet, le traditionnel larmier. Sur le plafond, la trappe s'ouvre à l'angle sud-est. L'étage est complètement fermé, hormis une petite baie ouverte au sud. Le colombage présente un remplissage de briques pleines. Primitivement, le pigeonnier devait être couvert de tuiles plates à crochets. Lucarnes à pigeons des côtés Est et sud.","habitants":"Famille de Arnaud Garcia                                                                 Famille de  Béon-Massés\r\n        \r\n        \"","divers":"Château de Salleneuve e la tour-porte de Mont-Astarac","gps":"","images":["../image/image_32/32_Mont_Astarac_1.jpg","../image/image_32/32_Mont_Astarac_2.jpg","../image/image_32/32_Mont_Astarac_3.jpg","../image/image_32/32_Mont_Astarac_4.jpg","../image/image_32/32_Mont_Astarac_5.jpg"]},"Consult_chateau_formulaireead8":{"id":"Consult_chateau_formulaireead8","dept":"32","canton":"Mirane_Astarac","commune":"Montaut-les-Créneaux","nom":"Montaut_Créneaux","type":"Bastide","periode":"XII-XVIII","histoire":"Montaut, ce petit castelnau médiéval a conservé de nombreuses traces de son passé historique : la tour-porte, le château, léglise, le mur denceinte. Il sarticule autour dune rue centrale qui aboutissait autrefois à deux portes ; en son milieu elle passe sous une petite halle.  Ce château privé, datant du XIIe, est situé au milieu dun parc. Il comprend deux bâtiments formant deux ailes soudées par un donjon. La partie supérieure porte un crénelage, qui est à lorigine du nom de \"Montaut-les-Créneaux\". A proximité se trouve le hameau de Malartic avec ferme et château privés.   En 1821, Montaut a absorbé la majeure partie de l'ancienne paroisse de Biane, située au nord-est, à la limite de la commune de Mirepoix à laquelle elle était autrefois rattachée. Il n'en subsiste que l'église Sainte-Catherine et un pigeonnier, qui faisait partie du château, aujourd'hui ruiné.\r\nLa même année fut également rattaché à Montaut le village du Malartic, situé au sud-est en direction d'Auch. Viticole de Jean-Claude Batalla.","architecture":"Le château, qui donne sur le versant nord, est privé et ne se visite pas. C'est son donjon carré avec ses créneaux qui a donné son qualificatif à la commune, en 1917, pour éviter la confusion avec l'autre Montaut du Gers, baptisé alors Montaut-d'Astarac.","habitants":"Seigneurs locaux\r\n        \r\n        \r\n        \"","divers":"Porte et vestiges à Montaut les Créneaux","gps":"","images":["../image/image_32/32_Montaut_Creneaux_1.jpg","../image/image_32/32_Montaut_Creneaux_2.jpg","../image/image_32/32_Montaut_Creneaux_3.jpg","../image/image_32/32_Montaut_Creneaux_4.jpg","../image/image_32/32_Montaut_Creneaux_5.jpg","../image/image_32/32_Montaut_Creneaux_6.jpg"]},"Consult_chateau_formulaireb135":{"id":"Consult_chateau_formulaireb135","dept":"32","canton":"Auch","commune":"Le Brouilh-Montbert","nom":"Montbert_Brouilh","type":"Vestiges","periode":"XII","histoire":"MONTBERT, le petit village fondé à une date inconnue , a été échangé avec un certain Raymond Buffa contre un cheval par les Comtes de Fezensac. Vers 1060, il est restitué à Ste-Marie dAuch. Cest un Castelnau qui comportait un château, une église, un village, une enceinte et une tour-porte.\r\nDu château, peut-être du XII-XIIIe siècle, il ne reste rien. Seul un puits au nord-ouest qui pouvait se trouver dans la basse-cour du château peut indiquer son emplacement primitif.\r\nLa fondation SILOE, créée par sur Marie Marcel, sest vu décerné la « Fondation des Pays de France » comme 1er prix départemental et 5 ème sur le plan national pour son uvre de restauration et son action humanitaire pour la sauvegarde de personnes en danger physique et moral. Aujourdhui, sur ce site, sur Cécile gère les gîtes de groupe labellisés gîtes de France, restaurés au sein du Castelnau.","architecture":"Ce village sest développé auprès dun monastère de religieuses de lordre de Fontevrault, fondé en 1145, dont on peut apercevoir encore la chapelle romane  depuis le cimetière actuel.\r\nLe village, un castelnau fortifié dont il reste des traces des anciens fossés, est établi au nord du monastère. Une grosse tour carrée médiévale passe pour être le donjon de lancien château.\r\nLa partie inférieure dune tour-porte a été conservée et réutilisée pour servir de base au clocher. Sa porte primitive a été remplacée par un arceau. Aujourdhui, cette grosse tour est surmontée dune flèche dardoise à 8 pans et percée de 4 baies cintrées. Cette tour-clocher enjambe lune des entrées du village et sappuie sur les vestiges dune tour-porte.","habitants":"Sur Marie Marcel\r\n        \r\n        \"","divers":"Vestiges à Montbert le Brouilh","gps":"","images":["../image/image_32/32_Montbert_Brouilh_1.jpg","../image/image_32/32_Montbert_Brouilh_2.jpg"]},"Consult_chateau_formulairec29f":{"id":"Consult_chateau_formulairec29f","dept":"32","canton":"Condom","commune":"Montesquiou","nom":"Montesquiou","type":"Château","periode":"XIV-XIX","histoire":"Cinq châteaux à Montesquiou celui de La Mothe du XIVe siècle,  de la Bière du XVIIe siècle, du Cap du Barry du XVII-XVIIIe siècle, de la Haget du XIXe siècle  hôtel (voir article) et de Laplagne du XIXe siècle.                                                                 MONTESQUIOU, ce lieu aurait alors été édifié et fortifié par Oton 1er, vicomte de Lomagne, en 1090. La fortification comprenait un château aujourdhui disparu, mais qui occupait  lemplacement de la place centrale actuelle, et une vaste enceinte de forme ovale dont il subsiste encore quelques traces. Odon 1er ayant ainsi mis Lupiac à labri des attaques, son fils Odon II, et son petit-fils Arnaud, sempressèrent de confirmer les concessions faîtes aux bourgeois de cette cité et les premières coutumes datent de 1134. Montesquiou est le berceau de la famille de ce nom.  Montesquiou apparaît comme castrum dans les sources écrites en 1274. Aymeri de Montesquiou, est le dernier à y avoir vécu et à y être mort vers 1574. Sa sur Anne, mariée à Fabien de Montluc, a recueilli sa succession.                                                              LAPLAGNE berceau de la famille de Charles de Batz d'Artagnan qui en furent propriétaire de Bertrand de Batz  jusqu'en Janvier 1618. Charles  né en 1615 il fut tué au siège de Mastricht le 25 juin 1673.","architecture":"Château de la Mothe  l'ancien château a dû être construit à l'emplacement d'une motte féodale. L'édifice se composait d'un grand polygone de murs très épais. A l'un des angles se trouvait le donjon de plan carré, dont la moitié s'est effondrée en 1879. Deux portes aux linteaux de pierre plate reposant sur une série de corbeaux, permettent de le dater du XIVe siècle.                                                                               Laplagne château du XVIe siècle","habitants":"Famille de Montesquiou                                                                 Famille de Charles de Batz d'Artagnan\r\n        \r\n        \"","divers":"Château de la Plagne et  vestiges de la Mothes à Montesquiou","gps":"","images":["../image/image_32/32_Montesquiou_1.jpg","../image/image_32/32_Montesquiou_2.jpg","../image/image_32/32_Montesquiou_3.jpg","../image/image_32/32_Montesquiou_4.jpg","../image/image_32/32_Montesquiou_5.jpg","../image/image_32/32_Montesquiou_6.jpg","../image/image_32/32_Montesquiou_7.jpg"]},"Consult_chateau_formulaireaa5e-2":{"id":"Consult_chateau_formulaireaa5e-2","dept":"32","canton":"Riscles","commune":"Riscles","nom":"Montfort_Riscles","type":"Château","periode":"XVI","histoire":"MONTFORT, l'histoire de Riscle remonte au IXe siècle, date de la construction de la première église édifiée à « La Roque ». Le bourg féodal se groupa autour de celle-ci avec le château. Plus tard, au XIe siècle, il y eut à Riscle un hôpital, un couvent et cinq églises. On pénétrait dans la ville par six portes. La cité échappa aux anglais qui menaçaient de la détruire en 1569. Cependant le couvent de la Merci fut saccagé par Montmorency. En 1594, le comté de Riscle fut confié par Henri IV de France à la famille de Podenas. D'importantes inondations en 1737 causèrent de « grands désastres ». Au XVIIIe et XIXe siècle, on reconstruisit et on développa Riscle qui finit de se transformer et de se moderniser durant la période allant de 1871 à 1910 : hôtel de ville etc. En 1930, un pont suspendu métallique fut construit sur l'Adour, mais en août 1944 les maquisards le firent sauter et il faudra plus de huit ans pour le rebâtir. Il a été rénové en 2001. Aujourd'hui Montfort société dont la forme juridique est société civile  location de terrains et d'autres biens immobiliers par la famille de Cottavoz.","architecture":"Montfort constitué d'un corps de logis rectangulaire à deux niveaux toit en croupe avec série de lucarnes flanquées de chaque côté de pavillons carrées à trois niveaux, toit à quatre pans accolé aux extrémités de  tourelles rondes toit en poivrières.","habitants":"Famille de Podenas\r\n        \r\n        \r\n        \"","divers":"Château de Montfort à Riscles","gps":"","images":["../image/image_32/32_Montfort_Riscles_1.jpg","../image/image_32/32_Montfort_Riscles_2.jpg","../image/image_32/32_Montfort_Riscles_3.jpg"]},"Consult_chateau_formulaire81de":{"id":"Consult_chateau_formulaire81de","dept":"32","canton":"Samatan","commune":"Montpezat","nom":"Montpezat_Gers","type":"Château","periode":"XVIII","histoire":"Deux châteaux à Montpézat celui de Montpézat, de Calaoué à Saint-Lizier du Planté à quelques kilomètres au nord -ESt                                                                 CALAOUE, le village de Saint-Lizier a un château du XVIIIe, reconstruit sur lemplacement dun ancien datant de la féodalité, mais surtout un moulin en passe de retrouver son lustre dantan grâce « à des artisans ariégeois de grande qualité,   bâti en 1620, le château du Calaoué est le site du tournage du film de Louis Malle \"Milou en Mai\" pourront apprécier les lieux prestigieux du château du Calaoué dans le Gers en célébrant leur union dans ce domaine. Bâtisse du XVIIe, elle offre calme et tranquillité\r\nLe Calaoué met à votre disposition des salles de réception pour vos mariages, événements divers.                             \r\nMONTPEZAT, au hameau de Gensac  ancien village rattaché à Montpezat, on trouve un château et un moulin en restauration. Un autre moulin  se situe sur le point culminant de la commune où la construction dune table dorientation, pour admirer la chaîne des Pyrénées, est envisagée.","architecture":"Le château de Calaoué de plan quadrangulaire à trois niveaux  toiture en légère croupe avec balustrades, flanqué de tour carrées sur les extrémités de la façade principale toit en terrasses   Château du Calaoué du XVIIe siècle corps de logis rectangulaire à deux niveaux  flanqué de tours carrées en angles toits en terrasse.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Château de Calaoué à Montpezat","gps":"","images":["../image/image_32/32_Montpezat_Gers_1.jpg","../image/image_32/32_Montpezat_Gers_2.jpg","../image/image_32/32_Montpezat_Gers_3.jpg","../image/image_32/32_Montpezat_Gers_4.jpg","../image/image_32/32_Montpezat_Gers_5.jpg"]},"Consult_chateau_formulaire70a7-2":{"id":"Consult_chateau_formulaire70a7-2","dept":"32","canton":"Montréal du Gers","commune":"Montréal-du-Gers","nom":"Montréal_Ballarin","type":"Vestiges-Châteaux","periode":"XIII-XVIII","histoire":"cinq châteaux à Montréal celui de Ballarin, de Montréal, de Maillac, de Pellehaut et de Pomiro.                                     BALLARIN,  vestiges du château, lhistoire est en partie celle de lune des branches de la maison de Galard, qui le posséda durant plusieurs siècles. Philippe Lauzun de la famille de Galard garde la possession de Balarin jusquen 1451 et la vend alors à  un bourgeois et marchand de Condom nommé Jean Mercier. Les Galard qui ont repris  Ballarin, curieusement, le revende à nouveau en 1464 à un Pierre Mercier, frère ou fils du premier, usant sans doute, de leur  droit de rachat, curieuse ironie du sort, le château de Ballarin revient aux Galard en 1611, après 147 ans aux mains de la famille Mercier et y reste jusquen 1770. Daprès Saint-Allais, qui en a dressé la généalogie, la branche des La Mazelière, qui vint sétablir en Guyenne vers la fin du XVIe siècle, descendait de la famille La Mazelière-Coetquen, une des plus anciennes de Bretagne. En 1850, le château est donné, par acte public à lordre des frères prémontrés qui élevèrent  une superbe maison religieuse destinée à former les missionnaires  à côté du château dorigine.\r\nMAILLAC, exploitation agricole depuis 20 ans par  Jacques Bertholon.                                                                                     PELLEHAUT  le château de Pellehaut, bâti au XVIIIe siècle se situe dans la Ténarèze, en bordure du Bas-Armagnac,  propriété de la famille Béraut, installée à Montréal du Gers depuis 3 siècles, cette exploitation agricole est gérée de façon traditionnelle.","architecture":"Ballarin, sa construction est typique du château gascon de lépoque, quil sagisse de lappareil de ses murs, de la forme de ses meurtrières, du style de ses ouvertures ou du dispositif des mâchicoulis.  Tout porte en lui la marque de cette époque guerrière, où sur chaque tertre la Gascogne se hérissait de forteresses, où la force primait le droit, où partout se faisait impérieusement sentir le besoin de se défendre.                                                                           Maillac quadrilatère avec deux corps de logis à deux niveaux  toit à deux pans flanqué en angles de tours rondes en façades et tour ronde sur l'arrière, pavillon d'entrée   toit à quatre pans, les dépendances ferment la cour.                                                                          Château de Pomiro, datant du XVIe siècle, il fut autrefois un pavillon de chasse puis, il y a encore peu de temps, servit de résidence au marquis et à la marquise de Noé.","habitants":"Famille de Galard                                                                          Famille Béraut\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Vestiges de Ballerin, châteaux de Maillac et de Pellehaut à Montréal","gps":"","images":["../image/image_32/32_Montreal_Ballarin_1.jpg","../image/image_32/32_Montreal_Ballarin_2.jpg","../image/image_32/32_Montreal_Ballarin_3.jpg","../image/image_32/32_Montreal_Ballarin_4.jpg","../image/image_32/32_Montreal_Ballarin_5.jpg","../image/image_32/32_Montreal_Ballarin_6.jpg","../image/image_32/32_Montreal_Ballarin_7.jpg","../image/image_32/32_Montreal_Ballarin_8.jpg","../image/image_32/32_Montreal_Ballarin_9.jpg"]},"Consult_chateau_formulaire60aa":{"id":"Consult_chateau_formulaire60aa","dept":"32","canton":"Auch-2","commune":"Montégut-d","nom":"Montégut_Auch","type":"Château","periode":"XVI-XIX","histoire":"deux châteaux à Montégut d'Auch celui de Montégut et celui de Roquetaillade                                                                   MONTEGUT, il était la propriété de la famille des Polastron. Si on voit encore la silhouette rectangulaire, il ny a plus quune tour.   A partir de 1806, il est vendu à Me J.P Barada de Auch. À proximité, le château appartient encore à cette famille.               ROQUETAILLADE, actuellement, cet édifice est un centre pédiatrique de réadaptation qui appartient à l'ordre souverain de Malte. La commune est traversée par la voie d'Arles du pèlerinage de Saint-Jacques-de-Compostelle classé patrimoine mondial de l'UNESCO.  Quatre kilomètres plus loin, perché sur un aplomb rocheux, le village se dessine au détour du bois aux Fées dont un ancien moulin porte également le nom (tour des Fées).","architecture":"Montégut, ce château aurait été construit au XIIIe siècle, cétait à lépoque un  château gascon  typique avec un corps rectangulaire et deux tours carrées au nord.  Le château a vu défilé de nombreux propriétaires qui ont chacun apporté leurs modifications: le château a été agrandit, remanié,  une belle terrasse  a été aménagée en diminuant les bâtiments. Une balustrade entoure élégamment la terrasse qui fait surgir au nord et au sud, deux magnifiques échauguettes au toit piquant le ciel. Le village devait être fortifié au Moyen-Âge, le portail actuel serait l'ancienne place du pont-levis. Les plus anciennes parties du château datent du XIIIe siècle comme la plupart des châteaux gascons (construits pendant la guerre de Cent Ans). Il a été remanié aux XVe et XVIe siècles, au moment de la Renaissance, pour le rendre plus confortable. La troisième et dernière période de rénovation se situe aux XVIIIe et XIXe siècles pour donner l'aspect actuel d'un logis rectangulaire avec deux tours carrées et de longues terrasses à balustres le tout entouré d'un jardin à la française. Cette dernière restauration a permis de tripler le volume initial dans un style néo-gothique propre à cette époque : créneaux, tourelles, mâchicoulis.                                                                      Roquetaillade aujourd'hui ADAPEI du XIXe siècle à large façade avec un toit en ardoise comprenant des écuries du XVIIIe siècle.  La chapelle de Roquetaillade est d'aspect roman ; à l'intérieur on peut y remarquer un bénitier côtelé sur colonne antique et une statue de saint Jacques datant du XVIIe siècle.","habitants":"Famille des Polastron\r\n        \r\n        \r\n        \"","divers":"Château de Montégut, de Roquetaillade , d'Arros et la tour au fées","gps":"","images":["../image/image_32/32_Montegut_Auch_1.jpg","../image/image_32/32_Montegut_Auch_2.jpg","../image/image_32/32_Montegut_Auch_3.jpg","../image/image_32/32_Montegut_Auch_4.jpg","../image/image_32/32_Montegut_Auch_5.jpg","../image/image_32/32_Montegut_Auch_6.jpg","../image/image_32/32_Montegut_Auch_7.jpg","../image/image_32/32_Montegut_Auch_8.jpg","../image/image_32/32_Montegut_Auch_9.jpg"]},"Consult_chateau_formulaire9e82":{"id":"Consult_chateau_formulaire9e82","dept":"32","canton":"Preignan","commune":"Mérens","nom":"Mérens","type":"Château","periode":"XIII","histoire":"MERENS, château gascon construit à la fin du XIIIe siècle-début du XIVe et fortement remanié au XVIIe siècle. Inscrit comme monument historique en 2003.","architecture":"Datation principale : 4e quart du XIIIe siècle , 1er quart du XIVe siècle , 1er quart du XVIIe siècle. Le noyau du château correspond à un château de la fin du XIIIe ou du début du XIVe siècle. La tour carrée sud-ouest appartient à la construction d'origine. Au début du XVIIe siècle, le château est doté d'un nouveau système de défense éléments du chemin de ronde. A la même époque, les percements et la distribution intérieure sont modifiés. A l'ouest, le chai comporte des éléments de l'enceinte médiévale. Travaux menés entre 1604 et 1613, touchant surtout l'ouverture des fenêtres à meneaux et le bâtiment qui double la façade Est. Transformé en exploitation agricole. La tour carrée sud-ouest appartient à la construction d'origine.","habitants":"Seigneurs Locaux\r\n        \r\n        \r\n        \"","divers":"Château de Mérens","gps":"","images":["../image/image_32/32_Merens_1.jpg","../image/image_32/32_Merens_2.jpg","../image/image_32/32_Merens_3.jpg"]},"Consult_chateau_formulaire46cd":{"id":"Consult_chateau_formulaire46cd","dept":"32","canton":"Nogaro","commune":"Nogaro","nom":"Nogaro","type":"Château","periode":"XV-XVIII","histoire":"Plusieurs châteaux à Nogaro, celui de Bétous hôtel, d'Izaute située à quelques kilomètres de Nogaro, que vous pourrez rencontrer Arnaud Lesgourgues, propriétaire du château de Laubade, chambres d'hôtes, de  Laubade à Sorbets et autre châteaux.                             À Perchède à 9 km à louest de Nogaro le château du XVIIIe siècle où vécut lécrivain Joseph de Pesquidoux, chantre de la vie rurale à lancienne.","architecture":"Les châteaux de Nogaro sont de taille moyenne architecture du XVIIIe et XXe siècle certains avec tours rondes  et carrées.","habitants":"Arnaud Lesgourgues\r\n        \r\n        \"","divers":"Manoir à Nogaro de Bétous d'Izaute et de Laubade à Sorbets","gps":"","images":["../image/image_32/32_Nogaro_1.jpg","../image/image_32/32_Nogaro_2.jpg","../image/image_32/32_Nogaro_3.jpg","../image/image_32/32_Nogaro_4.jpg","../image/image_32/32_Nogaro_5.jpg","../image/image_32/32_Nogaro_6.jpg","../image/image_32/32_Nogaro_7.jpg","../image/image_32/32_Nogaro_8.jpg"]},"Consult_chateau_formulaire8dfc":{"id":"Consult_chateau_formulaire8dfc","dept":"32","canton":"Auch-3","commune":"Orbessan","nom":"Orbessan","type":"Château","periode":"XIV","histoire":"ORBESSAN , loccupation du site est très ancienne au lieu-dit  en Herc, à lest du village sur un coteau de la rive droite du Gers un site antique a été repéré fin XIXe siècle. On y a découvert une mosaïque polychrome.\r\nDe même au lieu-dit  au plan de la Roujo, ce sont des fragments de tessons de poteries sigillées sud-gauloises, damphores vinaires, de céramiques communes et de pesons de tisserands qui ont été relevés. Lhistoire dOrbessan se confond avec celle de son château. La paroisse est mentionnée sous lappellation Orbezano en 1140 dans le cartulaire noir, puis Orbessano dans Les Pouillès de 1265 et 1364. construit par l'archevêque de Martillet. Dorigine féodale, le château appartenait au Moyen-Age à une ancienne famille de Gascogne. Des coutumes ont été octroyées dès 1240, puis 1320 aux habitants.","architecture":"Orbessan  de plan quadrangulaire de deux niveaux flanqué de trois tours carrées à trois niveaux toit à quatre pans, l'ensemble de la bâtisse possède un toit en tuiles à deux pans","habitants":"Archevêque de Martillet\r\n        \r\n        \"","divers":"Château à  Orbessan","gps":"","images":["../image/image_32/32_Orbessan_1.jpg","../image/image_32/32_Orbessan_2.jpg","../image/image_32/32_Orbessan_3.jpg"]},"Consult_chateau_formulairebcd4-2":{"id":"Consult_chateau_formulairebcd4-2","dept":"32","canton":"Condom","commune":"Beaucaire","nom":"Pardaillan_Gers","type":"Vestiges","periode":"XIV-XVI","histoire":"PARDAILLAN, se situe sur les hauteurs en surplombant les vallées de la Bèze et de la Baïse, les ruines de Pardailhan  ou Pardaillan  peuvent se voir sur le territoire de la commune de Beaucaire. Pardailhan, Montaut, Montesquiou et L'Isle-d'Arbéchan (aujourd'hui L'Isle-de-Noé), étaient les quatre anciennes baronnies du Fezensac.\r\nLa famille de Pardailhan est connue depuis le XIe siècle et sa filiation établie depuis le XIIIe siècle. La famille a donné de nombreux rameaux, dont celle de Pardaillan de Gondrin. C'est sous l'administration de noble Paule de Saint-Lary de Bellegarde, seconde femme de noble Antoine-Arnaud de Pardaillan, marquis d'Antin et de Montespan, seigneur de Gondrin, qu'elle épousa le 27 juin 1602, que notre village a atteint son apogée. Fort intelligente et douée d'un goût artistique très prononcé, dès 1609, dame Paule embellit et fait reconstruire le château des Pardaillan qui tombe en ruines. Elle achète tous les petits lopins de terre composant le lieu et a dès lors, à sa disposition, tout l'espace compris entre le bourg et le hameau de Peyruc. Le 18 novembre 1612 elle fait appel à un artiste de renom, un maître maçon, architecte qui a travaillé à la construction de la cathédrale d'Auch : Audibert Cousteau, habitant de Gondrin.","architecture":"À cette époque, le bourg principal n'est composé que du château féodal avec ses vastes dépendances, sa chapelle, une partie de l'église actuelle et de nombreuses maisons bourgeoises, le tout entouré d'un mur d'enceinte percé de deux portes au Nord et au Midi et de deux portalets à l'Est et à l'Ouest.   Si aujourd'hui le château, qui date des XIVe et XVIe siècles est en ruine, la vieille bâtisse conserve une partie de son enceinte quadrangulaire avec ses tours et ses courtines, des meurtrières et des archères ainsi que des restes du chemin de ronde encore visibles.","habitants":"Famille de Pardailhan \r\n        \r\n        \"","divers":"Vestiges du château de Pardaillan à Beaucaire","gps":"","images":["../image/image_32/32_Pardaillan_Gers_1.jpg","../image/image_32/32_Pardaillan_Gers_2.jpg","../image/image_32/32_Pardaillan_Gers_3.jpg","../image/image_32/32_Pardaillan_Gers_4.jpg","../image/image_32/32_Pardaillan_Gers_5.jpg"]},"Consult_chateau_formulaire8082":{"id":"Consult_chateau_formulaire8082","dept":"32","canton":"Auch","commune":"Pavie","nom":"Pavie","type":"Château","periode":"XVI","histoire":"deux châteaux à Pavie celui de Besmaux et celui de Pyloubère.                                                                   PAVIE, l'occupation du site de Pavie remonte à la préhistoire, comme le prouvent ces objets historiques qu'on retrouvent régulièrement aux alentours du village, le sénéchal de Beaumarchés, comte d'Astarac et l'abbé cistercien de Berdoues sur les terres duquel elle fut érigée. La bastide de Pavie a été fondée le même jour que sa soeur jumelle la bastide de Mirande, le 5 mai 1281 par les mêmes co-seigneurs le comte Bernard IV d'Astarac et l'abbé Hugues de Cadeux prieur de l'Abbaye de Berdoues.                                                                                BESMAUX, au XVIe siècle Besmaux n'est qu'une petite métairie appartenant à Gabriel de Fleurian seigneur d'Es Vivès. En 1577 celui-ci marie sa fille Pellegrine à Manaud de Monlézun,  son frère Jacques, comte Dillon militaire, Robert comte Dillon épousa en 1933 Madeleine de Castelbajac ils eurent deux enfants dont Françoise Dillon, qui épousa en 1954 Joël de Sèze. A leur tour, ceux-ci eurent 3 enfants : Guy, Emmanuel, et Chantal. Mme Françoise de Sèze décéda prématurément en 1963 à l'age de 29 ans.\r\nPELOUBERE est un grand manoir au coeur d'un parc de 15 hectares situé près d'Auch qui est la capitale du Gers au Sud-ouest de la France.  Chambres d'hôtes.","architecture":"Pavie présente le plan caractéristique des fondations du sénéchal, elle fut organisée selon deux axes perpendiculaires dont les rues principales et secondaires déterminent des îlots carrés réguliers.  Mirande prospéra rapidement, l'urbanisation de Pavie souffrit de la proximité de Auch. Son expansion est très récente et date des années 1960-1970. Si Auch, la grande rivale, lui porta longtemps ombrage, dorénavant, elle favorise plutôt son développement.      Château de Besmaux, d'après les données historiques nous pouvons raisonnablement penser que l'ancienne métairie a été transformée à partir du XVIIe siècle et que le  château  a subi de multiples transformations au cours des XVIIIe et XIXe siècle.   Le bâtiment de plan rectangulaire avec ses deux ailes latérales présente côté sud une façade caractéristique du XVIIIe siècle des grandes fenêtres parfaitement superposées et de mêmes dimensions avec leur huisseries et vitrerie de petits carreaux donnent un caractère élégant de quadrillage. On note sur la partie centrale, la superposition de la porte d'entrée de belle dimension actuellement en fer forgé  avec un balcon au 1er étage. Le grand fronton triangulaire percé d'un il de buf repose sur deux pilastres en bossage délimitant cet avant-corps central.\r\nChâteau de Pavie du XVIIe siècle, qui abrite aujourd'hui le lycée d'enseignement général et technologique agricole (LEGTA) d'Auch antenne de Pavie.\r\nLa Tour du Guet, vestige des anciens remparts, date du XIVe siècle.","habitants":"famille de Robert comte Dillon\r\n        \r\n        \"","divers":"Châteaux de Besmaux et de Péloubére à Pavie","gps":"","images":["../image/image_32/32_Pavie_1.jpg","../image/image_32/32_Pavie_2.jpg","../image/image_32/32_Pavie_3.jpg","../image/image_32/32_Pavie_4.jpg","../image/image_32/32_Pavie_5.jpg"]},"Consult_chateau_formulaire74ad":{"id":"Consult_chateau_formulaire74ad","dept":"32","canton":"Lectoure","commune":"Pergain-Taillac","nom":"Pergain_Taillac","type":"Château","periode":"XIII-XVI","histoire":"Trois chateaux à Pergain Taillac.                                                 MANLECHE, situé sur la commune de Pergain-Taillac, cette vieille et grand bâtisse, haute de plusieurs étages.  Le château  construit du XIIIe  au XVIe siècles  par le pape Clément V appartenait à la famille de Bertrand de  Goth qui compta dans ses rangs des vicomtes de Lomagne et dAuvillars.                                            AMPELLE, lors de son édification au XIIIe siècle, le corps de bâtiment était moins volumineux  Les ajouts et modifications faites dans les siècles suivants ont dailleurs été supprimés par le propriétaire actuel, Alain de la Bourdonnaye.","architecture":"Tour-salle de Taillac, XIVe siècle, remaniée fin XVIe ou début XVIIe siècle par lajout de fenêtres, cheminée et tour descalier, remaniements au XVIIIe  et XIXe siècle.\r\nChâteau de Manlèche, construit au XVIe siècle sur un premier édifice du XIIIe siècle, typique de la première Renaissance gasconne,  galerie à arcades, tour hexagonale à escalier à vis suspendu, cour triangulaire, pigeonnier, moulin. Construction massive dominant la rivière, ceinte de douves, les témoignages dune origine médiévale sont nombreuses. Dans la cour intérieure la galerie darcade, son étage et la vaste tour hexagonale début renaissance sont un des premiers exemples de cet ordre en Lomagne.                                                                                    Ampelle,  château gascon  du  XIVe siècle. cest une construction rectangulaire, ses dimensions actuelles sont de 33 m de long sur 15 m de large, de 12 m de hauteur, couverte par un toit à 4 pentes. À langle nord-est, une tour carrée qui fut arasée à la hauteur du corps principal déborde de 3,50 m sur la façade Est. La partie sud correspond à une construction rajoutée à la fin du XIVe ou au début du XVe siècle. La fonction défensive est évidente, les murs ont jusquà 2 mètres dépaisseur et ne sont percés que de rares ouvertures où prédominent détroites archères. Vers 1500, on ouvrit quelques fenêtres et on rajouta des cheminées.\r\nLe château dAmpelle permettait de voir la salle de Taillac et les châteaux voisins dEscalup, de Sainte-Mère et de Rouillac. Aujourdhui privé, il offre aussi une vue sur Lectoure.","habitants":"Famille de Bertrand de  Goth.                                                            Alain de la Bourdonnaye. \r\n        \r\n        \"","divers":"Château de Lasalle, d'Ampelle de Taillac et Manléche à Pergain","gps":"","images":["../image/image_32/32_Pergain_Taillac_1.jpg","../image/image_32/32_Pergain_Taillac_2.jpg","../image/image_32/32_Pergain_Taillac_3.jpg","../image/image_32/32_Pergain_Taillac_4.jpg","../image/image_32/32_Pergain_Taillac_5.jpg","../image/image_32/32_Pergain_Taillac_6.jpg","../image/image_32/32_Pergain_Taillac_7.jpg","../image/image_32/32_Pergain_Taillac_8.jpg","../image/image_32/32_Pergain_Taillac_9.jpg"]},"Consult_chateau_formulaire3344":{"id":"Consult_chateau_formulaire3344","dept":"32","canton":"Nogaro","commune":"Perchède","nom":"Pesquidoux","type":"Château","periode":"XVI","histoire":"PESQUIDOUX, est la propriété de la même famille depuis le début du XVIe siècle, mais à trouvé sa physionomie définitive au milieu du XVIIIe siècle. Elle fut la demeure de plusieurs écrivains : Léonce de Pesquidoux, écrivain et critique d'art, rédacteur en chef de L'union et critique d'art, son épouse née Olga Beuverand de La Loyère, auteur de romans et nouvelles, le plus souvent sous le pseudonyme de comtesse Olga, leur fils Joseph de Pesquidoux, élu à l'Académie française en 1936 et enfin le fils de ce dernier, Arnaud de Pesquidoux, écrivain et journaliste, connu des lecteurs du monde sous son pseudonyme de Jean Taillemagre. Cette demeure est toujours propriété de la famille. Le Parc créé au milieu du XIXe siècle, est attribué à Edouard André.","architecture":"Château de Pesquidoux, édifié au début du XVIe siècle par la famille de Pesquidoux originaire du Houga tout proche, réaménagé au milieu du XVIIIe puis restauré au début du XXe siècle. Pigeonnier de 1750. Ancien lavoir restauré récemment. Le parc de 8 ha, composé au XIXe siècle, se visite. On y trouve de nombreuses espèces remarquables (cyprès chauves, tulipiers de Virginie, séquoia, etc.).  Maison du début du XVIe agrandie au XVIIIe par l'adjonction de deux ailes et d'un pigeonnier, appartenant à la même famille depuis près de 500 ans.","habitants":"Leonce Dubosc  de Pesquidoux,\r\n        \r\n        \"","divers":"Château de Pesquidoux à Perchède","gps":"","images":["../image/image_32/32_Pesquidoux_1.jpg","../image/image_32/32_Pesquidoux_2.jpg"]},"Consult_chateau_formulaire7f42":{"id":"Consult_chateau_formulaire7f42","dept":"32","canton":"Auch","commune":"Pessan","nom":"Pessan","type":"Château","periode":"XIV-XIX","histoire":"deux châteaux à Pessan celui de Lartigiole, de Trouquette et les fortifications porte-tour de Pessan, conserve également une architecture notable, avec une tour-porte fortifiée (IMH), le château de La Rochette XIXe, le château de Salleneuve : jardins au décor rustique et mythologique par François Lucas, le château de Lartigiole du XIVe siècle, le château de La Trouquette du XVe restauré, de belles maisons à colombage, un ancien moulin à vent, la grange de Lassalle, englobant une ancienne chapelle.        PESSAN, la porte-tour de Pessan est un vestige des anciennes fortifications du XIIIe siècle. Cest un spécimen typique de porte fortifiée d'un village gascon au Moyen-Age. La porte est ouverte dans une des tours carrées qui assuraient le flanquement de ce village, bourg ecclésial, construit autour de l'ancienne abbaye bénédictine fondée en 817.  Le village de Pessan sest organisé  autour de lun des plus anciens monastères du Gers. Létude conjointe du patrimoine bâti et des sources écrites a permis de mieux comprendre son développement à la fin du Moyen-Age.                                                                          LARTIGIOLE hôtel de Nicholas Austin.                    \r\nTROUQUETTE pas d'information historique","architecture":"A Pessan les éléments bâtis les plus anciens observés, hormis l'église, remontent à la seconde moitié du XIIIe siècle. Il est probable que le village ait été édifié en grande partie à cette période. Il a peu évolué, dans sa morphologie générale, jusqu'au XXe siècle. Au Moyen-Age, le village de Pessan faisait partie du comté d'Astarac. Il avait alors une certaine importance puisque des actes des comtes d'Astarac y ont été rédigés. Notice succincte : Le village de Pessan est un bourg monastique qui s'organise autour de l'abbaye dont les vestiges les plus anciens remontent au XIIe siècle.                                                 \r\nTrouquette ce château historique est situé sur le front de sa propre colline privée au cur de la campagne, bénéficiant dune vue imprenable vers le sud jusquaux Pyrénées. Construit en pierre locale pâle et avec les caractéristiques de la Renaissance, répartis sur 4 étages, comprenant une chambre loft dans la tour du pigeonnier.","habitants":"les comtes d'Astarac\r\n        \r\n        \"","divers":"Châteaux de Latigole,  de Trouquette et la porte de Pessan","gps":"","images":["../image/image_32/32_Pessan_1.jpg","../image/image_32/32_Pessan_2.jpg","../image/image_32/32_Pessan_3.jpg","../image/image_32/32_Pessan_4.jpg","../image/image_32/32_Pessan_5.jpg","../image/image_32/32_Pessan_6.jpg","../image/image_32/32_Pessan_7.jpg","../image/image_32/32_Pessan_8.jpg"]},"Consult_chateau_formulairec5d5":{"id":"Consult_chateau_formulairec5d5","dept":"32","canton":"St-Clar","commune":"Pessoulens","nom":"Peyrac","type":"Château","periode":"XIV","histoire":"PEYRAC  pas d'information historique sert aujourd'hui à des expositions","architecture":"Le château de Peyrac est construit dans la deuxième moitié du XVIe siècle ou la première moitié du XVIIe siècle, très remanié. Gros-oeuvre en calcaire, pierre de taille,  moellon. Deux étages carrés, un escalier hors-oeuvre et escalier tournant à retours sans jour. couverture de type croupe,  toit en pavillon, tuile creuse. Cet édifice, actuellement au centre d'une exploitation agricole, a été très remanié. Son corps de logis  se développait sur au moins deux étages comme en témoignent les vestiges de cheminée qui subsistent au niveau des combles. A partir du deuxième étage de la tour, un petit escalier conduit à une petite pièce qui occupe le dernier niveau. L'appareil du mur et des croisées montrent que le corps de bâtiment en S,     est une construction ancienne dont on ignore la fonction.","habitants":"Famille de Peyrac\r\n        \r\n        \"","divers":"Château de Peyrac à Pessoulens","gps":"","images":["../image/image_32/32_Peyrac_1.jpg","../image/image_32/32_Peyrac_2.jpg","../image/image_32/32_Peyrac_3.jpg","../image/image_32/32_Peyrac_4.jpg"]},"Consult_chateau_formulairee2b1":{"id":"Consult_chateau_formulairee2b1","dept":"32","canton":"Lectoure","commune":"Plieux","nom":"Plieux","type":"Château","periode":"XIII-XIV","histoire":"Deux châteaux à Plieux, celui de Plieux et celui de la Rouquette                                                                   PLIEUX, propriété successive des familles de Faudoas qui construisirent le château,  passa aux de Galard de L'Isle-Bouzon, des Puybersac, et au XVe siècle passa  par alliance aux des Rochechouart, de Catherine de Faudoas fille de Béraud IV de Faudoas avec  Antoine de Rochechouart seigneur de Saint-Amant, le château servit rarement de résidence permanente.   En 1607 devient possession du comte de Campaigne  et en 1705 le château de Plieux et de Gramont sont la propriété de Guillaume de Gaulet président au parlement de Toulouse ses descendant seront les seigneurs jusqu'à la Révolution.  Au XIXe siècle Plieux devient la propriété des Dufaur  et par héritage passe à la famille de Rigaud de Vaudreuil, famille illustrée par un gouverneur  du Canada  et de la Louisianne  au XVIIIe siècle.  En 1992 achat du château   par lécrivain Renaud Camus, qui lhabite, en a fait un centre important dexpositions dart contemporain et de rencontres culturelles. Il y expose notamment les uvres de l'artiste peintre et sculpteur Jean-Paul Marcheschi.  Le château a été classé monument historique en 1994.                                              ROUQUETTE A la tour-salle du XIIIe ou du XIVe siècle a été ajouté un corps de logis au XVIIIe siècle. Le couloir conserve un papier peint panoramique de la 2e moitié du XIXe siècle.","architecture":"Plieux, forteresse  médiévale de type gascons édifiée vers 1340, sur lemplacement dun castrum traditionnellement pauvre en ouvertures éclairé par le percement de nombreuses fenêtres à la Renaissance, fut remanié à la fin du Moyen-Age, on y perça de nombreuses baies qui ouvraient la vue sur la campagne environnante jusquaux Pyrénées, mais au détriment de la solidité. On leur doit peut-être la disparition du chemin de ronde qui régnait sur le sommet des murs, avec des consoles supportant des mâchicoulis, de forme rectangulaire flanquée de tours carrées à deux de leurs angles, corps de logis formant un bloc de 21 mètres sur 16,5 mètres élevé sur un rez de chaussée et de deux étages et compte deux salles par niveau.  Certaines baies durent être rebouchées,  au nord-ouest, la tour Sainte-Mère, haute de 26 mètres ; au sud-est, la tour Saint-Clar, arasée au niveau du corps principal à une époque inconnue. La tour Sainte-Mère servait  de porte dentrée au village, par deux portes dont lune, à lextérieur, fut ensuite murée et lautre très fortement remaniée.  La présence des mâchicoulis sur trois côtés du bâtiment témoigne de la construction tardive et de lultime évolution du château gascon, qui jusque-là, du moins daprès les témoins qui subsistent, nétaient pas munis de tels perfectionnements.","habitants":"Famille de Faudoas \r\n        \r\n        \"","divers":"Châteaux de Plieux et de Rouquette","gps":"","images":["../image/image_32/32_Plieux_1.jpg","../image/image_32/32_Plieux_2.jpg","../image/image_32/32_Plieux_3.jpg","../image/image_32/32_Plieux_4.jpg","../image/image_32/32_Plieux_5.jpg","../image/image_32/32_Plieux_6.jpg","../image/image_32/32_Plieux_7.jpg","../image/image_32/32_Plieux_8.jpg","../image/image_32/32_Plieux_9.jpg"]},"Consult_chateau_formulaire7c2e":{"id":"Consult_chateau_formulaire7c2e","dept":"32","canton":"Astarac-Gimone","commune":"Ponsan-Soubiran","nom":"Ponsan_Soubiran","type":"Château","periode":"XVIII","histoire":"PONSAN-SOUBIRAN, ce château est l'uvre du marquis Antoine François de Bertrand de Moleville, grand notable auprès du roi, qui l'a fait construire en 1785 et achevé en 1786. C'est un ouvrage étonnant avec sa toiture un peu particulière, dite à la Mansart. On le considère de style Louis XVI,   qui s'inspire de la géométrie parfaite de l'antiquité, alliant le rectiligne à la symétrie. Propriété de la famille Trilha.","architecture":"Ponsan, l'héritier des lieux, Henri de Fumel, qui était maire du village, a entrepris une campagne de restauration et reconstruction des monuments de Ponsan. On pense que c'est lui qui fait poser sur le toit la cloche et l'horloge. Sur cette façade ensoleillée se trouve une sublime uvre sculptée : elle est parfaitement symétrique et on y retrouve ce souci de perfection géométrique propre au style architectural de l'époque. Elle présente des éléments très spécifiques au style Louis XVI mais aussi très décoratifs, 4 pilastres corinthiens semblent la soutenir, une frise fleurie la décore et on y retrouve le blason couronné des Moleville. Ce blason est bordé d'ailleurs, de feuilles de chênes mêlées à un ruban, ce n'est  pas anodin quand on sait que le blason est depuis longtemps, une représentation de la personnalité de celui qui l'arbore : en l'occurrence, avec le chêne, on pourrait croire que l'on a une belle référence à notre Gascogne où cet arbre est roi, mais aussi un symbole de force et de résistance, pérennité, justice, stabilité et prospérité. Gardons ces qualités de robustesse, de force, de justice mais rendons le chêne au Lauragais.Cette façade Sud est encore plus étonnante qu'elle comprend au rez-de-chaussée, pas moins de 9 grandes portes-fenêtres donnant accès à une très agréable terrasse suivie du jardin.","habitants":"Marquis Antoine François de Bertrand de Moleville\r\n        \r\n        \"","divers":"Château de Ponsan-Soubiran","gps":"","images":["../image/image_32/32_Ponsan_Soubiran_1.jpg","../image/image_32/32_Ponsan_Soubiran_2.jpg","../image/image_32/32_Ponsan_Soubiran_3.jpg","../image/image_32/32_Ponsan_Soubiran_4.jpg"]},"Consult_chateau_formulairebd79":{"id":"Consult_chateau_formulairebd79","dept":"32","canton":"Lectoure","commune":"Pouy-Roquelaure","nom":"Pouy_Roquelaure","type":"Château","periode":"XV-XIX","histoire":"POUY-ROQUELAURE,  sci société civile immobilière est en activité depuis 16 ans. Domiciliée à Pouy Roquelaure, elle est spécialisée dans le secteur d'activité de la location de logements.\r\n Les hospitaliers de Nomdieu bénéficient en 1250 d'un membre de la famille de Vidals Capot, enfin en 1302 un certain Guillem de Capot \"que esta segont dis Capot en la parroquia de Poy-Cartos\" (Pouy-Roquelaure) avoue une terre de mêmes.\r\nUne enquête ordonné en 1279 à propos des droits du sire de Fimarcon sur ses vassaux nous livre les noms des châteaux de ses chevaliers, Berrac, Saint-Martin-de-Goyne, Pouy Roquelaure ou Corrègelart, Saint-Mézard, Larroque-Engalin, Roquepine.\r\nLe château de Pouy-Roquelaure est, d'après une lettre tirée des rôles gascons pour 1279, une des forteresses bien connu. La famille de Mondenard était alliée par mariage aux familles d'Albret et de Révignan. Garcie de Mondenard époux de Miramonde d'Albret donna la seigneurie de Roquelaure à son plus jeune fils en 1488 à l'occasion de son mariage avec la nièce du cardinal de Bilhères. Les fils aînés eurent la baronnie de Moncaut et la seigneurie d'Estillac.  Aujourd'hui la famille de Montal  est propriétaire de ces lieux.","architecture":"Restes de fortifications : rempart, porte fortifiée, ruines du château de Pouy-Roquelaure ,  un bien agréable petit village du Gers qui a conservé une grande authenticité. Lenceinte est du  XIIIe siècle, castrum  des seigneurs de Fimarcon cité en 1279. Coutumes octroyées en 1303. Cette enceinte sera détruite au XIXe siècle.\r\nLes quelques vestiges de pierre qui subsistent donnent une idée de la richesse du lieu et de son importance stratégique.  Pouy-Roquelaure était fortifié et un château existait, pas tout à fait au même emplacement que le château actuel.  En 1720  il fallait traverser lenceinte fortifiée du village pour arriver aux pieds de deux tours imposantes formant avant corps. Le château actuel date du XVe siècles  dautres écritures disent du XVIIe siècles  et il a subit de nombreuses transformations . Au pied du château côté sud au bas du perron la fontaine communale ressemble à la fontaine Diane de Lectoure, leau sécoulant dans le lavoir aujourdhui rénové . En 1986-1987 il servait encore pour rincer les grosses lessives.\r\nA louest du château, lescalier de pierre et la porte voûtée donnent dans les ruelles du village fortifié en 1583 et des incriptions sont gravées au dessus de la porte .","habitants":"Famille de Vidals Capot\r\n        \r\n        \"","divers":"Château de Pouy-Roquelaure et ses vestiges","gps":"","images":["../image/image_32/32_Pouy_Roquelaure_1.jpg","../image/image_32/32_Pouy_Roquelaure_2.jpg","../image/image_32/32_Pouy_Roquelaure_3.jpg","../image/image_32/32_Pouy_Roquelaure_4.jpg","../image/image_32/32_Pouy_Roquelaure_5.jpg","../image/image_32/32_Pouy_Roquelaure_6.jpg"]},"Consult_chateau_formulaired38d-2":{"id":"Consult_chateau_formulaired38d-2","dept":"32","canton":"Adour Gersoise","commune":"Pouydraguin","nom":"Pouydraguin","type":"Château","periode":"XVIII","histoire":"A quelques kilomètres de  Pouydraguin à Tasque le château de Darrech et la tour du moulin de Tasque.                \r\n POUYDRAGUIN, Saint-Juli
