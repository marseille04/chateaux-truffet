1347","dept":"32","canton":"Condom","commune":"Castex-d","nom":"Castex_Armagnac","type":"Château","periode":"XV","histoire":"Trois châteaux à Castex-d'Armagnac celui de Barrau, celui de Monbel et de Lafont ces deux derniers viticole et font une même société   et l'hôtel Bellevue.                                               \r\nCASTEX-D'ARMAGNAC,  dressé sur son oppidum, le château de Castex dArmagnac domine la plaine du Midou et le village de Monguilhem, en plein Bas-Armagnac, que lhistoire et leau de vie ont rendu célèbre.  En 1789, peu de mois avant la Révolution française, le comte dAbbadie de Barrau, fit lacquisition du Domaine de Castex.   Depuis 1930, ses descendants, conscients de limportance du patrimoine reçu, maintiennent la tradition familiale en élevant avec rigueur leurs eaux de vie.  Aujourd'hui  chambres d'hôtes. A Castex-d'Armagnac, le château de Monbel est caché par ses grands arbres. Autour de cette vieille bâtisse du XIXe siècle ; on cultive 20 ha de vigne dont 5 en replantation. Son propriétaire, le comte Olivier d'Agrin, est le descendant des fondateurs du domaine en 1811. Il est fier de compter parmi ses aïeux un ambassadeur qui vécut dans les années «20». Il a représenté la France en Chine, au Japon, en Hollande, en Angleterre et même au Vatican.","architecture":"Castex au Moyen-Age était une place forte dont Jean de Castex était le seigneur. Elle défendait la région contre les pilleurs et les seigneurs rivaux notamment ; et contre les Anglais au temps où ils occupaient le pays et que la guerre de cent ans faisant des ravages, opposait les rois de France aux rois dAngleterre jusquen 1453 après la victoire de la France à Castillon.  Cest avec Antoine de Roquelaure, Maréchal de France, fidèle compagnon dHenri IV pendant plus de 36 ans et jusquà la mort de ce denier en 1610, que Castex entre dans lhistoire.\r\nCinquante ans plus tard, les Gourgues acquirent Castex. Ils le garderont un siècle. En 1789, peu de mois avant la Révolution française, le comte dAbbadie de Barrau, fit lacquisition du domaine de Castex.    Son petit-fils, Bernard Gabriel Xavier, fut député et membre du conseil général du Gers, vice-président de la société dagriculture de ce département et eut un rôle considérable dans les organisations départementales. Daprès le CNRS, « il sagit de la plus grande enquête anthropologique collective jamais réussie depuis deux siècles dans le monde occidental ».    Depuis 1930, ses descendants, les enfants de Thérèse dAbbadie de Barrau et du Baron Marc de Saint Pastou, conscients de limportance du patrimoine reçu.","habitants":"Comte dAbbadie de Barrau,\r\n        \r\n        \"","divers":"Trois châteaux à Castex-d'Armagnac celui de Barrau, celui de Monbel et de Lafontet l'hôtel Bellevue.","gps":"","images":["../image/image_32/32_Castex_Armagnac_1.jpg","../image/image_32/32_Castex_Armagnac_2.jpg","../image/image_32/32_Castex_Armagnac_3.jpg","../image/image_32/32_Castex_Armagnac_4.jpg","../image/image_32/32_Castex_Armagnac_5.jpg","../image/image_32/32_Castex_Armagnac_6.jpg","../image/image_32/32_Castex_Armagnac_7.jpg","../image/image_32/32_Castex_Armagnac_8.jpg","../image/image_32/32_Castex_Armagnac_9.jpg"]},"Consult_chateau_formulaire3e7d":{"id":"Consult_chateau_formulaire3e7d","dept":"32","canton":"Lectoure","commune":"Castéra-Letourois","nom":"Castéra_Lectourois","type":"Château","periode":"XIII-XVIII","histoire":"Deux châteaux à Castéra-Lectournois celui de Castéra et celui des Pères chambres d'hôtes de  Catherine et  Alex Bergeaud.  Sur la ligne de crêtes entre vallée de l'Osse et vallée de la Guiroue,","architecture":"Tour-Porte  Le village-rue et l'église de ce castelnau étaient jadis protégés de murs d'enceinte percés de deux portes fortifiées. Seule subsiste la tour-porte Ouest : accolée à l'église Saint-Pierre, elle lui sert de clocher. Cette modeste église rurale fut décorée au XVIIe par le moine Jean Lamy, de l'ordre de Saint Antoine.  Le château seigneurial, anciennement maison forte, était curieusement situé hors les murs. Doté d'un donjon et de deux tours de 12 à 14 m de haut, il finit par menacer ruine et fut démoli pour être reconstruit différemment au XIXe siècle, conservant de modestes vestiges à la base d'une tour.","habitants":"Moine Jean Lamy\r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Castéra-Lectourois","gps":"","images":["../image/image_32/32_Cast%c3%a9ra_Lectourois_1.jpg","../image/image_32/32_Cast%c3%a9ra_Lectourois_2.jpg","../image/image_32/32_Cast%c3%a9ra_Lectourois_3.jpg","../image/image_32/32_Cast%c3%a9ra_Lectourois_4.jpg"]},"Consult_chateau_formulaire99b2":{"id":"Consult_chateau_formulaire99b2","dept":"32","canton":"Condom","commune":"Castéra-Verduzan","nom":"Castéra_Verduzan","type":"Château","periode":"XII-XVIII","histoire":"Deux châteaux à Castéra-Verduzan celui de Bonas  commune voisine (voir article) et de Vivent.                                            CASTERA-VERDUZAN, cette station thermale fut d'abord un camp romain d'où le nom de Castéra Castra auquel fut ajouté le nom des anciens seigneurs du lieu Verduzan; en fait, il y avait deux villages  séparés par l'Auloue, un à l'ouest avec son château qui a complètement disparu, l'autre au sud-est un hameau. A la fin du XVIIIe les sources analysées en 1771, mises en valeur par le marquis de Miran et déclarées excellentes, rapprochèrent les deux villages.     Castéra Verduzan est le résultat du regroupement en 1821 de Verduzan, la Cavalerie et Castéra-Vivent. L'actuel village de Castéra-Verduzan doit sa gloire au professeur Odilon Lannelongue dont le buste surmonte la colonne élevée devant la mairie. Le docteur Odilon Lannelongue est né à Castéra-Verduzan. Praticien réputé à la fin du XIXe siècle, il est le médecin des grands, notamment de Gambetta et de Sarah Bernhardt. Son épouse issue d'une famille de banquiers conforte sa fortune. Esprit éclairé et social, Odilon Lannelongue décide d'éduquer les braves paysans du Castéra. C'est en 1960 que le château est revenu pour la troisième fois dans la famille Lassus.","architecture":"Castéra-Verduzan, de ce château modelé, dans sa forme actuelle, par Blaise de Monluc, Noël Lassus vous montre quelques fenêtres. « C'est un pur style Renaissance qu'il ramené d'Italie, dans le Gers avec ses capitaines gascons. Si au château du Saint-Puy les fantômes existent Noël Lassus doit les tutoyer, car au détour d'une pièce et d'un écu il vous présente, la famille Morland, vieille noblesse de robe qui au XVIIIe apporta se contribution à l'aménagement de l'édifice tout en dotant le village d'un hôpital.\r\nLa Commanderie, ancienne commanderie des Templiers puis des chevaliers de Saint-Jean de Jérusalem appelés plus tard de Malte, fut édifiée dès le XIIe siècle. Tour de garde, grange dîmière, église, divers bâtiments la composaient. La petite église romane de la Cavalerie dédiée à Saint-Georges, un des trois apôtres guerriers, fut bâtie en grès ocre sur une hauteur et date de la fin du XIe siècle. Elle est aux dimensions de son état d'origine, dimensions modestes. Sa structure à l'architecture dépouillée, austère, répondait aux règles du fondateur de l'ordre. Récemment cette église a été l'objet d'études et de travaux de la part des nouveaux propriétaires pour retrouver de son originalité et de sa beauté romane. Elle possède deux enfeus (niches funéraires à fond plat) des XIIIe et XIVe siècles. La cour de la Commanderie accessible depuis léglise était léquivalent du cloître dans les abbayes ou monastères. La porte donnant sur l'ouest est postérieure à la construction. Lun des deux puits carrés gersois ici présent a été creusé par les chevaliers de Malte.","habitants":"Professeur Odilon Lannelongue\r\n        \r\n        \r\n        \"","divers":"Château de Castéra-Verduzan et de Vivent","gps":"","images":["../image/image_32/32_Castera_Verduzan_1.jpg","../image/image_32/32_Castera_Verduzan_2.jpg","../image/image_32/32_Castera_Verduzan_3.jpg","../image/image_32/32_Castera_Verduzan_4.jpg"]},"Consult_chateau_formulaire7a39":{"id":"Consult_chateau_formulaire7a39","dept":"32","canton":"Samatan","commune":"Cazaux-Savès","nom":"Caumont_Gers","type":"Forteresse","periode":"XVI","histoire":"CAUMONT, la seigneurie sera érigée en vicomté en 1342  par le roi Philippe VI de Valois au bénéfice du baron Bernard de Marestang, château construit par Pierre de Nogaret de la Valette duc d'Epernon, qui servit les rois Henri III et Henri IV. Au milieu du XVIe siècle, à son retour des guerres d'Italie.  La seigneurie entre dans la famille Nogaret de La Valette par le mariage, le 21 avril 1521, de Marguerite de l'Isle, dame de Cazaux et de Caumont, avec Pierre de Nogaret, seigneur de La Valette. C'est ce dernier qui fait édifier le château actuel de 1525 à 1535.  En 1554, y naquit son petit fils, Jean-Louis de Nogaret de La Valette, Duc d'Epernon et Cadet de Gascogne qui servit  Henry III et Henri IV. Cette illustre famille fut aussi responsable de l'édification du château de Cadillac aux portes de Bordeaux, Au XIXe siècle, Armand, Marquis de Castelbajac, y vécu entre les campagnes de la Grande Armée avant de partir pour la Russie comme ambassadeur de Napoléon III. Il y revint et consacra la fin de sa vie au département du Gers en temps que sénateur et président du Conseil Général.  Un peu plus tard, le marquis de Castelbajac fit hausser les toitures et les fit recouvrir d'ardoise, matériau peu utilisé dans cette région. Dans les années 1980, le vicomte et la vicomtesse Jean de Castelbajac ont entrepris d'importants travaux pour redonner à la cour d'honneur son aspect d'origine, ce qui y permet de nouveau l'organisation de concerts et d'événements. Le château est toujours à ce jour propriété de la famille de Castelbajac depuis des générations.","architecture":"Caumont de la renaissance française avec une partie  du château fort d'origine, le territoire sur lequel fut construit une première fortification au XIIe siècle, Caumont est construit sur les vestiges d'un château fort ayant appartenu à Gaston Phébus, la plus grande partie du château date de la deuxième moitié du XVIe siècle. On y accède par une vaste esplanade de 62 ares aboutissant à une basse-cour avec un long bâtiment très remanié qu'abritent les écuries. Le château déploie trois grandes ailes ouvertes sur une cour intérieure bornée par deux tourelles hexagonales à toitures en bulbes. Quatre pavillons de plan losangé à hauts toits à quatre eaux, couverts d'ardoise flanquent les angles. Les élévations extérieures sont assez austères et trahissent encore une préoccupation défensive.  Deux vastes étages de sous-sols voûtés marqués de nombreuses pièces à usage défini témoignent encore de l'activité importante du château qui employait de nombreux domestiques jusqu'au milieu du XXe siècle. Les façades sur cour sont très harmonieuses. Elles alternent pierre et brique. Sur les façades ouest et sud : croisées et demi-croisées surmontées d'oculi. Au sud, une coursière (une galerie extérieure) repose sur de robustes consoles sculptées, comme dans certains hôtels particuliers toulousains (hôtel de Bernuy, hôtel d'Assézat). Depuis cette coursière, il est possible d'admirer le parc et ses cèdres du Liban. Il est possible, ensuite de rejoindre la cour d'honneur du château par un escalier à vis du XVIe siècle.\r\nEn 1658, un incendie détruisit l'aile sud qui fut alors reconstruite dans un même esprit mais dans un style classique plus affirmé : bossage, travées rythmiques.","habitants":"Famille Nogaret de La Valette                                               Famille de Castelbajac\r\n        \r\n        \"","divers":"Château de Caumont à Cazaux Savès","gps":"","images":["../image/image_32/32_Caumont_Gers_1.jpg","../image/image_32/32_Caumont_Gers_2.jpg","../image/image_32/32_Caumont_Gers_3.jpg","../image/image_32/32_Caumont_Gers_4.jpg","../image/image_32/32_Caumont_Gers_5.jpg","../image/image_32/32_Caumont_Gers_6.jpg","../image/image_32/32_Caumont_Gers_7.jpg"]},"Consult_chateau_formulairefbef":{"id":"Consult_chateau_formulairefbef","dept":"32","canton":"Nogaro","commune":"Cazaubon","nom":"Cazaubon_Barbotan","type":"Château","periode":"XIII","histoire":"Trois châteaux à Cazaubon, celui de Bégué, de Bellevue et de Moutiques.                                                                           BEGUE, la plaque commémorative posée aujourd'hui en présence du préfet, vient rappeler que le château du Bégué fut un havre temporaire pour des centaines de personnes fuyant les nazis. Ce bâtiment que l'on a connu «casino de Barbotan» avant la construction de l'actuel, ne fut pas toujours un lieu festif.  De 1942 à 1945, il vit passer 300, 400, 500 peut-être, «pourchassés» par les nazis. Essentiellement des juifs étrangers selon Pierre Cames qui dans son livre «Cazaubon : chronique des années de guerre, 1939-1945», a consacré à cet épisode de nombreuses pages très documentées. Ce dernier considère que le château du Bégué, récemment acheté par monsieur et madame André.\r\nCAZAUBON comprend la station thermale de Barbotan-les-Thermes.\r\nMOUTIQUES, Pas d'information historique.\r\nBELLEVUE, ancienne maison de maître située au cur du Bas-Armagnac, le château Bellevue hôtel est aujourd'hui une maison de famille de  madame Michèle Consolaro.","architecture":"Cazaubon  à colombage, date du XIIIe siècle et a été classé comme bastide. Il abrite la mairie,  un ancien couvent. Deux portes de ville subsistent encore : la porte du Hourrat (trou en gascon), côté ouest, et la porte d'Uzan (ou du Juzan, signifiant du bas), côté sud.                                                                                  La Tour du Château, dite \"La Tour du crime\" que lon peut apercevoir dans le parc du \"chalet\", en passant par la route de lancienne gare. En 1640, il se dressait encore un château flanqué de tours et entouré de fossés.                                                                             Le château de Bégué, situé à la sortie du bourg vers Barbotan, a été transformé en hôtel.   de plan en équerre formait d'un  corps de logis rectangulaire à trois niveaux toit en terrasse, prolongé d'un autre corps de logis à deux niveau toit en terrasse.               Moutiques, quadrangulaire corp de logis à deux niveaux  avec série de lucarnes sur toit, flanqué de tours carrées à trois niveaux sur angles toit à l'impérial.                                                                          Bellevue, manoir féodal du XVe siècle flanqué de tours carrées toit à quatre pans en tuiles .                                                                Les bastides hôtel deux types différents, bâtisse de cinq étages et de types oblongue à deux niveaux avec fronton triangulaire en façade.","habitants":"Famille d'André                                                                             Famille Consolaro\r\n        \r\n        \"","divers":"Bastide de Cazaubon avec sa porte, la tour, bastide des termes avec hôtel ses châteaux, celui de Bégué, de Bellevue, de Jouanin et des Moutiques","gps":"","images":["../image/image_32/32_Cazaubon_Barbotan_1.jpg","../image/image_32/32_Cazaubon_Barbotan_2.jpg","../image/image_32/32_Cazaubon_Barbotan_3.jpg","../image/image_32/32_Cazaubon_Barbotan_4.jpg","../image/image_32/32_Cazaubon_Barbotan_5.jpg","../image/image_32/32_Cazaubon_Barbotan_6.jpg","../image/image_32/32_Cazaubon_Barbotan_7.jpg","../image/image_32/32_Cazaubon_Barbotan_8.jpg","../image/image_32/32_Cazaubon_Barbotan_9.jpg"]},"Consult_chateau_formulairec034":{"id":"Consult_chateau_formulairec034","dept":"32","canton":"Vic Fézensac","commune":"Cazaux-d","nom":"Cazaux_Anglès","type":"Château","periode":"XII","histoire":"CAZAUX D'ANGLES  Il fait partie de la communauté de communes d'Artagnan en Fezensac. Ce castelnau est implanté sur une terrasse qui domine de 160 m la rivière Guiroue. Il fait partie du Pays dAngles et appartient à lhistoire de la famille de Montesquiou.  Une histoire très complète a été écrite par Marguerite Lannes au début du XXe siècle. Contrairement à ce que prétend la rumeur, Cazaux d'Angles ne signifie pas \"jardin d'Anglais\" . Il fait en effet partie des trois villages qui portent encore le nom de la baronnie d'Anglès : Castelnau-d'Anglès et Saint-Jean-d'Anglès. Précisons que \"Cazau\" signifie \"jardin\" en gascon.","architecture":"Le village de Cazaux-d'Anglès, dans les temps anciens, lenceinte fortifiée abritait léglise, le village et le château (en partie visible de nos jours) dans la partie Est qui domine la vallée. Le château de Cazaux  date du XIIe siècle ; il est l'oeuvre des Templiers ; il est antérieur à la fondation de l'église qui n'était alors qu'une simple chapelle. Ses murailles épaisses de 85 cm sont formées de grosses pierres rectangulaires plus grandes que celles qui ont servi à la construction de l'église. Il y avait autrefois  deux tours jumelles dont l'une dominait le pont-levis. Un escalier en colimaçon mène à la tour.","habitants":"Famille de Montesquiou\r\n        \r\n        \r\n        \r\n        \"","divers":"La porte de la Bastide avec sa tour, le château de Perrot","gps":"","images":["../image/image_32/32_Cazaux_Angles_1.jpg","../image/image_32/32_Cazaux_Angles_2.jpg","../image/image_32/32_Cazaux_Angles_3.jpg","../image/image_32/32_Cazaux_Angles_4.jpg","../image/image_32/32_Cazaux_Angles_5.jpg","../image/image_32/32_Cazaux_Angles_6.jpg","../image/image_32/32_Cazaux_Angles_7.jpg"]},"Consult_chateau_formulairea6a2":{"id":"Consult_chateau_formulairea6a2","dept":"32","canton":"L","commune":"Clermont-Savès","nom":"Clermont_Savès","type":"Château","periode":"XVIII","histoire":"CLERMONT-SAVES, le château, classé Monument Historique, fut bâti à la fin du XVIIIe siècle dans l'esprit des \" folies\", ces résidences de campagne , de villégiature et de plaisance, très prisées par la noblesse et la riche bourgeoisie. Au Moyen-Age cette commune faisait partie avec sept autres, d'un petit territoire qui s'étendant entre L'Isle Jourdain et Samatan appelé Cogotois. Ce dernier fut érigé en vicomté en 1342 par lettre patentes de Philippe VI de Valois au profit du baron Bernard de Marestang. En 1791, le dernier vicomte du Cogotois, Henri Thomas de Preissac, marquis de Marestang ayant émigré en Espagne tous ses biens furent confisqués et le Cogotois divisé en 60 lots pour être vendus comme biens nationaux. Celui de Clermont-Savès comprenait un château, qui venait juste d'être achevé avec de nombreux lopins de terres cultivable.                                                                         A quelques kilomètres au sud-ouest à Monferran-Savés  le château de Lauzin du XIXe siècle chambres d'hôtes de Patrick Piette.","architecture":"Clermont-Savès construit au XVIIIe siècle, de plan rectangulaire sur assise à neuf travées à deux niveaux toit en croupes tour mi-hors uvres en façade  comprenant les trois travées centrale avec terrasses au niveau du toits côté parc pavillon saillant sur les trois travées centrale également.                                                             Lauzun à Monferran-Savès de plan rectangulaire à deux niveaux et série de lucarne sur un toit  en ardoise en croupe avec une sortie centrale de ce denier couvert d'une coupole.","habitants":"Baron Bernard de Marestang\r\n        \r\n        \r\n        \"","divers":"Château de Clermont-Savès","gps":"","images":["../image/image_32/32_Clermont_Saves_1.jpg","../image/image_32/32_Clermont_Saves_2.jpg","../image/image_32/32_Clermont_Saves_3.jpg","../image/image_32/32_Clermont_Saves_4.jpg","../image/image_32/32_Clermont_Saves_5.jpg"]},"Consult_chateau_formulaire29fa":{"id":"Consult_chateau_formulaire29fa","dept":"32","canton":"Auch","commune":"Cologne","nom":"Cologne","type":"Château","periode":"XV","histoire":"Deux châteaux à Cologne celui de Cologne et  de Pominet de 1418, est une ancienne résidence des évêques de Lectoure .                                                   COLOGNE est une bastide fondée en 1284, sur un plan caractéristique des bastides royales.                                               POMINET date du XIe siècle des seigneurs  de Poasiron aujourd'hui  à Bastard de Lafitte.","architecture":"Pominet corps de logis rectangulaire à deux niveaux flanqué de retour en équerre en façades par des dépendances et courtines formant la cour d'honneur avec tour aux angles de la façade.","habitants":"Famille de Bastad de Lafitte\r\n        \r\n        \"","divers":"Château de Cologne et de Pominet","gps":"","images":["../image/image_32/32_Cologne_1.jpg","../image/image_32/32_Cologne_2.jpg"]},"Consult_chateau_formulaire1402":{"id":"Consult_chateau_formulaire1402","dept":"32","canton":"Condom","commune":"Condom","nom":"Condom","type":"Château","periode":"XVI-XVIII","histoire":"Plusieur châteaux à Condom celui de la tour d'Andiran, de Béraut pas d'info, de Bives, de Bruhasses du XVIIIe siècle, de Cahuzac, de Cugnac-Armagnac du XVIIIe siècle, d'Ensoulès de Mothes du XIIIe siècle et de Peyrac du XVIIe siècle, de Pouypardin du XIIIe siècle , de Roquebère hôtel de Isabelle Mayeur.        \r\nBRUHASSES Chambres d'hôtes Hélène et Jean Royer vous accueillent dans leur maison du XVIIIe siècle,                                                                 CAHUZAC, la société du château est dirigée par Diane Perouse (Directeur général)                                                                GENSAC, dès le XIIIe siècle, des écrits attestent que les Seigneuries du Condomois et de Gensac en particulier sont : « des terres à vignobles ». Depuis plus de 600 ans les générations se succèdent pour mettre en valeur le patrimoine et les terres de Gensac. C?est le second fils de Louis Hauller qui est à la direction du domaine, après être resté 13 ans chez Bestheim sur le site dédié aux effervescents     Hans-Dieter Vontobel.","architecture":"la tour d'Andiran du XIIIe siècle  qui abritait le syndicat d'initiative\r\nDe nombreux hôtels particuliers du XVIIIe siècle rivalisent d'élégance, avec leurs nobles escaliers, leurs balustrades de pierre et les ferronneries de leurs balcons, avenue de Gaulle, précédemment cours Scipion-Duplex.\r\nBruhasses, de plan rectangulaire à deux niveaux toit à deux pans, flanqué aux extrémités de tours carrée à toit pointu quatre pans.                                                Cahuzac de plan rectangulaire à deux niveaux flanqué de tours carrées à toit brisés et de tourelles en encorbellement sur façade arrière toit en poivrières.","habitants":"noble Bernard de Castelbajac                                                           Diane Perouse                                                                                   famille Ryst Dupeyron                                                                          Albert Laporte\r\n        \r\n        \"","divers":"Château de la Bruhasses, de Cahuzac de Gensac et divers autres châteaux à Condom","gps":"","images":["../image/image_32/32_Condom_1.jpg","../image/image_32/32_Condom_2.jpg","../image/image_32/32_Condom_3.jpg","../image/image_32/32_Condom_4.jpg","../image/image_32/32_Condom_5.jpg","../image/image_32/32_Condom_6.jpg","../image/image_32/32_Condom_7.jpg"]},"Consult_chateau_formulairef21d":{"id":"Consult_chateau_formulairef21d","dept":"32","canton":"Condom","commune":"Condom","nom":"Condom_Chateau","type":"Château","periode":"XVII-XVIII","histoire":"Le château de Cugnac, de  Peyriac du XVIIe siècle de  Pouypardin et de Roquebère hôtel de Isabelle Mayeur.                                                                                                                                                  PEYRIAC, l'emplacement a été occupé dès l'époque préhistorique. Chapelle bâtie en 1607. Le château est bâti près d'une fontaine du XVIIIe siècle qui sert d'abreuvoir.                                                          CUGNAC,  un hôtel particulier du XVIIIe siècle, abrite les chais d'Armagnac de la famille Ryst Dupeyron. Joseph Dupeyron a créé la maison Dupeyron en 1905 et a su transmettre l'amour du travail bien fait à sa famille.  Jacques-François Ryst, son petit-fils, dirige aujourd'hui la maison. Les Armagnacs Ryst, devenus la maison Dupeyron en 1960, se caractérisent par un sérieux travail de sélection, base essentielle de toute maison de négoce.                                                                                                                   POUYPARDIN  fut naguère propriété des seigneurs de Pouypardin, puis de leurs descendants Albret - Pouypardin. Ainsi de Géraud du Pouy, seigneur de Pouypardin, sire de Saint-Amant, servant le Roi de France et porté à ce titre aux comptes des Trésoreries de Guerre de 1338 à 1358. Domaine repris par Stéphane Picarelli, qui souhaite poursuivre la politique qualitative menée sur le domaine depuis l?'origine et maintenir la qualité et la typicité des vins par  Antonin Nicollier.                                                                                                                ROQUEBERE Située à 3 km de Condom en Ténarèze, notre propriété est composée tout d'abord de la maison d'hôtes, tour de gué, puis château au XVIIe siècle.","architecture":"Cugnac l'hôtel de Cugnac : l'une des belles demeures des XVIIe et XVIIIe siècles de la vieille ville ; ses ailes entourent une cour carrée pavée, fermée d'une grille en fer forgé ; on peut visiter les chais d'armagnac.                                                                                                                  Peyriac, l'emplacement a été occupé dès l'époque préhistorique. La partie centrale comprend le logis des anciens maîtres. Les communs cernent deux cours. Deux escaliers donnent sur les entresols construits au-dessus de grandes caves voûtées. L'accès à la cour se fait par un porche bâti en arc plein cintre. Au sud-est s'élèvent deux tours rondes délabrées, dont la partie haute faisait fonction de pigeonnier dès l'origine.                                                                                           Pouypardin : sur une crête dominant la vallée de l'Osse, cette belle construction des XIIIe au XVIe siècles, comprend une enceinte polygonale avec un donjon rectangulaire accolé à une salle de la même époque.  Ce château fit partie du système de défense provoqué par le traité d'Amiens, signé avec les Anglais en 1279. Le logement, récent, a été remanié au XIXe siècle. Perpendiculaire à cette façade, s'élève le logis du XVe siècle avec baies à traverses et à meneaux. Il est dominé par un donjon rectangulaire sur lequel prend appui un mur d'enceinte polygonal derrière lequel s'adossaient des communs ruinées. Dans la cour intérieure se trouve une tour polygonale abritant un escalier à vis, percée d'une porte moulurée avec gâbles et pinacles.                                                              Roquebère,   quadrangulaire à deux niveaux, toits en tuiles en croupes.","habitants":"Seigneurs de Pouypardin\"","divers":"Le château de Cugnac, de Peyriac, de Pouypardin et de Roquebère à Condom","gps":"","images":["../image/image_32/32_Condom_Chateau_1.jpg","../image/image_32/32_Condom_Chateau_2.jpg","../image/image_32/32_Condom_Chateau_3.jpg","../image/image_32/32_Condom_Chateau_4.jpg","../image/image_32/32_Condom_Chateau_5.jpg","../image/image_32/32_Condom_Chateau_6.jpg"]},"Consult_chateau_formulaire0ca9":{"id":"Consult_chateau_formulaire0ca9","dept":"32","canton":"Condom","commune":"Condom","nom":"Condom_Patrimoine","type":"Palais","periode":"XIII","histoire":"l'évêchés, le musées de l'Armagnac, le collège des Oratoirs, le château de La Mothes et la tour des templiers.                                                          EVEQUES, De 1317 à 1790, Condom fut le siège d'un évêché dont les titulaires étaient pour la plupart des personnages importants du royaume de Bossuet, Cossé-Brissac, Montmorency-Laval. La construction de l'évêché fut entreprise de 1693 à 1734 par Louis de Milon. Logé dans une maison vétuste près du cloître, il s'employa à reconstruire ce bâtiment tout en repensant les jardins, les terrasses et les communs. Il élabore le jardin et la terrasse à l'est du bâtiment, et achète des parcelles et des maisons au nord pour ménager une perspective. Son successeur, Alexandre César d'Anteroches termine l'évêché en 1793. L'accès à la cour se fait par un portail orné d'un fronton accosté d'ailerons à volutes. L'évêché développe une façade de dix travées. A l'intérieur, le rez-de-chaussée conserve des décors de gypserie.                                                                                    MOTHES   la Mothes du XIIIe siècle est une propriété d'une personne privée.                                                                               MUSEES de L'Armagnac a été créé en 1954 par Henri Polge, archiviste départemental. Ce musée était auparavant installé dans une galerie qui surmonte un cloître de style gothique flamboyant. Ce nest quen 1981 quil a été transféré dans ces lieux, dépendances restaurées de lancien évêché de Condom construit dans la seconde cour du Palais Episcopal.  (aujourdhui occupé par la sous-préfecture)                                                            \r\nTOUR des TEMPLIERS   transformée en habitation et couverte d'une toiture en tuiles creuses qui a transformé sa silhouette.","architecture":"Collèges  Oratoire  en Tour d'escalier donnant sur la cour intérieure ; façades et toitures correspondantes des bâtiments délimitant la cour intérieure à l'exception de l'ancienne chapelle ; façades donnant sur la rue Jean-Jaurès et sur la rue Saint-Exupéry, y compris les deux portails  : inscription par arrêté du 12 juillet 1988    Musée de l'Armagnac : dans les anciennes écuries de l'évêché, avec des charpentes du  XVIIIe siècle, le musée est consacré à l'eau-de-vie, il possède un pressoir en poutre de 18 tonnes.                                                                                            Musée très ancien, puisquil fut créé en 1848, il devient  un musée générique, incluant beaux-arts, ethnologie et sciences naturelles.                                Mothes, La tour, édifiée à mi pente d'un vallon sur la route d'Agen, est actuellement englobée dans les bâtiments d'une ferme attenante à une maison de maître datant du début du XIXe siècle. Elle est dominée par la tour de l'escalier qui fut transformée par la suite en pigeonnier. Elle fait partie du réseau de forteresses édifiées aux XIIIe et XIVe siècles dans cette région de Gascogne, rattachée en partie au royaume des Plantagenêts. La couverture et les planchers n'existent plus.                                               TOUR des Templiers  Tour de plan carré, le rez-de-chaussée, le premier et le second étages ont subi des transformations qui dénaturent l'aspect primitif de la tour (percement de portes et fenêtres, adjonction d'un balcon). La partie supérieure est intacte, percée d'une fenêtre géminée. Dans leur partie haute, les murs sont crénelés. Les merlons existent encore et soutiennent la charpente.","habitants":"Alexandre César d'Anteroches\r\n        \r\n        \"","divers":"l'évêchés, la Mothes, le Musée Armagnac, la tour des templiers  et le collége des Oratoriens à Condom.","gps":"","images":["../image/image_32/32_Condom_Patrimoine_1.jpg","../image/image_32/32_Condom_Patrimoine_2.jpg","../image/image_32/32_Condom_Patrimoine_3.jpg","../image/image_32/32_Condom_Patrimoine_4.jpg","../image/image_32/32_Condom_Patrimoine_5.jpg","../image/image_32/32_Condom_Patrimoine_6.jpg","../image/image_32/32_Condom_Patrimoine_7.jpg"]},"Consult_chateau_formulaire115c":{"id":"Consult_chateau_formulaire115c","dept":"32","canton":"Vic-Fezensac","commune":"Courrensan","nom":"Courrensan","type":"Forteresse","periode":"XI-XIV","histoire":"COURRENSAN, a la fin du XIe siècle, une maison forte est construite à l'extrémité Ouest de l'éperon. A la fin du XIIIe siècle, un château est cité  en 1321, il appartient à Bernard Trencaléon, seigneur  de Firmasson et vassal du Roi d'Angleterre. A la fin du  XIVe siècle, la seigneurie est englobée dans le comté d'Armagnac. En 1579, le château est pillé par Rison, un capitaine protestant. Durant 6 siècles, le château change souvent de propriétaires. Il passe aux mains des Fimarcon puis des Labarthe, Astarac, Rochechouart, et Montesquiou. En 1751, il est vendu à Gérard Dupleix. Pendant la Révolution, sous la Terreur, toutes les cloches, tous les objets de culte en argent et en vermeil furent expédiés à Condom par le directoire courrensannais afin d'alimenter l'effort de guerre. En 1838, les Dupleix vendent le château à la commune. En 1887, une des tours du château édifiées par les Labarthe au XVIe siècle s'écroule. Vendu aux enchères en 1965, le château est acquis par la famille Devedjian.  En 1979, une partie du château est inscrit aux Monuments Historiques.","architecture":"Le village fortifié est posé sur un éperon rocheux, il conserve les reste d'anciens remparts. Dans les étroites ruelles, de belles maisons médiévales et renaissances . A l'époque Romaine, une cité fortifiée existe peut être en 1062, le nom de Courrensan apparaît avec une école monastique rattachée à un prieuré clunisien dépendant du monastère de Saint-Mont. Le château féodal et le castelnau attenant datent très certainement de cette époque. Maisons médiévales à colombages dans la rue menant au château.\r\nL'agglomération, excentrée, était séparée du château par un fossé. Au XIIIe siècle se développe un second village que le cadastre ancien appelle bastide, édification à laquelle uvra  Bernard de Trencaléon, seigneur de Courrensan. Sa protection se caractérisait à l'est par une double rangée de fossés, au nord par une motte, au sud par deux lignes de fortifications, alors qu'à l'extrême ouest une tour contrôlait le franchissement de l'Auzoue.","habitants":"Famille de Bernard Trencaléon\r\n        \r\n        \"","divers":"Château de Courrensan","gps":"","images":["../image/image_32/32_Courrensan_1.jpg","../image/image_32/32_Courrensan_2.jpg","../image/image_32/32_Courrensan_3.jpg","../image/image_32/32_Courrensan_4.jpg","../image/image_32/32_Courrensan_5.jpg"]},"Consult_chateau_formulaire5fb5":{"id":"Consult_chateau_formulaire5fb5","dept":"32","canton":"Auch","commune":"Durban","nom":"Durban_Gers","type":"Vestiges","periode":"XIII","histoire":"DURBAN,  le château de Durban, a priori construit au XIIIe siècle, domine encore la vallée du Cédon. On l'appelait aussi le château d'Astarac qui logeait un baille, c'est-à-dire un représentant du seigneur, pas d'information sur ce dernier.","architecture":"Le château de Durban, a priori construit au XIIIe siècle,    les vestiges du château sont assez ramassés et assez difficiles à déchiffrer, ils se trouve sur une petite plateforme surplombant le village. Il semble faire partie de ces salles à tour, nombreuses dans la région, puisqu'une petite tour carrée, semble accolée à la salle, à l'ouest. Sur la droite, des arrachements du mur qui se poursuivait plein Est, vers ce qui était peut être l'entrée. Au XIIIe siècle, une fortification semble avoir été construite sur l'éperon rocheux. Au XXIe siècle, la découverte de la ruine est libre et gratuite.  Au pied de la façade Sud-Ouest,  il  reste presque rien, un pan de mur, un bout de tour cassé, les affres du temps l'ont abîmé, mais ses dernières pierres résistent et en font tout le charme et la beauté. Les fondations en blocs de molasse d'une tour extérieure quadrangulaire, aujourd'hui disparue. trois  ressauts sur la face Ouest.","habitants":"Famille du seigneurs de Durban \r\n        \r\n        \r\n        \"","divers":"Vestiges du château de Durban","gps":"","images":["../image/image_32/32_Durban_Gers_1.jpg","../image/image_32/32_Durban_Gers_2.jpg","../image/image_32/32_Durban_Gers_3.jpg","../image/image_32/32_Durban_Gers_4.jpg","../image/image_32/32_Durban_Gers_5.jpg"]},"Consult_chateau_formulairea84a":{"id":"Consult_chateau_formulairea84a","dept":"32","canton":"Vic-Fezensac","commune":"Dému","nom":"Dému","type":"Tour-Château","periode":"XIV","histoire":"En plus de la tour porte à Dému, le château de Labarthe et de Seignebon.                                                                                  \r\n DEMU Vieille tour, reste d'un château du XIVe siècle.                                                                         SEIGNEBON  transformé en hôpital sanitaire pendant la dernière guerre.","architecture":"Dému, au pays des tours de guet, celle-ci implantée en partie haute du bourg, faisait-elle partie de  lenceinte du village médiéval , a été le  clocher dune ancienne église. Sa construction doit remonter au XIVe siècle, mais elle a subi depuis de nombreuses modifications. A la fin du XIXe siècle elle sert parfois de prison et abritait alors la mairie. Cest de cette époque que date lhorloge au fronton Est, et le petit campanile planté à la pointe du toit, doté dune cloche entre deux  girouettes type étendard, lensemble bien rouillé.","habitants":"Seigneurs locaux\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"La Tour, le château de Labarthe et de Seignebon à Dému","gps":"","images":["../image/image_32/32_Demu_1.jpg","../image/image_32/32_Demu_2.jpg","../image/image_32/32_Demu_3.jpg","../image/image_32/32_Demu_4.jpg","../image/image_32/32_Demu_5.jpg","../image/image_32/32_Demu_6.jpg","../image/image_32/32_Demu_7.jpg"]},"Consult_chateau_formulaire7508":{"id":"Consult_chateau_formulaire7508","dept":"32","canton":"Eauze","commune":"Eauze","nom":"Eauze","type":"Château","periode":"XVII","histoire":"deux châteaux à Eauze celui de Millet, celui de Bordenaye de la Cieutat et la ferme de Mounet de  Monique et Bernard Molas.                                        EAUZE, le roi Charles IX peu après son passage à Eauze en 1565, « créa » ou plutôt relança ses marchés désorganisés par les guerres. Henri III de Navarre, rentré dans ses États après ses quatre ans de captivité à la cour, fut pris dans une embuscade en 1576 à Eauze, où il s'en fallut de peu qu'il ne périsse. Il en rendit responsable le lieutenant du roi de France en Guyenne, Villars, successeur de Monluc, et obtint son remplacement par Biron. Henri fut clément avec la population : la ville ne fut pas pillée et seuls les meneurs furent punis. Le même Henri IV séjourna à Eauze en juin 1579 avec son épouse Marguerite de Valois (1553-1615), la fameuse Reine Margot, dans la maison « de Jeanne d'Albret ». Place de sureté protestante par l'Édit de Nantes, Richelieu ordonna d'abattre les fortifications d'Eauze en 1624.\r\nFerme MOUNET à Eauze à 3 km : Bernard et Monique vous accueillent dans leur gentilhommière entourée d'un parc, sur une exploitation agricole   gîte rural sur la propriété.","architecture":"A Eauze, au sommet de la colline surplombant les ruines de l'antique cité, un monastère naquit vers 980. Il fut rattaché à Cluny au XIe siècle. Autour de ce prieuré dédié à saint Luperc, la ville médiévale s'est développée, se protégeant derrière des remparts et des fossés. La communauté des habitants a obtenu du comte une charte des Coutumes et était administrée par quatre consuls. Le monastère percevait une partie des taxes levées sur le marché du jeudi et les foires.     Le château de Doat, édifié au XVe siècle, résidence privée de la famille de Sabbathier de Lafontan. Tout un ensemble de maisons médiévales à colombages :  la maison de Jeanne d'Albret de la fin du XVe siècle avec des piliers de bois et des poutres sculptées, place d'Armagnac ; la maison dite des Consuls, rue Bistouquet ; la maison de l'Office de Tourisme ; les maisons de la rue Robert-Daury et de la rue Rabelais.\r\nCloître de l'ancien prieuré, reconstruit au XVIIIe siècle, mais dont il subsiste une arcade gothique de porte datant du XIVe siècle, place Saint-Taurin. Devenu petit séminaire en 1841, il a été transformé en collège privé en 1906.  Les vestiges des anciens remparts, restes de la première enceinte médiévale. Le château d'eau impérial, premier château d'eau moderne de France, construit sur les ordres de Napoléon III.  Un petit édifice art nouveau de style pyrénéen (route de Sauboires) labellisé Fondation du Patrimoine.","habitants":"Marguerite de Valois\r\n        \r\n        \"","divers":"Maison de Jeanne d'Albret  château de Doat, de Cieutat  et de Mounet à Eauze.","gps":"","images":["../image/image_32/32_Eauze_1.jpg","../image/image_32/32_Eauze_2.jpg","../image/image_32/32_Eauze_3.jpg","../image/image_32/32_Eauze_4.jpg","../image/image_32/32_Eauze_5.jpg","../image/image_32/32_Eauze_6.jpg"]},"Consult_chateau_formulaire6cad":{"id":"Consult_chateau_formulaire6cad","dept":"32","canton":"Gimont","commune":"Montfort","nom":"Esclignac","type":"Manoir","periode":"XI-XV","histoire":"ESCLIGNAC, château du XIe siècle,  berceau de la famille de Preissac dont les membres sillustrèrent depuis les croisades jusquà la Révolution, la seigneurie fut  érigée en baronnie au XVe siècle, marquisat au XVIIe siècle et duché au XVIIIe siècle. En 1485, Bertrand Ier de Preissac y fit percer les élégantes fenêtres à meneaux et flanqua la tour ronde dun escalier à vis. Bertrand II de Preissac et Jean de Preissac ajoutèrent la tour nord et celle du pont-levis ainsi que les tours du chai fortifié.   Il fut la demeure des sires de Preissac, seigneurs, puis barons, comtes, marquis et enfin ducs d'Esclignac, jusqu'à la Révolution française. A la Révolution, Charles de Preissac devenu cousin de Louis XVI par son mariage avec Elisabeth de Saxe, il dut sexiler et le château fut vendu. Sous la restauration, il revint à Philippe de Preissac qui céda aux comtes de Lahitte. Ceux-ci le gardèrent jusque vers 1939 et le château relégué en ferme menaçait ruine quand en 1968 des travaux furent entrepris pour restaurer, avec un grand respect des matériaux et de son style Renaissance, en font une  remarquable forteresse. Cet important monument de notre patrimoine  est aujourdhui domaine privé à la famille de Raoul Haoudji.  Ils sont six propriétaires du château d'Esclignac,  les frères Bogdanoff qui cherche à le sauver  cette bâtisse gasconne témoin de plus de 1 000 ans d'histoire aurait besoin d'une restauration d'urgence.  Inscrit aux M.H, il a été restauré.","architecture":"Le château dEsclignac  bâti au XVe siècle, ce superbe ensemble est chargé dhistoire,   «Les derniers travaux importants à Esclignac remontent au début des années 90. Depuis, les tempêtes ont fait bouger la charpente et gravement fragilisé la toiture».  La partie la plus ancienne de l'édifice, la «maison forte» du XVe siècle dont la partie basse est soutenue par une merveille de poutre en cur de chêne. Cette pièce de bois est en place depuis bientôt 1 000 ans. Inébranlable  sans doute, à condition que la toiture tienne le coup. Cousin des propriétaires, Cédric Davant-Lannes a saisi l'étendard du chevalier blanc d'Esclignac. «Il y a urgence à agir pour cet édifice qui est le dernier château primitif de Gascogne encore debout, mais pour combien de temps ,   logis rectangulaire flanqué d'une tour carrée et d'une tour circulaire, deux vastes cours, pont-levis, salles voûtées, douves , parc, plan d'eau.","habitants":"Famille de Bertrand Ier  de Preissac                                            Les frères Bogdanoff\r\n        \r\n        \"","divers":"Château d'Esclignac à Montfort.","gps":"","images":["../image/image_32/32_Esclignac_1.jpg","../image/image_32/32_Esclignac_2.jpg","../image/image_32/32_Esclignac_3.jpg","../image/image_32/32_Esclignac_4.jpg","../image/image_32/32_Esclignac_5.jpg"]},"Consult_chateau_formulaire1d21":{"id":"Consult_chateau_formulaire1d21","dept":"32","canton":"Plaisance","commune":"Beaumarchés","nom":"Esparbés","type":"Manoir","periode":"XII","histoire":"BEAUMARCHES, son nom provient d'Eustache de Beaumarchés, grand bâtisseur de bastides dans le Sud-Ouest de la France dans le cadre de sa fonction de sénéchal à Toulouse à partir de 1272. Toutefois, La bastide est créée par pariage entre le sénéchal Eustache de Beaumarchés représentant le roi Philippe Le Hardi dans le Sud-Ouest, et le comte de Pardiac en 1288.                                                                           ESPARBES, la maison d'Esparbès, Esparvez ou Esparvers a eu pour berceau la seigneurie d'Esparbès, située à peu de distance d'Auch dans l'ancien vicomté de Fezensaguet et dans le canton français actuel de Mauvezin. Elle joint son nom à celui de la terre de Lussan qu'elle a longtemps possédée, jusqu'au mariage de Jeanne d'Esparbès de Lussan avec Jacques de Marmiesse en 1617 : ils seront les auteurs de la branche de Marmiesse de Lussan.\r\nElle compte au nombre de ses premiers membres connus Géraud d'Esparbès qui, en 1150, était prieur de Saramon, et Arnaud d'Esparbès qui, le 4 mai 1162, fait une donation aux religieux de Grand Selve. appartenant initialement à la famille \"De Coutens\", Thibaud De Podenas en devint propriétaire en 1434 avant de le vendre à Gaillard De Baure en 1454 La branche de Lussan est substituée aux noms et armes des Bouchard d'Aubeterre. Elle passa en Angoumois au XVIIe siècle. Elle s'est éteinte avec Emmanuel d'Esparbès de Lussan, mort pour la France le 16 août 1870 à Gravelotte. Cette propriété appartient à la famille Manzoni depuis deux générations. Elle a été achetée à la famille Hournac en 1968.     Au sud-Est à quelques kilomètres le château de Labatut à Tieste-Uragnoux transformé en sci par Annette Lafourcade.","architecture":"Beaumarchés, le village a connu ces dernières années un mitage de maisons individuelles quelconques dans sa périphérie qui ressort d'une perte de clairvoyance et de culture historique et urbaine par les acteurs (habitants, élus) de ces méfaits. La bastide est créée par pariage entre le sénéchal Eustache de Beaumarchés représentant le roi Philippe. Le vaste territoire de la bastide englobe alors Mondebat, Scieurac, Flourès, Armous-et-Cau, Monterran. Cependant la ville végète et ne connait pas un fort développement.                                                               Esparbès, ce château remonte au XIIe siècle,  Il prit le nom de château d'Esparbès en 1749 lors du mariage de Rose De Rességuier avec François d'Esparbès de Lussan. Trois siècles plus tard, sa tour quadrangulaire a été remplacée par une tour ronde.    Dépassant ces deux piliers, on se trouve face à une immense grange quaujourdhui abrite des dizaines de vaches. Sur la droite se situe une jolie maison, construite avec des pierres provenant de lancien château. A gauche, en face de cette maison se trouve un petit escalier de 6 marches entourées de deux petits murets. Cet escalier rejoint un espace plat ou se retrouve encore au sol des traces dune « terrasse » et un peu plus loin une bâtisse qui est aujourdhui un poulailler en rectangle. Sur sa droite un puits. Autour de cet ensemble se situe un grand fossé, mais qui sarrête en demi-cercle. A gauche du poulailler, se trouve un jardin bien entretenu suivit dun champ. Un puits sy trouve bizarrement placé au milieu.                                                              Labatut de plan rectangulaire à trois niveaux, le corps de logis central est accolé à deux pavillons de chaque coté du même niveau.","habitants":"Famille d'Esparbès                                                                        Sénéchal Eustache de Beaumarchés                                              Famille de François d'Esparbès de Lussan\r\n        \r\n        \r\n        \"","divers":"Château de Beaumarchés,  d'Esparbés et de Labatut à Tieste-Uragnoux","gps":"","images":["../image/image_32/32_Esparbes_1.jpg","../image/image_32/32_Esparbes_2.jpg","../image/image_32/32_Esparbes_3.jpg","../image/image_32/32_Esparbes_4.jpg","../image/image_32/32_Esparbes_5.jpg"]},"Consult_chateau_formulaire41c9":{"id":"Consult_chateau_formulaire41c9","dept":"32","canton":"Nogaro","commune":"Espas","nom":"Espas","type":"Forteresse","periode":"XIII","histoire":"ESPAS,  construit sur une motte féodale à la fin du XIIIe siècle par le Comte dArmagnac. A la fin du XIIe siècle, une fortification est construite sur une motte. Cité en 1254,  au début du XVIIe siècle, le château est démantelé sur ordre de Richelieu. Une habitation confortable est aménagée  au XVIIe siècle.  En 1979, le château est classé aux Monuments Historiques.     Les propriétaires actuels, monsieur et madame Véron, la restaurent depuis quelques années dans le but de lui conserver son aspect médiéval.","architecture":"Petit château fort en briques fut construit sur une motte féodale à la fin du XIIIe siècle  forteresse militaire.  Il servait à abriter une garnison et à stocker des provisions. Cest une construction rectangulaire constituée dun donjon, de quatre tours carrées et de contreforts. Elle a conservé au cours des siècles un caractère austère, à la fois rustique et guerrier. Le château est un parallélépipède rectangle avec une tour à chaque angle. L'architecture semble ancienne  et ne semble pas avoir évolué au XVe siècle, ni à la renaissance. Sur le pourtour, de petites fentes verticales sont visibles, des archères primitives  bien que ces ouvertures puissent être assimilées à des puits de lumière. Au sommet, sous le toit est une belle fenêtre au XXIe siècle.  Une ouverture en partie basse est évidemment une porte récente, certainement du XXe siècle. Elle a été ouverte pour le confort de ses habitants.","habitants":"Famille Véron\r\n        \r\n        \"","divers":"Château d'Espas","gps":"","images":["../image/image_32/32_Espas_1.jpg","../image/image_32/32_Espas_2.jpg","../image/image_32/32_Espas_3.jpg"]},"Consult_chateau_formulairee315":{"id":"Consult_chateau_formulairee315","dept":"32","canton":"Lectoure","commune":"Miradoux","nom":"Fieux","type":"Forteresse","periode":"XIII","histoire":"FIEUX, l'ancienne bastide, fondée en 1253, est la plus ancienne du département. Au XVIIe siècle un épisode important de la Fronde s'y déroula : en février-mars 1652, une rude bataille opposa les soldats du prince de Condé, frondeur, aux troupes loyalistes commandées par le comte d'Harcourt. Après plusieurs jours de siège, Miradoux est prise par les troupes de Condé. Refusant de renseigner l'occupant, les habitants sont malmenés et enfermés dans l'église. Leurs maisons sont pillées. Toutefois, profitant de ce répit, les troupes du comte d'Harcourt contre-attaquent et délogent les frondeurs qui se replient sur l'Agenais. Cet épisode est rappelé par des boulets de canon conservés dans l'église et par une procession qui a lieu chaque année. Aujourd'hui une  SCI du château de Fieux est une entreprise qui bénéficie d'une très forte ancienneté car elle a été créée en juin 1983. Charlotte et Albert Heyberger en sont les dirigeants principaux.","architecture":"Les premiers documents permettent de situer la fondation du Castelnau de Miradoux en 1253, ce qui en ferait un des plus anciens du Gers. Il fut par la suite transformé en Bastide. Château reconstruit dans le troisième quart du XIXe siècle dans le style troubadour, chapelle reconstruite vers 1865; parc actuellement détruit dessiné par André, paysagiste. Miradoux au XIIIe siècle, comprenait un château fort avec ses remparts et le village était presque complètement ceinturé par des remparts avec des fossés extérieurs, ce château-fort fut démoli vers le XIVe siècle et le seigneur offrit les pierres pour bâtir une église au même emplacement, et le donjon a été transformé en clocher.  De plan en U à trois  niveaux  pour le corps de logis principal avec lucarnes sur les toitures en croupes, accolé de deux tours à trois niveaux crénelées à mâchicoulis, porte d'entrée à arcade sur pavillon légèrement saillant terminant par une lucarne jumelée à fronton circulaire et à galbe décorés, tout  à l'arrière du bâtiment une porte d'entrée flanqué de deux autres tours rondes crénelées sur angles intérieurs, chapelle  en décallé  sur la gauche.","habitants":"Famille Heyberger\r\n        \r\n        \"","divers":"Château de Fieux et la Mairie de Miradoux","gps":"","images":["../image/image_32/32_Fieux_1.jpg","../image/image_32/32_Fieux_2.jpg","../image/image_32/32_Fieux_3.jpg","../image/image_32/32_Fieux_4.jpg","../image/image_32/32_Fieux_5.jpg","../image/image_32/32_Fieux_6.jpg","../image/image_32/32_Fieux_7.jpg","../image/image_32/32_Fieux_8.jpg"]},"Consult_chateau_formulairee1da":{"id":"Consult_chateau_formulairee1da","dept":"32","canton":"Lectoure","commune":"Flamarens","nom":"Flamarens","type":"Forteresse","periode":"XIII","histoire":"FLAMARENS apporté en dot à la nièce du Pape Clément V,  en 1289. Plus tard, apanage des Galard, il passe en 1466 aux Grossoles qui le conservent jusqu'en 1882. Responsables en 1469 de la construction de la moitié de l'édifice  oeuvre d'un \"peyré\" limousin  les Grossolles entreprennent celle de la moitié nord en 1536.  Jean de Grossoles, y entreprend la construction du château en 1466 et fut  le premier occupant  de Flamarens.  Un siècle plus tard, en 1545, Herrard de Grossoles, élu évêque de Condom en 1521, est à lorigine de la construction. En  1609, un autre Jean de Grossoles épouse Françoise dAlbret, cousine dHenri IV. Cette grande famille disparaît en 1878 avec la mort de Jules Alexandre, comte de Flamarens, conseiller général et sénateur du Gers sous Napoléon III. Sans postérité, la maison de Grossoles séteint après avoir fourni une brillante lignée de 15 seigneurs-marquis de Flamarens.  Le château est vendu en 1882 et devient alors la propriété de la famille Galard-Magnas jusquen 1963. Cette famille va lhabiter jusquen 1920-1930, puis labandonner car les toitures sont en trop mauvais état . Ils essaieront de le vendre en 1928, et voudront même le donner à lEtat en 1939.  en partie incendiée en 1943.  Le nouveau propriétaire Pierre Coustaing   dentiste à Paris  fait l'objet en 1962 d'un sauvetage courageux.","architecture":"Le château de Flamarens construit au XIIIe siècle sur une motte féodale est un des spécimens les plus représentatifs de l'architecture gasconne. Sur les deux pièces restantes du château du XIIIe siècle, il surélève les murs sur trois niveaux et rajoute une énorme tour de 12 mètres de diamètre. La Maison de Grossoles, dont les seigneurs de Flamarens sont une branche, est une des plus considérables dans la province de Guyenne, où elle a possédé des dignités très honorables, ecclésiastiques et militaires, et pris des alliances avec les maisons les plus illustres du Royaume. Utilisé comme forteresse lors de la guerre de 100 ans, il lui est ajouté en 1469 un corps de logis et un énorme donjon. Dans les années 1960, le château est alors vendu en pièces détachées (cheminées en marbre, carrelage, parquet, poutres, etc..).  En 1963, M. Coustaing,  va le racheter et faire des travaux de sauvegarde : réfection de la moitié de la toiture de la partie XVe siècle, réfection des trois fenêtres de la grosse tour avec leurs meneaux (1970).\r\nEn juin 1943 un incendie provoqué par la foudre achève de ruiner les toitures. Depuis 1983, l'actuel propriétaire a entrepris de restaurer ce monument situé sur la routes de Saint-Jacques de Compostelle. En 1983, il est acheté (SCI Familiale Famille Gadel) une nouvelle campagne de restauration commence.","habitants":"Famille Galard-Magnas\r\n        \r\n        \"","divers":"Château de Flamarens","gps":"","images":["../image/image_32/32_Flamarens_1.jpg","../image/image_32/32_Flamarens_2.jpg","../image/image_32/32_Flamarens_3.jpg","../image/image_32/32_Flamarens_4.jpg","../image/image_32/32_Flamarens_5.jpg","../image/image_32/32_Flamarens_6.jpg","../image/image_32/32_Flamarens_7.jpg"]},"Consult_chateau_formulaire00c3":{"id":"Consult_chateau_formulaire00c3","dept":"32","canton":"Fleurance","commune":"Fleurance","nom":"Fleurance","type":"Bastide-Château","periode":"XIII","histoire":"FLEURANCE, en 1272, le seigneur local Géraud de Cazaubon, comte de Gaure, ne réussit pas à empêcher le pillage par les comtes d'Armagnac et de Foix de sa capitale Sempuy. Afin d'obtenir la protection royale, il signe avec le sénéchal Eustache de Beaumarchès, représentant du roi, un contrat de paréage qui prévoit l'érection d'une capitale nouvelle pour son comté, avec l'accord de la proche abbaye cistercienne de Bouillas.  Philippe le Bel ayant cédé Fleurance à Édouard Ier d'Angleterre en 1287, celui-ci ordonne, en 1291, une dérivation du Gers et la construction d'un moulin. En 1292, il participe au financement de remparts en briques. Durant la guerre de Cent Ans, Fleurance passe en diverses mains. De 1350 à 1354, elle est placée sous l'autorité du Saint-Siège. En 1425, le roi Charles VII fait don du comté à Charles II d'Albret en récompense de son uvre guerrière. La cité connaît des troubles politiques et, en 1465, les quatre consuls qui administraient la cité sont exécutés.                                                                            Rien sur le château de Madéres et de Bazillac sinon origine des Hautes Pyrénées.","architecture":"Une embellie économique favorise Fleurance à partir du XVIIIe siècle et bouleverse l'architecture urbaine. La ville s'illustre dans les domaines de la tuilerie, de la distillerie, de l'industrie de la plume à écrire (Léglize et Belliard) et de la chaussure (Établissements Cadéot et, au XIXe siècle, maison Auriac spécialisée dans l'espadrille).\r\nLes remparts sont démolis en 1777. En 1865, Fleurance est reliée au réseau ferré. La ville s'équipe de l'éclairage au gaz en 1883 et accueille l'électricité en 1892.   L'hôtel de ville est situé sur la place centrale à arceaux. Il est de style néo-classique et surmonte une belle halle en pierre. Il est l'uvre d'un architecte auscitain : Ardenne. Il fut construit de 1834 à 1837.\r\nCette halle a remplacé celle du Moyen-Âge détruite par un important incendie en 1833. est remplacée par une nouvelle en pierre en 1837, la charpente actuelle est impressionnante. Il faut admirer le soir, le jeu de lumière entre les gros piliers donnant à l'ensemble une aura rose-orangée.Aux quatre angles de la place siègent quatre statues-fontaines de bronze par Albert-Ernest Carrier-Belleuse représentant les quatre saisons (XIXe siècle) : le printemps au nord-est, l'été au sud-est, l'automne au sud-ouest et lhiver au nord-ouest.                                                                                Château de Bazillac corps de logis rectangulaire à deux niveaux flanqués de lucarnes sur toit en croupes et accolé d'une tour carrée à trois niveaux toits à quatre pans.","habitants":"Charles II d'Albret\r\n        \r\n        \"","divers":"Château de Fleurence et de Bazillac","gps":"","images":["../image/image_32/32_Fleurance_1.jpg","../image/image_32/32_Fleurance_2.jpg","../image/image_32/32_Fleurance_3.jpg"]},"Consult_chateau_formulaire7c16":{"id":"Consult_chateau_formulaire7c16","dept":"32","canton":"Eauze","commune":"Fourcés","nom":"Fourcés","type":"Bastide-Château","periode":"XIV","histoire":"FOURCES, possède tous les éléments d'un castelnau : une place et une enceinte ronde, une porte fortifiée, un château,  les bastides n'avaient normalement pas de château , un château Renaissance du XVe siècle, à la fois intime et somptueux, dans le cadre unique de la bastide ronde de Fourcès, joyau de la Gascogne et classé parmi les plus beaux villages de France. Aujourd'hui le château chambres d'hôtes de Maria et Olivier Lesaffre.","architecture":"Fourcés, successeur d'une forteresse primitive qui occupait le centre pittoresque bourg castral de plan concentrique l'actuel château que baigne langui de Auzou, a été construit  à la fin du XVe siècle, sinon au début du XVIe siècle. Ses parties hautes dont subsistent quelques élégantes baies, ont été refaites en 1614 et 1615.   La Bastide de Fourcés  construite  aujourdhui  autour du château  remplacé par une place ombragée de platanes, Fourcès est une originale bastide ronde dont les maisons créent un décor théâtral de colombages et darcades. Cet édifice a conservé sa haute façade extérieure ornée de fenêtres à meneaux.","habitants":"Seigneurde Fourcés\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Fourcès et la tour porte de la ville","gps":"","images":["../image/image_32/32_Fources_1.jpg","../image/image_32/32_Fources_2.jpg","../image/image_32/32_Fources_3.jpg","../image/image_32/32_Fources_4.jpg","../image/image_32/32_Fources_5.jpg","../image/image_32/32_Fources_6.jpg","../image/image_32/32_Fources_7.jpg"]},"Consult_chateau_formulaire116d":{"id":"Consult_chateau_formulaire116d","dept":"32","canton":"Lectoure","commune":"Castet-Arrouy","nom":"Gachepouy","type":"Vestiges","periode":"XV","histoire":"GACHEPOUY,  vestiges du château de Gachepouy, il permettait au Moyen-âge de surveiller la vallée de lAuroue,  au XVe siècle a appartenu au seigneur Bertrand de Galard. Entre 1579 et 1584, le château est presque entièrement reconstruit et aménagé en résidence par Anne d'Aydie, baronne de Pordéac. En 1584, pour Catherine des Fontaines, le maître Fustier (charpentier) Gabriel Charles réalise la toiture du château à la mode de France à façon de pavillon.  La défense du château est \"modernisé\" avec des bouches à feu. Vers 1601, construction d'une tour escalier demandée par sa propriétaire : Catherine des Fontaines.  De nombreux propriétaires se succèdent durant 4 siècles réalisant quelques aménagements de confort. Durant la première guerre mondiale, le château aurait été abandonné. Il semblerait qu'il était encore en bon état.","architecture":"Gachepouy, le château actuel aurait été élevé au XIVe siècle, dans un but défensif mais avec les caractères propres au château gascon : pas ou très peu de défenses extérieures, rez-de chaussée hermétique. Au XVIe siècle, le château est renforcé de bouches à feu. Au cours des siècles suivants les propriétaires successifs procèdent à des aménagements de confort. Le château est encore habité et meublé au début du XXe siècle. Abandonné durant la première guerre mondiale, il tombe peu à peu en ruine et ses pierres servent à empierrer les chemins voisin. La forme de la demeure est un parallélépipède de deux étages, flanqué aux angles nord-ouest et sud-ouest de deux tour carrées. Adjonction d'une tour d'escalier en 1601 (actuellement détruite) pour Catherine des Fontaines par Raymond Salles, maître maçon de Lavit de Lomagne. Encore en assez bon état, durant la première guerre mondiale. Il n'y a pas de rempart entourant le château, pourtant une \"motte\" circulaire l'entoure. Peut être que les pierres ont été utilisées pour construire les maisons alentours.","habitants":"Seigneur Bertrand de Galard\r\n        \r\n        \"","divers":"Vestiges du château de Gachepouy","gps":"","images":["../image/image_32/32_Gachepouy_1.jpg","../image/image_32/32_Gachepouy_2.jpg","../image/image_32/32_Gachepouy_3.jpg","../image/image_32/32_Gachepouy_4.jpg"]},"Consult_chateau_formulaire72bd":{"id":"Consult_chateau_formulaire72bd","dept":"32","canton":"Fleurance","commune":"Gaudonville","nom":"Gaudonville","type":"Tour","periode":"XII","histoire":"Le village de Gaudonville , comme c'est souvent le cas en Lomagne, était entouré d'un mur d'enceinte et de fossés.","architecture":"Tour de l'horloge du XVIIe siècle, reliquat de l'enceinte de fortification. C'était une porte fortifiée qui abritait un pont-levis.","habitants":"Seigneur local\r\n        \r\n        \"","divers":"La tour porte de Gaudonville","gps":"","images":["../image/image_32/32_Gaudonville_1.jpg"]},"Consult_chateau_formulairebed6":{"id":"Consult_chateau_formulairebed6","dept":"32","canton":"Lectoure","commune":"Gazaupouy","nom":"Gazaupouy","type":"Château","periode":"XIV-XVI","histoire":"A Gazaupouy  les fortifications d'Estrepouy et son donjon  et le château donjon de Dehés (voir article).                                  ESTREPOUY, pas d'information historique. En 1982, la tour est classée aux Monuments Historiques.                                            \r\n GAZAUPOUY. seigneur d'Aubiac en Brulhois, et d'autres vassaux du voisinage avaient adressé à Jean de Rochechouart, vicomte de Brulhois, des plaintes touchant l'administration de la justice et demandé des réformes qui leur furent accordées en 1475. Jean de Galard, seigneur de Buscon, et sa femme Catherine d'Estrepouy, dame du même lieu.  Noble Marc-Antoine de Reux, écuyer, fils du précédent, céda, le 3 mai 1704, une partie de ses biens à noble Joseph de Saint-Germé, seigneur d'Arconques et d'Estrépouy, à raison de sa qualité d'héritier de dame Jeanne de Bazignan, dont il était débiteur.","architecture":"Durant la période « anglaise » se sont érigées les tours dEstrepouy et du Déhès. Toutes deux sont de formes carrées, hautes dune vingtaine de mètres pratiquement sans ouverture dans la partie inférieure. Cest au XVIe siècle devant une population croissante que le village sagrandit avec la naissance dun bourg neuf. Le castelnau primitif, de forme ovoïde que lon peut comparer à celui de Larressingle, conserve toujours ses remparts, une porte en arc brisé prolongée par un couloir voûté.                                  Estrepouy, tour carrée du XIVe siècle. Elle mesure pourtant 10 mètres x 14 mètres, est un donjon à trois étages  habitable. Toutes les faces possèdent de grandes ouvertures normalement incompatibles avec une défense efficace au Moyen Age. A la fin du XIIIe siècle, une fortification semble existé en ce lieu.  En dessous, une fenêtre à meneau en croix a certainement été construite au XVIe siècle. Un peu plus bas, la fenêtre gothique en arc brisé  semble datée du XIVe siècle.  En haut à gauche, la petite tour en encorbellement . Ce n'est évidemment pas une échauguette.   Une autre façade  moyen de défense, a mi-hauteur, une archère en croix du XIVe siècle. L'ouverture en arc brisé pourrait être l'entrée médiévale accessible uniquement par une échelle ou un chemin de ronde en bois entourant la basse-cour.","habitants":"seigneur d'Aubiac en Brulhois                                                Noble Jean de Preyssac\r\n        \r\n        \"","divers":"Porche et château de Gazaupouy et d'Estrepouy","gps":"","images":["../image/image_32/32_Gazaupouy_1.jpg","../image/image_32/32_Gazaupouy_2.jpg","../image/image_32/32_Gazaupouy_3.jpg","../image/image_32/32_Gazaupouy_4.jpg","../image/image_32/32_Gazaupouy_5.jpg","../image/image_32/32_Gazaupouy_6.jpg","../image/image_32/32_Gazaupouy_7.jpg","../image/image_32/32_Gazaupouy_8.jpg","../image/image_32/32_Gazaupouy_9.jpg"]},"Consult_chateau_formulairedca0":{"id":"Consult_chateau_formulairedca0","dept":"32","canton":"Lectoure","commune":"Gazaupouy","nom":"Gazaupouy_Dehés","type":"Château","periode":"XVI-XIX","histoire":"DEHES, en 1396: Noble Jean de Preyssac, écuyer seigneur du Dehès François de Soubiran, écuyer, seigneur de Courtade, du Grézau et du Défies ou Dehès, concourut avec son père a l'acte du 13 mars 1547.  Le 7 février 1551, noble Léonard Christophe du Grez, assisté de noble Pierre du Grez, son grand-père, épouse devant Me Deussort, notaire à Nérac, dame Iphigénie Marcon de Ponsset, fille légitime de noble homme Bernard Marcon de Ponsset  en 1557:   Les seigneurs de Larroquaing  conseigneur de Larroque de Fieuxmarcon en 1562: Noble François de Soubiran, seigneur de Couriade, du Grézau et du Dehès près de Ligarde Jean-Marie de Soubiran dénombra toutes les terres nobles. Aujourd'hui, monsieur George Bassié et propriétaire de ce château et il propose un gîte touristique.","architecture":"Sur le territoire de Gazaupouy s'élève la tour-château de Dehès; C'est une masse carré d'une quinzaine de mètres de côté, transformée, au XIX siècle, en maison de plaisance. Elle est percée sur les deux premiers étages d'une série de fenêtres modernes. Le sommet est orné d'un cordon de mâchicoulis postiches et couronné de trois étages de hourdis percée de petites ouvertures. Couverte d'un toit de tuiles modernes, elle domine le village, mais n'est remarquable par aucun détail particulier d'architecture.","habitants":"Famille de Bernard Marcon de Ponsset\r\n        \r\n        \r\n        \r\n        \"","divers":"Château  de Dehés à Gazaupouy","gps":"","images":["../image/image_32/32_Gazaupouy_Dehes_1.jpg","../image/image_32/32_Gazaupouy_Dehes_2.jpg","../image/image_32/32_Gazaupouy_Dehes_3.jpg","../image/image_32/32_Gazaupouy_Dehes_4.jpg"]},"Consult_chateau_formulairef553":{"id":"Consult_chateau_formulairef553","dept":"32","canton":"Gimont","commune":"Gimont","nom":"Gimont","type":"Château","periode":"XVI-XVIII","histoire":"Quatre châteaux à Gimont celui de Larroque, de Fontenilles et de Xaintrailles, peu ou pas d'information historique pour ces châteaux.                                                                     FONTENILLES, domaine lié à la famille Decis, dont un membre fut avocat au Parlement de Toulouse au XVIIe siècle. Les transformations principales ont lieu au XVIIIe siècle.                                                     LARROQUE  est situé à 1,5 km de Gimont, sur la route de Toulouse. L'édifice, de style du XVIIIe siècle, a été construit en 1804. Il est implanté dans un splendide domaine d'où l'on peut apercevoir, par beau temps, la chaine des Pyrénées.   Aujourd'hui hôtel restaurant gastronomique par   la famille Fagedet       CAHUZAC, château du XVIe siècle, appartenant depuis 1606 à la famille Saint-Julien. Il est inscrit au titre des monuments historiques, depuis le 19 décembre 1973.  La société \"château  de Cahuzac\" est dirigée par Diane Pérouse.                               XAINTRAILLES agence immobilières.","architecture":"Fontenilles du XVIIIe siècle, est situé au centre d' une composition comprenant : communs, pigeonnier, allée de chênes, de plan en U corps de logis central relié à deux bâtiment en retour d'équerre en façade, l'ensemble toit en croupes.                                    \r\n Larroque du  XIXe siècle, parc, hôtel et  restaurant, de plan en U avec en façade  du corps de logis pavillon saillant central avec fronton avec lucarne imposante, ce corps de logis à deux niveaux toits à la mansart avec lucarnes prolongés de chaque côté par des bâtiments à deux niveaux de trois travées toit à deux pans flanqué sur les angles en façade de deux pavillons carrés,  pavillon central  avec en retour d'équerre  de chaque côté d'un bâtiment d'un niveau sur la terrasse du jardin, Le corps de logis central  côté jardin flanqué d'un pavillon saillant à trois côtés.     Cahuzac villa construite au XVIe siècle, a été très remanié au XVIIIe siècle, de plan rectangulaire à deux niveaux toits en croupes.                                                                                        Xaintrailles du XVIIIe siècle privé, visible de l'extérieur.","habitants":"Famille Decis\r\n        \r\n        \"","divers":"Château de Fontenilles de Larroque de Cahuzac et de Xantrailles à Gimont","gps":"","images":["../image/image_32/32_Gimont_1.jpg","../image/image_32/32_Gimont_2.jpg","../image/image_32/32_Gimont_3.jpg","../image/image_32/32_Gimont_4.jpg","../image/image_32/32_Gimont_5.jpg","../image/image_32/32_Gimont_6.jpg","../image/image_32/32_Gimont_7.jpg","../image/image_32/32_Gimont_8.jpg"]},"Consult_chateau_formulaire181f":{"id":"Consult_chateau_formulaire181f","dept":"32","canton":"Armagnac-Ténaréze","commune":"Gondrin","nom":"Gondrin","type":"Château","periode":"XV-XVII","histoire":"GONDRIN, c'est sous l'administration de Noble Paule de Saint-Lary de Bellegarde, seconde femme de Noble Antoine-Arnaud de Pardaillan, marquis d'Antin et de Montespan, seigneur de Gondrin, qu'elle épousa le 27 juin 1602, que le village a atteint son apogée. Fort intelligente et douée d'un goût artistique très prononcé, dès 1609, dame Paule embellit et fait reconstruire le château des Pardaillan qui tombe en ruines. En 1612, Paule de Bellegarde fait appeler Audibert Cousteau pour faire son jardin qui devient par la suite un lieu de promenade. Monsieur Mabhille fut chargé daplanir ce terrain. Le jardinier fit trois allées bordées lune dépine blanche, lautre de cyprès et la troisième daubépines. Il traça deux allées à louest et planta des pins un peu partout. L'acte de fondation du couvent des religieuses, a été reçu en date du 13 novembre 1629, par Maître Poentis, notaire à Gondrin .  Vestiges du couvent des Ursulines fondé en 1629 par Paule de Bellegarde.                                                                       Chateau de LAROUSSA, pas d'information historique.                                                                   LASALLE de Bernard Lannes, frère aîné du maréchal Lannes\" de Gérard Dessolle et Nicole Meuzy-Dessolle.","architecture":"Gondrin à cette époque, le bourg principal n'est composé que du château féodal avec ses vastes dépendances, sa chapelle (une partie de l'église actuelle) et de nombreuses maisons bourgeoises, le tout entouré d'un mur d'enceinte percé de deux portes au Nord et au Midi et de deux \"portalets\" à l'Est et à l'Ouest.  Impressionnant par ses dimensions, ses deux étages et combles,  ses deux tours, son architecture austère et sa façade aux nombreuses fenêtres sobrement                                                                        Laroussa,  de plan rectangulaire à deux niveaux toit en croupe accolé de tour, toit en dômes.                                                          Lasalle de plan rectangulaire à trois niveaux sur soubassement accolé de deux tours carrées dont celle la plus éloigné crénelée à mâchicoulis font  plus donjon que tour .","habitants":"Paule de Bellegarde \r\n        \r\n        \"","divers":"Vestiges du couvent château de Larroussa et de Lasalle à Gondrin","gps":"","images":["../image/image_32/32_Gondrin_1.jpg","../image/image_32/32_Gondrin_2.jpg","../image/image_32/32_Gondrin_3.jpg","../image/image_32/32_Gondrin_4.jpg","../image/image_32/32_Gondrin_5.jpg","../image/image_32/32_Gondrin_6.jpg","../image/image_32/32_Gondrin_7.jpg","../image/image_32/32_Gondrin_8.jpg"]},"Consult_chateau_formulaire45f6":{"id":"Consult_chateau_formulaire45f6","dept":"32","canton":"Montesquiou","commune":"Montesquiou","nom":"Haget","type":"Château","periode":"XIX","histoire":"HAGET,   Le beau château Le Haget au lieu dit les Oules.   Pas d'information historique, aujourd'hui restaurant.","architecture":"Haget  château du Haget construit au XIXe siècle surprend par son architecture, corps de logis rectangulaire à deux niveaux d'un toit en croupe flanqué de  lucarnes protégé d'un toit deux pans de tours rondes et de tourelles en encorbellement sur angles de la façade principale, les toits de ses dernières sont en poivrières. Une atmosphère d'authenticité et de retour dans le temps se dégage de l'établissement. Dans l'ancienne remise à calèches et les écuries se trouvent le bar, le restaurant et la salle de réunion. Les salons du château permettent d'accueillir tout le long de l'année, événements familiaux ou professionnels.","habitants":"Marc Passera,\r\n        \r\n        \"","divers":"Château d'Haguet à Montesquiou","gps":"","images":["../image/image_32/32_Haget_1.jpg","../image/image_32/32_Haget_2.jpg","../image/image_32/32_Haget_3.jpg","../image/image_32/32_Haget_4.jpg","../image/image_32/32_Haget_5.jpg"]},"Consult_chateau_formulaire58fd":{"id":"Consult_chateau_formulaire58fd","dept":"32","canton":"Fezensac","commune":"St-Jean-de-Poutge","nom":"Herrebouc","type":"Forteresse","periode":"XIII-XIV","histoire":"HERREBOUC, maison forte datant du XIVe siècle ; il est fait mention de son existence dans un texte daté de 1344 signalant que Pélegrine de Ferrabouc, veuve de Géraud de Mimo, héritière de Guillaume de Commère, fit hommage à Jean, comte dArmagnac et de Rodez, pour son château de Ferrabouc supérieur, sis en Fezensac.  Les Ferrabouc tout dabord , Herrebouc suivant les chartres du Moyen-Age, importante famille du Fezensac, qui loccupent jusquau XVe siècle.  Les Castelbajac leur succèdent au XVe et XVIe siècles, très ancienne famille dont la baronnie est située en Bigorre et qui se subdivise en de nombreuses branches.  Les Verduzan sy établissent ensuite, jusquà 1870. Famille de  Cours, cest encore dans les mains dune très ancienne famille. Herrebouc, acquis en 1780 par Antoine-Hector de Cours. La terre et les biens, au moment de la Révolution, ne sont pas vendus en biens nationaux et Antoine-Hector ne fut pas contraint à émigrer en terre étrangère. Subdivisée en plusieurs branches  cest de la branche dite des barons du Vignau et de Lussagnet que sortait le nouveau propriétaire du château de Herrebouc, Philippe Lauzun. Au XXIe siècle, il est le centre d'un domaine viticole. rachetés en 1999  par la famille Fitte.","architecture":"Le château de Herrebouc du XIIIe siècle, il est fortement remanié aux XVIIe et XVIIIe siècle. Il est inscrit au monument historique en 1926, ses communs et son moulin en 2002. , ce corps de logis, de 16 mètres de hauteur, comprend un rez-de-chaussée et trois étages de même hauteur.  À la base, il mesure 13,30 mètres X 12,20 mètres avec des murs dune épaisseur de 1,60 m. La construction confirme bien sa datation de la  fin  du XIIIe ou début du XIVe siècle :  Ses murs, admirablement parementés en appareil  moyen si fort en usage de 1250 à 1350, leur épaisseur régulière, 1m.60, qui est celle de tous les châteaux de cette époque, la forme de ses échauguettes et surtout celle de leurs mâchicoulis ne peuvent laisser aucun doute à cet égard.  Au XVIe siècle, de nombreuses ouvertures furent percées sur toutes les façades, pour en faire des pièces dhabitation plus confortable. Il est dailleurs vraisemblable que, comme dautres tours de cette époque, le rez-de-chaussée était totalement aveugle, lentrée de la tour se faisant au moyen dune échelle par le premier étage.","habitants":"Famille du Fezensac\r\n        \r\n        \"","divers":"Forteresse d'Herrebouc","gps":"","images":["../image/image_32/32_Herrebouc_1.jpg","../image/image_32/32_Herrebouc_2.jpg","../image/image_32/32_Herrebouc_3.jpg","../image/image_32/32_Herrebouc_4.jpg","../image/image_32/32_Herrebouc_5.jpg","../image/image_32/32_Herrebouc_6.jpg"]},"Consult_chateau_formulaire3329":{"id":"Consult_chateau_formulaire3329","dept":"32","canton":"Gimont","commune":"Homps","nom":"Homps","type":"Tour-Châteaux","periode":"XII","histoire":"HOMPS, le donjon est le dernier vestige du château des seigneurs d'Homps qui était une branche de la puissante famille de Manas. Aujourd'hui à Paris, Sylvia et Philippe de Saint-Wandrille, les propriétaires, recevront un prix récompensant aussi leur amour du patrimoine.    La société nationale d'horticulture de France a adoré le potager du château de Homps.         PUISSENTUT, cette magnifique demeure du XIIe siècle a été restaurée par Angela et DK, les hôtes de secrets dhiver. Chambres d'hôtes.","architecture":"Homps, château constitué de la tour, de la tour et du rempart: inscription par arrêté du 19 mai 1999,   ce donjon est le dernier vestige du château. Lieu fortifié implanté à la fin du XIIIe siècle à la pointe d'un éperon, abandonné pour une demeure plus agréable bâtie au XVIe siècle. Vendu comme bien national à la Révolution, le château a servi de carrière. Seule la tour transformée en pigeonnier a été épargnée.  L'accès à la tour se mérite puisquil se fait par une échelle menant à la porte située à 4,5m de hauteur. La découverte de lintérieur constitue la récompense, La reconstitution des salles dhabitation étonne par la qualité, la minutie des réalisations, que ce soit les torchis, les menuiseries, la serrurerie et le travail de la pierre et des maçonneries.                                                                                          le château de Puissentut est un château médiéval rénové avec goût et caractère  de plan en U,  trois corps de logis à deux niveaux  toits en tuiles en croupes.","habitants":"Famille de Saint-Wandrille\r\n        \r\n        \"","divers":"Vestiges du château de Homps et château de Puissentut","gps":"","images":["../image/image_32/32_Homps_1.jpg","../image/image_32/
