te Camille Ordener. En 1920, le château sera reconstruit pour Antoine de Fontbrune. Une tour octogonale, partiellement démolie, fut conservée. Sur un balcon au 1er étage, furent placées les lettres O, qui avaient pris leur place sous la Famille Ordener. Le château La Quincy est aujourd'hui devenu un gite rural très apprécié des Anglo-Saxons.   Le château a appartenu à des hobereaux locaux dont on ne connaît les noms qu'à partir de 1670, ce qui ne donne pas celui des constructeurs puisqu'on peut dater l'édifice du début du XVIe siècle.                                                  VIRLY à Jouaignes villages voisin à 1K.M au sud-ouest appelé aussi le Domaine de Jouaignes est un château bâti à Jouaignes, du XVIIe démoli et reconstruit au XIXe . Le château de Virly appelé aussi le domaine de Jouaignes est l'ancienne résidence de la famille de Châtillon, puis de la Famille de Wolbock, originaire du duché de Gueldre. La reconstruction du château de Virly date du XIXe siècle avec un beau parc et de nombreux arbres ainsi qu'un pigeonnier original, et une pergola. C'est un château privé, fermé au Public. Il est inscrit partiellement aux M.H. depuis le 21/12/1982. Il existe un autre château privé sur la commune à découvrir.","architecture":"QUINCY a été construit en 1626 sur l'emplacement d'une ancienne ferme. Deux tourelles octogonales sont construites entre 1841 et 1850. Au XIXe siècle, Louise Bourru, héritière du Domaine et petite-fille du docteur Edme-Claude Bourru, va épousé le Comte Camille Ordener. En 1920, le château sera reconstruit pour Antoine de Fontbrune. Une tour octogonale, partiellement démolie, fut conservée.   Actuellement aménagé en ferme, il comprenait à l'origine un corps de logis flanqué de deux ailes perpendiculaires qui encadraient une cour d'honneur. Le corps de bâtiment principal est divisé par un passage voûté d'ogives reliant la cour d'honneur avec le jardin. On remarque que les claveaux des voûtes de ce vestibule portent sous des badigeons, des traces de peinture ocre qui remontent à la construction. Une tour octogonale est accolée à la façade donnant sur le jardin. Recouverte d'un dôme sous lanternon à pans coupés, elle est décorée de coquilles faisant dais à d'hypothétiques statues absentes. Dans sa partie supérieure, à gauche, elle est flanquée d'une tourelle annexe, cylindrique, desservant les combles du logis principal. L'aile droite de la cour d'honneur, légèrement postérieure au logement, est décorée de six médaillons aveugles et aujourd'hui bouchés. Enfin le colombier, qui a cette particularité de ne pas être circulaire, mais à arêtes en spirales.  Éléments protégés MH : les parties du XVIe siècle comprenant les salles et le passage voûtés ainsi que la tour avec tourelle : inscription par arrêté du 3 juin 1927.","habitants":"Famille d'Antoine de Fontbrune et Famille Ordener.\"","divers":"Quincy grav -1-2                                                    GPS : 49°25'8.26\" Nord, 3°26'16.52\" Est.                                       Jouaignes grav-3-4-5  Virly  49° 18' 03? N, 3° 32' 16? E","gps":"49°25'8.26\" Nord, 3°26'16.52\" Est.","images":["../../jctruffet.com/image/image_02/02_Quincy_le_Mont_1.jpg","../../jctruffet.com/image/image_02/02_Quincy_le_Mont_2.jpg","../../jctruffet.com/image/image_02/02_Quincy_le_Mont_3.jpg","../../jctruffet.com/image/image_02/02_Quincy_le_Mont_4.jpg","../../jctruffet.com/image/image_02/02_Quincy_le_Mont_5.jpg"]},"Consult_chateau_formulaireb355":{"id":"Consult_chateau_formulaireb355","dept":"02","canton":"Saint-Quentin","commune":"Remaucourt","nom":"Remaucourt","type":"Château","periode":"XIX","histoire":"REMAUCOURT, le château de la Louve Blanche appellé aussi le château de Rémaucourt ou château de la Dame Blanche le chateau fut vendu par adjudication le 16/12/1861 à la famille Desjardins. Il se situe à 2 km de Saint Quentin.","architecture":"REMAUCOURT, en octobre 1918, le château de la Louve Blanche était toujours debout, mais ses couvertures avaient pratiquement disparu, ses façades étaient criblées d'éclats et les appartements étaient complètement dévastés, privés de leurs fenêtres, des lambris, des parquets,des tentures, de ses marbres et de ses dallages. En 1920, la restauration du château de la Louve Blanche a été faite à l'identique, mais le ravalement des façades a conduit au remplacement complet de l'épiderme, accentuant la sévérité de la composition. Reconstruit au XIXe siècle, le château de la dame Blanche vous propose la location de ses salles.","habitants":"Famille Desjardins\"","divers":"Cxhateau de Remaucourt              gps        49° 53' 49? nord, 3° 20' 32? est","gps":"","images":["../../jctruffet.com/image/image_02/02_Remaucourt_1.jpg","../../jctruffet.com/image/image_02/02_Remaucourt_2.jpg","../../jctruffet.com/image/image_02/02_Remaucourt_3.jpg"]},"Consult_chateau_formulairec22d":{"id":"Consult_chateau_formulairec22d","dept":"02","canton":"Saint-Quentin","commune":"St_Quentin","nom":"Senercy","type":"Château","periode":"XIX","histoire":"Deux châteaux dans cet article, Senercy et la Pilule.                                   SENERCY,  à 15 K.M.au sud -Est à Séry lès Mézières . Il avait été racheté par Mr Bastien Millot, plongé au coeur du scandale de l'affaire Pygmalion. Cette belle maison d'hôtes a été ouverte depuis juin 2014, pour faire revivre cette maison familiale chargée d'histoire et de caractère, datant du XIXe siècle. Le manoir de Senercy est classé 4 Epis. Domaine de Senercy, chez Elisabeth Roy Hameau de Senercy .","architecture":"La PILULE, une pétition a été signée pour empêcher la démolition du château de la Pilule, qui est vraiment original, de style Art Déco. Qu'en est-il depuis. Le château de la Pilule sera conservé et servira de résidence pour seniors.  Lédifice Art déco sera partie intégrante dans le projet du promoteur immobilier Aegide-Domitys où 128 appartements privés seront construits et disponibles pour début 2017. A lire également «Xavier Bertrand sen fichait pas mal» La pilule est avalée, le château éponyme conservé.  Le cessez-le-feu a été signé lan passé à la faveur dun classement du château de la rue de la République auprès des bâtiments historiques. Une inscription loin dêtre anecdotique au regard des personnes qui y ont pris part. Il a fallu lintervention de la ministre de la culture de lépoque, Aurélie Filippetti, pour stopper les hostilités. Le promoteur sy est rangé. La propriétaire de cette demeure, construite en 1930 par une famille de richissimes filateurs, navait plus les moyens dentretenir sa maison.","habitants":"Senercy Mr Bastien Millot\"","divers":"Château de Senercy        Senercy GPS : 49° 46' 30\" Nord, 3° 25' 14\" Est","gps":"49° 46' 30\" Nord, 3° 25' 14\" Est","images":["../../jctruffet.com/image/image_02/02_Senercy_1.jpg","../../jctruffet.com/image/image_02/02_Senercy_2.jpg"]},"Consult_chateau_formulaire06b9-2":{"id":"Consult_chateau_formulaire06b9-2","dept":"02","canton":"Soissons","commune":"Septmonts","nom":"Septmonts","type":"Château","periode":"XIII-XIV-XVI","histoire":"Deux châteaux dans cet article , Septmonts, et Villeblain. SEPTMONTS, fut la résidence des évêques de Soissons depuis le XIIe siècle. La partie datant du XIIIe sièle fut construite sous les ordres de Jacques de Bazoches et la salle dite \"Saint Louis\", qui abritait la chapelle daterait de cette époque. Le château fut reconstruit au XIVe siècle par Simon de Bucy, évêque de 1362 à 1404. Le donjon et la tour carrée remonteraient à la même époque. Le château renaissance ou le logis des évêques ou le pavillon Renaissance a été construit par l'évêque Symphorien de Bullioud qui y mourut en 1533. Les évêques cessèrent d'y résider à la fin du XVIIe siècle; le château était en ruines quand le peintre Jacques Edmond Leman le racheta en 1864. qui restaure une partie du dernier étage et le surmonte d'un belvédère carré. Il le restaura puis à partir de 1877, c'est Antoinette Leininger, baronne d'Ezpeleta, qui termina les travaux. Bombardé en 1918, le logis fut laissé sans couverture, et abandonné jusqu'à la création en 1971 de l'association des amis de Septmonts qui prit en charge la sauvegarde et la mise en valeur du site. Un dessin de Jean Pierre Léopold Baraquin, visible au musée de Soissons, représente le donjon qui fut admiré par les Romantiques et célébré par Victor Hugo.Totalement abandonnée après la première guerre Mondiale, et désormais la propriété de la commune qui en assure la restauration.                                                       VILLEBLAIN  à Chacrise La construction du château de Villeblain date du XVe au XVIe siècle. La tour carrée du XVIe siècle est un monument historique. Le château n'est plus en bon état, à l'intérieur, mais son toit a été renouvelé, en mai 2012. De l'autre côté de la rue, il y a l'ancienne orangerie. La Tour à machicoulis de l'ancien château de Villeblain est inscrite aux M.H. en 1928.","architecture":"SEPTMONTS, la construction du château date du XIIIe et XVIe siècle.  Il était entouré de douves et d'une enceinte. Il en reste des vestiges dont la tourelle entière et la tourelle tronquée à moitié de sa hauteur. Le donjon haut de 43 mètres a été construit au XIVe siècle par l'évêque Simon de Bucy. Constitué de 7 étages, il est d'une architecture complexe. La tour carrée, constituée de trois étages, est semi-ronde à l'intérieur. Cette tour de défense comporte un escalier à vis, logé dans un des redans qui permettent de servir les archères. Elle daterait de la même époque. Elle fut achetée en 1864 par un propriétaire qui restaura une partie du dernier étage qu'il surmonta d'un belvédère carré. C'est la propriété de la commune. La chapelle Saint-Louis fut construite au XIVe siècle ou XVe siècle. Le logis Renaissance appelé le Palais des Evêques a été construit au début du XVIe siècle et fut longtemps laissé à l'abandon. Il présente un avant-corps à fronton et niche et un escalier en fer à cheval rajoutés vers 1600. Sa cave voûtée, située dans le parc au Nord du château, est en dehors de l'enceinte.\nÉléments protégés MH : la chapelle Saint-Louis et le donjon : classement par arrêté du 18 mars 1920. La tour carrée, la cour , les caves voûtées situées à l'extérieur de l'enceinte, les vestiges de l'enceinte, les douves : classement par arrêté du 24 janvier 2006.","habitants":"des évêques de Soissons  et  le peintre Jacques Edmond Leman\"","divers":"Deux châteaux dans cet article , Septmonts, et Villeblain. GPS : 49° 20' 06,36\" Nord, 3° 21' 30,24\" Est                                                                   Villeblain GPS : 49° 18' 10\" Nord, 3° 22' 53\" Est","gps":"49° 20' 06,36\" Nord, 3° 21' 30,24\" Est","images":["../../jctruffet.com/image/image_02/02_Septmonts_1.jpg","../../jctruffet.com/image/image_02/02_Septmonts_2.jpg","../../jctruffet.com/image/image_02/02_Septmonts_3.jpg","../../jctruffet.com/image/image_02/02_Septmonts_4.jpg","../../jctruffet.com/image/image_02/02_Septmonts_5.jpg","../../jctruffet.com/image/image_02/02_Septmonts_6.jpg","../../jctruffet.com/image/image_02/02_Septmonts_7.jpg"]},"Consult_chateau_formulaire4043":{"id":"Consult_chateau_formulaire4043","dept":"02","canton":"Bohain-en-Vermandois","commune":"Sequehart","nom":"Sequehart","type":"Château","periode":"XIII","histoire":"SEQUEHART,  est un château bâti à Sequehart, date du XIIe siècle. Il est construit sur la butte des Jacobins, d'origine gauloise. En 1477, il subit l'assaut des mauvais garnements de Louis XI. Son allée d'arbres majestueux fait sa légende et sa beauté. Le château servait de demeure au seigneur de Priel.","architecture":"SEQUEHART, le château de Sequehart est mis en vente par licitation le 1er août 1832, avec ses bâtiments, ses cours, son jardin et ses dépendances. Le château de Sequehart se situe entre le chemin qui mène au château et le vieux bois. L'ensemble se situe sur 1,34 hectare. Avec le temps, il s'est transformé en une ferme agricole où en 1900, d'importants rendez-vous de chasse étaient organisés et où les dames accompagnaient, leurs maris, dans de toilettes très élégantes.","habitants":"seigneur local\"","divers":"Château de Sequehart                               GPS : 49° 55' 48\" Nord, 3° 20' 01\" Est","gps":"49° 55' 48\" Nord, 3° 20' 01\" Est","images":["../../jctruffet.com/image/image_02/02_Sequehart_1.jpg","../../jctruffet.com/image/image_02/02_Sequehart_2.jpg","../../jctruffet.com/image/image_02/02_Sequehart_3.jpg"]},"Consult_chateau_formulairef728":{"id":"Consult_chateau_formulairef728","dept":"02","canton":"Soissons","commune":"Soissons","nom":"Soissons","type":"Palais","periode":"XVIII","histoire":"Deux châteaux dans cet article Soissons et Vaux -Fourchaix à Bucy. SOISSONS, le château de Soissons a été reconstruit au XVIIIe siècle, après la démolition du château du XIVe siècle, pour lIntendant de la généralité de Soissons, Louis le Peletier, marquis de Montmélian. Les travaux durèrent trois ans et Le Peletier profita de sa réalisation jusqu'en 1785. Il n'eut qu'un seul successeur, la Révolution approchait, c'était M. de la Bourdonnaye, comte de Blossac. Celui-ci déserta la demeure en 1789. Par son plan en U et son parti architectural, l'ancien hôtel de l'Intendance élevé entre 1774 et 1776 par l'architecte Jean-François Advyné, est une réalisation stylistiquement archaïsante par rapport à d'autres hôtels d'intendance de la même époque.                                                                           En 1825, la ville de Soisson devenait locataire de toute la demeure. Le Palais de lIntendance entre cour et jardin, de style néo-classique, abrite les services municipaux aujourd'hui.  Éléments protégés MH : l'hôtel de ville, les façades et les toitures, la salle à manger avec ses vases en plomb et ouvrages de marbre, le grand salon avec ses dessus de porte, le grand escalier du vestibule, le poêle de l'antichambre, tous les volets intérieurs, l'ensemble des caves voûtées, les cours et la parcelle aménagée en jardin à l'arrière, comprenant les murs de clôture de l'ensemble : inscription par arrêté du 26 janvier 2007.","architecture":"SOISSONS, le Palais de l'Intendance est devenu l'hôtel-de-Ville de Soissons.  Il  a hérité des bâtiments édifiés par l'Intendant Le Pelletier de Mortefontaine, entre 1772 et 1775. Représentant du roi dans la province, l'intendant fait élever à l'emplacement de l'ancien château fort des comtes de Soissons, une demeure digne de ce nom. Le palais de l'Intendance est un magnifique hotel, entre cour et jardin, de style néo-classique, abrite depuis 1833, les services municipaux de la mairie.                                                                                                            ACI Villeneuve, élevé à l'emplacement d'une ancienne abbaye de Célestins, le château a été reconstruit après la première guerre mondiale. Edifié en brique et en pierre par l'architecte D'Hont pour la famille de La Rochefoucauld, l'édifice reprend le parti des châteaux classiques. A l'intérieur, la salle à manger et la chapelle conservent un décor de style années 1925-1930. Quelques communs subsistent, en partie du XIXe siècle, ainsi que le mur d'une ancienne orangerie. L'édifice se situe dans un domaine boisé clos.                                                                                             L'ancien pavillon des Arquebusiers a été classé aux M.H. en 1901.                                                                        Le château Le VAUX FOURCHAIS est un château bâti à Bucy-le-Long,                                  La construction du chateau de Vaux Fourchais date du XVIIIe siècle. Il comporte un fronton triangulaire et un parc.","habitants":"Famille de  M. de la Bourdonnaye                        famille de La Rochefoucauld\"","divers":"Deux châteaux dans cet article Soissons  grav 1-2-3                               et Vaux -Fourchaix grav 4 à Bucy. GPS : 49° 22' 54\" Nord, 3° 19' 25\" Est                                                         pavillon  grav-5                                            : 49° 22' 45\" Nord, 3° 19' 51\" Est                                                           Le Château Le Vaux-Fourché GPS : 49° 23' 29\" Nord, 3° 23' 41\" Estais","gps":"49° 22' 54\" Nord, 3° 19' 25\" Est","images":["../../jctruffet.com/image/image_02/02_Soissons_1.jpg","../../jctruffet.com/image/image_02/02_Soissons_2.jpg","../../jctruffet.com/image/image_02/02_Soissons_3.jpg","../../jctruffet.com/image/image_02/02_Soissons_4.jpg","../../jctruffet.com/image/image_02/02_Soissons_5.jpg"]},"Consult_chateau_formulaire97d9":{"id":"Consult_chateau_formulaire97d9","dept":"02","canton":"Fère-en-Tardenois","commune":"Soupir","nom":"Soupir","type":"château","periode":"XVI-XIX","histoire":"SOUPIR ,  le château a été reconstruit à la fin du XIXe siècle, remplaçant un manoir du XVIe siècle. Du domaine (château, grilles, portail, parc, jardin) ne reste qu'un portail monumental daté de 1908, représentant des figures liées à la chasse. L'accès se fait par un pont en rocaille de béton. La grille d'entrée a été abîmée en 1914-1918 et le château détruit en 1917.\nÉléments protégés MH : les vestiges du château en totalité : le portail, l'arc triomphal, les grilles d'entrée et les douves : inscription par arrêté du 14 septembre 2007.","architecture":"SOUPIR, est un château bâti à Soupir, Il ne reste encore debout que son porche monumental bâti en 1908. Il date du XVIe et de la seconde moitié du XIXe siècle. Il ne reste depuis que des vestiges protégés : son portail, l'arc de triomphe, sa grille et ses douves. Le château de Soupir a été rebâti à la fin du XIXe siècle, remplaçant l'ancien manoir du XVIe siècle. Il ne subsiste du domaine que des figures liées à la chasse. Le parc a été dessiné par le paysagiste Edouard Redon. Le tracé du grand canal de l'ancien parc est encore visible. La tête du canal est formée d'une île, aménagée à la fin du XIXe ou au début du XXe siècle, sur laquelle se trouve une tour en brique. L'accès se fait par un pont en rocaille de béton. La grille d'entrée a été abîmée en 1914-1918 et le château de Soupir fut détruit en 1917. Mr. Chauchard, le propriétaire, fit reconstruire le château de Soupir, de 1873 a 1876. Gaston Calmette, fut directeur du Figaro et aussi, devint le propriétaire. Le château de Soupir a été détruit en 1917.","habitants":"le paysagiste Edouard Redon et Mr. Chauchard\"","divers":"Château du Soupir                                    GPS : 49° 24' 18\" Nord, 3° 35' 55,36\" Est","gps":"49° 24' 18\" Nord, 3° 35' 55,36\" Est","images":["../../jctruffet.com/image/image_02/02_Soupir_1.jpg","../../jctruffet.com/image/image_02/02_Soupir_2.jpg"]},"Consult_chateau_formulairec3cd":{"id":"Consult_chateau_formulairec3cd","dept":"02","canton":"Vervins","commune":"Trosly sur loir Vervins","nom":"Trosly_Vervins","type":"Château","periode":"XIX","histoire":"deux châteaux dans cet article; Trosly et la Tour du Roy.               TROSLY  Le château de Trosly-Loire fut la résidence d'une villa royale. Trosly-Loire fut le siège de plusieurs conciles ou synodes.             Le domaine dORGIVAL  est une histoire familiale. Suite aux bombardements de lensemble du domaine à la fin de la première guerre mondiale, la famille Lemoine, propriétaire des lieux, décide de reconstruire lensemble de la ferme sur les hauteurs de Trosly-Loire. Lextraction des pierres de la carrière attenante à la ferme permet de voir renaître le domaine mais aussi une partie du village. En 1924, Le domaine dOrgival se relève de la guerre ainsi que le village de Trosly-Loire dans lAisne. La première ambition de Pierre Lemoine est doffrir à sa famille et à ses amis un lieu daccueil convivial et chaleureux. Cest en 1990, sous limpulsion de ses petit-fils Bruno et Thierry que la demeure trouve une nouvelle vocation en ouvrant ses portes au public dans le cadre de réceptions privées et professionnelles. Aujourdhui, Gwennaëlle, larrière petite-fille de Pierre Lemoine, continue de vous recevoir, pour fêter vos événements privés (mariages,séminaires, fiançailles, etc.)","architecture":"TOUR du ROY, plus qu'un château voici un monument de l'histoire. C'est là en effet qu'Henri IV fut reconnu roi. Avec ses meurtrières, ses vitraux et ses tourelles, cet édifice du XIIe siècle impose sa présence dans la commune de Vervins en Thiérarche. La décoration des pièces y est riche; le parquet en chêne, poutres, tapis de Sedan. Si chacune des chambres possède son propre caractère, toutes ont des salles de bains de style rétro peintes à la façon Desvres. Côté cuisine, place à l'argenterie, aux dentelles et aux recettes signées Annie Desvignes sublimant les produits de notre belle France. Un jardin, une terrasse, un bain bouillonnant, un havre de paix. Trois salles panoramiques, plus deux salles de sous-commission de plain-pied. 22 chambres aux noms évocateurs, toutes climatisées. Cuisine du marché siglée Annie Desvignes, légumes du jardin Hubert, pêche d'Etaples, cochons de lait de nos élevages. Gibiers du domaine du marquis de Beaumont.","habitants":"Famille Lemoine,\"","divers":"deux châteaux dans cet article; Trosly 1 et la Tour du Roy grav 3-4.   Orgival 2-6                                           Trosly GPS : 49° 31' 10\" Nord, 3° 13' 39\" Est                                                                  Orgival r GPS : 49° 31' 10\" Nord, 3° 13' 39\" Est","gps":"49° 31' 10\" Nord, 3° 13' 39\" Est","images":["../../jctruffet.com/image/image_02/02_Trosly_Vervins_1.jpg","../../jctruffet.com/image/image_02/02_Trosly_Vervins_2.jpg","../../jctruffet.com/image/image_02/02_Trosly_Vervins_3.jpg","../../jctruffet.com/image/image_02/02_Trosly_Vervins_4.jpg","../../jctruffet.com/image/image_02/02_Trosly_Vervins_5.jpg","../../jctruffet.com/image/image_02/02_Trosly_Vervins_6.jpg"]},"Consult_chateau_formulairee45e":{"id":"Consult_chateau_formulairee45e","dept":"02","canton":"Saint-Quentin","commune":"Maissemy","nom":"Vadancourt","type":"Château","periode":"XIX","histoire":"VADANCOURT,  Guy Félix de Pardieu, comte, seigneur de Vadancourt, de Bray Saint Christophe et Bracheux fit partie de la liste des États généraux de 1789, tandis que la ville de Saint-Quentin était représentée par l'abbé Marolles. Le château d'origine a été construit en surplomb de la rivière l'Omignon.","architecture":"VADANCOURT, à l'origine, il comportait une terrasse avec un impressionnant escalier à balustres. Il était composé d'un haut pavillon de trois niveaux avec balcon côté parc, et à l'arrière une aile se raccordant au logis. Celui-ci présentait un avant-corps central d'une travée, avec une porte cintrée au rez de chaussée, un balcon ouvrant sur la fenêtre du premier étage, le tout surmonté d'un attique couronné d'un fronton courbe percé d'un oculus. En 1917 lors de la première guerre mondiale, délabré, soumis aux bombardements allemands, il a été détruit. Le château, réquisitionné, fut le lieu de la 1re compagnie du Zivilarbeiter bataillons  de 24. 500 prisonniers récalcitrants furent enfermés dans le château délabré, sous les ordres du lieutenant Wetzel. La région a subi d'énormes dégâts car le village a été le témoin des plus grands combats, et se souvient de la bravoure des Anglais, il  fut incendié par les Espagnols. Il le sera à nouveau, en 1652, par les troupes du ducs de Lorraine. Le château de Vadancourt n'est pas inscrit ni classé aux M.H. Devenu un gite d'hôtes, de belles chambres  vous sont proposées, par la famille Houssin, dans un cadre accueillant. Niché au cur d'un parc de plus de 20 hectares agrémenté de vieux arbres tout près de Saint-Quentin et de l'Aisne, le château de Vadancourt comprend cinq chambres confortables et douillettes avec mobilier dépoque. Le décor personnalisé des chambres saura vous charmer et rendre vos nuits agréables. Les chambres donnent une vue superbe sur le parc et sur l'étang.","habitants":"Guy Félix de Pardieu et Famille Houssin \"","divers":"Château de Vadancourt                      GPS : 49° 54' 03\" Nord, 3° 10' 58\" Est","gps":"49° 54' 03\" Nord, 3° 10' 58\" Est","images":["../../jctruffet.com/image/image_02/02_Vadancourt_1.jpg"]},"Consult_chateau_formulaire2bb3":{"id":"Consult_chateau_formulaire2bb3","dept":"02","canton":"Villeneuve-sur-Aisne","commune":"Vendresse-Beaulne","nom":"Vendresse","type":"Château","periode":"XIX","histoire":"Deux châteaux dans cet article Vendresse et Verneuil-Moussy. VENDRESSE, d'après Francis Eck, le château d'avant-guerre avait été reconstruit sur un tertre à l'extrême fin du XIXe siècle. Le corps de logis de trois travées de large, entièrement en pierre de taille, était flanqué de deux pavillons à étage, la distribution des ouvertures en façade trahit une recherche de symétrie qui confère à la construction une sobriété et un classicisme rencontrés dans les maisons bourgeoises d'avant guerre. Un mur d'enceinte a été édifié le long de la rue de Beaulne afin de compenser la déclivité du terrain. Il renferme une crypte, que la présence de fenêtres atteste. La maison imposante est au centre d'un jardin étendu. Elle est  entièrement édifiée en pierre de taille. Le toit à longs pans et croupes couvert en ardoise surmonte l'étage carré. L'étage de comble reçoit le jour par la présence d'une lucarne cintrée.","architecture":"A cinq K.M. au sud ouest VERNEUIL ou château de Verneuil-Moussy   la construction date du XVIIe siècle, il a été, partiellement, reconstruit, après 1918. Le château de Verneuil possède une belle façade, du XVIIe et des tourelles, sur des substructions du Moyen-Age. Henri Rillart de Verneuil, politicien, s'est marié dans la commune le 11/09/1895. Sa famille possédait, depuis le XVIIe siècle, le château de Verneuil, acquis par la famille Thuret, qui étaient les seigneurs de Verneuil-sur-Aisne. il est aujourd'hui un restaurant.","habitants":"Francis Eck,.                                    et  Henri Rillart de Verneuil\"","divers":"Deux châteaux dans cet article Vendresse grav 3 et Verneuil-Moussy grav 1-2. Verneuil GPS : 49° 25' 00\" Nord, 3° 38' 06\" Est","gps":"49° 25' 00\" Nord, 3° 38' 06\" Est","images":["../../jctruffet.com/image/image_02/02_Vendresse_1.jpg","../../jctruffet.com/image/image_02/02_Vendresse_2.jpg","../../jctruffet.com/image/image_02/02_Vendresse_3.jpg"]},"Consult_chateau_formulaire3a7d":{"id":"Consult_chateau_formulaire3a7d","dept":"02","canton":"Vervins","commune":"Vervins","nom":"Vervins","type":"Château","periode":"XVI-XVIII","histoire":"CHÂTEAU NEUF, Ravagé en 1552 lors de la guerre qui oppose François 1er à Charles Quint, le château est réédifié après 1559 par Jacques II de Coucy sur un site plus au sud. Désormais appelé \"Château-neuf\" en opposition à l'ancien dénommé \"Vieux-château\", le nouveau château est semble-t-il achevé en 1573. En 1598, lors de la Paix de Vervins qui met fin à la guerre entre Henri IV et Philippe II d'Espagne, le château-neuf est mis à la disposition des plénipotentiaires et du cardinal-légat, Alexandre de Médicis. Le château fut très certainement endommagé par les Espagnols entre 1636 et 1653 et peut-être en 1712 lors de la prise de la ville par le partisan hollandais Growenstein. En 1742, des dégradations importantes dans les maçonneries sont signalées.  D'importants travaux de transformation et de restauration du château-neuf sont toutefois entrepris au XVIIIe siècle (réédification totale de la moitié gauche de la façade, percement de nouvelles baies dans les parties anciennes). Vendu comme bien national à la Révolution, le château est racheté en 1804 par la commune pour y loger l'administration de la sous-préfecture. Le château est profondément restauré de 1805 à 1807 par l'ingénieur Duroché entraînant entre autre la disparition du pavillon de la chapelle. La façade et le décor intérieur sont refaits par voie d'économie en 1837. L'application du plan d'alignement de 1823 modifié en 1843, entraîne la démolition du porche d'entrée en 1854. Entre 1854 et 1862 l'architecte Pudepièce (1830-1871) répare la façade à plusieurs reprises, construit en 1856 le bâtiment (détruit) abritant l'écurie et les bureaux et refait l'escalier intérieur du Château-neuf en 1862.","architecture":"Château NEUF, suite;  vendu au département en 1880, le château est une nouvelle fois restauré, notamment dans ses parties hautes. Il est probable que le château présentait à l'origine un plan régulier en H. Le pavillon flanquant le corps central au nord aurait alors disparu, ceux placés sur l'arrière seraient aujourd'hui réunis par la cage d'escalier. Le corps principal est aujourd'hui couvert d'un toit à longs pans se terminant par un pignon couvert à l'est et une croupe à l'ouest. Il est flanqué de trois pavillons couverts d'un toit en pavillon. Le hall d'entrée est couvert d'une voûte d'arêtes.                                                                                                          KEN,   nous ne connaissons que très peu de choses sur ce château du XVIIIe siècle, il aurait appartenu à Givenchy et la marque Kenzo de Givenchy viendrait du nom du château de Ken , la seigneurie de Vervins était aux Coucy à la fin XIe, puis à Thomas II dit de Marle, souche des Coucy -Vervins qui la gardèrent jusqu'en 1587, elle passa à René du Bec, puis au XVIIe siècle  aux Comminges pour qui elle fut érigée en marquisat, acquise par une famille de fermiers à la Révolution, aux Franquetot, généraux, ensuite elle fut de 1758 Charte de commune octroyée en 1163 par Raoul de Coucy, confirmée en 1228 et modifiée en 1573. Ville prise et pillée par les armagnacs, les calvinistes en 1552, les espagnols en 1557 et les ligueurs et les troupes d'Henri IV, celui-ci signa à Vervins en 1598 avec Philippe II le traité qui mit fin à la guerre entre l'espagne et la France et restitua à celle-ci nombre de places frontières.","habitants":"Ken; Famille de Kenzo de Givenchy\"","divers":"deux châteaux dans cet article château neuf Grav-1 et Ken               grav 2-3-4-                                                       Gps   49° 50' 09? nord, 3° 54' 36? est","gps":"","images":["../../jctruffet.com/image/image_02/02_Vervins_1.jpg","../../jctruffet.com/image/image_02/02_Vervins_2.jpg","../../jctruffet.com/image/image_02/02_Vervins_3.jpg","../../jctruffet.com/image/image_02/02_Vervins_4.jpg"]},"Consult_chateau_formulaire0a7f":{"id":"Consult_chateau_formulaire0a7f","dept":"02","canton":"Vic sur Aisne","commune":"Vic sur Aisne","nom":"Vic_sur_Aisne","type":"Forteresse","periode":"XII-XVII","histoire":"VIC sur AISNE, le donjon, existe depuis le VIIIe siècle: c'était alors une forteresse médiévale, élevée en bois sur des fondations de pierre et entourée de fossés. Cette forteresse arrêta l'invasion normande, venue de Compiègne, qui remontait la rivière. Au XIIe siècle, le donjon fut construit en pierre: tour carrée, flanquée de deux tours rondes à contreforts, dont l'une abrite une chapelle, cette tour maîtresse figure parmi les plus sophistiquées de XII siècle. Les guerres de religions vont fortement endommager le donjon qui sera restauré à partir de 1604 par l'abbé commendataire François Hotman, les tours furent découronnées, créneaux, mâchicoulis et chemin de ronde disparaîtront et le donjon sera transformé en tour résidence. Un château sera construit sur les douves des anciennes fortifications, ainsi que des communs, un nouveau prieuré, une chapelle, un pigeonnier, une glacière, la borne millière sera déplacée près du donjon. Pour les deux abbés commendataires suivants, le Cardinal Mazarin et Philippe de Savoie, le château de Vic sur Aisne était une résidence de campagne dans lequel ils faisaient de brefs séjours. L'Abbé de Pomponne, fils du marquis de Pomponne, Chancelier des Ordres du Roi Louis XIV, fit embellir la façade et aménager au goût du jour, par un grand architecte de jardins, le parc, en créant des terrasses, un jardin à la française un grand potager et un verger. A la Révolution, le château est vendu comme bien national. Jean Baptiste Clouet, régisseur des poudres et salpêtres, devient le premier propriétaire.","architecture":"VIC sur AISNE , il vend le château à son cousin quelques années plus tard :  vendut au  vicomte de Reiset. Pendant la guerre 14-18, le château est occupé par le quartier général de Franchey d'Esperey. Trois obus détruiront la tour nord-est du donjon, l'arrière nord du château et le dernier la façade gauche. Le vicomte de Reiset se chargera de la restauration avec les dommages de guerre. Pendant la deuxième guerre mondiale, il est à nouveau occupé, les meubles sont déménagés on ne sait où. La famille Reiset le vend à une société, qui en est encore propriétaire aujourd'hui. L'association de sauvegarde fut créée en 1989 avec comme mission, la sauvegarde, la restauration et l'animation du château, ainsi le château est ouvert au public et aux réceptions.  Éléments protégés MH : le donjon : classement par arrêté du 18 novembre 1919. La façade sur le parc : inscription par arrêté du 28 juin 1927. L'enceinte médiévale et les douves, le mur de clôture, les pavillons d'entrée, les façades et les toitures des bâtiments des communs, les façades et les toitures du corps de logis XVIIe-XVIIIe siècle, le parc avec sa statuaire et ses fabriques : inscription par arrêté du 10 avril 1992.","habitants":"Famille de Pomponne\"","divers":"Château de Vic GPS : 49° 24' 21\" Nord, 3° 06' 51\" Est","gps":"49° 24' 21\" Nord, 3° 06' 51\" Est","images":["../../jctruffet.com/image/image_02/02_Vic_sur_Aisne_1.jpg","../../jctruffet.com/image/image_02/02_Vic_sur_Aisne_2.jpg","../../jctruffet.com/image/image_02/02_Vic_sur_Aisne_3.jpg","../../jctruffet.com/image/image_02/02_Vic_sur_Aisne_4.jpg"]},"Consult_chateau_formulaire4f88-3":{"id":"Consult_chateau_formulaire4f88-3","dept":"02","canton":"Villers-Cotterêts","commune":"Vierzy","nom":"Vierzy","type":"Château","periode":"XV-XVI","histoire":"VIERZY, en 1373, apparaît dans les archives, le fief de la Carrière détenu par Collard de Colligis du fait de sa femme Jeanne de la Carrière de Vierzy. Ce manoir-ferme a été entrepris à la fin du XVe siècle et achevé dans le premier quart du XVIe siècle. Le tout est antérieur à l'arrivée du bâtisseur que fut Jean d'Estrées qui le reçut à l'occasion de son mariage en 1525. Vierzy est l'uvre d'une autre famille de constructeurs, les Louvain, établie en Soissonnais dans le deuxième quart du XVe siècle. Propriété de la famille d'Estrées, il passa, en 1749, au duc de Noailles, puis à la princesse de Chimay.","architecture":"VIERZY, sa tour octogonale en arcade, et ses fenêtres à meneaux sont inscrites partiellement aux M.H. en 1928. Les bâtiments sont groupés autour de deux tours communiquant entre elles. Autour de la première, les bâtiments d'habitation, autour de la seconde, les dépendances servant de ferme. On accède à la première cour par une porte fortifiée, ornementée de faux gothique. Autour de la cour plusieurs corps d'habitation. Le plus ancien est un corps de logis en pierre à deux étages, flanqué d'une tourelle octogonale en brique, ornementée aux angles de chaînages en pierre. A chaque étage deux grandes fenêtres rectangulaires a meneaux, dont les croisées sont à profil prismatique. Ce logis fait partie de la série des manoirs en brique et pierre qui existèrent au milieu du XVe siècle en Soissonnais.\nÉléments protégés MH : les parties du XVe siècle comprenant la porte fortifiée, le corps de logis rectangulaire à tourelle polygonale, les trois portes du bâtiment principal et les restes de galerie a arcades en tiers-point : inscription par arrêté du 8 février 1928.","habitants":"Famille de Jean d'Estrées\"","divers":"Châteu de Vierzy GPS : 49° 17' 34\" Nord, 3° 17' 01\" Est","gps":"49° 17' 34\" Nord, 3° 17' 01\" Est","images":["../../jctruffet.com/image/image_02/02_Vierzy_1.jpg","../../jctruffet.com/image/image_02/02_Vierzy_2.jpg","../../jctruffet.com/image/image_02/02_Vierzy_3.jpg"]},"Consult_chateau_formulaire84c8-2":{"id":"Consult_chateau_formulaire84c8-2","dept":"02","canton":"Soissons","commune":"Villeneuve-st-germain","nom":"Villeneuve_St_Germain","type":"Château","periode":"XIX-XX","histoire":"VILLENEUVE,  élevé à l'emplacement d'une ancienne abbaye de Célestins, le château a été reconstruit après la première guerre mondiale. Construit en brique et en pierre par l'architecte D'Hont pour la famille de La Rochefoucauld.","architecture":"VILLENEUVE, la construction  date du XXe siècle. Élevé à l'emplacement d'une ancienne abbaye de Célestins, le château de Villeneuve a été reconstruit, après la première guerre mondiale.  Le bâtiment reprend le parti des châteaux classiques. A l'intérieur, la salle à manger et la chapelle gardent un décor de style des années 1925-1930. Quelques communs subsistent, en partie du XIXe siècle, et le mur d'une ancienne orangerie. La demeure se situe dans un domaine boisé clos. Le château de Villeneuve est inscrit aux M.H. ainsi que les façades et les toitures, les portails, la chapelle, la totalité des décors intérieurs de 1930, (la salle à manger et la chapelle), les sols archéologiques correspondant à l'ancienne abbaye des Célestins, les murs de clôture y compris les portails sont inscrits aux M.H. le 21/09/2006.","habitants":"Famille de La Rochefoucauld\"","divers":"Château de Villeneuve St-Germain                           gps  49° 22' 52? N, 3° 21' 10? Est","gps":"","images":["../../jctruffet.com/image/image_02/02_Villeneuve_St_Germain_1.jpg","../../jctruffet.com/image/image_02/02_Villeneuve_St_Germain_2.jpg"]},"Consult_chateau_formulairec80a":{"id":"Consult_chateau_formulairec80a","dept":"02","canton":"Villers-Cotterets","commune":"Villers-Cotterets","nom":"Villers_Cotterets","type":"Palais","periode":"XIV-XVI","histoire":"FRANCOIS Ier, Entre 1530 et 1545 fait construire un nouveau château avec parc et dépendances, sur les plans des frères Jacques et Guillaume Le Breton. Le retable de la chapelle porte la date de 1539. Au milieu du XVIe siècle, le château est achevé par les maîtres maçons cotteréziens Robert Vaultier et Gilles Agasse, travaillant sous le contrôle de Philibert de l'Orme.  A la même époque, le fontainier Jehan Mallard installe une fontaine au château. Dans le troisième quart du XVIIe siècle, il  fait transformer la façade nord du château, il agrandit le parc et en confie le réaménagement à André Le Nôtre selon une tradition très vraisemblable. Dans la deuxième moitié du XVIIIe siècle, le château, son parc et ses dépendances sont entièrement modifiés par l'architecte Henri Piètre pour le duc Louis-Philippe d'Orléans et son fils. En 1793, Philippe Egalité fait démantèler le château François 1er. En 1808, le château deviendra un lieu de mendicité. Puis le château de François 1er fut transformé en maison de retraite, fermée depuis 2014. Après la Révolution qui voit la vente et la destruction de plusieurs dépendances du château. Au début du premier quart du XIXe siècle, l'architecte Gilbert y fait les aménagements nécessaires. Des travaux sont encore exécutés dans le courant du XIXe siècle par l'architecte Jean-François Mesnager entre 1832 et 1859. Depuis 1889, le château assume le rôle de maison de retraite départementale. Aux XIXe et au XXe siècle, les anciennes dépendances du château ont été transformées et de nombreux bâtiments ont été construits à la périphérie du parc et sur l'emplacement du potager.","architecture":"FRANCOIS Ier, l'existence est attestée par les sources au moins dès le XIIe siècle. De ce château médiéval, il subsiste des fondations et une partie de l'élévation d'une tour du XIIIe ou du XIVe siècle. Il est incendié dans la première moitié du XVe siècle et restauré dans la deuxième moitié du XVe siècle. Seul château royal de la Renaissance conservé en Picardie ayant gardé la quasi-intégrité de son plan et de ses volumes extérieurs. Château comprenant une chapelle avec fausse voûte en berceau primitivement lambrissée ; il est desservi par un escalier dans-oeuvre tournant à retours avec jour en maçonnerie et deux escaliers en oeuvre, tournant à retours sans jour en maçonnerie couverts d'une voûte en berceau en anse de panier et d'une voûte plate ; il est protégé par des toits coniques, toits en pavillon, toits à croupe et à pignon couvert, toits à deux pans avec croupe ; les communs avec lucarnes de brique sont desservi par des escaliers tournants  avec voûte en berceau en anse de panier en brique ; ils sont couverts de toits en pavillon, toits à croupe et pignon couvert ; échauguettes du mur du parc avec toit. Éléments protégés MH : le château et le parc, y compris le mur de clôture et ses deux échauguettes et à l'exception des bâtiments ajoutés au XIXe siècle : classement par arrêté du 13 février 1997.","habitants":"François Ier\"","divers":"Château de Villers -Cotterets            GPS : 49° 15' 21\" Nord, 3° 05' 32\" Est","gps":"49° 15' 21\" Nord, 3° 05' 32\" Est","images":["../../jctruffet.com/image/image_02/02_Villers_Cotterets_1.jpg","../../jctruffet.com/image/image_02/02_Villers_Cotterets_2.jpg","../../jctruffet.com/image/image_02/02_Villers_Cotterets_3.jpg","../../jctruffet.com/image/image_02/02_Villers_Cotterets_4.jpg","../../jctruffet.com/image/image_02/02_Villers_Cotterets_5.jpg","../../jctruffet.com/image/image_02/02_Villers_Cotterets_6.jpg","../../jctruffet.com/image/image_02/02_Villers_Cotterets_7.jpg","../../jctruffet.com/image/image_02/02_Villers_Cotterets_8.jpg"]},"Consult_chateau_formulaire7f8e-2":{"id":"Consult_chateau_formulaire7f8e-2","dept":"02","canton":"Villers-Cotterets","commune":"Villers-Cotterets","nom":"Villers_Cotterets_Aisne","type":"Palais","periode":"XV-XVI-XIX","histoire":"Deux châteaux dans cet article ,Villers-Cotterets et le pavillon Henri  VILLERS COTTERETS, château construit dans la première moitié du XVIe siècle ; en 1793, la partie supérieure de l'ouvrage d'entrée et des tourelles est abattue pour abolir les signes de la féodalité ; des communs avec écuries, remises et logements sont construits au sud-est de la propriété dans la première moitié du XIXe siècle (avant le cadastre de 1835) ; dans le deuxième quart du XIXe siècle, les extrémités du château sont abattues, et le bâtiment est totalement rénové et redécoré intérieurement et extérieurement, le fronton serait l'oeuvre du sculpteur Manes ; après cette date, la propriété n'a subi que des modifications minimes portant sur des parties secondaires ; la ferme voisine dépendait à l'origine du château, ce qui n'est plus le cas, elle fut construite au XVIe siècle comme en témoignent une partie du logis et les bâtiments agricoles ouest et sud ; au XVIIe ou au XVIIIe siècle est édifiée la majeure partie des étables, bergeries et fenils au nord-est ; la ferme a bénéficié de nombreux travaux au XIXe siècle, après 1835 : extension des bergeries au nord-est, et du logis, modification de plusieurs bâtiments agricoles.                                                                                                                   PAVILLON HENRI II, il est de style Néo-Renaissance, sa construction date de XVIe siècle-XIXe siècle et fut attribuée à Philibert Delorme, l'architecte du château François Ier. Les décors sont de style renaissance, remaniés au XIXe siècle. Le bâtiment est inscrit au titre des monuments historiques en 1995. Le pavillon Henri II est situé 15 passage du manège à Villers-Cotterêts, à la limite de l'ancien parc du château François Ier.","architecture":"VILLERS-COTTERETS, château en pierre de taille calcaire avec sous-sol et un étage carré desservi par un escalier dans-oeuvre symétrique en charpente, couvert d'un toit à pignon couvert et d'un toit polygonal ; colombier en moellon calcaire enduit avec rez-de-chaussée voûté d'ogives et toit conique d'ardoise ; ouvrage d'entrée en pierre de taille calcaire avec voûte d'ogives, couvert d'un toit en pavillon en tuile plate desservi par un escalier hors-oeuvre en vis en maçonnerie ; enceinte avec tourelles en pierre de taille calcaire couvertes d'un toit conique en calcaire ; communs en pierre de taille calcaire couverts d'un toit d'ardoise à pignon couvert ; logis de ferme en pierre de taille calcaire desservi par un escalier dans-oeuvre, avec toits à pignon découvert en ardoise et toits à deux pans à pignon couvert et à croupe en tuile plate ; bâtiments agricoles construits en pierre de taille calcaire et moellons de calcaire et grès (à l'exception d'un bâtiment ouest en brique).Éléments protégés MH : le donjon et les restes de l'enceinte : inscription par arrêté du 3 juin 1927.                               PAVILLON HENRI II,   sa construction date du XVIe siècle, et fut agrandi et redécoré, vers 1760, pour le duc d'Orléans.Cette résidence ducale, fut vendue en tant que bien national, en 1795, puis fut racheté par le roi Louis-Philippe, en 1843, en biens personnels. Il est la propriété actuelle privée de Mr Simon Le Boeuf qui souhaite le faire connaitre au public, le pavillon fut agrandi et redécoré pour le duc d'Orléans (1756-1760). Alexandre Dumas a écrit dans ses mémoires : « La maison de Mr Deviolaine était un palais. En août 1843, le roi Louis-Philippe a racheté le bâtiment.","habitants":"François Ier et Henri II\"","divers":"Pavillon gps 49° 15' 20? N, 3° 05' 25? E","gps":"","images":["../../jctruffet.com/image/image_02/02_Villers_Cotterets_Aisne_1.jpg","../../jctruffet.com/image/image_02/02_Villers_Cotterets_Aisne_2.jpg"]},"Consult_chateau_formulaire2f20":{"id":"Consult_chateau_formulaire2f20","dept":"02","canton":"Villers-Cotterêts","commune":"Villers-Héllon","nom":"Villers_Héllon","type":"Château","periode":"XVI-XVII","histoire":"VILLERS-HELLON,   lancien propriétaire, lAméricain Anthony Tirri étant décédé, le château était inoccupé depuis 2 ans et cest avec plaisir que les habitants du village le voient revivre. Le nouveau propriétaire du château, le baron Chen Pao-Sheng et son épouse Cheng Jao Chen, originaires de Taïwan, ont célébré leur anoblissement au milieu des leurs et des habitants du village, en présence du prince héritier David Bagrationi-Moukhranelide de Géorgie, du duc He Alfredo Escudero Diaz Madroneo dEspagne et du petit-fils de lImpératrice Sissi. le propriétaire fait modifier la façade, élever l'aile basse et dessiner le parc. Après 1884, le propriétaire comble les douves et remplace la toiture de la tour de la chapelle par une terrasse. La ferme a été également édifiée dans la première moitié du XVIe siècle, mais plusieurs bâtiments, dont le logis et la grange datent du quatrième quart du XVIIIe siècle, le parc du château et la ferme servent maintenant de camping.  Il a été la propriété d'une société privée. Racheté en Juillet 2016, par l'entrepreneur taïwanais Pao Sheng Chen, il est devenu au cours d'une cérémonie le vicomte Pao Sheng Chen.","architecture":"VILLERS-HELLON, c'est un ancien château-fort construit au XVe, XVIe, seconde moitié du XVIIIe et XIXe siècle. C'est une construction hétérogène échelonnée du XVe au XVIIIe siècle : agrandie au XVIe siècle à partir d'un noyau plus ancien, remaniée à l'extrême fin du XVIIIe siècle. Quelques aménagements ont été apportés au XIXe siècle. La façade principale du corps de logis présente une ordonnance classique et un décor du XVIIIe siècle. La façade arrière et la façade Est ont conservé, malgré les percements du XVIIIe siècle, leur configuration du XVIe siècle. Il possède aussi un colombier. Il accueille un camping. Le parc du château est ouvert au public. Le château de Villers-Hélon a été inscrit le 10/10/1995 aux M.H. partiellement.  Château couvert d'un toit à croupe à l'exception des tourelles qui ont un toit conique et la tour une terrasse. Les communs ont un toit à longs pans et croupe brisées et un toit à pignon couvert. La ferme : colombier à toit polygonal, le logis et plusieurs bâtiments agricoles ont un toit à croupe, d'autres bâtiments ont un toit à pignon couvert en tôle ondulée, le hangar central surmonté d'un étage en pan de bois et moellon a un toit à croupe en tuile mécanique.                                                       \nÉléments protégés MH : les façades et les toitures du château, les douves, le pont de pierre donnant accès à la cour d'honneur, le lavoir : inscription par arrêté du 10 octobre 1995.","habitants":"duc He Alfredo Escudero Diaz Madroneo dEspagne\"","divers":"Château de Villers Héllon                     GPS : 49° 16' 00\" Nord, 3° 15' 38\" Est","gps":"49° 16' 00\" Nord, 3° 15' 38\" Est","images":["../../jctruffet.com/image/image_02/02_Villers_H%c3%a9llon_1.jpg","../../jctruffet.com/image/image_02/02_Villers_H%c3%a9llon_2.jpg"]},"Consult_chateau_formulaire5b56":{"id":"Consult_chateau_formulaire5b56","dept":"02","canton":"Essômes-sur-Marne","commune":"Villers-St-Denis","nom":"Villers_St_Denis","type":"Château","periode":"XVII-XVIII","histoire":"VILLERS -ST-DENIS, sanatorium, dont les pavillons de soin ont été construits dans le parc, reconverti en hôpital aujourd'hui, ce domaine a conservé, après cette conversion de l'entre-deux-guerres, les façades et les toitures du château, l'escalier principal du XVIIIe siècle.","architecture":"VILLERS -ST-DENIS, la construction du château de Villiers-Saint-Denis date du XVIIIe et XIXe siècle. Le château de Villiers-Saint-Denis est un ancien sanatorium. Les pavillons pour les soins sont toujours dans le parc. Il a été reconverti en hôpital, aujourd'hui. Le château de Villiers Saint-Denis a conservé, l'escalier principal du XVIIIe siècle, les grilles d'entrée, la pelouse arrière entourée d'arbres et les vestiges d'un parc conçu par le paysagiste Jean-Marie Morel. L'architecture du château de Villiers-Saint-Denis est assez éclectique et dévoile une façade, datant du XIXe siècle. Le château de Villiers-Saint-Denis est une propriété privée. \nÉléments protégés MH : le château, les façades et les toitures, l'escalier intérieur avec sa rampe en fer forgé et le palier du premier étage, la grille en fer forgé des deux entrées extérieures et la pelouse entourée des arbres tricentenaires à l'arrière du château: inscription par arrêté du 14 septembre 2007.","habitants":"Jean-Marie Morel\"","divers":"Châteai de Villers St-D let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','02 — Aisne'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
</script></body></html>
