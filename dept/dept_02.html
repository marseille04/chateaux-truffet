 se trouve dans un état de grand délabrement. Le château de Givray est un ancien château, dont la construction remonte au XVIe siècle. Le château de Givray, bien que ruiné, a encore de beaux vestiges comme ses belles cheminées, un dessus de porte et des armoiries. Il a été classé aux M.H. depuis le 5/06/1928.","habitants":"Famille de Harlus\"","divers":"Givray à Bruyère                                              GPS : 49°12'16\" Nord, 3°26'09\" Est","gps":"49°12'16\" Nord, 3°26'09\" Est","images":["../../jctruffet.com/image/image_02/02_Givray_Bruy%c3%a8res_1.jpg","../../jctruffet.com/image/image_02/02_Givray_Bruy%c3%a8res_2.jpg"]},"Consult_chateau_formulaire4672":{"id":"Consult_chateau_formulaire4672","dept":"02","canton":"Villeneuve-sur-Aisne","commune":"Guignicourt","nom":"Guignicourt","type":"Château","periode":"XVIII","histoire":"GUIGNICOURT  c'est un château construit au XVIIIe siècle. Il possède un parc remarquable, d'inspiration romantique.De 1477 jusqu'au milieu du XVIIIe siècle, plusieurs branches de la famille Bezannes sont seigneurs en partie de Guignicourt et/ou de Prouvais. Catherine Claire Julie de Bezannes, dame de Prouvais, épouse en 1715 Hérard du Cauzé, seigneur de Nazelle, Le château de Guignicourt était propriété des marquis du Cauzé de Nacelle. Le château a disparu, mais la ferme  et le parc du existent toujours fin 2015.","architecture":"GUIGNICOURT, bâtisse de plan rectangulaire à deux niveaux avec série de lucarnes sur combles hautes toitures  en ardoise, corps de logis central entre  deux pavillons saillants.\nJAULGONNE beau manoir dit des Bois-joyeux Jaulgonne était une seigneurie du roi au XVe siècle, du duc de Bouillon à la Révolution.\nEn 1870, le roi de Prusse et le Chancelier Bismarck empruntèrent la route du petit village, pour aller à la galerie des glaces, à Versailles, pour que le roi se fasse proclamer, sous le nom de Guillaume Ier, empereur d'Allemagne. Durant la Première Guerre mondiale, elle est détruite à 95 %, et reconstruite ensuite essentiellement avec des pierres meulières.","habitants":"Marquis du Cauzé de Nacelle\"","divers":"GuignicourtGPS : 49° 26' 09\" Nord, 3° 58' 00\" Est                                                  Jaulgonne grav-3-4                               GPS : 49° 05' 21\" Nord et 3° 32' 03\" Est","gps":"49° 26' 09\" Nord, 3° 58' 00\" Est","images":["../../jctruffet.com/image/image_02/02_Guignicourt_1.jpg","../../jctruffet.com/image/image_02/02_Guignicourt_2.jpg","../../jctruffet.com/image/image_02/02_Guignicourt_3.jpg","../../jctruffet.com/image/image_02/02_Guignicourt_4.jpg"]},"Consult_chateau_formulaire906c":{"id":"Consult_chateau_formulaire906c","dept":"02","canton":"Guise","commune":"Guise","nom":"Guise","type":"Château","periode":"XIV","histoire":"GUISE, Son étonnante modernité lui vaudra l'attention de Vauban, l'architecte militaire de Louis XIV. Le château de Guise va ainsi devenir une forteresse, ceinturée à l'époque par plus d'un K.M cinq de remparts; quatre hectares de douves assuraient la défense du site et le rendaient quasiment imprenable. Le site devient ensuite un lieu de casernement pour l'armée française, jusqu'au début du XXe siècle. Lorsque cessent les tumultes de la première guerre mondiale, le château-fort de Guise est ruiné, bombardé, mais il est loin d'être anéanti : son architecture demeure bien lisible sur la colline, dominant encore la ville. L'Etat décide cependant de sa vente en 1923. Les divers propriétaires qui le rachètent transforment le château en carrière de pierres et en décharge publique. Maurice Duton fonde alors, en 1952, le Club du Vieux Manoir, une association de jeunes bénévoles qui va oeuvrer à la sauvegarde, à la restauration et à l'animation du château fort de Guise. L'association et ses jeunes bénévoles en camp-chantier-patrimoine sont aujourd'hui  en charge du château fort de Guise. Dans la banlieue de Guise  la BUISSIERE à flavigny le grand, moulin fortifié, aspect d'une maison-forte ; elle a été réalisée en brique et pierre, elle est couverte d'une haute toiture en croupe faite d'ardoises, des tourelles plantées en diagonale marquent deux de ses angles. Sa façade regardant sur la route est aveugle, de même que le rez-de-chaussée de celle qui est tournée vers l'usine hydro électrique, les baies de l'étage percées de ce côté comme celles des autres faces sont légèrement cintrées, elles n'appartiennent pas à la construction d'origine ; l'une de ces baies a fait disparaître l'année du siècle de la date portée sur l'une des faces; c'est Louis de Bridière, gouverneur de Guise qui a fait construire à ses frais le moulin de La Buissière en 1646.","architecture":"GUISE,verrou sur la vallée de l'Oise, , du Xe au XXe siècle, une forteresse au coeur des événements européens, rattachée aux grands du royaume. Au XVe siècle Jean de Luxembourg puis charles d'Anjpou restaurent l'édifice. À l'imposant château fort médiéval dominé par le donjon millénaire, les célèbres ducs de Guise feront succéder au XVIe siècle une des plus grandes places fortes bastionnées du nord de l'Europe. le donjon de brique sur soubassement de grès est voûté d'ogives au rez-de-chaussée ainsi qu'au deuxième étage. il a perdu les planchers de ses quatre étages et son toit conique en ardoise. L'enceinte de brique de forme triangulaire est toujours précédée à l'ouest de la demi-lune de secours (la demi-lune de terre ayant disparu), dans laquelle ouvre la porte de Paris. Le mur est animé du bastion de la Charbonnière au sud, et de ceux du Cavalier, de la Haute Ville et de l'Alouette au nord. Le bastion de la Haute Ville est percé à l'est de la porte de la Ville dont la rampe d'accès, protégée au nord par le mur du saillant de la Poterne, relie le château à la ville (rue de la Citadelle). Les galeries des bastions sont voûtées d'ogives ou en berceau plein cintre, et certains escaliers sont couverts de voûtes à ressauts.\nÉléments protégés MH : le donjon : classement par arrêté du 22 juillet 1924. Le château fort de Guise en totalité, comprenant l'enceinte fortifiée et son glacis (bastions de la Charbonnière, du Moineau, de la Haute ville et de l'Alouette, demi-lune de terre et de secours), les portes (porte de la Ville, porte des Carrosses et porte de Paris), le corps de garde, les premiers niveaux du Gouvernement, de la prison et de l'arsenal, ainsi que les soubassements de l'ancienne église collégiale Saint-Gervais et Saint-Protais, et l'ensemble des sous-sols et des sols archéologiques: classement par arrêté du 31 juillet 2008. depuis 20 ans le club du vieux manoir s'attache à le remettre en valeur.","habitants":"Maurice Duton\"","divers":"plusieurs châteaux à Guise dont les vestiges grav 1-2-3 la Buissière  Grav-4-5                                                   49° 53' 46? nord, 3° 37' 23? est2","gps":"","images":["../../jctruffet.com/image/image_02/02_Guise_1.jpg","../../jctruffet.com/image/image_02/02_Guise_2.jpg","../../jctruffet.com/image/image_02/02_Guise_3.jpg","../../jctruffet.com/image/image_02/02_Guise_4.jpg","../../jctruffet.com/image/image_02/02_Guise_5.jpg"]},"Consult_chateau_formulairedc78-2":{"id":"Consult_chateau_formulairedc78-2","dept":"02","canton":"Villers-Cotterêts","commune":"Largny-sur-Automne","nom":"Largny","type":"Château","periode":"XII-XV-XVI","histoire":"quatre châteaux dans cet article Largny, La  Cour, la Muette et Outhieux.                                                                                                                          LARGNY qui  a été construit au XVIe siècle pour la famille de Longueval, au XVIIIe siècle, la famille de Condren apporte des modifications aux constructions, la propriété et les bâtiments sont morcelés en 1793; les bâtiments restants ont subi des transformations dans la deuxième moitié du XIXe siècle, puis ils ont bénéficié de réparations à la suite des deux guerres du XXe siècle, actuellement seule une partie de la demeure a conservé sa destination première car les communs adaptés et mêlés à des constructions des XIXe et XXe siècles, servent de maisons. Château possédant des pièces voûtées d'arêtes au rez-de-chaussée ; il est protégé de toits à croupe et d'un toit en pavillon ; actuels communs avec toit à pignon couvert ; anciens communs avec toit en tuile mécanique à pignon découvert et pignon couvert ; tour isolée couverte d'un toit en pavillon en tuile plate.                                                                                                              Fief de la COUR, manoir construit à la fin du XVe siècle ou dans la première moitié du XVIe siècle, avec des parties agricoles dont il subsiste une partie de grange et des pans de murs; c'est peut être au XVIIe siècle qu'est agrandi le logis; de nouvelles constructions sont réalisées aux XIXe et XXe siècles et les bâtiments plus anciens sont modifiés; l'aile Est et la moitié de l'aile sud de la ferme primitive ont été détruites au XXe siècle. Logis avec toit à pignon couvert, en tuile plate et ardoise ; il est desservi par un escalier en vis en maçonnerie demi hors-oeuvre, couvert d'un toit polygonal en tuile plate; bâtiments agricoles avec un toit de tuile plate.","architecture":"La MUETTE, château présent depuis le XIIe siècle. Au milieu du XVIe siècle, transformation du château-fort en maison de plaisance. La création d'un parc et de jardins fait disparaître les élévations de la demeure médiévale. Au XIXe siècle, morcellement de la propriété et modifications dans le plan et les élévations. Le château de la Muette a conservé son implantation en surplomb ainsi que la majeure partie de son aménagement défensif étagé. Éléments protégés MH : le parc et le jardin du château, composé des vestiges de l'enceinte médiévale et de ses terrasses, des caves médiévales, des murs de soutènement, de clôture, des pavillons, de la tourelle d'angle, du colombier et des sols qu'ils renferment : inscription par arrêté du 27 décembre 2004.                                                                                                                                             Fief des OUTHIEUX  Le manoir du fief des Outhieux a été construit au XIVe siècle ; l'édifice bénéficie d'aménagements au XVIe siècle ; les parties agricoles sont construites ou reconstruites au XVIIe siècle ; l'angle sud-est de la ferme a été rebâti après 1914-1918 ; les étables situées au nord-est, qui menaçaient ruine ont été abattues après 1982. Logis coiffé d'un toit à pignon découvert, desservi par un escalier hors-oeuvre en maçonnerie en vis sans jour, avec toit polygonal d'ardoise ; les bâtiments agricoles ont dans leur majorité des toits à pignon découvert ; la tôle ondulée recouvre toute la partie sud-est de la ferme. Éléments protégés MH : le manoir du fief des Outhieux : inscription par arrêté du 30 mars 1990.","habitants":"Largny; Famille de Longueval\"","divers":"quatre châteaux dans cet article Largny grav-1, La  Cour, la Muette grav-2-3 et Outhieux.       Muette GPS : 49° 15' 40\" Nord, 3° 02' 31\" Est","gps":"49° 15' 40\" Nord, 3° 02' 31\" Est","images":["../../jctruffet.com/image/image_02/02_Largny_1.jpg","../../jctruffet.com/image/image_02/02_Largny_2.jpg","../../jctruffet.com/image/image_02/02_Largny_3.jpg"]},"Consult_chateau_formulairedda9":{"id":"Consult_chateau_formulairedda9","dept":"02","canton":"Laon","commune":"Parfondru","nom":"Lavergny","type":"Château","periode":"XVI","histoire":"LAVERGNY, du XIIe au XVIe siècle, la terre de Lavergny appartint à l'abbaye de Signy. Le château a été construit au XVIe siècle. Dans cette localité est sans doute née sainte Célinie, la mère de Saint- Rémy. Des seigneurs laïques, les de Renty, puis les du Merle l'achetèrent en 1569 et le possédèrent jusqu'en 1720, date à laquelle l'abbaye le reprit. Les derniers seigneurs 1603 : Pierre de Riencourt, chevalier, seigneur de Parfondru, la Croix et de Drosnay,\n1641 : François de Riencourt, chevalier, seigneur de Parfondru et de Drosnay, 1665 : François de Riencourt, écuyer, seigneur de Parfondru, de Drosnay et de Matau, 1678 : André de Vassault, lieutenant-colonel au régiment de la Mothe-Houdancourt, seigneur de Parfondru, 1705 : André de vassault, écuyer, seigneur de Parfondru,1706 : Jean-François de Vassault, écuyer, seigneur de Parfondru,1755 : Henri-François de Vassault, chevalier, seigneur de Parfondru et de la Simone, 1765 : Claude François de Vassault, chevalier, seigneur de Parfondru.","architecture":"LAVERGNY,  château de Lavergny datant du XVIe siècle remanié et transformé en ferme. Tour carrée avec échauguette et une longue galerie. Le rez-de-chaussée de la façade principale est garni de cinq arcades surmontées d'arcs surbaissés s'ouvrant sur une terrasse couverte ou une galerie. La façade postérieure est dotée d'une tour carrée enjolivée à l'un de ses angles d'une minuscule échauguette.","habitants":"Famille de Riencourt\"","divers":"Château de Lavergny à Profondu  gps 49° 31' 42? nord, 3° 42' 41? est","gps":"","images":["../../jctruffet.com/image/image_02/02_Lavergny_1.jpg","../../jctruffet.com/image/image_02/02_Lavergny_2.jpg"]},"Consult_chateau_formulaire5a8f":{"id":"Consult_chateau_formulaire5a8f","dept":"02","canton":"Guise","commune":"Leschelles","nom":"Leschelles","type":"Château","periode":"XVI-XVII","histoire":"LESCHELLES, château construit à la fin du XVIe siècle ou au début du XVIIe siècle pour le seigneur de cette commune. Il est reconstruit en 1767 et 1768 (un pavillon des communs et le portail de la ferme portent ces dates) par Jacques François Blondel pour Louis Michel César Le Cat d'Hervilly et son épouse Rose Adélaïde de Castille de Chenoise, passa par alliance aux Caffarelli, il appartient à ce jour à la comtesse de Caffarelli.","architecture":"LESCHELLES , il intègre dans sa maçonnerie une petite partie des soubassements, voire des élévations, du précédent château, dont les bâtiments excédentaires furent détruits. Une terrasse a été bâtie au XXe siècle contre la façade sud ouest. De nouvelles constructions ont pris place sur le côté sud de la ferme entre 1978 et 1982, château couvert de toits à longs pans et à croupes; les façades sont ornées de pilastres; communs couverts de toits à longs pans brisés entre deux pavillons couverts de toits en  croupes.","habitants":"Louis Michel César Le Cat d'Hervilly\"","divers":"Château de Leschelles  gps 49° 57' 34? nord, 3° 46' 18? est","gps":"","images":["../../jctruffet.com/image/image_02/02_Leschelles_1.jpg","../../jctruffet.com/image/image_02/02_Leschelles_2.jpg","../../jctruffet.com/image/image_02/02_Leschelles_3.jpg"]},"Consult_chateau_formulaire0431":{"id":"Consult_chateau_formulaire0431","dept":"02","canton":"Fère-en-Tardenois","commune":"Limé-Jouaignes","nom":"Limé_Jouaignes","type":"Château","periode":"XVI-XVII","histoire":"trois châteaux dans cet article Limé, Jouaignes et Virly                             LIME, ancienne propriété de M. de Saint-Marceau qui y avait rassemblé une curieuse collection d'antiquités recueillies dans la région. Le château de Limé a fortement souffert en 1918 et de grands travaux de restauration ont été accomplis ces dernières années. Il a dû être construit sous Henri IV par la famille de Wolbock qui fut longtemps propriétaire de la terre de Limé, cette famille possédait un château plus ancien qui n'était pas sur l'emplacement de l'édifice actuel et devait être près de l'église, où se trouve la ferme d'Applincourt qui présente une tour d'entrée sur encorbellement du XIVe siècle, accolée au logis du XVe siècle, où l'on remarque de belles fenêtres à meneaux cruciformes. Le château actuel consiste en un logis quadrangulaire, cantonné de quatre petits pavillons rectangulaires, dans une cour fermée sur trois côtés par des douves resserrées entre des murs d'escarpe et de contre-escarpe. Deux pavillons  cantonnent ce mur du côté de l'entrée où un pont de pierre donne accès. L'édifice est d'une homogénéité parfaite. C'est un château construit d'un seul jet sur un emplacement vierge de toute construction, selon un plan qui désormais deviendra classique. La construction du château de Limé date du XVI au XVIIe siècle. Restauré depuis dix ans, par Jean Paul et Catherine Gilbert, le château de Limé accueille de nombreux artistes.","architecture":"A deux K.M.  au sud  JOUAIGNES sa construction date de 1720 à 1750. Le château de Jouaignes a été bâti au XVIIIe siècle et fut remanié au XXe siècle. Le château de Jouaignes fut l'ancienne résidence de la famille de Châtillon, puis de la famille de Wolbocq, originaire du Duché de Gueldre. Le château de Joaignes a été classé partiellement aux M.H. depuis 21/12/1982. c'est un château privé et fermé au public mais il est visible de la route.                                                                                                                 VIRLY à Jouaignes village voisin à 1K.M au sud-ouest appelé aussi le domaine de Jouaignes . La construction du Château de Virly date du XVIIIe siècle, il est appelé aussi le domaine de Jouaignes est l'ancienne résidence de la Famille de Châtillon, puis de la Famille de Wolbock, originaire du duché de Gueldre. La reconstruction du château de Virly date du XIXe siècle avec un beau parc et de nombreux arbres ainsi qu'un pigeonnier original, et une pergola. C'est un château privé, fermé au Public. Il est inscrit partiellement aux M.H. depuis le 21/12/1982.","habitants":"Famille de Wolbock\"","divers":"Limé grav -1                                            GPS : 49° 19' 22' Nord, 3° 33' 22\" Est                                                        Jouaignes, Virly                                                     Grav-2  GPS : 49° 18' 03\" Nord, 3° 32' 16\" Est","gps":"49° 19' 22' Nord, 3° 33' 22\" Est","images":["../../jctruffet.com/image/image_02/02_Lim%c3%a9_Jouaignes_1.jpg","../../jctruffet.com/image/image_02/02_Lim%c3%a9_Jouaignes_2.jpg"]},"Consult_chateau_formulairebfcc":{"id":"Consult_chateau_formulairebfcc","dept":"02","canton":"Villers-Cotterêts","commune":"Louâtre","nom":"Louâtre","type":"Château","periode":"XV-XVI","histoire":"LOUATRE, à l'époque de sa construction, était sous la dépendance d'une seigneurie sans faste depuis le Moyen Age et morcelée depuis longtemps. C'est d'elle que Jean d'Estrées acquit le tiers de la seigneurie. La décoration de  boulets sur les fenêtres, atteste la présence du grand Maître de l'artillerie qui en abandonnera la construction avant  son achèvement afin d'entreprendre celle du château de Coeuvres.","architecture":"LOUATRE Il est de type château fort d dont la construction de Louâtre date du XV-XVIe siècle. Les bâtiments de la ferme ne seront construits qu'au XVIIIe siècle. Plusieurs bâtiments seront rebâtis après la première guerre mondiale.  Les pierres d'attente d'une aile, qui aurait dû être l'aile centrale, se voient contre la tour ainsi que sur une porte qui ne remplit jamais son rôle. Aujourd'hui, le château se compose d'un corps de logis rectangulaire flanqué d'une tourelle d'escalier, héritière des  tourelles octogonales des demeures du début du XVIe siècle, mais différente en ce sens que c'est un quadrilatère, coiffé d'une flèche en pierre en forme de pyramide. Le pignon nord du logis, présente deux fenêtres rectangulaires superposées, à meneau cruciforme. La frise de l'entablement est ornée de deux rangs de boulets et d'un petit au centre. Le grand intérêt de cette demeure réside dans l'originalité et l'élégance de sa décoration, très géométrique, très sobre, déjà assez classique. Elle permet d'identifier Jean d'Estrées, grand maître de l'artillerie au XVIe siècle et de dater approximativement la construction comme étant du XVIe siècle. Éléments protégés MH : les parties du XVIe siècle comprenant la façade Nord du corps de logis, la tour d'escalier, les deux cheminées : inscription par arrêté du 8 février 1928.","habitants":"Famille de Jean d'Estrées\"","divers":"Château de Louatre GPS : 49° 15' 27\" Nord 3° 14' 50\" Est","gps":"49° 15' 27\" Nord 3° 14' 50\" Est","images":["../../jctruffet.com/image/image_02/02_Lou%c3%a2tre_1.jpg","../../jctruffet.com/image/image_02/02_Lou%c3%a2tre_2.jpg"]},"Consult_chateau_formulaired286":{"id":"Consult_chateau_formulaired286","dept":"02","canton":"Villeneuve-sur-Aisne","commune":"Marchais","nom":"Marchais","type":"Château","periode":"XV-XVI","histoire":"MARCHAIS, fut construit par Nicolas de Longueval, comte de Bossut, surintendant des finances de François Ier, gouverneur de Champagne et de Brie. Le château fut acheté en 1854 par l'épouse du prince Charles III de Monaco, la princesse Antoinette de Monaco née Antoinette de Mérode Westerloo. Château de Marchais est la propriété de la famille Grimaldi de Monaco, appartient actuellement au Prince Albert de Monaco.  C'est dans cette propriété qu'en juin 1906, Maurice Léger s'installe pour mettre au point son prototype d'hélicoptère. Il décollera de 80 cm, avec un pilote à bord, le 13 juin 1907 et ses essais prometteurs s'arrêteront là.  La famille Grimaldi de Monaco. La princesse Charlotte de Monaco en est propriétaire.","architecture":"MARCHAIS  a été construit en 1540 très orné sur la cour d'honneur, plus sévère sur les façades extérieure du  quadrilatère, en brique  et pierre   se compose d'un vaste corps de logis précédé de deux ailes en retour, le tout flanqué de  quatre hauts pavillons d'angle                                                                     Entouré d'une exploitation céréalière de 700 hectares, Marchais est probablement l'uvre de l'architecte qui avait construit le château de Sissonne, édifié entre 1535 et 1541. Son plan est simple et fort rationnel. Un corps de logis principal avec facade au nord et au midi, flanqué à chaque extrémité de deux pavillons plus larges et plus hauts. Deux ailes en retour se terminent également par deux pavillons dont l'un comprend la chapelle à deux étages. Toute la construction est en brique avec encadrement des portes et des fenêtres en pierre. La décoration est réservée aux murailles de la cour intérieure.","habitants":"Famille Grimaldi de Monaco\"","divers":"Château de Marchais GPS : 49° 35' 04\" Nord, 3° 49' 03\" Est","gps":"49° 35' 04\" Nord, 3° 49' 03\" Est","images":["../../jctruffet.com/image/image_02/02_Marchais_1.jpg","../../jctruffet.com/image/image_02/02_Marchais_2.jpg","../../jctruffet.com/image/image_02/02_Marchais_3.jpg","../../jctruffet.com/image/image_02/02_Marchais_4.jpg","../../jctruffet.com/image/image_02/02_Marchais_5.jpg"]},"Consult_chateau_formulaire1b09":{"id":"Consult_chateau_formulaire1b09","dept":"02","canton":"Marle","commune":"Marfontaine","nom":"Marfontaine","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article, Marfontaine et St-Eloi  à Retheuil. MARFONTAINE, au XIIe siècle, ses seigneurs portant le nom du lieu, témoins dans des chartes importantes comme celle de Robert de Coucy accordant une commune aux habitants de Vervins. En 1433, Marfontaine passa dans la maison de Gérard de Fay d'Athies de Beaumont et y resta pendant cent quarante ans. Au début du XVIIe siècle la dernière héritière de ce nom, Marguerite de Fay, dite Mlle de Beaumont, fit relever le château, A appartenu par la suite aux Proisy, aux Hallencourt, marquis de Dromesnil, puis aux Noailles jusqu'en 1812. le fils issu de son mariage avec François de Proisy, Grand Sénéchal de Vermandois, prit le titre de marquis. En 1699, Françoise de Proisy épousa son cousin, Emmanuel Joseph de Hallencourt, capitaine de chevau-légers, l'une des filles nées de ce mariage hérita du château en 1788, elle épousa Emmanuel-Marie de Noailles, ambassadeur du Roi auprès des Provinces Unies, vend le château. La Révolution en fit le dernier seigneur de Marfontaine. propriété de la socièté immobilière de la rue Scheffer.","architecture":"MARFONTAINE  un château -fort existait, il fut pillé par les espagnols en 1636.  Le château de Marfontaine forme un rectangle. La moitié du château de Marfontaine sert d'habitation privée. L'autre moitié, sert d'exploitation agricole. Une partie est éboulée, en 1619 le château est rectangulaire entouré d'un mur d'enceinte avec contreforts et tourelles d'angle.  Un mur renforcé de contreforts flanqué à ses angles de tourelles rondes coiffées de toitures pyramidales clôt la propriété. Le château occupe toute la partie gauche de la cour, cet édifice rectangulaire a sur toute sa longueur une élévation à deux niveaux. Réalisé en brique et pierre, celle-ci étant réservée aux encadrements des fenêtres.   Éléments protégés MH : le logis, les bâtiments d'exploitation rurale ainsi que les vestiges de l'enceinte du château : inscription par arrêté du 13 octobre 1998.                                                                                                                                    SAINT-ELOI à, trois K.M. à l'ouest le  château est signalé dès le moyen âge, dont il reste des parties de la chapelle du XIIIe siècle ; la tourelle attenante et la chapelle Saint-Eloi isolée dans l'enclos sont peut-être bâties au XVIe siècle; au XVIIe sont élevés le colombier et une partie des bâtiments d'exploitation; la chapelle est remaniée en 1773; au XIXe siècle, le château sert de ferme, la chapelle est transformée en logis et un bâtiment est bâti à côté pour accroître la surface habitable. Au XXe siècle, les bâtiments d'exploitation ont été modifiés ou restaurés et la ferme a été dotée de nouveaux hangars et remises. Ancienne chapelle avec toit couvert en tuile plate tourelle attenante avec toit conique en zinc; le logis desservi par un escalier en oeuvre, avec toit à longs pans brisés à pignon couvert, en ardoise et en zinc; le colombier couvert d'un toit en pavillon en tuile plate; bâtiments agricoles desservis par un escalier dans-oeuvre, suspendu, avec toit à pignon couvert en tuile plate et tuile mécanique.","habitants":"Gérard de Fay d'Athies de Beaumont \"","divers":"Château de Marfontaine                    GPS : 49° 48' 01\" Nord, 3° 46' 25\" Est","gps":"49° 48' 01\" Nord, 3° 46' 25\" Est","images":["../../jctruffet.com/image/image_02/02_Marfontaine_1.jpg","../../jctruffet.com/image/image_02/02_Marfontaine_2.jpg","../../jctruffet.com/image/image_02/02_Marfontaine_3.jpg","../../jctruffet.com/image/image_02/02_Marfontaine_4.jpg"]},"Consult_chateau_formulaire25da":{"id":"Consult_chateau_formulaire25da","dept":"02","canton":"Essômes-sur-Marne","commune":"Marigny en Orxois","nom":"Marigny_en_Orxois","type":"Château","periode":"XIV-XV","histoire":"MARIGNY en ORXOIS  Maison-forte transformée au fil des siècles en demeure à vocation agreste et résidentielle : tours XIIe siècle, ailes XVe siècle et XVIIIe siècle. Seigneurie des Châtillon au XIVe siècle, puis aux Proisy et aux Hallencourt, passée à François Poisson, père de la marquise de Pompadour, elle revint à celle-ci, puis à son frère, le marquis de Marigny. A voir également les halles en bois construites au XVIIe siècle classées monument historique par arrêté du 7 février 1921.","architecture":"MARIGNY en ORXOIS,  Il est de style Moyen-Age. Cette ancienne maison forte fut transformée au cours des siècles, en une demeure résidentielle et agreste. On y voit son colombier, sa tour, sa cloture et élevation. Le château de Marign-en-Orxois est inscrit aux m.H. depuis 2003. C'est un château privé, fermé au Public.Éléments protégés MH : les façades et les toitures du château ; les tours du parc (le colombier et la petite tour); l'ancienne clôture du jardin.","habitants":"Famille de François Poisson\"","divers":"Château de Marigny                                     GPS : 49° 03' 41\" Nord, 3° 13' 29\" Est","gps":"49° 03' 41\" Nord, 3° 13' 29\" Est","images":["../../jctruffet.com/image/image_02/02_Marigny_en_Orxois_1.jpg","../../jctruffet.com/image/image_02/02_Marigny_en_Orxois_2.jpg","../../jctruffet.com/image/image_02/02_Marigny_en_Orxois_3.jpg"]},"Consult_chateau_formulaire30ed":{"id":"Consult_chateau_formulaire30ed","dept":"02","canton":"Villers-Cotterêts","commune":"Faverolles","nom":"Maucreux","type":"Château","periode":"XVIII-XIX-XX","histoire":"Deux châteaux dans cet article , Maucreux et Noroy à cinq K.M au sud-est                                                                                                                                     MAUCREUX, château rebâti vers 1678 pour le marquis d'Ô sur l'emplacement d'un château plus ancien, vers 1860, il est abattu et totalement reconstruit par son propriétaire ; détruit pendant la guerre de 1914 1918, il est reconstruit dans les années 1930-1935 pour la famille de Lubersac, tandis que les bâtiments du moulin sont réparés ; de ce moulin, il ne reste plus qu'un seul bâtiment actuellement en cours de restauration, dépourvu de machines.","architecture":"MAUCREUX, tandis que les bâtiments du moulin sont réparés; de ce moulin, il ne subsiste plus qu'un seul bâtiment actuellement en cours de restauration.   Édifice en pierre de taille calcaire desservi par un escalier dans oeuvre, avec toit d'ardoise à croupe, demi croupe, pignon découvert, toit conique, toit polygonal et en pavillon ; la chapelle a un toit brisé en pavillon belvédère en pierre de taille avec toit d'ardoise en pavillon ; communs en moellon de calcaire et grès à l'exception de la façade des remises en pierre de taille, et une maison de brique, leurs toits sont à croupe, pignon couvert ou pignon découvert ; le moulin en moellon de calcaire et grès, desservi par un escalier de distribution extérieur, droit, et couvert par un toit d'ardoise à pignons couverts et pignons découverts ; abri troglodytique avec roche en couvrement.                                                                                                                    NOROY sur OURCQ , le château de Noroy sur Ourcq et le colombier furent construits au XVIIe siècle ; le mémoire de l'instituteur signale que des communs sont construits aux alentours de 1876, le château a été détruit à la guerre de 1914-1918, il ne reste que le pigeonnier et les communs très restaurés ; après 1987 une maison à été construite sur l'emplacement du château. Pigeonnier en moellon de calcaire et grès couvert d'un toit polygonal ; château jadis couvert d'un toit à pignon couvert et de toits à deux pans et à croupe.\nélévation à travées, à deux étages carrés  en  calcaire, grès, moellon, toit polygonal, toit à deux pans, toit à longs pans, pignon couvert, croupe couvert de  tuile plate.","habitants":"famille de Lubersac\"","divers":"Deux châteaux dans cet article , Maucreux  grav-1-2                                    Gps 49° 13' 25? nord, 3° 10' 35? est et Noroy Grav_3-4 -à cinq K.M au sud-est","gps":"","images":["../../jctruffet.com/image/image_02/02_Maucreux_1.jpg","../../jctruffet.com/image/image_02/02_Maucreux_2.jpg","../../jctruffet.com/image/image_02/02_Maucreux_3.jpg","../../jctruffet.com/image/image_02/02_Maucreux_4.jpg"]},"Consult_chateau_formulaire18aa":{"id":"Consult_chateau_formulaire18aa","dept":"02","canton":"Villeneuve-sur-Aisne","commune":"Mauregny en Haye","nom":"Mauregny","type":"Château","periode":"XVII","histoire":"MAUREGNY, château reconstruit au début du XVIIe siècle par la famille de Proisy. Propriétaires :  Charles de Marolles en 1680  famille de Miremont en 1744.  Mauregny est abandonné en 1763 et se dégrade. En 1796 Jean-François Lorrain achète les ruines et fait restaurer quelques bâtiments.","architecture":"MAUREGNY, seule l'aile droite avec son pavillon central fut sauvée ainsi quune tour de l'aile gauche. Le château de Mauregny a été reconstruit au début du XVIIe siècle. Il ne subsiste plus que l'aile droite qui fut restaurée par la famille Lorain. Elle a conservé son pavillon central à la toiture élevée avec une tour d'angle. Une tourelle marque la place de l'aile gauche. Cette tour et cette tourelle ont été inscrites à l'inventaire supplémentaire des Monuments Historiques par arrêté du 30 mai 1928. Les Proisy et les Marolles furent les seigneurs de Mauregny aux XVIIe et XVIIIe siècles.","habitants":"Famille de Miremont \"","divers":"Château de Mauregny                               gps 49° 31' 46? N, 3° 47' 53? E","gps":"","images":["../../jctruffet.com/image/image_02/02_Mauregny_1.jpg"]},"Consult_chateau_formulaire337a":{"id":"Consult_chateau_formulaire337a","dept":"02","canton":"Villers-Cotterêts","commune":"Vivières","nom":"Mazancourt","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article, Mazancourt et Vivières. MAZANCOURT, il subit une complète réfection à l'exception d'une tourelle qui est conservée; un colombier est édifié en 1721, porte la date, d'après un historien régional, des parties agricoles; l'aile nord de ces bâtiments agricoles, et une petite demeure à l'est du château, représentées , ont été détruites postérieurement, à une date inconnue; dans le premier quart du XXe siècle, les propriétaires successifs du château, dont l'écrivain Henri Bataille, y ont apporté des modifications ; c'est alors que furent édifiées dans le parc une étable en forme de hutte, destinée à des lamas et deux rangées de colonnes doriques.                                                                                           VIVIERES, appartient au comte d'Artois jusqu'au XVIe siècle, à l'abbé de Valsery et aux Mazancourt de 1564 à la Révolution. Le château fort de Vivières a été construit par les seigneurs de La Ferté Milon. Le château et la ferme de l'Epine furent vendus comme biens nationaux à la Révolution. Château bâti sur une terrasse à laquelle on accède par un escalier isolé en équerre en maçonnerie et donnant sur un parc dans lequel se trouve un escalier droit isolé. Il comprend un sous-sol voûté en berceau, un étage carré desservi par un escalier dans oeuvre tournant à retours avec jour en maçonnerie, et un étage de comble. Il est couvert de toits à croupe, de toits en pavillon et d'un toit polygonal ; colombier en moyen appareil, couvert d'un toit polygonal en tuile plate l'aile Est des communs construite en moellon couverte d'un toit à croupe et pignon découvert, d'un toit à demi croupe et pignon couvert, principalement en tuile plate; fabrique de jardin consistant en 28 colonnes toscanes en brique masquée par un enduit; étable pour les lamas en bois et torchis couverte d'un toit polygonal en tuile plate.","architecture":"MAZANCOURT, château bâti sur une terrasse à laquelle on accède par un escalier isolé en équerre en maçonnerie et donnant sur un parc dans lequel se trouve un escalier droit isolé. Il comprend un sous-sol voûté en berceau, un étage carré desservi par un escalier dans oeuvre tournant à retours avec jour en maçonnerie, et un étage de comble. Il est couvert de toits à croupe, de toits en pavillon et d'un toit polygonal ; colombier en moyen appareil, couvert d'un toit polygonal en tuile plate aile Est des communs construite en moellon couverte d'un toit à croupe et pignon découvert, d'un toit à demi croupe et pignon couvert, principalement en tuile plate; fabrique de jardin consistant en 28 colonnes toscanes en brique masquée par un enduit; étable pour les lamas en bois et torchis couverte d'un toit polygonal en tuile plate.inscription par arrêté du 30 avril 1982.   date du XVIe siècle. C'est un ancien château fort bâti du XVIe siècle, XVIIIe siècle. C'est une demeure de plaisance. Il fut complètement refait, au XVIIIe siècle, à l'exception d'une tourelle conservée. Les remises et granges dateraient de 1794. L'aile nord des bâtiments agricoles et une demeure à l'est du château auraient été détruites après 1835. : édification dans le parc d'une étable en forme de hutte, et une fabrique de jardin consistant en 28 colonnes toscanes en brique masquée par un enduits. De 1930 à 1960, le château de Mazancourt est utilisé comme ferme. Il a appartenu à la Famille de Mazancourt jusqu'à la Révolution, où il fut vendu comme bien national. Le château de Mazancourt est inscrit aux M.H. depuis 1982.","habitants":"Famille de l'écrivain Henri Bataille                          Vivières . Famille de Mazancourt     \"","divers":"Vivières GPS : 49° 18' 03\" Nord, 3° 05' 58\" Est","gps":"49° 18' 03\" Nord, 3° 05' 58\" Est","images":["../../jctruffet.com/image/image_02/02_Mazancourt_1.jpg","../../jctruffet.com/image/image_02/02_Mazancourt_2.jpg","../../jctruffet.com/image/image_02/02_Mazancourt_3.jpg","../../jctruffet.com/image/image_02/02_Mazancourt_4.jpg"]},"Consult_chateau_formulaireae4d":{"id":"Consult_chateau_formulaireae4d","dept":"02","canton":"Villeneuve-sur-Aisne","commune":"Missy les Pierrepont","nom":"Missy","type":"Château","periode":"XVI-XIX","histoire":"Deux châteaux dans cet article, Missy  et Marchecourt.                                                                                                               MISSY château moderne, gîte rural. Quelques seigneurs du village de Missy: en 1132 : Renaud Bidane, seigneur de Missy qui le tenait en fief de Blihard de Pierrepont ; 1180-84 : Nicolas de Missy et sa femme, Brigide ;  1222 : Guillaume de Missy et sa femme Feanne ;  milieu XIIe siècle : Gobert, écuyer de Missy ;   1259 : son fils Gobert II de Missy et sa femme, Mathilde ;   1381 : Isabelle, comtesse de Roucy, dame de Missy entre autres ;   début XVIIe siècle : Charles de Mérélessart, écuyer et seigneur de Missy et sa femme, Marguerite Brisbard ; au milieu XVIIe siècle : Jean de Mérélessart, fils du précédent et écuyer, et sa femme, Blanche de Pavant ;   1660 : Jean II de Mérélessart, seigneur de Missy et de La Neuville-sous-Laon et sa femme, Charlotte Pétré ayant eu comme enfants Louis et Louise ; 1685 : Louis de Mérélessart, écuyer, seigneur de Missy. sa femme, Françoise-Elizabeth Carlier. Leur fille Marguerite-Henriette-Louise apporta Missy en mariage à Louis d'Y alors écuyer vers 1700, il était seigneur de Seboncourt ;   1725 : César-Louis d'Y, écuyer, fils des précédents, seigneur de Missy et sa femme, Louise-Elizabeth Levent ; le dernier seigneur de Missy fut le marquis Rogres de Champignelle qui émigra en 1790.","architecture":"MACHECOURT , château dit du Marais appelé Deperdussin construit par l'aviateur Deperdussin en 1910. Aujourd'hui reservé pour la chasse, bâtisse de plan rectangulaire  de brique et de pierre, le pavillon central saillant à deux niveaux et lucarne sur chien assis sur la toiture couvert de tuiles.","habitants":"Jean II de Mérélessart\"","divers":"Deux châteaux dans cet article, Missy grav-1-2  et Marchecourt grav 3-4-5. et Marais grav-6                       Missy GPS : 49° 38' 00\" Nord, 3° 47' 14\" Est","gps":"49° 38' 00\" Nord, 3° 47' 14\" Est","images":["../../jctruffet.com/image/image_02/02_Missy_1.jpg","../../jctruffet.com/image/image_02/02_Missy_2.jpg","../../jctruffet.com/image/image_02/02_Missy_3.jpg","../../jctruffet.com/image/image_02/02_Missy_4.jpg","../../jctruffet.com/image/image_02/02_Missy_5.jpg","../../jctruffet.com/image/image_02/02_Missy_6.jpg"]},"Consult_chateau_formulaire97e6":{"id":"Consult_chateau_formulaire97e6","dept":"02","canton":"Essômes-sur-Marne","commune":"Montfaucon","nom":"Montfaucon_Aisne","type":"Château","periode":"XVII","histoire":"Deux châteaux dans cet article, Doultre et Rozoy,                           DOULTRE; le village existe déjà à l'époque Gallo-Romaine (un ancien four à potier datant de cette période, est mis à jour lors de la réfection d'un mur du cimetière).  Les guerres de religion apportent leur lot de souffrance. En 1652, durant la Fronde, l'occupation de la Champagne et de la Brie par les troupes du duc de Lorraine, Charles de Vaudémont (1604/1675) laisse d'atroces souvenirs. Par contre, la Révolution Française de 1789 n'a pas laissé beaucoup de traces.\nSous le Premier Empire, Montfaucon est marqué par la bataille des Caquerêts. monsieur Charles Henri de Tillancourt (1775/1834), maire de Montfaucon, se distingue particulièrement pendant la campagne de France. La nuit du 11 au 12 février 1814, après la bataille de Marchais, les débris de l'armée russe, sous les ordres du général Fabian Gottlieb von Osten-Sacken (1752/1837), rejoignent, sur le plateau des Caquerêts, les prussiens du général Johann David Ludwig Yorck von Wartenburg (1759 /1830), regroupés aux fermes des Noues et des Simons de l'ancienne chaussée Brunhaut. Charles de Tillancourt rassemble alors les volontaires de Montfaucon, fait la chasse aux fuyards et conduit de nombreux prisonniers à Château-Thierry. Une stèle est placée devant léglise. En 1814, il n'y a pas d'occupation du château. En 1904, François Joseph Fournier, propriétaire de la Doultre, creuse des étangs à eau courante dans le Dolloir pour la pêche et établit une chute deau alimentant une turbine qui produit lélectricité pour le château et Vifforteau.","architecture":"DOULTRE, sur un autre canal, il fait ramasser de la glace que lon amène par petits wagonnets dans une glacière mi-souterraine, et fait de nombreux travaux dans le château et dans les fermes. En 1914, les allemands, les français puis sur la fin les américains sinstallent   dans le château. En 1939, les français passent, les allemands l'occupent 6 mois causant de nombreux dommages puis enfin larmée du général George Smith Patton (1885/1945). Il faut reconstruite le château, mais il nest pas complètement détruit. Ancienne demeure des seigneurs de Montfaucon et dEssises, la famille de Tillancourt, construit au XVIe siècle, est remanié plusieurs fois. Un grand portail en fer forgé souvre sur une vaste cour de gravier, devant le château édifié en longueur. La partie centrale haute, avec ses deux tours carrées couvertes dardoises, côté parc, est du XVIIIe siècle, et plus ancienne que les ailes allongées, qui sont ajoutées fin XVIIIe, début XIXe siècle.  Les boiseries du salon sont d'époque Louis XVI, celles de la salle à manger d'époque Louis V comme la fontaine en marbre gris provenant de léglise de Viffort au moment de la séparation de lEglise et de lEtat.                                                                                                                                                                                ROZOY  Le château de Rozoy s'est appelé, à la Révolution, le château de Rozoy-Gatebleb puis le château de Rozoy-en-Brie, qui se trouve bâti à Rozoy-Bellevalle. Il date du XVIIe siècle. On aperçoit dans son parc des cerfs et des daims qui y vivent en liberté.  Un autel fut donné à Saint-Jean-des-Vignes par Hugues de Château-Thierry, en 1076,  fut la demeure du comte de La Vaulx, écrivain et ami de Jules Verne, mais aussi pionnier de l'aviation, ami de Jean Mermoz avec lequel il effectua la traversée de la Cordillère des Andes. Il fut le créateur de la marque \"Zodiac\" qui fabriquait à l'époque des ballons dirigeables. Le parc de ce manoir est peuplé d'un élevage de daims et de cerfs.","habitants":"Monsieur Charles Henri de Tillancourt \"","divers":"Deux châteaux dans cet article, Doultre grav-1-3 et Rozoy grav-2   GPS : 48° 55' 25\" Nord, 3° 27' 22\" Est","gps":"48° 55' 25\" Nord, 3° 27' 22\" Est","images":["../../jctruffet.com/image/image_02/02_Montfaucon_Aisne_1.jpg","../../jctruffet.com/image/image_02/02_Montfaucon_Aisne_2.jpg","../../jctruffet.com/image/image_02/02_Montfaucon_Aisne_3.jpg"]},"Consult_chateau_formulaire15be":{"id":"Consult_chateau_formulaire15be","dept":"02","canton":"Villers-Cotterêts","commune":"Mongobert","nom":"Montgobert","type":"château","periode":"XVI","histoire":"MONTGOBERT,au XVIe siècle entre dans la famille de Joyeuse . Il a aussi été la propriété du Général Leclerc et de son épouse, Pauline Bonaparte, veuve, Pauline s'est remarié à Camille Borghèse, un Prince italien. Il délaissera ensuite le château de Montgobert qui ira,  quelques années plus tard, aux mains des frères et surs de son premier mari. Le maréchal de France, Louis Nicolas Davout, époux de Louise Leclerc, fut lunique propriétaire de Montgobert, dès 1821. En 1831 la marèchale Davout  vend le château à son gendre le comte de Cambacérès. Durant les années suivantes, plusieurs personnages de grandes familles de la noblesse d'Empire, comme Raoul-Napoléon Suchet, duc d'Alburera, vécurent à Montgobert. Le général Lelerc repose depuis dans le parc du château de Montgobert. Son propriétaire actuel est le Duc d'Albufera. A Montgobert, vous serez séduit, par son architecture, véritable archétype du classicisme, que par la magie s'échappant du parc. Le parc a été conçu, par Achille Duchêne, paysagiste attitré de la haute société, à la fin du XIXe siècle et à la Belle Époque.Il appartient de nos jours au Duc d'Albufera et abrite le musée du bois et de l'outil. Le château de Montgobert est, depuis peu, ouvert aux réceptions privées de mai à octobre, il dispose aussi de plusieurs salles dexposition consacrée à la guerre 1914-1918. Ces salles situent la forêt en tant que la zone des armées et présentent la vie dun village de larrière, est inscrit aux M.H. depuis 1978.","architecture":"MONTGOBERT, château et ferme construits pour Antoine-Pierre Desplasses, de 1768 à 1775, à l'emplacement d'un manoir médiéval et de sa ferme; le Général Leclerc, entre 1798 et 1802, fait rehausser le château d'un étage en attique et remplacer le parterre à la française par un jardin paysager ; après la mort de Leclerc en novembre 1802, l'architecte Pierre Fontaine lui dessine un tombeau, qui sera élevé au fond du parc, son décor sculpté, confié en 1804 à un nommé Laudier, est resté inachevé, les communs sont bâtis dans la première moitié du XIXe siècle, avant 1831 (date d'un terrier sur lequel ils figurent), les deux pavillons d'entrée sont aussi du XIXe siècle, mais postérieurs à 1835 , après sa destruction en 1905, plusieurs bâtiments de la ferme ont été détruits ou modifiés dans la deuxième moitié du XXe siècle, le château, entouré d'un simple parc, renferme actuellement le musée européen du bois et de l'outil, inauguré en 1974. Château édifié en moyen appareil desservi par un escalier d'honneur dans-oeuvre, tournant à retours avec jour, suspendu, en maçonnerie, et deux escaliers de service dans-oeuvre, en vis avec jour, en maçonnerie, il est couvert d'une toiture d'ardoise composée d'un toit à croupe et de toits en pavillon,  pavillons d'entrée en moyen appareil, couverts d'un toit à croupe en ardoise, bâtiment sud des communs en moyen appareil pour les élévations nord et Est, et en moellon pour les élévations sud et ouest, couvert d'un toit d'ardoise avec un pignon, bâtiment ouest des communs en moyen appareil, couvert d'un toit d'ardoise à croupe, bâtiments de ferme en moellon à l'exception du logis en moyen appareil,  le logis est desservi par un escalier dans-oeuvre tournant à retours sans jour dont la première volée est en maçonnerie et la deuxième en charpente.","habitants":"Famille de Joyeuse et  le comte de Cambacérès .\"","divers":"Château de Montgobert                             GPS : 49° 18' 35,46\" Nord, 3° 8' 39,01\" Est","gps":"49° 18' 35,46\" Nord, 3° 8' 39,01\" Est","images":["../../jctruffet.com/image/image_02/02_Montgobert_1.jpg","../../jctruffet.com/image/image_02/02_Montgobert_2.jpg","../../jctruffet.com/image/image_02/02_Montgobert_3.jpg"]},"Consult_chateau_formulaire8fa9":{"id":"Consult_chateau_formulaire8fa9","dept":"02","canton":"Marle","commune":"Neuville_Bosmont","nom":"Neuville_Bosmont","type":"Château","periode":"XVII","histoire":"NEUVILLE-BOSMONT,  Richemont était un fief et un château situé sur le territoire de la commune de La Neuville-Bosmont. Le nom est cité pour la première fois en 1270 : Ruichemont, Ruschemont, Ruissemont, Ecclesia Sancte Marie Magdelena de Roucemont.\nLe manoir seigneurial était au lieu-dit le Bas-Lieu.\nRichemont formait autrefois avec Certeau une paroisse sous le vocable de Sainte-Marie-Madeleine. Cette ferme a été unie à La Neuville-Bosmont par arrêté du 17 novembre 1791                                      La seigneurie de la Neuville-Bosmont a été fondée au XVIe siècle par la famille Longueval, mais, dès 1543, par échange, elle est passée aux Fay d'Athies, grande famille d'origine picarde. André de Fay d'Athies rebâtit en 1736 le château seigneurial; à sa mort, il revint à sa fille qui avait épousé le marquis de Béthune, veuve depuis 1789, elle mourut pendant la Terreur en 1794 et les biens furent alors saisis par moitié parce que le fils issu de cette union avait émigré. Le château fut acquis par François Topin de Renneval qui fit abattre les ailes. En 1882, il revint à Léon Vitcocq qui fit procéder aux restaurations qui s'imposaient de façon urgente.","architecture":"NEUVILLE-BOSMONT, le château est constitué d'un corps de logis rectangulaire en brique et pierre. Du côté de la façade principale, la pierre a été réservée au soubassement, au cordon horizontal séparant les deux niveaux de l'élévation et celui qui court au sommet des murs, aux encadrements formant harpe des fenêtres légèrement cintrées, et au décor de l'avant-corps légèrement saillant qui forme l'axe central. Cet avant-corps est couronné par un grand fronton triangulaire réalisé en brique. Sa partie centrale a été recouverte d'une sorte de crépi. Le château a conservé dans sa partie droite, vers l'arrière, un bel escalier en bois. En avant du château, subsiste un magnifique parc.                                          Le château Fondation Savart est le siège d'un Institut médico-professionnel et section autiste. Ce château, rebâti en 1736, n'est pas fortifié et présente l'aspect d'une vaste demeure à deux étages.","habitants":"Famille Longueval\"","divers":"Château de Neuville grav 1 Savart grav 2-3                                                          Gps 49° 42' 49? nord, 3° 50' 25? est","gps":"","images":["../../jctruffet.com/image/image_02/02_Neuville_Bosmont_1.jpg","../../jctruffet.com/image/image_02/02_Neuville_Bosmont_2.jpg","../../jctruffet.com/image/image_02/02_Neuville_Bosmont_3.jpg"]},"Consult_chateau_formulaire8bc2":{"id":"Consult_chateau_formulaire8bc2","dept":"02","canton":"Villeneuve-sur-Aisne","commune":"Nizy le comte","nom":"Nizy_le_Comte","type":"Manoir","periode":"XVIII","histoire":"NIZY LE COMTE,  Chateau de Nizy-le-Comte avait été créé en 1972, par Jean Julien.  Dans la commune, on l'appelle le chateau du comte de Nizy. Il ressemble à ces châteaux de contes de fée, situé aux portes de la Champagne, au calme d'un petit village. Le Château de Nizy-le-Comte est le cadre idéal pour la réussite de vos événements professionnels et privés. Vous serez enchantés par le style XVIIIe du château et par son confort moderne.","architecture":"NIZY LE COMTE,  corps de logis de plan rectangulaire à deux niveaux sur soubassements, avec superbe lucarnes dont la centale est jumenées  ses lignes sont harmonieuses, avec double baies accolés sur la droite d'une tour ronde à toits en poivrières, à l'opposée à gauche pavillon saillant. Ses couleurs claires éclatent sous le soleil, de façon splendides, au milieu d'un cadre de verdure. Il possède un très bel escalier.","habitants":"Jean Julien  comte de Nizy. \"","divers":"Château de Nizy le comtte GPS : 49° 34' 10\" Nord, 4° 03' 20\" Est","gps":"49° 34' 10\" Nord, 4° 03' 20\" Est","images":["../../jctruffet.com/image/image_02/02_Nizy_le_Comte_3.jpg"]},"Consult_chateau_formulaire7beb":{"id":"Consult_chateau_formulaire7beb","dept":"02","canton":"Guise","commune":"Nouvion-en-Thiérache","nom":"Nouvion","type":"Château","periode":"XVIII","histoire":"NOUVION, construit entre 1853 et 1856 pour la société Seillière qui venait de racheter le domaine de Guise. Il doit abriter les bureaux de l'administration forestière du domaine, l'édification de la métairie du château peut être placée vers 1860, le domaine rentre dans les biens du duc d'Aumale en 1872, vers la fin du XIXe siècle est construit dans le parc une maison de maître, dite le petit château, pour le directeur du domaine , la propriété a appartenu aux héritiers du duc d'Aumale jusqu'en 1980, et c'est au château qu'est né l'actuel comte de Paris en 1908; après 1945, un incendie a détruit la toiture du petit château qui a été modifiée; en 1980 le château a été vendu à la ville de Roubaix qui en a fait un centre d'accueil pour enfants; le parc, l'étang et le petit château ont été vendus à la ville du Nouvion en 1986; le parc et l'étang abritent un complexe sportif et de loisirs, et le petit château un magasin de commerce. La métairie sert de maison pour un administrateur de la compagnie forestière du Nouvion.","architecture":"NOUVION, le château est construit sur un plan symétrique en U ; il possède un sous sol voûté en brique, un rez de chaussée surélevé, un étage carré et un étage en surcroît; ces niveaux sont desservis par un escalier symétrique, des escaliers tournants dans-oeuvre et des escaliers hors-oeuvre en vis avec jour, tous en charpente ; le château est couvert de toits à longs pans, parfois avec demi-croupe, de toits en pavillon et d'un toit à deux pans et croupe; le logement du concierge et celui du jardinier à l'entrée sont couverts d'un toit brisé en pavillon ; le bâtiment à usage de remise, écurie et logement est couvert d'un toit à deux pans et croupe ; le logement du directeur du centre, en rez de chaussée avec comble à surcroît, est couvert ainsi que sa remise d'un toit à pignon couvert en ardoise synthétique; le petit château, desservi par un escalier tournant, avait à l'origine un toit à deux pans brisés et à croupe brisée et un toit à deux pans et croupe polygonale.","habitants":"Famille du duc d'Aumale\"","divers":"Trois châteaux à nouvion dont celui de  Nouvion grav 1-2-3-4 et bellevue grav 5-6                                              GPS : 50° 01' 05\" Nord, 3° 47' 09\" Est","gps":"50° 01' 05\" Nord, 3° 47' 09\" Est","images":["../../jctruffet.com/image/image_02/02_Nouvion_1.jpg","../../jctruffet.com/image/image_02/02_Nouvion_2.jpg","../../jctruffet.com/image/image_02/02_Nouvion_3.jpg","../../jctruffet.com/image/image_02/02_Nouvion_4.jpg","../../jctruffet.com/image/image_02/02_Nouvion_5.jpg","../../jctruffet.com/image/image_02/02_Nouvion_6.jpg"]},"Consult_chateau_formulaire4377":{"id":"Consult_chateau_formulaire4377","dept":"02","canton":"Villers-Cotterêts","commune":"Oigny en Valois","nom":"Oigny_en_Valois","type":"Château","periode":"XVI-XVII-XIX","histoire":"Deux châteaux dans cet article Oigny et Silly la Potherie.                           OIGNY en VALOIS, on possède des informations fragmentaires sur les propriétaires du château d'Oigny, en 1445 dans la famille de Vendoeuvre de ses origines jusqu'au milieu du XVIIe siècle. A partir de cette époque, l'identité de chacun et de nombreux détails les concernant sont connus, en particulier le général Charpentier et son fils qui furent propriétaires des lieux au début du XIXe siècle. Et c'est en rassemblant tous ces éléments que nous pouvons imaginer comment on a vécu à Oigny au fil du temps. Le château aurait été construit autour de 1500 par un maître d'oeuvre dont le travail architectural présente des similitudes avec celui du château du Plessis Brion, situé juste au nord de Compiègne, on sait de source historique que le châtelain d'Oigny s'est rendu à un mariage en 1512 au château de Plessis Brion, offrant ainsi une nouvelle piste à creuser à ceux qui veulent résoudre ce mystère.  Aujourd'hui à la famille Pétrel qui l'ouvre à la visite.                                                                           A cinq K.M au sud à SILLY la POTHERIE  chateau de SILLY , La construction date du XIXe siècle. Le dernier Seigneur fut M. De Vuillefroy. Silly est devenu un hôtel-restaurant qui vous propose aussi des chambres d'hôtes dans un parc de 5 hectares. Les monuments du village soufrirent des combats,en sept 2014, à cause de l'armée allemande qui avait pénétré au coeur de la forêt de Retz","architecture":"OIGNY en VALOIS, le château d'Oigny est considéré comme le plus ancien des nombreux châteaux seigneuriaux. Son architecture est contemporaine du règne de Louis XII qui fut roi de 1498 à 1515 et il est le seul de la région entièrement construit en brique. Un style qui le place au confluent du Moyen-Age et de la Renaissance. Les pigeonniers sont pourvus d'arbalétières qui n'ont certes jamais servi mais qui témoignent d'un passé féodal et belliqueux. D'ailleurs les plafonds voûtés, que l'on découvre dans les sous sols, sont les vestiges du château médiéval original détruit au XIVe siècle durant la guerre de cent ans. Le bâtiment élégant que nous voyons aujourd'hui n'a pas été bâti pour la guerre. Sa construction au début du XVIe correspond à une époque plus pacifique où les propriétaires voulaient profiter des joies de la chasse dans les forêts des alentours.  Construit en pierre avec brique en remplissage desservi par un escalier demi hors-oeuvre en vis sans jour en maçonnerie ; toit d'ardoise à pignon découvert avec toit conique sur les tourelles et toit polygonal sur l'escalier ; colombiers en pierre avec brique en remplissage couverts d'un toit polygonal d'ardoise ; ouvrage d'entrée en moyen appareil calcaire desservi par un escalier hors-oeuvre en vis en maçonnerie ; toit en pavillon et toit conique en ardoise ; lavoir en moyen appareil calcaire avec toit d'ardoise à pignon couvert.  Éléments protégés MH : le corps de logis principal, le pavillon d'entrée, les deux tours polygonales de l'ancienne enceinte : inscription par arrêté du 8 février 1928. Les communs : inscription par arrêté du 30 mars 1990.","habitants":"Famille de Vendoeuvre  et le général Charpentier \"","divers":"Deux châteaux dans cet article Oigny et Silly la Potherie grav-7.  GPS : 49° 13' 12\" Nord, 3° 08' 15\" Est                                                                  Silly   GPS : 49° 11' 52\" Nord, 3° 08' 53\" Est","gps":"49° 13' 12\" Nord, 3° 08' 15\" Est","images":["../../jctruffet.com/image/image_02/02_Oigny_en_Valois_1.jpg","../../jctruffet.com/image/image_02/02_Oigny_en_Valois_2.jpg","../../jctruffet.com/image/image_02/02_Oigny_en_Valois_3.jpg","../../jctruffet.com/image/image_02/02_Oigny_en_Valois_4.jpg","../../jctruffet.com/image/image_02/02_Oigny_en_Valois_5.jpg","../../jctruffet.com/image/image_02/02_Oigny_en_Valois_6.jpg","../../jctruffet.com/image/image_02/02_Oigny_en_Valois_7.jpg"]},"Consult_chateau_formulaire1f17":{"id":"Consult_chateau_formulaire1f17","dept":"02","canton":"Fère-en-Tardenois","commune":"Paars","nom":"Paars","type":"Château","periode":"XVI-XVIII-XIX-XX","histoire":"Deux châteaux dans cet article, Paars et Révillon .                            PAARS, le château de Paars a été construit dans la 2ème partie du XVIIIe et du XIXe siècle. Il est de style Louis XV et possède un toit à la Mansart. Le château de Paars appartenait, à la fin du XVIIe siècle, à la famille Grimberg. En 1796, et fut racheté par un nouveau propriétaire Louis Resnier, ensuite par Siéyès, qui le conservera, de 1800 à 1804    Le propriétaire actuel du château de Paars est le vicomte Dauger.                                                                                              A cinq K.M. au Nord-Est  REVILLON, la construction du manoir de Révillon date du XVIe siècle. Le manoir de Révillon est un manoir qui possède de nombreux éléments remarquables (cheminées en pierre, escalier en pierre, tourrette). Foncier négociable et défiscalisation sur façades et toitures. Possibilité d'agrandissement avec une grange en pierre de 600 m² à côté et grand terrain pour un prix dérisoire. Le manoir de Révillon est inscrit aux M.H. depuis 1927.","architecture":"PAARS, un portail de pierre en demi lune est prolongé de l'allée qui conduit au château dont les façades ordonnancées sous comble brisé sont caractéristiques de l'architecture classique. Perpendiculaires à l'axe du château, les communs s'élèvent au fond de la basse-cour, fermée d'une grille centrale et d'un mur bahut. Deux ailes basses, flanquant le colombier central de plan carré, abritent la grange d'une part, ies écuries et la remise d'autre part, cet ensemble constitue l'exemple le plus abouti de communs de châteaux ou de fermes seigneuriales des XVIIe et XVIIIe siècles en Soissonnais. Un portail de pierre, en demi-lune, avec chasse-roues est prolongé de l'allée qui mène au château dont les façades ordonnancées sous comble brisé sont caractéristiques de l'architecte classique. Perpendiculaires à l'axe du château, les communs s'élèvent au fond de la basse-cour, fermée d'une grille centrale et d'un mur-bahut. Deux ailes basses, flanquant le colombier central de plan carré, abritent la grange d'une part, les écuries et la remise d'autre part.\nÉléments protégés MH : les façades et les toitures du château, l'escalier intérieur avec sa rampe, le lavoir en totalité: inscription par arrêté du 11 juin 1980. Les communs comprenant la basse-cour avec son mur et sa grille de clôture, les façades et les toitures des bâtiments formant le colombier, la grange, la remise, l'écurie et la maison dite du jardinier, le portail d'entrée avec sa grille, sa demi-lune et ses chasse-roues, ainsi que le mur de clôture, le jardin : inscription par arrêté du 14 octobre 2002.","habitants":"Paars   Famille de Louis Resnier\"","divers":"Deux châteaux dans cet article, Paars grav-1-2 et Révillon grav-3.    Paars  GPS : 49° 19' 41\" Nord, 3° 35' 52\" Est                                                              Révillon GPS : 49° 21' 57\" Nord, 3° 41' 59\" Est","gps":"49° 19' 41\" Nord, 3° 35' 52\" Est","images":["../../jctruffet.com/image/image_02/02_Paars_1.jpg","../../jctruffet.com/image/image_02/02_Paars_2.jpg","../../jctruffet.com/image/image_02/02_Paars_3.jpg"]},"Consult_chateau_formulaireaa2a":{"id":"Consult_chateau_formulaireaa2a","dept":"02","canton":"Villeneuve-sur-Aisne","commune":"Pancy-Courtecon","nom":"Pancy_Courtecon","type":"Château","periode":"XVII_XVIII","histoire":"Deux châteaux dans cet article Pancy et Laminière au village voisin.                               PANCY,   les témoins du premier édifice furent entièrement détruits à l'époque de la reconstruction du nouveau château en 1625, situé au coeur du village. Selon Francis Eck, ce dernier, en pierre de taille, de style relativement classique, était composé d'un corps central, précédé d'une terrasse à balustrade et de deux ailes latérales en légère saillie. Les communs étaient situés en retour d'équerre, sur le côté de la cour. Les bâtiments annexes,  étaient disposés autour d'une deuxième cour.  le soubassement en pierre de taille supporte les murs en brique enserrés dans des chaînages d'angle harpés également en pierre de taille. Le rez-de-chaussée surélevé est accessible grâce à un escalier à deux révolutions. L'étage carré est couvert d'un toit à longs pans brisés. Les ailes latérales possèdent une couverture indépendante à toit en pavillon. Composé d'un blocage de moellons, ces édifices agricoles avaient fait l'objet d'un effort décoratif certain. D'après le même auteur, la distribution initiale des pièces du château avait été bouleversée avant 1914. Un large couloir divisait le rez-de-chaussée en deux parties, Le vivier était alimenté par l'unique affluent de l'Ailette sur Pancy qui traversait le parc. Le manoir ainsi que la ferme attenante furent entièrement détruits au cours des violents combats de 1917-1918. L'architecte A. Bonnet rédigea le dossier de dommages de guerre. Le nouvel édifice fut reconstruit un kilomètre plus haut que son emplacement initial en 1925 par Turbil l'entrepreneur et Cerceaux l'architecte, qui ont signé leur réalisation.","architecture":"LAMINIERE, la propriété sur laquelle le château avait été construit était abandonnée depuis longtemps. Celle-ci fut rachetée par un fermier au XVIIe siècle. Le château du XVIIIe siècle semble avoir été transformé en 1776. Il était composé de quatre bâtiments en rez-de-chaussée avec avant-corps en pierre de taille rectangulaire muni d'une tour d'angle ronde et d'une vaste bâtisse sans étage à l'arrière. De plan rectangulaire régulier, l'édifice, long de neuf travées, était flanqué en retour d'équerre d'un bâtiment s'achevant par une tour rectangulaire. L'aile nord était occupée par le logement seigneurial. La partie Est fut supprimée au XIXe siècle afin d'ouvrir la cour sur le parc. Un incendie endommagea la partie occidentale, celle ci fut remplacée par deux pavillons à étage. L'édifice appartient depuis plusieurs générations à la famille de Collin de Laminière. L'état major de division du général Kühn s'était installé au château le 8 septembre 1914, il fut victime de destructions partielles. Quelques vestiges de la bâtisse du XVIe siècle (tourelles d'angle et sculpture, deux portails monumentaux, dont l'un présente une inscription allemande de 1940) ont été remployés lors de sa reconstruction.                                             PANCY , l'étage de comble reçoit le jour par l'intermédiaire de lucarnes de formes diverses distribuées le long de la toiture. La distribution régulière des ouvertures confère à l'édifice un aspect caractéristique des demeures du XVIIIe siècle. Jacques, marquis de Lespinay, seigneur de Pancy (v.1701-1777), chevalier de l'ordre royal de Saint-Louis, colonel du Régiment Saluce-cavalerie, mort en 1777, inhumé en l'église Saint-Jean-Baptiste de Pancy-Courtecon.","habitants":"Famille de Collin de Laminière.\"","divers":"Deux châteaux dans cet article Pancy et Laminière grav 2 au village voisin.Pancy GPS : 49° 28' 28\" Nord, 3° 39' 18\" Est","gps":"49° 28' 28\" Nord, 3° 39' 18\" Est","images":["../../jctruffet.com/image/image_02/02_Pancy_Courtecon_1.jpg","../../jctruffet.com/image/image_02/02_Pancy_Courtecon_2.jpg"]},"Consult_chateau_formulaireccca":{"id":"Consult_chateau_formulaireccca","dept":"02","canton":"Ribemont","commune":"Parpeville","nom":"Parpeville","type":"Château","periode":"XVII","histoire":"Deux châteaux dans cet article Parpeville et Lucy à Ribermont. PARPEVILLE, il est question du domaine de Parpres dans le testament de Wistache, seigneur de Ribemont en 1332, et il veut que « l'hommage de Parpres soit dans la portion de son fils Jean. » selon un rôle des nobles du Vermandois, d'octobre 1348, la seigneurie de Parpres était, au XIVe siècle l'apanage du fils aîné du seigneur de Ribemont. Le château actuel de Parpeville a été bâti en 1722, par Jean de Macquerel, de Quesny qui en avait hérité. La terre, qui appartenait à M. Alexandre-Jean de Macquerel, de Parpeville, ayant été mise en adjudication, a été rachetée par M. Delcroix mais immédiatement, par suite dune demande en retrait lignager, elle revint vers 1785 à Mr Charles Pierre François de Chauvenet, qui sétait marié avec dame Louise Charlotte Alexandrine de Macquerel, fille aînée de M. Alexandre de Macquerel de Parpeville. Durant la Révolution, le château de Parpeville et les terres sont restés en la possession de M. et Mme de Chauvenet, qui ne sont pas émigrés, mais qui ont été mis en réclusion à Saint-Quentin. Il appartient  à la famille de madame de G. de Gayffier née Chauvenet .","architecture":"PAPERVILLE, d'après plusieurs travaux, on a trouvé dans l'angle d'un mur, à l'ouest du château actuel, les fondations d'une ancienne tour provenant d'anciennes constructions, qui confirmeraient que l'ancien château était fortifié.  Les puits de Parpeville atteignent la profondeur de 80 à 100 mètres. Le château de Parpeville fut bâti en 1722, par Jean de Macquerel sur lemplacement d'un ancien château. Le château de Parpeville est composé de briques et de pierres. Il possède un corps de logis, avec un avant-corps central, surmonté d'un fronton de pierre, avec deux ailes en retour d'équerre. Les toitures du château de Parpeville sont à la Mansart.                                                                                                                        A 10 K.M. à l'est à Ribemont château de LUCY, le château est devenu un gite d'hôtes, dans un cadre superbe.","habitants":"M. Alexandre-Jean de Macquerel\"","divers":"Deux châteaux dans cet article Parpeville et Lucy à Ribermont grav_3                                                    Paperville GPS : 49° 47' 08\" Nord, 3° 32' 55\" Est                                            Lucy    GPS : 49° 47' 47\" Nord, 3° 27' 33\" Est","gps":"49° 47' 08\" Nord, 3° 32' 55\" Est","images":["../../jctruffet.com/image/image_02/02_Parpeville_1.jpg","../../jctruffet.com/image/image_02/02_Parpeville_2.jpg","../../jctruffet.com/image/image_02/02_Parpeville_3.jpg","../../jctruffet.com/image/image_02/02_Parpeville_4.jpg"]},"Consult_chateau_formulaire3977":{"id":"Consult_chateau_formulaire3977","dept":"02","canton":"Essômes-sur-Marne","commune":"Passy sur marne","nom":"Passy_sur_Marne","type":"château","periode":"XV-XVI","histoire":"PASSY SUR MARNE, dans la première moitié du XIVe siècle, les terres et seigneuries de Passy sur Marne, forêt de Passy et Barzy appartiennent à Guy de Laval, sire de Vitré et de Châteaubriand, qui en rend aveu à son suzerain le comte de Braine. Une sentence de la prévôté de Château-Thierry, en février 1539, rappelle un acte de 1531 par lequel \"Marie de Luxembourg, duchesse de Vendôme et dame de Passy, laisse possession et jouissance à Messire Antoine d'Anglebermer comme ayant acquis de Mr de Vendôme la terre et la seigneurie de Passy\". Le nouveau seigneur de Passy s'empresse d'augmenter son domaine par l'achat de la seigneurie de Barzy et de terres attenantes à Passy et Courcelles. L'aveu et dénombrement rendu le 25 mai 1540 à Guillemette de Sarrebruche, comtesse de Braine, par Antoine d'Anglebermer concerne la vicomté.  Il appartient toujours à la Famille Macquerel.","architecture":"PASSY SUR MARNE,  la constuction du château de Passy-sur-Marne date du XVIe siècle. Ses tours remontent au Moyen-Age. Il ne reste que des vestiges de l'ancien château féodal. L'ancien château a été réhabilité et des appartements en occupent les lieux. Un point de vue avec des tables de pique-nique a été installé avec un ancien pressoir à raisin en décor. Le château de Passy-sur-Marne est lun des plus méconnus des témoins de larchitecture seigneuriale du XVIe siècle : bien que fort mutilé au XIXe siècle et pendant la guerre de 1914- 1918, le château de Passy-sur-Marne présente encore des restes imposants, non protégés aux M.H. ignorés même des spécialistes. Il appartient toujours à la Famille Macquerel.\nterre et seigneurie de Passy sur Marne, Barzy et la forêt de Passy, on y trouve mention des fossés du château de Passy, ce qui indique qu'un véritable château avait remplacé à cette date l'ancienne maison seigneuriale. Il présente encore des restes imposants, c'est sans conteste l'un des plus méconnus de ces témoins de l'architecture du XVIe siècle","habitants":"Famille Macquerel\"","divers":"Château de Passy  GPS : 49° 03' 45\" Nord, 3° 34' 18\" Est","gps":"49° 03' 45\" Nord, 3° 34' 18\" Est","images":["../../jctruffet.com/image/image_02/02_Passy_sur_Marne_1.jpg","../../jctruffet.com/image/image_02/02_Passy_sur_Marne_2.jpg","../../jctruffet.com/image/image_02/02_Passy_sur_Marne_3.jpg"]},"Consult_chateau_formulaireac48":{"id":"Consult_chateau_formulaireac48","dept":"02","canton":"Vic-sur-Aisne","commune":"Pernant","nom":"Pernant","type":"Forteresse","periode":"XV-XVI","histoire":"PERNANT, le château se dresse sur un promontoire dominant la vallée. Dans son sous sol, d'anciennes carrières ont été transformées en dépendances souterraines. La construction du château date probablement du début du XIVe siècle. Au cours de la première guerre mondiale, le château est partiellement détruit par l'artillerie allemande. Le château, construit en pierres de taille se compose d'un bâtiment sur plan carré (qui possédait un toit aigu en ardoises), fortifié de quatre tourelles d'angle. A l'ouest, un petit corps de logis a été rajouté au XVIe siècle (en grande partie démoli en 1918). On ne trouve plus trace des murailles d'enceint, le domaine fut en vente  en 2014, pour finalement trouver un nouvel acquéreur fin 2015. D'abord inexistant, le projet de restauration est né avec Franklin Hoët, qui a longtemps hésité et finalement seulement retenu d'assurer la consolidation du bâtiment dans son état actuel, c'est-à-dire sans vraiment chercher à aboutir un projet cohérent. C'est aussi que le temps lui aura manqué. Au contraire, la famille Cayet vise, dans la limite de ses moyens qui sont plus modestes, à mener à bien dans la durée, la remise en état du châtelet et du Logis attenant dans leur état extérieur de 1619, donc sans reprendre les modifications agricoles du XIXe siècle qui ont tant endommagé le bâti historique. C'est donc une importante réorientation du projet par rapport à ce que prévoyait le propriétaire antérieur, ce que la DRAC de Picardie valide aujourd'hui sur le principe.","architecture":"PERNANT,  ainsi l'année 2016 sera-t-elle consacrée à la réalisation des relevés de l'ensemble du site (rien n'existe à ce jour) ainsi qu'au relevé et au diagnostic des carrières souterraines (elles n'ont plus été visitées depuis 1934) et encore au diagnostic archéologique du châtelet qui restait à faire en  2017 sera quant à elle l'année consacrée à l'ensemble des études sur l'ensemble du bâti, le tout pour être prêt à engager les premiers travaux à l'heure du centenaire de la destruction du château. On espère à cette occasion rendre le chantier visitable, pour augmenter l'attrait du site et associer le public à l'aventure peu courante de la résurrection d'un bâtiment aussi ancien, détruit de si longue date, ces opérations s'ajouteront naturellement aux visites régulières qui s'imposent à tout bâtiment classé. On ne rendra pas compte ici de ces opérations, toutes décrites en revanche sur le site Internet dédié le-château-de-Pernant, il  a été inscrit aux M.H. en 1927 pour empêcher sa démolition,  En 2012 il a été racheté par un mécène qui a entrepris sa restauration.                                                                                       Éléments protégés MH : les sols archéologiques et de ses parties constitutives: inscription par arrêté du 11 octobre 2006, modifié par arrêté du 13 mars 2007. Pour être conservé et remis en état : le château de Pernant avec son fossé au sud et à l'ouest, sa terrasse à l'est, ses murs de soutènement et son accès ouvragé donnant rue du château : classement par décret du 8 mars 2007.","habitants":"Famille de Franklin Hoët\"","divers":"Château de Pernant                                  GPS : 49° 22' 30\" Nord, 3° 13' 38\" Est","gps":"49° 22' 30\" Nord, 3° 13' 38\" Est","images":["../../jctruffet.com/image/image_02/02_Pernant_1.jpg","../../jctruffet.com/image/image_02/02_Pernant_2.jpg","../../jctruffet.com/image/image_02/02_Pernant_3.jpg","../../jctruffet.com/image/image_02/02_Pernant_4.jpg"]},"Consult_chateau_formulaireee86-2":{"id":"Consult_chateau_formulaireee86-2","dept":"02","canton":"Laon","commune":"Presles-et-Thierny","nom":"Presles","type":"Château","periode":"XVI","histoire":"PRESLES  c'était la résidence de campagne des évêques de Laon jusqu'à la fin du XVIe siècle où elle fut remplacée par le château d'Anizy. Ce fut à l'origine une simple ferme des évêques. Puis l'un de ceux-ci, Anselme de Mauny, y bâtit une maison d'habitation. C'est à cette époque que doit dater la chapelle dont il subsiste des ruines. propriété de monsieur Jadot.","architecture":"PRESLES, c'est de cette époque que doit dater la chapelle dont il subsiste des ruines. Par suite de la guerre de Cent ans, les évêques transformèrent la maison en forteresse en construisant des tours et des fossés. Le château fut occupé par les troupes du régent, le futur Charles V. Pendant les guerres de la Ligue, il fut pris par les royalistes, puis repris par les Ligueurs. Il redevint une ferme au XVIIe siècle quand les évêques lui préférèrent le château d'Anizy et il tomba en partie en ruine. On peut encore voir des restes de tours et de fossés envahis par les broussailles.\nÉléments protégés MH : restes de l'enceinte et de la chapelle : inscription par arrêté du 24 octobre 1927.","habitants":"Famille d'Anselme de Mauny\"","divers":"château de Presles  gps49°30'6.1\"N, 3°37'33.3\"Est","gps":"","images":["../../jctruffet.com/image/image_02/02_Presles_1.jpg"]},"Consult_chateau_formulairec844":{"id":"Consult_chateau_formulairec844","dept":"02","canton":"Villers-Cotterêts","commune":"Puiseux-en-Retz","nom":"Puiseux_en_Retz","type":"Château","periode":"XVIII","histoire":"PUISEUX en Retz, château construit pour Louis Zacharie de Vassan, dans la deuxième moitié du XVIIIe siècle, par l'architecte parisien Jacques Molinos. Le bâtiment achevé vers 1783, remplaçant un château plus ancien est vendu en 1794 et passe dans les mains de plusieurs propriétaires successifs. En 1818, l'habitation principale est démolie. En 1879, la commune acquiert les derniers bâtiments, et les fait aménager en 1880 par l'architecte Gilbert.","architecture":"PUISEUX dans la deuxième moitié du XVIIIe il n'en subsiste que le logis très remanié, les bâtiments agricoles ont été rebâtis à la fin du XIXe siècle ou dans le premier quart du  XXe siècle (aile sud), et dans la deuxième moitié du XXe siècle (bâtiments nord-ouest et sud-est).\nActuellement mairie école en rez-de-chaussée avec toit à croupe en tuile mécanique ; maison à un étage carré avec toit à croupe en ardoise ; ferme dont le logis comporte sous-sol, rez-de-chaussée surélevé, étage en surcroît ; elle a des toits à pignon couvert à l'exception de l'angle sud-est, protégé de toits à croupe ; le logis et les bâtiments de l'angle sud-est sont couverts en tuile mécanique, les autres constructions, en ardoise.","habitants":"Famille de Louis Zacharie de Vassan\"","divers":"Châteaux de Puiseux  gps 49° 17' 55? nord, 3° 07' 47? est","gps":"","images":["../../jctruffet.com/image/image_02/02_Puiseux_en_Retz_1.jpg","../../jctruffet.com/image/image_02/02_Puiseux_en_Retz_2.jpg"]},"Consult_chateau_formulaire2bb5":{"id":"Consult_chateau_formulaire2bb5","dept":"02","canton":"Vic-sur-Aisne","commune":"Quierzy","nom":"Quierzy","type":"Château","periode":"XVII","histoire":"QUIERZY,  il y avait dans cette localité de Quierzy un palais des rois carolingiens. Charles Martel y mourut, Pépin le Bref devant les grands de son royaume assemblés, promit au pape de lui restituer sa puissance temporelle. Ce dernier était présent. Charlemagne y résida plusieurs fois et y reçut aussi le pape. Enfin Charles le Chauve y séjourna très souvent, s'y maria, y tint huit conciles et y édicta le célèbre capitulaire de Quierzy créant la féodalité. Mais ce très important palais fut détruit par les Normands à la fin du IXe siècle. Par la suite, aux XIe et XIIe siècles, un château fort remplaça le palais et les seigneurs de Quierzy jouèrent un grand rôle: ils étaient avoués de l'abbaye Saint Jean de Laon. Cette seigneurie passa aux Montmorency-Breteuil et ensuite aux Royer. Enfin les d'Halluin venant de Flandre construisirent le château actuel.","architecture":"QUIERZY;  La façade tournée vers le jardin et la route comprend une porte, surmontée d'un arc surbaissé et d'une niche de statue, et une lucarne avec fenêtre à meneaux, pourvue d'un fronton très décoré, encadrée de deux pilastres se terminant par des pinacles. Du côté de la rivière, la façade présente des contreforts et deux tourelles de base carrée, l'une pourvue d'une fenêtre à meneaux, l'autre surmontée d'un pignon, et reposant sur un arc de décharge.\nÉléments protégés MH : les façades et les toitures : inscription par arrêté du 8 février 1928.","habitants":"Famille des d'Halluin \"","divers":"Château de Quierzy                                  gps 49° 34' 33? nord, 3° 08' 49? est","gps":"","images":["../../jctruffet.com/image/image_02/02_Quierzy_1.jpg","../../jctruffet.com/image/image_02/02_Quierzy_2.jpg","../../jctruffet.com/image/image_02/02_Quierzy_3.jpg"]},"Consult_chateau_formulaire6c8b":{"id":"Consult_chateau_formulaire6c8b","dept":"02","canton":"Fère-en-Tardenois","commune":"Quincy-sous-le-Mont,","nom":"Quincy_le_Mont","type":"Château","periode":"XVII-XIX","histoire":"QUINCY,  le château de la Quincy a été construit en 1626 sur l'emplacement d'une ancienne ferme. Deux tourelles octogonales sont construites entre 1841 et 1850. Au XIXe siècle, Louise Bourru, héritière du Domaine et petite-fille du docteur Edme-Claude Bourru, va épousé le Com
