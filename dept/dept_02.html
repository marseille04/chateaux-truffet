const FULL={"Consult_chateau_formulaire234b":{"id":"Consult_chateau_formulaire234b","dept":"02","canton":"Soissons","commune":"Noyant et Aconin","nom":"Aconin","type":"Château","periode":"XVII","histoire":"ACONIN, relevait des évêques de Soissons, fut la possession de la famille  d'Acony avant de passer à Hugues de Nicolardot,  le château, qui présente des analogies de style avec le château de Coeuvres situé à quelques kilomètres, a peut être été bâti, ou aménagé, par Hugues de Nicolardot, maître d'hôtel de la famille d'Estrées. il appartient aujourd'hui à la famille Daudré.","architecture":"ACONIN, Son plan, tout à fait irrégulier, a certainement été dicté par des douves préexistantes. Des fossés de défense le protègent en effet au nord est et au sud est et communiquent avec un étang artificiel. L'entrée principale du château se trouvait sans doute dans le pavillon rectangulaire placé de biais par rapport au pont franchissant le fossé, qui devait à l'époque servir de poterne. La façade côté cour ne présente aucun caractère intéressant. Elle a été greffée vers 1800-1830 sur le vieux parement. L'intérêt réside dans la façade côté campagne, comprise entre le pavillon carré cantonné d'une tourelle d'escalier polygonale et une grosse tour octogonale en saillie. Un même larmier court le long de la tourelle d'escalier de la façade du bâtiment proprement dit et de la tour octogonale. Il correspond à la frise ornée de médaillons dont la décoration a disparu, qui entoure le pavillon carré et lui donne un aspect Renaissance.","habitants":"Famille d'Hugues de Nicolardot\"","divers":"Château d'Aconin                                    Gps   49° 19' 33,23? N, 3° 19' 30,73? E","gps":"","images":["../../jctruffet.com/image/image_02/02_Aconin_1.jpg","../../jctruffet.com/image/image_02/02_Aconin_2.jpg"]},"Consult_chateau_formulaire76e8":{"id":"Consult_chateau_formulaire76e8","dept":"02","canton":"Tergnier","commune":"Andelain","nom":"Andelain_Maguin","type":"Château","periode":"XIX","histoire":"ANDELAIN-MAGUIN, en 1868, il est la propriété de Louis-François Decroix, fabricant de sucre à Crépy, qui décide d'y faire construire sa demeure. Il confie les plans à l'architecte Henri Parent qui dirige les travaux de cette construction jusqu'à son achèvement en 1870. Transmise à ses deux fils en 1872, la demeure est vendue à Alfred Maguin, le 25 mars 1891. Le domaine se compose alors d'un parc avec étangs et 17 hectares de terres. Il est possible que parmi les terres vendues avec le domaine figurent plusieurs terrains sur la commune de Charmes, dont la grande pièce sur laquelle Alfred Maguin fera construire sa cité-jardin en 1924. Au XIXe siècle, Decroix est en effet propriétaire de plusieurs terrains à Charmes qui pourraient avoir été inclus à la vente de sa propriété d'Andelain. A la fin du XIXe siècle, Alfred Maguin entreprend un réaménagement complet du château et fait appel à l'architecte paysagiste Edouard Redont pour dessiner le vaste parc du château, dont les plans sont exposés à Reims en 1898. Mais dès le 1er septembre 1914, la demeure est occupée par l'armée allemande qui la dynamite avant son évacuation en octobre 1918. Au retour d'Alfred Maguin en 1919, le château est entièrement en ruine et le parc se trouve dans \"un désordre inexprimable\". Edouard Redont, intervient à nouveau pour dresser l'état des dommages de guerre subis à l'ensemble du domaine qu'il avait dessiné. Selon un cartouche situé à l'angle nord du mur de clôture de la propriété, la reconstruction est engagée en 1921 (date portée). Il est toutefois possible qu'Alfred Maguin ait aussi confié sa reconstruction à Charles et Jean de Montarnal, à qui l'industriel avait par ailleurs confié la majeure partie des travaux  dans la commune de Charmes, dont il était  le maire.","architecture":"ANDELAIN MAGUIN,  est situé en écart, aux confins nord de la commune d'Andelain, Avec son parc, qui s'étend sur plus de 4,3 ha et comprend le château proprement dit, une maison de gardien, un pigeonnier et des écuries avec ses dépendances agricoles attenantes. Le logis est implanté au milieu de la propriété. Il s'inspire du précédent édifice, par une reprise du style brique et pierre, mais s'en distingue par des dispositions architecturales plus épurées. De plan massé, il présente une élévation ordonnancée à cinq travées, précédé d'un avant-corps en pierre de taille, en rez-de-chaussée, qui forme balcon à l'étage. Le rez-de-chaussée surélevé est traité en brique et pierre alternées tandis que l'étage souligne davantage les ouvertures par un encadrement de pierres harpées. L'ensemble est couvert d'un toit en ardoise, en pavillon, à terrasse faîtière en zinc. L'avant-corps polygonal en pierre, qui constitue l'accès principal de l'édifice, est accessible par un petit escalier à six degrés convexes, qui compense la surélévation de la cave. Cet espace aménagé en vestibule est éclairé principalement par une importante verrière zénithale qui s'inscrit dans le toit terrasse. L'étage de combles est éclairé par une large lucarne à fronton cintré, encadrée de deux autre lucarnes en il-de-buf. Le parc à l'anglaise qui entoure le château a été profondément remanié. Seules les dispositions allant de l'entrée principale jusqu'au château sont encore partiellement reconnaissables. Dans cette partie, le massif central et les allées qui l'entourent sont encore dessinées. En revanche, toutes les pièces d'eau et les bassins ont été comblés. Au sud et à l'ouest tous les aménagement ont disparu aux dépens d'une zone simplement enherbée.","habitants":"Famille de Louis-François Decroix\"","divers":"Andelain-Maguin                                           gps 49° 38' 36? nord, 3° 22' 16? est","gps":"","images":["../../jctruffet.com/image/image_02/02_Andelain_Maguin_1.jpg"]},"Consult_chateau_formulairef0b5":{"id":"Consult_chateau_formulairef0b5","dept":"02","canton":"Laon","commune":"Anizy le Château","nom":"Anizy","type":"Château","periode":"XVI-XVIII","histoire":"Trois châteaux dans cet article; Anizy, Lucy pas d'informations et Bourguignon sous M.                                                                                   ANIZY, a été construit au XIIIe siècle puis détruit en 1358 par Enguerrand de Coucy. En 1540, un nouveau château a été édifié par le cardinal Louis 1er de Bourbon Vendôme. Les princes de Condé, chefs protestants, s'en emparèrent au début des guerres de religion. Le château d'Anizy fut restauré par le cardinal de Rochechouart entre 1778 et 1787. Puis la demeure fut détruite à nouveau en 1914-1918, puis reconstruite par le Comité américain des régions libérées, reste un souterrain d'origine.Le château actuel a été érigé au début du XVIe siècle par Charles et Hector du Frasnay sur les bases d'une maison forte. À l'origine la maison forte protégeait le passage à gué de l'Aron, d'où elle tirait des revenus liés aux péages. Ce fief, qui était une baronnie, mouvait des ducs de Nevers et du seigneur de Châtillon-en-Bazois. Au XIVe siècle, il était la propriété de la Maison d'Anisy, puis il est passé aux Maisons de La Tournelle, et de Chandou, et vers 1450, à celle de Frasnay. C'est Charles de Frasnay, qui fait en 1571, réutiliser les pierres d'une vieille tour pour en faire rebâtir une nouvelle : « ronde par le dehors et carrée par le dedans ». En 1621, Hector de Frasnay y fait des rajouts, l'augmentant d'un pavillon comportant des cheminées.\nEn 1666, il est réuni à la terre de Vandenesse par Louis du Bois de Fienne.  Cette seigneurie fut saisie sur Marie Edmée de Frasnay, épouse de Joachim de Villers-la-Faye, seigneur de Vançay et adjugée en 1673, à Louis du Bois de Fiennes, marquis de Givry et de Vandenesse, lieutenant général des armées du roi.","architecture":"ANIZY Il est édifié sur une motte, entouré par des fossés alimentés par l'Aron que franchissaient deux ponts-levis. Une description de la maison forte précise : « La rivière Aron sert de fosse audit château et flottant contre les murailles qui le renferment, sur laquelle rivière, il y a un pont-levis pour entrer dans la basse cour ».La motte est également « renfermée de murailles » et à l'intérieur se trouve l'église paroissiale, à nef rectangulaire, dont le chur à chevet plat est surélevé. L'église fut épargnée à la Révolution, car transformée en grange. On trouve dans cette cour également, les communs, granges, étables, ainsi que deux colombiers. Cette bâtisse devint propriété agricole. L'ensemble des murailles fut démolie, les ponts levis supprimés et les douves comblées.Une tour ronde, trapue, la seule subsistant de l'enceinte qui entourait la totalité de la motte est relié au logis par une courtine. C'est un édifice de plan carré que flanque au sud une tour ronde à poivrières, dont on accède à la porte cintrée, au fronton triangulaire, par un escalier de neuf marches, au perron évasé défendu par un assommoir. Cette porte permet d'accéder à un escalier à vis. Les ouvertures pour les couleuvrines et mousquets, furent conservées. Des deux cheminées monumentales ornant l'intérieur du château, l'une est partie au château de Vandenesse.  LIZY, le château de Lizy se situe entre Anizy-le-Grand et Merlieux-et-Fouquerolles.\nBOURGUIGNON sous Montbavin   château construit entre 1828 et 1835, inspiré de l'architecture néo-palladienne. Communs bâtis en 1818. Cette demeure se présente comme un exemple de l'architecture des maisons de plaisance, caractéristique de la première moitié du XIXe siècle. Éléments protégés MH : les façades et les toitures du château, le parc, le portail, le mur de clôture et la chapelle en totalité : inscription par arrêté du 7 juin 2004.","habitants":"cardinal Louis 1er de Bourbon Vendôme\"","divers":"Trois châteaux dans cet article; Anizy grav -3-4-5  Lucy grav-6, et Bourguignon grav 1-2                                                  Lizy GPS : 49° 30' 53,88\" Nord, 3° 28' 54,33\" Est                                             Bourguignon .GPS : 49° 31' 42,03\" Nord, 3° 32' 23,92\" Est","gps":"49° 30' 53,88\" Nord, 3° 28' 54,33\" Est","images":["../../jctruffet.com/image/image_02/02_Anizy_1.jpg","../../jctruffet.com/image/image_02/02_Anizy_2.jpg","../../jctruffet.com/image/image_02/02_Anizy_3.jpg","../../jctruffet.com/image/image_02/02_Anizy_4.jpg","../../jctruffet.com/image/image_02/02_Anizy_5.jpg","../../jctruffet.com/image/image_02/02_Anizy_6.jpg"]},"Consult_chateau_formulaireeb3f":{"id":"Consult_chateau_formulaireeb3f","dept":"02","canton":"Vervins","commune":"Archon","nom":"Archon_Oigny","type":"Château","periode":"XV-XVII","histoire":"deux chateaux dans cet article;  Qgny et Renneval.                                                            OGNY, la seigneurie d'Archon existait avant le XIIIe siècle; elle dépendait alors en partie de Nicolas de Rozoy, frère du seigneur de ce lieu, qui céda en 1222 ses droits aux abbayes de Saint-Rémi de Reims et de Saint Vincent de Laon et au chapitre de Rozoy. A la fin du XVe siècle, la seigneurie et le château appartenaient à Jean d'Ogny.  A la veille de la Révolution, le domaine avait pour propriétaire Gérard Marie de Champeaux; ayant émigré, le domaine fut vendu comme \"bien national\" à leur fermier Louis Duguet.                                                                                                                          A trois  K.M. à l'ouest RENNEVAL  a gardé sa façade en briques, un incontournable du circuit de visite du village. Lancienne maison de Rayneval (ou Renneval s'est illustrée par ses alliances, ses services militaires dans tous les temps et la possession dune des premières charges de la couronne. La filiation de cette maison remonte à Nicolas de Renneval (du XIIIe siècle. Raoul II, chevalier, Sire de Renneval, rendit des services importants aux 3 rois de France, Jean, Charles V et Charles VI. Il servit à Paris en avril 1360, lorsque le roi dAngleterre vint mettre le siège devant la Capitale. Il accompagna souvent le roi de France, dans ses voyages et, fut lun des 12 chevaliers nommés pour gouverner le royaume pendant la démence du roi Charles VI. Il s'était marié 3 fois et ses 3 femmes sortaient des plus anciennes et des plus illustres maisons de Picardie.","architecture":"OGNY, le château a été implanté non loin d'une rivière. Il était entouré de douves et fortifié de cinq tours carrées. De cet ensemble restent deux tours à droite, le pavillon d'entrée et deux tours placées en diagonale aux angles du corps de logis. Sur ce pavillon d'entrée de plan rectangulaire s'ouvre une porte en arc surbaissé, au-dessus de celle-ci on voit les rainures des chaînes du pont-levis, entre elles, on a percé une fenêtre; et sur l'autre face, des baies éclairent la chambre de manoeuvre du pont-levis. Le corps de logis situé sur le côté gauche de la cour a été réalisé en brique. Les deux tours carrées des angles de ce bâtiment le surplombent d'un étage.","habitants":"Ogny  Famille de  Gérard Marie de Champeaux;                         Renneval, Raoul II, chevalier,\"","divers":"deux chateaux dans cet article;  Qgny grav1-2-3-4 et Renneval  grav-5.                                                               Renneval  GPS : 49° 44' 28\" Nord, 4° 02' 58\" Est","gps":"49° 44' 28\" Nord, 4° 02' 58\" Est","images":["../../jctruffet.com/image/image_02/02_Archon_Oigny_1.jpg","../../jctruffet.com/image/image_02/02_Archon_Oigny_2.jpg","../../jctruffet.com/image/image_02/02_Archon_Oigny_3.jpg","../../jctruffet.com/image/image_02/02_Archon_Oigny_4.jpg","../../jctruffet.com/image/image_02/02_Archon_Oigny_5.jpg"]},"Consult_chateau_formulaire4692":{"id":"Consult_chateau_formulaire4692","dept":"02","canton":"Laon","commune":"Laon","nom":"Ardon_Laon","type":"Château","periode":"XIV-XVIII","histoire":"deux châteaux dans cet article; Ardon et  Tortoir.                                      ARDON, le château le petit Châtelet fut construit en 1848 pour Louis-Philippe Forquetot de la Fortelle, tandis que les communs, antérieurs d'au moins un siècle, ont subi à cette même époque une mise au goût du jour. Le château est élevé en brique et pierre, à deux étages carrés et un étage de comble, escalier dans-oeuvre tournant à retours avec jour, toit en pavillon couvert d'ardoise et tuile plate ; les communs et écuries attenantes en moellon enduit sont couverts en tuile plate.                                                                    TORTOIR Le Tortoir Saint-Nicolas est un prieuré bâti à Saint-Nicolas-aux-Bois, a l'ouest de Laon Cette ancienne abbaye a été bâtie au XIVe siècle.  Le Tortoir est un prieuré fortifié constuit au XIVe siècle.   a été classé aux M.H. en 1912.","architecture":"ARDON  La Porte d'Ardon est classée aux M.H. depuis 1909. Elle se situe rue Enguerrand Quarton à Laon. Elle date du XIVe siècle. Le sculpteur était Charles Hottin. La Porte d'Ardon appartient à la commune de Laon. La Porte est double; elle est composée d'un châtelet avec sa herse, un assommoir et des vantaux qui furent détruit. Un ouvrage avancé formait un barbacane, a été également détruit. La porte est attestée dès le Xe siècle et fut rebatie vers le XIIIe siècle.  En 1741, une porte fut édifiée au devant et sculptée par Charles Hottin, avec des piliers surmontés de lions et d'armes de France. Mais cette porte a été détruite en 1858.","habitants":"Charles Hottin.\"","divers":"deux châteaux dans cet article; Ardon  grav-1 et  Tortoir   grav 2-3.GPS : 49° 33' 45\" Nord, 3° 37' 28\" Est                                                                  Tortoir GPS : 49° 36' 28\" Nord, 3° 26' 22\" Est","gps":"49° 33' 45\" Nord, 3° 37' 28\" Est","images":["../../jctruffet.com/image/image_02/02_Ardon_Laon_1.jpg","../../jctruffet.com/image/image_02/02_Ardon_Laon_2.jpg","../../jctruffet.com/image/image_02/02_Ardon_Laon_3.jpg"]},"Consult_chateau_formulairef481":{"id":"Consult_chateau_formulairef481","dept":"02","canton":"Villers-Cotterêts","commune":"Armentières-sur-Ourcq","nom":"Armentières","type":"Château","periode":"XIII-XVI","histoire":"Deux châteaux dans cet article ; Armentières et Buisson. ARMENTIERES, bâti en 1297 pour les chevaliers d'Armentières le château a été ensuite transmis à différents nobles du secteur en particulier à Gaucher d'Unchair en 1320, et à la famille de Conflans, famille de noblesse champenoise, qui l'a conservé 120 ans, Barthélémy de Conflans l'a vendu en 1446 à Jean II Juvenal des Ursins, fils de Jean 1er, prévôt des marchands de la ville de Paris, personnage extrêmement important, Jean II chroniqueur de Charles VI, chapelain de Charles VII. Il y apporta beaucoup d'améliorations dans le goût de la Renaissance. Le château est resté dans la famille de Jean II Juvenal des Ursins en passant à son frère Michel, puis à son neveu Louis et à d'autres représentants de la famille. Vers 1560, il est revenu à la famille de Conflans, par le mariage de Charlotte des Ursins avec Antoine de Conflans et y est resté jusqu'à la Révolution. Les marquis de Conflans d'Armentières ont possédé le château, et l'ont habité jusqu'au début du XVIIe siècle. Vers 1620, le marquis de Conflans d'Armentières, alors vicomte d'Oulchy, le cède en location à son fermier. Il est confisqué comme bien national à la Révolution, revendu à Mme Hutin, de la ferme voisine, dans le but de le redonner à son ancien maître émigré. Le château d'Armentières ne représentant plus un symbole féodal du fait de sa transformation en ferme depuis 150 ans, sera épargné au moment de la Révolution. Les dégradations commencent à partir de son exploitation en tant que ferme. Il restera une exploitation fermière jusqu'en 1975. Depuis son acquisition par son nouveau propriétaire en 2004, les travaux de sauvetage du château d'Armentières ont démarré.","architecture":"ARMENTIERES Château féodal de la fin du XIIe siècle. Sur la face sud, un grand corps de logis et quatre grosses tours occupent les angles s'avançant en saillie. A l'angle nord-ouest du château se dresse une grosse tour construite au début du XVIe siècle. Ce château a terriblement souffert de la guerre de 1914-1918, les ruines sont impressionnantes. Des travaux de restauration ont eu lieu en 1981, les fenêtres à meneaux Est et Ouest sous la direction de M. Gigot, architecte en chef des Monuments Historiques de l'époque. La priorité est de résoudre le problème de l'eau au sol. Puis essayer de réparer les trois urgences du château : l'échauguette Nord-Est qui contrôlait le passage du chemin est à stabiliser avant qu'elle ne s'écroule, le pilier rongé à la base de la chapelle et la réfection de la toiture du grand logis, étant la partie la plus intéressante et la plus ancienne au plan architectural et historique.\nÉléments protégés MH : le château d'Armentières avec sa poterne (ruines) : classement par arrêté du 25 janvier 1921.                                                 A cinq K.M. au sud -Est BUISSON à Brécy   le petit château du Buisson, comportant deux étages, possède deux tours dont une circulaire et une pentagonale, une salle de garde, des souterrains voûtés, et des communs, de style médiéval a disparu suite à une reconstruction en 1543. Sa chapelle, son pavillon, la salle, l'escalier et sa toiture sont inscrits aux M.H. depuis 1981.  Buisson date du XIIIe siècle, du XVIe siècle, du XVIIIe siècle, et du XIXe siècle et  comporte 2 étages, classement par arrêté du 23 juillet 1981.","habitants":"Armentières; famille de Jean II Juvenal des Ursins \"","divers":"Deux châteaux dans cet article ; -Armentieres grav-3-4-5   Buisson grav -1-2                                                      .GPS : 49° 11' 09\" Nord, 3° 22' 57\" Est                                                                  GPS : 49° 09' 16\" Nord, 3° 25' 30\" Est","gps":"49° 11' 09\" Nord, 3° 22' 57\" Est","images":["../../jctruffet.com/image/image_02/02_Armenti%c3%a8res_1.jpg","../../jctruffet.com/image/image_02/02_Armenti%c3%a8res_2.jpg","../../jctruffet.com/image/image_02/02_Armenti%c3%a8res_3.jpg","../../jctruffet.com/image/image_02/02_Armenti%c3%a8res_4.jpg","../../jctruffet.com/image/image_02/02_Armenti%c3%a8res_5.jpg"]},"Consult_chateau_formulaire939e":{"id":"Consult_chateau_formulaire939e","dept":"02","canton":"Laon","commune":"Arrancy","nom":"Arrancy","type":"Château","periode":"XV-XVI-XVII","histoire":"Quatre châteaux dans cet article ; Arrancy, Arranceau,  la tour de  Vaurseine et Festieux au nord d'Arrancy.                                                                                                   ARRANCEAU , construction par les seigneurs d'Arrancy du Glas  date du XVIe siècle et XVIIe siècle. Il est inscrit aux M.H. depuis 1928.  C'était à l'origine une grange de l'abbaye cistercienne de Foigny, au nord de Vervins. Mais en 1586 les cisterciens vendirent cette grange au seigneur d'Arrancy du Glas. Celui-ci fit édifier le château qui existe encore. En 1664, les cisterciens firent jouer la clause de rachat prévue en 1586. La tour, construite à la fin du XVIe siècle par le seigneur d'Arrancy, se trouve à l'angle de la clôture du château. Elle est de base carrée. propriétaire actuel monsieur Pierre Niay . Éléments protégés MH : le donjon et les deux cheminées du XVIIe siècle du corps de logis : inscription par arrêté du 28 juin 1927.                                                                                         \nLa TOUR de  VAURSEINE  est un château bâti à Ployart-et-Vaurseine. Elle servait de fortification autrefois. La Tour de Vaurseine date du XVe siècle, est crénelée, est inscrite aux M.H. depuis 1927.","architecture":"ARRANCY, sa construction date du XVIIe au XIXe siècle. Le château d'Arrancy, le logis et le donjon datent du XVe siècle. Ils sont inscrits aux M.H. depuis le 28/06/1927. Le château d'Arrancy, dévasté pendant la première guerre mondiale,  a été restauré à l'identique. Une partie du parc conserve, du côté de l'entrée, une ordonnance ancienne avec un potager qui pourrait remonter au XVIIe siècle. Une autre partie constitue un ensemble ordonné, commandé par le paysage environnant, portant la marque du paysagiste anglais Thomas Blaikie.  Éléments protégés MH : le château, les façades et les toitures, (excepté l'aile sud, en terrasse, ainsi que les remises en retour, l'ensemble de ces bâtiments étant d'époque moderne) et le parc et jardin, comprenant la cour d'honneur et son chemin d'accès, le potager clos de murs, l'ancien verger, tout le parc à l'ouest entouré de murs de clôture ou limité par le chemin vicinal et l'ancien lit de la rivière en bordure du bois, comprenant aussi la pièce d'eau : inscription par arrêté du 13 août 2008.                                                                                                    FESTIEUX à cinq K.M. au nord le château de Festieux a connu plusieurs époques de construction : le XIVe siècle ; XVe siècle ; XVIIIe siècle . Le château est composé d'un pigeonnier, d'un portail, d'un beau salon, des élévations, des tours, une toiture et des décors intérieurs. Accolé à la forêt avec sa cour carrée qui possède un jet d'eau, possède une seconde cour, avec un pigeonnier, un jardin à la Française de l'autre côté, avec en fond la forêt. Le jardin du château de Festieux est composé d'une pièce d'eau, de haies en buis, d'une terrasse mais ses statues ont disparu, avec sa façade, ses toitures et son pigeonnier est inscrit aux M.H. depuis le 20 mars 1978.","habitants":"Arranceau; seigneur d'Arrancy du Glas\"","divers":"Trois châteaux dans cet article ; Arranceau grav-1-2, Arrancy grav-3-et la tour de  Vaurseine-grav-5 et Festieux grav-4.                                             Arranceau GPS : 49° 29' 58\" Nord, 3° 45' 36\" Est                                              Arrancy GPS : 49° 29' 33\" Nord, 3° 45' 26\" Est                                                      Tour  GPS : 49° 29' 53,08\" Nord, 3° 44' 12,01\" Est  49°29'52.4\"N, 3°44'19.6\"Est                                             Festieux  GPS : 49° 31' 09\" Nord, 3° 45' 14\" Est","gps":"49° 29' 58\" Nord, 3° 45' 36\" Est","images":["../../jctruffet.com/image/image_02/02_Arrancy_1.jpg","../../jctruffet.com/image/image_02/02_Arrancy_2.jpg","../../jctruffet.com/image/image_02/02_Arrancy_3.jpg","../../jctruffet.com/image/image_02/02_Arrancy_4.jpg","../../jctruffet.com/image/image_02/02_Arrancy_5.jpg"]},"Consult_chateau_formulaire8012":{"id":"Consult_chateau_formulaire8012","dept":"02","canton":"Guise","commune":"Oisy","nom":"Arrouaise","type":"Château","periode":"XIX","histoire":"ARROUAISE, construite en 1850, pour le Baron Seillière, pour y loger le directeur d'une exploitation agricole, faisant partie de l'ancien domaine de Guise-en-Thiérache. Cet ensemble appartenait à Henri dOrléans, Duc dAumale.  En particulier, une pièce est dédiée à la mémoire du célèbre poète britannique : Wilfred Owen, qui fut tué au combat, en 1918, à Ors, à quelques kilomètres de la Grande Arrouaise. Le château est entouré d'un parc à l'Anglaise, entretenu et réaménagé par le fils d'un jardinier royal britannique. Il a été racheté par un collectionneur privé.","architecture":"ARROUAISE, c'est une ancienne demeure de maître, certaines parties de la propriété sont consacrées aux collections du maître des lieux ainsi quà des évocations de la Grande Guerre , l'édifice de plan rectangulaire à deux niveaux  avec série de lucarnes sur comble, flanqué de deux tours hoctogonale sur angles arrières et deux pavillons saillants sur la facade avant.","habitants":"Famille d'Henri dOrléans                         Wilfred Owen,\"","divers":"Château d'Arrouaise   GPS : 50° 1' 6,44\" Nord, 3° 37' 51,1\" Est","gps":"50° 1' 6,44\" Nord, 3° 37' 51,1\" Est","images":["../../jctruffet.com/image/image_02/02_Arrouaise_1.jpg"]},"Consult_chateau_formulaire7f8e":{"id":"Consult_chateau_formulaire7f8e","dept":"02","canton":"Hirson","commune":"Aubenton","nom":"Aubenton","type":"Maison","periode":"XVII","histoire":"AUBENTON,   construction du Manoir d'Aubenton date du XVIIe siècle. Le manoir est devenu le Musée Jean Mermoz.","architecture":"AUBENTON . Le logis en rez-de-chaussée surélevé et à élévation ordonnancée, comporte deux étages de sous-sol voûtés en brique et pierre calcaire, accessibles par un escalier droit en maçonnerie. L'escalier central à retour avec jour du logis est en chêne. Le bâtiment principal est construit en briques avec un solin en pierre calcaire moyen appareil, l'aile en retour est en briques également comme le mur de clôture de la propriété qui est partiellement rempli de pierre de taille calcaire. Le portail attenant au logis est en pierre calcaire à bossage. Le bâtiment principal est couvert d'un toit à long pans à pignon découvert, l'aile en retour d'une croupe brisée, les trois lucarnes de cette aile d'une croupe ronde débordante, la tourelle carrée sur l'élévation postérieure d'un toit en pavillon .  la maison d'Aubenton, construite en 1610, est en briques et ardoises. L'aile en équerre sur la cour intérieure fut construite au XVIIIe siècle. La tourelle carrée est une adjonction du début du XXe siècle. Le manoir possède un escalier en chêne, des boiseries chêne maillé, ses cheminées et ses lambris de stucs du XIXe siècle. Le manoir est pourvu de caves en craie d'une maison médiévale antérieure (XVe-XVIe siècle) et de caves en briques du manoir du XVIIe siècle. Éléments protégés MH : les façades et les toitures du bâtiment sur rue et de l'aile en retour : inscription par arrêté du 29 décembre 1978.","habitants":"Seigneur local\"","divers":"Château d'Auberton GPS : 49° 50' 10\" Nord, 4° 12' 19\" Est","gps":"49° 50' 10\" Nord, 4° 12' 19\" Est","images":["../../jctruffet.com/image/image_02/02_Aubenton_1.jpg"]},"Consult_chateau_formulaire60c4":{"id":"Consult_chateau_formulaire60c4","dept":"02","canton":"Guise","commune":"Audigny","nom":"Audigny_Etang","type":"Chateaux","periode":"XV-XVI-XVIII","histoire":"Deux châteaux dans cet article; Audigny et Puissieux.                                                                    AUDIGNY, le château d'Audigny appelé aussi le château de l'Etang est un château bâti à Audigny,  C'est un petit château fort, construit du XVe au XVIe siècle, de forme polygonale. Il possède une belle entrée, entre deux tours cylindriques à base de pierre et la partie haute en brique encadrant un arc au-dessus duquel on voit encore les fentes par ou passaient les bras du pont-levis, entouré par des douves. Il faisait partie d'un réseau défensif et d'alerte, aux avant-postes du château de Guise, le long de la vallée de l'Oise. Juste derrière le château de l'Etang, se trouve une très belle église fortifiée appelée l'église de Beaurain, jusqu'à l'ancienne petite forteresse de Wiège-Faty. Le château d'Audigny est inscrit partiellement aux M.H. depuis le 28/07/1927, avec sa porte d'entrée fortifiée. Le château de l'Etang sert depuis d'habitation privée, transformé en ferme depuis 1770 propriété de madame Gaston Guisnet.","architecture":"A trois K.M. au sud -Est PUISSIEUX est un château bâti à Puisieux-et-Clandieu, la construction du château de Puisieux date du XVIIIe siècle. En 1780, Charles François de Fay d'Athies, marquis de Puisieux, seigneur de St Germain, Colonfay et Romery, fit construire le château. Un an plus tard, des communs longs de 67 m furent ajoutés dans la cour d'honneur. Cette famille est implantée en Thiérache depuis le Moyen-Age. Son nom est citée déjà en 1417. Elle compte deux chambellans du Roi au XVe siècle et plusieurs chevaliers de Malte au XVI siècle. Le château de Puisieux est devenu un gite bien agréable, entouré de fleurs. Un cèdre du Liban affiche 250 ans. Valérie et Hervé Bernadeau ont acheté le château, il y a 8 ans et ont eu l'idée de le transformer en lieu de séjour.","habitants":"Audigny Madame Gaston Guisnet.                                  Puisieux Charles François de Fay d'Athies\"","divers":"Deux châteaux dans cet article; Audigny grav 1-2-3-4 et Puissieux grav -5-6                                                             . GPS : 49° 52' 27\" Nord, 3° 39' 28\" Est                                                                                                        Puisieux GPS : 49° 51' 22\" Nord, 3° 40' 35\" Est","gps":"49° 52' 27\" Nord, 3° 39' 28\" Est","images":["../../jctruffet.com/image/image_02/02_Audigny_Etang_1.jpg","../../jctruffet.com/image/image_02/02_Audigny_Etang_2.jpg","../../jctruffet.com/image/image_02/02_Audigny_Etang_3.jpg","../../jctruffet.com/image/image_02/02_Audigny_Etang_4.jpg","../../jctruffet.com/image/image_02/02_Audigny_Etang_5.jpg","../../jctruffet.com/image/image_02/02_Audigny_Etang_6.jpg"]},"Consult_chateau_formulaire4ab9":{"id":"Consult_chateau_formulaire4ab9","dept":"02","canton":"Laon","commune":"Aulnois-sous-Laon","nom":"Aulnois_sous_Laon","type":"Château","periode":"XIII-XV","histoire":"AULNOIS, ce château a surtout été construit au XIIIe siècle. On connaît les seigneurs d'Aulnois depuis la fin du XIIe siècle. Après les seigneurs particuliers, la seigneurie passa aux cadets des Coucy. L'un de ceux-ci fut évêque de Metz et de Noyon. Puis les comtes de Roucy héritèrent de la baronnie. C'est alors que les princes de Condé ainsi que les Sarrebruche devinrent seigneurs d'Aulnois aux XVe et XVIe siècles, ensuite les La Rochefoucault aux XVIIe-XVIIIe siècles. Le Bourguignon Jean de Luxembourg, qui livra Jeanne d'Arc aux Anglais, s'empara du château de 1430 à 1440. Au XVIe siècle le prince de Condé, seigneur d'Aulnois, transforma la localité en asile de protestants. A la fin de ce siècle, ce château, après avoir été détruit par les Ligueurs, fut transformé en ferme.","architecture":"AULNOIS, c'est devenu un château-ferme. Les vestiges du château d'Aulnois-sous-Laon datent du XIIIe siècle. La famille d'Aulnois est mentionnée depuis la fin du XIIe siècle, Le fief échoit à une branche cadette de la famille de Coucy et aux Sarrebruck au cours du XVe siècle. De 1430 à 1440, le château est occupé par les Bourguignons. François de Bourbon-Conti, seigneur d'Aulnois, voit son château ruiné par les guerres de religions et en partie, ruiné par les Troupes de Balagny en 1589, Le château a la forme d'un quadrilatère. La grande porte s'ouvre vers le sud, sa voûte conserve les traces de la herse. A l'angle nord-est de l'enceinte est placé le donjon haut de vingt mètres. Il contient plusieurs salles voûtées d'ogives. La porte qui se trouve près de ce donjon a été percée à l'époque moderne. Les ligueurs ont rasé les courtines au-dessus du chemin de ronde. Éléments protégés MH : les restes de l'ancien château féodal : inscription par arrêté du 24 octobre 1927. puis celle venant de Laon en 1591. Ils sont classés aux M.H. depuis 1927.","habitants":"Famille d'Aulnois \"","divers":"château d'Aulnois                                               GPS : 49° 36' 46,33\" Nord, 3° 36' 14,07\" Est","gps":"49° 36' 46,33\" Nord, 3° 36' 14,07\" Est","images":["../../jctruffet.com/image/image_02/02_Aulnois_sous_Laon_1.jpg","../../jctruffet.com/image/image_02/02_Aulnois_sous_Laon_2.jpg","../../jctruffet.com/image/image_02/02_Aulnois_sous_Laon_3.jpg","../../jctruffet.com/image/image_02/02_Aulnois_sous_Laon_4.jpg"]},"Consult_chateau_formulairebe19":{"id":"Consult_chateau_formulairebe19","dept":"02","canton":"Marle","commune":"Autremencourt","nom":"Autremencourt","type":"Château","periode":"XIX","histoire":"AUTREMENCOURT,  Augustin-Gabriel, comte d'Aboville, pair de France, né le 20 mars 1774, à La Fère, de la branche picarde de la Famille, est un soldat émérite et à linstar de nombre de ses prédécesseurs, comme les Stoppa, plus souvent en campagne, à la tête de ses troupes, que sur ses terres autremencourtoises. Entré dans lartillerie comme Lieutenant en 1789, précise-t-on dans le Nobiliaire universel, il y gagna, tous ses grades par de brillants services en Allemagne, en Italie, en Hollande, au Portugal et en Espagne, en 1813. Nommé maréchal de camp en 1809, officier de la Légion dhonneur à linstitution de cet ordre, il fut fait commandeur, le 23/06/1810, Chevalier de la Couronne de fer en 1807 et chevalier de Saint-Louis en 1814. De son mariage contracté, le 25 juillet 1816, avec Mlle Caroline-Nathalie de Drouin de Rocheplatte, fille de Mr le comte de Rocheplatte, Officier de la Légion dHonneur, maire dOrléans et député du Loiret sous la Restauration, décédée elle-même à Pau, le 15 octobre 1832, il eut 2 fils et transmit prématurément à laîné lhéritage de la pairie, le 15/08/1820 ». Son second fils, Auguste-Ernest, Vicomte dAboville, né à Paris, le 4/12/1819, dAugustin-Gabriel et de Caroline-Nathalie de Drouin de Rocheplatte, lieutenant dartillerie démissionnaire, Maire de Glux (1858-1861), Député du Loiret à lAssemblée Nationale (1871), mourut au début du XXe siècle. Il hérita du château dAutremencourt, à la mort de son père, et le vendit, en 1844, à des habitants de Crécy-sur-Serre. L'imposant château d'Autremencourt appartient à la Famille Micberth, età  Mr de Meunier de Varlemont.  Il existe sur la commune 3 châteaux : le château du Vieux Gué, le château du Fief Lorisse appelé aussi le château Richard, du XIXe.","architecture":"AUTREMENCOURT   château du XIXe siècle réalisé en brique et pierre; il comprend un corps de logis rectangulaire légèrement saillant par rapport à ses ailes latérales; ces trois parties sont coiffées de toitures en croupe couronnées par des épis de faîtage; celles des ailes sont plus hautes que celle du centre et leur axe est perpendiculaire à la sienne. Élévation à deux niveaux. La pierre a été réservée aux cordons horizontaux qui courent au niveau des allèges, des sommets des baies, aux encadrements de celles-ci et aux pilastres ioniques qui délimitent le corps central et encadrent sa fenêtre centrale; on la retrouve aussi aux angles des ailes. Celles-ci présentent une sorte de troisième niveau, car leur lucarne a été établie plus bas que le niveau de la toiture. Le corps central présente cinq travées. Un décor de volutes coiffe les baies de l'étage du corps central. Une tourelle a été construite contre la face latérale de l'aile droite. A gauche du château, on accède aux bâtiments de ferme par une belle porte charretière couronnée par un fronton à volutes occupé par un écu timbré d'un M et encadré d'une guirlande.institut médico-professionnel.       Ce petit château du XIXe siècle a été réalisé dans la tradition classique;  et ses baies sont encadrées de pierre faisant harpe ; elles sont au nombre de deux par niveau de part et d'autre de la travée axiale; la prééminence de celle-ci est soulignée par plusieurs détails décoratifs ; c'est là que la porte principale du logis est percée ; la fenêtre de l'étage est précédée d'un balcon en fer forgé, deux volutes encadrant une sorte de fleur de lis lui constituent une sorte de fronton ;  cet ensemble verticale se prolonge au niveau de la toiture par une lucarne dont les piédroits décrivent des volutes, deux petits pylônes les accompagnent et son fronton triangulaire est surmonté d'une boule. Les deux ailes présentent chacune une seule baie par niveau. Un épi de faîtage marque le sommet de la toiture longitudinale.","habitants":"Augustin-Gabriel, comte d'Aboville\"","divers":"Château d'Autremencourt,                     GPS : 49° 42' 18\" Nord, 3° 47' 14\" Est","gps":"49° 42' 18\" Nord, 3° 47' 14\" Est","images":["../../jctruffet.com/image/image_02/02_Autremencourt_1.jpg","../../jctruffet.com/image/image_02/02_Autremencourt_2.jpg"]},"Consult_chateau_formulaire5e7b":{"id":"Consult_chateau_formulaire5e7b","dept":"02","canton":"Laon","commune":"Bruyères et Montbérault","nom":"Barisis","type":"Château","periode":"XVI-XVIII","histoire":"deux châteaux dans cet article, Barisis et du Breuil.                                BARISIS , c'est le 3ème château d'Arsene Houssaye, écrivain talentueux du siècle dernier, à Bruyères et Montberault. Celui-ci a laissé 3 belles demeures, dans le style des « Folies » bourgeoises, tant à la mode, jusquà la Belle Epoque. Des trois, cest le château de Breuil, construit en 1860, qui est le plus imposant. Le château, bien que vendu par Arsène Houssaye dès 1873, est resté quasiment intact et se dresse toujours aussi fièrement en lisière de forêt, le long de la route dAthies. Arsène Houssaye se réfugia, alors sous les frondaisons de Valbon, à Vorges, un village voisin, où il fit construire, en 1876, un petit château, de style éclectique, le château de Valbon dont il se lassa, rapidement. Il revint en 1880 à Bruyères, rue de Laon, dans une nouvelle demeure, de style néo Louis XIII. Ses amis de Paris la baptisèrent le château de Parisis, du nom du héros de lun de ses romans, « Grandes Dames ». Il y séjournera jusquà sa mort en 1896. Le château de Parisis appartient depuis à Mr et Mme Tarroun.","architecture":"BREUIL, la Folie-Riancourt, château de Breuil, était un vieux manoir en 1568 et cest lécrivain, de son vrai nom Arsène Housset, qui le fit restaurer plus tard. Des trois châteaux de lécrivain, cest le château de Breuil, construit en 1860, le plus magistral. Le château de Breuil s'est spécialisé en restaurant, en séminaires et en chambres d'hôtes,","habitants":"Famille d'Arsene Houssaye\"","divers":"deux châteaux dans cet article, Barisis grav-1 et du Breuil grav-2.                                      GPS : 49° 31' 31\" Nord, 3° 39' 51\" Est","gps":"49° 31' 31\" Nord, 3° 39' 51\" Est","images":["../../jctruffet.com/image/image_02/02_Barisis_1.jpg","../../jctruffet.com/image/image_02/02_Barisis_2.jpg"]},"Consult_chateau_formulaire4177":{"id":"Consult_chateau_formulaire4177","dept":"02","canton":"Fère-en-Tardenois","commune":"Bazoches sur Vesles","nom":"Bazoches_Vesles","type":"Château","periode":"XIII","histoire":"Deux châteaux dans cet article , Bazoches et Mont st Martin. BAZOCHES sur VESLES, établi dans le fond plat de la vallée de la Vesle, Bazoches était au Moyen-Age l'un des châteaux les plus importants de la région, en superficie au moins. cette terre appartenait aux évêques de Soissons, qui la donnèrent en fief à la famille de Bazoches; le château passa ensuite dans les possessions de la puissante famille de Châtillon (branche de Châlons), et y resta jusqu'à la fin du Moyen-Age. La première mention de ce château remonte à 1232, date à laquelle Nicolas de Bazoches fait hommage de sa maison-forte à l'évêque de Soissons. Mutilé au cours de la guerre de Cent ans, restauré par la suite, il a été presque totalement détruit par les bombardements en 1918.","architecture":"BAZOCHES sur VESLES,   Actuellement, quatre tours subsistent encore, et deux seulement sont dignes d'étude; d'un diamètre externe de six mètres environ, possèdant au rez-de-chaussée une salle voûtée en coupole, desservie par trois archères. Dans une des tours, un escalier rampant, ménagé dans l'épaisseur du mur, menait à un niveau supérieur. De l'ancien logis ne subsistent que les anciennes caves voûtées, sous l'esplanade intérieure, et une fenêtre géminée de la première moitié du XIIIe siècle. Au vu de ce qu'il reste il semble que le château ne soit guère antérieur à la date où Nicolas de Bazoches en fit l'aveu et malgré son état Bazoches reste un intéressant témoin de la fortification champenoise dans la première moitié du XIIIe siècle.    Éléments protégés MH : les restes de l'enceinte : inscription par arrêté du 28 juin 1927.                                                                                                              A cinq K.M au sud  MONT-ST-MARTIN est un château bâti à Mont-Saint-Martin, sa construction date du XVIIe siècle, est inscrit, partiellement, aux M.H. depuis 1927 pour sa porte, est privé, fermé au public.","habitants":"Famille de Bazoches\"","divers":"Deux châteaux dans cet article , Bazoches grav 1-2et Mont st Martin grav-3. GPS : 49° 16' 56\" Nord, 3° 38' 23\" Est","gps":"49° 16' 56\" Nord, 3° 38' 23\" Est","images":["../../jctruffet.com/image/image_02/02_Bazoches_Vesles_1.jpg","../../jctruffet.com/image/image_02/02_Bazoches_Vesles_2.jpg","../../jctruffet.com/image/image_02/02_Bazoches_Vesles_3.jpg","../../jctruffet.com/image/image_02/02_Bazoches_Vesles_4.jpg"]},"Consult_chateau_formulaire3ea6":{"id":"Consult_chateau_formulaire3ea6","dept":"02","canton":"Guise","commune":"Aisonville-et-Bernoville","nom":"Bernoville","type":"Château","periode":"XVIII","histoire":"BERNOVILLE, l'édifice est caractéristique des architectures en brique et pierre, du début du XVIIIe siècle construit quand Jacques François Maxime de Chastenet, Marquis de Puységur en était propriétaire.  Décédée en 1777, dame Marie Martine Camps-Laurent, épouse de Ferdinand de l'Epine, était dame de Bernoville, d'Aisonville, de Roberfart et autres lieux. Son testament du 10/05/1774, qui faisait de son mari son légataire universel, a été annulé par un arrêt du parlement de Paris du 1er septembre 1780. Le château fut en partie endommagé durant la première guerre mondiale. Le château de Bernoville est inscrit aux M.H. depuis le 24/12/1997. reconverties en un hôtel 3 étoiles.","architecture":"BERNOVILLE, édifice caractéristique des architectures brique et pierre du début du XVIIIe siècle, construit quand Jacques François Maxime de Chastenet, marquis de Puységur en était propriétaire. Edifice composé d'un corps de logis principal avec deux ailes en retour d'équerre sur la cour d'honneur, ailes légèrement saillantes sur le parc. Elévation à trois niveaux, soubassement à demi-enterré et deux étages. Château précédé d'une allée d'honneur plantée de tilleuls. Un jardin à la française, avec des parterres de buis taillés, autour de la demeure. Des allées de tilleuls et, dans le parc boisé tracé par des allées, un manège tournant et un ancien vivier à poissons en terrasses.  Éléments protégés MH : les façades et les toitures du château et des pavillons, la grille d'entrée, l'allée d'honneur, le jardin à la française : inscription par arrêté du 2 mai 2012.","habitants":"Famille de François Maxime de Chastenet,\"","divers":"Château de Bernoville                                      gps 49° 55' 50,38\" Nord, 3° 30' 32,48\" Est","gps":"","images":["../../jctruffet.com/image/image_02/02_Bernoville_1.jpg","../../jctruffet.com/image/image_02/02_Bernoville_2.jpg"]},"Consult_chateau_formulaire519e":{"id":"Consult_chateau_formulaire519e","dept":"02","canton":"Soissons","commune":"Berzy le Sec","nom":"Berzy_le_Sec","type":"Vestiges -château","periode":"XIII-XV","histoire":"BERZY le SEC,  situé sur une position qui domine la vallée de la Crise, le château de Berzy dépendait de la châtellenie de Pierrefonds, et était régi depuis Philippe Auguste par la coutume des Valois. Remanié au cours des siècles, c'est déjà un logis fortifié à l'époque Carolingienne, renforcé et agrandi aux XIVe et XVe siècles à l'époque de la guerre de cent ans, modifié encore dans le style de la renaissance, à l'époque des guerres d'Italie. Aux premiers seigneurs connus au XIIe siècle succèdent: la famille de Louvain, du milieu du XVe siècle au milieu du XVIe siècle, la famille d'Estrées, par mariage du milieu du XVIe siècle au XVIIIe siècle, puis la famille le Peletier de Saint-Fargeau jusqu'au début du XIXe siècle, la demeure sera transformée en exploitation agricole du XIXe siècle jusqu'à la Première Guerre Mondiale. Le château porte les armes de France et celles des Orléans comme à Pierrefonds et à La Ferté Milon. Détruit par la première guerre mondiale, qui fit du château un amas de décombres, mais il fut sauvé de la disparition par son classement MH.","architecture":"BERZY le SEC, le château s'inscrivait dans un quadrilatère de 32 m à 51 m de côté. Il comportait en plus de ce qui subsiste des combles qui couvraient le deuxième étage, un mur de défense d'une dizaine de mètres de haut surmonté de tourelles dans les angles (la totalité de l'enceinte existait jusqu'en 1850) des bâtiments à usage domestique dans la cour, d'un puits, d'un pont-levis, d'un ouvrage avancé, de fossés aujourd'hui remblayés creusés dans le banc rocheux et de deux tours qui rehaussaient l'actuel châtelet de deux étages.  Le bâtiment s'apparente à une série de châteaux ou le chemin de ronde prime sur le donjon (la circulation était continue sur toute la périphérie de l'enceinte comme à La Ferté Milon, le château est depuis 1984 propriété de la commune. Il subsiste aujourd'hui les ruines de cette bâtisse, des fossés adjacents et une cour intérieure.  Éléments protégés MH : les restes du château, les fossés adjacents et la cour intérieure : classement par décret du 13 juillet 1926.","habitants":"Famille de Louvain\"","divers":"Château de Brezy le Sec                         GPS : 49° 20' 00,03\" Nord, 3° 18' 42,09\" Est","gps":"49° 20' 00,03\" Nord, 3° 18' 42,09\" Est","images":["../../jctruffet.com/image/image_02/02_Berzy_le_Sec_1.jpg","../../jctruffet.com/image/image_02/02_Berzy_le_Sec_2.jpg"]},"Consult_chateau_formulaired2d1":{"id":"Consult_chateau_formulaired2d1","dept":"02","canton":"Vic-sur-Aisne","commune":"Blérancourt","nom":"Blérancourt","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux dans cet article; BlérancourtBLERANCOURT, château édifié en 1612 par Bernard Potier de Gesvres,  qui avait épousé Charlotte du Vieuxpont, lié avec Catherine de Médicis comme avec la marquise de Rambouillet qui désirait  une résidence style palais.  Malheureusement en 1652  le château est dévasté par les espagnols, en 1783 le domaine sort de la famille des Potier et vendu à Jérome-Joseph Genet. Déclaré bien nationale revendu et en 1796 début de la démolition En 1917, le château sert de quartier général pour l'organisation de secours portés aux civils, l'American Comitte for Devasted France. En 1924, après la dissolution du Comité, Anne Morgan qui annime un hôpital rachète le domaine de Blérancourt avec l'association des amis du musée de Blérancourt restaure le château qui abrite aujourd'hui le musée national de la coopération franco-américaine. En 1938-1940, un pavillon est construit pour présenter les collections du musée. Les architectes Yves Lion et Alan Levitt y ajoutent un second pavillon en 1989.","architecture":"BLERANCOURT, construit en pierre, entouré de fossés, il se composait d'un corps de logis flanqué de quatre pavillons isolés. Le bâtiment à trois étages était orné par l'ordre dorique au rez de chaussée, ionique à l'étage et un étage d'attiques à pilastres. En 1792, le château est déclaré bien national, vendu et démantelé. Endommagé pendant la première guerre mondiale. Ne subsistent aujourd'hui que les pavillons et les portails d'entrée, les ruines des communs, le pont.  Éléments protégés MH : la porte d'entrée et les deux pavillons d'angle : classement par arrêté du 2 avril 1925. La grande porte d'entrée et les façades et toitures des deux pavillons du XVIIIe siècle qui y sont accolés : classement par décret du 19 août 1932. La porte en pierre dite porte du potager : classement par arrêté du 16 mai 1933. Le pont, les douves et la terrasse du château, les murs de clôture des jardins qui entourent le château, les ruines des communs et les sols archéologiques : inscription par arrêté du 28 septembre 2001, modifiée par arrêté du 1er février 2002.","habitants":"Famille de Bernard Potier de Gesvres\"","divers":"Deux châteaux dans cet article; Blérancourt grav-1-2-3-4-5  et                                             Blérancourt                                                         GPS : 49° 31' 05\" Nord, 3° 09' 17\" Est","gps":"49° 31' 05\" Nord, 3° 09' 17\" Est","images":["../../jctruffet.com/image/image_02/02_Bl%c3%a9rancourt_1.jpg","../../jctruffet.com/image/image_02/02_Bl%c3%a9rancourt_2.jpg","../../jctruffet.com/image/image_02/02_Bl%c3%a9rancourt_3.jpg","../../jctruffet.com/image/image_02/02_Bl%c3%a9rancourt_4.jpg","../../jctruffet.com/image/image_02/02_Bl%c3%a9rancourt_5.jpg","../../jctruffet.com/image/image_02/02_Bl%c3%a9rancourt_6.jpg"]},"Consult_chateau_formulaire0376":{"id":"Consult_chateau_formulaire0376","dept":"02","canton":"Marle","commune":"Bois lès pargny","nom":"Bois_lès_Pargny","type":"Château","periode":"XVII","histoire":"BOIS LES PARGNY,   le château de Bois lès Pargny a été construit au XVIIe siècle par les sires de Coucy pour la famille de Maubeuge. C'est une curiosité peu ordinaire, car au XVIIe siècle, on ne construisait plus de donjon, qui n'était d'aucune utilité défensive. La Tour est de style Louis XIII, avec ses tourelles en encorbeillement. Les murs du château de Bois-les-Pargny sont de briques roses avec des soubassements en grès. La salle des gardes est voûtée au rez-de-chaussée. L'aile en brique date de 1722.. C'est un château fort entouré de douves aux avant-postes du château de Guise le long de la vallée de l'Oise. Propriété de madame Laye.","architecture":"BOIS LES PARGNY,   tour Louis XIII avec tourelles en encorbellement, murs de briques roses avec soubassements en grès, ancrages en fer forgé précisant la date de 1611, époque de la construction. Salle des gardes voûtée au rez-de-chaussée. L'aile en brique contiguë date de 1722.  Sa construction date de 1611. Les assises en grès permettent de supporter le poids des murs en briques. Le détail des motifs en briques vernissées dévoilent des losanges et deux curs. La date de construction du donjon est écrite en briques vernissées et en chiffes en fer forgé. On aperçoit les initiales en briques vernissées P L B , soit Pargny-lès-Bois. Les corbeaux ont servi de support, à un balcon, comme le prouve les 2 fenêtres au-dessus qui ont été murées. Il existe aussi un cadran solaire. Le donjon du château de Bois-lès-Pargny a été Classé partiellement aux M.H. en 1927.","habitants":"Famille de Maubeuge.\"","divers":"Château de Bois lès Pargny                     GPS : 49° 43' 56\" Nord, 3° 38' 55\" Est","gps":"49° 43' 56\" Nord, 3° 38' 55\" Est","images":["../../jctruffet.com/image/image_02/02_Bois_l%c3%a8s_Pargny_1.jpg","../../jctruffet.com/image/image_02/02_Bois_l%c3%a8s_Pargny_2.jpg","../../jctruffet.com/image/image_02/02_Bois_l%c3%a8s_Pargny_3.jpg"]},"Consult_chateau_formulaire2138":{"id":"Consult_chateau_formulaire2138","dept":"02","canton":"Marle","commune":"Bosmont sur Serre","nom":"Bosmont","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux dans cet article Bosmont et Chambly.                  BOSMONT,  au XIIe siècle   la seigneurie aoppartient aux Montchalon en 1346, les Anglais s'emparèrent du château-fort de Bosmont que leur livra Jean de Coucy-Vervins, seigneur de Bosmont. Les Français vinrent aussitôt en faire le siège, le prirent et le rasèrent, le château  fut acquis par les Chambly au XVIe siècle, il fut reconstruit en 1687-1694  Jacques-François de Chambly, par alliance au milieu du XVIIIe siècle  il appartient à la comtesse de la Tour du Pin Chambly de la Charce. Leur fils René-François ancien colonel des grenadiers royaux de bourgogne meurt à l'échafaud pendant la Révolution, le château pillé et  confisqué comme bien national, René de la Tour du Pin Chambly meurt en 1860 parvient à racheter le domaine sous l'empire et effectue une novelle restauration mais sera anéantie de nouveau  par un incendie en 1941, les la Tour du Pin s'installe dans les communs et entreprennent une nouvelle fois à rendre leur demeure dans son ancien éclat, tache qui continue aujourd'hui par la vicomtesse Tanguy de Rosmorduc veuve en premières noces du marquis de la Tour du Pin et par ses enfants héritiers toujours dans la famille.","architecture":"BOSMONT de style Louis XIII, bien que rasé pendant la guerre de cent ans aux murs de Brique relevés d'encradement en pierre de taille fut construit en 1661 et endommagés par un incendie durant la seconde guerre mondiale, de beaux communs et des douves l'accompagnent, l'édifice de plan rectangulaire à deux niveaux lucarnes sur toit brisé, avant corps d'entrée de trois travées avec fronton triangulaire.\nCHAMBLY, les seigneurs de Bosmont furent d'abord les seigneurs de Montchâlons (au sud de Laon et pas loin de cette ville) du XIIe au XIIIe siècle. Les sires de Coucy (branche cadette de Vervins) en héritèrent du XIIIe au XIVe siècle. Ensuite ce domaine échut aux seigneurs de La Bove près du chemin des Dames. Les Chambly l'achetèrent au XVIe siècle. La fille du dernier Chambly se maria au comte de la Tour du Pin de la Charce. A la Révolution son fils fut guillotiné et ses biens confisqués en 1794. Ses enfants récupérèrent le château et ses descendants le possèdent toujours aujourd'hui. Le château actuel fut construit par François de Chambly en 1661, date figurant sur la façade. Malgré la date, il est encore de style Louis XIII, les murs étant en brique, mais les fenêtres et les portes étant encadrées de pierres de taille avec chaînages verticaux en harpe, les grandes pierres alternant avec les petites pierres. Malheureusement, l'intérieur a dû presque entièrement être refait après la deuxième guerre mondiale par suite d'un incendie.  Éléments protégés MH : les façades et les toitures des communs, les douves : inscription par arrêté du 8 décembre 1966. Les façades et les toitures du château : inscription par arrêté du 14 octobre 1970.","habitants":"Famille de Jacques-François de Chambly, comte de la Tour du Pin de la Charce \"","divers":"Deux châteaux dansz cet article Bosmont grav-1-2 et Chambly  grav-3.                                                                                                  Bosmont GPS 49° 43' 57? nord, 3° 51' 37? est                                                        Chambly  GPS : 49° 43' 40\" Nord, 3° 51' 38\" Est","gps":"49° 43' 40\" Nord, 3° 51' 38\" Est","images":["../../jctruffet.com/image/image_02/02_Bosmont_1.jpg","../../jctruffet.com/image/image_02/02_Bosmont_2.jpg","../../jctruffet.com/image/image_02/02_Bosmont_3.jpg"]},"Consult_chateau_formulaire08ae":{"id":"Consult_chateau_formulaire08ae","dept":"02","canton":"Villeneuve-sur-Aisne","commune":"Bouconville-Vauclair","nom":"Bove","type":"Château","periode":"XVII-XVIII","histoire":"BOVE , en 1160,  devint une seigneurie laïque importante dépendant de la châtellenie d'Eppes et relevant de la tour de Laon, l'édifice constituait un des forts royalistes de la contrée permettant de surveiller la route. La propriété se dégradant peu à peu, la grande tour fut reconstruite en 1638. En 1719, Gaspard Hyacinthe de Caze acheta le domaine à François Augustin d'Augsbourg. Il fit entièrement rebâtir le château entre 1725 à 1730. En 1753, la propriété est achetée par Françoise de Châlus, dame d'honneur de Madame Adélaïde de France, fille de Louis XV, épouse de Jean, duc de Narbonne Lara et maréchal de camp. La comtesse posséda le château jusqu'à la Révolution. Il fut confisqué puis racheté en partie par le vendeur précédent, étant donné le degré de dégradation de l'édifice, le propriétaire acheva la démolition. Une chapelle fut reconstruite. Les écuries voûtées constituaient les seuls vestiges du château de 1725. C'est en 1821 que la famille Desèvre de Soissons entra en possession de l'habitation qui avait survécu au château,  La propriété fut occupée lors des exactions qui opposèrent les Russes à la Jeune Garde de Napoléon: un officier de l'armée de l'Empereur, le général Ney, y campa le 6 mars 1814. Le château fut acquis en 1893 par Henri Rillart de Verneuil, officier d'artillerie, il y ajouta en 1900-1901 deux pavillons et deux tourelles rectangulaires, et une ferme complétait le complexe architectural.L'édifice occupant un emplacement stratégique, fut investi par l'état major allemand en 1914. En janvier 1917, le château était complètement pillé, les communs brûlés et la ferme très endommagée. Il fut détruit le 15 avril 1917 lors de l'offensive Nivelle, alors que les Allemands occupaient le château, le propriétaire envoya 150 obus de 370 sur sa demeure. Les travaux de reconstruction, confiés à Bonnet, auteur du château de Ployart, se poursuivirent de 1928 à 1933.","architecture":"BOVE, l'habitation, désormais plus près de la vallée, est en fait une réplique réduite du château de Champs sur Marne, construit entre 1701 et 1710 par l'architecte Bullet de Chamblain. La chapelle fut consacrée le 18 octobre 1932 par Monseigneur Mennechet, évêque de Soissons et reconstruite à l'emplacement de l'ancien château. dont il ne restait plus que les communs et le parc. La maison de plaisance du XIXe siècle était composée d'un corps principal de cinq travées de long, flanqué de deux parties latérales de logis ajourées de trois baies cintrées au deuxième étage et de fenêtres rectangulaires au rez-de-chaussée. Desèvre reconstitua en partie le domaine autour des vestiges. Étant donnés son emplacement stratégique, sa position au coeur de l'histoire du Chemin des Dames, sa construction raffinée, ses jardins et la présence de vestiges médiévaux, le domaine possède un intérêt certain tant historique qu'architectural.   l'édifice est construit en bordure d'une terrasse, en contrebas de son emplacement d'origine. Entièrement en pierre de taille, il est agrémenté d'une rotonde sur la façade méridionale. Long de neuf travées, le château bénéficie d'un étage carré, surmonté d'un étage sous comble, coiffé d'un toit en pavillon brisé en ardoise. Lucarnes et oeils-de-boeuf animent la couverture sur tout le pourtour. La modénature et le traitement décoratif sont d'une grande sobriété.","habitants":"Famille de  Françoise de Châlus                                   famille Desèvre de Soissons \"","divers":"Château de Bove,                                 GPS : 49° 87' 33\" Nord, 3° 45' 00\" Est","gps":"49° 87' 33\" Nord, 3° 45' 00\" Est","images":["../../jctruffet.com/image/image_02/02_Bove_1.jpg"]},"Consult_chateau_formulairecdd9":{"id":"Consult_chateau_formulairecdd9","dept":"02","canton":"Vervins","commune":"Brunehamel","nom":"Brunehamel","type":"Château","periode":"XV-XVI","histoire":"BRUNEHAMEL, un château médiéval a existé antérieurement ; en 1340, le seigneur du lieu prit une part très active au ravage de la terre de Chimay qui appartenait à Jean de Hainaut. C'est en 1551 que les deux frères de Margival, seigneurs de Brunehamel, entreprirent de renouveler cette vieille forteresse médiévale; ils entourèrent leur nouvelle résidence de fossés et ils la protégèrent par un rempart qu'ils flanquèrent de neuf tours. Le château fut restauré en 1783 et en 1807 la famille de Cossé-Brissac qui en était propriétaire le vendit au général Antoine Merlin ; il fut acquis par la suite par Pierre de Constant, puis de 1838 à 1864, il appartint à un sieur Croizon et il abrita un pensionnat de jeunes filles pendant quelques années avant de passer à nouveau entre les mains de divers propriétaires.","architecture":"BRUNEHAMEL, ce château en brique et en pierre est constitué d'un corps de bâtiment rectangulaire dont l'un des angles est pourvu d'une tourelle ronde coiffée d'une poivrière. Contre la face opposée, on a adossé une annexe rectangulaire qui abrite l'escalier. Son élévation est à trois niveaux, ses angles sont renforcés par des pierres disposées en harpes alternées. L'escalier en pierre qui dessert les étages de cette demeure est remarquable : il est à rampes droites et couvert par des berceaux rampants. La propriétaire actuelle, Mme Louis Samuel Thomas, s'emploie à le restaurer et à en assurer la sauvegarde.","habitants":"famille de Cossé-Brissac \"","divers":"Château de Brunehamel,                   gps 49° 46' 14? nord, 4° 10' 58? est","gps":"","images":["../../jctruffet.com/image/image_02/02_Brunehamel_1.jpg"]},"Consult_chateau_formulaire6624":{"id":"Consult_chateau_formulaire6624","dept":"02","canton":"Fère-en-Tardenois","commune":"Bucy le long","nom":"Bucy_le_Long","type":"Château","periode":"XIV-XV","histoire":"Trois châteaux dans cet article; Bucy, la Celles et Ruisseaux.                                    BUCY le LONG  La petite ville de Bucy, d'où était originaire le fameux évêque de Soissons, Simon de Bucy, abrite les restes d'un château assez important, de la fin du XVe siècle. C'est en 1480 que Guillaume de Bische acheta l'ancien fief de Broyon, où ne s'élevait jusqu'alors qu'une simple maison seigneuriale; il fit construire un château, composé d'une cour quadrangulaire flanquée de pavillons carrés, les logements formant deux ailes en équerre édifiées sur deux côtés de la cour. A l'angle de ces logis était disposée une tour qui est le seul reste du château; son plan en U avait le même axe que l'une des ailes, et, de ce fait, elle était tangente à la deuxième aile. Cette tour n'était pas conçue comme tour flanquante; et, à l'examen, il apparaît en effet qu'elle abritait l'unique accès aux deux ailes du logis, par une petite poterne ménagée à la base, protégée par une herse et une bretèche. A l'intérieur de cette tour, un spacieux escalier en vis desservait les deux niveaux principaux des logis. La tour de Bucy, délaissée, est un vestige intéressant de l'architecture seigneuriale du XVe siècle, où l'on ne peut se résoudre à abandonner toute défense, bien que les châteaux ne soient plus en mesure de soutenir un siège. Éléments protégés MH : la tour : inscription par arrêté du 9 janvier 1926                                                    RUISSEAUX, le château des Ruisseaux date d'avant la Révolution, vers 1760. Il fut la propriété du Général Dutour de Noirfosse, puis de la Famille Cornu-Langy, sur plusieurs générations. Aujourd'hui, il accueille un centre de santé APTE : Centre d'aide et prévention des toxicomanes-dépendances par l'entraide. Le Centre a ouvert le 5/04/1994 et a reçu la visite de l'ancien Président de la République Jacques Chirac, le 9/06/1998.","architecture":"BUCY le LONG  C'était un ancien château féodal du XIVe siècle. C'est le plus ancien monument de Bucy-le-Long. Haute de 20 mètres, classée M.H.  , la Tour du château de Bucy-le-Long est la fierté du village. Elle date en réalité du roi Louis XI, ce terrible monarque qui prenait plaisir à enfermer ses ennemis, dans des cages étroites, où ils leur étaient impossible de se tenir debout. Le constructeur de la Tour était Guillaume de Bische, qui devint le premier seigneur de Bucy. Il débuta comme simple valet d'un négociant de Bourgogne. Il sut se faire remarquer par le roi Charles le Téméraire qui le fera nommer Gouverneur de Soissons. Il aimait beaucoup Bucy. Il y acheta des fiefs et y fit bâtir son manoir. Bien qu'il soit un manoir de plaisance, il était toutefois fortifié. Ce fut le dernier qui fut bâti en Soissonnais. Isolée au milieu des bâtiments ruraux récents, la Tour se hausse fièrement à l'instar des anciens vestiges qui sauvegardaient les féodaux des derniers siècles, lesquels dans leurs châteaux renouvelés, tenaient à conserver un témoin de leur suzeraineté. De la rue, on aperçoit la Tour de l'ancien château de Bucy-le-Long, qui date du XIVe siècle et se trouve, aujourd'hui, au coeur d'une ferme. La Tour de l'ancien château du XIVe siècle est classée aux M.H. depuis 1926.                                                      A cinq K.M. à l'Est, CELLES sur Aisne, le château originel  avant d'être détruit, datait du XVIIIe et a appartenu à Mr Petit, médecin de Louis XV. La demeure est bâtie sur un sous-sol complet, où l'on retrouve des caves voûtées. Surplombant son parc, elle est implantée sur un domaine entièrement clos de 8477 m2.","habitants":"Général Dutour de Noirfosse                                et Guillaume de Bische, \"","divers":"Trois châteaux dans cet article; Bucy grav-5 , Celles grav-1-2-3 et Ruisseaux grav-4.                                   Ruisseaux GPS : 49° 23' 22\" Nord, 3° 24' 10\" Est                                            Celles GPS : 49° 24' 25\" Nord, 3° 28' 57\" Est","gps":"49° 23' 22\" Nord, 3° 24' 10\" Est","images":["../../jctruffet.com/image/image_02/02_Bucy_le_Long_1.jpg","../../jctruffet.com/image/image_02/02_Bucy_le_Long_2.jpg","../../jctruffet.com/image/image_02/02_Bucy_le_Long_3.jpg","../../jctruffet.com/image/image_02/02_Bucy_le_Long_4.jpg","../../jctruffet.com/image/image_02/02_Bucy_le_Long_5.jpg"]},"Consult_chateau_formulaire892f":{"id":"Consult_chateau_formulaire892f","dept":"02","canton":"Villers-Cotterêts","commune":"Buzancy","nom":"Buzancy","type":"Château","periode":"XVI","histoire":"BUZANCY. un château est cité dans un aveu de 1192, des comtes de Grandpré aux comtes de Champagne, devient  la propriété de la famille d'Anglure de Bourlémont puis des Talaru. Saisie et placée sous séquestre, elle est adjugée en 1756 à Pierre-Guillaume Tavernier de Boullongne. Celui-ci confie la modernisation du château à l'architecte Claude Bacarit. Celui-ci fait raser l'ancien château-fort dont il ne conserve que les fossés, les fondations et les caves, pour faire construire un château moderne, dont subsistent les communs, en forme de fer à cheval. En 1781, Tavernier de Boullongne vend au fermier général Jacques-Mathieu Augeard. Le château brûle en novembre 1784. Il est alors de nouveau reconstruit, de 1787 à 1790, par l'architecte François-Joseph Bélanger. Le château n'avait rien des grâces, de la légèreté et de la frivolité des Folies de cette époque, mais tout d'un petit palais. 80 pièces : 20 appartements à l'étage avec boudoir et chambre, une chapelle, une salle de bains, une réplique de la galerie des glaces (côté parc), ainsi qu'un grand salon, une salle de billard, un petit salon, et une salle de théâtre, sans compter l'aile réservée aux offices. La prairie, redessinée par Bélanger, devient un parc à la française peuplé de statues, dont le groupe sculptural de la Samaritaine face à une immense pièce d'eau sur une longueur de 700 mètres, ornement principal du jardin. Incarcéré pendant 136 jours durant la Révolution, puis libéré, Augeard rejoint Buzancy puis émigre à Bruxelles et Coblence. Le château est déclaré bien national le 8 mai 1792. En septembre et octobre 1792, les princes étrangers et le roi de Prusse y logent. Rentré après le 18 brumaire, Augeard meurt à Paris en 1805. La même année, un nouvel incendie endommage fortement le château qui est détruit en 1808.","architecture":"BUZANCY, Ainsi disparait en fumée ce « petit Versailles » de village. Le parc retourne en pâturage, et, des statues, ne subsiste que le nom de la Samaritaine, associé au plan d'eau. Des aménagements touristiques ont été créés à l'extrémité Ouest de ce plan d'eau, camping et mobil home.\nLes édifices subsistant, pavillon d'entrée, bouverie, écurie, pièce d'eau, sont classés au titre des monuments historiques en 1982, 1986 et 2010,. Ne subsistent du château qu'un pavillon d'entrée, ainsi que les bouveries, les écuries, et une pièce d'eau dite de la Samaritaine.\nLes bouveries sont utilisées comme haras et maison du cheval ardennais. Les écuries restent à remettre en état. Ces deux édifices sont construits suivant un plan en hémicycle rappelant celui des écuries du château de Versailles. Les façades sur cour sont parées de maçonneries présentant un bossage en table. Les ouvertures sont assurées par une alternance de portes étroites, de fenêtres avec linteau en arc segmentaire et de grandes portes cochères. Des lucarnes en pierre ornent les combles.","habitants":"Famille d'Anglure de Bourlémont\"","divers":"Buzancy, gps  49° 18' 52? nord, 3° 20' 54? est","gps":"","images":["../../jctruffet.com/image/image_02/02_Buzancy_1.jpg","../../jctruffet.com/image/image_02/02_Buzancy_2.jpg","../../jctruffet.com/image/image_02/02_Buzancy_3.jpg"]},"Consult_chateau_formulaireafc3":{"id":"Consult_chateau_formulaireafc3","dept":"02","canton":"Vervins","commune":"Fontaine-lès-Vervins","nom":"Cambron_Aisnes","type":"Château","periode":"XVIII","histoire":"CAMBRON  château construit en 1551 par Raoul III de Coucy seigneurs de Vervins qui aimait y résider, Raoul III de Coucy-Poilcourt (fils de Raoul II + 1515 chambellan de Louis XII et de Hélène de Gobert de la Chapelle sa seconde épouse) il y cachait ses amours avec une belle demoiselle de Vervins. Il y mourut dix ans plus tard. En 1775, à la mort de Louis de Monjot, seigneur de Cambron le domaine fut adjugé à un sieur Sarget de la Fontaine, négociant à Vervins. Au château de Cambron. Un de ses fils Louis, de son premier mariage et, trois enfants naturels reconnus de son second mariage, furent recueillis, son neveu Jacque, après sa mort. L'ancien château de Cambron est inscrit, avec sa tour du XVe siècle, aux M.H. depuis 1928,  est devenu la propriété de Jean Matha.","architecture":"CAMBRON,  aujourd'hui il ne subsiste que la tour octogonale qui se trouve dans la cour d'une ferme. Bâtie en brique sur un soubassement de pierre, cette tour est haute de 18 m et son plan est octogonal. Deux cordons de pierre blanche marquent les divisions intérieures trois pièces de plan circulaire s'y superposent, les deux premières sont voûtées. Des meurtrières et quelques ouvertures cintrées, dont quelques unes sont aveugles, éclairent l'intérieur. Des arrachements semblent indiquer que la tour n'a pas toujours été isolée et qu'elle devait flanquer l'angle d'un bâtiment important.","habitants":"Famille de Louis de Monjot\"","divers":"Château de Cambron-Aisnes                  GPS : 49° 49' 42\" Nord, 3° 52' 20\" Est","gps":"49° 49' 42\" Nord, 3° 52' 20\" Est","images":["../../jctruffet.com/image/image_02/02_Cambron_Aisnes_1.jpg"]},"Consult_chateau_formulairec420":{"id":"Consult_chateau_formulairec420","dept":"02","canton":"Villers-Cotterêts","commune":"Lagny sur Automne","nom":"Castellant_Lagny","type":"Château","periode":"XVIII","histoire":"CASTELLANT, il y a des sources, une rivière, un bassin, un temple de la Philosophie, un temple de la nature, des grottes, des statues et un hôtel de la Rêverie qui forment un parc anglais, mystérieux et romantique, dédié à Jean-Jacques Rousseau. Le monument est inscrit au titre des monuments historiques en 2008. Sous l'Ancien Régime, l'actuel parc Castellant (les Charmettes), alors nommé « clos de la Brasserie », fut acquis par les Marquis de Condren en 1589. En 1793, Jacques Conseil, ancien curé de la paroisse devenu maire de Largny, acheta l'ensemble de la propriété et ses héritiers furent la famille de Ryon. L'abbé Conseil qui était le cousin d'Alexandre Dumas, avait été gouverneur des pages. A partir de 1823, le domaine passa successivement aux familles Guay et Moutonnet-Joly avant d'être acquis en 1891 par le journaliste Auguste Castellant (1844-1918) qui fut à l'origine de la création et de l'aménagement du parc actuel. Le journaliste et écrivain Auguste Castellant avait une admiration passionnée pour l'uvre de Jean-Jacques Rousseau (1712-1778). L'engagement d'Auguste Castellant, reconnu au niveau national, lui valut de faire partie de la commission qui présida à l'ouverture des tombeaux de Voltaire et de Rousseau en 1897. De 1891 à la mort d'Auguste Castellant en 1918, la conception du jardin organisé autour de la maison fut volontairement tournée vers de constants hommages au philosophe des Lumières.","architecture":"CASTELLANT,  à l'exemple du temple d'Ermenonville, les six colonnes doriques du temple des Charmettes portent également le nom d'illustres penseurs : Rousseau, Voltaire, Descartes, Newton, Pythagore et Platon. Sur l'architrave, Castellant fit graver en latin : « Naturae leges cognoscere et causarum causam et semper altius scientia et justicia in splendore aeternalium ascendere » (Connaître les lois de la nature et la cause des causes et s'élever sans fin par la science et la justice vers les splendeurs éternelles). Le centre du temple est occupé par une sculpture exécutée par Henri Gréber (1854-1941) représentant Jean-Jacques Rousseau assis sur un rocher, à l'ombre d'un chêne, sous le regard d'une allégorie de la Vérité. Auguste Castellant fit élever, aux Charmettes de Largny-sur-Automne, une réplique du tombeau de Rousseau, dans laquelle, il fut inhumé, le jeudi 14/03/1918 à 3 heures de l'après-midi. En 1912, Castellant fut nommé président de la société historique régionale de Villers-Correrêts. Il légua à cette société sa maison et son parc.","habitants":"Familles Guay et Moutonnet-Joly\"","divers":"Château de Castellant à lagny                GPS : 49° 15' 33\" Nord, 3° 02' 07\" Est","gps":"49° 15' 33\" Nord, 3° 02' 07\" Est","images":["../../jctruffet.com/image/image_02/02_Castellant_Lagny_1.jpg"]},"Consult_chateau_formulaire5c9e":{"id":"Consult_chateau_formulaire5c9e","dept":"02","canton":"Villers-Cotterêts","commune":"Caulaincourt","nom":"Caulaincourt","type":"Château","periode":"XIX","histoire":"CAULAINCOURT   L'ancien château détruit en 1917 par l'armée allemande. La comtesse du Moustier, descendante du marquis de Caulaincourt, ambassadeur de Napoléon Ier à St Pétersbourg, confia à l'architecte russe Beloborodoff le soin de construire un nouveau château entre 1930 et 1933 et d'aménager un parc sur le site naturel de l'étang et des bois de Caulaincourt. Dans le cimetière du bourg se trouve le mausolée d'Adrienne de Caulaincourt,  C'est un édifice de plan circulaire, édifié vers 1876, construit en brique et coiffé d'une coupole en zinc. Éléments protégés MH : le mausolée : inscription par arrêté du 28 octobre 1992. Le château, le parc ordonnancé avec les portiques et les vases, le mur de clôture et l'ancien portail du XVIIIe siècle.Le comte  Gérard de Moustier et la comtesse, née Caulaincourt-Vicence en sont propriétaire.","architecture":"CAULAINCOURT, le château de Caulaincourt est classé aux M.H. depuis 1998. fut reconstruit, entre 1930 et 1933, après la destruction du premier château (1876) de Caulaincourt, pendant la première guerre mondiale,  c'est un édifice de style néo-classique tant extérieurement qu'intérieurement s'inspirant à la fois des palais de Saint-Pétersbourg (revêtement de couleur) et de Palladio. Le château fut meublé avec le mobilier Empire réalisé pour la demeure russe du marquis de Caulaincourt et avec mobilier Art-Déco créé par l'architecte lui même.  C'est un mélange de styles néo-classique et art-déco, par l'architecte russe André Beloborodoff. Celui-ci conçut pour le parc une composition très simple de pelouses, d'allées et de portiques ornés de vases assurant le lien entre le bâti et le site naturel du grand étang et des bois. Dans le cimetière du bourg se trouve le mausolée d'Adrienne de Caulaincourt, c'est un édifice de plan circulaire, bâti vers 1876.  Celui-ci conçut pour le parc une composition très simple de pelouses, d'allées et de portiques ornés de vases assurant le lien entre le bâti et le site naturel du grand étang et des bois. L'édifice est entouré d'un beau parc. L'ensemble est classé aux M.H. depuis 1998.","habitants":"La comtesse du Moustier  Adrienne de Caulaincourt\"","divers":"Château de Coulaincourt                                                   GPS : 49° 51' 55\" Nord, 3° 06' 26\" Est","gps":"49° 51' 55\" Nord, 3° 06' 26\" Est","images":["../../jctruffet.com/image/image_02/02_Caulaincourt_1.jpg","../../jctruffet.com/image/image_02/02_Caulaincourt_2.jpg"]},"Consult_chateau_formulaireda28":{"id":"Consult_chateau_formulaireda28","dept":"02","canton":"Laon","commune":"Cerny lès Bucy","nom":"Cerny_lès_Bucy","type":"Donjon","periode":"XV-XVI","histoire":"CERNY LES  BUCY, il est placé au milieu des bâtiments d'une ferme appartenant à M. Tiéfaine. Ce donjon a été construit par les Suzanne, seigneurs de Cerny du début du XVe siècle à 1593. Sur le manteau des cheminées de chacun des trois étages on voit encore l'écu martelé de ceux-ci. Lors du siège de Laon, ville ligueuse, par Henri IV en 1594, la bataille dite de Cerny mit aux prises près de ce village les troupes du Roi et celles des Ligueurs. En 1593, les marquis de Moy (près de Saint-Quentin) succédèrent par alliance aux Suzanne. Mais ces seigneurs n'y résidèrent pas. Les guerres de la Ligue et de Trente ans avaient ruiné toute la campagne avoisinante, le château était à l'abandon et les paysans des environs y récupérèrent des pierres. Les Boutillac succédèrent aux Moy au XVIIe siècle, puis les Maillet, nobles de robe, procureurs au Parlement de Paris. Toujours M. Tiéfaine propriétaire.","architecture":"CERNY les BUCY,   édifiés à la fin du XVe siècle puis attribués en 1797 à l'hospice des indigents de Laon, les bâtiments furent, pour la plupart, détruits en 1836 et les fossés comblés. Il ne subsiste plus qu'un donjon de ce château. Le donjon de base carrée est couronné de mâchicoulis, il est à rapprocher, par sa forme, de ceux de Pierrefonds et de Vincennes, également de la fin du Moyen-Age.   Le donjon, de plan quadrangulaire, est conforme à l'architecture castrale du règne de Charles V tout en reprenant certaines caractéristiques des fortifications du XIIIe siècle. L'intérieur du donjon se compose de cinq étages : deux étages en soubassement renfermant des magasins avec des canonnières ainsi qu'un puits ; les trois étages au-dessus sont séparés par un plancher et comprennent, entre autres, deux salles pourvues de deux fenêtres à meneaux et coussièges, et deux cabinets de latrines, Le couronnement défensif est constitué d'un parapet avec son chaperon de couvrement en calcaire.Éléments protégés MH : le donjon, l'emplacement des anciennes douves et la cave avec son accès.                                                                                                   Le donjon est classé aux M.H. depuis 2004,","habitants":"Famille des Suzanne\"","divers":"Château de Cerny lès Bucy                         GPS : 49° 34' 44\" Nord, 3° 32' 48\" Est","gps":"49° 34' 44\" Nord, 3° 32' 48\" Est","images":["../../jctruffet.com/image/image_02/02_Cerny_l%c3%a8s_Bucy_1.jpg","../../jctruffet.com/image/image_02/02_Cerny_l%c3%a8s_Bucy_2.jpg"]},"Consult_chateau_formulaire3f0f":{"id":"Consult_chateau_formulaire3f0f","dept":"02","canton":"Laon","commune":"Royaucourt-et-Chailvet","nom":"Chailvet","type":"Château","periode":"XV-XVI","histoire":"CHAILVET,  fief historique des comtes de Roucy et  des seigneurs de la Vieuville, ducs et pairs de France, très importante famille des XVIe et XVIIe siècles proches du roi, qui compta parmi ses membres un surintendant des finances.  En 1554   la seigneurie à été acheté par pierre de la Vieuville, sous Louis XIII et la fameuse Marie Madeleine de la Vieuville, amante du régent. Il apparaît possible que l'ensemble des travaux prévus n'ait pas été conduit à leur terme, peut-être en raiso
