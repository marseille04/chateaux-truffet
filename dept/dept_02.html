n de la mort de Catherine de la Vieuville et des besoins financiers importants de Pierre de la Vieuville pour assumer sa place à la cour Il fut acheté ensuite par des familles plus régionale, les Parat, Le Carlier, Charmolue de la Garde avant de passer dans la famille Brunel qui le conservera jusqu'en 1924 . passera ensuite à la famille De Soumois en 1944, les allemands incendient le château, il subsiste aujourd'hui que la partie ouest  la plus remarquable mais privée de son toit. Passa à la famille de Buttet, Aujourd'hui, madame Simone Quoniam en est propriétaire.","architecture":"CHAILVET, du XVIe siècle, peu détruit au cours de la première guerre mondiale, restauré au lendemain de la guerre. Dépôt d'intendance de l'armée allemande lors de la seconde guerre mondiale, il est incendié par les Allemands le 21 août 1944. Construits probablement entre 1540 et 1555, les arcades avec galeries superposées sont flanquées de deux tours carrées placées en saillie, dont l'une abrite une large vis d'escalier. Les tours sont ornées chacune d'un dôme à tourelle circulaire. La cour est entourée d'une petite enceinte, baignant son pied dans des douves, défendue par des saillies de chétifs flanquements à chacun des quatre angles. Cerclé de deux bandeaux à mouluration de la fin du XVIe siècle, ce colombier est certainement l'un des plus anciens et l'un des meilleurs exemples du Laonnois. En juin 2009, des fouilles ont démontré que ces arcades n'avaient pas de contrepartie sur la façade Est du château. Des amorces de voûtes d'arcades repartent pourtant côtés nord et sud, laissent penser que les travaux prévoyaient d'entourer le corps de logis aujourd'hui disparu.  Le château de Chailvet est un domaine privé, habité toute l'année. La façade est aujourd'hui le seul exemple d'architecture renaissance d'inspiration italienne en Picardie.  Ces éléments conjugués à l'examen des plans d'avant 1914, qui précisent en particulier des épaisseurs de murs et la répartition des fenêtres sur les façades du corps de logis, laissent penser que Pierre de la Vieuville a conduit vers 1545-1555 un embellissement du manoir qu'il tenait de sa mère afin de le rapprocher du goût le plus récent. Une visite extérieure est organisée lors des journées du patrimoine historique, occasion d'apprécier la restauration qui s'achève après 30 ans de travaux. Le château de Chailvet est classé aux Monuments Historiques depuis 1984.","habitants":"Famille des Vieuville\"","divers":"Château de Chailvet                                      GPS : 49° 30' 47\" Nord, 3° 32' 06\" Est","gps":"49° 30' 47\" Nord, 3° 32' 06\" Est","images":["../../jctruffet.com/image/image_02/02_Chailvet_1.jpg","../../jctruffet.com/image/image_02/02_Chailvet_2.jpg","../../jctruffet.com/image/image_02/02_Chailvet_3.jpg","../../jctruffet.com/image/image_02/02_Chailvet_4.jpg"]},"Consult_chateau_formulaire6ffc":{"id":"Consult_chateau_formulaire6ffc","dept":"02","canton":"Marle","commune":"Chalandry","nom":"Chalandry","type":"Château","periode":"XVI","histoire":"CHALANDRY  Le village de Chalandry appartint  à ne famille de Chalandry, du XIIe siècle à la Révolution à l'abbaye Saint-Jean de Laon, comme la ville voisine de Crécy-sur-Serre. Des seigneurs particuliers résidaient dans le village et étaient les vassaux de cette abbaye. Le château de Chalandry a été édifié au XVIe siècle. Il possède une tourelle d'escalier polygonale qui est inscrite à l'inventaire supplémentaire depuis le 28 juin 1927. la propriété appartient actuellement à Madame G.-W. Blackman Ernotte.","architecture":"CHALANDRY est de style médiéval, c'était une ancienne maison forte puis une résidence seigneuriale. Sa construction date du XVIe siècle. Il possède une tourelle d'escalier polygonale qui est inscrite à l'inventaire supplémentaire depuis le 28 juin 1927 , est citée, au XIIe siècle. La maison forte fut reconstruite au XVIe siècle. L'ancien château de Chalandry est privé, fermé au public. Il est inscrit partiellement aux M.H. depuis le 28/07/1927 .\nÉléments protégés MH : la tourelle d'angle : inscription par arrêté du 28 juin 1927.","habitants":"Famille de Chalandry\"","divers":"Château de Chalandry   GPS : 49° 40' 40\" Nord, 3° 39' 01\" Est","gps":"49° 40' 40\" Nord, 3° 39' 01\" Est","images":["../../jctruffet.com/image/image_02/02_Chalandry_1.jpg"]},"Consult_chateau_formulaire34b8-2":{"id":"Consult_chateau_formulaire34b8-2","dept":"02","canton":"Tergnier","commune":"Saint-Gobain","nom":"Charles_Fontaine","type":"Château","periode":"XVIII","histoire":"CHARLES-FONTAINE,  le domaine de Charles-Fontaine, au cur de la forêt de Saint-Gobain, est dès le XIVe siècle un centre de verriers. En 1693, Colbert fonde la manufacture des Glaces de Saint-Gobain. Le manoir de Charles-Fontaine est élevé en 1725, sur ordre de Claude Massary, petit-fils du célèbre verrier Félix de Greno.  La verrerie est alors à son apogée. En 1809 reconversion de la verrerie en fabrique de soude, en 1823, la compagnie St-Gobain cesse la fabrication de soude. En 1851 la compagnie de Saint-Gobain vend la propriété à la famille Hély d'Oissel, baron   administrateur et président de St-Gobain, le manoir sert de redez vous de Chasse, endommagés pendant la première  guerre mondiale,  est finalement donné en 1928 aux scouts de france par le comte et la comtesse de Saint-Seine, héritiers  d'Hély d'Oissel, quelques années après la socièté  St-Gobain rachète le domaine pour y établir une colonnie de vacances jusqu'en 1952,Aujourdhui, la fabrication du verre nest plus quun souvenir. C'est une habitation particulière.","architecture":"CHARLES-FONTAINE, enchassé dans un écrin de verdure, demeure du XVIIIe siècle, on pénètre par une porte surmontée d'un fronton de pierre triangulaire, encadrée par deux tourelles rondes en pierre aux toits coniques  surbaissés. Le  tout s'insère entre deux pavillons de brique et pierre, la pierre intervenant pour constituer les chaînages en harpes des angles, les encadrements des ouvertures et la corniche séparant les deux niveaux. les toitures sont à pans en ardoises. Le corps de logis s'élève dans l'axe de cette entrée. La façade est assez régulière, sur deux niveaux une succession de cinq baies aux ouvertures légèrement cintrées, décentrée et encadrée par deux pilastres portant un  entablement de pierre surmonté d'un fronton triangulaire, la toiture, en croupes avec noues, et percée par des lucarnes décorées de fronton de pierre.","habitants":"Famille de Claude Massary\"","divers":"Château de Charles Fontaine               Gps 49° 34' 58? N, 3° 24' 20? E","gps":"","images":["../../jctruffet.com/image/image_02/02_Charles_Fontaine_1.jpg","../../jctruffet.com/image/image_02/02_Charles_Fontaine_2.jpg"]},"Consult_chateau_formulaire420b":{"id":"Consult_chateau_formulaire420b","dept":"02","canton":"Fère-en-Tardenois","commune":"Charmel","nom":"Charmel_Aisnes","type":"château","periode":"XIX","histoire":"CHARMEL, c'était une terre seigneuriale et une vicomté relevant en plein fief de Mgr le duc de Bouillon à cause de son duché de Château -Thierry reçu du Roi en échange de la principauté de Bouillon et Sedan. De nombreux propriétaires se sont succédés. Le seigneur François Emmanuel de Ligny (propriété patrimoniale pendant un siècle, le vendit, en 1738 au comte et comtesse d'Aumalle. Puis le seigneur Delpech l'acquis en 1766. Il fut revendu au seigneur Pierre Arnaud de la Britte en 1772. De nouveau revendu en mai 1782 à Mme Hocquart épouse du Jean Baptiste Mari Hyacinthe Hocquart, 1er gentilhomme de feu le roi de Pologne et gouverneur pour le roi du château de Fère-en-Tardenois. Puis, à Pierre Charles Bonnefoy du Plan en 1787. Bonnefoy du Plan deviendra baron du Charmel, en juin 1809. Lui succéderont son fils puis son petit fils qui le revendra à La famille de Rougé. Le château du Charmilles fut édifié en 1849 pour le comte Louis Bonabes de Rougé (1813-1880). Son mari étant décédé et ses quatre fils mobilisés, la comtesse de Rougé quittera le château pour Paris et confiera la propriété et ses meubles au gardien.","architecture":"CHARMEL, rapidement, le château du Charmel est transformé en buvette pour les troupes de passage avec les vins de la cave. Il sera pillé puis incendié pour faire croire à une destruction par les bombardements. Ces faits seront avoués par la femme du dernier gardien, sur son lit de mort. Après la guerre, des indemnités pour dommages de guerre permirent de refaire la toiture, de fermer les ouvertures avec des briques et de reconstruire une base d'escalier.","habitants":"Comte et Comtesse d'Aumalle\"","divers":"Château de Charmel                                GPS : 49° 06' 50\" Nord, 3° 33' 00\" Est","gps":"49° 06' 50\" Nord, 3° 33' 00\" Est","images":["../../jctruffet.com/image/image_02/02_Charmel_Aisnes_1.jpg","../../jctruffet.com/image/image_02/02_Charmel_Aisnes_2.jpg","../../jctruffet.com/image/image_02/02_Charmel_Aisnes_3.jpg"]},"Consult_chateau_formulaire9091":{"id":"Consult_chateau_formulaire9091","dept":"02","canton":"Chauny","commune":"Chauny","nom":"Chauny","type":"Château","periode":"XV","histoire":"CHAUNY, avant le Ve siècle, il n'y a à Chauny qu'une citadelle d'origine gauloise qui, pendant des invasions des Vandales  et des Huns (451), sert de refuge aux peuples. Si on ignore la date exacte de création de la citadelle, les historiens s'accordent sur le fait qu'elle a été érigée par les premiers comtes de Vermandois, qui voulaient borner, défendre les frontières de leur domaine en construisant le long de la frontière une série de fortifications qui étaient nommées châteaux borniers au même titre que les châteaux de Ham, Nesle, Ronssoy, Estrées-en-Arrouaise, Guise, Ribemont et Vendeuil.","architecture":"CHAUNY, le château occupait la partie la plus haute où furent construits plus tard les couvents des religieux de Sainte-Croix et des minimes. Cette supposition est contestée par l'abbé J Turpin  en raison de la phrase de Flodoard qui citera le chateau de Chauny en 949, il est encore cité en 1066 par Gilbert religieux de Saint-Amand en Flandre, le petit château appelé Chauny, Guibert de Nogent qui vivait en 1104, rapporte «un soldat ayant pris des bufs de l'abbaye de Nogent-sous-Coucy les mena au château de Chauny. Les chartes de Raoul Ier, comte de Vermandois, en 1130, de Philippe d'Alsace, comte de Flandre et de Vermandois, en 1167, d'Éléonore comtesse de Vermandois, en 1191, qualifient Chauny de château. Philippe Auguste lui donne, le premier, le nom de Ville en 1213. L'antique citadelle est démolie en 1430 et ses restes furent alors utilisés pour fortifier les murs d'enceinte d'un puissant château fort. En 1471, la ville tomba pourtant aux mains des Anglais qui vont l'occuper, pendant 25 ans.","habitants":"Famille de Guibert de Nogent\"","divers":"Chauny                                                            GPS : 49° 36' 59\" Nord, 3° 13' 12\" Est","gps":"49° 36' 59\" Nord, 3° 13' 12\" Est","images":["../../jctruffet.com/image/image_02/02_Chauny_1.jpg","../../jctruffet.com/image/image_02/02_Chauny_2.jpg"]},"Consult_chateau_formulaire0ff6":{"id":"Consult_chateau_formulaire0ff6","dept":"02","canton":"Villeneuve-sur-Aisne","commune":"Chevregny","nom":"Chevregny","type":"Château","periode":"XIX-XX","histoire":"CHEVREGNY, le nouveau château des Chaînées construit pour Paul Robine (1872-1934). Le principal élément patrimonial de la commune était l'ancien château de Chevregny, détruit lors de l'offensive Nivelle d'avril-juin 1917. Il a été reconstruit 300 mètres plus haut, à flanc de coteau par l'architecte Paul Robine (1872-1934) dans un style proche des mouvements. Les plans ont été établis entre 1924 et 1927 et font preuve à la fois d'une réelle complexité et d'une obsession pour la géométrie : hexagones, cercles et triangles organisent l'agencement des pièces. Le parc, entièrement recomposé après-guerre a été réduit à une superficie d'un peu moins de cinq hectares. En 2018, la Fondation du Patrimoine labellisa les travaux de préservation de la toiture. L'association Vieilles Maisons Françaises lui décerne, en 2019, son label VMF Patrimoine Historique.","architecture":"CHEVREGNY, ce château est une bâtisse imposante de plan complexe, située sur un tertre au coeur d'un vaste parc. L'habitation est élevée sur un soubassement bâti en ciment ajouré de baies pour chaque travée. Entièrement en brique de faible cuisson ou cuite au bois, donnant au matériau sa coloration jaune orangée spécifique, elle se compose d'un corps central flanqué d'ailes latérales disposées en biais, la brique rouge est réservée au décor en damier. Chaque avancée est couronnée d'un toit en pavillon couvert en ardoise et animé d'une lucarne à fenêtre pendante sur deux côtés. Le pignon en façade, percé de quatre baies rectangulaires, est surmonté d'un soleil en métal doré. Le style de l'édifice rappelle les châteaux anglais du début du XXe siècle. La disposition des travées en biais adopte un jeu d'imbrication et d'articulation des volumes ambitieux observant une parfaite symétrie. L'ancienne maison de gardien a été reconvertie en un gîte de tourisme.","habitants":"Famille de Paul Robine\"","divers":"Château de Chevregny                   GPS : 49° 28' 31\" Nord, 3° 35' 40\" Est","gps":"49° 28' 31\" Nord, 3° 35' 40\" Est","images":["../../jctruffet.com/image/image_02/02_Chevregny_1.jpg","../../jctruffet.com/image/image_02/02_Chevregny_2.jpg"]},"Consult_chateau_formulaire5557":{"id":"Consult_chateau_formulaire5557","dept":"02","canton":"Château-Thierry","commune":"Château-Thierry","nom":"Château_Thierry","type":"Château","periode":"XV-XVIII","histoire":"cinq châteaux dans cet article; la porte de Château-Thierry, Fossoy, Marjolaine, Moucheton et Verdilly.                                                              CHATEAU THIERRY, pendant la guerre de cent Ans, la ville est tenue par le duc de Châtillon pour le parti anglais avant de se rendre à Jeanne d'Arc en 1429  sans combattre, la ville avait été ruinée par cette occupation. En 1544, la ville est prise et pillée par Charles Quint. Jusqu'à la Révolution française, elle appartient à la Champagne. Point d'origine de la ville moderne, le château domine la vallée de la Marne. Construit à partir du IXe siècle, il a été profondément remanié au fil du temps. Aujourd'hui, le vieux château est un lieu de promenade et héberge un spectacle de fauconnerie ainsi quun village reconstitué de la fin du haut Moyen Âge.                                                                                                                        La tour BALHAN est un vestige d'un hôtel urbain : l'hôtel du mouton d'or (construit par Jean Balhan en 1480). Elle est classée monument historique depuis 1926. La tour renferme une cage d'escalier à vis, une ancienne chapelle et une salle de guet. Une tour carrée de 33 mètres de haut, surmontée d'un toit en forme de flèche octogonale couvert d'ardoise. À l'est, deux tourelles rondes, pourvues de toits hexagonaux. À l'ouest, deux petites pyramides triangulaires fixées sur la tour.                                                                                                                  \nLe Vieux Château est un château bâti à Château-Thierry. Il se nomme aussi la Porte Saint-Jean. Point d'origine de la ville moderne, le château domine la vallée de la Marne. Construit à partir du IXe siècle, le Vieux-Château a été profondément remanié, au fil du Temps. Aujourd'hui,  est un lieu de promenade et héberge, chaque été, pour le public, un spectacle de fauconnerie.","architecture":"FOSSOY  A l'est de château Thierry, du XVIIIe siècle en 1780 par les Maussion qui remplaçait la demeure seigneuiriale plus ancienne et qui  à appartenu à  Philippe de la Félonière après la Révolution , Elisabeth de Fougeret  y demeura . Ce château à trois niveaux avec hall d'entrée  fut laissé à l'abandon après la seconde guerre mondiale, mis en vente fut acheté et transformé en appartement en 1960, il appartient à la commune depuis 1979.                                                                                                     MARJOLAINE; le château de la Marjolaine est de style Empire. Vous pourrez vous adonner au plaisir du golf ou à la pêche. Le cadre est superbe. Il vous sera proposé des chambres d'hôtes.                                                                                                         MOUCHETON au nord-Est de Château-Thierry, est la résidence privée de la famille d'Ainval. Les façades, les toitures du château, ainsi que les bâtiments de la ferme et le moulin sont classés aux M.H depuis 1992.                 Le VERDILLY à cinq K.M. au nord est devenu un centre de formation professionnelle et de promotion Agricoles, en plein cur du pays de l'Omois, le Cffpa de Verdilly, est chargé de la formation continue dans les domaines agricoles et tertiaires. Les domaines d'activités : L'agriculture (Bprea, Capa, Bpae), La viticulture , les travaux paysagers et l'environnement, les services à la personne, l'Informatique , l'orientation et redynamisation, diverses formations à thèmes.","habitants":"divers seigneurs locaux\"","divers":"Trois châteaux dans cet article; Chateau-Thierry  grav-1-2-3 Coyolles Fossoy grav-4  et le Cédre.                 Marjolaine grav-5                               GPS : 49° 01' 49\" Nord, 3° 22' 30\" Est                                                                                                                                   Moucheton grav-6 GPS : 49° 07' 06\"Nord, 3° 26' 00\" Est                                                   Verdilly grav-7                                       GPS : 49° 04' 24\" Nord, 3° 25' 29\" Est                                                          GPS : 49° 02' 46,5\" Nord, 3° 24' 10,6\" Est                                                                 Vieux chat  GPS : 49° 02' 46,5\" Nord, 3° 24' 10,6\" Est","gps":"49° 01' 49\" Nord, 3° 22' 30\" Est","images":["../../jctruffet.com/image/image_02/02_Ch%c3%a2teau_Thierry_1.jpg","../../jctruffet.com/image/image_02/02_Ch%c3%a2teau_Thierry_2.jpg","../../jctruffet.com/image/image_02/02_Ch%c3%a2teau_Thierry_3.jpg","../../jctruffet.com/image/image_02/02_Ch%c3%a2teau_Thierry_4.jpg","../../jctruffet.com/image/image_02/02_Ch%c3%a2teau_Thierry_5.jpg","../../jctruffet.com/image/image_02/02_Ch%c3%a2teau_Thierry_6.jpg","../../jctruffet.com/image/image_02/02_Ch%c3%a2teau_Thierry_7.jpg"]},"Consult_chateau_formulairefc9f":{"id":"Consult_chateau_formulairefc9f","dept":"02","canton":"Hirson","commune":"Watigny","nom":"Cloperie_Blanc","type":"château","periode":"XVI-XVII","histoire":"CLOPERIE ou chateau Blanc,  cette ancienne verrerie de l'abbaye de Foigny devint une cense assez importante lorsque la forêt de Watigny fut défrichée. En 1636, Jean de Weert, l'un des chefs de mercenaires qui dévastèrent la région pendant la guerre de Trente ans, l'incendia. On la reconstruisit alors en la fortifiant, elle fut ainsi en état  de résister aux espagnols à l'époque de la Fronde. Ce petit château a appartenu pendant longtemps à la famille Lefèvre de la Cloperie.  La constuction du château et son annexe datent du XVIIe siècle.","architecture":"CLOPERIE, construit en brique et pierre, l'édifice est de plan rectangulaire, mais le petit côté regardant vers la route est à trois pans vers l'arrière, deux tourelles cylindriques marquent ses angles. Le pan axial est en brique, sauf les angles traités en chaînages harpés et les encadrements des fenêtres et de leurs allèges et le soubassement; la fenêtre du rez de chaussée est un peine cintrée; la fenêtre de l'étage est moins haute que ses voisines car son allège présente un panneau sculpté de rinceaux; les claveaux de son arc sont recoupés par une archivolte. Les tourelles sont en brique, sauf quelques cordons de pierre qui les ceinturent, celle de droite est couverte par une poivrière, celle de gauche par une pyramide d'ardoise couronnée par une boule. La constuction du château et son annexe datent du XVIIe siècle. Le château de la Cloperie est une ancienne verrerie de l'abbaye de Foigny. Un château antérieur fut détruit, en 1636, par Jean de Weert, chef de mercenaires, durant la guerre de trente ans.","habitants":"Famille Lefèvre de la Cloperie\"","divers":"Château de la Clocherie                        GPS : 49° 54' 18,21\" Nord, 4° 12' 34,21\" Est","gps":"49° 54' 18,21\" Nord, 4° 12' 34,21\" Est","images":["../../jctruffet.com/image/image_02/02_Cloperie_Blanc_1.jpg"]},"Consult_chateau_formulaire8661":{"id":"Consult_chateau_formulaire8661","dept":"02","canton":"Vic-sur-Aisne","commune":"Coeuvres et Valsery","nom":"Coeuvres","type":"Château","periode":"XVI","histoire":"COEUVRES, la construction du château de Gabrielle d'Estrées date du XVIe siècle. Marguerite de Soissons dame de Cuvres d'Arcy et Montigny, mariée à Jean de Villers seigneur de Dommiers vendirent à Jean d'Estrées, seigneur de Valieu, la vicomté de Cuvres, qu'elle lui avait apporté en dot. Antoine d'Estrées (vers 1530-1609) en hérita. Il fut le père de 'Gabrielle d'Estrées, favorite d'Henri IV. C'est François Annibal duc d'Estrées (1573-1670) (le frère de Gabrielle) qui reprit le château de Cuvres. Il gèra les terres  et alentours avec soin. En 1608, il l'entretient et l'embellit, par des peintures de plafonds, lambris et panneaux, confiés au peintre Thomas Blondeau. Il transmit le domaine à son fils Jean comte d'Estrées (1624-1707) et lui-même par sa fille Marie d'Estrées (1663-1741) mariée à Michel François Le Tellier marquis de Louvois (1663-1721). C'est leur fils Louis Charles César Le Tellier (1695-1771) qui en reprit la charge. En 1771, étant sans héritier direct, il lègua par testament tous ses biens à son neveu par alliance, sa nièce Félicité Louise le Tellier étant décédée en 1768, c'est son époux Louis Alexandre Céleste D'Aumont de Villequier qui devint propriétaire. Premier gentilhomme de la chambre de Louis XVI, il organisa la fuite du roi à de Varennes. Après l'échec de cette opération, il dut fuir Coeuvres et se réfugia à Bruxelles, et l'intégralité du domaine furent saisis comme biens nationaux et divisés en 4 lots. En 1797, ces 4 lots furent rachetés par Charles Raymond Degrange, par ordonnance royale en 1826, Charles Raymond Degrange fut autorisé à rajouter à son nom \"De Rancy\" et se fit apeler Charles Raymond  de Grange De Rancy. Le château de Cuvres revint ensuite à sa fille Caroline Joséphine de Grange De Rancy, qui épousa le comte Alexis Benigme de Bertier De Sauvigny, leur fils Albert de Bertier De Sauvigny en devint propriétaire, à la mort de son père en 1883.","architecture":"COEUVRES,  Le 21/09/1914, le château de Cuvres fut investi par l'État major de la VIe armée et le général Maunoury occupa le salon du rez-de-chaussée. Pendant les 4 années de guerre, le château de Cuvres fut occupé successivement par de nombreux et divers régiments, \"ambulances\" et sections d'infirmiers, et logea des services chirurgicaux. Lors des combats de la 2ème bataille de la Marne, de fin juin et juillet 1918, à Cuvres, eurent lieu d'intenses combats préparés par d'importants tirs d'artillerie et de combats de chars. Le château de Cuvres, comme le village tombèrent en ruine.                                                      Est un quadrilatère flanqué de quatre pavillons d'angle, courtines, châtelet d'entrée, basse-cour avec communs (inscrit à l'inventaire des M.H.) dit les grands greniers (baies étroites, lucarnes, pilastres cannelés, boulets de canon décoratifs symbolisant la charge de grand maître de l'artillerie de Jean II d'Estrées), celliers, cuisine et pigeonnier carré. A voir également à Coeuvres : le château de Valsery du XVIe siècle, les ruines de l'ancienne abbaye de Valsery des XIIe-XVIIIe siècles (classée M.H.) mur d'enceinte, glacière, deux lavoirs abandonnés, deux moulins en ruine, deux calvaires et un oratoire.   Éléments protégés MH : les communs : inscription par arrêté du 28 juin 1927.","habitants":"Famille de Jean d'Estrées et  Louis Alexandre Céleste D'Aumont de Villequier\"","divers":"Château de Coeuvres                                GPS : 49° 20' 15\" Nord, 3° 09' 16\" Est","gps":"49° 20' 15\" Nord, 3° 09' 16\" Est","images":["../../jctruffet.com/image/image_02/02_Coeuvres_1.jpg","../../jctruffet.com/image/image_02/02_Coeuvres_2.jpg","../../jctruffet.com/image/image_02/02_Coeuvres_3.jpg","../../jctruffet.com/image/image_02/02_Coeuvres_4.jpg","../../jctruffet.com/image/image_02/02_Coeuvres_5.jpg","../../jctruffet.com/image/image_02/02_Coeuvres_6.jpg"]},"Consult_chateau_formulaire4a8e":{"id":"Consult_chateau_formulaire4a8e","dept":"02","canton":"Essômes-sur-Marne","commune":"Condé en Brie","nom":"Condé_en_Brie","type":"Château","periode":"XIII-XVI","histoire":"Deux châteaux dans cet article Condé et Artonges.                                  CONDE , doit son origine à la forteresse construite vers 1200 dans la vallée du Surmelin par Jean de Montmirail, connétable de France, gendre de Guillaume de Dampierre et de Marguerite de Flandre, et constituée en dot à sa fille Marie, épouse dEnguerrand II de Coucy. Comme les autres biens de cette illustre famille, il échut aux Bar, puis aux Luxembourg. Confisqué lors de lexécution du connétable Louis de Luxembourg (1475), il revint en 1487 à sa petite-fille Marie de Bourbon-Vendôme. Au milieu du XVIe siècle, Louis de Bourbon-Vendôme, cardinal-archevêque de Sens, abbé commendataire de Saint-Denis et dOrbais, fit transformer et agrandir la vieille demeure médiévale, comme en témoigne toujours la présence de ses armes au-dessus de portes et de cheminées. Son neveu Louis de Bourbon, qui prit le titre de prince de Condé, devint lun des chef du parti huguenot et mourut assassiné à lissue de la bataille de Jarnac. Lorsque Victor-Amédée de Savoie-Carignan, petit-fils de Marie de Bourbon-Soissons, servit dans les armées du prince Eugène, Louis XIV fit confisquer le domaine qui demeura sous l'occupation militaire jusquen 1719. Le château devait être en fort mauvais état lorsque Jean-François Leriget, marquis de La Faye, obtint du Régent la levée du séquestre et la vente à son profit. Ce personnage influent avait un talent si rare pour manier les esprits que Louis XIV s'était servi de lui pour le bien de lÉtat. Secrétaire du cabinet du Roi, il sétait acquitté de missions fort délicates à Gênes, à Utrecht, à Londres et auprès de nombreuses cours dEurope. Académicien, administrateur de la Compagnie des Indes et lun des principaux bénéficiaires du \"système\" de Law,    Leriget de La Faye fit ouvrir la cour au sud et régulariser lordonnance des façades. Mais surtout, il fit doter les appartements du décor peint qui fait encore aujourdhui la gloire du château.","architecture":"A 10 K.M. au sud  ARTONGES, c'est une ancienne seigneurie vassale de Montmirail. On ne peut pas visiter le château d'Artonges, proprièté privé.                                                                                                            CONDE, à sa mort, en 1731, lui succéda son neveu et homonyme, secrétaire du cabinet du Roi, puis colonel au régiment de Louvois, qui fit aménager les petits appartements de laile est. En 1814, à la mort de la comtesse de La Tour du Pin-Lachaux, née Leriget de La Faye, le domaine échut à la comtesse de Sade, belle-fille du célèbre marquis, dont les descendants habitèrent Condé jusquen 1983. Endommagé en 1918, occupé et pillé en 1940-1945, le château a fait lobjet dune longue restauration, celle du gros-oeuvre, tout dabord, puis celle du décor intérieur, poursuivie depuis près de dix ans par ses propriétaires actuels, M. et Mme Alain Pasté de Rochefort. Lescalier de laile gauche, avec ses rampes droites voûtées en berceau, remonte au milieu du XVIe siècle, époque du cardinal de Luxembourg, de même que les salles du rez-de-chaussée, austères et munies de grandes cheminées. Il contraste avec le vaste escalier dhonneur, créé au XVIIIe siècle dans laile droite pour desservir les appartements du \"piano nobile\": le grand salon central, haut de plus de cinq mètres, occupe toute la profondeur du corps principal. Sur les murs, des toiles peintes en trompe-loeil par larchitecte-ornemaniste Servandoni simulent un riche décor de colonnes et de pilastres de marbre, encadrant fenêtres, portes et groupes mythologiques logés dans des niches: Apollon servi par les muses, enlèvement de Proserpine et allégories des quatre continents; également traité en trompe-loeil, le plafond donne l'illusion de caissons; le salon dangle, le plus précieux, doit au peintre animalier Jean-Baptiste Oudry ses grandes natures mortes animées doiseaux et de chiens, et les trois dessus-de-porte qui accompagnent ses boiseries peintes en camaïeu.","habitants":"Famille Louis de Bourbon prince de Condé,\"","divers":"Deux châteaux dans cet article Condé grav-1 et Artonges grav-2.       Artonge  GPS : 48° 55' 48\" Nord, 3° 33' 13\" Est                                                           GPS : 49° 00' 20\" Nord, 3° 33' 33\" Est","gps":"48° 55' 48\" Nord, 3° 33' 13\" Est","images":["../../jctruffet.com/image/image_02/02_Cond%c3%a9_en_Brie_1.jpg","../../jctruffet.com/image/image_02/02_Cond%c3%a9_en_Brie_2.jpg"]},"Consult_chateau_formulaire4aa9":{"id":"Consult_chateau_formulaire4aa9","dept":"02","canton":"Vic-sur-Aisne","commune":"Coucy_le château","nom":"Coucy_le_Chateau","type":"château-vestiges","periode":"XII","histoire":"Trois châteaux dans cet article; Coucy, Folemfray et Pont st-Mard. COUCY, au Ve siècle, le domaine de Coucy appartient à l'Église de Reims. La première mention de la famille de Coucy remonte à 1059 : avec Aubri de Coucy puis Enguerrand 1er de Coucy. En 1197, se crée la commune. Le début de la construction de l'enceinte pourrait remonter à cette période. Les vestiges en place remontent au premier quart du XIIIe siècle. Au XVIe siècle, l'enceinte et la porte de Laon sont plusieurs fois remaniées et consolidées. En 1792, les remparts de la ville sont donnés aux hospices de Coucy. Les fortifications réintègrent le domaine de l'État vers 1848. A partir de 1857, des travaux d'urgence sont conduits à la porte de Laon et des travaux de consolidation des remparts sont réalisés au XIXe siècle. En 1832, le rempart près de la Porte de Chauny est percé pour laisser passer la route départementale. L'enceinte urbaine est percée de trois portes : le porte de Chauny, de Laon et de Soissons. Elle est cantonnée d'une série de tours de plan en U dont l'intérieur possède trois étages voûtés d'ogives. L'enceinte urbaine est construite dans le prolongement de l'enceinte castrale.","architecture":"A 2.K.M. au nord-est  FOLEMBRAY, château construit dans un grand parc en 1859 par le baron Henry de Poilly. Élisabeth du Hallay Coetquen épousa en 1860, Henry Charles Georges, Baron de Poilly, décédé à Folembray le 20 septembre 1862. Madame la Baronne de Poilly, dont le nom était souvent cité dans le compte-rendu des fêtes données à la cour sous le second Empire, résidait habituellement à Folembray. Le 6 octobre 1905, la population apprenait avec émotion le décès, en son château de Folembray, de Madame la Baronne de Poilly. En 1917, Folembray fut détruit par les allemands. En 1918, le propriétaire était l'un des deux fils de la baronne, M. Gaston, Georges-Marie-Emmanuel, comte de Brigode, maire de la commune de Folembray pendant 47 ans. A la mort du comte Gaston de Brigode, le château fut racheté par la famille du marquis de Noailles. Le mobilier fut vendu aux enchères. De nos jours, le château appartient à un industriel belge. Il est devenu un rendez-vous de chasse.                                                                                                                               A Cinq K.M. au sud-ouest PONT-ST-MARD, l'ancien château a été détruit au cours de la première guerre mondiale; il a été reconstruit dans un style régionaliste néo-normand sur l'emplacement exact de l'ancien château. Le parc et le jardin ont été recomposés par le paysagiste Louis Sulpice Varé dans les années 1850. Le parc, circonscrit dans les limites de  la propriété du XVIIIe siècle, a gardé une structure et une composition intéressante avec des aménagements significatifs, il s'est enrichi à partir des années 1930 d'éléments de statuaire, d'essences végétales tandis que ses allées de circulation étaient simplifiées.\nÉléments protégés MH : le parc,inscription par arrêté du 14 octobre 2002. Les façades et les toitures de la maison de maître et la serre ancienne, en totalité, telles que délimitées sur le plan : inscription par arrêté du 13 mai 2019.","habitants":"Famille de Coucy \"","divers":"Trois châteaux dans cet article; Coucy grav 6-7-8-9, Polemfray grav-1-2-3 et Pont st Mard grav-4-5.  gps-Coucy 49° 31' 18? N, 3° 19' 07? E","gps":"","images":["../../jctruffet.com/image/image_02/02_Coucy_le_Chateau_1.jpg","../../jctruffet.com/image/image_02/02_Coucy_le_Chateau_2.jpg","../../jctruffet.com/image/image_02/02_Coucy_le_Chateau_3.jpg","../../jctruffet.com/image/image_02/02_Coucy_le_Chateau_4.jpg","../../jctruffet.com/image/image_02/02_Coucy_le_Chateau_5.jpg","../../jctruffet.com/image/image_02/02_Coucy_le_Chateau_6.jpg","../../jctruffet.com/image/image_02/02_Coucy_le_Chateau_7.jpg","../../jctruffet.com/image/image_02/02_Coucy_le_Chateau_8.jpg","../../jctruffet.com/image/image_02/02_Coucy_le_Chateau_9.jpg"]},"Consult_chateau_formulaire5228":{"id":"Consult_chateau_formulaire5228","dept":"02","canton":"Fère-en-Tardenois","commune":"Courcelles sur Vesles","nom":"Courcelles_Vesles","type":"Château","periode":"XIVXVII","histoire":"COURCELLES, il est de style Louis XIV il  a été construit, entre 1690 et 1694, à la fin du règne du roi de France Louis XIV, sur l'ordre du baron de la Grange. Le château de Courcelles est devenu en 1988, un Relais-Château qui est un hotel-restaurant de standing. Il appartient à Bernard Antonioz qui a racheté aussi le château de Rosny-sur-Seine (78). Racine, La Fontaine ou Cocteau y ont séjourné. Napoléon rencontra, pour la première fois, sa femme Marie Louise dAutriche à Courcelles. Christian Dior y organisa de somptueuses fêtes. Ses 18 chambres sont uniques, authentiquement décorées, et vous feront vivre, lespace dun instant, lesprit « château ».Il vous est proposé un restaurant gastronomique, et une piscine extérieure, un sauna - massages  des cours de tennis 3 pistes de jogging dans les jardins du château dans un parc de 23 hectares, il a été construit à la fin du règne de Louis XIV. Depuis 1988, il est devenu un Relais-Chateaux avec un hôtel-restaurant.","architecture":"COURCELLES, un lieu rêveur, avec ses parterres à la française, ses 23 ha de jardin, sa façade XVIIe, couru au XVIIIe par les écrivains et philosophes, de Crébillon à Jean-Jacques Rousseau, de Jean La Fontaine à Alexandre Dumas, sans oublier Jean Racine, devenu mondain au XXe , Christian Dior, Jean Cocteau (qui y signa lescalier en fer forgé), Geneviève Page y séjourna dans ce beau château du Sud de lAisne, proche de la Champagne, est devenu un Relais & Châteaux de  charme, sous la patte des Anthonioz, Bernard et, aujourdhui, sa fille Morgane, 26 ans passée à lécole hôtelière de Glion.","habitants":"Famille de Bernard Antonioz  \"","divers":"Château Courcelles_Vesles                      Gps 49° 20' 17? nord, 3° 34' 10? est","gps":"","images":["../../jctruffet.com/image/image_02/02_Courcelles_Vesles_1.jpg","../../jctruffet.com/image/image_02/02_Courcelles_Vesles_2.jpg"]},"Consult_chateau_formulairee084":{"id":"Consult_chateau_formulairee084","dept":"02","canton":"Fère-en-Tardenois","commune":"Couvrelles_sur vesles","nom":"Couvrelles","type":"Château","periode":"XV-XVII","histoire":"COUVRELLES,  avant la Révolution, Couvrelles était une vicomté appartenant à la famille d'Auquoy depuis la fin du XVe siècle. Ce serait Claude d'Auquoy, écuyer, seigneur de Couvrelles, époux de Louise d'Harzillemont, qui aurait probablement fait bâtir le château vers 1610. C'est un exemple typique de château Louis XIII et il marque l'épanouissement de ce style en Soissonnais, le château à peine achevé au profit de Claude de Vallon, écuyer, seigneur de Bienville anobli en 1609 qui décèda l'année suivante transmettant la terre de Couvrelles à son fils Jean, le domaine restera dans sa descendance jusqu'à l'arrivée de l'arrière-petit-fils Henry -François de Vallon lieutenant à Bouchain  en 1698 quatre ans après son décès, sa veuve cède le domaine à Henry Bonaventure Charpentier d'Audron effectue une carrière militaire importante anobli en 1696. et en 1704 directeur de l'hôtel des invalides, en 1747  vendent Couvrelles à Charles- Jean du Roux  de Chevrier de Verdon. Le château passe par héritage à François-Joseph de Pompery et il fut acquis en 1824 par le maréchal Mouton, comte de Lobau,  le posséda  dès la Restauration, et y fit entreprendre d'importants travaux pour le rénover, en 1838 au décès du comte , le château devint la propriété de son beau-fils : le baron Casimir Charles Just Roslin d'Ivry (1813-1888). Passa ensuite à la comtesse du Manoir et en 1912 vendu à la famille Prioux, appartient aujourd'hui à une institution religieuse et une école technique des métiers de l'hôtellerie.","architecture":"COUVRELLES, date du XVIIe siècle, situé au milieu d'un parc, c'est un édifice rectangulaire cantonné de deux pavillons d'angle, agrémenté de deux avancées surmontées de frontons arrondis en son milieu. Côté cour, la façade est à deux étages côté jardin, par suite d'une différence de niveaux, elle laisse apparaître les sous-sols qui ont gardé leurs voûtes d'arêtes d'époque. Le fronton côté cour, au-dessus de la porte d'entrée, est soutenu par des consoles en forme de \"S renversé\" et présente un cartouche aveugle en son milieu. Le bâtiment principal est couvert d'un haut toit à la française et les deux pavillons de pyramides. Toutes les parties du château sont symétriques par rapport au centre. Sa décoration est sobre, seulement rehaussée par la présence des bossages. Des communs servant de remises et d'écuries, entièrement refaits au XIXe siècle, se tiennent de part et d'autre de la cour d'honneur. L'ensemble est imposant dans un cadre harmonieux. Cette liaison avec l'église semble indiquer que le château primitif, dont il ne reste plus une pierre, se trouvait sur les lieux. Il abrite une hôtellerie pour des réceptions de standing. Éléments protégés MH : les façades du château : inscription par arrêté du 15 juin 1927. résidence-école hôtelière.","habitants":"Famille d'Auquoy \"","divers":"Château de Courvelles                           GPS : 49° 20' 23\" Nord, 3° 34' 10\" Est","gps":"49° 20' 23\" Nord, 3° 34' 10\" Est","images":["../../jctruffet.com/image/image_02/02_Couvrelles_1.jpg","../../jctruffet.com/image/image_02/02_Couvrelles_2.jpg"]},"Consult_chateau_formulairec7b0":{"id":"Consult_chateau_formulairec7b0","dept":"02","canton":"Villers-Cotterêts","commune":"Coyolles","nom":"Coyolles","type":"Château","periode":"XVI-XIX","histoire":"Trois châteaux dans cet article; Chateau-neuf, Coyolles et le Cédre. CHÂTEAU-NEUF, château construit en 1856 par l'architecte Brouty, pour les propriétaires de l'ancien château voisin. Le nouveau bâtiment prend le nom de \"Château Neuf\" tandis que l'ancien  lui sert de communs. Une conciergerie est élevée à l'entrée du parc  dans le premier quart du XXe siècle. En 1969, le bâtiment devient un centre médico-éducatif pour handicapés. A partir de cette date, le domaine a été modifié pour s'adapter à sa nouvelle fonction, suppression de pièces d'eau et construction de pavillons dans le parc. Château construit en calcaire, avec toit à longs pans brisés, croupe, et toits en pavillon; bâtiment desservi par un escalier dans oeuvre symétrique, escaliers dans-oeuvre tournants suspendus en charpente; conciergerie en calcaire et brique avec toit à demi-croupe en tuile plate, terminé par un pignon couvert., centre médico éducatif pour handicapés.                                                              Manoir DE COYOLLES, ancien château des seigneurs des Fossés, bâti au XVIe siècle. Les bâtiments s'organisent en quadrilatère autour d'une cour dont l'accès s'effectue par un châtelet d'entrée à mâchicoulis. Le logis à tourelles est typique des manoirs de la région de Villers-Cotterêts. Ce manoir reste un bel exemple de demeure seigneuriale. Avec l'enceinte et le jardin potager clos de murs qui est un exemple assez rare de ce type, il forme un ensemble très homogène. Éléments protégés MH : les façades et les toitures du manoir ; le pigeonnier ; les façades et les toitures des communs ; les murs d'enceinte avec les échauguettes, les caves: inscription par arrêté du 6 février 2007.","architecture":"COYOLLES, château construit au XVIe siècle à l'emplacement d'un édifice plus ancien dont il subsiste des caves ; les archives signalent en 1592 l'existence d'une ferme. Le château et la ferme sont vendus en 1795, puis les ailes sud, ouest et la moitié de l'aile nord du domaine (à l'exception du colombier et du mur extérieur) sont détruites à la fin du XVIIIe siècle ou dans la première moitié du XIXe siècle. En 1854, sont édifiées sur leur emplacement des parties agricoles, écuries et remise (le bâtiment porte la date), à la même période, la ferme, dont toutes les ouvertures sont refaites, reçoit un nouveau logis, un bâtiment supplémentaire au nord-est ; la moitié ouest de la ferme a été détruite par un incendie en 1986. Château, desservi par un escalier droit dans-oeuvre en maçonnerie, avec toit d'ardoise à pignon couvert; ouvrage d'entrée avec toit en pavillon; un toit conique recouvre les tourelles dont une abrite un escalier hors-oeuvre en vis sans jour en maçonnerie; colombier avec toit polygonal en tuile plate; parties agricoles, écuries et remise avec toit à pignon couvert et toit à deux pans et croupe en tuile plate, logis de ferme avec toit à croupe en ardoise ; bâtiments de ferme en moellon avec toits à croupe couverts conjointement en tuile plate, tuile mécanique et ardoise.                                CEDRE, le château Le Cèdre accueille dans ses murs un foyer dhébergement a été créé en 1975. Il est agréé pour laccueil de 98 personnes, orientées par la commission des droits et de lautonomie des personnes handicapées. Ce service médico-social accueille des adultes en situation de handicap mental, qui travaillent en milieu protégé (ESAT, EA)","habitants":"seigneurs locaux\"","divers":"Trois châteaux dans cet article; Chateau-neuf grav 1-2, Coyolles  grav 3-4-5-6-7  et le Cédre.                      Cédre  GPS : 49° 14' 06\" Nord, 3° 02' 40\" Est","gps":"49° 14' 06\" Nord, 3° 02' 40\" Est","images":["../../jctruffet.com/image/image_02/02_Coyolles_1.jpg","../../jctruffet.com/image/image_02/02_Coyolles_2.jpg","../../jctruffet.com/image/image_02/02_Coyolles_3.jpg","../../jctruffet.com/image/image_02/02_Coyolles_4.jpg","../../jctruffet.com/image/image_02/02_Coyolles_5.jpg","../../jctruffet.com/image/image_02/02_Coyolles_6.jpg","../../jctruffet.com/image/image_02/02_Coyolles_7.jpg"]},"Consult_chateau_formulaire4ff7":{"id":"Consult_chateau_formulaire4ff7","dept":"02","canton":"Villeneuve-sur-Aisne","commune":"Craonnelle","nom":"Craonnelle","type":"Château","periode":"XIX-XX","histoire":"Trois châteaux dans cet article; Craonne,Craonnelle et Blanc-Sablon.                                                                                                      CRAONNE dans le village voisin à quelques K.M.  le château de Craonne fut occupé durant la première guerre mondiale par les troupes allemandes en Nov.1915. Il a été reconstruit en 1923.                                                                                                          CRAONNELE, fut reconstruit à l'emplacement exact de l'ancien château bâti en 1838 par l'architecte rémois Gosset. Ce dernier fut transformé dès 1899 par l'architecte Bégue, également de Reims. Le château possédait des dépendances agricoles imposantes. Entièrement en pierre de taille, il était long de sept travées et large de trois. Le corps principal était flanqué de deux parties latérales à pans coupés en saillie. La porte d'entrée, accessible par un escalier à double révolution, était surmontée d'une marquise en fer forgé. Il fut entièrement détruit pendant la première guerre mondiale. Le projet de reconstruction fut établi par l'architecte parisien Boessé en 1926 et 1927. La propriétaire, madame Jeanne Marie Descubes-Saint-Désir, écrit au comité central de préconciliation : \"Il est exact que monsieur Descubes-Saint-Désir vivait en rentier à Craonnelle avec un personnel de dix domestiques, mais dès 1920, avec l'insuffisance des crédits alloués par la commission cantonale, qui n'auraient pas permis la reconstruction du château à l'identique, le sinistré a remis ses formes en état, faisant les avances nécessaires de ses deniers, et contribuant ainsi à la renaissance économique d'une région particulièrement éprouvée. La reconstruction à l'identique fut donc abandonnée.","architecture":"CRAONNELE,  l''édifice occupe son emplacement primitif,  L'entrée de la propriété est jouxtée à gauche des dépendances agricoles, et à droite de la maison du gardien, édifice modeste entièrement construit en pierre de taille. Les annexes  reprennent le style de construction du logis. La maison, dont le volume imposant est accentué par la forme élancé de la toiture, est entièrement composée d'un soubassement en moellon à rayures grossières et joints en retrait. Le soubassement haut, sur lequel une terrasse a été aménagée, abrite les caves voûtées. L'élévation des murs est constituée d´un blocage de moellons à tête dressée et joints rouges. La façade est scandée par trois avancées, chacune percée d'une baie large à laquelle répond celle du niveau supérieur, cette dernière étant agrémentée d'un balcon et d'un toit indépendant brisé en pavillon. La hauteur de la toiture de forme complexe permet d'abriter deux étages de comble. La multitude des ouvertures ainsi que leurs formes variées attestent la recherche architecturale. La forme élancée du toit à longs pans brisés et croupes confère à la demeure une prestance toute particulière, accentuée par la présence de conduits de cheminée élégants et d'épis de faîtage en terre cuite. Cette demeure est donc un des rares exemples de château de la reconstruction sur le Chemin des Dames ayant fait l'objet d'un effort d'originalité et de modernité de style, influencé par le mouvement architectural international de l'époque.\nBLANC-SABLON    Il date du 1er quart du XXe siècle.  Le château est pourvu d'un étage. Entièrement composées de pierre de taille de moyen appareil, ces chaînes d'angle harpées sont saillantes. L'élévation des murs est constituée d'un petit appareil de pierre de taille. Le toit à longs pans et croupes est couvert en ardoise. Deux oeils de boeuf ajourent l'étage de comble.  Il est inscrit aux M.H.","habitants":"Seigneurs locaux\"","divers":"Trois châteaux dans cet article; Craonne grav-3,Craonnelle grav-1 et Blanc-Sablon grav-2.                                         Craonne  GPS : 49° 26' 27\" Nord, 3° 47' 15\" Est                                                 Craonnelle  GPS : 49° 25 55\" Nord, 3° 46' 16\" Est                                              Blanc -Sablon  GPS : 48° 56' 20\" Nord, 0° 33' 52\" Est","gps":"49° 26' 27\" Nord, 3° 47' 15\" Est","images":["../../jctruffet.com/image/image_02/02_Craonnelle_1.jpg","../../jctruffet.com/image/image_02/02_Craonnelle_2.jpg","../../jctruffet.com/image/image_02/02_Craonnelle_3.jpg"]},"Consult_chateau_formulaire674c":{"id":"Consult_chateau_formulaire674c","dept":"02","canton":"Vervins","commune":"Cuiry les Iviers","nom":"Cuiry_les_Iviers","type":"Château","periode":"XVII-XIX","histoire":"CUIRY les IVIERS, au XVIIIe siècle, le château de Cuiry lès IViers appartint à Marie-Anne du Tétu. Elle mourut célibataire, et par donation, l'édifice échut à son neveu François-Joseph d'Alsace, comte d'Hénin Liétard, cet ancien militaire né en 1720 s'y retira, mais sous la Terreur, il fut arrêté malgré les protestations de la population, libéré, il mourut au château en 1806. La propriété revint alors à sa cousine Marie-Charlotte Chélers. En 1851, elle fut vendue au sieur Quarré de Beffroy de la Grève. Actuellement, le château appartient à M. et Mme Bouillard qui n'en occupent qu'une partie, l'autre, la moins importante, étant en mauvais état, ils ne désespèrent pas de pouvoir la restaurer. Dans son état actuel, le château, précédé d'une pelouse plantée de grands arbres et clos le long de la route par un mur d'enceinte renforcé de contreforts, associe des bâtiments datant les uns du XVIIe siècle, et les autres du XIXe siècle, mais unis par un même esprit, un même style. Le corps de logis que l'on aperçoit au fond de la cour correspond à la partie ancienne de la résidence, tout au moins partiellement. Il est limité à gauche par un pavillon d'aile légèrement saillant et à droite, par une tourelle polygonale qui assure sa liaison avec une sorte de donjon construit au siècle dernier. Toute la partie droite de l'édifice appartient au XIXe siècle, même si son constructeur s'est inspiré de ce qu'il avait sous les yeux lorsqu'il l'a dessinée.","architecture":"CUIRY -les-IVIERS,  fut construit au XVIIe siècle. Il fut remanié au XIXe siècle avec son corps de logis encadré d'ailes en saillie sur la cour d'honneur et le parc, avec une toiture à la Mansart surmontée d'un épi de faîtage. Le château de Cuiry-les-Iviers possède des lucarnes en pierre avec des coquilles et des armoiries sculptées. On dénote la présence de tourelles coiffées de hautes poivrières. Un donjon imposant dans le goût néogothique à trois étages disposé perpendiculairement au bâtiment originel couvert d'une girouette représente une couronne comtale, réalisée par la célèbre firme Monduit. On découvre aussi la présence d'échauguettes aux angles du château. Une tour octogonale renferme un escalier en pierre. À l'arrière, on remarque la présence de deux tours dont l'une renferme un escalier à double volée. Les communs datant du XIXe siècle. Le château de Cuiry-les-Iviers est devenu un gite d'hôtes, propriétaire : Roche Antoine.","habitants":"Famille d' Marie-Anne du Tétu.son neveu François Joseph d'Alsace\"","divers":"Château de Cuiry-les-Iviers                    GPS : 49° 45' 43\" Nord, 4° 06' 37\" Est","gps":"49° 45' 43\" Nord, 4° 06' 37\" Est","images":["../../jctruffet.com/image/image_02/02_Cuiry_les_Iviers_1.jpg","../../jctruffet.com/image/image_02/02_Cuiry_les_Iviers_2.jpg","../../jctruffet.com/image/image_02/02_Cuiry_les_Iviers_3.jpg"]},"Consult_chateau_formulaire070a-2":{"id":"Consult_chateau_formulaire070a-2","dept":"02","canton":"Villers-Cotterêts","commune":"Fort de Droizy","nom":"Droizy","type":"Donjon","periode":"XIV-XV","histoire":"DROIZY, petite forteresse rurale du Soissonnais construite au Moyen-Age. Donjon cylindrique du début du XIVe siècle d'une hauteur d'environ 22 mètres. Ouvrage d'accès au donjon édifié dans le courant du XIVe siècle, en partie détruit en 1886. Enceinte datant des XIVe et XVe siècles. Logis seigneurial élevé au XVIe siècle, et remanié postérieurement. Au début du XVe siècle, la seigneurie appartient à La Hire, compagnon de Jeanne d'Arc. Dès le début du XVIIe siècle, conversion du domaine en exploitation agricole. En 1886, destruction d'une grande partie des vestiges.\nÉléments protégés MH : l'ouvrage d'accès au donjon du XIVe siècle, avec sa porte ; les vestiges de la porte fortifiée à l'est de l'enceinte ; les murs d'enceinte et de soutènement ; les sols archéologiques du château médiéval : inscription par arrêté du 15 mars 1995. Le donjon ; les murs d'enceinte et de soutènement au sud et à l'est de l'enclos castral : classement par arrêté du 3 mars 1997.","architecture":"DROIZY,  le château de Droizy est un ancien château fort, qui date de la 2ème moitié XIVe siècle. Il est d'époque médiévale. Le donjon du château de Droizy fut dressé dans la seconde moitié XIVe siècle par la famille Villesavoye. C'était une résidence seigneuriale. Le donjon cylindrique édifié au XIVe siècle, d'une hauteur de 22 mètres. C'était une petite forteresse qui servit de demeure seigneuriale à un compagnon de Jeanne d'Arc dans un premier temps. Devenue une exploitation agricole au XVIIe siècle, elle fut détruite en grande partie en 1886.  Un escalier rampant dans l'épaisseur du mur en dessert les 4 niveaux voûtés. On accède au donjon par une porte, que défend un assommoir, percé au premier niveau du côté Est. Le donjon est éclairé par des fenêtres en tiers-point qui s'ouvre au troisième niveau. Quatre échauguettes sur culot sont ouvertes en leur centre et forment une bretèche en hérissant le sommet. Lequel est accolé, au sud. Des latrines qui ont pris place dans un appendice rectangulaire. Il subsiste quelques débris de l'ancien logis.","habitants":"Famille de La Hire\"","divers":"Droizy  GPS : 49° 16' 37\" Nord, 3° 23' 39\" Est","gps":"49° 16' 37\" Nord, 3° 23' 39\" Est","images":["../../jctruffet.com/image/image_02/02_Droizy_1.jpg"]},"Consult_chateau_formulaired435":{"id":"Consult_chateau_formulaired435","dept":"02","canton":"Vervins","commune":"Englancourt","nom":"Englancourt","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux  dans cet article; Englancourt, la Plesnoye                                        ENGLANCOURT, au XIIe siècle, un château a existé à Englancourt, c'était la demeure du seigneur Robert d'Englancourt qui, en 1188, fit un don à l'abbaye de Thénailles à charge pour eux de célébrer une messe perpétuelle. La seigneurie passa ensuite aux seigneurs de Guise puis à la maison de Châtillon où elle demeura jusqu'en 1360, date de son entrée dans celle d'Anjou par le mariage de Louis, duc d'Anjou, avec Marie de Châtillon. En 1462 la seigneurie fut unie au comté de Guise auquel elle demeura liée jusqu'en 1650, date à laquelle, dans des circonstances encore mal établies elle devint la propriété des seigneurs de la Plesnoye. Ce château avait servi de résidence aux seigneurs de Guise: il dut être plusieurs fois reconstruit et c'est probablement sur son emplacement que l'on reconstruit à la fin du XIXe siècle le château actuel.\nLe château d'Englancourt a été construit dans la tradition des grandes résidences du XIXe siècle ; il en reprend les dispositions et le choix des matériaux ; la brique et la pierre. Les deux clefs des fenêtres basses des ailes latérales rappellent la mémoire de M. Boutarel et elles donnent la date du 8 juillet 1882. Le corps de bâtiment est compris entre deux ailes suffisamment saillantes pour qu'on ait pu percer une porte dans la face latérale. Le corps de logis principal est couvert par une toiture à deux pentes, et ses ailes d'un comble en pavillon.","architecture":"La PLESNOYE, un premier château incendiè en 1650 par les espagnols , reconstruit en 1665, le château actuel a été bâti en 1865, est un château privé datant du XVIIe siècle, partiellement inscrit aux M.H. en 1985. Il appartient à Madame PH. de Caffarelli née  Cécille de la Fons  de la Plesnoye, Le manoir  comportait un corps de logis rectangulaire à deux étages comportant chacun sept ouvertures côté sud et six côté nord. La façade nord-est accostée de deux tourelles rondes autrefois percées d'archères. La façade sud est encadrée par deux avant-corps. L'intérieur a été entièrement transformé au début de ce siècle. Deux ailes d'inégale importance ont été accolées au XVIIIe siècle. Elles sont également en brique avec un toit à la Mansard. Sur les tourelles, on note un décor de briques vernissées aux motifs de coeur et de croix de Saint-André. Bon exemple d'architecture nobiliaire rurale du XVIIe siècle en Thiérache. Le château  possède de nombreuses affinités avec les églises fortifiées de Thiérache, tant par son architecture que son décor extérieur (corniches, motifs de briques surcuites). C'est aussi un élément significatif de l'architecture de brique, de l'époque.","habitants":"Seigneurs de Guise           Seigneurs de la Plesnoye\"","divers":"Deux châteaux  dans cet article; Englancourt grav-1, la Plesnoye grav-2-3    Gps 49° 55' 27? N, 3° 48' 38? Est","gps":"","images":["../../jctruffet.com/image/image_02/02_Englancourt_1.jpg","../../jctruffet.com/image/image_02/02_Englancourt_2.jpg","../../jctruffet.com/image/image_02/02_Englancourt_3.jpg"]},"Consult_chateau_formulaire97c0":{"id":"Consult_chateau_formulaire97c0","dept":"02","canton":"Guise","commune":"Audigny","nom":"Etang_Audigny","type":"Château","periode":"XVI-XVII","histoire":"L'ETANG, les parties les plus anciennes de ce château appartiennent  au Moyen-âge, mais il a été modifié par la suite, notamment aux XVIe et XVIIe siècles, sans que son plan d'ensemble originel en soit toutefois affecté. Au XVIIe siècle il a été plus ou moins mêlé aux combats qui ont opposé les Français et les Espagnols, ainsi en 1655, la cavalerie espagnole commandée par Condé l'a occupé.","architecture":"L'ETANG,  le plan d'ensemble du château dessine un polygone à neuf côtés qu'entouraient des douves encore visibles. Ses courtines étaient flanquées de tours partant du  fond ou montées en encorbellement. Précédée par un petit pont de pierre puis un pont-levis, la porte d'entrée s'ouvre entre deux de ces tours ; leur base est constituée par un soubassement de grès que surmontent quelques assises de pierre blanche; au dessus d'un cordon saillant, le reste du mur a été monté en briques qui présentent des dessins réticulés. L'entrée présente un arc surbaissé inscrit dans un cadre rectangulaire ; les armoiries qui la surmontaient ont été martelées à la Révolution. A droite du bâtiment d'entrée, entre sa tour et celle flanquant l'angle suivant, un logis a été aménagé au XVIIe siècle ; son rez-de-chaussée est en pierre, son étage en brique, sauf les encadrements des baies, et un décor réticulé y a été appliqué. La demeure ne manque pas d'allure; ses deux tours d'entrée avec leurs bouches à feu et son plan d'ensemble méritent de retenir l'intérêt. Éléments protégés MH : la porte d'entrée fortifiée : inscription par arrêté du 28 juin 1927.","habitants":"seigneur local\"","divers":"Etang GPS : 49° 43' 56\" Nord, 3° 38' 55\" Est","gps":"49° 43' 56\" Nord, 3° 38' 55\" Est","images":["../../jctruffet.com/image/image_02/02_Etang_Audigny_1.jpg","../../jctruffet.com/image/image_02/02_Etang_Audigny_2.jpg","../../jctruffet.com/image/image_02/02_Etang_Audigny_3.jpg"]},"Consult_chateau_formulaireab4a":{"id":"Consult_chateau_formulaireab4a","dept":"02","canton":"Villers-Cotterêts","commune":"La Ferté-Milon","nom":"Ferté_Milon","type":"Château","periode":"XIV","histoire":"FERTE MILON, les villes des Flandres poussent le duc de Bourgogne à un accord avec l'Angleterre d'où viennent les laines nécessaires à leur prospérité. Louis d'Orléans est favorable à une guerre avec le roi d'Angleterre Henry IV. Pour assurer la protection du duché de Valois au nord de Paris, Louis d'Orléans décide de faire bâtir ou de réaménager des places fortes. Ces châteaux (Pierrefonds, La Ferté Milon et Coucy le Château) sont autant de marques d'opposition à la politique souhaitée par le duc de Bourgogne. En 1398 débute les travaux sous la direction de Jean Lenoir architecte royal du baillage de Senlis. L'originalité de ce château vient de sa façade entièrement de niveau. Ce type de façade a été utilisé pour la première fois à la Bastille. Ce plan particulier a fait attribuer le plan de l'ouvrage à Raymond du Temple qui a été l'architecte du duc d'Orléans à Paris. La façade comprend quatre tours: la tour Nord carrée à contreforts diagonaux, les deux tours semi-circulaires à éperons de part et d'autre de l'entrée. Les éperons sont désaxés vers le Nord-Ouest, la tour Sud semi-circulaire avec éperon centré, les tours sont garnies de statues de Preux. Au-dessus de la porte d'entrée principale est placé un chef-d'uvre de la sculpture parisienne du début du XVe siècle, le bas relief du couronnement de la vierge, de cinq mètres de haut et sept mètres de large. Jean Aubelet, maître général des uvres du duc Louis d'Orléans, dirige les travaux en 1405.  il est probablement le concepteur du dessin particulier des mâchicoulis. En 1407, Louis d'Orléans est assassiné à Paris sur l'ordre de son cousin, Jean sans Peur, duc de Bourgogne depuis 1404.","architecture":"FERTE MILON , les travaux sont arrêtés. En 1592, la tour carrée, les escaliers à vis des tours à éperon centrales et la tour Sud sont éventrés par les mineurs du roi Henri IV. La façade mesure actuellement 200 m de long sur 38 m de haut. Sur la droite, on distingue une tour carrée, il reste deux pans de murs. En haut des murailles, demeurent d'anciens mâchicoulis. L'accès à la ville était protégé par une porte côté château, dont il reste deux tours en mauvais état. Derrière la muraille, deux canons de 1909 sont exposés face à la vallée, l'un deux est annoté en russe et porte le numéro 5085.  La façade du château est située sur l'enceinte urbaine. La façade est construite avec beaucoup de soin en maçonnerie de grand appareil taillé. Quatre tours rythment la façade. Au nord, une tour carrée est construite sur une cave sans doute couverte d'un berceau en bois. Au centre, deux tours flanquent l'entrée. Elles ont un plan en U avec éperon en accolade orienté vers le nord. Au sud, se dresse une tour circulaire à éperon en accolade dont la partie basse est engagée dans les maçonneries de l'enceinte. Ces trois tours sont construites sur des caves voûtées d'ogives à pénétration. La façade s'élève sur trois étages éclairés par des baies à meneaux. L'accès aux étages des tours se faisait par des escaliers en vis depuis les caves jusqu'au troisième étage. Chacune des pièces des tours flanquantes possédait une cheminée.\nÉléments protégés MH : la façade de l'escalier est et la salle intérieure voûtée sur croisée d'ogive au rez-de-chaussée à l'est: classement par arrêté du 14 septembre 1965. Les façades et toitures du château, les caves et les sols archéologiques : inscription par arrêté du 19 janvier 1994","habitants":"Seigneur local\"","divers":"château de Marolles grav 1-2-3 à la Ferté-milon grav -4  GPS : 49° 10' 26\" Nord, 3° 07' 30\" Est","gps":"49° 10' 26\" Nord, 3° 07' 30\" Est","images":["../../jctruffet.com/image/image_02/02_Fert%c3%a9_Milon_1.jpg","../../jctruffet.com/image/image_02/02_Fert%c3%a9_Milon_2.jpg","../../jctruffet.com/image/image_02/02_Fert%c3%a9_Milon_3.jpg","../../jctruffet.com/image/image_02/02_Fert%c3%a9_Milon_4.jpg","../../jctruffet.com/image/image_02/02_Fert%c3%a9_Milon_5.jpg","../../jctruffet.com/image/image_02/02_Fert%c3%a9_Milon_6.jpg","../../jctruffet.com/image/image_02/02_Fert%c3%a9_Milon_7.jpg","../../jctruffet.com/image/image_02/02_Fert%c3%a9_Milon_8.jpg"]},"Consult_chateau_formulairef8d2":{"id":"Consult_chateau_formulairef8d2","dept":"02","canton":"Fère-en-Tardenois","commune":"Fère en Tardinois","nom":"Fort_Fère_Tardinois","type":"Fort","periode":"XII-XIV","histoire":"FORT DE FERE  Vers 958, Flodoard fait allusion à l'existence d'une place forte à Fère. En 1206, Robert II, comte de Braine, seigneur de Braine et de Torcy-en-Brie obtient le droit de faire construire une forteresse dans son alleu de Fère. En 1210, l'on construit le château actuel. Le château devient propriété de Louis d'Orléans dès 1395. De 1407 à 1424, le château est successivement la propriété de Charles d'Orléans, de Jean son frère et de Charles d'Angoulême qui épouse Louise de Savoie, mère de François 1er. Au XVe siècle, sont édifiés l'enceinte extérieure du château et certains bâtiments de la basse-cour. En 1528, François 1er et Louis de Savoie offrent le château à Anne de Montmorency, à l'occasion de son mariage avec Madeleine de Savoie, nièce de Louise. De 1530 à 1550, le connétable Anne de Montmorency engage d'importants travaux au château. Il fait totalement évider l'intérieur en ne laissant que les tours reliées par les courtines et l'enceinte extérieure. Un nouveau château est reconstruit dans la cour et appuyé sur les tours et les courtines médiévales. Cette reconstruction serait, d'après Sir A. Blunt, due à Jean Bullant. De 1552 à 1562, Bullant construit un pont-galerie dont la façade sur la basse-cour et son portail d'entrée sont attribués à Jean Goujon (vers 1510-1566). Seuls les murs extérieurs du château médiéval sont conservés. En 1609, Henri II de Montmorency hérite du château ; après sa décapitation en 1636, ses biens sont remis au prince de Condé. Entre 1653 et 1752, la terre de Fère est abandonnée à des fermiers généraux. Au XVIIIe siècle il fait partie de la dot de Louise Henriette de Bourbon-Conti qui épouse Philippe Egalité. Des travaux sont réalisés dans le château avant que finalement ne soit décidée sa démolition en 1769. L'édifice porte la date de 1539.","architecture":"FORT DE FERE, cette basse-cour et cette motte sont reliées par un pont galerie construit à la Renaissance, sans doute en remplacement d'un pont en bois. La basse-cour de plan trapézoïdal est située à l'est de la motte. La galerie Renaissance est montée sur de hautes arcades lancées dans la fosse qui entoure la motte. le château lui-même est aujourd'hui en ruine. Il est construit sur un plan en polygone régulier, sept tours circulaires sont reliées par sept courtines dont une est percée d'un châtelet d'entrée composé de deux massifs terminés en pointe. Chacune des tours s'élève sur une base en pierre calcaire équarrie surmontée d'assises de pierre placées en épis. Elles s'élèvent ensuite en pierre de moyen appareil. Cet appareil est aussi utilisé pour les courtines. Le château est entouré d'une enceinte à neuf courtines et sept tours. L'aménagement intérieur a complètement disparu. Éléments protégés MH : les vestiges du château : classement par liste de 1862. La basse-cour du château : les façades et les toitures de l'ensemble des bâtiments, les pavillons et la tour de l'avant-cour et de la basse-cour, y compris l'hôtellerie, à l'exception des adjonctions du XXe siècle ; l'ancienne porte de l'avant-cour, côté sud-est ; l'ensemble des murs de clôture et de soutènement de l'avant-cour et de la basse-cour ; l'ensemble des sols archéologiques de l'avant-cour et de la basse-cour : inscription par arrêté du 19 avril 1994.                                                                                                                  SAPONNAY à Saponnay La construction du château de Saponay date du XIIIe siècle. Le château de Saponay est privé et inscrit aux M.H.en 1928. Il ne reste depuis que des vestiges du château de Saponay.","habitants":"Famille d' Anne de Montmorency\"","divers":"Fère GPS : 49° 13' 19,72\" Nord, 3° 31' 55,46\" Est                                                 Saponnay GPS : 49° 12' 51\" Nord, 3° 28' 47\" Est","gps":"49° 13' 19,72\" Nord, 3° 31' 55,46\" Est","images":["../../jctruffet.com/image/image_02/02_Fort_F%c3%a8re_Tardinois_6.jpg"]},"Consult_chateau_formulaire2853":{"id":"Consult_chateau_formulaire2853","dept":"02","canton":"Villers-Cotterêts","commune":"Haramont","nom":"Fossés_Haramont","type":"Château","periode":"XIV-XIX","histoire":"FOSSES ou Fossez, château des Fossés date du  XIVe et XIXe siècle. Au XVIIIe siècle une descendante de Josias de Thouars, Angelique de Ronty épouse Michel des fossés , marquis de Coyolle  par alliance entre en possession du domaine sans enfants lègue le domaine au frère cadet de Michel-Louis dernier marquis de Coyolle, sa fille épouse Jean-René Jouenne d'Esgrigny, le domaine échoit à Marie-Jeanne Victoire de Jouenne d'Estrigny, alliès en seconde noces à François  Nicolas le Gauchois.  Le site accueille également l'atelier de céramique d'Isabelle Verchuren-Blutel. Entre 1804 et 1806  la propriétaire madame Le Cauchois, issue de la famille des Fossés, loua le château des Fossés au général Dumas-Davy de la Pailleterie,   En 1868 acquit par Aubin Desprez qui remanie les façades et bâti l'aile gauche, il laisse à sa fille Louise Euphémie qui épouse le baron de Sault, décède prématurément en 1877, puis le comte de Sémellé, officier. Après la mort de Louise de Semellé  le domaine revient   au fils né de son premier mariage. Guy-Olivier du Sault, qui en 1952 le céde aux enfants qui le vendent à leur tours en 1961 à la famille Laval et à  M. Xavier Blutel, en 1999.   C'était la maison d'enfance de l'écrivain Alexandre Dumas, père, avant la mort du père, le général Dumas-Davy de la Pailleterie.\nÉléments protégés MH : les façades et les toitures du manoir, les communs, les douves et le pont : inscription par arrêté du 17 juin   Le site accueille également l'atelier de céramique d'Isabelle Verchuren-Blutel fils d'un marquis et d'une esclave, et père du romancier Alexandre Dumas.","architecture":"FOSSES ou Fossez , château construit dans la première moitié du XVIe siècle. Au XVIIe siècle, sont élevés les bâtiments formant le côté sud de la ferme; l'aspect extérieur du château a été profondément modifié au XIXe siècle, et des communs ont été édifiés à l'entrée après le cadastre de 1835 , le reste des bâtiments de la ferme a été reconstruit au XIXe siècle avec modernisation et réfection au XXe siècle. Château avec toit à pignon découvert et toit en pavillon ; la tourelle d'escalier hors-oeuvre a un toit polygonal ; les communs ont un toit en pavillon, les écuries un toit à croupe, et la tourelle restant du mur d'enceinte un toit conique, ces bâtiments en pierre de taille sont couverts d'ardoise,  les bâtiments de ferme en pierre de taille et moellon ont des toits à croupe ou en pavillon, en tuile plate (aile sud) ou en tuile mécanique, à l'exception du logis dans l'angle sud ouest, couvert d'ardoise. Les armes de la famille des Fossés sont sculptées sur la maçonnerie extérieure du portail-poterne.  Visites saisonnières ou sur rendez-vous de ce charmant petit château Renaissance (fin XVe siècle), entouré d'eau et niché dans une vallée boisée. Edifié sur les restes d'une place forte, le château des Fossés fut rénové peu avant 1870, et agrémenté d'un parc ornementé de magnifiques arbres. L'ouvrage de pierre et ses belles dépendances, classés, disposent sur la façade arrière d'une tourelle à 6 pans et vis d'escalier hors oeuvre. Le château des Fossés est ouvert au public.","habitants":"Famille de Jean-René Jouenne d'Esgrigny\"","divers":"Château du Fossés                                    GPS : 48° 52' 13,8\" Nord, 2° 10' 21,72\" Est","gps":"48° 52' 13,8\" Nord, 2° 10' 21,72\" Est","images":["../../jctruffet.com/image/image_02/02_Foss%c3%a9s_Haramont_1.jpg","../../jctruffet.com/image/image_02/02_Foss%c3%a9s_Haramont_2.jpg","../../jctruffet.com/image/image_02/02_Foss%c3%a9s_Haramont_3.jpg"]},"Consult_chateau_formulaire5dd8":{"id":"Consult_chateau_formulaire5dd8","dept":"02","canton":"Tergnier","commune":"La Fère","nom":"Fère","type":"Château","periode":"XV-XIX","histoire":"La FERE, ce château fut précédé par un château fort féodal construit par les célèbres sires de Coucy qui étaient seigneurs de La Fère dès le XIe siècle et jusqu'au XIVe siècle. Cette seigneurie passa par mariage dans la famille de Bar (le duc), puis dans celle de Luxembourg. Marie de Luxembourg était l'arrière-petite-nièce de Jean de Luxembourg qui livra Jeanne d'Arc aux Anglais. Elle était la fille du connétable de St Pol qui périt décapité en place de Grève à Paris pour avoir voulu jouer double jeu entre Louis Xl et Charles le Téméraire. Elle fut également l'arrière-grand-mère du roi Henri IV par son mariage avec François de Bourbon, duc de Vendôme. C'est elle qui fit construire au XVIe siècle le château actuel. Au XVIIe siècle, le cardinal Mazarin, puis son neveu le duc de Mazarin devinrent \"engagistes\" du château. Enfin en 1766, La Fère passa dans l'apanage du duc d'Orléans.                                                                        ARCADE, créée 2017, la fondation Espérance Ruralités sest donnée pour mission de participer à la redynamisation de la France périphérique en développant un nouveau modèle de collège adapté aux besoins des territoires ruraux. Ce modèle pédagogique est élaboré au collège-pilote Espérance Ruralités de la Fère (Aisne) qui vient de faire lacquisition du château de la Fère. Ancienne école dartillerie au XIXe siècle ce château date du début de la  Renaissance.   Avant den faire le nouveau lieu décole pour les élèves, de nombreux travaux sont nécessaires sur place!\nA cinq K.M. au nord-Est le château d'ANGLICOURT le sart","architecture":"La FERE à l'origine, il se composait de quatre ailes rectangulaires entourant une cour intérieure carrée. Il ne reste plus que l'aile du nord, la plus proche de l'église. En effet, l'installation de l'école d'artillerie, au XIXe siècle, a achevé de modifier tout l'intérieur de cette aile, il ne subsiste que la magnifique salle gothique flamboyante. Propriété de l'état, transformé en appartements pour officiers aujourd'hui.                                                                           Éléments protégés MH : la façade de l'escalier Est, la salle intérieure voûtée sur croisée d'ogive au rez-de-chaussée: classement par arrêté du 14 septembre 1965. Les façades et les toitures du château, les caves, les sols archéologiques : inscription par arrêté du 19 janvier 1994.                           La FERE   La façade de l'escalier Est ; la salle intérieure voûtée sur croisée d'ogive au rez-de-chaussée à l'est : classement par arrêté du 14 septembre 1965 - Les façades et toitures du château ; les caves ; les sols archéologiques : inscription par arrêté du 19 janvier 1994.","habitants":"Famille de Luxembourg\"","divers":"Château de La Fère  Gps 49°39'48.6\"N, 3°21'58.5\"E","gps":"","images":["../../jctruffet.com/image/image_02/02_F%c3%a8re_1.jpg","../../jctruffet.com/image/image_02/02_F%c3%a8re_2.jpg"]},"Consult_chateau_formulaire0638":{"id":"Consult_chateau_formulaire0638","dept":"02","canton":"Fère-en-Tardenois","commune":"Fére en Tardinois","nom":"Fére_en_Tardinois_02","type":"Château","periode":"XV","histoire":"Deux châteaux dans cet article ; la Fère  et Danizy.                              FERE en Tardinois, situé à côté des vestiges du château fort de Fère, construit en 1206 par Robert de Dreux, petit-fils de Louis VI, Roi de France, propriété de la première maison Valois Orléans et Valois Angoulême. L'architecte a bâti une muraille à sept pans, flanquée de tours circulaires aux angles. Les maîtres de Fère se succédèrent dans l'enceinte du château fort laissant parfois l'empreinte de leur passage. Ce château de Fère à été construit sur les ruines de la basse cour qui se trouvaient sur le plateau et dont les bâtiments reconstruits au XVIe siècle, excepté de la tour, furent aménagés en château moderne vers 1863 et convertis en hostellerie transformé en hôtel en 1956. Celui-ci fut un des premiers châteaux ayant été transformé en hôtel.\n Rendu inoubliable par son cadre culturel, le château de Fère en Tardenois ajoute le charme de l'histoire et des lieux.  Des salons particuliers, des chambres spacieuses, véritables havres de paix, Grâce à une brigade de professionnels expérimentés, nous nous efforcerons de vous prodiguer une expérience gastronomique inoubliable et un service de grande qualité.","architecture":"Château de FERE en Tardinois,  la forêt environnante vous procurera bien des joies. Jogging, cyclisme, équitation, tennis et chasse vous sont ouverts et quelle merveilleuse récompense après une belle dépense d'énergie qu'une boisson fraîche à l'ombre des ruines du château-fort ! visite des caves situées dans les souterrains du château (commentée par notre sommelier), piscine extérieure chauffée de mi-mai à mi-septembre, tennis non couvert, table de ping pong et pétanque, 60 ha de forêt exclusivement réservés à notre clientèle. Relaxation et modeling sensoriel (Le modeling sensoriel est un massage relaxant, et dynamisant).                                                                                                                                 DANIZY voisin de la Fère et à 20 K.M. à l'est  le manoir de Semoigne à Villers Agron-Aiguizy,  Cette ancienne ferme devenu un manoir date du XVe siècle.Vous apprécierez le calme et le charme de ces 4 chambres d'hôtes,, Christine et Xavier seront ravis de vous accueillir. Côté jardin, le manoir est entouré d'un parc, traversé par une petite rivière «La Semoigne» et bordé par le golf de Champagne.","habitants":"Christine et Xavier Ferry\"","divers":"Deux châteaux dans cet article ; la Fère grav-1 et 4  Danizy grav-2. sémoigne grav-3                                                                Danizy  GPS : 49° 39' 55\" Nord, 3° 23' 35\" Est                                                    semoigne GPS : 49° 09' 44\" Nord, 3° 41' 55\" Est","gps":"49° 39' 55\" Nord, 3° 23' 35\" Est","images":["../../jctruffet.com/image/image_02/02_F%c3%a9re_en_Tardinois_02_1.jpg","../../jctruffet.com/image/image_02/02_F%c3%a9re_en_Tardinois_02_2.jpg","../../jctruffet.com/image/image_02/02_F%c3%a9re_en_Tardinois_02_3.jpg","../../jctruffet.com/image/image_02/02_F%c3%a9re_en_Tardinois_02_4.jpg"]},"Consult_chateau_formulairea3ba":{"id":"Consult_chateau_formulairea3ba","dept":"02","canton":"Villers-Cotterêts","commune":"Gandelu","nom":"Gandelu","type":"château","periode":"XVI","histoire":"GANDELU, vestiges du château XIVe siècle reconstruit au XVIe par le connétable Anne de Montmorency, tour circulaire et courtine de l'ancien château fort du XIVe siècle, enceinte d'apparat, tour bastionnée et ruines du logis du XVIe siècle. La seigneurie particulière achetée en 1302 par le Roi, passée aux sires de Châtillon, à Louis d'Orléans (1397) au profit de qui elle fut érigée en duché, aux Châlons, aux Montmorency (1528) aux Luxembourg et enfin en 1615 aux Potier (devenus ducs de Gesvres en 1670).","architecture":"à GANDELU  l'édifice de plan carré à trois niveaux  flanqués sur anlges d'une tourelle  carrée et vestiges de tour carrées et rondes sur remparts .   A voir également à Gandelu l'église Saint-Rémi du XIIe (MH), remaniée XVIe et XVIIe (ancienne chapelle seigneuriale jusqu'en 1554), vitraux XVIe siècle, pierres tombales, riche mobilier: statue de saint Rémi XIVe, le bénitier en 1636, fonts baptismaux 1569 et vitrail XVIe, inscription funéraire 1610, christ en croix, stalles et boiseries. Moulin avec escalier monumental, fontaine XIXe siècle.","habitants":"Famille de Montmorency \"","divers":"Château de Gandelu                                       Gps 49° 05' 44? nord, 3° 11' 02? est","gps":"","images":["../../jctruffet.com/image/image_02/02_Gandelu_1.jpg","../../jctruffet.com/image/image_02/02_Gandelu_2.jpg","../../jctruffet.com/image/image_02/02_Gandelu_3.jpg","../../jctruffet.com/image/image_02/02_Gandelu_4.jpg","../../jctruffet.com/image/image_02/02_Gandelu_5.jpg"]},"Consult_chateau_formulaire903f":{"id":"Consult_chateau_formulaire903f","dept":"02","canton":"Fère-en-Tardenois","commune":"Bruyères sur Fère","nom":"Givray_Bruyères","type":"Château","periode":"XVI","histoire":"GIVRAY,   baronnie relevant jadis d'Oulchy-le-Château, la terre de Givray fut inféodée à Cramailles, château Renaissance disparu. Elle devint donc la seconde baronnie du Valois. Givray est resté dans les mains de la famille de Harlus jusqu'en 1720, date à laquelle il passa à Rolland du Plessis, ingénieur du roi. Il fut ensuite possédé par messire Michel Le Gras de Chalmon, trésorier de France en la généralité de Soissons.","architecture":"GIVRAY, le château semble avoir comporté un corps de logis principal rectangulaire et une petite aile attenante. Seul reste aujourd'hui le corps de logis, sa façade principale repose sur un soubassement correspondant au sous sol. Elle est à deux étages séparés par une frise et divisés par des pilastres à ordres superposés, ioniques en bas et corinthiens dans le haut, pilastres encore maladroits, dont les espacements sont irréguliers. A l'intérieur, un escalier droit, à deux paliers voûtés, conduit à l'étage. Dans une salle, sur ce qui a dû être le manteau d'une cheminée, on remarque une grosse salamandre. Actuellement, la demeure sert de remise à la ferme et
