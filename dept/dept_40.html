lt_chateau_formulaire762a-2":{"id":"Consult_chateau_formulaire762a-2","dept":"40","canton":"Montfort en Chalosse","commune":"Montfort en Chalosse","nom":"Montpribat","type":"Gentilhommière","periode":"XVI","histoire":"Le château de Montpribat, édifié au XVIe ou XVIIe siècle par la famille des de Borda de Dax. Il abrite actuellement le Centre médical infantile de Montfort-en-Chalosse. Il est aussi connu pour ses productions agricoles.","architecture":"Montpribat  de style gentilhommière à deux niveaux, corps de logis oblong flanqué d'une tour ronde et de dépendances en retour d'équerre.","habitants":"Famille des de Borda de Dax\r\n        \"","divers":"Gentilhommière à Montpribat","gps":"","images":["../image/image_40/40_Montpribat_1.jpg","../image/image_40/40_Montpribat_2.jpg"]},"Consult_chateau_formulairef2e7":{"id":"Consult_chateau_formulairef2e7","dept":"40","canton":"Hagetmau","commune":"Dumes et  Horsarrieu","nom":"Navailles","type":"Château","periode":"XIII-XVI","histoire":"manoir de Barat : pigeonnier.  Manoir de La Riou. Fermes anciennes de Pourtaou et Péhausse, anciennes caveries.                                        NAVAILLES-DUMES , le château féodal se trouvait jadis sur la place qui précède le hall des sports. La maison de Lannemas appelée parfois aussi maison Dulau fut construite vers 1850 à partir des matériaux provenant de ce château tombant en ruines. On avait fait reconstruire dans une pièce de cette maison la cheminée monumentale de la salle des gardes. La famille Vernay, dont le parc situé derrière le hall des sports et la place de la mairie portent aujourd'hui le nom, acheta cette propriété en 1900. Madame Vernay était la cousine germaine de la célèbre actrice Sarah Bernhardt qui vint à Horsarrieu en 1917 à l'occasion des obsèques de son cousin. La cheminée beaucoup trop grande pour la pièce qu'elle occupait fut démolie et vendue. La maison fut acquise par la commune en 1942 et n'est autre que la mairie actuelle.","architecture":"Navailles Dumes, corps de logis de plan rectangulaire à deux niveaux entre deux pavillons carrés à trois niveaux avec toits en croupes.","habitants":"Famille Vernay\r\n        \r\n        \"","divers":"Château de Dumes 43° 42' 19 nord, 0° 35' 10 ouest   à Navailles","gps":"","images":["../image/image_40/40_Navailles_1.jpg"]},"Consult_chateau_formulairea49f":{"id":"Consult_chateau_formulairea49f","dept":"40","canton":"Labrit","commune":"Parleboscq","nom":"Parleboscq","type":"Château","periode":"XIV-XVI","histoire":"Trois châteaux à Perleboscq celui de Laballe, de Lacaze  et de Bouscau.                                              LABALLE, appartient à la famille Barbotan qui  le possède jusquen 1781. À cette date, il est vendu à François de Cours-Monlezun, un aristocrate qui le cède en 1810 au marquis de Lacaze. Ainsi, les deux châteaux de Parleboscq, celui de Laballe et celui de Lacaze, appartiennent à la même famille durant plus dune dizaine dannées. En 1825, Jean-Dominique Laudet achète la propriété. Un moulin et une tuilerie viennent compléter l'exploitation au XIXe siècle.     LACAZE, en 1687,  La famille de Pons vend La Caze à Joseph Gillet, qui devient marquis de La Caze. En 1714 : Pierre Gaston de Gillet devient marquis de La Caze, en 1779 : Jean Baptiste François de Gillet, chevalier, seigneur, marquis de La Caze, comte de Castelnau d'Eauzan, conseiller du Roi Louis XVI, En 1789 à la Révolution française, les Gillet quittent La Caze, en 1820, il revend Laballe  à Jean Dominique Laudet de Mirande (Gers) en 1822. En 1844 : Louis Adhémar de Guilloutet, petit-fils de Louise Monge (1779-1874).  En 1900 : Adolphe Whitcomb, conseiller général du canton de Gabarret devient propriétaire. Il est tué en 1914 à la bataille de la Marne. De 1923 à 1958, Lucien, Ernest, Gaston et Jean Pascal sont les propriétaires de la Caze. En 1958,à la famille Godefroy, puis  en 1963, à  la famille De Robillard,  en 1973,  à la famille Douillet et Sidicki et en  1981 : Christopher Oldham, restaure le château.","architecture":"LABALLE, dun point de vue architectural cette demeure assez vaste est composée de chais qui forment une cour fermée autour du logement seigneurial et le corps principal de bâtiments à étages est entouré de deux massifs carrés et symétriques. Ils sont tous deux couverts par un toit en pavillon à quatre pans ouverts par une lucarne                                LACAZE édifié au debut du XIVe siècle restaurée la façade nord  sur cinq niveaux présente trois tours crénelées; une octogonale de part et d'autre et une cylindrique au centre, accolée à une tour carrée coiffée d'un fronton triangulaire, cette dernière paré de fenêtres à meneaux, comme d'autres dans le château, mais celle-ci sont encadrées de galbes et de pinacles. La partie haute de la façade à été refaite au siècle dernier avec réhaussement des tours crénelées, ces dernières avaient été  décapitées à la Révolution. Le corps central de la façade postérieure est accéssible par un escalier flanqué de deux larges pavillons, jouxtées au XVIIIe siècle.                                      BOUSCAU de plan rectangulaire à deux niveaux toit à deux pans avec lucarnes avec fronton triangulaire en façade.","habitants":"Laballe Famille Barbotan                                                   Lacaze famille Godefroy\r\n        \r\n        \"","divers":"Chaâteau de Laballe grav 1et  2 de Lacaze  grav 3 à 6  43° 56' 35 nord, 0° 02' 03 est,   et de Bouscau grav 7 et 8 à Perleboscq","gps":"","images":["../image/image_40/40_Parleboscq_1.jpg","../image/image_40/40_Parleboscq_2.jpg","../image/image_40/40_Parleboscq_3.jpg","../image/image_40/40_Parleboscq_4.jpg","../image/image_40/40_Parleboscq_5.jpg","../image/image_40/40_Parleboscq_6.jpg","../image/image_40/40_Parleboscq_7.jpg","../image/image_40/40_Parleboscq_8.jpg"]},"Consult_chateau_formulairebaaa":{"id":"Consult_chateau_formulairebaaa","dept":"40","canton":"Mimizan","commune":"Pontenx les Forges","nom":"Pontenx_Forges","type":"Gentilhommière","periode":"XVIII","histoire":"PONTENX, en 1640,  le seigneur Castéja-Rolly, héritier de Bernard de Bourbon. « Noble de Marguerin de Senjulien, seigneur de Rollie, Pontenx, Aureilhan, Saint-Paul, Sainte-Eulalie, Gastes, Biscarosse ». En 1659 Marguerin épouse Marie de Gachon qui hérite de lui en 1670, leur fille dispose ensuite des biens en faveur de lépoux de sa fille : le marquis de Gombault. La famille du dernier seigneur protestant M. de Lamassan, se fait catholique en 1731. Outre les Rolly,  les dArtigues dOssaux; c'est  en 1760 que Pontenx prospère, quand le seigneur de Rolye construit le nouveau château et sa chapelle. En 1789, le duché d'Albret est versé à l'Intendance de Bordeaux, Bouricos est rattachée à Pontenx. Les forges emploient alors 120 personnes. La compagnie des gardes-côtes du Born sappelle « compagnie de Saint-Julien », mais cest à Pontenx que tous se réunissent pour lexercice. En 1794 trois charretées de papiers actes et titres appartenant au marquis de Gombault en fuite. Le marquis de Saint-Exupéry (gendre de Gombault) devient maître de forges vers 1833, puis vend tout le domaine à la Cie des Landes.  En 1862 la commune, sous la conduite de son maire, M. Péan, achète à la Cie des Landes lancien château et ses dépendances (aujourdhui, bureau de tabac, place publique et école). On y construit la mairie en1865, mais le premier étage du bâtiment est du XXe siècle.","architecture":"Pontenx les forges, la gentilhommière du XVIIIe siècle à un niveau, toit en croupes.","habitants":"marquis de Saint Exupéry \r\n        \"","divers":"La gentilhommière de Pontenx","gps":"","images":["../image/image_40/40_Pontenx_Forges_1.jpg"]},"Consult_chateau_formulaire6f4e":{"id":"Consult_chateau_formulaire6f4e","dept":"40","canton":"Hagetmau","commune":"St-Cricq-Chalosse","nom":"Poudenx","type":"Château","periode":"XIV-XIX","histoire":"POUDENX,  la première mention d'une maison forte date du XIVe siècle, Emery de Bazilla est seigneur et baron de Saint-Cricq qui passa par alliance aux de Poudenx, en 1539  Marguerite de Saint-Cricq, veuve de Emery de Bazillac épouse François de Poudenx, en 1646 les terres de Poudenx passe en vicomté, cest en 1704 que Henri de Poudenx, vicomte de la seigneurie de Poudenx, épousa sa cousine au 4ième degré, Jeanne de Poudenx, descendante et héritière des anciens seigneurs de Saint Cricq. Henri de Poudenx devient par cette union, baron de Saint Cricq, propriétaire du domaine et du château de cette paroisse. Et, de 1704 jusquau décès, sans descendance, de lultime comte de Poudenx en 1894, cest cette famille noble qui posséda le château et le domaine dit \"de Poudenx\" à Saint Cricq Chalosse. Dans la descendances en 1813 l'une des filles d'Henri Henriette  Emilie, épouse le général d'Empire Pierre d'Ismert qui a  son décés le dernier représentant  de cette lignée en 1894 le château revient à Alfred Henri de Lesparda  et après le décés en 1948 de son ultime occupant et usufruitier, le docteur Lubet-Barbon, la commune de St-Cricq put acquérir le château de Poudenx en 1951 pour y établir ses bureaux municipaux de la mairie. Dans les années qui suivirent cette acquisition, on procéda à des modifications et des aménagements plus fonctionnels, tels que nous pouvons en bénéficier aujourdhui.","architecture":"le Moyen-Age a marqué le village de Poudens, puisque l'édification même du bourg date de cette époque. Brassempouy est en effet une vieille bastide anglaise, et le bourg est organisé en village-rue : les maisons sont alignées autour d'une rue principale, fermée d'un côté par le château (celui qui est visible, aujourd'hui, date du XIXe siècle).  A laltitude de 124 m, cette ancienne maison noble, devenue demeure de plaisance, puis aujourdhui mairie, est bâtie à 30 m de léglise paroissiale, en bordure du village. Le château domine au sud le profond vallon de Bordes et les pentes boisées vers Brassempouy.\r\n fut édifié au début du XVIIIe siècle. Il est de forme rectangulaire, orienté est-ouest dans sa plus grande dimension. Deux tours sont accolées à ses angles sud : une tourelle octogonale au sud-est, une tour rectangulaire à pans coupés, au sud-ouest, la partie centrale est coiffée dun comble brisé \"à la Mansart\" couvert de tuiles béarnaises brunes, sauf sur certains pans pour lesquels a été utilisé lardoise grise. Lensemble du bâtiment offre la vision dune architecture assez disparate. La différence des styles des façades est manifeste. Cette différence témoigne, à partir dune construction primitive massive, de reconstructions, dagrandissements et surtout dajouts détonnants éléments de décor hybride, mi-gothique, mi-renaissance. Ces transformations ayant été effectuées entre les XVIe et XXe siècles.","habitants":"Famille de Henri de Poudenx \r\n        \r\n        \"","divers":"Château de Poudenx 43° 39' 13 nord, 0° 41' 07 ouest","gps":"","images":["../image/image_40/40_Poudenx_1.jpg","../image/image_40/40_Poudenx_2.jpg","../image/image_40/40_Poudenx_3.jpg","../image/image_40/40_Poudenx_4.jpg"]},"Consult_chateau_formulaire082b":{"id":"Consult_chateau_formulaire082b","dept":"40","canton":"Montfort-sur Chalosse","commune":"St-Aubin","nom":"Poyaller","type":"Vestiges-Tours","periode":"XIII","histoire":"POYALLER,  a été construit, à la fin du XIIIe siècle, La seigneurie de Poyaller n'a pas laissé de traces documentaires sur ses origines. La dernière héritière de l'ancienne maison vassale des rois d'Angleterre, ducs d'Aquitaine, Agnette de Saint-Aubin, dame de Poyaller, épousa, vers 1295, Arnaud de Marsan de Cauna. A la suite de ce mariage, les barons de Cauna prirent le titre de seigneurs de Poyaller jusqu'au milieu du XVIe siècle. En 1274, le château appartient à plusieurs seigneurs vassaux du Roi d'Angleterre qui est aussi duc  d'Aquitaine. En 1442, le château et ses terres sont élevés en baronnie par le roi de France Charles VII. Cet acte est une récompense au seigneur Louis de Marsan de Cauna pour son ralliement de son territoire au Royaume de France.   Au  XVIIe siècle, un texte affirme que les bâtiments sont inhabitables et très ruinés. Terres et château appartiennent toujours à la famille de Marsan de Cauna.  En 1683, François de Gontaud de Biron est le nouveau propriétaire. Mais il n'habite pas le château ruiné. En 1788, à la mort de Louis de Gontaud de Biron, une partie des biens est vendue à plusieurs familles. En 1794, la ruine est prise par les révolutionnaires et vendue comme bien national. Il semble que le château soit dépouillé de ces plus belles pierres. En 1996, la ruine est inscrite aux M.H.","architecture":"Le château de Poyaller est construit à la fin du XIIIe siècle à partir d'une motte castrale arasée. Il reste l'un des rares témoins de tours-maîtresses élevées dans le département. Il perd sa fonction défensive et, après avoir servi de métairie, La tour ne comporte plus que trois étages, dont les planchers ont disparu. Selon le dispositif habituel, la porte d'entrée se trouve au second niveau et était probablement accessible par un ouvrage en bois. À l'intérieur de la tour, la distribution devait se faire au moyen d'escaliers en bois ou échelles de meunier. La fonction résidentielle était complétée par un logis, vaste salle rectangulaire établie à la limite nord du site dont il ne reste qu'un pan de mur conservé. Son élévation indique une structure à un rez-de-chaussée et un étage. Les assises au sol déterminent une emprise d'environ quinze mètres de long sur quatre de large.","habitants":"seigneur Louis de Marsan de Cauna\r\n        \"","divers":"Tour de Poyaller 43° 43' 01 nord, 0° 44' 05 ouest","gps":"","images":["../image/image_40/40_Poyaller_1.jpg","../image/image_40/40_Poyaller_2.jpg"]},"Consult_chateau_formulairea42d":{"id":"Consult_chateau_formulairea42d","dept":"40","canton":"Montfort en Chalosse","commune":"Poyanne","nom":"Poyanne","type":"Château","periode":"XVII","histoire":"POYANNE, un château féodal primitif avec motte, fossés et palissades, fut érigé, vers 1308, sans permission, non loin et menaçant le château de Saint-Geours, siège du bayle d'Auribat. En 1311, des enquêteurs anglais signalèrent cette usurpation dangereuse. Il ne sera reconnu et légitimé qu'en 1315, date à laquelle Edouard II d'Angleterre, duc d'Aquitaine, autorisa Bernard de Poyanne  descendant d'une famille connue depuis le XIe siècle à y édifier une maison forte en 1623 à 1628. Le château situé à lentrée du village de Poyanne est le témoignage de la puissance de la famille noble de Baylenx dont lorigine remonte au XIVe siècle, par lunion des Poudenx et des Baylenx, et dont lapogée se situe entre les XVIe et XVIIIe siècles. Pendant plusieurs générations, des guerres de religion à la fronde, de la guerre de sept ans à celle de trente ans, les Baylenx de Poyanne ont accumulé titres, charges et honneurs dans le pays de Lannes, en Béarn et à la cour de Versailles, en récompense de leur fidélité au pouvoir royal. Quatre barons puis marquis de Poyanne furent fait chevaliers de l'ordre du Saint-Esprit, l'ordre de chevalerie le plus prestigieux de l'ancien régime, par Henri IV, Louis XIII, Louis XIV, et Louis XV. Le château de Poyanne est classé aux M.H. depuis 1957. Il a été racheté par le département des Landes.","architecture":"POYANNE, sa construction date de la 1ère moitié du XVIIe siècle et fut achevée en 1624. En 1206, les seigneurs de Poyanne font construire une bastide sur l'emplacement, déjà choisi par les Romains, pour y établir un camp. Une demeure plus confortable remplaça l'ancienne forteresse au début du XVIIe siècle. Le bâtiment se décompose en cinq pavillons  juxtaposés, celui du centre en saillie sur les autres. Sa toiture est construite en forme de dôme surmonté par un belvédère. Des bandeaux soulignent les trois étages. La façade nord, par la déclivité du terrain, présente un étage de plus. Frontons et denticules ornent fenêtres et mansardes. Les deux pavillons ouest semblent postérieurs. Celui du centre et celui qui lui est mitoyen vers l'est semblent remonter à 1624. Le pavillon Est doit être antérieur à cette date, sans doute construit à l'emplacement de l'ancienne forteresse.","habitants":"Famille noble de Baylenx \r\n        \"","divers":"Château de Poyanne  43° 45' 26 nord, 0° 48' 53 ouest","gps":"","images":["../image/image_40/40_Poyanne_1.jpg","../image/image_40/40_Poyanne_2.jpg","../image/image_40/40_Poyanne_3.jpg","../image/image_40/40_Poyanne_4.jpg"]},"Consult_chateau_formulaire8ae9":{"id":"Consult_chateau_formulaire8ae9","dept":"40","canton":"Peyrehorade","commune":"La Bastide d","nom":"Prada","type":"Château","periode":"XVIII","histoire":"PRADA, cette ancienne demeure sénatoriale fut bâtie en 1764. Le château a été édifié par laïeul du propriétaire actuel en 1764, il a été construit sur des plans de Victor Louis auquel on doit le grand théâtre de Bordeaux. Jean de Bouglon, procureur du roi et gouverneur dEauze, épouse en 1728 Marie Maurisset, fille dun bourgeois de Labastide. Leur fils fait ériger la terre du Prada en seigneurie et fait construire le château vers 1764 par Victor Louis,\r\nLe château est par la suite le berceau d'une lignée de militaires, parmi lesquels Odette de Bouglon, qui sert en première ligne pendant la première guerre mondiale en tant que conductrice d'ambulances, et Jean de Bouglon, mort sur la ligne Maginot en 1940. Le célébre écrivain Barbey d'Aurevilly (1808-1889) fit plusieurs séjours dans ce château  qui est toujours dans la famille de Bouglon.                                                         A 10  kilomètres au sud-Est à Cagnotte le chateau de Bellevue.","architecture":"PRADA, construit entre 1760 et 1765 charmante résidence, de style sobre et élégante est encadrée de communs  connstruits à la même époque et ornée de frontons similaires, ce qui donne à l'ensemble un équilibre parfait, dans un environnement admirable où se côtoient parc, jardin paysager et vue sur les montagnes.  l 'édifice est précédé d'une belle cour d'honneur à laquelle on accéde par une grille imposante. Les façades et toitures du corps de logis et des dépendances, les cheminées de pierre et l'escalier à l'intérieur du corps de logis ainsi que la grille d'entrée sont inscrits au titre des M.H. par arrêté du 28 décembre 1984.                                                     BELLEVUE de plan en T à trois niveaux toits à deux pans recouverts de tuiles.","habitants":"Famille de Jean de Bouglon\r\n        \"","divers":"Château de Prada et de Bellevue grav 4","gps":"","images":["../image/image_40/40_Prada_1.jpg","../image/image_40/40_Prada_2.jpg","../image/image_40/40_Prada_3.jpg","../image/image_40/40_Prada_4.jpg"]},"Consult_chateau_formulaire7350":{"id":"Consult_chateau_formulaire7350","dept":"40","canton":"Montfort en Chalosse","commune":"Gamarde les bains","nom":"Rau","type":"Château","periode":"XV","histoire":"RAU, François du Haa épouse en 1562 Claire Chapelain, fille du médecin des feus roi et reine de Navarre. Marguerite de Poyanne-Domesain, celle-ci est mariée à Bernard du Haa, originaire de Dax. Un fils leur survit, Bertrand, seigneur du Rau, marié à Marguerite d'Oro d'Oeyreluy, vers 1600. La soeur de Pierre, Claire du Haa, devient propriétaire des caveries du Rau et de Castagnet ainsi que de la terre du Haget Claire a épousé en 1622 Jean de Fos, conseiller du roi, avocat au présidial de Dax;  la famille s'appelle désormais De Fos du Rau. Elle meurt à Dax en janvier 1633; son fils aîné, Pierre, lui succède, marié à Jeanne de Maurian, fille d'un assesseur au sénéchal de Tartas. Puis vient Jean, marié à la fille d'un avocat de Tartas; on le trouve en 1768 comme parrain de l'enfant du chirurgien de Goos, Lassalle, au Pébré.la famille Mesnard de Conichard. Mr Mesnard, avec son gendre et sa fille, M. et Mme Pussacq, possède toujours le Rau et l'habite. Très vite attaché à la maison du comte d'Artois, il le suivit en émigration, rentra en France avec lui, assista à la mort du duc de Berry et accompagna Charles X dans l'exil définitif.","architecture":"De chaque côté de la tourelle s'élève un corps de bâtiment à un étage et grenier, profond seulement d'une grande salle. Ces corps, reliés par un large vestibule, ont été construits, ou du moins remaniés à la Renaissance. Le grenier et la salle de guet prennent jour par de belles fenêtres à meneaux. Le bâtiment de droite, au rez-de-chaussée, près de la porte, d'un écu très simple, assez détérioré, que notre vice-président Charles Blanc pense être celui des du Haa. A côté, dans un cartouche sculpté, une inscription mystérieuse; le nom de François du Haa, qui vivait en plein XVIe siècle, est suivi par celui de Marguerite de Domesain, sa grand-tante. En dessous, des initiales : H.G.P.Q.R. Les toitures de la tourelle, des ailes et mansardes sont très harmonieuses, en tuiles anciennes., à fortes pentes, légèrement incurvées sur les bords. Ce ne sont pas les habituelles toitures landaises; elles sont influencées par le Basco-Béarn des Domesain.","habitants":"Famille de François du Haa\r\n        \"","divers":"Rau  GPS : 43.72237, -0.881486","gps":"43.72237, -0.881486","images":["../image/image_40/40_Rau_1.jpg","../image/image_40/40_Rau_2.jpg","../image/image_40/40_Rau_3.jpg","../image/image_40/40_Rau_4.jpg","../image/image_40/40_Rau_5.jpg"]},"Consult_chateau_formulairee6fd-2":{"id":"Consult_chateau_formulairee6fd-2","dept":"40","canton":"Aire sur l","commune":"Perquie","nom":"Ravignan","type":"Château","periode":"XIV-XVII","histoire":"Trois châteaux à Perquie, de Ravigan, de Pomiès, et de Gaube, mis à part Ravignan pas d'information historique.                                                                          RAVIGNAN,  Au XIIe siècle, un prieuré est installé à Ravignan par les bénédictins de labbaye de la Sauve-Majeure. Lieu dhabitation dun bailli du vicomte de Marsan de la fin du XIIIe siècle au début du XIVe siècle, le château devient au XVIe siècle le siège dune importante seigneurie appartenant à la famille de Mesmes. Joseph de Mesmes  Alcibiade, sénéchal des Lannes et gouverneur de Marsan,  vend en 1732 la seigneurie de Perquie et de Ravignan à Jean Dominique de Lacroix, descendant dune famille de financiers bayonnais. La famille Lacroix conserve depuis le titre de baron de Ravignan. Cette famille poursuit la reconstruction du château jusquà la fin du XIXe siècle.  Ravignan est un domaine familial depuis 14 générations.                                                    POMIES pas d'information , de GAUBE  Le château de Gaube, demeure de la famille Morel","architecture":"RAVIGNAN la présence des deux ravins sur le domaine est à l'origine du nom. Le château est au départ une maison seigneuriale construite sur les ruines d'un château fort, remontant aux Wisigoths et brûlé durant les guerres de religion. Sa façade de style Louis XIII date de 1663, mais il est édifié en plusieurs étapes entre le XVIIe siècle et le XIXe siècle, dont son jardin à la française, modifié au XXe siècle, lactuel château est reconstruit dès 1663, en pierre au XVIIe siècle. Il abrite, au fil des siècles, divers propriétaires et participe au rayonnement de la commune. le château de Ravignan exprime toute l'élégance du grand siècle, présente un ordonnancement que lon retrouve souvent au XVIIe siècle : une façade symétrique à deux étages, un pavillon central entouré de deux corps de logis, eux-mêmes encadrés par deux pavillons.  Le musée, le château, le jardin et les chais sont ouverts au public. il est inscrit à linventaire des M.H. par arrêté du 23 novembre 1948.\r\nGAUDE de plan en U à deux niveaux sur soubassement toits en croupes recouvert de tuiles, en façade d'entrée intérieur  monté d'escalier surmonté dune partie saillante pour la porte d'entrée  et fronton triangulaire.","habitants":"Ravignan, Famille Lacroix                                        Gaube  Famille Morel\r\n        \r\n        \"","divers":"Château de Ravignan 43° 52' 32 nord, 0° 17' 0 ouest,  de Gaube  grav 4 5 6, 43° 51' 25 nord, 0° 13' 49 ouest, Pomiès 43° 52' 52 nord, 0° 15' 41 ouest à Perquie","gps":"","images":["../image/image_40/40_Ravignan_1.jpg","../image/image_40/40_Ravignan_2.jpg","../image/image_40/40_Ravignan_3.jpg","../image/image_40/40_Ravignan_4.jpg","../image/image_40/40_Ravignan_5.jpg","../image/image_40/40_Ravignan_6.jpg"]},"Consult_chateau_formulaire37ca":{"id":"Consult_chateau_formulaire37ca","dept":"40","canton":"Aire sur l","commune":"Pujo le Plan","nom":"Renty","type":"Château","periode":"XIII","histoire":"RENTY, le château de Renty est toujours visible dans la commune de Pujo-le-Plan. Entouré de douves remplies par l'eau. Renty fut le siège d'une famille qui s'y installa il y a plus de mille deux cents ans pour y demeurer sans interruption près de six siècles jusquen 1354 dans la forteresse et jusquau XVIIe siècle sur les terres proches de Waltencheux, dAssonval et du Cauroi. Dautres Renty resteront dans les environs comme à Verchocq, Rimboval au nord-est dEmbry,  À partir du milieu du XIVe siècle, une famille féodale puissante et célèbre récupère en dot la baronnie. La seigneurie dépendit alors de la famille de Croÿ et des d'Egmont. Au milieu du XIVe siècle, Renty est donc passée dans les mains de Guillaume de Croÿ qui avait épousé en 1354 Isabeau de Renty et obtint par dot cette terre, forteresse et fiefs affiliés.\r\nRenty fut érigé par Charles Quint en marquisat en 1533. Henri II y battit les espagnols de Charles Quint le 13 août 1554. Il existe une plaque commémorative de la bataille de Renty à l'intérieur de l'église. Henri II récompensa la vaillance du maréchal de Tavannes sur le champ de bataille même, en détachant de son cou le collier de son ordre de Saint-Michel pour l'en décorer.  Durant la seconde guerre mondiale, des habitants de Renty et en particulier Norbert Fillerin organisent le réseau Pat OLeary. Norbert puis Marguerite Fillerin seront arrêtés, déportés et reviendront des camps nazis.","architecture":"Renty, le château a été restauré en 1630 puis rasé huit ans plus tard en 1638, lors de la guerre de Trente Ans, sous Louis XIII par le maréchal de Châtillon sur l'ordre de Richelieu qui voyait d'un mauvais il l'influence grandissante de certains hauts seigneurs et craignait le début d'une fronde. Le siège de Renty par les Français a eu lieu le 31 juillet 1638 entre le 1er et le 9 août 1638. Le maréchal de Châtillon loge à Fauquembergues et le maréchal de la Force à Fasque. Une tranchée est ouverte dans la nuit. La reddition a lieu le 9 août. La forteresse est détruite.\r\nCe château nétait plus quune ruine en 1775. Il en existe encore des traces au centre du village. Des monticules recouverts de terre et de végétation, bordés de petits étangs destinés actuellement à la pêche, derrière un premier rang de bâtiments à droite de la route allant à lAa, témoignent encore en 2009 de la présence ancienne de ses murs. La bâtisse posséde un corps de logis central flanqué de deux ailes et un large donjon crénelé du XVIe siècle dont la hauteur ne dépasse pas celle du reste. Au pied un monumental portail classique à deux colonnes corinthiennes encadrant une voûte en plein cintre avec clef à tête de lion et une vieille porte cloutée. Les fosses existent ent encore devant le château le pont-levis remplacé par un pont dormant.                                                           PUJO, à l'origine le château possédait un donjon crénelé à trois niveaux accolé à un bâtiment légèrement courbé  couvert d'un toit en croupes couvert  de tuiles, le donjon actuellement recouvert d'un quatre pans.","habitants":"Famille de Croÿ \r\n        \r\n        \"","divers":"Château de Renty à Pujo le Plan","gps":"","images":["../image/image_40/40_Renty_1.jpg","../image/image_40/40_Renty_2.jpg"]},"Consult_chateau_formulairee5d7":{"id":"Consult_chateau_formulairee5d7","dept":"40","canton":"Hagetmau","commune":"Montgaillard","nom":"Robert","type":"Forteresse","periode":"XIX","histoire":"MONTGAILLARD,  Par différent mariage et héritage la famille Lespes obtient le domaine de Montgaillard.  Au XVIIe siècle, avant la révolution, les Lespes de Saint Sever, famille très ancienne et très riche, anoblie par Louis XIV possédaient les domaines de Robert et de Prous, qui passeront entre les mains de Bertrand de Castelnau par son mariage avec Jeanne Marie de Lespes.  Bertrand de Castelnau mourut en 1717. La dame de Castelnau vivait simplement avec ses fils et petit-fils sur la terre de Robert, lorsquelle hérita dune fortune considérable, venant dune cousine germaine veuve de J.B dAlbessard, président du parlement de Bordeaux en 1750, en 1758, Pierre François de Castelnau épouse Julie Constance de Beynac dernière survivante de cette lignée et devient seigneur de Montgaillard.  En 1762, Pierre, marquis de Castelnau, baron de Montgaillard vend le château de Prous à monsieur Théophile Poydenot de Bayonne. Mais la Révolution vint à Montgaillard, la famille Castelnau fut dépossédée de son titre. Le superbe château fut totalement dévalisé et Pierre de Castelnau interné à Saint Sever. En 1959, sous limpulsion dA. Falkensberg accouveur, Jacques Isnard éleveur et Albert Marie-Hot volailler.  En 1975, le château fut le cadre dun film télévisé « Allez la rafale » dont la vedette était Henri Genès. La demeure appartenait à Albert Marie-Hot. Aujourdhui, le château Robert reste une propriété privée et le château de Prous est propriété de la famille du Moulin de la Barthète.  il est bien entretenu car en location. Transformé en chambres d'hôtes par monsieur Clain.","architecture":"le château Robert que nous atteignons. Son architecture est du XVIIIe siècle d'inspiration italienne et sa façade ouest de 1900, corps de logis de plan rectangulaire sur soubassement en arcades à deux niveaux  escaliers en fer à cheval deux balcons celui du premier en galeries à arcs arrondies soutenu par des colonnes jumelées, le deuxième  en terrasses sur toit avec fronton rotondant cintré d'un oeil de boeuf, aux extrémités deux pavillons rectangulaires saillant d'une travée dont le troisième étage et surélevée d'un niveau de plan carrée avec terrasses, sur la façade côté parc, deux niveaux,flanqué au centre de forme arrondi les trois travées à trois niveaux avec toit presque plat. des dépendances sont accolé à l'édifice toit en croupe.","habitants":"Famille de Lespes\r\n        \"","divers":"Château de Robert à Montgaillard","gps":"","images":["../image/image_40/40_Robert_1.jpg","../image/image_40/40_Robert_2.jpg","../image/image_40/40_Robert_3.jpg","../image/image_40/40_Robert_4.jpg","../image/image_40/40_Robert_5.jpg"]},"Consult_chateau_formulaire8f83":{"id":"Consult_chateau_formulaire8f83","dept":"40","canton":"Parentis en Born","commune":"Belhade","nom":"Rochefort_Lavie","type":"Château","periode":"XV","histoire":"BELHADE ou  château de Rochefort-La-Vie  la première mention de lédifice remonte à 1410. À lépoque, il appartient à la famille de Lanes, qui le conserve jusquen 1592, passa aux de Babiault, aux d'Alseme et les Pontacq-Belhade et les Lavie.  Pendant plusieurs siècles, le château reste dans la famille de Pontacq, qui le cède finalement aux Lavie en 1759.   En 1654 Louis XIV  érige la baronnie en comté.   Depuis une trentaine dannées, le château et ses dépendances sont la propriété dune importante société dexploitation agricole et forestière, dont le siège se trouve au château de Lestonnac à Gradignan, en Gironde.   Le château de Rochefort-La-Vie est inscrit aux M.H. avec sa motte féodale dpuis le 16.01.2001.","architecture":"Belhade; en 1654, le château nest composé que dune tour isolée par un vaste fossé. Au milieu du XVIIIe siècle, après avoir subi de nombreuses destructions, il se trouve dans un état de grand délabrement. Cest à la famille Lavie que lon doit les restaurations importantes qui sont entreprises entre 1760 et 1789.     Enfin, au XIXe siècle, on apporte à lédifice des modifications considérables avec laménagement de lintérieur, la construction dune aile et de dépendances. Les bâtiments sordonnent désormais autour dune vaste cour dans laquelle on pénètre par un portail encadré de deux tours rondes. Au fond de la cour, sélève le bâtiment principal, dont la façade ouest est complétée par deux tours polygonales.\r\n Des aménagements sont alors réalisés au cours du XVIIIe siècle. De cette époque, le château conserve son corps de logis surélevé flanqué de deux tours carrées placées en avant de la façade. Les autres bâtiments se développent autour d'une cour formant enceinte. La décoration intérieure fait quant à elle l'objet d'une restauration au cours du XIXe siècle.\r\nL'intérêt majeur du site, justifiant son inscription, réside dans la continuité historique de son occupation.","habitants":"Famille   de Lavie                                                     Famille de Pontacq\r\n        \"","divers":"Château de Rochefort la Vie","gps":"","images":["../image/image_40/40_Rochefort_Lavie_1.jpg","../image/image_40/40_Rochefort_Lavie_2.jpg","../image/image_40/40_Rochefort_Lavie_3.jpg","../image/image_40/40_Rochefort_Lavie_4.jpg"]},"Consult_chateau_formulairec82c":{"id":"Consult_chateau_formulairec82c","dept":"40","canton":"Dax","commune":"Siest","nom":"Salles_Siest","type":"Maison forte","periode":"XVI","histoire":"SALLES, château d'Isidore de Salles né à Sainte-Marie de Gosse d'une famille de médecin, il devient très jeune orphelin, d'abord journaliste à Paris, il fut nommé sous préfet à Dax à l'âge de vingt sept ans de 1848 à  1849, secrétaire du ministre  des finances Achilde Fould, il fut successivement sous préfet de Villefrance, de Bar sur Aube, puis préfet de la Creuse, des Pyrénées Orientales, de L'Aube et du Bas-Rhin. Mais il fut surtout un poête gascon apprécié.","architecture":"Le château de Salles devenu maison forte de plan rectangulaire à deux niveaux flanqué d'une tourelle hexagonale avec cloheton.","habitants":"Famille d'Isidore de Salle\r\n        \"","divers":"Maison forte de Salles, de Lagelouse grav 5","gps":"","images":["../image/image_40/40_Salles_Siest_1.jpg","../image/image_40/40_Salles_Siest_2.jpg","../image/image_40/40_Salles_Siest_3.jpg","../image/image_40/40_Salles_Siest_4.jpg","../image/image_40/40_Salles_Siest_5.jpg"]},"Consult_chateau_formulaire8fcb":{"id":"Consult_chateau_formulaire8fcb","dept":"40","canton":"Marinsin","commune":"Soustons","nom":"Soustons","type":"Château","periode":"XIX","histoire":"SOUSTONS, la Pandelle mairie d'origine antérieure, limmeuble appartien  à monsieur Sire pour lui avoir été légué à titre particulier par madame Philomène Marie Duboscq de son vivant sans profession demeurant à Soustons. Louis Gabriel au termes dun codicille à son testament en date à Soustons du 20 juin 1947 ouvert et décrit judiciairement déposé au rang des minutes de létude de Me Rozat alors notaire à Soustons suivant acte à son rapport du 26 mars 1949. La propriété de la Pandelle appartenait en propre à Mme veuve VIDAL née Dubosq pour lavoir recueillie dans la succession de monsieur Duboscq son père décédé, le tout ainsi déclaré dans lattestation du 21 avril 1965.                                                          Le Mas, du vicomte Ste-Marie","architecture":"Le bâtiment de la Pandelle a été inscrit sur linventaire des sites pittoresques du département des Landes par arrêté du secrétaire détat à la culture le 30 octobre 1975. Hébergement de l'escadron de Gendarmerie chargé de la protection du Président de la République de 1984 à 1997. Remise en état des salles du rez-de-chaussée du 1er février au 1er juillet 1999 par les services techniques de la Ville de Soustons, sous la direction de monsieur Alain Bougue.","habitants":"Monsieur Sire\r\n        \r\n        \"","divers":"Château de la Pandelle grav 1et 2, le Mas Grav 3 , de Richer grav 4.","gps":"","images":["../image/image_40/40_Soustons_1.jpg","../image/image_40/40_Soustons_2.jpg","../image/image_40/40_Soustons_3.jpg","../image/image_40/40_Soustons_4.jpg","../image/image_40/40_Soustons_5.jpg"]},"Consult_chateau_formulairee592":{"id":"Consult_chateau_formulairee592","dept":"40","canton":"St-Martin de Seignanx","commune":"Saint-André de Seignanx","nom":"St_André_Seignanx","type":"Château","periode":"XIII-XVI","histoire":"Trois châteaux à Saint-André de Seignanx celui de Castets (voir article) , de Hitau et de Lalanne.       LALANNE, est une ancienne caverie. La seigneurie de Lalanne a possédé des métairies et des moulins. Un château fort a été élévé sur ce domaine par noble Pierre de Poyloaut avec la permission du roi d'Angleterre, en 1331. Jean de Bédorède était marié à Jeanne de Lalanne vers le début du XVIe siècle.   Dans les années 1970, le domaine appartenait au comte d'Elbée. La demeure a été restaurée à cette époque.                                                                            HITAU, lors de l'invasion des Gascons, Saint-André appartient aux ducs de Gascogne qui confièrent le gouvernement du village aux seigneurs habitant le château du Hitau. Saint-André passa ensuite à la maison de Plantagenêt quand Eléonore de Guyenne épousa Henri II d'Angleterre au XIIe siècle. Le château actuel a été construit au  milieu du XVIe siècle. Le domaine fut acquis par la famille de Romatet qui le fit construire. Le lieu dit Hitau figure sur la carte de Belleyme. Le cadastre de 1810 représente le château du Hitau et ses communs.","architecture":"Lalanne,  édifice de plan rectangulaire avec un jardin et un verger à l'est, une cour et des communs vers le sud. Un plan cadastral du début du XIXe siècle montre l'escalier montant de la cour au château de plan régulier en L, moellon enduit, 1 étage carré, 1 étage de comble, lucarnes passantes, une tour ronde à l'angle nord est couverte par un toit conique à quartiers, tuiles plates. Elévation ordonnancée, fenêtres à meneaux et traverses.                                                                          HITAU, le château a été construit au milieu du XVIe siècle.","habitants":"Famille de Jean de Bédorède                                        Famille de Romatet\r\n        \"","divers":"Château de Castets   43° 35' 04 nord, 1° 23' 06 ouest, de Hitau et de Lalanne","gps":"","images":["../image/image_40/40_St_Andr%c3%a9_Seignanx_1.jpg","../image/image_40/40_St_Andr%c3%a9_Seignanx_2.jpg"]},"Consult_chateau_formulaire234e":{"id":"Consult_chateau_formulaire234e","dept":"40","canton":"Hagetmau","commune":"St-Cricq-Chalosse","nom":"St_Cricq_Chalosse","type":"Château","periode":"XVI-XVIII","histoire":"Quatre  châteaux à Saint-Cricq-Chalosse celui de Laballe, de  Lataulade et celui de Poudenx  (voir article), de Marquebièlle  et de Bariet à Brassempouy à 2 kilomètres au sud                                                       LATAULADE est une propriété privée  qui fut remanié au XVIe siècle.    \r\nMARQUEBIELLE, le château dit de Lataulade  et la terre de Marquebielle furent acquis vers 1500 par Jeannot de Lataulade. Depuis cette époque lointaine, le château de Marquebielle est toujours resté dans les biens de la famille de Lataulade. Les chefs de cette famille, étaient seigneurs barons de Marquebielle, Làas, Issor, Ossages, Agès, Urgons, en Chalosse et Béarn. Lultime baron de ce nom, seigneur de Marquebielle fut Louis Bernardin Dominique de Lataulade-Domenger, qui y décéda en 1941. Son épouse, Marie Thérèse Elisabeth Josèphe Roques-Borda vécut au château, jusquà son décès en 1963. Par successions et partages, le domaine et le château de Marquevielle échurent ensuite à la famille de Supervielle, puis à la famille de Montplanet. Ces biens sont aujourdhui la propriété de madame Marie Antoinette De Supervielle, épouse de Vaubicourt.  Château de divers styles successifs, agrandi et modifié au XVIe siècle par la baron Etienne de Lataulade, époux de Jeanne Eyquem nièce de Michel de Montaigne                                                          BARIET, Ainsi, on peut encore distinguer des fortifications de terre, appelées ici bien souvent \"camps romains\" bien qu'on en ignore l'origine exacte. Mais c'est surtout le Moyen-Âge qui a marqué le village. En effet, l'édification même du bourg date du XIIe siècle.","architecture":"LABALLE, se compose d'un corps central surmonté d'un petit fronton triangulaire   et encadré de deux pavillons carrés à toitures pyramidale, la bâtisse est édifiée sur des caves voûtées qui datent du XVIIe siècle.                                                                               LATAULADE, possède des fenêtres à meneaux et un toit à la béarnaise.                                               MARQUEBEILLE, comprend un ensemble de corps de logis de bel aspect quoique de formes et de styles assez disparates. Le corps de logis central date du début du XVIe siècle, dans la dernière moitié du XVIe siècle,  la façade extérieure, percée de fenêtres à meneaux et jouxtée au nord d'un pavillon, est surmontée d'un pignon triangulaire hérissé de fleurons, au sud, un pavillon plus petit masque le bas d'une tour  polygonale qui flanque la façade arrière, côté cour.  Les bâtiments furent agrandis par Etienne de Lataulade, époux de Jeanne Eyquem de Montaigne, nièce de lécrivain Michel de Montaigne. Au cours des siècles suivants, diverses restaurations, transformations, ajouts, suppressions, modifièrent laspect, les volumes extérieurs et lordonnancement intérieur de cette demeure à laquelle sont attachés de nombreux faits historiques de lhistoire locale.       BARIET, mais c'est surtout le Moyen-Âge qui a marqué le village. En effet, l'édification même du bourg date du XIIe siècle. Il est organisé en village-rue : les maisons sont alignées autour d'une rue principale fermée d'un côté par le château  celui qui est visible aujourd'hui date du XVIIIe-XIXe siècle, et de l'autre côté, par l'église. le château quadrangulaire avec un corps de logis en équerre à un niveaux et deux côtés, façade accolé d'une tour en angle.","habitants":"Famille de Jeannot de Lataulade\r\n        \r\n        \"","divers":"Château de Laballe grav 1, de  Lataulade grav 3 à 4,  43° 39' 19 nord, 0° 41' 37 ouest et celui de Poudenx  43° 39' 13 nord, 0° 41' 07 ouest, de Marquebièlle  et de Bariet à Brassempouy","gps":"","images":["../image/image_40/40_St_Cricq_Chalosse_1.jpg","../image/image_40/40_St_Cricq_Chalosse_2.jpg","../image/image_40/40_St_Cricq_Chalosse_3.jpg","../image/image_40/40_St_Cricq_Chalosse_4.jpg"]},"Consult_chateau_formulaireb062":{"id":"Consult_chateau_formulaireb062","dept":"40","canton":"Labrit","commune":"St-Justin","nom":"St_Justin","type":"Château","periode":"XII-XVII","histoire":"trois châteaux à St-Justin celui de Fondat,  le manoir de Laroque, et à 7 kilomètres au Sud-ouest à Lacquy le château de Boisesson.                                        FONDAT, le domaine est occupé dès le Moyen-Age par des seigneurs de la région. Le château, dévasté à deux reprises, est reconstruit au milieu du XVIIe siècle.   C'est en 1607, qu'une famille noble  du capitaine de Malatrie originaire de Marsan rachèta le domaine et le conserva jusqu'à la fin du XIXe siècle. Mr Lavielle d'Aspe propriétaire.                               LAROQUE  A été construit, selon la légende, par les Templiers eux-mêmes en 1152. Mais rien ne prouve que cet ordre religieux soit passé dans la région. Au XIIIe siècle, les hospitaliers de Saint-Jean de Jérusalem sy installent. Au début du XVIe siècle, le domaine appartient à Antoine de Niac, dit Guillery, personnage célèbre pour ses actes de brigandage, qui terrorise avec sa bande de quatre cents hommes, les environs de Saint-Justin. Il finit par être pendu sur la place de la ville en 1530. Puis en 1612, le capitaine Jehan de Malartic devient propriétaire du domaine de Laroque. Propriété du docteur Casaigne.","architecture":"FONDAT , dévasté à deux reprises, est reconstruit au milieu du XVIIe siècle. Il est remanié au XIXe siècle, dans un style néo-Renaissance. Le château est un des éléments d'un vaste ensemble constitué de dépendances de grande qualité : Un chai à armagnac construit au XVIe-XVIIe siècle, un colombier du XVIIe siècle, un grand pavillon, sous Henri V dépendant où uvraient les gens de maison. Au XIXe la façade est remaniée à l'image du château, une fontaine Médicis, un vivier du XVIIe siècle ou il sert de réserve de poisson, un parc aux arbres bicentenaires aux essences exotiques dont il reste des vestiges d'un ordonnancement remontant aussi au XVIIe siècle. Le château de Fondat est inscrit aux M.H. depuis 1999.    LAROQUE   De nos jours, le château est un domaine privé, isolé du centre de Saint-Justin, il subsiste encore la tour-donjon du XIIe siècle et des vestiges de mâchicoulis.","habitants":"Fondat, capitaine de Malatrie                                 Laroque Famille de Antoine de Niac\r\n        \"","divers":"Château de Fondat grav 2 à 4,  43° 59' 05 nord, 0° 11' 59 ouest, de Landiran grav 1 et le manoir d Laroque grav 5 et 6 est à 7 kilomètres au Sud-ouest à Lacquy le château de Boisesson grav 7.","gps":"","images":["../image/image_40/40_St_Justin_1.jpg","../image/image_40/40_St_Justin_2.jpg","../image/image_40/40_St_Justin_3.jpg","../image/image_40/40_St_Justin_4.jpg","../image/image_40/40_St_Justin_5.jpg","../image/image_40/40_St_Justin_6.jpg","../image/image_40/40_St_Justin_7.jpg","../image/image_40/40_St_Justin_8.jpg"]},"Consult_chateau_formulaireff45":{"id":"Consult_chateau_formulaireff45","dept":"40","canton":"Peyrehorade","commune":"Saint-Lon les Mines","nom":"St_Lon_Mines","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux à Saint-Lon les Mines celui de Monbet et celui de Prada   pas d'information historique pour ces deux  châteaux qui sont aujourd'hui tout deux chambres d'hôtes.                                                     MONBET, demeure datant du XVIIe siècle érigée sur un vaste domaine de 15 hectares,                               PRADA, demeure atypique des XVIII et XIXe siècles vous ouvre les portes de ses anciennes écuries pour l'organisation de toutes vos réceptions.","architecture":"Monbet de plan le domaine est composé outre du logis principal, de 23 métairies. La demeure actuelle a été construite ou reconstruite à la fin du XVIIIe siècle ou au début du XIXe siècle. \r\nPOUY existence d'une forteresse édifiée en ce lieu vers 1311 sans l'autorisation du roi d'Angleterre. Seigneurie des Bédorède jusqu'en 1712, ils en abandonnent la jouissance au profit des Lalande d'Olce. Henri de Lalande d'Olce en était propriétaire dans les années 1970. \r\nLARRART Le domaine actuel a été construit dans la première moitié du XIXe siècle comme le montre le cadastre de cette époque.                                       SOREY  Au Moyen Age, la seigneurie de Sorey était dans les mains de la famille de Bessabat par ailleurs seigneurs de Montauzer dans la même commune. Elle est encore liée à cette même seigneurie en 1784.","architecture":"LARRART, maison de maître : plan rectangulaire, moellons, enduit, un étage carré, un étage de comble avec lucarnes, élévation ordonnancée de 7 travées, toit à longs pans brisés couvert d'ardoise. Communs : plan rectangulaire, moellons, enduit, toit à longs pans couvert de tuile creuse, dominé par un pigeonnier dont le toit en pavillon est couvert de tuiles plates.        MONTAUZE, de plan rectangulaire, 1 étage carré, moellon enduit, toit à longs pans et croupe, tuiles creuses, élévation ordonnancée 5 travées, tour ronde sur le petit côté ouest.                                                    POUY, l'édifice est en ruine au XIXe siècle, il fait l'objet d'une importante restauration au début du XXe siècle. Les éléments les plus anciens de l'édifice actuel datent de la fin du Moyen-Age, corps de logis de plan rectangulaire régulier, élévation ordonnancée, fenêtres à meneaux surtout sur l'arrière de l'édifice, des quatre grosses tours seule reste trois tours circulaires dont 2 sont crénelées dans leur intégralité.                               SOREY, le bâtiment existe sur le cadastre du début du XIXe siècle. Edifice construit au XVIIe siècle pour le corps de logis élevé avec croisée pendante de lucarne. Et, extension à la fin du XVIIIe siècle ou au début du XIXe siècle pour le corps de logis en appentis. Plan rectangulaire, ensemble en moellon enduit,  corps de bâtiment à un étage carré et un étage en surcroît éclairé par une croisée pendante de lucarne, toit à longs pans et croupes. Et un corps de logis de 2 travées, toit en appentis.","habitants":"Montauze,  famille Bédorède                                 Pouy  Henri de Lalande d'Olce                                    Sorey, famille de Bessabat                         \r\n        \"","divers":"Château  de Montauzé grav 5,  43° 35' 29  nord, 1° 16' 32 ouest, de Pouy  grav fde 1 à 4,  43° 35' 16 nord, 1° 14' 56 ouest, de Larrart et la gentilhommière de Sorey à Saint-Martin d'Hinx","gps":"","images":["../image/image_40/40_St_Martin_Hinx_1.jpg","../image/image_40/40_St_Martin_Hinx_2.jpg","../image/image_40/40_St_Martin_Hinx_3.jpg","../image/image_40/40_St_Martin_Hinx_4.jpg","../image/image_40/40_St_Martin_Hinx_5.jpg","../image/image_40/40_St_Martin_Hinx_6.jpg","../image/image_40/40_St_Martin_Hinx_7.jpg"]},"Consult_chateau_formulaire38fc":{"id":"Consult_chateau_formulaire38fc","dept":"40","canton":"Peyrehorade","commune":"Pouillon","nom":"St_Martin_Pouillon","type":"Château","periode":"XIV","histoire":"Deux châteaux à St-Martin celui de St-Martin et celui de Lamothe.   ST-MARTIN,  En 1317, Pierre de St Martin reçoit du roi-duc lautorisation de « fortifier et dentourer dun fossé et dune palissade son lieu de St-Martin de Polhon », tandis que Lubaud de St-Martin est nommé bailli royal de Pouillon et Hastingues aux XIII-XIVe siècle la famille de St-Martin apparaît donc remarquable par la carrière que ses membres accomplissent au service du roi-duc et dans larmée anglo gasconne.  Au XVIe siècle, la famille se divise en deux branches : la branche aînée occupe le château, la branche cadette « de St-Martin Lacaze » et sallie avec la famille de Luppé en 1610 : Laurent-Etienne de St Martin Lacaze épouse Jeanne de Luppé-Lamothe.   En 1665, Fermy de St-Martin vend le château à son cousin Bertrand de Betbeder venu du pays de Gosse. En 1720, lors dune nouvelle vente, il passe entre les mains de la famille de Pémolié-St-Martin qui le conserve jusquà la fin du XIXe siècle. En 1780, les Pémolié sallient aux châtelains de Garanx à Pouillon : Louis-Marie de Pémolé Saint-Martin épouse Sophie-Saubade de Suhigaray ; leur fille, Félicité-Anne, épousera le comte dAbadie de Barrau. Louis-Marie Pémolié Saint Martin a été membre du corps législatif sous le 1er Empire. En 1878, Elisa de Pémolié Saint-Martin lègue par testament le château aux Lazaristes du Berceau de Saint-Vincent de Paul qui en font une maison de vacances pour leurs orphelins, avec piscine.  Après la deuxième guerre mondiale, il abrite un centre de formation de jeunes agriculteurs, aujourd'hui chambre d'hôtes","architecture":"Ensuite laissé à labandon jusquà ce que, en 1976, la famille Büsche en fasse lacquisition et consacre, avec laide de Pierre Décla tous ses efforts à la restauration de cette vaste demeure de 25 pièces, aménagée pour accueillir des hôtes de passage, y compris la chapelle transformée en appartement.\r\nLes bâtiments actuels datent, pour lessentiel, du XIXe siècle ; les caves voûtées en briquettes sont beaucoup plus anciennes (Renaissance) ; le mur sud-est conserve une fenêtre Renaissance ; le bel escalier dentrée, ainsi que certaines boiseries de lintérieur datent du XVIIe siècle.","habitants":"Famille de St Martin \r\n        \"","divers":"Château de St-Martin Pouillon 43° 37' 10 nord, 0° 59' 18 ouest et château de Lamothe  43° 36' 11 nord, 0° 59' 40 ouest grav  5","gps":"","images":["../image/image_40/40_St_Martin_Pouillon_1.jpg","../image/image_40/40_St_Martin_Pouillon_2.jpg","../image/image_40/40_St_Martin_Pouillon_3.jpg","../image/image_40/40_St_Martin_Pouillon_4.jpg","../image/image_40/40_St_Martin_Pouillon_5.jpg"]},"Consult_chateau_formulairea0af":{"id":"Consult_chateau_formulairea0af","dept":"40","canton":"St-Martin de Seignanx","commune":"St-Martin de Seignanx","nom":"St_Martin_Seignanx","type":"Château","periode":"XVI","histoire":"Plusieurs châteaux à St-Martin de Seignanx dont  celui de st-Martin de Seignanx, Vincennes propriété de Mr Merly, de l'Ermitage   et château Rouge.                    ST-MARTIN-SEIGNANS,   dit de Personnaz,  au  XVIe siècle, Saint-Martin est une baronnie. De grands travaux semblent avoir été entrepris en 1640 par le propriétaire de lépoque Bertrand de Saint-Martin et son épouse Marie de Lucmayours. La fille du couple se maria avec Jean-Baptiste-Alexandre de Oros. Sans descendance, le château revient  à la famille de Oros apparentée à Jean-Charles de Bordas. Le domaine resta finalement peu de temps aux mains des de Oro car il fut vendu le 5 novembre 1772 à la famille des Juliac-Pujole ; le propriétaire du château, lorsque la Révolution française éclata était donc Marie-Joseph de Juliac, par Jean de Saint-Martin, sénéchal des Landes. Au centre, disposé en équerre, un gros pavillon contient un escalier monumental, le domaine et tous les biens quil incluait fut confisqué au cours de la période révolutionnaires ; transmis ensuite à un marchand de biens, il fut acquis en 1804 par Arnaud Daguerres, un bourgeois bayonnais. En 1875, sa fille épousa Louis-Jean-Gabriel Personnaz, le château entra donc dans les possessions de la famille Personnaz et y acquis une variante de dénomination.  Le château est inscrit aux M.H. depuis le 5/10/1994.    VINCENNES  construit pour la famille Eglise propriété de Mr Merly","architecture":"Deux monuments inscrits au titre des M.H. sont situés sur le territoire communal : le château de Saint-Martin qui date de la fin du XVIe siècle et la villa Saint-Jean située sur la rive droite de l'Adour, est une maison du XXe siècle.                                                                     ST-MARTIN  reconstruit à partir de la fin du XVIe siècle du XVIIe et XIXe siècle, de style Renaissance, il conserve toutefois des traces de fortifications,  un corps de logis Ouest, flanqué de 2 tours, reconstruit vers 1600  vers 1650. Dans le prolongement, un ensemble de bâtiments joignant la tour Nord reconstituée à la fin du XIXe siècle. Le grand escalier avec son décor peint est l'une des réalisations les plus prestigieuses de l'architecture classique régionale. VINCENNES, quadrilatère sur soubassement  à deux niveaux avec série de lucarnes sur un toit encroupe flanqué aux angles de pavillon carré de trois niveaux  toit à quatre pans.                                                   ERMITAGE corps de logis central de plan rectangulaire à deux niveaux avec lucarnes sur un toit brisé accolé de deux pavillons carrés à trois niveaux toit à quatre pans                                                     CHATEAU-ROUGE racheté par Emmaüs   corps de logis en équerre à trois niveaux accolé   d'une tourelles toit en forme de cloches  et à l'opposée d'une tour cinq niveaux crénelée à mâchicoulis  et tour de guet sur la terrasse.","habitants":"Famille de Oros                                                         Famille Louis-Jean-Gabriel Personnaz          \r\n        \"","divers":"Château de st-Martin de Seignanx Grav 1 et 2,   43° 32' 51 nord, 1° 23' 21 ouest,     de  Vincennes grav 6, de l'Ermitage grav 5 et château rouge grav 3et 4. de Personnaz grav 8,  de  Lannes grav 9.","gps":"","images":["../image/image_40/40_St_Martin_Seignanx_1.jpg","../image/image_40/40_St_Martin_Seignanx_2.jpg","../image/image_40/40_St_Martin_Seignanx_3.jpg","../image/image_40/40_St_Martin_Seignanx_4.jpg","../image/image_40/40_St_Martin_Seignanx_5.jpg","../image/image_40/40_St_Martin_Seignanx_6.jpg","../image/image_40/40_St_Martin_Seignanx_7.jpg","../image/image_40/40_St_Martin_Seignanx_8.jpg","../image/image_40/40_St_Martin_Seignanx_9.jpg"]},"Consult_chateau_formulaire90ff-2":{"id":"Consult_chateau_formulaire90ff-2","dept":"40","canton":"Aire sur l","commune":"Saint-Maurice d","nom":"St_Maurice_Adour","type":"Château","periode":"XVIII-XIX","histoire":"La commune de Saint-Maurice-sur-Adour appelée simplement Saint-Maurice de 1793 à 1937 a pour origine une bastide fondée au XIIIe siècle par le roi Édouard II d'Angleterre.                                                   Trois châteaux à Saint-Maurice sur l'Adour celui de Saint-Maurice, de Lobit bâti au XVIIIe siècle, le château est flanqué de deux tours. La famille landaise de Lobit de Monval, descendante d'un maréchal de Camp, en est la fondatrice, et de Myredé","architecture":"Lobit,   bâti au XVIIIe siècle, le château de plan rectangulaire à deux niveaux accolés de retour en équerre sur les  flancs est flanqué de deux tours aux extrémitées.                                                                      Château de Saint-Maurice corps logis rectangulaire  à deux niveaux et attiques à neuf travées, celle du centre légèrement en saillies  avec fronton au niveau du toits brisé.                                                                  Myredé gentilhommière d'un niveau avec deux pavillons rectangulaires aux extrémitées.","habitants":"Famille de Lobit de Monval,\r\n        \"","divers":"Château de St-Maurice    43° 46' 56 nord, 0° 27' 48 ouest,  de Lobit grav 4,  43° 47' 33 nord, 0° 27' 43 ouest,  de Myredé grav 5.","gps":"","images":["../image/image_40/40_St_Maurice_Adour_1.jpg","../image/image_40/40_St_Maurice_Adour_2.jpg","../image/image_40/40_St_Maurice_Adour_3.jpg","../image/image_40/40_St_Maurice_Adour_4.jpg","../image/image_40/40_St_Maurice_Adour_5.jpg"]},"Consult_chateau_formulairea1ea":{"id":"Consult_chateau_formulairea1ea","dept":"40","canton":"Dax","commune":"Saint-Pandelon","nom":"St_Pandelon","type":"Château","periode":"XIV-XVII","histoire":"Cinq châteaux à Saint-Pandelon dit de Ducros, de Haubardin, de Herran, de Herculas et Laureta.           DUCROS,  au  XIVe siècle, l'évêque de Dax mgr Charles-Auguste. Le Quien de la Neufville en 1774  fait construire cette forteresse qui va devenir la résidence de campagne des évêques de Dax.  Vendu comme bien national en 1791, le château devient propriété de la famille Ducros. En 1966, le château est à nouveau vendu. Son acquéreur Jacques Subes va réaliser une remarquable restauration de l'édifice, en reconstituer l'histoire. A partir de fragments de tapisseries du XVIIIe, il parvient, avec son épouse, à reproduire des papiers à l'identique en utilisant les techniques anciennes de fabrication. L'atelier, installé dans le château, continue aujourd'hui encore, à produire des papiers peints destinés à la restauration des demeures historiques,  site classé depuis le 22 août 1973    HERCULAR pas d'information historique.\r\nHAUBARDIN, construit aux XVIIe et XVIIIe siècles. Il doit son nom à Haubardin de Luxembourg,  gouverneur de Dax du XVIe siècle, le château Haubardin nest édifié quà compter du siècle suivant. Il doit son nom à Haubardin de Luxembourg, gouverneur de Dax, au XVIe siècle.\r\nLAURETA, HERRAN  pas d'information historique pour ces deux derniers.","architecture":"St-PANDELON  dit de Ducros   Au travers des siècles, le bâtiment d'origine est agrandit, des annexes sont construites.                                                                      HAUBARDIN le château Haubardin nest édifié quà compter du siècle suivant. Les travaux de construction sétalent sur 2 siècles, pour sachever en 1764, le maçon ayant inscrit cette date dans le mortier du grenier.  La demeure se compose dun corps de logis, surmonté dun fronton triangulaire et encadré de deux tourelles dangle carrées. Les murs de pierre calcaire recouverte denduit blanc soutiennent une toiture de tuiles rouges. Quelques vestiges témoignent de la présence dun moulin à eau dans la propriété. On peut les voir dans le fossé, au bord de la route menant à Peyrehorade.                                                         HERCULAR, du XIII ou XIVe siècle,  remarquable par ses deux tours d'angle cylindriques coiffées de toitures en dôme. Le corps de logis s'accompagne, d'un côté, d'une grosse tour ronde et de l'autre côté d'une tourelle qui a conservé, au premier étage, une chambre de défense percée d'un oculus et de bouches à feu. Toutes deux ont conservé leur toiture originale en dôme à impériale et tuiles en écailles, caractéristiques du bas Adour et des Gaves.                                       LAURETA  qui contient des boiseries du XVIIIe siècle.","habitants":"Famille Ducros\r\n        \r\n        \"","divers":"Château de Saint-Pandelon dit de Ducros grav de 1 à 6, de Hahbardin grav 7, de Herran, de Herculas   43° 40' 16 nord, 1° 01' 57 ouest     et Laureta.","gps":"","images":["../image/image_40/40_St_Pandelon_1.jpg","../image/image_40/40_St_Pandelon_2.jpg","../image/image_40/40_St_Pandelon_3.jpg","../image/image_40/40_St_Pandelon_4.jpg","../image/image_40/40_St_Pandelon_5.jpg","../image/image_40/40_St_Pandelon_6.jpg","../image/image_40/40_St_Pandelon_7.jpg"]},"Consult_chateau_formulaire0f18-2":{"id":"Consult_chateau_formulaire0f18-2","dept":"40","canton":"St-Vincent-de-Tyrosse","commune":"Sainte Marie de Gosse","nom":"Ste_Marie_Gosse","type":"Château","periode":"XVII","histoire":"Trois châteaux à Ste-Marie de Gosse, celui d'Aranguiche, de Bordus et de Routger.\r\nBordus chambres d'hôtes de  Priscilla Simonetti, château de Bordus se pare de ses habits de lumière une fois la nuit tombée, pour vous offrir un décor de la plus grande qualité.","architecture":"ARAGUICHE; de plan en U à deux niveaux toit en croupe recouvert de tuiles.                                          BORDUS, corps de logis de plan  rectangulaire à deux niveaux et attique dans le fronton triangulaire côté jardin et à l'opposé deux tours carrées aux deux angles toit à quatre pans.                             ROUTGER, manoir à deux niveaux, toit en croupes, flanqué de tourelles aux angles toits en poivrières.","habitants":"Priscilla Simonetti \r\n        \"","divers":"à Sainte-Marie-de-Gosse : le château d'Aranguiche, le château de Bordus grav 1 à 3,   43° 32' 55 nord, 1° 14' 29 ouest et le château de Routger grav 5.","gps":"","images":["../image/image_40/40_Ste_Marie_Gosse_1.jpg","../image/image_40/40_Ste_Marie_Gosse_2.jpg","../image/image_40/40_Ste_Marie_Gosse_3.jpg","../image/image_40/40_Ste_Marie_Gosse_4.jpg","../image/image_40/40_Ste_Marie_Gosse_5.jpg"]},"Consult_chateau_formulaire0514":{"id":"Consult_chateau_formulaire0514","dept":"40","canton":"Tartas","commune":"Tartas","nom":"Tartas","type":"Manoir","periode":"XVI-XVIII","histoire":"TARTAS, à partir de la fin du Xe siècle, la ville est administrée par les vicomtes de Tartas qui se succèdent jusqu'au début du XIVe siècle. Par le mariage de la fille  du dernier vicomte de Tartas et de Dax, avec Amanieu V, sire d'Albret, de la maison d'Albret, firent passer les titres des deux vicomtés  dans leur maison.\r\nLe siège et la prise de Tartas ont lieu en 1338. On les doit au comte de Foix sous la bannière de Philippe VI de France. Le voyage de Tartas en juin 1442 est une expédition menée par Charles VII de France accompagné du dauphin pour délivrer la ville assiégée par les anglais. Charles II d'Albret qui défendait cette place avait conclu avec les anglais de la leur céder si le secours de Charles VII n'était pas arrivé le 24 juin 1442. Le roi arriva à temps et l'expédition fut une réussite (ce fut une démonstration de force à laquelle participèrent de nombreux princes du royaume de France).  Du 27 au 31 janvier 1502, Philippe Ier de Castille-Habsbourg (dit Philippe le Beau) et sa femme Jeanne Ire de Castille (dite Jeanne la Folle), qui voyagent de Bruxelles à Tolède, séjournent à Tartas, bloqués par la crue de la Midouze.","architecture":"La ville haute fut jadis le siège du château, les restes du fort, une très ancienne rue ville haute, quelques maisons rive gauche. Présence d'un ancien cloître, de vieux bâtiments divisés en cellules, remparts et fortifications. Deux petit manoir dont celui de Jeanne d'Albret du XVe siècle. Les deux dans le même style à deux niveaux  avec des toitures à l'impérial avec lucarnes.","habitants":"Charles II d'Albret \r\n        \"","divers":"Maison d' Albret grav 2 et manoir à Tartas","gps":"","images":["../image/image_40/40_Tartas_1.jpg","../image/image_40/40_Tartas_2.jpg"]},"Consult_chateau_formulaire3f44":{"id":"Consult_chateau_formulaire3f44","dept":"40","canton":"Mimizan","commune":"St-Paul en Born","nom":"Tuc_de_Houns","type":"Maison forte","periode":"XVIII","histoire":"Le Tuc de Houns, est le dernier vestige d'une motte castrale, qui date de 1255. Son propriétaire initial était Pierre de Homs. Aux XIe et XIIe siècles, il se situait à quelques centaines de mètres de l'ancien village de Saint-Paul, nommé Ségosa. Pierre de Homs (Pedro de Hon), y fit édifier une maison forte, en 1255, par concession du roi Henri III d'Angleterre pour défendre le confluent de 2 rivières : le ruisseau des Forges et le ruisseau d'Escource, près de l'étang d'Aureilhan. La motte castrale ou château à motte est une fortification médiévale, préfigurant les châteaux forts, formée par une butte de terre édifiée par l'homme et un système défensif plus ou moins complexe (fossé, levée de terre, palissade). Son édification repose toujours sur l'utilisation de matériaux locaux et d'une main-d'uvre nombreuse mais sans qualification particulière, à la différence des forteresses en pierre.","architecture":"Les Tucs de Houns sont ce qui reste des mottes féodales construites au XIIIe siècle par Petro de Hon, homme darmes du roi dAngleterre. Cet ouvrage bâti en argile et blocs de pierre était entouré de fossés remplis deau, et se trouvait au confluent des deux rivières l'Escource et le Canteloup.","habitants":"Petro de Hon\r\n        \"","divers":"Château de Tuc de Houns  44° 13' 59 nord, 1° 10' 53 ouest","gps":"","images":["../image/image_40/40_Tuc_de_Houns_1.jpg"]},"Consult_chateau_formulaire8d85":{"id":"Consult_chateau_formulaire8d85","dept":"40","canton":"Mimizan","commune":"Uza","nom":"Uza","type":"château","periode":"XVI","histoire":"UZA, le château fut la propriété d'Eugène de Lur-Saluces,  dont le nom est associé au site d'Uza depuis le XVe siècle, semble avoir construit pendant l'occupation anglaise en Aquitaine. François 1er de Montferrand avait épousé Jouyne de Pommiers qui lui apporta, entre autres dans la corbeille de mariage les terres d'Uza. Sa petite fille Isabeau épouse Pierre II de Lur en 1472. L'histoire se confond alors avec celle de la famille.  Le remaniement du château vers 1618 pourrait s'expliquer par la position de Jean II de Lur qui était conseiller du Roi en ses conseils d'état et privé, gentilhomme ordinaire de la chambre et capitaine du Châteauneuf de Bayonne. Le château d'Uza se trouve sur une mothe artificielle où se dressait au Moyen-âge une forteresse bâtie pour la puissante famille de Montferrand, forteresse à laquelle les Lur-Saluces qui l'avaient héritée substituèrent une grande demeure aux XVIIe et XIXe siècles, à un étage et pavillon central, de plan quadrangulaire et cantonnée de tours.\r\nIl fait lobjet dune inscription au titre des M.H.depuis le 3 mai 20041.","architecture":"Vers 1765, le château était une bâtisse symétrique à simple rez-de-chaussée flanquée de deux tours, posée sur sa butte, reliée par un pont de bois à une cour des communs côté sud et un jardin de parterre côté nord.\r\nLe château est remanié vers 1861. Il est surélevé d'un premier étage et d'un second étage partiel sous combles et coiffé de couvertures en ardoise.  C'est une transformation radicale, simplifiant le volume par l'adjonction d'un deuxième étage et remplaçant les différentes couvertures par une terrasse unifiant l'ensemble. Une terrasse couverte en arcades en plein centre reposant sur des colonnes massives est ajoutée en façade orientale. Pour réédifier sa demeure le marquis Bertrand de Lur-Saluces fait appel en 1929 au jeune architecte landais Jean Prunetti qui collabore alors avec Granet pour la construction de l'hôtel Splendid de Dax. Il conserve le plan du vieux château mais ajoute un étage carré et remplace les anciennes toitures à croupes ou coniques par une unique terrasse. Du côté de la façade principale il édifie entre les tours une galerie au rez-de-chaussée supportant un large balcon à l'étage noble, le pavillon central est quant à lui rattaché aux tours par des loggias que soutiennent des paires de colonnes cannelées.","habitants":"Famille de Montferrand\r\n        \r\n        \"","divers":"Château d'Uza  44° 02' 09 nord, 0° 12' 06 ouest","gps":"","images":["../image/image_40/40_Uza_1.jpg"]},"Consult_chateau_formulaire5625":{"id":"Consult_chateau_formulaire5625","dept":"40","canton":"Aire sur l","commune":"le Vignau","nom":"Vignau","type":"Château","periode":"XIX","histoire":"La construction du château du Vignau date du XIIe siècle il est une propriété privée, construit au XIIe siècle, il appartient à la famille de Monlezun avant de changer plusieurs fois de propriétaires. En 1812, il est vendu à la famille du comte de Dampierre, qui le garde jusqu'au XIXe siècle. Il est ensuite racheté par des anglais, qui lui rajoutent des ailes de chaque côté,","architecture":"Le domaine du Vignau,   vers le haut du domaine (15-20 m au-dessus du ruisseau, aux alentours de 100 mètres d'altitude), et près de l'entrée se situe un château orienté vers le sud et derrière, côté nord, des bâtiments. Au fil des siècles,le château du Vignau est menacé,le manque d'enretien, l'abandon; les intempéries menacent ce patrimoine.","habitants":"Famille de Monlezun\r\n        \"","divers":"Château de Vignau  43° 46' 43 nord, 0° 17' 35 ouest","gps":"","images":["../image/image_40/40_Vignau_1.jpg","../image/image_40/40_Vignau_2.jpg","../image/image_40/40_Vignau_3.jpg"]},"Consult_chateau_formulaire0f6e":{"id":"Consult_chateau_formulaire0f6e","dept":"40","canton":"Peyrehorade","commune":"Tilh","nom":"Villandraut","type":"Château","periode":"XVII","histoire":"VILLANDRAUT-TILH, la seigneurie de Tilh appartenait encore au XVIIIe siècle, au moment de la Révolution, au duc de Gramont est édifié sur linitiative du sieur de Saint-Christau, chevalier de Saint-Louis.  Au XIXe siècle le général Bernard Augustin de Cardenau fut fait baron dEmpire en 1812 et fut député des Landes en 1818, enfin le chevalier de Saint-Christau hérita du château de Villandraut au XVIIIe siècle. Il appartient aujourdhui à la famille Champetier de Ribes.","architecture":"Le vaste château de Villandraut, construit au XVIIIe siècle, il subsiste du château féodal les bases de lancien donjon transformé en clocher de léglise, la nef latérale droite de léglise, ancienne chapelle du château et la maison Lassalle, ancienne salle darmes. Le bouche à oreille qui a traversé les siècles fait état dun hypothétique souterrain allant de la maison Lassalle au lieudit « Gramont » à Ossages, mais son existence nest pas avérée est édifié sur linitiative du sieur de Saint-Christau, chevalier de Saint-Louis, durant le troisième quart du XVIIIe siècle. Le bâtiment est dailleurs également appelé château Saint-Christau. Imposante, la demeure à laquelle sont accolées un corps de bâtiment de neuf travées dont trois travées  centrales formant un avant corps couronnée d'un fronton triangulaire et un logis plus anciens, est protégée par un imposant portail. Ses deux façades semblables sétendent sur deux niveaux et sur des combles en attiques, chaque étage étant percé de neuf fenêtres. À lintérieur de la demeure, la décoration dorigine est conservée, notamment les parquets et les boiseries. Le château situé sur une crête, ses deux façades offrent une vue imprenable. les caveries en massif barlong flanqué d'une tour carré d'escalier en hors oeuvre présente des meurtrières.","habitants":"Duc de Gramont \r\n        \"","divers":"Château de Villandraut 43° 34' 34 nord, 0° 51' 07 ouest","gps":"","images":["../image/image_40/40_Villandraut_1.jpg","../image/image_40/40_Villandraut_2.jpg","../image/image_40/40_Villandraut_3.jpg","../image/image_40/40_Villandraut_4.jpg"]},"Consult_chateau_formulaireb9e7":{"id":"Consult_chateau_formulaireb9e7","dept":"40","canton":"Mimizan","commune":"Mimizan","nom":"Woolsack","type":"Château","periode":"XIX","histoire":"WOOLSACK, est un château bâti à Mimizan, a été créé en 1910, par  sir Hugh Richard Arthur Grosvernor,  duc de Westminster, né en 1879, est issu d'une des familles les plus riches et prestigieuses de Grande-Bretagne. Il est réputé être l'homme le plus riche d'Angleterre. Le jeune aristocrate devient bientôt le gentleman le plus brillant du Royaume-Uni grâce à ses réceptions fastueuses, ses grandes chasses et ses voyages. Il est aussi connu pour sa production d'Armagnac. Depuis, le château de Woolsack est devenu une résidence privée qui a été rachetée, par des particuliers et qui est fermée au public. De nouvelles troupes allemandes arrivent dès le lendemain, 10 mars 1941. Après le retrait définitif des troupes allemandes de Mimizan le 24 août 1944, la demeure est rendue à son propriétaire.\r\nLe 7 février 1947, le duc épouse en quatrième noce Anne Nancy Winifred Sullivan. Alors que le jeune couple s'apprête à venir en lune de miel à Woolsack, le pavillon prend feu dans la nuit du 23 février 1947 et brûle en grande partie. Une fois avant son décès survenu en 1953, le duc reviendra à Woolsack pour décider de la vente de sa propriété. Restauré par M. Sargos, le château devient dans les années 1980 la propriété du groupe Gascogne qui le destine à des séminaires et réceptions. Il est aujourd'hui propriété privée.  Cette demeure connue, depuis sa construction, la visite de nombreuses personnalités de notoriété mondiale, telles que : Sir Winston Churchill, Charlie Chaplin, Coco Chanel, LLoyd George, Alphonse XIII ou encore Salvador Dali.","architecture":"Woolsack, ce n'est  en réalité qu'un vaste chalet de style Tudor édifié en 1910  peu après cette première visite, le duc fait l'acquisition d'une surface boisée de plus de 10 hectares sur les berges du lac d'Aureilhan pour y construire un pavillon de chasse. Celui-ci lui est offert par la couronne britannique, en reconnaissance du courage dont il a fait preuve pendant la seconde guerre des Boers et pour le service rendu.\r\nLes travaux de construction débutent dès 1911. Les architectes Detmar Blow et Fernand Billerey suivent les plans réalisés par sir Herbert Baker pour la propriété « Woolsack » en Afrique du Sud, bâtie par Cécil Rhodes pour le compte de Rudyard Kipling, et qui inspirera également le nom de la propriété mimizannaise. Quadrilataire à deux niveaux avec série de lucarnes pavillon d'entrée à pignon ondulé avec oeil de boeuf central.","habitants":"sir Hugh Richard Arthur Grosvernor\r\n        \"","divers":"Château de Woolsack  44° 13' 35 nord, 1° 13' 11 ouest    à Mimizan","gps":"","images":["../image/image_40/40_Woolsack_1.jpg","../image/image_40/40_Woolsack_2.jpg","../image/image_40/40_Woolsack_3.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','40 — Landes'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
