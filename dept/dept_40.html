es et à un seul pan incliné, l'ensemble recouvert de tuiles","habitants":"Famille des Lescuns\r\n        \"","divers":"Château de Coudures  et de Fournier grav 2 et d'Aubagnan grav 3","gps":"","images":["../image/image_40/40_Coudures_1.jpg","../image/image_40/40_Coudures_2.jpg","../image/image_40/40_Coudures_3.jpg"]},"Consult_chateau_formulaire9190-2":{"id":"Consult_chateau_formulaire9190-2","dept":"40","canton":"Dax","commune":"Dax","nom":"Dax","type":"Patrimoine","periode":"XVI-XVIII","histoire":"DAX, au XIIe siècle envahit  par les Anglais  et les Français en 1442, et les Espagnols attaquent la riche ville fortifiée. Mais les remparts semblent indestructibles. En 1569, les protestants attaquent la ville, sans succès. A partir de 1648 et jusqu'à 1653, La fronde divise le Royaume. Les villes sont attaquées. En 1652, Dax résiste à plusieurs assauts. En 1660, les remparts sont construit sur ordre du Roi de France Louis XIV, l'infante Marie Thérèse et Anne d'Autriche. A la fin du XIXe siècle, les nobles des communes de France veulent supprimer les traces du passé pour aller vers le futur. Cela consiste à détruire fortifications et remparts. Déclassé et désaffecté, le château est rendu en 1888 à la ville, qui le cède à la Société de Dax-Salins-Thermal pour être finalement rasé en 1891 et remplacé par un casino et un luxueux établissement thermal qui est ravagé par un incendie en 1925. C'est sur ses ruines qu'est construit un splendide hôtel que l'on voit aujourd'hui.                                                    ST-PAUL-les-Dax  bien que les rois successifs Henri IV, Louis XIII ou Louis XIV aient apprécié la fidélité et les qualités guerrières des habitants, ils ont laissé peu de témoignages de leur générosité se contentant pour traverser le village de remettre en état les routes leur permettant de se rendre en Espagne. La commune de Saint-Paul naît avec la Révolution. Le 8 février 1790, elle obtient enfin son identité et devient indépendante sous le nom de Saint-Paul-lès-Dax en 1792. Le vaste territoire communal que doit gérer la nouvelle municipalité sera lobjet de convoitises de tous ses voisins, en particulier Dax qui a perdu  la majeure partie de son domaine agricole. Au cours de la période de la convention nationale (1792-1795), la commune porta le nom révolutionnaire de Bonnet-Rouge.","architecture":"Dax  château fort contrôlait le passage de lAdour et son pont fortifié et commandait lentrée  située à lépoque médiévale à une nouvelle porte dite Notre-Dame sur le rempart ouest, entre les deux grosses tours gallo-romaines.  Dans Les remparts absence de fente de tir, manque de crénelage, non présence de mâchicoulis ou bretèche, une telle fortification, construite il y a plus de 15 siècles est un trésor.   Les tours rondes sont nombreuses (Il y en aurait eu entre 38 à 49 suivant les historiens) disposées sur un quadrilatère irrégulier, de dimensions : 330m  x  445m  x  280m  x  410m. La hauteur des murs atteignaient parfois plus de 11 m et l'épaisseur variaient entre 2 à 4m.  Au XIVe siècle, un château fort est construit à l'angle Nord-Ouest.   Mais qui se souvient que jusqu'à à la fin du XIXe siècle, cet emplacement était occupé par un vieux château dont l'origine remonterait à la fin du XIIe ou au début du XIIIe siècle.                               Les châteaux de Saint-Paul de Dax de styles différents,  pas d'informations historiques.","habitants":"Seigneurs locaux\r\n        \"","divers":"Patrimoine de Dax, les remparts, le château, la fontaine, le château de Meysonnave grav 6 et autre châteaux sur saint Paul les Dax.","gps":"","images":["../image/image_40/40_Dax_1.jpg","../image/image_40/40_Dax_2.jpg","../image/image_40/40_Dax_3.jpg","../image/image_40/40_Dax_4.jpg","../image/image_40/40_Dax_5.jpg","../image/image_40/40_Dax_6.jpg","../image/image_40/40_Dax_7.jpg","../image/image_40/40_Dax_8.jpg","../image/image_40/40_Dax_9.jpg"]},"Consult_chateau_formulairedad5":{"id":"Consult_chateau_formulairedad5","dept":"40","canton":"Hagetmau","commune":"Aurice","nom":"Estignols","type":"Château","periode":"XVII","histoire":"ESTIGNOLS, Patrick Spens  descendant d'un officier de gardes écossaises vers 1460  avait épousé à Saint-Sever la fille du seigneur d'Estignols qui ces derniers commit l'erreur d'embrasser contre  le parti du prince de Condé Louis XIII  fit brulé le château en châtiment de cette rebellion, mais il le fit rebâtir au XVIIe siècle. Le baron et homme de lettres (La nuit des longs museaux) Willy de Spens, a vécu  dans son château de 1911-1989.  Il possède un parc remarquable aux essences rares. Le château d'Estignols est inscrit aux M.H. depuis 14 février 1978","architecture":"le château, qui fut rebâti par la suite au XVIIe siècle de plan rectangulaire sur un étage , curieux par son observatoire à oculi, ses encadrements et ses chaînages en briques rouges sur les façades    La façade est rythmée dencadrements verticaux de briques rouges soulignant chaque travée de fenêtre. Un observatoire à trois travées dil de buf, surmonté de décor de génoises, émerge de la toiture à la façon des demeures anglaises.  Etabli sur des caves voûtées, La décoration de l'ensemble est réalisée par des chaînages et pilastres en briques qui quadrillent les façades. Des arcatures en plein cintre marquent les parties centrales importantes. Au nord-ouest sont établis de vastes communs qu'il faut traverser pour découvrir une ancienne galerie à pans de bois. Subsiste la bergerie aux murs en pisé, ainsi qu'un poulaillier-pigeonnier en pans de bois et toiture en écailles de poissons.","habitants":"Famille de Patrick Spens\r\n        \"","divers":"Château d'Estignols à Aurice","gps":"","images":["../image/image_40/40_Estignols_1.jpg"]},"Consult_chateau_formulairea160":{"id":"Consult_chateau_formulairea160","dept":"40","canton":"Peyrehorade","commune":"Hastingues","nom":"Estrac","type":"Château","periode":"XIII-XV","histoire":"ESTRAC, le château est situé au cur d'une bastide du XIVe siècle qui domine la vallée des Gaves Réunis. Le château « Bayle Vieux » est achevé par John de Hastings (1347-1375)  Le château fut acheté par Bayonne et fut rasé. En 1407, Bayle Vieux est reconstruit.  En 1500, le château Bayle Vieux existe encore dans toute sa splendeur.    Bertrand Destrac est anobli en 1661 par Louis XIV. Ecuyer, il est secrétaire du Roi, conseiller et secrétaire de la couronne de Navarre, également secrétaire du duc de Gramont Antoine II de Gramont (1572-1644), comte de Gramont, de Guiche et de Toulonjon,  vicomte puis comte de Louvigny, \"souverain de Bidache\". Le duc de Gramont layant nommé Juge Royal dHastingues.   Le château reste propriété de la famille dEstrac jusquen 1792 pour être acheté par Marie-France Deville veuve Clérisse après avoir négocié pendant trois ans avec M. Bachelier dAgés, dont lépouse était héritière de la famille dEstrac.    Les Clérisse sont une famille de négociants en laine installée depuis le XVIIe siècle à Oloron. Pierre Clérisse, a établi, au début du XVIIIe siècle, un commerce avec St-Domingue, où son fils séjournera pendant 35 ans. , Le château est acheté par un danois qui laurait vidé. Le château est propriété du couple Dürr, de nationalité allemande, de 1980 à 2015.    De nouveaux propriétaires sen portent acquéreur en 2016 . Le château d'Astrac est classé aux M.H. depuis le 9/07/1942.","architecture":"HASTINGUES,  petite bastide, elle a été fondée en 1289 par John Hastings, de qui elle tire son nom, doit sa fondation au contrat de paréage signé le 21 février 1289 entre Édouard Ier d'Angleterre duc dAquitaine, et les moines de labbaye d'Arthous. Portes d'Hastingues, du XVe siècle, le site a conservé son plan général, un vestige de fossé, ses fortifications, sa porte inscrite dans une grosse tour rectangulaire qui donne accès à la rue principale, bordée par de grandes maisons de caractère : cette porte en moyen appareil jusqu'aux archères, en moellons au deuxième niveau couronné par des consoles à triple ressaut en quart de rond, est marquée par un passage voûté en berceau brisé, des remparts des fraguements de murs côté nord de la tour, son entrée est encadrée par une grande dépendance. Le bâtiment principal de 1000m² est un gros parallélépipède, doù déborde une fine aile à lEst, cette aile, rajout de 1810 permet de créer une façade imposante sur les gaves réunis en doublant sa longueur initiale du château primitif. La façade principale, au nord, souvre sur un jardin terrasse qui surplombe le port et la vallée. Sa construction date du XIVe au XIXe siècle jouit dune position privilégiée à Hastingues, ils entreprennent de gros travaux sur les couvertures, et sauvent le château dune invasion de termites. Ils entreprennent une activité touristique et transforment une partie du château en 5 appartements indépendants, avec une cuisine et une salle deau, à la manière de pièces en enfilades, quils nomment Bordeaux, Béarn, Irouleguy, Madiran et Jurançon. Le parc est équipé dune piscine deau salée à électrolyse.","habitants":"Famille DEstrac \r\n        \"","divers":"Château d'Estrac 43° 32' 06 nord, 1° 08' 56 ouest et porte de la Bastide","gps":"","images":["../image/image_40/40_Estrac_1.jpg","../image/image_40/40_Estrac_2.jpg","../image/image_40/40_Estrac_3.jpg","../image/image_40/40_Estrac_4.jpg","../image/image_40/40_Estrac_5.jpg","../image/image_40/40_Estrac_6.jpg"]},"Consult_chateau_formulairee213":{"id":"Consult_chateau_formulairee213","dept":"40","canton":"Labrit","commune":"Gabarret-Escalans","nom":"Gabarret","type":"Château","periode":"XVIII","histoire":"Trois châteaux Gabarret, château-Rouge, Milleton  et Loustauneau pas d'information pour ce dernier et  sur Escalans  Buros, Jourdan et Caumale (voir article)  et Terrade.                                                                           BUROS  transformé en  hôtel restaurant   doté d'une piscine extérieure, d'un court de tennis, le château de Buros est situé à Gabarret.                                TERRADE, c'est au cours d'une entreprise de restauration menée par les actuels propriétaires, monsieur Ronald et madame Danièle Neill, qu'une fresque enbon état de conservation est apparue sur le mur d'une chambre haute du château.               MILLETONS, il existe en Gascogne, et plus précisément en pays d'Armagnac, un petit château tout simple caché au milieu d'un grand parc, au calme, au frais, au vert, chambre d'hôtes.                                    De LABES dit château Rouge, est un château bâti à Gabarret, a enfin eu un château néo-classique, celui d'Estoua, construit en 1890 mais qui n'a jamais été habité pendant les 125 ans qui suivirent. Deux frères jumeaux de la maison Dubarry de la Salle, famille toulousaine de juristes, l'ont commandé à un architecte célèbre à l'époque, René Sergent. On lui doit en effet deux grands hôtels londoniens, le Claridge et le Savoy. Ses deux commanditaires disparaissant à Verdun (1915) n'en profiteront pas.","architecture":"DUROS,  possède un corps de logis rectangulaire à deux étages sur soubassement lucarnes sur toit en croupe recouvert d'ardoises, l'édifice est accolée aux  angles côtés Est et Ouest de tours héxagonnales à toit en poivrières et en dôme avec clochetons  sur la tour côté ouest et échauguette en encorbellement sur la façade côté Ouest, sur la façade plein cintre un pavillon saillant à fronton triangulaire avec fenêtres jumelées au niveau du toit, l'édifice  est prolongé côté ouest d'un corps de dépendance relié à un autre corps en retour d'équerre avec tour carré  d'angle.              De LABES dit château Rouge, est un château bâti à Gabarret, a enfin eu un château néo-classique, celui d'Estoua, A l'origine il se compose d'un vaste corps de bâtiment en équerre deux tours cylindriques identiques  à toit en dôme le flanquait. Il est abandonné jusqu'en 1990,  aujourd'hui occupé par une association des amis des handicapés psychiques.","habitants":"Monsieur Ronald                                                      Maison Dubarry de la Salle\r\n        \"","divers":"Château de Buros,de Loustaunou grav 7 , de Milleton 43° 58' 50 nord, 0° 00' 29 ouest grav 8, de Terrade grav 9 et de Labés  à Gabarret-Escalans","gps":"","images":["../image/image_40/40_Gabarret_1.jpg","../image/image_40/40_Gabarret_2.jpg","../image/image_40/40_Gabarret_3.jpg","../image/image_40/40_Gabarret_4.jpg","../image/image_40/40_Gabarret_5.jpg","../image/image_40/40_Gabarret_6.jpg","../image/image_40/40_Gabarret_7.jpg","../image/image_40/40_Gabarret_8.jpg","../image/image_40/40_Gabarret_9.jpg"]},"Consult_chateau_formulairee4e0":{"id":"Consult_chateau_formulairee4e0","dept":"40","canton":"Montfort en Chalosse","commune":"Gamarde les Bains","nom":"Gamarde","type":"Château","periode":"XVIII","histoire":"Cinq châteaux à Gamarde les bains le chateau de Behr, de Hon, de Lousteau,de soustra et du Rau (voir article)                                                                              BEHR, la lumineuse façade du château de Behr contribue, au XIXe siècle, à afficher la fortune nouvellement acquise dune famille bourgeoise de la région. Ce château  porte le nom de Charles-Louis de Behr, qui en fait lacquisition au XIXe siècle. Maire de Gamarde à partir de 1844, celui-ci est également conseiller général et membre de la Légion dHonneur. Le manoir reste dans sa famille jusquau début du XXe siècle, où il est transmis à la famille de Pinsun par un mariage.\r\nHON, date du XVIe siècle,   propriété depuis 1993 de M. et Mme Jossberger-Kiehn, lélégant château  a fait lobjet dune étude détaillée. Ce bel exemple du patrimoine gamardais na bien entendu pas échappé à lil expert du maquettiste René Ollivier dont la perfection du travail est désormais légendaire.              SOUSTRA, elle est construite par le baron de Behr est au siècle suivant la maison natale dun curé de Gamarde réfractaire à la Révolution.  Il est connu pour être la maison natale de M.  de Soustra, qui y voit le jour le 26 octobre 1730. Ce professeur au collège de Dax est curé de Gamarde à partir de 1764 et jusquen 1792, année où il senfuit en Espagne comme réfractaire. Il refuse en effet de prêter serment à la constitution civile du clergé votée par la première assemblée constituante française.","architecture":"BEHR, sur plan architectural, il est caractéristique des hôtels particuliers du XVIIIe siècle construits dans un style néo-classique, simple rectangulaire sélève sur trois niveaux, son élégante façade principale, dont les baies sont séparées par des pilastres décorés, est également mise en valeur par une porte dentrée abritée sous un porche à colonnettes.                           HON   de plan rectangulaire  à deux niveaux avec série de lucarnes sur les toits côté grandes façades flanqué sur angles droit d'une tour carrée à trois niveaux à toit pointu et l'ensemble recouvert d'ardoise.  LEUSSEIGNAC,  bâtisse rectangulaire dans le style  de Soustra, le corps de logis à un niveau  flanqué d'un pavillon carré à deux étages toit en croupe recouvert de tuiles.                                                                    LOUSTAU,  de plan en U à deux niveaux et attiques, toits en croupes recouvert de tuiles.                          SOUSTRA , belle demeure de pierre construite au XVIIe siècle, abrite une belle cheminée antique en pierre, est ainsi une ancienne caverie du XVIIe siècle. La demeure est réalisée en pierre et se compose dun corps de logis rectangulaire, flanqué dune tour carrée sur lun de ses côtés, celle-ci, auparavant crénelée, est plus récente que le reste de la demeure, le château de Soustra abrite une belle cheminée antique en pierre.","habitants":"Charles-Louis de Behr                                                    Hon, M. et Mme Jossberger-Kiehn                              M.  de Soustra        \r\n        \r\n        \"","divers":"Le château  de Behr grav 1 à 3, de Hon  43° 44' 02 nord, 0° 51' 23 ouest grav 6, de Lausseignac grav 4 de Lousteau grav 5 et de Soustra Grav de 7 à 9  à Gamarde les Bains","gps":"","images":["../image/image_40/40_Gamarde_1.jpg","../image/image_40/40_Gamarde_2.jpg","../image/image_40/40_Gamarde_3.jpg","../image/image_40/40_Gamarde_4.jpg","../image/image_40/40_Gamarde_5.jpg","../image/image_40/40_Gamarde_6.jpg","../image/image_40/40_Gamarde_7.jpg","../image/image_40/40_Gamarde_8.jpg","../image/image_40/40_Gamarde_9.jpg"]},"Consult_chateau_formulaireb183":{"id":"Consult_chateau_formulaireb183","dept":"40","canton":"Peyrehorade","commune":"Bélus","nom":"Gardera_Caverie","type":"Château","periode":"XVII","histoire":"GARDERA, lieu défensif exemplaire pendant des siècles, Au XVIIIe siècle, elle est rebaptisée château de Gardera selon le nom de nouveaux propriétaires.  Mentionnée en 1343, la caverie de Villenave est dorigine très ancienne devient ensuite une résidence dagrément.  Il sagit dun site militaire destiné à protéger la population du domaine de possibles attaques ennemies. Située sur un éperon rocheux, la caverie constitue effectivement un très bon site défensif.   En 1540, le château est vendu par Pierre Labadie à Bertrand de Six, qui ne le conserve que très peu de temps : dès 1562, la caverie est cédée à Jean de Saint-Martin. En 1671, on sait quelle appartient à Bernard de Lacomère.  Cest à ce dernier quest attribué lédifice actuel.   Au XVIIIe siècle, la famille Gardera acquiert la propriété, qui prend alors le nom de château de Gardera, cest de cette époque que date le grand salon décoré de lambris.","architecture":"Gardera Construit au XVIIe siècle sur un plan rectangulaire, il comprend une salle en retour déquerre sur son élévation sud. Au nord sétend une cour darrivée. Un jardin complète le domaine. Caverie de Villenave mentionnée en 1343. Construction de l'édifice actuel sans doute dans le premier quart du XVIIe siècle, porte d'entrée Est, cage d'escalier, élévation postérieure. Aménagements au XVIIIe siècle, salon central décoré dans la première moitié du siècle et au XIXe siècle ouvertures suppression d'un petit corps contre l'élévation antérieure. Logis de plan rectangulaire avec une aile en retour d'équerre sur l'élévation sud ; cour d'arrivée au nord et jardin en terrasse au sud.  Eléments protégés MH : les façades et les toitures; le grand salon lambrissé: inscription par arrêté du 29 août 1996.","habitants":"Famille Gardera\r\n        \"","divers":"Château de Gardera à Belus","gps":"","images":["../image/image_40/40_Gardera_Caverie_1.jpg","../image/image_40/40_Gardera_Caverie_2.jpg","../image/image_40/40_Gardera_Caverie_3.jpg","../image/image_40/40_Gardera_Caverie_4.jpg"]},"Consult_chateau_formulairef017":{"id":"Consult_chateau_formulairef017","dept":"40","canton":"Montfort en Chalosse","commune":"Gaujacq","nom":"Gaujacq","type":"Chartreuse","periode":"XVII","histoire":"GAUJACQ, au XIV seicle  possession de la famille de Navailles, puis passe par alliance aux Caupenne Archambaud, chambellan de Gaston de Phébus,  Marguerite de Caupenne apporte par alliance  en 1518 la baronnie  aux Foix Saint-Germain, une des descendante Jeanne de Montluc de Foix  princesse de Chabanais  épouse en 1648  Charles de Sourdis  frère de François  cardinal archevêque de Bordeaux, de 1648 à 1653 destruction du château médiéval, au XVIIe siècle construction  de la chartreuse est une demeure seigneuriale, appelé château. Elle a été bâtie par l'héritier,  Le cardinal François d'Escoubleau de Sourdis, lieutenant-général des armées du Roi Louis XIV, ne sétait pas trompé quand il a fait construire ce château en 1686. Lendroit est idéalement situé sur la hauteur avec dun côté vue sur le village de Gaujacq et de lautre côté sur les Pyrénées. A la mort de François de Sourdis le domaine passe à sa fille unique Angélique qui épouse François-Gilbert  Colbert marquis de Saint-Pouange,  les deux fils le  vendent en 1736  à Jean-Gabriel de Cazenave descendant des Caupenne. Le domaine est transmis en période de la Révolution aux Deschault de Monredon, aux Dupuis, aux Capdepont et à la famille Casedevant, qui ont acheté le château en 1960.                                             A trois kilomètres au nord ouest le château de Bastenne et la maison-forte de Borda, léchauguette dressée au coeur du village est le témoin de lancien château de Borda, autour duquel fut bâti le village.","architecture":"Gaujacq, était une citadelle féodale elle-même édifiée sur le site d'un castrum gallo-romain. Derrière le château actuel on peut encore  voir quelques restes des hauts remparts et les anciens fossés d'une grande enceinte de presque 800 mètres de circonférence autour du plateau.  Sa construction à litalienne, avec une galerie autour dun jardin fait presque penser à un cloître. Il est, par sa construction et son style, unique en Europe. Les appartements du XVIIe siècles sorganisent autour de quarante-quatre  arcades cintrées, scandées par des pilastres dont les chapiteaux ioniques sont surmontés de figures mithologiques  et on y trouve encore des boiseries et panneaux de cette époque, de quatre corps de bâtiments en un seul niveau éclairés par des baies à petits carreaux. Au sud  et au nord les portiques  du bâtiment  présente une baies cintrées avec fronton triangulaires à consoles remplacés par de pavillon à haute toiture. Ce château est entièrement de plain-pied et possède une cour intérieure et un « jardin des délices » évoquant lItalie de la Renaissance. Son architecture sorganise autour de ce jardin intérieur, entouré dune galerie à litalienne. Ses appartements, datant du XVIIe et XVIIIe siècle, sont meublés et habités, décorés de boiseries et de panneaux peints. Depuis le jardin d'agrément datant du XVIIe siècle, on jouit d'une vue sur les Pyrénées, de la Rhune jusqu'au Pic du Midi de Bigorre. Le château de Gaujacq est classé M.H.","habitants":"Cardinal François d'Escoubleau de Sourdis\r\n        \"","divers":"Château de Gaujacq    43° 37' 58 nord, 0° 45' 35 ouest, de Bastenne  grav 7 et de Borda grav 8","gps":"","images":["../image/image_40/40_Gaujacq_1.jpg","../image/image_40/40_Gaujacq_2.jpg","../image/image_40/40_Gaujacq_3.jpg","../image/image_40/40_Gaujacq_4.jpg","../image/image_40/40_Gaujacq_5.jpg","../image/image_40/40_Gaujacq_6.jpg","../image/image_40/40_Gaujacq_7.jpg","../image/image_40/40_Gaujacq_8.jpg"]},"Consult_chateau_formulaired116":{"id":"Consult_chateau_formulaired116","dept":"40","canton":"Montfort en Chalosse","commune":"Gousse","nom":"Gousse_Pigeon","type":"Château","periode":"XVIII","histoire":"GOUSSE,  le château était tenu par des Anglais construit au XVIIIe siècle était la propriété de  la famille de Saint-Paul-Pigeon ancêtres des Destouesse, château Pigeon de marie-Françoise Pesquay veuve de Jacques-François de Saint-Paul-Lahitte, Jean de Saint-Paul, procureur du roi en la juridiction dAuribat, possède Pigeon en 1626-1641.  On y parle de la famille Saint-Paul, très ancienne à Dax. Trois pigeons figureraient sur le blason de la famille qui aurait possédé le fameux château Pigeon à Gousse.","architecture":"Gousse , gentilhommière plus que château à deux niveaux prolongé par des bâtiments de dépendances.","habitants":"Famille Saint-Paul\r\n        \"","divers":"Château Pigeon à Gousse","gps":"","images":["../image/image_40/40_Gousse_Pigeon_1.jpg","../image/image_40/40_Gousse_Pigeon_2.jpg","../image/image_40/40_Gousse_Pigeon_3.jpg","../image/image_40/40_Gousse_Pigeon_4.jpg"]},"Consult_chateau_formulaire7601":{"id":"Consult_chateau_formulaire7601","dept":"40","canton":"Aire sur l","commune":"Hontanx","nom":"Hontanx_Aon","type":"Château-Tour","periode":"XIII-XVI","histoire":"Hontanx, bastide-rue du XIVe siècle, à conservée le château d'Aon, rare maison forte des Landes du XIIIe, la porte d'entrée fortifiée et bien d'autres curiosités.      LOUBENS avec sa tour médiévale et l'église Sainte-Marie-Madeleine de Loubens,  Hontanx a sans doute été très tôt fortifié. En 1279, son castrum et sa motte castrale sont mentionnés parmi les possessions pour lesquelles le seigneur d'Estang fait hommage à Gaston VII, vicomte de Béarn, et à sa fille Constance de Moncade, vicomtesse de Marsan. Cette dernière perçoit sans doute très tôt l'intérêt de cet ensemble puisque, dès 1298, se trouvant entraînée dans un conflit avec les vicomtes d'Armagnac, elle acquiert le lieu et y édifie une maison forte, le château d'Aon, dont les éléments ont subsisté jusqu'à nos jours. Hontanx devient ainsi un castelnau, appellation gasconne d'une ville neuve construite autour de son château.               AON, la première mention du « Castrum » remonte au XIIIe siècle : Hontanx est alors un Castelnau (château neuf) ; son seigneur, le sire dEstang rend hommage au roi dAngleterre (1279). Le 25 janvier 1311, Gaston II père de Gaston Fébus établit avec Fortaner de Lescun, seigneur de Hontanx un contrat de paréage pour la création dune bastide.   Différentes familles se succèdent : les Béarn, Les Manaud de Navailles, les dAon : seigneurs de Lussagnet.  Le château d'Aon et son ensemble constitué par les dépendances et la chapelle sont propriété de la commune depuis 1980 et a  été transformé en 1990 en centre d'hébergement et de restauration pour mener à bien ce projet, l'association \"Houtans en te bibe\" est née  en  1983.","architecture":"AON, est une maison forte des Landes, dont les origines remontent au XIIIe siècle. Cest un château sur motte qui abrite une chapelle castrale.  L'enceinte primitive fut bâtie au moyen de briques, tout comme le château. Lextension demanda une augmentation de la surface de la motte Comme beaucoup de maisons fortes, le château de Hontanx a subi de nombreuses transformations. Il a été successivement lieu de défense et  d'habitation, avant de servir à des tâches moins nobles, celles de maison de ferme, puis d'étable et de grange. Le château d'Aon présente un aspect imposant du fait de ses proportions massives -19 mètres de long, sur 12,50 mètres de large et 12,40 mètres de haut. Sur une partie de sa façade nord s'appuie un corps de bâtiment moins ancien, de hauteur nettement inférieure. De plan très simple, il se compose d'un volume rectangulaire et n'a jamais comporté de tour. L'intérieur était divisé en quatre niveaux encore rappelés par de légers retraits dans la maçonnerie. Les nombreux remaniements subis par l'édifice, rendent toute analyse des percements originels assez incertaine.                                       LOUBENS-PORTE et Bastide, dès la création de la Bastide en 1331, le seigneur est tenu de protéger ses sujets. Le village se dote de moyens de défense par la création de palissades, de fossés et de portes fortifiées.   Aujourd'hui encore subsiste une de ces portes en parfait état ; surmontée d'un pittoresque hourd en bois abritant les cloches de l'église, elle est inscrite aux M.H.depuis 1962.","habitants":"Les Manaud de Navailles\r\n        \"","divers":"Château d'Aon    43° 49' 28 nord, 0° 16' 15 ouest    grav 4 à 7   porte et tour de Loubens et château grav 1 à 3   43° 48' 59 nord, 0° 15' 01 ouest à Hontax","gps":"","images":["../image/image_40/40_Hontanx_Aon_1.jpg","../image/image_40/40_Hontanx_Aon_2.jpg","../image/image_40/40_Hontanx_Aon_3.jpg","../image/image_40/40_Hontanx_Aon_4.jpg","../image/image_40/40_Hontanx_Aon_5.jpg","../image/image_40/40_Hontanx_Aon_6.jpg","../image/image_40/40_Hontanx_Aon_7.jpg"]},"Consult_chateau_formulaire3f45":{"id":"Consult_chateau_formulaire3f45","dept":"40","canton":"Labrit","commune":"Labastide d","nom":"Labastide_Armagnac","type":"Château","periode":"XIII","histoire":"BASTIDE d'ARMAGNAC, plusieurs châteaux dont celui de Florent (voir article).                                         PRADA  Château du Prada fait partie intégrante du village, il se trouve à 100 m au Sud de l'Eglise et de la Place Royale. Le Château a été édifié par laïeul du propriétaire actuel en 1764, il a été construit sur des plans de Victor Louis auquel on doit le Grand Théâtre de Bordeaux, est une demeure historique construite par la famille de Bouglon en 1764. A deux pas de la place Royale de Labastide d'Armagnac, ce château est un domaine viticole d'exception. Le vignoble s'étend sur 2,5 ha au cur du petit village médiéval réputé pour l'excellence de son terroir.  Béatrice et Philippe de Bouglon, dans le respect d'un héritage familial.   GARREAU de la famille Garreau, musée des vignerons,  Juliac, siège de la vicomté, dont on admirera les tourelles et les créneaux. Larrouqué, ce château abrita les Templiers au XIIe siècle, puis les Hospitaliers de St-Jean de Jérusalem.                       FONDAT Avec son parc planté dessences rares le château est inscrit M.H. depuis 1999.","architecture":"Cette bastide est fondée en 1291 par le comte Bernard VI d'Armagnac  sous le nom de Bolonia. Elle est autorisée par le roi d'Angleterre Edouard Premier.  Son urbanisme témoigne du caractère volontaire de la fondation de ces villes neuves du sud de la France édifiées en quelques années, aux XIIIe et XIVe siècles, par les rois d'Angleterre et leurs sénéchaux. Seule l'ancienne enceinte a disparu. C'est aujourd'hui la plus pittoresque des bastides landaises. Le roi Henri IV (alors Henri III de Navarre) aimait se rendre à la Bastide où il résidait dans une maison donnant sur la place Royale, où logeait - selon la tradition - une de ses maîtresses. C'est cette place qui l'aurait inspiré pour la création de la place des Vosges à Paris.   PRADA Il est aujourd'hui inscrit à lInventaire Supplémentaire des Monuments Historiques. Derrière le Château on trouve un grand parc comptant des sujets très rares et très anciens.La visite guidée permet de découvrir cette bâtisse meublée en grande partie de mobilier du XVIIIe siècle                                 FONDAT, reconstruit au XVIIe siècle dresse ses fières tourelles à toit conique style néo-Renaissance, il conserve sur la façade, entre les deux tours, de belles fenêtres et lucarnes à meneaux.","habitants":"Seigneurs locaux                                                              Famille Bouglon\r\n        \r\n        \"","divers":"Le château de Garreau de Fondat grav 1 et 2, de Prada    43° 58' 06 nord, 0° 11' 07 ouest, de juliax 3 et 4, de Paguy grav 5   à Labastide d'Armagnac","gps":"","images":["../image/image_40/40_Labastide_Armagnac_1.jpg","../image/image_40/40_Labastide_Armagnac_2.jpg","../image/image_40/40_Labastide_Armagnac_3.jpg","../image/image_40/40_Labastide_Armagnac_4.jpg","../image/image_40/40_Labastide_Armagnac_5.jpg"]},"Consult_chateau_formulaire272b":{"id":"Consult_chateau_formulaire272b","dept":"40","canton":"Labrit","commune":"Labrit","nom":"Labrit","type":"Vestiges","periode":"XIII","histoire":"LABRIT  fut le berceau des seigneurs d'Albret. Du château de Labrit, il ne reste depuis que des vestiges d'un château de terre et de bois, qui fut construit entre 1225 et 1230, constituant le berceau des seigneurs d'Albret, une noble famille gasconne qui, à partir de là, étendra son influence au cours des siècles, jusqu'à l'accession d'Henri IV au trône de France.","architecture":"On peut voir aujourd'hui : la motte et les remparts de terre dégagés et mis en valeur, les fossés de ceinture remis en eau,  la reproduction en matériaux modernes des vestiges archéologiques du logis seigneurial (le niveau archéologique est plusieurs dizaines de centimètres en dessous, complètement enterré afin de le préserver). \r\nune bâtisse rectangulaire très soigneusement construite à la fin du XIIIe siècle en maçonnerie de grandes briques. Le rez-de-chaussée est vraisemblablement utilisé à l'époque comme réserve. Deux piliers ronds de briques supportaient le sol en plancher de l'étage noble.\r\nà l'intérieur de la chapelle sont découverts les vestiges du moule qui servit à couler la cloche, dans le puits ont été retrouvés de nombreux objets domestiques et reste organiques témoignant de la vie quotidienne aux XVe et XVIe siècles des traces de foyer dans une pièce donnent à penser qu'il s'agissait de la cuisine originellement en bois, elle fut ensuite maçonnée. Il ne reste que des ruines du château de Labrit, depuis   1990.","habitants":"le Roi Henri IV \r\n        \"","divers":"Vestiges à Labrit   44° 05' 52 nord, 0° 32' 29 ouest     et Hôtel de ville","gps":"","images":["../image/image_40/40_Labrit_1.jpg","../image/image_40/40_Labrit_2.jpg"]},"Consult_chateau_formulaireca90":{"id":"Consult_chateau_formulaireca90","dept":"40","canton":"Mont-de-Marsan","commune":"Mont-de-Marsan","nom":"Lacataye","type":"Donjon","periode":"XIV","histoire":"LACATAYE,  appartenaient aux vicomtes de Marsan, qui ont fini par le délaisser quand ils se sont éloignés de leur ville d'origine  Marguerite de Navarre trouve à l'abri des murailles de Mont-de-Marsan, son « ermitage », un lieu de retraite et de recueillement. Elle réside soit à Lacataye, soit au château Vieux. Elle apprécie ces lieux pour leur proximité avec le couvent des Clarisses, où elle trouve calme et sérénité. En 1546, elle rédige L'Heptaméron. Le 14 février 1548, jour de mardi gras, elle fait représenter dans une salle de Lacataye  la comédie de Montemarsan, uvre précieuse et mystique : quatre femmes ont pour nom la Ravie de l'amour de Dieu, la Mondaine, la Superstitieuse et la Sage. La Mondaine et la Superstitieuse se disputent au sujet de leurs mérites, la Sage intervient pour clarifier le débat. Mais une bergère vient affirmer que son ami vaut mieux que richesse, science et sagesse.  En, 1860, Antoine Lacaze, maire et propriétaire du donjon, en fait don à la ville pour y loger les troupes. Le donjon Lacataye devient alors caserne départementale jusquen 1875, date à laquelle les militaires déménagent à la caserne Bosquet. Il nen conservera pas moins pendant près dun siècle le nom de caserne Lacaze, malgré les affectations civiles qui sy succédèrent : pensionnat de jeunes filles, centre de gymnastique, atelier municipal. Le 11 février 1925, c'est en ces lieux que se tient la première émission de TSF de la ville.\r\nEn 1968, le maire Charles Lamarque-Cando y installe le musée Despiau-Wlérick consacré à la sculpture figurative de la première moitié du XXe siècle et dédié aux deux artistes montois Charles Despiau et Robert Wlérick.","architecture":"LACATAYE n'est pas un véritable donjon. Il est composé de deux maisons fortes romanes, jumelées, qui datent du XVe siècle. Elles étaient dotées de créneaux sur la partie supérieure au XVIe siècle.  le mur central comporte des fenêtres romanes, signe que l'une des deux maisons a été élevée avant la seconde. Les maisons, prises dans le mur d'enceinte, contribuaient à la protection de la ville côté Midou, là où s'installèrent les nouveaux quartiers au XIIIe siècle. Il semblerait que cet ensemble fortifié en pierre coquillière servait de poste d'observation et de tour de défense. Une autre maison romane, jadis enserrée dans le rempart, se situe à côté du donjon. Ses murs, garnis de corbeaux, devaient soutenir des galeries utilisables pour sa défense. Elle abrite aujourd'hui le musée Dubalen.  Il est inscrit aux M.H.par arrêté du 22 juillet 1942 .","habitants":"Marguerite de Navarre\r\n        \"","divers":"Donjon de Lacataye  43° 53' 32 nord, 0° 29' 56 ouest  à Mont de Marsan","gps":"","images":["../image/image_40/40_Lacataye_1.jpg","../image/image_40/40_Lacataye_2.jpg","../image/image_40/40_Lacataye_3.jpg","../image/image_40/40_Lacataye_4.jpg","../image/image_40/40_Lacataye_5.jpg","../image/image_40/40_Lacataye_6.jpg"]},"Consult_chateau_formulaired7f1":{"id":"Consult_chateau_formulaired7f1","dept":"40","canton":"Hagetmau","commune":"St-Séver","nom":"Lamarque_St_Sever","type":"Château","periode":"XIX","histoire":"A saint sever le château de Lamarque et le Guilleman. LAMARQUE, le général Lamarque naît en 1770 à Saint-Sever. Il connaît la gloire en servant comme militaire sous la Révolution et lEmpire. Élu député des Landes en 1828, il devient le porte-parole de lopposition républicaine. Le château fut construit dans la ville natale du général Lamarque, en 1812, dans un style néo-classique. Jean Maximilien Lamarque, général de division de Napoléon, comte d'Empire, député du Tiers État, né à Saint-Sever, s'est illustré lors de nombreuses batailles napoléoniennes. \r\nLors de ses obsèques en 1832, une émeute se déclenche à Paris. Celle-ci reste célèbre à travers les écrits de Victor Hugo qui la transpose dans son ouvrage les misérables.","architecture":"Saint-Sever, le château du général Lamarque simpose comme une élégante architecture aux allures dun hôtel particulier. Le château s'ouvre côté cour par un portique d'entrée  encadré de colonnes toscanes, comme le portail à la ferronnerie ornée du monogramme du général et de la couronne comtale. La statue du Général, réalisée en 1896 par Félix Soulès (1857-1904), orne le parc de Morlanne, et une colonne commémorative décore la place de Verdun.  Le bâtiment est construit en 1812. Il présente un corps de logis entouré par deux grands pavillons carrés. Lentrée est fermée par des grilles portant les initiales entrelacées du général.","habitants":"Général Lamarque\r\n        \"","divers":"Château de Lamarque  43° 45' 32 nord, 0° 34' 19 ouest et le château Guilleman grav 4  à st Sever","gps":"","images":["../image/image_40/40_Lamarque_St_Sever_1.jpg","../image/image_40/40_Lamarque_St_Sever_2.jpg","../image/image_40/40_Lamarque_St_Sever_3.jpg","../image/image_40/40_Lamarque_St_Sever_4.jpg"]},"Consult_chateau_formulairede41":{"id":"Consult_chateau_formulairede41","dept":"40","canton":"Peyrehorade","commune":"Pouillon","nom":"Lamothe_Pouillon","type":"Château","periode":"XV","histoire":"deux châteaux à  Lamothe de Pouillon. celui de Lamothe et celui de Saint-Martin de Pouillon (voir article).                                                                        LAMOTHE,, les premiers « seigneurs de Polhon» ont sans doute élu domicile sur la colline de Lamothe.  vers 1110, « Guillaume-Garsie de Polione », frère du vicomte dOrthe, fait une donation à  l'abbaye de Sorde. Son fils, Ot-Guillaume est victime de violences exercées par des brigands et meurt en donnant au monastère la moitié de léglise Saint-Martin de Misson.  Le seigneur de Polhon est lun des principaux personnages du diocèse ; il est juge de la cour de Dax. Le premier seigneur de Lamothe connu est Clariane dOsserain, dame de Lamothe, qui obtient en 1434 une sauvegarde du roi dAngleterre, duc dAquitaine. Le second est Bertrand de Navailles ; sa petite fille épouse en 1531 Bertrand de Luppé venu du Gers. Les comtes de Luppé se succèdent au château jusquà la Révolution. Ils sallient par trois fois à la famille des Saint-Martin au XVIIe siècle. Le château a été vendu comme bien national à la Révolution à un certain Despujo, ancêtre de Melle Loustau. Mademoiselle Ducosté qui légua le château à son neveu, le docteur Bocquentin. Après le décès du docteur, Françoise, sa veuve, est venue occuper le château et en aménager les alentours, pour la plus grande joie des Pouilonnais qui voient ainsi revivre une partie de leur histoire.","architecture":"Le château se situe à proximité du centre de Pouillon, au sud de léglise. Le château impressionne encore par son dispositif de défense, mis en place au Moyen-Âge. Construit au sommet dune colline rendue abrupte par une motte artificielle, le bâtiment porte fièrement ses origines médiévales et défensives. Ses tours étaient protégées par des lices (palissades de bois), des créneaux et des barbacanes (meurtrières étroites). Contrôlé par un pont-levis, lensemble était défendu par dépaisses murailles et isolé par de profonds fossés creusés tout autour. Restauré à la Renaissance, le château de Lamothe est jusquà la Révolution la résidence des comtes de Luppé, cependant, les châtelains de Lamothe ne sont pas mentionnés avant le XVe siècle. Pourtant la bâtisse actuelle, qui conserve des vestiges Renaissance, repose sur une éminence en terre qui semble bien avoir été aménagée de main dhomme et constituer une motte qui se serait ajoutée à la colline naturelle.","habitants":"Bertrand de Luppé \r\n        \"","divers":"Château de Lamothe à Pouillon","gps":"","images":["../image/image_40/40_Lamothe_Pouillon_1.jpg","../image/image_40/40_Lamothe_Pouillon_2.jpg","../image/image_40/40_Lamothe_Pouillon_3.jpg"]},"Consult_chateau_formulairef175":{"id":"Consult_chateau_formulairef175","dept":"40","canton":"St-Martin de Seignanx","commune":"Ondres","nom":"Larroque_Ondres","type":"Château","periode":"XIV","histoire":"LARROQUE, en 1442 le roi Charles VII en fit don au connétable de Richemont.  Le sire de Losse y fut enfermé pendant cinq ans pour le meurtre du sieur de Juliac .  En 1512 il devient la propriété de Françoise de Cauna, dame de Pouillon. En 1571, fut acquis par la famille d'Albret.  En 1584 Henri IV le vendit à Jean de Pouillon.  En 1587, Charles de Saint-Martin, sénéchal des Lannes, sieur de Biscarrosse, qui habitait en son château de la Rocque d'Ondres. En 1589, Loys, seigneur de Saint-Martin, résidait au château de la Roque. Il épousa Françoise de Noailles, nièce de F. de Noailles, évêque d'Acqs (DAX). Le dernier des Pouillon y mourut en 1715. A la veille de la Révolution le château appartient à un comte Pujol de Juliac. En germinal An II le château est saisi et vendu comme bien d'émigré à monsieur Dominique Grandferry, libraire à Bayonne. Monsieur le comte du Puys d'Alissac acquiert le château de la Roque avant 1826. Il fut acquis plus tard par le comte du Puys d'Alissac, lieutenant du roi Charles X à Bayonne. A partir de cette date les actes de ventes successifs permettent d'identifier les différents propriétaires : En 1836 Jean-Cécile Lafargue, en 1855 Auguste Serres. En 1863 Benoît Lamarthonie et Françoise Sara son épouse, en 1870  Françoise Sara et Natalio Lorenzo Diaz, en 1877  M. Considine  de 1883 à 1890 Julia Tahl de Lancey, en quatre acquisitions successives : Richard Feuillet, en 1927  la générale Jacqueline Denain, en 1942   Raymond Gaillard  en 1958 la société civile particulière La Roque Saint-Germain, en 1973 Jean Edouard Ducamp, en 1980 Antoine Branger.","architecture":"Le château de La-Roque fut construit en 1130, pour le comte de Cominges.  Au XIIe siècle, les rois d'Angleterre, qui étaient aussi ducs d'Aquitaine, ont sjourné au château. Afin d'assurer leur sécurité, il fallut bâtir des fortifications importantes. De 1199 à 1216, Jean Sans-Terre, roi d'Angleterre fit abattre des fortifactions importantes, ne laissant au logis que ses 2 tours rondes. C'est la plus ancienne constuction de la commune, le château deLarroque sera rénové plusieurs fois. La Tour de Guet sera restaurée en 1828. Au XXe siècle,  plusieurs transformations, dont l'une des dépendances en un hopital militaire, au cours de la grande guerre. C'est la plus ancienne constuction de la commune, situé  au sud-ouest du village, sur un promontoire à 46 mètres au dessus du niveau de la mer, le château de Larroque possédait un impressionnant système de défense le transformant en une véritable forteresse. Le corps du batiment est composé de 3 étages, flanqué d'une guérite en pierre pour assurer la surveillance et de 2 imposantes tours rondes, hautes de 17 mètres. La tour orientale est appelée la tour de guet. La tour coté ouest est nommée la tour de Caput-Brut.","habitants":"Comte du Puys d'Alissac\r\n        \"","divers":"Château de Larroque   43° 33' 34 nord, 1° 27' 41 ouest à Ondres","gps":"","images":["../image/image_40/40_Larroque_Ondres_1.jpg","../image/image_40/40_Larroque_Ondres_2.jpg","../image/image_40/40_Larroque_Ondres_3.jpg","../image/image_40/40_Larroque_Ondres_4.jpg","../image/image_40/40_Larroque_Ondres_5.jpg"]},"Consult_chateau_formulaire0f0b-2":{"id":"Consult_chateau_formulaire0f0b-2","dept":"40","canton":"Aire sur l","commune":"Duhort-Bachen","nom":"Lau","type":"Château","periode":"XV","histoire":"LAU, construit pour Antoine de Castelnau, chambellan de Louis XI, son architecture est empreinte de l'influence flamande. Le château est composé d'un corps de logis du XVe siècle à l'est, d'une aile en retour d'équerre de la fin du Moyen-Age réaménagée au XIXe siècle au sud, d'un châtelet d'entrée, d'un ouvrage défensif habillé au XIXe siècle à l'ouest. Le château du Lau est inscrit aux M.H. depuis le 23/01/1993 et classé le 2/04/1997.","architecture":"Lau, sur un ancien site défensif (fossés, motte, murs remparts du XIVe siècle, ancien pont-levis), un bâtiment de style flamand en briques et pierres.   Le château actuel est édifié au XVe siècle à l'emplacement d'une fortification médiévale, peut-être de type motte castrale.  Il se compose d'un corps de logis du XVe siècle à l'est, d'une aile en retour d'équerre de la fin du Moyen-Age réaménagée au XIXe siècle au sud, d'un châtelet d'entrée, ouvrage défensif  habillé au XIXe siècle à l'ouest. Au nord, la construction démolie a laissé place à un fossé en eau, dont le tracé courbe épouse le contour d'une butte arasée.","habitants":"Antoine de Castelnau\r\n        \"","divers":"Château de Lau à   Duhort-Bachen","gps":"","images":["../image/image_40/40_Lau_1.jpg","../image/image_40/40_Lau_2.jpg","../image/image_40/40_Lau_3.jpg","../image/image_40/40_Lau_4.jpg"]},"Consult_chateau_formulaire6a97-2":{"id":"Consult_chateau_formulaire6a97-2","dept":"40","canton":"Mont-de-Marsan","commune":"Benquet","nom":"Laurens_Castelet","type":"Château","periode":"XVIII-XIX","histoire":"LAURENS-CASTELET, le village de Benquet possède un château, propriété du comte Papin, homme politique français élu député des Landes en 1799. Le comte Papin décède en 1809 dans le château qui reste dans la famille jusquen 1855.  Le site est acheté aux enchères au XIXe siècle par le marquis de Cornulier, surnommé l'« ami des pauvres ». Il fera reconstruire, en 1872, l'aile gauche, la plus ancienne, en lieu et place d'un ancien château appartenant à la maison d'Orthez et dont il ne reste rien. Il fit de cette première aile sa demeure.","architecture":"Le château de Laurens-Castelet, propriété privée, connaît une reconstruction à la fin du XIXe siècle.  Cette construction, qui fait partie dun vaste domaine, est alors mise aux enchères en même temps que les trente-sept métairies et les trois moulins qui sy rattachent.  Depuis la mort du comte Papin, la demeure est en ruine. Le marquis y fait alors construire une maison en 1855, mais il faut attendre 1872 pour que les Cornulier reconstruisent un château à cet emplacement.Totalement restauré au XXe siècle, il reste une propriété privée entourée dun parc qui abrite un cèdre assez vieux pour avoir suivi lhistoire de ce domaine depuis ses origines.","habitants":"Marquis de Cornulie\r\n        \r\n        \"","divers":"Château de Laurens-Castelet  43° 50' 01 nord, 0° 29' 54 ouest   à  Benquet","gps":"","images":["../image/image_40/40_Laurens_Castelet_1.jpg","../image/image_40/40_Laurens_Castelet_2.jpg","../image/image_40/40_Laurens_Castelet_3.jpg"]},"Consult_chateau_formulairece8e":{"id":"Consult_chateau_formulairece8e","dept":"40","canton":"Aire sur l","commune":"Le Frêche","nom":"Le_Freche","type":"Château","periode":"XIV","histoire":"A le Frêche le château de Lafitte, de Lacquy, de Saint-Vidou , et la maison forte de Tampouy.                     LAFITTE Le plus ancien témoignage, trouvé dans les archives, révèle l'existence du château Lafitte au XIVe siècle. Ses terres formaient alors une vaste propriété agricole, où la vigne et le vin occupaient déjà une activité importante du domaine. \r\nMais l'histoire a voulu que cette activité cesse. Ce n'est qu'après l'arrivée de Brigitte et Philippe Arraou que le château renoue avec son histoire. Et aujourd'hui leurs enfants assurent cette continuité.","architecture":"LAFITTE de plan rectangulaire à deux niveaux toit en croupe avec série de lucarnes, l'édifice est flanqué en façade de deux tourelles à toit en poivrières.              Saint-VIDOU de plan en équerre à trois niveaux avec petites ouvertures  toit en croupe  tour mi-hors oeuvres à l'angle interne du bâtiment ne dépassant pas l'ensemble.                                                                       LACQUY corps de logis d'un niveau entredeux autres corps de logis celui de droite à deux niveaux rectangulaires toit en croupe avec série de lucarnes , à gauche tour carrée de deux niveaux toit à quatre pans l'ensemble est recouvert de tuiles.                              Le domaine  saint-Martin de Noét grosse bâtisse rectangulaire à deux niveaux  toit en croupe.","habitants":"Seigneurs locaux                                                      Brigitte et Philippe Arraou\r\n        \"","divers":"A le Frêche le château de Lafitte grav 2 et 3, de Lacquy grav 4, de Saint-Vidou grav 1   43° 54' 57 nord, 0° 14' 18 ouest, et de St-Martin de Noé grav 5,  Maison forte de Tampouy 43° 54' 40 nord, 0° 15' 55 ouest  .","gps":"","images":["../image/image_40/40_Le_Freche_1.jpg","../image/image_40/40_Le_Freche_2.jpg","../image/image_40/40_Le_Freche_3.jpg","../image/image_40/40_Le_Freche_4.jpg","../image/image_40/40_Le_Freche_5.jpg"]},"Consult_chateau_formulaireb1ed":{"id":"Consult_chateau_formulaireb1ed","dept":"40","canton":"Tartas","commune":"Lesperon","nom":"Lesperon","type":"Manoir","periode":"XVIII","histoire":"LESPERON, bâtie sur une hauteur protégée par un ruisseau en contrebas le Vignacq. Son nom primitif était Arrast (de « Arx », c'est-à-dire citadelle). Vers 1305, Armanieu dAlbret, seigneur de cette paroisse, affirme son autorité en construisant un château ainsi qu'une église. Elle est dotée dune imposante tour-clocher fortifiée, munie de bretèches, armée de meurtrières et percée de mâchicoulis. On suppose quautour de cette église, il y aurait eu quatre colonnes, vestiges passé dune sauveté. En ce temps-là Édouard II d'Angleterre signalait cet endroit à ses sujets comme un endroit dangereux du fait de son embranchement important sur un itinéraire vers Saint-Jacques-de-Compostelle, une halte importante doù lon peut continuer par la suite soit par la Navarre et Roncevaux, soit par la Biscaye. Lesperron château de  monsieur peysserre.","architecture":"Le château du Souquet appellé aussi le château Dubedout, est un château bâti à Lesperon,  Le Bouiscat chambre d'hôtes, le Tireveste chambres d'hôtes, pas d'information historique pour ces châteaux.","habitants":"Armanieu dAlbret\r\n        \"","divers":"le château du Souquet  grav 1 et 2 , 43° 57' 48 nord, 1° 03' 37 ouest,       le Bouiscat grav 2, le Tireveste grav 3 , le Peysserre grav 4   et mairie grav 5 à Lesperon","gps":"","images":["../image/image_40/40_Lesperon_1.jpg","../image/image_40/40_Lesperon_2.jpg","../image/image_40/40_Lesperon_3.jpg","../image/image_40/40_Lesperon_4.jpg","../image/image_40/40_Lesperon_5.jpg","../image/image_40/40_Lesperon_6.jpg"]},"Consult_chateau_formulaire9490":{"id":"Consult_chateau_formulaire9490","dept":"40","canton":"Peyrehorade","commune":"St-Cricq de Gave","nom":"Linois_de_Prigny","type":"Château","periode":"XVII","histoire":"LINOIS de PRIGNY, un seigneur occupe les lieux au moins dès le XIIe siècle. Loup-Garsie, vicomte dOrthe donne en mariage sa fille Merveille dOrthe à Pierre Arnaud de St-Cricq quil nantit de charges en 1193. Le château actuel présente des similitudes avec celui de Montréal à Peyrehorade. Gaston Fébus en annexa la seigneurie vers 1389 au désavantage de la famille de Gramont. Jusqu'en 1541, il appartient aux de Caupenne, seigneurs d'Amou. Puis, pendant un siècle, il devient la propriété des de Lalande, de Montaut, illustre lignée qui donna un maire de Bayonne et un prévôt à la sénéchausée d'Auch et du Béarn.  Un des derniers noms illustres du château de Saint Cricq fut l'amiral Limois de Prigny, dont le nom figure à Paris sur l'Arc de Triomphe.  A la mort de Mme Jules de Prigny de Linois, petite-fille de l'amiral de Linois, décédée au château de Saint-Cricq-du-Gave.","architecture":"Linois de Prigny, constructions du XVIIe siècle  isolées forment avec le château un ensemble harmonieux. Le château flanqué de trois tours  cylindiques d'angles  au toits en forme de cloche,  se déploie selon un plan en U autour d'une petite cour d'honneur,  la partie la plus ancienne du bâtiment est sur plan en L, constitué par la tour Est, l'aile gauche et le corps de la façade.  Les matériaux employé pour les voûtes des caves semblent contemporains à l'abbaye de Sorde. Les transformations du XVIIIe siècle lui ont conféré son aspect actuel sur un plan en U. \r\nL'orangerie  et la chapelle  sont récentes. Par contre, le colombier existait déjà en 1673.","habitants":"Pierre Arnaud de St-Cricq\r\n        \"","divers":"Château de Linois de Prigny 43° 32' 02 nord, 1° 00' 01 ouest à St-Cricq de Gave","gps":"","images":["../image/image_40/40_Linois_de_Prigny_1.jpg","../image/image_40/40_Linois_de_Prigny_2.jpg","../image/image_40/40_Linois_de_Prigny_3.jpg"]},"Consult_chateau_formulaire7382":{"id":"Consult_chateau_formulaire7382","dept":"40","canton":"Mimizan","commune":"Linxe","nom":"Linxe_Coyola","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux à Linxe celui de la Belle-Epoque et celui de Coyola.                                                           BELLE-EPOQUE, la construction du château Belle-Epoque date de 1762,  diverses familles l'on habité jusquen 1861, date de lacquisition par la famille Saint-Jours.  Chambres d'hôtes de Christian Conquand.       COYOLA, de la famille Boulart et de Coyola  construit sous le règne de Napoléon III.  Il porte le nom de château de Saint-Jour. La famille Coyola lachète en 1912 et décide dentreprendre sa réfection. Larchitecture est dans le style néo-Renaissance, passé de mode, car plutôt en vogue sous le Second Empire, mais qui respecte le caractère dorigine du château.","architecture":"Belle-Epoque, au cur de la forêt landaise, la construction du château remonte à 1762. de style néo-Renaissance, cest le château daujourdhui qui offre authenticité, charme et tranquillité. Il est implanté dans un parc de verdure de près de 4 ha, aux essences rares, avec des arbres centenaires, un jardin à la française, un lac ouvert à la pêche, et une bambouseraie géante. Les écuries, dessinées par Gustave Eiffel, constituent aujourdhui un bâtiment remarquable en Aquitaine.                                          Coyola, de style néo-Renaissance, le bâtiment dorigine, de taille plus modeste, est sans doute construit sous le règne de Napoléon III.Ce style architectural se manifeste notamment par la symétrie de la composition d'un avant-corps central entouré de six fenêtres réparties sur deux niveaux de chaque côté et à chaque extrémité du bâtiment deux tours, surmontées par un toit pointu recouvert dardoises. Une grosse tour crénelée sélève également au sud du château, cette reproduction pittoresque de larchitecture de la Renaissance est très proche du  travail de larchitecte Viollet le Duc et de sa restauration du château de Pierrefonds.","habitants":"Christian Conquand                                                          Famille Boulard\r\n        \"","divers":"Château de la Belle Epoque grav 1 à 3, Linke grav 4 et la mairie  de Coyola à Linke","gps":"","images":["../image/image_40/40_Linxe_Coyola_1.jpg","../image/image_40/40_Linxe_Coyola_2.jpg","../image/image_40/40_Linxe_Coyola_3.jpg","../image/image_40/40_Linxe_Coyola_4.jpg","../image/image_40/40_Linxe_Coyola_5.jpg"]},"Consult_chateau_formulaire84cd":{"id":"Consult_chateau_formulaire84cd","dept":"40","canton":"Mimizan","commune":"Lit et Mixe","nom":"Lit_et_Mixe","type":"Château","periode":"XVIII","histoire":"LIT-MIXE, pendant près de six siècles, le Marensin est tributaire d'un système féodo-vassalique. Sous l'influence anglaise après le mariage d'Aliénor d'Aquitaine, il passe sous domination de la maison d'Albret jusqu'en 1584, date à laquelle son héritier  futur Henri IV de France, vend la baronnie. Le baron de Tingon, les seigneurs de la Barre, de la Ferrade en sont les acquéreurs successifs. Au XVIIIe siècle, les comtes de Marcellus en furent les derniers barons.\r\nEn 1825, sous la Restauration, les deux paroisses qui forment la commune actuelle fusionnent.                      A cinq kilomètres au nord le château de SAINT-JULIEN-en-BORN pas d'information historique.","architecture":"Lit-Mixe dont  l'accès à la mer explique la reconnaissance du port de Lit parmi les six ports dépendant du quartier maritime de Dax, inclus comme deux ports autres landais du quartier maritime de Bayonne, dans le quatrième arrondissement maritime, siégeant à Rochefort.  En 1907, la commune est marquée par les affrontements entre gemmeurs et propriétaires forestiers au cours de la grève des résiniers landais. Le château de plan rectangulaire avec un corps de logis  de deux niveaux d'une travées enclavés entre deux pavillons de deux niveaux avec lucarnes sur un toit brisés recouverts d'ardoises.          St-JULIEN en BORN dit de Turpaut est construit en pierre de taille du XVIIe siècle. Ce magnifique château comprend un corps central construit au nord avec deux ailes en équerre limitant une terrasse protégée par des balustres au premier étage. L'intérieur est aménagé avec une partie habitable en permanence. le pavillon central à trois niveaux et trois travées. l'ensemble est recouvert d'un toit brisé flanqué  d'oeil de boeuf et de lucarnessur la parie inférieure.","habitants":"Comtes de Marcellus\r\n        \"","divers":"Château de Lit et Mixe et le château de Saint-Julien en Born grav 3 et 4","gps":"","images":["../image/image_40/40_Lit_et_Mixe_1.jpg","../image/image_40/40_Lit_et_Mixe_2.jpg","../image/image_40/40_Lit_et_Mixe_3.jpg"]},"Consult_chateau_formulaire003b":{"id":"Consult_chateau_formulaire003b","dept":"40","canton":"Montfort en Chalosse","commune":"Lahosse","nom":"Loumaing","type":"Manoir","periode":"XIX","histoire":"LOUMAING, les Maumen étaient seigneurs de Laur, Anne de Maumen  propriétaire dès 1737 . Depuis son acquisition par Mathieu Larreyre en 1766 le domaine est resté propriété de la même famille. Au décès de son père en 1789 ce dernier en hérite.  Jeanne Gensous, épouse de Mathieu Larreyre décède au Loumaing et est inhumée à Lahosse, si le fils de Jean-Baptiste décède en 1779 à Lahosse, si un Mr Larreyre assiste aux obsèques de Daverat en 1785 Jean-Baptiste Larreyre sinstalle au Loumaing lorsquil devient maire de Lahosse le 18 juillet 1800. Il y décède en juillet 1808. Son épouse, Marguerite de Chauton, continue à vivre au Loumaing, où elle décède le 13 novembre 1828, à lâge de 82 ans.   Jean-Baptiste Larreyre nayant pas denfants, cest Rose de Chauton, sa petite nièce, qui hérite du domaine.  Elle épouse Simon Lazare Boisot, en 1831, à Bayonne. Les Boisot auront deux enfants : Félix, né à Bayonne et Fanny qui épousera également un de Chauton, notaire à Villeneuve  en 1837 Lazare Boisot est membre du conseil municipal. Il décède en 1865. Son épouse lui survit jusquen 1888.  Son fils Félix hérite du domaine. Il épouse Marguerite de Chauton en novembre 1875 à Tartas. Les anciens bâtiments subsistent. Neuf enfants naîtront de leur union : dabord cinq filles, nées à Lahosse de 1876 à 1882 et quatre garçons nés à Paris de 1884 à 1890. Tous les garçons sont morts en bas âge, lun deux noyé dans létang du Loumaing. Coraly Boisot épouse Jacques Heliot en 1903 à Paris.","architecture":"Le « château » restera propriété dune des filles Héliot jusquà une date récente. Les métairies seront vendues peu à peu, sauf Caousse et Pinaout. Un bélier permettait de faire monter leau jusquau château. Ce système avait été installé au début du siècle. Ainsi le château avait leau courante. Les « coups de bélier » résonnaient dans la campagne, mais seul un mince filet deau atteignait le robinet. Le joli bâtiment qui abritait le bélier est toujours visible dans une prairie, en contrebas. Le lavoir, construit à la même époque et alimenté par la même source, où les femmes embauchées pour servir au château lorsque la famille y résidait lavaient le linge, est maintenant en ruines.","habitants":"Famille de  Mathieu Larreyre\r\n        \"","divers":"Manoir de Loumaing      43° 43' 10 nord, 0° 48' 04 ouest à Lahosse","gps":"","images":["../image/image_40/40_Loumaing_1.jpg"]},"Consult_chateau_formulairedd37":{"id":"Consult_chateau_formulairedd37","dept":"40","canton":"Labrit","commune":"Lubbon","nom":"Lubbon_Peyrebére","type":"Château","periode":"XIX","histoire":"Deux châteaux à Lubbon celui de Lubbon et celui de Peyrebère.                                                                 LUBBON, ruines de l'ancien château, édifice trés ambitieux construit à la fin dfu XIXe siècle dans un style Néo-Renaissance du XIVe siècle dans l'attention d'être digne de recevoir Napoléon III de la famille de Peyrebère.                                                                        PEYREBERE,  la famille Peyrebère sinstalle à Lubbon en 1720. François Peyrebère, premier de cette famille dans la commune, est marchand et cabaretier, il y achète des terres que ses descendants exploitent. Au début de la construction du château, la famille possède quasiment toutes les terres du village. Albert Peyrebère à lorigine de la construction est marié à la fille dAdhémar Guilloutet, célèbre personnage de Parleboscq, propriétaire du château de Lacaze. Celui-ci pousse son gendre à construire le château pour y recevoir Napoléon III, qui devait le nommer Comte. La guerre de 1870 et la chute de lEmpire empêchent la réalisation de ce vu. La construction fut interrompue trois ans à la suite de la chute de lEmpire. Pour terminer la demeure il fait appel à Alexandre Ozanne, architecte local qui sinspire des travaux de Viollet-le-Duc. Le château de Peyrebère brûla durant une autre invasion allemande,en 1943, château de Lubbon en 1940  où des familles de Michelbach-le-bas ont été accueillies, aujourd'hui Claudine Blanchard en a fait un atelier artistique.","architecture":"Lubbon, ruines de l'ancien château, édifice trés ambitieux construit à la fin du XIXe siècle dans un style Néo-Renaissance, la demeure qui connut des fastes de la belle époque s'envolait dans un immense brasier, il ne subsiste  que les quatre murs et les tours d'angle à ciel ouvert, un début de restauration trés partielle  a été entrepris depuis quelques années. Se  poursuivra-t-il et verra-t-on ressurgir de ses cendres le pretigieux édifice qui fit l'orgeuil de la famille de Peyrebère.  Le château est entouré de quatre tours de formes différentes, mais avec des toitures en pavillon et couronnées de mâchicoulis. Un balcon surmonté dun gâble est aussi entouré de pinacles.","habitants":"Lubbon; Famille de Peyrebère                                        Peyrebére; Claudine Blanchard      \r\n        \"","divers":"Château de Lubbon grav 1à 3 et de Peyrebère grav 3 et 4 à Lubbon","gps":"","images":["../image/image_40/40_Lubbon_Peyreb%c3%a9re_1.jpg","../image/image_40/40_Lubbon_Peyreb%c3%a9re_2.jpg","../image/image_40/40_Lubbon_Peyreb%c3%a9re_3.jpg","../image/image_40/40_Lubbon_Peyreb%c3%a9re_4.jpg","../image/image_40/40_Lubbon_Peyreb%c3%a9re_5.jpg"]},"Consult_chateau_formulairea8c2":{"id":"Consult_chateau_formulairea8c2","dept":"40","canton":"Tartas","commune":"Carcarès-Ste-Croix","nom":"Malet","type":"Vestiges Manoir","periode":"XIII-XVI","histoire":"MALET du XIIIe siècle, construction d'un château fort par des seigneurs \"aimant\" guerroyer, au XVIe siècle le château se transforme en paisible manoir confortable,  au début du XVIIe siècle, le roi de France Henri IV séjourne parfois en ce château. En 1782, la famille Chapon en devient propriétaire. Au XXIe siècle, la découverte de l'extérieur  est possible depuis la petite route.","architecture":"MALET, remonte au XIIIe siècle ce fut une véritable forteresse dont la bâtisse actuelle ne conserve que peu d'éléments. Sa forme carrée et ses petites dimensions ne la rendant pas habitable. Absence d'archère, de crénelage, de mâchicoulis ainsi que la présence d'une trop grande ouverture au sommet de sa \"médiévalité\". La base a une légère inclinaison montre des pierres pauvrement taillées. La partie supérieure a été \"cimentée\" mais possède quelques traces de fentes verticales.  Cette tour de ce petit château aurait il évolué avec l'amélioration des armes à feu, certainement, et même révolutionnaire  car il y a une fente de tir unique en France.","habitants":"Famille Chapon\r\n        \"","divers":"Vestiges du manoir de Malet à Carcarès Sainte-Croix","gps":"","images":["../image/image_40/40_Malet_1.jpg","../image/image_40/40_Malet_2.jpg","../image/image_40/40_Malet_3.jpg","../image/image_40/40_Malet_4.jpg"]},"Consult_chateau_formulaire97e7":{"id":"Consult_chateau_formulaire97e7","dept":"40","canton":"Aire sur L","commune":"Saint-Loubouer","nom":"Maubourger_Landes","type":"Bastide","periode":"XIII","histoire":"Le village de Saint-Loubouer est fortifié et entouré de remparts au XIIIe siècle, pendant la présence anglaise en Aquitaine, le château de Lussy, datant du XVIIIe siècle, partiellement inscrit au titre des M.H.    A trois kilomètres au nord-Est le château dit des Prés à d'Eugénie les Bains\r\nMAUBOURGER, bien que la mairie occupe l'ancien hôtel du Baron de Noguès avec sa porte d'entrée de style Renaissance et ses cheminées sculptées du XVIIe siècle.  Au Xe siècle, construction d'une abbaye bénédictine. Durant 3 siècles, le bourg se fortifie d'un rempart.  Un des murs est adossé à la grange du château Renaissance des anciens  seigneurs d'Abadie et de Noguès. En 1442, la petite cité fortifiée reçoit Gaston IV de Foix-Béarn pour une réunion des états généraux de Tursan et Dax. Le but est de renouveler leur serment d'allégeance au roi de France Charles VII.   Au XXIe siècle, la découverte de l'extérieur de la tour-porte est libre et gratuite depuis la place du village. La visite de la fortification est interdite. En 1935, la tour-porte de Maubourguet est inscrite aux M.H.","architecture":"La tour de Maubourguet (signifiant « mauvais village ») est érigée entre la fin du XIIIe siècle et le début du XIVe siècle, la tour rectangulaire de 6m x 5m avec sa hauteur de 12m n'est pas arrivée entière au XXIe siècle.   Il n'y a pas de porte ni d'escalier pour monter dans la tour. La belle gardera ses secrets intérieurs, bretèches, mâchicoulis, corbeaux pour des hourds , archères ont disparu, comme la porte d'entrée principale de la ville. Trois autres portes semblables sont construites à la même époque puis démolies, deux lors des guerres de Religion, la troisième en 1839. Elle est percée d'un arceau ogival surmonté d'une pièce de forme à peu près carrée. Cette pièce est percée d'une meurtrière sur chacun de ses quatre côtés. La tour devait à l'origine être plus élevée et comporter des créneaux Maubourger,   mais il reste une trace de défense me faisant croire à sa puissance d'antan. Un bel assommoir précédent le portail à double vantaux dont il ne reste que les gonds.           Château de LUSSY, le corps de logis  de plan rectangulaire  à deux niveaux avec lucarnes sur toit en croupes, flanqué plein cintre d'un pavillon d'entré saillant avec fronton triangulaire, l'édifice est accolé de deux pavillons carrées sur les extrémitées de même niveaux avec toits à quatre pans, dépendance sur l'arrière du château.","habitants":"seigneurs d'Abadie et de Noguès\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Porte et château de Lussy de Maubourger grav 3 à St-Labouer, et château des Prés d'Eugenie les Bains grav 4 et 5.","gps":"","images":["../image/image_40/40_Maubourger_Landes_1.jpg","../image/image_40/40_Maubourger_Landes_2.jpg","../image/image_40/40_Maubourger_Landes_3.jpg","../image/image_40/40_Maubourger_Landes_4.jpg","../image/image_40/40_Maubourger_Landes_5.jpg"]},"Consult_chateau_formulaired725":{"id":"Consult_chateau_formulaired725","dept":"40","canton":"Peyrehorade","commune":"Cauneille","nom":"Mente","type":"Château","periode":"XVIII","histoire":"MENTE, au XVe siècle, on connaît déjà la caverie de Mente qui prendra lallure dun vaste ensemble au XVIIIe siècle avec belvédère, fontaine, colombier, écuries.  À l'origine, il s'agit d'un bien vicomtal de l'époque médiévale dans la baronnie de Cauneille. Mais, en 1484, Arnaud-Louis dAspremont cède ce bien à Catherine de Foix-Béarn, épouse de Jean II dAlbret. Un peu plus tard, la caverie est \"annoblie\" (1556) par Antoine de Bourbon  pour Jean Lamothe dApatte, écuyer, et son secrétaire. Enfin, en 1775, Pierre Despériès de Lagelouze, époux de Jeanne du Becq, achète Mente. Il date du 4 éime quart du XVIIIe siècle. Le château de Mente est au lieu-dit Mente. Il servit plus tard de sanatorium. \r\nLe POURTAOU   Du poète Jean Rameau. Cest au départ une ferme traditionnelle  transformée par limagination de lartiste, après qu'il l'ait achetée en 1898.  Ainsi ce siège-autel pour honorer son fils, ci-contre, près de l'entrée.","architecture":"MENTE l'édifice  de plan rectangulaire à trois niveaux  flanqué plein citre en façade d'un pavillon saillant sur trois travées avec fronton triangulaire  Aujourd'hui, Mente est devenue une résidence médicalisée.            Le Pourtaou,  construit au sud un bâtiment massif à plusieurs corps et à toitures complexes et hétérogènes. Toutes les élévations sont décorées de sculptures de ciment ( mascarons, modillons et corniches de fenêtres, chapiteaux de colonnes). \r\n La plupart sont réalisées par Jean Rameau lui même.","habitants":"Pierre Despériès de Lagelouze\r\n        \"","divers":"Château de Mente 43° 32' 46 nord, 1° 04' 05 ouest  et le Pourtaou grav 3, à Courneille","gps":"","images":["../image/image_40/40_Mente_1.jpg","../image/image_40/40_Mente_2.jpg","../image/image_40/40_Mente_3.jpg"]},"Consult_chateau_formulaire6fd5-2":{"id":"Consult_chateau_formulaire6fd5-2","dept":"40","canton":"Hagetmau","commune":"Momuy","nom":"Momuy","type":"Château","periode":"XVIII","histoire":"MOMUY,  en 1341, le village fut érigé en bastide par Édouard III d'Angleterre.   La seigneurie appartient aux dArzac jusquen 1660. A la veille de la Révolution, de 1778 à 1782, le baron de Saint-Julien, seigneur de Momuy, engagea un procès contre le curé du village, Labeyrie. La demoiselle Henriette Dutroy l'accusait d'être le responsable de sa grossesse. Monsieur de Momuy, qui avait eu des différends avec l'ecclésiastique, saisit cette occasion, pour demander son expulsion. L'accusé se défendit en citant le baron pour calomnie. Le mémoire de défense du seigneur est plein d'intérêt : 40 témoins sont assignés, depuis la cuisinière du château jusqu'au chanoine, frère du curé. Pendant quatre ans, le village vécut au rythme de la procédure, coupé en deux factions qui se haïssaient. Ainsi, quand les gens du seigneur de Momuy passaient dans la rue, leurs ennemis criaient: « Ah ! ah! la girouette passe ! » Il est remarquable que dans ce petit village des Landes comme partout en France ce symbole ait été employé pour désigner le \"parti du château\". On comprend mieux leur destruction générale après la Nuit du 4 Août.","architecture":"Le château de Momuy de style quadrangulaire à deux niveaux pour le corps de logis rectangulaire   à toit très haut entre tour carrées crénelées à mâchicoulis avec toit à quatre pans sur angles  avant et rondes sur face arrière, château du XVIe : donjon féodal, tourelles d'angle, fenêtres à meneaux, la demeure fut remaniée au XIXe siècle.","habitants":". Monsieur de Momuy\r\n        \"","divers":"Château de Momuy  43° 36' 46 nord, 0° 38' 25 ouest","gps":"","images":["../image/image_40/40_Momuy_1.jpg","../image/image_40/40_Momuy_2.jpg","../image/image_40/40_Momuy_3.jpg"]},"Consult_chateau_formulaire146a":{"id":"Consult_chateau_formulaire146a","dept":"40","canton":"Mont de Marsan","commune":"Mont de Marsan","nom":"Mont_de_Marsan","type":"Tour-Château","periode":"XIV-XVIII","histoire":"A mont de Marsan le château tour Lacataye (voir article) et le château de Conenx et de de Nobilos.        MONT-de-MARSAN, la belle petite cité de Larresingle, un rempart de 800 ans ayant su évoluer doucement puis attirer le regard de personnages illustres est un vrai plaisir.  En 1585, Henri IV fait construire un bastion pour protéger la porte Est nommée : Porte Roquefort. En 1860, Antoine Lacaze, maire de Mont de Marsan et propriétaire du donjon, fait don de ce bâtiment médiéval à la ville pour loger les soldats.  En 1968, Charles Lamarque-Cando, maire de Mont de Marsan, transforme ce lieu en musée pour 2 sculpteurs régionaux : Charles Despiaux, Robert Wlérick.      CONENX au nord de Mont de Marsan propriété de Mr de Mondiet.                                                                NOBILOS, est acheté par Marguerite de Moncade, fille de Gaston VII, vicomte de Béarn.    Au XVIIe siècle, sur ordre du Roi de France Louis XIII, le château Nolibos est détruit.","architecture":"AU XIIe siècle, construction des remparts entourant la ville. A la fin du XIIIe siècle, construction au Nord-Est des remparts d'une maison forte    nommée aujourd'hui : Le donjon de Lacateille. Au XIVe siècle, amélioration des défenses du rempart. Vers 1380, Gaston Phébus , vicomte de Marsan, fait restaurer le château Nolibos.  Les pierres ont des tailles et dimensions différentes entre la base et le sommet. Le plus étonnant et l'absence d'archère, de mâchicoulis ou de crénelage. Je suppose que le rempart devait être beaucoup plus haut.   Au XVIIIe siècle, pour agrandir la ville, une grande partie des remparts sont détruits dont les 5 portes fortifiées. Au  XIXe siècle, le \"château vieux\" ainsi que de nombreux bâtiments fortifiés sont détruits. Le \"château vieux\" sera remplacé par le théâtre et les halles. En 1875, les militaires déménagent à la caserne Bosquet. La tour devient successivement :  Un pensionnat de jeunes filles, un centre de gymnastique,  un atelier municipal.             Nobilos le château aurait été détruit","habitants":"Mr de Mondiet                                                              Marguerite de Moncade\r\n        \r\n        \"","divers":"Porte et rempart, château de de Nobilos     43° 53' 36 nord, 0° 29' 54 ouest, Maison forte 43° 53' 37 nord, 0° 30' 02 ouest  et vestiges à Mont de Marsan. château de Conenx grav 8 et 9,","gps":"","images":["../image/image_40/40_Mont_de_Marsan_1.jpg","../image/image_40/40_Mont_de_Marsan_2.jpg","../image/image_40/40_Mont_de_Marsan_3.jpg","../image/image_40/40_Mont_de_Marsan_4.jpg","../image/image_40/40_Mont_de_Marsan_5.jpg","../image/image_40/40_Mont_de_Marsan_6.jpg","../image/image_40/40_Mont_de_Marsan_7.jpg"]},"Consult_chateau_formulaire36ba":{"id":"Consult_chateau_formulaire36ba","dept":"40","canton":"Parentis en Born","commune":"Biscarosse","nom":"Montbron","type":"Château","periode":"XVI","histoire":"MONTBRON, lors de l'occupation de l'Aquitaine par les Anglais, le château de Montbron a accueilli une garnison du Prince Noir.   Dans la première moitié du XIVe siècle, Biscarrosse relève, comme la seigneurie d'Uza et la plus grande partie du pays de Born, de la vicomtesse de Fronsac. En 1274  de Lamothe de Buch, passa à la famille de Pommiers dont l'héritière Jeanne épouse en 1415 François de Montferrand; leur fille Isabeau épouse en 1456 Guicharnaud de Saint-Martin. En 1663, Jean de Campos achète la seigneurie à Guillaume de Saint-Martin, cest en effet à cette époque, que Jean de Campos, devenu vicomte de Biscarrosse, a entrepris de rénover lédifice en lui donnant laspect quil présente encore de nos jours et en lagrémentant de léquilibre qui fait son charme. En 1750, elle appartient à la famille de Verthamon.\r\nPar héritage ou mariage, le château sera transmis aux familles Demartin du Tyrac de Marcellus en 1843, de Chérade de Montbron en 1906, d'Antin de Vaillac en 1951.","architecture":"MONTBRON Il date du XVIe siècle,  château de Montbron abrite des cheminées Louis XIII. Ce château dit du Prince Noir lui aurait servi de halte de chasse. Datant du XVIe siècle, il présente un corps de logis à deux niveaux, encadré par deux tours en façade, à lorigine, il en comportait 4. La tour sud (à gauche depuis la grille) servait de prison. Il était en outre entouré de douves et un mur denceinte. Au XVIIe siècle, les fenêtres à meneaux de la façade ont été ouvertes et des bâtiments latéraux ont été rattachés au corps principal formant avec lui la cour dentrée.  De grandes cheminées de pierre du  XVIIe et du XVIIIe siècle ont été conservées au rez-de-chaussée.\r\nUne grande allée de peupliers offre une vue sur le lac. La tradition orale, confirmée par les souvenirs de témoins maintenant disparus, évoque un souterrain reliant le soubassement de lancienne tour du nord ouest avec les dunes boisées au delà du petit lac.","habitants":"Famille de Verthamon\r\n        \r\n        \"","divers":"Château de Montbron à Biscarosse 44° 23' 42 nord, 1° 10' 09 ouest","gps":"","images":["../image/image_40/40_Montbron_1.jpg","../image/image_40/40_Montbron_2.jpg","../image/image_40/40_Montbron_3.jpg","../image/image_40/40_Montbron_4.jpg"]},"Consult_chateau_formulairec50c-2":{"id":"Consult_chateau_formulairec50c-2","dept":"40","canton":"St-Martin de Seignanx","commune":"St Laurent de Gosses","nom":"Montpellier_Adour","type":"Château","periode":"XVIII","histoire":"A Saint-Laurent sur Gosses quatre châteaux celui de Montpellier, de Lagurgue,de Bellocq et de Millox.           MONTPELLIER, il date du XVIIIe siècle, inscrit aux M.H.depuis 1991. les terres de Montpellier furent acquises  en 1699 par Jean Roll-Montpellier, une riche famille de négociants bayonnais, qui appartenait auparavant  à Jean de Bruix, qui accéda à l'échevinat de la ville en 1725.  Le 20 Septembre 1744, dans ses jardins à la française fut donnée une belle fête champêtre, à l'occasion de la convalescence du Roi de France,  la famille de Rol habita ce château pendant huit générations.                                             LAGURGUE du XVIII siècle est une ancienne caverie, maison noble achetée en 1694 par Dominique de Lacroix, fondateur de la monnaie de Bayonne, et à laquelle est rattaché le souvenir du prédicateur Xavier Ravignan. Il fut la résidence du maréchal d'Exelmans (1775 - 1852) comte et pair de France. \r\n Le château vieux \"BELLOCQ\" et son donjon est situé au centre du village face à l'Eglise. Il est toujours habité par des descendants de la famille de Roll-Montpellier.                                                                       MILLOX, château de Roll-Montpellier du XVIIIe siècle chambres d'hôtes  de  madame Véronique Sejalon.","architecture":"MONTPELLIER, le château fut construit dans la première moitié du XVIIIe siècle de style Louis XIV. Il fut complété par un ensemble de communs au XIXe siècle. Le château est représentatif des maisons de plaisance bâties dans les pays du Bas Adour pour la bourgeoisie locale à l'époque classique. D'une architecture simple, l'édifice se compose d'un corps de logis rectangulaire flanqué de deux pavillons . A l'intérieur, le vestibule conserve une rampe d'escalier en fer forgé du début du XVIIIe siècle.   Eléments protégés MH: les façades et les toitures ; l'escalier du vestibule et sa rampe; la terrasse et cale pavées avec le portail sur le fleuve ; portail d'entrée ouest avec sa grille: inscription par arrêté du 27 décembre 1991.    LAGURGUE corps de logis central  à deux niveaux accolé sur les flancs de pavillons carrés toits en croupes  avec lucarnes en façades avec  chien assis et fronton rotondant.                                                        MILLOX de plan rectangulaire à deux niveaux avec lucarnes sur un toit en croupes accolé de part et d'autre de pavillons carrées prolongé de dépendances  l'ensemble couvert d'ardoises.","habitants":"Famille de Roll-Montpellier\r\n        \r\n        \"","divers":"Château de Montpelier 43° 59' 05 nord, 0° 11' 59 ouest, de Lagurgue grav 4, de Bellocq et de  Millox à Saint-laurent de Gosse","gps":"","images":["../image/image_40/40_Montpellier_Adour_1.jpg","../image/image_40/40_Montpellier_Adour_2.jpg","../image/image_40/40_Montpellier_Adour_3.jpg","../image/image_40/40_Montpellier_Adour_4.jpg"]},"Consu
