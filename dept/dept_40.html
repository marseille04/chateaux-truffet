t délimitant la cour d'honneur jusqu'à deux tours cylindriques ajoutées au XIXe siècle, une troisième tourelle, plus basse s'adosse au centre de la façade postérieure,  il sagit dun lieu élevé facile à défendre.","habitants":"Mr Tachon\r\n        \r\n        \"","divers":"Château d'Agès à Monségur 43° 37' 64,3\" Nord, 0° 33' 01,0\" Ouest, grav 1 et 2","gps":"","images":["../image/image_40/40_Ag%c3%a8s_Mons%c3%a9gur_1.jpg","../image/image_40/40_Ag%c3%a8s_Mons%c3%a9gur_2.jpg"]},"Consult_chateau_formulaire29c0":{"id":"Consult_chateau_formulaire29c0","dept":"40","canton":"Tartas","commune":"Morcenx","nom":"Agès_Moré","type":"Château","periode":"XVI","histoire":"Deux châteaux à Morcenx celui d'Agès et celui de Moré  et à un kilomètre à l'ouest le château de Laharie.                                                                       AGES, ce petit château de caractère, époque Napoléon III, est entouré d'un parc de 3 ha environ, agrémenté d'arbres centenaires et bordé d'un ruisseau. Chambres d'hôtes de Mme Christiane Kintz.                                                                               MORE, était le siège dune caverie de la baronnie de Brassenx. Jean Duvignac, juge royal et avocat au parlement de Bordeaux, était seigneur de Mauré, en 1653. Cette petite seigneurie devient ensuite la propriété de Jean Luxcey, notaire royal en 1765 et rédacteur  de Morcenx en 1789.","architecture":"AGES, dans l'écrin d'un parc de trois hectares, tours d'angle, façade de pierre, ce petit château de caractère témoigne de la vie d'un domaine sous Napoléon III, époque de mutation de la grande Lande en plus grand massif forestier d'Europe. Le chemin de fer qui s'implante amènera les pierres de la façade du château depuis la lointaine Charente alors que les ardoises seront acheminées depuis Angers.               MORE, corps de logis rectangulaire à deux niveaux, bâtisse campagnarde doté d'une fenêtre à meneaux et d'une tour d'angle au toit aplati et une tour carrée du côté opposé toit aplati également.","habitants":"Maître  Jean Duvignac\r\n        \r\n        \"","divers":"Château d'Agès  44° 00' 24\" Nord et 0° 53' 27\" Ouest     grav 1 à 4,  et de Moré   44° 01' 29? nord, 0° 54' 57? ouest    à Morcenx grav 5 et 6.","gps":"","images":["../image/image_40/40_Ag%c3%a8s_Mor%c3%a9_1.jpg","../image/image_40/40_Ag%c3%a8s_Mor%c3%a9_2.jpg","../image/image_40/40_Ag%c3%a8s_Mor%c3%a9_3.jpg","../image/image_40/40_Ag%c3%a8s_Mor%c3%a9_4.jpg","../image/image_40/40_Ag%c3%a8s_Mor%c3%a9_5.jpg","../image/image_40/40_Ag%c3%a8s_Mor%c3%a9_6.jpg"]},"Consult_chateau_formulaire2eb0":{"id":"Consult_chateau_formulaire2eb0","dept":"40","canton":"","commune":"Aire sur l","nom":"Aire_Adour","type":"Château","periode":"XVIII","histoire":"AIRE sur l'ADOUR, mais en bas, dans la cité fortifiée bordant l'Adour, qu'un accord fut passé au XIIe siècle entre le roi d'Angleterre, Édouard Ier, et l'évêque aturin, l'un accordant sa protection, l'autre une part de ses revenus. Entre 1790 et 1794, Aire absorbe la commune éphémère du Mas. Le 2 mars 1814, les troupes anglaises et portugaises de Wellington, remontant d'Espagne, remportent une bataille contre celles du maréchal Soult sur les hauteurs au sud-ouest de la ville, avec un bilan de plusieurs centaines de morts.                                                                         ALARIC pas d'information historique.","architecture":"Lhôtel de ville (depuis 1927) occupe une partie de l'ancien évêché. C'est un bâtiment du XVIIe siècle, avec un escalier de pierre et des plafonds à caissons, une tour ronde avec un escalier du XVIe siècle, coiffé en poivrière.  Au petit musée archéologique de l'hôtel de ville, pierres sculptées de coquilles Saint-Jacques.  La maison de l'Officialité, du XIVe siècle, inscrite aux monuments historiques le 22 février 194615, 6 rue Labeyrie, avec des fenêtres à meneaux, était la juridiction où siégeaient les Jurats.                             Château d'Alaric de plan carré à deux niveaux et attiques toit à quatre pans.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"A Aire sur Adour l'Hôtel de ville, bâtisse du XVe siècle, les arènes et le château d'Alaric","gps":"","images":["../image/image_40/40_Aire_Adour_1.jpg","../image/image_40/40_Aire_Adour_2.jpg","../image/image_40/40_Aire_Adour_3.jpg","../image/image_40/40_Aire_Adour_4.jpg","../image/image_40/40_Aire_Adour_5.jpg"]},"Consult_chateau_formulaire6d78":{"id":"Consult_chateau_formulaire6d78","dept":"40","canton":"Montfort en Chalosse","commune":"Amou","nom":"Amou","type":"Château","periode":"XVII","histoire":"AMOU,  propriétaire initial : Léonard de Caupenne et François d'Escoubleau dernier marquis de Sourdis, Jeanne de Montluc avec de nombreuses seigneuries en Chalosse fait  la construction du château d'Amou qui  a débuté en 1678 et s'est achevée en 1693, sur les plans de l'architecte Jules Hardouin-Mansart pour Léonard de Caupenne, gouverneur de Bayonne et marquis d'Amou, ce château est resté depuis dans la même famille, transmis en ligne directe de génération en génération. Il est inscrit au titre des M.H.par arrêté du 18 septembre 2000. Habité par le marquis de Verthamon.                                                                       A quelques kilomètres au sud-Est le château de Marpaps pas d'information historique.","architecture":"Amou, son architecture est une association harmonieuse de style classique et réminiscence de style Louis XIII, la façade côté sud présente onze travées, toutes les ouvertures fenêtres lucarnes et soupiraux sont garnies de Meneaux, l'édifice rectangulaire comporte au centre un petit avant corps surmonté d'un fronton triangulaire.  Les lucarnes  sont également surhaussées de petits frontons  alternativement cintrés et triangulaires. A l'arrière s'étirent deux courtes ailes,  il conserve des décors intérieurs du XVIIe siècle. Ses dépendances ont gardé de nos jours leur fonction initiale d'exploitation agricole et il possède sa propre chapelle. Le portail d'entrée provient de l'abbaye Saint-Jean de la Castelle d'où il a été démonté et transporté en 1839. Une mosaïque gallo-romaine du IVe siècle provenant de la villa du Gleyzia d'Augreilh a été installée dans le vestibule en 1902. D'autres fragments de cette mosaïque ont été réutilisés dans la maison du docteur Sentex à Saint-Sever.","habitants":"Famille de  Léonard de Caupenne\r\n        \"","divers":"Château d'amou 43° 35' 43\" Nord et 0° 44' 43\" Ouest grav de 1 à 5, Marpaps grav 6 et 7.","gps":"","images":["../image/image_40/40_Amou_1.jpg","../image/image_40/40_Amou_2.jpg","../image/image_40/40_Amou_3.jpg","../image/image_40/40_Amou_4.jpg","../image/image_40/40_Amou_5.jpg","../image/image_40/40_Amou_6.jpg","../image/image_40/40_Amou_7.jpg"]},"Consult_chateau_formulaire963c":{"id":"Consult_chateau_formulaire963c","dept":"40","canton":"Labrit","commune":"Brocas-Montaut","nom":"Aon_Arcet","type":"Château","periode":"XVI","histoire":"Deux châteaux dans la commune de Brocas Aon et Arcet.                                                                                ARCET  cet ancien fief appartenait à l'origine à la famille de Brocas et était une paroisse rattachée à Montaut.                                                                           AON, il est construit à la fin du XVIe siècle par Pierre de Castelnau, qui achète la seigneurie et prend le titre de baron de Brocas était le domaine à la famille de Bordes-Lassalle. Puis le château passe dans le famille dAon, doù il tient son nom , le château est construit comme résidence principale, mais les barons de Brocas possèdent de nombreuses propriétés dans la région et ne loccupent pas en permanence.  La propriété reste aux mains des Castelnau jusquen 1779, puis par mariage, elle revient à la famille dAon. Le château prend alors le nom des nouveaux propriétaires. Celui-ci reste inhabité pendant la Révolution, mais les dAon, désormais barons de Brocas, viennent sy établir ensuite. Le 18 juillet 1809, le château devient par héritage, propriété de Marie-Claude de Castelnau et son mari, Jean-François-Marie d'Aon, baron de Hontanx.  Un membre de cette famille périt dailleurs lors de la crue de lEstrigon en 1843.Le château se compose dun corps de bâtiment auquel sont flanqués deux pavillons dun étage. Il se prolonge par une aile au nord, destinée à loger les domestiques. Sur le fronton de la façade est gravée une croix de lordre de Malte, auquel appartenait la famille de Castelnau.","architecture":"Le Château d'Aon à Labrit est attesté au XVIIe siècle, à la mort de Pierre II de Castelnau , c'était l'ancienne demeure du Baron de Brocas. Le château d'Aon est composé d'un corps de logis en forme de chartreuse. De chaque coté, se trouvent deux pavillons carrés à un étage, du coté Nord, se trouve une aile à un étage. Bien que la date exacte de construction ne soit pas connue, le château est attesté pour la première fois dans l'inventaire successoral de Pierre II de Castelnau, mort le 31 mars 1645, qui le fit construire, il se compose d'un corps de logis principal en forme de chartreuse, située au Nord. Le château, continuellement habité, est resté en état au cours des siècles et na connu quune seule modification. En effet, on a dû changer le côté de la façade lorsque la route entre Brocas et Labrit est tracée. La disposition des pièces est identique à ce quelle était à lorigine. Le château possède peu de boiseries et les motifs sur les cheminées datent de lépoque du Directoire.","habitants":"Famille de Brocas                                                                       Famille d'Aon   \r\n        \r\n        \"","divers":"Aon-Labrit 43° 49' 28\" Nord, 0° 16' 15\" Ouest   grav 1et 2,   Arcet  43° 44' 23,3\" Nord, 0° 38' 36,17\" Ouest grav 3 et 4","gps":"","images":["../image/image_40/40_Aon_Arcet_1.jpg","../image/image_40/40_Aon_Arcet_2.jpg","../image/image_40/40_Aon_Arcet_3.jpg","../image/image_40/40_Aon_Arcet_4.jpg"]},"Consult_chateau_formulaire0c3f":{"id":"Consult_chateau_formulaire0c3f","dept":"40","canton":"Montfort-en-Chalosse","commune":"Arsague","nom":"Argoubet","type":"Gentilhommière","periode":"XVI-XIX","histoire":"ARGOUBET-VERGES,  lhistoire de la commune dArsague se confond avec celle des illustres familles dAmou, de Caupenne et de Foix. En 1304 est fondé lordre de la Sainte Trinité qui va permettre le développement du village, propriété de la famille dArgoubet. Le général dArgoubet, le fit construire suivant le style palladien, inspiré par les villas rencontrées lors des campagnes quil fit en Italie sous Bonaparte.  Ces travaux font suite à ceux effectués en 2008 (garderie et préau).","architecture":"La commune dArsague est située au coeur de la Chalosse, dans un cadre verdoyant et vallonné. Le château d'Argoubet-Vergès est une gentilhommière de faible élévation, doté de toitures, à petites lucarnes et qui présente, en son centre, un portique saillant à quatre colonnes ioniques, support d'un fronton triangulaire.\r\nEnfin, le village abrite également le château dArgoubet, restauré au XIXe siècle, dans un goût italien avec portique et péristyle à colonnes.","habitants":"Famille dAmou\r\n        \"","divers":"Château d'Argoulet-Vergès  43° 35' 10\" Nord et 0° 47' 19\" Ouest  grav 1et 2;  Arsague grav 3 et 4.","gps":"","images":["../image/image_40/40_Argoubet_1.jpg","../image/image_40/40_Argoubet_2.jpg","../image/image_40/40_Argoubet_3.jpg","../image/image_40/40_Argoubet_4.jpg"]},"Consult_chateau_formulaireced6":{"id":"Consult_chateau_formulaireced6","dept":"40","canton":"Aire sur l","commune":"Artassenx","nom":"Artassenx","type":"Manoir","periode":"XVIII-XX","histoire":"ARTASSENX, bâti sur un tumulus romain par Odon de Clarac au XIIIe siècle, lédifice est remplacé par un manoir au XVIIIe siècle. Il est construit pour la famille La Faye de Guerre par larchitecte du théâtre de Bordeaux, Victor Louis. Il est à nouveau détruit au début du XXe siècle et reconstruit selon le goût et le confort de cette époque. Il conserve cependant une belle terrasse du XVIIIe siècle et un parc qui rappelle le domaine dantan.\r\nAujourdhui, le château dArtassenx se consacre à lélevage de chevaux de courses, continuant ainsi une tradition du XIXe siècle, comme latteste Saintourens en 1847 : « le joli château renferme une belle orangerie ».","architecture":"Le château dArtassenx est aujourdhui une imposante maison bourgeoise construite sur un domaine seigneurial ancien,  dans le style Louis XV, corps de logis de plan carré  à deux niveaux et lucarnes à fronton  retondant plein cintre en façade sur un toit en ardoise.","habitants":"Famille La Faye de Guerre\r\n        \"","divers":"Château d'Artassenx","gps":"","images":["../image/image_40/40_Artassenx_1.jpg"]},"Consult_chateau_formulaire0d40":{"id":"Consult_chateau_formulaire0d40","dept":"40","canton":"Peyrehorade","commune":"Peyrehorade","nom":"Aspremont_Montréal","type":"Vestiges","periode":"XI-XIII","histoire":"Deux châteaux à Peyrehorade, celui d'Aspremont et de Montréal et à 8 kilométres au sud est le château de St-Cricq de Gave  société civile immobilière est active depuis 4 ans par Magda Espaignet.\r\n ASPREMONT, un premier château  du XIe siècle,. En 1243, les troupes Béarnaises de Gaston VII attaquent et le détruisent. A partir de 1250, le vicomte d'Orhe en  fait construire un nouveau. Au XIVe siècle, il rend hommage au duc d'Aquitaine qui est aussi Roi d'Angleterre.  Le vicomte dOrthes ne déclare-t-il pas « Le château dAspremont est la seule place forte de la vicomté face aux forteresses voisine de Bidache, Guiche, Belloc et Hastingues ».  En 1442, les troupes du Roi de France Charles VII  assiègent et détruisent le château \"du vassal Anglais\" dAgès.  La forteresse fut la proie des coups de mains, des incendies, des pillages en 1442, 1553 et 1559.  Ne pouvant la relever, les vicomtes vont s'installer dans leur château de la plaine.                                                                                  MONTREAL, fut jadis la résidence de la plaine des vicomtes d'Orthe, cest Pierre dAspremont qui le construisit avec son fils Adrien, Gouverneur de Bayonne, vint y mourir en 1678. Lorsquarriva la Révolution, la dernière vicomtesse Luce-Antoinette émigra en 1792. Tous ses biens furent mis en vente comme bien nationaux.  Monsieur de Caupenne réussit à le vendre à Pierre Villars, important propriétaire de la commune.  L'édifice  est  un hôpital militaire, et un couvent et un collège technique. C'est aujourd'hui l'Hôtel de Ville de Peyrehorade.  Il est inscrit aux M.H. depuis 1947 et 2012., les très belles salles voûtées, surmontées au 1er niveau du salon de Diane.","architecture":"ASPREMONT, à la fin du XVe siècle, le château est reconstruit en style gothique.  Quelques années après,il renaît partiellement de ses cendres.  En 1540, pour construire le château de Montréal  un bâtiment et une tour ronde sont détruits pour récupérer les pierres. En 1569, durant les guerres de religion, les protestants détruisent  cette malheureuse construction fortifiée.  Au XVIIIe siècle le château d'Apremont est en ruine. Il subit plusieurs assauts qui le dégradent fortement. Les vicomtes d'Orthe finissent par le délaisser au XVIe siècle pour s'établir ailleurs.                                  MONTREAL, construit vers 1515-1520 interrompu  pendant l'invasion espagnole elle ne se poursuivit qu'après 1569 le corps principal   de plan carré de quatre niveaux toit en croupe est cantonné de quatre importantes tours circulaires à toit de style oriental. Il abrite un escalier à vis, les boiseries et lambris du salon de Diane ont été rajoutés au XVIIIe siècle lors d'une restauration.  Le bâtiment subit les premières transformations au XVIIe siècle qui furent démolis, les fortifications qui couronnaient les tours, ainsi que les courtines. On éleva à lEst et à lOuest des jardins «à la Française». Tous les fossés ayant été comblés. Au XVIIIe siècle, la cour dhonneur trouve sa solennité : allée pavée qui passe sous le grand portail, les 3 balcons centraux aujourdhui restaurés. De chaque côté de la cour, deux pavillons avaient été construits. Il reste celui de lEst. Celui de lOuest a brûlé en 1814 ainsi que lEglise Ste-Catherine du XIVe siècle.","habitants":"Vicomte d'Orthe                                                                 Famille du comte Pierred'Aspremont\r\n        \"","divers":"Vestiges du château d'Aspremont  43° 32' 52\" Nord et 1° 06' 01\" Ouest à Peyrhorade grav 1 et 2. Château de Montréal  43° 32' 38 nord, 1° 06' 15 ouest à Peyrehorade et de st-Cricq de Gave grav 8 et 9.","gps":"","images":["../image/image_40/40_Aspremont_Montr%c3%a9al_1.jpg","../image/image_40/40_Aspremont_Montr%c3%a9al_2.jpg","../image/image_40/40_Aspremont_Montr%c3%a9al_3.jpg","../image/image_40/40_Aspremont_Montr%c3%a9al_4.jpg","../image/image_40/40_Aspremont_Montr%c3%a9al_5.jpg","../image/image_40/40_Aspremont_Montr%c3%a9al_6.jpg","../image/image_40/40_Aspremont_Montr%c3%a9al_7.jpg","../image/image_40/40_Aspremont_Montr%c3%a9al_8.jpg"]},"Consult_chateau_formulaire85d6":{"id":"Consult_chateau_formulaire85d6","dept":"40","canton":"Aire sur l","commune":"Duhort-Bachen","nom":"Bachen","type":"Château","periode":"XVIII-XIX","histoire":"A Duhort-Bachen trois châteaux dont Bachen celui de st-Jean de Castelle,  château du Souilh du XVIIIe - XIXe siècle  et de Lau (voir article).                               BACHEN, la propriété viticole de la famille Guérard,   entièrement reconstruit dans la seconde moitié du XVIIIe siècle, est de type maison noble de Chalosse. Ancien siège d'une baronnie. En 1991, le chai fut réaménagé par l'architecte Jean de Gastines. Classée\r\nà linventaire supplémentaire des M.H.                     SOUILH,  résidence secondaire de monsieur Amory de Belleville qui en hérite en 1985. La sauvegarde  a été entreprise par les générations successives d'une même famille.  Le château a une valeur ethnologique. Il est le témoin de la culture chalossaise des XVIIIe et XIXe siècles. Il est inscrit aux M.H. depuis le 13.12.1992. Le château est privé, fermé au Public.","architecture":"BACHEN a été entièrement reconstruit dans la 2ème moitié du XVIIIe siècle. Elle est de type maison noble de Chalosse, le château de Bachen  s'est établi sur un plateau dominant l'Adour, sur l'emplacement d'un ancien site castral. Le domaine se compose d'un logis à toiture haute, ressemblant à une maison béarnaise, et d'une aile basse composée de communs. Aux abords se trouvent un chai et une ancienne dépendance agricole typiquement landaise. Le château de Bachen est au centre d'un domaine viticole d'appellation d'origine contrôlée Tursan, il est incrit aux M.H. depuis le 5-07-1994.                                             SOUILH, au début du XVIIIe siècle et du XIXe siècle de ses deux ailes d'origine, seule subsiste  l'aile sud. Communs et tourelles ont été ajoutées cinquante ans plus tard, chaix et orangerie à colombages ont vu le jour, les éléments classées sont façades et toitures du logis, et des communs attenants.","habitants":"Bachen, Famille Guérard                                         Lau, Antoine de Castelnau                                   Souilh, Famille d'  Amory de Belleville\r\n        \"","divers":"Château de Bachen 43° 43' 08\" Nord et 0° 18' 06\" Ouest.    Souilh 43° 43' 18\" Nord et 0° 19' 43\" Ouest grav 1 à 4 et le château de Souilh  grav 5, de St-Jean de Castelle  43° 44' 29 nord, 0° 18' 45? ouest             à Duhort-Bachen  grav 6.","gps":"","images":["../image/image_40/40_Bachen_1.jpg","../image/image_40/40_Bachen_2.jpg","../image/image_40/40_Bachen_3.jpg","../image/image_40/40_Bachen_4.jpg","../image/image_40/40_Bachen_5.jpg","../image/image_40/40_Bachen_6.jpg"]},"Consult_chateau_formulaireb380":{"id":"Consult_chateau_formulaireb380","dept":"40","canton":"Mimizan","commune":"Castet les Landes","nom":"Beauregard_Landes","type":"Château","periode":"XIX","histoire":"Beauregard  hôtel restaurant de Wilfried Cholé gîtes de France","architecture":"Beauregard, château de 160 ans restauré avec gout comprenant un jolie parc arboré. De plan rectangulaire à deux niveaux avec série de lucarnes sur un toit en croupe recouvert d'ardoise, l'édifice est accolé de deux tours rondes aux angles côté façade d'entrée et deux pavillons  rectangulaires côté parc. Un pavillon central côté entré saillant au angle arrondie avec toit pointu à six pans. A l'écart une orangeraie oblongue à grande ouverture rotondante.\r\nDans son parc arboré, le château de Beauregard vous acceuille pour un séjour hors du temps.","habitants":"Wilfried Cholé \r\n        \"","divers":"Château de Beauregard à Castet","gps":"","images":["../image/image_40/40_Beauregard_Landes_1.jpg","../image/image_40/40_Beauregard_Landes_2.jpg","../image/image_40/40_Beauregard_Landes_3.jpg","../image/image_40/40_Beauregard_Landes_4.jpg"]},"Consult_chateau_formulaireddb6":{"id":"Consult_chateau_formulaireddb6","dept":"40","canton":"Peyrehorade","commune":"Port de Lanne","nom":"Bec_de_Gave","type":"Manoir","periode":"XVIII-XIX","histoire":"BEC de GAVE, château construit au confluent de l'Adour et des Gaves Réunis, logis séparé de la rivière par une terrasse, En 1723 qualifiait de luxueuse maison de campagne qui appartenait au XVIIIe siècle à un négociant Holladais Antoine Von Oosterom  établi à Bayonne  en 1710, son fils Richard termina la construction, fin des travaux 1744.    M. Labarthe maître de poste, propriétaire du château pendant la Révolution, fit sans doute édifier le bâtiment de dépendances (actuellement ruiné) qui porte la date 1791, et la chapelle.   En 1852, le baron d'Artigues aurait reconstruit le logis actuel, peut être l'actuel logement de domestiques,  les dépendances  furent ravagés par la foudre en 1966, il  a été la propriété de monsieur Maurice Depierre.","architecture":"Bec de Gave, sur le cadastre de 1819 le château se présente tel qu'il est actuellement. Les pièces voûtées sur lesquelles repose le logis actuel du XIXe siècle ont pu également porter le premier bâtiment du XVIIIe siècle, celui en tous les cas que Vayase de Villiers, de plan rectangulaire à trois niveaux de cinq travées, le dernier niveau étant pris dans la toiture  à la mansart avec le même nombre de fenêtres sur ce toit brisé.","habitants":"le baron d'Artigues\r\n        \"","divers":"Château de Bec de Gave          43° 32' 51? nord, 1° 11' 34 ouest   à Port de Lanne","gps":"","images":["../image/image_40/40_Bec_de_Gave_1.jpg","../image/image_40/40_Bec_de_Gave_2.jpg"]},"Consult_chateau_formulaire4286":{"id":"Consult_chateau_formulaire4286","dept":"40","canton":"Tartas","commune":"Rion les Landes","nom":"Bellegarde_Rion","type":"Château","periode":"XVIII-XIX","histoire":"BELLEGARDE, il a été construit et achevé au XIXe siècle. Le bâtisseur du château est Jacques Maque, patron d'un atelier de résine et maire de la commune, de 1833 à 1838. Il en fait don en 1854 à sa fille Madeleine, épouse de Bernard Victor Poisson. Le fils aîné du couple, prénommé Jacques-Albert, fait ajouter la tour latérale. Au décès de ce dernier en 1931, ses biens sont vendus aux enchères et le château est racheté par la commune, sous le mandat du docteur Bellegarde, qui souhaite y installer la mairie. Mais le château de Bellegarde, au gré des évènements historiques, accueille tour à tour des Républicains réfugiés de la guerre d'Espagne, des déplacés d'Alsace de la drôle de guerre avant de servir de kommandantur à l'armée d'occupation allemande. De 1962 à 1997, le château de Bellegarde abritera un collège, puis un centre de loisirs, puis une bibliothèque et un espace ouvert aux associations, pour enfin accueillir la mairie et ses services, n'est pas inscrit aux M.H.                                                                                   A 10 km à l'Est à Beylongues le château  de Bétan chambres d'hôtes de Marguerite et André Richoz.","architecture":"BELLEGARDE, ce manoir  est un édifice splendide pour devenir une  mairie en 1997, de plan rectangulaire à deux niveaux, trois lucarnes sur un toit en croupes recouvert d'ardoises, la lucarne  centrale  avec fronton triangulaire, l'édifice est accolé en façade d'une tour  carrée à trois niveaux toit trés haut à quatre pans avec oeil de Boeuf.                                     BETAN, construit dans les années 1870, le château de Bétan se compose dun corps de logis flanqué d'une échauguette  ronde en encorbellement, et d'une tour ronde hexagonale. Toutes deux sont recouvertes de toits pointus en ardoises, décorés de girouettes. Le corps de logis se couvre également dun toit dardoises.","habitants":"Famille de Jacques Maque\r\n        \"","divers":"Château de Bellegarde à Rion les Landes  43° 56' 01\" Nord et 0° 55\" 14\" Ouest. Château de Bétan grav 3","gps":"","images":["../image/image_40/40_Bellegarde_Rion_1.jpg","../image/image_40/40_Bellegarde_Rion_2.jpg","../image/image_40/40_Bellegarde_Rion_3.jpg"]},"Consult_chateau_formulaire6915":{"id":"Consult_chateau_formulaire6915","dept":"40","canton":"Aire sur l","commune":"Renung","nom":"Benauge","type":"Commanderie","periode":"XIV","histoire":"BENAUGE est un château bâti à Renung, du XVe siècle, qui a connu plusieurs propriétaires, y compris des moines bénédictins et un des membres de la famille d'Henri IV. Benauge a été construit pour être une commanderie et ferme fortifiée, un endroit où les villageois pouvaient trouver refuge pendant les temps difficiles. En 1465, une bonne partie de Benauge a été rasée. Il semble aussi qu'en 1604, la famille Poyferré est été liée à cette bâtisse durant plus de 200 ans. Elle a été soigneusement restaurée, et se situe au milieu de la vallée de l'Adour. Vous découvrirez au château de Bénauge des chambres et des tables d'hôtes.","architecture":"Benauge, le Moyen-Âge a façonné le village de Renung. Le château de Benauge et les fortifications qui entourent le village en témoignent aujourdhui. À la fin du XIIIe siècle et au début du XIVe siècle, le château est lélément central de lune des cinq juridictions qui divisent alors le Marsan. Le village de Renung possède à cette période les terres qui se trouvent sur la rive gauche de lAdour et allant jusquà labbaye de Saint-Jean-de-la-Castelle.\r\nDans le château, la cour est régentée par un viguier, léquivalent dun magistrat actuel. Le seigneur des terres est quant à lui placé sous lautorité du roi.\r\nAujourdhui, lédifice est entièrement restauré.","habitants":"Famille Poyferré\r\n        \"","divers":"Commanderie de Benauge   43° 45' 24 nord, 0° 21' 46? ouest à Renung","gps":"","images":["../image/image_40/40_Benauge_1.jpg","../image/image_40/40_Benauge_2.jpg","../image/image_40/40_Benauge_3.jpg"]},"Consult_chateau_formulaireb24c":{"id":"Consult_chateau_formulaireb24c","dept":"40","canton":"Mont de Marsan","commune":"St-Perdon","nom":"Berteuil","type":"Vestiges","periode":"XVIII","histoire":"BERTEUIL, appelé également château Lacaze, fut construit sous le second Empire dans un style Renaissance, à la demande de monsieur Lacaze. En effet il souhaitait y accueillir Napoléon III qui avait le projet de séjourner dans la région en 1871. Ce dernier ne vint jamais en raison de la guerre franco-prussienne.","architecture":"Berteuil, Il avait un plan très simple et fut construit sur 3 niveaux. Le corps de logis central est encadré par deux ailes rectangulaires et des tourelles à toits coniques sont situées aux angles de la façade. Les fenêtres et mansardes sont ornées de frontons triangulaires ou circulaires. La corniche est ornementée par des coquilles et des décors sculptés.  Ce magnifique château fut ravagé par un incendie et resta à labandon plusieurs années. Les randonneurs avaient pour habitude de sy promener et parfois dy rentrer malgré les risques deffondrement.  Il fut donc décidé de le raser en 2011.","habitants":"Monsieur Lacaze\r\n        \"","divers":"Vestiges du château de Berteuil   43° 52' 17\" Nord et 0° 36' 20\" Ouest","gps":"","images":["../image/image_40/40_Berteuil_1.jpg"]},"Consult_chateau_formulairef374":{"id":"Consult_chateau_formulairef374","dept":"40","canton":"Labrit","commune":"Betbezer D","nom":"Betbezer","type":"Château","periode":"XII-XVI","histoire":"BETBEZER- d'Armagnac est un petit village  à l'origine une bastide créée en 1320. A cinq kilomètre à l'est le chateau de Séridos à Lagrange pas d'information historique.                                                                      Le château de JULIAC, édifié au XIe siècle, il fut détruit par les templiers en 1170 reconstruit , il fut  à nouveau dévasté sous la fronde. Relevé une dernière fois, il disparut définitivement en 1827.                        PAGUY  C'est en 1567, sous le règne d'Henri IV, que Jehan Dufau pose la première pierre de la demeure qui deviendra le Manoir de Paguy.\r\nC'est en 1933, que Théodore Lapeyre, le grand père d'Albert Darzacq aquiert le manoir du XVI siècle, chambres d'hôtes  de charme et gîtes classés 3 et 4 épis. Nouvelle suite familiale du lac labellisée gîtes de France et Tourisme et Handicap de  Myriam Darzacq","architecture":"JULIAC, les communs agrandis, furent aménagés en habitation, la bâtisse actuelle se trouve dans le bourg  dotée de créneaux et flanquée de deux tourelles cylindriques ont accède par un portail couronné de créneaux et comportant un écussons des années de 1662 des vicomtes de Juliac.                                        PAGUY, de plan rectangulaire de dix travées  à deux niveaux et attiques avec  façade en équerre flanqué de tour carrées au angles, toit presque plats en tuiles. SERIDOS manoir à deux niveaux avec lucarnes sur un toits en tuiles.","habitants":"Juliac, les Templiers,                                                Paguy, Jehan Dufau,                                                    Théodore Lapeyre\r\n        \"","divers":"Château de Betbezer grav 1et bastide grav 2, de Juliac grav  3 à 6, de Paguy grav 7 et 8, et manoir de Séridos grav 9.","gps":"","images":["../image/image_40/40_Betbezer_1.jpg","../image/image_40/40_Betbezer_2.jpg","../image/image_40/40_Betbezer_3.jpg","../image/image_40/40_Betbezer_4.jpg","../image/image_40/40_Betbezer_5.jpg","../image/image_40/40_Betbezer_6.jpg","../image/image_40/40_Betbezer_7.jpg","../image/image_40/40_Betbezer_8.jpg","../image/image_40/40_Betbezer_9.jpg"]},"Consult_chateau_formulaire8664":{"id":"Consult_chateau_formulaire8664","dept":"40","canton":"Montfort sur Chalosse","commune":"Baigts","nom":"Beyrie_Baigts","type":"Château","periode":"XVII","histoire":"BEYRIE  est édifié sur les ruines dun château du XIVe siècle. Le château est le siège de la caverie des seigneurs de Caupenne, Beyrie était un domaine de 144 ha d'un seul tenant exploité par une dizaine de métayers.  Lhistoire de Beyrie est étroitement liée à celle dAuguste Dupeyrat, propriétaire du domaine au XIXe siècle, fondateur et directeur dune ferme école expérimentale. Il y construit, de 1849 à 1855, une étrange bâtisse dite « la réserve » qui jouxte les dépendances du château. Aujourd'hui le château de Beyrie est la propriété de la famille de Barbeyrac de Saint Maurice.","architecture":"BEYRIE,  est un manoir dont la construction date du XVIIe siècle. Le château de Beyrie fut construit en 1770, sur les restes d'un ancien château datant du XIVe siècle. C'est une petite maison noble, constituée d'un corps de logis principal, sur deux niveaux, en double profondeur. De plan rectangulaire, le château de Beyrie est doté de murs en moellons, hourdés à la chaux, d'une toiture à deux pans, d'une couverture en ardoises et tuiles de Marseille. Un ensemble de neuf cheminées à hotte droite datant de l'époque de la construction du château. Le château de Beyrie est inscrit aux M.H. depuis 2001","habitants":"Famille d'Auguste Dupeyrat\r\n        \"","divers":"Le château de Beyrie à Baigts 43° 41' 48\" Nord et 0° 46' 42\" Ouest","gps":"","images":["../image/image_40/40_Beyrie_Baigts_1.jpg","../image/image_40/40_Beyrie_Baigts_2.jpg ie de Castéja, appartient à la famille de Biaudos. Il est acheté au XIXe siècle par la noble famille de Basterrèche, qui décide  la construction dun château. Lédifice actuel date des années 1810 à 1850, mais il semblerait quune construction plus ancienne précède celle des Basterrèche. Selon certaines sources, lancien édifice daterait de la Révolution et aurait été construit par la famille de Wilhelmine de Courtiau, de vieille noblesse bayonnaise. Celle-ci aurait apporté le château à la famille Basterrèche lors dun mariage., resté longtemps à l'abandon à été depuis peu restauré.\r\nTUILERIE, édifié à Biaudos sur le modèle de la Villa de limpératrice Eugénie à Biarritz, la construction de ce bâtiment original est attribuée à un membre de la grande famille Basterrèche, Maurice Trubert. Cest en Turquie, où il est diplomate, quil puise certainement son inspiration. \r\nMONTPLAISIR, . Il fut édifié à Biaudos sur le modèle de la villa de l'impératrice Eugénie à Biarritz, construite à Biarritz en 1854. Napoléon III et son épouse lutilisent dailleurs sans doute comme pavillon de chasse pendant les travaux dassèchement des marais dOrx, dont lempereur est linitiateur et quil surveille attentivement.","architecture":"BIAUDOS, de style Renaissance,  lédifice est constitué dun corps de logis central flanqué de deux pavillons et de plusieurs dépendances. Lors de sa construction, le château possède une chapelle indépendante qui est détruite au cours du XXe siècle. Acheté après la grande guerre par une duchesse espagnole, le château sert par la suite de décors pour les extérieurs du film de Téchiné Hôtel des Amériques. Longtemps abandonné et inhabité, le château est aujourdhui en cours de restauration.  Ce château de Biaudos porte ce nom, sans doute en référence à la proche tuilerie à gisement dargile qui fonctionne jusquen 1914.                                                              La TUILERIE, édifié à Biaudos aux alentours des années 1860, est une fantaisie architecturale de style hispano-mauresque. de style oriental  et sintroduit dans laristocratie française. Larchitecture mauresque se manifeste ici par les arcs débordés, les levées de terre à redents, certains éléments du mâchicoulis ou encore lalternance des matériaux entre ciment et briques. Le bâtiment est formé de deux corps de logis, de type ottoman, reliés par un séchoir à grain en demi-cercle.  Lédifice est constitué dun corps de logis central flanqué de deux pavillons et de plusieurs dépendances. Lors de sa construction,    \r\nMONTPLAISIR Lédifice est constitué dun corps de logis central flanqué de deux pavillons et de plusieurs dépendances du XIXe siècle.","habitants":"Biaudos, Famille Basterrèche,                                    Tuilerie, Maurice Trubert.                              Montplaisir, Impératrice Eugénie \r\n        \r\n        \"","divers":"A Biaudos le château de Biaudos 43° 33' 18,28\" Nord 1° 18' 39,31\" Ouest grav de 1 à  4, des  Tuilerie grav 5 , et de Montplaisir 43° 32' 35 nord, 1° 19' 35? ouest grav 6.","gps":"","images":["../image/image_40/40_Biaudos_1.jpg","../image/image_40/40_Biaudos_2.jpg","../image/image_40/40_Biaudos_3.jpg","../image/image_40/40_Biaudos_4.jpg","../image/image_40/40_Biaudos_5.jpg","../image/image_40/40_Biaudos_6.jpg"]},"Consult_chateau_formulaire4c8b":{"id":"Consult_chateau_formulaire4c8b","dept":"40","canton":"St-Martin de Seignans","commune":"Biaudos","nom":"Biaudos_Castéja","type":"Château","periode":"XIX","histoire":"BIAUDOS, est construit au XIXe siècle par la famille Basterrèche, sur le site dun ancien bâtiment datant  de la Révolution, la seigneurie de Castéja, appartient à la famille de Biaudos. Il est acheté au XIXe siècle par la noble famille de Basterrèche, qui décide  la construction dun château. Lédifice actuel date des années 1810 à 1850, mais il semblerait quune construction plus ancienne précède celle des Basterrèche. Selon certaines sources, lancien édifice daterait de la Révolution et aurait été construit par la famille de Wilhelmine de Courtiau, de vieille noblesse bayonnaise. Celle-ci aurait apporté le château à la famille Basterrèche lors dun mariage., resté longtemps à l'abandon à été depuis peu restauré. cette seigneurie de Castéja est domicilié à Mézos.","architecture":"BIAUDOS, de style Renaissance,  lédifice est constitué dun corps de logis central flanqué de deux pavillons et de plusieurs dépendances. Lors de sa construction, le château possède une chapelle indépendante qui est détruite au cours du XXe siècle. Acheté après la grande guerre par une duchesse espagnole, le château sert par la suite de décors pour les extérieurs du film de Téchiné Hôtel des Amériques. Longtemps abandonné et inhabité, le château est aujourdhui en cours de restauration.  Ce château de Biaudos porte ce nom, sans doute en référence à la proche tuilerie à gisement dargile qui fonctionne jusquen 1914.","habitants":"Famille de Biaudos de castéja\"","divers":"","gps":"","images":["../image/image_40/40_Biaudos_Cast%c3%a9ja_1.jpg","../image/image_40/40_Biaudos_Cast%c3%a9ja_2.jpg"]},"Consult_chateau_formulairea1b6":{"id":"Consult_chateau_formulairea1b6","dept":"40","canton":"Montfort sur chalosse","commune":"Mugron","nom":"Boucosse","type":"Manoir","periode":"XVI","histoire":"BOUCOSSE est l'exemple type d'une caverie, dénomination landaise pour ces propriétés au statut intermédiaire entre baronnies et terres allodiales. La situation du château, sur un point stratégique, impliquerait une occupation seigneuriale remontant à la féodalité. La demeure a été conservée dans la même famille depuis 1580 environ, est un manoir ou caverie. Il a était construit au XVIe siècle.  Reconstruit par la municipalité en 1907 sous l'appellation « ouvrage pour jouer au jeu de paume », il est particulièrement utilisé jusque dans les années 1960. On pratiquait sur la cancha (aire de jeu) des parties à main nue, à la raquette (pala) ou au gant d'osier (chistera).","architecture":"Boucosse, il s'agit d'un édifice massif de plan carré, constitué d'un corps de logis à étage et combles, couvert d'une toiture à quatre pentes en tuiles canal. La façade sud est flanquée d'une tour ronde hors-oeuvre, coiffée d'un dôme à l'impériale couvert en écailles de zinc. Des modifications sont apportées au cours des dernières années avec la restauration de la charpente et de la couverture endommagée du corps de logis, ainsi que les façades. il se présente comme un édifice carré aux murs épais et dispose d'une tour circulaire coiffée d'un dôme à l'impériale, recouvert d'écailles en zinc.  Le fronton : construit par la municipalité en 1907 sous l'appellation « ouvrage pour jouer au jeu de paume ». L'ouvrage est construit en pierre de Mugron, sable de l'Adour, ciment de Boulogne.\r\nMugron a la particularité d'avoir été le dernier port navigable de l'Adour et, à ce titre, a accueilli par le passé de nombreux lieux de stockage pour le vin et autres productions locales très prisées dans les pays du nord de l'Europe.","habitants":"Seigneur locaux\r\n        \"","divers":"manoir de Boucosse 43° 44' 41\" Nord et 0° 46' 23\" Ouest à Mugron.","gps":"","images":["../image/image_40/40_Boucosse_1.jpg","../image/image_40/40_Boucosse_2.jpg","../image/image_40/40_Boucosse_3.jpg"]},"Consult_chateau_formulairec110":{"id":"Consult_chateau_formulairec110","dept":"40","canton":"Labrit","commune":"Mauvezin d","nom":"Briat","type":"Château","periode":"XVI-XVIII","histoire":"BRIAT construit en 1540 devenu un ancien relais de chasse du roi Henri IV, qui aimait venir chasser à Mauvezin-d'Armagnac depuis le château de Briat construit à la demande de sa mère, Jeanne d'Albret,   il en fit don en 1592 à Arnaud de Martines qui l'avait sauvé à la bataille de Coutras. Depuis 1864, il appartient à la famille Pichon Longueville. Transmis par les femmes, cest aujourdhui la 5e génération qui exploite le domaine en la personne de Stéphane de Luze.  Le château de Briat est inscrit aux M.H. depuis 1990.","architecture":"Le château de Briat  est un ensemble disparate, sur l'aile est du XVIe siècle vient de se greffer perpendiculièrement le corps central plus récent du XVIIIe -XIXe siècle celui-ci se compose de deux pavillons-tours d'inégales largeurs que sépare un bandeau surmonté d'un étroit fronton triangulaire, l'aile ancienne, avec sa grosse tour est percée de fenêtres à meneaux et dotée d'une bretèche à mâchicoulis.","habitants":"Baron de Pichon Longueville\r\n        \"","divers":"Château de Briat à Mauvezin 43° 57' 35\" Nord, 0° 07' 14\" Ouest.","gps":"","images":["../image/image_40/40_Briat_1.jpg","../image/image_40/40_Briat_2.jpg","../image/image_40/40_Briat_3.jpg","../image/image_40/40_Briat_4.jpg","../image/image_40/40_Briat_5.jpg"]},"Consult_chateau_formulaire48cb":{"id":"Consult_chateau_formulaire48cb","dept":"40","canton":"Hagetmau","commune":"Clédes","nom":"Bruix","type":"Vestiges-Château","periode":"XV-XIX","histoire":"Manoir de Drouilhet du XIXe siècle avec tourelles inégales,  à 2,5 kilomètres du village de Clèdes, dans la région, se trouvent les vestiges du château de Bruix.                                                                            BRUIX est un château bâti à Clèdes, il ne reste que des ruines,  c'était un château féodal où résidaient les barons de Bruix. Ses derniers descendants furent arrêtés et guillotinés pendant la Révolution Française. Le château  devient alors un bien national.  Leurs derniers descendants sont arrêtés et guillotinés pendant la Révolution Française.","architecture":"Bruix, lédifice devient alors un bien national,  est aujourdhui en ruine. Les pans de murs que lon peut voir encore montrent que lédifice était en blocs dégrossis de molasse.","habitants":"Barons de Bruix\r\n        \"","divers":"Château de Bruix 43° 37' 44\" Nord et 0° 22' 42\" Ouest, Drouilhet 43° 37' 14 nord, 0° 22' 41 ouest   à Clédes","gps":"","images":["../image/image_40/40_Bruix_1.jpg"]},"Consult_chateau_formulairefd22":{"id":"Consult_chateau_formulairefd22","dept":"40","canton":"Montfort en Chalosse","commune":"Montfort en Chalosse","nom":"Buzet","type":"Château","periode":"XVIII","histoire":"Montfort-en-Chalosse est une bastide, c'est-à-dire une « ville » établie au cours de la révolution urbaine du XIIIe siècle. Cest à cette époque que Montfort-en-Chalosse a été érigée, comme de nombreuses autres bastides aux chartes très libérales, alors que le duc d'Aquitaine était aussi roi d'Angleterre.\r\nLe 24 mars 1526, François Ier est à Montfort-en-Chalosse. Dans l'ouvrage intitulé Louise de Savoie, Paule Henry-Bordeaux relate cet événement historique. Le domaine Buzet a été construit au XVIIIe siècle, pour un haut dignitaire à la cour de Louis XV.","architecture":"Buzet l'édifice de plan recrangulaire à deux niveaux, toits en croupes recouvert  de tuiles provençales.","habitants":"Seigneur locaux\r\n        \"","divers":"Château de Buzet à Montfort en Chalosse","gps":"","images":["../image/image_40/40_Buzet_1.jpg","../image/image_40/40_Buzet_2.jpg"]},"Consult_chateau_formulaireda78":{"id":"Consult_chateau_formulaireda78","dept":"40","canton":"St-Martin de Seignanx","commune":"Biarotte","nom":"Camiade","type":"Château","periode":"XVIII","histoire":"Deux châteaux à Bariotte celui de Camiade et celui de Mayou.                                                                     CAMIADE,  Bernard Despuyaux, seigneur de Sauzay achète le domaine de Camiade en 1773 au seigneur de Biarotte est construit en 1782 à linitiative du seigneur Despuyaux. En 1773, il est acheté par Bernard Despuyaux, vendu dans les années 1790, le domaine passe à la famille de La Lande dOlce en 1801. Aujourdhui, le château est toujours habité par un descendant des de Lalande dOlce.                        MAYOU, dans la même famille depuis le XVIIe siècle, transformé en gîtes de vacances.","architecture":"CAMIADE, avec ses pavillons carrés, ses dômes à limpériale et ses étroites fenêtres, il manifeste avec élégance le goût Renaissance de lépoque, après l'achat du domaine  le château est construit une dizaine dannées plus tard, sans doute sur un ancien corps de bâtiment, construit dans un style typique de la fin du XVIIIe siècle, comprend un vaste bâtiment rectangulaire flanqué de deux petits pavillons carrés. La haute toiture du corps de logis central, faite dardoise, est marquée par de petites fenêtres.   Le bâtiment central comprend un pigeonnier, également couronné dun dôme à limpériale. Sur ce pigeonnier sont gravées les armes du seigneur Despuyaux ainsi que lannée de construction, 1782.  La façade sud du château donne sur un parc abritant des chênes centenaires. Au nord, le bâtiment central souvre sur la cour, entourée de deux longues bâtisses en L.  Ces constructions, peut-être les derniers restes dun bâtiment antérieur au château, servent longtemps de communs.                                                                          MAYOU, ce château gîte de France de 700 m2 comporte 13 pièces qui sont réparties en trois corps de bâtiment mitoyens, un grand corps de logis de plan carré à trois niveaux flanqué au nord-est servant d'entrée deux  pavillons carrés prolongé par un mur et bâtiment de dépendances en retour d'équerre formant la cour d'honneur.","habitants":"seigneur Despuyaux\r\n        \"","divers":"Château de Camiade  43° 33' 44? nord, 1° 16' 35? ouest et de Mayou à Bariotte","gps":"","images":["../image/image_40/40_Camiade_1.jpg","../image/image_40/40_Camiade_2.jpg","../image/image_40/40_Camiade_3.jpg","../image/image_40/40_Camiade_4.jpg","../image/image_40/40_Camiade_5.jpg"]},"Consult_chateau_formulaireb435":{"id":"Consult_chateau_formulaireb435","dept":"40","canton":"Mont de Marsan","commune":"Campet et lamolère","nom":"Campet","type":"Château","periode":"XII-XVI","histoire":"CAMPET, ancienne résidence des seigneurs de Lyon, famille d'origine béarnaise dont il est fait mention dés le début du XIIe siècle, est inscrit aux M.H. depuis le 22/12/1987. propriété  de  Mme de Bellabre et  de Mme  de Pins.                                                                              Manoir  de LAMOLERE logis de france par Béatrice et Philippe de Monredon.","architecture":"CAMPET,  a été construit sur des ruines des constructions antérieures, une forteresse sur motte comprenant murailles, tours, fossés et pont levis.    Au XVIe siècle, le château est fortement endommagé pendant les guerres de religion. Sa reconstruction est autorisée en 1640 par un décret du parlement de Bordeaux. Mais nest entreprise quaprès les nouvelles destructions occasionnées par la fronde. Le plan du bâtiment est complexe et rappelle celui du logement central du château de Cadillac : un corps central est flanqué de quatre pavillons dangles largement décrochés avec un toit à limpérial, pavillons eux-mêmes prolongés en angle par deux autres plus bas. Le corps de logis, au décor sobre, souvre par trois travées sur deux niveaux. La porte dentrée souvre dans un massif de bossage avec clef pénétrante, crossettes et consoles renversées. Le plan complexe est simplifié au XIXe siècle. Les pavillons de la façade sud sont supprimés et lescalier à degré droit de la façade est remplacé par deux rampes convergentes. Aujourdhui, le château a perdu une grande partie de son aspect défensif, il souvre désormais sur plusieurs jardins et ses fossés sont aménagés en plans deau. En 1971, le château de Campet a été médaillé par les « Vieilles Maisons Françaises », une association qui tend à sauvegarder le patrimoine de qualité.","habitants":"Campet Famille de Lyon.                                       Lamolère Famille de Moredon\r\n        \"","divers":"Château de Campet 43° 55' 08 nord, 0° 37' 32 ouest à Campet et Mamolère","gps":"","images":["../image/image_40/40_Campet_1.jpg","../image/image_40/40_Campet_2.jpg","../image/image_40/40_Campet_3.jpg","../image/image_40/40_Campet_4.jpg","../image/image_40/40_Campet_5.jpg","../image/image_40/40_Campet_6.jpg"]},"Consult_chateau_formulaired9eb":{"id":"Consult_chateau_formulaired9eb","dept":"40","canton":"Montfort sur Chalosse","commune":"Doazit","nom":"Candale","type":"Château","periode":"XVI","histoire":"CANDALE,  a été construit, à la fin du XVIe siècle, par les seigneurs de Foix-Candale, qui étaient devenus les maîtres de la baronnie de Doazit,  Jean de Foix, chevalier de la Jarretière, devient, à son mariage en 1458 avec Marguerite de la Pole de Suffolk, comte de Candale. Leur descendant, Jacques de Candale, seigneur et baron de Doazit, épouse en 1566 Jeanne de Belcier, fille d'Antoine, président au parlement de Bordeaux et d'Anne de Lubersac. Ils font construire le château.   La Révolution entraîne le départ en émigration de François-Henri de Foix-Candale, mais sa sur reste au château, et il devient maire de la commune à son retour. Après sa mort (1822), sa sur vend la demeure, en 1838, à Jean-Jacques Victor Brocas-Perras (1806-1883), ancêtre des propriétaires actuels, qui le lègue en 1864 à son gendre, Fabien Lacaze (1839-1865). Son fils Gaston (1862-1937) reconstitue au fil du temps un important domaine agricole de plus de mille hectares, et racheté en 1906 le monastère de Maylis qu'avaient fondé et doté les Foix-Candale. L'aînée de ses petites-filles, Maylis Personnaz (1908-1997), mère des propriétaires actuels, le reçut en héritage en 1936.\r\nAinsi le château est resté dans la même famille depuis plus de 150 ans. Chaque génération y a laissé sa trace, sans ostentation, mais accumulant quantité d'objets, de tableaux, et d'uvres d'art, reprenant le rôle de ses devanciers.","architecture":"CANDALE, la construction du château dans lequel, selon la tradition, Henri IV, Roi de France et de Navarre toute proche, séjourna. Belle construction de plan rectangulaire, flanquée à l'origine de douves et de quatre pavillons d'angle formant saillie, elle a conservé trois d'entre eux, le quatrième, détruit sous la Révolution, ayant été remplacé par une tourelle. La façade sud est ornée de linteaux portant des monogrammes et des devises héraldique. Aujourd'hui, la sauvegarde de Candale nous impose d'importantes restaurations si nous voulons poursuivre l'uvre familiale, et préserver le château.","habitants":"Seigneurs de Foix-Candale\r\n        \"","divers":"Château de Candale \r\n43° 41' 01 nord, 0° 39' 37 ouest  à Doazit","gps":"","images":["../image/image_40/40_Candale_1.jpg","../image/image_40/40_Candale_2.jpg","../image/image_40/40_Candale_3.jpg"]},"Consult_chateau_formulaire2c1f":{"id":"Consult_chateau_formulaire2c1f","dept":"40","canton":"Saint-Vincent de Tyrosse","commune":"Capbreton","nom":"Capbreton","type":"Château","periode":"XIX","histoire":"CAPBRETON, la mairie  inauguré en 1907,  la \"maison de Monseigneur\" car bâtie pour Clément Soulé ( 1827-1919), natif de Capbreton évêque de Saint-Denis de la Réunion puis archevêque de la Guadeloupe.\r\nHôtel de ville de Capbreton, on y célèbre les mariages et le conseil municipal sy déroule. On y trouve la chaise où sest assis Napoléon III en 1858 et la table où lui furent présentés les plans du futur Capbreton.","architecture":"Capbreton, bâtisse de plan carrée à deux niveaux  toits à quatre pans recouvert d'ardoises  l'édifice est accolé d'une tour hexagonale plein cintre de la façade.","habitants":"Evêques Clément Soulé\r\n        \"","divers":"La mairie de Capbreton","gps":"","images":["../image/image_40/40_Capbreton_1.jpg","../image/image_40/40_Capbreton_2.jpg"]},"Consult_chateau_formulaire398e":{"id":"Consult_chateau_formulaire398e","dept":"40","canton":"Peyrehorade","commune":"Minbaste","nom":"Capcazal_Pachoui","type":"Gentilhommière","periode":"XVII","histoire":"CAPCAZAL chambres d'hôtes de  Colette Dufourcet-Alberco, depuis 1617  a appartenut a quatorze générations de la même famille Dufourcet petite seigneurie  propre à la Chalosse et au pays d'Orthe.","architecture":"Capcazal, cette demeure possède un pigeonnier coiffé d'une toiture à bulbe et des dépendances, la bâtisse de plan rectangulaire à deux niveaux toit à deux pans.","habitants":"Famille Dufourcet\r\n        \"","divers":"Gentilhommière à Minbaste","gps":"","images":["../image/image_40/40_Capcazal_Pachoui_1.jpg","../image/image_40/40_Capcazal_Pachoui_2.jpg"]},"Consult_chateau_formulaire67f6":{"id":"Consult_chateau_formulaire67f6","dept":"40","canton":"Hagetmau","commune":"Audignon","nom":"Captan","type":"Château","periode":"XIV-XIX","histoire":"Le château de Captan appelé aussi Galard est à Audignon.                                                                         Le CAPTAN est de style Renaissance, sa construction date de 1887, a été reconstruit par la famille de Galard-Rochetaillé, propriétaire des lieux,  à la demande de la famille de Galard. Edouard André, a été l'architecte paysagiste parisien choisi.   Cette propriété privée est inscrite à linventaire des M.H.en 1997.","architecture":"GALARD, la construction du château de Galard date du XIXe siècle.  Le château et les communs furent édifiés, entre 1891 et 1894, est intéressant pour sa distribution intérieure et la qualité de sa décoration pour laquelle Edouard André s'associa avec l'architecte bordelais Garros.  Le château de Captan est une importante propriété qui sinscrit dans le paysage dAudignan comme un patrimoine architectural primordial.  Si lorigine de ce château remonte au XIVe siècle, celui-ci est totalement reconstruit à la fin du XIXe siècle,  demande à larchitecte paysagiste Édouard André de reconstruire le château. Lédifice possède alors quatre pavillons de style Renaissance. Pour la décoration, André sassocie à Garros, un autre architecte venant de Bordeaux. Édouard André est consulté également pour réaliser un grand parc mais son projet reste sans suite.","habitants":"Famille de Galard\r\n        \"","divers":"Château de Captan à Audignan","gps":"","images":["../image/image_40/40_Captan_1.jpg","../image/image_40/40_Captan_2.jpg","../image/image_40/40_Captan_3.jpg"]},"Consult_chateau_formulaire61c0":{"id":"Consult_chateau_formulaire61c0","dept":"40","canton":"Aire sur l","commune":"Castandet","nom":"Castandet","type":"Manoir","periode":"XIX","histoire":"CASTANDET, ce château a été construit aux environs de 1870 par l'arrière-grand-père de l'actuel propriétaire, Emmanuel de Coutard. À la fin du XIXe siècle, son ancêtre ingénieur avait tout investi dans la construction de ce château, électricité, dépendances, écuries de course, tout y était. En 1975, la bâtisse a été modifiée, ressemblant aujourd'hui à une belle demeure à l'italienne recouverte de vigne vierge.","architecture":"Le village de Castandet connut les violences de la Révolution. Un curé de la paroisse, Monsieur Noutary fut même guillotiné à Saint-Sever. Prêtre réfractaire, ennemi juré de la Constitution, il avait été accusé de formenter le trouble. Mais laissons-là les évènements tragiques, et tournons-nous vers des aspects plus réjouissant de l'histoire de Castandet, au XIXe siècle. Notre petit village landais perdit, ne serait-ce qu'un instant, son caractère quelconque de petite commune française, en 1855 grâce à Léon Martres. Ce Castandétois reçu pour ces recherches sur le perfectionnement des machines agricoles, la médaille d'or de l'académie royale d'agriculture.\r\nPar ailleurs, la fin du XIXe siècle vit la construction par M. Dulau du château propriété de la famille de Coutard. Castandet connut alors une période d'activité intense, notamment illustrée par un florissant artisanat de poterie utilitaire et une population de plus de 1000 habitants.","habitants":"Famille d'Emmanuel de Coutard.\r\n        \"","divers":"Château de Castandet 43° 48' 49 nord, 0° 21' 07 ouest","gps":"","images":["../image/image_40/40_Castandet_1.jpg"]},"Consult_chateau_formulaire5569":{"id":"Consult_chateau_formulaire5569","dept":"40","canton":"St-Martin de Seignanx","commune":"Saint-André de Seignanx","nom":"Castets_Landes","type":"Château","periode":"XVIII","histoire":"CASTETS, cest Alexandre Walewski, fils de Napoléon et de Marie Walewska, qui fait construire le château sur le domaine dOrx au début du XVIIIe siècle. Alexandre Walewski  président du conseil général des Landes et député. Louis Napoléon Bonaparte, futur Napoléon III, récupère le domaine dOrx et le lègue à son fils naturel Eugène Alexandre Louis, sous-secrétaire détat en Russie, puis consul de France en Zanzibar, qui sinstalle au château et devient maire de Saint-André-de-Seignanx en 1884  il y  reste jusquà sa mort en 1910.  Le 14 juin 1870, lempereur fait donation du domaine dOrx à ses deux fils, et leur confère le titre de comte dOrx pour laîné, et comte de Labenne pour le cadet. Le comte dOrx sinstalle au château de Castets à Saint-André-de-Seignanx. Il meurt le 14 février 1910, laissant 4 enfants, dont Jeanne Amélie qui épouse en 1899 Georges Gemain, ancien magistrat colonial en Indochine,  conseiller général des Landes. Le couple, qui sinstalle au dit « Château du Pont », aura cinq enfants. Jeanne Amélie était ce quon appelle une femme de tête. Le domaine du Pont était à lépoque conséquent. Durant la seconde guerre mondiale, la maison de Bénesse-Marenne fut occupée par les Allemands. Jeanne Amélie Gemain décède à 90 ans, le 4 mars 1972. Elle repose également dans le caveau de famille dans le cimetière du village. La maison, toujours habitée par la famille Gemain, a été restaurée dans les années 2000.","architecture":"CASTETS; maison de maître probablement construite à la fin du XVIIIe siècle ou au début du XIXe siècle. Le comte Alexandre Louis Eugène d'Orx fils naturel de Napoléon III a vécu dans cette demeure. Le château est une belle bâtisse de style classique à trois niveaux, un rez-de-chaussée, un étage et un étage de combles. Quatre travées se répartissent symétriquement de chaque côté dune travée centrale mise en valeur par une fenêtre à la mansarde. Un parc verdoyant entoure la demeure.                                                                  MILLOX château de Roll-Montpellier du XVIIIe siècle chambres d'hôtes  de  madame Veronique Sejalon  de plan rectangulaire à deux niveaux avec lucarnes sur un toit en croupes accolé de part et d'autre de pavillons carrées prolongé de dépendances  l'ensemble couvert d'ardoises.","habitants":"Alexandre Walewski \r\n        \r\n        \"","divers":"Château de Castets à Saint André de Saignanx 43° 35' 04\" Nord et 1° 23' 06\" Ouest","gps":"","images":["../image/image_40/40_Castets_Landes_1.jpg","../image/image_40/40_Castets_Landes_2.jpg","../image/image_40/40_Castets_Landes_3.jpg","../image/image_40/40_Castets_Landes_4.jpg"]},"Consult_chateau_formulaire518d":{"id":"Consult_chateau_formulaire518d","dept":"40","canton":"Tartas","commune":"Arrengosse","nom":"Castillon","type":"Château","periode":"XVII","histoire":"CASTILLON, en 1541 Robin de Banquet cède la maison forte de Castillon à Paulin de Mongrand.  Au début du XVIIe siécle la propriété est acquise  et  construit un château en 1625  par Jean Bertrand  de Baffoigne seigneur de Castillon, avec laide de larchitecte Gratien de Lerme. La porte principale de lédifice indique la date de 1625. Jean Bertrand  de Baffoigne a une fille Jeanne et un fils Jean-Charles  qui meurt en 1667 . Le château passe à Jeanne qui épousa en 1645 Bernard vicomte de Poudenx, la fille de Henri de Poudenx fils de Bernard Jeanne hérite à la mort de son père  en 1739.   Durant les guerres de religion, Castillon subit dailleurs de nombreuses attaques.  Un autre Henri de Poudenx gouverneur de Saint-Jean-Pied-de-Port et lieutenant général de l'armée du roi épouse en 1790 Josephine Anne Cocar, ils eurent trois enfants dont Henriette Emilie qui reçoit en dot le château de Castillon à l'occasion de son mariage  en 1813 avec Pierre d'Ismert général et baron d'Empire,   veuve en 1826 cède le domaine en 1840 à Jean Larroque, une nouvelle vente est passé au baron Gérard petit neveu du peintre,  toutefois, il ne mérite plus cette appellation aujourdhui, la famille Lastours, actuel  propriétaire, a restauré lédifice ainsi que les jardins à la française. Le château de Castillon a reçu l'écrivain Théophile Gautier, en visite dans la region. Depuis le 9 décembre 1918, lédifice est inscrit à linventaire des M.H.","architecture":"CASTILLON, sa construction a commencé au XVIIe siècle et s'est achevé à la fin du XIXe siècle. Important quadrilatère avec ses communs, Il est de style Louis XIII. La partie occidentale, appelée « l'aile neuve », sera construite au XIXe siècle, sous les consignes du baron Gérard, connus pour être d'éminents frondeurs. Le château de Castillon fait partie des plus beaux des Landes par la majesté et la noblesse de son allure. Il comporte d'élégantes lucarnes, de belles toitures, une imposante façade, ainsi que de très beaux Jardins à la Française, dessinés par le paysagiste André.  Lédifice présente un corps de logis de plan rectangulaire  de deux niveaux flanqué de deux pavillons latéraux comptant trois niveaux faisant saillie sur la façade sud, le décor de la façade principale dont les quatre travées sont terminées par des lucarnes coiffées de frontons semi-circulaires sommé d'une boule, la porte d'entrée encadrées de pilastres portant une cartouche surmonté d'un casque et flanqué de cornes d'abondance, double cordon séparant les étages, les toits en croupes couvert de tuiles.","habitants":"Famille de Jean Bertrand  de Baffoigne\r\n        \"","divers":"Château de Castillon à Arrengosse   44° 00' 21\" Nord 0° 47' 47\" Ouest","gps":"","images":["../image/image_40/40_Castillon_1.jpg","../image/image_40/40_Castillon_2.jpg","../image/image_40/40_Castillon_3.jpg","../image/image_40/40_Castillon_4.jpg","../image/image_40/40_Castillon_5.jpg"]},"Consult_chateau_formulairee9ab":{"id":"Consult_chateau_formulairee9ab","dept":"40","canton":"St-Martin de Seignanx","commune":"Tarnos","nom":"Castillon_Tarnos","type":"Château","periode":"XVII-XX","histoire":"CASTILLON, les premières mentions de Castillon remonteraient au XVIIe siècle. La famille Batbedat, riches négociants bayonnais, acheta cette propriété de plusieurs hectares. De mémoire dhommes, les jardins de Castillon auraient été dessinés par un élève de Le Nôtre, monsieur de la Quintinie.\r\nEn 1829, le domaine est repris par François Faurie. En 1869, à la mort de son oncle  Félix Labrouche hérite du domaine. En 1900, son fils, Jean-Ernest Labrouche, fait construire le château actuel, remplaçant une ancienne bâtisse bourgeoise. Grand amateur de chevaux, il fait également aménager une piste dentraînement et des écuries à quelques mètres du château.  En 1952, l'association ariégeoise des pupilles de l'école publique achète le domaine.\r\nla vie à Castillon est ponctuée de fêtes, comme celle donnée en lhonneur de la grand-mère de la famille Labrouche qui célèbre ses 100 ans en 1931, ou bien encore, les différents mariages de cette famille nombreuse. Avant 1940, Castillon est connu dans toute la région pour ses fastes et sa douceur de vivre. De prestigieux convives viennent passer quelques jours au château, à limage du Roi dEspagne, Alphonse XIII ou encore du Sultan du Maroc.\r\nDurant la seconde guerre mondiale, le château de Castillon est occupé par les allemands.","architecture":"Castillon de plan rectangulaire à trois niveaux à toits brisées avec des ouvertures sur combles, flanqué de deux pavillons saillants sur  les façades et sur flanc tour carrée sans toit  à hauteurs de l'édifice plus bas pour celui  qui est à l'opposé.  Lintérieur du château est décoré avec goût, une brochure sur les plus belles propriétés de la Côte dArgent de 1926 mentionne « les salons superbes et clairs » et « la  bibliothèque très remarquable ». Au début du XXe siècle, la famille fait réaménager le parc, en y implantant notamment des arbres de bois précieux. Un lac est creusé et des ouvrages en pierre sont édifiés parmi lesquels la fontaine, les belvédères et lembarcadère. Des sentiers sont aménagés tout autour du lac et permettent aux promeneurs de profiter dun cadre exceptionnel.","habitants":"Famille Batbedat                                                               Jean-Ernest Labrouche\r\n        \"","divers":"Château de Castillon à Tarnos","gps":"","images":["../image/image_40/40_Castillon_Tarnos_1.jpg","../image/image_40/40_Castillon_Tarnos_2.jpg","../image/image_40/40_Castillon_Tarnos_3.jpg","../image/image_40/40_Castillon_Tarnos_4.jpg"]},"Consult_chateau_formulairee958":{"id":"Consult_chateau_formulairee958","dept":"40","canton":"Montfort en Chalosse","commune":"Hinx sur Adour","nom":"Castéra_Hinx","type":"Château","periode":"XIII-XIX","histoire":"CASTERA, cette demeure de style \"Belle Époque\" la famille de Hinx l'érige en baronnie en 1462 tenue par la famille Poylohaut, puis des Lalande, avant que le château soit vendu comme bien national à la Révolution.  En 1902, lancien château fort est acheté par Alexandre de Gardilanne, qui entreprend de vastes rénovations. Cette uvre imposante est loccasion pour la famille de Gardianne dexhiber sa richesse  notamment pour ses différents décors de céramique, acquise au cours de la seconde moitié du XIXe siècle,  et par la famille du général d'empire Peyris originaire de Dax.   En 1904-1906, la reconstruction du château est réalisée par l'architecte-décorateur Gaston Virebent. Le roi Édouard Ier dAngleterre, fondateur de la cité de Bonnegarde, a séjourné 122 jours, au château de Castera. Il a été aujourd'hui racheté et restauré. Le château est inscrit aux M.H. depuis le 11/09/1997.","architecture":"La construction du château de Castéra de Hinx débute en 1275, sur un site préalablement occupé par un camp romain. Il est le château des seigneurs de Hinx jusquà la Révolution.  il se développe derrière une galerie ouverte à arcades, à l'image d'un cloître ou d'une villa gallo-romaine.  Avant les restaurations, le château de Castéra est caractéristique des demeures seigneuriales landaises, avec ses murs blancs recouverts à la chaux, son bâtiment principal flanqué dune cour et dune tour et ses toits recouverts de tuiles. La demeure est alors en grande partie reconstruite. Le logis est une bâtisse cantonnée de quatre tours. Les pièces du rez-de-chaussée présentent un décor varié, cheminées etc.  Les Art Nouveau au premier étage, dont certaines sont dues aux céramistes Gentil et Bourdet.   Aujourdhui, le château se présente comme un manoir de plan rectangulaire flanqué de tourelles rondes à chaque extrémité avec fléches conique à l'aile nord est doté d'une tour carrée à terrasse, les murs sont percés de magnifiques baies à meneaux sur la façade sud-ouest. De lépoque médiévale demeurent une tour, un morceau du bâtiment central, ainsi que les fossés. Lescalier monumental en bois exotique, autour duquel il organise les différentes pièces, est présenté dans un pavillon de lexposition universelle de 1900. Le décor intérieur se caractérise par des couleurs chatoyantes et la présence de nombreux décors de céramique.  Il est un exemple typique des demeures bourgeoises de la belle époque.","habitants":"Famille de Hinx \r\n        \r\n        \"","divers":"Château de Castéra   43° 42' 24 nord, 0° 55' 47 ouest       à Hinx","gps":"","images":["../image/image_40/40_Cast%c3%a9ra_Hinx_1.jpg","../image/image_40/40_Cast%c3%a9ra_Hinx_2.jpg","../image/image_40/40_Cast%c3%a9ra_Hinx_3.jpg"]},"Consult_chateau_formulairec2d1":{"id":"Consult_chateau_formulairec2d1","dept":"40","canton":"Montfort en Chalosse","commune":"Bonnegarde","nom":"Castéra_Landes","type":"Château","periode":"XVI","histoire":"CASTERA, la commune de Bonnegarde est une bastide fondée en 1279 sur les rives du Luy de Béarn par Édouard Ier dAngleterre. En 1295 a lieu la bataille de Bonnegarde. Les troupes de Philippe le Bel, sous les ordres de Robert dArtois, viennent assiéger Bonnegarde, qui demande secours aux garnisons anglaises. Une colonne anglaise sapproche alors de Bonnegarde, mais elle est encerclée et décimée par les Français. Cette bataille accélère la fin du duché dAquitaine anglais. En 1453, les anglais quittent définitivement la région et au XVIe siècle un nouveau village de Bonnegarde voit le jour, à proximité des anciens sites abandonnés.","architecture":"CASTERA, elle est construite sur la rive droite du Luy-de-Béarn, sur un éperon barré dominant les vallées qui lentourent, et se trouve alors près de la frontière du Béarn. La bastide créée ex-nihilo a la forme dune arête de poisson, cest-à-dire quelle est formée dune seule rue droite bordée de places ou parcelles de dimensions égales données aux colons. Les constructions sont en bois.\r\nBonnegarde comprend deux éléments : le premier, à lextrémité de léperon, le second élément, en arrière, sétend sur un large plateau inoccupé parcouru par deux axes perpendiculaires et porte le nom de Las Biolles, le château occupe aujourd'hui le site de l'ancienne forteresse depuis le XVIIe siècle; derrière  subsiste la levée des fortifications avec les fossées  accolées au château des restes d'anciens murs  et un vieux pigeonnier.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Château de Castéra à Bonnegarde   43° 34' 07 nord, 0° 43' 00 ouest","gps":"","images":["../image/image_40/40_Cast%c3%a9ra_Landes_1.jpg"]},"Consult_chateau_formulaire6aa6":{"id":"Consult_chateau_formulaire6aa6","dept":"40","canton":"Labrit","commune":"Escalans","nom":"Caumale","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux à Escalans celui de Caumale et de Terrade.                                                                 CAUMALE, du XVIe et XVIIe siècle, est situé à Escalans,  le Gabardan, fief de Gaston Phébus, de la famille d'Albret, est une terre de chasse, et Caumale, château de défense pendant les guerres de 100 ans et de religions, a toujours été refuge pour Gabarret, sa ville et son monastère, une entrée d'un souterrain existe de Gabarret à Caumale. Toujours habité par de grands voyageurs, on lui connait une histoire coloniale entre Saint-Domingue, Cuba avec les Delisle, à l'époque où \"Sire toute votre cour est créole\".  Le château est remanié intérieurement au XIXe siècle par les mêmes Delisle, on assiste à un mariage en 1830 où les amis sont Rochambeau, Vilmorin, Humbolt. La grande tour d'escalier qui mène à la chambre du gouverneur Rochambeau. Grégoire Fabre est propriétaire du château de Caumale.  Il est inscrit comme M.H. le 31 janvier 2002.","architecture":"CAUMALE, sa silhouette évoque les châteaux gascons du Moyen-Âge. médiéval, est entouré de murs d'enceintes, transformés et ouverts en chais, il subsiste 2 tours basses du XIIe siècle, les 5 autres tours du château sont XVe-XVIe siècle. Son corps de logis carré dispose de quatre tours d'angle, la tour de la poterne la tour aux grains, de l'oratoire, de guet et la grande tour d'escalier. \"Cest une maison forte du XIIe siècle à la frontière des territoires Plantagenet, qui a traversé les guerres de 100 ans et de religions\", était également un lieu de production de vin et d'armagnac jusqu'à la fin des années 70.  Il ne sagit pas dune simple entreprise, cest un héritage mais aussi un bien à léguer. Cest pourquoi la dimension sentimentale, personnelle et familiale du projet oblige à être exigeant envers soi-même. Sa silhouette évoque les châteaux gascons du Moyen-Âge.                                        TERRADE  actuels propriétaires, monsieur Ronald et madame Danièle Neill, transformé en société civile immobilière est active depuis 8 ans.","habitants":"gouverneur Rochambeau.\r\n        \"","divers":"Château de Caumale   43° 59' 00\" Nord et 0° 02' 01\" Est  grav de 1 à 6,  château de Jourdan 44° 00' 57 nord, 0° 02' 14 est  à Escalans et de Terrade grav 7","gps":"","images":["../image/image_40/40_Caumale_1.jpg","../image/image_40/40_Caumale_2.jpg","../image/image_40/40_Caumale_3.jpg","../image/image_40/40_Caumale_4.html","../image/image_40/40_Caumale_5.jpg","../image/image_40/40_Caumale_6.jpg","../image/image_40/40_Caumale_7.jpg"]},"Consult_chateau_formulairecc9d-2":{"id":"Consult_chateau_formulairecc9d-2","dept":"40","canton":"Hagetmau","commune":"Cauna","nom":"Cauna","type":"Forteresse","periode":"XIII-XV","histoire":"La famille de Cauna, mentionnée en 1203, fut l'une des plus prestigieuse de la région. En 1442, lors de la bataille de Tartas qui mit fin à la présence anglaise, c'est un membre de cette famille qui remit Tartas au roi Charles VII.  Ne reste du château médiéval de la très ancienne famille des barons de Cauna, saccagé lors des troubles de la fronde, que la tour carrée en briques du donjon, flanqués de corps de logis du XVIIIe siècle.","architecture":"Cauna : ancienne résidence des barons de Marsan de Cauna. Le corps de logis date du XIIIe siècle. La tour carrée de 20 m, et le donjon de l'ancien château sont  en brique rose,   l'actuel a été reconstruit vers le milieu du XIe siècle sous Grégoire de Montaner, abbé. L'édification se poursuivit jusqu'au XIIIe siècle.","habitants":"Barons de Cauna\r\n        \"","divers":"Forteresse de Cauna 43° 46' 52\" Nord et 0° 38' 30\" Ouest","gps":"","images":["../image/image_40/40_Cauna_1.jpg","../image/image_40/40_Cauna_2.jpg","../image/image_40/40_Cauna_3.jpg","../image/image_40/40_Cauna_4.jpg","../image/image_40/40_Cauna_5.jpg"]},"Consult_chateau_formulaire3ed3":{"id":"Consult_chateau_formulaire3ed3","dept":"40","canton":"Montfort en Chalosse","commune":"Caupenne","nom":"Caupenne","type":"Château","periode":"XVII","histoire":"CAUPENNE, la construction date du XVIIe siècle,  et a pris le nom d'un bourg du domaine d'Acqus. Elle appartient à l'ancienne noblesse des Landes qui a donné, dès le XIe siècle, des évêques à Dax, des abbés à Sorde et des membres du clergé à Bayonne. Elle a joué un rôle important sous les rois d'Angleterre et les souverains Français qui lui permirent ainsi de devenir une des familles les plus respectables de Gascogne.  Marguerite, dernière descendante directe, épousait en 1563 le capitaine Peyrot, fils du maréchal Blaise de Montluc. Le château-fort primitif   à disparu et l'actuel dans le bourg fut édifié au XVIIe siècle devenant la propriété de Cès-Caupenne, originaires d'une famille de Doazit, apparaissent au XIV siècle au rang de notable. Construit aux alentours de 1615, le château est exploité par la famille de Cès Caupenne. Durant la Révolution, le châtelain reste le maire du village. Georges, dernier du nom, fut conseiller à la préfecture des Landes et maire de Caupenne. Il épouse Cécile Fries de Mugron, puis décède en 1931. Il ne reste alors au château que Julien (le jardinier) et Jeanne son épouse (la cuisinière). Puis Julien et Jeanne âgés se retirent à Bordeaux et le château reste vide et à l'abandon durant quelques années.  Pendant la guerre 1939-1945, le château fut réquisitionné par l'armée d'occupation.  Actuellement le chateau est habité par ses propriétaires.","architecture":"La commune de Caupenne trouve son origine dans la seigneurie de Caupenne, érigée en baronnie à la fin du XIIIe siècle. Le château se dresse face à léglise.  Le premier château de la famille de Caupenne, construit sur une motte castrale au lieu-dit Castet-Bielle, ne résiste pas aux guerres de Religion. Un second château est donc édifié au XVIIe siècle par la famille de Cès-Caupenne au centre du bourg. La haute grille du parc s'ouvre sur une allée pavée qui mène à la cour d'honneur.  Dune régularité classique, le bâtiment se compose dun corps de logis central cantonné de deux ailes en retour  structure caractéristique de lépoque. Le corps central comporte onze travées . et flanquée de deux pavillons   desquels s'avancent    perpendiculairement  deux ailes plus basses, la porte d'entrée au centre  est surmontée d'un fronton en plein cintre.  Des armoiries ornent le fronton de la porte dentrée ; le grand salon du rez-de-chaussée est entièrement lambrissé.  Autour du château, les dépendances sétendent sur les six hectares du parc, il est inscrit aux M.H. depuis 1996.","habitants":"Famille De Cès-Caupenne\r\n        \"","divers":"Château de Caupenne  43° 41' 01 nord, 0° 44' 50 ouest","gps":"","images":["../image/image_40/40_Caupenne_1.jpg","../image/image_40/40_Caupenne_2.jpg","../image/image_40/40_Caupenne_3.jpg"]},"Consult_chateau_formulaireb4ad":{"id":"Consult_chateau_formulaireb4ad","dept":"40","canton":"Peyrehorade","commune":"Estibeaux","nom":"Charles","type":"Château","periode":"XVIII","histoire":"CHARLES, le château Charles où se trouve une cella découverte par Joseph de Laporterie. Joliment recouvert de verdure, le château Charles dEstibeaux est surtout connu pour le vestige de temple romain mis au jour à proximité.","architecture":"Le château Charles est édifié à lemplacement de lancienne église de la commune, démolie en 1775. Construit en pierre, il se compose dun grand corps de logis, recouvert dun toit en tuiles.\r\nAu début du XXe siècle, on fait la découverte, près du château, dun tumulus contenant une cella en pierres sèches. Il sagit de la partie avant dun temple romain, fermée par une porte à deux battants et généralement de forme rectangulaire.","habitants":"Famille de Charles dEstibeaux \r\n        \"","divers":"Château de Charles 43° 36' 02 nord, 0° 54' 47 ouest  à Estibeaux","gps":"","images":["../image/image_40/40_Charles_1.jpg"]},"Consult_chateau_formulaire6648":{"id":"Consult_chateau_formulaire6648","dept":"40","canton":"Hagetmau","commune":"Coudures","nom":"Coudures","type":"Château","periode":"XV","histoire":"COUDURES du latin cultura (culture) est une bastide. Elle fut fondée en 1305 par le sire de Lescun sur les terres dEdouard II sans son autorisation.  En 1440, la seigneurie de Coudures passa aux barrons dHagetmau : la famille des Lescuns. Coudures relevait ainsi de la baronnie dHagetmau de Lescuns-Audouins. Même année, Charles II, sire dAlbret, poussé par le roi de France, incendie, ravage et réduit la population à la famine. Les habitants de Coudures sont sauvés de la famine par le roi dAngleterre qui leur a envoyé de Riscle 100 sacs de blé et 100 sacs de farines. Il est par contre, un seigneur que Coudures aimait tant, avec à lui seul des titres de gloires qui rejaillissaient sur la seigneurie de Coudures : Odex de Foix-Lautrec, fils de Jean de Foix et de Jeanne dAydie, maréchal de France et seigneur de Coudures, il fut celui à qui Louis XII confia le dauphin, duc dOrléans le futur François Ier.  Pilate, lieutenant de Daudijos a laissé son nom à une maison dans Coudures. A savoir quen 1676 Daudijos épouse Marie Dubourdieu. Il est colonel de 4 compagnies de Dragons. En 1675 il avait prété serment de fidélité au roi, tête nue et les fers aux pieds.                            CANDIRAN, bâtie sur le coteau du château de Candiran, à Coudures, une belle demeure évoque le temps des caveries, maison noble de taille modeste.  La caverie, spécifique à cette région, est une typologie peu précise, qui correspond à une maison noble sans être réellement une seigneurie.                                      A 4 kilomètres au sud-est un château à Aubagnan.","architecture":"Coudures édifice de plan carrée à deux niveaux, toits brisée avec lucarnes, accolé de tour carrée à toit à quatre pans. Le château de Tavernier dans le même style mais de plan rectangulaire avec tours carrées au angles en façade.                                                 CANDIRAN  Les caviers ont droit de basse justice, et disposent de privilèges divers. La caverie de Cantiran est composée de deux bâtiments distincts : un logis à deux niveaux et trois travées, couvert dune toiture à faible pente, et un pavillon latéral, à deux niveaux également, avec toiture brisée et chaines dangles à bossages. À larrière, une tourelle se dresse sur un angle. Une aile de bâtiments de communs, plus basse, est construite sur le coté opposé, le long de la cour.      AUBAGNAN , quadrilataire avec corps de logis à deux niveaux et quatre travées, avec pavillons inégaux aux angles  avec des toits également inégaux soit quatre pans , en cloch
