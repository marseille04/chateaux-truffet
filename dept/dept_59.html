 appartiendra successivement aux familles Vavcoillie et J.Decoster (industriel-imprimeur du Nord) qui y établira un restaurant étoilé. A labandon depuis près de 10 ans, il est racheté en 2012 et rénové par le styliste Lillois Olivier Sinic qui y a intégré son atelier de création et son magasin de robes de Mariées et tenues de Cérémonie. La rénovation sest faite selon les techniques dorigine. La famille Sinic y habite actuellement.  Occupé par les Allemands durant la 1ère guerre mondiale, il fut la cible de nombreux bombardements et fut même repeint de couleur kaki par les occupants. Mais sil ne fut jamais touché par les alliés, les allemands le feront sauter à leur départ en 1918. Le château a presque été entièrement rebâti, à lidentique, en 1920, compte tenu de limportance des dégâts. Cet édifice, de forme carrée dont la construction primitive remonte en 1852, est implanté au milieu dun parc. On pénètre dans la propriété par un ponceau surmonté dun portail en pierre blanche, sommé de pots à feu. Ponceau enjambant des douves en eaux. Le bâtiment est orné dune belle façade de style Louis XVI, rythmée de pilastres monumentaux qui sélèvent jusque la corniche. La décoration de lensemble est élégante et sobre. Propriété de la famille Geraudel.","architecture":"PREMESQUES, il date du XVIIe siècle. Il n'est pas inscrit aux M.H. Le château de Premesques ou domaine de CHANTERELLE est proposé pour fêter vos évènements.","habitants":"famille Thiriez                                 \"","divers":"deux châteaux dans cet article, Blanc  grav 1-2  et Chanterelle       blanc: 50° 40' 57\" Nord, 2° 59' 50\" Est                                                Chanterelle GPS : 50° 39' 21\" Nord, 2° 57' 12\" Est                                                 Premesques grav 3-4  Verts Bois Grav-5","gps":"50° 39' 21\" Nord, 2° 57' 12\" Est","images":["../image/image_59/59_Verlinghem_1.jpg","../image/image_59/59_Verlinghem_2.html","../image/image_59/59_Verlinghem_3.jpg","../image/image_59/59_Verlinghem_4.jpg","../image/image_59/59_Verlinghem_5.jpg"]},"Consult_chateau_formulaire99f9":{"id":"Consult_chateau_formulaire99f9","dept":"59","canton":"Villeneuve_d","commune":"Villeneuve d","nom":"Villeneuve_Ascq_II","type":"Château","periode":"XVI-XVII","histoire":"Trois châteaux dans cet article ; d'en Haut, d'en-Bas et la Roseraie.                               D'EN HAUT Jelain,  ce château a été occupé au XVIIIe siècle par les comtes d'Espiennes alliés avec les Razoir de Croix. M. d'Espiennes de Saint Rémi le légua à son fils, colonnel de la garde nationale de Valenciennes en 1790. Le comte Charles-François-Julien d'Espiennes, son fils, chevalier de l'Ordre de Saint Jean de Jérusalem, occupa la propriété au début du XIXe siècle et la vendit au comte de Robaulx. Après avoir changé plusieurs fois de mains, le château d'En Haut fut acquis en 1982 par les propriétaires actuels qui entreprirent avec courage sa restauration. Il a été bâti dans la deuxième moitié du XVIIIe siècle. C'est le type même de construction classique des demeures rurales. Construit à l'emplacement d'une ferme seigneuriale; ensemble de bâtiments distribués autour d'une cour fermée, avec entrée sous un porche-pigeonnier daté de 1772, portant en son cintre l'écusson, martelé à la Révolution, des comtes d'Espiennes. La grange au fond de la cour, aux puissants contreforts de grès, porte la date de 1701 gravée sur une pierre blanche insérée dans le cintre d'entrée. Éléments protégés MH : les façades et les toitures sur la cour d'honneur du château et du bâtiment en retour orné de sculptures ; la façade et la toiture, sur le jardin, de l'aile basse sur jardin abritant l'escalier ; l'escalier et sa rampe ; le pigeonnier de la ferme : inscription par arrêté du 21 avril 1987. propriété de la famille Demarcq.","architecture":"RECEUIL; date du XIXe siècle construit en 1844, appartenait à Jean-Baptiste Smet, ancien maire de Lille, puis conseiller municipal de Flers (1830-1832). sur les Bourgeois lillois, du XIXe siècle. Situé dans ce quartier, cet hôtel particulier remarquable est appelé le château du Recueil. Construit, en 1844, comme maison de campagne, pour Jean-Baptiste Smet. Il est situé au coin de la rue d'Hem et de la rue de Lannoy. Le château du recueil fut dabord utilisé comme maison de campagne. Il témoigne de lattrait quexerçait la campagne, sur les bourgeois lillois, au XIXe siècle                                                                  ROSERAIE à d'HEM, en 1900, Hem a bénéficié de lessor industriel de Roubaix pour y développer son industrie. A cette époque des grandes familles du Nord y ont fait construire des demeures et des châteaux. La ville de Hem se situe à proximité immédiate de laxe historique majeur entre Lille, Roubaix et Tourcoing,                                                                                                                Villa CAVROIS, le château de la Roseraie est un lieu unique et majestueux.Construit en 1910 et terminé en 1914, il fût longtemps occupé par la famille Leclerc-Motte, industriels dans le textile.Sur le Grand Boulevard, le tramway relie directement Lille et les gares TGV en moins de 20 minutes. A quelques minutes, un important réseau autoroutier permet de rejoindre aisément les grands axes.                                                                                                      D'EN BAS, jelain transformé en ferme à la Révolution, le château avait été construit en 1661 par Henri de Haynin. Malgré les transformations entreprises en 1787, il reste  typique des constructions de plaisance  du XVIIe siècle dans cette région. Le quadrilataire de bâtiments de brique et de pierre  baigne dans les douves. On y accède par un portail monumental dont le pignon à pas de moineaux se retrouve sur deux pavillons. il a été repris récemment par l'établissement public pour l'aménagement de Lille-Est qui projette de lui rendre sa splendeur  initiale.","habitants":"Famille du comte Charles-François-Julien d'Espienne\"","divers":"Villeneuve_Ascq en-Haut   grav_3-4                                             GPS : 50° 18' 32\" Nord, 3° 37' 31\" Est                                                                  En Bas grav-1                                                                  Sart grav- 5_6-   Receuil  grav-7-8 Receuil GPS : 50° 39' 28\" Nord, 3° 09' 11\" Est                                                  Brigore Grav-9                                           Roseraie hem Grav_2","gps":"50° 18' 32\" Nord, 3° 37' 31\" Est","images":["../image/image_59/59_Villeneuve_Ascq_II_1.jpg","../image/image_59/59_Villeneuve_Ascq_II_2.jpg","../image/image_59/59_Villeneuve_Ascq_II_3.jpg","../image/image_59/59_Villeneuve_Ascq_II_4.jpg","../image/image_59/59_Villeneuve_Ascq_II_5.jpg","../image/image_59/59_Villeneuve_Ascq_II_6.jpg","../image/image_59/59_Villeneuve_Ascq_II_7.jpg","../image/image_59/59_Villeneuve_Ascq_II_8.jpg","../image/image_59/59_Villeneuve_Ascq_II_9.jpg"]},"Consult_chateau_formulairee911":{"id":"Consult_chateau_formulairee911","dept":"59","canton":"Villeneuve_d","commune":"Villeneuve_d","nom":"Villeneuve_d","type":"Châteaux","periode":"XVII","histoire":"sur la Commune de Villeneuve-d'Ascq, le Pavillon de Chasse, et la Villa Gabrielle.                                                                                                                                         BRIGODE ou DE MONTALEMBERT, a été construit, en 1770, pour la Famille de Brigode, expulsée de Hollande, durant les guerres de religion, venue s'installer, en Flandres, en 1623. Le château de la Brigode est aussi connu sous le nom de \"château du comte de Montalembert\". C'est en 1969, que le château de la Birgode fut détruit sauf ses communs qui dataient, de 1820 et qui servent, depuis, de club-house pour le Golf de Brigode. Le château de la Brigode est resté célèbre pour avoir hébergé le roi de France Louis XVIII, en 1815, alors que le monarque fuyait, vers la Belgique et, durant la seconde guerre, le roi George VI d'Angleterre et le maréchal allemand nazi Hermann Göring.                                                                                                                    SART, dès le XIIIe siècle est signalé un manoir au lieu-dit Le Sart dans un acte de vente consigné parmi les titres de l'Abbaye de Loos. le château du Sart a été construit en 1740, de style Flamand. Il était très rarement habité par ses propriétaires, les Seigneurs de Fourmestraux. Le château du Sart est toujours entouré de ses douves en eau. Il allie la brique et la pierre de calcaire.   Le parc du château est aménagé en un golf de 18 trous et dont le château accueille un Club House. En effet, en 1908, Gaston Le Blanc, achète un terrain sur Wasquehal où se trouve le Fort de Wasquehal et le 13 octobre 1910, l'association de Golf du Sart est créée.                                                            il a abrité, la riche bibliothèque Van der Cruisse de Wazier, qui fut détruite durant la guerre de 1914-1918.                                                                                CLAEYS-D'ASCQ, Il date du XXe siècle.  a été bâti en 1965. Sa ménagerie et son portail dataient de 1768. Une vieille demeure se trouvait là avant le château, comme l'atteste le portail daté de 1768.  Jean-Baptiste Delerue Liénart construit une maison en 1858 à l'emplacement de la bâtisse actuelle. En 1870, on y trouve l'hôtel particulier appelé « la Maison Lafage ». Le château Claeys fut construit en 1925, pour Louis Mollet. Il doit son nom à son propriétaire, Mr Charles Claeys.  Menacé par un projet de lotissements, il est acquis par la commune en 1981. Afin d'éviter sa destruction, le château de Claeys d'Ascq a été racheté par la Mairie et sert depuis, de maison de quartier, de salle polyvalente, de centre culturel, et de centre d'animations.","architecture":"VILLA GABRIELLE , en 1856, François Adrien de Brigode, pour accomplir le vu de sa sur Marie Gabrielle décédée, y fonde un hospice pour vieillards. Elles créent un dispensaire qui perdure jusqu'en 1979. De 1873 à la fin des années  1930, un ouvroir (aujourd'hui disparu) .  En 1950, les surs de la Charité cèdent la place aux Franciscaines de Jésus et l'hospice devient  un orphelinat. De 1960 à 1975, la congrégation du Sauveur occupe à son tour les lieux dont elle devient propriétaire,  l'édifice se compose de deux bâtiments : l'aile gauche (vestige d'une précédente ferme) et le corps de logis. Celui-ci, à l'allure plutôt urbaine, se caractérise par son style français. Les soubassements en grès et l'utilisation de la brique associée à des rehauts de pierre blanche locale, rappelle la polychromie de l'architecture du XVIIe siècle. Les deux façades se composent de neuf travées chacune. Un léger avant-corps que couronne un large fronton orné d'un oculus ovale, magnifie les trois travées centrales percées de baies de forme cintrée. Dans le cadre de sa restauration, une vaste terrasse a été ajoutée à l'arrière, prolongée par un jardin de style monastique.\nLa façade côté jardin en 1983. À l'extrême droite, en retrait, le pignon de l'aile gauche. Archives municipales de Villeneuve-d'Ascq, Les Potteau, riches bourgeois lillois, font construire cette résidence dans le village d'Annappes vers 1750. Elle passe par héritage dans la famille des Brigode au début du XIXe siècle puis dans celle des Montalembert en 1913. Inscription à l'Inventaire supplémentaire des monuments historiques en 1986.","habitants":"Sart; famille  de Fourmestraux. Famille des potteaux\"","divers":"sur la Commune de Villeneuve-d'Ascq :, le Pavillon de Chasse, le et la Villa Gabrielle grav 1-2       gps    50° 39' 24? nord, 3° 07' 55? est                     Rexceuil grav 7-8                                 Brigore grav-9                                              Claeys;   GPS : 50° 37' 09\" Nord, 3° 09' 32\" Est","gps":"50° 37' 09\" Nord, 3° 09' 32\" Est","images":["../image/image_59/59_Villeneuve_dAscq_1.jpg","../image/image_59/59_Villeneuve_dAscq_2.jpg","../image/image_59/59_Villeneuve_dAscq_3.jpg","../image/image_59/59_Villeneuve_dAscq_4.jpg","../image/image_59/59_Villeneuve_dAscq_5.jpg","../image/image_59/59_Villeneuve_dAscq_6.jpg","../image/image_59/59_Villeneuve_dAscq_7.jpg","../image/image_59/59_Villeneuve_dAscq_8.jpg","../image/image_59/59_Villeneuve_dAscq_9.jpg"]},"Consult_chateau_formulairecb16":{"id":"Consult_chateau_formulairecb16","dept":"59","canton":"Templeuve-en-Pévèle","commune":"Wannehain","nom":"Wannehain","type":"Château","periode":"XVII","histoire":"WANNEHAIN  Le château de Wannehain appartint successivement aux lignages de Wannehain jusqu'au XVe siècle, de Landas, de la Cessoie, d'Ennetière au XVIIIe siècle, puis de Lalaing jusqu'au début du XXe siècle. Cette imposante cense château compose un jeu de volumes et de toitures très harmonieux. Le corps de logis occupe l'angle nord. Château et grande ferme du XIXe siècle situés dans un parc boisé, avec plusieurs entrées garnies de belles grilles du XVIIIe siècle. Le château lui-même a été assez malencontreusement cimenté au début du XXe siècle semble-t-il. Il comporte encore des caves voûtées et des salons avec des boiseries sculptées.","architecture":"WANNEHAIN,  c'est un bâtiment élargi à la base, à deux niveaux, complété d'un porche à droite et d'une tour d'angle dans la Cour. Cette tour ronde, qui abrite un escalier en chêne à vis, est couverte de petites tuiles carrées anciennes. Sa base est légèrement élargie. Côté cour, le porche a une entrée en arc brisé et présente un plafond en chêne. Une niche abrite une statue de Saint Éloi. L'intérieur du corps de bâtiment recèle des curieux plafonds en chêne : les poutres sont disposées en arête sur les solives dont une de 1630. Le sous-sol contient deux caves voûtées. Les dépendances, disposées autour d'une vaste cour rectangulaire, sont bordées d'un trottoir. Un pignon extérieur porte le millésime de 1748. La grange au sud, est deux fois plus spacieuse que l'église du village.Le corps de bâtiment est entretenu et habité, les dépendances restent affectées à l'exploitation agricole.","habitants":"Famille de Landas\"","divers":"Chateau de Wannehain  à Wannehain","gps":"","images":["../image/image_59/59_Wannehain_1.jpg","../image/image_59/59_Wannehain_2.jpg","../image/image_59/59_Wannehain_3.jpg"]},"Consult_chateau_formulaire1a8e":{"id":"Consult_chateau_formulaire1a8e","dept":"59","canton":"Bavay","commune":"Houdain-lez-Bavay","nom":"Warnicamp","type":"Château","periode":"XIV-XVII","histoire":"WARNICAMP, le château aurait été construit au début du XIVe siècle par le seigneur de Wadimpréau, Wulfard de Ghistelles. Le fief fut vendu successivement aux châtelains de Bouchain, Quiévrain, Mons et Tournai. Le château fut rebâti sur les bases du Moyen-Age à la fin du XVIIe ou au début du XVIIIe siècle. Incendié lors du siège de Valenciennes en 1793 et pendant la guerre de 1914-1918, une tourelle d'angle a également été détruite à ce moment. L'accès au château se fait par un pont permettant de traverser les douves asséchées.près avoir appartenu aux barons de la Bauwette, seigneurs de Warnicamp, le château était à la Révolution la propriété du général Ferrand de la Caussade, qui fut lhéroïque défenseur de Valenciennes. Celui-ci, voulant empêcher les Autrichiens de sinstaller dans son château, y mit lui-même le feu et le détruisit. .","architecture":"WARNICAMP, les bâtiments s'élèvent sur un soubassement de grès, seuls éléments datant du Moyen Age. Les niveaux supérieurs ont été reconstruits en brique à la fin du XVIIe ou au début du XVIIIe siècle. L'aile ouest est constituée d'un corps de logis en rez-de-chaussée avec comble en demi-lune, couvert d'une croupe brisée. Il se termine par un pavillon d'angle couvert d'un toit en pavillon en ardoise. L'aile droite est constituée d'un corps de logis s'élevant sur deux étages avec comble et du pavillon d'angle. L'ensemble est couvert d'un toit brisé en pavillon et d'une croupe.","habitants":"Seigneurs du Bouchain, Quiévrain, Mons et Tournai.\"","divers":"château de Warnicamp à Houdain-lez-Bavay","gps":"","images":["../image/image_59/59_Warnicamp_1.jpg","../image/image_59/59_Warnicamp_2.jpg","../image/image_59/59_Warnicamp_3.jpg"]},"Consult_chateau_formulaire62e2":{"id":"Consult_chateau_formulaire62e2","dept":"59","canton":"Lambersart","commune":"Wervicq-Sud","nom":"Wervicq_Sud","type":"Château","periode":"XIX","histoire":"Deux châteaux dans cet article ; Blanc et Vandermersch.                                 BLANC est un château bâti à Thumeries, sa construction  date de 1541. le château Blanc est un château bâti à WerVicq-Sud. En 1910, Charles Derville-Avot, Rubanier Cominois, entreprit la construction sur l'un de ses terrains wervicquois, d'une imposante demeure bourgeoise, de style néo-Classique et dont il fut l'architecte. En 1914, les travaux sont quasi terminés, lorsque les Allemands réquisitionnèrent la bâtisse afin d'en faire un hôpital de campagne, appelé un lazaret. En 1918, Charles Derville-Avot revendit le château Blanc au Brasseur Alphonse Dalle-Dumont. En 1972, la Famille Dalle cèda le château Blanc, à la commune de Wericq-Sud, qui, conformément aux souhaits de la famille, en fit un lieu culturel et socio-éducatif.  Marie Prouvost ou la Closeraie et le château Demeestère.  En plein centre de la commune, le château Demeestère, est entouré dun parc aménagé de plus de deux hectares avec étang. Ancienne maison dune grande famille de lindustrie textile de la ville, cet ensemble accueille depuis le 1er juin 1986 l'« LOrée du Bois.","architecture":"le château Léon  Vandermersch  Deux châteaux dans cet article ; Blanc et Vandermersch, cette grande demeure, accueille les services de la mairie depuis 1965.  A lachat, il portait le nom de la Closeraie. Cest une demeure typique de la reconstruction de style normand avec faux colombages mis en évidence par les différentes couleurs de peintures. Certains éléments de la partie basse près du porche sont en brique avec chaînage dangle de pierre date de 1926. Il est de style normand, avec de faux colombages. La ville de Wericq-Sud le racheta, en 1962, pour en faire la mairie, en 1965. L'inauguration eut lieu en avril 1964. Datant de 1932, l'ancienne mairie, de style régionaliste, en brique et pierre, a été reconvertie en un immeuble privé.","habitants":"Famille de  Charles Derville-Avot\"","divers":"Deux châteaux dans cet article ; Blanc et Vandermersch à Wervicq","gps":"","images":["../image/image_59/59_Wervicq_sud_1.jpg","../image/image_59/59_Wervicq_sud_2.jpg","../image/image_59/59_Wervicq_sud_3.jpg","../image/image_59/59_Wervicq_sud_4.jpg"]},"Consult_chateau_formulaire2dfb":{"id":"Consult_chateau_formulaire2dfb","dept":"59","canton":"Bailleul","commune":"Flêtre","nom":"Wignacourt","type":"Château","periode":"XIV-XVI","histoire":"dans cet article; à Feltre château de  Wignacourt                                        FELTRE   Les premiers seigneurs connus remontent au XIe siècle et portèrent le nom de Flètre. En 1364, la seigneurie fut relevée par Jean Van Hoote (Jehan du Bos) mais on ignore comment il l'acquit ; c'est à lui que l'on attribue la construction de la tour qui subsiste. Au XVIe siècle, le bien passa dans la famille de Wignacourt où il est resté jusqu'à la Révolution. Ce château est connu dans son aspect du début du XVIIe siècle par une gravure de la Flandria illustrata de Sanderus. C'était un bâtiment quadrangulaire renforcé de tours et d'échauguettes; vers le sud-est, baignant dans les  mêmes eaux, s'élevait une autre construction comprenant une tour ronde flanquée d'une tourelle. C'est cette tour qui a survécu; bâtie en brique sur un soubassement de pierre, son diamètre est important, flanquée d'une tourelle, à son sommet, on remarque la présence d'une série d'arcs brisés, des traces de mâchicoulis et toute une série de fentes verticales évoquant des archères relativement larges. On voit encore la trace de véritables archères, certaines s'arrondissant à la base pour permettre l'usage des armes à feu.\nÉléments protégés MH : le donjon et les parcelles à titre de réserve archéologique : inscription par arrêté du 3 décembre 2002.","architecture":"WIGNACOURT,  La reconstruction du Château de Wignacourt a été souvent attribuée à Jean Van Houtte, entre 1364 et 1380. Le donjon du Château de Wignacourt fut édifié au XVe siècle. En 1532, la seigneurie de Flêtre est passée par un mariage, dans la famille de Wignacourt. En 1799, le château a été détruit, mais le donjon fut conservé, sa destruction s'étant révélée trop difficile. Au début du XIXe siècle, un industriel rachèta la propriété, et construisit une demeure à l'emplacement du château détruit. Il convertira le donjon, en une salle de réception, décoré de lambris de style Louis XV. De 1869 à 1872, un manoir néogothique est construit vers le sud du donjon, qui conserve encore les dispositions générales et le décor original. Le donjon et les parcelles sont inscrits, à titre de réserve archéologique, par arrêté du 3/12/2002. Le château de Wignacourt est privé, fermé au Public.","habitants":"famille de Wignacourt \"","divers":"Deux châteaux dans cet article; Feltre grav -3 et   Wignacourt grav-1-2                                                              Wignacourt  GPS : 50° 45' 11\" Nord, 2° 38' 44\" Est","gps":"50° 45' 11\" Nord, 2° 38' 44\" Est","images":["../image/image_59/59_Wignacourt_1.jpg","../image/image_59/59_Wignacourt_2.jpg","../image/image_59/59_Wignacourt_3.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','59 — Nord'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
