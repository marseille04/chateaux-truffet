de logis comprend un rez-de-chaussée, recoupé par trois pavillons dotés d'un étage, deux aux extrémités et un au centre, ces pavillons sont couverts de toitures transversales. A la base de celui du centre s'ouvre une arcade en plein cintre encadrée par des pilastres à refends; autrefois un pont-levis, auquel s'est substitué un pont dormant, lui donnait accès.","habitants":"Famille  de Bonne Françoise de Heynin \"","divers":"flers d-ascq grav 1 à-3 Flers  GPS : 50° 38' 08,96\" Nord, 3° 07' 58,61\" Est    Brigode grav-4                                  Caeys Ascq grav-5","gps":"50° 38' 08,96\" Nord, 3° 07' 58,61\" Est    Brigode grav-4","images":["../image/image_59/59_Flers_Villeneuve_Ascq_1.jpg","../image/image_59/59_Flers_Villeneuve_Ascq_2.jpg","../image/image_59/59_Flers_Villeneuve_Ascq_3.jpg","../image/image_59/59_Flers_Villeneuve_Ascq_4.jpg","../image/image_59/59_Flers_Villeneuve_Ascq_5.jpg"]},"Consult_chateau_formulairec2e1":{"id":"Consult_chateau_formulairec2e1","dept":"59","canton":"la Croix","commune":"la Croix","nom":"Fontaine_Croix","type":"Château","periode":"XIII-XVII","histoire":"deux châteaux dans cet article la Fontaine et Courcelette.                                                LA FONTAINE le château de Fontaine à Croix, qui appartient à une fondation créée par Gérard Mulliez, ouvre ses portes le 8 avril, pour une visite guidée et gourmande organisée par loffice de tourisme de Roubaix. ce château est caché au milieu du Bois de Warwamme, aux confins de Croix et Villeneuve-dAscq. Datant du XIIIe siècle pour ses parties les plus anciennes, ce château appartient à Gérard Mulliez qui en a fait don à sa fondation, lInstitut Fontaine. Le lieu voit surtout passer des entreprises pour des séminaires ou des réunions  du porche médiéval au premier étage du château en passant par le parc,  propriété de la famille Roussel.                                                                                                                           A l'opposée de la ville de Roubaix à Lonnoy.                                                    COURCELETTE à Lannoy est la plus ancienne construction de la ville. Daprès la taille des pierres celle-ci pourrait être antérieure au XIIe siècle. Vers 1458, le fief de Courcelette appartenait au seigneur Jean III et nétait que la ferme. Le château actuel fut construit vers 1700 sur le même emplacement, elle fut aussi la maison familiale des familles Desbrochers, Parent-Monfort, Hendrick-Dormeuil, Bétremieux, Lehembre et Brame.","architecture":"de FONTAINE la seigneurie de la Fontaine, qui bordait la terre de Croix, existait déjà au XIIIe siècle. De cette seigneurie de la Fontaine, il subsiste le château construit en 1604, dans le style Renaissance flamande,  du XVIIe siècle avec des pignons à pas de moineaux et son haut frontons ouvragés, un peu à l'écart subsiste  à lemplacement dun manoir médiéval  avec une porte fortifiée encadrée par deux tours du XIV -XVe siècle. Ce château classé, plusieurs fois restauré, doit son nom à une fontaine aux eaux réputées miraculeuses qui jaillit plus haut. En 1920, les héritiers de la famille Brame le vendent à lindustriel Benoît Roussel. Après avoir été occupé par les Allemands et pillé par les populations privées de tout, le château est en ruines. Mais Benoît Roussel sauve le bâtiment. En 1981, François Christian, architecte, rachète le château et sattache à le restaurer lui-même et à lui redonner vie.  Éléments protégés MH : les façades et les toitures du château ; les vestiges des douves ; les restes de la porte fortifiée; l'ensemble du parc : inscription par arrêté du 11 janvier 1951.","habitants":"Famille de Gérard Mulliez  et famille de Benoît Roussel\"","divers":"Trois châteaux dans cet article la Fontaine et Courcelette.","gps":"","images":["../image/image_59/59_Fontaine_Croix_II_1.jpg","../image/image_59/59_Fontaine_Croix_II_2.jpg"]},"Consult_chateau_formulaire4a99":{"id":"Consult_chateau_formulaire4a99","dept":"59","canton":"Lille","commune":"Bondues","nom":"Fort_Bondues","type":"Fort","periode":"XVIII","histoire":"Fort BONDUES ou Fort LOBAU; fut construit, sous les ordres du Général Séré de Rivières, de 1877 à 1888. Il est à demi enterré. Ce fort est situé au Nord-Nord-Est de la place, à 41 mètres d'altitude. Le Fort de Bondues faisait partie de la ceinture de 12 forts qui entourait Lille. En forme de trapèze (240 m x 150 m), il est constitué d'un rempart de briques rouges de 720 mètres de périmètre, entouré d'un fossé de 8 m de large. 800 hommes et 40 pièces d'artillerie pouvaient y être abrités. Il intégrait une coupole cuirassée, mais ne disposait pas d'abris ou de magasins à l'épreuve des nouveaux obus et explosifs.","architecture":"Fort BONDUES, Il était aussi vulnérable à partir des hauteurs de Mouvaux. Il a donc peu servi en tant qu'élément de défense. l est d'abord occupé par le 43e régiment d'infanterie, de 1894 à 1899, puis sert à des exercices d'artillerie. La garnison était composée de 792 hommes. Du 13/10/1914 au 17/10/1918, il est occupé par l'Armée allemande. Pendant la seconde guerre mondiale, il est de nouveau occupé par l'armée allemande à laquelle il sert de dépôt de munitions (bombes pour l'aviation allemande) et, du 17 mars 1943 au 1er mai 1944, de lieu d'exécution (68 résistants de la Région y furent tués, certains d'entre-eux furent volontairement dénoncés dans le cadre de l'opération fortitude). Aujourd'hui, Le Fort de Bondues abrite, dans ses murs, le Musée de la Résistance, ouvert au Public.","habitants":"Général Séré de Rivières\"","divers":"GPS : 50° 41' 33\" Nord, 3° 05' 13\" Est","gps":"50° 41' 33\" Nord, 3° 05' 13\" Est","images":["../image/image_59/59_Fort_Bondues_1.jpg","../image/image_59/59_Fort_Bondues_2.jpg"]},"Consult_chateau_formulaire5d4c":{"id":"Consult_chateau_formulaire5d4c","dept":"59","canton":"Templeuve-en-Pévèle","commune":"Frétin","nom":"Frétin","type":"Château","periode":"XII-XVII","histoire":"FRETIN, le château « Wastelier du Parc » a été fondé au XIIe siècle et reconstruit plusieurs fois. En 1708 le duc de Malbrough y séjourna au moment du siège de Lille. On lui donne le nom de « Wastelier » dont il ne subsiste plus que la porte dentrée avec pilastre à bossage (XVIIe-XVIIIe siècle) ainsi que les douves partiellement comblées, tout cela se trouvant au sein de lentreprise Flint Group France. La demi-tour ronde moyenâgeuse a été rasée et le pont levis supprimé. On lui donne ce nom daprès Edouard Henri Wastelier du Parc (mort le 9/12/1909 au château) qui fut Maire de Fretin. Il est le parrain de deux cloches pour léglise en 1868. Le 6 Décembre 1939 cest ici que déjeuna le Roi dAngleterre George VI en tournée dinspection des unités de la Royal Air Force.\nAu moment de lexode, les Allemands occupèrent les lieux, ce fut la résidence dofficiers de la Luftwaffe. Les riverains ont également signalé la présence de nombreux chevaux., les vestiges protégés du château de Fretin (douves, portail) sont inscrits aux M.H. depuis le 12/12/1994. Les vestiges du château de Fretin se situent, au lieu-dit la \"Drève du château\". Le château de Fretin appartient à une société privée.  Emmanuel d'Haussy est seigneur de Fretin en avril 1675, lorsque la terre de Fretin est érigée en baronnie. Fretin avait été érigée en baronnie par le roi d'Espagne en 1666. Son château de Fretin où il réside normalement a été plusieurs fois pillé par des gens de guerre et les titres ont été perdus.    Éléments protégés MH : le portail d'entrée de l'ancienne ferme du château ; le portail situé à l'extrémité sud du parc ; les douves comblées ou non ; le sol et sous-sol correspondant à l'assise du château.","architecture":"FRETIN  la construction du château de Fretin date du 4ème quart du XVIIe au XVIIIe siècle, fut reconstruit, plusieurs fois. Le portail date de la fin du XVIIe siècle, tandis que les pilastres sont du XVIIIe siècle.       il a été édifié au XIIe siècle et reconstruit plusieurs fois, tandis que les pilastres sont du XVIIIe siècle. Éléments protégés MH : le portail d'entrée de l'ancienne ferme du château est situé à l'extrémité sud du parc ; les douves comblées ou non ; le sol et sous-sol correspondant à l'assise du château : inscription par arrêté du 12 décembre 1994.","habitants":"Famille de  Emmanuel d'Haussy\"","divers":"Frétin GPS : 50° 33' 29\" Nord, 3° 08' 06\" Est","gps":"50° 33' 29\" Nord, 3° 08' 06\" Est","images":["../image/image_59/59_Fretin_1.jpg","../image/image_59/59_Fretin_2.jpg"]},"Consult_chateau_formulairef49e":{"id":"Consult_chateau_formulairef49e","dept":"59","canton":"Hazebrouck","commune":"Vesignion","nom":"Garenne_59","type":"Château","periode":"XIV","histoire":"LA GARENNE, au XIVe siècle, époque à laquelle les Steenbecque devinrent propriétaires de la seigneurie d'Ebblinghem, il devait exister un manoir assez simple entouré de douves, non loin de l'église. Cette famille fit construire le château. Au XVIe siècle, la seigneurie passa par alliance aux Mailly-Mamez et fut érigée en baronnie. A la mort de Maximilien de Mailly-Mamez en 1690, l'édifice revint à sa fille, épouse du baron de Spiering, et habitait celui de Fronsberg dans le haut Palatinat. Il resta inhabité jusqu'à sa vente en 1778 à Albert de Stappens, grand maître des Eaux et Forêts de la Flandre maritime. Celui-ci le fit démolir pour le remplacer par le château actuel. Depuis 1876, la propriété appartient à la famille des Van Pradelles de Palmaert.","architecture":"LA GARENNE, le château est une construction  en brique et pierre comprenant un corps de logis rectangulaire de sept travées individualisées par des pilastres à refends du côté de la façade principale; mais celles des extrémités sont plus basses que les autres; au delà, des annexes longues de quatre travées et réalisées en brique ont été plaquées contre les façades latérales. Des balustrades bordent les toitures ; des pots-à-feu les protégent pour prolonger à ce niveau le rythme des travées. L'élévation comprend deux étages et un attique, tout au moins pour les cinq travées centrales. En 1981, le bâtiment est acheté par M. Rousseau, restaurateur. Le dimanche 27 novembre 1983, le restaurant gastronomique, appelé le Manoir de la Garenne, a été ravagé par un incendie. Les dégâts matériels sont très importants.","habitants":"Famille Mailly-Mamez \"","divers":"Château de la Garenne","gps":"","images":["../image/image_59/59_Garenne_59_1.jpg","../image/image_59/59_Garenne_59_2.jpg"]},"Consult_chateau_formulaire424b":{"id":"Consult_chateau_formulaire424b","dept":"59","canton":"Fourmies","commune":"Glangeon","nom":"Glageon_Tourelles","type":"Châteaux","periode":"XV-XVI","histoire":"GLAGEON, dit des Tourelles 1597\". Cette commune est bien représentée dans les albums de Croÿ puisque cinq vues au moins lui sont consacrées : deux dans le volume II, une dans le volume IX et deux qui se trouveraient dans le musée d'Avesnes. Une rangée d'arbres bordent la rivière qui fait tourner la roue d'un moulin (visible sur la planche 28 de l'album . Le château bâti en quadrilatère est entièrement couvert d'ardoise, il est peut-être construit en briques ou en moellons de pierre couverts d'un enduit rosé. L'entrée (non visible ici) se situe à l'ouest, du côté des quatre tours. Elle possède un pont sur des douves remplies d'eau. Trois autres tours sont visibles, elles cantonnent les angles de cet ensemble. A droite on découvre un élégant jardin rectangulaire composé de trente-deux parterres entourés d'une enceinte cantonnée de tourelles aux angles. Le tout dégage un air d'agrément, mais c'est bien d'un château-fort qu'il s'agit , car il en possède toutes les caractéristiques. Il ne reste plus rien de ce château que Guy de Châtillon avait acheté à Marie de Chalons en 1333 et qui appartint à Jean d'Eclaibes puis à Philippe de Stavel qui était grand maître de l'artillerie de Philippe II d'Espagne.","architecture":"GLAGEON,   Le plan de la fin du XVIe siècle, tiré des minutes d'Adrien de Montigny le peintre des Albums de Croÿ, montre le village à peu près dans sa conformation actuelle. Une trentaine de feux sont dispersés le long du bas des rues de Fourmies, du Trieux le Coq, Georges et Dufrenes, toutes sont couvertes de toits de chaume et seuls l'église, le château et son pigeonnier et le moulin ont une couverture d'ardoise. En 1773 est ouverte la minière de Couplevoie. Suite à l'exploitation de la mine de fer jaune sur Féron et Couplevoie est découverte une couche assez régulière de fer rouge, exploitable de Glageon à Momignies. L'activité d'extraction de la pierre calcaire est également ancienne sur la commune, antérieure au XIXe siècle. A partir de 1840, Glageon connaît également un développement industriel lié aux filatures, aux usines de tissage et de peignage de la laine. La présence de l'eau, d'une population agricole disponible et l'arrivée du chemin de fer permettent un écoulement rapide des produits manufacturés. On assiste alors à un emballement de la construction, 70% du patrimoine immobilier de Glageon se situant dans une tranche de soixante ans. Le centre du village s'étoffe et englobe la trame agricole existante. Après la Première Guerre mondiale, il n'y a plus de grosses installations industrielles nouvelles. Depuis l'après-guerre, Glageon a connu une période de forte récession industrielle, seule la carrière génère encore une activité industrielle importante","habitants":"Famille de à Philippe de Stavel \"","divers":"Chateau des Tourelles à Glageon","gps":"","images":["../image/image_59/59_Glageon_Tourelles_1.jpg","../image/image_59/59_Glageon_Tourelles_2.jpg"]},"Consult_chateau_formulaire818e":{"id":"Consult_chateau_formulaire818e","dept":"59","canton":"Coudekerque-Branche","commune":"Steene","nom":"Grand_Millebrugge","type":"Château","periode":"XIV-XVI-XVIII","histoire":"GRAND-MILLEBRUGGE, dit de Duriez, château bâti avant 1825, à la limite du XVIIIe et du XIXe siècle. La tradition orale dit que la construction se situerait en 1798. En 1828 furent commencés les travaux de creusement d'un port fluvial destiné à desservir une première sucrerie qui venait d'être aménagée sur la propriété. Sucrerie construite en 1834. Ferme rebâtie en 1854 sur un plan plus vaste et distillerie adjointe à la sucrerie en 1854 (datées par source). Au début du XIXe siècle, M. Cadet-Desgraviers réaménagea le site pour développer une activité industrielle. En 1913, la famille Duriez racheta la distillerie de Steene, et rénova le site, qui était en mauvais état.","architecture":"GRAND-MILLEBRUGGE  activité sucrière supprimée après 1880 et agrandissements de la distillerie réalisés jusqu'à nos jours, eu servit de doublure à la Lanterne, résidence versaillaise des chefs de lÉtat. Il est à cheval sur deux communes, Armbouts-Cappel et Steene, chacune d'un côté du canal de la Haute Colme. Au XXe siècle, le manoir fut restauré par la famille Duriez, cette demeure restaurée en 2010 a été reconvertie en chambres d'hôtes et salons de réception. On y accède au bout d'une longue allée de peupliers et de belles villas. \"Quad Aventures\", son prestataire de loisirs, géré par Christophe Declerck, y a également fait établir ses quartiers. Le château est édifié en maçonnerie de pierre enduite, ardoise en couverture, toit à croupes sur le corps central, toit à longs pans sur les corps latéraux; la ferme: maçonnerie de brique, tuile flamande mécanique, toit à longs pans, logis avec sous-sol couvert de voûte en berceau en anse de panier, étable, écuries et bergerie couverts de voûte en pendentifs barlongue ; distillerie, maçonnerie de brique,  couverture de tuile flamande mécanique.","habitants":"Gd-Millebruge Famille Duriez                                                   Sternburg l'Archiduc Albert \"","divers":"Deux châteaux dans cet article Grand-Millebruge- grav-1 et Steenburg   GPS : 50° 57' 48\" Nord, 2° 20' 51\" Est","gps":"50° 57' 48\" Nord, 2° 20' 51\" Est","images":["../image/image_59/59_Grand_Millebrugge_1.jpg"]},"Consult_chateau_formulaire4ad5":{"id":"Consult_chateau_formulaire4ad5","dept":"59","canton":"Grande-Synthe","commune":"Gravelines","nom":"Gravelines","type":"fortifications","periode":"XV-XVI","histoire":"GRAVELINES   La place de Gravelines vit commencer sa fortification en dur sous Charles Quint au plus tard en 1528. Après la prise de Gravelines par Louis XIV en 1652, Vauban participe personnellement à la défense de la place. Les fortifications seront sans cesse améliorées durant tout le XVIIIe et le XIXe siècles:  en 1742, date portée sur le magasin à poudre. En 1902, la place de Gravelines est déclassée, en effet, la commune étant trop petite pour supporter le cout de rachat des fortifications à l'état, l'enceinte échappe à la pioche des démolisseurs, mais les portes de Dunkerque et de Calais seront démolies en 1906. L'effort entrepris par la commune depuis deux décennies, nous permet d'admirer non seulement la doyenne de la fortification bastionnée en Flandre mais aussi un des plus bel ensemble de ce type conservé en France. Le corps de garde de la place forte, construite dans la première moitié du XVIIIe siècle, est appelé improprement château...","architecture":"GRAVELINES; est un château bâti à Gravelines,  le château, appelé aujourd'hui l'arsenal, date du XVIe siècle, et a été restauré par Vauban après l'explosion de la poudrière en 1654.  L'église Saint Willibrord fut en grande partie détruite par un ouragan sous le Premier Empire (effondrement de la flèche et du clocher). Édifiée en 1598, l'église Saint-Willibrord était de type hallekerque. Aujourd'hui, seule la façade est d'origine, avec un remarquable portail renaissance. A l'intérieur, dans la chapelle du bas-côté droit, on trouvera un retable datant du début XVIIe siècle. Des lambris, un buffet d'orgues orné d'instruments de musique entrelacés et une belle chaire de bois sculpté du XVIIe siècle constituent un ensemble de belle qualité.","habitants":"VAUBAN\"","divers":"Gravelines;  GPS : 50° 59' 09\" Nord, 2° 07' 42\" Est","gps":"50° 59' 09\" Nord, 2° 07' 42\" Est","images":["../image/image_59/59_Gravelines_1.jpg","../image/image_59/59_Gravelines_2.jpg","../image/image_59/59_Gravelines_3.jpg"]},"Consult_chateau_formulaire5430":{"id":"Consult_chateau_formulaire5430","dept":"59","canton":"Avesnes-sur-Helpe","commune":"Guissignies","nom":"Guissignies","type":"Château","periode":"XVIII","histoire":"GUISSIGNIES, le prévôt de Valenciennes, Fourmestraulx, fait édifier à la fin du XVIIIe siècle, un pavillon de chasse constitué d'un couloir desservant des boudoirs, origine de l'actuel château.  En 1869, la propriété est vendu au comte de Mouras qui aménage les communs et transforme les ailes en retour, qui sont aujourd'hui plus réduites.","architecture":"GUISSIGNIES, En 1805, le château a trois ailes disposées selon un plan en U. Il est agrandi en 1805 par l'adjonction de deux corps de bâtiment élevés perpendiculairement aux ailes en retour.le comte de Mouras fait bâtir une chapelle. Aujourd'hui l'aile nord-ouest des communs a disparu, ainsi que les deux ailes ajoutées au début du XIXe siècle. Le château est précédé d'une allée et d'une cour. L'ensemble est élevé en brique. Un enduit est utilisé pour marquer les travées de l'élévation antérieure et sur l'ensemble de l'élévation postérieure. L'élévation antérieure comprend un avant-corps en légère saillie, couronné par un attique, percé de deux oculi et une lucarne à fronton, surmonté d'une balustrade. Des pignons à redents marquent le départ des ailes en retour. La croupe brisée est percée de lucarnes sur l'élévation postérieure. Des pilastres, placés toutes les trois travées, rythment verticalement l'élévation. Les travées centrales sont couronnées par un fronton cintré. Les communs sont élevés en grès, pierre et brique.","habitants":"comte de Mouras \"","divers":"Gussignies  GPS : 50° 20' 18\" Nord, 3° 44' 32\" Est","gps":"50° 20' 18\" Nord, 3° 44' 32\" Est","images":["../image/image_59/59_Guissignies_1.jpg","../image/image_59/59_Guissignies_2.jpg","../image/image_59/59_Guissignies_3.jpg"]},"Consult_chateau_formulaire5025":{"id":"Consult_chateau_formulaire5025","dept":"59","canton":"Lille","commune":"Hallennes-lez-Haubourdin","nom":"Hallennes","type":"Château","periode":"XV","histoire":"HALLENNES  ce manoir, édifié à la fin du XVe siècle et restauré récemment,  Construit en 1502 par Marc de Cuinghien, alors seigneur d'Hallennes, son style Renaissance flamande se retrouve dans toute la région de Flandre romane Marc de Cuinghien.","architecture":"HALLENNES . Il se caractérise par une tour octogonale et des pignons à pas de moineaux qui furent inscrits à l'inventaire des M.H. depuis août 1975. comprend un bâtiment allongé limité par des pignons à pas-de-moineaux; à celui de droite s'accolent deux annexes plus basses dont les pignons présentent également des redents; parallèlement au bâtiment principal du côté de la rue, est plaquée une construction plus courte, dans l'angle rentrant ainsi formé se loge une haute guette hexagonale. En une position nettement oblique, un bâtiment bas à simple rez-de-chaussée, s'adosse à la construction courte. Les murs sont en brique sur un soubassement de grès, toute la partie située à gauche de la tourelle et l'ensemble de la façade arrière du bâtiment principal présentent un étage monté en encorbellement sur des corbeaux de bois; la paroi supérieure est réalisée avec ce même matériau. Des bâtiments servant de locaux de service, en brique et pierre, ferment deux côtés de l'enclos.  Éléments protégés MH : les façades et les toitures des deux bâtiments à pignons à pas de moineaux, du bâtiment qui leur est contigü et de la tourelle d'escalier : inscription par arrêté du 1er août 1975.","habitants":"Familled de Marc de Cuinghien\"","divers":"Hallennes GPS : 50° 36' 48,6\" Nord, 2° 57' 38,88\" Est","gps":"50° 36' 48,6\" Nord, 2° 57' 38,88\" Est","images":["../image/image_59/59_Hallennes_1.jpg","../image/image_59/59_Hallennes_2.jpg","../image/image_59/59_Hallennes_3.jpg"]},"Consult_chateau_formulaired339":{"id":"Consult_chateau_formulaired339","dept":"59","canton":"Avesnes-sur-Helpe","commune":"Dompierre-sur-Helpe","nom":"Hugémont_59","type":"Château","periode":"XVI-XVII","histoire":"HUGEMONT,  l'origine de la ferme remonterait au XVe siècle. En 1602, le comte de Berlaimont vend une maison de cense à d'Anneux. En 1643, la guerre ravage la région. En 1659, le traité des Pyrénées intègre la région d'Avesnes au royaume de France. En 1674, le terrain est vendu à Nicolas de Préseau, anobli récemment. Il cumule les fonctions de greffier du magistrat, contrôleur des Fortifications, prévôt de la terre d'Avesnes. Il entreprend la construction du château, qui sera achevé en 1714. Les jardins au sud sont aménagés vers 1760. La ferme est agrandie durant la deuxième moitié du XVIIIe siècle et on ajoute un certain nombre de bâtiments, les haras qui ferment toujours l'actuelle cour de ferme bâtis vers 1769 pour Jacques Marguerite de Préseau, inspecteur général de la Maréchaussée et maître de cavalerie. En 1764, le château fait l'objet d'un premier remaniement, en 1860 Jules de Colnet maire de Dompierre et conseiller général le remet au goût du jour. En 1898, la tour sud-est est détruite dans un incendie. En 1895, le château passe par mariage à la famille De Chambure à qui il appartient toujours.\nLe château est une grande demeure rurale, de plan rectangulaire, cantonnée de quatre pavillons carrés plus élevés que le corps principal. La façade sud donne sur le jardin et domine le parc à l'ouest. L'édifice montre des chaînages d'angles, des entourages de baies et des cordons en briques et pierres en harpe, et une maçonnerie en moellons de pierre grise. Le parc constitue un vaste ensemble paysager remarquable, avec trois étangs (à l'origine, des viviers) sur un hectare, une source au nord-est formalisée par une fontaine monumentale en pierre bleue avec exèdres, escalier et terrasse, datant  du milieu du XVIIIe siècle.","architecture":"HUGEMONT, Les étangs alimentaient un moulin en contrebas qui existe toujours en amont de la rivière. On trouve également une glacière en pierre effondrée et deux petits ponts. Au sud, l'ancien jardin à la française a été remplacé par une pelouse à l'anglaise, vers 1860: cette partie est séparée des étangs par un mur de soubassement en pierre, surmonté de vases. La grande allée de tilleuls ont été récemment reboisées. Le mur de clôture est en moellons de pierre bleue appareillés. Le portail au nord-est est encadré de deux pavillons abandonnés. On accède aux bâtiments agricoles par une allée de platanes. La cour de ferme est entourée de multiples bâtiments: au nord-ouest se trouve la bâtisse la plus ancienne, du XVIe siècle, en pierre grossièrement taillée, de 40 mètres de long, à deux niveaux d'élévation. Les côtés nord et sud de la cour sont fermés par de hauts bâtiments des anciens haras, construits en gros moellons de pierre et chaînes d'angles en pierre taillée, couverts d'ardoises. Vers le nord se trouvent une porcherie et un pigeonnier. Éléments protégés MH : les façades et les toitures du château ; l'ensemble des bâtiments agricoles et la charpente ; l'allée du parc ; l'allée de platanes  menant au château : inscription par arrêté du 13 mars 2000.","habitants":"Famille de Jacques Marguerite de Préseau\"","divers":"Dompierre  GPS : 50° 08' 44\" Nord, 3° 52' 02\" Est                                                 Dompierre  GPS : 50° 68' 39\" Nord, 3° 50' 34\" Es","gps":"50° 08' 44\" Nord, 3° 52' 02\" Est","images":["../image/image_59/59_Hug%c3%a9mont_59_1.jpg"]},"Consult_chateau_formulaire0195":{"id":"Consult_chateau_formulaire0195","dept":"59","canton":"Fourmies","commune":"Sars-Poterie","nom":"Imbert","type":"manoir","periode":"XVIII","histoire":"IMBERT, en 1860, dans le bourg rendu célèbre par ses poteries de terre, ses grès et ses verres, M. Eugène Antoine Imbert-Vanickaut devient directeur associé de la verrerie d'en bas. Vers 1868, Eugène Antoine fit bâtir le château face à la verrerie d'en haut. Antoine meurt en juin 1873 laissant les usines et le château à son fils Henri, en 1884, il prend en main les deux verreries. Le dernier four s'éteind en 1937 et en 1941, la propriété passa à l'Association de Lille-Est.  Les deux verreries connaissent une activité très importante mais ferment cependant leurs portes en 1937 occupant alors encore 540 ouvriers. Elles sont vendues à un fabricant dengrais puis à une entreprise de construction mécanique qui ferme en 1960.","architecture":"IMBERT, en 1962, la demeure devient propriété du Centre Culturel. Au milieu d'un bouquet d'arbres dont certains sont centenaires, le château apparaît comme une construction quadrangulaire, la façade qui donne sur la grille d'entrée comporte un niveau de soubassement, un rez-de-chaussée, un étage, avec toit brisé couvert d'ardoises. La brique domine mais la pierre bleue apparaît en cordons. Un perron central donne accès à la porte qu'encadrent, au rez-de-chaussée, quatre fenêtres. La façade arrière présente deux rangs de six fenêtres. A l'intérieur une porte qui donna peut-être sur l'office montre des carreaux de couleurs finement taillés. musée de la verrerie et de la poterie.","habitants":"Famille Eugène Antoine\"","divers":"Château  d'Imbert à Sars-Poterie","gps":"","images":["../image/image_59/59_Imbert_1.jpg","../image/image_59/59_Imbert_2.jpg"]},"Consult_chateau_formulaire7321":{"id":"Consult_chateau_formulaire7321","dept":"59","canton":"Wormhout","commune":"Bambecque","nom":"Ingelshof","type":"Château","periode":"XVIII","histoire":"INGELSHOF, sur un fief qu'il venait d'acquérir du comte de Souastre, Robert-Guillaume Delattre, seigneur Rombies et d'Alkerque, négociant armateur à Dunkerque, bâti un château qui porte en façade arrière Ingelhot, et sur une souche de cheminée, la date de 1778. Ce bâtiment est parvenu jusqu'à nous à peu près dans l'intégralité.","architecture":"INGELSHOF, de plan rectangulaire, l'édifice s'élève sur deux étages couronnés d'un toit à quatre pentes qu'éclairent d'importantes lucarnes. Sauf au portail principal où le chambranle est en pierre, la brique est l'unique matériau utilisé et l'unique décor puisqu'on la trouve à l'encadrement des baies et en inscription (Ingelhot), légèrement en saillie à la corniche et au fronton. On est surpris d'une belle trouvaille:  le tracé du fronton et des baies; plutôt qu'un arc en doucines affrontées, le premier dessine une sorte de chapeau de gendarme, les secondes terminent à l'horizontale un arc à peine cintré, cette note souriante se retrouve à l'intérieur où elle est donnée par des carreaux de faïence dunkerquoise, par les cheminées en marbre et par la rampe d'escalier au départ mouluré. Éléments protégés MH : les façades et les toitures à l'exception du bâtiment accolé à la façade sud : inscription par arrêté du 20 janvier 1983.","habitants":"Robert-Guillaume Delattre\"","divers":"Château d'Ingelshof   à Bambecque     GPS : 50° 53' 59\" Nord, 2° 32' 26\" Est","gps":"50° 53' 59\" Nord, 2° 32' 26\" Est","images":["../image/image_59/59_Ingelshof_1.jpg"]},"Consult_chateau_formulaire23fc":{"id":"Consult_chateau_formulaire23fc","dept":"59","canton":"Lille","commune":"Lomme","nom":"Isenghien","type":"Château","periode":"XX","histoire":"ISENGHIEN, dit de Kinèpolis, le premier seigneur connu de Lomme, Hughes, est cité en 1066 dans la charte de fondation de la collégiale Saint-Pierre de Lille; la seigneurie appartient par la suite à diverses familles. A la fin du XVe siècle, elle passa aux Vilain de Gand; en 1582, Maximilien Vilain, qui avait combattu les Gueux, reçut le titre de comte d'Isenghien. Après la conquête de la Flandre par Louis XIV, Balthazar Vilain se rallia au Roi et il fut fait prince d'Isenghien. A la mort de Louis de Gand, maréchal de France en 1767, la terre revient à l'un de ses parents, le marquis d'Hem qui fut le dernier seigneur de Lomme.","architecture":"ISENGHIEN,  de l'imposant château d'origine, il ne restait plus qu'une aile minuscule servant de pavillon de chasse, ainsi que la ferme. À la Révolution, les ruines du château et la ferme furent vendus comme biens nationaux. En 1840, la ferme fut détruite et en 1850, la propriété fut rachetée par M. Tripier qui fit édifier à l'intérieur des anciennes douves, une demeure de campagne qui garda le nom de château d'Isenghien. Pendant la Première Guerre mondiale, elle fut très endommagée, mais partiellement reconstruite par la suite, le château d'Isenghien est un édifice qui sert désormais de façade à un cinéma multiplexe de la chaîne Kinépolis, propriété de cette société.","habitants":"Famille Balthazar Vilain\"","divers":"Château dit de Kinpolis à d'isenghein  GPS : 50° 39 05\" Nord, 2° 58' 57\" Est","gps":"50° 39 05\" Nord, 2° 58' 57\" Est","images":["../image/image_59/59_Isenghien_1.jpg","../image/image_59/59_Isenghien_2.jpg"]},"Consult_chateau_formulaire85e1":{"id":"Consult_chateau_formulaire85e1","dept":"59","canton":"Wormhout","commune":"Socx","nom":"Klap_Houck_Socx","type":"Manoir","periode":"XVIII-XIX","histoire":"Deux châteaux dans cet article  Klap-Houck et Socx.                                                                      KLAP HOUCK, manoir construit avant 1820,  à la limite du XVIIIe et du XIXe siècle : la cloche de la demeure porte la date de 1789; le maison de gardien est ajoutée vers 1861, daté par source, c'est à la même époque que fut construite la serre. Le sous-sol est couvert de voûte en berceau segmentaire en brique.                                                                                                 SOCX , la construction du château de Socx date de la 1ière moitié du XIXe siècle. Le parc du château et son potager au lieu-dit \"le klap-houck\" date de 1820 et sont inscrits aux M.H. depuis le 2/05/2006. Un jardin était mentionné en 1780. Le château de Socx est inscrit aux M.H. avec ses façades, ses toitures, son salon rose et son salon bleu depuis le 2/11/1976.  est privé et fermé au Public.: sous-sol, un étage carré, étage de comble, Élévation ordonnancée, en brique, enduit: toit à longs pans, à pignon couvert en   ardoise. Propriété de M.Dekytspotier.","architecture":"SOCX, depuis plusieurs générations il appartient à la famille Desticker. Niché au milieu d'un parc aux essences variées puisqu'on y trouve hêtres pourpres, platanes, bouleaux argentés, cèdres du Liban, et chênes, le château comporte un corps de logis central rectangulaire de cinq travées prolongé par deux pavillons légèrement saillants que couronne un fronton triangulaire et qu'encadrent des pilastres à refends. Surmonté d'une toiture aux versants peu accusés, il s'élève sur deux niveaux. Au nord, les ouvertures, toujours légèrement cintrées, sont régulièrement espacées. La façade sud se différencie de l'autre par la disposition et la forme des baies dans les pavillons: une seule, en plein cintre, au rez-de-chaussée et trois à l'étage, rectangulaires et accostées de pilastres. Ces derniers détails, la forme des combles, la présence de demi oculus et, au nord seulement, d'une corniche denticulée, permettent à coup sûr de dater le bâtiment. A l'intérieur, les boiseries, les cheminées, les gypseries, les rampes d'escalier et les décors divers nous confirment dans cette certitude. Mention particulière à la grille en bois qui ferme la serre et à une curieuse porte qui donne accès aux communs.  Éléments protégés MH : les façades et les toitures ; le salon rose et le salon bleu avec leur décor, inscription par arrêté du 2 novembre 1976. Le parc du château, ainsi que son potager situé au lieudit \"le Klap-Houck\" à l'angle de la route nationale 16 (Dunkerque - Paris) et de la route nationale 28 (Bergues - Saint-Omer) : inscription par arrêté du 2 mai 2006.","habitants":"Famille Desticker\"","divers":"Deux châteaux dans cet article  mairie grav -1  Klap-Houck grav 2 et Socx grav 3.                                                        GPS : 50° 56' 10\" Nord, 2° 25' 32\" Est","gps":"50° 56' 10\" Nord, 2° 25' 32\" Est","images":["../image/image_59/59_Klap_Houck_Socx_1.jpg","../image/image_59/59_Klap_Houck_Socx_2.jpg","../image/image_59/59_Klap_Houck_Socx_3.jpg"]},"Consult_chateau_formulaire18e0":{"id":"Consult_chateau_formulaire18e0","dept":"59","canton":"Sin-le-Noble","commune":"Lallaing","nom":"Lallaing","type":"Château","periode":"XIII","histoire":"trois châteaux dans cet article; Lallaing, Fermelles et Montozon.                                                                     LALLAING, des Comtes de Lallaing, la première occupation du site date du XIIe siècle ; la motte castrale s'est transformée en forteresse. Le château est le fief principal de cette famille  dont plusieurs membres sont des personnages illustres. Les seigneurs de Lallaing disposent de l'important château dont l'enceinte englobe l'église au XIIIe siècle. Une idée assez précise de l'édifice de la fin du Moyen-Age est fournie par trois gouaches des albums de Croy : la plate-forme était entourée d'une courtine polygonale crénelée, sommée d'au moins quatre tours circulaires. L'entrée se faisait au niveau d'un gros donjon quadrangulaire, muni au niveau du portail, d'un petit avant-corps rectangulaire. Il s'agit du donjon du XIIe siècle remanié au XVIe siècle par le percement, sur sa façade sud-est, de quatre travées de fenêtres à meneaux. A l'angle nord-ouest, une petite tourelle carrée dépasse le donjon de deux niveaux supplémentaires. Au XVIIe siècle, le fief passe à la famille d'Arenberg, les guerres menées par le roi Louis XIV sont lourdes de conséquences pour le château ; celui-ci se détériore rapidement. Le domaine est vendu, en 1904, par la princesse d'Arenberg à M. Morel. En 1959, la commune acquiert la propriété et confie à l'architecte douaisien Coisne la réalisation d'un nouvel hôtel de ville. Les derniers éléments restants du site sont détruits à l'exception du pont et de la porte d'entrée qui sont conservés et servent d'entrée à l'ensemble du site de l'hôtel de ville et de son parc, où l'on peut voir un pilori.  Éléments protégés MH : les vestiges de la porte situés dans le jardin public menant à l'hôtel de ville : inscription par arrêté du 20 octobre 2003 ,   propriété de la commune, vestiges.","architecture":"Au nord  Est de Lallaing château de FERMELLES à  BOUVIGNIES   La Terre et Seigneurie de Bouvignies appartenaient au Marquis de Nédonchel en 1781.                                                                                        MONTOZON,  construit au début du XIXe siècle une pierre porterait la date de 1820 ou 1830, ce château a appartenu à Delfosse, entrepreneur général des lits militaires puis a son gendre le comte de Montozon et au gendre de celui-ci M. Davillier. Le corps de logis est long de neuf travées et deux longues ailes l'encadrent: leur façade sur la cour présente trois travées, celle qui est tournée vers l'extérieur en a cinq; l'élévation comprend un rez-de-chaussée et un étage montés sur une cave; une toiture à deux pentes couvre le bâtiment principal, des croupes les deux ailes. Les fenêtres sont légèrement cintrées; à l'étage, une niche concave, actuellement vide, constitue l'axe de la bâtisse; deux autres niches encadrent chacune des deux baies du front des ailes, mais celles-ci ont conservé leurs statues de style antiquisant; ces statues, avec les chaînages des angles et le fort cordon horizontal séparant les étages sont les seuls éléments décoratifs de cet ensemble. La propriété morcelée, ses occupants l'ont enlaidie par des adjonctions parasitaires. L'intérieur aurait conservé des escaliers et des boiseries qui ne seraient pas dépourvus d'intérêt. Une belle grille relie à gauche le château à ses communs; on accède à ceux-ci par une porte cochère dont les pilastres doriques supportent un fronton triangulaire.","habitants":"des Comtes de LALLAING   \"","divers":"trois châteaux dans cet article; Lallaing_ grav 1-2-3-4-7, fermelles grav-4 et Montozon grav-5-6.    Lallaing  GPS : 50° 23' 27\" Nord, 3° 10' 09\" Est                                                         Frenelles  GPS : 50° 24' 58,23\" Nord, 3° 14' 12,23\" Est","gps":"50° 23' 27\" Nord, 3° 10' 09\" Est","images":["../image/image_59/59_Lallaing_1.jpg","../image/image_59/59_Lallaing_2.jpg","../image/image_59/59_Lallaing_3.jpg","../image/image_59/59_Lallaing_4.jpg","../image/image_59/59_Lallaing_5.jpg","../image/image_59/59_Lallaing_6.jpg","../image/image_59/59_Lallaing_7.jpg"]},"Consult_chateau_formulaireda85":{"id":"Consult_chateau_formulaireda85","dept":"59","canton":"Lambersart","commune":"Lambersart","nom":"Lambersart","type":"château","periode":"XVI-XIX","histoire":"Deux châteaux dans cet article Cessoye et les Ormes                                             CESSOYE,  en 1357 le fief appartenait à Pierre Vretes; en 1389, à Jacques Gommer. Il y avait là un manoir pourvu de motte avec fossés qui, en 1422, entre les mains de Jean Marquant, roi de l'Épinette, époux de Catherine Gommer. En 1784, le château est dit de la Mairie, car appartenant aux Rouvroy de la Mairie. Est-ce cette famille qui le fit rebâtir en style Louis XVI  Pierre-Joseph Rouvroy, écuyer, fut le dernier seigneur. Une Rouvroy se maria avec un du Lac de Fougères, maire de Lambersart en 1857. Puis le domaine passa au marquis d'Espagne de Venevelles qui, de 1887 à 1895, le loua à Albert Mabille de Poncheville, notaire. Un tisseur lillois l'occupa à son tour et c'est en 1900 que le Révérend-Père du Lac, recteur de Sainte-Geneviève à Paris, le vendit aux Dubar. Ils firent détruire le vieux château. Trouvant l'édifice très délabré et souvent inondé l'hiver parce qu'il était situé en un point très bas, les nouveaux propriétaires firent reconstruire le château en 1908 mais en arrière de l'emplacement de celui construit plus bas. Le château, de plan quadrangulaire, de style néo-classique, est à sept travées et deux étages aux élévations antérieures et postérieures, le deuxième étant parfaitement dissimulé derrière la balustrade de couronnement. L'ordre colossal confère à l'ensemble une puissante monumentalité. Toutes les façades ne sont que briques recouvertes d'un enduit blanc dont l'uniformité a été quelque peu rompue.","architecture":"des ORMES, ce château a été bâti en 1863 comme l'indique une inscription placée sur une façade latérale. Il a été conçu dans l'esprit de la Renaissance flamande et la variété de traitement de chacune de ses faces lui donne beaucoup de pittoresque. La brique et la pierre ont été associées; la première dessine un treillis de losanges noirs sur fond rouge, la seconde a été réservée aux chaînages des angles, aux cordons horizontaux séparant les étages, aux redents des pignons à pas-de-moineaux ainsi qu'aux encadrements des fenêtres dont certaines présentent des arcs en mître. La façade est divisée en trois parties : deux travées à gauche, couronnées par un pignon à pas de moineaux et une tour carrée à droite encadrent un porche ouvert de trois travées surmonté d'une loggia et d'une haute lucarne. C'est un pignon à redents qui marque l'aile de la façade latérale de gauche ; sa fenêtre centrale, à l'étage, est montée en encorbellement. Une tourelle ronde fait écho à la grosse tour carrée en façade latérale de droite. La composition de la façade postérieure est moins réussie. Des sculptures enrichissent les deux façades principales; celles du porche et de la loggia et celle de la fenêtre en encorbellement; c'est sur cette dernière qu'on lit la date de 1863. Près de l'entrée, une chapelle rectangulaire a l'angle gauche de sa façade flanqué d'une haute tourelle, mais celle-ci a perdu sa poivrière.","habitants":"Famille de  Rouvroy de la Mairie\"","divers":"Deux châteaux dans cet article Cessoye grav-2-3   et les Ormes grav 4 à 5","gps":"","images":["../image/image_59/59_Lambersart_1.jpg","../image/image_59/59_Lambersart_2.jpg","../image/image_59/59_Lambersart_3.jpg","../image/image_59/59_Lambersart_4.jpg","../image/image_59/59_Lambersart_5.jpg"]},"Consult_chateau_formulairef863":{"id":"Consult_chateau_formulairef863","dept":"59","canton":"Orchies","commune":"Loos","nom":"Landas","type":"Château","periode":"XVII","histoire":"LANDAS:   la construction du château de Los date du XVIIe, XVIIIe et XIXe siècle. La chapelle du château de Landas date du XVIIe siècle. ils sont inscrits aux M.H. le 30.05.1984. Il y a 60 ans, le chateau a été déplacé de 63 mètres  pour laisser passer l'autoroute. Plusieurs fiefs ont existé à Loos au Moyen Age. Une famille portant le nom de Landas est connue dès 1096. A la fin du XVe siècle, Jean de la Haye, dit Ganthois, ce riche praticien qui fonda un hôpital qui porta rapidement son nom, incorpora les terres de Landas au fief de la Haye d'Esquermes. En août 1667, lorsque Louis XIV vint mettre le siège devant Lille, il établit ses quartiers au château de Landas propriété de Philippe Charles de la Haye. Vers 1920, il a été acquis par M. Liévin Danel qui a réalisé des transformations.","architecture":"LANDAS, en 1961, lorsqu'on a construit l'autoroute Lille Armentières, il a failli être démoli; mais des interventions faites auprès des autorités responsables permirent de le sauver, mais il fallut le déplacer d'une centaine de mètres ; l'opération fut difficile et coûteuse. Dans son état actuel, le château est une construction rectangulaire réalisée en assises alternées de pierre et de brique. Son élévation comprend deux niveaux. Au centre de la façade se trouve accolée une chapelle comprenant une travée droite et une abside à trois pans.  Éléments protégés MH : la chapelle du château : inscription par arrêté du 30 mai 1984.","habitants":"Famille dze Landas\"","divers":"GPS : 50° 37' 14\" Nord, 3° 01' 01\" Est","gps":"50° 37' 14\" Nord, 3° 01' 01\" Est","images":["../image/image_59/59_Landas_1.jpg"]},"Consult_chateau_formulaire20c4":{"id":"Consult_chateau_formulaire20c4","dept":"59","canton":"Cambrai","commune":"Lesdain","nom":"Lesdain","type":"Château","periode":"XVI","histoire":"LESDAIN Habité dès l'époque gallo-romaine (découverte de deux tombeaux), le lieu est cité dès 1023 sous le nom de Lesden.\nSon nom vient probablement d'une rivière (Laid, Lede, Leit, dans les anciennes langues du Nord, signifiant conduit d'eau), qui prend sa source au centre du village et finit dans l'Escaut à Crèvecur-sur-l'Escaut. Au XIe siècle Lesdain était une dépendance de Vincy, qui n'est plus de nos jours qu'un lieu-dit dépendant de Crévecur.  On pense que la terre de Lesdain a été un des apanages de la maison de Crèvecur dont des descendants portèrent le nom. En 1096, Arnould de Lesdain fait partie des chevaliers qui se trouvèrent au tournoi d'Anchin et Gilles de Lesdain fut chevalier croisé en Terre-Sainte.  Par alliances la terre de Lesdain passa vers 1314 de la famille de Lesdain à la famille d'Haucourt puis en 1475 à la famille de Lannoy puis plus tard à la famille de Horne (le prince de Horne en est seigneur en 1789)et au prince de Salm-Kyrbourg qui la vendit en 1785 pour 250.000 livres à Léopold Bouly, secrétaire du roi au grand collège en 1787, qui en prit le nom ainsi que ses descendants","architecture":"LESDAIN Le château de Lesdain est situé en milieu rural, au centre d'un parc. Deux tours du château médiéval ont été réunies par un bâtiment résidentiel: les premières doivent remonter au XIVe ou au XVe siècle, le château aurait été édifié en 1391 et le deuxième probablement au XVIIe siècle; une troisième tour, plus élevée que les deux autres, subsiste en face de la façade, un campanile la surmonte.","habitants":"la famille de Lesdain\"","divers":"forteresse à Lesdain","gps":"","images":["../image/image_59/59_Lesdain_1.jpg","../image/image_59/59_Lesdain_2.jpg","../image/image_59/59_Lesdain_3.jpg"]},"Consult_chateau_formulairecda8":{"id":"Consult_chateau_formulairecda8","dept":"59","canton":"Aniche","commune":"Lewarde","nom":"Lewarde","type":"Châteaux","periode":"XVI-XVII-XVIII","histoire":"châteaux dans cet article;  Layens.                                                        LEWARDE, dit de Vésignon;  château de Lewarde est une belle construction du XVIIIe siècle; une pierre de fondation donne la date de 1765. Il a été construit en brique et pierre, des pilastres à refends marquent ses angles et délimitent les trois  travées centrales de ses deux façades principales bâties intégralement en pierre; au dessus de la porte de la façade principale, un balcon borde la fenêtre de l'étage; de part et d'autre de ces 3 travées, les fenêtres des parties latérales au nombre de deux pour chacun des deux niveaux de l'élévation sont séparées par des panneaux de brique; les baies de l'ensemble du niveau supérieur sont plus petites que celles du rez-de-chaussée. Une balustrade couronne la construction et dissimule la toiture. La façade regardant vers le parc est composée de la même façon que celle qui vient d'être décrite, son ornementation est très riche; des clefs timbrent les encadrements à peine cintrés des ouvertures, deux consoles en volute soutiennent le balcon en fer forgé de la fenêtre centrale; deux autres guirlandes les rattachent à un masque de femme disposé dans une coquille. A l'intérieur, l'escalier a conservé une belle rampe d'escalier en fer forgé aux courbes délicates. Le château avait été doté d'importantes dépendances dont l'entrée en plein cintre est surmontée d'un pigeonnier carré. Éléments protégés MH : les façades ; la rampe en fer forgé ; la salle de billard au rez-de-chaussée avec son décor de gypseries : inscription par arrêté du 21 mars 1983.","architecture":"LAYENS;  La construction du manoir de Layens date du XVIe au XVIIIe siècle. Le manoir de Layens vous propose ses chambres d'hôtes. Il existe aussi sur la commune de Lewarde à découvrir,le château de Vésignion, rebâti en 1765 par le président Deforest de Lewarde.","habitants":"Président Deforest de Lewarde. \"","divers":"châteaux dans cet article; Lewarde grav-1 et Layens grav-2.                                   Layens GPS : 50° 20' 30\" Nord, 3° 10' 11\" Est","gps":"50° 20' 30\" Nord, 3° 10' 11\" Est","images":["../image/image_59/59_Lewarde_1.jpg","../image/image_59/59_Lewarde_2.jpg"]},"Consult_chateau_formulairec86c":{"id":"Consult_chateau_formulairec86c","dept":"59","canton":"Le Cateau-Cambrésis","commune":"Ligny-en-cambresis","nom":"Ligny_en_Cambresis","type":"Château","periode":"XV-XVI-XVII","histoire":"LIGNY  Les premières fortifications datent du IXe siècle. La tradition orale rapporte que Jeanne d'Arc, prisonnière transita par Ligny. Au XVIe siècle, les français de la garnison de Cambrai s'emparent du château appartenant aux Villers-au-Tertre car cette famille tenait le parti de l'Espagne. Le château est confisqué pendant plusieurs années. Cet ancien château médiéval, dont subsiste une grosse tour en pierre blanche est remanié au XVIIe siècle par la famille de Villers au Tertre. On note par exemple la porte d'entrée faite d'une arcade de grès taillés et datée de 1635. Après d'importants travaux réalisés en 1996.","architecture":"LIGNY ou Chateau de Ligny-Haucourt est un château bâti à Ligny-en-Cambrésis,  au centre du village. La construction du château de Ligny date du IXe, XVIIe au XXe siècle. C'était un château Médiéval. La tour ronde du château de Ligny en est le dernier vestige. La légende dit que Jeanne d'Arc, en captivité, passa par Ligny. Au XVIe siècle, il fut repris par les Français, de la garnison de Cambrai, car les Villers-au-Tertre auxquels appartenaient le château, tenaient le parti de l'Espagne. En 1996, il  a été transformé en un luxueux Hôtel-Restaurant 4 Etoiles par la famille de Lenglet.","habitants":"Famille de Villers-au-Tertre \"","divers":"deux châteaux dans cet article ; Ligny  grav 1-2-3,       GPS : 50° 06' 02\" Nord, 3° 22' 43\" Est","gps":"50° 06' 02\" Nord, 3° 22' 43\" Est","images":["../image/image_59/59_Ligny_en_Cambresis_1.jpg","../image/image_59/59_Ligny_en_Cambresis_2.jpg","../image/image_59/59_Ligny_en_Cambresis_3.jpg"]},"Consult_chateau_formulairea969":{"id":"Consult_chateau_formulairea969","dept":"59","canton":"Lille","commune":"Lille","nom":"Lille_Citadelle","type":"Citadelle","periode":"XVI-XVII","histoire":"cinq châteaux dans cet article Lille,Idac-Castel-Mignon, palais Ribour et la citadelle et Mons en Baroeuil.                                                                                      LILLE, le palais des Beaux-Arts de Lille est un Musée Municipal d'art et d'antiquités, Les acquisitions de la ville sont par ailleurs très dynamiques jusqu'à la veille de la première guerre mondiale. Elles comprennent quelques uvres majeures, de David, Goya, etc, dont certaines ont marqué l'histoire de la peinture, mais surtout des uvres anciennes ou contemporaines d'artistes d'origine régionale et locale qui viennent compléter les autres formes d'apports. Il en résulte des collections où les pièces flamandes et hollandaises du XVe au XVIIe siècle et françaises du XIXe siècle tiennent une place de tout premier rang. C'est lun des plus grands Musées de France et le plus grand Musée des Beaux-Arts, après Paris, en nombre d'uvres exposées. Le musée municipal a été ouvert en 1892. Depuis 2014, la programmation du palais des Beaux-Arts se partage chaque année entre un « Open Museum » au printemps, carte blanche donnée à un artiste inattendu dans un musée pour dialoguer avec les collections permanentes, et une grande exposition à lautomne. Sa superficie est de 22 000 m2 dont 12 000 m2 de surface d'exposition.         IDAC CASTEL MIGNON est un établissement de Santé Mentale, pour CMP Adultes                                                                                                                                          PALAIS RIBOUR, est l'un des plus anciens vestiges de l'histoire lilloise il servit d'habitation au premier seigneur du château. Le Palais Rihour, avait l'allure d'un château fort  avec ces quatres tours, a été racheté par la commune. Le Palais Rihour est classé au M.H. depuis 1875. De style gothique, le Palais Rihour accueille dans ses murs l'Office de Tourisme de Lille.","architecture":"CITADELLE DE LILLE      Élevée sur les plans de Vauban, de 1667 à 1671. La création de l'Esplanade ou champ de manoeuvre fut suggérée par Vauban en 1672. Il s'agit d'un espace dégagé assurant la protection de la forteresse du côté de la ville. Les ouvrages du Grand Carré et le mur de communication d'En Bas constituent le prolongement des ouvrages de défense et forment la jonction avec les fortifications urbaines. La Citadelle de Lille appartient au Ministère de la défense, elle  est classée aux M.H. depuis 2012.  le grand carré situé au nord avec ses ouvrages et fossés: classement par arrêté du 5 septembre 2012.                                                                      MONS en BAROEUIL,  le Fort de Mons est construit entre 1878 et 1880, à la suite du décret de 1878 du président Mac-Mahon. Destiné à l'artillerie défensive, il participe à la défense de Lille. Son architecte est le général Raymond Adolphe Séré de Rivières, qui fut surnommé « le Vauban du XIXe siècle ». Il est baptisé, en 1887, fort Macdonald, du nom d'un maréchal d'Empire. Comme tous les forts qui environnaient Lille, il n'a pas subi d'assaut (Lille, déclassée en 1910, a été déclarée « ville ouverte » en août 1914). Vendu à la ville de Mons-en-Barul par l'armée en 1972, le Fort de Mons fut rénové, par l'architecte Gérard David. Inauguré les 2 et 3 juin 1984, il abrite de nombreux lieux d'activités culturelles : la Bibliothèque municipale, la Ludothèque, un espace culturel multimédia, une Salle d'Exposition, le Conservatoire, un Restaurant.","habitants":"Vauban\"","divers":"cinq châteaux dans cet article Lille, idac castel-Mignon grav_1, palais Ribour-grav 7-8 et la citadelle de Mons en Baroeuil grav_5_6. Mignon  GPS : 50° 38' 14\" Nord, 3° 03' 48\" Est                                                                                                                     Lille citadelle grav_3_porte de paris grav 3_4                                                         GPS : 50° 38' 28\" Nord, 3° 02' 40\" Est                                                         Ribour grav_5-6   GPS : 50° 38' 07,7\" Nord, 3° 03' 43,42\" Est\nPalais des beaux arts grav-7","gps":"50° 38' 14\" Nord, 3° 03' 48\" Est","images":["../image/image_59/59_Lille_Citadelle_1.jpg","../image/image_59/59_Lille_Citadelle_2.jpg","../image/image_59/59_Lille_Citadelle_3.jpg","../image/image_59/59_Lille_Citadelle_4.jpg","../image/image_59/59_Lille_Citadelle_5.jpg","../image/image_59/59_Lille_Citadelle_6.jpg","../image/image_59/59_Lille_Citadelle_7.jpg"]},"Consult_chateau_formulaire20d6":{"id":"Consult_chateau_formulaire20d6","dept":"59","canton":"Lille","commune":"LILLE-II","nom":"Lille_II","type":"Châteaux","periode":"XVII-XVIII","histoire":"trois châteaux dans cet article; Blanc à Premesques, Franchomme et Wattignies .                                                                                                                   BLANC  le château Blanc est un château bâti à Wericq-Sud. En 1910, Charles Derville-Avot, Rubanier Cominois, entreprit la construction sur l'un de ses terrains wervicquois, d'une imposante demeure bourgeoise, de style néo-Classique et dont il fut l'architecte.                                                                          WATTIGNIES, Philippe de Kessel, qui fit construire le château, terminé en 1640, sous Louis XIII, fit venir, un jeune paysagiste, André Le Nôtre, pour lui passer sa première grande commande, consistant à dessiner le jardin de son château. André Le Nôtre parvint à convaincre le seigneur de Wattignies de la justesse de ces choix et put exprimer pour la première fois toutes ses idées de volumes en dégradé, autour des tapis verts. La réalisation de Wattignies lui permit de recevoir d'autres commandes plus importantes encore (dont le château de Vaux-le-Vicomte 77) qui enfin, le menèrent à Versailles vers 1650. John Churchill (1er Duc de Marlborough), commandant des forces anglo-autrichiennes (Eugène de Savoie-Carignan), qui établit son quartier-général au château de Lannoy au Nord-Est de Lille (propriété des Lannoy). Face à la tentative des Français venus du sud pour faire lever le blocus, Marlborough fit établir son commandement à Wattignies, point central de son dispositif de défense, au Sud de Lille où se déroula la bataille. Il s'installa au château de Wattignies , propriété des Kessel .","architecture":"FRANCHOMME, En 1908, l'architecte régional Armand Lemay édifia un château au Croisé-Laroche pour Hector Franchomme, co-directeur de l'usine Delespaul-Havez. La propriété clôturée s'étendait sur près d'un hectare. L'accès se faisait par une arche monumentale et la conciergerie. La construction présentait en façade une travée centrale très travaillée, depuis le haut perron gardé par deux lions de pierre, jusqu'au fronton dans lequel s'inscrivait un coq sculpté.Cette référence à la comédie d'Edmond Rostand lui valut le nom de château Chantecler, mais il reste plus connu sous celui de château Franchomme. Une écurie avec manège complétait l'ensemble. La famille Franchomme ne put restaurer la demeure trop endommagée par les guerres.Elle fut finalement rasée en 1962 pour laisser place, un an plus tard, au \"Flash-Croisé\", premier ensemble commercial de type américain de la région qui permettait de trouver en un seul endroit idéalement situé tous les produits de consommation, avec un stationnement facilité grâce au parking.                                                                                                                ARC de triomphe  a été érigé de 1685 à 1692 pour célébrer la prise de la ville par Louis XIV en 1667. Il remplace l'ancienne porte des malades, de construction plus modeste, qui s'intégrait déjà dans l'enceinte depuis le Moyen Age. L'ingénieur, chargé de la construction de la nouvelle porte, Simon Vollant, s'était déjà distingué aux côtés de Vauban lors de la construction de la Citadelle de Lille.","habitants":"Famille de Marlborough  Famille Franchomme\"","divers":"trois châteaux dans cet article; Blanc à Premesques_3, Franchomme grav_2 et Wattignies._1  GPS : 50° 35' 08\" Nord, 3° 02' 38\" Est\nGrav-4-5 Patrimoine","gps":"50° 35' 08\" Nord, 3° 02' 38\" Est","images":["../image/image_59/59_Lille_II_1.jpg","../image/image_59/59_Lille_II_2.jpg","../image/image_59/59_Lille_II_3.jpg","../image/image_59/59_Lille_II_4.jpg","../image/image_59/59_Lille_II_5.jpg"]},"Consult_chateau_formulaire075c":{"id":"Consult_chateau_formulaire075c","dept":"59","canton":"Saint-Amand-les-Eaux","commune":"Sars-et-Rosières","nom":"Loir_Sars","type":"Château","periode":"XV","histoire":"LOIR, le château actuel est bâti pour Louis Gossuin, seigneur du Quesnoy, au début du XVe siècle. Resté dans la famille jusqu'en 1771, il est acquis par N.-J. du Buisson, ancien échevin de Douai. Selon Duthilloeul, C. J. Duthoit, gendre de du Buisson, propriétaire depuis 1810, fait remplacer les croisées ogivales par des fenêtres ordinaires de grand format. En 1885, le comte Henri Duthoit achète le domaine et lance d'importantes restaurations, d'inspiration néo-médiévale. En résumant la Grange et d'Herbommez (1889), l'accès se fait par une avenue d'une centaine de mètres aboutissant à une sorte de tour carrée, reconstruite ; à droite, une courtine, au soubassement ancien et crénelée à une époque toute récente, est baignée par un fossé d'environ quatre mètres de large. La porte franchie, on accède à la basse-cour, où se trouvaient encore récemment les communs, logement, etc. ; un bâtiment neuf, à l'aspect de grange, sert de remises et d'écuries. Puis on franchit le deuxième fossé par un pont, refait sur les bases d'un pont plus ancien, qui donne accès à la cour en franchissant un fossé d'environ quatre mètres de large ; on y trouve un logis du XVIIIe siècle (remanié au cours du XXe siècle). On franchit enfin les douves entourant le château par un pont levis. Le logis n'est pas décoré. Dans le vestibule, occupé par deux grandes pièces voûtées en berceau. Les pièces ménagées dans les tourelles sont couvertes de coupoles. Au premier étage [rez-de-chaussée], la grande salle de belles dimensions ouvre sur quatre petites pièces rondes ménagées dans les tourelles. Un escalier en vis, à droite de la porte d'entrée, dans le vestibule, mène aux étages ; le premier est destiné aux chambres d'habitation et à une prison, située au-dessus du vestibule ; le deuxième est occupé par une vaste salle, sans doute primitivement destinée aux défenseurs ; au-dessus se trouve la charpente, dénaturée ; les tourelles sont couvertes de toitures en poivrière ; l'ensemble est couvert en ardoise.","architecture":"LOIR suite. Lefèvre (1914) rapporte que le château est à nouveau dans l'état déplorable dans lequel l'avait trouvé H. Duthoit, qui l'avait vendu à son gendre M. Portier, qui l'a négligé : le château, les remises, les écuries et le mobilier sont à l'abandon, les plus belles pièces de celui-ci ayant été vendues. L'entrée se fait par un porche-colombier au passage en arc surbaissé à claveaux de brique et de ciment moulé. Une courtine en brique bordant l'ancien fossé se développe à l'ouest, avec tourelle basse accolée au centre. Dans la basse-cour, l'étable-écurie, à porte charretière en plein cintre, a un décor de frise d'arceaux sur ciment, que l'on retrouve en d'autres endroits et qui date des travaux de rénovation de Duthoit. Le pont qui franchit le deuxième fossé est en grès (partie ancienne) et brique (parapet à frise d'arceaux reposant sur des corbeaux en ciment, refait lors des travaux de Duthoit). Le pont levis a été remplacé par une passerelle fixe en bois ; un escalier, sur la droite, donne accès aux douves, asséchées. Le château est de plan massé, composé d'un corps rectangulaire, à avant-corps rectangulaire, et cantonné de quatre tours circulaires. Construit en brique, il est formé de quatre niveaux, avec soubassement et premier niveau de l'avant-corps en grès ; la porte, dont l'arc porte la date 1401 ou 1404, est couverte d'un linteau sculpté (armories, leurres de la chasse au faucon). Un décor de brique émaillée, à losanges et croix de Saint-André, ceinture l'édifice aux deuxième et troizième niveaux. Meurtrières et archères-canonnières du soubassement sont conservées. Plusieurs baies d'origine ont été obturées.\nÉléments protégés MH : les restes du château du Loir : inscription par arrêté du 21 novembre 1969.","habitants":"Famille de Louis Gossuin\"","divers":"Loir grav-1-2                                                      GPS : 50° 26' 44\" Nord, 3° 19' 57\" Est","gps":"50° 26' 44\" Nord, 3° 19' 57\" Est","images":["../image/image_59/59_Loir_Sars_1.jpg","../image/image_59/59_Loir_Sars_2.jpg"]},"Consult_chateau_formulaire3df4":{"id":"Consult_chateau_formulaire3df4","dept":"59","canton":"Aulnoye-Aymeries","commune":"Bavay","nom":"Louvignies_Bavay","type":"Château","periode":"XVI","histoire":"LOUVIGNIES   le 23 avril 1560, Christine de Ferrare, originaire de Louvignies, fit entrer cette terre parmi les terres de la seigneurie des Landas en épousant Nicolas de Landas. La première représentation du château date de cette époque, sur le plan de Deventer. Des travaux historiques mentionnent la destruction du château par le feu en 1568 et de multiples reconstructions. Il n'existe pas de représentations au XVIIe siècle. Le château est figuré sur le plan masse de 1731, avec des dispositions connues. Il est réduit à l'état de vestiges aujourd'hui, s'agirait-il du quadrilatère figuré sur le plan du comté de Louvignies de 1768 .  Des documents iconographiques, du XVIIe siècle , issus du chartrier de Couin présentent divers projets d'un château (avec pigeonnier et chapelle privée), mais jamais construits et d'une ferme,  partiellement détruit et transformé en école. Des plans du XVIIIe siècle présentent les dispositions actuelles, le château a été dénaturé depuis le début du XXe siècle.  Le bâtiment actuel est divisé en deux propriétés distinctes. La maison située à l'ouest a gardé la mise en oeuvre des moellons de pierre, tandis que l'aile Est a été revêtue d'un enduit. L'ordonnancement des travées est maintenu dans la partie ouest, bien que les ouvertures aient subi des transformations par la mise en place de linteaux de fer. Le mur de clôture séparant les deux propriétés conserve la trace des fenêtres à meneaux. Un immeuble situé à proximité, élevé en moellons de pierre, semble être la grange seigneuriale. Vestiges.","architecture":"A BAVAY site romain est colonne  Il y a 2000 ans, Bagacum (Bavay à lépoque romaine) était une capitale de cité, celle des Nerviens. Situé dans lAvesnois, le Forum antique de Bavay, musée archéologique du Département du Nord abrite les vestiges du plus grand forum découvert en France. Classé site archéologique dintérêt national et Monument Historique, le forum, avec ses 2.5 hectares est lun des plus grands de tout lEmpire romain. Le cur de la cité antique, véritable lieu de rencontre, le forum de Bagacum rassemblait tous les pouvoirs : administratifs, judiciaires, religieux. Depuis le 14 mai 2022, le site est couvert. Une nouvelle expérience de visite soffre aux visiteurs tout en protégeant les vestiges qui ont souffert des intempéries depuis leur mise à   jour. Le projet a été financé par le Département du Nord, la région Hauts de France et la direction régionale des actions culturelles.","habitants":"Famille de  Nicolas de Landas\"","divers":"Louvignies_daudignies  gra_1-2        Louvignies Gauthier grav 3 et site romain  grav 4","gps":"","images":["../image/image_59/59_Louvignies_Bavay_1.jpg","../image/image_59/59_Louvignies_Bavay_2.jpg","../image/image_59/59_Louvignies_Bavay_3.jpg","../image/image_59/59_Louvignies_Bavay_4.jpg"]},"Consult_chateau_formulaire0f7f":{"id":"Consult_chateau_formulaire0f7f","dept":"59","canton":"Cateau-Cambrésis","commune":"Cateau-Cambrésis","nom":"Mantille_Caudry","type":"Château","periode":"XIX","histoire":"MANTILLE, ou SANTER ,situé à 15 km de Cambrai, à 11 km de Le Cateau, le Manoir de la Mantille, dune superficie de 750 m2, se dresse sur un parc entièrement clôturé et arboré dun hectare. Gaston Preux, fils de Jules Preux, lun des dirigeants de la Société Carpentier-Preux, vaste usine construite rue de Bruxelles, face au Manoir de la Mantille, fit édifier selon les plans de larchitecte Laurent Fortier, le manoir, en 1860. Limposant portail du manoir témoigne par ses initiales, de lhistoire de cette demeure puisque Gaston Preux épousa Marie Louise Adolphine Morcrette en 1904, fille du député Louis Morcrette , amusant coup du destin ces initiales correspondent aux initiales des propriétaires actuels Sébastien Mahe et Patricia Poindron.","architecture":"MANTILLE, ayant changé de propriétaire, cest Germain Santer, figure notoire du Caudrésis qui fit construire une extension, en 1992, pour profiter d'une salle de réception et d'une piscine intérieure à larchitecture atypique.Vous y trouverez des chambres d'hôtes. Le manoir longtemps appelé « le château Santer » reste un lieu emblématique pour les Caudrésiens. Une véritable bouffée doxygène insoupçonnée au cur de la ville soffre à vous lespace dun moment de déconnexion totale.","habitants":"Famille Morcrette\"","divers":"GPS : 50° 07' 33\" Nord, 3° 24' 45\" Est","gps":"50° 07' 33\" Nord, 3° 24' 45\" Est","images":["../image/image_59/59_Mantille_Caudry_1.jpg","../image/image_59/59_Mantille_Caudry_2.jpg"]},"Consult_chateau_formulaire3a3f-2":{"id":"Consult_chateau_formulaire3a3f-2","dept":"59","canton":"Maubeuge","commune":"Maubeuge","nom":"Maubeuge","type":"Châteaux","periode":"XVIII","histoire":"Deux château  MAUBEUGE  La construction du chateau date du XVIIIe siècle. Il est proche de Maubeuge dans un parc clos de 2000 m². Il comporte 20 pièces. Ce château exceptionnel du XVIIIe siècle, se situe à la campagne, est entièrement restauré et vendu meublé. Il offre environ de 2000m² habitables, pour 22 pièces : au RDC : de vastes pièces de réceptions en enfilade. Boiseries, moulures, cheminées et parquets dépoque, sols en pierre bleue, 2 salons, un bureau, une salle de billard avec bar/salon, salle à manger, Ascenseur. Au 1er étage : 5 suites (chambre, salle de bains, salon) ; au 2ème étage : appartement indépendant : salle à manger, salon, bureau, cuisine, 2 chambres et salle de bains. Au sous-sol : Cuisine équipée professionnelle avec séjour, arrière-cuisine salle de réception, buanderie cave à vin. Plusieurs dépendances, maison de gardien un cottage le tout dans un parc inscrit de 15ha avec étang.","architecture":"La PORTE de MONS est une porte de ville bâtie à Maubeuge, la porte de Mons fut construite, sous le règne du roi Louis XIV de France, par Vauban, en 1682, pour abriter un corps de garde, des logements et des cellules. La porte de Mons est la dernière des 3 portes qui entouraient la ville. La Porte de France fut est détruite en 1958 et la Porte de Bavay, en 1952. La Porte de Mons a été construite en brique, pierre bleue et grès. Elle possède un pont-levis. à été classée aux M.H. en 1924. Aujourd'hui, elle est devenue le Siège de lOffice du Tourisme de Maubeuge.","habitants":"Seigneurs  locaux\"","divers":"Maubeuge;   grav-1-2-3                                                                         GPS : 50° 16' 39\" Nord, 3° 58' 24\" Est","gps":"50° 16' 39\" Nord, 3° 58' 24\" Est","images":["../image/image_59/59_Maubeuge_1.jpg","../image/image_59/59_Maubeuge_2.jpg","../image/image_59/59_Maubeuge_3.jpg"]},"Consult_chateau_formulaire186d":{"id":"Consult_chateau_formulaire186d","dept":"59","canton":"Aulnoye-Aymeries","commune":"Mecquignies","nom":"Mecquignies","type":"Château","periode":"XV-XIX","histoire":"MECQUIGNIES, un château féodal, aujourd'hui détruit, aurait existé à Mecquignies au XVe siècle. Mais la tradition orale situe la construction d'un autre château vers 1787. Le cadastre du consulat et celui de 1831 permettent la lecture d'un bâtiment aux dispositions différentes du château actuel qui a été construit à la fin du XIXe siècle ou au début du XXe siècle par un architecte valenciennois, il s'agit peut être d'Armbruster, architecte actif dans la région à la fin du XIXe siècle, puis architecte de la ville de Bavay au début du XXe siècle, auteur de la maison patronale Evrard, dite maison Virginette à Bellignies en 1904.","architecture":"MECQUIGNIES, ensemble composé d'un château, de communs, d'une chapelle et d'une conciergerie. Le château est construit selon un plan en U, sur trois niveaux, fermé par un portique au premier niveau et précédé d'un escalier en fer à cheval. La construction est en brique. La pierre et le béton sont utilisés pour le chaînage, l'escalier, la terrasse et les colonnes du portique. Le premier niveau est souligné par la mise en oeuvre d'un bossage en pointe-de-diamant aux angles des deux ailes en retour d'équerre ainsi que sous les deux baies du premier niveau. Celles-ci sont composées d'une croisée à deux meneaux moulurés. Le portique comprend trois séries de deux colonnes à chapiteau toscan. L'entablement du portique est continu sur l'ensemble du bâtiment. Les deux étages carrés sont traités sobrement. Un entablement dorique et une balustrade couronnent l'élévation. Le corps central de l'élévation postérieure est également souligné par un bossage en pointe-de-diamant. Les ouvertures du premier niveau sont en arc en anse-de-panier. Deux niches sont disposées de part et d'autre de la porte couronnée par une marquise. Les communs sont disposés selon un plan en U. Les baies des deux ailes des deux élévations principales sont en anse de panier aplati. L'architrave est en accolade et retombe sur de fines colonnettes.  Un relief décoratif de brique remplace le bandeau séparant le rez-de-chaussée du premier niveau. La toiture à deux pans est soulignée par un lambrequin. Une petite remise et une chapelle, construites en brique, complètent la disposition. Une petite maison située à l'entrée du domaine fait office de maison de gardien.","habitants":"Seigneur local\"","divers":"Mecquignies grav -1-2","gps":"","images":["../image/image_59/59_Mecquignies_1.jpg","../image/image_59/59_Mecquignies_2.jpg"]},"Consult_chateau_formulaire986b":{"id":"Consult_chateau_formulaire986b","dept":"59","canton":"Aniche","commune":"Montigny en Ostrevent","nom":"Montigny_Ostrevent","type":"Château","periode":"XIII-XIX","histoire":"Trois châteaux dans cet article; Lambrecht, Montmorency et Rieulay                     LAMBRECHT;   Félix Lambrecht achèta, en 1853, des terrains boisés et y fit construire un château, de style néo-gothique et une ferme. Le château de Lambrecht est devenu la Résidence Valérie depuis 2015.   Il est construit au XIXe siècle, en brique et pierre est constitué par un corps de bâtiment rectangulaire doté à ses angles de tourelles montées en encorbellement; un haut comble pyramidal le couvre. Son élévation comprend deux niveaux montés sur un haut soubassement. Sa façade principale présente trois travées de part et d'autre d'un pavillon médian établi en légère saillie et coiffé d'un attique, lui-même surmonté d'un pignon percé d'une lucarne, et lourdement ornementé de bâtons brisés, disposés parallèlement aux redents des rampants; au niveau inférieur on accède à la porte encadrée de fenêtres rectangulaires par un escalier bordé d'une balustrade de pierre; deux colonnes ioniques la flanquent; elles supportent le balcon de l'étage dont la baie centrale est accostée de deux pilastres corinthiens. En façade arrière, un pavillon polygonal coiffé d'une haute pyramide correspond à cet avant-corps. Ce château a visé aux effets assez lourds et son ornementation chargée, notamment au niveau des lucarnes sommées d'un fronton arrondi, sculpté et surmonté d'une fleur de lis. Abrite une maison de retraite.                                                                                                                A 10 K.m. à l'ouest RIEULAY, un château médiéval construit sur une motte a bien existé à Rieulay ; des fossés, des murailles, des tours assuraient sa défense, il avait été construit au milieu d'un bois. Vers 1855, on a procédé à la destruction d'une grande demeure; il est fort probable que celle-ci avait été reconstruite à l'époque moderne. Seul, en effet, a échappé à la pioche du démolisseur un pavillon d'entrée datant du XVIIIe siècle en brique et pierre blanche. Deux pilastres à refends encadrent sa porte tracée en plein cintre supportant un tympan semi-circulaire; de sa toiture se dégage une tourelle octogonale en brique, avec chaînages d'angle en pierre, coiffée d'un dôme ; les murs latéraux sont percés de deux niveaux de fenêtres, mais certaines ont été obturées.","architecture":"MONTMORENCY; la terre de Montigny a d'abord appartenu aux seigneurs de Lallaig; elle est passée ensuite aux familles d'Hornes, de Montmorency, et aux chanoinesses de Verlaimont. Du château reste le bâtiment d'entrée qui date du XIIIe siècle. Il est constitué de deux grosses tours de plan circulaire élevées en grès et engagées dans un bâtiment rectangulaire; entre ces deux tours s'ouvre une porte tracée en arc brisé; en arrière la rainure de la herse subsiste; le passage est couvert d'une voûte en plein cintre, sauf dans la partie centrale, actuellement plafonnée, qui doit correspondre à l'ancien assommoir; vers l'arrière on remarque de chaque côté une seconde rainure, mais celle-ci ne dépasse pas le niveau des montants latéraux. En façade, un rang de modillons donne la hauteur primitive de la construction; celle ci a été ultérieurement surélevée en brique et dans les tours ont été installés des pigeonniers. La façade arrière a été remaniée: l'édifice à deux niveaux est limité par des pignons à pas de moineaux. Les ouvertures éclairant les deux faces de ce bâtiment d'entrée ont été repercées au XVIe siècle. Certaines fenêtres ont conservé leur meneau et leur encadrement ; les deux baies de l'étage, à l'arrière, sont surmontées d'un cordon rectangulaire faisant retour. Cette porte donne accès à une cour entourée des bâtiments d'une exploitation agricole.\nÉléments protégés MH : le bâtiment d'entrée flanqué de deux tours : inscription par arrêté du 20 mars 1929.","habitants":"Familles d'Hornes, de Montmorency, \"","divers":"deux châteaux dans cet article; Lambrecht grav-1 et Montmorency grav-2-3-4   Rieulay grav-5-6                   GPS : 50° 22' 23,65\" Nord, 3° 11' 14,54\" Est","gps":"50° 22' 23,65\" Nord, 3° 11' 14,54\" Est","images":["../image/image_59/59_Montigny_Ostrevent_1.jpg","../image/image_59/59_Montigny_Ostrevent_2.jpg","../image/image_59/59_Montigny_Ostrevent_3.jpg","../image/image_59/59_Montigny_Ostrevent_4.jpg","../image/image_59/59_Montigny_Ostrevent_5.jpg","../image/image_59/59_Montigny_Ostrevent_6.jpg"]},"Consult_chateau_formulairec926":{"id":"Consult_chateau_formulairec926","dept":"59","canton":"Hazebrouck","commune":"Morbecque","nom":"Morbecque","type":"Château","periode":"XVII-XIX","histoire":"Deux châteaux dans cet article ; Morbecque  et la Motte au Bois MORBECQUE  la terre appartient dès le début du XIIe siècle à la famille des châtelains de Saint-Omer; par mariage, elle passa au siècle suivant à celle de Reninghe. Au XVIIe siècle, alors qu'elle avait été érigée en Comté, puis en marquisat, elle entra dans la famille de Montmorency. Anne-Louis-Alexandre de Montmorency, qui mourut en 1812, en fut le dernler propriétaire à titre féodal. Le château actuel a été construit au début du XIXe siècle, en brique avec chaînages de pierre formant harpe aux angles. Deux ailes, larges de deux travées et coiffées d'un fronton triangulaire percé d'une ouverture semi-circulaire encadrent le corps de logis. L'élévation est à deux niveaux que surmonte un attique; la porte centrale a été tracée en plein cintre, son archivolte se prolonge sur le plat du mur au-dessus de deux fenêtres rectangulaires; ainsi se dessine une sorte de corps médian qui correspond à un balcon bordé d'une rampe en fer forgé; celui-ci précède la fenêtre de l'étage limitée par deux pilastres. Au-delà, le corps de logis présente une fenêtre à chaque niveau; toutes ces ouvertures sont rectangulaires. La toiture ne présente qu'une simple ouverture semi circulaire au centre. La façade de droite est précédée par une construction basse de plan polygonal formant une terrasse au premier étage. Par ses traits essentiels, l'uvre est donc fort proche des réalisations de la deuxième moitié du XVIIIe siècle.","architecture":"La MOTTE au BOIS a été construit, en 1065, pour Robert le Frison, comte de Flandre. Le château fut donné en douaire à Mathilde de Portugal, femme de Philippe d'Alsace. En 1164, Saint-Thomas Becket (1117-1170), archevêque de Cantorbéry s'exila  en France, quittant l'Angleterre en 1164  y séjourna avant d'être assassiné par le roi Henri Ier d'Angleterre en 1170. En 1328, le duc de Normandie fit démantèler le château après un siège lors de la bataille de Cassel. Le château de la Motte-au-Bois fut habité par Isabelle de Portugal (1397-1471)  femme de Philippe le Bon, Le 8/02/1614, la châtellenie est érigée en comté, par lettre des archiducs Albert et Isabelle, en faveur de Robert de Saint-Omer ( 1617), 1er comte de Morbecque (8 février 1614),  vicomte d'Aire, baron de Robecque, seigneur de Dranouter, etc. Robert de Cassel et sa femme Jeanne de Bretagne occupèrent le château de la Motte-au-Bois aux XIVe et XVe siècles. il fut pris par les Français en 1645 et reconstruit en 1660 dans l'état proche de l'actuel. Le château de la Motte-au-Bois a abrité le quartier général des forces armées du Commonwealth pendant la première guerre mondiale. En 1795 acquis par M. Taffin de Douai et passa par mariage à M.Ernest de la Grange et demeura dans la descendance jusqu'en 1962 date ou il fut acquis par l'Institut aéronautique Amaury de la Grange en référence à Amaury de la Grange, homme politique et aviateur français de la première guerre mondiale qui en fut le propriétaire. La bibliothèque du château est le siège social de l'association 'Mémoire des pierres' qui est chargé de sauvegarder le patrimoine en lien avec le ch
