que.  Aux XVIIe et XVIIIe siècles, il sera la propriété des familles Hennuyer-Desmaisières, jusquà la Révolution, où la Dame du château est Madame Duhot. Au XIXe siècle, il perd sa vocation de forteresse pour devenir le centre dune exploitation agricole tenue par la famille Payen, Sylvestre puis Irénée, tous deux dailleurs maires de Maing en 1800 et 1830. Arthur Dinaux nous relate avec précision cette transformation : tours abattues , fossés comblés.De 1905 à  1915, il est la résidence du prêtre de la paroisse.  Ses propriétaires actuels, soucieux de son entretien, ont  rénové le corps dhabitation et ont aménagé des chambres détudiants.","architecture":"CASTEL des PRES, maison forte détruite en partie aux XIVe et XVe siècle, rebâtie au XVIe siècle présente un rare exemple de donjon à tour carrée classé et un corps de logis avec pignon à redents du XVIIe siècle.  Situé en contrebas du village, à l'ouest de l'église, le château constitue un ensemble intéressant; subsistent les restes d'une enceinte quadrangulaire, ponctuée sur son flanc sud par le donjon et à l'est par des locaux d'habitation.  Éléments protégés MH : la tour principale ou donjon : Sans doute au XIe siècle, une motte féodale fut édifiée  près de lEscaut vers Prouvy. Par un processus très courant dabandon puis de transfert, apparut un siècle ou deux plus tard une maison-forte quadrangulaire en matériaux plus solides, réutilisant le système hydraulique, avec une basse-cour plus petite, non loin de la route conduisant au village de Maing. Nous pensons quil faut y voir lorigine du château des Prés.\nDans la première moitié du XIVe siècle, il est la propriété personnelle de  Jean Bernier, grand bailli de Hainaut et Prévôt-le-Comte. Il reçoit du comte Guillaume, en 1325, lautorisation de fortifier sa maison de Maing .  Après la disgrâce de Jean Bernier, le château, cité alors comme « Tour carrée fortifiée », devient la propriété de Jean de Neuville en 1338 et subit les assauts des Français en 1340, au début du conflit Franco-Anglais. Il passe ensuite dans la famille Rasoir au XVe siècle. Occupé par un contingent français, il  est détruit en 1477 par les troupes valenciennoises de Guillaume de Clèves, sur lordre de Marie de Bourgogne.\nIl appartient ensuite, au XVIe siècle, aux familles Lallaing-Lannoy-Maingoval. Le dénombrement de 1561 mentionne une « Dame de Mingoval », épouse de Philippe de Sainte-Aldegonde, comte de Noircarmes, Bailli de Hainaut.","habitants":"Famille du Rasoir                 familles Lallaing-Lannoy-Maingoval\"","divers":"Tour carrée à deux niveau","gps":"","images":["../image/image_59/59_Castel_des_Pr%c3%a8s_1.jpg"]},"Consult_chateau_formulairedec7":{"id":"Consult_chateau_formulairedec7","dept":"59","canton":"Fourmies","commune":"Cerfontaine","nom":"Cerfontaine","type":"Château","periode":"XV-XVII","histoire":"CERFONTAINE, au XIV e siècle,   était la propriété des seigneurs qui en portaient le nom: Cerfontaine ou Sierrefontaine. Le château de Cerfontaine, dont il ne reste plus que la ferme, fut construit vers 1400.  En 1528, Nicolas de Boussois le vendra  par la suite à Jean de la Biche . Nicolas de la Biche fonde en 1614 un hospice pour pauvres. Le domaine passera en dot au XVIIe siècle, lors du mariage de Marie, unique héritière de Jean de la Biche, à Ernest  de Haynin du Cornet, et ensuite à leur fils, Ernest II de Haynin du Cornet. Laînée de ses cinq filles, Thérèse Aldegonde, née en1699 passe par dot le château à son époux le en 1714, Jean-Baptiste de Maulde, qui décédera en 1745. Nayant à leur tour que trois filles, laînée lapporte en dot lors de son mariage en 1745 à Joseph, vicomte et baron de Bergues-Saint-Winoc. Celui-ci décédant sans enfant, cest Marie Cécile Agnès Joseph de Maulde, la sur de Jean-Baptiste, qui en hérite. Sans enfant de sa première union (en 1751 avec Jean Emmanuel de Rambour, sgr de Gercy en Thiérache) le château passe en dot lors de son remariage en 1780 avec Charles François Joseph baron van der Straten.  Un château médiéval a dû exister dans cette localité. Il ne reste dans le bâtiment actuel rien qui soit antérieur au XVIIe siècle. On accédait jadis à la cour intérieure par un pont-levis, la porte en plein cintre subsiste, elle est en pierre associée à de la brique. La cour a été pavée en 1935. Le bâliment le plus intéressant est celui de l'Est, il a été élevé en pierre et brique, la première constituant les encadrements de ses neuf baies, des ancres donnent la date de construction, 1617. il est élevé au titre de comte par le Roi de France et siège jusquen 1789 à titre de seigneur de Cerfontaine. À sa mort en 1791, le château revient aux mêmes surs de Maulde (Marie-Aldegonde, Marie-Thérèse et Marie Cécile de Maulde) qui, à leur mort, le retransmettent aux enfants de leur benjamine (Marie Cécile) et de Charles van der Straten.","architecture":"CERFONTAINE, le bâtiment du nord qui avoisine l'entrée, date de cette même époque mais il a assez fortement souffert de la grande guerre; il avait été construit de la même façon que le précédent mais sa partie supérieure a disparu, des fenêtres ont perdu leur linteau et ont été bouchées en brique. Du côté ouest, les constructions appartiennent au XIXe siècle: celle près de l'entrée a été réalisée en brique sur soubassement de pierre, sa porte d'entrée, dont l'arc en pierre est tracé en plein cintre, a été bouchée avec de la brique. Le bâtiment qui suit est le plus important, il est daté de 1806, il a été construit intégralement en pierre et sa façade est aveugle, ce qui reste aujourd'hui date du XVIIe siècle.    La cour intérieure était accessible par un pont-levis. La porte, en plein cintre, subsiste.  C'est en 1934 que la cour fut pavée. Un cercle de pierre bleue délimite une fosse à fumier, très peu profonde. Le bâliment le plus intéressant est celui de l'Est, élevé en pierre et brique, la première constituant les encadrements de ses 9 baies, des ancres nous apportent sa date de construction, en 1617. Le bâtiment du Nord avoisine l'entrée. Il est de la même époque mais a beaucoup souffert de la grande guerre. Construit comme le précédent, sa partie supérieure a disparu. Les fenêtres ont perdu leur linteau et ont été bouchées en brique. A l'Ouest, les constructions sont du XIXe siècle. Celle près de l'entrée est en brique sur un soubassement de pierre. La porte d'entrée, dont l'arc en pierre est tracé en plein cintre, est bouchée avec de la brique. Le bâtiment suivant, plus imposant, date de 1806, et fut construit, intégralement, en pierre. Sa façade est sans fenêtre. La ferme du château possède un porche monumental.","habitants":"Famille de Charles van der Straten\"","divers":"Château de Cerfontaine","gps":"","images":["../image/image_59/59_Cerfontaine_1.jpg","../image/image_59/59_Cerfontaine_2.jpg","../image/image_59/59_Cerfontaine_3.jpg"]},"Consult_chateau_formulairefc6a":{"id":"Consult_chateau_formulairefc6a","dept":"59","canton":"Templeuve-en-Pévèle","commune":"Chéreng","nom":"Chéreng","type":"Châteaux","periode":"XVII","histoire":"deux châteaux dans cet article Montreul à Chéreng et Hamayde.                                     MONTREUL , au milieu dun parc dessiné de façon romantique, avec des pièces deau et de beaux arbres.  on reconnaît bien la bâtisse de style classique qui ressemble à de nombreuses nobles demeures du temps, dont le château de la Vigne à Bondues, attribué à Lesaffre, le célèbre architecte lillois. Sur lun des frontons se voient encore les armoiries du bâtisseur. Quelques rares décors intérieurs ont survécu aux modes successives suivies par les propriétaires.La seigneurie de Monstreul apparaît au XIIIe siècle sur une terre franche en appartenant à un Fastré de Ligne qui se dit seigneur du lieu en 1215 puis en 1224. A la fin du siècle la terre passe par une suite de mariages à la Maison de Cysoing : Jacques de Walincourt, puis Jean, lequel meurt à Azincourt en 1415. Yolente de Werchin, qui repose dans léglise Saint-Martin de Roubaix, est tout autant chez elle là quà Chéreng et à Cysoing. Pierre de Melun, fils de Yolente, a des fonctions et des charges importantes au XVIe siècle, ne serait-ce quen tant que généralissime des armées des Pays-Bas convoquées par Guillaume dOrange. En 1634 cest un descendant, Albert de Ligne, qui est possesseur de la terre de Montreul, puis Louis XIV la restitue aux Melun, princes dEpinoy. Plus tard, Charles de Rohan-Soubise vend la terre de Montreul à un écuyer, bourgeois de Lille, en 1781 : Pierre François Albert Taverne, qui fait rebâtir la demeure en 1783 sous la forme quelle a encore aujourdhui, ou presque. Pierre Taverne décède en son château en 1831. Puis on trouve Charles-Philippe Antoine le Hardy du Marais qui fait dimportantes transformations et agrandissements. Au XXe siècle le château est possédé par une famille darchitectes roubaisiens, les Neveux. En 1974 il passe à la Fédération des organisations sociales des PTT du Nord.","architecture":"HAMAYDE: Il nest pas possible dignorer la façade somptueuse de cette maison quand on traverse Chéreng par la route de Tournai. Elle a été inscrite à lInventaire supplémentaire des Monuments Historiques le 1er novembre 1951 et a été restaurée par ses propriétaires depuis 1969, M. et Mme Meillassoux-Pollet. La seigneurie de Montmort échoit à la famille de la Hamayde par des successions et des mariages qui aboutissent à Jean de la Hamayde au XVe siècle. En 1694 elle passe par vente au baron de Vuorden, diplomate, écrivain, tout à la gloire de Louis XIV. Il est de coutume de dire que la maison encore existante fut le siège seigneurial avant de se muer en cabaret, puis relais de poste. Une telle façade, surchargée de décors moulurés, de mufles de lions, et dun soleil triomphant, peut effectivement évoquer un tel passé.\nCheminée intérieure, magnifique ouvrage en pierre de Tournai avec les armoiries réparties, de gauche à droite, de Bourgogne, de France, de la Hamayde. Lhéraldique permet de situer cette cheminée monumentale entre 1404 et 1428. Mais naurait-elle pas été amenée dailleurs , un doute subsiste. Propriété de Mr Maillassaux Pollet","habitants":"Montreul  Pierre de Melun et Albert de Ligne,                                          Hamayde; M. et Mme Meillassoux-Pollet\"","divers":"Hamayde grav -1                                          Chasseur grav-2                                        Montreul grav-3","gps":"","images":["../image/image_59/59_Ch%c3%a9reng_1.jpg","../image/image_59/59_Ch%c3%a9reng_2.jpg","../image/image_59/59_Ch%c3%a9reng_3.jpg","../image/image_59/59_Ch%c3%a9reng_4.jpg"]},"Consult_chateau_formulaire9676":{"id":"Consult_chateau_formulaire9676","dept":"59","canton":"Cambrai","commune":"Cambrai","nom":"Citadelle_Cambrai","type":"Citadelle","periode":"XV-XIX","histoire":"Six éléments au patrimoine à Cambrai la citadelle, le palais épiscopal, la porte de Paris, la porte Nôtre-Dame  et la tour des Sottes.\nLe PALAIS, Archiépiscopal de CAMBRAI, sa construction date de 1620. Il est Classé partiellement aux M.H. pour son portail depuis le 24.09.1921. Le Palais Archiepiscopal de Cambrai est la Propriété du Département. Il est fermé au Public. Il existe de nombreux monuments à découvrir à Cambrai : La Porte Notre-Dame (1634), la Citadelle, les Portes monumentales : Les portes de Paris (fin XIVe siècle)131, Notre Dame (XVIIe siècle)132 et les tours des Sottes (ou Saint-Fiacre), du Caudron (1re moitié du XVe siècle) et des Arquets (XVIe siècle) sont les vestiges des remparts médiévaux, le Beffroi et l'Hôtel de ville de Cambrai, L'Hôtel de Francqueville (XVIIIe siècle) abrite les riches collections du Musée de Cambrai,  agrandi et rénové en 1994.                                                                                                                           la PORTE de PARIS; la monumentale  est une rareté à Cambrai, dans la mesure où elle semble être l'unique vestige d'importance témoignant de son passé médiéval (1390). Elle est réduite à sa plus stricte expression, à savoir une des portes de la ville, après que les murailles fortifiées furent rasées. Cette porte,  située au bas de l'avenue de la Victoire, a retrouvé toute sa splendeur. Des travaux ont été réalisés pour la venue du Royal Tank Régiment à l'occasion du Centenaire de la Bataille de Cambrai. A l'occasion des Commémorations de 1917, novembre 2017 a vu la métamorphose de cet endroit, clarté, propreté, pelouse implantée, fleurs repiquées doivent sûrement réjouir les habitants du quartier. Même si la facture de la rénovation doit être élevée, force et de constater que la Porte de Paris, au milieu de ce décor rénovée, trône avec fierté à l'entrée de Cambrai.","architecture":"CITADELLE DE CAMBRAI,  malgré son démantèlement au XIXe siècle, la citadelle de Charles Quint a conservé les galeries de contre-mine, aujourd'hui, ensevelies. La Porte Royale et son pont-levis, classée à l'inventaire des M.H. le 14/04/1932, flanquée à l'arrière de deux corps de garde et un arsenal du XVIe siècle. Parmi les aménagements postérieurs, un magasin à poudre, des logements pour officiers et une caserne « à l'épreuve des bombes » du XIXe siècle sont également remarquable . La Porte Notre-Dame a été bâtie à Cambrai, construite en 1623, elle marque lentrée Nord . A cette époque, les portes des villes étaient protégées par des bastions, saffranchissent de leur rôle défensif et devenant des symboles de la richesse des villes. Avec son appareillage en « pointe de diamant » et son riche décor sculpté.                                                      PORTE NÖTRE-DAME est représentative du style baroque. Le soleil qui orne la partie supérieure de la Porte Notre-Dame a été ajouté après la prise de Cambrai par Louis XIV.                                                                                                                      La TOUR des SOTTES, sa construction date du XVe siècle. Cette tour, construite après 1400, est de plan semi-circulaire, légèrement outrepassé. Elle s'inscrivait dans l'enceinte de Cambrai dont le tracé datait du XIe siècle. Elle avait été modernisée du XIVe au XVIIIe siècle, puis fut démantelée à la fin du XIXe siècle. La Tour Saint-Fiacre est inscripte aux M.H. depuis le 1/12/1997 elle  est aujourd'hui la propriété de la commune de Cambrai.","habitants":"Propriété du Département.\"","divers":"Cinq éléments au patrimoine à Cambrai la citadelle grv 1-2-3, le palais épiscopal, la porte de Paris,grav-4 ,la porte Nôtre-Dame grav-6 et la tour des Sottes.                                Palais Cambrai.                                        Citadelle  GPS : 50° 10' 36\" Nord, 3° 14' 08\" Est                                               Porte Nôtre-Dame; GPS : 50° 10' 36\" Nord, 3° 14' 08\" Est                              Porte de Paris GPS : 50° 10' 15,96\" Nord, 3° 13' 54,12\" Est                              tour des sottes GPS : 50° 10' 19\" Nord, 3° 13' 41\" Est","gps":"50° 10' 36\" Nord, 3° 14' 08\" Est","images":["../image/image_59/59_Citadelle_Cambrai_1.jpg","../image/image_59/59_Citadelle_Cambrai_2.jpg","../image/image_59/59_Citadelle_Cambrai_3.jpg","../image/image_59/59_Citadelle_Cambrai_4.jpg","../image/image_59/59_Citadelle_Cambrai_5.jpg","../image/image_59/59_Citadelle_Cambrai_6.jpg","../image/image_59/59_Citadelle_Cambrai_7.jpg","../image/image_59/59_Citadelle_Cambrai_8.jpg"]},"Consult_chateau_formulairefaf2":{"id":"Consult_chateau_formulairefaf2","dept":"59","canton":"Cambrai","commune":"Cambrai","nom":"Citadelle_Cambrai","type":"Château","periode":"XVII","histoire":"trois châteaux dans cet article , Le Palais archiépiscopal de Cambrai des Selles et Sancourt. et la Tour st-fiacres                                                                            LES  SELLES  La construction du château de Selles date du XIe au XVIIIe siècle. Remanié aux XVI-XVIIe siècle fut la citadelle de la ville avant que Charles Quint construise la sienne. Son architecture militaire date du Moyen-Age. De 1026 à 1080, les Evêques de Cambrai Gérard  Ier, Liébert et Gérard II entreprirent de faire effectuer des travaux importants, pour doter la ville dune enceinte en bois, puis en maçonnerie. Le château de Selles daterait de cette époque. Il permettait aux évêques, qui avaient les pouvoirs comtaux sur la ville, depuis 948, à la fois de défendre Cambrai et den surveiller les habitants. En 1270, lévêque Nicolas de Fontaines fit reconstruire le château de Selles. Les vestiges encore visibles, aujourdhui, datent de cette époque. Le château de Selles est une ancienne forteresse bâtie, en 1270, pour Nicolas de Fontaines. Au XIe siècle, autrefois, le château de Selles, isolé par les eaux de l'Escaut, a conservé ses tours et ses murailles et surtout ses gaines enterrées dont les nombreux graffitis témoignent du désespoir des prisonniers enfermés sur l'ordre du Comte-Evêque de Cambrai. En 1543, le roi Charles-Quint occupa Cambrai et décida la construction dune nouvelle citadelle sur le Mont-des-Bufs  pour défendre la ville contre les Français. propriété de la commune.                SANCOURT, au nord ouest de Cambrai, est construit au XVIIIe siècle, a été restauré et agrandi au XIXe siècle. Très endommagé, il est actuellement en cours de restauration. Un chemin conduit à la grille d'entrée, d'où l'on peut voir la cour bordée latéralement des communs reliés par des angles arrondis au corps de logis principal, présente une façade en brique avec chaînages en pierre. Cette façade ornée au siècle dernier possède un porche, en avancée, soutenu par deux colonnes.","architecture":"Le PALAIS archiépiscopal de Cambrai , sa construction date de 1620.       LES  SELLES  perdit une grande partie de sa fonction défensive, mais continua d'être utilisé comme une prison. Le château souffre du siège de la ville, en 1677, par le roi Louis XIV qui le fait attaquer, se portant au Nord, entre le château et la porte Notre-Dame. Au XVIIIe siècle, les États de Cambrésis feront raser les superstructures et construire des bâtiments à usage de manutention militaire et de boulangerie. En 1813, ces bâtiments sont convertis en hôpital militaire. Après la bataille de Waterloo, en 1815, ils reçurent de nombreux blessés. Ils conserveront cette fonction jusquen 1940. En 1992, le Palais de justice est installé, dans les murs du château de Selles, après ses travaux de restauration. Le château de Selles, ses façades, ses remparts et les toitures des batiments du XVIIIe siècle, sont classés aux M.H. depuis le 21/09/1981, est la propriété de  la ville de Cambrai.                                                                                                                                   TOUR ST-FIACRES ou château ds Sottes,  lenceinte médiévale, longue de 4 kms, est flanquée dune cinquantaine de tours hautes de 15 m qui permettent aux archers de défendre les murs de courtines depuis les embrasures. Ces tours sont construites en pierre calcaire sur un solide soubassement de grès. Au XVIème siècle est ajouté un parapet de briques. La tour Saint-Fiacre est rebaptisée tour des Sottes au XIXème siècle en raison du voisinage dun asile de femmes.","habitants":"Seigneurs locaux\"","divers":"Palais grav_1-6 Porte nôtre dame grv-3, tour st-Fiacre grav-4,   des Selles grav_5                                                  Cambrai GPS : 50° 10' 54\" Nord, 3° 13' 53\" Est","gps":"50° 10' 54\" Nord, 3° 13' 53\" Est","images":["../image/image_59/59_Cambrai_Lamotte_1.jpg","../image/image_59/59_Cambrai_Lamotte_2.jpg","../image/image_59/59_Cambrai_Lamotte_3.jpg","../image/image_59/59_Cambrai_Lamotte_4.jpg"]},"Consult_chateau_formulaire2ea9":{"id":"Consult_chateau_formulaire2ea9","dept":"59","canton":"Marly","commune":"Condé sur l","nom":"Condé_Escaut","type":"Château","periode":"XVIII","histoire":"trois châteaux dans cet article; , Barratte et Douaniers.                                                                                                                                                                       CHATEAU FORT construit à Condé. Au moyen-Age, le château est une construction défensive qui assoit le pouvoir du seigneur (château-fort).  A la Renaissance, le château devient lieu de villégiature des rois ou des nobles, perdant sa vocation initiale de défense. De nombreux châteaux sont remaniés au fil des siècles, témoignant ainsi de l'évolution des besoins selon les périodes de l'Histoire.Il est agrémenté de parcs et jardins ajoutant à l'esthétique des lieux le plaisir des promenades.    construit à Condé. Au moyen-Age, le château est une construction défensive qui assoit le pouvoir du seigneur (château-fort).  A la Renaissance, le château devient lieu de villégiature des rois ou des nobles, perdant sa vocation initiale de défense. De nombreux châteaux sont remaniés au fil des siècles, témoignant ainsi de l'évolution des besoins selon les périodes de l'histoire.Il est agrémenté de parcs et jardins ajoutant à l'esthétique des lieux le plaisir des promenades.","architecture":"BARRATTE ou BELLEVUE à TEMPLEUVE à placer. L'Hôtel de Ville de Templeuve. Sa construction date du XIXe siècle. L'architecte était Louis Bonnier. C'est la propriété de la commune, baptisé à l'origine, le château de Bellevue, à sa construction en 1853, il prit ensuite le nom de son bâtisseur. Occupé par les Allemands pendant la première guerre mondiale, il fut récupéré par la Famille Baratte, à la fin de la guerre. Abandonné en 1938, il fut récupéré par des Britanniques, pendant la drôle de guerre. À la suite de la débâcle de 1940, il fut pillé et les archives furent brûlées. Utilisé pour loger des familles sans abri, après la guerre et jusqu'en 1950, il fut vendu, en 1960, par la Famille Baratte à la municipalité. Détérioré par les années, il fut racheté puis restauré par la mairie et abrite désormais ses services administratifs depuis 2002. L'Hôtel de ville est inscrit partiellement aux M.H. depuis le 16/05/2002, pour ses façades et toitures sur rue, son vestibule et l'escalier d'honneur, sa salle des fêtes.                                                                                                              DOUANIERS  à Fresnes sur Escauit,  Situé dans le quartier du Trieu, cette maison bourgeoise du XVIIIe siècle est un rare témoin des prémisses de lexploitation charbonnière. Importante pour le patrimoine historique minier, elle est néanmoins en fort mauvais état. Lintervention du projet \"Renouer\" sera loccasion de redéfinir la place et le rôle de cette demeure dans le quartier, il permettra détablir un programme de reconversion et de rénovation du château. Eléments protégés MH : les façades et les toitures ; le salon et la grande chambre au rez-de-chaussée avec leur décor : inscription par arrêté du 24 décembre 1982.","habitants":"Famille de Jean-Claude Gonneau et le   prince Anne-Emmanuel de Croÿ\"","divers":"Arsenal grav 1-                                             Flesquières grav -3-4                            Hermitage grav -5-6                                    GPS : 50° 29' 4,06\" Nord, 3° 35' 50,17\" Est                                                Barratte  Grav_2 GPS : 50° 31' 38\" Nord, 3° 10' 33\" Est                                              Douaniers  grav 7-8; GPS : 50° 26' 25\" Nord, 3° 33' 44\" Est","gps":"50° 29' 4,06\" Nord, 3° 35' 50,17\" Est","images":["../image/image_59/59_Cond%c3%a9_Escaut_1.jpg","../image/image_59/59_Cond%c3%a9_Escaut_2.jpg","../image/image_59/59_Cond%c3%a9_Escaut_3.jpg","../image/image_59/59_Cond%c3%a9_Escaut_4.jpg","../image/image_59/59_Cond%c3%a9_Escaut_5.jpg","../image/image_59/59_Cond%c3%a9_Escaut_6.jpg","../image/image_59/59_Cond%c3%a9_Escaut_7.jpg","../image/image_59/59_Cond%c3%a9_Escaut_8.jpg"]},"Consult_chateau_formulaire4a8b":{"id":"Consult_chateau_formulaire4a8b","dept":"59","canton":"Valenciennes","commune":"Condé sur l","nom":"Condé_Hermitage_Neuville","type":"Château","periode":"XVII-XVIII","histoire":"HERMITAGE,  le maréchal duc de Croÿ en 1788, à partir d'une parcelle gagnée sur le bois de Phalempin, le grand maître des Eaux et Forêts fit édifier l'Hermitage destiné à accueillir la maîtrise. D'un bâtiment à usage administratif, dans lequel il avait son logement, il fit un château et en reçut un blâme de Louis XVI pour avoir dépassé les crédits qui lui étaient alloués. Le château fut occupé durant le XIXe siècle par Mlle Dillies. Tout récemment, il a abrité des instruments de mesure pour la Faculté des sciences. Cédé le 8 novembre 1974, il appartient à M. Dutilleul qui le remet en état.  Monsieur Antonini l'à repris récemment et à entrepris la reconstruction, unique témoignage de larchitecture palladienne de la région, retrouve sa splendeur dorigine grâce à une restauration exemplaire menée par des propriétaire passionnés et soucieux de  transmettre un patrimoine exceptionnel aux générations à venir. Mr et Mme Gonneau vous guident dans cette splendeur du XVIIIe siècle. Propriété de la famille Croÿ depuis 1608, le domaine s'agrémenta successivement d'un pavillon de chasse au XVIe siècle, puis d'une gentilhommière qui s'étendit au château actuel édifié pour le Prince Anne-Emmanuel de Croÿ par les architectes Chaussard et Contant d'Ivry.","architecture":"HERMITAGE, c'est au château de l'Hermitage que fut signé l'acte constitutif de la compagnie des mines d'Anzin. Unique témoignage de l'architecture palladienne de la région, le château, ses dépendances et les jardins (parc paysager de type \"forêt jardinisée, sont classés aux M.H. Le site du château fait partie des biens du bassin minier du Nord-Pas-de-Calais inscrits sur la liste du patrimoine mondial de l'Humanité depuis 2012.  cette résidence néo-classique majestueuse est lun des châteaux emblématique des débuts de lexploitation minière puisque cest dans ses salons que fut signé, le 19 novembre 1757, lacte constitutif de la compagnies des Mines dAnzin. En propriété privée, il nest visible que depuis les sentiers de promenades forestiers. De Neuville, château reconstruit de 1784 à 1789 est implanté à l'une des extrémités du bois de Phalempin. Une longue allée d'arbres précède son entrée marquée par deux piliers carrés à refends surmontés de pots à fleurs. Fondées sur grès, les quatre façades du bâtiment développent une architecture de brique et de pierre. Tout autour de l'édifice, sous un haut toit à brisis, courent une corniche à modillons et une étroite frise à glyphes. Vers la cour, la partie centrale ne comporte qu'une seule travée. En pierre, traitée à refends, elle est surmontée d'un fronton triangulaire qu'ornent un cartouche ovale et des rinceaux. Au-dessus de l'unique fenêtre, une corniche et ses 2 consoles; de chaque côté de la clef sculptée, deux guirlandes comme à la porte du rez-de-chaussée. Un balcon en surplomb, aujourd'hui sans garde-corps, est soutenu par deux paires de corbeaux à talon développé.\nÉléments protégés MH : les façades et les toitures du château: inscription par arrêté du 29 juin 1966.","habitants":"famille Croÿ, le Prince Anne-Emmanuel de Croÿ\"","divers":"Hermitage grv-1;GPS : 50° 29' 4,06\" Nord, 3° 35' 50,17\" Est  Hermitage  50° 29' 12? N, 3° 35' 46? E","gps":"50° 29' 4,06\" Nord, 3° 35' 50,17\" Est  Hermitage  50° 29' 12","images":["../image/image_59/59_Cond%c3%a9_neuville_1.jpg","../image/image_59/59_Cond%c3%a9_neuville_2.jpg","../image/image_59/59_Cond%c3%a9_neuville_3.jpg","../image/image_59/59_Cond%c3%a9_neuville_4.jpg","../image/image_59/59_Cond%c3%a9_neuville_5.jpg","../image/image_59/59_Cond%c3%a9_neuville_6.jpg"]},"Consult_chateau_formulaire2f4b":{"id":"Consult_chateau_formulaire2f4b","dept":"59","canton":"Marly","commune":"Condé sur l","nom":"Condé_sur_l","type":"Châteaux","periode":"XIII-XIX","histoire":"Condé sur l'escaut trois châteaux dans cet article fresnes, FRESNES, le 8 décembre 1836, le château de Fresnes fut acquis par la famille Renard. Il avait été reçu en héritage par Emilie Louise Gravis, veuve de Emile Moreau Saugrin décédé en 1833, fils ainé de Louise-Josephe Chalgrin  la deuxième épouse de Stanislas Desandrouin, Stanislas étant décédé sans héritier légitime. Ce château avec son jardin, son étang, ses bosquets et autres dépendances, fut vendu au fils de Jacques Renard, prénommé Louis Marie Ange Charles Jacques, maître verrier et propriétaire demeurant à Fresnes. Un bottin de 1892 précise que la propriété appartenait alors à M. Léon Renard. En 1907, le château fut acquis par M. Paul Wagret. La propriété était entourée dun mur qui se prolongeait jusquà la verrerie du Nord y attenant. Ce mur fut supprimé en totalité dans les années 1960 pour mettre en valeur le parc Joliot-Curie. Entrée du parc vers 1925 avec les communs, le pigeonnier et les écuries. Le tout a été démoli pour dégager la vue. Le château actuel fut vendu le 1er août 1913 par la société Paul Wagret et à la Compagnie des Mines de Thivencelles qui en fit la résidence de ses directeurs successifs. Le dernier en date était monsieur Azais, La propriété fut transmise par la suite aux Houillères Nationales par effet de la loi du 17 mai 1946 qui avait prononcé la nationalisation des charbonnages. La municipalité de Fresnes en fit lacquisition le 9 août 1958. Depuis lors, un certain nombre daménagements ont vandalisé lintérieur. Le perron et lentrée principale situés au centre de lédifice ont disparu pour laisser place à une plaque commémorative.","architecture":"LORETTE, il a été construit au XIXe siècle. Il se situe face à l'église de la commune, a conservé l'aspect cher à l'univers de Maupassnt et de Balzac; dans son style très XIXe siècle. Les premiers éléments datent de 1875. Son propriétaire inital était Nicolas Carliez, un fils de banquier. En 1886, le château de Lorette fut racheté par la Famille Cazin. En 1920, il est racheté par la Ville de Condé.                                                                                                                       FRESNES sur l'ESCAUT DOUANIERS A quelque K.M.au sud  à Fresnes sur Esxcauit  Situé dans le quartier du Trieu, cette maison bourgeoise du XVIIIe siècle est un rare témoin des prémisses de lexploitation charbonnière. Importante pour le patrimoine historique minier, elle est néanmoins en fort mauvais état. Lintervention du projet Renouer  sera loccasion de redéfinir la place et le rôle de cette demeure dans le quartier, il permettra détablir un programme de reconversion et de rénovation du château. Eléments protégés MH : les façades et les toitures ; le salon et la grande chambre au rez-de-chaussée avec leur décor : inscription par arrêté du 24 décembre 1982.","habitants":"frenes;  famille Renard Lorette Famille de   Nicolas Carliez                                       Famille de r M. Paul Wagret\"","divers":"GPS : 50° 26' 49,66\" Nord, 3° 35' 25,74\" Est                                                                                                   Mairie  grav-1,                                       Grav 4 GPS : 50° 27' 00\" Nord, 3° 35' 29\" Est                                                  Lorette  grav-2-3 GPS : 50° 27' 00\" Nord, 3° 35' 29\" Est                                                 Chat fort   grav-4","gps":"50° 26' 49,66\" Nord, 3° 35' 25,74\" Est","images":["../image/image_59/59_Cond%c3%a9_Sur_l%27Escaut_II_1.jpg","../image/image_59/59_Cond%c3%a9_Sur_l%27Escaut_II_2.jpg","../image/image_59/59_Cond%c3%a9_Sur_l%27Escaut_II_3.jpg","../image/image_59/59_Cond%c3%a9_Sur_l%27Escaut_II_4.jpg"]},"Consult_chateau_formulaire7335":{"id":"Consult_chateau_formulaire7335","dept":"59","canton":"Avesnes-sur-Helpe","commune":"St Hilaire sur Helpe","nom":"Coutant","type":"Château","periode":"XIII-XVII","histoire":"COUTANT, en 1288, le fief est à Pierre des Pinions puis à son fils. On doit sans doute à l'un ou à l'autre l'unique tour ronde subsistant de l'ancienne maison-forte, et aux du Fayt les éléments de maçonnerie du XVIe siècle. La terre passe par alliance à Jean de Fayt, prévôt d'armes qui entreprend  d'important travaux pour moderniser le maison forte. François de Presseau lui succède en 1685 et obtient l'erection en fief seigneurial avec droit de justice. Mais l'ensemble de la construction a été bâti vers 1714 par François de la Combe, maréchal des camps et armées du Roi, directeur des fortifications du Hainaut, propriétaire depuis 1696. Jean de la Combe en 1721 décède, le château est acquis par Jean le Brun, régent du collège royal d'Avesnes, passe ensuite à ses neveux qui complètent les aménagements intérieurs. Les Cordier succèdent par mariage aux le Brun qui font édifier la tour nord-est sur le modéle  des deux autres tours carrées. Le château devait rester dans cette famille jusqu'en 1946; il fut alors acheté par M. Paul Delannoy qui y apporte tous ses soins, toujours dans la descendance.","architecture":"COUTANT, un peu perdu au milieu des bois, le château, qu'isolent de hauts murs et des douves, dresse sa masse imposante faite de calcaire, d'un gris bleuté, agrémenté de briques roses placées au hasard des réparations et transformations ou dans un but esthétique. Les trois ailes de longueur et de largeur inégales, sont cantonnées de tours : l'une ronde, la plus ancienne, et les trois autres sont carrées et s'élèvent sur trois niveaux : celle du nord-est, aux trois quarts hors-uvre, date du XIXe siècle, et comporte un pigeonnier. Celles du sud-est et du sud-ouest sont accolées, la première légèrement en saillie vers l'est. La façade la plus intéressante, qui donne sur le parc, présente des percements réguliers, importants à la travée centrale où se superposent deux portes fenêtres, au rez-de-chaussée est surmontée d'une imposte simple dont elle est séparée par un linteau de pierre. Éléments protégés MH : le château avec ses douves ; le pavillon du potager ; le parc et l'étang : inscription par arrêté du 28 avril 1947.","habitants":"Famille de François de Presseau\"","divers":"Château de Coutant GPS : 50° 07' 56\" Nord, 3° 54' 16\" Est","gps":"50° 07' 56\" Nord, 3° 54' 16\" Est","images":["../image/image_59/59_Coutant_1.jpg","../image/image_59/59_Coutant_2.jpg"]},"Consult_chateau_formulaire5a56":{"id":"Consult_chateau_formulaire5a56","dept":"59","canton":"Croix","commune":"Croix","nom":"Croix_Blanche","type":"Château","periode":"XVII-XVIII","histoire":"Trois châteaux dans cet article Croix Blanche,  Catteau et le Comtal                                      CROIX BLANCHE Hôtel de ville   Édifié en 1878, ce château est de style renaissance en pierres blanches et briques. Il a été construit par l'architecte Eugène Dupire Rozan pour Cyrille Ferlié, commissionnaire en laine à Roubaix. Cest en 1903 quil fut vendu par les héritiers Ferlie Lecomte à la famille Leclercq Delaoutre, qui le revendait à son tour à la ville de Croix en 1923, il abrite désormais lHôtel de ville. Au cur de la ville, le parc du château est un lieu apprécié avec ses arbres centenaires. Au centre de la partie sud du parc se trouve un joli kiosque construit dans le parc du château Holden, aujourdhui disparu. A voir également dans le parc, un magnifique hêtre pourpre, classé arbre remarquable.                                                                                               CATTEAU ou florin , ce château, construit dans les années 1880, pour Henry Catteau, est également appelé aujourd'hui château Florin. En 1936, le château Florin fut appelé le château Catteau puis la maison des uvres sociales, en 1938, puis la maison des Jeunes et de la Culture en 1945 et, aujourd'hui, depuis c'est dvenu la maison pour Tous. L'édifice a été acquis par la commune en 1938. Le parc de plus de deux hectares qui le bordait a permis l'aménagement du centre sportif. Le bâtiment est devenu une maison des Jeunes en 1945, quant à la conciergerie, elle abrite actuellement le commissariat de police. Ce château serait menacé, en effet le maire de cette commune voudrait le faire raser dans les mois à venir afin de réaliser peut-être un autre immeuble ! Voir la pétition pour la sauvegarde de ce château , abrite la maison des Jeunes aujourd'hui.","architecture":"CHÂTEAU COMTAL, au XVIIe siècle, un château a remplacé sur ce site un manoir médiéval dont il subsiste le bâtiment d'entrée réalisé en brique sur un soubassement de grès aux XIVe et XVe siècles, bien que le claveau central de la porte soit daté de 1605. Sa tour carrée, coiffée d'une pyramide d'ardoise, est flanquée de deux tourelles moins élevées et de plan circulaire; celles-ci sont percées d'archères qui commandent la porte tracée en arc surbaissé. Le château actuel a été réalisé au début du XVIIe siècle. Il comprend deux niveaux où la brique et la pierre sont associées. Sa façade principale est encadrée de deux ailes saillantes d'une travée qui présentent chacune un pignon à pas-de-moineaux, à la base de celle de gauche s'adosse une petite construction, sans doute une chapelle ouvrant sur la cour par une porte à arc surbaissé et coiffée d'une toiture pyramidale. Le corps principal de logis présente six travées; les deux du centre forment un léger avant-corps ; des colonnes doriques au rez-de-chaussée, ioniques à l'étage les délimitent et supportent un entablement au sommet. Deux frontons triangulaires se détachent en avant d'un grand fronton à volutes et couronnement curviligne, d'allure baroque. Les baies sont rectangulaires; les assises de pierre et de brique alternent à leurs piédroits; certaines se prolongent au travers des trumeaux de briques et dessinent toute une série de cordons horizontaux..","habitants":"Croix  famille Leclercq Delaoutre                                          Catteau ; Henry Catteau,\"","divers":"Trois châteaux dans cet article Croix Blanche,  Catteau grav 2-3  et le Comtal                                                       Croix-Blanche   grav_1 à 3                         GPS : 50° 40' 41\" Nord, 3° 09' 03\" Est\nCatteau  GPS : 50° 40' 41\" Nord, 3° 09' 03\" Est                                                      Courcelette grav_4_5","gps":"50° 40' 41\" Nord, 3° 09' 03\" Est","images":["../image/image_59/59_Croix_Blanche_1.jpg","../image/image_59/59_Croix_Blanche_2.jpg","../image/image_59/59_Croix_Blanche_3.jpg","../image/image_59/59_Croix_Blanche_4.jpg","../image/image_59/59_Croix_Blanche_5.jpg"]},"Consult_chateau_formulaire62b3":{"id":"Consult_chateau_formulaire62b3","dept":"59","canton":"Croix_Fourmies","commune":"La Croix","nom":"Croix_Blanche_II","type":"Châteaux","periode":"XIII-XVI-XIX","histoire":"Trois châteaux dans cet article ; Fontaine, villa Cavrois et le Campus.                                                                 FONTAINE, la seigneurie de la Fontaine, qui bordait la terre de Croix, existait déjà au XIIIe siècle. De cette seigneurie de la Fontaine, il subsiste le château construit en 1604, dans le style Renaissance flamande, à lemplacement dun manoir médiéval dont il subsiste une porte fortifiée encadrée par deux tours. Ce château classé, plusieurs fois restauré, doit son nom à une fontaine aux eaux réputées miraculeuses qui jaillit plus haut. En 1920, les héritiers de la famille Brame le vendent à lindustriel Benoît Roussel. Après avoir été occupé par les Allemands et pillé par les populations privées de tout, le château est en ruines. Mais Benoît Roussel sauve le bâtiment. En 1981, François Christian, architecte, rachète le château et sattache à le restaurer lui-même et à lui redonner vie. Éléments protégés MH : les façades et les toitures du château ; les vestiges des douves ; les restes de la porte fortifiée; l'ensemble du parc : inscription par arrêté du 11 janvier 1951.","architecture":"Le Manoir du Campus est un manoir bâti à Croix. Il est privé, fermé au Public. Il existe aussi sur la commune à découvrir : Le château de la Croix Blanche qui date de 1878, privé, le Domaine des Diamants Blancs rèsidence séniors et sa sculture en verre de 3 m de haut, le Château Florin de 1880, le château de la Fontaine la porte et ses 2 tourelles, millésime de 1605, la Villa Cavrois 1932.","habitants":"Paul Cavrois                              famille Brame \"","divers":"Trois châteaux dans cet article ; Fontaine grav 1-2-3, et le Campus. Cavrois                                                                  GPS : 50° 40' 00\" Nord, 3° 09' 51\" Est                                                        campus grav-II-2-3 GPS : 50° 40' 41\" Nord, 3° 09' 03\" Est                                                               Fontaine GPS : 50° 39' 40\" Nord, 3° 09' 35\" Est                                                              Cavrois GPS : 50° 40' 41\" Nord, 3° 09' 03\" Est","gps":"50° 40' 00\" Nord, 3° 09' 51\" Est","images":["../image/image_59/59_Croix_Blanche_II_1.jpg","../image/image_59/59_Croix_Blanche_II_2.jpg","../image/image_59/59_Croix_Blanche_II_3.jpg","../image/image_59/59_Croix_Blanche_II_4.jpg"]},"Consult_chateau_formulairecda2":{"id":"Consult_chateau_formulairecda2","dept":"59","canton":"Douai","commune":"Douai","nom":"Douai","type":"Châteaux","periode":"XII-XVII","histoire":"trois châteaux dans cet article  Douai, Aubry  et Péage .                                                 DOUAI la première mention d'un donjon en pierre apparaît dans les textes en 1187 cité comme le château du roi et du comte désigné comme  Neuve Tour , dont il subsiste dans un jardin du quai Daint-Maurand, les vestiges d'un donjon roman connu sous le nom de Vieille Tour. Agrandi en 1273, son emplacement est occupé par la bibliothèque, le conservatoire et l'ancienne fonderie de canons. Un second château  selon Charles-Laurent Salch, Douai possédait une seconde forteresse, un donjon sur motte du XIIe siècle, remanié au XIVe siècle par les comtes de Flandre, située près de la collégiale Saint-Amé qui fut mis au jour lors de fouilles au XXe siècle.                                                                                                                     AUBRY offre un cadre intime et romantique pour le jour de votre mariage, avec un intérieur contemporains, des chambres confortables, c'est un véritable chez-soi  pour accueillir et divertir vos invités.                                                                                                                      PEAGE,  les premiers documents sur Frais-Marais remontent au XIIIe siècle. Cest à cette époque que sont définies officiellement, par lautorité du comte de Flandres, Thomas, et de Jeanne, son épouse, les limites de la banlieue douaisienne, ces campagnes qui entouraient la ville fortifiée et lui fournissaient une grande partie de ses subsistances. Au XVIe siècle, la ville entreprend des travaux destinés à assécher quelques parties du marais. Des habitants venus de la ville construisent dès cette époque des maisons de campagne au frais marais. On peut encore voir aujourdhui certaines de ces vastes demeures, à limage du château du Péage qui a été construit au XVIIIe siècle pour un bourgeois de Douai afin de lui servir de maison de plaisance, l'uvre réalisée en brique comprend deux niveaux et ses deux bâtiments principaux sont disposés en équerre, une annexe plus basse prolonge l'une des branches de celle-ci, une tourelle coiffée d'une sorte de dôme est placée à l'extrémité de l'autre.","architecture":"DOUAI, la première résidence comtale comprenait une maison à étages de plus de 8 mètres de long sur 7 mètres de large, bâtie sur cave. Une nouvelle résidence emmottée sur 1,8 mètre de hauteur sur trois de ses côtés et ceinte d'un fossé fut construite par Lothaire. Arnoul II la transforme. Il comble les bâtiments existants et les emmotte pour créer une motte tronconique, au sommet de laquelle il construit un petit donjon en bois carré de 5 mètres de côté. La tour de bois sera remplacée par un donjon en pierre de plan carré de 18 mètres de côté. La motte est chemisée de pierre. On accède à la basse-cour par un châtelet d'entrée quadrangulaire. Adossée au mur de la chemise, face au donjon, se dresse l'aula comtale. De forme légèrement trapézoïdale. La cave qui est le seul vestige était accessible par un escalier en pierre. La motte qui mesure alors 70 mètres de diamètre est flanquée à l'ouest d'une basse-cour dont la plateforme, à peu près circulaire, mesure 60 mètres de diamètre. En 1393, on sait qu'une pompe à eau est installée dans la cuisine castrale, lors des remaniements.  Le beffroi de Douai, construit en 1380, cest le monument le plus emblématique de la ville de Douai, un repère urbain immuable depuis des générations. Avec son carillon et son architecture typique (à la base en grès des Flandres mais renforcée lors dune restauration au XIXe siècle), il est inscrit aux M.H. depuis 1862 (et sur la liste du patrimoine mondial de lUNESCO depuis 2005). Quoi de mieux pour voir les choses de haut.","habitants":"Seigneurs locaux\"","divers":"Trois châteaux ; porte d'arras grav_3.                                                         porte de Valenciennes grav-4                                                            Château Teuffet grav-5","gps":"","images":["../image/image_59/59_Douai_1.jpg","../image/image_59/59_Douai_2.jpg","../image/image_59/59_Douai_3.jpg","../image/image_59/59_Douai_4.jpg","../image/image_59/59_Douai_5.jpg"]},"Consult_chateau_formulaire858e":{"id":"Consult_chateau_formulaire858e","dept":"59","canton":"Avesnes-sur-Helpe","commune":"Dourlers","nom":"Dourlers","type":"château","periode":"XVI-XVII","histoire":"DOURLERS    La fille d'Ernest d'Eclaibes vendit en 1709 la terre de Dourlers avec les ruines d'une ancienne forteresse détruite en 1622 à Pierre Bady, architecte des bâtiments du roi, qui fut chargé de veiller à la réalisation des fortifications de Maubeuge de 1679 à 1689. Il sera anobli en 1781 et nommé grand bailli et prévôt d'Avesnes. Les constructions actuelles seraient dues à son quatrième fils, Antoine -François, qui avait la charge de grand bailli. Le 15 octobre 1793, l'artillerie de Jourdan prend la demeure pour cible car elle abritait le quartier général autrichien du général de Clerfayt. Un prête-nom l'acquiert en l'an VI au profit de Charles Bady qui y résidera jusque sa mort en 1833.  Vers 1850 Le marquis et la marquise de Nédonchel le restaure après en avoir hérité. Puis, jusqu'au début des années 1970, la propriété appartiendra à la famille de François Bourbon -Busset qui le possède toujours. A cette époque, M. Mulleman l'acquiert et en fait le musée du scoutisme.\nÉléments protégés MH : le château et le parc : inscription par arrêté du 1er octobre 1992.","architecture":"DOURLERS; vendu comme bien nationale, acquis par le garde -chasse du comte de Normont qui le rétrocéda à ce dernier après la tourmente, la demeure était inabitable;  vers 1850  le marquis de Nedonchel qui l'avait héritée entreprend  sa restauration. Robuste construction qui se rattache encore à  la tradition du XVIIe siècle, avec sa longue façade plate n'est animée à ses extrémités que par deux pavillons en retrait de plan hexagonal coiffés de dômes bien que son rôle n'est rien de défensif, il evoque un peu les rudes fortifications que son constructeur  \"Pierre Bady \"avait exécutées à Maubeuge.","habitants":"Famille Bourbon Busset\"","divers":"Dourlers  GPS : 50° 10' 26,39\" Nord, 3° 56' 6,75\" Est","gps":"50° 10' 26,39\" Nord, 3° 56' 6,75\" Est","images":["../image/image_59/59_Dourlers_1.jpg","../image/image_59/59_Dourlers_2.jpg"]},"Consult_chateau_formulairefb61":{"id":"Consult_chateau_formulairefb61","dept":"59","canton":"Dunkerque","commune":"Dunkerque","nom":"Dunkerque","type":"Chateaux","periode":"XV-XVII","histoire":"deux châteaux dans cet article, Coquelle,  la tour  Leughenaer et Vithof.                       COQUELLE le plus monumental de tous les châteaux rosendaliens, le château Coquelle est le seul à avoir conservé lintégralité de son parc à langlaise, de 4.3 Hectares, planté dessences indigènes, parcouru dune rivière avec une cascade et un bassin, doté à lorigine dune volière. Propriété du Négociant Felix Coquelle, maire de Rosendael de 1904 à 1928, cet édifice majestueux, inspiré du style Basco Byzantin. Surmonté dune tour belvédère, le château a été construit de 1902 à 1907, sur les plans de larchitecte Jean Morel, le sculpteur Maurice Ringot ayant réalisé la décoration intérieure. Dénommé  Euloumad  contraction des prénoms des enfants de Felix Coquelle Eugène, Louise et Madeleine, la propriété fut cédée à la Ville de Rosendael, en 1941, tout en étant occupé par les Allemands, de 1940 à 1945. Devenu un temps centre scolaire, puis un institut professionnel pour adolescents, le château Coquelle a été entièrement rénové et accueille, depuis 1992, la maison des Jeunes et de la culture de Rosendael. Pour ce qui est du parc, Mme Coquelle souhaitait quil ait des allures du jardin Vauban de Lille. Il lui emprunte donc des structures courbes, son pont, ses larges pierre, le tout agrémenté dun bassin, dune rivière et dune cascade, de bosquets et dallées cavalières. Le parc du château Coquelle est situé à Rosendaël autour du château du même nom, il abrite une mare et également une aire de jeu.","architecture":"TOUR  LEUGHENAER   Elle date du XVe siècle. C'était à l'origine, une tour ronde, faisant partie des fortifications bourguignonnes, de 1406. La forme actuelle de la Tour du Leughenaer, octogonale, est probablement due à son rattachement, en 1548, à un petit château. La Tour du Leughenaer sert alors de « tour à feu ». La Tour est cédée par le roi, à la société de pilote, en 1754. La tour devenue trop vieille, fut reconstruite, en 1759. Il fut conservé que le rez-de-chaussée de l'ancienne tour. La tour du Leughenaer est isolée, en 1793, lors de la destruction du petit château. A l'aube du XVIIIe siècle, en 1798, la tour du Leughenaer accueillit le télégraphe de Chappe. En 1824, la tour devient un phare, le premier de Dunkerque. On la fit rehausser d'un étage. En 1766, la tour du Leughenaer fut acquise, par la ville, et en 1993, elle fut classée aux M.H.                                                                                                                            Au sud ouest à quinze K.M. BOURBOURG  WITHOF à  Bourbourg  est une ancienne ferme fortifiée construite sur une motte féodale. Le manoir de Withof avait été transformé en un restaurant, mais, suite au décès de son précédent restaurateur, relativement jeune, le château de Withof est devenu, aujourd'hui, un gite d'hôtes qui comporte 238 chambres. il  est une ancienne ferme fortifiée construite sur une motte féodale. proprietaire Bernard Battais.","habitants":"Famille de  Felix Coquelle\"","divers":"Coquelle  grav 1-2-3                                                 GPS : 51° 02' 18\" Nord, 2° 22' 39\" Est                                                       Vithof grav 4-5 .GPS : 50° 56' 50\" Nord, 2° 11' 55\" Est  Vithof                        Tour Leuguenaer  grav 6","gps":"51° 02' 18\" Nord, 2° 22' 39\" Est","images":["../image/image_59/59_Dunkerque_1.jpg","../image/image_59/59_Dunkerque_2.jpg","../image/image_59/59_Dunkerque_3.jpg","../image/image_59/59_Dunkerque_4.jpg","../image/image_59/59_Dunkerque_5.jpg","../image/image_59/59_Dunkerque_6.jpg"]},"Consult_chateau_formulaire43b8":{"id":"Consult_chateau_formulaire43b8","dept":"59","canton":"Avesnes-sur-Helpe","commune":"Eclaibes","nom":"Eclaibles","type":"Fort","periode":"XIV","histoire":"deux châteaux dans cet article le fort d'éclaibes.                                                           FORT D'  ECLAIBES,   des seigneurs portant le nom du lieu ont possédés le château jusqu'en 1591, date à laquelle Charles d'Eclaibes vendit le fief au seigneur de Fosteau. Le bien passa ensuite à Charles de Croy, prince de Chimay; au XVIIIe siècle, il appartient à Philippe d'Alsace, comte de Boussu, puis à la maison d'Orléans. Avant la Révolution, le château fut vendu aux Cuisset dont l'actuel propriétaire est un descendant. Le château a été construit sur un affleurement de roches primaires dures; les blocs extraits pour creuser les douves ont servi à sa construction.","architecture":"FORT D' ECLAIBES,  du XIIe siècle, dont il reste une partie des murs de courtine et les bases de deux tours, devait à l'origine en posséder quatre, l'enceinte enfermait le logis, la salle d'audience, la chapelle et des bâtiments de services,  l'enceinte intérieure fut abandonnée au XVIIIe siècle: on exploita l'espace compris entre celle-ci et le mur nord et l'on construisit les granges et d'autres bâtiments qui sont ceux de l'actuelle ferme.\nOn accède aujourd'hui par la porte Est. A droite s'étend le bâtiment de la ferme dont la toiture a été refaite. Le rez-de-chaussée de la tour de la Sorcière est couvert par une coupole, sa cheminée a subi une restauration à l'époque moderne, c'était là que se trouvait la cuisine. Dans la tour de la prison, une salle subsiste au-dessus du niveau du sol, sa cave en pierre est couverte d'une voûte en forme de coquille de moule.  Entouré dun rempart extérieur et de douves, garni de 4 tours intérieures reliées par un second rempart ainsi quun pont levis enjambant les fossés extérieurs,  le château dEclaibes constituait une redoutable défense ! Edifié par les seigneurs durant le temps des croisades, il était entouré dune exploitation agricole. Malgré son dispositif de défense, la demeure fut plusieurs fois assiégée sous Louis XIII et Louis XIV qui convoitaient la province du Hainaut, dépendant alors de lEspagne. Le roi soleil y fit même un séjour durant lequel une anecdote insolite bouleversa notre histoire régionale. Les chroniqueurs racontent quà la fin dun repas au château, Louis XIV, enchanté, demanda une chaise percée pour ses besoins naturels. Néanmoins, cette dernière, très vermoulue, seffondra sous son poids ! Vert de rage, il sexclama « Peste soit dÉclaibes et de son meuble » et il fit fortifier Maubeuge au lieu dÉclaibes.","habitants":"Charles de Croy,\"","divers":"Eclaibes grav-1-2-3                              GPS : 50° 12' 15\" Nord, 3° 55' 57\" Est","gps":"50° 12' 15\" Nord, 3° 55' 57\" Est","images":["../image/image_59/59_Eclaibes_1.jpg","../image/image_59/59_Eclaibes_2.jpg","../image/image_59/59_Eclaibes_3.jpg"]},"Consult_chateau_formulaireabc4":{"id":"Consult_chateau_formulaireabc4","dept":"59","canton":"Aulnoye-Aymeries","commune":"Ecuélin","nom":"Ecuélin","type":"Château","periode":"XVII-XVIII","histoire":"ECUELIN,  en 1750, le seigneur de Dourlers autorise la construction du château d'Ecuélin à l'emplacement de l'ancien château seigneurial. La propriété a alors été acquise par la famille de Préseau, qui reste propriétaire tout au long du XIXe siècle. Madame Clément-Hémery, qui visite la commune en 1829, précise que le château n'a que 50 ans d'âge, faisant remonter son achèvement aux années 1779, ce qui s'accorde avec le style du logis. Le château, en particulier les communs, ont été profondément remaniés entre 1812 et 1860, dates des deux cadastres existant sur la commune. En effet, un corps de bâtiment au sud, situé face au logis, a disparu entre ces deux dates. Les bâtiments des communs ont alors été reconstruits et harmonisés dans un souci de symétrie. Après 1860, peu de changements ont été apportés : seul un petit bâtiment à usage de buanderie et de logement d'ouvrier agricole a été construit à l'ouest du logis. Entre 1966 et 1968, à la suite d'un héritage, la propriété a été partagée en deux. Cette division a entraîné la séparation du logis en deux, un mur de cloisonnement étant construit à tous les niveaux du logis. Dans les années 1850 a été aménagé dans un salon du rez-de-chaussée un décor néo-renaissance composé de cuirs entourés de guirlandes.\nSur le plan de 1812, le château adopte un plan à cour fermée. Le logis, situé au nord, est prolongé par une aile en retour à l'ouest. Sur le même alignement que ce retour, se trouve, du côté ouest, un bâtiment de peu de profondeur. En face se situe un bâtiment qui fait toute la longueur du côté Est et se prolonge en retour par un autre bâtiment qui ferme la cour du côté sud. Un étang se trouve, comme aujourd'hui, au sud du château. Sur le plan de 1860, le château se présente pratiquement tel que nous le connaissons aujourd'hui. La partie sud du château a été détruite.","architecture":"ECUELIN, Les communs à l'ouest et à l'est ont été reconstruits et rehaussés avec une volonté d'homogénéiser les constructions pour créer une apparente symétrie.  Après 1860, deux pigeonniers ont été construits dans le prolongement des communs, au nord, avec l'usage de la brique pour le soubassement, les chaînes d'angle et les encadrements des ouvertures, tout comme un petit bâtiment en rez-de-chaussée à usage de buanderie et de logement agricole. Celui situé à l'ouest a été arasé. Un même emploi des matériaux se retrouve dans une maison du centre du village , sans doute conçue par le même architecte. Dès 1812, le château possède deux accès, un au nord menant au village d'Ecuélin, et un plus permettant un accès majestueux au château, par la route de Dourlers.\nUtilisant la déclivité du terrain, le château est construit du côté de la cour sur un haut soubassement dans lequel sont aménagés les accès à de vastes caves. Un escalier monumental permettait l'accès au rez-de-chaussée. Du lierre couvrait alors le mur de soutènement, laissant seulement apparaître les portes d'accès aux caves. Lors de la séparation du château en deux propriétés ont été aménagés en 1968 deux escaliers d'accès à chacune des parties du logis. Sur le nord, le château s'ouvre sur un jardin clos, de plein pied avec le rez-de-chaussée. Le logis comporte un étage carré avec neuf travées en façade. L'ouverture de la travée centrale, surmontant la porte principale, a été remaniée. Une autre porte permet d'accéder à la partie ouest du logis. La séparation en deux propriétaires entre 1966 et 1968 a entraîné un cloisonnement intérieur qui existe à tous les niveaux du bâtiment. Ainsi le salon situé dans la partie ouest, au rez-de-chaussée, ne communique-t-il plus avec l'escalier central.","habitants":"Famille de Préseau,\"","divers":"Ecuelin  grav -1-2-3","gps":"","images":["../image/image_59/59_Ecuelin_1.jpg","../image/image_59/59_Ecuelin_2.jpg","../image/image_59/59_Ecuelin_3.jpg"]},"Consult_chateau_formulaire19bc":{"id":"Consult_chateau_formulaire19bc","dept":"59","canton":"Fourmies","commune":"Eppe-Sauvage","nom":"Eppe_Sauvage","type":"Châteaux","periode":"XVII-XVIII","histoire":"quatre châteaux dans cet article Maillard, Vigneaux, Voyaux et Willies. MAILLARD, a été construit en 1774 pour le maître de forge Laurent Polschet, alors mayeur d'Eppe-Sauvage et de Sivry. L'accès au château est signalé par deux tourelles d'entrée. Il est organisé autour d'une cour, le logis étant situé à l'est, accolé au sud à un bâtiment comprenant l'étable, le fenil et une grange. A l'ouest a été bâtie une deuxième grange, face au logis. Celui-ci comporte un étage à six travées et deux étages de comble. Les ouvertures sont légèrement cintrées. La maçonnerie est en brique, le soubassement en pierre bleue, l'encadrement des baies en pierre bleue et en brique. La toiture est couverte en ardoise. L'édifice et ses dépendances témoignent des activités de forge dans la vallée de l'Helpe-Majeure au XVIIIe siècle. gîte rural                                                                                         VIGNEAUX  est un château bâti à Eppe-Sauvage   qui vient du patronyme du personnage ayant reconstruit sa demeure sur les fondations très anciennes dont l'origine est inconnue ,Ronald Hanon.","architecture":"VOYAUX, le château Voyaux a été construit au XVIe siècle pour les seigneurs d'Eppe-Sauvage, les Marchipont et racheté en 1540 par les Polschet, maîtres de forge, en liaison avec une forge située sur l'Helpe-Majeure transformée en ferme à la fin du XVIIIe siècle ou au début du XIXe siècle. Ainsi un Martin Poschet écuyer, seigneur de Veaux [c'est-à-dire de Voyaux] décède en 1614, âgé de 66 ans. En 1767, décède Messire Nicolas Philippe Poschet de Voyaux écuyer. Au XVIIIe siècle, les Polschet possèdent également la forge du Marteau aujourd'hui détruite et font bâtir le château Maillard. LAvesnois connaîtra le déclin de ses forges. Le rattachement du Hainaut à la France y contribuant. Le château changera de propriétaire plusieurs fois, puis le bâtiment sera occupé durant les deux guerres mondiales. Au début du XXe siècle, le domaine appartenait au comte Culhiat du Fresne avant d'abriter une colonie de vacances dite la Maison des Jeunes \"Les Sapins\", ouverte en 1930 par l'Institution Saint-Louis de Roubaix. Les bâtiments composant l'ensemble sont divisés entre différents propriétaires. Le château est composé d'un logis et des anciens ateliers de la forge transformés en ferme. Le logis englobe une tour datant du XVIe siècle située sur l'arrière. Le corps central ainsi qu'une tour à deux étages située en façade datent du XVIIIe siècle. Perpendiculairement est implantée l'ancienne forge reconvertie en ferme : elle comprend un logis, une première grange, plusieurs étables surmontées d'un fenil et deux granges construites en retour. Aujourd'hui, le château appartient à M. De Tournay.","habitants":"Maillard et Voyaux famille de Laurent Polschet\"","divers":"Trois châteaux dans cet article Maillard, Vigneaux, Voyaux et Willies.                                                                                                 Maillard grav-3               GPS : 50° 07' 13\" Nord, 4° 10' 45\" Es                                                    Vigneaux  grav 1-2             GPS : 50° 07' 13\" Nord, 4° 10' 45\" Est","gps":"50° 07' 13\" Nord, 4° 10' 45\" Es","images":["../image/image_59/59_Eppe_Sauvage_1.jpg","../image/image_59/59_Eppe_Sauvage_2.jpg","../image/image_59/59_Eppe_Sauvage_3.jpg"]},"Consult_chateau_formulairefc3e":{"id":"Consult_chateau_formulairefc3e","dept":"59","canton":"Le Cateau-Cambrésis","commune":"Esnes","nom":"Esnes","type":"château","periode":"XVI","histoire":"deux  châteaux dans cet article; Esnes et Sancourt.                                              ESNES  le château fut habité dès le Xe siècle par Alard d'Esnes, l'un des 12 pairs du Cambraisis (fief tenu par un évêque, et relevant de l'Empire Germanique). Plus tard, Eustache d'Esnes et ses fils partirent pour la première croisade. Le château fut cédé en 1603, par un descendant de Jeanne d'Esnes, à Jean de Beauffremez. Après la prise de Cambrai par Louis XIV en 1676, Adrien, fils de Jean de Beauffremez, puis Jean-Baptiste, son petit-fils, aménagèrent l'habitation principale. Quatre arcades, encore visibles de l'intérieur, en furent le point de départ,  on y encastra des fenêtres (ce qui explique leur position basse et les triangles sculptés qui les séparaient). On prolongea dans le même style, et on bâtit dessus un étage, ainsi qu'au fond de la cours, les communs, garnis d'oeils-de-boeuf et de pointes de diamants. Adrien Beauffremez eut une fille; Jeanne qui épousa le Marquis d'Assignies, arrière-petit-fils de Marguerite d'Esnes. Les d'Estutt d'Assay, leurs descendants, issus des Esnes et des Beauffremez, n'habitèrent pas la demeure, qui devient depuis le siècle dernier un château-ferme.  Éléments protégés MH : les façades et les toitures du pavillon d'entrée situé au nord avec ses deux tours rondes ; la tour de l'angle nord-est avec la tourelle d'escalier ; la façade ouest de l'aile Est et la toiture correspondante ; la façade sud depuis le portail sud jusqu'à la tourelle et les toitures : Les façades et les toitures des bâtiments du château (à l'exception des parties classées et du bâtiment bas reliant au nord le portail et l'aile Est) ; les façades et les toitures de la grange : inscription par arrêté du 20 octobre 1971.","architecture":"ESNES,  les seigneurs d'Esnes rendront pour la plupart hommage au comte de Hainaut et feront partie de cette armée dans les différentes campagnes contre le duché de Brabant, de Limbourg, de Flandre etc. Pourtant Jean Ier au début de la guerre de cent Ans renverra son hommage au Comte de Hainaut, allié aux Anglais, pour servir le roi de France. Il sera tué à la bataille de Poitiers en 1358. Plusieurs seigneurs d'Esnes seront baillis du Cambrésis et d'Amiens. Robert d'Esnes dit Mansart en 1411, homme du Duc d'Orléans, seigneur d'Esnes, de Grécourt, Wavrechin, Vire, Bétancourt et Beauvoir sera gouverneur du château de Coucy qu'il défendra pendant 3 mois, assiégé par le comte de Saint-Pol. Il se rendra après bien des combats faute de vivres.  Depuis la Révolution, il servait de bâtiment agricole. Il servit de prison allemande pour les soldats russes pendant la première guerre mondiale. Le château d'Esnes appartient toujours aux descendants de cette famille, les d'Estutt d'Assay, depuis 1 000 ans. Son propriétaire actuel est Mme et Mr Paternostre de la Mairieu.                                                                    SANCOURT, le château de Sancourt, construit au XVIIIe siècle, a été restauré et agrandi au XIXe siècle. Très endommagé, il est actuellement en cours de restauration. Un chemin conduit à la grille d'entrée, d'où l'on peut voir la cour bordée latéralement des communs reliés par des angles arrondis au corps de logis principal,  présente une façade en brique avec chaînages en pierre. Cette façade ornée au siècle dernier possède un porche, en avancée, soutenu par deux colonnes.","habitants":"Famille de   Adrien Beauffremez \"","divers":"deux  châteaux dans cet article; Esnes et Sancourt.                                                  PS : 50° 06' 5,04\" Nord, 03° 18' 46,08\" Est                                                   Sancourt 50° 12' 57? nord, 3° 11' 41? est","gps":"","images":["../image/image_59/59_Esnes_1.jpg","../image/image_59/59_Esnes_2.jpg","../image/image_59/59_Esnes_3.jpg"]},"Consult_chateau_formulaire50d8":{"id":"Consult_chateau_formulaire50d8","dept":"59","canton":"Wormhout","commune":"Esquelbecq","nom":"Esquelbecq","type":"Château","periode":"XVII","histoire":"ESQUELBECQ , c'est la famille de Ghistelle connue depuis le XIIIe siècle qui posséda d'abord la seigneurie d'Esquelbecq. Au XVe siècle, l'héritière, Jeanne, épousa Louis de Hallewyn, seigneur de Piennes. Les Pays-Bas étant ravagés par les guerres religieuses, les d'Hallewyn qui soutenaient le Roi de France furent contraints, en 1584, de vendre leur domaine à Valentin de Pardieu, seigneur de la Motte, mais peu après un obus le tua à Dourlers. Mort sans héritier, le château passa à son neveu Philippe le Vasseur, seigneur de Guernonval, qui fit pratiquement reconstruire le château. Madame de Béthisy  fut la dernière de la famille de Guernonval à le posséder. En 1818, elle le vendit pour assurer sa charge de dame d'honneur de la duchesse de Berry. En 1836, le château fut acquis par un négociant de Lille, M. Colombier. M. Bergerot, petit-fils de M. Colombier, n'ayant pas laissé d'héritier, le château changea à nouveau de propriétaire ; il fut acquis par M. Jean de Morael, ce sont ses descendants qui possèdent aujourd'hui la propriété.","architecture":"ESQUELBECQ , le château ne paraît guère avoir changé depuis 1644. On y accède par deux ponts, dont l'un conduit à un terre-plein vis-à-vis des dépendances, et l'autre permet de franchir les douves et d'atteindre la porte qui mène à la cour intérieure. Le château est de plan quadrangulaire; ses murs sont cantonnés de huit tours, dont quatre aux angles, deux au centre des longues courtines et deux flanquant cette porte d'entrée. Éléments protégés MH : le château, avec ses douves, son parc, son jardin et les dépendances bâties : classement par décret du 17 août 1987.","habitants":"Famille de Louis de Hallewyn\"","divers":"GPS : 50° 53' 07\" Nord, 2° 25' 48\" Est","gps":"50° 53' 07\" Nord, 2° 25' 48\" Est","images":["../image/image_59/59_Esquelbecq_1.jpg","../image/image_59/59_Esquelbecq_2.jpg","../image/image_59/59_Esquelbecq_3.jpg","../image/image_59/59_Esquelbecq_4.jpg","../image/image_59/59_Esquelbecq_5.jpg"]},"Consult_chateau_formulaireaa5a":{"id":"Consult_chateau_formulaireaa5a","dept":"59","canton":"Aulnoye-Aymeries","commune":"Eth","nom":"Eth","type":"Château","periode":"XVII-XVIII","histoire":"ETH , on ne sait rien de  l'histoire du château, si ce n'est qu'un de ses derniers possesseurs était le baron d'Estreux de Beaugrenier dont la famille semble l'avoir possédé au XIXe siècle. Mais la proximité de l'église et du château, et une partie des fossés de ce dernier qui subsistent permettent d'avancer qu'il existait déjà au Moyen-Âge. A cette époque, le seigneur d'Eth achèta la terre du village voisin Bry, village qui tombait alors sous la paroisse d'Eth. Dans des actes du XVe siècle-XVIe siècle, plusieurs membres de la famille de Sart portèrent le titre seigneur d'Eth. Il existait un ancien château fédoal, dont les pierres furent utilisés, dans la construction, en 1776, du château d'Eth actuel, le château d'Eth actuel est occupé par une famille belge, bien connue, du monde architectural.","architecture":"ETH, le château se présente comme un ensemble homogène datant du XVIIIe siècle, construction en brique et pierre. Côté cour, la façade s'étend sur dix travées cantonnées au sud par un pavillon, au nord par des dépendances dont un colombier sous lequel on passe pour gagner les communs. Côté jardin, on a porté plus de soin à la symétrie ; au centre de la façade, un pavillon fait saillie sur le nu du mur, tandis qu'à chaque extrémité deux autres sont soulignés par les tourelles en encorbellement qu'ils portent. L'élévation comporte deux niveaux, plus les combles dans lesquels sont percées des lucarnes. Les toitures ont fait l'objet d'une attention particulière, elles viennent d'être restaurées par le propriétaire actuel après un long abandon.","habitants":"Famille  baron d'Estreux de Beaugrenier\"","divers":"Eth GPS : 50° 19' 36\" Nord, 3° 40' 08\" Est","gps":"50° 19' 36\" Nord, 3° 40' 08\" Est","images":["../image/image_59/59_Eth_1.jpg","../image/image_59/59_Eth_2.jpg"]},"Consult_chateau_formulaire9c61":{"id":"Consult_chateau_formulaire9c61","dept":"59","canton":"Aulnoy-lez-Valenciennes","commune":"Famars","nom":"Famars","type":"Château","periode":"XV-XIX","histoire":"FAMARS,   le château de Famars s'élève sur un site habité de longue antiquité. Les seigneurs de Famars existaient au XII siècle avec le titre parfois mentionné de Châtelains, reste d'une ancienne juridiction. De l'époque médiévale, il ne subsiste qu'une porte du XVe siècle, englobée dans le mur d'enceinte, le château actuel a été reconstruit à à la fin du XIXe ou au début du XXe siècle. C'est une construction de style gothico-renaissant, à deux étages, cantonnée de tours à mâchicoulis et créneaux avec de hautes toitures à lucarnes. Les ouvertures à meneaux verticaux sont soulignées d'arcs trilobés reposant sur des chapiteaux; à la base du toit court une balustrade \"flamboyante\" interrompue de temps à autre par des fenêtres à gâbles décorés de crochets feuillus. Les statues d'un troubadour, d'une châtelaine, et l'abondance de décoration sculptée aux meneaux de certaines fenêtres font songer à l'uvre d'un René Hodé. Les communs, qui, par leur mélange de goût pastoral et art déco, achèvent de donner a cet ensemble un caractère tout à fait particulier. En 1918, lors du terrible bombardement doctobre, le château alors connu sous le nom de « château Paillez » sera dévasté une nouvelle fois et seul en subistera le soubassement. Cest sur ce même soubassement quen 1918, Henri Harpignies, sous la direction de l'architecte Maxime Audhoin, va commencer lédification du château actuel, le... troisième donc . En 05/10/2023.  Henri Harpignies (1872-1934) à ne pas confondre avec le célèbre peintre Henri Joseph Harpignies (1819-1916), après avoir fait fortune dans la confection, voulut sans doute porter témoignage de celle-ci aux yeux des générations futures. Hélas sa fortune nétait plus à la hauteur de ses prétentions et les travaux furent interrompus au début de laménagement intérieur.","architecture":"FAMARS, la construction du château de Famars date de 1918,  est de style Gothique-Renaissance. Laissé longtemps à labandon, il est, aujourdhui, lun des fleurons de la ville de Famars. Construit au IIIe siècle, il fut détruit puis reconstruit, plusieurs fois. Sa silhouette est connue des automobilistes venant de Maing et Quérénaing, en direction de Valenciennes. Laissé plusieurs décénies à labandon, le château de Famars aura vécu plusieurs vies. A la fin du IIIe siècle, les Lètes (une tribu germanique à la solde de lEmpire romain, postée aux frontières) construisirent leur ville, sur cet emplacement et érigé  un « castellum » pour défendre Famars. Détruit en 1340, il fallut attendre 1662, pour quun nouvel édifice vit le jour et, fut détruit, à nouveau, en 1918, durant les terribles bombardements. Sa reconstruction ne fut jamais vraiment achevée et le château de Famars fut transformé, en une Ferme. Cest en 1998 que la famille Macaluso, amoureuse des vieilles pierres, fait lacquisition du bâtiment. Depuis, elle semploie à lui rendre vie et lustre dantan, à limage de la toiture couverte dardoises naturelles et même découpées à lancienne pour la tour. Si les travaux se poursuivent toujours, ce manoir est néanmoins déjà redevenu un joli fleuron pour la commune et il impose dorénavant sa silhouette élégante à la vue des automobilistes venant de Maing et de Quérénaing.","habitants":"Famille de   René Hodé\"","divers":"GPS : 50° 18' 53,2\" Nord, 3° 31' 1,9\" Est","gps":"50° 18' 53,2\" Nord, 3° 31' 1,9\" Est","images":["../image/image_59/59_Famars_1.jpg","../image/image_59/59_Famars_2.jpg","../image/image_59/59_Famars_3.jpg","../image/image_59/59_Famars_4.jpg"]},"Consult_chateau_formulaire71b3":{"id":"Consult_chateau_formulaire71b3","dept":"59","canton":"Templeuve-en-Pévèle","commune":"Cobrieux","nom":"Fay_Cobrieux","type":"Château","periode":"XVIII","histoire":"Du FAY, le château du Fay est environné de bois d'aulnes et de hêtres. La seigneurie du Fay, qui apparaît en 1293, élevait de celle de Bouvignies et de la gouvernance de Douai. Elle appartient d'abord aux Landas, puis à Denis de Madre, prévôt de la ville de Cysoing, qui l'acquit en 1674. Par mariage, elle échut à la famille de la Grange. C'est au XVIIIe siècle que l'hostel assis en une motte enclose d'uvre et pont-levis, fut construit près de la cense. De nombreuses modifications et adjonctions, dont les tours et la chapelle, intervinrent dans le milieu du XIXe siècle.","architecture":"Du FAY, on accède au château par la façade nord, le perron est encadré de deux ailes ayant chacune leur entrée. La porte principale est entourée par deux fenêtres de chaque côté. La façade sud, regardant le bois du Fay, comprend neuf fenêtres au rez-de-chaussée ainsi qu'à l'étage unique. Chaque extrémité est flanquée d'une tour circulaire. La tour ouest dispose de deux fenêtres à chaque niveau et d'un petit contrefort. La tour Est, qui contient la chapelle, est percée de deux  fenêtres brisées au rez-de-chaussée et de deux fenêtres hautes à l'étage. Elles ont chacune une toiture conique et un châssis de toit. L'édifice est en brique revêtue d'un ciment blanc jaunâtre. Les toitures sont en ardoises. Trois portes, percées dans le soubassement du côté Est  de la tour, permettent d'accéder au sous-sol. L'intérieur dévoile un mobilier abondant du XIXe siècle et certaines pièces d'époque antérieure.","habitants":"famille de la Grange.\"","divers":"Fay_Cobrieux","gps":"","images":["../image/image_59/59_Fay_Cobrieux_1.jpg","../image/image_59/59_Fay_Cobrieux_2.jpg"]},"Consult_chateau_formulairec3b0":{"id":"Consult_chateau_formulairec3b0","dept":"59","canton":"Fourmies","commune":"Ferrière la Petite","nom":"Ferrière_Gossuin","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article ;  la Ferrière la Petite et Gossuin.                         FERRIERE la PETITE, un texte de 1502 parle d'une tour, et un autre de 1686, évoque des restes de tours et tourions dont il est encore question en 1725. La mairie occupe le château Gossuin du nom de celui qui, en 1838 en devint propriétaire ainsi que de la faïencerie. Eugène Gossuin décéda en 1863 et la faïencerie ferma en 1868. Elle avait été fondée en l'an VI par Charles de Bousies, dernier seigneur de Ferrière la Petite, et Louis Joseph Delannoy, propriétaire du château de Vengiles. L'association fut de courte durée car en octobre 1805, Delannoy resta seul propriétaire. Sa veuve la céda à ses deux fils en 1829 mais, en 1835, Frédéric Louis Joseph Delannoy en devint l'unique possesseur et ce jusqu'à la vente de 1838 à Gossuin. Si Charles de Bousies le fit construire, ce ne fut qu'après la Révolution, car le bâtiment est d'une telle sécheresse que l'on hésite à le dater du XVIIIe siècle. Le château est de plan rectangulaire formé de trois corps en U, les deux corps parallèles étant de peu de longueur. Le rez-de-chaussée et l'étage sont percés de trente baies au nord, propriété de la commune, hôtel de ville.","architecture":"GOSSUIN date du XVIIIe siècle. L'ancien château de Ferrière-la-Petite appartenait autrefois à la famille de Bousies. Les parties conservées de cet édifice servent aujourd'hui à l'usage de fabrique de faïence. Ce village existait en 1336, puisqu'il se trouve mentionné dans l'acte de donation de diverses terres, par Jean de Hainaut à Jeanne, sa fille, qui l'apporta, en dot à Louis de Châtillon, seigneur d'Avesnes. Cet acte est cité dans l'article de Ferrière la Grande. Il forma, dès lors, une seigneurie particulière relevant des comtes de Hainaut et passa du ressort de la prévôté de Beaumont dans celui de celle de Maubeuge. La seigneurie, au XVe siècle, appartenait à la maison de Berghes. Les seigneurs de la Vigne, puis ceux de Bousies la possédèrent ensuite. L'actuel château, indiqué comme étant du XVIIIe siècle, paraît être la \"jolie maison de campagne\", encore qu'il ne mérite guère le qualificatif de joli, plutôt que le \"vieux château\". Si Charles de Bousies le fit construire, ce ne fut qu'après la Révolution, car l'édifice est d'une telle sécheresse que l'on hésite à le faire remonter au XVIIIe siècle ne fût-ce qu'en ses dernières années. Le château est de plan rectangulaire formé de trois corps en U, les 2 corps parallèles étant de peu de longueur. Le rez-de-chaussée et l'étage sont percés de 30 baies au Nord. Le château de Gossuin accueille dans ses murs la Mairie.","habitants":"Famille de  Eugène Gossuin\"","divers":"Gossuin GPS : 50° 14' 26\" Nord, 4° 01' 23\" Est","gps":"50° 14' 26\" Nord, 4° 01' 23\" Est","images":["../image/image_59/59_Ferri%c3%a8re_Gossuin_1.jpg","../image/image_59/59_Ferri%c3%a8re_Gossuin_2.jpg"]},"Consult_chateau_formulaire7c86":{"id":"Consult_chateau_formulaire7c86","dept":"59","canton":"Villeneuve-d","commune":"Villeneuve-d","nom":"Flers_Villeneuve_Ascq","type":"château","periode":"XVII","histoire":"FLERS, en 1589  la famille de Heynin par alliance devienne propriétaire, construction vers 1661 par Bonne Françoise de Heynin dames de Watignies, au moment de son mariage en 1667  avec  les De Kessel, plusieurs menbres de cette famille vont se succèder jusqu'en 1747. Philippe André de Baudequin, seigneur de Sainghin, reçoit de son cousin, De Kessel, la seigneurie et le château de Flers. En 1770, Marie-Claire-Josephe de Baudequin épouse le comte Ladislas de Diesbach, originaire de Suisse. A la mort de son épouse en 1791, il en hérite et devient ainsi le dernier seigneur de Flers. Pendant la Révolution, les deux tantes du comte qui habitent le château émigrent et celui-ci est confié à la garde du jardinier. Il ne sera pas confisqué mais sera dévasté avant d'être converti en ferme. En 1937, Paul Delesalle-Dewas achète le château à la famille De Diesbach.","architecture":"FLERS, le château-Rouge de Flers est constitué d'un long et étroit corps de bâtiment pourvu de deux ailes faisant retour; il n'en subsiste qu'une. Il a été édifié en brique et pierre; celle-ci a été réservée aux chaînages d'angle, aux archivoltes des arcades ouvrant sur la cour et aux encadrements des baies. Le corps
