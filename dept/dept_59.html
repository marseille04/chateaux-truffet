âteau et organise les visites lors des journées européennes du Patrimoine est héberge depuis dans ses murs l'IAAG : l'Institut Aéronautique Amaury de la Grange.","habitants":"famille de Montmorency.                                      La Motte, Famille de  Mathilde de Portugal,\"","divers":"A Morbecque  la Motte au bois grav 1    GPS : 50° 40' 58,2\" Nord, 2° 34' 13,2\" Est                       GPS : 50° 11 30' Nord, 3° 14' 37\" Est                                                                    liessis gray-4","gps":"50° 40' 58,2\" Nord, 2° 34' 13,2\" Est                       G","images":["../image/image_59/59_Morbecque_1.jpg","../image/image_59/59_Morbecque_2.jpg"]},"Consult_chateau_formulaire57ef":{"id":"Consult_chateau_formulaire57ef","dept":"59","canton":"Fourmies","commune":"Liessies","nom":"Motte_au_Bois","type":"Château","periode":"XVII","histoire":"La MOTTE, l'origine du château fut d'abord une maison de plaisance il devait être fortifié  en 1065 par Robert le Frison beau-frère  de Guillaume le Conquérant parmi ses successifs occupants on trouve St-Thomas de Canter bury,  en 1185 Philippe d'Alsace, comte des Flandres en 1251 Béatrix de Brabant, en 1312 Robert de Cassel, en 1350 Yollande de Cassel comtesse de Bar, en 1380 Yolande de Flandre qui fonda  à la Motte au Bois la chapelle dédié à St-Denis, puis Isabelle  de Portugal , duchesse de Bourgogne.  L'édifice avait été presque entièrement démoli sous les ordres de Turenne. Deux ans plus tard la paix des Pyrénées le rendait aux espagnols et en 1660 il était reconstruit tel qu'on le voit aujourd'hui, dépourvu de système défensif. Mis en vente en 1795 est acquis par Taffin de Douai, passa par mariage à M. Ernest de la grange et demeura dans la descendance jusqu'en 1962 , date à laquelle il fut vendu devient l'instititut aéronautique de  Amaury de la Grange.","architecture":"La MOTTE, c'est devenu un Hôtel-Restaurant de charme , dans un cadre des plus agréable. Ancienne ferme de la proche abbaye de Liessies. Les moines en auraient fait leur infirmerie au XVIIIe siècle. C'est en 1725 qu'il faudrait placer la construction mais un linteau de pierre bleue porte la date 1755. Tous les bâtiments sont en brique pour le plein des murs, et pierre bleue et marbre du pays pour les encadrements de baies, chaînages, bandeaux et corniches. Depuis l'étang son plan paraît simple: en U avec tour carrée montant au centre de la barre horizontale de ce U. Les deux bâtiments formant les côtés parallèles sont percés d'une porte charretière par laquelle on pénètre dans la cour ouverte vers l'étang. La porte de l'habitation est au rez-de-chaussée de la tour à deux étages, elle est coiffée d'une pittoresque toiture en trois volumes distincts : les quatre pans retroussés, en cavets renversés, avec lucarnes, se prolongent par un campanile rectangulaire vertical, clos, lui même surmonté d'un pavillon retroussé. Les eaux de l'étang de la forge étaient utilisées pour actionner des machines. Au pied de la digue, dominée par un pigeonnier avec une toiture à peine plus simple que celle de la tour du château. Quelques vieux bâtiments sont caractéristiques des constructions de ce pays.","habitants":"Famille de Taffin de Douai\"","divers":"La motte GPS : 50° 07' 07\" Nord, 4° 04' 58' Est","gps":"50° 07' 07\" Nord, 4° 04' 58' Est","images":["../image/image_59/59_Motte_au_Bois_1.jpg","../image/image_59/59_Motte_au_Bois_2.jpg","../image/image_59/59_Motte_au_Bois_3.jpg"]},"Consult_chateau_formulaire7a97":{"id":"Consult_chateau_formulaire7a97","dept":"59","canton":"Bailleul","commune":"Nieppe","nom":"Nieppe","type":"Château","periode":"XVIII","histoire":"NIEPPE, fut reconstruit au nord-ouest d'Armentières après la 1ère guerre mondiale, devient la médiathèque de la ville et un lieu d'exposition, face au Parc Public. Selon la légende, on raconte qu'un trésor aurait été enterré dans le parc du château, au pied d'un arbre.  Lhistoire du château démarre le 15 mars 1610 avec la vente de la seigneurie de Nieppe au chanoine de la cathédrale dYpres Philippe de Vicq. Celui-ci fit lacquisition dun vaste terrain, y fit construire des douves et entama la construction  dune maison de plaisance de style gothique flamand aux pignons caractéristiques à pas de moineaux surmontée dune svelte tourelle. Un décret du roi dEspagne réunit le château et ses dépendances, granges, écuries, fermes au fief de Nieppe. Pour les fondations, les épaisses murailles de grés étaient enduites dun mortier imperméable, efficacité garantie, les cuisines étaient exemptes dhumidité et létanchéité est toujours la même quatre siècle plus tard. Le premier siècle de lhistoire du château sera mouvementé en subissant des réquisitions et pillages à plusieurs reprises de 1635 à 1708. La seigneurie fut rachetée en 1742 à Joseph Louis Zannequin, descendant de la famille de Vicq, par Marie Le Blan, veuve Ghesquière. La famille Ghesquière quittera précipitamment le château en 1792, lors de la Révolution. Celui-ci servira de caserne pour les soldats républicains puis pour les armées étrangères comme magasin à fourrage et prison. Ce passage de troupes causera dimmenses dégâts. Paulin Ghesquière de Stradin, dernier seigneur de Nieppe, et sa famille revinrent dexil en 1799. Beauvarlet, architecte lillois, estimant la réparation aussi couteuse que la construction dun nouveau manoir, le château fut abattu pour être reconstruit sur ses anciennes fondations. Achevée en 1802, les douves comblées en façade, « la Maison blanche » devient un manoir de style italien meublé en style Empire. Les nouveaux propriétaires seront Constant Watelet de Messange et son épouse Adélaïde Ghesquière de Stradin, fille de Paulin.","architecture":"NIEPPE, à la fin du Premier Empire, la propriété allait souffrir avec son occupation le 14 mars 1815 par une compagnie écossaise de gardes du Roy de 500 hommes et 600 chevaux nourris par les habitants et pendant les 100 jours par les Cosaques puis les Saxons.  Les Watelet de Messange ont pris une part active dans la vie de Nieppe et du château avec deux maires, Constant et Edmond. La propriété fut transmise au Vicomte Amédée.  Le Boucq de Ternas, épouse de Laure Watelet de Messange puis à leur fille Marie-Thérèse, épouse du chevalier de la Chapelle. Le château subira les effets néfastes de la grande guerre en étant occupé par les allemands en 1914 puis par les soldats du Commonwealth, des belges, des portugais revenant aux allemands en 1918. Le château a également été honoré de la visite du prince de Galles, puis du roi George V. La grande salle servit de tribunal militaire : une sentinelle anglaise y fut condamnée à mort pour abandon de poste et exécutée dans le parc.  Les traces de l'occupation allemande sont encore visible sur la façade. Ayant subi les bombardements, Le château fut reconstruit en 1920 toujours sur les fondations de 1610. Les derniers propriétaires furent les barons de Blocquel de Croix de Wismes jusquen 1966. Il fut également occupé par les allemands lors de la seconde guerre mondiale, ceux-ci ayant laissé leurs traces sur la façade en y gravant les symboles de la WafenSS, encore visible actuellement.  Le château et son parc sont devenus la propriété de la ville de Nieppe en 1974. Depuis 1988, il est ouvert au public à loccasion dexpositions. Depuis 2000, il  accueille le musée à létage.","habitants":"Famille de Philippe de Vicq.\"","divers":"Nièppe  GPS : 50° 42' 20,05\" Nord, 2° 50' 19,72\" Est","gps":"50° 42' 20,05\" Nord, 2° 50' 19,72\" Est","images":["../image/image_59/59_Nieppe_1.jpg","../image/image_59/59_Nieppe_2.jpg","../image/image_59/59_Nieppe_3.jpg"]},"Consult_chateau_formulairea8b1":{"id":"Consult_chateau_formulairea8b1","dept":"59","canton":"Aulnoye-Aymeries","commune":"Obies","nom":"Obies","type":"Château","periode":"XVII","histoire":"OBIES, le nom d'Obies est mentionné pour la première fois en 1065. Un château existait dès 1303. Des transformations sont réalisées dans les années 1770. En 1900, le bien est vendu et la réfection de la toiture intervient à cette époque. Durant la première moitié du XXe siècle, le château fut successivement transformé en casernement, en colonie de vacances et en \"estaminet\". Les renseignements historiques lacunaires rendent difficile l'élaboration d'un descriptif précis du bâti. Seules quelques dates inscrites dans la maçonnerie et une analyse architecturale permettent d'établir certains repères. Ainsi, une maison forte semble avoir été édifiée à une date inconnue (vestiges sur le côté est de la façade sud). La porte basse en plein cintre, au centre de la façade sud, paraît remonter au XVIIe siècle. La maison forte se mue en maison de campagne  dans le dernier tiers du XVIIIe siècle où de grandes baies sont percées sur les deux façades et les tours. La véranda sur la façade nord est à situer après 1900.","architecture":"OBIES,  château composé d'un corps de logis principal flanqué de deux tours carrées. Le corps central s'élève sur deux niveaux. Les fers d'ancrage datés de  1774 à 75 ont été apposés sur la partie gauche de l'élévation antérieure, au second niveau. La corniche conserve des modillons de bois. Cette élévation a été flanquée d'une véranda. La croupe brisée a été rénovée en 1905, date inscrite en ardoises dans la couverture. L'élévation postérieure, moins remaniée, conserve le soubassement en grès et une porte en plein cintre encadrée de pierre bleue qui semble plus ancienne que le reste de l'élévation en brique. Les deux tours comportent trois niveaux, également construits en brique. Un portail, formé par deux piliers en pierre bleue et une grille est relié à deux autres piliers par un muret qui ferme la propriété.","habitants":"Seigneur local\"","divers":"GPS : 50° 16' 4,97\" Nord,3° 47' 16,38\" Est","gps":"50° 16' 4,97\" Nord,3° 47' 16,38\" Est","images":["../image/image_59/59_Obies_1.jpg"]},"Consult_chateau_formulaire451f":{"id":"Consult_chateau_formulaire451f","dept":"59","canton":"Orchies","commune":"Orchies","nom":"Orchies_59","type":"Château","periode":"XVII","histoire":"ORCHIES  Marguerite de Flandre reçoit en apanage Orchies et sa châtellenie au moment où sa sur Jeanne  devient comtesse de Flandre. Elle fixe alors sa résidence à Orchies en 1232. Elle fonde en 1234 labbaye de lHonneur de Notre-Dame aux portes de la ville. Après la bataille de Mons-en-Pévèle qui oppose, en   1304, les troupes du comte de Flandre aux troupes du roi de France Philippe le Bel, des chevaliers français sont inhumés dans le chur de léglise. Pour avoir aidé le roi lors de cette bataille, Orchies obtient   le droit davoir un beffroi.   Aujourd'hui hôtel de ville, construit à lorigine au début du XVII e siècle, avec un élégant beffroi de style baroque et un perron à double révolution, il est dynamité en septembre  1914, suite à lincendie qui a détruit la quasi- totalité de la ville. Il est reconstruit après la guerre dans le style Renaissance flamande et inauguré en 1927 par le président de la République. À nouveau endommagé en 1940 par des tirs dobus allemands, il est restauré en partie en 1947  puis inauguré en mai 1964 après le réaménagement de lintérieur.   En 1891  charteau Melkior Robert Delcroix, propriétaire à Phalempin dune sucrerie et dune grande ferme, fait construire ce château.  Cette habitation, dans le style Louis XIII,en brique et pierre, est surmontée de  hautes toitures dont les combles aigus se terminaient à lorigine par quatre épis sur laile droite et dun lanternon à gauche. M. Delcroix y décède en mai 1914.","architecture":"ORCHIES, en 1480, Jacques III de Olhain fait construire  un nouveau château au cur du village. Au cours du XVIe siècle, le comte de Nédonchel le  fait fortifier. Au XVIII e siècle il est entièrement   entouré de profonds fossés et on y accède  par des portes monumentales protégées par  des pont-levis. À la Révolution, les Nédonchel  ayant émigré, le château est vendu comme Bien\nNational. En 1793, la basse-cour et le château, bâtis depuis seulement 11 ans, sont démolis et les matériaux sont transportés à Douai pour  être vendus.  Il ne reste aujourdhui quune partie du mur denceinte, lentrée principale « la porte de Douai » avec la date de réfection gravée sur la clé de voûte (1783), un pigeonnier carré en brique sur soubassement en grès et un bâtiment de\ncommuns du XVIIe siècle. Construit à lorigine au début du XVIIe siècle, avec  un élégant beffroi de style baroque et un perron à double révolution.","habitants":"Marguerite de Flandre\"","divers":"Melkior _Orchies","gps":"","images":["../image/image_59/59_Orchies_59_1.jpg","../image/image_59/59_Orchies_59_2.jpg","../image/image_59/59_Orchies_59_3.jpg"]},"Consult_chateau_formulaireb535-2":{"id":"Consult_chateau_formulaireb535-2","dept":"59","canton":"Wormhout","commune":"Zeggers-Cappel","nom":"Orval","type":"Château","periode":"XVI","histoire":"ORVAL, le manoir d'Orval à Zegers Cappel (ancienne justice de paix) est construit en 1611.  Edifié en brique jaune, il arbore un haut pignon à pas de moineau caractéristique de l'architecture flamande. Il est également surmonté d'une tourelle octoganale. ce manoir porte sur l'un de ses pignons la date de 1611. Il comprend deux parties dont les toitures sont d'inégale hauteur; les pignons présentent des pas-de-moineaux. Côté cour, dans le moins élevé des deux bâtiments, à l'endroit où il s'accole à l'autre, s'engage à peu près totalement une tourelle octogonale.  Propriété de M. Gérard Fournier.","architecture":"ORVAL,  du côté de la route, le bâtiment le plus bas, il est aussi le plus long, se divise en six travées : ses fenêtres sont logées dans des panneaux en creux qui correspondent aux deux niveaux de l'élévation: ces niches s'arrondissent à leur sommet en anse de panier. On reconnaît là la persistance d'une parti de l'architecture gothique en brique de la Flandre maritime. L'autre partie du corps de logis est plus étroite, la travée présente la même caractéristique mais les fenêtres sont plus larges. Du côté de la cour, les dispositions sont beaucoup plus simples; au bâtiment le plus élevé s'accole une construction à usage de service, le mur de l'autre corps de logis est percé d'une fenêtre à l'étage et de deux portes au rez-de-chaussée dont l'une donne accès à la tourelle: celle-ci présente des fenêtres une face sur deux.","habitants":"M. Gérard Fournier\"","divers":"Château d'Orval grv-2","gps":"","images":["../image/image_59/59_Orval_1.jpg","../image/image_59/59_Orval_2.jpg"]},"Consult_chateau_formulaire65a5":{"id":"Consult_chateau_formulaire65a5","dept":"59","canton":"Tourcoing","commune":"Halluin","nom":"Pellegrin_Halluin","type":"Châteaux","periode":"XVII","histoire":"PELLEGRIN, était un fief tenu de la seigneurie des Wattines à Linselles; en 1456, il appartenait à Pierre de Rocques, plus tard, il passa à Martin du Bosquel, sa fille épousa Baudouin de la Chapelle. A la fin du XVIe siècle, par alliance, il revint à la famille de Hautport; en 1768, il fut vendu à Adrien-François de Ghent.","architecture":"PELLEGRIN; caché par les arbres, l'édifice comprend deux bâtiments disposés en equerre, le plus petit le seul qui soit ancien, même s'il a été très restauré, fait saillie par rapport à l'autre aile; dans l'angle rentrant ainsi formé, se loge une tourelle quadrangulaire à cinq étages. La demeure présente deux nlveaux; elle a été réalisée au XVIIe siècle en pierre et brique; la première forme les harpes alternées des angles, les encadrements, également harpés, des percements, le cintre et le larmier de ceux-ci qui, de même que leur appui, se prolongent pour former des cordons continus. Les deux façades ont deux travées mais celle qui est tournée vers le logis, au rez-de-chaussée, intercale entre les fenêtres une porte basse dont l'arc surbaissé est surmonté de trois assises de pierres saillantes.","habitants":"famille de Hautport\"","divers":"GPS : 50° 47' 01\" Nord, 3° 07' 32\" Est","gps":"50° 47' 01\" Nord, 3° 07' 32\" Est","images":["../image/image_59/59_Pellegrin_Halluin_1.jpg"]},"Consult_chateau_formulaire9f28-2":{"id":"Consult_chateau_formulaire9f28-2","dept":"59","canton":"Lambersart","commune":"Lompret","nom":"Phalecque","type":"Châteaux","periode":"XV-XVIII","histoire":"deux châteaux dans cet artcle; Phalecque et Vllers.                                  PHALECQUE,  le fief de La Phalecque a été vendu en 1606 par les du Mortier et Van Grave à Nicolas Imbert anobli deux ans plus tard. Mais il semble que ce soit seulement au siècle suivant que fut édifié le château que nous connaissons. Au XIXe siècle la famille d'Hespel, dont les armes figurent au-dessus de l'entrée principale, acquit la propriété et doubla le volume du bâtiment. C'est depuis 1954 une maison de repos des Allocations familiales de Lille. Jadis entouré d'eau, maintenant niché dans un bouquet d'arbres, le château est précédé d'une drève plantée de tilleuls et présente au visiteur une longue façade sur deux étages dont l'architecture rappelle irrésistiblement celle des maisons Lilloises d'après 1700. La brique apparaît seulement en trumeau et en frise, en haut ponctuée, en bas alternant avec des motifs sculptés à décors variés. La façade arrière, datant du XIXe siècle, reprend la même opposition brique et pierre, dans des proportions légèrement différentes. Deux pignons triangulaires placés à chaque extrémité encadrent un fronton courbe, sculpté et percé d'un oculus. L'édifice a une profondeur anormalement importante parce qu'on a doublé la superficie du bâtiment vers le jardin. Des lucarnes, placées en arrière des façades, témoignent encore de l'ancien état des choses. A l'intérieur du bâtiment, on n'a conservé qu'un seul dessus de cheminée datant de la fin du XVIIIe siècle, foyer de réinsertion. Propriété de la caisse familiale de Lille.","architecture":"VILLERS est un château bâti à Lompret, Il ne reste aujourd'hui que des ruines de l'ancien château de Villers. Le château de Villers a été l'ancienne propriété de la comtesse de Bucquoy.                                   Le château de La Phalecque est aujourdhui, le dernier château toujours debout","habitants":"Famille d'Hespel et  la Comtesse de Bucquoy.à Villers\"","divers":"deux château dans cet artcle; Phalecque grav 1 et Villers                      Villers GPS : 50° 40' 10\" Nord, 2° 59' 24\" Est                                                          Lompret-grav-2","gps":"50° 40' 10\" Nord, 2° 59' 24\" Est","images":["../image/image_59/59_Phalecque_1.jpg","../image/image_59/59_Phalecque_2.jpg"]},"Consult_chateau_formulaireec12":{"id":"Consult_chateau_formulaireec12","dept":"59","canton":"Fourmie","commune":"Pont de Sains","nom":"Pont_de_Sains","type":"Château","periode":"XVI-XVII","histoire":"deux châteaux dans cet article; , et Pont de Sains  et tourelles \".                                                                                                            PONT DE SAINS, sur ce panorama du Pont-de-Sains en 1881, entre les deux tourelles à poivrières, sous le porche de lentrée, on peut lire la date de 1808. Derrière, les communs rehaussés en 1828 sont situés sur le territoire de Féron. Le château de Charles Talleyrand-Périgord fut démoli vers 1905. Après son décès en 1838, sa nièce la duchesse de Dino hérite du domaine, et le transmet à sa fille, devenue par mariage la marquise de Castellane. En 1925, Gaston Dubois-Waast, brasseur à Denain, achète la propriété. En 1941, Marcelle de Peretti, son épouse, est la dernière propriétaire privée.","architecture":"PONT de SAINS,   depuis 1975, la maison des Enfants de Trélon réalise dénormes travaux pour un Centre dAide par le Travail, connu sous le nom de la Ferme du Pont-de-Sains . Au 1er plan la maison du maître de forge et ses deux tours. a été construit par le Prince Charles-Maurice de Talleyrand-Périgord (1754 - 1838 ). Il était la reproduction exacte du petit temple édifié par l'impératrice Joséphine dans son domaine . Le château construit par du Puis en 1747, racheté par Talleyrand en 1801, rehaussé vers 1828 et démoli vers 1900.","habitants":"Charles Talleyrand-Périgord \"","divers":"Trois châteaux dans cet article; Tourelles, Fourmies et Pont de Sains.                                                    Sagne-Robert grav 1-2                                                 Fourmie-GPS : 50° 01' 05\" Nord, 4° 03' 14\" Est                                                  Féron grav-3-5                                                                                                                                    Tourelles grav- 4 GPS : 50° 05' 67,09 Nord, 4° 07' 69,88\"Est","gps":"50° 01' 05\" Nord, 4° 03' 14\" Est","images":["../image/image_59/59_Pont_de_Sains_1.jpg","../image/image_59/59_Pont_de_Sains_2.jpg","../image/image_59/59_Pont_de_Sains_3.jpg","../image/image_59/59_Pont_de_Sains_4.jpg","../image/image_59/59_Pont_de_Sains_5.jpg"]},"Consult_chateau_formulairebbe7-2":{"id":"Consult_chateau_formulairebbe7-2","dept":"59","canton":"Avesnes-sur-Helpe","commune":"Potelle","nom":"Potelle","type":"forteresse","periode":"XIV","histoire":"POTELLE  en 1433 Philippe le Bon duc de Bourgogne s'empare du Hainaut,   Gilles de Mortagne qui porte le nom de Potelle depuis le XIIIe siècle, et agrandit au XIVe siècle par Willes ou Guillaume Ier  de Potelles qui en 1326 sous le commanbement du comte de Hainaut Guillaume Ier à l'expédition outre manche pour renverser le roi  Edouard III à l'instigation de sa prope épouse  Isabelle de France et de l'amant de cette dernière Roger de Mortimer. Après  l'exècution de Gilles de Mortagne arrière petit-fils de Guillaume, le château est confisqué, attribué au duc de bourgogne, Antoine de Croÿ qui le revend en 1436 à la soeur du suppliciè Jeanne de Potelle épouse de Beaudouin de Hennin, passa ensuite aux Poitiers avant de faire retour aux Mortagne et vers 1490, les Mortagne cèdent le château, entre-temps incendiè par les troupes de Louis XI. Le château passe en 1490 à la famille de Carondelet,  En 1477 à Jean de Carondelet et remis en état chancelier de Flandre et de Bourgogne archevêque de Palerme et Primat de Sicile, ce dernier fait construire la galerie à arcades.le cdomaine resta dans cette famille jusqu'au XIXe siècle, et en fit don à sa nièce, épouse depuis 1813 de jean-Philippe Fremin de Sartel, garde du corps du roi Louis  XVIII; Portel appartient au baron Fiemin de Sartel .","architecture":"POTELLE,   construit  en 1290 par Gilles de Potelles   et remis en état au XVIe siècle, le château a conservé son architecture militaire médiévale (de larges douves, galerie. Situé dans le fond plat et humide de la vallée de la Rhônelle, le château est entouré de douves toujours en eau, alimentées par deux ruisseaux. Fait de grès taillé et de plan polygonal, le château comporte plusieurs tours d'importances diverses. Le châtelet d'entrée date du XIIIe et XIVe siècle et est construit en grès. Adossé au châtelet d'entrée, une loge repose sur un élégant portique à trois arcades ouvert sur la cour intérieure. Les armes de Ferry de Carondelet et de Catherine d'Esnes, son épouse, couronnées de cimiers sont sculptés sur deux chapiteaux, la date de 1541 qui les accompagne est surement celle de la construction et suit de près le mariage des deux propriétaires en 1538. Peu avant 1700, les bâtiments, la galerie et les tours fermant la cour côté est, disparaissent, on ignore si cette mesure a été adoptée pour enlever à l'édifice sa capacité défensive ou si elle répond au désir du propriétaire de vivre plus agréablement.\nÉléments protégés MH : le château et sa chapelle située en dehors des douves : inscription par arrêté du 19 janvier 1944.","habitants":"Famille de  Hainaut Guillaume Ier \"","divers":"","gps":"","images":["../image/image_59/59_Potelle_1.jpg","../image/image_59/59_Potelle_2.jpg","../image/image_59/59_Potelle_3.jpg","../image/image_59/59_Potelle_4.jpg"]},"Consult_chateau_formulairefdd7":{"id":"Consult_chateau_formulairefdd7","dept":"59","canton":"Avesnes-sur-Helpe","commune":"Quesnoy","nom":"Quesnoy_59","type":"Forteresse","periode":"XII","histoire":"Citadelle du QUESNOY, elle a gardée intact ses remparts caractéristiques qui montrent l'évolution de l'art de la défense du XVIIe siècle, (l'époque dite espagnole) au début du XXe siècle, en passant par le célèbre Vauban qui en modifia l'aspect. La ville est située sur un plateau encerclé par les vallées naissantes de l'Écaillon et de la Rhonelle. Près de la porte principale de la ville, en 1933, fut découvert des poteries romaines. Sous les Mérovingiens et les Carolingiens, on ne trouve aucune trace dagglomération importante dans la région quercitaine. Toutefois, lhistorien Jacques de Guise, prétend quà cette époque aurait été fondée la cité par un preux chevalier nommé Aymond, qui aurait vécu vers lan 800 : « Ce Aymond était comte de Faumars et des Ardennes, aussi par sa fidélité quil tenait au roi chassa tous ses quatre fils et ils se tiennent dans les boi, là où ils firent faire une forteresse et un lieu nommé Carcetus, cest le Quesnoy. Cependant, de cette assertion, lhistorien de Valenciennes dOultreman dira quil peut sagir dun personnage du nom de Aymon, gouverneur du Ponthieu , quil sagirait plutôt du nom dun régisseur du comte de Hainaut : en effet, au VIIIe siècle, des portions de territoires situés autour de la ville actuelle appartenaient à les Leudes,. Au IXe siècle, la région fut occupée par les Vikings qui sy établirent : remontant les fleuves, vers lan 842 à lépoque du roi Charles le Chauve, ceux-ci furent bloqués à Valenciennes, car les cours deau devenaient trop étroits pour leurs bateaux. Plus tard, le territoire du Quesnoy devint un alleu appartenant à la masse épiscopale de Cambrai et répondant au nom de Noflus, latinisé au Moyen Âge en Novem fluctibus. Enfin, en 1148, cet alleu aurait été vendu par lévêque Nicolas de Chièvres, au comte Baudouin IV de Hainaut.depuis 1148, géré par la famille de Hainaut,  jusqu'en 1356, au décès de sa mère Marguerite, Guillaume III devint comte de Hainaut.","architecture":"Citadelle du QUESNOY, au retour dun voyage en Angleterre en 1358,a bonne entente entre le jeune comte Guillaume IV dOstrevant et les bourgeois du Quesnoy se traduisait par la construction rapide de jolies tours rondes entourant la ville du Quesnoy  qui seront partiellement détruites, au XVIe siècle lors de la construction de la nouvelle enceinte. En 1417, Jacqueline de Bavière, née au château du Quesnoy en 1401, succéda au titre de comtesse de Hainaut, à la suite du décès de son père Guillaume IV. Elle fut surnommée « la femme aux quatre maris .  Au XVe siècle, la ville du Quesnoy était le lieu de villégiature privilégié des ducs de Bourgogne .  Le 5 juin 1467, le comte de Charolois, Charles, qui devait sappeler plus tard le Téméraire, succéda à son père, à la tête du duché de Bourgogne et des Pays-Bas bourguignons : En 1477, Charles le Téméraire périt à la bataille de Nancy. Aussitôt, le roi de France Louis XI pénétra en Hainaut bourguignon avec 7 000 hommes darmes et une puissante artillerie. Au décès de son épouse, Marie de Bourgogne, en 1482, Maximilien dAutriche laissa à son fils Philippe dAutriche dit le Beau, encore enfant, lhéritage de sa mère Charles Quint (Maison Habsbourg), né en 1500 à Gand, éduqué et conseillé par le précepteur Hennuyer Guillaume de Croÿ seigneur de Chièvres en qui il donna sa pleine confiance, Après labdication en 1555, de libre volonté, de Charles Quint, son fils Philippe II d'Espagne, succéda à une partie de ses États :Philippe III d'Espagne, succéda à la tête des États de son père en 1598  à la fin de la Fronde (1654), la ville est prise par larmée royale française de Turenne.","habitants":"Famille de Hainaut\"","divers":"50° 14' 59? nord, 3° 38' 18? est\nQuesnoy_hôtel de ville_grav-3","gps":"","images":["../image/image_59/59_Quesnoy_59_1.jpg","../image/image_59/59_Quesnoy_59_2.jpg","../image/image_59/59_Quesnoy_59_3.jpg","../image/image_59/59_Quesnoy_59_4.jpg","../image/image_59/59_Quesnoy_59_5.jpg","../image/image_59/59_Quesnoy_59_6.jpg","../image/image_59/59_Quesnoy_59_7.jpg"]},"Consult_chateau_formulaire0599":{"id":"Consult_chateau_formulaire0599","dept":"59","canton":"Saint-Amand-les-Eaux","commune":"Raismes","nom":"Raismes","type":"Château","periode":"XVII","histoire":"RAISMES, en 1076, la comtesse Richilde attacha l'office Héréditaire de grand veneur de Hainaut à l'ancienne seigneurie noble d'Ostrevant. Une maison fortifiée datant du XIe siècle existait alors. En 1160 Bauduin l'Edifleur fit construire une tour à côté de ce château pour faire obstacle aux incursions des Flamands en Hainaut et contenir les larrons de la forêt de Vicogne. Assiégée par les troupes françaises en juin 1656, elle fut détruite au début du XVIIIe siècle. La seigneurie passa entre les mains de diverses famines parmi lesquelles figurent René d'Anjou et le chancelier Rollin; en 1673, elle revint à la famille Cernay. Celle-ci, dès la fin du XVIIIe siècle, entreprit de moderniser le vieux château; les jardins furent aménagés au XIXe siècle par François Marie le Danois, marquis de Cernay, qui fit reconstruire l'église paroissiale en 1752; à gauche du chur une tribune seigneuriale, où il fut inhumé, avait été aménagée. Vendu en 1795, l'édifice fut détruit.","architecture":"RAISMES, en 1829, à peu de distance du précédent, un nouveau château fut construit par la famille d'Arenberg dont il porte le nom. C'est un bâtiment simple, réalisé en brique et pierre; son élévation est à deux niveaux; deux bandeaux verticaux et un fronton triangulaire simulent un pavillon central. Il subsiste dans le parc du château Mabille de Poncheville un certain nombre d'éléments architecturaux qu'on attribue, mais sans preuves, à l'ancien château, en particulier, un portique monumental.  Éléments protégés MH : le motif architectural du XVIIIe siècle dit Rendez-vous de chasse, et la statue en marbre de l'Espérance dans le parc du château : inscription par arrêté du 31 mai 1946.","habitants":"Famille Cernay.\"","divers":"Château de Raismes","gps":"","images":["../image/image_59/59_Raismes_1.jpg","../image/image_59/59_Raismes_2.jpg","../image/image_59/59_Raismes_3.jpg","../image/image_59/59_Raismes_4.jpg"]},"Consult_chateau_formulaire9c26":{"id":"Consult_chateau_formulaire9c26","dept":"59","canton":"Aulnoye-Aymeries","commune":"Saint-Waast-la-Vallée","nom":"Rametz","type":"Châteaux","periode":"XVIII","histoire":"deux châteaux dans cet article ; Rametz et Gauthier.                                       RAMETZ,  au XVe siècle la seigneurie est aux mains des  Proisy. Jean d'yve seigneur de  Rametz remanie  le château qui a été bâti au XVIIIe siècle sur les fondations d'un château du XIVe siècle;  construit par le Ganten   seigneur de Rametz, en briques rose orangé ponctuées de pierres calcaires sur un soubassement en grès, en 1791 passa  aux Guignard, de plan rectangulaire de la forteresse cantonnée de tours cylindriques et entourée de douves. A l'intérieur, certaines salles dans les tours ont gardé leurs voûtes, leurs meurtrières et leur escalier dérobé. La salle des gardes a été rhabillée dans la deuxième moitié du XIXe siècle; la salle à manger est décorée de peintures de J. Léonard réalisées en 1848; le bureau possède des boiseries du début du XIXe siècle, la cuisine est voûtée en berceau de briques.  le domaine  vient par héritage aux Pas.  Éléments protégés MH : les façades et les toitures du château avec ses quatre tours, la cour, les douves avec leur pont, le portail d'entrée : classement par arrêté du 2 mars 1979. La salle des Gardes et la salle à manger près de la tour nord-est avec leur décor; la cheminée du grand salon et de la petite salle à manger : inscription par arrêté du 2 mars 197907/10/2023","architecture":"Château GAUTHIER, cet édifice est à l'origine le couvent des Récollets datant du XVIIe siècle. Il fut après la Révolution vendu à l'Etat puis transformé par un riche bourgeois dénommé Gauthier. Marquant l'entrée dans la ville par le sud, il s'appuie sur le rempart  est paré de deux tours crénelées.","habitants":"Famille de Guignard\"","divers":"GPS : 50° 17' 54,51\" Nord, 3° 46' 26,33\" Est                                                  Gauthier_6_7","gps":"50° 17' 54,51\" Nord, 3° 46' 26,33\" Est","images":["../image/image_59/59_Rametz_1.jpg","../image/image_59/59_Rametz_2.jpg","../image/image_59/59_Rametz_3.jpg","../image/image_59/59_Rametz_4.jpg","../image/image_59/59_Rametz_5.jpg","../image/image_59/59_Rametz_6.jpg","../image/image_59/59_Rametz_7.jpg"]},"Consult_chateau_formulaire975b":{"id":"Consult_chateau_formulaire975b","dept":"59","canton":"Hazebrouck","commune":"Renescure","nom":"Renescure","type":"Châteaux","periode":"XII-XV","histoire":"Deux châteaux dans cet article, de Philippe de Commynes et Zuthove.           De PHILIPPE DE COMMYNES, c'était une fière forteresse au XIIe siècle cernée de douves dont les murailles avaient plus dun mètre dépaisseur. Brûlé par les troupes du duc de Gloucester en 1436, le château fut reconstruit à la fin XVe siècle et devient possession de la famille de Brosse, agrandi au XVIIe siècle par la faille de Montmorency, puis transformé par les Tavernes au XVIIIe siècle, qui le revendent en 1786 à Edouard Désiré Lefebvre de Halle. Le château fut en partie reconstruit sous la Restauration, incendié en 1944 et récemment restauré. La Mairie a été installée dans les murs du château\nÉléments protégés MH : les parties subsistantes du château y compris la courtine : inscription par arrêté du 23 avril 1981.","architecture":"ZUTHOVE  sur la porte d'entrée, on peut lire la date de 1472; la destruction de toutes les sources d'information pendant la Révolution oblige à se référer aux renseignements oraux. Le château faisait partie de la seigneurie de Zuthove. Au début du XVIe siècle, il appartenait à Philippe de Coorhuuse et on l'appelait alors le petit château. Au XIXe siècle, il a été restauré avec goût. Pour pénétrer dans le château, il faut franchir un pont de bois qui enjambe les douves qui ceinturent entièrement le château; ce pont est situé latéralement vers l'arrière. Le plan d'ensemble de la demeure dessine un carré, dont trois des angles sont flanqués d'une tour ronde. Vers l'arrière, un rentrant a été marqué, il est comblé par une autre tour; un bâtiment annexe, de plan rectangulaire, est accolé à la façade latérale qui regarde vers le pont d'accès en bois. L'uvre a été réalisée en brique et les encadrements des baies sont en pierre blanche. Son architecture est simple et ordonnée; le souci de la défense n'a pas été la préoccupation qui a guidé le constructeur les trois élégantes tours d'angle se terminent par des poivrières. Ce château, de type féodal par son plan, la présence de douves, sa situation près de l'église, annonce en même temps celui de l'époque moderne : il a été dépourvu de pont-levis, et ses façades sont largement percées. Éléments protégés MH : les façades et les toitures ainsi que les douves et les dépendances : inscription par arrêté du 4 novembre 1946. Propriété de M. Olivier de Witte.","habitants":"Edouard Désiré Lefebvre de Halle Zuthove; Philippe de Coorhuuse \"","divers":"Renescure grav-1-2                                                            GPS : 50° 43' 42,99\" Nord, 2° 21' 58,22\" Est                                                         Zuthove-grav-3-4                                                            ; GPS : 50° 43' 37\" Nord, 2° 22' 17\" Est","gps":"50° 43' 42,99\" Nord, 2° 21' 58,22\" Est","images":["../image/image_59/59_Renescure_1.jpg","../image/image_59/59_Renescure_2.jpg","../image/image_59/59_Renescure_3.jpg","../image/image_59/59_Renescure_4.jpg"]},"Consult_chateau_formulaire26d1":{"id":"Consult_chateau_formulaire26d1","dept":"59","canton":"Lille","commune":"Wambrechies","nom":"Robersart","type":"Châteaux","periode":"XVII-XIX","histoire":"ROBERSART   au XIIe ou XIIIe siècle, une famille portant le nom du lieu vivait à Wambrechies; par mariage, la seigneurie est passée aux Leurenghien qui la conservèrent jusqu'à la fin du XIVe siècle; on la trouve ensuite entre les mains des familles de la Tannerie et de Croix; au XVIIe siècle, elle fut vendue aux Faulconnier. Un château féodal a donc dû exister à Wambrechles, mais on en ignore tout. En 1775, par héritage, il revint à la famille Robert. Simon-Joseph Robert, comte de Robersart, ne parvint pas, en 1810, à vendre son château qui comprend de vastes salons, douze pièces au rez-de-chaussée et vingt neuf chambres. La comtesse Juliette de Robersart, nièce du Vicomte Obert de Quévy, hérite du domaine et devient la dernière châtelaine de Wambrechies. Délaissé, le château se dégrade : lavancée de style Renaissance finit même par seffondrer en 1900, année de la mort de Juliette. Le notaire Valois, ami et exécuteur testamentaire de la comtesse, finit par léguer officiellement la demeure à la paroisse de Wambrechies en 1926 la fille Alexandrine épousa le vicomte Obert de Quiévy; celui-ci procéda à des remaniements importants. L'union fonçière de  Wambrechies en est propriétaire.","architecture":"ROBERSART,  le château est constitué d'un long corps de logis simple en profondeur que prolongent vers l'arrière deux ailes en retour d'équerre. Les parties les plus anciennes de l'édifice actuel ne remontent pas au-delà du XVIIe siècle ; un acte de location de 1682 précise qu'il comprenait alors une maison, un pigeonnier, des dépendances et un jardin. L'uvre paraît assez homogène, elle a été bâtie en brique et pierre, celle-ci étant réservée aux chaînages des angles, aux encadrements harpés des baies. Le château est le produit d'un remaniement opéré au XIXe siècle et il est aujourd'hui bien malaisé d'y discerner ce qui appartient à l'uvre originelle.  Musée des jouets anciens,  en 1810,  vend  son château qui comprend de vastes salons, douze pièces au rez-de-chaussée et vingt neuf chambres.","habitants":"Famille Robert. Simon-Joseph Robert\"","divers":"GPS : 50° 41' 11\" Nord, 3° 03' 18\" Est","gps":"50° 41' 11\" Nord, 3° 03' 18\" Est","images":["../image/image_59/59_Robersart_1.jpg","../image/image_59/59_Robersart_2.jpg"]},"Consult_chateau_formulaire8690":{"id":"Consult_chateau_formulaire8690","dept":"59","canton":"Caudry","commune":"Romeries","nom":"Romeries","type":"Château","periode":"XV","histoire":"ROMERIES  le château de Romeries a été construit au Moyen Age, entre le XIIIe siècle et le XVe siècle, sur l'emplacement d'une ancienne motte féodale du Xe et XIe siècles. A la fin du XVIe siècle (miniatures de Cröy), il a l'allure d'un imposant château fort. Reconstruit au XVIIe siècle (partie gauche actuelle), il fut en partie détruit au courant du XVIIIe siècle. Il faudra attendre en 1784, pour que le château de Romeries soit recontruit, en une demeure dagrément, pour la famille valenciennoise des comtes d'Espiennes.","architecture":"ROMERIES, le château actuel se situe face à l'église de Romeries. Il date donc des XVIIe et XVIIIe siècles, sur des fondations qui remontent du XIVe siècle. Le château de Romeries a conservé de son passé, ses souterains, ses remparts, ses meurtrières, mais aussi ses remarquables décorations classiques de pierre calcaire et  de briques.","habitants":"famille valenciennoise des Comtes d'Espiennes.\"","divers":"Château de Roméries, GPS : 50° 12' 12\" Nord, 3° 31' 55\" Est","gps":"50° 12' 12\" Nord, 3° 31' 55\" Est","images":["../image/image_59/59_Romeries_1.jpg","../image/image_59/59_Romeries_2.jpg","../image/image_59/59_Romeries_3.jpg"]},"Consult_chateau_formulaireb962":{"id":"Consult_chateau_formulaireb962","dept":"59","canton":"Orchies","commune":"Roost_Warendin","nom":"Roost_Warendin","type":"Château","periode":"XVIII","histoire":"dans cet article deux châteaux Bernicourt et  Raimbeaucourt.                                 BERNICOURT, construit au début du XVIIIe siècle sous cette forme sur un domaine de 25 hectares, le château de Bernicourt fut antérieurement un manoir avec basse cour (vers 1374). Jusquau début du XXe siècle, ce fut une demeure seigneuriale. Il fut la propriété des Houillères de 1930 à 1985, les cadres et employés y furent logés. Depuis 1985, il appartient à la commune de Roost-Warendin.                                                                                 Restauré par la volonté de la ville, il retrouve, année après année, ses fastes dantan. Ouvert en 1989 au public, ce château, vidé de son mobilier dépoque, accueille aujourdhui un écomusée au 1er étage et à la cave. La terrasse du château souvre sur un parc agrémenté dun plan deau, de bosquets et de vastes pelouses, en 1989, ce château,  le grenier, les caves et les pièces qui le composent reprennent vie, ainsi que les dépendances: étables, écuries, pavillon de chasse et chapelle.   Éléments protégés MH : les façades et les toitures des pavillons placés en avant du château ; le portail avec sa grille ; les façades et les toitures de la ferme ; les quatre portails d'accès avec leurs grilles ; la grille clôturant la ferme côté sud : inscription par arrêté du 30 juin 1987.","architecture":"RAIMBEAUCOURT  à cinq K.M.au nord, ce château, construit au XVIIIe siècle, a remplacé un manoir féodal ; il a été réalisé en brique, la pierre étant réservée aux chaînages d'angle et aux cordons horizontaux qui séparent les niveaux des deux pavillons; ceux-ci dominent d'un étage le corps principal de logis et une haute toiture pyramidale, elle-même couronnée par une petite flèche les coiffe. Toutes les ouvertures du château sont rectangulaires elles sont au nombre de sept pour chacun des deux niveaux du corps de bâtiment principal; de larges surfaces nues encadrent celles des deux pavillons percées à raison d'une par niveau. Les combles sont éclairés par trois lucarnes, la toiture principale est mansardée.                                                                                                    Gîte dans une aile du XVIIIe siècle entièrement rénovée.","habitants":"La ville de Roost-              Warendin\"","divers":"Deux châteaux dans cet article ; Bernicourt grav -1-2-3-4 et Raimbeaucourt   grav-5-67     GPS : 50° 25' 22\" Nord, 3° 06' 12\" Est","gps":"50° 25' 22\" Nord, 3° 06' 12\" Est","images":["../image/image_59/59_Roost_Warendin_1.jpg","../image/image_59/59_Roost_Warendin_2.jpg","../image/image_59/59_Roost_Warendin_3.jpg","../image/image_59/59_Roost_Warendin_4.jpg","../image/image_59/59_Roost_Warendin_5.jpg","../image/image_59/59_Roost_Warendin_6.jpg","../image/image_59/59_Roost_Warendin_7.jpg"]},"Consult_chateau_formulaireeaec":{"id":"Consult_chateau_formulaireeaec","dept":"59","canton":"Aniche","commune":"Roucourt","nom":"Roucourt_59","type":"Châteaux","periode":"XVIII","histoire":"ROUCOURT,  le parc de cette demeure est fermé par une belle grille surmontée d'une couronne de baron. Le château, bâti au XVIIIe siècle par monsieur Béranger, fondeur de canon sous lEmpire, a été incendié en 1914. Il a été reconstruit au lendemain des hostilités  par Colette et Guy Becquet de Mégille, les actuels propriétaires.","architecture":"ROUCOURT, c'était une demeure très caractéristique du XVIIIe siècle, un petit pavillon polygonal animait le centre de la composition ; sa travée médiane était délimitée par deux pilastres à chapiteaux à guirlandes traités en ordre colossal ; entre eux s'ouvraient une porte et une fenêtre précédées par un balcon en fer forgé, l'une et l'autre tracées en plein cintre. De part et d'autre de cet axe, le logis était éclairé par deux séries de trois fenêtres rectangulaires; des pilastres, eux aussi traités en ordre colossal, marquaient les extrémités de la façade. De belles lucarnes éclairaient les combles mansardés toutes étaient encadrées de volutes et avaient leur partie supérieure arrondie. De la porte centrale, un escalier en pierre permettait de gagner de beaux jardins. Le château actuel a été reconstruit entre 1921 et 1923, et restauré en 1997.","habitants":"Monsieur Béranger\"","divers":"château de Roucourt;                                 GPS : 50° 19' 39\" Nord, 3° 08' 41\" Est","gps":"50° 19' 39\" Nord, 3° 08' 41\" Est","images":["../image/image_59/59_Roucourt_59_1.jpg","../image/image_59/59_Roucourt_59_2.jpg"]},"Consult_chateau_formulairedcc4":{"id":"Consult_chateau_formulairedcc4","dept":"59","canton":"Avesnes-sur-Helpe","commune":"Ruesnes","nom":"Ruesnes","type":"Château","periode":"XVIII","histoire":"Deux châteaux dans cet article ;  Ruesmes et Beron.                                          RUESMES, les bâtiments ,remontent au XVIIe siècle, ce sont de simples constructions à un seul niveau suivant les habitudes de l'architecture rurale de la région. Ils précèdent la demeure seigneuriale qui fut bâtie au XVIIIe siècle, trois ailes (dont l'une a été refaite au XXe siècle divergent à partir d'un salon central en ovale ; outre les combles, chacune de ces ailes comporte deux niveaux percés d'ouvertures au cintre surbaissé. Les matériaux utilisés sont ceux qui étaient les plus usuels à cette époque, la brique pour les murs, le grès pour le soubassement et la pierre pour les encadrements des ouvertures. Il ne faudrait que peu de chose pour faire revivre le site encore décrit au siècle dernier comme un \"lieu de délices\".                                                                   Le château proprement dit fut rebâti vers 1760 et comporte trois corps de logis organisés autour dun pavillon central ovale abritant un salon dhonneur. Ce qui surprend cest la hauteur des combles, proches du style Louis XIII. La partie du XVIIIe est identifiable a ses fenêtres à arcs surbaisses.Le maréchal de Berwick y logea avec ses troupes en 1709 alors que la propriété appartenait aux Capy. Apres 1760, Charles-Louis Capy et son frère Louis Augustin en héritèrent. Tous deux le cédèrent en 1787 à Pierre Joseph Boursier, en poste à Valenciennes comme juge consul. Le château fut alors propriété des Boursier jusquen 1852 ( Amédée Hamoir avait épousé Désirée Boursier fille de Pierre), des Camaret jusquen 1909, des Richard en 1910. Il pourrait sagir dEmile Richard qui exerçait le métier de relieur à Valenciennes.En partie brûlé durant la Première Guerre mondiale, il est cédé en 1922 à Georges Lambert de Beaulieu qui renonce à le restaurer et le cède en 1925 à Camille Vaille qui le transforme en bâtiment agricole.Le parc du château comporte encore des colonnes qui portaient jadis des statues. II comprend également une pièce deau dans un jardin à langlaise","architecture":"A 10  K.M.au sud ouest à Capelle le château  BERON, C'est un monument remarquable. Le château du Béron doit son nom à Jean-Baptiste du Béron  (1680-1734) Marié avec Bonne de Haynin, qui lachète en 1719 et le fit rebâtir. Dans sa forme actuelle, il date de 1845. Il sert aujourd'hui aux différents centres de loisirs. En 1793, une attaque nocturne menée par les Autrichiens contre le bataillon de Saône-et-Loire échoue après un combat sanglant.  Cette villa comprend 6 chambres, et 6 salles de bains pourvues d'une douche. Vous pourrez profiter du jardin ou partir en randonnée dans les environs. Vous séjournerez à 17 km de Lille et à 30 km de Valenciennes. Moyennant des frais supplémentaires, l'établissement assure un service de navette aéroport, le plus proche étant celui de Lille, situé à 9 km. Situé à Cappelle-en-Pévèle, le château du Béron dispose d'un salon commun et d'une terrasse.","habitants":"Jean-Baptiste du Béron\"","divers":"Deux châteaux dans cet article ;Ruesmes et Beron.                               Beron GPS : 50° 30' 39\" Nord, 3° 10' 24\" Est","gps":"50° 30' 39\" Nord, 3° 10' 24\" Est","images":["../image/image_59/59_Ruesmes_1.jpg","../image/image_59/59_Ruesmes_2.jpg"]},"Consult_chateau_formulairec355":{"id":"Consult_chateau_formulairec355","dept":"59","canton":"Fourmie","commune":"Sains du nord","nom":"Sains_du_Nord","type":"Châteaux","periode":"XVII-XIX","histoire":"SAINS du NORD. A l'instar d'autres communes de l'Avesnois, Sains du Nord possède un riche passé industriel avec de nombreuses maisons bourgeoises mais aussi des châteaux patronaux du XIXe siècle.  Du début du XXe siècle nous montre ici le château que Paul Mariage fit construire à proximité de son usine. Ce luxueux édifice présente un mélange de styles très en vogue à cette époque. On y retrouve une abondance d'ornements  qui évoquent à la fois le Moyen-âge et la Renaissance. Le style néo-gothique Anglais est également présent avec notamment des bow-windows surmontés d'un balcon.  il  demeure en bon état et continue à porter témoignage du riche passé industriel de la ville. Seule la lanterne  qui culminait sur la toiture a disparu.  Le château Paul Robert n'en demeure pas moins élègant et imposant par ses dimensions.Le château aujourd'hui semble lui aussi bien entretenu à l'exception des grilles et du portail d'entrée très détorioré                         Impressionnant, mais sans doute plus austère que les autres, voici  le château Pecquériaux dans le premier quart du XXe siècle. Il est voisin du château Mariage dans la rue de la Gare devenue rue Jean-Baptiste Lebas.          Voici un autre superbe château patronal, propriété de Charles Fosset au début du XXe siècle. Outre ces châteaux, on dénombre de nombreuses maisons bourgeoises.:                                                                                                       LA MARLIERE est devenu un Hôtel-Restaurant de charme","architecture":"Dans la même zone Glangeon; les tourelles à Fourmie                                                                                                                        TOURELLES,   a été construit par le Prince Charles-Maurice de Talleyrand-Périgord (1754 - 1838 ). Il était la reproduction exacte du petit temple édifié par l'impératrice Joséphine dans son domaine de la Malmaison.  du château du début du XXe siècle est sans doute une des plus anciennes. Elle nous montre les propriétaires de l'époque, certainement très fiers de poser devant un tel édifice agrémenté d'un bassin avec jet d'eau. Au contraire de l'aristocratie, qui vit en retrait de l'espace public, la bourgeoisie affiche en façade les signes de sa réussite et de son enrichissement. Dans notre région, ce fut surtout le cas des puissantes familles d'industriels textiles qui accumulèrent  des fortunes gigantesques qui permirent de construire ce qu'on appelle aujourd'hui \"Les châteaux de l'Industrie\". Le temple possédait quatre colonnes en marbre rouge de Rance. Ces colonnes commandées par les architectes de Louis XIV étaient à l'origine destinées au château de Versailles. Elles seront démontées et vendues en 1926 par Boni de Castelane dernier propriétaire du lieu et partiront pour les Etats-Unis. Elles seront remplacées par des piliers en briques. Il fut restauré en 1987, les colonnes de briques étant remplacées par des colonnes de pierres reconstituées semblables à celles d'origine. Son inauguration a eu lieu le 19 septembre 1987.  Bel édifice qui me paraît bien dégagé de ses arbres et qui aujourd'hui masquent la beauté du château ! Cependant il vaut mieux a l'heure actuelle le mettre a l'abri des regards critiques ! Par contre je crois avoir entendu dire qu'il est voué a d'autres activités plus ou moins câline, mais dommage qu'il ait perdu de sa notoriété.","habitants":"Famille de Paul Mariage\"","divers":"Fourmie-Malière.GPS : 50° 01' 05\" Nord, 4° 03' 14\" Est        Robert;féron grav_4    pécquériaux-6-7   Sains grav-8;   Marliere     grav-9  ; Feron grav 3-6                                                                                                                                                         Tourelles grav  4-5  GPS : 50° 05' 67,09 Nord, 4° 07' 69,88\"Est","gps":"50° 01' 05\" Nord, 4° 03' 14\" Est        Robert;féron grav_4","images":["../image/image_59/59_Sains_du_Nord_1.jpg","../image/image_59/59_Sains_du_Nord_2.jpg","../image/image_59/59_Sains_du_Nord_3.jpg","../image/image_59/59_Sains_du_Nord_4.jpg","../image/image_59/59_Sains_du_Nord_5.jpg","../image/image_59/59_Sains_du_Nord_6.jpg","../image/image_59/59_Sains_du_Nord_7.jpg","../image/image_59/59_Sains_du_Nord_8.jpg","../image/image_59/59_Sains_du_Nord_9.jpg"]},"Consult_chateau_formulaire516f":{"id":"Consult_chateau_formulaire516f","dept":"59","canton":"","commune":"Solre le château","nom":"Solre_le_Château","type":"Château","periode":"XIV","histoire":"SOLRE Solre-le-Château se situe dans le sud-est du département du Nord (Hainaut) en plein cur du parc naturel régional de l'Avesnois.  Il est connu pour ses prairies, son bocage et son relief un peu vallonné dans sa partie sud-est (début des contreforts des Ardennes), dite « petite Suisse du Nord ».En fait, Solre-le-Château fait partie administrativement de l'Avesnois, historiquement du Hainaut et ses paysages rappellent la Thiérache. En 1415 : Jacques de Berlaymont (Berlaimont), seigneur de Solre, combat et trouve la mort à la bataille d'Azincourt.  Le 3 novembre 1592, la seigneurie de Solre-le-Château en Hainaut est élevée au rang de comté par le roi Philippe II.  En 1678, le comté de Solre est érigé en principauté par Charles III, roi d'Espagne, en faveur de Philippe Emmanuel Ferdinand de Croÿ, (maison de Croÿ), comte de Solre et Buren. En 1793, durant la Révolution, le château est démoli.  Le 4 floréal an II (23 avril 1794), la ville est pillée par les Autrichiens, qui vont  détruirent une bonne partie des archives. Plans du cadastre napoléonien (1828) et de 1902 de Solre-le-Château : site internet des Archives départementales du Nord :  Le 29 août 1885, la ligne de chemin de fer Maubeuge - Fourmies est inaugurée. Le tracé passe par Rousies, Ferrière-la-Grande, Ferrière-la-Petite, Sars-Poteries, Solre-le-Château disparition des châteaux à la Révolution, Liessies, Trélon. transformé   en restaurant \" villa Mairianni\".","architecture":"SOLRE le chateau; situé sur l'actuelle Grand-Place, il ne subsiste aucune trace visible du château de Solre-le-Château. La forteresse fut prise et brûlée une première fois en 1473 par le comte de Saint-Pol (Louis de Luxembourg), au service du roi de France, Louis XI. En 1560, elle retrouve toute sa splendeur et passe aux mains d'une des familles les plus illustres de Solre, les Croÿ. Le château est pris d'assaut par Turenne en 1637 et, en 1651, il est pillé par les troupes du général Rose, un aventurier au service de la France. En 1656, Turenne s'en empare de nouveau, avant d'aller assiéger Valenciennes. Les Croÿ demeurent seigneurs, puis deviennent princes de Solre après que leur seigneurie fut érigée en principauté par Charles II, roi d'Espagne, en 1677 Mais la ville est rattachée à la France par le traité de Nimègue, en 1678. En 1793, au plus fort de la Révolution, le château tombe sous la pioche des démolisseurs.","habitants":"Famille Mariani\"","divers":"Solre  50° 10' 31? nord, 4° 05' 33? es","gps":"","images":["../image/image_59/59_Solre_le_Ch%c3%a2teau_1.jpg","../image/image_59/59_Solre_le_Ch%c3%a2teau_2.jpg"]},"Consult_chateau_formulaired610-2":{"id":"Consult_chateau_formulaired610-2","dept":"59","canton":"Valenciennes","commune":"St-Amant les eaux","nom":"St_Amant","type":"Abbaye-Château","periode":"XVII","histoire":"ABBAYE; c'était une abbaye bénédictine en activité, de 639 à 1790. Elle fut dès le IXe siècle un centre culturel important, avec une bibliothèque et un scriptorium de production de manuscrits, tels que la seconde bible de Charles-le-Chauve. C'est une des plus anciennes abbayes de France. Elle fut plusieurs fois réduite en cendres, au point que les annalistes ont découpé son histoire selon les grandes périodes séparant chaque incendie. Son Fondateur fut Amand de Maastricht. Elle fut fondée entre 633 et 639 et fermée en 1790. L'abbaye, outre un travail de défrichage et d'aménagement des environs, devient un foyer d'études majeur de la renaissance carolingienne. Milon de Saint-Amand, auteur d'une Vie de Saint-Amand, y fut actif.  Le roi Charles le Chauve y  fit enterrer ses 2 enfants, Pépin et Dreux, peut-être jumeaux, morts en bas-âge, nés de son second mariage, avec Richilde d'Ardennes. Dans l'abbaye fut peint dans le 3ème quart du IXe siècle, le célèbre manuscrit \"Évangiles\" dit de François II dans lequel on peut voir une Crucifixion où le crucifié est un jeune homme imberbe à la tête inclinée vers la droite, les yeux ouverts et à l'air paisible. Anéantie par les Normands à la fin du IXe siècle.","architecture":"L'ABBAYE, est entièrement rebâtie au XVIIe siècle, par l'abbé Nicolas du Bois (1621-1673), selon un plan grandiose et admiré. Elle fut incendiée 5 fois : en 883, en 1066, 1340, 1424 et 1477. En 1672, Dom Mabillon y découvre à la fin dun manuscrit du poète chrétien Grégoire de Naziance un texte du Xe siècle en langue germanique, le Ludwigslied, qui commémore la victoire de l'armée franque de Louis III sur les Normands le 3 août 881 à Saucourt-en-Vimeu. Ce texte est aujourd'hui considéré comme lun des plus anciens témoignages écrits de la langue germanique. A la Révolution, l'abbaye fut déclarée bien national et détruite, entre 1797 et 1820. Au début du XXIe siècle, seuls subsistent et se visitent l'Echevinage et la Tour de l'église. Cette dernière accueille dans ses murs, le Musée Municipal ouvert au Public. \nTERMES, est un chateau bâti à Saint-Armand-les-Eaux. Il date du XIXe siècle. Vous y trouverez des chambres d'hôtes, petit déjeuner inclus. Une literie confortable. Bon accueil. Chambres d'hôtes.","habitants":"Milon de Saint-Amand\"","divers":"Abbaye et ch$teau des Termes à St- Amand     grav _1_2                                 Termes grav-3-4_5                                               GPS : 50° 26' 55\" Nord, 3° 25' 41\" Est                                                                             50° 26' 56? nord, 3° 25' 43? est","gps":"50° 26' 55\" Nord, 3° 25' 41\" Est","images":["../image/image_59/59_St_Amant_1.jpg","../image/image_59/59_St_Amant_2.jpg","../image/image_59/59_St_Amant_3.jpg","../image/image_59/59_St_Amant_4.jpg","../image/image_59/59_St_Amant_5.jpg"]},"Consult_chateau_formulaired794":{"id":"Consult_chateau_formulaired794","dept":"59","canton":"Coudekerque-Branche","commune":"Steenbourg","nom":"Steenbourg","type":"Château","periode":"XVI","histoire":"STEENBOURG, un château féodal a existé à Steene au moyen-âge. La première mention des seigneurs du lieu remonte à 1317. En 1362, ce château était habité par la famille dOye. A la fin du XVIème siècle (1571) cette demeure nobiliaire a pris son allure actuelle grâce au travaux dirigés par le seigneur de Rape. Ce personnage appartenait à une famille très riche et très considérée de la châtellerie de Bergues.  Par le mariage, en 1627, de la fille de Vigor de Rape, seigneur de Steenbourg, avec Jean Le Vaillant, seigneur dHangest en Arneke, le château passa aux mains des Le Vaillant qui le conservèrent jusquen 1679. A cette date, la seigneurie et le château de Steenbourg furent vendus à Messire Jacques de Zylof, seigneur dObigny, qui lui a donné son nom. Ce sont ses descendants qui ont possédé le château de Steenbourg jusquau début du XXe siècle.Les rois de Belgique ont séjourné à plusieurs reprises dans ce château. Aménagé il y a une vingtaine dannée en Relais-château, la propriété a retrouvé depuis sa fonction résidentielle.  Propriété de monsieur Landais.","architecture":"STEENBOURG est classé monument historique partiellement (toiture, murs, douves et pont) depuis  le 24 juin 1983. La surface plancher est environ de 1000 m2. A travers le rideau d'arbres, vous apercevrez en effet une magnifique demeure avec ses douves en eau, ses 4 tours d'angles, ses pans « pas de moineaux » typiques, entourée d'un parc de 3,5 ha, possédant des arbres multicentenaires. Sa composition est pratiquement restée identique depuis plus de 4 siècles. On y trouve également une maison de gardien et des anciennes écuries sur un terrain de 1,3 ha, soit une surface totale du domaine d'environ 4,8 ha.C'est un château au charme champêtre toujours habité, qui cherche aujourd'hui un nouveau souffle et souhaite écrire une nouvelle page à son histoire.\n Ce château est le seul de ce type dans la région des Hauts de France.","habitants":"Famille des Le Vaillant.\"","divers":"Steenburg  GPS : 50° 57' 13\" Nord, 2° 22' 05\" Est                                Steenburg   GPS : 50° 57' 48\" Nord, 2° 20' 51\" Est","gps":"50° 57' 13\" Nord, 2° 22' 05\" Est","images":["../image/image_59/59_Steenbourg_1.jpg","../image/image_59/59_Steenbourg_2.jpg","../image/image_59/59_Steenbourg_3.jpg","../image/image_59/59_Steenbourg_4.jpg"]},"Consult_chateau_formulaire8959":{"id":"Consult_chateau_formulaire8959","dept":"59","canton":"Fourmies","commune":"Féron_pont_de_sains","nom":"Talleyrand_Féron","type":"Château","periode":"XVI","histoire":"deux châteaux dans cet article Talleyrand et Pont de Sains.                   TALLEYRAND,    Le Colonel Butschert ainsi que les officiers supérieurs du 10e de ligne et M. le Commandant de la place dAvesnes, ont diné mardi chez M. le Prince de Talleyrand au Pont-de-Sains. Le Prince a fait les honneurs de sa maison avec laménité qui lui est naturelle. La musique de ce régiment sy était transportée et a exécuté pendant le repas divers morceaux densemble qui ont paru faire le plus grand plaisir à la nièce de M. de Talleyrand, madame la Duchesse de Dino, dont on vante surtout laffabilité, et à son intéressante fille. établissement de la forge à Glageon en 1581 elevée  par Philippe de Lalis, maître des forges en 1590 la forge passe à Charles de Ghosée, et en 1598 à son fils François en devient propriétaire en 1603 de la forge et du domaine, en 1603 François vend à Martin  Poschet, Philippe rend hommage à son suzerain , le prince de Chimay, le domaine passe ensuite à un neveu Philippe-Joseph-Théodore Poschet qui en 1708 donne à sa soeur Marie-Thérése-Jacqueline, épouse d'Henri-Honoré-Joseph du Puès, leur fils Philippe-Joseph-Emmanuel du Puis, accole à l'ancienne demeure de nouveaux bâtiments, confisques comme bien d'émigré à la Révolution. En 1801 Charles Maurice de Talleyrand -Périgord acquiert le domaine, mais il y vécut  que deux fois, en 1809 à 1813 et 1826 à 1836 un an après transmet le domaine à son épouse Catherine-Noel Worlée qu'elle fait effectuer des travaux par des prisonniers espagnols, le domaine passe à la princesse de Dino, épouse de son propre neveu s'en accapare mais réside dans son château de Valençay. En 1838 Talleyrand décède, sa petite nièce, Pauline de Thalleyrand comtesse de Castellane fille du grand ministre et de la princesse de Dino, au décès de  Pauline en 1890, le domaine se transmet par descendance, il appartient à son petit-fils Boni de Castellane puis vendu au début du XXe siècle dans plusieurs mains avant d'être acquis en 1975 à une Association pour adultes handicapés mentaux.","architecture":"TALLEYRAND       Sur ce panorama du Pont-de-Sains en 1881, entre les deux tourelles à poivrières, sous le porche de lentrée, on peut lire la date de 1808. Derrière, les communs rehaussés en 1828 sont situés sur le territoire de Féron. Le château de Charles Talleyrand-Périgord fut démoli vers 1905. Après son décès en 1838, sa nièce la duchesse de Dino hérite du domaine, et le transmet à sa fille, devenue par mariage la marquise de Castellane. En 1925, Gaston Dubois-Waast, brasseur à Denain, achète la propriété. En 1941, Marcelle de Peretti, son épouse, est la dernière propriétaire privée. Depuis 1975, la Maison des Enfants de Trélon réalise dénormes travaux pour un Centre dAide par le Travail, connu sous le nom de la Ferme du Pont-de-Sains.                                                                                                Amputé d'une grande partie de ses éléments, les bâtiments en L autour d'une cour d' honneur, la façade qui donne sur la cour de l'aile, la plus large comporte en son centre un avant-corps à trois travées coiffé d'un fronton triangulaire engagé dans la toiture, il est prolongé par une courte aile aboutissant à un bâtiment en retour d'équerre qui forme la base du  L. De l'auttre côté, l'aile est prolongée par un bâtiment que perce un porche d\"écurie, à l'arrière, une cour par laquelle on pénêtre par le portail entouré de tours, élément le plus anciens du château, au XVIe siècle ne subsiste que deux tours fortifièes aux portail d'entrée et des douves.                                                 FOURMIE  Le château de la Marlière est devenu un Hôtel-Restaurant de charme.","habitants":"Ministre Talleyrand                        famille Poschet\"","divers":"A Féron  pont de Sains; Talleyrand; Féron et Marlières grav 3","gps":"","images":["../image/image_59/59_Talleyrand_F%c3%a9ron_1.jpg","../image/image_59/59_Talleyrand_F%c3%a9ron_2.jpg","../image/image_59/59_Talleyrand_F%c3%a9ron_3.jpg","../image/image_59/59_Talleyrand_F%c3%a9ron_4.jpg"]},"Consult_chateau_formulairec9d6-2":{"id":"Consult_chateau_formulairec9d6-2","dept":"59","canton":"Le Cateau-Cambrésis","commune":"La Groise","nom":"Toillon","type":"Châteaux","periode":"XXI","histoire":"TOILLON, le relais du Toillon appelé ainsi au début du XXIe siècle par son propriétaire, désigne la bâtisse située à l'entrée du village de La Groise sur la rue de Landrecies. La date de construction de cette bâtisse se situe dans le premier quart du XIXe siècle. Le Relais du Toillon, est, aujourd'hui, une résidence qui date du début du XXI siècle, à l'entrée du village de La Groise. Son cadre est authentique et lambiance reposante. Aujourd'hui, le Relais du Toillon vous propose ses chambres d'Hôtes, dans un cadre accueillant ou vous serez reçus avec beaucoup de gentillesse, par Mr et Mme Demarcq.","architecture":"TOILLON, la propriété se constitue d'un bâtiment principal à côté duquel fussent construites des écuries (pièces voûtées en brique rouge et pierres bleues) d'abord dans le prolongement du bâtiment principal puis perpendiculairement. Collée à ces dernières a été édifiée une grange. C'est dans cette demeure que séjourna un parlementaire du début du XIXe siècle, Louis-Antoine-Maximilien Bricout de Cantraine.","habitants":"Famille de Louis-Antoine-Maximilien Bricout de Cantraine\"","divers":"Toillon GPS : 50° 4' 33,24\" Nord, 3° 1' 5,27\" Est","gps":"50° 4' 33,24\" Nord, 3° 1' 5,27\" Est","images":["../image/image_59/59_Toillon_1.jpg","../image/image_59/59_Toillon_2.jpg","../image/image_59/59_Toillon_3.jpg"]},"Consult_chateau_formulaireaf48":{"id":"Consult_chateau_formulaireaf48","dept":"59","canton":"Tourcoing","commune":"Tourcoing","nom":"Tourcoing_Vaissier","type":"chateaux","periode":"XIX","histoire":"Trois châteaux dans cet article; Vaissier et Mouvaux, et Marcq en Barouel.                               VAISSIER; le palais du Congo nommé ainsi à l'époque, était dans le quartier de Blanc-Seau et appartenait à Victor Vaissier, savonnier renommé dont les usines étaient à Roubaix. C'est la fabrication du célèbre savon des Princes du Congo qui assura sa fortune. Il prétendait être le Prince du Congo. Il rêvait d'une demeure digne de son rang et de ses ambitions. Il ne supportait plus de vivre entre les murs noircis de l'usine de la rue de Mouvaux (Tourcoing). Il décida de faire appel à l'architecte Charles Dupire-Rozan et lui donna ses directives. Vaissier voulait un château somptueux, majestueux et original, reprenant la forme et le style oriental, surmonté d'un grand dôme garni de vitraux colorés. Le château de Vaissier, aussi appelé Palais du Congo, fut érigé en 1892, dans un style oriental, sur un parc d'une superficie de 5 Ha, s'étendant de la rue de Mouvaux à l'avenue Grau, et de la rue du Congo jusqu'au Canal. Le château de Vaissier évoque le Taj Mahal et comporte de nombreuses références à l'art de l'Inde. En 1923, à la mort de Vaissier, sa famille proposa de vendre le château à la ville de Tourcoing, qui le refusa. En 1925, M. Deconninck, entrepreneur de spectacles, le racheta. Il envisagea plusieurs projets, mais aucun ne fut réalisé. En 1929, le château de Vaissier fut démoli. La propriété, divisée entre les associés, fut lotie et les différentes parcelles furent vendues, en terrain à bâtir. Il ne reste qu'un seul vestige du palais Vaissier : le Pavillon du Concierge.","architecture":"MOUVAUX, Construit dans les années 1870 à 1880, la propriété de 22 hectares verdoyants fut en partie vendue à un promoteur, afin dy construire la résidence du Hautmont. À lemplacement du château Masurel sélèvent en 1972, trois immeubles résidentiels et des maisons individuelles. Quelques fermes subsistent dans lavenue du Hautmont, qui autrefois appartenaient à la famille Masurel et dans lesquelles était logé son personnel  comme nous lavons déjà évoqué dans un précédant épisode, dans le quartier des Francs où se trouve, la famille Masurel (industrie textile) était très bien implantée. Elle avait même son petit château qui a été construit dans les années 1860, à linitiative de François Masurel et de sa femme Joséphine Pollet, à la même période que celui du Hautmont, qui appartenait à Jules Masurel. \nLe petit château Masurel , à linitiative de François Masurel et de sa femme Joséphine Pollet, à la même période que celui du Hautmont, qui appartenait à Jules Masurel, le frère aîné de François.","habitants":"M. Deconninck, et  la famille Masurel\"","divers":"Deux châteaux dans cet article; Vaissier grav_3    et Mouvaux.  Grav-1-2                                                         Vaissier grav_3 GPS : 50° 41' 45\" Nord, 3° 8' 38,55\" Est     Valcourt grav_4","gps":"50° 41' 45\" Nord, 3° 8' 38,55\" Est     Valcourt grav_4","images":["../image/image_59/59_Tourcoing_Vaissier_1.jpg","../image/image_59/59_Tourcoing_Vaissier_2.jpg","../image/image_59/59_Tourcoing_Vaissier_3.jpg","../image/image_59/59_Tourcoing_Vaissier_4.jpg"]},"Consult_chateau_formulaire07b7":{"id":"Consult_chateau_formulaire07b7","dept":"59","canton":"Fourmies","commune":"Trélon","nom":"Trélon","type":"Chateaux","periode":"XV-XVI-","histoire":"TRELON, au nord de  Fourmies Trélon est liée à l'histoire tourmentée de son château. appartient au XIe siècle à la famille d'Avesnes. Le château fut construit par Nicolas d'Avesnes resta dans cette famille plusieurs  siècles. Des Landrecies jusqu'à Jean de Châtillon qui en 1380 en fit don à son fils Jean de Blois. Des dates se succèdent, long inventaire de sièges, de destructions, de reconstructions, tour à tour français, bourguignon, espagnol, au milieu du XVIe siècle à la mort sans héritiers de Louis de Blois le domaine passe  à sa soeur  Louise qui épousa en 1562 Louis de Mérode., Trélon , érigé en marquisat en 1625 Les habitants qui survivent aux destructions, aux pillages doivent faire face aux famines et à la peste. Situé à lemplacement de lancienne forteresse du XVe siècle, le château de Trélon a bénéficié au fil des générations dimportantes transformations, soignant sans cesse larchitecture. Les siècles ont légué cette majestueuse demeure de style Louis XIII, à la riche ornementation et aux collections de mobilier, tapisseries, porcelaine de Sèvres et duvres dart superbes. Une des plus grandes familles liée à la plupart des cours européennes au fil de lHistoire. Les membres de la maison de Mérode ont porté depuis le XVe siècle les titres de comte, de baron du Saint-Empire et de prince. Ils sont cousins ou aïeux des familles de Monaco, dArenberg, de la famille royale espagnole ou de la famille royale italienne.","architecture":"TRELON le domaine est la propriété de la famille depuis au moins 1580.  Lhistoire plus récente retient 3 hommes. Félix de Mérode (1791-1857), qui participa à la Révolution, lindépendance et la constitution Belge, allant jusquà refuser la possibilité de devenir roi.\nIl eut deux fils : Monseigneur Xavier de Mérode, dabord officier militaire puis archevêque, camérier du pape Pie IX et pro-ministre aux armées des États pontificaux. Mort à Rome, il poussa son dernier soupir dans les bras du Très-Saint-Père, « Personne ne la mieux connu que Pie IX, et il est probable que personne ne la autant aimé ». La chapelle et le château de Trélon conservent de nombreux souvenirs de cet homme dexception.\nLautre fils, Werner de Mérode est à lorigine de la « monumentalisation » du château avec le rehaussement des toitures, la construction du perron puis lédification de la tour abritant la chapelle.","habitants":"Famille de Félix de Mérode \"","divers":"Trelon grav 1-2-3 GPS : 50° 03' 35\" Nord, 4° 05' 56\" Est                               Huda  grav-3                                                                                 Sains  : 50° 03' 52\" Nord, 4° 01' 30\" Est","gps":"50° 03' 35\" Nord, 4° 05' 56\" Est","images":["../image/image_59/59_Trelon_1.jpg","../image/image_59/59_Trelon_2.jpg","../image/image_59/59_Trelon_3.jpg"]},"Consult_chateau_formulairedb77":{"id":"Consult_chateau_formulairedb77","dept":"59","canton":"Valencienne","commune":"Valencienne","nom":"Valencienne","type":"Patrimoine","periode":"XVII","histoire":"Six châteaux dans cet article: Valencienne, l'hôtel de ville, les beaux arts la tour Dodenne, le château de Désandrouin   manoir de Bonavie                                  VALENCIENNE, élégant château XVIIIe siècle, parc de 9800m, avec douves en pleine campagne. Ce superbe château a été entièrement restauré à lintérieur dans un style contemporain alliant classicisme et modernité et lextérieur en préservant toute son histoire.\nLe château de 1200 m² hab. est composé au rez-de-chaussée dune salle à manger et cuisine en enfilade avec un salon bar et vestiaire, salle de cinéma,  billard,  sport,  jeux, piscine intérieure 10x3m, jacuzzi, douches                                                                                                       l'HOTEL DE VILLE  date de 1867. Ses statues allégoriques sont de Philippe Joseph Henri Lemaire, à qui l'on doit aussi certaines des uvres de la gare du Nord, à Paris. Au sommet trône une reconstitution fidèle, par le sculpteur Albert-Marius Patrisse, du célèbre fronton de Jean-Baptiste Carpeaux, Valenciennes défendant ses remparts (l'original est tombé lors de l'incendie de 1940). Des personnes ayant connu la seconde guerre mondiale racontent que les Allemands, voulant bombarder la gare ferroviaire de nuit, bombardèrent l'hôtel de ville à la place, et qu'il ne restait plus que la façade.                                                                                                                                Le musée des BEAUX ARTS, construit au début du XXe siècle, a rouvert ses portes au printemps 1995 après une importante rénovation. Il conserve la première collection de province des uvres de Carpeaux (sculptures et peintures), et l'une des premières de France quant à la peinture flamande du XVIIe siècle, notamment avec Rubens. Son fonds archéologique témoigne des richesses historiques de la cité.                                            DAMPIERRE à Anzin Ce petit « château dindustrie » construit à la fin du XIXe siècle, faisait partie du domaine foncier de la Compagnie des mines dAnzin (fondé en 1757). Il est lunique témoin subsistant dune série dopulentes demeures construites à Anzin pour loger le personnel encadrant des mines.","architecture":"La tour de la DODENNE est une fortification construite au XIVe siècle (les fortifications bastionnées construites par les Espagnols et modifiées par Vauban, comme l'ensemble du patrimoine défensif de la cité, ont été démantelées de 1891 à 1893). La ville étouffait dans son enceinte et il fallait, pour favoriser son essor économique, l'en libérer, faciliter l'arrivée du train. L'entreprise fut cependant, malheureusement, un peu trop systématique à l'inverse des communes alors moins argentées. Il ne reste que quelques vestiges de la citadelle: le pont d'entrée gardé par deux orillons, l'écluse des Repenties et le site des moulins.  La maison du prévôt, édifiée à la fin du XVe siècle.                                                                                                  DESANDROUIN espace culturel de proximité comprenant une salle de danse, deux ateliers de répétitions de rock, un atelier photo numérique, trois salles de répétitions et les locaux du centre des musiques actuelles. Les châteaux souvent dits « dindustrie » sont présents à léchelle du bassin minier. Ils ont été construits par les actionnaires des compagnies minières et étaient le symbole de leur puissance et surtout de leur profit. Le château Desandrouin est lancien siège de la compagnie des mines dAnzin. Au début du XVIIIe siècle, Jacques Desandrouin, verrier dorigine française installé à Charleroi, est en recherche de charbon pour faire tourner sa verrerie. En 1757, il crée la Compagnie Minière dAnzin qui sera la première à lancer à grande échelle lexploitation du charbon dans le nord de la France. La mémoire des mines tisse des liens forts dans ce territoire transfrontalier.","habitants":"Responsables communaux\"","divers":"Six  châteaux dans cet article: Valencienne grav-5-6-, l'hôtel de ville grav-1, les beaux arts grav-2 la tour Dodenne grav-3, le château de Désandrouin   grav-4    Dampierre à   Anzin grav-7","gps":"","images":["../image/image_59/59_Valencienne_1.jpg","../image/image_59/59_Valencienne_2.jpg","../image/image_59/59_Valencienne_3.jpg","../image/image_59/59_Valencienne_4.jpg","../image/image_59/59_Valencienne_5.jpg","../image/image_59/59_Valencienne_6.jpg","../image/image_59/59_Valencienne_7.jpg","../image/image_59/59_Valencienne_8.jpg"]},"Consult_chateau_formulairee5a0-2":{"id":"Consult_chateau_formulairee5a0-2","dept":"59","canton":"Avesnes-sur-Helpe","commune":"Vendegies au Bois","nom":"Vendegies_Bois","type":"Château","periode":"XV-XVII","histoire":"VENDEGIES,  le plus ancien seigneur connu est Thomas de Goegnies, cité dans une charte de 1284. A partir du XIVe siècle, le château changea souvent de mains; il fut d'abord aux Montigny, puis aux Montmorency; en 1562, Floris de Montmorency après avoir reconstruit le château le vendit à Antoine de Goegnies, marié à Marie d'Éclaibes. En 1600, sa fille se maria avec Louis de Beaufort, gouverneur du Quesnoy. En 1624, par mariage encore, l'édifice passa à Philippe Albert de Bonnières, gouverneur de Binche, qui, en 1766, le vendit à Bouchelet de Beaurain dont les descendants l'ont conservé jusqu'à nos jours. Il se trouve au fond du village, au pied d'un petit cours d'eau nommé Harpies; une longue allée plantée d'arbres le précède. Propriété du comte  de Beaurain.","architecture":"VENDEGIES,  Il ne reste que deux des quatre ailes qui devaient exister primitivement et trois tours faisant saillie aux angles de ce demi-quadrilatère. L'entrée principale s'ouvre sur l'aile Est, comportant quatre niveaux, des caves, un rez-dechaussée et un étage percés l'un et l'autre de dix fenêtres, et des combles éclairés par des lucarnes. L'ensemble de la construction, datée du début du XVIIe siècle, a été réalisé en brique, seuls les angles et les encadrements des fenêtres ont été bâtis en pierre calcaire. Les fenêtres étaient pourvues de meneaux à l'origine, ont été agrandies et transformées au XVIIIe siècle.","habitants":"Famille de  Floris de Montmorency\"","divers":"Château de Vendegies à Vendegies au bois","gps":"","images":["../image/image_59/59_Vend%c3%a9gies_Bois_1.jpg","../image/image_59/59_Vend%c3%a9gies_Bois_2.jpg","../image/image_59/59_Vend%c3%a9gies_Bois_3.jpg","../image/image_59/59_Vend%c3%a9gies_Bois_4.jpg"]},"Consult_chateau_formulaire619f":{"id":"Consult_chateau_formulaire619f","dept":"59","canton":"Lambersart","commune":"Verlinghem,","nom":"Verlinghem","type":"Château","periode":"XIX","histoire":"deux châteaux dans cet article, Blanc et Premesques                               CHÂTEAU BLANC,  édifié en 1852 par M . De Viervoorde, (un des premiers maires du Village) industriel ayant fait fortune dans le fil textile, puis cédé à la fin du XIXe siècle à la famille Thiriez également industriel dans le domaine du textile, il restera dans cette famille jusquau milieu des années 1970. A partir des années 80 il
