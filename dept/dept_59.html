lt_chateau_formulaire619f","nom":"Verlinghem","commune":"Verlinghem,","type":"Château","img":"../image/image_59/59_Verlinghem_1.jpg"},{"id":"Consult_chateau_formulaire99f9","nom":"Villeneuve_Ascq_II","commune":"Villeneuve d","type":"Château","img":"../image/image_59/59_Villeneuve_Ascq_II_1.jpg"},{"id":"Consult_chateau_formulairee911","nom":"Villeneuve_d","commune":"Villeneuve_d","type":"Châteaux","img":"../image/image_59/59_Villeneuve_dAscq_1.jpg"},{"id":"Consult_chateau_formulairecb16","nom":"Wannehain","commune":"Wannehain","type":"Château","img":"../image/image_59/59_Wannehain_1.jpg"},{"id":"Consult_chateau_formulaire1a8e","nom":"Warnicamp","commune":"Houdain-lez-Bavay","type":"Château","img":"../image/image_59/59_Warnicamp_1.jpg"},{"id":"Consult_chateau_formulaire62e2","nom":"Wervicq_Sud","commune":"Wervicq-Sud","type":"Château","img":"../image/image_59/59_Wervicq_sud_1.jpg"},{"id":"Consult_chateau_formulaire2dfb","nom":"Wignacourt","commune":"Flêtre","type":"Château","img":"../image/image_59/59_Wignacourt_1.jpg"}];const FULL={"Consult_chateau_formulairecf2a":{"id":"Consult_chateau_formulairecf2a","dept":"59","canton":"Villeneuve d","commune":"Cysoing","nom":"Abbaye_Cysoing","type":"Château","periode":"XVII-XVIII-XIX","histoire":"Deux châteaux  dans cet article, l'abbaye de Cysoing et de St-Sixte.                  ABBAYE-CYSOING, à la Révolution, elle devient bien national et est vendue par lots. Les deux tiers sont acquis par l'avocat Philippe-Joseph Riquet : la partie sud avec les viviers, le jardin avec la pyramide au nord. Il fait bâtir le château dans l'axe du pavillon. L'édifice se présente comme une folie, reflet du Petit Trianon de Versailles. La façade principale est constituée d'un avant corps central en légère saillie de quatre colonnes d'ordre colossal à chapiteaux ioniques formant péristyle, et d'une travée de part et d'autre surmontée d'un fronton curviligne. A l'intérieur la forme des pièces était caractéristique des pavillons ou folies de la seconde moitié du XVIIIe siècle et du début du XIXe siècle. Après 1824, des allées sinueuses formant un parc romantique sont tracées. Au début du XXe siècle, l'architecte Léonce Hainez fut chargé de transformer les communs et de mettre au goût du jour et de moderniser le pavillon, lui donnant son aspect actuel, et de transformer les communs.  La construction du château date du XVIIIe et XIXe siècle. Fondé sur les lieux de l'ancienne abbaye de Cysoing, monastère fondé par Saint-Evrad, l'édifice apparaît au début du XIXe siècle. Cest vers 1800 que lavocat lillois, Philippe Joseph Riquet, en 1907, Léonce Hainez, architecte du théâtre Sébastopol à Lille, fut chargé de moderniser le pavillon, lui donnant son aspect actuel. Le château de l'Abbaye de Cysoing est inscrit aux M.H. depuis le 9/10/2008. Le château de l'Abbaye de Cysoing est à l'image du Petit Trianon à Versailles. C'est devenu la propriété d'un établissement public de l'Etat.","architecture":"BARONNIE, La seigneurie fut érigée en baronnie au XIIIe siècle et appartint aux héritiers de Evrard de Frioul et de son épouse Gisèle, petite-fille de Charlemagne. Jusqu'en 1750, outre les douves et les murs, le château était fortifié par un ouvrage appelé Bastille (avec prisons, grille, et pont-levis et par une tourelle et un donjon. Mais les barons de Cysoing ne résidaient qu'a l'occasion dans leur château qui n'était que le centre administratif de la Baronnie, logeant officiers et baillis. En 1750, le prince de Rohan-Soubise entreprit sa reconstruction (partie centrale du château actuel). Trois hautes fenêtres encadrent la porte d'entrée alors que l'étage en comporte sept. Aux deux fenêtres mansardées correspondent deux hautes cheminées sur la toiture. Les deux ailes édifiées au XIXe siècle, comportent chacune deux étages et donnent à cette demeure l'allure d'un château  bâti en brique.                                                                            ABBAYE St-SIXTE. a été restauré. Rachetée par la mairie de Cysoing en 2008. Son nom vient du fait qu'il a été construit, sur le site de l'abbaye Sainte-Calixte, détruite lors de la Révolution française et avec une partie de ses débris.  Il a été construit vers 1800 dans lancien parc de labbaye de Cysoing, dont les courtisans de Louis XV vantaient la beauté. De cette abbaye, il ne reste que quelques bâtiments rue Gambetta, le mur denceinte et d'étonnantes grottes constituées d'amoncellement de pierres taillées provenant des bâtiments abbatiaux qui furent démolis, à la Révolution. En 1907, des travaux furent réalisés, par Léonce Hainez, Architecte du Théâtre Sébastopol de Lille, à l'époque de la redécouverte du style néo-classique, qui justifient l'inscription récente du château de l'Abbaye Saint-Sixte aux M.H.","habitants":"le prince de Rohan-Soubise \"","divers":"Deux châteaux  dans cet article, l'abbaye de Ciysoing  grav-1 et de Sixte.  Grav-2                                                   St-Sixte  GPS : 50° 39' 53\" Nord, 3° 12' 55\" Est                                                   Cysoing   GPS : 50° 33' 53\" Nord, 3° 12' 52\" Est","gps":"50° 39' 53\" Nord, 3° 12' 55\" Est","images":["../image/image_59/59_Abbaye_Cysoing_1.jpg","../image/image_59/59_Abbaye_Cysoing_2.jpg"]},"Consult_chateau_formulairef091":{"id":"Consult_chateau_formulairef091","dept":"59","canton":"Lille","commune":"Ennevelin","nom":"Aigremont_59","type":"Château","periode":"XV-XVII","histoire":"AIGREMONT, autrefois associée à un château, la ferme dépendait probablement dune seigneurie. De profondes douves entourent encore le domaine, sans pour autant en faire le tour complet. Sur un de ses côtés, la ferme dAigremont offre à la vue un beau porche, au pied dune tour carrée recouverte dardoises, ainsi que les restes dun pont-levis. Les armoiries du propriétaire des lieux ne sont plus visibles,  détruites au burin.  Lancienne ferme au carré daterait du XVIIe siècle. Le colombier serait, lui, dun style plus ancien. Lexploitation qui était associée à la Ferme dAigremont est estimée un peu moins de 100 hectares, alors que les terres des autres fermes du village étaient comprises entre 5 et 40 ha. Si aujourdhui il nen reste plus beaucoup de traces, la Ferme dAigremont était en tout cas associée, jusquà la Révolution, à un château, situé au Nord. Si cest aujourdhui un lieu privé, La Ferme dAigremont abrite un magasin de décoration et de restauration de meubles anciens, Bruxelles Antiques, un gîte, ainsi quun restaurant.","architecture":"AIGREMONT, Ennevelin, située au Sud d' Ennevelin, tout près de la Marque, cette ferme, faisait partie d'un domaine seigneurial dont on retrouve des traces dès le  XIIe siècle, composé d'un château, sa chapelle et sa cense, l'ensemble construit sur mottes. Au XVIIIe siècle le domaine était organisé dans un grand parc boisé et jardiné ordonnancé de façon classique, à travers lequel coule la rivière de la Marque. Le château est détruit en 1794. Aujourd'hui ne subsiste que la Ferme à cour carrée entourée de douves, avec son entrée monumentale formant pigeonnier.  Elle a été restaurée et reconvertie en restaurant et magasin de mobilier.","habitants":"Seigneurs  locaux\"","divers":"Aigremont grav 1-2-3","gps":"","images":["../image/image_59/59_Aigremont_59_1.jpg","../image/image_59/59_Aigremont_59_2.jpg","../image/image_59/59_Aigremont_59_3.jpg"]},"Consult_chateau_formulairec3b2":{"id":"Consult_chateau_formulairec3b2","dept":"59","canton":"Marly","commune":"Condé sur l","nom":"Arsenal_fort_Condé","type":"Fort","periode":"XII","histoire":"FORT de L'ARSENAL, place forte médiévale résultant de la succession d'une motte castrale et d'une enceinte fortifiée, dont seuls 10% de la surface ont été explorés. L'origine de Condé remonte aux invasions normandes. Le château est l'enjeu des luttes d'influences entre les pouvoirs locaux. Reconstruit en 1184, le bâtiment est décrit comme le plus puissant de l'époque. Il est inclus dans le périmètre urbain avec une fonction militaire jusqu'au XVIIe siècle, période à laquelle il est transformé en arsenal puis en hôpital militaire. Une partie de la courtine et les tours sont arasées mais le donjon reste en élévation. Au XXe siècle, une gendarmerie et une maison sont construits à l'emplacement présumé du donjon. Dans les années 1990, la poterne et les deux tours sont transformées en logements sociaux. Le château du XIIe siècle est protégé par un important remblai lors de l'édification de l'enceinte du XIIIe siècle. L'enceinte du XIIIe siècle est constituée d'une courtine flanquée de cinq tours d'angle et de trois intermédiaires avec un châtelet d'entrée à deux tours interrompant la courtine nord. Cet ensemble est un rare exemple du nouveau mode de défense d'une place forte, se subsistuant au système de la motte et de son donjon, exemple unique de l'évolution de l'architecture militaire du Moyen-Age. Au XIIe siècle, le château dressé sur une motte comprend une tour-porche sur plan barlong associée à un mur de chemise délimitant une haute-cour et cerné d'un fossé en eau ; une disposition comparable s'observe à Douai, Ath et Gand dans les années 1175. L'enceinte trapézoïdale extérieure du château-fort du  XIIIe siècle se développe sur 110 m de long (axe est-ouest) et 70 à 90 m de large.","architecture":"Fort de l'ARSENAL; s'ouvre vers la ville par un ouvrage d'entrée (châtelet). La courtine est édifiée en petits mllons de grès, le parement des huit tours de flanquement et l'ouvrage d'entrée est monté en pierre calcaire soigneusement appareillée. L'ensemble résidentiel comporte une salle d'apparat avec deux cheminées monumentales, une plus petite salle avec une cheminée et la chapelle Saint-Nicolas greffée perpendiculairement. Cette chapelle, dont l'unique vaisseau se termine par un chevet à trois pans, est flanquée de contreforts en éperon. Une pièce d'eau, vestige du fossé du XIIe siècle, communique avec l'Escaut au sud. Le logis du XVIe siècle est bâti en briques. Le dessin conservé aux Archives de l'État à Mons en donne une bonne vue : un corps de bâtiment en briques sur soubassement de pierre, dont les deux niveaux sont desservis par une tourelle d'escalier. La chapelle Sainte-Renelde recoupe perpendiculairement l'emprise du lieu de culte précédent.\nÉléments protégés MH : les deux tours du bâtiment d'entrée (châtelet) et le moulin : inscription par arrêté du 10 avril 1948. La totalité des bâtiments présents constituant l'ancien château, avec l'ensemble de son assise foncière et des vestiges qu'elle contient, y compris les douves situées dans le domaine public  : classement par arrêté du 11 juillet 2006.","habitants":"seigneurs  locaux\"","divers":"Condé    50° 27' 00? nord, 3° 35' 29? est","gps":"","images":["../image/image_59/59_Arsenal_Fort_Cond%c3%a9_1.jpg","../image/image_59/59_Arsenal_Fort_Cond%c3%a9_2.jpg","../image/image_59/59_Arsenal_Fort_Cond%c3%a9_3.jpg"]},"Consult_chateau_formulaire8f36":{"id":"Consult_chateau_formulaire8f36","dept":"59","canton":"Templeuve-en-Pévèle","commune":"Tourmignies","nom":"Assignies","type":"Château","periode":"XIX","histoire":"ASSIGNIES appelé aussi le Petit Rouge est un château bâti à Tourmignies,  Sa construction date de 1870. Le château d'Assignies se situe Avenue du château à Mérignies et également sur la commune de Tourmignies. Le château d'Assignies a été construit, de 1870 à 1876, sous la direction de 2 Architectes : Henri Meurillon et Léon Ohnet, pour la Famille Boutry, notables de la ville et propriétaire de manufactures linières implantées à Lille. Le site du domaine d'Assignies s'est, un temps, inscrit dans l'histoire locale, permettant d'évoquer la splendeur des Boutry à la fin du XIXe siècle. Il n'en subsiste, aujourd'hui, que les dépendances, depuis, qui sont  dénaturées. Le château d'Assignies a été inscrit partiellement aux M.H. depuis le 31/01/2012. Il est aujourd'hui la propriété de la communauté des Communes de Pévèle. En Avril 2021, il a été signé une promesse de vente, avec la Société Avenir et Patrimoine. Si les permis de construire sont signés, la vente définitive a eu lieu en fin d'année 2021.","architecture":"Au sud de Mérignies à Thumières le château BEGHIN construit en 1890, le château Beghin a appartenu à Joseph Béghin, personnage imporant de la haute bourgeoisie du Nord. Le domaine du château Beghin se dresse fièrement au milieu dun parc exceptionnel parmi les arbres centenaires. Vous pourrez y organiser votre mariage ou fêtez votre départ en retraite ou tout autre évènement en y louant une ou plusieurs salles. 250 convives peuvent être accueillis.","habitants":"Famille Boutry\"","divers":"Assignies  GPS : 50° 30' 24\" Nord, 3° 05' 24\" Est                                                             BEGHIN  GPS : 50° 28' 47\" Nord, 3° 03' 20\" Est grav-2","gps":"50° 30' 24\" Nord, 3° 05' 24\" Est","images":["../image/image_59/59_Assignies_1.jpg","../image/image_59/59_Assignies_2.jpg"]},"Consult_chateau_formulairef73a":{"id":"Consult_chateau_formulairef73a","dept":"59","canton":"Aulnoy-lez-Valenciennes","commune":"Aubry du Hainaut","nom":"Aubry_du_Hainaut","type":"Château","periode":"XV","histoire":"AUBRY à l'est de Valenciennes Les seigneurs d'Aubry sont attestés au XIIIe siècle. Au XVe siècle la seigneurie passa à un bourgeois de Valenciennes, Jacques de Grébert. En 1450, par le mariage de Jeanne, dame de Gourguechon et de Baillon, avec Jean de Thiant, elle entra dans cette . cette famille, où elle resta jusqu'en 1562, date à laquelle l'héritière épousa Jean de la Pierre, seigneur de Bousies. En 1651, le bien passa dans la famille de Waziers de Gouzaucourt et en 1700 dans celle de Saluces-Bernemicourt ; enfin, il appartint à Antoine-Félicien, Comte de Vanderbuch et d'Hubertsart, seigneur d'Écaussines et Wagnonville.","architecture":"AUBRY, abandonné pendant des années et après restauration, il reçoit aujourd'hui des particuliers puisqu'il est Restaurant et Hôtellerie. Le château d'Aubry-du-Hainaut ouvre également ses portes à l'occasion de manifestations culturelles gratuites tout au long de l'année (Journées des Parcs et Jardins), ou durant les 2 Journées du Patrimoine (3ème WE de Septembre). C'est devenu un superbe Hôtel-Restaurant renommé,   Le château d'Aubry se signale par une grille monumentale. En pénétrant dans la cour, on trouve à gauche les communs, des bâtiments en brique et pierre du XVIIe siècle. Le château comprend deux ailes réalisées dans le style du XVIIIe siècle dont l'une a son extrémité arrondie ; elles enserrent un corps de bâtiment de style Renaissance. L'ensemble s'inscrit dans un espace circulaire délimité par des douves en eau. Ses deux ailes datent du XIXe siècle. L'édifice Renaissance, bien que fort restauré, conserve ses dispositions d'origine, en brique, sauf les chaînages d'angle, les encadrements des ouvertures et les cordons qui sont en pierre, il comporte deux niveaux d'habitation, hôtel restaurant.","habitants":"Famille de  Jacques de Grébert\"","divers":"GPS : 50° 22' 09\" Nord, 3° 27' 48\" Est grav 1-2-3","gps":"50° 22' 09\" Nord, 3° 27' 48\" Est grav 1-2-3","images":["../image/image_59/59_Aubry_du_Hainaut_1.jpg","../image/image_59/59_Aubry_du_Hainaut_2.jpg","../image/image_59/59_Aubry_du_Hainaut_3.jpg"]},"Consult_chateau_formulaire1648":{"id":"Consult_chateau_formulaire1648","dept":"59","canton":"Orchies","commune":"Auby","nom":"Auby","type":"Château","periode":"XVIII","histoire":"AUBY, le château d'Auby date du XVIIIe siècle dont la plus ancienne propriétaire connue reste la Marquise de Leyde, Dame du Forest et d'Auby , puis le Sieur Plaisant, trésorier de la ville de Douai ; Simon de Maibelle, professeur de droit à l'Université de Douai qui se maria avec la fille de M. Plaisant, Auguste Dubois, Intendant militaire qui assura la rénovation du château, de 1854 à 1857, pour lui donner son état actuel. Le château d'Auby revint à la famille Cardon de Montigny, à la suite du décès d'Auguste Dubois, en 1875 et, fut racheté en 1921, par les Houillères Nationales lors d'une vente promulguée par le Tribunal civil de Bernay, à la suite de la liquidation de la succession de Norbert Cardon de Montigny.   Les Houillères en firent un centre d'apprentissage pour Galibots mineurs. En 1968, la municipalité d'Auby en fit l'acquisition. Le château d'Auby accueillit, successivement, des salles de classes, une cantine scolaire et sa bibliothèque, qui fut transformée en médiathèque, en 1989. L'ancienne bibliothèque fut incendiée, lors des émeutes des banlieues, en 2005. Le château d'Auby est constitué d'une partie centrale d'apparence ordinaire, à laquelle sont flanquées deux ailes de style espagnol bâtard, flanquées de tourelles décoratives,  est devenu la Mairie d'Auby.","architecture":"AUBY,  le château est une longue construction à deux niveaux calée latéralement par deux pavillons plus élevés faisant saillie sur les deux façades. L'uvre a été réalisée au XVIIIe siècle en brique et pierre. Du côté de la rue, une récente restauration a décapé l'enduit qui masquait ces matériaux; du côté du jardin, le travail reste à faire. Au XIXe siècle, le fronton sur rue a été rhabillé en néo-gothique. Des tourelles montées en encorbellement arrondissent les angles du dernier niveau des pavillons latéraux; une autre tour a été logée dans l'angle rentrant formé par le logis et le pavillon de droite. Au centre, on a plaqué un petit avant-corps faisant légèrement saillie; l'arc de la porte, aujourd'hui bouchée, a été tracé en accolade. Les deux tourelles sont en brique, le reste est en pierre, accostent la fenêtre centrale surmontée d'un trophée de chasse; leur poivrière ne dépasse pas le niveau de la corniche du logis. Les fenêtres de la façade sont légèrement surbaissées, certaines sont coiffées d'un larmier. La façade sur jardin a conservé son aspect originel, enfin, elle le retrouvera lorsqu'elle sera restaurée.","habitants":"Famille Cardon de Montigny\"","divers":"Grav-1  GPS    50° 24' 55? N, 3° 03' 26? E","gps":"","images":["../image/image_59/59_Auby_1.jpg"]},"Consult_chateau_formulaire4736":{"id":"Consult_chateau_formulaire4736","dept":"59","canton":"Aulnoye-Aymeries","commune":"Audignies","nom":"Audignies","type":"Château","periode":"XV-XVII","histoire":"AUDIGNIES,  les travaux historiques attribuent la construction du château d'Audignies à Guillaume de Sars, fils d'Alard dit Lion de Sars, premier seigneur d'Audignies au début du XVe siècle. Guillaume de Sars fut prévôt du Quesnoy (1409-18), puis Bailli de Hainaut (1418-22) et chambellan, conseiller de Philippe le Bon (1427). Le château apparaît dans le testament daté de 1525 du seigneur Jean du Chasteler, qui possédait de très nombreuses terres dans la région, notamment la seigneurie de Wadimpréau, il ne transforme pas le château. Une image de l'Album de Croÿ montre le village d'Audignies vers 1600 et le donjon sans toiture. Guillaume II du Mont, Bailli de Chimay et Beaumont, puis conseiller souverain de Hainaut, devint propriétaire du château qu'il aménagea pendant le premier quart du XVIIe siècle, en réunissant la tour et le corps de logis et en rehaussant la tour de deux niveaux. La transformation de la toiture du logis date du XVIIIe siècle. Les aménagements et adjonctions de la fin du XIXe siècle ont rendu le château plus confortable. toujours transmis par alliance, appartient à la baronne de Milleville.","architecture":"AUDIGNIES, le château est composé de trois ailes disposées en équerre et entouré de douves. L'angle ouest est composé d'une tour carrée du XVIe siècle (9,20 x 8 mètres) construite en grès sur deux niveaux surmontés de deux niveaux de brique. La pierre est utilisée pour le chaînage des deux niveaux supérieurs et des baies. La tour est couverte d'une toiture en pavillon en ardoise, percée de lucarnes. L'aile sud constitue le corps de logis, composé de deux parties. Le corps de logis, édifié à la même époque que la tour, a été relié à cette dernière par une adjonction au XVIIe siècle et abrite l'escalier desservant la tour. Le premier niveau est construit en grès surmonté d'un niveau en brique. Un blason aux armes des seigneurs Du Mont domine la porte cochère du pont-levis remplacer par des ponts à plusieurs arches. Le corps de logis est couvert d'une croupe brisée, percée de lucarnes.","habitants":"Famille du seigneur Jean du Chasteler\"","divers":"Audigniesg_grav-1                                      GPS : 50° 17' 24,26\" Nord, 3° 48' 31,88\" Est","gps":"50° 17' 24,26\" Nord, 3° 48' 31,88\" Est","images":["../image/image_59/59_Audignies_1.jpg"]},"Consult_chateau_formulairebe0b":{"id":"Consult_chateau_formulairebe0b","dept":"59","canton":"Templeuve-en-Pévèle","commune":"Avelin","nom":"Avelin","type":"Château","periode":"XVII","histoire":"Deux châteaux dans cet article; Antroeuille et Avelin.                                  ANTROEUILLE, peut-être édifié au XVIe siècle pour Philippe de Pontrewart, devenu seigneur d'Antruille par son mariage, le château passe aux Allegambe puis à Dom Alonzo Ladron de Quevara, maréchal de camp, membre du conseil de guerre du Roi d'Espagne, mort en 1638. A la fin du XVIIe siècle, la propriété est achetée par Barthélemy François Joseph Hangouart, comte d'Avelin en 1696, décédé le 30 septembre 1710, le château reste dans cette famille jusqu'à la Révolution. Il est actuellement la propriété de M. et Mme Duquesne-Dennetière. Précédé d'une ferme dont la grange date du XVIIe siècle, et installé sur un quadrilatère limité par des fossés, le château se compose de deux ailes disposées en équerre et, à l'angle rentrant, d'une tourelle ronde aux trois quarts hors de l'uvre. Cette dernière surmonte d'un étage les deux niveaux de l'édifice, mais ne dépasse pas la hauteur des combles. On a utilisé la brique rouge orangé, réservant la pierre blanche aux pas-de-moineaux, aux encadrements des baies où elle forme harpes et dans les meneaux dont le profil accuse nettement le XVIe siècle.il appartient toujours à madame Duquesne.","architecture":"AVELIN  Trois châteaux furent successivement édifiés en trois siècles à Avelin. Du premier, bâti en 1610, il subsiste un dessin de la façade sur le parc de ce manoir flamand. Pour le remplacer, François Augustin Anne Hubert Colette d'Hangouart, comte de Seclin, marquis d'Avelin, chevalier de Malte, grand bailli des Etats de Lille, né en 1747, fit appel en 1779, à son tout jeune compatriote Michel Lequeux à qui il avait déjà confié le soin de dresser les plans de sa \"maison de ville\", l'actuel hôtel du Rectorat. Ce second château ne nous est plus connu que par une élévation. Il fut brûlé à la Révolution ou dans les premières années du XIXe siècle, puis reconstruit en 1836 par Benvignat, architecte lillois. Le mot majestueux convient bien à la grande drève qui, de la route mène vers le château, au parc boisé percé d'avenues convergentes, à la terrasse entourée de fossés et au bâtiment qui y est implanté. De plan presque carré, flanqué de pavillons à chaque extrémité des façades, il comporte trois niveaux sans compter un sous sol à demi enterré. Propriété du baron de Rotours.","habitants":"Famille de François Augustin Anne Hubert Colette d'Hangouart,\"","divers":"Deux châteaux dans cet article; Antroeuille grav-4 et Avelin  grav 1-2-3","gps":"","images":["../image/image_59/59_Avelin_1.jpg","../image/image_59/59_Avelin_2.jpg","../image/image_59/59_Avelin_3.jpg","../image/image_59/59_Avelin_4.jpg"]},"Consult_chateau_formulaire6bf4":{"id":"Consult_chateau_formulaire6bf4","dept":"59","canton":"Avesnes-sur-Helpe","commune":"Avesnes","nom":"Avesnes","type":"Châteaux","periode":"XII-XVII","histoire":"AVESNES; les trois châteaux dans la même zone. Le château d'Avesnes-le-Sec appelé aussi le château de l'Abbaye Saint-Aubert est un château bâti à Avesnes-le-Sec, sa construction date du XVIIe au XIXe siècle. Il appartenait initialement à l'Abbaye Saint-Aubert de Cambrai. Sur un terrain qui leur appartenait et à l'emplacement de construction contemporaine de la tour, les moines de l'abbaye Saint-Aubert de Cambrai firent bâtir, en 1788, sous la prélature de Jean-François-Marie-Joseph Isebraut de Lendonck, le château d'Avesnes-le-Sec. La pierre de fondation qui se trouve dans une cave précise que l'édifice a été élevé sous la conduite et la direction du sieur Beauvais, maître charpentier et entrepreneur de la Ville de Cambrai. En 1887, elle a été acquise en bien propre par Marie-Adélaide Verkinder, épouse du député Ernest Déjardin. Le château d'Avesnes-le-Sec a été inscrit et classé partiellement le 21/09/1983.                                                                                    AVESNES SUR HELPE  Les fortifications bâtie, par  Guillemin. Elles sont inscrites aux M.H. depuis 1995 et classées depuis 1981. Les remparts datent du XVIe siècle et XVIIIe siècle (les fortifications Vauban »). Avant de devenir française, Avesnes possédait déjà des fortifications. Celles-ci devaient défendre la ville des envahisseurs français. Après l'intégration d'Avesnes-sur-Helpe au royaume de France, Vauban a amélioré les fortifications, grace à des travaux importants, qui durèrent de 1690 à 1723. Aujourd'hui, une partie des fortifications sont encore en place et certaines parties ont été restaurées.","architecture":"NICOLAS D'AVESNES, château féodal qui a appartenu à Nicolas d'Avesnes et qui relève du Hainaut. C'est un édifice roman du XIIe siècle. Il fut remanié en style phillipien au XVe siècle puis, sera transformé en arsenal à la fin du XVIIe siècle. Le château des Avesnes a bien changé. Autour du châtelet d'entrée, 5 tours philippiennes demeurent : la tour du Dragon ; la tour Mahaut (du nom de l'épouse de Nicolas d'Avesnes, Mahaut de Namur) ; la tour Nicolas, plus grosse que les autres, est posée sur le point de confluence de la Haine et l'Escaut ; une tour posée sur la courtine, entre la tour Nicolas et l'arche permettant à l'eau de l'Escaut, par un petit canal, de pénétrer dans l'enceinte jusqu'au pied du donjon. Nous l'appellerons « Tour de l'Escaut » la dernière tour en élévation, en triste état, se trouve près du moulin de Croÿ. Nous l'appellerons « la Tour du Moulin ». Depuis quelques années, le châtelet accueille des logements, à usage d'habitation. Cette surprenante construction ne manque pas de charme, rendant aux vieilles pierres, une fonction sociale, et permit de croire à une renaissance économique des lieux. Entre le châtelet d'entrée et la tour du Moulin, se trouve le moulin dit de Croÿ. Ce moulin à eau, construit ou reconstruit, entre 1484 et 1514, par Jean d'Oettingen, ne présentait pas à l'origine de tour « pigeonnier ». En 1775, le moulin fut remanié et se vit rajouter une tour. Après la Révolution, la Tour servit de pigeonnier, jusqu'à la Première Guerre Mondiale.","habitants":"Nicolas d'Avesnes \"","divers":"Abbaye  d' Avesnes le sec  Grav 1-2                     GPS : 50° 07 19\" Nord, 3° 55' 53\" Est                                                 Avesnes le sec GPS : 50° 15' 10\" Nord, 3° 22' 24\" Est                                                     Nicolas  grav 3 _Sirius-4 -5                                                GPS : 50° 26' 49\" Nord, 3° 35' 27\" Est","gps":"50° 07 19\" Nord, 3° 55' 53\" Est","images":["../image/image_59/59_Avesnes_1.jpg","../image/image_59/59_Avesnes_2.jpg","../image/image_59/59_Avesnes_3.jpg","../image/image_59/59_Avesnes_4.jpg","../image/image_59/59_Avesnes_5.jpg"]},"Consult_chateau_formulaire5619":{"id":"Consult_chateau_formulaire5619","dept":"59","canton":"Marly","commune":"Condé sur l","nom":"Bailleul_Condè","type":"Château","periode":"XIV-XV","histoire":"BAILLEUL,  deux seigneuries se partageaient la ville de Condé au Moyen-Age, la seigneurie gagère et la seigneurie propriétaire, dite de Bailleul, qui releva des familles de Condé Bailleul Moriamez jusqu'en 1391, puis de La Hamaide jusqu'en 1485, de Roghendorf en 1531, de Lallaing à partir de 1559 et enfin de Croy à partir de 1608 et jusqu'à la Révolution. Un premier château dépendant de cette seigneurie a  préexisté, le corps de bâtiment médiéval encore en place a été construit pour Jean de la Hamaide dans les années qui précèdent la date de 1411, autrefois portée en façade avec les armes de cette famille sur un écu toujours visible mais dont les reliefs ont été bûchés. Dès la fin du XVe siècle cette résidence est qualifiée d'hostel. En 1544, Christophe de Roghendorf réalise une orangerie . Au XVIe siècle que sont bâties l'aile de la rue de la Bibliothèque et celle de la rue de la Cavalerie, qui poursuivent le corps de bâtiment médiéval. Dans les années 1640, le couple Jeanne de Lallaing et Jean de Croy fait modifier l'aile de la rue de la Cavalerie, dont la façade arrière porte les armoiries des Lallaing et la date de 1643. Dans cette aile, les plafonds conservés attestent une datation de la deuxième moitié du XVIIe siècle, et un grand escalier, dit de Louis XIV en souvenir du séjour du roi en 1691, y est édifié à la fin du siècle. La famille de Croy fait aussi construire les trois ailes intérieures en retour, délimitant ainsi trois cours ; l'aile en retour nord est disparaît des plans entre 1727 et 1754. Au XVIIIe siècle, le château est régulièrement habité par les Croy ; Emmanuel de Croy, futur duc et maréchal, y naît. L'édifice abrite plusieurs appartements, les archives de la famille, des cabinets de curiosités ; la bibliothèque est conséquente, l'aile qui l'abrite fait l'objet d'un agrandissement de six pieds aux dépends de la rue adjacente, à laquelle elle donne son nom en 1784. Les appartements princiers se situent dans l'aile de la rue de la Cavalerie, l'appartement du Roy cité dans l'inventaire de 1745 s'étendait au premier étage du corps de logis médiéval.","architecture":"BAILLEUL bâti à Condé-sur-L-Escaut,  est appelé Chatelet de l'Hostel de Bailleul et date de 1411. Corps de bâtiment médiéval, à l'extrémité nord-ouest de la rue de la Cavalerie, façade donnant sur la place Verte : de plan massé, flanqué de quatre tourelles couvertes par des toits coniques (trois d'entre elles sont en encorbellement), il est édifié en grès, de moyen appareil sur les faces tournées vers la ville. à l'extrémité nord-ouest de la rue de la Cavalerie, façade donnant sur la place Verte : de plan massé, flanqué de quatre tourelles couvertes par des toits coniques (trois d'entre elles sont en encorbellement), il est édifié en grès, de moyen appareil sur les faces tournées vers la ville, en moellons sur l'arrière. Les voûtes décrites plus loin sont aussi en grès. L'encadrement des ouvertures et les croisées sont en pierre calcaire. En façade principale, les baies du rez-de-chaussée et du 1er étage sont closes par des châssis à petits bois, celles du 2e étage, des fenêtres à croisées de pierre, étant par contre articulées par des meneaux et traverses. La toiture à longs pans et croupes brisés se termine par un égout retroussé qui repose sur des corbeaux de pierre. Trois lucarnes en menuiserie à piedroits à volutes, couvertes par une croupe débordante, s'ouvrent vers la place Verte. L'ensemble des couvertures est en ardoise, à l'exclusion du côté vers place Verte, en feuilles bitumées. Un passage couvert, pavé, traverse le rez-de-chaussée en son centre Le château est classé aux M.H. depuis 1904 et 1987.","habitants":"Famille des  Croy \"","divers":"Bailleul  GPS : 50° 26' 58\" Nord, 3° 35' 26\" Est                                                             Hostel GPS : 50° 27' 00\" Nord, 3° 35' 29\" Est","gps":"50° 26' 58\" Nord, 3° 35' 26\" Est","images":["../image/image_59/59_Bailleul_fort_1.jpg"]},"Consult_chateau_formulairea72d":{"id":"Consult_chateau_formulairea72d","dept":"59","canton":"Sin-le-Noble","commune":"Somain en Ostrevent","nom":"Beaurepaire_Nord","type":"château","periode":"IX-XVII","histoire":"BEAUREPAIRE, une occasion de fêter ce rapprochement grâce au comité Jean le Messager qui propose, en accord avec la princesse et de la municipalité, la première édition de la fête du château qui honore ainsi le 47e  anniversaire de son inscription patrimoniale. Au programme de cette journée à la fois historique et festive, la déambulation effectuée par le camp médiéval avec la présentation des géants invités et de leur histoire. Laprès-midi seront proposés des scènes de combats, présentation de la glima (lutte scandinave ) à la princesse Gisèle et le château de Beaurepaire sont indissociables.","architecture":"BEAUREPAIRE le château de Beaurepaire sont indissociables. Néanmoins, la mascotte somainoise a accepté la cohabitation avec Jean le Messager, tout juste ressorti dun livre dhistoire et porté par le comité du même nom.Edifice de plan rectangulaire sur soubassement, à deux niveaux  et attiques  ( lucarnes sur combles, à deux niveaux).","habitants":"Famille de Charles le Chauve.\"","divers":"Château de Beaurepaire sur Sambre","gps":"","images":["../image/image_59/59_Beaurepaire_Nord_1.jpg"]},"Consult_chateau_formulairec9ce":{"id":"Consult_chateau_formulairec9ce","dept":"59","canton":"Fourmies","commune":"Beaurieux","nom":"Beaurieux","type":"Château","periode":"XVI-XVII","histoire":"trois châteaux dans cet article; Beaurieux, Berelles et de Solre le château à  l'Ouest                                                                                                                  BEAURIEUX,  la seigneurie relevait de la terre d'Avesnes et passa à Guillaume, comte de Fauquembergue, puis, vers 1620, à Jean de Robaulx, écuyer, gouverneur de Beaumont qui, en 1631 reçut ses lettres de noblesse du souverain Espagnol. Le château de Beaurieux fut reconstruit, de 1668 à 1671, conservant une tourelle, appartenant à l'ancien château-fort, détruit durant les guerres du roi de France Louis XIV. Le château de Beaurieux fut reconstruit en 1668 a perdu l'aile droite (Ouest) de l'U. Il a donc maintenant la forme d'un L. Rebâti sur les anciennes fondations et avec les matériaux anciens, il est évident que le percement des fenêtres sur les murs extérieurs (qui ne supportaient jadis que des meurtrières, la disparition de l'entrée voûtée et de sa herse, le remplacement regrettable des anciens toits de style « Flamand-Espagnol » et des fenêtres à meneaux par des toits et ouvertures style Louis XIV, lui ont enlevé une bonne partie de son charme d'antan. A l'intérieur du château de Beaurieux se trouve de belles tapisseries, et de beaux meubles, de style gothique au style XVIIIe siècle, ainsi que plusieurs tableaux de valeur, dont le portrait du maréchal de Villars, par Hyacinthe Rigaud, le portraitiste du roi Louis XIV. Le Parc, qui est postérieur à l'époque féodale, a conservé de très beaux arbres et une charmille, de toute beauté.                                                                                    SOLRE LE CHATEAU; Bien que ce soient les principaux bâtiments d'importance, il y a d'autres beaux bâtiments autour de la place, y compris le \"nouveau château\" en briques rouges et blanches à l'autre coin de la place, et d'autres dans les rues étroites autour du la place principale et le long de la Grand Rue.","architecture":"A 10 K.M.au Nord BERELLES le château a été reconstruit, en 1704, sur l'emplacement d'un ancien château-fort, qui appartenait au Baron du Sart de Molembaix. L'ancien château datait de XVIe mais fut détruit au XVIIe siècle. Le château de Berelles est composé de briques et pierres bleues, sauf les ajouts qui datent du XXe siècle, en ciment et béton. Le château de Bérelles, de forme quadrangulaire, est flanqué de 2 tours carrées, qui saillent du coté Nord. Un clocheton termine les toits. Ces tours sont coiffées dun toit en pavillon, avec un égout retroussé, comme cela existait à l'époque dans l'Avesnois. La façade du coté Sud, bâtie au XIXe siècle, est entièrement en briques, avec des baies en plein cintre. Les tours et la façade, situés du coté Nord, datent de 1704. Coté Sud, dans le parc, près du château, se trouve un oratoire de pierres bleues, qui date de 1809. Il existe aussi un collage moderne, entre les tours et la façade Nord, qui masque les anciens niveaux de soubassement. Le propriétaire actuel du château de Bérelles, Mr Ulysse Rouvière, fit apporter diverses transformations, dans les avènes, dans les bosquets, les prairies et les bois. Il fit aussi agrandir et muliplier les dépendances de la ferme. D'importants changements furent apporté aussi dans la maison d'habitation. Cet ancien château, à l'aspect sombre et mystérieur, a retrouvé depuis son charme d'antan. Pourvu depuis du confort moderne, le Château de Bérelles a su conserver son caractère particulier et toute sa beauté.","habitants":"Famille de  Jean de Robaulx\"","divers":"Beaurieux grav-1-2                                         GPS : 50° 10' 37,79\" Nord, 4° 7' 36,63\" Est                                               Berelles_ grav-5                                 -:GPS : 50° 12' 59\" Nord, 4° 05' 55\" Est                                                               Solre-2-3-4","gps":"50° 10' 37,79\" Nord, 4° 7' 36,63\" Est","images":["../image/image_59/59_Beaurieux_1.jpg","../image/image_59/59_Beaurieux_2.jpg","../image/image_59/59_Beaurieux_3.jpg","../image/image_59/59_Beaurieux_4.jpg","../image/image_59/59_Beaurieux_5.jpg"]},"Consult_chateau_formulaire063b":{"id":"Consult_chateau_formulaire063b","dept":"59","canton":"Thumeries","commune":"Thumeries","nom":"Beghin_Thumeries","type":"Château","periode":"XIX","histoire":"BEGHIN,  besoin d'un cadre d'exception pour votre évènement, le domaine du château de Beghin bénéficie d'un cadre exceptionnel, et vous propose un lieu inoubliable et chargé d'histoire, partagé entre son château luxueux et son parc verdoyant. Construit vers 1890, le château de Béghin se dresse fièrement au milieu d'un parc exceptionnel parmi des arbres centenaires. Il a appartenu à Joseph Béghin figure de la haute bourgeoise du Nord et aïeul du grand cinéaste Louis Malle né à Thumeries. Les 5 mots d'ordre du Domaine sont : Qualité : Chaque service que nous vous proposons est d'une qualite irréprochable.  Accueil : Notre equipe est specialisée dans l'évènementiel, son sens de l'accueil met tout de suite vos convives a l'aise.\nTransparence : Nous ne vous promettons pas ce que nous ne pouvons vous offrir. Sécurité : Un service de securite est présent et veille au bon deroulement de votre évènement.  Prestige : Fort d'un glorieux passé et de ses équipements haut de gamme, le domaine entretien une image de lieu de haut standing.","architecture":"Le Domaine du Château Beghin est un château bâti à Thumeries, Construit en 1890, le Château Beghin a appartenu à Joseph Béghin, personnage imporant de la haute bourgeoisie du Nord. Le Domaine du Château Beghin se dresse fièrement au milieu dun parc exceptionnel parmi les arbres centenaires. Vous pourrez y organiser votre mariage ou fêtez votre départ en retraite ou tout autre évènement en y louer une ou plusieurs salles. 250 convives peuvent être accueillis","habitants":"Famille de Joseph Beghin\"","divers":"GPS : 50° 28' 47\" Nord, 3° 03' 20\" Est","gps":"50° 28' 47\" Nord, 3° 03' 20\" Est","images":["../image/image_59/59_Beghin_Thumeries_1.jpg","../image/image_59/59_Beghin_Thumeries_2.jpg"]},"Consult_chateau_formulairee9b5":{"id":"Consult_chateau_formulairee9b5","dept":"59","canton":"Aulnoy-lez-Valenciennes","commune":"Bellaing","nom":"Bellaing_59","type":"château","periode":"XIX","histoire":"BELLAING, on ne sait que peu de chose de l'histoire de ce château et de ses possesseurs, si ce n'est que le fief de Bellaing existait au XIIe siècle, qu'il avait été taillé en pleine forêt de Vicoigne et qu'au XIIIe siècle Anselme de Bellaing favorisa sur ses terres l'abbaye portant ce nom. Sur le faît de ce qui devait être une ancienne motte féodale, dont les contours surélevés sont marqués et les fossés assez larges parcourus d'eaux vives, et, sur les fondations d'un château disparu du XVIIIe siècle, a été construite en 1859 une demeure dans le style classique.  La seigneurie est ensuite devenue la propriété des familles Du Chasteler, en 1312, Thurrut en 1415, de Succre de 1479 à 1710 avant d'entrer dans les possessions des Moreau de Bellaing au XVIIIe siècle. Les armoiries actuelles de Bellaing sont celles de la famille de Succre.","architecture":"BELLAING,  on ne sait que peu de chose de l'histoire de ce château et de ses possesseurs, si ce n'est que le fief de Bellaing existait au XIIe siècle. A été construite en 1859 une demeure dans le style classique. Celle-ci est constituée d'un corps de logis prolongé par deux ailes plus basses. Un avant-corps central fait saillie : un double corps plaqués sur un mur à refends encadre au rez-de-chaussée, une porte légèrement cintrée dont les montants sont moulurés et la clef dessine une volute; à l'étage, les pilastres ioniques sont cannelés et la fenêtre est couronnée d'un fronton cintré et armorié ; trois ils-de-buf, celui du centre encadré de volutes et couronné par un larmier saillant, aèrent les combles formés par une pyramide tronquée. De part et d'autre de cet axe médian, le logis est long de deux travées; la construction a été réalisée en brique et pierre. Les deux travées extrêmes forment deux étroits pavillons délimités par des pierres à refends; leur fenêtre d'étage a été gratifiée d'un fronton cintré timbré d'un cartouche.","habitants":"familles Du Chasteler\"","divers":"Château et vestiges du château de Bellaing","gps":"","images":["../image/image_59/59_Bellaing_59_1.jpg","../image/image_59/59_Bellaing_59_2.jpg"]},"Consult_chateau_formulairee45c":{"id":"Consult_chateau_formulairee45c","dept":"59","canton":"Aulnoye-Aymeries","commune":"Bellignies","nom":"Bellignies","type":"Château","periode":"XVIII","histoire":"Deux châteaux dans cet article; Bellignies et la Capelle-Béron.              BELLIGNIES,  le château était une place forte au Moyen-Age, ce dont témoigne la tour Le Bel, datant du XIIIe siècle. A partir du XVe siècle changea souvent de mains passant des Archies aux Berlaimont, aux Croÿ et aux Chastelaire qui le conservèrent jusqu'à la Révolution; marquis  puis marèchal  au services de l'Autriche, ses biens furent confisqués. Il n'en reprit possession qu'après la tourmente. Puis par alliance aux Molenbaix fut à la fin du siècle dernier acquis par la princesse Alfred-Emmanuel de Croÿ. Grand-mère des propriétaires actuelles, le seigneur de Bellignies, décède le 26/08/1652. Marié à Gertrude Françoise d'Andelot, décédée le 29/09/1669, elle est inhumée à Bellignies, elle était la fille de Gertrude d'Andelot, dame de Bellignies. Bonne Jeanne Françoise du Chasteler, leur fille, héritière du château de Bellignies, comtesse de Hertaing. mariée, par contrat du 21/10/1679, à Philippe de la Tramerie, comte de Hertaing. elle décède le 26/04/1706. Durant la guerre 14-18, la princesse Marie de Croÿ aidait de son frère le prince Réginald à passer des habitants du village en Hollande furent déportés et condamnés à mort par contumace parvint à gagner la Hollande .   Aujourd'hui  appartient   aux princesses Yolande et Diane de Croÿ.                                                                                                                                  La CAPELLE à Prélevé Béron château propriété de l'EDF -Gdf  et cgt, de plan rectangulaire à deux niveaux sur soubassement, toit à la mansart à cinq travées, avec lucarnes et  fronton triangulaire au dessus de l'entrée  avec colonnes d'ordre colossal à chapiteaux ioniques et toute les fenêtres du 1er étage à arceau cintré hôtel restaurant;","architecture":"BELLIGNIES, la construction date XVIIIe siècle. Sa tour est du XIIIe siècle. Gabriel Jean du Chasteler, fut seigneur de Bellignies,  Le château est classé aux M.H. ainsi que le parc du château. Le Château de Bellignies est privé, fermé au Public, château composé d'un corps de bâtiment principal et de deux ailes disposées en équerre. Le donjon est inséré dans l'angle reliant l'aile principale nord et l'aile ouest. L'élévation antérieure est composée de 9 travées; des pilastres scandent les trois travées centrales. L'élévation comprend trois niveaux et un étage de comble, couverts d'une croupe brisée. L'aile Est prolonge le corps principal. L'aile ouest s'élève sur deux niveaux, couverts d'une croupe. L'élévation postérieure est surélevée, desservie par un escalier extérieur droit. Tour en moellon de pierre calcaire, terminée par des rangées de brique, coiffée d'un toit en pavillon percé de lucarnes. La dépendance porte la date de 1679. La ferme a été partiellement réaménagée mais a conservé les écuries et les mangeoires de pierre calcaire.","habitants":"Famille de  Gabriel Jean du Chasteler\"","divers":"Deux châteaux dans cet article; Bellignies et la Capelle-Béron               GPS : 50° 20' 0,28\" Nord, 3° 45' 38,53\" Est","gps":"50° 20' 0,28\" Nord, 3° 45' 38,53\" Est","images":["../image/image_59/59_Bellignies_1.jpg","../image/image_59/59_Bellignies_2.jpg","../image/image_59/59_Bellignies_3.jpg","../image/image_59/59_Bellignies_4.jpg","../image/image_59/59_Bellignies_5.jpg"]},"Consult_chateau_formulaire3cf4":{"id":"Consult_chateau_formulaire3cf4","dept":"59","canton":"Coudekerque-Branche","commune":"Bergues","nom":"Bergues_59","type":"Château","periode":"XVII","histoire":"Deux châteaux dans cet article; Bergues et Mont de Piété,                             BERGUES,  fortifié depuis l'an 882 et démilitarisé seulement en 1946, Bergues offre à ses visiteurs un remarquable ensemble de fortifications, avec des éléments significatifs des XIIIe, au XVIIIe siècle\nPortes, tours, bastions et courtines se mirent dans l'eau des douves où se faufilent sous les ombrages.  Pour vous aider à découvrir cet ensemble unique, un parcours est distribué gratuitement à l'office de tourisme. De la sueur pour économiser du sang, telle est la volonté de Sébastien Le Prestre, marquis de Vauban,   Entièrement corsetée de remparts, médiévaux  dus à Vauban, la ville est blottie au pied de son beffroi, classé au Patrimoine mondial de lHumanité par lU.N.E.S.C.O.","architecture":"BERGUES ,  sur la colline, les ruines dune abbaye bénédictine montent la garde alors que son musée du Mont-de-Piété dévoile ses collections. Que ce soit au niveau de ses façades, de ses places, de ses traditions, Bergues est un Village étape sur lequel le temps ne semble pas avoir demprise. Son patrimoine, sa gastronomie, sa convivialité et son environnement sauront vous retenir dans « lautre Bruges des Flandres ».La cité est rythmée par son carillon qui égrène tous les quarts dheure mais aussi lorsquil sonne de ses cinquante cloches pour le marché ou les fêtes comme le Carnaval, les Rameaux, le Feu de la Saint-Jean ou lors des spectacles nocturnes (fin avril et fin septembre). Ne loupez pas aussi « Les plus beaux dimanches de Bergues » L'ancien Mont-de-Piété est un bâtiment bâti à Bergues,  Il est classé le 28/12/1907 aux M.H. L'ancien Mont de Piété de Bergues est aujourd'hui la propriété de la commune de Bergues. est devenu le Musée Municipal ouvert au Public.","habitants":"Seigneurs locaux\"","divers":"Deux châteaux dans cet article; Bergues et Mont de pieté grav-6                        .GPS : 50° 58' 00\" Nord, 2° 26' 00\" Est","gps":"50° 58' 00\" Nord, 2° 26' 00\" Est","images":["../image/image_59/59_Bergues_59_1.jpg","../image/image_59/59_Bergues_59_2.jpg","../image/image_59/59_Bergues_59_3.jpg","../image/image_59/59_Bergues_59_4.jpg","../image/image_59/59_Bergues_59_5.jpg","../image/image_59/59_Bergues_59_6.jpg"]},"Consult_chateau_formulairef01a":{"id":"Consult_chateau_formulairef01a","dept":"59","canton":"Templeuve-en-Pévèle","commune":"Bersée","nom":"Bersée","type":"Forteresse","periode":"XV","histoire":"MONTMORENCY, aux Bersée jusqu'au XVe siècle, aux Montmorency du XVe siècle jusqu'en 1699, la seigneurie passe ensuite à P. A. de Lannoy, seigneur de Fretin, puis est vendue au sieur Fiévet, négociant douaisien. Le château est situé sur une motte carrée ceinte de douves. Un petit pavillon couvert d'ardoises s'élève de chaque côté du pont d'accès à triple arcade de pierre. La façade nord, derrière une cour pavée, présente cinq fenêtres au rez-de-chaussée, six à l'étage et six en toiture. Un il-de-buf surmonte chacune des deux portes latérales. Une pierre, au-dessus de la porte de la façade ouest, indique le millésime 1615. La façade sud, donnant sur le parc, est percée de six fenêtres à chaque niveau. Aux deux extrémités, une tour circulaire comprenant une fenêtre à chaque étage et une toiture conique. L'ensemble est en briques revêtues d'un ciment blanchi. Les bases en grès et les toitures en ardoises. Près des dépendances, en brique et couvertes de tuiles, s'ouvre à droite un portail composé de deux piliers en pierre calcaire agrémentés chacun d'une console.","architecture":"ARGERIE à Bersée                                                                                                             BERSEE, la construction du château  date du XVe siècle, pour la famille de Montmorency. En 1615, il fut reconstruit  devenant un imposant édifice, avec une haute tour d'entrée et des bâtiments divers, en pierre et briques, couverts en ardoises, entouré d'eau et de jardins. Des transformations seront réalisées au cours du XVIIe siècle. Il fut dessiné, en 1705, par le Géomètre Darles. Puis au XVIIIe siècle, le château de Bercée est peu à peu diminué et réduit à un logis flanqué de 2 tours rondes coiffées en poivrières. Le château de Bersée est devenu depuis un château privé, fermé au Public, visible toutefois de l'allée du château. Il existe aussi les ruines du château d'Argérie sur la commune de Bersée à découvrir.","habitants":"Famille de Montmorency\"","divers":"Bersée grav-1 Montmorency grav 2-3","gps":"","images":["../image/image_59/59_Bers%c3%a9e_1.jpg","../image/image_59/59_Bers%c3%a9e_2.jpg","../image/image_59/59_Bers%c3%a9e_3.jpg"]},"Consult_chateau_formulairee2b7-2":{"id":"Consult_chateau_formulairee2b7-2","dept":"59","canton":"Wormhout","commune":"Quaëdypre","nom":"Blauwhuys","type":"Château","periode":"XVI-XVII","histoire":"BLAUWHUYS, par son mariage, en 1675, avec Marie-Madeleine Tassche, Jacques Dehau transmit à son fils, Pierre Winoc Dominique, puis à son petit-fils, Winoc-Antoine-Dominique, sieur de Staplande, une terre qu'un dénombrement de 1758 qualifiera d'amaisonnée et appellera le fief de la \"maison bleue\", traduction dans la langue administrative du mot flamand Blauwhuys. Au dernier cité, on doit les aménagements du XVIIIe siècle dont la chapelle datée1742; au premier et à son épouse, certainement les premières constructions caractéristiques du XVIIe siècle. La propriété, très bien conservée jusque-là, subit divers dommages pendant la guerre de 1939-45; les bombes ont détruit les pilastres d'entrée sur la route et le garde corps du pont sur les douves. Une longue drève plantée d'arbres mène de la grand-route à une aire commune à la ferme et au château, qui se loge dans un quadrilatère qu'isolent des douves. Le logis principal occupe sur trois niveaux le côté nord. Aux angles opposés se dressent deux tourelles carrées d'égale hauteur; elles sont coiffées d'un toit à quatre pentes qui se retroussent en égout.Éléments protégés MH : les façades et les toitures, les piliers de l'entrée et le muret bordant la cour avec ses quatre statues, les douves : inscription par arrêté du 30 mars 1978.","architecture":"BLAUWHUYS, la construction du Manoir date du XVIe au XVIIe siècle. Disposé en U autour d'une courette. La chapelle a été rebâtie en 1752 (date inscrite sur la clef de l'arc de couvrement de la porte). La Grange remonte à 1754 (date gravée sur une pierre enchâssée dans un des pignons), le logis de la ferme et les étables ont été construits au cours de la même campagne. Les éléments protégés du manoir Le Blauwhuys sont ses façades et toitures, les piliers de l'entrée et le muret bordant la cour avec ses 4 statues et ses douves. Le château est inscrit aux M.H. depuis le 30/03/1978, le manoir Blauwhuys est privé et fermé au Public.","habitants":"Famille de Pierre Winoc Dominique,\"","divers":"GPS : 50° 56' 44\" Nord, 2° 26' 11\" Est","gps":"50° 56' 44\" Nord, 2° 26' 11\" Est","images":["../image/image_59/59_Blauwhuys_1.jpg","../image/image_59/59_Blauwhuys_2.jpg"]},"Consult_chateau_formulaire7aae":{"id":"Consult_chateau_formulaire7aae","dept":"59","canton":"Lille","commune":"Bondues","nom":"Bondues_Vert_Bois","type":"Châteaux","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article; Vert Bois et la Vignes.                                   VERT-BOIS, le domaine du Vert Bois est attesté depuis le Moyen-Age. La conciergerie et le château datent du XVIIe et XVIIIe siècles. La conciergerie illustre le style régional. Entouré de douves, le château du Vert Bois  s'impose par son architecture classique française. Quatres pavillons l'entourent: le pavillon de Flore, la chapelle et deux Pavillons Chinois. Restauré, Vert-Bois présente des collections de peintures, sculptures, mobilier, orfèvrerie pour la plupart du XVIIIe siècle.  En 1576 La seigneurie est acquise par Guillaume Delot, par alliance passe au XVIIIe siècle aux Fourmenstreaux.  qui prennent le nom de  Wazières. après le décés du comte de Wazières  en 1856 leur fils se sépare du domaine  au profit des Duchochois succèdent par alliance les Deverny puis les Prouvot. En 1937, après la mort de sa mère, Albert-Eugène Prouvost décide de s'y installer. L'arrière-grand-mère d'Albert Prouvost Mme Devemy avait planté des arbres rares, noyer d'Amérique, sophora du Japon, tulipier.  Les jardins sont confiés à Russel Page. Grâce à la modestie de ce paysagiste, et quelques documents antérieurs à la construction de la maison, il restaure le tracé des douves, le jardin de pierre au Nord et les ponts.  Éléments protégés MH : les façades et les toitures du château, de la conciergerie, des deux pavillons à usage de chapelle et de salle de jeux ; le sol des parterres : inscription par arrêté du 17 décembre 1962. Les deux pavillons chinois à proximité immédiate du château : inscription par arrêté du 8 avril 1987.","architecture":"La VIGNES, le château a été construit en 1777, comme l'indique une inscription sur pierre retrouvée sur les plans de l'architecte Lesaffre. Le premier propriétaire fut Michel-Eugène-Joseph Aronio de Romblay, écuyer; ses armes au fronton de l'édifice ont été martelées à la Révolution. Sous la Restauration, son héritière épousa le comte Charles Constant de Hamel Bellenglise qui était devenu garde du corps de Louis XVIII après avoir servi dans l'armée des Princes. Par le mariage de sa fille, le château passa dans la famille de la Serre jusqu'en 1937. Il fut alors vendu à un fermier qui le transforma en grange, le dépouilla de toute sa décoration intérieure; son parc fut rasé pour être converti en terre de culture. Ce vandalisme prit fin en 1967 avec le rachat de la propriété par la société du château de la Vigne. Des travaux de restauration ont été entrepris sous la direction de M. Guy Jourdin, architecte. La rampe d'escalier qui avait été vendue à un médecin lillois a pu reprendre sa place. Le château est de plan rectangulaire en pierre et brique que prolongent deux ailes basses. Long de sept travées sur une épaisseur de cinq, sa façade latérale de gauche n'est éclairée que par trois fenêtres. Son frontispice principal est élevé sur un soubassement de pierre. Une toiture à la Mansart couvre le bâtiment; la lucarne centrale est plus importante que les autres, mais toutes ont été traitées en il-de-buf.   Restaurant et club house de golf.","habitants":"Verts-Bois   Famille de Albert-Eugène Prouvost               Vignes-Michel-Eugène-Joseph Aronio de Romblay, \"","divers":"Deux châteaux dans cet article; Vert Bois grav1-2-5-6 et la Vignes grav 3-4.      Vert-bois  GPS : 50° 42' 43\" Nord, 3° 06' 53\" Est                                                      Vigne GPS : 50° 42' 08\" Nord, 3° 05' 38\" Est","gps":"50° 42' 43\" Nord, 3° 06' 53\" Est","images":["../image/image_59/59_Bondues_Vert_Bois_1.jpg","../image/image_59/59_Bondues_Vert_Bois_2.jpg","../image/image_59/59_Bondues_Vert_Bois_3.jpg","../image/image_59/59_Bondues_Vert_Bois_4.jpg","../image/image_59/59_Bondues_Vert_Bois_5.jpg","../image/image_59/59_Bondues_Vert_Bois_6.jpg","../image/image_59/59_Bondues_Vert_Bois_7.jpg"]},"Consult_chateau_formulaired9c0":{"id":"Consult_chateau_formulaired9c0","dept":"59","canton":"Douai","commune":"Ostrevent","nom":"Bouchain","type":"Forteresse","periode":"XII","histoire":"BOUCHAIN  ,la Tour dOstrevant  construite en 1164 par Bauduin IV, dit « lédifieur », comte de Hainaut, ce donjon servait aussi, au XIVe siècle de tour de guet où, des hommes darmes, fournis tour à tour, par les villages dOstrevant, veillaient jour et nuit à la sécurité de la ville et ses environs.\nAyant subit les dégradations de sièges successifs, ce donjon est transformé, sous Charles Quint en élément darchitecture militaire. Intégré à lenceinte fortifiée, il est arasé, ouvert et aménagé partiellement en prison au rez-de-chaussée. Enchemisé pour renforcer ses parois et rempli de terre, il prend laspect dun gros cube haut de 15 mètres. Sa partie supérieure est un cavalier pouvant recevoir des pièces dartillerie ; on y trouve aussi, une petite tour de guet et un campanile (visible sur la gravure de Croÿ) pour la sécurité locale ainsi que louverture et la fermeture des portes chaque jour.  Entre 1738 et 1740, on vide la terre quil contenait pour y construire sur 3 niveaux, les splendides cloisonnements voûtés que lon peut admirer actuellement.   La tour dOstrevant a servi de prison jusquen 1918.   En 1939, le 3ème Corps dArmée, commandé par le  général de la Laurencie, couvre la Tour dune chape de béton armé en y incorporant une tourelle blindée dobservation. Au cours des combats de 1940, cette position, tenue par le 45° RI  Lieutenant Sabatier  a joué un rôle important dans la défense de la Ville Haute.","architecture":"BOUCHAIN*  devenue  un Musée dOstrevant,  Le musée de Bouchain, labellisé Musée de France, est situé dans la tour dOstrevant, construite au XIIe siècle, classée Monument Historique. Autant les angles de cette façade sont arrondis, autant ceux de l'autre coté sont anguleux, et surtout renforcés par des \"tours d'angle\".  A moins que cela soit des renforts comme au XIe siècle. Que de contrastes dans ce donjon qui de loin paraissait simple .Les curiosités architecturales ne manquent pas sur cette tour. Par exemple les pierres ont une taille et une nature différentes. Bouchain Musée de Bouchain. Le musée de la tour d'Ostrevant abrite de riches collections: les statues du Xe siècle de l'Eglise d'Hordain, les oeuvres d'art de l'ancienne église de Bouchain détruite par la seconde guerre mondiale, un intéressant ensemble d'objets relatant la vie au début du XXe siècle, avec des points forts sur la vie rurale et la construction de péniches en bois. L'intense histoire militaire de la ville (19 sièges subits) est retracée au travers d'objets (uniformes et armes) et de documents (affiches, photographies ). Depuis l'histoire militaire de l'ancienne place forte jusqu'aux combats de Mai 1940, du véritable inventeur du téléphone à la batellerie fluviale, des objets d'art sacré de l'ancienne église aux ustensiles de la vie courante locale, le musée associatif de Bouchain, sis dans sa Tour (classée Monument historique), traverse l'histoire de la capitale du comté d'Ostrevant. La visite permet aussi de découvrir les vestiges de ce donjon du XIIe siècle, transformé en bâtiment militaire dès 1532. Bastion et courtine.","habitants":"Le comte de Hainaut\"","divers":"Vestiges du château de Bouchain","gps":"","images":["../image/image_59/59_Bouchain_1.jpg","../image/image_59/59_Bouchain_2.jpg","../image/image_59/59_Bouchain_3.jpg"]},"Consult_chateau_formulaire4a74":{"id":"Consult_chateau_formulaire4a74","dept":"59","canton":"Templeuve-en-Pévèle","commune":"Bourghelles","nom":"Bourghelles","type":"Château","periode":"XVII-XIX","histoire":"BOURGHELLES,  la seigneurie de Bourghelles fut acquise par un petit noble brabançonnais en 1698. Au début du XVIIIe siècle, il édifia un château non loin de la motte féodale du castel bâti au Moyen-Age mais qui n'existait plus au XVIIe siècle. Le château comprenait deux mottes entourées de douves avec, sur la première, une exploitation agricole, et sur la deuxième, des jardins d'agrément. La demeure actuelle est une reconstruction de la fin du XIXe et du début du XXe siècle, avec réemploi d'éléments anciens.  Château qui a été donné en héritage à l'Hospice Comtesse de Lille. Dans son parc boisé limité par plusieurs belles grilles du XVIIIe siècle se trouve une motte castrale de forme carrée qui pourrait dater du Xe siècle. Le château comporte encore des caves voûtées et des salons avec des boiseries sculptées.","architecture":"BOURGHELLES,  château de plan rectangulaire complété par deux ailes à quatre niveaux : soubassement, rez-de-chaussée, étage, greniers. La façade du côté parc comprend neuf fenêtres au rez-de-chaussée et à l'étage, et un escalier à double révolution. Les ailes ont chacune leur entrée dont la porte est surmontée d'un vase et autres motifs en haut relief. De grandes ardoises carrées recouvrent la charpente, tandis que trois escaliers métalliques défigurent les façades et rappellent que le domaine fut utilisé comme centre de colonies de vacances. A l'intérieur, les cuisines présent un four à pain, on remarquera les plaques anciennes dans les âtres à l'étage, ainsi que les caves voûtées. Le parc, outre les douves, les bois et les vestiges d'anciennes dépendances, recèle la motte entourée d'eau de l'ancien château féodal.","habitants":"Seigneur local\"","divers":"Bourghelles  50° 33' 56? nord, 3° 14' 39? est","gps":"","images":["../image/image_59/59_Bourghelles_1.jpg","../image/image_59/59_Bourghelles_2.jpg","../image/image_59/59_Bourghelles_3.jpg"]},"Consult_chateau_formulairea5dd":{"id":"Consult_chateau_formulairea5dd","dept":"59","canton":"Wormhout","commune":"West-Cappel,","nom":"Briarde","type":"Château","periode":"XV","histoire":"La BRIARDE; château construit après 1502, date de l'érection de la terre de West-Cappel en seigneurie; Robert de Cappel conseiller et maître d'hôtel du duc de Bourgogne, qui fit construire le château \nqui passa au début du XVe siècle à la fille du fondateur de la chapelle, mariée à Gauthier de Hallewyn, vers 1502 a était cédée à Denis de Morbecque, à qui Philippe le Beau accordait le droit de haute, basse et moyenne justice sur le fief, moyennant quoi le châtelain s'engageait  à faire accoutrer et fortifier le château pour ce qu'il est situé en frontière. Le domaine parvient par mariage aux Recourt, puis par vente, d'abord aux Oberholzer, en 1717 à la famille de Mollien-Taverne de Colnetet avant la Révolution aux Van Cappel. On y trouve ensuite les Halewyn, les Lyons de Feuchin et les Chocqueel. Le 28 mai 1940 le château retrouvait sa vocation défensive. La propriétaire actuelle est madame Georges Deleplanque-Chocqueel.","architecture":"BRIARDE, arasement des tourelles d'angle pendant la Révolution; démolition partielle, respectant sans doute le gros-oeuvre, et reconstruction du corps de logis entre 1847 et 1850, daté par source, en style gothique troubadour; porterie élevée en 1871; pont en maçonnerie en 1874; porche du pont Levis en 1875 toutes dates portées par les dites bâtisses, toit à croupe sur le corps de bâtiment avec toit conique sur les tourelles d'angle et toit en pavillon sur le porche du pont-levis, couverture d'ardoise, sous-sol couvert de voûtes en berceau segmentaire à lunettes; ferme : toit à longs pans, pignon découvert, couverture de tuile flamande ; porterie : couverture d'ardoise.  la construction du château date du XVe, du 4ème quart du XVIIIe, et du milieu du XIXe siècle.  Fut transformé à la fin du XVIIIe siècle, puis il fut complètement rénové, vers le milieu du XIXe siècle, ainsi que son décor de papier peint.  Est composé de briques de sable jaune et entouré de douves. Élégant, habité et bien entretenu, il présente un bel exemple du type manoir flamand dans un vaste parc qui lui donne un aspect romantique, à été fortement remanié au XIXe siècle. Il a été inscrit aux M.H. partiellement depuis le 27/01/1993. Le château de Briarde est classé aux M.H. depuis le 10/01/1995, pour ses douves, le salon et son décor intérieur. Est aujourd'hui la propriété d'une société civile immobilière. Éléments protégés MH : les façades et les toitures du château proprement dites à l'exclusion de l'aile Est; les douves : inscription par arrêté du 27 janvier 1993. Le salon avec ses papiers peints, situé au rez-de-chaussée, dans le corps de logis principal : classement par arrêté du 10 janvier 1995.","habitants":"Seigneur locale\"","divers":"GPS : 50° 55' 46\" Nord, 2° 30' 33\" Est","gps":"50° 55' 46\" Nord, 2° 30' 33\" Est","images":["../image/image_59/59_Briarde_1.jpg","../image/image_59/59_Briarde_2.jpg"]},"Consult_chateau_formulaire077f":{"id":"Consult_chateau_formulaire077f","dept":"59","canton":"Le Cateau-Cambrésis","commune":"Busigny","nom":"Busigny","type":"Château","periode":"XVIII","histoire":"BUSIGNY . En 1805, le Château de Busigny devient la propriété de l'épouse du général d'Empire Jean Rapp. Il fut démoli, en 1972, à l'exception de ses tours. Les vestiges du château de Busigny sont inscrits aux M.H. 1978. Le château de Busigny est construit pour le baron Jacques de Hannecart.  Aujourdhui il est la propriété  du couple Colpaert-Duva.  Éléments protégés MH : les façades et les toitures des deux tours subsistantes : inscription par arrêté du 20 mars 1975.","architecture":"BUSIGNY,  il est un château fort bâti à Busigny,  La construction  date du Moyen Age au XVIIIe siècle. On y accède par la rue Pasteur. Il date de 1978. Deux tours, datant de la seconde moitié du XVIIIe siècle, sont les seuls vestiges de l'ancien château de Busigny, construit pour le Baron Jacques de Hannecart, après la destruction du précédent, édifié à la fin du XIIe siècle, suite à un incendie vers 1755. De style Renaissance, il se composait d'une construction centrale flanquée de deux ailes terminées chacune par une tour carrée. Il présente alors une construction centrale comprenant deux ailes avec étages, terminées chacune par une tour carrée. Seules les deux tours carrées subsistent aujourd'hui.","habitants":"Général d'Empire Jean Rapp. \"","divers":"Busigny;          GPS : 50° 01' 56\" Nord, 3° 28' 10\" Est","gps":"50° 01' 56\" Nord, 3° 28' 10\" Est","images":["../image/image_59/59_Busigny_1.jpg","../image/image_59/59_Busigny_2.jpg","../image/image_59/59_Busigny_3.jpg"]},"Consult_chateau_formulaire7ef7":{"id":"Consult_chateau_formulaire7ef7","dept":"59","canton":"Cambrai","commune":"Cambrai","nom":"Cambrai_Lamotte_59","type":"Château","periode":"XVI-XIX-XX","histoire":"Deux châteaux dans cet article; la Motte-Fénelon et st-Sépulcre.                    LA MOTTE-FENELON   a été construit en 1850 dans le marais de Morenchies par Alphonse Brabant, fondateur de la blanchisserie de Saint-Roch. Passé par héritage à la famille de la Motte Saint Pierre, le bâtiment est devenu propriété de la maison familiale de Cambrai qui l'a restauré en 1974. Son nom fait référence au patronyme des anciens propriétaires et au patronage de l'illustre archevêque de Cambrai. L'édifice est de style néo-classique. Il est construit en pierre blanche sur des soubassements en pierre grise de Soignies. Sa façade présente un perron en avancée et un petit fronton triangulaire surmonte sa partie centale. Le parc a été remis en état et aménagé. Le château dit de Morenchies depuis 1971. Il deviendra d'abord le château de la Motte Saint-Pierre, lors du mariage d'Anne avec Guy de la Motte Saint-Pierre. En 1962, il est racheté par le groupe maison Familiale. Le château est inauguré en 1975 sous l'identité qu'on lui connaît actuellement : le château de la Motte Fénelon (du nom des anciens propriétaires : monsieur de la Motte Saint-Pierre et de l'archevêque de Cambrai, François de Salignac de la Mothe Fénelon, dit Fénelon).Sa construction en pierre blanche de Creil a été très difficile. En effet, il a fallut, en raison du terrain marécageux, le bâtir sur pilotis de chêne et Hittorff conçut de vastes sous sols pour l'isoler davantage. Ces sous-sols ont été faits de pierres grises de Solesmes. Quant à l'architecture, « le rez-de-chaussée à bossage rustique est doté de baies en plein cintre et le premier étage d'ouvertures rectangulaires. Les dessins cotés pour le lambrissage des murs ont été mis en uvre avec une précision rigoureuse. » Le château « abrite ainsi l'un des rares aménagements conçus par Hittorff, encore visible à ce jour. » En effet, certains autres aspects de la demeure ont été endommagés par les guerres. Transformé en hôtel restaurant .","architecture":"ST-SEPULCRE, appelé parfois château Ramette, ou improprement château Fénelon, cette demeure est l'ancienne maison de campagne des Bénédictins du Saint-Sépulcre de Cambrai. Reconstruite en 1705 par dom Joseph Dambrinne, abbé du monastère, qui réalisa également l'abbatiale (cathédrale actuelle) et les bâtimertts conventuels, elle est un des rares vestiges intacts de l'architecture cambrésienne. Traité comme une demeure de plaisance, implanté dans un parc bien ordonné, l'édifice possède des façades intéressantes, entièrement en pierre blanche. La façade principale, côté cour, flanquée des pavillons des communs, est raidie par huit jambes à bossages. Sa partie centrale présente une porte en arc de cercle plat surmontée d'un balcon avec garde corps en fer forgé, le tout dominé par un fronton courbe orné. La façade postérieure, côté jardin, est organisée suivant le même schéma, mais ici sans fronton. D'épais contreforts, à mi-hauteur, soutiennent le bâtiment qui, construit sur un terrain marécageux, menaçait de s'effondrer.Éléments protégés MH : les façades et les toitures du château, du pavillon d'entrée, des deux pavillons des communs ; le sol de la cour, du parterre ; les douves : inscription par arrêté du 8 mai 1964.","habitants":"Famille de la Motte Fénelon                                       St-Sépulcre  famille de l\"abbé joseph Dambrinne\"","divers":"Palais grav_5 GPS : 50° 10' 36\" Nord, 3° 14' 08\" Est                                                      La Motte Fénelon          grav 1 à 4 50° 11' 30? nord, 3° 14' 37? est","gps":"50° 10' 36\" Nord, 3° 14' 08\" Est","images":["../image/image_59/59_Cambrai_Lamotte_59_1.jpg","../image/image_59/59_Cambrai_Lamotte_59_2.jpg","../image/image_59/59_Cambrai_Lamotte_59_3.jpg","../image/image_59/59_Cambrai_Lamotte_59_4.jpg","../image/image_59/59_Cambrai_Lamotte_59_5.jpg","../image/image_59/59_Cambrai_Lamotte_59_6.jpg"]},"Consult_chateau_formulairee50e":{"id":"Consult_chateau_formulairee50e","dept":"59","canton":"Templeuve-en-Pévèle","commune":"Cappelle_en_Pévèle","nom":"Cappelle_Pévèle","type":"château","periode":"XVIII","histoire":"BERON Propriété des activités sociales dEDF-GDF, le château du Béron vient dêtre acheté par un couple dOrchésiens qui va le métamorphoser en temple du tourisme vert, avec salles de réception, gîtes et studios meublés. Une nouvelle vie pour ce site de 11,7 ha avec des travaux qui ont commencent","architecture":"BERON du XVIIIe slècle, de plan rectangulaire à deux niveaux sur soubassement   avec  toit à la Mansart","habitants":"Responsables industriels\"","divers":"Château de Béron de Capelle en Pélevé","gps":"","images":["../image/image_59/59_Cappelle_P%c3%a9v%c3%a8le_1.jpg","../image/image_59/59_Cappelle_P%c3%a9v%c3%a8le_2.jpg","../image/image_59/59_Cappelle_P%c3%a9v%c3%a8le_3.jpg"]},"Consult_chateau_formulairebc7b":{"id":"Consult_chateau_formulairebc7b","dept":"59","canton":"Aulnoye-Aymeries","commune":"Gommegnies","nom":"Carnoy","type":"Château","periode":"XIX","histoire":"CARNOY, le château du Carnoy est la maison natale de Célestin Hennion, directeur de la sûreté générale, nommé par Clemenceau. Préfet de police, il créa en 1905 la police judiciaire et la mutuelle des cadres de la police. Il est connu comme le père des Brigades du Tigre. Des cartes postales de la fin du XIXe siècle, l'examen du cadastre de 1897, ainsi que l'analyse stylistique du bâtiment, permettent de comprendre les travaux d'agrandissement et d'embellissement effectués à l'instigation de Célestin Hennion. Le cadastre de 1897 présente le plan d'un bâtiment très proche de celui visible aujourd'hui .","architecture":"CARNOY, face à la place de la mairie, le château a été construit non loin d'un ancien château aujourd'hui réduit à quelques vestiges souterrains.; les transformations ont donc eu lieu avant cette date. Le rez-de-chaussée du bâtiment sur rue date des années 1840-1850  et un étage carré est rajouté dans les années 1890, ainsi que le corps de bâtiment accolé au premier, situé dans son prolongement. Les propriétaires actuels, après avoir racheté la maison dans les années 1960, ont retrouvé dans le grenier le plâtre original de Moreau-Vauthier représentant un buste de Célestin Hennion. Il servit à l'exécution d'un monument en bronze érigé en 1923 à Gommegnies à la gloire du célèbre fondateur des brigades du Tigre. Placé contre le pignon de la mairie, le monument a disparu lors de l'occupation allemande, durant la seconde guerre mondiale.  Implantée perpendiculairement à la voie, l'ancienne demeure était en rez-de-chaussée avec un étage de combles et des lucarnes passantes, et un retour sur la cour. Lors de l'agrandissement des années 1890, suivant l'ascension de la carrière de Célestin Hennion, le bâtiment a été surélévé d'un étage à cinq travées et un second bâtiment communicant avec le premier lui a été accolé. Celui-ci est agrémenté de deux échauguettes, dont l'une permet la communication à l'étage entre les deux logis.","habitants":"Famille de  de Célestin Hennion\"","divers":"château  à Carnoy","gps":"","images":["../image/image_59/59_Carnoy_1.jpg","../image/image_59/59_Carnoy_2.jpg"]},"Consult_chateau_formulaire4f22":{"id":"Consult_chateau_formulaire4f22","dept":"59","canton":"Bailleul","commune":"Cassel-Oxélaère","nom":"Cassel_Hamer_Houck","type":"châteaux","periode":"XVI-XVII-XVIII","histoire":"HAMER-HOUCK,  Le château, grande bâtisse qui date des années 1840, on doit sa construction, ainsi que l'aménagement du parc, à Edouard Bosquillon de Jenlis, qui fut ingénieur en chef du port de Dunkerque. L'ensemble comprend le château, les communs, les fermes, la tannerie, une maison de jardinier, deux chapelles (dont une néo-gothique) et le parc qui s'étend sur 11 hectares devant et derrière le château, avec une pièce d'eau, une prairie et des bouquets d'arbres, sur une autre partie du parc, au dela de la route d'Oxelaere, est plus boisée et plus sauvage avec un étang et des îles.                                                                                                          VANDAMME, né à Cassel le 5 novembre 1770, capitaine-commandant en 1792, Dominique-joseph-René Vandamme s'illustre sur tous les champs de bataille de la Révolution et de l'Empire. Promu général de brigade en 1793, puis général de division et commandant la 16ème division militaire de Lille en 1801, il est élevé à la dignité de Grand Aigle de la Légion d'honneur en 1805 et comte d'Unsebourg en 1809. Demeuré attaché à son pays natal où il mourra en juillet 1830, il achète la propriété  à la fin de l'Ancien Régime de Pierre Alexandre de Magnac, prévôt de la collégiale Saint Pierre et, sans doute entre 1805 et 1815, y fait bâtir le château toujours existant et planter le parc. Parmi les propriétaires successifs de cette demeure, on accordera une mention toute spéciale à M. et Mme Félix Bollaert-Le Gavrian qui ont su  vers les années 1935, l'entretenir et y garder fidèlement le souvenir du général. Situé en bordure de route, le château, qui s'élève sur trois niveaux dont le dernier forme attique, affecte un plan rectangulaire terminé par des arrondis à l'est et à l'ouest. Vers le nord, la longue façade régulièrement percée de neuf séries d'ouvertures se prolonge au rez-de-chaussée par un mur de clôture où s'ouvrent de part et d'autre deux portails monumentaux encadrés de pilastres carrés. Éléments protégés MH : les façades et les toitures ; les pièces suivantes au rez-de-chaussée avec leur décor : le vestibule, le grand salon, la salle de billard, le boudoir, le salon rond, la salle à manger et l'office : classement par arrêté du 6 novembre 1980.","architecture":"La Chatellerie est un château bâti à Cassel, Il se situe sur la Grande Place de Cassel. Il est classé aux M.H. depuis 1910. L'ancien Hôtel de la Chatellerie a été transformé en Hôtel de Ville de Cassel.   Le Musée départemental de Flandre situé à Cassel dans le Nord a rouvert ses portes le 23 octobre 2010, après treize années de fermeture. D'importants travaux de restauration ont permis de redonner une nouvelle jeunesse à l'Hôtel de la Noble Cour. Siège de la l'ancienne châtellenie de Cassel et doté d'une cour, ce bâtiment qui domine la place frappe par sa façade conjuguant architecture flamande et éléments de vocabulaire de la Renaissance italienne. Les collections très hétéroclites. Elle date du XVIe siècle. Aujourd'hui, après une série de travaux important, l'amateur retrouvera sur place, outre les grands axes toujours présent, plusieurs éléments de l'ancien parc « Anglo-Chinois » à travers de nombreuses fabriques : la grotte,  l'isle sauvage, la glacière, la tour inachevée, etc. Cette visite est une extraordinaire approche de l'art des jardins de la fin du XVIIIe siècle au coeur de la grande forêt domaniale de Bonsecours (parc naturel régional Scarpe-Escaut). Il est inscrit aux M.H. en 1992. Catherine et Jean-Claude Gonneau en sont les actuels propriétaires.  C'est devenu la Mairie qui se situe sur la Grand-Place. La Châtellenie de Cassel a été classée aux M.H. depuis le 21/03/1910. est la propriété du Conseil Général. Elle est devenue depuis le Musée des Flandres, ouvert au Public, Éléments protégés MH : le château et le parc, les bâtiments des deux fermes, la tannerie, la maison du jardinier,: inscription par arrêté du 8 juillet 1992.","habitants":"Hamer;Catherine et Jean-Claude Gonneau Dominique-joseph-René Vandamme\"","divers":"Chatellenie GPS : 50° 47' 59,27\" Nord, 2° 29' 11,51\" Est                             musée grav_1      GPS : 50° 48' 02\" Nord, 2° 29' 18\" Est                           Vendamme grav 3","gps":"50° 47' 59,27\" Nord, 2° 29' 11,51\" Est","images":["../image/image_59/59_Cassel_Hamer_Houck_1.jpg","../image/image_59/59_Cassel_Hamer_Houck_2.jpg","../image/image_59/59_Cassel_Hamer_Houck_3.jpg"]},"Consult_chateau_formulaire54f0":{"id":"Consult_chateau_formulaire54f0","dept":"59","canton":"Aulnoy-lez-Valenciennes","commune":"Maing","nom":"Castel_des_Près","type":"Château","periode":"XIII-XV-XVI","histoire":"CASTEL des PRES, le château existait au XIIIe siècle, date à laquelle la châtelaine du lieu fut enlevée par un chevalier de Lille, il appartint à une famille de Valenciennes enrichie par le négoce: en effet, Jean Bernier possédait diverses terres dans les environs, un hôtel à Valenciennes, dont il fut nommé \"prévôt le comte\" à plusieurs reprises de 1316 à 1336, mais ses biens furent confisqués en 1338 par le comte de Hainaut, Guillaume II, qui les vendit à un bourgeois de Valenciennes, M. de Neufville. En 1340, le seigneur de Craon, un des lieutenants du duc de Normandie échoua devant le château, mais il se vengea quelque temps après en dévastant le village. A une date indéterminée le bien entra dans la famille du Rasoir, en 1475, il appartenait à Jean Rasoir, seigneur de Beuvrage et Odomez, il passa ensuite à différentes personnes. La première représentation du château est celle des Albums de Croÿ, vers 1600,où lon voit la tour carrée de pierre bleue et deux tours dangle. Un plan de la levée du siège de Valenciennes en 1656 par Condé montre le château avec quatre tours. Le document le plus intéressant est le plan de 1674 , sans doute dessiné par «ladministration» du château, qui nous donne de nombreux détails sur son état à cette épo
