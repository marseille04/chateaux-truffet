y_Trésigny","type":"Châteaux","periode":"XVII-XIX","histoire":"Deux châteaux dans cet article de Fontenay-Trésigny : Duc-Eopernon-Sources                                                                                                                                                                                    SOURCES il date de la 1ère moitié du XVIIe siècle, sa construction à était fortifié, il fut remanié, plusieurs fois, par ses propriétaires successifs, au XIXe siècle. Il se trouve en face à l'église Saint-Martin. Son architecture est de style Renaissance. Il appartenait, autrefois, aux ducs d'Épernon, personnages importants de l'État, sous les rois Henri III, Henri IV, Louis XIII et de Louis XIV. Le domaine reçut plusieurs visites royales au cours de la Renaissance. Propriété des Montaigu, belle-famille du marquis de La Fayette au XIXe siècle, le domaine subit de nombreuses modifications au cours de cette période. Les jardins et l'ancienne ferme sont aménagés en parc d'agrément. Certaines des tours d'angle . Le chateau vit passer des personnages célèbres : François Ier, Henri II et Catherine de Médicis, Henri III, Richelieu, Lafayette. Le parc du château du duc d'Epernon présente des jardins remarquables qui ont été réalisés en 1837. Le château de Fontenay, dit aussi ancien château des Sources. Fortifié de construction, il fut de nombreuses fois remanié par ses nombreux propriétaires au XIXe siècle. À l'origine, il est la propriété des ducs d'Épernon, grands personnages de l'État pendant la minorité de Louis XIV. Le domaine reçoit plusieurs visites royales au cours de la Renaissance. Propriété des Montagu, belle-famille du marquis de La Fayette, puis des Gontaut-Biron au XIXe siècle, le domaine subit de nombreuses modifications au cours de cette période. Les jardins et l'ancienne ferme sont aménagés en parc d'agrément, la chapelle et certaines des tours d'angle sont rasées.","architecture":"SOURCES, puis des Gontaut-Biron au XIXe siècle, le domaine subit de nombreuses modifications au cours de cette période. Les jardins et l'ancienne ferme sont aménagés en parc d'agrément, la chapelle et certaines des tours d'angle sont rasées. Il vit passer des personnages célèbres : François Ier, Henri II et Catherine de Médicis, Henri III, Richelieu, Lafayette, suite à la liquidation judiciaire du promoteur immobilier, les copropriétaires se sont mobilisés et ont refinancé les travaux des communs (48 appartements). Les premières livraisons d'appartements sont prévues en mars 2019.","habitants":"ducs d'Épernon\"","divers":"Deux châteaux dans cet article: Sources grav_1  et Plumasserie  grav 2                       GPS : 48° 42' 22\" Nord, 2° 51' 43 Est Plumasserie GPS : 48° 42' 25\" Nord, 2° 51' 59\" Est","gps":"48° 42' 22\" Nord, 2° 51' 43 Est Plumasserie GPS : 48° 42' 25","images":["../../jctruffet.com/image/image_77/77_Fontenay_Tr%c3%a9signy_1.jpg","../../jctruffet.com/image/image_77/77_Fontenay_Tr%c3%a9signy_2.jpg","../../jctruffet.com/image/image_77/77_Fontenay_Tr%c3%a9signy_3.jpg"]},"Consult_chateau_formulaire921f":{"id":"Consult_chateau_formulaire921f","dept":"77","canton":"Fontenay-Trésigny","commune":"Fontenay-Trésigny","nom":"Fontenay_Trésigny_II","type":"Châteaux","periode":"XVII-XIX","histoire":"Deux châteaux dans cet article Près d'Ecoublay et Chaubuisson                                ECOUBLAY le château des Prés d'Écoublay ou château d'Ecoublay est un château bâti à Fontenay-Trésigny,  il est de style Renaissance. Il date du XVIIe et a été agrandi au XIXe siècle. Son propriétaire initial était la Famille des Courtenay. Cet ancien fief laïque a appartenu jusquà la fin du XXe siècle aux Courtenay, puis il est passé à une famille de Montceaux. Sous Louis XIV, on voit les chanoines de la Sainte Chapelle à Paris se qualifier de seigneurs hauts justiciers dÉcoublay-le-Hardy. Lancienne maison seigneuriale et la ferme des chanoines ont ensuite appartenu au baron de Perthuis de Laillevault dès 1879, à Daniel Wilson (père de Daniel Wilson), ingénieur dorigine écossaise, qui les avait acquis en 1846. Celui-ci avait commandé au peintre Eugène Delacroix un tableau représentant Assurbanipal (roi dAssyrie dans la tradition grecque).  La mort de Sardanapale\", aujourd'hui, exposée au musée du Louvre. Laile arrière du château a été construite pour cette toile monumentale. De 1951 à 2000, les Prés dÉcoublay sont habités par la confrérie de scalabriniens, moines italiens, qui feront dÉcoublay, durant ce demi-siècle, un lieu déchanges interculturels et de séminaires religieux. Des moines, des prêtres, des chanoines venus des quatre coins du monde (Brésil, Afrique, Inde) vivent alors en communauté et apporteront au château, au fil des années, son âme champêtre, authentique et joyeuse. Depuis 2000 est un site exclusivement voué à laccueil de séminaires dentreprises. Il est fermé au Public.","architecture":"Chateau de CHAUBUISSON  la construction du manoir de Chaubuisson date du XIXe siècle. Le manoir se situe sur le lieu-dit de Chaubuisson qui était, sous Louis XIII, une seigneurie particulière que Jean Bazin, échevin de Paris  magistrat municipal chargé de la Police et des affaires de la commune  donna en dot à sa fille Anne. Celle-ci épousa Jean de Loynes, correcteur des comptes, en 1635. Sous Louis XVI, cette terre a appartenu encore à Marie Adélaïde de Loynes mariée à François Auguste Leclerc de la Motte, capitaine dinfanterie. Cest sur ces terres que fut construit le manoir en 1893, tout près du château de Vaux-le-Vicomte, lun des plus somptueux du XVIIe siècle, fréquenté par La Fontaine, Molière ou Madame de Sévigné. Cet édifice, construit dans le style des manoirs normands, fut habité par des exploitants de bois, puis transformé en Relais & Châteaux dans les années 1950. Le chanteur français Michel Polnareff a vécu et puisé son inspiration, durant un an, dans le petit pavillon du parc surnommé \"Blanche Neige\". Depuis 2000, le manoir de Chaubuisson est un site privé, fermé au Public, dédié à laccueil des séminaires dentreprises.","habitants":"Famille des Courtenay\"","divers":"Deux châteaux dans cet article Prés-Ecoublay  grav-1                    fontenay trésigny   gps; 48° 40' 46? N, 2° 50' 27? E                                                  et Chaubuisson  Chaubuisson , GPS : 48° 42' 29,8\" Nord, 2° 54' 10,7\" Est","gps":"48° 42' 29,8\" Nord, 2° 54' 10,7\" Est","images":["../../jctruffet.com/image/image_77/77_Fontenay-Tr%c3%a9signy_II_1.jpg","../../jctruffet.com/image/image_77/77_Fontenay-Tr%c3%a9signy_II_2.jpg"]},"Consult_chateau_formulaire4b2f":{"id":"Consult_chateau_formulaire4b2f","dept":"77","canton":"Savigny-le-Temple","commune":"Savigny-le-Temple","nom":"Grange_77","type":"Château","periode":"XVII","histoire":"La GRANGE  propriété de 13 hectares, établi au lieu-dit la Grange-la-Prévôté, ancien fief médiéval, le domaine appartient au XVIIIe siècle à la famille Mithon. Vendu à la Révolution, il est racheté le 24 novembre 1800 par le couple Bernadotte, et demeure placé sous l'égide de la famille Clary-Talabot durant plus d'un siècle. Des années 1950 à 1998 le château devient un établissement de l'institut Gustave Roussy de Villejuif pour les traitements anticancéreux. Depuis 1999, la commune de Savigny-le-Temple est responsable du site qu'elle restaure.","architecture":"La GRANGE il est composé de pierre enduite et de brique. Domaine de 13 hectares. Il est bâti sur un ancien fief médiéval. La Famille Mithon possèdait ce château, au XVIIIe siècle. Le château de la Grange fut vendu à la Révolution, et racheté le 24/11/1800, par Bernadotte. Le château de la Grange devint ensuite la propriété de la famille Clary-Talabot, apparentée aux Bernadotte. LInstitut Gustave-Roussy occupa les lieux de 1950 à 1998. La Commune de Savigny-le-Temple entretient, le site, depuis 1999. Le parc a fait l'objet d'un pré-inventaire (Jardins Remarquables). Le domaine de la grange a été labellisé, au Patrimoine d'Intérêt Régional, depuis le 19/03/20.","habitants":"famille Clary-Talabot,\"","divers":"GPS : 48° 35' 03\" Nord, 2° 34' 59\" Est","gps":"48° 35' 03\" Nord, 2° 34' 59\" Est","images":["../../jctruffet.com/image/image_77/77_Grange_77_1.jpg"]},"Consult_chateau_formulaire75a3":{"id":"Consult_chateau_formulaire75a3","dept":"77","canton":"Fontenay-Trésigny","commune":"Courpalay","nom":"Grange_Bléneau","type":"Forteresse","periode":"XIV","histoire":"GRANGE BLENEAU,   En 1800, Marie-Adrienne de Noailles, épouse de La Fayette, hérite du château, restauré, il perd son aspect de forteresse (les douves sont comblées et le pont levis remplacé par un pont de pierre) et s'ouvre sur le parc, redessiné selon le goût de l'époque, un étang est creusé. Outre le domaine de La Grange-Bléneau, ce siège d'une seigneurie, dépendait de la châtellenie de Melun. Mentionné dès le XIIIe siècle , le château de La Grange-Bléneau a appartenu aux Courtenay, aux Aubusson-La Feuillade, aux Dupré de La Grange Blesneau, aux d'Aguesseau. En 1363, Ancel de La Grange dans un aveu décrit sa résidence comme : « Ancel de la Granche, chevalier seigneur dudit lieu et de la Grange du Breuil en brie, tient et avoue tenir en fief.  Le Prince de Condé et ses troupes s'en emparèrent lors des troubles de la minorité de Louis XIII. Adrienne de Noailles le transmit à son mari, le Général de La Fayette, qui y vécut, de 1802 à sa mort en 1834. La Fayette possède d'autres fermes à proximité et d'autres parcelles de terres.château de la Grange-Bleneau fut repris, par René de Chambrun Pineton de son cousin Louis de Lasteyrie en 1955, descendant de Lafayette. Il y met en oeuvre son intérêt pour l'agriculture: il échange des terres pour former un ensemble cohérent autour de son château et pratiquer une agriculture intensive. Après le décès de La Fayette en 1834, le domaine de La Grange Bléneau est repris par son fils, Georges Washington de La Fayette.  Le château de la Grange-Bleneau est devenu la Fondation Josée et René de Chambrun. Il appartient à une personne privé Le château et la chapelle, inscrits aux M. H. depuis 1942, sont aujourd'hui propriété de la Fondation de Chambrun.","architecture":"GRANGE-BLENEAU, c'est une maison-forte de style Médiéval, date du XIVe, XVIIe, XVIIIe et XIXe siecle. mais l'essentiel des bâtiments date du XVIe siècle, les poivrières et les mâchicoulis et de transformations du début du XVIIIe siècle. C'était une ancienne résidence seigneuriale. Premièrement ma maison forte de la Grange, chastel, et appartenances à tous les fossés et la bassecourt et le colombier, la ville close de fossés si comme tout se comporte laquelle maison et chastel est forteresse ancienne ».   Le  Le château de la Grange-Bleneau est devenu la Fondation Josée et René de Chambrun. Il appartient à une personne privé.Éléments protégés MH : le château de la Grange-Bléneau et sa chapelle : inscription par arrêté du 15 avril 1942.","habitants":"Famille de Lafayette\"","divers":"Grange-Bléneau  GPS : 48° 39' 42,48 Nord, 2° 56' 56,04\" Est","gps":"48° 39' 42,48 Nord, 2° 56' 56,04\" Est","images":["../../jctruffet.com/image/image_77/77_Grange_Bl%c3%a9neau_1.jpg","../../jctruffet.com/image/image_77/77_Grange_Bl%c3%a9neau_2.jpg","../../jctruffet.com/image/image_77/77_Grange_Bl%c3%a9neau_3.jpg"]},"Consult_chateau_formulairece7f":{"id":"Consult_chateau_formulairece7f","dept":"77","canton":"Fontenay-Trésigny","commune":"Grisy-Suisnes","nom":"Grange_le_Roy","type":"château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article Grange le Roy et  Suisnes.                         GRANGE LE ROY, est une ancienne seigneurie, formée d'un château et d'une ferme. Autrefois appelé Grange-Nivelon, du nom d'un changeur de Paris qui y réside au XIVe siècle, le hameau prend son nom définitif lorsque Jacques le Roy en devient le seigneur, il y fait construire un ensemble de pavillons, de galeries et de cours, entouré de douves. En 1608, le domaine passe à François Le Roy, puis à une série de propriétaires, jusqu'à Armand de La Grange en 1813. Détruit par un incendie pendant la Révolution, il reste l'aile gauche et le pavillon d'angle de l'aile droite.\n La construction du château de la Grange-le-Roi date du 4ème quart du XVIe siècle et du 1er quart du XVIIe siècle. Le domaine du château de la Grange-le-Roy va soffrir une seconde jeunesse grâce aux efforts conjoints de la commune de Grisy-Suisnes et de la SAFER de lIle-de-France. Le site près de Coubert sétend sur 55 ha et abrite un château du XVIIIe siècle, en partie détruit par la Révolution, un corps de ferme, une maison de gardien ainsi que plusieurs étangs. Le château , source dinspiration pour le dramaturge Eugène Labiche. Il va être entièrement rénové, son charme dorigine va côtoyer des matériaux plus modernes comme le verre, afin daccueillir peut-être à terme une Fondation dart numérique et des collections dart contemporain. Comme lexplique Jean-Baptiste Schweiger, directeur de la prospective et de laménagement territorial au sein de la SAFER, « le but est de redonner vie au site dans toutes ses composantes. \nÉléments protégés MH : le château de la Grange-le-Roi : inscription par arrêté du 7 août 1926.","architecture":"SUISNES, cest à lAmiral Louis-Antoine de Bougainville et son architecte Bellanger, en 1799, que le château de Suisnes doit sa silhouette définitive construite vers 1650 par Sainctot. Le parc est confié à Christophe Cochet, qui deviendra rosiériste et dont la descendance fera de Grisy Suisnes le village de la rose. La propriété est à lépoque limitrophe du parc du château seigneurial. A la fin du XVIIIe siècle ce parc à la française fut transformé à langlaise, puis rattaché en 1856 par Jacques de Noirmont, à celui du château de Suisnes, ce nouvel ensemble de 17 ha verra son romantisme confirmé par Duchêne père puis Duchêne fils jusque dans les années 1930. Du château seigneurial détruit en 1899, il ne subsiste que le pavillon nord. En 2000, une liquidation judiciaire provoque labandon du domaine. Le château est pillé puis saccagé, le parc envahi par les ronces. Repris en novembre 2006, le site fait aujourdhui lobjet dune restauration progressive.\nÉléments protégés MH : le château de Suisnes en totalité : inscription par arrêté du 10 novembre 1928.","habitants":"Grange dramaturge Eugène Labiche                 Suisnes; Amiral Louis-Antoine de Bougainville\"","divers":"Deux châteaux dans cet article Grange le roy et  Suisnes.  GPS : 48° 41' 00\" Nord, 2° 40' 00\" Est","gps":"48° 41' 00\" Nord, 2° 40' 00\" Est","images":["../../jctruffet.com/image/image_77/77_Grange_le_Roy_1.jpg","../../jctruffet.com/image/image_77/77_Grange_le_Roy_2.jpg","../../jctruffet.com/image/image_77/77_Grange_le_Roy_3.jpg"]},"Consult_chateau_formulaire9afd":{"id":"Consult_chateau_formulaire9afd","dept":"77","canton":"Nemours","commune":"Grez sur Loing","nom":"Grez_sur_Loing","type":"Châteaux","periode":"XII-XVII","histoire":"trois   châteaux dans cet article la Bouleaunière, la tour de Ganne et Grez.                                                                                                                                       BOULEAUNIERE  La Bouleaunière est une résidence élégante, proche de Fontainebleau, entouré d'un écrin de verdure. Cette superbe propriété du XIXe siècle est un véritable lieu d'histoire : c'est au château que Madame de Berny recevait en 1830, son amant, le célèbre romancier Honoré de Balzac, plusieurs salons de toute beauté, avec un mobilier moderne et une décoration contemporaine, ont su garder les chandeliers, les belles moulures et les énormes cheminées d'époque. Autour de La Bouleaunière, un parc de 3 Ha vous offre un cadre idéal. Le lieu sadapte aussi parfaitement aux mariages et aux soirées privées. La forêt qui entoure le Château La Bouleaunière, avec un joli point d'eau, apporte tout son charme bucolique à la région Seine et Marne. Accueillis par Wilfried, notre hôte, celui-ci saura-vous renseigner et répondre à lensemble de vos besoins. La privatisation de la Bouleaunière.","architecture":"La TOUR de GANNE est une tour bâtie à Grez-sur-Loing, . Elle fut construite, pour Louis VI en 1127, à la même époque que le château. C'est une tour fortifiée, longue de 15,3 m et large de 12,1 m. L'ancien donjon date du début du XIIe siècle. La Tour de Ganne fut une résidence royale aux XIIIe et XIVe siècles, très prisée des reines de France. La Guerre de Cent Ans détruisit la majeure partie du château, en 1359 et 1370. Il ne reste depuis que son donjon. La Tour de Ganne a été classée depuis le 6/07/1907.                                                                                                                               GREZ sur LOING Érigée en 1127 par Louis VI le Gros, la tour  de Ganne, fut l'un des donjon qui fortifiaient les confins de l'Ile de France et de la Bourgogne. Une tourelle portant un oratoire dirigé vers l'orient, laisse discerner un dôme aujourd'hui disparu. Elle rappelle la tour de Londres construite par le duc de Normandie en 1078 sous les Plantagenêts. En 1359 et 1370 destruction de la majeure partie du château. Pendant la Guerre de Cent Ans le donjon abrita notamment Blanche de Castille, Philippe IV le Bel ainsi que Jean le Bon. C'est à Grez que mourut Louise de Savoie, victime de l'épidémie de peste de 1531. La tour fut démantelée à partir du XVIIe siècle.   Éléments protégés MH : les vestiges du château de Grez sur Loing : classement par arrêté du 6 juillet 1907.","habitants":"Bouleaunière  Madame de Berny \"","divers":"Deux châteaux dans cet article la Bouleaunière  grav-3 et la tour de ganne grav 1-2. GPS : 48° 18' 55\" Nord, 2° 41' 20\" Est                                                                      La tour  GPS : 48° 18' 59,1\" Nord, 2° 41' 31,66\" Est","gps":"48° 18' 55\" Nord, 2° 41' 20\" Est","images":["../../jctruffet.com/image/image_77/77_Grez_sur_Loing_1.jpg","../../jctruffet.com/image/image_77/77_Grez_sur_Loing_2.jpg","../../jctruffet.com/image/image_77/77_Grez_sur_Loing_3.jpg"]},"Consult_chateau_formulaire97e4":{"id":"Consult_chateau_formulaire97e4","dept":"77","canton":"Lagny-sur-Marne","commune":"Guermantes","nom":"Guermantes","type":"Château","periode":"XVI-XVII","histoire":"GUERMANTES,  Pierre Viole, dont la famille possède le fief de Guermantes depuis le milieu du XVIe siècle, entreprend la construction du château. C'est sous l'influence de Paulain Pondre, receveur des Finances de Lyon, grand audiencier de France, que l'impossant château de Guermantes acquierera toute sa splendeur en 1698. Personnage influent de la cour du Roi soleil, la famille  Pondre saura faire appel aux plus grands noms de l'époque pour réaliser sa résidence. L'aménagement du parc du château est confié à André Le Nôtre et les perrons sont signés Hardouin Mansart, la famille Pondre conservera le domaine jusqu'en 1920. Propriété de Maurice Hottinguer juste avant la deuxième guerre mondiale, le domaine est menacé d'incendie en 1944, en représailles de l'assassinat d'un soldat allemand par la résistance. Il faudra une médiation de Blanche Hottinger, veuve du propriétaire, pour éviter que Guermantes ne subisse le même sort que le domaine voisin de Rentilly.","architecture":"Éléments protégés MH : les façades et les toitures de tous les bâtiments ; la décoration de l'escalier, de la chapelle et des pièces suivantes : la chambre dite aux peintures, la chambre à l'italienne, le salon du roi et la grande galerie ; le parc : classement par arrêté du 9 août 1944. L'allée d'accès au château (également sur commune de Gouvernes) : classement par arrêté du 21 décembre 1970.","habitants":"Famille de  Paulain Pondre\"","divers":"GPS : 48° 51' 11\" Nord, 2° 41' 52\" Est                                                                    Genitoy . GPS : 48° 50' 11\" Nord, 2° 43' 48\" Es","gps":"48° 51' 11\" Nord, 2° 41' 52\" Est","images":["../../jctruffet.com/image/image_77/77_Guermantes_1.jpg","../../jctruffet.com/image/image_77/77_Guermantes_2.jpg","../../jctruffet.com/image/image_77/77_Guermantes_3.jpg"]},"Consult_chateau_formulaire7b11":{"id":"Consult_chateau_formulaire7b11","dept":"77","canton":"Nangis","commune":"Guigues-Rabutin","nom":"Guignes_Rabutin","type":"Château","periode":"XVII","histoire":"GUIGNES RABUTIN, au Moyen Âge, l'histoire de Guignes et du hameau de Vitry est liée à celles des seigneurs de Coubert. Le manoir féodal appartient aux familles Vitry-Tournan, Villiers (apparentés aux Villiers de L'Isle-Adam), Montmorency, puis aux l'Hospital-Vitry, famille originaire d'Italie. en 1488, le seigneur du village de Guignes est Adrien de L'Hospital. En 1545, c'est François de L'Hospital, ascendant de François de L'Hospital et de son frère Nicolas de L'Hospital, qui est le seigneur de Guignes et des hameaux de Vitry (Guignes), de Vernouillet (Verneuil-l'Etang) et de Nogent (Yèbles)  En 1743, les notables du village de Guignes demandent à larchevêque de Sens, Jean-Joseph Languet de Gergy, l'autorisation de bâtir une église et d'y ériger une nouvelle paroisse. Le curé de la paroisse de Yèbles, dont dépendait Guignes, ayant donné son accord préalable sous condition de compensation financières et de participation des habitants de Guignes aux travaux de rénovation de l'église de Yèbles.","architecture":"GUIGNES RABUTIN,Le 1er octobre 1744, Samuel-Jacques Bernard, fils du financier Samuel Bernard, comte de Coubert et seigneur de Yèbles, de Vitry et de Guignes, fait don des terrains nécessaires à la construction de la nouvelle église et de ses dépendances, et s'engage à concourir pour les deux tiers aux dépenses. L'archevêque de Sens donne alors, le 8 décembre 1744, son autorisation pour la construction de l'église et l'érection de Guignes en paroisse distincte de celle de Yèbles. Et, comme il s'y était engagé, le comte de Coubert fait construire l'église de Guignes en 1745\nDurant la Révolution, la commune prend le nom de Guignes-Libre.","habitants":"Samuel-Jacques Bernard\"","divers":"Guignes-Rabutin   gps 48° 38' 11? nord, 2° 47' 59? est","gps":"","images":["../../jctruffet.com/image/image_77/77_Guignes_Rabutin_1.jpg"]},"Consult_chateau_formulaire2caa":{"id":"Consult_chateau_formulaire2caa","dept":"77","canton":"Fontenay-Trésigny","commune":"Houssaye_ en_ Brie","nom":"Houssaye","type":"Château","periode":"XII-XVII","histoire":"Deux châteaux dans cet article la Houssaye, Menillet et Chemin.                               HOUSSAYES  en Brie. le domaine fut racheté, en 1939, par le Général Augereau, en 1801. Acquis, par Jacques Bellanger en 1939, il s'y installa, avec son épouse Lélette Messirel, et ils durent se protéger de la pluie, la toiture étant dans un état de délabrement avancé.  En 1940, il fut occupé par une garnison allemande. Après le débarquement, une bombe alliée causa de gros dégats à la tour et à  l'aile gauche du château. Après la guerre, il reçut de nombreux artistes, dont Arletty qui y passa 18 mois, en résidence surveillée, ainsi que Sacha Guitry. Houssayes comprend un pigeonnier et un donjon tailladé en pierre. Les rainures de l'ancien pont-levis servant d'entrée à une avant-cour joignant les 3 bâtisses sont encore visibles. La tour ronde rappelle les manoirs médiévaux. Les bases du château dateraient du XIIe siècle ou XIIIe siècle, date du XVIIe siècle. C'st une maison forte documentée depuis le Moyen Age. Aux XVIIe et XVIIIe siècles, qui a été embellie au XVIIIe siècle. Laissé sans entretien pendant l'entre-deux-guerres, il est restauré à partir de 1940 par l'Industriel Jacques Bellanger, qui y invitera de nombreux artistes. Le château de la Houssaye-en-Brie est la propriété d'une société privée, fermée au Public.                                                                A Cinq K.M  au nord Neufmoutiers en Brie château du CHEMIN,  les seigneurs de Neufmoutiers vécurent d'abord au château de Bellevue (qui devint une ferme en 1751). Le 15.10.1729 y mourut (propriétaire des lieux) Jules de Gravel, Marquis de Marly ambassadeur extraordinaire en Suisse en 1684, en Allemagne de 1687 à 1689, en Pologne de 1689 à 1691, en 1736 sont érigés dans le village deux piloris de justice, détruits en 1790.Le \"château du chemin\", bâti au XVIIIe siècle, appartenait en 1870 à Alexandre Singer, fils de David Singer, et fut occupé par des soldats allemands, qui y organisèrent un grand banquet en l'honneur de la création de l'Empire allemand, vidèrent ses caves, et invitèrent par télégraphe son propriétaire (réfugié à Versailles) à venir partager le repas.","architecture":"La HOUSSAYE, c'st une maison forte documentée depuis le Moyen Age. Aux XVIIe et XVIIIe siècles, c'est une demeure de plaisance entourée de bois, qui a été embellie au XVIIIe siècle.  Éléments protégés MH : les façades et les toitures du château, le pavillon d'entrée, les deux tours rondes, le parc dans ses limites actuelles, en totalité : inscription par arrêté du 28 décembre 1999. En 1801, le Château de la Houssaye-en-brie fut racheté par le général Augereau qui transforme la décoration des pièces. Laissé sans entretien pendant l'entre-deux-guerres, il est restauré à partir de 1940 par l'Industriel Jacques Bellanger, qui y invitera de nombreux artistes. Le Château de la Houssaye-en-Brie est la propriété d'une société privée, fermée au Public.               A cinq K.M au sud ouest à la Chapelle Bourbon, MENILLET a été construit du XIVe au XVIe siècle. Le Ménillet (autrefois château du Méniet) était une terre noble. Cette terre, appelée Mesnil-Forteret dans les plus anciens titres, était avant 1378 un monastère portant le nom de Sainte-Catherine des Enfants. Ce domaine a appartenu au duc de Montpensier. Le 4 avril 1863, MM. Dupuis et Godefroy, devenus acquéreurs de cette terre, l'ont revendu à M. Singer, propriétaire du château du Chemin, situé à Neufmoutiers. Le château du Ménillet présente les caractères d'une petite forteresse, les bâtiments étaient alors entourés de fossés remplis d'eau à l'instar des maisons seigneuriales du pays de Brie. Plusieurs familles vivaient dans le domaine du Ménillet. La porte fortifiée et les douves du château du Menillet ont été inscrits aux M.H. le 1/12/1986.","habitants":"le Général Augereau et 'Industriel Jacques Bellanger\"","divers":"Deux châteaux dans cet article la Houssaye grav-1--2-3, Menillet grav-5-6 et Chemin. Menillet  grav -4.   GPS : 48° 44' 29\" Nord, 2° 50' 29\" Est                                                                           houssaye  GPS : 48° 45' 14\" Nord, 2° 52' 27\" Est","gps":"48° 44' 29\" Nord, 2° 50' 29\" Est","images":["../../jctruffet.com/image/image_77/77_Haussaye_1.jpg","../../jctruffet.com/image/image_77/77_Haussaye_2.jpg","../../jctruffet.com/image/image_77/77_Haussaye_3.jpg","../../jctruffet.com/image/image_77/77_Haussaye_4.jpg","../../jctruffet.com/image/image_77/77_Haussaye_5.jpg","../../jctruffet.com/image/image_77/77_Haussaye_6.jpg","../../jctruffet.com/image/image_77/77_Haussaye_7.html"]},"Consult_chateau_formulairee4da":{"id":"Consult_chateau_formulairee4da","dept":"77","canton":"Torcy","commune":"Jossigny","nom":"Jossigny","type":"Manoir","periode":"XVII-XVIII","histoire":"JOSSIGNY, le 4 novembre 1359, il revendit la terre à Pierre dOrgemont, conseiller du roi. La famille dOrgemont conserva Jossigny jusquà sa cession, le 25 juin 1574, à Jacques Robert, bourgeois de Paris. Par le jeu des alliances, Jossigny demeurera désormais dans la même famille jusquau décès du baron Guy de Roig en 1975. Elle entra, à la fin du XVIe siècle, dans le giron dune importante famille de la noblesse de robe parisienne, les Bragelongue, par le mariage de Barbe Robert, fille de Jacques, avec Jacques de Bragelongue, conseiller du roi et maître ordinaire de sa chambre des comptes. Jossigny passa au début du XVIIIe entre les mains dune autre famille de robe parisienne, non moins honorable, mais plus modeste, les Leconte des Graviers, par le mariage dAnne-Françoise de Bragelongue avec Augustin Leconte, seigneur des Graviers, conseiller du roi à la cour des aides, le 25 février 1704. À la mort dAnne-Françoise en 1734, le domaine de Jossigny revint à leur fils aîné, Claude-François, tandis quAugustin en conserva lusufruit jusquà sa mort à Paris, en mars 1752. Cest précisément à ce moment que fut envisagé la reconstruction du château du XVIIe siècle. Apparait en effet que cest dans les années 1752-1753 et suivantes. Claude-François Leconte fit appel à larchitecte Mansart de Sagonne : depuis 1745, celui-ci était en relation avec la famille, ayant acquis dAugustin  à la mort de Claude-François, le 15 septembre 1787, le château revint à son fils aîné, Claude-Eléonor. Il échut au XIXe siècle par alliance à la famille De Roig. Le baron Guy-François en fit don à lÉtat en 1949, conservant lusufruit jusquà sa mort en 1975. Depuis ce temps, le château relève du centre des monuments nationaux et de la conservation du château de Champs-sur-Marne.","architecture":"JOSSIGNY, construit en 1743, par Jacques Hardouin Mansart de Sagonne, le château est un parfait exemple de l'architecture civile de l'époque Louis XV. Sur sa façade composée de trois pans une toiture légèrement courbée donne à ce petit monument des allures de pagode. Jusqu'à son cambriolage à la fin du XXe siècle, le château possédait une importante collection de meubles d'époque, côté cour  une grande grille, surmontée d'une couronne ducale marque l'entrée du domaine. La vue se prolonge vers l'ouest par une perspective arborée allant jusqu'au château du Génitoy, aujourd'hui en attente de réhabilitation par la municipalité de Bussy-Saint-Georges. A l'est, un large parc arboré est attenant  offre une vue dégagée sur sa façade arrière, Il est de style Rocaille. L'Architecte était Jacques Hardouin-Mansart de Sagonne. Le château de Jossigny est de style XVIII. La construction date de 1753. L'un des plus beaux châteaux d'époque Louis XV à toit en forme de toit de pagode avec son parc restés intacts avec leur mobilier d'origine jusqu'à la fin du xxe siècle, où il a été cambriolé. Il fait face au château jumeau inachevé du Génitois, désormais englobé dans la ville nouvelle de Bussy-Saint-Georges. Le Château de Jossigny est classé aux M.H. depuis 1942. Ouverture exceptionnelle de la Fête de la Chataigne  Éléments protégés MH : les façades et les toitures des dépendances : l'orangerie, les écuries, les communs, le parc avec ses murs de clôture ; les façades et les toitures de la maison de la Roberde et les deux allées du Levant et du Couchant formant la perspective de l'édifice ; le château : classement par arrêté du 23 décembre 1942.","habitants":"Famille des les Bragelongue\"","divers":"GPS : 48° 50' 19\" Nord, 2° 45' 14\" Est","gps":"48° 50' 19\" Nord, 2° 45' 14\" Est","images":["../../jctruffet.com/image/image_77/77_Jossigny_1.jpg","../../jctruffet.com/image/image_77/77_Jossigny_2.jpg","../../jctruffet.com/image/image_77/77_Jossigny_3.jpg"]},"Consult_chateau_formulaire8e1a":{"id":"Consult_chateau_formulaire8e1a","dept":"77","canton":"Coulommiers","commune":"Verdelot","nom":"Launoy_Renault","type":"Château","periode":"XV-XVI","histoire":"LAUNOY-RENAULT , isolé sur le plateau briard, entre les vallées du Grand et du Petit Morin, cet édifice fortifié remplissait un double rôle de refuge et de surveillance dun carrefour de routes. La demeure évoque le souvenir de Claude III dEspence (1511-1571), régent de luniversité de Paris, qui participa au concile de Bologne en 1547 et au colloque de Poissy en 1561, chercha à concilier catholiques et protestants et sattira les critiques des deux partis. Le dénombrement rendu un siècle plus tôt par Claude Toignel dEspence, échanson de Louis XI, confirme lorigine médiévale de louvrage. Daté de 1458, il fait mention \"du chastel et forteresse avec les grands fossés  et les petits. Le chastel et la basse-cour, précise-il, ont été ruinés à loccasion des guerres, mais depuis peu de temps, ils ont été réddifiez\". A sa mort, en 1571, Claude dEspence légua son château à son frère cadet, seigneur de Braux, dont la fille lapporta en mariage à la famille de Beauvau. Huguenot convaincu, Alof II de Beauvau épousa en 1594 Louise de Soissons, puis Madeleine de Vielzmaisons dont le lys héraldique figure dans lescalier. Alof III épousa en 1637 Anne dHardoncourt, de Villiers-les-Maillets, et habita Launoy-Renault, au contraire de son fils Robert qui se fixa à Paris. Vendu en 1681, le domaine appartint aux Le Bascle d Argenteuil, puis aux dAllonville qui en affermèrent les terres.   On attribue à Claude dEspence lencadrement Renaissance de la porte dentrée, ainsi que les six arcades en plein cintre de la galerie en retour.","architecture":"LAUNOY-RENAULT; Définitivement converti en 1790 en exploitation agricole, très dégradé et partiellement ruiné, le château vient de faire lobjet dune complète restauration. Les bâtiments entouraient à lorigine un vaste terre-plein rectangulaire (100 mètres sur 75), cantonné de tours et isolé par des douves. Le côté nord-ouest subsiste sur presque tout son développement, comprenant lentrée et ses deux tours en briques, renforcées de grès. Le corps sud-ouest, encadré de tours dangle, correspond au logis dont la façade en moellons, percée de fenêtres restaurées, conserve de nombreuses canonnières à ébrasement externe.  Les parties suivantes du château de Launoy-Renault, selon le plan annexé à l'arrêté : les douves avec leurs escarpes ou fausses-braies, leurs contrescarpes et le cheminement qui les borde, le pont dormant qui franchit ces douves, le passage couvert qui, depuis ce pont, donne accès à la cour, les deux cabinets voûtés superposés (l'un sis au rez-de-chaussée, l'autre au premier étage) attenants au grand escalier du logis Renaissance, situé sur la parcelle n° 22, lieu-dit \"château de Launoy-Renault\" .Launoy -Renault  plus intéressants sont les volumes intérieurs du logis: la salle basse, dite salle des gardes, aux robustes voûtes sur croisées dogives retombant sur une file de trois colonnes à demi-enterrées; l'escalier droit, dont les voûtes surbaissées, en briques et nervures prismatiques en pierre, portent à la clé les armes des familles Jouvenel des Ursins, du Moulin et de Vielzmaisons; et les deux chapelles superposées, lune et lautre constituées de deux travées voûtées, timbrées aux armes des dEspence. Éléments protégés MH : les façades et les toitures du château ; la salle des gardes et l'escalier d'honneur : inscription par arrêté du 20 novembre 1986.","habitants":"famille de Beauvau\"","divers":"Launoy-Renault      48° 50' 53? N, 3° 22' 45? E","gps":"","images":["../../jctruffet.com/image/image_77/77_Launoy_Renault_1.jpg","../../jctruffet.com/image/image_77/77_Launoy_Renault_2.jpg","../../jctruffet.com/image/image_77/77_Launoy_Renault_3.jpg"]},"Consult_chateau_formulaire9a49":{"id":"Consult_chateau_formulaire9a49","dept":"77","canton":"Provins","commune":"Longueville","nom":"Longueville_77","type":"Château","periode":"XVII","histoire":"Deux châteaux dans cet article Lourps à Longueville et Talchy à Chalmaison.                                                                                                                    LOURPS, au sud de Provins    Racheté en 1927, par Mr Pierre Michaux, Avocat, Avoué de l'Hôpital de Clermont de l'Oise, Maire de Clermont et Juge au Conseil des Prud'hommes de l'Oise. Le château de Lourps faisait partie de l'ancienne paroisse de Lourps, puis fut rattaché, à Longueville, à la Révolution. Le château de Lourps abrita Huysmans qui le décrivit dans \"En rade\". Vous pourrez découvrir de l'extérieur, le château et sa chapelle (privés), l'église et le cimetière.","architecture":"Toujours au sud de Provins  à Chalmaison TACHY    château construit au XVIIe siècle, appartenant à la Révolution à Alexandre Louis Auguste Duroux, comte de Breuil et major en second du régiment du Maine, seigneur de Tachy. Le château passe aux mains de Berceon en 1817. En 1822, il est encore entouré de fossés, mais comblés aujourd'hui au nord. L'édifice se compose d'un sous-sol, un étage carré et un étage de comble, le gros oeuvre en moellon et enduit, élévation à travées surmontée de toit à longs pans, pignon couvert et découvert, croupe et flèche conique, couverts d'ardoises et de tuiles plates. L'ensemble de la propriété comprend également des communs, un magnifique pigeonnier et un jardin.","habitants":"Famille de Berceon       Tachy Alexandre Louis Auguste Duroux\"","divers":"Deux châteaux dans cet article Lourps grav-3 à Longueville grav 1-2 et Talcy grav-4  à Chalmaison  GPS : 48° 31' 00\" Nord, 3° 15' 00\" Est","gps":"48° 31' 00\" Nord, 3° 15' 00\" Est","images":["../../jctruffet.com/image/image_77/77_Longueville_77_1.jpg","../../jctruffet.com/image/image_77/77_Longueville_77_2.jpg","../../jctruffet.com/image/image_77/77_Longueville_77_3.jpg","../../jctruffet.com/image/image_77/77_Longueville_77_4.jpg"]},"Consult_chateau_formulaireafc2":{"id":"Consult_chateau_formulaireafc2","dept":"77","canton":"Combs-la-Ville","commune":"Moissy-Cramayel","nom":"Lugny_Cramayel","type":"Château","periode":"XVII-XIX","histoire":"LUGNY  le château de Lugny (XIXe siècle) et son parc (1785), aujourd'hui, a été transformé en une Pagode bouddhiste thaïlandaise, avec un grand columbarium dans le parc. Il existe aussi un 2ème château sur la commune de Moissy-Cramayel à découvrir : Le château de Cramayel, château médiéval avec sa chapelle fondée en 1203, remanié et embelli au début du XVIIIe siècle par la Famille de Mesmes, érigé en Marquisat, en 1773, par le roide France Louis XV, a été démoli en 1824. Seuls subsistent, aujourd'hui, ses fossés, ses communs, et la Pyramide de Cramayel, un obélisque en pierres de Créteil, haut de 25 mètres, surmonté d'un globe de cuivre.","architecture":"CRAMAYEL  Vieille construction féodale, de plan rectangulaire, à deux niveaux, flanquée au deux exrtremitées de pavillons  carrés  précédée de deux avant-cours, avec sa chapelle fondée en 1203, ses plantations séculaires, ses fermes importantes, fut au temps de Louis XIV l'objet d'importants embellissements réalisés au tout début du XVIIIe siècle par la famille de Mesmes sous la direction du célèbre architecte Germain Boffrand. Au dehors, c'était un manoir en gresserie, flanqué de quatre tours, accosté à deux pavillons, entouré de fossés à sec sur lesquels étaient jetés deux ponts-levis, mais la famille de Mesmes en avait changé la distribution intérieure ; agrandi considérablement le domaine,","habitants":"Famille de Mesmes\"","divers":"Lugny  GPS : 48° 37' 56\" Nord, 2° 37' 04\" Est","gps":"48° 37' 56\" Nord, 2° 37' 04\" Est","images":["../../jctruffet.com/image/image_77/77_Lugny_Cramayel_1.jpg","../../jctruffet.com/image/image_77/77_Lugny_Cramayel_2.jpg","../../jctruffet.com/image/image_77/77_Lugny_Cramayel_3.jpg","../../jctruffet.com/image/image_77/77_Lugny_Cramayel_4.jpg"]},"Consult_chateau_formulaireb04a":{"id":"Consult_chateau_formulaireb04a","dept":"77","canton":"La Ferté-sous-Jouarre","commune":"Luzancy","nom":"Luzancy","type":"Château","periode":"XV-XVII","histoire":"LUZANCY, Il est appelé aussi le château du maréchal de Bercheny. Le comte de Bercheny, (1689-1778) était un militaire hongrois élevé au grade de Maréchal de France, en 1758. Quand le roi Stanislas décèda à Lunéville, en 1766, le comte de Bercheny, qui lui était très proche, n'avait plus de raison de rester à Lunéville. La cour se dispersa et, tout comme son ami et frère, en franc-maçonnerie, le comte Marie-Elisabeth de la Vergne de Tressan, préféra s'installer à Nogent-l'Artaud,  le comte de Bercheny, (1689-1778). La cour se dispersa et, tout comme son ami et frère en franc-maçonnerie, préfèra se retirer sur ses terres à Luzancy.","architecture":"LUZANCY, château du Maréchal de Bercheny a été construit du XVe et XVIe siècles. Ce n'est qu'au XVIIIe siècle, que le château fut profondément modifié et agrandi,sur l'ordre du Maréchal de Bercheny. La chapelle, bâtie à l'époque, fut bénite en 1758. C'est au château du Maréchal de Bercheny que vinrent les plus grands personnages du royaume, comme la reine Marie Lecsinska ou le roi lui-même. Le château du maréchal de Bercheny devint ensuite, la propriété d'un fidèle de l'Empereur, le général Michaud,  il préfèra se retirer sur ses terres à Luzancy. Devenu depuis la propriété du Département de Seine-et-Marne, le château du maréchal de Bercheny abrite la Maison de l'Enfance à caractère social.","habitants":"Maréchal de Bercheny\"","divers":"GPS : 48° 58' 19\" Nord, 3° 11' 13\" Est","gps":"48° 58' 19\" Nord, 3° 11' 13\" Est","images":["../../jctruffet.com/image/image_77/77_Luzancy_1.jpg","../../jctruffet.com/image/image_77/77_Luzancy_2.jpg"]},"Consult_chateau_formulaire843b":{"id":"Consult_chateau_formulaire843b","dept":"77","canton":"Ozoir-la-Ferrière","commune":"Lésigny","nom":"Lésigny_77","type":"Château","periode":"XV","histoire":"cinq châteaux dans cet article  lésigny, Pomey , porcher                                              LESIGNY, tout près du village au charme intact, au bout d'une majestueuse allée bordée de platanes, se trouve le château seigneurial de Lésigny. Ceint de douves et d'étangs d'eau, le château a été construit sur les ruines d'un château fort médiéval de 1508. Depuis, ce chateau renaissance a abrité et accueille au fil des siècles de grandes célébrités telles que Louis XIII et Anne d'Autriche, Catherine puis Marie de Médicis, le maréchal de France Concini et son épouse la célèbre Léonora Dori dites la \"Galigaï\", Charles de Luynes, Marie de Rohan, et le duc de Bourbon-Penthièvre. Aujourd'hui il ouvres ses portes pour vos oeuvres créatives et moments les plus précieux à seulement 24 kilomètres sud-est de Paris.","architecture":"LESIGNY,   la construction du château de Lésigny date du 1er quart du XVIIe siècle et de 1822. Tout près du village au charme intact, au bout d'une majestueuse allée bordée de platanes, se trouve le château seigneurial de Lésigny. Le château de Lésigny a été construit, en 1508, sur les ruines d'un ancien château fort médiéval. Il dispose d'un parc boisé de 54 ha, de plans d'eau (douves et étangs), d'une cour d'une surface d'un hectare ainsi que de magnifiques terrasses (2 x 75 m2) et de plusieurs parking privés. Ceint de douves et d'étangs d'eau, le château de Lésigny a bénéficié de nombreux travaux et embellissement au fil des siècles. Il dispose de plafonds et des cheminées dépoque Renaissance avec des parquets authentiques et un escalier d'honneur. Les 3 salons communiquent pour une superficie totale de 250 m2.  C'est au château de Lésigny, situé un cadre majestueux. Les salons du Rez-de-chaussée, aujourd'hui ouverts à vos réceptions, disposent de plafonds et de cheminées peintes d'époque Renaissance, qui leur apportent un cachet exceptionnel.","habitants":"Anne d'Autriche est la   Célèbre Léonora Dori \"","divers":"Lésigny GPS : 48° 44' 42\" Nord, 2° 37' 00\" Est","gps":"48° 44' 42\" Nord, 2° 37' 00\" Est","images":["../../jctruffet.com/image/image_77/77_L%c3%a9signy_77_1.jpg","../../jctruffet.com/image/image_77/77_L%c3%a9signy_77_2.jpg","../../jctruffet.com/image/image_77/77_L%c3%a9signy_77_3.jpg","../../jctruffet.com/image/image_77/77_L%c3%a9signy_77_4.jpg","../../jctruffet.com/image/image_77/77_L%c3%a9signy_77_5.jpg","../../jctruffet.com/image/image_77/77_L%c3%a9signy_77_6.jpg"]},"Consult_chateau_formulaire4d53-2":{"id":"Consult_chateau_formulaire4d53-2","dept":"77","canton":"Serris","commune":"Magny le Hongre","nom":"Magny_Hongre","type":"Château","periode":"XVI-XVIII","histoire":"MAGNY LE HONGRE, en 1589, lors de la rédaction de la coutume de Paris, Thomas le Pilleur, conseiller notaire et secrétaire du roi, contrôleur de l'audience de Paris, est seigneur et châtelain de Bailly, de Serris, de Chatou, de Magny-le-Hongre et Vères en partie. Il y avait alors un petit château construit sur son fief qui prit le nom des Pilleurs, nom conservé par la suite avec des altérations. Ainsi, on retrouve plus tard au XVIIIe siècle, le fief d'Epilleurs, appelé aussi de Pileuse, ou Esblemeuse. A cette époque, le château n'existait plus, il ne restait que les fossés et le fief était alors sans importance. L'ancien domaine des Le Pilleur est acquis en 1644 par le prince de Rohan-Guéménée, Louis de Rohan, seigneur de Coupvray, Lesches et Magny le Hongre ; il obtint des lettres du roi pour renouveler le terrier de ces seigneuries. En 1603, lorsque Françoise de Laval, princesse de la maison de Rohan, duchesse de Montbazon, fonda le Mont de Piété de Coupvray, un collège pour élever six enfants pauvres choisis dans les paroisses de ses domaines, Magny le Hongre pouvait fournir un de ces enfants. Pour subvenir aux frais de sa Fondation, la duchesse de Montbazon affecta 3 muids de blé de rente, tel qu'il était recueilli dans ses fermes de Coupvray, Voulangis, Magny et Lesches, et 500 livres de rente, à prendre sur les revenus des mêmes fermes. La seigneurie de Sainte Geneviève de Magny comprenait un droit de haute, moyenne et basse justice. Les premières causes étaient jugées, dans le village même, les appels allaient au Châtelet de Paris.","architecture":"MAGNY LE HONGRE,  La ferme seigneuriale de Magny appartenait à l'abbaye de Sainte-Geneviève de Paris et comprenait, au XVIIIe siècle, 228 arpents et les grosses dîmes de la paroisse. Le tout était loué le 12/07/1786 à Delaunay, moyennant 4000 livres et un muid de blé. Le chef-lieu de l'ancien fief de Sainte Geneviève est aujourd'hui la ferme qui appartient à Mr le Marquis de Plessis-Bellière, marié à Mlle de Pastoret. Le château de Magny-le-Hongre est devenu un Centre SPA.","habitants":"Famille de Françoise de Laval\"","divers":"Magn de Hongre GPS : 48° 51' 47\" Nord, 2° 48' 48\" Est","gps":"48° 51' 47\" Nord, 2° 48' 48\" Est","images":["../../jctruffet.com/image/image_77/77_Magny_Hongre_1.jpg","../../jctruffet.com/image/image_77/77_Magny_Hongre_2.jpg","../../jctruffet.com/image/image_77/77_Magny_Hongre_3.jpg"]},"Consult_chateau_formulaire3bd4":{"id":"Consult_chateau_formulaire3bd4","dept":"77","canton":"Melun","commune":"Maincy-Rubelles","nom":"Maincy","type":"Château","periode":"XVII","histoire":"MAINCY, Ce prestigieux château offre 1800 m² de surface en parfait état. Il comporte 15 pièces,   dans un parc de 79 Ha. Il a été entièrement rénové avec des équipements luxueux et raffinés. La propriété est inscrite à l'inventaire des Monuments Historiques, et plusieurs arbres sont classés « Arbres remarquables ». Ce cadre exquis a inspiré de nombreux artistes, au cours du XXe siècle. Un célèbre cinéaste français a choisi ce lieu d'exception comme lieu de tournage de son film, rassemblant pour la première fois 3 acteurs célèbres, Philippe Noiret, Jean Rochefort et Jean-Pierre Marielle. L'ensemble est entouré d'un parc à l'anglaise de 18 Ha avec 3 lacs formant une île, l'un des premiers créé en France, et dune forêt privative de 52 Ha abritant une magnifique grotte en rocaille.  Propriété aujourd'hui de monsieur Mathieu Richard .                                                                                                             Au nord à trois K.M. RUBELLES  à Meulun.  Le château est bâti au XVIIe siècle et est agrandi au XIXe siècle. Le parc comprend diverses constructions ; le pavillon de la cour, celui de jardin et celui de la machine, et des plans d'eau. La seigneurie de Rubelles appartient au milieu du XVIIIe siècle à la famille Du Tramblay, dont sa descendance possède encore le château. On n'y voit pas une étendue de bâtiments qui annonce la résidence d'un puissant seigneur; mais on en trouve assez pour ne pas permettre à la bourgeoisie d'y atteindre. Il avait la liberté d'aller chasser jusque dans la cour du château de Praslin. M. le duc de Choiseul, par son crédit ou par des arrangements particuliers, s'est affranchi de cette servitude. Le seigneur actuel, animé du bien public, a pratiqué en dehors de son parc, sur la route, une très belle fontaine. Éléments protégés MH ; le pavillon situé au Sud-Est de la cour d'honneur ; le pavillon de repos situé à l'extrémité Sud de la pièce d'eau : inscription par arrêté du 28 décembre 1984.","architecture":"MAINCY, comprend un rez-de-chaussée de 300 m² et 2 étages de 250 m² chacun. Il se compose d'une galerie d'entrée, de 4 salles de réception, de 10 chambres à coucher et de 7 salles de bains. Les boiseries dorigine, entièrement conservées et dans un état remarquable, ainsi que les volumes grandioses (5 mètres de hauteur sous plafond dans les salles de réception, 3,80 mètres au premier étage, 2,80 mètres au second étage). Le château de Maincy est relié à des dépendances d'environ 800 m² sur 2 niveaux, dont 200 m² de réception. Un logement de gardien entièrement restauré de 70 m² complète ce bien d'exception. Possibilité de louer 900 Ha de forêt.                                                                 RUBELLES  à Meulun de plan rectangulire corps de logis  centraux en double, pavillons sur chaque angles saillants sur façades principale , l'ensemble à deux niveaux toit en  ardoises en croupes  avec  tour Hexagonale mi hors oeuvre au centre de la façade côté parc  toit en poivrières.","habitants":"Rubelles,  famille Du Tramblay\"","divers":"Maincy grav1-2  Rubelles grav-3-4 GPS : 48° 33' Nord, 2° 42' Est","gps":"48° 33' Nord, 2° 42' Est","images":["../../jctruffet.com/image/image_77/77_Maincy_1.jpg","../../jctruffet.com/image/image_77/77_Maincy_2.jpg","../../jctruffet.com/image/image_77/77_Maincy_3.jpg","../../jctruffet.com/image/image_77/77_Maincy_4.jpg"]},"Consult_chateau_formulaire2bdd-2":{"id":"Consult_chateau_formulaire2bdd-2","dept":"77","canton":"Meaux","commune":"Meaux","nom":"Meaux","type":"Châteaux","periode":"XII-XVI","histoire":"Plusieurs châteaux à Meaux , dont le palais épiscopal le conservatoire, le vieux chapitre et les remparts                                                                                  MEAUX, le Palais Episcopal est un Palais bâti à Meaux. La construction date du XIIe et XVIe siècles. Il est entouré du Jardin Bossuet, le jardin Bossuet (XVIIe siècle) et le jardin des remparts.","architecture":"MEAUX épiscopal; ce château, en cours de rénovation, de style anglo-normand a été construit au tout début du XXe siècle. Il offre une superficie totale denviron 850 m². Il est composé de 4 niveaux de 211 m² chacun : un rez de jardin, un rez-de-chaussée et 2 étages supérieurs. De nombreuses possibilités daménagement sont envisageables.\nAu rez-de-chaussée : on y trouve les salons avec une belle hauteur sous plafond de 4,5m qui donnent sur une grande terrasse orientée Sud-ouest avec une magnifique vue sur la nature environnante. Lambiance est calme et sereine. Idéale pour se ressourcer.\nLes étages sont actuellement aménagés en 2 appartements.                le jardin Bossuet (XVIIe siècle) et le jardin des remparts. Le jardin reprenant le dessin d'une mitre est attribué à Le Nôtre. Il se présente actuellement tel qu'il fut restauré en 1910 (de cette époque date le rocher romantique posé au centre du bassin). Les remparts aménagés en jardins suspendus, abritent le cabinet de travail de Bossuet.","habitants":"Evéchés de Meaux\"","divers":"meaux le palais grav_1-2 conservatoire grav-7 ou frot grav 3 et la tour-arbaletrieres grav-4                GPS : 48° 57' 37\" Nord, 2° 53' 18\" Est   rempart grav-5, vieux chapitre grav-6","gps":"48° 57' 37\" Nord, 2° 53' 18\" Est   rempart grav-5, vieux cha","images":["../../jctruffet.com/image/image_77/77_Meaux_1.jpg","../../jctruffet.com/image/image_77/77_Meaux_2.jpg","../../jctruffet.com/image/image_77/77_Meaux_3.jpg","../../jctruffet.com/image/image_77/77_Meaux_4.jpg","../../jctruffet.com/image/image_77/77_Meaux_5.jpg","../../jctruffet.com/image/image_77/77_Meaux_6.jpg","../../jctruffet.com/image/image_77/77_Meaux_7.jpg"]},"Consult_chateau_formulaire2639":{"id":"Consult_chateau_formulaire2639","dept":"77","canton":"Melun","commune":"Melun","nom":"Melun","type":"Château","periode":"XVII","histoire":"deux châteaux dans cet article; Apakabar et la Rochette                                      APAKABAR HOMESTAY, cette belle demeure se situe à la sortie de Melun. Il sétend surtout à la suite de linstallation au XVIIIe siècle du Baron François-Thomas Moreau de la Rochette, directeur des fermes du roi Louis XV, dont les héritiers habitèrent le château de la Rochette jusquau XXe siècle. En 1925, Louis de La Rochette vendit une partie de ses terres proches de Melun, le Bois de lErmitage, qui fut transformé en lotissement. A cette époque, la route de Fontainebleau devint un des endroits les plus chics de lagglomération de Melun. En 1934 que larchitecte parisien A. Dumesny fit construire, le long de cette route, encore longée par deux allées cavalières ombragées, une maison de style néo-normand, quil dénomme Le Mesnil  est conçu sur le modèle des « Affolantes » des bords de Seine, ces grandes demeures bourgeoises au charme atypique établies dans la seconde moitié du XIXe siècle qui inspirèrent de nombreux artistes. Le rez-de-chaussée en pierre de taille, surélevé de quelques marches, soutient un 1er étage à colombages, de couleur lie de vin, tandis que les 3 chambres du 2ème étage ont été construites sous des combles aménagées. La silhouette complexe de lensemble rend la maison pittoresque, dont la petite tour qui surmonte limposante entrée principale. Un cabinet médical fut réaménagé en appartement (gîte). A la fin du XXe siècle, un médecin rachèta la maison et décida de lagrandir pour y faire son cabinet médical, avec une entrée indépendante. Le garage initial du Mesnil, aux murs massifs en pierre, devint la salle dattente, tandis que lextension fut dédiée aux consultations.  Cet ensemble, entièrement rénové en 2018, forme désormais le gîte dApakabar Homestay, dont le toit a été aménagé, en terrasse, pour devenir une belle maison dhôtes. C'est aussi un Relais-Motards ou vous recevrez un chaleureux accueil dans leur grande maison qui a des allures de charmant manoir à l'ambiance indonésienne.","architecture":"ROCHETTE, le château de la Rochette fut construit de 1772 à 1778, par l'architecte Victor Louis. Le château a été ensuite affecté au Ministère de lÉducation Nationale. N'étant plus utilisé, il est mis en vente, explique Jean Maxime Baye, responsable de la Division Domaniale au sein de la Direction Départementale des Finances Publiques de Seine-et-Marne. Lorsque la procédure de cession deviendra effective, la commune de La Rochette pourra, exercer son droit légal de priorité pour acquérir ce bien. Mais la Mairie le trouve beaucoup trop cher. Quand aux habitants, beaucoup ignorent aujourd'hui que le château de la Rochette a été vendu à un promoteur pur y construire des logements. Les nouveaux résidents jouiront tous de jardin privatif et de places de parking. La plupart des appartements, du studio au T4, bénéficieront d'un point de vue exceptionnel sur la Seine. La cour d'honneur a repris le tracé du XVIIIe siècle de l'architecte Victor Louis. L'ancienne Chapelle est située à proximité immédiate et au Nord du château. Le château de la Rochette, d'un volume élégant, a été reconverti en logements exclusifs.","habitants":"Baron François-Thomas Moreau de la Rochette\"","divers":"deux châteaux dans cet article; Apakabar et la Rochette    GPS : 48° 30' 00\" Nord, 2° 40' 00\" Est                                                                rochette GPS : 48° 30' 44\" Nord, 2° 40' 04\" Est","gps":"48° 30' 00\" Nord, 2° 40' 00\" Est","images":["../../jctruffet.com/image/image_77/77_Melun_1.jpg","../../jctruffet.com/image/image_77/77_Melun_2.jpg"]},"Consult_chateau_formulairea807":{"id":"Consult_chateau_formulairea807","dept":"77","canton":"Melun","commune":"Melun","nom":"Melun_II","type":"Châteaux","periode":"XII-XV","histoire":"Deux châteaux dans cet article Melun et hôtel de ville.                                                                   MELUN Témoin du séjour des rois depuis Robert le Pieux (970-1031), il                                                      est une résidence royale d'importance. Les Capétiens, Philippe-Auguste, Louis IX, Philippe le Bel ou Charles V y demeurent souvent et veillent à son entretien. Situé à la pointe occidentale de l'île, il affirme la situation stratégique de Melun. C'est tout d'abord une résidence assez sobre (corps de bâtiment rectangulaire en pierre, chapelle et annexes en bois, granges, caves, et ateliers pour l'entretien des armes), protégée sous Philippe-Auguste d'une enceinte terminée à l'ouest par une tour d'angle, comme au Louvre et à Montléry. Sur le sceau du Bailliage de Melun (XVème siècle) le château est pourvu d'un donjon, de logis, de bâtiments pour la garnison et l'artillerie, d'une prison gérée par des officiers royaux, ainsi que la chapelle dédiée à Saint Vincent. Une partie du Trésor royal y est transporté au XIVème siècle. Tombé en désuétude à partir du XVIème siècle, il est démantelé en 1696 lorsqu'une autorisation royale permet aux échevins de vendre la toiture, les matériaux des combles et du donjon pour restaurer le pont. Propriété municipale en 1737, le château est transformé en 1743 en bureaux des coches et écuries pour les chevaux de halage. Sa démolition se poursuit jusqu'en 1833.","architecture":"MELUN, demeure ainsi une résidence royale de second ordre jusqu'au XVe siècle. Mais après la guerre de Cent Ans, le roi n'y séjourne plus guère : le château devient une garnison et une prison (ce qu'il était déjà occasionnellement, puisque sous Philippe le Bel, les templiers de Melun et des alentours y avaient été enfermés). Parmi les prisonniers de marque incarcérés à Melun, on trouve le duc Jean dAlençon en 1456, lamiral de Brion en 1539, François de Coligny en 1558, etc.Vue de Melun en 1650 par Israël Silvestre, montrant le château dans son état du XVIIe siècle.La ruine des tours (signalée dès 1639) et les destructions dues à lexplosion dun magasin à poudre (1647) provoquent la levée en 1660 dun impôt  sur la généralité de Paris, consacré entre autres aux réparations  du château. Cependant, les destructions se poursuivent : en 1674 et en 1692 deux tours sont détruites par un incendie. Le château devient une carrière de pierres : en 1689 les capucins en prélèvent pour la construction des piliers de leur cloître et en 1692 des pierres sont employées pour réparer la porte de Bierre. Au XVIIIe siècle, le château est cédé à la municipalité pour y installer une caserne. Ce projet restant sans suite, les vestiges du logis royal sont loués aux fermiers des coches d'eau en 1743, tandis que l'aménagement du port entraîne le remblaiement des fossés et la démolition des fortifications. Les derniers éléments de l'édifice sont détruits dans les années 1830. Seul le soubassement d'une tour marque encore le site occupé par le château jusqu'au début du XXe siècle. De nos jours, plus aucune trace ne subsiste de l'ancien château de Melun, en dehors d'une citerne incluse dans une propriété privée.","habitants":"Roi de France\"","divers":"Deux châteaux dans cet article Melun et hôtel de ville.","gps":"","images":["../../jctruffet.com/image/image_77/77_Melun_II_1.html","../../jctruffet.com/image/image_77/77_Melun_II_2.jpg"]},"Consult_chateau_formulaire9b23":{"id":"Consult_chateau_formulaire9b23","dept":"77","canton":"Provins","commune":"Cerneux","nom":"Monglat","type":"Château","periode":"XVII","histoire":"MONGLAT, devint célèbre grace à la baronne de Montglat, qui fut la gouvernante des enfants du roi Henri IV. L'histoire de Cerneux est, dès le XIIIe siècle, étroitement liée à celle du château de Montglas, situé à l'ouest du village. La seigneurie, détenue par des membres de l'entourage royal, prit rapidement de l'importance. Alors que la guerre de Cent Ans approche de son terme, un des principaux artisans des victoires françaises, Jean Bureau, grand maître de l'artillerie de Charles VII, acquiert la terre de Cerneux, dont hérite son fils Pierre. Celui-ci, sans postérité, testa en faveur de ses beaux-frères, Geoffroy Cur, fils de Jacques Cur, grand argentier du roi, et Guillaume Dauvet. Leurs familles s'implantent à Montglas et aux alentours, notamment à Champcenest et aux Marêts. Germaine Cur, fille de Geoffroy, dame de Montglas, épouse un Harlay, dont les descendants, les Clermont d'Amboise garderont le fief jusqu'à la Révolution, tandis que la baronnie est érigée en marquisat. Plusieurs membres de la famille sont des familiers de la cour du roi : Françoise de Longuejoue, épouse de Robert de Harlay, proche d'Henri IV, devient « madame de Montglas ». Elle est nommée par le roi gouvernante des Enfants de France. Le futur Louis XIII l'appelle « maman Ga ». Sa fille, Jeanne de Harlay, marquise de Saint-Georges, est chargée de la même mission auprès de la Grande Mademoiselle. Les Mémoires de cette dernière relatent plusieurs étapes et séjours à Montglas.","architecture":"MONGLAT, une autre madame de Montglas est, sous Louis XIV, la maîtresse de Bussy-Rabutin. Ce dernier la dissimule sous le surnom de Bélise dans histoire amoureuse des Gaules. La commune de Cerneux, traversée par la Route Nationale 4, a conservé son caractère à la fois rural et seigneurial. Le château de Monglat fut habité par Georges Minoret, beau-frère de Martial Caillebotte, lui-même frère du peintre. Le tableau Rue de Paris, temps de pluie, Chicago, the Art Institute en orna les murs jusqu'en 1950. Le château de Monglat a été inscrit aux M.H. depuis 1990.","habitants":"Baronne de Montglat\"","divers":"Monglat  GPS : 48° 41' 38\" Nord, 3° 20' 47\" Est","gps":"48° 41' 38\" Nord, 3° 20' 47\" Est","images":["../../jctruffet.com/image/image_77/77_Monglat_1.jpg","../../jctruffet.com/image/image_77/77_Monglat_2.jpg"]},"Consult_chateau_formulairec7c3":{"id":"Consult_chateau_formulairec7c3","dept":"77","canton":"La Ferté-sous-Jouarre","commune":"Montceaux les Meaux","nom":"Montceaux_Meaux","type":"Châteaux","periode":"XIV-XVI","histoire":"Quatre châteaux dans cet article; Palais de Montceaux les Meaux, Frot, et Gue.                                                                                                                                   MONTCEAUX Au XVIe siècle, le château d'origine est reconstruit  par un architecte proche des milieux artistiques de Fontainebleau. Entre 1547 et 1560, la splendeur du château portant ombrage au Roi Henri II, celui-ci oblige Laguette à lui céder le domaine. Le Roi Henri II l'offre à Catherine de Médicis, qui fait réaliser des aménagements par Philibert Delorme, et d'autres artistes.  Le Primatice y a oeuvré également. En 1596, Henri IV offre le château à Gabrielle d'Estrées, qui entreprend aussi des travaux. A la mort de Gabrielle d'Estrées, Henri IV vend la propriété à Marie de Médicis. Les travaux sont poursuivis par l'architecte Salomon de Brosse jusqu'en 1622. Sous Louis XV, le château accueille les équipages du prince de Conti qui aménage un rendez-vous de chasse dans le pavillon nord-est. Au moment de la Révolution, vers 1796 l'édifice est démoli, hormis la chapelle et les bâtiments de l'avant-cour qui sont transformés, au XIXe siècle, en habitation bourgeoise avec un décor intérieur remis au goût du jour et des percements de façades. La partie Est est transformée en bâtiment de ferme. Aujourd'hui appartient à M.Peyrot de Gachons . Éléments protégés MH : toutes les parties bâties et non bâties liées au château en totalité : classement par arrêté du 4 mars 2005.                                                                                                      FROT, le château Frot se situe Cours Pinteville. Il est de style Mansart.  abrite dans ses murs le conservatoire de Meaux.  C'est devenu le conservatoire de Musique.","architecture":"PALAIS de MEAUX  a une dizaine de K.M. La construction du Palais épiscopal date du XIIe et XVIe siècles. Il est entouré du Jardin Bossuet, du XVIIe siècle et le jardin des remparts. Le rocher romantique posé au centre du bassin date de cette époque. Les remparts aménagés en jardins-suspendus, abritent le cabinet de travail de Bossuet.                                                                                                            FROT  se situe Cours Pinteville. Il est de style Mansart. Le château Frot abrite dans ses murs . Le château Frot,  c'est devenu le conservatoire de Musique                                                                                                                                          GUE à Tresmes, ancienne ferme seigneuriale, le château est construit par le comte François-Jean de la Myre Mory d'Honneinghem et demeure dans cette famille jusqu'en 1834. Possédé par la suite par différents propriétaires, puis il est racheté en 1946 par l'État. Il fait maintenant partie d'un lycée d'enseignement professionnel. Le parc fait huit hectares. Le pigeonnier, de forme carrée avec un toit à deux pentes, est détruit vers 1948. Les douves ont été asséchées.Éléments protégés MH : les façades et les toitures ; la salle à manger et le hall d'entrée du rez-de-chaussée : inscription par arrêté du 14 septembre 1949","habitants":"Marie de Médicis                 Gue   comte François-Jean de la Myre Mory d'Honneinghem\"","divers":"Quatre châteaux dans cet article; Palais de Montceaux les Meaux grav 5, Frot, et Gue grav-3                                              Frot GPS : 48° 57' 37\" Nord, 2° 53' 18\" Est                                                          palais GPS : 48° 57' 37\" Nord, 2° 53' 18\" Est","gps":"48° 57' 37\" Nord, 2° 53' 18\" Est","images":["../../jctruffet.com/image/image_77/77_Montceaux_Meaux_1.jpg","../../jctruffet.com/image/image_77/77_Montceaux_Meaux_2.jpg","../../jctruffet.com/image/image_77/77_Montceaux_Meaux_3.jpg","../../jctruffet.com/image/image_77/77_Montceaux_Meaux_4.jpg","../../jctruffet.com/image/image_77/77_Montceaux_Meaux_5.jpg","../../jctruffet.com/image/image_77/77_Montceaux_Meaux_6.jpg","../../jctruffet.com/image/image_77/77_Montceaux_Meaux_7.jpg"]},"Consult_chateau_formulaire2d63":{"id":"Consult_chateau_formulaire2d63","dept":"77","canton":"Saint-Fargeau-Ponthierry","commune":"Pringy,","nom":"Montgermont","type":"Château","periode":"XVII-XIX","histoire":"MONTGERMONT, le premier château de Montgermont était un manoir fortifié composé d'un corps principal et de deux ailes, ceinturé de fossés et flanqué de sept tours, dont deux seulement subsistent en 1670. Au Moyen Âge, la seigneurie de Montgermont n'appartient pas à la paroisse de Pringy. Elle possède sa propre église, bâtie au XIIIe siècle au nord-ouest du château. A la fin du XVIIe siècle, celle-ci est entièrement restaurée par Adam de Montgermont. En 1788, Montgermont est réunie à la paroisse de Pringy. En 1789 et 1790, Jean-Armand Louis de Gontault Biron confie à l'architecte Soufflot Le Romain les travaux afin de transformer le château et à lui ôter son aspect féodal. L'aile droite et deux tours sont démolies. Le château est aussi remanié au XIXe siècle à l'initiative de Aimé de Gontault-Biron. L'aile gauche est entièrement démantelée. Une galerie et un perron en fer à cheval sont élevés sur la façade principale. A la fin du XIXe siècle, la famille Poulain fait ajouter deux ailes en avancée et une tour ronde et une autre tour hexagonale aux angles. L'ensemble du bâtiment est exemplaire du style néo-Louis XIII.","architecture":"MONTGERMONT, c'est un château de style Renaissance, il a été  remanié à la fin du XVIIIe siècle et au XIXe siècle les Gontaut-Biron afin de lui ôter son aspect féodal, puis à la fin du XIXe pour la famille Poulain qui fait ajouter deux ailes en avancée et deux tours d'angle, l'une de forme ronde, l'autre de forme hexagonale. L'ensemble du bâtiment est exemplaire du style néo-Louis XIII, au même titre que le château de Courances. Le château  est aujourd'hui divisé en plusieurs appartements. Le Temple d'Amour, a été construit, en 1786, dans le parc du château de Montgermont, par François Soufflot le Romain, pour la marquise de Gontaut-Biron, retenue à Parme par une forte fièvre, à l'initiative de ses amis.","habitants":"Jean-Armand Louis de Gontault Biron      Famille Poulain                 \"","divers":"Montgermont GPS : 48° 30' 50,2\" Nord, 2° 32' 39,71\" Est","gps":"48° 30' 50,2\" Nord, 2° 32' 39,71\" Est","images":["../../jctruffet.com/image/image_77/77_Montgermont_1.jpg"]},"Consult_chateau_formulaire820b-2":{"id":"Consult_chateau_formulaire820b-2","dept":"77","canton":"Provins","commune":"Soisy-Bouy","nom":"Montramé","type":"Forteresse","periode":"XII-XV","histoire":"MONTRAME, entre 1463 et 1494, le château fut géré par le seigneur Nicolas La Ballue, entre autres, conseiller du roi. Le château de Montramé fut habité par la famille Du Tillet au milieu du XVe siècle. Elie II du Tillet, fils de Jean 1er du Tillet et Jeanne Brinon fut seigneur de Gouaix-en-Brie et Servolles,  placé à la cour notamment en tant que secrétaire ordinaire du Dauphin (futur François II en 1557), puis conseiller du roi Charles IX, puis grand réformateur des eaux et forêts de France sous Henri III. Entre 1484 et 1520, son second fils Jacques 1er du Tillet, écuyer puis chevalier, se forgea un large domaine en tant que seigneur de Montramé et Bouy, Chalautre-la-petite, Servolles. Sa descendance, Jacques II du Tillet devint en décembre 1643, à la mort de son père, lui succéda en tant que seigneur de Montramé, Bouy. Puis l'aîné de Jacques II, Louis du Tillet en 1662 devient seigneur, il céda ensuite la demeure à son fils Charles-Claude du Tillet dit « Marquis du Tillet », il était en plus de son titre seigneurial, brigadier des armées du roi. Charles-Claude François du Tillet de Montramé y résida jusqu'à sa mort en 1783 avec son épouse Charlotte-Geneviève Pellard de Sebbeval de Beaulieu. Ils eurent 5 enfants qui portèrent eux aussi le titre « de Montramé », cepedant il n'en survécut qu'un seul qui émigra en Allemagne, en 1792.","architecture":"MONTRAME  La construction du château de Montramé a débuté au XIIe siècle et s'est achevé au XIXe siècle. Il fut détruit en partie pendant la Révolution. Les bâtiments encore debout correspondent aux dépendances du château, il reste une petite chapelle romane, un escalier en pierre et de belles salles voûtées restaurés, en 1927, ainsi que des jardins à la française et les mûrs d'enceinte.","habitants":"Famille Du Tillet\"","divers":"Montramé  GPS : 48° 30' 44\" Nord, 3° 17' 19\" Est","gps":"48° 30' 44\" Nord, 3° 17' 19\" Est","images":["../../jctruffet.com/image/image_77/77_Montram%c3%a9_1.jpg","../../jctruffet.com/image/image_77/77_Montram%c3%a9_2.jpg"]},"Consult_chateau_formulaire9c14":{"id":"Consult_chateau_formulaire9c14","dept":"77","canton":"Serris","commune":"Montry","nom":"Montry","type":"Château","periode":"XIII-XVII-","histoire":"MONTRY, à la fin du XVe siècle, Pierre de Vaudetar, Chambellan du roi Charles VI, fait lacquisition de terrains à Montry. Les Vaudetar de Lombardie, aussi appelés Valdetar ou Di Val Dell'Tarro (\"Du Val des Terres\", nom provenant d'une terre que leur ont donné les anciens Ducs de Milan en 1010) étaient arrivés en France à la fin du XIIIe siècle ; ils ont joué un rôle important sous les premiers Valois au parlement de Paris. Le premier château est construit à cette époque.  En 1590, le bâtiment est entièrement détruit par un incendie. La propriété est acquise par Claude de Reilhac qui reconstruit le château l'année suivante. Le domaine reste dans cette famille, qui obtient le titre de Comté durant plus de quatre siècles. Lors de la révolution française aucun membre de la noblesse n'émigra (notamment en raison de l'inoffensivité et de l'infirmité du comte Antoine). Le 18 septembre 1870, le chancelier allemand Otto von Bismarck y rencontre Jules Favre, ministre des Affaires étrangères, afin de débuter les négociations de paix de la guerre franco-prussienne.","architecture":"En 1923, meurt le dernier comte de Reilhac. Sa fille hérite du domaine, puis après sa mort, ses 3 enfants. Le 18 janvier 1940, le grand quartier général français s'installe dans le château jusqu'au 8 juin où le GQG se replie sur Briare. Entre-temps, le 1er juin le colonel Charles de Gaulle y reçoit le grade de Général de brigade. Le 1er juillet 1946 l'État achète le domaine 5 millions de francs. En 1952, le domaine devient un CREPS jusqu'en 20054, puis un EPIDE.","habitants":"Famille de Claude de Reilhac \"","divers":"Montry  48° 50' 09? nord, 3° 15' 57? est","gps":"","images":["../../jctruffet.com/image/image_77/77_Montry_1.jpg"]},"Consult_chateau_formulaire5a3c":{"id":"Consult_chateau_formulaire5a3c","dept":"77","canton":"Montereau-Fault-Yonne","commune":"Moret sur Loing","nom":"Moret_sur_Loing","type":"Patrimoine","periode":"XII--XV","histoire":"MORET,      c'est pendant le règne de Philippe Auguste à la fin du XIIe siècle que la ville se dota de fortifications, avec vingt tours, quatre poternes et le château Royal qui est alors constitué d'une enceinte et d'un donjon où s'adossent quelques bâtiments. Le donjon, unique vestige du château, marque fortement le paysage, au XIIe siècle, il comportait trois niveaux : un étage inférieur peu éclairé, un premier étage à grandes baies desservi par un escalier à vis, et un couronnement défensif muni d'échauguettes aux angles. A partir du XIVe siècle, le donjon sert à l'occasion de prison d'état. Il abritera entre autres prisonniers Nicolas Fouquet. Après la Révolution, l'édifice est confisqué et vendu comme bien national, sa démolition commence par la partie supérieure mais s'arrête lorsqu'on le transforme en entrepôt. Racheté par un particulier au début du XXe siècle, il sera restauré avec quelque remaniements qui ont modifié son apparence.  Éléments protégés MH : le donjon de Moret : inscription par arrêté du 28 avril 1926. Les parties subsistantes de l'enceinte du donjon : inscription par arrêté du 19 juillet 1974.                                                                                                                                     Village voisin  Vernou-la-Celle-sur-Seine  GRAVILLE une première de la  forteresse est construite vers 1235, et ruinée au début du XVIe siècle. La construction d'un château neuf est entreprise à partir de 1580, sans doute par l'architecte Baptiste Androuet du Cerceau. Ce dernier utilise les fondations de l'ancienne forteresse et reprend le plan rectangulaire permettant une construction moderne symétrique. Les jardins, représentés sur une carte des chasses du roi du début du XVIIIe siècle, consistent en parterres devant le corps de logis, prolongés par une demi lune et une patte d'oie qui ouvrent sur les bois. En 1863, la comtesse de Lancosme ne conserve que le corps central et fait raser le reste. Le bâtiment central est intérieurement transformé. Les jardins sont transformés en parc paysager par Denis Bühler.  Les façades et les toitures du château ; les douves ; les façades et les toitures des communs ; le parc ; inscription par arrêté du 15 septembre 2006","architecture":"Porte de Bourgogne est construite au XVe siècle, sous le règne de Charles VII, en même temps que le reste des fortifications. Au XVIe siècle, elle perd son intérêt militaire et devient le baillage royal de Moret. La Porte de Bourgogne est légèrement différente de la Porte de Samois : elle a sensiblement les mêmes dimensions et la même architecture. De forme carrée, surmontée d'un toit quadrangulaire, elle est percée de 2 arcades ogivales, permettant entre les 2, de coulisser une herse. La Porte est précédée sur l'extérieur d'un pont enjambant le Loing. De l'extérieur, elle est flanquée de 2 pilastres qui supportent la base de 2 tourelles. Côté intérieur, la façade ne possède pas de pilastres, mais possède les mêmes base de tourelles, ces tourelles existaient, primitivement, positionnées aux coins d'une plate-forme qui fut modifiée pour construire le toit quadrangulaire. Ancien baillage, la Tour abrite toujours une cage de fer, qui fut construite en madriers de chêne de bois, renforcé de fer, servant de cellule de prison, dont les archives locales relatent diverses anecdotes et histoires rocambolesques. Posée sur l'axe Sud-Est/Nord-Ouest, elle est dirigée vers l'extérieur, en direction de la Bourgogne, sur la rive Ouest de la rivière Loing. La Porte de Bourgogne fait face à la Porte de Samois, distante de 300 mètres. La Porte de Bourgogne est classée aux M.H.                            SAIT-ANGE à Villecerf, a proximité de Moret  Entre 1543 et 1546 Anne de Pisseleu, Mademoiselle dHeilly, devenue la comtesse puis la duchesse dEtampes, après avoir embelli son domaine de Limours, décida de faire bâtir la \"maison de plaisance de Challeau construite à la moderne  En 1798, la Révolution a passée, il ne subsiste que les murs de soutènement. Ce sont ces importants vestiges dont Balthazar de Rennel, comte de Lescut et du Saint Empire, fait lacquisition en 1815. Il devient maire de Villecerf et sefforce de rétablir la maison et le site de Saint-Ange. En 1821, sa mort ninterrompra quun temps cette restauration. Immédiatement son gendre, malgré ses autres occupations, y mettra une énergie et une compétence sans pareille afin de restaurer la demeure.","habitants":"comtesse de Lancosme\"","divers":"Graville grav-2   GPS : 48° 22' 28\" Nord, 2° 48' 54\" Est                                                                             Porte GPS : 48° 22' 22\" Nord, 2° 49' 08\" Est                                                       St-Ange grav 6","gps":"48° 22' 28\" Nord, 2° 48' 54\" Est","images":["../../jctruffet.com/image/image_77/77_Moret_sur_Loing_1.jpg","../../jctruffet.com/image/image_77/77_Moret_sur_Loing_2.jpg","../../jctruffet.com/image/image_77/77_Moret_sur_Loing_3.jpg","../../jctruffet.com/image/image_77/77_Moret_sur_Loing_4.jpg","../../jctruffet.com/image/image_77/77_Moret_sur_Loing_5.jpg","../../jctruffet.com/image/image_77/77_Moret_sur_Loing_6.jpg"]},"Consult_chateau_formulaire8acd":{"id":"Consult_chateau_formulaire8acd","dept":"77","canton":"Nemours","commune":"Lorrez-le-Bocage-Préaux,","nom":"Motte_Préaux","type":"Château","periode":"XV-XIX","histoire":"La MOTTE, élevé sur les fondations d'un ancien manoir féodal du moyen âge, le château de Lorrez le Bocage Préaux fut construit pour Aymar de Brisay, seigneur de La Motte et de Lorrez de 1480 à 1512. Beaucoup plus tard, en 1839, il fut acheté et restauré par Madame Amélie Greffulhe, comtesse Paul de Ségur. C'est à cette époque que Sophie Rostopchine, d'origine russe, \"Comtesse de Ségur\" et écrivain célèbre, venait au château pour rendre visite à la famille de son époux, le comte Eugène de Ségur, un cousin du comte Paul. Vendu sous la Révolution puis laissé à l'abandon, le domaine de la Motte fut racheté, en 1839, par la comtesse Paul de Ségur,  qui le fit restaurer, dans son état actuel. Sophie Rostopchine, d'origine russe, \"Comtesse de Ségur\" et écrivain célèbre, venait au château pour rendre visite à la famille de son époux, le comte Eugène de Ségur, un cousin du comte Paul de Ségur. Quelques année, plus tard, Juliette, la fille de la comtesse et du comte Paul de Ségur, qui devint la comtesse Hubert de La Rochefoucauld, qui décéda le 24/12/2007; , épousa le comte Roger de La Rochefoucauld en 1853. En 1947 son arrière-petit-fils épousa la princesse Geneviève de Mérode qui devint la comtesse Hubert de La Rochefoucauld dont la grande générosité, l'attention et la disponibilité ont laissé dans les curs l'image d'une grande dame. Elle s'est éteinte le 24 décembre 2007 à la maison de retraite, le château de Villeniard, où elle avait passé une partie de son enfance. Son fils, le comte Bernard de La Rochefoucauld, est l'actuel propriétaire du château de la Motte. Éléments protégés MH : le pigeonnier ; les restes des piliers du portail d'accès aux communs : inscription par arrêté du 12 mai 1975","architecture":"LA MOTTE, la construction du château de la Motte date du XVe au XIXe siècle. Il est de style Médiéval. Il appartenait à Aymard de Brisay. Au XIIe siècle, le roi Louis VII fit construire à Lorrez-le-Bocage un castelum dont il subsiste quelques vestiges, mais le château d
