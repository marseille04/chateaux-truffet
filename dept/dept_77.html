const FULL={"Consult_chateau_formulaire092e":{"id":"Consult_chateau_formulaire092e","dept":"77","canton":"Claye-Souilly","commune":"Annet sur Marne","nom":"Annet_sur_Marne","type":"Châteaux","periode":"XVII-XVIII","histoire":"Trois châteaux dans cet article D'étry,  Louche et Sannois                                                  D'ETRY   Ancien fief construit au XVIIIe siècle par larchitecte Perronet (il réalisa de nombreux ponts dont un très célèbre, le pont de la Concorde à Paris), la demeure conserve des éléments de décors de cette époque, des boiseries, des plaques de cheminée, un balcon en fer forgé et un beau pigeonnier à pied. Le château fut la résidence du vicomte François Joseph Chaussegros de Léry, Général d'Empire, ancien Maire de la commune, et son épouse, Madame la vicomtesse de Léry, fille du Maréchal Kellerman, Duc de Valmy. Son dernier propriétaire, Pierre Henri Domange, maire dAnnet en 1923, en fit don à lassistance publique des Hôpitaux de Paris, le château abrite un centre qui a pour vocation d'acceuillir des préadolescents et adolescents de la ville de Paris en difficultés familiales, sociales et scolaires, de 12 ans et demi à 16 ans pour une durée généralement de deux ans, et plus rarement de trois ans, dans le cadre d'un placement administratif ou judiciaire par le juge des enfants. Annet sur Marne. La construction du château d'Etry date du XVIIIe siècle, il abrite, aujourdhui, un centre dOrientation de lEnfance de la ville de Paris.","architecture":"LOUCHE Le Château de Louche fut reconstruit dans la première moitié du XIXe siècle. Ce château était devenu une maison de retraite, depuis 2007. Il y a un jardin d'agrément et un parc au château de Louche, il vient de défrayer la chronique où 3 stagiaires maltraitaient des personnes agées et avaient diffusé leurs harcèlements, sur Internet, créant un énorme scandale.                                                      SANNOIS a été reconstruit en 1840, le château de Sannois  avec un jardin d'agrément appelé le Parc du XVIIIe siècle, qui abrite aujourdhui un centre dOrientation de lEnfance de la Ville de Paris et son jardin d'agrément appelé le Parc du château d'Etry.","habitants":"Vicomte François Joseph Chaussegros de Léry\"","divers":"Deux châteaux dans cet article D'étry grav -1,  Louchegrav-2-3 et Sannois grav-4                                     Louche GPS : 48° 55' 32\" Nord, 2° 43' 09\" Est                                                   Sannoy GPS : 48° 55' 44,48\" Nord, 2° 43' 7,19\" Est","gps":"48° 55' 32\" Nord, 2° 43' 09\" Est","images":["../../jctruffet.com/image/image_77/77_Annet_sur_Marne_1.jpg","../../jctruffet.com/image/image_77/77_Annet_sur_Marne_2.jpg","../../jctruffet.com/image/image_77/77_Annet_sur_Marne_3.jpg","../../jctruffet.com/image/image_77/77_Annet_sur_Marne_4.jpg"]},"Consult_chateau_formulaire69ed":{"id":"Consult_chateau_formulaire69ed","dept":"77","canton":"Ozoir-la-Ferrière","commune":"Tournan en brie","nom":"Armainvilliers","type":"Château","periode":"XIV","histoire":"GRETZ-ARMAINVILLIERS,Tournan-en-Brie et de Gretz-Armainvilliers. Un château y était mentionné dès le XIVe siècle, qui servit de refuge à François Ier en 1544, après la prise de château-Thierry, par Charles-Quint. À partir de cette époque, il devint la résidence des seigneurs de Tournan. Au XVIIe siècle, il appartient aux Beringhen, puis au comte d'Eu et au Duc de Penthièvre, mais il est en partie détruit pendant la Révolution. La Famille de La Rochefoucauld-Doudeauville restaurera, le château d'Armainvilliers, sous le Second Empire et y fera rajouter les boiseries du château de Bercy, tout en aménageant le parc. Acquis en 1877, par Edmond de Rothschild, et sera entièrement rasé et remplacé par une résidence moderne, complétée par de luxueux pavillons de gardes, des fermes en style normand, de vastes communs, une grande orangerie, sur le modèle anglais. Une infirmerie sera aménagée durant la Première Guerre mondiale. Durant la Seconde Guerre Mondiale, il  fut occupé par les troupes allemandes. Allure d'une grande villa normande construite par Edmond de Rothschild, en 1877, sur l'emplacement de l'ancien château du duc de Penthièvre. En 1980, le château  a été acquis par Hassan II, roi du Maroc, qui fit réaliser des travaux très important de réhabilitation. Le château a été revendu, par son fils Mohammed VI, devenu le roi du Maroc, en 2008.","architecture":"ARMAINVILLIERS Il est fait mention de cet ancien fief au XIIe siècle. Il s'étend sur les deux communes de Tournan-en-Brie et de Gretz-Armainvilliers. Un château y était mentionné dès le XIVe siècle, qui servit de refuge à François Ier en 1544, après la prise de château-Thierry, par Charles-Quint. À partir de cette époque, il devint la résidence des seigneurs de Tournan. Au XVIIe siècle, il appartient aux Beringhen, puis au comte d'Eu et au duc de Penthièvre, mais il est en partie détruit pendant la Révolution. La famille de La Rochefoucauld-Doudeauville restaurera, le château d'Armainvilliers, sous le second Empire et y fera rajouter les boiseries du château de Bercy, tout en aménageant le parc. Sosthènes de La Rochefoucauld, 2eme duc de Doudeauville, et ancien aide-de-camp du Roi Charles X, décèdera en 1864, au château d'Armainviliers. Acquis en 1877, par Edmond de Rothschild. Durant la seconde guerre mondiale,  .","habitants":"Famille de La Rochefoucauld-Doudeauville,             Edmond de Rothschild\"","divers":"GPS : 48° 45' 00\" Nord, 2° 44' 47\" Est","gps":"48° 45' 00\" Nord, 2° 44' 47\" Est","images":["../../jctruffet.com/image/image_77/77_Armainvilliers_1.jpg","../../jctruffet.com/image/image_77/77_Armainvilliers_2.jpg","../../jctruffet.com/image/image_77/77_Armainvilliers_3.jpg"]},"Consult_chateau_formulairef70d":{"id":"Consult_chateau_formulairef70d","dept":"77","canton":"Nangis","commune":"Champeaux","nom":"Aunoy","type":"Château","periode":"XVIII","histoire":"AUNOY, une quadruple allée de marronniers centenaires mène vers une petite folie Louis XV. Au Moyen Age, Saint-Fare, et surtout les célèbres amants Héloïse et Abelard illustrèrent le domaine La construction initiale de caractère médiéval,  fut acquise par les Favre qui prendront le nom de Favre d'Aunoy. Le château actuel fut rebâti pour Jean Baptiste Chabert.  Après la mort du marquis de la Tour du Pin Montauban en 1837, le château subissait les ravages de la \"bande noire\", qui le dépouillait de son mobilier, sans pour autant avoir le temps de le démolir. Cette bande noire était un groupement de spéculateurs qui achetaient les demeures, après la Révolution, pour les démolir et en vendre les matériaux de construction. Un parc de 16 hectares clos, entoure le château. Il comprend plusieurs fabriques du XVIIIe siècle, un ermitage, un obélisque, une grotte rustique et une tour, vestige de l'ancien château. Éléments protégés MH : le château ; les communs et les bâtiments annexes ; la cour d'honneur avec ses douves ; les grilles ; les murs ainsi que l'allée et l'hémicycle de marronniers qui lui font face ;  Ahmed Ben Bella a été détenu en résidence surveillée dans le château d'Aunoy, du 7/12/1961 au 20/03/1962   suite au détournement de son avion, pendant la Guerre d'Algérie. depuis 1980,  il appartient à Jean-Louis Tapiau.","architecture":"AUNOY, c'est un château de style médiéval qui a été reconstruit (sans bois pour la structure de sa toiture), au XVIIIe siècle.  Le château du Moyen Age fut ravagé par un incendie en 1750.  La particularité de cette reconstruction, consiste dans l'absence de bois de construction, et même de charpente. Ils sont remplacés par des voûtes catalanes ou sarrasines et des arcs en maçonnerie. L'utilisation des voûtes obligeait la construction de murs de près de deux mètres d'épaisseur. Il abrite l'un des premiers parcs à l'anglaise réalisés en France comprenant des étangs, des fabriques, une glacière, des plantations d'essences variées d'arbres dont un magnifique platane datant de la construction du château, en 1750, Aujourd'hui, le château d'Aunoy et son parc peuvent se visiter pendant les mois de Juillet et Août et les locaux de la Faisanderie peuvent être loués,  le château dAunoy regorge datouts, comme sa localisation, à 1 heure de Paris, sa superficie, unique en Île-de-France, et son splendide parc à lAnglaise.   Le château d'Aunoy a été inscrit aux M.H. depuis le 25/04/1986.","habitants":"Famille de  Jean Baptiste Chabert\"","divers":"GPS : 48° 34' 31\" Nord, 2° 48' 04\" Est","gps":"48° 34' 31\" Nord, 2° 48' 04\" Est","images":["../../jctruffet.com/image/image_77/77_Aunoy_1.jpg","../../jctruffet.com/image/image_77/77_Aunoy_2.jpg"]},"Consult_chateau_formulaire0111":{"id":"Consult_chateau_formulaire0111","dept":"77","canton":"Montereau-Fault-Yonne","commune":"Barbey","nom":"Barbey","type":"Château","periode":"XVII","histoire":"BARBEY, le chevalier Louis-Marie Aubert du Petit-Thouars (1758-1831) devint propriétaire du Château de Barbey. Cétait un botaniste français, directeur de la pépinière du roi au Roule (de 1807 à 1827),  membre de lAcadémie des Sciences. Il apporte quelques modifications au château et du parc. De 1813 à 1822, il fut également le maire de Barbey. Le château de Barbey, restauré au XXe siècle, est depuis un château privé, fermé au Public.","architecture":"BARBEY  le château de Barbey date du XVIIe siècle.  Il est construit de pierres et briques avec une toiture en ardoise, construit au cur dun petit village du sud-est il est situé près de lYonne. Lors de sa construction, cest un manoir à larchitecture classique, entouré de fortifications. Ces dernières sont détruites en 1794 et il nen reste plus aucune trace aujourdhui. Édifié à partir de pierres et de briques, le château comporte deux étages et deux tourelles. Il apporte quelques modifications au château et notamment au parc. De 1813 à 1822, il est également maire de Barbey. Le château, restauré au XXe siècle, est encore aujourdhui une habitation privée.","habitants":"Louis-Marie Aubert du Petit-Thouars \"","divers":"Barbey  GPS : 48° 21' 54\" Nord, 3° 03' 25\" Est","gps":"48° 21' 54\" Nord, 3° 03' 25\" Est","images":["../../jctruffet.com/image/image_77/77_Barbey_1.jpg"]},"Consult_chateau_formulaire6d13":{"id":"Consult_chateau_formulaire6d13","dept":"77","canton":"Torcy","commune":"Férolles-Attilly","nom":"Barre_Férolles","type":"Chateau","periode":"XVII-XIX","histoire":"BARRE,  c'est en 1615 que Fabien Simon secrétaire du Roy déclare tenir le fief de la Barre. La terre passe ensuite à la famille Lyonnes de Servon. Le château de la Barre a été construit au XVIIe siècle siècle, il donnera son nom, en 1639, à la Famille Le Fèvre, qui en deviendra propriétaire. Joseph-Antoine Le Febvre de La Barre (1622-1688), fut gouverneur de la Nouvelle-France. Antoine II Le Febvre de La Barre, prévôt des marchands de Paris. François-Jean Lefebvre de La Barre (1745-1766), chevalier de La Barre, né au château fut accusé sans preuves, d'avoir mutilé un crucifix, placé sur le pont de la ville. Malgré l'absence de preuve, il sera condamné à mort et exécuté, à Abbeville, le 1/07/1766. Voltaire prit sa défense. Sa mémoire sera défendue par Voltaire qui accusera les autorités religieuses, de fanatisme, en ce siècle des Lumières. Lanjuinais, qui fut membre de la convention, résida, lui aussi, au Château de la Barre, il a été reconstruit, à la fin du XIXe siècle, dans le style du XVIIe siècle. Il est doté d'un colombier. Son parc est traversé par la rivière le Réveillon, qui est un affluent de l'Yerres.","architecture":"BARRE  Le 31 juillet 1638, Antoine Lefebvre de la Barre (conseiller au parlement de Paris et prévôt des marchands de Paris de 1650 à 1654) achète le château à Jean de Lyonnes. Issu de la famille du même nom,d'être resté couvert lors d'une procession de Capucins, de s'être moqué des catholiques. Le jeune supplicié sera défendu par Voltaire après sa mort, le philosophe accusera les autorités religieuses, de fanatisme, en ce siècle des Lumières.\nJean-Denis Lanjuinais, qui est membre de la Convention, résidera au château de la Barre. Par la suite, le château sera reconstruit, à la fin du XIXe siècle, dans le style du XVIIe siècle.","habitants":"François-Jean Lefebvre de La Barre \"","divers":"Barre  GPS : 48° 44' 05\" Nord, 2° 37' 41\" Est","gps":"48° 44' 05\" Nord, 2° 37' 41\" Est","images":["../../jctruffet.com/image/image_77/77_Barre_F%c3%a9rolles_1.jpg"]},"Consult_chateau_formulaire0ec0":{"id":"Consult_chateau_formulaire0ec0","dept":"77","canton":"Combs-la-Ville","commune":"Lieusaint","nom":"Barrière_Fresnaye","type":"Château","periode":"XIX","histoire":"BARRIERE sa construction date de 1910. Il est de style Louis XIII. Son propriétaire initial était Jean-Baptiste Gobert-Martin. Le château de la Barrière actuel fut construit, en 1910, pour Mr et Mme Jean-Baptiste Gobert-Martin, Industriels et Philanthropes, propriétaires des Grands Magasins Réaumur (de la Famille Martin-Thierry & Sigrand). Sa construction date du XVIIIe siècle, plus modeste sur les terres d'une ferme que Mr Gobert-Martin avait acquis au XIXe siècle auprès d'importants propriétaires agricoles. La ferme appartenait à Mr Vaury, ancien Maire de Lieusaint, qui y produisait des betteraves distillées. La rapide construction du château monopolisa des centaines d'artisans et d'ouvriers, pour sa décoration intérieure des plus raffinées. Le château de la Barrière fut occupé par les Allemands pendant la seconde guerre mondiale.                                                                                                                                      La FRESNAYE à Combs la ville à cinq  K.M au nord de Lieusaint , le château de la Fresnaye est recherché en raison de la proximité de Paris, du XVIIIe siècle transformée et aménagée en château bourgeois au XIXe siècle. En effet, dès la fin du XVIIIe siècle, des bâtiments nouveaux apparaissent à Combs-la-Ville. Ce sont des châteaux, mais en vérité de grosses maisons bourgeoises, élevées sur l'emplacement de ruines médiévales ou des constructions du XVIe siècle. C'est le cas du château de la Fresnaye mais aussi des châteaux du Breuil, de Mennechy.  Sous la Révolution et l'Empire, le château appartient à Alexandre Duval, membre de l'Académie Française. Adversaire des Romantiques, l'étoile d'Alexandre Duval cesse rapidement de briller. Il vend alors son château et la commune acquiert la propriété en 1946. Le château accueille aujourd'hui au rez-de-chaussée, deux très belles salles d'expositions et dans ses étages les services municipaux de la Jeunesse, des Sports et de l'Animation culturelle et festive.","architecture":"BARRIERE, il fut par la suite légué aux Surs Salésiennes après la guerre. Ne pouvant entretenir le château de la Barrière, les Surs Salésiennes vendirent le domaine de la Barrière, en 1972, à la société Berger qui y installa son siège social et fit construire une usine de sirops sur 17 Ha de la propriété. L'Usine Berger ferma ses portes, définitivement, en 2003. Le domaine de la Barrière fut revendu, en 2005, à une société financière. Un projet de construction de 485 logements dans un ensemble de 10 bâtiments, et d'une résidence, pour personnes âgées est à l'étude. Le nom du château de la Barrière est cité dans les minutes de la célèbre Affaire du Courrier de Lyon, qui s'est déroulée, non loin de là.","habitants":"Mr Gobert-Martin \"","divers":"deux châteaux dans cet article Barrière lieusaintgrav- 1-2 et la Fresnayes    grav--3                                                                     GPS : 48° 37' 35\" Nord, 2° 33' 26\" Est","gps":"48° 37' 35\" Nord, 2° 33' 26\" Est","images":["../../jctruffet.com/image/image_77/77_Barri%c3%a8re_Fresnayes_1.jpg","../../jctruffet.com/image/image_77/77_Barri%c3%a8re_Fresnayes_2.jpg","../../jctruffet.com/image/image_77/77_Barri%c3%a8re_Fresnayes_3.jpg"]},"Consult_chateau_formulaire3d5f":{"id":"Consult_chateau_formulaire3d5f","dept":"77","canton":"Fontenay-Trésigny","commune":"Pecy","nom":"Beaulieu_Pécy","type":"Château","periode":"XIII XVIII","histoire":"BEAULIEU, la famille de Beaulieu est, au XIIIe siècle, l'une des plus importantes de la Brie. Elle est propriétaire du château jusqu'en 1372. En 1480, Jean Ier du Drac est seigneur de Beaulieu. Plusieurs membres de cette famille ont leur pierre tombale dans l'église de Pécy. Partiellement détruit par un incendie en 1611,  le château de Boissise, dont l'histoire est connue depuis le début du XVIIIe siècle, a été acquis, en 1807, par Charles Lucas  Comte Ponckney Horry, compagnon d'armes de La Fayette et propriétaire de la Harrietta Plantation. Ce dernier avait épousé de Marie Florimonde de Fäy de La Tour-Maubourg, fille du Général-Comte, Charles César de Fay de La Tour-Maubourg. Le château de Beaulieu-sur-Seine a été transmis tout au long du XIXe siècle dans la même fratrie : d'abord à Armand Charles de La Tour-Maubourg, puis à Marie Stéphanie, comtesse Andréossy, enfin à Rodolphe de Faÿ de La Tour-Maubourg, Général de division et pair de France, décédé à Boissise le 27/05/1871. Ce dernier a donné son nom à une partie de la rue principale du centre-bourg.","architecture":"BEAULIEU sur SEINE  le château a été reconstruit. De nombreuses modifications ont eu lieu, également, au XVIIIe siècle. Toute la partie arrière du château est entourée de douves. La façade sur cour est composée de quatre tours en poivrière, deux aux angles, et deux plus petites encadrant l'entrée. Les encadrements de baies, alternant briques et blocs de grès, rythment la façade. Le jardin d'agrément du château de Beaulieu est inscrit au pré-inventaire des jardins remarquables.","habitants":"Famille Rodolphe de Faÿ de La Tour-Maubourg\"","divers":"Beaulieu grav 1-2-3                                                         GPS : 48° 39' 08\" Nord, 3° 04' 08\" Est","gps":"48° 39' 08\" Nord, 3° 04' 08\" Est","images":["../../jctruffet.com/image/image_77/77_Beaulieu_P%c3%a9cy_1.jpg","../../jctruffet.com/image/image_77/77_Beaulieu_P%c3%a9cy_2.jpg","../../jctruffet.com/image/image_77/77_Beaulieu_P%c3%a9cy_3.jpg"]},"Consult_chateau_formulaire5d9b":{"id":"Consult_chateau_formulaire5d9b","dept":"77","canton":"Nangis","commune":"Blandy les Tours","nom":"Blandy_les_Tours","type":"Forteresse","periode":"XIII-XIV-XVI","histoire":"Deux châteaux dans cet article Blandy et  Zastava.                                              BLANDY LES TOURS. Il appartient au vicomte de Melun, Adam II de Chailly, et se réduit à un manoir seigneurial à enceinte irrégulière. Les rois Charles V (de 1364 à 1380) et Charles VI (de 1380 à 1422) financent aux propriétaires successifs du château, les comtes de Tancarville, Jean II et son petit-fils Guillaume IV, les aménagements du château-fort. Un donjon haut défendu par deux ponts-levis est construit. L'enceinte est modifiée par l'ajout de nouvelles tours et de courtines neuves. Ces modifications ont lieu pendant la guerre de Cent Ans. Mais le château de Blandy les Tours fut aussi agrandi au XVIe siècle par François II d'Orléans, le château devient dès lors une demeure de plaisance. Marie de Clèves s'y marie en 1572 en présence d'Henri III de Navarre le futur Henri IV. Le château change souvent de propriétaire et se détériore devenant la ferme des tours. En 1707, le maréchal de Villars, propriétaire du château de Vaux le Vicomte, achète la terre et le château de Blandy ce qui accélère sa ruine, les toitures s'écroulent, les parapets sont détruits, la grande tour porte éventrée. En 1764, le château est revendu à Choiseul, ministre de Louis XV. En 1883, la commune de Blandy les Tour rachète la demeure grâce à un don généreux de son maire, Pierre Charles Tuot. Cette enceinte ruinée et vide de tout bâtiment est alors classée M.H. en totalité en 1889. A partir des années 1970, des associations de bénévoles engagent les premiers travaux de sauvegarde du château. Acquis par le conseil général de Seine et Marne en 1992, le château de Blandy a fait l'objet depuis cette date d'un projet complet de restauration tout en respectant les principales étapes historiques du monument. En septembre 2007, pendant les journées du patrimoine, le château-fort a été rouvert au public après deux ans de travaux. Le château est classé MH par liste de 1889.","architecture":"BLANDY, le château médiéval composé de cinq tours et dun donjon reliés entre eux par un mur denceinte. Il fut construit au XIIIe siècle par le vicomte de Melun et restauré au début des années 1990. Propriété du Conseil Général, il a rouvert le 16 septembre 2007 après 2 ans de travaux. La légende raconte que les soirs du 1er et 2 novembre, un cavalier hanté, caracolerait sur son destrier, en haut du château de Blandy-les-Tours. Du simple manoir fortifié au château fort de la guerre de Cent ans, du château résidentiel renaissant à la Ferme des tours, le château de Blandy-les-Tours a connu une longue histoire et a été la propriété de familles prestigieuses. De la salle d'exposition jusqu'au 3ème étages du Donjon , un médiateur culturel vous fait découvrir lhistoire du château, son architecture et les conditions de vie quotidienne de ses occupants, connues en partie grâce aux fouilles archéologiques. Le contenu de cette visite est particulièrement adapté à un public dadultes et dadolescents mais des passerelles sont possibles pour les plus jeunes.                                                                                                              ZASTAVA, c'est l'ancien château La Borde. Il date du XVIe siècle. Le château Zastava se situe  seulement à 20 km du château de Fontainebleau et à 12 minutes de route du château de Vaux-le-Vicomte. Les propositions et suggestions sont faites avec tact. Les 22 Ha de parc qui entourent le château vous combleront par le calme qui s'en dégagent. Une balade, autour du château Zastava, vous permettra de découvrir ses trésors, son pigeonnier du XVIe siècle et le château Zastava.","habitants":"François II d'Orléans,\"","divers":"Deux châteaux dans cet article Blandy grav-1 à 5 et  Zastava. grav 6                                                            GPS : 48° 34' 02,14\" Nord, 2° 46' 53\" Est                                                                Zastava    GPS : 48° 32\" 33\" Nord, 2° 48' 26\" Est","gps":"48° 34' 02,14\" Nord, 2° 46' 53\" Est","images":["../../jctruffet.com/image/image_77/77_Blandy_les_Tours_1.jpg","../../jctruffet.com/image/image_77/77_Blandy_les_Tours_2.jpg","../../jctruffet.com/image/image_77/77_Blandy_les_Tours_3.jpg","../../jctruffet.com/image/image_77/77_Blandy_les_Tours_4.jpg","../../jctruffet.com/image/image_77/77_Blandy_les_Tours_5.jpg","../../jctruffet.com/image/image_77/77_Blandy_les_Tours_6.jpg"]},"Consult_chateau_formulaireb80d":{"id":"Consult_chateau_formulaireb80d","dept":"77","canton":"Nangis","commune":"Fontenailles","nom":"Bois_Boudran","type":"château","periode":"XVII","histoire":"BOIS-BOUDRAN, propriété du comte de Meaux. Le domaine est acquis au début du XIXe siècle par le comte Jean-Henry-Louis Greffulhe pour en faire un domaine de chasse. Il passe ensuite par héritage au comte Charles Greffulhe, puis à son fils le comte Henry, puis il fut agrandi par une aile de style Premier Empire. Le petit-fils Henry Greffulhe (1848-1942) qui fit agrandir le domaine de 4.500 Hectares. Il fit ajouter au château de Bois-Boudran, une aile monumentale, conçue par l'architecte Ernest Sanson, comportant un théâtre, d'immenses pièces de réception, et de nombreux appartements permettant d'accueillir des invités prestigieux, parmi lesquels le Roi d'Espagne et le Roi du Portugal. L'aile a été démolie en 1960. Le carrelage et l'escalier ont été reposés au château des Moyeux à La Chapelle-Rablais. Les boiseries rococo du salon Louis XV de la Comtesse Greffulhe ont été rachetées par le Marchand de pétrole texan John W. Mecom, pour l'hôtel de la Colombe d'Or de Houston aux USA. Marcel Proust (1871-1922), a séjourné à plusieurs reprises au château de Bois-Boudran à Fontenailles, il fait partie, du Golf de Fontenailles. Des chasses sont encore organisées dans une partie importante de l'ancien domaine.","architecture":"BOIS-BOUDRAN, petit château de style Louis XIII  entouré d'un beau parc, une partie du château actuel est construite au XVIIe siècle. C'est le corps de logis de style classique donnant sur le côté nord, agrandi par une aile de style premier empire, du côté sud. Les propriétaires  Jean-Henry-Louis Greffulhe (1774-1820), comte, nommé pair de France par Louis XVIII, maire de la commune de Fontenailles en 1820.  Louis-Charles Greffulhe (1814-1888), fils du comte Jean-Henry-Louis Greffulhe.  Henry Greffulhe (1848-1932), fils du comte Louis-Charles Greffulhe et de la comtesse Félicie de La Rochefoucauld d'Estignac, époux d'Élisabeth de Caraman, élu député de 1889 à 1893, puis conseiller cantonal.","habitants":"Famille du comte Jean-Henry-Louis Greffulhe \"","divers":"Bois-Boudran, GPS : 48° 33' 44\" Nord, 2° 56' 57\" Est","gps":"48° 33' 44\" Nord, 2° 56' 57\" Est","images":["../../jctruffet.com/image/image_77/77_Bois_Boudran_1.jpg","../../jctruffet.com/image/image_77/77_Bois_Boudran_2.jpg"]},"Consult_chateau_formulairecb0c":{"id":"Consult_chateau_formulairecb0c","dept":"77","canton":"Saint-Fargeau-Ponthierry","commune":"Boissise le roi","nom":"Boissise_le_Roi","type":"Château","periode":"XVI-XVII-XIX","histoire":"BOISSISE LE ROI, en 1186, l'archevêque de Sens fit don au prieuré St Victor, des terres de Boissise le Roi sur lesquelles un château-fort avec sa chapelle avait été érigé. Gobert de Thumery fut le premier Sieur de Boissise, son fils Denis, Échevin de Paris restaura le château, après qu'il fut incendié par les anglais en 1429 pendant la guerre de cent ans. La famille de Thumery s'est éteinte en 1757, le château a appartenu par la suite à une autre famille de parlementaires, les Beausse. Catherine de Beausse s'éteignit sans descendance en 1828 et légua le château à Paul Bareiller. En 1904 les Verdier-Bareiller ont vendu la propriété à Arthur de Fruchard qui l'a restauré, avant de le vendre à M. Caballero de Bedoya, ministre du Paraguay. En 1934, la propriété a été vendue à un homme d'affaires M. Desh, lequel a divisé les terres pour l'exploitation agricole. En 1939 l'édifice accueille une congrégation religieuse, les Orantes de Marie Médiatrice. Le 14 Septembre 1983, la commune de Boissise-le-Roi acquiert le château pour en faire son hôtel de Ville.","architecture":"BOISSISE le ROI,  date du XVIe, XVIIe et XIXe siècle. Le château de Boissise, dont l'histoire est connue depuis le début du XVIIIe siècle, était la propriété du Receveur Général des fermes Alexandre-Jean-Roch Colin de Saint-Marc et de son épouse (petite-fille de Pierre-Nicolas Hébert). Il a été acquis, en 1807, par Charles Lucas « comte » Pinckney Horry, compagnon d'armes de La Fayette et propriétaire de la Harrietta Plantation (en). Ce dernier avait épousé  Marie Florimonde de Fäy de La Tour-Maubourg, fille du Général-Vomte, Charles César de Fay. Le château de Boissise a été transmis tout au long du XIXe siècle, dans la même fratrie : d'abord à Armand Charles de La Tour-Maubourg, puis à Marie Stéphanie, comtesse Andréossy, enfin à Rodolphe de Faÿ, général de division et Pair de France, décédé à Boissise le 27/05/1871. Ce dernier a donné son nom à une partie de la rue principale du centre-bourg. Le château de Boissise-le-Roi est inscrit aux M.H. depuis 1970. C'est devenu la Mairie.  Éléments protégés MH : les façades et les toitures du château, des communs et de la ferme, y compris le pigeonnier; la cour d'honneur; le portique entourant la cour d'honneur; le parc avec ses portails d'entrée: inscription par arrêté du 19 mai 1970.","habitants":"château à Paul Bareille\"","divers":"Boissise le roi   GPS : 48° 31' 42\" Nord, 2° 34' 26\" Est","gps":"48° 31' 42\" Nord, 2° 34' 26\" Est","images":["../../jctruffet.com/image/image_77/77_Boissise_le_Roi_1.jpg","../../jctruffet.com/image/image_77/77_Boissise_le_Roi_2.jpg","../../jctruffet.com/image/image_77/77_Boissise_le_Roi_3.jpg"]},"Consult_chateau_formulaire2ae2":{"id":"Consult_chateau_formulaire2ae2","dept":"77","canton":"Coulommiers","commune":"Boissy le Chatel","nom":"Boissy_le_Chatel","type":"Château","periode":"XIII-XIV-XV","histoire":"BOISSY LE CHATEL, le château de Boissy est cité dès 1203, lors de la fondation de la chapelle Saint Jacques par Robert de Milly chambellan du comte de Champagne et seigneur de Boissy. A la fin du XIVe siècle, Marie de Beaujeu, dame de Boissy, tient en fief la terre de Boissy. En 1473, un nouveau château est édifié pour la famille de Brie. Au début du XVIIe siècle, il appartient à la famille Lefèvre de Caumartin, les de Caumartin étaient seigneurs de Boissy le Châtel, marquis de Saint-Ange et comte de Moret. En 1762, le château est reconstruit avec adjonction dune aile orientée vers louest, construction de communs et aménagement du parc. Pendant la Révolution, Antoine de Caumartin ayant émigré en Angleterre, l'édifice fut saisie et vendue comme bien national en 1792. Le château sert de prison puis il est démantelé vers 1824, laile disparaît et les arbres du parc sont décimes. Au XIXe siècle, la route de Rebais à Coulommiers coupe le parc. Le château de Boissy est entre les mains des familles Louvet et Villette, il passe ensuite à des familles d'industriels au XXe siècle.","architecture":"BOISSY le CHATEL  fut construit aux XIIe et XIIIe siècles par les Milly, seigneurs de Boissy, il fut ensuite restauré au XVe siècle, par les Brie, après avoir subi d'importants dégats, durant la guerre de Cent Ans. Le château de Boissy-le-Chatel domine la Vallée du Grand Morin et l'Orgeval, son principal affluent. En 1762, Marc-Antoine de Caumartin fit modifier l'architecture en lui adjoignant une aile de 40 mètres de long. Le château de Boissy-le-Châtel sera à nouveau dégradé durant la la Révolution. Le porche de la place de la Mairie est le seul vestige restant des communs. Il ne reste qu'une tour dite \"la Tour Henri V\", une tourelle descalier et une tour de guet. Le château de Boissy-le-Châtel étant privé, on ne l'aperçoit qu'à travers les arbres, à la chute des feuilles en automne. Une reproduction du château du XVIIIe siècle est toujours visible, dans le hall de la mairie de Boissy-le-Châtel. Son château, propriété privée, est un des plus vieux châteaux dIle-de-France. Sa dernière visite a attiré plus de 600 personnes.","habitants":"Famille de Brie\"","divers":"Boissy le Chatel  GPS : 48° 49' 15\" Nord, 3° 08' 19\" Est","gps":"48° 49' 15\" Nord, 3° 08' 19\" Est","images":["../../jctruffet.com/image/image_77/77_Boissy_le_Chatel_1.jpg","../../jctruffet.com/image/image_77/77_Boissy_le_Chatel_2.jpg","../../jctruffet.com/image/image_77/77_Boissy_le_Chatel_3.jpg"]},"Consult_chateau_formulaire92a0":{"id":"Consult_chateau_formulaire92a0","dept":"77","canton":"Nangis","commune":"Epoisses","nom":"Bombon","type":"Chateaux","periode":"XVII","histoire":"Trois châteaux dans cet article Bombon, Epoisses et Montjay.                                                    BOMBON, cet ensemble est sans doute construit sur les ruines d'un château médiéval dont aucune trace ne subsiste, sur l'initiative du sieur Anthoine de Brenne pour son épouse Claude de Courtenay. Il est bâti dans un style typiquement français en XVIIe siècle, avec chaînes de pierre et murs de briques, et recouvert d'un toit d'ardoise. En juin 1918, le Quartier Général des Armées Alliées y est installé, le général Foch y lance le 18 juillet, la contre offensive qui renverse le sort des armées et fait reculer le front allemand sur toute sa largeur jusqu'à la seconde victoire de la Marne. C'est en outre à Bombon que Foch reçoit le 7 août son bâton de maréchal.\n Pour ses proportions architecturales symétriques et ses hautes toitures d'ardoise. Il a été la propriété de Félix Houphouët-Boigny, ex.Président de la Côte d'Ivoire. La partie du parc est limitée à l'Ouest par le chemin de Bombon à la Borde, à l'Est par le chemin de terre passant à 250 mètres du château. Le château de Bombon et sa chapelle sont inscrits aux M.H. depuis 1949. Il existe aussi la maison forte des Époisses, classé aux M.H. en 1981, une ferme fortifiée médiévale, y compris la cour pavée, les douves, la grange, Logo monument historique Classé M.H (1981, Ferme, y compris la cour pavée, les douves, la grange  ainsi que le château de Montjay et sa chapelle.\nMONTJAY, fut construit dans un style typiquement français du XVIIe du siècle, marqué par des proportions architecturales symétriques et des hautes toitures d'ardoise. Le château de Montjay est devenu une maison de retraite.On connait quelques seigneurs du fief des Époisses .","architecture":"EPOISSES , la construction du fief des Epoisses date du XIIIe siècle. C'est une ferme fortifée de style Médiéval. Ses origines ont été citées en 1285, dans la charte de partage de la vicomté de Melun entre les deux frères Adam et Jean. Jean a, dans sa part, les cens et rentes des Époisses. On connait quelques seigneurs du fief des Époisses : en 1477, Guy de Gyresne, Pierre de Mesgrigny (1635-1650), Conseiller du Roi, Maître des comptes, seigneur de la Villeuneuve, dont le dernier était Abel Coulleau, cité en 1660, Jacques de Mesgrigny en 1691, et en 1830, la Comtesse de Béthisy. C'est à l'ocasion de l'exposition universelle, en 1878, que le Domaine des Époisses devint célèbre, où eut lieu une exposition de matériel agricole et qui attira environ 20 000 personnes. Le Ministre de lAgriculture, des Préfets, des Sénateurs, des Conseillers Généraux du département, des Etrangers, des Chefs Kabyles et des Japonais étaient réunis pour admirer le miracle de la première moissonneuse qui, conduite par un seul homme, coupait, liait et façonnait des gerbes de blé. Puis en 1970, le site, découvert par Mstislav Rostropovitch, donnera un concert dans la grande dépendance. Il y aura ensuite plusieurs manifestations musicales de données. De 1981 à 1987, le domaine fait l'objet de travaux de restauration. Aujourdhui, le Fief des Époisses, classé monument historique, sert uniquement aux séminaires d'entreprise. Il est classé aux M.H. depuis 1981, ainsi que la Ferme, la cour pavée, la grange et les douves. Le Fief des Epoisses est privé, fermé au Public.","habitants":"Famille  Félix Houphouët-Boigny,\"","divers":"Trois châteaux dans cet article Bombon grav-1, Epoisses grav-2 et Montjay grav-3-4.     BombonGPS : 48° 30' 51\" Nord, 2° 38' 06\" Est                                                            Epoisses  GPS : 48° 35' 16\" Nord, 2° 52' 04\" Est                                                       Montjay  GPS : 48° 34' 21\" Nord, 2° 51' 36\" Est","gps":"48° 30' 51\" Nord, 2° 38' 06\" Est","images":["../../jctruffet.com/image/image_77/77_Bombon_1.jpg","../../jctruffet.com/image/image_77/77_Bombon_2.jpg","../../jctruffet.com/image/image_77/77_Bombon_3.jpg","../../jctruffet.com/image/image_77/77_Bombon_4.jpg"]},"Consult_chateau_formulaire2620":{"id":"Consult_chateau_formulaire2620","dept":"77","canton":"Provins","commune":"Villeneuve le Bordes","nom":"Bordes_77","type":"Château","periode":"XII-XVI","histoire":"BORDES    De 1196 à 1789, les religieux de l'abbaye Ste Colombe Lès Sens occupent les Bordes et le fief des Fossés. Le château et le hameau des Bordes étaient fortifiés. L'une des tours comporte à sa base des murs d'un mètre d'épaisseur, vestiges de l'ancien bâtiment. Le château porte à son fronton les armes des moines de Sainte Colombe lès Sens. Ce domaine était divisé entre le château, son parc et les fermes des Guesdons, des Rochères, des Boyers convertie en maison de garde, du Grand Puttemuse, du Petit Puttemuse et de Haye de Brie. Des vignes étaient cultivées sur les terres des Bordes. Le château, les fermes et leurs dépendances, avec les parties de bois, ont été vendus comme biens nationaux à la Révolution. À la fin du XXe siècle, la propriété des Fossés fait à nouveau partie des Bordes, le château sert de résidence secondaire et de grandes chasses ont lieu chaque hiver dans les bois qui constituent l'essentiel du domaine.","architecture":"BORDES; tours a 1 mètre d'épaisseur se situe aux abords du village. Une partie de la crypte date du XIIe siècle. Elle est visible dans les caves, L'escalier qui y menait a disparu, sous le ciment de la terasse. Eugénie Caron de Beaumarchais, fille de l'écrivain Pierre-Augustin Caron de Beaumarchais. Épouse de Maître Delarue, écuyer, ancien administrateur des contributions directes et Maire de Villeneuve-les-Bordes jusquen 1834. Elle est propriétaire du Château des Bordes. Le château porte, sur son fronton, les armes des moines de Sainte-Colombe-lès-Sens. Le Domaine des Bordes était divisé entre son château, son parc, et les fermes des Guesdons, des Boyers devenu une maison de gardes, des Rochères, de Haye de Brie, du Grand  et du Petit Puttemuse. Un vignoble important occupe les terres des Bordes. A la Révolution, le château, ses fermes et ses dépendances, ses bois furent vendus comme biens nationaux. A la fin du XXe siècle, la propriété des Fossés fait à nouveau partie des Bordes.","habitants":"écrivain Pierre-Augustin Caron de Beaumarchais\"","divers":"Bordes_  GPS : 48° 29' 48\" Nord, 3° 01' 03\" Est","gps":"48° 29' 48\" Nord, 3° 01' 03\" Est","images":["../../jctruffet.com/image/image_77/77_Bordes_77_1.jpg","../../jctruffet.com/image/image_77/77_Bordes_77_2.jpg"]},"Consult_chateau_formulaireb4dd":{"id":"Consult_chateau_formulaireb4dd","dept":"77","canton":"Nangis","commune":"Echouboulains","nom":"Boulains","type":"Château","periode":"XVIII","histoire":"BOULAINS, édifié par le comte René Boussard de la Chapelle sur le site de La Fontaine-Rabot, ce château néo classique a longtemps été le siège de l'Institution de la maison des Ailes, vouée aux pupilles féminines de l'Armée de l'Air. Il abrite désormais la fondation pour enfants malades \"L'Envol\". De plan rectangulaire avec pavillons aux angles formant un retour et doté sur sa façade orientale d'un péristyle à terrasse, le bâtiment s'ouvre, du côté occidental, sur une terrasse qui domine un jardin et une pièce d'eau. De là, le regard porte sur un parc au fond duquel coule le ru Javot. Dans le jardin se trouvent deux sculptures représentant des sphinx et un groupe sculpté représentant un sujet profane : la curée d'un sanglier. Le château de Boulains connaît une nouvelle vie depuis 1994 avec l'association l'Envol.","architecture":"BOULAINS, a été construit en 1867 par Mr Louis Boussard, comte de la Chapelle, en même temps que l'église du village de Boulains. Il est vendu en 1880 à Mr Ch. Antoine Avril qui le cèdera à son tour en 1892 à Mr Georges Halphen, beau père de Mr Emile Deutsch de la Meurthe. Celui ci agrandira le domaine par l'achat de terres et de fermes. La famille Deutsch de la Meurthe porte un grand intérêt à l'aviation. Ses trois filles vendent en 1925 le château et une partie du domaine à Mr Watney en vue d' y installer un collège pour jeunes gentlemen anglais (le Prince de Galles y serait venu). En 1930-1931, Suzanne Deutsch de la Meurthe, fille d' Henri et nièce d' Emile, surnommée la \"Fée des Ailes\" rachète le château et son domaine pour faire don à l' Etat de l'usufruit de son ensemble (Fondation Suzanne Deutsch de la Meurthe).  De 1932 à 1940, le château devient la maison de repos des \"Ailes Brisées\". Le 6 novembre 1942, la \" Maison des Ailes \" lui succède pour y accueillir les pupilles de l'Air. L'institution de jeunes filles recevra près de 2400 élèves jusqu'en 1995. En 1996, l'association \" L'envol \" pour les enfants européens créée sur le modèle des camps \" Hole in the Wall \" fondés par Paul Newman établit au château le siège d'un centre de vacances pour enfants atteints de maladies graves. L'objectif est de leur offrir un séjour dans un environnement naturel et médicalisé de nature à leur permettre de retrouver la confiance et les forces nécessaires pour lutter contre la maladie.","habitants":"Mr Ch. Antoine Avril \"","divers":"Boulains  GPS : 48° 27' 18\" Nord, 2° 56' 29\" Est","gps":"48° 27' 18\" Nord, 2° 56' 29\" Est","images":["../../jctruffet.com/image/image_77/77_Boulains_1.jpg","../../jctruffet.com/image/image_77/77_Boulains_2.jpg","../../jctruffet.com/image/image_77/77_Boulains_3.jpg"]},"Consult_chateau_formulairef6ff":{"id":"Consult_chateau_formulairef6ff","dept":"77","canton":"Tournan en brie","commune":"les Boulayes","nom":"Boulayes","type":"Château","periode":"XVIII","histoire":"La BOULAYES; colonnel des gardes de la maison du roi, Claude Bélanger, le premier propriétaire du château actuel dont il pris le nom, il était au mieux avec Madame du Barry et remplit pour elle diverses missions de confiance.   Bien introduit auprès d'une riche clientèle de financiers, Nicolas-Claude Girardin construisit entre 1777 et 1779 pour le banquier génois Octave-Pie Giambone l'immeuble rue de Bondy connu aujourd'hui sous le nom dhôtel de Rosanbo. Giambone avait épousé Marie-Louise de Marny, l'une des maîtresses de Louis XV au Parc-aux-Cerfs. Ils avaient eu une fille, Adélaïde Catherine (1766-1824), qui avait épousé Claude François Jean Bélanger (ou Bellanger) (1757-1830), colonel, « sous lieutenant des Gardes du corps », haut dignitaire de la Maison du Roi, très bel homme qui fut l'un des protégés de Mme du Barry. Ce dernier hérita en 1784 de sa tante, Adélaïde Labouré-Pothenot, la seigneurie des Boulayes. Le nom de cette terre  variantes : les Boulaies,  renvoie à un lieu planté de bouleaux. Cette terre appartenait en 1546 à André Maillard, conseiller au parlement. Son successeur, Charles Maillard, sous Charles IX, épousa Madeleine de Marillac. Au XVIIIe siècle, on trouve en 1700, M. de Berenghien, lieutenant général des provinces de Champagne et de Brie, co-seigneur des Boulayes avec le marquis de Ségur, appartient ensuite à M. Lettré. Disposant de moyens financiers confortables grâce à la dot de sa femme, Bélanger chargea Girardin de moderniser le domaine en détruisant le vieux logis entouré de douves en eau pour le remplacer par un château à la dernière mode. La construction fut menée rapidement, de juillet à décembre 1785. Bélanger émigra à la Révolution ; son château fut confisqué et vendu comme bien national.","architecture":"La BOULAYES, est inspiré de l'hôtel de Thun construit en 1771 par Étienne-Louis Boullée à la Chaussée d'Antin. C'est un parallélépipède blanc à un rez-de-chaussée surmonté d'un étage, dont le toit était porté à l'origine par une charpente légère à petits bois à la Philibert Delorme. Les façades sont formées de la répétition uniforme d'une même travée avec un ordre colossal de pilastres corinthiens identique sur les quatre faces. Au total, on compte 42 pilastres déterminant 38 travées : treize sur les façades principales et six sur les façades latérales. L'accent traditionnel au centre des façades est réduit ici à un maigre ressaut déterminant un avant-corps de cinq travées, à peine sensible, qui était  surmonté d'un fronton. Les baies sont des portes-fenêtres en plein cintre au rez-de-chaussée et des croisées rectangulaires au premier étage. Le château a été peu transformé. Néanmoins, en 1912, la charpente d'origine et les frontons ont été supprimés et remplacés par un toit plat à l'italienne entouré d'une balustrade, en référence au Grand Trianon, ce qui a rendu les élévations assez monotones. Intérieurement, une partie du décor d'origine a été conservée. Selon Michel Gallet, « la plus belle pièce est une salle à manger dont les poêles, surmontés de statues d'après l'antique, furent livrés par le fumiste Marentin.","habitants":"Famille de  Claude Bélanger  \"","divers":"Boulayes   48° 43' 29? nord, 2° 47' 48? est","gps":"","images":["../../jctruffet.com/image/image_77/77_Boulayes_1.jpg","../../jctruffet.com/image/image_77/77_Boulayes_2.jpg"]},"Consult_chateau_formulaire8de7":{"id":"Consult_chateau_formulaire8de7","dept":"77","canton":"Melun","commune":"Nandy","nom":"Bouret","type":"Château","periode":"XVIII","histoire":"BOURET, sa construction a débuté au XVIIIe siècle et s'est achevée au XIXe siècle. Son premier propriétaire fut Etienne Michel Bouret. Le propriétaire actuel est Frédéric Vigneron d'Heucqueville. Le Château de Nandy fut reconstruit au XVIIe siècle, par Louis de L'Hospital et classé aux M.H. depuis 1968.","architecture":"NANDY  Dans le cadre de la seigneurie de Nandy, une première demeure seigneuriale en bois est édifiée sous les Carolingiens, à laquelle succède un château en pierre sous les Capétiens, remplacé entre le XVe et le XVIe siècle par un nouveau château batit par la famille de L'Hospital. Cette lignée tient la seigneurie pendant plus de deux siècles. Parmi les autres propriétaires sont à noter les Pommeuse, les de La Vieuville mais aussi l'abbaye de Saint Denis en France. Le château actuel est dû à François-Marie, duc de Vitry, descendants de la famille de l'Hospital, reconstruit presque totalement à partir des années 1660, suite des dégâts causés par les guerres de Religions. D'inspiration classique, ce château présente une façade sud ordonnancée qui alterne la brique et la pierre, ce qui n'est pas sans rappeler l'architecture du château voisin de Fontainebleau. Le bâtiment est restauré au début du XIXe siècle par le marquis de Perthuis.Sa construction a débuté au XVIIIe siècle et s'est achevée au XIXe siècle. Son premier propriétaire fut Etienne Michel Bouret. Le propriétaire actuel est Frédéric Vigneron d'Heucqueville. Le Château de Nandy fut reconstruit au XVIIe siècle, par Louis de L'Hospital et classé aux M.H. depuis 1968. \nMadame Marine Bernard de Meurin, niché dans son écrin de verdure, il constitue aujourd'hui un cadre idéal pour réceptions.\nÉléments protégés MH : les façades et les toitures du château et de ses dépendances ; la cour d'honneur ; le parc ; l'avenue dans l'axe du château sur la totalité de son étendue : classement par arrêté du 23 octobre 1968.","habitants":"Famille d' Etienne Michel Bouret                    Nandy:     famille de L'Hospital\"","divers":"Bouret grav-1   GPS : 48° 34' 11\" Nord, 2° 33' 05\" Est                                                       Nandy grav_2","gps":"48° 34' 11\" Nord, 2° 33' 05\" Est","images":["../../jctruffet.com/image/image_77/77_Bouret_1.jpg","../../jctruffet.com/image/image_77/77_Bouret_2.jpg"]},"Consult_chateau_formulaire2821":{"id":"Consult_chateau_formulaire2821","dept":"77","canton":"Fontainebleau","commune":"Bourron-Marlotte","nom":"Bourron","type":"Château","periode":"XV-XVI-XVII","histoire":"BOURRON, les premiers seigneurs de Bourron sont attestés à partir de 1150. Passe en 1380 aux Villiers de l'isle-Adam. En 1445 échoit à la famille des vicomtes de Melun. Le domaine change plusieurs fois de main, et en 1502, Olivier de Sallard, fauconnier de Louis XI en devient le propriétaire des terres. En 1570 construction du château actuel, par Gilles Le Breton, à lemplacement de l'ancienne forteresse féodale, pour François de Sallard, gendre du maître douvrage du château voisin de Courances, le comte de Choulot redessine ce parc à langlaise. En 1608 Bourron passe à la famille de Berringhen.  En 1849 vente de Bourron par les Montgon descendants direct des   Berringhen.  Et en 1878  achat par la famille de Montesquiou, en 1930, le comte Blaise de Montesquiou restitue les perspectives et redonne au parc son ordonnancement à la française. Le château a été transmis en 2001 à Guy et Estrella de Cordon sont les propriétaires actuels. Ils sefforcent de le faire vivre avec beaucoup de dynamisme. Partiellement détruites à la Révolution, les douves en eaux entourant le château ont été restaurées au XIXe siècle.","architecture":"BOURRON  Il est de style Renaissance. Au cur dun parc de 40 hectares, au Sud de Paris et à 7 km de Fontainebleau.  Lors d'une inspection royale en 1367 Bourron est décrite comme une forteresse close de murs et entourée de fossés à eau. De style brique et pierre caractéristique de ce début du XVIIe siècle, le corps de logis encadré de deux pavillons hauts est orné sur les façades sud et nord dun perron en fer à cheval, qui nest pas sans évoquer linfluence du château de Fontainebleau, flanquée de deux petits pavillons a été construite au début du XVIIe siècle à lemplacement dune ancienne forteresse féodale. Entourée de douves en eaux vives, cette élégante demeure privée, devient un château-hôtel proche de Paris, vous accueille toute l'année pour vivre une vie de château à la Française. Le château de Bourron est inscrit aux M.H. depuis 1926 et classé aux M.H. depuis le 29.10.1971. a subit des transformations successives, à la fin du XVIIe siècle, il est entièrement remodelé et ordonné à la française, un grand canal étant percé dans la perspective sud. Éléments protégés MH : l'intérieur du château : inscription par arrêté du 18 mars 1926. Les façades et les toitures du château et des deux pavillons d'angle ; la cour d'honneur ; les douves avec leur pont ; la partie ordonnancée du parc, y compris les deux grandes allées : classement par arrêté du 29 octobre 1971.","habitants":"Famille de Berringhen\"","divers":"Bourron    GPS : 48° 20' 25,56\" Nord, 2° 41' 46,07\" Est","gps":"48° 20' 25,56\" Nord, 2° 41' 46,07\" Est","images":["../../jctruffet.com/image/image_77/77_Bourron_1.jpg","../../jctruffet.com/image/image_77/77_Bourron_2.jpg","../../jctruffet.com/image/image_77/77_Bourron_3.jpg"]},"Consult_chateau_formulairee218":{"id":"Consult_chateau_formulairee218","dept":"77","canton":"Nemours","commune":"Bougtigny","nom":"Boutigny","type":"Château","periode":"XII-XVII","histoire":"deux châteaux dans cet article ;  Belou et Bel-Ebat                                                       BELOU, les terres sont citées pour la première fois en 1005 et appartiennent jusqu'à la Révolution à la famille Bélou. Ils construisent un château au début du XIIe siècle, mais il est détruit au XVIe siècle par les Ligueurs. Boutigny est sous la dépendance de la paroisse de Fublaines jusquau XIVe siècle date où son église est érigée en paroisse.  Il date du XVIIe et XVIIIe siècle.Heureusement, le château de Bélou est visible de l'extérieur de la rue. La disposition médiévale est reprise au XVIIe siècle avec les communs disposés en demi-cercle autour de la basse-cour. La demeure actuelle à été reconstruite au XVIIIe siècle, l'ensemble de la propriété comprend une fabrique de jardin, un colombier, un pavillon et le mur d'enceinte.\n Éléments protégés MH : les façades et les toitures du château ; les façades et les toitures des communs ; le colombier ; le mur d'enceinte avec son pavillon d'angle polygonal et la fabrique en forme de colonne: inscription par arrêté du 23 juillet 1992.","architecture":"BEL-EBAT à AVON, le domaine de Bel-Ebat de 7 Ha fut donné à la ville d'Avon, en 1980. Cest à la meute de chasse dHenri IV que le Domaine de Bel-Ebat doit son nom. Le manoir, restauré au XIXe siècle, est entouré de pelouses, darbres séculaires et de sources. Il fut la propriété de léditeur de musique Auguste Durand, puis de son fils Jacques (élu municipal - bienfaiteur de la commune). Il accueillit dans cette plaisante villégiature ses amis musiciens : Saint-Saëns, Debussy, Dukas, Ravel, Schmitt, Ropartz étaient des habitués de Bel Ebat. Là, sous les ombrages ou sur la terrasse, lon discutait composition, projets, création. Le Manoir de Bel Ebat fut un havre pour le renouveau de la musique française au tournant du siècle. De nombreux concerts y sont donnés : Eau, Air, Ciel et Vent », un vagabondage musical poétique. Régulièrement, le manoir de Bel-Ebat accueille des concerts de Musique classique, en accès libre.","habitants":"Famille Bélou\"","divers":"deux châteaux dans cet article ;  Belou grav-1 et Bel-Ebat  grav-2-3                        Belou    GPS : 48° 55' 12\" Nord, 2° 55' 49\" Est                                                 Bel ébat GPS : 48° 24' 35\" Nord, 2° 42' 58\" Est","gps":"48° 55' 12\" Nord, 2° 55' 49\" Est","images":["../../jctruffet.com/image/image_77/77_Boutigny_1.jpg","../../jctruffet.com/image/image_77/77_Boutigny_2.jpg","../../jctruffet.com/image/image_77/77_Boutigny_3.jpg"]},"Consult_chateau_formulaire6773":{"id":"Consult_chateau_formulaire6773","dept":"77","canton":"Combs-la-Ville","commune":"Brie-Comte-Robert","nom":"Brie_Comte_Robert","type":"Château","periode":"XIII-XIX","histoire":"Deux châteaux dans cet article Brie-Comte-Robert et  Vaudoy.                             BRIE-COMTE-ROBER,  fut construit à la fin du XIIe siècle, alors que Robert Ier de Dreux, frère du roi Louis VII, était seigneur de Brie. Son plan général annonce certaines caractéristiques des châteaux de Philippe II Auguste qui engendra l'essor de la construction des châteaux au début du XIIIe siècle. L'architecte de Robert Ier a donc fait figure de novateur et de précurseur des plans réguliers. La tour principale (tour-porte), faisant office de donjon, est ici intégrée à l'enceinte et protège deux entrées opposées, fait unique en Ile de France. Le château resta dans la famille de Dreux jusqu'en 1254 puis passa dans la famille de Châtillon. Par dots et héritages successifs, il échut à Marguerite d'Artois, puis à sa fille Jeanne d'Évreux en 1319. A la fin du XIVe siècle, le château revint au domaine royal, puis à la famille d'Orléans. A partir de 1429 la ville fut prise et reprise par les Français et les Anglais. En septembre 1430, le siège fut mis par le comte de Stafford, provoquant d'immenses dégâts, tant dans la ville que dans le château. Racheté par la ville en 1803, le château fut revendu en 1813. En 1879, son propriétaires fit raser ce qui subsistait de la tour Saint-Jean, pour édifier un bâtiment moderne. La commune l'acheta en 1923 et le fit classer MH en 1925. En 2003, début de sa restauration avec le remontage de courtines sur plus de six mètres de hauteur, la restauration de la tour de Brie et la déconstruction de la maison du XIXe siècle permettait la reconstruction partielle de la tour Saint-Jean.\nC'est un ancien château défensif du XIIe siècle, parfaitement restauré, entouré de douves. Le Château de Brie-Comte-Robert abrite le Centre Patrimonial avec des expositions archéologique\nÉléments protégés MH : les ruines du vieux château : classement par arrêté du 25 juin 1925","architecture":"VAUDOY, sa construction date de 1160. Il est de style Médiéval., fonde la ville de Brie-Comte-Robert et y fait bâtir son château. Celui-ci est alors construit sur un plan carré, flanqué de sept tours et ceinturé par des douves d'eau. Jeanne d'Évreux, héritière du château, fait entrer la ville de Brie-Comte-Robert dans le domaine royal, par son mariage avec le roi Charles IV. Lors de la Fronde, qui commence en 1649, le château est pillé et partiellement détruit par les troupes royales commandées par le comte de Grancey. En 1750 les tours et les courtines furent détruites, seules la partie du premier étage et la tour Saint-Jean furent gardés. Le bâtiment est ensuite mis en vente en septembre 1793 comme bien national.  La commune de Brie-Comte-Robert rachète le château puis le revend à des particuliers. Les acheteurs font raser ce qu'il reste de la tour Saint-Jean pour édifier une maison bourgeoise,  termine sa restauration en 1923 et le fit classer comme M.H. en 1925. Depuis la création de l'association « Les Amis du Vieux Château de Brie-Comte-Robert » en 1982, des bénévoles s'emploient à des chantiers de fouille, de restauration du patrimoine bâti et de mise en valeur du site. En 2003, les courtines ont été remontées à plus de 6 mètres de hauteur, la tour de Brie a été restaurée, la maison bourgeoise est détruite et la Tour Saint-Jean fut partiellement reconstruite.","habitants":"famille de Dreux \"","divers":"Deux châteaux dans cet article Brie-Comte-Robert grav-2-3 et  Vaudoy-1.   GPS : 48° 41' 33\" Nord, 2° 36' 3,88\" Est                                                                   vaudoy GPS : 48° 41' 33\" Nord, 2° 36' 38,88\" Est","gps":"48° 41' 33\" Nord, 2° 36' 3,88\" Est","images":["../../jctruffet.com/image/image_77/77_Brie_Comte_Robert_1.jpg","../../jctruffet.com/image/image_77/77_Brie_Comte_Robert_2.jpg","../../jctruffet.com/image/image_77/77_Brie_Comte_Robert_3.jpg"]},"Consult_chateau_formulaire509c":{"id":"Consult_chateau_formulaire509c","dept":"77","canton":"Serris","commune":"Villemareuil","nom":"Brinches","type":"Château","periode":"XVII-XIX","histoire":"BRINCHES, le château est construit en 1670 par le prince Charles de Lorraine, duc d'Elbeuf, seigneur de Lillebourne et de Villemareuil. En 1757, un incendie le détruit. Deux corps de bâtiment disparaissent, ainsi que la chapelle. Le domaine demeure pendant un siècle entre les mains de la même famille avant de devenir possession en 1751 de la gouvernante de Louis XVI, Madame de Marsan, et de ses frères. Pendant la Révolution, comme de nombreux biens appartenant aux nobles, ce château est confisqué et vendu comme bien national. Il est très remanié à la fin du XIXe siècle. Aux XIXe et XXe siècles, il est l'apanage de la famille d'Avène, dont le vicomte est également le maire du village au début du XXe siècle.","architecture":"BRINCHES, sa cnstruction date du XVIIe au XIXe siècle. Les registes mentionnent, dès 1648, Charles II de Lorraine, et du Duc d'Elboeuf, son propriétaire initial qui fit construire le château de Brinches, en 1650. Son fils François-Marie lui succèdera. En 1757, un incendie va détruire le château, détruisant la chapelle et deux corps de bâtiment. La famille d'Epinoy en devint propriétaire durant 100 ans. Le château de Brinches sera ensuite légué, en 1751, à Mme de Marsan, gouvernante du roi Louis XVI et petite fille de la Princesse d'Epinoy, dernière descendante de la seigneurie de Villemareuil avec ses frères. Au XIXe et XXe siècle, il ira à la famille d'Avène, dont le vicomte est aussi le maire de Villemareuil au début du XXe siècle. Le château de Brinches sera restauré à la fin du XIXe siècle.","habitants":"Famille d'Epinoy  \"","divers":"Brinches    GPS : 48° 56' 13\" Nord, 2° 57' 50\" Est","gps":"48° 56' 13\" Nord, 2° 57' 50\" Est","images":["../../jctruffet.com/image/image_77/77_Brinches_1.jpg"]},"Consult_chateau_formulairec8ff":{"id":"Consult_chateau_formulairec8ff","dept":"77","canton":"Montereau-Fault-Yonne","commune":"La Brosse- Montceaux","nom":"Brosse_Montceaux","type":"Châteaux","periode":"XV","histoire":"La BROSSE MONTCEAUX   C'est vers 1466 que la famille De Poisieux acquiert ce château. Le dernier seigneur de cette puissante famille le vend à la duchesse d'Étampes qui le cède en 1545 à Gallois de Bailleul, sa veuve Jeanne de Sourches le revend à Étienne de Breuil, maitre des Requêtes, seigneur de la Genevraye. Celui-ci fait construire le château de la Brosse Montceaux sur son emplacement actuel entre les anciens villages de la Brosse et de Montceaux, sur le penchant d'une colline, au milieu d'un immense parc. Appartenant à la famille de Paris jusqu'au XIXe siècle puis aux Oblats au XXe siècle, il est restauré dans la seconde moitié du XIXe siècle. il accueille une maison familiale de vacances appartenant au Crédit Lyonnais.","architecture":"La BROSSE MONTCEAUX, est de style néo-Louis XIII. Le château de la Brosse-Montceaux actuel, en pierres, briques et enduit, date du XVIIIe siècle. qui en font un noviciat. C'est ici qu'étudièrent les futurs martyrs du Laos, Michel Coquelet, Louis Leroy et Vincent L'Hénoret, assassinés en 1961. Selon la volonté de Claude Pierre-Brossolette, alors Directeur du Crédit lyonnais, d'acquérir cette maison qui avait abrité son père, le résistant Pierre Brossolette, pendant la seconde guerre mondiale, le château de la Brosse-Montceaux fut acquis par le Crédit Lyonnais (devenu LCL)qui en fait une maison familiale de Vacances. En raison de difficultés financières, le comité Central d'Entreprise de LCL, qui avait la gestion de ce château, a décidé de s'en séparer, en 2012 Quel va être l'avenir du château. Par la suite et jusqu'à nos jours, l'édifice accueille un centre de rééducation fonctionnelle infantile (CRFI). Dans les années 2000, l'internat pour enfants est délocalisé afin que le centre puisse subir quelques travaux pour mise en conformité avec les exigences de la commission de sécurité.","habitants":"Famille De Poisieux \"","divers":"Brosse-Montceaux   GPS : 48° 20' 35\" Nord, 3° 01' 15\" Est","gps":"48° 20' 35\" Nord, 3° 01' 15\" Est","images":["../../jctruffet.com/image/image_77/77_Brosse_Montceaux_1.jpg"]},"Consult_chateau_formulaireb53c":{"id":"Consult_chateau_formulaireb53c","dept":"77","canton":"Villeparisis","commune":"Brou sur Chantereine","nom":"Brou_Chantereine","type":"Château","periode":"XVII","histoire":"BROU,  le château de Brou-sur-Chantereine fut bâti à la fin du XVIIe siècle par la Famille Feydeau, qui avait acheté le Domaine de Brou, en 1608. Il est resté dans cette famille pendant plus de 200 ans.  Le 13 mars 1608, Sieur Denys Feydeau acquit la terre de Brou. Cette sobre demeure appartint, pendant près de deux siècles, à lune des familles parlementaires Parisiennes les plus importantes, les Feydeau. Construit au XVIIe siècle, mais remanié à plusieurs reprises, le château de Brou constituait une agréable résidence des champs pour la famille Feydeau, habituellement retenue à Paris par ses charges. Délaissé à la fin du XVIIIe siècle, il demeura inhabité de 1790 au 18 mai 1844, date de sa vente par le marquis de Juigne (parent par alliance des Feydeau) à Charles Floréal Thiébaut, fondeur de bronze à Paris, qui entreprit des changements et des restaurations du château. Depuis cette date le château est toujours resté la propriété de la famille Thiébaut.","architecture":"BROU,  Remanié au XVIIIe siècle, le château de Brou sera abandonné après la Révolution Française jusqu'en 1844. Le château de Brou fut alors racheté par Charles Floréal Thiébaut, fondeur de bronze d'art à Paris. Il appartient toujours à la Famille Thiébaut, qui, y a entrepris, depuis, plusieurs travaux d restauration. Le château de Brou a été classé aux M.H. depuis 1984. Ouvert au Public, le château de Brou se visite.   Éléments protégés MH : les façades et les toitures du château, des communs et du pavillon d'entrée situé dans l'axe du château ; l'escalier intérieur avec sa cage ; le vestibule ; les quatre salons du rez-de-chaussée avec leur décor ; le pigeonnier; le parc avec la glacière : classement par arrêté du 21 décembre 1984.","habitants":"Famille Feydeau\"","divers":"Brou- GPS : 48° 53' 16,08\" Nord, 2° 37' 57,72\" Est","gps":"48° 53' 16,08\" Nord, 2° 37' 57,72\" Est","images":["../../jctruffet.com/image/image_77/77_Brou_Chantereine_1.jpg"]},"Consult_chateau_formulaire7344-2":{"id":"Consult_chateau_formulaire7344-2","dept":"77","canton":"Torcy","commune":"Bussy-Saint-Georges","nom":"Bussy_St_Georges","type":"Châteaux","periode":"XVI-XVII","histoire":"trois châteaux dans cet article; Bussy st -georges, Génitoy et Rentilly.                                      GENITOY, château du XVIIe siècle, composé d'un corps de logis cantonné de deux pavillons. Écuries bâties à la fin du XVIIIe ou au début du XIXe siècle (composition en U). Le bâtiment des communs a un porche surmonté d'un pigeonnier à tour cylindrique (qui a conservé ses aménagements anciens : trous de boulins, échelle tournante). Les bâtiments sont actuellement désaffectés. Le domaine du Génitoy appartenait à la famille Rothschild. Le château actuel a été construit entre 1853 et 1861. Cette tour est transformée en pigeonnier au début du XVIIIe siècle, après la démolition du château, dont elle constitue le dernier vestige. A lextérieur, les fossés sont déblayés et laissent apparaître une partie des anciens remparts. À lintérieur, une salle voûtée, soutenue par un pilier central, est dégagée. Le château-ferme est devenu la propriété de l'Etat. Les éléments protégés aux M.H. le 9/10/1996, sont les façades et toitures du château avec ses douves en eau, les façades et toitures des écuries, les façades et toitures des communs, le pigeonnier-porche et le sol de la parcelle.                                                                                                                          BUSSY ST GEORGES,  la tour, seul vestige du château du seigneur de Buci, place forte, refuge dominant les vallées de la Brosse et de la Gondoire, daterait du XIIe siècle. Lactuelle place de Verdun, ancien emplacement du château, était entourée de fossés remplis deau provenant dune source qui alimentait la fontaine toujours visible sur la place du marché. Le cimetière, au nord de la tour, au-delà de lenceinte, a été découvert lors de la construction dun pavillon en 1960. La Tour mesure 21 mètres de hauteur et 9 mètres de diamètre.","architecture":"RENTILLY, le château de Rentilly (hameau de Bussy-Saint-Martin) fut construit au début du XVIe siècle, pour Jean Bourdereul, avocat au Parlement. Il passa ensuite de mains en mains, dont la famille André (banquiers et amateurs d'art à l'origine du musée Jacquemart-André qui surélève le château, ajoute ailes et clochetons. En 1890, le château est vendu à Gaston Menier, industriel du chocolat dont les usines et les bureaux sont à Noisiel tout proche. Pendant la seconde guerre mondiale, le château réquisitionné par lÉtat, sert de caserne à un groupe mobile de réserve (ancêtre des C.R.S.). A quelques heures de la libération, certains dentre eux, prirent le maquis. Le château de Rentilly fit incendié par l'armée allemande le 21 août 1944. Il sera reconstruit dans le style Directoire, entre 1954 et 1957, grace à Jacques Menier, son propriétaire.  Il fut longtemps un domaine seigneurial, le parc de Rentilly est devenu, aujourd'hui, un parc culturel, ouvert à la création et la diffusion de l'Art Contemporain. C'est un lieu de calme et de promenade parmi des essences forestières, aussi étonnantes que variées. Le parc (50 ha à cheval entre les communes de Bussy-Saint-Martin et Bussy-Saint-Georges), rouvert au public en 2003, après une réhabilitation de ses trois parties : le Parc à la Française, le Parc à lAnglaise et le bois. Au milieu de la grande pelouse trône une « capsule » conçue par l'artiste Édouard Sautai, pour l'observation des arbres, grâce à des « sylviscopes ». Si le Château de Rentilly fut longtemps un domaine seigneurial, le parc de Rentilly est devenu un parc culturel, ouvert à la création et la diffusion de l'Art Contemporain.","habitants":"famille Rothschild.\"","divers":"Deux châteaux dans cet article; Génitoy-2 et Rentilly grav-1.     GPS : 48° 50' 11\" Nord, 2° 43' 48\" Est                                                                  Rentilly  GPS : 48° 50' 44,38\" Nord, 2° 40' 11,34\" Est                                    Bussy-grav-3 GPS : 48° 50' 32\" Nord, 2° 41' 54\" Est","gps":"48° 50' 11\" Nord, 2° 43' 48\" Est","images":["../../jctruffet.com/image/image_77/77_Bussy_St_Georges_1.jpg","../../jctruffet.com/image/image_77/77_Bussy_St_Georges_2.jpg","../../jctruffet.com/image/image_77/77_Bussy_St_Georges_3.jpg"]},"Consult_chateau_formulaire144b":{"id":"Consult_chateau_formulaire144b","dept":"77","canton":"Fontenay-Trésigny","commune":"Chapelle-iger","nom":"Champgueffier","type":"Château","periode":"XVI-XIX","histoire":"CHAMPGUEFFIER, au XVIe siècle, Champgueffier appartient à la famille de Verdelot puis, au XVIIe siècle, à la famille de Laistre. Le seigneur de Champgueffier a droit de haute, moyenne et basse justice. Au cours de la seconde moitié du XVIIe siècle le revenu annuel de son fief est évalué à environ 3 000 livres. Avant la fin du siècle, Jacques de Laistre, chevalier de Saint-Louis, major de la citadelle de Saint-Jean-Pied-de-Port, vend Champgueffier mais son fils, mousquetaire en 1742, se nomme encore Mr de Laistre de Champgueffier  En 1743, Charles Boucher d'Orsay est nommé marquis de Champgueffier mais ne conserve pas cette terre. Dès 1749, la seigneurie est acquise par Jacques II de Flesselles, puis passe à son fils, le fameux Jacques de Flesselles (1730-1789), futur prévôt des marchands de Paris. Ce dernier fait construire en 1772 l'actuel pont de pierre donnant accès aux communs et château de Champgueffier. Il revend la seigneurie à Louis Silvy (1760-1847), conseiller-auditeur à la Chambre des Comptes, qui se sépare de Champgueffier, dès 1800. À cette date, Louis de Boislandry (1750 + 1834), négociant, banquier, ancien député de Paris à l'Assemblée constituante, achète cette propriété et y adjoint les propriétés voisines de La Chapelle-Iger, des Hauts-Grès et de Vaux. Champgueffier sera conservé deux siècles par sa famille (1800-2000). En 1862, le château de Champgueffier ayant brûlé, le Général Eugène Dubern, petit-fils de Louis de Boislandry, le fit reconstruire.                                                .","architecture":"CHAMPGUEFFIER;  le site actuel du château était au moyen-âge le siège dune importante forteresse. A la fin du XVIe siècle un château qui dominait deux vallons avait été bâti avec une cour pavée que bordait de longues dépendances. Au-delà du château, un parc dune quinzaine dhectares traversé par un tapis vert et des allées en étoile. Cour et parc étaient entourés de douves que franchissaient des ponts.  Pendant ou après la Révolution, il aurait brulé sans ses dépendances et fût reconstruit vers 1862 par le général Eugène Dubern, petit-fils de Louis de Boislandry. Il sagit de lactuel château. Cest en août 2000 que la famille Van de Kerchove à repris le site de Champgueffier, agriculteurs, amoureux de belle pierre, avec le souhait de faire revivre les lieux. Aujourdhui, ils travaillent tous sur le site afin de répondre au mieux à vos attentes.","habitants":"Famille de Verdelo\"","divers":"Champgueffier   GPS : 48° 38' 40\" Nord, 3° 00' 04\" Est","gps":"48° 38' 40\" Nord, 3° 00' 04\" Est","images":["../../jctruffet.com/image/image_77/77_Champgueffier_1.jpg"]},"Consult_chateau_formulairedbed":{"id":"Consult_chateau_formulairedbed","dept":"77","canton":"Champs-sur Marne","commune":"Champs-sur Marne","nom":"Champs_sur_Marne","type":"Château","periode":"XVII","histoire":"CHAMP sur MARNE, construit à la fin du règne de Louis XIV, le château possède une architecture typique du XVIIIe siècle, sa construction par Pierre Bullet en 1699, fut commandée par le Fournisseur aux Armées Royales  C'est son fils, Jean Baptiste Bullet de Chamblain, qui reprend la construction grâce aux deniers de Paul Poisson de Bourvallais, fermier général dont l'hôtel parisien est l'actuel siège du ministère français des affaires étrangères. La construction se termine en 1707. En 1718 passe au duc de la Vallière et en la marquise de Pompadour va l'habiter de 1757 à 1758 et dépensera beaucoup d'argent pour sa décoration, notamment des peintures décoratives du peintre animalier Christophe Huet. De nombreux propriétaires vont se succéder après cela, jusqu'au Comte Louis Cahen d'Anvers (1837-1922) en 1895, banquier parisien, qui restaure entièrement le château de Champs sur Marne. Sa fille, Irène Cahen d'Anvers (1872-1963), épouse du comte Moïse de Camondo (1860-1935), grand collectionneur qui légua son hôtel du 63 rue de Monceau à Paris ainsi que son contenu au musée des arts décoratifs en souvenir de leur fils unique, Nissim (1892 1917), aviateur tué au combat. Le fils du comte, Charles Cahen d'Anvers, fait don du château de Champs sur Marne à l'État en 1935, qui le réserve aux séjours officiels de ses hôtes de marque. Poisson de Bourvallais réalise les jardins à la française avec des parterres de broderies. Leur conception serait due à Claude Desgots (neveu de Le Nôtre). Plus tard, à l'époque des ducs de La Vallière, Garnier de l'Isle modifie une partie du jardin. Enfin, Achille Duchêne en redessine les parterres.","architecture":"CHAMP sur MARNE, sa construction date de 1699 à 1707, il est ouvert au Public depuis 1935. C'est un type accompli de la maison de plaisance à la Française du début du XVIIIe siècle, avec son plan en « U » à 2 courtes ailes, sur la cour d'honneur au sud et sa rotonde, sur le jardin au nord. Il témoigne dun meilleur confort.A été construit près d'une boucle de la Marne, par les architectes Pierre Bullet et son fils Jean-Baptiste Bullet de Chamblain, pour 2 financiers de Louis XIV : Charles Renouard de La Touanne puis Paul Poisson de Bourvallais. Durant lété 1757, le duc de La Vallière louera le château à la marquise de Pompadour qui y résidera, durant 1an et demi. En 1895, le Château de Champs-sur-Marne est racheté par le Banquier Louis Cahen d'Anvers, une puissante famille de la Haute Finance parisienne, et son épouse Louise de Morpurgo. Ils feront restaurer le domaine et le château, par l'architecte Walter-André Destailleur, où naquit le 26 août  1899, leur fille Lydie Louise Yvonne  et feront recréer les jardins, par les paysagistes Henri et Achille Duchêne aidés par les nombreux jardiniers, recrutés par Louis Cahen d'Anvers, qui, en 1904, fut élu maire de la commune, avant son fils cadet Charles. Il meurt en 1922. En 1934, Charles, époux de Suzanne Lévy, le donna à l'État,  Éléments protégés MH : le château, le jardin et le parc : classement par arrêté du 24 juillet 1935.","habitants":"La marquise de Pompadour \"","divers":"Champs sur Marn      GPS : 48° 51' 14\" Nord, 2° 36' 15\" Est","gps":"48° 51' 14\" Nord, 2° 36' 15\" Est","images":["../../jctruffet.com/image/image_77/77_Champs_sur_Marne_1.jpg","../../jctruffet.com/image/image_77/77_Champs_sur_Marne_2.jpg","../../jctruffet.com/image/image_77/77_Champs_sur_Marne_3.jpg","../../jctruffet.com/image/image_77/77_Champs_sur_Marne_4.jpg"]},"Consult_chateau_formulaire5277":{"id":"Consult_chateau_formulaire5277","dept":"77","canton":"Nangis","commune":"Chapelle Gauthier","nom":"Chapelle_Gauthier","type":"Château","periode":"XVII","histoire":"La CHAPELLE GAUTHIER, au XIIe siècle Gauthier de Villebéon seigneur de la chapelle le site acquis en 1400 est décrit dans l'acte comme :  Le château appartint au XIVe siècle à Jean Juvénal des Ursins, prévôt des marchands de Paris.  Il fut reconstruit après 1616 par le prince de Condé Henri de Bourbon vendra en 1622 à Jacques Vignier genthilhomme de la maison de son  fils Nicolas qui prendra le titre de comte, et baron de Ricey, conseiller d'état et intendant de Lorraine, et les Viguier se défont du château au profit des Thiboust de Berry,  en 1784  le dernier des Thisboust, Après la Révolution racheté par Charles Reusses cède à la famille des Mauperché. Vendu en 1814 aux comte Lau d'Allemmans puis acquis par un spéculateur qui le dépouille, le château est vendu à un marchand de meubles qui le loue, démonte les cheminées et les grilles et finit par le vendre en 1867 à un antiquaire. Acquis en 1872 par François Castille, boucher, le château retrouve peu à peu son domaine. Le nouveau propriétaire et sa fille rachètent en effet des terres et créent un nouveau parc. Pendant la guerre de 1914-1918, le château est transformé en hôpital. La paix revenue, la famille Ziegel entreprend des travaux de réparation et de modernisation. Il subit de nouvelles dégradations pendant la seconde guerre mondiale. En 1984 la demeure est à l'abandon la commune l'achète et y entreprend des travaux de réfection de la toiture.  Propriété de la commune, hôtel de ville.","architecture":"La CHAPELLE GAUTHIER,  le château de la Chapelle date du XIIe  siècle, lorsque le prince de Condé le rachète, il s'agit encore de la forteresse médiévale de Gauthier. Le site acquis en 1400 est décrit dans l'acte comme : « Le château et maison seigneuriale ancien fort et bien logeable avec donjon ferme de murailles pont-levis, fosses et quatre tours aux quatre angles dont y en a une tombée » Des bâtiments encadrent une cour et un donjon, l'édifice en forme de fer à cheval. Le château est alors rasé à la hauteur du premier étage. Les quatre tours et le donjon sont supprimés, les façades sur cour sont refaites, la partie centrale avec avant corps à jambes  harpées et fronton cintré. La tour carrée à l'angle du nord est datée de cette époque, avec des meurtrières pour battre les deux ponts-levis situés alors au nord et à l'est. L' escalier d'honneur est construit en même temps. Reconstruit au XVIIe siècle. Il abrite les services de la mairie et la bibliothèque municipale, la rénovation du château de La chapelle a bénéficié d'un financement du Loto du Patrimoine, en 2018. »  Le château de la Chapelle, y compris la grille d'honneur, les douves, les murs de soutènement et le pont qui prend appui sur elles et donne accès à la cour d'honneur : classement par arrêté du 10 avril 1990. les douves, le pont, la clôture, la toiture, le décor intérieur, la grille, et le mur de soutènement font lobjet dune inscription aux M.H. depuis le 10 avril 1990.","habitants":"Le prince de Condé Henri de Bourbon\"","divers":"Chapelle Gauthier  GPS : 48° 33' 3,24\" Nord, 2° 54' 4,32\" Est     GPS : 48° 33' 03\" Nord, 2° 54' 04\" Est","gps":"48° 33' 3,24\" Nord, 2° 54' 4,32\" Est     GPS : 48° 33' 03\" N","images":["../../jctruffet.com/image/image_77/77_Chapelle_Gauthier_1.jpg","../../jctruffet.com/image/image_77/77_Chapelle_Gauthier_2.jpg"]},"Consult_chateau_formulaire5e7f":{"id":"Consult_chateau_formulaire5e7f","dept":"77","canton":"Fontenay-Trésigny","commune":"les Chapelles Bourbon","nom":"Chapelles_Bourbon","type":"Châteaux","periode":"XIV-XIX","histoire":"Deux châteaux dans cet article; Beaumarchais et Ménillet. BEAUMARCHAIS Le manoir de Beaumarchais est de style anglo-normand. Sa construction date de 1927, d'après les plans de l'architecte Henri Jacquelin, par Louis Boucheron, joaillier de la place Vendôme à Paris. La première mention qui est faite de cette terre date de 1548, par un acte où Guillaume Prudhomme, seigneur de Liverdy, Fontenay-en-Brie, etc, conseiller du roi, Trésorier de l'épargne, puis Trésorier de France, avoue tenir de demoiselle Anne Godonvillier, dame de Pézarches, le dit fief de Beaumarchais, qu'il a acquis de Jacques de Poisieu, Chevalier, seigneur de Vallery, et d'Antoinette de Costée. Sa fille Jeanne Prudhomme a été mariée à Nicolas III « Legendre » de Neufville, parents de Nicolas IV de Neufville de Villeroy. Le 29/07/1641, Nicolas Lamberty, écuyer, seigneur de Beaumarchais et du Breuil, fondit une chapelle, dans la cour du donjon du Manoir de Beaumarchais et, affecta à cette fondation, 150 Francs de rente, à prendre sur la ferme de la Pigeonnière. Le Manoir de Beaumarchais passa dans de nombreuses mains sous lAncien Régime et après la Révolution. Une maison seigneuriale, date probablement du XVIIe siècle, et une ferme y seront construites. Le Manoir de Beaumarchais, la ferme ainsi que le Petit-Beaumarchais formaient un groupe d'habitation contenant une douzaine de familles. Le Manoir de Beaumarchais est inscrit partiellement aux M.H.","architecture":"MENILLET, le château du Ménillet a été construit du XIVe au XVIe siècle. Le Ménillet (autrefois château du Méniet) était une terre noble. Cette terre, appelée Mesnil-Forteret dans les plus anciens titres, était avant 1378 un monastère portant le nom de Sainte-Catherine des Enfants. Ce domaine a appartenu au duc de Montpensier. Le 4 avril 1863, MM. Dupuis et Godefroy, devenus acquéreurs de cette terre, l'ont revendu à M. Singer, propriétaire du château du Chemin, situé à Neufmoutiers. Le château du Ménillet présente les caractères d'une petite forteresse, les bâtiments étaient alors entourés de fossés remplis d'eau à l'instar des maisons seigneuriales du pays de Brie. Plusieurs familles vivaient dans le domaine du Ménillet. La porte fortifiée et les douves du château du Menillet ont été inscrits aux M.H. le 1/12/1986. Le château du Menillet est privé.","habitants":"Beaumarchais; Louis Boucheron                  Menillet duc de Montpensier\"","divers":"Deux châteaux dans cet article; Beaumarchais grav 1-2-3-4 et Ménillet.Grav 5-6 GPS : 48° 44' 29\" Nord, 2° 50' 29\" Est\nMenillet  GPS : 48° 44' 29\" Nord, 2° 50' 29\" Est","gps":"48° 44' 29\" Nord, 2° 50' 29\" Est","images":["../../jctruffet.com/image/image_77/77_Chapelles_Bourbon_1.jpg","../../jctruffet.com/image/image_77/77_Chapelles_Bourbon_2.jpg","../../jctruffet.com/image/image_77/77_Chapelles_Bourbon_3.jpg",".
