./../jctruffet.com/image/image_77/77_Chapelles_Bourbon_4.jpg","../../jctruffet.com/image/image_77/77_Chapelles_Bourbon_5.jpg","../../jctruffet.com/image/image_77/77_Chapelles_Bourbon_6.jpg"]},"Consult_chateau_formulaire8a9d":{"id":"Consult_chateau_formulaire8a9d","dept":"77","canton":"Nangis","commune":"Chartrettes","nom":"Chartrettes","type":"Châteaux","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article, les Pré et Rouillon                                                                                         des PRE  C'est en 1510 que le château actuel fut construit avec ses douves formant un carré parfait ainsi que son pont-levis. Placé sur la ligne de front entre protestants et catholiques, il fut incendié puis reconstruit. En 1635, Antoine Sayve vendit la propriété à Robert Clapisson, membre de l'une des plus illustres familles de France. En 1736, après la mort de Nicolas Charpy, seul et unique héritier de cette famille, c'est la famille de Fremont d'Auneuil du Mazis qui acheta la propriété, elle passait pour être l'une des plus riches familles de France. En 1780, c'est Louis Alexandre Grare, négociant à Paris et époux de Pétronille Poupart, qui devient propriétaire, il meurt un an plus tard et en 1782, sa veuve se remarie avec Jean Beaujouan, négociant et révolutionnaire. Il mariera l'une de ses filles, Pétronille à Bourbotte, révolutionnaire qui fut l'un des plus cruels participants à la guerre de Vendée. Après 1789, Beaujouan constitue la Garde Républicaine de Melun, il l'équipe à ses frais et l'entraîne dans le parc. Danton, ami de Beaujouan, aurait séjourné au château en mars 1794. En 1876, le Général Salanson, commandant supérieur de l'Ecole Polytechnique et de l'Ecole d'Application de Fontainebleau, achète l'édifice et lui donne sa forme actuelle en ajoutant le pavillon central. Son fils Eugène lui succède et procède à de nombreux aménagements, notamment la prairie ovale, entourée de haies, qui servira de manège pour les chevaux. Paul et Betty Winckler acquièrent le château en 1937, il sont propriétaires des publications : Opéra Mundi, Confidences et France Soir, ils s'exilent aux USA pendant la deuxième guerre mondiale. L'activité agricole de la ferme s'arrête à cette époque. L'armée allemande occupe le château puis le brûle. Après la guerre, il est restauré par les Winckler. En 1990, l'association religieuse bouddhiste en devient propriétaire. Après d'importants travaux de rénovation, l'inauguration a lieu le 23 juin 1991. Le parc de 33 hectares a été mis en valeur et contient des pièces magnifiques, ce qui donne à l'ensemble toute sa beauté.","architecture":"ROUILLON, il a été édifié en 1595. C'est la reproduction d'un pavillon du quartier Henri IV du château de Fontainebleau. Gabrielle d'Estrées, qui était la favorite du roi Henri IV, y aurait séjourné, peu avant sa mort (1599).En 1834, le baron Allouis fit construire un lavoir en contrepartie du captage de la source de la Chevalerie pour alimenter le château en \"eau courante\". Le château de Rouillon, de style Renaissance, a appartenu à Léon Franchetti, Commandant des Eclaireurs à cheval de la Seine, mort au cours de la bataille de Champigny le 2/12/1870. Chartrettes connut des moments difficiles, au cours de la Révolution française. Après la confiscation des biens des seigneurs émigrés et le morcellement des terres du château de Massoury qui appartenait au Roi de France. C'est en 1793, au cours de la nuit, que l'abbé Lejeune subtilisa les restes du Roi Louis VII et alla les cacher, dans l'église de Chartrettes, pour éviter qu'ils ne soient profanés. Devenue une propriété privée, depuis 2001, le château de Rouillon a été transformé et vous propose ses chambres d'hôtes.                                                                                                                    A cinq K.M. au nrd ouest,LA ROCHETTE     Site surplombant la vallée de la Seine. Château construit de 1772 à 1778 pour François Thomas Moreau, inspecteur général des pépinières royales, par l'architecte Victor Louis (architecte du Roi de Pologne). Le château fut édifié en grès retaillé provenant de la démolition des fortifications de Melun. Quant aux terrasses, ce sont des pierres du château de Melun qui servirent, des années plus tard, à leur construction. A l'intérieur, on peut admirer, au rez-de-chaussée, le salon décoré de colonnes à chapiteaux, de guirlandes enrubannées de feuillages et de fleurs ponctuées d'angelots (inscrits à l'inventaire supplémentaire des M.H. depuis 1977) Le bel escalier droit, classique, est orné d'un médaillon finement ciselé représentant peut être Louis XIV. Une plaque de marbre rappelle aussi une visite de la Dauphine, fille de Charles X, en 1827. Éléments protégés MH : les façades et les toitures du château ; l'escalier intérieur et le salon avec son décor stuqué : inscription par arrêté du 7 septembre 1978. Le château ; le parc et la terrasse : inscription par arrêté du 31 octobre 1995.","habitants":"Pré; Framille de Robert Clapisson                               Rouillon, Famille de  Léon Franchetti\"","divers":"Trois  châteaux dans cet article, les Pré grav-1-2  et Rouillon  grav-3  la Rochette  grav-4             GPS : 48° 29' 24\" Nord, 2° 42' 02\" Est                                                              Rouillon GPS : 48° 29' 11\" Nord, 2° 42' 55\" Est","gps":"48° 29' 24\" Nord, 2° 42' 02\" Est","images":["../../jctruffet.com/image/image_77/77_Chartrettes_1.jpg","../../jctruffet.com/image/image_77/77_Chartrettes_2.jpg","../../jctruffet.com/image/image_77/77_Chartrettes_3.jpg","../../jctruffet.com/image/image_77/77_Chartrettes_4.jpg"]},"Consult_chateau_formulaireb02f":{"id":"Consult_chateau_formulaireb02f","dept":"77","canton":"Claye-Souilly","commune":"Chauconin Neufmontiers","nom":"Chauconin_Martroy","type":"Château","periode":"XVIII-XIX","histoire":"Deux châteaux dans cet article Martroy  et Tribardou.                                MARTROY  Le château du Martroy a été construit au XVIIe siècle et remanié au XIXe siècle. Il a appartenu au vicomte Daru, commandant d'artillerie, descendant de Pierre Daru qui fut sous le Premier Empire, intendant général de la grande Armée, homme de lettres et membre de l'Académie Française, en 1809 comte d'Empire et cousin de Stendhal. En 1829, le château du Martroy appartenait au vicomte Camus du Martroy.                                                                                                                             A cinq K.M. au sud  TRILBARDOU   Un premier château existait à Trilbardou au XVIIIe siècle, lorsque Jean Charles Pierre Lenoir, lieutenant de Police et bibliothécaire du roi Louis XV acquiert la terre de Trilbardou et décide dy élever un château afin de trouver calme et sérénité, il n'en reste aujourd'hui aucune trace. Ce bâtiment initial, édifié par l'architecte de la Bourse de Paris, Alexandre Théodore Brongniart, a été remplacé au XIXe siècle par une demeure plus grande, dessinée dans un style Louis XIII. Pendant la Première Guerre mondiale, le général Galliéni sy installa pour diriger loffensive contre larmée allemande de Von Kluck. En 1956, la municipalité de La Courneuve achète la propriété et réaménage le château de Trilbardou qui domine la Marne du haut de sa terrasse. Un achat colossal qui avait le but de rendre inoubliables les vacances des petits Courneuviens.","architecture":"MARTROY, l'ensemble comprend un jardin d'agrément, une prairie ornementale, un bois de jardin, un parterre de gazon, un étang, une grotte artificielle et un massif d'arbres.  Éléments protégés MH : les communs et le passage appareillé menant à l'ancien parc : inscription par arrêté du 24 juin 1987.","habitants":"Famille du Vicomte Daru,\"","divers":"Martroy 48° 57' 51? N, 2° 50' 48? E    Trilbardou48° 56' 41? N, 2° 48' 12? E","gps":"","images":["../../jctruffet.com/image/image_77/77_Chauconin_Martroy_1.jpg","../../jctruffet.com/image/image_77/77_Chauconin_Martroy_2.jpg","../../jctruffet.com/image/image_77/77_Chauconin_Martroy_3.jpg"]},"Consult_chateau_formulaire69cf":{"id":"Consult_chateau_formulaire69cf","dept":"77","canton":"Fontenay-Trésigny","commune":"Chaumes en Brie","nom":"Chaumes_en_Brie","type":"châteaux","periode":"XVIII","histoire":"Trois  châteaux dans cet article; Arcy, Forest, Crenille et Maurevert.                                 ARCY, la constuction du château d'Arcy date du XVIIIe au XIXe siècle. Il est composé d'éléments très divers dont sa tour qui est renommée. Le portail d'entrée est celui de la chapelle Saint-Firmin de Paris (1257), réédifié ici, en 1896. Le château d'Arcy et sa tour est composé d'éléments très divers. Le portail d'entrée est celui de la chapelle Saint-Firmin de Paris (1257) . En avril 1475, par ses lettres patentes, Louis XI confirma sa protection royale. L'abbaye ferma ses portes, quelques années, avant la Révolution, puis, il tomba, peu à peu, en ruine. En 1883, un pastiche de château médiéval fut rebâti sur les vestiges. Il accueillit, jusqu'en 2011, une école maternelle. Le château d'Arcy devint l'Inspection de lÉducation Nationale de Chaumes-en-Brie. Depuis 2014, le château d'Arcy est devenu un centre d'Hébergement d'urgence, de Réinsertion Sociale et Professionnelle, pour des personnes en difficulté, géré par l'association Aurore. Avec la Tour d'Arcy, il y a aussi à découvrir sur la commune de Chaumes-en-Brie : le château d'Arcy (Centre de Réinsertion), le château de Maurevert du XVIIIe siècle, le château de Forest (Ferme) et le château de Crenille.  La Tour d'Arcy est bâtie à Chaumes-en-Brie date du XIXe siècle. La Tour d'Arcy est appellée aussi la Tour Saint-Firmin. Édifiée en 1896, pour l'acteur Léon Noël, elle est composée d'éléments très divers.","architecture":"FOREST, le château de Forest à Chaumes-en-Brie. C'est devenu la ferme de Forest qui a été construite sur l'emplacement d'un ancien manoir médiéval. Le principal corps de bâtiment est surmonté d'un pigeonnier et d'un colombier.                                                                                                                                           CRENILLE,    se loue pour un évènement au coeur de la nature, rendez-vous au château de Crénille ! Privés (mariages, baptêmes, réceptions familiales) ou Professionnels (séminaires, congrès, team-building), vivez un moment inoubliable dans un écrin historique.                                                                                                                    MAUREVERT; la construction du château de Maurevert date du XVIIIe siècle. Le château de Maurevert de plan en U a été construit sur l'emplacement d'un ancien château de style médiéval. Avec la Tour d'Arcy.","habitants":"Seigneurs locaux\"","divers":"Quatre châteaux dans cet article; Arcy grav-1-, Forest-Grav-6, Beauvoir garv -5                                                    Crenille et Maurevert grav-3-7.  GPS : 48° 39' 50\" Nord, 2° 52' 15\" Est                                                              Tour d'Arcy grav-2 GPS : 48° 39' 49,5\" Nord, 2° 52' 08,35\" Est                                         crenille   grav-4  GPS : 48° 40' 07\" Nord, 2° 50' 38\" Est                                                   Forest GPS : 48° 40' 07\" Nord, 2° 50' 38\" Est                                                         Maurevert GPS : 48° 39' 29,63\" Nord, 2° 49' 21,64\" Est","gps":"48° 39' 50\" Nord, 2° 52' 15\" Est","images":["../../jctruffet.com/image/image_77/77_Chaumes_en_Brie_1.jpg","../../jctruffet.com/image/image_77/77_Chaumes_en_Brie_2.jpg","../../jctruffet.com/image/image_77/77_Chaumes_en_Brie_3.jpg","../../jctruffet.com/image/image_77/77_Chaumes_en_Brie_4.jpg","../../jctruffet.com/image/image_77/77_Chaumes_en_Brie_5.jpg","../../jctruffet.com/image/image_77/77_Chaumes_en_Brie_6.jpg","../../jctruffet.com/image/image_77/77_Chaumes_en_Brie_7.jpg"]},"Consult_chateau_formulaireb19a":{"id":"Consult_chateau_formulaireb19a","dept":"77","canton":"Nemours","commune":"Chevry en Sereine","nom":"Chevry","type":"Château","periode":"XVI","histoire":"CHEVRY, entre 1610 et 1630, Charles Duret fait construire un élégant château avec maçonnerie de briques, chaînes de grès taillé, entouré de grands fossés secs, relié par deux ponts de pierre au parc, percé de larges allées droites, qui se coupent suivant un dessin attribué à André Le Nôtre. En 1709, il est vendu à Nicolas Capitain, qui le cède dès 1732 à la famille de Blancheton.  En 1776, l'édifice passe à Nicolas Rousselot, Conseiller du Roi au Châtelet de Paris. Durant la Révolution le château fut épargné, mais le pigeonnier perd son campanile et toutes les archives disparaissent. En 1814, Napoléon livre dans la vallée de la Seine ses dernières batailles, et les Cosaques endommagent et pillent la demeure, il appartient au Marquis et à la Marquise de Laubespin.\nÉléments protégés MH : le château, y compris la cour d'honneur et les douves : classement par arrêté du 5 juillet 1966. Toutes les dépendances (communs, ferme, pigeonnier) ainsi que l'ancien potager avec son orangerie : inscription par arrêté du 2 juillet 1993.","architecture":"CHEVRY, la construction du château de chevry date de 1610 à 1633, par le chancelier Charles Duret, ministre de Louis XIII. Le Jardin a été créé au XVIIe siècle dans un style à la française puis, il a été transformé en 1850, en un parc paysager, par le comte de Choulot pour s'adapter à la mode du XIXe siècle. Avec sa façade de briques et de pierres, ses hautes fenêtres, ses toits d'ardoises et ses arbres, Chevry a conservé aujourd'hui son cachet authentique, Restauré en 1990, il a retrouvé un plan régulier, mêlant la restitution à partir de plans anciens et les créations contemporaines. Le château de Chevry-en-Sereine a été classé aux M.H. depuis 1966. Il appartient, aujourd'hui, au Marquis de Laubespin.","habitants":"la famille de Blancheton\"","divers":"Chevry  GPS : 48° 15' 03\" Nord, 2° 56' 07\" Est","gps":"48° 15' 03\" Nord, 2° 56' 07\" Est","images":["../../jctruffet.com/image/image_77/77_Chevry_1.jpg"]},"Consult_chateau_formulaire80e2":{"id":"Consult_chateau_formulaire80e2","dept":"77","canton":"Nemours","commune":"Château-Landon","nom":"Château_Landon","type":"Château","periode":"XIX","histoire":"trois châteaux dans cet article Chance-Poix et Landon, Tour Saint-Thugal                                                                                                                              CHANCEPOIX, la construction du château de Chancepoix date de 1930. Il fait partie des 10 000 châteaux construits pour des notables, négociants et industriels, qui les firent bâtir autour de Paris, dans un rayon de 100 kms, à la fin du XIXe siècle. Le château de Chancepoix fut construit pour la Famille Ouvré, des sucriers, qui eurent tous des fonctions d'élus, en Seine et Marne. En 1930, ils firent don du château afin d'y créer un établissement pour enfants en difficulté. Un nouvel établissement plus moderne sera construit dans le parc, tenant compte d'une pédagogie plus moderne et d'une médecine plus actuelle. A coté, une ferme-modèle sera bâtie, dans le même style architectural. Le château de Chancepoix est inscrit aux M.H. depuis 1926. C'est devenu un EPMS (Etablissement Public Médico Social) qui accueille 140 enfants et adolescents dans le cadre du handicap.","architecture":"LANDON est un château bâti à Château-Landon,  est devenu un musée ouvert au Public.   La Tour Saint-Thugal représente ce qu'il reste d'une ancienne Basilique datant du Xe siècle. La Tour Saint-Thugal est privée, fermée au Public. Elle est inscrite aux M.H. depuis le 18/03/1926.","habitants":"Famille Ouvré\"","divers":"Deux châteaux dans cet article Chance-Poix et  tandon   GPS : 48° 10' 24\" Nord, 2° 42' 14\" Est                                                                       Landon grav-2          GPS : 48° 09' 00\" Nord, 2° 42' 04\" Est                                                         tour  GPS : 48° 09' 00,36\" Nord, 2° 42' 21,96\" Est","gps":"48° 10' 24\" Nord, 2° 42' 14\" Est","images":["../../jctruffet.com/image/image_77/77_Ch%c3%a2teau_Landon_1.jpg","../../jctruffet.com/image/image_77/77_Ch%c3%a2teau_Landon_2.jpg"]},"Consult_chateau_formulaire447e":{"id":"Consult_chateau_formulaire447e","dept":"77","canton":"Fontenay-Trésigny","commune":"Coubert","nom":"Coubert","type":"Château","periode":"XIX","histoire":"COUBERT, la construction du château de Couvert date du XIXe siècle. Il a remplacé celui du Financier Samuel Bernard, dont il subsiste les pavillons d'entrée et la façade de l'orangerie, qui sont du XVIIIe siècle, avec un fronton sculpté. Nicolas de L'Hospital, seigneur de Vitry-en-Brie (Vitry-Coubert à Guignes) puis duc de Vitry, maréchal de France, devint le seigneur de Coubert, sous Louis XIII. Frédéric Armand de Schomberg, Maréchal de France en 1675. La même année, il achèta la seigneurie de Coubert au fils du précédent. Il conserva le château de Coubert jusqu'à la révocation de l'Edit de Nantes, en 1685, qui l'obligea à quitter la France. En 1711, Coubert fut restitué à son fils, Maynard de Schomberg, mort en 1719. Les héritières de Maynard de Schomberg vendirent alors le château de Coubert à Samuel Bernard. Le banquier et financier Samuel Bernard rachèta, en 1719, le Comté de Coubert et fit reconstruire le château, de 1724 à 1727. Il le conserva jusqu'à sa mort, en 1739 et le lègua à l'aîné de ses fils, Samuel-Jacques Bernard, fils aîné de Samuel Bernard. Il devint comte de Coubert après son père et décéda en 1753. Il eut pour successeur comme comte de Coubert, son fils Olivier Samuel Jacques Bernard (1730-1801), qui émigra à la Révolution. Le château de Coubert fut alors vendu comme bien national, puis détruit sous la Restauration. George Charles Potter, fils du manufacturier Christophe Potter (1751-1817) et mari de Laurence Viénot de Vaublanc, fille du comte de Vaublanc, furent les propriétaires du château jusqu'en 1834. château XVIIIe siècle, parc, orangerie, ile, étang.","architecture":"COUBERT; châteaux reconstruit au XIX e siècle avec un corps de logis sur emcorbellement à deux niveaux et attiques avec ouvertures sur toitures par des lucarnes accolé de pavillons saillants à toitures deux pans un autre pavillon à gauche de même niveau avec tour clocher à trois niveaux toit à quatre pans façade du pavillon style manoir, l'ensemble au troisième étage ressort des colombages.","habitants":"Famille de  Samuel Bernard \"","divers":"Coubert  GPS : 48° 40' 16\" Nord, 2° 41' 49\" Est","gps":"48° 40' 16\" Nord, 2° 41' 49\" Est","images":["../../jctruffet.com/image/image_77/77_Coubert_1.jpg","../../jctruffet.com/image/image_77/77_Coubert_2.jpg","../../jctruffet.com/image/image_77/77_Coubert_3.jpg","../../jctruffet.com/image/image_77/77_Coubert_4.jpg"]},"Consult_chateau_formulaireb57a":{"id":"Consult_chateau_formulaireb57a","dept":"77","canton":"Coulommiers","commune":"Coulommiers","nom":"Coulommiers","type":"Châteaux","periode":"XIII-XVII-","histoire":"trois châteaux dans cet article; Coulommiers, Houssière, Montanglaust et Pommeuse                                                                                                                             MONTANGLAUST  la construction du château date du XVIIe siècle. Le château fut construit pour la Famille Pidoux, seigneurs de Montanglaust, depuis le Moyen Age. Jean de La Fontaine, parent du coté de sa mère, de la Famille Pidoux, aurait séjourné dans cette demeure. Le château de Montanglaust est classé aux M.H. depuis 1990.                                                          A 2  K.M à l'ouest  POMMEUSE Sa construction date du XIXe siècle. Le château a été largement reconstruit par Simon Arnauld de Pomponne et son père sur des plans de Mansart et Hardouin-Mansart. Le château de Pommeuse date du XIXe siècle   A l'ouest de Coulommiers à Faremoutier château de Sainte-Fare pas d'historique.                                                                                                                            Au nord de Coulommiers  HOUSSIERE  La Houssière ou château d'Aulnoy, fut construit en 1171 pour le comte de Champagne Robert d'Aulnoy. En 1250 Thomas D'Aulnoy reçut du Roy la Maison de la Houssière. Il a été remanié au XIXe siècle pour le compte de la famille de Charnacé, par l'architecte Louis-Jules Bouchot. Organiser votre mariage dans ce cadre enchanteur et inoubliable. Le château de la Houssière date du XIIe siècle. Son parc a une superficie de 6 hectares, le château de la Houssière vous ouvre ses portes et son parc pour vos réunions d'entreprise ou vos événements privés. Location de 2 salles, Il existe 2 châteaux à découvrir sur la Commune d'Aulnoy : Le château de La Houssière (Location de salle) et le château du Ru.","architecture":"COULOMMIERS   Sa construction date de 1308 à 1312. La commanderie de Coulommiers, est appelée la commanderie des Templiers, Elle se trouve dans le quartier « des Templiers » situé dans le nord de la ville, en hauteur. La commanderie de Coulommiers est la dernière complète pour la France au nord de la Loire. Après le départ du dernier fermier en 1964, la commanderie de Coulommiers était vouée à disparaître face à l'urbanisation du Theil. Elle est heureusement sauvée in extremis par une association qui rappelle l'importance de ce lieu fondé au XIIe siècle par les Templiers et entreprend les premières restaurations. En fait, la commanderie de Coulommiers doit son salut à sa restauration mais surtout, à sa réutilisation. Jean Schelstraete est connu sur le site autant pour avoir contribué à l'organisation du sauvetage de la commanderie de Coulommiers par les chantiers de bénévoles que pour avoir écrit en 1968, le seul ouvrage consacré exclusivement à l'histoire de la ommanderie de Coulommiers. L'architecte en chef est Hervé Baptiste. Cet ouvrage dresse l'historique général de la commanderie, depuis sa fondation en 1173 jusqu'à nos jours et décrit l'ensemble des lieux. Il raconte le démarrage des chantiers de restauration du site. La commanderie est ainsi restaurée, depuis 40 ans, par de courageux bénévoles, lors des chantiers internationaux, dans le cadre de lUnion Rempart. Son intérêt national et public lui a valu un classement aux M.H. en 1994.","habitants":"Montanglaust; Famille Pidoux\"","divers":"Deux châteaux dans cet article; Coulommiers grav-1-2 et Montanglaust grav-4 et pommeuse grav-3 . GPS : 48° 49' 39\" Nord, 3° 04' 30\" Est                                                                   Coulommiers GPS : 48° 49' 26,04\" Nord, 3° 05' 39,41\" Est                             Houssière grav 5","gps":"48° 49' 39\" Nord, 3° 04' 30\" Est","images":["../../jctruffet.com/image/image_77/77_Coulommiers_1.jpg","../../jctruffet.com/image/image_77/77_Coulommiers_2.jpg","../../jctruffet.com/image/image_77/77_Coulommiers_3.jpg","../../jctruffet.com/image/image_77/77_Coulommiers_4.jpg","../../jctruffet.com/image/image_77/77_Coulommiers_5.jpg"]},"Consult_chateau_formulairea803":{"id":"Consult_chateau_formulairea803","dept":"77","canton":"Serris","commune":"Coupvray","nom":"Coupvray","type":"Châteaux","periode":"XVI-XVII-XVIII","histoire":"quatre châteaux dans cet article; Coupvray, Chessy, Lesches  et Condé ste Libiaire.                                                                                                                 COUPVRAY on ne connait ni l'architecte ni la date exacte de sa construction mais tout laisse penser que le commanditaire en fut Hercule de Rohan à la fin du XVIe siècle, sa construction était achevée en 1603. Pendant deux siècles, l'édifice demeure la propriété de la maison Rohan Guéméné, jusqu'à sa vente en 1791 aux frères Tourteau par le cardinal de Strasbourg qui s'était illustré dans l'affaire du collier de la reine. Le marquis Tourteau d'Orvilliers agrandit le parc et achève son aménagement à \"l'anglaise\" commencé à la fin du XVIIIe siècle. Etienne de Turenne hérite du domaine qu'il revend en 1869 au troisième duc de Trévise, petit-fils du Maréchal Mortier. Le domaine passera au comte de Kerveguen de 1916 à 1956, puis à sa fille Thérèse, épouse de François de Brignac. Le domaine est la propriété de la commune de Coupvray. Vous pourrez vous y promener et flâner le long du bassin, contempler les ruines consolidées du château, admirer les communs, la bergerie écuries et le pigeonnier restauré. Il ne reste plus que des ruines du château des Rohan. Il a été construit, vers 1600, pour Hercule de Rohan. L'ancien château de Coupvray possède un parc boisé. Hercule de Rohan (1568  1654), habitait le château des Rohan. Il fut le compagnon du roi Henri IV. Les ruines du château de Coupvray sont inscrites aux M.H. depuis 1988. \nÉléments protégés MH : les communs et le pigeonnier : inscription par arrêté du 17 mai 1988.","architecture":"A 2 K.M au sud ouest  CHESSY  la construction du château de Chessy date du XVIIe siècle, est devenu le siège du Syndicat d'Agglomération Nouvelle, du Val d'Europe. Le Colombier, construit en 1600 dans les dépendances du château de Chessy.                                                                                 et à trois K.M plus à l'est CONDE st-Libaire La construction du château date du XVIIe au XVIIIe siècle. Le château de Condé-Sainte-Libiaire et sa verrerie installée en son sein, offre par sa proximité de Paris, et tout particulièrement de Disneyland Paris la possibilité d'organiser facilement votre événement. Des salons modulables pour s'adapter à toutes vos envies.  L'équipe du château de Condé-Sainte-Libiaire contribuera au succès de votre manifestation : Disponible pour vous assister et prendre en charge l'intégralité de l'organisation de votre événement et pour vous proposer : traiteur, animation, sonorisation, décoration, etc.                                                                                            A 3 K.M au nord LESCHES  les renseignements sur ce château sont rares. Datant probablement du XVIIIe siècle, le château comprend un corps de bâtiment central recouvert d'enduit blanc et deux ailes de communs, plus classiques, de part et d'autre d'une cour d'honneur. Un vaste jardin d'agrément inscrit à l'inventaire supplémentaire des monuments historiques, complète le domaine. Face au château, une courte perspective se prolonge jusqu'aux bois et marais longeant la Marne. Inscrit au pré-inventaire des jardins remarquables.","habitants":"Coupvray; la famille de Rohan                                     \"","divers":"quatre châteaux dans cet article; Coupvray, Chessy grav-3 et Condé                           ste Libiaire grav 1-2.                                      GPS : 48° 53' 20\" Nord, 2° 47' 44\" Est.                                                                    Chessy GPS : 48° 52' 33\" Nord, 2° 45' 53\" Est                                                  Lesches grav-4","gps":"48° 53' 20\" Nord, 2° 47' 44\" Est.","images":["../../jctruffet.com/image/image_77/77_Coupvray_1.jpg","../../jctruffet.com/image/image_77/77_Coupvray_2.jpg","../../jctruffet.com/image/image_77/77_Coupvray_3.jpg","../../jctruffet.com/image/image_77/77_Coupvray_4.jpg"]},"Consult_chateau_formulairec83f":{"id":"Consult_chateau_formulairec83f","dept":"77","canton":"Fontenay-Trésigny","commune":"Courquetaine","nom":"Courquetaine","type":"Château","periode":"XVI-XVII","histoire":"COURQUETAINE, le château a été construit vers 1610 pour la famille Maugiron, le corps central, après un incendie en 1844, Courquetaine fut reconstruit en 1850. Il fut érigé en marquisat en 1723 pour la famille de Vigny, dont descend le poète Alfred de Vigny, les Vigny furent propriétaire de la plus grande partie des terres de Courquetaine dès 1688 jusqu'en 1791, date à laquelle, émigrés pendant la Révolution, les biens furent vendus nationalement. Au XIXe siècle c'est Monsieur Hardon qui en était propriétaire, maire de la commune de Courquetaine en 1892, conseiller général du canton de Tournan en Brie.   Il date du XVI et XIXe siècle. Pendant la Révolution, une partie du château de Courquetaine fut brûlée et partiellement reconstruite en 1844. Mr Hardon, propriétaire du château de Courquetaine, maire de la commune pendant 18 ans, dès 1892, fut conseiller général du canton de Tournan-en-Brie, pendant 8 ans dont la fille épousa le Maréchal Pétain, en 1920.","architecture":"COURQUETAINE Le château de Courquetaine depuis est privé, fermé au Public. Il est inscrit partiellement aux M.H..  Éléments protégés MH : le château ; la cour d'honneur ; les pavillons d'entrée ; les douves et les ponts sur les douves : inscription par arrêté du 25 avril 1989.","habitants":"famille de Vigny\"","divers":"Courquetaine GPS : 48° 40' 38\" Nord, 2° 44' 41\" Est","gps":"48° 40' 38\" Nord, 2° 44' 41\" Est","images":["../../jctruffet.com/image/image_77/77_Courquetaine_1.jpg"]},"Consult_chateau_formulaire3ce4":{"id":"Consult_chateau_formulaire3ce4","dept":"77","canton":"Villeparisis","commune":"Courtry","nom":"Courtry","type":"Château","periode":"XVII","histoire":"COURTRY,   à l'origine le château médiéval dont l'ancienne chapelle seigneuriale rappelle l'importance appartenait aux vicomtes de Melun. En 1820, le château délabré fut acquis par le duc de Praslin et reconstruit avec des matériaux provenant du château de Saint Germain Laxis. Actuellement le château de Courtry appartient à trois familles qui continuent à le restaurer, location chambres d'hôtes.","architecture":"COURTRY  précédé d'une cour d'honneur régulière, entourée d'anciennes douves, il s'adosse à un corps de bâtiment d'origine médiévale, flanqué d'une tour d'angle avec tourelle d'escalier. La façade Nord-Ouest date du XVIIIe siècle, la façade Sud-Est date du XVIe siècle. Le château de Courtry est inscrit aux M.H. depuis 1946.   Le château de Courtry se situe à une heure au sud-est de Paris au coeur d'une riche région culturelle et naturelle. Pascal et Dagga vous accueillent dans leurs 3 chambres et table d'hôtes dans un cadre de charme verdoyant et calme. 3 chambres au 2ème étage, dont 2 accessibles par l'escalier à vis de la tour, toutes avec sanitaires privés : La grande chambre familiale avec mezzanine, la chambre orange confortable et cosy et la chambre ronde dans la tour avec grande baignoire dans la chambre.\nÉléments protégés MH : le château sauf aile Nord-Est ; la chapelle et le colombier : inscription par arrêté du 3 octobre 1946.","habitants":"le duc de Praslin \"","divers":"GPS : 48° 32' 32\" Nord, 2° 46' 05\" Est","gps":"48° 32' 32\" Nord, 2° 46' 05\" Est","images":["../../jctruffet.com/image/image_77/77_Courtry_1.jpg","../../jctruffet.com/image/image_77/77_Courtry_2.jpg"]},"Consult_chateau_formulaire3215-2":{"id":"Consult_chateau_formulaire3215-2","dept":"77","canton":"La Ferté-sous-Jouarre","commune":"Crouy-sur-Ourcq","nom":"Crouy_sur_Ourcq","type":"Châteaux","periode":"XV-XVI","histoire":"trois châteaux dans cet article de Crouy -sur-Ourcq ,Bellevue, Champivert et Gesvres.                                                                                                                    GESVRES le duc;  le château de Gesvres le duc fut la propriété de la famille Potier. Sept générations de cette famille ont régné pendant plus de deux siècles sur les terres de Crouy. Louis Potier fit construire à la fin du XVIe siècle un imposant château sur le territoire de Tresmes. Vers 1660 son fils René, premier duc de Gesvres fait reconstruire le château par Mansart. En 1641 Louis XIII, en remerciement pour bons services dans l'armée fit don, à la famille, d'un terrain à Paris situé au bord de Seine, à condition d'y faire un quai : le Quai de Gresvres. Lorsque la Révolution éclate la propriété est aux mains de Louis Joachim Paris, duc de Gesvres, en 1793 pour sauver sa tête, il se dépossède d'une partie de sa galerie d'environ 600 tableaux en son château de Gesvres, et ses titres de propriété vont être brûlés en place publique à Crouy, et sa tête tombe à Vincennes le 19 messidor an II, le château est vendu et démoli. En 1824 un autre château est construit, aujourd'hui en ruine, il subsiste une belle ferme datant du XVIIe siècle.\nSon architecte fut François Mansart.  Il ne reste aujourd'hui du château de Gesvres-le-Duc que le Pavillon d'entrée ainsi que les douves avec leurs ponts et le portail d'entrée avec sa grille.","architecture":"le château de CHAMPIVERT du XVIIe siècle classique de plan restangulaire  trois niveaux et série de lucarnes sur toits brisées deux pavillons  aux extremitées  à deux niveaux formant ailes en retour d'equerres, toits brisès.                                                               GUESVRES , Éléments protégés MH : le pavillon d'entrée subsistant : classement par arrêté du 24 septembre 1975. Les douves avec leurs ponts ; le portail d'entrée avec sa grille : inscription par arrêté du 24 septembre 1975.","habitants":"gesvres la famille Potier\"","divers":"Deux châteaux dans cet article Gesvres grav 3-4-5                                                   Champivert  grav 1-2                                      49° 05' 28? N, 3° 04' 10? E","gps":"","images":["../../jctruffet.com/image/image_77/77_Crouy_Ourcq_1.jpg","../../jctruffet.com/image/image_77/77_Crouy_Ourcq_2.jpg","../../jctruffet.com/image/image_77/77_Crouy_Ourcq_3.jpg","../../jctruffet.com/image/image_77/77_Crouy_Ourcq_4.jpg"]},"Consult_chateau_formulaire0abf":{"id":"Consult_chateau_formulaire0abf","dept":"77","canton":"La Ferté-sous-Jouarre","commune":"Crouy sur Ourcq","nom":"Crouy_sur_Ourcq_II","type":"Forteresse","periode":"XIII-XIV-XV","histoire":"deux  châteaux dans cet article; Bellevue, Houssoy.                                                                                                                              BELLEVUE. hôtel de ville, le décor est celui d'un parc forestier de 30 ha dans lequel se dresse le château de Bellevue. Il est facile de comprendre pourquoi il porte ce nom, lorsqu'on découvre qu'il surplombe, à perte de vue, la belle Vallée de l'Ourcq. Les grandes allées de hêtres et de marronniers ainsi que les multiples chemins et sentiers sont une véritable invitation à la promenade. Plus dissimulées, presque cachées, les deux grandes annexes du château, au cour du parc, vivent au rythme des grandes réceptions que sont les mariages, les baptêmes, les cocktails et les séminaires. Sur ses 270 m2, la plus grande salle, la salle Jupiter, lumineuse et spacieuse peut recevoir jusqu'à 200 personnes assises.","architecture":"HOUSSOY  C'est un ancien château fort. Il appartenait à la famille des Barres avec Olivier et Henri de Crouy en 1154, cette famille garda la seigneurie jusqu'en 1229 date  à laquelle elle  fut vendue  au frère du roi Philippe le Bel.  La construction du château date du XIVe et XVe siècle. Elle est classée par l'arrêté du 3/06/1932. en 1602  la famille de Cossé-Brissac devient propriétaire, en 1665 c'est le duc de Tresmes qui acheta le donjon.   Le château a été construit sur les bases d'une maison forte du XIe, du XIVe et XVe siècle. par le seigneur Robert de Sepoix. Assorti d'une ferme, comme d'usage au Moyen-Âge, il est dominé par un donjon carré assez rare à cette époque, érigé vers 1390. Dans la région, Septmonts, dans l'Aisne, et Vez, dans l'Oise, recèlent tout les deux un donjon carré de la même époque. Le donjon résiste à l'incendie et sert de pigeonnier pendant de nombreuses années avant d'être peu à peu abandonné. Il comprend cinq étages voûtés couronnés d'une galerie circulaire, il jouxte la ferme coiffée de mâchicoulis qui est aujourd'hui une propriété privée indépendante. C'est un ancien château fort. Elle est classée par l'arrêté du 3/06/1932. Le donjon et le grand mur pignon de l'ancien logis y compris les cheminées, qui y sont adossées, sont classés aux M.H. depuis 1962.  Éléments protégés MH : l'aile garnie de mâchicoulis s'étendant sur l'avenue de la Gare : inscription par arrêté du 3 juin 1932. Le donjon ; le grand mur pignon de l'ancien logis, y compris les cheminées qui y sont adossées : classement par arrêté du 12 octobre 1962.","habitants":"famille des Barres          famille de Cossé-Brissac\"","divers":"Deux châteaux dans cet article; Bellevue grav-1-2, Monticert, Houssoy grav-3-4-5-6-7                             Gresves le duc.  Gresves duc GPS : 49° 05' 23\" Nord, 3° 04' 30\" Est                                                   Houssoy   GPS : 49° 05' 28,68\" Nord, 3° 03' 51,12\" Est","gps":"49° 05' 23\" Nord, 3° 04' 30\" Est","images":["../../jctruffet.com/image/image_77/77_Crouy_sur_Ourcq_II_1.jpg","../../jctruffet.com/image/image_77/77_Crouy_sur_Ourcq_II_2.jpg","../../jctruffet.com/image/image_77/77_Crouy_sur_Ourcq_II_3.jpg","../../jctruffet.com/image/image_77/77_Crouy_sur_Ourcq_II_4.jpg","../../jctruffet.com/image/image_77/77_Crouy_sur_Ourcq_II_5.jpg","../../jctruffet.com/image/image_77/77_Crouy_sur_Ourcq_II_6.jpg","../../jctruffet.com/image/image_77/77_Crouy_sur_Ourcq_II_7.jpg"]},"Consult_chateau_formulaire1f31":{"id":"Consult_chateau_formulaire1f31","dept":"77","canton":"Saint-Fargeau-Ponthierry","commune":"Dammarie-Lès-Lys,","nom":"Dammarie_Lès_Lys","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article de Dammaris les lys; Bouillants, Vives-Eaux et Soubiran.                                                                                                                                                                  BOUILLANTS, est devenu un centre culturel municipal. Le Général Julien Loizillon est mort au château des Bouillants, est une ancienne maison de maître, comme on en construisait beaucoup à Dammarie-lès-Lys au siècle dernier, pour ces familles fortunées qui venaient sy détendre, non loin de Paris. Nommé également le château des Hauts-Bouillants et la Villa Kéranic, le château des Bouillants fut acheté par la ville en 1986. Restauré, il est devenu, depuis 1993, lespace municipal dexpositions. Cest ainsi quil accueille, chaque saison, des expositions touchant des domaines comme la Peinture, la Sculpture, la Photographie, mais aussi la Gravure, les Sciences et lHistoire.                                                                                                                           VIVES-EAUX,   construit par l'architecte Gondouin pour lui-même à la fin XVIIIe siècle, connu également pour la réalisation de la Faculté de Médecine à Paris. Il appartint par la suite à Thérèse Humbert mariée à Frédéric Humbert, préfet de Seine-et-Marne de 1885 à 1889. Peu connue du grand public, Thérèse Humbert née Daurignac fut à la source dun scandale financier. Menée par cette devise \"Je veux, jaurai\", elle a réussi à se hisser au sommet de la hiérarchie sociale, pendant vingt ans, elle vécut de mensonges et de manipulations, protégée par son mariage avec une famille politique puissante, jusquà ce que la vérité éclate enfin. Elle entraîna dans sa faillite le suicide de plusieurs de ses créanciers et la démission du président de la République. De 2001 à 2008, le château abritait les candidats de l'émission télévisée Star'Ac qui aurait laissé les lieux dans un état lamentable, selon l'actuel et l'ancien propriétaires, François Dussault qui ne décolère pas. En effet, la production de la Star Ac a saccagé le château des Vives Eaux, c'était ignoble, constats d'huissier à l'appui; murs tagués, vitres cassées, parquets défoncés et pourris par l'humidité, moulures détruites; cet article a été publié dans la rubrique Dammarie-les-Lys.","architecture":"LES LYS, l'abbbaye avait été fondée en l'honneur de notre dame,  par la reine blanche de castille en 1244, Supprimé à la Révolution   le château actuel en chambres d'hotes.                                                                                                    SOUBIRAN. Le château de Soubiran, proche de la Forêt de Fontainebleau, date du XIXe siècle et est entouré dun parc denviron 7 hectares. Après lassassinat du Président de la République (IIIe République) Sadi Carnot, sa fille, traumatisée, est restée au château de Soubiran, quelques mois, chez les Soubiran.  Doté dune source alimentant un plan deau, accueille une ferme enfantine, où lon peut observer de nombreux animaux. On peut pique-niquer et pratiquer un parcours de santé, au château . Il existe plusieurs chateaux sur la commune de Dammartin-les-Lys à découvrir : le Château de Mun,  et le Manoir de la Croix Saint-Jacques. Le Château Saint-Ange est un château bâti à Dammarie-les-Lys.","habitants":"Thérèse Humbert née Daurignac \"","divers":"Deux châteaux dans cet artticle; Bouillants, Lys Grav 3-4 , fortoiseau grav-5   Vives-Eaux et Soubiran.                                           bel-ombres 48° 30' 51 Nord, 2° 38' 06 Est\nBouillants  GPS : 48° 30' 51\" Nord, 2° 38' 06\" Est                                              soubiran grav 1 GPS : 48° 30' 51\" Nord, 2° 38' 06\" Est                                          Vives eaux  grav-2 GPS : 48° 30' 47\" Nord, 2° 36' 15,5\" Est                                                  St Ange , GPS : 48° 30' 51\" Nord, 2° 38' 06\" Est                                                                                                    Breau- GPS : 48° 30' 17\" Nord, 2° 35' 00\" Est                                                 GPS : 48° 33' 38\" Nord, 2° 52' 39,31\" Est","gps":"48° 30' 51\" Nord, 2° 38' 06\" Est","images":["../../jctruffet.com/image/image_77/77_Dammarie_L%c3%a8s_Lys_1.jpg","../../jctruffet.com/image/image_77/77_Dammarie_L%c3%a8s_Lys_2.jpg","../../jctruffet.com/image/image_77/77_Dammarie_L%c3%a8s_Lys_3.jpg","../../jctruffet.com/image/image_77/77_Dammarie_L%c3%a8s_Lys_4.jpg"]},"Consult_chateau_formulaire05a3":{"id":"Consult_chateau_formulaire05a3","dept":"77","canton":"Nangis","commune":"Le Châtelet-en-Brie","nom":"Des_Dames","type":"château","periode":"XIV","histoire":"Des DAMES   le château des Dames a été restauré au XIXe siècle, tient son nom des religieuses de labbaye royale Saint-Louis de Poissy, détentrices de la seigneurie des terres du Châtelet du XIVe siècle à la Révolution. Le château des Dames se situé le long du chemin menant à Melun. Il protégeait lentrée Sud-Ouest du village, le château de Robillard exerçant cette même fonction au nord-est. C'était une ferme fortifiée organisée autour dune cour carrée et entourée de fossés en eau. Trois tours circulaires sélevaient aux angles. La seigneurie est restée la propriété des Dames de Poissy, jusquen 1791, date à laquelle le domaine est vendu comme bien national. Polycarpe Maclou Poussié entreprit la rénovation complète du domaine du château des Dames entre 1877 et 1885. Il commande, à larchitecte Pierre-Victor Cuvillier. En 1998, la commune du Châtelet-en-Brie devint propriétaire du château des Dames, de la ferme et de son parc, pour valoriser un édifice patrimonial, fort en termes didentité, et dy installer des équipements culturels. Cette démarche est soutenue, dans le même temps, par la création, au Châtelet-en-Brie, dune ZPPAUP (Zone de Protection du Patrimoine Urbain Architectural et Paysager). Le château de Châtelet-en-Brie a été transformé en Centre Culturel.","architecture":"Des DAMES   le premier château fut bâti au XIVe siècle, entre 1314 et 1384. Au départ, c'était une maison-forte assurant la protection de ses hôtes. Les terres restèrent dans le domaine royal jusqu'en 1384 c'est seulement en cette année qu'elles furent données aux religieuses. La demeure appelée jusqu'alors Le Châtelet commença à être appelé château des Dames. Il rejoint ainsi lample mouvement de construction du XIXe siècle lié à la bourgeoisie industrielle, administrative ou financière. Côté cour, la façade du bâtiment principal, tournée vers la ferme, est traitée avec simplicité. En revanche, la façade sur parc, exposée au regard des visiteurs, présente un ordonnancement très soigné, rythmé par de nombreuses ouvertures. La variété des ouvertures, les balcons et loggias permettant de faire entrer la lumière et de profiter de la vue sur le parc, sont caractéristiques des demeures de plaisance du XIXe siècle. Les Dames de Poissy étaient représentées au Châtelet par leur prévot qui était chargé de la justice, les bonnes dames en bénéficièrent jusqu'à la Révolution. En 1789 le château et sa ferme furent vendus comme biens nationaux. En 1861 M. Polycarpe Maclou Poussié, notaire, fit l'acquisition du château en ruine. De 1861 à 1885, avec l'aide de l'architecte M. Cuvillier, il transforma l'ensemble, et construisit le château que l'on peut voir aujourd'hui. En 1911, Odette Poussié, petite-fille de Polycarpe Maclou, épouse Jean Jacques Dollfus. Ils deviendront par héritage les propriétaires du château. En 1998, la commune du Châtelet en Brie se porte acquéreur du château.","habitants":"Polycarpe Maclou Poussié \"","divers":"Des Dames                                                    GPS : 48° 30' 19\" Nord, 2° 47' 36\" Est","gps":"48° 30' 19\" Nord, 2° 47' 36\" Est","images":["../../jctruffet.com/image/image_77/77_Des_Dames_1.jpg"]},"Consult_chateau_formulaired74a":{"id":"Consult_chateau_formulaired74a","dept":"77","canton":"Nemours","commune":"Diant","nom":"Diant","type":"Châteaux","periode":"XII-XVII","histoire":"DIANT, la construction de ce manoir féodal remonte au Xe siècle. Installé sur les bords de l'Orvanne, le château fort de Diant est un ancien manoir féodal. Louis IX et la reine Blanche de Castille y séjournèrent à plusieurs reprises. Les terres environnantes portent encore, au cadastre, les noms caractéristiques de terres de la Quesonne ou Couronne. Milon Crochu et Pierre de Voulx semblent en avoir été les premiers seigneurs, avec Geoffroy de Diant. Apparaît ensuite la famille des Barres dont Guillaume premier du nom, qui était déjà seigneur dEgreville à la fin du XIIe siècle et à qui la seigneurie de Diant fut octroyée en récompense des grands services rendus au roi, par son courage et sa fidélité. Jean des Barres (1210) Pierre des Barres qui affranchit les serfs de son domaine, en 1247 (acte ratifié en 1269 par le comte Thibault de Champagne)  Charles des Barres, dont la fille Marguerite épousa le Seigneur de Milly, Hugues de Bouville. Après la mort de Charles des Barres, en 1282, la terre de Diant avait été vendue ou donnée à un Conseiller du roi, François Chanteprime dont la petite fille porta la Seigneurie de Diant en mariage à un Receveur des Finances, Etienne de Bonnay. La fille unique de celui-ci  Guillaumette épousa Guillaume dAllégrain. Cette illustre famille, les Allégrain, conserva pendant plus de 350 ans la seigneurie de Dian, quelle fit beaucoup agrandir. Robert dAllégrain, jacques et Louis étaient seigneurs de Blennes, de Voulx et de Diant. François dAllégrain était Conseiller au Parlement de Paris. Jacques dAllégrain fit ériger la terre en Vicomté. Son fils, Louis vicomte de Diant chassé de son château par suite dun bail judiciaire qui en attribuait la jouissance à pierre Satin, bourgeois de Paris a soutenu en 1713 un siège de quelques jours contre les soldats du roi qui venaient lexpulser, mais son fils, qui sappelait également Louis, renonça à la succession.","architecture":"DIANT  Après un accord, il revint à Dian où, un an après, comme son père, il soutint un nouveau siège. Il fut arrêté en 1717 et envoyé à la Conciergerie. Son épouse, Marguerite de Saint Aubin, se retira à Voulx. Le 29/07/1717, le Domaine de Diant fut adjugé à Pierre de Chamousset, Maître de comptes. Après sa mort en 1742, ses héritiers céderont cle domaine à René Cordier de Launay, propriétaire aussi du Comté de Vallery, les terres de Blennes, de Boismillet, de Voul et de Villethierry. Claude René de Montreuil, son héritier et dont la fille épousa le fameux Marquis de Sade, ne conserva que les terres de Blennes-et-Valery et, Diant ira, en 1175, à son beau-frère, le Comte de Toulongeon, Brigadier des Armées du Roi. Enfin, le château de Diant et le domaine, échurent au Baron Dijols de Mondot, dont la famille était originaire du Rouergue et du Limousin. Le Château de Diant a soutenu de nouveaux sièges en 1594, sous Henri IV et, à nouveau, en 1714, sous le règne de Louis XIV. Les douves remplies deau de l'Orvanne) font 20 à 30 mètres de large. Il ne reste plus que 5 tours (dont lune fut très endommagée ainsi que le château actuel, par les bombardements aériens en juin 1940) et les deux tiers de lenceinte. Le château de Diant a été inscrit aux M.H. en 1946 et 1989.","habitants":"famille, les Allégrain\"","divers":"Diant_GPS : 48° 16' 45\" Nord, 2° 59' 42\" Est","gps":"48° 16' 45\" Nord, 2° 59' 42\" Est","images":["../../jctruffet.com/image/image_77/77_Diant_1.jpg","../../jctruffet.com/image/image_77/77_Diant_2.jpg","../../jctruffet.com/image/image_77/77_Diant_3.jpg","../../jctruffet.com/image/image_77/77_Diant_4.jpg"]},"Consult_chateau_formulaire922f":{"id":"Consult_chateau_formulaire922f","dept":"77","canton":"Nemours","commune":"Egreville","nom":"Egreville","type":"Château","periode":"XV-XVIII","histoire":"EGREVILLE, jean d'Egreville  grand bailly de Sens et d'Auxerre au XVe siècle son fils également prénomé Jean  est fait chevalier  par la suite capitaine de  Montargis et chambellan du roi, son frère Edmond capitaine de cinquante lances meurt au combat en 1523 . Marguerite d'Egreville veuve vend le domaine à Annes de Pisseleu  duchesse d'Etampes, maitresse de François 1er. Agrandi une première fois à la demande de Jean II d'Egreville, il sera reconstruit, au XVIe siècle. Le château d'Egreville fut embelli, au XVIIe siècle, par les maréchaux de La Châtre, qui firent rajouter des jardins, une cour d'honneur, recreuser les fossés et entourer la propriété de hauts murs. le château se transmet au Pot de Rodhes, puis à la famille de l'Hôpital duc de Vitry. En 1694 échoit à son mari  Philibert de Torcy maréchal de camps et armés du roi  qui se remarie avec  Genevière de Rouault de Gamaches, le frère de cette dernière  Jean Joachim marquis de Gamaches hérite en 1724.  Le château d'Egreville deviendra à la famille Lamy originaire de château Landon, ensuite  la résidence d'Étienne-Prosper Berne-Bellecour, en 1899, artiste peintre, puis celle de Jules Massenet, compositeur de musique. Le château d'Egreville possède un parc de 5 hectares (ISMH) toujours dans la descendance des Massenet.","architecture":"EGREVILLE, château reconstruit au XVIe siècle sur l'emplacement d'un édifice médiéval. Remanié aux XVIIe et XVIIIe siècles. Pendant la Révolution, le domaine est vendu comme bien national et en partie incendié (subsistent l'aile nord et une tour). A la fin du XIXe siècle, le peintre Berne Bellecour, puis le musicien Jules Massenet y réalisent d'importants travaux. Sa construction date de 1530, sur une ancienne base féodale dont la cave date de 1000 ans.  Éléments protégés MH : le château et le bâtiment dit les Champarts, dans les communs : inscription par arrêté du 28 mai 1926. Les douves, les terrasses, les murs de clôture et les vestiges de l'ancien château : inscription par arrêté du 9 décembre 2002.","habitants":"Anne de Pisseleu Duchesse dÉtampe\"","divers":"Egreville   GPS : 48° 10' 28\" Nord, 2° 52' 07\" Est","gps":"48° 10' 28\" Nord, 2° 52' 07\" Est","images":["../../jctruffet.com/image/image_77/77_Egreville_1.jpg","../../jctruffet.com/image/image_77/77_Egreville_2.jpg"]},"Consult_chateau_formulairedc44":{"id":"Consult_chateau_formulairedc44","dept":"77","canton":"Montereau-Fault-Yonne","commune":"Esmans","nom":"Esmans","type":"Château","periode":"XIII","histoire":"ESMANS existait à la période gallo-romaine comme en témoigne la présence d'un aqueduc souterrain. Louis IX (saint Louis) y passa le 26 août 1255. Construit au XIIIe siècle, cet édifice massif en forme de parallélogramme possédait une grosse tour à chaque angle, il en reste une qui fait office de colombier. Le château d'Esmans fut transformé en exploitation agricole lorsque le démantèlement des châteaux forts seigneuriaux fut prescrit par Richelieu en 1626.","architecture":"ESMANS il est devenu une ferme en 1660. Lors de sa construction, le château est une forteresse massive en forme de parallélogramme flanqué de quatre tours en saillie aux angles. Deux tours défendent l'unique et étroite entrée, précédée d'un pont jeté sur le fossé rempli d'eau. Sous le château des souterrains bouchés aujourdhui partaient dans toutes les directions. Des chemins couverts conduisaient de lintérieur du château à chacune des quatre tours; l'épaisseur des murs varie de 1 mètre 50 à 2 mètres. Cet ensemble érigé en fief militaire, était gardé par un commandant. En cas d'alarme, les habitants se réfugiaient au château d'Esmans. Du château féodal, il subsiste les douves, le pont à deux arches qui a remplacé le pont-levis, la poterne, ainsi que deux tours : l'une en partie rasée et l'autre encore élevée ou se trouve le colombier. Le château d'Esmans est privé et ne se visite qu'aux 2 Journées du Patrimoine\nÉléments protégés MH : les façades et les toitures du château ; les douves et le pont : inscription par arrêté du 27 septembre 1946.","habitants":"Seigneur local\"","divers":"GPS : 48° 20' 57\" Nord, 2° 58' 37\" Est","gps":"48° 20' 57\" Nord, 2° 58' 37\" Est","images":["../../jctruffet.com/image/image_77/77_Esmans_1.jpg"]},"Consult_chateau_formulaire8c8b":{"id":"Consult_chateau_formulaire8c8b","dept":"77","canton":"Esternay","commune":"Esternay","nom":"Esternay_77","type":"Châteaux","periode":"XV","histoire":"ESTERNAY Au XVe siècle, sa localisation apparaît comme une faiblesse contre les attaques extérieures. Les propriétaires de lépoque, les frères Raguier, décident de construire un nouveau château. Ils choisissent son nouvel emplacement sur le coteau Nord-Est dEsternay. Situé à proximité du bois de larmée, ce dernier lui donne son nom, le château de lArmée. Les frères Raguier étant proches du Roi qui était François Ier, ils bénéficient de ses artisans qui viennent travailler au château. Ils lui donnent une nouvelle allure, bannissant toute influence gothique. Son rôle premier reste la défense des habitants de la région et de la capitale par sa place stratégique. En effet, les envahisseurs arrivent habituellement par lEst du pays. La construction du château-neuf sachève en 1525. En 1555, Jean, fils de Louis Raguier devient seul propriétaire du château. Au cours des siècles, le château est la propriété de différentes familles. Il est le théâtre de certains conflits. Pendant la Révolution Française en 1789, le château est pillé. Le propriétaire de lépoque, le Baron dAurillac, est absent car il est ambassadeur en Angleterre. Il nest donc pas en France au moment de lévénement. Mais le château dEsternay ne devient pas pour autant un bien public, le Baron dAurillac nétant pas considéré comme un émigré. Il le retrouve tout de même en mauvais état en 1797.","architecture":"ESTERNAY Plus tard, en 1814, le château héberge Napoléon pour une nuit avant une bataille contre les Prussiens.Un siècle plus tard, , les Allemands occupent le château au début de la grande guerre. Cependant, larmée française le reprend lors dune bataille le 6 septembre de la même année. Il devient le quartier général du maréchal Franchet dEspérey, et sert dhôpital.","habitants":"Jean, fils de Louis Raguier\"","divers":"Esternay","gps":"","images":["../../jctruffet.com/image/image_77/77_Esternay_77_1.jpg"]},"Consult_chateau_formulaire58ad":{"id":"Consult_chateau_formulaire58ad","dept":"77","canton":"Nemours","commune":"Fay les Nemours","nom":"Fay_les_Nemours","type":"Château","periode":"XV-XVII","histoire":"Deux châteaux dans cet article de Fay les Nemours et Chatenoy.                    FAY LES NEMOURS L'origine du château remonte dès la plus haute antiquité. Le château est reconstruit au XVe siècle par les Barton de Montbas. Le domaine devient la propriété des Rougé de Plessis Bellière jusquà la Révolution où il sera vendu comme bien national. Le corps principal: logement du seigneur, salon, salle à manger bureau et chambre, a été détruit peu de temps après la révolution. Quant à l'aile sud, qui abritait une grande \"galerie\" construite à la demande de Henri-François de Rougé en 1678, elle était en ruine en 1806. Occupés par l'armée allemande qui y avaient installés la \"Komandantür\", l'état des bâtiments restant s'est peu à peu détérioré. Aujourd'hui, il n'existe plus que l'aile nord de l'édifice. C'est celle qui correspondait aux appartements de l'intendant du château et une partie des écuries. Du beau parc, il ne reste plus que les contours et le fantôme de quelques allées. Des quatre tours d'angle il n'en reste plus qu'une au nord-ouest.\nA cinq K.M. a  gauche  CHATENOY, il est inscrit aux M.H. depuis 1926. Il aurait appartenu à Du Guesclin. Il est fait mention d'une transaction en 1364, par l'intermédiaire de Adam Nicolas, bourgeois de Nemours, avec Du Guesclin pour solde de cession de ses châteaux de Ferrières-en-Gâtinais et de Châtenoy. Le 6 mai 1575, trois ans après la Saint Barthélemy, fut signé dans ce village, « la paix de Monsieur ». Le château de Châtenoy fut la propriété de Du Guesclin, puis François de Cullant, Picot comte de Dampierre, la famille Nicolaï et la famille Thierry. Ce château fut en partie détruit lors de la Révolution, il en reste aujourd'hui des éléments. De ce château partaient trois souterrains en direction de Larchant Nemours et Faÿ ; malheureusement leurs départs semblent avoir été comblés. Il n'est pas inscrit aux monuments protégés.","architecture":"FAY LES NEMOURS  Il date du XVIIe siècle. Il est situé à 20 kms de Fontainebleau. Le château de Fäy-les-Nemours a été édifié, de 1654 à 1678,  sur les vestiges dun ancien château datant du XVe siècle, dont sont issues les douves sèches qui entourent le château et les 2 ponts qui les franchissant. Le château de Fäy-les-Nemours a été inscrit, partiellement, aux M.H. depuis le 29/01/1991, pur son terre-plein central, à l'exclusion du bâtiment principal, de ses douves, ses ponts et son pigeonnier. Le château de Fäy-les-Nemours est privé, fermé au Public. \nÉléments protégés MH : le terre-plein central (à l'exclusion du bâtiment principal) ; les douves ; les ponts ; le pigeonnier: inscription par arrêté du 29 janvier 1991.","habitants":"Famille Rougé de Plessis-Bellière\"","divers":"Deux châteaux dans cet article de Fay les Nemours grav-3-4 -5                   et Chatenoy grav-1-2.       GPS : 48° 13' 55\" Nord, 2° 40' 28\" Est                                                                 Chatenoy  GPS : 46° 47' 23\" Nord, 4° 54' 47\" Est","gps":"48° 13' 55\" Nord, 2° 40' 28\" Est","images":["../../jctruffet.com/image/image_77/77_Fay_les_Nemours_1.jpg","../../jctruffet.com/image/image_77/77_Fay_les_Nemours_2.jpg","../../jctruffet.com/image/image_77/77_Fay_les_Nemours_3.jpg","../../jctruffet.com/image/image_77/77_Fay_les_Nemours_4.jpg","../../jctruffet.com/image/image_77/77_Fay_les_Nemours_5.jpg"]},"Consult_chateau_formulaire78ef":{"id":"Consult_chateau_formulaire78ef","dept":"77","canton":"Torcy","commune":"Marne la vallée","nom":"Ferrière_77","type":"Château","periode":"XVIII-XIX","histoire":"FERRIERE, appartenait aux descendants de Fouché, duc d'Otrante, racheté par James de Rothschild en 1829. Construit de 1855 à 1859, le château est un vaste quadrilatère, haut de deux étages, surélevé sur un soubassement à usage de vestiaires et de services, et flanqué aux angles de tours carrées. Le style est celui de la Renaissance Italienne, telle quon la concevait au milieu du siècle dernier. Le rez-de-Chaussée, consacré dans sa majeure partie aux pièces de réception, et létage où sont disposées les chambres, prennent vue sur les magnifiques perspectives dun parc à langlaise. La lumière est partout répandue, même dans le hall central qui bénéficie dun éclairage zénithal. Larchitecte de Ferrières fut langlais Joseph Paxton. Il accomplit même à cette intention un voyage en Italie, à Venise, en compagnie de lépouse de son richissime client, la Baronne Bettina ou Betty, une beauté brune dont Ingres fit un portrait célèbre, et que Heine a chantée dans ses vers sous le nom de \"lAnge\". Le château reçut des visites mémorables, dont celle, particulièrement fastueuse, de Napoléon III en 1862, et la rencontre, bien moins glorieuse, au soir du 19 septembre 1870, de Bismarck et de Jules Favre, le Ministre des Affaires Etrangères de la toute jeune république française, née du désastre de Sedan. La conversation, connue dans lHistoire sous le nom dEntrevue de Ferrières, naboutit pas.  Après la Libération, en 1945, a la famille Rothschild a prêté une grande partie de ces châteaux. Le château demeura inhabité jusquen 1959. Sa remise en état est luvre du Baron Guy de Rothschild et de sa femme Marie-Hélène. Après la Libération, le château de Ferrières-en-Brie, inhabité jusqu'en 1959, fut légué en 1975 à la chancellerie des Universités de Paris par le Baron Guy de Rothschild et son épouse Marie-Hélène une fondation portant le nom de ses donateurs fait désormais partie du château, qui abrite également un Centre dÉtudes et de recueillement intellectuel, ainsi quun lieu de rencontres universitaires et de colloques consacrés aux actualités scientifiques, artistiques et littéraires. La chancellerie envisage dans les années 2000 d'aliéner, entre autres biens, le domaine de Ferrières. Le château est finalement rétrocédé en 2012 aux ayants droit des donataires qui choisissent de rétrocéder, à leur tour, le bien à la commune de Ferrières-en-Brie.","architecture":"FERRIERE Dès Juillet 2013, le Château de Ferrières-en-Brie fut confié à une société privée, pour y créer l'Ecole Ferrières qui ouvrit ses portes, en octobre 2015, dans le château. Elle est organisée autour de 3 pôles : LA Gastronomie, l'Hôtellerie et le Luxe. Ce projet est porté par Khalil Khater, Président du groupe Accelis, qui s'est entouré de personnalités du secteur. L'Ecole Ferrières prépare des diplômes de Bachelor et Mastère. Jean-Robert Pitte, ancien président de l'Université Paris-Sorbonne (Paris IV), en est le Président d'honneur. Le Baron, nom du Restaurant Gastronomique, a ouvert au sein même du château de Ferrières. Les cuisines sont dirigées par le chef Patrick Juhel, classé Meilleur Ouvrier de France en 2000. Un restaurant bistronomique, appelé Le Chai, a été créé juste à côté du château, dans le domaine, en novembre 2015.   Éléments protégés MH : les parties bâties et non bâties du domaine: classement par arrêté du 26 septembre 2000, modifié par arrêté du 3 juillet 2003.                                                                                                     La GUETTE   Bâti en meulières, à lexception des douves sèches et des bases qui sont de la fin du XIIe siècle, ce château appartient à Dreux la Guette, valet de chambre du roi Philippe le Bel en 1307, puis à Jean Davy, frère du cardinal du Perrin, lui succède. En 1626, le fief appartient à monsieur Bonit François Broc, président aux requêtes. En 1723, Pierre Martin est qualifié de seigneur de la Guette. Au XIXe siècle, le château appartient aux comtes de Sémellé. Depuis le début du XXe, il est la propriété des Rothschild de Ferrières. Pendant loccupation allemande, en 1943, il abritera des enfants juifs, souvent orphelins. Actuellement, il est aménagé en 32 logements sociaux.","habitants":"Famille de James de Rothschild \"","divers":"Ferrière   GPS : 48° 49' 11\" Nord, 2° 42' 44\" Est       Galaise grav-5                               La Guette grav-6                                               Perreuse grav-8                                            Vauteuil grav-7","gps":"48° 49' 11\" Nord, 2° 42' 44\" Est       Galaise grav-5","images":["../../jctruffet.com/image/image_77/77_Ferri%c3%a8re_77_1.jpg","../../jctruffet.com/image/image_77/77_Ferri%c3%a8re_77_2.jpg","../../jctruffet.com/image/image_77/77_Ferri%c3%a8re_77_3.jpg","../../jctruffet.com/image/image_77/77_Ferri%c3%a8re_77_4.jpg","../../jctruffet.com/image/image_77/77_Ferri%c3%a8re_77_5.jpg","../../jctruffet.com/image/image_77/77_Ferri%c3%a8re_77_6.jpg"]},"Consult_chateau_formulaire3a5a":{"id":"Consult_chateau_formulaire3a5a","dept":"77","canton":"La Ferté-sous-Jouarre","commune":"La Ferté sous Jouares","nom":"Ferté_sous_Jouarre","type":"Châteaux","periode":"XIV-XVI","histoire":"Quatre  châteaux dans cet article; Nolongue, Bréau, Lagny  et Jouarre.                                                                                                                          NOLONGUE, La construction de Nolongue remontet à la première moitié du XIVe siècle. Cette ferme est la seule de la région à avoir supporté le poids de la guerre de Cent Ans, conservant aujourd'hui encore son ancien logis, visible sur la façade sud des bâtiments. Le premier seigneur est Louis de Botheron et jean de Brie.  A l'origine, c'était une construction fortifiée, entourée de douves, à l'intérieur de laquelle on pénétrait par un pont-levis. Un manuscrit de 1544 nous livre d'ailleurs une excellente description de l'état du domaine d'alors. Penser Nolongue, c'est aussi évoquer la mémoire de Jehan de Brie, qui y fut gardien de pourceaux à partir de 1357. Par la suite, auteur d'un traité de bergerie, intitulé le \"Bon Berger\", il entra dans les faveurs du roi Charles V qui en fit son secrétaire particulier. Eléments protégés MH : le pavillon d'entrée et les deux tourelles d'angle : inscription par arrêté du 9 décembre 1937. Mme Claire-Marie Charpentier, gîte de la tour blanche.                                                                                                       PERREUSE  La construction du château de Perreuse et son domaine datent du XVIe siècle : Durant la première bataille de la Marne, le château de Perreuse fut mis à disposition de l'état-major allié et, devint l'un des plus grands hôpital militaires de la région. Par la suite, Le château de Perreuse devint un centre de repos puis une maison d'accueil et de traitement. Létang du château de Perreuse a été creusé par les premiers Moines Bénédictins, il y a plus d'un millénaire.","architecture":"JOUARRE  l'hotel de Ville est un des bâtiments les plus remarquables de La Ferté-sous-Jouarre. Sa construction date de 1885. Il est d'architecture néo-gothique. Il fut érigé à la place du « Grand Dauphin Couronné », une auberge du XVIe siècle, transformée en une Mairie, en 1762, sous l'égide de Simon Gueuvin, alors maire de la ville et meulier. Un programme de concours architectural fut élaboré. Il prévoyait chaque détail de la construction, depuis les matériaux (dont naturellement la pierre meulière pour les fondations) jusqu'aux poignées des fenêtres. Ainsi était-il précisé que les briques plates devaient provenir de la région de Reuil-en-Brie. Treize candidats présentèrent leurs projets. C'est celui de l'architecte Paul Héneux qui fut retenu. Pour la réalisation du projet, il s'entoura des meilleurs artistes de l'époque : Bourgeois, Glaize, Deshayes, Desbois Aujourd'hui, le bâtiment qui s'élève au cur de la ville tient lieu de lien historique, entre le patrimoine d'antan qui n'a pas résisté aux guerres successives et aux bouleversements des modes de vie, et le patrimoine contemporain propre au paisible de l'âme fertoise pour celui qui sait flâner.                                                                                                             BREAU la construction du château de Bréau date du XIXe siècle. Il est en ruine. Il possède un jardin irrégulier, en pente, composé d'une prairie ornementale, d'un arbre isolé et de massif d'arbres. Un Jardin d'agrément dit le Parc , est devenu un site d'acrobranche.Il ne reste que le Pavillon du jardinier.","habitants":"Nolongue Jehan de Brie\"","divers":"quatre châteaux dans cet article; Breau grav-5 Bondons grav-6                                              condè grav 2   Lagny grav - 3-4 Nolongue, l'ile et Jouarre.  Nolongue grav-8                          Galaise grav-5   GPS :48° 56' 37\" Nord, 3° 07' 45\" Est               Perreuse grav-9 GPS : 48° 55' 38\" Nord, 3° 07' 51\" Est","gps":"48° 56' 37\" Nord, 3° 07' 45\" Est               Perreuse grav","images":["../../jctruffet.com/image/image_77/77_Fert%c3%a9_sous_Jouarre_1.jpg","../../jctruffet.com/image/image_77/77_Fert%c3%a9_sous_Jouarre_2.jpg","../../jctruffet.com/image/image_77/77_Fert%c3%a9_sous_Jouarre_3.jpg","../../jctruffet.com/image/image_77/77_Fert%c3%a9_sous_Jouarre_4.jpg","../../jctruffet.com/image/image_77/77_Fert%c3%a9_sous_Jouarre_5.jpg","../../jctruffet.com/image/image_77/77_Fert%c3%a9_sous_Jouarre_6.jpg","../../jctruffet.com/image/image_77/77_Fert%c3%a9_sous_Jouarre_7.jpg","../../jctruffet.com/image/image_77/77_Fert%c3%a9_sous_Jouarre_8.jpg","../../jctruffet.com/image/image_77/77_Fert%c3%a9_sous_Jouarre_9.jpg"]},"Consult_chateau_formulaireacfb":{"id":"Consult_chateau_formulaireacfb","dept":"77","canton":"Fontainebleau","commune":"Fleury en Bière","nom":"Fleury_en_Bière","type":"palais","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article, Fleury et Cely                                                   FLEURY en BIERE,  En 1550, Cosme Clausse, secrétaire d'État d'Henri II, acquiert les seigneuries de Courances et de Fleury. Il choisit immédiatement de reconstruire l'ancien château et charge le maitre maçon Gilles le Breton de réaliser deux corps d'habitation en équerre. Le premier correspond aux trois cinquièmes du château actuel. L'aile nord date de 1553, avec deux galeries superposées rejoignant une ancienne tour d'angle carrée. Pierre Lescot, architecte du Louvre, intervient dans la direction du chantier à partir de 1553. Il est le concepteur de l'ordonnancement de la majestueuse avant-cour, \"reconnue la plus belle et parmi les plus grandes possédées par un gentilhomme\". En 1769, le parc est réaménagé par Chaussard. En 1641, Jérôme d'Argouges nouveau propriétaire, entreprend la modernisation et l'achèvement du château. Le corps de logis principal est doublé, surélevé d'un attique et flanqué d'une nouvelle tour circulaire à l'angle sud-ouest. Entre 1910 et 1914, le château est remanié par l'architecte Rahir pour la comtesse de Béhague.\nÉléments protégés MH : le château et le parc qui l'entoure: classement par arrêté du 17 décembre 1947. Les façades et les toitures des communs : classement par arrêté du 5 octobre 1951. Le château de Fleury-en-Bière entre 1910 et 1914. appartient, actuellement, à la Famille de Ganay, il sera ensuite transmis, par héritage, à la Famille de Ganay. Le parc a été réaménagé par Jean-Baptiste Chaussard en 1769. Le château de Fleury-en-Bière est classé aux M.H. le 17/12/1947 et le 5/10/1951","architecture":"A deux K.M au nord  CELY, outre un somptueux domaine de 55 hectares où se mêlent avec intelligence ruisseaux, cascades, jeux deau et parterres de fleurs, le site sarticule autour dun magnifique château remontant au XIVe siècle. Construit sur linitiative de Jacques Cur, grand argentier de Charles VII, l'édifice, aux tourelles de pierres de taille et toits dardoise, règne au milieu de douves et dun plan deau où évoluent avec élégance cygnes blancs et grues cendrées. Transformés, rénovés au fil des siècles, le château et son parc forment un tableau enchanteur où lon retrouve le romantisme des peintres de Barbizon. Le Cély Golf Country Club recèle charmes et saveurs qui en font lun des plus beaux dIle de France. Cadre enchanteur et romantique pour garantir la réussite de vos événements privés et professionnels","habitants":"cardinal de richelieu et pierre lescot\"","divers":"Deux châteaux dans cet article, Fleury  Grav-2 et Cely grav-1                                                        GPS : 48° 26' 45\" Nord, 2° 32' 53\" Est                                                                     Cely GPS : 48° 27' 36\" Nord, 2° 31' 57\" Est","gps":"48° 26' 45\" Nord, 2° 32' 53\" Est","images":["../../jctruffet.com/image/image_77/77_Fleury_en_Bi%c3%a8re_1.jpg","../../jctruffet.com/image/image_77/77_Fleury_en_Bi%c3%a8re_2.jpg"]},"Consult_chateau_formulaire37fb-2":{"id":"Consult_chateau_formulaire37fb-2","dept":"77","canton":"Fontainebleau","commune":"Fontainebleau","nom":"Fontainebleau","type":"palais","periode":"XIII-XIV","histoire":"FONTAINEBLEAU, a été la demeure des souverains de la France depuis François Ier jusqu'à Napoléon III. Plusieurs rois ont laissé leur empreinte dans la construction et l'histoire du château. Depuis 1981, il est avec son parc sur la liste du patrimoine mondial de l'Unesco. Un château fort est mentionné a cet emplacement pour la première fois en 1137 et agrandi par Saint Louis (1214-1270). François Ier décide de faire édifier un château de style Renaissance. Il fait raser la précédente construction à l'exception du donjon, dans la cour Ovale, et fait appel à des artistes italiens pour la construction et la décoration de son palais. François Ier vient chasser à Fontainebleau, accompagné par sa cour et sa favorite, la duchesse d'Étampes. Le roi souhaite faire de ce château un foyer de l'art de la Renaissance: ainsi il collectionne les objets d'art et fait venir d'Italie des antiques et commande des uvres sur la mythologie. Il reçoit des tableaux de la part du pape et fait venir des moules de statues romaines afin de couler des bronzes. Il mandate Rosso Fiorentino pour la décoration du château qui réalise le pavillon de Pomone, le pavillon des Poesles, la galerie Basse et surtout la galerie François Ier en 1534. Fontainebleau est parfois désigné comme la \"Nouvelle Rome\"et son école est renommée dans toute l'Europe de lOuest. Son fils, le roi de France Henri II complète le château de Fontainebleau avec une salle de bal et une chapelle, reliées à la demeure par la galerie François Ier, qui fait face à l'étang des carpes. Plus tard, Henri IV agrandit la demeure de plusieurs ailes et de la Porte du Baptistère, il fait aménager la cour des offices. Désormais, Fontainebleau peut accueillir près de mille personnes. Il vient jouer au jeu de paume dans une salle spécialement aménagée. Le roi Louis XIV fit élever un théâtre et transformer le parc par le célèbre paysagiste André Le Nôtre, qu'il signa l'édit révoquant celui de Nantes, interdisant ainsi le protestantisme en France (1685). Louis XV s'y marie et fait aménager une salle de spectacle, laquelle a brûlé en 1856.","architecture":"FONTAINEBLEAU  , pendant la Révolution Française, le palais est vidé de son mobilier et il devient successivement une caserne puis une prison. Napoléon Ier fait revivre Fontainebleau à partir de 1804 : il le fait meubler, y tient sa cour pour laquelle il fait aménager 40 appartements de maître. Fontainebleau est aussi un lieu de décision politique comme le montrent la salle du trône et la bibliothèque de travail de l'empereur, qui y reçoit le pape Pie VII en 1812, et qui y resta enfermé pendant dix neuf mois et y signera, sous la pression, le Concordat de Fontainebleau. C'est également au château de Fontainebleau que l'Empereur signe son acte d'abdication en 1814. Le 20 avril, après avoir tenté de se supprimer, il prononce un discours resté fameux à sa garde dans la cour appelée depuis la Cour des Adieux, scène illustrée par le tableau \"Les adieux de Fontainebleau\" peint par Harace Vernet. Au XIXe siècle, Eugénie de Montijo, épouse de Napoléon III, passe ses soirées dans le petit théâtre élevé par son mari. En parcourant Fontainebleau aujourdhui le visiteur est étonné par tant dépoques accumulées, et ne peut être insensible au charme qui sen dégage. Napoléon, de son dernier exil à Sainte-Hélène, se souvenait avec nostalgie de Fontainebleau. Voila, disait-il, la vraie demeure des Rois, la maison des siècles, ce nétait pas un palais darchitecte, mais bien un lieu dhabitation, bien calculé et parfaitement convenable. Cétait ce quil y avait sans doute de plus commode, de plus heureusement situé en Europe\" Déployant ses divers corps de bâtiments entre quatre cours principales et trois jardins, le château aligne ses longues façades darchitectures et dépoques variées contre des jardins dont la conception générale a été revue au cours du XIXe siècle.","habitants":"Napoléon 1er\"","divers":"Fontainebleau  GPS : 48° 24' 07\" Nord, 2° 41' 53\" Es","gps":"48° 24' 07\" Nord, 2° 41' 53\" Es","images":["../../jctruffet.com/image/image_77/77_Fontainebleau_1.jpg","../../jctruffet.com/image/image_77/77_Fontainebleau_2.jpg","../../jctruffet.com/image/image_77/77_Fontainebleau_3.jpg","../../jctruffet.com/image/image_77/77_Fontainebleau_4.jpg","../../jctruffet.com/image/image_77/77_Fontainebleau_5.jpg"]},"Consult_chateau_formulairefd71":{"id":"Consult_chateau_formulairefd71","dept":"77","canton":"Fontenay-Trésigny","commune":"Fontenay-Trésigny","nom":"Fontenay_77","type":"Châteaux","periode":"XIX","histoire":"deux châteaux dans cet article la Plumasserie et Fontenay .                            La PLUMASSERIE se trouve dans une région dotée dune surprenante architecture historique, où de riches familles de la noblesse aux parcours héraldiques hauts de ports ont sculpté avec zèle un paysage politique et religieux qui ne trompe pas le caractère si français de ce territoire. Il a vu son dessin prendre forme au début du XIXe siècle, la bourgeoisie née de la Révolution disputait alors à la noblesse les caractères de sa visibilité, les temps changeaient mais les châteaux, eux, demeuraient.  Cette maison d'hôtes est située dans le parc de 24 hectares du château de la Plumasserie dont la construction remonte au début du XIXe siècle avec son jardin d'agrément du château du duc dÉpernon, présentait des jardins remarquables, réalisés en 1837, récemment détruit au bénéfice d'une opération immobilière jamais finalisée. Les Dépendances du château du duc dÉpernon. Les dépendances ont été construites au XVIIe siècle, elles jouxtent un ensemble de bâtiments remontant à l'époque de François Ier. Ces bâtiments, les communs ainsi que la ferme des Landes (basse cour du château ou « ferme royale » comportant un imposant pigeonnier à trois niveaux, doivent devenir des appartements. Le château de la Plumasserie est un ancien fief existant au XVIIIe siècle. Il était alors fortifié, entouré de douves alimentées par le ru de Frégy. Le nom de Bellefontaine vient d'une fontaine se trouvant dans le parc et rejoignant le ru de Frégy. Dans ce lieu se trouve une chapelle. La construction du château actuel remonte au début du XIXe siècle. Il est remarquable par son architecture, notamment ses tours. Il se situe au cur d'un parc de 24 hectares. Le château est aujourd'hui une Maison d'Hôtes, également dédié aux cérémonies et séminaire.","architecture":"FONTENAY, mentionné dès 1108, sous Louis VI le Gros, ce château des Sources passe au roi d'Angleterre en 1423. Charles VII le concède à la famille Moulin, mais au XIVe siècle, les terres reviennent à François Ier. Guillaume Prud'homme en acquiert alors les droits et le reconstruit. Abandonné durant de longues années après la démolition de la chapelle et des tours, le château est restitué pendant la Révolution à Madame de Montaigu, fille de la duchesse de Noailles. Modifié par le marquis de Gontaut-Biron, l'édifice appartient ensuite à la famille Tasse qui s'en sert pour la vente des fruits provenant de ses vergers. Éléments protégés MH : les façades et les toitures ; la salle ornée de lambris peints au rez-de-chaussée : classement par arrêté du 7 octobre 1963. Les bâtiments des communs, les sols des cours et les douves : inscription par arrêté du 17 octobre 1991.","habitants":"Plumasserie                       fontenay  famille Tasse                          \"","divers":"deux châteaux dans cet article  la Plumasserie grav 2, Fontenay .        Chaubuisson r GPS : 48° 42' 29,8\" Nord, 2° 54' 10,7\" Est                                         plumasserie  GPS : 48° 42' 25\" Nord, 2° 51' 59\" Est","gps":"48° 42' 29,8\" Nord, 2° 54' 10,7\" Est","images":["../../jctruffet.com/image/image_77/77_Fontenay_77_1.jpg","../../jctruffet.com/image/image_77/77_Fontenay_77_2.jpg"]},"Consult_chateau_formulairef8e4":{"id":"Consult_chateau_formulairef8e4","dept":"77","canton":"Fontenay-Trésigny","commune":"Fontenay-Trésigny","nom":"Fontena
