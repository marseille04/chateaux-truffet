e la Motte actuel ne fut édifié qu'à la fin du XVe siècle, pour Aymard de Brisay, seigneur de La Motte et de Lorrez. Le château est (devenu une Maison de retraite), où elle avait passé une partie de son enfance. Le château de la Motte est inscrit aux M.H. depuis 1975.  A  Lorrez le Bocage, le château est entouré de douves, dates du XVIe siècle  les deux corps de logis en equerre sont flanqués de deux petites tours rondes, à appartrenut au XIXe siècle à la famille de Ségur, il est habité par le comte B. de Béarn.","habitants":"famille d' Aymar de Brisay\"","divers":"La Motte GPS : 48° 14' 05,28\" Nord, 2° 53' 57,48\" Est","gps":"48° 14' 05,28\" Nord, 2° 53' 57,48\" Est","images":["../../jctruffet.com/image/image_77/77_Motte_Pr%c3%a9aux_1.jpg"]},"Consult_chateau_formulaire5fb3":{"id":"Consult_chateau_formulaire5fb3","dept":"77","canton":"Coulommiers","commune":"Marolles sur seine","nom":"Motteux","type":"Château","periode":"XVI","histoire":"MOTTEUX  le château a été édifié par la famille de Foissy vers 1569. L'architecte en serait Jean de Brosse, père de Salomon de Brosse.\nAcheté en 1661 par Jean de la Barde qui fut marquis de Marolles, il passe dans la famille de Brion. Puis au tout début du XIXe siècle, la famille de Sinéty, famille descendante des deux précédentes, devient propriétaire du château. Il est depuis peu la propriété d'un traiteur local réputé, qui a restauré une partie des communs afin d'y organiser diverses manifestations. Il appartient à Olivier Peuvrier, directeur de Depreytère ,traiteur qui avoue avoir toujours rêvé dêtre chatelain. Ils sont restaurés par la famille de Sinéty.","architecture":"MOTTEUX , le château de Motteux est depuis peu la propriété d'un traiteur local réputé, qui a restauré une partie des communs afin d'y organiser diverses manifestations. Mais qui nimaginait pas lampleur du travail de rénovation à effectuer sur certaines parties du domaine, dans certaines pièces du château. Pour lui prêter main-forte, sest créée lassociation des Amis de Motteux, sous limpulsion de Jean-Pierre Paviot, responsable de lantenne de Montereau de la chambre des Métiers et de lArtisanat. Sauvegarder le château de Motteux. Lidée est de réunir ceux qui veulent maintenir, sauvegarder le patrimoine architectural, végétal et mobilier, la protection du site du château et de tout ce qui sy rattache, sa promotion touristique, culturelle, artistique pour faire vivre, maintenir et sauvegarder le château de Motteux.. En 1593, il est décrit comme un château à trois donjons couverts d'ardoises avec une cour entouré de fossés, basse-cour avec muraille, grange et colombier.À la fin du XIXe siècle, la famille de Sinéty fait abattre une partie des communs pour construire à la place les écuries actuelles près de l'aile nord et une résidence près de l'aile sud.Au début du XXIe siècle, les communs menacent à nouveau de ruine à la suite de la tempête de 1999.","habitants":"famille de Brion\"","divers":"Motteux  48° 22' 59? nord, 2° 59' 39? est","gps":"","images":["../../jctruffet.com/image/image_77/77_Motteux_1.jpg"]},"Consult_chateau_formulaire1551-2":{"id":"Consult_chateau_formulaire1551-2","dept":"77","canton":"Nangis","commune":"La Chapelle-Rablais","nom":"Moyeux","type":"Château","periode":"XVIII","histoire":"DES MOYEUX, le château a été construit en 1848  demeure de la fille du général de La Fayette, Anastasie, mariée au comte de la Tour Maubourg de 1801 à 1846. Il a appartenu ensuite à Eléonore Vergeot, la maîtresse de Napoléon III, dont elle a deux enfants. Le 13 juillet 1872, Hubert Debrousse, riche entrepreneur de travaux publics, achète le château. La famille Debrousse lèguera une fortune colossale qui permettra notamment de créer lhospice Debrousse et la fondation Debrousse qui financera en partie les travaux de Pierre et Marie Curie. Madame Rigaud devient plus tard propriétaire, alors qu'elle dirige la maison de parfum familiale. Quarante jardiniers entretiennent les jardins et les serres de fleurs rares, qui entrent dans l'élaboration des parfums, l'une des tours du parc est utilisée pendant longtemps comme emblème des célèbres bougies parfumées Rigaud.","architecture":"MOYEUX C'est devenu un gite d'Hôtes. Il a été construit en 1848, sur les fondations d'un ancien manoir de chasse, avec son parc de 30ha, sa tour d'entrée, son orangeraie et ses dépendances. Situé à 70km au Sud-Est de Paris, proche de Fontainebleau, de Provins et de Vaux-le Vicomte, le château des Moyeux a été, depuis le XVIIIe siècle, la demeure de célèbres familles. Il vous accueille dans le cadre unique de son parc de 30ha au cur dune forêt domaniale. Les amoureux de détente savoureront le plaisir du repos à la piscine couverte chauffée été comme hiver.  C'est devenu une auberge qui propose des chambres d'hôtes.","habitants":"la fille du général de La Fayette,\"","divers":"Moyeux  GPS : 48° 30' 43\" Nord, 2° 58' 21\" Est","gps":"48° 30' 43\" Nord, 2° 58' 21\" Est","images":["../../jctruffet.com/image/image_77/77_Moyeux_1.jpg"]},"Consult_chateau_formulaire2be2":{"id":"Consult_chateau_formulaire2be2","dept":"77","canton":"Saint-Fargeau-Ponthierry","commune":"Nandy","nom":"Nandy","type":"Château","periode":"XV-XVII","histoire":"NANDY,  date du XVe siècle. Reconstruit au XVIIe siècle pour Louis de L'Hospital marquis puis duc de de Vitry. En 1571  vendue au Gondi transaction annulé reour à Louis de l'hospital  gouverneur de Meaux                  se rallie à Henri IV, puis passe à son fils Nicolas de l'Hospital l'assassin de Concini est nommé maréchal de France, dés 1617 s'éteindra dans le château de Nandy en 1644 son héritier, François Marie de l'Hospital  duc de Vitry et pair.  Maréchal de camp et ambassadeur à Rastibonne et en 1664 le domaine est acquit par Louis de la Grange-Trianon président de la seconde chambre au parlement de Paris. A la mort de Louis de la grange en 1706 le domaine est vendu à la famille de la Vieuville, puis passe en 1746  à Lefebvre trésorier de la maison de la reine. Au moment de la Révolution le marquis de Perthuis en est propriétaire n'ayant pas émmigré  à put préservé des dégradation et à partir de 1850 le château passe dans différentes mains et acquis en 1938 par monsieur Robert Cousin.","architecture":"NANDY; Il a été classé aux M.H. en 1968.  édifice de plan massé dont sa structure générale à la première campagne de travaux entreprise sous Henri IV ; Pavillon carré doublé en profondeur raccordé sur la cour à des pavillons bas par des pans de murs courbes. les deux façades principales, à cinq travées son en moellons , au dessus du rez de chaussée un double bandeau orné de tables de pierre vient à l'appui de l'alège des fenêtres du premier étages. les toits brisés, les lucarnes éclairant le comble de part et d'autre d'un étage d'attique couronné par un fronton triangulaire. Les façades latérales offrent un avant-corps à trois travées légèrement saillant cantonnant deux arrière corps plus bas. coiffée au XVIIIe siècle  d'un vaste fronton semi-circulaire éclairé par un oeil de boeuf . Ouvert de Mars à Novembre. Façades et toitures du château et de ses dépendances, cour d'honneur, parc, avenue dans l'axe du château sur la totalité de son étendue : classement par arrêté du 23 octobre 1968.","habitants":"Famille de  Louis de L'Hospital \"","divers":"Nandy GPS : 48° 34' 50,88\" Nord, 2° 34' 1,2\" Est","gps":"48° 34' 50,88\" Nord, 2° 34' 1,2\" Est","images":["../../jctruffet.com/image/image_77/77_Nandy_1.jpg","../../jctruffet.com/image/image_77/77_Nandy_2.jpg"]},"Consult_chateau_formulairef226":{"id":"Consult_chateau_formulairef226","dept":"77","canton":"Nangis","commune":"Nangis","nom":"Nangis","type":"Forteresse","periode":"XIV-","histoire":"NANGIS   la forteresse a été construite sur une période sétalant entre les années 1050 et 1100. Plusieurs seigneurs furent propriétaires de cette demeure, la famille Courtry, puis les Britaud à partir de 1193, auxquels succédèrent les Montmorency en 1245. Il a été construit en 1436  en  style Médiéval.. Le 10 septembre 1498, Marie de Vères devient dame de La Motte-Nangis; elle épouse le 16 avril 1507, Louis de Brichanteau. L'édifice fut transformé par les Brichanteau, en une grande et magnifique résidence, en 1590  Antoine de Brichanteau futur amiral de France fait en 1612 érigée en marquisat et  remanie le corps de logis.  Richelieu en 1626, ordonne le démantèlement de tous les châteaux féodaux, alors le donjon et tout ce qui pouvait donner un aspect guerrier fut rasé, subsistera les soubassements et les deux tours dangle. En 1742, à sa mort le marquisat passe entre les mains des héritiers du maréchal Armand de Brichanteau, la famille de Guerchy des cousins éloignés, le comte de Guerchy ambassadeur à Londres. Après la Révolution, le dernier marquis de Nangis, fils du comte Anne-Louis, colonel  du régimment d'artois,  ruiné, dut vendre son domaine en 1795. Un notaire parisien, nouveau propriétaire, détruisit en partie lancienne demeure seigneuriale et en 1810 acquis par un négociant Jean-Daniél Bourlet qui le transmet à son gendre le comte d'Echerny, maire de Nangis, puis utilisé en pensionnat de jeunes filles,  et depuis l'achat par nangis, les services administratifs de la Mairie de Nangis.","architecture":"La MOTTE NANGIS   Il date de 1436 et est de style médiéval. La construction du château de la Motte-Nangis date du XVe au XIXe siècle. Son premier propriétaire était Aymard de Brisay. Le château de la Motte-Nangis est devenu la Mairie de Nangis, il est inscrit aux M.H. depuis 1975.  Le château de Nangis protégea la population de la seigneurie durant la guerre de Cent Ans.","habitants":"famille de Louis de Brichanteau\"","divers":"La Motte GPS : 48° 33' 16\" Nord, 3° 00' 49\" Est                                                                   Nangis  GPS : 48° 14' 06\" Nord, 2° 53' 58\" Est","gps":"48° 33' 16\" Nord, 3° 00' 49\" Est","images":["../../jctruffet.com/image/image_77/77_Nangis_1.jpg","../../jctruffet.com/image/image_77/77_Nangis_2.jpg","../../jctruffet.com/image/image_77/77_Nangis_3.jpg","../../jctruffet.com/image/image_77/77_Nangis_4.jpg","../../jctruffet.com/image/image_77/77_Nangis_5.jpg"]},"Consult_chateau_formulaire816d":{"id":"Consult_chateau_formulaire816d","dept":"77","canton":"Mitry-Mory","commune":"Nantouillet","nom":"Nantouillet","type":"Vestiges","periode":"XV","histoire":"NANTOUILLET, au XVe siècle, apparaît le premier seigneur de Nantouillet, Philippe de Melun et c'est à cette famille  qu'un certain Antoine Duprat va racheter les terres. En 1515, François 1er le nomme chancelier. Titre qui s'ajoute à celui de cardinal qu'il a obtenu en rentrant dans les ordres, après la mort de sa femme, en 1512. Nantouillet restera dans la famille des Duprat jusqu'aux années 1775-1777, soit environ deux-cent-cinquante ans après la fin de la construction du château du cardinal-chancelier Antoine Duprat, après avoir appartenu à la famille Duprat, la seigneurie est vendue, en 1753, à un dénommé Lallement qui prend le titre de comte de Nantouillet. Le château, tombant en vétusté, le corps de logis est alors utilisé comme bâtiment de ferme. Des travaux y sont entrepris visant à améliorer la fonctionnalité agricole. À la Révolution, la seigneurie est confisquée et passe entre différentes mains ; elle sera vendue en 1807 à Jacques-Robert Delalande. Le château restera chez ses héritiers au moins jusqu'en 1898. En 1816, d'après Claude Sauvageot, une aile du château est en partie démolie pour en tirer des matériaux nécessaires à la construction d'un manoir du nouveau marquis de Nantouillet.  En 1867, le château, qui appartient toujours aux héritiers Delalande, est à usage de ferme et d'exploitation agricole. C'est son propriétaire, Brière Valigny qui donne à Sauvageot l'autorisation de dessiner et publier sur le château de Nantouillet, sa propriété.\nEn 1898, le château appartient à Mme Roussel, née Brière-Valigny","architecture":"Le château de Nantouillet a été édifié vers 1525, pour Antoine Duprat.  il fait édifier le château, se servant de base une ancienne enceinte qu'il va embellir en lui ajoutant un monumental portail en arc de triomphe, avec pilastres et niches. Les quatre tours à l'origine qui flanquent l'enceinte n'ont pas pour rôle d'assurer sa défense mais plutôt d'affirmer la noblesse récente de son propriétaire. Construit autour de la cour d'honneur, le château de briques est l'un des premiers châteaux Renaissance d'Ile de France. Les trois ailes en portent les empreintes: arabesques et coquillages de la porte d'entrée, voûte flamboyante de l'escalier et flamboyance de la chapelle.  Il est composé des trois ailes disposées autour de la cour d'honneur qui subsistent encore aujourd'hui : l'aile centrale du logis principal, qui a une belle façade sur les jardins à l'est ; l'aile nord à usage de commun ; l'aile sud où se trouve le porche débouchant sur la cour d'honneur. \nÉléments protégés MH : le château de Nantouillet en totalité : classement par liste de 1862. C'est l'un des premiers châteaux Renaissance construit en Île-de-France. Son enceinte est flanquée de trois tours circulaires et entouré de fossés. Son portail monumental est sculpté de décor de pilastres surmonté d'un linteau sculpté portant des niches aujourd'hui dépourvues de statues sauf le dais central (statue mutilée de Jupiter tonnant avec une devise latine). Le corps de logis composé de 3 ailes disposées autour de la cour d'honneur a conservé des fenêtres à meneaux et des portes sculptées d'arabesques et de coquillages. L'ensemble du château de Nantouillet est dans un état assez dégradé.","habitants":"famille de Melun             famille des Duprat \"","divers":"Nantouillet GPS : 49° 00' 09\" Nord, 2° 42' 16,92\" Est","gps":"49° 00' 09\" Nord, 2° 42' 16,92\" Est","images":["../../jctruffet.com/image/image_77/77_Nantouillet_1.jpg","../../jctruffet.com/image/image_77/77_Nantouillet_2.jpg","../../jctruffet.com/image/image_77/77_Nantouillet_3.jpg","../../jctruffet.com/image/image_77/77_Nantouillet_4.jpg","../../jctruffet.com/image/image_77/77_Nantouillet_5.jpg"]},"Consult_chateau_formulaire1d35":{"id":"Consult_chateau_formulaire1d35","dept":"77","canton":"Nemours","commune":"Nemours","nom":"Nemours","type":"Forteresse","periode":"XIII-XIX","histoire":"deux chateaux dans cet article Nemours et la Boulonnière.                            NEMOURS,  le château aurait été construit au milieu du XIIe siècle par Gauthier de Villebéon, seigneur de Nemours, qui occupe la charge de grand Chambellan du roi, sous les règnes de Louis VII et de Philippe Auguste, jusquà sa mort en 1205. Plus tard, en 1461, le duché est donné par Louis XI à Jacques d'Armagnac. Ce dernier meurt décapité en place de Grève à Paris en 1477, après avoir pris la tête d'un mouvement de révolte nobiliaire contre le roi. Dans la seconde moitié, voire le dernier tiers du XVe siècle, le château de Nemours fait lobjet dune campagne de restauration et de réaménagement comme en témoignent les fenêtres à demi-croisée. Ces modifications ont alors entraîné la suppression du hourd, galerie extérieure en bois en encorbellement, ceinturant sur trois côtés le corps de logis au niveau du deuxième étage, la condamnation des portes, encore visibles, qui y donnaient accès et l'abaissement des quatre tours d'angle au niveau actuel. En 1673, Louis XIV donne le duché de Nemours en apanage à son frère Philippe d'Orléans. Le château devient le lieu de réunion des juridictions du baillage et de l'élection et accueille l'hôtel de ville. C'est l'occasion d'une grande campagne de restructuration du bâtiment, percement de la nouvelle entrée, avec un porche sur la rue Gauthier Ier et création du perron accédant au premier étage. Ces travaux sont menés avec le souci de doter la cour et le bâtiment d'une ordonnance classique atténuant son caractère médiéval. Au moment de la Révolution le château devient possession de la ville. Au XIXe siècle il sert de théâtre, d'école, d'entrepôt et de salle de réunion. En 1901, un comité, qui deviendra ensuite la société des Amis du Vieux château, présidé par le sculpteur nemourien Justin-Chrysostome Sanson, décide une restauration du lieu afin d'y fonder un musée, inauguré en 1903. Des expositions temporaires rythment la programmation de ce lieu unique.","architecture":"NEMOURS, éléments protégés MH : les restes de l'ancienne chapelle seigneuriale, près du château : inscription par arrêté du 14 avril 1926. Le château ; la courtine reliant le château à la tour carrée ; la tour carrée et rempart qui fait suite à l'Ouest, la tour ronde du Sud et le rempart qui fait suite à l'Ouest ; la porte d'entrée du château dite porte de Monsieur : classement par arrêté du 10 février 1977.                                                                                    A cinq K.M. au nord à Crez sur loing château  de la BOULEAUNIERE, est une résidence élégante, proche de Fontainebleau, entouré d'un écrin de verdure. Cette superbe propriété du XIXe siècle est un véritable lieu d'histoire : c'est au château que Madame de Berny recevait en 1830, son amant, le célèbre romancier Honoré de Balzac, plusieurs salons de toute beauté, avec un mobilier moderne et une décoration contemporaine, ont su garder les chandeliers, les belles moulures et les énormes cheminées d'époque.  Autour de La Bouleaunière, un parc de 3 Ha . La forêt qui entoure le château La Bouleaunière, avec un joli point d'eau, apporte tout son charme bucolique à la région Seine et Marne. Accueillis par Wilfried, notre hôte, celui-ci saura-vous renseigner et répondre à lensemble de vos besoins le temps de votre séjour. La privatisation de la Bouleaunière est possible 24/7 à partir de 1050 euros HT la nuit avec draps, serviettes, et ménage inclus. \"Aucune nuisance sonore ne sera tolérée après 23h\". Le château La Bouleaunière est idéal pour les événements suivants : Séminaires, Réunions.                                                                          ST_PIERRE les NEMOURS  est un château fort bâti à Saint-Pierre-les-Nemours.  Pas d'historique.","habitants":"à Jacques d'Armagnac et  Madame de Berny\"","divers":"St pierre les nemours GPS : 48° 15' 48\" Nord, 2° 40' 53\" Est                             Boulonnières  grav-6-7                            GPS : 48° 18' 55\" Nord, 2° 41' 20\" Est                                                                               Nemours  GPS : 48° 15' 56\" Nord, 2° 41' 49\" Est","gps":"48° 15' 48\" Nord, 2° 40' 53\" Est","images":["../../jctruffet.com/image/image_77/77_Nemours_1.jpg","../../jctruffet.com/image/image_77/77_Nemours_2.jpg","../../jctruffet.com/image/image_77/77_Nemours_3.jpg","../../jctruffet.com/image/image_77/77_Nemours_4.jpg","../../jctruffet.com/image/image_77/77_Nemours_5.jpg","../../jctruffet.com/image/image_77/77_Nemours_6.jpg","../../jctruffet.com/image/image_77/77_Nemours_7.jpg"]},"Consult_chateau_formulaireaf7f":{"id":"Consult_chateau_formulaireaf7f","dept":"77","canton":"Nemours","commune":"Nonville","nom":"Nonville","type":"Château","periode":"XVIII","histoire":"NONVILLE, il date du XVIIIe siècle. William Davisson, originaire d'Écosse, acquis la demeure primitive au XVIIe siècle. Au XVIIIe siècle, la Famille Davisson fait remplacer l'ancienne demeure par l'actuel pavillon. Le Château de Nonville passa à la Famille Vigneron d'Heucqueville à la fin du XVIIIe siècle, à la suite du mariage entre Marie-Anne-Claude Davisson avec François-Thomas de Vigneron d'Heucqueville, chevalier, seigneur de Morlaine, lieutenant des maréchaux de France, capitaine de la cavalerie, Mousquetaire du roi et chevalier de Saint-Louis. François-Thomas de Vigneron fit restaurer le château. N'ayant pas eu d'enfant, le château de Nonville alla à un cousin de son épouse, Henry-Louis de Bertrand, comte de Beuvron, gouverneur pour le roi de Beaulieu et chevau-léger de la garde. En 1808, Joseph Bertrand de Beuvron revendit le château de Nonville à Charles-Louis Antheaulme. Après le décès d'Antheaulme de Nonville, il ira dans les mains de sa Veuve, née Desmé de Gagnonville, puis sera transmis à ses enfants. Le parc du château a accueilli le parc d'attractions « Fami Parc » de 1997 à 2012.","architecture":"NONVILLE de plan rectangulaire à deux niveaux Fermé à la suite d'un différend juridique avec les deux communes d'implantation, ce parc de 35 ha accueillait, chaque été, de 50 000 à 157 000 visiteurs et fournissait, chaque année, un emploi saisonnier à 70 personnes, dont des jeunes en recherche d'un job d'été. Après diverses années de fermeture, le site a été repris, en avril 2016, par la SAFER, dans le cadre d'un projet de restauration, d'une activité agricole, arboricole et viticole.","habitants":"Famille Davisson \"","divers":"Nonville GPS : 48° 17' 02\" Nord, 2° 47' 41\" Est","gps":"48° 17' 02\" Nord, 2° 47' 41\" Est","images":["../../jctruffet.com/image/image_77/77_Nonville_1.jpg"]},"Consult_chateau_formulairea353":{"id":"Consult_chateau_formulairea353","dept":"77","canton":"Provins","commune":"Noyen sur seine","nom":"Noyen","type":"Château","periode":"XVIII","histoire":"NOYEN, château construit au milieu du XVIIIe siècle, par la famille Montchal précédé d'une cour d'honneur encadrée par des bâtiments de communs édifiés entre 1553 et 1556 pour François de Carnavalet, grand écuyer de Henri II, pour y établir un haras royal.\nÉléments protégés MH : l'ensemble du château proprement dit ; les douves ; le sol de la cour d'honneur et des parterres : classement par arrêté du 11 juillet 1960. Le parc entourant le château entre les douves et la Seine ; la grande allée reliant le château à la R.N. 51, y compris le vieux pont de pierre sur lequel passe cette allée : inscription par arrêté du 10 juillet 1961. Le pavillon de chasse en totalité : inscription par arrêté du 10 octobre 2008. Les communs du château, en totalité : classement par arrêté du 20 janvier 2009.","architecture":"NOYEN. Il date du XVIe et XVIIIe siècle. Le château de Noyen-sur-Seine a été construit au XVIIIe siècle sur les restes d'un ancien château du XVIe siècle dont il ne reste que les communs. Il fut construit, de 1553 à 1556, pour François de Carnavalet, grand écuyer du Roi Henri II, pour en faire un haras royal. Le château de Noyen-sur-Seine est précédé d'une cour d'honneur, encadrée de communs.  De nombreux éléments sont protégés au titre des M.H. : Le château de Noyen-sur-Seine et ses douves, le sol de la cour d'honneur, et les parterres. La grande allée qui relie le château de Noyen-sur-Seine, ainsi que le vieux pont de pierre où passe l'allée centrale. Le pavillon de chasse et les communs du château, en totalité. Sont aussi protégés le parc du château, qui se trouve à l'Ouest de la Vieille Seine, entouré des douves et de la Seine, ainsi que les parcelles de terre. L'ancien propriétaire du château de Noyen-sur-Seine est Mr De Carnavalet. Il fait lobjet dun classement aux M.H.","habitants":"la famille Montchal  et Mr De Carnavalet\"","divers":"Noyen     GPS : 48° 27' 06\" Nord, 3° 21","gps":"48° 27' 06\" Nord, 3° 21","images":["../../jctruffet.com/image/image_77/77_Noyen_1.jpg"]},"Consult_chateau_formulaire3544-2":{"id":"Consult_chateau_formulaire3544-2","dept":"77","canton":"Ozoir la Ferrièr","commune":"Ozoir la Ferrière","nom":"Ozoir_Ferrière","type":"Château","periode":"XVIII-XIX","histoire":"Deux châteaux dans cet article; Agneaux et Doutre.                                                               AGNEAUX  le château des Agneaux est un restaurant traditionnel, qui vous propose une cuisine raffinée. Vous serez accueuillis au coeur du golf d'Ozoir-la-Ferrière, dans cette belle demeure. Dès les beaux jours, vous profiterez des animations Barbecue, sur une terrasse verdoyante. Vous pourrez aussi profiter de nos deux salles de réunion pour organiser vos séminaires et vos journées d'études. Nous pouvons organiser pour vos collaborateurs des initiations au Golf avec nos Pros. Le restaurant a été créé en 2013. Ce restaurant a obtenu la note de 4/5. Vous serez conquis aussi bien par son accueil, les repas et ses prix abordables.","architecture":"DOUTRE. Il date du 3ème quart du XVIIIe et du XIXe siècle. C'est un jardin d'agrément appelé le Parc du château de la Doutre. Des arbres remarquables poussent dans le parc du château de la Doutre dont le célèbre Cèdre de Jussieu. On y voit un parterre, du bois de jardin, une prairie ornementale et une clairière ornementale. Le \nLe château de la CHAUVENNERIE est un château bâti à d'Ozoir-la-Ferrière. Sa construction date du 3eme quart du XVIIIe siècle et du 1er quart du XXe siècle. Propriété de l'Etat.","habitants":"\"","divers":"Deux châteaux dans cet article; Agneaux  grav-4  et Chauvennerie grav-2  Doutre grav-3.                                        GPS : 48° 45' 42,9\" Nord, 2° 39' 7,92\" Est                                                      Doutre GPS : 48° 46' 41\" Nord, 2° 40' 48\" Est","gps":"48° 45' 42,9\" Nord, 2° 39' 7,92\" Est","images":["../../jctruffet.com/image/image_77/77_Ozoir_Ferri%c3%a8re_1.jpg","../../jctruffet.com/image/image_77/77_Ozoir_Ferri%c3%a8re_2.jpg","../../jctruffet.com/image/image_77/77_Ozoir_Ferri%c3%a8re_3.jpg","../../jctruffet.com/image/image_77/77_Ozoir_Ferri%c3%a8re_4.jpg"]},"Consult_chateau_formulairec5da":{"id":"Consult_chateau_formulairec5da","dept":"77","canton":"Nemours","commune":"Paley sur seine","nom":"Paley_sur_Seine","type":"Château","periode":"XIV-XIX","histoire":"PALEY, dans la ferme du château, pigeonnier octogonal avec boulins et échelle. Ne restent que l'enceinte médiévale et un pigeonnier, classés le 16 février 1987. La partie visible depuis la route date du XVIIIe siècle. En façade, un bas-relief des armes de la famille le Charron.\nÉléments protégés MH : l'enceinte médiévale et le pigeonnier : inscription par arrêté du 16 février 1987.","architecture":"PALEY, vers le XIIe siècle, une forteresse carrée sans donjon est construite pour défendre le passage du Lunain. Quelques vestiges de cet édifice primordial subsistent encore à l'intérieur de la cour, comme un carré de murs importants avec chemin de ronde, une tour massive ayant servi de pigeonnier et une cave voûtée. Le corps de logis principal, détruit sous Charles VI, est reconstruit par la suite, pour être finalement très remanié au XIXe siècle. Le nouveau bâtiment conserve néanmoins l'allure fortifiée de l'ensemble. La présence de forteresses dans les villages de la vallée du Lunain, tels que Nanteau sur Lunain, Nonville, Paley et Lorrez-le-Bocage, suggère, par leur position géographique, qu'une deuxième ligne de défense avait été envisagée contre toute invasion.","habitants":"Famille Le Charron.\"","divers":"48° 14' 29? N, 2° 51' 44? E","gps":"","images":["../../jctruffet.com/image/image_77/77_Paley_sur_Seine_1.jpg","../../jctruffet.com/image/image_77/77_Paley_sur_Seine_2.jpg"]},"Consult_chateau_formulairef9bf":{"id":"Consult_chateau_formulairef9bf","dept":"77","canton":"Lagny-sur-Marne","commune":"Pomponne","nom":"Pomponne","type":"Châteaux","periode":"XIX","histoire":"deux châteaux dans cet article Chaalis et Pomponne                                                                           CHAALIS  Commencé en 1882 achevé en 1885, le château est du plus pur style Louis XIII. Il a été construit sur les plans de M. Durville architecte à Paris et appartient à M. Arthur Bacot, président de la fabrique de Pomponne et agent de change. La famille Bacot fondit le château à condition que celui-ci porte le nom de l'Abbaye. Le bâtiment est en briques et pierres de taille. L'escalier avec son balustre carré, attire surtout l'attention car il a réellement quelque chose de grandiose et d'imposant. Le carrelage du hall est en mosaïque italienne du plus gracieux effet. Monsieur André Bacot, propriétaire du château, amateur de chasse à cour, put pratiquer son passe temps dans le bois de Chaâlis. Durant la deuxième guerre mondiale, monsieur André Bacot, maire de Pomponne entre 1938 et 1944, fait connecter le château à l'électricité puis le deuxième étage est enfin aménagé. Durant l'hiver 1940, le château est utilisé par des officiers allemands. C'est seulement après la guerre que le château de Chaâlis retrouve son élégance sous la gérance de monsieur Didier Bacot, fils de monsieur André Bacot.                                                                                                                        Le bois de Chaâlis, situé à 25 Km à l'Est de Paris. Les salons du rez-de-chaussée, ouverts cette \"Première année\" à vos réceptions, disposent de hauts plafonds et de grandes cheminées, qui leur apportent une beauté exceptionnelle. Au coeur d'une forêt et au bout d'une majestueuse allée d'environ d'1 Km où se trouve le château de Chaâlis. Le charme des lieux et son cadre naturel, vous assure l'intimité de toute réception.","architecture":"POMPONNE,  bâti pour Robert Arnauld d'Andilly, cet édifice possède des fossés, des pièces d'eau et des jardins dessinés par André Le Nôtre. Quelques années avant la Révolution, il est en mauvais état. Dans la seconde moitié du XIXe siècle, le domaine reprend vie grâce à la famille Dreux qui entreprend des travaux qui seront poursuivis par Albert Dumez leur gendre. C'est dans le château de Pomponne que se déroulent en mai et juin 1918 les entretiens entre les alliés, Clémenceau, les civils et les militaires français qui conduisent à la victoire finale. Depuis 1945, le château appartient au ministère de l'Intérieur et abrite la compagnie républicaine de Sécurité  Le parc abrite un bel ensemble de cascades, un plan d'eau, vestiges de la reconstitution d'un jardin classique à la fin du XIXe siècle destinés à redonner l'image au temps de sa splendeur. Groupe sculpté situé sur la cascade représentant l'allégorie de la Marne et de la Seine. Sculpture en forme de grenouilles en avant de la cascade. Il a été reconstruit pour Simon Arnauld de Pomponne et son père, d'après des plans de Mansart et Hardouin-Mansart. Il a été retouché aux XVIIIe et surtout au XIXe siècles. Simon Arnauld, seigneur puis marquis de Pomponne, ambassadeur puis secrétaire d'État de Louis XIV. Il a reçu la seigneurie de sa mère Catherine Lefèvre de La Boderie qui la tenait elle-même de son demi-frère, Nicolas de Haqueville. Isaac Lemaistre de Sacy, Traducteur de la Bible en Français, mourut le 4/01/1684 au château de Pomponne, où l'avait accueilli son cousin Simon Arnauld de Pomponne.  Il abrite désormais 2 Compagnies de CRS : La CRS Maintien de l'ordre N°4 et la C.R.S Autoroutière Est-Ile-de-France. Le Ministère de l'Intérieur est propriétaire du château de Pomponne.","habitants":"Chaalis  M. Arthur Bacot                                    Pomponne Arnauld d'Andilly\"","divers":"deux châteaux dans cet article Chaalis grav-2  et Pomponne grav-1  GPS : 48° 53' 0\" Nord, 2° 41' 21\" Est                                                                 Pomponne GPS : 48° 52' 55\" Nord, 2° 40' 52\" Est","gps":"48° 53' 0\" Nord, 2° 41' 21\" Est","images":["../../jctruffet.com/image/image_77/77_Pomponne_1.jpg","../../jctruffet.com/image/image_77/77_Pomponne_2.jpg","../../jctruffet.com/image/image_77/77_Pomponne_3.jpg","../../jctruffet.com/image/image_77/77_Pomponne_4.jpg"]},"Consult_chateau_formulaire7c2a":{"id":"Consult_chateau_formulaire7c2a","dept":"77","canton":"Pontault-Combault","commune":"Pontault-Combault","nom":"Pontault_Combault","type":"Châteaux","periode":"XV-XIX","histoire":"trois châteaux dans cet article Bois  la Croix, Candale et Malnoue                                              BOIS LA CROIX, le château de Bois-La-Croix date de la fin du XIXe siècle,  pour Mr Badeuil. C'était un important négociant en vin parisien. Le château de Bois-la_Croix fut racheté, en 1900, par le célèbre romancier Georges Ohnet, deviendra la propriété de la célèbre famille Morane, par héritage. Claire Ohnet avait épousé Lucien Morane. Le château  est une propriété qui loue le château pour fêter divers évènements. Les propriétaires mettent à votre disposition une série de salles de réception aux superficies variables pour convenir au mieux à votre groupe. Il existe 3 châteaux sur la commune de Pontault-Combault, à découvrir : le Château Candalle (Ecole), le Château du Bois-La-Croix (de la fin du XIXe siècle) et le Château de Combault (Hôtel de Ville) du XVIIIe siècle.                                                                                                                COMBAULT  est devenu le siège de la Mairie. L'intérieur a été entièrement remodelé en 1970. château de Combault (actuellement siège de la mairie) date du XVIIIe siècle. L'intérieur a été entièrement remodelé en 1970. Il a abrité après la guerre et jusqu'en 1960, l'OPJEJ (Office de Protection des Enfants Juifs). Ces enfants étaient tous scolarisés au groupe scolaire Emile Pajot (Primaire et Collège).","architecture":"CANDALLE, les premiers seingeurs de Pontault s'y installèrent au XIe siècle. Au XVe siècle, il appartiendra aux descendants d'une famille gasconne les Quendalles. Leur nom sera francisé en Candalle, devenu la propriété du comte de Latourville, sera occupé en 1871, par un régiment de cavalerie, originaire du Bade-Wurtemberg, a été reconstruit, au cours du XIXe siècle. Il a longtemps abrité une école maternelle et une école primaire avant la construction du groupe scolaire des Acacias. Le château Candalle devint une école maternelle et une école primaire. C'est devenu le Groupe Scolaire les Acacias. Le château Candalle appartient, depuis 1933, à la Ville de Pontault-Combault.                  En  Banlieue de Pontault MALNOUE à Emerainville , de style Louis XIII, ce château est édifié entre 1869 et 1872 pour le docteur Auguste Nélaton, chirurgien de Napoléon III, membre de l'Académie des Sciences en 1867, sénateur en 1868 et élevé au grade de grand officier de la Légion d'honneur. Après son décès causé par le mal de Bright en 1873, son épouse vend le château aux banquiers Gendry et Duval. Claire Menier, veuve du chocolatier, en devient propriétaire en 1884, le château demeure dans la famille jusqu'en 1960, année au cours de laquelle il passe aux mains du distillateur Charles Cathal qui transforme le château de Malnoue en maison de retraite. Le château conserve son orangerie. Le prince Ben Abdel Azziz el Saoud en est le propriétaire depuis 1992.","habitants":"Famille Morane.            Malnoue Auguste Nélaton,\"","divers":"Deux châteaux dans cet article Bois  la croix grav 3, candale grav 4 et Malnoue Grav-1 Pontault grav 2 Hôtel de ville                                                    Bois GPS : 48° 48' 05\" Nord, 2° 36' 27\" Est\nCandalle GPS : 48° 48' 05\" Nord, 2° 36' 27\" Est","gps":"48° 48' 05\" Nord, 2° 36' 27\" Est","images":["../../jctruffet.com/image/image_77/77_Pontault_Combault_1.jpg","../../jctruffet.com/image/image_77/77_Pontault_Combault_2.jpg","../../jctruffet.com/image/image_77/77_Pontault_Combault_3.jpg","../../jctruffet.com/image/image_77/77_Pontault_Combault_4.jpg","../../jctruffet.com/image/image_77/77_Pontault_Combault_5.jpg","../../jctruffet.com/image/image_77/77_Pontault_Combault_6.jpg"]},"Consult_chateau_formulaire6600":{"id":"Consult_chateau_formulaire6600","dept":"77","canton":"Savigny-le-Temple","commune":"Vert st-Denis","nom":"Pouilly_le_Fort","type":"Château","periode":"X-XV","histoire":"POUILLY LE FORT, sa construction date du Xe siècle. Cet ancien château fort se situe rue Grande. Durant le Moyen Age, il existait à Pouilly, plusieurs fiefs ainsi qu'une seigneurie très importante. La famille de Vaudetar, qui occupa toujours de très hautes charges à la cour des rois de France, possédait les terres de Pouilly de 1300 à 1720. Guillaume de Vaudetar, valet de chambre de Jean le Bon, fondit, dans le hameau, une chapelle, dans le lieu appelé les Marais qui fut détruite et remplacée, vers 1585, par une autre chapelle, construite dans le château. En 1720 la famille de Vaudetar revendi la terre de Pouilly, qu'elle possèdait, depuis 420 ans, à Jean-Baptiste Glucq, Baron de Saint-Port, qui rachèta aussi les terres de Verneau, Saint-Leu, Bréviande, Cesson et Boissise-la-Bertrand. Le 11/07/1419, le Traité de Pouilly-le-Fort, appelé « La Paix du ponceau » fut signé à Pouilly, par Jean sans Peur, Duc de Bourgogne et le Dauphin Charles (futur Charles VII de France). Au XVe siècle, Arthur de Vaudétar, seigneur de Pouilly-le-Fort prit possession de la seigneurie du Mée-sur-Seine - place forte de Marché-Marais. Le 5/05/1881, Louis Pasteur, y mèna une démonstration de vaccination de moutons contre la maladie du charbon, dans la ferme d'Hippolyte Rossignol. Certains scientifiques prétendirent démontrer une duperie de la part de Pasteur. Ces allégations sont depuis reprises par des militants, contre la vaccination. Le château de Pouilly-le-Fort est devenu aujourd'hui un lieu paisible, la terre de Pouilly-le-Fort appartient aujourd'hui à M le baron Aubernon ancien commissaire ordonnateur des guerres. Son fils, ancien préfet, avait construit une maison-forte  agréable.","architecture":"POUILLY LE FORT   Guillaume de Vaudétar, au service de Philippe VI, reçoit la seigneurie et le château de Pouilly le Fort en 1331. Le château constitue alors une sorte de gué au milieu de la zone marécageuse qui sépare Vert Saint Denis de Pouilly, bourg important à l'époque. La famille Vaudétar détient le fief du début du XIVe siècle jusqu'au début du XVIIIe siècle. En 1477, Arthur de Vaudétar, chanoine de la collégiale Notre Dame de Melun et avocat au Parlement, est seigneur de Boissise la Bertrand, Boissettes et Le Mée. Le château subit des aménagements au XVe siècle, puis à la fin du XVIIIe et au XIXe siècles. Les chartes de 1385 et 1667 évoquent un deuxième corps de bâtiment flanqué d'une tour, une chapelle, un pont-levis avec patère et échauguette, et une basse-cour avec écuries et pressoirs","habitants":"Famille de Vaudetar\"","divers":"Pouilly le fort                                           GPS : 48° 35' 07,36\" Nord, 2° 37' 44,36\" Est%","gps":"48° 35' 07,36\" Nord, 2° 37' 44,36\" Est%","images":["../../jctruffet.com/image/image_77/77_Pouilly_le_Fort_1.jpg"]},"Consult_chateau_formulaireae96":{"id":"Consult_chateau_formulaireae96","dept":"77","canton":"Provins","commune":"Provins","nom":"Provins","type":"Forteresse","periode":"XII-XIII","histoire":"PROVINS dit la REINE BLANCHE ou tour césar, Place forte, résidence comtale, Provins connut un âge dor aux XIIe et XIIIe siècles. Rattachée par Philippe le Bel au domaine royal, occupée par les Anglais de 1421 à 1433, elle resta fidèle à la Ligue lors de lavènement d'Henri IV qui la fit capituler en 1592, après une brève canonnade. Le donjon, dit Tour de César, domine lancienne ville haute, dite le Chatel, qui occupe léperon calcaire surplombant la ville basse; le Val, bâtie dans la vallée de la Voulzie. Henri le Libéral, comte de Champagne (1152-1183), qui fit entreprendre la construction de lenceinte. Élevé sur une motte tronconique, ce puissant ouvrage dessine un plan carré de 18 mètres de côté, aux angles abattus et flanqués de quatre tourelles hémicylindriques montées sur contreforts. Une chemise au tracé ovale, plusieurs fois surélevée, en protégeait les abords. Après avoir repris la ville, en 1432, le capitaine anglais Thomas Gérard voulut intégrer le donjon dans une sorte de citadelle indépendante: il en fit remparer les bases jusquau mur de la chemise, créant une vaste plate-forme annulaire, protégée par un parapet. Soigneusement parementé en calcaire de grand appareil, sur une hauteur de 25 mètres, louvrage nétait accessible, à lorigine, que par une poterne percée au sud, à près de huit mètres au-dessus du niveau du sol.","architecture":"PROVINS, De là, une rampe deux fois coudée conduisait à une vaste salle, couverte dune voûte en coupole sur trompes plus régulière que celle du niveau inférieur, longtemps utilisée comme citerne. Reliée aux petites salles des quatre tourelles, elles aussi voûtées, cette belle salle commande lescalier droit, ménagé dans lépaisseur du mur, qui conduit aux niveaux supérieurs: galerie intermédiaire de défense, à lorigine couverte de voûtes en demi berceau; et chemin de ronde du troisième niveau. Les superstructures de la tour ont été modifiées au XVIe siècle, et le bâtiment en retrait coiffé dun toit pyramidal. Construite pour lessentiel vers 1230 par Thibaut IV de Champagne, et renforcée à partir de 1360, lenceinte urbaine demeura entretenue jusquau milieu du XVIIe siècle. Amputée à la suite deffondrements et de destructions volontaires, notamment dans le Val, elle garde dans le Châtel plusieurs sections remarquablement conservées. Éléments protégés MH : les deux salles voûtées du château de la Reine Blanche. : inscription par arrêté du 17 avril 1931. Les remparts et les portes (depuis le Trou au chateau  jusqu'à la Tour aux Pourceaux) : classement par liste de 1875. La portion de remparts de la ville y compris les tours, courtines et bâtiments anciens allant de la Tour aux Pourceaux à la Tour du Bourreau incluse et la partie de courtine joignant la Tour de César à la Tour aux Anglais : classement par arrêté du 17 février 1942. Les parties de remparts appelés mur du Bourg Neuf et mur des Brébans : inscription par arrêté du 17 décembre 1992. La tour de César: classement par liste de 1846.","habitants":"M. Jacques Moulin\"","divers":"Provins  GPS : 48° 33' 41\" Nord, 3° 17' 24\" Est","gps":"48° 33' 41\" Nord, 3° 17' 24\" Est","images":["../../jctruffet.com/image/image_77/77_Provins_1.jpg","../../jctruffet.com/image/image_77/77_Provins_2.jpg","../../jctruffet.com/image/image_77/77_Provins_3.jpg","../../jctruffet.com/image/image_77/77_Provins_4.jpg","../../jctruffet.com/image/image_77/77_Provins_5.jpg","../../jctruffet.com/image/image_77/77_Provins_6.jpg","../../jctruffet.com/image/image_77/77_Provins_7.jpg"]},"Consult_chateau_formulaire7f5c":{"id":"Consult_chateau_formulaire7f5c","dept":"77","canton":"Moret sur loing","commune":"Ecuelles","nom":"Ravannes","type":"Château","periode":"XVI-XVII","histoire":"RAVANNES, l'origine du château de Ravanne remonterait au VIe siècle. On trouve une trace de son existence dans des textes anciens datant de 1632 et 1643. Un grand bond dans le temps et nous nous retrouvons au XVIIe siècle, en 1605. La propriété de Ravanne appartient à Messire François de Loménie, Conseiller et secrétaire du roi Henry IV. Celui-ci enrichit les terres du château des étangs de Moret (au sud) et de quelques terres avoisinantes. Le château se transforme alors. L'étang qui borde celui-ci devient une pièce d'eau avec cascade et les terres acquises sont transformées en parc. En 1611, les villageois assistent à la venue du jeune roi Louis XIII. En 1727, c'est le roi et la reine de Pologne qui séjournent à Ravanne. Ils viennent assister au mariage de leur fille Marie Leszczinska avec Louis XV, à Fontainebleau.","architecture":"RAVANNES Quelques temps avant la Révolution, en 1753, le domaine appartient à Messire Eymard, grand maître des Eaux et Forêts. Après la Révolution, le site acquis par la République se voit concédé au citoyen Seguin pour y établir des usines et magasins nécessaires à la création de tanneries. Aujourd'hui, il subsiste le mur d'enceinte, la pièce d'eau réaménagée, la cascade, la glacière et quelques arbres d'époque. La cascade débute du XXe siècle. Le château de Ravanne est inscrit aux M.H. depuis 1987,  Il appartient à une société privée et à la commune d'Écuelles.","habitants":"François de Loménie\"","divers":"GPS : 48° 21' 53\" Nord, 2° 49' 49\" Est","gps":"48° 21' 53\" Nord, 2° 49' 49\" Est","images":["../../jctruffet.com/image/image_77/77_Ravannes_1.jpg"]},"Consult_chateau_formulaire160c":{"id":"Consult_chateau_formulaire160c","dept":"77","canton":"Torcy","commune":"Bussy-Saint-martin","nom":"Rentilly","type":"Château","periode":"XVI","histoire":"RENTILLY, construit au XVIe siècle, le château change de nombreuses fois de propriétaires au cours de l'ancien régime avant d'être laissé à l'abandon à la veille de la Révolution Française. La construction du château de Rentilly, sous les ordres de Jean Bourdereul, avocat au parlement. Il fut acheté par Jean de Ligny, secrétaire du roi Henri IV et sa femme Anne Duguet, en 1599 qui ordonne une reconstruction entière du bâtiment. Il est ensuite donné par legs à sa fille la princesse de Furstenberg qui elle-même le lègue à sa fille. Celle-ci fait construire en 1697 une chapelle sur le domaine. Elle obtient, 12 ans plus tard que les habitants du village puissent venir prier sans avoir à aller à léglise de Bussy-Saint Martin trop éloignée. Ce n'est qu'en 1890 que le domaine devient la propriété de la famille Ménier, chocolatiers de Noisiel. Sous leur influence, le domaine est modernisé et certains bâtiments fermiers sont reconvertis avec un goût très sûr quant à leur décoration. Au cours de la deuxième guerre mondiale il est réquisitionné, Rentilly est dynamité le 21 août 1944 et il ne restera de la propriété, jusqu'en 1954, qu'une imposante carcasse de pierre se reflétant dans les bassins du jardin français. Le logis principal est rebâti au cours des années 50 et toujours à l'initiative de la famille Ménier, dans un style directoire moins exubérant que la construction originale. La propriété passera entre les mains de la ville nouvelle de Marne la Vallée en 1988. Dans les années 2000, Rentilly devient le siège de la communauté d'agglomération de Marne-et-Gondoire et le château commence à accueillir des expositions d'art contemporain.","architecture":"RENTILLY  hameau de Bussy-Saint-Martin) construit pour Jean Bourdereul, avocat au Parlement. Il passa ensuite de mains en mains, dont la famille André banquiers et amateurs d'art à l'origine du musée Jacquemart-André qui surélève le château, ajoute ailes et clochetons. Pendant la seconde guerre mondiale, il est  réquisitionné par lÉtat, sert de caserne à un groupe mobile de réserve (ancêtre des C.R.S.). A quelques heures de la libération, certains dentre eux, prirent le maquis. Le château de Rentilly fit incendié par l'armée allemande le 21 août 1944. Il sera reconstruit dans le style Directoire, entre 1954 et 1957, grace à Jacques Menier, son propriétaire. Longtemps un domaine seigneurial, le parc de Rentilly est devenu, aujourd'hui, un parc culturel, ouvert à la création et la diffusion de l'Art Contemporain. C'est un lieu de calme et de promenade parmi des essences forestières, aussi étonnantes que variées. Le parc (50 ha à cheval entre les communes de Bussy-Saint-Martin et Bussy-Saint-Georges), rouvert au public en 2003, après une réhabilitation de ses trois parties : le Parc à la Française, le Parc à lAnglaise et le bois. Au milieu de la grande pelouse trône une « capsule » conçue par l'artiste Édouard Sautai, pour l'observation des arbres, grâce à des « sylviscopes ». Si le château de Rentilly fut longtemps un domaine seigneurial, le parc de Rentilly est devenu un parc culturel, ouvert à la création et la diffusion de l'Art Contemporain.","habitants":"Princesse de Furstenberg\"","divers":"GPS : 48° 50' 44,38\" Nord, 2° 40' 11,34\" Est","gps":"48° 50' 44,38\" Nord, 2° 40' 11,34\" Est","images":["../../jctruffet.com/image/image_77/77_Rentilly_1.jpg","../../jctruffet.com/image/image_77/77_Rentilly_2.jpg"]},"Consult_chateau_formulaire40fb":{"id":"Consult_chateau_formulaire40fb","dept":"77","canton":"Pontault-Combault","commune":"Roissy en Brie","nom":"Roissy_en_Brie","type":"Château","periode":"XVII-XIX","histoire":"ROISSY EN BRIE, l'existence du château est attestée en 1665 par les mémoires du comte de Bussy Rabutin. L'édifice actuel, de style Louis XIII, est peut-être antérieur à cette date et a été fortement remanié au XIXe siècle. Propriété d'aristocrates durant le XVIIIe siècle, le château est vendu par la comtesse de Rainecourt en 1817. Il appartient successivement à diverses personnalités, dont certaines sont demeurées célèbres tels la cantatrice Maria Malibran, le médecin Photinos Panas, éminent ophtalmologiste du siècle dernier ou encore Charles Pathé, le plus grand industriel du cinéma, qui reçoit au château les plus grandes vedettes du septième art.  Fondateur de la clinique de l'Hôtel-Dieu.  Propriété de la commune, services municipaux.","architecture":"ROISSY en BRIE  Anseau de Garlande a  offert une parcelle de forêt, environ 150 hectares, aux villages de Torcy et de Roissy-en-Brie, la forêt étant à l'époque une richesse car elle est une réserve de gibiers et de bois pour la construction et le chauffage.  Il y a eu à Roissy un prieuré qui était en ruine au XIXe siècle. À cette période, du gypse est extrait et des instruments aratoires y sont fabriqués. Le château de Roissy, qui accueille actuellement lhôtel de ville, date du XVIIe siècle, il se compose d'un logis central décoré sur chacune de ses façades d'un fronton triangulaire percé d'un oeil-de-boeuf. Deux ailes en pavillon, formant chacune une forte saillie côté cour, sont alignées sur la façade côté jardin. Celle de droite est agrémentée d'une véranda ancienne dans l'esprit de la fin du XIXe siècle. Roissy absorbe la commune de Pontcarré en 1810 et s'en sépare en 1829, lui rendant ainsi son statut de commune.","habitants":"cantatrice Maria Malibran\"","divers":"Château de Roissy en  Brie","gps":"","images":["../../jctruffet.com/image/image_77/77_Roissy_en_Brie_1.jpg"]},"Consult_chateau_formulaire39d9":{"id":"Consult_chateau_formulaire39d9","dept":"77","canton":"Fontainebleau","commune":"Samois sur Seine","nom":"Samois_sur_Seine","type":"Châteaux","periode":"XVIII-XIX","histoire":"Deux châteaux dans cet article Bellefontaine et Brolles à Bois le Roi. BELLEFONTAINE  il fut la propriété du Prince Nicolas Troubetskoï, puis de Catherine Troubetskoï (1840-1875) et du Prince Nicolas Orloff, (1827-1885), Ambassadeur de Russie à Bruxelles, à Vienne, à Londres et à Paris. Il participa à la constitution de l'Alliance Franco-Russe. Il décèda au château de Bellefontaine le 29/03/1885 et bénéficia de funérailles imposantes. Le service funèbre fut célébré dans le château de Bellefontaine, selon le rite orthodoxe, en présence du nouvel Ambassadeur russe, le Baron Mohrenheim. Le Prince Vladimir Nicolaievitch Orloff, fils de Nicolas Orloff, décède à Bellefontaine, où il s'était retiré au lendemain de la Révolution russe. Le domaine du château de Bellefontaine occupe près de 4 ha sur les communes de Samois et d'Avon, sur un site classé Natura 2000.  Le projet de vente, a été présenté au conseil municipal du 13 mai 2011. Son propriétaire est devenu depuis la communauté d'agglomération du Pays de Fontainebleau depuis octobre 2018, auparavant il s'agissait de la mairie de Paris. Au XXe siècle, il fut un centre de colonies de vacances avant d'être loué pour des réceptions et des séminaires pour le personnel municipal de Samois-sur-Seine. Lancé en 2006, un projet d'aménagement pour de l'action sociale n'a pas abouti et le château se retrouve dans un état très dégradé. Le projet de vente. En mai 2011, la Ville de Paris, propriétaire du domaine depuis 1944, s'est résolue à le mettre en vente.","architecture":"A cinq K.M au nord à Bois le roi le château de BROLLES, la construction  date de 1862, pour Abel Laurent, agent de change, à la caisse des Dépôts de Paris. Une légende prétend qu'un tunnel sous la Seine aurait existé à cet endroit, ce qui est invraisemblable, au vu des moyens de l'époque et de la difficulté d'en creuser un. On sait également, que dans ce hameau existait un temple protestant où les Suisses, de service au château de Fontainebleau, venaient suivre les offices. Au fil du temps, Brolles change d'aspect et devint le séjour préféré d'artistes et d'écrivains. Le château de Brolles est devenu, aujourdhui, un centre de rééducation Fonctionnelle Infantile. Des villas remarquables, datent du XIXe et début du XXe siècle, se situent sur les bords de Seine.","habitants":"Bellefontaine:  Prince Nicolas Troubetskoï,       Brolles; Abel Laurent,\"","divers":"Samois_sur_Seine bellefontaine grav 1-2-3                                                    GPS : 48° 25' 27,49\" Nord, 2° 44' 16,72\" Est                                              Brolles grav-4-5        GPS : 48° 28' 49,61\" Nord, 2° 40' 46,71\" Es","gps":"48° 25' 27,49\" Nord, 2° 44' 16,72\" Est","images":["../../jctruffet.com/image/image_77/77_Samois_sur_Seine_1.jpg","../../jctruffet.com/image/image_77/77_Samois_sur_Seine_2.jpg","../../jctruffet.com/image/image_77/77_Samois_sur_Seine_3.jpg","../../jctruffet.com/image/image_77/77_Samois_sur_Seine_4.jpg","../../jctruffet.com/image/image_77/77_Samois_sur_Seine_5.jpg"]},"Consult_chateau_formulaired0c4":{"id":"Consult_chateau_formulaired0c4","dept":"77","canton":"Provins","commune":"Sigy","nom":"Sigy","type":"Château","periode":"XV-XVI","histoire":"SIGY, l'édifice, construit au XVe siècle, est un quadrilatère allongé flanqué de quatre tours rondes aux angles. La plus massive et spacieuse est achevée sous Henri IV. L'ensemble est entouré de douves, le pont-levis est remplacé au XVIe siècle, par un pont en pierre que défendent deux tourelles. Au début du XVIIe siècle est construit l'escalier à balustres de bois logé dans une cage voûtée à l'italienne. Au XIXe siècle les fenêtres reçoivent un encadrement de briques. Le corps de logis est flanqué d'une tour qui abrite une chambre dite de Louis XIV, et une chambre dite de Diane. Le château de Sigy appartient à la même famille depuis le XVe siècle. Un canal de 400 m alimente les douves pour la protection des pilotis. Paul-Noël de Haut de Sigy actuel propriétaire.","architecture":"SIGY,  la construction du château de Sigy date des XVe et XVIe siècles. Il a été remanié au XVIIe siècle. Il possède de larges douves, un quadrilatère flanqué de 4 tours d'angle avec une poterne d'entrée, encadrée de 2 tourelles. Son escalier de bois est de style Henri IV, la chambre ronde dite de Louis XIV, les boiseries et trumeaux datent du XVIIIe siècle. Le mobilier et les portraits de famille. Le château de Sigy est inscrit aux M.H. depuis 1984.  Éléments protégés MH : les façades et les toitures du château et des communs, y compris des deux tours ; le jardin avec ses douves; les deux ponts sur les douves ; l'escalier central intérieur y compris le dôme et les balustres de bois, les cheminées avec trumeaux de la grande chambre dans l'aile Nord et de la chambre dite de Trudaine : inscription par arrêté du 21 décembre 1984.","habitants":"Paul-Noël de Haut de Sigy\"","divers":"Sigy GPS : 48° 28' 49\" Nord, 3° 10' 25\" Est","gps":"48° 28' 49\" Nord, 3° 10' 25\" Est","images":["../../jctruffet.com/image/image_77/77_Sigy_1.jpg","../../jctruffet.com/image/image_77/77_Sigy_2.jpg","../../jctruffet.com/image/image_77/77_Sigy_3.jpg","../../jctruffet.com/image/image_77/77_Sigy_4.jpg","../../jctruffet.com/image/image_77/77_Sigy_5.jpg"]},"Consult_chateau_formulairee0e0-2":{"id":"Consult_chateau_formulairee0e0-2","dept":"77","canton":"Saint-Fargeau-Ponthierry","commune":"Seine_Poirt","nom":"Ste_Assise","type":"Châteaux","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article ste-Assise,  et Nandy.                                                                                 Sainte-ASSISE,  édifié en 1612  par Louis Lefèvre de Caumartin, ce château voit plusieurs propriétaires célèbres se succéder au cours des XVIIe siècle dont la famille de Glucq en 1700 et XVIIIe siècles, de l'homme de lettres Jean de la Chapelle, rival de Racine, à Madame de Montesson, épouse morganatique du duc d'Orléans, en passant par Jean Baptiste Glucq, directeur de la manufacture des Gobelins et Jean Baptiste de Monthullé, conseiller au Parlement. Le duc d'Orléans lui ajoute deux ailes et une pompe qui fait remonter l'eau de la Seine. Le château, quatre fois plus grand que celui d'aujourd'hui, rivalisait avec le château de Versailles. A la mort du duc en 1807, le château passe entre les mains de plusieurs propriétaires qui le ruinent. Il est racheté en 1808 par le comte de Pourtalès qui lui donne son aspect actuel.passe ensuite au  prince de Beauvau-Craon puis à son fils  Marcet à son petit-fils charles -Louis qui lui le revend en 1922  à la compagnie Radio-France  pour y installer une station de rdiodiffusion . Sainte-Assise appartient aujourd'hui à une société privée qui en a fait son siège social.","architecture":"Sainte-ASSISE La construction du château de Sainte-Assise appelé date de 1608. C'est un château de style néo-classique. de plan rectangulaire à deux niveaux et série de lucarnes sur combles flanquées de pavillons légèrement saillants aux extrémités, avant corps central  à trois niveaux, au rez de chaussées édifice fermé servant de support à une terrasse  avec attiques et fronton triangulaire sur la partie la pus haute. Son premier propriétaire fut Louis Lefèvre de Caumartin, qui en avait fait son habitation. En 1922, le prince Charles-Louis de Beauvau-Craon vendit le domaine à la Compagnie Radio France. Le site fut alors défiguré par de gigantesques antennes. En 1998, la Marine Nationale Française devint propriétaire du centre radio-électrique et l'utilise depuis pour communiquer avec les sous-marins nucléaires, les basses fréquences utilisées ayant la caractéristique de bien se propager dans l'eau. Le château de Sainte-Assise est inscrit aux M.H. depuis 1994.","habitants":"famille de Glucq\"","divers":"Ste-Assise       GPS : 48° 32' 21,05\" Nord, 2° 33' 06,57\" Est                              Nandy GPS : 48° 34' 50,88\" Nord, 2° 34' 1,2\" Est","gps":"48° 32' 21,05\" Nord, 2° 33' 06,57\" Est","images":["../../jctruffet.com/image/image_77/77_Ste_Assise_1.jpg","../../jctruffet.com/image/image_77/77_Ste_Assise_2.jpg","../../jctruffet.com/image/image_77/77_Ste_Assise_3.jpg"]},"Consult_chateau_formulaire2a94":{"id":"Consult_chateau_formulaire2a94","dept":"77","canton":"Montereau-Fault-Yonne","commune":"Thomery","nom":"Thomery","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux dans cet article ; By et  Rivière.                                                            BY   Les origines du château de By remontent au XVe siècle, rendez vous de chasse, et demeure d'un officier de la Cour de Fontainebleau, l'officier de Bigre qui avait la charge des \"abeilles du Roy\". Il fut ensuite la résidence de Henry de Bye, commandeur de l'Ordre de Saint-Jean de Latran. Pendant la guerre de 30 ans, le commandant d'un régiment écossais stationné à Fontainebleau, David de Bick, y séjourna. Au XVIIe siècle, les de Quesnoy, seigneur de Bick et de Veneux, habitèrent cette demeure, puis les Leleu leur succédèrent. Le comte d'Armaillé, gendre du Général de Ségur, signala au peintre Rosa Bonheur que le château de By était à vendre. Elle fut enthousiasmée par la maison, le parc et la forêt de Fontainebleau. Elle s'y installa en 1859. Elle avait 37 ans, et était au faîte de sa gloire. Vers la fin de sa vie, Rosa Bonheur se lia d'amitié avec une femme peintre américaine, Anna Klumpke. Celle-ci portraitiste, était venue à By pour peindre son portrait. Elle devint la confidente de l'artiste et habita au château de By.                                                                                                            RIVIERE, le château de la Rivière fut érigé, pour l'astrologue Roch le Baillif, qui fut conseiller et médecin du roi Henri IV. La construction du château de la Rivière date du XVIe-XIXe siècle. Son premier propriétaire fut Roch Le Bailli, ses héritiers le vendirent en  1670 à Béringhem ancien vallet de Louis XIII dont le petit-fils aux siècle suivant aura la charge de premier écuyer, le domaine passa aux comte de Toulouse fils légitimé de louis XIV et de madame de Montespan. Louis XV vint loger à la Rivière en 1727 et 1732. A la mort du comte de Toulouse, son fils le duc de Penthiève hérita du château et le revendit en 1770 au marquis de châteaubrun. En 1829 le propriétaire est le général Philippe de Ségur et de   la grande armée le château servait quelques fois d'asile aux invités de Louis Philippe à Fontainebleau désireux d'échapper au protocole débonnaire de la cour.","architecture":"BY;  devenue le musée de l'Atelier Rosa Bonheur est un musée municipal, installé dans les murs du château de By. Il fut dès 1859, et pendant 40 années, la maison et l'atelier de la peintre animalière Rosa Bonheur (1822-1899). elle acheta en 1859 le château de By, situé à la lisière de la forêt de Fontainebleau . Peintre animalier, Rosa Bonheur fit aménager des enclos pour ses animaux dans le parc du château et apporta plusieurs transformations pour rendre le château de la Tour de By, plus confortable. C'est au-dessus des communs qu'elle fit construire un vaste atelier, de style néo-gothique, qui lui apporta l'espace et la lumière, dont elle avait besoin pour peindre. L'atelier est représentatif de ce qu'était un atelier de peintre de grand renom, au XIXe siècle. C'est là que l'Impératrice Eugénie lui remit, en 1865, la Légion d'Honneur. Buffalo Bill fit don à l'artiste d'un habit d'indien, présent encore aujourd'hui dans le musée. Le Musée de l'atelier Rosa Bonheur contient principalement les objets de la vie quotidienne de l'artiste, le lieu étant resté inchangé depuis sa mort en 1899. Ses uvres ont été dispersées dans différents Musées français. Depuis 2011, le château de la Tour-de-By porte le Label « Maison des Illustres »,  est en vente depuis l'été 2014.                                         RIVIERE l'escalier qui descent  est l'oeuvre du duc de Penthiève qui avait la passion des sciences exactes il installa dans le pavillon du parc une collection de pendules.","habitants":"tour de By; Rosa Bonheur                               Rivière;  Roch Le Baillif\"","divers":"Deux châteaux dans cet article ; By grav 1-2 et  Rivière grav 6-7-8. GPS : 48° 23' 46,28\" Nord, 2° 47' 0,17\" Est                                                        Riviere  GPS : 48° 24' 38\" Nord, 2° 45' 57\" Est                                                  By GPS : 48° 23' 46\" Nord, 2° 47' 00\" Est","gps":"48° 23' 46,28\" Nord, 2° 47' 0,17\" Est","images":["../../jctruffet.com/image/image_77/77_Thomery_1.jpg","../../jctruffet.com/image/image_77/77_Thomery_2.jpg","../../jctruffet.com/image/image_77/77_Thomery_3.jpg","../../jctruffet.com/image/image_77/77_Thomery_4.jpg","../../jctruffet.com/image/image_77/77_Thomery_5.jpg","../../jctruffet.com/image/image_77/77_Thomery_6.jpg","../../jctruffet.com/image/image_77/77_Thomery_7.jpg","../../jctruffet.com/image/image_77/77_Thomery_8.jpg"]},"Consult_chateau_formulaire5179":{"id":"Consult_chateau_formulaire5179","dept":"77","canton":"Torcy","commune":"Torcy","nom":"Torcy_Noisiel","type":"Château","periode":"XVIII-XIX","histoire":"Deux châteaux dans cet article; Charmettes et Torcy.                                   CHARMETTES Il fût bâti et fut appelé le château Duval, pour Alphonse Duval, maire de Torcy, de 1900 à 1908. Puis il changera de mains, plusieurs fois, racheté par des Industriels puis par des Notables de la ville, avant d'être laissé à l'abandon. En 1910, le château des Charmettes est racheté par Mr. Debraine. Puis,en 1914, il appartiendra à Auguste Fontaine, un riche homme d'affaires qui possède des distilleries,   en Indochine.  Le château sera appelé le château des Charmettes et sera agrandi d'une pièce, à l'arrière, servant de salle de billard. Ruinée en 1929, par la crise, la Famille Fontaine revend le château à Stefan Wieder, réfugié hongrois, dont le nom francisé devient Viédère, qui l'occupa jusqu'en 1945. Dans les années 1946-1947, Mr Harris, Vice-Ambassadeur des États-Unis habita dans le château. De 1947 jusqu'en 1954, le domaine appartient à Mmes Uguen et Boisseau qui ouvrirent une école de sténo-dactylographes. En 1954, le comité d'entreprise d'Air France acquiert le château pour y aménager un centre aéré pour ses salariés. Puis après avoir été laissé à l'abandon, quelques années, la municipalité reprit possession du domaine et y installa ses services administratifs, ouvrant le parc au Public. Le parc est planté de plus de 30 essences rares. En 1989, pour commémorer le 200 ème anniversaire de la Révolution Française,  le parc du château des Charmettes s'est enrichi d'un ginkgo-biloba, arbre choisi par le département de Seine-et-Marne, qui symbolise l'arbre de la Liberté. La Commune de Torcy l'a racheté et y a installé les services administratifs de la Mairie.","architecture":"TORCY il date du XIXe siècle a été bâti, en 1748, par le fermier général Gaspard-Hyacinthe de Caze. Mme de Caze, réputée pour sa beauté, attira à Torcy le Prince de Kaunitz. La belle-sur du châtelain, la marquise de Calvison qui était une maîtresse de Louis XV, avait une chambre particulière dans le château. Anne-Nicolas-Robert de Caze prit, en 1762, la succession de son père.  Le château est revendu en 1781 à Le Carpenterie, Écuyer de la Reine, avant dêtre acquis, en 1792, par Mathieu-Bernard Goudin. Le dernier propriétaire est le Baron de Crouseilhes. Ce dernier le vend  en 1838 à un spéculateur qui le démolit pour vendre les matériaux et les dépendances. Aujourdhui, en dehors de quelques noms de rues évocateurs comme celle de la Faisanderie, de lOrangerie, des Écuries, il ne subsiste de ce château quune partie du parc et une chapelle expiatoireLe parc clos paysager de 2ha avec son plan deau et ses arbres centenaires garantie un environnent sans nuisance ainsi quune intimité totale.                                                                     A deux K.M à l'ouest NOISIEL, Emile-Justin Menier fait construire en 1855 face de l'entrée principale de la chocolaterie et au moulin, une demeure baptisée petit château par référence au grand château toujours occupé par le duc de Lévis. Construite par Bonneau, elle sera refaçonnée par Jules Saulnier qui lui flanquera deux demi-rotondes latérales. Émile Justin Menier décédera au petit château le 17 février 1881. En juillet 1944, le grand château ne supportera pas le bombardement et la situation économique et financière n'étant plus ce qu'elle était, les Menier ne peuvent assurer la rénovation et l'édifice sera détruit en 1954.  Éléments protégés MH : les façades et les toitures du petit château, de l'orangerie et des écuries : inscription par arrêté du 12 juin 1986.","habitants":"Famille de  Alphonse Duval                                          Torcy ; général Gaspard-Hyacinthe de Caze.\"","divers":"Deux châteaux dans cet article; Charmettes grav-1-2 et Torcy Noisel grav-3  GPS : 48° 51' 01\" Nord, 2° 39' 03\" Est","gps":"48° 51' 01\" Nord, 2° 39' 03\" Est","images":["../../jctruffet.com/image/image_77/77_Torcy_Noisiel_1.jpg","../../jctruffet.com/image/image_77/77_Torcy_Noisiel_2.jpg","../../jctruffet.com/image/image_77/77_Torcy_Noisiel_3.jpg"]},"Consult_chateau_formulaire7386":{"id":"Consult_chateau_formulaire7386","dept":"77","canton":"Coulommiers","commune":"Mautpertuis","nom":"Tour_de_gardes","type":"Vestiges","periode":"XIII","histoire":"TOUR DES GARDES  La tour crénelée, appelée la Tour des Gardes, fut achevée de construire au 3ème quart du XIIIe siècle. Les architectes étaient Claude-Nicolas Ledoux et Alexandre-Théodore Brongniart. Elle abrita bon nombre de mousquetaires du roi : Louis II de Melun (1634  1721), fils de Louis de Melun, fut le premier à intégrer la compagnie des Mousquetaires du roi. Joseph de Montesquiou (1651-1729), dit le comte d'Artagnan, capitaine de la 1ière compagnie des mousquetaires, Louis de Montesquiou, cousin de Joseph de Montesquiou. Pierre de Montesquiou d'Artagnan, frère de Louis de Montesquiou et seigneur d'Artagnan et de Mauperthuis, maréchal des camps, puis Lieutenant général des armées du roi. Enfin Anne-Pierre de Montesquiou-Fezensac, fils unique de Pierre et seigneur de Mauperthuis et de Coulommiers. La commune de Mauperthuis, où se situe la Tour des Gardes, possède un patrimoine riche. Malheureusement, le patrimoine historique situé dans le jardin du Moulin de Mistou n'est pas assez exploité : la Pyramide et la Tour des Gardes, tombaient en ruines. La Tour des Gardes, située au bord de la Départementale 402, a donc été remise à neuf et profite aux 11 000 usagers quotidiens. La Tour des Garde a été inscrite aux M.H. en 1989.","architecture":"La tour s'insérait dans le parc du château de Mauperthuis, aujourd'hui disparu, construit dans le troisième quart du XVIIIe siècle par les architectes Claude-Nicolas Ledoux et Alexandre-Théodore Brongniart.Ce parc dessiné à l'anglaise, était conçu comme un \"parcours initiatique\" à réaliser en y cheminant.  La tour crénelée est inscrite au titre des monuments historiques depuis un arrêté du 16 juin 1989les mousquetaires Elle abrita bon nombre de mousquetaires du roi . La commune de Mauperthuis, où se situe la Tour des Gardes, possède un patrimoine riche. Malheureusement, le patrimoine historique situé dans le jardin du Moulin de Mistou n'est pas assez exploité : la Pyramide et la Tour des Gardes, tombent en ruines.\nLa Tour, située au bord de la Départementale 402, a donc été remise à neuf et profite aux 11 000 usagers quotidiens.","habitants":"Mousquetaires du roi\"","divers":"la Tour des Gardes au  château de Mauperthuis    GPS : 48° 45' 55\" Nord, 3° 01' 57\" Est","gps":"48° 45' 55\" Nord, 3° 01' 57\" Est","images":["../../jctruffet.com/image/image_77/77_Tour_de_gardes_1.jpg"]},"Consult_chateau_formulaire196f":{"id":"Consult_chateau_formulaire196f","dept":"77","canton":"Ozoir-la-Ferrière","commune":"Tournan en brie","nom":"Tournan_en_Brie","type":"Châteaux","periode":"XVII-XVIII","histoire":"Trois châteaux dans cet  article; Boulayes,  Combreux et Garlande                                                                                                  COMBREUX, le château de Combreux a été construit en 1770. Il est de style Néo-Classique. Premier gentilhomme du prince de Condé Son fils, le marquis de Jaucourt, maire de Presles et député de Seine-et-Marne, et ministre d'État, pair de France,  Le marquis de Jaucourt meurt au château de Combreux en 1852. Ses héritiers vendent la propriété à Jules-François Hennecart, député de la Vienne, qui est maire de Presles entre 1856 et 1870. Il meurt au château en 1888, en 1896, le château est donné aux Surs de Saint Vincent de Paul en vue d'y créer une maison de retraite pour les religieuses.  Par la suite, Louis-Adrien Mentienne, maire de Tournan-en-Brie en 1927, devient propriétaire du château ainsi que du domaine agricole. Il y meurt en 1928. À partir de 1915 et jusqu'en 1930 la maison de retraite est remplacée, dans l'ancienne ferme attenante, par un premier orphelinat pour jeunes filles. De 1931 à 1940, il devient orphelinat pour jeunes garçons transféré de l'orphelinat de Vaugirard. De 1939 à 1941, Combreux accueille l'école Saint-Joseph de Matzenheim qui a dû fuir l'Alsace devant l'armée allemande. Il appartient depuis à la Fondation d'Auteuil. C'est devenu un Centre d'Hébergement pour des Jeunes. Abrite, depuis 1998, la résidence sociale Frédéric Ozanam, gérée par la Fondation d'Auteuil, qui regroupe un Foyer de Jeunes Travailleurs, un Centre d'Hébergement d'urgence, et de Réinsertion Sociale et une Micro-Crèche.  justifiant d'un projet professionnel. Ces résidents sont des personnes célibataires. La résidence propose, à chacune de ces personnes, une aide à la réinsertion sociale et professionnelle. Suivant leur projet, les résidents peuvent rester au Château de Combreux, de quelques mois à 2 ou 3 ans.","architecture":"BOULAYES,  le château, de style néo-classique, est construit en 1785 par Nicolas Girardin, collaborateur d'Étienne Boullée, pour Claude Bellanger, lieutenant des gardes de la maison du roi et protégé de Madame du Barry. Girardin s'est inspiré de l'hôtel de Thun, proche de la chaussée d'Antin, pour édificer le château. Bellanger peut entreprendre cette belle et grande construction grâce à la dot de son épouse, fille d'un banquier génois. Bellanger émigre à la Révolution ; son château est confisqué et vendu comme bien national.  est de style néo-Classique et date du XVIIIe au XIXe siècle. Il fût construit, en Juillet 1785, par l'architecte Nicolas-Claude Girardin, qui fut le collaborateur d'Étienne-Louis Boullée, pour Claude Bélanger, colonel des gardes du corps du roi. Il put entreprendre cette grande construction grâce à la dot de son épouse, qui était la fille d'un banquier génois. Bellanger émigrera à la Révolution pour sauver sa peau mais son château sera confisqué et vendu comme bien national.  Éléments protégés MH : les façades et les toitures du château : inscription par arrêté du 18 juin 1946.  L'édifice se compose d'un logis rectangulaire à deux étages couvert en terrasse, d'un avant-corps central, d'une vaste cour d'honneur, de douves, une belle grille de fer forgé, un parc, un potager et un colombier au lieu dit le Châtelet.                                                                              GARLANDE Le château de Garlande est devenu, aujourd'hui, la Mairie de Tournan-en-Brie.","habitants":"Boulayes; Madame du Barry, famille Bellanger \"","divers":"trois châteaux dans cet  article; Boulayes grav2-3   ,  Combreux grav-1et Garlande grav-4                    GPS : 48° 43' 28,56\" Nord, 2° 47' 48,48\" Est","gps":"48° 43' 28,56\" Nord, 2° 47' 48,48\" Est","images":["../../jctruffet.com/image/image_77/77_Tournan_en_Brie_1.jpg","../../jctruffet.com/image/image_77/77_Tournan_en_Brie_2.jpg","../../jctruffet.com/image/image_77/77_Tournan_en_Brie_3.jpg","../../jctruffet.com/image/image_77/77_Tournan_en_Brie_4.jpg"]},"Consult_chateau_formulairec39a":{"id":"Consult_chateau_formulairec39a","dept":"77","canton":"La Ferté-sous-Jouarre","commune":"Ocquerre","nom":"Trousse","type":"Château","periode":"XVI-XIX","histoire":"TROUSSE; Le château d'origine fut construit vers 1630 sous le règne de Louis XIII par Sébastien Le Hardy dont la famille y vécut jusqu'en 1791. On dit que Louis XIV l'a visité vers 1651 et a commenté que le château était « bien troussé », suggérant peut-être l'origine du nom château de la Trousse. Le roi conféra le titre de marquis à la famille Le Hardy en 1651.\nLe château a été rénové et amélioré au cours des années 1680 lorsque le propriétaire de l'époque, le marquis Philippe-Auguste Le Hardy, a fait appel aux services de l'architecte Libéral Bruant. En 1684, leur seul enfant, Marie-Henriette Le Hardy, épousa un prince d'Italie du Nord, Amédée-Adolphe dal Pozzo, marquis de Vognère.  Philippe-Auguste Le Hardy mourut en 1691, et Amédée et Marie-Henriette dal Pozzo héritèrent du domaine. Leur petite-fille, Marie-Henriette-Augustine-Renée d'Alpozzo de La Trousse (1748- le 19 janvier 1836 à Lizy-sur-Ourcq, dont elle avait aussi la seigneurie ; épouse en 1766 de Louis-Auguste Jouvenel des Ursins, comte d'Harville), a ensuite obtenu puis vendu le domaine en 1791 à Charles-Guillaume Baudon, comte de Mony-Colchen ; c'est désormais cette nouvelle famille qui a en charge La Trousse, jusqu'en 1998.  Le domaine est tombé en désuétude pendant la Révolution française. En 1814, l'armée napoléonienne a mis le feu à l'orangerie comme un signal que les Cosaques approchaient. En 1829, les propriétaires ont permis aux spéculateurs de vendre les matériaux de construction pour recueillir les fonds nécessaires.  En 1865, le petit-fils de l'acquéreur de 1791, le comte Charles-Victor Baudon de Mony-Colchen, achève la construction du nouveau château actuel.","architecture":"TROUSSE. Il a également organisé la rénovation de l'orangerie et de l'écurie d'origine (datant de 1630) ainsi que les nouveaux jardins.  Pendant la dernière partie de la Première Guerre mondiale, les troupes américaines étaient en garnison au château en lien avec les batailles à Château-Thierry et du Bois-Belleau. À la fin de la guerre, le comte érige le monument commémoratif de la guerre à l'entrée du château sur la D401, en signe de gratitude que son fils ait survécu. Pendant la seconde guerre mondiale, La Trousse fut réquisitionnée par les Allemands et les greniers de la cour servaient d'hôpital de campagne. Les troupes alliées avancent de Normandie et atteignent La Trousse le 24 août 1944. Une bataille de chars s'ensuit et un char allemand est touché dans l'allée. Les combats cessèrent le lendemain quand Paris fut libéré le 25 août 1944.  Le château est resté la propriété de la famille Baudon jusqu'en 1998, lorsque le comte Xavier Baudon de Mony a vendu le domaine à un propriétaire néerlandais, Hans Musegaas. La famille de Mony ne pouvait pas supporter les coûts croissants de l'entretien. Le château et les bâtiments ont depuis été rénovés et divisés en plusieurs appartements privés. Les copropriétaires assument conjointement la responsabilité de l'entretien et de l'amélioration du château et de son domaine de 40 hectares. Parmi les caractéristiques notables au château de la Trousse, on trouve la chapelle, la prison et le pigeonnier.","habitants":"famille Le Hardy\"","divers":"La Trousse    49° 01' 08? nord, 3° 04' 11? est","gps":"","images":["../../jctruffet.com/image/image_77/77_Trousse_1.jpg"]},"Consult_chateau_formulaire483e":{"id":"Consult_chateau_formulaire483e","dept":"77","canton":"Melun","commune":"Vaux le penil","nom":"Vaux_le_Penil","type":"Château","periode":"XVI-XVII","histoire":"VAUX le PENIL en banlieu sud de Melun  En 1050, un édit royal fait apparaître le nom du seigneur de Pény, propriétaire du château féodal ; les rois de France habitant Melun, le château est la citadelle avancée. La famille de Pény y résidera jusqu'en 1530. Vers 1560, le château féodal transformé, fait place à un château Renaissance. En 1588, le château est saccagé par la Ligue. Le 16 avril 1590, Henry IV installe son quartier général dans la salle des Gardes pour le siège de Melun. En 1610, un troisième château, plus petit, est reconstruit. Il est démoli et reconstruit une quatrième fois en 1766, pour Michel Louis Fréteau de Saint Just, premier secrétaire de Marie Leszczynska, épouse de Louis XV. Son fils, Michel-Philippe hérite de l'édifice en 1789, arrêté dans le parc du château le 4 mai il est éxécuté le 26 Prairial de l'an II. A la chute de l'Empire, le tsar Alexandre 1er installe son quartier général le 29 août 1815. La propriété est vendue en 1892 au banquier Elphrussi qui fait agrandir le château, y transporte les boiseries de l'hôtel particulier de Samuel Bernard, financier de Louis XIV et de Louis XV.\nÉléments protégés MH : les façades et les toitures du château et le parc : inscription par arrêté du 23 novembre 1946.","architecture":"LOUIS XV, ce château se situe sur deux communes, dont à Vaux-le-Pénil. Moins connu, il est défini comme une « authentique folie de  Louis XV, de 75 hectares dont 19 de parc à langlaise clos de murs, abrite un château classé ISMH de 800 m² et de ses dépendances (Salles de réception, écuries, maison de gardien, serre, orangerie et son pavillon de chasse). Le château construit en 1750, possède une excellente répartition des surfaces à vivre complétée par une restauration de très grande qualité. Ainsi, au gré de la découverte, une belle entrée parée de ses médaillons dempereurs romains, deux élégantes salles à manger donnant sur les terrasses du parc, un salon de bois rose très lumineux et enfin un somptueux salon de réception traversant avec vue tripartite sur le parc. Un romantisme et une authenticité qui ont un prix puisque son prix est fixé à plusieurs millions d'Euros.","habitants":"Michel Louis Fréteau de Saint Just\"","divers":"Vaux  GPS : 48° 31' 33\" Nord, 2° 40' 57\" Est                                                                     GPS : 48° 31' 52,93\" Nord, 2° 39' 59,15\" Est","gps":"48° 31' 33\" Nord, 2° 40' 57\" Est","images":["../../jctruffet.com/image/image_77/77_Vaux_le_Penil_1.html","../../jctruffet.com/image/image_77/77_Vaux_le_Penil_2.jpg"]},"Consult_chateau_formulaireeeed":{"id":"Consult_chateau_formulaireeeed","dept":"77","canton":"Melun","commune":"Maincy","nom":"Vaux_le_Vicomte","type":"Palais","periode":"XVII","histoire":"VAUX LE VICOMTE  au début du XVIIe siècle,  En 1641, un parlementaire, Nicolas Fouquet, achète cette seigneurie.  Cette réussite est l'uvre du génie d
