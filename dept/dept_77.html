e trois hommes : l'architecte Louis Le Vau, le peintre décorateur Charles Le Brun et le jardinier-paysagiste André Le Nôtre. Louis XIV l'a souhaitée pour tromper Fouquet dont il a décidé secrètement la mort. Fouquet est heureux de mettre Vaux le Vicomte aux pieds du souverain qu'il a toujours servi fidèlement, il ne doute pas de mériter la fonction de premier ministre, ce fut une splendide journée d'été. Nicolas Fouquet et son épouse inauguraient Vaux le Vicomte en présence du Roi qui avait exprimé le désir de la Reine Mère et d'une partie de la Cour. Ainsi cette fête sans précédent, qui fut le modèle des fêtes royales à venir, marquait l'apogée de Nicolas Fouquet,  celui-ci n'en doutait pas. Seul Louis XIV savait (avec la Reine-Mère et Colbert) que le surintendant était à quelques heures de sa chute ; pour Louis XIV, les applaudissements de cette fête qui allaient à un autre que lui, cette demeure plus fastueuse que ses palais, ces jardins magiques, avaient constitué autant d'épreuves amères pour son amour propre, Nicolas Fouquet arrêté, condamné au cachot à vie, sa femme exilée, le château est mis sous scellés, le Roi saisit,  Il coûta 10 ans de patience à madame Fouquet pour récupérer ce bien où elle se retira avec son fils aîné. Après la mort de son mari en 1680, elle perd aussi son fils, aussi en 1705 elle se résout à mettre Vaux le Vicomte en vente. C'est le plus grand chef militaire du Royaume, le Maréchal de Villars, duc et pair de France, qui s'en rend possesseur. Ce militaire appréciait Vaux Le Vicomte où il se délassait de ses campagnes militaires avec sa ravissante épouse.","architecture":"VAUX le Vicomte II; En 1764 le fils du Maréchal de Villars le vendit au Duc de Praslin, dont les descendants conservèrent la propriété pendant plus d'un siècle avant de la mettre en vente, après trente années d'abandon. Le 6 Juillet 1875, un amateur averti, Monsieur Alfred Sommier, acheta Vaux le Vicomte, mis aux enchères publiques. Le château était vide, une partie des dépendances en ruine, et le jardin avait disparu. Un immense travail de restauration et de remeublement commençait. A la mort d'Alfred Sommier en 1908, le château de Vaux le Vicomte et le jardin avaient retrouvé leur aspect d'origine, son fils Edme et sa belle fille achevèrent son uvre. Aujourd'hui ses descendants directs, Patrice et Cristina de Vogüé poursuivent la sauvegarde de Vaux le Vicomte ,  Eléments protégés  communs et tous bâtiments, clôtures, grilles, jardins avec leurs terrasses et statues, bassins, suivant ensuite l'allée de la Gerbe et la lisière des parties boisées autour de l'extrémité est du canal ; à l'est, la ligne du côté ouest de l'allée des Sapins. En dehors de ces limites : deux aqueducs d'adduction d'eau sous la grande allée nord-sud derrière la statue d'Hercule et sous la grande allée nord-ouest/sud-est partant du rond-point de l'Hercule (dite allée des Granges) et réservoirs souterrains dans toute leur étendue. qui les bordent et les deux files d'arbres en arrière de cette rangée : classement par arrêté du 23 juin 1965. Les parcelles dépendant du parc du château : classement par arrêté du 11 mars 1968.","habitants":"Famille de  Nicolas Fouquet,\"","divers":"Maincy   GPS : 48° 33' Nord, 2° 42' Est                                                                    vaux   GPS : 48° 33' 49,37\" Nord, 2° 42' 52,24\" Est GPS : 48° 33' 49,37\" Nord, 2° 42' 52,24\" Est","gps":"48° 33' Nord, 2° 42' Est","images":["../../jctruffet.com/image/image_77/77_Vaux_le_Vicomte_1.jpg","../../jctruffet.com/image/image_77/77_Vaux_le_Vicomte_2.jpg","../../jctruffet.com/image/image_77/77_Vaux_le_Vicomte_3.jpg"]},"Consult_chateau_formulaire82cd":{"id":"Consult_chateau_formulaire82cd","dept":"77","canton":"Montereau-Fault-Yonne","commune":"Vernou la celle sur seine","nom":"Vernou_la_Celle","type":"Châteaux","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article Argeville  et Graville .   Village voisin  Vernou-la-Celle-sur-Seine.                                                                                     ARGEVILLE, comporte le Parc, les communs, la clôture, la petite porte d'accès à la ferme, le portail d'entrée sont inscrits aux M.H. depuis le 11/07/1986. Le château d'Argeville est privé, fermé au Public. Il existe 2 Châteaux sur la commune de Vernou-la-Celle-sur-Seine, à découvrir : Le château d'Argeville (Privé),","architecture":"GRAVILLE, Village voisin, une première de la  forteresse est construite vers 1235, et ruinée au début du XVIe siècle. La construction d'un château neuf est entreprise à partir de 1580, par l'architecte Baptiste Androuet du Cerceau. Ce dernier utilise les fondations de l'ancienne forteresse et reprend le plan rectangulaire permettant une construction moderne symétrique. Les jardins, représentés sur une carte des chasses du roi du début du XVIIIe siècle, consistent en parterres devant le corps de logis, prolongés par une demi lune et une patte d'oie qui ouvrent sur les bois. En 1863, la comtesse de Lancosme ne conserve que le corps central et fait raser le reste. Le bâtiment central est intérieurement transformé ainsi que les jardins  en parc paysager par Denis Bühler . inscription par arrêté du 15 septembre 2006  les façades et les toitures du château ; les douves ; les façades et les toitures des communs ; le parc ; les deux cheminées monumentales dans le vestibule et la salle à manger du château : inscription par arrêté du 15 septembre 2006                                                  par l'architecte Baptiste Androuet du Cerceau. Ce dernier utilise les fondations de l'ancienne forteresse et reprend le plan rectangulaire permettant une construction moderne symétrique. Les jardins, représentés sur une carte des chasses du roi du début du XVIIIe siècle, consistent en parterres devant le corps de logis, prolongés par une demi lune et une patte d'oie qui ouvrent sur les bois.","habitants":"Seigneurs locaux\"","divers":"Deux châteaux dans cet article Argeville grav-1 et Graville grav 2. Trois châteaux   GPS : 48° 23' 23,28\" Nord, 2° 51' 12,6\" Est                                                             graville  GPS : 48° 24' 14\" Nord, 2° 49' 43\" Est                         GPS : 48° 23' 23,28\" Nord, 2° 51' 12,6\" Est","gps":"48° 23' 23,28\" Nord, 2° 51' 12,6\" Est","images":["../../jctruffet.com/image/image_77/77_Vernou_la_Celle_2.jpg"]},"Consult_chateau_formulaire0606":{"id":"Consult_chateau_formulaire0606","dept":"77","canton":"Provins","commune":"Jaulnes","nom":"Villeceaux","type":"Châteaux","periode":"XVI-XVII-XVIII","histoire":"VILLECEAUX  à l'origine, le fief de Villeceaux ne fait pas partie de la seigneurie de Jaulnes. Il est indépendant et relève de la grosse tour de Bray. Del Bene, d'origine florentine, acquiert cette terre de Nicolas Jammes, seigneur en 1577. Il y fait commencer la construction du château, qui sera achevé par ses descendants. En 1720 environ, deux ailes y sont ajoutées. Deux tourelles sont détruites pendant la Révolution. Le château de Villeceaux a été très restauré au XIXe siècle. Le parterre du parc est sans doute dessiné selon les plans de André Le Nôtre.\nÉléments protégés MH : les façades et les toitures du château et des bâtiments des communs et les anciennes douves : inscription par arrêté du 3 avril 1984.","architecture":"VILLECEAUX, par le plus grand des hasards, en visitant la région. Le château de Villeceaux se situe dans le petit village de Jaulnes,\nCe château date des XVe, XVIe, et XVIIe siècles. C'est la propriété d'une personne privée qui l'a acheté en 1992.  On peut admirer ses façades, ses toitures, et ses batiments en communs ainsi que ses anciennes douves, qui sont inscrits au M.H.  le 3.04.1984. A l'origine, le château de Villeceaux ne faisait pas partie de la seigneurie de Jaulnes. Indépendant, celui-ci relevait de la Grosse Tour de Bray.","habitants":"Seigneur local                         Del Bene, \"","divers":"GPS : 48° 24' 15,12\" Nord, 3° 15' 46,08\" Est","gps":"48° 24' 15,12\ n faire un Complexe Hôtelier.                                    LAMIRAULT dans les environs de Villeneuve La Ferme de Lamirault est une maison seigneuriale, bâtie au XVIIe siècle, à Collégien et Croissy-Beaubourg, . Cette ferme fortifiée s'étend à la fois sur les deux communes. Fouché en fit l'acquisition et fit transformer le château de Lamirault en ferme. La Ferme a la particularité dêtre entourée de fossés, déjà mentionnés au XIVe siècle. Lédifice sera plus tard acquis par James de Rothschild.              La Ferme de Lamirault a été inscrite aux M.H.","habitants":"Villeneuve                                Marguerite Bellanger  Moussy  Colonel Yves Picot \"","divers":"GPS : 49° 02' 00\" Nord, 2° 38' 24\" Est\nMoussy  GPS : 49° 02' 50\" Nord, 2° 37' 29\" Est","gps":"49° 02' 00\" Nord, 2° 38' 24\" Est","images":["../../jctruffet.com/image/image_77/77_Villeneuve_Dammartin_1.jpg","../../jctruffet.com/image/image_77/77_Villeneuve_Dammartin_2.jpg"]},"Consult_chateau_formulaire6ef8":{"id":"Consult_chateau_formulaire6ef8","dept":"77","canton":"Coulommiers","commune":"St_Barthélémy","nom":"Villers_les_Maillets","type":"Châteaux","periode":"XVII","histoire":"Villers MAILLETS  construit sur l'emplacement d'un ancien château. Il fut réalisé selon les plans de l'architecte Firmin Perlin, pour Messire Daguin de Villette qui était propriétaire du domaine, depuis 1760. De style néo-clasique, le château possède un logis dont la façade à fronton est semi-circulaire et donne sur la cour d'honneur. La partie centrale est faite d'un avant-corps en refend sur toute la hauteur. La tour médiévale circulaire qui se trouve à proximité est un vestige de l'ancien château féodal. Après s'être caché sous la Terreur, Daguin de Villette décèda, en 1803. Le château de Villiers-les-Maillets a été racheté, par Mme de Flamarens. Construit par l'architecte parisien Firmin Perlin  (1747-1783) pour Antoine comte Daguin de Villette (1725-1803) qui possédait le fief depuis le 18 décembre 1761, l'ayant acquis de François des Cressonnières. Le gros-uvre fut achevé en 1775. D'un style original néo-classique, La chapelle a été construite par Etienne Bessot comte de Lamothe à la fin du XIXe siècle, lorsqu'il hérita du domaine de sa petite-cousine, Alix de Mastin, arrière-petite-fille de la marquise de Flamarens qui fut l'adjudicataire du château en 1804, à la suite du décès d'Antoine Daguin de Villette. Elisabeth-Olympe-Louise-Armande-Félicité du Vigier, marquise de Flamarens, née à Bordeaux et baptisée le 14 novembre 1752 en l'église métropolitaine et primatiale Saint-André de Bordeaux, décéda en son château de Villiers-les-Maillets le 17 novembre 1835. Elle épousa le 1er Décembre 1767, le frère jumeau du vicaire général de Monseigneur Phélypeaux dHerbault, Agésilas-Joseph de Grossolles (1732-1818), marquis de Flamarens, baron de Montastruc et dAurenque, vicomte de Saint-Martin, seigneur de Peyrecave,Tonneins et Montastruc (disparu). La marquise de Flamarens sera « Dame pour accompagner » Mme Adélaïde, 4ème fille de Louis XV et vécu à la Cour de Versailles, de 1771 à 1783. Orpheline de mère, à 1 an et de père à 10 ans, elle vécut son enfance sous la protection de son oncle maternel, monseigneur Georges-Louis Phélypeaux d'Herbault.","architecture":"A Versailles, la marquise de Flamarens disposa d'un appartement au Grand Commun. Elle rejoignait souvent le comte et la comtesse de Maurepas dans leur appartement situé au-dessus de celui du Roi ainsi qu'à l'Ermitage mis à la disposition du comte de Maurepas  A la Révolution, la marquise de Flamarens revendit de nombreux biens et pour acquérir le château de Villiers-les-Maillets, elle se sépara de son château familial de Saint-Martin-Lamonzie qu'elle revendit le 12/10/1803, au Général-comte Jean Boudet (1769-1809), en l'étude de Maître Denis, notaire à Paris. C'est ainsi que le château de la Famille du Vigier est toujours conservé. Le domaine de Villiers-les-Maillets est composé de 3 fermes, d'un parc et des bois. D'un style original néo-classique, doté d'un seul étage et de combles, le corps de logis se caractérise par sa façade donnant sur la cour d'honneur, avec en partie centrale un avant-corps en refend sur toute la hauteur, coiffé d'un fronton de forme curviligne bordé par une corniche rampante qui, avec la corniche horizontale, enserrent le tympan vertical pour mieux le mettre en valeur. La corniche se déroule en modillons, en périphérie du logis, comme une dentelle jouant en permanence avec la lumière et les ombres créées par le soleil. La tour médiévale circulaire qui se trouve à proximité est un vestige de l'ancien château féodal ainsi que les douves en eau qui entoure le château actuel situé au même emplacement que le précédent ; la maison du garde-chasse au bord des douves date de la même époque.","habitants":"Antoine comte Daguin de Villette\"","divers":"Villers les Maillets                                                                                       GPS : 48° 49' 02\" Nord, 3° 21' 41\" Est","gps":"48° 49' 02\" Nord, 3° 21' 41\" Est","images":["../../jctruffet.com/image/image_77/77_Villers_les_Maillets_1.jpg","../../jctruffet.com/image/image_77/77_Villers_les_Maillets_2.jpg"]},"Consult_chateau_formulaire4028":{"id":"Consult_chateau_formulaire4028","dept":"77","canton":"Melun","commune":"Voisenon","nom":"Voisenon","type":"Château","periode":"XV-XVIII","histoire":"VOISENON   Le château a appartenu à la famille de Fusée de Voisenon jusqu'à la fin du XVIIIe siècle. Seigneurs de Voisenon depuis le XVe siècle, cette famille compte parmi ses membres un homme célèbre: l'abbé Claude-Henri de Fusée de Voisenon, né à Paris en 1708 et mort au château de Voisenon en 1775. Avant dernier abbé de l'abbaye du Jard, il a été historiographe des petits-fils de Louis XV, ami de Voltaire, poète épicurien et auteur dramatique. Au début du XIXe siècle, le château qui avait gardé jusque-là un style Louis XIII, très pur, fut restauré dans le style néo-grec qu'il a conservé après les aménagements effectués par la marquise Des Ligneries et monsieur Reithlinger. En 1930 les religieuse de Nazareth s'installent à Voisenon et ouvrent un pensionnat de jeunes filles. En 1940 l'édifice est occupé quatre ans par les allemands. L'école reprend en septembre 1944 et devient mixte en 1975. Il possède un bel avant-corps à colonnes engagées et fronton sculpté, et un escalier à rampe de fer forgé Louis XV.","architecture":"JARD ou VOISENON, Il existe deux châteaux à Voisenon. Le plus ancien est le château du Jard qui fut construit sur lancien domaine de labbaye du Jard du XIIe et XIIIe siècle. Le château du Jard a conservé ses façades, de style Louis XIII. Son parc inventorié en 1991 est agrémenté dune ancienne crypte, dun pont de pierre, une glacière souterraine et de deux Sphinx.                                                   Du JARD au retour d'une journée de chasse dans les bois de Melun, le roi et la reine font une halte près du ruisseau du Petit-Jard. La reine est séduite par l'endroit et décide d'y faire construire une demeure royale. C'est dans son château du Jard qu'elle met au monde, le 22 août 1165, Philippe Auguste l'héritier tant attendu, qui permit à la race capétienne de se perpétuer, il sera sacré Roi en 1179. En 1203, elle invite les religieux du Prieuré de Pacy à venir s'installer dans son château afin d'y établir une abbaye, l'Abbaye Royale du Jard-la-Reine-lez-Melun. Pendant la Révolution française, le domaine du Jard est acquis le 4 janvier 1791 par M. Jacques Duverger (qui devient Monsieur Jacques Claude de Vergès sous la Restauration). Le château passera ensuite entre les mains de plusieurs propriétaires. Le 28 janvier 1928 Madame Veuve Jomini vend le domaine à la société anonyme du Jard représenté par monsieur Henri Williams Jurgens, grand industriel parisien. Suite à un drame familial, monsieur Jurgens lègue la propriété, en 1949, à l'association des paralysées de France.    Depuis 50 ans le Centre ouvre ses portes aux élèves handicapés moteurs.","habitants":"Famille de Voiseron\"","divers":"Voisenon   GPS : 48° 34' 16\" Nord, 2° 39' 53\" Est","gps":"48° 34' 16\" Nord, 2° 39' 53\" Est","images":["../../jctruffet.com/image/image_77/77_Voisenon_1.jpg","../../jctruffet.com/image/image_77/77_Voisenon_2.jpg","../../jctruffet.com/image/image_77/77_Voisenon_3.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','77 — Seine-et-Marne'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
