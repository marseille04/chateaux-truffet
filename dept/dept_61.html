auche abritant le pigeonnier, et celle de droite à usage de chapelle. Le porche d'entrée dût être refait à cette époque également. N'en restent aujourd'hui que les deux piedroits dont le sommier et le départ des deux clavaux sur celui de droite témoignent de la forme en plein cintre qu'il devait avoir avant sa destruction au XIXe siècle. L'ensemble des bâtiments fut repercé et agrandi à la fin du XVIIe siècle. L'intérieur était orné d'un ensemble de boiseries d'époque Louis XIII.\r\nÉléments protégés MH : l'enceinte subsistante et les deux tours : inscription par arrêté du 26 juin 1992.","architecture":"GLAYE, fut longtemps célèbre par la splendeur de ses fêtes. Les revenus, quoique bien considérables, finirent par ne plus suffire aux dépenses : le château devint la propriété de Monsieur Paul Auguste de Boisguyon, qui le revendit à Monsieur le Comte d'Armouillé en 1852. Après la vente à Monsieur de Boisguyon, Monsieur le Marquis de Turin, Madame la Marquise, Monsieur Ernest de Turin, leur fils, s'installèrent à Nogent le Rotrou, rue Saint-Laurent. Le château a été bâti vers 1807 à la place de l'ancien par Monsieur Le Marquis de Turin. La chapelle et lorangerie étaient magnifiques, l'étang est assez vaste. La famille de Turin vint habiter Glaye après Messire de Crochet, chevalier seigneur de la Prousterie.","habitants":"Beauvais                                                                               Glaye;Monsieur Paul Auguste de Boisguyon\r\n        \"","divers":"deux château dans cet article Beauvais et Glaye                                  \r\nCeton gps 48° 13' 34\" nord, 0° 45' 00\" est","gps":"","images":["../image/image_61/61_Ceton_1.jpg","../image/image_61/61_Ceton_2.jpg","../image/image_61/61_Ceton_3.jpg","../image/image_61/61_Ceton_4.jpg","../image/image_61/61_Ceton_5.jpg","../image/image_61/61_Ceton_6.jpg","../image/image_61/61_Ceton_7.jpg"]},"Consult_chateau_formulaire3d9d":{"id":"Consult_chateau_formulaire3d9d","dept":"61","canton":"Sées","commune":"Chailloué","nom":"Chailloué","type":"Château","periode":"XVII-XIX","histoire":"CHAILLOUE, en 1333, la terre de Chailloué est aux mains de Jean de Vieupont. Cette maison forte demeure dans la famille de Vieupont au cours du XVIIe siècle.                                                                                   GAUCHETIERE ; Chambres d'hôtes situé à Chailloué. Cette villa dispose d'un jardin et d'un parking privé gratuit, offrant une vue sur le jardin.","architecture":"CHAILLOUE;   le premier château, une maison forte, date peut-être du XIe siècle. L'édifice est disputé aux troupes anglaises pendant la Guerre de Cent Ans. L'édifice connait des transformations profondes au XVIIe et XIXe. Le logis central est refait au XVIIe. Après des péripéties concernant le fief aux XVIIe-XVIIIe, le domaine est vendu lors de la Révolution française. L'édifice, bien que fort remanié au cours des siècles, conserve les traits de sa vocation militaire primitive avec en particulier les douves, la tour nord-ouest et les traces du pont-levis et de l'enceinte. L'édifice est inscrit au titre des M.H. le 15 novembre 2010 en particulier les éléments suivants : les façades et les toitures du logis, la tour circulaire, les façades et les toitures des deux petits pavillons d'entrée, le pont dormant et les douves,  elle se présente comme une demeure entourée par des douves, un pont-levis et quatre tourelles de défense. On retrouve des références médiévales dans les soubassements du château, même si le XVIIe siècle s'impose nettement par la présence dominante de la grande tour nord-ouest surmontée de son lanternon ainsi que des deux pavillons d'entrée. Le château de Chailloué a fait l'objet de nombreux remaniements.","habitants":"famille de Vieupont \r\n        \r\n        \r\n        \"","divers":"gps 48° 39' 44\" N, 0° 12' 19\" Est","gps":"","images":["../image/image_61/61_Chaillou%c3%a9_1.jpg","../image/image_61/61_Chaillou%c3%a9_2.jpg","../image/image_61/61_Chaillou%c3%a9_3.jpg","../image/image_61/61_Chaillou%c3%a9_4.jpg"]},"Consult_chateau_formulaire3b05":{"id":"Consult_chateau_formulaire3b05","dept":"61","canton":"Ceton","commune":"Vaunoise","nom":"Chaises_Vaunoise","type":"Château","periode":"XIX","histoire":"CHAISES,  étaient sous lAncien Régime le siège dune importante seigneurie dépendant de la châtellenie de Bellême,  fief appartenant au XIVe siècle à la famille des Chaises, au XVe et au XVIIe siècle à la famille de Barat et au XVIIIe siècle à la famille de Rohan.  De 1679 à 1773 Les Chaises appartiennent aux princes de Guéméné, de la maison de Rohan.En 1862, Alfred de Gaston de Pollier, comte de Vauvineux, entreprend la construction du château actuel.","architecture":"CHAISES,   vestiges du château fort : deux tours d'angle de l'enceinte,  château actuel construit au deuxième quart du XIXe siècle (après 1823), simple maison forte au Moyen Âge, Les Chaises sont à la fin de la guerre de Cent Ans le siège dun domaine agricole renommé pour la culture de la vigne.  Alfred de Gaston de Pollier, comte de Vauvineux, entreprend la construction du château actuel et de ses communs ainsi que la création du parc à langlaise qui lentoure. Le bâtiment, de plan symétrique, se compose d'un étage carré et d'un étage de comble, le gros-oeuvre en calcaire, brique, appareil mixte et enduit, type de couverture: toit à longs pans, croupe, toit conique recouverts d'ardoise et de tuiles plates. Cette construction succède au premier logement seigneurial attesté au XIVe siècle, à un second manoir construit au XVe siècle, puis à un château édifié au XVIIe siècle et agrandi en 1789. De ces anciens bâtiments, subsistent aujourd'hui une tourelle de lancien manoir construit au XVIe siècle ainsi que la maison du jardinier construite au XVIIe siècle.","habitants":"Famille de Barat\r\n        \"","divers":"GPS : 48° 21' 23\" Nord, 0° 29' 09\" Est","gps":"48° 21' 23\" Nord, 0° 29' 09\" Est","images":["../image/image_61/61_Chaises_Vaunoise_1.jpg","../image/image_61/61_Chaises_Vaunoise_2.jpg"]},"Consult_chateau_formulaire8dc0":{"id":"Consult_chateau_formulaire8dc0","dept":"61","canton":"Argentan","commune":"Chambois Gouffem en auge","nom":"Chambois","type":"Fort","periode":"XII-XIII-XV","histoire":"CHAMBOIS, château fort de type roman construit par Guillaume de Mandeville vers 1185 Comte d'Essex, proche de Henri II Plantagenêt.   Après 1204, le château est offert au Maréchal Henri Clément, par le Roi Philippe-Auguste.  En 1417 Chambois est occupée par les Anglais. En 1795 abrite les populations locales menacées par les chouans communs actuels construits au XVIIe siècle pour Pierre II de Rosnyvien. Château du  XIXe siècle.\r\nÉléments protégés MH : le donjon, le portail, la chapelle, l'enclos, le colombier, l'enceinte et l'écurie : Classement du 22 juin 1901.","architecture":"CHAMBOIS, vestiges du donjon et éléments du système défensif, l'un des mieux conservés de France. S'apparente à la famille des donjons anglo-normands. Le plan du donjon est un rectangle, les grandes dimensions se développent nord-ouest et sud-est, il était entouré d'une enceinte, qui fut détruite vers 1750. Il ne reste que son donjon, qui fut restauré, fidèle dHenri II. Les dimensions du donjon de Chambois, de forme rectangulaire, sont très impressionnantes : 21,40 m sur 15,40 m à l'extérieur  s'élèvent à 25,70 m de haut. Il ne reste que des ruines du château du XIIe siècle. A la fin du XIVe ou au début du XVe siècle au plus tard, le couronnement fut remanié. Les quatre renforts d'angle furent surmontés d'échauguettes carrées qui subsistent encore. Certaines fenêtres de ces échauguettes sont pourvues de corbeaux. La restitution de l'arochon suppose l'existence de ces échauguettes ou guérites dès l'origine du donjon; cependant Viollet-le-Duc et Ruprich Robert les datent de la fin du XIVe siècle. Bâtis en petit appareil irrégulier avec des joints formant parfois comme un enduit, ses 4 murs sont intacts. Leur crête a été équipée, au XIVe siècle, d'une galerie de mâchicoulis et de nombreux créneaux. En 2008, l'exploration d'une fosse médiévale dans la tour maîtresse et l'analyse dendrochronologique de 4 poutres de bois a donné ces résultats :  Visites libres des extérieurs du château de Chambois.","habitants":"Pierre II de Rosnyvien\r\n        \"","divers":"Fort de Chambois                               48° 48' 20\" nord, 0° 06' 25\" est                    GPS : 48° 48' 18\" Nord, 0° 06' 19\" Est","gps":"48° 48' 18\" Nord, 0° 06' 19\" Est","images":["../image/image_61/61_Chambois_1.jpg","../image/image_61/61_Chambois_2.jpg"]},"Consult_chateau_formulaire7a9e":{"id":"Consult_chateau_formulaire7a9e","dept":"61","canton":"Magny-le-Désert","commune":"Champ de la pierre","nom":"Champ_la_Pierre","type":"Château","periode":"XV-XVIII","histoire":"CHAMP de la PIERRE, le  fief de la baronnie de Briouze appartenait au XIVe siècle aux Le Verrier qui en 1523 créer les forges. Le domaine passe ensuite à Françoise le Verrier épouse depuis 1561 à Claude de Broon seigneur de Cossesseville futur chef ligueur. Le Champs échoit à Jacques de Broon qui meurt en 1622 puis à son fils René, tué en 1650, pendant la Fronde laissant des orphelins sous l'autorité  d'un tuteur qui en 1663 a cédé une partie du domaine à Germain  Ricoeur de Bâmont maître des forges propriétaire de la seigneurie en 1703 aura pour successeur son fils René,   puis Germain-René Ricoeur chevalier de Vitray capitaine de Cavalerie à sa mort en 1800 avait légué aux  deux fils de son frère Jean qui décède en 1783 par la fièvre putride, sous la Révolution il prend part avec son jeune frère Jacques-René à la conspiration et émigre  après son échec. Son fils Victor  épouse Laure sa cousine germaine, ils  seront les parents de la comtesse  Eugène d'Andigné aïeule d'Hubert d'Andigné, ancien président du conseil général de l'Orne sénateur de l'Orne, actuel propriétaire de Champ de la Pierre.","architecture":"CHAMP de la PIERRE, le domaine est lié aux forges contiguës, datant au XVIe siècle et actives jusqu'en 1860, qui tiraient parti de l'abondance de bois et d'eau. Le château date de la fin du XVIIIe siècle. Le corps de logis central reconstruit au XIXe siècle l'ensemble est resté dans la même lignée depuis sa construction,  de deux corps de bâtiment dont les fenêtres ont été retiré  de leur meneaux, meurtrières bouchées ainsi qu'une tourelle d'angle coiffée d'un dôme de pierre. Jean-Baptiste Ricoeur de Bâmont aménagea, de 1786 à la Révolution, un parc romantique orné de fabriques.  Des étangs agrémentés de la petite île et de l'île des deux frères et sa chaumière, des embarcadères. Des salles vertes offrent de beaux points de vue sur létang.  Éléments protégés MH : les façades et les toitures de l'ensemble des bâtiments, à l'exclusion des parties modernes de la ferme attenante au château ; les murs de clôture du parc, avec leurs piliers et leurs portes; le parc comprenant notamment, au Nord du château, ses murs de clôture, sa fontaine et ses escaliers, les jardins du presbytère, à l'ouest du château, la grande avenue, l'île appelée Le Rendez-Vous avec son canal, les vestiges de ses ponts-tournants, son obélisque, les terrains situés entre l'île et la grande avenue, l'étang du moulin : inscription par arrêté du 22 mars 1993.","habitants":"Germain  Ricoeur de Bâmont\r\n        \"","divers":"Château de Champ de la Pierre.\r\nGPS : 48° 36' 31\" Nord, 0° 12' 19\" Ouest","gps":"48° 36' 31\" Nord, 0° 12' 19\" Ouest","images":["../image/image_61/61_Champ_la_Pierre_1.jpg","../image/image_61/61_Champ_la_Pierre_2.jpg","../image/image_61/61_Champ_la_Pierre_3.jpg","../image/image_61/61_Champ_la_Pierre_4.jpg","../image/image_61/61_Champ_la_Pierre_5.jpg","../image/image_61/61_Champ_la_Pierre_6.jpg"]},"Consult_chateau_formulaire58bc":{"id":"Consult_chateau_formulaire58bc","dept":"61","canton":"Vimoutiers","commune":"Champosoult","nom":"Champosoult","type":"Manoir","periode":"XVII-XVIII","histoire":"CHAMPOSOULT, l'étable date du XVIIe siècle ; la chapelle du XVIIIe siècle ; les bâtiments liés à l'activité fromagère furent construits au cours de la deuxième moitié du XIXe siècle ; un nouveau logement enregistré au cadastre en 1887; un logis reconstruit sur l'emplacement d'un château classique. Le logis en brique; chapelle en pierre avec brique en remplissage ; séchoir à fromage, grange et logement en brique; étables en brique avec pierre en remplissage; dépendances et en pan de bois.                                                                  RONCERAY a deux K.M au  Nord,  propriété de Jules Dinaux des Arcy au début du XIXe siècle, le château du Ronceray fait l'objet d'une importante restauration en 1847 par le célèbre architecte Manceau Pierre Félix Delarue. Ainsi des tours cylindriques sont ajoutées dans les angles et une tour polygonale au milieu de la façade. Tous les encadrements de baies son réalisés dans le style du XVe siècle, à la façon des fenêtres du château de la Flotte. Ajout de créneaux et d'un petit balcon décoré d'une balustrade à remplages sur la grosse tour circulaire.","architecture":"Le RENOUARD, durant le XVIIIe siècle, le château fut la propriété de Jacques Adrien de Corday, grand-père paternel de Marie-Anne-Charlotte de Corday dArmont, dite Charlotte Corday, personnalité de la Révolution française, célèbre pour avoir assassiné Jean-Paul Marat le 13 juillet 1793. Pour cela, l'édifice est souvent appelé \"Logis des Corday\". Jacques Adrien en modifia la disposition intérieure, notamment en remplaçant, au rez-de-chaussée, l'escalier central par une salle à manger.                                              La ferme est acquise le 19 septembre 1765 par Jacques François de Corday, officier d'infanterie. Elle comprenait à cette époque la maison manable actuelle. Divers bâtiments en terre et bois entouraient la maison (pressoir avec cave, grenier, étable, écurie) , le tout accompagné d'une grande cour, d'un jardin et d'un pré à faucher. Anne-Marie Charlotte de Corday naît le 27 juillet 1768. En 1780, la maison étant devenue trop petite, les Corday se réinstallent au château de Cauvigny.\r\nLa maison rectangulaire présente une structure à pans de bois reposant sur un soubassement de moellons de calcaire et silex, surmonté d'une sole. Elle se compose essentiellement de poteaux verticaux avec des écharpes d'angle. La partie nord comporte une sablière d'étage. Certains éléments sur la façade ouest sont révélateurs des dispositions courantes au 16e siècle, notamment l'assemblage d'un sommier dans un poteau par deux tenons clavés. Le hourdis est en terre, sauf pour les éléments refaits après coup.","habitants":"Famille de Jacques Adrien de Corday\r\n        \"","divers":"Champosoult 48° 51' 58\" nord, 0° 10' 58\" est","gps":"","images":["../image/image_61/61_Champosoult_1.jpg","../image/image_61/61_Champosoult_2.jpg","../image/image_61/61_Champosoult_3.jpg","../image/image_61/61_Champosoult_4.jpg","../image/image_61/61_Champosoult_5.jpg","../image/image_61/61_Champosoult_6.jpg","../image/image_61/61_Champosoult_7.jpg","../image/image_61/61_Champosoult_8.jpg","../image/image_61/61_Champosoult_9.jpg"]},"Consult_chateau_formulaire432c":{"id":"Consult_chateau_formulaire432c","dept":"61","canton":"Athis-de-l","commune":"Chênedouit","nom":"Chènedouit","type":"Château","periode":"XV-XVII-XVIII","histoire":"Trois châteaux dans cet article: Repas, Ste-Honorine et Hamel.                                                                                    REPAS, le Repas devrait son nom, d'après la tradition, à un banquet pantagruélique que le héros de Rabelais aurait honoré de sa présence. Ce domaine appartenait au XIVe siècle à la famille de Sarceaux et passa par mariage à la fin du XVe siècle aux Le Verrier. Vers 1550, Dame Philippe de Craon, veuve de Guillaume le Verrier céda la propriété à son beau-frère, Samson Sallet, avocat à Falaise, désireux d'acquérir un fief noble. C'est le petit-fils de ce dernier, Nicolas, gentilhomme ordinaire de la Chambre du Roi, qui fit sans doute reconstruire le château actuel de 1605 à 1615 en conservant le donjon et les fondations d'un édifice antérieur. Le Repas passa par mariage à la famille de La Cour, puis à celle de Cheux. Charles de Cheux, contre-amiral, âgé de trente-deux ans, fit partie de l'expédition chargée de rechercher les traces de La Pérouse. Il était en mission lorsque le gouvernement révolutionnaire confisqua ses biens. De retour en France, Charles de Cheux put prouver qu'il n'avait pas émigré et finit après bien des tribulations, par rentrer en possession de ses propriétés. Son fils fut page de Louis XVIII et garde du corps de Charles X ; il démissionna en 1830 et laissa à sa mort, en 1884, le château à Georges de Banville, parent du poète Théodore de Banville. Le château était pratiquement abandonné lorsque le comte et la comtesse de Bagneux l'acquirent en 1905 et entreprirent sa restauration; leur uvre a été courageusement poursuivie par leur fils, le comte Raoul de Bagneux. Depuis 2006, le nouveau propriétaire  M. Henry Dewavrin s'efforce de redonner tout son lustre à ce remarquable élément du patrimoine normand.","architecture":"REPAS, le corps de logis principal apparaît au fond de la cour d'honneur, bordé à gauche et à droite par deux ailes plus basses qui aboutissent aux pavillons flanqués d'échauguettes. Le portail d'entrée est précédé d'une belle allée rectiligne bordée d'arbres. Edifié entièrement en granit, tiré du sol même du domaine, le château fut élevé vers 1605, à l'emplacement d'une forteresse du XIIIe siècle. Il ne reste de cette dernière, en dehors des vestiges dans les fondations, que le donjon qui marque le centre de la façade sur le jardin, donjon transformé au XVIIe siècle pour y loger l'escalier et coiffé d'un dôme à lanternon. Toute la demeure est entourée de douves récemment remises en eau.Éléments protégés MH : les façades et les toitures ; les douves (y compris le pont-levis) ; les perspectives : inscription par arrêté du 30 octobre 1967.                                                           STE HONORINE à Ménil Gondouin, ce logis est le seul subsistant de tous les châteaux de l'actuel Menil Gondouin. La cour est limitée à droite par le logis d'habitation et à gauche par des communs avec une tour, au fond par une remise avec un pressoir. Le logis proprement dit date du XVIIIe siècle. Les communs paraissent remonter au XVe siècle. Éléments protégés MH : les façades et les toitures du logis : inscription par arrêté du 3 juin 1975.                                    A la Carmelle  à cinq k.M. à l'ouest le manoir de HAMEL-ST-ETIENNE  Le logis est un ensemble architectural qui remonte au XVe siècle, bien qu'amputé vers 1840, a conservé l'ensemble de ses dispositions d'origine : baies, tourelles en encorbellement, distribution intérieure. Les modifications réalisées sous Louis-Philippe n'ont pas altéré la physionomie générale de la demeure. L'édifice a été un lieu de fréquentation artistique au XIXe siècle avec la présence du peintre normand Levasseur. La propriété est restée dans la même famille depuis 1758 date d'acquisition par le conventionnel de l'Hodesnières. Éléments protégés MH : les façades et les toitures du logis ; les façades et les toitures du pressoir : inscription par arrêté du 20 décembre 1999.","habitants":"Repas : famille de La Cour\r\n        \"","divers":"Trois châteaux dans cet article: Repas grav de 1 à 4, ste Honorine grav-5 et Hamel grav 6.               48° 46' 06\" nord, 0° 21' 26?\"ouest","gps":"","images":["../image/image_61/61_Ch%c3%a8nedouit_1.jpg","../image/image_61/61_Ch%c3%a8nedouit_2.jpg","../image/image_61/61_Ch%c3%a8nedouit_3.jpg","../image/image_61/61_Ch%c3%a8nedouit_4.jpg","../image/image_61/61_Ch%c3%a8nedouit_5.jpg","../image/image_61/61_Ch%c3%a8nedouit_6.jpg"]},"Consult_chateau_formulaired048":{"id":"Consult_chateau_formulaired048","dept":"61","canton":"Ceton","commune":"Origny le Roux","nom":"Chêreperrine","type":"Château","periode":"XVII-XVIII","histoire":"CHEREPERRINE, en 1387 a Jeanne de Mellay veuve de Payen de Coisme et dame de Chêreperrine. Un René de Sugères seigneur de Ballon et d'Ambrières hérite de sa grand-mère Pérronnelle de Coisme, lui succède au XVIe siècle Jehan de Vaulogé   échanson du duc d'Alençon prisonnier à Pavie en 1525  rachète sa liberté mais ruiné.  En 1539 il cède le domaine  à René de Rohan prince de Léon qui le cède à un créanciers Martin de Chaurays, un siècle plus tard en 1625 Pierre de Fontenay acquiert une partie de la propriété que son fils réunifie à son profit en 1653,  c'est cet ensemble   que   le marquis des Alleurs acquiert la seigneurie en 1704 et débute la reconstruction  du  nouveau château, avec communs et chapelle. en 1728, le domaine est vendu aux  Peyrenc de Moras  à la mort d'Abraham Peyrenc de Moras, son fils François contrôleur des finances; puis secrétaire d'Etat à la marine conserve  le domaine jusqu'en 1769 avant de le céder à François de Nogué et depuis 1875 à la famille de Lévis-Mirepoix  qui en sont toujours propriétaire.","architecture":"CHEREPERRINE, a été construit sur l'emplacement d'un château fort à motte détruit  au XVe siècle  pendant la guerre de cents ans. La construction du château  date de 1704 à 1728. Le grand comble a été supprimé au profit d'une couverture en tuiles dissimulée derrière une balustrade. Les deux avant-corps sont surmontés d'un fronton triangulaire. L'intérieur a été très remanié après l'incendie de 1925, et le mobilier fait par l'atelier de Nicolas Heurtaut a disparu en partie. Les communs sont constitués de deux bâtiments parallèles. Le commun Est abritait en partie le logement des domestiques et la chapelle. Le commun ouest est réservé aux écuries et aux attelages. Le château fut détruit, en partie, par un incendie en 1925. Le grand comble a été supprimé au profit d'une couverture en tuiles dissimulée derrière une balustrade. Les deux avant-corps sont surmontés d'un fronton triangulaire. Au sud, le fronton est orné d'un bas-relief montrant 4 enfants jouant. L'intérieur du château de Chêreperrine a été très remanié après l'incendie et le mobilier, en partie. Le rez-de-chaussée a conservé un salon entièrement décoré et meublé par Nicolas Heurtaut. Les lambris avec leurs dessus de porte peints paraissent dater de la seconde moitié du XVIIIe siècle. Les communs sont constitués de deux bâtiments parallèles. Le commun Est abritait en partie le logement des domestiques et la chapelle. Le commun situé à l'Ouest est réservé aux écuries et aux attelages. Éléments protégés MH : les façades et les toitures du château et des communs, la chapelle, la cour d'honneur avec les douves sèches qui la ferment, le pont-dormant et la grille,   Il est inscrit aux M.H. depuis le 21/11/1989.","habitants":"Famille de Peyrenc de Moras \r\n        \"","divers":"Château de Chérepérrine  GPS : 48° 20' 13,31\" Nord, 0° 24' 59,03\" Est","gps":"48° 20' 13,31\" Nord, 0° 24' 59,03\" Est","images":["../image/image_61/61_Ch%c3%a8reperrine_1.jpg"]},"Consult_chateau_formulaire0cf6":{"id":"Consult_chateau_formulaire0cf6","dept":"61","canton":"Vimoutiers","commune":"Cisai -st-Aubin","nom":"Cisai_St_Aubin","type":"Château","periode":"XVI-XVIII","histoire":"Deux châteaux dans cet article; Cisai et Laitiers.                                     CISAI, connu comme maison-forte au XIIe siècle. Odon Borleng, gouverneur de Gacé, y entreposait le butin résultant du pillage des populations. Richard de l'Aigle s'en empara, la maison-forte devint château-fort avec douves et tours de défense aux angles. A la fin du XVe siècle, Guillaume Erard, fait chevalier par François Ier, reconstruisit l'édifice selon un plan en équerre, dans le style Renaissance, avec deux tours. Du château construit au XVIe siècle subsiste l'aile nord-est. A la fin du XVIe siècle, le château Renaissance fut doublé vers l'ouest, les deux autres tours à mâchicoulis furent sans doute construites à ce moment. Occupé pendant la seconde guerre mondiale, une explosion endommagea la grande salle du rez-de-chaussée. Seul subsiste un décor peint du XVIIe siècle sur une poutre.  Éléments protégés MH : la tour de l'angle nord-est du logis ; la tour à l'angle sud-est de la cour ; les douves les reliant : inscription par arrêté du 19 juin 1991.","architecture":"LAITIERS, bâti à La Trinité-des-Laitiers et Cisai-Saint-Aubin,  date du XVIIIe siècle. Le domaine est agrémenté d'un parc à l'anglaise, aménagé en 1843, par le paysagiste Varé. Le parc à l'anglaise fut réaménagé en 1889 et pourvu en 1920 d'un important réseau hydraulique encore en état de marche. Le château des Laitiers est construit en briques, est inscrit partiellement aux M.H. le 4/09/1995 et se trouve aussi à cheval sur la commune de Cisai-Saint-Aubin.","habitants":"Famille de Guillaume Erard\r\n        \"","divers":"Deux châteaux dans cet article; Cisai et Laitiers.                             Laitiers GPS : 48° 47' 52\" Nord, 0° 22' 39\" Est","gps":"48° 47' 52\" Nord, 0° 22' 39\" Est","images":["../image/image_61/61_Cisai_St_Aubin_1.jpg","../image/image_61/61_Cisai_St_Aubin_2.jpg","../image/image_61/61_Cisai_St_Aubin_3.jpg","../image/image_61/61_Cisai_St_Aubin_4.jpg"]},"Consult_chateau_formulaireddf4":{"id":"Consult_chateau_formulaireddf4","dept":"61","canton":"Sées","commune":"Belfonds","nom":"Cléray","type":"Château","periode":"XVI-XVII","histoire":"CLERAY, au sortir de l'invasion normande, un seigneur fit de Cléray le siège d'une baronnie considérable. Ce manoir est construit autour de sources comme lindique son nom.  Le manoir de Cléray est situé à quelques centaines de mètres de la petite église de Saint-Latuin, du nom du premier évêque de Séez.  Dans un passé plus récent, au moment de la Seconde Guerre mondiale, l'abbé Carbonel, le fils du fermier, y a recueilli 95 petits orphelins de Caen. Racheté par un couple de parisiens, Arnaud et Ida de Chavagnac, le manoir est en cours de restauration. En 2006 Arnaud de Chavagnac, ingénieur commercial.","architecture":"CLERAY, la construction du manoir de Cléray date du XVIe et XVIIe siècle.  Le manoir est reconstruit entre 1610 et 1630, à lemplacement dune ancienne demeure seigneuriale entourée de douves: le corps central est entouré de deux ailes en saillie, encadrées de deux pavillons dentrée,  le logis principal encadré de ses deux ailes, le pavillon isolé au sud-ouest et la tour située sur la dépendance Sud, en totalité, les façades et toitures de l'ensemble des dépendances;   On distingue toujours les traces du chemin qui, autrefois, menait directement du manoir à l'édifice. En totalité les douves, le réseau hydraulique et les vestiges du moulin, les sols et les vestiges en sous-sols des parcelles, Éléments protégés MH : en totalité le logis principal encadré de ses deux ailes, le pavillon isolé situé au sud-ouest et la tour située sur la dépendance sud ; les façades et les toitures de l'ensemble des dépendances ; en totalité les douves, le réseau hydraulique et les vestiges du moulin ; les sols et les vestiges en sous-sols des parcelles, inscription par arrêté du 22 décembre 2016.","habitants":"Arnaud et Ida de Chavagnac\r\n        \"","divers":"Château de Cléray à Belfonds GPS : 48° 37' 10\" Nord, 0° 05' 37\" Est","gps":"48° 37' 10\" Nord, 0° 05' 37\" Est","images":["../image/image_61/61_Cl%c3%a9ray_1.jpg","../image/image_61/61_Cl%c3%a9ray_2.jpg"]},"Consult_chateau_formulaire05d8":{"id":"Consult_chateau_formulaire05d8","dept":"61","canton":"Argentan","commune":"Commeaux","nom":"Commeaux","type":"Château","periode":"XVI-XVIII","histoire":"Deux châteaux dans cet article Commeaux et Ri.                                               COMMEAUX, est une construction du XVIe siècle (1540),   La qualité architecturale réside dans le fait qu'il a été édifié d'un seul tenant. A la famille de Loison succéda celle des Droullin. Puis en 1667, Claude de Vigneral de Ri dont la descendance vécut au château jusqu'en 1819. Après un passage dans la famille de Guerpel, le domaine revenait en 1861 aux Vigneral de Ri. Très endommagé en 1944, le château renaît grace au comte Jean de Vigneral qui l'a restauré.                                                                                       A deux K.M. à l'ouest le châteaux de Ri ou RY, trés classique, pur XVIIIe siècle, ce château a été construit de 1785 à 1788 pour le comte de Vigneral, l'architecte local Nicolas Gondouin. Plusieurs demeures de la région portent sa signature notamment le château d'Assy à Ouilly deTesson et l'hôtel Saint Léonard à Falaise. Le plan du château est inspiré de l'hôtel Matignon. Le parc est à l'anglaise et au Sud, le château domine le vallon longitudinal traité en parc paysager avec une rivière artificielle. Le château appartient toujours à la famille de Vigneral, fixés à Ri depuis le début du XVIIe siècle.","architecture":"COMMEAUX, édifice  bâti en équerre, deux tours rondes flanquent les angles nord-est et nord-ouest. Une petite tour d'escalier marque l'angle rentrant de l'équerre. La tour occidentale servit quelques temps de chapelle. La construction du manoir de Commeaux date du 2ème quart du XVIe siècle. Il est décoré de nombreux motifs sur sa façade et possède de magnifiques fenêtres de style Renaissance.  Deux tours rondes flanquent ses angles Nord-Est et Nord-Ouest. Une petite tour d'escalier marque l'angle rentrant de l'équerre. La tour occidentale servit durant un temps, de chapelle.  Éléments protégés MH : le château de Commeaux (extérieurs et intérieurs) : classement par arrêté du 5 décembre 1963.","habitants":"Commeaux ; famille de Guerpel                                                       Ry : famille de Guerpel\r\n        \"","divers":"Deux châteaux dans cet article Commeaux et Ri.                                           GPS : 48° 47' 14\" Nord, 0° 6' 40\" Ouest","gps":"48° 47' 14\" Nord, 0° 6' 40\" Ouest","images":["../image/image_61/61_Commeaux_1.jpg","../image/image_61/61_Commeaux_2.jpg","../image/image_61/61_Commeaux_3.jpg","../image/image_61/61_Commeaux_4.jpg"]},"Consult_chateau_formulaire4580":{"id":"Consult_chateau_formulaire4580","dept":"61","canton":"Damigny","commune":"Condé sur Sarthe","nom":"Condé_sur_Sarthe","type":"Château","periode":"XIX","histoire":"Deux châteaux à Condé; Cusselière et Verveine                                                            CUSSELIERE, château d'inspiration italienne édifié au XIXe siècle, il domine la rivière Sarthe, et est entourée d'un jardin paysager. Le peintre-photohraphe Modeste Chambay, l'a imaginé en 1882, L'association \"Folies de la Cusselière\" propose des actions qui associeront lart du jardin et autres; musique, littérature, théâtre, architecture, arts plastiques graphiques numériques, danse, cinéma etc.  Il est entouré d'un jardin paysager . Mr Modeste Chambay, peintre-photographe l'avait imaginé en 1882. Le manoir est acquis  par Frédéric Maltète.","architecture":"VERVEINE, transformé en Sci  de Frédéric d'Alençon, se compose de deux corps de logis en équerre accolé sur angle central par passage à deux niveaux à arcades, les bâtisses sont à trois niveaux avec lucarnes en combles flanqués d'une tour polygonale à toit  galbé avec clocheton  et une tour carré sur bâtisse opposée à toit poitue, l'ensemble du toit en ardoise.  Architecture château de la Verveine à un niveau  avec terrasse à balustrades corps de logis à deux niveaux sur partie arrière toit à l'impériale en ardoise.","habitants":"Mr Modeste Chambay\r\n        \r\n        \"","divers":"Deux châteaux à Condé; Cusselière et Verveine   GPS : 48° 25' 58\" Nord 0° 02' 06\" Est","gps":"48° 25' 58\" Nord 0° 02' 06\" Est","images":["../image/image_61/61_Cond%c3%a9_sur_Sarthe_1.jpg","../image/image_61/61_Cond%c3%a9_sur_Sarthe_2.jpg","../image/image_61/61_Cond%c3%a9_sur_Sarthe_3.jpg","../image/image_61/61_Cond%c3%a9_sur_Sarthe_4.jpg","../image/image_61/61_Cond%c3%a9_sur_Sarthe_5.html","../image/image_61/61_Cond%c3%a9_sur_Sarthe_6.jpg","../image/image_61/61_Cond%c3%a9_sur_Sarthe_7.jpg","../image/image_61/61_Cond%c3%a9_sur_Sarthe_8.jpg","../image/image_61/61_Cond%c3%a9_sur_Sarthe_9.jpg"]},"Consult_chateau_formulaire4fea":{"id":"Consult_chateau_formulaire4fea","dept":"61","canton":"Athis-de-l","commune":"Mesnil Gondouin","nom":"Cour_Mesnil_Gondouin","type":"Domaine","periode":"XVI-XVII","histoire":"La COUR,   la ferme présente un ensemble de petits bâtiments du début du XVIIe siècle, seul témoignage de ce que fut le château de la Cour d'Antoine de Turgot, bâti dans la première moitié du XVIIe siècle. Du château subsiste deux pavillons carrés qui encadraient sa façade et des aménagements du parc.                                                                     La construction du domaine de la cour date du XVIe et 1er quart du XVIIe siècle. La ferme présente un ensemble de petits bâtiments du début du XVIIe siècle, seuls témoignages de ce que fut le château d'Antoine de Turgot, construit dans la première moitié du XVIIe siècle.","architecture":"La COUR, du château lui-même subsistent, 2 pavillons carrés qui encadraient sa façade et certains aménagements du parc. Le pavillon Louis XIII comprend une charpente en dôme à l'impériale. Le parc du domaine de la Cour a été aménagé et clos vers 1626. Le domaine de la Cour est inscrit partiellement aux M.H. depuis le 16/03/1987. Éléments protégés MH : les façades et les toitures de l'ancien logis du XVIe siècle ; les parties restantes de l'ancien château ; les douves fermant la cour d'honneur ; les façades et les toitures des deux pavillons carrés et le mur les reliant ; le bâtiment des communs : au Nord, le colombier et la boulangerie attenante ; au Sud, les façades et les toitures du bâtiment de ferme du XVIIe siècle ; à l'Ouest, la maison du garde avec sa cheminée, le four et la pêcherie attenante. Le parc avec ses murs de clôture ; le bassin supérieur ; le bassin de plaisance et la terrasse qui le borde au Nord, la terrasse et l'allée de tilleuls : inscription par arrêté du 16 mars 1987.","habitants":"Antoine de Turgot\r\n        \r\n        \r\n        \"","divers":"A Mesnil Gondouin   château de la Cour                                                              GPS : 48° 45' 28\" Nord, 0° 17' 19\" Est","gps":"48° 45' 28\" Nord, 0° 17' 19\" Est","images":["../image/image_61/61_Cour_Mesnil_Gondouin_1.jpg","../image/image_61/61_Cour_Mesnil_Gondouin_2.jpg","../image/image_61/61_Cour_Mesnil_Gondouin_3.jpg","../image/image_61/61_Cour_Mesnil_Gondouin_4.jpg","../image/image_61/61_Cour_Mesnil_Gondouin_5.jpg"]},"Consult_chateau_formulairedff0":{"id":"Consult_chateau_formulairedff0","dept":"61","canton":"Bretoncelles","commune":"Nocé","nom":"Courboyer","type":"Château","periode":"XV","histoire":"COURBOYER, la seigneurie de Courboyer relevait directement de la châtellerie de Bellême car le seigneur était tenu à la garde et à la défense d'une tour du côté du faubourg Saint-Pierre. En 1365 jehan de Corbehier, écuyer, était en possession de la seigneurie.  Parmi les descendants de Guyot de Raygnel et une  demoiselle Catherine de Courbehier sa Soeur, de Marie de Cintray, figure Marie de Courboyer, née sous François 1er, mariée quatre fois, décédée en 1594.  De nombreux fiefs constituaient les dépendances de Courboyer. Non seulement le chapelain mais aussi le curé de Nocé étaient à la présentation du seigneur de Courboyer qui possédait le droit de haute, moyenne et basse justice.  La guerre de Cent Ans, dont les opérations militaires se terminèrent dans le Perche en 1449, avait décimé la plus grande partie de la noblesse locale et complètement anéanti les châteaux et les demeures seigneuriales. Lorsque Pierre de Fontenay seigneur de la Reynière fait l'acquisition de Courboyer entre 1594 et 1600, il était déjà un homme puissant, issu d'une grande lignée, possédant terres et seigneurie. Son fils vend le domaine en 1723 à Pierre de Barville frère du seigneur de Nocé par René de Piliers, fils de marie de Fontenay. Marguerite de Barville épouse de François de Mésenge  seigneur de la Grossinière, conserveront le domaine lors de la Révolution, les descendants les Romanet de Beaume qui s'en défont en 1878, connaîtra plusieurs propriétaire dont un vandale qui démolira en 1947 la chapelle de 1500 restauré par monsieur Aymar de Grolée-Virville,  propriété  depuis 2000, du parc  est siège de la maison du parc naturel régional du Perche.","architecture":"COURBOYER, est bâti au XVe siècle le manoir à l'emplacement d'un manoir plus ancien ou d'une maison forte qui devait porter ce nom.   Le manoir de Courboyer se présente sous la forme d'un haut logis de plan rectangulaire avec dans chacun de ses angles des échauguettes. Sur sa façade principale est engagée une tourelle octogonale, coiffée en poivrière, avec à son sommet une échauguette, et sur la façade arrière d'une grosse tour ronde. Autant la façade arrière est restée rude et toute militaire, quoique la bretèche ne fut qu'un lieu d'aisance, autant la façade principale, à l'est, se présente d'une manière agréable avec un percement régulier ; une fenêtre à chacun des trois niveaux éclaire une grande salle de chaque côté de la tour d'escalier, de plan octogonal.  La plupart des baies ont conservé leur mouluration et ont retrouvé dernièrement leurs croisées de pierre. Une belle porte gothique s'ouvre au pied de la tour d'escalier, au nord.  Toute la grâce de Courboyer tient à ses toits de vieilles tuiles avec ses échauguettes aux quatre angles portées par des mâchicoulis, avec sa petite tourelle qui accoste la tour d'escalier, avec ses hauts pignons dont les rampants s'ornent de rostres sculptés.","habitants":"Pierre de Fontenay\r\n        \"","divers":"Courboyer\r\ngps 48° 23' 48\" Nord, 0° 40' 13\" Est","gps":"","images":["../image/image_61/61_Courboyer_1.jpg","../image/image_61/61_Courboyer_2.jpg","../image/image_61/61_Courboyer_3.jpg","../image/image_61/61_Courboyer_4.jpg"]},"Consult_chateau_formulaireb017":{"id":"Consult_chateau_formulaireb017","dept":"61","canton":"Argentan","commune":"Courmenil","nom":"Courmenil","type":"Château","periode":"Xviii","histoire":"COURMENIL   Ce château est représentatif des grands domaines de la fin du XVIIIe siècle en Normandie. Un ancien château fort existait en 1422. Ce château fort confisqué au profit de Guillaume Lenfant ; vendu en 1482 à son neveu Jean Bernart qui l'agrandi et le dota d'une chapelle adossée à une tour de défense, toutes deux disparues.","architecture":"COURMENIL, le château actuel fut reconstruit entre 1780 et 1785 sur l'ancienne gentilhommière. Des ajouts furent effectués au XIXe et XXe siècle (tour rectangulaire à usage de lavoir, pont de pierre pour sortir par l'arrière, passerelle en fer). En 1930, l'entrée de la cour d'honneur, primitivement à l'angle ouest, fut déplacée au centre avec une grille copiant celle de Trianon. Le château comprend un corps de logis principal, flanqué à l'est et à l'ouest de deux pavillons carrés. La façade sud est agrémentée d'un avant-corps légèrement saillant, surmonté d'un fronton triangulaire. A l'intérieur, le hall est occupé par un escalier en bois avec une volée centrale et deux volées divergentes, la rampe en fer forgé a été réalisée en 1783 par Jean et Michel Hacault. Le salon est orné de lambris, surmontés de trumeaux en grisaille représentant des jeux d'enfants. Les communs sont tous en briques avec des arches délimitant les travées. Éléments protégés MH : la cour d'honneur les douves avec leurs murs et leur pont ; l'étang. Les façades et les toitures du château; la cage d'escalier avec l'escalier et sa rampe en fer forgé ; le grand salon avec l'ensemble de son décor. Les façades et les toitures des communs et du colombier : inscription par arrêté du 26 août 1991.","habitants":"Famille de  Guillaume Lenfant \r\n        \"","divers":"Château de Courmenil\r\ngps; 48° 46' 43\" Nord, 0° 14' 23\" Est","gps":"","images":["../image/image_61/61_Courmenil_1.jpg","../image/image_61/61_Courmenil_2.jpg","../image/image_61/61_Courmenil_3.jpg"]},"Consult_chateau_formulaireb0a5":{"id":"Consult_chateau_formulaireb0a5","dept":"61","canton":"Ecouves","commune":"Courtomer","nom":"Courtomer","type":"Château","periode":"XVII-XVIII","histoire":"COURTOMER, l'ancien temple protestant date du second quart du XVIIe siècle tandis que le château est bâti dans le troisième quart du XVIIIe siècle. A l'origine existait un château médiéval, quadrilatère fermé avec cour intérieure, pavillon d'angle, poterne, pont-levis et fossés. A la fin du XVIIIe siècle, la demeure féodale, peu pratique et abîmée par les guerres de Religion, fut remplacée par un nouvel édifice élevé par Jean-Baptiste-Benoît de Blinne. De plan rectangulaire, en 1905 propriété du comte Roger du Pelet et la Vicomtesse de Brimont conseiller général de l'Orne.\r\nÉléments protégés MH : les façades et les toitures ; l'escalier d'honneur avec sa rampe et le  parquet de marqueterie du fumoir: inscription par arrêté du 29 mars 1967. Les façades et les toitures de l'ancien temple protestant dit l'habitacle, dépendant du château : inscription par arrêté du 11 avril 1973. En 2005, la Famille Bonner racheta le Château. Celui-ci sert annuellement de lieu de conférence pour la maison d'édition Bonner.","architecture":"COURTOMER, la construction du château de Courtomer date de 1787 et 1789. Il a été bâti sur les ruines d'un ancien château médiéval dont il n'a conservé que les caves. Les travaux furent arrêtés, à la Révolution Française puis reprirent ensuite après. De plan rectangulaire, le bâtiment se termine par deux pavillons latéraux, légèrement en saillie. A l'intérieur, le décor a été réalisé au début du XIXe siècle, après une interruption due à la Révolution. La décoration des salons accuse les principes d'art en vigueur à cette époque. Le temple protestant, bâti en 1622 par le marquis de Saint Simon Courtomer, servait de lieu de sépulture. A la révocation de l'Edit de Nantes, les Saint-Simon-Courtomer, convertis au catholicisme, le temple fut désaffecté avant d'être transformé en dépendance rurale. Dans son ensemble, le temple est resté intact depuis son aménagement. Il constitue l'un des rares temples protestants de l'époque de l'Edit de Nantes qui soit parvenu jusqu'à notre époque. L'ancien et le nouveau château de Courtomer furent longtemps la propriété de la Famille Saint-Simon, qui portait le titre de Baron puis de Marquis de Courtomer.  Constuit dans un style classique, il reprend les plans de l'hôtel de la Monnaie de Paris. Les façades, les toitures, l'escalier d'honneur avec sa rampe et le parquet de marqueterie du fumoir sont inscrits au titre des M.H. depuis le 29/03/1967. Les façades et toitures de l'ancien Temple Protestant dit l'habitacle, dépendant du château, sont inscrites depuis le 11/04/1973. . Le château de Courtomer sert aussi de Maison d'Hôtes. Il est aussi disponible à la location.","habitants":"Famille de Jean-Baptiste-Benoît de Blinne\r\n        \r\n        \"","divers":"Château de Courtomer            GPS : 48° 38' 05\" Nord, 0° 21' 00\" Est","gps":"48° 38' 05\" Nord, 0° 21' 00\" Est","images":["../image/image_61/61_Courtomer_1.jpg","../image/image_61/61_Courtomer_2.jpg","../image/image_61/61_Courtomer_3.jpg"]},"Consult_chateau_formulairee7db":{"id":"Consult_chateau_formulairee7db","dept":"61","canton":"Bagnoles-de-l","commune":"Couterne","nom":"Couterne","type":"Château","periode":"XVI","histoire":"COUTERNE, au XIIe siècle la seigneurie de Couterne est apportée en dot en 1328 par son héritière Anette de Couterne, à Guillaume des Vaux. En 1416, leur petit-fils Jean des Vaux, est chambellan de Charles VI; en 1429 il est fait prisonnier par les anglais qui occupe la normandie pour payer la rançon il cède le domaine à Robert d'Aligny, les descendants de ce dernier vendent Couterne en 1542 à Jean de Frotté attaché au service de la soeur de François Ier.                En 1549  il a été construit pour Jehan de Frotté, chancelier et contrôleur des finances de Marguerite de Navarre. Le château fut un haut lieu de la chouannerie dans l'isle, l'un des poètes de la cour de Marguerite de Navarre, à la mort de sa protectrice en 1549 fait commencé les travaux de construction du château, son fils ainé René hérita, passa  à  Charles-Gabriel de Frotté entreprend de restaurer et d'agrandir  le château qu'il habite.   Louis de Frotté (1766-1800), chevalier de Couterne, fusillé à Verneuil, a vécu au château durant son adolescence. Son fils Charles encore mineur hérite de Couterne à sa majorité et restera dans sa descendance  malgré qu'il représente sous la restauration député et préfet de ma Creuse et cessera toute activité en 1830.  Ouverture du parc  et d'une salle d'exposition de souvenirs du château, collectionnés sur plus de quatre siècles exposition sur la Renaissance, le protestantisme et la chouannerie normande. Les jardins du château sont inscrits au pré-inventaire des jardins remarquables.","architecture":"COUTERNE,  le château  en brique et granit de Couterne date du XVIe et XVIIIe siècle,  possède des tours originales, coiffées de toits d'ardoise en forme de cloche, qui se mirent dans l'eau de l'étang qui baigne son parc. Elevé  de deux niveaux sous comble , flanqué sur sa façade nord de tours rondes coiffées de toits en forme de cloche et d'échauguettes d'angle sur la façade opposée. Une tourelle polygonale abritant un escalier en vis occupait le centre de la façade sud,  des embrasures de tir percées à la base  des tours contribuaient à la protection, tout comme le mur d'enceinte qui l'entourait complètement.   Bien que privé, vous pourrez visiter que les extérieurs du château de Couterne, son parc et ses dépendances. Les extérieurs du château de Couterne se visitent librement. Vous pourrez aussi découvrir le Musée des Chouans.\r\nÉléments protégés MH : le château en totalité : inscription par arrêté du 17 avril 1931.","habitants":"Famille de Jehan de Frotté\r\n        \"","divers":"Château de Couterne GPS : 48° 32' 6,72\" Nord, 0° 24' 47,88\" Ouest                                                                                48° 32' 07\" Nord, 0° 24' 48\" Ouest","gps":"48° 32' 6,72\" Nord, 0° 24' 47,88\" Ouest","images":["../image/image_61/61_Couterne_1.jpg","../image/image_61/61_Couterne_2.jpg","../image/image_61/61_Couterne_3.jpg"]},"Consult_chateau_formulaire70aa":{"id":"Consult_chateau_formulaire70aa","dept":"61","canton":"Argentan","commune":"Occagnes","nom":"Cuy","type":"Château","periode":"XVIII","histoire":"CUY. Baronnie avec haute, moyenne et basse justice  relevait du comté de Montgomery.  En 1236 la baronnie  de Cuy est possédé par Guillaume de Tilly, dont la petite-fille, Jeanne fait entrer Cuy  par mariage dans la famille d'Harcourt en 1526 Gabrielle d'Harcourt héritière des baronnies  de Cuy, de Bonnétable et de Tilly, les apporte  en dot  lors de son mariage avec Charles de Couesme, leur arrière  petite-fille Anne de Montaiffé fait une brillante alliance en épousant en 1601 un cousin germain d'Henri IV Charles de Bourbon, comte de Soissons, qui mourat au château de Cuy en 1612. En 1632 la veuve de Charles de Bourbon cède la baronnies à Jacques du Four seigneur  de Moulins sur Orne et de Bellegarde. Le fils de ce dernier François reçoit Cuy en cadeau pour son mariage en 1644 avec Marie -Magdeleine de Montgommery, deux fils naîtront de cette union, dont François Gabriel du Four, capitaine des vaisseaux du roi meurt en 1718  laissant un fils Nicolas héritier des biens de famille qui épouse  en 1741 Françoise de Caulaincourt fait détruire l'ancien château pour bâtir à la place  une luxueuse résidence. Nicolas du Four de Cuy n'aura qu'une fille Marguerite, alliée en 1765 à Nicolas-Charles Camille d'Orglandes comte de Briouze, meurt l'année suivante, elle accouche d'un fils posthume Nicolas-François-Camille-Dominique qui parvient à conserver Cuy pendant la Révolution mais s'en défait en 1809 au profit du comte de Choiseul-Daillecourt et par héritage passera à la princesse de Broglie-Revel qui en 1950 le lègue à la communauté de Nôtre-Dame de la Charité de Caen qui le remette sommairement en état. Vendu en 1974 à Maurice Dargent de Tonnac et acquis ensuite en 1981 par le docteur Razah Raad.","architecture":"CUY, le château est une construction Louis XV,  composé d'un corps de logis de plan rectangulaire à trois niveaux  avec un avant-corps galbé et des toits à combles brisés, avec un étage  de comble logé dans un toit à la Mansard. Le corps  central est prolongé par deux pavillons en légère saillie et son centre, un avant corps arrondi et agrémenté d'un balconnet couronné sous un dôme, d'un fronton sculpté aux armes des princes de Broglie. Rectiligne, la façade sur le parc et d'aspect plus simple. Cette magnifique propriété fut habitée jusqu'à la dernière guerre mondiale par les princes de Broglie-Revel; au milieu du XXe siècle, elle est utilisée comme colonie de vacances et appartenait à Notre-Dame de Charité de Caen. La construction du château de Cuy date du XVIIe siècle. Le Château de Cuy est inscrit aux M.H. pour ses façades, toitures et la grille d'entrée du château le 14/12/1936.","habitants":"Famille de Nicolas du Four de Cuy \r\n        \"","divers":"Château de Cuy à Occagnes                  GPS : 48° 46' 18\" Nord, 0° 05' 10\" Ouest","gps":"48° 46' 18\" Nord, 0° 05' 10\" Ouest","images":["../image/image_61/61_Cuy_1.jpg","../image/image_61/61_Cuy_2.jpg"]},"Consult_chateau_formulairee0b0":{"id":"Consult_chateau_formulairee0b0","dept":"61","canton":"Sées","commune":"Mortrée","nom":"D","type":"Château","periode":"XI-XV-XVI","histoire":"D'O ; édifié sur la terre qui fut le berceau d'une très ancienne famille normande dont, le premier représentant connu, Robert d'O, accompagna le Duc de Normandie, Robert Ier le Magnifique, lors de son pèlerinage en Terre Sainte. C'est à l'emplacement de l'ancienne forteresse du XIe siècle qu'il a été construit par Robert VII d'O tué à Azincourt en 1415. Robert VIII d'O, échanson de Charles Ier de Bourbon prit la suite des travaux. Puis Jean Ier d'O, conseiller et chambellan du roi Charles VIII. Jean II d'O capitaine des Gardes du corps (ex-garde écossaise) de Henri ll et grand Sénéchal de Normandie participera, lui aussi, aux travaux du château. Il a ensuite été embelli par Charles II d'O puis François d'O aux XVe et XVIe siècles. Ce dernier, sans descendance et couvert de dettes à force de mener grand train de vie, conduisit le château d'Ô à sa faillite. En 1647, le château d'O est racheté par la famille des Montagu avant de devenir, en 1795, la propriété de la famille Roques. En 1878, le domaine d'O est vendu et démembré, et il faudra attendre le classement aux M.H.en 1964, pour qu'en 1973, Jacques et Yolande de Lacretelle entreprennent sa restauration. Commencé à la fin du XVe siècle, il fut agrandi par la Famille d'O et remanié aux XVIIe et XVIIIe siècles. C'était tout au début un pavillon de chasse, monté sur pilotis. Il possède une orangerie et un très beau jardin.","architecture":"D' O  de style Gothique, Flamboyant et Renaissance, entouré d'eau avec son pavillon de style gothique. Il date du XIe au XVIe siècle.  Éléments protégés MH : le château ; le pigeonnier ; la vasque ; les façades et toitures du bâtiment parallèle au château : classement par arrêté du 17 septembre 1964. La chapelle ; les façades et les toitures du bâtiment de l'orangerie. Les façades et les toitures des bâtiments de la ferme du château : inscription par arrêté du 29 août 1977. Le parc du château comprenant : les murs de clôture ; les portails et leurs grilles ; les avenues ;  ; le système hydraulique comprenant la rivière, les canaux et leurs ponts ; les sauts-de-loup ; les douves et leurs ponts ; l'étang et son île ; le bief du moulin avec ses vannes ; les façades et les toitures du moulin, de la maison du pont et de la charretterie : inscription par arrêté du 22 mai 2002.","habitants":"Famille de Robert d'O, famille des Montagu  \r\n        \r\n        \r\n        \"","divers":"Château d'O à Mortrée                                           gps 8° 38' 52\" nord, 0° 05' 15\" est","gps":"","images":["../image/image_61/61_DO_Mortr%c3%a9e_1.jpg","../image/image_61/61_DO_Mortr%c3%a9e_2.jpg","../image/image_61/61_DO_Mortr%c3%a9e_3.jpg","../image/image_61/61_DO_Mortr%c3%a9e_4.jpg","../image/image_61/61_DO_Mortr%c3%a9e_5.jpg","../image/image_61/61_DO_Mortr%c3%a9e_6.jpg","../image/image_61/61_DO_Mortr%c3%a9e_7.jpg","../image/image_61/61_DO_Mortr%c3%a9e_8.jpg","../image/image_61/61_DO_Mortr%c3%a9e_9.jpg"]},"Consult_chateau_formulairea386":{"id":"Consult_chateau_formulairea386","dept":"61","canton":"Bretoncelles","commune":"Dancé","nom":"Dancé","type":"Château","periode":"XVI-XIX","histoire":"Quatre châteaux dans cet article Beuvrière, Plessis, Rivardière et Bourdinière.                                                                                                          BEUVRIERE, dans le château de la Beuvrière on trouve une dalle portant les armoiries de la famille de Maleyssis, famille apparentée à Jeanne dArc et une dalle plus petite au nom de la famille de la Revaudière. Ce manoir avait une chapelle dédiée à Saint-Georges. Son autel en pierre est maintenant dans léglise de Verrières. La demeure fut détruite en 1850, par la famille Tardieu de Maleyssie Melun, pour faire place à un plus vaste et riche château.                     BOURDINIERE, du XIXe siècle, ancien manoir, il ne reste quune tourelle coiffée dun toit pointu.  En 1815, le manoir est vendu au comte Mac Cartry de Mervé. Le château du même nom a été bâti vers 1870. En l'an 2000, le château est mis en vente aux enchères, il est à cette époque très délabré.                                                                                          RIVARDIERE est un manoir bâti à Dancé,  La constuction du Manoir de la Rivardière date du XVIe siècle.","architecture":"BOURDINIERE,  à  Dancé  à cinq K.M.au nord-est de Préaux,  ancien manoir, il ne reste quune tourelle coiffée dun toit pointu.\r\nIl existait une chapelle détruite vers 1900 dédiée à Saint-Jacques et Sainte Catherine. Elle avait été fondée au XVIe siècle, comme le prouve le testament de Amaury Ronsard seigneur de la Bourdiniere passé le 11 avril 1518 devant Pierre Brignolle, tabellion à Villeray. Le château du même nom a été bâti vers 1870. En l'an 2000, le château est mis en vente aux enchères, il est à cette époque très délabré. Les propriétaires Charles François Fontaine de Merve,  Samuel Oiffer-Bomsel René Julien Martin Pillais                                                                                                                            PLESSIS, la construction du manoir du Plessis date du XVIe siècle. On peut visiter librement ses extérieurs, ses jardins et ses dépendances. Le manoir du Plessis est un ancien logis seigneurial du XVIe siècle décoré à lintérieur de magnifiques cheminées et des poutres ornées de motifs héraldiques et ésotériques peints. Le propriétaire en 1654 était Paul  Le  Prévost dOysonville, François Bernard Briçonnet en 1680, et Charles Bessirard de la Touche en 1762. Le Manoir du Plessis est inscrit en totalité aux M.H. le 12.11.1990  est ouvert sur RDV. Visite libre des extérieurs, visite des intérieurs sur RDV.","habitants":"Beuvrière; famille Tardieu de Maleyssie                            Bourdinière ;  comte Mac Cartry de Mervé                                              Plessis ; Paul Le Prévost dOysonville\r\n        \"","divers":"Trois châteaux dans cet article Beuvrière grav-4-5, Plessis grav 6 Rivardière grav-7     et Bourdinière grav 1-2-3                                                 .GPS : 48° 21' 36\" Nord, 0° 45' 19\" Est","gps":"48° 21' 36\" Nord, 0° 45' 19\" Est","images":["../image/image_61/61_Danc%c3%a9_1.jpg","../image/image_61/61_Danc%c3%a9_2.jpg","../image/image_61/61_Danc%c3%a9_3.jpg","../image/image_61/61_Danc%c3%a9_4.jpg","../image/image_61/61_Danc%c3%a9_5.jpg","../image/image_61/61_Danc%c3%a9_6.jpg","../image/image_61/61_Danc%c3%a9_7.jpg"]},"Consult_chateau_formulaire54ba":{"id":"Consult_chateau_formulaire54ba","dept":"61","canton":"Domfront-en-Poiraie","commune":"Domfront-en-Poiraie","nom":"Domfront","type":"Vestiges","periode":"XII- XVII","histoire":"Deux châteaux dans cet article dont Domfront et Lyvonnière.                                                                    DOMFRONT, la ville de Domfront fut créée vers 1014 par la construction par Guillaume de Bellême d'un château, dont elle constituait la basse-cour, elle-même entourée d'une palissade de bois. Entre 1289 et 1304, Robert II d'Artois, neveu de Saint Louis, fit construire 24 tours d'enceinte. En 1382, Pierre d'Alençon hérita de la terre et seigneurie de Domfront. Il fit réparer les fortifications et construire la porte d'Alençon. Au cours du XVIIe siècle, les remparts devenus sans importance militaire et d'un entretien coûteux, furent vendus à des particuliers.  En 1608, le château est démantelé sur ordre de Sully. En 1152, Henri II Plantagenet épouse Aliénor d'Aquitaine qui reçoit Domfront en douaire et y séjournera très souvent.  En 1202, Jean sans Terre prévoyant une lutte contre Philippe Auguste, renforce les fortifications du donjon. Propriété de la ville de Domfront. Le château en ruine a fait l'objet de plusieurs restaurations depuis 1984 par l'Association pour la restauration du château de Domfront.   Éléments protégés MH : les ruines du donjon : classement par liste de 1875. L'enceinte du château : les remparts, les tours, les bretèches, les casemates, les anciennes chapelles Sainte-Catherine et Saint-Symphorien: classement par arrêté du 18 février 1986  Le donjon est de style roman et de forme quadrangulaire. Sa construction date du XIIe siècle. Il ne reste, depuis, que des ruines du château de Saint-Symphorien.","architecture":"DOMFRONT, possédait un très beau donjon, de style roman, qui remonte du XII siècle, avec sa courtine à gaine, et son Prieuré St Symphorien. (donjon, remparts, prieural) fait lobjet dun classement aux M.H. depuis 1875. Certaines tours couvertes et habitées furent conservées, d'autres abandonnées, d'autres encore mutilées ou détruites pour en utiliser les matériaux. 14 tours subsistent sur les 24 d'origine.  Le donjon est rebâti vers 1120. C'était un donjon rectangulaire, l'un des plus gros de Normandie. A proximité se trouve les restes de la chapelle castrale privée, bâtiment de style roman. De 1289 à 1304, Robert II d'Artois fait édifier les murailles, le pont levis et l'essentiel des casemates. Le mur d'enceinte Est comprend deux tours du XIe siècle, un chemin casematé, deux tours polygonales constituant la tête du pont-levis et un fossé. Un pan du mur d'enceinte nord est conservé avec une tour, une poterne à mâchicoulis, une bretèche, un fossé et le rempart reliant l'ensemble à l'enceinte de la ville.                                                                                                                   LYVONNIERE, la construction du Manoir de la Lyvonnière date du 1er quart du XVIIe siècle et du 4e quart du XIXe siècle. Il s'écrit de différentes façons . Le manoir d'origine a été construit au début du XVIIe siècle. De cette époque, il subsiste la partie méridionale du logis, son décor, les 6 travées de façade côté parterre et la tour d'escalier pour sa maçonnerie extérieure. A l'intérieur, l'actuelle salle à manger est lambrissée de boiseries de style Henri IV. Au XVIIIe siècle, le manoir va subir plusieurs remaniements sans ses percements. Au XIXe siècle, le manoir de Lyvonnière a subi, à nouveau, de profonds remaniements, avec l'adjonction au Nord de 2 pavillons saillants et le prolongement de 2 travées du corps principal. Le grand salon est totalement réaménagé, ainsi que l'escalier en vis. L'aménagement paysager remonte à cette époque. Les éléments protégés aux M.H. le 30/06/2005, sont son salon \"Henri IV\" avec ses boiseries et son décor intérieur.","habitants":"Domfront;  Famille de Guillaume de Bellême \r\n        \"","divers":"Deux châteaux dans cet article dont Domfront et Lyvonnière grav 6-7   .gps  8° 35' 39\" nord, 0° 39' 08\" ouest                      Lyvonières GPS : 48° 35' 28\" Nord, 0° 38' 21\" Ouest","gps":"48° 35' 28\" Nord, 0° 38' 21\" Ouest","images":["../image/image_61/61_Domfront_1.jpg","../image/image_61/61_Domfront_2.jpg","../image/image_61/61_Domfront_3.jpg","../image/image_61/61_Domfront_4.jpg","../image/image_61/61_Domfront_5.jpg"]},"Consult_chateau_formulaire3cdc-2":{"id":"Consult_chateau_formulaire3cdc-2","dept":"61","canton":"Domfront-en-Poiraie","commune":"Domfront-en-Poiraie  Chapelle La Haute-Chapelle","nom":"Domfront_en_Poiraie","type":"Château","periode":"XVI-XVIII","histoire":"Deux châteaux à la Chaslerie dont celui de la Chaslerie et de la Guyardière.                                                                                                                                                                                                                        CHASLERIE,  il est situé à 5 kms au Nord de Domfront, l'ensemble de ses dépendances à l'initiative d'Édouard Herriot, le manoir a été classé aux M.H. en 1995. L'ancienne allée est inscrite en 1993. Surnommé le \"village\", cet ensemble de bâtiments, typique du bocage Domfrontais, est composé d'un logis avec ses tours, des écuries, d'un colombier, d'une chapelle, d'une ferme, d'une cave, d'un fournil. Éléments protégés MH : le porche avec son dôme à l'impériale ; les façades et les toitures du manoir comprenant le logis et ses deux tours d'angle, ainsi que les trois bâtiments qui lui font face (pavillon et son escalier d'accès, anciennes écuries, pavillon du colombier); cour avec ses murs de clôture et son bassin;  terrasse située à l'est du manoir supportant l'ancien jardin avec ses murs de clôture et de soutènement, ses douves et le bief situé à l'angle nord-est et le bief en amont: classement par arrêté du 4 juillet 1995.","architecture":"La CHASLERIE, ensemble de bâtiments édifiés de la fin du XVIe au XVIIIe siècle, au niveau des toitures, construits sur un site ancien, près d'une ancienne voie romaine:, logis et tours de la fin du XVIe siècle (inscription 1598 sur un linteau), porche de 1598, pavillon du début du XVIIe siècle, écuries de 1764 (inscription sur la sablière), pavillon du colombier du milieu du XVIIIe siècle, cave de 1762, fournil du début du XIXe siècle.                                              GUYARDIERE, le logis principal du manoir de la Guyardière, est d'aspect simple et se compose d'un gros corps de logis rectangulaire à fronton central classique, qui date du XVIe siècle. IL a été remanié en 1631 et au XIXe siècle, cantonné à l'arrière par 2 pavillons carrés qui ont alors remplacé les 2 tours rondes. Il est entièrement entouré de belles douves en eaux et protégé par une tour cylindrique du XVIe siècle dans un angle de sa cour d'honneur. Son avant-cour est introduite par 2 tourelles circulaires, du XVIe siècle, qui délimitent une porte voûtée en plein cintre surbaissé. Une majestueuse allée d'arbres de haute tige, marquée par la tempête de 1999, relie le manoir de la Guyardière, à la route voisine. La Citadelle et le donjon de Domfront sont visibles du manoir. Durant la Seconde Guerre mondiale, les officiers affectés à la Kommandantur de Domfront avaient établi leur résidence à la Guyardière. Lors des combats de la Libération, l'hôpital de Domfront y fut transféré, durant quelques mois, par les autorités sanitaires civiles. De nos jours, une Fête horticole annuelle est organisée au manoir de la Guayrdière, le 2ème Dimanche d'Octobre, et connaît un succès croissant auprès du Public. Le manoir de la Guyardière a été inscrit en 1992 aux M.H.","habitants":"Édouard Herriot\r\n        \"","divers":"Deux châteaux à la Chaslerie dont celui de la Chaslerie grav 2 à 5  et de la Guyardière grav-1  gps.48° 37' 03\" nord, 0° 40' 58\" ouest.                                                                                  Saucerie gps  48° 35' 49\" nord, 0° 42' 51\" ouest                                                        Guyardière GPS : 48° 36' 18\" Nord, 0° 40' 17\" Ouest                                   Lyvonnière grav-6-7","gps":"48° 36' 18\" Nord, 0° 40' 17\" Ouest","images":["../image/image_61/61_Domfront_en_Poiraie_1.jpg","../image/image_61/61_Domfront_en_Poiraie_2.jpg","../image/image_61/61_Domfront_en_Poiraie_3.jpg","../image/image_61/61_Domfront_en_Poiraie_4.jpg","../image/image_61/61_Domfront_en_Poiraie_5.jpg","../image/image_61/61_Domfront_en_Poiraie_6.jpg","../image/image_61/61_Domfront_en_Poiraie_7.jpg"]},"Consult_chateau_formulaire2c9e":{"id":"Consult_chateau_formulaire2c9e","dept":"61","canton":"Magny-le-Désert","commune":"Ecouché","nom":"Ecouché","type":"Château","periode":"XV-XVI","histoire":"Trois châteaux à Ecouché ; Serans , Menil-Glaise et la Queurie.                                                                                      SERANS, après la destruction de l'ancien manoir pendant la révolution française, le Comte de Serans, propriétaire du site qui comportait près de 300 hectares à l'époque, a fait venir un architecte italien pour construire le château autour de 1800. Il était passionné de la culture italienne et a même épousé une italienne dont le nom s'est rajouté au sien et devenir Cianelli de Serans. La famille possédait une villa vénitien en plein Normandie. Les Cianelli de Serans y ont demeurés au XIXe siècle et à partir de 1900 le lieu à appartenu a plusieurs familles. M. Balias l'a acquit en 1991 et entrepris sa restauration. L'intérieur a été réhabilité dans le style des villas italiennes avec des fresques aux murs et aux plafond, haut de couleur. Tout en respectant sa propre personnalité Balias a su mettre en valeur l'âme du château à travers un respect de la tradition conjugué avec la modernité. Location chambres d'hôtes et possibilité table d'hôtes, expositions de peintures et sculptures, métiers d'art, ateliers d'artistes.","architecture":"Le château de MENIL-GLAISE du XVIIe siècle est un château bâti à Écouché-les-Vallées.  A deux K.M.de de la courbe le logis de la QUEURIE la construction date du XVe siècle. L'ensemble se présente sous la forme d'un corps de logis accompagné d'une tour hexagonale. Un bandeau de pierre court le long des murs, séparant le rez-de-chaussée du premier étage, encadrant de larges fenêtres à meneaux. Au 1er étage, deux grandes chambres possèdent des cheminées monumentales. De chaque côté montent des pilastres et chapiteaux ornés d'une guirlande. Vu de l'extérieur, le Manoir de la Queurie semble inachevé, vu l'amorce d'un mur en attente. Le château de la Queurie est inscrit aux M.H. depuis le 2/11/1926. La Queurie devrait son nom et sa construction à une famille Le Queux ou Le Queu. Le logis a subi de nombreux aménagements depuis le XVe siècle. Il apparaît comme un groupement de constructions accolées ou soudées à une demeure plus ancienne dont la structure est caractéristique d'un manoir seigneurial des XVe et XVIe siècles. L'édifice présente un corps de logis accompagné d'une tour hexagonale. Un bandeau de pierre court le long des murs, séparant le rez-de-chaussée du premier étage, encadrant de larges fenêtres à meneaux. Au premier étage, deux grandes chambres possèdent des cheminées monumentales. De chaque côté montent des pilastres et chapiteaux ornés d'une guirlande. De l'extérieur, le manoir semble inachevé, comme le laisse penser l'amorce d'un mur en attente.","habitants":"Famille des  Cianelli de Serans\r\n        \"","divers":"Trois châteaux à Ecouché ; Serans grav 1-2-3 , Menil-Glaise grav-4-5 par GPS : 48° 43' 14\" Nord, 0° 11' 04\" Ouest                                   et la Queurie grav 6.                                                                 Serans GPS : 48° 43' 04\" Nord, 0° 07' 29\" Ouest                                             Queurie  GPS : 48°44'53,5\" Nord, 0°10'27\" Ouest","gps":"48° 43' 14\" Nord, 0° 11' 04\" Ouest","images":["../image/image_61/61_Ecouch%c3%a9_1.jpg","../image/image_61/61_Ecouch%c3%a9_2.jpg","../image/image_61/61_Ecouch%c3%a9_3.jpg","../image/image_61/61_Ecouch%c3%a9_4.jpg","../image/image_61/61_Ecouch%c3%a9_5.jpg","../image/image_61/61_Ecouch%c3%a9_6.jpg","../image/image_61/61_Ecouch%c3%a9_7.jpg"]},"Consult_chateau_formulaire74f8":{"id":"Consult_chateau_formulaire74f8","dept":"61","canton":"Ecouves","commune":"Essay et Boitron","nom":"Essay_Boitron","type":"Château","periode":"XVI-XIX","histoire":"Trois châteaux dans cet article, Beaufossé, Essai  et Villiers ( voir article).                                                                                                           BEAUFOSSE, l'évêque de Bayeux mentionnait en 1088, le château fort comme l'une des forteresses les plus considérables, appartenant à la Maison de Bellême. C'est durant le règne du roi Philippe Auguste (1180-1223) que le domaine d'Essay va relever directement du roi. Vers 1361, Pierre II, comte d'Alençon, fera protéger la ville, par d'épaisses murailles et de profonds fossés. Essay devint alors une « ville close ». En 1489, Beaufossé est positionné sur Essay et le domaine sur Boitron. La construction du château de Beaufossé date du XIXe siècle. Entre  1890 et 1892 Henri et Achille Duchêne crée une grande pièce d'eau en fer à cheval circonscrivant un massif. Il nivelle tout le parc pour créer une perspective en légère descente depuis le château,  Le logis est restructuré, avec l'extension de la salle à manger en style classique et double, de style néo-normand. Plusieurs bâtiments de ferme sont créés. L'ensemble est réalisé par l'architecte Nicolas.                                                                                                           A Essay  le château de VILLIERS  hôtel restaurant de monsieur Franck Rollo,  château, dont les origines remontent au XVIe siècle (voir article).","architecture":"BEAUFOSSE, en 1489, le château de Beaufossé, en grande partie détruit pendant la guerre de Cent Ans, sera restauré. Il est repris en 1590, aux Ligueurs, par les armées du roi. Henri IV fit ordonner sa destruction, puis revint heureusement sur sa décision. En 1598, les États de Normandie iront dénoncer, au roi, le château d'Essay, comme un repaire de brigandage.  En 1845, le domaine comprenait une habitation agrémentée d'un parc paysager et de communs. A cette époque, des travaux d'extension sont menés sur le logis, doublé en profondeur. Une seconde campagne de transformation a lieu dans les années 1890. Le logis est restructuré, avec l'extension de la salle à manger en style classique. Des bâtiments de ferme sont créés. L'ensemble est réalisé par l'architecte Nicolas. Les paysagistes Henri et Achile Duchêne restructurent le parc par la création, devant la façade antérieure du château. Ce parterre s'accompagne d'un boulingrin précédant l'entrée du potager Le château de Beaufossé est inscrit aux M.H. depuis le 8/04/2008.. Éléments protégés MH : le château en totalité, y compris le bâtiment de la salle à manger et l'aile néo-normande ; les façades et les toitures de l'ensemble des bâtiments de la ferme ; l'ensemble du parc avec ses éléments constitutifs et les deux groupes sculptés du petit parc.","habitants":"Famille de Pierre II comte d'Alençon\r\n        \"","divers":"Trois châteaux dans cet article, Beaufossé et  Essai  . GPS : 48° 32' 28\" Nord 0° 14' 49\" Est","gps":"48° 32' 28\" Nord 0° 14' 49\" Est","images":["../image/image_61/61_Essay_Boitron_1.jpg","../image/image_61/61_Essay_Boitron_2.jpg","../image/image_61/61_Essay_Boitron_3.jpg"]},"Consult_chateau_formulaire13a3":{"id":"Consult_chateau_formulaire13a3","dept":"61","canton":"Tourouvre","commune":"Le Mage","nom":"Feillet","type":"Château","periode":"XVII","histoire":"FEILLET,  construit en 1680 par la famille Gruel de la Frette  sur l'emplacement de l'ancienne demeure des sires de Feillet. Le fief passa par héritage au Montoire-Vendôme puis aux Bourbon-Vendôme, mais le château revient à Guillemette de Feillet qui l'apporta en dot à Gervé Auvé seigneurs de Vaujours leurs descendants Gilles Auvé maître d'hôtels d'Henri IV,  l'une des filles  de Gilles, Marguerite  épousa Claude Gruel de la Frette gouverneur de Chartres. Leur fils Pierre par son mariage avec Barbe Servien filles d'un cousin germain  qui avait eu lors d'un premier mariage une fille qui devient la duchesse de Chaulnes, Barbe avec Pierre Gruel eut de nombreux enfants Feillet passa à son  frère René  époux d'une soeur du maréchal  d'Albret leur fille  marié à Antoine d'Aydie décède sans enfants légua en 1708 le domaine à l'hôpital général de Paris. La Salpêtrière par manque de finances, en 1712 Alexandre-Julien-Clément conseiller au parlement de Paris et en 1747 le domaine passe à son fils Ambroise qui le revendit en 1753 à Helvétius, le philosophe avait déja acquis en 1743 le château de Voré en 1771 à sa mort, sa fille la comtesse d'Andleau hérita des deux domaines qu'elle partagea entre son fils le comte d'Andlau et sa fille la marquise de Rosenbo qui eu Feillet. Mlle de Rosanbo apporta Feillet à son époux M.de Viel-Lunas marquis d'Espeuilles  leur fils général  d'Espeuilles. En 1886 les d'Andlau rachetèrent le domaine de nouveau réuni à celui de Voré. Feillet passa par héritage au comte Terray et il est acquis en 1938 par monsieur Philippe Aubertin propriétaire actuel.","architecture":"FEILLET,  il ne subsiste du château que le corps central, les deux ailes en retour ayant été démolies au XIXe siècle. Il s'agit d'une construction classique avec un bâtiment central flanqué de deux pavillons. Un fronton triangulaire de brique contenant les vestiges d'un blason, orne les deux façades. Toutes les baies sont ornées de chaînages mi-briques, mi pierres blanches. L'intérieur a été entièrement refait et les boiseries remontées en 1938. Accolée au château, la chapelle est construite dans le même style. Le baillage présente une façade sur cour avec deux pavillons et une tourelle à moitié engagée formant avant-corps. Les façades et les toitures du château et du bailliage, ainsi que la chapelle en totalité sont inscrites au titre des M.H. par arrêté du 23 décembre 1981.","habitants":"famille Gruel de la Frette\r\n        \"","divers":"Feillet gps 48° 30' 20\" Nord, 0° 49' 08\" Est","gps":"","images":["../image/image_61/61_Feillet_1.jpg","../image/image_61/61_Feillet_2.jpg"]},"Consult_chateau_formulaireee19":{"id":"Consult_chateau_formulaireee19","dept":"61","canton":"Rai","commune":"La Ferté Fresnel","nom":"Ferté_Fresnel","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article; la Ferté-Fresnel et la Boële.                                                                                      FERTE-FRESNEL, ce château a été bâti entre 1865 et 1867 par l'architecte parisien Storez pour le marquis de Montaut, à l'emplacement de trois châteaux plus anciens (deux féodaux et un du XVIIIe siècle, dont reste le colombier daté de 1766). Lancien parc à la Française du XVIIIe siècle, transformé en parc paysager au XIXe, fut réaménagé par le richissime banquier Vincent qui a acquit le domaine en 1918 et le conserva jusquen 1939, cest sous limpulsion des paysagistes Henri et Achille Duchêne que fut réaménagé un parc à la française tel quon le voit actuellement. Des décors anciens et antérieurs à la construction ont été amenés par le marquis de Montault et proviennent dun autre château.\r\nÉléments protégés MH : le château avec l'ensemble de ses décors intérieurs ; les façades et les toitures de l'ancien manoir ; le colombier ; le lavoir ; le parc avec douves, ponts, étang. Chambres d'hôtes de madame Chaix.","architecture":"FERTE-FRESNEL, il est immergé dans un parc de 20 hectares et fut construit, en 1860. Il possède un magnifique hall d'entrée, dominé par un énorme lustre style Viollet-le-Duc. L'abondance de ses décors anciens, et les salles de réception, ses parquets à la Versaille du XVIIIe siècle, ses boiseries du XVIIe siècle, ses cheminées d'époque sous Louis XIV, Louis XV, constituent un ensemble d'une rare qualité et offre aux visiteurs, un ensemble très bien conservé. Il a aussi un salon des arts. Le Parc  à la Française, créé sous l'impulsion de Duchêne, qui regorge de nombreuses essences et arbres remarquables, de topiaire, de balustres, de douves. Le château de la Ferté-Fresnel est inscrit aux M.H. depuis 1996.                                                                                                                                  A trois K.M. à l'Est à Clos la Ferrière château de  BOËLE;   il est inscrit à l'Inventaire supplémentaire des M.H.. Le château a été achevé en 1606. On ne connaît pas l'origine du fief qui était déjà constitué en 1414.  Son propriétaire en 1570, Jacques Jouey fut conseiller à la Cour des comptes de Normandie. Son petit-fils, Jacques III, aura sa chapelle particulière en l'église en 1610. Au milieu du XIXe siècle, M. Mouchel, propriétaire de forges à Aube, l'acheta à la famille Toutain dont il fit la généalogie. le château se compose d'un corps central d'époque Louis XIII avec parements et décors de pierre et brique, et de deux ailes construites vers 1738, avec chaînage en briques. A cette époque le château du Boële appartenait à la famille de Bernières. A proximité se trouve le pigeonnier avec une série d'arcs de décharge. Éléments protégés MH : les façades et les toitures du château et les restes du colombier : inscription par arrêté du 17 05 1974.","habitants":"Ferté; Famille du Marquis de Montault   Boële, famille de Bernières.\r\n        \"","divers":"Deux châteaux dans cet article; la Ferté Fresnel grav 1 à 5 et la Boële grav-5.     GPS : 48° 50' 22,28\" Nord, 0° 30' 44,6\" Est                                                                                          \r\nBoele  gps 48° 51' 25\" nord, 0° 36' 04\" est","gps":"48° 50' 22,28\" Nord, 0° 30' 44,6\" Est","images":["../image/image_61/61_Fert%c3%a9_Fresnel_1.jpg","../image/image_61/61_Fert%c3%a9_Fresnel_2.jpg","../image/image_61/61_Fert%c3%a9_Fresnel_3.jpg","../image/image_61/61_Fert%c3%a9_Fresnel_4.jpg","../image/image_61/61_Fert%c3%a9_Fresnel_5.jpg"]},"Consult_chateau_formulaire892f-2":{"id":"Consult_chateau_formulaire892f-2","dept":"61","canton":"Ceton","commune":"La Chapelle-Scouëf","nom":"Feugerets","type":"Château","periode":"XVI-XVII-XVIII","histoire":"Trois châteaux à la Chapelle-Souëf, Feugerets, Chaponnière et  Couesme.                                                                                                     FEUGERETS, cest Jehan des Feugerets qui fait construire le château actuel entre 1550 et 1570. Le donjon de 1505 est intégré à la nouvelle demeure bâtie sur lesplanade entouré de douves. Devant la façade principale, deux pavillons dentrée carrés sont construits en 1560.  Famille des Feugerets qui se distingua dans les guerres d'Henri IV  à Louis XV, le domaine est transmis par héritage, et  n'a jamais été  aliéné au cours des siècles.                                                                   A cinq K.M. à L'ouest à st Cyr la Rosière  le manoir  de la CHAPONNIERE, la construction du manoir de la Chaponnière date du XVIe siècle,  pas d'informations historique.                                                                                                                                                A deux  K.M.plus au nord  à Dame-Marie;  COUESME,  fief appartenant à la famille de Coesme du XIIIe au XVIe siècle puis  à celle des Feugerets du XVIe au XVIIIe siècle fut la résidence de Carol de Roumanie longtemps délaissé vient d'être remis en état par M.J.L. Richard. Le corps principal du château a été construit au XVIIIe siècle. A gardé une belle tours du XVe siècle, autres  tours construites au XIXe siècle (après 1823). Le bâtiment de plan régulier, se compose d'un étage carré, d'un étage de comble et un sous-sol, le gros-oeuvre en calcaire et moellon, élévation à travées surmontée de toit à longs pans, croupe et toit conique, couverts d'ardoise.","architecture":"FEUGERETS, au XVIIe siècle, une terrasse est aménagée devant les douves. Une élégante balustrade lentoure
