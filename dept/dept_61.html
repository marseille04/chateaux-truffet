it chasser pendant la Révolution de 1848. Ensuite le château a été vendu à plusieurs reprises, et après une longue déchéance, racheté par la ville en 1920. Les communs abritent le Musée de Juin 44 ainsi que l'Office de Tourisme.  Éléments protégés MH : le château et ses communs.","architecture":"AIGLE, a été construit au début du XVIIIe siècle. Il est constitué par 2 bâtiments en équerre. Chacune des ailes est agrémentée d'avant-corps à frontons triangulaires en briques apparentes. Au centre se trouve un escalier en pierre avec rampe en fer forgé Louis XVI. Au nord du château, un bâtiment de même style qui servait d'écuries et remises. Les plans du château seraient attribués à Hardouin-Mansart, l'architecte du Roi. En 1730, les travaux d'embellissement entrepris pour Jacques Louis des Acres, fils du constructeur, n'étaient pas encore terminés.  l'intérieur endommagé en 1944 conserve un bel escalier avec rampe en fer forgé. Au Nord du château de l'Aigle se trouve un petit bâtiment de même style, qui servait autrefois d'écuries et de remises. Le château est devenu l'hôtel de ville de l'Aigle. Il occupe 1200 m2, 18 pièces et 12 chambres, piscine. Le château de l'Aigle a été classé aux M.H.  en 1948 avec ses communs.                                                                    NOUETTES  à AUBE a cinq K.M.  à l'ouest. Le château des Nouettes fut la résidence de la comtesse de Ségur, née Rostopchine, qui écrivit ses célèbres écrits, de 1821 à 1877. D'une superficie de 72 Ha, le domaine comprend, une maison d'habitation avec une cour et un jardin de maître. Il existe aussi les maisonnettes du concierge et du jardinier, ainsi qu'une ferme, des prairies et des bois. Le parc est planté d'arbres vénérables. Depuis 1930, devenu la propriété du département de l'Orne, le château des Nouettes abrite aujourd'hui l'Institut Médico-Educatif de lAssociation Lehugeur-Lelièvre.","habitants":"Aigle; Jacques Louis des Acres                                     Nouettes; Comtesse de Ségur\r\n        \r\n        \r\n        \r\n        \"","divers":"Deux châteaux à L'Aigle: Aigle grav 1 hôtel de ville grav château  grav 2-3-4 et  Nouettes grav 5-6.                                        Aigle  GPS : 48° 45' 52\" Nord, 0° 37' 44\" Est                                                             Nouettes GPS : 48° 44' 10\" Nord, 0° 33' 29\" Est","gps":"48° 45' 52\" Nord, 0° 37' 44\" Est","images":["../image/image_61/61_Aigle_1.jpg","../image/image_61/61_Aigle_2.jpg","../image/image_61/61_Aigle_3.jpg","../image/image_61/61_Aigle_4.jpg","../image/image_61/61_Aigle_5.jpg","../image/image_61/61_Aigle_6.jpg"]},"Consult_chateau_formulaire4901":{"id":"Consult_chateau_formulaire4901","dept":"61","canton":"Alençon","commune":"Alençon","nom":"Alençon_61","type":"Patrimoine","periode":"XII-XIII-XV","histoire":"ALENCON, Henri Ier Beauclerc fut son premier propriétaire. En 1219,   l'héritière des Montgommery vend le comté à Philippe Auguste. Louis IX  donne à son fils Pierre qui meurt en 1284 sans postérité, son neveu Charles Ier hérite est à l'origine de la maison d'Alençon. château construit par Pierre II, comte d'Alençon de 1361 à 1404. la place est conquise  en 1417 par le roi Henry V d'Angleterre  qui chasse le duc Jean II  alors âgé de huit ans, ce dernier combattra au côté de Jeanne d'Arc.  En 1492 la veuve de René II Marguerite de Lorraine prend en mains le duché, son fils Charles IV épouse Marguerite d'Angoulême soeur de François Ier qui après la mort de son mari en 1525  convole avec Henri Albert roi de Navarre.En 1589 le futur Henri IV petit-fis de Marguerite assiège le château  occupé par le duc de Mayenne. A la fin du XVIe siècle, vers 1592, après les guerres de religion,  le château est démoli sur ordre d'Henri IV, seul le donjon est encore debout.  il servit de dépôt de mendicité de 1768,  le donjon est abattu  en 1783 s'élève sur l'emplacement le palais de Justice et le bâtiment sert aujourd'hui de prison. Propriété du ministère de la Justice.                                                                HOTEL de GUISE, hôtel édifié en 1630 par Fromont de la Bernadière, receveur des tailles. En 1675, il est acquis par la princesse Elisabeth d'Orléans, petite fille de Henri IV, duchesse de Guise et d'Alençon. En 1751, l'hôtel fut abandonné à la ville par Louis XV pour servir d'habitation aux intendants de la généralité de cette région. L'intérieur conserve des boiseries. Éléments protégés MH : le corps du logis principal, le pavillon contigu, à droite de ce corps de logis, les deux pavillons de concierge à droite et à gauche de la grille d'entrée : classement par arrêté du 11 juillet 1903.","architecture":"ALENCON, sa construction actuelle date du XIIe au XVe siècle.  En 1782, suite à des travaux mal réalisés, le donjon est détruit à son tour. Le château avant sa destruction se composait d'une enceinte fortifiée, englobant deux îles de la Briante, flanquée de grosses tours rondes, dont la tour Giroie, la tour salée faisant office de magasin à sel, de la barbacane. De cet importante forteresse, il subsiste de nos jours, la tour couronnée, le corps de logis attenant à la tour, et le châtelet d'entrée avec ses deux tours rondes jumelles à mâchicoulis. L'impression que peut laisser le châtelet d'entrée, avec ses deux tours jumelles, témoigne de la grandeur et de la somptuosité de l'ancien château. Il ne reste plus rien de la tour Giroye, des fossés formés par la Briante, peu de choses reste de ce magnifique ensemble qu'était le château d'Alençon,  ainsi que la célèbre Tour couronnée sont encore intactes. La prison à quittée les lieu, le château des ducs se retrouve vide, il devrait être cédé pour leuro symbolique à la municipalité, qui veut en faire un lieu vivant.  Les bâtiments existants ne représentent que 10 % de lensemble. Il subsiste le châtelet, une courtine, la tour couronnée et une poterne, le palais de justice datant du Premier Empire se trouve à côté. Le château des Ducs est devenu une maison d'arrêt où durant la seconde guerre mondiale,  il ne reste que le corps de garde avec deux solides tours en granit élevées au XIVe siècle ainsi que la tour couronnée relié e par une courtine à la tour d'entrée sud, sur la face arrière s'élève un logis du XVe siècle avec fenêtres à meneaux qui sert de prison. Le château des Ducs est classé M.H. depuis 1962. La maison darrêt dAlençon appartenant au Ministère de la Justice, a été transférée vers Coulaines en 2010,  est prévu la visite de certaines parties du château où vécurent les ducs d'Alençon.","habitants":"Pierre II, comte d'Alençon \r\n        \r\n        \"","divers":"Patrimoine d'Alençon grav 1 à 6  grav 7 hôtel de ville,   grav-8 hôtel de Guise.                                                                     GPS : 48° 25' 47\" Nord, 0° 04' 59\" Est                                                                 GPS : 48° 25' 45,84\" Nord, 0° 5' 0,37\" Est","gps":"48° 25' 47\" Nord, 0° 04' 59\" Est","images":["../image/image_61/61_Alen%c3%a7on_61_1.jpg","../image/image_61/61_Alen%c3%a7on_61_2.jpg","../image/image_61/61_Alen%c3%a7on_61_3.jpg","../image/image_61/61_Alen%c3%a7on_61_4.jpg","../image/image_61/61_Alen%c3%a7on_61_5.jpg","../image/image_61/61_Alen%c3%a7on_61_6.jpg","../image/image_61/61_Alen%c3%a7on_61_7.jpg","../image/image_61/61_Alen%c3%a7on_61_8.jpg"]},"Consult_chateau_formulaire43c1":{"id":"Consult_chateau_formulaire43c1","dept":"61","canton":"Ceton","commune":"Saint-Agnan sur Erre,","nom":"Amilly_Epinay","type":"Château","periode":"XV-XVII-XIX","histoire":"AMILLY, lancien château féodal a été détruit pendant la guerre de cent ans et remplacé par un château renaissance. En 1630  la seigneurie est acquise par  la famille de la Briffe.  Avant la Révolution, il représentait une des plus grosses fortunes du Perche, en 1789, il a été vendu comme bien démigrés. Le domaine qui compte parmi les plus important du perche est démembré, son propriétaire d'alors Henri Bonaventure de la Briffe ayant émigré. En 1800 le comte de la Briffe décède à la bataille d'Hohenlinden. Il a été reconstruit en partie à partir de 1820. Le domaine passe à la famille Langlois qui agrandit et qui relève le titre comtal attaché à la terre et conserve  Amilly jusqu'au lendemain de la première guerre mondiale époque à laquelle  la propriété est acquise par Jean Labbé avocat au conseil d'état ses descendants sont toujours propriétaire des lieux.                                                                                 EPINAY à Deux K.M au sud  à St-Hilaire sur Erre ,manoir  dont la construction date du XVe siècle. Le domaine de l'Epinay comprend le logis manable, trois bâtiments de communs, un colombier et les vestiges d'une enceinte fortifiée. Le logis rectangulaire est flanqué d'une tour d'escalier circulaire, et est le seul manoir du Perche à posséder un étage à pans de bois sur un soubassement de pierres. A l'intérieur, éléments sculptés et, à l'étage. Une bretèche fait le lien, sur la façade arrière, entre le logis et la tour. Le colombier, qui a conservé ses boulins, est percé de canonnières. L'enceinte a conservé quelques éléments de murs et les vestiges des deux tours d'angle. Le manoir de l'Épinay est inscrit aux M.H. depuis le 6/11/1990.","architecture":"AMILLY, a la fin du XVe siècle reconstruction du château dont-il reste aujourd'hui une tour à mâchicoulis isolée du corps de logis actuel  coiffée d'un toit en poivrière, témoin de la forteresse médiévale et d'une aile avec de belles lucarnes sculptées.  Les bâtiments  résidentiels datent des années 1820, l'édifice bâti sur un plan en équerre se compose de deux ailes ouvrant sur la cour d'honneur. Le corps principal  au fond de la cour est flanqué d'une tourelle d'escalier polygonale hors-oeuvre. L'aile gauche cantonnée à son angle extérieur d'un gros pavillon perpendiculaire plus élevé d'un étage, et la façade arrière du corps de logis sont en briques la pierre étant utilisée pour les chaînages d'angles et les encadrements des ouvertures. Isolées au nord les dépendances, ordonnées autour d'une cour de ferme présente pour leur part un exemple de noble architecture rurale. Les bâtiments bas coiffés de toits de tuiles sur lesquels se détachent des lucarnes de pierre sommées de fronton. Les communs y sont superbes. Le mur de clôture, le jardin potager et la clôture de jardin sont inscrits au pré-inventaire des jardins remarquables.","habitants":"Famille de la Briffe\r\n        \r\n        \"","divers":"Château  d'Amilly et                                                                    Epinay grav-1-2-                                                                                       Amilly grav 3-4- grav 5-6                                                                        st-Aignan  GPS : 48° 19' 53\" Nord, 0° 45' 01\" Est","gps":"48° 19' 53\" Nord, 0° 45' 01\" Est","images":["../image/image_61/61_Amilly_Epinay_1.jpg","../image/image_61/61_Amilly_Epinay_2.jpg","../image/image_61/61_Amilly_Epinay_3.jpg","../image/image_61/61_Amilly_Epinay_4.jpg","../image/image_61/61_Amilly_Epinay_5.jpg","../image/image_61/61_Amilly_Epinay_6.jpg"]},"Consult_chateau_formulaire62af":{"id":"Consult_chateau_formulaire62af","dept":"61","canton":"Bretoncelles","commune":"Saint-cyr la Rosière","nom":"Angenardière","type":"Manoir","periode":"XVI","histoire":"L'ANGENARDIERE à St CYR la ROSIERE   La construction du manoir de Langenardière  date du 4eme quart du XVIe siècle, par Pierre de Fontenay seigneur de la Reynière et capitaine d'henri IV en 1673,  le fief se rattache à la seigneurie de la Rosière. En 1795 vendu comme bien national, en 1964  la famille Gouyon rachète les ruines du manoir qui le  restaure avec soins.","architecture":"LANGENARDIERE à St CYR la ROSIERE, la construction du manoir de Langenardière édifié peu avant la fin des guerres de religions, il est doté des meilleurs équipements défensifs : grosse tour ronde à mâchicoulis, échauguette, petites tours à meurtrières, 4 tours d'angles. Établie selon un plan carré, lenceinte extérieure était protégée par un fossé aujourdhui à sec, mais encore visible. Lentrée du manoir se fait latéralement, par un pont dont il ne subsiste  aujourdhui que deux piles (à gauche du portail). A l'origine, les remparts mesurent 7m de haut et relient 4 tours d'angle (dont une occupée par un pigeonnier bien conservé). Par la suite, le manoir sera remanié et perdra son côté défensif.  Le logis sera modifié selon les critères de la Renaissance et lui seront adjoints, une grosse tour, une tour dangle ainsi qu'une étonnante galerie à arcades. Ce manoir fait l'objet d'une soigneuse restauration depuis les années 60, et s'il n'est pas ouvert à la visite, la découverte extérieure autorisée jusqu'au porche d'entrée. C'est une ancienne place forte du Perche, bâtie sur un plan rectangulaire. Le logis occupe un côté du quadrilatère. Il est muni de tourelles d'angle à mâchicoulis. Les communs construits en équerre et le petit logis latéral font partie du système général de la forteresse. Ils étaient entourés, à l'extérieur, de fossés de défense dont les traces sont encore visibles. Ils sont munis de tours d'angle stratégiques et hérissés de meurtrières.  Est inscrit aux M.H. depuis le 19/12/1968.","habitants":"Famille de  Pierre de Fontenay\r\n        \"","divers":"Manoir de l'Angenardière grav 1 à 6                                                                   gps 48° 19' 05\" N, 0° 38' 42\" Est","gps":"","images":["../image/image_61/61_Angenardi%c3%a8re_1.jpg","../image/image_61/61_Angenardi%c3%a8re_2.jpg","../image/image_61/61_Angenardi%c3%a8re_3.jpg","../image/image_61/61_Angenardi%c3%a8re_4.jpg","../image/image_61/61_Angenardi%c3%a8re_5.jpg","../image/image_61/61_Angenardi%c3%a8re_6.jpg"]},"Consult_chateau_formulaireb7e3":{"id":"Consult_chateau_formulaireb7e3","dept":"61","canton":"Argentan","commune":"Argentan","nom":"Argentan","type":"Château","periode":"XIII-XIV-XVI","histoire":"Trois constructions dans cet article le Palais des ducs , la tour Margueritte et Pomereux à Montgaroult.                                                       DES DUCS, il subsiste un gros donjon polygonal du XIIIe siècle, non dégagé de constructions postérieures et surtout le corps de logis datant du XVe siècle où vécut Marguerite de Lorraine,  fondatrice des clarisses d'Argentan, Alençon et Mortagne. le donjon c'est le vestige de la forteresse construite au XIIe siècle. Hormis un tremblement de terre, la ville n'a pas connu de grands bouleversements jusqu'à la Révolution française. La ville est alors marquée par une forte présence religieuse (la visite d'Henri IV et l'installation des Plantagenêts au château d'Argentan en témoignent) et un nombre impressionnant d'hôtels particuliers , mais la Terreur, en touchant de plein fouet l'église, bloque la croissance de la ville. Cette ancienne demeure du Duc de Normandie et roi d'Angleterre Henri Ier Beauclerc, est refait peu après. Il abrite, dans ses murs, le Palais de Justice d'Argentan, depuis 1827. Le château des Ducs d'Argentan est classé aux M.H. depuis 1889. La chapelle du château ou chapelle Saint-Nicolas : inscription par arrêté du 19 juillet 1925.","architecture":"La tour  MARGUERITTE, la construction de la Tour date du XIVe au XVe siècle. Au début du XIIe siècle, le duc et roi Henri Ier Beauclerc fit bâtir un puissant château-fort qui devait servir de point d'appui à son autorité, dans une région troublée par des coalitions rebelles. 200 ans plus tard, Argentan devint une place forte et s'entoura de fortifications. Des 16 tours qui flanquaient cette enceinte, seule subsiste la Tour Marguerite. Au Moyen-Age, la tour était appelée la Tour au Febvre ou la Grosse Tour. La tour Marguerite s'élevait à l'angle Nord-Ouest des remparts de la ville, au point où les fossés étaient à sec.  Aux XVIIe et XVIIIe siècles, les bourgeois firent raser les fortifications, sauf la Tour Marguerite,  c'est une tour circulaire, haute de 17 mètres. Le parapet du couronnement est en encorbellement, soutenu par d'importants corbeaux entre lesquels sont ménagés des mâchicoulis. La toiture pyramidale à pans, qui ne datait peut-être que du XVe siècle, était en tuile et sommée d'un épi de plomb. A l'intérieur, la tour est divisée en 3 étages, reliés par un escalier à vis. La Tour Marguerite a été classée aux M.H. le 9/09/1965. Elle est devenue la propriété de la commune.                                                                                           A 10 K.M à l'ouest à Montgaroult le manoir de POMMEREUX, il date du XVIe siècle, cette demeure en pierres blanches, à plan rectangulaire, fut construite vers la fin du XVe siècle, sur les vestiges d'une gentilhommière datant du XIIIe siècle. Elle est flanquée, au Sud, d'une tour à 6 pans et d'une tourelle en encorbellement. Il subsiste encore des fenêtres à meneaux avec coussièges, des cheminées royales, des gargouilles. La tour est occupée par un escalier à vis avec une rampe hélicoïdale et, au sommet, par un oratoire Renaissance. La tourelle du manoir de Pommereux abrite un escalier menant à l'oratoire, sauf les parties classées est inscrit aux M.H. le 2/11/1926.","habitants":"des Ducs et  roi d'Angleterre Henri Ier Beauclerc                                         Pommereux;\r\n        \r\n        \"","divers":"Trois constructions dans cet article le Palais des ducs grav 1-2 , la tour Marguerite grav 3 et Pomereux grav4-5 à Montgaroult                                                                                           palais gps 48° 44' 35\" nord, 0° 01' 11\" ouest                                                              Donjon   GPS : 48° 44' 38\" Nord, 0° 01' 05\" Ouest                                                 Tour GPS : 48° 44' 45,93\" Nord, 0° 01' 15,29\" Ouest                                    Pommereux GPS : 48° 44' 55\" Nord, 0° 07' 53\" Ouest","gps":"48° 44' 38\" Nord, 0° 01' 05\" Ouest","images":["../image/image_61/61_Argentan_1.jpg","../image/image_61/61_Argentan_2.jpg","../image/image_61/61_Argentan_3.jpg","../image/image_61/61_Argentan_4.jpg","../image/image_61/61_Argentan_5.jpg"]},"Consult_chateau_formulaire0ba9":{"id":"Consult_chateau_formulaire0ba9","dept":"61","canton":"Sées","commune":"Sées","nom":"Argentré_Sées","type":"Palais","periode":"XVIII","histoire":"ARGENTRE, le palais d'Argentré, ancien évêché de Sées, est bâti en 1778 par l'architecte Joseph Brousseau pour le compte de Jean-Baptiste du Plessis d'Argentré, évêque de Sées.   Nommé évêque de Sées en 1775,  Jean Baptiste d'Argentré, précepteur des enfants du roi, bénéficiait de solides appuis à la cour. Il en profita pour développer sa ville.  L'ancien palais étant insalubre, il fit appel en 1777 à l'architecte limousin Joseph Brousseau, concepteur du palais épiscopal de Limoges occupé par son frère, Charles Louis.","architecture":"ARGENTRE, sobriété et rigueur définissent les élévations, la beauté de la construction trouvant sa source dans l'harmonie des proportions et la disposition des ouvertures.  C'est un chef d'oeuvre de l'architecture néoclassique en Normandie. Ce palais abrite l'administration diocésaine et la résidence de l'évêque.","habitants":"Famille de Jean-Baptiste du Plessis d'Argentré\r\n        \"","divers":"Palais d'Argentré\r\ngps 48° 36' 18\" N, 0° 10' 25\" Est","gps":"","images":["../image/image_61/61_Argentr%c3%a9_S%c3%a9es_1.jpg","../image/image_61/61_Argentr%c3%a9_S%c3%a9es_2.jpg","../image/image_61/61_Argentr%c3%a9_S%c3%a9es_3.jpg","../image/image_61/61_Argentr%c3%a9_S%c3%a9es_4.jpg"]},"Consult_chateau_formulaire8b3c":{"id":"Consult_chateau_formulaire8b3c","dept":"61","canton":"Argentan","commune":"Aubry-en-Exmes","nom":"Aubry_en_Exmes","type":"Château","periode":"XIV","histoire":"AUBRY en EXMES, la construction du vieux château date du XIVe siècle pour Montgomery Gabriel de Lorges, comte de Aubry-en-Exmes. La demeure date du règne de Henri IV. Selon la tradition, le donjon servit de refuge à Montgomery fuyant la colère de Catherine de Médicis.  Il appartient actuellement à M. le comte de Costart.\r\nÉléments protégés MH : le château et restes de l'ancien donjon sur lequel il a été édifié : classement par arrêté du 17 avril 1968.","architecture":"AUBRY en EXMES,  situé dans la vallée très humide de la Dives, le château devait à l'origine être défendu par des fossés inondés. Ce fut d'abord une tour circulaire à créneaux et mâchicoulis, peut-être du XIVe siècle. fut bâtie sur un donjon  du XIVe siècle. Le dernier était un bastion fortifié faisant partie, au Moyen-Age, du système défensif de la forteresse d'Exmes. Cette dernière était entourée d'une ceinture de petites places fortes dont Aubry-en-Exmes faisait partie. Quand la mode des édifices d'allure militaire passa, au lieu de faire ce qui se serait fait partout ailleurs, raser la forteresse et la remplacer par une demeure de plaisance, le propriétaire eut la singulière idée de bâtir un bâtiment de style Louis XIII sur le haut de la tour médiévale. D'ou le plus singulier empilement de construction que l'on puisse voir, trois étages d'un édifice rectangulaire flanqué de quatre tourelles carrées surmontent les mâchicoulis du château. Malgré la qualité de l'architecture et le splendide appareil, il dut vite s'avérer inhabitable. On le délaissa au XIXe siècle pour un château beaucoup plus modeste mais plus commode, qui se trouve à côté. Les constructions anciennes à peine utilisées, sauf comme cellier, sont aujourd'hui dégradées, notamment leurs toits. Le donjon circulaire, entouré de douves, devait défendre la haute vallée de la Dives. A l'époque de Henri IV, les seigneurs décidèrent d'édifier une demeure aristocratique sur l'ancien donjon. En 1808, le propriétaire décida de construire près du vieux château une nouvelle demeure plus spacieuse, laissant à l'abandon l'ancien édifice. Le Vieux Château a été classé aux M.H. en 1968.","habitants":"Famille de Gabriel de Lorges\r\n        \"","divers":"château d'Aubry GPS : 48° 48' 27\" Nord, 0° 04' 48\" Est                                                                 GPS : 48° 47 33\" Nord, 0° 04 04\" Est","gps":"48° 48' 27\" Nord, 0° 04' 48\" Est","images":["../image/image_61/61_Aubry_en_Exmes_1.jpg","../image/image_61/61_Aubry_en_Exmes_2.jpg","../image/image_61/61_Aubry_en_Exmes_3.jpg"]},"Consult_chateau_formulaire8c7f":{"id":"Consult_chateau_formulaire8c7f","dept":"61","canton":"Radon","commune":"Aunay les Bois","nom":"Aunay_les_Bois","type":"Château","periode":"XVIII","histoire":"AUNAY les BOIS,  en 1066 Guillaume d'Aunay combat dans la chevalerie normande à la bataille d'Hastings  et fait bâtir le château en 1380 à la mort de Guillaume le fief d'Aunay passe sous la vassalité du roi de France le domaine passe à sa fille qui épouse en René de Bonvoust jeunes combattants aux côté des de Guises entreprend la construction d'un nouveau château sur la colline, le fils de René Jean IV  marié à une de Gruel donna naissance à une branche d'Aunay de Pruslay et du Plessis qui furent représentées jusqu'à la Révolution. Claude le fils de Jean obtiendra l'érection de la terre  en baronnie en 1647 et en 1767 Louis XV érige les terres en  marquisat  sous le nom de Bonvoust, en 1789 le marquisat est transmissible par les femmes et entre les mains  de la dernière de cette maison Marie-Thérése qui épouse Claude-René comte de Loisel, leur fille unique Anne-Marie-Charlotte  porte Launay  en dote au marquis de Mésange  le fils né de ce ménage fait rebâtir  deux des tours d'angle  et par alliance le château aux Romanet de Beaume toujours dans la descendance.","architecture":"AUNAY les BOIS, la construction date de 1733 le château présente un donjon presque carré, flanqué de quatre étroits pavillons d'angle carrés  en forte  saillie et coiffés de dômes à l'impériale  terminant de clochetons aveugles. Le bâtiment était entouré de larges fossés. Il connut des travaux intérieurs et extérieurs aux XVIIe, XVIIIe et XIXe siècles. En 1733, mise en place de la cheminée monumentale de la salle d'entrée et des boiseries Régence du grand salon. Les deux tours carrées de l'ouest, dont seuls les soubassements avaient été commencés, furent achevés en 1835. La façade nord fut remaniée au XVIIIe siècle. Éléments protégés MH : les façades et les toitures du château : inscription par arrêté du 22 juillet 1971.","habitants":"Famille de René de Bonvoust \r\n        \"","divers":"Château d'Aunay GPS : 48° 32 36\" Nord, 0° 16' 42\" Est","gps":"48° 32 36\" Nord, 0° 16' 42\" Est","images":["../image/image_61/61_Aunay_les_Bois_1.jpg","../image/image_61/61_Aunay_les_Bois_2.jpg"]},"Consult_chateau_formulaire09b8":{"id":"Consult_chateau_formulaire09b8","dept":"61","canton":"Rai","commune":"Authieux du puits","nom":"Authieux_Echauffour","type":"Château","periode":"XV-XVII","histoire":"AUTHIEUX, château construit en 1667 pour la famille Labbey. Les communs et dépendances datent du XIXe siècle. Le haras de trotteurs est créé vers 1920 par Alfred Dejean pour Olry Roederer, les bâtiments du haras sont édifiés vers 1920 et rénovés vers 1950. A trois K.M. au nord-est le  château d'ECHAUFFOUR , la construction du château fort date de l'an mil, par Helgon, après que le Domaine fut attribué par Richard II de Normandie et appartenant à la Famille Giroie, par mariage jusqu'au XIVe siècle, fut remplacé au XVe siècle par une maison forte. La chapelle date du XVe siècle. En 1763, à la suite d'un premier scandale, l'affaire Jeanne Testard, le marquis de Sade fut assigné à résidence, durant 4 mois au château d'Échauffour, propriété de son beau-père, Claude-René de Montreuil, président à la cour des aides de Paris. La marquise de Sade, Renée-Pélagie de Montreuil, après sa séparation avec le marquis, en 1790, résidera au château, avec sa fille, une grand partie de l'année, jusqu'à son décès, en 1810. propriété du général de Lesquen du Plessis-Casso.","architecture":"AUTHIEUX , logis du château : en moellon calcaire enduit, brique pour les encadrements, les chaînes, les bandeaux et les tables décoratives, toits à longs pans à croupes de part et d'autre d'un toit central en pavillon, dans le pavillon central escalier tournant à retours avec jour, en bois, orné de chutes de fruits sculptées. Communs en moellon de calcaire enduit et brique, le colombier en brique à toit en pavillon, la grange en moellon de calcaire couverte en tuile plate, l'écurie en bois, brique et moellon de calcaire, les écuries doubles en béton aggloméré enduit, à pignons couverts. Haras.                                                                                                           ECHAUFFOUR  est remplacé au XVe siècle, par une maison-forte.  La chapelle date du XVe siècle. Le logis d'Echauffour a été remanié et agrandi au XVIIIe siècle. Sa ferme qui date du XVIIIe siècle, fut remaniée au XIXe siècle. Au lieu-dit Vieux bourg, se trouve un ancien château du XVIIIe siècle. La ferme du XVIIIe siècle est remaniée au XIXe siècle, la chapelle date du XVe siècle. L'édifice se compose d'un étage carré, d'un étage de comble et d'un sous-sol, le gros-oeuvre en calcaire, moellon, enduit et brique, élévation ordonnancée surmontée de toit à longs pans, croupe, pignon couvert et toit en pavillon, recouverts de tuiles plates et d'ardoise.","habitants":"Authieux Famille Labbey                                                                     Echauffour Famille Giroie et le  Marquis de Sade\r\n        \"","divers":"Château d'Authieux grav 1-2                                                          gps  48° 42' 45\" nord, 0° 19' 46\" est\r\nChâteau d'Echauffour  grav 3-4-5                                       GPS : 48° 44' 27\" Nord, 0° 23' 16\" Est","gps":"48° 44' 27\" Nord, 0° 23' 16\" Est","images":["../image/image_61/61_Authieux_Echauffour_1.jpg","../image/image_61/61_Authieux_Echauffour_2.jpg","../image/image_61/61_Authieux_Echauffour_3.jpg","../image/image_61/61_Authieux_Echauffour_4.jpg","../image/image_61/61_Authieux_Echauffour_5.jpg"]},"Consult_chateau_formulaire14d4":{"id":"Consult_chateau_formulaire14d4","dept":"61","canton":"Vimoutiers","commune":"Avernes-Saint-Gourgon,","nom":"Avernes_Bonneval","type":"Château","periode":"XVIII","histoire":"AVERNES, le château est grand, mais il n'est ni monumental ni élégant; sa splendeur consiste surtout dans son accompagnement.  À la fin de 1818, époque de la mort du dernier marquis, Avernes était sans contredit une des plus belles et une des plus vastes propriétés de toute la Normandie. Après la mort de Charles-Antoine de Bernart, dernier marquis d'Asernes, qui arriva 1e 10 décembre 1818, ce domaine fut divisé ainsi qu'il suit: M. le baron Louis-Eussche de Vauquelin des Chesilles eut le château et tout ce qui était situé sur les communes d'Avemes, du Oscrenoult, de Pont-Chardon et de Canapville, en un mot la propriété d'Avernes proprement dite. La famille de Pardieu eut pour son lot les propriétés de Saint Cyr d'Etrancour et de Familly.  Le marquis d'Avernes n'émigra pas à la Révolution et ne fut pas dépossédé de ses biens. A sa mort, sans postérité, à Avernes en 1818, le château et le domaine échurent à son cousin Eustache Louis de Vauquelin des Chesnes (1769-1859). Quelques temps avant sa mort, le marquis avait donné sa ferme de la Grande-Noé à un M. Laurent Guerrand, son valet de chambre. Le baron de Vauquelin posséda Avernes jusqu'en 1859, époque de sa mort, après quoi il fut séparé, par lots inégaux, entre ses quatre enfants. En 1880, c'est Emmanuel Guillaume de Vauquelin qui possède le château d'Avernes et les terres qui en dépendent.                                                                                     A cinq K.M. à l'est à St-Aubin-de-Bonneval  BONNEVAL, les Deshayes sont mentionnés comme seigneurs et propriétaires du château de Bonneval du XVe siècle au milieu du XIXe siècle. L'ancien bâtiment de la ferme, vraisemblablement vestige du manoir précédant la construction du château, parait dater du XVIe siècle.","architecture":"AVERNES le château actuel a été construit dans les dernières années du règne de Louis XV (fin XVIIIe siècle), sur les plans de M. Henry, architecte à Paris,  Ce château, aux vastes proportions, présente une masse rectangulaire, les pilastres, les chaînages et les encadrements des portes et fenêtres; les panneaux intermédiaires ont été blanchis au sable et à la chaux. Son élévation se compose d'un sous-sol, d'un rez-de-chaussée, d'un premier et d'un second étage; puis de mansardes sous les toitures. Les façades des flancs, qui regardent le nord et le midi, sont percées de onze ouvertures à chaque étage. Les façades de côté en ont cinq seulement. Le centre de la façade méridionale forme une avancée demi-circulaire d'un assez grand rayon, dont le sommet est une plate-forme revêtue de plomb, d'une élévation d'environ 35 mètres, d'où l'on découvre une étendue immense.  Au nord, des ailes en retour font une saillie d'environ six mètres. Le rez-de-chaussée, de ce côté, est pour ainsi dire caché sous terre, car un perron monumental, précédé d'une énorme terrasse, donnent accès au premier. Puis de ce perron deux escaliers descendent au rez-de-chaussée, sous une voûte grossièrement pavée. Sur le fronton on remarque deux écus accolés, dont le champ ne parait avoir reçu aucun genre de décoration.                                                                                                                      BONNEVAL, le château et ses dépendances ont été construits à la fin du XVIIe ou au début du XVIIIe siècle, peut-être pour Yves Deshayes, écuyer, vicomte du Sap en 1718. Bonneval possédait une chapelle sous le vocable de Saint-Clair-des-Bois, château et remise en brique avec pierre en remplissage ; ancien logis en pan de bois hourdi de tuile; autres bâtiments en pan de bois hourdi en torchis, sauf le colombier en brique; bâtiments coiffés en tuile plate sauf la remise en ardoise, et le logement en ciment amiante.","habitants":"Avernes famille de  Charles Antoine de Bernart                    famille de Pardieu.                                                                                     Bonneval  Famille de  Deshayes \r\n        \"","divers":"Avernes grav-1-2-3                                                                  Gps 48° 56' 21\" nord, 0° 19' 11\" est                                               Bonneval  grav-;  gps 48° 56' 27\" nord, 0° 22' 46\" est","gps":"","images":["../image/image_61/61_Avernes_Bonneval_1.jpg","../image/image_61/61_Avernes_Bonneval_2.jpg","../image/image_61/61_Avernes_Bonneval_3.jpg","../image/image_61/61_Avernes_Bonneval_4.jpg"]},"Consult_chateau_formulairecec9":{"id":"Consult_chateau_formulairecec9","dept":"61","canton":"Bagnoles de L","commune":"Bagnoles de L","nom":"Bagnoles_Orme","type":"Château","periode":"XIX","histoire":"Trois châteaux à Bagnoles sur l'orne, dont celui de Bagnoles, de Gué  aux Biches, Christol et Goupil.                                                                                                 GUE aux BICHES, au début du XIXe siècle, la commune de Bagnoles n'existait pas ; seul, un groupe de maisons dépendant de la commune voisine, Tessé-la-Madeleine, constituait un des futurs quartiers de Bagnoles de l'Orne; à la fin du XIXe siècle,  la commune  fut créée en 1913. Le château est intimement lié à l'histoire de la station thermale de Bagnoles. Construit pour la fille de l'amiral Bouvet, l'élégante Madame Adam, la demeure passa ensuite à Prosper Vialon, le rédacteur du \"Siècle\" puis, en 1868, à Albert Christophle, député de l'Orne, ministre des Travaux publics, qui fit faire des aménagements importants, recueillant des décors de l'ancien château de Lonray et du château de Godras à Domfront. Son gendre, M. Cousin, conseiller général, maire de Bagnoles-de-l'Orne, habite le Gué-aux-Biches.                                                                      BAGNOLES de L'ORNE dit de Goupil  a été construit, en 1835 et 1859. Entrez visiter les halls, la salle du conseil et la salle des mariages pour un petit voyage dans l'histoire de Bagnoles-de-l'Orne. C'est à la fois un superbe édifice, qui fait aujourd'hui Office de mairie, et un parc de 18 hectares où vous pourrez observer une faune d'oiseaux multiples et 167 espèces, botaniques, du Séquoia au Cèdre de l'Atlas Bleu, en passant par le Bonsaï chinois, etc.","architecture":"GOUPIL est un ancien château bâti à Bagnoles-de-l'Orne, L'ancien château Goupil a été construit entre 1835 et 1859. L'ancien château Goupil est devenu la mairie de Bagnoles-sur-l'Orne.                                                                            La « villa du Crédit foncier », un des premiers bâtiments à être construit dans le quartier, est inaugurée en grande pompe le 14 août 1888. Avec ses 22 chambres, sa salle de billard et sa bibliothèque, elle était utilisée pour la retraite et les vacances des employés du crédit foncier de France.","habitants":"Famille de Prosper Vialon\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Trois châteaux  et patrimoine grav 4-à 9 à Bagnoles sur l'orne, dont celui de Bagnoles, de Gué  aux Biches grav 3 et Goupil grav 1-2.                                                                              GPS : 48° 33' 18\" Nord, 0° 24' 40\" Ouest","gps":"48° 33' 18\" Nord, 0° 24' 40\" Ouest","images":["../image/image_61/61_Bagnoles_Orme_1.jpg","../image/image_61/61_Bagnoles_Orme_2.jpg","../image/image_61/61_Bagnoles_Orme_3.jpg","../image/image_61/61_Bagnoles_Orme_4.jpg","../image/image_61/61_Bagnoles_Orme_5.jpg","../image/image_61/61_Bagnoles_Orme_6.jpg","../image/image_61/61_Bagnoles_Orme_7.jpg","../image/image_61/61_Bagnoles_Orme_8.jpg","../image/image_61/61_Bagnoles_Orme_9.jpg"]},"Consult_chateau_formulairec827":{"id":"Consult_chateau_formulairec827","dept":"61","canton":"Argentan","commune":"Gouffern_Silly","nom":"Baronnie_61","type":"Manoir","periode":"XV","histoire":"BARONNIE, au XIe siècle, Marcei était un prieuré bénédictin dépendant de l'abbaye de Cerisy-la-Forêt dont les religieux conservaient la baronnie. Il devint aussi un ancien Tribunal de l'Ancien Régime. Plus tard, le logis, d'époque romane, fut loué par les moines à des gentilshommes. Les moines percèrent de grandes fenêtres. Les façades et les toitures sont inscrites aux M.H. depuis le 23/03/1972. Le manoir est ouvert au Public.                                                                 A trois K.M. à l'ouest à SILLY  en Gouffren un manoir  de Thomas Gasnaud. Château de Silly, XVIIIe siècle, de la Famille Verbeke Brethenoux. Château construit en 1774 ; restauré au XIXe siècle : chapelle, remises ; haras moderne.","architecture":"BARONNIE, la construction du manoir de la Baronnie date du XIe au XVe siècle. Il est de style Renaissance et Roman. Il a été remanié au XVe siècle Ancien prieuré et  tribunal d'ancien Régime, construit au XIe siècle. et remanié au XVe siècle.\r\nVisite de l'ancien domaine seigneurial (vestiges du pigeonnier, du four banal ), de l'escalier à vis et des caves voûtées.                                                                                   SILLY, des vestiges furent également trouvés, notamment un « camp romain » près de Sainte-Eugénie,  s'agissant plus probablement d'un château à motte, c'est-à-dire une fortification du Moyen Âge avec enceinte circulaire et basse cour, et un camp gallo-romain au lieu-dit du Chêne au Renard. C'est dans ce dernier lieu, situé sur la rive gauche de l'Ure, en forêt de Petite Gouffern, à  un quart de lieue de l'ancienne abbaye, que fut découvert, en juillet 1830, un trésor d'au moins 5 000 médailles romaines pesant 36 livres. Par ailleurs, une fontaine, appelée fontaine de dévotion Saint-Laurent, porte l'inscription : « poste d'eau construit au-dessus et dans la substruction d'une très ancienne fontaine publique dont les restes ont été découverts et restaurés en 1897, faisait partie d'une station romaine, celle de Silius.","habitants":"Famille Verbeke \r\n        \r\n        \"","divers":"Château de la baronnie GPS : 48° 39' 47\" Nord, 0° 02' 34\" Est","gps":"48° 39' 47\" Nord, 0° 02' 34\" Est","images":["../image/image_61/61_Baronnie_61_1.jpg","../image/image_61/61_Baronnie_61_2.jpg","../image/image_61/61_Baronnie_61_3.jpg","../image/image_61/61_Baronnie_61_4.jpg","../image/image_61/61_Baronnie_61_5.jpg","../image/image_61/61_Baronnie_61_6.jpg","../image/image_61/61_Baronnie_61_7.jpg"]},"Consult_chateau_formulaireae52":{"id":"Consult_chateau_formulaireae52","dept":"61","canton":"Athis-de-l","commune":"Bazoches au Houlmes","nom":"Bazoches_Houlmes","type":"Vestiges","periode":"XIV-XV","histoire":"BAZOCHES,  carrée à l'extérieur et cylindrique à l'intérieur, la tour du guet, c'est le dernier vestige de l'ancienne forteresse, siège de la baronnie de Bazoches. Le logis seigneurial subsiste avec des éléments édifiés du XVe au XVIIIe siècle.  Éléments protégés MH : l'ensemble des vestiges, à savoir : la tour, les façades et les toitures du logis et des communs, les sols compris dans l'ancienne enceinte : inscription par arrêté du 14 septembre 1992.                                               La MOTTE, le château de la Motte, c'est ici que naquit Rémy de Gourmont le 4 avril 1858, critique de l'école symboliste, il fut un écrivain original, ses oeuvres les plus célèbres : l'Esthétique de la langue française et la Physique de l'amour.\"                                                                                          ST-PAVIN , berceau de la famille de Marguerit Saint-Pavin, était autrefois une commune et une paroisse, qui faisait partie du canton de Bazoches et du doyenné d'Aubigny. Le 19 novembre 1803, la paroisse de Saint-Pavin fut rattachée à celle de Bazoches.","architecture":"BAZOCHES, sa construction date du 4eme quart du XVe siècle et du XVIIIe siècle. Carrée à l'extérieur et cylindrique à l'intérieur, la Tour du Guet fut construite vers 1477. C'est le dernier vestige de l'ancienne forteresse, siège de la Baronnie de Bazoches, détruite en partie en 1137 par Geoffroy Plantagenet. Le logis seigneurial subsiste avec des éléments édifiés du XVe au XVIIIe siècle. La tour renferme un escalier. Un autre escalier très étroit, s'embranchant dans le premier, est établi dans la tourelle ronde construite en encorbellement à l'un des angles de l'édifice. Cette tourelle donne accès à la partie supérieure de la tour, qui comporte une pièce avec une cheminée datant de la fin du XVe siècle. L'ensemble des vestiges dont la tour, les façades, les toitures du logis et des communs, les sols compris dans l'ancienne enceinte sont inscrits aux M.H. depuis le 14/09/1992.","habitants":"Seigneurs locaux                                                                                       La Motte   Remy de Gourmont\r\n        \"","divers":"Bazoches grav-1-4-5     GPS : 48° 49' 03\" Nord, 0° 14' 26\" Ouest                                                                                                    La Motte  grav 2-3    gps 48°49'40.9\"N 0°15'15.0\"ouest                                                 ST-Pavin  gps 48°51'04.3\"N 0°16'25.4\"Ouest","gps":"48° 49' 03\" Nord, 0° 14' 26\" Ouest","images":["../image/image_61/61_Bazoches_Houlmes_1.jpg","../image/image_61/61_Bazoches_Houlmes_2.jpg","../image/image_61/61_Bazoches_Houlmes_3.jpg","../image/image_61/61_Bazoches_Houlmes_4.jpg","../image/image_61/61_Bazoches_Houlmes_5.jpg"]},"Consult_chateau_formulaire251a":{"id":"Consult_chateau_formulaire251a","dept":"61","canton":"La Ferté-Macé","commune":"Beauvain","nom":"Beauvain","type":"Château","periode":"XVII-XIX","histoire":"deux châteaux  à Beauvain dont Beauvain et la Rousselière. BEAUVAIN, demeure édifiée au centre du bourg pour le colonel de Godet, officier de l'armée royale. A sa mort,  l'abbé Croquet, aumônier de son régiment, est usufruitier du domaine. Le château de Beauvain aurait été construit en trois fois au XIXe siècle, le pavillon central dabord, ensuite laile gauche, construite semble-t-il sur un ancien four à pain dont les traces subsistent, et enfin, laile droite. Les échauguettes furent élevées pour l'abbé Croquet. Lescalier en pierre qui conduit aux étages, en façade, côté église remonte au début du XIXe siècle.","architecture":"ROUSSELIERE, imposant manoir bâti tout en pierre de granit fut agrandi au XVIIe siècle, puis au début du XIXe siècle, il fut élevé par la famille le Héron, passa au XVIIIe siècle aux Thibout de Puisact, aux Hercé , aux Labbey de Pruneley puis, toujours par héritage aux comtes d'Andigné. De plan rectangulaire à deux niveaux, série de lucarnes sur toit en croupes de six travées, prolongé  d'un pavillon rectangulaire avec accolé mi-hors oeuvres d'une tour ronde à mâchicoulie à l'opposée tour hexagonale toit en poivrière dépassant l'édifice.","habitants":"M. l'abbé Croquet                                                                    Rousselière,  famille le Héron\r\n        \"","divers":"deux châteaux  à Beauvain dont Beauvain grav 1-2  et la Rousselière grav3-4                                                                gps 48° 36' 26\" nord, 0° 18' 27\" ouest","gps":"","images":["../image/image_61/61_Beauvain_1.jpg","../image/image_61/61_Beauvain_2.jpg","../image/image_61/61_Beauvain_3.jpg","../image/image_61/61_Beauvain_4.jpg"]},"Consult_chateau_formulaire8e5c":{"id":"Consult_chateau_formulaire8e5c","dept":"61","canton":"Mortagne-au-Perche","commune":"Bellavilliers","nom":"Bellavilliers","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article de Bellavillers  et Chenégallon                                                                                    CHENEGALLON,  occupe les bâtiments  conventuels d'un prieuré    des Bonhommes de Grandmont fondé au XVIe siècle par Rotrou  comte du Perche , les biens du prieuré furent aliénés   à la Révolution et les constructions du XVII et XVIIIe siècle furent agréablement aménagés au XIX siècle. Charmant village qui s'organise autour d'une ravissante église. Valérie et Denis. Propriété de la famille Delobel  Petit prieuré de l'abbaye limousine de Grandmont. Les bâtiments actuels semblent être dus à l'évêque de Sées, Neel de Christot, qui aimait venir s'y reposer. La commission des Réguliers, chargée par Louis XV de la Réforme des abus, décida en 1772 la suppression de l'abbaye de Grandmont et de ses prieurés. Chêne Gallon fut fermé en 1786 et les revenus accordés au séminaire de Sées.  Les bâtiments du prieuré sont disposés autour de la cour.","architecture":"BELLAVILLIERS, château, ces grandes maisons aux lignes sobres et élégantes qui se devinent dans un parc boisé. Maison de maitre indépendante sur une vaste propriété. Gîte de France.                                                               CHENEGALLON, éléments protégés : Façades et toitures du prieuré, rampe en fer forgé du grand escalier. Quatre piliers du portail d'entrée. Murs subsistants et sol de l'ancienne chapelle  : inscription par arrêté du 19 décembre 1973.","habitants":"Chenegallion ; famille Delobel\r\n        \"","divers":"Deux châteaux dans cet article Chenégallon  grav 3-4et le château de Bellavilliers    Grav 1-2","gps":"","images":["../image/image_61/61_Bellavilliers_1.jpg","../image/image_61/61_Bellavilliers_2.jpg","../image/image_61/61_Bellavilliers_3.jpg","../image/image_61/61_Bellavilliers_4.jpg","../image/image_61/61_Bellavilliers_5.jpg"]},"Consult_chateau_formulairecea8":{"id":"Consult_chateau_formulairecea8","dept":"61","canton":"Tourouvre","commune":"Tourouvre","nom":"Bellegarde_61","type":"Château","periode":"XV-XVI","histoire":"BELLEGARDE, sa construction date du XVe siècle, 4ème quart XVIe siècle, 1er quart du XVIIe siècle et XVIIIe siècle.  Le manoir de Bellegarde est inscrit aux M.H. depuis le 30/03/1978. C'est devenu la propriété d'une société privée, qui propose la location de salles.","architecture":"BELLEGARDE, une enceinte quadrilatère englobe le manoir de Bellegarde et ses communs. De la première construction du XVe siècle, subsistent la tour ronde remaniée au XIXe siècle et une pièce donnant sur la façade arrière. Le manoir de Bellegarde a été édifié en 1577 et est représentatif du style Henri IV, avec sa haute toiture et ses chainages de briques et de pierre. Un petit pavillon de même style est accolé en retrait sur le pignon Nord prolongé par les anciennes écuries. Le jardin est ceinturé de murailles édifiées en 1578, renforcées aux angles par 2 hauts pavillons carrés. Aujourd'hui, il n'en subsiste plus qu'un pavillon.","habitants":"Seigneur local\r\n        \r\n        \"","divers":"Château de Bellegarde  à Tourouvre  GPS : 48° 34' 46\" Nord, 0° 40' 21\" Est","gps":"48° 34' 46\" Nord, 0° 40' 21\" Est","images":["../image/image_61/61_Bellegarde_61_1.jpg","../image/image_61/61_Bellegarde_61_2.jpg","../image/image_61/61_Bellegarde_61_3.jpg"]},"Consult_chateau_formulaire26b1":{"id":"Consult_chateau_formulaire26b1","dept":"61","canton":"Ceton","commune":"Bellou-le-Trichard","nom":"Bellou_Trichard","type":"Château","periode":"XVII","histoire":"Deux châteaux dans cet article ; Gervaise et Pouvrai.                         GEVRAISE, enserré au nord par les bois du château de Gevraise, au sud par la forêt de Goyette, le bourg se regroupe autour de léglise Notre-Dame qui conserve un mobilier religieux intéressant. Le château a été construit en pierre blanche au XVIIe siècle pour la famille de Souvré dont est issue Anne de Souvré, épouse de Louvois, le ministre de Louis XIV. En 1743, les Louvois aliénèrent le château à la famille Bonnet qui l'apporta par mariage à la famille de Romanet de Beaune.","architecture":"A deux kilomètres au nord Est à Pouvrai ; château de Pouvrai.                                                                                POUVRAI  Subsiste un ancien logis construit au milieu XVIIe siècle, vestige du château primitif édifié pour la famille Lenfernat. Le château actuel, de style Louis XIII, a été construit dans la deuxième moitié du XIXe siècle. La propriété était autrefois habitée par la famille Tascher (propriétaire depuis 1692) et petits cousins de limpératrice Joséphine. Cette famille Tascher s'illustra dans les grandes campagnes napoléoniennes.  La Famille de Tascher, seigneurs de Pouvray, dont Pierre Jean Alexandre Tascher (1745 - 1822) au château de Pouvrai. C'était un homme politique. Les communs et parties agricoles datent du XVIIIe siècle.  Elévation ordonnancée  à un étage carré ; étage de comble ; sous-sol, escalier dans-oeuvre ; escalier tournant à retours avec jour, en calcaire ; brique ; appareil mixte ; toit à longs pans ; croupe ; toit en pavillon ; toit conique, en ardoise et  tuile plate.","habitants":"Gervaise; famille de Souvré                                                   Pouvray; famille Lenfernat\r\n        \"","divers":"Deux châteaux dans cet article ; Gervaise grav-1 et Pouvrai grav-2   GPS : 48° 16' 36\" Nord, 0° 31' 04\" Est","gps":"48° 16' 36\" Nord, 0° 31' 04\" Est","images":["../image/image_61/61_Bellou_Trichard_1.jpg","../image/image_61/61_Bellou_Trichard_2.jpg"]},"Consult_chateau_formulaire4693":{"id":"Consult_chateau_formulaire4693","dept":"61","canton":"Ceton","commune":"Bellême","nom":"Bellême","type":"Patrimoine","periode":"X-XV-","histoire":"BELLEME, fut le centre de la seigneurie de Bellême du Xe siècle jusqu'en l'an 1113. En 1087, Robert de Bellême, apprenant la mort du duc, après avoir expulsé la garnison locale et repris le château d'Alençon fit de même à Bellême. Henri Ier, roi d'Angleterre et duc de Normandie, la prit en 1114, Saint Louis en 1228, les Bourguignons en 1413, les Anglais en 1424 et Jean II, duc d'Alençon, en 1449. L'un des épisodes marquants de la localité fut le siège de Bellême par Blanche de Castille, régente du jeune Louis IX, le futur Saint-Louis, pour la soutirer au breton Pierre Mauclerc.  Pierre de Fontenay sire de la Reynière (1541-1610) : capitaine de la ville et du château de Bellême, gouverneur du Perche de 1589 à 1610.\r\nDeux habitants de Bellême ont émigré en 1651 en Nouvelle-France au XVIIe siècle et ainsi contribué à l'épopée des Percherons au Canada : François Peuvret, sieur de Margontier (mort en 1657, sans descendance, et son frère, Jean-Baptiste Peuvret, sieur de Mesnu (baptisé vers 1632, mort en 1697 à Québec), ancêtre des Peuvret du Québec. Jusqu'en 1784, Bellême est traversée par le chemin royal de Paris en Bretagne. À partir de cette date, le chemin royal est détourné et passe à Nogent-le-Rotrou et La Ferté-Bernard, jusqu'au Mans. En s'alliant avec Nogent-le-Rotrou, elle réussit à s'imposer contre Mortagne pour réunir, en avril 1789, les états généraux du bailliage du Perche. Bellesme fut chef-lieu de district sous la Révolution.","architecture":"le château fort de la ville close Bellème.                                                  BELLEME, l'enceinte de Bellême, dont la porte Saint-Sauveur du XVe siècle est inscrite au titre des M.H. en 1937, et les douves de l'ancien château aménagées pour recevoir quelques espèces d'animaux aquatiques. Pour avoir été le grenier à sel de la cité, le porche subit une dégradation : le sel ronge la pierre, menaçant le bâtiment de destruction.  Vestiges de remparts, dont l'entrée porte une plaque commémorative de la prise en 1229 du château et de la ville par Saint-Louis et sa mère Blanche de Castille. Maisons des XVIIe et XVIIIe siècles. Hôtel de ville du XVIIe siècle. Cadrans solaires, rue du Château, place de la République et place Liègeard.  Au coeur du parc naturel du Perche, sur 7,5 ha de parc, pré et bois, château des XVe et XVIIe siècles inscrit ISMH, composé d'un manoir du XVe agrandi au XVIIe et de communs importants.                                                      Château fort élevé en 1027 par Guillaume 1er Talvas, seigneur de Bellême, avec l'église collégiale Saint Léonard et un chapitre d'augustins, en partie ruiné en 1229. Le donjon s'est écroulé en 1780, au XIXe siècle, une partie des vestiges est aménagée en remises et une autre partie est utilisée pour construire la halle de Bellême.\r\nÉléments protégés MH : le porche de la Ville close : inscription par arrêté du 19 mai 1937. .","habitants":"Pierre de Fontenay \r\n        \r\n        \"","divers":"Patrimoine de Béllème\r\n48° 22' 35\" nord, 0° 33' 38\" est","gps":"","images":["../image/image_61/61_Bell%c3%aame_1.jpg","../image/image_61/61_Bell%c3%aame_2.jpg","../image/image_61/61_Bell%c3%aame_3.jpg","../image/image_61/61_Bell%c3%aame_4.jpg","../image/image_61/61_Bell%c3%aame_5.jpg","../image/image_61/61_Bell%c3%aame_6.jpg","../image/image_61/61_Bell%c3%aame_7.jpg"]},"Consult_chateau_formulairedaf6-2":{"id":"Consult_chateau_formulairedaf6-2","dept":"61","canton":"Mortagne-au-Perche","commune":"Mortagne et St-Denis sur Huisme","nom":"Blavou","type":"Château","periode":"XVII","histoire":"BLAVOU; à Mortagne,  La construction du château de Blavou date du XVIIe siècle. Pour acquitter la dette contractée par lancien propriétaire, entendu par la justice anglaise, la demeure percheronne a fait lobjet dune vente publique. Son dernier propriétaire a été remis aux autorités britanniques en septembre. Lhomme, un ancien avocat anglais de 61 ans, avait fait lobjet dun mandat darrêt délivré par le Tribunal de Westminster, dans une affaire de fraude fiscale. Le château de Blavou, quil possédait depuis 2009, a ainsi été mis aux enchères publiques, à la demande du débiteur, la Banque BNP Paribas. Quatre enchérisseurs se sont présentés aux côtés de leurs avocats, à laudience du Tribunal de Grande Instance dAlençon.                                                                                  A St Denis; Il date du XVIIe siècle. est devenu un gîte d'hôtes, dans un cadre agréable, où vous passerez des moments inoubliables.","architecture":"BLAVOU;  est un manoir bâti à Saint-Jouin-de-Blavou, La construction du Manoir de Blavou date du XVIe et XVIIIe siècle. C'est une construction caractéristique des manoirs percherons du XVIe siècle présentant un plan en L avec une tourelle d'escalier polygonale en demi hors-oeuvre. La fenêtre à meneaux présente un décor sculpté. L'intérieur a conservé une partie de ses volumes originels, son escalier en vis et des éléments décoratifs d'origine. On note la présence d'un four à pain indépendant du XVIIIe siècle, inscrit aux M.H. depuis 1997 ainsi que son four à pain.                                                                                CHANCEAUX au nord-Est de Prévenchères Il date du XVIe-XVIe siècles et sa chapelle Saint-Marc date du 4ème quart du XVIe siècle, du 1er quart du XVIIe siècle et du XVIIIe siècle. Le château de Chanceaux et sa chapelle sont classés aux M.H. le 22/05/1978.","habitants":"Seigneurs locaux\r\n        \"","divers":"Blavou Mortagne   GPS : 48° 31' 13\" Nord 0° 32' 50\" Est                                                       Blavou st Denis GPS : 48° 28' 10\" Nord, 0° 32' 37\" Est                                                                      Blavou St Jouin GPS :t  48° 27' 10\" Nord, 0° 28' 27\" Est                                  Chanceaux \r\ngps 48° 26' 47\" N, 0° 30' 12\" Est","gps":"48° 31' 13\" Nord 0° 32' 50\" Est","images":["../image/image_61/61_Blavou_1.jpg","../image/image_61/61_Blavou_2.jpg"]},"Consult_chateau_formulaire3edb":{"id":"Consult_chateau_formulaire3edb","dept":"61","canton":"Argentan","commune":"Coudehard","nom":"Boisjos","type":"Château","periode":"XVI-","histoire":"BOISJOS, appartenait en 1542 à demoiselle Perrine de Boisgeaux épouse de Jean Lepaysan, seigneur du Bas-Fel . Cette demoiselle Pérrine était elle même fille  de Françoise Lenfant femme du seigneur de Fel , cette famille  Lenfant à joué un rôle trés en évidence et aussi peu patriotique au cours de la guerre de Cent ans, elle avait passé au service de l'angleterre.  l'édifice construit au début du XVIe siècle pour la famille le Cloutier seigneur de Coudehard ; chapelle saint-Nicolas fondée au XIIe siècle ; chapelle reconstruite au début du XVIe siècle et appartenant en 1674 au sieur de Chaumont.","architecture":"BOISJOS, le château est constitué par une ligne de bâtiments en torchis, brique, calcaire et grison, l'extrémité ouest est occupée par l'édifice flanqué de deux tours carrées formant contreforts, une troisième tour octogonale, épaule la façade nord, elle renferme un escalier en colimaçon, aujourd'hui de bois, s'appuient sur une corniche moulurée. La tour carrée parait avoir servi de latrine, de plan régulier élévation à travées à un étage carré, escalier hors-oeuvre ; escalier en vis, en brique ; calcaire ; grès ; torchis  : toit à longs pans ; pignon découvert et couvert ; en croupe ; toit conique ; flèche carrée : tuile plate ; ardoise voûte d'ogives.  Il date du XVe siècle, on peut admirer ce charmant manoir ordonné de ses deux tours carrées. Le manoir du Boisjos fut le PC des troupes polonaises sur la colline et domine la Vallée de la Dives. Le manoir de Boisjois est une propriété privée, fermée au Public. A proximité, se trouve la Stèle des Polonais.","habitants":"Boisjos; famille le Cloutier\r\n        \"","divers":"Châteaux de Boisjos GPS : 48° 50' 37\" Nord 0° 08' 05\" Est","gps":"48° 50' 37\" Nord 0° 08' 05\" Est","images":["../image/image_61/61_Boisjos_1.jpg","../image/image_61/61_Boisjos_2.jpg","../image/image_61/61_Boisjos_3.jpg"]},"Consult_chateau_formulaireb3b6":{"id":"Consult_chateau_formulaireb3b6","dept":"61","canton":"Bretoncelles","commune":"Maison-Maugis","nom":"Boissy_Maugis","type":"Château","periode":"XVI-XVII-XVIII","histoire":"Deux châteaux à Boissy-Maugis, dont la Maison Baugis  et Moussetière pas d'historique pour ce dernier.                                                                                                             MAISON-MAUGIS, le château et les communs datent du XVIIe siècle.  La motte de l'ancien château détruit au cours des guerres de Cent ans subsiste à un endroit assez éloigné. La demeure actuelle présente un corps de logis rectangulaire entièrement bâti par François du Crochet en pierre blanche transmis par les femmes aux comtes de  Moucheron.                                                                                 MOUSSETIERE, construite dans la première moitié du XVIe siècle, cette demeure seigneuriale à vocation agricole fut fortifiée au début du XVIIe siècle. Ayant appartenu à la même famille durant plus de 300 ans, le Manoir de La Moussetière devint vers 1800 une exploitation purement agricole et ce jusquen 1979, date à laquelle les nouveaux propriétaires entamèrent dimportants travaux de restauration.","architecture":"MAISON-MAUGIS, ancienne forteresse date du XIIIe siècle,  le château et ses communs datent du XVIIe siècle. Le château de Maison-Maugis est une reconstruction d'un bâtiment antérieur dont les caves et les cuisines furent conservées. Elles sont du XIIIe siècle. La motte de l'ancien château détruit au cours des guerres de cent ans subsiste à un endroit assez éloigné. Les caves du XIIIe siècle doivent être celles de l'ancien prieuré dépendant de l'abbaye de Saint-Evroult. L'édifice actuel présente un corps de logis rectangulaire entièrement bâti en pierre blanche. Il est flanqué, d'un côté, d'une tour et, de l'autre, par une tourelle en encorbellement. La cour est encadrée de deux pavillons Louis XIV auxquels s'appuie, à chaque extrémité, une tourelle placée en sentinelle sur le chemin. Les éléments protégés aux M.H. sont les façades et toitures du château et des communs, le portail d'entrée avec sa grille (24/07/1972) puis sont inscrits aux M.H. les caves, le potager, inscrits depuis le 26/08/1990.                                                                                            MOUSSETIERE, la construction du manoir de la Moussetière date du XVIe siècle. Le manoir est composé d'un corps de bâtiment ouvert d'une fenêtre de style Renaissance sur la façade principale. Il est accosté d'une tour d'escalier sur sa façade, à l arrière. Il est prolongé par un petit bâtiment plus récent. Le manoir de la Moussetière est inscrit partiellement pour ses façades, toitures et enceinte du manoir aux M.H. depuis le 10/04/1980.","habitants":"Maison-Maugis;Famille de François du Crochet \r\n        \"","divers":"Deux châteaux à Boissy-Maugis, 48° 26' 28\" nord, 0° 42' 42\" est  dont la Maison Baugis grav 4-5-6  et Moussetière.  grav 1-2-3                                                                                   Moussetière GPS : 48° 26' 46,28\" Nord, 0° 42' 41,75\" Est                           Maison-Maugis gps 48° 27' 06\" N, 0° 42' 13\" Est","gps":"48° 26' 46,28\" Nord, 0° 42' 41,75\" Est","images":["../image/image_61/61_Boissy_Maugis_1.jpg","../image/image_61/61_Boissy_Maugis_2.jpg","../image/image_61/61_Boissy_Maugis_3.jpg","../image/image_61/61_Boissy_Maugis_4.jpg","../image/image_61/61_Boissy_Maugis_5.jpg","../image/image_61/61_Boissy_Maugis_6.jpg"]},"Consult_chateau_formulaire7e25":{"id":"Consult_chateau_formulaire7e25","dept":"61","canton":"Bagnoles-de-l","commune":"Juvigny-sous-Andaine","nom":"Bonvouloir","type":"Forteresse","periode":"XV","histoire":"BONVOULOIR, en 1485 Guyon Essirard reçoit le fief de Bonvouloir  de la part de  René duc d'Alençon et comte de Joigny, à la fin du XVe siècle , Guyon fait  construire une maison forte  passe par alliance aux Courtavelle puis rentre en 1515 dans le patrimoine de la famille Achard  qui prend le nom de Bonvouloir la maison forte sera en partie détruite  au XVIIIe siècle la famille des Achard de Bonvouloir donnèrent plusieurs capitaine au château de Domfrond et des députés aux états généraux de 1789, toujours dans la descendance de Charles Achard de Bonvouloir.","architecture":"BONVOULOIR, forteresse de la fin du XVe siècle organisée autour d'une basse cour. A partir du XVIIe siècle, le château a été transformé en ferme, ce qui a entraîné la démolition de la plupart des courtines. Au XVIIIe siècle, la tour sud-ouest est devenue un pigeonnier. La tour de Bonvouloir, haute de 26 mètres, dite phare, devait servir de guette. l'ensemble était enfermé dans une enceinte carrée ceinturée de douves ne subsistent que des éléments épars.  Dans un des angles se dresse la tour construite en granit local pourvue d'une base tâlutée. Percée de Canonnières, cette tour est couronnée d'un étage en saillie qui repose sur des corbeaux de grès  cet étage est occupé par une salle, éclairée par des fenêtres en plein cintre et dotées de meurtrières, a cette tour est accolée une très mince tourelle haute de 20 mètres abritant un escalier en vis qui compte 100 marches et coiffée d'un toit d'ardoise en forme de cloche avec lanternon. Au XVIIIe siècle, la Tour Sud-Ouest est devenue un pigeonnier. protégés MH : les vestiges de l'ancien château, notamment : l'assiette de l'ancien château et les parcelles limitrophes comprenant les fossés et les jardins ; la tour dite Le Phare ; le colombier ; le puits ; les façades et les toitures de l'ancienne chapelle, de la grange et des communs attenants ainsi que du bâtiment du XVIIIe siècle à l'angle nord-est des fossés : classement par arrêté du 4 juillet 1995.","habitants":"Famille Achard  de Bonvouloir.\r\n        \"","divers":"Vestiges du château de Bonvouloir à Juvigny-sous-Andaine                             GPS : 48° 33' 51,12\" Nord, 0° 29' 57,12\" Ouest","gps":"48° 33' 51,12\" Nord, 0° 29' 57,12\" Ouest","images":["../image/image_61/61_Bonvouloir_1.jpg","../image/image_61/61_Bonvouloir_2.jpg"]},"Consult_chateau_formulaire8379":{"id":"Consult_chateau_formulaire8379","dept":"61","canton":"Argentan","commune":"Le Bourg Saint Léonard,","nom":"Bourg_st_Léonard","type":"Palais","periode":"XVIII","histoire":"Deux châteaux dans cet article celui de Bourg                                                                                                                    BOURG ST-LEONARD, symbolise l'art de vivre de l'aristocratie au siècle des Lumières (XVIIIe, dans le luxe et la volupté). Ils disparurent vers 1768. Un manoir du XIIIe siècle a précédé le château actuel, situé sur le tertre au-dessus du potager,  par les Ferquet vieille famille normande qui possède le château  en 1747  le chevalier Louis de Barquet, frère du comte de  Bourg cède  à son unique héritière  Suzanne-Jeanne-Françoise marquise de Vassy, La forêt étant en mauvais état elle  s'en défait  en 1756 au profit de  Jules-David de Cromot  qui  reconstruit le nouveau château de 1763 à 1767. Cette famille qui émigre à la Révolution et reprend possession du Bourg en 1814, entre temps le gouverneur du domaine gendre du fermier général de Rouen Cromot ancien premier commis au contrôle général des finances en 1771 sur-intendant des bâtiments du comte de Provence futur Louis XVIII possède de nombreux intérêts, comte d'Alençon ami de Cromot qui obtiendra  l'érection des terres en baronnie. le château est vendu au comte de Tamisier. Propriété de M.de Tourdonnet en 1835 puis en 1841 au marquis de Chasse-Loup-Laubat ministre de la Marine sous le second Empire. En  1879 acquisition du domaine  par le comte de Forceville, la dernière des Forceville lègue en 1954 le château à la commune de Bourg.","architecture":"BOURG ST-LEONARD,  est entouré de 400 ha de Jardins à l'Anglaise. Ce château est un bon exemple du style classique de la fin du règne de Louis XV. Reconstruit à quelque distance de L'ancien sur la cour d'honneur, le logis déploie sa longue façade à sept travées, dont un avant corps central, surmonté d'un fronton triangulaire, occupe le centre.  Le corps du bâtiment est prolongé par deux ailes en légère saillie. Rectangulaire, le Bâtiment est surmonté d'un attique que surplombe au dessus de la corniche, une balustrade ornés de vases sculptés dissimulant un toit faiblement pentu. Des refends soulignent le rez-de-chaussées de l'avant-corps central, tandis que des chaînes de pierre marquent les extrémités des ailes latérales.  Le château constitue une vitrine du mobilier du XVIIIe siècle. Le bâtiment est situé au fond d'un jardin à la française bordé au nord par l'orangerie, la ferme et le logement des jardiniers ; au sud par les écuries et le logement du concierge. Les peintures sont de François Snyders. La ferme, endommagée en 1944, est reconstruite sur le même plan.Éléments protégés MH : le château ; les écuries ; l'orangerie ; le bâtiment des jardiniers ; le bâtiment du concierge ; le jardin et la terrasse au nord du château : classement par arrêté du 25 février 1942.","habitants":"Famille de Ferquet\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Deux châteaux dans cet article celui de Bourg                                         GPS : 48° 46' 03,2\" Nord, 0° 06' 07,5\" Est","gps":"48° 46' 03,2\" Nord, 0° 06' 07,5\" Est","images":["../image/image_61/61_Bourg_st_L%c3%a9onard_1.jpg","../image/image_61/61_Bourg_st_L%c3%a9onard_2.jpg"]},"Consult_chateau_formulaire3d4f":{"id":"Consult_chateau_formulaire3d4f","dept":"61","canton":"Vimoutiers","commune":"Mardilly","nom":"Bouverie","type":"Château","periode":"XVII","histoire":"BOUVERIE, il date de 1608. La Famille de Rupierre était installée à Mardilly, au XIIIe siècle, ainsi que sur d'autres fiefs de la Vallée de la Touques. Pourvues de charges militaires importantes, les Rupierre adoptent des attitudes opposées pendant la guerre de Cent Ans et embrassent la cause du roi de France, pour les uns ou le parti des Anglais pour les autres, ce qui leur valut des confiscations, qui seront effacées par des mesures d'indulgence. Leur descendant Martin de Rupierre s'engagea en faveur de la Ligue et connut lors de ses voyages de grandes demeures et leurs commanditaires dont un de ses cousins, qui était conseiller de Catherine de Médicis. Martin de Rupierre se retirera dans sa seigneurie de Mardilly et grâce à son mariage avec Catherine, fille d'Alain de Hudebert, il fera entreprendre, à la place de l'ancienne place forte, la construction du château de la Bouverie actuel. Achevé en 1604, sous le règne d'Henri IV. Malgré l'importante dot de son épouse, Martin de Rupierre dut aliéner ses terres, en raison du coût de construction élevé, de la qualité des matériaux. Ses fils hériteront de la seigneurie mais devront la revendre à leur cousin Gilles de La Pallu, sieur du Mesnil-Hubert. A la Révolution, la Famille La Pallu y habitera jusqu'en 1840.","architecture":"BOUVERIE,  fut vendu comme bien national. Il perdit alors son titre de \"Château\" de Mardilly pour devenir le manoir de la Bouverie, du nom de la ferme à laquelle il est rattaché, le corps de logis du manoir flanqué d'échauguettes  en encorbellement coiffées chacune d'un toit en  dôme doit son élégance aux 4 poivrières d'angle et aux ouvrages de maçonnerie de briques et de pierres de roussier locales qui rythment sa façade principale.  Le Domaine de la Bouverie comprend aussi 3 dépendances : une grange, un lavoir et une boulangerie. Le moulin, qui était situé sur un bras de la Touques, ne fait plus partie de la propriété. Les façades et toitures du logis principal sont inscrites aux M.H. depuis le 9/10/1968.","habitants":"Famille de Rupierre                                                                   Famille La Pallu \r\n        \"","divers":"Château de la Bouverie à Mardilly GPS : 48° 49' 37\" Nord, 0° 16' 50,5\" Est","gps":"48° 49' 37\" Nord, 0° 16' 50,5\" Est","images":["../image/image_61/61_Bouverie_1.jpg","../image/image_61/61_Bouverie_2.jpg","../image/image_61/61_Bouverie_3.jpg"]},"Consult_chateau_formulaireb283":{"id":"Consult_chateau_formulaireb283","dept":"61","canton":"Vimoutiers","commune":"Camembert","nom":"Camembert","type":"Manoir","periode":"XVI-XVIII","histoire":"deux châteaux à Camenbert; Orval et Beaumoncel.                         ORVAL,  Gabriel de Calmesnil, écuyer, était seigneur d'Orval en 1758, selon  X. Rousseau. Propriété conservée par la famille Clouet d'Orval après la Révolution. Le logis date du XVIIIe siècle, sauf la partie sud, remaniée, mais antérieure. Ecuries avec logements à l'étage du premier quart du XIXe siècle. Parties agricoles de la fin du XIXe siècle ou du début du XXe siècle. Logis en pan de bois, brique et moellons enduits ; écuries en calcaire à décor de brique ; ancien logement en pierre ; étables en pan de bois ; bâtiments agricoles en brique avec pierre en remplissage.","architecture":"BEAUMONCEL-CAMEMBERT, la construction du manoir date du XVIe siècle. Il fut autrefois transormé en ferme. C'est dans ce lieu que Marie Harel aurait caché, durant la révolution, un prêtre réfractaire, possesseur de la recette unique du fromage. Les époux Clouet d'Orval vont entretenir admirablement le domaine et feront revivre la mémoire des lieux, faisant visiter les grandes salles du rez-de-chaussée et ses dépendances. La visite est guidée.","habitants":"famille Clouet d'Orval \r\n        \"","divers":"deux châteaux à Camembert; Orval grav 1 et Beaumoncel grav2-3.   Beaumoncel GPS : 48° 53' 35\" Nord 0° 10' 39\" Est","gps":"48° 53' 35\" Nord 0° 10' 39\" Est","images":["../image/image_61/61_Camembert_1.jpg","../image/image_61/61_Camembert_2.jpg","../image/image_61/61_Camembert_3.jpg"]},"Consult_chateau_formulaire2f96":{"id":"Consult_chateau_formulaire2f96","dept":"61","canton":"Magny-le-Désert","commune":"Carrouges","nom":"Carrouges","type":"Forteresse","periode":"XIV-XVII","histoire":"CARROUGES, Jean de Carrouges IV, à lorigine du château dont subsiste le donjon du XIVe siècle, était chambellan du comte Pierre II d'Alençon il devînt chevalier dhonneur du roi Charles VI à la suite d'un duel où il avait mis en jeu sa vie pour sauver son honneur et celui de son épouse, Marguerite de Thibouville qui avait été violée pendant son absence. Il fut aux côtés des rois de France pendant la guerre de cent ans. Au terme de celle ci, et dès son couronnement, le roi Louis XI entreprendra la ruine qui avait rejeté les Anglais hors du Royaume, en désacralisant la chevalerie. Louis XI n'hésitera pas à en faire tomber les principaux membres et anciens compagnons de Jeanne la Pucelle tel le duc Jean II d'Alençon. Il utilisera même son chambellan, Jean Blosset qui en tirera un bon enrichissement consolidé par les alliances que Louis XI lui permit de conclure avec de riches héritières de Bretagne. Ses alliances et sa charge, donnèrent à Jean Blosset les moyens de restaurer et d'agrandir le château qui avait subi de gros dommages à la suite de sa confiscation par Henri VI d'Angleterre après la bataille de Verneuil. Jean Blosset (fils de Guillaume Blosset, époux de la dernière Dame de Carrouges) est le bâtisseur de l'aile Nord Est du château dans laquelle il hébergera Louis XI, entre autres, le 11 août 1473, et c'est à cette époque que l'on transforme les châteaux-forts en châteaux habitables. Il fit élever, sur les prières de son épouse Marguerite de Derval. Blosset n'ayant pas eu dhéritier, cest sa sur Marie qui transmettra le domaine à son fils Jean Le Veneur. Celui-ci ornera l'édifice dun châtelet à la Renaissance. A nouveau fortifié au temps des guerres de Religion, il devint, au cours du grand siècle, une résidence somptueuse, réaménagée au siècle des lumières. Au début du XVIe siècle, Jean Le Veneur, évêque, comte de Lisieux (fils de Philippe Le Veneur, baron de Tillières et de Marie Blosset) est le bâtisseur du pavillon d'entrée et le châtelet.","architecture":"CARROUGES, au XVIIe siècle, Tanneguy II Le Veneur vécut sur ses terres de Tillières et laissa Carrouges à son frère Jacques, abbé de Silly. En 1637, Jacques Le Veneur de Tillières se démit de son abbaye pour se consacrer entièrement au château de Carrouges en faisant aménager et décorer l'édifice et le parc. La famille s'insère également dans la vie locale par une activité de maîtres de forge. A la fin du XVIIIe siècle, Alexis le Veneur, vicomte de Tillières, est militaire et partisan des idées progressistes. Il est l'époux d'Henriette de Verdelin, fille de la marquise de Verdelin, protectrice de Jean-Jacques Rousseau. Adhérant à ses idées, il prend position pour l'abandon des privilèges avant la Révolution. Il participe à plusieurs campagnes militaires qui lui valent le grade de lieutenant général, puis général de division, il est élu maire de Carrouges, administrateur du département, premier président du Conseil général et enfin député au Corps Législatif. Il est fait comte d'Empire avec majorat par Napoléon Bonaparte, il meurt en 1833. Le château restera cinq siècles dans cette noble famille Le Veneur, dont les membres remplirent dignement leur rôle social jusquau 23 avril 1936, date à laquelle Gaston Tanneguy, comte Le Veneur de Tillières, nayant pas eu de descendance mâle et subissant le déclin de l'économie rurale de l'entre deux guerres, est contraint de céder le château à lÉtat. Le château est construit sur un plan carré, avec cour intérieure, et renforcé à chacun de ses angles par une tour ou un corps de bâtiment. Au nord-ouest se trouve le donjon carré du XVe siècle, conservant des parties du XIIIe siècle. La façade nord date du XVe siècle. Le reste du château remonte au XVIIe siècle. Le pavillon d'entrée, près des grilles, est une construction du XVIe siècle, rectangulaire, renforcée à chaque angle par une tourelle.","habitants":"Jean de Carrouges IV\r\n        \"","divers":"Carrouges GPS : 48° 33' 36,9\" Nord, 0° 9' 12,78\" Ouest    48° 33' 36? nord, 0° 09' 16? ouest","gps":"48° 33' 36,9\" Nord, 0° 9' 12,78\" Ouest    48° 33' 36? nord,","images":["../image/image_61/61_Carrouges_1.jpg","../image/image_61/61_Carrouges_2.jpg","../image/image_61/61_Carrouges_3.jpg","../image/image_61/61_Carrouges_4.jpg","../image/image_61/61_Carrouges_5.jpg","../image/image_61/61_Carrouges_6.jpg","../image/image_61/61_Carrouges_7.jpg"]},"Consult_chateau_formulaireb802":{"id":"Consult_chateau_formulaireb802","dept":"61","canton":"Bagnoles-de-l","commune":"Ceaucé","nom":"Ceaucé","type":"Château","periode":"XIV-XV-XVIII","histoire":"Trois châteaux à Ceaucé, dont Montchaveau, Grande Pierre, la Fosse et Servière.                                                                                              MONTCHAUVEAU, site naturel dont les origines remontent au XI-XIIe siècle avec étang, tracé d'anciennes douves entourant une motte féodale arasée. Château de la période féodale, ancien plein fief de Haubert. Remanié, il se présente actuellement avec des façades du XVIIIe siècle. Une cheminée monumentale de cuisine du XVe siècle. Boiseries d'époque du Directoire et Empire à l'intérieur. Dans la cour se trouve une ancienne charreterie, une grange dîmière du XVIe siècle et un four à pain. L'espace environnant comporte un étang, une douve, un parc bordé.                                                                   La construction du Château de Montchauveau date du XIVe et XVIIe siècles. Se visite le rez de chaussée du château 2 salons XVIIIe et XIXe, les extérieurs, les communs (grange à dîme, fournil avec son four à pain, ancien chenil), le parc, les douves, la promenade autour de l'étang. Le château du Montchauveau est inscrit aux M.H. depuis le 7/02/1975.","architecture":"GRANDE-PIERRE, manoir, sa construction date du XVIe et XVIIe siècle. Le nom du manoir proviendrait de celui du menhir, inclus dans la propriété. A la grande tour carrée avec sa tourelle ronde (fin XVIe siècle) , est venue s'adjoindre une aile au XVIIIe siècle. L'ensemble a conservé quelques boiseries.  Le manoir de la Grande-Pierre est inscrit aux M.H. le 15/05/1974.                                                                                                                                                                              la FOSSE, au nord de Ceaucé à une dizaine de K.M.  à Avrilly château de la Fosse;  fut la propriété de l'historien domfrontais Caillebotte. La Varende y a fait se dérouler l'un de ses \" contes amers\" le général von- Choltitz  s'y abrita pendant la bataille de Normandie, propriété de Mme Etienne.  L'habitation actuelle date des dernières années du XVIIe siècle. Elle a remplacé une demeure plus ancienne construite au même endroit. En 1817, les douves furent comblées et le pavillon ont été remaniés. Vers 1870, remplacement des bâtiments adossés aux extrémités Nord et Sud de l'habitation principale par les 2 ailes existantes actuellement. Le corps de logis principal présente un avant-corps légèrement surmonté d'un fronton triangulaire percé d'un oculus. A l'intérieur, la porte principale ouvre sur un petit salon entièrement recouvert de boiseries du XVIIIe siècle. L'escalier comporte une rampe en bois sculpté de la fin du XVIIe siècle, très caractéristique de la région. Le manoir de la Fosse est inscrit aux M.H. en 1975.","habitants":"Montchauveau; fief de Haubert                                                              La Fosse;  l'historien Caillebotte\r\n        \"","divers":"Trois châteaux à Ceaucé, dont Montchaveau grav-1, Grande Pierre grav-6 et la Fosse grav-4-5 Servière grav 2-3 à Avrilly.                                                                       GD Pierre                                                                                           GPS : 48° 29' 38\" Nord 0° 37' 28\" Ouest                                               Fosse   GPS : 48° 31' 59\" Nord, 0° 36' 57\" Ouest","gps":"48° 29' 38\" Nord 0° 37' 28\" Ouest","images":["../image/image_61/61_Ceauc%c3%a9_1.jpg","../image/image_61/61_Ceauc%c3%a9_2.jpg","../image/image_61/61_Ceauc%c3%a9_3.jpg","../image/image_61/61_Ceauc%c3%a9_4.jpg","../image/image_61/61_Ceauc%c3%a9_5.jpg","../image/image_61/61_Ceauc%c3%a9_6.jpg"]},"Consult_chateau_formulairea927":{"id":"Consult_chateau_formulairea927","dept":"61","canton":"Ceton","commune":"Ceton","nom":"Ceton","type":"Château","periode":"XVI-XVIII","histoire":"deux château dans cet article Beauvais et Glaye.\r\nBEAUVAIS,  maison forte percheronne, fut bâti à la fin du XVIe siècle, sur l'emplacement d'un château médiéval dont il est fait mention dès le XIIe siècle. Construit sur un plan quadrangulaire, il ne subsiste plus aujourd'hui que les deux tours circulaires du sud-est, celle de g
