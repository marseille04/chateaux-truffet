me fortifiée qui daterait du Haut Moyen-Age, pour Jacques de Roussel, propriétaire agricole, avocat au Parlement de Rouen et lieutenant  à Domfront Jehan Roussel, sieur de la Bouvérière, marié, vers 1480, à Augustine Hallé de Jumilly, dame de la Bérardière. Guillaume Roussel, sieur de la Bérardière, marié à Madeleine Le Court. La Famille Roulleaux-Dugage est le propriétaire actuel du manoir,  est inscrit aux M.H.depuis le 3/05/1974.  Quant au parc, le 14/05/2011. L'Association des Amis de la Bérardière, créée en 2008, a pour objectif de sauvegarder le Domaine, de veiller à son entretien et de le mettre en valeur, par l'organisation de manifestations culturelles.","architecture":"BERARDIERE, du XVIIe siècle, de la première demeure ne subsiste rien. Cet édifice fut remplacé, vers la fin du XVe siècle par une autre construction, dont il reste le pavillon des archives aménagé en bibliothèque. Le château actuel a été construit en 1695. C'est une demeure classique, constituée par un grand bâtiment rectangulaire. Au milieu de la façade nord s'élève une tourelle à pans. Lucarnes à frontons sculptés. L'actuelle salle-à-manger et le bureau sont recouverts de boiseries décorées vers 1750. En équerre sur le bâtiment principal, une aile a été ajoutée vers 1910 dans le style de l'ensemble. Les tours d'enceinte du jardin remontent sans doute à la fin du 16e siècle. Le parc est un élément constitutif du manoir. Intérêt ethnologique de ses promenades aménagées au XVIIIe siècle.                                                                                                                    NOCHERIE,  il se raconte que c'est dans le manoir de la Nocherie que Guillaume Talvas de Bellême aurait massacré toute une partie de sa famille. Le manoir fut construit au XVe siècle.  M. et Mme Mottier vous accueillent dans un environnement exceptionnel, havre de paix où vous pourrez apprécier la Normandie au travers de ses paysages . Vallée de la Varenne, située entre Domfront et Flers, Il existe un autre château à découvrir sur la commue : Le manoir de la Maigraire, de  Mr et Mme Mottier.","habitants":"Bérardière; Famille de Jacques de Roussel                                         Maigraire famille de Mme Mottier\r\n        \r\n        \r\n        \"","divers":"Deux châteaux dans cet  article la Bérardière  et la Nocherie                      GPS : 48° 39' 06\" Nord, 0° 38' 48\" 0uest                                                                 Nocherie GPS : 48° 38' 38\" Nord, 0° 38' 00\" Ouest","gps":"48° 39' 06\" Nord, 0° 38' 48\" 0uest","images":["../image/image_61/61_St_Bomer_les_Forges_1.jpg","../image/image_61/61_St_Bomer_les_Forges_2.jpg","../image/image_61/61_St_Bomer_les_Forges_3.jpg","../image/image_61/61_St_Bomer_les_Forges_4.jpg","../image/image_61/61_St_Bomer_les_Forges_5.jpg","../image/image_61/61_St_Bomer_les_Forges_6.jpg","../image/image_61/61_St_Bomer_les_Forges_7.jpg"]},"Consult_chateau_formulairefffa":{"id":"Consult_chateau_formulairefffa","dept":"61","canton":"Damigny","commune":"St-Denis-sur-Sarthon","nom":"St_Denis_Sarthon","type":"Château","periode":"XVIII","histoire":"La TOUCHE,  du XVIII siècle, le général-comte Jean Pierre François Bonet (1768-1857) y possédait sa résidence d'été, au coeur du Parc  les magnifiques bâtiments du XVIIIe siècle en fer à cheval du domaine de la Touche constituent un cadre privilégié pour vivre et partager, tout au long de lannée, des moments dexception.\r\nLe peintre Maurice Denis (1870-1943) y séjourna durant la seconde guerre mondiale, avant sa mort. On peut voir au musée Maurice-Denis de Saint-Germain-en-Laye, le « tas de pommes », inspiré de ses promenades à Saint-Denis-sur-Sarthon. Il a également représenté le château de la Touche, actuellement en collection particulière.                                                                                                             Le château du FAULT, le château de la FAIENCERIE pas d'historique pour ces deux châteaux.","architecture":"TOUCHE, le château de la Touche. Au coeur du parc Régional Normandie Maine, à 10 kms dAlençon, les magnifiques bâtiments du XVIIIe siècle en fer à cheval du domaine de la Touche constituent un cadre privilégié pour vivre et partager, tout au long de lannée, des moments dexception.\r\nLe château comprend un corps principal flanqué de deux tours carrées en avancée élégamment coiffées d'une toiture à quatre pans, avec retour à l'équerre d'un bâtiment à la Mansard venant rompre la symétrie affichée tout en créant une zone de vie chaleureuse et plus intime.\r\nL'ensemble est en silex traditionnel recouvert de crépis avec un chaînage en brique des ouvrants. La propriété comporte 3 niveaux développant une surface habitable de l'ordre de 650 m² ainsi distribués.","habitants":"le général-comte Jean Pierre François Bonet \r\n        \"","divers":"St-Denis  48° 27' 24\" nord, 0° 03' 03\" ouest","gps":"","images":["../image/image_61/61_St_Denis_Sarthon_1.jpg","../image/image_61/61_St_Denis_Sarthon_2.jpg","../image/image_61/61_St_Denis_Sarthon_3.jpg","../image/image_61/61_St_Denis_Sarthon_4.jpg","../image/image_61/61_St_Denis_Sarthon_5.jpg","../image/image_61/61_St_Denis_Sarthon_6.jpg","../image/image_61/61_St_Denis_Sarthon_7.jpg","../image/image_61/61_St_Denis_Sarthon_8.jpg","../image/image_61/61_St_Denis_Sarthon_9.jpg"]},"Consult_chateau_formulairecf96":{"id":"Consult_chateau_formulairecf96","dept":"61","canton":"Alençon","commune":"St-Germain de Corbeis","nom":"St_Germain_Corbeis","type":"Château","periode":"XVII","histoire":"Deux châteaux à St-Germain de Corbeis, dont l'Isle et Chauvigny.                                                                                  ISLE, le château de L'Isle a été construit à la fin du XVIIe et au XVIIIe siècle par la famille des Moulins, ne conservant d'un manoir plus ancien que deux tours à usage de chapelle et de colombier. Depuis 1819, la famille Lecointre, qui a fourni un courageux maire d'Alençon en 1870, est propriétaire du château de l'Isle. Le château a été transformé pendant la deuxième guerre en annexe de lhôpital.                                                                                            Saint-Germain-du-Corbéis et a été délivré le 12 août 1944 par la deuxième division Leclerc. La demeure appartient aujourd'hui au marquis d'Oilliamson et à la marquise, née Lecointre. Transformé en EHPAD pension de famille.","architecture":"CHAUVIGNY,  on trouve parmi les personnalités liées à la commune, Madeleine de Chauvigny (1603-1671), éducatrice et missionnaire au Canada, dont la famille était liée au château de Chauvigny lorigine est ancienne. En 1280, il est fait mention des vignes de Guillaume de Chauvigny. En 1592, Henri IV donne le domaine à René de Saint-Denis. Il connaît de nombreux propriétaires jusquau XIXe siècle, où il est acheté par le comte Curial. Le 15/12/1873, il est incendié puis reconstruit. Une élégante habitation au milieu dun parc pittoresque. Henri Curial dirigea la cité corbenoise de 1892 à 1900. Aujourdhui, Ariane Merlo et Thierry Cordelier dirigent une petite unité de vie de dix résidents dans un cadre confortable et sécurisé, il nous est apparu normal de répondre à la demande de Gilles Barbeau, douvrir un soir, le domaine, les Corbenois sont attachés à ce château. Devant le château de Chauvigny, mis en lumière, des animations historiques et musicales de 20 mn sont prévues. Gratuit.","habitants":"Isle: famille des Moulins                                                                Guillaume de Chauvigny\r\n        \"","divers":"Deux châteaux à St-Germain de Corbets, dont l'Isle grav 1-2-3 et Chauvigny grav-4-5.  GPS : 48° 25' 22\" Nord, 0° 03' 43\" Est","gps":"48° 25' 22\" Nord, 0° 03' 43\" Est","images":["../image/image_61/61_St_Germain_Corbeis_1.jpg","../image/image_61/61_St_Germain_Corbeis_2.jpg","../image/image_61/61_St_Germain_Corbeis_3.jpg","../image/image_61/61_St_Germain_Corbeis_4.jpg","../image/image_61/61_St_Germain_Corbeis_5.jpg"]},"Consult_chateau_formulaire48fe":{"id":"Consult_chateau_formulaire48fe","dept":"61","canton":"Bretoncelles","commune":"Colonard Corubert,","nom":"St_Hilaire_Noyers","type":"Manoir","periode":"XVII-XVIII","histoire":"ST-HILAIRE des NOYERS, du XVe siècle, date à laquelle René de Chasteaubriant chevalier, comte de Casan, baron de Longny, vicomte de Remalard, seigneur des Roches Baritaut  de Chavannes et du Lion dAngers, chambellan du Roi, en était le propriétaire. . Cette construction fut complétée en 1837, par le Baron François Thomas des Chesnes, par un pavillon neuf faisant pendant au pavillon carré (côté est) au toit pyramidal du château.   Au tout début du XXe siècle, la famille Tournouër réorganisa l'ensemble du rez de chaussée et fit construire l'escalier en marbre du nouveau château. De même au nouveau pavillon bâti en 1837 fut rajouté un troisième étage, ce qui améliora lesthétique de lensemble.","architecture":"ST-HILAIRE des NOYERS;  lédifice initial dont il ne reste que la tour dans le vieux château remonte à cette époque. Le château fut sans nul doute rebâti entièrement au début du XVIIe siècle : la nouvelle demeure se composait dun corps de logis long flanqué de deux pavillons carrés à toits pyramidaux. Le pavillon ouest du château de Saint Hilaire des Noyers constitue aujourdhui le vieux château. Vers la fin du XVIIIe siècle un autre bâtiment rectangulaire à toit à la Mansard, avec tour fut rajouté à lédifice côté est, peut-être pour les Chaumont. Cette partie était destinée à devenir la partie centrale du château que lon désirait refaire plus importante. Au cours du XIXe siècle, une partie du pavillon central de lancienne demeure fut détruite (par le Baron des Chesnes pour donner plus d'allure à son château ou par un incendie  isolant ainsi ce qui est aujourdhui le vieux château du reste du bâtiment : le nouveau château. Les travaux engagés en 1837 ne furent pas très heureux: la nouvelle habitation manquait délégance, les toits des pavillons sont écrasés et lensemble se ressent du mauvais goût de l'époque où elle fut achevée, et des cheminées augmentaient l'effet disgracieux de l'ensemble.","habitants":"Baron François Thomas des Chesnes\r\n        \r\n        \"","divers":"St Hilaire noyers\r\n48° 23' 33\" nord, 0° 39' 50\" est","gps":"","images":["../image/image_61/61_St_Hilaire_Noyers_1.jpg","../image/image_61/61_St_Hilaire_Noyers_2.jpg"]},"Consult_chateau_formulaire3c38":{"id":"Consult_chateau_formulaire3c38","dept":"61","canton":"Tourouvre","commune":"Saint-Hilaire-sur-Risle","nom":"St_Hilaire_Risle","type":"Manoir","periode":"XVI","histoire":"St-HILAIRE, au XVIe siècle la famille Monnai propriétaire  de la forteresse. en 1553 passe à la famille du Busc. Au début du XVIIe siècle en 1603 , le domaine est cédé à  François le Hantier, seigneur de la Braqueterie et de Raveton, le nouveau propriétaire fit raser l'ancien édifice pour reconstruire un nouveau château, dans le goût de l'époque Henri IV il  le garderont jusqu'en 1679  et s'en défait au profit de Nicolas Lefébvre seigneur de Bournonville  écuyer de la grande écurie du roi, ce dernier meurt en 1688 laissant le domaine à sa fille née  de son mariage avec Louise de Compans, au XVIIIe siècle le domaine passe  à Marie de Bons, épouse de Louis Lemoine à laquelle succède son fils Pierre qui lègue la propriété à l'un de ses neveu, Etienne Lemoine avocat. En 1740  Guillaume Chagrin écuyer seigneur de La Poudrière, des Noès et de la Bouverie-en-Aunou, mousquetaire, s'en porte acquéreur. Le château est inscrit au M.H. avant d'être transmis aux Josselin  de St-Hilaire descendant du général Chagrin de St-Hilaire.","architecture":"St-HILAIRE, la famille des Hantier,  ayant des attaches familiales dans la région de Lisieux, font appel  à des artisans augerons, d'où le rattachement de la nouvelle construction à cette architecture. Construit en briques roses, l'édifice est cantonné de quatre tours d'angle sur plan carré. La partie centrale de la façade principale est couronnée par un fronton triangulaire. Les murs du logis central sont décorés de losanges noirs formés par des briques vernissées, à la façon augeronne. La partie haute des murs est ornée de consoles, qui forment de faux mâchicoulis. La cour d'honneur est limitée par deux bâtiments de communs du XVIIIe siècle. Le colombier date également de cette époque.  La construction du château de saint-hilaire-sur-Risle date du 1er quart du XVIIe siècle au XVIIIe siècle. Il y avait, au Moyen-Age, une forteresse construite sur une motte, élevée à l'emplacement du château actuel.   La terre de Saint-Hilaire était un fief relevant du château de Moulins et Bonsmoulins, dépendant du duché d'Alençon. : inscription par arrêté du 3 mai 1974.","habitants":"Famille de  Nicolas Lefebvre \r\n        \"","divers":"St_Hilaire_Risle GPS : 48° 43' 59\" Nord, 0° 29' 50\" Est","gps":"48° 43' 59\" Nord, 0° 29' 50\" Est","images":["../image/image_61/61_St_Hilaire_Risle_1.jpg","../image/image_61/61_St_Hilaire_Risle_2.jpg"]},"Consult_chateau_formulaire3adb":{"id":"Consult_chateau_formulaire3adb","dept":"61","canton":"Rai","commune":"Nonant-le-Pin","nom":"St_Jacques_Mineur","type":"Manoir","periode":"XVI","histoire":"ST-JACQUES Le MINEUR, château fort des seigneurs de Nonant construit au XIe siècle, puis plusieurs fois détruit et rebâti dans le courant du Moyen Age. Le château de Saint-Jacques le Mineur, dont subsiste les douves et la chapelle dédiée à saint Jacques le Mineur, a été édifié en 1503 pour la famille Le Conte. Il est transformé à la fin du XVIe ou au début du XVIIe siècle. Le portail a probablement été ajouté à la fin du XVIIe ou au début du XVIIIe siècle pour les Duplessis Chastillon. Le logis, vétuste, est démoli en 1844 et reconstruit de 1845 à 1848  pour le Parisien Jacques Valentin. En 1868, le château est acquis par Jacques Léonard Lepetit qui y crée un haras de pur-sang.","architecture":"ST-JACQUES Le MINEUR, construction des bâtiments autour de la cour des écuries en 1884, du corps de logement dit le pavillon en 1893 et de l'éolienne monumentale par Auguste Bollée. En 1944, le logis et l'aile gauche des écuries sont détruits, mais seule la deuxième est reconstruite. Plate forme bordée de douves de plan rectangulaire régulier ; logis (avant destruction) : murs enduits, sous-sol, un étage carré, un étage de comble, pavillon central à deux étages, toiture brisée ; colombier, toit conique; chapelle : pierre de taille, voûte d'ogives, croupe polygonale ; logement dit le pavillon : sous-sol, un étage carré, pierre avec brique en remplissage, pan de bois au dernier niveau de la tour d'escalier, toit à croupe et pignon couvert, toit polygonal sur la tour d'escalier; éolienne : brique, fonte et fer, toit conique en zinc, escalier de fer en vis suspendu au noyau. Haras.","habitants":"Famille Le Conte et des  Duplessis Chastillon\r\n        \"","divers":"St jacques le mineur\r\n45° 17' 00\" nord, 73° 25' 00\" ouest","gps":"","images":["../image/image_61/61_St_Jacques_Mineur_1.jpg","../image/image_61/61_St_Jacques_Mineur_2.jpg"]},"Consult_chateau_formulaire4fd6":{"id":"Consult_chateau_formulaire4fd6","dept":"61","canton":"Mortagne-au-Perche","commune":"Saint-Jouin-de-Blavou","nom":"St_Jouin_Blavou","type":"Château","periode":"XVI","histoire":"CHANCEAUX, au nord-Est de Prévenchères Il date du XVIe-XViIe siècles et sa chapelle Saint-Marc date du 4ème quart du XVIe siècle, du 1er quart du XVIIe siècle et du XVIIIe siècle. Le château de Chanceaux et sa chapelle sont classés aux M.H. le 22/05/1978.                                                                      Manoir de St-Jouin de Blavou pas d'information historique.","architecture":"VAUVINEUX à Prévenchères, au moyen âge, Vauvineux est le fief des Carrel, vassaux des seigneurs de Bellême, dont une fratrie sexile, en 1016, en Italie du Sud. Suivis par les célèbres Hauteville, ils y jouent un rôle de premier plan avant dêtre dépossédés de tous leurs biens et titres italiens. Seuls vestiges de lancien château fort des Carrel : la partie non comblée des douves sèches.  Il devient au XVIIe siècle la propriété des de Rohan. Il est par la suite transformé en ferme et la chapelle, datant du XVIe siècle, est transformée en grange sous la Révolution. Le manoir est érigé à la fin du XVe siècle, sur les ruines du château fort dévasté à la fin de la guerre de cent ans, Telle une sentinelle, aux confins du Perche, il domine un vaste paysage face au pays mêlois.  Manoir du XVe siècle construit à la fin de la guerre de Cent Ans, sur les ruines d'un château fort dont subsiste une partie des fossés. Il domine un vaste paysage. Devenu ferme au XVIIIe siècle, il est en restauration depuis 1992. Contiguë au manoir et érigée au XVIe siècle sur les ruines d'une chapelle plus ancienne, la chapelle de Vauvineux était devenue une grange et menaçait ruine. Sa restauration est en cours et elle a reçu son dernier vitrail. Il comprenait un deuxième étage et une grosse tour ronde, aujourdhui disparus.","habitants":"Famille des Carrel\r\n        \"","divers":"Chanceaux  grav 1-2-3-4                                                                   GPS : 48° 27' 10\" Nord, 0° 28' 27\" Est                                                              Vauvineux  grav 5   48° 26' 32\" Nord, 0° 24' 50\" Est","gps":"48° 27' 10\" Nord, 0° 28' 27\" Est","images":["../image/image_61/61_St_Jouin_Blavou_1.jpg","../image/image_61/61_St_Jouin_Blavou_2.jpg","../image/image_61/61_St_Jouin_Blavou_3.jpg","../image/image_61/61_St_Jouin_Blavou_4.jpg","../image/image_61/61_St_Jouin_Blavou_5.jpg","../image/image_61/61_St_Jouin_Blavou_6.jpg"]},"Consult_chateau_formulaire4de8":{"id":"Consult_chateau_formulaire4de8","dept":"61","canton":"La Ferté-Macé","commune":"Saint-Maurice le desert","nom":"St_Maurice_Desert","type":"Château","periode":"XVII","histoire":"St-MAURICE, le Désert comporte plusieurs corps de bâtiment élevés au XVIIe siècle pour la famille de Montpinson, restauré au XIXe siècle par les Contades  et aujourd'hui  propriété du comte  de Germiny  22/10/2021.","architecture":"St-MAURICE, COUR; construction typique du Domfrontais, avec un corps de logis (1646) en granit, flanqué de deux ailes basses formant quadrilatère autour d'une cour d'honneur, le tout fermé par un portail et deux pavillons carrés reliés par un mur. La façade arrière du logis a été remaniée au XIXe siècle, ainsi que l'intérieur. Les deux tourelles d'angle ont été exhaussées et couvertes de flèches. La poterne porte la date de 1661. Un mur surmonté d'un auvent la relie de part et d'autre à deux pavillons carrés garnis de meurtrières. L'aile nord fut reconstruite et surélevée en 1768. Elle renferme un appartement qui conserve des vestiges de boiseries. Datée de 1622, l'aile sud fut reconstruite en 1924.","habitants":"famille de Montpinson\r\n        \"","divers":"Sur D18 : 48°36'37.3\"Nord 0°23'15.8\" Ouest                                                St-Maurice  48° 36' 38\" nord, 0° 23' 17\" ouest","gps":"","images":["../image/image_61/61_St_Maurice_Desert_1.jpg","../image/image_61/61_St_Maurice_Desert_2.jpg","../image/image_61/61_St_Maurice_Desert_3.jpg","../image/image_61/61_St_Maurice_Desert_4.jpg","../image/image_61/61_St_Maurice_Desert_5.jpg"]},"Consult_chateau_formulaire5396-2":{"id":"Consult_chateau_formulaire5396-2","dept":"61","canton":"L","commune":"Saint-Michel-Tuboeuf","nom":"St_Michel_Tuboeuf","type":"Château","periode":"XV-XVII","histoire":"ST-MICHEL-TUBOEUF le château remplace une ancienne forteresse médiévale dont il a utilisé l'implantation. Cette place-forte joua un rôle important dans la première moitié de la guerre de Cent ans, à l'époque où les troupes françaises s'opposaient aux effectifs anglo navarrais. Il fut habité par les Courtin, les Héron, Les Blanzard, les su Vair, les Fribois, les Berryer, les Caumont, la Force,  Napoléon Bonaparte y coucha au temps du marquis de Lillers et depuis 1847, il appartient à la famille Beau.  Au XVIIe siècle, la forteresse fait place à un ensemble composé d'un logis et de pavillons symétriques. Les murs des pavillons d'entrée sont décorés de chaînages de briques roses, ainsi que les ouvertures. Les pavillons occupant les angles de la cour d'honneur avaient été prévus pour la défense. La tour Est remploie une fenêtre en accolade du XVe siècle, provenant sans doute de l'ancien édifice. A proximité du château se trouve l'orangerie, construite en brique rose à la fin du XVIIe siècle. Elle s'ouvre par une grande porte centrale encadrée de pilastres plats, en brique, qui soutiennent un fronton triangulaire.   Éléments protégés MH : les façades et les toitures du château, des quatre pavillons de la cour d'honneur et des écuries ; la cour d'honneur ; les douves sèches et le pont dormant ; les façades et les toitures des deux pavillons : classement par arrêté du 14 décembre 1992.","architecture":"LA TOUR CHAPPE DU BUAT, date de 1798. En 1793, la France met sur pied un réseau de télégraphie  Claude Chappe. Suivant le principe, un signal est installé au sommet de chaque hauteur, matérialisé à l'aide de trois éléments de bois articulés. Au pied de chaque mécanisme, un guetteur, appelé stationnaire, observe les positions que prend le signal le plus proche et les transmets au stationnaire suivant. La ligne Paris-Brest, décidée par la Marine pour ses besoins, passe par la Basse Normandie.  Construit en 1798, le poste du Buat recevait les signaux de la Lande (Eure) , et le transmettait au relais suivant, à Saint-Symphorien. C'est une tour carrée en silex, avec des chaînages de briques roses, d'une hauteur de 19 mètres. La toiture, à laquelle était fixé le mécanisme, a disparu. La Tour Chappe-du-Buat est inscrite aux M.H. en 1992.","habitants":"St-Michel; famille Beau\r\n        \"","divers":"la tour GPS : 48° 44' 59\" Nord, 0° 40' 30\" Est                                             Tuboeuf GPS : 48° 44' 35\" Nord, 0° 42' 33\" Est                                                       Tour Chappe du Buat grav-5","gps":"48° 44' 59\" Nord, 0° 40' 30\" Est","images":["../image/image_61/61_St_Michel_Tuboeuf_1.jpg","../image/image_61/61_St_Michel_Tuboeuf_2.jpg","../image/image_61/61_St_Michel_Tuboeuf_3.jpg","../image/image_61/61_St_Michel_Tuboeuf_4.jpg","../image/image_61/61_St_Michel_Tuboeuf_5.jpg"]},"Consult_chateau_formulaireea69":{"id":"Consult_chateau_formulaireea69","dept":"61","canton":"Ceton","commune":"Belllême","nom":"ST_Santin","type":"Château","periode":"XVIII-XIX","histoire":"Deux châteaux à Bellème; St-Santin et la maison du  Gouverneur.                                                                                        ST-SANTIN, château fort  fondés au Xe siècle par Yves du Creil, seigneur de Bellême, mort en 987; chapelle, actuellement Saint-Santin, restaurée en 1719, porte la date; château fort détruit au XVe siècle par le duc de Warwick, gouverneur de Bellême ; logis actuel édifié au milieu du XIXe siècle par Le Harivel du Rocher, propriétaire et maître d'oeuvre. Chapelle fondée dans la seconde moitié du Xe siècle. A l'origine, la chapelle aurait été desservie par les moines de Marmoutiers. Le choeur est construit au-dessus d'une crypte, construction très primitive, voûtée en berceau. Cette crypte semble se rattacher aux origines de la chapelle et c'est sans doute là que fut inhumé Yves de Creil, seigneur de Bellême, et son épouse en 997. L'édifice souffrit des guerres de l'époque de la Normandie indépendante. Elle fut certainement reprise partiellement au XIIe siècle. Au XVe siècle, elle subit d'autres transformations. A cette époque, l'extrémité Est de la nef et une partie du choeur ont dû être reconstruits. A la fin du XVe siècle, aménagement intérieur de la chapelle. A la Révolution, elle fut vendue comme bien national.\r\nÉléments protégés MH : la crypte de la chapelle : inscription par arrêté du 23 septembre 1971.","architecture":"GOUVERNEUR,  est une maison bâtie à Bellême. Sa construction date du XVIIe, XVIIIe et XIXe siècle. Construit à la place de l'Hôtel de Fontenay, dont elle garde quelques éléments, la maison du Gouverneur est réaménagée au XVIIe et XVIIIe siècles. L'aménagement intérieur date du XIXe siècle. La ville close de Bellême, dont la porte du XVe siècle est inscrite aux M.H. en 1937 et les douves de l'ancien château aménagées pour recevoir quelques espèces d'animaux aquatiques. Pour avoir été le grenier à sel de la cité, le porche subit actuellement une dégradation; le sel ronge la pierre, menaçant le bâtiment de destruction. Les vestiges de remparts, dont l'entrée porte une plaque commémorative, rappelle que le château et la ville furent pris en 1229 par Saint Louis et sa mère Blanche de Castille. Yves Ier de Bellême ou Yves l'Ancien (de 1005 à 1012) est le premier seigneur connu de Bellême. Le portail de la maison du Gouverneur est inscrit aux M.H.le 17/01/1989.","habitants":"St-Santin; Le Harivel du Rocher\r\n        \"","divers":"Deux châteaux à Bellème st-Santin grav 1-2 et la maison du  Gouverneur grav-3.  GPS : 48° 22' 32,5\" Nord, 0° 33' 46,5\" Est","gps":"48° 22' 32,5\" Nord, 0° 33' 46,5\" Est","images":["../image/image_61/61_ST_Santin_1.jpg","../image/image_61/61_ST_Santin_2.jpg","../image/image_61/61_ST_Santin_3.jpg"]},"Consult_chateau_formulaire0fe7":{"id":"Consult_chateau_formulaire0fe7","dept":"61","canton":"L","commune":"St-Sulpice sur Risle","nom":"St_Sulpice_Risle","type":"Château","periode":"XVI-XVIII","histoire":"Deux châteaux à St Sulpice, Fontenil et Souchey                             FONTENIL  date du XVIe siècle. C'est un château de style Renaissance, construit en 1544 par la Famille Du Buc, alias Du Buc-Richard, sur les fondations d'un château féodal qui a appartenu au baron de Semblançay, ministre des Finances de François Ier. Les constructeurs de cette bâtisse imposante (Jehan ou Jean- du Buc du Fontenil et son épouse Antoinette de Bouquetot) reposent, dans leur caveau seigneurial du beffroi de l'église de Saint-Symphorien-des-Bruyères. En 1681, les Du Buc, dont une branche s'était installée à la Martinique, vendirent le château à la famille d'Érard de Rai. Le château du Fontenil est inscrit aux M.H.depuis 1989 ainsi que sa chapelle et son pressoir. Site de la météorite de L'Aigle en 1803.\r\nÉléments protégés MH : les façades et les toitures des parties anciennes du château ; les deux tours et l'aile les reliant ; l'escalier droit intérieur ; la chapelle ; le pressoir : inscription par arrêté du 21 novembre 1989.","architecture":"FONTENIL,  la partie la plus ancienne du domaine est actuellement la chapelle qui paraît remonter au XVe siècle. Une partie du château aurait été construite en 1544. En 1875, reconstruction de toute l'aile nord dans le style des villas deauvillaises. La partie ancienne comprend une aile flanquée d'une grosse tour cylindrique et d'une tour d'escalier polygonale. L'appareillage en briques roses incrusté de motifs losangés en briques noires, avec parements de pierres calcaires autour des baies est caractéristique des constructions de cette époque en Normandie. Le pressoir, de la fin du XVIIe siècle ou du début du XVIIIe siècle, est une dépendance du château de Fontenil principalement visé, avec sa chapelle, par la mesure de protection, le pressoir est édifié en moellons de silex et abrite le tour à pommes en silex enduit.                                                   SOUCHEY, manoir sauvé de la ruine par M. J. Suet en 1939, après des années d'abandon, le manoir de Souche  du XVIe-XVIIe siècles est un brillant exemple d'architecture Louis XIII, avec son décor de briques rouges à croisillons bleus et son haut toit pentu, caractéristique des demeures aristocratiques du XVIIe siècle. Agrémenté d'un jardin à la\r\nfrançaise, le manoir appartient toujours à la famille Deramoudt-Suet.","habitants":"Fontenil;  Famille D'Érard de Rai                                               Souchey; Famille Deramoudt-Suet.                         \r\n        \"","divers":"Deux château à st Sulpice , Fontenil grav 1-2-3-4 et Souchey grav_5. GPS : 48° 46' 53\" Nord, 0° 39' 27\" Est","gps":"48° 46' 53\" Nord, 0° 39' 27\" Est","images":["../image/image_61/61_St_Sulpice_Risle_1.jpg","../image/image_61/61_St_Sulpice_Risle_2.jpg","../image/image_61/61_St_Sulpice_Risle_3.jpg","../image/image_61/61_St_Sulpice_Risle_4.jpg","../image/image_61/61_St_Sulpice_Risle_5.jpg","../image/image_61/61_St_Sulpice_Risle_6.jpg"]},"Consult_chateau_formulaire392c":{"id":"Consult_chateau_formulaire392c","dept":"61","canton":"Athis-de-l","commune":"Ste Croix sur Orne","nom":"Ste_Croix_Orne","type":"Manoir","periode":"XV-XVII","histoire":"STE CROIX, l e manoir de la Cour est situé sur le territoire de l'ancienne commune de Sainte-Croix-sur-Orne, devenue le 1er janvier 2016 une commune déléguée au sein de la commune nouvelle de Putanges-le-Lac. Il est situé au lieu-dit la Cour de Sainte-Croix, à proximité de l'église.","architecture":"STE-CROIX,  l'édifice dans sa forme actuelle est daté de la deuxième moitié du XVe siècle et du XVIIe siècle.  Les bâtisseurs de l'édifice sont la famille Osmont de Bray, et le bien passe dans les possessions de deux familles seigneurs de Putanges.  Le manoir est agrandi vers 1660-1690. Au début du XIXe siècle, la propriété est scindée en deux et des modifications ont eu lieu dans le même siècle. L'édifice est inscrit au titre des monuments historiques le 28 décembre 2011 en particulier les éléments suivants : les façades et toitures du logis, les cheminées et les deux pièces à feu du rez-de-chaussée, la grange, le système hydraulique.","habitants":"Famille Osmont de Bray,\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Ste_Croix_Orne\r\n48° 46' 44\" Nord, 0° 17' 31\" Ouest","gps":"","images":["../image/image_61/61_Ste_Croix_Orne_1.jpg"]},"Consult_chateau_formulaire2a9d":{"id":"Consult_chateau_formulaire2a9d","dept":"61","canton":"RaI","commune":"Sainte Gauburge","nom":"Ste_Gauburge","type":"Château","periode":"XVI-XIX","histoire":"Trois châteaux à ste Gauburge, dont st Gauburge ; Buissière,  et  Malaise à st Hilaire sur Erre.                                                                                                                                                                                                         MALAISE à St-HILAIRE sur ERRE, la construction date du XVIe et XIXe siècle. Le logis se compose de 2 corps de bâtiments : un bâtiment rectangulaire du XVIe siècle sur lequel fait saillie, à l'angle Sud-Ouest, une tour de défense circulaire, et auquel est accolé à l'ouest un gros pavillon carré du XVIe siècle. Au Nord, cet ensemble a été prolongé par un bâtiment plus récent. Le pavillon carré renferme l'escalier en vis. A l'intérieur, l'escalier débouche sur des portes chanfreinées qui ont conservé leurs panneaux à plis serviettes. Cinq bâtiments de communs datant du XIXe siècle, complètent l'ensemble et sont caractéristiques de l'architecture rurale percheronne. Il est inscrit aux M.H. le 12/12/1990.                                                                     BUISSIERE,  manoir transformé en logis de France par Antoine le Breton  au nord ouest.","architecture":"Ste GAUBURGE,  ce  manoir et ancien prieuré à Saint-Cyr-la-Rosière est un petit hameau situé au Sud-Est du village à (1,2 km). Il accueille dès l'an mil un prieuré fondé par les seigneurs de Bellême avant d'être confié au XIIe siècle à l'abbaye royale de Saint Denis. Sainte-Gauburge passe en châtellenie ce qui procure au prieur des droits des seaux, marques et mesures.\r\nAu XIIIe, six religieux vivaient au prieuré, d'importants travaux sont engagés. Plutôt bien préservé, le site fut néanmoins encore remanié à plusieurs reprises entre le XVe et XIXe siècle. L'ancien logis des moines qui s'appuie sur le mur Nord du chur comprenait la chapelle du prieur, la sacristie, la salle capitulaire et le scriptorium. Le cloitre disparu occupait l'actuelle cour. Ce logis fut remanié au XVIe par l'ajout de la tour d'escalier octogonale et de sa tourelle a encorbellement. Cette tour est percée de fentes de tir horizontales et de bouches à feu. Sous le toit conique, la corniche en quart de rond porte une sentence latine : « No est mortable quod opto » (nest pas mortel qui vit) est une date, 1592.  Le logement du prieur (a gauche), offrait des ouvertures ouvragées (moulures, meneaux, linteau sculpté avec blason), mais conserve (magnifiques cheminées, escalier orné de sculptures, salles voûtées). Les biens du prieuré sont vendus comme biens nationaux le 9 juin 1791, les bâtiments  seront remaniés pour sadapter aux nouvelles conditions agricoles.\r\nEn 1972, le musée des Arts et Traditions Populaires du Perche est créé dans léglise, par lassociation des Amis du Perche.\r\nAujourd'hui le site accueille l'écomusée du Perche et le tout se  visite.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Quatre châteaux à ste Gauburge, dont st Gauburge ; Buissière  grav -1-2 et  Malaise Grav 3-4-5.   Malaise  GPS : 48° 19' 58\" Nord, 0° 44' 35\" Est","gps":"48° 19' 58\" Nord, 0° 44' 35\" Est","images":["../image/image_61/61_Ste_Gauburge_1.jpg","../image/image_61/61_Ste_Gauburge_2.jpg","../image/image_61/61_Ste_Gauburge_3.jpg","../image/image_61/61_Ste_Gauburge_4.jpg","../image/image_61/61_Ste_Gauburge_5.jpg"]},"Consult_chateau_formulaire6102":{"id":"Consult_chateau_formulaire6102","dept":"61","canton":"Athis-de-l","commune":"Sainte-Honorine-la-Chardonne","nom":"Ste_Honorine_Chardonne","type":"Château","periode":"XVI","histoire":"Deux châteaux à Ste-Honorine la Chardonne; Poupelière et ST-Sauveur.                                                                                                                  POUPELIERE,  le vieux logis des Payen était tourné vers Condé sur Noireau au XVIe siècle. La chapelle avait à peu près la même orientation et le même emplacement que celle qui a été rebâtie depuis. Les appartements habités par les seigneurs et ceux qui servaient de communs lencadraient de droite et de gauche. Le château actuel est composé de deux parties distinctes. Après son mariage le 19 novembre 1760 avec Marie-Elisabeth-Françoise Auvray de la Poupelière, Guy-François de Gonidec de Penlan, écuyer, seigneur de Vieux-chatel et de Gouasselglan, édifia la première partie. André Velay, pour loger sa nombreuse famille, fit construire la seconde . Le hall et les agrandissements ont été conçus par M. Nénot, architecte. Selon la légende, cest la cloche que Guillaume Payen fit sonner vers 1560 à la chapelle du château de la Poupelière, pour le premier prêche de Germain Berthelot. Labbé Macé, évoquait lattachement des Le Godinec à cette cloche quils emportèrent à Caen pour la sauver de la révolution. Le hasard, ou le destin voulu que la famille Velay la retrouve dans une brocante dans la région de Caen. Elle est actuellement au Rocher dEpinouze, à Athis. Le dernier propriétaire du château était John Palmer, anglais richissime et escroc, qui crée après son achat, un golf de 18 trous avec logements sur place. Létablissement est ouvert quelques années puis ferme. Il est ensuite laissé à labandon, pillé, saccagé et se trouve maintenant dans un triste état.","architecture":"ST-SAUVEUR,  l'édifice fut construit par Jacob de Grésille dont la mère, Madeleine de Mesnage, était la fille de l'ambassadeur de France auprès de Charles Quint. En considération de ses services, Jacob de Grésille obtint l'autorisation de porter le nom de Saint-Sauveur et ses terres furent érigées en plein fief de Haubert avec le titre de baronnie. L'édifice est au centre d'un plan d'eau et se prolonge par de larges terrasses qui s'avancent dans les douves garnies de balustrades. Ces douves sont franchies par deux ponts avec balustrades. Le château comprend une aile flanquée à l'est et à l'ouest de deux pavillons saillants. A l'intérieur, quelques boiseries subsistent dans les chambres du premier étage. propriété de la famille d'Emmanuel  Foucault.\r\nÉléments protégés MH : les façades et les toitures ; la terrasse et les deux ponts sur les douves avec leurs balustres : classement par arrêté du 29 décembre 1978. Le décor peint du grand salon du logis ; l'assiette du jardin avec les éléments bâtis (bassin, murs, portail) l'avant-cour; les douves en eau avec les éléments du système hydraulique) : inscription par arrêté du 11 septembre 2009.","habitants":"Poupelière ; famille Velay                                                                  St-Sauveur ; Famille d'Emmanuel  Foucault.\r\n        \"","divers":"Deux châteaux à ste Honorine la Chardonne; Poupelière grav-1-2-3-4 et ST-Sauveur grav 5-6                                                       gps 48° 49' 58\" N, 0° 27' 37\" Ouest","gps":"","images":["../image/image_61/61_Ste_Honorine_Chardonne_1.jpg","../image/image_61/61_Ste_Honorine_Chardonne_2.jpg","../image/image_61/61_Ste_Honorine_Chardonne_3.jpg","../image/image_61/61_Ste_Honorine_Chardonne_4.jpg","../image/image_61/61_Ste_Honorine_Chardonne_5.jpg","../image/image_61/61_Ste_Honorine_Chardonne_6.jpg"]},"Consult_chateau_formulaire83ae":{"id":"Consult_chateau_formulaire83ae","dept":"61","canton":"Magny-le-Désert","commune":"Sainte-Marie la Robert","nom":"Ste_Marie_Robert","type":"Château","periode":"XV-XVII","histoire":"STE-MARIE LA ROBERT de 1178-1190 : le comte Robert d'Argences occupe le siège prestigieux d'abbé de l'abbaye royale de Jumièges (il est connu sous le nom de Robert IV). En 1463 : Montfaut, après enquête établie à la demande de Louis XI, reconnait la « noblesse du seigneur de Sainte-Marie-la-Robert » de la famille d'Argences de Saint-Germain selon le blason indiqué, au XVIe siècle passe par alliance  à la famille Le Chevalier, 1664 : Claude le Chevalier est noté \"seigneur de Sainte-Marie-la-Robert\". Puis vendu en 1695 à Henri-François de la Broise. En 1674 , Philippe de la Broise est dit \"sieur de Sainte-Marie-la-Robert\". En  1753 Ste-Marie est transmit par alliance aux d'Orglandes.   En 1789 , en préparation des États généraux convoqués par le roi Louis XVI au château de Versailles, Huet de la Bissonnerie  de Sainte-Marie-la-Robert, dans le bailliage de Falaise  est élu député du tiers état pour l'assemblée des trois ordres de la province de Normandie, le 16 mars à Rouen. En 1802 aux le Veneur de Carrouges qui le transforme en ferme. En 1903 appartient, aux Bisson en 1909 de nouveau vendu à l'état de ruine et en 1970 à M. Marc Chalufour qui entreprend la restauration  avec des bénévoles et le possède toujours , inscrit au M.H.en 1926.","architecture":"STE- MARIE LA ROBERT; de vastes dimmensions sur un plan en Y, à deux niveaux, toits à deux pans en tuiles, le corps principal présente en façade deux tourelles polygonales toits en poivrière, abritant chacune un escalier en vis. Sur l'arrière, une aile en avancée est flanquée dans l'angle qu'elle forme avec le corps de logis, d'une tourelle en encorbellement sur trompes dans laquelle se trouvait un oratoire. Des meurtrières pour le contrôle de la porte d'entrée et la cage d'escalier et d'autres meurtrières en façades.","habitants":"Famille d'Argences de Saint-Germain\r\n        \"","divers":"Ste_Marie_la_Robert                                                                           48° 37' 24\" nord, 0° 09' 24\" ouest","gps":"","images":["../image/image_61/61_Ste_Marie_Robert_1.jpg","../image/image_61/61_Ste_Marie_Robert_2.jpg","../image/image_61/61_Ste_Marie_Robert_3.jpg","../image/image_61/61_Ste_Marie_Robert_4.jpg"]},"Consult_chateau_formulaire8018":{"id":"Consult_chateau_formulaire8018","dept":"61","canton":"Ceton","commune":"Sérigny, devenu Belforêt-en-Perche","nom":"Tertre_61","type":"Château","periode":"XVI","histoire":"TERTRE, cest  vers 1630 que François Bry de la Clergerie, avocat au parlement de Paris,  sans doute simple rendez-vous de chasse, le bâtiment de style Louis XIII, en briques et chaînages de pierre, est flanqué de deux pavillons, côté cour, et de deux tourelles en poivrière, côté jardin. Des communs viennent compléter lensemble en 1678. Vers le sud-ouest, une grande terrasse aménagée en parterres domine le vaste domaine agricole. A la fin du XVIIIe siècle, le comte Abrial, ministre de la justice de Napoléon 1er, entre en possession du domaine. En 1924, lécrivain Roger Martin du Gard l'achète  à ses beaux-parents. Il y effectue, en 1925 les travaux sont longuement médités et réalisés avec une grande passion pour créer un cadre propre à linspiration du grand écrivain qui y réalise une importante partie de son uvre. Il y décède en 1958 laissant le domaine à sa fille Christiane. Le 26 décembre 1999, la dernière grande tempête du siècle sabat sur le domaine. Elle couche, dans un invraisemblable chaos, près de 300 arbres dont les thuyas plantés par Roger Martin du Gard.","architecture":"TERTRE; deux pavillons encadrent la grille de la cour dhonneur où souvre, le portail entre deux piliers de pierres. En face, lancienne allée dhonneur est encadrée de vieux tilleuls centenaires. La cour dhonneur précède, à sa gauche, la cour des communs avec sa charmante maison de gardien et le long bâtiment de la Grande Castille qui la ferme. En bas, à langle du mur denceinte, \"la Tourelle\" est encadrée des énormes futs de deux hêtres vénérables. Le parc boisé sétend vers le sud du parc. En longeant le mur denceinte, une halte près de la balustrade du saut du loup permet de contempler les champs cultivés qui ondulent jusquaux hauteurs de Bellême, couronnées de la silhouette de sa vieille église. En face, souvre la grande transversale, large allée bordée dérables et de tilleuls qui filtrent une douce lumière et laisse les rayons du soleil caresser la statue de Diane, installée en son centre, près dun énorme chêne. Des allées rayonnantes séchappent du rond-point de Diane pour relier toutes les parties du parc. Parallèle à la Grande Transversale, lallée du Bréviaire est plantée de jeunes hêtres remplaçants les vieux tilleuls en candélabre, abattus par la tempête. Plus bas, au-delà dun grand pré encore ponctué de quelques thuyas de lécrivain et de pommiers, se trouve la fontaine dEspagne qui sécoule dans un petit étang enfoui sous les arbres. Cest un lieu romantique et secret, baigné de la douce pénombre des pins sylvestres qui entourent le plan deau. Près dun vieux saule pleureur qui se penche vers la surface, un banc incite le promeneur solitaire à une rêverie empreinte de quiétude dans le silence du bois.","habitants":"François Bry de la Clergerie \r\n        \r\n        \"","divers":"TERTRE, GPS : 48° 23' 17,52\" Nord, 0° 34' 45,48\" Est","gps":"48° 23' 17,52\" Nord, 0° 34' 45,48\" Est","images":["../image/image_61/61_Tertre_61_1.jpg","../image/image_61/61_Tertre_61_2.jpg","../image/image_61/61_Tertre_61_3.jpg"]},"Consult_chateau_formulaire3186":{"id":"Consult_chateau_formulaire3186","dept":"61","canton":"Vimoutiers","commune":"Ticheville","nom":"Ticheville","type":"Manoir","periode":"XVII-XVII","histoire":"Deux châteaux dans cet article Folval et Mezeray. A cinq K.M. au sud ouest à Roiville  château du Mesnil.                                                                                FOLVAL  Un pavillon du XVIIe siècle, un colombier, subsiste d'un manoir antérieur au château  qui fut construit au tournant du XVIIIe et du XIXe siècle ; Victor Le Carpentier, demeurant à Saint-Clair d'Arcey en est propriétaire en 1827, date du cadastre ; logement, écurie d'attelage et écurie de percherons, resserres, remises et sellerie construits au cours du XIXe siècle. Château en brique et pierre, couvert en ardoise ; le pavillon en pan de bois hourdi en tuile, couvert en tuile plate; les dépendances en brique ; la remise en bois.                                                                                                                     MESNIL-ROIVILLE,  Christophe Gouthier 1452-1504 acquiert le fief de Roiville de Pierre Rouxel de Médavy  son épouse  Isabelle Rouxel  leurs descendants, Guillaume, Charles,  François en 1625  puis Jacques le conserveront jusqu'en 1698, puis les Gouhier.","architecture":"MEZERAY, château construit dans la première moitié du XVIIIe siècle, en 1714. Charles Berthelot, propriétaire du château, est anobli en 1788 sous le nom de Berthelot des Mézeray, branche cadette des Berthelot des Thuilleries. Travaux effectués vers 1803: les corps de bâtiment latéraux peuvent dater de cette époque. Importantes restaurations, notamment à l'élévation ouest où la lucarne centrale refaite porte cette date de 1876. Une restauration récente a été réalisée à l'élévation Est. Logis en brique et pierre et dépendances en brique.                                                                      MESNIL-ROIVILLE; du 4e quart XVIe siècle, demeure qui rompt définitivement avec la tradition du manoir médiéval, bâti sur plan quadrangulaire à étage avec tourelle d'escalier. Le parti adopté, corps de logis rectangulaire encadré de deux pavillons d'angle en décrochement, appuyé à l'arrière sur une massive tour carrée, parti de symétrie et de verticalité mis en relief par l'absence de pièces de bois obliques, annonce déjà le classicisme. Les toitures aigües et la sculpture des lucarnes encadrées de pilastres cannelés, appartiennent à la Renaissance. Chaque pièce est prolongée, sur la façade principale, par une petite pièce dans les pavillons.","habitants":"Folval ; Victor Le Carpentier                                                                            Mezeray ; Famille de Charles Berthelot\r\n        \r\n        \"","divers":"Mesnil à Roiville grav 3-4                                                                 \r\n48° 53' 02\" Nord, 0° 13' 20\"  Est\r\nDeux châteaux dans cet article Folval grav 1 et Mezeray grav-2.","gps":"","images":["../image/image_61/61_Ticheville_1.jpg","../image/image_61/61_Ticheville_2.jpg","../image/image_61/61_Ticheville_3.jpg","../image/image_61/61_Ticheville_4.jpg"]},"Consult_chateau_formulairebe46":{"id":"Consult_chateau_formulairebe46","dept":"61","canton":"Bagnoles-de-l","commune":"Torchamp","nom":"Torchamp","type":"Château","periode":"XVIII","histoire":"TORCHAMP, ensemble de bâtiments du XVIIIe siècle, ordonnés autour de la cour d'honneur. Le château est situé au sud, entre cour et jardin. La basse cour à l'ouest, a conservé ses bâtiments, on note la présence d'un jardin à la française en terrasse, d'une orangerie et d'un potager.   Propriété de madame Delaplace et de madame Poinsot.","architecture":"TORCHAMP, le château de Torchamp est un château bâti à Rémalard-en-Perche, a conservé son décor et sa distribution intérieure. Symétriquement disposées de part et d'autre de la cour, se trouvent la chapelle et les écuries. La basse-cour, à l'Ouest, a conservé tous ses bâtiments. On note la présence d'un jardin à la Française en terrasse, d'une orangerie et d'un potager. Les façades et toitures sont inscrits aux M.H. depuis le 3/05/1974. Le vestibule d'entrée, le salon, la salle à manger, la chambre nord et le boudoir, avec leurs décors, les façades et toitures de la chapelle, des écuries, du petit pavillon et de l'orangerie, la cour d'honneur, les douves avec le pont, le portail, le colombier de la ferme, en totalité, l'allée d'accès, y compris l'allée latérale Nord-Ouest, le potager avec ses murs de clôture, le jardin d'agrément avec ses murs sont inscrits depuis le 15/10/2002 .","habitants":"madame Poinsot\r\n        \"","divers":"Torchamp   GPS : 48° 25' 44\" Nord, 0° 46' 20\" Est","gps":"48° 25' 44\" Nord, 0° 46' 20\" Est","images":["../image/image_61/61_Torchamp_1.jpg"]},"Consult_chateau_formulaireabff":{"id":"Consult_chateau_formulaireabff","dept":"61","canton":"Athis-de-l","commune":"Les Tourailles","nom":"Tourailles","type":"Château","periode":"XV-XVI","histoire":"TOURAILLES, le premier logis est édifié au XIIe siècle par Guillaume des Tourailles, seigneur du lieu. Le fief entre dans la famille Turgot, par mariage, en 1445. Le château est reconstruit à différentes époques sur le même emplacement et subit de nombreuses transformations jusquau XVIe siècle. Un aveu de 1734 nous apprend que \"les maisons dudit manoir consistent en salles, un gros pavillon, deux autres pavillons faisant les deux carrés de la cour, dans lun desquels il y a une chapelle. Deux jets deau dune belle hauteur existent dans la cour dudit manoir, close tout autour de murs et de douves. Sur lesquelles douves il y a trois pont-levis, lun du côté de lavenue, qui est le grand pont pour sortir le carrosse. Lautre du côté de la prairie ; le troisième pour lentrée du jardin et fruitier du manoir, partagé de plusieurs allées, un grand berceau et des salles vertes au bout diceluy, qui servait de promenades et à côté il y a aussi une maison qui sert ordinairement dorangerie, et le tout entouré de douves et fossés. Il y a dans le parc une grande maison servant de manège à dresser les chevaux. En mars 1943, le château et son parc sont inscrits parmi les sites dont la conservation présente un intérêt général. Le rapport dinspection établi pour cette protection nous décrit lendroit un vaste parc planté de sapins, de marronniers et dormes atteignent de grandes hauteurs, des ponts sur les douves, un grand bassin semi circulaire dans laxe du bâtiment principal, concourent à la beauté de lensemble.","architecture":"LES TOURAILLES,  sélève sur le plateau qui sincline vers le vallon du bourg. Il domine les coteaux boisés de Sainte-Honorine, de Crasménil, et la Rouvre, rivière tortueuse, semée dîlots où tournaient autrefois les moulins. Peu après léglise et le cimetière, Au centre de la prairie bordée de lisses, lélégante construction se dresse. Le logis principal, de grès aux chaînages de granit, présente une façade XIXe siècle. La composition, très symétrique, sorganise de part et dautre dun pavillon-tour central où un escalier en fer à cheval conduit vers lentrée. Létage noble, sur entresol, est surmonté de combles à la Mansart couverts dardoises et animés de hautes lucarnes. Deux pavillons carrés identiques encadrent le château. Bâtis en granit, ils sont accolés de tours rondes et coiffés de hautes toitures en ardoises. Ils marquent les angles de la cour dhonneur bordée de douves. A louest, des bornes en granit et des chênes précèdent la longue allée dentrée sablée, longée de bandes engazonnées et de lisses. Elle conduit à un petit pont sur les douves, clos dun très beau portail de ferronnerie. Le vaste parc de 1943, planté de sapins, dormes, de marronniers nexiste plus. Aujourdhui la vue est dégagée et permet dadmirer le bel ordonnancement des bâtiments. La façade nord du logis présente des éléments darchitecture plus anciens. Les vieux communs, couverts de tuiles, sont reliés au château par une galerie. Lancien manège, clos de murs, sélève toujours parmi les vieux fruitiers. Seule la partie Est conserve quelques plantations de lancien parc dagrément. Sapins, chênes et hêtres dissimulent le château aux regards depuis la route en contrebas. Les fossés-douves de lancienne forteresse y sont enfouis sous la végétation qui y pousse librement.","habitants":"Famille Turgot\r\n        \"","divers":"Tourailles gps 48° 45' 21\" nord, 0° 24' 04\" ouest","gps":"","images":["../image/image_61/61_Tourailles_1.jpg","../image/image_61/61_Tourailles_2.jpg","../image/image_61/61_Tourailles_3.jpg","../image/image_61/61_Tourailles_4.jpg"]},"Consult_chateau_formulaire50fc":{"id":"Consult_chateau_formulaire50fc","dept":"61","canton":"Damigny","commune":"Valframbert","nom":"Valframbert","type":"Château","periode":"XIx","histoire":"Quatre châteaux à Valframbert  dont Aché, Bois-Beulant, Requettes et les Loges à Hauterive.                                                                           ACHE, a été construit à l'emplacement de l'ancien manoir, par Coypel de 1862 à 1865 dans le style néo Louis XIII. Adjonction par Mezen d'une aile dans le même style en 1902. Il s'agit d'une construction monumentale en briques et pierres qui a conservé quelques éléments de décor intérieur, le parc conserve un important potager du début du XIXe siècle avec son orangerie.\r\n La construction du château d'Aché date du 3ème quart du XIXe siècle et du 1er quart XXe siècle.  \r\nÉléments protégés MH : les façades et les toitures du château ; le vestibule et son escalier ; la salle à manger et son décor ; le salon et son décor : inscription par arrêté du 9 décembre 1994.","architecture":"BOIS-BEULANT  Haras manoir transformé en gîtes de France par Claudia et Massimo  Siri.                                                                                                                          A cinq K.M. à l'est à Hauterive le château   DES LOGES,  caractéristique des édifices du début du XVIIe siècle, a subi des transformations au XVIIIe siècle. Le logis comprend deux corps de bâtiments en équerre, reliés par une tour d'escalier. L'avant-cour et la cour d'honneur sont occupées par des dépendances. Une tour ronde d'angle avec meurtrières a été transformée en colombier au XVIIIe siècle.\r\nÉléments protégés MH : l'allée d'accès, le château, les façades et les toitures des dépendances de la cour d'honneur et de l'avant-cour, le colombier, le jardin, l'ensemble des douves, l'assiette de la cour d'honneur avec ses murs de clôture et ses piliers : inscription par arrêté du 12 juillet 1995.                                                                                                                     REQUETES , le château des Requêtes est un château bâti à Valframbert,  Le château des Requêtes vous propose ses chambres d'hôtes, dans un cadre agréable.","habitants":"Seigneurs locaux\r\n        \"","divers":"Quatre châteaux à Valframbert  dont Aché grav-1, Bois-Beulant grav -2, Requettes  grav 5 et les Loges à Hauterive grav 3-4.    GPS : 48° 27' 50\" Nord, 0° 06' 29\" Est","gps":"48° 27' 50\" Nord, 0° 06' 29\" Est","images":["../image/image_61/61_Valframbert_1.jpg","../image/image_61/61_Valframbert_2.jpg","../image/image_61/61_Valframbert_3.jpg","../image/image_61/61_Valframbert_4.jpg","../image/image_61/61_Valframbert_5.jpg"]},"Consult_chateau_formulaire039c":{"id":"Consult_chateau_formulaire039c","dept":"61","canton":"Magny-le-Désert","commune":"Saint-Ouen-le-Brisoult","nom":"Vaugeois","type":"Manoir","periode":"XV-XVI","histoire":"VAUGEOIS, siège d'une seigneurie dont les premières traces remontent au tout début du XVe siècle, Vaugeois a été transmis par successions depuis cette époque et n'a connu sa première cession qu'après 1864. Vers 1400 Vaugeois appartient à dame de Prez (Desprez ou Després) qui le transmet à son fils Guillaume, époux de Raoulette Boutrou. Jean de Prez fils de Guillaume hérite Vaugeois le 18 novembre 1488. Son fils Jean II épouse Jeanne de La Chapelle le 27 février 1507 et devient propriétaire de Vaugeois qui échoit ensuite à sa fille Jeanne, épouse de Jean de Mondot. Leur fils Joachim épouse Nicole du Bailleul. Il meurt en 1593 et Vaugeois passe à sa fille Françoise de Mondot, lors de son mariage le 3 octobre 1585 avec Michel de Montreuil.","architecture":"VAUGEOIS,  la construction du château est antérieure à 1510. D'importants pavillons encadrant la cour d'honneur ont ensuite été édifiés, à la fin du XVIe siècle, et des travaux de rénovation significatifs sont intervenus au début du XVIIIe siècle, en utilisant notamment la carrière d'ardoises de la propriété. Les murs d'enceinte ont été abattus à cette époque. Au moment de la Révolution, le château s'étendait sur deux cours parallèles: la cour d'honneur était dominée par le logis proprement dit. Deux bâtiments l'encadraient, chacun terminé par un pavillon Henri IV, dont l'un faisait la séparation d'avec la basse-cour. Le bâtiment sud comprenait une chapelle et le bâtiment nord, en communication avec la basse-cour, des écuries et des étables. La basse-cour était bordée au nord d'un immense bâtiment à usage de grange dîmière, parallèle à celui formant séparation avec la cour d'honneur. La maison du fermier (détruite au XXe siècle), le puits à capuchon et des auges de pierre occupaient la cour. Au XIXe siècle, le logis a été détruit puis reconstruit en plusieurs étapes, la dernière intervenant peu avant 1900 avec la construction  d'une tour de briques et pierres volumineuse dans le goût du temps.","habitants":"Famille de Prez\r\n        \"","divers":"Vaugeois  48° 29' 17\" nord, 0° 21' 14\" ouest","gps":"","images":["../image/image_61/61_Vaugeois_1.jpg"]},"Consult_chateau_formulaire1aff-2":{"id":"Consult_chateau_formulaire1aff-2","dept":"61","canton":"Mortagne-au-Perche","commune":"Pervenchères","nom":"Vauvineux","type":"Château","periode":"XV-XVI-XIX","histoire":"Deux châteaux dans cet article ; Vauvineux et Montgoubert. VAUVINEUX;  le manoir est construit en 1478 par Lorin de Cissé, sur la base des ruines du château-fort des Carrel. Il devient au XVIIe siècle la propriété des de Rohan. Il est par la suite transformé en ferme et la chapelle, datant du XVIe siècle. Le manoir possédait un troisième étage, lequel a été arasé au XIXe siècle la construction du manoir de grand- Vauvineux date du XVe siècle, construit à la fin de la Guerre de Cent Ans, sur les ruines d'un ancien château fort dont il ne subsiste qu'une partie des fossés. Il est doté d'une chapelle du XVIe siècle.  Le site de Vauvineux était l'un des éléments de défense de la frontière Mortagne-Bellêmoise, élevés sur des mottes artificielles ou campés sur les côtes. Il fut occupé par la place forte des Carrel de Pervenchères, puis par le donjon de la guerre de cent-ans et, par le manoir à la Française rebâti après les hostilités. Le comté de Vauvineux comportait en 1781 en termes de droits seigneuriaux résiduels : Il est expressément mentionné sur l'acte de vente que le seigneur Louis Philippe Pottin (vendeur) pourra conserver et porter sa vie durant le titre de comte de Vauvineux. C'est pourquoi le seigneur Antoine de Gaston de Pollier (acheteur) ne portera pas le titre de comte de Vauvineux, mais seulement son fils Jean Albert, le comte Philippe Pottin (1739-1832) étant mort depuis longtemps.\r\nNéanmoins, la famille Pottin continua à porter le titre de comte de Vauvineux illégitimement occasionnant un litige avec les Gaston de Pollier.","architecture":"VAUVINEUX; Les vestiges de l'ancien manoir de Vauvineux comprenaient 2 étages de construction et une haute tour de forme octogonale. En 1900, l'ensemble fut dénaturé. Il ne reste plus qu'une partie de la façade avec une tour à pans et les manteaux de cheminées, au niveau des étages démolis. Le pignon Nord a conservé les traces d'une aile disparue. A l'intérieur, les cloisons sont à pans de bois garnis de torchis. L'une des pièces conserve une cheminée ornée d'un ange portant 3 fleurs de lys sur la poitrine. Le manoir de Vauvineux domine un immense paysage. Devenu une ferme au XVIIIe siècle, il est en restauration depuis 1992. Contigüe au manoir de Vauvineux et érigée au XVIe siècle sur les ruines d'une chapelle plus ancienne, la chapelle de Vauvineux était devenue une grange et menaçait de tomber en ruine. Sa restauration est en cours et elle vient de recevoir son premier vitrail.  Le manoir de Vauvineux est inscrit aux M.H. le 24/05/1978.                                                                                                             A 10 K.M. au nord à St Julien sur Sarthe , château de   MONTGOUBERT  Aujourdhui, de lantique château médiéval, il ne subsiste plus rien, car tout fut détruit durant la Révolution française et réaménagé au XIXe siècle. Le château de Montgoubert est une construction classique, avec fronton et lucarnes engagées dans le toit à la Mansart. Habité dès le XVe siècle par la famille de Marconville, cette demeure, remaniée au XIXe siècle, appartient par héritage aux barons Le Guay depuis un siècle.","habitants":"Famille des Carrel de Pervenchères                                               famille Pottin                                                                                        Montgoubert; famille de Marconville,\r\n        \"","divers":"Deux châteaux dans cet article ; Vauvineux grav-1 et Montgoubert  grav 2-3.             GPS : 48° 26' 18\" Nord, 0° 25' 32\" Est","gps":"48° 26' 18\" Nord, 0° 25' 32\" Est","images":["../image/image_61/61_Vauvineux_1.jpg","../image/image_61/61_Vauvineux_2.jpg","../image/image_61/61_Vauvineux_3.jpg"]},"Consult_chateau_formulaire88d1":{"id":"Consult_chateau_formulaire88d1","dept":"61","canton":"Tourouvre","commune":"La Ventrouze","nom":"Ventrouze","type":"Château","periode":"XVI","histoire":"La VENTROUZE, la construction du château date du XVIe siècle\r\nÉléments protégés MH : les façades et les toitures de la maison seigneuriale et des communs avec les deux tours d'entrée ; les quatre cheminées dont deux au rez-de-chaussée et deux à l'étage ; les douves et la partie comblée : inscription par arrêté du 5 décembre 1979.","architecture":"La VENTROUZE, ancien château féodal ne subsiste  plus que des vestiges, l'ensemble des bâtiments étant entouré de larges douves. Deux tours rondes défendent l'accès du pont levis qui a disparu, remplacé par un pont en pierre. Ces tours se prolongent par deux petits bâtiments de dépendance. Le logis principal est actuellement scindé en trois parties. La partie centrale a conservé son volume d'origine. Les bâtiments attenants ont été abaissés et tronqués. Ce sont des constructions en brique avec des entourages de fenêtre en calcaire. Le rez-de-chaussée est en brique rose ; l'étage est en briques ocres et brunes s'imbriquant en losange dans les briques roses, de façon à former une sorte de damier. Le château de la Ventrouze est inscrit aux M.H. depuis le 5/12/1979.","habitants":"Seigneir local\r\n        \"","divers":"Ventrouze  48° 36' 39\" nord, 0° 41' 54\" est","gps":"","images":["../image/image_61/61_Ventrouze_1.jpg","../image/image_61/61_Ventrouze_2.jpg","../image/image_61/61_Ventrouze_3.jpg"]},"Consult_chateau_formulaire5980":{"id":"Consult_chateau_formulaire5980","dept":"61","canton":"Argentan","commune":"Villebadin","nom":"Villebadin","type":"Château","periode":"XV-XVII-XVIII-XIX","histoire":"Trois châteaux dans cet article, Argentelles, Champaubert et Villebadin.                                                                                                 ARGENTELLES, le manoir d'Argentelles a été construit, en 1410, durant la guerre de Cent Ans, pour Guillot d'Ouilly, Officier du roi de France. En 1418,  va tomber aux mains des officiers anglais. Il ne sera récupéré, qu'en 1449, par Richard d'Escalles, un descendant de Guillot d'Ouilly. En 1571, devint la propriété par alliance de Jean Le Franc. Henri IV y fit un séjour en 1591. En 1635,  appartient à Bonaventure le Franc, un descendant de Jean Le Franc. Celui-ci fit ajouter 2 lucarnes à l'édifice, adoucissant ainsi son caractère défensif. Au milieu du XVIIIe siècle, est acquis par le comte de Flers et restera, jusqu'en 1880, la propriété de ses descendants. Puis il s'ensuivra une longue période d'oubli ou il tombe en ruine. Ce n'est qu'en 1957 qu'il sera sauvé  de la ruine, par le comte Robert du Mesnil du Buisson qui fit entreprendre sa restauration.                                                               CHAMPAUBERT, manoir attesté en 1370, détruit. Ancien logis construit au XVIIe siècle. Les écuries et le pressoir datent du XVIIIe siècle. Le logis actuel a été construit au XIXe siècle, décrit en 1707 : bâtiment avec pavillon, remise, pressoir, étables, bergeries, grange, à côté colombier à pied et chapelle en ruines. La demeure appartenait à la famille de Vieux-Pont de 1582 à 1656, puis elle passa aux Bouillonney par vente en 1656 jusqu'au XIXe siècle, élévation à travées et un étage carré avec escalier dans-oeuvre. Couverture  : toit à longs pans ; croupe ; pignon couvert ; toit en pavillon: ardoise ; tuile plate, château construit en 1851 par Victor Charles vicomté du Mesnil du buisson ; chapelle construite en 1898 ; communs construits en 1902.","architecture":"ARGENTELLES,  la construction du manoir date des XVe siècle. Composé d'un corps de bâtiment rectangulaire cantonné de quatres tourelles, Le manoir est  plantée sur une motte entourée de fossés, il constituait, autrefois, un poste avancé de défense du château fort et de la ville d'Exmes. Les seuls ajouts postérieurs à l'édification sont les 2 grandes lucarnes du XVIIe siècle. L'ensemble de l'édifice, construit en pierre, présente un fort caractère défensif. En effet, les quatre tours d'angle sont percées de meurtrières. Chacune des entrées est défendue par des bretèches à mâchicoulis. Les fenêtres du rez-de-chaussée sont protégées par grilles en fer forgé. Enfin, la tour polygonale, qui abrite un escalier desservant les différents étages se termine par une chambre de guet en colombage. Celle-ci présente la particularité d'être disposée en encorbellement et d'être construite en pan de bois. Dans le parc entourant le manoir, un colombier cylindrique du XVIIe siècle Le manoir d'Argentelles est inscrit aux M.H. depuis le 2/11/1926.                                                                              VILLEBADIN, construit à la fin du règne d'Henri IV, agrémenté d'un groupe important de communs dans la seconde moitié du XVIIIe siècle. De plan en équerre, le bâtiment se compose de deux étages. Au milieu du corps principal, l'entrée est marquée par un jeu de pilastres classiques. La gentilhommière est entourée de larges douves et la plateforme est reliée à l'extérieur par un pont construit sur des arches. la façade principale s'ouvre par un porche surmonté d'un fronton au cintre arrondi. Le colombier a conservé tous ses boulins et son échelle tournante.\r\nÉléments protégés MH : le château ; les façades et les toitures des communs et des écuries ; le colombier : inscription par arrêté du 1er février 1978.","habitants":"Argentelles : famille de Jean Le Franc                   Champaubert :  famille de Vieux-Pont \r\n        \"","divers":"Trois châteaux dans cet article ;Argentelles grav-3-4-5, Champaubert grav-6-7 et Villebadin grav 1-2.                                                      GPS : 48° 46' 31\" Nord, 0° 09' 52\" Est","gps":"48° 46' 31\" Nord, 0° 09' 52\" Est","images":["../image/image_61/61_Villebadin_1.jpg","../image/image_61/61_Villebadin_2.jpg","../image/image_61/61_Villebadin_3.jpg","../image/image_61/61_Villebadin_4.jpg","../image/image_61/61_Villebadin_5.jpg","../image/image_61/61_Villebadin_6.jpg"]},"Consult_chateau_formulaire3518":{"id":"Consult_chateau_formulaire3518","dept":"61","canton":"Bretoncelles","commune":"Condeau","nom":"Villeray","type":"Château","periode":"XVI-XIX","histoire":"VILLERAY,  sur lemplacement de la forteresse dAssé, Gilles de Riants fait construire, à la fin du XVIe siècle, un château à lappui dune tour ruinée. Fidèle au Roi Henri IV pendant les guerres de Religion, il est récompensé par lérection de ses châtellenies en baronnie. Sous lancien régime, Villeray est un des meilleurs revenus de la province du Perche avec son notariat, son tribunal, ses droits de pêche et de chasse, ses foires et son marché aux toiles. Un petit bourg se blottit près du château et lHuisne fait tourner deux beaux moulins à Villeray, au XVIIIe siècle le château de Villeray passe en héritage à la famille La Porte est épargné pendant la tourmente révolutionnaire. En 1845, le château est modernisé et sa façade sud est transformée en style troubadour, en vogue à lépoque.  en 1856 est acquis par la famille Fauche,  En 1973, il est transformé en hôtellerie de prestige. La municipalité de Condeau demande alors la protection du hameau de Villeray et du parc du château, craignant que cette nouvelle activité ne fasse découvrir et menace ce coin du Perche si pittoresque. Quelques années plus tard, le château est transformé, à son tour, en hôtel et il forme aujourdhui un complexe hôtelier de charme avec lancien moulin.","architecture":"VILLERAY, au XIe siècle, une position stratégique importante face à la forteresse des Rotrou, comtes du Perche, érigée à Rivray de lautre côté de la rivière. Deux châteaux à mottes castrales y sont élevés par les Talvas, seigneurs de Bellême. Au nord, la motte de Villeray en Husson est distante dà peine 300 mètres de celle de Villeray en Assé, au sud. Les sites, fortifiés, sont détruits par les anglais lors de la guerre de cent ans. En rive droite, le parc du château sétire sur les hauteurs avec ses boisements de chênes et de hêtres. La petite rue grimpe en pente raide vers le château, son entrée se situe presque en haut de la pente. La porte cochère, encadrée de deux tours en poivrière, souvre sur la cour des communs du XVIIIe siècle, écuries et remises. Derrière un portail, la cour du château précède la vieille demeure flanquée de deux tours rondes et percée de hautes fenêtres à meneaux. En haut de la pente, les maisons se resserrent, leurs murs de moellons calcaires colorent la rue de douces nuances docres et de roses. La petite rue tourne ensuite vers le sud pour rejoindre le bourg de Condeau. Elle est bordée du haut mur du parc du château, désormais réservé aux hôtes de passage. Un portail dentrée au château sy ouvre accompagné dun élégant pavillon de gardien chaîné de briques rouges. Éléments protégés MH : les façades et les toitures du château, l'escalier avec sa cage : inscription par arrêté du 25 octobre 2002.","habitants":"famille La Porte                                                                            famille Fauche,\r\n        \"","divers":"Villeray GPS : 48° 23' 31\" Nord, 0° 49' 59\" Est","gps":"48° 23' 31\" Nord, 0° 49' 59\" Est","images":["../image/image_61/61_Villeray_1.jpg","../image/image_61/61_Villeray_2.jpg"]},"Consult_chateau_formulaireaaf1":{"id":"Consult_chateau_formulaireaaf1","dept":"61","canton":"Rai","commune":"Villers en Ouche","nom":"Villers_en_Ouche","type":"Château","periode":"XVII","histoire":"VILLERS en OUCHE, terre dépendant de l'abbaye de Saint-Evroult.  Le château de Villiers résulte de deux reconstructions, un par la famille Beaurepaire. Un château est reconstruit au XVIIe siècle par la famille La Chapelle, dont il subsiste le gros-oeuvre, les dépendances, la cour d'honneur, le mur en hémicycle, l'avenue latérale ouest et un grand jardin potager. En 1741 suite à un incendie, le toit en pavillon est remplacé par la toiture actuelle. Passa aux Montchevrel, puis aux Leudeville.  avant d'échoir à ses propriétaire actuels le comte et la comtesse Trudon des Ormes.","architecture":"VILLERS,  éléments protégés MH : les façades et les toitures ; l'escalier avec sa rampe en bois ; les pièces suivantes avec leur décor : grand et petit salons du rez-de-chaussée ; les deux fabriques dites petit Trianon et petite Hollande ; le colombier : inscription par arrêté du 10 avril 1974. L'allée d'accès ; la cour d'honneur, y compris les façades et les toitures des deux communs qui la bordent et le mur les reliant ; les façades et les toitures des deux pavillons de jardin aux extrémités : inscription par arrêté du 21 décembre 1989. Le château en totalité ; l'allée latérale ouest du parc : inscription par arrêté du 13 décembre 2004.  Décor en arabesque dessiné par Henri Sallambier, spécialiste de ce dessin à l'époque,  Sous Louis XVI toute les fenêtres sont modifiés, la distribution actuelle résulte de cette époque, hormis le grand escalier. Une extension est ajoutée au parc : transformation des terrasses au profit d'un parc anglais, création de la fabrique dans l'alignement du château, classement par arrêté du 19 avril 2005.","habitants":"famille Beaurepaire, et la famille La Chapelle\r\n        \"","divers":"Château de Villers en Ouche        GPS : 48° 51' 33\" Nord 0° 27' 21\" Est","gps":"48° 51' 33\" Nord 0° 27' 21\" Est","images":["../image/image_61/61_Villers_en_Ouche_1.jpg","../image/image_61/61_Villers_en_Ouche_2.jpg"]},"Consult_chateau_formulairec419":{"id":"Consult_chateau_formulairec419","dept":"61","canton":"Radon","commune":"Essay","nom":"Villiers_Essay","type":"Château","periode":"XVI-XVIII","histoire":"VILLIERS, en grande partie détruit pendant la guerre de cent ans. Il est reconstruit au XVIe siècle, puis très remanié au XVIIIe siècle. Sur un terre-plein entouré de douves, le logis est flanqué, au nord-ouest, dune aile en retour et, à lest, de deux pavillons du XVIIe siècle surmontés de hautes toitures à quatre pans. La façade principale fait face à la cour des communs encadrée de deux corps de bâtiments longs et bas. Un colombier se dresse à lest du château, hors les douves. Dans laxe de la cour, une longue avenue dentrée, de plus de 800 mètres, est bordée par deux quadruples alignements de tilleuls. Le vaste domaine de plus de 86 hectares comprend des bois, des prairies, de vergers et un jardin potager, abrité par un mur, à louest du château, est inscrit parmi les sites en juillet 1943 mais le rapport dinspection de lépoque mentionne \" se trouve actuellement sur le déclin, il y a une dizaine dannée, la grande allée plantée de huit rangs de hêtres bicentenaires a été rasée.  Les douves, la petite tour isolée, le château et sa terrasse\". En 1993, le parc nexiste plus, les bois ont disparus avec le remembrement et rien ne protège le domaine des coups de vent. La tempête de décembre 1999 dévaste les bâtiments, éventre les toitures et couche le peu darbres qui subsistaient. Le château est acheté par les propriétaires actuels en 2001, pour une superficie de six hectares. Le reste du domaine est acquis par des agriculteurs. Le château se trouve alors presque à létat de ruine. Peu à peu, les nouveaux acquéreurs effectuent tous les travaux pour redonner de léclat à la vieille demeure.","architecture":"VILLIERS, deux piliers de briques et de pierres marquent lentrée du domaine. Après un large virage, lallée daccès passe entre le colombier et le commun Est pour déboucher dans la grande cour. Sur la gauche, le grand logis se dresse au milieu du terre-plein entouré de douves en eau, habillées de saules et daulnes arbustifs. Le château est restauré, les hautes toitures dardoises sont refaites et tout lensemble est rénové selon les règles de lart. Devant le logis une grande pelouse occupe la cour avec une allée périphérique. De chaque côté, les communs dont les toitures de tuiles ont été refaite par le propriétaire, connaissent une affectation différente. Celui de lEst est demeuré en létat et il continue de servir de remise et datelier. Celui de louest, restauré avec beaucoup de soins, accueille un spa et un espace de détente. Sa façade de pierres aux chaînages de briques est habillée dune glycine et de rosiers. Derrière les bâtiments, lespace est plus rural avec de petits près enclos et diverses annexes utilitaires. Des planches de légumes parsèment tout lespace, le propriétaire privilégiant leurs feuillages décoratifs aux parterres fleuris. Si aujourdhui le domaine de Villiers est sauvé, cest au prix dénormes sacrifices de la part des propriétaires qui nont ménagé ni leurs efforts ni les investissements financiers. Lavenir du site repose principalement sur les ressources tirées de lhébergement touristique et si celui-ci venait à faiblir le sort du domaine pourrait être compromis. Les propriétaires envisagent de diversifier leurs activités avec laménagement de salles et un hébergement complémentaire. Le domaine est tenu à bout de bras et si la réussite est au rendez-vous, il pourrait devenir un endroit rare au milieu de la plaine agricole de Sées.","habitants":"Famille de Franck Rollo\r\n        \"","divers":"GPS : 48° 32' 28\" Nord 0° 14' 49\" Est","gps":"48° 32' 28\" Nord 0° 14' 49\" Est","images":["../image/image_61/61_Villiers_Essay_1.jpg","../image/image_61/61_Villiers_Essay_2.jpg","../image/image_61/61_Villiers_Essay_3.jpg","../image/image_61/61_Villiers_Essay_4.jpg"]},"Consult_chateau_formulairecd5f":{"id":"Consult_chateau_formulairecd5f","dept":"61","canton":"Mortagne-au-Perche","commune":"Corbon","nom":"Vove","type":"Château","periode":"XVI-XVII","histoire":"LE VOVE, LES REMPARTS, la situation géographique du Perche a servi de rempart à linvasion anglaise. De ce fait, les seigneuries constituées avant le milieu du XVe siècle, trouvent leur origine dans un cadre de mise en défense du territoire, les propriétés seigneuriales étant, depuis le XIe siècle, à la base du service militaire et considérées comme des forteresses. La guerre de cent ans a été désastreuse pour le Perche et sa noblesse. Enfin libérée de la tutelle anglaise en 1449, la région va profiter pleinement de la paix retrouvée. Certaines seigneuries laissées vacantes par la mort de leurs propriétaires ont attiré une riche bourgeoisie qui, sinspirant largement des demeures des bords de Loire, va édifier un habitat dun cachet particulier : le manoir.  Véritable entité intégrée au milieu rural, le manoir est un lieu de résidence, mais aussi le siège dune exploitation destinée à faire valoir les terres dun domaine agricole. Un seigneur à la campagne en quelque sorte. il est classé comme M.H. depuis 1974. Le corps principal, habitat primitif, daterait du XVe, le logis initial ayant été remanié au XVIIe. La chapelle de type gothique, ayant servi de grange, fut sauvée de la destruction.                                                                                       A un K.M au sud ouest à Mauves sur Huisme château des Landres pas d'historique.","architecture":"VOVE,  construit aux XVIe-XVIIe siècle,  présente un logis à deux étages éclairé par de larges fenêtres à meneaux et desservi par une tour d'escalier octogonale s'ouvrant par une porte à gâble flamboyant délicatement sculpté. Une tourelle cylindrique en encorbellement permettait d'accéder à la chambre du guetteur À l'arrière, la grosse tour ronde est celle du donjon. Une chapelle, de style gothique, complète l'ensemble. Le manoir se compose d'un pavillon du XVe siècle formant équerre avec un logis plus important du  XVIIIe siècle. Au point de jonction se trouve une tourelle octogone, flanquée d'une autre plus petite en encorbellement. La première renferme un escalier en colimaçon supporté par un pilier central contourné en vis, qui soutient la retombée d'une voûte dont les arcs diagonaux reposent sur des modillons figurant des animaux. La porte d'entrée à arc surbaissé est surmontée d'un tympan ogival décoré de feuillages et encadré lui-même dans un arc en accolade couronné par un fleuron. À l'angle opposé, grosse tour ronde à l'extérieur, carrée à l'intérieur, seul reste de l'édifice primitif.","habitants":"Seigneur local\r\n        \"","divers":"Vove Grav de 1 à 5  Des Landes grav_6 GPS : 48° 27' 17,12\" Nord, 0° 39' 23,55\" Est","gps":"48° 27' 17,12\" Nord, 0° 39' 23,55\" Est","images":["../image/image_61/61_Vove_1.jpg","../image/image_61/61_Vove_2.jpg","../image/image_61/61_Vove_3.jpg","../image/image_61/61_Vove_4.jpg","../image/image_61/61_Vove_5.jpg"]},"Consult_chateau_formulaire617b":{"id":"Consult_chateau_formulaire617b","dept":"61","canton":"Athis-de-l","commune":"Yveteaux","nom":"Yveteaux","type":"Château","periode":"XV-XVII-XIX","histoire":"Deux châteaux à Yveteaux dont celui d'Yveteaux et d'Ostieux.                                                                        YVETEAUX, le château des Yveteaux, à l'origine au centre d'un parc, a subi à plusieurs époques, surtout en 1910, des remaniements qui ont beaucoup altéré sa silhouette. Il se compose actuellement de deux corps de bâtiments disposés en L, l'aile ouest figurant sur les plans du XVIIe siècle a disparu. La façade nord baigne dans les douves et s'agrémente de deux tours carrées qui encadrent une terrasse avec embarcadère, l'ensemble comprend également des communs. La demeure a appartenu au poète Jean Vauquelin de la Fresnaye, contemporain de Malherbe.\r\nÉléments protégés MH : les deux pavillons d'entrée ; les façades et les toitures du château; terrasse nord et douves ; façades et toitures des communs ouest, la tour du fruitier; les façades et les toitures des communs Est, y compris la chapel
