le, et à l'exclusion du corps de bâtiment édifié en 1910 ; l'orangerie dite \"pavillon de l'Aurore\" : inscription par arrêté du 8 novembre 1988.","architecture":"OSTIEUX, la construction du château des Ostieux date du XVe au XIXe siècle. L'architecte était Chaîne Henri, fait partie d'un domaine en cours de réhabilitation : la basse-cour se ranime, le potager reprend ses fonctions et l'orangerie retrouve une seconde jeunesse. Le parc de 16 hectares vous invite à une promenade à travers le temps. Les Ostieux ont conservé de nombreux éléments témoins de la vie d'antan. Les façades du château, les arbres centenaires, la chapelle et les pièces d'eau sont quelques uns des éléments qui alimenteront également votre curiosité lors de cette promenade au fil du temps.  Le château des Ostieux est inscrit au titre des M.H. depuis le 16 juin 2005, il était composé au XVe siècle d'un grand bâtiment, d'écuries, du logis du fermier, de granges, d'un jardin avec étang (selon un aveu de 1689). A l'origine, le manoir devait se présenter comme un logis rectangulaire élevé sur caves, dont l'accès s'effectuait par un perron, et disposer d'une salle et de cuisine au rez-de-chaussée, et de chambres à l'étage desservies par un escalier inscrit dans la tour hexagonale. Ce manoir typique a été modifié avec l'ajout de l'échauguette d'angle. L'édifice a connu un rhabillage des façades à la fin du XIXe siècle, en même temps que la construction du nouveau corps de logis au sud par l'architecte Henri Chaîne. A cette époque, les intérieurs ont été redécorés dans un style éclectique. Une partie des bâtiments autour de la cour semble dater du XVe siècle, les autres ont été ajoutés aux XVIIe et XVIIIe siècles.","habitants":"Yveteaux, Jean Vauquelin de la Fresnaye                               Ostieux ; Famille d'Ostieux\r\n        \"","divers":"Deux châteaux à Yveteaux dont celui d'Yveteaux grav -1-2-3  grav 4-5-6 et d'Ostieux. Ostieux GPS : 48° 43' 19\" Nord, 0° 15' 18\" Ouest                                                                                Yveteaux 48° 42' 08\" Nord, 0° 16' 38\" Ouest","gps":"48° 43' 19\" Nord, 0° 15' 18\" Ouest","images":["../image/image_61/61_Yveteaux_1.jpg","../image/image_61/61_Yveteaux_2.jpg","../image/image_61/61_Yveteaux_3.jpg","../image/image_61/61_Yveteaux_4.jpg","../image/image_61/61_Yveteaux_5.jpg","../image/image_61/61_Yveteaux_6.jpg"]}};

function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','61 — Orne'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
