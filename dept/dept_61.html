et souvre sur un escalier en fer à cheval vers les communs, bâtis en contrebas. Le parc est clos de murs et un plan terrier de 1660 représente un jardin à la française devant la façade Est du château tandis quun potager longe le mur nord. Le jardin est transformé en parc à langlaise en 1830, date de construction de lorangerie. Le corps du logis est remanié par Hervé de Broc à la fin du XIXe siècle. Les trois vieilles lucarnes sont remplacées par cinq autres, à meneaux, dans le style troubadour de lépoque. Laile nord est reconstruite avec une toiture en terrasse et balustrade. Laccès au château est modifié et seffectue par la basse-cour. Au milieu du XXe siècle, le domaine a toujours fière allure. Sa vaste terrasse, formant avant-cour, précède les fossés que lon franchit par un pont en pierre pour déboucher, entre les deux pavillons, dans la cour dhonneur. Les profondes douves sèches conservent encore vers lextérieur les angles arrondis dus aux anciennes tours de défense. Au sud, le terre-plein du logis (aux angles aigus) est ponctué de topiaires de buis qui encadrent une pelouse devant lancien donjon. Le domaine est inscrit parmi les sites en décembre 1972 afin de préserver cette belle propriété qui, à lépoque, ne semble pas mériter de protection au titre des M.H.. Transmis par héritage, le domaine na jamais été vendu et il est encore la propriété des descendants des seigneurs des Feugerets.\r\nÉléments protégés MH : les façades et les toitures du château et des deux pavillons d'entrée ; la cour d'honneur et le portail avec ses piliers ; les douves avec leurs murs et le pont ; les terrasse et l'escalier à volée double : inscription par arrêté du 5 octobre 2001.","habitants":"famille des Feugerets famille de Coesme\r\n        \r\n        \"","divers":"Trois châteaux à la Chapelle-Souëf Feugerets grav 2-3-4-5-6, Chaponnière grav_1  et  Couesme grav 7- 8.                                                       Gps 48° 20' 08\" nord, 0° 35' 23\" est                                       Chaponière GPS : 48° 19' 30,51\" Nord, 0° 39' 37,06\" Est","gps":"48° 19' 30,51\" Nord, 0° 39' 37,06\" Est","images":["../image/image_61/61_Feugerets_1.jpg","../image/image_61/61_Feugerets_2.jpg","../image/image_61/61_Feugerets_3.jpg","../image/image_61/61_Feugerets_4.jpg","../image/image_61/61_Feugerets_5.jpg","../image/image_61/61_Feugerets_6.jpg","../image/image_61/61_Feugerets_7.jpg","../image/image_61/61_Feugerets_8.jpg"]},"Consult_chateau_formulairec060":{"id":"Consult_chateau_formulairec060","dept":"61","canton":"Flers","commune":"Flers","nom":"Flers","type":"Château","periode":"XV-XVI","histoire":"FLERS, en 1530-1540  Nicolas III de Grosparmy dit le puissant baron de Flers fait raser le vieux manoir qui appartient à sa famille depuis plusieurs générations et confie à Blaise le Pestre le soin de reconstruire un nouveau de style Renaissance. En 1650 Pierre de Pellevé comte de Flers  se lance dans une périlleuse entreprise rompant la tradition de fidélité à la couronne se range du côté de la fronde. ses biens son saisis en 1659 , levée en 1695. En 1717 l'héritière des Pellevé épouse Philippe-René de la Motte-Ango. Les châtelains  de Flers acceiullent à la Révolution jacqueline le Goué de Richemont, l'épouse de Pierre-François de Paule de la Motte-Ango général chouan qui seront délogé en 1800 par le général Gardane. \r\nDurant la Révolution, le château de Flers servit de lieu de rassemblement des Chouans. Les « Bleus » l'incendièrent en 1800. En 1808 le comte de la Motte-Ango  ruiné se défait du château au profit du comte de Redern ambassadeur de Prusse ruiné à son tour il vend ses biens en 1820 à ses notaires parisiens, Schnetz et Thirion.  En 1901 Julien Salles maire de Flers achète le château pour  La ville de Flers. Le château de Flers sert depuis de Mairie et de Musée Éléments protégés MH : le château de Flers en totalité : classement par arrêté du 24 avril 1907.  Mairie et musée.","architecture":"FLERS;  les parties les plus importantes du château de Flers remontent au XVIe siècle. se compose de deux ailes en équerre  dont les façades sont baignées par les eaux d'un étang. Le château de situe au milieu d'un immense parc, qui comprend un étang et un espace forestier. Dans ses murs se trouve un musée de peintures et de sculptures anciennes et du XIXe siècle, d'arts décoratifs, et d'histoire locale;  se compose d'un  logis paraissant remonter aux dernières années de la Renaissance, cantonné aux deux angles extérieurs par des tours rondes émergeant au-dessus des murs en pans coupés qui les relient au logis principal. Au fond de la cour d'honneur, un bâtiment en retour d'équerre porte les caractères de l'architecture du XVIIIe siècle, bâti à l'emplacement de l'ancienne aile en retour du château primitif. A l'intérieur, tout a été remis à la mode de l'époque de Louis XIV. Bien qu'il a été endommagé en 1944, n'est pas encore entièrement restauré, accueille le Musée du Bocage Normand avec une salle mémoriale de la déportation, et des uvres du peintre-dessinateur Charles Léandre. Le parc est classé première réserve ornithologique urbaine, il permet de découvrir des espèces rares. Une étendue boisée composée par différentes espèces variées contribue à la beauté de ce parc.","habitants":"Famille de Pierre de Pellevé comte de Flers \r\n        \"","divers":"Château de Flers      grav 1 à 4 Mairie grav-5                       GPS : 48° 45' 02,88\" Nord, 0° 34' 32,16\" Ouest","gps":"48° 45' 02,88\" Nord, 0° 34' 32,16\" Ouest","images":["../image/image_61/61_Flers_1.jpg","../image/image_61/61_Flers_2.jpg","../image/image_61/61_Flers_3.jpg","../image/image_61/61_Flers_4.jpg","../image/image_61/61_Flers_5.jpg"]},"Consult_chateau_formulaire7d57":{"id":"Consult_chateau_formulaire7d57","dept":"61","canton":"Argentan","commune":"Fontaine les Bassets","nom":"Fontaine_Bassets","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article, Fontaine les Bassets et Coulonges.                                                                            FONTAINE les BASSETS, le château était à l'origine une petite forteresse. Au début du XVIIIe siècle, le nouveau propriétaire décida de construire un nouvel édifice en pierre de taille. Il s'agit d'une demeure classique flanquée à l'ouest d'un petit pavillon. La façade nord présente un avant-corps, en légère saillie, surmonté d'un fronton triangulaire. Deux pilastres encadrent les baies cintrées de l'étage. A l'intérieur, l'escalier de pierre possède une rampe en fer forgé. L'inspiration du décor est de style Louis XVI.\r\nÉléments protégés MH : la façade nord et la toiture correspondante , l'escalier avec sa rampe en fer forgé ; le grand salon avec son décor de boiseries : inscription par arrêté du 29 août 1984.","architecture":"A deux K.M. au sud de COULONCES , château de DEMI-ENFANT  Fief appartenant en 1666 à Gabriel de Ruppières. Logis bâti au milieu du XVIIe siècle, remanié au XXe siècle.  De Jumière, un mauvais chemin conduit à Mi-Enfant, à droite l'ancienne ferme du château, à gauche l'ancien logis seigneurial, séparé du chemin par le ruisseau de Coulonces, élargi en douve et par une cour d'honneur. C'est une construction de l'époque Louis XIII, à un étage dont la façade principale est décorée de deux pilastres en bossages supportant un fronton triangulaire. La toiture est percée de quatre lucarnes de pierre à baies ovales, il n'en subsiste que trois, la toiture est ornée d'épis. A l'intérieur, au premier étage, une chambre garnie de boiserie et de deux belles cheminées de pierre. Ce château est assis sur une cave que l'eau parfois envahit bien qu'en son sous sol soit aménagé un canal d'écoulement. Cette cave est construite avec soin et voûtée en berceau, elle semble antérieure à l'édifice actuel.","habitants":"Gabriel de Ruppières\r\n        \"","divers":"Deux châteaux dans cet article;  Fontaine les Bassets grav-1 et Coulonges  grav-2 -3-4   GPS : 48° 51' 23,95\" Nord, 0° 00' 14,59\" Est","gps":"48° 51' 23,95\" Nord, 0° 00' 14,59\" Est","images":["../image/image_61/61_Fontaine_Bassets_1.jpg","../image/image_61/61_Fontaine_Bassets_2.jpg","../image/image_61/61_Fontaine_Bassets_3.jpg","../image/image_61/61_Fontaine_Bassets_4.jpg"]},"Consult_chateau_formulaire270e":{"id":"Consult_chateau_formulaire270e","dept":"61","canton":"Athis-de-l","commune":"La Forêt d","nom":"Forèt_Auvray","type":"Château","periode":"XVI-XVII","histoire":"FORET-D'AUVRAY, Gabriel François était le Maître d'oeuvre. Un pont dormant de bois perce la courtine. La poterne est une construction qui peut être attribuée à François Gabriel maître maçon à Argentan. La poterne est considérée comme un résumé des techniques et des styles maîtrisés par François Gabriel à la fin de sa carrière. Le logis du château comprend des bases du XVIe siècle, mais il a été transformé au XIXe siècle.\r\nÉléments protégés MH : le logis ; le moulin ; l'allée d'accès ; l'ensemble de l'enceinte et des tours ; la poterne et les douves : classement par arrêté du 9 avril 2002.","architecture":"FORET-D'AUVRAY,  cette forteresse huguenote a été érigée au XVIe siècle et réaménagée au XVIIe siècle, à partir de l'enceinte médiévale du XIVe siècle. L'enceinte de forme quadrilatère, est constituée de murs avec des parapets couvrant un chemin de ronde, et de 4 tours d'angle qui ont perdu leur toiture. Un pont dormant de bois perce la courtine. On remarque l'alternance de matériaux avec un jeu de polychromie, les harpes, le bossage soulignant la forme cintrée et le fronton brisé. La partie sommitale est défensive avec sa bretèche, ses mâchicoulis et ses bouches à feu. Cette poterne est souvent considérée comme un résumé des techniques et des styles maîtrisés, par François Gabriel, à la fin de sa carrière. Le château de La Forêt-Auvray, domaine fortifié sur la rive gauche de l'Orne, dont l'enceinte, les tours, la poterne et les douves sont classées au titre des M.H. depuis le 9/04/2002 et le logis, le moulin et l'allée d'accès sont inscrits depuis le 11/12/2001. Le logis du château de La Forêt-Auvray comprend des bases du XVIe siècle, mais il a été transformé au XIXe siècle.","habitants":"Famille de François Gabriel \r\n        \"","divers":"Château de Forêt d'Auvray, GPS : 48° 48' 42\" Nord, 0° 20' 32\" Ouest","gps":"48° 48' 42\" Nord, 0° 20' 32\" Ouest","images":["../image/image_61/61_For%c3%a8t_Auvray_1.jpg","../image/image_61/61_For%c3%a8t_Auvray_2.jpg"]},"Consult_chateau_formulaire58ab":{"id":"Consult_chateau_formulaire58ab","dept":"61","canton":"Ceton","commune":"St Germain de la coudre","nom":"Fresnaye_St_Germain","type":"Manoir","periode":"XIV-XVI","histoire":"FRESNAYE, l'édifice est réputé le plus ancien des manoirs du Perche subsistants, n'ayant pas été incendié lors des combats de la guerre de Cent-Ans. Il a fait l'objet de modifications continues depuis le XIVe siècle. Le manoir n'est pas entretenu au XVIIe siècle et il est vendu au milieu du XVIIIe siècle. Le donjon est tronqué sous Louis-Philippe et Napoléon III. Le domaine sert d'exploitation agricole jusqu'au milieu du XXe siècle. Il est restauré à partir de 1977 puis depuis 1994 par un nouveau propriétaire. Propriété de monsieur  Maurice Cochart  et Sulter.","architecture":"FRESNAYE, forteresse datant de la guerre de cent ans,  des murs d'un mètre d'épaisseur, conçue  tel un carré avec une tour à chaque angle percée d'embrasures de tir, l'une des tour à été transformée  en donjon pendant la guerre franco-Anglaise, puis décapitée sous Louis -Philippe. Cet ancien donjon est devenu un lieu d'habitation, accessible par une splendide galerie Renaissance, petite merveille classée , convertie en laiterie. La galerie et la cheminée Renaissance du rez-de-chaussée, le manoir et les communs sont inscrits par arrêté du 8 septembre 1988.   Sous Henri IV, les Fontenay ont acquis le manoir par mariage. Ils nétaient ni comtes ni barons, et pourtant, cétait la première famille du Perche, présente en de nombreux lieux.","habitants":"Famille de Fontenay\r\n        \"","divers":"Château de la Fresnayes","gps":"","images":["../image/image_61/61_Fresnaye_St_Germain_1.jpg","../image/image_61/61_Fresnaye_St_Germain_2.jpg","../image/image_61/61_Fresnaye_St_Germain_3.jpg","../image/image_61/61_Fresnaye_St_Germain_4.jpg","../image/image_61/61_Fresnaye_St_Germain_5.jpg"]},"Consult_chateau_formulaire8d54":{"id":"Consult_chateau_formulaire8d54","dept":"61","canton":"Vimoutiers","commune":"Gacé","nom":"Gacé","type":"Forteresse","periode":"XIV-XVI-XVIII","histoire":"Trois châteaux à Gacé dont celui de Gacé de Mesnil-Vicomte et Castel-Morphée.                                                                                                        GACE,  la tour dite de Talbot date  du XIVe siècle élevée par la Ferté -Fresnel  Jeanne Paynel transmet  à la famille d'Estouteville.  En 1596  les Goyon-Matignon sont les propriétaires et seigneur en 1696 le futur maréchal de Gacé Charles-Auguste  de Goyon marquis de Lonrai rachète le château aux Colbert, en 1760 l'héritière de Gacé Anne-Louise de Goyon- Matignon épouse Anne -Charles-François comte de Montmorency qui émigrèrent en 1790, la comtesse  parvient en 1806 à rentrée en possession d'une partie de ses biens, sauf Gacé, en 1822 Gacé appartient à François-Nicolas Lallemant le cède à la commune qui utilise déjà une partie du bâtiment. Aujourd'hui propriété de la commune, il abrite l'hôtel de ville.                                                                                                                                                               MENIL-VICOMTE, a cinq K.M. au sud,  le château est construit au milieu du XVIIIe siècle pour Charles des portes, seigneur du Ménil-Vicomte. Entre 1925 et 1928, création d'un haras de pur sang pour Frédéric. Suppression des plafonds et du dallage du logis et construction de l'ensemble des bâtiments du haras. Le logis est entièrement restauré après 1973, avec un avant corps à fronton en pierre avec brique en remplissage,  toit à croupes, tuile plate. Logement, plan régulier en U avec deux corps d'écuries, brique et enduit partiel, toit en pavillon. Manège circulaire en béton armé et brique en remplissage, toit galbé en béton.  Haras de Pur Sang.                                                                                 CASTEL-MORPHEE à Lisieux,  manoir d'époque Napoléon III.                                                                                      CHAMPS; gentilhommière  construite au XVIIe siècle en briques par la famille Abot, depuis 1925    à la Famille Hetndrickx-Masurel. aujourd'hui hôtellerie de madame Kordalov .","architecture":"GACE,  pendant la guerre de cent Ans, la forteresse, sans doute délabrée, fut reconstruite. La grosse tour ouest, nommée tour Talbot, date de cette époque.  L'ancienne entrée du château avec les deux tours du XVe siècle, occupe l'extrémité de la façade ouest, très ancienne place forte reconstruite à partir du XIVe siècle.  En 1449, commence la construction des deux tours rondes qui flanquaient l'entrée du château, au-delà du pont-levis. Au XVIe siècle, construction de la partie du château face à la place. Une partie de la façade sud-ouest est transformée au XVIIe siècle pour être mise au goût du jour. A la Révolution, les habitants démolirent une partie de la façade Est, et la reconstruisirent au XIXe siècle, à l'aide de briques. Château de plan rectangulaire avec un pavillon central en avancée, et s'appuyant à son extrémité nord à la tour de défense du XIVe siècle. Au centre-ville de Gacé, la place qui sétend au pied de la façade Est du château a été réaménagée très récemment. En surélévation des rues de Lisieux, on y accède par des escaliers. Lesplanade est longée, sur ces deux rues, de murets de pierre aux chaînages et couronnement de briques, court une lisse en fer soutenue par des piliers en fonte. Au sud, une curieuse halle en béton de style rocaille édifiée  au début du XXe siècle.  Louest de la place est occupé  deux beaux bâtiments en briques, séparés de lesplanade par un muret bas de brique. A louest, le château est toujours aussi imposant avec ses hauts murs de briques chaînés de pierre calcaire et ses toitures élevées en ardoises. Éléments protégés MH : les façades et les toitures du château : inscription par arrêté du 6 mai 1968.                                                                                                                              MENIL-VICOMTE; Haras du XVIIIe, XXe siècle; suppression des plafonds et du dallage du logis et construction de l'ensemble des bâtiments du haras ; le logis est entièrement restauré après 1973.","habitants":"Gacé ; famille de Charles-Auguste  de Goyon                                                Castel ; famille Abot\r\n        \r\n        \r\n        \"","divers":"Trois châteaux à Gacé dont celui de Gacé de Mesnil-Vicomte et Castel-Morphée.  48° 44' 59\" nord, 0° 17' 47\" est         Glaise  48° 44' 28\" nord, 0° 10' 26\" ouest grav 5-6\r\nGacé 48° 47' 35\" nord, 0° 17' 49\" est grav 1_2_3_4","gps":"","images":["../image/image_61/61_Gac%c3%a9_1.jpg","../image/image_61/61_Gac%c3%a9_2.jpg","../image/image_61/61_Gac%c3%a9_3.jpg","../image/image_61/61_Gac%c3%a9_4.jpg","../image/image_61/61_Gac%c3%a9_5.jpg","../image/image_61/61_Gac%c3%a9_6.jpg"]},"Consult_chateau_formulairec093":{"id":"Consult_chateau_formulairec093","dept":"61","canton":"Rai","commune":"La Genevraie","nom":"Genevraie_61","type":"Château","periode":"XVIII","histoire":"GENEVRAIE, château construit en 1768 pour François Charles Guillaume Perier de la Genevraie, capitaine de dragons, sur l'emplacement d'un château plus ancien. Entièrement remanié dans la première moitié du XIXe siècle pour son fils, Marie Louis Achille Perier, qui y crée un haras en 1820. Rhabillage des façades du logis et surélévation d'un étage, en 1841, par Viel et Dujardin, architectes à Paris, édification de nouveaux communs autour d'une cour et vers 1900 construction d'un manège.                                              La chapelle de Saint-Nicolas était attenante au manoir lui-même, construite en soubassement et voûtée en pierre. Lorsquà la Révolution la chapelle fut désaffectée et la succursale détruite, les châtelains firent combler les fossés et établirent des salles sur la voûte de la chapelle qui ne fut plus quun enfeu ou lieu de sépulture. Mais Mr Geneyt, devenu propriétaire du lieu en 1882, fit combler avec les débris et démolitions des nouvelles salles et la chapelle et le reste des fossés ou chemin qui y servait daccès, il fit niveler le tout en terrasse et construire le nouveau corps de logis sur toute la longueur de la chapelle.","architecture":"GENEVRAIE, en 1904 ajout d'écuries simples, vers 1942 destruction du manège et entre 1965 et 1970 adjonction de nouvelles écuries. Logis : murs en moellon enduit, élévations ordonnancées, toit à croupes couvert d'ardoise. Communs comprenant orangerie, écuries et remise : murs en moellon, toit d'ardoise et de tuile plate à pignons couverts, lanternon à toit conique sur l'orangerie. Ecurie construite en 1904 murs en brique, façade à pan de bois, toit à demi croupe couvert d'ardoise. Manège : toit conique. Ecurie reconstruite entre 1965 et 1970 : murs en béton aggloméré, toit en appentis et couvert en tuile mécanique. La propriété abrite un haras.","habitants":"Famille de  François Charles Guillaume Perier de la Genevraie\r\n        \"","divers":"Château de Genevraie  \r\n48° 41' 05\" nord, 0° 19' 05\"  est","gps":"","images":["../image/image_61/61_Genevraie_61_1.jpg","../image/image_61/61_Genevraie_61_2.jpg","../image/image_61/61_Genevraie_61_3.jpg"]},"Consult_chateau_formulairee014":{"id":"Consult_chateau_formulairee014","dept":"61","canton":"Athis-de-l","commune":"Giel-Couteilles","nom":"Giel_Couteilles","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux dan cet article Crevecoeur et Jardin, au sud à deux K.M.à la Courbe le château de Mesnil Glaise                                  CREVECOEUR, le château de Crêvecoeur du XVIe siècle, est une grande construction  composé de deux  bâtiments en équerre  cantonnés aux angles de trois tours rondes à poivrières qui lui donnent un aspect véritablement monumental. Deux de ses tours regardent lOrne vers le sud-est. Dans la partie restante du bâtiment, une tourelle hexagonale contient lescalier. Crêvecoeur fut dévasté par une colonne mobile venue de Falaise le 15 pluviôse an VIII, pendant la chouannerie de Frotte. Il s'agit d'une construction datant du XVIe siècle, dont les ouvertures ont été remaniées au XVIIIe. Les seigneurs appartenaient à la famille de Rabodanges. Au milieu du XXe siècle il appartenait à Mme de Séguin.                                                                                                                  MESNIL-GLAISE, le château actuel, de style néo-Renaissance, fut construit à la fin du XIXe siècle surles vestiges d'un château fortifié datant du XIIe siècle, il est possible d'apercevoir des tours.  Ses bâtisseurs nappartenaient pas aux familles nobles de la seigneurie de Ménil-Glaise.   Le manoir et la ferme fortifié et Le  manoir,  ainsi  que  léglise  située  derrière  le  château  datent  du  XVe siècle  et  la  ferme  du  XVIe  siècle.  La  tourelle  conique  du  manoir  fut  ajoutée au XVIIe siècle. Aujourdhui, ces différents bâtiments appartiennent à des particuliers et ne sont pas accessibles au public","architecture":"JARDIN, la partie ancienne du château du Jardin remonte au XVe siècle avec, à l'angle des deux corps de logis, une tour et sa petite tourelle accolée, quant à sa façade Est elle est de lépoque Louis XII. Après avoir appartenu à Anne de Montafier, comtesse de Soissons, le château passa en 1626 à Gédéon-Louis de Grimoult, chevalier, seigneur et patron de Giel et Habloville, ancêtre direct du maréchal Lyautey. La demeure appartenait en 1682 à Jeanne de Rabodanges. Elle fut échangée avec un cadet de la maison de Caulaincourt, ancêtre du comte Dauger. Au milieu du XXe siècle, le château du Jardin appartenait de M. Avenel.","habitants":"Crevecoeur, famille de Rabodanges                                               Jardin; Anne de Montafier,\r\n        \r\n        \"","divers":"Deux châteaux dan cet article Crevecoeur grav-5-6  et Jardin grav-1-2-3-4.  Mesnil-Glaise  grav 7\r\nGiel gps 48° 45' 55\" nord, 0° 11' 45\" ouest","gps":"","images":["../image/image_61/61_Giel_Couteilles_1.jpg","../image/image_61/61_Giel_Couteilles_2.jpg","../image/image_61/61_Giel_Couteilles_3.jpg","../image/image_61/61_Giel_Couteilles_4.jpg","../image/image_61/61_Giel_Couteilles_5.jpg","../image/image_61/61_Giel_Couteilles_6.jpg","../image/image_61/61_Giel_Couteilles_7.jpg"]},"Consult_chateau_formulaire24cc":{"id":"Consult_chateau_formulaire24cc","dept":"61","canton":"Damigny","commune":"Cuissai","nom":"Glatigny_Cuissai","type":"Château","periode":"XVI-XIX","histoire":"GLATIGNY,  domaine  de  Glatigny  est fortement lié à la personnalité de Jacques Cavalier qui en fut le promoteur. On  dit  même  quil  fut  son propre architecte « Le Général Cavalier possède entre le bourg de Cuissay  et  lorée  de  la  forêt dEcouves,  la  terre  de  Glatigny,  sur  laquelle  il  a  fait construire son château.   En 1553 : Naissance de Guillaume Jouenne, Seigneur de Glatigny. \r\nEn  1564  :  Guillaume  Jouenne  Glatigny  rend  aveu  au  Roi  pour  les  terres  et  la  seigneurie  de  Glatigny  et  de  Lanchal  tenues  chacune pour un huitième de fief. En  1645  :  Il  est  retrouvé  mention  de  Charles  Malard,  Ecuyer  et  Sieur de Glatigny. \r\nEn  1667 : Une chapelle dédiée à Sainte-Barbe est érigée au Manoir de  Glatigny.  Cette  chapelle  n'existe  plus  et  son  emplacement  n'a  pas été retrouvé.  En 1809  :  Acquisition  du  domaine  de  Glatigny  par  Jacques  Cavalier, d'un sieur Crochard, l'ayant lui-même acquis aux enchères quelques années  auparavant  dans  le  cadre  des  ventes  de  biens  d'immigrés. La  propriété  avait  en  effet  été  confisquée  à  Philippe-Anne  Maloré-Glatigny. Propriété de la comtesse de  Falandre.","architecture":"GLATIGNY, construite  dans  la  première moitié du XIXe siècle, vers 1820, cette demeure se compose dun corps principal rectangulaire, encadré de deux  ailes  en  retour  dangles,  terminées  chacune  par \r\nun fronton triangulaire. Dominant le village, touchant le  chemin  de  Carrouges,  la façade  regarde  vers  le  midi. Elle  compte  un  péristyle  de colonnes toscanes en stuc rose, entre deux ailes à frontons triangulaires surbaissés. Lensemble, vu de prés est agréable que de loin.","habitants":"Guillaume  Jouenne  Glatigny \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Glatigny à Cuissai","gps":"","images":["../image/image_61/61_Glatigny_Cuissai_1.jpg"]},"Consult_chateau_formulaireeff7":{"id":"Consult_chateau_formulaireeff7","dept":"61","canton":"Tourouvre","commune":"Moulicent-Longny","nom":"Grande_Noé","type":"Château","periode":"XV-XVI","histoire":"GRANDE-NOE, dans la même famille depuis plus de 600 ans.  Le premier seigneur connu semble avoir été le vicomte Gilles de Mineray, mentionné dans des documents de 1490. En 1611, Marie Anne de Mineray, fille de Louis de Mineray, épousa Georges de Trousseauville, lui apportant la Grande Noë. Après le décès de Roland Pierre de Trousseauville, la propriété passa dans la famille des Trousseauville de Cherisy et en 1722 à Jean-Antoine d'Escorches. Le mariage de Marie-Elisabeth-Geneviève dEscorches avec Jean-Charles-François de Bernard, seigneur de Marigny, fit passer la demeure dans la famille dEscorches. La famille Pineau de Viennay en fut propriétaire jusqu'à la fin du XVIIIe siècle. Le 11 janvier 1865 René Marie-Frédéric-Albert Le Feron de Longcamp, de Caen, épousa mademoiselle Louise Pauline Pineau de Viennay et devint châtelain de la Grande Noë. La demeure est toujours propriété de la famille de Longcamp aujourd'hui.","architecture":"GRANDE-NOE, plus forteresse que château de la Grande Noë, propriété typiquement percheronne. Corps de logis de plan rectangulaire à trois niveaux avec pavillons saillants et tourelles rondes toit en poivrière. Flanqués  sur les flans droit et gauche d'un prolongement de pavillons à deux niveaux toits à deux pans.","habitants":"Famille du vicomte Gilles de Mineray\r\n        \"","divers":"GPS : 48° 33' 49\" Nord 0° 45' 36\" Est","gps":"48° 33' 49\" Nord 0° 45' 36\" Est","images":["../image/image_61/61_Grande_No%c3%a9_1.jpg","../image/image_61/61_Grande_No%c3%a9_2.jpg","../image/image_61/61_Grande_No%c3%a9_3.jpg","../image/image_61/61_Grande_No%c3%a9_4.jpg","../image/image_61/61_Grande_No%c3%a9_5.jpg"]},"Consult_chateau_formulaire6787":{"id":"Consult_chateau_formulaire6787","dept":"61","canton":"Écouves","commune":"Montchevrel","nom":"Grande_Rosière","type":"Manoir","periode":"XVII","histoire":"GRANDE-ROSIERE, ce manoir date du XIIe siècle et appartenait à la famille de La Rosière. C'est une seigneurie qui appartenait aux seigneurs de La Rosière (droit de justice) jusqu'à la fin du XVIIIe siècle, date à laquelle, par mariage, elle passa entre les mains du marquis Louis de Chambray (acte de restitution de 1794), arrière grand-père du fameux veneur, a découpler tant de fois en forêt d'Écouves. De nombreux documents, écrits sur parchemins ayant été collectés par le Vicomte Jacques de Chambray, le domaine du marquis de Chambray se situant à Gouville, dans l'Eure, Le manoir de la Grande-Rosière depuis 10ans, appartient à un propriétaire privé, cousin à la 8e génération du marquis de Chambray, qui l'a entièrement fait restaurer.","architecture":"GRANDE-ROSIERE, d'après le plan cadastral de 1804. Un parterre à la Française agrémente la cour d'honneur.  De plan carré, la bâtisse à deux niveaux toits en croupes flanqués sur le flanc gauche d'une tour carrée, et prolongé sur la face opposée d'une dépendance   d'un niveau.","habitants":"Famille de La Rosière\r\n        \r\n        \"","divers":"GPS : 49° 04' 03\" nord, 0° 46' 57\" Est","gps":"49° 04' 03\" nord, 0° 46' 57\" Est","images":["../image/image_61/61_Grande_Rosi%c3%a8re_1.jpg","../image/image_61/61_Grande_Rosi%c3%a8re_2.jpg"]},"Consult_chateau_formulaire1a5c":{"id":"Consult_chateau_formulaire1a5c","dept":"61","canton":"Vimoutiers","commune":"Guerquesalles","nom":"Guerquesalles","type":"Château","periode":"XVI-XVIII","histoire":"Deux châteaux à Guerquesalles ; Vimer, Cocardière et Vivier.                                                                                        VIMER, le château de Vimer a servi d'hôpital de campagne après le bombardement de Vimoutiers en août 1944. Le château de Vimer a été construit au début du XVIIIe siècle, pour Louis François de Nollet, seigneur de Malvoue et de Vimer, né en 1684. Les armes de la Famille de Nollet de Malvoüe figurent sur une taque déposée à la ferme. René Balthazar Alissant de Chazet (père de René de Chazet et grand-père d'Ange-René-Armand de Mackau) a racheté la propriété, en 1774, et le Général Wathier y trouva refuge à la chute de l'Empire. Le Baron de Mackau y fit faire des travaux de 1897 à 1903,  construit dans la première moitié du XVIIIe siècle, pour les Nollet de Malvoüe, dont les armes figurent sur une taque déposée à la ferme.  Le général Watier, comte de Saint-Alphonse, y trouve refuge à la chute de l'Empire, fait faire des travaux de remise en état et bâtit la chapelle. Importants travaux effectués par les architectes parisiens Guilbert et Trilhe pour le baron de Mackau e comte et la comtesse Michel et Marie-Madeleine de Touchet et leur château de Vimer, bâtisse du XVIIIe siècle, ayant servi d'hôpital de fortune pour toute une région, de juin à octobre 1944.","architecture":"COCARDIERE manoir, Il date du XVIe siècle. Il se situe à 600 m à l'Est de l'église de Guerquesalles. Les hourdis du rez-de-chaussée sont en pisé. Ceux du premier étage sont en dessins variés de briques. Les façades et la toiture du manoir de la Cocardière sont inscrits partiellement aux M.H. depuis le 2/01/1929.                                                                                                       VIMER, château à corps central, construit dans la première moitié du XVIIIe siècle est constitué d'un corps de logis avec 2 ailes en retour, en pierre avec des briques en remplissage, couvert d'ardoises alors que les dépendances sont couvertes de tuiles plates et en ardoises. Le jardin du château de Vimer dessiné par l'architecte paysagiste Bulher, en 1840, présente une allée, une serre et un jardin potager qui sont inscrits au pré-inventaire des Jardins Remarquables. Bien qu'impressionnant depuis l'extérieur. En 1907 construction du corps de bâtiment abritant la bibliothèque et la salle à manger, et achèvement des façades. Dépendances ajoutées à l'est au début du XXe siècle en style néo-normand.  Château en pierre avec brique en remplissage, couvert en ardoise d'un toit en croupe brisée, sauf le corps de bâtiment abritant la bibliothèque, couvert d'un toit bombé ; partie est servant de dépendances en pan de bois et brique, couverture en croupe ; dépendances en brique, pierre et pan de bois hourdi en brique ou torchis, couvertes en tuile plate et ardoise, avec toits en pavillon ou en croupes brisées ; grange en brique avec pisé en remplissage, couverte en tuile plate en croupe ; mur clôturant le jardin potager en pisé vers 1897, construction de nouvelles façades en parement dans la partie ouest et réfection de la chapelle.","habitants":"Famille de Louis François de Nollet de Malvoue\r\n        \"","divers":"Deux châteaux à Guerquesalles ; Vimer et Cocardière grav_3.    Vimer  grav-2-3                                                                gps 48° 54' 24\" nord, 0° 14' 02\" est      GPS : 48° 54' 26\"nord, 0° 13' 0O\" est","gps":"48° 54' 26\"nord, 0° 13' 0O\" est","images":["../image/image_61/61_Guerquesalles_1.jpg","../image/image_61/61_Guerquesalles_2.jpg","../image/image_61/61_Guerquesalles_3.jpg"]},"Consult_chateau_formulairef44c":{"id":"Consult_chateau_formulairef44c","dept":"61","canton":"La Ferté-Macé","commune":"Tinchebray bocage St Jean des Bois","nom":"Guyonnière_61","type":"Château","periode":"XVII","histoire":"GUYONNIERE, la construction date de 1686. Le manoir de la Guyonnière est un haut lieu de la chouannerie normande. Entre 1793 et le Consulat, le bocage est le théâtre d'une guérilla sporadique, difficile à réprouver et impitoyable qui s'identifie aux autres résistances au régime révolutionnaire, de la Vendée, de l'Anjou, du Maine et de la Bretagne. Elle reçoit l'appui et la complicité des populations rurales. Quant au danger politique qu'elle présentait, il fallut en finir avec l'assassinat de son chef Louis de Frotté.","architecture":"GUYONNIERE, à Saint-Jean-des-Bois, Michelot Moulin (Michel Moulin), fils d'un taillandier aisé est à l'origine de la chouannerie normande. Réquisitionné pour rejoindre les forces républicaines, par ruse il obtient des armes, déserte et entre dans la clandestinité avec ses compagnons, formant les premières bandes de réfractaires, organisant des compagnies, creusant des souterrains, désarmant les patriotes de Landisacq, Chanu et Saint-Cornier-des-Landes. Quand Louis de Frotté fut obligé d'abandonner le château de Flers, il établira son quartier général dans la forêt de Saint-Jean-des-Bois au manoir de la Guyonnière en lisière de la forêt. Michelot Moulin, blessé, y trouvera refuge pendant plusieurs mois. C'est une demeure en granit carrée et trapue, à caractère défensif. Des bouches à feu sont encore visibles dans les contre-marches de l'escalier. A l'intérieur, un escalier droit en granit taillé avec un mur d'échiffre, occupe le centre de la maison. De part et d'autre se répartit à chaque niveau une grande pièce. Les sols et les planchers ont disparu. Toutes les menuiseries des portes sont d'époque. Le manoir de la Guyonnière est inscrit aux M.H. partiellement le 25.06.1979. Trois de ses cheminées sont classées aux M.H.","habitants":"Famille de Louis de Frotté.  \"","divers":"48° 43' 55? nord, 0° 48' 50? ouest","gps":"","images":["../image/image_61/61_Guyonni%c3%a8re_61_1.jpg","../image/image_61/61_Guyonni%c3%a8re_61_2.jpg"]},"Consult_chateau_formulaire3da9":{"id":"Consult_chateau_formulaire3da9","dept":"61","canton":"Passais-village","commune":"Passais-village","nom":"Guérinière","type":"Manoir","periode":"XV-XIX","histoire":"GUERINIERE, Raoul Rossignol reçut cette terre lorsque les Anglais quittèrent la France. En 1637, date portée sur le linteau de la porte principale, eut lieu la première transformation avec la destruction probable de deux pavillons à l'arrière et la modification de la façade, de l'escalier, ainsi que l'aménagement du jardin, par le propriétaire Jacques Germont. La propriété restera quatre siècles dans cette famille. La grande salle fut transformée en 1772 la deuxième modernisation touche la grande salle. En 1880, dernière modernisation dans le goût du XIXe siècle (comblement d'un restant de fossé, destruction de la tour arrière et des boiseries).","architecture":"GUERINIERE, c'est un édifice typique des manoirs de la région de Domfront, en granit. demeure construite au XVe siècle. Cette maison-forte en granit roux possédait des tours au nord, ainsi que des douves à l'est et à l'ouest. En 1637 a lieu la première modernisation du manoir portant notamment sur la façade, l'escalier, le jardin, et destruction probable de deux pavillons à l'arrière de la propriété. Le bâtiment rectangulaire possède deux poivrières du côté sud, et deux cheminées sur les pignons est et ouest. Le manoir est précédé de deux petits pavillons carrés. Visite extérieure des façades nord et sud, échauguettes sur façade sud, linteau granit au-dessus de l'imposte dans la cour d'honneur avec monogramme de Christ en latin, corniche moulurée avec modillons, pavillons Louis XV dans la cour d'honneur.  Éléments protégés MH : les façades et les toitures du manoir : inscription par arrêté du 3 juin 1975. Les douves furent comblées en 1880 et on procéda à la destruction de la tour arrière et des boiseries.","habitants":"Seigneur local\r\n        \"","divers":"A Passais-village le château de la Guérinière gps 48° 30' 55\" N, 0° 44' 06\" Ouest","gps":"","images":["../image/image_61/61_Gu%c3%a9rini%c3%a8re_1.jpg","../image/image_61/61_Gu%c3%a9rini%c3%a8re_2.jpg"]},"Consult_chateau_formulaire35c8":{"id":"Consult_chateau_formulaire35c8","dept":"61","canton":"Argentan","commune":"Le Pin au Haras","nom":"Haras_du_Pin","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article le Haras et la Roche à la Cochère.                                                                                  HARAS du PIN, en 1660, le Sieur Jean Mahet de La Pocties loua le Pin au duc de Vendôme. Le 23 mai 1662, le marquis de Nointel acquit la propriété. En 1715, Louis XIV décide de transférer le haras royal de Saint-Léger, jugé peu productif, pour le pays du Merlerault près de la vieille ville dExmes. Après des échanges et des acquisitions de terres, le domaine est constitué. Il atteint, en 1717, près de 700 hectares de prairies, terres labourables et bois. Cette même année, 200 chevaux sont amenés dans des écuries à peine terminées. De 1719 à 1724, le château et ses dépendances sont édifiés par Pierre le Mousseux sur des plans de Robert de Cotte. Sous lancien régime le haras se développe et il compte près de 300 chevaux en 1758. LAssemblée Constituante supprime le haras en 1790, avant quil ne soit rétabli par décret  impérial en 1806. Les terres vendues à la Révolution sont rachetées et les bâtiments remis en état, il retrouve toute son utilité grâce aux armées et son rayonnement en fait le tout premier haras de France. Au XIXe siècle, le domaine sagrandit et se structure notamment sous limpulsion du baron de Bonneval à qui lon doit, entre autres, la construction de lhippodrome. La visite de lEmpereur Napoléon III, en août 1863, marque son apogée. Son extension continuera jusquen 1907 avec des constructions de bâtiments annexes. Le XXe siècle voit le haras décliner: dégradation des bâtiments, diminution des chevaux et transferts de terres. Il est classé parmi les sites en 1926 comme \"un joyau historique par ses bâtiments. Propriété de l'état.","architecture":"HARAS du PIN . Versailles du cheval selon Jean de la Varende, le haras sorganise autour de la cour dhonneur en fer à cheval. Les principaux édifices sont construits en briques rouges chaînées de pierre blanche. Au sud. Vers le nord, au-delà de lentrée principale bordée de douves et fermée dune grille ornée dune tête de cheval dorée, sétend lallée Louis XIV. Perspective monumentale créée dès lorigine, elle évoque toute la grandeur et le pouvoir du Roi. A son point haut, six allées rayonnent à travers le massif boisé de la forêt du Pin. A lest, la grande avenue relient la cour dhonneur à lhippodrome en traversant le bois de la Tête au Loup. Elle sétend, en ligne droite, douest en est, jusquà la limite du domaine, à plus de 4 km, à la lisière nord des bois des Ventes de Nonant.  Au sud, la route conduisant à La Cochère est remarquable, bordée de vieux chênes aux silhouettes massives et noueuses et de plus jeunes sujets replantés après la tempête de 1999. La route du Vieux-Pin a souffert également du \"coup de vent\", elle est désormais bordée par de jeunes chênes remplaçants les sujets vieillissants. Par sa situation en balcon, elle permet des vues sur le château, ses terrasses et les prairies pour chevaux. Le caractère exceptionnel du Haras du Pin émane de son histoire. Le paysage actuel ne reflète pas des activités disparues mais des fonctions qui étaient à lorigine de sa fondation au XVIIIe siècle et qui perdurent toujours.La ROCHE, à la Cochère a été construit vers 1780, jouant sur la brique et la pierre blanche, par la famille de Brossard, gentilshommes verriers. La façade principale présente en son centre un élément en saillie avec un tympan triangulaire. Le parc n'a subi aucune transformation dans son aspect général depuis la fin du XVIIIe siècle.Éléments protégés MH : les façades et les toitures du château : inscription par arrêté du 1er octobre 1974.","habitants":"baron de Bonneval\r\n        \"","divers":"Deux châteaux dans cet article le Haras et la Roche à la Cochère grav 6.    GPS : 48° 44' 22\" Nord, 0° 08' 49\" Est","gps":"48° 44' 22\" Nord, 0° 08' 49\" Est","images":["../image/image_61/61_Haras_du_Pin_1.jpg","../image/image_61/61_Haras_du_Pin_2.jpg","../image/image_61/61_Haras_du_Pin_3.jpg","../image/image_61/61_Haras_du_Pin_4.jpg","../image/image_61/61_Haras_du_Pin_5.jpg","../image/image_61/61_Haras_du_Pin_6.jpg"]},"Consult_chateau_formulaire0ee3-2":{"id":"Consult_chateau_formulaire0ee3-2","dept":"61","canton":"Domfront","commune":"La Haute Chapelle","nom":"Haute_Chapelle","type":"Château","periode":"XIV-XVI","histoire":"A la Haute- Chapelle, la Saucerie  et la Guyardière.                           SAUCERIE, sa construction date du XIVe et XVIIe siècle. Le manoir de la Saucerie ancien châtelet ou château fort médiéval des XVe siècle et XVIe siècle. Echoit à la fin du XIVe à la famille Villaines, avant d'échoir  aux Doynel qui feront surélever  le châtelet,  bâtir une genthilommière, vestige d'un ensemble fortifié dont l'habitation seigneuriale fut incendiée vers 1840 ne sera pas relevée.  Le manoir de la Saucerie appartient depuis le XIVe siècle à la famille Doyne, est classé aux M.H. depuis le 29.08.1955.","architecture":"SAUCERIE, la porte fortifiée qui subsiste, est bordée de douves en eau et se compose de 2 tours massives circulaires, encadrant un bâtiment presque carré. Les tours, percées de nombreuses embrasures pour couleuvrines, sont coiffées, chacune, par un étage carré construit en pan de bois et briques et, terminé par un comble à l'Impériale. La partie centrale est couverte par un dôme surmonté d'un clocheton carré. Sur les angles de la façade postérieure s'élèvent des échauguettes en pans de bois. Entre les tours, au niveau du sol, s'ouvre une porte cintrée surmontée d'un blason sculpté. Elle était précédée d'un pont-levis. Sur la façade postérieure, les traces d'un pont-levis prouvent que le châtelet était entièrement entouré de douves. La poterne, dont la construction daterait du milieu du XIVe siècle, devait être couronnée par des mâchicoulis et des crénelages. Les parties hautes ont été remplacées au XVIIe siècle, par des constructions en charpente et briques.                          GUYARDIERE, représentatif des manoirs du Passais. Le manoir comprend un ensemble de communs et de tours de défense construits au XVIe siècle, remaniés en 1631, et un logis d'habitation du XVIIIe siècle remanié sous Charles X, entouré de douves. Le tout s'ordonne autour de deux cours. le corps de logis de plan rectangulaire à trois niveaux et fronton triangulaire central toit en croupe en ardoise avec lucarnes sur combles, à l'entrée de la cour un  chatelet à deux tours rondes reliés  à toit en poivrière; Propriété de monsieur Bernard.","habitants":"Saucerie;  famille Villaines, \"","divers":"A la Haute- Chapelle, la Saucerie grav 1 à 5,  la Guyardière grav 6 . GPS : 48° 35' 49\" Nord, 0° 42' 51\" Ouest","gps":"48° 35' 49\" Nord, 0° 42' 51\" Ouest","images":["../image/image_61/61_Haute_Chapelle_1.jpg","../image/image_61/61_Haute_Chapelle_2.jpg","../image/image_61/61_Haute_Chapelle_3.jpg","../image/image_61/61_Haute_Chapelle_4.jpg","../image/image_61/61_Haute_Chapelle_5.jpg","../image/image_61/61_Haute_Chapelle_6.jpg","../image/image_61/61_Haute_Chapelle_7.jpg"]},"Consult_chateau_formulaire2ddf":{"id":"Consult_chateau_formulaire2ddf","dept":"61","canton":"Ceton","commune":"Val de Perche-Lhermitière","nom":"Hermitière","type":"Château","periode":"XVIII","histoire":"L'HERMITIERE,  propriétaire actuel comte G.de Courson conseiller général de l'Orne. Éléments protégés MH : les façades et les toitures du château ; la cheminée du bureau ; le grand et le petit salon avec leur décor; les deux colombiers : inscription par arrêté du 25 février 1974. Les façades et les toitures des communs : inscription par arrêté du 26 janvier 2001.","architecture":"L'HERMITIERE, bel ensemble architectural du XVIIIe siècle comprenant un corps de logis, l'aile des communs, un colombier de la fin du XVIIIe siècle et une ancienne tour de défense. Un vestige de l'ancien château est conservé sur la façade arrière (tour carrée entourée d'une rangée de mâchicoulis). Le pavillon ouest renferme un grand salon recouvert de boiseries Louis XVI. La construction du château de l'Hermitière date du XVIIIe siècle, avec un colombier et des communs qui remontent à la fin du XVIIIe siècle et une ancienne tour de défense. Une partie de l'ensemble immobilier, ainsi que certains décors intérieurs du château sont inscrits aux M.H,  du XVIIIe siècle, bâti à l'emplacement d'un ancien manoir dont demeure une tour sur la façade arrière, tour quadrangulaire du  XVIe  siècle, les façades et les toitures, la cheminée du bureau, les grand et petit salons avec leur décor et les deux colombiers sont inscrits au titre des M.M.depuis le 25 février 1974. Les façades et les toitures des communs sont inscrites depuis 26 janvier 2001. Château de l'Hermitière avec un colombier et des communs  et une ancienne tour de défense.  Le pigeonnier a conservé son échelle tournante. Visite libre des extérieurs. Visite des salons sur demande préalable.","habitants":"comte G.de Courson \r\n        \"","divers":"Château de l'hermitière Val de Perche-                                                              GPS : 48° 16' 55,51\" Nord, 0° 38' 34,26\" Est","gps":"48° 16' 55,51\" Nord, 0° 38' 34,26\" Est","images":["../image/image_61/61_Hermiti%c3%a8re_1.jpg","../image/image_61/61_Hermiti%c3%a8re_2.jpg"]},"Consult_chateau_formulairee863":{"id":"Consult_chateau_formulairee863","dept":"61","canton":"Tourouvre","commune":"Home_Chamondont","nom":"Home_Chamondont","type":"Château","periode":"XIV-XV","histoire":"Quatre châteaux à Home-Chamondont dont Miserai, Brotz, de Gannes  et à 3 K.M. à l'est Marchainville. Arçonière, pas d'info.                                                                                                     MARCHAINVILLE, le château fort a été construit par le comte du Perche Geoffroy IV. Charles le Mauvais, roi de Navarre, qui menait la guerre aux côtés des Anglais contre le roi Charles V, s'empara de la forteresse en 1364 et s'y enferma. Philippe le Hardi l'assiégea et s'en rendit maître. En 1464, les Anglais incendièrent l'édifice et rasèrent les murs. Le château conserve les vestiges de six tours et, à l'ouest et au nord, l'emplacement des anciens fossés et remparts.\r\nÉléments protégés MH : les quatre tours en ruines et les vestiges des remparts les reliant : inscription par arrêté du 28 décembre 1978.                                                                                                                MISERAI, chambres d'hôtes est un château bâti à L'Hôme-Chamondot.                                                                                                  BROTZ château du XVe siècle, Jean-René-Joseph Le Boulleur, seigneur de Brotz, conseiller du roi, maître particulier de la maîtrise des eaux et forêts du Perche à Mortagne63 (1714- 1774). Il épouse le 9 mars 1734 Anne-Catherine Angélique Nicole du Plessis.  Le 9 août 1944, le capitaine François Bouilhac, chef du secteur d'Alençon, est assassiné avec quatre autres responsables FFI (Jean Moreau, Fernand Chasseguet, Alfred Frémiot et Jean Mazeline,  au château de Brotz.  Chambres d'hôtes.","architecture":"GANNES, selon lhistoire, ce château féodal élevé sur une motte fut anéanti en 1428 par les Anglais. Défendue par les marécages qui lisolaient, la forteresse, imprenable selon la légende, dut sa destruction à la félonie de la fille du châtelain : éperdue damour pour un capitaine anglais, trahissant les siens, la jeune fille ouvrit la poterne à lennemi. quelle tristesse, mais tellement romantique. On peut sapprocher pour observer les ruines visibles de la route, mais le château de Gannes est une propriété privée et il est absolument interdit de franchir la clôture en raison des chutes de pierres.  À loccasion dun prochain week-end dans le Perche peut-être  Il ne semble rester du château que la base du donjon, quadrilatère de 15m sur 20m dont les murs n'existent plus que sur deux côtés. A l'intérieur se trouve l'amorce d'une vis qui devait permettre l'accès à cet étage du donjon. L'entrée devait se faire par le premier étage.                                                                                                                                 MISERAI, corps de logis de plan rectangulaire à deux niveaux toits  en croupes, petites lucarnes sur combles, l'édifice est accolé d'une tour ronde de trois niveaux toit en poivrières, et à l'opposée pavillon d'un niveau et terrasse.","habitants":"Marchanville : le comte du Perche Geoffroy IV et seigneurs locaux pour les autres.\r\n        \"","divers":"Quatre châteaux à Home-Chamondont dont Miserai, Arçonnière grav 5   Brotz grav 3- 4, de Gannes grav 1-2  et à 3 K.M. à l'est Marchainville.    Miserai  grav-6-7-8  GPS : 48° 35' 24\" Nord, 0° 42' 57\" Est","gps":"48° 35' 24\" Nord, 0° 42' 57\" Est","images":["../image/image_61/61_Home_Chamondont_1.jpg","../image/image_61/61_Home_Chamondont_2.jpg","../image/image_61/61_Home_Chamondont_3.jpg","../image/image_61/61_Home_Chamondont_4.jpg","../image/image_61/61_Home_Chamondont_5.jpg","../image/image_61/61_Home_Chamondont_6.jpg","../image/image_61/61_Home_Chamondont_7.jpg","../image/image_61/61_Home_Chamondont_8.jpg"]},"Consult_chateau_formulairebf7b":{"id":"Consult_chateau_formulairebf7b","dept":"61","canton":"Damigny","commune":"Héloup","nom":"Héloup","type":"Château","periode":"XVIII-XIX","histoire":"Deux châteaux à Héloup, dont le logis et Beauvais.                           LE LOGIS-D'HELOUP,  appelé autrefois château Beaudet. Cette propriété rurale est inscrite parmi les sites en décembre 1973, à la demande de son propriétaire qui venait dobtenir le label \"patrimoine historique\" de lassociation des Vieilles Maisons Françaises. La propriété se compose dun corps de logis principal et de deux communs de part et dautre dune cour. Les bâtiments, antérieurs au XVIIIe siècle, sont empreints de lélégance sobre des vieilles demeures rurales.","architecture":"LOGIS-HELOUP,  a côté, se trouvent les bâtiments de la ferme avec un imposant colombier.  Dissimulés derrière des conifères, deux piliers de granit encadrent la grille dentrée, dans laxe de la cour. Une allée gravillonnée conduit au logis, traverse la cour en herbe et passe devant les communs en très bon état, inchangés depuis leur construction. Ce sont deux ailes jumelles composées dun corps de bâtiment bas, couvert de tuiles avec de délicieuses lucarnes. Elles sont accolées dun pavillon en saillie (vers lentrée) où souvre une haute porte charretière, surmontée dun toit à quatre pans en ardoises. La demeure principale est une élégante construction dune modénature simple et symétrique. Deux niveaux de pierres blondes sont couverts dune toiture dardoises qui sorne de deux lucarnes passantes et de souches de cheminées en briques. A lest, une petite aile basse en retour, ne possède quun seul niveau surmonté dun comble à la Mansard. Lancien verger de pommiers a disparu, remplacé par diverses plantations où les conifères sont trop présents. Avec la douceur de son paysage, la Sarthe qui sécoule nonchalante et la vieille demeure aux teintes chaudes, le site du Logis possède beaucoup de charme dans les doux vallonnements de la plaine dAlençon.                                                                                                                  BEAUVAIS, la construction du château de Beauvais date du XIXe siècle. société civile immobilière est active depuis 35 ans. Située à HELOUP , elle est spécialisée dans le secteur d'activité de la location de terrains et d'autres biens immobiliers, recense un établissement et le dernier événement notable de cette entreprise date du 23-06-1998. Christine Jorelle, est gérante de la société SCI Beauvais.","habitants":"seigneurs locaux                                \r\n        \"","divers":"Deux châteaux à Héloup, dont le logis grav 1-2-3et Beauvais                                           Beauvais GPS : 48° 23' 53\" Nord, 0° 01' 36\" Est","gps":"48° 23' 53\" Nord, 0° 01' 36\" Est","images":["../image/image_61/61_H%c3%a9loup_1.jpg","../image/image_61/61_H%c3%a9loup_2.jpg","../image/image_61/61_H%c3%a9loup_3.jpg"]},"Consult_chateau_formulaire8498":{"id":"Consult_chateau_formulaire8498","dept":"61","canton":"Ceton","commune":"Igé","nom":"Igé_Lonné","type":"Château","periode":"XIV-XVII","histoire":"Deux châteaux à Igé;  Lonné et Bray.                                                          LONNE, château édifié à l'emplacement d'un manoir à motte du XIVe siècle (colombier en ruines signalé en 1518). Site représentatif de l'évolution d'un domaine foncier du Perche ornais du XVIIe au XIXe siècle. Les architectes paysagistes successifs (Poittier pour l'ensemble du parc au XIXe siècle, René Edouard André pour le parterre) ont su mettre en valeur le parc tout en préservant les tracés du XVIIIe siècle. Le château a été modernisé durant les années 1890 par l'architecte Sanson. Le pavillon du régisseur a été construit au milieu du XVIIe siècle.L'intérieur, avec le décor du salon et de la salle à manger, marque un esprit historicisant représentatif de l'époque. Le château de Lonné a appartenu successivement à la famille de Billy au XVIe siècle ; la famille du Bouchet au XVIIe siècle ; la famille de Bullion au XVIIIe siècle ; des Faudoas et la famille d'Orglandes aux XIXe et XXe siècles. Les terres fut vendue à la comtesse de Ligneville.","architecture":"LONNE , éléments protégés MH : les façades et les toitures du château ; le salon avec son décor, la bibliothèque, les façades et les toitures de la maison du régisseur ; les façades et les toitures des bâtiments de la ferme, y compris le bâtiment des écuries-charretterie ; les façades et les toitures de la maison du jardinier et la serre attenante ; le parc, tel qu'il est délimité sur le plan annexé à l'arrêté, avec ses éléments constitutifs : murs, fossés maçonnés, calvaire ; le potager, avec ses murs intérieurs et ses murs de clôture, et le portail dit \"de Chateaubriand\" ; les façades et les toitures du moulin de Lonné, ainsi que son mécanisme ; les façades et les toitures de la boulangerie : inscription au M.H. par arrêté du 21 février 2000.                                                                                                                     BRAY, la construction  date du XVIIe siècle. Le fief de Bray relevait de la châtellenie de Préaux. Le manoir de Bray se présente comme une maison bourgeoise avec un toit à la Mansart, flanqué de lucarnes aux frontons arrondis ou triangulaires. Les entourages de fenêtres, de lucarnes et les angles de la maison sont soulignés de lits de pierre de taille blanche et de briques alternées. A l'intérieur, l'escalier en bois est de style Louis XIII. Les façades et les toitures, l'escalier intérieur avec sa rampe à balustres en bois, la grande salle du rez-de-chaussée avec sa cheminée, ainsi que les façades et les toitures de la chapelle sont inscrits au titre des M.H. depuis le 14 novembre 1977.  Aujourd'hui  au comte et comtesse de Kergos.","habitants":"Lionne; famille de René Edouard André et la famille de Billy                       Bray; comte de Kergos\r\n        \"","divers":"Deux châteaux à Igé; Lonné grav -3 et Bray grav 1-2.                  Lonné  48° 18' 01\" nord, 0° 31' 28\" est      Bray GPS : 48° 18' 25,23\" Nord, 0° 28' 42,39\" Est","gps":"48° 18' 25,23\" Nord, 0° 28' 42,39\" Est","images":["../image/image_61/61_Ig%c3%a9_Lonn%c3%a9_1.jpg","../image/image_61/61_Ig%c3%a9_Lonn%c3%a9_2.jpg","../image/image_61/61_Ig%c3%a9_Lonn%c3%a9_3.jpg"]},"Consult_chateau_formulaireb568":{"id":"Consult_chateau_formulaireb568","dept":"61","canton":"Mortagne-au-Perche","commune":"Courgeout","nom":"Jarossay","type":"Château","periode":"XVI-XVIII","histoire":"JAROSSAY, le manoir du Jarossay est un manoir bâti au lieu-dit Le Jarossy à Courgeoût. Le logis du Jarossay a été dès cette époque le siège d'une métairie et en même temps que ledit logis,  Il date du XVIe et XVIIIe siècle. Le manoir du Jarossay a été élevé par Denis Abot (vers 1450-1532) , avocat de l'ancien comté du Perche, à une date indéterminée. Toutefois, on peut supposer que, Denis Abot étant appelé à la fin du XVe siècle à Mortagne en tant que vicomte du Perche, l'édification du manoir a été concomitante avec son installation dans la capitale du Perche.  Le Jarossay est resté dans la famille Abot jusqu'au milieu du XVIIe siècle. Il est passé à la famille de Tiercelin par mariage d'Agnès Abot avec Georges de Tiercelin, écuyer. Son arrière petit-fils, François René de Tiercelin (1682-1758) a remodelé profondément le Jarossay en 1750.","architecture":"JAROSSAY, de ce premier manoir, il nous reste le grand logis de plan rectangulaire avec un étage carré desservi par un escalier hors-oeuvre établi en élévation postérieure. Un escalier secondaire placé en encorbellement du principal, permet l'accès à une salle haute, des bâtiments d'exploitation ont vu le jour, s'articulant autour de la basse-cour : grange reliée au logis par un mur à l'est, puis au centre de la cour, étable, écurie et pressoir élevés sur le côté nord de la basse-cour. Les partages successifs nous apprennent que le manoir était constitué de deux chambres et cuisine en rez-de-chaussée. Le retour d'équerre a été construit postérieurement au premier corps de logis, du moins pour sa partie basse. Sur l'élévation principale, de grandes croisées sont venues remplacer les baies Renaissance et une porte à double vanteau permet l'accès au centre du logis. La toiture a été totalement remaniée, et les lucarnes redessinées. La distribution intérieure a été très modifiée. Au rez-de-chaussée, la salle a été cloisonnée pour créer un dégagement central. Lors de la vente du Jarossay à la famille de Champmorin en 1774, les modifications ont essentiellement concerné l'aménagement extérieur, avec la création autour du logis principal d'un Jardin Anglais, en terrasse et la création d'une avenue à partir de la route. La demeure seigneuriale n'est toutefois devenue demeure d'agrément que momentanément ; en effet revendu en 1836 à Aubin de Blanpré, le propriétaire du château voisin de Prulay, le Jarossay a été relégué au statut de simple ferme. Il a formé une dépendance du château des Guillets jusqu'à ces toutes dernières années. Le manoir du Jarossay est inscrit partiellement au M.H. depuis le 23/09/1998.","habitants":"famille Abot                                                                                    famille de Champmorin \r\n        \"","divers":"Châteaau de Jarosset à Courgeout, GPS : 48° 29' 55\" Nord, 0° 30' 51\" Est","gps":"48° 29' 55\" Nord, 0° 30' 51\" Est","images":["../image/image_61/61_Jarossay_1.jpg","../image/image_61/61_Jarossay_2.jpg"]},"Consult_chateau_formulaire0928":{"id":"Consult_chateau_formulaire0928","dept":"61","canton":"Mortagne-au-Perche","commune":"la Mesnière","nom":"Joncherets","type":"Château","periode":"XVIII-XIX","histoire":"JONCHERETS, ce domaine est l'un des derniers grands domaines du Perche élevés à la fin de l'Ancien Régime. Construit en 1787 par Antoine de Puisaye (1751-1849),  dernier grand Bailly héréditaire du Perche dont le frère Joseph s'illustra à la tête des chouans de Bretagne. Par héritage  passe au comte  F. de Vassay.  Il a conservé l'intégralité de ses dispositions originelles de style Louis XVI, ce château de la fin du XVIIIe siècle classé M.H., dernier bailli du Perche et IIIe marquis du nom. L'emplacement des dépendances (écuries, orangerie, grange), perpendiculaires au château, permettent de former une cour. Deux autres bâtiments, datant probablement du XVIe siècle, sont situés en contrebas.","architecture":"JONCHERETS, ce domaine est l'un des derniers grands domaines du Perche élevés à la fin de l'Ancien Régime. Il a conservé l'intégralité de ses dispositions originelles : écuries, communs, miroirs d'eau, canalisations etc. Une partie des communs remonte au XVIe ou XVIIe siècle. Le décor de faux marbre de la salle à manger date du XIXe siècle. Éléments protégés MH : le parc : inscription par arrêté du 10 novembre 1993. Le château avec ses décors intérieurs ; les façades et les toitures de la porterie et des communs, y compris la glacière, à l'exclusion des bâtiments modernes ; les plans d'eau: classement par arrêté du 4 juillet 1995.","habitants":"comte  F. de Vassay\r\n        \"","divers":"Joncherets gps 48° 32' 24\" Nord, 0° 26' 33\" Est","gps":"","images":["../image/image_61/61_Joncherets_1.jpg","../image/image_61/61_Joncherets_2.jpg","../image/image_61/61_Joncherets_3.jpg"]},"Consult_chateau_formulaire3dc2-2":{"id":"Consult_chateau_formulaire3dc2-2","dept":"61","canton":"Magny-le-Désert","commune":"Joué du bois","nom":"Joué_du_Bois","type":"château","periode":"XV-","histoire":"JOUE, fief des Haubert relevait de la baronnie d'Annebecq. L'édifice date de la fin du XVe siècle. Construit par Guillaume de Beaurepaire,  en 1516  Marguerite femme d'Edmond de Cobar prend possession des lieux, passe aux le Verrier, Jean le Verrier meurt en 1550 laisse à son fils Josselin qui  meurt en 1593    le domaine est acquis par Gabriel de Fontenay qui ce dernier décède peu après, sa veuve Marguerite Terré convole avec Philippe Langlois lui apportant en dot, Joué revient à Marie-Madeleine Langlois femme de Joseph-Alexandre Blanchard, sieur d'Amanville puis en 1783 passe à un neveu Louis des Rotours, ruiné  cède le domaine à Thomas Lenoir Grandpré, en 1830  son petit-fils  Jean-Jacques épouse Victoire du Bois-Tesselin, avant la seconde guerre mondiale le manoir appartient à la famille de Paul  Lory qui effectuent les premières réparations . En 1944, le manoir est gravement endommagé lors des bombardements. En 1960 appartient à la famille de Galzain.","architecture":"JOUE, le château conserve 6 tours. Le site est militaire. Des travaux importants ont lieu en 1817 en particulier le comblement des douves, et de nouveaux changement ont lieu vers 1870 avec l'ajout des deux ailes actuelles. le corps de logis coiffés d'un toit pentu reposant sur des pignons latéraux comporte sur sa façade principale une tourelle polygonale abritant un escalier en vis. L'édifice fait l'objet d'une inscription partielle au titre des M.H.depuis le 21 mai 1991 : le portail d'entrée, les façades et les toitures du logis et des deux tours d'angle carrées, les vestiges des deux tours d'angle circulaires, percées  de meurtrières, la cour d'honneur avec les murs, les douves et les ponts ; le jardin et son portail.","habitants":"Gabriel de Fontenay \r\n        \r\n        \"","divers":"Château de Joué à Joué su bois         gps  48° 34' 58\" Nord, 0° 13' 58\" Ouest","gps":"","images":["../image/image_61/61_Jou%c3%a9_du_Bois_1.jpg","../image/image_61/61_Jou%c3%a9_du_Bois_2.jpg","../image/image_61/61_Jou%c3%a9_du_Bois_3.jpg"]},"Consult_chateau_formulaired169":{"id":"Consult_chateau_formulaired169","dept":"61","canton":"Domfront","commune":"St-Bomer les Forges","nom":"Jumilly","type":"Vestiges","periode":"XIII-XVII","histoire":"Deux châteaux dans cet article, Jumilly (vestiges) et Maigraine.                        JUMILLY dit  château du Diable, des seigneurs et des légendes.\nLes vestiges du château, intriguent.   Le fief noble de Jumilly, dont le château était situé à 4 km de Domfront, à lextrémité dune avenue de chênes, au milieu dun étang marécageux, était au XVIIe siècle, le plus important de Saint-Bômer-les-Forges.","architecture":"JUMILLY, le château était entouré de douves et détangs, avec une chapelle, au frontispice de laquelle paraissaient les armes et écussons des seigneurs du lieu.  A la Révolution, le château resté à labandon, a été saccagé par des pillards. « En 1854, si lenceinte était encore entière, il ny avait plus en revanche que la base des tours presque arasées, des pans de murs dun donjon en ruines. Une ferme était établie au milieu de ces débris, entourée de toutes parts darbres touffus ». Livré comme carrière de pierres à bâtir aux fermiers des environs, il nen reste aujourdhui quun pan de mur dressé au milieu dun champ , près dun étang bien connu des pêcheurs de la truite domfrontaise.                                                                    MAIGRAINE,  château de 1860, entouré de 20 hectares de parc et de bois. Au cur du bocage ornais sans nuisances.  Le charme du passé avec le confort actuel. Très beaux matériaux d'origine :granite, boiseries , cheminées, superbe mobilier d'époque, pianos. Véritable havre de paix et de tradition. Nombreuses promenades :voie verte et GR 20 à proximité.Propriété de la famille Mottier.","habitants":"Seigneurs locaux\"","divers":"Deux châteaux dans cet article , Jumilly et Maigraine grav  3-4.                                  Gps 48° 38' 38? nord, 0° 38' 00? ouest","gps":"","images":["../image/image_61/61_Jumilly_1.jpg","../image/image_61/61_Jumilly_2.jpg","../image/image_61/61_Jumilly_3.jpg","../image/image_61/61_Jumilly_4.jpg"]},"Consult_chateau_formulaire38e1":{"id":"Consult_chateau_formulaire38e1","dept":"61","canton":"Damigny","commune":"Lalacelle","nom":"Lalacelle","type":"Manoir","periode":"XVI-XVII","histoire":"LALACELLE,  le château de La Lacelle, est à labandon depuis près de 40 ans. Une famille anglaise a racheté le bâtiment et ses 21 ares (9 hectares) de terrain, avec la ferme intention de tout rénover.                                                                                                  Tony Briggs et Ashley Waters, deux Anglais, rénovent le château de La Lacelle, près dAlençon. Le reste de la famille les rejoindra prochainement.","architecture":"LALACELLE,  il date du XIX siècle. Il comporte 350 m2 de superficie habitable, 12 pièces et 8 chambres, Cheminée, Dépendances, Dépendances agricoles, Écurie, Garage, une maison de gardien, un Parc paysager et une Terrasse. Ce petit château d'origine XVIIe, agrandi au XIXe siècle est entièrement à restaurer sur 8 ha 8O, environ, avec de beaux éléments intérieurs (parquet, cheminées, escalier et boiseries) comprenant notamment au rez -de- chaussée, vaste entrée avec escalier dans la tour, grand salon et petit salon formant autre entrée, salle à manger, cuisine, grand dégagement. Au 1er étage. Grandes dépendances séparées dont ancien logement, écuries, garage, boxes et remise. Beau terrain attenant en nature de prés en bordure de route, joli parc avec grands arbres, belle allée d'accès, petit étang.","habitants":"\"","divers":"Château de Lalacelle         GPS : 48° 28' 34\" Nord, 0° 08' 32\" Ouest","gps":"48° 28' 34\" Nord, 0° 08' 32\" Ouest","images":["../image/image_61/61_Lalacelle_1.jpg","../image/image_61/61_Lalacelle_2.jpg","../image/image_61/61_Lalacelle_3.jpg","../image/image_61/61_Lalacelle_4.jpg"]},"Consult_chateau_formulairec727":{"id":"Consult_chateau_formulairec727","dept":"61","canton":"Ceton","commune":"Mâle","nom":"Launay_Male","type":"Manoir","periode":"XVI","histoire":"LAUNAY, fief mentionné pour la première fois en 1218. Sur les bases d'un moulin et d'un manoir qui lui est accolé, le manoir de Lonay est construit vers 1573-1575.","architecture":"LAUNAY, au cours des XVIIe et XVIIIe siècles, diverses modifications et extensions sont apportées au manoir, vers 1712, l'édifice est reconstruit et comprend une élévation à deux niveaux et est accosté de deux pavillons saillants. Il est doublé en profondeur par la création d'une façade sur jardin en pierre appareillée, largement percée. Extension à l'est de l'aile en rez-de-chaussée en 1740. En 1840, l'organisation du château est constituée par la création d'un lavoir à arches de pierre, à l'emplacement de l'ancien colombier. Parc à l'anglaise avec pièce d'eau rectangulaire. Au centre du parc, importante levée de terre représentant sans doute une ancienne motte castrale car maçonnée à sa base. Lors de l'aménagement du parc anglais, cette motte est convertie en limaçon dans les années 1830-1840.\r\nÉléments protégés MH : les façades et les toitures de l'ensemble des bâtiments du domaine : le logis, le lavoir, les communs bordant la cour d'honneur, le colombier, le moulin à grain et les deux bâtiments de la basse-cour, jardin d'agrément avec sa motte et son réseau hydraulique, et l'allée d'accès : inscription par arrêté du 10 novembre 2004.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Launay à Mâle\r\n48° 16' 16\" nord, 0° 44' 20\"  est","gps":"","images":["../image/image_61/61_Launay_Male_1.jpg","../image/image_61/61_Launay_Male_2.jpg","../image/image_61/61_Launay_Male_3.jpg","../image/image_61/61_Launay_Male_4.jpg"]},"Consult_chateau_formulaire6325":{"id":"Consult_chateau_formulaire6325","dept":"61","canton":"Vimoutiers","commune":"La Trinité des Laitiers","nom":"Lettiers","type":"Château","periode":"XVIII","histoire":"LETTIERS, domaine de la première moitié du XVIIIe siècle, agrémenté d'un parc à l'anglaise aménagé en 1843 par le paysagiste Varé, réaménagé en 1889 et pourvu en 1920 d'un important réseau hydraulique encore en état de marche. Le château est construit en briques. Mariage dans ce château de Luc Besson avec Virgine Silla en 1998.","architecture":"LETTIERS, domaine de la première moitié du XVIIIe siècle, de plan quadrangulaire agrémenté d'un parc à l'anglaise aménagé en 1843 par le paysagiste Varé, réaménagé en 1889 et pourvu en 1920 d'un important réseau hydraulique encore en état de marche. Le château est construit en briques.    Éléments protégés MH : les façades et les toitures du château ; la grande orangerie ; le parc, avec ses éléments constitutifs avenue, grille, douves et leurs balustrades, étang et sa vasque, jardin fleuriste avec ses murs, son bassin, sa serre et l'orangerie accolée; système hydraulique s'étendant sur les communes de Cisai-Saint-Aubin et La Trinité des Laitiers ; les façades et les toitures des communs qui abritent la citerne : inscription par arrêté du 4 septembre 1995.","habitants":"Luc Besson\r\n        \r\n        \"","divers":"48° 47' 52\" nord, 0° 22' 39\"  est","gps":"","images":["../image/image_61/61_Lettiers_1.jpg"]},"Consult_chateau_formulaire8e3d":{"id":"Consult_chateau_formulaire8e3d","dept":"61","canton":"Athis-de-l","commune":"Lignou","nom":"Lignou","type":"Château","periode":"XVI-XVIII","histoire":"LIGNOU, de Jacques d'Harcourt; les terres, plusieurs fois alliènée au XVIIIe siècle fut finalement vendue à Henri le Forestier de la Durandière dont la fille  l'apporta à la famille de Vauicelles de Ravigny.\r\nÉléments protégés MH : les façades et les toitures du château : inscription par arrêté du 8 mai 1973.","architecture":"LIGNOU;  a été construit en deux fois de pierre de granit et  brique. Le pavillon ouest et le corps de logis datent de 1592. Le pavillon Est fut bâti en 1830 pour équilibrer l'oeuvre inachevée. La façade sur cour d'honneur est ornée de deux tourelles octogonales. L'aménagement intérieur du château date du XIXe siècle, se compose de deux pavillons  qui encadrent le corps central constructions caractéristiques de la premier moitié du XVIIe siècle.","habitants":"Henri le Forestierde la Durandière\r\n        \"","divers":"GPS : 48° 40' 23\" Nord, 0° 20' 11\" Ouest","gps":"48° 40' 23\" Nord, 0° 20' 11\" Ouest","images":["../image/image_61/61_Lignou_1.jpg","../image/image_61/61_Lignou_2.jpg","../image/image_61/61_Lignou_3.jpg"]},"Consult_chateau_formulaireee3e":{"id":"Consult_chateau_formulaireee3e","dept":"61","canton":"Damigny","commune":"Lonrai","nom":"Lonrai","type":"Château","periode":"XVII-XIX","histoire":"LONRAI, le domaine, créé au XVIIe siècle, est l'un des grands domaines du département de l'Orne. En dépit d'une histoire mouvementée depuis la Révolution, et bien qu'entièrement remodelé au XIXe siècle, la seigneurie  fut illustrée par la famille de Silly et surtout celle de Goyon Matignon, puis passa  aux Colbert Seignelay et aux Montmorency-Luxembourg  et depuis 1892 propriété  de la famille du comte le Marois.  il forme un ensemble cohérent comprenant le château de Lonrai, la ferme et le haras aménagé en 1863 par Armand Donon. Le comte Le Marois, qui fit l'acquisition du domaine à la fin du XIXe siècle, donna un nouveau lustre au décor du château en faisant remonter dans le grand salon des boiseries de style pompéien de très grande qualité qui se trouvaient dans son hôtel parisien. Il s'entoura des meilleurs jardiniers pour agrémenter le parc et les abords du château. Il y installe un nouveau haras, désormais le domaine de Lonrai est lié à lunivers du cheval.","architecture":"LONRAI, de style Louis XIII et Louis XVI s'élève sur l'emplacement d'une forteresse médiévale. Célèbre pour ses haras, son parc de 180 hectares et son vaste château reconstruit au XIXe siècle.                                                                                           Éléments protégés MH : les façades et les toitures du château, ainsi que le grand salon avec l'ensemble de son décor; la cour d'honneur, avec les douves, les murs et les ponts; les façades et les toitures du logis, de la grange et des écuries de la ferme du château; les vestiges du colombier; le portail du potager et de la grande serre centrale; les façades et les toitures de l'orangerie, y compris son mur de clôture; les façades et les toitures de la maison du garde-chasse, à l'entrée dite \"des marronniers\"; les façades et les toitures de la maison du régisseur du haras et des box attenants; les façades et les toitures du bâtiment de la jumenterie du haras : inscription par arrêté du 14 décembre 1999. Le grand salon du château  : classement par arrêté du 21 juillet 2000.","habitants":"Famille de   Goyon Matignon\r\n        \"","divers":"GPS : 48° 27' 36\" Nord, 0° 02' 24\" Est","gps":"48° 27' 36\" Nord, 0° 02' 24\" Est","images":["../image/image_61/61_Lonrai_1.jpg","../image/image_61/61_Lonrai_2.jpg"]},"Consult_chateau_formulaireaf72":{"id":"Consult_chateau_formulaireaf72","dept":"61","canton":"Bagnoles-de-l","commune":"St-Roch-sur-Egrenne","nom":"Loraille","type":"Manoir","periode":"XVI-XVII","histoire":"LORAILLE, au XVIe siècle appartenait à François Maillard, au XVIIe siècle passe par alliance au  Dupont, la marquise de Maillard épouse Anne Dupont  lui apporte Loraille en dot , leur petit-fils en 1783 François Dupont de la Pesnière  commandant des gardes fait bâtir l'aile droite.  Henri-François est assassiné en 1795 dans son manoir, la fille d'Henri-François, héritière s'allie avec Pierre-Etienne de Langlois, sans descendance lègue  Loraille à un cousin Léon Montembault procureur impérial à Domfront leur fils Léon entreprend la restauration de la demeure.","architecture":"LORAILLE,  le corps de logis formait d'un grand pavillon quadrangulaire, coiffé d'une haute toiture en ardoise dont la façade postérieure et accostée d'une tour cylindrique, l'aile gauche et la tour ont été construits au XVIe siècle. L'aile droite du manoir a été bâtie en 1783. La tour contient l'escalier permettant l'accès des chambres de l'aile gauche et du pavillon, et comporte des meurtrières de défense. L'aile droite conserve des pièces ornées de boiseries Louis XV.\r\nÉléments protégés MH : les façades et les toitures du manoir et des communs ; l'escalier à vis et l'ensemble des cheminées intérieures : inscription par arrêté du 11 juillet 1975.","habitants":"Famille de François Maillard,\r\n        \"","divers":"Loraille                                                                                                 gps 48° 34' 10\"Nord , 0° 43' 11\" Ouest","gps":"","images":["../image/image_61/61_Loraille_1.jpg","../image/image_61/61_Loraille_2.jpg"]},"Consult_chateau_formulaire04c6-2":{"id":"Consult_chateau_formulaire04c6-2","dept":"61","canton":"Ceton","commune":"La Rouge","nom":"Lorière_la_Rouge","type":"Château","periode":"XVII","histoire":"LORIERE, en 1577 la terre de Lorière  est la possession des Neufville en 1700,  Lorière est acquis par la famille de Carpentin, François de Carpentin père de onze enfants fait raser et  fait édifier le château. A sa mort en 1755 l'aîné de ses fils  hérite de la Galaisière, Lorière passe aux mains d'un cadet qui meurt sans postérité le domaine échoit à un autre frère  Jean-François, mousquetaire de la garde du roi qui épouse une de ses cousines Marie-Joséphine-Françoise- Gabrielle  de Carpentin son mari émigre à la Révolution, c'est elle qui rachète le domaine vendu comme bien national, le domaine restera longtemps inhabité  au XIXe siècle, Jules  de Carpentin fils de Jean-François  et de Françoise à hérité des biens de sa mère a sa mort en 1840 , Lorière revient en héritage au Carpentin de la Galaisière en 1851 Elisabeth de Carpentin  apporte en dot à son mari monsieur Perraud  qui fait aménagé  le parc de Lorière au XIXe siècle par monsieur Perraud sur les labours qui entouraient le château depuis sa construction au XVIIIe siècle. Les travaux ont duré vingt ans de 1850 à 1870.  C'était un homme cultivé, fréquentant des artistes et des botanistes. Il est à l'origine des limites actuelles du parc, des allées de Sycomores et de marronniers qui ménagent les perspectives autour du château et aussi des nouveaux communs qui remplacent ceux du XVIIIe siècle. Ses successeurs se contenteront de laisser le parc se développer sans modifier sa structure, Lorière passe en 1866 par alliance aux Tassin de Montaigu en 1924, Mme de Louvencourt achète le domaine le conservera jusqu'en 1951 à appartenu ensuite à Louis Dubruel maire du Rouge et depuis 1976 à la famille Thomas.","architecture":"LORIERE, construit au XVIe siècle  d'architecture sobre et équilibré; corps de logis rectangulaire élevé sur deux étages   dont un de combles et flanqué à ses extrémités de deux pavillons carrés. La façade rythmée horizontalement   par un cordon mouluré qui court sous l'allège des baies de l'étage, s'ordonne autour d'un avant corps central en légère saillie   délimité par des chaînages de pierre.   La porte d'entrée cintrée à laquelle on accède par un  degré de cinq marches et surmontée par une fenêtre. Au dessus , la ligne du toit est interrompue  par un petit fronton triangulaire, la toiture basse en tuiles coupée par des mansardes deux sur le corps principal et une par pavillons.                                                       Éléments protégés MH : les façades et les toitures : inscription par arrêté du 26 octobre 1990. Le parc, lieu-dit Lorière: inscription par arrêté du 20 novembre 1992.","habitants":"famille de Carpentin,\r\n        \r\n        \r\n        \"","divers":"GPS : 48° 15' 50\" Nord, 0° 41' 17\" Est","gps":"48° 15' 50\" Nord, 0° 41' 17\" Est","images":["../image/image_61/61_Lori%c3%a8re_la_Rouge_1.jpg","../image/image_61/61_Lori%c3%a8re_la_Rouge_2.jpg"]},"Consult_chateau_formulairea0fd":{"id":"Consult_chateau_formulairea0fd","dept":"61","canton":"Bretoncelles","commune":"Nocé","nom":"Lormarin","type":"Manoir","periode":"XVI","histoire":"LORMARIN, les plus anciens possesseurs de Lormarin furent les de la Bretonnière, qui en étaient seigneurs au XVIe siècle. En 1569, René de la Bretonnière, épousait Anne Gravelle, dame de France et de la Thyonnière en Nocé. L'union d'une Jeanne ou Charlotte de la Bretonnière avec Jacques de Tascher, sieur de Beaulieu, procureur du roi à Bellême, fils de Esprit, écuyer, sieur de la Hallière et de René de Manceau, porta Lormarin en cette vieille et célèbre maison. Les Tascher fournirent la branche de la Pagerie illustrée par l'Impératrice Joséphine et celle, de Pouvrai. Bien que Lormarin ne leur appartint plus au XVIIe siècle, les Tascher en furent toujours qualifiés seigneurs. En 1668, le manoir de Lormarin devient propriété de la famille T
