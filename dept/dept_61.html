urpin, dont Pierre Philippe Turpin époux de Marie de Hallot, écuyer et gentilhomme de la vénerie du roi, seigneur de Lormarin. En 1668, acquisition du manoir par Philippe Turpin. En 1675, mariage entre Pierre Philippe de Turpin  et Marie de Hallot, en 1687, celui-ci a à son service Pierre de Leuze (v.1664-1704), bourgeois de Nocé, il  est à  l'origine d'une famille d'artistes peintres établis à Paris, dont Pierre Hyacinthe De Leuse (.1725-1811) et Jean-Charles Nicaise Perrin (1754-1831), allié à la famille.  Au courant du XIXe siècle, elle était possédée par Marie-Marguerite de Rosnyvinen, épouse de Louis-Auguste de Barville, qui la laissa par testament le 7 novembre 1802 à son neveu Pierre Louis Jacques François de Mésenge. Celui-ci en fit don, le 23 février 1840, par indivis, à ses deux fils René François qui épousa Juliette Bonnet de Bellou et Marie-Louis Auguste, uni à Marie-Elisabeth Ernestine de Kaerbout. M. Bothereau, de Nocé, en fit l'acquisition le 10 novembre 1846. et Alban Cristin l'achète en 1998.","architecture":"LORMARIN, le manoir de Lormarin a été édifié vers 1565, à mi-pente d'un vallon. Le logis de forme rectangulaire est flanqué de 2 tours aux angles tours rondes coiffées de toits en poivrière et son logis à hauts pignons de pierre, cette gentilhommière a noble allure, entouré de belles dépendances.  Corps de logis à pignons, accosté de trois tours, deux en avant et une à l'arrière renfermant l'escalier.  LAtelier dAlban, magasin dantiquités, est installé dans les communs du manoir et un gîte a été aménagé. Le fournil du XVIIe siècle, en ruine, a été restauré et aménagé.                L'édifice est inscrit sur l'Inventaire supplémentaire des monuments historiques depuis le 10 décembre 1926.","habitants":"Famille Turpin\r\n        \"","divers":"Lormarin\r\nGps 43° 45' 51\" Nord, 5° 21' 33\"  Est","gps":"","images":["../image/image_61/61_Lormarin_1.jpg","../image/image_61/61_Lormarin_2.jpg","../image/image_61/61_Lormarin_3.jpg"]},"Consult_chateau_formulaire0d5e":{"id":"Consult_chateau_formulaire0d5e","dept":"61","canton":"Domfront","commune":"Rouellé","nom":"Lyvonnière","type":"Château","periode":"XVI-XVII","histoire":"LYVONNIERE, le château d'origine du XVIe siècle a été construit au début du XVIIe siècle. M. Jacques Roulleaux Dugage, Conseiller général de l'Orne, y maintient les traditions qu'imposent deux siècles de présence familiale en ces murs, et y conserve notamment de nombreux souvenirs de Beaumarchais dont il est le descendant. La famille Roulleaux Dugage possède également le manoir de La Bérardière à Saint-Bômer-les-Forges,  Éléments protégés MH : le salon Henri IV avec ses boiseries : inscription par arrêté du 30 juin 2005.","architecture":"LYVONNIERE, de cette époque restent la partie sud du logis, son décor, les six travées de façade côté parterre et la tour d'escalier pour sa maçonnerie extérieure. A l'intérieur, l'actuelle salle à manger est lambrissée de boiseries de style Henri IV.  L'édifice subit des remaniements sans ses percements au XVIIIe siècle. Puis au XIXe siècle, remaniements avec l'adjonction au nord de deux pavillons saillants et le prolongement de deux travées du corps principal. Le grand salon est totalement réaménagé ainsi que l'escalier en vis. L'aménagement paysager date de cette époque.","habitants":"M. Jacques Roulleaux Dugage\r\n        \"","divers":"Lyvonnière à Rouellé\r\n48° 36' 37\" Nord, 0° 43' 22\" Ouest","gps":"","images":["../image/image_61/61_Lyvonni%c3%a8re_1.jpg","../image/image_61/61_Lyvonni%c3%a8re_2.jpg"]},"Consult_chateau_formulairecfef":{"id":"Consult_chateau_formulairecfef","dept":"61","canton":"Mortagne","commune":"Mahéru","nom":"Mahéru","type":"Château","periode":"XV-XVI","histoire":"MEHARU, plusieurs châteaux à Méharu et à Moulins-la-Marche              Les communes voisines sont Fay, Moulins-la-Marche, Saint-Aubin-de-Courteraie, Saint-Agnan-sur-Sarthe, Sainte-Gauburge-Sainte-Colombe. Mahéru fait partie de la communauté de communes des Pays de L'Aigle.                                                                                                           FALANDRE, château fondé au XIIe siècle et reconstruit au début du XVIe siècle par un maître maçon tourangeau, Jehan Frachet.","architecture":"château de FALANDRE à Mahéru des XVIe-XXe siècles, parc, propriété privée, pas d'historique actuellement. De plan  carré à quatre niveaux avec série de lucarnes  en chien assis sur combles toit en croupes et flanqué de tours carrées aux angles de la façade avant à toits pointus                                                                  A Moulin la Marche, château de la LOUVIERE le corps de logis de plan carré sur soubassement à deux niveaux,  lucarnes dans comble; l'édifice est accolé sur la droite d'un pavillon de plan rectangulaire  à trois niveaux toit en croupe avec lucarne en façade avec fronton arrondie.                                              Chateau de la FAI de plan rectangulaire à deux niveaux toit à deux pans avec pavillon d'entrée et hauteur de l'édifice avec un toit brisé.                                                                  château de la TILLIERE ; corps de logis central de quatre niveaux flanqué de tours carrées sur angles de la façade avant,  toit pointu en poivrière, l'édifice est flanque sur les deux flans droit et gauche de pavillons à deux niveaux avec lucarnes sur toit en croupes.","habitants":"Jehan Frachet\r\n        \"","divers":"A Mahéru le châteaude Falandre grav 1-2 , à Moulin la Marche la Louvière grav 3-4 de Fai grav 5 de Tillière grav 6-7","gps":"","images":["../image/image_61/61_Mah%c3%a9ru_1.jpg","../image/image_61/61_Mah%c3%a9ru_2.jpg","../image/image_61/61_Mah%c3%a9ru_3.jpg","../image/image_61/61_Mah%c3%a9ru_4.jpg","../image/image_61/61_Mah%c3%a9ru_5.jpg","../image/image_61/61_Mah%c3%a9ru_6.jpg","../image/image_61/61_Mah%c3%a9ru_7.jpg"]},"Consult_chateau_formulaire83ad":{"id":"Consult_chateau_formulaire83ad","dept":"61","canton":"Vimoutiers","commune":"Mantilly","nom":"Mantilly","type":"Château","periode":"XVIII","histoire":"MANTILLY, le manoir de Mantilly toujours resté dans la même famille depuis 400 ans, ses habitants pouvaient et pourraient encore y vivre en autarcie car toutes les dépendances et les ressources nécessaires à la vie quotidienne sont toujours en place : Gérard de la Peschardière, propriétaire vient de publier un ouvrage qui évoque lhistoire de la demeure mais aussi celle de son parc. Ayant effectué sa carrière dans le commerce des bois précieux, lauteur livre également, avec tact et sensibilité, quelques réflexions sur larbre ainsi que sur la gestion des forêts françaises et mondiales.                                                                                                                 le Manoir de la TOURNERIE, du XVIIIe siècle de plan rectangulaire à deux niveaux et série de  lucarnes sur combles toits en croupes.","architecture":"MANTILLY,  lensemble du bâti parfaitement conservé représente un patrimoine remarquable ouvert sur demande, aux visites organisées. Après la tempête de 1999, le parc de 4 Ha a été aussitôt déblayé, dessouché et replanté avec des essences plus variées. Et cest avec passion et amour des arbres que lauteur donne dans son livre des conseils sur le soin à apporter à lespace naturel arboré : qualité du sol, équilibre entre les résineux et les feuillus, esthétisme entre les arbres à feuilles caduques et persistantes. Il aborde aussi lusage de lart topiaire. Eléments structurants et fondamentaux pour nos paysages, les arbres doivent retrouver leur raison dêtre : brise-vent, régulateurs du régime des eaux, régénérateurs datmosphère, fournisseurs de bois duvre et de bois de chauffage  : le Manoir de la  Morinière.","habitants":"Gérard de la Peschardière,\r\n        \"","divers":"A Mantilly grav 1-2 la Morinière grav-3  la Tournerie grav -4                                            Mantilly  GPS : 48° 31' 18\" Nord, 0° 48' 00\" Ouest","gps":"48° 31' 18\" Nord, 0° 48' 00\" Ouest","images":["../image/image_61/61_Mantilly_1.jpg","../image/image_61/61_Mantilly_2.jpg","../image/image_61/61_Mantilly_3.jpg"]},"Consult_chateau_formulairefafc":{"id":"Consult_chateau_formulairefafc","dept":"61","canton":"La Ferté-Macé","commune":"Messei","nom":"Messei_61","type":"Château","periode":"XIII-","histoire":"MESSEY, au XIIe siècle, passe aux mains de Foulques Ier du Merle qui porte le titre de baron de Messei, pour demeurer près de trois siècles dans cette famille dont seront issus notamment Foulques du Merle, maréchal de France en 1302 et Guillaume VIII du Merle, son petit-fils, compagnon de du Guesclin , qui reprend le titre. Ce dernier ordonne en 1363 aux habitants d'amener  le nécessaire à réparer la forteresse. En 1357, il fait confirmer ses droits sur ses sujets de Messei. Ses exigences deviennent si insupportables que des plaintes sont portées contre lui par la population auprès du bailli du comte d'Alençon et même du Parlement de Paris. La bourgeoisie franche qui existait à Messey à cette époque était en effet décidée à faire valoir ses droits. En 1374, Guillaume du Merle, capitaine-général en Basse-Normandie et gouverneur de Falaise, est baron de Messey comme l'avaient été ses aïeux depuis le XIIe siècle, notamment son grand-père Foulques du Merle, maréchal de France en 1302. Lors de la guerre de Cent Ans, le château est pris par Philippe de Navarre qui le livre aux Anglais en 1356. Le traité de Brétigny le rend à la France en 1360 mais le château ne sera définitivement libéré que vers 1450 sous le règne de Charles VII. Entre temps, en 1402, Catherine, fille unique de Guillaume VIII du Merle, avait épousé Henri de Bailleul à qui elle avait transmis le domaine. la fin du XVe siècle, le château appartient à Pierre de Grippel, puis à son fils, Guillaume de Grippel qui meurt en 1550. Guillaume du Grippel, baron de Messei, étant mort sans enfants mâles, vers 1550, sa succession se partagea entre ses deux surs, Louise, épouse de Robert du Bourg, seigneur de Rieux, qui reçut le château, le fief et la seigneurie, la cour et usages, justice, juridiction, relief, etc... et Marie, épouse de Charles Mallet, seigneur de Heussé, qui obtint la terre, seigneurie et dépendances de Saint-André-de-Messei, la forêt resta indivise.","architecture":"Vers 1557, Louise, à qui revient le château de Messey, vend sa part et l'échange contre une autre terre avec Jean de Bailleul, sieur du Renouard. En 1582, il entre dans la famille de Souvré, par le mariage de Françoise de Bailleul avec Gilles de Souvré, gouverneur de Louis XIII pendant son enfance, et maréchal de France. Son fils cadet, Henri de Souvré, en hérita. En 1589, lors des guerres de religion, le château fut en partie démantelé, avec plusieurs pièces de canon, par les Ligueurs, malgré la surveillance du duc de Montpensier. En septembre 1621, René de Souvré obtient de Louis XIII l'érection de la baronnie de Messey en marquisat, en faveur de son fils Joseph de Souvré qui meurt sans postérité en 1685, sous le règne de Louis XIV. Le château échut alors à Anne de Souvré, petite-nièce de René de Souvré, qui épousa en 1662, le jeune ministre Louvois qui devint marquis de Messey. En 1686, celui-ci obtient que l'érection de la baronnie en marquisat soit maintenue en sa faveur. En 1750, il est vendu par les arrière-petits-enfants de Louvois, héritiers de Marie-Madeleine Letellier de Louvois de Barbezieux, duchesse François d'Harcourt, au comte de Flers, Ange Hyacinthe de La Motte-Ango. Lors de la Révolution, le château est abandonné. En 1806, il est acheté par un Prussien, le comte von Redern, fils d'un maréchal de Prusse et diplomate en Espagne et en Angleterre, qui le revend en 1820 aux Schnetz, notaires à Paris. Philippe Schnetz, fils des notaires, décide de le faire démolir vers 1850 afin de servir de carrière de matériaux pour la construction de la ferme de la Fonte. Ce château flanqué de douze tours, construit au XIe siècle, possédait de larges et profondes douves, un pont-levis, une chapelle sous le patronage de Saint-Jean-Baptiste, une prison et deux cachots, ainsi qu'une basse-cour. Au début du XIXe siècle, douze tours existaient encore. Du château ne subsistent que la motte entourée des douves, et un pan de mur inclus dans le bâtiment agricole. La motte a passé pour être un lieu d'exécution, et un lieu où les seigneurs tenaient quelque fois les plaids.","habitants":"Baron de Messey\r\n        \"","divers":"48° 42' 20\" nord, 0° 32' 25\" ouest","gps":"","images":["../image/image_61/61_Messei_61_1.jpg","../image/image_61/61_Messei_61_2.jpg"]},"Consult_chateau_formulairef62a":{"id":"Consult_chateau_formulairef62a","dept":"61","canton":"Magny-le-Désert","commune":"Méhoudin","nom":"Monceaux","type":"Manoir","periode":"XVI","histoire":"MONCEAUX, ce manoir du XVIe siècle. Propriété d'Henri Gonse en 1912, il a été racheté en 1915 par son cousin Octave Join Lambert qui l'a fait reconstruire à l'identique en 1920 mais avec une ossature en béton armé par François Benjamin Chaussemiche, architecte en chef du château de Versailles. Les jardins, complétés par Gonse et Join Lambert en 1912 et 1920 (date de construction de l'orangerie), présentent tout un ensemble d'arbres taillés qui font de cette propriété un haut lieu de l'art topiaire aujourd'hui.","architecture":"MONCEAUX , ce manoir  fut ensuite reconstruit de 1730 à 1740 : les premiers jardins, d'inspiration italienne, datent de cette époque. Le château de Monceaux et son parc sont inscrits aux M.H. depuis le 31/08/1993. Éléments protégés MH : l'avenue d'accès et l'avenue qui lui est perpendiculaire ; la cour d'honneur, avec ses murs, ses saut-de-loup et sa grille ; les façades et les toitures du château, des communs et de la maison du jardinier, de l'orangerie et des bâtiments de la ferme ; les terrasses, avec leurs murs, leurs escaliers, le bassin rond, le théâtre à l'italienne, y compris les parterres avec leurs charmilles et leurs topiaires : inscription par arrêté du 31 août 1993.","habitants":"François-Benjamin Chaussemiche,\r\n        \"","divers":"Monceaux .  GPS : 48° 30' 04\" Nord, 0° 23' 05\" Ouest","gps":"48° 30' 04\" Nord, 0° 23' 05\" Ouest","images":["../image/image_61/61_Monceaux_1.jpg","../image/image_61/61_Monceaux_2.jpg"]},"Consult_chateau_formulairee116":{"id":"Consult_chateau_formulairee116","dept":"61","canton":"Mortagne au Perche","commune":"Mortagne au Perche","nom":"Mortagne_Perche","type":"Château","periode":"XVI-XVIII-XIX","histoire":"Trois châteaux à Mortagne dont Forgetterie, Prulay et Gohyère. PRULAY, à Saint-Langis-lès-Mortagne,  la construction du château de Prulay date de 1857. construit par la Famille de Bonvoust L'architecte paysagiste était Berthault Louis-Martin. Le parc du château, créé en 1807, fut dessiné par Louis-Martin Berthault. C'est Pierre-Isaac Poissonnier, Professeur de Médecine du Collège Royal, conseiller d'État et médecin du roi Louis XV, qui fit construire le château. La propriété fut rachetée en 1814 à sa belle-fille Henriette Gabrielle-Filhastre  Duriez, Baronne de Prulay, par André-François-Emmanuel Aubin de Blanpré (1771-1849), ancien membre de la Garde constitutionnelle du Roi, revenu s'établir en France après la Révolution. Le château de Prulay passa au fils de ce dernier, Pierre-Marie Aubin de Blanpré (1806-1852), ancien Saint-Cyrien, officier de cavalerie au régiment de cuirassiers de Berry, maire de Saint-Langis-lès-Mortagne et conseiller général de l'Orne, marié à Caroline-Stéphanie de Préval, fille du Vicomte Claude-Antoine-Hippolyte de Préval, et d'Anne-Marie-Caroline Turgot, petite-nièce de Turgot, ministre de Louis XVI. Le château fut vendu par les Blanpré en 1849 au comte Aimé de la Rivière (1804-1885), également ancien Saint-cyrien, officier du sixième Chasseurs.  Son fils Paul Clair de la Rivière (1849-1923) hérita du château à la mort de son père. Ses deux enfants Marie-Charles \"Henri\" de la Rivière (1877-1949), ancien maire de Sées et Cécile de la Rivière (1882-1954) naquirent au château qui devint la propriété de la famille de l'époux de cette dernière en 1905. Propriété du vicomte de Kermoisan.","architecture":"FORGETTERIE, non loin de Mortagne au Perche, la demeure actuelle, située au milieu d'un très beau parc, entourée de deux moulins (Radray et Boivin), est une demeure construite au XVIIIe siècle. Ce château de La Forgetterie, plein de charme, fut soigneusement restauré par son propriétaire actuel, le comte de France de Tersant.                                                                                                                    GOHYERE a cinq K.M au sud-est à Saint-Mard  de Reno le château a été construit au XVIe siècle. Cette coquette demeure possède deux échauguettes en encorbellement et une tour. Le château fut complètement restauré au début du XXe siècle et les bâtiments agrandis. Le domaine appartient à M. de Heurtaumon.                                                  PRULAY, le château comprend un corps de ferme longitudinal de la fin du XVIIIe siècle et une orangerie, construite vers le milieu du XIXe siècle. Le moulin de Prulay, cité dès 1702 et modifié à la fin du XVIIIe siècle, a néanmoins conservé des éléments de décor sur son élévation principale. Éléments protégés MH : les façades et les toitures du château ; la salle de billard ; la salle à manger et le bureau ovale, avec leur décor ; l'escalier ; le parc ; les vestiges des fabriques (temple et glacière) et les sculptures ; la chapelle ; les façades et les toitures de la vacherie attenante ; le pavillon des bains ; les façades et les toitures du corps de ferme ; les façades et les toitures de l'orangerie ; le potager avec ses murs de clôture et son portail d'accès ; les façades et les toitures du moulin de Prulay: inscription par arrêté du 26 juin 1998.                                                                                                           Le château de MORTAGNE est devenu un bel hôtel-restaurant.","habitants":"Prulay; Famille de Bonvoust                                               Forgetterie :le Comte de France de Tersant                       Gohyére;  M. de Heurtaumont.  \r\n        \"","divers":"trois châteaux à Mortagne dont Forgetterie grav-6, Prulay grav-3-4  et Gohyère grav-5 Mortagne grav 1-2 GPS : 48° 31' 13\" Nord, 0° 32' 50\" Est                                                             Prulay  GPS : 48° 29' 48\" Nord, 0° 31' 41\" Est","gps":"48° 31' 13\" Nord, 0° 32' 50\" Est","images":["../image/image_61/61_Mortagne_Perche_1.jpg","../image/image_61/61_Mortagne_Perche_2.jpg","../image/image_61/61_Mortagne_Perche_3.jpg","../image/image_61/61_Mortagne_Perche_4.jpg","../image/image_61/61_Mortagne_Perche_5.jpg","../image/image_61/61_Mortagne_Perche_6.jpg"]},"Consult_chateau_formulaireb855":{"id":"Consult_chateau_formulaireb855","dept":"61","canton":"Magny-le-Désert","commune":"La Motte Fouquet","nom":"Motte_Fouquet","type":"Château","periode":"XVII-XIX","histoire":"La-MOTTE,  très ancienne seigneurie de haute et basse justice, dont l'origine date du XIIe siècle (les premiers documents que l'on connaisse datent de 1263-1267). De chaque côté de la cour d'honneur et reliés à la maison principale par des écrans de pierre et une chapelle, des communs géants terminés à l'orgueil par des pavillons Louis XIV. Ces communs ont été construits vers 1670, selon toute vraisemblance, par le père des frères Gabriel, les architectes de la place de la concorde à Paris, originaires d'Argentan. La chapelle terminée en 1699 est dédiée à Saint Hubert et remplace un oratoire plus ancien datant de 1582. Le château fut construit au XVIIe siècle sur des vestiges des XVe (tour carrée) et XVIe siècles (tourelle accolée à la tour carrée).   Le domaine du château dispose aussi d'une cidrerie de la fin du XVIIe siècle, qui n'est pas protégée. L'orangerie date de 1804. L'écrivain allemand Friedrich de La Motte-Fouquet, auteur de Sigurd et de l'Anneau magique, est un descendant de la famille des La Motte-Fouquet, famille huguenote, propriétaires du château exilés à la suite de la révocation de l'édit de Nantes.   Éléments protégés MH : les façades et les toitures du château, des deux ailes des communs, de la charretterie et du moulin ; la chapelle ; le porche à bossages : inscription par arrêté du 14 novembre 1980.","architecture":"La-MOTTE, les constructions annexes de la basse-cour, accolées à la cour d'honneur, qui constituent des bâtiments d'exploitations, s'élèvent de la fin du XVIe siècle au début du XVIIe siècle en particulier les arcades de bois de la charretterie. Les siècles suivants apporteront seulement quelques modifications, le perron en 1781 et l'Orangerie en 1804. Suites dans l'une des dépendances du château donnant sur la cour d'honneur d'un côté et sur les étangs de l'autre.                                                                                              A trois K.M. au sud à St-Patrice du Désert le manoir du PETIT-JARD   Le château était inclus, jusqu'au début du XIXe siècle, dans le domaine de la Motte-Fouquet. Les seigneurs de la Motte y avaient construits, au XVIIIe siècle, un pavillon de chasse. Entre 1868 et 1883, l'ancien pavillon est détruit par les nouveaux propriétaires et un ensemble de bâtiments est construit. Outre le logis, s'ordonnent autour d'une cour des écuries, une remise à voitures, un chenil, une orangerie et une maison du piqueur partiellement détruite par des bombardements de 1940. Ces bâtiments présentent une polychromie brique et pierre ainsi que des détails néo-gothiques. Les dispositions intérieures ont été conservées.\r\nÉléments protégés MH : les façades et les toitures du logis ; le vestibule ; la bibliothèque ; le petit salon et le grand salon ; la salle à manger ; l'écurie et le chenil ; le potager et la serre ; les façades et les toitures des autres bâtiments : inscription par arrêté du 11 septembre 2005.","habitants":"Friedrich de La Motte-Fouqué\r\n        \"","divers":"Deux châteaux à la Motte-Fouquet dont celui de mla Motte grav 1-2-3-4 et de Petit-Jard grav-4                                           La Motte GPS : 48° 34' 05\" Nord, 0° 17' 06\" Ouest                                                            Petitjard GPS : 48° 32' 31\" Nord, 0° 18' 07\" Ouest","gps":"48° 34' 05\" Nord, 0° 17' 06\" Ouest","images":["../image/image_61/61_Motte_Fouquet_1.jpg","../image/image_61/61_Motte_Fouquet_2.jpg","../image/image_61/61_Motte_Fouquet_3.jpg","../image/image_61/61_Motte_Fouquet_4.jpg","../image/image_61/61_Motte_Fouquet_5.jpg"]},"Consult_chateau_formulaire03c4":{"id":"Consult_chateau_formulaire03c4","dept":"61","canton":"Sées","commune":"Médavy","nom":"Médavy","type":"Forteresse","periode":"XV-XVII","histoire":"MEDAVY, en 1424 Jean Rouxel  épousa l'héritière de Médavy dont il prit le nom. Jacques Rouxel trés bien en cour auprès du roi Henri III obtient l'érection de sa terre en baronnie. Son fils, pierre  épouse la fille du maréchal  de Fervaques, Guillaume de Hautemer et hérite de son titre de duc de Gancey. Sous le règne de Louis XIII Jacques Rouxel, comte de Médavy et de Grancey obtient le bâton de maréchal, son petit-fils Jacques-Léonor sera le second à porter le titre.  Le château construit par le maréchal de France Rouxel, à partir du milieu du XVIIe siècle reflète au plus haut point la noble ordonnance du grand siècle. En 1733 Médavy ruinés par le coût de la reconstruction des châteaux de Médavy et de Grancey,  Médavy est cédé au maréchal de Tallard, ce dernier le revend en 1754 à un riche financier, Pierre Thiroux de Monregard trésorier du roi. Pendant la Révolution, son fils fait bûcher les armoiries sculptées en haut des frontons des pavillons. En 1823 Médavy est vendu à Mme Labbey de la Roque. Son neveu François de Tertu, puis les enfants de ce dernier, le comte et la comtesse de Maussion lui succèdent. le château change une nouvelle fois de mains en 1920, Henri de Peyerimhoff  de Fontenelle grand financier et en 1959 après la mort d'Henri ses héritiers se défont du domaine au profit du général de Grancey  qui s'éteindra en 1976, la veuve du général confie aux soins éclairés de Mr et Mme Maurice Rey éleveurs de chevaux.","architecture":"MEDAVY, ancienne place forte, Médavy étonne par ses tours du XVe siècle et ses douves alimentées par l'Orne,  dans une enceinte médiévale. En 1703 Jacques-Léonor entreprend d'édifier  un nouveau château sur les fondations subsistantes. L'Edifice s'ordonne autour d'un avant corps central  dont le fronton curviligne est sommé d'un ressaut en demi-cercle.  que prolongent deux ailes terminées  par deux gros pavillons en saillie, bien qu'édifié au début du XIIIe siècle l'ensemble est coiffé de Combles à la Mansart, relié au nord-Est à la tour Cormeilles coiffée d' un dôme à lanternon comme les deux tours du Sud. A l'intérieur où l'on peut admirer un riche mobilier d'époque, divers salons dont le grand salon avec son exceptionnel parquet \"marqueté en soleil\", ainsi que la salle des cartes où est notamment exposée une collection très rare d'atlas anciens.  Au XIXe siècle un incendie détruit  la partie ouest du château plus tard remplacé par une aile fonctionnelle, et la tour Cormeilles s'éffronde dans l'Orne.            Éléments protégés MH : le château, sauf parties classées : inscription par arrêté du 22 octobre 1926. Les façades et les toitures du château ; la tour Saint-Pierre ; la tour Saint-Jean-Baptiste abritant la chapelle, y compris les décors intérieurs ; les allées de tilleuls subsistantes ;  les douves avec leurs trois ponts ; les terrasses avec leurs balustrades ; la grille d'entrée et les sauts-de-loup attenants : classement par arrêté du 7 juillet 1989. Les façades et les toitures de l'ensemble des communs ; le colombier : inscription par arrêté du 7 juillet 1989.","habitants":"Famille de Rouxel\r\n        \"","divers":"Médavy GPS 48° 40' 43\" nord, 0° 05' 52\" est","gps":"","images":["../image/image_61/61_M%c3%a9davy_1.jpg","../image/image_61/61_M%c3%a9davy_2.jpg","../image/image_61/61_M%c3%a9davy_3.jpg","../image/image_61/61_M%c3%a9davy_4.jpg","../image/image_61/61_M%c3%a9davy_5.jpg","../image/image_61/61_M%c3%a9davy_6.jpg","../image/image_61/61_M%c3%a9davy_7.jpg"]},"Consult_chateau_formulaireceb2":{"id":"Consult_chateau_formulaireceb2","dept":"61","canton":"Vimoutiers","commune":"Ménil-Hubert-en-Exmes","nom":"Ménil_Hubert","type":"Château","periode":"XVIII","histoire":"MENIL-HUBERT en EXMES, la construction du château actuel remonte aux années 1780. Il s'agit d'un bâtiment en pierre calcaire. En 1823, le domaine est vendu à Auguste Valpinçon qui y accueillera, en 1859, le peintre Edgar Degas. Il sera logé au premier étage de la demeure et son atelier sera aménagé dans le pavillon de briques. Le château est bâti selon des proportions très étudiées et comprend toute une série de bâtiments et de fabriques, pratiquement toutes ajoutées au XIXe siècle ainsi qu'un réseau hydraulique très important (dont un bassin \"la poire\", qui agrémente le parc), un parc paysager, un ancien potager, des serres etc. Cet ensemble présente un intérêt architectural en tant qu'ensemble domanial témoignant d'une activité économique autarcique mais également un intérêt artistique par la présence de la famille Valpinçon et ses liens avec Degas.","architecture":"MENIL-HUBERT  en EXMES, l'édifice est typique de l'époque de Louis XVI.\r\nLe parc, vaste de 80 ha  ou de un ha selon une autre source, est dû à la période durant laquelle les Valpinçon ont possédé le domaine qui comporte en outre une futaie et un potager. Les éléments hydrauliques sont remarquables avec un lac artificiel et un bassin destiné aux loisirs, .Le domaine est parsemé d'édifices secondaires datés surtout du XIXe siècle : une scierie, un lavoir restauré, les écuries, la charretterie, les maisons du gardien et du régisseur. Tous ces édifices témoignent d'une économie du domaine tournée vers l'autarcie. L'atelier d'Edgar Degas existe toujours. Éléments protégés MH : les façades et les toitures du logis ; les façades et les toitures de l'ensemble des bâtiments composant le domaine, à l'exception de l'écurie nord et du lavoir ; le parc avec son parterre composé et l'ensemble de ses aménagements hydrauliques : inscription par arrêté du 3 décembre 2010.","habitants":"Famille d' Auguste Valpinçon\r\n        \r\n        \"","divers":"Ménil-Hubert-en-Exmes  gps 48° 48' 47\" N, 0° 13' 34\" Est","gps":"","images":["../image/image_61/61_M%c3%a9nil_Hubert_1.jpg","../image/image_61/61_M%c3%a9nil_Hubert_2.jpg"]},"Consult_chateau_formulaire6373":{"id":"Consult_chateau_formulaire6373","dept":"61","canton":"Argentan","commune":"Ommoy","nom":"Ommoy_Trun","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article Ommoy et Raveton  et à trois K.M au sud -Est Trun et Demi-enfants à Coulonces                                                                                                  OMMOY, demi fief appartenant en 1636 à Pierre de la Haye, écuyer, château construit au XVIIIe siècle. Appartenant au XIXe siècle à la famille Desplas. Le bâtiment, de plan régulier, se compose d'un étage carré, le gros-oeuvre en calcaire, moellon, enduit, élévation à travées, surmontée de toit à longs pans, toit en pavillon, pignon couvert, et croupe recouverts d'ardoise et de tuiles plates. Portail remarquable.                                                                            DEMI-ENFANT, à Coulonces, Fief appartenant en 1666 à Gabriel de Ruppières. Logis bâti au milieu XVIIe siècle, remanié au XXe siècle. De Jumière, un mauvais chemin conduit à Mi-Enfant, à droite l'ancienne ferme du château, à gauche l'ancien logis seigneurial, séparé du chemin par le ruisseau de Coulonces, élargi en douve et par une cour d'honneur. C'est une construction de l'époque Louis XIII, à un étage dont la façade principale est décorée de deux pilastres en bossages supportant un fronton triangulaire. La toiture est percée de quatre lucarnes de pierre à baies ovales, il n'en subsiste que trois, la toiture est ornée d'épis. A l'intérieur, au premier étage, une chambre garnie de boiserie et de deux belles cheminées de pierre. Ce château est assis sur une cave que l'eau parfois envahit bien qu'en son sous sol soit aménagé un canal d'écoulement. Cette cave est construite avec soin et voûtée en berceau, elle semble antérieure à l'édifice actuel.","architecture":"A Montabard au nord de OMMOY à cinq K.M.  RAVETON, château construit au début du XVIIe siècle pour André de Monteclerc (1600-1657), en remplacement d'un château signalé entouré de fossés en 1581. La façade est restaurée en 1875 pour Léon Samuel de Laval-Montmorency. Fondation de la chapelle Notre-Dame en 1641, et détruite. Françoise Marie du Viel, patrone de Montabard demande une chapelle domestique en 1773, elle est situé dans le jardin dans un vaisseau fort beau, la moitié en est partagée par une cloison jusqu'à la couverture et au bout dudit vaisseau il y a la chapelle très propre avec un autel bien orné et un tableau bien récent. On a rien construit de neuf, on n'a fait que parfaire les murs et les blanchir, de plan symétrique, élévation ordonnancée à un étage carré,  étage de comble avec  escalier dans-oeuvre,  escalier tournant à retours avec jour  calcaire , toit à longs pans , croupe, noue, toit en pavillon  en  ardoise et tuile plate.                                                                                                                             BAILLEUL,  à deux K.M au sud -est  château fort à motte élevé au XIe siècle par Rainault de Bailleul; le château actuel est construit au XVIIIe siècle. L'édifice, de plan régulier, se compose d'un étage carré, le gros-oeuvre en calcaire; moellon enduit, élévation à travées surmontée de toit à longs pans et croupe, couverts de tuile plate et ardoise.","habitants":"Ommoy;Famille de   Pierre de la Haye                                                     Raveton André de Monteclerc\r\n        \"","divers":"plusieurs  châteaux dans cet article Ommoy grav-1 et environ  Ommoy Raveton grav 8 à Montabard , bailleul grav -2 , Coulonces grav 3-4 -5  Demi-Enfant grav 6-7                                           Ommoy gps  48° 51' 19\" nord, 0° 01' 23\"ouest","gps":"","images":["../image/image_61/61_Ommoy_Trun_1.jpg","../image/image_61/61_Ommoy_Trun_2.jpg","../image/image_61/61_Ommoy_Trun_3.jpg","../image/image_61/61_Ommoy_Trun_4.jpg","../image/image_61/61_Ommoy_Trun_5.jpg","../image/image_61/61_Ommoy_Trun_6.jpg","../image/image_61/61_Ommoy_Trun_7.jpg","../image/image_61/61_Ommoy_Trun_8.jpg"]},"Consult_chateau_formulaire0320-2":{"id":"Consult_chateau_formulaire0320-2","dept":"61","canton":"Vimoutiers","commune":"Aubry-le-Panthou","nom":"Osmont","type":"Château","periode":"XVIII","histoire":"OSMONT, château construit dans la première moitié du XVIIIe siècle, à la suite de la création en 1719 du marquisat d'Osmont, en l'honneur de René Henri d'Osmont, réunissant les terres possédées par ce dernier à Aubry-le-Panthou, la Fresnaie-Fayel, le Mesnil-Froger et Roiville. En 1734, l'édifice paraît avancé, puisqu'un mariage est célébré dans la chapelle du château. Il passe ensuite par héritage à la famille d'Escorches et est utilisé comme dépendance après la construction du nouveau château en 1860. Construction de nouvelles écuries dans la seconde moitié du XIXe siècle, destruction d'une partie des bâtiments figurant sur le cadastre de 1827. Au XXe siècle y sont installés : une école, un établissement conventuel jusqu'en 1971, puis un centre bouddhiste. Logis en brique et pierre, couvert d'un toit en croupe brisée; logements de la deuxième cour en pierre de taille et colombier octogonal en pan de bois enduit, couvert d'un toit conique ; écuries en brique.","architecture":"OSMONT, ce château, un des plus beaux du département de l'Orne, fut construit en 1860 par Caron, architecte à Paris, pour Charles Eustache Gabriel, marquis d'Osmond. Acheté à la fin du XIXe siècle par l'industriel Eugène Laniel. Au cours de la deuxième moitié du XIXe siècle, aménagements de serres, orangerie, jardin d'agrément, jardin potager, logement pour le régisseur du domaine, logement pour le garde chasse et écuries dans la cour du premier château d'Osmont. La façade principale est tournée au nord, le corps de logis se compose d'un entresol, d'un rez-de-chaussée, d'un premier étage et d'un deuxième en mansardes, avec des combles au-dessus. Les matériaux employés sont la pierre blanche pour les angles et la bordure des ouvertures. Les fenêtres sont surmontées d'archivoltes et divisées en quatre compartiments par des meneaux en pierre formant la croix.","habitants":"famille d'Escorches et  Charles Eustache Gabriel, marquis d'Osmond\r\n        \"","divers":"Osmont gps 48° 51' 02\" nord, 0° 13' 57\" est","gps":"","images":["../image/image_61/61_Osmont_1.jpg","../image/image_61/61_Osmont_2.jpg","../image/image_61/61_Osmont_3.jpg","../image/image_61/61_Osmont_4.jpg"]},"Consult_chateau_formulairebe78":{"id":"Consult_chateau_formulairebe78","dept":"61","canton":"Mortagne-au-Perche","commune":"Le Pin la Garenne","nom":"Pellonnière","type":"Château","periode":"XV-XVIII","histoire":"PELLONNIERE, le fief de la Pellonnière au XIIIe siècle possession de la famille du Pin. Au cours du XIIIe siècle à Geoffroy d'Hilliers qui le transmet aux Hersée avant de venir par alliance  aux Cochefilet,   Durant les guerres de Cent-ans, Henri V d'Angleterre en prit possession. En 1425  la seigneurie passe par alliance à la famille du Grenier, Robert du Grenier époux de Marguerite de Cochefilet refuse de se soumettre au roi d'Angleterre, le château est confisqué et remis entre les mains d'un parent de sa femme il en reprendra possession en 1444 en mauvais état,  donc reconstruction du château par René du Grenier, époux de Marguerite de Gaignon. Un autre René tient la seigneurie  de sa grand-mère Anne Martel   épouse de Loup du Grenier, prend le titre de marquis d'Oléron époux d'Anne du Maillé, à leur décès  les biens passent à un neveu François de Maillé, marquis de Benehart qui cède le domaine aux  comte de Gersant. Au XVIIIe siècle Charles-François le comte de Gersant conseiller à la cour des monnaies, sa petite-fille épouse Jean-Baptiste de Patu de st-Vincent dernier seigneur de la Pellonnière qui ne seront pas inquiétés à la Révolution par leur réputation de charité,  transmette à leur fils  Cyrille-Jules sans postérités celui-ci lègue le domaine à une nièce de son épouse la comtesse de la Rivière Pré-d'Auge, la fille de cette dernière Anne-Marie de la Rivière fait donation de ses biens à une communauté religieuse qui en 1970 au décès de la testatrice  y installe une maison de retraite,  depuis 1995 Pellonnière devient une propriété particulière attribué à l'association des amis de la Pellonnière acquit par M.M Lautré et Alvarez propriétaires actuels.","architecture":"PELLONNIERE, au Moyen-Age, l'ancien château se trouvait près de l'église paroissiale. Il fut détruit dans les guerres qui opposèrent la famille de Bellème aux Giroie et aux ducs de Normandie. Au XIIIe siècle, le château fut transféré sur la colline, à l'emplacement du château actuel. Au XVe siècle, le bâtiment était pratiquement en ruine. Il fut rasé et un château fut construit à partir du quadrilatère entouré de douves qui délimitait les quatre côtés de la place forte du XIIIe siècle. Le logis seigneurial possède une haute tour pentagonale.  Sous le règne de Henri IV, une campagne de travaux fut entreprise avec l'édification d'un pavillon rectangulaire avec mâchicoulis, d'un pigeonnier et d'une porte d'entrée défendue par deux tours latérales. Au début du XVIIIe siècle édification d'un bâtiment en équerre réunissant le logis primitif au pavillon situé à l'angle nord de la cour d'honneur. Au XIXe siècle, une tour néo-gothique a été accolée au pavillon Henri IV.  Éléments protégés MH : les façades et les toitures du logis du XVe siècle, du pavillon d'angle, du colombier, de l'entrée et du logis d'angle du château : inscription par arrêté du 29 juin 1967.","habitants":"Famille du Grenier\r\n        \"","divers":"GPS : 48° 26' 19,5\" Nord, 0° 32' 17,87\" Est","gps":"48° 26' 19,5\" Nord, 0° 32' 17,87\" Est","images":["../image/image_61/61_Pellonni%c3%a8re_1.jpg","../image/image_61/61_Pellonni%c3%a8re_2.jpg","../image/image_61/61_Pellonni%c3%a8re_3.jpg","../image/image_61/61_Pellonni%c3%a8re_4.jpg","../image/image_61/61_Pellonni%c3%a8re_5.jpg","../image/image_61/61_Pellonni%c3%a8re_6.jpg"]},"Consult_chateau_formulairef472":{"id":"Consult_chateau_formulairef472","dept":"61","canton":"Bretoncelles","commune":"Saint Maurice sur Huisne","nom":"Perrignes","type":"Manoir","periode":"XV-XVII","histoire":"Des PERRIGNES,  Macé Louel acquiert Perrignes en 1455 et fait bâtir la tour au cours du XVe siècle. Le logis fut construit par la famille Brisart. Il fut remanié au XVIIe siècle. Henry-Joachim de Chevessailles, qui comparut en 1789 parmi les nobles du Perche, en hérita au XVIIIe siècle.  Lancien château-fort des Perrignes du XIVe-XVe siècles, comptait parmi les plus ravissants jardins réguliers du Perche. Il s'inscrit dans un site particulièrement attractif, niché dans un vallon formé par l'Huisne. Au milieu du XVe siècle, Macé Louel qui tenait le fief de Perrignes, fit élever la tour actuelle formant retour d'équerre. Au XVIe siècle, la famille Brisart bâtit le logis.                                                                 château des VERGER pas d'information.","architecture":"Des PERRIGNES, de profonds remaniements eurent lieu au XVIIe siècle: construction de la chapelle en 1623, création sur le logis d'un imposant toit en pavillon avec souche de cheminée. Un plan du XVIIIe nous restitue avec précision chaque partie du manoir et ses plans de circulation par rapport au parterre à la Française et à la cour où se trouvaient les communs. En 1826 la propriété se trouva démembrée suite à des difficultés successorales. Un colombier, aujourd'hui aménagé en habitation, rappelle l'importance du fief sous l'Ancien Régime.\r\nÉléments protégés MH : les façades et les toitures, ainsi que l'escalier du logis ; les façades et les toitures du colombier ; le jardin et ses murs de clôture : inscription par arrêté du 24 novembre 1998.","habitants":"famille Brisart\r\n        \"","divers":"Château de Perrignes; GPS : 48° 26' 05\" Nord, 0° 42' 19\" Est                           Verger grav -4","gps":"48° 26' 05\" Nord, 0° 42' 19\" Est                           V","images":["../image/image_61/61_Perrignes_1.jpg","../image/image_61/61_Perrignes_2.jpg","../image/image_61/61_Perrignes_3.jpg","../image/image_61/61_Perrignes_4.jpg"]},"Consult_chateau_formulaire59d9":{"id":"Consult_chateau_formulaire59d9","dept":"61","canton":"Ceton","commune":"La Perrière","nom":"Perrière_Soissay","type":"Château","periode":"XV-XVI","histoire":"Deux châteaux à la Perrière ; Morthimer et Soisay.                MORTHIMER  Isolée devant le château, la tour circulaire est couronnée d'une galerie de mâchicoulis.Éléments protégés MH : les façades et les toitures de la tour : inscription par arrêté du 27 mai 1975.                                                                                                                       SOISAY, construit durant la première moitié du XVIe siècle par François du Grenier et son épouse Françoise Carel, le manoir est vendu à Anselme de Fontenay le 13 septembre 1600. Frère de Pierre de Fontenay, gouverneur du Perche pour le roi, Anselme de Fontenay reçoit de Louis XIII le titre de seigneur-châtelain qui lui confère « l'exercice de la justice haute, moyenne et basse, suivant la coutume du grand Perche.  À la disparition de Marie de La Martelière, Soisay est occupé par des fermiers jusqu'au XXe siècle. Le manoir est cédé en 1978 à André Loth qui fait inscrire Soisay à l'Inventaire supplémentaire des M.H.. Son épouse, passionnée de botanique, plante tout le massif boisé d'essences parfois rares. Le compositeur et chef d'orchestre Laurent Petitgirard réside plusieurs années à Soisay et y compose son premier opéra Joseph Merrick dit Eléphant Man. Depuis 2006, Soisay reçoit durant l'été des artistes plasticiens en résidence. Le manoir est l'une des étapes du festival de musique Les Musicales de Mortagne et du Perche .  Anselme de Fontenay et sa femme Marie de la Martelière entreprennent d'importants travaux d'extension. Soisay accueille dans ses jardins des sculptures contemporaines. Propriété de monsieur Loth.","architecture":"MORTHIMER, la construction du château date du 2eme quart du XVe-XVIe siècle. Isolée devant le château, la tour circulaire est couronnée d'une galerie de mâchicoulis. Au rez-de-chaussée, une porte flamboyante est datée de 1506, mais la tour est antérieure. L'accès primitif se trouvait au premier étage, avec une poterne à pont-levis. A l'intérieur, la tour est carrée. Un escalier à vis hélicoïdal, sans noyau central, desservait les étages. A l'Ouest, se trouvent les niches de guet et des meurtrières s'ouvrent aux angles Sud-Ouest et Nord-Ouest. La charpente porte la date de 1742. Depuis les transformations de la fin du XIXe siècle, présente un mélange architectural présentant des caractères néo-médiévaux et hispano-mauresques. La grande tour située à l'ouest du logis est le dernier vestige de la première enceinte du domaine. La tour est percée d'une porte flamboyante datée de 1506, mais la date de sa construction est débattue. Sa charpente, classée depuis 1975.\r\nSOISAY, le corps de logis, flanqué à l'origine d'une tour latérale, est complété de part et d'autre de grands bâtiments de communs (1605) ouvrant sur une cour rectangulaire précédée d'une allée. La tour latérale disparaît au profit d'un pavillon carré : une aile perpendiculaire au logis est alors ajoutée. A l'angle oriental, une tour d'escalier dessert le corps de logis et le pavillon carré. Ce dernier conserve une cheminée au linteau sculpté et peint.  Autrefois, une cloison en torchis surmontée de quatre panneaux de bois peints divisait cette salle. Les communs comprennent un colombier carré avec des pierres d'angles en grès roussard, typique des colombiers de cette région. Les façades et toitures du manoir, ainsi que cinq cheminées et, dans la grande salle à l'étage, les éléments subsistants de l'ancienne cloison de bois avec ses panneaux peints façades sont inscrits au titre des M.H. par arrêté du 6 avril 1988, tout comme les façades et toitures des bâtiments nord des communs.","habitants":"Soissay; famille de François du Grenier\r\n        \r\n        \"","divers":"Deux châteaux à la Perrière ; Morthimer grav 1-2-3-4 et Soisai grav-5 . La Perrière     GPS : 48° 23' 37\" Nord, 0° 27' 07\" Est                                                                                            Soisai GPS :48° 23' 52\" Nord, 0° 24' 43\" Est","gps":"48° 23' 37\" Nord, 0° 27' 07\" Est","images":["../image/image_61/61_Perri%c3%a8re_Soisay_1.jpg","../image/image_61/61_Perri%c3%a8re_Soisay_2.jpg","../image/image_61/61_Perri%c3%a8re_Soisay_3.jpg","../image/image_61/61_Perri%c3%a8re_Soisay_4.jpg"]},"Consult_chateau_formulairefbcd":{"id":"Consult_chateau_formulairefbcd","dept":"61","canton":"Tourouvre","commune":"Monceaux au Perche","nom":"Pontgirard","type":"Manoir","periode":"XV-XVI","histoire":"PONTGIRARD, à l'origine, vers 1560, c'est une famille d'exploitants de forges de Boissy-Maugis, les Féron, qui possèdent le domaine. Le site devient ensuite la propriété des Chouet, Pierre Chouet sieur de la Morlaie , maîtres des forges commerçants de bois et producteurs de fer, dont le dernier représentant, à qui on doit essentiellement le manoir dans sa configuration actuelle, est officier de la maison du Roi. Après la mort de sa veuve en 1746, le manoir est vendu à des paysans et n'est plus habité régulièrement, aujourd'hui monsieur Siguret  maître des lieux. Le manoir de Pontgirard se présente comme un corps de logis du XVIe siècle, transformé à la fin du règne de Louis XIV avec l'adjonction d'un escalier en fer à cheval.","architecture":"PONTGIRARD,  les façades et les toitures du manoir à l'exclusion des autres bâtiments sont inscrites au titre des M.H.  depuis le 22 juin 1972, les façades et les toitures de la grange datée de 1614 et du bâtiment attenant ainsi que l'assiette du jardin avec ses terrasses et les murs de l'ancien potager et le mur d'enceinte à l'est sont inscrits depuis le 21 novembre 1989.   Le manoir, situé au bord de la Jambée, dans un site protégé de la forêt domaniale de Réno-Valdieu, au cur du Parc naturel régional du Perche, possède des jardins qui s'étagent en terrasses ponctuées de topiaires. Ils ont été restitués dans le respect de l'environnement d'un manoir percheron tout en leur donnant un contenu contemporain, sous la conduite du jardinier paysagiste Thierry Hay. On accède au jardin par l'allée des cornouillers, en longeant le mur d'enceinte. Le parterre d'euphorbes regroupe plus de 30 espèces, depuis l'euphorbe de nos bois, jusqu'à des espèces plus rares provenant de l'Himalaya. La pergola rustique est couverte de plantes grimpantes garnies au pied de vivaces.  Le jardin des simples comporte un parterre de lavande, un de santoline, et des carrés de plantes aromatiques ou condimentaires . En remontant l'allée des chênes on longe l'escalier d'eau dont les bassins sont alimentés par la fontaine de Bacchus, et la fontaine de Saint-Fiacre.","habitants":"Famille de  Pierre Chouet\"","divers":"48° 28' 46? N, 0° 42' 24? Est","gps":"","images":["../image/image_61/61_Pontgirard_1.jpg","../image/image_61/61_Pontgirard_2.jpg"]},"Consult_chateau_formulaire5321":{"id":"Consult_chateau_formulaire5321","dept":"61","canton":"Ceton","commune":"Pouvrai","nom":"Pouvrai","type":"Château","periode":"XIX","histoire":"POUVRAI, la propriété était autrefois habitée par la famille Tascher (propriétaire depuis 1692) et petits cousins de limpératrice Josephine la famille de Tascher  Issue d'un Guillaume de Tascher, qui vivait au XVe siècle dans la région du Perche que l'on nomme le Thymerais de son mariage en 1462 avec Jeanne de Chaumont, il eut deux fils :  L'aîné est à l'origine de la branche des Tascher de La Pagerie du nom d'une seigneurie du canton de Marchenoir (Loir-et-Cher). A la dixième génération, le chevalier Joseph de Tascher de La Pagerie passe à la Martinique, en 1734. Sa petite-fille, née le 24 juin 1763, reçoit les prénoms de Marie-Josèphe-Rose. Elle épousera en 1779 le vicomte Alexandre de Beauharnais, d'une vieille famille orléanaise, puis en 1796 un certain général Buonaparte qui lui donnera le prénom plus familier de Joséphine. L'autre fils de Guillaume de Tascher aura deux petits-fils. Cette famille Tascher s'illustra dans les grandes campagnes napoléoniennes. L'un créera la branche dite des Tascher de Guyenne; l'autre, donnera naissance à une branche cadette qui demeurera dans le Perche et recevra, en 1649, par alliance, la seigneurie de Pouvrai, près de Bellême.","architecture":"POUVRAI, ce château de style Louis XIII, fut construit vers 1880 (deuxième moitié XIXe siècle, communs et parties agricoles XVIIIe siècle. Le pavillon n'est autre que l'ancien château de Pouvrai. Subsiste un ancien logis construit au milieu XVIIe siècle, vestige du château primitif édifié pour la famille Lenfernat. Le château actuel, de style Louis XIII, a été construit dans la deuxième moitié du XIXe siècle.  Les communs et parties agricoles datent du XVIIIe siècle. élévation ordonnancée à un étage carré ; étage de comble ; sous-sol  et escalier dans-oeuvre ; escalier tournant à retours avec jour. Gros-oeuvre en calcaire ; brique ; appareil mixte ; enduit  : toit à longs pans ; croupe ; toit en pavillon ; toit conique en ardoise.","habitants":"famille Tascher\r\n        \"","divers":"Pouvrai gps 48° 16' 36\" nord, 0° 31' 04\" est","gps":"","images":["../image/image_61/61_Pouvrai_1.jpg","../image/image_61/61_Pouvrai_2.jpg","../image/image_61/61_Pouvrai_3.jpg"]},"Consult_chateau_formulairecb6f":{"id":"Consult_chateau_formulairecb6f","dept":"61","canton":"Bretoncelles","commune":"Préaux du Perches","nom":"Préaux_Perches","type":"Manoir","periode":"XVI","histoire":"Deux châteaux à Préaux du Perches; Lubinière et Grand St-Quentin                                                                                  LUBINIERE, le manoir serait luvre de Jacques de Barat, né après 1520, et il reste dans cette famille jusquà la fin du XVIIe siècle. A cette époque, il passe dans la famille des Tousche de la Pelleterie, dont lun des représentants, Nicolas, laisse sa famille dans le plus grand dénuement à sa mort. Son fils est bien connu sous le sobriquet de Menilpot (Manie le pot), en raison de sa pauvreté. Le manoir est ensuite racheté par Marin Debray, notaire à Préaux, qui y installe des fermiers. Il est alors utilisé comme exploitation agricole. En 1920 la demeure est revendue à la famille Louvet.","architecture":"GRAND-ST-QUENTIN  à Berd 'Huis  Le manoir actuel a remplacé des constructions antérieures. Dès le début du XIIe siècle, le premier seigneur de Saint-Quentin avait planté à cet emplacement un château qui pouvait être une simple tour de bois. Au cours du XVIe siècle, construction du château actuel. Le bâtiment se termine à l'ouest par une tourelle, et à l'est par une tour carrée. Les traces d'une ancienne tourelle qui devait être accolée à la muraille et devait reposer sur un cul de lampe.\r\nÉléments protégés MH : les façades et les toitures du manoir : inscription par arrêté du 27 décembre 1974.\r\nLUBINIERE, le manoir conserve trois tours, dont une octogonale, accolée d'une tourelle de brique en encorbellement. La tour octogonale est coiffée d'un dôme en pierre avec voûte à arêtes du XVe siècle servant de toiture à une ancienne chapelle  Construction du XVe- XVIe siècles trois tours du logis dont une tour octogonale d'escalier.","habitants":"Lubinière; Famille de Jacques de Barat,\r\n        \"","divers":"Deux châteaux à Préaux du Perches \r\n48° 19' 48\" nord, 0° 42' 12\" est\r\nLubinière grav 1-2 et Grand St-Quentin grav 3-4","gps":"","images":["../image/image_61/61_Pr%c3%a9aux_Perches_1.jpg","../image/image_61/61_Pr%c3%a9aux_Perches_2.jpg","../image/image_61/61_Pr%c3%a9aux_Perches_3.jpg","../image/image_61/61_Pr%c3%a9aux_Perches_4.jpg"]},"Consult_chateau_formulairef0db":{"id":"Consult_chateau_formulairef0db","dept":"61","canton":"Athis-de-l","commune":"Rabodanges  Putanges-le-Lac","nom":"Rabodanges","type":"Château","periode":"XVI","histoire":"RABODANGES, au milieu du XVIe siècle, un château féodal inconfortable est bâti  Le lieu est la propriété du Sire dOlliamson qui y mène une vie de grand veneur. En 1568, sa fille, Anne dOlliamson, épouse François de Rabodanges issu dune vieille famille dArtois. Lorsquen 1628, Richelieu ordonne le démantèlement des châteaux féodaux, Louis III de Rabodanges est un des premiers seigneurs à obéir en 1630  reconstruit le château actuel. Guy de Rabodanges  descendants  jusqu'au dernier marquis Henri-François en 1792 Il échoient à la soeur du défunt puis à son neveu le marquis de la Carte, après son décès en 1826 passe à un banquier parisien, Jean Baptiste de Beaune et en 1836 Après la période révolutionnaire, le château est mis en vente, par le neveu du dernier marquis de Rabodanges, passe au comte de Buus d'Holbeck.  de 1881 à1947, il appartient à la famille  Beylard.  les Lemoine ont aujourd'hui succédé aux Jeanson.","architecture":"RABODANGES, la construction  a débuté sous Louis XIII, à l'emplacement d'un ancien château féodal datant du XIIe siècle dont il ne reste que les remparts et les murs d'enceinte extérieurs, un  château plus confortable sur lemplacement de lancien dont on a conservé les antiques douves. Le château a été terminé en 1646 sous Louis XIV, reconstruit, de 1630 à 1648, En pierre schisteuse grise et granit, le corps de logis central est flanqué de deux massifs pavillons carrés en légère saillie. Un fronton central surmonté dun lanternon et de belles lucarnes découpent les pentes de ses hautes toitures. Derrière le logis, à langle des fossés asséchés, deux pavillons trapus accueillent lun une chapelle, lautre le logis du chapelain.  Laccès au château souvre sur une rotonde délimitée par des arbres. Dans laxe de lallée, ponctuée de nombreuses bornes de granit, le château dresse son élégante silhouette sobre et trapue. Peu avant les douves, une allée transversale coupe lallée dhonneur sur un petit rond. Elle conduit à louest vers la ferme de la Martinière, restaurée et reconvertie en haras, et à lest vers des communs et lancien logement du chapelain aujourdhui gîte rural. Un petit pont de pierre clos dune grille franchit les douves sèches. Composition du parc.  A larrière, des terrasses, doù lon peut admirer les vallonnements de la vallée de lOrne, descendent vers une pièce deau. Le fief est érigé en marquisat par Louis XIV en 1649 et, lannée suivante, la paroisse prend le nom patronymique de son seigneur. Le château et son parc sont classé parmi les sites en novembre 1943. Le 26 décembre 1999, une tempête sabat sur le domaine et couche de nombreux arbres dalignement.","habitants":"Famille  dOlliamson\r\n        \"","divers":"Rabodanges-gps 48° 48' 18\" nord, 0° 17' 26\" ouest","gps":"","images":["../image/image_61/61_Rabodanges_1.jpg","../image/image_61/61_Rabodanges_2.jpg","../image/image_61/61_Rabodanges_3.jpg"]},"Consult_chateau_formulaire4a50-2":{"id":"Consult_chateau_formulaire4a50-2","dept":"61","canton":"Magny-le-Désert","commune":"Ranes","nom":"Ranes","type":"Forteresse","periode":"XV-XVIII","histoire":"RANES,  le château de Ranes prit la relève de la vieille citadelle d'Asnebecq. En 1404, le manoir fut transformé en une importante construction dont la tour est la pièce maîtresse, le château subit d'importantes restaurations effectuées jusqu'en 1730. Les d'Argouges, marquis de Rânes  ont laissé le souvenir de la fée qui hantait les demeures de leur famille. Passé aux princes de Broglie par héritage. Le XIXe siècle se passe sans convulsions, excepté le décès en 1871, des suites de la bataille de Sedan  de l'aîné des châtelains : Pierre de Berghes. Le parc est redessiné « à l'anglaise ». Elle perd son rang de demeure aristocratique, avec la mort en 1907 de Ghislain de Berghes, décédé sans postérité. Le château est alors vendu le 3 juin 1908  à des non-nobles, quoique officier et chevalier de la Légion d'honneur. MM. Richard et Bernard. Le commandant Charles Richard, puis son fils Claude, en restèrent propriétaires durant une quarantaine d'années. En août 1944, le château échappe de peu à un « déluge » d'acier pendant les violents combats de la Libération durant lesquels une partie du bourg est ravagée par les bombes, les obus et les incendies qui causèrent la mort d'une cinquantaine d'habitants, dont certains dans les dépendances du château. En 1947, le château est de nouveau vendu ; la commune de Rânes l'acquiert. Le château abrite la mairie, on peut contempler, dans la salle des mariages, trois vitrines consacrées à l'histoire de Rânes.","architecture":"RANES, le château de Rânes se présente sous la forme d'un donjon octogonal de la fin du XVe siècle, flanqué de deux pavillons La construction du château de Rânes date du XIVe, XVe, et XVIIIe siècle, a été bâti sur l'emplacement d'un ancien manoir, racheté par Guillaume de Méheudin en 1404. Le manoir sera transformé en une importante construction dont la tour est la pièce la plus importante. Endommagé par un incendie, en 1719, le château de Rânes subira d'importantes restaurations jusqu'en 1730. Dans son sous-sol, un musée est consacré à la Préhistoire et présente un bel ensemble de moulages de crânes reconstitués. La forteresse a conservé son donjon couronné de créneaux et de mâchicoulis. Elle se visite. Le château de Rânes a un escalier en pierre dont l'ampleur exceptionnelle est à souligner. La façade principale se termine, à chaque extrémité, par un pavillon. A l'intérieur, il reste deux salons, l'un de style grand siècle, l'autre aux boiseries Louis XV. Il est inscrit aux M.H. depuis le 5/05/1975.","habitants":"Famille d'Argouges\r\n        \"","divers":"Ranes GPS : 48° 38' 26\" Nord, 0° 12' 43\" Ouest","gps":"48° 38' 26\" Nord, 0° 12' 43\" Ouest","images":["../image/image_61/61_Ranes_1.jpg","../image/image_61/61_Ranes_2.jpg","../image/image_61/61_Ranes_3.jpg","../image/image_61/61_Ranes_4.jpg"]},"Consult_chateau_formulaire57f8":{"id":"Consult_chateau_formulaire57f8","dept":"61","canton":"Vimoutiers","commune":"Le Renouard","nom":"Renouard_Cauvigny","type":"Château","periode":"XV-XVII-XVIII","histoire":"Trois châteaux à le Renouard, Grandchamp, Cauvigny-Corday et le Vieux-Château.                                                                                                 GRANDCHAMP, logis construit dans la première moitié du XVIIIe siècle, propriété aux XVIIe et XVIIIe siècles de la famille le Merle, anoblie en 1651, selon A. Dallet;  dépendances fermant la deuxième cour reconstruites au XIXe siècle. Logis en brique et pierre;  fromagerie avec logement accolé au château en brique.                                                                                                          VIEUX CHATEAU, les de Bailleul furent des seigneurs téméraires, acteurs des croisades et de l'invasion de l'Angleterre, une noblesse d'épée souvent en première ligne. Parmi eux, on dénombre 2 rois d'Ecosse : Jean de Bailleul en 1292 qui dut abdiquer en 1296 et son fils Edouard de 1332 à 1342 qui fut renversé par David Bruce. Letellier, marquis de Louvois fut le grand homme d'état, ministre des armées de Louis XIV et chancelier de la famille de Bailleul, depuis le VIIIe siècle. Il a été incendié en 1119 sur l'ordre de Henri Ier, roi d'Angleterre, selon Ordéric Vital. Reconstruit dans la seconde moitié du XVe siècle, il passa ensuite aux Souvré en 1582, aux Louvois en 1662 et aux Corday en 1752. C'est devenu un gite d'hôtes depuis. le Vieux Château est un château bâti à Le Renouard, est un ancien château fort, il appartint directement à la famille de Bailleul de l'an 700 à 1595, soit 12 générations, puis passa par alliance, dans les familles de Souvré et Le Tellier, marquis de Louvois. En 1752, le château fut transmis à la famille de Corday par le mariage de Marie le Tellier de Louvois avec le comte d'Harcourt dont la fille épousa Pierre Charles de Corday, seigneur de Glatigny.","architecture":"CAUVIGNY OU MANOIR DE CHARLOTTE de CORDAY,   la constuction du manoir de Cauvigny date du XVe siècle. acquisition  en 1620  du manoir par Jean de Corday, Il a été largement remanié à la fin du XVIIIe siècle, est typique du pays d'Auge avec ses colombages. Il possède un remarquable pressoir à longue étreinte, quasiment intact. Durant le XVIIIe siècle, le château fut la propriété de Jacques Adrien de Corday, grand-père paternel de Marie-Anne-Charlotte de Corday dArmont, Naissance de Charlotte de Corday en mai 1768, personnalité de la Révolution française, célèbre pour avoir assassiné Jean-Paul Marat le 13 juillet 1793. Pour cela, l'édifice est souvent appelé \"Logis des Corday\". Jacques Adrien en modifia la disposition intérieure, notamment en remplaçant, au rez-de-chaussée, l'escalier central par une salle à manger. Le manoir passe à un frère de Charlotte Alexis en 1798, puis par héritage aux Bonnechose et aux Basdefer et en 1875 acquis par M. Arsène  Lecointe ancêtres des propriétaires actuels les Laverny. Le manoir assis sur une base de grès ocre entièrement conçu en colombage, à deux niveaux sous combles toit en croupes couvert d'ardoises, ces derniers présentent  des lucarnes à fronton.                                                                                                                         Manoir est inscrit 2 fois aux M.H. le 29/11/1948.","habitants":"Grandchamp;  famille le Merle                                        Vieux château; famille de Bailleul                            Cauvigny; Famille de Corday\r\n        \"","divers":"Trois châteaux à le Renouard grav 1, Grandchamp grav-6, Cauvigny grav 5 et le Vieux-Château grav2-3-4.                                                                                                                   Corday GPS : 48° 55' 08\" Nord, 0° 04' 40\" Est                                                      Cauvigny GPS : 48° 55' 19\" Nord, 0° 06' 07\" Est                                                    Vieux  GPS : 48° 55' 19\" Nord, 0° 06' 07\" Est","gps":"48° 55' 08\" Nord, 0° 04' 40\" Est","images":["../image/image_61/61_Renouard_Cauvigny_1.jpg","../image/image_61/61_Renouard_Cauvigny_2.jpg","../image/image_61/61_Renouard_Cauvigny_3.jpg","../image/image_61/61_Renouard_Cauvigny_4.jpg","../image/image_61/61_Renouard_Cauvigny_5.jpg","../image/image_61/61_Renouard_Cauvigny_6.jpg"]},"Consult_chateau_formulaire6290":{"id":"Consult_chateau_formulaire6290","dept":"61","canton":"Bagnoles-de-l","commune":"Tessé-la-Madeleine","nom":"Roche_Bagnoles","type":"Château","periode":"XVIII","histoire":"ROCHE-BAGNOLES,  en 1856, après avoir hérité de son oncle de 65 ha de terrains boisés en forêt dAndaines, Anne-Marie Goupil fait édifier par larchitecte Manceaux David, un château de style gothico-renaissance inspiré du château sarthois le Luart. Les thermes de Bagnoles sont alors en plein essor sous limpulsion dAlbert Christophe, propriétaire des établissements thermaux. Autour du nouveau château le parc est composé de deux parties distinctes. Au sud, aux abords immédiats du logis, un parc second Empire est créé, tel que les ont imaginés les frères Bülher ou E. André. Des arbres dessences exotiques, de formes libres, isolés ou en petits groupes, sont disposés sur une grande pelouse ovale.  Dans la partie nord, le paysage devient plus pittoresque avec un boisement dessences indigènes et quelques pins. La volonté dimiter la nature prédomine avec le souci de cadrer des vues lointaines et de mettre en scène des points dintérêt particuliers, tel le Roc au Chien. En 1957, les propriétaires vendent la plus grande partie du domaine à la municipalité de Tessé-la-Madeleine qui y installe lHôtel de Ville en 1966. Le château et le parc, qui ont beaucoup souffert depuis leur origine, sont restaurés et, en 1973, les jardins sont ouverts au public. Les allées sont élargies et bitumées, la frange forestière est réduite et la multiplication des entrées achève de faire perdre au parc toute intimité. La tempête de 1999 fait des ravages dans la sapinière et de nombreux arbres sont couchés. En 2000, le château reste le siège de la nouvelle municipalité lors de la fusion des deux communes.","architecture":"ROCHE,  château de la Roche-Bagnoles (actuelle Mairie). Après lancienne entrée de granit, de larges pelouses, sillonnées dallées, montent en pente douce vers le château et le parc pittoresque. Le parc second empire sest un peu transformé avec le temps et sa restauration. Le château de style troubadour, joyau du parc, est posé en haut de son écrin de verdure et tous les regards se tournent vers le monument sans cesse remis en scène au gré des tableaux paysagers. Beaucoup darbres datent de la création du parc, dautres ont été plantés à sa restauration. De plus jeunes sujets témoignent de la volonté de la Ville daccroître et dembellir ses collections. A lest du château, le parc pittoresque sannonce avec lémouvant mausolée des Goupils. Les chemins deviennent plus pentus et tout autour la nature semble reprendre ses droits.  Sur la crête, une sapinière aligne les troncs rectilignes de douglas, dépicéas et de pins dans une atmosphère plus sombre. Quelques scènes paysagères sont encore à découvrir : au sud, les rocs des hêtres, le sentier de Versailles et le belvédère de thermes ; au nord, le site du Roc au Chien et les sentiers qui courent en sous-bois sur le versant ouest de la cluse ; à lest, les rocs de la prise Tarot et son belvédère. Le contraste des ambiances, entre jardin et nature, quoffrent les deux parcs fait de la Roche-Bagnoles un endroit unique où les tableaux paysagers se recomposent sans cesse au gré de la visite et des points de vues.","habitants":"Famille d'Anne-Marie Goupil \r\n        \"","divers":"Roche_Bagnoles","gps":"","images":["../image/image_61/61_Roche_Bagnoles_1.jpg","../image/image_61/61_Roche_Bagnoles_2.jpg","../image/image_61/61_Roche_Bagnoles_3.jpg"]},"Consult_chateau_formulaire3653":{"id":"Consult_chateau_formulaire3653","dept":"61","canton":"Radon","commune":"Saint Léonard des Parcs","nom":"Rouges_Terres","type":"Manoir","periode":"XVI","histoire":"ROUGES-TERRES,  le manoir, avec une grosse tour carrée à mâchicoulis, a été construit à la fin du XVIe siècle par un membre de la famille de Rabodanges. Propriété achetée en 1876 par la famille Olry Roederer, héritière des champagnes Roederer.","architecture":"ROUGES-TERRES,   c'est actuellement le centre du haras des Rouges-Terres où flottent les couleurs de Mme Olry-Rderer que l'on voit très souvent triompher sur les hippodromes. Deux noms suffisent à dire l'immense qualité du travail accompli dans cette propriété: Jamin et Ourasi. Le premier a remporté deux fois le Prix d'Amérique et le championnat du monde des trotteurs en 1959 à New York, et le deuxième n'est autre que le petit-fils du premier, au palmarès ô combien élogieux avec pas moins de quatre victoires au Prix d'Amérique.  haras, élevage de chevaux.","habitants":"Famille Olry Roederer\r\n        \"","divers":"Haras de Rouges_Terres","gps":"","images":["../image/image_61/61_Rouges_Terres_1.jpg","../image/image_61/61_Rouges_Terres_2.jpg"]},"Consult_chateau_formulaire7b57":{"id":"Consult_chateau_formulaire7b57","dept":"61","canton":"Bretoncelles","commune":"Rémalard-en-Perche","nom":"Rémalard","type":"Château","periode":"XVI-XVIII","histoire":"Trois châteaux à Rémalard en Perche; Brigemont, Vaujours, Boiscordes,  Vore et la Touches.                                                                                                               VORE, à l'époque féodale simple fief avec motte et fossés qui devient par la suite un manoir. Au XVIIIe siècle, un nouvel édifice est construit sur un plan classique auquel s'ajoute un parc. En 1743, le domaine est acheté par Claude Adrien Hervétius, philosophe. Le château et son parc à l'anglaise sont restés tels qu'à l'époque. En avant du bâtiment, la cour est fermée par une grille en fer forgé sur laquelle sont entrelacées les initiales des Helvétius et des d'Andlau. Le corps central se termine à chaque extrémité par un bâtiment en saillie. L'intérieur du château possède des salons ornés de boiseries. Les communs sont disposés autour d'une cour. Éléments protégés MH : l'intérieur du château : inscription par arrêté du 29 avril 1931. Les façades et les toitures ; la grille d'entrée ; la cour d'honneur avec les sauts de loups l'entourant : classement par arrêté du 8 août 1973. Les façades et les toitures du pavillon dit de Madame Helvetius ainsi que celles des communs (à l'exclusion des deux bâtiments modernes) : inscription par arrêté du 8 août 1973.                                                        VAUJOURS,  la construction du manoir de Vaujours date du XVIe siècle. Son corps de logis est rectangulaire, flanqué d'une tour, sur la façade postérieure. La façade principale est ornée d'éléments décoratifs inspirés de la Renaissance française. Le premier étage a été transformé en grange. L'ensemble des bâtiments s'ordonne autour d'une cour carrée fermée par un mur de clôture, épaulé aux angles par deux tours rondes. Sont inscrits aux M.H. depuis le 29/11/1948, le manoir, le logis et le colombier.","architecture":"BOISCORDES,  la construction du manoir de Boiscordes date du XVe au XVIe siècle. L'ensemble de bâtiments comprend le manoir, un colombier à l'entrée, une tour isolée avec tourelle d'escalier accolée et divers communs entourant une cour, d'époque plus récente. Le manoir de Boiscordes est composé de 2 bâtiments qui se coupent, à angle droit. La façade principale est percée de 3 fenêtres à meneaux. Le manoir est inscrit partiellement aux M.H. le 14/09/1987.                                                                       BRIGEMONT, la construction du manoir de Brigemont date du XVIe siècle. Petit bâtiment de plan rectangulaire, sur lequel se greffe à l'arrière une aile perpendiculaire rattachée au bâtiment par une tour d'escalier à moitié engagée. La façade principale est percée de fenêtres Renaissance à meneaux. A l'intérieur, se trouve une grande salle de réception recouverte d'une voûte en berceau. Les 3 travées sont soulignées par des arcs diaphragmes très saillants, dont les moulurations se perdent dans la maçonnerie. Une grande cheminée de pierre orne le fond de cette salle. De petits motifs géométriques sont disposés un peu partout sur la voûte, entre les arcs. Les façades, toitures, l'escalier à vis, les couloirs voûtés, la grande salle du rez-de-chaussée et les 2 cheminées à l'étage sont inscrits partiellement aux M.H. depuis le 2/11/1979.                                                                       TOUCHES,  Dorceau le manoir possède un colombier percheron du XVIe siècle, sans doute couronné d'un lanternon en bois au XVIIIe siècle. L'ouvrage a conservé l'ensemble de ses éléments, hormis l'échelle tournante.","habitants":"Vore; Famille de Claude Adrien Hervétius\r\n        \"","divers":"Trois châteaux à Rémalard en Perche; Brigemont, Vaujours et Vore-Brigemont grav 8 GPS : 48° 25' 44\" Nord, 0° 46' 20\" Est        Vaujours  grav 4-5-6-7    GPS : 48° 27' 18\" Nord, 0° 46' 23\" Est                                                                                 Voré-Brigemont  grav-8                                                     GPS : 48° 26' 41\" Nord 0° 47' 49\" Est                                                                  Boiscorde  grav 1-2-3                                                                  gps 48° 27' 23\" Nord, 0° 46' 54\" Est","gps":"48° 25' 44\" Nord, 0° 46' 20\" Est        Vaujours  grav 4-5-6","images":["../image/image_61/61_R%c3%a9malard_1.jpg","../image/image_61/61_R%c3%a9malard_2.jpg","../image/image_61/61_R%c3%a9malard_3.jpg","../image/image_61/61_R%c3%a9malard_4.jpg","../image/image_61/61_R%c3%a9malard_5.jpg","../image/image_61/61_R%c3%a9malard_6.jpg","../image/image_61/61_R%c3%a9malard_7.jpg","../image/image_61/61_R%c3%a9malard_8.jpg","../image/image_61/61_R%c3%a9malard_9.jpg"]},"Consult_chateau_formulairea23f":{"id":"Consult_chateau_formulairea23f","dept":"61","canton":"Argentan","commune":"Saint Christophe le Jajolet","nom":"Sassy","type":"Château","periode":"XVII","histoire":"SASSY, appartient à la famille de Trimois depuis 1638, ce dernier avait épousé Angélique Langlois  de Motteville, demeure dans la même famille jusquen 1758 où il devient, par héritage, la propriété de Jacques Le Bègue, comte de Germiny. En 1817 achat du château par le nouveau propriétaire, le marquis dOmmoy. En 1840, le négociant Gustave Duval acquiert le domaine quil agrandit avec des bois et les étangs de Vrigny. Il embellit la cour dhonneur et les terrasses avec des balustrades. En 1850, Gustave Duval vend le domaine au premier duc dAudiffret-Pasquier, petit neveu et fils adoptif du chancelier Pasquier. Le nouveau propriétaire se lance dans une série de travaux et réalise des acquisitions foncières sur les hameaux de Launay et de la Hatrie quil fait démolir pour créer le parc. En 1874, le pavillon de la grille est édifié dans le style de la maison rustique, en vogue au XIXe siècle et, en 1877, quelques bâtiments subsistants au Mesnil (près de la Hatrie) sont transformés, puis complétés par la construction de la ferme. En 1880, les bases du parc paysager à langlaise sont posées. Toujours dans la famille d' Audiffret-Pasquier.","architecture":"SASSY ; commence, en 1760, une campagne de travaux pour la construction dune nouvelle demeure sur lemplacement de lancien château de lIf, sur la colline dominant la source. Les deux pavillons qui encadrent la cour dhonneur sont conservés ainsi que les terrasses qui descendent vers un jardin de maître, clos de murs. A cette époque, le domaine et la campagne alentour se composent de terres agricoles et de boisements forestiers. Interrompus par la Révolution, les travaux reprennent sous la Restauration.   Entre 1890 et 1901, Denis dAudiffret-Pasqier parachève luvre de son père par lacquisition du hameau de lEtre Saudaguet,  Entre 1920 et 1925, le duc Etienne fait réaliser un jardin à la française dans lancien potager.  La cour dhonneur souvre entre les deux pavillons dentrée. Au fond de lesplanade, formant terrasse, la façade du château, en briques chaînées de pierres calcaire, sélève sur deux niveaux surmontés de combles à la Mansart recouverts dardoises. Le corps de logis est prolongé de deux petits pavillons sur un niveau et combles. Sur la gauche, une aile basse en retour ferme la cour des écuries. Sur la droite, un escalier donne accès à une terrasse inférieure et permet daccéder à la chapelle et à la terrasse nord. De celle-ci, le jardin à la française se découvre en un seul coup dil. Dans laxe du château, les parterres de broderies déroulent leurs arabesques en parterres symétriques ponctués de topiaires de buis. La vue sétend loin vers la campagne ou des fermes se blottissent parmi les champs, près de haies ou de bois. Les terrasses, reliées par trois doubles volées de marches, descendent jusquà une rotonde précédant le pont qui enjambe la douve.","habitants":"Famille de  Jacques Le Bègue\r\n        \"","divers":"Sassy GPS : 48° 39' 20,16\" Nord, 0° 00' 02,88\" Est","gps":"48° 39' 20,16\" Nord, 0° 00' 02,88\" Est","images":["../image/image_61/61_Sassy_1.jpg","../image/image_61/61_Sassy_2.jpg","../image/image_61/61_Sassy_3.jpg","../image/image_61/61_Sassy_4.jpg","../image/image_61/61_Sassy_5.jpg"]},"Consult_chateau_formulairea120-2":{"id":"Consult_chateau_formulairea120-2","dept":"61","canton":"Bagnoles-de-l","commune":"Sept-Forges","nom":"Sept_Forges","type":"Château","periode":"XV-XVI-XVII","histoire":"Deux châteaux dans cet article Chevriers et Mebzon.                     CHEVRIERS,  au XVIe siècle, Christophe de Chauvigné fut seigneur de Sept Forges et évêque de Lèon, c'est lui qui fit construire, vers 1560, le château de Cheviers afin de s'y retirer. Le château actuel est une grande demeure de granit avec corps central et deux pavillons aux extrémités, son parc est doté d'une terrasse en terre-plein, un jardin potager une orangerie et une serre. Le château de Cheviers a été édifié à la fin du XVIIe ou au début du XVIIIe siècle par la famille de Royers; il passa par la suite aux Pitard, marquis de la Brisollière ; au milieu du XXe siècle, il appartenait au comte Henri de Falandre.                                                                                                           \r\n LES REMPARTS DE SEPT-FORGES, la motte féodale de Sept-Forges,  « Son origine remonterait au XIe siècle. Elle est plantée de hêtres et mesure  35 mètres de long pour 30 mètres de large. La motte constituait un excellent poste dobservation sur toute la vallée de la Mayenne, frontière avec le Maine. Le premier seigneur d'entre eux qui nous soit connu, est « Hamelin, chevalier, seigneur de Sept-Forges », qui vivait en 1227.  Famille de Mondamer (XIIIe-XIVe siècles), de Boullay (XIVe siècle), de Chateaubriant (XIVe-XVe siècles),  du Boisfroust (XVe siècle.), de Chauvigné (XVe-XVIIe siècle), de Beauville (XVIIe siècle), de Madaillan (XVIIe siècle), de Royers de la Brissollière (XVIIe-XVIIIe siècle)  Pitard de la Brissollière (XVIIIe siècle.","architecture":"MEBZON, le fief de Mebzon était ainsi repassé au Comté du Maine, la construction du manoir de Mebzon date du XIVe au XVe siècle. Le manoir de Mebzon fut endommagé avant la Révolution Française. La commune de Sept-Forges, devenu Juvigny-Val-d'Andaine relevait de la province du Maine, après une annexion temporaire au Duché de Normandie, par Guillaume le Conquérant, en 1050. Le fief de Mebzon repassa dans les mains du Comté du Maine. Le manoir de Mebzon est un bel exemple d'architecture civile du Bas Moyen Age, en terre du Maine. Surmonté d'une magnifique charpente, il offre une silhouette élancée du fait d'une partie lacunaire de son logis, endommagé avant la Révolution. Il présente une mise en oeuvre de grande qualité. De belles cheminées à l'austérité monacale ponctuent de vastes pièces intérieures qui n'ont été nullement altérées par les occupations successives. Une atmosphère d'une grande authenticité se dégage des lieux, avec les fenêtres à meneaux, les coussièges, les charpentes puissantes, les volumes formidables des deux pièces du premier étage. Implanté en bordure immédiate de la Mayenne formant à cet endroit un coude à 90°, le manoir possédait une chapelle dont il subsiste quelques traces au sol. Le manoir de Mebzon a été inscrit aux M.H. depuis le 22/12/1998 à l'exception du bâtiment adossé au pignon Nord.","habitants":"Chevriers; Christophe de Chauvigné \r\n        \"","divers":"Deux châteaux dans cet article Chevriers grav-1 et Mebzon grav-2-3 . GPS : 48° 29' 32\" Nord, 0° 32' 24\" Ouest                                                             Mebzon GPS : 48° 30' 33,06\" Nord, 0° 30' 37,34\" Ouest","gps":"48° 29' 32\" Nord, 0° 32' 24\" Ouest","images":["../image/image_61/61_Sept_Forges_1.jpg","../image/image_61/61_Sept_Forges_2.jpg","../image/image_61/61_Sept_Forges_3.jpg"]},"Consult_chateau_formulairee043-2":{"id":"Consult_chateau_formulairee043-2","dept":"61","canton":"Domfront","commune":"St-Bômer les Forges","nom":"St_Bomer_les_Forges","type":"Manoir","periode":"XV-XVII","histoire":"Deux châteaux dans cet  article la Bérardière  et la Nocherie.  \r\nManoir de la Maigraire ( voir article),  la Gélinère. Montpatry.\r\nChâteau de Jumilly (voir article).                                                                      BERARDIERE, c'est un manoir de la fin du XVIIe siècle, construit, sur lemplacement d'anciennes constructions, dont une fer
