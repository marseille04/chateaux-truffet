formulaire9d76","dept":"04","canton":"Digne","commune":"Aiglun","nom":"Aiglun","type":"Manoir","periode":"XVII","histoire":"AIGLUN;  le village a été partagé entre de multiples co-seigneurs, qui arrivent au total de 22 en 1315, ancienne place forte nommé castrum de Aglenio au Moyen-Age, le château fort est en ruines et quelques maisons datent du XVIIe siècle.          Le château à Villeneuve est du XVIIe siècle Construit vers 1635 par la veuve de François de VILLENEUVE, connue sous le nom de « Dame dESPINOUSE » et dont un des fils fut viguier de Marseille délégué du roi pour la justice. le roi René aliéna le château dAIGLUN à Johan DE ROCHAS le 13 novembre 1445 Les de ROCHAS vont se succéder jusquen 1652, co-seigneur dAIGLUN et de GAUBERT mais deux autres familles vont également régner sur ce territoire: les De BASCHY-MATHIEU de 1511 à 1530 co-seigneur dAIGLUN, de MALLEMOISSON et des SIEYES et les DE COUR de 1624 à 1774, Jean puis Joseph seront seigneurs majeurs, en 1627 et procureur du roi de 1633 à 1638, en 1935 fut transformé en clinique héliothérapie.                            Au village l'ancien château fort est à l'état de ruines.","architecture":"Aiglun; le château cité  construit au XVIIe siècle Au siècle suivant, au XVIIe, le château den bas voit le jour. Formé dun corps de bâtiment rectangulaire avec tourelle à chaque angle, il fut, sans doute, maison de plaisance des évêques de DIGNE à deux niveaux.","habitants":"Seigneurs d'Aiglun\"","divers":"Manoir d'Aiglun","gps":"","images":["../image/image_04/04_Aiglun_1.jpg"]},"Consult_chateau_formulaire3608":{"id":"Consult_chateau_formulaire3608","dept":"04","canton":"Riez","commune":"Allemagne-en-Provence","nom":"Allemagne","type":"Château","periode":"XVI","histoire":"ALLEMAGNE; dont le nom viendrait d'Allemania nom d'un village romain en hommage à Alemona déesse de la fécondité, dans la vallée de la Colostre, existait un castelet  fondé par les Spata de Riez et d'Allemagne, une baronnie de ce nom du XIIe siècle entra par alliance à la famille de Castellane, cette alliance avec Agnés Spata qui apporta d'autres seigneuries aux Castellane qui  deviennent maître de la vallée du Verdon. La baronnie  entra en conflit de famille lors des guerres de religion, puis le fils de Boniface se rebelle contre Charles Ier comte de Provence  qui confisque la baronnie mais la descendance fera fortifier le château. Cette baronnie passera  aux Forbin autre lignée des Castellane, à la mort de Melchior de Castellane le château passa a son neveu  Nicolas du Mas vicomte de Valernes, son fils général  des galères du duc de Savoie  meurt ruiné. La baronnie est acquise par  le marquis d'Oraison, sénéchal de Provence, sa fille la duchesse de  Caderousse vend en 1712  à la famille de Varages dont le petit-fils  fonda la faïencerie d'Allemagne excentrique déclaré fou en 1778. Le château fut épargné à la Révolution vendu comme bien national  racheté par le marquis François de Ripert-Monclar qui le remanie et au décès de sa veuve en 1936 le château est vendu par ses héritiers à différentes familles pour arriver en 1990 à monsieur Sanger.","architecture":"Allemagne; il ne reste plus rien du castelet qui fut remplacé  au XVIe siècle par le château actuel de style Louis XII avec deux corps de logis en retour d'équerre encadrant une cour rectangulaire, ancien donjon massif et tour carrée haute de vingt-cinq mètres du XIIIe siècle, au pied une petite tour, et deux tours cantonnent la façade côté parc, l'aile droite fut rajoutée au XVIe siècle. Le style néo-gothique fut entreprit au XIXe siècle la toiture remplacé par des créneaux, la toiture fut incendié en 1919 qui détruisit la charpente du donjon.","habitants":"Famille de Castellane\"","divers":"Château féodal","gps":"","images":["../image/image_04/04_Allemagne_1.jpg","../image/image_04/04_Allemagne_2.jpg","../image/image_04/04_Allemagne_3.jpg","../image/image_04/04_Allemagne_4.jpg","../image/image_04/04_Allemagne_5.jpg","../image/image_04/04_Allemagne_6.jpg"]},"Consult_chateau_formulaire106f":{"id":"Consult_chateau_formulaire106f","dept":"04","canton":"St-André-les-Alpes","commune":"Allons","nom":"Allons","type":"Vestiges","periode":"XIV","histoire":"ALLONS: Le fief appartenait aux évêques de Senez, puis à l'abbaye Saint-Victor de Marseille.                            Dans ce village trois bâtisses  de la noblesse; les Resquiton, les de Richery, les Villeneuve et les d'Autane, cette dernière est la plus importante assimilé à un château dont plusieurs familles seigneuriales se sont succéder parfois cohabiter dans la rivalité. Un Pierre d'Autane officier des dragons, épousa Marguerite de Réquiton trois fils  Charles, jean et Scipion, ce dernier épousa Eléonor de Galice en 1632,  deux enfants Charles et Jean Jacques.","architecture":"Allons; en 1390 Raymond de Turenne fait le siège des châteaux en particulier le château de Vauclause dont-il ne reste aujourd'hui quelques pans de murs. Le château d'Autane  du XIVe siècle, implanté sur la place du hameau du même nom de style du XVIIIe siècle, l'aile ouest est une chapelle. Depuis la révolution est partagé par plusieurs propriétaires.","habitants":"Famille d'Autanne\"","divers":"Clocher et ruelle","gps":"","images":["../image/image_04/04_Allons_1.jpg","../image/image_04/04_Allons_2.jpg"]},"Consult_chateau_formulaire2e63":{"id":"Consult_chateau_formulaire2e63","dept":"04","canton":"Annot","commune":"Annot","nom":"Annot","type":"Vestiges","periode":"X","histoire":"ANNOT; au Xe siècle le seigneur Ermerincus d'Anoth  fait don du fief  à l'abbaye de Saint-Victor de Marseille qui partageait ses droits avec l'ordre du Temple  passa ensuite au Moyen-Age aux comtes de Provence, en témoigne la porte de la grande rue, et au XV-XVIe siècle le seigneur était Saint-Pons, à la Révolution une communauté était déjà implantée.","architecture":"Annot, village médiéval et renaissance trouve son origine au XIe siècle. Dans ce village des bâtiments tel que l'hôtel dieu et l'hôtel de ville sont du XVIIe siècle,  traces de portes et remparts médiévaux.","habitants":"Famille de Saint-Pons\"","divers":"Vestiges et tours","gps":"","images":["../image/image_04/04_Annot_1.jpg","../image/image_04/04_Annot_2.jpg","../image/image_04/04_Annot_3.jpg","../image/image_04/04_Annot_4.jpg"]},"Consult_chateau_formulairede84":{"id":"Consult_chateau_formulairede84","dept":"04","canton":"Reillanne","commune":"Aubenas-les-Alpes","nom":"Aubenas_Alpes","type":"Château","periode":"XVII","histoire":"AUBENAS-les-Alpes; au XVe siècle seigneurie des Barcillon, par alliance passe au XVIe siècle à Georges de Voland, viguier de Forcalquier et co-seigneur, jusqu'à la réunification du fief au XVIIIe siècle, et en 1756 la seigneurie  fut acquise par Charles-Louis  de Lauthier de Bardon que la descendance  gardera  jusqu'en 1960 et fut acquis par monsieur René Salle.","architecture":"Aubenas les Alpes fut construit au XVIe siècle corps de logis rectangulaire, flanqué d'une tour ronde a un angle, remanié au cour des ans par les propriétaires.","habitants":"Famille de Barcillon                    Famille de Lautier de Bardon\"","divers":"Château","gps":"","images":["../image/image_04/04_Aubenas_Alpes_1.jpg","../image/image_04/04_Aubenas_Alpes_2.jpg","../image/image_04/04_Aubenas_Alpes_3.jpg"]},"Consult_chateau_formulairea2fc":{"id":"Consult_chateau_formulairea2fc","dept":"04","canton":"Banon","commune":"Banon","nom":"Banon","type":"Vestiges","periode":"XII","histoire":"BANON; village médiéval  dont le front externe des maisons serrées et verticales, forme  remparts.            Fief des Simiane au XIIe siècle, le château féodal  fut dévasté par Raymond de Turenne en 1391, les Simiane fortifièrent  la ville au XVe siècle  et la gardèrent jusqu'à la Révolution.","architecture":"Banon; reste quelques vestiges de l'enceinte  avec des portes fortifiées à mâchicoulis du XVe siècle.","habitants":"Fief des Simiane\"","divers":"Vestiges féodaux","gps":"","images":["../image/image_04/04_Banon_1.jpg","../image/image_04/04_Banon_2.jpg","../image/image_04/04_Banon_3.jpg","../image/image_04/04_Banon_4.jpg","../image/image_04/04_Banon_5.jpg"]},"Consult_chateau_formulaire6d32":{"id":"Consult_chateau_formulaire6d32","dept":"04","canton":"Barcelonette","commune":"Barcelonette","nom":"Barcelonette_Jaussiers","type":"Villas-Manoirs","periode":"XIX","histoire":"BARCELONETTE-Jaussiers; dépendait au XIIIe siècle de Raymond Béranger IV comte de Provence, ce comté passa de 1614 à 1713 en siège d'une préfecture du  sénat de Nice. D'où surgirent des épisodes violents à la Révolution et en 1851 un coup d'état du 2 décembre de Napoléon III, mouvement de résistance des habitants d'où beaucoup de ces derniers durent émigrés  au Mexique,  certains dès leurs  retours à Barcelonette montrèrent leurs fortunes en construisant de petits manoirs à Jaussiers village voisin et  villas etc. Partirent les frères Arnaud célèbres par leur émigration au Mexique au début du XIXe siècle où ils vécurent dans un ancien moulin à soie avant de partir en Louisianne où ils fondèrent Arnaudville.","architecture":"Barcelonette; comme patrimoine, la tour Cardinalis où tour de l'Horloge carré haute de 42 m de 1316 clocher du couvent. Superbes villas de style mexicain édifié par des personnes de Barcelonette qui ont émigrés aux Mexique, château Magnans de 1903 à 1913 de style bavarois; la Sapinière, classique, Villa Campona, Villa Javelly 1913 encadré de deux tours, villa Laugier, villa Bleue et villa Costebelle.","habitants":"Raymond Béranger comte de Provence. les frères Arnauld \"","divers":"Villa Sapinière, Campona, Javelly, Laugier, et Magnans.","gps":"","images":["../image/image_04/04_Barcelonette_Jaussiers_1.jpg","../image/image_04/04_Barcelonette_Jaussiers_2.jpg","../image/image_04/04_Barcelonette_Jaussiers_3.jpg","../image/image_04/04_Barcelonette_Jaussiers_4.jpg","../image/image_04/04_Barcelonette_Jaussiers_5.jpg","../image/image_04/04_Barcelonette_Jaussiers_6.jpg","../image/image_04/04_Barcelonette_Jaussiers_7.jpg"]},"Consult_chateau_formulaireecbe":{"id":"Consult_chateau_formulaireecbe","dept":"04","canton":"Barrême","commune":"Barrême","nom":"Barreme","type":"Château","periode":"XIV","histoire":"BARREME: En 1235 le baron de Castellane cède ses droits au comte de Provence qui les conservera jusqu'en 1348 date à laquelle la reine Jeanne l'échange contre les terres du Royaume de Naples, deviendra ensuite le fief des seigneurs de Villeneuve jusqu'en 1748 passa ensuite à sept co-seigneurs.","architecture":"Barreme; Château du XVIe siècle","habitants":"La reine Jeanne\"","divers":"Château à Barrème","gps":"","images":["../image/image_04/04_Barreme_1.jpg"]},"Consult_chateau_formulaire21b6":{"id":"Consult_chateau_formulaire21b6","dept":"04","canton":"Digne","commune":"Thoard","nom":"Beaucouse_Thoard","type":"Maison forte","periode":"XIX","histoire":"THOARD; au Moyen-Age la ville est fortifiée, la seigneurie initiale, les Féraud vassaux des comtes de Provence, sont cités dès le XIe siècle, au XIIe siècle inféodé aux Girin et au XIIIe siècle en comté au profit  des Barras, seigneurs qui se partageaient en deux co-seigneuries Barras et Baschis à partir du XIVe siècle d'ou le surnom de fief \" Thoard-le-Noble\" est morcelé au minimum de douze  co-seigneurs, le fort de Barras, le château de la Bussière; le château de Beaucouse, Saint-Martin de Thoard Vaunavés, la Péruse.","architecture":"Thoard; le château  d'origine médiéval au sommet du village sur un mamelon rocheux  vestige d'une grande enceinte avec donjon quadrangulaire date du XIIIe siècle. Un château servit de mairie quelque temps au sommet du village date du XVIIe siècle était construit sur des bases anciennes. Dans le village le château fort de Barras dont il reste la porte et quelques arches.                                 Le château de Beaucouse du XVII remanié XIXe siècle sur un plan U  qui subsiste en partie, avec un donjon, corps central à deux étages deux ailes en retour ferment l'esplanade par deux tours. Château de la Buissière au milieu du XVIIe siècle possède une façade sud est placé entre deux avancées arrondies formant une tour.","habitants":"Famille de  Barras \"","divers":"Village de Thoard et château de Beaucouse","gps":"","images":["../image/image_04/04_Beaucouse_Thoard_1.jpg","../image/image_04/04_Beaucouse_Thoard_2.jpg","../image/image_04/04_Beaucouse_Thoard_3.jpg"]},"Consult_chateau_formulaire8537":{"id":"Consult_chateau_formulaire8537","dept":"04","canton":"Forcalquier","commune":"Sigonce","nom":"Bel_Air_Sigonce","type":"Château","periode":"XV","histoire":"BEL-AIR, seigneurie des co-seigneurs des du Bousquet au XVe siècle, poursuivant l'oeuvre de son mari Jacques, Jacqueline Ballanche propriétaire du château a entrepris depuis plusieurs années  sa remise en état.                   SIGONCE; château construit au Moyen-Age au lieu dit les \"Ari\" sur le Lauzon, réserve de chasse des comtes de Forcalquier, qui le donnèrent aux moines de Ganagobie, fief relevant de l'abbaye de Cluny. En 1502 le prieur de Glandevez fit construire le portail, les Du Bousquet terrible seigneur protestant de 1573 à 1670 confisque à son profit le prieuré de Ganagobie.","architecture":"Bel-Air; château construit au XVI et XVIIe siècle  par les du Bousquet a conservé ses parties médiévales,  deux ailes en équerres sont reliées par un donjon et prolongés chacune par une tour la façade nord est couronnée d'un arc de cercle.                                   SIGONCE, le château massif  façade Sud-Est encadré de deux tours rondes, construit au Moyen-Age. Ruines du château des moines de Ganagobie","habitants":"Famille de Bousquet\"","divers":"Château Bel_Air","gps":"","images":["../image/image_04/04_Bel_Air_Sigonce_1.jpg","../image/image_04/04_Bel_Air_Sigonce_2.jpg","../image/image_04/04_Bel_Air_Sigonce_3.jpg","../image/image_04/04_Bel_Air_Sigonce_4.jpg"]},"Consult_chateau_formulairefdd9":{"id":"Consult_chateau_formulairefdd9","dept":"04","canton":"Manosque","commune":"Brillanne","nom":"Brillanne","type":"Vestiges","periode":"XII","histoire":"BRILLANNE; château des Templiers, en 1144 fief des seigneurs de Forcalquier, les frères Robert et Guigues comtes de Forcalquier offrirent la seigneurie au temple de Jérusalem, puis le château du XIe siècle qui dépendait des évêques de Sisteron, fut échangé en 1150 avec Pierre de Sabran contre l'église Notre-Dame Aulanium devenu Notre-Dame des Anges.    En 1462 le roi René fit don de la seigneurie de Brillanne à son valet de chambre et le fief fut morcelé entre plusieurs petits seigneurs.","architecture":"Brillanne; vestiges féodales base de tour et corps de logis remanié.","habitants":"Les comtes de Forcalquier\"","divers":"Vestiges","gps":"","images":["../image/image_04/04_Brillanne_1.jpg","../image/image_04/04_Brillanne_2.jpg"]},"Consult_chateau_formulaire600e":{"id":"Consult_chateau_formulaire600e","dept":"04","canton":"Riez","commune":"Roumoules","nom":"Campagne_Roumoules","type":"Château","periode":"XVII","histoire":"CAMPAGNE; château de la seigneurie de Roumoules au XIVe siècle sont les Podio, co-seigneurs de Riez et de Roumoules, évêques des Roumoules, érigé en baronnie passa au XVIIe siècle aux barons de Grimaldi.                               En 1782 le domaine est acquis  par Pierre-Joseph Clérissy,  baron de Roumoules c'est à lui que l'on attribue les hautes toitures composées d'écailles multicolores du château de Saint-Martin étant issue d'une famille illustre faïencier de Moustiers passa ensuite aux famille d'Omézon et aux Roy, et à la   famille de Gassendi (philosophe astronome et mathématicien).                     Dans la commune le château Saint-Martin.","architecture":"Campagne; Situé dans la vallée de Colostre du XVIIe siècle, sur l'emplacement d'une maison ancienne bâtiment rectangulaire encadré par deux avant corps à peu près carrés saillants flanqués de tourelles, hautes toitures composées d'écailles multicolores.","habitants":"Pierre-Joseph Clérissy \"","divers":"Château de Campagne et village Roumoules","gps":"","images":["../image/image_04/04_Campagne_Roumoules_1.jpg","../image/image_04/04_Campagne_Roumoules_2.jpg","../image/image_04/04_Campagne_Roumoules_3.jpg","../image/image_04/04_Campagne_Roumoules_4.jpg","../image/image_04/04_Campagne_Roumoules_5.jpg"]},"Consult_chateau_formulaire13d4":{"id":"Consult_chateau_formulaire13d4","dept":"04","canton":"Castellane","commune":"Castellane","nom":"Castellane","type":"Vestiges","periode":"XII","histoire":"CASTELLANE; deux châteaux le plus ancien Pietra Castellana qui existait au IXe siècle, à la libération de la Provence par Guillaume Ier le village  fut transformé en fief .                     A partir du XIIe siècle s'établirent une famille  de la noblesse provençale les Castellane qui y firent construire leur château, le bourg se constitue  à cette époque avec des remparts,  car en 1189 le baron de Castellane Boniface II est attaqué par son suzerain le baron Alphonse Ier de Provence, une autre guerre entre baron et son comte en 1227, mais en 1262 c'est Charles d'Anjou qui soumet a Boniface VI  et là prend fin l'histoire des barons de la ville au profit du comte de Provence qui y installe un bailliage, mais en 1536  la ville est assiégé par Charles Quint et en 1559 des troubles religieux et en 1586 attaque du duc de Lesdiguières et du baron d'Allemagne qui ce dernier perdra la vie  et les troupes seront refoulés grâce à l'astuce d'une femme Judith Andreau femme de Barême, une fête annuelle est célébré à cette occasion appelé la \"Pétardière\". La ville résista  a  d'autres attaques en 1746 par les impériaux.                                Le château fut détruit  et la ville fut promu chef lieu de District à la Révolution et sous préfecture sous l'empire.                               La commune abrite le château d'Eoulx château construit pour Joseph Raimond en 1687 cette famille possédait le fief depuis 1381 jusqu'à la Révolution. Peyroules vestiges sur  une colline  voisine, appelé à l'époque la \"Peirola\"  se trouvait à l'emplacement du village de la Rivière au XIe siècle.","architecture":"Castellane; il ne reste que des vestiges au dessus de la ville concernant ces deux châteaux, tour carrée ensemble fortifié du XIIe siècle, tour pentagonale du XIVe siècle à éperon et mâchicoulis et la tour de l'horloge fortifié au Moyen-Age la ville conserve les restes de l'enceinte du XIVe siècle.                         Le château d'Eoulx du XVIIIe siècle corps central rectangulaire émerge sur la façade sud deux tours engagées.          Peyroules subsiste les vestiges du château féodal et la maison seigneuriale du XVIIIe siècle qui abrite la Mairie.","habitants":"Famille de Castellane\"","divers":"Vestiges dans Castellane, château d'Eoulx et vestiges de Peyroules","gps":"","images":["../image/image_04/04_Castellane_1.jpg","../image/image_04/04_Castellane_2.jpg","../image/image_04/04_Castellane_3.jpg","../image/image_04/04_Castellane_4.jpg","../image/image_04/04_Castellane_5.jpg","../image/image_04/04_Castellane_6.jpg","../image/image_04/04_Castellane_7.jpg","../image/image_04/04_Castellane_8.jpg","../image/image_04/04_Castellane_9.jpg"]},"Consult_chateau_formulaire6fd5":{"id":"Consult_chateau_formulaire6fd5","dept":"04","canton":"Les Mées","commune":"Castellet-d`Oraison","nom":"Castellet","type":"Vestiges","periode":"XVII","histoire":"CASTELLET; au XIIIe siècle un grand château fort en ruines des comtes de Provence qui passa ensuite au Beaufort, les Pontevès, les Villeneuve, les Matheron, les Fulques , le marquis d'Oraison et les Taillas qui firent construire leur château au XVII qu'ils gardèrent jusqu'à la Révolution.","architecture":"Castellet; ruines féodales du château fort de Villevieille et Château de Taillas du XVIIe siècle bâtiment rectangulaire avec deux tours rondes en poivrières.","habitants":"Famille de Taillas \"","divers":"","gps":"","images":["../image/image_04/04_Castellet_1.jpg","../image/image_04/04_Castellet_2.jpg"]},"Consult_chateau_formulaireb construit, mais le dernier seigneur avant la Révolution abandonna le château sur la colline et avec les matériaux construisit un château au bord du Verdon ce qui entraîna la ruine prématuré du château-fort, mais le seigneur Alexandre de Demaldox l'abandonna pour la ville de Marseille le vendit au sous préfet de Castellane Robiers du Villars qui fit des aménagements mais sa descendance le laissa à l'abandon et fut revendu en 1851 au marquis Henri de Demandolx qui de nouveau le remit en état, mais l'édifice fut recouvert d'eau par la monté du barrage  de Castillon en 1949, une bastide de remplacement  a été reconstruite en  1940 a Demandolx.","architecture":"Demandolx; le château fort du XIIe siècle sur la colline il ne reste que des vestiges, ce château qui fut détruit en 1564 reconstruit mais détruit au XVIIIe siècle, au profit d'un château au bord du Verdon qui lui fut détruit pour le barrage de Castillon  et une  bastide de remplacement a été élevé au village de Demandolx  de forme de L trois corps de bâtiment logis chapelle et écuries.","habitants":"Seigneurs de Demandolx\"","divers":"Vestiges du château","gps":"","images":["../image/image_04/04_Demandolx_1.jpg","../image/image_04/04_Demandolx_2.jpg","../image/image_04/04_Demandolx_3.jpg"]},"Consult_chateau_formulaire796b":{"id":"Consult_chateau_formulaire796b","dept":"04","canton":"Digne","commune":"Digne","nom":"Digne","type":"Vestiges","periode":"X","histoire":"DIGNE; le bourg au XIIe siècle sous la possession d'une co-seigneurie des évêques de Digne qui ces derniers  font construire un château fort aujourd'hui arasé, puis aux comtes de Provence, un consulat fut accordé en 1385 déjà chef-lieu d'une viguerie  et une sénéchaussée en 1535 et la viguerie restera jusqu'à la Révolution. Digne a beaucoup souffert des guerres de religion et de peste en 1629. Pas d'historique pour cette ville qui  est une station thermale déjà connu avant J-C par les Blédiontici.                 Dans la commune le château du Péage, châ "Château","periode":"X","histoire":"ESPARRON; au XIIIe siècle fief des Castellane. En 1226 Boniface VI de Castellane prête hommage pour Esparron à Raymond Béranger VI comte de Provence qui entra en conflit avec son gendre le comte Charles d'Anjou qui avait assiégé Castellane et Esparron, depuis l'agrandissement au XIIIe siècle ce château abrita dès le XIVe les plus grandes familles provençales; les  Castellane, les Pontevès et les Algout-Esparron, rattachement à la couronne de France en 1481 conserveront jusqu'en 1789 et même après la Révolution reprenne possession du château en 1860.","architecture":"Esparron dont la partie la plus ancienne du Xe siècle; tour massive remanié au XIIIe siècle, six corps de logis remanié au XVIIIe siècle autour d'une cour fermée par une courtine du XVe siècle.","habitants":"Famille de Castellane\"","divers":"Château d'Esparron","gps":"","images":["../image/image_04/04_Esparron_1.jpg","../image/image_04/04_Esparron_2.jpg","../image/image_04/04_Esparron_3.jpg","../image/image_04/04_Esparron_4.jpg","../image/image_04/04_Esparron_5.jpg","../image/image_04/04_Esparron_6.jpg","../image/image_04/04_Esparron_7.jpg","../image/image_04/04_Esparron_8.jpg"]},"Consult_chateau_formulaire89b5":{"id":"Consult_chateau_formulaire89b5","dept":"04","canton":"Mezel","commune":"Estoublon","nom":"Estoublon_Trévans","type":"Vestiges","periode":"XIV","histoire":"ESTOUBLON-Trévans; au Xe siècle fief des abbaye de Montmajour qui construire une nouvelle abbaye  qui fut transformé en prieuré par la suite, le fief passa au XIVe siècle aux seigneurs de Grimaldi puis à la maison de la Garde au XVIe siècle  et aux Brunet au XVIIIe siècle. Trévans le château dont-il reste que des vestiges, il a appartenu au XIIe siècle à Pierre Clerissy, une abbaye de Carmes fut crée par les moines de Trévans.","architecture":"Estoublon; vestiges des bases du château sur motte féodale.                    Trévans; vestiges du château pan de murs et bâtisse remanié.","habitants":"seigneurs de Grimaldi\"","divers":"Vestiges d'Estoublon et de Trévans","gps":"","images":["../image/image_04/04_Estoublon_Trevans_1.jpg","../image/image_04/04_Estoublon_Trevans_2.jpg","../image/image_04/04_Estoublon_Trevans_3.jpg","../image/image_04/04_Estoublon_Trevans_4.jpg","../image/image_04/04_Estoublon_Trevans_5.jpg"]},"Consult_chateau_formulaire712c":{"id":"Consult_chateau_formulaire712c","dept":"04","canton":"Digne","commune":"Mirabeau","nom":"Fontenelle","type":"Manoir","periode":"XVII","histoire":"FONTENELLE; au XVIe siècle fief des Barras seigneur de Mirabeau de Beauvezet et de Fontenelle jusqu'en 1753, puis au Deydier, aux Curiol, puis passa à la famille Romieu et racheté dernièrement par la famille Barrière.                Ce château a été un centre viticole où l'on pressait et cultiva le vin, possède encore les instruments.               Dans la commune de Mirabeau  non loin de Thouard, le château de Mirabeau du XVIIIe siècle qui a était à moitié incendié, en avant de ce château se trouve deux tourelles sur un terre-plein.                                          Un autre château le Saint-Christol en ruine et une ferme fortifiée au Thumins.","architecture":"Fontenelle; d'aspect médiéval a conservé son allure moyenâgeuse, haut corps central pris entre quatre tourelles cylindriques élancées.","habitants":"Famille de Fontenelle\"","divers":"Manoir de fontenelle et château de Mirabeau","gps":"","images":["../image/image_04/04_Fontenelle_1.jpg","../image/image_04/04_Fontenelle_2.jpg","../image/image_04/04_Fontenelle_3.jpg","../image/image_04/04_Fontenelle_4.jpg"]},"Consult_chateau_formulaire517b":{"id":"Consult_chateau_formulaire517b","dept":"04","canton":"Forcalquier","commune":"Forcalquier","nom":"Forcalquier","type":"Vestiges","periode":"XII","histoire":"FORCALQUIER, la ville se constitua vers le VIIe siècle  autour d'une butte, capitale d'un petit état indépendant tout le XIIe siècle, le destin de cette ville changea suite au mariage d'Alphonse II comtes de Provence et de Guersande de Sabran comtesse de Forcalquier, puis Raymond Béranger dont les quatre filles toutes devenues reines; Marguerite épousa Henri III en 1234 devient reine d'Angleterre, Eléonore  épousa en 1236 Louis IX devient reine de France;  Béatrix épousa Charles d'Anjou comte de Provence devient reine de Naples et des deux Siciles Sancie épousa Richard de Cornouailles devient  impératrice d'Allemagne et reine de Rome.           Forcalquier intégra au XIIIe siècle à part entière le comté de Provence, possédait un château aujourd'hui disparu, Henry IV le fit raser  en 1601. Forcalquier chef lieu de la viguerie jusqu'à la Révolution. Subit des troubles au XIV jusqu'au XVIIe siècle des guerres de religion, puis épidémie de peste.                                            Dans le canton commune de Limans  manoir des Ybourges du XIII-XIVe siècle.","architecture":"Forcalquier; ancienne citadelle dont le château a disparu en 1601, vestiges, portes des Cordeliers du XIIIe siècle l'une des six portes des remparts, ruines d'un château du XVIe siècle avec pigeonnier à Nôtre Dame de Fougéres, hôtel particulier, maison du roi René (tribunal actuel).                      Manoir des Ybourges rustique rectangle allongé avec deux corps de logis droite et gauche du Moyen-Age.","habitants":"Comte de Provence\"","divers":"Portes et vestiges","gps":"","images":["../image/image_04/04_Forcalquier_1.jpg","../image/image_04/04_Forcalquier_2.jpg","../image/image_04/04_Forcalquier_3.jpg","../image/image_04/04_Forcalquier_4.jpg","../image/image_04/04_Forcalquier_5.jpg","../image/image_04/04_Forcalquier_6.jpg","../image/image_04/04_Forcalquier_7.jpg","../image/image_04/04_Forcalquier_8.jpg"]},"Consult_chateau_formulairefe02":{"id":"Consult_chateau_formulairefe02","dept":"04","canton":"Valensole","commune":"Gréoux-les-Bains","nom":"Greoux","type":"Vestiges","periode":"XII","histoire":"GREOUX; château fort  dit des \"Templiers\" en ruines, reprit par les  Hospitaliers  des Saint-Jean canton":"Digne","commune":"Chaffaut-St-Jurson","nom":"Lagremuse_Chaffaut","type":"Château","periode":"XVII","histoire":"LAGREMUSE-CHAFFAUT; au XII-XIIIe siècle fief des Galbert qui étaient seigneurs du Chaffaut, au XVe siècle ce fief fut partagé entre divers seigneurs dont la ville de Digne.                   Chaffaut et Lagremuse ces deux communes fusionnent en 1887 et St-Jurson les rejoints en 1962 et Epinouse en 1973.   Au XIVe siècle  le premier seigneur de Lagremuse \"Jean Guiramand\", aujourd'hui de l'ancien château du XVe siècle construit sur le rocher,  il ne reste que des ruines, Le château médiéval fut construit en 1615 par Charles de Tabaret  seigneur du lieu reprit par la famille du Chaffaut, toujours dans cette famille, ce château a été utilisé pour le tournage du film du hussard sur le toit.                                            St-Jurson dépendait au XIIIe siècle de l'abbaye du Lerins.                    Dans la commune la bastide de Carmejane devenu lycée agricole, le dernier propriétaire est Albin Charles Marie de Carmejane directeur des lignes téléphoniques au XIXe siècle.","architecture":"Lagremuse-Chaffaut; du XVIIe siècle corps de logis restreint entre  trois tours carrées en possédait quatre à l'origine fenêtres à meneaux  et porte côté parc  avec fronton  coupé d'une niche.                                      Carmejane; trois corps de logis et pigeonnier à tourelles rondes, toits en poivrière du XVIIe siècle. Lagremuse et St-Jurson vestiges du château-fort.","habitants":"Famille Chaffaut\"","divers":"Château de Lagremusse  et vestiges de Chaffaut","gps":"","images":["../image/image_04/04_Lagremuse_Chaffaut_1.jpg","../image/image_04/04_Lagremuse_Chaffaut_2.jpg","../image/image_04/04_Lagremuse_Chaffaut_3.jpg","../image/image_04/04_Lagremuse_Chaffaut_4.jpg","../image/image_04/04_Lagremuse_Chaffaut_5.jpg","../image/image_04/04_Lagremuse_Chaffaut_6.jpg","../image/image_04/04_Lagremuse_Chaffaut_7.jpg"]},"Consult_chateau_formulairea5f1":{"id":"Consult_chateau_formulairea5f1","dept":"04","canton":"Reillanne","commune":"Lincel","nom":"Lincel","type":"Château","periode":"XIII","histoire":"LINCEL; baronnie cité au XIIIe siècle de la famille de Layncel, nom utilisé à l'époque, une des plus ancienne chevalerie  de Provence qui donna de nombreux évêques au diocèse de Gap  dont Gauffredi de Layncel qui fonda en 1190 l'église Sainte-Marie-Madeleine. Cette famille prit le nom de Croze-Lincel par alliance  seigneurie  de Roumoules, Saint-Martin de Renaca et Thorame;  installée à Aix en Provence formant deux lignées anoblies chargé du Parlement de Provence en 1577 et s'installèrent au XVIIIe siècle en Arles et passa par alliance  en 1804 a la famille de Gardanne qui construisit le château de Lincel.","architecture":"Lincel Château reconstruit au XIXe siècle par les Gardanne.","habitants":"famille de Gardanne\"","divers":"Château de Lincel","gps":"","images":["../image/image_04/04_Lincel_1.jpg","../image/image_04/04_Lincel_2.jpg","../image/image_04/04_Lincel_3.jpg"]},"Consult_chateau_formulaired7b7":{"id":"Consult_chateau_formulaired7b7","dept":"04","canton":"Barrême","commune":"Tartonne","nom":"Maladrech","type":"Maison forte","periode":"XVII","histoire":"MALADRECH; le village de la Peine est rattaché à Tartonne au XVe siècle, il était constitué d'un monastère qui fut abandonné avant la Révolution, ce monastère appartenait à la famille du philosophe  Dignois Gassendi.           Au Moyen-Age le village fut rasé  plusieurs fois et en 1642  Marc Antoine Gassendi fit construire le château de Maladrech.                               Les seigneurs de ces lieux furent depuis le XIIIe siècle les Baux qui le gardèrent jusqu'au XVe siècle,  puis du XV au XVIe siècle les d'Agoult, du XVI au XVII les Villeneuve et enfin les Gassendi jusqu'à la Révolution.","architecture":"Maladrech: corps de logis rectangulaire à deux niveaux  avec tours rondes à l'écart (pigeonnier), plus ferme.","habitants":"Famille de Gassendi\"","divers":"Château de Maladrech","gps":"","images":["../image/image_04/04_Maladrech_1.jpg"]},"Consult_chateau_formulaireaac4":{"id":"Consult_chateau_formulaireaac4","dept":"04","canton":"Les Mées","commune":"Malijai","nom":"Malijai(04)","type":"Château","periode":"XVII","histoire":"MALIJAI; au début du XVIe siècle le seigneur Melchior de Mazargues acheta la seigneurie, passera à la famille d'Arlatan en 1691 jusqu'en 1759 acquise par Pierre-Vincent Noguier riche bourgeois marseillais qui fit construire un nouveau château sur l'emplacement de l'ancien  que la famille gardera jusqu'au XIXe siècle. Dans ce château s'arrêta Napoléon Ier en mars 1815 de retour de l'île d'Elbe, le château fut vendu à Monsieur Paseval et ce dernier le revendra en 1940 à la société Pechiney pour des séminaires et  le revendra  à la commune en 1970 qui installera les services communaux.                   Dans la commune le château de Serre Bouret et les ruines du château fort de Chenerilles.","architecture":"Malijai; château de style classique du XVIIIe siècle rectangulaire à trois niveaux, côté village deux tours rondes coiffées en éteignoir, façade centrale ornée d'un fronton plein cintre sur corps légèrement saillant.","habitants":"Monsieur Pierre-Vincent Noguier \"","divers":"Château de Malijai","gps":"","images":["../image/image_04/04_Malijai(04)_1.jpg","../image/image_04/04_Malijai(04)_2.jpg","../image/image_04/04_Malijai(04)_3.jpg","../image/image_04/04_Malijai(04)_4.jpg"]},"Consult_chateau_formulaire7c75":{"id":"Consult_chateau_formulaire7c75","dept":"04","canton":"Forcalquier","commune":"Mane","nom":"Mane","type":"Forteresse","periode":"XII","histoire":"MANE; citadelle fortifiée au XIIe siècle  fief  des comtes de Forcalquier qui passa à la vicomté de Reillanne en 1379, il appartenait au XIVe siècle à la famille d'Agoult passa au XVe siècle aux Bourlier au XVIe siècle aux Forbin qui le gardèrent jusqu'à la Révolution.      Prieuré de Salagnon, monument historique du XIIe siècle.","architecture":"MANE; citadelle fortifiée au XIIe siècle très remanié au XVIe siècle, a conservé de la fin du XVe et XVIe siècle une série de maisons bourgeoises et le château au sommet de la butte, corps de logis du XVIe siècle. Une double enceinte  de remparts la seule de Haute Provence qui soit restée intact et son château au sommet. Mais c'est le prieuré de Salagnon qui est le fleuron.","habitants":"Famille d'Agoult \"","divers":"Citadelle de Mane. Prieuré de Salagnon.","gps":"","images":["../image/image_04/04_Mane_1.jpg","../image/image_04/04_Mane_2.jpg","../image/image_04/04_Mane_3.jpg","../image/image_04/04_Mane_4.jpg"]},"Consult_chateau_formulaire6b9a":{"id":"Consult_chateau_formulaire6b9a","dept":"04","canton":"Manosque","commune":"Manosque","nom":"Manosque","type":"Vestiges","periode":"XII","histoire":"MANOSQUE; villa construite par Osco de Monasco d'autres disent Villa  Manuasca au XIe  siècle possédait à l'époque trois châteaux un en  ville appelé\" l'Ordre de Malte\" fut vendu aux enchères à la Révolution puis rasé, un autre sur la butte appelé Mont d'Or  dont il reste une tour ruinée et le château de Montagu disparu. La seigneurie du XIIe siècle aux XVIIIe siècle sont partagés entre l'abbaye de Saint-Victor de Marseille et du comte de Forcalquier qui ces derniers en font donation aux Hospitaliers de Saint-Jean, elle était également le siège d'un bailliage des comtes de Provence. Manosque subit les Sarrasins  saccage et pillage puis ravagé par la peste au XVIe siècle. Fut la ville de Jean Giono.                              Dans la ville manoir des tourelles.      Dans la commune le château de Gassaud. Aux environs de Manosque Saint-Martin des Eaux la mairie dans un ancien château.","architecture":"Manosque; du village médiéval il reste deux portes;  la Saunerie de 1380  et de Soubeyran du XIVe également flanqué de tour crénelé à mâchicoulis, les portes Guilhempierre et d'Aubette sont détruit et vestiges du donjon  du château du Mont d'Or dont il ne reste q'un pan du XIIe siècle.","habitants":"Comte de Provence\"","divers":"Vestiges de portes de la ville, du château Mont d'Or et manoir des tourelles","gps":"","images":["../image/image_04/04_Manosque_1.jpg","../image/image_04/04_Manosque_2.jpg","../image/image_04/04_Manosque_3.jpg","../image/image_04/04_Manosque_4.jpg","../image/image_04/04_Manosque_5.jpg"]},"Consult_chateau_formulaire6dff":{"id":"Consult_chateau_formulaire6dff","dept":"04","canton":"Sisteron","commune":"Mison","nom":"Mison","type":"Forteresse","periode":"XII","histoire":"MISON; au Xe siècle le clerc Richaud en fit don de la moitié  de la forteresse à l'abbaye de Cluny, l'autre moitié appartenait  à Pierre de Mison qu'il garda jusqu'au XIIIe siècle géré par la seigneurie, suite de Raimond Laugier, Bertrand de Mison  seigneur de Mévouillon et de Barret; Galburge de Mévouillon qui reçu une vingtaine de châteaux elle fut promise  en 1239 à Guillaume des Baux,  puis la baronnie  passa en 1263  à Charles Ier d'Anjou  comte de Provence et à la reine Jeanne qui la vendit en 1378 aux seigneurs d'Agoult vendu ensuite à la famille d'Armand et fut érigé en marquisat en 1694 par ce dernier.  En 1789 le seigneur était les d'Arbaud-Jouques, ruiné car il fut détruit à la Révolution mais ces ruines appartenait au comte de Vitrolles, aujourd'hui à la commune de Mison.","architecture":"Mison, sur une motte enceinte énorme butte de poudingue de 60 mètres par 80 mètres de côté surélevée de 10 mètres qui surveillé la vallée du Buech aménagée par des passages souterrains l'accès au plateau, il ne reste que des vestiges de ruines du château fort qui tomba en ruine à partir du XVIIIe siècle.","habitants":"Seigneur Pierre de Mison\"","divers":"vestiges de la forteresse et clocher du village","gps":"","images":["../image/image_04/04_Mison_1.jpg","../image/image_04/04_Mison_2.jpg","../image/image_04/04_Mison_3.jpg","../image/image_04/04_Mison_4.jpg","../image/image_04/04_Mison_5.jpg","../image/image_04/04_Mison_6.jpg"]},"Consult_chateau_formulairedf98":{"id":"Consult_chateau_formulairedf98","dept":"04","canton":"Riez","commune":"Montagnac-Montpezat","nom":"Montagnac_Montpezat","type":"Château","periode":"XII","histoire":"MONTAGNAC; un château épiscopal existait au XIIe siècle, fief des abbés du Lerins, la seigneurie passa aux comtes de Provence, puis les Simiane en sont  les seigneurs, François de Pontevés-Simiane en 1672, et le château fut rasé pendant les guerres de religion.                Le château de MONTPEZAT fut la propriété des  évêques de Riez, co-seigneur de Montpezat de 1234 à 1631 et les co-seigneurs Vintimille  également de 1271 à 1700 au XVIIIe siècle la famille  d'Abran, à la Révolution le château est désigné a être détruit mais en réchappe transformé par monsieur Guy Deschamps qui l'acquit à Monsieur De Vécchi.","architecture":"Montagnac et Monpezat commune réunit, le château de Montagnac détruit pendant les guerres de religion, le château de Montpezat en bordure du Verdon abrupt parallélépipède de pierre la partie médiéval du XIIIe siècle fermé de quatre corps de bâtiments formant une masse quadrangulaire avec la façade principale tournée vers le sud au XVIe siècle les ailes ont été rajouté l'ensemble restaurée au XVIIe siècle  à la Révolution  est désigné a être détruit mais en réchappe et fut transformé.","habitants":"François de Pontevés-Simiane\"","divers":"château de Montagnac-Montpezat","gps":"","images":["../image/image_04/04_Montagnac_Montpezat_1.jpg","../image/image_04/04_Montagnac_Montpezat_2.jpg"]},"Consult_chateau_formulaireee32":{"id":"Consult_chateau_formulaireee32","dept":"04","canton":"Seyne-les-Alpes","commune":"Montclar","nom":"Montclar","type":"Manoir","periode":"XVII","histoire":"MONTCLAR; au XIIIe siècle fief d'une baronnie de Paul de Jarente et seigneur de Selonnet et gouverneur de Seyne,  construit par les seigneurs de Lioux d'Astuard  en 1650, à la Révolution le propriétaire était le seigneur Jules Claude Louis de  Rippert qui fut guillotiné et le château fut z; château du XIVe siècle, corps de logis rectangulaire à trois niveau, flanqué de tours ronde en angles.","habitants":"Famille de Chaillans\"","divers":"manoir de Moriez","gps":"","images":["../image/image_04/04_Moriez_1.jpg"]},"Consult_chateau_formulaire2781":{"id":"Consult_chateau_formulaire2781","dept":"04","canton":"Forcalquier","commune":"La Motte-du-Caire","nom":"Motte_du_Caire","type":"Vestiges","periode":"XII","histoire":"MOTTE du CAIRE; chef lieu de canton qui comprend treize communes qui dépendaient au Xe siècle à l'Ordre de la Trinité qui y firent établir un couvent qui fut supprimé au XIIIe siècle.                Dans les communes du Caire qui devient le fief de Charles d'Anjou frère de Saint-Louis ou il firent construire le château du comte Hugues. Charles  donna au vicomte Roger de Beaufort la ville de la Motte et seigneuries environnantes  pour service rendu à la reine Jeanne, un des fils de Charles devint pape sous le nom de Clément VI.                       MELVE, fief des d'Agoult au XIVe siècle puis passa  aux Perinet au XVIIe siècle.  Faucon du Caire  fief des Glandevès en 1423 qu'ils gardèrent jusqu'au XVIe siècle passa ensuite au Bouchet qui  le  gardèrent jusqu'à la Révolution.","architecture":"La Motte du Caire;  Ruines féodales.     Melve; vestiges d'un donjon carré, dit tour \"Sarrasine\" qui domine le village et château vieux ruiné.                   Château de la bâtie du XVIIe siècle.     Un château à Faucon du Caire; Châteaufort ruines féodales; Nibles (voir article).","habitants":"Charles d'Anjou\"","divers":"Vestiges de châteaufort de Sigoyer et Théze","gps":"","images":["../image/image_04/04_Motte_du_Caire_1.jpg","../image/image_04/04_Motte_du_Caire_2.jpg","../image/image_04/04_Motte_du_Caire_3.jpg","../image/image_04/04_Motte_du_Caire_4.jpg","../image/image_04/04_Motte_du_Caire_5.jpg","../image/image_04/04_Motte_du_Caire_6.jpg","../image/image_04/04_Motte_du_Caire_7.jpg"]},"Consult_chateau_formulaire2cda":{"id":"Consult_chateau_formulaire2cda","dept":"04","canton":"Riez","commune":"Moustiers-Ste-Marie","nom":"Moustiers","type":"Vestiges","periode":"X","histoire":"MOUSTIERS-Ste Marie: doit son nom (Monastérium) à une colonie des moines du Lerins, fondateurs de Moutiers qui construisirent la chapelle Nôtre-Dame de Beauvoir,  en 432 amenée par l'évêque Maxime de Riez qui en fit un lieu saint. Moustiers subirat  les invasions barbares au VIIIe siècle, les Sarrasins au Xe siècle.                                 Ayant pris partie pour la reine Jeanne, la ville subit la vengeance des partisans de Charles de Duras. En 1385 la ville prête serment d'allégeance. En reconnaissance,  le roi confirme les anciens privilèges et déclare Moustiers inaliénable à perpétuité du domaine comtal. Au moment des guerres de succession d'Autriche, Moustiers repousse les assaillants.                          Du XVII au XVIIIe siècle la ville connait le développement de la faïence.  La dynastie des Cléres (1680-1782) est célèbre par l'invention du polychrome.  Parmi les clients le duc de Richelieu et madame de Pompadour.                     Dans la commune château de Ségriè, de Vals, et ferme fortifiée de l'Hert et Abords.","architecture":"Moutiers; Sur fond de crique rocheux déchiquetés, profondément entaillé posé sur un plateau verdoyant dont le pied est baigné par la petite rivière de la Mairie, le village se sépare en deux, relié par des ponts en pierre pittoresque dédale de placettes et de ruelles chevauchées de voûtes et d'arcades. Vestiges de remparts, porte fortifiée du XVe siècle.","habitants":"Evêque Maxime de Riez\"","divers":"Vestiges et chapelle Nôtre-dame.","gps":"","images":["../image/image_04/04_Moustiers_1.jpg","../image/image_04/04_Moustiers_2.jpg","../image/image_04/04_Moustiers_3.jpg","../image/image_04/04_Moustiers_4.jpg"]},"Consult_chateau_formulaire862c":{"id":"Consult_chateau_formulaire862c","dept":"04","canton":"La Motte-du-Caire","commune":"Châteaufort","nom":"Nibles","type":"Vestiges","periode":"XVI","histoire":"NIBLES; Appartenait au XIIe siècle à l'ordre de Malte, le fief fut  rattaché au Marquisat d'Oraison en 1588 puis passa à la famille André au XVIIe siècle puis aux Arnaud au XVIIIe siècle, le château fut pillé pendant la Révolution, entièrement démoli.","architecture":"Nibles; le château fut entièrement démoli, le bâtiment appelé château est une maison seigneuriale du XVIIIe siècle possède un pigeonnier rond, un autre bâtiment appelé aussi château est une tour de guet à la Bâtie datant du XIIe siècle sur un piton rocheux de forme carrée elle subsiste sur 6 à 7 mètres de hauteur.","habitants":"Famille André\"","divers":"Vestiges du château","gps":"","images":["../image/image_04/04_Nibles_1.jpg"]},"Consult_chateau_formulaire9a2e":{"id":"Consult_chateau_formulaire9a2e","dept":"04","canton":"Forcalquier","commune":"Niozelles","nom":"Niozelles","type":"Vestiges","periode":"XVI","histoire":"NIOZELLES; ce village qui appartenait au XIIIe siècle à l'abbaye de Saint-André de Villeneuve les Avignon possède un premier château  au centre du village.          Du château de Niozelles du XIV siècle la seigneurie des Sabran passa ensuite aux XVIe siècle aux Bourliers de Manthaud seigneurs de Niozelles et de Joye qui firent construire le château et aux Glandevès au XVII-XVIIIe siècle.","architecture":"Niozelles; sur une motte féodale trace d'un château fort qui était entourait de remparts polygonal.                   Dans le village donjon cylindrique  du château accolé à une résidence massive seigneuriale  de plan rectangulaire une des deux tours d'angles  de la façade a disparu.","habitants":"Famille de Glandevès\"","divers":"Donjon du XIIIe siècle à la vieille église","gps":"","images":["../image/image_04/04_Niozelles_1.jpg"]},"Consult_chateau_formulairec980":{"id":"Consult_chateau_formulairec980","dept":"04","canton":"Forcalquier","commune":"Noyers-sur-Jabron","nom":"Noyers_Jabron","type":"Château","periode":"XIV","histoire":"NOYERS sur Jabron; au Moyen-Age le fief dépendait  de l'Abbaye de Cruis au XIVe siècle et des comtes de Provence et au XVe siècle aux d'Agoult, aux Garret et aux Clermont au XVIIe siècle.             La commune de Noyers et de Ribiers se combattirent en 1516 pour une question de Bornage.  Le village de Jarjayes fut rattaché en 1832, possède également des ruines de château de 1700.              Le village de Noyers neuf naquit lorsque les habitants du vieux Noyers décidèrent au XIXe siècle de descendre dans la vallée.","architecture":"Noyers sur Jabron; du vieux village ruines quelques vestiges porte de l'enceinte et le portail fortifié du château tour à mâchicoulis. La bastide de Périvoye date du XVIIe siècle,  le château de la Grande-Bastie construit au XVIIe siècle  façades entre deux tourelles rondes dont-une abrite la chapelle qui a était rénové. Dans la vallée le château de la Grande-Bastide  et le domaine de Rocoule à Bevons.","habitants":"Famille des Clermont \"","divers":"Château de Roucoule de la Grande Bastie de Noyers et de Perivoye.","gps":"","images":["../image/image_04/04_Noyers_Jabron_1.jpg","../image/image_04/04_Noyers_Jabron_2.jpg","../image/image_04/04_Noyers_Jabron_3.jpg","../image/image_04/04_Noyers_Jabron_4.jpg","../image/image_04/04_Noyers_Jabron_5.jpg","../image/image_04/04_Noyers_Jabron_6.jpg","../image/image_04/04_Noyers_Jabron_7.jpg"]},"Consult_chateau_formulaire31a2":{"id":"Consult_chateau_formulaire31a2","dept":"04","canton":"St-Etienne-les-Orgues","commune":"Ongles","nom":"Ongles","type":"Château","periode":"XVII","histoire":"Les ONGLES; aux Xe siècle fief  des Hospitaliers de Saint-Jean  (de l'Ordre de Malte) et de l'abbaye de Saint-Victor de Marseille, passa au XIIIe siècle aux vicomte de Reillanne,  aux d'Agoult au XIVe siècle, au XVe siècle aux Glandevés, aux de Vins au XVIIe siècle et au Arnaud -Badet qui le gardèrent jusqu'à la Révolution.","architecture":"Les Ongles; ruines de l'ancien village et du château de la Viere qui date de 1670 construit de style Louis XIII.","habitants":"Famille des Arnaud -Badet\"","divers":"Manoir et château à Ongles","gps":"","images":["../image/image_04/04_Ongles_1.jpg","../image/image_04/04_Ongles_2.jpg","../image/image_04/04_Ongles_3.jpg"]},"Consult_chateau_formulaireca46":{"id":"Consult_chateau_formulaireca46","dept":"04","canton":"Les Mées","commune":"Oraison","nom":"Oraison","type":"Château","periode":"XVIII","histoire":"ORAISON; au XIIe siècle fief des seigneurs de la famille d'Oraison; Hugues d'Oraison seigneur d'Oraison et de Clumac devient gouverneur de Provence pour sa bravoure auprès de Béranger Ier. Cette baronnie  passe en marquisat par Henri III d'Oraison en 1588, et restera dans cette famille jusqu'en 1720, racheté  par Esprit de Fulque qui fit construire le château actuel qui sera terminé par ses fils dont la descendance  aura des carrières militaires qui prendront fin à la Révolution et les biens seront confisqués et vendus comme bien national en 1792, le maire de la commune d'Oraison monsieur Ambroise Laugier en est propriétaire qui le restaure et a reçu de nombreuses personnalités tel que Louis Pasteur, de nouveau restauré pour en faire des habitations pour différents propriétaires.","architecture":"Oraison; du premier château il ne subsiste que quelques vestiges de murailles sur la colline du Tholonet, dominant le village.                    Le château actuel du XVII-XVIIIe siècle fut magnanerie à la Révolution dans le village d'Oraison construit en cailloux roulés de la Durance à trois niveaux rectangulaires,  deux tours rondes, d'une toiture assez plate typique des Alpes de Hautes Provence.","habitants":"Famille de Hugues d'Oraison              Famille d'Esprit de Fulque\"","divers":"Château d'Oraison","gps":"","images":["../image/image_04/04_Oraison_1.jpg","../image/image_04/04_Oraison_2.jpg","../image/image_04/04_Oraison_3.jpg","../image/image_04/04_Oraison_4.jpg"]},"Consult_chateau_formulaire2602":{"id":"Consult_chateau_formulaire2602","dept":"04","canton":"Moustiers-Ste-Marie","commune":"La Palud-sur-Verdon","nom":"Palud_Verdon","type":"Château","periode":"XVII","histoire":"PALUD; au XIIe siècle suite à la guerre de 1188 le fief passe aux comtes de Provence et le baron de Castellane fit construire un nouveau château au nord de l'ancien qu'il nomme Châteauneuf l'ancien village prit le nom de la Palud  et passa aux  Demandolx au XIVe siècle qui le gardèrent jusqu'à la Révolution.         Le château appelé à être détruit passe au travers. Propriété de la commune.","architecture":"Palud château du XVIIe siècle masse imposante de forme rectangulaire à quatre niveaux flanqués de tours rondes en angles.","habitants":"Famille de Domandolx\"","divers":"Château de la Palud","gps":"","images":["../image/image_04/04_Palud_Verdon_1.jpg","../image/image_04/04_Palud_Verdon_2.jpg","../image/image_04/04_Palud_Verdon_3.jpg","../image/image_04/04_Palud_Verdon_4.jpg","../image/image_04/04_Palud_Verdon_5.jpg","../image/image_04/04_Palud_Verdon_6.jpg","../image/image_04/04_Palud_Verdon_7.jpg"]},"Consult_chateau_formulaire74f0":{"id":"Consult_chateau_formulaire74f0","dept":"04","canton":"Forcalquier","commune":"Peyruis","nom":"Peyruis","type":"Vestiges","periode":"XII","histoire":"PEYRUIS; au XIIe siècle fief relevait des comtes de Forcalquier passa au XIIIe siècle aux comtes de Provence puis fut donné en 1319 à Pierre de Vie et passa à Honorat de Peyruis  qui en devient seigneur en 1456, il en est dépossédé en 1481 au profit de Palamède de Forbin, premier gouverneur de Provence qui  garderont la seigneurie jusqu'en 1647. Prieuré de Ganagobie, monastère à l'origine fondé par l'évêque de Sisteron en 950 appartient à l'abbaye de Cluny, les moines au XIIe siècle terminèrent la construction actuelle et après le XIVe siècle tombe à l'abandon, ce monastère fut accaparé par les seigneurs de  Bousquet en 1573 jusqu'en 1670.","architecture":"Peyruis; le village conserve des vestiges médiévaux de fortifications du XIIe siècle avec le château à donjon qui le domine enceinte et porte du XIIe siècle et deux autres château-forts ruinés, un au hameau du Piousin, l'autre hameau de Gaud.                                   Le château de Peyruis qui fut reconstruit en partie au XVIe siècle fut détruit à la Révolution.                               Le site de Ganagobie le plus prestigieux édifices médiévaux.","habitants":"Famille d'Honorat de Peyruis\"","divers":"Vestiges de la forteresse a Peyruis Prieuré de Ganagobie","gps":"","images":["../image/image_04/04_Peyruis_1.jpg","../image/image_04/04_Peyruis_2.jpg","../image/image_04/04_Peyruis_3.jpg","../image/image_04/04_Peyruis_4.jpg","../image/image_04/04_Peyruis_5.jpg","../image/image_04/04_Peyruis_6.jpg","../image/image_04/04_Peyruis_7.jpg","../image/image_04/04_Peyruis_8.jpg"]},"Consult_chateau_formulaire6b7a":{"id":"Consult_chateau_formulaire6b7a","dept":"04","canton":"Manosque","commune":"Pierrevert","nom":"Pierrevert","type":"Vestiges","periode":"XII","histoire":"PIERREVERT; le château de Tributiis  était partagé par six arrières-fiefs, Beauchamp, Bouc, Carbonelle, Châteauneuf, Ste-Marguerite et Valgast subit en partie la destruction de Raymond de Turenne en 1390. Le village dépendait de l'abbaye de Saint-Victor de Marseille puis au comté de Forcalquier, puis passa au XIVe siècle au Ventadour au XVe siècle une famille de juriste d'origine italienne, les Tributiis prend possession du château de Sainte-Marguerite, anoblie en 1690, cette famille gardèrent le château jusqu'en 1674 ou Françoise de Tributiis sans alliance vendit son château  aux comte d' Oraison  et passa aux de Barnier jusqu'à la Révolution.                         Capitale des viticulteurs des Alpes de Hautes Provence.","architecture":"Pierrevert; du village féodal il ne reste que la porte du XVIIIe siècle dite porte Saint-Joseph, et quelques éléments de courtine, de tours.","habitants":"Famille de Tributiis\"","divers":"Vestiges du village fortifié","gps":"","images":["../image/image_04/04_Pierrevert_1.jpg","../image/image_04/04_Pierrevert_2.jpg","../image/image_04/04_Pierrevert_3.jpg","../image/image_04/04_Pierrevert_4.jpg"]},"Consult_chateau_formulaire179b":{"id":"Consult_chateau_formulaire179b","dept":"04","canton":"Riez","commune":"Quinson","nom":"Quinson","type":"Vestiges","periode":"XV","histoire":"QUINSON; village médiévale  du XIIe siècle  des évêques de Riez puis reprit par les abbés de Lerins,  au XIIIe siècle par les comtes de Provence. Au XVe siècle la reine Yolande d'Aragon régente de Provence permit de construire les enceintes pour protéger le village et de prélever les péages sur les ponts du Verdon.                                 Au XVIe siècle le bourg devient ville royale.","architecture":"Quinson, remparts de l'enceinte construite en 1420 percée de deux portes et défendue de sept tours  dont deux sont construites au-dessus d'une porte.","habitants":"La reine Yolande d'Aragon\"","divers":"Vestiges des fortifications de la ville","gps":"","images":["../image/image_04/04_Quinson_1.jpg","../image/image_04/04_Quinson_2.jpg","../image/image_04/04_Quinson_3.jpg","../image/image_04/04_Quinson_4.jpg","../image/image_04/04_Quinson_5.jpg","../image/image_04/04_Quinson_6.jpg"]},"Consult_chateau_formulaire0ba2":{"id":"Consult_chateau_formulaire0ba2","dept":"04","canton":"Banon","commune":"Redortiers","nom":"Redortiers","type":"Vestiges","periode":"XII","histoire":"REDORTIERS; l'Oppidum devient le village fortifié et fut céder vers l'an mille à l'Abbaye de Montmajour.                 Le village fut  cité au XIIe siècle  par l'abbaye de Carluc qui construisirent le prieuré, les paysans au Moyen-Age  se groupèrent autour de ce dernier pour se protégeaient des pillards.                La seigneurie fut les Simiane qui sont a l'origine de la construction du donjon du XIIe siècle dont il reste quelques ruines et cette seigneurie passa du XV au XVIIe siècle à la famille Tarque.","architecture":"Redortiers; ils ne reste malheureusement que quelques pans de murs, un donjon du XIIe siècle.","habitants":"Les seigneurs de Simiane \"","divers":"Vestiges du château","gps":"","images":["../image/image_04/04_Redortiers_1.jpg"]},"Consult_chateau_formulaire6aa3":{"id":"Consult_chateau_formulaire6aa3","dept":"04","canton":"Forcalquier","commune":"Reillanne","nom":"Reillanne","type":"Vestiges","periode":"XVII","histoire":"REILLANNE; vicomté en 1349; fief des Foulque d'Agoult  qui firent construire en 1650 un imposant château fort dans une enceinte extérieure qui comptait dix huit tours qui furent presque entièrement détruites à la Révolution, il ne reste que quelques pans de murs et la porte Saint-Pierre.","architecture":"Reillanne; vestiges du château médiéval remparts et portes fortifiées.","habitants":"Famille Foulque d'Algoult\"","divers":"vestiges féodals","gps":"","images":["../image/image_04/04_Reillanne_1.jpg","../image/image_04/04_Reillanne_2.jpg","../image/image_04/04_Reillanne_3.jpg","../image/image_04/04_Reillanne_4.jpg","../image/image_04/04_Reillanne_5.jpg","../image/image_04/04_Reillanne_6.jpg"]},"Consult_chateau_formulaire271d":{"id":"Consult_chateau_formulaire271d","dept":"04","canton":"Banon","commune":"Revest-du-Bion","nom":"Revest_Bion","type":"Château","periode":"XVII","histoire":"REVEST de Bion; le château dépendait  à un dénommé Jean Louis de Testanière qui  fut bourgeois de Redortiers  puis seigneur de Miraval de Gensac et de Malcor et par alliance  la seigneurie passa en 1705 aux  Gaffarel de Mane, aux Arnaud  en 1752 à Mathieu de Testanière, président de la cour des comptes d'Aix en Provence. La famille de Testanière de Miravail ont donné au XIXe siècle deux conseillers à la cour royale  d'Aix en Provence.                               En 1913 décède la dernière des Testanière de Miravail Louise qui était également propriétaire du château de l'Homet des Fons  à Bassurels en Lozère.","architecture":"Revest de Bion le bâtiment appelé  \"château\" rectangulaire  au milieu du village du XVIIe siècle.","habitants":"Famille de Jean- Louis de Testanière\"","divers":"Château du Revest de Bion","gps":"","images":["../image/image_04/04_Revest_Bion_1.jpg","../image/image_04/04_Revest_Bion_2.jpg"]},"Consult_chateau_formulaire6617":{"id":"Consult_chateau_formulaire6617","dept":"04","canton":"Banon","commune":"Revest-des-Brousses","nom":"Revest_Brousses","type":"Château","periode":"xiv","histoire":"REVEST des Brousses; le fief appartenait au XIVe siècle aux Vachères,  puis passa aux de Chanut au XVIIe siècle et aux Barrel-Pontevés au XVIIIe siècle.  Château des Pontevès  du XVIIe siècle ancien monastère des services fortement remanié aux XVIIe siècle  et l'hôtel de ville se trouve dans un ancien château,   dans cette bâtisse rien d'apparent d'un château, mis à part une porte ancienne. Reste des fortifications partie de murs,  avec portail des Mourres  défendu par une bretèche.                                Dans la commune le château d'Entrevennes, le château Sylvabelle voir article.","architecture":"Revest des Brousses; la mairie dans la résidence seigneuriale avec porte ornée de bossages à refends et d'un fronton brisé.                                  Le château d'Estrevennes du XVIIe siècle est précédé d'un avant corps et de deux tours rondes qui sont engagées.          château de Sylvabelle bâtiment rectangulaire encadré de quatre tours.","habitants":"Seigneurs de Vachères\"","divers":"Château de Pontevès, de Sylvabelle et vestiges du village de Revest des Brousses","gps":"","images":["../image/image_04/04_Revest_Brousses_1.jpg","../image/image_04/04_Revest_Brousses_2.jpg","../image/image_04/04_Revest_Brousses_3.jpg","../image/image_04/04_Revest_Brousses_4.jpg","../image/image_04/04_Revest_Brousses_5.jpg"]},"Consult_chateau_formulaire34a0":{"id":"Consult_chateau_formulaire34a0","dept":"04","canton":"Riez","commune":"Riez","nom":"Riez","type":"Vestiges","periode":"X","histoire":"RIEZ; à l'époque préromaine  avec la tribu du Reii (peuplade locale qui se fondit dans la culture Gallo-Romaine, dont est issu le nom du lieu).          Au premier siècle avant J.C l'empereur Auguste confère à Riez le statut de colonie.                           Vestiges; temple romain avec des colonnades  monolhites corinthiennes étaient dédiées à Appolon construit fin du premier siècle après J.C.             Aux Ve siècle aux évêques dont-il existe l'évêché du XVe siècle remanié XVII-XVIIIe siècle; aux Xe siècle les vicomtes de Marseille qui y édifièrent un village fortifié et y installèrent les princes de Riez.                                     Dans la commune le château de Pontfrac transformé en hôtel restaurant de classe.","architecture":"Riez; reste d'un temple érigé au premier siècle après J.C  sur les ruines des thermes romaines, colonnades  monolhites étaient dédiées à Appolon.               Un baptistère et une cathédrale sont construit au Ve siècle au XIVe siècle construction de remparts  encore visibles et deux portes, porte d'Ayguière du XIIIe siècle et de Samson et la tour d'angle, la tour de l'horloge  dans la ville des hôtels particuliers du XVIIe siècle tel que l'hôtel de Mazan de 1523  de style renaissance.","habitants":"Princes de Riez.\"","divers":"Vestiges dans Riez et manoir de Pontfrac","gps":"","images":["../image/image_04/04_Riez_1.jpg","../image/image_04/04_Riez_2.jpg","../image/image_04/04_Riez_3.jpg","../image/image_04/04_Riez_4.jpg","../image/image_04/04_Riez_5.jpg","../image/image_04/04_Riez_6.jpg","../image/image_04/04_Riez_7.jpg","../image/image_04/04_Riez_8.jpg","../image/image_04/04_Riez_9.jpg"]},"Consult_chateau_formulaired2ea":{"id":"Consult_chateau_formulaired2ea","dept":"04","canton":"Castellane","commune":"Rougon","nom":"Rougon","type":"Vestiges","periode":"XII","histoire":"ROUGON; village dominé par les ruines du Château fort  dont la seigneurie était les Castellane au XIVe siècle, passa aux Glandevès au XVe siècle, aux Brun Castellane au XVI-XVIIe siècle et à l'abbaye du Lerins en 1732.","architecture":"Rougon; Village dominé par les ruines du château fort.","habitants":"Seigneur de Castellane\"","divers":"Vestiges du château","gps":"","images":["../image/image_04/04_Rougon_1.jpg","../image/image_04/04_Rougon_2.jpg","../image/image_04/04_Rougon_3.jpg"]},"Consult_chateau_formulaire2bd8":{"id":"Consult_chateau_formulaire2bd8","dept":"04","canton":"Gréoux-les-Bains","commune":"Gréoux-les-Bains","nom":"Rousset_Greoux","type":"Château","periode":"XVII","histoire":"ROUSSET; fut le fief des Glandevès au XVIIe siècle au XVIIIe siècle passa à Paul Arbaud collectionneur et mécène, la comtesse de J de Saporta sa nièce en hérita aujourd'hui propriété du comte Jean du Chaffaut.","architecture":"Rousset; bâtiment quadrangulaire à trois niveaux, flanqué de tours rondes en angles, château remanié au XIXe siècle. Chapelle accolée sur la partie arrière dont on aperçoit le cloher.","habitants":"Famille de Paul Arbaud \"","divers":"Château de Rousset","gps":"","images":["../image/image_04/04_Rousset_Greoux_1.jpg","../image/image_04/04_Rousset_Greoux_2.jpg"]},"Consult_chateau_formulaire1382":{"id":"Consult_chateau_formulaire1382","dept":"04","canton":"Forcalquier","commune":"Mane","nom":"Sauvan","type":"Château","periode":"XVI","histoire":"SAUVAN; seigneurie des Agoult puis des Bouliers passa  au XVIe siècle a Michel-François de Forbin-Janson seigneur de Janson qui fit construire le château en 1720 par l'architecte Jean-Baptiste Franque.                                 A la mort de Michel-François le château passa à son neveu en 1731,  Michel Forbin, marquis de Janson qui épouse en 1782 la princesse Cornelie Gabrielle-Henriette de Galéan amie de Marie-Antoinette; à la Révolution le château prévu à la démolition n'a pas souffert et resta dans la famille, le fils Palamède proscrit pour sa fidélité à Napoléon, puis Charles Auguste évêque de Nancy  qui fonda l'oeuvre de la Sainte-Enfance et à sa mort en 1844 le château passa à l'abbé  H-A Sollier vicaire à Avignon et ensuite aux Astouaud Servan de Bézaure, puis acquit en 1980 par la famille Allibert qui le remette en état.","architecture":"Sauvan: de forme rectangulaire allongé à deux niveaux, toit dissimulé par une balustrade ornée de vases  sculptés, en façade avant corps en légère  saillie, surmontée d'un fronton triangulaire, sur le parc le balcon est porté par un portique  de quatre colonnes doriques.","habitants":"Michel-François de Forbin-Janson \"","divers":"Château de Sauvan","gps":"","images":["../image/image_04/04_Sauvan_1.jpg","../image/image_04/04_Sauvan_2.jpg","../image/image_04/04_Sauvan_3.jpg"]},"Consult_chateau_formulairef83e":{"id":"Consult_chateau_formulairef83e","dept":"04","canton":"La Motte-du-Caire","commune":"Seyne-les-Alpes","nom":"Seyne_Alpes","type":"Citadelle","periode":"XII","histoire":"SEYNES les Alpes; citadelle fortifiée, était le fief des comtes de Provence, mais en retrait de Saint-Vincent.  Vauban  avait un projet d'envelopper la vieille tour mais cela ne put se faire, la ville resta tel-quelle enfermée dans une enceinte légère, flanquée de tour sur le projet de Paul Niquet.                 Le fief passa aux abbés de l'isle Barbe puis aux Jarente XIV et XVe siècle les comtes de Lesdiguières et les Ripert-Monclar au XVIIIe siècle.               La tour de Selonnet construite au XVe siècle au milieu de l'emplacement du château avec les pierres  du château de Lesdiguières.","architecture":"Seynes les Alpes; citadelle fortifiée couronné par le fort Vauban avec tour carrée dite \"Maubert\"  de plan rectangulaire haute de 12 mètres du XIIe siècle et  vestiges de l'enceinte Vauban de la fin du XVIIe siècle, bastionné de neuf tours dont six subsistent; porte fortifiée à la rue basse; La tour de Selonnet ronde en pierre avec les pierres du château de Lesdiguières et toits en poivrières.","habitants":"Comtes de Provence\"","divers":"Citadelle fortifiée et fort de Vauban et tour Selonnet","gps":"","images":["../image/image_04/04_Seyne_Alpes_1.jpg","../image/image_04/04_Seyne_Alpes_2.jpg","../image/image_04/04_Seyne_Alpes_3.jpg","../image/image_04/04_Seyne_Alpes_4.jpg","../image/image_04/04_Seyne_Alpes_5.jpg","../image/image_04/04_Seyne_Alpes_6.jpg","../image/image_04/04_Seyne_Alpes_7.jpg","../image/image_04/04_Seyne_Alpes_8.jpg","../image/image_04/04_Seyne_Alpes_9.jpg"]},"Consult_chateau_formulaire07ac":{"id":"Consult_chateau_formulaire07ac","dept":"04","canton":"Banon","commune":"Simiane-la-Rotonde","nom":"Simiane_Rotonde","type":"Château","periode":"XV","histoire":"SIMIANE la Rotonde: fief de l'abbaye de Saint-André de Villeneuve les Avignons qui  en furent les seigneurs et qui possédaient un prieuré une chapelle et deux églises.                           Au XIIe siècle les Agoult construisirent ce château fortifié avec rotonde sur l'emplacement d'un ancien château du Xe siècle dont le fief dépendait des Simiane, une de leur branche donne la famille des Simiane qui deviendra l'une des plus importantes de la région au XIIe siècle qu'il le gardèrent jusqu'en 1539, des co-seigneurs se succédèrent  tel que Jean-François de Créquy de Bonne.                                           Dans la commune l'abbaye de Valsaintes  fondée en 1188 dépend de l'abbaye de Citaux, abandonné au XIVe siècle les Simiane en fit don aux seigneurs de Boulinette du XVIIe siècle.","architecture":"Simiane la Rotonde; château médiéval édifié au XIIe siècle sur point le plus haut dominant la vallée nommé la Rotonde par son donjon de forme arrondie tour circulaire  en tronc de cône dissimule une coupole, unique en Provence, couronne la butte autour de laquelle s'est construit la ville, un corps de logis  communiquant avec la rotonde accolée d'une tour et un mur d'enceinte. Dans le vieux village de nombreuses portes anciennes. A proximité l'abbaye de Valsaintes.","habitants":"Famille d'Agoult \"","divers":"Château et vestiges dans le village et abbaye de Valsaintes","gps":"","images":["../image/image_04/04_Simiane_Rotonde_1.jpg","../image/image_04/04_Simiane_Rotonde_2.jpg","../image/image_04/04_Simiane_Rotonde_3.jpg","../image/image_04/04_Simiane_Rotonde_4.jpg","../image/image_04/04_Simiane_Rotonde_5.jpg","../image/image_04/04_Simiane_Rotonde_6.jpg","../image/image_04/04_Simiane_Rotonde_7.jpg","../image/image_04/04_Simiane_Rotonde_8.jpg"]},"Consult_chateau_formulaireb94e":{"id":"Consult_chateau_formulaireb94e","dept":"04","canton":"Sisteron","commune":"Sisteron","nom":"Sisteron","type":"Citadelle","periode":"XI","histoire":"SISTERON; citadelle, passage obligatoire entre Dauphiné et Provence. Siège d'un évêché au Ve siècle, au féodal dans le royaume d'Arles, en 1054 au comté de Forcalquier, Raymond Béranger V comte de Provence y résida, ses successeurs, Robert d'Anjou puis Jeanne de Provence développent les libertés de la ville.   Au XVIe siècle les guerres de religion et les épidémies ont marqués leurs passages. En 1639 fut enfermé dans le donjon le prince Casimir de Pologne accusé de complot contre la France sur ordre de Richelieu.                             Autour de Sisteron d'autres châteaux tel que le château de la Cazette; rendez vous de chasse du XVIIe siècle de la famille de Barlet transmis par héritage à la famille de monsieur Henri Sauvaire Jourdan actuel propriétaire, le château de Saint-Euphémie du XVII, le château de Beaulieu, de Servoules , de Hautes-Rives ou Hauteville, de Roman  et de Sainte Ursules.","architecture":"Sisteron; la citadelle qui s'est construite au fils du temps à partir du XIIIe siècle, plusieurs fois améliorée et renforcée, intègre encore des éléments du château donjon du XIIIe siècle et la chapelle du XVe siècle, le gros de l'ouvrage est de Jean Erard ingénieur militaire d'Henri IV, et Vauban accola une poudrière. Cette citadelle ne sera démilitarisée qu'en 1920, le 15 Août 1944, pour accélérer le départ des allemands, l'aviation américaine bombarde la citadelle en détruisant le quart de la cité. Subsiste trois tours rondes des remparts du XIVe siècle, trois portes d'accès, sur les remparts supérieur tour de l'horloge, échauguette et guérite du Diable.                                   Dans la commune le château de la Cazette; Bâtiment du XVIIe siècle corps de logis central rectangulaire  avec deux ailes en équerre en forme de U.","habitants":"Raymond Béranger comte de Provence\"","divers":"Citadelle et manoir de Cazette","gps":"","images":["../image/image_04/04_Sisteron_1.jpg","../image/image_04/04_Sisteron_2.jpg","../image/image_04/04_Sisteron_3.jpg","../image/image_04/04_Sisteron_4.jpg","../image/image_04/04_Sisteron_5.jpg","../image/image_04/04_Sisteron_6.jpg","../image/image_04/04_Sisteron_7.jpg","../image/image_04/04_Sisteron_8.jpg","../image/image_04/04_Sisteron_9.jpg"]},"Consult_chateau_formulaire45f8":{"id":"Consult_chateau_formulaire45f8","dept":"04","canton":"Castellane","commune":"St-André-les-Alpes","nom":"St_Andre_Alpes","type":"Manoir","periode":"XIII","histoire":"SAINT-ANDRE les Alpes; au XIIIe siècle jusqu'au XIVe siècle possession des Castellane, ensuite aux Pontevès au XVe siècle aux Forbin au XVIe siècle et aux Laugier au XVIIIe siècle.                Dans la commune le château de Mouilles.","architecture":"Saint-André les Alpes; vestiges d'une tour romane, vestiges d'une chapelle à Mouilles et bâtisse avec une tour ronde du XVII et l'ancienne maison seigneuriale transformé en hôtel; ruines féodales à Courchon.","habitants":"Famille de Castellane\"","divers":"Château de St-André les Alpes","gps":"","images":["../image/image_04/04_St_Andre_Alpes_1.jpg","../image/image_04/04_St_Andre_Alpes_2.jpg"]},"Consult_chateau_formulaire5777":{"id":"Consult_chateau_formulaire5777","dept":"04","canton":"St-Etienne-les-Orgues","commune":"St-Etienne-les-Orgues","nom":"St_Etienne_Orgues","type":"Vestiges","periode":"XVI","histoire":"St-ETIENNE les Orgues; le village apparaît au XIIe siècle par le rattachement de Saint-Etienne avec la motte castrale des Orgues sous la protection de l'abbaye de notre dame de Lure. A la fin du XIVe siècle  la région fut ravagée par la peste, puis envahie par les bandes de Raymond de Turenne seigneurs des Baux, les deux  villages n'échappèrent pas à la ruine.           Seul St-Etienne reprend vie autour de l'église au XVe siècle sous le fief des comte de Reillanne, puis en 1720 passa au Marquisat d'Oraison.                  Dans ce canton commune de Malfougas-Augés un fort fut construit sur une motte au XIe siècle, où fut construit le château de Casonoves.                             Le fort  appartenait aux XIe siècle aux vicomtes de Sisteron puis partagé par l'abbaye  de Saint-Victor de Marseille et des chanoines de Forcalquier, puis fut donné à l'abbaye de Saint-André de Villeneuve les Avignon au XIIe siècle.  Le château de Casonoves dans son état actuel date du XVIIIe siècle appartenait au XVe siècle au Vicomte de Sisteron, puis passa aux évêques  de Sisteron.","architecture":"Saint-Etienne les Orgues; au Moyen-Age il existait deux villages qui se faisait face sur la rive gauche du Laye, dominé par une motte  se dressait le château des seigneurs des Orgues.                     Dans la commune  de Saint-Etienne deux châteaux celui de Truyas et château Tondu.                                Dans la commune de Mallefougas-Augés, le Château de Casonoves date du XIIIe siècle rénové  au XVIIe siècle, construit à l'emplacement de la motte féodale au milieu du village.","habitants":"Marquis d'Oraison\"","divers":"Vestiges et château","gps":"","images":["../image/image_04/04_St_Etienne_Orgues_1.jpg","../image/image_04/04_St_Etienne_Orgues_2.jpg"]},"Consult_chateau_formulaire134a":{"id":"Consult_chateau_formulaire134a","dept":"04","canton":"Moustiers-Ste-Marie","commune":"St-Jurs","nom":"St_Jurs","type":"Vestiges","periode":"XVI","histoire":"St-JURS; château médiéval ruiné, construit au sommet de l'Huby était le fief de la baronnie des Castellane au XIVe siècle jusqu'à la Révolution, du XV au XVIe siècle les chanoines Augustins y séjournèrent.                         Dans la commune le château d'Alès  du XVI-XVIIe siècle  fut ac E, forteresse et château comtal, qui fut la résidence au XIIe siècle des comtes de Forcalquier, en 1220  Raymond Béranger IV, comte de Provence  épousa Béatrice de Savoie,  résida dans ce château, ils eurent quatre filles  qui devinrent toutes reines; Marguerite épouse en 1234 Louis IX roi de France, Eléonore épousa Henri III en 1236 reine d'Angleterre, Béatrix épousa Charles 1er d'Anjou roi de Naples et Sancie épousa Richard de Cornouailles reine  de Rome en 1243.                                    A la mort  de Raymond Béranger  en 1245 fut le dernier comte de Provence, sa veuve en fit don aux hospitaliers de St-Jean et au XIVe siècle le château passa aux seigneurs d'Agoult qui dépendait de la Vicomté de Reillanne, et en 1588 aux marquis d'Oraison à la famille d'Albertas du XVI au XVIIe siècle  dernière seigneurie.","architecture":"Sainte-Maime; au sommet du village vestiges de la forteresse, château délimité par deux fossé, pan de murs encore visible le long d'un fossé  avec une tour-donjon de forme  octogonale hauteur de 7 mètres avec murs très épais  du XIIe siècle, à l'extrémité la chapelle Sainte-Agathe.","habitants":"Raymond Béranger IV\"","divers":"Vestiges féodals","gps":"","images":["../image/image_04/04_St_Maime_1.jpg","../image/image_04/04_St_Maime_2.jpg","../image/image_04/04_St_Maime_3.jpg"]},"Consult_chateau_formulairef35c":{"id":"Consult_chateau_formulairef35c","dept":"04","canton":"Valensole","commune":"St-Martin-de-Brômes","nom":"St_Martin_Bromes","type":"Tour","periode":"XIII","histoire":"St-MARTIN de Brômes; fief des barons de Castellane pour lequel ils prêtent hommage au comte de Provence en 1226,  en 1673 les Payan  les succédèrent jusqu'à la Révolution.","architecture":"St-Martin de Brômes; il reste un donjon carré du XIIIe siècle  haut de 24 mètres de côté  couronné de mâchicoulis, dit tour des templiers vestiges du château.","habitants":"Barons de Castellane\"","divers":"Tour crénelée","gps":"","images":["../image/image_04/04_St_Martin_Brom
