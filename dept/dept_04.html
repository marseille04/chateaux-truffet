ines passent à Jacques Fort, de nouveau par alliance de Marie-Anne Fort avec Joseph de Saint-Jacques  avocat en 1715, leur fils  Guillaume de Saint-Jacques 1722-1801 sera en 1763 à sa mort directeur de l'observatoire de Marseille.            En 1800 le domaine passera à Jean François Palhier député des cinq cents, maire de Simiane en 1792 donnera  au domaine le nom de Palhier-Sylvabelle, à sa mort , sa veuve Thérése Victoire Plantat lègue Sylvabelle en 1826 à son neveu André Derminatis juge de paix à Reillanne.                                Dans l'ancien château abrite aujourd'hui l'équipe municipale de l'association \"Mangea-Cabre\" pour des animations locales.","architecture":"Sylvabelle. château du XV-XVIIe siècle remanié au XVIIIe siècle, bâtiment rectangulaire flanqué de trois tours et un pigeonnier du XVIe siècle.","habitants":"Honoré Audiffred \"","divers":"Manoir de Sylvabelle","gps":"","images":["../image/image_04/04_Sylvabelle_1.jpg","../image/image_04/04_Sylvabelle_2.jpg","../image/image_04/04_Sylvabelle_3.jpg"]},"Consult_chateau_formulaire74f9":{"id":"Consult_chateau_formulaire74f9","dept":"04","canton":"Allos","commune":"Thorame-Basse et Haute","nom":"Thorame","type":"Vestiges","periode":"XIII","histoire":"THORAME-Basse; au XII-XIIIe fief des  Piegut, d'où la tour dite de Piegut ou  de Transcastel, leur successeur sont les Farraud de Thorame vassaux des comtes de Provence passa aux Glandevès XII-XVe siècle, puis les Castellane XIVe au XVe siècle puis aux Oraison au XVIe siècle et aux Jassaud XVIIe jusqu'à la Révolution, a cette dernière les paysans détruisirent le château dont-il ne reste plus rien.                                              THORAME-Haute; Thoramina au XIIIe siècle; fief  des Rostaing  barons de Castellane au X-XIe siècle qui en rendirent hommage  a Raymond Beranger comte de Provence en 1126, puis les Barraud de Glandevès au XIIIe siècle et passa au XVe siècle au de Villeneuve qui le gardèrent jusqu'au XVIIe siècle, Gassendi hérite de la seigneurie qui passa aux Pazery jusqu'à la Révolution.                         Quinze familles seigneuriales se succédèrent en 1789 le dernier étant les Pazery, qui l'avait racheté aux seigneurs Balthazar de Villeneuve.  Racheté en 1711.","architecture":"Thorame-Basse; La mairie dans le bâtiment appelé château, grande bâtisse carrée appelée donjon de Piegut à deux étages reconstruit au XVIIIe siècle. Thorame-Haute; château ou fort de Trancastel  ou de Saint-Georges, château médiéval par Raymond Collier qui fut détruit en 1574 subsiste quelques pans de murs d'enceintes et au sommet des pans de murs renversés.","habitants":"Farraud de Thorame Basse                 manoir de Rochegiron                     Barraud de Glandevès Thorame haute\"","divers":"Vestiges et manoir","gps":"","images":["../image/image_04/04_Thorame_haute_1.jpg","../image/image_04/04_Thorame_haute_2.jpg","../image/image_04/04_Thorame_haute_3.jpg","../image/image_04/04_Thorame_haute_4.jpg"]},"Consult_chateau_formulaire4833":{"id":"Consult_chateau_formulaire4833","dept":"04","canton":"Forcalquier","commune":"Turriers","nom":"Turriers","type":"Manoir","periode":"XVI","histoire":"TURRIERS; fief qui appartenait aux Vintimille au XIV-XVIe siècle puis aux Hugues du XVIIe siècle à la Révolution, le château fut mis aux enchères pour démolition.","architecture":"Turriers: Ruines du donjon dominant le village bâtiment important composé de deux corps de logis avec tour. Village médiéval de Venterol à quelques kilomètres.","habitants":"Seigneur Vintimille\"","divers":"Vestiges et manoir","gps":"","images":["../image/image_04/04_Turriers_1.jpg","../image/image_04/04_Turriers_2.jpg"]},"Consult_chateau_formulaired122":{"id":"Consult_chateau_formulaired122","dept":"04","canton":"Reillanne","commune":"Vachères","nom":"Vacheres_Colombier","type":"Vestiges","periode":"XVII","histoire":"COLOMBIERS; au Moyen-Age un château fort des seigneurs dont les Vachères  XIIIe siècle les Meyran XVIe siècle et les Bermond XVIIe siècle.                   La seigneurie au XVIe siècle était à Jean de Bourganel transmis en héritage familial.                              Château du XVII-XVIIIe siècle par François-Gaspard de  Bourgarel seigneurs de Vachères et passa toujours par héritage à la famille Lombardon de Montézan.                                 VACHERES fief des sires de Vachères du XIIe siècle qui partagèrent jusqu'au XVIIIe siècle avec d'autres seigneurs les Meyran au XVI et XVIIe siècle les Bermond XVII-XVIIIe siècle.","architecture":"Vachères; la commune possède les ruines du château féodal et militaire qui dominait le village,  tour ronde et tour carrée de l'ancienne enceinte, tour de l'horloge du XVIe siècle, et le château du bas  gentilhommière  à trois tours, date du XVIIe siècle; Château du  Colombier, corps de logis pris entre deux avant corps rectangulaires et bordé d'une cour remarquable par ses sculptures du XVIIIe siècles. Colombiers dit le \"château\" demeure XVIIIe siècle au quatre tours  gentilhommière.","habitants":"Jean de Bourganel Sires de Vachères\"","divers":"Vestiges et manoir","gps":"","images":["../image/image_04/04_Vacheres_Colombier_1.jpg","../image/image_04/04_Vacheres_Colombier_2.jpg","../image/image_04/04_Vacheres_Colombier_3.jpg","../image/image_04/04_Vacheres_Colombier_4.jpg","../image/image_04/04_Vacheres_Colombier_5.jpg","../image/image_04/04_Vacheres_Colombier_6.jpg","../image/image_04/04_Vacheres_Colombier_7.jpg"]},"Consult_chateau_formulaire3f00":{"id":"Consult_chateau_formulaire3f00","dept":"04","canton":"Entrevaux","commune":"Val-de-Chalvagne","nom":"Val_de_Chalvagne","type":"Château","periode":"XIII","histoire":"VAL de Chalvagne; associations de plusieurs lieux dont Castellet de Saint-Cassien fief des Glandevés de 1384 à 1789 est constitué uniquement du château, Montblanc et Villevieille a appartenu aux Glandevés également. Ces trois lieux furent le fief des Glandevés dès le XIIIe siècle jusqu'à la Révolution.                                Pour le village de Villevieille les Villeneuve leur succédèrent au XVIe siècle  puis passa aux Sabran au XVIIIe siècle.","architecture":"Val de Chalvagne; château du XVIIe siècle Castellet de Saint-Cassien, carré flanqué d'une tour ronde, la mairie de Val s'y installa. La façade du château du XVII est encadré de deux tours rondes architectures militaire.                Le château de Montblanc du XIVe siècle ruiné. Château de Villeveille de plan rectangulaire avec une tour ronde accolée à une façade du XVIIe siècle de trois étages.","habitants":"Famille de Glandevès\"","divers":"Manoir","gps":"","images":["../image/image_04/04_Val_de_Chalvagne_1.jpg","../image/image_04/04_Val_de_Chalvagne_2.jpg"]},"Consult_chateau_formulairee981":{"id":"Consult_chateau_formulairee981","dept":"04","canton":"Valensole","commune":"Valensole","nom":"Valensole","type":"Château","periode":"XVII","histoire":"VALENSOLE; au Xe siècle fief des comtes de Provence qui possédaient la moitié des terres, l'autre moitié était détenu par d'autres seigneurs, parmi ceux-là les Falchirius qui eurent dans leur descendance un dénommé Mayeul jeune seigneur qui se fit chanoine à Mâcon, puis s'enferma à Cluny pour être nommé abbé, il céda ses terres au comte Guillaume Ier; Valensole devient la propriété de l'abbaye de Cluny.          Au Moyen-Age deux communautés règnent sur Valensole les Bars et les Villedieu qui construisirent chacun leur château, en 1475 le roi René voulu récupérer le fief mais cela se terminant par les guerres de religion qui détruisirent les châteaux, en 1664 le prince Conti confia Valensole  aux évêques de Riez qui gardèrent la seigneurie jusqu'à la Révolution.                                    Dans la commune le château appelé aujourd'hui \"Grand Jardin\" hôtel du XIIIe siècle remanié de la famille Fresse de Monval passa par alliance à la famille Villeneuve-Escaplon famille de l'amiral de Villeneuve.","architecture":"Valensole; reste de remparts médiévaux porte d'Eguière du XIIe siècle. Château des Bars 1627 est disposé autour d'une tour ronde, à Villedieu reste un relais de poste du XVIIe siècle, château de Bertonne, château Saint-Ange, château Bonnaventure et château de Saint-Laurent.","habitants":"Abbé Mayeul de Falchirius\"","divers":"Château commune de Valensole","gps":"","images":["../image/image_04/04_Valensole_1.jpg","../image/image_04/04_Valensole_2.jpg","../image/image_04/04_Valensole_3.jpg","../image/image_04/04_Valensole_4.jpg","../image/image_04/04_Valensole_5.jpg","../image/image_04/04_Valensole_6.jpg","../image/image_04/04_Valensole_7.jpg"]},"Consult_chateau_formulaire80d4":{"id":"Consult_chateau_formulaire80d4","dept":"04","canton":"La Motte-du-Caire","commune":"Valernes","nom":"Valernes","type":"Vestiges","periode":"XV","histoire":"VALERNES; fief appartenait au XIe siècle  aux chevaliers de Valernes, vassaux des comtes de Provence au XIIe siècle, en 1345 la reine Jeanne en inféode a Guillaume-Roger  de Beaufort  et érige pour ce dernier la seigneurie en vicomté et au  XVIe siècle puis passa aux Mas-Castellane du XVIe et XVIIe siècle et aux Bernardy jusqu'à la Révolution.         Le château est pillé en 1792 et en 1793 rasé.","architecture":"Valernes; l'ancien château fort des vicomtes de Valernes a été rasé, il ne reste que les soubassements du haut donjon ruiné, il a été reconstruit récemment. Le château de la Bastide de Bagnols est construit à différentes époques; les murs sont du XVIe siècle.  Le château  de Tonbeton et de Saint-Didier sont des résidences campagnardes du XVIIe siècle.","habitants":"Famille de Beaufort \"","divers":"Bastide de Bagnols","gps":"","images":["../image/image_04/04_Valernes_1.jpg","../image/image_04/04_Valernes_2.jpg","../image/image_04/04_Valernes_3.jpg"]},"Consult_chateau_formulaire24dd-2":{"id":"Consult_chateau_formulaire24dd-2","dept":"04","canton":"Forcalquier","commune":"Volonne","nom":"Volonne","type":"Vestiges","periode":"XII","histoire":"VOLONNE; fief des nobles  de Volonne au XIe siècle vassaux des comtes de Provence  dont ces derniers l'inféode en 1309 aux sires des Baux passa aux d'Agoult au XIVe siècle, aux Valavoire aux XVIe siècle et aux Maurel qu'ils gardèrent la seigneurie jusqu'à la Révolution.","architecture":"Volonne; la forteresse fut détruite pendant les guerres de religion, Village médiéval donjon roman ruiné et château renaissance ou est installée la Mairie.","habitants":"Comtes de Provence\"","divers":"Vestiges et manoir","gps":"","images":["../image/image_04/04_Volonne_1.jpg","../image/image_04/04_Volonne_2.jpg","../image/image_04/04_Volonne_3.jpg","../image/image_04/04_Volonne_4.jpg","../image/image_04/04_Volonne_5.jpg","../image/image_04/04_Volonne_6.jpg","../image/image_04/04_Volonne_7.jpg"]},"Consult_chateau_formulairef91f":{"id":"Consult_chateau_formulairef91f","dept":"04","canton":"Manosque","commune":"Volx","nom":"Volx","type":"Vestiges","periode":"XIII","histoire":"VOLX: au XIIIe siècle le fief appartenait au seigneurs de Villemus, puis passa au XVe siècle aux Valevoire, il fut érigé en marquisat en 1652 et passa au XVIIIe siècle aux d'Arnat. Le château fut incendié à la Révolution.                Dans la commune le château Clément construit au XVIIe siècle  remanié au XIXe siècle.","architecture":"Volx; incendié à la Révolution, il subsiste quelques arches de l'aqueduc remparts et portes fortifiées. Vestiges du château de Montaigut avec beau pigeonnier vandalisé.","habitants":"Seigneurs de Villemus\"","divers":"Vestiges village et mairie","gps":"","images":["../image/image_04/04_Volx_1.jpg","../image/image_04/04_Volx_2.jpg","../image/image_04/04_Volx_3.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','04 — Alpes-de-Haute-Provence'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
