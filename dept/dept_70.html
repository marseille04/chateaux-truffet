age_70/70_Vallerois_3.jpg","../../jctruffet.com/image/image_70/70_Vallerois_4.jpg","../../jctruffet.com/image/image_70/70_Vallerois_5.jpg","../../jctruffet.com/image/image_70/70_Vallerois_6.jpg","../../jctruffet.com/image/image_70/70_Vallerois_7.jpg","../../jctruffet.com/image/image_70/70_Vallerois_8.jpg","../../jctruffet.com/image/image_70/70_Vallerois_9.jpg"]},"Consult_chateau_formulaire5877":{"id":"Consult_chateau_formulaire5877","dept":"70","canton":"Vauvillers","commune":"Vauvillers","nom":"Vauvillers","type":"Château","periode":"XVIII","histoire":"VAUVILLERS, actuellement hôtel de ville.  Au Moyen-Age, Vauvillers appartenait au duché de Lorraine. En 1583, Erard de Livron et Marc de Vienne, seigneurs de Vauvillers et héritiers de Nicolas, énumèrent toutes les constructions du château pour le fief de Demangevelle.  Après la conquête de la Franche Comté et la signature du traité de Nimègue en 1678, la région revient à la France.  La terre de Vauvillers devient le fief des Clermont-Tonnerre. Gaspard de Clermont-Tonnerre, Maréchal de France fait construire un château en 1723.\r\n Cet édifice abrite maintenant lhôtel de Ville et une école.","architecture":"Vauvillers, quadrilatère  deux corps de logis face à face prolongé sur les côtes par des dépendances de même longueur,  maison dite du cardinal Sommier à la belle façade de style renaissance.\r\nHôtel de Ville dans le château construit au XVIIIe siècle par Gaspard de Clermont-Tonnerre, couvert de tuiles vernissées multicolores.","habitants":"Famille de  Gaspard de Clermont-Tonnerre\r\n        \"","divers":"Château de Vauvillers","gps":"","images":["../../jctruffet.com/image/image_70/70_Vauvillers_1.jpg","../../jctruffet.com/image/image_70/70_Vauvillers_2.jpg","../../jctruffet.com/image/image_70/70_Vauvillers_3.jpg"]},"Consult_chateau_formulaire625c":{"id":"Consult_chateau_formulaire625c","dept":"70","canton":"Fresne-St-Mamès","commune":"Vellexon","nom":"Vellexon","type":"Château","periode":"XVIII","histoire":"VELLEXON, la seigneurie de Vallexon au XVe siècle au Thibaut de Balmont puis à son fils Jean  marié à Jeanne de Vergy leur fille apporta  la seigneurie à Jean de Toulangeon qui reprit le fief  de Jean de Ray en 1466,  puis acquise en 1600 par Gaspard de Poligny,  Charlotte de Poligny dame de Vellexon et Vaudey épousa Louis-Ferdinand  d'Andelot Tromarey leur  fille   épousa Nicolas-Joseph de Vaudrey ils eurent une fille Marie-Louise qui fut enlevée en 1711 par Claude-Alexandre  Barberot intendant de son père il l'épousa  en 1732 et récupéra la seigneurie de Vellexon en 1733 le domaine fut presque détruit en 1738.   La seigneurie de Queutrey, en  1316 fief de Aimé de Ray,  passa à Guillaume de Citey en 1510 la  vendit la seigneurie  à Antoine d'oiselay en fit un fief de la baronnie d'Oiselay. En 1634  passa à Caroline de la Baume  veuve d'Ermenfroy-François d'Oiselay qui le transmit à son neveu Charles-François de la Baume au XVIIIe siècle la seigneurie par Charles-Gérard toujours dans la famille. Les trois communes se réunissent en 1790.","architecture":"Le château de Vallexon; corps des logis rectangulaire à trois niveaux et attiques.","habitants":"Famille de Nicolas-Joseph de Vaudrey\r\n        \"","divers":"Château de Vellexon et  Queutrey","gps":"","images":["../../jctruffet.com/image/image_70/70_Vellexon_1.jpg","../../jctruffet.com/image/image_70/70_Vellexon_2.jpg"]},"Consult_chateau_formulaire4e42-2":{"id":"Consult_chateau_formulaire4e42-2","dept":"70","canton":"Vesoul","commune":"Vesoul","nom":"Vesoul","type":"Patrimoine","periode":"XV-XVI","histoire":"VESOUL; au début du Moyen-Age, la cité est bâtie au sommet de la Colline de la Motte. A la fin du IXe siècle, la ville est pour la première fois mentionnée en tant que château. Elle était dirigée par les vicomtes de Vesoul, dont le premier et le plus important est Gislebert Ier de Faucogney. Au Xe siècle, le Castrum Vesulium subit l'un de ses premiers sièges. Celui-ci est organisé par Henri Ier de Bourgogne et le comte Lambert de Chalon.  De la fin du XIIe siècle jusqu'à la fin du XIIIe siècle, Vesoul va connaître un élan économique et financier animé principalement par la Famille Héliot de Vesoul : Héliot, son fils Vivant, sa fille Sylvia.  À partir de l'année 1300, de nombreuses colonies juives s'installent dans les différents petits bourg et dans les grandes cités de Franche-Comté.   En 1333, la ville devient chef-lieu du bailliage dAmont, Cependant, le Comte de Bourgogne demande à ces Juifs une faible compensation financière pour leur installation. À cette époque, Vesoul devient la plus grande et la plus importante colonie juive du comté de Bourgogne. Malheureusement, en 1348, soit un demi-siècle plus tard, ces juifs, de même qu'une bonne partie de la population vésulienne sont victimes de la peste noire qui décime la moitié des habitants de Vesoul. Durant le XIVe siècle, Vesoul devient la capitale du bailliage d'Amont. La ville dispose alors d'une fonction administrative importante.","architecture":"Vesoul, au  XIVe siècle, la ville de Vesoul sentoure de remparts. Ces remparts sont des fortifications du Castrum Vesulium. le château  sera rasé par Tremblecourt en 1595. Le vieux quartier est le premier d'habitat et de commerce de Vesoul puisque ses bâtiments datent du XVe siècle . Vesoul n'a plus de château féodal mais possède un patrimoine important surtout en hôtels particuliers d'époque. Tel que   l'hôtel de ville  est l'actuelle mairie, qui hébergeait un hôpital datant du XVe siècle, jusqu'au début du XXe siècle, L'hôtel Baressols du XVe et XVIe siècles. L'hôtel Lyautey de Genevreuille  en 1760 .  L'hôtel de Magnoncourt  est bâti en 1530.  L'hôtel Pétremand du XVIIe siècle et la deuxième moitié du XVIIIe siècle. L'hôtel Simon Renard.  L'hôtel Thomassin Il fut élevé de 1480 à 1483 par Jacques Thomassin. L'hôtel de Mongenet en 1549. La maison Ébaudy de Rochetaillé  vers 1781   Il appartient à la même famille depuis 1797 et a été rénové au XIXe siècle.  Ces hôtels et passages du quartier détiennent une architecture non-commune.  Les XIXe siècle et XXe siècle siècles ont été construits en couronne autour de la vieille ville, ce qui fait remarquer les différentes époques de la ville.","habitants":"Henri Ier de Bourgogne\r\n        \"","divers":"Patrimoine de Vesoul, hôtel de Baressols, de  Magnoncourt, de Pétremand, manoir du champs de foire.","gps":"","images":["../../jctruffet.com/image/image_70/70_Vesoul_1.jpg","../../jctruffet.com/image/image_70/70_Vesoul_2.jpg","../../jctruffet.com/image/image_70/70_Vesoul_3.jpg","../../jctruffet.com/image/image_70/70_Vesoul_4.jpg","../../jctruffet.com/image/image_70/70_Vesoul_5.jpg"]},"Consult_chateau_formulaire9fe5":{"id":"Consult_chateau_formulaire9fe5","dept":"70","canton":"Gy","commune":"Vregile","nom":"Vregille","type":"Château","periode":"XVIII","histoire":"VREGILLE, cinq familles se sont succéder à Vregille depuis le XIe siècle, terre et seigneurie relevant toujours des comtes de Bourgogne, puis du Roi de France.\r\nDans un acte de 1197 est mentionné un Guillaume de Vregille, chevalier. Dans un acte de 1272 est nommé Richard, fils de Guy de Vregille. Ce dernier était croisé et fut tué devant Tunis. En 1287, Richard de Vregille est un seigneur important, appelé par le comte de Bourgogne à apposer son sceau sur des actes. Il laisse deux fils, Guillaume et Pierre, qui se partagent le domaine. A partir de 1300, lon ne trouve plus aucune mention des Sires de Vregille. Vers le début du XIVe siècle, le château devint la propriété de la famille de lIsle. A la fin du XIVe siècle, Vregille relève des seigneurs de Moncley, lesquels disparaissent vers 1566. Les La Tour Saint-Quentin, dune illustre famille, leur succèdent, Louise de Remilly, la dernière des Moncley, ayant vendu sa seigneurie à Etienne de La Tour. Ces domaines étaient dans un pitoyable état, à la suite des pillages des routiers, des soldats de Saxe-Weimar. Ils furent acquis, les terres de \"Vurgille\" en particulier, par le Baron de Blisterswick, apparenté aux seigneurs de Moncley. Les Blisterswick, qui avaient déjà vendu en 1683 la seigneurie de Boulot pour payer leurs dettes, durent laisser vendre également le domaine.  Le 17 avril 1700, il fut acquis par Claude-Alexandre Courlet qui reprit le fief avec droits de haute, moyenne et basse justice, et attribua la seigneurie à son fils Alexandre-François. Cest en 1713, que Alexandre-François de Vregille fit construire le château actuel, dans le style Louis XIV, simple et pur de lignes, achèvement des travaux, en 1730.","architecture":"le château féodal  de Vergille se dressait sur les bords de la rivière lOgnon, en face de Sauvagney, et commandait le pont qui, passant sur une île, menait du pays de Dôle à celui de Montbéliard. Le château avait une grosse tour ronde et trois tours carrées. Quelques vestiges, fossés,  existent encore ; \r\non le nommait le château de la Tour de lIle. De l'ancien château, en ruine depuis 1663, il ne resterait que la base d'une tour incorporée à l'enceinte du parc actuel. Un nouveau logis est construit en 1729-1730, puis agrandi entre 1765 et 1783. Simple pavillon de plan rectangulaire, le bâtiment est encadré par deux pavillons saillants au nord et au sud vers 1854. Une partie des bâtiments est reconstruite en 1906, du côté des dépendances. L'ancien pigeonnier est transformé  en chapelle au XIXe siècle. Ecuries et remises sont aménagées dans un bâtiment du XVIe dit \"Le Régale\", jadis lieu de perception de certains logis seigneuriaux. Le logis conserve plusieurs pièces décorées des XVIIIe - XIXe siècles.  Le château de Vregille a été le premier hôpital militaire en 1870 et il est toujours en excellent état et habité.","habitants":"Famille d'Alexandre-François de Vregille\r\n        \"","divers":"Château de Vregille","gps":"","images":["../../jctruffet.com/image/image_70/70_Vregille_1.jpg","../../jctruffet.com/image/image_70/70_Vregille_2.jpg","../../jctruffet.com/image/image_70/70_Vregille_3.jpg","../../jctruffet.com/image/image_70/70_Vregille_4.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','70 — Haute-Saône'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
</script></body></html>
