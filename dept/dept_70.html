aisseur. \r\nLa maison du bailli ou \"Petit Château\" : construite vers 1525 par Guillaume de Furstemberg.","habitants":"Sires de Héricourt\r\n        \"","divers":"Tour du château à Héricourt avant et après","gps":"","images":["../../jctruffet.com/image/image_70/70_Hericourt_1.jpg","../../jctruffet.com/image/image_70/70_Hericourt_2.jpg","../../jctruffet.com/image/image_70/70_Hericourt_3.jpg"]},"Consult_chateau_formulaireaf66":{"id":"Consult_chateau_formulaireaf66","dept":"70","canton":"Champagney","commune":"Ronchamp","nom":"Houilliere","type":"Château","periode":"XIX","histoire":"HOUILLIERE; sous le Second Empire (Napoléon III), la bourgeoisie aisée,fort de l'essor industriel, se fait bâtir de grandes propriétés appelées «châteaux», signifiant un regain dintérêt pour la noblesse déchue.  Le château de la Houillère est une élégante demeure de style néo-classique, édifiée au milieu du XIXe siècle, et fût la résidence de fonction des  directeurs successifs des Houillère de Ronchamp-Champagney  jusqu'en 1958, date de fermeture du dernier   puits de mine de Haute-Saône. Transformée aujourd'hui en  gîtes de France par Christophe Urbanick et Emile Thevenin.","architecture":"Houillière  du XIXe siècle à proximité de Ronchamp où se trouve la célèbre chapelle Notre-Dame du Haut de Le Corbusier, le château de La Houillère est une vaste et élégante propriété de style Napoléon III.  Corps de logis rectangulaire à deux niveaux accolé d'un pavillon réduit à un niveau et fronton triangulaire en façade du grand parc arboré de plusieurs hectares, forêts  et terrasses.","habitants":"Directeur des Houillières\r\n        \r\n        \"","divers":"Château des Houillière et de Couraud.","gps":"","images":["../../jctruffet.com/image/image_70/70_Houilliere_1.jpg","../../jctruffet.com/image/image_70/70_Houilliere_2.jpg"]},"Consult_chateau_formulaire57bc":{"id":"Consult_chateau_formulaire57bc","dept":"70","canton":"Jussey","commune":"Jussey","nom":"Jussey","type":"Château","periode":"XVIII","histoire":"JUSSEY   Les comtes de Bourgogne sont les propriétaires du château de Jussey depuis  le XIIe siècle.\r\nLa ville fut pillée par Turenne, un général de Louis XIII en 1636.           Dans les environs de Jussey, le château de Blondefontaine transformé en chambre d'hôtes, le château de Cemboing et la maison de Poirey ancien relais de poste, malheureusement sans article historique.","architecture":"château de Jussey, corps de logis  du XVIe siècle de plan carré à deux niveaux et attiques flanquée de tours carrées en angles. Le château de Blondefontaine du XVe siècle en forme de U avec tours rondes en façades, le château de Cemboing corps de logis rectangulaire à deux niveaux  toit en croupes et la maison Poirey bâtisse flanqué d'une tourelle en façade.","habitants":"Comte de Bourgogne \r\n        \"","divers":"Le château de Jussey de Blondefontaine de Cemboing et la maison Poirey.","gps":"","images":["../../jctruffet.com/image/image_70/70_Jussey_1.jpg","../../jctruffet.com/image/image_70/70_Jussey_2.jpg","../../jctruffet.com/image/image_70/70_Jussey_3.jpg","../../jctruffet.com/image/image_70/70_Jussey_4.jpg","../../jctruffet.com/image/image_70/70_Jussey_5.jpg","../../jctruffet.com/image/image_70/70_Jussey_6.jpg"]},"Consult_chateau_formulaireb224":{"id":"Consult_chateau_formulaireb224","dept":"70","canton":"Lure","commune":"Lure","nom":"Lure_Quers","type":"Château","periode":"XII-XVI","histoire":"LURE, au XIVe siècle, à la suite d'agitations touchant le monde de la noblesse, les Bourguignons trouvèrent prétexte pour attaquer Lure. Ainsi, de plus amples fortifications furent édifiées à partir de 1340. Vers 1343 et sous les ordres de Jacques de Vyt, le monastère fut fortifié d'un mur de briques, garni de plusieurs tours et entouré d'un double fossé à la périphérie.  A la veille du XVe siècle, le bourg avait perdu une bonne partie de ses habitants et commençait à être abandonné. Pierre de Montbozon, pour réanimer la ville, proposa d'affranchir la population, ce qui fut fait en 1400 par l'abbaye, qui édicta une charte. Malgré cette faveur, les habitants refusèrent certaines tâches, notamment l'entretien de la muraille. Ils y furent condamnés en 1408. À la mort de Pierre de Montbozon, ses biens et ses territoires furent partagés entre ses héritiers. Henriette, sa fille aînée, par mariage avec Eberhard-le-Jeune fit entrer ses possessions dans le domaine du Wurtemberg.  \r\nLure ne devint véritablement française qu'en 1674, lorsque les armées de Louis XIV s'emparèrent de la ville. Lure est la sous-préfecture de la Haute-Saône, situé aux portes du parc régional des Vosges du Sud, c'est un carrefour entre l'Alsace, la Lorraine, la Suisse et l'Allemagne. La fortification comprenait alors une muraille dotée de trois portes bastillonnées. Celles-ci furent conservées jusqu'au XVIIe siècle. En 1695  Louis XIV ordonne la démolition de la muraille. Les travaux dureront jusqu'en 1758. La dernière porte disparut en 1796.\r\nQUERS,  à une dizaine de kilomètres au nord  de Lure, château seigneurial des XVe et XVIIe siècles anciens couvent des templiers, et au sud ouest le château d'Amblans.","architecture":"Lure, le patrimoine  se limite à la préfecture importante bâtisse rectangulaire à trois niveaux et attiques deux avant-corps saillants en façade ce qui lui donne l'aspect seigneurial.      Quers,  est un village ancien, comme en témoignent de nombreux bâtiments. Outre des maisons anciennes, impossibles à dater précisément, on pourra y voir un ancien château seigneurial des XVe et XVIIe siècles, inscrit aux Monuments Historiques, qui abrite aujourd'hui la mairie.","habitants":"Famille de Jacques de Vyt\r\n        \"","divers":"Prefecture de Lure château de Quers, d'Amblans et de Vy les Lure","gps":"","images":["../../jctruffet.com/image/image_70/70_Lure_Quers_1.jpg","../../jctruffet.com/image/image_70/70_Lure_Quers_2.jpg","../../jctruffet.com/image/image_70/70_Lure_Quers_3.jpg","../../jctruffet.com/image/image_70/70_Lure_Quers_4.jpg","../../jctruffet.com/image/image_70/70_Lure_Quers_5.jpg","../../jctruffet.com/image/image_70/70_Lure_Quers_6.jpg","../../jctruffet.com/image/image_70/70_Lure_Quers_7.jpg"]},"Consult_chateau_formulairee972":{"id":"Consult_chateau_formulairee972","dept":"70","canton":"Luxeuil-les-Bains","commune":"Luxeuil-les-Bains","nom":"Luxeuil","type":"Patrimoine","periode":"XV-XVII","histoire":"LUXEUIL, le musée de la tour des Echevins est lun des plus anciens de France,  cet édifice a été construit dans la deuxième moitié du XVe siècle, par Henri Jouffroy, second fils de Perrin, frère du Cardinal. Il fut acquis en 1552 par les notables de la ville, pour abriter les fonctions communales. Fleuron du patrimoine civil luxovien, il sélève sur quatre étages, souvrant sur un bel escalier latéral de 146 marches, menant à une tour octogonale.    c'est sous le règne de Louis XV que fut construit lactuel bâtiment d'architecture classique en grès rose des Vosges, l'établissement est inauguré en 1768. La ville cède la concession à l'État en 1853. Napoléon III remarqua le lieu et y passa une saison avec l'impératrice Eugénie en 1856. Bien qu'il ait préféré Plombières-les-Bains, sa visite contribua fortement à relancer la station de Luxeuil, qui devint rapidement à la mode. Au début du XXe siècle, de nombreuses personnalités, comme Sacha Guitry ou Yvonne Printemps, s'y font remarquer. Le lieu est alors réputé pour son élégance et pour son parc. De nombreux grands hôtels, Hôtel des Thermes, Métropole, du Parc, des Sources, etc,   sont construits, ainsi que des villas                                                                      Dans la commune et aux environs le château de Breuches.  Ancienne usine et première demeure patronale édifiées vers 1828. Après un incendie en 1890, reconstruction du logis en faisant peut-être appel à l'architecte parisien Sanson.                                      Château  de Chatigny pas d'information historique.","architecture":"Luxeuil;  au Moyen-Age,  une ville entouré de remparts dès le XIIIe siècle. La fin du Moyen-Age et la Renaissance verront la prospérité de la ville s'accroître, comme en témoignent les édifices construits à cette période. La plupart des édifices civils datent de la période médiévale du XVe siècle, comme la tour des échevins, la maison du cardinal Jouffroy et la maison espagnole dont La façade et la toiture  révèle une inscription aux monuments historiques depuis le 19 novembre 1976, ainsi que la maison à l'Oriflamme. L'hôtel Thiebaut de Montureux a été construit au milieu du XVIe siècle. L'un des principaux édifices de la Renaissance qui a été conservées est la maison de François Ier. La Place de la Baille, dont la caractéristique remarquable est de faire se jouxter trois façades, respectivement des XVe, XVIe et XVIIe siècles, compte quelques hôtels particuliers inscrit monument historique comme l'hôtel Bretons-d'Amblans du XVIIe siècle, l'hôtel Thiadot du XVe siècle et l'hôtel Pusel.","habitants":"Famille d'Henri Jouffroy\r\n        \"","divers":"Luxeuil les bains; tour des Echevins, la maison  Espagnole, les Thermes, l'hôtel du Bailli, la maison du cardinal Jouffroy, Maison de François Premier, le château de Breuches et de Chatigny.","gps":"","images":["../../jctruffet.com/image/image_70/70_Luxeuil_1.jpg","../../jctruffet.com/image/image_70/70_Luxeuil_2.jpg","../../jctruffet.com/image/image_70/70_Luxeuil_3.jpg","../../jctruffet.com/image/image_70/70_Luxeuil_4.jpg","../../jctruffet.com/image/image_70/70_Luxeuil_5.jpg","../../jctruffet.com/image/image_70/70_Luxeuil_6.jpg","../../jctruffet.com/image/image_70/70_Luxeuil_7.jpg","../../jctruffet.com/image/image_70/70_Luxeuil_8.jpg","../../jctruffet.com/image/image_70/70_Luxeuil_9.jpg"]},"Consult_chateau_formulairee92a":{"id":"Consult_chateau_formulairee92a","dept":"70","canton":"Scey-sur-Saône","commune":"Mailley-et-Chazelot","nom":"Mailley_Levrecey","type":"Château","periode":"XVI-XVIII","histoire":"MAILLEY, le château a été bâti par les Terrier de Santans au XVIe si,  un Terrier, conseiller d'état de Bourgogne en 1472.   On trouve un Jacques Terrier de Santans, seigneur de Mailley et Quincey, conseiller  au parlement de Besançon  en 1679. Un François Terrier épouse Anne Françoise De Mesmay. En 1751 Claude Antoine de Mesmay,  baron de Montaigu, est seigneur de Mesmay, Quincey et Mailley et conseiller au parlement de Besançon.  Monsieur De Mesmay, seigneur de Quincey et  Mailley rencontre de sérieux problèmes à la Révolution suite à une explosion à Quincey qui tue plusieurs personnes et dont il serait responsable. Les gens de Quincey incendient le château, Il semble que dans la tourmente, il perde son petit château de Mailley. Cette demeure est dans la famille Compagnon-Jacquier depuis 1912.                                                                                   A quelques kilomètres au nord le château de Levrecey à  Velleguindry  édifice reconstruit vers 1750-1760.","architecture":"Mailley, jolie petit manoir dit château, corps de logis presque carré à deux niveaux, toiture en croupe,  flanqué en façade d'une tourelle octogonale et d'une autre sur l'arrière gauche, les deux à toit pointu, tour ronde dans le parc.                                               Levrecey, édifice reconstruit vers 1750-1760, comprenant une avant-cour avec un portail de plan arrondi, bordé par un bâtiment et des dépendances agricoles. Le corps de logis s'élève entre une cour et le jardin, construit de moellons enduits, les façades sont percées de baies couvertes d'arcs segmentaires. A l'intérieur, plusieurs pièces conservent des lambris et des cheminées du XVIIIe siècle.","habitants":"Famille de Claude Antoine de Mesmay\r\n        \r\n        \"","divers":"Château de Mailley et de Levrecey","gps":"","images":["../../jctruffet.com/image/image_70/70_Mailley_Levrecey_1.jpg","../../jctruffet.com/image/image_70/70_Mailley_Levrecey_2.jpg","../../jctruffet.com/image/image_70/70_Mailley_Levrecey_3.jpg","../../jctruffet.com/image/image_70/70_Mailley_Levrecey_4.jpg","../../jctruffet.com/image/image_70/70_Mailley_Levrecey_5.jpg"]},"Consult_chateau_formulaire067c":{"id":"Consult_chateau_formulaire067c","dept":"70","canton":"Pesmes","commune":"Malans","nom":"Malans","type":"Château","periode":"XVI-XIX","histoire":"MALANS; construction probable du château vers la fin du XVIe siècle, date relevée sur le logement du jardinier,  Il appartenait aux chevaliers de Malans , le château  est donc à l'origine de ce patronyme bien connu du monde protestant, notamment Vaudois. Ce château serait l'un des seuls en France à avoir deux fresques dans la salle d'eau classées par les monuments historiques,   résidence  du  comte de Lallemand, ambassadeur de Napoléon III en Chine, décédé en 1882  résidait au château. Aujourd'hui propriété de monsieur Hoyet. Dans la commune le château de Sainte-Marie.","architecture":"Le château, ancienne maison forte féodale situé sur les bords de l'Ognon, était au départ un simple donjon, autour duquel s'est construit la demeure de style renaissance datant du XVIe siècle, corps central flanqué d'une tour  octogonale d'escalier à vis et épaulé de deux pavillons plus bas  ajouté au cours du XVIIIe siècle, belle demeure de 25 pièces. Des restaurations importantes  sont entreprises  au milieu du XIXe siècle, sous le patronyme Malan , l'escalier monumental et  l'entrée principale, l'entourage des baies, les boiseries du 1er étage, le décor de la salle d'armes, les remises,  la flèche de la tour d'escalier date de cette époque; au-dessus de la porte d'entrée on note la date de 1850.                             le château de Sainte-Marie quadrangulaire, corps de logis rectangulaire à trois niveaux avec tourelles en angles à toits pointues, cette ancienne exploitation viticole et extension en château bourgeois du XVIIIe siècle a été entièrement rénové avec réfection des toitures, parc à sculptures modernes.","habitants":"Les Chevaliers de Malans \r\n        \"","divers":"Château de Malans et de Ste-Marie","gps":"","images":["../../jctruffet.com/image/image_70/70_Malans_1.jpg","../../jctruffet.com/image/image_70/70_Malans_2.jpg","../../jctruffet.com/image/image_70/70_Malans_3.jpg","../../jctruffet.com/image/image_70/70_Malans_4.jpg","../../jctruffet.com/image/image_70/70_Malans_5.jpg","../../jctruffet.com/image/image_70/70_Malans_6.jpg"]},"Consult_chateau_formulaire66f4":{"id":"Consult_chateau_formulaire66f4","dept":"70","canton":"Gray","commune":"Mantoche","nom":"Mantoche","type":"Château","periode":"XV-XVIII","histoire":"MANTOCHE; un château existait à cet emplacement avant 1600. Il fut remanié dans le premier quart du XVIIe siècle,   puis subit des travaux importants au XVIIIe siècle, notamment l'agrandissement de l'aile sud  dans la première moitié  du XVIIIe siècle   par les Joly de Mantoche. Le château conserve un ensemble de décors du XVIIIe  siècle : lambris, parquets, cheminées \r\nA quelques kilomètres au sud-ouest le château à Essertenne à  Essertenne et Cecey.","architecture":"A Mantoche on pénètre dans la cour par un porche d'entrée remanié en 1770. Le château apparaît alors composé d'un corps principal et de deux ailes en retour d'équerre. La partie gauche du bâtiment central remonte au XVIe siècle. Il fut prolongé vers la droite entre 1720-1730, pourvu de deux tours carrées sur les angles.   L'aile nord a été édifiée fin du XVIIIe ou début XIXe siècle. La façade Ouest derrière l'église est flanquée aux deux extrémités d'échauguettes octogonales sur angle qui appartiennent à la construction primitive du XVIe siècle et qui ont été coiffés d'un toit à l'impérial du XVIIIe siècle. La cour se prolonge vers la Saône par une pelouse avec deux colombiers carrés a peu près dans l'axe des deux ailes. La propriété est limitée par un mur de pierre qui surplombe de quelques mètres la rivière de la Saône.","habitants":"Famille de Joly de Mantoche\r\n        \"","divers":"Château de Mantoche et d'Essertenne","gps":"","images":["../../jctruffet.com/image/image_70/70_Mantoche_1.jpg","../../jctruffet.com/image/image_70/70_Mantoche_2.jpg","../../jctruffet.com/image/image_70/70_Mantoche_3.jpg","../../jctruffet.com/image/image_70/70_Mantoche_4.jpg","../../jctruffet.com/image/image_70/70_Mantoche_5.jpg","../../jctruffet.com/image/image_70/70_Mantoche_6.jpg","../../jctruffet.com/image/image_70/70_Mantoche_7.jpg"]},"Consult_chateau_formulaire5017-2":{"id":"Consult_chateau_formulaire5017-2","dept":"70","canton":"Marnay","commune":"Marnay","nom":"Marnay","type":"Forteresse","periode":"XIII-XVII","histoire":"MARNAY,   En 1210, appartenait à la famille de Chalon, branche cadette des comtes de Bourgogne. Étienne II d'Auxonne, comte de Chalon avait donné à sa fille Béatrice d'Auxonne la seigneurie de Marnay. En 1215, Béatrice l'apporta en dot à son époux, Simon de Joinville, puis, en 1250, remis Marnay à son fils Simon II de Joinville, lequel donna hommage à Jean Ier de Chalon pour Marnay le Châtel. En 1289, Pierre de Joinville, fils de Simon II, reconnut qu'il était homme dévoué de Jean de Chalon et tenait de lui en fief le château et le bourg de Marnay. En 1303, lors du partage des fiefs à la mort du comte de Bourgogne, Othon IV de Bourgogne, fils de Hugues de Chalon, la vassalité de Marnay fut reconnue à sa veuve Mahaut d'Artois  et non à son gendre  le roi de France Louis V le Long. En 1339, Hugues de Joinville épousa Jeanne de Montbéliard, fille d'Henri de Montfaucon et d'Agnès de Montbéliard. Hugues de Chalon mentionnait alors le droit de rachat perpétuel de Marnay appartenant aux Chalon qu'ils ne purent ou ne jugèrent pas bon d'exercer. En 1397, Etienne de Montbéliard légua Marnay à sa petite-fille Agnès, femme de Thiébaud VIII de Neufchatel. En 1512, la seigneurie de Marnay fut acquise par Laurent de Gorrovod, comte de Pont-de-Vaux, aux Neufchatel qui l'embellit et fit reprise du fief à Philibert de Chalon. Son neveu prêta hommage de sa terre de Marnay à l'empereur du saint Empire romain germanique Charles Quint. En 1600, La baronnie de Marnay fut érigée en marquisat pour Charles-Emmanuel de Gorrovod.\r\n Marnay passa en marquisat en 1712 au profit de la maison de Bauffremont.\r\nA quelques kilomètres au  nord  Chancevigney à Tromarey, ancien château seigneurial  du XVIe siècle.","architecture":"Château féodal de Marnay est situé sur l'éperon rocheux qui domine la ville et surtout l'Ognon par une muraille de 25 mètres de haut, bâti au début du XIIIe siècle pour surveiller la voie Besançon-Langres. Le château connaît deux périodes de reconstruction , en 1520 et au  XVIIe siècle et au début du XVIIIe siècle, l'édifice entre dans une  lente dégradation. Elle se poursuit à la Révolution avec la division entre plusieurs propriétaires.  Affranchis, les habitants construisent une double ceinture de remparts, avec seize  tourelles, ce château fut considéré comme le plus beau de Franche-Comté. En 1674, Louis XIV y séjourna lorsqu'il vint assister au siège de Besançon mené par Vauban.  Mais le suzerain le fit détruire comme une bonne partie des châteaux régionaux afin d'éviter toute tentative d'indépendance régionale, la porte du pont levis avec les rainures de sa herse sont encore visibles, au fond de la cour un bel escalier est abrité dans une tour à meneaux et accolades.","habitants":"Famille de Laurent de Gorrovod\r\n        \"","divers":"Château forteresse de Marnay et château de Chancevigney à Tromarey","gps":"","images":["../../jctruffet.com/image/image_70/70_Marnay_1.jpg","../../jctruffet.com/image/image_70/70_Marnay_2.jpg","../../jctruffet.com/image/image_70/70_Marnay_3.jpg","../../jctruffet.com/image/image_70/70_Marnay_4.jpg","../../jctruffet.com/image/image_70/70_Marnay_5.jpg","../../jctruffet.com/image/image_70/70_Marnay_6.jpg","../../jctruffet.com/image/image_70/70_Marnay_7.jpg","../../jctruffet.com/image/image_70/70_Marnay_8.jpg"]},"Consult_chateau_formulairec575-2":{"id":"Consult_chateau_formulairec575-2","dept":"70","canton":"Pesmes","commune":"Montagney","nom":"Montagney_Motey","type":"Château","periode":"XV","histoire":"MONTAGNEY, chateau dit Terrier de Santans, Tour rebâtie au XVe siècle, à l'emplacement d'un édifice plus ancien dont on ne connaît pas la date de  construction ; Antoine de Santans, fils de Jean , seigneur de Montagney en 1630.  Hôtel Terrier de Santans (Marnay). L'hôtel particulier qui abrite la mairie a été construit au XVIe siècle par la famille Terrier de Santans. Il présente une façade à deux niveaux, percée de fenêtres à meneaux de la renaissance, et encadrée de deux avant-corps.","architecture":"Montagney,   à la fin du XVIIe siècle le bâtiment est restauré et est surmonté d'un toit pointu, au XIXe siècle, des ouvertures sont percées dans la tour, le toit effondré est remplacé par une terrasse bordée de créneaux.   Hôtel particulier à Marnay des Terrier de Santans.                                                                                     Motey-Besuche,  L'édifice actuel a été reconstruit au XVIe siècle, à l'emplacement d'un autre château. Les éléments les plus anciens dateraient de la fin  du XVIe siècle, comme en témoignent l'inscription située  sur une fenêtre à meneau de la partie gauche de l'habitation. En l'an 1542 sur la tour circulaire,  le reste des bâtiments serait de la deuxième moitié du XVIe siècle, rénovation de 1611 et 1831.","habitants":"Famille d'Antoine de Santans\r\n        \"","divers":"Patrimoine à Montagney et à Motey-Besuche et   hôtel particulier à Marnay des Terrier de Santans.","gps":"","images":["../../jctruffet.com/image/image_70/70_Montagney_Motey_1.jpg","../../jctruffet.com/image/image_70/70_Montagney_Motey_2.jpg","../../jctruffet.com/image/image_70/70_Montagney_Motey_3.jpg","../../jctruffet.com/image/image_70/70_Montagney_Motey_4.jpg","../../jctruffet.com/image/image_70/70_Montagney_Motey_5.jpg"]},"Consult_chateau_formulaireb6ed":{"id":"Consult_chateau_formulaireb6ed","dept":"70","canton":"Montbozon","commune":"Montbozon","nom":"Montbozon","type":"Château","periode":"XV-XVIII","histoire":"MONTBOZON, Le territoire de Montbozon est occupé depuis la préhistoire. On y a dailleurs découvert une station néolithique. On pense que Montbozon a pris son nom vers lan 800 du Comte de Bozon, fils de Richard le Justicier, et petit-fils de Charlemagne. Au début, la commune sappelait le  Mont, car située sur une hauteur, en y ajoutant le nom du petit-fils de Charlemagne cela devint le Mont de Bozon et par la suite Montbozon. La famille de Montbozon est née au XIIe siècle. Elle possédait une prévôté qui sétendait sur 72 villages en 1789. Un hôpital dominicain fut créé dans la commune en 1450.                                                               LOULANS-VERCHAMPS,  les Forges  sont devenus Loulans-Verchamp depuis 1970, offrant son charme campagnard au bord de l'Ognon. A signaler une entreprise de travaux publics et l?'entreprise Marcillat , sur l'emplacement des forges et de la fonderie fondées au XVIe siècle. À Loulans, on peut encore admirer le château construit en 1730 à proximité du château médiéval, aujourd'hui transformé en maison de repos appartenant à l'union des caisses d'assurance maladie.                                                     Dans le canton et à quelques kilomètres de Loulans le château de Viller-Pater  et  plus au nord-est le château  de la Roche sur Linotte et le château de Vy-les-Filain. Tous ces châteaux  sont aujourd'hui  des hôtels restaurants.","architecture":"On peut également voir à Montbozon un château reconstruit à la fin du XVIIe siècle. Corps de logis en équerre à deux niveaux tours carrées en angles à trois niveaux. A son pied se trouve une très belle fontaine du début du XIXe siècle, et d'une source sous pavillon.                                                                                         \r\nLe Château de Loulans dit des forges construit en 1732 se situe à 30 km de Besançon, corps de logis en équerre à deux niveaux et attiques  tourelle en angle intérieur et fronton triangulaire sur grande  façade.","habitants":"Famille de Montbozon\r\n        \r\n        \"","divers":"Château de Montbozon, de Loullans, de la Roche sur Linotte, de Verchamps et de Viller-Pater","gps":"","images":["../../jctruffet.com/image/image_70/70_Montbozon_1.jpg","../../jctruffet.com/image/image_70/70_Montbozon_2.jpg","../../jctruffet.com/image/image_70/70_Montbozon_3.jpg","../../jctruffet.com/image/image_70/70_Montbozon_4.jpg","../../jctruffet.com/image/image_70/70_Montbozon_5.jpg","../../jctruffet.com/image/image_70/70_Montbozon_6.jpg","../../jctruffet.com/image/image_70/70_Montbozon_7.jpg","../../jctruffet.com/image/image_70/70_Montbozon_8.jpg","../../jctruffet.com/image/image_70/70_Montbozon_9.jpg"]},"Consult_chateau_formulaire291b-2":{"id":"Consult_chateau_formulaire291b-2","dept":"70","canton":"Noroy-le-Bourg","commune":"Montjustin-et-Velotte","nom":"Montjustin_Velotte","type":"Vestiges","periode":"XIII-XVII","histoire":"MONJUSTIN,  la famille de Montjustin, dont certains membres sont connus du XIIe siècle au XVIe siècle et parmi lesquels figure Hugues, damoiseau qui participe à la sixième croisade en 1229 aux côtés de Othon de Méranie. Cette famille  a été au Moyen-Age l'une des plus importantes possessions des Comtes de Bourgogne dès le XIIe siècle. Hugues de Bourgogne, fils du Comte Hugues et de la Comtesse Alix, auquel échoit le domaine, prendra d'ailleurs le titre de sire de Montjustin. En 1292, il donne le château et ses dépendances à sa nièce Jeanne, fille du Comte Othon IV, au cas où il décédèrent sans descendant. En 1312, l' héritier est son frère. En 1531 avec le décès de Guillaume, chevalier de Saint-Georges, qui n'eut que des filles. La terre se divise ensuite en plusieurs seigneuries jusqu'au XVIIe siècle, où Nicolas François Millot rassemble les différentes portions. Elle est érigée en baronnie en décembre 1746 en faveur de Guillaume Antide Millot. Une forte colère des habitants à l'égard de leur seigneur semble avoir existé, puisque le Baron Charles François Millot de Montjustin va être suspendu dans un puits durant la Révolution, entendant délibérer si on le laisserait tomber ou si on le ferait périr d'une autre manière. Il fut finalement libéré par une troupe de soldats de passage.                                                             Le château du XVIIe siècle sous le château féodal, passé à la famille De Vaulchier par le mariage en 1807 de Louis René Simon, marquis de Vaulchier, avec Céleste-Guillelmine-Gasparine, fille de Charles François Millot baron de Montjustin.","architecture":"A Montjustin, il ne subsiste plus que quelques ruines de l'ancien château féodal, un pan de mur de douze mètres de long, huit mètres de haut et deux de large qui témoigne la solidité de la fortification, érigé au sommet de la butte dominant la plaine qui s'étend au nord en direction de Lure. Construit vraisemblablement au XIIe siècle, il a été détruit au cours des guerres qui ont affecté la région à la fin du XIVe siècle. Le château semble avoir été constitué de deux enceintes fortifiées. Des fouilles anciennes sont mises en évidence dans la partie nord un mur muni de corbeaux indiquant la présence de salles en rez-de-chaussée encore enterrées le long de ce mur.","habitants":"Famille de Nicolas François Millot\r\n        \r\n        \"","divers":"Vestiges de Montjustin et château","gps":"","images":["../../jctruffet.com/image/image_70/70_Montjustin_Velotte_1.jpg","../../jctruffet.com/image/image_70/70_Montjustin_Velotte_2.jpg","../../jctruffet.com/image/image_70/70_Montjustin_Velotte_3.jpg","../../jctruffet.com/image/image_70/70_Montjustin_Velotte_4.jpg","../../jctruffet.com/image/image_70/70_Montjustin_Velotte_5.jpg"]},"Consult_chateau_formulaired9ce":{"id":"Consult_chateau_formulaired9ce","dept":"70","canton":"Autrey-les-Gray","commune":"Montureux-et-Prantigny","nom":"Montureux","type":"Gentilhommière","periode":"XVIII","histoire":"MONTUREUX;   fief tenu par le sire de Vergy jusqu'en 1418. La famille des De Mandre qui devinrent leurs vassaux, furent chargés de l'administration de leur seigneurie. Le premier de cette maison que mentionne lhistoire de Franche-Comté, est Jean de Mandre, écuyer, qui, soutenu par Guyot dAurain, fit la guerre à Jean de Chauvirey, vers 1356.  Famille très ancienne, les De Mandre possédaient un domaine féodal important autour de Montureux, En 1476, Claude de Mandre est cité dans l'armée de Charles le Téméraire, Il fit restaurer le château de Montureux en 1560, et y mourut neuf ans plus tard.  Louis XIV fit raser le château médiéval de Montureux,  exila les De Mandre et confisqua leurs terres par décret du parlement en mai 1681. Les ruines du château subsistèrent jusqu'au début du siècle suivant.  Quant à la seigneurie, elle fut adjugée au cours des années 1680 à un magistrat de Gray, pro-français, Antoine Jobelot. Les Jobelot se firent édifier au XVIIIe siècle un autre château, plus proche de la Saône, dans lequel Voltaire serait venu séjourner à plusieurs reprises lors de ses trajets entre Paris et sa résidence de Ferney.    Un manoir plus tardif, construit en 1707 par Valentin Raclot et remanié vers 1880, fut érigé à la place, dominant  l'entrée du bourg. Il appartient toujours aux descendants des Raclot, la famille Poirier-Lauvin.","architecture":"les seigneurs de Montureux  avaient bâtis un château fort dans la partie haute du village à un kilomètre environ de l'ancien fort romain. L'ancien château de style Renaissance ayant appartenu à la famille des De Mandre a été détruit sur l'ordre de Louis XIV. Un manoir plus tardif datant de 1707 et remanié vers 1880 et érigé à la place, dominant la place à l'entrée du bourg. Il existait au XVIIIe siècle un autre château, plus proche de la Saône, appartenant à la famille des Jobelot. L'édifice aujourd'hui disparu était situé au milieu d'un parc de 6  ha. Il n'en subsiste que le pigeonnier et la grille d'entrée, classée sur l'inventaire des monuments historiques, comme étant l'uvre de maîtres de forges, savoir-faire typiquement franc-comtois aux XVIIIe et XIXe siècles.","habitants":"Famille d'Antoine Jobelot\r\n        \"","divers":"Château de Montureux et de Prantigny","gps":"","images":["../../jctruffet.com/image/image_70/70_Montureux_1.jpg","../../jctruffet.com/image/image_70/70_Montureux_2.jpg"]},"Consult_chateau_formulaire15b5":{"id":"Consult_chateau_formulaire15b5","dept":"70","canton":"Vesoul","commune":"Navenne","nom":"Navenne","type":"Château","periode":"XIX","histoire":"NAVENNE, dispose de deux châteaux et elle présente dans son territoire divers édifices architecturaux témoignés par la présence de nombreuses forteresses. Au XIVe siècle, les seigneuries de Navenne et de Graisse faisaient partie du domaine des comtes de Bourgogne, châteaux tels que lancien château seigneurial de Lampinet, construit par cette famille , existe toujours, en 1789 elle appartenait encore à la famille de Lampinet Il a longtemps été occupé par une école et une mairie, puis de 1954 à 1978, par un peloton de gendarmerie.                                                              Le château de la Graisse, ce dernier fut détruit et reconstruit au XIXe siècle. Il fut à nouveau détruit vers la fin du XIXe siècle et donne place à un centre de rééducation fonctionnelle.  En 1789 ce château appartenait à la famille de Lampinet et fut intégrées en 1790 aux districts et cantons de Vesoul.","architecture":"Le château seigneurial de Lampinet , situé au haut du village   avec son salon Louis XVI classé aussi monument historique, abrita l'école de garçons et de filles et la mairie jusqu'en 1954 et puis, jusqu'en 1978, un peloton de gendarmerie motorisée. Château de Graisse reconstruit au XIXe siècle et détruit en 1991 occupa l'emplacement de l'actuel centre de rééducation fonctionnelle, il servit pendant quelques années d'annexe à l'hôpital Paul-Morel de Vesoul. Le cimetière militaire fut aménagé au lendemain de la seconde guerre mondiale.","habitants":"Famille de Lampinet\r\n        \"","divers":"Château de Lampinet et tour, château de Graisse","gps":"","images":["../../jctruffet.com/image/image_70/70_Navenne_1.jpg","../../jctruffet.com/image/image_70/70_Navenne_2.jpg","../../jctruffet.com/image/image_70/70_Navenne_3.jpg"]},"Consult_chateau_formulaire6ac3":{"id":"Consult_chateau_formulaire6ac3","dept":"70","canton":"Villersexel","commune":"Oricourt","nom":"Oricourt","type":"Vestiges","periode":"XIII-XVIII","histoire":"ORICOURT;  Gaucher, connétable du comté de Bourgogne et seigneur d'Oricourt vers 1170   était un fief du comté de Bourgogne, détenu par les sires de Faucogney, et arrière-fief de seigneurs particuliers qui assuraient pour eux la garde du château, Jean de Faucogney reconnu vassal d'Hugues de Monjustin en 1309 et  en 1374 Philippe le Hardi en prend possession puis, lui succède ensuite la famille de Balmont à la fin du Moyen-Age, deux cousins en conflits, Guillaume de Vienne et Thiébaut II de Balmont,  ce dernier reconnu propriétaire. D'autres familles se succéderont à la tête du château durant la Renaissance, jusqu'aux propriétaires actuels qui réussissent à faire revivre ce magnifique monument. Le plus illustre propriétaire que le château ait connu fut Nicolas Rolin, chancelier de Bourgogne, l'acheta en 1435, fondateur des hospices de Beaune et immortalisé par Jan Van Eyck dans  la vierge du chancelier Rolin  conservé au Louvre. Son fils  Guillaume lui succède, passera ensuite dans différentes mains, deviendra ferme au XIXe siècle et tomba dans l'oubli jusqu'en 1969, sa restauration débute par monsieur Jean-Pierre Cornevaux qui obtient le classement aux monuments historiques.","architecture":"Oricourt, Forteresse datant des XIIe, XVe, et XVIIIe siècles,est actuellement le château fort le mieux conservé en Franche-Comté, grâce aux travaux de restauration. Il est classé monument historique en 1984  a été rendu célèbre par son château fort à double enceinte.  la première enserre la cour de ferme; la seconde la cour d'habitation dit haute cour, corps de logis seigneuriale adossée à la muraille de large ouvertures sur les façades la partie la plus anciennes contient la chapelle et une élégante tour octogonale renfermant un escalier.  Deux tours carrées de 25 mètres de haut dominent les courtines et de profonds fossés. À lextérieur, côté village, a été érigé un imposant colombier.   Entouré par des fossés encore aujourd'hui profonds d'une dizaine de mètres, il est protégé par une double enceinte, reliées par une tour de 25 m de haut. La première enceinte enserre la basse-cour et la deuxième la haute-cour.","habitants":"Famille de Jean de Faucogney \r\n        \"","divers":"Château d'Oricourt","gps":"","images":["../../jctruffet.com/image/image_70/70_Oricourt_1.jpg","../../jctruffet.com/image/image_70/70_Oricourt_2.jpg","../../jctruffet.com/image/image_70/70_Oricourt_3.jpg","../../jctruffet.com/image/image_70/70_Oricourt_4.jpg","../../jctruffet.com/image/image_70/70_Oricourt_5.jpg","../../jctruffet.com/image/image_70/70_Oricourt_6.jpg","../../jctruffet.com/image/image_70/70_Oricourt_7.jpg","../../jctruffet.com/image/image_70/70_Oricourt_8.jpg"]},"Consult_chateau_formulaired659":{"id":"Consult_chateau_formulaired659","dept":"70","canton":"Vitrey-sur-Mance","commune":"Ouge","nom":"Ouge_Chauvirey","type":"Château","periode":"XVI-XVIII","histoire":"OUGE;  ce  château a été commencé au début du XVIe siècle par un cadet de la famille de Faulquier qui régnait alors sur la seigneurie de Chauvirey. La construction  fut achevée en 1590 par Guillaume Lullier dont  le grand-père était secrétaire de Charles Quint et au service des Habsbourg. Le château aura pour successeurs les familles de Montessus et d'Ambly. En 1637 à l'occasion des guerres avec l'Espagne le château a été épargné, il fut occupé par les Russes lors de la campagne de France en 1810, puis par les Prussiens en 1870 et l'occupation de l'Allemagne pendant la seconde guerre mondiale, il fut la possession de monsieur Edmond Paulmard, puis acheté par  la famille Bajolet dont   Bernard Bajolet  qui   en vingt  cinq ans,  avec l'aide de son frère Jean-Louis, architecte paysagiste, a planté plus de 300 arbres, répartis en plus de 60 espèces et plus de 1500 arbustes sur environ 3 ha, qui étaient auparavant des  pâtures. La cour d'honneur  a été totalement aménagée en 1997, et  la cour des écuries a été réaménagée entre 2001 et 2003.                                 A quelques Km à l'est a  CHAUVIREY le Châtel, château construit au  XIIIe siècle, à l'ouest d'un édifice plus ancien puis reconstruit au XVIIe siècle sur les plans de Jacques Gentillatre. Délaissé dès le XVIIIe siècle. La chapelle St-Hubert est l'ancien château Dessous, Charles le Temméraire venait trés souvent sur les terres de ses vassaux des sires de Chauvirey. Toute une dynastie de seigneurs régna sur cette terre, comme fief du comte de Bourgogne.  A la Révolution Française, en 1790, le château-Dessus de Chauvirey-le-Châtel et le château de Chauvirey-le-Vieil furent saccagés et pillés.","architecture":"Ouge, le manoir se compose d'un corps de logis de plan rectangulaire à trois niveaux flanqué  sur sa façade ouest  la tourelle polygonale d'escalier  avec son escalier à vis et sa couverture à six pans. la façade opposée est flanquée  de deux tours circulaires,  couvertures à poivrières.                           Chauvirey; le château actuel de Chauvirey-le-Vieil n'a été construit que dans les premières années du XVIIIe siècle. Celui de Chauvirey-le-Chatel, appelé le château-Dessous, est plus ancien. château du XIIIe siècle, corps de logis en forme de U à deux niveaux avec en prolongement d' une aile, la chapelle Saint-Hubert qui appartenait jadis au château Dessous.","habitants":"Famille de Faulquier\r\n        \"","divers":"Vestiges du château de Chauvirey le châtel château d'Ouge et de Chauvirey le Vieil","gps":"","images":["../../jctruffet.com/image/image_70/70_Ouge_Chauvirey_1.jpg","../../jctruffet.com/image/image_70/70_Ouge_Chauvirey_2.jpg","../../jctruffet.com/image/image_70/70_Ouge_Chauvirey_3.jpg","../../jctruffet.com/image/image_70/70_Ouge_Chauvirey_4.jpg","../../jctruffet.com/image/image_70/70_Ouge_Chauvirey_5.jpg","../../jctruffet.com/image/image_70/70_Ouge_Chauvirey_6.jpg","../../jctruffet.com/image/image_70/70_Ouge_Chauvirey_7.jpg","../../jctruffet.com/image/image_70/70_Ouge_Chauvirey_8.jpg"]},"Consult_chateau_formulairec903":{"id":"Consult_chateau_formulairec903","dept":"70","canton":"Jussey","commune":"Passavant-la-Rochère","nom":"Passavant","type":"Vestiges","periode":"XIV","histoire":"PASSAVANT, on peut voir les vestiges d'une forteresse appelée \"le camp des Suédois\", datant de la guerre de Trente Ans et ce sont les pierres de ses remparts qui ont servi à la construction du village. Passavant-la-Rochère possède la plus ancienne verrerie de tradition de France, fondée en 1475. Elle fut fondée par les gentilhommes verriers venus de Bohême pour exercer leurs arts en forêt de Darney et dans la vallée de l'Ourche. Le Hallier reçoit plus de 120 000 visiteurs par an. Le village est bâti sur un plateau, bordé par la vallée du Coney. Il reste quelques vestiges d?'un château du XIII-XIVe siècle au pied duquel les habitations étaient disposées en cercle et un grand aqueduc probablement plus ancien qui arrivait au château depuis le bois d'Ormoy.                   \r\n Château de Montcourt à quelques Kilomètres au Sud-Est.","architecture":"Le donjon  de Passavant, classement par arrêté du 27 janvier 1987 ; L'emplacement et les vestiges y compris les fondations et les vestiges archéologiques.","habitants":"Sires de Passavant\r\n        \r\n        \"","divers":"Château de Passavant et de Montcourt","gps":"","images":["../../jctruffet.com/image/image_70/70_Passavant_1.jpg","../../jctruffet.com/image/image_70/70_Passavant_2.jpg","../../jctruffet.com/image/image_70/70_Passavant_3.jpg","../../jctruffet.com/image/image_70/70_Passavant_4.jpg","../../jctruffet.com/image/image_70/70_Passavant_5.jpg"]},"Consult_chateau_formulaire5d60":{"id":"Consult_chateau_formulaire5d60","dept":"70","canton":"Pesmes","commune":"Pesmes","nom":"Pesmes_Rouillaud","type":"Château","periode":"XIII-XVI","histoire":"PESMES,  doit sont origine à son premier château érigé au Xe siècle par l'ancêtre de Guillaume Ier de Pesmes. Cette famille, dont l'origine est inconnue, va régner sur Pesmes jusqu'en 1327 avant d'être remplacée par celle des Grandson. Un peu plus d'un siècle plus tard le dernier de la maison de Grandson, Jean II, engageait ses terres de Pesmes auprès de Thiébaud VIII de Neuchâtel-Bourgogne permettant ainsi à ce dernier d'endosser le titre de seigneur de Pesmes. Son héritière, Bonne de Neuchâtel-Bourgogne, faisait entrer la seigneurie de Pesmes dans la Famille de La Baume-Montrevel, seigneurie puis baronnie avant d'être érigée en marquisat en mai 1754 . Aujourd'hui la comtesse du Chatelle Resie propriétaire depuis 1950, créée en 2000 dans la cour fermée du château en partie détruit à la Révolution et dont l'espace initial a été morcelé.                                                  ROUILLAUD;   les sires du château de  Rouillaud  cet édifice faisait partie de la seigneurie de Pesmes. Guyon Mouchet propriétaire de  Rouillaud au XVIe siècle.","architecture":"PESMES, l'ancien château ruiné du XIIIe siècle, était une enceinte médiévale quadrangulaire du bourg était percée de cinq portes dont deux ont été conservées, la porte st-Hilaire et la porte Loigerot, subsiste la salle des  gardes, deux pavillons d'entrées et une belle terrasse donnant sur l'Ognon, dans l'aile du grand pavillon devient hôtel. Dans la rue des châteaux se trouve trois admirables hôtels particuliers du XVe et XVIe siècles. Hôtel Mouchet et le château Rouillaud (XVe siècle), ce bâtiment en L est constitué d'une aile sud  et d'une aile nord construite au XVe siècle.         \r\nROUILLAUD; la date de construction du château est inconnue, on sait seulement qu'au cours du moyen âge,  était chargé de contrôler la porte Loigerot, le premier édifice est détruit au cours des guerres du Moyen-Age, l'aile sud date de la deuxième moitié du XVe siècle, l'aile nord de la deuxième moitié du XVIe siècle , le château est vendu comme bien  national à la Révolution en 1789, et subit de nombreuses détériorations. A partir  de 1891, l'édifice est racheté  par un seul  propriétaire, qui entreprend des restaurations. Fortifications du XVIe siècle, partiellement inscrites MH depuis 1993. Maison royale du XVe siècle, transformé en hôtel par la famille Hoyet inscrite MH depuis 1991.","habitants":"Famille de Guillaume Ier de Pesmes\r\n        \r\n        \"","divers":"Château de Pesmes avec ses remparts, le château des forges et de Rouillaud","gps":"","images":["../../jctruffet.com/image/image_70/70_Pesmes_Rouillaud_1.jpg","../../jctruffet.com/image/image_70/70_Pesmes_Rouillaud_2.jpg","../../jctruffet.com/image/image_70/70_Pesmes_Rouillaud_3.jpg","../../jctruffet.com/image/image_70/70_Pesmes_Rouillaud_4.jpg","../../jctruffet.com/image/image_70/70_Pesmes_Rouillaud_5.jpg","../../jctruffet.com/image/image_70/70_Pesmes_Rouillaud_6.jpg","../../jctruffet.com/image/image_70/70_Pesmes_Rouillaud_7.jpg","../../jctruffet.com/image/image_70/70_Pesmes_Rouillaud_8.jpg","../../jctruffet.com/image/image_70/70_Pesmes_Rouillaud_9.jpg"]},"Consult_chateau_formulaire1816":{"id":"Consult_chateau_formulaire1816","dept":"70","canton":"Gy","commune":"Pin","nom":"Pin_Gy","type":"Château","periode":"XV","histoire":"PIN;  à la fin du XVIIe siècle Philippe-Eugène Chifflet, fils du grand humaniste Jean-Jacques Chifflet, achète la seigneurie de Pin à la famille du Châtelet. Sa fille Catherine ( 1671- 1708) épouse Christophe de Chaillot, les terres sont érigées en marquisat en 1746  au profit de leur fils Christophe-Ignace de Chaillot, président à Mortier au parlement de Besançon. En 1771 sa femme, née Bonnaventure de Villersvaudey, affranchit les habitants de Pin. Christophe fit construire le château en 1777  marquis de Chaillot et premier président de Besançon. Après la Révolution sa fille Olympe de Chaillot (1788- 1869) épouse Radolphe de Buyer, maître de forges industriel, leur fils, Arthur reprend l'affaire  et en 1900 il trouve du charbon à 830 mètres de profondeur. Le château aujourd'hui utilisé pour  des séminaires par la famille  de Jean et Geneviève Wemaere.","architecture":"Pin, situé dans une région vallonnée et boisée, aux paysages superbes,  domine, à l'ouest, la plaine de Bourgogne le plus beau bâtiment de Pin est construit aux XVIe et XVIIIe siècles. Sa tourelle, son parc, ses cheminées et ses décors en font une demeure élégante, tant à l'intérieur qu'à l'extérieur. Sa terrasse offre en outre une très belle vue sur les environs. Une ancienne maison forte du XVe siècle est également intéressante, tout comme la motte féodale située près de l'Ognon, seul vestige du château médiéval.","habitants":"Famille de Christophe de Chaillot\r\n        \"","divers":"Château de Pin et son manoir","gps":"","images":["../../jctruffet.com/image/image_70/70_Pin_Gy_1.jpg","../../jctruffet.com/image/image_70/70_Pin_Gy_2.jpg","../../jctruffet.com/image/image_70/70_Pin_Gy_3.jpg","../../jctruffet.com/image/image_70/70_Pin_Gy_4.jpg","../../jctruffet.com/image/image_70/70_Pin_Gy_5.jpg","../../jctruffet.com/image/image_70/70_Pin_Gy_6.jpg"]},"Consult_chateau_formulaire866c":{"id":"Consult_chateau_formulaire866c","dept":"70","canton":"Vesoul","commune":"Pusy-Epenoux","nom":"Pusy_Epenoux","type":"Château","periode":"XVIII","histoire":"PUSY;   lhistoire de Pusy tourne autour de son château  du XVIIIe siècle, uvre du comte Jean-Xavier Bureaux de Pusy (1750-1806), le créateur des départements français, ingénieur militaire formé à lÉcole de Mézières, député de la noblesse du bailliage dAmont (Vesoul) aux états généraux en 1789, président de lassemblée nationale constituante à trois reprises. Il sera le rapporteur du projet de division de la France en départements (1790). Ami et compagnon de La Fayette, il laccompagnera aux États-Unis où, à la demande du congrès américain, il concevra les plans de défense de la rade de New York. À son retour, il occupera successivement les postes de préfet de lAllier, du Rhône, puis de Gênes (1801-1806). Le château abrite des chambres dhôtes. Son parc à la française, orné de jeux d'eau en forme d'animaux, il abrite dorénavant les services de la mairie et de la bibliothèque. Le château  a été offert à la commune en 1991 par son propriétaire, le comte Gilbert de Pusy La Fayette.                                          EPENOUX peut senorgueillir de son château, ce très beau bâtiment du XVIIIe siècle, entièrement rénové, appartenait à la grande famille des Ruffier dÉpenoux.  Trône au coeur d'un parc de plus de 5 ha, planté d'arbres centenaires. La façade côté cour est haussmannienne, témoin du prestige de la demeure. Admirez aussi la chapelle du XVIIIe siècle, avec son oratoire intact, et l'orangerie.  Transformé en hôtel restaurant par Germaine Gauthier.","architecture":"Pusy, le petit château datant du XVIIIe siècle, corps de logis rectangulaire à deux niveaux, avant corps  sur façades côté parc et toiture en croupes. les parties les plus intéressantes étant le portail d'entrée et sa grille, le corps de logis et ses décors intérieurs.\r\nEpenoux, construit au XVIIIe siècle,   de forme rectangulaire à deux niveaux et attiques, avant corps saillant supportant un étage supérieur, une tourelle carrée  saillante sur angle arrière.","habitants":"Famille de Jean-Xavier Bureaux de Pusy\r\n        \"","divers":"Château d'Epenoux et de Pusy.","gps":"","images":["../../jctruffet.com/image/image_70/70_Pusy_Epenoux_1.jpg","../../jctruffet.com/image/image_70/70_Pusy_Epenoux_2.jpg","../../jctruffet.com/image/image_70/70_Pusy_Epenoux_3.jpg","../../jctruffet.com/image/image_70/70_Pusy_Epenoux_4.jpg","../../jctruffet.com/image/image_70/70_Pusy_Epenoux_5.jpg"]},"Consult_chateau_formulaire9a65":{"id":"Consult_chateau_formulaire9a65","dept":"70","canton":"Dampierre-sur-Salon","commune":"Ray-sur-Saône","nom":"Ray_Saone","type":"Forteresse","periode":"XVII","histoire":"RAY, seigneurie cité dés le Xe siècle par les sires de Ray qui furent au XIIIe siècle duc d'Athènes et de Thèbes; Othon sire de la Roche, issu d'une branche cadette des Ray épouse  une de ses cousines  Isabelle de Ray héritière de la branche aînée, reste dans cette famille par héritage de fils en fils dont cette dernière s'éteignit en 1614, passa à la famille de Mérode qui le reconstruiront suite aux assauts causé par les guerres de Bourgogne, c'est Philippine de Mérode, duchesse de Holstein dont la famille avait hérité de la seigneurie vers 1613  du dernier descendant d' Othon,  Claude François de Ray. En 1774 un arrêt du parlement de Besançon attribue le domaine à François-Philippe II, marquis de Marmier qui réaménagea , le fils de François-Philippe, Philippe-Gabriel épousa Jacqueline de Choiseul  descendant du célébre ministre, le  fils de François-Philippe,  Alfred  (1805-1873) député  de Haute-Saône, par Raynald (1834-1917) et par Etienne (1876-1947) qui fut le quatrième et dernier duc de Marmier. le château passera ensuite dans les années 1930 par héritage aux Salverte.   Dornier , la marquise de Montrichard qui possédait le château,","architecture":"A Ray-sur-Saône,  au Xe siècle, un château fort, forteresse médiévale, a été édifié sur un promontoire dominant la Saône pour la surveiller. Ce château a été en partie démoli pendant la guerre de dix ans, seuls le mur denceinte et les tours subsistent.  Il est inscrit aux Monuments Historiques en 1979 ainsi que le parc à langlaise qui lentoure. Le château abrite un musée où sont exposés les souvenirs des Ray. Forteresse rebâtit au XVe siècle qui à l'origine possédait quatorze tours et une enceinte qui s'étendait sur cinq hectares, et possédait un donjon reposant sur un soubassement   abritant un puits profond de cinquante mètres. Puis reconstruit  au XVIIIe siècle  sur l'emplacement de l'ancienne forteresse en forme de fer à cheval, dont il a gardé le style en changeant quelques dissymétrie, et deux tours rondes  crénelées.  Le corps de logis  classique à deux niveaux possède un avant corps central surmonté d'un fronton triangulaire, il est prolongé par deux ailes en retour d'équerre chacune possèdent à leur extrémités un pavillon en demi-hors oeuvre l'ensemble à toitures brisées.","habitants":"Famille de Mérode \r\n        \r\n        \"","divers":"La forteresse de Ray-sur-Saône","gps":"","images":["../../jctruffet.com/image/image_70/70_Ray_Saone_1.jpg","../../jctruffet.com/image/image_70/70_Ray_Saone_2.jpg","../../jctruffet.com/image/image_70/70_Ray_Saone_3.jpg","../../jctruffet.com/image/image_70/70_Ray_Saone_4.jpg","../../jctruffet.com/image/image_70/70_Ray_Saone_5.jpg","../../jctruffet.com/image/image_70/70_Ray_Saone_6.jpg","../../jctruffet.com/image/image_70/70_Ray_Saone_7.jpg","../../jctruffet.com/image/image_70/70_Ray_Saone_8.jpg"]},"Consult_chateau_formulaire8283-2":{"id":"Consult_chateau_formulaire8283-2","dept":"70","canton":"Pesmes","commune":"La Grande-Résie","nom":"Resie","type":"Château","periode":"XVIII","histoire":"RESIE;  l'édifice actuel a été construit au XVIIIe siècle,  mais une maison forte est attestée en 1386.   Au XIXe siècle, cette propriété de la famille de Sainte-Marie d'Agneaux est   de style néo-gothique, et qui a subit de nombreuses transformations au XIXe siècle. Une petite chapelle et une demi-rotonde furent notamment ajoutées à l'édifice principal, qui perdit par ailleurs une aile. Les communs et les bâtiments agricoles ont également été ajoutés au XIXe siècle. A cette même époque, les propriétaires du château financèrent la construction d'une école et d'une belle chapelle, qui faisait office d'église. Sous celle-ci se trouve une crypte souterraine, lieu de sépulture de plusieurs membres de la famille seigneuriale.","architecture":"Château de La Grande-Résie, un château fort se dressait autrefois dans la commune de La Grande Résie. Il est aujourd'hui disparu, mais on peut encore voir la motte féodale dans le parc de l'actuel château  non loin de l'ancienne motte féodale, mais une maison forte est attestée en 1386 ,  subit des transformations : l'aile est supprimée, les ouvertures sont refaites, et on adjoint une chapelle et une demi rotonde de part et d'autre du corps principal, de cette époque date également les communs et les parties agricoles.","habitants":"Famille de Sainte-Marie d'Agneaux \r\n        \r\n        \"","divers":"Château de Resie","gps":"","images":["../../jctruffet.com/image/image_70/70_Resie_1.jpg"]},"Consult_chateau_formulaire0d30":{"id":"Consult_chateau_formulaire0d30","dept":"70","canton":"Gray","commune":"Rigny","nom":"Rigny","type":"Château","periode":"XVII","histoire":"RIGNY, en 1286, les troupes du comte Othon IV de Bourgogne s'emparèrent du château et parmi les prisonniers, il est fait mention d'un Jean de Rigny. C'était le père du fameux Foulque de Rigny, sénéchal de Bourgogne, qui se mit, dès 1290, à reconstruire le château. Lors de la guerre de Cent Ans, le petit-fils de Foulques, Hugues Ier, pour s'être allié avec Jean de Neufchâtel, s'était vu confisquer Rigny, que Philippe VI avait donné à sa femme Jeanne. Mais, en récompense de ses services, Jean le Bon lui rendit son château en 1359. Antoine de Vergy, qui était devenu seigneur de Rigny par suite de son mariage avec Jeanne, la fille de Hugues II,  Dans la troisième ligue contre Louis XI, Guillaume de Vergy combattit aux côtés de Charles le Téméraire. Il prit part à la journée de Morat (1446), puis, après la bataille de Nancy, il fut fait prisonnier par les français en défendant la fille du duc de Bourgogne.   Louis XI, reconnaissant ses mérites, sut se l'attacher en lui donnant tous les biens des Vergy.  Le domaine de Rigny passa aux Pontailler, qui le gardèrent un siècle et le vendirent, en 1608, douze ans après, Jacques Morin, seigneur du Bocage, l'achetait à son tour au duc de Vendôme. Au chevalier du Bocage succède, en 1627, comme seigneur de Rigny, J-J de Longueval, homme d'arme de monseigneur le duc d'Orléans. En 1791, Mme de Pécaud, petite-fille de J.-B. Baulard baron de Rigny, qui résidait à Rigny dut se retirer à Fourgs près de Pontarlier, Mlle Alexandrine de Pécaud de Rigny épousa le marquis de Charles-Alexandre de Montrichard, seigneur de Viseural et de Falletans, qui possédait le château de Frontenay dans le Jura. La marquise de Montrichard vécut à Rigny jusqu'à sa mort le 2 octobre 1865, elle avait 83 ans. Une de ses filles qui avait épousé M. Dornier, hérita du château de Dornier. Sa fille Marie Dornier, qui épousa Joseph Raymond Fournier Sarlovèze en 1884, en était encore propriétaire en 1902, mais restauré en 1894.  Le château a été racheté par Jean Maupin (ancien maire de Rigny), au début des années 1960, qui la restauré et aménagé en hôtel restaurant.","architecture":"Rigny;  reconstruit sous Louis XIII en architecture du XVIIe siècle a conservé son authenticité, corps de logis rectangulaire à deux niveaux et attiques toiture en croupes et accolés de pavillons de niveaux inférieurs d'un étage  sur les flans de côtés","habitants":"Seigneur de Rigny\r\n        \"","divers":"Château de Rigny","gps":"","images":["../../jctruffet.com/image/image_70/70_Rigny_1.jpg","../../jctruffet.com/image/image_70/70_Rigny_2.jpg","../../jctruffet.com/image/image_70/70_Rigny_3.jpg","../../jctruffet.com/image/image_70/70_Rigny_4.jpg","../../jctruffet.com/image/image_70/70_Rigny_5.jpg"]},"Consult_chateau_formulaire6eee":{"id":"Consult_chateau_formulaire6eee","dept":"70","canton":"Vitrey-sur-Mance","commune":"La Rochelle","nom":"Rochelle","type":"Château","periode":"XVII-XVIII","histoire":"ROCHELLE;  le château a été bâti à partir de 1703 par l'ingénieur Aillet pour François Bavoux, seigneur de Larret, sur  les ruines d'une forteresse médiévale définitivement ruinée en 1388 par les troupes du duc de Bourgogne. L'ensemble se distribue  selon deux schémas d'organisation de l'espace,  à savoir les vestiges médiévaux   avec enceintes et fossés concentriques et les bâtiments du XVIIIe siècle organisés selon un axe ouest est de part et d'autre d'une avant cour et d'une cour d'honneur.  Au XIXe siècle, les bâtiments sont remanié. Le logis conserve,  au rez-de-chaussée, les lambris ainsi que  les cheminées du XVIIIe siècle.                         Dans la commune  villa Richelieu.","architecture":"Château, site archéologique, château, XVIIIe siècle, fossés, murs et substructures du château médiéval, y compris les vestiges archéologiques. Façades et toitures de l' ensemble des bâtiments, corps de logis, dépendances Nord et Sud sur cour d' honneur, pigeonniers, cuverie, maison du jardinier\r\nportail de la basse-cour et de la cour d' honneur et puits, pièces suivantes du logis, escalier avec rampe, grand salon, petit salon et bibliothèque du rez-de-chaussée avec lambris et cheminée.","habitants":"Famille de François Bavoux\r\n        \"","divers":"Château de la Rochelle et villa Richelieu","gps":"","images":["../../jctruffet.com/image/image_70/70_Rochelle_1.jpg","../../jctruffet.com/image/image_70/70_Rochelle_2.jpg","../../jctruffet.com/image/image_70/70_Rochelle_3.jpg","../../jctruffet.com/image/image_70/70_Rochelle_4.jpg","../../jctruffet.com/image/image_70/70_Rochelle_5.jpg","../../jctruffet.com/image/image_70/70_Rochelle_6.jpg","../../jctruffet.com/image/image_70/70_Rochelle_7.jpg"]},"Consult_chateau_formulairec9c6":{"id":"Consult_chateau_formulairec9c6","dept":"70","canton":"Scey-sur-Saône","commune":"Rupt-sur-Saône","nom":"Rupt","type":"Forteresse","periode":"XII","histoire":"RUPT,  En 1160, il appartenait à Guy de Pesmes sous la mouvance du comte de Bourgogne, siège d'une grande seigneurie féodale, fondé dès le XIIe siècle par les seigneurs de Pesmes, en 1408 Gauthier de Rupt, chevalier, sa lignée s'éteint en 1467, la seigneurie passa par héritage à la famille de Goux, puis  à la maison de Clermont en 1539, en 1619 Hardouin de Clermont fonde un couvent de minimes  qui sera détruit à la Révolution. En 1730 démantelé par les guerres de Louis XIV la seigneurie est cédés par Jean-Baptiste de Clermont au fermier général Pierre Grimod du Fort intendant des postes et relais de France, son fils en 1748 Pierre-Marie-Gaspard Grimod portera le nom de sa terre d'Orsay près de Chevreuse se marie avec la princesse de Hohenlohe-Waldenbourg   et vivront en Allemagne. Un de ses descendants  Albert-Gaspard Grimod d'Orsay , général des armées de la République et de l'Empire, né à Paris en 1772, se fait construire une gentilhommière ou il y décédera en 1843. Son père était le mécène Pierre-Gaspard-Marie Grimod d'Orsay, ses deux enfants hériterons , le comte d'Orsay et la duchesse de Grammont, le domaine sera vendu aux de Buyer, passera ensuite aux Nappez.","architecture":"Rupt sur Saône, on remarque tout de suite limposant donjon du vieux château datant du XIIe siècle. Forteresse médiévale  son impressionnant donjon veille toujours sur la vallée de la Saône. Au  XVe siècle un corps  d'habitation a été aménagé dans un rempart accolé à la tour de guet et une gentilhommière complète l'ensemble du petit château seigneurial érigée en 1820 sur les ruines du château incendié en 1792.  De cet incendie il restera la tour ronde  dite donjon de 30 mètres de haut et de 11 mètres de diamètre mur épais de 3 mètres à la base et un bâtiment du XVIe siècle. L'enceinte abrite encore des constructions de  diverses époques, et des communs bâties au XIXe siècle.","habitants":"Famille de Gauthier de Rupt\r\n        \"","divers":"Forteresse de Rupt-sur-Saône avec son donjon","gps":"","images":["../../jctruffet.com/image/image_70/70_Rupt_1.jpg","../../jctruffet.com/image/image_70/70_Rupt_2.jpg","../../jctruffet.com/image/image_70/70_Rupt_3.jpg","../../jctruffet.com/image/image_70/70_Rupt_4.jpg","../../jctruffet.com/image/image_70/70_Rupt_5.jpg","../../jctruffet.com/image/image_70/70_Rupt_6.jpg","../../jctruffet.com/image/image_70/70_Rupt_7.jpg"]},"Consult_chateau_formulaire944c":{"id":"Consult_chateau_formulaire944c","dept":"70","canton":"Saulx-lès-Vesoul","commune":"Saulx-lès-Vesoul","nom":"Saulx","type":"Maison forte","periode":"XVIII","histoire":"SAULX;  le château de Saulx est inscrit aux Monuments Historiques. C'est une maison forte édifiée au XVIIIe siècle.\r\nA ses côtés se trouve la maison Michel, qui appartenait au docteur Michel Jean, dit Eugène. Celui-ci a fait dont de sa demeure, afin que celle-ci soit transformée en maison de retraite. Professeur de médecine opératoire, maire, conseiller général, né à Saulx le 28 octobre 1819 mort à Saulx le 30 avril 1883. Claude-Étienne ROBERT : Médecin en chef des Hôpitaux de Vesoul, maire de Saulx, mort à Saulx en 1848, en son château.","architecture":"Château reconstruit au XVIIIe siècle,  selon la configuration quon lui connait aujourdhui, la propriété a été restaurée au début du XIXe siècle suite aux saccages et destructions quelle a subit à la Révolution. Son décor intérieur, pour sa majeure partie date de cette époque, il possède toujours son corps de logis, son décor intérieur dépoque, son pressoir, sa belle grille de fer forgé et son pigeonnier.","habitants":"Famille de Michel Jean\r\n        \"","divers":"Maison-forte de Saulx et maison d'Eugène","gps":"","images":["../../jctruffet.com/image/image_70/70_Saulx_1.jpg","../../jctruffet.com/image/image_70/70_Saulx_2.jpg","../../jctruffet.com/image/image_70/70_Saulx_3.jpg"]},"Consult_chateau_formulaire20d8":{"id":"Consult_chateau_formulaire20d8","dept":"70","canton":"Dampierre-sur-Salon","commune":"Savoyeux","nom":"Savoyeux_Seveux","type":"Château","periode":"XVII","histoire":"SAVOYEUX, le patrimoine actuel de Savoyeux se compose d'un château, à l'entrée du village. On peut cependant admirer au passage sa porte \"à la flamande\" de 1750. La grille, dans sa partie haute, était ornée avant la Révolution des armoiries de Joseph de Mallarmey comte de Roussillon-Savoyeux. Dans la chapelle de droite, la pierre dressée de Claude de Fouchier \"l'aîné\" seigneur de Savoyeux décédé en 1541 après avoir servi Charles Quint. En 1994, des sondages ont permis de découvrir des fresques murales peintes probablement à la fin du XVIe siècle et des autels dont la peinture masquait depuis deux siècles un stuc multicolore d'une rare qualité artistique.                                                                  A l'ouest de Dampierre,  il reste de l'ancien château médiéval de MONTOT une porte cochère fortifiée ainsi que le donjon qui est aujourd'hui inclus dans des bâtiments de ferme.                       Plus au nord à Vaite,  le château de la HUSARDIERE du XVIIe siècle,  lauthenticité des lieux des XVIIe et XVIIIe siècles vous séduira.  Ancienne demeure dOthon de Vaite, ici le Duc dAumale à ses retours de chasse y séjournait, transformé en hôtel.    Sur l'autre rive de la Saône le château de SEVEUX,  au XVIIIe siècle, sert d'habitation aux maîtres des forges.","architecture":"Savoyeux;  en forme de U à trois niveaux, une tourelle plein cintre à toit à quatre pans.                                                              \r\n Seveux;  au début du XVIIIe siècle, le corps de logis est alors reconstruit ainsi que plusieurs bâtiments, dont des hébergements au nord qui sont remplacés par une grande   bergerie à la fin du XIXe siècle. Une plateforme surélevée conserve les restes de l'ancien château, une tour  carrée, le corps de logis du XVIIIe siècle  à l'est, de plan rectangulaire, transformé aux XIXe et XXe siècles , la  bergerie ; le pavillon d'entrée dit \"le Chalet\", construit au XIXe siècle.","habitants":"Famille de Claude de Fouchier \r\n        \r\n        \r\n        \"","divers":"Château de Savoyeux , de la Hussardière  de Seveux et de Montot","gps":"","images":["../../jctruffet.com/image/image_70/70_Savoyeux_Seveux_1.jpg","../../jctruffet.com/image/image_70/70_Savoyeux_Seveux_2.jpg","../../jctruffet.com/image/image_70/70_Savoyeux_Seveux_3.jpg","../../jctruffet.com/image/image_70/70_Savoyeux_Seveux_4.jpg","../../jctruffet.com/image/image_70/70_Savoyeux_Seveux_5.jpg","../../jctruffet.com/image/image_70/70_Savoyeux_Seveux_6.jpg","../../jctruffet.com/image/image_70/70_Savoyeux_Seveux_7.jpg","../../jctruffet.com/image/image_70/70_Savoyeux_Seveux_8.jpg","../../jctruffet.com/image/image_70/70_Savoyeux_Seveux_9.jpg"]},"Consult_chateau_formulaire8898-2":{"id":"Consult_chateau_formulaire8898-2","dept":"70","canton":"Scey-sur-Saône","commune":"Scey-sur-Saône","nom":"Scey","type":"Château","periode":"XVI","histoire":"SCEY; château du XVIe siècle reconstruit à partir de 1697, mais détruit par un incendie pendant la Révolution, il n'en subsiste rien, les Bauffremont illustre famille princière.  Huard de Bauffremont, né en 1330 et décédé en 1380, seigneur de Scey et Ligneville, fils de Vautier, baron de Bauffremont (1278-1335) et de Marguerite de Choiseul. Il épousa Anne de Ville, décédée après 1360 puis après, Marie de Saint Loup. Il eut pour enfants Érard, Pierre chevalier de Rhodes, grand prieur de France, Liébaud marié avec Jeanne de Neufchatel, décédé en 1383, Vautier marié avec Jeanne de Berwart, seigneur de Ville et Fontoy, Agnès mariée avec Robert Morlet, Henri qui suit, Philibert né après 1361 et décédé en 1397 et Anne , mariée avec Hugues Le Borgne de Saulx.  la propriété est restée  dans cette famille jusqu'en 1971 Charles-Emmanuel de Bauffremont-Courtenay, fils du précédent, né le 2 février 1946, prince de Bauffremont et du Saint-Empire. Chevalier d'Honneur et dévotion de l'ordre souverain militaire hospitalier de Saint-Jean de Jérusalem, de Rhodes et de Malte. Il épousa en 1971 Blanche de Chabannes, fille de Michel de Chabannes et de Marie-Anne d'Harcourt.","architecture":"Au   XIXe siècle, un nouveau logis est construit par les Bauffrémont en 1837, mais il sera détruit après 1918. Seules subsistent les écuries et les annexes : temple à l'antique attribué à Luc Breton, lavoir, pavillons et grilles et leurs dépendances à l'ouest et la fontaine, l'abreuvoir et les balustrade  dans la cour; le pavillon de la buanderie; le pavillon d'entrée ; la fabrique ou temple à l'antique; les grilles d'entrée à l'ouest; les grilles subsistant dans le village à l'entrée de l'allée dite \"allée noire\", à proximité de la mairie  Bauffremont était autrefois défendu par un château entouré de fossés profonds et flanqué de tours dont les murs avaient quatre à cinq mètres d'épaisseur. La demeure féodale, située entre Neufchâteau et Domrémy-la-Pucelle d'une part, Contrexéville et Vittel d'autre part, avait été élevée en un lieu stratégique, sur une imposante colline dominant l'immense panorama du pays entre Meuse et Moselle. Les écuries  de Scey Il n'en reste aujourd'hui malheureusement plus rien.","habitants":"Famille Bauffremont\r\n        \"","divers":"Château de Scey, mairie  et musée","gps":"","images":["../../jctruffet.com/image/image_70/70_Scey_1.jpg","../../jctruffet.com/image/image_70/70_Scey_2.jpg","../../jctruffet.com/image/image_70/70_Scey_3.jpg","../../jctruffet.com/image/image_70/70_Scey_4.jpg"]},"Consult_chateau_formulaire154b":{"id":"Consult_chateau_formulaire154b","dept":"70","canton":"Rioz","commune":"Sorans-les-Breurey","nom":"Sorans","type":"Maison forte","periode":"XVI","histoire":"SORANS, on peut faire remonter au XVe siècle, et même avant, puisque « Renaud de Traves, dit de Sorans en constitue le premier indice historique et que cest probablement sous Gérard, cité en 1231 et 1249, que les éléments (en bois) de la maison, apparaissent.   Un château fut construit  par Antoine-François de Rosières-Sorans, à sa mort en 1749, le château passa à son frère Jacques-Antoine puis au fils de ce dernier, Henri-François qui épousa Louise-Elisabeth de Mailley-Carmand, elle fut aussi  celle de la charmante comtesse Stanilas de Clermont-Tonerre et du dernier marquis de Sorans.  Henri-François comte de Clermont-Tonnerre décèda en 1792.  Delphine de Sorans   épousa en seconde noce, le marquis de Talaru, ambassadeur en Espagne.  celui-ci légua le château à sa fille la marquise de Perthuis dont le fils mourut en 1928. Appartient aujourd'hui à monsieur Georges Tournois qui exploite le domaine agricole,  et Jean-claude Voisin et Eric Affolter font un immense travail de remise en état et d'animations.                                                                                 Un autre château classique dans la commune de Sorans.","architecture":"Sorans la maison-forte possède un imposant donjon du XIIe-XIIIe siècle , la maison forte de  plan rectangulaire par les dépendances composée de deux niveaux de deux salles voûtées, dune classe nobiliaire au niveau de vie modeste, la pérennité de ce bâtiment aux épaisses murailles préoccupe ses possesseurs actuels.","habitants":"Famille de Antoine-François de Rosières-Sorans.\r\n        \r\n        \"","divers":"Maison-forte de Sorans et château du XIXe siècle.","gps":"","images":["../../jctruffet.com/image/image_70/70_Sorans_1.jpg","../../jctruffet.com/image/image_70/70_Sorans_2.jpg","../../jctruffet.com/image/image_70/70_Sorans_3.jpg","../../jctruffet.com/image/image_70/70_Sorans_4.jpg","../../jctruffet.com/image/image_70/70_Sorans_5.jpg","../../jctruffet.com/image/image_70/70_Sorans_6.jpg","../../jctruffet.com/image/image_70/70_Sorans_7.jpg","../../jctruffet.com/image/image_70/70_Sorans_8.jpg"]},"Consult_chateau_formulaire2533-2":{"id":"Consult_chateau_formulaire2533-2","dept":"70","canton":"Gy","commune":"St-Loup-Nantouard","nom":"St_Loup","type":"Château","periode":"XVIII","histoire":"SAINT-LOUP-Nantouard possède un superbe château du XVIII-XIXe siècle appartenant à la famille de Menthon. \r\n La première forteresse fut construite en 1292 par Eudes de Fouvent pour protéger le gué de la rivière Morthe. Les guerres qui ravagèrent tant de fois la Franche-Comté le détruisirent à maintes reprises, mais il fut toujours reconstruit et toujours habité. Il a été remanié entre le XVIIe et XIXe siècle. Les principaux travaux sont dus au baron de Klinglin et à la famille de Menthon, propriétaire depuis 1832. Cette famille, dont les origines savoyardes remontent au Xe siècle a toujours été associée à l'histoire de la Franche-Comté. \r\n VILLEFRANCON, Maison forte attestée dès le XIIIe siècle, fief des Saint-Seine, du duché de Bourgogne. Cet édifice fut certainement brûlé en 1636 par les Suédois de Saxe Weimar. Le château actuel fut bâti sur ces ruines en 1713-1714 par l'architecte Claude Antoine Aillet. Puis à la famille de Villefrançon, dans  cette famille l'archevêque de Besançon (1823-1828).","architecture":"Le château de Saint-Loup est un élégant domaine construit au XVIIIe siècle à l'emplacement du château-fort médiéval. Plusieurs vestiges de celui-ci sont encore visibles, dont les douves, deux tours carrées, et une partie du mur d'enceinte. Une chapelle néo-gothique médiévale, qui a été remanié dans un style baroque, accolée au château fut ajoutée en 1867. Un vaste parc ouvert à la visite entoure le château de Saint-Loup-Nantouard.\r\nChâteau de Villefrancon   Maison forte  était implantée sur une terrasse sans doute circulaire, ceinte de  trois fossés concentriques en eau. Au cours du XVIIIe siècle des dépendances agricoles furent ajoutées, ainsi que des ponts et des portails. L'ensemble actuel,  entouré d'une des douves conservées,  se compose d'un logis rectangulaire sur une terrasse,  de quatre bâtiments principaux de dépendances agricoles et de diverses annexes. L'absence de décor en façade  est représentative des constructions civiles du début du XVIIIe siècle dans la région.","habitants":"Famille de Menthon.\r\n        \"","divers":"Château de St-Loup et de Villefrancon","gps":"","images":["../../jctruffet.com/image/image_70/70_St_Loup_1.jpg","../../jctruffet.com/image/image_70/70_St_Loup_2.jpg","../../jctruffet.com/image/image_70/70_St_Loup_3.jpg","../../jctruffet.com/image/image_70/70_St_Loup_4.jpg","../../jctruffet.com/image/image_70/70_St_Loup_5.jpg","../../jctruffet.com/image/image_70/70_St_Loup_6.jpg","../../jctruffet.com/image/image_70/70_St_Loup_7.jpg"]},"Consult_chateau_formulaire1c6d":{"id":"Consult_chateau_formulaire1c6d","dept":"70","canton":"Amance","commune":"St-Rémy","nom":"St_Remy","type":"Château","periode":"XVIII","histoire":"St-REMY, dès le XIIe siècle, il existait à Saint-Rémy un puissant château fort de la famille d'Achey qui donna la branche des seigneurs de Saint-Rémy vassaux des sires de Faucogney, cette seigneurie passe en 1360 aux  Pontailler, aux Rupt et au Rye et en 1490 à Jean de la ville qui avait épousé Anne d'Igny nièce de Jaquette de Rupt Jean fonde en 1504 la chapelle seigneuriale et son fils André obtient l'érection de la terre en baronnie. Jean le fils d'André épousa la célèbre Nicole de Savigny. André meurt en 1580 au combat des guerres de religion, ses biens reviennent à sa cousine épouse de Jacques de Luz  qui les transmet a sa petite-fille Marguerite  alliée à Antoine de Salives, la fille fait entrer  St-Rémy dans la famille de Vaudrey, la comtesse Jeanne-Octavie de Vaudrey, épouse le marquis Armand  de Rosen en 1731, devenu marquise entreprend de faire construire un nouveau château en 1760.  Suite au décès  d'Eugène brigadier du roi en 1779  fils de Jeanne-Octavie le domaine passe à  la fille de ce dernier Sophie-Rose qui transmet par alliance à Louis-Victor prince de Broglie qui mourut à l'échafaud en 1794, elle se remarie au marquis de Voyer d'Argenson. Le dernier des Rosen après la tourmente à récupérer ses biens et les cède en 1822 à l'abbé Bardenet missionnaire diocésain  de Besançon qui le revend l'année suivante aux  P. Cheminade fondateur de la congrégation des marianistes abritera un établissement d'enseignement. En 1901 suite à la loi des associations ferme l'établissement qui sera racheté par un industriel en 1908  qui le laissera à l'abandon et  en 1937, Justin Perchot, ancien sénateur, rachète le  château et y fait installer un hôpital psychiatrique.","architecture":"Le château de St-Rémy fut édifié au XVIIIe siècle a proximité de l'ancienne forteresse en utilisant les pierres pour le nouvel édifice,  se compose d'un corps principal très allongé a deux niveaux et attiques  flanqué de deux ailes en retour d'équerre terminant par des  pavillons déterminant la cour d'honneur, au centre de la façade principale un avant-corps en arc-de -cercle percé de portes-fenêtres cintrées, escaliers en fer à cheval avec des rampes en fer forgé.  Le parc qui entoure la demeure, offre une belle vue sur la campagne environnante. Le château a en effet subi un grand nombre de transformations depuis sa construction.","habitants":"Marquis Armand  de Rosen\r\n        \"","divers":"Château de Saint-Rémy","gps":"","images":["../../jctruffet.com/image/image_70/70_St_Remy_1.jpg","../../jctruffet.com/image/image_70/70_St_Remy_2.jpg","../../jctruffet.com/image/image_70/70_St_Remy_3.jpg"]},"Consult_chateau_formulaire52ba":{"id":"Consult_chateau_formulaire52ba","dept":"70","canton":"Pesmes","commune":"Valay","nom":"Valay","type":"Maison forte","periode":"XVIII","histoire":"VALAY, dès 1145  les sires de Beaujeu et de Pesmes ont donné des biens situés au finage de Valay, à l'abbaye de  Corneux dès sa fondation. Le château qui appartenait aux moines de Corneux, fut cédé à la reine Jeanne de  Bourgogne, pendant un de ses séjours à Gray en décembre 1324.  Château construit au XVIIIe siècle pour la famille de Pétremand  qui avait repris  la seigneurie. Désiré-Adrien Pétremand, né au château de Valay le 9 octobre 1758 et décédé le 15 mai 1849. Bienfaiteur de la commune.\r\nMadame de Valay, née de Salignac de Lamothe Fénelon, le 14 avril 1767 à la Martinique. Elle est une arrière-petite-nièce de Fénelon, qui fut précepteur du duc de Bourgogne et archevêque de Cambrai. Elle épousa M. Pétremand de Valay en 1798. Elle est décédée en 1847 à Besançon. Lorsqu'il est acquis par les frères Menans en 1854,  Deux décrets de 1854 et 1857 autorisent Joseph, Simon et Jean Menans, associés à Charles Bouveret, à établir deux hauts fourneaux dans leur propriété, à l'emplacement présumé du château.                                                                                              La demeure seigneuriale des Petremand de Valay, du XVIIIe siècle, abrite les écoles et l'hôtel de ville.","architecture":"Le château fort dit le Vieux Château, puis haut fourneau du Petit-Valay  le \"Vieux Château\"  château construit au XVIIIe siècle se compose de bâtiments ordonnés autour d'une cour rectangulaire, délimité aux angles par trois tours rondes, dont l'une est à demi arasée.","habitants":"Famille de Pétremand \r\n        \"","divers":"Maison-forte dit vieux château de Valay","gps":"","images":["../../jctruffet.com/image/image_70/70_Valay_1.jpg"]},"Consult_chateau_formulaireb662":{"id":"Consult_chateau_formulaireb662","dept":"70","canton":"Villersexel","commune":"Vallerois-le-Bois","nom":"Vallerois","type":"Forteresse","periode":"XV","histoire":"VALLEROIS, au XIIe siècle à la famille Cicon, apparentée à la puissante famille de La Roche, à la famille de Ponce II au XIIe siècle,  La famille de Faucogney-Villersexel est titulaire de la seigneurie au début du XIVe siècle,   mais cest Etienne de Montrost qui au début du XVe siècle fortifie la propriété, en 1516 Philibert de Monstrost meurt sans postérité laissera son château à son neveu Florent Morel de Vaudrey. Son aspect actuel est à attribuer à la famille des Vaudrey qui au XVIe siècle donne au château son aspect Renaissance. \r\n Au fils des ans, la forteresse a subi bien des vicissitudes comme lattaque des troupes de Henri IV vers 1595, la guerre de 30 ans. Claude-Louis de Vaudrey n'ayant pas de fils, sa fille Marie-Claude fait passer la seigneurie dans la famille de Salives par son mariage en 1698 avec Claude-Joseph de Salives, seigneur de Genevrey. À la Révolution, Philippe-Emmanuel de Salives émigre en Suisse, le château est vendu comme bien national en 1794 et sert d'exploitation agricole. Il se dégrade néanmoins très vite.\r\nPierre Jouffroy cherche à le restaurer: il obtient le classement comme monument historique en 1964, réunit les diverses parcelles et répare les toits et murs de 1965 à 1973. Après une nouvelle période d'abandon, le château est acheté en 1990 par un médecin de Dijon Jean Paul Borsotti qui le restaure, en collaboration avec une association locale et avec l'aide des instances officielles.","architecture":"Le château de Vallerois-le-Bois était une forteresse  médiévale du XIIe siècle sur une éminence dominant le village du même nom. Il était autrefois protégé de douves sèches, de remparts et de hautes tours dont il reste encore les bases et des parties bien restaurées. \r\nSon lourd donjon carré  du XIIe siècle de 12 mètres de côté et 25 mètres de hauteur ceint de mâchicoulis émerge à peine des larges toits pentus du corps de logis.  On peut encore y voir une poterne et des vestiges d'enceinte, ainsi qu'un beau logis Renaissance. on y pénètre dans la cour pavée par une porterie fortifiée, précédée d'un pont-levis, ornée de pilastres et percée de meurtrières, une tourelle d'escalier  octogonale conduisant à une porte décorée de moulures torsadées se détache au centre.  La façade du logis et la tourelle descalier sont typiques du XVIe siècle franc-comtois avec de belles fenêtres à meneaux et des portes ornées darcatures sculptées.. Une partie de ce  château a été détruite, mais les ruines sont toujours visibles, Il se dégrade néanmoins très vite : le toit du corps de logis s'effondre en 1920, celui du donjon en 1933, pierres et cheminées sont volées. la Révolution qui a entraîné lincendie du quartier Vaudrey, les conséquences de la guerre de 1945, le château devenant lieu de ressources en matériaux.","habitants":"Famille Etienne de Montrost \r\n        \"","divers":"Forteresse de Vallerois le Bois","gps":"","images":["../../jctruffet.com/image/image_70/70_Vallerois_1.jpg","../../jctruffet.com/image/image_70/70_Vallerois_2.jpg","../../jctruffet.com/image/im
