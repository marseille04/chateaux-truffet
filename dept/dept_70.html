const FULL={"Consult_chateau_formulaire9e01":{"id":"Consult_chateau_formulaire9e01","dept":"70","canton":"Amance","commune":"Amance","nom":"Amance","type":"Patrimoine","periode":"XV","histoire":"AMANCE, fief de Claude Doyen demeurant à Amance  en 1572;  Laurent Doyen, capitaine-châtelain,  receveur pour le Roi, épouse en 1595 Laborey Françoise qui lui donna  trois fils; dont Jean Guillaume Doyen fermier des rentes seigneuriales en 1619, capitaine châtelain  en 1628.                                                       A quelques kilomètres au sud-Est à Breurey-les-Faverney le château de la PRESLE construit au XIXe siècle de style louis XIII a été transformé en chambres d'hôtes.                                  Contreglisse;  le château, qui est en fait une grande bâtisse, fut attaqué par des habitants du village.","architecture":"Amance, du château féodal il reste qu'une tour ronde.                               Presle, château du XVIe siècle de style louis XIII, corps de logis rectangulaire à deux niveaux et attiques flanqués en façade d'un avant corps en saillit.                                                                            Contreglisse; grande bâtisse, corps de logis rectangulaire à trois niveaux.","habitants":"Claude Doyen\r\n        \"","divers":"Amance tour féodal, patrimoine en ville, le château de Presle et de Contreglisse.","gps":"","images":["../../jctruffet.com/image/image_70/70_Amance_1.jpg","../../jctruffet.com/image/image_70/70_Amance_2.jpg","../../jctruffet.com/image/image_70/70_Amance_3.jpg","../../jctruffet.com/image/image_70/70_Amance_4.jpg","../../jctruffet.com/image/image_70/70_Amance_5.jpg","../../jctruffet.com/image/image_70/70_Amance_6.jpg","../../jctruffet.com/image/image_70/70_Amance_7.jpg"]},"Consult_chateau_formulairee0e0":{"id":"Consult_chateau_formulairee0e0","dept":"70","canton":"Vesoul","commune":"Andelarre-Scey-sur-Saône","nom":"Andelarre_Raze","type":"Château","periode":"XIX","histoire":"ANDELARRE, sous l'ancien régime, l'histoire d'Andelarre est dominée par celle de la famille Jaquot. C'est le marquis Jules d'Andelarre, fils du marquis Antoine-François-Eléonore-Angélique de Jaquot-Rouhier, qui fit construire le château en 1840, il est habité et entretenu par les propriétaires, M. et Mme De Valicourt. Le marquis Jules d'Andelarre, passionné d'agriculture  il entreprit en 1836 la construction d'une ferme modèle avec 200 hectares de terres, fut conseiller général de 1839 à 1871, maire d'Andelarre pendant 54 ans, et député de la Haute-Saône de 1852 à 1876.              A quelques kilomètres à l'ouest le château des ROUX à Raze,  en 1750. Un Antoine Roux seigneur de Raze, son fils Jean-François seigneur également avocat au parlement de Besançon mourut assez jeune laissant sa veuve Claude-Marguerite Choupot avec ses trois enfants, l'aîné Claude François roux également avocat au parlement de Besançon devient lieutenant général du bailliage d'Amont en 1789, il était élu député aux États Généraux par le Tiers-Etats.  La propriété passa à la famille Bressan, à monsieur Rochet, à monsieur Bouvier baron et à sa mort à monsieur Sechaye, puis au peintre Dagan-Bouveret, à monsieur Gérard qui le vendit à la famille Defrance.  Un peu plus à l'est en remontant sur Vesoul le village de Mont-le Vernois tour,  vestiges de l'ancien château et le nouveau château.","architecture":"Andelarre, château du XIXe siècle corps de logis rectangulaire à trois niveaux toiture en croupes peu élevée.                                       Roux à Raze, de nombreux bâtiments et monuments anciens sont visibles. Parmi eux, quelques belles maisons des XVIe et XVIIe siècles et le château et son colombier lequel abrite aujourd'hui la bibliothèque municipale  édifiés au XVIIIe siècle, un vieil abreuvoir de pierre et des lavoirs et fontaines du début du XVIIIe siècle.","habitants":"M. et Mme De Valicourt\r\n        \"","divers":"château d'Adelarre, de Raze, de roux et de mont le Vernois.","gps":"","images":["../../jctruffet.com/image/image_70/70_Andelarre_Raze_1.jpg","../../jctruffet.com/image/image_70/70_Andelarre_Raze_2.jpg","../../jctruffet.com/image/image_70/70_Andelarre_Raze_3.jpg","../../jctruffet.com/image/image_70/70_Andelarre_Raze_4.jpg","../../jctruffet.com/image/image_70/70_Andelarre_Raze_5.jpg","../../jctruffet.com/image/image_70/70_Andelarre_Raze_6.jpg"]},"Consult_chateau_formulaire2887":{"id":"Consult_chateau_formulaire2887","dept":"70","canton":"Fresne-St-Mamès","commune":"Beaujeu","nom":"Beaujeu_Quitteur","type":"Château","periode":"XII-XIX","histoire":"BEAUJEU, l'origine de Beaujeu-Saint-Vallier-Pierrejux et Quitteur remonte bien avant l'époque gauloise. Plusieurs sépultures de l'âge du bronze ont en effet été retrouvées dans les communes, ainsi que les vestiges d'un camp fortifié.\r\nPendant le Moyen-Age, le village de Beaujeu appartenait à deux familles portant le nom de Beaujeu. Celles-ci avaient fait construire trois châteaux dans la commune.\r\nLe plus ancien édifice est un donjon roman, construit au XIIe siècle. C'est le dernier vestige des châteaux des sires de Beaujeu.                                  Un château construit par le duc de Bassano au début du XIXe siècle est par ailleurs entouré de belles dépendances, dont une orangerie.  Le rez-de-chaussée est quant à lui occupé par un lavoir alimenté par une fontaine en forme de gargouille. Une niche ornée de statuettes abrite le puisoir.  La mairie-lavoir est quant à elle l'édifice le plus connu, construite en 1828, elle s'inspire des casinos italiens. La mairie occupe le premier étage, auquel on accède par des escaliers monumentaux.                                     Sur l'autre rive de la Saône le château MARIOTTE  à Veveux utilisé pour centre éducatif et scolaire  et de AUTET transformé en chambres d'hôtes château datant du XVIIIe siècle et possédant un portail monumental.","architecture":"Le patrimoine architectural de Beaujeu Saint-Vallier Pierrejux et Quitteur est extrêmement riche, en premier le donjon carré du XIIe siècle, à proximité un petit manoir dit château de la tour.              \r\n Le château de Beaujeu corps de logis à deux niveaux avec fronton triangulaire flanqué d'ailes en retour d'équerre formant un U deux tours rondes sur angles  toitures en poivrières. les dépendances du château  deux bâtiments allongés avec deux pavillons à l'entrée et une tour sur la droite accolé au bâtiment.                               Château d'Autet corps de logis rectangulaire, fronton triangulaire sur  la façade  avec deux pavillons saillants sur les angles, portail d'entrée monumental à fronton.                                               Château de Mariotte en forme de L avec donjon et tourelle sur l'arrière, le corps de logis   rectangulaire à deux niveaux et attiques en façade un avant corps saillant à trois niveaux  l'ensemble est flanqué d'échauguettes carrées toitures à quatre pans très pointus.","habitants":"Famille de Beaujeu\r\n        \"","divers":"Château de Beaujeu et donjon du XIIe siècle, le château d'Autet et de Mariotte.","gps":"","images":["../../jctruffet.com/image/image_70/70_Beaujeu_Quitteur_1.jpg","../../jctruffet.com/image/image_70/70_Beaujeu_Quitteur_2.jpg","../../jctruffet.com/image/image_70/70_Beaujeu_Quitteur_3.jpg","../../jctruffet.com/image/image_70/70_Beaujeu_Quitteur_4.jpg","../../jctruffet.com/image/image_70/70_Beaujeu_Quitteur_5.jpg","../../jctruffet.com/image/image_70/70_Beaujeu_Quitteur_6.jpg","../../jctruffet.com/image/image_70/70_Beaujeu_Quitteur_7.jpg","../../jctruffet.com/image/image_70/70_Beaujeu_Quitteur_8.jpg","../../jctruffet.com/image/image_70/70_Beaujeu_Quitteur_9.jpg"]},"Consult_chateau_formulaire1436":{"id":"Consult_chateau_formulaire1436","dept":"70","canton":"Rioz","commune":"Cirey-les-Bellevaux","nom":"Bellevaux","type":"Château","periode":"XVIIIe","histoire":"BELLEVAUX; en 1120, cité par les seigneurs de la Roche, douze religieux de Morimond appelés , en Lorraine, sous la direction du vénérable Pons, arrivèrent à Cirey et y fondèrent le premier monastère cistercien du comté de Bourgogne. Ils  choisirent pour ce faire un lieu désert, sur des terres données par Etienne de Traves, Bernard de Pons et Ebrard de Cirey, seigneurs  de ces lieux  si plaisant que l'archevêque Humbert, en 1135, lui donna le nom de \"Bella Vallis\", Bellevaux. \r\nEn 1795, les bâtiments  de l'ancienne abbaye furent vendus comme biens nationaux, et l'acquéreur les céda au   général Pichegru. Celui-ci habita le quartier abbatial pendant une année, puis  fit démolir  une partie du cloître et raser l'abbatiale dédicacée en 1143 et transformée au cours des siècles. Pichegru parti mais sa famille demeura à Bellevaux  puisqu'en 1807, y décédait  Etiennette Pichegru. Ses derniers propriétaires, la famille de Ganay, qui  l'acquirent en 1839, l'entretinrent pendant plus d'un siècle. En 1957 le domaine fut vendu au Curs Vaillants de  Vesoul qui en fit un centre de colonies de vacances.  propriétaire la famille Ackermann.","architecture":"Bellevaux, ancien logis abbatial, bâtiment au ligne très pure fut reconstruit en 1781, corps de logis rectangulaire à deux niveaux, toitures en croupes, bâtiment de dépendances dans le même style.","habitants":"Général Pichegru\r\n        \"","divers":"Ancienne abbaye de Bellevaux devenue château.","gps":"","images":["../../jctruffet.com/image/image_70/70_Bellevaux_1.jpg","../../jctruffet.com/image/image_70/70_Bellevaux_2.jpg","../../jctruffet.com/image/image_70/70_Bellevaux_3.jpg","../../jctruffet.com/image/image_70/70_Bellevaux_4.jpg","../../jctruffet.com/image/image_70/70_Bellevaux_5.jpg"]},"Consult_chateau_formulaire9040":{"id":"Consult_chateau_formulaire9040","dept":"70","canton":"Noroy-le-Bourg","commune":"Borey","nom":"Borey","type":"Château","periode":"XVII","histoire":"BOREY; Richard de Borrey, chevalier, et Ponce de Borrey,  Humbert de Borrey, en 1238.  Haymé de Borrey,en 1264. Luquet de Borrey, écuyer, vivant vers l'an 1320, qui a eu pour fils Gauthier, écuyer, et Gérard de Borrey, damoiseau, eut pour filles Parise de Borrey, épouse de N. de Montjustin, Clémence de Borrey, épouse de Gérard d'Arpenans. Perrenat de Borrey,  en 1329. Jean  de Borrey, damoiseau cité en 1347, fils de Gauthier et de Jeanne de Mirebel, Il y apparaît aux côtés de Girars et Gui de Borrey, Guyot de Borrey, qui eut pour fille Etevenatte de Borrey, veuve de Jean d'Augicour en 1359. Gaucher de Borrey, écuyer  en 1361. Jean II de Borrey, damoiseau, cité en 1404, puis écuyer, époux de Jeannette fille de Jean de Veneres et de Perrenette de la Chapelle. \r\nCette branche s'éteint au XVe siècle avec la fille unique de Jean II , Alix,  en 1420 Charles-Aimé Tranchant, né le 24 décembre 1671 au château de Borey, fils d'Antoine-Alexis Tranchant et de Marie-Thérèse Dole de la Verne, il devient capitaine dans l'armée de l'Empereur Léopold Ier du Saint-Empire,  époux de Marie-Louise de Lartigue, gouverneur des villes et château de Clerval (Doubs) de 1708 à 1713, il était chevalier de l'ordre de Saint-Lazare. Tranchant de la Verne Léger Marie-Philippe,né le 24 octobre 1767 au château de Borey, fils de Charles-François-Gabriel Tranchant comte de la Verne et de Thérèse-Françoise-Eulalie de Masson d'Autume. Dans cette famille jusqu'en 1789 Charles François Gabriel Tranchant de la Verne cède le 4 juillet 1789 la seigneurie de Borey à Philippe Emmanuel comte de Salives, Marchand Albert-Paul fusillé au 26e régiment de ligne lors de la conquête de l'Algérie, est l'un des cinq survivants du combat livré par le sergent Blandan en 1842 à Boufarik. Il a été fait chevalier de l'ordre de la légion d'honneur.  Le château a été occupé par les seigneurs de Borey jusqu'à la Révolution, où il a été vendu comme bien national au citoyen Goulut.","architecture":"Borey fut reconstruit en 1684 selon les règles du classicisme, l' ancien château féodal, fait suite à une maison forte qui était ceinturée d'une douve. Il comporte un corps de logis flanqué de deux tours d'angle carrée et ronde. À l'équerre et à l'arrière de ce bâtiment, une seconde aile a été transformée en exploitation agricole. Sur le devant, les anciennes écuries et granges ceinturent la cour.","habitants":"Famille de Perrenat de Borrey\r\n        \"","divers":"Château ancien de Borey","gps":"","images":["../../jctruffet.com/image/image_70/70_Borey_1.jpg","../../jctruffet.com/image/image_70/70_Borey_2.jpg","../../jctruffet.com/image/image_70/70_Borey_3.jpg","../../jctruffet.com/image/image_70/70_Borey_4.jpg","../../jctruffet.com/image/image_70/70_Borey_5.jpg"]},"Consult_chateau_formulaire1d34":{"id":"Consult_chateau_formulaire1d34","dept":"70","canton":"Jussey","commune":"Bougey","nom":"Bougey","type":"Forteresse","periode":"XVI-XVIII","histoire":"BOUGEY, les premières traces de la seigneurie de Bougey datent de 1127. Le château fort  est attesté dès le XIVe siècle. On cite le château  en 1310, propriété dEtienne de Bougey. Périodiquement, ce château changera de propriétaires. La tour carrée daterait du XVe siècle, avec sa porte charretière doublée d'un  passage piétonnier.  Au cours du XVIIe siècle il est remanié par une cour d'honneur et une nouvelle entrée est créée à l'avant de la cour carrée.  Actuellement il  appartient  à M. Jean Guyot de Saint-Michel, qui le restaure par lintermédiaire de \"lAssociation de Sauvegarde du  château de Bougey.","architecture":"Le château de Bougey étonne par son architecture originale qui combine plusieurs styles très différents . \r\nFondé au début du XIVe siècle, le château a subit de nombreuses transformations au cours des siècles, dont les plus importantes datent du XVIe et XVIIe siècles lorsque les invasions successives mettent régulièrement la région à feu et à sang, et du XIXe et XXe siècles lorsque le bâtiment est peu à peu transformé en exploitation agricole. La mémoire de la pierre porte encore aujourd'hui les stigmates de l'histoire. \r\nLa double influence champenoise et lorraine en fait un monument atypique alliant de nombreux éléments défensifs d 'époque médiévale, une tour de guet portant les traces dun double pont-levis à flèches surmonté dun étonnant clocheton sur bretèche , un ensemble de meurtrières et canonnières dont une à rotule plutôt rare, des effets de bossage en « pustules » impressionnants,  une tour ronde massive, dernier vestige d'un ensemble, à l'origine, beaucoup plus imposant.","habitants":"Etienne de Bougey\r\n        \"","divers":"La forteresse de Bougey","gps":"","images":["../../jctruffet.com/image/image_70/70_Bougey_1.jpg","../../jctruffet.com/image/image_70/70_Bougey_2.jpg","../../jctruffet.com/image/image_70/70_Bougey_3.jpg","../../jctruffet.com/image/image_70/70_Bougey_4.jpg","../../jctruffet.com/image/image_70/70_Bougey_5.jpg","../../jctruffet.com/image/image_70/70_Bougey_6.jpg"]},"Consult_chateau_formulaire70d4":{"id":"Consult_chateau_formulaire70d4","dept":"70","canton":"Rioz","commune":"Boulot","nom":"Boulot_Gezier","type":"Château","periode":"XVIII","histoire":"BOULOT, communs et murs de clôture de la fin du XVIIe siècle ; corps de logis reconstruit vers 1763 suivant les    plans de  Claude Damien  Gardaire. Décors intérieurs du XVIIIe siècle. Logis rehaussé d'un étage et d'un attique pendant   la première moitié du XIXe siècle.   Eléments protégés MH : corps de logis, communs y compris la serre, clôtures en pierre et grilles en fer forgé, les  lambris encadrant la cheminée du grand salon du rez-de-chaussée        A l'est de Boulot à Geziér-Fotenelay le château GEZIER a été construit au XVIIIe siècle, sur les vestiges dune ancienne maison forte. Il est très bien conservé,","architecture":"Château de Boulot   construit au XVIIIe siècle, corps de logis rectangulaire à trois niveaux, toiture en croupes avec fronton triangulaire incorporé.                                                                  Château de Gézier  a été construit au XVIIIe siècle, sur les vestiges dune ancienne maison forte existante  dès le XIIe siècle et l'édifice se compose d'un étage carré, le gros-oeuvre en calcaire, moellon et  enduit, élévation à travées, surmontée de toit conique,  toit en pavillon, toit à longs pans, croupe, pignon couvert et demi croupe, recouverts de tuiles plates.","habitants":"Seigneur de Gézier\r\n        \"","divers":"Château de Boulot avec son entrée sur parc et le château de Gezier","gps":"","images":["../../jctruffet.com/image/image_70/70_Boulot_Gezier_1.jpg","../../jctruffet.com/image/image_70/70_Boulot_Gezier_2.jpg","../../jctruffet.com/image/image_70/70_Boulot_Gezier_3.jpg","../../jctruffet.com/image/image_70/70_Boulot_Gezier_4.jpg","../../jctruffet.com/image/image_70/70_Boulot_Gezier_5.jpg"]},"Consult_chateau_formulaireb36a":{"id":"Consult_chateau_formulaireb36a","dept":"70","canton":"Rioz","commune":"Boult","nom":"Boult","type":"Château","periode":"XVIII","histoire":"BOULT. La famille de Boult  qui possédait le château  qui remonte en 1140,  elle s'est éteinte vers 1535 avec Thibault de Boult. En 1546 le fief devient la propriété du cardinal de Granvelle. Ses héritiers le vendirent à Antoine d'Hennezel, celui-ci fit construire un fourneau de fer à Boult qui fonctionnera jusqu'au XIXe siècle, son fils Claude fit raser vers 1745 le vieux château et fit construire une nouvelle demeure  par Claude Antoine d'Hennezel sur les plans de l'architecte sculpteur Claude Damien  Gardaire, à la place d'un édifice plus ancien qui était déjà en ruines au XVe siècle. La seigneurie de Boult fut achetée en 1787 par Antoine Baltazar Tinseau conseiller au parlement.","architecture":"Boult;  plusieurs campagnes de   travaux réalisés au XVIIIe siècle sont repérables dans les décors intérieurs du logis.    Précédé de deux terrasses au sud,  côté village, le logis s'ouvre au nord sur une cour, bordée à l'ouest par  d'anciennes écuries  et à l'est par une basse-cour,  comprenant une ferme,  et pigeonnier de part et d'autre de   l'allée d'accès.   Le corps de logis, construction de plan rectangulaire avec des pavillons saillants aux extrémités garde des éléments  de décor du XVIIIe siècle, et un imposant escalier, dont le palier est orné  de statues également attribuées à Gardaire.","habitants":"Thibault de Boult\r\n        \"","divers":"Château de Boult","gps":"","images":["../../jctruffet.com/image/image_70/70_Boult_1.jpg","../../jctruffet.com/image/image_70/70_Boult_2.jpg"]},"Consult_chateau_formulaire81f5":{"id":"Consult_chateau_formulaire81f5","dept":"70","canton":"St-Loup-sur-Semouse","commune":"St-Loup-sur-Semouse","nom":"Bouly_St_Loup","type":"Château","periode":"XVIII","histoire":"BOULY ou MAILLARD   en 1755, Jean-Baptiste Bouly (1735-1799), maître de forge de la baronnie, édifie un château en 1770,  François-Joseph Bouly, frère, sera le premier maire élu de Saint-Loup en 1790.  Jean-Baptiste léguera ses biens à ses parents, les Demandre, que Claire-Adélaïde Demandre (1840-1931) apporte  en dot la demeure  à son époux Fernand de Maillard. En 1920, Pierre de Maillard ingénieur agronome directeur aux usines réunies de Saint-Loup. le domaine restera dans cette famille jusqu'en 1964 qui le cédera à la commune pour une maison de retraite.                                                                                                Dans la commune la villa des Pervenches.                                                                                       ST-LOUP;  au XIIIe siècle, Saint-Loup appartient à la maison de Faucogney.  En 1477. Le vieux château  de Saint-Loup,  sur un talus dominant  la Semouse, au dessus du vieux bourg , les ruines du château des sires de Saint-Loup, avaient encore fière allure au milieu du XVIlIe siècle. le château de la maréchale de Lorge,  sur la rive gauche de la Semouse est édifiée après la réunion de Saint-Loup à la France une demeure pour loger une compagnie de cavalerie, sous le commandement du marquis de Coublans, baron de Saint-Loup. Ce château passa ensuite dans lhéritage du maréchal de Lorge, puis de sa fille, dernière baronne de Saint-Loup.","architecture":"Bouly; château construit en 1770, corps de logis a cinq travées élevé sur un sous-sol à trois niveaux dont-un sous comble reliés à deux ailes en retour d'équerre par des pans coupés. A la fin du XIXe siècle fut ajouté sur l'avant corps un fronton triangulaire aux armes de la famille De Malliard. A lextérieur, les rampes de lescalier et les balustres des balcons en forme de pilastre en fonte,    Le Vieux-Château  de Saint-Loup, une façade crénelée, garnie de deux tours rondes, à trois niveaux, sur la gauche de lune sadossait un corps de bâtiment de même hauteur. De hautes fenêtres ogivales éclairaient les tours, cet ensemble nétait pas véritablement un château fort, mais une belle demeure seigneuriale caractéristique du XIVe siècle: elle navait pas encore abandonné tout lappareil militaire, mais affirmait surtout bien haut le rang social de la noblesse.  Aujourd'hui il s'agit du quartier le plus moderne de Saint-Loup, ayant moins de 30 ans. Il est toujours en expansion.  Le château est significatif,  le bâtiment central construit à lintérieur dune cour close de 3 murs, présente trois tourelles carrées (dont deux subsistent) face à la Semouse, une à langle des deux murs, face au débouché du pont deux autres aux angles du bâtiment face à la rivière.","habitants":"Maréchal de Lorge\r\n        \r\n        \"","divers":"Le château de Bouly ou de Maillard, le vieux château et la villa Pervenches","gps":"","images":["../../jctruffet.com/image/image_70/70_Bouly_St_Loup_1.jpg","../../jctruffet.com/image/image_70/70_Bouly_St_Loup_2.jpg","../../jctruffet.com/image/image_70/70_Bouly_St_Loup_3.jpg","../../jctruffet.com/image/image_70/70_Bouly_St_Loup_4.jpg","../../jctruffet.com/image/image_70/70_Bouly_St_Loup_5.jpg","../../jctruffet.com/image/image_70/70_Bouly_St_Loup_6.jpg","../../jctruffet.com/image/image_70/70_Bouly_St_Loup_7.jpg"]},"Consult_chateau_formulaire2c31":{"id":"Consult_chateau_formulaire2c31","dept":"70","canton":"Vauvillers","commune":"Bourguignon-les-Conflans","nom":"Bourguignon_Conflans","type":"Château","periode":"XIV-XV","histoire":"BOURGUIGNON, Le château féodal de Bourguignon les Conflans, inscrit aux monuments historiques, date des XIVe et XVe siècles. Son enceinte fortifiée, sa galerie Renaissance et ses cheminées gothiques sont bien conservées. Après avoir appartenu aux ducs de Bourgogne, c'est aujourd'hui une propriété privée. Le 25 mai 2010 une aile du château est détruite par le feu.                           A quelques kilomètres  au nord-est de Conflans les Lanterne, en plus de la porte St-Nicolas, il existe un château  de style renaissance, inscrit aux M.H  il abritait le couvent des Recollets.","architecture":"Bourguignon les Conflans château féodal du   XIVe et XVe siècle  quadrilatère à deux niveaux flanqué de tourelles rondes en angles,  corps de logis en équerre. Conflans les Lanterne, la porte St-Nicolas ancienne fortifications de la ville qui possède un  château renaissance.","habitants":"Ducs de Bourgogne\r\n        \"","divers":"Château de Conflans et la  porte de Conflans les Lanternes.","gps":"","images":["../../jctruffet.com/image/image_70/70_Bourguignon_Conflans_1.jpg","../../jctruffet.com/image/image_70/70_Bourguignon_Conflans_2.jpg","../../jctruffet.com/image/image_70/70_Bourguignon_Conflans_3.jpg","../../jctruffet.com/image/image_70/70_Bourguignon_Conflans_4.jpg","../../jctruffet.com/image/image_70/70_Bourguignon_Conflans_5.jpg","../../jctruffet.com/image/image_70/70_Bourguignon_Conflans_6.jpg"]},"Consult_chateau_formulaire56e1-2":{"id":"Consult_chateau_formulaire56e1-2","dept":"70","canton":"Rioz","commune":"Buthiers","nom":"Buthiers","type":"Château","periode":"XV-XVIII","histoire":"BUTHIERS,   dés 1140, il y avait une famille du nom de Buthiers. Il fut acquis en 1404 par Jean de l'Epernoy dont la fille Catherine épouse en 1494,  Jean de  Scey dont la famille possède encore le château.  Le fils de Jean de Scey Etienne  épousa en  1518  Bonne Bussot fille du conseiller au parlement de Dole, suite à une séparation madame de Scey mit le feu au château que devait hérité le frère  d'Etienne Claude de Scey. Jean-Baptiste de Scey en 1632 gentilhomme de la chambre de Gaston d'Orléans frère de Louis XIII, se distingua dans l'armée de Catalogne à Rocroi en 1648,  remania le château. Alexandre, marquis de Scey maréchal de camp, fut admit aux honneurs de la cours en 1762, son fils préfet puis député du Doubs à la Restauration. Buthiers est la propriété de l'actuel marquis de Scey-Montbéliard de Brun.","architecture":"Château du XVIIe siècle, ses origines très anciennes et les recherches permettent de supposer que ce château occupe l'emplacement d'un oppidum, construit à proximité de la voie romaine dont on voit encore les vestiges   dans la pairie de Voray.    Construit sur l'ancien château fort, de celui-ci  il ne subsiste qu'une partie du donjon, en façade  que l'on encadra de deux tours carrées du côté nord et on peut voir les rainures du pont levis sur la façade côté sud. Corps de logis rectangulaire à deux niveaux et attiques toitures impériale avec fronton retondant et armorié, accolé de deux grosses tours d'angles carrées à trois niveaux à toits pointus, ces dernières remontent du XIVe siècle. mais l'ensemble a été entièrement remanié en 1640. Le parc a été aménagé aux XVIIIe siècle,  XIXe siècle et première moitié du XXe siècle. Il comprend un pavillon chinois et une orangerie.  Eléments protégés MH : façades et  toitures du château, des écuries, des communs.","habitants":"Famille de  Jean de  Scey\r\n        \"","divers":"Château de Buthiers","gps":"","images":["../../jctruffet.com/image/image_70/70_Buthiers_1.jpg","../../jctruffet.com/image/image_70/70_Buthiers_2.jpg","../../jctruffet.com/image/image_70/70_Buthiers_3.jpg"]},"Consult_chateau_formulaire3e45":{"id":"Consult_chateau_formulaire3e45","dept":"70","canton":"Champlitte","commune":"Champlitte","nom":"Champlitte","type":"Château","periode":"XVII","histoire":"CHAMPLITTE, les premiers seigneurs connus sont les Fouvent, Girard comte de Fouvent et seigneur de Champlitte cité en 990. Au XIIe siècle, Renaud comte de Bourgogne fait donnation de Champlitte à son neveu Eudes, fils de sa sur Isabelle, cette dernière avait épousé  Hugues  comte de Champagne. Le deuxième fils d'Isabelle Eudes II et Guillaume de Champlitte partirent en croisière, Eudes mourut en 1204. Mais avant le retour de Guillaume qui avait un an pour revenir suivant les accords, mais il revint trois ans après.  Eudes II avait légué  à sa fille Eudette épouse de Hugues de Gand qui vendit le domaine à Clémence de Fouvent dernière descendante des seigneurs de Champlitte, marié à Guillaume de Vergy. le dernier des Vergy Clériadius mourut en 1630 laissant ses biens à son petit-neveu Clériadus de Cusances  qui ce dernier décéda presque aussitôt laissant  le domaine en indivision entre divers héritiers  qui en 1701, Louis-Jules de Clermont d'Amboise comte de Reynel racheta les parts des cohéritiers mais mourut l'année suivante léguant le domaine à sa soeur épouse de Jean-Baptiste de Toulageon, seigneur de Raucourt, cette famille revendit le château en 1825 à la commune qui y accueillit en 1828 la duchesse d'Angoulême. Aujourd'hui musée départemental des arts et des traditions populaires.                                                                           Château Grillot  L'ancien hôtel Grillot date du XVIe siècle, il comporte une tourelle d'escalier hexagonale, terminée par un dôme.","architecture":"Champlitte dont la première construction remonte au XIIe siècle, fut reconstruit au XVIIe siècle avec façades dans le style renaissance,  une aile fut reconstruite suite à un incendie en 1751. Le château se constitue dun bâtiment à trois corps principaux, corps de logis rectangulaire flanqué d'ailes en retour d'équerre à deux niveaux et attiques dans une toiture brisée. Lallée centrale traversait jadis des jardins à la Française, jardin régulier à lordonnancement géométrique et symétrique. La façade présente trois niveaux nettement différenciés et sept travées composites. Le rez-de-chaussée est rythmé darcades élevées, sinscrivant dans les travées et composées de frises surmontées dun large entablement à ressauts. Le premier étage dispose de fenêtres à meneaux surmontées dun entablement composé en partie supérieure dune corniche à modillons. Le deuxième étage est formé dun toit brisé et mansardé, couvert dardoise et ponctué de lucarnes éclairant les combles.                                              Hôtel Grillot corps de logis rectangulaire a trois niveaux avec tourelles d'escalier mi-hors oeuvres octogonale  et bâtisse  dite de Montarlot de style espagnole avec tourelle d'escalier.","habitants":"Louis-Jules de Clermont d'Amboise\r\n        \r\n        \"","divers":"Château de Champlitte, l'hôtel Grillot et la bâtisse Montarlot","gps":"","images":["../../jctruffet.com/image/image_70/70_Champlitte_1.jpg","../../jctruffet.com/image/image_70/70_Champlitte_2.jpg","../../jctruffet.com/image/image_70/70_Champlitte_3.jpg","../../jctruffet.com/image/image_70/70_Champlitte_4.jpg","../../jctruffet.com/image/image_70/70_Champlitte_5.jpg","../../jctruffet.com/image/image_70/70_Champlitte_6.jpg","../../jctruffet.com/image/image_70/70_Champlitte_7.jpg","../../jctruffet.com/image/image_70/70_Champlitte_8.jpg"]},"Consult_chateau_formulairec744":{"id":"Consult_chateau_formulairec744","dept":"70","canton":"Gray","commune":"Champvans","nom":"Champvans","type":"Château","periode":"XIX","histoire":"CHAMPVANS, fief tenu par Philippe de Main, seigneur de Champvans, et pour le fief à Apremont et Valay,  en  1532.  le château a été construit au XIXe siècle. Son portail à fronton triangulaire est toutefois plus  ancien; il aurait été édifié au XVIIe ou XVIIIe siècle.","architecture":"Champvans a été construit au XIXe siècle. Son portail à fronton triangulaire est toutefois plus ancien; il aurait été édifié au XVIIe ou XVIIIe siècle. Le château est entouré d'un parc de sept hectares orné de statues en pierre et de vases, un jardin potager, une serre et une orangerie, il possède un jardin d'agrément qui se compose de : parterre de gazon ; arbres isolés ; rocailles de jardin ; salle de verdure et bosquet.","habitants":"Famille de Philippe de Main\r\n        \"","divers":"Château de Champvans et une tour dans le parc.","gps":"","images":["../../jctruffet.com/image/image_70/70_Champvans_1.jpg","../../jctruffet.com/image/image_70/70_Champvans_2.jpg","../../jctruffet.com/image/image_70/70_Champvans_3.jpg","../../jctruffet.com/image/image_70/70_Champvans_4.jpg","../../jctruffet.com/image/image_70/70_Champvans_5.jpg"]},"Consult_chateau_formulaire1c1f":{"id":"Consult_chateau_formulaire1c1f","dept":"70","canton":"Montbozon","commune":"Chassey-lès-Montbozon","nom":"Chassey","type":"Château","periode":"XVII","histoire":"CHASSEY;  cette famille connut une certaine importance durant le Moyen-Age: Guillaume de Chassey est choisi en 1272 par le Duc de Bourgogne Hugues IV comme témoin pour l'hommage rendu au Roi Philippe-le-Hardi pour le duché de Bourgogne.\r\nMarguerite de Chassey est l'épouse de Jean Carondelet  en 1466 , grand chancelier de Flandre et de Bourgogne. Cette famille est l'une des dernières  subsistantes de la noblesse française,  a appartenu à la famille de Buretel de Chassey jusqu'à la Révolution, puis à une riche famille de maîtres de forge au XIXe siècle, les Duchon et enfin au Baron de Vomécourt au début du XXe siècle.\r\n En 1789, le comte Charles de Moustier (1739-1801), deuxième marquis, est également seigneur de Cubry, Bonnal, Chassey. Le 16 avril 1791 la dernière propriétaire du château, Mme de Buretel de Chassey s'enfuit pour rejoindre son mari, Marie Desle de Buretel, en Suisse.\r\nCharles de Moustier, seigneur du lieu, se plaint en l'an V à l'administration départementale que les habitants de Chassey se sont transportés chez lui, au château de Bournel au début de la Révolution.                                                                                A quelques kilomètres  au nord-est le château d'Esprels transformé en hôtel de ville.","architecture":"Chassey, château du XVIIIe siècle, aujourd'hui à l'abandon, corps de logis en V en deux partie  rectangulaire a trois niveaux accolé d'une tour carrée en angles à toit pointu.                                                 Château d'Esprel corps de logis rectangulaire à deux niveaux avec fronton retondant en façade, accolé sur les côtés deux pavillons saillants de même niveaux.","habitants":"Famille de Guillaume de Chassey \r\n        \r\n        \"","divers":"Château de Chassey et le château d'Esprels","gps":"","images":["../../jctruffet.com/image/image_70/70_Chassey_1.jpg","../../jctruffet.com/image/image_70/70_Chassey_2.jpg"]},"Consult_chateau_formulaire37a2":{"id":"Consult_chateau_formulaire37a2","dept":"70","canton":"Gy","commune":"Choye","nom":"Choye","type":"Château","periode":"XVIII","histoire":"CHOYE;  ce village possédait un château qui avait été acquis par Thierry, archevêque de Besançon (874-895) en même temps que des habitations voisines , il disparu au XVIIe siècle. Plusieurs châteaux forts se sont succéder à l'emplacement de l'actuel château pendant le Moyen-Age; le dernier a été détruit au début du XVIIe siècle; acquisition de la seigneurie en 1769  par le président Olivet qui fait raser les ruines et  fait appel à Nicolas Nicole pour la construction  d'un nouveau château. Le président Olivet au moment de la Révolution possédait la plus grosses fortune de la Fanche-Comté. Le château a servit à des colonies de vacances abrite aujourd'hui un institut franco-suisse.    A quelques kilomètres au sud, Charcenne,  on peut également voir un château édifié entre le XVIIIe et le XIXe siècle, ainsi qu'une fontaine construite en 1999.","architecture":"Le château de Choye actuel a été construit en 1730 par le célèbre architecte Nicolas Nicole, de forme rectangulaire à trois niveaux et attiques toiture en croupe, avant corps saillant supportant  un fronton triangulaire armorier. Une tourelle sur la partie arrière.","habitants":"Président Olivet \r\n        \"","divers":"Château de Choye","gps":"","images":["../../jctruffet.com/image/image_70/70_Choye_1.jpg","../../jctruffet.com/image/image_70/70_Choye_2.jpg","../../jctruffet.com/image/image_70/70_Choye_3.jpg","../../jctruffet.com/image/image_70/70_Choye_4.jpg"]},"Consult_chateau_formulaire926e":{"id":"Consult_chateau_formulaire926e","dept":"70","canton":"Amance","commune":"Polaincourt-les-Clairefontaine","nom":"Claire_Fontaine","type":"Château","periode":"XVII","histoire":"CLAIREFONTAINE, lépoque de la seigneurie a marqué le passé de la commune de Polaincourt-et-Clairefontaine. En effet, un monastère cistercien fut construit sur le bourg à Clairefontaine vers 1131.  Cette terre qui relevait du fief  de Saint-Loup;  un procès en contestation s'étant élevé entre Elwis de Joinville, dame de Saint-Loup et premier comte de Bourgogne Othon IV, la terre fut attribuée aux Saint-Loup  en 1269,  et des Faucogney qui en firent don plus tard aux moines de Polaincourt. Dès 1361, cette merveille fut dévastée par les grandes compagnies qui éliminèrent les moines. Le monastère fut à nouveau un champ de feux en 1569 et pillé en 1595. Lors de la conquête française de la Franche-Comté en 1636, le monastère fut brûlé. Les restaurations nont eu lieu que très tard. Actuellement, il est devenu un hôpital spécialisé, l'abbaye cistercienne de Clairefontaine est entièrement reconstruite et transformé en château  à partir de 1711. Elle   est vendue comme bien national en 1793 au négociant Jean-François Estienne, associé au sieur  Charles Henriot, une verrerie autorisée par  un arrêté du Directoire  du 28 août 1798.   Les bâtiments  ont été  achetés en 1938 par  les hôpitaux de Seine-et-Marne, et convertis en hôpital  psychiatrique. Ils ont conservé la même vocation et sont aujourd'hui la propriété de l'association hospitalière de Franche-Comté.","architecture":"Le Château de Clairefontaine est lunique monument existant dans la commune de Polaincourt-et-Clairefontaine. Il fut construit vers la deuxième moitié du XVIIe siècle. Corps de logis rectangulaire à deux niveaux accolé de deux pavillons saillants aux extrémités et avant corps en façade saillant  surmonté d'un fronton triangulaire. Cette propriété privée fait lobjet dune inscription au titre des monuments historiques le 20 octobre 1971.","habitants":"Famille de  Jean-François Estienne\r\n        \"","divers":"Château-Abbaye de Clairefontaine","gps":"","images":["../../jctruffet.com/image/image_70/70_Claire_Fontaine_1.jpg","../../jctruffet.com/image/image_70/70_Claire_Fontaine_2.jpg"]},"Consult_chateau_formulaire8e53":{"id":"Consult_chateau_formulaire8e53","dept":"70","canton":"Noroy-le-Bourg","commune":"Colombe-lès-Vesoul","nom":"Colombe_Frotey","type":"Château","periode":"XVIII","histoire":"COLOMBE;  il est construit en 1733 par Anatole Lyautey de Colombe, seigneur de Colombe et d'Essernay, est resté dans la famille depuis lors. Situé sur un plateau de calcaire, il domine la vallée où sillonne la Colombine. Anatole de Colombe était seigneur de Colombe et dEssernay, receveur particulier et ancien des finances du bailliage, Vicomte-Mayeur de Vesoul.                        A quelques kilomètres au nord-est le château de Frotey les Vesoul du XVIII-XIXe siècles. L'appelation de Frotey pourrait provenir d'une très ancienne appellation latine\" Foresta et Forestia\" Frotey lès Vesoul faisait partie de la vicomté de Vesoul au Xe siècle et a été au fil des ans rattachés à plusieurs seigneuries. Une partie importante de son patrimoine foncier était possédé par le prieuré Saint-Nicolas du Marteroy durant cinq siècles. Il fut habité  par Xavier de Montepin (1823-1902) romancier, un auteur à succès de romans-feuilletons populaires  et maire de Frotey lès Vesoul en 1870 auteur de la célèbre \"porteuse de pains\". Auguste GUYARD (1808-1882) idéaliste, utopiste et ami de Lamartine défendait l'idée que les avancées sociales feraient surgir une société harmonieuse et concrétisa son concept  par la fondation de l'académie de Frotey.","architecture":"Colombe à conservé un décor intérieur de l'époque de sa construction (boiseries, cheminées). Tout est d'origine, il possède aussi une chapelle privative au premier étage. Les bâtiments annexes sont les dépendances, des écuries, un pigeonnier seigneurial et une tour au fond du parc.  Les grosses maisons blanches, aux toits rouges ou gris du village de Colombe, avec son clocher bulbeux aux tuiles vernissées se regroupent sur une rive convexe de la Colombine, non pas au fond de la vallée, mais à labri des inondations, au sommet des pentes du versant.                  Le château de Frotey date des XVIII-XIXe siècles. Au milieu du XIXe siècle. Le château fut agrémenté d'avant corps et de frontons triangulaires au XIXe siècle. Grand parc avec beau portail en fer forgé.","habitants":"Famille d'Anatoile-Lyautey de Colombe\r\n        \"","divers":"Château de Colombe lès Vesoul, château de Frotey et hôtel à Frotey","gps":"","images":["../../jctruffet.com/image/image_70/70_Colombe_Frotey_1.jpg","../../jctruffet.com/image/image_70/70_Colombe_Frotey_2.jpg","../../jctruffet.com/image/image_70/70_Colombe_Frotey_3.jpg","../../jctruffet.com/image/image_70/70_Colombe_Frotey_4.jpg","../../jctruffet.com/image/image_70/70_Colombe_Frotey_5.jpg","../../jctruffet.com/image/image_70/70_Colombe_Frotey_6.jpg"]},"Consult_chateau_formulaire7dba":{"id":"Consult_chateau_formulaire7dba","dept":"70","canton":"Vesoul","commune":"Colombier","nom":"Colombier","type":"Château","periode":"XII-XVIII","histoire":"COLOMBIER, pas moins de trois châteaux sont situés sur la commune de Colombier. Le plus ancien est le château fort de Montaigu, il est en ruine mais toujours imposant, était  au XIIe siècle une forteresse immense directement administrée par le duc de Bourgogne. L'élégant château de la Roche renferme quant à lui des vestiges du château médiéval et est entouré d'un très beau parc. Le château de Villers-Ooz enfin date du XVIIIe siècle, mais il a été remanié au XIXe siècle. Le vrai joyau de Colombier est le château de Montaigu, forteresse très ancienne qui fut le fief direct de la cour de Bourgogne et qui avait dans le passé une importance considération. Les guerres du XVIIe siècle lont malheureusement laissé à létat de ruine, celui de Villers-Poz date en partie du XVIII siècle.","architecture":"Sur les hauteurs, le château de la Roche (ruines du XIIe et nouveau château du XVIIIe siècle). La tour du château de la Roche date de la fin du moyen âge et lactuel « château de Colombier » a été construit de 1802 à 1852, celui de Villers-Poz date en partie du XVIIIe siècle. Le vrai joyau de Colombier est le château de Montaigu, forteresse très ancienne.  Les guerres du XVIIe siècle lont malheureusement laissé à létat de ruine. Ruines du château de Montaigu à l'opposé, sur la colline. Du petit village situé en hauteur, on aperçoit deux châteaux : un de l époque médiévale et lautre du XIXe siècle. Ce sont les châteaux de la Roche. Au XVIe siècle Colombier était un bourg riche et étendu, probablement ceint de murs, et offrant de belles demeures et plusieurs établissements religieux. Malheureusement les guerres du XVI et XVIIe siècle ont durement touché le village, du fait de limportance stratégique de Montaigu.","habitants":"Duc de Bourgogne\r\n        \"","divers":"Château du Colombier, de la Roche, de Montaigu et de Villerpoz.","gps":"","images":["../../jctruffet.com/image/image_70/70_Colombier_1.jpg","../../jctruffet.com/image/image_70/70_Colombier_2.jpg","../../jctruffet.com/image/image_70/70_Colombier_3.jpg","../../jctruffet.com/image/image_70/70_Colombier_4.jpg","../../jctruffet.com/image/image_70/70_Colombier_5.jpg","../../jctruffet.com/image/image_70/70_Colombier_6.jpg","../../jctruffet.com/image/image_70/70_Colombier_7.jpg"]},"Consult_chateau_formulairec526":{"id":"Consult_chateau_formulairec526","dept":"70","canton":"Port-sur-Saône","commune":"Conflandey","nom":"Conflandey","type":"Château","periode":"XVI","histoire":"CONFLANDEY, il eut au XIIIe siècle et au XIVe siècle pour seigneurs;  Guillaume et Henri de Conflandey; au XIVe siècle  ce fief passa à la maison de Saint-Alban, puis à celle des Grammont en 1540,  Antoine de Grammont  en 1604, au XVIIe siècle elle était la possession de la famille de Ray.    Le château a quant à lui été occupé par une papeterie, avant d'être transformé en tréfilerie. Celle-ci fonctionne toujours, mais a été dissocié du château qui est aujourd'hui une propriété privée.                                                        A quelques kilomètres au sud  à Port de Saône château de Vauchaux, étonnant destin pour ce château, ancien relais de chasse de Louis XV devenu l'une des meilleures tables de la région, créé en 1973, le restaurant de Jean-Michel Turin, et le château de Champs Challot chambres d'hôtes également.                  Vestiges d'une tour à Port sur Saône. Au XIIIe siècle, Jean de Vergy possédait la moitié de la ville à titre de fief mouvant du domaine des comtes de Bourgogne.  En 1263, la comtesse Alix et Hugues de Chalon, son mari, achetèrent l'autre moitié. Cette division de Port-Sur-Saône en deux seigneuries subsista jusqu'en 1789.","architecture":"le château  de Conflandey admirablement bien placé   au confluent de la Saône et de la Lantenne, manoir seigneurial fortifié   par les eaux des deux rivières que par les doubles remparts qui subsistent encore, ainsi que plusieurs tours dont les murs ont jusqu'à trois mètres d'épaisseur, corps de logis rectangulaire à trois niveaux flanqué de deux pavillons carrées aux extrémités de quatre niveaux.                                                                                       Vauchoux  corps de logis  rectangulaire à trois niveaux flanqués de pavillons  formant un U  avec prolongement d'ailes.  Port sur Saône; le plus vieux bâtiment est une tour médiévale du XIIe siècle, dont il ne reste que quelques vestiges.","habitants":"Famille d'Antoine de Grammont \r\n        \"","divers":"Château de Conflandey, tour féodale et château de Vauchoux.","gps":"","images":["../../jctruffet.com/image/image_70/70_Conflandey_1.jpg","../../jctruffet.com/image/image_70/70_Conflandey_2.jpg","../../jctruffet.com/image/image_70/70_Conflandey_3.jpg","../../jctruffet.com/image/image_70/70_Conflandey_4.jpg","../../jctruffet.com/image/image_70/70_Conflandey_5.jpg","../../jctruffet.com/image/image_70/70_Conflandey_6.jpg"]},"Consult_chateau_formulaire200c-2":{"id":"Consult_chateau_formulaire200c-2","dept":"70","canton":"Vauvillers","commune":"Demangevelle","nom":"Demangevelle","type":"Vestiges","periode":"XII","histoire":"DEMANGEVELLE;  les seigneurs de Demangevelle, tous vassaux de la châtellenie de Jonvelle.  En 1385, Guy de Vy-Demangevelle rendit hommage pour ses terres au comte de Bourgogne. Sur la fin de 1390, malgré son grand âge, il se mit à la tête dune troupe de chevaliers comtois et ils les conduisirent en partisans sur les terres du duc de Lorraine. La tentative échoua et un grand nombre des siens furent faits prisonniers, les autres battirent en retraite avec lui.  Le seigneur de Demangevelle, presque centenaire, vivait encore en 1405. Sa petite-fille Marie, épousa Jean de Cicon et ce mariage fit passer Demangevelle dans la maison de Cicon. Le fils  Didier de Cicon, lun des plus illustres chevaliers de son temps, sest distingué par ses actes de bienfaisance envers labbaye de Cherlieu. En 1423, il rend hommage au duc de Bourgogne et, Guillaume, fils de Didier, a épousé Catherine  dHaraucourt-Chauvirey, dame de Richecourt en 1458. Une fille de Guillaume, Bonne de Cicon-Demangevelle, épousa Nicolas du Châtelet seigneur de Vauvillers et lui offrit en dot la terre de Demangevelle. Nicolas, son fils, reçut le privilège de battre monnaie et il épousa à Vesoul Elisabeth dHaraucourt.  En 1583, Erard de Livron et Marc de Vienne, seigneurs de Vauvillers et héritiers de Nicolas, énumèrent toutes les constructions du château pour le fief de Demangevelle.  En 1830 M. Barbey de Corre, a acheté toutes les parcelles et reconstitué ainsi la châtellenie. En 1982-1983, le gardien du domaine a acquis lensemble mais décéda quelques mois plus  tard, laissant la propriété à sa veuve qui sen est séparée en 2008.  Toujours dans la Famille de Barbey.","architecture":"Son château de Demangevelle, bâti sur le plateau rectangulaire de la colline, avait une enceinte de solides murailles, protégées dun côté par lescarpement et défendues du côté accessible par un fossé large et profond. A ses angles, la forteresse était flanquée de quatre tours massives dont les créneaux défiaient lennemi et maintenaient dans la soumission les serfs établis au pied des remparts. Un parapet en pierre, crénelé ou percé de meurtrières, couronnait les courtines. Au centre sélevait le donjon et contre les murs denceinte, sadossaient les autres corps dhabitation. Trois de ces tours étaient rondes ; la quatrième, dune construction plus ancienne, avait une forme carrée et six étages.  Après la Révolution, le château, la cour, la basse-cour, les fossés et les terres autour ont été divisés en petites parcelles, vendues  à des particuliers qui les ont exploitées en jardins et landes. Il a ainsi dégagé une des deux grosses tours qui mesure 23 mètres de hauteur et dans laquelle on peut descendre vers des oubliettes ou monter jusquà son sommet par un escalier aménagé dans la muraille, épaisse de 3,50 mètres.","habitants":"Famille de Guy de Vy-Demangevelle\r\n        \r\n        \"","divers":"Vestiges du château de Demangevelle.","gps":"","images":["../../jctruffet.com/image/image_70/70_Demangevelle_1.jpg","../../jctruffet.com/image/image_70/70_Demangevelle_2.jpg"]},"Consult_chateau_formulaireca00":{"id":"Consult_chateau_formulaireca00","dept":"70","canton":"Hericourt","commune":"Etobon","nom":"Etobon","type":"Vestiges","periode":"XIII","histoire":"ETOBON, sur la hauteur du village, au Chastel-Thierry,   existait une importante forteresse, dont l'existence est attestée dès 1256, qui appartenait aux sires de Chalon.   Une charte datée du 20 juin 1280 le nomme Chastel-Thierry en hommage au comte de Montbéliard. Hugues, seigneur de Montbrison et d'Aspremont et fils d'Hugues de Bourgogne en était le suzerain en 1287.  En 1407, par l'avènement du mariage de la princesse Henriette d'Orbe, petite-fille d'Étienne de Montfaucon, la terre d'Étobon et son château passent dans la Maison de Wurtemberg. Incendié et détruit par le comte de Furstemberg  seigneur d'Héricourt en 1519,   s'empara du château d'Etobon et le brûla  il tomba en ruine. Ulric, comte de Montbéliard, qui recouvra le château, ne crut pas devoir  le remettre en état.   Dès le XVIIe siècle, après le désastre de la guerre de Trente Ans, les habitants du village, avec la permission du   prince de Montbéliard,  prirent une grande quantité de pierres pour la construction de maisons. La seigneurie d'Etobon fut supprimée en 1620 et rattachée à Montbéliard.\r\n Depuis l'époque médiévale, le village d'Etobon (près d'Héricourt en Haute-Saône) est intimement lié à l'histoire du comté de Montbéliard, puis à celle de la principauté. En 1748, après la perte des quatre terres dépendantes (Clémont, Châtelot, Blamont, Héricourt), la principauté redevient comté. La terre d'Etobon restera attachée au comté de Montbéliard, jusqu'à la Révolution Française.","architecture":"Le château d'Etobon était fort par  sa position et par les travaux très considérables qui avaient été faits. Il était situé à 167 m au-dessus du village  et mesurait 220 mètres de long et 60 mètres de large. Leurs descendants les imitèrent dans la destruction. Aujourd'hui il reste quelques pans de murs, d'escaliers et de fossés .","habitants":"Famille d'Hugues de Bourgogne\r\n        \"","divers":"Vestiges du Chastel-Thierry à Etobon","gps":"","images":["../../jctruffet.com/image/image_70/70_Etobon_1.jpg"]},"Consult_chateau_formulaire3ad5":{"id":"Consult_chateau_formulaire3ad5","dept":"70","canton":"Villersexel","commune":"Fallon","nom":"Fallon","type":"Château","periode":"XVIII","histoire":"FALLON,  construit en 1748 par Jean-Baptiste de Raincourt,   Guillaume de Raincourt fit construire une fonderie émaillerie à Fallon en 1711. Très productive au XIXe siècle, dernière fonderie de Haute-Saône en 1893, elle ferma ses portes en 1939. Les bâtiments industriels de la fonderie sont cependant toujours debout, en assez bon état.\r\nLa maison du maître de forges, dit le Château de Fallon, est tout aussi bien conservé. Edifié au XVIIe et XIXe siècles, cette imposante demeure est classée.","architecture":"Fallon, le corps de logis est  reconstruit à la fin XVIIe siècle ou début XVIIIe siècle, utilisant les vestiges d'un bâtiment antérieur,   gros travaux à partir de 1748 par Jean-Baptiste de Raincourt sur les plans d'un architecte bisontin. La maison du maître de forges, dit le château de Fallon, est tout aussi bien conservée.  Corps de logis rectangulaire à deux niveaux et attiques toitures en croupes assez pentus.","habitants":"Famille de Guillaume de Raincourt \r\n        \"","divers":"Château de Fallon","gps":"","images":["../../jctruffet.com/image/image_70/70_Fallon_1.jpg","../../jctruffet.com/image/image_70/70_Fallon_2.jpg","../../jctruffet.com/image/image_70/70_Fallon_3.jpg"]},"Consult_chateau_formulaire9e43":{"id":"Consult_chateau_formulaire9e43","dept":"70","canton":"Faucogney-et-la-Mer","commune":"Faucogney-et-la-Mer","nom":"Faucogney","type":"Vestiges","periode":"XIII","histoire":"FAUCOGNEY, au Moyen-Age, était une place forte et un passage obligé vers la Lorraine. Les sires de Faucogney rayonnaient sur une bonne partie de lactuelle Haute-Saône avec notamment les 4 entrées vers la Lorraine : col du Mont de Fourches, Col des Croix, Fougerolles et Saint-Loup. Au XIIIe siècle, Jean de Faucogney était vicomte de Vesoul.\r\nEn 1285, le seigneur de Faucogney,La grande maison de Faucogney qui combattit le comte de Bar et les seigneurs de Serocourt en 1359, s'éteignit en 1373 avec le décès de Jeanne de Faucogney, marié à Henri de Rahon-Longwy. Celui-ci s'était beaucoup endetté et vendit l'année suivante la terre de Faucogney au duc-comte de Bourgogne, Philippe le Hardi. Entre temps, la famille de Faucogney avait échangé des alliances avec des maisons de renom, allant des Joinville (Héloise de Jonville, sur du chroniqueur de Saint Louis était Dame de Faucogney) à la famille royale de France, Jean III de Faucogney épousa Isabelle de France, fille du roi Philippe V et de la comtesse Jeanne de Bourgogne,  sans postérité. Faucogney suivit alors la destinée du comté de Bourgogne, entra dans le giron des Habsbourg après la mort du duc Charles le Téméraire et était province espagnole depuis le partage de Charles Quint. En 1674, Faucogney fut alors le dernier bastion espagnol, lors de la conquête de la Franche-Comté par les troupes françaises de Louis XIV. La cité tomba après une lutte héroïque le 4 juillet 1674.","architecture":"Faucogney, donjon carré  seul vestige du château du XIIIe siècle.  Les remparts et la forteresse ont été rasés en 1674. Faucogney fut le dernier bastion de l'indépendance comtoise.  A ce jour, de nombreuses portions des anciens souterrains du château et de la ville sont visibles dans les principales caves de la vieille ville. Malheureusement, ces galeries ne sont plus praticables car elles se sont effondrées à de nombreux endroits.","habitants":"Famille de Faucogney\r\n        \"","divers":"La tour de Faucogney et la mairie","gps":"","images":["../../jctruffet.com/image/image_70/70_Faucogney_1.jpg","../../jctruffet.com/image/image_70/70_Faucogney_2.jpg","../../jctruffet.com/image/image_70/70_Faucogney_3.jpg"]},"Consult_chateau_formulaire6850":{"id":"Consult_chateau_formulaire6850","dept":"70","canton":"Montbozon","commune":"Filain","nom":"Filain","type":"Château","periode":"XVI","histoire":"FILAIN; au Moyen-Age, il y eut une famille de gentilshommes portant le nom de Filain: en 1160 vivait Petrus de Folens, en 1225 Petrus Miles Fonis Lanae. Jean et Guy de Filain participent en 1217 à la cinquième croisade. En 1420, Claude d'Andelot épousa Marie de Filain, fille d'Antoine de Filain, écuyer. Il parait que là s'arrêta l'existence de cette maison. La terre de Filain, après avoir été possédée ensuite par plusieurs familles, passa dans le XVIIIe siècle au marquis Francois-Joseph de Camus, conseiller au parlement de Besançon, qui en fut le dernier seigneur. Fief depuis le XIIe siècle d'une famille de gentilhomme de Fons-Lanaé qui donnera Filain, les premiers seigneurs connus, les Andelot, par alliance  de Claude Andelot qui épousa Marie de Filain  qui construisirent une maison forte au XVe siècle. En 1423 Guillemette de Tincey dame de Filain reprend le fief et le passa aux  Sacquenay seigneur qui le  passa aux Cointet, ce sont ces deux dernières familles qui firent construire au XVIe siècle les deux corps de bâtiment dans un style renaissance et apporta leur touche sur la façade sud du nouveau corps de logis s'ouvrant sur le jardin. En 1670 les Camus achète Filain Jean-François de Camus dont la descendance sera titré de marquis  de Filain  le dernier marquis de Filain Martin-Bonnaventure de Camus sera le dernier seigneur avant la Révolution, et en 1808 par le général Marulaz baron puis comte de l'Empire qui s'illustra durant les guerres napoléoniénes, puis vendu en 1865 monsieur Gaconnet passera en 1878 à monsieur Duchon-Demandre qui le transmet à sa descendance.","architecture":"A l'origine maison forte de Filain  au XVe siècle bâtiment rectangulaire  élevé sur un sous-sol  à deux niveaux et demi-étage sous comble,  avec quatre tours rondes  aux angles deux seulement subsistent aujourd'hui, défendu par des meurtrières et fossés, accessible par deux ponts-levis. Un nouveau bâtiment central fut construit de style renaissance avec toiture à quatre pans accolé de deux tours carrées coiffés  en bulbes style franc-comtois, relié à l'ancien édifice par deux galeries superposées et par une courtine fermant la cour.  remanié au XVIIe et au XVIIIe siècle disparition des éléments défensifs dégageant la cour d'honneur qui à belle allure avec sa façade aux colonnes monolithes, doriques et ioniques qui se superposent encadrant les arcades et les fenêtres à meneaux, l'escalier à double révolution ont remplacé le ponts levis, ont voit encore les fentes des chaînes au-dessus de la porte d'entrée et les tours rondes  ont conservés leurs meurtrières.                                                                            A quelques kilomètres à l'ouest la maison forte de Vellefaux, château a conservé quelques vestiges du château féodal, un corps de logis, une chapelle, un pigeonnier et des cheminées du XVIIIe siècle.","habitants":"Famille de Claude Andelot\r\n        \"","divers":"Château de Filain et maison forte de Vellefaux","gps":"","images":["../../jctruffet.com/image/image_70/70_Filain_1.jpg","../../jctruffet.com/image/image_70/70_Filain_2.jpg","../../jctruffet.com/image/image_70/70_Filain_3.jpg","../../jctruffet.com/image/image_70/70_Filain_4.jpg","../../jctruffet.com/image/image_70/70_Filain_5.jpg","../../jctruffet.com/image/image_70/70_Filain_6.jpg","../../jctruffet.com/image/image_70/70_Filain_7.jpg","../../jctruffet.com/image/image_70/70_Filain_8.jpg","../../jctruffet.com/image/image_70/70_Filain_9.jpg"]},"Consult_chateau_formulaire4db2":{"id":"Consult_chateau_formulaire4db2","dept":"70","canton":"Rioz","commune":"Fondremand","nom":"Fondremand","type":"Château","periode":"XII-XVII","histoire":"FONDREMAND, Le château de Fondremand est mentionné dans des documents officiels dès 1275. Le fief relevait alors du comté de Bourgogne, jusqu'à ce qu'il passe aux Neufchâtel en 1385. Mais le site fut occupé bien avant la construction du château, puisqu'on a retrouvé à Fondremand les vestiges d'une voie romaine.","architecture":"château médiéval  de Fondremand subsiste en élévation. De  plan rectangulaire composée de deux niveaux de deux salles voûtées en berceau et un vaste volume libre où se distinguent trois niveaux  conservant  plusieurs pièces voûtées sur croisée d'ogives et cheminées monumentales.   Partiellement réaménagé  aux XVIIIe et XIXe siècles.  Imposant donjon  du XIIe siècle occupe l'angle ouest d'une cour  que borde à l'est un bâtiment construit vers la fin du XVe ou le début  du XVIe siècle.  Au nord,  des écuries néo-gothiques ont été construites au début du XXe siècle.","habitants":"Comte de Bourgogne\r\n        \"","divers":"Château de Fondremand","gps":"","images":["../../jctruffet.com/image/image_70/70_Fondremand_1.jpg","../../jctruffet.com/image/image_70/70_Fondremand_2.jpg","../../jctruffet.com/image/image_70/70_Fondremand_3.jpg","../../jctruffet.com/image/image_70/70_Fondremand_4.jpg","../../jctruffet.com/image/image_70/70_Fondremand_5.jpg","../../jctruffet.com/image/image_70/70_Fondremand_6.jpg","../../jctruffet.com/image/image_70/70_Fondremand_7.jpg","../../jctruffet.com/image/image_70/70_Fondremand_8.jpg","../../jctruffet.com/image/image_70/70_Fondremand_9.jpg"]},"Consult_chateau_formulairee68f":{"id":"Consult_chateau_formulairee68f","dept":"70","canton":"Lure","commune":"Fougerolles","nom":"Fougerolles","type":"Château","periode":"XVIII","histoire":"FOUGEROLLES,  l'époque gallo-romaine se traduit par le passage de la voie romaine de Luxeuil à Plombières. Au milieu du Moyen-Age, la forêt a reconquis tout l'espace quand le sire de Faucogney installe un de ses trois fils à Fougerolles-le-Château. Puis, au XIIIe siècle, la seigneurie entre dans la mouvance de l'abbaye de Remiremont.\r\nLa seigneurie de Fougerolles, située aux limites indécises des États de France, Bourgogne et Lorraine, reste, jusqu'à la conquête de Louis XIV, une terre de surséance. C'est en 1683 que les Fougerollais prêtent le serment de fidélité au roi. La commune est officiellement rattachée au royaume de France en 1704, à la faveur du traité de Besançon qui scelle l'accord entre Louis XIV et le duc Léopold de Lorraine. Elle intègre alors la Franche-Comté, province devenue française au traité de Nimègue, en 1678. Promue chef-lieu de canton en 1790.  Après plusieurs conquêtes de familles Comtoises et Lorraines.","architecture":"Le château de Fougerolles.  Le village  est un hameau qui doit son nom à une forteresse érigée vers la moitié du XIe siècle   Celle-ci dominant la vallée, elle avait une fonction de surveillance des frontières, construit sur l'emplacement d'un ancien château dont-il reste les remparts et une tour ronde et la base d'une autre à l'opposée de l'entrée principale, corps de logis carré à deux niveaux et attiques dans toit à la Mansart, avant-corps saillant en façade. Aujourd'hui transformé en chambres d'hôtes  dans une ancienne forteresse reconstruite en maison de plaisance. La belle demeure est indépendante et agréablement entouré d'un grand jardin avec toutes les commodités.","habitants":"Seigneur de Fougerolles\r\n        \r\n        \"","divers":"Château de Fougerolles","gps":"","images":["../../jctruffet.com/image/image_70/70_Fougerolles_1.jpg","../../jctruffet.com/image/image_70/70_Fougerolles_2.jpg","../../jctruffet.com/image/image_70/70_Fougerolles_3.jpg","../../jctruffet.com/image/image_70/70_Fougerolles_4.jpg","../../jctruffet.com/image/image_70/70_Fougerolles_5.jpg"]},"Consult_chateau_formulaire1ff5":{"id":"Consult_chateau_formulaire1ff5","dept":"70","canton":"Gy","commune":"Frasne-le-Château","nom":"Frasne","type":"Château","periode":"XVI","histoire":"FRASNE; fut longtemps la propriété des chevaliers de Malte,  Le château féodal du XVIe siècle appartenait à la Baronnie dOiselay. Ensuite, il fut la propriété du cardinal de Granvelle, puis de Choiseul et des Magnoncour. Après la Révolution, il devint propriété des surs de la divine providence de Ribeauvillé et pensionnat pour jeunes filles jusqu'en 1904, puis centre pour garçons en difficulté,  et fut occupé par l'école Saint-Joseph jusqu'en 1978. Il a même abrité un hôpital militaire pendant la guerre, aujourd'hui propriété privée.   Le château a donné son nom au village, ce qui prouve son importance. Sa façade nord date du XVIe siècle, elle est attribuée à l'architecte   Antoine d Oiseley et de Hugues Sambin. \r\nUn autre château dans la commune, château de Mugnier,   maison de maître construite au début du XVIIIe siècle (millésime 1714 sur un fronton) . Hormis l'escalier, l'édifice ne conserve plus aucun élément intérieur d'origine.   et possède un escalier en pierre et une rampe en fer forgé. On peut également voir à Frasne une maison noble du XVIe siècle sur la route d'Etrelles , plusieurs maisons du XVIIIe siècle dans le bourg.","architecture":"Du château féodal  de Frasne détruit pendant le règne de Louis XIV, il ne reste de nos jours que lentrée actuelle. Le reste de la bâtisse date du XVIe siècle, corps de logis rectangulaire à trois niveaux et attiques, accolée d'une tour carrée sur un angle, de cette imprenable forteresse il ne reste qu'une porte fortifié et une tour ronde, celle-ci fut transformé en une fastueuse résidence au XVIe siècle et subit une seconde restauration  au XIXe siècle. Dans la cour  intérieure se déploie une belle galerie sur arcades en anse de panier du XVIe siècle. A l'extérieur a gardé son aspect de forteresse, la cour d'honneur malgré la destruction d'une aile, reste l'une des constructions les plus  réussie de la renaissance.         Le château  Mugnier corps de logis de forme carrée à deux niveaux le troisième  ouverture par oeil-de-boeuf  toiture en croupe accolée de tour carrée en angle.","habitants":"Baronnie dOiselay\r\n        \"","divers":"Château de Frasne et de Mugnier","gps":"","images":["../../jctruffet.com/image/image_70/70_Frasne_1.jpg","../../jctruffet.com/image/image_70/70_Frasne_2.jpg","../../jctruffet.com/image/image_70/70_Frasne_3.jpg","../../jctruffet.com/image/image_70/70_Frasne_4.jpg","../../jctruffet.com/image/image_70/70_Frasne_5.jpg","../../jctruffet.com/image/image_70/70_Frasne_6.jpg","../../jctruffet.com/image/image_70/70_Frasne_7.jpg","../../jctruffet.com/image/image_70/70_Frasne_8.jpg"]},"Consult_chateau_formulaireca7b":{"id":"Consult_chateau_formulaireca7b","dept":"70","canton":"Villersexel","commune":"Gouhenans","nom":"Gouhenans","type":"Château","periode":"XV","histoire":"GOUHENANS, fief  dépendant de la  terre des Ganges connu dès 1186,  Il se pourrait que ce soit un chevalier de la famille des Gouhenans, qui soit venu, en octobre 1285, avec d'autres bourguignons (Faucogney, Annegray, Oiselay, Moncley, Saint-Rémi, Passavant ou Grailly) aux festivités de Chauvency-le-Château, a été précédé par une maison forte datant de 1472. Les parties les plus anciennes du château actuel datent du XVe siècle. De l'édifice à ce jour incomplet, on peut admirer la tourelle, la porte d'entrée et les caves voûtées.                                                   La prospérité de Gouhenans fut assurée pendant plus d'un siècle par l'exploitation de son gisement de sel, et la fabrication des produits chimiques qui en dérivaient. Ces salines se classaient parmi les deuxième de France, pour l'importance et la qualité de leur sel. Convoitées, elles furent un objet de scandale, relatée par Victor Hugo dans ses \"choses vues\". Les répercussions de l'affaire entraînèrent la chute de Louis-Philippe, ce qui rendit célèbre le nom de \"Gouhenans\".  Ce château est aujourd'hui la propriété privée d'un chanteur lyrique allemand.","architecture":"Le château de Gouhenans existait déjà au XIVe siècle, c'était une maison forte du Comté de Bourgogne et de nombreuses maisons anciennes subsistent, En 1472, une maison forte est édifiée sur la falaise de Gouhenans en lieu et place du château féodal. Du XVe siècle subsistent encore une tourelle, des caves voûtées immenses et la porte d'entrée. Depuis ses jardins et sa terrasse, le château donne vue sur les Vosges et la chapelle de  Ronchamp.","habitants":"Famille des Gouhenans\r\n        \"","divers":"Château de Gouhenans","gps":"","images":["../../jctruffet.com/image/image_70/70_Gouhenans_1.jpg","../../jctruffet.com/image/image_70/70_Gouhenans_2.jpg","../../jctruffet.com/image/image_70/70_Gouhenans_3.jpg","../../jctruffet.com/image/image_70/70_Gouhenans_4.jpg","../../jctruffet.com/image/image_70/70_Gouhenans_5.jpg","../../jctruffet.com/image/image_70/70_Gouhenans_6.jpg"]},"Consult_chateau_formulairef04b":{"id":"Consult_chateau_formulairef04b","dept":"70","canton":"Villersexel","commune":"Villersexel","nom":"Grammont_Villersexel","type":"Château","periode":"XIX","histoire":"GRAMMONT, au XIIe siècle un château fort  fut construit par la branche cadette de la maison de Bourgogne, les Faucogney, puis les de la Roche. A la fin du XVe siècle destruction de ce château par les armées Suisses, il subsistera de cette première construction qu'une tour dans la cour des communs. La seigneurie passera à la fin du XVIIe siècle au prince d'Arenberg qui le tient de sa mère Henriette de Cuisance de Vergy dame de Villersexel par son premier mariage avec François Just de Rye  qui hérita de la seigneurie, en 1698 le prince d'Arenberg cède à Michel Grammont lieutenant général des armées du roi qui fut érigée en marquisat en 1718, sur l'emplacement du château il fit construire  une vaste demeure  en fer à cheval l'édifice avait trois corps de logis dont le pavillon central était coiffé d'un toit en bulbe, cantonnés de quatre pavillons rectangulaires comptant chacun cinq travées . Malheureusement un nouvel incendie  en 1871 lors d'une bataille franco-allemande qui détruit la demeure, les Grammont entreprennent entre 1882 et 1885 un nouveau château sur les plans de l'architecte Edouard d'Anjoy.  Aujourd'hui propriété de la famille Potet et une partie du château utilisé en hôtel et en musée.","architecture":"le  château de Grammont achevé d'être reconstruit en 1890 sur les ruines du château d'origine fondé au XVIIIe siècle, moins important que le précédant dans un style  Louis XIII cette vaste demeure en brique et pierre est couverte d'un toit d'ardoise à fortes pentes, chevauché par des lucarnes et de oeils-de-boeufs. Un corps de logis central cantonné de deux pavillons dissymétriques en forte pente, l'un a deux travées flanqué d'une avancée en encorbellement abrite l'escalier. L'autre a trois travées accolée d'une tour cylindrique coiffée d'un toit en poivrière. La façade comporte un pavillon saillant central couvert d'un toit à bulbe se détache sur le comble. Grande porte d'entrée avec perron  encadré de deux colonnes de marbre à bossage, à l'étage supérieur un fronton avec les armoiries des Grammont, les fenêtres des travers sont également munis de frontons triangulaires et cintrées.\r\n L'intérieur richement décoré renferme du mobilier du XIXe siècle et divers objets anciens.","habitants":"Famille de Michel Grammont\r\n        \"","divers":"Château des Grammont à Villersexel","gps":"","images":["../../jctruffet.com/image/image_70/70_Grammont_Villersexel_1.jpg","../../jctruffet.com/image/image_70/70_Grammont_Villersexel_2.jpg","../../jctruffet.com/image/image_70/70_Grammont_Villersexel_3.jpg","../../jctruffet.com/image/image_70/70_Grammont_Villersexel_4.jpg","../../jctruffet.com/image/image_70/70_Grammont_Villersexel_5.jpg","../../jctruffet.com/image/image_70/70_Grammont_Villersexel_6.jpg","../../jctruffet.com/image/image_70/70_Grammont_Villersexel_7.jpg"]},"Consult_chateau_formulaire8ca3":{"id":"Consult_chateau_formulaire8ca3","dept":"70","canton":"Villersexel","commune":"Granges-le-Bourg","nom":"Granges_le_Bourg","type":"Vestiges","periode":"XI","histoire":"GRANGES le Bourg, les barons de Granges, vassaux des comtes de Montbéliard, deviennent des seigneurs puissants et respectés. En 1298, Guillaume III de Granges décède, la seigneurie est intégrée au comté de Montbéliard dont elle était vassale. De 1347 à 1350, la grande peste fait des ravages, on dénombre plusieurs centaines de morts dans la seigneurie, il a été supposé qu'ils furent tous enterrés sur le site de la croix Saint-Pierre. En 1377, les Autrichiens s'emparent du bourg mais se révèlent incapables de prendre le château, grâce entre autres à sa position favorable.\r\nEn 1407, la comtesse Henriette de Montbéliard  nommée tante Arie dans le folklore populaire se marie avec Eberard von Würtemberg, prince du duché du même nom. \r\nEn 1456, un incendie ravage le bourg, l'économie de la seigneurie s'effondre et il lui faudra de nombreuses années pour s'en remettre. En 1668, Les troupes de Louis XIV démantèlent le château et commencent l'intégration définitive de la seigneurie au royaume de France.\r\nGranges-le-Bourg fut le chef-lieu d'un canton créé en 1790 et supprimé en 1801.\r\nAu cours de la Révolution Française, la commune porte provisoirement le nom de Granges-le-Haut.","architecture":"Granges le Bourg, du château féodal il ne reste que des ruines pans du mur. Le château  fut construit en 1750-1751 et servait à l'origine de chambre d'audience (tribunal) et de prison.\r\nÀ la Révolution en 1789, le bâtiment fut confisqué, puis vendu aux enchères publiques (10 février 1795). En 1832, la municipalité l'acheta pour y installer une école et la mairie. Les deux cachots existent toujours et on peut y voir les graffitis (noms, dates, dessins) laissés, il y a plus de deux cents ans, par les prisonniers.","habitants":"Famille de Guillaume III de Granges\r\n        \r\n        \"","divers":"Vestiges du château féodal et nouveau château","gps":"","images":["../../jctruffet.com/image/image_70/70_Granges_le_Bourg_1.jpg","../../jctruffet.com/image/image_70/70_Granges_le_Bourg_2.jpg","../../jctruffet.com/image/image_70/70_Granges_le_Bourg_3.jpg"]},"Consult_chateau_formulaire29c0-2":{"id":"Consult_chateau_formulaire29c0-2","dept":"70","canton":"Gray","commune":"Gray","nom":"Gray","type":"Patrimoine","periode":"XII-XVIII","histoire":"GRAY; Cité au IXe siècle, suite aux conflits avec Othon II et Etienne II de Mâcon. En 1227 il est détruit sur ordre d'Othon II, comte de Bourgogne. A l'avènement de Hugues de Chalon en 1248, le château fort est rétabli pour lui servir de résidence. Au XIIe siècle,   Hugues de Chalon   devenu comte par alliance, mais en 1324, l'incendie ravage la ville et atteint le château relevé par la reine Jeanne de Bourgogne, veuve de Philippe V le Long. Son gendre, Eudes IV, achèvera les travaux et entreprend les nouvelles fortifications, la tour de Paravis.                                                  Ancienne forteresse, château de Gray des ducs de Bourgogne. Après le rattachement de la Franche-Comté par la France en 1678 le château devient la propriété du roi qui le revendit à Louis de Fabry marquis de Moncault lieutenant des ses armées et gouverneur de la citadelle de Besancon, dans cette famille jusqu'en 1758, Jean-Baptiste de Fabry  le vend à son beau frère le duc de Grillon, puis passera à la famille Gérard, à Jean du Barry et en 1775 au comte de Provence frère du roi Louis XVI qui sera le dernier propriétaire avant la Révolution. Monsieur Martin, avocat achète le 24 août 1796 le château pour son fils Alexandre qui laissera son nom au musée, a sa mort  il cède le château à Alexandre-Louis Revon qui sera acheté par la commune en 1901.                                   NANTILLY, gentilhommière construite en 1830,  se dresse au milieu d'un parc arboré et fleuri de 4 hectares,  transformé en hôtel restaurant.","architecture":"Gray; porte de Paravis, reste de l'ancienne forteresse, voûtée hérissées de créneaux et de mâchicoulis permet d'accéder au château du comte de Provence, l'hôtel construit au XVIIIe siècle par la famille Fabry  splendide demeure comportant  un rez-de-chaussée  sous un niveau de combles couvert d'un toit en croupes sur lequel se détachent des lucarnes à fronton triangulaire et arrondie. une aile en retour d'équerre sur le côté droit.","habitants":"Baron Martin\r\n        \r\n        \"","divers":"Château du Baron Martin à Grayet le château de Nantilly.","gps":"","images":["../../jctruffet.com/image/image_70/70_Gray_1.jpg","../../jctruffet.com/image/image_70/70_Gray_2.jpg","../../jctruffet.com/image/image_70/70_Gray_3.jpg","../../jctruffet.com/image/image_70/70_Gray_4.jpg","../../jctruffet.com/image/image_70/70_Gray_5.jpg","../../jctruffet.com/image/image_70/70_Gray_6.jpg","../../jctruffet.com/image/image_70/70_Gray_7.jpg","../../jctruffet.com/image/image_70/70_Gray_8.jpg","../../jctruffet.com/image/image_70/70_Gray_9.jpg"]},"Consult_chateau_formulairecdac":{"id":"Consult_chateau_formulairecdac","dept":"70","canton":"Gy","commune":"Gy","nom":"GY","type":"Château","periode":"XVI","histoire":"GY, Importante seigneurie aux mains des archevêques de Besançon dès le Xe siècle jusqu'à la Révolution refuge  et résidence   de plaisance par  les archevêques de Besançon durant plus de 700 ans, permettait de contrôler les voies de communication reliant les Flandres à l'Italie.  A l'origine construit par Charlemagne, construction du château avec un donjon par Guillaume de la Tour, la résidence traditionnelle des archevêques a été reconstruite au XVIe siècle. Antoine de Vergy, puis Claude de la Baume poursuivent les travaux, l'aile gauche, grande salle des chasses. La partie centrale fut construite entre 1498 et 1502 par l'archevêque flamand François de Busleiden, avec une superbe tour d'escalier  octogonale de style flamboyant.  puis transformée au XVIIIe siècle en une résidence princière à la demande du cardinal de Choiseul-Beaupré  qui fit construire deux ailes, ce qui donne au château son aspect actuel. \r\nGrâce aux inventaires établis après la mort de chaque archevêque, le mobilier a pu être reconstitué tel qu'il l'était au XVIIIe siècle.  A la Révolution, le château fut vendu  a Antoine Perrot qui le divisa en 11 lots, loué à des vignerons de la région.    Il fut acheté par la commune en 1830 la partie centrale fut transformée en collège public par madame Menans, tante du maréchal Lyautey  jusqu'en 1974.","architecture":"Le château de Gy,  sera détruit en 1255 et reconstruit aussitôt,   bâti sur les hauteurs de la commune, le château fut plusieurs fois détruit, puis reconstruit aux XVIe et XVIIIe siècles. Ancienne maison forte au XIIIe siècle  en forme de U deux tours carrées seront rajouté à l'ensemble en 1460. La partie centrale fut construite entre 1498 et 1502 avec une superbe tour d'escalier demi-hors oeuvres  octogonale, de part et d'autre de la tour se dressent  deux corps de logis à deux niveaux, l'un s'appuie sur une galerie à triple arcades gothiques, l'autre se singularise par ses nombreuses fenêtres.  Aujourd'hui, le château de Gy est monument privé et ses intérieurs ont été restitués tels qu'ils étaient au XVIIIe siècle.","habitants":"Famille de Guillaume de la Tour\r\n        \r\n        \"","divers":"Château de Gy","gps":"","images":["../../jctruffet.com/image/image_70/70_Gy_1.jpg","../../jctruffet.com/image/image_70/70_Gy_2.jpg","../../jctruffet.com/image/image_70/70_Gy_3.jpg","../../jctruffet.com/image/image_70/70_Gy_4.jpg","../../jctruffet.com/image/image_70/70_Gy_5.jpg","../../jctruffet.com/image/image_70/70_Gy_6.jpg","../../jctruffet.com/image/image_70/70_Gy_7.jpg","../../jctruffet.com/image/image_70/70_Gy_8.jpg"]},"Consult_chateau_formulaireeaf1":{"id":"Consult_chateau_formulaireeaf1","dept":"70","canton":"Hericourt-Lure","commune":"Hericourt","nom":"Hericourt","type":"Tour","periode":"XIII","histoire":"HERICOURT;  au XIIe siècle château des sires de Héricourt, passa à Renaud de Bourgogne, alors comte de Montbéliard, et qui affectionnait de résider au château,  passa à la suzeraineté sur le Châtelot revenant à Jeanne marié à Raoul-Hesse, marquis Magrave  de Bade en 1332.   Selon les dernières volontés de Marguerite de Bade la seigneurie est transmise à sa fille, nommée également Marguerite, épouse de Geoffroy, comte de Linange et de Richecourt, puis acquit en 1369 par les ducs de Habsbourg qui inféodent les sires de Neuchâtel en 1377. L'héritage de Thiébaud IX était transmis à la branche de Neuchâtel-Montaigu en la personne de Jean son frère. Furieux d'être dépossédé de cette riche succession les époux des petite-filles de Thiébaud IX, Félix de Werdemberg et Guillaume de Furstemberg, s'emparent des terres.  Guillaume de Furstemberg reçoit Héricourt ainsi que Châtelot, L'Isle et Clémont. En 1561, lors de la prise du château par les troupes Ulrich VI de Wurtemberg,   Il prend le titre de \"souverain-seigneur\" et entreprend d'élargir les droits de commerce et d'octroyer de nouvelles franchises.  La princesse Magdalena-Sibylla de Wurtemberg, veuve du Duc Léopold-Frédéric vient s'installer au château d'Héricourt à partir de 1662. Un autre souverain européen s'intéresse à Héricourt. Suivant sa fameuse politique des réunions et après avoir conquis la Franche-Comté, Louis XIV s'empare de la seigneurie d'Héricourt en occupant la principauté de Montbéliard de 1676 à 1699. Le prince de Montbéliard est ainsi reconnu comme seigneur dHéricourt.","architecture":"Héricourt, La ville même, avait que deux portes. L'origine du château du XIIe siècle. ruiné en 1425 remanié en 1427. La construction, véritable forteresse du Moyen-Age, se dressait sur un banc de pierre calcaire dans la partie supérieure de la ville côté Nord, flanqué de fortes tours reliées entre elles par un solide rempart de 12 mètres de haut, environné d'un fossé de  4 mètres de large de 8 mètres rempli d'eau, un puits de 26 mètres de profondeur et 2 mètres 50 de diamètre alimentait les habitants du château. La grosse tour du XIVe siècle, est pratiquement tout ce qui reste de l'ancien château féodal d'Héricourt. Ses créneaux d'origine démantelés au XVIIIe siècle ont fait place à une toiture à 4 pans. un escalier de pierre donne accès à 3 salles spacieuses - une cheminée occupe chacune d'elle.  L'enceinte préhistorique était longue de 400 mètres et formait un triangle. Sa hauteur variait de 2,50 à 3,30 m et sa base de 22 à 32 mètres d'ép
