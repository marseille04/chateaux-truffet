HATRIZE, propriété dont l'origine remonte au XVIe siècle mais le percement des baies est modifié aux XVIIIe et XIXe siècles.  Le bâtiment comporte deux étages carrés et est couvert d'un toit à long pans et croupe. Il possède encore des éléments défensifs (échauguettes et canonnières), les échauguettes sont des éléments remarquables de cet édifice. Le percement des baies fut modifié aux XVIIIe et XIXe siècles.\r\nÉléments protégés MH : les façades et les toitures du corps sud des dépendances, y compris l'échauguette; la totalité de l'ancienne maison forte : inscription par arrêté du 18 septembre 1996.","habitants":"famille des Armoises\r\n        \r\n        \"","divers":"gps 49° 11' 34\" N, 5° 54' 37\" Est","gps":"","images":["../image/image_54/54_Hatrize_1.jpg","../image/image_54/54_Hatrize_2.jpg","../image/image_54/54_Hatrize_3.jpg"]},"Consult_chateau_formulaire4116":{"id":"Consult_chateau_formulaire4116","dept":"54","canton":"Liverdun","commune":"Jaulny","nom":"Jaulny","type":"Château","periode":"XV-XVI-XVIII","histoire":"Deux châteaux dans cet article ; Jaulni et Onville                                                     JAULNY, à lintérieur, une importante collection darmes, des faïences et des porcelaines sont exposées dans les salles. Dans le donjon en 1871, deux portraits en médaillon sur une cheminée du XVe siècle sont découverts sous des plâtres suite aux indications du maire de Jaulny affirmant que son arrière arrière grand père avait caché sur les ordres de M. des Armoises avant la Révolution les portraits de Jeanne d'Arc et de son mari Robert des Armoises. En effet, pour les villageois, rien d'étonnant d'être les hôtes de ce fabuleux personnage, la tradition locale depuis la fin du Moyen-Age, en faisait une habitante de leur village. On raconte une tout autre histoire sur Jeanne d'Arc; elle n'était pas lorraine, elle n'était pas la fille des d'Arc, elle se maria et elle fut enterrée à Pulligny sur Madon.                                                                          ONVILLE  au nord -Est de Jaulni à cinq K.M.   Le château de Onville a été construit au XVIIIe siècle, puis transformé au XIXe siècle, il fut endommagé en 1914-1918. Restauré dans les années 1920, il a été transformé en foyer résidence du troisième âge,","architecture":"JAULNY, attesté dès le XIIe siècle, le château présente une enceinte à tours carrées, un donjon du XIIe siècle, des meurtrières du XVe siècle, une tour-porche d'accès du XVIIIe siècle, et un logis remanié du XVIe siècle et XVIIIe siècle.   Le château de Jaulny date des XIe et XIIe siècles. Il est situé à Jaulny en Lorraine, il conserve en partie les caractéristiques des premiers donjons en pierre. Erigé sur une éminence il surplombe le Rupt de Mad. Le château a assuré la ligne de défense de Prény, première capitale du duché lorrain. A voir la tour du pont levis et de la lanterne, une cour fermée par une belle grille signée Jean Lamour, les caves sur quatre niveaux (autrefois coffre fort), la salle de garde. Le donjon du XIIe, les remparts et les meurtrières sont quasiment intacts.  Éléments protégés MH : les façades et les toitures des dépendances ; le bâtiment principal en U (à l'exception des façades et toitures classées) et le pavillon du XVIIIe siècle adjacent : inscription par arrêté du 4 février 1988. Les façades et les toitures du bâtiment principal en U ; le rempart avec son soubassement et la terrasse dallée ; les salles voûtées sous le bâtiment principal et sous la terrasse.               ONVILLE château construit au XVIIIe siècle, transformé au XIXe siècle, endommagé en 1914-1918. Restauré dans les années 1920 puis transformé en foyer résidence du 3e âge.  : élévation à travées; un étage carré ; étage en surcroît, toit à longs pans ; croupe ; toit en pavillon, couvert d'ardoise.","habitants":"Jaulny;Famille de Robert des Armoises\r\n\r\n        \r\n        \"","divers":"Jaulny et Onville grav-4                                                        gps 48° 58' 10\" N, 5° 53' 11\" Est","gps":"","images":["../image/image_54/54_Jaulny_1.jpg","../image/image_54/54_Jaulny_2.jpg","../image/image_54/54_Jaulny_3.jpg","../image/image_54/54_Jaulny_4.jpg"]},"Consult_chateau_formulaired765":{"id":"Consult_chateau_formulaired765","dept":"54","canton":"Laneuveville-devant-Nancy","commune":"Lenoncourt","nom":"Lenoncourt","type":"Château","periode":"XIII","histoire":"LENONCOURT,  pris par les Français en 1646 et rasé par Louis XIV en 1672, pour devenir citadelle de Longwy. Seuls subsistent des souterrains et les vestiges dune tour flanqué de deux tours rondes massives, construit à la fin XIIIe siècle pour le Duc Ferri III, en 1331, Gérard de Nancy prend le nom de Lenoncourt, où il est occupé par le marquis Sublet d'Heudicourt de Lenoncourt, dernier descendant des Lenoncourt.  Il cédera le domaine à Charles-Alexandre  de Monteil de Brunier capitaine de cavalerie en 1788 l'aliène au comte de Croismare qui le revend à un dénommé Vialet, c'est sa fille en 1835 l'apporte en dot au marquis de Lezay-Marmésia, neveu de Stéphanie de Beauharnais, au décés du marquis en 1884. Le marquis de Lezay-Marmésia,  transforma le site médiéval pour en faire une résidence moderne au XIXe siècle et agrémenta de ses propres tableaux les différents salons et l'escalier d'honneur monumental. Les Lezay Marmésia n'ont pas eu d'enfants. Ils adoptèrent Anna de Birague qui se maria au général Godard, en 1930 la générale, seule survivante vendit le château au colonel Dupont de Romémont. en 1970  M. Jacky Defferand se porte acquéreuret remet l'édifice en état. En 1977, ses descendants furent obligés à regret de s'en dessaisir.  Éléments protégés MH Les façades et les toitures du château et la tour isolée dans le parc : classement par arrêté du 3 avril 1984.","architecture":"LENONCOURT,  château fort, probablement du XIe siècle, passé à la fin du XIIe siècle des terres du comte de Bar dans celles du duc de Lorraine, à nouveau passé en 1292 jusqu'à sa destruction, dans les possessions barroises. Seuls subsistent des souterrains et les vestiges dune tour flanqué de deux tours rondes massives, était à l'origine une maison-forte qui servait d'appui au château d'Amance, Il était flanqué de quatre tours dont les murs ont plus de trois mètres d'épaisseur et entouré de douves profondes. Il conservera son allure jusqu'au XVIIIe siècle.","habitants":"Marquis Sublet d'Heudicourt de Lenoncourt\r\n        \r\n        \"","divers":"Château et tour à Lenoncourt                                                    gps  49° 31' 21\"Nord, 5° 45' 47\" Est","gps":"","images":["../image/image_54/54_Lenoncourt_1.jpg","../image/image_54/54_Lenoncourt_2.jpg","../image/image_54/54_Lenoncourt_3.jpg","../image/image_54/54_Lenoncourt_4.jpg"]},"Consult_chateau_formulaire94e7":{"id":"Consult_chateau_formulaire94e7","dept":"54","canton":"Longwy","commune":"Longwy","nom":"Longwy","type":"Châteax-vestiges","periode":"XV-XVI-XIX","histoire":"Six châteaux dans cet article de Longwy; le vieux château ,  Thomas, Aubrives à Villerupt, Dreux, Egremont, Cutry et Saulnes. La Porte de France  du fort.                                                                                                                                                  VIEUX-CHATEAU, est un magnifique héritage médiéval, c'est aujourd'hui une zone arborée, qui constitue un vrai poumon vert entre les deux parties de la ville. Il a été malmené au cours des siècles, maintes fois construit et reconstruit suite aux conflits qui ont bousculé la ville : il passe  entre les mains des comtes de Luxembourg, de Bar et des ducs de Lorraine. Au XVIe siècle, le château était considéré comme le plus important du duché de Lorraine. On sait notamment quautour de léglise et du cimetière, se trouvaient des maisons en torchis avec des toitures en chaume, un refuge des moines dOrval, un couvent des religieuses de la congrégation de Notre-Dame, le donjon, qui était la demeure du seigneur des lieux, une halle, ce château était partagé en trois parties distinctes : le bourg, le donjon et le marché.                                                                                                                                         THOMAS,  de style néo Renaissance construit de 1905 à 1908 pour le banquier Emile Thomas (1839, 1916), fondée avant 1869, transformé en collège et lycée privés des récollets depuis 1967. L'édifice se compose de deux étages carrés et étage de comble, gros-oeuvre en calcaire; moellon; enduit et pierre de taille, élévations à travées surmontées de toit à longs pans brisés ; toit à longs pans ; croupe ; toit conique et dôme polygonal, couverts d'ardoise et zinc en couverture.                                                                                                                                              EGREMONT à l'ouest  du XVIe siècle dont il subsiste la partie gauche de l'élévation principale et l'élévation latérale gauche. Agrandi en 1737 (datation par travaux pour Jean-Baptiste de Failly. Parties agricoles construites dans la première moitié du XIXe siècle,                                              SAULNES dit de Raty à placer proche d'un autre château.","architecture":"AUBRIVES à Villerupt à l'est de Longwy  Nous ne possédons pas d'historique  construit au XVIIIe siècle, élévation à travées avec sous-sol ;et un étage carré, toit à longs pans ; croupe couvert d'ardoises.                                                                    CUTRY à 3 K.M. au sud de Longwy  propriété de la famille de Mercy au XVIIe siècle, vendu vers 1700 à la famille Nicolas, le château fut détruit a milieu du XVIIIe siècle et reconstruit à partir de 1781 (date portée par le dessous d'un des balcons du deuxième niveau de la façade principale) aux frais de la famille de Trelliard. Resté inachevé en 1789.  l'édifice est vendu et partagé en 1809 et transformé en bâtiment agricoles, il a été modifié et repercé au XIXe siècle. Vers 1970, le corps principal a été acquis par la commune de Cutry pour y installer un petit musée archéologique. Elévation à travées ; élévation ordonnancée avec sous-sol ; un étage carré\r\ngros-oeuvre : calcaire ; moellon ; enduit ; pierre de taille, toit à longs pans ; croupe ; toit en pavillon , couvert d'ardoise ; tuile mécanique.                                                   DREUX   à Mont St-Martin  Le château a été construit au début du XXe siècle pour Alexandre Dreux, racheté par la mairie de Mont-Saint-Martin en 1987 pour y faire une maison de retraite. L'édifice se compose d'un étage carré et un étage de comble, gros-oeuvre: calcaire; moellon; enduit; pierre de taille et brique, élévations à travées, surmontées de toit à longs pans ; croupe ; toit en pavillon ; toit brisé en pavillon terrasse ; toit à longs pans brisés, couverts d'ardoise. Maison de retraite.","habitants":"des comtes de Luxembourg                                               Egremont et Failly;  Jean-Baptiste de Failly                                                          Cutry;  famille de Mercy                                                      Dreux,Famille d'Alexandre Dreux\r\n        \r\n        \r\n        \"","divers":"le vieux châteaux , de Thomas grav-9, Aubrives grav-4 à Villerupt, Dreux grav 8, Egremont, petit-failly, Cutry grav 5-6- et Saulnes grav-9.                                                                     Gps 49° 31' 21\" N, 5° 45' 47\" Est","gps":"","images":["../image/image_54/54_Longwy_1.jpg","../image/image_54/54_Longwy_2.jpg","../image/image_54/54_Longwy_3.jpg","../image/image_54/54_Longwy_4.jpg","../image/image_54/54_Longwy_5.jpg","../image/image_54/54_Longwy_6.jpg","../image/image_54/54_Longwy_7.jpg","../image/image_54/54_Longwy_8.jpg","../image/image_54/54_Longwy_9.jpg"]},"Consult_chateau_formulairec78d":{"id":"Consult_chateau_formulairec78d","dept":"54","canton":"Luneville","commune":"Luneville","nom":"Luneville","type":"Palais","periode":"XVI-XVIII","histoire":"LUNEVILLE, il est reconstruit de 1612 à 1624 pour le duc de Lorraine Henri II par l'architecte Jean La Hiere et de Germain Boffrand élève de Mansart . Des réparations importantes ont lieu entre 1698 et 1702 sous la direction de Christophe André et de Paul Heré. Le château est entièrement reconstruit en trois campagnes : première campagne de 1703 à 1705 par l'architecte Pierre Bourdict, la troisième campagne, la plus importante, entre 1719 et 1723 (date d'installation définitive de la cour au château, suite à un incendie qui détruit en partie le corps central et les bâtiments sud, les toits terrasses sont remplacés par des hautes toitures (état actuel).  Après l'installation de Stanislas Leszczynski en 1737,  ce dernier meurt en 1766 et le rattachement de la Lorraine à la France, le mobilier et un certain nombre d'éléments du bâtiment et du jardin sont vendus et dispersés, puis suit une série de destruction et de pillage (décor intérieur, statues du parc) Le château est occupé par les gendarmes rouges entre 1767 et 1788 puis les carabiniers entre 1788 et 1790,  ce qui entraîne une réfection des écuries et de quelques pièces dont la salle des Trophées.   Après une période de désaffectation, le château est occupé par un centre de cavalerie dirigé par Louïs-Aloïs de Hohenlohe en 1816, puis par une division de cavalerie. Au XXe siècle, le château est occupé par le musée, l'armée de terre et (encore présent en 1990), Le 2 janvier 2003, un incendie ravage toute la partie sud-est. La restauration est en cours.","architecture":"LUNEVILLE, le château, dit « Le Versailles lorrain », est un chef-d'uvre de l'architecture du XVIIIe siècle.   Un premier jardin clos de plan régulier est aménagé vers 1620 par Hector Parent pour le château du duc de Lorraine Henri II, on y accédait par un escalier en fer à cheval situé dans l'axe du corps de logis. Il est entièrement modifié dans le premier quart du XVIIIe siècle lors de la reconstruction du château pour le duc Léopold. Appelé les Bosquets dès sa création, ce jardin est aménagé par Yves des Hours à partir de 1707. A partir de 1724, le jardin est agrandi vers le sud-est par Louis Ferdinand de Nesle dit Gervais qui dirige les travaux. Une deuxième période de travaux a lieu pour Stanislas Leszczinsky entre 1737 et 1745 sous la conduite de l'architecte Emmanuel Héré. A la mort de Stanislas, en 1766, les fabriques sont louées à des particuliers, le mobilier vendu ou progressivement vandalisé ; suite aux ventes, certains éléments sont déplacés. En 1800, le jardin est transformé par l'armée : la partie centrale nivelée, les bassins comblés, l'émarchement menant à la terrasse supprimé. Dans les années 1817-1818 (sous l'autorité du prince de Hohenlohe) le jardin est remis en état, de nouveaux sujets plantés, le parterre de l'ancien pavillon de la cascade est transformé en tapis de gazon, la largeur du canal réduite.  Nouvel incendie en 2003 ont dit que ce château est poursuivit par la malédiction brula 13 fois depuis  1719.","habitants":"Duc  Stanislas Leszczynski, et le prince Charles.\r\n        \r\n        \r\n        \"","divers":"Luneville 48° 35' 41\" N, 6° 29' 30\" Est","gps":"","images":["../image/image_54/54_Luneville_1.jpg","../image/image_54/54_Luneville_2.jpg","../image/image_54/54_Luneville_3.jpg","../image/image_54/54_Luneville_4.jpg","../image/image_54/54_Luneville_5.jpg","../image/image_54/54_Luneville_6.jpg","../image/image_54/54_Luneville_7.jpg","../image/image_54/54_Luneville_8.jpg","../image/image_54/54_Luneville_9.jpg"]},"Consult_chateau_formulaire2c80-2":{"id":"Consult_chateau_formulaire2c80-2","dept":"54","canton":"luneville","commune":"Luneville","nom":"Luneville_Favorite","type":"Château","periode":"XVII-XVIII","histoire":"FAVORITE dit aussi du  PRINCE-CHARLE, Le duc Léopold Ier de Lorraine demanda la construction de ce petit château pour son dernier fils Charles-Alexandre (1712-1780). Les travaux débutent après la mort de Léopold Ier en 1730 et se terminent en 1734, sur des plans de l'architecte Germain Boffrand et sous la conduite de Jean Marchal. Charles-Alexandre s'exile à Vienne quand le duché passe sous la coupe de la France en 1736, mais s'il ne vit pas en Lorraine, il entretient son château et en conserve la pleine propriété jusqu'à sa mort en 1780, Stanislas Leszczynski, duc de Lorraine de 1737 à 1766, l'utilise parfois pour y loger temporairement certains de ses favoris. En 1780, le château passe par héritage à l'empereur Joseph II qui le met en vente. Il est alors acheté par un notable de la Cour. La suite des propriétaires successifs du XIXe siècle est mal connue. La commune de Lunéville devient propriétaire du château au cours du XXe siècle et le revend en 1999. Il était alors en bon état de conservation. Mais depuis le début du XXIe siècle, le château ne cesse de se dégrader, il est en 2022 proche de la ruine  cheminées enlevées, décors abîmés, fenêtres murées, toits percés . Le 21 septembre 2011, il est classé entièrement au titre des monuments historiques. Son propriétaire est jugé en 2020 pour abus de biens sociaux, banqueroute, escroquerie et fraude fiscale.","architecture":"FAVORITE, à l'est, côté jardin, la façade est d'époque de la construction, soit du XVIIIe siècle. Un petit corps central à trois baies est entourée de deux ailes symétriques à cinq fenêtres chacune. La façade a deux niveaux de hauteur, le rez-de-chaussée et les combles. À l'ouest, côté ville, la façade originelle a été doublée au cours du XIXe siècle avec un avant-corps carré central entouré de deux ailes symétriques. Cette façade possède trois niveaux de hauteurs, le rez-de-chaussée, un étage carré et des combles. Le sous-sol existant n'a pas de fenêtres vers l'extérieur.\r\nÀ l'intérieur, le corps central renferme le salon ovale (ou salon d'honneur). Le salon est décoré de stucs sur deux niveaux dans la partie haute (une frise sculptée en bas-reliefs figurant huit scènes allégoriques animées de putti au-dessus et douze médaillons dempereurs romains en dessous).    Les trois baies du salon sont surmontées de médaillons décorés du monogramme princier. On trouve également à l'intérieur un vestibule où l'on peut voir le chiffre de Charles-Alexandre incrusté dans le sol. Les combles du château ont été réaménagées à la fin du XIXe siècle.  Au début du premier quart du XIXe siècle, agrandissement du corps central côté ouest, par un avant-corps carré. A la fin du quatrième quart du XIXe siècle, doublement des ailes vers l'ouest et réaménagement des combles. Le château fut racheté par la mairie de Lunéville qui le garda jusquà la fin des années 1990, et à cette date, il passa dans les mains d'un particulier et depuis, il na cessé de se dégrader et aujourdhui son état est proche de la ruine, un incendie a même éclaté le 18 juin 2010, très vite éteint, mais sans quon sache quels dégâts il a occasionné.","habitants":"Duc  Stanislas Leszczynski, et le prince Charles.\r\n        \r\n        \"","divers":"Favorite gps   48° 35' 31\" N, 6° 30' 14\" Est","gps":"","images":["../image/image_54/54_Luneville_Favorite_1.jpg","../image/image_54/54_Luneville_Favorite_2.jpg"]},"Consult_chateau_formulaire85e7":{"id":"Consult_chateau_formulaire85e7","dept":"54","canton":"Jarville-la-Malgrange","commune":"Lupcourt","nom":"Lupcourt","type":"Château","periode":"XV-XVII","histoire":"LUPCOURT, domaine fondé au début du XVIIe siècle et aménagé principalement au début du XVIIIe siècle par la famille de Mahuet. Les dépendances datent de 1610 (elles appartenaient à une maison forte détruite au début du XVIIe siècle). Le parc est aménagé avec ses bassins et ses escaliers au début du XVIIIe siècle (après 1712)..","architecture":"LUPCOURT, Tour carrée, vestige du château XVIe siècle. Ancien domaine du château de Lupcourt, fondé au début du XVIIe siècle et aménagé principalement au début du XVIIIe siècle . Les dépendances datent de 1610. L'ensemble est partiellement inscrit à l'inventaire de M.H. depuis 1996.  Murs de clôture et grille du château ; façades et toitures des deux ensembles de dépendances ; château lui-même ; parc en totalité, lieudit Le château : inscription par arrêté du 18 septembre 1996.","habitants":"famille de Mahuet\r\n        \r\n        \"","divers":"Château de Lupcourt,                                                                     gps 48° 36' 35\" N, 6° 14' 05\" Est","gps":"","images":["../image/image_54/54_Lupcourt_1.jpg","../image/image_54/54_Lupcourt_2.jpg","../image/image_54/54_Lupcourt_3.jpg"]},"Consult_chateau_formulaire934d":{"id":"Consult_chateau_formulaire934d","dept":"54","canton":"Dieulouard","commune":"Mailly sur Seille","nom":"Mailly_Seille","type":"Maison-forte","periode":"XIV-XVI","histoire":"MAILLY, existait dès 1252 et renforcé vers 1376 avec laide financière de lévêque de Metz. Il perd toute fonction militaire au XVIe siècle, et subit des transformations : le fossé disparaît, des fenêtres à meneaux sont percées au XVIIe siècle. Le château actuel qui surplombe le village, magnifiquement restauré et bien entretenu, a conservé trois tours circulaires, et arbore aujourd'hui un style renaissance plus prononcé que sa configuration médiévale d'origine. Restes d'enceinte du XIIIe siècle, trois tours rondes du XIVe siècle percées de fenêtres Renaissance, le logis du XIVe siècle. Éléments protégés MH : les façades et les toitures du corps de logis principal avec ses deux tours et de la tour ouest ainsi que la cheminée de la bibliothèque : inscription par arrêté du 20 octobre 1982.","architecture":"MAILLY,  la construction de la maison forte remonte au XIIe siècle, époque où linsécurité endémique et labsence dune maréchaussée organisée rendaient  nécessaire la prise en main par chaque seigneurie de son autodéfense. Il y avait donc pratiquement dans chaque village de Lorraine une maison forte.   Le général Paul de Lardemelle (1913-2006) ayant hésité en 1960 de cette maison forte, la restaura.  Le chêne à la Vierge : lorsque Ancelin de Mailly revient de croisade, il sarrêta sous un chêne aux confins de sa seigneurie. Cest là que la Vierge lui  apparut et lui dit : « Hâte-toi de rentrer. Ta femme va mourir » Depuis ce jour, le chêne sous lequel sétait produit le miracle devint lobjet de la   vénération publique sous le nom de « Chêne à la Vierge ». Pendant des siècles, on sest rendu en pèlerinage et en procession avec croix et Bannières.   Ce chêne tomba en vétusté en mai 1870. A sa place une colonne surmontée dune statue de la Vierge fut élevée par les soins du comte Alfred de Morville, alors châtelain de Mailly. Elle existe toujours.   Mailly-sur-Seille, le village aux trois Croix. La croix rouge, la croix noire et la croix blanche. Elles étaient là avant 1823. Cétait des croix de  carrefour. Toutes sont placées à la croisée danciennes routes ou chemins importants.","habitants":"l'évêque Thierry V Bayer de Boppard, et général Paul de Lardemelle\r\n        \r\n        \"","divers":"Château à Mailly sur Seille                                                             gps 48° 54' 36\" N, 6° 14' 46\" Est","gps":"","images":["../image/image_54/54_Mailly_Seille_1.jpg","../image/image_54/54_Mailly_Seille_2.jpg","../image/image_54/54_Mailly_Seille_3.jpg","../image/image_54/54_Mailly_Seille_4.jpg"]},"Consult_chateau_formulaire070a-3":{"id":"Consult_chateau_formulaire070a-3","dept":"54","canton":"Joeuf","commune":"Mairy-Mainville","nom":"Mairy_Mainville","type":"Manoir","periode":"XV","histoire":"MAIRY-MAINVILLE,  existence d'un monastère au XIIe. Dans les annales de lEst de 1963, il est dit que le 17 août 1422 : « Charles, duc de Lorraine et Maimbour de René, duc de Bar notifia que Norroy-le-sec, Mainville et Abbeville ont été rachetés à Robert des Armoises, qui les tenait en gagére. Dans les Lettres-patentes du duc Charles IV (1624-1675) , que de Jean de Brandenbourg; reprise par lui en fiefs d'une part des seigneuries de Mainville    ( en 1625). En 1811 rattachement du village de Mainville à Mairy.  Le 9 septembre 1944 se déroule la bataille dite de Mairy entre la 90e Division d'Infanterie américaine et la 106e Panzer Brigade allemande. Après un pilonnage de la colonne de blindés et d'âpres combats de rue, le résultat sera la défaite des troupes allemandes qui se replieront et laisseront 120 hommes sur le terrains ainsi que des blindés détruits lors de l'affrontement. Mairy : village lorrain caractéristique ; en 1817, Mairy, village de l'ancienne province du Barrois sur le Conroy avait pour annexes les moulins de Mandresse, Griman,et Montauban. À cette époque il y avait 359 habitants répartis dans 57 maisons. Mainville, cité ouvrière : en 1817, Mainville, village de l'ancienne province du Barrois.   Le château a été édifié ou reconstruit pour les familles La Roche Serainchamps de 1594 à 1602, dates portées par les armoiries de la façade sur cour du logis. Érigé en fief en 1663 pour la famille de Serainchamps puis passé dans la famille de Gourcy, après 1792, vendu comme bien national. Transformé en ferme, a été repercé au XIXe siècle. Armoiries des familles.  La Roche Serainchamps. sous-sol ; en rez-de-chaussée, toit à longs pans ; croupe, couvert de  tuile creuse et tuile mécanique.","architecture":"MAINVILLE,  était l'ancienne demeure de la famille de Gourcy depuis plus de 4 générations. La bâtisse fut restauré au début du XVIIIe siècle sur des caves datant du Moyen-Âge qui existent toujours. Occupé ensuite par la famille De Beccary puis par la famille Hamang, cette demeure a été racheté par une société de Pont-à-Mousson, la société des «Hauts Fourneaux et Fonderies de Pont-à-Mousson. Puis après cette bâtisse est devenu successivement la propriété de la Société Sidelor « Union sidérurgique lorraine, puis la société Wendel-Sidelor, puis la société « Sacilor-Aciéries et Laminoirs de Lorraine » jusqu'en 1974.                                                                         MAIRY,   ou l'ancienne maison fief de Mairy fut sans doute édifiée, ou reconstruit par le couple La Roche Serainchamps de 1594 à 1602, situé à côté de l'église de Mairy, dates portées par les armoiries de la façade sur cour du logis. Érigé en fief en 1663 pour la famille de Serainchamps puis passé dans la famille de Gourcy de Mainville, après 1792, vendu comme bien national. Transformé en ferme, a été repercé au XIXe siècle. On peut y voir les armoiries des familles La Roche-Serainchamps.","habitants":"Famille de Gourcy \r\n        \r\n        \"","divers":"Château de Mairy-Mainville","gps":"","images":["../image/image_54/54_Mairy_Mainville_1.jpg"]},"Consult_chateau_formulaired057":{"id":"Consult_chateau_formulaired057","dept":"54","canton":"Jarville-la-Malgrange","commune":"Manoncourt sur Seille","nom":"Manoncourt","type":"Château","periode":"XIX","histoire":"MANONCOURT, château Colin du XIXe siècle, acquis par l'industriel Émile Colin, il est aménagé en résidence. La grande salle, d'esprit gothique tardif est ornée de fresques agrestes sur le thème des quatre saisons, réalisées par le peintre Louis Guingot en 1924. Les membres de la famille Marcol, seigneurs de Manoncourt, le font reconstruire au XVIIe siècle. Le château, détruit en grande partie au cours de la guerre 1914-1918, est reconstruit en 1919-1920 par monsieur Colin, un industriel de la région. En 1924, M. Colin commande à lartiste Louis Guingot peintre, décorateur.  Château de Manoncourt a été reconstruit en 1920 sur les parties sauvegardées d'un château du XVIIIe siècle qui est inscrit à l'inventaire des M.H.. Château de Manoncourt a dans sa salle de réception une superbe fresque recouvrant plus de 800 m² en 1924 de Louis guingot, peintre et fondateur de l'école de Nancy. Ces fresques constituent la plus grande oeuvre conservée du peintre. Le parc, les jardins et l'aménagement intérieur, d'inspiration asiatique, rendent cette demeure encore plus exceptionnelle.  Chambres d'hôtes.","architecture":"MANONCOURT,  les membres de la famille Marcol, seigneurs de Manoncourt, le  font construire au XVIIe siècle,  il fut détruit en grande partie au cours de la guerre 1914-1918, est reconstruit en 1919-1920 par monsieur Colin, un industriel de la région. Le château de Manoncourt est alors également appelé \"La Maison Colin\". En 1924, M. Colin commande à lartiste Louis Guingot peintre, décorateur, inventeur et membre fondateur de lécole de Nancy, la réalisation de majestueuses fresques afin de décorer la salle des fêtes du château.","habitants":"famille Marcol et monsieur Colin industriel\r\n        \r\n        \"","divers":"Château de Manoncourt                                                                     gps 48° 52' 32\" N, 6° 11' 50\" Est","gps":"","images":["../image/image_54/54_Manoncourt_1.jpg","../image/image_54/54_Manoncourt_2.jpg","../image/image_54/54_Manoncourt_3.jpg","../image/image_54/54_Manoncourt_4.jpg","../image/image_54/54_Manoncourt_5.jpg","../image/image_54/54_Manoncourt_6.jpg"]},"Consult_chateau_formulaire2ad8":{"id":"Consult_chateau_formulaire2ad8","dept":"54","canton":"Liverdun","commune":"Manonville","nom":"Manonville","type":"Château","periode":"XIV-XV-XVI","histoire":"MANONVILLE,  château du Moyen-Âge XIVe siècle, ayant appartenu aux Barons de Manonville Jean IV de Beauvau et ses descendants, joli château que celui de Manonville, dit le grand gîte entre Pays du Toulois et Bassin nord de Nancy. Faisant face aux côtes de Toul, il dresse son aspect médiéval entretenu par ses tours dangle.","architecture":"MANONVILLE, remanié XVe siècle-XVIe siècle, puis XVIIIe siècle-XIXe siècle avec enceinte fossoyée. Faisant face aux côtes de Toul, il dresse son aspect médiéval entretenu par ses tours dangle. Si peu dinformations sont disponibles sur le château qui nest ni classé ni inscrit aux M.H, construit au Moyen-Âge  château familial dont la construction a débuté au XIIe siècle,  dont lensemble des bâtiments reste le témoin, il a connu des modifications aux XVIe et XVIIe siècles avec une réorganisation des baies repercées à ce moment. Depuis le château na pas trop souffert et son aspect actuel est un fier témoin de sa grandeur passée, une escale reste envisageable dans ces paysages entre vallée de la Moselle et côtes de Meuse,  gîte rural pour profiter des plaisirs de la vie de château comme de la campagne environnante.","habitants":"Barons de Manonville \r\n        \"","divers":"Châteu de Manonville","gps":"","images":["../image/image_54/54_Manonville_1.jpg","../image/image_54/54_Manonville_2.jpg","../image/image_54/54_Manonville_3.jpg","../image/image_54/54_Manonville_4.jpg","../image/image_54/54_Manonville_5.jpg","../image/image_54/54_Manonville_6.jpg","../image/image_54/54_Manonville_7.jpg"]},"Consult_chateau_formulairefad9":{"id":"Consult_chateau_formulairefad9","dept":"54","canton":"Mont-Saint-Martin","commune":"Épiez sur Chiers","nom":"Manteville_Epiez","type":"Maison-forte","periode":"XV-XVII","histoire":"Deux châteaux dans cet artcle; Manteville et Villelongue.                          MANTEVILLE,  propriété de la famille de Manteville, passée à la famille de Reumont puis à la famille de Thomassin de Montbel. Maison-forte construite au XIVe siècle. Des lettres patentes, datées de 1457, apprennent qu'Alexandre de Manteville avait rendu de nombreux services au duc de Bourgogne, Philippe le Bon, pendant que les troupes bourguignonnes guerroyaient au Luxembourg. En 1602, maison-forte avec colombier et dépendances.","architecture":"MANTEVILLE, Maison forte construite au XVe siècle, partiellement repercée au XVIIIe siècle, restaurée limite XIXe siècle-XXe siècle pour le baron de Montbel. En 1903-1904, d'importants travaux de restauration, exécutés pour le baron de Montbel, ont modifié l'extérieur avec le percement de fenêtres, mais sans altérer les intérieurs. Les jardins furent recréés dans le goût classique entre 1905 et 1921, ils sont à léchelle de la maison-forte quils accompagnent. On y trouve, sans ostentation, à la fois de belles vues, des perspectives ponctuées de topiaires ou de vases Médicis, un verger en terrasse et une pièce deau qui reflète le sourire narquois dune nymphe peu farouche. Vers 1944, un incendie détruit l'édifice, mais il sera reconstruit à l'identique par le père de l'actuel propriétaire. Parc réalisé en trois périodes : au XVIIe siècle (canal et terrasse adjacente), au XIXe siècle (escalier et terrasses) et début du XXe siècle (statuaire de 1921-1922).\r\n Éléments défensifs. Mention d'un manoir à Manteville dès 1456 et en 1602 d'une maison forte avec colombier et dépendances. \r\nÉléments protégés MH : les façades et les toitures de l'ancienne maison forte; les jardins : inscription par arrêté du 13 février 1997.","habitants":"Famille de Thomassin de Montbel\r\n        \r\n        \"","divers":"Manteville.     gps 49° 30' 08\" N, 5° 29' 25\" Est","gps":"","images":["../image/image_54/54_Manteville_Epiez_1.jpg","../image/image_54/54_Manteville_Epiez_2.jpg","../image/image_54/54_Manteville_Epiez_3.jpg","../image/image_54/54_Manteville_Epiez_4.jpg"]},"Consult_chateau_formulaired7a7":{"id":"Consult_chateau_formulaired7a7","dept":"54","canton":"Jarny","commune":"Mars la tour","nom":"Mars_la_Tour","type":"château","periode":"XV-XVI","histoire":"MARS LA TOUR,    reconstruit pour Gérard d'Avillers à la fin du XVe siècle à l'emplacement d'un château plus ancien. Il passe par la suite aux Ficquelmont, puis au début du XVIIIe siècle à la famille des Salles, par mariage,  vendu au XVIIIe siècle à la famille de Ficquelmont,  mentionné en 1192.","architecture":"MARS la TOUR;  vendu au XVIIe siècle et en partie démoli les fossés sont comblés. Subsistent au nord à l'est et au sud des éléments de la courtine. Nombreuses marques de tâcherons sur la façade ouest du bâtiment Est des dépendances.  De plan rectangulaire flanqué aux extrémitées de tour rondes à toits coniques, l'ensemble à deux niveaux  en partie démoli.  toit à longs pans ; croupe ; toit conique couvert en ardoise ; tuile mécanique ; tuile plate.","habitants":"Famille de Falquemont\r\n        \r\n        \"","divers":"Château de Mars la Tour","gps":"","images":["../image/image_54/54_Mars_la_Tour_1.jpg","../image/image_54/54_Mars_la_Tour_2.jpg"]},"Consult_chateau_formulaire0a16":{"id":"Consult_chateau_formulaire0a16","dept":"54","canton":"Joeuf","commune":"Joppécourt","nom":"Mercy","type":"Palais","periode":"XIV","histoire":"MERCY, situé en bordure du plateau dominant la Crusne, à 2 km au nord-ouest du village,  il est construit au XIVe siècle pour les comtes de Mercy. En forme d'enceinte de plan rectangulaire (délimitée au nord et au sud par un large fossé), il n'en reste plus aujourd'hui qu'une butte au sud, des vestiges de courtines à l'est et à l'ouest, les traces du logis à l'ouest et, mieux dégagée, une tour circulaire, sur l'angle nord-est. C'est en 1681 que le château de Mercy fut détruit à coups de canon par le maréchal de Créqui. Auparavant le château était propriété de François de Mercy, général au service de Bavière, qui combattit glorieusement contre le duc d'Anguien et contre les maréchaux de Grammont et Turène. Il périt en 1645 à la bataille de Nortlingue. On avait conservé le berceau de ce fameux général dans le château de Mercy.   Pendant la période du rattachement de l'Alsace-Moselle à l'Empire Allemand, Metz se transforme sous laction des autorités impériales, qui font de son urbanisme une vitrine de larchitecture wilhelmienne. Léclectisme architectural se traduit alors par lapparition dédifices de style néoroman, de style néogothique, ou encore de style néo-renaissance. En réaction, certains propriétaires francophiles réagissent, en construisant des édifices clairement dinspiration française. Contemporain du palais du gouverneur, le château de Mercy illustre ce mouvement de résistance, face à la diffusion du style germanique.","architecture":"MERCY, résidence de la famille du Coëtlosquet, le château redevient français en 1919. La Moselle ayant de nouveau été annexée par lAllemagne nazie en 1940, le château sert de « Lazarett », cest-à-dire dhôpital militaire pour larmée allemande. Le Reserv-Lazarett Metz II redevient français en novembre 1944, et, alors qu'il a besoin dune complète rénovation, il sert du 10 avril 1953 au mois de mars 1966 de poste de commandement à la 1re Division aérienne (Europe) de l'Aviation royale canadienne, les derniers militaires canadiens quittant le site le 31 mars 1967. Le château devient une propriété de l'armée française en 1968. De 1968 à 1977, il est le quartier-général de la XVIe brigade mécanisée, puis de 1977 à 1990 du commandement de lartillerie du 1er corps d'armée, du 1er juillet 1990 jusquà sa dissolution en 1993 de la 1re armée puis enfin de la brigade de renseignements et de la guerre électronique. Le château de Mercy et la chapelle, situés au lieu-dit le Clos Nord, sont inscrits en totalité au titre des M.H. par arrêté du 5 juin 2019.  Vendu en 2000 à la communauté dagglomération de Metz-Métropole, le château pèse depuis plus de 20 ans sur les comptes de la collectivité. En 2021 la société WYNN patrimoine située à Nancy se porte acquéreur du château pour le rénover en logements et locaux commerciaux.","habitants":"des  comtes de Mercy\r\n        \r\n        \"","divers":"Château de Mercy à Joppécourt\r\ngps 49° 05' 04\" nord, 6° 14' 38\" est","gps":"","images":["../image/image_54/54_Mercy_1.jpg","../image/image_54/54_Mercy_2.jpg","../image/image_54/54_Mercy_3.jpg"]},"Consult_chateau_formulaire4f74":{"id":"Consult_chateau_formulaire4f74","dept":"54","canton":"Jarny","commune":"Jarny","nom":"Moncel","type":"Château","periode":"XV-XVI","histoire":"MONCEL, le château est cité dès le XIIe siècle, cétait un château fort avec pont-levis et fossés, aujourdhui disparus. En 1277, il eut pour propriétaire le comte du Luxembourg. En 1288, apparaît le 1er seigneur foncier de ce lieu Guerrin de Moncel, qui était chevalier dun seigneur de la maison dApremont. Son fils, Gérardin de Moncel lui succéda en 1330, devint la propriété du comte Henri de Bar en 1342. En 1345,  appartenait à Jean dApremont et à Yolande de Bar. Cest le châtelain de Conflans, Messire Jehan de Naives, chevalier qui lève les impôts, puis se succèdent en 1378, Pierre de Moncel, Jean de Jaulny en 1536, Jean Clément de Doncourt, Hubert de Dieulx en 1565 et en 1625, Antoine Bertrand dAmermont. En 1666, monsieur de Filquemont était seigneur de Moncel et avait la haute, moyenne et basse justice. En 1822, Emile Bouchotte entreprenait la remise en état de la propriété, ce gentleman-farmer se trouvait à la tête dun domaine de 400 ha. Emile Bouchott travailla à la renaissance du domaine et mit en application les idées modernes quil avait acquises lors de son séjour détudes en Angleterre et se consacra à lamélioration de lagriculture dans la région. En 1824 le conseil général de Moselle lui rendit hommage pour ses efforts. Il fut élu à la société des sciences et des arts à Metz.  Ses héritiers vendirent le château en 1909  à la société Schneider. Pendant la guerre de 1914-1918, il fut occupé par les allemands dès le 23 août 1914.","architecture":"MONCEL  Ancienne maison forte du XIIIe siècle, passée en 1633 aux Bettainvillers, maîtres de forge de Moyeuvre, rhabillage au XXe siècle, pastiche du XVIIIe siècle.  En 1831 Moncel fut vendu à Henri de Redon qui augmenta limportance du domaine en créant la maison de ferme de Sainte-Catherine, lacquisition du moulin de Droitaumont et la magnifique propriété de la Grange. Son agrandissement nécessita la construction du petit pont des brebis en 1862. Monsieur de Redon fit lacquisition du chemin qui longe son parc, le château sétait agrandi, ses deux ailes étaient accolées et il prit lallure dun château style XVIIIe siècle et son fronton sorna des armes des de Redon.                                                                                                                                                     JARNY, maison-forte et domaine vendus au XIXe siècle à monsieur de Redon dont le petit-fils rhabilla la maison-forte au début du XXe siècle et lui ajouta deux ailes vers 1905, l'ensemble dans le style du XVIIIe siècle. Le domaine avait été acheté en 1832 par Emile Jean Didier Bouchotte, neveu de l'ancien ministre de la guerre, fondateur de la société agricole de Conflans, qui fit d'heureux essais d'agriculture sur le domaine. Plus de détails, voir le château de Moncel.","habitants":"Famille de Pierre de Moncel,\r\n        \r\n        \"","divers":"A  Jarny le château de Moncel","gps":"","images":["../image/image_54/54_Moncel_1.jpg","../image/image_54/54_Moncel_2.jpg"]},"Consult_chateau_formulaire1757":{"id":"Consult_chateau_formulaire1757","dept":"54","canton":"Laneuveville-devant-Nancy","commune":"Laneuveville-devant-Nancy","nom":"Montaigu_54","type":"Château","periode":"XVII-XVIII","histoire":"Trois châteaux dans cet article; Montaigu, Renemont et Abbé-de-Bouzey.                                                            MONTAIGU, autour d'une chapelle construite en 1625 et qui lui a donné son nom, le château a été élevé en 1757-1758 par Bon Prévost, receveur général des fermes de Lorraine. A partir de 1765, ajout d'un important ensemble de dépendances : orangerie, écuries, pigeonnier et ferme. Le château changea plusieurs fois de propriétaire avant d'être acquis par le marquis de Vaugiraud. Un violent incendie le ravagea en 1921, peu après son achat par Edouard Salin, maître de forge et archéologue, qui en fut le restaurateur. Il a été légué à la ville de Nancy en 1975. Le parc, fortement amoindri lors de la création d'une ligne de chemin de fer (qui a nécessité le déplacement de la chapelle à son emplacement actuel), est orné de groupes sculptés et de vases.  Bon Prévost fait construire à la fin du XVIIIe siècle une maison de plaisance. Demeure dÉdouard Salin à partir de 1920, une partie du parc fut cédé afin d'y édifier le musée de l'histoire du Fer.                                                       RENEMONT à Jarville, quartier voisin.  En 1823, François Gouy, propriétaire du château de style renaissance édifié dans ce parc, féru dhistoire, baptisa ce site parc de Renémont en mémoire de René II.  La bâtisse subit plusieurs transformations au cours du temps, mais on peut toujours y admirer une superbe façade Visconti sur lun des pignons du petit château. Par la suite, un petit séminaire y fut construit. Aujourdhui, les compagnons du devoir y cohabitent avec un centre de formation, de logistique et de conduite.","architecture":"MONTAIGU, le marquis de Vaugiraud, vers 1869  entreprit d'importants travaux avec l'architecte Jasson (transformation de la demeure en véritable château, doublement des écuries par l'adjonction de boxes)                                                                                                                      Au coeur du parc de Montaigu, à deux pas du musée de l'histoire du fer, venez visiter cette élégante demeure du  XVIIIe siècle ; cabinets de curiosité et objets rares réunis en un lieu d'exception par Edouard Salin, industriel, archéologue et collectionneur ayant habité le château au XXe siècle. C'est une des rares demeures de Lorraine ayant conservé le mobilier de son propriétaire.   Éléments protégés MH : la chapelle de Montaigu, dans le parc du château : inscription par arrêté du 22 janvier 1934. Le château, à l'exception des parties classées : inscription par arrêté du 6 décembre 1957. Les façades et les toitures du château et le parc: classement par arrêté du 27 janvier 1958. Les dépendances : inscription par arrêté du 7 avril 1998.                                                                                                              ABBE-de-BOUZEY,  le château a été construit au XVIIIe siècle (1750-1760) pour l'abbé Jean Claude de Bouzey, grand doyen de la primatiale de Nancy et abbé de Belchamp (à Méhoncourt). L'édifice est remarquable par sa façade est, qui surplombe, en terrasses, la Meurthe. Le parc doté d'un nymphée et d'une fontaine donne sur la chartreuse de Bosserville. Côté rue, la façade aux proportions élégantes est sobrement décorée et deux petits anges sculpteurs encadrent le portail.\r\nÉléments protégés MH : le château proprement dit ; le mur de la terrasse ; le nymphée ; l'escalier de plan circulaire ; la fontaine ; le parc : classement par arrêté du 26 mars 1958.","habitants":"Montaigu ; marquis de Vaugiraud,                                      Rénemont; Famille de François Gouy.                                               Abbé!   Jean Claude de Bouzey\r\n        \r\n        \"","divers":"A Laneuville devant Nancy les châteaux; Montaigu, Renemont grav 4-5-6 et Abbé de Bouzey.                           Montaigu gps 48° 39' 48\" N, 6° 12' 57\" Est","gps":"","images":["../image/image_54/54_Montaigu_54_1.jpg","../image/image_54/54_Montaigu_54_2.jpg","../image/image_54/54_Montaigu_54_3.jpg","../image/image_54/54_Montaigu_54_4.jpg","../image/image_54/54_Montaigu_54_5.jpg","../image/image_54/54_Montaigu_54_6.jpg"]},"Consult_chateau_formulairee7bd":{"id":"Consult_chateau_formulairee7bd","dept":"54","canton":"Pont à Mousson","commune":"Pont à Mousson","nom":"Mousson","type":"Vestiges","periode":"XIII","histoire":"MOUSSON, dominant la vallée de la Moselle, Mousson a toujours occupé une situation privilégiée dans lhistoire de la Lorraine. Dès lépoque romaine, Mousson est un point de passage sur la voie principale Lyon-Trèves. Au XIe siècle, en haut de la butte les puissants ducs de Bar, font édifier un château fortifié. Louis de Montbéliard, duc de Bar, épouse Ermentrude de Bourgogne. Il aura sept enfants dont Thierry II qui prendra le nom de comte de Mousson, Frédéric qui deviendra le premier comte de Ferrette. En 1113, Renaud Ier de Mousson est fait prisonnier par l'empereur Henry IV. La forteresse est défendue par l'épouse du prisonnier Gillette de Briey. La résistance fut efficace et les troupes impériale sont tenues en échec. L'empereur construit une potence devant le château et menace d'y pendre le comte de Mousson si son épouse ne rend pas la place. Hugues de Mousson était né durant la nuit. Gillette fit savoir qu'il pouvait pendre son époux car celui-ci était déjà remplacé. Henry IV décida de pendre Renaud qui ne du la vie sauve que sur l'insistance des nobles qui commandaient l'armée impériale. La famille de Mousson va s'éteindre après dix huit générations. Le dernier de la lignée deviendra marquis de Pont.","architecture":"MOUSSON, Ruines d'enceinte et du château : pans de murs du donjon \"la Grosse Tour\". Il fut rasé en 948 par le duc de Lorraine, reconstruit et agrandi par les comtes de Bar du XIIe et XIIIe siècle ; assiégé en 1476 par Charles le Téméraire ; démantelé en 1635 par Richelieu et rasé en 1944. A la fin du XIXe siècle, le château était un belvédère qui permettait de contempler les terres Mosellanes perdues. A cette époque le château accueille l'église paroissiale et le cimetière. Lors du premier conflit mondial le château et un poste d'observation de choix. Tout un réseau de souterrains fut creusé. Les batteries allemandes pilonnèrent la place et le village anéantissant église et cimetière. Aujourd'hui, il ne subsiste du château qu'une partie des remparts extérieurs dont la hauteur atteint dix mètres. Plusieurs vestiges se trouvant dans des propriétés privées ne sont pas accessibles, comme la chapelle Templière. L'enceinte du village présente les vestiges de deux portes fortes. La chapelle dite des Templiers possède des éléments décoratifs qui permettent de la dater vers 1190/1200. Cette chapelle possède une abside de style roman, un transept et deux chapelles latérales de style gothique. Elle a également des archères défensives et ne possède pas de nef. La chapelle fut incendiée en septembre 1944 puis à partir du XXe siècle, elle fut désaffectée et transformée en ferme. Elle se situe dans le mur denceinte extérieur du bourg castral de Mousson.","habitants":"Louis de Montbéliard\r\n        \r\n        \"","divers":"Vesztiges à Mousson                                                                       Gps 48° 54' 17\"N, 6° 04' 39\" Est","gps":"","images":["../image/image_54/54_Mousson_1.jpg","../image/image_54/54_Mousson_2.jpg","../image/image_54/54_Mousson_3.jpg","../image/image_54/54_Mousson_4.jpg","../image/image_54/54_Mousson_5.jpg","../image/image_54/54_Mousson_6.jpg"]},"Consult_chateau_formulaire8314":{"id":"Consult_chateau_formulaire8314","dept":"54","canton":"Luneville","commune":"Moyen","nom":"Moyen","type":"Vestiges","periode":"XII-XV","histoire":"MOYEN, château mentionné au XIIe siècle ; acquis au XIIIe siècle par les évêques de Metz qui lui donnèrent, au XVe siècle, le nom de Qui-Qu'en-Grogne en le reconstruisant ; pris en 1597 par le duc de Bouillon et en 1653 par les français qui le démantelèrent en 1639. Un seul bâtiment a survécu jusqu'en 1956 (incendie). Le château du Qui qu'en Grogne est un château qui a subi de nombreuses transformations jusqu'à nos jours. On pense qu'un lieu fortifié existait déjà à l'époque gallo-romaine comme le nom du lieu (Medium Castrum) le laisse supposer.  Durant le haut Moyen Âge (XIIe siècle), le nom de Moyen apparait dans de nombreux documents comme un lieu fortifié.\r\nDu XIIIe au XVe siècles, Moyen devient une châtellerie importante qui comprend les communes environnantes et qui dépend des évêques de Metz.\r\nC'est au milieu du XVe siècle, que l'évêque de Metz (Conrad Bayer de Boppart) rase l'ancien château pour y construire une puissante forteresse. C'est de cette reconstruction que nous devons le château dans l'état où nous le connaissons aujourd'hui. Adapté pour l'artillerie, il présente des caractéristiques propre à l'usage des canons et autres couleuvrines qui font alors leur apparition sur la scène de l'armement.  La révolution (1789) viendra finir le travail de Richelieu qui en 1639 avait fait démanteler le château. En 1983, une association locale décide de s'atteler à la mise en valeur du site. De nombreux chantiers de restauration sont alors mis en uvre chaque année.","architecture":"MOYEN, le château était approximativement carré avec une double enceinte. Les murailles de l'enceinte extérieure avaient treize mètres de haut et faisaient un mètre soixante d'épaisseur. La muraille intérieure était encore plus forte avec seize mètres de haut et deux mètres cinquante d'épaisseur. Les bâtiments étaient adossés à cette muraille, et entouraient une cour rectangulaire. Les ruines du château font l'objet de différentes protections. Le 3 juin 1932, un site naturel classé de 2 ha de nature historique est créé autour du château. Le château a tout d'abord été inscrit M.H. le 19 janvier 1927, puis partiellement classé le 18 novembre 1985. Il fait lobjet dun classement au titre des M.H. depuis le 16 octobre 1992. Les parties classées le sont en tant que « bâtiments, ruines et vestiges » (y compris la porte nord-est, la tour de la prison, la chapelle et la tour sud, le logis avec cave ouest et la maison seigneuriale). L'arrêté de classement de 1992 annule les précédentes inscriptions et classements.","habitants":"Evêque de Metz (Conrad Bayer de Boppart)\r\n        \r\n        \"","divers":"Vestiges et château à Moyen                                                                  gps 48° 28' 56\" N, 6° 34' 14\" Est","gps":"","images":["../image/image_54/54_Moyen_1.jpg","../image/image_54/54_Moyen_2.jpg","../image/image_54/54_Moyen_3.jpg","../image/image_54/54_Moyen_4.jpg"]},"Consult_chateau_formulaire4c5a":{"id":"Consult_chateau_formulaire4c5a","dept":"54","canton":"Nancy","commune":"Nancy","nom":"Nancy","type":"Palais","periode":"XV-XVII-XIX","histoire":"A Nancy plusieurs châteaux le Palais des ducs ( voir article) , Bradois, Lillebonne, Rémicourt et Majorelle.                                                                                                                                                                                                                                                                              BRABOIS ,  propriété de la métropole du grand Nancy depuis 1995, le château de Brabois est situé sur le territoire de Villers-lès-Nancy, aux portes de Vanduvre-lès-Nancy. Abandonné depuis plusieurs années, létat général du bâtiment impose dimportants travaux de rénovation. Sa vétusté nécessite une réhabilitation profonde et des investissements financiers conséquents.   La réhabilitation concernera lensemble du clos et couvert de lédifice?: ravalement de façades, restauration de la charpente, couverture et des zingueries. Les menuiseries extérieures seront également intégralement changées.  Situé idéalement au cur du technopôle Henri-Poincaré et à lentrée du parc de Brabois, poumon vert de la métropole du grand Nancy, le château de Brabois fut édifié au XVIIe siècle.                                                                                 LILLEBONNE, il a été bâti pour Claude de Beauvau par larchitecte Nicolas La Hiere. Devenu propriété ducale, il est offert par Charles IV à sa fille Anne, épouse du prince de Lillebonne. Sa façade de style italianisant reflète les échanges artistiques entre la Lorraine et lItalie à la fin du XVIe siècle. Lescalier constitue lélément artistique le plus remarquable de lhôtel ; il rappelle celui du château de Fléville, également possession des Beauvau. Il est décoré de fines sculptures à entrelacs et à palmettes. Lédifice est un des plus importants témoins de larchitecture Renaissance à Nancy.\r\nCédé en 1972 à de Nancy, il accueille une maison des jeunes et de la culture.","architecture":"NANCY, le cours Léopold est une place de Nancy rendant hommage à Léopold Ier, père du dernier duc de Lorraine régnant et issu de la maison de Lorraine ! Il est bordé tant par des habitations que le campus droit, économie, gestion de l'université de Lorraine. C'est l'un des grands axes pour pénétrer au cur de la ville de Nancy en arrivant du nord. Il dessert la vieille ville et arrive près de la gare du centre-ville.  Passionné dart et darchitecture, Stanislas Leszczynski transforme Nancy en faisant construire les trois places classées patrimoine mondial par lUnesco depuis 1983. Piétonnisée en 2005, la place Stanislas compte parmi les plus belles places du monde. Le XVIIIe siècle à Nancy cest aussi des bâtiments emblématiques comme la bibliothèque Stanislas, lhôtel des missions royales, les portes Stanislas et sainte Catherine ainsi que léglise Notre-Dame de Bonsecours qui abrite le sanctuaire de la famille Leszczynski.                                                     MAJORELLE villa,l'artiste et entrepreneur Louis Majorelle, installé depuis 20 ans à Nancy, souhaite déplacer ses ateliers qu'il juge trop étroits. Il décide alors d'acheter un terrain à sa belle-mère, Mme Kretz, dans le quartier appelé alors Médreville : il s'agit d'un territoire composé essentiellement de terres agricoles et de quelques propriétés bourgeoises et faisait alors partie des terres que la municipalité de Nancy avait choisies pour étendre son urbanisation répondant à l'augmentation de la population. Il choisit, par commodité, de faire installer sa maison à proximité de ses ateliers.                                                                                                 REMICOURT, deux résidences neuves constituées de 65 appartements avec terrasse du T2 au T5. 6 appartements restaurés dans le château au 1er étage. Le bâtiment rose actuel sera démoli et deviendra un parc à la française. La façade du château, l'appentis et la chapelle seront préservés.","habitants":"Nancy;  Stanislas Leszczynski\r\n        \r\n        \"","divers":"A Nancy les châteaux; , Bradois grav-4, Lillebonne grav-5  , et Majorelle grav 6    Rémicourt grav 7                                                      .gps  48° 04' 49\" N, 6° 10' 49\" Est","gps":"","images":["../image/image_54/54_Nancy_1.jpg","../image/image_54/54_Nancy_2.jpg","../image/image_54/54_Nancy_3.jpg","../image/image_54/54_Nancy_4.jpg","../image/image_54/54_Nancy_5.jpg","../image/image_54/54_Nancy_6.jpg","../image/image_54/54_Nancy_7.jpg"]},"Consult_chateau_formulairea883-2":{"id":"Consult_chateau_formulairea883-2","dept":"54","canton":"Nancy","commune":"Nancy","nom":"Nancy_Palais","type":"Palais","periode":"XV","histoire":"PALAIS DES DUCS DE LORRAINE, à la suite de la défaite de Charles le Téméraire, lors de la bataille de Nancy en 1477, le château des ducs de Lorraine était dans un état de délabrement avancé. Le duc René II ordonna en 1502 la reconstruction du château dans le style de l'époque, à savoir un palais de style Renaissance. Les travaux se poursuivirent jusqu'en 1512, sous le règne du duc Antoine qui est certainement l'instigateur de la porterie comportant sa propre statue équestre. Le palais fut largement réduit sous le règne de Léopold Ier de Lorraine qui avait de plus grands projets.  Le palais fait l'objet de plusieurs protections au titre des M.H..\r\n L'ancien château ducal fait lobjet dun classement au titre des M.H. par la liste de 1840. Le cartouche sculpté, présente sur la porte d'accès du gardien du palais ducal fait lobjet dune inscription au titre des M.H. depuis le 14 mars 1944.  Le bâtiment Morey (façades et toitures), le bâtiment de la Petite Carrière (façades et toitures), le mur vestige du Louvre de Boffrand, l'ancienne petite écurie adossée à ce mur, ainsi que l'ancien bâtiment scolaire (façades et toitures), ainsi que les sols des cours du palais et de la Petite Carrière fait lobjet dun classement au titre des M.H.  depuis le 21 décembre 2005.\r\nLes parties intérieures du bâtiment de la Petite Carrière font lobjet dune inscription au titre des M.H. depuis le 21 décembre 2005.","architecture":"PALAIS DES DUCS, est un bâtiment du XVIe siècle. Avec sa porterie, typique du style gothique flamboyant,  est le résultat architectural réussi de l'union de deux styles : le gothique flamboyant et Renaissance, ce dernier style étant relativement tardif en Lorraine. D'un style très proche de celui du château de Blois, la porterie présente la statue équestre du duc Antoine de Lorraine sous un impressionnant gâble flamboyant dû à l'architecte Jacques Vauthier en 1511-1512. La décoration est typique de la première renaissance lorraine dont les décors italinisants sont particulièrement raffinés (candélabres végétaux, angelots, coquilles).\r\nLa statue équestre de 1512, due à Mansuy Gauvin, a été détruite en 1792 puis remplacée par une uvre de Giorné Viard en 1851. La façade sur rue est ponctuée de fenêtres Renaissance disposant, au premier étage, de balcons gothique flamboyant. Sur les fondations de ce gigantesque palais inachevé, le roi de Pologne et duc de Lorraine Stanislas Leszczynski fit bâtir le palais du Gouverneur et son jardin.   À la suite de l'incendie de 1871, une partie septentrionale de la façade fut restaurée dans un style Renaissance beaucoup plus affirmé que pour la porterie. Si la construction avait été menée à son terme, le palais de Léopold Ier de Lorraine aurait dû avoir les dimensions du palais du Gouverneur et de son jardin, sur le principe de la cour carrée du Louvre.  il abrite aujourd'hui le musée historique lorrain.","habitants":"Nancy ; ducs de Lorraine\r\n        \r\n        \"","divers":"Le palais Ducal à Nancy palais du gouvernement grav-6","gps":"","images":["../image/image_54/54_Nancy_Palais_1.jpg","../image/image_54/54_Nancy_Palais_2.jpg","../image/image_54/54_Nancy_Palais_3.jpg","../image/image_54/54_Nancy_Palais_4.jpg","../image/image_54/54_Nancy_Palais_5.jpg","../image/image_54/54_Nancy_Palais_6.jpg","../image/image_54/54_Nancy_Palais_7.jpg"]},"Consult_chateau_formulaire41d8":{"id":"Consult_chateau_formulaire41d8","dept":"54","canton":"Vézelise","commune":"Neuviller sur Moselle","nom":"Neuviller","type":"château","periode":"XII-XV","histoire":"NEUVILLER, existe en 1170. Je n'ai malheureusement pas trouvé beaucoup d'élément pour ce qui concerne la période médiévale. La forteresse semble avoir été tenue par la famille de Neuviller dont l'un de ses membre apparaît en 1469. Anne de Neuviller sera la vingt sixième abbesse de l'abbaye de Vergaville. En 1553, la forteresse est une vaste enceinte flanquée de cinq tours. Au XVIIIe siècle elle est la propriété de la famille de Salm-Salm. Alors que le duc de Lorraine François III accède au titre d'empereur d'Autriche, le roi Louis XV,  s'arrange pour faire nommer son beau-père à la tête du duché. Roi déchu de Pologne Stanislas Lesczynski  est déjà âgé. Par cette manuvre, le roi de France s'assure  de l'héritage du duché au décès de beau papa. Pour préparer le pays à sa future situation de province française, il délègue un homme de confiance le chancelier Antoine-Martin de Caumont de la Galaizière qui va être de fait le véritable souverain de Lorraine. Dans cette perspective, le roi Stanislas achète le château de Neuviller au prince Nicolas-Léopold de Salm-Salm le 17 décembre 1749. La vielle forteresse est totalement remaniée  jusqu'en 1756. Un château classique est bâtit sur la terrasse supérieure, les communs médiévaux sont conservés. Château construit de 1756 à 1759 par le chancelier Stanislas Lesczynski en y intégrant des éléments datant de la fin du XVe siècle et du XVIe siècle.","architecture":"NEUVILLER, château fort mentionné en 1091, rasé et remplacé par un château Renaissance du XVIe siècle qui fut lui aussi démantelé ; enfin  le château du  XVIIIe siècle édifié par le chancelier Antoine-Martin Chaumont de La Galaizière dont la plus grande partie fut démolie fin XIXe siècle : subsistent une partie du bâtiment principal et de très vastes dépendances, vestiges médiévaux.  Perché sur les hauteurs du village, le château de Neuviller-sur-Moselle domine la vallée de cette belle rivière. Ancienne demeure médiévale, les tours au bas du village témoignent de l'ancien système défensif du château. : subsistent une partie du bâtiment principal et de très vastes dépendances, vestiges médiévaux.  Éléments protégés MH : les façades et les toitures du château et des dépendances ; la terrasse, les murs, les grilles, les vestiges médiévaux ; la salle à manger, la cuisine, l'escalier et le vestibule : inscription par arrêté du 30 décembre 1993.","habitants":"famille de Salm-Salm.\r\n        \r\n        \"","divers":"Neuviller sur Moselle                                                                         gps 48° 29' 36\" N, 6° 17' 13\" Est","gps":"","images":["../image/image_54/54_Neuviller_1.jpg","../image/image_54/54_Neuviller_2.jpg","../image/image_54/54_Neuviller_3.jpg","../image/image_54/54_Neuviller_4.jpg","../image/image_54/54_Neuviller_5.jpg","../image/image_54/54_Neuviller_6.jpg"]},"Consult_chateau_formulaire3396":{"id":"Consult_chateau_formulaire3396","dept":"54","canton":"Dieulouard","commune":"Nomény","nom":"Nomény","type":"Vestiges","periode":"XIV-XVI","histoire":"Trois châteaux  dans cet article; Nomény, Jeandelaincourt et Thézey.                                                                                   NOMENY, propriété de l'église depuis sa création au XIe siècle, le château de Nomeny passa donc entre les mains de cette branche cadette de la maison de Lorraine. En 1548, le cardinal Jean de Lorraine, prince de la Renaissance qui était également évêque de Metz, vendit le château à son jeune neveu Nicolas de Lorraine, comte de Vaudémont et duc de Mercoeur, marié alors à Marguerite d'Egmont qui fut sa première épouse. En 1553, y naquit la première fille du couple, prénommée Louise. Cette fillette devait connaître un destin hors du commun puisqu'en 1575 elle épousa le dernier des rois Valois, Henri III, devenant la \"bonne reine Louise\", une des souveraines les plus pieuses et les plus douces de l'histoire de France et qui forma avec son époux un couple très uni. Le grand malheur de Louise, outre l'assassinat de son époux par le moine ligueur Jacques Clément, fut de ne pouvoir avoir d'enfants. Cette absence d'héritier Valois entretint les guerres de religion et la vindicte de la Ligue mais elle permit, en fin de compte, l'accession au trône de France du premier des souverains de la maison de Bourbon: Henri de Navarre qui prit la couronne sous le nom d'Henri IV. En 1671, le château est démantelé sur ordre de Louis XIV. Il ne sera jamais reconstruit. Sa dernière avanie survint dans les années 1960, lorsque le maire utilisa la cour du château comme dépotoir pour accueillir les gravats et les remblais provenant du chantier de construction de l'école communale.                                                                                           A 10 K.M au sud le château de JEANDELAINCOURT   sont des édifices du XIVe au XVIIe siècles. La maison forte \"La Horgne\" est une imposante bâtisse qui possède une façade sobre et une tour ronde sur l'arrière. La seconde maison forte possède une façade avec fenêtres à croisée et la date \"1318\" inscrite sous le blason des seigneurs de Jeandelaincourt. \r\nTour ronde à l'arrière du château au lieu dit \"La Horgne\" à Jeandelaincourt.","architecture":"NOMENY, les écrits médiévaux mentionnent une forteresse qui aurait été construite à la fin du XIe siècle à Nomeny par les évêques de Metz. Sa forme définitive semble être déjà fixée dès cette époque : plan quadrangulaire très légèrement trapézoïdal, cantonné à trois de ses angles de tours circulaires et au quatrième d'un gros donjon en fer à cheval dont la façade sur la cour intérieure présentait deux saillies en éperon. Au nord, à l'est et à l'ouest, de larges et profonds fossés interdisaient l'approche et l'entrée, côté village, était défendue par un châtelet.  La forteresse du XIe siècle et le château du XIVe siècle des évêques de Metz dont les vestiges se limitent à ceux de trois tours, du châtelet et des quatre courtines de la forteresse. Du château, il ne reste que la cour pavée dont seule la moitié nord a été mise au jour. \r\nAu cours des siècles, le château subit des modifications dont certaines furent importantes. Peu après le milieu du XIVe siècle, souhaitant utiliser Nomeny comme \"château-étape\" lorsqu'ils visitaient leur domaine temporel, les évêques de Metz firent édifier dans la cour de l'austère forteresse un logis-palais leur offrant un confort digne de leur rang ecclésiastique. L'édification de ce logis entraîna de profondes transformations, transforma ainsi la courtine du côté du village en un mur de soutènement. La porterie d'entrée fut aussi déplacée. Au milieu du XVe, le château fut adapté à l'artillerie.  \r\nÉléments protégés MH : les ruines du château y compris le sol : classement par arrêté du 6 décembre 1984.                                                                     THEZEY   à St-Martin,  vestiges de la maison forte mentionné en 1453 : enceinte avec porte cochère à bretèche, logis remanié aux XVIe et XVIIe siècles ; chapelle castrale voûtée d'ogives, restes de donjon ; cheminée monumentale.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Nomény grav 1-2-3-4, Jeandelaincourt  grav-5  et Thézey grav-6. Gps 48° 53' 28\" N, 6° 13' 25\" Est                                           Thezey  gps 48° 54' 10\" N, 6° 17' 44\" Est","gps":"","images":["../image/image_54/54_Nom%c3%a9ny_1.jpg","../image/image_54/54_Nom%c3%a9ny_2.jpg","../image/image_54/54_Nom%c3%a9ny_3.jpg","../image/image_54/54_Nom%c3%a9ny_4.jpg","../image/image_54/54_Nom%c3%a9ny_5.jpg","../image/image_54/54_Nom%c3%a9ny_6.jpg"]},"Consult_chateau_formulaire7d69":{"id":"Consult_chateau_formulaire7d69","dept":"54","canton":"Baccarat","commune":"Pierre-Percée","nom":"Pierre_Percée","type":"Vestiges","periode":"XII-","histoire":"PIERRE-PERCEE, le château fut le premier fief des comtes de Salm en Lorraine. Au Xe siècle, une tour sélevait déjà sur léperon rocheux. Au XIIe siècle, Agnès de Langstein, femme du comte de Salm Herman. Cest celui-ci qui donna son nom à lédifice qui devint ainsi Pierre-Percée. La configuration des lieux mettait le château à labri de toute attaque surprise, une centaine dhommes suffisait pour défendre lensemble. Le Comte de Salm y établit sa résidence. Quelques maisons simplantèrent en contre-bas du château et formèrent la base du village actuel. En 1132, lEvêque de Metz Etienne de Bar, grand batailleur, décida dassiéger la forteresse pour mettre un terme aux pillages que les soldats du château pratiquaient aux alentours. Puisquelle était considérée comme imprenable par la force, il décida de la réduire par la famine. La Vallée de Celles était sous bonne garde. LEvêque possédait en effet le château de Dame-Galle non loin des Roches de la Pierre à Cheval. Les bases de celui-ci sont encore visibles de nos jours. Par ailleurs, un groupe de soldats allemands campait près de la Roche des Corbeaux. Les hommes du comte de Bar sétablirent quant à eux sur la Côte dOrtomont. Le siège dura plus dun an. Etienne de Bar finit par sen emparer et fit passer la garnison au fil de lépée. Pendant les guerres du XVIIe siècle, les troupes qui ravagèrent le pays semparèrent de la forteresse après lavoir incendiée. Celle-ci fut démantelée par la suite sur lordre de Richelieu. classement par arrêté du 21 septembre 1981                                                                             DAME-GALLE    Édifié en 1135 sur ordre de lévêque de METZ Etienne de BAR, en même temps que deux autre forteresses voisines qui ont quasiment disparu  pour servir de base arrière au siège du château de Langestein . L'un de ces autres châteaux de siège se trouvait au site de la Roche des Corbeaux, l'autre sur la roche d'Ortromont. Simple fortin à l'origine, il est destiné au cantonnement des troupes de lévêque qui assiégeait le château voisin où réside le comte Hermann II de Salm. qui trouvera la mort au cours des combats.","architecture":"PIERRE-PERCEE, les ruines du donjon du château dominent le village. Édifié au XIIe siècle, il est alors la résidence de la famille de Langestein dont la dernière héritière du château,  étendit la fortification sur toute létendue du monticule, soit sur près de 150 mètres. La muraille fut formée en blocs de grès massifs, grossièrement taillés. Une deuxième enceinte englobait des dépendances, constituées par les habitations des défenseurs. Le donjon carré, dont la ruine est encore visible, défendait lentrée du château. Un puits très profond de quatre mètres de diamètre fut creusé près de la grande tour sur ordre dAgnès de Langstein, afin dalimenter la forteresse en eau. Cest celui-ci qui donna son nom à lédifice qui devint ainsi Pierre-Percée. La configuration des lieux mettait le château à labri de toute attaque surprise, une centaine dhommes suffisait pour défendre lensemble. Il est pillé et incendié pendant la Guerre de Trente Ans et abandonné. Pierre-Percée na plus été reconstruit, et ses pierres ont été utilisées comme matériaux de construction. De l'imposante structure du château ne subsiste de nos jours que quelques murs modestes à lextrémité ouest-sud-ouest, dont une tour-donjon de section carrée de 8 × 8 m sélevant encore jusquà 13 mètres. Réalisée en bel appareil, percé dun fenestron de style roman, elle daterait du XIIe siècle. Il est propriété de l'Office national des forêts qui assure également l'entretien du site.                                                                      DAME GALLE, construit sur un entablement rocheux à pic sur trois côtés on distingue les bases de plusieurs murs dont le tracé du donjon carré. Les abords directs du site sont envahis de végétation d'où émerge une multitude de pierre provenant du château. Très rares vestiges.","habitants":"lEvêque de Metz Etienne de Bar\r\n        \r\n        \"","divers":"Vestiges de la Pierre Percée  et de la Dame de Galle  grav-4       gps 48° 28' 13\" N, 6° 55' 49\" Est","gps":"","images":["../image/image_54/54_Pierre_Perc%c3%a9e_1.jpg","../image/image_54/54_Pierre_Perc%c3%a9e_2.jpg","../image/image_54/54_Pierre_Perc%c3%a9e_3.jpg","../image/image_54/54_Pierre_Perc%c3%a9e_4.jpg"]},"Consult_chateau_formulairecdc3":{"id":"Consult_chateau_formulairecdc3","dept":"54","canton":"Liverdun","commune":"Martincourt","nom":"Pierrefort_54","type":"Forteresse","periode":"XIII","histoire":"PIERREFORT, évêque de Metz qui le céda à Pierre de Bar, son frère, si fameux dans les annales du pays. Il passa ensuite au comte de Deux Ponts qui avait épousé la sur de Henri de Bar, puis la terre fut donnée encore en fief au comte de Nassau Sarrebrück, qui en fit la renonciation en 1448. Le Duc René devint alors possesseur de Pierrefort, mais il eut d'abord à lutter contre le duc de Bourgogne qui s'en était emparé : les Lorrains reprirent la forteresse et la rasèrent. Dans les guerres qui eurent lieu entre les comtes de Bar et les évêques de Metz, la garnison fit des sorties jusqu'aux portes de Metz et elle se vit aussi enfermée bien souvent dans les murailles du fort. Le duc René l'assiégea y mit le feu et détruisit le donjon et en cela il rendit service au pays dont ce redoutable manoir était la terreur, une foule d'exactions commises par les seigneurs de Pierrefort avait excité une haine et une horreur profonde dans le cur des habitants du voisinage. Il ne subsiste aujourd'hui que de faibles débris du fier château qui était bâti sur le roc, dans une position d'accès difficile et très avantageuse. La terre de Pierrefort avait pour derniers seigneurs les marquis d'Heudicourt, sous la suzeraineté de Lorraine, et ensuite de France, elle était composée des villages de Pierrefort, Martincourt et la Cense de Nanceuil: il y avait une chapelle, construite en 1619, par la comtesse de Lenoncourt de la maison de Beauveau et dame de Pierrefort : cette chapelle n'existe plus. classement par liste de 1862.","architecture":"PIERREFORT, château fort édifié par Pierre de Bar en 1306, aujourd'hui occupé par une exploitation agricole : restes d'enceinte fossoyée, chemin de ronde couvert, portail porche, tours rondes, bretèche, ce château fort est composé de bâtiments fort vastes mais très délabrés avec des intérieurs en mauvais états, jardins, cour immense, huilerie avec un battoir à grains et de nombreux greniers et très étendus, c'est tout ce qui reste de l'orgueilleux manoir féodal qui se dressait autrefois sur le rocher de Pierrefort. Il avait été bâti par Renaud de Bar, évêque de Metz qui le céda à Pierre de Bar, son frère, si fameux dans les annales du pays.","habitants":"Pierre de Bar\r\n        \r\n        \"","divers":"Remparts de Pierrefort                                                                             gps 48° 50' 29\" N, 5° 56' 19\" Est","gps":"","images":["../image/image_54/54_Pierrefort_54_1.jpg","../image/image_54/54_Pierrefort_54_2.jpg","../image/image_54/54_Pierrefort_54_3.jpg"]},"Consult_chateau_formulaire3f37":{"id":"Consult_chateau_formulaire3f37","dept":"54","canton":"Dieulouard","commune":"Port-sur seille","nom":"Port_sur_Seille","type":"vestiges","periode":"XIII-XIV-XV","histoire":"PORT SUR SEILLE, se trouve sur la commune du même nom, à lentrée Est du village et en bordure de la rivière Seille. Bâti  au XIIIe siècle, c'est une possession des ducs de Bar.  En 1334, il est inféodé à Lallemand de Domert. Lors de la bataille de Bulgneville le 2 juillet 1431 qui oppose la maison de Vaudemont alliée des Bourguignons au duc René II, le châtelain de Port, Philippe de Norroy est fait prisonnier. Pour payer sa rançon il faudra engager le château à la ville de Metz qui y installe un occupant. En 1440, c'est dans ce château que sera signé par toute la chevalerie de Lorraine, le traité entre le duc René II et l'évêque de Metz Conrad Bayer  de Bopart. Philippe de Noroy ayant retrouver la liberté n'accepte pas l'usurpateur dans son château et en 1446 il expulse les messins. Une paix castrale réglera le conflit. Au cours des années et après lextinction des Noroy, les familles occupant le château vont se succéder: Raigecourt, Cherisey-Nouroy, dont Marguerite sera l'une des Dames de Remiremont. En 1610, le château est en état de décrépitude avancé et sera progressivement abandonné. a fait passer la terre de Port-sur-Seille dans cette dernière maison, d'où elle vint aux Raigecourt, aux Ludres, aux Gournay, et enfin à M. le comte de Rosières, qui la vendit vers 1840.\r\nDOMBASLE , le château est connu au XIV° siècle. Il est occupé par l'écuyer Jean de Dombasle en 1394 mais il est postérieur à cette époque, villégiature du XIXe siècle.On ne sait pas grand chose de l'histoire de la forteresse, ci ce n'est qu'elle fut habitée jusqu'en 1852. Reconstruit en 1859 tout en conservant son caractère médiéval, le château sera utilisé comme \"rafraichissoir\" de 1906 à 1935 pour le compte des brasseries de ST-Nicolas -de-Port. Il servit aussi de houblonnière.","architecture":"PORT SUR SEILLE, cest au vieux château  où les tours dominent la vallée, que fut signé par toute la chevalerie lorraine, le traité du 29 avril 1440, entre le roi de Sicile, duc de Lorraine et l'évêque Conrad Bayer de Boppart. Philippe de Nouroy ayant été fait prisonnier à la bataille de Bulgnéville, dut engager le tiers, par indivis, des châteaux et forteresses de Port-sur-Seille aux Messins, pour en avoir l'argent de sa rançon, que lui fit obtenir son cousin Jean de Chérisey. Un traité fut passé à cet effet, le 14 août 1451. Il y avait, dans les chapelles de l'église, dix grandes tombes très remarquables au musée de Nancy. Le territoire de Port-sur-Seille était traversé par une voie romaine partant de la station du mont Hiéraple et aboutissant à Scarpone.  Port sur Seille subsiste encore les restes du donjon carré dont les murs présentent une épaisseur de 3,40 mètres sur une hauteur de 14 mètres, ainsi que divers vestiges de murailles.  Au début du XXe siècle les ruines seront fortement endommagées lors des combats de 14-18. Le donjon est visible depuis la route départementale qui traverse le village. Vestiges du château du XIVe au XVe siècle  : subsiste le donjon décoiffé. C'est dans ce château que fut signé pour toute la chevalerie lorraine le traité du 29 avril 1440 entre le roi de Sicile  René d'Anjou duc de Lorraine et l'évêque de Metz Conrad II Bayer de Boppard.                                                                                                                                 DOMBASLE, il était de forme polygonale et construit sur motte laquelle pourrait avoir été un tumulus gaulois. La porte forte était flanquée de deux tours rondes. L'enceinte protégeait un gros donjon. Le tout était entouré de profonds fossés qui furent comblés lors de son utilisation par les brasseurs. La place aurait aussi posséder plusieurs souterrains.","habitants":"des ducs de Bar. Et famille de  Philippe de Noroy \r\n        \r\n        \r\n        \"","divers":"à  Port-sur seille vestiges et château Dombasle grav 3","gps":"","images":["../image/image_54/54_Port_sur_Seill%c3%a9_1.jpg","../image/image_54/54_Port_sur_Seill%c3%a9_2.jpg","../image/image_54/54_Port_sur_Seill%c3%a9_3.jpg"]},"Consult_chateau_formulaireb337":{"id":"Consult_chateau_formulaireb337","dept":"54","canton":"Pont-à-Mousson","commune":"Prény","nom":"Prény","type":"Vestiges","periode":"XII-XIII","histoire":"PRENY, est un château fort médiéval, il constituait la dernière forteresse des ducs de Lorraine face aux évêques de Metz. Le premier château de Prény fut érigé sur des terres de l'abbaye de Saint-Pierre aux Nonnains dont le duc de Lorraine devint l'avoué. D'abord confiée à des fidèles de la dynastie lorraine, les de Conflans qui devinrent les de Prény, la citadelle devint au XIIe siècle la résidence principale des ducs de Lorraine avant leur installation à Nancy en 1298. Alors que Mathieu Ier de Lorraine, duc de 1139 à 1176, était à Prény, le château fut assiégé par Étienne de Bar, évêque de Metz, qui occupa le siège épiscopal de cette ville de 1121 à 1162.  Les duchés de Bar et de Lorraine ayant été unifiés au XVe siècle sous la bannière de René Ier d'Anjou, son utilité stratégique est amoindrie et son entretien est peu assuré car il coûte cher aux f
