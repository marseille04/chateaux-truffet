"type":"Château","img":"../image/image_54/54_Xonville_1.jpg"}];const FULL={"Consult_chateau_formulaire8388":{"id":"Consult_chateau_formulaire8388","dept":"54","canton":"Luneville","commune":"Rehainviller","nom":"Adoménil","type":"Château","periode":"XV-XVI","histoire":"ADOMENIL, le 26 août 1605, Jean des Fours, seigneur de Mont, obtint du duc Charles III le droit d'ériger en fief la maison, où il faisait sa résidence de lieu Hadoménil avec le droit de tenir  le troupeau à part et de bâtir le colombier. Mathieu de la Haye, gentilhomme ordinaire de la chambre du duc de Lorraine, fait bâtir le château 20 décembre 1617. En 1664, Ferdinand Hennequin de Gellenoncourt fit ses reprises pour la seigneurie de Frenel, les fiefs d'Adoménil et de Rehainviller. En 1888, M. Emile Guérin, propriétaire des faïenceries de Lunéville, restaure la chapelle et le château pour en faire la résidence familiale et le lieu privilégié daccueil de ses hôtes de marque. Cette famille, puis un des gendres, M. le baron de Ravinel et ses enfants, conservèrent la propriété jusquen 1978, pour la céder ensuite à M. Michel Million qui souhaitait offrir un cadre harmonieux et confortable à ses clients. La famille Guérin, propriétaire de la faïencerie de Lunéville, racheta le château en 1888, transmission au baron de Ravinel. Actuellement hôtel et restauration gastronomique. Le restaurant fût créé dès le début, complété quelques années plus tard par quelques jolies chambres et appartements.","architecture":"ADOMENIL, Le logis présente un plan carré flanqué aux quatre angles de tours carrées, couvertes en ardoises, il est accompagné de communs couverts en longs pans et tuiles mécaniques, plus récents qui ferment sur trois côtés la cour d'honneur. La toiture du logis est à forte pente mais la charpente a été refaite au XXe siècle avec le même profil. L'édifice est construit en moellon enduit sans modénature spécifique. A l'arrière des communs, deux autres bâtiments de communs délimitent une cour secondaire qui ouvre sur le potager en terrasse.   Éléments protégés MH : le château d'Adoménil : les parties suivantes du château localisées sur le plan annexé à l'arrêté : les façades et les toitures du logis et des communs ; la chapelle en totalité ; le bâtiment du pressoir; le parc et le jardin en totalité, incluant la fabrique et la serre : inscription par arrêté du 28 mai 2015   Construit à partir de 1617 par Mathieu de la Haye. Reconstruction par les Hennequin de Gellenoncourt (comtes de Curel) au XVIIIe siècle.","habitants":"Famille Ferdinand Hennequin de Gellenoncourt \r\n        \r\n        \r\n        \"","divers":"Rehainviller  château d'Adoménil                                               gps 48° 33' 53\" N, 6° 27' 46\" Est","gps":"","images":["../image/image_54/54_Adomenil_1.jpg","../image/image_54/54_Adomenil_2.jpg","../image/image_54/54_Adomenil_3.jpg","../image/image_54/54_Adomenil_4.jpg","../image/image_54/54_Adomenil_5.jpg"]},"Consult_chateau_formulairedc95":{"id":"Consult_chateau_formulairedc95","dept":"54","canton":"Meine au Saintois","commune":"Affracourt","nom":"Affracourt","type":"Château","periode":"XVII","histoire":"AFFRACOURT, demeure construite durant le XVIIe siècle; il s'agissait  d'une maison forte édifiée pour le seigneur du lieu bien qu'aucun élément défensif ne soit aujourd'hui visible. Possédée au XIVe siècle par la famille d'Affracourt, en fief des comtes de Vaudémont, la seigneurie appartenait en 1647 à Simonin d'Autrey, et en 1663 à Paul de Ludres. Au XVIIIe siècle, le manoir fait l'objet de travaux importants : un corps de bâtiment est accolé en retour de la façade antérieure, du côté ouest, faisant pendant à l'aile existante englobant en partie la tour hors-oeuvre, ce nouveau corps contient les pièces de service. Le décor intérieur est renouvelé : sont posés lambris de hauteur et d'appui, cheminées. Un jardin est aménagé au nord du bâtiment, ouvert sur la campagne, il devait être agrémenté d'un bassin dont la vasque de fontaine, surmontée d'un groupe sculpté, a été déplacée sur la terrasse. La grille en ferronnerie du portail d'accès au jardin est ornée du monogramme du propriétaire de l'époque. Au XIXe siècle, les baies de la façade latérale ouest sont modifiées et les pièces du premier étage reçoivent un nouveau décor (cheminées, lambris, parquet) parmi lequel un ensemble stuqué dû en partie au décorateur Joseph Beunat, la baie centrale au premier étage de la façade postérieure est ouverte en porte fenêtre sur un balcon dont le garde-corps provient des usines du Val d'Osne, un escalier en bois vient remplacer l'ancien contenu dans la tour carrée; par ailleurs, est conservé un papier peint du milieu XIXe siècle. Dans les années 1950 une bibliothèque murale est installée dans une pièce du premier étage. Édifice composé d'un corps de bâtiment principal carré couvert d'un haut toit à longs pans en  croupes, encadré, sur la façade antérieure (côté cour), de deux ailes en retour d'équerre et, sur la façade postérieure (côté jardin), d'une petite aile en retour à l'est et d'une tour d'escalier carrée demi-hors oeuvre à l'ouest. La composition d'ensemble est identique à celle d'un hôtel urbain entre cour et jardin.","architecture":"AFFRACOURT, la façade postérieure nord ouvre sur une terrasse et un vaste jardin clos de mur, actuellement aménagé en partie en verger et structuré par une allée centrale bordée d'une banquette de buis ;  il contient une remise en appentis ouverte et un colombier couvert d'un toit conique à tuiles plates en écaille. L'élévation du corps principal compte trois travées et deux niveaux surmontés d'un étage de comble, la porte est décentrée à droite, les baies sont à linteau droit mouluré et conservent le départ de meneaux. Le corps latéral droit (ouest) contient : une cuisine avec cheminée adossée en pierre,  une pièce au nord de la cuisine avec placard (chauffant) au revers de la cheminée. A l'extrémité sud de ce corps s'élève une tour de plan carré, couverte en pavillon et tuiles plates en écaille, surmontée d'une girouette à oriflamme simple. La tour, en partie intégrée dans le corps latéral (ajouté au XVIIIe siècle), est demi-hors-oeuvre et contient un escalier à retours en bois. Le corps en retour côté jardin contient au rez-de-chaussée une cheminée adossée. Parmi les quatre pièces du rez-de-chaussée du corps principal, trois contiennent des lambris d'appui,  deux fenêtres (rez-de-chaussée, façade postérieure) ont conservé leur châssis chantourné à petits cadres. Sur la terrasse se trouve une vasque de fontaine, de plan ovale, dont les orifices des conduites en plomb sont dissimulées, de chaque côté, dans la gueule d'un mascaron animalier ; cette vasque est surmontée d'une statue.","habitants":"Famille d'Affracourt\r\n        \r\n        \r\n        \"","divers":"Affracourt          gps 48° 27' 38\" N, 6° 10' 13\" Est","gps":"","images":["../image/image_54/54_Affracourt_1.jpg"]},"Consult_chateau_formulaireb32d":{"id":"Consult_chateau_formulaireb32d","dept":"54","canton":"Grand Couronné","commune":"Art sur Meurthe,","nom":"Art_sur_Meurthe","type":"Château","periode":"XVII-XVIII","histoire":"ART sur MEURTHE,  le château aurait été construit dans les années 1750-1760 par les soins dune femme. On sait quen 1766 il était habité. Celle qui lavait fait construire était la veuve du comte Claude Joseph Aubertin de Juvrecourt, colonel de la garde de SAR, le grand duc de Toscane. Les travaux durèrent une petite quinzaine dannées et la vie de château put commencer. Dès 1772, Christine de Sarazin avait fait venir auprès delle sa cousine Anne Thérèse de Sarazin et son époux François Joseph de Bloise pour lui succéder un jour au château. Difficile den savoir plus, et sur cette noble dame, et sur les premiers châtelains, étant donné quun certain jour de 1793 on brûla en place publique tous les documents concernant les ci-devant châtelains. En 1936, établis au château, les marianistes installèrent une école qui fonctionnera jusque dans les années 1960, avec une interruption due à la deuxième guerre mondiale où l'édifice aurait été réquisitionné pour des chantiers de jeunesse organisés par le régime de Vichy. Avec la confiance de la mairie dArt sur Meurthe, Alain Marcotullio PDG du traiteur renommé de Nancy, reprend le château en 2000.   Propriété de Georges-Timothée Masson au XIXe siècle.  Actuellement propriété de la commune.","architecture":"ART sur MEURTHE château du XVII de plan rectangulaire allongé  de deux niveaux sur soubassement accolé de pavillons aux extrémités dans le même style.","habitants":"comte Claude Joseph Aubertin de Juvrecourt\r\n        \r\n        \"","divers":"Art-sur-Meurthe   gps 48° 39' 26\" N, 6° 15' 53\" Est","gps":"","images":["../image/image_54/54_Art_sur_Meurthe_1.jpg"]},"Consult_chateau_formulaire5320":{"id":"Consult_chateau_formulaire5320","dept":"54","canton":"Baccarat","commune":"Baccarat","nom":"Baccarat","type":"Château","periode":"XVII-XVIII","histoire":"BACCARAT, construit en 1764. Agrandi pour Aimé d'Artigues, acquéreur de la verrerie en 1816, par l'adjonction de deux corps de logis latéraux en 1817. Utilisé comme logement des administrateurs de la cristallerie au milieu du XIXe siècle. Une partie du rez-de-chaussée a été transformé en musée des cristaux produits à Baccarat.","architecture":"BACCARAT, musée  situé dans l'ancienne demeure de l'administrateur de la manufacture, le musée du cristal a trouvé sa place au sein même du site de fabrication, il est le reflet de l'histoire légendaire de Baccarat qui reçut sa première commande royale en 1823 du roi Louis XVIII. Ce fut le début d'une longue série de commandes pour les familles royales et chefs d'état de toute la planète. Le parc a été coupé en deux par une rue ouverte dans la première moitié du XIXe siècle, une partie à l'ouest de l'orangerie a été lotie, dans les dernières années du XIXe siècle, pour la construction d'une cité ouvrière. Le corps central: toit à longs pans brisés en croupe ainsi que les corps latéraux; écurie et logement de domestiques moellon enduit sans chaîne en pierre de taille, toit à longs pans en tuile mécanique; remise: appentis; buanderie en brique ; glacière : coupole; orangerie en demi-croupe en tuile mécanique, musée des cristaux.","habitants":"Famille d'Aimée d'Artigues\r\n        \r\n        \"","divers":"Château grav-2 et musée grav 1-3 à Baccarat","gps":"","images":["../image/image_54/54_Baccarat_1.jpg","../image/image_54/54_Baccarat_2.jpg","../image/image_54/54_Baccarat_3.jpg"]},"Consult_chateau_formulairec3b9":{"id":"Consult_chateau_formulairec3b9","dept":"54","canton":"Entre Seille et Meurthe","commune":"Belleau","nom":"Belleau","type":"Château","periode":"XII-XIV-XVii","histoire":"Deux châteaux à Belleau ; Colin et Morey                                                                    COLIN, château datant de la première moitié du XIXe siècle, endommagé au cours de la première guerre mondiale. Acquis par l'industriel Emile Colin, il est aménagé en résidence de 1920 à 1924 par Georges Biet, architecte de l'école de Nancy. La grande salle, d'esprit gothique tardif, dotée d'une cheminée monumentale, est ornée de \"fresques\" agrès tes sur le thème des quatre saisons, réalisées par le peintre Louis Guingot.\r\nÉléments protégés MH : la grande salle et son vestibule ; les façades et les toitures qui les abritent et le décor intérieur : inscription par arrêté du 9 avril 1990.","architecture":"MOREY,  aurait été construit au XIIe siècle sur les ruines dun couvent des templiers. Après la disparitions des sires de Morey au XIVe siècle, cest le seigneur Jehan de Toulon, voué de Nomeny qui repris la maison-forte jusquau XVIIe siècle. La propriété passa ensuite à Brassel Joly de Morey jusquau début du 1900. Succéda l'écrivain George Ducrocq. En 1985, il fut ravagé par un incendie et laissé à labandon. Il ne restait que quatre murs quand la famille Karst a repris la demeure et l'a relevée avec courage et détermination. Cadre magnifique au milieu d'un jardin soutenu par une muraille de plus de cinq mètres de hauteur ou s'élèvent marronniers, cèdre du Liban, tilleuls, hêtres pourpres, chênes, érable et marre aux canards.  Château du XVIe / XVIIe siècle : porte classée ; rénové à la suite d'un incendie aujourd'hui chambres d'hôtes de charme et gite.  M. Hug, conseiller à la ville de Nancy, possède le château jusquen 1975. M. Materen est propriétaire ensuite. Il y avait ouvert un restaurant le week-end. Le château fut détruit par un incendie en juillet 1985 sur toute sa superficie et abandonné pendant huit ans. La porte  est classée au titre des monuments historiques depuis 1930.\r\nLa famille Karst en est actuellement propriétaire et a procédé à de nombreuses restaurations. Le château est actuellement destiné à la location d'espace de réception pour des mariages et événements ainsi qu'une activité de chambres d'hôtes.","habitants":"Famille d'Emile Colin                                                                Brassel Joly de Morey \r\n        \r\n        \"","divers":"à Belleau ; Colin grav-1  et Morey  grav-2 3-4                                                         Morey gps  48° 49' 38\" N, 6° 09' 45\" Est","gps":"","images":["../image/image_54/54_Belleau_1.jpg","../image/image_54/54_Belleau_2.jpg","../image/image_54/54_Belleau_3.jpg","../image/image_54/54_Belleau_4.jpg"]},"Consult_chateau_formulairee428":{"id":"Consult_chateau_formulairee428","dept":"54","canton":"Baccarat","commune":"Blamont","nom":"Blamont","type":"Vestiges","periode":"XII","histoire":"BLAMONT, le comte de Salm installe sur la rive droite de la Vezouze un lignage de chevaliers vassaux qui commence sans doute l'édification d'un donjon fortifié, fin XIIe siècle, afin de contrôler le passage dans la vallée. C'est avec le règne de Henri Ier de Blâmont, au XIIIe siècle, que la seigneurie de Blâmont prend son essor, il bâtit l'enceinte de pierre du bourg entre 1290 et 1311 et agrandit le château. A la fin de l'été 1587 le château est assiégé par les troupes protestantes venues d'Allemagne, les reîtres qui causent quelques dégâts, notamment par le feu. Le duc Charles III renforce alors la défense du site en l'adaptant à l'artillerie. Comme toutes les places fortifiés de Lorraine, Blâmont est attaqué par les troupes de Richelieu et de Louis XIII pendant la guerre de Trente Ans, et du 28 au 31 août 1638, les troupes de Bernard de Saxe-Weimar assiègent et incendient la ville, défendue par François de Klopstein. En novembre 1638, les troupes françaises démantèlent le château et l'enceinte urbaine à l'issue d'un second siège.\r\nMadame Claude Perron à crée un restaurant dans une tour.","architecture":"BLAMONT, construit à la fin du XIIe siècle, agrandi successivement du XIIIe au XVIIe siècle, il ne reste que les vestiges des fortifications médiévales grâce à la conservation en élévation de 5 tours. Éléments protégés MH : les ruines du château de Blâmont : inscription par arrêté du 17 février 1994.","habitants":"Seigneur de Blamont\r\n        \r\n        \"","divers":"Blamont gps 48° 35' 29\" N, 6° 50' 43\" Est","gps":"","images":["../image/image_54/54_Blamont_1.jpg","../image/image_54/54_Blamont_2.jpg","../image/image_54/54_Blamont_3.jpg","../image/image_54/54_Blamont_4.jpg","../image/image_54/54_Blamont_5.jpg"]},"Consult_chateau_formulaire1c75":{"id":"Consult_chateau_formulaire1c75","dept":"54","canton":"Liverdun","commune":"Boucq","nom":"Boucq","type":"Maison-forte","periode":"XIII","histoire":"BOUCQ, vers 1500 est construit le \"petit château\", attenant à l'église, pour Roger ou Nicolas de Mercy, Au début du XVIIe siècle et principalement en 1611, date portée par l'échauguette sud-est, importants travaux réalisés pour la famille de Fligny du Fey : surélévation du deuxième étage, réfection de la toiture, ouverture de hautes baies à encadrement sculpté (façade droite), installation des échauguettes sur les angles sud-est et sud-ouest, de l'assommoir au-dessus de la porte d'entrée, pose de l'escalier rampe sur rampe, redistribution intérieure et aménagement des caves en sous-oeuvre. A la fin du XVIIe siècle, alors que le château est aux mains de la famille de Magnicourt, est cité un colombier sur trois piliers. En 1718, pour les Fontenoy ; le domaine est acheté en 1740 par Jean-François Rémy Tardif d'Hamonville, ingénieur en chef des fortifications de Toul. On lui doit le réaménagement intérieur (lambris) du rez-de-chaussée et la construction du portail sur la Grande rue ; en 1768, le domaine compte le logement du fermier et, sur le même alignement, les écuries et engrangements (disparus) et, à gauche de la porte d'entrée de la cour, la chambre à fours. Au début du XIXe siècle, repercement de fenêtres, reprise du décor intérieur, habillage des plafonds à poutres et solives ; en 1804, construction du corps latéral, alors limité au rez-de-chaussée d'après le Gal de Morlaincourt ; en 1835, date portée, Jean-Charles Louis Edouard de Morlaincourt fait construire le chai, long de 100 m, par l'entrepreneur Joseph Demange.; après 1840, construction, pour le comte Pinieux, d'une citerne (disparue), du mur de clôture, de la tour nord-ouest et de chambres de domestiques dans le comble du corps principal, de l'étage du corps attenant, de la serre froide (ou orangerie) au nord.","architecture":"BOUCQ, l'édifice est flanqué de deux tourelles semi-circulaires aux angles nord et est, percées de fenêtres, substituées au XVIe siècle à des ouvertures de tir. La tourelle Est comporte des traces d'arrachement, orientées en direction de l'église, située quelques mètres plus loin, attestant, avec la porte murée d'un étage du clocher, d'une ancienne enceinte faisant la jonction entre le château et l'église. En outre, des encoches taillées dans la pierre prouvent qu'une porterie, située au pied de la tourelle, était percée dans l'enceinte. Quant aux angles sud et ouest, ils sont tous deux flanqués de bretèches à mâchicoulis, percées d'une petite ouverture, supportées par sept consoles ou corbeaux en pierre, et couvertes d'un toit à quatre pans. Une autre bretèche, percée d'une petite ouverture et supportée par quatre consoles, défend la porte d'entrée de la façade sud-ouest. Les façades sont percées de fenêtres, certaines à encadrement sculpté en feuilles d'acanthe et des traces de meneaux de la fin du XVIe siècle. La demeure est couverte d'une toiture à quatre pans, percée de deux lucarnes côté sud-est et de chien-assis sur les trois autres pans. Corps principal construit en pierre de taille, à deux étages carrés et étage de comble ; sous-sol couvert en plein cintre ; toits des échauguettes en pavillon ; toits des tours coniques ; corps latéral à un étage carré, façade principale ordonnancée à cinq travées ; chai couvert de tuile creuse, cave couverte d'un berceau en anse-de-panier, façade principale ordonnancée sans travées. Maison forte édifiée vers 1340 par Jean de Brixey-aux-Chanoines seigneur de Boucq, en remplacement d'une ancienne forteresse érigée au milieu du XIIIe siècle par cette même famille.","habitants":"famille de Fligny du Fey                                                                 famille de Magnicourt\r\n        \r\n        \"","divers":"Boucq gps 48° 44' 57\" N, 5° 45' 32  est","gps":"","images":["../image/image_54/54_Boucq_1.jpg","../image/image_54/54_Boucq_2.jpg","../image/image_54/54_Boucq_3.jpg","../image/image_54/54_Boucq_4.jpg"]},"Consult_chateau_formulaire8b0e":{"id":"Consult_chateau_formulaire8b0e","dept":"54","canton":"Briey -Joeuf","commune":"Briey","nom":"Briey","type":"Château","periode":"XV-XVIII-XIX","histoire":"quatre châteaux dans cet article de Briey: Bouchetière, Moussot et Wendel.                                                     BOUCHETIERE, château construit après son mariage en 1905 pour Maurice de Wendel, dans le parc du château de son père Henri de Wendel, construit par l'architecte Albert Jasson. L'édifice se compose de deux étages carrés et étage de comble, le gros-oeuvre en calcaire; moellon et enduit, toit à longs pans et croupe recouverts d'ardoise..                                                               BRIEY, château du type \" éperon barré \", propriété des comtes de Briey puis de Bar, cité dès 955-960. Réparé et aménagé aux XVe, XVIe, XVIIe siècles, détruit par ordre de Richelieu en 1635. Près de son emplacement a été construit au XVIIIe siècle le couvent des cordeliers, actuelle sous-préfecture. Du château ne subsistent qu'une partie des courtines et la base d'une tour du sud-ouest.                                                                                                                                MOUSSOT au Baroches au sud de Briey, corps de logis principal en U construit  K.M. en 1719; remanié dans la première moitié du XIXe siècle; engrangements et appentis du XVIIIe siècle ; propriété de la famille du Han au début du XVIIIe siècle. L'édifice se compose d'un étage carré, gros-oeuvre en calcaire; moellon sans chaîne en pierre de taille; enduit, élévations ordonnancées surmontées de toit à longs pans; croupe; appentis, et couverts de tuiles mécaniques et de tuiles creuses.","architecture":"WENDEL, sur le territoire briotin sélèvent deux châteaux édifiés par la famille de Wendel. Ils surplombaient les forges de Juf au début du siècle dernier. Deux édifices liés à limplantation de lindustrie lourde en territoire français, juste après lannexion de la Moselle à lAllemagne et donc des usines de Hayange et Moyeuvre.  La famille de Wendel a fait édifier deux châteaux  à Briey. Car sils dominent la cité jovicienne et tutoient le terme de la rue de Franchepré, ils figurent bien sur le ban communal briotin, au quartier dit Brouchetière.   Wendel  Juste après la guerre de 1870, les familles de Wendel et Schneider sassocient. Naît alors lusine à Juf qui devient la première à produire de lacier en France ! À la mort de Charles de Wendel, parlementaire, lun des fils, Henri, vient à Juf. Et décide de construire un château à proximité des forges. Le site, une presquîle boisée entourée par lOrne, domine les hauts-fourneaux. Mais la demeure se situe bien à Briey, quartier de Brouchetière. Des trois fils dHenri, cest François, laîné, qui habite le château. Humbert soccupe des affaires hayangeoises. Le troisième fils, Maurice, se marie avec Andrée des Monstiers-Mérinville. Les deux couples ne pouvaient habiter dans la même demeure, alors en 1906, Maurice fait construire le château de Brouchetière. De style analogue, le second édifice adopte des proportions plus modestes, et intègre la propriété.  Château construit par l'architecte Albert Jasson pour Henri de Wendel en 1895, porte la date surplombant la ville de Juf, les deux châteaux De Wendel continuent den imposer. Laquelle est loin dêtre abandonnée, bien au contraire.  Vestiges de lépopée industrielle dans la vallée de lOrne, les châteaux De Wendel continuent de susciter curiosité et intérêt.","habitants":"Bouchetière et wendel  Famille de  Maurice de Wendel                   comtes de Briey                                                                 Moussot, famille du Han \r\n        \r\n        \"","divers":"a Briey vestiges grav-1-2, châterau de  la Bouchetière grav -3-4,  de Moussot et de Wendel grav-5","gps":"","images":["../image/image_54/54_Briey_1.jpg","../image/image_54/54_Briey_2.jpg","../image/image_54/54_Briey_3.jpg","../image/image_54/54_Briey_4.jpg","../image/image_54/54_Briey_5.jpg"]},"Consult_chateau_formulaire10a8":{"id":"Consult_chateau_formulaire10a8","dept":"54","canton":"Pont-à-Mousson","commune":"Maidières","nom":"Casenove","type":"Château","periode":"XVIII","histoire":"CASENOVE   Le 5 août 1489 le duc de Lorraine René II anoblit son premier valet de chambre Jacquet de Maria et lui inféode la seigneurie de Maidières nommé fief de casa nova qui deviendra par déformation Casenove. Ce seigneur fait édifier une modeste chapelle Notre Dame des anges à proximité du château. Le 9 mars 1705 le château appartient à Claude-Dagobert Millet, conseiller au bailliage de Mirecourt. Il est également procureur du bailliage de Pont-à-Mousson. La famille tirait sa fortune de leur charge de fermier généraux du marquisat de Haroué en 1646. Elle était aussi au service du maréchal de Bassompierre. Claude Dagobert Millet devient secrétaire du duc de Lorraine Charles IV et ambassadeur à Paris. Il est anobli le 6 juin 1661. Il siégera ensuite à la cour des comptes de Nancy et habitera alternativement Maidières ou son hôtel de la place Carrière. Il mourra comme conseiller d'état à la cour souveraine de Lorraine et du Barrois.  Son fils aîné héritera du château. Il mourra en 1701 alors qu'il est président de la cour des comptes de Nancy. C'est à cette époque que la famille prends le nom de de Chevers. Jules-Marie-Léonard de Millet de Chevers meurt sans postérité. Sa veuve vendra le domaine en trois lots. Le château sera acquit par la commune de Maidières en 1828 qui en fera sa mairie. La chapelle, l'exploitation agricole et le moulin seront achetés par des particuliers. .","architecture":"CASENOVE, château de Casenove du début XVIIIe, à l'emplacement d'une maison forte très ancienne (mairie actuelle). De plan rectangulaire deux niveaux sur soubassements, toits  en croupe couvert de tuiles.\r\nChâteau de Prochebois du XVIIIe, aujourd'hui très défiguré.\r\nÉléments protégés MH : la chapelle Casenove ainsi que le porche attenant : inscription par arrêté du 21 décembre 1977.","habitants":"Famille de Claude-Dagobert Millet de Chevers\r\n        \r\n        \"","divers":"Casenove à Maidières                                                                   gps 48° 53' 59\"nord, 6° 02' 17\" est","gps":"","images":["../image/image_54/54_Casenove_1.jpg","../image/image_54/54_Casenove_2.jpg","../image/image_54/54_Casenove_3.jpg"]},"Consult_chateau_formulairefbc0":{"id":"Consult_chateau_formulairefbc0","dept":"54","canton":"Maxéville","commune":"Champigneulles","nom":"Champigneulles","type":"Château","periode":"XVI-XVII-XIX","histoire":"Deux châteaux à Champigneulles dont celui de Champigneulles bas et haut et celui dit d'Avant-Garde.                                                                                                                                                                          CHAMPIGNEULLES  bas, construit en 1711 par François Christophe Le Prud'Homme, comte de Fontenoy, seigneur de Champigneulles en partie.    CHAMPIGNEULLES haut, maison forte au Moyen-Âge transformée en château par la suite. Il est flanqué de deux tourelles du XVIe siècle. Le château, racheté par la municipalité en 1931, est depuis la mairie. Découverte du patrimoine de la commune : Le château de haut (début XVIIe siècle), qui est l'actuel hôtel de ville. L'église Saint-Epvre (XVIIe-XVIIIe siècle.) abrite une Piétà, probablement du XVIe siècle., et un orgue du XIXe siècle. Le château de bas (XVIIIe siècle.) dispose d'un jardin \"à l'anglaise\" de treize hectares. Parc du château.  Ville de Champigneulles.","architecture":"AVANT GARDE, La place sera occupée jusqu'en 1635 date où il sera démantelé par les armées françaises. Au XIXe siècle les ruines ont failli disparaître englouties par une carrière de pierre qui a laissé une falaise de vingt mètres de haut aux pied du château. Les vestiges  ont ensuite été dégagés de 1981 à 1989.\r\nÉléments protégés MH : le château de l'Avant-Garde : vestiges archéologiques, visibles et non visibles : inscription par arrêté du 20 juillet 1990.","habitants":"Champigneulles, famille de François Christophe Le Prud'Homme\r\n        \r\n        \"","divers":"Champigneulles Bas et Haut et celui dit d'avant-garde grav 1.                       Mairie gps 48°44'1,8\"Nord, 6°9'55,72\"Est","gps":"","images":["../image/image_54/54_Champigneulles_1.jpg","../image/image_54/54_Champigneulles_2.jpg"]},"Consult_chateau_formulaire0566":{"id":"Consult_chateau_formulaire0566","dept":"54","canton":"Toul","commune":"Choloy-Ménillot","nom":"Choloy","type":"Château","periode":"XIX","histoire":"CHOLOY;   le château de Choloy a été construit au début du XIXe siècle par le baron de Mesny, administrateur des salines de l'est, fait chevalier de la légion d'honneur par Napoléon Bonaparte.","architecture":"CHOLOY; Napoléon Bonaparte, baron de Mesnyi  Il l'avait suivi dans sa campagne d'Italie, et c'est la ville de Milan et les villas italiennes qui l'ont inspirées pour la construction de son château, dont le style a tendance à trancher avec celui des châteaux et demeures traditionnelles lorraines. Le gros oeuvre de l'édifice, dans sa partie centrale, comporte sept grandes pièces à usage de réception qui sont toutes de style empire et chauffées par des cheminées en marbre d'italie, toutes de couleurs différentes. Plus tard, une petite aile a été rajoutée, mais c'était alors l'époque Louis Philippe, et les pièces à l'intérieur ont adopté ce style, plus intime et moins de hauteur de plafond, et comportent des chambres avec des alcôves ouvertes.  éléments protégés MH : les façades et les toitures des bâtiments du château et des dépendances ; le décor des pièces d'habitation du rez-de-chaussée ; l'escalier du corps principal ; l'ensemble du jardin avec ses éléments bâtis : inscription par arrêté du 16 novembre 1988. Château du XIXe siècle néo-classique : château et dépendances, décor intérieur, jardin d'agrément ses éléments bâtis.","habitants":"Famille du baron De Mesny\r\n        \r\n        \"","divers":"Château de Choloy- Ménillot                                                            gps 48° 39' 44\" N, 5° 49' 18\" Est","gps":"","images":["../image/image_54/54_Choloy_1.jpg"]},"Consult_chateau_formulaire45d6":{"id":"Consult_chateau_formulaire45d6","dept":"54","canton":"Baccarat","commune":"Cirey sur vezouze","nom":"Cirey_Vezouze","type":"Château","periode":"XV-XVIII-","histoire":"CIREY;   présence gallo-romaine. Ancien fief au VIIe siècle de l'évêché de Toul, puis passa à la principauté épiscopale de Metz en 1286.  Site de l'abbaye cistercienne de Haute-Seille entre 1140 et 1789.  Rattachée à la France, avec l'évêché de Toul, en 1552. Cirey-sur-Vezouze était un lieu faïencier entre 1798 et 1855 grâce à la manufacture créée par Joseph Pacotte. Seule une production de grand-feu a été répertoriée.  Fondation de la manufacture de glaces en 1801. Chef-lieu de canton depuis 1873. Occupée par les Allemands du 1er jour de la guerre de 1914 jusqu'au 11 novembre 1918.  En 1944, durant la seconde guerre mondiale, la ville est traversée par le Schutzwall West.  Présence d'une stèle appelée « la stèle des fusillés » dans la forêt Maîtrechet où ont été fusillés quatre résistants FFI de la guerre 1939-1945 par la gestapo le 14 octobre 1944. Charles Thomas, Jean Coupaye, Roger Roger et Édouard Morquin ont été exécutés à la suite d'une dénonciation. Charles Thomas est arrêté par la milice française  à son domicile situé à Val-et-Châtillon, livré à la gestapo qui se trouve à la kommandantur localisée au château de Cirey-sur-Vezouze. Quant à Jean Coupaye, il est arrêté 9 jours plus tard à Blâmont. Il est lui aussi transféré et torturé. Quant à Roger Roger et Édouard Morquin aucune information n'a été trouvée.","architecture":"CIREY, le « vieux château », a été construit au XVIIIe siècle pour le marquis du Châtelet, cousin de la divine Émilie de Voltaire, épouse du marquis du Châtelet née de Fleming. Le château fut construit vers 1737, l'architecte en est Augustin Piroux, architecte de la synagogue de Lunéville, sur laquelle d'ailleurs on retrouve des éléments architecturaux communs.    Il ne faut pas confondre le vieux château qui se situe ruelle de Prémont (façade XVIIIe sur jardin avec armoiries des « du Châtelet » et Marmier accolées), avec le château dominant le village et situé au-dessus de l'ancienne glacerie construit pour Chevandier de Valdrome au milieu du XIXe siècle, par l'architecte Bernard Chaux dans un style néoclassique, tout comme l'hôtel de ville et l'église, ainsi que le château dit de l'administration qui abritait les bureaux de direction de la glacerie.","habitants":"Famille de  Joseph Pacotte\r\n        \r\n        \"","divers":"Quatre Châteaux de Cirey sur Vezouze et chatillon grav-5","gps":"","images":["../image/image_54/54_Cirey_Vezouze_1.jpg","../image/image_54/54_Cirey_Vezouze_2.jpg","../image/image_54/54_Cirey_Vezouze_3.jpg","../image/image_54/54_Cirey_Vezouze_4.jpg","../image/image_54/54_Cirey_Vezouze_5.jpg"]},"Consult_chateau_formulaire0b70":{"id":"Consult_chateau_formulaire0b70","dept":"54","canton":"Dieulouard","commune":"Clémery","nom":"Clémery","type":"Château","periode":"XV-","histoire":"CLEMERY, un document de 1416 mentionne un complexe fortifié à Clémery, que le duc Charles II de Lorraine avait occupé pour empêcher le duc de Bar, Édouard III, d'en prendre possession. En 1574, il était la propriété de François de Clémery. Il le transféra peu après à Fouquet de la Routte, le gouverneur de Marsal, qui avait épousé Orianne de Clémery la sur de François. Leur fille Madeleine épouse Georges Frédéric du Hautoy et de par son mariage, fait entrer le domaine dans la famille de son mari. Ils en sont restés propriétaires jusqu'au début du XIXe siècle. Pour Jean Baptiste Gaston du Hautoy, chambellan du duc Léopold de Lorraine, la seigneurie de Clémery est élevée au rang de marquisat en 1728, avec Bénicourt et Belleau. Clémery portera le nom de Marquisat de du Hautoy  jusqu'en 1790. Sous le premier empire, le site, qui était encore très austère et militaire à l'époque, appartenait à Géraud Christophe Michel Duroc, né à Pont-à-Mousson, non loin de là, qui l'a acheté au début du XIXe siècle à la famille Hautoy, propriétaire de longue date. La veuve de Duroc vend le domaine en 1831 à la famille Arnoult, dont la fille Julie épouse Eugène de Ladoucette. Le domaine passe à cette famille par le mariage de leur fille Charlotte Marie avec Fernand Louis Marie Thibaut de la Rochethulon en 1861. Ils ont engagé l'architecte Prosper Morey pour une transformation radicale des bâtiments en château.","architecture":"CLEMERY, a été édifié au XVe siècle et restauré au XIXe siècle, éléments protégés MH : le portail et le pavillon d'entrée au Sud ; les façades et les toitures du château ; l'antichambre, le grand salon et le petit salon au rez-de-chaussée surélevé du corps central ; la chambre à alcôve du premier étage de l'aile Est ; le grand escalier à la jonction du corps principal et de l'aile Ouest : inscription par arrêté du 25 juin 1986.  La forteresse est mentionnée dès 1416. Charles II duc de Lorraine l'occupe pour empêcher Édouard III duc de Bar de s'y installer. Pris par les Croates et les Polonais en 1635, le maréchal François de L'Hospital vint aussitôt l'assiéger et, après trois jours, le reprit. D'importantes transformations en 1861. Entre 1783 et 1829, une grande partie des bâtiments a été démolie, notamment les tours et les bâtiments et pont-levis du côté sud. Les propriétaires ont fait combler les douves qui avaient été laissées en place jusque-là. Le bâtiment principal est surélevé, sa façade est entièrement redessinée et la disposition intérieure des pièces est complètement modifiée. Lors des travaux réalisés à cette époque, le complexe a reçu son aspect actuel.  Le château est un bâtiment en forme de U à trois ailes, avec deux étages s'élevant sur une base élevée. Les étages supérieurs des deux ailes latérales des côtés est et ouest sont plus bas que l'aile nord centrale. Un porche d'un seul étage est placé devant l'aile centrale, côté cour, à l'entrée duquel mène un double escalier en forme de fer à cheval. À l'intérieur, de nombreuses pièces ont conservé le mobilier de la fin du XIXe siècle, notamment les grands et petits salons et une antichambre. Tout comme le grand escalier à la jonction de l'aile centrale et de l'aile latérale ouest, ces pièces appartiennent en parties du palais classées M.H..","habitants":"Famille de François de Clémery\r\n        \r\n        \"","divers":"Clémery                                                                                              Gps 48° 53' 43\" N, 6° 11' 09\" Est","gps":"","images":["../image/image_54/54_Cl%c3%a9mery_1.jpg","../image/image_54/54_Cl%c3%a9mery_2.jpg","../image/image_54/54_Cl%c3%a9mery_3.jpg","../image/image_54/54_Cl%c3%a9mery_4.jpg"]},"Consult_chateau_formulaired519":{"id":"Consult_chateau_formulaired519","dept":"54","canton":"Mont-Saint-Martin","commune":"Colmey","nom":"Colmey","type":"Château","periode":"XIV-XVI-XVIII","histoire":"Deux châteaux dans cet article; Martigny et la Vilette.                                   MARTIGNY,   château fort construit en 1583 dans la seigneurie barroise de Colmey pour Marguerite de Xivry  épouse de Jean de la Mouillie, sur autorisation du duc Charles III, passée par mariages aux familles de Wopersnow et du Han, seigneur de Martigny, puis aux Boissonneaux de Chevigny.                                                                                                                                VILLETTE à 1 K.M. au nord  de Colmey le château de la  VILLETTE, l'ancien château datant du XIVe siècle était entouré de quatre tours et de remparts. Un haut corps de logis de plan rectangulaire, repercé au XVIIIe siècle, est amputé de moitié au cours des combats de 1940.  Propriété de la famille du Faing au XVIIe siècle et des Gorcy au XVIIIe siècle, le château médiéval, à l'origine de plan quadrangulaire et cantonné de tours rondes, fut transformé et repercé au XVIIIe siècle et en partie amputé au cours des combats de 1940. L'édifice se compose d'un étage carré, gros oeuvre en calcaire; moellon; enduit et pierre de taille, élévations à travées surmontées de toit à longs pans, couvert d'ardoise.","architecture":"MARTIGNY, de la maison forte primitive subsistent encore la façade ouest de l'enceinte avec au milieu une tour porche et la tour d'angle sud-ouest. Construction au début du XIXe siècle d'une grande maison d'habitation. Eléments défensifs, du château fort primitif, construit en 1573, subsistent encore la façade ouest de l'enceinte avec au milieu une tour porche et la tour d'angle sud-ouest. Construction au début du XIXe siècle d'une grande maison d'habitation. éléments défensifs. \r\nÉléments protégés MH : les façades et les toitures du château et des communs ; les douves : inscription par arrêté du 24 juillet 1972.","habitants":"Martigny; familles de Wopersnow et du Han,                    Vilette famille du Faing \r\n        \r\n        \"","divers":"Colmey grav 1-2     Martigny grav 3-4  et la Vilette grav 5-6                            gps 49° 27' 25\" N, 5° 33' 30\" Est","gps":"","images":["../image/image_54/54_Colmey_1.jpg","../image/image_54/54_Colmey_2.jpg","../image/image_54/54_Colmey_3.jpg","../image/image_54/54_Colmey_4.jpg","../image/image_54/54_Colmey_5.jpg","../image/image_54/54_Colmey_6.jpg"]},"Consult_chateau_formulaire63de":{"id":"Consult_chateau_formulaire63de","dept":"54","canton":"Mont-Saint-Martin","commune":"Cons la Grandville","nom":"Cons_Grandville","type":"Forteresse","periode":"XI-XVII","histoire":"CONS la GRANDVILLE, construit sur un promontoire rocheux  sur les bords de la rivière la Chiers.  Le nom de \"Cons\" signifiant \"boucle\".  le village sest agrandi dun nouveau quartier désigné sous le nom de \"La Neuville\", devenu plus tard, à la fin de lAncien Régime, \"La Grandville\". La première construction dun château-fort  remonte au XIe siècle. Dudon de Cons, fut le premier seigneur du lieu. Il fonda un prieuré quil offrit à labbaye bénédictine de Saint-Hubert-en-Ardenne. Sur lemplacement de la demeure primitive, Jacques de Cons construisit au XIIle siècle un second château-fort, dont il ne subsiste aujourdhui que la tour-porche remaniée au XVIIe siècle, la tour ronde dite \"tour romane\" et les deux remparts attenants, ainsi quun vestige du chemin de ronde, qui permettait à des hommes du pays, recrutés à cet effet, dassurer le service de guet du château et dalerter la population en cas dinvasion. Pendant les deux siècles suivants, le château fut dégradé par des bandes de pillards encouragés par la période troublée de la guerre de cent ans, et négligé du fait des alliances et héritages, créant de trop nombreux ayant-droits. En 1572, Martin de Custine, principal détenteur de la seigneurie, qui le premier porta le titre de baron de Cons (conféré dès le XIe siècle à Dudon par le châtelain de Longwy, entreprit la reconstruction du château; une inscription sur la façade nord rappelle cet évènement, au dessous dune niche représentant Martin de Custine et son saint patron.  Ce nouveau château, achevé vers 1610 par Louis de Custine, conserva le caractère de \"maison-forte\" de la demeure moyenâgeuse: mais il emprunta son esthétique à lart de la Renaissance lorraine, qui ne sest épanoui quassez lentement en Lorraine en raison dune longue fidélité aux formes du gothique flamboyant. De cette période il subsiste laile Est du château, la façade extérieure nord encadrée par les deux tours carrées,  les soubassements des communs.","architecture":"CONS la GRANDVILLE, Comme toute la Lorraine, Cons-la-Grandville a subi les grands désastres de la Guerre de Trente Ans (1618-1648), et en particulier les ravages provoqués par les armées suédoises, croates et polonaises qui envahissaient le Royaume de France. Le château, inhabité depuis 1583, et une partie du village furent incendiés; cest pourquoi on trouve aujourdhui une cheminée à lextérieur de laile droite, qui na pu être totalement conservée. En 1641, Marguerite de Custine, abbesse du chapitre de Bouxières, apporta le château en dot à Jean de Lambertye, gouverneur de Longwy, qui amorça une longue période de remise en état du château. La restauration fut achevée en 1730 par Nicolas-François de Lambertye, ambassadeur du Duc Léopold de Lorraine, lequel avait érigé la baronnie de Cons en marquisat en 1719. Laile gauche, la partie centrale et les écuries sont, dans un style classique très sobre, les témoins de cette rénovation du XVIIIe siècle.  Le fronton triangulaire de la façade centrale rappelait, avant dêtre martelé par les révolutionnaires en 1793, le rôle important joué par Nicolas-François de Lambertye et son épouse Elisabeth de Ligniville dans lhistoire de Cons-la-Grandville et à la Cour de Lorraine. Sous la Révolution, les mesures dabolition de la féodalité, de suppression de la justice seigneuriale et dinstauration de légalité civile et politique furent appliquées à Cons dans le calme: les châtelains purent demeurer au château mais durent cependant effacer les blasons des familles alliées aux seigneurs de Cons.  En 1815, des troupes prussiennes, qui occupaient Longwy depuis 1814, investirent quelque temps le château. Mais ce sont surtout les deux dernières guerres qui firent malheureusement revivre quelques souvenirs militaires à Cons-la-Grandville. Cest ainsi que pendant la Grande Guerre (1914-1918), le château fut occupé par un état-major commandé par le Kronprinz, fils de lEmpereur Guillaume.","habitants":"Famille de Nicolas-François de Lambertye                                            famille de Martin de Custine,\r\n        \r\n        \"","divers":"Forteresse de Cons la Grandville                                                gps 49° 29' 01\" N, 5° 42' 03\" Est","gps":"","images":["../image/image_54/54_Cons_Grandville_1.jpg","../image/image_54/54_Cons_Grandville_2.jpg","../image/image_54/54_Cons_Grandville_3.jpg","../image/image_54/54_Cons_Grandville_4.jpg","../image/image_54/54_Cons_Grandville_5.jpg","../image/image_54/54_Cons_Grandville_6.jpg"]},"Consult_chateau_formulaire1742":{"id":"Consult_chateau_formulaire1742","dept":"54","canton":"Liverdun","commune":"Liverdun","nom":"Corbin_Liverdun","type":"Château et porte de rempmart","periode":"XVIII-XIX","histoire":"CORBIN,  est construit vers 1837 par Charles Husson, un banquier propriétaire de deux anciennes tours. Il les restaure et fait construire un château sur les vestiges de la forteresse médiévale. Antoine Corbin en devient propriétaire. Construit au XIXe siècle entre deux tours des remparts, il a été racheté en 1889 par Antoine Corbin (1835-1901), le père d'Eugène J.B. Corbin, un des mécènes de l'école de Nancy, puis par la famille Galilée en 1925. il a été racheté en 1889 par Antoine Corbin (1835-1901), père d'Eugène J.B. Corbin.  Le château a subi un incendie en 1904  qui se déclare dans l'une des tours, le château est complètement détruit. Il ne reste que les murs noircis. Eugène Corbin, son fils, mécène des artistes de lécole de Nancy le fait reconstruire rapidement et reste le propriétaire jusqu'en 1925.  Ce château appartient à la commune depuis 1996 qui l'a transformé en espace culturel : médiathèque et salle de spectacles.","architecture":"CORBIN  Situé sur les remparts de la cité médiévale, le parc du Château Corbin est un véritable lieu de détente, à lombre darbres centenaires, dont la magnifique vue, sur la boucle de la Moselle et le domaine des Eaux Bleues ne manque pas détonner le visiteur.  Du parc, on peut admirer les boucles de la Moselle.  Le château présente une façade de type renaissance, et le parc offre une vue remarquable sur une boucle de la Moselle. La ville de Liverdun en a fait l'acquisition en 1996, pour le transformer en un centre socio-culturel et une médiathèque, située dans la tour ronde.  Il a été réhabilité en 2005 Construit au XIXe siècle entre deux tours des remparts,","habitants":"Famille d' Antoine Corbin\r\n        \r\n        \"","divers":"Château de Corbin à Liverdun                                                        gps 48° 45' 05\" nord, 6° 03' 42\" est","gps":"","images":["../image/image_54/54_Corbin_Liverdun_1.jpg","../image/image_54/54_Corbin_Liverdun_2.jpg","../image/image_54/54_Corbin_Liverdun_3.jpg","../image/image_54/54_Corbin_Liverdun_4.jpg","../image/image_54/54_Corbin_Liverdun_5.jpg","../image/image_54/54_Corbin_Liverdun_6.jpg"]},"Consult_chateau_formulaire395b":{"id":"Consult_chateau_formulaire395b","dept":"54","canton":"","commune":"Haroué","nom":"Craon_Haroué","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article Haroué et Leménil-Mitry à cinq K.M à l'Est   MITRY, du XVIe siècle, La commune possède un château du XVIe siècle, démantelé en 1675 par ordre de Louis XIV ; ce n'était plus en 1679 qu'un tas de pierres. Il fut reconstruit un peu à l'écart en 1721 par Frédéric le Cordier puis modifié vers 1812 et 1840.                                                                                                                       HAROUE Marc de Beauvau Craon, ami d'enfance du duc Léopold de Lorraine. Marc de Beauvau Craon, le constructeur du château, vice roi de Toscane, tuteur de François de Lorraine, travaille assidûment auprès du duc Léopold de Lorraine. Le fils de Marc, Charles Just de Beauvau, ministre de la guerre sous Louis XVI et Maréchal de France, fait bâtir à Paris, l'Hôtel de Beauvau, Place Beauvau, l'actuel ministère de l'intérieur. Ce sont des artistes lorrains qui ont participé à l'embellissement du château; les grilles, les balcons et la rampe de l'escalier d'honneur sont forgés par Jean Lamour, le célèbre ferronnier des grilles de la Place Stanislas à Nancy. Une des tours du château, le salon Chinois, est peinte par Pillement au XVIIIe siècle. Les statues sont l'oeuvre de Barthélemy Guibal, sculpteur des Fontaines de la place Stanislas à Nancy.  Le château est un exemple unique de l'art français au début du XVIIIe siècle, au moment de l'âge d'or de la Lorraine, lorsque celle-ci était indépendante, à l'époque du dernier duc de Lorraine, Stanislas, roi de Pologne. Construit sur l'emplacement d'une citadelle et d'un château renaissance, le château actuel conserve des vestiges des châteaux précédents. Toujours dans la famille de Beauvau Craon, depuis sa construction par Germain Boffrand en 1720, habité par la huitième génération, la princesse de Beauvau Craon,  en 1736  François-Stéphane de Lorraine épouse l'impératrice  Marie-Thérése et au XIXe siècle la princesse de Craon fille de Mme du Cayla installe à  Haroué le mobilier de Saint-Ouen.  Bien qu'étant un palais à la campagne, le château de Haroué a conservé une atmosphère de vécu grâce à la famille de Beauvau Craon qui y habite encore.","architecture":"HAROUE, le château des Beauvau-Craon, dit château d'Haroué ou palais d'Haroué a été construit entre 1720 et 1729 par Germain Boffrand, pour Marc de Beauvau-Craon, connétable de Lorraine puis vice-roi de Toscane.Ce sont des artistes lorrains qui ont participé à l'embellissement du château; les grilles, les balcons et la rampe de l'escalier d'honneur sont forgés par Jean Lamour, le célèbre ferronnier des grilles de la Place Stanislas à Nancy. Une des tours du château, le salon Chinois, est peinte par Pillement au XVIIIe siècle. Les statues sont l'oeuvre de Barthélemy Guibal, sculpteur des Fontaines de la Place Stanislas à Nancy. Tel un calendrier, le château se compose de 365 fenêtres, 52 cheminées, 12 tours et 4 ponts. Le fronton triangulaire de la façade centrale rappelait, avant dêtre martelé par les révolutionnaires en 1793, le rôle important joué par Nicolas-François de Lambertye et son épouse Elisabeth de Ligniville dans lhistoire de Cons-la-Grandville et à la Cour de Lorraine. Sous la Révolution, les mesures dabolition de la féodalité, de suppression de la justice seigneuriale et dinstauration de légalité civile et politique furent appliquées à Cons dans le calme: les châtelains purent demeurer au château mais durent cependant effacer les blasons des familles alliées aux seigneurs de Cons, en particulier dans la galerie voûtée. En 1815, des troupes prussiennes, qui occupaient Longwy depuis 1814, investirent quelque temps le château. Mais ce sont surtout les deux dernières guerres qui firent malheureusement revivre quelques souvenirs militaires à Cons-la-Grandville. Cest ainsi que pendant la grande guerre (1914-1918), le château fut occupé par un état-major commandé par le Kronprinz, fils de lEmpereur Guillaume.","habitants":"Haroué: Charles Just de Beauvau                                          Mitry;  Frédéric le Cordier \r\n        \r\n        \"","divers":"Craon-Haroué\r\ngps 48° 27' 56\" nord, 6° 10' 48\" est","gps":"","images":["../image/image_54/54_Craon_Harou%c3%a9_1.jpg","../image/image_54/54_Craon_Harou%c3%a9_2.jpg","../image/image_54/54_Craon_Harou%c3%a9_3.jpg","../image/image_54/54_Craon_Harou%c3%a9_4.jpg"]},"Consult_chateau_formulairef99c":{"id":"Consult_chateau_formulairef99c","dept":"54","canton":"Dieulouard","commune":"Dieulouard","nom":"Dieulouard","type":"Château","periode":"X-XIV-XVI","histoire":"DIEULOUARD, ancien château épiscopal bâti aux environs de l'an mil  par Heimon évêque de Verdun pour protéger les habitants du village;  La maison-forte fut construite en 997, elle passe dans le temporel de l'évêque de Verdun, à l'évêque Richard de Grandpré, en 1318 l'évêque Henri d'Apremont entreprend des travaux; ; remanié au XVIe siècle pour s'adapter aux armes à feu, il fut démantelé en 1660 par Louis XIV. Propriété de la commune qui le sauve de la disparition.","architecture":"DIEULOUARD.  siècle après siècle détruit, rebâti en forme de trapèze, composé de huit tours, insérée par des courtines près de 20 mètres de haut, brûlé puis restauré, le bâtiment devint au XIVe siècle une forteresse imposante : une façade rectiligne de 100 m de long tournée vers lEst, une enceinte en demi cercle vers louest, huit tours cylindriques et des murailles crénelées, une porte fortifiée précédée dun pont à bascule et dun pont de pierre à quatre arches. Dieulouard était alors siège dune prévôté Verdunoise comptant sept villages, terre évêchoise enfoncée comme un coin dans le duché de Lorraine, poste dobservation de l'évêque sur la vallée de la Moselle et contrôle de son commerce fluvial. En 1660, le château de Dieulouard fut écrêté et rendu inoffensif ; à la Révolution, il devint bien national et fut vendu. Il fallut attendre 1970 pour voir apparaître un effort de réhabilitation, restauration du Logis Episcopal et création dun musée gallo-romain, éléments protégés MH : les restes du château de Dieulouard : inscription par arrêté du 19 janvier 1927.","habitants":"évêque Henri d'Apremont\r\n        \r\n        \"","divers":"Château de Dieulouard                                                                     gps 48° 50' 34 N, 6° 04' 06 Est","gps":"","images":["../image/image_54/54_Dieulouard_1.jpg","../image/image_54/54_Dieulouard_2.jpg","../image/image_54/54_Dieulouard_3.jpg"]},"Consult_chateau_formulaired467":{"id":"Consult_chateau_formulaired467","dept":"54","canton":"Laneuveville-devant-Nancy","commune":"Eulmont","nom":"Eulmont","type":"Château","periode":"XVI-XVIII","histoire":"Deux châteaux dans cet article  Eulmont et la Franche Moitresse.                                                                          EULMONT, gentilhommière du XVIIIe siècle, conservant quelques éléments du XVIIe siècle. Décors et cheminées du XVIIIe siècle.Il  fut notamment  la résidence de  Gérard  Jacquier (né en 1649) et de Marguerite de Huz. Le père de Gérard, François Jacquier était premier médecin de Marguerite de Lorraine, duchesse d'Orléans. Par le mariage de leur fille, le domaine passe dans les mains de Jean Philippe de Thomerot, substitut du procureur général, dont le père Hilaire était conseiller intime de Marie de Rohan, duchesse de Chevreuse. Puis devient la résidence de Théodore de Thomerot, lieutenant colonel de l'Impératrice Reine de Hongrie.  A la Révolution de 1789 Jean Joseph  Clément, officier d'Autriche, nouveau propriétaire fut dépossédé.  Il fut la résidence en 1796 de la famille du Dr Gormand, officier de santé des soeurs Macarons, de la famille de Comeau, officier de cavalerie (1833), de Pierre Urmes, architecte qui conçu une partie de l'aménagement intérieur de l'église Saint-Sébastien de Nancy dont le buffet d'orgue. Son épouse Inès, écrivain se fit connaître sous le pseudonyme de Pierre du château (1881) et proposera un grand nombre de nouvelles et de romans.  Au XXe siècle, la propriété passe dans les mains de la famille Kalmbach-Marchal qui en fera une hostellerie fort prisée par des générations de Nancéiens. Tombée sous le charme de ses vieilles pierres en 1985, la famille Petiton-Annweiler, antiquaire, redonnera au château son lustre d'antan, après d'importants travaux. Édifice précédé d'une cour et deux pavillons.  Éléments protégés MH : le château, y compris le puits, mais à l'exception de l'escalier sur jardin et du local ouvert en terrasse avec leurs rampe et balustrade : inscription par arrêté du 22 septembre 1995.","architecture":"FRANCHE-MOITRESSE, le château de la Franche-Moitresse XVIe siècle, est la demeure au XVIIIe siècle de l'architecte Émmanuel Héré, le château a été ainsi désigné en 1570 après que le duc de Lorraine, Charles III, ait accordé une franchise d'impôt \"en récompense de bons et loyaux services\" du propriétaire de l'époque Jacques de Beaufort, contrôleur général des fortifications et ouvrages d'art de la ville de Nancy. Près de deux siècles après, la propriété a été rachetée par Emmanuel Here qui a fait confirmer par le roi Stanislas la franchise d'impôt, en se faisant en outre accorder le privilège de construire un pigeonnier. Une fille d'Emmanuel Here s'est mariée à Eulmont en 1768 et une de ses petites-filles, qui avait épousé un comte d'Hozier, y a vécu, ainsi que ses descendants jusqu'en 1857. La propriété a été laissée à l'abandon pendant 50 ans, mais a été sauvée de la ruine par les propriétaires actuels qui ont travaillé à sa restauration en 1967. Ils y ont crée une suite de jardins riches en topiaires (buis, charmille...) et en différentes plantes. Éléments protégés MH : le domaine de la Franche Moitresse (jardin ; colombier ; communs ; logis) : inscription par arrêté du 29 juin 1993.","habitants":"Eulmont; Famille de  Gérard  Jacquier                                             Franche Moitresse, Famille de  Jacques de Beaufort\r\n        \r\n        \"","divers":"Eulmont Grav 1-2 et la Franche Moitresse. Grav -3-4-5                                       Etreval  48° 45' 12\" N, 6° 13' 44\" E                                                          Franche  gps 48° 45' 10\" N, 6° 13' 43\" E","gps":"","images":["../image/image_54/54_Eulmont_1.jpg","../image/image_54/54_Eulmont_2.jpg","../image/image_54/54_Eulmont_3.jpg","../image/image_54/54_Eulmont_4.jpg","../image/image_54/54_Eulmont_5.jpg"]},"Consult_chateau_formulaire5d9a":{"id":"Consult_chateau_formulaire5d9a","dept":"54","canton":"Liverdun","commune":"Euvezin","nom":"Euvezin","type":"Château","periode":"XV-XVIII","histoire":"EUVEZIN  la seigneurie est attestée au moins au XIVe siècle. Le château actuel a peut-être été bâti pour Antoine de Rozières, président des grands jours de Saint-Mihiel, mort en 1611. Les propriétaires actuels ont effectué depuis 1998 de nombreux travaux : le pan Ouest de la toiture, les grandes cheminées arrières, un renforcement du toit principal à la suite de la tempête de 1999, la toiture de laile XVIIIe siècle.","architecture":"EUVEZIN, date du XVe siècle, a été entièrement restauré au XVIIIe siècle. Il comporte des canonnières à la base des deux tours carrées du château primitif. à cette époque le domaine comprenait le château, une chapelle castrale, une cour, la basse-cour, le colombier, la bergerie, le moulin, les pressoirs et les fours banaux. Les bâtiments d'exploitation de plan en L accolés au château, sont d'anciennes dépendances transformées en fermes ou en logements. Le corps de logis principal, de plan massé, est encadré de deux tours carrées en saillie sur les angles opposés nord-est et sud-ouest. Les façades sont percées sur trois niveaux de croisées et de fenêtres à meneaux. La porte d'entrée du XVIIIe siècle ouvre sur un grand vestibule avec un bel escalier en pierre à volées droites. La distribution intérieure du rez-de-chaussée et de l'étage a été conservée, de même que la menuiserie et la serrurerie du XVIIIe siècle. Pour offrir le passage dans des pièces dépourvues d'ouverture, des portes vitrées ont été utilisées. A l'extérieur, les murs et les terrasses laissent supposer une structure de jardin compartimenté, avec l'existence d'un pavillon d'angle. Le château s'inscrit dans un réseau de sites défensifs. Son plan et sa silhouette sont représentatifs des châteaux et maisons fortes du pays messin. Éléments protégés MH : le château dans sa totalité, avec le jardin, la construction adjacente au château et le sol des parcelle de la propriété, y compris les intérieurs des édifices (château et aile du XVIIIe siècle) : inscription par arrêté du 18 mai 2009.","habitants":"Famille d'Antoine de Rozières\r\n        \r\n        \"","divers":"Château d'Euvezin                                                                                    gps 48° 55' 25\" N, 5° 50' 18\" Est","gps":"","images":["../image/image_54/54_Euvezin_1.jpg","../image/image_54/54_Euvezin_2.jpg"]},"Consult_chateau_formulaireb15f":{"id":"Consult_chateau_formulaireb15f","dept":"54","canton":"Jarville-la-Malgrange","commune":"Fleville devant Nancy","nom":"Fleville","type":"Forteresse","periode":"XV-XVII","histoire":"Deux châteaux dans cet article ; Fleville et Ludres.                                                 FLEVILLE,  édifié à la Renaissance par Nicolas de Lutzelbourg, avec une façade d'une grande élégance, c'est certainement le plus connu des châteaux Renaissance de Lorraine. Le donjon médiéval et les douves sont les vestiges de l'ancien château féodal ; Ce grand parc présente un jardin potager, un verger et une belle roseraie. Le parc était initialement un jardin à la française mais a été partiellement transformé en jardin romantique de 20 hectares. Une balade du parc permet également d'apprécier un trompe l'il du XVIIe siècle et un belvédère. Le château est habité par la même famille de Lambel depuis 1812. Le château fait lobjet de classements au titre des monuments historiques depuis les arrêtés du 2 février 1982 et du 26 juin 2007.                                                                                                                              LUDRES  a 2 k.M à l'ouest de Fleviile, château médiéval qui a totalement disparu, remplacé au début du XVIIe siècle par Henri I de Ludres, vendu par lots comme bien d'émigré en 1794 et en grande partie démoli. Il subsiste deux tours, les remparts, la terrasse, les bâtiments de la basse-cour avec portes charretières de 1628 et un porche comportant les armoiries des comtes de Ludres.","architecture":"FLEVILLE, le château possède encore tous ses communs.   Sept siècles d'histoire caractérisent le château actuel (1533), de style première Renaissance française, adossé à un donjon féodal élevé en 1320, rivalise avec la beauté des châteaux de la Loire. Il est également un des rare château lorrain épargné par Richelieu sur ordre de Louis XIII à l'issue de la guerre de Trente Ans. La façade achevée en 1533, typique de la première Renaissance française, est parcourue par un balcon unique en son genre et reflète l'influence italienne sur la Renaissance Lorraine.  Le château conserve en plus du donjon de 30 mètres, les douves asséchées du château féodal. La cour, ouverte au XVIIIe siècle, est ornée de vases rocailles. L'intérieur de la demeure, entièrement meublé, est ouverte au public, les boiseries renaissance, la chapelle, la salle des États de Lorraine qui présente les blasons de Lorraine ainsi que la chambre de Stanislas Leszczynski, donnent de la vie à cette bâtisse. Autour du château se découpe un parc labellisé \"jardin remarquable\" éléments protégés MH : les façades et les toitures du château, du bâtiment des communs du XVIe siècle, y compris son porche, ainsi que des communs du XVIIIe siècle ; les anciennes douves ; le pont, les deux vases se trouvant à l'entrée;  les six vases rocaille décorant le parapet du fossé ; le sol des parterres précédant le pont ; le colombier : classement par arrêté du 2 février 1982. Le parc, y compris l'orangerie, la maison du Jardinier, l'ermitage, le pont de l'Ile, le belvédère et la glacière : classement par arrêté du 10 octobre 1991. Le château en totalité, ainsi que son mur de clôture sur la rue du château avec ses amortissements en hémicycle côté cour d'entrée et le local incorporé de l'ancien four banal en totalité : classement par arrêté du 26 juin 2007.","habitants":"Fleville  Famille de Nicolas de Lutzelbourg                                      Ludres famille de  Henri I de Ludres,\r\n        \r\n        \"","divers":"Fleville et Ludres grav -5.                                                                      Fleville gps 48° 37' 35\" N, 6° 12' 08\" Est                                                            Ludres gps 48° 37' 17\" N, 6° 09' 45\" Est","gps":"","images":["../image/image_54/54_Fleville_1.jpg","../image/image_54/54_Fleville_2.jpg","../image/image_54/54_Fleville_3.jpg","../image/image_54/54_Fleville_4.jpg","../image/image_54/54_Fleville_5.jpg"]},"Consult_chateau_formulaire8bf7":{"id":"Consult_chateau_formulaire8bf7","dept":"54","canton":"Luneville","commune":"Froville la Romane","nom":"Froville","type":"Château","periode":"XV-XVI-XIX","histoire":"Deux châteaux dans cet article ; Froville et Hausonville.                                    FROVILLE, le château du XVe siècle a disparu ; il a fait place à un château  du XVIIIe siècle, modifié au XIXe siècle. Le château de Froville a été construit au XVIIIe en remplacement d'un bâtiment détruit au XVe siècle et appartenait à Antoine de Bildstein.","architecture":"FROVILLE, il a ensuite été remanié au XIXe siècle. L'édifice est situé à l'arrière de l'église paroissiale, et comporte d'un côté de la rue une partie logis flanquée des communs et de l'autre côté, un domaine agricole malheureusement en mauvais état. Les tours pourraient très bien remonter au XVIe siècle alors que les percements actuels des baies et la décoration des façades semblent plutôt ne remonter qu'au XIXe siècle. La propriété est entourée d'une enceinte portant encore des vestiges médiévaux. Un pigeonnier a été construit dans le grand parc. Ce château a été fortement remanié, néanmoins le résultat est plutôt agréable à contempler.                                                                                                          HAUSSONVILLE propriété aujourd'hui d'Etienne  Gaspard qui redonne vie au château.   Vestiges de l'ancien château du XVIe siècle : tourelle d'angle, tour trapézoïdale en plan, fenêtres à meneaux.","habitants":"Famille d'Antoine de Bildstein.\r\n        \r\n        \"","divers":"Froville la Romane et Haussonville grav 4-5-6.                                   Froville gps 48° 29' 18\" N, 6° 21' 09\" Est                                                                 Haussonville  gps  48° 31' 44\" N, 6° 19' 31\" Est","gps":"","images":["../image/image_54/54_Froville_1.jpg","../image/image_54/54_Froville_2.jpg","../image/image_54/54_Froville_3.jpg","../image/image_54/54_Froville_4.jpg","../image/image_54/54_Froville_5.jpg","../image/image_54/54_Froville_6.jpg"]},"Consult_chateau_formulaire0560":{"id":"Consult_chateau_formulaire0560","dept":"54","canton":"Luneville","commune":"Gerbéviller","nom":"Gerbéviller","type":"Château","periode":"XV-XVII","histoire":"GERBEVILLER,  au XVe siècle à la famille des comtes de Linange qui le cède en 1470 à Jean Wisse bailly de Nancy lequel entreprend la reconstruction du château, en 1486 Madeleine Wisse  apporte en dot  à Huet du Châtelet. En 1590 la petite fille du ménage Anne du Châtelet par son mariage avec Charles-Emmanuel  de Torneille,  Christine Claude du Châtelet en fait don aux Carmes en 1618.  le conserveront jusqu'en 1717 , à cette date le dernier comte, Anne-Joseph de Torneille  sans enfants  de son épouse Antoinette-Louise de Lambertye, lègue le domaine à son neveu Camille de Lambertye, c'est ce dernier qui fait reconstruire le château très endommagé en 1587 pendant les guerres de religion.  L'histoire du domaine s'échelonne sur trois siècles, du premier quart du XVIIe siècle à   Charles - Emmanuel de Torneille, passe en héritage à Camille de Lambertye, aux années 1925. Reconstruit  après la première guerre mondiale, devient la propriété de la princesse d'Arenberg née Lambertye -Gerbéviller au XIXe siècle château de Camille de Lambertye.   En 1816, l'architecte Louis-Martin Berthault (1770-1823) a réaménagé le parc en parc paysager à l'anglaise à la demande d'Antoine de Lambertye. Ernest de Lambertye a fait des aménagements des communs, du jardin d'hiver, de la chapelle, du verger et du potager.  Le 24 août 1914, pendant la bataille du Grand-Couronné, les troupes bavaroises ont incendié l'église, le château et la chapelle. Après la première guerre mondiale, en 1920, l'architecte Albert Laprade a réaménagé le château qui a été amputé de ses étages.","architecture":"GERBEVILLER, le domaine comprend le château (construit vers 1620-1630, restructuré au début du XXe siècle après un incendie en 1914), la chapelle castrale du XVIIe siècle, remaniée aux XIXe siècle et les bâtiments de dépendances, dont un théâtre (de la deuxième moitié du XIXe siècle). Le parc (de la première moitié du XIXe siècle) comprend un pavillon de briques \"pavillon rouge\" et un nymphée, tous deux du début du XVIIe siècle. Le domaine appartient à la même famille depuis 1737. La chapelle castrale est attestée dès 1050, agrandie au XVe siècle alors qu'elle servait d'église paroissiale. L'édifice subit un nouvel agrandissement au début XVIIe siècle. La chapelle et le couvent sont vendus comme biens nationaux durant la Révolution. Le bâtiment, qui abritait les sépultures des seigneurs de Gerbeviller, retrouve son rôle de chapelle castrale et subit des restaurations au cours du XIXe siècle. De 1920 à 1923, restauration des deux tours de l'entrée et de la sacristie suite au bombardement du 24 août 1914..  Eléments protégés MH : les parties suivantes du domaine : le nymphée, le pavillon rouge, la chapelle palatine, l'orangerie, le théâtre, l'écurie et le pigeonnier, en totalité ; les façades et les toitures du château, de la conciergerie, du pavillon du cocher et de l'ancien logement des fermiers; les jardins et le parc, les grilles d'entrée, les bassins et les vasques, la serre, les murs de clôture, les bornes chaînées, l'abreuvoir, le canal, les ponts, les statues de Flore et d'Atlas, la grotte du XIXe siècle, la porte dite des chasseurs : classement par arrêté du 10 mai 2012. Le parc du château et ses perspectives sur la vallée de la Mortagne : site classé  le 21 01 1999 .","habitants":"Famille de  Charles-Emmanuel  de Torneille\r\n        \r\n        \r\n        \"","divers":"Gerbéviller  grav 1-2-3  pavillon rouge grav-4                                                  gps 48° 29' 48\" N, 6° 30' 32\" Est","gps":"","images":["../image/image_54/54_Gerb%c3%a9viller_1.jpg","../image/image_54/54_Gerb%c3%a9viller_2.jpg","../image/image_54/54_Gerb%c3%a9viller_3.jpg","../image/image_54/54_Gerb%c3%a9viller_4.jpg"]},"Consult_chateau_formulaireb733":{"id":"Consult_chateau_formulaireb733","dept":"54","canton":"Vézelise","commune":"Gorcy","nom":"Gorcy","type":"Château-tour","periode":"XVI","histoire":"Trois châteaux dans cet article ; Gorcy, la Martinière et St-Pancré.                                                                                             GORCY,  maison-forte des Gorcy probablement construite au XVIe siècle, très endommagée en 1671 par les troupes du maréchal de Créqui, rétablie au XVIIIe siècle et partiellement repercée, puis agrandie vers le sud au XIXe siècle, est devenue la propriété de la famille Labbé. A été cédée à la commune et complètement transformée en 1979, les armoiries des Gorcy étant déposées à cette occasion.                                                                                                                                             MARTINIERE, château construit au début du XVIIe siècle, peut être en 1603, selon une date aujourd'hui disparue, pour Claude des Bernards, fondateur de la branche des Bernards de Gorcy ; passé par mariage dans la famille de la Martinière en 1725.                                                                                                            SAINT-PANCRE à deux K.M. au sud ouest,   des vestiges du château de la famille de Failly, détruit à la Révolution, il ne subsiste qu'une tour de plan circulaire du XVIe siècle.","architecture":"GORCY   L'édifice se compose d'un étage carré et un étage de comble, le gros-oeuvre en calcaire; moellon sans chaîne en pierre de taille et enduit, élévations à travées surmontées de toit à longs pans; croupe et toit conique, couverts d'ardoise, propriété de la commune, hôtel de ville.                                                                                                                MARTINIERE, l'édifice a été mis au goût du jour et partiellement repercé en 1740, date portée par la porte piétonne du corps principal; il a subi des transformations et de nouveaux repercements au XIXe siècle et au XXe siècle ; le fossé entourant le château a été comblé vers 1855 et les paniers de fruits posés sur les piédroits de  l'ancien portail d'entrée proviennent du château de Pulventeux, à Longwy Haut.","habitants":"famille de Failly\r\n        \r\n        \r\n        \"","divers":"Gorcy grav-1                                                                                            gps  49° 32' 08\" nord, 5° 41' 07\" est                                                                                             Martinière grav 3                                                                                   St-Pancré grav 2      gps 49° 31' 44\" N, 5° 38' 58\" Est","gps":"","images":["../image/image_54/54_Gorcy_1.jpg","../image/image_54/54_Gorcy_2.jpg","../image/image_54/54_Gorcy_3.jpg"]},"Consult_chateau_formulaireb3e7":{"id":"Consult_chateau_formulaireb3e7","dept":"54","canton":"Maxéville","commune":"Maxéville","nom":"Grand_Sauvoy","type":"Château","periode":"XVIII","histoire":"GRAND-SAUVOY,  bâti dans le premier quart du XVIIIe siècle, en remplacement d'un édifice plus ancien, pour la famille de Cueullet, famille au service des ducs de Lorraine, propriétaire du château à partir de 1580, date à laquelle Jacquemin de Cueullet, gruyer de Nancy achète la propriété dite \"le Saulvoix ou Sauvoy\". Dans le 1er quart du XVIIIe siècle, il est occupé par Jean-Baptiste Hyacinthe de Cueullet, comte de Bey, seigneur de Saffais et Ferrières. A partir de 1779, date de vente du domaine par la famille de Cueullet, plusieurs propriétaires vont se succéder au cours du XIXe siècle, dont le baron de Landoville et Sybille-Aimée-Marie-Gabrielle Riquetti de Mirabeau, comtesse de Martel connue comme écrivain sous le pseudonyme de Gyp, qui fait graver, entre 1877 et 1880, les armoiries de son époux, le comte de Martel, sur le fronton, dont l'ensemble de la sculpture pourrait dater de cette période. A partir de 1920 le château est acheté, ainsi que l'ensemble du domaine, par l'évêché de Nancy-Toul pour être transformé en foyer de jeunes ouvriers. Un incendie détruit en grande partie le bâtiment en 1933, le Grand Sauvoy est restauré et agrandi dun corps en retour sur la façade postérieure par l'architecte Jules Criqui. La chapelle est entièrement refaite, ornée de verrières qui ont toutes disparues (à une date indéterminée peut-être durant la deuxième guerre mondiale) et dont l'iconographie encensait le travail ouvrier. Lensemble du décor intérieur et des lambris conservés furent remontés dans une pièce du rez-de-chaussée dite \"Salon Jaune\" (étudiés dans la base Palissy). Dans la seconde moitié du XXe siècle , de nouvelles verrières en dalle de verre sont posées dans la chapelle par l'Atelier, au nombre de onze, il n'en reste aujourd'hui que deux donnant sur le palier, les autres ayant été déposées lorsque la chapelle fut désaffectée dans les années 1980 et la toiture du bâtiment fut refaite entièrement durant les mêmes années.","architecture":"GRAND-SAUVOY, bâtiment de plan en L comprenant un corps de bâtiment principal, ancien, et un corps en retour, plus bas, accolé à la façade postérieure du côté nord ; moderne, ce dernier date, pour le gros oeuvre, de la reconstruction de 1933. Le corps principal est de plan carré, à deux niveaux d'élévation ; la toiture couverte de tuiles mécaniques est à longs pans et croupes avec un brisis recouvert de métal et percé de baies. La façade antérieure a conservé son élévation ordonnancée, à sept travées et deux niveaux séparés par un cordon mouluré et encadrés de chaînes d'angle à bossage creux ; elle est marquée par un léger avant-corps central percé de trois baies et sommé d'un fronton triangulaire ; le tympan est orné d'un cartouche armorié (trois marteaux d'arme émanchés, gravés en léger creux) surmonté d'une couronne comtale et encadré de deux guirlandes de laurier et deux lions assis. Le premier étage ouvre sur un balcon fermé par un garde-corps en fer forgé à décor de volutes. Le rez-de-chaussée comprend un vaste vestibule éclairé par les trois baies de l'avant-corps et limité par une arcature en pierre de taille, ouverte sur la cage d'escalier et composée de trois arcs en anse-de-panier à agrafe feuillagée reposant sur deux piles carrées et deux pilastres engagées dans les murs latéraux. L'escalier, en pierre, est à retours, suspendu, il compte trois volées et deux repos, la première volée reposant sur un mur d'échiffre, les deux autres sur un arc portant limon ; il mène à un palier qui occupe à l'étage toute la largeur du vestibule. La rampe est en fer forgé de section carrée assemblé à billes, composée de panneaux aux motifs symétriques de volutes, courbes et contre-courbes, rehaussés de feuilles en tôle de fer repoussée, relevée et dorée (certains éléments manquent). Une pièce du rez-de-chaussée (actuel salon jaune) conserve cheminée et lambris et dessus-de-portes ornés d'un décor sculpté. établissement de bienfaisance dit Le Grand Sauvoy.","habitants":"famille de Cueullet\r\n        \r\n        \"","divers":"A Maxéville château Grand-Sauvoy","gps":"","images":["../image/image_54/54_Grand_Sauvoy_1.jpg","../image/image_54/54_Grand_Sauvoy_2.jpg"]},"Consult_chateau_formulaireebfa":{"id":"Consult_chateau_formulaireebfa","dept":"54","canton":"Jarny","commune":"Jouaville","nom":"Grange_Jouaville","type":"Château","periode":"XVIII","histoire":"GRANGE, a appartenu à plusieurs familles luxembourgeoises. En effet, il est passé de la famille de « La Grange », à la famille Solouvres à la fin du XIVe siècle. Puis, il est passé successivement entre les mains de la famille Chinery en 1445, à la famille Brandebourg jusquen 1657 et à la famille Argenteau en 1701.  Il faut savoir que cette magnifique demeure nétait quune ruine à la suite de la guerre de trente ans jusquà ce que Christophe Gomé des Hazards décide de le restaurer en 1731.  Il a ensuite été racheté par le marquis de Fouquet en 1750, un neveu lointain du surintendant des finances de Louis XIV. Actuellement, ses descendants continuent doccuper le château depuis plus de 250 ans. .","architecture":"GRANCE,  du XVIIIe siècle, construit plus exactement en 1731. Situé à Manom, il est connu pour son histoire, son architecture et surtout son Jardin des Prairiales, caves en partie reconstruites XVIIe siècle. L'entrée se fait en traversant les douves sur leurs trois ponts, le pont-levis et les trois portes charretières et piétonnes pour atteindre la basse-cour pavée  (tous éléments classés monument historique. Les bâtiments sont avec étage et étage de combles avec des décors de sculptures, ornements, fleurs, têtes d'hommes et de femmes et armoiries : les armes des Fouquet, des Bertier de Sauvigny et des Selancy sont présentes.Des travaux effectués au XIXe siècle consistent en la construction de dépendances, de la maison neuve datée 1856 sur le linteau de la porte piétonne et des maisons dites d'Alger et du gardien.  Le pigeonnier a été inscrit monument historique le 28 février 1984 et les autres dépendances, à l'exclusion des communs du XIXe siècle ont été classées (les douves, leurs trois ponts, le pont-levis, la ferme, la cour du colombier et les trois habitation qui l'entourent, l'étable, l'ancienne écurie). Le château comporte un ensemble remarquable de mobiliers du XVIIIe siècle, d'objets d'art, de céramiques et de tableaux. Sont classés monument historique l'escalier de service et l'escalier principal, la salle à manger, le grand hall et leurs poêles en faïence, le salon rouge, la chambre Empire et la salle de bains Empire, le salon bleu, la bibliothèque lambrissée installée dans l'ancienne chapelle (et son escalier, sa tribune et sa cheminée), la cuisine, sa cheminée et son four à pain, la grande chambre et la chambre dorée.","habitants":"famille Solouvres \r\n        \r\n        \"","divers":"A Jouaville château de la Grange","gps":"","images":["../image/image_54/54_Grange_Jouaville_1.jpg","../image/image_54/54_Grange_Jouaville_2.jpg","../image/image_54/54_Grange_Jouaville_3.jpg"]},"Consult_chateau_formulaire3ddf":{"id":"Consult_chateau_formulaire3ddf","dept":"54","canton":"Jarny","commune":"Hatrize","nom":"Hatrize","type":"Manoir","periode":"XVI-XVIII","histoire":"HATRIZE,  propriété de la famille des Armoises, puis de la famille de Landres, vendue au milieu du XVIIIe siècle par le comte du Hautoy à monsieur de Failly. La maison-forte qui date du XVIe siècle, est probablement construite sur les restes dun ancien château, car en 1343 Jean dApremont vend à son cousin Henry IV comte de Bar, entre autres châteaux, celui de Hatrize. En 1388, il est propriété de Philibert des Armoises et en 1459 celle de Didier de Landres de Briey. Les propriétaires changent au cours des siècles. Propriété de la Société des Mines de Hatrize, l'édifice sera acquis en 1956 par des particuliers.","architecture":"
