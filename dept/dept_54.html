inances ducales. En 1632, le château et son arsenal contenant un armement démodé sont occupés par les troupes françaises. Richelieu, ministre du roi Louis XIII, craignant que les châteaux lorrains servent de point d'appui aux forces du duc de Lorraine, ordonne en 1636 le démantèlement du château.","architecture":"PRENY, en 1207, il fut pris par le comte de Bar et détruit, Thiébaut Ier le reconstruit, il est un chef-d'uvre d'architecture médiévale militaire et devient imprenable par la force jusqu'au développement de l'artillerie, reconstruit après le désastre, le château couvrait un territoire de près de trois hectares, mesurant, sans les fossés, 170 mètres du nord au sud et 185 mètres d'ouest en est. Il est fragmenté depuis un certain temps en plusieurs propriétés dont certaines appartiennent à la commune. Ce château ne remplit plus aucun rôle militaire. En 1797 il est vendu aux enchères à un bourgeois de Nancy. Toutefois, lors de l'occupation allemande de 1914 -1918, les occupants l'intégrèrent dans leur système de défense puisqu'il fut entouré d'une ligne de blockhaus. De nombreuses parties furent détruites en novembre 1918, lors de combats sanglants qui opposèrent les allemands aux américains. Eléments protégés MH : les ruines du château : classement par liste de 1862. L'ancien corps de garde en totalité, y compris les sous-sols : inscription par arrêté du 16 juillet 2001.","habitants":"des ducs de Lorraine\r\n        \r\n        \"","divers":"Vestiges à Prény.                                                                                         gps 48° 58' 43\" N, 5° 59' 42\" Est","gps":"","images":["../image/image_54/54_Pr%c3%a9ny_1.jpg","../image/image_54/54_Pr%c3%a9ny_2.jpg","../image/image_54/54_Pr%c3%a9ny_3.jpg","../image/image_54/54_Pr%c3%a9ny_4.jpg"]},"Consult_chateau_formulaireca17":{"id":"Consult_chateau_formulaireca17","dept":"54","canton":"Jarny","commune":"Puxe","nom":"Puxe","type":"Château","periode":"XV-XVII-XVIII","histoire":"PUXE, du XVe au XIXe siècles reconstruit sans doute vers 1775 pour Joseph de Saintignon, augmenté en 1860 de l'aile sud,  est un lieu chargé dhistoire. La grande histoire, celle des comtes, généraux et capitaines qui ont habité depuis le XVIIe siècle ce magnifique château situé dans la campagne lorraine, à mi-chemin entre Metz et Verdun. La famille Choné, dont 47 membres et amis se sont associés pour reprendre cette somptueuse demeure, rachetée à lévêché de Nancy et en faire une ferme auberge dans un premier temps, puis cinq chambres dhôtes qui ont ouvertes leurs portes en 2007 dans laile gauche du château, au milieu dun parc aux arbres plusieurs fois centenaires, le gîte offre un cadre princier à des séjours bucoliques en terre lorraine. La salle à manger dallée de vieilles pierres, sa grande cheminée, limposant escalier sont autant datouts que les travaux de rénovation ont mis en valeur, tout en apportant le confort dun intérieur douillet.","architecture":"PUXE,  créées dans laile sud du château, les cinq chambres sont labellisées gîte 3 épis. On y accède après avoir emprunté lescalier dhonneur datant au début du XIXe siècle. Chaque chambre porte le nom dun personnage illustre de ce lieu. Celle du comte, la décoration est à dominante bleue, fait référence à Jean Joseph Antoine de Saintignon, seigneur de Puxe, au XVIIIe siècle. La chambre de la comtesse Marie Appoline de Saintignon apporte une note de chaleur avec ses tons orangés. La chambre verte du général Jean Olivier Gaudin, peut accueillir trois personnes, celle du capitaine Adam de la Tour est de couleur chocolat et dans les tons rouges, et celle du marquis Jacques de Venoix de Milliaubourg est la plus spacieuse. Un parc arboré se développe autour de deux belles allées de marronniers et de tilleuls. Gîtes de France.","habitants":"Famille de Joseph de Saintignon                                            famille Choné\r\n        \"","divers":"Château de Puxe à Puxe","gps":"","images":["../image/image_54/54_Puxe_1.jpg","../image/image_54/54_Puxe_2.jpg","../image/image_54/54_Puxe_3.jpg"]},"Consult_chateau_formulairef328":{"id":"Consult_chateau_formulairef328","dept":"54","canton":"Joeuf","commune":"Sancy-Haut","nom":"Sancy","type":"Château","periode":"XIII-XIV-XV","histoire":"SANCY, mentionné au XIIIe siècle, acheté par le comte de Bar en 1262 ; en 1336, lorsque Sancy devient chef-lieu d'une prévôté, agrandissement et amélioration des fortifications, puis en 1537, renforcement des murailles et surélévation des parapets ; détruit en 1640 par les ordres du maréchal du hallier, gouverneur de la Lorraine occupée. En 1817, village de l'ancienne province du Barrois, avait pour annexes les fermes de Malsange et de Bazonville. À cette époque, il y avait 511 habitants répartis dans 90 maisons. Lors de la première guerre mondiale, plusieurs personnes civiles furent fusillées par les Allemands. Le 22 août 1914, M. Dieudonné Joseph (41 ans) et M. Dieudonné François (70 ans) Nicolas, le 23 août 1914, M. Dieudonné Antoine (74 ans).","architecture":"SANCY, il ne reste que des murs de soutènement, les courtines et les bases des tours en partie visibles dans les maisons qui ont été bâties à son emplacement. Gros-oeuvre en calcaire et pierre de taille.  Château fort, lieu-dit : Sancy haut, parties constituantes : fossé, époque de construction , château mentionné au XIIIe siècle, acheté par le comte de Bar en 1262 ; en 1336, lorsque Sancy devient chef-lieu d'une prévôté, agrandissement et amélioration des fortifications ; en 1537, renforcement des murailles et surélévation des parapets ; détruit en 1640 par les ordres du maréchal du Hallier, gouverneur français de la Lorraine occupée, il ne subsiste que des murs de soutènement, les courtines et les bases des tours en partie visibles dans les maisons qui ont été construites à son emplacement. Une bombarde retrouvée sur le site est de nos jours conservée au Musée lorrain de Nancy.\r\nMaison de la Prévôté, lieu-dit : Sancy bas, parties constituantes : colombier ; parties agricoles, époque de construction : 1re moitié du XVIIIe siècle. Maison reconstruite dans la 1re moitié du XVIIIe siècle sur l'emplacement supposé de la prévôté sise là à la fin du XVe siècle. La Grange-Drohier, importante maison-fief du XVIIe siècle.","habitants":"Famille de Dieudonné\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"A Sancy-Haut le château de Sancy","gps":"","images":["../image/image_54/54_Sancy_1.jpg","../image/image_54/54_Sancy_2.jpg","../image/image_54/54_Sancy_3.jpg"]},"Consult_chateau_formulaire5f3a-2":{"id":"Consult_chateau_formulaire5f3a-2","dept":"54","canton":"Laneuveville-devant-Nancy","commune":"Saulxures-lès-Nancy","nom":"Saulxures_Nancy","type":"Château","periode":"XVIII","histoire":"SAULXURES,  château construit par Pierre de Rutant début du XVIIIe siècle, communs, terrasse, petit salon et chambre au décor de lambris ; parc, colombier du XVIIIe siècle.   Le château a été construit dans les années 1730 par le comte Claude-Marcel de Rutant, l'impératrice Eugénie y fut reçue en 1866 par la comtesse Adeline de Rutant.   En 1942, les allemands occupent le château et devient un site de dépôt d'essence et de logements de soldats pompiers. Le 17 septembre 1944, les américains s'y installent et ce jusqu'à la fin de la guerre.","architecture":"SAULXURES, il fut lourdement endommagé lors de la seconde guerre mondiale et par le tremblement de terre de 1992 qui détruit toute la partie centrale de son orangerie. Il ne reste que deux témoignages subsistants : une tour carrée sauvegardée côté Est et un colombier situé à louest . Le domaine est un site classé par un arrêté du 28 janvier 1970. Le salon d'honneur, le petit salon et la chambre bleue au rez-de-chaussée avec leur décor de lambris sont classés au titre des M.H. par arrêté du 5 décembre 1979. Les façades et les toitures du corps de bâtiment principal et des communs, la terrasse sur parc avec son décor de vases et ses deux perrons sont inscrites au titre des M.H par arrêté du 5 décembre 1979.","habitants":"Comtesse Adeline de Rutant\r\n        \"","divers":"Château de Saulxures les Nancy gps 48° 41' 25\" N, 6° 15' 08\" Est","gps":"","images":["../image/image_54/54_Saulxures_Nancy_1.jpg","../image/image_54/54_Saulxures_Nancy_2.jpg","../image/image_54/54_Saulxures_Nancy_3.jpg","../image/image_54/54_Saulxures_Nancy_4.jpg"]},"Consult_chateau_formulairea855":{"id":"Consult_chateau_formulairea855","dept":"54","canton":"Vézelise","commune":"Tantonville","nom":"Tantonville_Tourtel","type":"Château","periode":"XVIII-XIX","histoire":"deux châteaux à Tantonville; Tourtel et des Clos.                                           TOURTEL, ancien château du Moyen-Âge reconstruit au début du XVIIIe siècle, ce château fut transformé en 1867 à la demande de Jules et Prosper Tourtel, ses nouveaux propriétaires.  Au début du XVIIIe siècle, il est reconstruit pour la retraite paisible dun irlandais longtemps au service des ducs de Lorraine. La famille Tourtel le met au goût du XIXe quand elle lacquiert en 1836 alors quelle implante à Tantonville la plus grande brasserie de France où Pasteur fait des études sur les levures. Ernest est le dernier Tourtel habitant le château, il lui a laissé son nom, le-chateau-Ernest-a-Tantonville ayant appartenu à la famille Tourtel est la propriéte de monsieur Antonio Petrucci.","architecture":"CLOS, c'est un édifice du XIXe siècle que l'on doit à la magnificence de la famille Tourtel, fondatrice des Brasseries de Tantonville.  Il est situé un petit peu à l'écart de la ville, dans un grand et joli parc et, si le volume est simple et parallélépipédique, le plan d'agencement paraît moins simple.\r\nLa façade latérale nord comporte un pignon, celle du sud a une terrasse au 1er niveau, surmontant un prolongement à grandes baies.\r\nUne terrasse dessert également les mansardes de la façade arrière.\r\nEnfin, la façade antérieure n'as pas de symétrie, celle ci-ci étant rompue par une porte de service, en rez-de-jardin. Elle sert actuellement de centre de vacances au Ccas d'EDF-GDF.                                                              TOURTEL, cette transformation se manifeste à l'extérieur par une toiture à la Mansart. C'est un bâtiment rectangulaire de deux niveaux et de sept travées, les trois travées centrales faisant un léger avant-corps. Toutes les ouvertures possèdent des linteaux en arcs de cercles. L'axe central est renforcé par l'entrée sur l'avant et par une tonnelle sur l'arrière. De la maison forte médiévale, château Ernest a gardé des emplacements de douves.","habitants":"Famille de  Jules et Prosper Tourtel\r\n        \"","divers":"Tantonville; Tourtel grav -1-2 et des Clos grav 3-4.","gps":"","images":["../image/image_54/54_Tantonville_Tourtel_1.jpg","../image/image_54/54_Tantonville_Tourtel_2.jpg","../image/image_54/54_Tantonville_Tourtel_3.jpg","../image/image_54/54_Tantonville_Tourtel_4.jpg"]},"Consult_chateau_formulairedb89":{"id":"Consult_chateau_formulairedb89","dept":"54","canton":"Vézelise","commune":"Thorey-Lyautey","nom":"Thorey_Lyautey","type":"Château","periode":"XV-XVII-XVIII","histoire":"Deux châteaux dans cet article; Thorey-Lyautey et Etreval .                                                  THOREY-LYAUTEY,   la ferme de la fin du XVIIe siècle appartenait à la tante du maréchal Lyautey qui y fit construire ce château entre 1920 et 1924 ; l'architecte s'est inspiré du château de Barante, près de Thiers. Un escalier monumental fut destiné à recevoir une rampe, attribuée à Jean Lamour, achetée au château de Vandeléville. Château du Maréchal Lyautey  La ferme de la fin du XVIIe siècle ou du début du XVIIIe siècle appartenait à mademoiselle de Villemotte, soeur de la mère du maréchal Lyautey ; elle servait de pavillon de chasse. La maison des parents du maréchal, à Crévic, brûla pendant la guerre de 1914. Après avoir fait établir des projets pour élever une nouvelle demeure à Crévic, le maréchal y renonça et fit construire ce château entre 1920 et 1924, daté par source, avec les dommages de guerre de Crévic ; l'architecte s'est inspiré, notamment pour la bibliothèque, du château de Barante, près de Thiers. Dans l'aile gauche, Lyautey fit construire un escalier monumental destiné à recevoir une rampe attribuée à Jean Lamour qu'il avait achetée au château de Vandeléville. Le maréchal mourra à Thorey en 1934.","architecture":"THOREY-LYAUTEY  Le château conserve ses souvenirs ; des éléments de son mausolée de Marrakech ont été, après l'accession du Maroc à l'indépendance, remontés dans le parc.\r\nTuile mécanique sur la ferme ; ardoise sur l'aile sud du château ; tuile plate sur le pavillon à droite de la cour ; toit à croupe sur le corps de logis de la demeure et sur le château ; toit à longs pans sur les dépendances de la ferme ; toit en pavillon sur le bâtiment à droite de la cour ; dôme à base rectangulaire aux angles arrondis sur la tour d'escalier, dépendances en rez-de-chaussée ; demeure à un un étage carré ; château à un étage carré et un étage de comble ; élévation à travées de la façade antérieure de la demeure.  Éléments protégés MH : le château, ainsi que le parc avec ses statues : inscription par arrêté du 7 juillet 1980.                                                                                          ETREVAL a deux K.M au nord -Est de Thorey-Lyautey , le château de la fin du XVe siècle avait une enceinte entourée de fossés et six tours rondes; deux corps de logis à partir de 1533 et à la fin du XVIe siècle, une porte cochère et une porte piétonne; il ne reste plus aujourd'hui que le corps principal. L'élément le plus remarquable est sa façade renaissance, en très bon état de conservation.","habitants":"du Maréchal Lyautey\r\n        \r\n        \r\n        \"","divers":"Thorey-Lyautey et Etreval Thorey                                                         gps 48° 26' 38\" N, 6° 01' 43\" Est                                                         Etreval  grav 4    gps 48° 27' 12\" N, 6° 02' 56\" Est","gps":"","images":["../image/image_54/54_Thorey_Lyautey_1.jpg","../image/image_54/54_Thorey_Lyautey_2.jpg","../image/image_54/54_Thorey_Lyautey_3.jpg","../image/image_54/54_Thorey_Lyautey_4.jpg"]},"Consult_chateau_formulaire3f4d":{"id":"Consult_chateau_formulaire3f4d","dept":"54","canton":"Jarny","commune":"Giraumont","nom":"Tichémont","type":"Château","periode":"XIV-XIX","histoire":"Deux châteaux dans cet article; Tichemont et Vallières.                           TICHEMONT, ancien château fort du XIVe siècle du Duché de Bar. Ferme datée 1699 remaniée au XIXe siècle. Logis daté de 1568. Le jardin à la française est aménagé au début du XVIIIe siècle. Plusieurs fois remaniée et transformée en château de plaisance, mais il a conservé son caractère de place fortifiée avec ses fossés de ceinture, une double enceinte, des tours dont une tour-porche, fausses braies, escarpe, contrescarpe. Jardin paysager réalisé au XIXe siècle à l'emplacement d'un étang asséché. Orangerie de 1824. Vastes jardins en terrasses conservent ses soutènements d'origine de 1702 reliés par quatre escaliers monumentaux. Le parc  recèle également une orangerie, un potager en creux et une composition paysagère bordée de belles essences.\r\nÉléments protégés MH : les sols, y compris les ponts et les murs ; façades et les toitures des différents bâtiments ; le jardin à la française et le parc : inscription par arrêté du 20 septembre 1996.","architecture":"VALLIERES, le château de Vallières a été reconstruit au XIXe siècle avec remploi d'une porte XVIe siècle et d'écus armoriés du XVIIe siècle.: élévation à travées,  à  un étage carré,toit à longs pans ; croupe\r\ncouvert d'ardoise.","habitants":"Seigneurs locaux\r\n        \r\n        \r\n        \"","divers":"A Giraumont le château de Tichémont","gps":"","images":["../image/image_54/54_Tichemont_1.jpg","../image/image_54/54_Tichemont_2.jpg","../image/image_54/54_Tichemont_3.jpg","../image/image_54/54_Tichemont_4.jpg","../image/image_54/54_Tichemont_5.jpg"]},"Consult_chateau_formulairea189":{"id":"Consult_chateau_formulairea189","dept":"54","canton":"Villerupt","commune":"Tiercelet","nom":"Tiercelet","type":"Château","periode":"XIV-XIX","histoire":"TIERCELET, reconstruit en 1825-1826  en remplacement d'une ancienne maison-forte mentionnée en 1333,  Propriété de la famille d'Autel jusqu'en 1718, racheté par les barons d'Eltz, puis passé par héritage au milieu du XVIIIe siècle aux comtes d'Hunolstein, et vendu à un négociant de Verdun au moment de la Révolution, le domaine fut racheté en 1822 par Jean Baptiste Pacotte, maître de forges à Villerupt, conseiller général, qui fit reconstruire le château. Par mariage il est passé à la famille de Ladonchamps qui en est toujours propriétaire. Les bâtiments, organisés autour d'une vaste cour, sont composés à l'ouest du logis, au nord de la ferme, à l'est et au sud-est des parties agricoles. Au sud-ouest, sont accolés deux portails à un bâtiment agricole isolé.","architecture":"TIERCELET, reconstruit ou transformé en 1826 en remplacement dune ancienne maison forte mentionnée en 1329, détruite pendant la guerre de trente ans, démantelée en 1671 par ordre de Louis XIV et à nouveau détruite au moment de la Révolution. Les bâtiments, organisés autour dune vaste cour, sont composés à louest du logis (isolé), au nord de la ferme, à lest et au sud-est des parties agricoles. Au sud-ouest, deux portails sont accolés à un bâtiment agricole isolé.","habitants":"famille d'Autel   et  famille de Ladonchamps \r\n        \"","divers":"A Tiercelet, le château de Tiercelet                                                 Gps 49° 27' 45\" nord, 5° 53' 06\" est","gps":"","images":["../image/image_54/54_Tiercelet_1.jpg"]},"Consult_chateau_formulaire5eeb":{"id":"Consult_chateau_formulaire5eeb","dept":"54","canton":"Vézelise","commune":"Blenod les toul","nom":"Toul_Blenod","type":"Château","periode":"XVI-XVIII","histoire":"Trois châteaux dans cet article Blenod les Toul, Bicqueley et  Moselly.                                                                              BLENOD les TOUL au début du XVIe siècle, Hugues des Hazards, voulant remercier les villageois pour la construction du château et de la nouvelle église, ainsi que pour la restauration des murailles, leur donna l'autorisation de construire des petits bâtiments destinés à abriter les récoltes à l'intérieur de l'enceinte fortifiée. Ces bâtiments appelés \"Loges\", prévus pour le stockage des récoltes et du vin, seront habités à partir de la Révolution par des familles pauvres. Une quarantaine de loges furent édifiées. Ces loges, construites avec des matériaux moins nobles que ceux de l'église, sont presque toutes identiques par leurs dimensions, leur plan et leur élévation. Elles constituent un patrimoine rural tout à fait exceptionnel.                                       BICQUELEY au sud de TOUL  à cinq  K.M château rural du XVIIIe siècle à vocation agricole qui fut la demeure d'un ecclésiastique puis un fief au service du roi de France ; témoin de l'histoire locale et des conflits militaires. Edifice inscrit au titre des  M.H. depuis 2012. Bicqueley subit régulièrement des inondations. Dans la nuit du 3 au 4 mai 2013, une crue exceptionnelle de la Bouvade a inondé le village. Selon un rapport du BRGM, cette inondation hors normes s'explique par une hauteur importante de la nappe souterraine dans le réseau karstique cette année-là, cumulée à une pluviométrie élevée mais non exceptionnelle. L'état de catastrophe naturelle a été reconnu par arrêté du ministère de l'intérieur du 21 janvier 2014.","architecture":"BLENOD, le château bien que fortement dénaturé présente deux portes fortes situées en vis à vis. Une partie du chemin de ronde, des canonnières et des tours sont encore visibles.                                                                                                                                MOSELLY à Chaudenay sur Moselle à 2  K.M. au sud du château 1760, restauré, résidence d'été des évêques de Toul construit par Nicolas Pierson, architecte du palais épiscopal de Toul, le château fut appelé par l'évêque, monseigneur Claude Drouas de Boussey, Moselly (évocation de la rivière), ce pseudonyme fut pris par Emile Chenin, romancier du Toulois.","habitants":"Blenods ; famille de  Hugues des Hazards,                                         Moselly monseigneur Claude Drouas de Boussey\r\n        \r\n        \"","divers":"Blenod les Toul, des duc de Bar grav 6-7                                                           Bicqueley grav-5 et   Moselly grav-4","gps":"","images":["../image/image_54/54_Toul_Blenod_1.jpg","../image/image_54/54_Toul_Blenod_2.jpg","../image/image_54/54_Toul_Blenod_3.jpg","../image/image_54/54_Toul_Blenod_4.jpg","../image/image_54/54_Toul_Blenod_5.jpg","../image/image_54/54_Toul_Blenod_6.jpg","../image/image_54/54_Toul_Blenod_7.jpg"]},"Consult_chateau_formulaire6948-3":{"id":"Consult_chateau_formulaire6948-3","dept":"54","canton":"Joeuf","commune":"Tucquegnieux","nom":"Tucquegnieux","type":"Maison-forte","periode":"XVI-XVII","histoire":"BRABANT, un château fort dit château de Brabant, qui est en fait une maison forte formée de quatre corps de bâtiments disposés autour d'une cour. Construite vers le milieu du XVIe siècle pour la famille de Serainchamps, érigée en fief le 26 juin 1584, propriété de la famille de Serainchamps jusqu'à la fin du XVIIIe siècle, puis de 1785 à 1792 de la famille de Gourcy. La maison fut transformée à plusieurs reprises, notamment en 1623. Repercée au XVIIIe siècle et à nouveau transformée en 1830 pour la famille Hieulle-Neveux, Il n'en subsiste plus aujourd'hui qu'un corps de bâtiment et la tour nord-est. C'était à l'origine un ensemble d'éléments défensifs. Le château figure dans l'inventaire général du patrimoine culturel depuis 1974.","architecture":"BRABANT, la ferme Sainte-Mathilde, située à Tucquegnieux village, datant de 1564, est classée au titre des  M.H. par arrêté du 21 mars 1994. Maison-forte formée de quatre corps de bâtiments disposés autour d'une cour  cantonnée de quatre tours. Elle fut construite vers le milieu du XVIe siècle.  L'intérieur de la bâtisse est aménagé en une confortable et accueillante ferme auberge, qui propose dans un cadre rustique et bien décoré un menu découverte. Les principales spécialités sont la potée lorraine dans le chaudron de la cheminée, la capacité d'accueil est de 60 personnes. La ferme attenante est une ferme biologique qui produit principalement du lait transformé en de pittoresques fromages tels la tome de Tucquegnieux, la bêtise, des fromages blancs et crèmes.  Sur la façade arrière de la ferme, on peut distinguer un croisillon d'un calvaire du XVIIIe siècle, remployé dans ladite façade;Il n'en reste plus aujourd'hui qu'un corps de bâtiment et la tour nord-est.","habitants":"famille de Serainchamps                                                      famille de Gourcy\r\n        \r\n        \"","divers":"A  Tucquegnieux le château de Tucquegnieux et de ste-Matilde grav 1, de Brabant grav 3-4","gps":"","images":["../image/image_54/54_Tucquegnieux_1.jpg","../image/image_54/54_Tucquegnieux_2.jpg","../image/image_54/54_Tucquegnieux_3.jpg","../image/image_54/54_Tucquegnieux_4.jpg"]},"Consult_chateau_formulaireb805":{"id":"Consult_chateau_formulaireb805","dept":"54","canton":"Vézelise","commune":"Bulligny","nom":"Tuméjus","type":"Maison-forte","periode":"XV-XIX","histoire":"TUMEJUS,  est une maison forte édifiée au début du XVe siècle, par Ferry Ier de Ligniville, seigneur de Ligniville, de Tantonville, le château de Tumejus à Bulligny est probablement construit à la suite du mariage de la comtesse de Graux et dame de Tumejus et de Ferri de Ligniville, vers 1432. Le château subit de lourdes destructions au cours de la guerre de trente ans et fait l'objet de réparations significatives dans la seconde moitié du XVIIe siècle. Le château fut partagé entre deux branches des Ligniville en 1608 et une des moitiés est cédée en 1647 à Claude Jacquot. Ses descendants  parviennent en 1744 à racheter l'ensemble du château qui se trouve regroupé. Une campagne de travaux marque cette période et donne au château son aspect actuel.","architecture":"TUMEJUS, jusqu'au XVIIe siècle, la maison forte se présente comme un grand donjon carré de 16,25 m de côté, flanqué de quatre tours rondes de 8 m de diamètre, représentant une surface au sol totale de 465 m2. Le tout bâti sur une parcelle de 6 000 m2, et cernés de douves emplit de l'eau du ruisseau poisson. L'ensemble castral se dresse à 800 m au nord du village de Bulligny, au pied de la côte de Meuse. Il est formé d'un bâtiment carré de 16,50 m de côté autrefois cantonné de 4 tours circulaires, dont deux subsistent au nord. Les maçonneries datent probablement de l'édifice médiéval mais l'ensemble des ouvertures datent du XVIIIe siècle et la majorité des canonnières sont postérieures au Moyen-Âge. L'emmarchement qui précède l'entrée, sur la façade sud, confère à l'édifice une allure plus résidentielle que défensive, en dépit du fossé périphérique autrefois enjambé par un pont-levis.","habitants":"Famille de Ferri de Ligniville\r\n        \r\n        \"","divers":"Tuméjus gps 48° 34' 38\" N, 5° 51' 01\" Est","gps":"","images":["../image/image_54/54_Tum%c3%a9jus_1.jpg","../image/image_54/54_Tum%c3%a9jus_2.jpg","../image/image_54/54_Tum%c3%a9jus_3.jpg"]},"Consult_chateau_formulaireac01":{"id":"Consult_chateau_formulaireac01","dept":"54","canton":"Jarny","commune":"Valleroy","nom":"Valleroy_54","type":"Manoir","periode":"XVIII","histoire":"VALLEROY, corps principal et colombier construits au début du XVIIIe siècle. Portail daté 1763, avec grille du ferronnier Jean François. Ailes et communs du XIXe siècle. Corps de logis principal repercé au XIXe siècle. L'édifice se compose de deux étages carrés et étage de comble, le gros-oeuvre : calcaire; moellon et enduit, type de couverture : toit à longs pans; croupe; toit en pavillon; toit conique, recouverts d'ardoise de tuiles creuses et de tuiles mécaniques.","architecture":"VALLEROY, en 1824, le château vendu à Nicolas Martin, juge de paix à Conflans. Il suréleva la partie centrale de lhabitation, remplaça les tuiles par des ardoises et les barreaux aux fenêtres par des volets à lattes. De 1824 à 1980, la propriété sest transmise dans la descendance de Nicolas Martin de génération en génération.   En 1892, Caroline, petite-fille de Nicolas Martin, épouse Georges François, notaire à Pont-à-Mousson. Il décédera en 1915. Très attachée à cette maison, elle fit aménager un très beau parc. Après le décès de Caroline François à Valleroy en 1949, son fils Charles François en devient le propriétaire. Comme son père, il était également notaire à Pont-à-Mousson.  Avec son épouse, Germaine, il y accueillait en été ses 6 enfants et ses 14 petits enfants.  Laprès midi, dans son bureau au 1er étage dont la vue donnait sur le parc, il aimait écrire des textes sur lhistoire de la Lorraine. Il était membre de lAcadémie de Stanislas quil présida en 1970-1971.  Après la mort de Charles François en 1980, la propriété fut vendue en septembre 1981.  De 1914 à 1918, le château fut occupé par les allemands et servit notamment de prison.","habitants":"Famille de  Nicolas Martin\r\n        \r\n        \"","divers":"A Valleroy châteu de Valleroy","gps":"","images":["../image/image_54/54_Valleroy_54_1.jpg"]},"Consult_chateau_formulaire81a7":{"id":"Consult_chateau_formulaire81a7","dept":"54","canton":"Vandoeuvre-lès-Nancy","commune":"Vandoeuvre-lès-Nancy","nom":"Vandoeuvre_Nancy","type":"Château","periode":"XVI-XVIII","histoire":"Trois châteaux à Vandoeuvre les Nancy; Anthoine, Charmois et Montet.                                                               ANTHOINE, demeure d'une famille d'officiers ducaux édifié aux XVIe et XVIIe siècles, modifié aux XVIIIe?et ?XIXe siècles.                                                                                                              Au sud -est à 10 K.M. à SEXEY aux FORGES,  manoir du XVIe siècle reconstruit en 1572 ancienne place forte et fabrique de boulets de canons (vestiges d'anciens remparts autour du village) ; porche d'entrée, tourelle polygonale, fossés en eau, canonnières, sculpture dite \"Grigne-Dents\", escalier à vis, grande salle.                                                                                                                  MONTET, le duc Antoine de Lorraine cède en 1527 ce domaine à son médecin Jean Geoffroy, qui y fait construire une demeure de style gothique. Aujourd'hui, il est la propriété de l'université de  Nancy.","architecture":"ANTHOINE,  a été construit à la fin du XVIe siècle ou au début du XVIIe siècle et modifié au XVIIIe siècle, puis au début du XIXe siècle. Éléments protégés MH : les façades et les toitures nord-est ; les deux tours d'angle ; les façades et les toitures des ailes en retour ; l'escalier avec sa cage vitrée ; le mur de clôture du domaine et le jardin : inscription par arrêté du 4 avril 1996.                                                                                                                                     CHARMOIS   Édifié en 1726 par le peintre Charles-Joseph Gilles dit le provençal. En 1896, François-Camille Jeanpierre rase la bâtisse pour élever le manoir actuel d'inspiration néo-gothique en l'entourant d'un jardin à l'anglaise.                                                                                                                           MONTET, le clocher de la chapelle portait la date de 1600. L'édifice est détruit à la Révolution et une construction néo-gothique le remplace en 1872.","habitants":"Seigneurs locaux\r\n        \r\n        \r\n        \r\n        \"","divers":"à Vandoeuvre les Nancy; Anthoine grav-4, Charmois grav-1-2 et Montet grav-3.                                                                          Anthoine  gps 48° 39' 26\" N, 6° 10' 12\" E                               Charmois 48° 40' 05\" N, 6° 10' 27\" Est                                    Sexey forges grav -5_6    gps  48° 37' 17\" N, 6° 02' 46\" Est","gps":"","images":["../image/image_54/54_Vendoeuvre_Nancy_1.jpg","../image/image_54/54_Vendoeuvre_Nancy_2.jpg","../image/image_54/54_Vendoeuvre_Nancy_3.jpg","../image/image_54/54_Vendoeuvre_Nancy_4.jpg","../image/image_54/54_Vendoeuvre_Nancy_5.jpg","../image/image_54/54_Vendoeuvre_Nancy_6.jpg"]},"Consult_chateau_formulaire4184":{"id":"Consult_chateau_formulaire4184","dept":"54","canton":"Vézelise","commune":"Vaudémont","nom":"Vaudémont_54","type":"Château vestiges","periode":"XII- XVIII","histoire":"Deux châteaux dans cet article; Vaudemont et Vandeleville.                    VAUDEMONT,  château-fort sur un éperon barré sans doute construit au XIe siècle pour les comtes de Vaudémont, peut-être Gérard 1er (1071 ; vers 1120), il en subsiste une partie de la courtine et le donjon dit tour Brunehaut bâtie avec des remplois gallo-romains, elle était prolongée au nord par un long bâtiment légèrement décalé vers l'est dont les vestiges sont actuellement enfouis sous une levée de terre. Réparée au XVe siècle puis démantelée en 1639 sur ordre de Louis XIII, restaurée en 1930.\r\nChâteau de Vaudémont  des comtes de Vaudémont, Tour Brunehaut.                                                                                                                      VANDELEVILLE à l'ouest de Vaudémont date du XVIIIe siècle. La ferme attenante possède un colombier rond du XVIIIe siècle.   Monsieur Louis de la Mothe fut le premier seigneur à résider à Vandeléville, dès le début du XVIIIe siècle. Il avait acheté la seigneurie de ce village à la famille de Haraucourt. Louise de la Mothe a épousé Daniel de Cardon-Vidampierre. Cest Jean-Philippe, le petit fils, qui fit construire le château en 1712. Il était premier gentilhomme à la chambre des princes à la cour de Lunéville. Le 15 février 1723, la terre de Vandeléville fut érigée en comté. Le seigneur de Cardon-Vidampierre sest ruiné en faisant construire une telle demeure, qui nétait, en fait, quune résidence secondaire. A sa mort, elle fut saisit, puis vendue au comte dAlençon. Mise sous séquestre à la Révolution, elle fut achetée en 1802 par la famille Olry de Vèzelise.  Cette famille a gardé le  château jusquen 1958; une fille Olry avait épousé le comte de Béarn, dernier propriétaire avant les PTT.","architecture":"VAUDEMONT, considéré comme le plus ancien donjon de France, la « Tour de Brunehaut » construite avec des remplois gallo-romains et la « Tour du Guet » sont les vestiges de l'ancien château en éperon barré des comtes de Vaudémont qui passait pour le plus ancien de toute la Lorraine, probablement du XIe siècle, avant la datation des vestiges du donjon du château de Fontenoy-le-Château. La tour est réparée au XVe siècle, démantelée en 1639 sur ordre de Richelieu et restaurée en 1930.         Éléments protégés MH : les ruines du château fort de Vaudémont : classement par liste de 1840. Des parquets d'époques, des murs et des colonnes dans leur jus.                                                                         VANDELEVILLE, est une des merveilles architecturales de notre région. Construit au XVIIIe siècle avec un parc de 2 hectares qui entoure la bâtisse, le château de Vandeléville reste incontournable lors des balades dans le Saintois. Visite guidée avec Thibaut Protois l'un des propriétaires.","habitants":"Vaudemont,  les comtes de Vaudémont                                       Vandeleville , famille de Haraucourt\r\n        \"","divers":"vestiges de la tour Brunehaut grav 1-2      et château de Vandeleville grav 3-4                                                                                gps 48° 25' 04? N, 6° 03' 13? Est","gps":"","images":["../image/image_54/54_Vaud%c3%a9mont_54_1.jpg","../image/image_54/54_Vaud%c3%a9mont_54_2.jpg","../image/image_54/54_Vaud%c3%a9mont_54_3.jpg","../image/image_54/54_Vaud%c3%a9mont_54_4.jpg"]},"Consult_chateau_formulaire0b47":{"id":"Consult_chateau_formulaire0b47","dept":"54","canton":"Dieulouard","commune":"Ville au Val","nom":"Ville_au_Val","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article de Ville au Val et Villers les Prudhomme                                                                                                                                                                                                                                               VILLE AU VAL, il appartenait au diocèse de Verdun, au domaine temporel des évêques de cette ville, et se trouvait enclavé dans la prévôté de Dieulouard, dans la terre du Barrois. Rentré ensuite dans le duché de Lorraine, il fut réuni au bailliage de Pont-à-Mousson, généralités et parlement de Nancy, avec les coutumes dites de Saint-Mihiel, et la paroisse fut comprise dans le diocèse de Metz, archiprêtre de Mousson. Possession de Huart de Beaufremont en 1334 rend  hommage  pour la ville au comte de Bar. En 1718  les Lopez-Gallo sont seigneur de Ville en 1766 le duché de Bar est réuni à la couronne. les héritiers  au XVIIIe siècle les familles d'Haussonville, puis d'Haussen  acquis en 1809 par le comte François-Antoine-Louis Bourcier, conseiller d'état, meurt en 1828  passa par alliance  au baron de Perville ou Fregeville de Gau, passa ensuite en 1896 à la famille de Berthe de Pommery qui le possède toujours.                                                                                                                                            VILLIERS LES-PRUDHOMME, existence d'une forteresse au XIe, transformée en château au XVe. Messire Pierresson, dit Le Prud'homme, est le premier propriétaire dont le nom soit révélé par des titres de 1314 et 1329  ; il est assez probable que c'est lui qui aura donné son nom au domaine. Par une charte du 18 août 1486, Guillaume d'Haraucourt fit concession à Claude de Villers-le-Prudhomme, seigneur dudit lieu, des droits de haute, moyenne et basse justice dans l'étendue de ce domaine, à condition qu'on lui rendrait foi et hommage pour cette terre, qui était de franc-alleu. Ce domaine est passé dans trois familles : celle des Villers-le-Prudhomme, continuée en ligne directe par les de Saintignon et les du Hautoy, celle de M. de Lasalle, puis par M. François Gouy, ancien avocat au parlement de Nancy.","architecture":"VILLE AU VAL, château fort du XIe siècle, remanié aux XVIIe-XVIIIe siècles  avait encore un seigneur particulier qui avait droit de haute justice et qui habitait un vaste château avec pont-levis, créneaux, murs épais et parc bien entretenu au XVIII malgré l'absence d'éléments défensifs, il conserve une structure caractéristique des constructions médièvales alignant quatre corps de bâtiment flanqués  de tour aux angles et cernés de fossés  en avant une basse cour qui commande l'accès à la cour intérieure,  le corps côté nord  est flanqués de deux tours massives coiffées de toits coniques couvert d'ardoise, transformations des façades en corps de logis, cour intérieure, la tour de Bourgogne avec le four banal et l'ancienne cuisine sont des parties inscrites en 1988 et 2004 ; la chapelle a été classée au titre des monuments historiques en 1995.\r\nVILLERS les PRUDHOMME, Les quatre tours, l'escalier en vis du logis et son escalier d'honneur, l'ensemble des façades et des toitures, le sol de la cour: inscription par arrêté du 19 janvier 2000  construction : du XVIe siècle,  et du XVIIe siècle château de Villers-les-Prudhomme  les quatre tours, l'ensemble du logis, l'escalier à vis et l'escalier d'honneur, le sol de la cour et les façades sont l'objet d'une inscription au titre des M.H.  par arrêté du 19 janvier 2000.","habitants":"Claude de Villers-le-Prud'homme,\r\n        \r\n        \"","divers":"Ville au Val grav 1-2 et Villers les Prudhomme  grav-3-4                            Gps48° 50' 51\" N, 6° 07' 21\" E","gps":"","images":["../image/image_54/54_Ville_au_Val_1.jpg","../image/image_54/54_Ville_au_Val_2.jpg","../image/image_54/54_Ville_au_Val_3.jpg","../image/image_54/54_Ville_au_Val_4.jpg"]},"Consult_chateau_formulaire4a7b":{"id":"Consult_chateau_formulaire4a7b","dept":"54","canton":"Nancy","commune":"Villers-lès-Nancy","nom":"Villers_lès_Nancy","type":"Château","periode":"XVII","histoire":"Deux châteaux dans cet article; Madame Graffigny et Rémicourt.                                                                          MADAME Graffigny, demeure du XVIIe siècle dont l'écrivaine Françoise de Graffigny fut l'occupante et à laquelle elle laissa son nom. Dautres occupants célèbres ont habité le château : Benjamin Constant et Mathieu de Dombasle. Ce château est hérité de sa mère (nièce de Jacques Callot), que son époux (M. de Graffigny) sétait engagé à restaurer. Cette demeure, faisait partie dun ensemble plus vaste : le parc Madame de Graffigny, qui possède de nombreuses essences rares. Vers 1712, François Huguet de Graffigny, sera à l'origine du château et du parc dont le célèbre agronome Charles-Alexandre Mathieu de Domsbale s'est occupé. Le financier Elie a poursuivi l'aménagement du parc. Le château a été réaménagé en 1865. Aujourdhui, l'ensemble est géré par la ville de Villers-lès-Nancy. Il accueille des événements, des salons, des rencontres, et des expositions temporaires. A voir notamment le cèdre du Liban, un séquoia, un ginkgo biloba, un néflier, un polownia.","architecture":"REMICOURT, château existant dès 1270, construction d'une chapelle en 1334 restaurée au XVIIIe siècle. Maison forte du XIIIe siècle qui fut érigé en fief par les ducs de Lorraine en 1426. Au Moyen Âge, le seigneur de Remicourt avait droit de justice, sur son fief de Villers. Les historiens affirment qu'un gibet était dressé au lieu-dit « La Justice ».  Le fief est rattaché à Villers-lès-Nancy en 1671.\r\nLa plus grande partie est du XVIIIe siècle, mais conserve les bases de deux tours et un portail d'entrée aux armes de Lorraine. Il a un temps accueilli une ferme, un camping et une auberge de jeunesse. Le château est en cours de remaniement.","habitants":"écrivaine Françoise et François Huguet de Graffigny\r\n        \r\n        \"","divers":"Madame Graffigny  grav-1-2 et Rémicourt grav 3-4 Madame  gps 48° 40' 12\" N, 6° 08' 46\" Est                                     Rémicourt gps 48° 39' 59\" nord, 6° 09' 05\" est","gps":"","images":["../image/image_54/54_Villers_l%c3%a8s_Nancy_1.jpg","../image/image_54/54_Villers_l%c3%a8s_Nancy_2.jpg","../image/image_54/54_Villers_l%c3%a8s_Nancy_3.jpg","../image/image_54/54_Villers_l%c3%a8s_Nancy_4.jpg"]},"Consult_chateau_formulairec570":{"id":"Consult_chateau_formulairec570","dept":"54","canton":"Jarny","commune":"Xonville","nom":"Xonville","type":"Château","periode":"XVII","histoire":"XONVILLE, édifice du début du premier quart XVIIe siècle. Propriété au XVIe siècle de la famille de Xonville, en 1668 passée aux mains de Michel de la Turelle, capitaine des carabiniers de Louis XIV, puis dans le courant du XVIIIe siècle à Nicolas François de Curel, directeur des fortifications de Verdun, Longwy, Luxembourg et Malmédy, qui le restaura,","architecture":"XONVILLE, le château de Xonville est un édifice  château de plan massé cantonné de tours carrées , un étage carré, toit à longs pans ; croupe ; toit en pavillon couvert en ardoise à quatre tours carrées du début 1er quart XVIIe siècle. Propriété au XVIe siècle de l'écrivaine Françoise de Graffigny, passée en 1668 à Michel de la Turelle, capitaine des carabiniers de Louis XIV, puis dans le courant du XVIIIe siècle à Nicolas François de Curel, directeur des fortifications de Verdun, Longwy, Luxembourg et Malmédy, qui le restaura.","habitants":"Famille de Michel de la Turelle\r\n        \r\n        \"","divers":"château de Xonville","gps":"","images":["../image/image_54/54_Xonville_1.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','54 — Meurthe-et-Moselle'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
