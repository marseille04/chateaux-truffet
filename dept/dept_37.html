tre de baron et plusieurs d'entre eux participent aux Croisades.  Passe à la maison de Laval qui obtint la classification en comté. En 1619, le comté est acheté par Charles d'Albert de Luynes, favori du roi Louis XIII. Il fait de la terre un duché et prairie auquel il donne le nom de Luynes en l'honneur du nouveau seigneur, le territoire placé sous l'autorité des ducs de Luynes va s'étendre à près des deux tiers du nord de la Touraine.  A sa mort, en 1623 interruption des travaux, sa veuve Marie de Rohan de Montbazon la célébre héroïne de la Fronde restée sans descendants mâles de son mariage, transmettra le domaine au fils du connétable le titre ducal de Chevreuse ainsi que le château de Dampierre , hérité de la maison de Lorraine.   Le château est resté dans la même famille  depuis 1619 à l'actuel duc de Luynes.","architecture":"LUYNES,  se dresse sur un imposant promontoire rocheux, qui domine le Val-de-Loire. Il appartient à Philippe d'Albert de Luynes qui possède aussi le château de Dampierre dans les Yvelines.   Un deuxième château est rebâti dès le XIIe siècle, il est toujours visible.  Le château comprend alors une haute-cour et une basse-cour, celle-ci, située en contrebas de la première, accueille des granges et des écuries. Un donjon occupe le centre de la haute-cour dont les remparts sont de deux étages plus hauts qu'aujourd'hui et couronnés de galeries en bois (hourds), dont le matériau a été offert par Saint Louis. Au nord, l'édifice est protégé par une douve qui se dédouble à lest. Entre ces deux douves se trouvait un châtelet qui protégeait laccès du château par deux ponts-levis.  Au XVIIe siècle, le deuxième duc de Luynes fait démolir le donjon et bâtir une grande aile classique, fermant la façade sud, donnant sur la vallée. Cette aile sera partiellement détruite au XVIIIe siècle. Pendant la Renaissance, la baronnie devient le siège d'un comté. Des ouvertures sont percées dans les murailles.  Le château de Luynes est une ancienne forteresse de style médiéval, bâtie au XIIIe siècle. Sa construction ne sera achevée qu'au XVIIe siècle.  Le château de Luynes est inscrit aux M.H. depuis le 17/07/1926.","habitants":"Philippe d'Albert duc de Luynes.\r\n        \"","divers":"Luynes; 47° 23' 8,12\" Nord, 0° 33' 3,92\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Luynes_1.jpg","../../jctruffet.com/image/image_37/37_Luynes_2.jpg","../../jctruffet.com/image/image_37/37_Luynes_3.jpg","../../jctruffet.com/image/image_37/37_Luynes_4.jpg","../../jctruffet.com/image/image_37/37_Luynes_5.jpg"]},"Consult_chateau_formulaired754":{"id":"Consult_chateau_formulaired754","dept":"37","canton":"Ste-Maure de Touraine","commune":"Léméré","nom":"Léméré","type":"Château","periode":"XIV-XVI","histoire":"Deux châteaux à Léméré ; Rivau et Noblaye.                                         RIVAU, fut fortifié au XVe siècle puis humanisé à la Renaissance. Ce château de Touraine est à la fois forteresse imprenable et lieu de vie agréable. Rabelais, dans Gargantua fait don du château au capitaine Tolmère, en récompense de ses victoires lors des guerres picrocholines. En 1429, vers la fin de la guerre de 100 ans, Jeanne d'Arc vient chercher des chevaux au Rivau, il était déjà reconnu pour la qualité de ses chevaux. En 1438, Anne de Fontenaye héritière du fief l'apporte en dot à son époux François de Beauvau, érigé en marquisat en 1664 châtelain du Rivau et capitaine de François Ier, construit de monumentales écuries qui fourniront ses étalons au roi. Au XVIIIe siècle passe dans la famille de Castellane puis à une succession de propriétaires et en 1992 acquit par la famille Laigneau. Aujourd'hui, il est classé M.H.","architecture":"NOBLAYE. ce petit château entre Tour et Chinon est un petit bonheur : au milieu des champs et des bois, le cadre est très reposant. L'accueil des propriétaires est très sympathique ; tout est aménagé avec goût et la table est très soignée.  C'est un château qui date du XVIe siècle au cur d'un parc de 20 hectares, ses chambres d'hôtes.                                                                                 RIVAU, forteresse, construite au XIIIe siècle ce quadrilatère cantonné sur trois de ses angles de tours cylindriques, le Rivau conserve tout son système défensif : donjon, chemin de ronde, mâchicoulis, archères, créneaux et ses douves. C'est aussi un des premiers châteaux d'agrément: cheminées, coussièges, fresques à huile et a fresco du XVIe siècle, en font un château harmonieux. Depuis 1992, les propriétaires actuels ont mis en place une importante campagne de rénovation pour prévenir la ruine du château, des étables et des écuries, et lui faire retrouver son lustre d'antant.","habitants":"Rivau; famille de Castellane                      \r\n        \r\n        \"","divers":"à Léméré ; Rivau et Noblaye. Grav-1                           Noblaye  47° 05' 01\" Nord, 0° 20' 09\" Est                             Rivau 47° 06' 13\" Nord et 0° 19' 24\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_L%c3%a9m%c3%a9r%c3%a9_1.jpg","../../jctruffet.com/image/image_37/37_L%c3%a9m%c3%a9r%c3%a9_2.jpg","../../jctruffet.com/image/image_37/37_L%c3%a9m%c3%a9r%c3%a9_3.jpg","../../jctruffet.com/image/image_37/37_L%c3%a9m%c3%a9r%c3%a9_4.jpg","../../jctruffet.com/image/image_37/37_L%c3%a9m%c3%a9r%c3%a9_5.jpg"]},"Consult_chateau_formulaire80d8":{"id":"Consult_chateau_formulaire80d8","dept":"37","canton":"Chinon","commune":"Marçay","nom":"Marcay_37","type":"Château","periode":"XV-XIX","histoire":"Deux châteaux à Marcay celui de Marcay et de Duconnay. DUCONNAY, construit à la fin du XVe siècle ou au début du XVIe siècle, a été modifié au XIXe siècle. La propriété appartenait au XVIIIe siècle à Jahan de Fourneau, seigneur de Duconnay. Le château présente des échauguettes circulaires en encorbellement, une tour d'escalier polygonale, une porte en accolade et des lucarnes. Son pigeonnier rond, semi-enterré, possède un toit avec lanternon, élévation à travées à un étage carré ; étage de comble, escaliers demi-hors-oeuvre et escalier à vis sans jour, Gros-uvre : calcaire ; pierre de taille, toit polygonal ; toit en pavillon ; toit conique en ardoise. Propriétaire, aujourd'hui de monsieur André Louis.","architecture":"MARCAY, le château fut construit autour des années 1150, puis reconstruit au XVe siècle, dévasté par les huguenots et restauré à partir de 1597. Entouré jadis de douves, qui restent en partie à l'est, précédé au nord par une vaste cour entourée de communs, le château est constitué par un bâtiment principal qui se développe entre deux grosses tours rondes, couronnées d'un chemin de ronde avec créneaux et mâchicoulis. Côté sud, deux ailes en retour d'équerre s'ajoutent au bâtiment principal, aboutissant chacune à une tour polygonale. Percements et toitures ont été refaits au XVIIe siècle, puis remanié au XVIIIe siècle, et une campagne de restauration fut entreprise à la fin du XIXe siècle ou au début du XXe siècle (entre 1890 et 1914), dans le style néo-gothique. Communs construits depuis 1833 au nord du château. Vestiges de fossés à l'est et d'une chapelle. Au sud-ouest, escaliers remaniés. Hôtel-restaurant gastronomique.","habitants":"Duconnay; Famille de  Jahan de Fourneau                     Marcay;\r\n        \"","divers":"à Marcay celui de Marcay grav 1-2-3-4 et de Duconnay, Marcay : 47° 06' 03\" Nord et 0° 13' 06\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Marcay_37_1.jpg","../../jctruffet.com/image/image_37/37_Marcay_37_2.jpg","../../jctruffet.com/image/image_37/37_Marcay_37_3.jpg","../../jctruffet.com/image/image_37/37_Marcay_37_4.jpg","../../jctruffet.com/image/image_37/37_Marcay_37_5.jpg","../../jctruffet.com/image/image_37/37_Marcay_37_6.jpg","../../jctruffet.com/image/image_37/37_Marcay_37_7.jpg"]},"Consult_chateau_formulairedd7f":{"id":"Consult_chateau_formulairedd7f","dept":"37","canton":"Château-Renault","commune":"Chemillé sur Dême","nom":"Marchère","type":"Château","periode":"XXIV-XVII","histoire":"MARCHERE, propriété de la famille de Bueil à partir de 1367 et siège de leur justice seigneuriale, un château fort dut être édifié dès le XIVe siècle. De cette époque reste le châtelet d'entrée situé dans la partie sud de l'enceinte. En 1655, la propriété passa par héritage aux Lezay qui la vendirent en 1772 à Honoré Martel de Gaillon. Celui-ci entreprit la reconstruction du logis. Une inscription placée sur la base de la cheminée du pignon Est indique ; fait par Mathurin Robichon M. Masson en 1789.  En 1806, Etienne Martel vendit la Marchère à Charles Vacher, son fils Jules entreprend, vers 1888, d'importants travaux de réfection: sur la façade nord, construction d'une terrasse de pierre bordée d'un escalier, d'une balustrade, surélévation des combles et installation de lucarnes. Sur la façade Sud, construction d'une tourelle pentagonale. Les tours circulaires de la façade nord sont certainement antérieures au corps de logis, l'épaisseur des murs diffère et étaient peut-être indépendantes. A la fin du XIXe siècle, de nouveaux communs avec encadrement des baies en brique et pierre ont été édifiés et une chapelle fut aménagée au rez-de-chaussée du châtelet, (les vitraux sont datés de 1893), en remplacement d'une chapelle évoquée dans un acte du XVIIe siècle, mais dont l'emplacement est inconnue. L'édifice est transmis à la famille Leddet en 1910 qui le posséda jusqu'en 1996, date où il fut acquis par les actuels propriétaires.","architecture":"MARCHERE, château composé de deux corps de bâtiments : le logis et le châtelet d'entrée. Logis, de plan quadrangulaire, flanqué sur sa façade Nord, de deux tours rondes en pierre de taille appareillées, coiffées d'un toit conique, placées en demi hors oeuvre sur les angles Est et Ouest. Sur la façade Sud, tour pentagonale hors-oeuvre, coiffé d'un toit polygonal n'abritant pas l'escalier comme son aspect pourrait le faire croire, mais le vestibule au rez-de-chaussée et des pièces supplémentaires à chaque étage. Le corps principal du logis présente des baies à meneaux, sur la façade Sud et des lucarnes en pierre de taille. Murs en calcaire moellon enduit. Encadrement des baies et chaînages en pierre de taille. Châtelet : plan en L, composé de trois niveaux : au rez-de-chaussée, chapelle voûtée ; à chaque étage, une grande salle dotée d'une cheminée monumentale et éclairée de baie à meneau. La façade Nord porte la trace des embrasures du pont-levis, l'emplacement de la porte cochère et celle de la porte piétonne. Sur la partie gauche, la porte en anse de panier surmonté d'un arc au décor néo-gothique donne accès à la chapelle éclairée de vitraux placés dans des baies en arc brisé. Sur la façade Ouest, escalier droit en pierre donnant accès aux parties hautes. Murs en pierre de taille. Toits en croupe.","habitants":"Famille d'Honoré Martel de Gaillon\r\n        \"","divers":"Château de Machère à Chemillé sur Dëme","gps":"","images":["../../jctruffet.com/image/image_37/37_March%c3%a8re_1.jpg","../../jctruffet.com/image/image_37/37_March%c3%a8re_2.jpg","../../jctruffet.com/image/image_37/37_March%c3%a8re_3.jpg","../../jctruffet.com/image/image_37/37_March%c3%a8re_4.jpg"]},"Consult_chateau_formulaire973e":{"id":"Consult_chateau_formulaire973e","dept":"37","canton":"Langeais","commune":"Marcilly sur Maulne","nom":"Marcilly_Maulne","type":"Château","periode":"XVI","histoire":"MARCILLY, fief relevant des Montsoreau en 1440  les terres entre par alliance  dans la famille de Laval à la fin du XVIe siècle l'héritière du domaine est Jeanne  de Laval épouse de François de Saint-Nectaire dont les enfants cédent en 1608 à  Charles Fouquet, sieur d'Esves conseiller du roi receveur des finances à tours et futur trésorier de France. Le fils de Charles Antoine étant mort sans descendance en 1667  Marcilly revient par legs à sa nièce Marie-Madeleine de Saint-Gelais de Lusignan de Lansac, devenue marquise de Vassé par mariage, son fils Antoine -Joseph de Vassé laissera deux filles de son mariage  avec Louise de Fesques; Armande alliée au marquis de Romainville et de la terrible Marie-Madeleine épouse de son cousin Louis-Joseph de Fesques seigneur de la Roche-Bousseau qui se verra attribuer Marcilly par partage. A la mort de madame de la roche en 1786 son fils François hérite exécuté  à la Révolution en 1794 ses deux filles exilées l'une d'entre elle madame de Rochemore récupére le château en 1798, les rochemore consacreront d'important  travaux pour le passer  à leur fils Louis-Camille  lieutenant  colonel sa fille épouse en 1865 le baron de Champchevrier Léon-Marie de la Rue qui le gardèrent jusqu'en 1970. Aujourd'hui à la famille Wanecq. Il est classé aux M.H. depuis 1944.","architecture":"MARCILLY, le domaine comprend le château, les communs et le parc dans lequel se trouvent une petite construction appelée châtelet ou prieuré, datant de l'époque du château, et deux tourelles isolées plus anciennes. Le château est une construction de la seconde moitié du XVIe siècle et se compose d'un corps de logis central plus élevé, de deux ailes en saillie sur la façade ouest, et de quatre pavillons d'angle en forme de bec, disposition particulière ajoutée pour la défense. A l'intérieur, les pièces d'habitation du rez-de-chaussée et celles de réception au premier étage, ont conservé leurs plafonds à poutres et solives apparentes ainsi que des peintures décoratives. Le premier est également orné de tapisseries des XVIIe et XVIIIe siècles. Au deuxième étage de la partie centrale se trouve la chapelle, ornée de boiseries à motifs religieux. Au XIXe siècle, la terrasse qui s'étendait à l'est a été démolie. Le jardin à la française  a disparu. S'y trouve une fontaine qui alimente des bassins successifs, et les restes des deux tourelles, vestiges du château primitif.","habitants":"Famille de Laval\r\n        \"","divers":"Marcilly sur Maulne                                                                  Marcilly 47° 32' 59\" Nord et 0° 14' 02\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Marcilly_Maulne_1.jpg","../../jctruffet.com/image/image_37/37_Marcilly_Maulne_2.jpg","../../jctruffet.com/image/image_37/37_Marcilly_Maulne_3.jpg","../../jctruffet.com/image/image_37/37_Marcilly_Maulne_4.jpg"]},"Consult_chateau_formulairef528":{"id":"Consult_chateau_formulairef528","dept":"37","canton":"Ste-Maure de Touraine","commune":"L","nom":"Marigny_37","type":"Château","periode":"XVI-XVII","histoire":"Le château de la Commanderie est un château bâti à l'Ile-Bouchard, est une belle demeure de style Directoire, qui est entourée d'un parc de 5 hectares.                                                                        MARIGNY, destruction du quartier Saint-Gilles en 1130 par l'angevin Geoffroy le Bel. Au cours du second quart du XIIIe siècle, construction d'une commanderie de Templiers au lieu-dit \"le Temple\" aujourd'hui situé sur la commune de Brizay. Les Bouchard cessent d'être seigneurs de la châtellenie en 1427. Leur dernière descendante, Catherine de l'Ile, épouse en 1427 Georges de la Trémoille, vicomte de Thouars. Les La Trémoille restèrent barons de L'Ile-Bouchard de 1427 à 1629. En 1483, Louis II de la Trémoille devient baron de L'Ile-Bouchard. C'est à ce personnage exceptionnel et à son épouse Gabrielle de Bourbon que la ville doit son développement et les embellissements apportés au château. En 1493, réception du roi Charles VIII au château. En mai 1498, construction d'un nouveau corps de logis ainsi qu'un jeu de paume. En 1514, début de la construction de la chapelle du château. Il ne reste rien (à l'exception de fragments de vitraux) de cet ensemble fastueux, le château ayant été rasé en totalité.","architecture":"MARIGNY, la façade antérieure du château de Marigny était précédée d'une cour, fermée à l'ouest par un mur parallèle au corps de logis et percé d'un portail dans sa partie centrale. Un bâtiment lui était accolé perpendiculairement; à sa place se trouvent les écuries. La galerie date du XVIIe siècle, le corps de logis, du XVIIe ou XVIIIe siècle, fut remanié au XIXe siècle. La maison de gardien et l'écurie-sellerie datent du XIXe siècle. Le château de Marigny comprend trois travées; un pavillon est accolé à chacune des extrémités. A l'angle nord, une tour d'escalier, de plan carré, renferme un escalier à vis. Perpendiculairement est accolée une galerie de cinq travées, dont trois des baies en plein cintre repercées de fenêtres. Le comble de la galerie est éclairé par trois lucarnes à fronton triangulaire. L'écurie-sellerie est composée d'un long porche dans-oeuvre surmonté d'un fenil, accosté de deux petits pavillons. Celui de gauche, lorsqu'on tourne le dos au château, abrite un logement. La maison du gardien est en moellon enduit. Le pignon antérieur est percé de deux baies d'inspiration néo-gothique à meneau et croisillon. Accès à l'est du parc par un portail à bossages à fronton triangulaire orné d'une coquille.","habitants":"Famille de la Trémoille\r\n        \"","divers":"Château de Marigny à L'Île-Bouchard","gps":"","images":["../../jctruffet.com/image/image_37/37_Marigny_37_1.jpg","../../jctruffet.com/image/image_37/37_Marigny_37_2.jpg"]},"Consult_chateau_formulaire9167":{"id":"Consult_chateau_formulaire9167","dept":"37","canton":"Ste-Maure de Touraine","commune":"Marigny-Marmande","nom":"Marigny_Marmande","type":"Château","periode":"XVI-XVII","histoire":"Trois châteaux dans cet article celui de Chillou, Mondon et Marigny.                                                                                            MONDON, appartint à Guy Le Roy puis Louis du Plessis, ancêtres du cardinal de Richelieu. Le château fortifié a été  reconstruit à la fin du XVIe siècle. L'entrée se fait par une porte à fronton qui était précédée d'un pont-levis. Elle s'ouvre au milieu du côté ouest de l'enceinte dont l'angle sud-ouest est défendu par une tour à meurtrières, couronnée d'un dôme. La cour accède à une seconde porte avec poternes, flanquée de pilastres, laquelle donne accès à la cour d'honneur. Les logis seigneuriaux ont presque entièrement disparu. Le château s'étendait au sud de la cour, mais il n'en reste que l'étage inférieur du mur sud. Ce mur aboutit à un pavillon d'angle rectangulaire. A l'est, une saillie du mur témoigne d'un grand pavillon d'angle. A l'angle rentrant, une trompe devait supporter une tourelle. Au rez-de-chaussée de ce pavillon se trouvait la chapelle. Au sud de cet ensemble se développent les murs occidental et méridional d'une enceinte rectangulaire, ouvrage de défense avancé dont les angles portent des échauguettes. Au milieu du mur sud, une grande console soutenait une tourelle disparue. A l'angle nord-est, une grosse tour cylindrique, dont il ne reste que l'étage inférieur, renforçait l'enceinte.","architecture":"CHILLOU, construit à la place d'un édifice plus ancien. En 1506, il passe aux mains de François du Plessis, arrière grand-père du cardinal de Richelieu. Le Chillou fit partie du domaine érigé en duché en 1631, en faveur du ministre de Louis XIII. Les ducs de Richelieu le possédèrent jusqu'en 1805.  entouré de douves, le château comprenait quatre corps de bâtiments limitant chacun un côté d'une cour intérieure rectangulaire. Au sud, la porte fortifiée, élevée sur plan carré, flanquée sur deux angles d'une tourelle circulaire couronnée de mâchicoulis. A l'est, la porte est reliée par une tour d'escalier en retrait, à la grosse tour d'angle sud-est. Le corps de logis oriental réunit cette tour à celle de l'angle nord-est. Le bâtiment nord comprend la chapelle. L'angle nord-ouest est occupé par une tour qui fut ou est devenu le pigeonnier.                                                                                                                            MARIGNY dit de l'Ardoise : le fief de lArdoise, faisait partie de la paroisse dAntogny-le-Tillac. Le château, construit sur une ancienne villa gallo-romaine, fut vendu comme bien national après la Révolution. Il reste quelques vestiges des bâtiments ainsi que le grand portail dentrée, du XVIe siècle, un peu trop restauré à mon goût, avec le blason de la famille de Marigny. Le « banc » situé devant ce portail. Une partie des communs de ce château a été transformée en maison de retraite.","habitants":"Famille de  Guy Le Roy puis Louis du Plessis                          Chillou, famille de François du Plessis Marigny; famille de Marigny\r\n        \"","divers":"de Chillou de Mondon de Marigny.                                              Chillou 46° 56' 55\" nord, 0° 25' 43\" Est  grav-4","gps":"","images":["../../jctruffet.com/image/image_37/37_Marigny_Marmande_1.jpg","../../jctruffet.com/image/image_37/37_Marigny_Marmande_2.jpg","../../jctruffet.com/image/image_37/37_Marigny_Marmande_3.jpg","../../jctruffet.com/image/image_37/37_Marigny_Marmande_4.jpg"]},"Consult_chateau_formulaire0ddb":{"id":"Consult_chateau_formulaire0ddb","dept":"37","canton":"Vouvray","commune":"Mettray","nom":"Mettray","type":"Château","periode":"XV-XVI-XVIII","histoire":"Plusieurs châteaux à Mettray, Ribellerie, Grandes-Brosses, Avantigny et Petit Pois,  aussi manoir de la Cave XVe/XVIe siècles, restauré. Manoir de la Chapronnière du XVIe siècle,\r\nde la Thivinière du XVIe siècle,  du Rouvre  du XVe, XVIe et XVIIe siècles (une façade remaniée au XVIIIe siècle). La partie principale date du début du XVIIe siècle.                                                                  METTRAY, logis seigneurial du XVe siècle,  le bourg abrite également lancien logis seigneurial du XVe siècle.  Racheté par un particulier au début des années 1980, le logis et les communs sont alors restaurés.\r\nRIBELLERIE  du XVIIIe siècle ;  Augustin-Claude de La Roche de La Ribellerie le fief relevait de Mettray.  En 1850  le  comte, Baptiste-Anselme-Louis dOutremont de Minières en 1981, l'actuelle propriétaire, Micheline Nugier.\r\nPETIT-BOIS,  bâti en 1841 par le comte Hermande Courteilles  du XIVe siècle et XIXe siècle et chapelle ;\r\nGRANDES-BROSSES du XVIIIe siècle, remanié vers 1920 du XVIIIe siècle, remanié aux XIXe siècle et XXe siècle, en 1825  Charles Moisant.","architecture":"METTRAY, situé rue du Manoir, il se compose dun corps de logis rectangulaire à deux étages, flanqué sur la face avant de deux tours cylindriques et dune tour descalier polygonale sur la face arrière. Il fut la résidence des seigneurs de Mettray durant tout lancien Régime. A partir de 1793, le logis devient la première mairie de la commune, puis il abrite ensuite une boulangerie.                                   AVANTIGNY  construit au XVe siècle                                                                     GAGNERIE construction du XIXe siècle                              GRANDES-BROSSES du XVIIIe siècle ,remanié vers 1920                                                                                                                                                                           RIBELLERiE   remontent au XVI e siècle, avec un acte de vente de 1522. L'actuelle propriété date de la fin du XVIIe début XVIIIe siècle, avec une belle construction dans le style de mansard.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"à Mettray, Ribellerie grav-5, Grandes-Brosses grav-1-2, Avantigny grav-4 et Petit Pois-grav-3.","gps":"","images":["../../jctruffet.com/image/image_37/37_Mettray_1.jpg","../../jctruffet.com/image/image_37/37_Mettray_2.jpg","../../jctruffet.com/image/image_37/37_Mettray_3.jpg","../../jctruffet.com/image/image_37/37_Mettray_4.jpg","../../jctruffet.com/image/image_37/37_Mettray_5.jpg"]},"Consult_chateau_formulaire218f":{"id":"Consult_chateau_formulaire218f","dept":"37","canton":"Vouvray","commune":"Monnaie","nom":"Monnaie","type":"Château","periode":"XV-XIX","histoire":"Trois châteaux à Monnaie , Belles-Ruries,  Bourdigal   et Mortier.                                                                                                             BELLES-RURIES; autrefois bâti au milieu des communs, le pigeonnier des Belles Ruries en est le seul vestige et fait aujourd'hui face au château reconstruit à la fin du XIXe siècle. Édifié en 1611 (date gravée au dessus de la porte) il adopte une forme circulaire coiffée d'une imposante toiture à quatre niveaux superposés et surmontés d'un lanternon. Les trois derniers niveaux, ajourés pour le passage des pigeons, sont de forme hexagonale. L'intérieur comporte 1200 trous de boulins accessibles par deux échelles tournantes.                                                                     BOURDIGAL, a été édifié entre 1451 et 1483 puis terminé au XVIe siècle. Jean Hardouin premier seigneur, en 1475 Martine Bérarde apporte en dot à Pierre de Marques seigneur de Chenonceau et en 1483 le fief est vendu à l'abbaye de Marmoutier, en 1791 acquit par un maître de postes de la Monnaie, avant d'être acquis en 1801 par le général Marc-Antoine de la Bonninière de Beaumont, et en 1804 revende le domaine à un sieur Oudart qui s'en défait en 1810 au profit du comte  de Flavigny qui possède le château du Mortier sur cette commune, c'est dans ce château que leur fille Marie épouse le comte d'Algoult restera dans la famille du vicomte de la Panouse général de brigade en retraite. Le manoir est acquis en 1969 par monsieur et madame  Bertrand Duthoo.","architecture":"BOURDIGAL, a été édifié entre 1451 et 1483 puis terminé au XVIe siècle. Une tourelle d'escalier, construite en briques avec chaînages de pierre sur les angles, fait saillie au milieu de la façade. Au rez-de-chaussée, deux fenêtres ont conservé leurs meneaux. Les deux étages montrent des pans de bois apparents. Le pigeonnier, de plan circulaire, du XVe siècle, est recouvert par un toit à lanternon octogonal en ardoise.                                                                                                  MORTIER, ancien fief compris dans le domaine du « Mortier » qui appartenait au XVe siècle à a la famille Marques, labbaye de Marmoutier lacheta en 1483 à Pierre Marques. Le domaine fut acquis vers 1550 par Jean Ménager dont le fils acheta des seigneurs de Châteaurenault le droit de fief dans la paroisse de Monnaie. Le Mortier était en 1789 la propriété de Gilette de Garnier de Truesson. En 1810, il devint la propriété de la famille de Flavigny qui fit construire le château actuel selon les plans de larchitecte Pierre Cuvillier pour le général Vicomte de La Panouse, et le transmit par héritage à la famille de La Panouse Raymond Aymeric Philippe Joseph de Montesquiou (1784-1867), général des armées du Premier Empire et homme politique, décédé dans la commune au château du Mortier.","habitants":"Belle-Ruries ;Seigneur local.                                                    Bourdigal; sieur Oudart                                                             Mortier; famille de Flavigny\r\n         \"","divers":"à Monnaie , Belles-Ruries grav-1-2-3-4,  Bourdigal grav-5-6  et Mortier grav 7-8.","gps":"","images":["../../jctruffet.com/image/image_37/37_Monnaie_1.jpg","../../jctruffet.com/image/image_37/37_Monnaie_2.jpg","../../jctruffet.com/image/image_37/37_Monnaie_3.jpg","../../jctruffet.com/image/image_37/37_Monnaie_4.jpg","../../jctruffet.com/image/image_37/37_Monnaie_5.jpg","../../jctruffet.com/image/image_37/37_Monnaie_6.jpg","../../jctruffet.com/image/image_37/37_Monnaie_7.jpg","../../jctruffet.com/image/image_37/37_Monnaie_8.jpg"]},"Consult_chateau_formulairee5a2":{"id":"Consult_chateau_formulairee5a2","dept":"37","canton":"Monts","commune":"Montbazon","nom":"Montbazon","type":"Forteresse","periode":"XVIII-XX","histoire":"Deux châteaux à Montbazon dont Montbazon et Artigny\r\n ARTIGNY, c'est pendant la guerre de cent ans, qu'un premier château fut édifié sur la hauteur pour être intégré au système de défense établi le long de l'Indre autour du donjon de Montbazon. Au fil des siècles et des restaurations successives il se transforma en bâtiment hybride avec tours néo-gothiques et ailes pseudo-Renaissance autour du vieux manoir, qui ne trouva pas grâce aux yeux de François Coty, son nouveau propriétaire, inventeur de la parfumerie moderne. Celui-ci le fit raser en 1912 pour faire construire à la place un somptueux château dans le plus pur style du XVIIIe siècle, copie presque conforme du château de Champlâtreux dans le Val d'Oise. Cette belle demeure, dont les pierres d'une blancheur éclatante contrastent avec la verdure du parc de 25 hectares, domine la vallée de l'Indre.  Pendant la deuxième guerre mondiale, il fut occupé par l'Etat Major du Ministère de la Marine, des troupes allemandes jusqu'en 1942, puis par une annexe de l'hôpital de Tours jusqu'en 1946. Christiane Coty, la fille du parfumeur en hérita en 1947.","architecture":"MONTBAZON, la forteresse de Montbazon, fief du terrible comte d'Anjou, Foulque III Nerra, domine la vallée de l'Indre et la ville de Montbazon, du haut de son éperon rocheux. Au cur des châteaux de la Loire, elle représente l'une de nos plus anciennes constructions militaires. Abritant le plus vieux donjon de France encore debout, son histoire s'étend de la fin du Xe siècle jusqu'au XVe.\r\nTout l'été, on peut y découvrir les métiers du Moyen-Age lors d'ateliers d'initiation permettant aux visiteurs de repartir avec leurs propres créations ; Les enfants découvrent les nombreux jeux médiévaux et repartent avec leur diplôme de chevalier de la forteresse, En 1425, un deuxième château est construit en face du vieux donjon. Ce château-neuf sera démoli sans arrière-pensée en 1746 et ses restes servent de remblai pour consolider la route d'Espagne. Le donjon lui-même échappe à la destruction car il est habité jusqu'en 1725. Ses étages ainsi que le petit donjon attenant s'effondrent en 1791 et la municipalité autorise la destruction de l'ensemble. En 1797, le mur est sectionné sur toute sa hauteur par la foudre, la fissure est toujours visible. En 1860, le site est acheté par un mécène et restauré de manière à pouvoir y installer en 1866 une statue de la Vierge haute de 9,5 mètres. Aujourd'hui, il ne reste que des ruines de ce qui fut un grand château. propriété d'un couple Anglais.","habitants":"Famille de François Coty\r\n        \"","divers":"à Montbazon dont Montbazon grav-5-6-7-8 et Artigny grav-1-2-3-4                                                                          Montbazon 47° 17' 06\" nord, 0° 42' 50\" Est                                          Artigny 47° 16' 51\" Nord et 0° 41' 24\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Montbazon_1.jpg","../../jctruffet.com/image/image_37/37_Montbazon_2.jpg","../../jctruffet.com/image/image_37/37_Montbazon_3.jpg","../../jctruffet.com/image/image_37/37_Montbazon_4.jpg","../../jctruffet.com/image/image_37/37_Montbazon_5.jpg","../../jctruffet.com/image/image_37/37_Montbazon_6.jpg","../../jctruffet.com/image/image_37/37_Montbazon_7.jpg","../../jctruffet.com/image/image_37/37_Montbazon_8.jpg"]},"Consult_chateau_formulaire9145":{"id":"Consult_chateau_formulaire9145","dept":"37","canton":"Ste-Maure de Touraine","commune":"Saint-Epain","nom":"Montgoger","type":"Château","periode":"XV-XVI","histoire":"A deux Km à l'ouest  Avon les Roches, les ruines du  château des Roches-Tranchelion   et le château de Montgoger à St-Epain.                                                                                                               ROCHES-TRANCHELION, en 1420 le fief des Roches appartenait à Guillaume Ouvoie. Sa fille épousa Guillaume de Tranchelion, seigneur de Palluau qui fit construire le château. En 1441, le roi accorda l'autorisation de renforcer les fortifications. En 1448, Hardouin de La Touche possède le domaine. Il est panetier du Roi Louis XI en 1469, puis sert le Roi René d'Anjou et devient maître d'hôtel de la Reine de Sicile. Charles VII réunit le grand conseil au château des Roches Tranchelion en 1449, et y séjourna en mars 1458 et en avril 1459. Son fils Lancelot, devient seigneur des Roches en 1508. Il fit élever la collégiale voisine. La dégradation des lieux est attestée avant la Révolution. Seul un mur et deux tours figurent au plan cadastral de 1831. Ces salles sont munies de meurtrières. Le motif d'entrée de la chapelle a conservé ses sculptures. La collégiale fut fondée en 1527 par Lancelot de la Touche. Les voûtes s'élèvent à plus de douze mètres.","architecture":"MONTGOGER  C'est une importante demeure féodale, fut celle d'une seigneurie datant du XIe siècle, et longtemps aux mains des seigneurs de Sainte-Maure. Il en est fait mention au XIIIe siècle sous le nom Mons Gaugeri. Le roi Louis XIII en parla comme d'un « beau et fort château bien bâti, de si belle et magnifique structure quil serait digne de notre séjour, étant lune des plus belles maisons de notre royaume ». Érigé en marquisat au XVIIe siècle puis en duché-pairie au XVIIIe siècle, il abrita à la fin de l'ancien régime de sombres activités de faux-monnayage. Il échut par héritage aux familles de Grollier, puis de la Villarmois. Deux graves incendies, le premier en 1883, alors que Montgoger venait d'être restauré, et le second en 1943, alors que la dernière aile habitable du château était réquisitionnée par l'armée d'occupation, réduisirent ce dernier à l'état de ruine dans lequel il subsiste. Seule une tour de garde située en contrebas, à présent remise en état, est classée à l'inventaire des M.H. depuis 1976. Également en bas du château se trouve la ferme de l'Hommelaye, très largement ruinée, qui abrita un couvent, remarquable par sa lucarne en oculus, successeur du prieuré des Minimes fondé en 1502 par François de Baraton. Ses premiers membres étaient des religieux du Plessis-les-Tours. Dans le parc, subsistent encore de belles écuries du XVIIe siècle et des communs du XIXe siècle, qui ont été aménagés en chambres d'hôtes.","habitants":"Roches; Famille de Lancelot                                                                Montgoger; Famille  de François de Baraton\r\n        \"","divers":"à l'ouest  Avon les Roches le ruines château des Roches Tranchelon  grav-3 et le château de Montgauger à St-Epain 47° 08' 46\" Nord 0° 32' 16\" Est,   grav-1-2","gps":"","images":["../../jctruffet.com/image/image_37/37_Montgoger_1.jpg","../../jctruffet.com/image/image_37/37_Montgoger_2.jpg","../../jctruffet.com/image/image_37/37_Montgoger_3.jpg"]},"Consult_chateau_formulaire7945-2":{"id":"Consult_chateau_formulaire7945-2","dept":"37","canton":"Bléré","commune":"Céré la Ronde","nom":"Montpoupon","type":"Château","periode":"XIII-XVII","histoire":"MONTPOUPON, la fin du Moyen-Age marque larrivée à Montpoupon dune famille qui y laissera son empreinte : les seigneurs de Prie et de Buzançais. Ce sont dailleurs Antoine de Prie avec sa femme Madeleine d'Amboise, qui relevèrent le château en 1460, laissé dans un triste état après la guerre de Cent Ans.  Passé à la duchesse de la Ferté-Senectère, Louise de Prie de Madame et duchesse de la Mothe Haudecourt, le marquis de Tristan, alors maire dOrléans, acquiert la propriété en 1763. Le marquis décida de restaurer le château, et y effectua de nombreux travaux pour lui redonner un peu de sa splendeur dantan. Mais son élan fut interrompu par la Révolution, malgré le vent de terreur qui soufflait, seule la chapelle fut détruite. Au XIXe siècle (1840), le bâtiment connut dimportantes transformations. Monsieur de Farville, son nouveau propriétaire, fit construire les communs tels qu'ils existent aujourdhui. Enfin en 1857, Jean Baptiste de la Motte Saint Pierre, acquit le domaine, la famille réalisa des travaux dès la fin du XIXe et au début XXe siècle, afin de redonner au château laspect Renaissance quil présente aujourdhui. Le comte de Louvencourt, leur neveu et actuel propriétaire.","architecture":"MONTPOUPON,  brulé par les anglais vers 1412 Louis XII, entreprend de transformer la forteresse en habitation en château d'agrément, le donjon conservé est flanqué d'un vaste corps de logis de style gothique, avec des hautes lucarnes dentelées, couronnées de galbes, ses fenêtres à meneaux et sa tourelles d'escalier cylindrique. Les courtines primitives, conservées mais arasées, dessine une vaste cour pourvue d'une chapelle, et englobant l'ancienne tour du sud, coiffée en poivrière. Un châtelet d'entrée rajouté au début du XVIe siècle, flanqué  d'une tour cylindrique sur la cour, de deux tourelles en encorbellement encadrant une façade percée de fenêtres à meneaux sur l'extérieur.","habitants":"Monsieur de Farville,\r\n        \"","divers":"A Céré la Ronde, Montpoupon 47° 15' 11\" Nord, 1° 08' 28\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Montpoupon_1.jpg","../../jctruffet.com/image/image_37/37_Montpoupon_2.jpg","../../jctruffet.com/image/image_37/37_Montpoupon_3.jpg","../../jctruffet.com/image/image_37/37_Montpoupon_4.jpg","../../jctruffet.com/image/image_37/37_Montpoupon_5.jpg","../../jctruffet.com/image/image_37/37_Montpoupon_6.jpg"]},"Consult_chateau_formulaire265e":{"id":"Consult_chateau_formulaire265e","dept":"37","canton":"Amboise","commune":"Montreuil en Touraine","nom":"Montreuil_37","type":"Château","periode":"XV-XVI","histoire":"MONTREUIL, le fief relevait de la baronnie de Vernou. En 1794, le château est confisqué à la famille de Bridieu qui s'est exilée au moment de la Révolution et vendu comme bien national le 4 juin 1794 à Jean-François Lemarié (ou Le Marié), ancien fermier du domaine. Il est déjà en très mauvais état. Au milieu du XIXe siècle, un acte de donation évoque l'hypothèse d'une démolition du logis principal (hormis la cave), largement ruiné. Le château reste propriété de la famille Lemarié, puis de la famille Hogou par voie de mariage, qui l'utilise comme grange, jusqu'en 1976. Cette année-là, il est acquis par la société civile immobilière de Montreuil qui ne peut procéder à sa restauration totale. La commune de Montreuil, propriétaire du château,","architecture":"MONTREUIL, le fief relevait de la baronnie de Vernou. L'édifice devait servir de maison-forte comme en témoignent les défenses et les fossés qui l'entourent. La construction rectangulaire est en grande partie du XVe siècle, modifiée au XVIe siècle dans un esprit de renforcement de la défense. L'intérieur se compose de vastes salles éclairées sur deux pans, conservant leurs carrelages d'époque et leurs poutraisons. L'escalier de bois à balustres est de plan carré. La façade sur cour a subi des transformations au cours des siècles. La porte d'entrée gothique a été bouchée. Une grande porte monumentale a été percée à côté, à la fin du XVIe ou au début du XVIIe siècle. Les fenêtres ont également pris le style du XVIIe siècle, avec leurs meneaux de bois de section arrondie. Elles possèdent encore leurs menuiseries d'époque, ainsi que leurs petits valets intérieurs. Seule une étroite fenêtre rebouchée, au-dessus de la porte primitive, date de la Renaissance et  décorée de pilastres plats à bases et à chapiteaux. L'ensemble est bâti sur une cave voûtée.","habitants":"famille Hogou \r\n        \"","divers":"Montreuil : 47° 29' 11\" Nord, 0° 56' 56\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Montreuil_37_1.jpg","../../jctruffet.com/image/image_37/37_Montreuil_37_2.jpg"]},"Consult_chateau_formulaireb1f7":{"id":"Consult_chateau_formulaireb1f7","dept":"37","canton":"Loches","commune":"Montrésor","nom":"Montrésor","type":"Château","periode":"XIV-XVII","histoire":"MONTRESOR, le premier seigneur  est Roger Petit Diable, qui y vivait au XIe siècle. Il était contemporain du comte d'Anjou, Foulques Nerra, aux côtés duquel il se battit contre les comtes de Blois, notamment Eudes de Blois, il édifia au bord du coteau escarpé, qui domine l'Indrois, la forteresse joua un rôle important dans la lutte qui opposa le comte d'Anjou aux comtes de Blois, pour la domination de la Touraine. C'est Philippe Auguste qui leur reprit la place en 1188. Jean III de Bueil, rebâtit le château à partir de 1375. En 1493, Imbert de Bastarnay, seigneur du Bouchage et de Bridoré, est propriétaire de la châtellenie de Montrésor. Imbert, grand-père de Diane de Poitiers, fidèle conseiller des rois Louis XI, Charles VII, Louis XII et François Ier, débute la construction d'un logis neuf à l'intérieur de l'enceinte fortifiée. Dès le XVIIe siècle, Montrésor change plusieurs fois de propriétaires, pour appartenir  à Charles de Lorraine, aux seigneurs de Bourdeilles, à Philippe d'Orléans. En 1849, Xavier Branicki, fils d'une illustre famille polonaise, devient le propriétaire du domaine de Montrésor. A partir de 1849, le comte Branicki reconstruit presque entièrement le logis d'Imbert de Bastarnay.","architecture":"MONTRESOR,  du château de Montrésor, reconstruit à la fin du XIVe siècle, par Jean de Bueil, il ne reste que l'enceinte, les deux tours décapitées et les vestiges de la porte d'entrée Est. Les deux tours sont reliées entre elles par un haut mur, elles précèdent l'entrée actuelle du château. Les fortifications qui protégeaient la place sont impressionnantes, notamment du côté du plateau où furent creusés des fossés secs. Deux énormes tours circulaires flanquant une première enceinte, en constituent l'élément le plus spectaculaire. Légèrement en retrait et au-dessus, sur la bute qui porte le château, s'élève une deuxième courtine, renforcée de tours et d'épais contreforts. Du logis neuf, bâtit par Imbert de Bastarnay, il ne reste presque rien, ce logis présentait les dispositions traditionnelles des constructions de ce type à la fin du XVe siècle: de grandes lucarnes, un escalier à vis hors-oeuvre dans une tour. Restauré et meublé, doté d'une collection importante d'oeuvre d'art, le château est aujourd'hui tel qu'il était à l'époque de Xavier Branicki.","habitants":"Famille de Xavier Branicki\r\n        \"","divers":"Montrésor 47° 05' 32\" Nord et 1° 07' 14\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Montr%c3%a9sor_1.jpg","../../jctruffet.com/image/image_37/37_Montr%c3%a9sor_2.jpg","../../jctruffet.com/image/image_37/37_Montr%c3%a9sor_3.jpg","../../jctruffet.com/image/image_37/37_Montr%c3%a9sor_4.jpg"]},"Consult_chateau_formulaire804e":{"id":"Consult_chateau_formulaire804e","dept":"37","canton":"Amboise","commune":"Nazelles-Négron","nom":"Nazelles_Négron","type":"Château","periode":"XV-XVIII","histoire":"trois châteaux à Nazelles-Negron dont celui de Nazelles, de la Huberdière est un ancien rendez-vous de chasse du XVIIe siècle , des Ormeaux et celui de Perreux.  A cinq kilomètres au sud-Est le château de Noizay.                                                        NAZELLES, au Ve siècle, Nazelles appartenait à Saint-Martin de Tours. Par la suite, il devint châtellenie relevant d'Azay le Rideau. En 1245, il devient la propriété d'un chevalier, Philippe de Nazelles. En 1520, Thomas Bohier, bâtisseur de Chenonceaux, en est propriétaire et édifie le logis seigneurial à cette époque. Primitivement, l'accès  se faisait par la porte nord en plein cintre, qui ouvrait sur une cour intérieure. L'escalier était à l'extérieur et il reste toujours le balcon en bois qui servait de palier. Au XVIIIe siècle, un chemin est réalisé devant la façade sud et un passage voûté, établi au rez-de-chaussée de l'édifice prolongé à l'est par un pavillon carré. En 1950, Mme Develle, propriétaire, racheta  les dépendances du château morcelé au XVIIIe siècle afin de lui rendre son unité originale. A sa mort, la propriété sera achetée par M. Richard, architecte, qui entreprit des travaux de rénovation intérieure et extérieure. Depuis 1999, les propriétaires actuels uvrent à sa sauvegarde, sa restauration et sa mise en valeur.","architecture":"NOIZAY, est un bel exemple d'un château-hôtel, membre des Relais & châteaux. Le château de Noizay est de style Renaissance. Sa construction date de 1520. Il a été entièrement rénové en 1989. Il fut le fief des protestants durant la conjuration d'Amboise en 1560. a servit de repaire à Castelneau l'un des conjurés d'Amboise Le château de Noizay possède un Jardin à la Française. Propriétaire la famille Léon André.                                                                      ORMEAUX, commence au XVIIe siècle avec le poète Paul Scarron, premier mari de la marquise de Maintenon. Il acquiert le domaine où subsiste une tour, dernier vestige de l'époque médiévale. C'est le comte Charles de Gaigneron de Marolles qui construit un siècle plus tard, en 1830, le château actuel des Ormeaux.                                                               PERREUX, construit au début du XVIIIe siècle, il est doté dun rez de chaussée troglodytique et dun réseau de passages souterrains qui sétend sous le parc. Il fut totalement remanié dans le style Louis XIII au XIXe siècle par François Valentin Thomas, collaborateur du baron Haussmann. Jardin avec terrasse en terre-plein et allée irrégulière. La composition d'ensemble est de qualité et rehaussée par la présence d'arbres exotiques et l'utilisation de la rocaille pour le décor des grottes artificielles, de l'aquarium et de la serre. Hôtel avec suites.","habitants":"Nazelles Famille de Mme Develle                                            Noizay;  famille Léon André,                                               Ormeaux; poète Paul Scarron,                                         Perreux;François Valentin Thomas,\r\n        \r\n        \"","divers":"à Nazelles-Negron dont celui de Nazelles grav-1, de la Huberdière grav-2   des ormeaux grav-4 et celui de Perreux grav-5-6,                                                                                                 Noizay grav-3.  Noizay  47° 22' 16\" Nord et 0° 31' 01' Est                                                                                        Ormeaux 47° 25' 39? nord, 0° 55' 48? est    Source grav 7                          Valliere grav 8-9","gps":"","images":["../../jctruffet.com/image/image_37/37_Nazelles_N%c3%a9gron_1.jpg","../../jctruffet.com/image/image_37/37_Nazelles_N%c3%a9gron_2.jpg","../../jctruffet.com/image/image_37/37_Nazelles_N%c3%a9gron_3.jpg","../../jctruffet.com/image/image_37/37_Nazelles_N%c3%a9gron_4.jpg","../../jctruffet.com/image/image_37/37_Nazelles_N%c3%a9gron_5.jpg","../../jctruffet.com/image/image_37/37_Nazelles_N%c3%a9gron_6.jpg","../../jctruffet.com/image/image_37/37_Nazelles_N%c3%a9gron_7.jpg","../../jctruffet.com/image/image_37/37_Nazelles_N%c3%a9gron_8.jpg","../../jctruffet.com/image/image_37/37_Nazelles_N%c3%a9gron_9.jpg"]},"Consult_chateau_formulaire39fb":{"id":"Consult_chateau_formulaire39fb","dept":"37","canton":"Château-Renault","commune":"Neuvy le roy","nom":"Neuvy_le_Roy","type":"Château","periode":"XVII-XIX","histoire":"A Neuvy le Roy, château de Beaulieu du XIXe siècle, la Martinerie du XVIe siècle, XIXe siècle,  Rouvre voir article.                                                              MARTINIERIE,  datant de 1789, il est cité comme tenue de la Martignerie, fief du château du Bois. L'édifice est décrit dans le P.V d'adjudication du 13 avril 1791, lors de la vente à Louis Belle, comme composé au rez-de-chaussée de six salles dont une cuisine et une boulangerie et à l'étage des chambres avec cabinet, dont l'un servant de chartrier. La représentation en plan de la Martinerie, sur le cadastre napoléonien de 1834 est analogue à celle de 1789, complété par un bâtiment en équerre, situé à l'angle sud-ouest, qui d'après la tradition aurait été démolie en 1850. Il va se scinder en deux parties au milieu du XIXe siècle, la partie Est du XVIe siècle, si l'on en croit la forme du pignon Est et celle de la charpente va former un seul bâtiment réservé à l'écurie et à des chambres. L'autre partie, composée d'un logis à deux pavillons, reprend des bases de construction ancienne, puisque les tracés des murs des façades nord et sud est identique sur le cadastre napoléonien et le cadastre actuel. Sur cette structure, aurait été bâti au milieu du XIXe siècle, ce bâtiment monumental orné de lucarnes finement sculptées, très proches de celles du château de Rennefort.","architecture":"MARTINERIE, château à élévation ordonnancée, à un étage et un étage de comble, composé d'un corps de logis, à quatre travées, couvert d'un toit à longs pans, encadré par deux pavillons, à une travée, couverts d'un toit en pavillon. L'étage de comble  de la façade Sud est orné de lucarnes en pierre de taille, au décor finement sculpté, les pilastres accostés de volutes à la base sont surmontés de chapiteaux corinthiens. Elles sont couronnées de frontons triangulaires, sur le corps de logis et cintrés en forme de coquille sur les pavillons. La façade Nord est beaucoup plus sobre, il n'y a pas de lucarnes sur le corps de logis, et celles des deux pavillons sont couvertes d'un toit en croupe, sans ornementation sculptée. Les deux pavillons ne sont pas identiques, le pavillon Ouest, percé de trois baies, dispose de trois niveaux, alors que le pavillon Est est sur deux niveaux comme le corps de logis. L'autre bâtiment, situé à l'Ouest du château, est couvert d'un toit à longs pans, au pignon Ouest découvert, percé de deux baies géminées en arc en plein cintre à la partie supérieure. Pigeonnier : tour cylindrique couverte d'un toit conique percé de deux lucarnes en pierre de taille. Caves troglodytes situées au Nord-Est du château, protégées d'un parement enduit et pierre de taille, couronné d'une balustrade.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"A Neuvy le roy, Château de Beaulieu grav-4,                                 la Martinerie grav 1-2,  la Martinière grav-3                      Martinerie : 47° 36' 12\" Nord et 0° 35' 38\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Neuvy_le_Roy_1.jpg","../../jctruffet.com/image/image_37/37_Neuvy_le_Roy_2.jpg","../../jctruffet.com/image/image_37/37_Neuvy_le_Roy_3.jpg","../../jctruffet.com/image/image_37/37_Neuvy_le_Roy_4.jpg"]},"Consult_chateau_formulaire9ebf":{"id":"Consult_chateau_formulaire9ebf","dept":"37","canton":"Château-Renault","commune":"Nouzilly","nom":"Nouzilly","type":"Château","periode":"XVII-XIX","histoire":"Nouzilly, château de L'Orfrasière, de La Roche d'Ambille du XIXe siècle, de Charantais XIXe siècle, manoir de La Harlandière du  XIXe siècle, de Gué-Chapelle  du XIXe siècle   de La Simonnière du XVIIe siècle.                                                                       ORFRASIERE, a été édifié en 1905-1907, dans un style néo-Renaissance, pour le maître de forges de Wendel. Il a remplacé un château du XVIIIe. Construit en béton avec quelques pierres de parement « pour donner une allure de renaissance », il a en fait été bâti au XIXe siècle et les plans ont été dessinés par l'architecte parisien Pierre Cuvellier, il a été possédé par les familles Lamyrault, Lefèbvre de Givry, de Béthune, de Baylens du Poyanne. Le 8 janvier 1837, Armand-Jean de la Bonninière de Beaumont et Catherine-Céleste Lemoine de la Godelinière, sa femme, le vendirent, à Marie-Agathe Beyssac, veuve de Pierre-Charles-Rose de Ginestet.                                       GUE-CHAPELLE. au début de 1867, Louis-Désiré achète Gué-Chapelle à Nouzilly, où il habite à partir du 25 mars. qui a été revendu par Louis-Désiré en janvier 1889. décède à 86 ans,  sa veuve complète alors Gué-Chapelle en achetant la ferme de la Povinière. Sophie décèdera le 24 avril 1909 à Gué Chapelle. Par son testament du 16 décembre 1906, Sophie lègue à ses petits-fils Robert et Pierre la totalité de sa quotité disponible en nue-propriété, lusufruit en étant conservé par son fils Roger. Lattribution du château a été faite à Robert en 1960 puis à ses 6 enfants dont Jean-Baptiste, puis à son fils Gilles, qui a racheté les parts de ses oncles et tantes en 2003.","architecture":"CHARENTAIS, a emprunté son nom au Grand-Charentais de Saint-Cyr-sur-Loire, qui fut érigé en majorat avec les autres terres de Pierre-Gilles Douineau de Charentais, quand celui-ci fut créé baron héréditaire par lettres patentes du 7 septembre 1826. Un baron de Charentais, descendant du premier, construisit le Charentais de Nouzilly dans les dernières années du XIXe siècle.                                                                             La HARLANDIERE, ce lieu a porté les noms de :  La Harlandière (1835 et 1948). Au XIVe siècle, ce domaine appartenait à labbaye de Beaumont-lès-Tours. Dans un acte de 1748, il était encore signalé comme étant la propriété de cette abbaye. Au début du siècle la propriété appartenait aux David-Saint-Clair, puis elle passa aux Lauer qui se sont fait connaitre dans le monde de lhistoire médiévale (Pierre lauer) de larchéologie égyptienne (Philippe Lauer) et de la musique (Daniel Lesur).                                                                                     ROCHE d'AMBILLE , ce lieu a porté les noms de La Roche-aux-Nonains, La Roche-aux-Dames et La Roche-dAmbille (XIIe et XIIIe siècles). Ce fief relevait de la prévôté dOé à foi et hommage simple. Il appartenait à labbaye de Beaumont-lès-Tours. Lors de la prise de possession de labbaye, la nouvelle abbesse devait offrir un gobelet de demi-marc dargent au prévôt dOé.","habitants":"Ofrasière; familles Lamyrault,                                                   Gué;Famille de Louis Désiré,                                                 Charentais;  baron de Charentais,                                                   Harlandière;  David-Saint-Clair\r\n        \"","divers":"Nouzilly,L'Orfrasière grav 1-2, La Roche d'Ambille grav 4-5,La Simonnière grav-9, de Charantais grav-6, La Harlandière grav-3 ,de Gué-Chapelle grav -7-8","gps":"","images":["../../jctruffet.com/image/image_37/37_Nouzilly_1.jpg","../../jctruffet.com/image/image_37/37_Nouzilly_2.jpg","../../jctruffet.com/image/image_37/37_Nouzilly_3.jpg","../../jctruffet.com/image/image_37/37_Nouzilly_4.jpg","../../jctruffet.com/image/image_37/37_Nouzilly_5.jpg","../../jctruffet.com/image/image_37/37_Nouzilly_6.jpg","../../jctruffet.com/image/image_37/37_Nouzilly_7.jpg","../../jctruffet.com/image/image_37/37_Nouzilly_8.jpg","../../jctruffet.com/image/image_37/37_Nouzilly_9.jpg"]},"Consult_chateau_formulairecd95":{"id":"Consult_chateau_formulairecd95","dept":"37","canton":"Loches","commune":"Orbigny","nom":"Orbigny_Indre","type":"Château","periode":"XV-XVI-XIX","histoire":"Deux châteaux à Orbigny dont; Mousseau et l'Estang. MOUSSEAU,  il a été construit de 1876 à 1880. C'est un château de style néo-Louis XIII. Le château du Mousseau est écrit le Monceau sur la carte de Cassini. Lors de la Seconde Guerre Mondiale, le marquis Lecoz, emmené par Georges Dubosq, un aventurier repris de justice qui se faisait appeler « capitaine Lecoz », s'installa au château du Mousseau, dès les premiers jours de septembre 1944. De là, il mena plusieurs opérations de véritable Résistance mais aussi de pillage, des demeures environnantes, organisant des exécutions sommaires jusqu'au début du mois d'octobre où ce maquis, devenu trop encombrant, est prié de quitter la région pour rejoindre l'armée du général de Lattre de Tassigny, vers la Haute-Saône et le Territoire de Belfort. Depuis, le château de Mousseau est la propriété de la famille de Lauriston. Le château du Mousseau a été bâti sur un ancien fief de Montrichard. L'édifice est complété par un ensemble de communs. Au dernier étage, se trouve une chapelle qui a été aménagée. Le château du Mousseau est composé de pierres de taille et de briques. Son propriétaire actuel est Law de Lauriston-Boubers.","architecture":"L'ESTANG, date du XVe au XVIe siècle pour son premier propriétaire Jeanne d'Argy en 1470. Son nom a changé souvent au cours des siècle :  Les Étangs  apparaît en 1880, et c'est l'orthographe « l'Estang » qui est retenue au XVIIe siècle. C'est une grande pièce d'eau qui donne son nom au château.  Il sera fortement remanié un siècle plus tard. Après avoir été assailli par les anglais, pendant la Guerre de Cent Ans, le château manque d'être pris d'assaut par les habitants de Loches qui manquent de grain et croient en trouver à l'Estang. Il sera ensuite envahit, en 1590. De là, ils vont rançonner les propriétés avoisinantes. Ils seront délogés par le corps d'armée basé à Loches. Le château de l'Estang fut restauré à plusieurs reprises, au XVIIIe siècle, puis de 1890 à 1964, d'après les plans de l'architecte des bâtiments historiques Achille Lafargue. Une cheminée provenant du château de l'Isle Savary à Clion, dans l'Indre, y est installée, en 1959.  Du XVe siècle subsiste  un donjon circulaire à mâchicoulis. Le logis, flanqué de tours et de tourelles, date du XVIe siècle. Les deux ailes en retour d'équerre sont des rajouts réalisés au XVIIIe siècle. Il appartient depuis 1678 à la famille de Lestang. A la suite du décès de son oncle, Hubert Jahan de Lestang, en 1973, Béatrice Benoît du Rey a en charge la propriété qu'elle exploite avec Emmanuel, son mari.","habitants":"Mousseau; famille de Lauriston                                                  L'Estang; famille de Lestang\r\n        \"","divers":"à Orbigny dont; Mousseau et l'Estang  grav 2-3-4-5-6                               47° 05' 24\" nord, 0° 43' 28\" Est. Mousseau: 47° 12' 40\" Nord, 1° 13' 27\" Est  grav-1","gps":"","images":["../../jctruffet.com/image/image_37/37_Orbigny_Indre_1.jpg","../../jctruffet.com/image/image_37/37_Orbigny_Indre_2.jpg","../../jctruffet.com/image/image_37/37_Orbigny_Indre_3.jpg","../../jctruffet.com/image/image_37/37_Orbigny_Indre_4.jpg","../../jctruffet.com/image/image_37/37_Orbigny_Indre_5.jpg","../../jctruffet.com/image/image_37/37_Orbigny_Indre_6.jpg"]},"Consult_chateau_formulaire3a6a":{"id":"Consult_chateau_formulaire3a6a","dept":"37","canton":"Ste-Maure de Touraine","commune":"Panzoult","nom":"Panzoult","type":"Château","periode":"XV-XVI-XVII","histoire":"Trois châteaux à Panzoult dont Beauséjour, Coulaine, Panzoult  et Roncée. Pressoir ( voir article)                                                                                                  BEAUSEJOUR viticole et chambre d'hôtes.                                                                       PANZOULT, le corps d'entrée et le corps de logis de la fin du XVe siècle, le château est déclassé en ferme début du XVIIe siècle. Sur la façade postérieure du corps de bâtiment principal, la reprise de maçonnerie et les arrachements témoignent de la présence d'un corps de bâtiment perpendiculaire aujourd'hui disparu. Le château est constitué d'un corps d'entrée en pierre de taille de moyen appareil, où sont encore visibles les vestiges de baies à Coussièges et de cheminées du XVe siècle, bâtiment couvert d'un toit à deux pans en ardoise à pignon découvert. Le corps de logis possède une tour d'escalier polygonale hors-oeuvre, tronquée, renfermant un escalier à vis sans jour en maçonnerie. Plusieurs cavités creusées dans la roche sont partiellement maçonnées : porte de souterrain et dépendance voûtée d'ogives. La porte de la tour d'escalier est surmontée d'un arc en accolade, encadrée de pinacles et ornée de choux frisés.                                                                 COULAINE, ancien fief relevant de L'Ile-Bouchard, Coulaine est cité en 1484. Le château resta dans la famille de Craon, originaire de Savoie de 1520 à 1771, puis fut vendu comme bien national à la Révolution. Du château en ruine, subsiste au sud, un mur régulièrement raidi par des contreforts. A l'opposé, au nord de la parcelle une pièce voûtée en berceau est surmontée d'une pièce à feu dont il reste la cheminée.","architecture":"RONCEE, la seigneurie de Roncée est citée dès 1486 et constituait un fief relevant de L'Ile Bouchard. Un aveu rendu en 1536 par François d'Availloles, décrit le domaine, qui comprend alors un parc clos de murs d'environ 100 arpents, au sein duquel se trouvent: château, chapelle, grange, étable et fuye à pigeon, mais le pigeonnier actuel semble plus tardif. Une description de 1634, indique que l'entrée principale précédée d'un bel escalier, se trouvait au sud et non sur la route du coteau. Un acte de vente du 2 mars 1817 indique que les douves existent encore, de même que le parterre en face, les deux allées collatérales, la pièce d'eau vive et le canal qui l'alimente. Aujourd'hui le château a disparu, la pièce d'eau est encore visible, subsistent le bâtiment des communs, constitués de plusieurs corps de bâtiments accolés, formant un très long bloc-à-terre. Le tiers nord est couvert en ardoise, le reste en tuile plate. Colombier construit sur plan hexagonal à l'extérieur et circulaire à l'intérieur, et couvert par une coupole en pierre, surmontée d'un petit campanile. Les pigeons pénètrent à l'intérieur par six lucarnes établies dans la coupole et par les ouvertures du campanile. Au rez-de-chaussée, la porte d'accès est surmontée d'armoiries.","habitants":"Coulaine; famille de Craon et seigneur locaux pour les autres\r\n        \"","divers":"à Panzoult dont Beauséjour grav-4, Coulaine grav-2-3, Panzoult grav-1-5  et Roncée grav-6.","gps":"","images":["../../jctruffet.com/image/image_37/37_Panzoult_1.jpg","../../jctruffet.com/image/image_37/37_Panzoult_2.jpg","../../jctruffet.com/image/image_37/37_Panzoult_3.jpg","../../jctruffet.com/image/image_37/37_Panzoult_4.jpg","../../jctruffet.com/image/image_37/37_Panzoult_5.jpg","../../jctruffet.com/image/image_37/37_Panzoult_6.jpg"]},"Consult_chateau_formulaireafdd":{"id":"Consult_chateau_formulaireafdd","dept":"37","canton":"Ste-Maure de Touraine","commune":"Parçay-sur-Vienne","nom":"Parcay_Vienne","type":"Château","periode":"XVI-XVIII","histoire":"plusieurs châteaux à Parcay celui de Prezault  des Granges, la Bréche et la Musse.                                                                                 PREZAULT, en 1639, Charles le Silleau est seigneur de Prézault. En 1722, Prézault passe par alliance à Claude Henri Odart. Une chapelle est mentionnée sur les registres paroissiaux de 1776 et 1787, mais il n'en reste rien. Le domaine est vendu comme bien national à la Révolution. En 1829, le château est acquis par Gilbert de Vautibault et appartient encore de nos jours à ses descendants, le château moderne a été construit dans les années 1860-65, mais on ne connaît pas l'architecte. D'un premier château ou manoir restent deux tours du XVIe siècle, l'une a été aménagée en pigeonnier au XVIIe siècle. A ces tours sont accolées deux ailes parallèles constituées de plusieurs bâtiments bâtis au cours des XVIIIe et XIXe siècles, notamment les écuries. L'aile la plus à l'est abrite les communs construits au cours du XIXe siècle. A l'extrémité nord, deux logis à pignons accolés peuvent être datés de la seconde moitié du XVIIe siècle ou de la première moitié du XVIIIe siècle. Le cadastre napoléonien et plusieurs plans du XIXe siècle attestent la présence d'un logis orienté est-ouest , ce bâtiment est détruit de nos jours.","architecture":"MUSSE,  est un ancien fief.  un grand corps de bâtiment orienté nord-sud qui a disparu de nos jours. Le grand corps de logis est-ouest a été divisé en deux maisons. Au nord-ouest, un pavillon carré date du dernier quart du XVIe siècle ou du début du XVIIe siècle. A l'ouest, escalier hors-oeuvre en pierre desservant le rez-de-chaussée surélevé situé au-dessus de la cave. Le dénivelé du terrain fait qu'au nord l'accès au logis est de plein pied. Les ouvertures côté nord sont très remaniées. Le pavillon construit sur plan carré est couronné d'une corniche à gros modillons. Le toit en pavillon est couvert en tuiles plates.                                                                                                       PREZAULT, le château du XIXe siècle est élevé en brique et pierre de taille avec couverture en ardoise. Il comporte un sous-sol dans lequel sont aménagées les cuisines, un rez-de-chaussée, un étage carré et un étage de comble, desservis par un escalier tournant en charpente. Au sud, les deux tours rondes en moellons enduits sont ceinturées d'une corniche à modillons et couvertes d'un toit conique en tuiles plates. Les communs du XIXe siècle sont en moellons enduits avec chaînages en pierre de taille, couverts de toits à longs pans en ardoise et en tuiles plates. Le logis du XVIIIe siècle est en moellons enduits et pierre de taille, couvert d'un toit en pavillon en ardoise, les deux logis accolés des XVIIe et XVIIIe siècles sont également en moellons enduits et pierre de taille, à toits à longs pans en ardoise et pignons découvert.","habitants":"Prezault; Claude Henri Odart\r\n        \r\n        \"","divers":"à Parcay celui de Prezault grav 1-2, la Musse grav-3   la Bréche grav-4                                                                          Granges grav-5","gps":"","images":["../../jctruffet.com/image/image_37/37_Parcay_Vienne_1.jpg","../../jctruffet.com/image/image_37/37_Parcay_Vienne_2.jpg","../../jctruffet.com/image/image_37/37_Parcay_Vienne_3.jpg","../../jctruffet.com/image/image_37/37_Parcay_Vienne_4.jpg","../../jctruffet.com/image/image_37/37_Parcay_Vienne_5.jpg"]},"Consult_chateau_formulairea96a":{"id":"Consult_chateau_formulairea96a","dept":"37","canton":"Descartes","commune":"Paulmy","nom":"Paulmy","type":"Château","periode":"XV","histoire":"PAULMY, Etienne Voyer, cité dans une charte de 1244, est le premier seigneur de Paulmy connu. Un château aurait été détruit en 1412 par les anglais et un nouveau château est construit en 1441 par Pierre de Voyer. De cet édifice bâti sur double plan carré, subsistent des parties situées en sous sol, la tour sud-est de la cour des communs, les douves et le puits. L'édifice repère des catholiques durant les guerres de religion, est pillé et saccagé de 1562 à 1569 par les protestants. Au XVIIe siècle, à l'initiative de Louis puis de Jacques de Voyer deux campagnes de construction sont engagées : on élève d'abord un ensemble comprenant un bâtiment semblant être une orangerie et deux pigeonniers-murs qui bordent une avant-cour flanquée de deux pavillons et on modifie ensuite le plan de reconstruction du château en adoptant un plan en U entouré de douves. Il intègre, à l'angle Nord-Est, la tour du XVe siècle, la chapelle et les douves, et, au Sud, l'avant-cour bordée des pigeonniers murs.","architecture":"PAULMY, un jardin potager régulier à la française, des parterres et un verger dans lequel est édifié un colombier, entourent le château. Dans la deuxième moitié du XVIIIe siècle, les ailes centrale et ouest du corps de logis et le pigeonnier mur sont détruits. Le château appartient aux Marquis Voyer d'Argenson. Dans la première moitié du XIXe siècle on élève une nouvelle aile entre les deux pavillons restants et on comble les douves. Le parc est aménagé en jardin paysager dans sa partie centrale vers 1860. Une grotte artificielle fidèle réplique de la grotte de Lourdes, y est construite à l'initiative de Gertrude de Stacpoole, marquise d'Oyron, et bénite le 25 décembre 1885, un mont calvaire élevé sur une petite butte artificielle fut béni le 13 septembre 1896, inscription de la verrière de l'église paroissiale.","habitants":"Famille de Voyer d'Argenson\r\n        \"","divers":"Pallmy 46° 58' 59\" Nord, 0° 50' 24\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Paulmy_1.jpg","../../jctruffet.com/image/image_37/37_Paulmy_2.jpg","../../jctruffet.com/image/image_37/37_Paulmy_3.jpg"]},"Consult_chateau_formulairec35a":{"id":"Consult_chateau_formulairec35a","dept":"37","canton":"Ste-Maure de Touraine","commune":"Crouzilles","nom":"Paviers","type":"Château","periode":"XVI","histoire":"PAVIERS, est un ancien fief relevant de L'Ile-Bouchard, qui appartenait en 1140 à Pierre Savary. Au XVIIe siècle, il appartenait à la famille Odart. Il passa par alliance à la famille de Quinemont en 1736. Château construit aux XVe et XVIe siècles. Ouvrage d'entrée édifié au cours de la première moitié du XVIe siècle ; écuries avec logis attenant à l'ouest bâtis  au XVIe siècle et en partie (étables) à la fin du XVIIe siècle. La chapelle a été édifiée au cours de la seconde moitié du XVIIe siècle et avant 1697. Un colombier a également été construit dans le parc à l'ouest du château à cette époque. Au XVIIe siècle, une partie des douves à l'ouest a été comblée avec les ruines des bâtiments qui s'élevaient au-dessus. Le château a été profondément remanié et restauré en 1894 par Charles Guérin, puis de 1901 à 1903 par Marcel Rohard, son élève. Ce dernier est l'auteur de la \"bretèche\" abritant la salle de billard. L'aménagement d'un système d'adduction d'eau courante a justifié la construction d'un édicule circulaire pour abriter un bélier hydraulique. Ce château a été restauré de 1907 à 1912.","architecture":"PAVIERS, à l'ouest du parc, une allée conduit à une porte fortifiée à mâchicoulis, encadrée par deux tours circulaires, et donnant accès à la cour. Au nord, un long bâtiment orienté est-ouest abrite les écuries, l'ancienne remise du carrosse et un logis. Ce bâtiment, construit en moellon enduit et couvert d'un toit à longs pans à croupes en ardoises, comporte un étage carré et un comble à lucarnes. Les divers corps de bâtiment du château forment un demi cercle entouré de profondes douves sèches. L'accès s'effectue au nord par un pont-levis, commandé par une grosse tour semi circulaire dont le troisième étage est occupé par une salle couverte d'une voûte en berceau annulaire. Elle est soutenue par une lierne circulaire à moulures prismatiques et par des ogives rayonnantes retombant du centre sur une grosse colonne sans chapiteau, partant de fond et traversant les planchers des étages sous-jacents. Les cuisines étaient installées au sous-sol. Au sud, la chapelle, couverte d'un toit en pavillon en ardoise, est supportée par trois arcades reposant sur des piliers montant du fond des douves. Toits à longs pans et croupes sur les divers corps de bâtiments, à l'exception des tours, ardoise sur le toit.","habitants":"Famille Odart\r\n        \"","divers":"Château de Paviers  47° 07' 24\" nord, 0° 28' 57\" Est à Crouzilles et le manoir 47° 07' 25\"nord, 0° 27' 33\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Paviers_1.jpg","../../jctruffet.com/image/image_37/37_Paviers_2.jpg","../../jctruffet.com/image/image_37/37_Paviers_3.jpg","../../jctruffet.com/image/image_37/37_Paviers_4.jpg","../../jctruffet.com/image/image_37/37_Paviers_5.jpg"]},"Consult_chateau_formulaire6210":{"id":"Consult_chateau_formulaire6210","dept":"37","canton":"Descartes","commune":"Le Petit-Préssigny,","nom":"Petit_Préssigny","type":"Château","periode":"XVI","histoire":"BORDES,  Guillaume Guenand vivant en 1312 est le premier seigneur des bordés connu; au XVIe siècle, la famille d'Amboise fait bâtir un château avec fortifications, châtelet d'entrée, porterie secondaire et des douves (asséchées). Du logis subsiste une cave et un escalier en demi hors-oeuvre, caractéristique dans la deuxième moitié du XVIe siècle, la partie ouest du châtelet est reconstruite par Philippe de Créquy, seigneur des Bordés en 1567, et Urbaine de Montmorency-Laval, son épouse; les parties hautes de la tour d'escalier du logis reçoivent de nouvelles fenêtres et un nouveau décor, la ferme de la basse-cour, qui possède un logis du XVe siècle, s'agrandit d'un colombier (en ruines),  au XVIIIe siècle, le logis est reconstruit sur la cave, peut-être par la famille Bouthillier de Chavigny, un pavillon est accolé au Sud-Ouest du nouveau logis à la fin du XVIIIe siècle manifestement par Pierre Gaullier,  au XIXe siècle, la chapelle qui forme un avant corps est reconstruite et les communs sont remaniés. Châtelet d'entrée et tour d'escalier en pierre de taille, corps de logis en moellons enduits,  rez-de-chaussée du pavillon XVIIIe siècle en pierre de taille, bâtiments de la basse-cour couverts en tuile plate, cave voûtée en berceau brisé,  escalier tournant voûte en berceau plein-cintre aux volées droites et voûte d'arête aux paliers et repos.","architecture":"CHÂTEAU de RE,  en 1222  Othon de Laroche est sire de Ré,  cité en 1290, relevait du Grand-Pressigny ; il devient le petit Pressigny au XVIIe siècle. Guenand connus dès 1312, et des seigneurs de Ré cités en 1322 ces deux châtellenies ainsi que de nombreux fiefs ruraux relevaient des baronnies de La Haye, Preuilly, Grand-Pressigny, sainte-Julitte et archevêché de Tours.  En 1411 Geoffroy de Coué est seigneur de Ré  le fief relève de la châtellenie de sainte-Julitte,  le souterrain refuge peut dater du XVe siècle,  le château est reconstruit vers 1510, l'architecte en serait Christophe de Coué,  la terre appartient en partie aux Villequier, seigneurs de La Guerche, en 1582  puis, aux XVIe et XVIIe siècles, elle passe aux seigneurs du grand Pressigny, et, au XVIIIe siècle, à la famille de Montfalcon et à Pierre Gaullier, seigneur de La Celle-Guenand. Le territoire restant était aux mains des seigneurs de Bordés,\r\nle colombier semble être de la même période, les archives révolutionnaires relèvent une grange des dîmes,  détruite, le logis est agrandi sans doute au XVIIIe siècle. Les fabriques de jardin de la deuxième moitié du XIXe siècle; le logis est restauré au XIXe siècle.","habitants":"Bordés; famille d'Amboise                                                       Ré; famille de Montfalcon\r\n        \r\n        \"","divers":"deux châteaux au Petit Préssigny  celui de Bordes grav-1 et celui de Ré","gps":"","images":["../../jctruffet.com/image/image_37/37_Petit_Pr%c3%a9ssigny_1.jpg","../../jctruffet.com/image/image_37/37_Petit_Pr%c3%a9ssigny_2.jpg","../../jctruffet.com/image/image_37/37_Petit_Pr%c3%a9ssigny_3.jpg","../../jctruffet.com/image/image_37/37_Petit_Pr%c3%a9ssigny_4.jpg"]},"Consult_chateau_formulairef31d":{"id":"Consult_chateau_formulairef31d","dept":"37","canton":"Château-Renault","commune":"Chemillé sur Dême","nom":"Pins_Chemillé","type":"Château","periode":"XV-XIX","histoire":"PINS, le domaine des Pins échoit en 1828 à César Budan de Russé, officier de cavalerie, qui décide la reconstruction d'un nouveau château. Celui-ci pourrait être attribuée à l'architecte Phidias Vestier (1796-1874) qui l'effectue à partir de 1852. La vente du domaine en 1891 à Maurice Mathieu-Peynaud va donner lieu à d'autres transformations, le domaine est vendu en 1899 après liquidation judiciaire et un état des lieux en 1923 décrit l'ancienne fromagerie utilisée en chais. En 1904, le nouveau propriétaire Joseph Garçin, industriel parisien, fait construire une chapelle dans le parc au nord du château, A partir de 1923, différents propriétaires se succèdent, notamment de 1970 à 1990, le journaliste américain Pierre Salinger qui avait reçu la visite de Jacqueline Kennedy.","architecture":"PINS, la seigneurie des Pins est attestée dès le XVe siècle. Du château primitif qui s'élevait pratiquement au même emplacement que le château actuel, à élévation ordonnancée, en pierre de taille, couvert d'un toit en croupe et flanqué de quatre tourelles couvertes d'un toit conique, composition symétrique des deux façades principales, étage de comble éclairé par des lucarnes en pierre accostées d'ailerons et couronnés d'un motif animalier pour la lucarne centrale et du motif de la coquille pour les lucarne latérales. Ouvertures encadrées de pilastres surmontés de chapiteaux doriques, au rez-de-chaussée et ioniques au premier étage, corniche dentelée ornée d'un motif floral. Chapelle à un vaisseau avec abside semi-circulaire, élévation extérieure en moellons jointoyés donnant l'aspect de meulière, toit surmonté d'un petit clocheton de pierre ; élévation intérieure à un seul niveau, voûte en berceau en charpente lambrissé. Bâtiments de la ferme en calcaire moellon enduit, encadrement des baies et lucarnes en pierre de taille.","habitants":"Famille de Maurice Mahieu-Peynaud et Pierre Salinger \r\n        \"","divers":"Château du Pins à Chemillé","gps":"","images":["../../jctruffet.com/image/image_37/37_Pins_Chemill%c3%a9_1.jpg","../../jctruffet.com/image/image_37/37_Pins_Chemill%c3%a9_2.jpg","../../jctruffet.com/image/image_37/37_Pins_Chemill%c3%a9_3.jpg"]},"Consult_chateau_formulaireb125-2":{"id":"Consult_chateau_formulaireb125-2","dept":"37","canton":"Amboise","commune":"Lussault-sur-Loire","nom":"Pintray","type":"Château","periode":"XVII-XIX","histoire":"PINTRAY,  est un lieu seigneurial qui est mentionné dès 1467. Ce fief appartenait alors à Pierre Pelé et relevait de la seigneurie de la Roche Chargé. Olphan du Gast, maître des Eaux et Forêts, capitaine des Grandes Chasses, élève le château vers 1612. Pintray devint ainsi sous Louis XIII un rendez vous dans la forêt d'Amboise.  La famille du Gast va conserver Pintray pendant 150 ans. En 1744, le château passe à Claude-François de la Noue. Sa veuve, à son tour, le vend en 1768 au duc de Choiseul, pair de France, premier ministre de Louis XV. Il ne devait pas conserver la terre de Pintray très longtemps, il la vendit à Luc Allen, brigadier des armées du roi, major du régiment de Lally Tollendal, aux côtés duquel il mena la guerre des Indes. A la Révolution, la veuve Allen, notée pour \"aristocrate dans l'opinion publique\", fut emprisonnée à Amboise et le domaine fut déclaré bien national. Les héritiers Allen parviennent à se faire  restituer le domaine dont ils s'en défont en 1817 au profit  de Michel Lemaignan-Dufay négociant à Blois qui le revend  en 1819 au sieur Galopin, cédé en 1826 à la famille Papion propriétaire d'une usine de Soieries, il appartient depuis 1990 à la famille Marius Rault-Couturier viticulteurs à Lussault, transformé en chambres d'hôtes.","architecture":"PINTRAY,  édifice  d'architecture classique sur soubassement aménagé en terrasse. En 1612 de cette époque, il subsiste le rez-de-chaussée avec bossages alternés, la chapelle, qui consiste en un pavillon carré, avec un clocher octogonal. Le bâtiment à deux étages compte du côté de l'arrivée , sept travées dont trois formant l'avant corps sont groupées sous un fronton triangulaire  percé d'un oculus, séparé par un cordon le premier étage fut bâti en 1829, ce qui donna l'allure actuelle du château. il se compose d'un corps de logis unique dont la façade principale donne sur un grand parterre agrémenté d'un miroir d'eau bordé par un petit pavillon coiffé d'un toit d'ardoise.","habitants":"famille du Gast\r\n        \"","divers":"Château de PIntray  à Lussault sur Loire et petit manoir de Montjoie grav 2","gps":"","images":["../../jctruffet.com/image/image_37/37_Pintray_1.jpg","../../jctruffet.com/image/image_37/37_Pintray_2.jpg"]},"Consult_chateau_formulaireef91":{"id":"Consult_chateau_formulaireef91","dept":"37","canton":"Ballan-Miré","commune":"Riche-Tours","nom":"Plessis_les_Tours","type":"Château","periode":"XVII","histoire":"PLESSIS-LEZ-TOURS, la seigneurie de Montils-lès-Tours, qui prendra plus tard le nom de Plessis, est achetée en 1463 par Louis XI pour y construire une nouvelle demeure. Le château devient la résidence préférée du roi qui y mourut en 1483. Le château de Plessis-lez-Tours, où plusieurs rois de France séjournèrent  fut le théâtre de nombreux évènements historiques. Il est de style Gothique international. C'est un château construit du Moyen Age au XVIe siècle. Le château du Plessis-Lèz-Tours était une résidence royale initialement. Louis XI fera venir d'Italie François de Paule qui construira le couvent des Minimes. Le tombeau du saint homme est aujourd'hui visible dans la petite chapelle voisine du couvent. Il resta la résidence et le siège du pouvoir des rois de France sous Charles VIII et Louis XII qui y réunit les états généraux de 1506. À cette occasion, on octroya le titre de « Père du Peuple » à Louis XII, et décida du mariage de la fille de ce dernier, Claude de France, avec François d'Angoulême, futur François Ier. C'est le premier bâtiment en brique du Val de Loire, les travaux entrepris sous Charles VII et Louis XI ayant fait appel à des maçons de Béthune. Le château est inscrit aux M.H. le 12/04/1927. Le propriétaire actuel  du Plessis-Lèz-Tours est la mairie qui l'inscrit aux M.H. le 12/04/1927.","architecture":"PLESSIS-LEZ-TO
