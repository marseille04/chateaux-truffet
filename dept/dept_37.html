s allemands et déportée au camp de Ravensbruck ou elle faillit mourir. Quand elle revint au château, celui-ci était en mauvais état et elle fut contrainte de s'en séparer. La comtesse de Poix fut décorée de la médaille de la Résistance, et reçut les hommages des présidents Coty et Eisenhower, et de ceux du Air Cheef Marshall. La comtesse de Poix décéda en 1970. Sur la tour, figurent les armes de la famille du Puy et celles de la famille de Poix.","architecture":"SPEMES, ancienne châtellenie qui relevait de Sainte-Maure. Le château a été construit pour Jean de Taix, gouverneur de Loches, ambassadeur à Rome, grand maître de l'artillerie en 1546, et mort au siège de Hesdin en 1553. De la construction Renaissance reste un corps de logis rectangulaire, flanqué au sud d'un bâtiment décalé sur plan carré. Celui-ci doit être la partie la plus ancienne de la demeure, qui a remplacé la forteresse primitive. Le corps de logis principal devait comporter deux étages, mais il a été en partie rasé. A l'intérieur, il conserve un escalier droit, proche de celui d'Azay-le-Rideau, dont les rampes droites sont couvertes d'un plafond rampant à caissons sculptés de fleurons, la cheminée de la grande salle est ornée de peintures portant la devise \"concordia fratrum\".                                                                            ROCHE-PLOQUIN, haut lieu de la résistance en Touraine, et un lieu de mémoire. Dans le parc, se trouvent également des restes des anciens murs de fortification. Dans la chapelle sont inhumés des membres de la famille du Puy de la Roche Ploquin, de la famille Tyrel de Poix,  de la famille de Goyon et de Wissel.Vers 1950, l'édifice a été transformé en maison familiale rurale et aujourd'hui c'est un hôtel 4 étoiles.","habitants":"Roche; famille de Betz                                                               Spémes; famille  de Jean de Taix\r\n        \"","divers":"à Sepmes dont celui de Sepmes  grav 1     et de la Roche-Ploquin grav 2-3.","gps":"","images":["../../jctruffet.com/image/image_37/37_Sepmes_1.jpg","../../jctruffet.com/image/image_37/37_Sepmes_2.jpg","../../jctruffet.com/image/image_37/37_Sepmes_3.jpg"]},"Consult_chateau_formulaire5a88":{"id":"Consult_chateau_formulaire5a88","dept":"37","canton":"Ste Maure en Touraine","commune":"Cravant les Côteaux","nom":"Sonnay","type":"Château","periode":"XV-XVI","histoire":"Sonnay à deux km au sud Suzilly .                                                       SONNAY, la terre de Sonnay est citée dès 1268. Le fief appartient en 1440 à Geoffroy Taveau qui le vend à 1441 à Guillaume de Ballan. Charles VII confisque le château pour le donner en 1449 à son premier chambellan Guillaume Gouffier, gouverneur de Touraine. De 1591 à 1770, il appartient à la famille de la Barre qui le vend à cette date à Jacques Alexandre Becquet du Vivier, écuyer. En 1871, Fernand de Saint-Exupéry s'y retire avec sa famille qui y séjourne une quarantaine d'années. Du château du XVe siècle, reste une tour carrée à l'est renfermant un escalier à vis. Il est modifié et agrandi avant 1770. A cette époque, la tour ouest renferme la chapelle. En 1880, le parc et le château furent agrandis, ainsi l'aile Est se voit doublée d'une aile ouest symétrique qui lui est accolée, à la place des anciens communs. L'ancienne tour ouest qui abritait la chapelle devient un pavillon central. L'ensemble de la façade est traité dans le style néoclassique. Côté nord les traces des différents bâtiments sont encore visibles. Le château est composé aujourd'hui de deux ailes symétriques séparée par un avant-corps central. Chaque aile est accostée par un pavillon de plan rectangulaire. Le bâtiment possède un étage carré et un étage de comble. Chaque aile comprend quatre travées régulières et est recouverte d'un toit en pavillon en ardoise.","architecture":"SUZILLY, fief attesté en 1045. Un aveu de 1523 rendu par Loys Aymar de Sazilly au seigneur de l'Ile-Bouchard fait état d'un château-fort dont la construction pourrait remonter au XIIe siècle. Il ne reste plus trace des fortifications, sauf dans les caves; les douves ont été comblées peu avant la Révolution. Le logis actuel date en partie du XVe siècle; il est flanqué à l'est d'une tour d'escalier polygonale dont la porte a été remaniée au XVIe siècle. Au nord-ouest un pavillon, qui est une ancienne tour carrée en partie arasée, porte une échauguette en brique ajoutée ultérieurement. Au sud, adjonction au XIXe siècle d'une aile dans le prolongement du logis. Une chapelle en bon état est attestée au XVIIIe siècle, mais il n'en reste rien aujourd'hui. A l'est, la basse-cour du château constitua elle-même un fief, attesté en 1502, mais existant probablement avant, le fief de la Cour.Le logis actuel est bâti en moellons enduits et possède deux étages carrés. Il est flanqué sur l'angle nord-ouest d'un pavillon portant une échauguette en brique soutenue par trois consoles à ressauts et couverte d'un toit conique en ardoise. A l'est, la tour d'escalier polygonale, demi-hors-oeuvre en moellons enduits abrite un escalier à  vis.","habitants":"Sonnay;  famille de la Barre                                                         Sazilly; famille Loys Aymar de Sazilly \r\n        \"","divers":"Sonnay grav-1-2     47° 09' 41\" nord, 0° 19' 33\" Est                                       à deux km au sud Suzilly  grav-3-4-5 .","gps":"","images":["../../jctruffet.com/image/image_37/37_Sonnay_1.jpg","../../jctruffet.com/image/image_37/37_Sonnay_2.jpg","../../jctruffet.com/image/image_37/37_Sonnay_3.jpg","../../jctruffet.com/image/image_37/37_Sonnay_4.jpg","../../jctruffet.com/image/image_37/37_Sonnay_5.jpg"]},"Consult_chateau_formulaire812b-2":{"id":"Consult_chateau_formulaire812b-2","dept":"37","canton":"Château-Renault","commune":"Sonzay","nom":"Sonzay","type":"Château","periode":"XII-XV","histoire":"La MOTHE SONZAY, cette ancienne châtellenie relève des châteaux de Tours et La Vallière. Il a appartenu à la puissante famille de Bueil. Pierre de Bueil entreprit la construction d'un chastel en 1380. Le château de la Motte-Sonzay fut construit en 1507 à l'emplacement d'un édifice féodal des XIIe et XVe siècles, par Antoine de Loubes, panetier du roi. Le château de la Motte-Sonzay appartient aujourd'hui à une société privée. de monsieur Edouard Vernes Il est classé aux M.H.depuis 1959.                                                                                                                                                      CARTES, le domaine des Cartes existait déjà au XIIe siècle. En 1105, il fut donné à l'abbaye de Marmoutier. Au XVIIIe siècle est construit le château actuel, composé d'un bâtiment central se développant entre deux pavillons en légère saillie sur chacune des deux façades. Deux ailes le prolongent à l'ouest et à l'est. Les façades du corps de logis central sont divisées en trois travées par des pilastres soutenant, au-dessus de la travée médiane, un fronton triangulaire.","architecture":"Mothe;   le logis actuel est bâti en moellons enduits et possède deux étages carrés. Il est flanqué sur l'angle nord-ouest d'un pavillon portant une échauguette en brique soutenue par trois consoles à ressauts et couverte d'un toit conique en ardoise. A l'est, la tour d'escalier polygonale, demi-hors-oeuvre en moellons enduits abrite un escalier à vis.","habitants":"La Motte; famille de Bueil.                       \r\n        \"","divers":"a Sonzay le château de la Mothe et de la Carte Cartes 47° 31' 41\" Nord et 0° 27' 47\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Sonzay_1.jpg","../../jctruffet.com/image/image_37/37_Sonzay_2.jpg","../../jctruffet.com/image/image_37/37_Sonzay_3.jpg"]},"Consult_chateau_formulairea245":{"id":"Consult_chateau_formulairea245","dept":"37","canton":"Langeais","commune":"Souvigné","nom":"Souvigné","type":"Château","periode":"XV-XVI","histoire":"Trois châteaux  à Souvigné celui de Launay, de Rochedain et de Reigné                                                                                                  SOUVIGNE, dépendait autrefois du château-la-Vallière. L'église fut fondée par un seigneur du Chasteaux, baron, futur château-la-Vallière. La paroisse faisait partie de la sénéchaussée angevine de Baugé en Anjou. La région est surnommée la Touraine angevine.                                               ROCHEDAIN L'ancien château de Rochedain ou Rochedin, fut érigé au Moyen Âge par les seigneurs du Chasteaux-en-Anjou, futur château-la-Vallière, il aurait été détruit, selon certains lors de la Révolution Française. En fait cette propriété appartenant aux de la Rue du Can, famille de Sonzay et Cléré, ne subit pas de dommages. On peut en voir des illustrations dans des ouvrages. Depuis, s'élève un autre château datant du XIXe siècle.","architecture":"REIGNE, l'édifice, qui peut remonter au XIV-XVe siècle, présente un plan en L remanié au XVIe siècle par le percement de quelques ouvertures. Au début du  XVIIIe siècle, édification de deux pavillons quadrangulaires accolés au corps de logis (élévation est). En 1722, refonte de l'élévation nord en pratiquant des ouvertures sur le jardin créé à cette époque, et comblement des douves ayant pu exister le long des ailes nord et Est. Après un incendie des toitures en 1793, des travaux de restaurations générales sont entrepris en 1905 par l'architecte Lafargue. Ce dernier réalise une double galerie permettant la liaison entre le corps de logis et les pavillons, ainsi que des galeries basses en retour d'équerre attenantes aux pavillons. L'intérieur fut totalement aménagé, ne conservant que quelques cheminées anciennes dans les salons et la cuisine. Le château est entouré de trois ailes de communs au sud, en U, d'un puits et d'un pigeonnier à fût ronde.","habitants":"Souvigné; Famille de la Rue du Can.                                           Famille de Sonzay\r\n        \"","divers":"à Souvigné celui de Reigne grav-5-6-7    de Launay grav-1 et de Rochedain grav 2-3-4   Souvigné 47° 24' 44\" nord, 1° 05' 25\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Souvign%c3%a9_1.jpg","../../jctruffet.com/image/image_37/37_Souvign%c3%a9_2.jpg","../../jctruffet.com/image/image_37/37_Souvign%c3%a9_3.jpg","../../jctruffet.com/image/image_37/37_Souvign%c3%a9_4.jpg","../../jctruffet.com/image/image_37/37_Souvign%c3%a9_5.jpg","../../jctruffet.com/image/image_37/37_Souvign%c3%a9_6.jpg","../../jctruffet.com/image/image_37/37_Souvign%c3%a9_7.jpg","../../jctruffet.com/image/image_37/37_Souvign%c3%a9_8.jpg"]},"Consult_chateau_formulaire7728-2":{"id":"Consult_chateau_formulaire7728-2","dept":"37","canton":"Château-Renault","commune":"Saint-Antoine du Rocher","nom":"St_Antoine_Rocher","type":"Château","periode":"XVIII","histoire":"deux châteaux à St-Antoine du Rocher, celui d'Ardrée et du Pléssis.                                                                                                                     ARDREE, ce fut dabord la propriété dErnest Mame en 1805. Angers, 1883-Saint-Antoine du Rocher), neveu du fondateur de limprimerie Mame, Alfred Mame. Le domaine échoit ensuite à son fils Gustave, puis, par le biais dun mariage, à la famille Vatin Pérignon. En 1940, il appartient à la famille Mame mais accueille au début de la seconde guerre mondiale, lambassade dEspagne. Au début des années 1950, cest M. Laverut, gérant du buffet de la gare de lEst à Paris qui rachète le domaine. Dans les années 1970, on y trouvera des sarcophages mérovingiens, conservés à la chapelle de Saint-Antoine dans le village. M. Laverut décède à la fin des années 80, et ses descendants revendent le domaine qui est divisé. On y trouve le Golf dArdrée qui a conservé en partie lesthétisme du parc crée par Eugène Bülher et divers lotissements pavillonnaires. Pendant plus de vingt ans plusieurs projets se sont succédé pour le château, période pendant laquelle il est resté inhabité jusqu'en 2004.","architecture":"PLESSIS, le château du Plessis a été construit à partir de 1705 puis remanié au XIXe siècle. Le Plessis occupe un domaine de cinq hectares de jardin. Eugène O'Neill (1888-1953), dramaturge américain, a habité ce château de 1929 à 1931, il était le beau-père de Charlie Chaplin. Le Plessis hébergea également l'ambassade de Bulgarie en 1940. Deux chambres d'hôtes.","habitants":"Andrée; famille  d'Alfred Mame                                                       Plessis; famille d'Eugène O'Neill\r\n        \"","divers":"à St-Antoine du Rocher, celui d'Ardrée et du Pléssis.","gps":"","images":["../../jctruffet.com/image/image_37/37_St_Antoine_Rocher_1.jpg","../../jctruffet.com/image/image_37/37_St_Antoine_Rocher_2.jpg"]},"Consult_chateau_formulaireed47-2":{"id":"Consult_chateau_formulaireed47-2","dept":"37","canton":"Château Renault","commune":"Saint Christophe sur le Nais","nom":"St_Christophe_Nais","type":"Château","periode":"XV","histoire":"Deux châteaux à st- Christophe sur le Nais, Vaudésir et Gesnes.                                                                                                     VAUDESIR, En 1532, René Bonamour, fait construire le château, il est décrit, comme \"une grande maison garnie de sept cheminées, quatre tours au coin de la maison,et fossés\", dans l'acte de vente de 1558, fait à M. François Massicault. Sa fille Jeanne le transmet à ses filles en 1593. Par le mariage d'une d'elles avec François Testu, Vaudésir devient la propriété de la famille Testu de 1625 à 1719. Au XVIIIe siècle Vaudésir eut pour propriétaire la famille Baudard (1719), Georges Latouche (1794). Au XIXe siècle, la famille de Sarcé (1810), Emmanuel de Tessecourt (1875), différents propriétaires se succèdent ensuite, jusqu'en 1970 où il est reçu en héritage par Mme Amiot, sa propriétaire actuelle. Trois bâtiments édifiés en comble et couverts d'ardoise, le bâtiment Est était composé au rez-de-chaussée d'un vestibule avec escalier et deux celliers, à l'extrémité de cette aile un escalier de bois à marches tournantes desservait l'aile Est et la galerie\". La galerie comportait au rez-de-chaussée une chapelle. L'aile Ouest se composait d'un pavillon au Nord : chambre basse à cheminée et cabinet, au rez-de-chaussée et à l'étage. Cette disposition, est restée pratiquement inchangée. On remarque néanmoins que l'aile Nord était percé à l'origine, à l'étages, de baies en arc en plein cintre, dont des traces subsistent, et qu'elles ont été remplacées par des fenêtres à meneaux, surmontées d'un fronton, datant du premier tiers du XVIIe siècle. Certaines fenêtres, notamment sur le pavillon d'angle Nord-Ouest, étaient encore pourvues de grilles (jusque dans les années 1980) indiquant un aspect défensif encore nécessaire au XVIe siècle.","architecture":"GESNES,  Gesne qui appartenait à la famille Jean de Genetay est cédé pour la partie concernant le fief en 1604 à Philémon Voisin, et la métairie à Bernard Croyzé, avocat. En 1648, Pierre Dunoyer, bailli de Saint Christophe, acquiert la métairie, puis le fief,  Lors du décès de Jean-Jacques Dunoyer en 1762,un inventaire dressé  composée de deux pavillons et mansarde au milieu, En 1772, Gesnes est vendu à Jacques Etienne Bourgault Ducoudray,  il est vendu en 1825 à Pierre Jacques Sylvestre Voisin, négociant à Château du Loir. La succesion d'Hercule Bourgault en 1825. En 1840 Gesnes fut vendu à un médecin Esprit Jean Gendron, dont la femme Henriette Boitard fut marraine en 1842 avec Louis de Sarcé de la cloche de Saint Christophe. Actuellement Gesnes est restée propriété des descendants de la famille Gendron qui a conservé l'unité architecturale de sa construction de la seconde moitié du XVIIe siècle. Ce bâtiment offre une composition symétrique Il est couvert d'un toit brisé en croupe, concernant le corps de logis, et d'un toit brisé en pavillon pour les deux pavillons. Il est composé d'un corps de logis percé d'une porte au centre et de quatre fenêtres, encadré par deux pavillons carrés à une travée, en léger décrochement de la façade principal. A l'extrémité Sud-Est est accolé une construction rectangulaire couverte d'un toit en pavillon, L'étage de comble est orné de lucarnes en pierre de taille surmonté d'un fronton  cintré et triangulaire couronné d'une boule en pierre. Sur la façade antérieure, les deux lucarnes latérales ont été remplacées par deux oculus.","habitants":"Vaudésir; Famille de François Testu                                         Gesnes;   famille Jean de Genetay\r\n        \"","divers":"à st- Christophe sur le Nais, Vaudésir  grav-2 à-6 et Gesnes grav-1.   Gesnes 47° 37' 01\" Nord, 0° 28' 36\" Est  Sion grav-7","gps":"","images":["../../jctruffet.com/image/image_37/37_St_Christophe_Nais_1.jpg","../../jctruffet.com/image/image_37/37_St_Christophe_Nais_2.jpg","../../jctruffet.com/image/image_37/37_St_Christophe_Nais_3.jpg","../../jctruffet.com/image/image_37/37_St_Christophe_Nais_4.jpg","../../jctruffet.com/image/image_37/37_St_Christophe_Nais_5.jpg","../../jctruffet.com/image/image_37/37_St_Christophe_Nais_6.jpg","../../jctruffet.com/image/image_37/37_St_Christophe_Nais_7.jpg"]},"Consult_chateau_formulaire994f-2":{"id":"Consult_chateau_formulaire994f-2","dept":"37","canton":"St-Cyr sur Loire","commune":"St-Etienne de Chigny","nom":"St_Etienne_Chigny","type":"Château","periode":"XV-XVI","histoire":"deux châteaux à Saint-Etienne de Chigny dont Andigny et Beauvois.                                                                                                     ANDIGNY, un manoir bâti à Saint-Etienne-de-Chigny. La construction du manoir d'Andigny date du XVe et XVIe siècle. A l'origine, c'était une villa romaine. Au XIVe siècle, le fief relevait de l'Archevêché de Tours et de la Châtellenie de Boussay. Les propriétaires d'Andigny avait droit de banc seigneurial dans l'église Saint-Étienne.  Au XIXe siècle, Un escalier à vis de Saint-Gilles conduit au premier étage où se trouve une cheminée dont la hotte est décorée d'une fresque représentant le débarquement de Sainte-Marthe en Provence. Une cheminée du rez-de-chaussée porte sur sa hotte une inscription du XVIe siècle. De ce manoir dépend une chapelle creusée dans le roc. Sa façade est percée d'une porte et de deux baies géminées dont les piédroits sont décorés de motifs du XVIe siècle.","architecture":"BEAUVOIS, ce château du XVe siècle était la destination favorite du roi Louis XIII pour des parties de chasse sur les terres du domaine.  le domaine de Beauvois, ce château-hôtel quatre étoiles, a un nouveau propriétaire. Zaya S. Younan, 53 ans, est un entrepreneur américain qui a acquis plus de quatre-vingts hôtels partout dans le monde. Fort de son expérience, il a une idée très claire de ce qu'il veut pour le château.","habitants":"Seigneurs locaux\r\n        \"","divers":"à Saint-Etienne de Chigny dont Andigny grav-1 et Beauvois grav 2-3-4     Andigny 47° 22' 16\" Nord, 0° 31' 01\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_st_Etienne_Chigny_1.jpg","../../jctruffet.com/image/image_37/37_st_Etienne_Chigny_2.jpg","../../jctruffet.com/image/image_37/37_st_Etienne_Chigny_3.jpg","../../jctruffet.com/image/image_37/37_st_Etienne_Chigny_4.jpg"]},"Consult_chateau_formulaire9c1c":{"id":"Consult_chateau_formulaire9c1c","dept":"37","canton":"Langeais","commune":"Saint-Michel sur loire","nom":"St_Michel_sur_Loire","type":"Château","periode":"XIV-XVI-XVII","histoire":"A st-Michel sur Loire le château de St-Michel, Montbrun,  de Plancoury, le vieux château et le manoir de Blanchereau.                                                                                                                                                 ST-MICHEL sur-LOIRE au XVe siècle; érigée en châtellenie en 1518 avec la famille Le Roy; clos de muraille en 1527, incendié en 1568 par les huguenots puis restauré; François Le Roy meurt sans héritier direct en 1606 et la famille de Rouville en hérite, Saint Michel est laissé à l'abandon durant une trentaine d'années. Il est vendu sur saisie à la criée en 1634 à Claude Bouthillier, surintendant des finances de Louis XIII,on le surnomme le vieux château. Le domaine a appartenu à Yolande d'Aragon, reine de Naples, qui le revendit à Jean IV de Bueil. La famille d'Espinay le vendit ensuite à Charles d'Albert, duc de Luynes. Dans les années 1920, il appartenait au sénateur Germain qui y effectua quelques modifications et fit construire l'aile Est néogothique flanquant le châtelet d'entrée. On ne reconnaît plus grand chose de l'édifice représenté par Gaignières en 1699 : subsistent aujourd'hui le châtelet d'entrée édifié au XVe siècle et son escalier à vis hors-oeuvre qui dessert également l'aile moderne rajoutée dans les années vingt, une grange à pignon en rondelis située à l'ouest, la base voûtée d'une tour de défense quadrangulaire et une partie du mur d'enceinte d'origine. Ce mur est reconnaissable à l'est du châtelet et plusieurs constructions sont venues s'y accoler, en particulier l'aile moderne. On le retrouve également à l'extrémité du coteau dont il contient en partie la poussée. Une poterne permet de protéger l'escalier d'accès au bas de ce mur.","architecture":"Château de Montbrun du XXe siècle. Manoir de Banchereau  du XVIIe siècle pas d'information pour ses deux châteaux.                                                             PLANCOURY, un ancien fief relevant de la baronnie de St Michel sur Loire. Plusieurs seigneurs sy sont succédé jusquau très respecté André Coudreau, trésorier général de France et maire de Tours, qui fera construire, dans la deuxième moitié du XVIIe, le château Planchoury. En 1719, cette magnifique demeure et son domaine seront vendus à François Girault. Quelques trente années plus tard, A la mort du maître des lieux, sa veuve le vendra à un certain Eugène Sébastien Polak (1858). le nouveau propriétaire en doublera la superficie habitable, fut, entre 1989 et 2006, le premier musée européen de la marque automobile américaine Cadillac, regroupant plus de soixante-dix véhicules dexception, aujourdhui devenu collection privée  consacrée aux Cadillac avec plus de 80 modèles.                                              VIEUX CHATEAU dominant la Loire, a été construit au XIVe siècle, sur les bases dun très ancien château du Xe siècle dont il reste les vestiges dun mur denceinte et dune tour de guet. Ancienne résidence de Yolande dAragon, reine dAnjou, tante de Charles VII, elle a été aménagée en demeure familiale. La grande chambre médiévale au-dessus du porche dentrée et le salon, décorés dobjets anciens et de souvenirs de famille, accueillent les hôtes du château.","habitants":"St-Michel; Famille de Claude Bouthillier                     Plancoury ; Famille de François Girault.\r\n        \"","divers":"A st-Michel sur Loire le château de St-Michel, Montbrun grav-4,  de Plancoury grav-5-6 et  le vieux château gracv 1-2-3  et le manoir de Blanchereau grav 7.","gps":"","images":["../../jctruffet.com/image/image_37/37_st_Michel_sur_Loire_1.jpg","../../jctruffet.com/image/image_37/37_st_Michel_sur_Loire_2.jpg","../../jctruffet.com/image/image_37/37_st_Michel_sur_Loire_3.jpg","../../jctruffet.com/image/image_37/37_st_Michel_sur_Loire_4.jpg","../../jctruffet.com/image/image_37/37_st_Michel_sur_Loire_5.jpg","../../jctruffet.com/image/image_37/37_st_Michel_sur_Loire_6.jpg","../../jctruffet.com/image/image_37/37_st_Michel_sur_Loire_7.jpg"]},"Consult_chateau_formulaired315":{"id":"Consult_chateau_formulaired315","dept":"37","canton":"Château-Renault","commune":"Saint-Paterne-Racan","nom":"St_Paterne_Racan","type":"Château","periode":"XVI-XIX","histoire":"quatre châteaux dans cet article à Saint-Paterne dont Hodebert, Hubedière, Chevain et Fontenaye pas d'article pour ces deux derniers.                                                                                         HODEBERT, la construction du château d'Hodebert date du XVIIe siècle. Il a appartenu un moment à la famille Goüin. François Brissonnet, écuyer, seigneur de Launay, conseiller et aumonier du roi, chanoine prébendé de la Basilique Saint-Martin de Tours et Prévôt d'Oë, fit ériger l'élément central de l'actuel château sur les restes arasés d'une ancienne forteresse qui construite dans une excavation du coteau. En 1545, sa châtelaine, la veuve Durand, comparut devant le chapitre de Saint-Martin de Tours. Devenu depuis le siège de la justice prévôtale d'Oë, c'est donc dans ce lieu que, le 20/11/1620, le poète Honorat de Bueil de Racan fut traduit pour rendre l'hommage lige à son suzerain féodal François Brissonnet. En 1650, cette châtellenie fut aux mains de Henry de Codosny, seigneur de Hodebert et de Saché, maître d'hôtel du roi, conseiller privé de l'époux de Madeleine Dunoyer, fille du bailli de Saint-Christophe.","architecture":"HODEBERT A la fin du XVIIe siècle, il appartient à Jean du Noyer, seigneur de Gennes. En 1794, le banquier Alexandre-Pierre-François Goüin et son épouse, Marie-Magdeleine Benoist de La Grandière (fille de l'ancien maire de Tours), l'acquièrent, puis le revendirent le 30/12/1808 à Louis-François de Sarcé. En 1890, Eugène de Sarcé lègue Hodebert à Robert Roullet de La Bouillerie, ses descendants en sont toujours propriétaires. Le château d'Hodebert appartient aujourd'hui à Hélie Roullet de La Bouillerie. Le 26/05/2018, un incendie, provoqué par la foudre, a endommagé partiellement une tour du château. Son parc est inscrit aux M.H. depuis 1944 est  le 26/10/2009 pour le château.  De plan rectangulaire à deux niveaux  avec comble éclairé par des lucarnes, toit en croupe flanqué de deux pavillons carrés sur façades prolongés sur l'arrière de droite et à gauche  de bâtiment et de dépendances.                                                                        CHEVAIN; dans le même style que Hodebert, deux niveaux sur soubassement, double bandeau  et pavillons carrés toits en croupes.                                                                                                 FONTENAYE et HUBEDIERE du XVIe-XXe siècles de même style également, mis à part Fontenaye qui possède une tour polygonale avec toit pointu sur façade.","habitants":"Hodebert; Famille Goüin\r\n        \"","divers":"à Saint-Paterne dont Hodebert  grav-4, Huberdière grav-3   Chevain  grav-2 et Fontenaye grav-1  47° 36' 16\" Nord et 0° 27' 59\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_St_Paterne_Racan_1.jpg","../../jctruffet.com/image/image_37/37_St_Paterne_Racan_2.jpg","../../jctruffet.com/image/image_37/37_St_Paterne_Racan_3.jpg","../../jctruffet.com/image/image_37/37_St_Paterne_Racan_4.jpg"]},"Consult_chateau_formulaire7abd":{"id":"Consult_chateau_formulaire7abd","dept":"37","canton":"Ste-Maure de Touraine","commune":"Ste-Maure de Touraine","nom":"Ste_Maure_Touraine","type":"Vestiges-Château","periode":"XIV","histoire":"deux châteaux à Sainte-Maure,celui de Ste-Maure et de Rohan, vestiges.                                                                                             Ste-MAURE, reconstruit aux XIVe et XVe siècles sur les ruines  d'un ancien, le château fut la propriété de lillustre famille des Rohan Guéméné de 1498 jusquà la Révolution. Au retour de son mariage à Saint-Jean-de-Luz, le roi Louis XIV sy arrêta avec la reine Marie-Thérèse dAutriche, les 7 et 8 juillet 1660. Sous le directoire, le Premier Empire et la Restauration, l'édifice servit de caserne à la gendarmerie. Ensuite une école communale de garçon occupa le château de 1848 à 1968. Aujourdhui, seule la partie centrale du vieux château subsiste, et trois tours sur le côté sud : une tour demi-circulaire ainsi qu'une ronde, et des restes de fortifications. La tour d'entrée est une construction carrée dont le couronnement a disparu, mais qui présente, au-dessus de sa porte, les rainures de manoeuvre des bras du pont-levis. L'intérieur contient, au rez-de-chaussée, l'ancien passage et une salle au-dessus. Un musée darts et traditions populaires occupe cinq salles restaurées du château et propose une dégustation de fromage à lissue de la visite.","architecture":"ROHAN vestiges; le château de la famille de Rohan, fut construit par Foulques Nerra, en 990. Le château de la famille de Rohan abrite maintenant un Musée d'Arts et de Traditions Populaires.  L'accès au château est réalisée par une tour d'entrée, cette tour présente un plan au sol carré. Le couronnement de l'ouvrage fortifié n'existe plus. La tour était pourvue d'un pont-levis. Les saignées qui recevaient les flèches des deux bras leviers subsistent à l'aplomb de la porte. Une salle, aménagée à l'étage de la tour, surmonte le portail d'accès. Une voie publique, aménagée dans la première moitié du XIXe siècle, traverse la cour du château. Le corps de logis comporte deux étages. Toutefois, l'observation du mur sud laisse suggérer l'existence d'un étage « aveugle » (non percé de fenêtre) et qui aurait abrité les caves, des remises ou encore des geôles. L'ancienne toiture du logis présentait deux versants formant un angle aigu. Deux tours à plan polygonal sont venues flanquer le corps principal du logis au XVe siècle. Ces deux tours, érigées durant la quatrième phase de construction, renferment chacune un escalier à vis. Une seule des deux tours, celle située au sud, a subsisté après les travaux d'installation de l'école réalisés durant le XIXe siècle.","habitants":"famille des Rohan-Guéméné \r\n        \"","divers":"à Sainte-Maure,celui de Ste-Maure et de Rohan vestiges  Rohan  47° 06' 47\" Nord et 0° 37' 19\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Ste_Maure_Touraine_1.jpg","../../jctruffet.com/image/image_37/37_Ste_Maure_Touraine_2.jpg","../../jctruffet.com/image/image_37/37_Ste_Maure_Touraine_3.jpg","../../jctruffet.com/image/image_37/37_Ste_Maure_Touraine_4.jpg","../../jctruffet.com/image/image_37/37_Ste_Maure_Touraine_5.jpg","../../jctruffet.com/image/image_37/37_Ste_Maure_Touraine_6.jpg","../../jctruffet.com/image/image_37/37_Ste_Maure_Touraine_7.jpg","../../jctruffet.com/image/image_37/37_Ste_Maure_Touraine_8.jpg"]},"Consult_chateau_formulaire3695":{"id":"Consult_chateau_formulaire3695","dept":"37","canton":"Ste Maure en Touraine","commune":"Theneuil","nom":"Temple_37","type":"Château","periode":"XIX","histoire":"TEMPLE, le château du Temple est construit vers 1886 pour Jacques Lhuillier, directeur du crédit foncier égyptien.","architecture":"TEMPLE, le château du Temple fut construit vers 1886 .La façade nord sur la vallée fut modifiée quelques années plus tard par l'ajout d'un décor sculpté néo-renaissance autour de la travée centrale, l'escalier de distribution nord fut supprimé et le perron transformé en terrasse donnant sur le salon. Le châtelet, caractéristique du style troubadour, comprend deux tours séparées par une porte en arc brisé, l'une en brique et pierre, crénelée et l'autre en moellon enduit avec chaînages en pierre de taille surmontée d'une flèche. L'édifice de plan rectangulaire et symétrique comprend trois travées. Une tour circulaire est placée à chaque angle de la façade nord. La construction est en moellon enduit avec bandeaux, encadrements de fenêtres et de lucarnes en pierre de taille, le couronnement des tours en maçonnerie. La façade, au sud, est précédée d'un portique néo-gothique soutenu par des colonnes à chapiteaux feuillagés, couvert d'une fausse voûte d'ogives à clés pendantes. Le sol est recouvert de mosaïques et le mur orné de peintures au pochoir. Une baie à trois lancettes ferme la galerie à l'ouest.","habitants":"Famille de Jacques Lhuillier\r\n        \"","divers":"Temple 47° 05' 53\" Nord et 0° 26' 23\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Temple_37_1.jpg","../../jctruffet.com/image/image_37/37_Temple_37_2.jpg","../../jctruffet.com/image/image_37/37_Temple_37_3.jpg"]},"Consult_chateau_formulaire4f72":{"id":"Consult_chateau_formulaire4f72","dept":"37","canton":"Chinon","commune":"Thizay","nom":"Thizay","type":"Château","periode":"XV-XVI","histoire":"Trois châteaux  à Thizay celui de Frau, de Gaudrée et de Vaumenaise                                                                                                 FRAU, gentilhommière du XVIe siècle, composée d'un bâtiment rectangulaire précédé d'une dépendance. Une tourelle est flanquée, à l'ouest, de la façade méridionale donnant sur la cour. Plus loin, accolé et en saillie, se place un pavillon carré avec entablement à modillons, il est lui-même prolongé en arrière par une tour carrée bâtie sur un contrefort à pic, compensant le contrebas de la vallée. Une galerie était à l'origine posée sur un encorbellement et a été soutenue plus tard par trois arcades de la fin du XVIIe siècle. A l'est, se trouve une chapelle à clocher pignon. A l'intérieur du logis  un escalier droit, à l'italienne, marqué d'arcades jumelles.                                                                                                   VAUMENAISE, édifice du  XVe siècle et XVIe siècle, remanié et partiellement détruit ; corps de logis remanié au XVIIe siècle, puis remanié au XVIIIe siècle avec adjonction d'un pavillon ; cheminée datant du XVIIIe siècle; cellier dans le tuffeau, dépendances avec nombreux fours à pain juxtaposés. Vaumenaise est composé d'un étage carré, un escalier dans-oeuvre, le gros-oeuvre en calcaire; pierre de taille; moellon; enduit partiel. La propriété comprend un parc, un jardin, des communs, un colombier, un four à pain et un cellier.","architecture":"Grande GAUDREE, édifice construit aux XVe et XVIe siècles ; ancien fief devenu métairie au XVIIe siècle ; bâtiment ruiné en partie ; appartenait à la châtellenie de Chavigny à Lerné. Le château a conservé son logis flanqué d'une tour carrée. Le donjon est ruiné. Le pigeonnier de plan circulaire est surmonté d'un dôme en pierre et d'un lanternon ; il s'agit d'une ancienne tour défensive réaménagée, élévation à travées, deux étages carrés, escalier demi-hors-oeuvre ; escalier à vis sans jour ; escalier de distribution extérieur\r\n calcaire ; moellon ; pierre de taille  toit à longs pans ; pignon découvert ; toit polygonal  en ardois.","habitants":"seigneurs locaux\r\n        \"","divers":"à Thizay celui de Frau grav-1, de Gaudrée grav-2-3et de Vaumenaise","gps":"","images":["../../jctruffet.com/image/image_37/37_Thizay_1.jpg","../../jctruffet.com/image/image_37/37_Thizay_2.jpg","../../jctruffet.com/image/image_37/37_Thizay_3.jpg"]},"Consult_chateau_formulaire924f":{"id":"Consult_chateau_formulaire924f","dept":"37","canton":"Tours","commune":"Tours","nom":"Tours_Patrimoine","type":"Patrimoine","periode":"XV-XVI","histoire":"GOUIN, hôtel situé au cur de Tours, à deux pas du centre de Création Contemporaine Olivier Debré, l'hôtel Goüin est un lieu culturel dédié à lart contemporain, ouvert à tous, uniquement pendant les expositions. Bâti au XVe, lhôtel Goüin impressionne par labondant décor sculpté de sa façade sur cour. Ce décor élaboré dans le goût de lAntiquité romaine sinspire notamment des sculptures de lAutel de la Paix à Rome, consacré par lempereur Auguste en lan 9 avant JC.\r\nLa programmation culturelle a pour ambition de confronter des expressions, dencourager la création locale et de surprendre avec des propositions artistiques innovantes.                                         MAME hôtel, il est construit entre 1768 et 1770 sur les plans de l'architecte Pierre Meusnier pour Gilles Lefevre de Montifray, négociant et juge-consul, et son épouse Catherine Thoisnier. Lefebvre a également fait construire l'hôtel situé au 15 de l'actuelle place François-Sicard (hôtel Liebert de Nitray) et était notamment propriétaire des domaines de Panchien et de Puy-Tessier. Il fut acquis par Ernest Bidault en 1834. En 1872, Alfred Mame l'acquiert à son tour. Son fils Paul Mame en hérite.","architecture":"PETITE BOURDAISSIERE, musée marie de l'incarnation hôtel  qui jouxte la chapelle Saint-Michel date du XVe siècle. En 1625, il est acheté par les Ursulines qui y établissent leur couvent. Marie Guyart, née à Tours en 1599, y entre en 1631, prenant le nom de \" Marie de l'Incarnation \". De là elle part pour le Canada où elle fonde le monastère des Ursulines de Québec , ouvre la première école de filles en Amérique du Nord et participe à la fondation de la Nouvelle France à peine découverte par Jacques Cartier puis Champlain. Les religieuses quitteront Tours en 1792. La petite Bourdaisière est rachetée en 1983 par l'association Marie Guyart , qui y ouvre le centre Marie de l'Incarnation. Le musée présente des souvenirs de Marie Guyart de l'Incarnation,aux différentes étapes de sa vie (épouse et mère, veuve, femme d'affaires, religieuse éducatrice, missionnaire) et son itinéraire exceptionnel de la Loire au Saint Laurent.Le musée voit passer 3000 visiteurs chaque année .","habitants":"Gilles Lefevre de Montifray,                                                         Marie Guyart\r\n        \r\n        \"","divers":"Tours hôtel de ville grav-1                                                        La Bourdaissiere grav_2    hôtel Mame grav-3                            hôtel Gouin grav-4","gps":"","images":["../../jctruffet.com/image/image_37/37_Tours_Patrimoine_1.jpg","../../jctruffet.com/image/image_37/37_Tours_Patrimoine_2.jpg","../../jctruffet.com/image/image_37/37_Tours_Patrimoine_3.jpg","../../jctruffet.com/image/image_37/37_Tours_Patrimoine_4.jpg","../../jctruffet.com/image/image_37/37_Tours_Patrimoine_5.jpg","../../jctruffet.com/image/image_37/37_Tours_Patrimoine_6.jpg"]},"Consult_chateau_formulaire4652":{"id":"Consult_chateau_formulaire4652","dept":"37","canton":"Tours","commune":"Tours","nom":"Tours_Pilorguet","type":"Château-Hôtels","periode":"XVI-XVIII","histoire":"TOURS, il date de 1160. Sa construction a débuté au 3e quart du XIIe siècle, du XVI siècle et s'est achevée au XVIIIe siècle. Les tours féodales flanquaient les angles du château bâti par Henri II Plantagenêt en 1160. Les tours nord et sud datent du troisième quart du XIIe siècle, tandis que l'ancien palais est du XVIe et XVIIIe siècles. Le bâtiment Nord, qui date du XVIe siècle, servait d'habitation principale aux Gouverneurs de Tours. Le bâtiment Ouest, date du XVIIIe siècle. Il a été construit entre les deux tours, pour servir d'annexe. Désormais, deux musées et deux bibliothèques. L'entrée principale (pédestre) se fait côté Loire, entre le château de Tours et le logis des gouverneurs,  de l'autre côté par le cours l'Armorial qui dispose d'un parking (place des Turones).                                                                                                                                                     PILORGUET, le château de Pilorget a été construit en 1768. L'édifice conserve un escalier à 4 volées droites, avec rampe et main courante en fer forgé, du même style que les balcons de la façade du château. Plinthes en bois décorées de médaillons avec étoiles à six branches. La salle à manger est entièrement garnie de boiseries moulurées. Il est inscrit aux M.H. depuis 1931 et 1943.","architecture":"TOURS,  le château abrite les services du patrimoine, des expositions et des relations internationales de la ville de Tours qui y présentent annuellement, depuis 2001 et sur quatre niveaux, entre 10 et 12 expositions, habituellement gratuites. La programmation touche tous les champs de la création : de la peinture à la photographie, de la poterie à la sculpture, de l'archéologie à l'art contemporain, dans ce dernier registre : Joan Miró, Daniel Buren, Alexander Calder, etc. Ainsi que le cinéma. Depuis 2010, la Ville de Tours et le centre d'Art du Jeu de Paume de Paris se sont rapprochés pour présenter des expositions de photographies à caractère patrimonial,, classé aux M.H. depuis 1913.\r\nPILORGUET, l'édifice conserve un escalier à quatre volées droites, avec rampe et main courante en fer forgé, du même style que les balcons de la façade du château. Plinthes en bois décorées de médaillons avec étoiles à six branches. La salle à manger est entièrement garnie de boiseries moulurées, et conserve une cheminée en bois de style Louis XV, surmontée d'une glace carrée, surmontée elle-même d'une peinture représentant des fleurs. Le salon conserve une glace à large cadre en bois de style Louis XV surmontant la cheminée.","habitants":"\"","divers":"Tours : 47° 23' 51,27\" Nord, 0° 41' 33,97\" Est                 Pilorguet  grav - 4-5                                                                     47° 24' 49\" Nord et 0° 41' 03\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Tours_Pilorguet_1.jpg","../../jctruffet.com/image/image_37/37_Tours_Pilorguet_2.jpg","../../jctruffet.com/image/image_37/37_Tours_Pilorguet_3.jpg","../../jctruffet.com/image/image_37/37_Tours_Pilorguet_4.jpg","../../jctruffet.com/image/image_37/37_Tours_Pilorguet_5.jpg"]},"Consult_chateau_formulaire9dd9":{"id":"Consult_chateau_formulaire9dd9","dept":"37","canton":"Ste-Maure de Touraine","commune":"Trogues","nom":"Trogues","type":"Château","periode":"XIX","histoire":"BOIZE, est un ancien fief mentionné dès 1094. Le château actuel a été bâti en 1832 à l'emplacement d'un autre bâtiment, la ferme date de la même époque. La chapelle a été bâtie peu après le château neuf. L'unique vestige de l'ancien domaine est le moulin transformé en château d'eau pour  l'alimenter. Les caves troglodytiques figurent au cadastre de 1831.  Édifice de plan symétrique constitué d'un corps central encadré de deux ailes légèrement débordantes. Les caves voûtées en berceau, très bien appareillées, sont présentes sous tout le bâtiment, certaines sont éclairées par des soupiraux. Le rez-de-chaussée est surmonté d'un étage carré. Les ailes sont percées de huit baies rectangulaires surmontées de larmiers et les pignons sont percés d'un oculus. Le rez-de-chaussée et l'étage sont délimités par un bandeau en pierre de taille ceinturant tout le château. La chapelle à voûtes d'ogives comprend deux travées. Elle est bâtie en pierre de taille de grand appareil et couverte d'un toit en pavillon en ardoise. Le pignon sud est percé également d'un oculus quadrilobé. Présence d'un arc appareillé en plein cintre dans les caves troglodytiques et d'un pressoir à vin.","architecture":"TROGUES, il existait autrefois un logis encadré par deux ailes parallèles de communs, comme en témoigne un ensemble de bâtiments disposés en U. C'est  ici que s'élevait autrefois la maison de la famille de Sassay car la Rollandière est mentionnée dès 1666 comme un fief appartenant à François de Sassay, est devenu un hôtel 4 étoiles. Une tour circulaire du XVIe siècle, accolée à la ferme, est un vestige de l'ancien édifice. En 1831, aucun bâtiment ne figure à l'emplacement du château actuel, construit entre 1880 et 1882 par la famille Wolf originaire d'Alsace. La construction à l'est d'une tour carrée et d'une maison de gardien a suivi. Les façades nord et sud montrent une rigoureuse symétrie. L'avant-corps central est encadré de deux ailes de deux travées, précédé d'un perron. Un cèdre remarquable et un bassin circulaire agrémentent le parc. Vers 1990, le château a abrité un centre de vacances.Les façades nord et sud montrent une rigoureuse symétrie. L'avant corps central est encadré de deux ailes de deux travées et précédé d'un perron.","habitants":"Seigneurs locaux\r\n        \"","divers":"a Trogues château de Boizé grav-3 et de la Rollandière grav-1-2,  47° 06' 50\" Nord et 0° 29' 45\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Trogues_1.jpg","../../jctruffet.com/image/image_37/37_Trogues_2.jpg","../../jctruffet.com/image/image_37/37_Trogues_3.jpg"]},"Consult_chateau_formulairef36e":{"id":"Consult_chateau_formulairef36e","dept":"37","canton":"Chinon","commune":"Rigny ussé","nom":"Ussé","type":"Château","periode":"XV-","histoire":"USSE,  le premier seigneur connu d'Ussé fut en 1004, le viking Guelduin 1er de Saumur, surnommé \"Le diable de Saumur\", qui porte les couleurs du comte de Blois. Eude et Thibault II bâtirent la première forteresse en bois. Guelduin, guerrier redoutable avait été seigneur de Saumur, en 1004, il est cité seigneur d'Ussé, de Saumur et de Pontlevoy. En 1040, son fils Guelduin II, lança la construction en pierre du château. Olivier d'Ussé, chevalier croisé en 1099, sera le  seigneur d'Ussé. En 1424, vers la fin de la Guerre de Cent ans, Jean de Bueil, seigneur d'Ussé, sera le bâtisseur de la structure de base du château actuel. Le fils épousera la fille de Charles VII et d'Agnès Sorel. La chatellerie d'Ussé fût érigée en marquisat pour Louis II Bernin de Valentinay en 1700. En 1807, le château d'Ussé passa dans la famille de Duras, les cèdres du Liban ramenés de terre Sainte par Chateaubriand pour son amie Claire de Kersaint, épouse du Duc de Duras, furent plantés en 1817, on peut encore les admirer près de la chapelle. Louis II Bernin de Valentinay épouse Jeanne Françoise le Prestre de Vauban, fille du Maréchal, il auront trois enfants, dont Louis Bernin, marquis d'Ussé et deux filles. Sa fille sera dame d'Ussé pendant 22 ans.","architecture":"USSE, au XVe siècle, sur les ruines de cette forteresse, Jean V de Bueil commença la construction actuelle. C'est sous Louis II de Valentinay que furent bâties par Vauban, la construction italienne et les terrasses. Au bout de l'allée se trouve le Bastion de Vauban, et une chambre porte son nom. On lui doit l'allée des Cavaliers. La fille du duc de Duras légua Ussé à son petit neveu le duc de Blacas, aujourd'hui, les descendants sont propriétaires du château. \r\nLe château correspond parfaitement à la définition que l'on utilise souvent à propos du Val de Loire: rêve et réalité, histoire et légende. La situation géographique d'Ussé est exceptionnelle, nid d'aigle accroché aux flans du coteau et adossé à la forêt de Chinon avec la rivière l'Indre. le château  et l'édifice consiste est un quadrilatère fermé les quatres angles sont dotés de tours rondes qui s'élèvent au-dessus des donjons initiaux. L'aile occidentale est remanié dans un style de première renaissance tourelles et échauguettes jaillissent des remparts.","habitants":"Guelduin   Jean de Beuil\r\n        \"","divers":"Ussé  47° 15' 10,08\" Nord et 0° 17' 58,69\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Uss%c3%a9_1.jpg","../../jctruffet.com/image/image_37/37_Uss%c3%a9_2.jpg","../../jctruffet.com/image/image_37/37_Uss%c3%a9_3.jpg","../../jctruffet.com/image/image_37/37_Uss%c3%a9_4.jpg","../../jctruffet.com/image/image_37/37_Uss%c3%a9_5.jpg","../../jctruffet.com/image/image_37/37_Uss%c3%a9_6.jpg"]},"Consult_chateau_formulaire7a62":{"id":"Consult_chateau_formulaire7a62","dept":"37","canton":"Chinon","commune":"Huismes","nom":"Uzage","type":"Château","periode":"XVI-XVIII","histoire":"UZAGE, fief relevant de la châtellenie de Cravant. Le manoir du XVIe siècle se trouve à l'est du château  du  XVIIIe siècle. Il comprend deux corps de bâtiment perpendiculaires dont les étages sont reliés par une vis de pierre logée dans une tour occupant l'angle rentrant. Le château présente des façades aux travées centrales accostées de pilastres et sommées d'un fronton triangulaire. Il fut prolongé, au début du XIXe siècle, par deux ailes. La fuye cylindrique couverte d'un dôme a été convertie en chapelle au XIXe siècle. Le château de Bonaventure était une maison de chasse bâtie par Louis XI qui y résida en 1480 et 1482 ; le logis principal s'élevait à l'ouest de la cour ; il a été entièrement démoli en 1745, ainsi que la chapelle dédiée à Saint-Bonaventure ; cette cour était limitée à l'est par le bâtiment des offices, parallèle au précédent, dont subsiste le mur goutterot oriental ; dans le mur nord du parc subsiste la porte d'entrée en plein cintre, accompagnée d'un guichet, et une maçonnerire en brique qui appartenait au logis principal ; la tour sud-ouest de l'enceinte, dite Tour des Jardins, est amortie par un crénelage.","architecture":"UZAGE le parc du château d'Uzage réunit deux domaines : le fief d'Uzage et le clos du château royal de Bonaventure dont il ne reste que des vestiges. L'aspect paysager de ce parc entièrement clos par un mur résulte d'une longue évolution. Le plan cadastral napoléonien suggère un parc assez régulier marqué par une perspective nord-sud passant dans l'axe du château et allant vers la route de Chinon. Une seconde perspective ouest-est traverse le potager en direction du clos de Bonaventure et un espace très étendu jadis marécageux. Après 1837, le parc est remanié en  paysager. Les deux perspectives sont maintenues avec, cependant, des modifications. Une grande prairie humide remplace le parterre rectangulaire s'étendant vers le sud et deux bras aux rives naturelles alimentent en eau un étang autour d'une île artificielle. Des sentiers traversent la partie boisée située à l'est. Au cours des années 1930, de nouveaux éléments viennent agrémenter l'ensemble tels de petits ponts de bois et de béton, l'aménagement d'un embarcadère devant la pièce d'eau, des plantations de conifères, de buis.  Les paysagistes Louis Decorges et son fils René sont  les auteurs de ces dernières transformations.","habitants":"Le roi Louis XI\r\n        \"","divers":"Château d'Uzage  à Huismes  47° 12' 46\" nord, 0° 15' 20\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Uzage_1.jpg","../../jctruffet.com/image/image_37/37_Uzage_2.jpg"]},"Consult_chateau_formulaire31bc":{"id":"Consult_chateau_formulaire31bc","dept":"37","canton":"Descartes","commune":"Varennes","nom":"Vaennes_37","type":"Gentilhommière","periode":"XV-XVI","histoire":"Trois châteaux dans cet article , Verger, Chaveignes,    Vrillaye et St Senoch.                                                                                               VERGER, la partie la plus ancienne est l'habitation fin XVe début XVIe siècle, formée d'un long corps de logis. Cette partie est prolongée par une chapelle de même époque. La façade sud est demeurée intacte, hormis les fenêtres qui ont été agrandies au XVIIe siècle. La porte d'entrée également du XVIIe siècle, est inspirée de celle de Richelieu. Les communs et la fuye ronde datent du XVIIe siècle, la façade nord, inspirée du style Tudor, construite au milieu du XIXe siècle, a été pratiquement replaqué sur la façade primitive.                                                                  ST-SENOCH, le château a remplacé un édifice primitif. Elevé d'un étage et d'un comble sur rez-de-chaussée, il comprend un pavillon central et deux ailes dont les travées terminales sont, à la façade sud, en saillie sur les deux travées précédentes et surmontées d'un fronton courbe au tympan sculpté. A l'est et à l'ouest, une cour de servitudes est encadrée, de chaque côté, par deux bâtiments de communs aux axes parallèles à ceux du château. A l'intérieur, toutes les pièces sont ornées de boiseries d'époque Louis XVI.                                                                                                                         VRILLAYE, ce Domaine viticole se situe dans la Vallée de la Loire, en Touraine sur l'AOC Chinon et Bourgueil.  Racheté par Michel Constant, en 2000.","architecture":"CHAVEIGNES, au moyen-Age relevait du château de Loudun possession des de Brizay au XIIIe siècle, de Nicolas Ribot en 1434, de Guillaume de Clermin en 1476, et  des de Becdelièvre, il fut ensuite inclus dans le duché de Richelieu en 1631.   Gentilhommière construite au XVIIe siècle entourée de bois et de noiseraies.                                                                                                                   VERGER, gentilhommière fortifiée composée d'un grand corps de logis rectangulaire. Sur la façade nord, côté cour, se trouve en saillie une tour polygonale qui abrite un vaste escalier à vis donnant accès à tous les étages. La porte d'entrée Renaissance est encadrée de pilastres plats et surmontée d'un linteau à double mouluration où se devine 4 médaillons. Une petite tourelle circulaire, placée en échauguette à l'angle rentrant de la tour d'escalier, sert d'escalier vers l'étage supérieur. A l'angle sud-ouest du logis se trouve une tour ronde dont la partie supérieure a été démantelée : elle a été tronquée en diagonale et son chemin de ronde supprimé, tandis que l'encorbellement des mâchicoulis était coupé.                                                                                                                           VRILLAYE, en 2000, il a été remis en état, . Réception et Visite de groupes sur RV (rallye de voitures anciennes, associations) Le château de La Vrillaye, fut remanié en 1840 dans un style Renaissance. Il a gardé son pigeonnier qui date du XVIe siècle.","habitants":"Seigneur locaux\r\n        \"","divers":"Trois châteauxs dans cet aricle , Verger grav-2, Chaveignes grav-1  et St Senoch grav-3. Vrillaye grav-4-5","gps":"","images":["../../jctruffet.com/image/image_37/37_Varennes_37_1.jpg","../../jctruffet.com/image/image_37/37_Varennes_37_2.jpg","../../jctruffet.com/image/image_37/37_Varennes_37_3.jpg","../../jctruffet.com/image/image_37/37_Varennes_37_4.jpg","../../jctruffet.com/image/image_37/37_Varennes_37_5.jpg"]},"Consult_chateau_formulaire5bd2":{"id":"Consult_chateau_formulaire5bd2","dept":"37","canton":"Vouvray","commune":"Reugny","nom":"Vallière_Reugny","type":"Forteresse","periode":"XVI","histoire":"VALLIERE, vers le milieu du XIIIe siècle, la châtellenie du château prend le titre de baronnie. Elle appartient à la famille de Bueil de 1398 à 1542, date à laquelle Louise-Françoise de La Baume Le Blanc, favorite de Louis XIV, devient la propriétaire des terres des châteaux Vaujours, de Saint-Christophe et Marçon. En 1673, la châtellenie de Courcelles est réunie au duché parie. A Louise Françoise de la Vallière succède en 1674 Marie-Anne de Bourbon, Mlle de Blois, sa fille épouse en 1680 Louis Armand de Bourbon, premier duc de La Vallière. Celui-ci meurt en 1685 et sa veuve donne ses terres en 1698 à son neveu, Charles François de La Baume Le Blanc, marquis et duc de La Vallière. Son fils Louis César, lui succède en 1732, son unique héritière, Adrienne Emilie Félicité de la Baume Le Blanc, duchesse de Châtillon, reste dame du duché pairie jusqu'à sa mort en 1812. La terre devient la propriété de sa fille, Amable-Emilie de Châtillon, duchesse d'Uzès, qui vend, en 1815 la terre et la forge à Thomas Stanhope Holland, maître de forge anglais. Il est acquis en 2018 par Mira Grebenstein afin dy créer un boutique-hôtel de luxe dont l'ouverture est prévue en 2021. Le château n'est plus ouvert aux visites en raison des travaux de restauration qui se poursuivront jusqu'en fin 2020.","architecture":"VALLIERE de la forteresse primitive, il ne reste qu'une porte accompagnée d'une poterne, ouverte dans une muraille qui a conservé ses mâchicoulis et qui réunit deux tours cylindriques remaniées, d'inégal diamètre. Dans le parement subsistent les rainures du pont-levis qui franchissait les douves actuellement comblées. Le château fut reconstruit dans la seconde moitié du XVIe siècle,  par Laurent de La Baume Le Blanc. Seul un pavillon rectangulaire en subsiste, accompagné à l'est d'une haute tour carrée contenant une vis de pierre et couronnée d'un dôme. Cette tour ne fait pas saillie sur la façade orientale qu'elle partage en deux petits pavillons secondaires, coiffés chacun d'une toiture particulière à la française, où se remarque, comme au haut de la tour, une lucarne à fronton brisé. À gauche de cette tour, au rez-de-chaussée, un petit portique ménagé dans la façade précède la porte d'accès, autrefois surmontée d'armoiries qui ont été mutilées. La porte fortifiée, les façades et toitures du château, de la tour et de l'ancienne fuye encadrant la porte du bâtiment en équerre par rapport au château, du petit bâtiment parallèle au nord-est et de la grange, ainsi que la partie subsistante du mur d'enceinte à l'est, font lobjet dune inscription au titre des M.H. depuis le 26 mai 1977.","habitants":"A Louise Françoise de la Vallière et  Louis Armand de Bourbon\"","divers":"Reugny                                                           valliere 47° 28' 59? nord, 0° 53' 06? est                  Cote 47° 28' 14\" nord, 0° 52' 46\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Valli%c3%a8re_Reugny_1.jpg","../../jctruffet.com/image/image_37/37_Valli%c3%a8re_Reugny_2.jpg","../../jctruffet.com/image/image_37/37_Valli%c3%a8re_Reugny_3.jpg","../../jctruffet.com/image/image_37/37_Valli%c3%a8re_Reugny_4.jpg"]},"Consult_chateau_formulaire26d8":{"id":"Consult_chateau_formulaire26d8","dept":"37","canton":"Vouvray","commune":"Chançay","nom":"Valmer","type":"Château","periode":"XV","histoire":"VALMER, en 1525, appartient à la puissante famille de Jacques Binet, maître d'hôtel du Roi et de la Reine de Navarre. En 1562 achat de Valmer par Jean Coustely, lorsque Thomas Bonneau, conseiller du Roi Louis XIII, s'y installe en 1640 et bâtit la haute terrasse et  le petit Valmer. En 1691 Valmer est acquis par Etienne Chaufourneau trésorier des gardes suisses du roi. Au XVIIIe siècle au Gatien Pinon de Chancay puis par héritage les familles de Chaban et Chabrely. En 1888 la famille Lefèvre deviennent propriétaires de Valmer et transmettent le domaine à leur fille  comtesse de Saint Venant logeaient dans le château principal lorsqu'il fut détruit par un incendie en 1948. Ils servent aux différentes activités du domaine, propriété de la famille de Saint Venant depuis 1888. Le château est inscrit aux M.H. depuis 1930 et a obtenu la mention de \"Jardin remarquable\". Le propriétaire actuel du château Valmer est Mr Aymard de Saint-Venant.  Leurs descendants y  habitent toujours et se consacrent à la restauration de cet ensemble. Le domaine du château  d'une superficie totale de 60 ha.","architecture":"VALMER, le château historique a été construit en 1525 dans le style Renaissance italienne du XVIe siècle. Le corps du château fut détruit dans un incendie en 1948 et il n'en reste que des traces symbolisées sur une des terrasses par la plantation d'ifs. Les autres bâtiments et dépendances sont eux préservés, comprenant le pavillon Louis XIII et la chapelle troglodytique, creusée dans le rocher au XVIe siècle.  C'est un château de style Renaissance. le château est un corps de logis double de plan massé cantonné de quatre pavillons d'angle. les façades principales percées de larges croisées régulièrement  encadrées de pilastres, son surmontées de grandes lucarnes à tympan ondulés. Les Jardins en terrasses, à l'Italienne, avec deux grands axes structurent un exceptionnel ensemble de terrasses qui épousent la pente du coteau sur huit niveaux et plus de 30 mètres de dénivelé. Balustrades, statues, escaliers et jets d'eau ponctuent ces jardins aux ambiances variées. Le parc a conservé intacte la belle structure du XVIIe siècle, avec des colonnes et le pavillon du Vide-Bouteille. Dans le parc se trouvent quatre colonnes en pierre surmontées d'un tailloir et couronnées de vases côtelés. A l'entrée se trouvent deux lions en terre cuite, des vases et une statue en pierre représentant saint Hubert placée au sommet d'une colonnette.","habitants":"Famille de Jacques Binet\r\n        \r\n        \r\n        \"","divers":"Valmer à Chancay 47° 27' 32\" nord, 0° 53' 14\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Valmer_1.jpg","../../jctruffet.com/image/image_37/37_Valmer_2.jpg","../../jctruffet.com/image/image_37/37_Valmer_3.jpg"]},"Consult_chateau_formulairec542":{"id":"Consult_chateau_formulairec542","dept":"37","canton":"Monts","commune":"Esvres sur Indre","nom":"Vaugrignon","type":"Château","periode":"XV-XVII","histoire":"VAUGRIGNON, relevait de la châtellenie de Montbazon, au XVIIe siècle possession des Tournier, Pierre Tournier trésorier de France à Tours   au XVIIIe siècle les Javerlhac sont les derniers seigneurs les deux fils du comte émigre lors de la Révolution, Louise-Victorine et Eugénie de Javerlhac parviennet à racheter la demeure familiale. En 1802 Louis victorine seule propriétaire, cède le domaine à François Bullot, suite à des mauvaises affaires ses biens sont saisis et vendus en 1812 acquis par les époux Lestage qui sans séparent en 1814 au profit de Claude Dubois de Villiers, magistrat à Paris. En 1831 cède Vaugrignon à Antoine baron de Revel amiral maréchal de camp. La contesse de Ganteaume veuve de l'amiral s'éteint à son tour en 1870 laissant le domaine à des neveux qui; le vendent en août 1871 à la famille Plailly. En 1884 Georges Emile Chambert officier et son épouse Marie-Louise Thiou deviennent propriétaires, le domaine passe par héritage à une arrière-petite-fille des Chambert, madame Barthélemy.","architecture":"VAUGRIGNON , est construit au XVe siècle. Dans le dernier quart du XIXe siècle, ses propriétaires le restaurent, notamment en plaquant sur l'ancienne une nouvelle façade néo-gothique. Deux tourelles prenaient place aux extrémités du corps de logis principal. L'une est arasée au niveau du sol, l'autre, couverte d'une toiture conique, est aménagée en oratoire. Côté est, une aile en retour est couverte en terrasse, manoir couvert d'un comble pentu s'appuyant sur deux pignons, s'élève au fond d'une cour, bordée au nord-est par des communs  cantonnés d'une ancienne tour de défense. La construction du XVe siècle est flanquée d'une tour d'escalier, et prolongée par deux ailes en équerre. Sa façade sud donne sur une vaste esplanade, limitée par une balustrade de pierre, et aux deux extrémités de laquelle subsiste une tour. Celle du Sud-Est coiffée en poivrière abrite un oratoire, cette façade, plaquée au XIXe siècle sur des murs comptant près d'un mètre d'épaisseur est de style gothique, comporte deux niveaux d'ouvertures à meneau et traverse dont les linteaux s'ornent d'une moulure retombant sur des culots, cinq lucarnes sommées de galbes terminés par des fleurons chevauchent le toit.","habitants":"Famille de Javerlhac\r\n        \"","divers":"Esvres sur Indre  Vaugrignon","gps":"","images":["../../jctruffet.com/image/image_37/37_Vaugrignon_1.jpg","../../jctruffet.com/image/image_37/37_Vaugrignon_2.jpg","../../jctruffet.com/image/image_37/37_Vaugrignon_3.jpg"]},"Consult_chateau_formulaire72b5":{"id":"Consult_chateau_formulaire72b5","dept":"37","canton":"Langeais","commune":"Château la Vallière","nom":"Vaujours","type":"Vestiges","periode":"XIII","histoire":"A   cinq kilomètres au nord  à Villiers au Bouin  le château  de la Perrée , d'Aubenière  dont je n'ai pas d'article historique. VAUJOURS, ancien château des barons, dont le plus ancien connu fut Hugues Ier d'Alluye, vivant en 978. La construction de Vaujours peut être attribuée à Hugues VI d'Alluye ou à Rotron de Montfort vers 1250. Inoccupé au XVIIIe siècle, il fut abandonné durant la Révolution. En 1815, il fut vendu à Thomas Stanhope-Holland qui l'utilisa comme carrière de pierre.","architecture":"VAUJOURS, bâti au milieu d'un étang dont l'eau alimentait les douves, le domaine comprend deux forteresses: une baille à l'ouest et le château à l'est. L'entrée de cette double enceinte se trouve à l'ouest, défendue par deux tours circulaires et un pont volant, flanquée par un bastion. A l'angle sud-ouest de la baille, un casernement communique avec une tour cylindrique défendant l'angle. L'accès à la cour d'honneur se faisait par un pont-levis et une poterne flanquée d'une tour ronde. Le donjon, grosse tour ronde, occupe l'angle nord-ouest de cette deuxième forteresse. La cour est limitée au nord par les ruines de la chapelle, rebâtie au XVe siècle. L'accès Est de la cour se faisait par une porte défendue par deux tours et reliant cette cour à un chemin de ronde. Un bastion communiquait avec la forteresse et un ouvrage avancé. Au nord-est un bastion saillant dans la douve communiquait avec un autre ouvrage avancé.","habitants":"Thomas Stanhope-Holland \r\n        \"","divers":"à Villiers au Bouin  le châteaux  de la Perrée grav-3-4 , d'Aubenière grav-5                                                                           Vaujours 47° 31' 40? nord, 0° 20' 50? est","gps":"","images":["../../jctruffet.com/image/image_37/37_Vaujours_1.jpg","../../jctruffet.com/image/image_37/37_Vaujours_2.jpg","../../jctruffet.com/image/image_37/37_Vaujours_3.jpg","../../jctruffet.com/image/image_37/37_Vaujours_4.jpg","../../jctruffet.com/image/image_37/37_Vaujours_5.jpg"]},"Consult_chateau_formulaired3d6":{"id":"Consult_chateau_formulaired3d6","dept":"37","canton":"Monts","commune":"Veigné","nom":"Veigné","type":"Château","periode":"XVI-XVII","histoire":"Trois châteaux à Veigné celui de la Belle-Jonchères, de Couzières,  de Taffonneau.                                                                                               BELLE-JONCHERE était un fief relevant du château d'Esvres. Il appartenait en 1448 à Guillaume de Maillé, en 1668 à Nicolas Lefebvre, maire de Tours, et à la fin du XVIIIe siècle à la famille de la Barre. Emmanuel Drake del Castillo   homme politique, sont propriétaires du manoir de la Belle Jonchère de 1875 à leur mort. C'est un manoir du XVIe siècle, remanié en partie, composé de deux corps de logis perpendiculaires et dont la façade principale est flanquée de tours circulaires et couronnée de belles lucarnes à croisée de pierre et à gâble sculpté. Les façades de la cour ont été remaniées au XVIIe siècle. Deux petits pavillons rectangulaires sont construits à l'entrée de la cour.                                                                          CHAMPONNIERE, cité en 1440, excepté peut-être une tour tronquée qui supporte un château d'eau. Il est entièrement reconstruit vers 1695 ; l'aile sud a été incluse dans une nouvelle reconstruction effectuée en 1833-1834 , édifice cubique et toiture à quatre pans. Un pigeonnier circulaire date aussi de la fin du XVIIe siècle. Le domaine  est acheté par la commune en 2003                                                                                                              TAFFONNEAU,  gentilhommière du XVe siècle, bien restaurée de nos jours. Ce domaine formait un fief, relevant du château de Montbazon, et qui appartenait en 1410 à Jean Berruyer. En 1604, Suzanne Berruyer porta la terre de Taffonneau en dot à Jacques Frézeau. Le château de Taffonneau passa ensuite par mariage aux de Rouxelley. Vers 1735, la propriété fut acquise par la famille Dangé d'Orsay qui le possédaient encore en 1789.","architecture":"COUZIERES, début du XVIIe siècle  à Louis de Rohan prince de Guéménée qui sera cédé en 1781  Hercule de Mériadec  de Rohan , lieutenant général des armées du roi, son fils Henri-Louis-Marie vend  à Nicolas-Bunault de Rigny  officier mousquetaire du roi. Vendu comme bien d'émigré  à divers propriétaire et aux Villestreux, puis aux Vergé avant d'être acquis par M. Bernard  Missenard.   A la place d'une construction plus ancienne dont subsistent deux tours pouvant dater du XVIe siècle. L'édifice fut restauré au cours du XIXe siècle. Le château comprend au sud un pavillon dont le grand axe n'est pas perpendiculaire à celui du bâtiment principal. La façade de ce pavillon, sur la cour, a conservé son architecture et sa décoration primitive. La façade donnant sur la vallée se développe entre les deux tours et a été refaite au XIXe siècle. La cour est limitée à l'ouest par les communs, au sud par une partie conservée des douves que franchit un pont dormant. Dans cette cour, un bassin est timbré aux armes de François Ier, Claude de France et Louise de Savoie. A l'est de ce jardin, une grotte fontaine, ouverte dans une architecture ornée de pilastres ioniques et couronnée d'une balustrade, date de la fin du XVIIe siècle. Dans ce château eut lieu, le 5 septembre 1619, l'entrevue de réconciliation entre Marie de Médicis et Louis XIII.","habitants":"Belle-Jonchère; famille de la Barre.                                        Taffonneau; Jean Berruyer                                                     Couzières;  M. Bernard  Missenard\r\n        \r\n        \"","divers":"Manoir de la Belle Jonchère grav-1-6-7,  de Couzières grav-3-4-5, Champonnière grav-2,                                       Taffonneau grav-8, de 47° 17' 18\" Nord et 0° 44' 18\" Est           Veigné 47° 17' 18\" nord, 0° 44' 18\" Est                                Couzières 47° 17' 18\" Nord, 0° 44' 18\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Veign%c3%a9_1.jpg","../../jctruffet.com/image/image_37/37_Veign%c3%a9_2.jpg","../../jctruffet.com/image/image_37/37_Veign%c3%a9_3.jpg","../../jctruffet.com/image/image_37/37_Veign%c3%a9_4.jpg","../../jctruffet.com/image/image_37/37_Veign%c3%a9_5.jpg","../../jctruffet.com/image/image_37/37_Veign%c3%a9_6.jpg","../../jctruffet.com/image/image_37/37_Veign%c3%a9_7.jpg","../../jctruffet.com/image/image_37/37_Veign%c3%a9_8.jpg"]},"Consult_chateau_formulairecf31":{"id":"Consult_chateau_formulairecf31","dept":"37","canton":"Monts","commune":"Veigné","nom":"Veigné_II","type":"Château","periode":"XIX","histoire":"Dans cet article trois châteaux; Fontiville, la Guéritaulde et la Tortinière                                                                                                                    La GUERITAULDE Au sud de Veigné, au milieu d'un parc boisé, est le château de la Guéritaulde, construit dans le style du premier Empire. Le domaine formait un fief relevant de Montbazon, et dont Guy de Maillé, qui vivait en 1353, fut le premier seigneur connu. Construit de 1824 à 1830 dans un style italien, demeura dans la famille de Maillé jusqu'à la mort d'Hercule de Maillé qui eut pour successeur son beau fils François de la Barre, maire de Tours. Le jardin inscrit au pré-inventaire des jardins remarquables. Le rebord de la terrasse est rythmé par quatre vasques et deux urnes en pierre. Le jardin est composé d'un massif d'arbres. Propriétaire actuel M.Emmanuel Vergé                                                                                        FONTIVILLE, plusieurs châteaux et manoirs de Veigné (la Championnière, Fontiville...) sont déclarés biens nationaux en 1792 comme appartenant à des émigrés. Celui de Couzières, abandonné depuis 1782, est alors réservé pour loger des invalides ; la décision tarde et les habitants viennent récupérer les  pièces de charpente, d'huisseries, de toiture ; le château est finalement vendu pour un prix dérisoire  l'hiver 1804.","architecture":"TORTINIERE, c'est sans aucun doute au XVIe siècle que l'on construisit la première Tortinière rustique et massive flanquée de deux tourelles. C'est en 1866 que fut bâti l'actuel château de la Tortinière pour Pauline Dalloz, veuve du consul Armand Dalloz, auteur du précis du code civil dont se servent encore tous les juristes français. Ce bâtiment, de style Renaissance, a su s'inspirer de chefs-d'uvre de l'époque (Azay le Rideau par exemple) et des solides principes de construction du XIXe siècle. Le fait historique le plus marquant concernant la Tortinière est la reddition de la ville de Tours aux allemands en 1870, signée dans le salon aux meubles de citronnier. Durant cette même guerre, passèrent par la Tortinière en  1871, le neveu de Guillaume 1er, Frédéric Charles, et Frédéric III, Roi de Prusse et futur Empereur d'Allemagne.","habitants":"famille de Maillé\r\n        \r\n        \"","divers":"châteaux    de  Fontiville  grav-1,                                            la Guéritaulde grav-2                                                                         la Tortiniere  grav -3-4-5","gps":"","images":["../../jctruffet.com/image/image_37/37_Veign%c3%a9_II_1.jpg","../../jctruffet.com/image/image_37/37_Veign%c3%a9_II_2.jpg","../../jctruffet.com/image/image_37/37_Veign%c3%a9_II_3.jpg","../../jctruffet.com/image/image_37/37_Veign%c3%a9_II_4.jpg","../../jctruffet.com/image/image_37/37_Veign%c3%a9_II_5.jpg"]},"Consult_chateau_formulairece36":{"id":"Consult_chateau_formulairece36","dept":"37","canton":"Montlouis-sur-Loire","commune":"Veretz","nom":"Veretz","type":"Château","periode":"XV-XVI","histoire":"VERETZ, la propriété passe à la famille Coron au XIIIe siècle, puis en 1320 à Guillaume Trousseau. La position du château de Véretz était excellente et tenta les Anglais envahisseurs, qui sen emparèrent, mais l'occupation prit fin au traité de Brétigny en 1360. En 1361, le château est démantelé. Au plus fort de la guerre de Cent Ans, le seigneur de Véretz, est un puissant personnage dont le nom se trouve associé à celui de Du Guesclin. En 1407, le château appartient à Jean de LIsle qui trouvera la mort à Azincourt en 1415. La Touraine est à nouveau occupée en 1424 et le nouveau seigneur de Véretz, Hugues de Châlons, Comte de Tonnerre, meurt aussi au combat. Sa veuve épouse Georges de la Trémoille, lieutenant général des Armées. A cette époque \"lhostel noble de Véretz\" présente laspect dune maison un peu ruinée.Les Trémoille n'habitent pas à Véretz, lui préférant le château de Thouars. Jean de la Barre en hérite vers 1500, il sert les rois Louis XI et Charles VIII. Il fait construire à Véretz une demeure digne de sa haute situation. Jean de la Barre suit François Ier dans sa captivité à Madrid. Il meurt à Paris en 1534. Véretz reste à ses descendants jusquen 1595, date à laquelle le domaine est acquis par une vieille famille de Touraine, les Forget.","architecture":"VERETZ, Pierre Forget continua les constructions et acheta un grand nombre de terres nouvelles. A sa mort, Véretz passe dans lindivision puis entre dans le patrimoine des Bouthillier de Rancé en 1637, famille proche du Cardinal de Richelieu. LAbbé de Rancé en hérite avec son frère à la mort de monsieur de Rancé en 1653. En 1661, la propriété est vendue à lAbbé dEffiat et au duc de Mazarin. Par mariages successifs, la terre de Véretz échoit au marquis Armand Louis de Richelieu, qui, après son éclatant mariage avec Anne de Crussol en 1718, obtient du Roi le titre de duc dAiguillon. Durant la Révolution, le duc émigre. Sous la Convention, les communs servent dabord de casernement à la troupe, ensuite il est procédé à laliénation pure et simple du domaine. Acquis pour presque rien par quelques citoyens de Tours, le château de Véretz est détruit et dépecé malgré les protestations dun certain Huet de Tours. En 1836, le comte de Richemont rachète une grande partie de la propriété et fait reconstruire un château sur lemplacement de lancienne demeure. En 1878, madame Drake del Castillo rachète Véretz au comte de Richemont, puis par héritage, le château  passe aux familles Lenglart et de Maintenant.","habitants":"Jean de la Barre        famille Coron \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_37/37_Veretz_1.jpg","../../jctruffet.com/image/image_37/37_Veretz_2.jpg","../../jctruffet.com/image/image_37/37_Veretz_3.jpg"]},"Consult_chateau_formulaire7804":{"id":"Consult_chateau_formulaire7804","dept":"37","canton":"Ste-Maure de Touraine","commune":"Verneuil le château","nom":"Verneuil_Indre","type":"Château","periode":"XVIII","histoire":"TOUR-RAYNIER Le donjon de la Tour-du-Raynier est une importante construction polygonale arrondie au nord et carrée au sud, dont le couronnement en crénelage a été remplacé par une toiture de tuiles canals sans supprimer les mâchicoulis. Il se compose de trois pièces superposées, toutes trois avec cheminées à hotte et un voûtement différent. Des ouvertures à meneaux éclairent les deux pièces supérieures. Un escalier à vis est incorporé à l'ouest du donjon. Le corps de logis contigu date de la fin du XVe siècle. Les fenêtres à meneaux sont encore encadrées par leurs volets d'époque avec panneaux à serviettes.                                                                                le FRANC PALAIS; a côté du vieux logis du XVe siècle devenu ferme les seigneurs du lieu ont rebâti  au XVIIIe siècle un château. François-Marie Hameau, écuyer, seigneur de Franc-Palais, eut une fille, nommée Marie-Perrine, comme sa mère, et qui fut mariée à Charles-Auguste de Ravenel, chevalier. Le 8 novembre 1737, il rendit hommage à Marc-Pierre de Voyer de Paulmy, baron de Marmande. Charles-Auguste de Ravenel, seigneur de Franc-Palais. Il mourut sans laisser d'enfants. Franc-Palais échut alors par héritage à Louise-Prudence Hameau, femme de Pierre-André-Claude-Scévole Pocquet de Livonnière. Celui-ci eut un fils, Jean-Claude-Marie-Scévole, écuyer, seigneur de Franc-Palais, de Luzé et de la Boissière, qui rendit hommage le 2 août 1780 et qui comparut, par fondé de pouvoir, à l'assemblée électorale de la noblesse de Touraine en 1789, que leur descendants possèdent toujours  à madame de Henri de Vallois.","architecture":"VERNEUIL, châtellenie relevant du château de Loches. Le château de Verneuil se compose d'une partie du XVe siècle présentant deux ailes perpendiculaires et une tour circulaire. Dans l'angle, une tour polygonale contient une vis de pierre. Les façades sont couronnées de mâchicoulis et de crénelages. La partie du XVIIIe siècle présente les trois travées centrales de ses deux façades dominées par un dôme à quatre versants amorti par un lanternon. A l'intérieur, certaines pièces ont conservé leur décor de boiseries.Éléments protégés MH : les façades et les toitures, le vestibule d'entrée, le grand escalier et l'allée d'accès : inscription par arrêté du 25 avril 1975.                                    VERNEUIL, le château neuf de Verneuil-sur-Indre a été construit, pour Eusèbe Félix Chaspoux, second Marquis de Verneuil, introducteur des ambassadeurs et des princes étrangers à la cour de Louis XV. Il est attribué à l'architecte Jean Baptiste Mansart de Jouy. Construit de 1743 à 1756, les travaux ont englobé la grosse tour et une partie du logis achevé, en 1508, situé à l'angle sud-ouest, et le château vieux, relié par un corridor, a été unifié stylistiquement avec le château neuf. Son propriétaire actuel est l'association les Apprentis d'Auteuil. Le château de Verneuil-sur-Indre est devenu un Lycée Horticole et Paysager en internat.","habitants":"François-Marie Hameau\r\n        \"","divers":"Franc-palais grav-1-2-3   verneuil 47° 03' 19,16\" Nord et 1° 02' 23,13\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_verneuil_Indre_1.jpg","../../jctruffet.com/image/image_37/37_verneuil_Indre_2.jpg","../../jctruffet.com/image/image_37/37_verneuil_Indre_3.jpg","../../jctruffet.com/image/image_37/37_verneuil_Indre_4.jpg","../../jctruffet.com/image/image_37/37_verneuil_Indre_5.jpg","../../jctruffet.com/image/image_37/37_verneuil_Indre_6.jpg"]},"Consult_chateau_formulairee999":{"id":"Consult_chateau_formulairee999","dept":"37","canton":"Ballan-Miré","commune":"Villandry","nom":"Villandry","type":"Forteresse","periode":"XVII","histoire":"VILLANDRY, achevé vers 1536, est le dernier des grands châteaux de la Loire qui furent construits à lépoque de la Renaissance dans le val de Loire. Villandry fut construit par un ministre des finances de François 1er, Jean le Breton, dont les armoiries figurent sur lune des lucarnes de la cour dhonneur. Pour le compte de la Couronne, il avait surveillé et dirigé pendant de longues années la construction de Chambord auprès duquel il fit bâtir une réplique en miniature de Villandry: le château de Villesavin. Auparavant, il avait été ambassadeur à Rome, où il avait pu à loisir étudier lart des jardins. Pour édifier lactuel château, Jean le Breton avait fait raser la vieille forteresse du XIIe siècle dont il ne reste que les fondations et le donjon à langle sud-ouest. Ses descendants conservèrent Villandry jusquen 1754. A cette date, il devint propriété du marquis de Castellane, ambassadeur de Louis XV et issu dune illustre famille de la noblesse provençale, ce dernier fit construire les dépendances dans un très pur style Louis XV, aménagea lintérieur du château en ladaptant aux normes de confort du XVIIIe siècle, qui sont plus proches des nôtres que celles de la Renaissance.","architecture":"VILLANDRY, au XIXe siècle, on détruisit le jardin pour créer un parc à langlaise tout autour du ch
