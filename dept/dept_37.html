nom":"Grillière_37","type":"Château","periode":"XVI","histoire":"La GRILLIERE , Ancien fief relevant de Faye-la-Vineuse.  lancien château du XVe siècle, appartenant à Jean Lhuillier. Le fief appartint ensuite à Pierre de Rémefort (cité en 1486) puis à son fils Nicolas. Un de ses descendants : Jean de Rémefort (mort en 1622) est enterré dans le château. Au XXe siècle, le château appartint un temps au chirurgien hollandais Johannes Frédéricus Samuel Esser. Le 21 décembre 1959, le château de la Grillère échut à Martinus-Hendricus-Marc Esser, docteur en mathématiques, demeurant à Dayton (État de l'Ohio, États-Unis). Il est bien probable que l'abandon presque total où fut laissée la Grillère date de cette époque, car monsieur Esser n'y fit pendant une quinzaine d'années que de courts séjours d'un mois ou deux. Les terres étaient louées à des fermiers, mais le château ne servit plus néanmoins à abriter les récoltes, le mal était fait. Ce long sommeil conduisant à une ruine irrémédiable a pris fin le 14 octobre 1985 lorsque monsieur et madame Esser vendirent l'édifice avec son parc à la « société civile immobilière Saint-Mamet » Depuis, de longs et courageux efforts ont redonné extérieurement un aspect décent à cet édifice inscrit à l'Inventaire Supplémentaire des M.H.par arrêté du 16 septembre 1953. Une société intitulée les Amis de la Grillère s'est constituée pour uvrer à la sauvegarde et à la rénovation du château, en vue de son ouverture au public.","architecture":"La GRILLIERE, entouré autrefois d'une vaste enceinte de murs dont une grande partie subsiste au nord ouest et au sud-ouest, avec une tour d'angle ouest. Le château, de la fin du XVIe siècle, se développe entre deux pavillons rectangulaires, à chacun desquels il est réuni par une tour polygonale d'escalier. Au XVIIIe siècle, la travée centrale de la façade nord-est sur la cour, fut modifiée par la construction d'un avant-corps. Deux ailes en retour sont bâties perpendiculairement à cette façade nord-est. L'aile, qui limite la cour au nord, est plus ancienne que le château, et date du XVIe siècle. Les pilastres Renaissance d'une porte et une tour ronde voisine en sont contemporains. Du côté opposé, la cour est limitée par une aile symétrique, à usage de servitude, prolongée par des bâtiments à même usage la reliant au colombier du début du XVIe siècle, en ruine.","habitants":"Famille Esser\r\n        \"","divers":"A Faye la Vineuse le château de la Grillière  46° 56' 44\" nord, 0° 21' 04\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Grilli%c3%a8re_37_1.jpg","../../jctruffet.com/image/image_37/37_Grilli%c3%a8re_37_2.jpg","../../jctruffet.com/image/image_37/37_Grilli%c3%a8re_37_3.jpg"]},"Consult_chateau_formulaireabcd":{"id":"Consult_chateau_formulaireabcd","dept":"37","canton":"Descartes","commune":"Guerche","nom":"Guerche_37","type":"Forteresse","periode":"XV","histoire":"GUERCHE,  Au XIIe siècle le fief de la Guerce relevait de la seigneurie de preuilly en 1202, Robert d'Alençon épousa Jeanne de la Guerche  et fit entrer  le château dans le domaine capétien. Jean sans Terre  décida d'occuper le site en janvier 1203. Puis Louis VIII reprit le château en 1223 dont Pierre Frottier, seigneur de Preuilly. Au XIVe siècle le domaine est la propriété de Jean de l'Isle-Ogier qui mourut en 1356 à la bataille de Poitiers. La Guerche est une vicomté des 1336 ; elle relève des archevêques de Tours, puis des Barons de Preuilly, et enfin du roi à partir de 1452 ; Louis XI séjourne à La Guerche en 1472. le château actuel est très  édifié à l'extrême fin du XVe siècle par Artus de Villequier et Antoinette de Maignelais. Au XVIIe siècle la famille d'Aumont par alliance de Charlotte de Villequier  et Jacques d'Aumont.  leur fils César d'Aumont gouverneur de Touraine remanient les façades des corps de Logis.  En 1709 il délaisse le domaine aprés plusieurs ventes et  aux enchères en 1735 à Marc-Pierre de Voyer de Paulmy, comte d'Argenson qui deviendra ministre de la guerre en 1742. Les d'Argenson. en 1825 Victorine d'Argenson héritière de la Guerche épouse le comte de Crouy-Chanel.","architecture":"GUERCHE, de plan carré régulier ; il reste l'aile Sud-Est avec l'ouvrage d'entrée et l'aile Sud-Ouest occupée par le logis seigneurial avec la chapelle et l'escalier,  la partie orientale de l'aile Sud-Est est refaite au XVIIe siècle par les d'Aumont, l'aile Nord-Ouest devait se composer d'une galerie sur arcades avec un accès au jardin,  le salpêtrage entraîne la ruine puis, au début du XIXe siècle, le dérasement de l'étage en surcroît,  alors disparaissent les lucarnes et le chemin de ronde extérieur, et les coursières donnant sur la cour, les portes d'accès des coursières à la tour d'escalier Sud subsistent,  la coursière de l'aile Sud-Ouest a laissé une colonne de l'arcature qui l'ornait,  la tour orientale ruinée est relevée vers 1840,  les douves alimentées par la Creuse sont comblées au XIXe siècle et rajout d'un portail  sur la place de la mairie, le niveau de la cour est abaissé d'environ un mètre au XXe siècle, les communs portent la date de 1836.  Le premier étage de soubassement est occupé par des greniers et le second par des casemates percées d'archères canonnières, le premier étage de soubassement, la chapelle, la tour d'escalier d'honneur sont voûtes d'ogive, le deuxième étage de soubassement est voûte d'arête, l'ouvrage d'entrée est voûte en berceau,  l'escalier d'honneur en demi hors-oeuvre est conservé dans les deux étages de soubassement, en vis sans jour et en maçonnerie,  il aurait été, selon Albbrecht et Guillaume, à mur noyau rectangulaire dans les étages supérieurs,  monogramme d'origine AA (Artus et Antoinette) à l'aile Sud-Ouest,  des monogrammes semblables sont ajoutés au XIXe siècle.","habitants":"Famille d'Aumont et Marc-Pierre de Voyer de Paulmy \r\n        \r\n        \"","divers":"Château de la Guerche: 46° 53' 02\" Nord et 0° 43' 48\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Guerche_37_1.jpg","../../jctruffet.com/image/image_37/37_Guerche_37_2.jpg","../../jctruffet.com/image/image_37/37_Guerche_37_3.jpg"]},"Consult_chateau_formulaire6f16":{"id":"Consult_chateau_formulaire6f16","dept":"37","canton":"Loches","commune":"Génillé","nom":"Génillé","type":"Château","periode":"XV-XVII","histoire":"Deux châteaux à Genillé celui de Genillé et de Marolles. GENILLE, le château de Adam-Genillé fut bâti, au XVe siècle, par la famille Adam Fumée garde des sceaux de Charles VIII qui décédera en 1494 à Lyon, la terre de Génillé en 1515 sera érigée en châtellenie. Au début du XVIIe siècle, Martin Fumée rend hommage  pour Genille  le 30 mai  1573 laisse trois filles lors de son mariage avec Marie Louet laquelle veuve depuis 1602 épouse en seconde noces Jean de Rosard, petit neveu du poète , c'est la troisième fille de Martin  Madeleine qui apporte en dot à son époux Jean de Menou restera dans cette famille jusqu'en 1840, date de la vente du domaine à Alphonse Bodin, officier de santé à Genillé. En 1901 le château est acquis par M. Anthyme Vénier puis passa à Pierre Chaumier.","architecture":"GENILLE, le château comprend un grand corps de bâtiment accompagné, à ses angles nord-ouest et sud-ouest, de deux tours cylindriques.  Les quatre côtés du corps du château principal sont encadrés de deux tours, de forme cylindrique et de deux échauguettes, posées sur des culs-de-lampe. Les angles nord-est et sud-est portent des échauguettes sur des culs-de-lampe. Sur la façade orientale fait saillie une tour octogonale logeant une vis. Une aile fut appuyée en retour d'équerre à la façade orientale, entre la tour d'escalier et le mur pignon nord. Cette aile date du XVIIe siècle et fut prolongée postérieurement. Au sud de la cour, une aile en retour vers l'est a disparu. Les douves ont été presque complètement comblées.                                                               MAROLLES, le château de Marolles s'élève sur un ancien fief, connu depuis 1130. Il a été réaménagé au XVIIe siècle et fut très largement remanié au XIXe siècle. À cette époque, il est représenté sous la forme de deux corps de bâtiments à angle droit mais séparés et flanqués, chacun d'une tour cylindrique. Un des corps de bâtiments possède une petite chapelle. Une cours couverte est crée, en 1873, sur des plans de Gustave Eiffel, qui règla ainsi une dette de jeu, au propriétaire,  Il sera beaucoup plus remanié au XIXe siècle.","habitants":"Genille, famille de Jean de Menou                                           Marolles\r\n        \"","divers":"à Genillé celui de Genillé  grav 1 à 4 et de Marolles grav 5-6                                Genillé   47° 11' 04\" Nord et 1° 05' 44\" Est                    Marolles : 47° 11' 04\" Nord, 1° 05' 44\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Genill%c3%a9_1.jpg","../../jctruffet.com/image/image_37/37_Genill%c3%a9_2.jpg","../../jctruffet.com/image/image_37/37_Genill%c3%a9_3.jpg","../../jctruffet.com/image/image_37/37_Genill%c3%a9_4.jpg","../../jctruffet.com/image/image_37/37_Genill%c3%a9_5.jpg","../../jctruffet.com/image/image_37/37_Genill%c3%a9_6.jpg"]},"Consult_chateau_formulaire3ad2":{"id":"Consult_chateau_formulaire3ad2","dept":"37","canton":"Langeais","commune":"Hommes","nom":"Hommes","type":"Vestiges","periode":"XIII-XVI","histoire":"HOMMES château construit au XIIIe siècle, vers 1520 Mathurin d'Hommes donna son nom au domaine fait aménager la galerie et remanie le corps de logis, par alliance la châtellenie d'Hommes échoit aux Maillé, Charles de Maillé gentilhomme de la chambre du roi épousa Anne d'Hommes, leur descendante en 1677  Marie-Anne de Maillé apporte  en partage la terre d'Hommes et les autres possessions angevines de sa famille à son époux Charles Tiercelin d'Appelvoisoin marquis de la Roche du Maine et à la mort  de Marie-Anne de Maillé en 1737 la terre change de mains et appartient à Jeanne de la Noue de Tourouvre veuve de Charles du Bosc, puis passa à celles des Cartes et du Puy à René Grandhomme seigneur de Gizeux. En 1786 sa petite-fille la marquis de Brancas fait don du domaine à Gaspard de Contades, vendu comme bien nationale  est acquis en 1794 par l'ancien fermier de la seigneurie Pierre Tulasne. C'est le fils de ce dernier Hercule qui le cède en 1780 sous réserve d'usufruit jusqu'à sa mort à Jean-François Cail, grand industriel qui décède en 1872 la veuve de Jean-François fit démonter les toitures et les charpentes condamner le château à sa ruines et en 1977  acquis par les propriétaires actuels qui entreprennent le sauvetage.","architecture":"HOMMES, il date du XVIe siècle. L'état actuel du château est dû à sa démolition partielle en 1890, la propriétaire ayant alors autorisé la démolition des toitures pour utiliser les charpentes à la réparation d'autres bâtiments. Le domaine comprend à l'Ouest, le château et, à l'Est, les communs. Le château d'Hommes est divisé en 2 parties défendues par des douves. Une baille sur plan trapézoïdal était sans doute entourée de courtines flanquées de tours. De ces tours, 2 subsistent. Le logis seigneurial comprend un corps de bâtiment, développé entre deux tours cylindriques et, deux ailes en retour vers le Nord. L'étage inférieur est occupé par une galerie voûtée, avec des meurtrières. L'étage supérieur servait d'habitation. Des fenêtres sont accostées de pilastres décorés de médaillons ou de personnages debout superposés. Une tour cylindrique avec sa cheminée au Nord-Ouest et rectangulaire au Nord-Est devaient renforcer les angles de la courtine. Les communs comprennent une grange, des écuries, des étables, un bâtiment de remises. Le vieux château d'Hommes est inscrit aux M.H. depuis le 8.02.1962","habitants":"Famille de Maillé\r\n        \"","divers":"Château d'Hommes à Hommes 47° 25' 38\" nord, 0° 17' 03\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Hommes_1.jpg","../../jctruffet.com/image/image_37/37_Hommes_2.jpg","../../jctruffet.com/image/image_37/37_Hommes_3.jpg","../../jctruffet.com/image/image_37/37_Hommes_4.jpg","../../jctruffet.com/image/image_37/37_Hommes_5.jpg"]},"Consult_chateau_formulairee09d":{"id":"Consult_chateau_formulairee09d","dept":"37","canton":"Chinon","commune":"Huismes","nom":"Huismes","type":"Château","periode":"XIV-XV","histoire":"VILLAUMAIRE, fondée sur des bases gallo-romaines l'on sait peu de chose de la Villaumaire avant le XIIIe siècle. Tout au plus, croit-on quelle aurait été, entre le Ve et le VIe siècle, la demeure des gouverneurs du district du Véron pour le compte des Rois Mérovingiens. Au Xe siècle, le Roi Charles le Simple donnera au chapitre de l'église de Tours, un vaste domaine incluant la Villaumaire. Le château, tel qu'on le connaît aujourd'hui, sera construit avant 1448 par Martin Péquineau, Maître de l'Artillerie Royale de Charles VII dont la cour est basée à Chinon. Il demeurera dans sa famille jusqu'en 1648 et à cette date il revient à Maurice dAubéri, fils dun ministre dHenri IV et de Louis XIII et restera dans sa famille jusquen 1811. Il passera ensuite aux familles Gault de la Galmandière en 1811, Levesque des Varannes en 1821 qui le rénovera, Bois de Mouzilly en 1881, Liébault en1903, puis est acquis par la princesse de la Trémoille, veuve du vicomte de la Rochefoucauld. A sa mort, en 1944, l'édifice passe à ses héritiers, le prince de Tonnay-Charente, duc de Mortemart, la duchesse de Vivonne et ses enfants. Le château de la Villaumaire a été acheté, fin 1996, par le comte Vitali, prince de Sant-Eusebio.","architecture":"MOUCHAUT, est une ancienne maison noble, la construction du manoir de Mouchaut date du 4ème quart du XVe siècle. C'était l'ancien fief de la seigneurie d'Huismes. Il a appartenu à la famille de Rancher du XVIe siècle au XVIIIe siècle, et rendait la moyenne et basse justice. En 1801, le manoir de Mouchaut fut vendu à François Lemesle. En 1831, Mouchaut appartient à Marthe et Louis Boucher puis en 1873, le manoir Mouchaut est à Albertine et Louis Bonté, qui le revendront à Eugène Faucillon médecin, qui le revendit en 1920 à Madeleine Turbe qui se marie avec Henri Girard. Le manoir de Mouchaut est privé.","habitants":"Villaumaire; famille  Gault de la Galmandière              Mouchaut ; famille de Rancher\r\n        \r\n        \"","divers":"deux châteaux dans cet article; Mouchaut grav 1-2 GPS : 47° 14' 22\" Nord, 0° 15' 13\" Est                                          Villaumaire:  grav 3-4-5. 47° 13' 40,44\" Nord, 0° 15' 45,76\" Est","gps":"47° 14' 22\" Nord, 0° 15' 13\" Est","images":["../../jctruffet.com/image/image_37/37_Huismes_1.jpg","../../jctruffet.com/image/image_37/37_Huismes_2.jpg","../../jctruffet.com/image/image_37/37_Huismes_3.jpg","../../jctruffet.com/image/image_37/37_Huismes_4.jpg","../../jctruffet.com/image/image_37/37_Huismes_5.jpg"]},"Consult_chateau_formulaire103f":{"id":"Consult_chateau_formulaire103f","dept":"37","canton":"Chinon","commune":"Huismes","nom":"Huismes_II","type":"Château","periode":"XIV-XVI-XIX","histoire":"dans cet article  quatre châteaux à Huismes dont celui de Chaussée, Bonnaventure,  Contebault et Potevinière. CHAUSSEE,   le château de la Chaussée, voisin du château d'Usage, a été construit au XVIe siècle. C'est une belle demeure située au milieu d'un parc de 1,5 hectare, à proximité du ruisseau des Fontaines d'Ozon. Cette demeure romantique a été beaucoup restaurée par ses propriétaires successifs. Aujourd'hui, c'est un véritable oasis de calme avec son parc, ses arbres centenaires, son jardin dagrément et son plan deau.                                                                                     POITEVINIERE, construit au XIXe siècle est une ancienne borderie ou exploitation agricole qui dépendait, au XIVe siècle, de lArchevêché de Tours. Le toponyme \"Poitevinière\" provient probablement du nom du premier propriétaire Poitevin. Proche du ruisseau la Riasse, et entouré d'un magnifique parc, cette demeure imposante na conservé aucun bâtiment dorigine, hormis un grand pavillon de chasse datant du XVIIIe siècle et les portails d'accès.","architecture":"BONNAVENTURE, le château était une maison de chasse construite par Louis XI qui y résida en 1480 et 1482. Le corps de logis principal s'élevait à l'ouest de la cour. En 1745, il a été démoli ainsi que la chapelle dédiée à Saint-Bonaventure. Cette cour était limitée à l'est par le bâtiment des Offices, parallèle au précédent, dont subsiste le mur goutterot Est. Dans le mur nord du beau parc reste la porte d'entrée en plein cintre, accompagnée d'un guichet et une maçonnerie en brique qui appartenait au logis principal. La tour sud ouest de l'enceinte, dite Tour des Jardins, est amortie par un crénelage.                                                   CONTEBAULT, relevait pour moitié de la collégiale de Candes, et pour moitié de celle de Saint-Mexme à Chinon. Un manoir primitif, construit au XVIe siècle, comprenait deux ailes perpendiculaires. Les angles nord-est et nord-ouest portent une tourelle cylindrique en encorbellement. Au XVIIe siècle fut ajouté, à l'angle sud-est du bâtiment principal, un bâtiment carré accompagné d'une tour carrée. Une tour d'escalier cylindrique couverte d'un dôme fut montée dans l'angle rentrant. Jean Ribotteau projetait de transformer le manoir en un château régulier flanqué de pavillons aux angles; le commanditaire ruiné, n'ayant pu achever son oeuvre, seule une moitié a été réalisée.","habitants":"Chaussée et Poitevinière, l'Evêché de Tours                    Bonnaventure Louis XI                                                              Contebault, Jean Ribotteau \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"à Huismes dont celui de Chaussée grav-2,                   Bonnaventure grav-1   47° 12' 45\" nord, 0° 15' 24\" Est,  Contebault grav 3-4.  47° 12' 25\" nord, 0° 14' 33\" Est   et Potevinière.","gps":"","images":["../../jctruffet.com/image/image_37/37_Huismes_II_1.jpg","../../jctruffet.com/image/image_37/37_Huismes_II_2.jpg","../../jctruffet.com/image/image_37/37_Huismes_II_3.jpg","../../jctruffet.com/image/image_37/37_Huismes_II_4.jpg"]},"Consult_chateau_formulairea070":{"id":"Consult_chateau_formulairea070","dept":"37","canton":"Château-Renault","commune":"Pernay","nom":"Hérissardière","type":"Château","periode":"XVI","histoire":"HERISSAUDIERE, relevant anciennement du duché de Luynes et rattaché à la paroisse de Sainte-Genevière de Luynes, le domaine de l'Hérissaudière est la propriété d'Anne Lebert et de l'abbé Philibert Lebert qui le vendent, par acte du 14 novembre 1642, à Jacques Gatian, écuyer, seigneur de Lafond, conseiller du roi, juge-magistrat au siège présidial, échevin perpétuel de la ville, le 28 octobre 1652 et maire de Tours en 1659.  Aujourd'hui chambre d'hôte de charme.","architecture":"HERISSAUDIERE,  passe  par héritage  à  Victor Gatian de Lafond (-1693), trésorier-général de France à Poitiers ; Louis-Victor Gatian de Taillé, conseiller du roi, lieutenant-général au bailliage de Tours, marié à Louise de Lutz ; François-Jean-Louis Gatian de Clérambault (1684-), contrôleur général des finances de la généralité de Tours, marié à Thérèse Preuilly ; François-Jean Gatian de Clérambault, contrôleur général des finances de la généralité de Tours, marié à Catherine Cormier de la Picardière ; François-Marie Gatian de Clérambault (-1826), contrôleur général des finances et domaines de la généralité de Tours, qui comparait à l'assemblée de la noblesse de Touraine pour l'élection des députés aux États généraux, marié à Françoise-Henriette de Marsay ; François-Alfred Gatian de Clérambault (-1870), marié à Cécile-Euphrasie de Pignol de Rocreuse ; Charles-Henri Gatian de Clérambault, lieutenant-colonel du 15e de chasseurs, par suite d'un partage, fait le 25 septembre 1876, avec son frère, l'historien et archéologue Édouard Gatian de Clérambault, qui y est né le 18 avril 1833, alors que le château est encore rattaché à la commune de Luynes.","habitants":"Famille de  Victor Gatian de Lafond \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Châteaux de Hérissaudière à Pernay","gps":"","images":["../../jctruffet.com/image/image_37/37_H%c3%a9rissaudi%c3%a8re_1.jpg","../../jctruffet.com/image/image_37/37_H%c3%a9rissaudi%c3%a8re_2.jpg","../../jctruffet.com/image/image_37/37_H%c3%a9rissaudi%c3%a8re_3.jpg","../../jctruffet.com/image/image_37/37_H%c3%a9rissaudi%c3%a8re_4.jpg"]},"Consult_chateau_formulaire8c99":{"id":"Consult_chateau_formulaire8c99","dept":"37","canton":"Chinon","commune":"Cheillé","nom":"Islette","type":"Château","periode":"XV-XVI","histoire":"ISLETTE, le fief de l'Islette relevant de la châtellenie de l'Isle-Bouchard à comme premier seigneur  Jean Pannetier bailli de Touraine en 1295. Jeanne de Sazilly héritière de cette terre et de celle de Guéritaude l'apporte en dot lors de son mariage en 1353 avec Guy de Maillé fils d'd'Hardouin VIII, baron de Maillé seigneur de Champchevrier et de Jeanne de Montbazon. A sa mort sans postérité de Jeanne de Sazilly, les seigneuries passent à l'un de ses petits-neveux, Juhez  de Maillé, seigneur de Villeromain époux d'Isabeau  de Châteaubriand. c'est l'un de leur descendants. René de Maillé  époux de Françoise le Roy  que l'on doit la construction du château actuel vers 1530 par le baron de Maillé, L'édifice fut terminé vers 1535 par Charles de Maillé qui décède en 1531. les descendants se succède à l'Islette jusqu'à la fin  du XVIIe siècle qui passera par alliance dans la famille de Tiercelin d'Appelvoisin et par Marie-Anne leur fille, le château passera à Alexis Barjot de Moussy, comte de Roncée avant de revenir à Gabriel-René d'Appelvoisin qui meurt sur l'échafaud en 1793. Après la Révolution le château est  en possession de Charlotte d'Appelvoisin, épouse de François-Gabriel Thibault de la Brousse de Verteillac, madame de Verteillac se défait de ce bien ancestral sous le premier Empire. il sera racheté par monsieur Dupuy et en 1859 passe aux courcelle, puis par succession aux Boyer et aux Ferragu et en 1945 à une société privé qui le possède toujours.","architecture":"ISLETTE, la construction utilisa un bâtiment du XVe siècle, en brique et pierre, sans doute inachevé. le bâtiment principal de\" plan rectangulaire  a trois niveaux et attique est flanqué de deux grosses tours rondes et d'une aile en retour d'équerre. Une tour polygonale d'escalier flanque l'angle nord-est. Le couronnement présente un chemin de ronde avec mâchicoulis avec créneaux et merlons fendus de meurtrières, le chemin de ronde est éclairé par des hautes lucarnes sommées de tympans triangulaires, dont seules quelques exemplaires subsistent. A l'intérieur, un large escalier en vis en pierre relie les étages. La chapelle est aménagée au rez- de-chaussée de la tour sud-est. Au XIXe siècle, les sommets des combles des tours d'angle furent tronqués et les couronnements des lucarnes ont été retirés. A l'est du château se trouve le moulin. Au nord, la porte du parc, accompagnée d'une poterne, est flanquée de deux pavillons et date de 1638. La construction du château de l'Islette date de 1526 à 1530. Le décor intérieur de ce château fait lobjet dun classement aux M.H. depuis le 15/11/1946. Son histoire est marquée par des séjours répétés de Camille Claudel et d'Auguste Rodin.","habitants":"Famille de Gabriel-René d'Appelvoisin \r\n        \"","divers":"A Cheillé le château d'Islette 47° 16' 03\" Nord, 0° 26' 03\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Islette_1.jpg","../../jctruffet.com/image/image_37/37_Islette_2.jpg","../../jctruffet.com/image/image_37/37_Islette_3.jpg","../../jctruffet.com/image/image_37/37_Islette_4.jpg"]},"Consult_chateau_formulaire138a":{"id":"Consult_chateau_formulaire138a","dept":"37","canton":"Vouvray","commune":"Vernou sur Brenne","nom":"Jallanges","type":"Château","periode":"XV","histoire":"JALLANGES, au XIIIe siècle la seigneurie de Jallanges et sa maison forte sont en la possession de René du Perray qui se transmettra  dans sa descendance jusqu'au XVe siècle. En 1462  le propriétaire de la maison forte est Jean Gaudin chanoine et maire de Tours. la seigneurie  relevant du château d'amboise est divisée entre plusieurs familles, les Saint-Paul , les Houdan des Landes, les Sainte Marthe, les Ruzé. Lords de la construction du château en 1460 le propriétaire seigneur est Nicolas Gaudin notaire et secrétaire du roi. Passé en 1520 par alliance à Philibert Babou, comte de Sagonne seigneur de la Bourdaisière argentier du roi,  et maire de Tours époux de Marie Gaudin dès 1522, il passe par échange à François de Blanchefort. Trente ans plus tard il appartient aux Bouillon qui le conserveront jusqu'en 1625, passa aux Royer qui obtiennent en 1631 l'érection du fief en châtellenie qui en 1672 est acquis par un conseillé au parlement de Bretagne, Nicolas Lefébvre seigneur de Falluère que ses descendants le conserveront jusqu'à la Révolution, vendu comme bien nationale racheté en sous mains par la famille des propriétaires, cédé à nouveau faute de liquidités le domaine échoit en 1808 au comte de Bizemont, succédait par le vicomte de Contades en 1836 le restaure, divers  propriétaires se succèdent dont Jean-Victor  Meignan maire de Vernou, dont les descendants vendent Jaillanges en 1919 à la famille Magiar, après des spéculations immobilières, transformées en un centre d'acceuil pour enfants inadaptés et en 1984 acquit par la famille Ferry-Balin.","architecture":"JALLANGES,  est un monument historique privé, meublé et encore habité par ses propriétaires. Il a été construit en 1460, sous l'affluence du roi Louis XI. Le château de Jallanges présente une architecture en brique et pierre de taille caractéristique de l'époque. comme un corps de logis  orienté Est-Ouest  consistant dans un bâtiment élevé sur un rez-de-chaussée et un étage percé de fenêtres à meneaux et couvert d'un comble à faible pente éclairé par des lucarnes à hauts tympans triangulaires agrémentés de crochets.  Au centre de la façade sur cour, une tour pentagonale à la base, carrée au sommet  et plus élevée d'un étage que le corps de logis, abrite  un escalier à vis. Sa construction parait légèrement postérieure au premier bâtiment fut comme celle de la cour des communs qui forment à gauche de la cour d'honneur, un vaste quadrilataire cantonné de tourelles accessibles par un avant-corps rectangulaire percé d'un portail en anse de panier qu'encadrent   de gracieux pilastres décorés de rinceaux de feuillage.  Le château de Jallanges est ouvert au public depuis 1984 du 1er mars au 30 Octobre. C'est devenu aussi un hôtel 4 étoiles                                                                               Grand ECHENEAU à Vouvray chambres d'Hôtes","habitants":"Famille de Nicolas Lefebvre \r\n        \"","divers":"A Vernou sur Brenne le château de Jallanges   et Gd-Echeneau à Vouvray grav 6.            47° 26' 40\" Nord et 0° 49' 47\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Jallanges_1.jpg","../../jctruffet.com/image/image_37/37_Jallanges_2.jpg","../../jctruffet.com/image/image_37/37_Jallanges_3.jpg","../../jctruffet.com/image/image_37/37_Jallanges_4.jpg","../../jctruffet.com/image/image_37/37_Jallanges_5.jpg","../../jctruffet.com/image/image_37/37_Jallanges_6.jpg"]},"Consult_chateau_formulaire1a06":{"id":"Consult_chateau_formulaire1a06","dept":"37","canton":"Joué les Tours","commune":"Joué lès Tours","nom":"Joué_les_Tours","type":"Château","periode":"XV-XVI-XIX","histoire":"cinq châteaux à Joué les Tours ; Beaulieu, Crouzillière , Epan, Bretonnière et Marbellière.    Il existe 18 châteaux et manoirs à Joué-les-Tours à découvrir. Les trois quarts sont privés.                                                                                                                 BEAULIEU, édifice construit au XVe siècle ; remanié dans le quatrième quart du XVIe siècle : portail, pigeonnier et lucarnes de la façade sud-ouest. Le château se compose de deux corps de bâtiment dont le principal est de plan carré, et l'autre de plan rectangulaire, perpendiculaire au premier bâtiment, les toits sont  à la mansard. Les appartements ont reçu, au XIXe siècle, une décoration. L'ancienne chapelle, dans la partie sud-ouest du château, a été convertie en salle-à-manger. Le château de Beaulieu dispose dun parc de trois hectares, comprenant de magnifiques jardins à la française. Cheminée du XVe siècle et du XVIIIe siècle à l'étage. En 1575, la maison noble appartient à Claude d'Espinay et Jeanne de Charge, vendu à Jeanne Coppin et Claude de Plaisance, sieur du Châtelier.                                                                                                        CROUZILLIERE, le fief relevait du Plessis-les-Tours au XVe siècle et, plus tard, du château de Tours. Le château a été en partie démoli en 1838. Du château détruit, subsiste deux tours au nord et au sud-ouest, et une autre qui se dressait au nord-est. Au rez-de-chaussée de la tour nord était aménagé un petit oratoire dont il reste des vestiges de peinture. Le pigeonnier, grosse tour cylindrique, encore visible en 1949, a aujourd'hui disparu. Le parc a été loti en 1974.","architecture":"BOUCHARDIERE   du XVIIe siècle possède  deux ailes en retour d'équerre . Son étage est éclairé par des lucarnes à fronton courbé. Au XVIIe siècle, il portait le nom du petit Ysermay.                                                                                                    CHAUMETTES du XIXe siècle  a été très remanié au début des années 2010, il a perdu son aile sud, le poète Saint-Jhon Perse y a séjourné en 1922, ce manoir fut la propriété de l'union des Gueules cassées  en 14-18.                                         CLOS  St-VICTOR, construit en 1890 pour le comte Sabran de Pontevés, c'est lui qui en 1966 donna ce nom à sa propriété de la Maucannière.                                                                                                                          EPAN, la constuction du château de l'Epan date du XIXe siècle. A remplacé un château construit en 1518 par Jacques de Beaume. C'est un château privé.                                                                             BRETONNIERE est un château bâti à Joué-les-Tours, dans le département de l'Indre-et-Loire, en région Centre-Val de Loire, en France. La construction du château des Bretonnières date du XIXe siècle. C'est un château privé, appartenant à la famille de la petite bourgeoisie.                                 MARBELLIERE  Le parc est doté d'une porte monumentale à l'ouest. Le petit château actuel a du être reconstruit à la fin du XVIIIe ou au début du XIXe siècle. La porte en plein cintre menant au parc est ouverte dans une architecture accostée de pilastres et d'ailerons, et amortie par un fronton courbe. Sous une grille d'imposte, soulignée par une traverse en fer à entrelacs, les deux vantaux se composent d'une grille dans leur deux tiers supérieurs, séparée par une traverse à entrelacs d'un panneau plein inférieur.","habitants":"Beaulieu, Famille de Claude d'Espinay\r\n        \r\n        \"","divers":"à Joué les Tours ; Beaulieu  grav 1-2.   47° 21' 45\" nord, 0° 39' 38\" Est, Chamettes grav-3, clos St Victor grav-4 -5 Crouzillière grav-7 , Epan grav-6, Bretonnière grav-8 et Marbellière grav 9. Crouzillière 47° 21' 05\" Nord, 0° 39' 45\" Est :   Bretonnières Epan : 47° 21' 05\" Nord, 0° 39' 45\" Est Marbelière 47° 21' 05\" Nord, 0° 39' 45\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Jou%c3%a9_les_Tours_1.jpg","../../jctruffet.com/image/image_37/37_Jou%c3%a9_les_Tours_2.jpg","../../jctruffet.com/image/image_37/37_Jou%c3%a9_les_Tours_3.jpg","../../jctruffet.com/image/image_37/37_Jou%c3%a9_les_Tours_4.jpg","../../jctruffet.com/image/image_37/37_Jou%c3%a9_les_Tours_5.jpg","../../jctruffet.com/image/image_37/37_Jou%c3%a9_les_Tours_6.jpg","../../jctruffet.com/image/image_37/37_Jou%c3%a9_les_Tours_7.jpg","../../jctruffet.com/image/image_37/37_Jou%c3%a9_les_Tours_8.jpg","../../jctruffet.com/image/image_37/37_Jou%c3%a9_les_Tours_9.jpg"]},"Consult_chateau_formulaireff13":{"id":"Consult_chateau_formulaireff13","dept":"37","canton":"Joué les tours","commune":"Joué les tours","nom":"Joué_les_Tours_II","type":"Manoirs","periode":"XV-XVII","histoire":"Plusieur manoirs à Joué les Tours, Chirézy, Coudraye, Frazelière, Mazeraie  et  Michelinière.                                                                                                                   CHERIZY du XVe siècle, XVIIIe siècle Le corps de logis est un long rectangle composé de deux parties dont la séparation est visible par un rondelis au milieu du toit. La partie la plus importante, datée du XVe siècle, se trouve au nord ; l'autre a été construite à l'identique au XVIIIe siècle. A l'est se trouve la trace d'une tour d'escalier à vis, supprimée lors de cette adjonction et remplacée par un escalier droit en bois. La cage d'escalier est entourée de pans de bois à l'étage. Les ouvertures sur les deux façades ont été modifiées au 18e siècle. Perpendiculaire au manoir, plus à l'ouest, se trouve une grange avec tour de pierre en saillie sur le mur d'enceinte. L'édifice a pris le nom de Chérizy en 1940 seulement.                                                                                                       COUDRAYE du XVIIe siècle, et du XIXe siècle . Une porte en plein cintre donne accès, au nord, au parc du manoir. Aux angles nord-ouest et nord-est de l'enclos se trouve un pavillon carré. Le manoir est un bâtiment dont le rez-de-chaussée comprend des celliers et salle de servitude de part et d'autre d'un couloir accessible sur chaque façade par un escalier de pierre à double rampe. La façade principale présente une travée médiane surmontée d'un fronton triangulaire soutenu par des pilastres. La toiture a été refaite au XIXe siècle, quand le manoir a été prolongé à l'est et à l'ouest par des ailes.","architecture":"FRAZELIERE,  Du XVIIe siècle, deux portes de même style donnent accès à l'enclos du côté sud-est. La principale comprend quatre piliers supportant des vases. L'autre comprend seulement deux piliers et permet l'entrée dans l'allée charretière conduisant aux communs. Le manoir présente, sur sa façade secondaire, un avant-corps rectangulaire en saillie, contenant l'escalier. Un bâtiment moderne a été ajouté à sa partie ouest. L'édifice a pris le nom de la Frazelière en 1903.                                                                                                MAZERAIE  du XVe siècle, XIXe siècle.  Le corps de logis était prolongé à l'ouest par une galerie haute couverte flanquée à chaque extrémité par un pavillon carré contenant un escalier qui desservait, d'un côté le corps de logis, de l'autre le bâtiment de dépendances. La galerie a été remplacée à la fin du XIXe siècle par un gros pavillon d'habitation accolé à l'ancien corps de logis. Une cheminée provenant du manoir de la Rothière, datée de 1623, a été installée dans la salle est du logis. Elle conserve un décor peint représentant Diane au bain surprise par Actéon.                                                                                    MICHELINIERE, le petit château actuel a du être reconstruit à la fin du XVIIIe ou au début du XIXe siècle. La porte en plein cintre menant au parc est ouverte dans une architecture accostée de pilastres et d'ailerons, et amortie par un fronton courbe. Sous une grille d'imposte soulignée par une traverse en fer à entrelacs, les deux vantaux se composent d'une grille dans leur deux tiers supérieurs, séparée par une traverse à entrelacs d'un panneau plein inférieur.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Coudraye grav-1-2.    47° 19' 08\"nord, 0° 37' 34\" Est     Michelinière grav-3.  47° 21' 32\" nord, 0° 39' 45\" Est                                        Chérizy grav-8   47° 21' 24\" nord, 0° 41' 24\" Est            Frazelière grav -5.  47° 21' 31\" nord, 0° 39' 59\" Est     Mazeraie grav-6  47° 18' 313 nord, 0° 39' 143 Est    Bouchardière grav-7    Macaunière tour grav-9","gps":"","images":["../../jctruffet.com/image/image_37/37_Jou%c3%a9_les_Tours_II_1.jpg","../../jctruffet.com/image/image_37/37_Jou%c3%a9_les_Tours_II_2.jpg","../../jctruffet.com/image/image_37/37_Jou%c3%a9_les_Tours_II_3.jpg","../../jctruffet.com/image/image_37/37_Jou%c3%a9_les_Tours_II_4.jpg","../../jctruffet.com/image/image_37/37_Jou%c3%a9_les_Tours_II_5.jpg","../../jctruffet.com/image/image_37/37_Jou%c3%a9_les_Tours_II_6.jpg","../../jctruffet.com/image/image_37/37_Jou%c3%a9_les_Tours_II_7.jpg","../../jctruffet.com/image/image_37/37_Jou%c3%a9_les_Tours_II_8.jpg"]},"Consult_chateau_formulaire2002":{"id":"Consult_chateau_formulaire2002","dept":"37","canton":"Vouvray","commune":"Reugny","nom":"La_Cote_Reugny","type":"Manoir","periode":"XVI","histoire":"La COTE, a été construit après 1530. Il est composé de 2 corps de logis et d'une tourelle cylindrique. Mi-médiéval, mi-Renaissance, le manoir fut construit sous François Ier. En 1480, un dénommé Marcirion est le premier seigneur de La Côte, vivant dans un ancien manoir, depuis, disparu. A la fin du XVe siècle, le fief de La Côte passe à la famille de Jean de La Rüe, notaire et secrétaire du roi. C'est en 1529 que le manoir actuel est érigé. Au décès de Jean de La Rüe en 1506, c'est sa veuve, Perrine Le Fuzelier qui commanda le domaine et qui le céda ensuite à son fils, Marc de La Rüe, maître des requêtes à la Chambre des comptes de Bretagne, et Maire de Tours en 1535. En 1535, le fief est acheté par la famille Forget. En 1598, Jean Forget est élu maire de Tours. Au début du XVIIe siècle, le domaine passe à la famille du Clozeau. Puis, en 1669, il passe aux Rouillé. En 1711, au propriétaire Charles de Chastellain, se succèderont Gaspard de Réal, sénéchal de Forcalquier, puis Jean-André de Réal, écuyer et secrétaire du roi. En 1721, le manoir de la Côte appartient à Charles-Jacques de La Martellière, mousquetaire du roi Louis XV et Chevalier de Saint-Louis. Il cède le manoir de La Côte, en 1760, à Nicolas de Chaban, administrateur des postes et relais de France. En 1763, le manoir est cédé à la sur de Nicolas, Marie, et à son beau-frère, Jacques Valleteau de Chabrefy, originaire de l'Angoumois.","architecture":"La COTE, à leur mort, le manoir passe à l'un de leurs fils, Thomas Valleteau de Chabrefy, lieutenant général au bailliage et siège présidial de Tours. C'est le fils de Thomas, Jérôme, qui en hérite, puis une fille de Jérôme, Marie-Louise-Marguerite Valleteau de Chabrefy, épouse d'un aristocrate belge, le baron Armand de Piteurs-Hiegaerts. Le domaine échoit ensuite à la famille de Warenghien de Flory. A partir de 1970, La Côte appartient à la famille Besnier. Le fief relevait de la châtellenie de Reugny. L'ensemble architectural comprend un château construit à la fin du XVe siècle et du XVIe siècle, un pigeonnier du XVIIIe siècle, une chapelle du XVIe siècle et le portail du XVIIIe siècle. Le château présente une architecture et un décor Renaissance. L'édifice a été édifié en plusieurs étapes. Le bâtiment sud possède un volume représentatif de la fin du XVe siècle. Il a été prolongé au début du XVIe siècle, à l'ouest, par une courte aile et, à l'est, par une aile formant la façade orientale. Au XVIIe siècle les meneaux des ouvertures sont détruits et remplacés par des baies à petits carreaux, quelques restaurations ont été exécutées au XIXe siècle : modifications de quelques ouvertures, décors d'armoiries en façade.","habitants":"Famille Forget\r\n        \"","divers":"Château de la Cote à  Reugny  47° 28' 14\" Nord, 0° 52' 46\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_La_Cote_Reugny_1.jpg","../../jctruffet.com/image/image_37/37_La_Cote_Reugny_2.jpg","../../jctruffet.com/image/image_37/37_La_Cote_Reugny_3.jpg","../../jctruffet.com/image/image_37/37_La_Cote_Reugny_4.jpg"]},"Consult_chateau_formulaire52e6":{"id":"Consult_chateau_formulaire52e6","dept":"37","canton":"Langeais","commune":"Langeais","nom":"Langeais","type":"Château","periode":"XV","histoire":"LANGEAIS, cest en 1206 que Langeais entre dans le domaine Royal, à la suite des victoires de Philippe Auguste sur Jean sans Terre. A partir de cette période, le fief de Langeais est concédé à divers grands seigneurs proches du pouvoir Royal. Pendant la guerre de Cent Ans, Langeais est le repaire épisodique de bandes armées. Charles VII, conscient du danger que peut représenter ce type doccupation, décide de reprendre possession des lieux : la seigneurie est rachetée en 1422, et les fortifications autres que la grosse tour sont abattues. Langeais, pendant la seconde moitié du XVe siècle, demeure une place importante.  le château est cédé dès juillet 1466 au cousin du roi, Dunois, fils du compagnon de Jeanne dArc. En 1491 Anne de Bretagne épouse alors le cousin de Charles VIII, Louis dOrléans, qui régnera sous le nom de Louis XII. Après le XVe siècle, le château de Langeais est cédé à diverses personnes et n'est guère entretenu, seul Christophe Baron, propriétaire à partir de 1839, entreprend des travaux de restauration et achète une collection de mobilier. Mais malheureusement, son fils pour régler des dettes, vend une partie de cette collection. Après le décès du fils Baron, le château de Langeais est acquis le 28 juillet 1886 par Jacques Siegfried. C'est un homme daffaires très actif : banquier, il est chargé par le gouvernement de chercher de meilleurs moyens de développer le commerce français à létranger. Il est passionné par lart du Moyen Âge, il passe alors presque vingt ans de sa vie à le restaurer et le remeubler, restituant ainsi le cadre de vie de la noblesse de la fin du Moyen Âge. En 1904, il donne le château et sa riche collection à lInstitut de France, qui en est toujours propriétaire.","architecture":"LANGEAIS, fut reconstruit, sous Louis XI, en 1465. Il a remplacé un premier château fort édifié à la fin du Xe siècle par Foulques Nerra. Le château est précédé par un castrum disposant d'un donjon construit en bois et associé à un domicilium. Cet ouvrage fortifié est bâti sous l'impulsion de Foulques Nerra, comte d'Anjou en 994. Sous la domination de la dynastie anglaise des Plantagenêt, le château est agrandi par le roi d'Angleterre Richard Cur de Lion, comte du Maine et d'Anjou de 1189 à 1199. Philippe Auguste le reconquiert en 1206, puis il est détruit par les Anglais lors de la guerre de cent-ans. Du bâtiment de cette époque subsiste une façade de la tour principale, appelée « donjon de Foulques Nerra ». En 1465, Louis XI ordonne la reconstruction du château, en contrebas des vestiges de l'ancien édifice ; les travaux sont menés sous la direction de Jean Bourré, trésorier de France et ami du roi, et Jean Briçonnet. Le nouveau château de Langeais est achevé en 1469. Le château de Langeais est classé aux M.H. le 13/03/1922 ; la partie du parc du château autour des ruines jusqu'au pont est classée aux M.H. le 26/05/1942","habitants":"Famille de Christophe Baron et Jacques Siegfried\r\n        \"","divers":"Langeais, 47° 19' 29\" Nord et 0° 24' 22\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Langeais_1.jpg","../../jctruffet.com/image/image_37/37_Langeais_2.jpg","../../jctruffet.com/image/image_37/37_Langeais_3.jpg","../../jctruffet.com/image/image_37/37_Langeais_4.jpg","../../jctruffet.com/image/image_37/37_Langeais_5.jpg"]},"Consult_chateau_formulaire2469":{"id":"Consult_chateau_formulaire2469","dept":"37","canton":"Chinon","commune":"Lerné","nom":"Lerné","type":"Château","periode":"","histoire":"quatre châteaux à Lerné dont Cessigny, Chavigny, Maulevier, et Celle-Guenand.                                                                                                        CESSIGNY,  ancien fief relevant de Montsoreau à la fin du XIe siècle ; l'édifice actuel, du XVe siècle, est en 1444 à Jean Rabaste, écuyer,  en 1625 à Jacques Démaille qui y fonde une chapelle sous le vocable de Saint-Jacques, en 1665 à Armand Léon Bouthillier de Chavigny, en 1704 à Armand Victor Bouthillier de Chavigny, corps de logis servant de grenier au XVIIIe siècle, vendu au début du XXe siècle, bâtiment de ferme du premier quart du XVIIe siècle, souterrain refuge et communs du quatrième quart du XVIe siècle.                                                                                                           CHAVIGNY,  fut construit, de 1638 à 1646, par l'architecte Pierre Le Muet, pour Claude Bouthillier, comte de Chavigny, futur Surintendant des Finances. Il ne reste aujourd'hui, que quelques vestiges de l'ancien château de Chavigny. MAULEVIER   Le fief de Maulévrier existait avant 1219; le portail serait du XIVe siècle. A partir de 1440 Guillaume puis Jean de Ballan embellissent le château; un nouveau corps de logis est ajouté entre 1528 et 1540. François Le Roy achète Maulévrier en 1558 ; Maulévrier est annexe à la châtellenie de Chavigny et la maison seigneuriale devient métairie. Vers 1720, le corps de logis  du XVIe siècle est démoli; vers 1765, le corps de logis du XVe siècle est abaissé. La chapelle est en ruine. D'importantes caves à vin sur trois niveaux et dans le clos une vigne mêlée, qui a échappé au phylloxera, est conservée, décor sculpté extérieur.","architecture":"CELLE-GUENAND, la galerie est couverte en bardeaux en 1476, les salles du rez-de-chaussée semi enterré du logis précédant le souterrain refuge sont voûtées en berceau brisé et en berceau plein-cintre,  le porche du châtelet d'entrée est en berceau plein-cintre,  les toits du logis sont à longs pans et croupe,  le toit du châtelet d'entrée est en pavillon,  les toits de la galerie et des communs sont à longs pans et pignon couvert,  le pigeonnier et la tour d'escalier du châtelet d'entrée sont couverts d'un toit polygonal,  la tour d'escalier polygonale est couverte en terrasse,  l'escalier primitif du logis est dans-oeuvre, droit et en maçonnerie,  l'escalier de la tour carrée est dans-oeuvre, à vis ,  l'escalier de la tour polygonale du châtelet d'entrée est hors-oeuvre, en vis sans jour et en maçonnerie,  celui de la tour polygonale de la galerie est hors-oeuvre, à vis,  celui du commun du XVe siècle est demi hors-oeuvre, tournant,  les tourelles ajoutées au XIXe siècle au châtelet d'entrée, à la galerie et aux nouveaux communs abritent des escaliers hors-oeuvre, à vis en charpente.","habitants":"Cessigny-Chavigny; Armand Victor Bouthillier de Chavigny                     Maulevier; François Le Roy \r\n        \"","divers":"à Lerné dont Cessigny  grav-1, Chavigny grav-4-5-6-, Maulevier grav-2, et Celle-Guenand  grav-3    Chavigny grav  47° 08' 11\" Nord et 0° 06' 28\" Est                                       Maulévrier  47° 08' 10\" Nord et 0° 07' 24\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Lern%c3%a9_1.jpg","../../jctruffet.com/image/image_37/37_Lern%c3%a9_2.jpg","../../jctruffet.com/image/image_37/37_Lern%c3%a9_3.jpg","../../jctruffet.com/image/image_37/37_Lern%c3%a9_4.jpg","../../jctruffet.com/image/image_37/37_Lern%c3%a9_5.jpg","../../jctruffet.com/image/image_37/37_Lern%c3%a9_6.jpg"]},"Consult_chateau_formulaire21e0":{"id":"Consult_chateau_formulaire21e0","dept":"37","canton":"Loches","commune":"Chemille sur Indrois","nom":"Liget","type":"Château","periode":"XVI","histoire":"LIGET,  la chartreuse du Liget est l'un des tous premiers monastères cartusiens construit en Europe au XIIe siècle. Edifiée en 1180 par Henri II Plantagenêt, elle est la seule représentation de l'ordre en Touraine et a donc un caractère tout à fait exceptionnel. interrompu par la Révolution française. En 1790-1791, les onze pères et frères chartreux qui résident encore au Liget sont chassés,  ; les bâtiments (monastère, Corroirie et chapelle) sont vendus comme biens nationaux et tout ou partiellement détruits. En 2018, la maison haute et la maison basse sont toujours habitées par la famille de Côme-Edmond de Marsay, acheteur en 1837 d'une partie d'un domaine finalement reconstitué en 1899. et la sauvé d'une disparition certaine.\r\nEn Janvier 2015, le site historique de la Chartreuse du Liget est inscrit au titre des M.H. , car considéré comme l'unique édifice de ce genre conservé dans l'actuelle région Centre.\r\nAujourd'hui vous pouvez découvrir cette Chartreuse dont les vestiges témoignent encore de son importance et de sa richesse architecturale. En 2018, la maison haute et la maison basse sont toujours habitées par la famille de Côme-Edmond de Marsay,","architecture":"LIGET, au XXIe siècle, la maison haute du Liget ne conserve que les ruines de son église médiévale et un certain nombre de bâtiments, plus ou moins réaménagés, qui datent du XVIIe siècle ou de la reconstruction de 1787 comme le grand cloître. La Corroirie se présente toujours dans sa configuration médiévale. La rotonde de la chapelle du XIIe siècle et une partie des fresques qui la décorent subsistent. De 1862 à 2015, la chapelle, la Corroirie et la maison haute sont progressivement classées ou inscrites au titre des M.H. . Des éléments de mobilier et des tableaux, déplacés après la Révolution à Loches ou à Chemillé-sur-Indrois même, font l'objet d'une inscription ou d'un classement dans la base Palissy des objets protégés. En 1947, la maison haute est intégrée, comme la Corroirie et les abords de ces deux groupes de bâtiments, à un site classé dans le cadre de la loi du 2 mai 1930.","habitants":"famille de Côme-Edmond de Marsay, \r\n        \"","divers":"A Chemille sur Indrois château de Liget","gps":"","images":["../../jctruffet.com/image/image_37/37_Liget_1.jpg","../../jctruffet.com/image/image_37/37_Liget_2.jpg","../../jctruffet.com/image/image_37/37_Liget_3.jpg","../../jctruffet.com/image/image_37/37_Liget_4.jpg"]},"Consult_chateau_formulairebdbb":{"id":"Consult_chateau_formulairebdbb","dept":"37","canton":"Chinon","commune":"Lignieres","nom":"Lignieres_37","type":"Château","periode":"XV","histoire":"FONTENAY, cette demeure seigneuriale du XVe siècle a conservé intacte sa muraille d'enceinte. Le jardin intérieur, intimiste et précieux, évoque les romans courtois du Moyen-Age. Le plus souvent, vous y serez reçus par les propriétaires.  Protégé par cette enceinte fortifiée, le jardin intérieur, intimiste inattendu et précieux, imaginé dit-on par Joachim Carvallo, créateur des jardins de Villandry, évoque les romans courtois du Moyen-âge avec son humble décor végétal. « Il nest trésor que de vivre à son aise » peut on dire au-dessus de la porte de la salle des gardes car Fontenay est un château à dimension humaine. En parcourant les pièces de réception aux dimensions modestes, les appartements ou la cuisine, chaque visiteur peut simaginer y vivre. La suite continue des propriétaires est établie depuis le 16 Mai 1620 et certaines personnalités ont fortement marqué le domaine de leur empreinte, comme le chanoine architecte Pierre-Paul Brisacier ou le patron de presse Jean Sapène. Aujourdhui, la famille Marko vous accueillera dans ce milieu intime qui invite à la rêverie. Le château de Fontenay est aujourd'hui musée.","architecture":"FONTENAY, admirablement situé dans le quadrilatère des châteaux de Langeais, Villandry, LIslette, Azay-le-Rideau et Ussé, au sein du Parc Naturel Régional Loire-Anjou-Touraine et du périmètre classé au patrimoine mondial de lhumanité par lUNESCO, le château de Fontenay est un M.H. inscrit ouvert au public depuis 2004. Bâtie sur les vestiges encore visibles dune villa gallo-romaine de plan carré, cette gentilhommière médiévale a conservé sa muraille avec ses créneaux, son chemin de ronde, ses échauguettes, ses latrines et ses douves sèches. Protégé par cette enceinte fortifiée, le jardin intérieur du château de Fontenay, inattendu et précieux, imaginé par Joachim Carvallo  créateur des jardins de Villandry  évoque les romans courtois du Moyen-Âge avec son humble décor végétal.","habitants":"Joachim Carvallo   Famille Marko\r\n        \r\n        \"","divers":"A Lignieres le château de Fontenay","gps":"","images":["../../jctruffet.com/image/image_37/37_Ligni%c3%a8res_37_1.jpg","../../jctruffet.com/image/image_37/37_Ligni%c3%a8res_37_2.jpg","../../jctruffet.com/image/image_37/37_Ligni%c3%a8res_37_3.jpg","../../jctruffet.com/image/image_37/37_Ligni%c3%a8res_37_4.jpg"]},"Consult_chateau_formulaire3519":{"id":"Consult_chateau_formulaire3519","dept":"37","canton":"Ste-Maure de Touraine","commune":"Ligré","nom":"Ligré","type":"Château","periode":"XVI","histoire":"Trois châteaux à Ligré, dont la Roches St-Paul, Beauvais , Sassay  et Villeneuve.\r\nLa ROCHES St PAUL, ce prieuré fut supprimé vers 1768 par l'archevêque de Tours, et les biens furent réunis à ceux du collège de Chinon. Le bâtiment prioral du XVIe siècle comprend deux ailes perpendiculaires. Dans l'angle rentrant se dresse une tour polygonale contenant un escalier de pierre à vis, et une autre contenant elle aussi une vis, à l'angle sud-est du bâtiment ouest. Les portes d'accès aux tours sont surmontées d'une grande accolade moulurée, garnie de crochets, amortie par un fleuron s'inscrivant entre deux pinacles surmontant les pilastres. A l'angle nord-est du bâtiment ouest, une tourelle cylindrique est portée en encorbellement par un cul de lampe. Au sud de la cour, un bâtiment du XVIIe siècle servit primitivement d'habitation. La chapelle se trouvait à l'est du bâtiment nord et a été remplacée par un bâtiment moderne après s'être écroulées\r\nfaçades et toitures, à l'exception de celles du bâtiment moderne : inscription par arrêté du 17 avril 1952 aujourd'hui propriétaire Michel le Mastre.                                                                      SASSAY, fief relevant de Chinon, , inscrit aux M.H. depuis 1962.","architecture":"BEAUVAIS, le corps de logis, en moellons enduits avec chaînages et encadrements des baies en pierres, rectangulaire et à deux niveaux, est desservi par un escalier de bois à balustres, sur plan carré. Celui-ci a remplacé la vis d'origine dans une tour hexagonale hors-oeuvre. Au XVIIIe siècle probablement, les baies ont été repercées, surtout sur la façade antérieure. Des ailes latérales plus basses encadrent l'édifice.                                                                                       VILLENEUVE, classique de lhabitat seigneurial rural fortifié des XII et XVe siècles en Anjou. Un périmètre unique enserre le logis seigneurial et les anciens bâtiments d'exploitation. Cette disposition ménage une grande cour centrale accessible par un châtelet porche, charretier et piétonnier, du XIIe siècle. Des jardins historiques ont été restitués autour des bâtiments : cour paysagée,  jardin médiéval.                                                                                                SASSAY, date du XVIe au XVIIe siècle. Le Fief de Sasay relevait de Chinon. Composé d'un bâtiment d'habitation du XVIe siècle sur la façade duquel fait saillie, une tour polygonale d'escalier. Un pavillon du XVIe siècle, adjacent au pignon Ouest du précédent, est percé à son rez-de-chaussée d'un couloir d'accès à la cour, et accompagné à ses angles Nord-Ouest et Nord-Est de tourelles en encorbellement. A l'Ouest, un pavillon presque carré est construit de biais par rapport aux façades des deux précédents édifices. Un long bâtiment formant aile perpendiculaire à la façade Sud du bâtiment principal, date du XVIIe siècle et aboutit à une autre aile très courte, en retour d'équerre. Une fuye cylindrique du XVIe siècle complète l'ensemble.","habitants":"Famille de Michel le Mastre\r\n        \"","divers":"à Ligré, dont la Roches St-Paul grav 1-2-3, Beauvais grav-4 et Villeneuve grav-8.   Sassay grav-7","gps":"","images":["../../jctruffet.com/image/image_37/37_Ligr%c3%a9_1.jpg","../../jctruffet.com/image/image_37/37_Ligr%c3%a9_2.jpg","../../jctruffet.com/image/image_37/37_Ligr%c3%a9_3.jpg","../../jctruffet.com/image/image_37/37_Ligr%c3%a9_4.jpg","../../jctruffet.com/image/image_37/37_Ligr%c3%a9_5.jpg","../../jctruffet.com/image/image_37/37_Ligr%c3%a9_6.jpg","../../jctruffet.com/image/image_37/37_Ligr%c3%a9_7.jpg","../../jctruffet.com/image/image_37/37_Ligr%c3%a9_8.jpg"]},"Consult_chateau_formulaire16ae":{"id":"Consult_chateau_formulaire16ae","dept":"37","canton":"Descartes","commune":"Ligueil","nom":"Ligueil_Epigny","type":"Château","periode":"XVI","histoire":"Deux châteaux à Ligueil Epigny dont celui de Ligueil, la Chancellerie et la Tourmelière.                                                                          LIGUEIL,  petit château dont les deux façades nord et sud sont identiques et divisées en trois travées, la médiane étant en légère saillie et surmontée d'un fronton triangulaire. Deux ailes basses de servitude accostent le château à l'ouest et à l'est, et paraissent plus anciennes. Un parc boisé et clos entoure le domaine. L'édifice a été restauré au XIXe siècle.                                                                La CHANCELLERIE : cette maison forte faisait partie des constructions qui défendaient la porte sud de la ville, doù son nom primitif de Petit Châtelet ; Le nom actuel vient du fait que cette demeure appartint au XVIIe et au XVIIIe siècles à des familles de procureurs de la baronnie dont en particulier la famille Martineau.                                                                 TOURMELIERE pas d'information historique.","architecture":"CHANCELLERIE Il ne subsiste du bâtiment dorigine que lancien châtelet à gauche, en petits moellons, éclairé par des fenêtres étroites à deux panneaux ; lensemble fut modifié au XVIe siècle et la partie droite a conservé une tour polygonale abritant un large escalier à vis.","habitants":"Chancellerie, famille Martineau\r\n        \"","divers":"à Ligueil Epigny dont celui de Ligueil grav-1-2, la Chancellerie grav-3 et la Tourmelière grav-4.","gps":"","images":["../../jctruffet.com/image/image_37/37_Ligueil_Epigny_1.jpg","../../jctruffet.com/image/image_37/37_Ligueil_Epigny_2.jpg","../../jctruffet.com/image/image_37/37_Ligueil_Epigny_3.jpg","../../jctruffet.com/image/image_37/37_Ligueil_Epigny_4.jpg"]},"Consult_chateau_formulairebfb2":{"id":"Consult_chateau_formulairebfb2","dept":"37","canton":"Amboise","commune":"Limeray","nom":"Limeray","type":"Château","periode":"XV-XVI","histoire":"Trois châteaux à Limeray dont Moncé, Avisé,  Plessis et à deux Km  au nord-ouest le château de CHARNIZAY aujourd'hui chambres d'hôtes.                                                                                        AVISE, est un ancien fief relevant d'Amboise. En 1335, Jean d'Avisé, valet, et seigneur de ce fief. L'un de ses successeurs Pierre Forget, écuyer, construisit le manoir est un logis datant de la seconde moitié du XVe siècle, caché au milieu des bois du côteau à la sortie du bourg. Il possède une chapelle à deux travées voûtées dogives, fondée en 1498 et mentionnée dans un registre des visites des chapelles domestiques du diocèse de Tours en 1787.  Classé M.H. le 5 mai 1984                                                                                                  MONCE,  de style néo-Renaissance, a été édifié, de 1845 à 1846, par Charles Alphonse de Sain de Bois le Comte à l'emplacement de l'église de l'abbaye cistercienne de Moncé, fondée en 1209 par Sulpice III d'Amboise avec l'approbation de Jean de la Faye, archevêque de Tours de 1208 à 1228. Déclarée bien national, elle fut détruite pendant la Révolution Française, entre 1792 et 1798. Il ne subsiste de l'abbaye qu'un pavillon du XVIIe siècle, ayant servi d'infirmerie. A la droite du château, un pigeonnier et quatre colonnes servant de piliers de portails à l'ouest. Le jardin d'agrément de Moncé, aménagé au milieu XIXe siècle, a été enregistré au pré-inventaire des jardins remarquables.","architecture":"CHARNIZAY, au début du XIXe siècle,s'appelait le Jauget, château renaissance du XVIe siècle avec un logis et ses deux tours, il est agrandi au XVIIIe siecle par André de Menou qui fait ajouter un bâtiment de chaque côté du premier. C'est au XIXe siècle avec la famille Arthuys puis le comte Thierry de Montesquiou-Fezensac qu'il prend sa physionomie actuelle: le bâtiment ouest est démoli, les balcons sont ajoutés, les granges et la chapelle néo-gothique sont construite.En 1844, tous justes mariés, le comte Thierry de Montesquiou-Fezensac et la comtesse Pauline, née Duroux, achètent un château et ses terres au sud de la Touraine , Leur fils Robert de Montesquiou  Les séjours de Robert à Charnizay sont fréquents.\r\nPLESSIS vers 1900 Appelé Plessis-lès-Iles-Bardes en 1678 et le Plessis-Limeray en 1682. Son nom proviendrait du latin plessiacum qui a donné plaissié en vieux français, qui signifie haie, clôture ou palissade faite de buissons entrelacés, mais aussi place forte. Le château du Plessis est dissimulé dans les arbres, à la sortie du bourg, au 20 de la rue de Pocé. Construit au XVIe siècle, le bâtiment a connu de nombreuses transformations. Il fut étendu une première fois au XVIIe siècle, puis par deux fois au XVIIe siècle, pour être finalement partiellement démoli au milieu du XXe siècle. Il fut successivement habité par Jacques Levillain, Henri et Paul de l'Épinois, M. Le Calvez et Michel-Georges Micberth.","habitants":"Monce;Charles Alphonse de Sain de Bois le Comte                    Plessis; Jacques Levillain                                                      Charnizay; famille Arthuys\r\n        \"","divers":"à Limeray dont Moncé grav-1-2, Avisé grav-7 et Plessis grav-6 et à deux Km  au nord-ouest le château Charnizay grav-3-4-5","gps":"","images":["../../jctruffet.com/image/image_37/37_Limeray_1.jpg","../../jctruffet.com/image/image_37/37_Limeray_2.jpg","../../jctruffet.com/image/image_37/37_Limeray_3.jpg","../../jctruffet.com/image/image_37/37_Limeray_4.jpg","../../jctruffet.com/image/image_37/37_Limeray_5.jpg","../../jctruffet.com/image/image_37/37_Limeray_6.jpg","../../jctruffet.com/image/image_37/37_Limeray_7.jpg"]},"Consult_chateau_formulaire9721":{"id":"Consult_chateau_formulaire9721","dept":"37","canton":"Loches","commune":"Loches","nom":"Loches_37","type":"vestiges château","periode":"XIV-XV","histoire":"LOCHES, en 1429,  Charles VII reçoit Jeanne d'Arc, quelques jours après que cette dernière ait repris la ville d'Orléans aux anglais, (une entrevue avait eu lieu à Chinon deux mois auparavant). Celle-ci l'incite à se rendre à Reims pour recevoir le sacre. La forteresse devient anglaise avec l'avènement des Plantagenêts sur le trône d'Angleterre : Henri II Plantagenêt y ajoute l'enceinte en 1154, dans le cadre de son conflit avec son père, Richard Coeur de Lion s'empare du château avec l'aide de Philippe Auguste. Profitant de la captivité de Richard Coeur de Lion au retour de la troisième Croisade, le traité de Mantes conclu en 1193 avec Jean sans Terre, confie la place à Philippe Auguste. Un an plus tard Richard Coeur de Lion assiège le castrum et le contrôle après seulement trois heures de combat ! Philippe Auguste s'empare ensuite du château de Loches en 1205, après un siège qui durera une année, la forteresse restera désormais sous contrôle français (les anglais assiégeront en vain le château durant la guerre de Cent Ans). Charles VII y reçoit régulièrement sa favorite, Agnès Sorel. Le tombeau de la première maîtresse Royale officielle est conservé dans la Tour de la Belle Agnès.","architecture":"LOCHES ;  une analyse a permis de dater avec précision la date de la construction (1013-1035) et de l'attribuer à Foulques Nerra comte d'Anjou, qui bâtira une douzaine de donjons dans la région. La forteresse de Loches est impressionnante avec son donjon rectangulaire de près de 40 mètres de hauteur qui en fait l'un des plus hauts donjons encore en place et ses contreforts semi cylindriques. Le donjon sert de prison d'état et le roi y installe ses fameuses cages de fer, appelées fillettes, qui doivent leur nom à leur extrême exiguïté. On citera parmi les prisonniers de marque qui y ont été enfermés, le duc de Milan et un ministre de Louis XI, puis le cardinal de la Balue, inventeur des fillettes. Jusquen 1924, le château de Loches garde sa fonction carcérale, permettant indirectement le maintien du site en état, au début du XXe siècle, sous la surveillance dun gardien amateur darchéologie, les prisonniers dégagent une partie des souterrains au sud de lenceinte.                                                                                                     TOUR st-ANTOINE, la Tour Saint-Antoine est un ancien clocher de la chapelle, maintenant disparue. Elle fait aussi office de beffroi de la ville. Elle culmine à 52 mètres et offre une bonne vue des environs de Loches. Construite entre 1529 et 1575, la Tour Saint-Antoine est le seul beffroi Renaissance, de Touraine.","habitants":"Richard Coeur de Lion\r\n        \"","divers":"Loches 47° 07' 41\" Nord et 0° 59' 52\" Est                              TOUR 47° 7' 43,32\" Nord, 0° 59' 56,04\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Loches_37_1.jpg","../../jctruffet.com/image/image_37/37_Loches_37_2.jpg","../../jctruffet.com/image/image_37/37_Loches_37_3.jpg","../../jctruffet.com/image/image_37/37_Loches_37_4.jpg","../../jctruffet.com/image/image_37/37_Loches_37_5.jpg","../../jctruffet.com/image/image_37/37_Loches_37_6.jpg","../../jctruffet.com/image/image_37/37_Loches_37_7.jpg","../../jctruffet.com/image/image_37/37_Loches_37_8.jpg","../../jctruffet.com/image/image_37/37_Loches_37_9.jpg"]},"Consult_chateau_formulaire0dfd":{"id":"Consult_chateau_formulaire0dfd","dept":"37","canton":"Loches","commune":"Mouzay-Chanceaux","nom":"Loches_Environ","type":"Château","periode":"XIX","histoire":"Trois châteaux dans cet article, la Beautertre, Beaurepaire et des Bourbon.  \r\nBEAUTERTRE, la châtellenie devint une vicomté en 1680 au profit de Pierre de Voyer de Paulmy, château de style néo-gothique, a été construit au XIXe siècle, il appartient aujourd'hui à la famille Saint-Olive. La chapelle de l'ancien prieuré de Beautertre, édifiée au XIIe siècle, a été remaniée au XIXe siècle. Ce prieuré appartenait à l'abbaye de Cormery. Sur la commune on trouve également le manoir de la Chaumerie du XIXe siècle. . Du château des Voyer d'Argenson, démoli en 1808, il ne subsiste que le pigeonnier circulaire et quelques communs.                                                                       BEAUREPAIRE, à quelques kilomètres au nord -Est  à Chanceaux  prés de Loches le château , la terre de Chanceaux appartenait jusqu'en 1792 au marquis de La Fayette, a été construit au XIXe siècle pour M. Champoiseau qui s'enrichit dans le commerce de la soierie, ce château est propriété de la famille Beaurepaire depuis sans doute le XVe siècle ; la dernière propriétaire en portant le nom est Odile de Beaurepaire, qui épousa en 1935 Jacques de Saint Germain. Le propriétaire actuel est son fils. le Général Paul-Ivan de Saint Germain l'édifice appartient toujours à cette famille. Un château privé surplombe la petite vallée, il a été construit à la fin du XIXe siècle par la famille Schneider.    Propriétaire du château du MAY  1958-1929 Gaston Cattoir agriculteur et éleveur à Tours (Chanceaux-Près-Loches) au château du May. En 1958, le château est mis en vente.","architecture":"Château des BOURBON  sicile à Chanceaux petit rappel généalogique : la Princesse Anne est le deuxième enfant du Prince Ferdinand de Bourbon-Siciles, duc de Castro et de Chantal de Chevron-Villette. Née en 1957, elle avait été précédée par Béatrice en 1950 (mère du Prince Napoléon) et suivie par Charles, actuel chef de la famille royale des Deux-Siciles, en 1963.  Mariée en 1977 à Roquebrune-sur-Argens, en présence de la mère du roi Juan Carlos dEspagne, avec Jacques Cochin (lui-même fils du baron Cochin). Cette union a été dissoute par divorce. Elle est la mère de Nicolas (1979) et de Dorothée (1985) Cochin.  Ayant fait des études dinterprétariat et dattachée de presse, elle a travaillé un temps chez Balenciaga. La princesse est une figure de la vie mondaine parisienne, même si ces dernières années elle vit une partie de lannée hors de la métropole. Elle est moins impliquée que sa soeur dans la gestion des ordres dynastiques familiaux.","habitants":"Beautertre; famille Saint-Olive                                              Beaurepaire; famille de  Beaurepaire                                    Bourbon; duc de Castro.\r\n        \"","divers":"au environ de Loches la Beautertre grav2, Beaurepaire grav 3-4 et des Bourbon grav-6.                                               Beaurepaire 47° 08' 52\" nord, 0° 56' 20\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Loches_Environ_1.jpg","../../jctruffet.com/image/image_37/37_Loches_Environ_2.jpg","../../jctruffet.com/image/image_37/37_Loches_Environ_3.jpg","../../jctruffet.com/image/image_37/37_Loches_Environ_4.jpg","../../jctruffet.com/image/image_37/37_Loches_Environ_5.jpg","../../jctruffet.com/image/image_37/37_Loches_Environ_6.jpg"]},"Consult_chateau_formulaire8bc3":{"id":"Consult_chateau_formulaire8bc3","dept":"37","canton":"Loches","commune":"Loches","nom":"Loches_II","type":"vestiges Forteresse","periode":"XIV-XVIII","histoire":"Dans cet article le Fort st Louis,  Buissière, Mauvières et Sansac.                                                                                                           FORT ST-LOUIS, sa construction a débuté au XIVe siècle et s'est achevée au XVIIIe siècle, servait à la défense du château. La partie de l'enceinte principale  correspondait au logis royal. L'entrée se faisait grace à 2 portes mais il n'en reste qu'une seule, au nord. Deux tours cylindriques pleines l'entouraient. L'accès à la porte se faisait par un pont dormant d'une arche, mentionné au VIe siècle. La tour était du coté Est de la façade du fort. La partie supérieure a été bâtie, au XVIIe siècle, en même temps que l'immeuble. Elle est couronnée d'un dôme fait en charpente.                                                                                  BUSSIERE, un corps de logis est prolongé de deux ailes en retour d'équerre. A l'angle intérieur de l'aile sud se trouve une tour polygonale d'escalier. Elle est éclairée par six fenêtres en plein cintre, encadrées de pilastres et surmontées d'une frise ornée de médaillons. Sur le corps principal, les ouvertures du premier et les lucarnes sont de style Renaissance. L'aile méridionale est gothique, avec une porte d'entrée en tiers point et une échauguette à l'angle sud ouest. Trois autres échauguettes ont été rajoutées à la fin de l'époque romantique. A l'angle sud est se trouve une grosse tour ronde avec chemin de ronde aux mâchicoulis ornés de trèfles, l'autre tour  qui lui fait pendant au nord est datée du XIXe siècle. L'extrémité de la façade nord a dû être surélevée en pavillon au XIXe siècle, chargé de 2 échauguettes pour obtenir un effet de symétrie contraire au XVe siècle. Il est inscrit aux M.H. depuis 1975.","architecture":"MAUVIERES, la Tour  Le fief de Mauvières, rattaché au château de Loches, était connu depuis le XIe siècle. Loches qui s'étendait, au pied du château de Mauvières, du côté Ouest, était défendue par une enceinte, flanquée de tours et percée de 4 portes. Le château de Mauvières appartient à cette époque à Lisois d'Amboise, sénéchal d'Anjou et fidèle de Foulques Nerra, qui fut le seigneur du château, tout proche. Dans le système de défense de Loches, elle peut constituer un poste avancé au sud, verrouillant l'entrée d'un vallon. Il ne reste que 2 portes depuis. La tour, seul vestige du château, daterait du XIVe siècle. La ville de Loches a racheté la tour en 1920. La Tour de Mauvières est classée aux M.H. depuis 1926.                                                                                     SANSAC, il a été bâti en 1529. Son propriétaire initial était Louis Prévost de Sansac. Le château de Sansac doit son nom à son constructeur, Louis Prévost de Sansac, dont le patronyme provient lui-même du domaine qu'il possède en Saintonge. C'est un château décoré de sculptures, il est construit pour Louis Prévost de Sansac, au début du XVIe siècle. La date 1529 gravée sur un buste de François Ier au-dessus de la porte d'entrée indique la date de fin de construction de la partie centrale du château. Deux ailes basses, en prolongement, ont été rajoutées, au XIXe siècle.","habitants":"Sansac; Louis Prévost de Sansac; pour les autres les seigneurs locaux\r\n        \"","divers":"le Fort st Louis,  Buissière, mauvières et Sansac.                                                  Bussière grav 4.   47° 07' 09\" Nord et 0° 56' 28\" Est        Mauvieres  grav-5- 47° 06' 44\" Nord et 0° 59' 57\" Est            Sansac     grav-6    47° 07' 45,09\" Nord et 1° 00' 28,85\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Loches_II_1.jpg","../../jctruffet.com/image/image_37/37_Loches_II_2.jpg","../../jctruffet.com/image/image_37/37_Loches_II_3.jpg","../../jctruffet.com/image/image_37/37_Loches_II_4.jpg","../../jctruffet.com/image/image_37/37_Loches_II_5.jpg","../../jctruffet.com/image/image_37/37_Loches_II_6.jpg"]},"Consult_chateau_formulairef030":{"id":"Consult_chateau_formulairef030","dept":"37","canton":"Monts","commune":"Sorigny","nom":"Longue_Plaine","type":"Château","periode":"XVIII-XIX","histoire":"LONGUE PLAINE, le château de Longue Plaine a été reconstruit (logis) vers 1715 sur les ruines d'un château féodal de la fin du XIe siècle. Il a été agrandi en 1843 sous la direction de l'architecte Phidias Vestier. Les deux tours datent des XVe et XVIe siècles. La propriété possède un beau jardin à la Française de deux hectares, avec rosiers pleureurs, ifs taillés et allées bordées de pieds de buis. Près de ce château, une tour, peut-être un ancien pigeonnier, et ce qui subsiste avec des restes de douves, du manoir de Montison datant du XVe siècle, aujourd'hui remplacé par une exploitation agricole. Montison était un fief relevant de Montbazon.","architecture":"LONGUE PLAINE, est un château bâti à Sorigny,  La construction du château de Longue-Plaine date du XIXe siècle, sauf les 2 tours qui datent des XVe et XVIe siècles. Les communs de l'ancien manoir de la Tour-Isoré se situent au Sud-Ouest du bourg.","habitants":"Seigeurs locaux\r\n        \"","divers":"A Sorigny: 47° 14' 56,16\" Nord, 0° 39' 27,13\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Longue_Plaine_1.jpg"]},"Consult_chateau_formulaire71f7":{"id":"Consult_chateau_formulaire71f7","dept":"37","canton":"Château-Renault","commune":"Louestault","nom":"Louestault","type":"Château","periode":"XV-XVII","histoire":"Trois châteaux à Louestault, le Beaumont et   la Cantinière. CANTINIERE  au XIe siècle, Louestault était une châtellenie relevant de la baronnie de Châteauneuf, à Tours. Elle passa ensuite à l'aumônerie de la Collégiale de Saint-Martin de Tours qui la vendit le 15 mai 1588 à Pierre Molan, contrôleur et intendant général des finances. Par la suite, elle fut la propriété des familles du Gast, Bouault et de la Grue. Le château de la Cantinière ou Quantinière, était un fief dépendant de Louestault. Il appartenait en 1606 à un nommé Lhuillier et fut hérité ensuite par les du Bouex. Vers 1640, il fut acquis par la famille Bouault, et passa vers 1703 aux Bonnin de la Bonninière de Beaumont. Ce château de la fin du XVIe siècle était fortifié. Il a encore ses douves ainsi deux tours circulaires. Une troisième tour, plus petite, renferme une chapelle remontant au XVIIe siècle. La salle fut alors couverte d'une coupole soutenue par des pilastres dont les chapiteaux portent des armoiries, mais presque effacées aujourd'hui. Sur le côté sud, s'élève un pavillon carré flanqué de deux ailes qui aboutissent chacune à deux tours rondes d'angle, la plus grosse est contiguë à l'aile correspondante et l'autre est reliée à son angle nord par une courtine. Le pavillon central est percé à son rez de chaussée d'une porte et d'un guichet qui étaient munis, l'une et l'autre, de ponts-levis dont on peut encore voir les rainures dans la façade.","architecture":"BEAUMONT-Louestault, La construction du château date du XIIIe, XVI, XVIIIe et XIXe siècle. Beaumont fut d'abord une châtellenie relevant de Maillé et dont le premier seigneur est cité en 1108. Du château du XIIIe siècle, il subsiste un donjon carré découronné, de son chemin de ronde et de son étage supérieur, en 1780. Chaque angle possédait une tourelle en encorbellement, dont il ne subsiste que celle du Nord. Au XVIe siècle, les murs Est et Sud furent percés de fenêtres accostées de pilastres. En même temps, une tour fut élevée de forme octogonale, en briques. Le logis d'habitation se développe au Nord du donjon. La façade a été refaite au XVIIIe siècle. De 1874 à 1880, il a été prolongé par une construction de style Louis XII. Le château de Beaumont-Louestault est inscrit partiellement aux M.H. pour le donjon et la tourelle, depuis le 14/09/1949.","habitants":"Beaumont; famille  de Maillé                                                  Cantinière; Famille  du Gast \r\n        \"","divers":"à Louestault,le Beaumont  grav 1-2-3 et   la Cantinière grav -4-5. Beaumont-Louestaud 47° 34' 14,88\" Nord, 0° 40' 11,64\" Est                                                                                               Cautinière 47° 35' 09\" Nord et 0° 39' 43\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Louestault_1.jpg","../../jctruffet.com/image/image_37/37_Louestault_2.jpg","../../jctruffet.com/image/image_37/37_Louestault_3.jpg","../../jctruffet.com/image/image_37/37_Louestault_4.jpg","../../jctruffet.com/image/image_37/37_Louestault_5.jpg"]},"Consult_chateau_formulaire1cef":{"id":"Consult_chateau_formulaire1cef","dept":"37","canton":"Loches","commune":"Louroux","nom":"Louroux","type":"Domaine","periode":"XV","histoire":"LOUROUX, le prieuré du Louroux, également connu sous le nom de château du Louroux, est situé sur la commune. Il est fondé au cours du XIe siècle par l'abbaye de Marmoutier. Ce monastère bénédictin fait alors partie des neuf prieurés possédés par l'abbatiat tourangeau et implantés dans le diocèse de Tours.Vers le milieu du XVIe siècle, avec le début du régime commendataire au sein de l'abbaye de Marmoutier, le prieuré est transformé en établissement agricole, puis passe sous l'administration de l'archevêché de Tours au milieu du XVIIIe siècle. Loué à des exploitants agricoles, l'ancien prieuré et son domaine sont ensuite vendus comme biens nationaux en 1791.","architecture":"LOUROUX, les bâtiments, construits entre le XIIe et le XXe siècle, sont entourés d'un enclos et d'une enceinte fortifiée d'époque féodale disposant d'un pont-levis et d'un pont dormant. D'époques romane, gothique, Renaissance et enfin classique, l'ensemble comprend plusieurs bâtiments, notamment le logis du prieur, deux granges, une fuye, ainsi qu'une église placée sous le vocable de Saint Sulpice. Le prieuré comportait également un bâtiment de style roman, probablement une « Grande Salle », construit au Moyen Âge et dont il ne subsiste plus que des vestiges.","habitants":"Archevêché de Tours \r\n        \"","divers":"Louroux 47° 09' 38\" nord, 0° 47' 13\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Louroux_1.jpg","../../jctruffet.com/image/image_37/37_Louroux_2.jpg","../../jctruffet.com/image/image_37/37_Louroux_3.jpg"]},"Consult_chateau_formulairebc2b":{"id":"Consult_chateau_formulairebc2b","dept":"37","canton":"St-Cyr sur Loire","commune":"Luynes","nom":"Luynes","type":"Forteresse","periode":"","histoire":"LUYNES, au XIIIe siècle reconstruction de la forteresse. Sous la protection des comtes de Maillé, des marchands passementiers s'y réfugièrent non loin des troubles des guerres de religion. Il date du XIIIe et XVIIe siècle et appartient à une personne privée. au XVe siècle construction du logis de la cour par Hardouin IV de Maillé . Les sires de Maillé reçoivent le ti
