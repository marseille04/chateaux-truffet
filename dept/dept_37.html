A l'est, la porte est reliée par une tour d'escalier en retrait, à la grosse tour d'angle sud-est. Le corps de logis oriental réunit cette tour à celle de l'angle nord-est. Le bâtiment nord comprend la chapelle. L'angle nord-ouest est occupé par une tour qui fut ou est devenu le pigeonnier. Sous la cour se trouvent des souterrains dont les galeries multiples se prolongent très loin.","habitants":"François du Plessis\r\n        \"","divers":"Château de Chillou à Jaulnay  46° 56' 55\" nord, 0° 25' 43\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Chillou_1.jpg","../../jctruffet.com/image/image_37/37_Chillou_2.jpg","../../jctruffet.com/image/image_37/37_Chillou_3.jpg","../../jctruffet.com/image/image_37/37_Chillou_4.jpg"]},"Consult_chateau_formulaire257d":{"id":"Consult_chateau_formulaire257d","dept":"37","canton":"Chinon","commune":"Chinon","nom":"Chinon_Chateaux","type":"Château","periode":"XV-XVI-","histoire":"Cinq châteaux à Chinon, la fuye, Fromentières, la grille , Vauguyon et Vaugaudry.                                                                                 LA FUYE, le fief relevait de Chinon et de Turpenay. En 1559, les propriétaires font fortifier le logis seigneurial. Le manoir présente deux bâtiments en équerre aux hauts pignons dont le rampent en rondelis était orné de crochets. Une tour d'escalier polygonale se place dans l'angle rentrant. Un bandeau sculpté sépare les étages et se décroche pour surmonter l'emplacement de l'écu et les fenêtres de la tour. Des lucarnes ornées de coquilles éclairent les combles. D'importantes tours percées de meurtrières assuraient la défense. Il en subsiste une rectangulaire accolée au château, dont les mâchicoulis sont intacts. Une tour ronde au nord flanquait l'ancienne porte d'entrée. Une autre au sud a perdu sa hauteur primitive. Petite chapelle du XVIIe siècle. Le château est restauré par François Benjamin vers 1970, cheminée en remploi.                                                                        VAUGUYON, ancien fief relevant du château de Chinon. Pendant la Révolution, il est vendu comme bien national. Certaines parties du château médiéval remontent aux XIIe et XIIIe siècles , et au XVe siècle. La distribution intérieure est authentiquement gothique, notamment pour la grande salle du premier étage. Les deux pignons du comble sont décorés de peintures du XIIIe siècle, représentant des cavaliers s'affrontant en tournoi. La fontaine et les portes datent du XVIIe siècle. L'aile du XIXe siècle comporte des éléments gothiques. Certaines pièces ont été restaurées en 1937 par l'architecte Louis Sue pour madame Duthu Zappa","architecture":"FROMENTIERES, demeure seigneuriale bâtie sous Charles VII, formant un fief relevant de Chinon. L'édifice comprenait deux ailes perpendiculaires, limitant la cour à l'ouest. Cette cour était limitée au nord par une aile dont il ne subsiste que le mur pignon. L'aile ouest est accompagnée, à son angle sud-ouest, d'une tour polygonale contenant la vis en pierre reliant les étages.                                                                    GRILLE, les origines remontent aux XVe et XVIe siècles. Acquis en 1748 par Antoine-Jean de Cougny, conseiller du Roi, issu dune vieille famille chinonaise, il fut transformé et rénové au XIXe siècle par le marquis Gustave de Cougny, historien et avocat à Chinon, qui agrandit le domaine en érigeant une chapelle et des dépendances. En 1951, Albert Gosset, issu dune longue lignée de vignerons champenois (14 générations, depuis 1584) en fait lacquisition et jusquà son décès en 1991, il ne cesse dagrandir . En 1995, le château et son domaine deviennent la propriété de Sylvie et Laurent Gosset. Depuis début 2009, le château a lié sa destinée à celle de Baudry-Dutour.                                                                                  VAUGAUDRY, le fief appartenant en 1581 à Jacques Pommyer. Château remontant  au XVIIe siècle, demeure de Philippe Dreux lieutenant général du bailliage de Chinon en 1688, en 1764 propriété de Nicolas d'Arcemale; démoli, puis reconstruit vers 1870, existe sur le premier cadastre. Le bâtiment est composé d'un étage carré et un étage de comble, construction du gros-oeuvre en calcaire et pierre de taille.","habitants":"Grille , Antoine-Jean de Cougny,                                                     Vaugaudry,Nicolas d'Arcemale\r\n        \"","divers":"à Chinon, Danzay grav-2la fuye, Fromentières grav-3, la fuye grav-5 la grille grav-4 ,  47° 10' 04\" Nord, 0° 14' 37\" Est                         Fromentières 47° 12' 23\" Nord et 0° 13' 38\" Est                   Vauguyon 47° 08' 34\" Nord et 0° 14' 08\" Est                                   La fuye 7° 11' 52\" Nord et 0° 15' 50\" Est                                       Vauguyon grav-8 et Vaugaudry grav -6-7","gps":"","images":["../../jctruffet.com/image/image_37/37_Chinon_Chateau_1.jpg","../../jctruffet.com/image/image_37/37_Chinon_Chateau_2.jpg","../../jctruffet.com/image/image_37/37_Chinon_Chateau_3.jpg","../../jctruffet.com/image/image_37/37_Chinon_Chateau_4.jpg","../../jctruffet.com/image/image_37/37_Chinon_Chateau_5.jpg","../../jctruffet.com/image/image_37/37_Chinon_Chateau_6.jpg","../../jctruffet.com/image/image_37/37_Chinon_Chateau_7.jpg","../../jctruffet.com/image/image_37/37_Chinon_Chateau_8.jpg"]},"Consult_chateau_formulaireb56b":{"id":"Consult_chateau_formulaireb56b","dept":"37","canton":"Chinon","commune":"Chinon","nom":"Chinon_Fort","type":"Fort","periode":"XV-XIV","histoire":"CHINON, est un ancien château fort, la construction date du XIVe au XVe siècle. Il est bati sur un éperon rocheux de 400 m de long et domine la Vienne. Son premier propriétaire fut Thibaut 1er, Comte de Blois. C'est un ancien camp retranché de 400m sur 70m de large. Il est composé de 3 forteresses séparées par des douves profondes du Xe-XVe siècles. Les noms de Henri II, de Richard Coeur de Lion, du cardinal Richelieu, et de Charles VII sont rattachés à Chinon. Jeanne d'Arc fut reçue en 1429, dans la grande salle du château de Chinon, et fera légitimer au trône de France, Charles VII, dans une France entièrement envahie par les anglais.  Au XVe siècle, la France est occupée par les anglais ce qui pousse le dauphin, Charles VII, à quitter Paris et à venir se réfugier à Chinon qui deviendra sa résidence principale. Cest sous sa gouverne que les logis prirent leurs configurations définitives et furent témoins dune scène capitale dans lhistoire de France. Jeanne dArc vint rencontrer le roi dans ses appartements pour le convaincre de sa bonne foi et lui demander de lui donner les armes pour délivrer le siège dOrléans. A partir du XVIIe siècle, la forteresse est abandonnée au profit de châteaux plus modernes et ses vieilles pierres somnoleront jusquen 1840, date à laquelle le site fut classé M.H..Son propriétaire actuel est le Conseil Général d'Indre-et-Loire qui en a fait un musée ouvert au public. La forteresse de Chinon est classée aux M.H. depuis 1840 et 1926.","architecture":"CHINON    Les modifications défensives vont apparaître au XIIIe siècle durant la guerre qui opposait les Plantagenêt et les Capétiens. Une guerre  qui fut gagnée par le roi Philippe Auguste qui reprit la forteresse après neuf mois de siège. Cest ainsi que la Touraine deviendra une terre royale et le restera durant des siècles. On fit bâtir de nouvelles murailles autour du fort Saint-Georges puis on ajouta des tours de défense, notamment celle du fort du Coudray. Au XIVe siècle, la forteresse était un point fort dans le royaume, cest dailleurs dans son enceinte que furent enfermés et interrogés les dignitaires templiers, avant dêtre jugés et brûlés à Paris                                                                         BAILLAGE   Sa construction date du XVe siècle. Hôtel constitué par deux corps de bâtiments contigüs avec pignons garnis de crochets. Il est construit au-dessus d'une cave formant rez-de-chaussée. L'angle sud-ouest porte une tourelle cylindrique de quatre étages, en encorbellement sur cul de lampe. L'intérieur a été modernisé. L'édifice, qui servit d'auditoire royal et de maison commune, fut abandonné aux démolisseurs, après l'installation du palais de justice, à son emplacement actuel, vers 1835. Il se trouvait, sous les communs actuels, en partie et, continuait vers la place de l'église. Le palais du baillage est inscrit aux M.H. depuis 1962.","habitants":"Jeanne d'Arc\r\n        \"","divers":"Baillage  47° 10' 01\" Nord et 0° 14' 11\" Est                    Chinon GPS : 47° 10' 05\" Nord et 0° 14' 10\" Est","gps":"47° 10' 05\" Nord et 0° 14' 10\" Est","images":["../../jctruffet.com/image/image_37/37_Chinon_Fort_1.jpg","../../jctruffet.com/image/image_37/37_Chinon_Fort_2.jpg","../../jctruffet.com/image/image_37/37_Chinon_Fort_3.jpg","../../jctruffet.com/image/image_37/37_Chinon_Fort_4.jpg","../../jctruffet.com/image/image_37/37_Chinon_Fort_5.jpg","../../jctruffet.com/image/image_37/37_Chinon_Fort_6.jpg","../../jctruffet.com/image/image_37/37_Chinon_Fort_7.jpg","../../jctruffet.com/image/image_37/37_Chinon_Fort_8.jpg","../../jctruffet.com/image/image_37/37_Chinon_Fort_9.jpg"]},"Consult_chateau_formulaire4583":{"id":"Consult_chateau_formulaire4583","dept":"37","canton":"Loches","commune":"Chédigny","nom":"Chédigny","type":"Château","periode":"XV-XVI","histoire":"Dans cet article le château de Chédigny, du Breuil, hubaudière et de la Roche St-Quintin.                                                                                                  CHEDIGNY, le château du BREUIL Rochereaux était le logis de la seigneurie St-Michel qui relevait du château de Loches avec droits de haute, moyenne et basse justice. Le premier seigneur connu fut un Bochard de Saint-Michel,  La partie ancienne de l'édifice remonte au XVe siècle, époque où le domaine était un fief relevant du château de Loches. Le corps de bâtiment est flanqué d'une tourelle polygonale renfermant un escalier en bois dont la rampe est le résultat d'une véritable prouesse technique. A la fin du XIXe siècle le logis est repris et agrandi par son nouveau propriétaire, monsieur Beaussier, directeur de journal. Il fait appel à l'architecte Léon-Marie Massé, de Tours, et au paysagiste Alexandre Chevallier, également tourangeau, pour le dessin du parc. Les travaux de construction commencent en 1885. Un pavillon rectangulaire et une grosse tour ronde couronnée de faux mâchicoulis et couvert d'un toit en poivirère sont alors ajoutés. Monsieur Beaussier, faisant faillite en 1889, vend la propriété à monsieur Dauprat, secrétaire de Ferdinand de Lesseps, qui acheva les aménagements intérieurs.","architecture":"à deux Kilomètres à l'Est le château de la Roches St-Quintin.                                                                                              ROCHES St-QUINTIN, il est de style Renaissance. Sa construction date du XIVe au XVIe siècle. Ce fut la dernière demeure d'Adam Fumée. Le château des Roches-Saint-Quentin est aussi nommé ancien château, les fortification date du XIVe siècle dont il ne reste qu'une tour cylindrique, qui fut surélevée à la Renaissance. Elle est surmontée d'un dôme et d'un lanternon. Le château des Roches voit naître Jeanne-Marie de Maillé, il  deviendra ensuite la propriété d'Adam Fumée, qui était un conseiller influent de plusieurs rois de France. Ses descendants feront construire la majeure partie du château contemporain. La tour, ainsi qu'une fuie datant du début du XVIe siècle, sont inscrites aux M.H. La légende raconte que Charles VII avait pris l'habitude d'enfermer, sa favorite Agnès Sorel, au dernier étage de la tour, quand il chassait en forêt de Loches. Cette tradition est démentie car le dernier étage de la tour n'était pas encore construite, à l'époque d'Agnès Sorel. Elle ne fut bâtie que 100 ans plus tard. Le château des Roches-Saint-Quentin est devenu, en 2014, le siège de la paroisse Saint-Jean des-Roches. Il accueille plusieurs frères de la communauté Saint-Jean.","habitants":"Breuil, Famille Beaussier                                                          Roches ;Famille Maillé\r\n        \r\n        \r\n        \r\n        \"","divers":"A chérigny ,le château de Chédigny grav-Quintin grav 6-7-8   39\" Nord, 1° 00' 01\" Est grav 1-2-3 la touche grav-4","gps":"","images":["../../jctruffet.com/image/image_37/37_Ch%c3%a9digny_1.jpg","../../jctruffet.com/image/image_37/37_Ch%c3%a9digny_2.jpg","../../jctruffet.com/image/image_37/37_Ch%c3%a9digny_3.jpg","../../jctruffet.com/image/image_37/37_Ch%c3%a9digny_4.jpg"]},"Consult_chateau_formulairee0bf":{"id":"Consult_chateau_formulairee0bf","dept":"37","canton":"Chinon","commune":"Cheillé","nom":"Chéillé","type":"Château","periode":"XV-XVI","histoire":"A Cheillé le château de Chenier, du Cour au Berruyer, de Ploquinière et Fontenay                                                                                              CHENIER, fut le siège d'un fief d'officiers. Fortifié et entouré de douves, le château fut construit au XVIe siècle, agrandi au XVIIe siècle. L'édifice comprend un corps de bâtiment d'habitation du XVIe siècle, au comble éclairé de lucarnes amorties par un gâble sculpté. Les percements des deux façades ont été modifiés au XVIIe siècle. Il fut agrandi à cette époque par un pavillon ajouté au nord qui fait saillie sur la façade Est. Une tour ronde appartenait à l'enceinte du XVIe siècle et reliée au château par un bâtiment moderne. La porte d'entrée dans la cour, en plein cintre, est ouverte dans un pavillon carré accosté de bâtiments de servitudes prolongés par des bâtiments modernes. A l'ouest de la cour, est bâti un bâtiment de communs dont la porte en plein cintre est accostée de pilastres. Au sud ouest se trouve un pavillon carré également du XVIIe siècle.                                                                     COUR au BERRUYER, le château doit son nom à son premier possesseur connus, Philippe Berruyer. Son fils Gérard est qualifié en 1170 de \"haut et puissant seigneur de la Cour au Berruyer\".                                                                                               PLOQUINIERE, au coeur de la forêt de Chinon,  (anciennement appelé le \"Manoir de Maupas\"), ancien fief avec sa magnifique fuie du XVI est le lieu idéal pour votre mariage.","architecture":"COUR au BERRUYER, constitue une position stratégique de premier ordre. Ce qui explique la présence, dès le XIIe siècle, de la demeure seigneuriale plusieurs fois remaniée jusqu'au XVIe siècle. Le château se compose d'un corps de logis principal, élevé à l'époque de Henri II, qui se termine, sur une cour, par une tour avec escalier et une aile basse en retour à son autre extrémité. Près du portail de l'avant-cour s'élève un ancien petit manoir. De hautes lucarnes, couronnées de frontons, ornent les toitures, lesquelles sont surmontées d'importantes souches de cheminées en pierre et briques. L'aile en retour présente un rez-de-chaussée à galerie sur arcades. Le manoir est percé, côté château, de fenêtres superposées encadrées de pilastres, datant de la première Renaissance.","habitants":"Cour; Philippe Berruyer\r\n        \r\n        \"","divers":"A Cheillé le château de Chenier   grav 1-2      47° 14' 33\" nord, 0° 26' 50\" est  , du Cour au Berruyer grav 3-4-5            47° 15' 25\" nord, 0° 24' 36\" Est , de Ploquinière grav-6  et de Fontenay grav 7-8.    Cour 47° 15' 25\" Nord, 0° 24' 36\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Cheill%c3%a9_1.jpg","../../jctruffet.com/image/image_37/37_Cheill%c3%a9_2.jpg","../../jctruffet.com/image/image_37/37_Cheill%c3%a9_3.jpg","../../jctruffet.com/image/image_37/37_Cheill%c3%a9_4.jpg","../../jctruffet.com/image/image_37/37_Cheill%c3%a9_5.jpg","../../jctruffet.com/image/image_37/37_Cheill%c3%a9_6.jpg","../../jctruffet.com/image/image_37/37_Cheill%c3%a9_7.jpg"]},"Consult_chateau_formulaireed04":{"id":"Consult_chateau_formulaireed04","dept":"37","canton":"Langeais","commune":"Cinq Mars la pile","nom":"Cinq_Mars_Pile","type":"Vestiges Château","periode":"XIII-XV-XVIII","histoire":"Deux châteaux à Cinq-Mars dont celui de Cinq-Mars et de Farinière.                                                                                                              CINQ-MARS, avec ses tours, ses douves, ses fortifications,  est le type classique du château féodal. Le premier seigneur connu vivait en 1050. A la suite de l'exécution du propriétaire, Henri de Ruzé d'Effiat, grand écuyer et favori du Roi, en 1642, la forteresse fut rasée sur l'ordre de Richelieu. En 1768  la seigneurie passe aux Choiseul et au XXe siècle  les vestiges du châteauson restaurés par la famille  Untersteller.                                                                                                                Le château comprend actuellement le logis des gardes, du XVe siècle, dont les façades ont été modifiées aux XVIIIe et XIXe siècles, qui se développe entre deux tours rondes, dont celle du nord est accompagnée d'une tour d'escalier. La forteresse est entourée de douves refaites au XVIe siècle. Le pont-levis a été remplacé par un pont dormant à trois arches. Des quatre tours reliées par des bâtiments ou des courtines, subsistent la tour Est, la tour sud du XIIIe siècle, et la base de la tour nord, donjon de la fin du XIIe siècle. Les étages supérieurs ont été détruits. Un crénelage moderne fantaisiste couronne les tours. Un ouvrage avancé, dit l'Eperon, de plan triangulaire, s'étend au sud-est de la forteresse. L'angle saillant est occupé par une échauguette. Il fut construit ou remanié au XVIe siècle, en même temps que les douves. A l'angle correspondant de la muraille supérieure des douves, se dresse une tour cylindrique datant du XVe siècle qui contenait une vis en pierre qui permettait aux seigneurs de descendre du château au prieuré contigü à l'église.","architecture":"FARINIERE, en 1730 la charpente du corps de Logis central fut refaite pour M. Césard Tascherau Despictières, inspecteur général d'artillerie, chevalier de l'ordre royal et militaire de Saint Louis, maréchal des camps de Sa Majesté, propriétaire de la Farinière en 1722. Durant cette même année, divers travaux furent réalisés, création d'ouvertures supplémentaires ainsi que la création des deux escaliers extérieurs en pierre de taille permettant de passer de la terrasse à la cour d'honneur. Les travaux ont été réalisé au XXe siècle pour s'achever en 1955. Le château comprend un corps de logis central, dont le premier étage de la façade sud forme le rez-de-chaussée de la façade nord. Ce bâtiment central se développe entre deux pavillons plus élevés d'un étage, et dont celui du côté ouest est accompagné d'une aile en retour vers l'est. Une galerie couverte d'une terrasse réunie cette aile à la façade ouest du pavillon opposé. Une aile en retour d'équerre, vers l'est, et construite en retrait du pavillon Est, prolonge le château de ce côté.","habitants":"Cinq Mars Henri de Ruzé d'Effiat.                                Farinière M. Césard Tascherau Despictières\r\n        \"","divers":"à Cinq-Mars dont celui de Cinq-Mars grav 1 à 5 et de Farinière.  Cinq Mars 47° 20' 51,79\" Nord, 0° 27' 44,18\" Est        Farinière  47° 21' 08\" Nord et 0° 28' 29\" Est  grav-6","gps":"","images":["../../jctruffet.com/image/image_37/37_Cinq_Mars_Pile_1.jpg","../../jctruffet.com/image/image_37/37_Cinq_Mars_Pile_2.jpg","../../jctruffet.com/image/image_37/37_Cinq_Mars_Pile_3.jpg","../../jctruffet.com/image/image_37/37_Cinq_Mars_Pile_4.jpg","../../jctruffet.com/image/image_37/37_Cinq_Mars_Pile_5.jpg","../../jctruffet.com/image/image_37/37_Cinq_Mars_Pile_6.jpg","../../jctruffet.com/image/image_37/37_Cinq_Mars_Pile_7.jpg"]},"Consult_chateau_formulaire73b0":{"id":"Consult_chateau_formulaire73b0","dept":"37","canton":"Bléré","commune":"Civray de Touraine","nom":"Civray_Touraine","type":"Château","periode":"XV-XVIII","histoire":"Deux châteaux à Civraydont celui de Civray  et de Mesvres. CIVRAY, a remplacé un édifice plus ancien. Il a été construit en 1715 pour le tourangeau Louis Lhomme de La Pinsonnière. Les plans auraient été établis par Germain Boffrand pour un premier projet de Montgeoffroy en Anjou. Il a été remanié sous la Restauration et prolongé par deux pavillons. La propriété, située à l'est du village, close de murs, couvre 4 hectares. Un jardin régulier précède le château orienté nord sud, deux terrasses dominent au sud un parc paysager, arrêté en contrebas par le remblai de la voie ferrée. Dans ce parc une crypte abrite le caveau familial, l'angle nord-est de la propriété est occupé par la cour des communs datés de 1635.","architecture":"MESVRES, des vestiges importants de la forteresse du XIIe siècle sont constitués par d'épaisses murailles en opus spicatum qui furent conservées et utilisées au XVe siècle, lors de la reconstruction du château. Du côté sud se dresse le donjon carré, reconstruit à plusieurs époques, comme en témoignent les reprises. La base est du XIIIe siècle et le sommet du XVe siècle. La porte en tiers point aujourd'hui remplacée par une baie, était défendue par un pont levis et par une bretèche. A l'est du donjon, la chapelle, dont le mur sud date du XIIIe siècle, fut refaite au XVe siècle. Une cheminée indique qu'elle fut utilisée comme habitation. Au nord-est de la demeure s'ouvre dans une tranchée, la porte en tiers point de souterrains dont la profondeur donne une idée de l'étendue de la forteresse d'origine.","habitants":"Civray; Louis Lhomme de La Pinsonnière\r\n        \"","divers":"Deux châteaux à Civray dont celui de Civray   grav 3-4-5             47° 19' 55\" nord, 1° 03' 02\" Est. et de Mesvres   47° 20' 41\" nord, 1° 01' 06\" Est. Grav 1-2","gps":"","images":["../../jctruffet.com/image/image_37/37_Civray_Touraine_1.jpg","../../jctruffet.com/image/image_37/37_Civray_Touraine_2.jpg","../../jctruffet.com/image/image_37/37_Civray_Touraine_3.jpg","../../jctruffet.com/image/image_37/37_Civray_Touraine_4.jpg","../../jctruffet.com/image/image_37/37_Civray_Touraine_5.jpg"]},"Consult_chateau_formulaire04ac":{"id":"Consult_chateau_formulaire04ac","dept":"37","canton":"Loches","commune":"Perrusson","nom":"Cloutière","type":"Château","periode":"XVIII","histoire":"CLOUTIERE,  fief de la famille de Bizoton au XVIe siècle, relevait du château de Loches Emmanuel de Biraudin gendre de yves Bizoton porte le titre de seigneur de la Cloutière le fils ainé du ménage Honorat lieutenant du roi, marié deux fois aura plusieurs fils dont Antoine  fondateur de la branche de la Grenouillère, Honorat acquiert en 1619 le fief de Mauvières et son vieux donjon. Le fils d'Honorat Louis épouse Marie Chaspoux, puis devenu veuf, convole avec Françoise Gaberot dont il aura un fils, Jean -Honorat aïeul de la mère  d'Alfred de Vigny, le fils né du premier mariage Louis hérite de la Cloutière et passera à son fils appelé aussi Louis ce dernier sera lieutenant du roi pour Loches et Beaulieu épousa Marie-Françoise de Bourgainvlle  aura trois filles et meurt en 1768 , l'une d'elle Jeanne-Louise  se marie en 1774 avec Bernard comte de Chambray le dernier seigneur de la Cloutière et cède le domaine en 1813 à l'un des créanciers le vicomte de Flavigny, la fille de ce dernier la comtesse d'Algout vit une liaison avec Frantz Liszt écrivain sous le nom de Daniel Stern. Elle hérite de la Cloutière qu'elle revend  en 1864 à Onfroy de Bréville qui s'en défait en 1894 au profit de monsieur René Devaulx de Chambord.","architecture":"CLOUTIERE, construit au XVIIIe siècle, achevé à la Révolution a succédé à un manoir dont subsistent quelques vestiges, un pan de mur flanqué d'une tourelle et d'une tour circulaire recouvert de tuiles. Le château  de style Louis XVI se compose d'un corps de logis central élevé sur trois niveaux et prolongé par deux petites ailes ne comptant qu'un rez-de-chaussée, la partie central du corps principal est coiffée d'un toit brisé, côté cour , la construction possède un avant corps à pans arrondis couronné comme les ailes latérales d'une balustrade, la porte d'entrée s'encadre dans la travée axiale, décorée de bossages en table, s'ouvre entre deux pilastres supportant un fronton triangulaire sous un entablement décoré d'une frise de triglyphes et de cercle. La façade opposée comporte en son centre un avant-corps en légère saillie, à trois travées, la porte plein cintre surmontée d'un fronton en demi-cercle. Une corniche à modillons souligne la base du toit et un grand fronton triangulaire, percé d'un oculus, somme l'avant corps.","habitants":"Famille de Bizoton \r\n        \"","divers":"à Perruson le château de Cloutière","gps":"","images":["../../jctruffet.com/image/image_37/37_Clouti%c3%a8re_1.jpg","../../jctruffet.com/image/image_37/37_Clouti%c3%a8re_2.jpg"]},"Consult_chateau_formulaire440b":{"id":"Consult_chateau_formulaire440b","dept":"37","canton":"Chinon","commune":"Seuilly","nom":"Coudray_Montpensier","type":"Forteresse","periode":"XIV-XV","histoire":"COUDRAY-MONTPENSIER, aux mains des Marmande, édifié au XIVe siècle par Marie de Blois, veuve de Louis Ier d'Anjou qui céda le domaine en 1401 à Pierre et Louis de Bournan seigneur de Montpensier poursuivit les travaux. Après avoir réuni le domaine de Montpensier à celui du Coudray,  revint à son fils Louis qui le laissa à sa veuve Jeanne Sarrazin maîtresse  de Louis bâtard de Bourbon entreprend de nouveaux travaux en 1481. À sa mort en 1486, sa femme Jeanne de France poursuit les travaux d'embellissement du château du Coudray-Montpensier.  de 1545 à 1693 le domaine appartient à la famille d'Escoubleau qui passa ensuite aux Bouex, puis de 1714 à 1770 aux la Vallière et de 1770 à la fin du XIXe siècle aux la Motte Baracé;  Restauré,     à partir de 1912 par la comtesse   G. de Durfort,   et abrite aujourd'hui un centre de rééducation . Le château est inscrit à l'inventaire des M.H. depuis 1926.  Racheté par l'écrivain belge Maurice Maeterlinck vers 1916, il fut acquis en 1930 par l'avionneur Pierre-Georges Latécoère qui entreprit sa restauration en compagnie de l'architecte blésois, Henri Lafargue et le paysagiste Albert Laprade. Entièrement restauré, le château du Coudray-Montpensier est devenu un lieu d'hôtellerie, de restauration et de réception.","architecture":"COUDRAY-MONTPENSIER au milieu du XIIIe siècle, un premier logis fortifié été édifié au XIVe siècle Il est de style Médiéval.  Un donjon formé d'une tour, est mentionné dans les sources. Le château actuel a été édifié au XIVe siècle et  embelli au XVe siècle. Le château est composée de 3 corps de bâtiment, tous couverts de toits d'ardoises et disposés dans une cour quadrangulaire : l'aile Sud comprend le châtelet d'entrée. A l'Est, se trouve le logis principal. Au Nord, l'aile basse, accolée à la tour d'escalier, de plan polygonal adjacente au logis. Aux 3 angles, on trouve des tours différentes flanquées de contreforts et de chemin de ronde avec des mâchicoulis. Les tours Nord-Est et Nord-Ouest sont différentes par leur taille, le pont, les douves,  le pavillon médiéval appelé le pavillon Louis XIII, les communs, le pavillon d'entrée, ainsi que les jardins clos en terrasse, lancien verger et lallée dite de Seuilly sont classés sur la liste des M.H.  Le château du Coudray-Montpensier, où se déroule une partie de l'action des guerres, dans Gargantua et, où Jeanne d'Arc aurait résidé en 1429.    Au XVIIIe siècle, une série de bâtiments est ajoutée : les écuries, le puits, un autre bâtiment dans le prolongement des écuries, d'autres bâtiments détachés du château et les jardins. Au XVIIIe siècle, l'architecte Anjubault fit aménager les 3 terrasses du jardin au nord du château.","habitants":"Marie de Blois et  Louis de Bournan \r\n        \"","divers":"Château de Coudray-Montpensier  à Seuilly  47° 07' 34\" Nord, 0° 10' 08\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Coudray_Montpensier_1.jpg","../../jctruffet.com/image/image_37/37_Coudray_Montpensier_2.jpg","../../jctruffet.com/image/image_37/37_Coudray_Montpensier_3.jpg","../../jctruffet.com/image/image_37/37_Coudray_Montpensier_4.jpg","../../jctruffet.com/image/image_37/37_Coudray_Montpensier_5.jpg","../../jctruffet.com/image/image_37/37_Coudray_Montpensier_6.jpg"]},"Consult_chateau_formulairedd16":{"id":"Consult_chateau_formulairedd16","dept":"37","canton":"Langeais","commune":"Courcelles de Touraine","nom":"Courcelles_Touraine","type":"Château","periode":"XV-XVII","histoire":"A Viviers des Landes trois châteaux  celui de Viviers, des Haies , de Chantilly et des Sept-Tours.                                                        VIVIER des LANDES, En 1450 fief de Pierre Leclerc   au XVIe siècle  possessions de Gilles de Laval Loué qui le lègue à sa belle-fille Jeanne de France, en 1607  la terre est aux mains de Jean de Savonnières seigneur des Hayes qui fut inhumé en 1612, sa veuve Jacqueline de Menon de Turbilly convole avec Jacques de Féizeau,  le fils de ce dernier Jacques qui sera tué en 1635 avait épousé  la fille née du premier mariage de sa marâtre. En 1676   le seigneur du Vivier et   Pierre Goyet garderont pendant un siècle le domaine passant par alliances au Fesques puis aux Roulleau, en 1770, Louis César Roulleau le cède à Henri René d'Heliand  duc de d'Orléans. c'est ce dernier qui en 1815 aliène le Vivier au profit de Thomas Stanhope Holland, les travaux sont achevés dès 1822 en 1829 le domaine est vendu  à la comtesse de Puget chanoinesse, saisi et adjugé à deux frères Thomas et Adolphe Rondeau et en 1842 le comte Arthur- Cossé-Brissac et son épouse née sainte-Aldegonde le revendent à Léon-Félix Loysel dont les descendants  l'occuperont jusqu'en 1939.                                                                                        DES HAYES, fief relevant de la baronnie de Rillé, fut élevé au XVe siècle à la place d'un édifice plus ancien  du XIVe siècle, et dont reste au nord une tour cylindrique. Le bâtiment est flanqué, à l'angle nord-est, d'une tour carrée dont l'étage supérieur a été supprimé, et à son angle sud-ouest, d'une autre tour rectangulaire, qui fut également supprimée au XVIIe siècle. Sur la façade sud, fait saillie une tour polygonale contenant un escalier à vis en pierre. Au XVIIe siècle, l'édifice a été prolongé à l'ouest par un bâtiment de même élévation. Une chapelle fut élevée à l'ouest de la cour, limitée à l'est par un bâtiment de communs qui aboutit, au sud, à une tour carrée du XVe siècle","architecture":"VIVIER des LANDES, l'existence est attestée depuis le milieu du XVe siècle, fut jadis un fief relevant du château de Vallière. Un noyau du XVe siècle a été modifié et agrandi en style néo-gothique de la première moitié du XIXe siècle, par Thomas Holland, qui employa pour cela des pierres provenant du château de Vaujours tout proche. Les deux tours de la façade occidentale ont été rajoutées entre 1843 et 1846. La tour polygonale reçoit un placage de colonnes aux angles et  couronnée d'une toiture au XXe siècle.  Les communs sont de style néo-classique. Hôtel de charme dit des Sept-Tours.                                                                       CHANTILLY, logis seigneurial du XVIe siècle, ayant subi des remaniements. Il se prolonge à l'ouest par une porte fortifiée, bâtiment rectangulaire dont la façade nord conserve les rainures du pont-levis et dont l'angle nord-ouest porte sur un cul-de-lampe une tourelle. A l'intérieur, la moitié ouest du rez-de-chaussée du bâtiment d'habitation était occupée par une salle unique dont le plafond du XVIIe siècle présente des compartiments ayant reçu une décoration différente.                                                                               Château des SEPT-TOURS, hôtel  restaurant, golf, repris en 2013 par le Groupe Docte Gestion. Laccès au château se fait par la porte entre les deux tours médiévales qui mène au hall daccueil où a été reconstruit à lidentique la cheminée monumentale du XVe siècle.","habitants":"Famille de   Pierre Goyet\r\n        \"","divers":"A Viviers des Landes trois châteaux  celui de Viviers des Haies grav-7 et de Chantilly     47° 28' 59\" Nord, 0° 18' 33\" Est      grav 5-6         Vivier_Lande   47° 28' 55? nord, 0° 21' 40? est grav-1             Sept-tour grav 2-3-4-6-","gps":"","images":["../../jctruffet.com/image/image_37/37_Courcelles_Touraine_1.jpg","../../jctruffet.com/image/image_37/37_Courcelles_Touraine_2.jpg","../../jctruffet.com/image/image_37/37_Courcelles_Touraine_3.jpg","../../jctruffet.com/image/image_37/37_Courcelles_Touraine_4.jpg","../../jctruffet.com/image/image_37/37_Courcelles_Touraine_5.jpg","../../jctruffet.com/image/image_37/37_Courcelles_Touraine_6.jpg","../../jctruffet.com/image/image_37/37_Courcelles_Touraine_7.jpg","../../jctruffet.com/image/image_37/37_Courcelles_Touraine_8.jpg"]},"Consult_chateau_formulaired82b":{"id":"Consult_chateau_formulaired82b","dept":"37","canton":"Descartes","commune":"Barrou","nom":"Courtils","type":"Château","periode":"XV-XVIII","histoire":"COURTILS, vers 470, Barrou est un Vicus et un Pagus ; l'évêque saint Perpet y fonde une église vers 480 ; dès le Xe siècle, Barrou perd de son importance ; les bénédictins de Preuilly ont le droit de présenter à la desserte de la nouvelle église paroissiale et prieurale saint Maurice, bâtie au XIe siècle, au XIIIe siècle, le fief de Barrou relève de la châtellenie de La Guerche et de la baronnie de Preuilly ; en 1222, Jean du Pont donne le fief à l'abbaye de la Merci Dieu ; au XIVe siècle, Barrou est un fief de dernier ordre, son logis seigneurial est inexistant et son domaine très réduit ; deux seigneuries coexistent sur le territoire de Barrou : la commanderie de templiers de l'Epinât bâtie au XIIe siècle et la seigneurie des Courtils mentionnée en 1442. Le château des Courtils constituait un fief relevant de la baronnie de Preuilly ; la première mention connue date de 1442; il reste les vestiges d'une maison-forte et des souterrains,  du XVe siècle; le château a pu être construit par Honorât François capitaine, gouverneur du Grand Pressigny, propriétaire en 1600.","architecture":"COURTILS. le château est modifié et agrandi au XVIIIe siècle, une chapelle est mentionnée en 1787, les communs sont du XVIIIe siècle, revus au XIXe, le château est détruit en 1969 à l'exception d'un pavillon du XVIIe siècle et de l'escalier XVIIIe siècle remployé dans la nouvelle maison. Le château restitué, présente trois corps de bâtiment, l'un du XVIIe siècle, les deux autres du XVIIIe siècle, en moellon enduit avec un étage carré, des travées et un toit à longs pans et croupe; un appentis du XVIIIe siècle est à longs pans brisés et croupe brisée; le pavillon du XVIIe siècle restant est en partie en moellon et en partie en pierre de taille avec deux étages carrés, un étage en surcroît et des travées.","habitants":"Honorât François capitaine\r\n        \"","divers":"Château de Courtils à Barrou","gps":"","images":["../../jctruffet.com/image/image_37/37_Courtils_1.jpg","../../jctruffet.com/image/image_37/37_Courtils_2.jpg"]},"Consult_chateau_formulairef7ec":{"id":"Consult_chateau_formulairef7ec","dept":"37","canton":"Ste-Maure de Touraine","commune":"Crissay sur Manse","nom":"Crissay","type":"Château","periode":"XIII-XV","histoire":"CRISSAY; ou Crisse, qui au IXe siècle se nommait Chrisseium et Crissiacum au XIe, était une châtellenie relevant de l'Île-Bouchard, et pour une partie de son territoire de l'archevêché de Tours. Elle appartenait au IXe siècle à l'abbaye de Cormery, qui fut confirmée dans sa possession par les lettres de Charles le Chauve entre 823 et 877. Bouchard de l'Île en fut le premier seigneur connu et cité dans sa charte de 1084 ; après lui vint Jacques Turpin, en 1120, dont les descendants possédèrent le domaine jusqu'au 1er juillet 1632. À cette date, la terre fut saisie par décret à l'encontre de Charles Turpin et adjugée à Michel d'Évrard, capitaine gouverneur de Chinon. Les de Beauvau, puis les Choiseul lui succédèrent comme seigneurs de Crissé, au cours du XVIIIe siècle.","architecture":"CRISSAY, le château féodal partiellement détruit au cours de la guerre de Cent Ans, fut rebâti à la fin du XVe siècle sur les fondations d'une très ancienne forteresse ; il subsiste un donjon du XIIIe siècle avec souterrains refuges creusés dessous. La chapelle seigneuriale date du début du XIe siècle restaurée en 1867. Le bourg de Crissay conserve de beaux logis des XVe et XVIe siècles, qui attestent de son importance passée.                                                                                           Maison de Crissay un ensemble de demeures de gentilshommes, il abritait certainement des membres de la cour de Charles VII. Cette maison est élevée d'un rez-de-chaussée, de deux étages et d'un comble éclairé de trois lucarnes de pierre à gâble triangulaire amorti par un fronton courbe.","habitants":"Famille de Jacques Turpin\r\n        \"","divers":"Château féodal de Crissay sur Manse 47° 08' 59? nord, 0° 29' 02? est","gps":"","images":["../../jctruffet.com/image/image_37/37_Crissay_1.jpg","../../jctruffet.com/image/image_37/37_Crissay_2.jpg"]},"Consult_chateau_formulairead82":{"id":"Consult_chateau_formulairead82","dept":"37","canton":"Bléré","commune":"La Croix-en-Touraine","nom":"Croix_Touraine","type":"Château","periode":"XV- XVI-","histoire":"Trois châteaux à la Croix de Touaine dont celui de la Croix, de la Gaillardière  et de Paradis.                                                                                 La GAILLARDIERE, l'actuel château de la Gaillardière a sans doute été remaniée en 1743. Une demeure noble existait antérieurement. Il en subsiste quelques traces, notamment une tour carrée à usage de colombier, datant   du XVIe siècle, et conservant des boulins circulaires en terre cuite. Au sud, un fronton en tympan couronne la partie centrale de pierre de taille en saillie, les deux jambages de cette saillie sont taillés en pilastres plats, surmontés de chapiteaux aboutissant aux extrémités du fronton. Une grande terrasse prolonge le niveau des salons et surplombe le parc,  voir le site   sur la CROIX, demeure seigneuriale bâtie sous Charles VII, formant le fief relevant de Chinon. L'édifice comprenait deux ailes perpendiculaires, limitant la cour à l'ouest. Cette cour était limitée au nord par une aile dont il ne subsiste que le mur pignon. L'aile ouest est accompagnée, à son angle sud-ouest, d'une tour polygonale contenant la vis en pierre reliant les étages.","architecture":"PARADIS,  formait un fief relevant de la seigneurie des Cartes. Le château fut probablement bâti à la fin du XVe siècle ou au début du XVIe siècle. Le château se composait alors d'un corps de bâtiment percé de fenêtres accostées de pilastres et tourelle d'escalier saillant sur la façade sud ainsi que d'une aile en retour d'équerre vers le nord. De cette aile ne subsiste que le mur ouest. En 1767, le Paradis fut acquis par le duc de Choiseul qui fit transformer le château en reconstruisant l'aile orientale sur un plan plus important, et l'aile en retour, prolongée par deux pavillons. Le château fut prolongé au nord et au sud dans la même architecture, à la place des deux pavillons. Au rez-de-chaussée, dans une salle ont été transférées des boiseries et un plafond peint provenant de l'hôtel Joyeuse d'Amboise et une cheminée de pierre provenant de Chanteloup. Au nord-est subsiste la fuye du XVIe siècle.","habitants":"Seigneurs locaux et le duc de Choiseul \r\n        \"","divers":"Trois châteaux à la Croix de Touraine dont celui de la Croix, de la Gaillardière grav- 4,    47° 20' 30\" nord, 0° 58' 43\" Est, et de Paradis  Grav-2-3       47° 21' 59\" nord, 1° 00' 41\" Est.","gps":"","images":["../../jctruffet.com/image/image_37/37_Croix_Touraine_1.jpg","../../jctruffet.com/image/image_37/37_Croix_Touraine_2.jpg","../../jctruffet.com/image/image_37/37_Croix_Touraine_3.jpg","../../jctruffet.com/image/image_37/37_Croix_Touraine_4.jpg"]},"Consult_chateau_formulaireecd9":{"id":"Consult_chateau_formulaireecd9","dept":"37","canton":"Château-Renault","commune":"Cérelles","nom":"Cérelles_II","type":"Château","periode":"XVII","histoire":"CHESNAYES, au XVIIIe siècle la Chesnaye appartient à un certain sieur Lemoine de Fongrouge et le moulin de Renouard à Gabriel de Rasilly (1648-1712) qui l'a eu de son parrain Gabriel Taschereau de Linières, propriétaire de Baudry . Le premier propriétaire vraiment connu de la Chesnaye est le beau-frère du sieur Lemoine, maître Robert Lucé, huissier à verge au Châtelet de Paris, également propriétaire à Tours. De 1739 à 1759, il agrandit et améliore la propriété , fief dont il dépend, et les seigneurs de Baudry : la famille Taschereau. En 1759, il vend au sieur Sylvain Pradeau, riche marchand de Tours. En 1786, sa veuve vend le domaine à sieur Jean-Joseph Algrain (ou Allegrain), bourgeois, propriétaire à Saint-Cyr-sur-Loire. Leur fils en hérite mais émigre dans les îles (Réunion, Maurice). Il vend le domaine en deux moitiés en indivis. À partir de 1812, elle est divisée en deux parties clairement séparées : la Chesnaye et Renouard. L'une des propriétaires de la Chesnaye, madame Gertrude Roger, y vit avec son second époux, le capitaine Joseph Perrusset, jusqu'en 1849.  tandis que les propriétaires successifs de Renouard sont François Drouault, propriétaire et meunier, de 1812 à 1830, maître François Couturier, notaire à Tours et propriétaire de la Bédouère, de 1830 à 1846, puis Constant Millochin,  de 1846 à 1865.","architecture":"CHESNAYES, c'est grâce à la famille de Martel que la Chesnaye, de simple gentilhommière, devient château. Jean-François de Martel, inspecteur de l'enregistrement et des domaines, achète la Chesnaye en 1849 Son fils aîné Pierre Achille en hérite mais sa mort prématurée oblige sa veuve à vendre la propriété en 1895. Se succèdent alors Ludovic Chailleux, inspecteur d'une compagnie d'assurances à Paris et le colonnel André Rougier, de Bergerac.En 1919, Alexis Lièvre, courtier en assurances demeurant à Paris, acquiert le domaine et poursuit l'embellissement du château. Se  compose d'un corps de logis rectangulaire à deux niveaux sur soubassement, cinq travées, toit en croupes entouré de  balustre et lucarne centrale coiffée d'un toit triangulaire et deux pavillons latéraux à deux niveaux  avec frontons retondant sur les fenêtres de la façade à  mi-comble du toit.","habitants":"Chesnaies; Lemoine de Fongrouge \r\n        \"","divers":"Le château de la Chesnayes à Cerelles","gps":"","images":["../../jctruffet.com/image/image_37/37_C%c3%a9relles_II_1.jpg"]},"Consult_chateau_formulaire00b1-2":{"id":"Consult_chateau_formulaire00b1-2","dept":"37","canton":"Château-Renault","commune":"Neuillé-Pont-Pierre","nom":"Donneterie","type":"Château","periode":"XVIII","histoire":"DONNETERIE, vers 1875, l'industriel Armand Moisant acquiert le domaine de la Donneterie (vieux manoir du XVIIe siècle, transformé en communs par l'architecte Guérin).                            VIEUX CHÂTEAU Le vieux château Rue des Juifs édifié en matériaux assez modestes, la construction pourrait témoigner du début du XVII è siècle.","architecture":"Le château néo-Renaissance a été bâti par l'architecte Boileau dans un parc aménagé à l'anglaise. A l'intérieur, les pièces sont ornées d'un décor où domine le style Henri II, confiés à des artistes tourangeaux. Les murs sont couverts de décors au pochoir et ornés de tentures d'époque. En 1880, le parc, redessiné, comporte des fabriques, des tonnelles, une orangerie, une grotte, des pièces d'eau, des serres qui ont conservé leur système de chauffage et d'irrigation. L'ancien château de la fin du XVIe siècle, se compose d'une cour rectangulaire fermée de douves et cantonnée de tours. La tour sud a été aménagée en chapelle en 1610. La ferme industrielle a été édifiée dans les années 1875-1880, avec la volonté d'y appliquer des méthodes rationnelles capables d'améliorer les pratiques agricoles. La ferme est gérée comme une industrie, avec des ouvriers agricoles, des chefs de culture, un régisseur. Les ouvriers en ramenant les principes chez eux, la ferme devient une ferme-école. La construction présente une structure portante métallique, avec des murs de briques badigeonnées et des voûtes en béton.","habitants":"Armand Moisant\r\n        \"","divers":"a Neuillé-Pont-Pierre château de la Donneterie","gps":"","images":["../../jctruffet.com/image/image_37/37_Donneterie_1.jpg","../../jctruffet.com/image/image_37/37_Donneterie_2.jpg"]},"Consult_chateau_formulaire821b":{"id":"Consult_chateau_formulaire821b","dept":"37","canton":"Monts","commune":"Esvres","nom":"Esvres","type":"Château","periode":"XIII-XVI-XVII","histoire":"quatre châteaux à Esvres dont celui d'Esvres, de Dorée de la Roche-Farrou et de Villaine.                                                                 ESVRES,  c'est en 1768 que la famille Sain de Bois-le-Comte, qui possède déjà un manoir à Esvres depuis 1672, est citée comme propriétaire de la seigneurie d'Esvres, dont le siège se situe au château, il est saisi comme bien d'émigré à la Révolution, mais une partie en est certainement rachetée, à une date non précisée, par un membre de famille puisqu'en 1858 Charles Alphonse Sain de Bois-le-Comte s'en défait.\r\nLes tours et les courtines ouest et la tour nord-ouest de l'enceinte, ainsi que les tours du château et sa fuie sont inscrites au titre des  M.H. depuis le 4 janvier 1963.\r\nAu XXIe siècle, la partie ouest du château abrite un établissement d'enseignement privé. La partie Est appartient à un autre propriétaire. De l'autre côté de l'escalier, une partie des communs et le pigeonnier forment un autre lot.                                                                         DOREE, construit et remanié par étapes du XVIe au XVIIIe siècle, est plus remarquable par ses propriétaires que par son architecture : il a appartenu à la famille de Lucien Bonaparte avant d'être la propriété du comte Odart, agronome et maire d'Esvres au XIXe siècle. En 1910-1911 le banquier Xavier Rousseau loue le château pour y séjourner avec son amante Mata Hari.","architecture":"ESVRES, fortifié, construit au XIIIe siècle, qui était dominé par un haut donjon carré ayant disparu. De cette forteresse reste une partie de l'enceinte avec la tour nord-ouest, la courtine ouest flanquée de deux tours découronnées. Le château proprement dit fut reconstruit au XVIIIe siècle, entre deux tours de la forteresse du XIIIe siècle. L'édifice présente des façades nord et sud surmontées d'un fronton triangulaire dont la décoration ne fut pas réalisée. Dans la courtine ouest fut ouverte, au XVIe siècle, une porte en anse de panier accostée de pilastres.                                                                            VILLAINE   le château de la Villaine a été construit sur les ruines dun château médiéval de la fin du  XIIIe siècle. La terrasse de ce château du XIXe siècle surplombe un parc privé de 8,5 ha qui sétend jusquaux rives de lEchandon et de lIndre. Cette situation qui garantit la tranquillité et le calme, est à 7 minutes à pied du bourg dEsvres. chambres d'hôtes et un gîte.                                                                                    ROCHE-FARROU, le logis seigneurial  dont les plus anciens éléments datent du XVIe siècle, est remanié par ses propriétaires successifs, dont la famille Sain de Bois-le-Comte, qui possède le domaine de la fin du XVIIe au début du XIXe siècle, une fuie cylindrique tronquée à la Révolution et une tour descalier carrée sont les éléments les plus remarquables de son architecture.","habitants":"Esvres; Charles Alphonse Sain de Bois-le-Comte            Dorée;  famille de Lucien Bonaparte                                             Roche Farrou; famille Sain de Bois-le-Comte\r\n        \"","divers":"quatre châteaux à Esvres dont celui d'Esvres  grav 1-2-3           47° 17' 05\" nord, 0° 47' 06\" Est, de Dorée  grav-5  de la Roche-Farrou grav 4 et de Villaine grav -6.   47° 17' 05\" nord,0° 47' 06\" Est.","gps":"","images":["../../jctruffet.com/image/image_37/37_Esvres_1.jpg","../../jctruffet.com/image/image_37/37_Esvres_2.jpg","../../jctruffet.com/image/image_37/37_Esvres_3.jpg","../../jctruffet.com/image/image_37/37_Esvres_4.jpg","../../jctruffet.com/image/image_37/37_Esvres_5.jpg","../../jctruffet.com/image/image_37/37_Esvres_6.jpg"]},"Consult_chateau_formulaire5c1c":{"id":"Consult_chateau_formulaire5c1c","dept":"37","canton":"Chinon","commune":"St-Germain sur vienne","nom":"Faléche","type":"Château","periode":"XV","histoire":"FALECHE, la vieille forteresse du Moyen-âge qui protégeait les marches de la Touraine est devenue à la Renaissance une demeure ouverte et accueillante. En 1686, cet ancien fief appartenait à François Veronneau, gentilhomme servant du roi. En 1837 il s'appelait château de Saint Germain , puis château de Falèche en 1953.","architecture":"FALECHE, en 1848, Adrien Proust le racheta et le transforma en une maison douce à vivre ornée de lambris, de plafonds peints, de cheminées à décor de chimères, de grands couloirs et dalcôves. Par-delà ses 700 ans dhistoire, rien na changé de la vue quon a sur léglise du village et les lointains très fins et très bleus entre Loire et Vienne. Le château a conservé une belle fenêtre à croisée de pierre au nord et une tourelle polygonale à l'est.","habitants":"Famille de  François Veronneau\r\n        \"","divers":"Château de Falèche à St -Germain sur Vienne","gps":"","images":["../../jctruffet.com/image/image_37/37_Fal%c3%a9che_1.jpg","../../jctruffet.com/image/image_37/37_Fal%c3%a9che_2.jpg"]},"Consult_chateau_formulaire4cd4":{"id":"Consult_chateau_formulaire4cd4","dept":"37","canton":"St-Cyr sur Loire","commune":"Fondettes","nom":"Fondettes","type":"Château","periode":"XVI-XVIII-XIX","histoire":"quatre châteaux à Fondettes celui de Billeterie d'Hamardière, de la Plaine et des Tourelles.                                                                                 BILLETERIE,  a été érigé sur un ancien fief. Cette résidence, dont l'emplacement est limitrophe de la commune de la Membrolle-en-Choisille et se trouve en surplomb de la rive droite de la Choisille a appartenu au conseiller du roi Nicolas Preuilly au XVIIIe siècle, puis, au début du XXe siècle, à l'un des membres de la famille Goüin.                                                                                           HAMARDIERE, le début de sa construction date du XVIIIe siècle. Le domaine appartenait, en 1716, à Nicolas Patas, maire de Tours. Le château est de type maison de campagne tourangelle du XVIIIe siècle. Le manoir a conservé son état primitif sans aucune retouche extérieure avec de trés légères reprises intérieures. Le logis d'habitation comprend un bâtiment principal et une aile en retour formant un angle sur la cour. La travée centrale des deux façades du bâtiment principal est occupée par un avant-corps de faible saillie, amorti par un fronton triangulaire percé d'un oculus. L'aile en retour est prolongée par un bâtiment de communs dont la façade est surmontée d'un fronton triangulaire. Au sud de la cour se trouve une petite chapelle rectangulaire. Les bâtiments d'exploitation agricole ont subi des modifications plus modernes. Le parc a conservé son aspect de la fin du XVIIIe siècle. Le manoir des Hamardières est inscrit aux M.H. depuis 1951.","architecture":"La PLAINE,  château, construit à l'initiative d'Eugène Goüin, au XIXe siècle. Celui-ci, issu d'une famille de banquiers tourangeaux, était maire de Tours, conseiller général, député en 1871, maire de Fondettes en 1874, puis sénateur de 1884 à 1892. En 1950, la propriété devint le siège du lycée agricole de Tours-Fondettes maire de Fondettes en 1874, puis sénateur de 1884 à 1892. En 1950, la propriété devint le siège du lycée agricole. Le château est entouré à l'est d'un parc qui domine la rivière de la Choisille. Pour répondre aux besoins importants en eau, il a été installé en 1864 un bélier hydraulique et son bief à Charcenay afin d'alimenter le domaine. Cette pièce, créée par M. Bollée, unique en son genre, se compose de deux béliers en série, pompant l'eau jusqu'au réservoir du château.                                                                        TOURELLES, est déjà mentionné au XVe siècle. L'édifice qui est décrit au début du XIXe siècle comprend un bâtiment principal prenant façade au sud, accompagné de deux ailes attenantes et de deux tourelles indépendantes, l'une faisant office de chapelle, l'autre de pigeonnier. Raoul du Saussay, ancien maire de la commune et député d'Indre-et-Loire, est propriétaire des Tourelles à la fin du XIXe et début du XXe siècle. Presque entièrement détruit en 1944 lors les bombardements alliés sur le pont de la Motte, le château est reconstruit à l'identique au titre des réparations de guerre.","habitants":"Billeterie et la plaine ; famille Goüin                              Hamardière;famille deNicolas Patas                                         Tourelles;  Raoul du Saussay,\r\n        \r\n        \r\n        \r\n        \"","divers":"quatre châteaux à Fondettes celui de Billeterie grav-1 , d'Hamardière, de la Plaine grav 3-4-5 et des Tourelles gracv-6.                                                                               Hamardières 47° 23' 57\" Nord et 0° 37' 06\" Est                                               La plaine  47° 24' 07\" Nord et 0° 38' 15\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Fondettes_1.jpg","../../jctruffet.com/image/image_37/37_Fondettes_2.jpg","../../jctruffet.com/image/image_37/37_Fondettes_3.jpg","../../jctruffet.com/image/image_37/37_Fondettes_4.jpg","../../jctruffet.com/image/image_37/37_Fondettes_5.jpg","../../jctruffet.com/image/image_37/37_Fondettes_6.jpg"]},"Consult_chateau_formulaire1315":{"id":"Consult_chateau_formulaire1315","dept":"37","canton":"St-Cyr sur Loire","commune":"Fondettes","nom":"Fondettes_II","type":"Château","periode":"XV","histoire":"Trois châteaux dans cet article de Fondettes, le château de Bel-air, le Grand-Martigny et Chatigny.                                                    BEL-AIR, ancienne closerie transformée en maison de maître. L'ancien cellier construit en pierre de taille et moellon date du milieu du XVIIIe siècle. La maison de maître et ses annexes furent reconstruite entre 1882 et 1890 pour Raoul de Gourjault, dans le style des maisons seigneuriales tourangelles, de 1485 à 1520, employant des pierres et des briques, soit en damier, soit en tapisserie de brique encadrée de pierre de taille. L'édifice devient école normale d'instituteurs d'Indre et Loire en 1946. Les bâtiments de service créés entre 1950 et 1960, emploient  le béton armé. Le château abrite aujourd'hui l'Institut de formation des maîtres.                                                                                                  GRAND-MARTIGNY, en 1269, Jean de Pontlevoy, dit Genesson, était maire de Martigny. Après lui on trouve, en 1314, N. Odard; en 1338, Aimery Odard; en 1348, Thibault de Laleu; en 1400, N. Le Maignan, chanoine, qui donna ce fief aux vicaires de Saint-Martin. Ceux-ci le vendirent, le 11 juin 1430, à Pierre Chauvin. Ce dernier eut pour successeurs: Jean Chauvin, 1472; Charles Chauvin, 1491; Julien Godeau, 1493; Gilles Chauvin, 1500; Pierre Chauvin, 1533; René Chauvin, 1547; Marie Chauvin, veuve de Pierre de Montigny, 1563; Louis le Boucher, 1572. La mairie de Martigny fut possédée par cette dernière famille jusqu'à la Révolution. Manoir  du XV-XIXe siècle  avec pigeonnier carrée et parc  transformé en chambres d'hôtes par la famille Desmarais.","architecture":"CHATIGNY, la construction  date de 1487. Il est de style Renaissance et néo-Gothique. Son propriétaire initial était Jean Quétier, maire de Tour. il se compose de deux ailes en retour d'équerre cantonnées de tours rondes et d'une courtine prolongeant l'aile Est, fermant la cour au nord. Accolée au pignon nord, cette aile est prolongée d'une partie plus haute, orné de damiers, sur des bases anciennes car les murs en sont épais. La courtine nord est percée d'une porte fortifiée de plain pied, le pont-levis a disparu. Des communs néo-gothiques ont été rebâtis vers l'ouest. La courtine ouest a disparu après le XVIIIe siècle pour ouvrir la cour vers les jardins et le parc situé au delà. Les murs en pierre de taille de grand appareil, sont ornés, au niveau des pignons et dans les parties hautes des tours, d'un décor de damiers en brique et pierre. De rares baies conservent leur décor de la fin du XVe siècle, d'autres ont été percées ou agrandies au XIXe siècle. Les façades intérieures sont éclairées par des baies toutes reprises ou créées fin du XIXe siècle, dans un style néo-gothique flamboyant. La courtine nord-est a été pourvue d'un crénelage et son portail a été en partie reconstruit. Un niveau de terrasse a été aménagé et s'étend à l'ouest. Le parc paysager règne à l'ouest et au nord. Restauré entièrement en 1855 par le duc dUlceda et dEscalona.","habitants":"Bel-Air  Raoul de Gourjault                                                          Chatigny; Famille de  Jean Quétier                                                   Grand-Martigny  Famille Desmarais.  \r\n        \"","divers":"Trois châteaux à Fondettes le château de Bel-air grav-2, le Grand-Martigny grav 3-4-5  et Chatignygrav 6-7-8.       Chatigny 47° 23' 25\" Nord, 0° 35' 22\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Fondettes_II_1.jpg","../../jctruffet.com/image/image_37/37_Fondettes_II_2.jpg","../../jctruffet.com/image/image_37/37_Fondettes_II_3.jpg","../../jctruffet.com/image/image_37/37_Fondettes_II_4.jpg","../../jctruffet.com/image/image_37/37_Fondettes_II_5.jpg","../../jctruffet.com/image/image_37/37_Fondettes_II_6.jpg","../../jctruffet.com/image/image_37/37_Fondettes_II_7.jpg","../../jctruffet.com/image/image_37/37_Fondettes_II_8.jpg"]},"Consult_chateau_formulaire6bae":{"id":"Consult_chateau_formulaire6bae","dept":"37","canton":"Château-Renault","commune":"Louestault","nom":"Fontenailles","type":"château","periode":"XV","histoire":"FONTENAILLES, Acheté en 1876 par un banquier parisien Alcide Beley qui rajoute en 1882 à l'angle des façades Sud-Ouest et Ouest, la salle à manger placée dans la grosse tour carrée ornée de 2 tourelles en poivrière, le château est vendu de 1884 à 1887 à la duchesse de Beaufrémont et en 1888 à la baronne de Boucheporn, qui le dote d'éléments de confort, chauffage et éclairage au gaz et le remeuble. Mme Lenoir, héritière du domaine en 1937, le vend en 1949 à une association, la Joie par la Santé, qui devient en 1983 un centre de rééducation professionnelle. Pour accueillir les stagiaires, des pavillons à étages, conçus par les architectes Delamare et Auznat, sont construits en 1983, en bordure ouest du château.","architecture":"FONTENAILLES est attestée depuis le XIIIe siècle, le château primitif fut construit au moyen-âge. De cette période subsistent, baignées par l'eau des douves, au nord-est, le vestige d'un bastion et au nord-ouest une large tour ronde, qui semblent dater du XVe siècle, l'angle de l'aile nord-ouest, fut rehaussé de deux étages,\"flanqué de trois tours et de tourelles, une quatrième tour existant au milieu du bâtiment du côté de la cour, au haut de laquelle est un belvédère. La façade du midi à six ouvertures, celle du levant cinq ouvertures, le rez-de-chaussée comprend une dizaine de pièces au rez-de-chaussée et six chambres au premier étage\". Il présente alors un aspect très proche de celui qu'il offre actuellement. Le baron d'Aumont, propriétaire en 1849, va transformer la demeure en plaquant sur les façades un décor néo-gothique et en éclairant les combles de lucarnes. La tourelle d'escalier octogonale à l'angle de l'aile nord-ouest, fut rehaussé de deux étages. Château à élévation ordonnancée ; une terrasse dont le sous-sol semi enterré est affecté à la cuisine est située devant une partie de la façade Sud, ; étage de comble éclairé par des lucarnes en pierre au gâble pointu ; utilisation de la brique en alternance avec la pierre comme décor polychrome pour la base des tourelles en poivrière sur la façade Ouest et pour les deux étages supérieurs de la tour octogonale ; toit en pavillon pour les tours en pavillon à chaque extrémité de la façade Sud ; toit conique pour les tours rondes, les tourelles en poivrière et le pigeonnier ; toit en terrasse pour la tour octogonale.","habitants":"duchesse de Beaufrémont \r\n        \"","divers":"Château de Fontenailles à Louestault","gps":"","images":["../../jctruffet.com/image/image_37/37_Fontenailles_1.jpg","../../jctruffet.com/image/image_37/37_Fontenailles_2.jpg"]},"Consult_chateau_formulaire6fb9":{"id":"Consult_chateau_formulaire6fb9","dept":"37","canton":"Loches","commune":"Saint-Blaud","nom":"Fontenay_Isoré","type":"Vestiges","periode":"XV","histoire":"FONTENAY, ancien fief relevant de la Tour Isoré et du château de Sennevières. De la forteresse rectangulaire du XVe siècle restent divers éléments. Limitée par des douves, l'enceinte du château devait être flanquée d'au moins quatre tours d'angle. L'entrée au-dessus des douves devait se faire au milieu du côté sud. Au centre de l'enceinte Est, les arrachements de croisées d'ogive, sur la face nord des bâtiments encore existants, laissent voir une salle qui devait relier ceux-ci à la tour nord-est. Le bâtiment sud conserve un sous-sol voûté dont les piliers sont reliés par des arcs surbaissés caractéristiques du XVe siècle et XVIe siècle.                                                                                         ISORE Le premier propriétaire était Jean d'Armagnac en 1581 et cette famille est restée jusqu'en 1714.","architecture":"ISORE, il fut remanié aux XVIIe siècle et XVIIIe siècles ; construction d'une grange dimière et d'une chapelle au XVIIe siècle; remaniements et adjonctions au XIXe siècle. Pendant la 1ère guerre mondiale le château a été réquisitionné par l'armée française, les inscriptions sur les portes au 2ème étage en témoignent toujours. Il avait souffert et a été vendu à des fermiers qui l'ont transformé en ferme. En 1983, c'est la commune d'Avoine qui l'a acheté et a installé dans le parc un centre équestre toujours en place. Le toit a été refait ce qui a sauvé le bâtiment. La commune a vendu l'édifice à son tour à des personnes privées qui voulaient en faire un hôtel mais par manque de fonds Isoré est vendu en 2009 à Peter et Chantal De Swert Coen, les propriétaires actuels, qui entreprirent sa restauration pour le remettre le plus possible dans son état d'origine, en utilisant des matériaux récupérés sur le site. L'intérieur avait été remanié une dernière fois en 1840, utilisant le style Louis XVI.","habitants":"Isoré, Famille de Jean d'Armagnac\r\n        \"","divers":"deux châteaux ruinés à st-Bauld","gps":"","images":["../../jctruffet.com/image/image_37/37_Fontenay_Isor%c3%a9_1.jpg","../../jctruffet.com/image/image_37/37_Fontenay_Isor%c3%a9_2.jpg","../../jctruffet.com/image/image_37/37_Fontenay_Isor%c3%a9_3.jpg"]},"Consult_chateau_formulaire211a":{"id":"Consult_chateau_formulaire211a","dept":"37","canton":"Château-Renault","commune":"St-Paterne-Racan","nom":"Fougeraie","type":"Château","periode":"XIX","histoire":"FOUGERAIE  le château fut vendu  comme bien national. De nouveaux bâtiments, dont les dates de construction nous sont données par le registre des augmentations et diminutions cadastrales sont bâtis au XIXe siècle. En 1847, les bâtiments de la ferme et en 1855 le château sous l'impulsion d'Ernest Lemore, qui en est propriétaire, auquel va succéder René Etienne le More de Sarcé, et en 1895 Hubert le More de Sarcé. L'édifice est acquis par M. Rousselet, qui l'aménage en lieu de réception.","architecture":"FOUGERAIE, château à élévation ordonnancée à un étage de soubassement, deux étages carrés et un étage de comble, couvert d'un toit en croupe. Pour agrémenter le volume massif, de plan rectangulaire, l'avant-corps central a été traité de manière particulière sur les deux façades. Sur la façade Sud-Est, une tourelle polygonale, flanquée de deux tourelles en surplomb, ornée de baies cintrées sur les trois niveaux et couverte d'un toit polygonal, abrite un escalier, à vis, en pierre, desservant les étages. Sur la façade Nord-Ouest, un escalier extérieur \"en fer à cheval\", de forme analogue à celui de l'autre façade donne accès au hall d'entrée. L'avant corps Est est encadré au premier étage par deux tourelles en surplomb, au rôle plus décoratif que structurel. Elles sont ornées d'arcs trilobés surmontées de rosaces sculptées d'ornements végétaux. Les baies relativement importantes en nombre sont traitées à chaque niveau de la même manière, selon une hiérarchie décorative : à l'étage de soubassement, les baies rectangulaires sont encadrés d'un chambranle continu, au rez-de-chaussée les baies en arc en plein cintre sont encadrées d'une moulure cannelée, s'arrêtant aux 2/3 de la hauteur pour se terminer par une moulure composite placée de biais, au premier étage, les baies également cintrées sont encadrés d'une moulure en creux s'appuyant sur des petits culots, dont l'entablement sert de départ pour former le bandeau de séparation des étages sur la façade Sud-Est, alors que sur la façade Nord-Ouest, l'entablement sert de couronnement aux chapiteaux corinthiens des colonnettes qui encadrent la fenêtre.","habitants":"Famille  d'Ernest Lemore\r\n        \"","divers":"Roches- Racan  47° 35' 25\" Nord, 0° 30' 00\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Fougeraie_1.jpg","../../jctruffet.com/image/image_37/37_Fougeraie_2.jpg","../../jctruffet.com/image/image_37/37_Fougeraie_3.jpg","../../jctruffet.com/image/image_37/37_Fougeraie_4.jpg","../../jctruffet.com/image/image_37/37_Fougeraie_5.jpg"]},"Consult_chateau_formulaire710d":{"id":"Consult_chateau_formulaire710d","dept":"37","canton":"Château-Renault","commune":"Epeigné-sur-Dême","nom":"Girardet","type":"Château","periode":"XIX","histoire":"GIRARDET, ancien fief, aurait relevé de la baronnie de Villedieu, dépendant de l'abbaye de Vendôme et appartient au XVe siècle à Jean de Bueil. C'est de cette époque que pourrait dater la tour ronde située à l'Ouest du bâtiment. Incorporé au domaine des Pins au XVIIIe siècle, il est la propriété de la famille Mandat, qui le vend le 12 mars 1803 à Anne René Leduc, qui transmet à son fils Augustin Nicolas Leclerc le lot concernant le domaine de Girardet, il est vendu le 26 février 1814 à la famille Pavy. A partir de 1850, date à laquelle Charles Joseph Emile Pavy et son épouse Sidonie Marie Louise Douineau de Charentais en sont propriétaires, Après la mort d'Henri Pierre Poulain en 1873, différents propriétaires se succèdent dont en 1900, Jean Joseph Garcin, qui avait acquis le château des Pins. En 1912, la famille Huchot devient propriétaire de Girardet jusqu'en 1985 où elle met en vente le château mais conserve la ferme. Après la succession de quatre acquéreurs en dix ans, le château est acheté par l'actuel propriétaire en 1996.","architecture":"GIRARDET, du XIXe siècle. château à élévation ordonnancée flanqué de deux tours : une tour ronde à l'angle Nord-Ouest et une tour polygonale à l'angle Sud-Ouest ; couverture en ardoise, calcaire moellon enduit avec encadrement des baies en pierre de taille ; corps central, un étage carré et un étage de comble, toit à longs pans brisés, lucarne en pierre à fronton triangulaire et à base accostée d'ailerons, tours, deux étages carrés, tour polygonale, baies rectangulaires au rez-de-chaussée et au deuxième étage, baies en arc cintré encadrés de pilastres cannelés au premier étage, pilastres d'angle au premier et deuxième étage formant un chaînage vertical.","habitants":"famille Pavy\r\n        \"","divers":"Château de Girardet à Epeigné sur Dême","gps":"","images":["../../jctruffet.com/image/image_37/37_Girardet_1.jpg","../../jctruffet.com/image/image_37/37_Girardet_2.jpg","../../jctruffet.com/image/image_37/37_Girardet_3.jpg","../../jctruffet.com/image/image_37/37_Girardet_4.jpg"]},"Consult_chateau_formulaire000a":{"id":"Consult_chateau_formulaire000a","dept":"37","canton":"Langeais","commune":"Gizeux","nom":"Gizeux","type":"Château","periode":"XIII-XVIII","histoire":"GIZEUX, châtellenie relevant de la seigneurie de Montsoreau, le château passa en 1330 à la maison des Du Bellay, par alliance de Hugues du Bellay qui bâtit   l'édifice actuel. La première forteresse fut achevée en 1415.  En 1661  extension de la lignée des du Bellay . Un lointain  cousin hérite Antoine  Saladin d'Anglure et en 1667 le domaine est cédé à Anne de Frézeau,  veuve de René de Rouxelley, comte de la Roche Millay . En 1723 à René de Grandhomme qui d'être anobli par une charge de secrétaire du roi. En 1786, la petite-fille de René de Grandhomme madame de Brancas marquise de Céreste sans enfants fait don de Gizeux à Louis Gabriel-Marie de Contades à l'occasion de son mariage avec sa filleule mademoiselle Constantin de la Lorie. Aujourd'hui, le château de Gizeux appartient à la famille de Laffon qui en a fait un gite d'hôtes, est classé aux M.H. depuis 1945","architecture":"GIZEUX, il est de style Médiéval et Renaissance, construit du XIIIe au XVIIIe siècle, comprend un corps de logis central et deux ailes en retour sur la cour d'honneur avec, dans les angles rentrants, deux tours polygonales d'escaliers à vis. Un bâtiment bâti à peu près à la même époque en bordure de la terrasse sud, est terminé par un pavillon rectangulaire plus élevé, affecté au logement des fermiers. Un autre bâtiment du XVIIIe siècle relie le précédent au corps principal. Au nord se trouvent les communs avec une grande cour, deux corps de bâtiments en équerre, et une cour secondaire dont l'accès se fait par un passage voûté ouvert dans l'axe du bâtiment principal. Ses façades se déploient sur 250 mètres de long, et font de lui le plus long château de la Touraine angevine.  Subsiste une décoration analogue des pièces de l'aile sud et dans le couloir qui les dessert. Une grande galerie entièrement couverte de peintures occupe le premier étage du bâtiment XVIIIe siècle en retour vers l'est. Le château de Gizeux possède de superbes communs dont de magnifiques écuries,  est précédé d'une cour d'honneur et de parterres qui s'inclinent vers une prairie limitée sur trois côtés par les douves et où se trouve l'entrée. A gauche se développent les bâtiments des communs ; à droite, une terrasse limitée par un ancien mur d'enceinte, puis le grand canal. En bordure de la cour des communs se trouve une tour cylindrique à mâchicoulis, vestige de la forteresse du XIVe siècle.","habitants":"Famille de René de Grandhomme \r\n        \"","divers":"Gizeux : 47° 23' 26,16\" Nord et 0° 12' 21,96\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Gizeux_1.jpg","../../jctruffet.com/image/image_37/37_Gizeux_2.jpg","../../jctruffet.com/image/image_37/37_Gizeux_3.jpg","../../jctruffet.com/image/image_37/37_Gizeux_4.jpg","../../jctruffet.com/image/image_37/37_Gizeux_5.jpg"]},"Consult_chateau_formulaired212":{"id":"Consult_chateau_formulaired212","dept":"37","canton":"Descartes","commune":"Grand-Préssigny","nom":"Grand_Préssigny","type":"Forteresse","periode":"XIII","histoire":"GRAND-PRESSIGNY, le premier seigneur connu, Guillaume Ier de Pressigny et de Sainte-Maure, est  le commanditaire du château de pierre. En 1302 la seigneurie passe au XIVe siècle aux Craon qui lre transmet au siècle suivant aux Beauvau et à la famille de Prie avant de venir en 1523 à la famille de  René de Savoie  acquiert la seigneurie et en 1560, Honorat II de Savoie-Villars, gentilhomme de la chambre du roi, fait élever un autre logis comportant un corps de galerie, divisant l'espace clos de l'enceinte du XIIIe siècle d'Est en ouest. C'est à sa fille Henrye que l'on attribue la construction du pont dormant vers 1600, ainsi que celle du nymphée vers 1620. Après les villars, la baronnie passe aux Brulart de Sillery, aux Bertrand puis au XVIIIe siècle aux Masson de Maison-Rouge avant la Révolution aux Gilbert de Voisins, confisqués et vendu comme bien national en 1793  ventes et partages en héritage transforment l'édifice en carrière de pierre. Après l'achat du donjon par la commune en 1856, c'est le conseil général d'Indre-et-Loire qui acquiert la galerie et les vestiges du château. Des transformations sont effectuées et en 1955 on y établit un musée de Préhistoire.","architecture":"GRAND-PRESSIGNY, appartenant à la première campagne de construction en 1190, le donjon est clos par une enceinte délimitant le baille, lui même contenu dans une enceinte flanquée au nord-est de tours circulaires. De plan carré, cette tour maîtresse comportait un rez-de-chaussée et quatre étages planchéiés. L'insuffisance des éléments de défense a nécessité la construction d'un avant corps au sud, constitué de deux espaces. Cette deuxième campagne de construction a suivi de près celle de l'achèvement du donjon. Dans la logique de construction de l'avant corps, de nouveaux travaux ont isolé l'ensemble du donjon, en complétant la chemise au sud. Vers 1200, on entreprend la construction d'une vaste enceinte oblongue flanquée de tours et d'une tour-porte raccordée à la chemise du donjon ainsi que l'élargissement des tours situées autour du donjon, et enfin la construction de deux tours polygonales au sud de la chemise. L'élargissement des fossés, l'érection de la barbacane à l'entrée du château et la couronne de mâchicoulis (remplaçant les anciens hourds du donjon) sont l'oeuvre de la famille Chabot au cour du XVe siècle. Vers 1450, Bertrand de Beauvau fait ériger un nouveau logis comprenant la tour maîtresse qu'il réaménage et agrandit. En 1988, les pans des murs Nord Ouest et Sud-Est du donjon se sont effondrés.","habitants":"Famille de Gilbert de Voisins\r\n        \r\n        \"","divers":"Château du Grand-Pressigny  46° 55' 18\" nord, 0° 48' 12\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Grand_Pr%c3%a9ssigny_1.jpg","../../jctruffet.com/image/image_37/37_Grand_Pr%c3%a9ssigny_2.jpg","../../jctruffet.com/image/image_37/37_Grand_Pr%c3%a9ssigny_3.jpg","../../jctruffet.com/image/image_37/37_Grand_Pr%c3%a9ssigny_4.jpg"]},"Consult_chateau_formulaire16e0":{"id":"Consult_chateau_formulaire16e0","dept":"37","canton":"Descartes","commune":"Grand Préssigny","nom":"Grand_Préssigny_II","type":"Château","periode":"XV-XVIII","histoire":"deux châteaux , de Vienne et d'Etableau.                                                                       \r\n VIENNE, le fief de la Vienne relève de la châtellenie de Sainte-Julitte ; le château remonte  à la deuxième moitié du XVe siècle ; en 1551, il est à la famille Poitevin dont les armes sont portées à la tour d'escalier du château; les chambres hautes servent de grenier en 1794; le château, incendié vers 1870, est reconstruit et agrandi en 1872 et 1873; les communs entièrement consumés par un incendie sont rebâtis à la même époque ; une cheminée portant la date 1890 et un monogramme FC est réalisée par Dubois, menuisier à Barrou pour Eugène François Combier auteur des dessins. Le château est couvert de tuiles plates en 1794, puis d'ardoise lors de sa reconstruction; il est reconstruit sur les murs du château primitif, augmenté d'une aile en retour et de tourelles aux angles; l'escalier à vis est détruit, mais la tour d'escalier remontée, conserve ses baies primitives avec les armoiries, armes de la famille Poitevin, portes et fenêtres de la tour d'escalier.","architecture":"ETABLEAU Fort, est construit sur un site pentu et fossoyé, dominant la vallée de l'Aigronne et Etableau. Au cours d'une première campagne remontant au quatrième quart du XIIe siècle, on élève le donjon et les côtés sud, est et ouest de l'enceinte trapézoïdale; le donjon est amputé, à une date indéterminée, à la suite d'un affaissement du terrain, au XVIIIe siècle peut être ; l'enceinte comprend une tour porte autrefois équipée d'une herse et d'une galerie de circulation ménagée dans l'épaisseur de la muraille (il en reste deux mètres environ), la galerie était accessible depuis le baille par un escalier à vis également construit dans la muraille (détruit); la courtine nord-est, reconstruite dans la 1ère moitié du XIIIe siècle, flanquée de trois fortes tours rondes (il en reste deux), aujourd'hui dérasées et équipées d'archères; une quatrième tour est bâtie à l'angle Sud-Est de l'enceinte primitive; la tour occidentale est reconstruite dans la deuxième moitié du XIIIe siècle, peut-être par Maurice de Craon, premier seigneur connu et y vivant entre 1226 et 1250. Au XVIe siècle, de nouvelles constructions (en ruine) sont élevées dans le baile,des carrières et un puits y sont creusés; la place forte est alors employée à la défense contre les protestants, guidé par la Loue, qui la prennent d'assaut en 1569 ; en 1728, le château est démoli.","habitants":"Etebleau ;  Maurice de Craon                                                 Vienne;famille Poitevin \r\n        \r\n        \"","divers":"château de Vienne grav-2 et d'Etableau grav-1   46° 54' 34\" nord, 0° 48' 46\" Est               Gd Préssigny  grav-3                     46° 55' 16\" nord, 0° 48' 13\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Grand_Pr%c3%a9ssigny_II_1.jpg","../../jctruffet.com/image/image_37/37_Grand_Pr%c3%a9ssigny_II_2.jpg","../../jctruffet.com/image/image_37/37_Grand_Pr%c3%a9ssigny_II_3.html"]},"Consult_chateau_formulaire295a":{"id":"Consult_chateau_formulaire295a","dept":"37","canton":"Descartes","commune":"Chapelle Blanche Saint-Martin","nom":"Grillemont","type":"Forteresse","periode":"XV-XVIII","histoire":"GRILLEMONT, la châtellenie relevait de Ligueil. Une importante forteresse fut construite entre 1460 et 1470 par Bertrand de Lescost, gouverneur de la ville et du château de Loches, et était primitivement défendue par des douves et des étangs. Elle a en partie été démolie et réaménagée au XVIIIe siècle, appartenait à cet époque à Olivier Du Guesclain frère du connétable, fut acheté il y a près d'un siècle par monsieur Lecointre, arrière grand père du propriétaire actuel, le comte de Saint-Seine. Au cours du XIXe siècle, d'importantes transformations y ont été apportées.","architecture":"GRILLEMONT, le château se compose d'un corps de logis doté de deux prolongements en retour d'angle. Du château médiéval subsistent trois tours et des murs de courtine. En 1739, le donjon fut rasé pour remblayer la cour d'honneur et les mâchicoulis furent supprimés des deux tours ouest, la cour d'honneur a conservé l'ordonnance du XVIIIe siècle. L'aile orientale était prolongée par un bâtiment de briques qui a été détruit pour être remplacé par un pavillon dans le style XVIIIe siècle. Un autre petit pavillon prolonge l'aile opposée. Sous le Second Empire, le salon de musique a été aménagé avec un décor en faux marbre rappelant l'époque Directoire, composé de pilastres cannelés dont les chapiteaux sont joints par une frise ornée. La cage d'escalier, conçue au XVIIIe siècle, a été remaniée au XIXe siècle. Les communs du troisième quart du XVIIIe siècle sont édifiés au nord sur un plan en U. Les trois ailes sont disposées autour d'une cour rectangulaire.","habitants":"Famille de monsieur Lecointre\r\n        \"","divers":"a la Chapelle Blanche le château de Guillemont                 47° 05' 29\" nord, 0° 46' 08\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Grillemont_1.jpg","../../jctruffet.com/image/image_37/37_Grillemont_2.jpg","../../jctruffet.com/image/image_37/37_Grillemont_3.jpg","../../jctruffet.com/image/image_37/37_Grillemont_4.jpg","../../jctruffet.com/image/image_37/37_Grillemont_5.jpg","../../jctruffet.com/image/image_37/37_Grillemont_6.jpg","../../jctruffet.com/image/image_37/37_Grillemont_7.jpg"]},"Consult_chateau_formulaire7bab":{"id":"Consult_chateau_formulaire7bab","dept":"37","canton":"Ste-Maure de Touraine","commune":"Faye la Vineuse","
