URS, les successeurs de Louis XI y font de fréquents séjours, remaniant et embellissant les constructions primitives. Aux XVIIe et XVIIIe siècles, le manoir est délaissé et après la Révolution, presque entièrement détruit. Il ne subsiste du château qu'un corps de logis rectangulaire, flanqué à l'ouest d'une tour d'escalier. Cette tour est la seule partie qui reste dans son état primitif, le bâtiment ayant été profondément remanié à la fin du XIXe siècle. Le cachot dit de \"La Ballue\" est une salle voûtée en plein cintre, dont l'accès se faisait par un escalier sous lequel, dit-on, fut enfermé le cardinal de La Ballue. Ce corps de bâtiment qui subsiste aujourd'hui, restauré aux XIXe siècle et XXe siècle, correspond à la partie sud de l'ancien logis royal de briques et de pierres. Son style actuel correspond aux caractéristiques du gothique international, à l'image de l'Aile Louis XII du château de Blois. Les vestiges de l'ancien château sont peu visibles, et l'intérieur fut largement remanié. Il existe toujours dans ce château, des cages qui servaient de prison, que l'on appelait fillètes, à tort semble-t-il, puisque ce terme désignait en réalité les lourdes chaînes lestées de boulets qui entravaient les prisonniers avant de les introduire dans les cages métalliques suspendues, où les prisonniers ne pouvaient pas se tenir debout. Le Cardinal de La Balue aurait séjourné 11 ans dans une telle cage. Détruit aux trois quarts, il ne reste aujourd'hui que l'aile Est.","habitants":"Mairie de Tours\r\n        \"","divers":"Château de  Plessis les Tour   à tours et à le Riche grav 5                            47° 22' 57\" Nord et 0° 39' 38\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Plessis_les_Tours_1.jpg","../../jctruffet.com/image/image_37/37_Plessis_les_Tours_2.jpg","../../jctruffet.com/image/image_37/37_Plessis_les_Tours_3.jpg","../../jctruffet.com/image/image_37/37_Plessis_les_Tours_4.jpg","../../jctruffet.com/image/image_37/37_Plessis_les_Tours_5.jpg"]},"Consult_chateau_formulaireddd7":{"id":"Consult_chateau_formulaireddd7","dept":"37","canton":"Amboise","commune":"Pocé sur Cissé","nom":"Pocé_Cissé","type":"Château","periode":"XVIII-XIX","histoire":"Le château de Launay trois châteaux à Pocé dont celui de Pocé (article suivant) et de la Fourchette, de Bellecour et la Roche hébergement de François Mazé.                                                                                                                                  BELLECOUR, le château de Bellecour est un petit manoir caractéristique du milieu du XIXe siècle, construit dans un style troubadour, par l'architecte amboisien Philippe Châtaignier, qui a laissé de nombreux monuments en Touraine notamment Les Arpentis à Saint-Règle, Moncé à Limeray, Montdomaine à Nazelles-Négron, etc. Cette demeure, appelée également \"folie\", élevée vers 1852, apparaît comme un véritable décor de théâtre complété par un ensemble homogène de communs.                                                ROCHE,  est une propriété privée qui ne se visite pas, située sur la route d'Amboise, à droite, en sortant du bourg. Sa façade en briques est visible.                                                                         LAUNAY est à l'écart du bourg et ne se visite pas","architecture":"FOURCHETTE, gentilhommière du XVIIIe siècle, cet ancien fief relevait du château d'Amboise, à une paire de gants blancs du prix de vingt deniers tournois. Le château de Fourchette a été construit vers 1725-1730 à l'emplacement d'un édifice plus ancien. Le château est composé d'un bâtiment rectangulaire à un étage et un comble à la mansart avec des lucarnes à fronton courbe. Au sud, se trouve un double escalier en fer à cheval. Un pigeonnier carré bâti au XVIe siècle, avec un toit surmonté d'un lanternon octogonal, se trouve dans le parc. A l'est, la chapelle est devenue une habitation et a été prolongée par un corps de bâtiment. Le château a appartenu successivement à Jean Ardiller de la Brillonnière en 1545, à Marie-Claude Scarron vers 1700, à Marie-Armande-Claude Bergeron de la Goupillère en 1739, femme de Charles-Paul-Jacques-Joseph de Bridieu, à Charles-Marie-Marthe de Bridieu vers 1770, chevalier, seigneur de Saint-Germain, Rouvray, Montreuil, etc, puis en 1789 à Marie-Catherine Le Boucher de Verdun, veuve de Charles-Marie-Marthe de Bridieu et depuis le début des années 1980, le château appartient à Mick Jagger, célèbre chanteur des Rolling Stones.","habitants":"Fourchette; famille de Jean Ardiller de la Brillonnière et en 1980   Mick Jagger,\r\n        \"","divers":"Le château de Launay trois châteaux à Pocé dont celui de Pocé grav-5 et de la Fourchette grav 1-2-3-4, de Bellecour  grav-6et la Roche grav-7                                                         Pocé; 47° 26' 43\" nord, 0° 59' 30\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Poc%c3%a9_Ciss%c3%a9_1.jpg","../../jctruffet.com/image/image_37/37_Poc%c3%a9_Ciss%c3%a9_2.jpg","../../jctruffet.com/image/image_37/37_Poc%c3%a9_Ciss%c3%a9_3.jpg","../../jctruffet.com/image/image_37/37_Poc%c3%a9_Ciss%c3%a9_4.jpg","../../jctruffet.com/image/image_37/37_Poc%c3%a9_Ciss%c3%a9_5.jpg","../../jctruffet.com/image/image_37/37_Poc%c3%a9_Ciss%c3%a9_6.jpg","../../jctruffet.com/image/image_37/37_Poc%c3%a9_Ciss%c3%a9_7.jpg"]},"Consult_chateau_formulairebf49":{"id":"Consult_chateau_formulairebf49","dept":"37","canton":"Amboise","commune":"Pocé sur Cissé","nom":"Pocé_Cissé_II","type":"Château","periode":"XV-XVI","histoire":"POCE-sur-CISSE, châtellenie qui dépendait de Rochecorbon au XIIIe siècle  les Chauvigny, qui vendirent  au XIVe siècle au du  Bueil, Jean du Beuil  seigneur de Montrésor en 1459 Jean amiral de France et comte de Sancerre qui vend Pocé à Jehanne de Rougny qui fera passé le domaine à Hardouin de Maillé, le fils  de l'amiral  Antoine du Beuil a épousé la fille de Charles VII  ruiné par les frais occasionnés se défait de Pocé en 1481 est acquis par Jean Tiercelin capitaine gouverneur  du château de Plessis les tours en 1609 saisie est adjugée à André Dubecq, seigneur de Verdes, en 1661 François-René Dubecq se défait de Pocé au profit de Thomas Bonneau seigneur de Valmer conseiller du roi. Le domaine changera souvent de mains; en 1691, Dominique Chaufourneau, en  1703 à Louis Pelluys, en 1714 à Jeanne Soulas, femme de René de Cop trésorier de France à Tours, en 1783 au comte  de Milon de Mesme et en 1790 cédée à la marquise de Bridieu, puis vendu comme bien national à un maître de forges Armand  Moisand, le château est acquis en1889 par madame Julian Bertrand n'ayant pas  d'enfants lègue tous ses bien à la fondation de l'enfance abandonnée \" julian  Bertrand\" reconnue en 1952.","architecture":"POCE, édifice de la fin du XVe siècle, occupé au XIXe siècle par une fonderie dont les bâtiments industriels, batis sous le château, ont disparu. A la fin du XIXe siècle, le domaine est organisé pour l'agrément et le château restauré, la partie arrière de l'édifice est neuve. les bâtiments s'ordonnent  autour d'une cour intérieure dans laquelle une tour polygonale abrite un escalier à vis, l'aspect de l'édifice a été  assez transformé par l'adjonction d'un étage au dessus des mâchicoulis et chemin de ronde qui ont été conservés sur la façade Est. Les tours de la façade sud, et ses deux tourelles en encorbellement sont anciennes. le donjon est séparé  d'une tourelle polygonale  par une construction du XIXe siècle percée  d'une arche en anse de panier qui donne accès à la cour. Le jardin d'agrément du parc, transformé en jardin public comprend, outre la cascade, la grotte et la fontaine, des statues en fonte, issues de la fonderie : en amont du bief de dérivation, deux statues de Neptune et Vénus, en aval, sur le parapet du pont, deux vases décoratifs en fonte avec oves et guirlandes. Inscrit au M.H. en 1937 .","habitants":"madame Julian Bertrand \r\n        \"","divers":"Château de Pocé à Pocé sur Cissé","gps":"","images":["../../jctruffet.com/image/image_37/37_Poc%c3%a9_Ciss%c3%a9_II_1.jpg","../../jctruffet.com/image/image_37/37_Poc%c3%a9_Ciss%c3%a9_II_2.jpg","../../jctruffet.com/image/image_37/37_Poc%c3%a9_Ciss%c3%a9_II_3.jpg"]},"Consult_chateau_formulaire6441":{"id":"Consult_chateau_formulaire6441","dept":"37","canton":"Amboise","commune":"Chargé","nom":"Pray","type":"Château","periode":"XVII","histoire":"PRAY, Geoffroy de Pray donne son nom en 1244, ne saurait passer inaperçu.  En 1431 Pierre du Mesnil seigneur de Pray, d'Isabeau  de Beauvilliers en 1468,  des Godeau en 1483 et en 1516 de François de Razines en 1548.  En 1631, à Jacques Le Maire il revient au commissaire d'artillerie de la reine d'Angleterre. En à la famille Guast en 1674 qui cède le domaine  en 1710,  de Pray passe à Jean  Bouteroue d'Aubigny qui décède en 1732, de son mariage avec Françoise le Moine de Renne-Moulin laissera une fille  prénommée également Françoise qui épouse en 1733 Louis de Conflans marquis d'armentières, la marquise décède en 1746  en 1777  Pray est cédé à Joseph-Cyprien Bertrand du Platon et le domaine sera vendu en 1792 par le tuteur des enfants  à monsieur Gaudron prêtre. A partir de 1819 changera plusieurs fois de mains acquis par le vicomte Henri d'Amboise, en 1831 à M. Duport en 1834 à la famille Pasturin qui le passe en 1854 à Emile Louis Vincent Ermel de la Grange. Au XXe siècle,  la veuve d'Alphonse Daudet madame Julia Allard y vécu. aujourd'hui transformé en hôtel.","architecture":"PRAY, dans son écrin de verdure, campé sur le coteau où s'étagent ses terrasses dominant la Loire, le château de Pray, flanqué de tours témoignant de son passé de forteresse, il devient résidence à la Renaissance, d'où datent deux superbes lucarnes à croisées de pierres, fut l'un des premiers châteaux à être transformé pour vous offrir un art de vivre imprégné du passé. Au XVIIIe, il appartient au conseiller des Rois d'Espagne et de France, et même à un officier proche de La Fayette dont le portrait orne la cheminée du XIXe siècle décorée de faïences à motifs mythologiques. Le château conserve des origines médiévales deux tours  cylindriques qui flanquent la façade nord du corps de logis, la tour occidentale, la plus imposante à deux mètres d'épaisseur à la base. Le logis, couvert d'un toit pentu reposant sur des pignons à rondélis à conservé quelques lucarnes datant du XVIe siècle, la façade nord épaulée par deux contreforts possède en son centre une baie en anse de panier encadré par des pilastres à chapitaux.","habitants":"Joseph-Cyprien Bertrand du Platon \r\n        \"","divers":"Château de Pray à Chargé","gps":"","images":["../../jctruffet.com/image/image_37/37_Pray_1.jpg","../../jctruffet.com/image/image_37/37_Pray_2.jpg","../../jctruffet.com/image/image_37/37_Pray_3.jpg"]},"Consult_chateau_formulairefa59":{"id":"Consult_chateau_formulairefa59","dept":"37","canton":"Ste-Maure de Touraine","commune":"Panzoult","nom":"Pressoir_37","type":"Château","periode":"XIV-XVI","histoire":"PRESSOIR, en 1606 le seigneur du Pressoir est Florent de Guyot, conseiller du roi et maître d'hôtel ordinaire en sa maison. En 1639 le Pressoir est un fief relevant de Roncée. Au XVIIIe siècle le domaine est déclassé en métairie ; il est vendu comme bien national à la Révolution. A l'ouest, le portail donnant accès à la basse-cour date de 1593. Le logis des communs attenant est de la fin du XVIe siècle ou du début du XVIIe siècle. A une centaine de mètres à l'ouest se dresse l'ouvrage d'entrée, encadré de chaque côté par une aile prolongée par un pavillon. Le logis seigneurial daté aussi de 1593 est  contemporain du pavillon sud-est qui lui est accolé. La façade sud du logis a été profondément remaniée. Fermant la cour à l'est, la galerie est datée de 1623. Le pavillon d'angle nord-est a été construit en 1663. Le pigeonnier pourrait être rattaché à la campagne de construction de 1593 au plus tard ; cependant son orientation qui rompt avec le plan général du château suggère qu'il a pu être construit avant.","architecture":"PRESSOIR  l'ensemble castral est constitué d'une basse-cour dans laquelle on entre à l'ouest par un portail à portes charretière et piétonne encadrées de pilastres doriques et surmontées de mâchicoulis. Les bâtiments attenants à gauche sont des communs dont un logis en moellon avec corniche à gros modillons. Les différents corps de bâtiments du château proprement dit délimitent une cour carrée cantonnées de pavillons d'angle. L'accès à la haute cour est défendu par un ouvrage d'entrée en pierre de taille à double pont-levis qui surmontait un fossé aujourd'hui comblé. Au sud, un corps de logis élevé d'un étage carré possède deux travées surmontées de lucarnes. La charpente est de type à chevrons-portant-ferme ; la couverture en ardoise. Un corps de bâtiment dont ne subsiste que l'arrachement prolongeait ce logis vers l'est. Il n'en reste qu'une partie de porte à fronton triangulaire. Une terrasse dont ne subsiste qu'une partie du mur de soutènement s'étendait au midi. Une galerie de sept travées ferme la cour à l'est. La façade sur cour possède sept travées à bossages au rez-de-chaussée, réduites aux dimensions de portes rectangulaires. Les baies de l'étage étaient toutes à l'origine surmontées de lucarnes. La façade postérieure est en moellons enduits renforcés par des chaînes apparentes. La charpente à chevrons-portant-fermes est couverte en ardoise. La galerie s'achève au sud par une tourelle en surplomb contre laquelle s'appuie le départ d'un mur à bossages perpendiculaire à la galerie. Le pavillon d'angle nord-est est accolé à à une tour d'escalier quadrangulaire desservant la galerie.","habitants":"seigneur du Pressoir est Florent de Guyot\r\n        \"","divers":"Le Pressoir à Panzoult","gps":"","images":["../../jctruffet.com/image/image_37/37_Pressoir_37_1.jpg","../../jctruffet.com/image/image_37/37_Pressoir_37_2.jpg","../../jctruffet.com/image/image_37/37_Pressoir_37_3.jpg"]},"Consult_chateau_formulaire7d1f":{"id":"Consult_chateau_formulaire7d1f","dept":"37","canton":"Descartes","commune":"Preuilly sur Claise","nom":"Preuilly_Claise","type":"Château","periode":"XIV-XVI-XIX","histoire":"Trois châteaux à Preuilly sur Claise celui de Fontbaudry de Lions, de Rallière et de Berjaudière pas d'info pour ces deux derniers.                                                                                                FONTBAUDRY, d'origine gallo romaine, le château est un ancien fief relevant de la baronnie de Preuilly, qui portait, au XIIIe siècle, le nom de Fons Balderici,  en 1320 Henri Ancelon  seigneur dans cette famille jusqu'en 1715 un des derniers fils meurt sans postérité sa veuve cède le domaine  au baron de Preuilly Nicolas-Louis  le Tonnelier de Breteuil. En 1794 sa descendance, la baronne des Landes de Blainville s'en défait  au profit de la famille Liot ancêtres des porpriétaires actuels, les Joubert de la Mothe qui feront construire en 1840 le nouveau château.                                                                                             LIONS, le domaine de Preuilly était considéré comme la première baronnie de Touraine. En 930, le vicomte Atton, premier seigneur connu, y construisit un bâtiment appelé château du Lion, qui fut détruit en 1130. Au XIVe siècle, la forteresse soutint plusieurs sièges contre les anglais qui la démantelèrent. Le château des Lions est restauré vers 1422 par Pierre Frottier, auquel Charles VII confia l'éducation de sa fille Jeanne qu'il eut d'Agnès Sorel.                                                         RALLIERE, corps de logis central à cinq travées a deux niveaux toit en croupes, flanqué de deux pavillons  aux extrémités celui de droite carré à trois travées sur trois niveaux toit en croupes et celui de gauche à trois travées mais à deux étages  toit en dôme.","architecture":"BERJAUDIERE , dans le même style de la Rallière,  du XIXe siècle à deux niveaux avec attiques sur les pavillons  toit en croupes.                                                                                             FONTBAUDRY, l'édifice actuel et se présente comme un pavillon rectangulaire dont la construction fut achevée en 1845 de plan quadrangulaire  corps de logis bâti en croupe, élevé sur rez-de-chaussée  et un étage  avec chambres hautes et basses, la façade méridionale marqués aux extrémités par des pilastres jumelés, cannelés et terminés par des chapiteaux corinthiens, cinq travées  trois d'entre elles sont groupées dans un avant-corps en légère saillie, scandé par des pilastres d'ordre colossal.  les ouvertures sont rectangulaires et sommées d'une frise et d'un larmier sauf l'avant-corps ou elles sont en plein cintre et couronnées de clefs moulurées. un grand fronton triangulaire.                                                                                                LIONS, les dernières réparations furent faites au début du XVIIe siècle. A partir de 1650 les barons établirent leur résidence à Azay-le-Ferron et abandonnèrent leur château de Preuilly. Au sud, une porte féodale en berceau est accompagnée d'une tour ronde et d'un petit logis couvert en pavillon, qui servait de premières défenses. Un mur d'enceinte encercle le domaine. En 1816 le maire M. Delatramblais décida la destruction du pont-levis et les douves du côté nord étaient comblées. Au XXe siècle (en 1905-1906), le château, propriété de la famille Cartier, fut rebâtit dans un style pour le moins discutable, mais qui eut le mérite de stopper sa destruction.","habitants":"Fontbaudry;  famille Liot                                                                 Lion; Famille Pierre Frottier\r\n        \"","divers":"à Preuilly sur Claise celui de Fontbaudry grav -4-5, de Lions grav-1-2-3, de Rallière grav-6 et de Berjaudière grav-7","gps":"","images":["../../jctruffet.com/image/image_37/37_Preuilly_Claise_1.jpg","../../jctruffet.com/image/image_37/37_Preuilly_Claise_2.jpg","../../jctruffet.com/image/image_37/37_Preuilly_Claise_3.jpg","../../jctruffet.com/image/image_37/37_Preuilly_Claise_4.jpg","../../jctruffet.com/image/image_37/37_Preuilly_Claise_5.jpg","../../jctruffet.com/image/image_37/37_Preuilly_Claise_6.jpg","../../jctruffet.com/image/image_37/37_Preuilly_Claise_7.jpg"]},"Consult_chateau_formulaire9d74":{"id":"Consult_chateau_formulaire9d74","dept":"37","canton":"Ste-Maure de Touraine","commune":"Crouzilles","nom":"Puy_Bascle","type":"Château","periode":"XIV","histoire":"PUY-BASCLE, le château de Puy-Bascle, ancien fief cité pour la première fois en 1346, fut d'abord une tour à usage de défense et de résidence. D'une première construction élevée au cours de la seconde moitié du XIIIe siècle ou de la première moitié du XIVe siècle, subsiste une porte au niveau inférieur, dont les piédroits supportent des coussinets surmontés d'un linteau en mitre. Le donjon en pierre de taille a été très dégradé au XIVe siècle, reconstruit au XVe siècle. Le château fut une place-forte protestante durant les guerres de Religion. Le cadastre ancien fait apparaître une cour délimitée par des communs à l'ouest dont il ne reste plus rien aujourd'hui. En face du donjon, au sud, se trouve un long bâtiment datant du XVIe siècle, abritant à l'origine un ou plusieurs logis, fortement remaniés au XVIIIe siècle, transformés en étable à une date indéterminée puis transformés à nouveau en habitation.","architecture":"PUY-BASCLE, le donjon rectangulaire en pierre de taille, est assis sur le rocher. Au-dessus des baies du deuxième étage, des trous de boulins régulièrement espacés sont encore visibles, bien que bouchés. Un toit à longs pans du XVe siècle, puis rabaissé, les restaurations en cours lui restituent sa première inclinaison, le deuxième étage ouvre à l'est sur une terrasse dominant le rocher. Au sud-ouest une tour d'escalier demi hors-oeuvre, son escalier à vis en pierre dessert les étages et le comble. L'angle nord-ouest est défendu par une petite tour quadrangulaire demi hors-oeuvre. Dans la cour à l'est, un couloir creusé dans le roc dessert une cavité troglodytique utilisée autrefois comme chapelle ou temple et dont la voûte est soutenue par de larges arcs doubleaux de section rectangulaire. Le rez-de-chaussée est desservi par un couloir creusé dans le rocher communiquant avec la chapelle. Le bâtiment longitudinal, au sud, abritant un logis élevé d'un étage carré est bâti en moellons et possède un toit à longs pans à pignon découvert, couvert en tuiles et en ardoises.","habitants":"Seigneur local\r\n        \"","divers":"le château de Puy-Bascle à Crouzilles","gps":"","images":["../../jctruffet.com/image/image_37/37_Puy_Bascle_1.jpg"]},"Consult_chateau_formulaire3e51":{"id":"Consult_chateau_formulaire3e51","dept":"37","canton":"Château-Renault","commune":"Marray","nom":"Pénissière","type":"Château","periode":"XVII","histoire":"PENISSIERE, la première mention du nom de Marray apparaît dans un document du XIe sous le nom de Marreium, paroisse Saint-Pétri de Marreio.  Marray formait une châtellenie relevant de Lavardin à foi et hommage simple,est mentionné en 1465. C'est un ancien fief relevant de la châtellenie du Bois et de la prévôté de Neuvy. Ayant appartenu à Jean de Montplacé, il fut la propriété de la famille Menou au XVIIe siècle. Dans l'aveu de 1664, il est décrit comme \"lieu et hôtel de la Pénissière\" qui appartient du XIe au XVIIe siècles aux seigneurs de Marray, dont le logis pourrait être la demeure située en hauteur, au Nord-Est du bourg, portant le nom de \"château\". La châtellenie revient à partir de 1652 à la famille de Menou, seigneur du château voisin de la Roche d'Alès. François de Menou rend aveu au baron de Lavardin et devient seul propriétaire de la châtellenie en 1710. Avant la Révolution, la paroisse de Marray dépendait de l'élection de Tours et faisait partie du doyenné de Neuvy-le-Roi et de l'archidiaconé d'Outre-Loire, diocèse de Tours.","architecture":"PENISSIERE, est mentionné en 1465, composé d'une salle, de quatre chambres garnies de garde robes, d'une cuisine et d'une cour. Le tout enclos de douves, d'un pont-levis et de murailles. La basse-cour consistant en une grange-étable clos aussi de douves, d'une fuie, de trois jardins et vergers. A la Révolution, La Pénissière est vendue le 27 messidor an 6 (15 juillet 1798). Le registre des matrices cadastrales mentionne comme propriétaire en 1834, Caillé-Buffereau, négociant, et signale la démolition du logis en 1864, mais ce logis est noté en 1880 comme reconstruit et propriété de Charles-Louis Caillé. La construction d'une chambre dans la tourelle Sud-Est est citée en 1889. De la partie ancienne, il reste une terrasse entourée de douves et trois des quatre tours disposées à chaque angle. Le pigeonnier est aujourd'hui converti en habitation. Le logis est couvert d'un toit en croupe, les tours et le pigeonnier sont couverts d'un toit conique.","habitants":"Famille de Menou\r\n        \"","divers":"A Marray le château de Pénissière","gps":"","images":["../../jctruffet.com/image/image_37/37_P%c3%a9nissi%c3%a8re_1.jpg","../../jctruffet.com/image/image_37/37_P%c3%a9nissi%c3%a8re_2.jpg","../../jctruffet.com/image/image_37/37_P%c3%a9nissi%c3%a8re_3.jpg"]},"Consult_chateau_formulaire4b8c":{"id":"Consult_chateau_formulaire4b8c","dept":"37","canton":"Bléré","commune":"Céré la Ronde","nom":"Razay","type":"Château","periode":"XV","histoire":"RAZAY,  constituait un fief relevant du château de Montrichard. Le premier seigneur connu est Pierre de Pons, mort en 1512. En 1574, le château est vendu ou saisi au bénéfice de Nicolas de Thienne, également orthographié d'Estienne, homme d'armes venu d'Italie pour s'établir en Touraine en 1572. A son décès en 1599, il porte le titre d'écuyer, seigneur de Razé. Son second fils, Esme, qui avait acquis le château du Châtellier en 1606, hérita de Razay en 1609. A sa mort en 1641, son fils aîné Henri hérite des terres. Après son décès, ses biens furent saisis sur son épouse Marie des Couleurs, et vendus en janvier 1685. Gaëtan de Thienne, cousin de son défunt mari et seigneur de la Tour de Cigogné, devint alors adjudicataire de Razay. A sa mort en 1724, c'est son fils, Louis Gaëtan de Thienne qui en hérite ; lui-même le transmet à sa fille unique dont le fils, Louis Gaëtan Marie de Saint-Chamans, devint ensuite propriétaire. Il vendit Razay le 24 novembre 1834 à madame de Hervas, épouse en première noce  du maréchal Duroc puis de Charles Nicolas Fabvier. Elle vend Razay en 1846 à Charles Eléonore Moulin, qui lui même le revend en 1856 à Michel Durand.  En août 1944, Razay devint le quartier général du maquis Le Coz et fut le siège d'épisodes tragiques. Le 6 juin 1947, le château dut racheté par EDF qui l'aménagea en centre d'hébergement pour colonies de vacances. Actuellement, le château est aménagé en chambres d'hôtes par Hermine Stéphan.","architecture":"RAZAY, est constitué de plusieurs bâtiments d'époques différentes accolés perpendiculairement et formant une composition complexe. L'aile est-ouest comprend : un pavillon en pierre de taille de plan rectangulaire, élevé de deux étages carrés et couvert d'un toit en pavillon, ainsi qu'un logis, dont les pignons sont orientés sur cour et jardin, accolé perpendiculairement. Un corps de logis de cinq travées rejoint une tour de plan carré accolée à un autre logis dont les pignons sont orientés sur cour et jardin. Un dernier corps de logis, agrandi au rez-de-chaussée par des pièces largement éclairées au moyen de baies en arc segmentaire, se situe à l'angle des deux ailes. Côté cour, ce logis qui comprend deux travées, a été agrandi par un pavillon d'entrée couvert d'un toit en pavillon. Tous ces corps de bâtiment sont couverts en ardoise. La basse-cour au nord comprend divers bâtiments ; celui situé au nord face à l'aile est-ouest du château possède, dans sa partie ouest, un petit logis à lucarne à fronton triangulaire, couvert en tuile plate et dont le pignon est accolé à une demi tour en pierre de taille couverte d'un toit conique. Juste à l'ouest de cette petite tour se dresse une tour ronde isolée construite en moellon jusqu'aux deux-tiers de sa hauteur et en pierre de taille pour le tiers supérieur ; elle est couverte d'un toit conique dit \"en poivrière\" en ardoise.","habitants":"Famille de Nicolas de Thienne\r\n        \"","divers":"Château de Razay à Céré la Ronde","gps":"","images":["../../jctruffet.com/image/image_37/37_Razay_1.jpg","../../jctruffet.com/image/image_37/37_Razay_2.jpg","../../jctruffet.com/image/image_37/37_Razay_3.jpg"]},"Consult_chateau_formulaire23d5-2":{"id":"Consult_chateau_formulaire23d5-2","dept":"37","canton":"Ste-Maure de Touraine","commune":"Razines","nom":"Razines","type":"Château","periode":"XV-XVI","histoire":"quatre châteaux à Razines dont celui de Milly, de Garelière, de Fougeray et de Charge.                                                                                   MILLY, le château du Pont, « Terra de ponte araldi », était au XIe siècle un pont fortifié dépendant de l'abbaye du Noyers et entouré de douves. C'était à cette époque le seul pont sur la Veude. Il était en 1500 propriété de René de Razines. L'édifice a été entièrement rebâti au XVIIe siècle ; n'en subsiste aujourd'hui qu'un pavillon à deux étages. . Hôtellerie, propriété de monsieur Charles Brisset.                                                                                          GARELIERE, où sur 22 hectares s'étend l'un des meilleurs vignobles de la région, est une ancienne propriété du cardinal de Richelieu, d'où il tirait autrefois son propre vin de table, le faisant venir à Paris. Le vignoble bénéficie aujourd'hui d'une appellation A.O.C.                                                                                                                     Le manoir du Haut-FOUGERAY appartenait à la fin du XVIIe siècle à Henri Besnard, qui avait épousé en 1696 Madeleine de Chargé (née en 1662), fille de César de Chargé, seigneur de lAngle à Doussay.  A la Révolution, le propriétaire : Monsieur de Richemont émigra et le manoir fut vendu comme bien national.","architecture":"Le manoir de REVEILLON et le château de MILLY sont quant à eux deux excellents exemples de bâtisses tourangelles de style directoire telles que l'on pouvait en voir au XVIIIe siècle.\r\n CHARGE, ancien fief de l'abbaye de Noyers, le château fut construit par un certain Isembard de Chargé, qui l'a offert, avec l'abbaye du Noyers, à sa femme Oda. Passé ensuite en différentes mains, profondément remanié aux XVIe siècle, XVIIe siècle et XVIIIe siècle, par les De Blet, ses propriétaires, saisi à la Révolution en qualité de bien national, il existe toujours et ses bâtiments abritent une exposition agricole. Le château possédait des dépendances, notamment la bâtisse de Haute-Claire, désormais propriété de la famille Beausse depuis le XVIIIe siècle . Un souterrain de plus de 800 mètres, assez large pour accueillir un attelage de chevaux, courait depuis le château vers la ferme de Haute-Claire. Il existait également une chapelle accolée au château construite au XIVe siècle, celle-ci sera détruite en 1890. Beaucoup d'autres monuments sont encore à découvrir sur la commune de Razines, comme le château du Fougeray, construit au XIXe siècle par les Pradeau, et d'autres vestiges : four, lavoir, souterrains, moulin (comme celui de Girrault, Pont, Joubert).","habitants":"Milly ; René de Razines                                                         Garelière; cardinal de Richelieu                                                    Haut-Fougeray; Henri Besnard                                              Chargé; famille des De Blet \r\n        \"","divers":"à Razine, de Milly grav 5-6, de Garelière, de Fougeray grav 2-3-4 et de Charge.","gps":"","images":["../../jctruffet.com/image/image_37/37_Razines_1.jpg","../../jctruffet.com/image/image_37/37_Razines_2.jpg","../../jctruffet.com/image/image_37/37_Razines_3.jpg","../../jctruffet.com/image/image_37/37_Razines_4.jpg","../../jctruffet.com/image/image_37/37_Razines_5.jpg","../../jctruffet.com/image/image_37/37_Razines_6.jpg"]},"Consult_chateau_formulaire65a5-2":{"id":"Consult_chateau_formulaire65a5-2","dept":"37","canton":"Loches","commune":"Reignac sur Indre","nom":"Reignac_Indre","type":"Château","periode":"XV-XVIII","histoire":"REIGNAC, bâti sur les ruines dune ancienne forteresse édifiée pour protéger le passage de lIndre, le château actuel est aujourdhui le témoin vivant de plusieurs siècles darchitecture. Au XVe siècle, la famille du Fau qui vient d'acquérir le fief, construit un château fortifié. De ce château de Jehan du Fau restent deux tours rondes encadrant la façade donnant sur le parc et la salle des gardes. Reignac deviendra par la suite la propriété de Pierre Forget, secrétaire détat sous Henri III et Henri IV, et principal rédacteur de lédit de Nantes, puis dAymard de Chouppes, compagnon denfance de Louis XIII. En mars 1710, Louis XIV érige la baronnie du Fau en marquisat de Reignac au profit de \"Notre cher et bien aimé Louis de Barberin, chevalier, comte de Reignac\". Le marquis de Lafayette en hérite lors de la succession de sa mère, Marie Julie de La Rivière, arrière petite fille de Louis de Barberin. Le marquis et son épouse, Adrienne de Noailles, feront de nombreux séjours à Reignac jusquen 1792, date à laquelle les Lafayette céderont le château. En 1861, la famille Müller achète Reignac et fait appel à larchitecte Collet qui procède à un habillage néo-gothique de la propriété.","architecture":"REIGNAC, comte de Reignac\". Celui-ci entreprend de profondes transformations afin de mettre le château au goût du jour. Aux environs de 1900, le château séclaire à lélectricité grâce à son moulin sur lIndre. Mais en 1911, la banque Henrotte Müller fait faillite et les biens des Müller sont saisis. Le château de Reignac devient alors la propriété de la famille de Vibraye-Cheverny, qui le conserve jusquen 1984. En 2002, Erick Charrier, ancien publicitaire, fait l'acquisition du château. Les travaux de restauration entrepris, ont pour but d'adapter la demeure aux normes d'un établissement hôtelier quatre étoiles, en ayant à coeur de respecter l'esprit des lieux...Sa construction a débuté au XVe et s'est achevée au XVIIIe siècle. C'était une ancienne forteresse. Le château de Reignac a été l'ancienne propriété du Marquis de Lafayette. vous pourrez goûter l'art de vivre dans ce beau château où règne encore de ce bel esprit du XVIIIe siècle, raffiné, insouciant, et si léger. Un château où vécurent Jean du Fau, Louis de Barberin, Gilbert de Lafayette, Adrienne de Noailles et bien d'autres. Vous serez accueilli par son propriétaire Erick Charrier.","habitants":"Famille d'Aymard de Chouppes et le marquis de Lafayette\r\n        \"","divers":"Reignac : 47° 13' 58\" Nord et 0° 55' 00\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Reignac_Indre_1.jpg","../../jctruffet.com/image/image_37/37_Reignac_Indre_2.jpg"]},"Consult_chateau_formulaire113c-3":{"id":"Consult_chateau_formulaire113c-3","dept":"37","canton":"Château-Renault","commune":"Epeigné-sur-Dême","nom":"Rennefort","type":"Chateaux","periode":"XVII","histoire":"A Epreigné-sur Dême ; château de Girardet (voir article)\r\nRENNEFORT, la première mention d'un propriétaire connu est donné par Carré de Busserolle. Le château appartenait en 1768 à Mathurin Durand, maître ordinaire de la chambre des comptes. En 1820 il est à la famille Salmon de Loiray, descendant de la famille Martel-Marchère, qui possédait le fief et les terres d'Epeigné-sur-Dême, et le vend en 1828 à Charles et Jules Vacher,  en 1889, Auguste Gobert, propriétaire du château voisin de la Marchère et époux de la nièce de Charles Vacher, devient propriétaire de Rennefort : Charles et Jeanne de Meurs, qui vers 1896 prolongent la demeure, à l'arrière, par la construction d'un bâtiment, communiquant avec la cuisine, servant de commodités et d'appentis, au-dessus du puits. Après la mort d'Auguste Gobert, la demeure est vendue en 1904 à son neveu Raymond Leddet dont les descendants en sont actuellement propriétaires. Les matrices cadastrales mentionnent la construction d'une serre en 1905. Ce sont ensuite essentiellement des travaux d'aménagement intérieur qui ont été effectués au XXe siècle ; les communs ont été partiellement reconstruits après un incendie en 1992.","architecture":"RENNEFORT, château à un étage carré et un étage de comble, en calcaire moellon enduit, couvert d'un toit en croupe. Étage de comble éclairé par des lucarnes en pierre accostées d'ailerons et couronnés d'un motif floral pour la lucarne centrale et du motif de la coquille pour les lucarnes latérales,  la demeure comporte un rez-de-chaussée, composé de quatre pièces en enfilade et un étage, percé de hautes lucarnes, réservé aux chambres, auquel on accède par un escalier en bois, placé sur la façade arrière dans une tour en pavillon. Perpendiculairement au château, les communs, composés d'une écurie, d'une sellerie et de deux remises. Des dépendances : caves, fruitier et étable ont été creusés dans le coteau, derrière la façade postérieure. D'après les augmentations cadastrales une construction nouvelle est notée, en 1857, il peut s'agir du rehaussement du bâtiment par un étage supplémentaire, la charpente et les lucarnes ayant été démontés puis replacées après les travaux. Une tourelle à trois pans est édifiée sur l'arrière pour loger le nouvel escalier au centre de la maison.","habitants":"famille Salmon de Loiray\r\n        \"","divers":"Rennefort; 47° 40' 11\" nord, 0° 36' 52\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Rennefort_1.jpg","../../jctruffet.com/image/image_37/37_Rennefort_2.jpg"]},"Consult_chateau_formulaire41ab":{"id":"Consult_chateau_formulaire41ab","dept":"37","canton":"Langeais","commune":"Restigné","nom":"Restigné","type":"Château","periode":"XVI-XVII","histoire":"deux châteaux à Restigné; Brulon, Restigné, Louy et à Ingrande château de la Minière.                                             RESTIGNE, le manoir de Restigné est une demeure seigneuriale du XVIIe siècle, au cur du vignoble de Bourgueil et du triangle Tours Chinon Saumur. Après avoir officié dans les cuisines de restaurants prestigieux tels que le Relais du Parc, au côté d'Alain Ducasse, le chef brasse aujourd'hui avec bonheur, innovation et tradition au chai.     \r\nBRULON, ancien fief relevant de la châtellenie de Benais. Le logis du XVIe siècle présente un étage sur rez de chaussée et un comble éclairé de lucarnes. La façade sud est accolée d'une tour hexagonale contenant une vis de pierre. Au premier étage, deux des salles sont chauffées par des cheminées à hotte oblique. Le manteau de l'une d'elles est décoré d'une peinture avec rinceaux et feuillages. Une décoration picturale civile pouvant dater du XVIe siècle, subsiste dans la salle ouest du 1er étage. Des arbres sont disposés de part et d'autre de représentations animales. Une scène est à personnage.                                                                                                      A deux kilomètres à l'est à Ingrande MINIERE,  est situé au sein de l'AOP Bourgueil dans le vignoble du Val de Loire. Depuis plusieurs siècles, cette ancienne demeure en tuffeau du XVIe siècle est gérée par des femmes. Son parc historique entouré de vignes offre un cadre idéal.","architecture":"LOUY, ancien fief connu depuis le IXe siècle, mentionné dans une charte de Charles le Chauve confirmant les possessions de la collégiale Saint-Marau. C'est un ensemble de bâtiments du XVIIe siècle n'ayant pas été dénaturés. L'accès se fait au sud par un grand portail en plein cintre menant à une grande cour fermée par trois différents corps de bâtiments. Au nord, le bâtiment principal d'habitation se divise en un corps central et deux pavillons en avancée. Deux petites tours carrées encadrent le logis principal. En retour, une chapelle surmontée d'un clocheton carré en lanternon, terminé par un dôme. A l'est et à l'ouest de la cour, deux bâtiments bas servent de communs, leurs toitures s'imbriquant dans le logis et la chapelle.                                   PLATERYE,  hôtel du style XVIIe est proche de la ville historique de Bourgueil, lieu de la royauté française pour la période estivale. Cette demeure seigneuriale est un lieu légendaire grâce à son histoire du nord-ouest de la Touraine. Authentique et majestueux.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"à Restigné; Brulon grav-1, Restigné grav 2, Louy grav-3,et à Ingrande chateau de la Minière Grav 4 à 7 . Platerre grav 8","gps":"","images":["../../jctruffet.com/image/image_37/37_Restign%c3%a9_1.jpg","../../jctruffet.com/image/image_37/37_Restign%c3%a9_2.jpg","../../jctruffet.com/image/image_37/37_Restign%c3%a9_3.jpg","../../jctruffet.com/image/image_37/37_Restign%c3%a9_4.jpg","../../jctruffet.com/image/image_37/37_Restign%c3%a9_5.jpg","../../jctruffet.com/image/image_37/37_Restign%c3%a9_6.jpg","../../jctruffet.com/image/image_37/37_Restign%c3%a9_7.jpg","../../jctruffet.com/image/image_37/37_Restign%c3%a9_8.jpg"]},"Consult_chateau_formulaire2afb":{"id":"Consult_chateau_formulaire2afb","dept":"37","canton":"Ste-Maure de Touraine","commune":"Richelieu","nom":"Richelieu","type":"Palais","periode":"XVI","histoire":"RICHELIEU; a la fin du XIIe siècle existe un château de Richeloc construit pour les seigneurs de Mauson. En 1201, construction de la chapelle dédiée à Saint Nicolas de Lyre; en 1407, mention de \"l'Hostel de Richelieu\" avec cloison et douves; en 1429, Charles VII donne l'autorisation de le fortifier, ce premier château n'a pas laissé de trace, la seigneurie de Richelieu entre dans la famille du Plessis. Il est remanié complètement à la fin du XVIe siècle ; et en 1621, Armand du Plessis achète la propriété et dès 1624 entreprend des travaux. Le cardinal de Richelieu ambitionne un programme architectural plus vaste vers 1630, associant une ville au château qu'il confie à l'architecte Jacques Lemercier ; le vieil édifice est conservé tant que le nouveau n'est pas habitable ainsi que la chapelle jusqu'en 1639,; la construction est terminée avant la mort du Cardinal en 1642 ; dans les années 1760, le maréchal de Richelieu réalise des travaux dans la galerie des glaces.","architecture":"RICHELIEU, confisqué à la Révolution comme bien d'immigré, il est laissé à l'abandon ; restitué au duc par Napoléon Ier, la demeure est vendue en 1805 à Boutron qui entreprend sa démolition; en 1877, le banquier Heine achète le domaine et remet en état le parc et restaure le pavillon des communs subsistant ; dans le parc, il se fait bâtir un bâtiment de style néo-classique ; les vestiges conservés aujourd'hui sont très restaurés, à l'exception des deux grottes ; seul le pavillon central des écuries est conservé après la démolition de l'aile Est vers 1900.\r\nLa composition des bâtiments du château présentaient une hiérarchie des étages : quatre niveaux pour le château, trois pour les écuries, deux pour les communs, un pour le mur de clôture ; le pavillon des écuries est couvert d'une voûte en arc de cloître à lunettes; les grottes sont divisées en trois vaisseaux et couvertes de voûtes d'arêtes plates ; le vaisseau central se terminé par une abside couverte d'une voûte en coquille.","habitants":"cardinal de Richelieu\r\n        \"","divers":"Château de Richelieu","gps":"","images":["../../jctruffet.com/image/image_37/37_Richelieu_1.jpg","../../jctruffet.com/image/image_37/37_Richelieu_2.jpg","../../jctruffet.com/image/image_37/37_Richelieu_3.jpg","../../jctruffet.com/image/image_37/37_Richelieu_4.jpg"]},"Consult_chateau_formulaire490f":{"id":"Consult_chateau_formulaire490f","dept":"37","canton":"Ste-Maure de Touraine","commune":"Rilly sur Vienne","nom":"Rilly","type":"Château","periode":"XVI","histoire":"RILLY    En 1313, Jamet de Peloquin est seigneur de Rilly, mais c'est Guillaume Odart, chambellan du Roi René d'Anjou, qui fait bâtir une forteresse au milieu du XIVe siècle. Au XVIe siècle, le château devient le fief des Paumart. En 1753, la châtellenie de Rilly est achetée par Claude Henry Odart, descendant du constructeur. En 1840, Ulysse Charbonnier rachète la propriété, détruit le château et fait construire la demeure actuelle. Ces opérations l'ayant ruiné, Rilly est saisi et acquis par maître Boucq, notaire local.","architecture":"RILLY, en 1911, l'édifice revient dans la famille Odart. Les arbres du parc ont été plantés à cette époque.\r\nLe château, de plan rectangulaire, est édifié en moellons de calcaire recouverts d'un enduit ; les deux cordons qui soulignent l'étage, les chaînages d'angles, et les encadrements des baies sont en pierre de taille. L'élévation compte trois travées. La lucarne centrale de la façade antérieure est jumelée et sommée d'un fronton cintré. Les autres lucarnes sont identiques, à baie simple dont l'arc segmentaire s'orne d'une clé légèrement saillante.","habitants":"Famille de Claude Henry Odart\r\n        \"","divers":"Château de Rilly","gps":"","images":["../../jctruffet.com/image/image_37/37_Rilly_1.jpg"]},"Consult_chateau_formulaire14da":{"id":"Consult_chateau_formulaire14da","dept":"37","canton":"Château-Renault","commune":"Marray","nom":"Roche_Alès","type":"Château","periode":"XVI-XVII","histoire":"La ROCHE D'ALES, la première mention connue du propriétaire de la Roche est donnée par un acte du XVe siècle, nommant Guyot de Courtallais, seigneur de la Roche. En 1508, l'édifice est vendu à François d'Allès, médecin du roi qui transmet le domaine à sa fille, qui épouse Martin Fumée, c'est du XVIe siècle époque où la famille Fumée en fut propriétaire, que datent les bâtiments construits actuellement à l'extrémité Est du grand bâtiment et celui qui lui fait face. En 1618, le mariage de Madeleine Fumée avec René de Menou fait entrer la propriété dans la famille de Menou qui ajoutent leur patronyme au nom de la Roche et le gardent jusqu'à la Révolution. C'est au XVIIe et XVIIIe siècle que sont ajoutés les deux corps de logis ornés de lucarnes, prolongeant à l'Ouest les bâtiments du XVIe siècle. Acheté en 1805 par Gatien Pays, il est la propriété de cette famille depuis cette date. En 1898, Louis Pays Nau fait construit la partie située à l'extrémité ouest, à la place d'un bâtiment du XVIIIe siècle. La date  de 1898 est inscrite sur le fronton de la lucarne ornant le corps central du bâtiment. Louis Pays Nau avait prévu de reconstruire le château mais son projet ne fut pas exécuté par manque de crédits, le raccord entre le bâtiment de 1898 et les bâtiments anciens fut réalisé qu'une quinzaine d'années plus tard.","architecture":"La ROCHE D'ALES;  château composé d'un corps principal formé d'une succession de sept corps de bâtiments, d'Est en Ouest et d'un bâtiment allongé, placé parallèlement à la façade sud, à l'extrémité Est du corps principal. Murs en calcaire moellon enduit de couleur ocre ; encadrement des baies en pierre de taille, corniche en pierre de taille, toit en tuile plate, toit à longs pans couverts pour l'ensemble des bâtiments, toit en pavillon avec tour carrée de l'escalier du bâtiment, encadrement des baies et la corniche sont en pierre de taille, toit en ardoise, à longs pans couverts pour les bâtiments, toit conique pour la tour d'escalier, lucarne en pierre, pilastres plats et fronton triangulaire,  lucarne en pierre, montants accostés d'ailerons et fronton courbé, ouvertures des baies en arc en plein cintre au rez-de-chaussée et rectangulaires à meneaux pour les étages, lucarnes en pierre de taille, fronton triangulaire ; toit en croupe pour la partie principale, polygonal au sommet du hall d'entrée et toit conique pour les tourelles d'angle.","habitants":"famille Fumée\r\n        \"","divers":"Château des Roches d'Alés   47° 37' 26\" Nord et 0° 40' 04\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Roche_Al%c3%a9s_1.jpg","../../jctruffet.com/image/image_37/37_Roche_Al%c3%a9s_2.jpg","../../jctruffet.com/image/image_37/37_Roche_Al%c3%a9s_3.jpg"]},"Consult_chateau_formulaire4fcc":{"id":"Consult_chateau_formulaire4fcc","dept":"37","canton":"Chinon","commune":"La Roche-Clermault","nom":"Roche_Clermault","type":"Château","periode":"XV","histoire":"trois châteaux à la Roche Clermault dont celui de Clermault, de Bonnellière et de Charge.                                                              CLERMAULT, ancienne châtellenie et seigneurie; appartient en 1142 au chevalier Mangot, en 1256 à Bouchard de Marmande; au XIIIe siècle à la famille de Sancerre; en 1490 à Edmond de Bueil; en 1619 à Balthazar Le Breton, seigneur de Villandry; puis  à son fils Simon, qui rend hommage en 1643. Le château actuel fut élevé en 1638, date portée, mais inachevé; le château antérieur est en ruine sur l'aquarelle de Gaignières (1699). La chapelle porte la date 1602; à la fin  du XVIIIe siècle, il appartient à Fortuné Bouin de Noire, chanoine de Saint Mexme à Chinon.                                                                         BONNELLIERE, en 1600 Gatin Besnard marchand vend à Jean Le Breton sieur de Cuzay le lieu fief terre et seigneurie de la Bonnelière. Jean Le Breton achète le fief voisin de la Gilberdière. En 1795 acquis par sieur  Deville et en 1846 à la famille Plouzezu.","architecture":"BONNELLIERE, édifice de la fin du XVIe siècle, ou début XVIIe siècle ; chapelle et portail quatrième quart du XVIIIe siècle. Le corps de logis de trois niveaux et couvert d'un haut comble prolongé à l'ouest par un pavillon en saillie, de même hauteur et à l'Est coiffée en bulbe,une tour cylindrique manoir entouré d'un mur d'enceinte, flanqué à l'angle sud ouest d'une fuie cylindrique qui a conservé ses boulins, un étage carré, escalier demi-hors-oeuvre ; escalier à  vis; moellon ; pierre de taille toit en pavillon ; toit à longs pans, ardoise ; tuiles plates.                                                                                           CHARGE, ancien fief relevant du château de Chinon, il appartient en 1429 à Guillaume de la Barre, écuyer, en 1484 à René de la Barre, en 1500 à Fiacre de la Barre, Hardouin de la Barre en 1536; et à Nicolas de la Barre, gentilhomme de la chambre du roi. En 1700, le fief de Chargé passe à René du Trochet, Jean François Doucet, avocat au bailliage de Chinon en 1727, en 1778 vendu à Denis Laurent Thinault qui vend en 1787 à Anne Françoise Lenée; la chapelle est mentionnée dans le registre de visite de 1787; édifice au XVIe siècle, escalier déplacé; lambris du XVIIIe siècle; huisserie de porte à motifs de la première Renaissance, présence d'une salle au dessus du premier escalier dans la tourelle.","habitants":"Bonnelière; famille Plouzezu                                                      Chargé; Famille de la Barre et Denis Laurent Thinault \r\n        \"","divers":"à la Roche Clermault dont celui de Clermault grav -5-6-7, de Bonnellière grav1-2 et de Charge grav -3-4.  Roches,  47° 08' 19\" nord, 0° 12' 12\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Roche_Clermault_1.jpg","../../jctruffet.com/image/image_37/37_Roche_Clermault_2.jpg","../../jctruffet.com/image/image_37/37_Roche_Clermault_3.jpg","../../jctruffet.com/image/image_37/37_Roche_Clermault_4.jpg","../../jctruffet.com/image/image_37/37_Roche_Clermault_5.jpg","../../jctruffet.com/image/image_37/37_Roche_Clermault_6.jpg","../../jctruffet.com/image/image_37/37_Roche_Clermault_7.jpg"]},"Consult_chateau_formulaire8666":{"id":"Consult_chateau_formulaire8666","dept":"37","canton":"Château-Renault","commune":"Saint-Paterne","nom":"Roche_Racan","type":"Château","periode":"XVII","histoire":"ROCHE-RACAN, au XVe siècle  possessions de la famille de Fontaines, par alliance passe à la famille du Bueil,  en 1589 naissance de Aubigné d'Honorat de Bueil poète,   fils de Louis de Bueil et de Marguerite de Vendômois en 1670 décès d'Honorat du Bueil seigneur de  Racan, son fils Antoine qui porte le titre de marquis de la Fontaine Guérin lui succède , son fils Honorat du même prénom que le précédent dernier de la lignée. En 1745, le château est acquis  par Michel Rolland des Escotais qui obtiennent en 1754 l'érection du domaine en comté sous le nom de la Roche des Escotais, Louis des Esctais émigre en 1791 avec ses deux fils . A la Révolution, il est acquis par Etienne René Méhabert. Lors de la vente en 1818, à Michel Mathurin Mabille, il n'est fait mention que du grand pavillon, il est possible que la partie centrale reliant les deux pavillons et la chapelle du pavillon Est ait été démolie entre 1794 et 1817. Au XIXe siècle passe dans les mains de plusieurs propriétaires qui s'attachent à restaurer les lieux. Aimé Bodin de 1830 à 1845, Alphonse Huet pendant trente ans de 1845 à 1875 remet le château et le parc en état. Francis Arthur de Civrieux, propriétaire de 1875 à 1888 La famille Gauthier  font construire  à la place du portique disparu une avancée couverte en terrasse et éclairé par de grande baie en plein cintre.  Aujourd'hui la famille Brackers de Hugo propriétaire Il est inscrit aux M.H. depuis 1947.","architecture":"ROCHE-RACAN, a l'époque féodal était un château fort dont les tours et le corps de logis enfermé dans une enceinte. un nouveau château  a été construit en 1637 à 1650. le pavillon de gauche accosté d'une tourelle polygonale s'élève à parir du solde la vallée ce qui donne une vertigineuse hauteur, relié par un corps de logis dont le centre est occupé par  un portique à un second pavillon couvert d'un dôme, vaste terrasse  bordée de balustrades, les lucarnes passantes sont sommées de frontons triangulaires.   Déclarés en ruine en 1860, ils sont remplacés par une serre. C'est également du premier tiers du XIXe siècle que doivent dater les bâtiments situés en bordure de coteau, à droite de la grille d'entrée, agrandir le pavillon Ouest par la construction d'une cuisine en rez-de-chaussée.  Un four à chaux et à tuile est construit en 1820 à l'Est des communs, ainsi qu'une manufacture de faïence connue par un inventaire de 1837.","habitants":"Michel Rolland des Escotais\r\n        \"","divers":"Château de Racan à Saint-Paterne   47° 35' 25\" N, 0° 30' 00\" Est.","gps":"","images":["../../jctruffet.com/image/image_37/37_Roche_Racan_1.jpg","../../jctruffet.com/image/image_37/37_Roche_Racan_2.jpg","../../jctruffet.com/image/image_37/37_Roche_Racan_3.jpg","../../jctruffet.com/image/image_37/37_Roche_Racan_4.jpg","../../jctruffet.com/image/image_37/37_Roche_Racan_5.jpg"]},"Consult_chateau_formulaire8565":{"id":"Consult_chateau_formulaire8565","dept":"37","canton":"Vouvray","commune":"Rochecorbon","nom":"Rochecorbon","type":"Château","periode":"XVIII","histoire":"quatre châteaux à Rochecornon dont celui de la Rochecorbon , Basse Rivière, d'Olivier,  Montgouverne et de Vaufoinard                                                                                                                 BASSE-RIVIERE,  du XVIIIe siècle à appartenu aux moines de Noirmoutier, à trois niveaux sur soubassement, un des plus charmants manoir de la Touraine qui fut construit au milieu du XVIIIe siècle : logis rectangulaire, fronton triangulaire, escalier troglodytique médiéval, lucarnes et oeil-de-boeuf, beau parc. La façade principale est divisée en trois travées par deux pilastres à bossages accostant la porte en plein cintre et soutenant un fronton triangulaire orné d'un médaillon accompagné de guirlandes. A l'ouest de profondes caves sont creusées dans le coteau. Le manoir fut habité par la marquise de Doisonville puis par M. Taboureau de Boisdenier, entrepreneur des ouvrages du Roi.                                                                                     OLIVIER, en 1780, l'édifice comportait un rez de chaussée et un comble. Il fut surélevé d'un étage en 1890. La grille donnant accès au parc est l'ancienne grille du potager de Chanteloup, vendue à la Révolution. La façade est un dernier rappel de l'ordre colossal, son milieu, à peine saillant, marqué par deux effets de pilastres plats à l'aplomb du fronton. A l'ouest, le commun est un bâtiment du XVIIIe siècle. A l'est du manoir, les terrasses s'étagent au-dessus des jardins. La demeure est en Touraine, l'un des rares spécimens de construction de la fin du XVIIIe siècle.","architecture":"MONTGOUVERNE, situé sur le plateau à proximité de la Lanterne, Montgouverne est un écrin de verdure niché au milieu des vignes de Rochecorbon. Construit en 1874, le château est composé d'un corps principal d'une seule profondeur flanqué de deux pavillons qui ont chacun deux tours d'angle. La Closerie (XVIIe s) dispose d'un escalier à vis lisse et de murs en colombage.                                                Les HAUTES ROCHES,  à Rochecorbon est réellement unique. Vous réservez ici dans un hôtel de luxe du XVIIIe siècle.                                                                              VAUFOINARD, ancienne closerie ayant appartenu à différents maires de Tours. De plan carré, le château fut d'abord constitué par le grand pavillon et une aile qui lui fut contigüe à l'ouest et était élevée d'un étage sur rez-de-chaussée, avec comble. Au début du XIXe siècle, cette aile fut prolongée dans sa longueur, et surélevée d'un étage. Une tour d'escalier et un avant-corps rectangulaire accompagnent ce pavillon, faisant saillie sur la façade est.","habitants":"Seigneurs locaux\r\n        \"","divers":"à Rochecornon dont celui de la Rochecorbon grav-1-2-3 , de la Basse Rivière grav-4-5, Rivière haute grav-6  d'Olivier grav-8, de Montgouvern grav-7 e et de Vaufoinard grav-9.","gps":"","images":["../../jctruffet.com/image/image_37/37_Rochecorbon_1.jpg","../../jctruffet.com/image/image_37/37_Rochecorbon_2.jpg","../../jctruffet.com/image/image_37/37_Rochecorbon_3.jpg","../../jctruffet.com/image/image_37/37_Rochecorbon_4.jpg","../../jctruffet.com/image/image_37/37_Rochecorbon_5.jpg","../../jctruffet.com/image/image_37/37_Rochecorbon_6.jpg","../../jctruffet.com/image/image_37/37_Rochecorbon_7.jpg","../../jctruffet.com/image/image_37/37_Rochecorbon_8.jpg","../../jctruffet.com/image/image_37/37_Rochecorbon_9.jpg"]},"Consult_chateau_formulaire8907":{"id":"Consult_chateau_formulaire8907","dept":"37","canton":"Langeais","commune":"Saint-Patrice","nom":"Rochecotte","type":"Rochecotte","periode":"XVIII","histoire":"ROCHECOTTE, date du XVIIIe siècle. Son propriétaire initial était le Comte de Rochecotte. En 1767 érigé en marquisat en faveur de Fortuné Guillon. René de la Selle de Ligne qui l'acquit aux héritiers les la Motte-Baracé qui vendit en 1828 le château à Dorothée duchesse de Dino, fille du duc de Courlande, Charles-Maurice de Talleyrand Périgord  oncle par alliance de l'épistolière. le château fut très remanié et transformé, une chapelle fut élevée en 1840, à la place de la chambre occupée par Talleyrand, Dorothée s'éteint en 1862,lors de son partage effectué en 1847 sa fille Pauline veuve d'henri de Castellane receuille Rochecotte qui elle s'éteint en 1890 elle laisse Rochecotte à son fils Alexandre, père du célèbre Boni de Castellane en 1934, le comte Stanislas de Castellane frére de Boni hérite du château et le cède à son beau-frère le décorateur d'origine cubain Emilio Terry  à sa mort,  en 1984, le château de Rochecotte, devenu une demeure vide et fermée, fut rachetée et restaurée par mesdames Pasquier, qui en ont fait un hôtel-restaurant de luxe réputé. Le château de Rochecotte est devenu un hôtel-restaurant renommé","architecture":"ROCHECOTTE, le château occupe la place d'une forteresse du XVe siècle dont il ne subsiste aucune trace. Il fut reconstruit au XVIIIe siècle. La chapelle se trouve sur cette terrasse, elle se présente sous la forme d'un long édifice à avant-corps central légèrement saillant et surmonté d'un fronton, flanqué de deux pavillons carrés à combles brisés, qui se prolongent du côté cour par une aile de communs en équerre, de l'autre côté, un portique à colonnade. La façade de l'oratoire présente un portique qui soutient un fronton, de forme triangulaire, La travée centrale de la façade comporte deux portiques superposés de quatre colonnes, qui supportent un fronton triangulaire, au-dessus duquel se trouvent, trois bas-reliefs qui représentent, au centre, le couronnement de la Vierge, à gauche un baptême, à droite la communion d'une bergère. Les communs sont représentés par un long bâtiment élevé au nord, est inscrit aux M.H. depuis 1948.","habitants":"Famille du  comte Stanislas de Castellane \r\n        \"","divers":"Château de rochecotte à saint-Patrice 47° 17' 14\" Nord et 0° 18' 24\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Rochecotte_1.jpg","../../jctruffet.com/image/image_37/37_Rochecotte_2.jpg","../../jctruffet.com/image/image_37/37_Rochecotte_3.jpg"]},"Consult_chateau_formulaireafb3":{"id":"Consult_chateau_formulaireafb3","dept":"37","canton":"Descartes","commune":"Saint-Flovier","nom":"Roulet","type":"Château","periode":"XIX","histoire":"ROULET, la seigneurie du Roulet relevant de la baronnie de Preuilly appartient à Hugues de Saint-Flovier en 1175 ; la forteresse primitive du XIIe siècle est prise par les anglais en 1359 et rachetée en 1362 par le maréchal de Boucicaut ; il en reste un pan de mur ; la reconstruction du château, date  du XIVe siècle, est attribué  au baron de Preuilly, seigneur de Saint-Flovier et du Roulet dans la première moitié du XIVe siècle, ou à N. d'Eschelles cité en 1380 .","architecture":"ROULET, il subsiste de ce second château la salle basse voûtée d'ogive d'une tour menaçant ruine et quelques pans de mur ; des baies ornées de fleurons et d'accolades étaient visibles encore récemment (vues anciennes du XXe siècle) , le château est entouré de douves naturelles en eau , rouge mentionné en 1927 des vestiges de fresques, le marquis de Menou achète le château en 1769, il fait construire, non loin de la, un second château du Roulet dont il ne reste rien, et délaisse vraisemblablement le premier. Le troisième château du Roulet, bâti en 1881 d'après Montoux, connaît le même sort vers 1950 ; seuls sont conservés le soubassement du pavillon Ouest et les fondations du reste du château.","habitants":"Barons de Preuilly\r\n        \"","divers":"Château de Roulet à St-Flovier","gps":"","images":["../../jctruffet.com/image/image_37/37_Roulet_1.jpg","../../jctruffet.com/image/image_37/37_Roulet_2.jpg"]},"Consult_chateau_formulairef423":{"id":"Consult_chateau_formulairef423","dept":"37","canton":"Descartes","commune":"Chambon","nom":"Rouvray_37","type":"Château","periode":"XV","histoire":"ROUVRAY, depuis 1530, il est demeuré dans la famille Baret dont la dernière représentante Marguerite Baret de Rouvray, a épousé en 1875 le comte Elzéard de Tristan dont descendent les propriétaires actuels. Éléments protégés MH : les façades et les toitures, du châtelet et des deux tours de l'ancienne enceinte : inscription par arrêté du 11 octobre 1971.","architecture":"ROUVRAY, la forteresse primitive, dont les parties les plus anciennes semblent remonter au XIIe siècle, a été presque entièrement reconstruite au XIVe siècle. Elle se composait du logis, toujours existant, qui occupait un des angles d'une cour, jadis fermée, les trois autres angles étant occupés par des tours dont deux restent, ces constructions étaient reliés entre elles par des courtines et sur la façade d'arrivée par des bâtiments de servitude, au centre de cette façade se trouvait le châtelet d'entrée. Au XVe siècle, des aménagements sont réalisés sur la façade, au centre de celle-ci est construite la tour octogonale qui contient l'escalier. le château occupe le côté sud d'une cour intérieure dont l'accès se fait par une porte fortifiée. Cette porte fut remaniée au XVIe siècle. Deux tourelles en encorbellement se trouvent aux angles nord-est et nord-ouest. Une petite tour carrée fut appuyée ou reconstruite sur la façade Est de l'édifice. Au XVIIIe siècle, la plupart des ouvertures du logis sont modifiées. Au XIXe les pièces intérieures sont cloisonnées pour rendre la maison plus habitable. Le logis seigneurial est un bâtiment rectangulaire cantonné d'une tour cylindrique à l'angle sud-ouest, dont la salle du rez-de-chaussée servit de chapelle. Deux autres tours rondes flanquent les murs nord-est et sud-est. Sur la façade nord fait saillie une tour polygonale contenant  un escalier à vis.","habitants":"Famille des Baret\r\n        \"","divers":"Rouvray  46° 49' 32\" nord, 0° 49' 32\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Rouvray_37_1.jpg","../../jctruffet.com/image/image_37/37_Rouvray_37_2.jpg","../../jctruffet.com/image/image_37/37_Rouvray_37_3.jpg","../../jctruffet.com/image/image_37/37_Rouvray_37_4.jpg","../../jctruffet.com/image/image_37/37_Rouvray_37_5.jpg"]},"Consult_chateau_formulaire5932":{"id":"Consult_chateau_formulaire5932","dept":"37","canton":"Château-Renault","commune":"Neuvy le roy","nom":"Rouvre","type":"Manoir","periode":"XVI","histoire":"ROUVRE, ancien fief de la prévôté d'Oé, le Rouvre est mentionné au XIe siècle sous l'appellation \"villa qui dicitur Rouvrum\" et au XIIIe siècle \"terra de Robore\". Le nom de Philippe de Rouvre apparaît dans une charte de 1226 où il fait don à l'abbaye de Fontaine les Blanches d'un setier de froment à prendre sur la dîme de son domaine, au XVIe siècle le fief est à la famille de Castelnau, qui le conserve jusqu'au XVIIIe siècle et qui possède aussi à Neuvy, La Mauvissière. La famille Pellerin de Gauville acquiert le fief en 1750, et subit en 1793 les réquisitions durant la Révolution, dont l'inventaire des meubles apporte de précieux renseignements. Etienne Martel Marcheri, propriétaire en 1811, garde le domaine jusqu'à son décès en 1812, son héritier le vend en 1813 à Etienne Anjubault, qui le revend en 1832 à M. et Mme de Saint-Waast, qui le cèdent en 1849 à M. Lepingleux, notaire à la Flèche. Ses héritiers en sont toujours propriétaires.","architecture":"ROUVRE, les bâtiments sont groupés autour de deux cours fermées. La cour Sud est entourée de bâtiments de ferme. La cour Nord n'est encadré par les bâtiments que sur trois côtés, au Sud, à l'Ouest et au Nord. Les deux cours sont séparés par un mur percé d'une grande porte charretière et d'une porte piétonne, en arc en plein cintre. La partie Nord et Nord-Ouest de la cour Nord est occupé par le logis composé de deux bâtiments de hauteur différente. Le bâtiment un, en rez-de-chaussée, couvert d'un toit à longs pans, terminé par une croupe à l'Est, percé au Nord de deux lucarnes en pierre surmontés d'un fronton triangulaire et d'une lucarne en bois et sur la façade Sud d'une lucarne en bois. Le bâtiment deux, à un étage, est accolé au mur de refend Ouest du bâtiment un. Orienté Est-Ouest, il se prolonge au Sud par une aile en retour d'équerre, flanqué à l'Ouest d'un bâtiment carré, couvert d'un toit en pavillon et d'une tourelle cylindrique, coiffée d'un toit conique. Ses toitures diffèrent selon l'orientation, sur la façade Nord, la toiture à long pan et la toiture en pavillon sont percées de lucarne oculus, dans le comble, avec le premier étage percé de baies rectangulaires tandis que sur la façade Sud les lucarnes en pierre à fronton éclairent le premier étage du bâtiment couvert d'un toit à long pan brisé. Les encadrement des baies sont en pierre de taille.","habitants":"famille de Castelnau\r\n        \"","divers":"Château de Rouvre à Neuvy le Roi","gps":"","images":["../../jctruffet.com/image/image_37/37_Rouvre_1.jpg","../../jctruffet.com/image/image_37/37_Rouvre_2.jpg","../../jctruffet.com/image/image_37/37_Rouvre_3.jpg"]},"Consult_chateau_formulaire4632":{"id":"Consult_chateau_formulaire4632","dept":"37","canton":"Langeais","commune":"Chouzé-sur-Loire","nom":"Réaux_Chouzé","type":"Château","periode":"XIV","histoire":"REAUX,  a appartenu, au XIVe siècle, à Amaury Réau, puis à Jeanne de Montejean, comtesse de Sancerre, puis à Antoine de Bueil et, à Gilles de Brye en 1455. En ruine au XVe siècle, il est acquis par le grand-père Jean Briçonnet, premier maire de Tours. Le château des Réaux actuel a été construit sur l'emplacement de l'ancien château fort par le petit-fils Jean Briçonnet, fils de Guillaume Briçonnet, seigneur des lieux appelés alors Plessis-Rideau. Il fut également habité par Thibaut de Longuejouenote, puis leurs descendants, la famille Taveau. Un mariage en 1595 apportera le domaine dans la famille de La Béraudière. François de La Béraudière en hérite et le vend  vers 1650, à l'écrivain et poète Tallemant des Réaux, dont le château deviendra la demeure, et portera désormais son nom, le 30 juillet 1653, par autorisation sur lettres-patentes du roi.  en 1692 mort de Gédéon Tallement  sa veuve conserve le château  et le revend en 1714  à Louis Taboureau conseiller du roi, et en 1897 achat des Réaux par Julien Bradois éminent  égyptologue, le domaine passa à la famille Goupil de Bouillé et depuis 2005, le château des Reaux a été racheté par la famille Yukhnytsya.","architecture":"REAUX, au XIVe siècle, cétait un château fortifié et entouré de douves. A sa place, Guillaume Briçonnet, maire de Tours, fit construire au XVe, le château de Plessis Rideau, seul, le châtelet dentrée avec son porche en anse de panier, flanqué de tourelles rondes édifiées en damier de brique et de pierre, date de la Renaissance. Dans le parc, un cadran solaire en forme dautel antique, les heures sont figurées par les têtes des 12 dieux de lOlympe. Le château des Réaux avec son pavillon flanqué de deux tours à mâchicoulis, orné d'un subtil damier de briques et de pierres est élevé sur une île dans un écrin de verdure, le château des Réaux honoré de sept siècles d'histoires nous transmet le charme et l'élégance de l'époque des grandes dynasties. Il fut la propriété des familles Bueil et Briçonnet, légendaires bâtisseurs de nos plus beaux fleurons. Demeure de l'écrivain et poète, Tallemant des Réaux, le château a conservé le nom et son romantisme, l'utilisation de la brique et de la pierre disposées en damier lui confère une élégance indéniable.","habitants":"Amaury Réau et au  poète Tallemant des Réaux,\r\n        \"","divers":"A Chouzé-sur-Loire le château des Réaux 47° 14' 52,08\" Nord, 0° 08' 53,16\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_R%c3%a9aux_Chouz%c3%a9_1.jpg","../../jctruffet.com/image/image_37/37_R%c3%a9aux_Chouz%c3%a9_2.jpg","../../jctruffet.com/image/image_37/37_R%c3%a9aux_Chouz%c3%a9_3.jpg","../../jctruffet.com/image/image_37/37_R%c3%a9aux_Chouz%c3%a9_4.jpg","../../jctruffet.com/image/image_37/37_R%c3%a9aux_Chouz%c3%a9_5.jpg","../../jctruffet.com/image/image_37/37_R%c3%a9aux_Chouz%c3%a9_6.jpg"]},"Consult_chateau_formulaireaa3d":{"id":"Consult_chateau_formulaireaa3d","dept":"37","canton":"Chinon","commune":"Saché","nom":"Saché","type":"Château","periode":"XV","histoire":"Trois châteaux à Saché celui de Saché de Chevrière et de Valesne  a un km au nord -est à Pont de Ruan  le manoir de Vonnes.                                                                                                            CHEVRIERE, ancien fief relevant de Colombiers. Ce lieu fut utilisé par Balzac, dans \"Le lys dans la vallée\", pour illustrer \"Clochegourde\", château de Mme de Mortsauf, en lui donnant l'aspect de \"Vonnes\", manoir voisin. Le château de la Chevrière a été transformé; la porte d'accès s'ouvre dans une architecture divisée en trois travées par des pilastres soutenant l'entablement et un fronton triangulaire. Du côté de la cour se trouvent deux échauguettes polygonales. De part et d'autre de la porte se développe un bâtiment de servitude aboutissant à un pavillon carré.                                        VALESNE, la partie centrale du château a été reconstruite à la fin du XVe siècle. Ce corps de logis, desservi par une tourelle d'escalier polygonale, a été prolongé au cours du deuxième tiers du siècle suivant par deux ailes transversales lui donnant un plan en H. Les baies du corps de logis central présente un décor flamboyant, ainsi que les croisées et demi-croisées des ailes transversales. Le décor intérieur, les façades et les toitures ont été restaurés et modifiés au début du XXe siècle.  Les panneaux évoquent la vie à la fin de la Renaissance dans le cadre du château.","architecture":"SACHE, ancienne châtellenie relevant de l'Ile-Bouchard. Le château fut construit sur les vestiges dune place fortifiée du XIIe siècle dont subsistent la tour circulaire et une partie des fossés asséchés. au XVIe siècle passe à la famille de Rouxelley, et en 1779  acquit par Jean Butetles seigneurie de  Saché et Valesne,  aménagé à la Renaissance, il fut agrandi dune aile au XVIIe puis dune deuxième au XVIIIe. Lensemble du bâtiment a été conçu au XIXe siècle par son propriétaire, Jean de Margonne descendant de la famille Butet. Les pièces de réception ont été décorées du fameux papier aux lions du salon, tapisserie en trompe-lil posée en 1803, le papier peint à frise de la salle à manger datant de 1825 ont été conservés en létat. La chambre de Balzac est présentée aujourdhui telle que lécrivain la connue. Mort de Balzac en 1850 le château transformée en musée.                                                                                                              VONNES, résidence de monsieur Emmanuel de Montlivault qui en a hérité en 1977 dans la même famille depuis 1732 L'édifice se compose d'un corps de logis rectangulaire de deux étages entouré de deux ailes en retour formant une cour d'honneur. Son toit, relativement complexe est très pointu et décoré de grands conduits de cheminée ainsi que de belles lucarnes de style renaissance.","habitants":"Saché;  famille de Rouxelley                                                       Vonnes; Famille de Montlivault \r\n        \"","divers":"à Saché celui de Saché grav -1-2  de Chevrière grav-3 et de Valesne grav4-5  a un km au nord -est à Pont de Ruan  le manoir de Vonne grav6-7s. Saché  47° 14' 45\" Nord et 0° 32' 41\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Sach%c3%a9_1.jpg","../../jctruffet.com/image/image_37/37_Sach%c3%a9_2.jpg","../../jctruffet.com/image/image_37/37_Sach%c3%a9_3.jpg","../../jctruffet.com/image/image_37/37_Sach%c3%a9_4.jpg","../../jctruffet.com/image/image_37/37_Sach%c3%a9_5.jpg","../../jctruffet.com/image/image_37/37_Sach%c3%a9_6.jpg","../../jctruffet.com/image/image_37/37_Sach%c3%a9_7.jpg"]},"Consult_chateau_formulaire1aa2":{"id":"Consult_chateau_formulaire1aa2","dept":"37","canton":"Chinon","commune":"Savigny-en-Véron","nom":"Savigny_Véron","type":"Château","periode":"XV","histoire":"trois châteaux à Savigny en Véron ; Fougères, Coulaine et des Places.                                                                                                 FOUGERES, ancien fief, il appartenait en 1459 à Jean de la Rivière, en 1474 à Louis Ruze, en 1542 à Jean Besnard, en 1618 à Jean Prudhomme, en 1720 à Pierre Marc de Seguin, en 1760 à Emilie Chesnon de Rilly et en 1789 à Auguste Pierre Quirit de Coulaine. Vente de la seigneurie de la Herpinière en 1769 par Marthe Chesnon de Champmorin ; la chapelle est dédiée à Notre-Dame de Pitié ; édifice du début du XVIIe siècle ; un cadran solaire portant la date de 1792 a disparu.","architecture":"Des PLACES, ancien fief, en 1667 à François Gaionard, puis aux Petit Thouars ; en 1746 à Félix Le Royer de la Sauvagère, l'édifice fut vendu et loti en 1820 et démoli. Il subsiste seulement l'orangerie du XVIIe siècle; remaniements et constructions au XIXe siècle, il semble que l'édifice subsistant ait été orienté dans l'autre sens. Peut-être que les baies du rez-de-chaussée, sur la cour actuelle, ont été ouvertes depuis 1820. Les cheminées du rez-de-chaussée sont plus anciennes que les façades de la demeure et bizarrement, il y en a deux dans la même pièce, elles correspondraient peut être à l'inscription qui se trouve dans les combles \"Memento Mori, 1599\", s'il s'agit d'un réemploi.","habitants":"Fougère; Famille de Jean Besnard,                                                 Places; famille de François Gaionard\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"à Savigny en Véron ; Fougères, Coulaines gra-1-2 et des Places grav -3\r\n\r\n.","gps":"","images":["../../jctruffet.com/image/image_37/37_Savigny_V%c3%a9ron_1.jpg","../../jctruffet.com/image/image_37/37_Savigny_V%c3%a9ron_2.html","../../jctruffet.com/image/image_37/37_Savigny_V%c3%a9ron_3.jpg"]},"Consult_chateau_formulaire9012":{"id":"Consult_chateau_formulaire9012","dept":"37","canton":"Château-Renault","commune":"Semblançay","nom":"Semblancay","type":"Château","periode":"XIV-XV-XVI","histoire":"Trois châteaux à Semblançay, celui de Dolbeau, du Grand-Launay et de Semblançay.                                                                           DOLBEAU, cet ancien fief, sans justice, relevait de la baronnie de Semblançay. Le premier seigneur connu est Jean Bonguère en 1371, Puis en 1475 Collas de Montguyon, en 1577 Jean de Montguyon et de 1533 à 1535 Jacques de Pully, époux de Jehanne de Montguyon, fille de Jean. Le château appartenait à Jacques de Prilly en 1628, à Michel Nobilleau en 1639, à Louis de la Forge, avocat à Tours, en 1764, à Pierre-Claude Lenoir, bourgeois de Tours, qui le vendit à François-Pierre Martel, écuyer, seigneur de Magesse et de Saint-Antoine, au Canada, d'Esvres et d'Orsay, en Touraine, officier au régiment de Berry,  François-Pierre Martle mourut à Semblançay en 1780, sans laisser d'enfants de son mariage avec Marie-Françoise-Jacques Daen. Ses héritiers, le 30 décembre 1780, vendirent Dolbeau à Joseph-Antoine Artis de Thiezac, marié à Marie-Charlotte Martel de Gaillon, fille de Jean-Baptiste-Grégoire Martel de Contrecur, seigneur de Magesse, conseiller au Parlement de Bordeaux et secrétaire du roi, et d'Anne-Marie Gauvereau. En 1846, Alfred de Vigny fut reçu au château par sa cousine, Alexandrine du Plessis.\r\nLe château a été construit vers 1530, puis modifié aux XVIIe et XIXe siècle. Au XIXe siècle les douves furent comblées et au nord fut construit un pavillon. La chapelle, qui fut utilisée jusqu'au début du XIXe siècle, date du XVIe siècle. Dans le parc du château, deux tours carrées ont été conservées, celle au sud était autrefois le pigeonnier renfermant environ 200 trous de boulins.","architecture":"SEMBLANCAY, au XIIe siècle fut bâti un donjon carré, dont la protection fut accrue par une large tranchée isolant le rocher de base, qui fut entouré complètement par l'étang. Au XIVe siècle, le donjon fut renforcé par une double enceinte dont l'accès devait se faire par un pont en bois fortifié. Au début du XVIe siècle, Jacques de Beaune fit réparer les enceintes et le pont, et élever des bâtiments entre le donjon et la deuxième enceinte. Il bâtit un logis seigneurial et une chapelle à l'est de l'étang. La 1ère enceinte pentagonale est flanquée de quatre tours rondes et d'un bastion. L'accès se faisait par le pont de la courtine nord, la seule restante. La seconde enceinte épouse les formes du rocher et est flanquée de cinq tours dont restent celles du nord et du sud. Celle de l'ouest fut remplacée par un gros contrefort au début du XVIe siècle. Des logis ne subsistent que des pans de murs. Du donjon restent le rez-de-chaussé et le premier étage.                                                                                            GRAND-LAUNAY, construit sur un terrain carré entouré de douves, le château comprend le bâtiment d'habitation principal constitué par deux corps de logis. L'angle sud-ouest conserve un pigeonnier carré couvert d'un lanternon, l'angle sud-est est protégé par une tourelle carrée. Une porte fortifiée s'ouvre dans le mur fermant la cour à l'ouest, munie primitivement d'un pont-levis et remplacé par un pont dormant. Une tour de défense, disparue, occupait l'angle nord-est. Cet édifice est l'une des plus intéressantes gentilhommières fortifiées de la fin du XVIe siècle qui subsistent.","habitants":"Dolbeau; Jean Bonguère                                                       Semblancay\r\n        \"","divers":"à Semblancay, celui de Dolbeau grav 1-2, du gd-Launay grav-3 et de Semblanchay grav -3-4-5-6-7.  Semblancay 47°29' 56\" Nord - 0° 34' 59\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Semblancay_1.jpg","../../jctruffet.com/image/image_37/37_Semblancay_2.jpg","../../jctruffet.com/image/image_37/37_Semblancay_3.jpg","../../jctruffet.com/image/image_37/37_Semblancay_4.jpg","../../jctruffet.com/image/image_37/37_Semblancay_5.jpg","../../jctruffet.com/image/image_37/37_Semblancay_6.jpg","../../jctruffet.com/image/image_37/37_Semblancay_7.jpg"]},"Consult_chateau_formulairea0bc":{"id":"Consult_chateau_formulairea0bc","dept":"37","canton":"Descartes","commune":"Sepmes","nom":"Sepmes","type":"Château","periode":"XV-XVI","histoire":"deux châteaux à Sepmes dont celui de Sepmes et de la Roche-Ploquin.                                                                                                          ROCHE-PLOQUIN, se situe dans la vallée de la Manse. Ses origines remontent au XIe siècle, et a été construit au XVe siècle sur les bases d'une forteresse du XIIIe siècle. Très remanié au XVIIIe siècle, il le fut également au XIXe et au début du XXe siècle. Au XIe siècle, le fief appartenait à Geoffroy Peloquin, seigneur originaire de l'ile Bouchard. Edifié au XVe siècle par la famille de Betz, le château appartint ensuite au XVIe siècle à la famille l'Huissier, puis au XVIIe siècle et une partie du XVIIIe siècle à la famille de Puy, et à partir de 1789 au lieutenant-colonel Claude Charles Coliette de Lescanville. Au début du XIXe siècle, l'édifice appartint de nouveau à la famille du Puy et passa ensuite dans la famille de Poix. Pendant la seconde guerre mondiale, le château fut un haut lieu de la Résistance. Sa propriétaire, la comtesse de Poix, accueillait en secret au château de nombreuses personnes qui devaient se cacher de l'occupant nazi. Dénoncée, la comtesse de Poix fut arrêtée par le
