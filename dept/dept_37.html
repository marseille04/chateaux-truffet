âteau. Lacquisition de Villandry par Joachim Carvallo marque un retour aux sources pour les jardins, réputés pour leur beauté à la Renaissance, ceux-ci sont remaniés par les divers propriétaires, soit en jardin à la française ou en parc romantique. Avec la minutie du scientifique, Joachim Carvallo rend au château réhabilité, des jardins à sa mesure. Le jardin nest pas à son goût et vers 1908, il se consacre à la restitution des jardins Renaissance. Pour les salons dornement quil restitue sur leurs terrasses initiales, il fait appel au peintre Lozano et à Javier de Winthuysen, artiste et paysagiste espagnol qui créé le salon des croix et celui de lamour. Quant au salon de la musique, il doit sa conception à Joachim Carvallo lui-même. Pour le jardin dEau, dit \"classique\", typique du XVIIIe siècle, il utilise les plans du Marquis de Castellane, immortalisés par le cadastre Napoléonien. Loin de nêtre quune simple copie de jardins reproduits dans des traités darchitecture, les jardins de Villandry sont une réinvention. Du tracé au choix des végétaux, tout a été pensé afin de revenir aux origines du jardin français de la Renaissance.","habitants":"Famille de Jean le Breton \r\n        \"","divers":"47° 20' 27\" Nord, 0° 30' 52\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Villandry_1.jpg","../../jctruffet.com/image/image_37/37_Villandry_2.jpg","../../jctruffet.com/image/image_37/37_Villandry_3.jpg","../../jctruffet.com/image/image_37/37_Villandry_4.jpg","../../jctruffet.com/image/image_37/37_Villandry_5.jpg"]},"Consult_chateau_formulairecf59":{"id":"Consult_chateau_formulairecf59","dept":"37","canton":"Château-Renault","commune":"Villedomer","nom":"Villedomer","type":"Château","periode":"XV-XVI","histoire":"deux châteaux; la Noue et Beauregard.                                                                NOUE, la construction du château de la Noue a débuté au XVIe siècle et s'est achevée au XVIIe siècle. La famille Bouault en fut propriétaire au cours du XVIIe siècle. René Bouault, sieur de la Noue, est maire d'Amboise de 1596 a 1599. M. Archambault, résident au grenier à sel de Neuvy, en deviendra propriétaire, en 1672. Étienne Cassin, écuyer, président trésorier de France au bureau des Finances de Tours et son épouse Marie Abraham l'acquièrent, en 1736. En 1826, le domaine va devenir la propriété du général baron Amédée de Cools, chef d'État-major de la Garde royale. Les armes des familles Étignard de La Faulotte et de Cools sont représentées sur un vitrail. Le château de la Noue est inscrit aux M.H. depuis le 1er juin 1948.","architecture":"BEAUREGARD, de nombreuses familles ont possédé le château  au cours des siècles. Le plus ancien écuyer connu est Gaucher dAloigny en 1443. La propriété fut ensuite transmise par mariage à la famille Thaix  (entre 1475 et 1535) et à la famille Brossin (entre 1535 et le milieu du XVIIe siècle). Au cours de cette période, il semble avoir été partagé entre plusieurs familles car Marie Aubin, veuve de Rufin Serpin et Michel Huan ont été mentionnées comme écuyers de Beauregard au début du XVIIe siècle et Michel Galland, décédé le 29 novembre 1650 (sa pierre tombale est encore en vue dans léglise), était écuyer de La Benardière, la Côte et de Beauregard pendant cette période. Le château appartenait alors à la famille Mareschau de la Chauvinière qui restaura la propriété durant la première moitié du XVIIIe siècle et la vendit à la famille Saussaye en 1800. Lavenue principale fut créée en 1825. En 1852, Mme Gillet, la nouvelle propriétaire, entreprit la reconstruction du château sous la direction de Mario, architecte à Tours. Ce projet na été que partiellement réalisé; les dépendances et laile nord du château furent construites entre 1852 et 1855. En 1870, Henri Mirault ajouta la tour circulaire sud (portant ses initiales HM et la date) et lorangerie en 1893. Les tours visibles sur les anciennes cartes postales furent enlevées au début du millénaire.","habitants":"Beauregard ; famille Mareschau de la Chauvinière               Noue; Famille Bouault          \r\n        \"","divers":"deux châteaux à Villedomer , la Noue grav-4  et Beauregard grav-1-2-3","gps":"","images":["../../jctruffet.com/image/image_37/37_Villedomer_1.jpg","../../jctruffet.com/image/image_37/37_Villedomer_2.jpg","../../jctruffet.com/image/image_37/37_Villedomer_3.jpg","../../jctruffet.com/image/image_37/37_Villedomer_4.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','37 — Indre-et-Loire'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)showDet(start);
</script></body></html>
