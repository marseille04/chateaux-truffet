const FULL={"Consult_chateau_formulaire2ea0":{"id":"Consult_chateau_formulaire2ea0","dept":"37","canton":"Amboise","commune":"Amboise","nom":"Amboise","type":"Forteresse","periode":"XV","histoire":"Trois châteaux à Amboise dont celui d'Amboise, du Clos-Lucé et de Gallard dans article suivant.                                                                                               AMBOISE, bâti à Amboise, dominant la ville,  en 1434  la forteresse entre dans le patrimoine de la Couronne après avoir été  confisqué à Louis d'Amboise, le roi Charles VIII entreprit la reconstruction du château primitif, le logis du Roi, bâti sous Charles VIII, ce dernier y décède en 1498. En 1501 Louis XII fait bâtir une nouvelle aile, en 1515  François Ier installe sa cour et fait agrandir l'aile  de Louis XII, Léonard de Vinci et Charles Quint y séjournèrent. La chapelle Saint-Hubert, du XVe siècle, contiendrait la dépouille de Léonard de Vinci. En 1762 Louis XV fait don d'Amboise au duc de Choiseul secrétaire d'état qui possédait déjà le domaine de  Chanteloup et en 1786  Amboise est cédé au duc de Penthièvre petit fils de Louis XIV et beau-père du duc d'Orléans en 1802. Bonaparte fait don d'Amboise en 1806 à 1810 à Roger Ducos sénateur de l'Empire, en 1872 Amboise est restitué à la famille d'Orléans; Gaston d'Orléans  frère cadet de Louis XIII.","architecture":"AMBOISE; la construction  date du XVIe siècle, l'édifice présente un plan en triangle. Le logis du Roi, bâti sous Charles VIII, de style gothique, occupe le front de Loire. Du côté opposé se dresse l'aile Louis XII, de style Renaissance. Chacune des ailes est flanquée d'une grosse tour. Aux XVIIe et XIXe siècle, le lieu a été utilisé comme prison royale. La chapelle Saint-Hubert, du XVe siècle, contiendrait la dépouille de Léonard de Vinci. Le château d'Amboise se visite tous les jours de l'année. Il appartient à une société privée. Le château d'Amboise est classé aux M.H. en 1840.","habitants":"Roi charles VIII\r\n        \r\n        \"","divers":"à Amboise dont celui d'Amboise,                                  Amboise GPS : 47° 24' 47\" Nord et 0° 59' 09\" Est","gps":"47° 24' 47\" Nord et 0° 59' 09\" Est","images":["../../jctruffet.com/image/image_37/37_Amboise_1.jpg","../../jctruffet.com/image/image_37/37_Amboise_2.jpg","../../jctruffet.com/image/image_37/37_Amboise_3.jpg","../../jctruffet.com/image/image_37/37_Amboise_4.jpg","../../jctruffet.com/image/image_37/37_Amboise_5.jpg","../../jctruffet.com/image/image_37/37_Amboise_6.jpg","../../jctruffet.com/image/image_37/37_Amboise_7.jpg"]},"Consult_chateau_formulaire82bf":{"id":"Consult_chateau_formulaire82bf","dept":"37","canton":"Amboise","commune":"Amboise","nom":"Amboise_II","type":"Château","periode":"XV","histoire":"Quatre édifices dans cet article le manoir de Choiseul,  le Clos Lucé , Gaillard et les Minimes.                                                                      CHOISEUL manoir du XVIIIe siècle transformé en hôtel restaurant.                                                                                                 CLOS-LUCE, en 1472 construction du manoir de Cloux par Etienne le Loup en 1490 acquisition par Charles VIII qu'il fit construire l'oratoire pour Anne de Bretagne en 1500. Le Roi François 1er y invita Léonard de Vinci qui vécut au château du Clos Lucé, en 1516.  Le château du Clos Lucé est de style Renaissance, on y accède par un pont-levis, bâtisse en brique rose et tuffeau comportant deux ailes en retour d'équerre à l'angle desquels s'élève une tourelle d'escalier polygonale à droite de cet ensemble un chemin de ronde conduit à la tour de guet   conçu en 1471 comme un ancien fief relevant du château d'Amboise, il passe entre plusieurs mains avant d'être acheté par Charles VIII et de devenir une résidence dété des rois de France. Il gardera cette fonction jusqu'en 1516 où François Ier le met à la disposition de Léonard de Vinci, qui y vivra 3 ans, jusqu'à sa mort le 2/05/1519. En tant que maison de Léonard de Vinci, le château du Clos Lucé est classé aux M.H. depuis 1862, est aujourd'hui un lieu d'interprétation, de connaissance et de synthèse qui a pour vocation de permettre au plus large public de découvrir l'univers de Léonard de Vinci. Il est situé dans le centre ville d'Amboise. Il est la propriété de la famille Saint-Bris depuis 1855. François Saint Bris en est le directeur.","architecture":"GAILLARD, sa construction a débuté en 1496 et s'est achevée en 1519. Il est de style première Renaissance. L'architecte qui suivit les travaux fut François Giocondo dit Le Boccador. Ses premiers propriétaires furent Charles VIII et Louis XII. Le château servait le domaine royal et Jardins du Roi. Il appartient aujourd'hui à la SCI Dom Pacello. Le château Gaillard est classé aux M.H. depuis 1963.   Ancien fief relevant du château d'Amboise, ce domaine appartenait à Charles VIII qui y fit établir des jardins fleuristes et potagers. En 1505, Louis XII le donna à son jardinier Pacello contre une redevance annuelle d'un bouquet de fleurs d'oranger. En 1559, le cardinal de Lorraine l'acheta et fit reconstruire la façade du logis seigneurial. La chapelle est une salle rectangulaire édifiée en partie dans le rocher, et en partie couverte d'une terrasse. Elle s'orne d'une niche (cartouche à ornements Renaissance), encadrée de pilastres et dominée d'un linteau décoré de rinceaux d'oiseaux et d'une figure de Madeleine.                                                  Les MINIMES du XVIIIe siècle de plan rectangulaire  à deux niveaux toits en croupes couvert d'ardoise transformé en hôtel restaurant par monsieur Desforges.","habitants":"Léonard de Vinci    Famille Saint-Bris \r\n        \r\n        \"","divers":"Quatre édifices à Amboise le manoir de Choiseul grav-1,  le Clos Lucé grav 2-3-4 , Gaillard grav-5-6 et les Minimes grav-9.   Gaillard 47° 24' 47\" Nord et 0° 59' 09\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Amboise_II_1.jpg","../../jctruffet.com/image/image_37/37_Amboise_II_2.jpg","../../jctruffet.com/image/image_37/37_Amboise_II_3.jpg","../../jctruffet.com/image/image_37/37_Amboise_II_4.jpg","../../jctruffet.com/image/image_37/37_Amboise_II_5.jpg","../../jctruffet.com/image/image_37/37_Amboise_II_6.jpg","../../jctruffet.com/image/image_37/37_Amboise_II_7.jpg","../../jctruffet.com/image/image_37/37_Amboise_II_8.jpg","../../jctruffet.com/image/image_37/37_Amboise_II_9.jpg"]},"Consult_chateau_formulairefc46":{"id":"Consult_chateau_formulairefc46","dept":"37","canton":"Amboise","commune":"Noizay","nom":"Anzan_Noizey","type":"Château","periode":"XVI","histoire":"ANZAN ou NOIZEY  bâti à Noizay, c'est l'exemple d'un château-hôtel, membre des Relais & Châteaux,  est de style Renaissance, ancienne résidence de la famille Lelarge d'ErvauIl a été entièrement rénové en 1989. En 1560, c'était le fief des Protestants durant la conjuration d'Amboise. Noizay  a été entièrement rénové en 1989. Il fut le fief des protestants durant la conjuration d'Amboise en 1560. Il possède un jardin à la Française","architecture":"ANZAN-NOIZEY,  construit au début du XVIe siècle sur un emplacement féodal, est de style Renaissance. Sa construction date de 1520, le château servit d'arsenal et de dépôt d'armes à Castelnau, l'un des principaux meneurs de la Conjuration d'Amboise en 1560. Le duc de Nemours ayant découvert le complot s'introduisit dans le château avec une compagnie d'arquebusiers et s'empara de Castelnau, incendié, le château fut reconstruit au XVIIe siècle. Un long bâtiment est prolongé au nord de deux ailes en retour. Les combles s'éclairent par d'importantes lucarnes, pour la plupart à gâbles Renaissance encadrés de pinacles. La partie centrale de la façade arrière, au sud, est beaucoup plus composite. Elle peut avoir été achevée sous la Restauration avec son grand perron à double révolution. A l'intérieur, vaste escalier de bois du XVIIe siècle avec deux volées droites et une grosse rampe à balustres carrés.","habitants":"Famille Lelarge d'ErvauIl\r\n        \r\n        \r\n        \r\n        \"","divers":"Anzan à Noizay : 47° 25' 20\" Nord, 0° 53' 33\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Anzan_Noizay_1.jpg","../../jctruffet.com/image/image_37/37_Anzan_Noizay_2.jpg","../../jctruffet.com/image/image_37/37_Anzan_Noizay_3.jpg","../../jctruffet.com/image/image_37/37_Anzan_Noizay_4.jpg"]},"Consult_chateau_formulaire3f07":{"id":"Consult_chateau_formulaire3f07","dept":"37","canton":"Ste-Maure de Touraine","commune":"Maillé","nom":"Argenson","type":"Château","periode":"XVII","histoire":"ARGENSON fief relevant du château de Nouatre. En 1700, le fief fut érigé en châtellenie, puis en marquisat en 1718. En 1667, une église paroissiale fut bâtie à l'emplacement de l'ancienne chapelle seigneuriale. Le château fut construit ou commencé à la même époque et n'a jamais été terminé. Au XVe siècle, Jean Gueffault, seigneur d'Argenson, obtint de Charles VII des lettres patentes l'autorisant à fortifier sa demeure. Au XVIe siècle, par l'intermédiaire de Jeanne de Gueffault, la propriété passa à son mari Jean III de Voyer de Paulmy, grand-père de René, 1 er comte d'Argenson. Au XVIIe siècle, René de Voyer de Paulmy, 2 ème comte d'Argenson, qui avait été ambassadeur à Venise, reconstruisit le château et obtint que ses terres d'Argenson soient érigées en paroisse, malgré l'opposition du prince Charles II de Rohan-Guémené, seigneur de Sainte-Maure et de Nouâtre, dont l'inspecteur-général Froger de la Carlière se plaignait que le comte d'Argenson eût « usurpé une partie des habitants de Maillé et de Nouâtre pour donner des paroissiens à son chapelain. Le propriétaire des lieux, M. d'Harcourt.","architecture":"ARGENSON, la construction du château d'Argenson date du XVIIe siècle. Le château bâti en 1670, possède toujours son pigeonnier circulaire, qui fut érigé en 1683.  Edifié au nord d'un enclos rectangulaire entouré de murs, l'ensemble comprend deux pavillons, une église, un presbytère, un prétoire, le château et la fuye. Eglise de style classique avec façade couronnée par un fronton. Le transpet était accompagné de deux chapelles, il ne subsiste que celle du nord. En 1678, fut ajoutée la chapelle du calvaire. Les deux pavillons servaient d'écurie et de logement au personnel. Le château comprend un corps de logis central et une aile le prolongeant au nord et au sud une aile symétrique et un corps de bâtiment projeté à l'est, jamais construit. La fuye cylindrique date de 1683.","habitants":"Famille de Jean Gueffault\r\n        \"","divers":"A Maillé le château d'Argenson     47° 03' 13\" Nord, 0° 34' 56\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Argenson_1.jpg","../../jctruffet.com/image/image_37/37_Argenson_2.jpg"]},"Consult_chateau_formulaire23ad":{"id":"Consult_chateau_formulaire23ad","dept":"37","canton":"Amboise","commune":"Saint-Régle","nom":"Arpentis","type":"Château","periode":"XVIII","histoire":"ARPENTIS, le château des Arpentis est un château bâti à Saint-Règle, C'était autrefois un fief et une seigneurie qui relevaient dAmboise.  Le premier seigneur connu à Saint -Règle était Christophe Thomas, en 1313. En 1410, le château des Arpentis deviendra la propriété de Jean du Bois, maître dhôtel du duc de Guise. Puis au XVIe siècle, le château des Arpentis va appartenir à des hommes darmes. En 1612, il ira dans les mains de Louis Charles dAlbert, duc de Luynes, chez lequel le roi Louis XIII est venu dîner, le 20 juin 1619.","architecture":"ARPENTIS, le château se dresse au pied du coteau, près du cours deau de Lamasse. les murs des douves qui entourent le château et soutiennent la terrasse, datent du XVIIe siècle. Quand à la terrasse, celle-ci est creusée de casemates, assez bien conservées. Au XIXe siècle,  va subir une importante restauration. Aujourd'hui, le château des Arpentis est implanté au milieu dun paisible parc boisé de 30 hectares, traversé par un petit cours deau appelé \"Lamasse\" et un étang.","habitants":"Famille de  Louis Charles dAlbert  \r\n        \"","divers":"A st-Règle le château  d'Arpentis  47° 24' 33\" Nord et 1° 03' 15\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Arpentis_1.jpg","../../jctruffet.com/image/image_37/37_Arpentis_2.jpg","../../jctruffet.com/image/image_37/37_Arpentis_3.jpg","../../jctruffet.com/image/image_37/37_Arpentis_4.jpg"]},"Consult_chateau_formulaire7b36":{"id":"Consult_chateau_formulaire7b36","dept":"37","canton":"Monts","commune":"Artannes sur Indre","nom":"Artannes_Indre","type":"Manoir","periode":"XVI","histoire":"Trois châteaux à Artannes  celui des Alouettes, de l'Archevêque et de la Mothe.\r\nALOUETTES, en 1650  la veuve d'Ambroise de la Haie Marguerite Castillon en est propriétaire, puis au XVIIe siècle entre dans la famille d'Espagne Marguerite d'Espagne en a héritée, et en 1766 Françoise Dupoirier hérite  et le cède  à Nicolas-Marie Chabelard de la Barre, en 1830 sa veuve aliène le domaine  à Louis René Fey  qui achète en 1835 la manoir  sa fille  Sylvie Alexandrine hérite en 1873 et passa en 1885 à François Berthelin dont les descendant le conserveront jusqu'en 1936. acquis par Eugène Adolphe  Bertaux dont la dernière survivante décède en en 1957 l'année suivante leur fille se  défait au profit  de Mme Bungener fille de  la famile Monnet, en 1963   chambres d'Hôtes.\r\n  ARCHEVEQUES, relevait du Roi à cause du château de Tours, et appartenait aux archevêques de cette ville. La châtellenie fut élevée en baronnie par Henri II Plantagenet en 1180. Confisqué à la Révolution, le château fut vendu et appartient depuis à des laïcs.                                                                                      MOTHE, ancienne possession des Archevêques de Tours,  remarquable demeure du XVe siècle. Cette gentilhommière fut également la possession du général André Maginot, homme politique français de la IIIe République, bien connu pour sa ligne de fortification, à la fin du XIXe siècle.","architecture":"ALOUETTES, la construction du manoir de l'Alouette date du XVIe siècle. Deux tourelles en encorbellement sont visibles. Évoqué par Balzac dans \"Le curé de Tours\" et dans \"Les deux Amis\".    le corps du logis élevé sur un étage est surmonté d'un comble éclairé par deux lucarnes dont les jambages accostés d'ailerons porte un fronton courbe, l'édifice accosté de deux tourelles  coiffées de toits en poivrière, la façade arrière est flanquée de deux tours carrées.                                                                                      ARCHEVEQUES, château bâti au lieu-dit Le Bourg, la construction du château date de la 2ème moitié du XVe et du XIXe siècle.  L'édifice se compose d'un bâtiment principal avec rez-de-chaussée, un étage et un comble ; et d'une aile en retour d'équerre dont le rez-de-chaussée est traversé par un passage reliant la cour d'honneur à une petite cour nord. La porte fermant le passage au nord est surmontée d'une accolade à fleuron et crochets. Aux angles nord et sud font saillie deux tours cylindriques. La façade ouest du bâtiment principal est accompagnée de deux tours polygonales. Sur cette façade, côté sud, fait saillie un petit bâtiment autrefois chapelle.Il est inscrit aux M.H. depuis l14/09/1949","habitants":"Alouettes; Famille d'Espagne\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Trois châteaux à Artannes  celui des Alouettes grav I-2, de l'Archevêque grav-4 .  et de la Mothe grav-3.                                Alouettes  47° 16' 28\" Nord et 0° 36' 00\" Est. Archevêques 47° 16' 22\" nord, 0° 36' 02\" est","gps":"","images":["../../jctruffet.com/image/image_37/37_Artannes_Indre_1.jpg","../../jctruffet.com/image/image_37/37_Artannes_Indre_2.jpg","../../jctruffet.com/image/image_37/37_Artannes_Indre_3.jpg","../../jctruffet.com/image/image_37/37_Artannes_Indre_4.jpg"]},"Consult_chateau_formulairef6e7":{"id":"Consult_chateau_formulairef6e7","dept":"37","canton":"Bléré","commune":"Athée sur Cher","nom":"Athée_sur_Cher","type":"Château","periode":"XVI","histoire":"Deux châteaux à Athée celui de Boissière et de Nitray .        BOISSIERE, aurait été une possession de la seigneurie voisine de Montbazon.  Au XIXe siècle, l'historien Jacques-Xavier Carré de Busserolle s'y installe pour quelques années.                                                                                              NITRAY,  datant du Roi François Ier, dont le fief relevait dabord de Véretz puis de Montbazon. Le château fut construit au XVe siècle, remplaçant un château plus ancien, datant sans doute du XIIIe siècle. En 1517  le commanditaire du château de Nitray était Aimery Lopin, maître des requêtes de Louise de Savoie. Succédait par Jean Binet.  en 1560, à Émery Binet, en 1580, à Marie Binet, femme de Charles Daen  en 1600, à Pierre Binet, en 1642, à François Daen ; en 1680, à César Daen ; en 1728, à Mathieu Duchamp, en 1789, à Philippe-Jean-Baptiste Mignon, procureur du roi au bureau des finances de Tours, de 1807 à 1922.  17 familles s'y sont succédées depuis sa construction, dont la famille du général d'Empire Jean Jacques Liébert. C'est un ensemble architectural exceptionnel du XVe au XVIe siècle. Le 1er octobre 1955, la propriété est vendue sur saisie à la requête de Georges-Marie Dermy poursuivant monsieur Taillandier, industriel demeurant au Cameroun, faute d'acquéreur, le 17 octobre 1955 par la famille Brebart dHalluin , depuis  1989 le comte Hubert de l'Espinay  gendre de monsieur et madame dHalluin.","architecture":"BOISSIERE, la seigneurie avait aménagé une véritable forteresse médiévale, entourée de profondes et larges douves, qui sont aujourd'hui comblées.  La Boissière est construit en tuffeau de pays et possède des pierres de taille bordant les angles des façades et de sa remarquable tour hexagonale percée de meurtrières et surmontée d'une sorte de poivrière. L'édifice aurait été largement restauré au XVIIIe siècle et une aile entière de bâtiment lui fut rajoutée au début du XXe siècle.                                                                                              NITRAY, construit au XVIe siècle   pour remplacer un château plus ancien, datant du XIIIe siècle, de style Renaissance  on y accède par un portail en anse de panier dans lequel est aménagé un guichet  défendue par deux tours  du XVe siècle une circulaire l'autre en fer à cheval,  le logis seigneurial du XVIe siècle d'un corps unique de plan rectangulaire   entre deux pignons rondelis qui sont des pavillons d'escalier dans oeuvre, l'étage à double bandeau, trois niveaux sur soubassement avec lucarnes sur allèges sculptées et baies  encadrées de pilastres à chapiteau et fronton surmontés de coquille de Vénus.","habitants":"Boissière; Jacques-Xavier Carré de Busserolle                  Nitray; Famille du général d'Empire Jean Jacques Liébert\r\n        \"","divers":"Deux châteaux à Athée celui de Boissière et de Nitray, grav-1-2-3-4.                                                                      Nitray 47° 20' 27,24\" Nord et 0° 53' 40,2\" Est\r\nBoissière 47° 20' 06? nord, 0° 56' 09? est                               Tour brandon 47° 18' 05\" nord, 0° 51' 44\" est","gps":"","images":["../../jctruffet.com/image/image_37/37_Ath%c3%a9e_sur_Cher_1.jpg","../../jctruffet.com/image/image_37/37_Ath%c3%a9e_sur_Cher_2.jpg","../../jctruffet.com/image/image_37/37_Ath%c3%a9e_sur_Cher_3.jpg","../../jctruffet.com/image/image_37/37_Ath%c3%a9e_sur_Cher_4.jpg","../../jctruffet.com/image/image_37/37_Ath%c3%a9e_sur_Cher_5.jpg","../../jctruffet.com/image/image_37/37_Ath%c3%a9e_sur_Cher_6.jpg"]},"Consult_chateau_formulaire9b39":{"id":"Consult_chateau_formulaire9b39","dept":"37","canton":"St-Cyr sur Loire","commune":"La Membrolle-sur-Choisille","nom":"Aubrière","type":"Château","periode":"XIX","histoire":"AUBRIERE, était un fief dès le XIIe siècle, et dépendait de celui de Lavaré. Le dernier s'étendait sur 74 hectares. Le nom de l'Aubrière vient d'une famille, les Aubry, Hubert Aubry, écuyer, et en 1435, Jean Aubry, chevalier, au XVe siècle passa à Pierre Hamelin, en 1639 à Pierre de Largillière et  à François le Houx et en 1670 à Gabriel Compainet acquis ensuite à la famille Cormery. Durant la Révolution, l'édifice était à Pierre Cormery, Juge de Paix et grand administrateur des biens nationaux. En 1873, par la volonté d'Ernest Henri Martell (cognac Martell), naissance de le commune de la Membrolle, dont il fut maire jusqu'en 1900, Henri Martell étant à l'origine de la construction de l'actuel château en 1864, à la mort d'Ernest le château passa à son fils Henri, qui se dernier loua deux étés durant  au prince Roland Bonaparte qui y réside avec sa mère et sa fille Marie.  En 1918, le château est acquis par Gaston Cousin qui avec madame Dumontier se spécialise dans les préparations pharmaceutiques (Jouvence de l'Abbé Soury). En 1960 le domaine passe ensuite à la famille Evain.  En 1962 abrite une école ménagère départementale.  Actuellement, le château de l'Aubrière appartient au comte et à la comtesse de Lussac,  en 1983.  est devenu un hôtel 3 étoiles.","architecture":"AUBRIERE,  il se situe près de Tours et surplombe la vallée de Choisille. La construction du château de l'Aubrière date de 1864,  Appareillé de brique et pierre se compose d'un corps de logis assez étroit, qu'encadrent  du côté de la façade d'arrivée, à l'ouest, un pavillon  couronné  d'un fronton à ressauts d'inspiration flamande et un pavillon coiffé d'une haute toiture à la Mansart. La façade opposée présente à son angle sud-est  une grosse tour à pans coupés, initialement sommée d'un lanternon d'ardoise, et à son angle sud-est, une frêle tourelle polygonale.                                                                                             C'est un château de style Napoléon III.  L'Aubrière et son parc de 15 hectares, aux arbres centenaires aux essences rares, devient hostellerie en 1983.","habitants":"Famille  les Aubry\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"a la Membrolle-sur-Choisille le château d'Aubrière 47° 26' 20\" Nord, 0° 38' 25\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Aubri%c3%a8re_1.jpg","../../jctruffet.com/image/image_37/37_Aubri%c3%a8re_2.jpg"]},"Consult_chateau_formulaire8d9f":{"id":"Consult_chateau_formulaire8d9f","dept":"37","canton":"Chinon","commune":"Azay le Rideau","nom":"Azay_le_Rideau","type":"Château","periode":"XVI","histoire":"Quatre châteaux à Azay le Rideau, celui d'Azay  du Val d'Auray de la Remonière et Chatonnière voir article à part\r\nAZAY le RIDEAU, au XIVe siècle le fief  d'Azay appartenait à Jean le Meingre maréchal de France.  Les travaux ont en fait débuté en 1518. Pour un riche financier auprès de Louis XII, Gilles Berthelot, le château est inspiré de la Renaissance italienne, et conserve une partie des fondations héritées de la forteresse médiévale, mais le terrain est rendu instable par lIndre. Menacé par la répression que mène François 1er contre certains membres de la bourgeoisie daffaires au service du royaume, Berthelot doit  senfuir à Metz en 1527, laissant la demeure inachevée. François 1er, après avoir confisqué le domaine, le confie en juin 1528 à Antoine Raffin, capitaine des gardes, qui a combattu à ses côtés à Pavie.  La petite fille d'Antoine Raffin, Antoinette, sinstalle au château d'Azay le Rideau en 1583, dans le contexte des guerres de Religion, après avoir été dame dhonneur à la Cour auprès de Marguerite de Valois. Antoinette, fortunée, redonne son éclat au château, qui sera tour à tour remis au goût du jour puis délaissé par ses héritiers. En 1787,  acquit par la famille de Biencourt, en 1791 le domaine dAzay le Rideau retrouve l'ancien propriétaire le marquis Charles de Biencourt qui sattache avant tout à la modernisation des parties servant à lexploitation. En 1825, son fils Armand François, se lance dans la restauration du château, lentreprise bénéficie dès 1840 des subsides des M.H. En 1845, la dernière tour restant de lancienne forteresse est remplacée. En 1899, le dernier marquis de Biencourt doit céder l'édifice, acheté par létat en 1905.","architecture":"AZAY, des travaux de rénovation sont entamés dès 1907.  C'est un véritable chef d'oeuvre de la Renaissance. de plan en équerre à trois niveaux. Il est d'aspect médiéval possède aussi des fenêtres à meneaux  avec de hautes cheminées, ses toits élevés, son chemin de ronde à mâchicoulis, et ses tourelles d'angles en surplomb. On retrouve l'influence italienne dans l'ordonnance de ses façades et son escalier d'honneur,  orné  de lucarnes participent à la décoration et à l'harmonie du château, accostées de pilastres espacées régulièrement, des chapiteaux sculptés et des moulures horizontales entre les niveaux.                                                                                                        REMONIERE,  manoir, du XVIe siècle flanqué d'une échauguette  et une tourelle d'escalier octogonale qui soffre le luxe dun vis-à-vis avec le château dAzay-le-Rideau et davoir accueilli François 1er. Chambre d'hôte de Chantal Pecas.                                                                                               VAL D'AURAY, la construction de l'édifice remonte au XVIe siècle, agrandissements aux XVIIe, XVIIIe et XIXe siècles, les angles portent des tourelles en encorbellement. Le rez-de-chaussée s'ouvre par un petit portail. Le premier étage est percé de sept baies semblables. Le château, de plan régulier, est composé d'un sous-sol, d'un rez de chaussée et d'un étage de comble.","habitants":"Famille de Biencourt  \r\n        \r\n        \r\n        \r\n        \"","divers":"Quatre châteaux à Azay le Rideau, celui d'Azay  du Val d'Auray 47° 15' 20\" nord, 0° 31' 26\" est,                                           de la Remonière   grav-4                                                                        Azay-Rideau 47° 15' 33,12\" Nord et 0° 27' 57,96\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Azay_le_Rideau_1.jpg","../../jctruffet.com/image/image_37/37_Azay_le_Rideau_2.jpg","../../jctruffet.com/image/image_37/37_Azay_le_Rideau_3.jpg","../../jctruffet.com/image/image_37/37_Azay_le_Rideau_4.jpg"]},"Consult_chateau_formulaire7be8":{"id":"Consult_chateau_formulaire7be8","dept":"37","canton":"Chinon","commune":"Azay le Rideau_II","nom":"Azay_le_Rideau_II","type":"Château","periode":"XV-XVIII","histoire":"Deux châteaux sur Azay dans cet article celui de la Chatonnière et de Gerfaut.                                                                                           CHATONNIERE, si la première construction peut remonter au XIe siècle, la tour dangle Sud-Ouest prouve une reconstruction fin XIIIe siècle ou début XIVe siècle et la maison de maître une transformation fin XVe ou début XVIe siècle et au XVIIe siècle restauré et agrandi par Antoine le Vacher de la Chaise, gentilhomme de la chambre du roi  et maître d'hôtel  d'Henri IV, qui donna au château l'aspect actuel, en 1830 passa aux Naux et en 1850 aux Champmorin et changera une vingtaine de fois par la crise agricole la famille. Madame Le Doux de Melleville laisse entrer la lumière en ouvrant trente fenêtres qu'elle encadre de bosselage, style de l'époque Louis XIII. Trois familles au service du roi sy succèdent. Puis aux XIXe et XXe siècles. La Chatonnière est maintes fois vendue. En 1981, c'est Béatrice Gonzalez de Andia y Elio, avocate, qui hérite du château de La Chatonnière par son père, Manuel Louis Auguste Archambault Gonzalez de Andia Talleyrand-Périgord.                                                                            GERFAUT  fût construit par l'architecte Marcel Boille pour le comte Jean de Sabran Ponteves, veuf d'Elsée Hainguerlot, fille d'un banquier. En 1910 ses petits-fils le marquis de Chénérilles et le comte de chénérilles en sont les propriétaires.","architecture":"CHATONNIERE, bâti sur un village troglodytique avec écuries et église souterraine, le château est dabord une place forte sur la route romaine quemprunte, au Moyen-Age, Jeanne dArc. Après les guerres de Cent ans et de Religions (époques dont témoignent quatre tours dangle percées de meurtrières) la place forte devient une \"maison des champs\" avec ses quatre tours d'enceinte, dont l'une abrite la chapelle voûtée subsiste aux angles flanquant les communs et l'habitation  noble, le corps de logis central est acosté sur sa façade sud   d'une tourelle d'escalier polygonale qui a conservé  sa couronne de mâchicoulis, l'édifice agrandi et restauré au XVIIe siècle accole au corps central couvert d'un comble brisé, deux pavillons d'angle à toits indépendants.                                                                                              GERFAUT, le bâtiment est conçu comme un rendez-vous de chasse au milieu d'une propriété d'environ 1100 ha. Le mobilier de la famille Hainguerlot oriente le choix du décor intérieur vers un style du début du XIXe siècle révisé fin de siècle. Le château est en calcaire, les communs sont renforcés avec des chaînes de brique. Le jardin fût dessiné par l'architecte Louis Decorges. Les communs sont renforcés avec des chaînes de brique.","habitants":"Chatonnière; Antoine le Vacher de la Chaise                Gerfaut; famille Hainguerlot\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Deux châteaux sur Azay dans cet article celui de la Chatonnière 47° 16' 48\" nord, 0° 25' 17\" est     grav 1-2-3  et de Gerfaut grav-4-5.  Chatonnière  47° 16' 48\" Nord et 0° 25' 17\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Azay_le_Rideau_II_1.jpg","../../jctruffet.com/image/image_37/37_Azay_le_Rideau_II_2.jpg","../../jctruffet.com/image/image_37/37_Azay_le_Rideau_II_3.jpg","../../jctruffet.com/image/image_37/37_Azay_le_Rideau_II_4.jpg"]},"Consult_chateau_formulaire1cb6":{"id":"Consult_chateau_formulaire1cb6","dept":"37","canton":"Bléré","commune":"Azay sur cher","nom":"Azay_sur_Cher","type":"Château","periode":"XVIII-XIX","histoire":"Six châteaux  à Azay;  Leugny, Coteau, Beauvais (voir article) , Michelinière, Gitonière    \r\nAZAY sur CHER, était une châtellenie qui appartenait, aux XIIIe et XIVe siècles, aux seigneurs de Surgères. En 1477, les de Clermont la cédèrent à Louis XI qui la donna à la collégiale Saint-Martin de Tours qui la conserva jusqu'en 1790. Au milieu du XIVe siècle, les troupes anglaises occupèrent la ville et l'incendièrent. Du château seigneurial, reconstruit après l'incendie et qui existait encore entièrement en 1700, subsistent une haute tour carrée dont le couronnement primitif a disparu. Sa façade nord est accompagnée d'une tourelle d'escalier octogonale à sa base, et cylindrique à sa partie supérieure. De cette tourelle part une partie de l'ancien mur d'enceinte auquel était adossé un bâtiment d'habitation qui s'est écroulé. A l'ouest de la tour et de la courtine subsiste une tour ronde.                                            COTEAU, a été construit de 1864 à 1869 dans le style néo-classique pour le baron de Lauvergeat. Il est situé dans un parc de neuf hectares dessiné par le paysagiste Édouard André. Ce parc renferme trois arches de l'aqueduc gallo-romain de Fontenay et une éolienne Bollée de 1891.  Jadis fréquenté par Chopin le pavillon de l'horloge, passe l'été 1833 au château, chez des amis d'Auguste Franchomme .    Le 3 septembre, les deux musiciens donnèrent un concert à Tours. Le château du Côteau, qui date des années 1860, remplaça un ancien logis seigneurial  Il existe encore 5 châteaux à Azay-sur-Cher, parc boisé vous accueillera dans le calme et la détente.","architecture":"AZAY sur CHER, sa construction date du XIIe siècle. Le château d'Azay sur Cher n'a conservé que quelques vestiges de ses fortifications. Le haut du donjon carré est à 3 niveaux dont l'intérieur contient des cheminées du XVIIe siècle. Il est flanqué d'une tourelle octogonale à la base et cylindrique au sommet. Un toit à 4 pans a remplacé tardivement le mâchicoulis. A quelques mètres, se dresse un édifice semi circulaire qui serait l'ancienne chapelle. Guillaume Maingot, seigneur de Surgères et d'Azay, qui participa, à la Bataille de Bouvines, en 1214, est le premier membre identifié de sa famille, propriétaire de la châtellenie jusqu'au XVe siècle. Il ne subsiste aujourd'hui qu'un haut donjon carré composé de 3 niveaux.                                                     LEUGNY, il est attribué à l'architecte André Portier, collaborateur de Gabriel. Sa construction date de la 2ème moitié du XVIIIe siècle. Son corps de logis double est composé d'un rez-de-chaussée, d'un étage et d'un grenier couronné par une balustrade. Chaque étage est percé de 7 fenêtres sur les façades, coté cour et jardin, et 4, à chaque bout du bâtiment. Les portes-fenêtres du rez-de-chaussée sont surmontées d'entablements formant des consoles, ornées de fleurs de pomme de terre. Situés de part et d'autre de la cour d'honneur, les communs paraissent antérieurs au château.  propriété de monsieur Darasse.","habitants":"Azay; seigneurs de Surgères                                                   Coteau;  baron de Lauvergeat\r\n        \r\n        \r\n        \r\n        \"","divers":"Six châteaux  à Azay;  47° 20' 59 nord, 0° 50' 51\" est. Azay grav-1. Leugny 47° 20' 50\" nord, 0° 51' 49\" est grav-6, Coteau grav -5, Beauvais grav-4, Michelinière grav-2, 47° 19' 39\" nord, 0° 51' 01\" est.Gitonière","gps":"","images":["../../jctruffet.com/image/image_37/37_Azay_sur_Cher_1.jpg","../../jctruffet.com/image/image_37/37_Azay_sur_Cher_2.jpg","../../jctruffet.com/image/image_37/37_Azay_sur_Cher_3.jpg","../../jctruffet.com/image/image_37/37_Azay_sur_Cher_4.jpg","../../jctruffet.com/image/image_37/37_Azay_sur_Cher_5.jpg"]},"Consult_chateau_formulaireb237":{"id":"Consult_chateau_formulaireb237","dept":"37","canton":"Loches","commune":"Azay sur Indre","nom":"Azay_sur_Indre","type":"Chateaux","periode":"XVI","histoire":"Deux châteaux à Azay sur Indre dont Azay et Folaine. \r\nAZAY sur INDRE était au XIe siècle un fief appartenant à un Hyrvisius Cabruns, qui en fit don à l'abbaye de Noyers. Celle-ci posséda le fief jusqu'à la fin du XIIe siècle, il devint une châtellenie aux mains d'une famille d'Azay, dont le chef était, en 1215, un chevalier banneret, Guillaume d'Azay. Le château d'Azay sur Indre, qu'un aveu rendu en 1572, qualifie de maison-forte, relevait du château de Loches. C'est un bâtiment du XVIe siècle, restauré aux XVIIe et XIXe siècles. Son pigeonnier-porche construit au XIXe siècle se présente sous la forme d'un portail voûté en ogive, surmonté d'une fuie octogonale en brique. Il contient des boulins en poterie vernissée.","architecture":"AZAY, le château surplombe léglise. Édifié vers la fin du XVe siècle, et qualifié de \"maison forte\" au siècle suivant, il était alors rattaché au château de Loches. Il fut très remanié à deux reprises au point de perdre une partie de son caractère; sa tour carrée a notamment été pourvue de \"créneaux et de mâchicoulis dont la fantaisie est excessive. FOLAINE , situé à mi-hauteur du coteau de la rive droite de lIndrois, fut construit au XVe siècle. De cette époque subsistent le corps principal de bâtiment ainsi quune grosse tour cylindrique. La ferme de Bergeresse est une ancienne métairie appartenant, de 1274 jusquen 1789, à labbaye de la Chartreuse du Liget ; elle dépendait auparavant du Fau.  Folaine relevait de celui de Loches. En 1586, la châtellenie fut érigée en vicomté. En 1789, le marquis de Lusignan et le marquis de La Fayette en étaient co-propriétaires. Le bâtiment se compose de deux ailes perpendiculaires, élevées d'un étage sur rez-de-chaussée. Les gâbles des lucarnes ont reçu un décor moderne. A l'angle commun des deux corps de logis, une tour rectangulaire est peut-être d'origine plus ancienne que le reste du château. Le château de la Folaine est inscrit à linventaire des M.H.depuis le 14 septembre 1949.","habitants":"marquis de La Fayette\r\n        \r\n        \"","divers":"A  Azay sur Indre le château d'Azay grav-1-2, Bergeresse  47° 11' 44\" nord, 0° 55' 34\" est,  grav-6 et de  la  Folaine Grav 4-5: 47° 12' 35\" Nord et 0° 56' 46\" Est. Folaine 47° 12' 45\" nord, 0° 57' 12\" est.","gps":"","images":["../../jctruffet.com/image/image_37/37_Azay_sur_Indre_1.jpg","../../jctruffet.com/image/image_37/37_Azay_sur_Indre_2.jpg","../../jctruffet.com/image/image_37/37_Azay_sur_Indre_3.jpg","../../jctruffet.com/image/image_37/37_Azay_sur_Indre_4.jpg","../../jctruffet.com/image/image_37/37_Azay_sur_Indre_5.jpg"]},"Consult_chateau_formulaire9237":{"id":"Consult_chateau_formulaire9237","dept":"37","canton":"Descartes","commune":"Bournan","nom":"Bagneux","type":"Château","periode":"XV","histoire":"Dans cet article deux châteaux celui de Bagneux et de Louère à Marcé sur Esvres à cinq kilomètres au sud-Ouest \r\nBAGNEUX, édifié sur un éperon calcaire qui, selon la tradition, communiquait par signaux à feu avec Loches ou la tour de Galles. Des quatre tours, qui flanquent le quadrilatère surmonté d'un chemin de ronde,                                                      LOUERE, était un fief relevant du château de Bagneux.","architecture":"BAGNEUX, des quatre tours qui flanquent le quadrilatère surmonté d'un chemin de ronde, subsistent deux tours qui ont été coiffées d'ardoises après le XVe siècle. La tour dite \"du nord\" présente une élévation qui, sans doute, permettait de voir jusqu'aux forteresses ou fortins des plateaux voisins. Les mâchicoulis sont conservés en totalité sur les deux tours, et en partie le long du chemin de ronde. Les deux autres tours ont été rasées. Vers 1830, destruction d'un bel escalier de pierre. Vers 1850, la foudre a incendié les greniers.                                                                                                        La LOUERE du château fortifié datant du XVe siècle, dont la plus grande partie a été remplacée par une construction moderne, subsistent quelques éléments. Au nord-Est, un donjon carré a conservé son chemin de ronde et ses mâchicoulis. Au Nord-Ouest, une tour rectangulaire, dont le couronnement a été refait, contient la ordmoderne. Au Sud-Ouest, une tour cylindrique défendait l'angle correspondant de l'enceinte. Les douves et les courtines reliaient des ouvrages ont disparu. Le Château De La Louère est inscrit partiellement aux M.H. depuis le 18/06/1962","habitants":"Seigneur local\r\n        \"","divers":"A Bournan le château de Bagneux 47° 03' 16? nord, 0° 42' 27? est,  grav 1-2-3                             Louére grav-4-5,   47° 2' 9\" N, 0° 40' 38\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Bagneux_1.jpg","../../jctruffet.com/image/image_37/37_Bagneux_2.jpg","../../jctruffet.com/image/image_37/37_Bagneux_3.jpg"]},"Consult_chateau_formulaire7257":{"id":"Consult_chateau_formulaire7257","dept":"37","canton":"Ballan-Miré","commune":"Ballan Miré","nom":"Ballan_Miré","type":"Château","periode":"XII-XVII-XIX","histoire":"Trois châteaux à Ballan-Miré celui de Carnaux de Rochefuret et des Templiers.                                                                                CARNAUX, la construction du château des Carnaux date du XIXe siècle. Le château des Carnaux s'est vu doté d'une aile mauresque, en brique et pierre, pour Charles Alphonse Perrin. Elle a été rajoutée de 1848 à 1852, par l'architecte A.Boyer. La chapelle dépendait du Chapitre de Tours. Le domaine des Carnaux relevait du trésorier de Saint-Martin de Tours. Le château des Carnaux est privé.\r\nROCHEFURET, relevait  de la commanderie de Ballan. En 1638, elle appartenait à Nicolas Leroux, maire de Tours, trésorier au bureau des finances, constructeur probable de la partie médiane de l'édifice, constituant le manoir primitif. Chaque façade en est divisée en trois travées, la centrale est surmontée d'un fronton triangulaire soutenu par des pilastres. La porte de la façade sud a son linteau décoré d'un médaillon meublé d'instruments de musique. De part et d'autre de ce pavillon central, deux ailes de même élévation ont été ajoutées au XIXe siècle dans son prolongement. Au XIXe siècle, il devint la propriété de Narcisse Lesèble, botaniste et président du Comice Horticole de Tours. Son propriétaire actuel est la famille de La Poëze d'Harambure.","architecture":"TEMPLIERS, la commanderie des Templiers est fondée par l'Ordre du Temple lorsque celui-ci s'implante dans la région tourangelle au début du XIIe siècle. Une commanderie était un bénéfice accordé à un ordre de chevalerie militaire et religieuse. Philippe Auguste, hôte de marque de la commanderie de Ballan : en 1189, lors de la signature du traité de paix dAzay le Rideau entre le roi Philippe Auguste et Henri II Plantagenêt, roi dAngleterre, les deux souverains eurent une entrevue au château du Temple. En 1312 Philippe le Bel dissout lordre et la commanderie de Ballan, une des plus importantes de la région qui passe sous la direction de lordre des Hospitaliers de Saint Jean de Jérusalem jusquà la Révolution. Au coeur du Val de Loire, classée patrimoine mondial de l'Unesco, le château des Templiers cultive la tradition hospitalière et met à votre disposition des chambres d'hôtes de charme.","habitants":"Carneaux; Charles Alphonse Perrin                                   Rochefuret;  Nicolas Leroux\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Trois châteaux à Ballan-Miré celui de Carnaux, de Rochefuret grav-3-4 et des Templiers grav-5.                                    Carnaux  47° 20' 33\" Nord, 0° 36' 50\" Est                                    Rochefuret 47° 20' 58\" Nord et 0° 37' 45\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Ballan_Mir%c3%a9_1.jpg","../../jctruffet.com/image/image_37/37_Ballan_Mir%c3%a9_2.jpg","../../jctruffet.com/image/image_37/37_Ballan_Mir%c3%a9_3.jpg"]},"Consult_chateau_formulaire2ea7":{"id":"Consult_chateau_formulaire2ea7","dept":"37","canton":"Ballan-Miré","commune":"Ballan Miré","nom":"Ballan_Miré_II","type":"Château","periode":"XV-XVI-XVIII","histoire":"Dans cet article quatre châteaux ; Bois-Renault, Vau, Carte et Goupillière.                                                                                                       BOIS-RENAULT, la construction du château de Bois-Renault date de 1760 à 1770, pour la famille de Soyeux-Cartier-Roze. Le château de Bois-Renault sera racheté par Victor-Edouard Daloz, en 1869. Remanié de 1950 à 1960, le château servit de colonie de vacances, relevait du château de la Carte et du château du Colombiers (Vilandry).\r\nVAU, le château du Vau est un château bâti à Ballan-Miré, dans le département de l'Indre-et-Loire, en région Centre-Val de Loire, en France. Sa construction date du XVIe siècle. Le château du Vau a été reconstruit en 1774. Il relevait de la commanderie de la Carte et de Ballan.","architecture":"CARTE, la construction du château de La Carte date du 1497 au 1515,  a été entièrement restauré en 1879, par l'architecte Guérin, dans un style pseudo gothique. Une partie douves qui entourent le château de la Carte subsistent encore. On voit toujours aujourd'hui, sur la gable d'une des lucarnes, les armes du surintendant                                                           GOUPILLERE, est un manoir bâti à Ballan-Miré, fut construit en 1400 et restauré au début du XVIIIe siècle.","habitants":"Bois renaultfamille de Soyeux-Cartier-Roze.\r\n        \r\n        \r\n        \r\n        \"","divers":"Dans cet article quatre châteaux ; Bois-Renault grav-3-4  , Vau grav-6-7-8, Carte grav 1-2   et Goupillière.     Carte  47° 20' 33\" Nord et 0° 36' 50\" Est                                               Bois-Renault 47° 20' 33\" Nord et 0° 36' 50\" Est                       Goupillere 47° 20' 33\" Nord et 0° 36' 50\" Est                                         Ballan-Vau 47° 20' 33\" Nord, 0° 36' 50\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Ballan_Mir%c3%a9_II_1.jpg","../../jctruffet.com/image/image_37/37_Ballan_Mir%c3%a9_II_2.jpg","../../jctruffet.com/image/image_37/37_Ballan_Mir%c3%a9_II_3.jpg","../../jctruffet.com/image/image_37/37_Ballan_Mir%c3%a9_II_4.jpg","../../jctruffet.com/image/image_37/37_Ballan_Mir%c3%a9_II_5.jpg","../../jctruffet.com/image/image_37/37_Ballan_Mir%c3%a9_II_6.jpg","../../jctruffet.com/image/image_37/37_Ballan_Mir%c3%a9_II_7.jpg","../../jctruffet.com/image/image_37/37_Ballan_Mir%c3%a9_II_8.jpg"]},"Consult_chateau_formulaired1be":{"id":"Consult_chateau_formulaired1be","dept":"37","canton":"Ste-Maure de Touraine","commune":"Assay","nom":"Baschet","type":"Château","periode":"XVI-XVIII","histoire":"BASCHET, le château de Bashé ou Baschet , anciennement fortifié et entouré de douves. Il appartenait à des vignerons de Richelieu. C'est actuellement un domaine privé, était un hôtel-fort entouré de murailles et de douves que franchissait un pont-levis. Ces fortifications ont disparu et le château a été remanié. Chapelle des XIIe et XVIe siècles. Château bâti au XVIe siècle, et doublé au XIXe siècle d'une façade et de deux tours. La façade principale est ornée d'un fronton en tympan central mouluré, couronné d'un entablement. La fuie élevée au XVIe siècle est relativement bien conservée, avec 1400 boulins répartis sur quatre divisions et son échelle tournante.","architecture":"BASCHET, sa construction date du XVIe siècle. Il a été remanié au XIXe siècle. Le château de Baschet, anciennement fortifié est entouré de douves. Avant la Révolution, il appartenait à la famille Vignerot du Plessis de Richelieu. Les baies de la façade principale ont été modifiées. Les anciennes murailles ont disparu. Les lucarnes sont ornées par des frontons semi-circulaires et des volutes. Une partie de ses douves est toujours présente. C'est actuellement un domaine privé, fermé au Public. Le château du Baschet est inscrit aux M.H. depuis 1971.","habitants":"Baschet; famille Vignerot du Plessis de Richelieu\r\n        \r\n        \"","divers":"A Assay le château de Baschet-Assay-grav 1-2-3-4, de Bel Etat grav-5, de Voizère grav 6.   47° 03' 45\" nord, 0° 16' 11\"  est","gps":"","images":["../../jctruffet.com/image/image_37/37_Baschet_Assay_1.jpg","../../jctruffet.com/image/image_37/37_Baschet_Assay_2.jpg","../../jctruffet.com/image/image_37/37_Baschet_Assay_3.jpg","../../jctruffet.com/image/image_37/37_Baschet_Assay_4.jpg","../../jctruffet.com/image/image_37/37_Baschet_Assay_5.jpg","../../jctruffet.com/image/image_37/37_Baschet_Assay_6.jpg"]},"Consult_chateau_formulaire9460":{"id":"Consult_chateau_formulaire9460","dept":"37","canton":"Monts","commune":"Beaulieu les loches","nom":"Beaulieu_Candé","type":"Château","periode":"XVII","histoire":"BEAULIEU, le bourg de Candé est mentionné pour la première fois en 1063. Vers la fin du XIe siècle, le château fortifié par Geoffroy Rorgon, seigneur de Candé, et l'église castrale Saint-Denis, sont entourés par une enceinte. Le prieuré Saint-Nicolas, fondé à la même époque au nord-est de la ville par l'abbaye de Saint-Nicolas d'Angers, avec l'accord de Geoffroy Rorgon, n'attire pas la population escomptée, et c'est à l'emplacement du marché se tenant à la porte sud-est de la ville, où bientôt s'installent des halles, que se développe un bourg contigüe à la cité, l'église Saint-Denis étant devenue paroissiale, au  XIIIe siècle. À l'est de la ville, autrefois sur le territoire de la paroisse d'Angrie, l'aumônerie et maladrerie de Saint-Jean est fondée vers la fin du XIIe siècle. Le château était ruiné dès  le XVIIe siècle. L'enceinte primitive en mauvais état au début du XVe siècle fut probablement rénovée peu après le 1437, date à laquelle le roi Charles VII en avait donné l'autorisation.","architecture":"BEAULIEU, au XVIIe siècle est créé l'hôpital Saint-Joseph, près de l'église, qui sera transféré à Saint-Jean au XIXe siècle. La ville ne s'étend pas au-delà de ces limites jusqu'au cours de la première moitié du XIXe siècle.\r\nLe château de Beaulieu conserve des communs du XVIIe siècle. Le logis a été reconstruit en 1872 sur les plans de l'architecte Bonnet. La demeure se compose d'un étage carré et étage de comble, gros-oeuvre en schiste, moellon et enduit, élévation ordonnancée surmontée de toit à longs pans, croupe, toit en pavillon, toit polygonal recouverts d'ardoises.","habitants":"roi Charles VII\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Beaulieu à Candé, maison Templiers  47° 07' 47\" nord, 1° 00' 42\" est. Chevaleau  47° 07' 44\" nord, 1° 01' 08\" est grav-5","gps":"","images":["../../jctruffet.com/image/image_37/37_Beaulieu_Cand%c3%a9_1.jpg","../../jctruffet.com/image/image_37/37_Beaulieu_Cand%c3%a9_2.jpg","../../jctruffet.com/image/image_37/37_Beaulieu_Cand%c3%a9_3.jpg","../../jctruffet.com/image/image_37/37_Beaulieu_Cand%c3%a9_4.jpg","../../jctruffet.com/image/image_37/37_Beaulieu_Cand%c3%a9_5.jpg"]},"Consult_chateau_formulaire5dc7":{"id":"Consult_chateau_formulaire5dc7","dept":"37","canton":"Château-Renault","commune":"Beaumont la Ronce","nom":"Beaumont_Ronce","type":"Château","periode":"XIII-XVI-XVIII","histoire":"Deux châteaux à Beaumont la Ronce celui de Beaumont et de Neuilly.                                                                                       BEAUMONT, fut d'abord une châtellenie relevant de Maillé et dont le premier seigneur est cité en 1108. D'un château du XIIIe siècle, De 1874 à 1880, l'édifice a été prolongé par une construction de style Louis XII Le château appartenant à la même famille depuis le XVIIe siècle. Il fut par la suite très remanié et perdit un étage et son chemin de ronde. À ce donjon, fut ajouté au XVIe siècle une tour à huit « pans » en briques. En 1691, Claude Bonnin de la Bonnière acquit Beaumont qui fut érigé en marquisat en 1757.  Entre 1874 et 1880, le château de Beaumont s'augmenta d'une aile rappelant l'époque Louis XII, sous la direction de Gustave Guérin, et Charles Guérin, son fils, architectes à Tours. Le monument fait lobjet dune inscription au titre des M.H depuis le 14 septembre 1949 . Pierre de Beaumont l'actuel propriétaire est un descendant direct de Claude Bonnin de la Bonniniére .                                                                                                 NEUILLY-Pont-Pierre, ce fief a appartenu au Roi Louis XI. Le prieuré dépendait de l'abbaye de Vaas. Fin XVIIIe siècle, incursions des Chouans venus de la Région du Mans. Libérée de l'occupation allemande le 12 août 1944, Neuillé-Pont-Pierre fut chef-lieu provisoire du département jusqu'au 2 septembre.","architecture":"BEAUMONT la RONCE, construit à mi pente du versant ouest de la petite vallée de la Choisille le donjon de Beaumont la ronce parait avoir été édifié comme une tour d'observation entre le loir et la loire. Le sieur Giraud premier seigneur connu acheva la construction du donjon en 1108 .Sa construction faite de pierres et de briques est remarquable par sa hardiesse et sa masse imposante, il était entouré de fossés profonds et de deux ponts levis; le château lui se composait d'un donjon carré, flanqué à chaque coin d'une échauguette couronné de machicoulis et de créneaux.\r\nUne tour d'escalier octogonale du XVIe siècle était accolée au donjon et le surmontait d'un toit aigu elle existe encore et à environ 120 pieds de haut, on fit d'importantes restaurations au château. On construisit la tour d'escalier, on créa des baies et des ouvertures,  dans la cour intérieure on créa les étables, une boulangerie,le fournil etc, il y avait même un puit dans la cour.   Il dépendit de la baronnie de Maillé. En 1786,on modifia de nouveau le château le propriétaire commença à démolir le donjon dont il abattit les machicoulis, les créneaux et un étage. il fut arrété par la terreur qui sauva le reste de la tour. C'est au XIXe siècle, que fut ajoutée une aile de style renaissance à revètement de briques et une construction augmentée d'une chapelle.","habitants":"Beaumont; Famille de Claude Bonnin de la Bonnière \r\n        \"","divers":"à Beaumont la Ronce grav 1 à 5 celui de Beaumont et de Neuilly garv 6-7.  Mirandol grav-8, le manoir grav 9.                   7° 34' 15\" Nord et 0° 40' 12\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Beaumont_Ronce_1.jpg","../../jctruffet.com/image/image_37/37_Beaumont_Ronce_2.jpg","../../jctruffet.com/image/image_37/37_Beaumont_Ronce_3.jpg","../../jctruffet.com/image/image_37/37_Beaumont_Ronce_4.jpg","../../jctruffet.com/image/image_37/37_Beaumont_Ronce_5.jpg","../../jctruffet.com/image/image_37/37_Beaumont_Ronce_6.jpg","../../jctruffet.com/image/image_37/37_Beaumont_Ronce_7.jpg","../../jctruffet.com/image/image_37/37_Beaumont_Ronce_8.jpg","../../jctruffet.com/image/image_37/37_Beaumont_Ronce_9.jpg"]},"Consult_chateau_formulairea883":{"id":"Consult_chateau_formulairea883","dept":"37","canton":"Chinon","commune":"Beaumont en Véron","nom":"Beaumont_Véron","type":"Château","periode":"XV-XVII","histoire":"Trois châteaux à Beaumont en Véron  celui des Beaumont, de Coulaine et de Velors et pontourny.                                                                      BEAUMONT, en 1208, premier seigneur connu Renaud de Beaumont ; en 1245 Geoffroy de Beaumont ; en 1362 Gléon de Beaucay petit fils du seigneur de Champigny;  en 1438, Jean de Razilly, en 1550, René de Bastarnay seigneur de Beaumont. En 1627, Henriette Catherine de Joyeuse vend Beaumont et Velors à Claude de Launay Razilly ; tous ces seigneurs n'habitent pas Beaumont, il ne subsiste aucun vestige des XIIIe et XVIe siècles, de l'Hostel de Beaumont. L'édifice actuel est élevé au premier quart du XXe siècle. Dans le parc un souterrain refuge, un jardin et un pigeonnier.                                                                           VELORS, le château, désigné dans une charte du XIe siècle, formait un fief relevant de Beaumont et de Cravant. En 1598 la propriété passe pour un temps aux princes de Bourbon-Montpensier. Construit en pierre et brique au XVe siècle, le château occupe la partie sud d'une terrasse rectangulaire, entourée de douves et précédée d'une avant cour limitée à l'est et à l'ouest par des communs du XVIIIe siècle, il comprend un bâtiment principal, dont la façade nord est flanquée d'une tour polygonale d'escalier. La façade sud a été refaite en pierre de taille au XVIIIe siècle. Deux ailes en retour d'équerre et deux pavillons carrés occupent les angles nord de la cour d'honneur. Celui de l'ouest contient la chapelle. Une fuie ronde du XVIe siècle subsiste au nord des communs ouest. Une tourelle en brique et pierre du XVe se dresse à l'angle sud-est de l'enceinte.","architecture":"COULAINE, le début de la construction du château de Coulaine date de 1470. Son propriétaire initial était Jehan de Garguesalle. Le manoir fut, sur la place d'une ancienne forteresse plus importante dont les fondations ont été retrouvées. Le manoir du XVe siècle est composé d'un corps de logis rectangulaire élevé d'un étage et d'un comble, avec lucarnes surmontées d'un gâble orné de crochets et couronné d'un fleuron, la façade occidentale avec 2 des tourelles-échauguettes d'angle, la tour decagonale d'escalier flanquée elle-même d'une échauguette et, à droite, la flèche de la chapelle. Il est cantonné aux angles de tourelles en encorbellement. La façade Sud-est flanquée, en son centre, d'une haute tour d'escalier octogonale, flanquée à l'Ouest d'une tourelle cylindrique en encorbellement et couronnée d'une flèche accompagnée de lucarnes. A la base de cette tour d'escalier s'ouvre la porte du logis, surmontée d'une accolade à crochets qui s'amortit par un fleuron entre deux pinacles. Le blason des Ouirit est représenté dans le tympan. L'intérieur a complètement été remanié au XIXe siècle, était en polyculture à la génération précédente, mais Etienne de Bonnaventure et sa femme Pascale exploitent désormais le domaine uniquement en viticulture depuis 1990.","habitants":"Beaumont;Famille de Claude de Launay Razilly           Coulaine, Famille de Jehan de Garguesalle\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"à Beaumont en Véron  celui des Beaumont grav- de Coulaine grav-1-2  et de Velors     47° 12' 02\" nord, 0° 10' 52\" est                       grav-3-4.    Coulaine   47° 10' 49\" nord, 0° 11' 21\" est","gps":"","images":["../../jctruffet.com/image/image_37/37_Beaumont_V%c3%a9ron_1.jpg","../../jctruffet.com/image/image_37/37_Beaumont_V%c3%a9ron_2.jpg","../../jctruffet.com/image/image_37/37_Beaumont_V%c3%a9ron_3.jpg","../../jctruffet.com/image/image_37/37_Beaumont_V%c3%a9ron_4.jpg","../../jctruffet.com/image/image_37/37_Beaumont_V%c3%a9ron_5.jpg"]},"Consult_chateau_formulaire09f9":{"id":"Consult_chateau_formulaire09f9","dept":"37","canton":"Chinon","commune":"Beaumont en Véron","nom":"Beaumont_Véron_II","type":"Château","periode":"XV-XVII","histoire":"Trois châteaux dans cet article de Beaumont ; la Giraudière, Isore,  Montour et Razilly.                                                                                                     GIRAUDIERE,  le logis manoir de La Giraudière a été construit au XVIIe siècle.  chambres d'hôtes.                                                                                                               RAZILLY, ancien fief et château fort mentionnés dès le XIIe siècle. Autorisation de fortifier donnée par Charles VII, en 1439 à Jean, seigneur de Razilly, construction de l'ensemble du gros-oeuvre du château encore visible aujourd'hui, dans la première moitié du XVe siècle ; la cour fait plusieurs séjours à Razilly dans le troisième quart du XVe siècle. L'aile Est est entièrement refaite vers 1770 et tournée vers les jardins ; château fort jadis entouré de fossés, un premier logis côté Est de la cour, pose un problème de datation et de destination avec de petits éléments antérieurs au XVe siècle (voûte en berceau, chapiteau) ; le petit logis au nord de la cour et une partie du logis Est, conservent des cheminées de la première moitié du XVe siècle. Côté jardin, le bâtiment présente des restes de pavillons du XVe siècle très mutilés, et un corps de logis du XVIIIe siècle. Au XIXe siècle, ces bâtiments ont été transformés en ferme. Au sud de la cour s'élèvent les murs d'une chapelle construite au XVe siècle. Dans le parc se trouve un pigeonnier couvert d'une coupole et d'un lanterneau en pierre.","architecture":"ISORE, la construction date du XVe au XVIIe siècle. Il a été récemment restauré avec tout le confort moderne, acquit en 1851 par la famille d'Armagnac. Le domaine d'Isoré possède aussi une magnifique grange dimière et diverses caves dans le roc. Les chambres sont grandes (30 m²) et lumineuses grâce à ses murs épais, qui restent très fraîches, en été. Vous y trouverez des chambres d'hôtes et des suites. Les chambres d'hôtes sont dotées de 4 épis par les gîtes de France, signe de confort et de qualité et reconnaissance du soin permanent à vous satisfaire en français, néerlandais ou anglais qu'apporte le couple belge Peter et Chantal De Swert-Coen.                                                                  MONTOUR Manoir composé d'un pavillon rectangulaire accosté à l'ouest d'une aile utilisée comme magnanerie au XVIIIe siècle. Au nord-est se trouve la chapelle de plan presque carré. Deux pilastres à bossages soutiennent un entablement avec un tympan triangulaire, et encadrent une porte en arc plein cintre.                                                                         RAZILLY, il date du XVe et du XVIIIe siècle. L'ancien fief et château fort sont mentionnés dès le XIIe siècle. Charles VII en 1446, puis Louis XI et Charles VIII, séjournèrent au château de Razilly. Côté jardin, l'édifice présente des restes de pavillons du XVe siècle très mutilés et un corps de logis du XVIIIe siècle. Au XIXe siècle, ces bâtiments ont été transformés en ferme. Dans l'ancien parc, se trouve une fuye couverte d'une coupole et d'un lanterneau en pierre. Le château de Razilly est inscrit aux M.H. depuis le 9/10/1934.","habitants":"Isore;  famille d'Armagnac\r\n        \"","divers":"Trois châteaux dans cet article de Beaumont ; la Giraudière grav-1 et Isore grav-2 et Montour     47° 11' 163 nord, 0° 09' 50\" Ouest       grav-3.                                                                      Giraudière: 47° 11' 48\" Nord, 0° 11' 14\" Est                                         Isore   47° 12' 21,57\" Nord et 0° 12' 28,1\" Est                   Razilly 47° 11' 32\" Nord et 0° 10' 09\" Est  grav 4-5-6","gps":"","images":["../../jctruffet.com/image/image_37/37_Beaumont_V%c3%a9ron_II_1.jpg","../../jctruffet.com/image/image_37/37_Beaumont_V%c3%a9ron_II_2.jpg","../../jctruffet.com/image/image_37/37_Beaumont_V%c3%a9ron_II_3.jpg","../../jctruffet.com/image/image_37/37_Beaumont_V%c3%a9ron_II_4.jpg","../../jctruffet.com/image/image_37/37_Beaumont_V%c3%a9ron_II_5.jpg","../../jctruffet.com/image/image_37/37_Beaumont_V%c3%a9ron_II_6.jpg"]},"Consult_chateau_formulaire61b6":{"id":"Consult_chateau_formulaire61b6","dept":"37","canton":"Chinon","commune":"Beaumont en Véron","nom":"Beaumont_Véron_III","type":"Château","periode":"XV-XVI","histoire":"trois châteaux à Beaumont en Véron, la Courtinière , Danzay  et Detilly.                                                                                               COURTINIERE, date du XVIe siècle. Construit au  XVIe siècle. En 1636, il est acquis par Roland Tardif, puis passe à Jehan Dreux, au XVIIIe siècle, à François Mangot, conseiller du roi , à Augustin Pierre Quirit de Coulaine et à Denis du Moustier de 1824 à 1830. Le manoir est protégé par les M.H. partiellement le 6/05/1927 pour la porte d'entrée et les façades sur la cour.                                                                                                DANZAY, villa appelée Damniacum donnée en 974 à l'abbaye Saint-Florent de Saumur. Aux XIVe et XVe siècles la demeure appartient à la famille Garguesalle: vestige aile ouest. En 1689, à René d'Espinay, puis aux Mangot et aux pays Meslier. Le colombier et la chapelle du quatrième quart XVIe siècle, le clocheton de la chapelle détruit en 1918, les cheminées datent des XIVe et XVIIIe siècles et la façade sur cour est remaniée en 1767. C'est une demeure qui nécessite d'être considérée dans son ensemble mais non séparément, l'intérêt des deux escaliers polygonaux est indéniable, le château est intéressant par son type de distribution.                                                                                                                  DETILLY, la fille d'Hugues d'Estilly porte le domaine à la famille de Brizay qui le garde deux siècles ; au XVe siècle le domaine passe à la famille de Valory, une partie du corps de logis est du XVe siècle ; grands remaniements après le passage des huguenots en 1562 ; après le mariage de Louis de Valory avec Antoinette Catherine de Voyer de Paulmy d'Argenson en 1667, le château est transformé ; en 1807 il est acheté par Jean Nivelleau, en 1819 il passe à la baronne de Saint-Hilaire. Le château fut pris et incendié en 1562 par le comte de Montgomery","architecture":"COUTINIERE, ancienne ferme dépendant du prieuré de Beaumont-en-Véron qui a conservé son portail d'entrée surmonté d'une galerie qui devait limiter un chemin de ronde, et quelques vestiges de façades sur la cour présentant une décoration originale de pilastres et motifs sculptés. Ces parties, qui appartiennent au XVIe siècle, peuvent être soit les vestiges d'un ensemble aujourd'hui démoli, soit les prémices d'une ferme somptueuse dont la construction a été abandonnée en cours d'exécution.                                                       DETILLY,  l'édifice a été reconstruit au début du XVIIe siècle. La chapelle, consacrée vers 1135, a été relevée au XVe siècle. Le pavillon carré qui accompagne le château au sud, fit partie du bâtiment détruit en 1562, mais a été restauré lors de la reconstruction de la demeure. La porte monumentale est composée d'une grande arcade en plein cintre, accostée de pilastres à chapiteaux ioniques, soutenant l'entablement avec édicule accosté d'ailerons. Les communs sont contemporains du château.","habitants":"Courtinière; Famille Augustin Pierre Quirit de Coulaine                         Danzay;  Famille Garguesalle                                                     Detilly;  Famille de Valory\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"à Beaumont en Véron, la Courtinière   47° 10' 51\" nord, 0° 11' 05\" est, grav 1 à 4 ,                                                                    Danzay  et Detilly. Detilly  47° 12' 01\" Nord et 0° 09' 54\" Est                            Courtiniere  47° 10' 51\" Nord, 0° 11' 05\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Beaumont_V%c3%a9ron_III_1.jpg","../../jctruffet.com/image/image_37/37_Beaumont_V%c3%a9ron_III_2.jpg","../../jctruffet.com/image/image_37/37_Beaumont_V%c3%a9ron_III_3.jpg","../../jctruffet.com/image/image_37/37_Beaumont_V%c3%a9ron_III_4.html","../../jctruffet.com/image/image_37/37_Beaumont_V%c3%a9ron_III_5.html","../../jctruffet.com/image/image_37/37_Beaumont_V%c3%a9ron_III_6.html"]},"Consult_chateau_formulaire30a1":{"id":"Consult_chateau_formulaire30a1","dept":"37","canton":"Bléré","commune":"Azay sur Cher","nom":"Beauvais_Indre","type":"Château","periode":"XVI","histoire":"BEAUVAIS, est un ancien fief, qui relève du château d'Amboise tout comme le manoir de la Michelinière. Vers 1490, lhistoire du château commence  avec un profond changement architectural en 1853. Aujourdhui le château de Beauvais allie pour votre plus grand plaisir, confort et authenticité. Le seigneur en était Pierre L'Hermite, grand panetier de France et précisément fils du célèbre Tristan L'Hermite. Beauvais, en 1800, appartenant alors au sénateur Clément de Ris.  Bien plus tard, en juin 1940, lors du repli du gouvernement Français à Tours, Charles de Gaulle, qui était à cette époque, sous-secrétaire d'état à la défense nationale au sein du gouvernement de Paul Reynaud. Il y  logea quelques jours à Beauvais. En 1950 le château est vendu à la famille de Lovinfosse.","architecture":"BEAUVAIS En 1764  le château se composait  d'un corps de logis rectangulaire de très sobre facture flanqué de deux ailes d'inégale longueur en retour d'équerre. Remanié au XVIIIe siècle, sous le second Empire  pourvu d'éléments destinés à lui donner l'allure d'une demeure de l'époque gothique. La façade arrière est flanquée de deux tours rondes couronnées de mâchicoulis, coiffées de toits en poivrière et agrémentée , tout comme les angles rentrants de la façade d'arrivée, des tourelles en encorbellement, les combles percés de lucarnes à croisées de pierre arborant des galbes aigus et des pinacles. En 1890 une nouvelle campagne de transformations portant sur l'aile ouest se traduit par la création d'un pignon décoré de crochets de feuillage et par celle d'une tour polygonale abritant un escalier à vis.","habitants":"Famille de Tristan L'Hermite\r\n        \"","divers":"Château de Beauvais  à Azay sur Cher","gps":"","images":["../../jctruffet.com/image/image_37/37_Beauvais_Indre_1.jpg","../../jctruffet.com/image/image_37/37_Beauvais_Indre_2.jpg","../../jctruffet.com/image/image_37/37_Beauvais_Indre_3.jpg","../../jctruffet.com/image/image_37/37_Beauvais_Indre_4.jpg"]},"Consult_chateau_formulaire5bc2":{"id":"Consult_chateau_formulaire5bc2","dept":"37","canton":"Château-Renault","commune":"Neuvy le roy","nom":"Beauvais_Neuvy","type":"Vestiges","periode":"XIV","histoire":"A Neuvy le Roy  Château de Beaulieu du XIXe siècle,\r\nde la Martinerie  du XVIe au  XIXe siècle, (voir article) manoir de la Cave du  XVe et XVIe siècles, restauré,  de la Chapronnière duXVIe siècle, de la Thivinière du XVIe siècle, du Rouvre du XVe, XVIe et XVIIe siècles (une façade remaniée au XVIIIe siècle). La partie principale date du début du XVIIe siècle.                                                                                                        BEAUVAIS, fief relevant du château des Châtelliers, situé sur la commune de Louestault, Beauvais appartient de 1526 à 1902 à la famille Bonnin de la Bonninière, seigneur de Beaumont. Il reste dans la partie nord deux tours d'enceinte rondes, qui peuvent dater du XIVe siècle. En 1946, on distinguait encore les douves. S'élèvent les vestiges d'un bâtiment identifié comme une chapelle, accolée d'une tour circulaire, placée sur le mur d'enceinte. D'après la forme des culots placés à la retombée des voûtes, elle pourrait dater du XVIe siècle. Au XVIIIe siècle, Beauvais est désigné sous le terme de ferme, des bâtiments d'habitation et à usage agricole sont construits au XIXe siècle. En 1902, l'acte de vente mentionne \"de vieilles murailles avec cave dessous et d'un jardin entouré en partie de vieux murs avec deux tourelles\", ce site est toujours utilisé comme exploitation agricole. Une demande de protection M.H. avait été faite en 1976, celle-ci est restée sans suite.","architecture":"Vestiges du château de Beauvais : deux tours d'enceinte, ruines de la chapelle du XVIe siècle.\r\nVestiges du château de la Mauvissière, actuellement ferme, du XVIe siècle et du XIXe siècle.\r\nVestiges du château fort du Bois du XIVe siècle, XVIIIe siècle, et XIXe siècle.                                                                                               BEAUVAIS, vestige d'un grand bâtiment rectangulaire construit en moellon constituant éventuellement le choeur d'une chapelle et une partie du collatéral Sud. Le mur Ouest est percé d'un oculus, la porte, à l'origine en arc brisé, est actuellement rectangulaire. Le mur Sud est percé d'une grande baie en arc en plein cintre, sur ce mur Sud est accolé une tour cylindrique percé de baies rectangulaires. Les voûtes ont disparu, seules subsistent les arcs formerets et le départ des voûtes d'ogives reposant sur un culot cannelé au décor de feuillage. Une construction, couverte d'un toit en appentis, s'appuie sur le mur Ouest. Tours d'enceinte cylindrique, dépourvues de toit et percées de meurtrières verticales.","habitants":"Famille Bonnin de la Bonninière\r\n        \r\n        \"","divers":"A Neuvy le Roy , château de Beaulieu  grav-4  et  de Beauvais 47° 36' 12\" Nord et 0° 35' 38\" Est       grav 1-2-3","gps":"","images":["../../jctruffet.com/image/image_37/37_Beauvais_Neuvy_1.jpg","../../jctruffet.com/image/image_37/37_Beauvais_Neuvy_2.jpg","../../jctruffet.com/image/image_37/37_Beauvais_Neuvy_3.jpg","../../jctruffet.com/image/image_37/37_Beauvais_Neuvy_4.jpg"]},"Consult_chateau_formulaire2125":{"id":"Consult_chateau_formulaire2125","dept":"37","canton":"Langeais","commune":"Benais-Rastigné","nom":"Benais_Louy","type":"Château","periode":"XVI-XVIII","histoire":"A deux km au sud à Restigné dont le château de Rastigné, de Louy,  de Benais, de Plasterie.                                                                                        LOUY, ancien fief connu depuis le IXe siècle, mentionné dans une charte de Charles le Chauve confirmant les possessions de la collégiale Saint-Marau. C'est un ensemble de bâtiments du XVIIe siècle n'ayant pas été dénaturés. L'accès se fait au sud par un grand portail en plein cintre menant à une grande cour fermée par trois différents corps de bâtiments. Au nord, le bâtiment principal d'habitation se divise en un corps central et deux pavillons en avancée. Deux petites tours carrées encadrent le logis principal. En retour, une chapelle surmontée d'un clocheton carré en lanternon, terminé par un dôme. A l'est et à l'ouest de la cour, deux bâtiments bas servent de communs, leurs toitures s'imbriquant dans le logis et la chapelle.","architecture":"BENAIS  La construction du château date du XVIe siècle, sur une ancienne porte fortifiée flanquée de 2 tours. Sa disposition générale semble avoir été subordonnée à l'utilisation des constructions antérieures. L'ensemble de la porte médiévale était couronné de créneaux, mâchicoulis et échauguettes. La partie centrale de la porte est percée, au rez-de-chaussée, de 2 ouvertures sous porche voûté, donnant accès à la cour terrasse où se trouvent les corps de logis. La porte a ensuite été exhaussée. A l'aile gauche, un avant corps a été ajouté au XVIe siècle, ainsi qu'une petite tour octogonale, en partie engagée dans la porte. Près du vieux château se trouvent les restes de 2 grosses tours, entre lesquelles, s'élève le château moderne de Benais. C'est un château privé. Il est inscrit aux M.H. depuis le 6/11/1929.","habitants":"Seigneurs locaux\r\n        \"","divers":"château de Rastigné à Rastigné, de Louy grav 6,  de Benais 47° 17' 42\" nord, 0° 12' 51\" est           grav 1-2-3 , de Plasterie grav -4-5.     Benais  47° 17' 42\" Nord et 0° 12' 51\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Benais_Louy_1.jpg","../../jctruffet.com/image/image_37/37_Benais_Louy_2.jpg","../../jctruffet.com/image/image_37/37_Benais_Louy_3.jpg","../../jctruffet.com/image/image_37/37_Benais_Louy_4.jpg","../../jctruffet.com/image/image_37/37_Benais_Louy_5.jpg","../../jctruffet.com/image/image_37/37_Benais_Louy_6.jpg"]},"Consult_chateau_formulaire4627":{"id":"Consult_chateau_formulaire4627","dept":"37","canton":"Descartes","commune":"Betz-le-Château,","nom":"Betz_le_Chateau","type":"Château","periode":"XIII-XVII","histoire":"trois châteaux à Betz, le château dont celui de Betz de la Bertaudière de la Saulaie.                                                                          BETZ le CHATEAU, construit au XIIIe siècle par Gilles de Betz mort en 1207, où Raoul de Betz cité en 1258 et 1272 ; il en reste la tour porte sur plan carré et le souterrain refuge ; c'est peut-être Pierre De Betz et Catherine de La Jaille, seigneurs de Betz de 1463 à 1501 qui entreprennent l'agrandissement du château, en 1503   passe par alliance aux Couhé, au début du XVIIIe siècle la châtellenie passe a Jacques Chaspoux ancien lieutenant des gardes  et à son fils Eustache meurt à Paris en 1791 son gendre en 1833  marquis de Menou cède Betz à Francois-Jacques Arnault et le château connaîtra  plusieurs propriétaires sombre peu à peu dans l'abandon   et en 1946 acquit par messieur Vezin, Vaucamp et Faure.               BERTAUDIERE, est un ancien fief relevant de Reignac ; la demeure est construite sur une cave dans laquelle s'amorce un souterrain bouché ; la maison porte la date 1570 à la tour d'escalier. Au XVIIe siècle, on ajoute deux pavillons d'angle construction de nouveaux communs et d'un portail en 1875. la cave semi enterrée de la maison est à 3 galeries voûtées en berceau ; les murs sont en moellon enduit et en pierre de taille ; la tour d'escalier et les tours d'angle ont un toit en pavillon.","architecture":"BETZ le CHATEAU, un premier château est  construit au XIIIe siècle le souterrain est élargi et agrandi par la construction d'un pigeonnier souterrain et de salles ; le château adopte un plan de type \"donjon éclaté\" et se compose d'un corps de logis quadrangulaire, d'une tour ronde qui abrite la chapelle, d'une tour d'escalier polygonale et de la partie occidentale détruite sûrement au XIXe siècle ; des communs anciennement fortifiés  et bordés de douves en eau cernent le château au Nord et à l'Est ; au XVIIe siècle, on ajoute un portail au sud du chemin d'accès, vestiges de la clôture de pierre ; le tracé de la route D93 entraîne la destruction d'une partie des communs, et le comblement des douves. L'étage de sous-sol de la tour ronde est couvert d'une coupole ; le rez-de-chaussée où se trouve la chapelle ; le toit du corps de logis est à longs pans et pignon découvert ; la tour polygonale est couverte d'un toit en appentis, la tour ronde d'un toit en terrasse et la tour carrée d'un toit en pavillon ; les dépendances sont à toit à longs pans et pignon couvert ; l'édifice a été très restauré vers 1960 et 1978. inscrit au M.H. en 1937","habitants":"Betz; Famille de Pierre De Betz            Bertaudière;\r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"à Betz, le château dont celui de Betz  46° 59' 22\" nord, 0° 54' 59\" est,  grav 1 à 4  de la Bertaudière grav 5-6 de la Saulaie grav-7. 46° 59' 34\" nord, 0° 55' 16\" est","gps":"","images":["../../jctruffet.com/image/image_37/37_Betz_le_Chateau_1.jpg","../../jctruffet.com/image/image_37/37_Betz_le_Chateau_2.jpg","../../jctruffet.com/image/image_37/37_Betz_le_Chateau_3.jpg","../../jctruffet.com/image/image_37/37_Betz_le_Chateau_4.jpg","../../jctruffet.com/image/image_37/37_Betz_le_Chateau_5.jpg","../../jctruffet.com/image/image_37/37_Betz_le_Chateau_6.jpg","../../jctruffet.com/image/image_37/37_Betz_le_Chateau_7.jpg"]},"Consult_chateau_formulaire388e":{"id":"Consult_chateau_formulaire388e","dept":"37","canton":"Chinon","commune":"Saint-Benoît-la-Forêt","nom":"Beugny","type":"Château","periode":"XIX","histoire":"BEUGNY, fief relevant de la seigneurie de Cravant. Aujourd'hui  chambres d'hôtes et  société civile immobilière gérante  Mme Patricia Thérèse Israël.","architecture":"BEUGNY,  du début du XVIe siècle ; englobé dans les remaniements et agrandissements vers 1830 ou 1840 pour la famille de Puységur ; au XXe siècle destruction de la moitié du corps principal nord et des ailes sauf pavillons sud ; les anciennes tours polygonales d'angle du logis et les pavillons carrés des extrémités des ailes témoignent encore de l'importance de la demeure au XIXe siècle. Le morcellement des vestiges et le découpage de l'espace en jardins individuels empêchent une lecture cohérente de l'architecture.\r\nDe plan régulier, élévation ordonnancée  a un étage carré toit en pavillon ; toit à longs pans recouvert d'ardoise.","habitants":"Famille de Puységur \r\n        \"","divers":"a Saint-Benoît-la-Forêt, le château de Beugny","gps":"","images":["../../jctruffet.com/image/image_37/37_Beugny_1.jpg","../../jctruffet.com/image/image_37/37_Beugny_2.jpg","../../jctruffet.com/image/image_37/37_Beugny_3.jpg"]},"Consult_chateau_formulaire526c":{"id":"Consult_chateau_formulaire526c","dept":"37","canton":"Bléré","commune":"Bléré","nom":"Bléré","type":"Chateaux","periode":"XVI-XIX","histoire":"quatre châteaux à Bléré, Faussembault, Crépières , Fontenay et Courcicaudière.                                                                   FAUSSEMBAULT,  fut construit, en 1832, sur l'emplacement d'un manoir datant du XVIe siècle. Il était la demeure de la famille de la Bretonnière. Au XVIIe siècle, elle était celle de la famille Nau, puis celle d'Étienne Guillerault père, avocat en Parlement, anobli par Louis XIV et au début du XVIIIe siècle habité par ses arrière-petits neveux Étienne et Simon Frémy, héritiers seigneurs de Bléré. Il fut également acquis des mains des Frémy par Gabriel Taschereau de Baudry en 1736 et réunit au domaine du château de Bléré.                                                                                    CREPIERES, demeure reconstruite au XIXe siècle sur le lieu d'une maison seigneuriale du XVe siècle dont il subsiste le colombier, intégré à la construction actuelle, ainsi que deux tourelles d'enceinte. Cette terre seigneuriale était la propriété d'Antoine des Dues, sieur de Crespières, en 1600 et fut vendue à Jacques de Faverolles, chevalier, seigneur de Bléré en 1653 dont ses descendants demeurèrent propriétaires jusqu'au XVIIIe siècle. Dans ce bourg on peut admirer, une belle habitation, dite fief de Bois Ramé, construite au XVe siècle dont le logis comprenait deux pièces à chaque étage, desservies par un escalier en tourelle. Les encorbellement de la tourelle sont décorés, à leurs bases, de fines sculptures. La tourelle d'escalier et la façade sur cour avec leurs to
