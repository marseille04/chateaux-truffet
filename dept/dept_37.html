itures sont classées MH par arrêté du 16 avril 1929.","architecture":"FONTENAY  Le lieu et l'hébergement de Fontenay était la propriété au XVIIe siècle de la famille de Boisgauthier, puis de celle des Dubois de Montmoreau et de Georges Guill. Cette propriété était initialement liée à celle de la seigneurie de l'Arpentil (Herpenty) toute proche. Ces propriétés furent acquises par Gabriel Taschereau de Baudry en 1730 des mains de M. Greffier, Receveur général des Finances de Poitiers et réunies au domaine du château de Bléré. Le château de Fontenay avait été bâti au XVIe siècle, mais il fut très endommagé par l'incendie que les Prussiens déclenchèrent en représailles en 1871. Auguste Bucquet son propriétaire d'alors engagea sa reconstruction, pour des chambres d'hôtes.                                                           COURCICAUDIERE, il était appelé aussi l'hôtel Lemaître. Ce château était la demeure d'Auguste Lemaître et Françoise Gaberot, une riche famille de Bléré. Ils le firent construire, en 1841, par larchitecte parisien A. Panost. Le château La Coursicauderie et ses terres, entouré de hauts murs et doté d'un parc, fut acquis, en 1982, par la commune de Bléré, qui, après quelques travaux d'aménagement, en fit le siège de la mairie de Bléré.","habitants":"Faussembault; famille de la Bretonnière.             Crépières;Jacques de Faverolles,                                       Courcicaudière; Auguste Lemaître\r\n        \"","divers":"à Bléré grav 1-3, Faussembault, Crépières , Fontenay grav 2 et Courcicaudière.    Faussembault   47° 19' 33\" Nord, 0° 59' 26\" Est.  Fontenay   47° 19' 33\" Nord, 0° 59' 26\" Est                           Courcicaudière: 47° 19' 33 \" Nord, 0° 59' 26\" Est            Crespières   47° 19' 33\" Nord, 0° 59' 26\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Bl%c3%a9r%c3%a9_1.jpg","../../jctruffet.com/image/image_37/37_Bl%c3%a9r%c3%a9_2.jpg","../../jctruffet.com/image/image_37/37_Bl%c3%a9r%c3%a9_3.jpg"]},"Consult_chateau_formulaire5db4":{"id":"Consult_chateau_formulaire5db4","dept":"37","canton":"Descartes","commune":"Abilly","nom":"Bois_d_Aix","type":"Manoir","periode":"XX","histoire":"A Abilly; manoir de La Chatière du XVe siècle (Inscrit M.H.) de Bessé du XVe siècle. \r\nBOIS DAIX,  Autrefois ce lieu était un fief relevant de Chanceaux. Le château du Bois d'Aix trop récent n'a pas d'historique, en effet cette demeure est une construction du début du XXe siècle (1910-1912) réalisée pour un industriel. Autrefois ce lieu était un fief relevant de Chanceaux à foi et hommage simple et une maille d'or. En 1575, il appartenait à Antoine de Baillon, écuyer; en 1600, à Bertrand de Baillon; en 1628, à Charles Poitevin, écuyer; en 1643-1667, à René Poitevin, écuyer, sieur du Boisdais; en 1695-1696, à Louis Poitevin; en 1700, à Angélique Poitevin, veuve de Pierre Le Comte, écuyer; en 1718, à René Poitevin, écuyer, seigneur du Boisdais, capitaine réformé au régiment Royal d'infanterie; en 1734, à Pierre Poitevin, écuyer, seigneur du Boisdais, chevalier de Saint-Louis, capitaine au régiment Royal d'infanterie; en 1752-1779, à Mathieu Le Comte, écuyer, seigneur du Boisdais; en 1779-1787, à François-Arnoul de Ponthieu, chevalier de Saint-Louis, garde de la Porte du roi. Pierre René Célestin Moreau, y est né le 23 mars 1805.","architecture":"BOIS D'AIX , en 2011, son actuel propriétaire s'en sépare la mort dans l'âme. Pendant 10 ans, il a entièrement rénové le bâtiment, du toit jusqu'à la cave. Le château du Bois d'Aix comporte une vingtaine de pièces, compte 1450 m² habitables. Il est entouré d'un parc de 26 hectares. La propriété serait rachetée par l'État depuis le début 2012, en effet cette demeure est une construction du début du XXe siècle (Le 22 Août 1909 pose de la première pierre, fin des travaux 1912) pour le baron Gustave de Ravignan. Construit sur lemplacement dun château plus ancien.","habitants":"baron Gustave de Ravignan\r\n        \"","divers":"A Abilly; manoir de La Chatière du XVe siècle  de Bessé du XVe siècle.  46° 56' 31\" Nord et 0° 43' 43\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Bois_d_Aix_1.jpg","../../jctruffet.com/image/image_37/37_Bois_d_Aix_2.jpg","../../jctruffet.com/image/image_37/37_Bois_d_Aix_3.jpg"]},"Consult_chateau_formulaire0f0c":{"id":"Consult_chateau_formulaire0f0c","dept":"37","canton":"Monts","commune":"Villeperdue","nom":"Boisbonnard-Thilouze","type":"chäteau","periode":"XVI","histoire":"BOISBONNARD de la famille de Bonnard, pas d'autre information historique.                                                                                     A cinq kilométres au nord-ouest Thilouze Il existe sur la commune : le chatelet, le château du Plessis, le manoir de la Ribaudière et le manoir des Bruneaux.                                                         GRAND-CHATELET, ancien fief relevant, au XIVe siècle, de l'archevêché de Tours. Occupant le côté nord d'une enceinte dont les courtines ont disparu, mais il subsistent les douves, le château comprend un bâtiment rectangulaire flanqué, à chacun de ses angles, d'une tour circulaire. La tour sud-est loge une vis de pierre. Les tours nord et les façades principales ont été réparer  en moyen appareil au XVIe siècle. La porte en plein cintre était précédée, au nord, par un pont-levis franchissant les douves. La chapelle à l'ouest et contigüe au château, comprend une nef couverte d'une voûte sur croisée d'ogives à moulures prismatiques.","architecture":"BOISBONNARD, au XIVe siècle, le château de Boisbonnard est une puissante forteresse entourée de douves. De cet ensemble médiéval subsistent cinq tours rondes et les douves. Le logis actuel est le résultat de plusieurs remaniements et adjonctions successives. Le bâtiment principal, du XVIe siècle, fut restauré au XVIIIe siècle, puis en 1856. Au XVIIe siècle, il fut doublé au nord par deux pavillons et prolongé au XIXe siècle par une petite construction. A l'intérieur de Boisbonnard, le salon abrite des boiseries d'époque Louis XVI, endommagées durant la seconde guerre mondiale. Il conserve deux cheminées anciennes des XVIIe et XVIIIe siècles. Les communs de style Empire ont été en grande partie incendiés lors de la dernière guerre, ils ont été prolongés par des bâtiments de style néo-gothique au XIXe siècle.                                             THILOUZE,  est un château bâti à Thilouze, chambre d'hôte, il se situe à 20 kilomètres de Tours. Occupant un château rénové construit en 1520, l'établissement le châtelet est géré par la même famille depuis 250 ans. Classé M.H. Avec une vue sur les douves, la suite dispose d'une cheminée.","habitants":"Famille de Bonnard\r\n        \r\n        \"","divers":"A Villeperdue château de Boisbonnard  47° 12' 06\" nord, 0° 37' 59\" est    grav 1 à 4       sur la commune : le Chatelet grav-7, le Château du Plessis grav-5-9, le Manoir de la Ribaudière grav-6-8.  Thilouze: 47° 13' 25\" Nord, 0° 34' 52\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Boisbonnard_Thilouze_1.jpg","../../jctruffet.com/image/image_37/37_Boisbonnard_Thilouze_2.jpg","../../jctruffet.com/image/image_37/37_Boisbonnard_Thilouze_3.jpg","../../jctruffet.com/image/image_37/37_Boisbonnard_Thilouze_4.jpg","../../jctruffet.com/image/image_37/37_Boisbonnard_Thilouze_5.jpg","../../jctruffet.com/image/image_37/37_Boisbonnard_Thilouze_6.jpg","../../jctruffet.com/image/image_37/37_Boisbonnard_Thilouze_7.jpg","../../jctruffet.com/image/image_37/37_Boisbonnard_Thilouze_8.jpg","../../jctruffet.com/image/image_37/37_Boisbonnard_Thilouze_9.jpg"]},"Consult_chateau_formulaire3bc3":{"id":"Consult_chateau_formulaire3bc3","dept":"37","canton":"Descartes","commune":"Bossay sur Claise","nom":"Bossay_Claise","type":"Château","periode":"XV-XVII","histoire":"Deux châteaux à Bossay celui de Bossay, de Cinge et de Ris.                                                                                                       CINGE, était une châtellenie relevant de la baronnie de Preuilly dont Josbert de Cingé en 1170, fut le 1er seigneur connu. Au XIIIe siècle les Turpin de Crissé en étaient propriétaires puis passa à Eschivard IV de Preuilly par mariage avec Marguerite Turpin. Les Robert au XIVe siècle et les de Salignac au XVe siècle leur succédèrent. En 1484, la fille de Pons de Salignac porta par mariage la propriété dans la famille de Crevant qui la posséda jusqu'en 1748. Cingé, en 1789, appartenait à la famille de Livenne sur qui le domaine fut confisqué. C'est à Cingé que naquit, le 14 juillet 1629, Claude Bonaventure de Crevant qui devint roi d'Yvetot par son mariage avec Marie d'Appellevoisin.                                                        RIS, le château, est un ancien fief relevant de Preuilly, et pour une partie du château des Bordes. Louis de Chauveron en était seigneur en 1407. Au XVIe siècle, la propriété appartenait à la famille de Naillac, puis par héritage, aux de Lezay et de Saint-Savin. Aux XVIIe et XVIIIe siècles, l'édifice passa  aux familles de Préaux, de Jussac, Dubet, Chartier de Montléger et Dauphin. Le château du XVe siècle fut restauré vers 1850 par Louis-Joseph Dauphin. Il se compose d'un corps de bâtiment principal, les angles côté nord portent chacun une tourelle en encorbellement et qui est accompagné au sud -est d'un pavillon. La décoration des portes, fenêtres et lucarnes a été refaite.","architecture":"BOSSAY subsiste le donjon. Le château faisait partie de la ligne de fortification mise en place dès le XIe siècle. Selon la tradition, la forteresse, restaurée en 1350, fut détruite par les anglais et reconstruite au XVe siècle. Le logis datant de la fin du XIIe siècle a été peu remanié depuis le XVIe siècle. Le château a conservé des dispositions intéressantes de la construction d'origine: structure du bâtiment ainsi que décor des baies géminées circonscrites dans des arcs cintrés. D'autres éléments remontent sans doute aux XIVe, XVe et XVIe siècles : adjonction d'une tour d'escalier polygonale desservant tous les étages, échauguettes d'angle. L'édifice est représentatif des demeures romanes de petits seigneurs.                                                                                    CINGE, de l'ancien édifice, il reste la base des murailles du corps de logis principal et une partie du donjon. Attenant à celui-ci, s'élève une importante construction du XVIIe siècle, épaulée à l'ouest par de gros contreforts et flanquée de deux tours cylindriques l'une à l'angle nord est, l'autre au sud ouest. Près du château au nord de la cour, une chapelle subsiste, convertie maintenant en grange. Elle fut construite en 1624 par René de Crevant à la place d'un oratoire plus ancien, dédié à saint-Thomas. Un clocheton domine la toiture.","habitants":"Cinge; famille de Livenne                                                              Ris; famille de Naillac\r\n        \"","divers":"Deux châteaux à Bossay celui de Bossay   46° 49' 41\" nord, 0° 57' 47\" est   grav 1-2-3-, de Cinge grav 5-6 et de Ris grav-4.","gps":"","images":["../../jctruffet.com/image/image_37/37_Bossay_Claise_1.jpg","../../jctruffet.com/image/image_37/37_Bossay_Claise_2.jpg","../../jctruffet.com/image/image_37/37_Bossay_Claise_3.jpg","../../jctruffet.com/image/image_37/37_Bossay_Claise_4.jpg","../../jctruffet.com/image/image_37/37_Bossay_Claise_5.jpg","../../jctruffet.com/image/image_37/37_Bossay_Claise_6.jpg","../../jctruffet.com/image/image_37/37_Bossay_Claise_7.jpg"]},"Consult_chateau_formulairec6ec":{"id":"Consult_chateau_formulairec6ec","dept":"37","canton":"Montlouis-sur-Loire","commune":"Montlouis-sur-Loire","nom":"Bourdaissière","type":"Forteresse","periode":"XIV","histoire":"BOURDAISSIERE, dès le milieu du XIVe siècle le sous gouverneur de Touraine, le maréchal Jean Ier le Meingre,  une tour d'angle ainsi qu'un escalier à colimaçon descendant dans les douves au sud-est de la terrasse. Cette forteresse fût transmise par héritage pendant plusieurs générations jusqu'à sa première vente le 4 mai 1482, était achetée par Louis de La Mézière. Le mariage de Marie Gaudin héritière  et de Philibert Babou  reçut de François Ier de multiples charges et honneurs qui lui permirent d'asseoir sa fortune et de réaliser vers 1518, la reconstruction de la forteresse en une demeure campagnarde. Au décès de Marie Gaudin, veuve de Philibert Babou 14 ans plus tôt, le château revint à leur fils aîné Jean II, grand maître de l'artillerie du Royaume, ministre de la défense. Vers 1567, la tour sud-est des remparts d'une caponnière munie de bouches à feu. En 1569, son fils aîné, Georges Ier Babou, comte de Sagonne, en hérita et accueillait en 1598, Henri IV et Gabrielle d'Estrées de retour de Bretagne où venait d'être signé l'édit de Nantes. Au début du XVIIe siècle, le nouveau propriétaire , le marquis Nicolas Gouffier de Crévecoeur, fit construire à l'emplacement de la basse cour médiévale les deux bâtiments en équerre constituant les écuries. En 1674, le château connaîtra plusieurs propriétaires successifs. En 1768, le duc de Luynes qui avait hérité, l'échangea avec le duc de Choiseul qui lui apportait la baronnie de Cinq Mars la Pile.  Le domaine vivait ses dernières heures, lorsque le duc de Choiseul fut exilé en son château de Chanteloup,","architecture":"BOURDAISSIERE, le château, propriété de la duchesse d'Orléans, Adélaïde de Bourbon Penthièvre, fut confisqué au nom de la République, vendu comme bien national en 1794 à Armand Dubernad, négociant en vins, qui à son arrivée réalisa la construction d'un nouveau château, adossé au sud du manoir Babou, de style massif, seulement décoré par un portique central à l'antique. En 1802, les héritiers de Dubernad vendaient le château au Baron Joseph Angelier qui allait mener à La Bourdaisière une vaste campagne de restauration. Sera vendu en 1923 à une Américaine, madame de Mérinville, qui embellit l'intérieur et l'extérieur. Acheté par un anglais en 1938, la demeure sera occupée par les allemands, puis hébergera à la libération une école militaire. Rendu à ses propriétaires, le château fût ensuite laissé à l'abandon. En 1959, après la vente aux enchères de l'ensemble des meubles, il fut vendu à la commune de Montlouis qui y installa une maison de retraite, le château ne répondant plus aux normes de sécurité, il fut vendu en 1988 à maître François Michaud qui le céda le 2 septembre 1991 aux princes Louis Albert et Philippe Maurice de Broglie. En 2008, le prince Louis Albert de Broglie rachète les parts de son frère et devient le seul propriétaire du château de la Bourdaissière.                                         THUISSEAU du XIXe siècle style néo-Renaissance le corps de logis encadré par deux ailes dissymétriques avec deux étages de fenêtre dans le toit pour celle de l'ouest. Aujourd'hui chambre d'hôtes","habitants":"marquis Nicolas Gouffier de Crévecoeur,                                     Maître François Michaud \r\n        \"","divers":"a Montlouis-sur-Loire, le château de Thuisseau grav 8, la Bourdaissière grav 1 à 6      47° 22' 11,28\" Nord, 0° 50' 18,96\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Bourdaissi%c3%a8re_1.jpg","../../jctruffet.com/image/image_37/37_Bourdaissi%c3%a8re_2.jpg","../../jctruffet.com/image/image_37/37_Bourdaissi%c3%a8re_3.jpg","../../jctruffet.com/image/image_37/37_Bourdaissi%c3%a8re_4.jpg","../../jctruffet.com/image/image_37/37_Bourdaissi%c3%a8re_5.jpg","../../jctruffet.com/image/image_37/37_Bourdaissi%c3%a8re_6.jpg"]},"Consult_chateau_formulairee44f":{"id":"Consult_chateau_formulairee44f","dept":"37","canton":"Descartes","commune":"Preuilly sur Claise","nom":"Boussay_Menou","type":"Château","periode":"XV","histoire":"BOUSSAY, il fut fondé en 1024 par les barons de Preuilly, premiers barons de Touraine (quelques vestiges du château des barons de Preuilly subsistent encore sur les hauteurs qui dominent la petite ville de ce nom). Ce château énorme, que l'on disait inexpugnable, fut malgré tout pris par les anglais pendant la guerre de cent-ans et détruit. Un château fut construit sur son emplacement au XVIIe siècle. Isabelle de Preuilly l'apporta en dot au chevalier Péan, fils de Barthélémy Péan, chevaliers bannerets créés en 1213 par Philippe-Auguste pour la Touraine. En 1338, Jeanne Péan épousa Nicolas III de Menou, famille qui remonte au XIe siècle dont les membres, au cours des siècles suivants, occupèrent des charges importantes (ambassadeurs, conseillers, chambellans auprès des rois Saint Louis, Charles VI, Louis XI, Charles VIII et jusque sous le règne de Louis XIV), restera à Boussay jusqu'au XIXe siècle. Le dernier Menou n'ayant que des filles, par mariage, son aînée fera passer le domaine dans la famille des propriétaires actuels qui descendent, par les femmes, des premiers fondateurs de Boussay, il a d'abord appartenu à la famille de Payen, puis à la famille de Menou, enfin il est passé à la famille de Becdelièvre par alliance.","architecture":"BOUSSAY, château datant de 1024, entouré de douves en eau, composé d'une tour carrée du XVe siècle, d'une partie centrale du XVIIe et d'une aile orientale des XVII et XVIIIe siècle, le tout formant un ensemble original et harmonieux.\r\nInscrit aux M.H. pour ses toitures, ses façades, une partie de ses jardins, sa chapelle et ses salons, Boussay, c'est également un petit village préservé avec, en arrivant par le sud, une magnifique perspective sur les toitures du village, au XVIIe siècle, l'aile nord fut abattue et reconstruite en respectant une tour cylindrique qui contenait un escalier et une tour carrée couronnée d'un chemin de ronde avec mâchicoulis. A la même époque, l'aile méridionale et une partie de l'aile occidentale furent supprimées. Il ne subsiste que la grosse tour d'angle carrée avec son chemin de ronde et ses mâchicoulis décorés d'une arcature tréflée. Le pont-levis fut remplacé par un pont dormant. Au XVIIIe siècle, toute l'aile orientale fut abattue et remplacée par un grand corps de bâtiment. Un pavillon de même élévation le prolonge au sud. A l'est du château, une avant-cour est limitée par les communs, flanqués extérieurement de deux tours cylindriques.                                                                                        Manoir de THOU à cinq km au sud à Yzeure sur Creuse du XVIe siècle, encadrées de deux tours polygonales et d'une tour rectangulaire propriété de monsieur Delaire.","habitants":"Famille de Payen\r\n        \"","divers":"A Preuilly sur Claise château de Boussay    46° 50' 37\" nord, 0° 53' 18\" est,   et le manoir de la Thou grav-8    Boussay-Menou  46° 50' 36,96\" Nord et 0° 53' 17,88\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Boussay_Menou_1.jpg","../../jctruffet.com/image/image_37/37_Boussay_Menou_2.jpg","../../jctruffet.com/image/image_37/37_Boussay_Menou_3.jpg","../../jctruffet.com/image/image_37/37_Boussay_Menou_4.html","../../jctruffet.com/image/image_37/37_Boussay_Menou_5.jpg","../../jctruffet.com/image/image_37/37_Boussay_Menou_6.jpg","../../jctruffet.com/image/image_37/37_Boussay_Menou_7.jpg","../../jctruffet.com/image/image_37/37_Boussay_Menou_8.jpg"]},"Consult_chateau_formulairefb88":{"id":"Consult_chateau_formulairefb88","dept":"37","canton":"Loches","commune":"Chédigny","nom":"Breuil_37","type":"Château","periode":"XV","histoire":"Deux châteaux  à Chérigny le Breuil et l'Hubaudière.                 BREUIL, le château du Breuil, dont le nom d'origine est Breuil-Rochereaux, Il faisait partie de la seigneurerie Saint Michel. La partie ancienne de l'édifice remonte au XVe siècle , époque où le domaine était un fief relevant du château de Loches. le premier seigneur René de Razines. Au XVII possession de la famille Couraud, en 1715 passe à Pierre le Breton, à la mort du dernier des le Breton, en 1786  le domaine est cédé à  Jacque -Jean-Baptiste Odart seigneur de grand-Vaux  trois enfants avec Marie -Jeanne Gruault de Blangy,  Anne-Héléne  épouse en 1788 Joseph-Issac-Louis de Lestenou seigneurs de Boisferré   garde du corps du comte d'Artois, futur Charles X.                          A la fin du XIXe siècle le logis est repris et agrandi par son nouveau propriétaire, monsieur Beaussier, directeur de journal. Les travaux de construction commencent en 1885. Monsieur Beaussier, faisant faillite en 1889, vend la propriété à monsieur Alfred Dauprat, secrétaire de Ferdinand de Lesseps, qui acheva les aménagements intérieurs. Le château appartient aujourd'hui à madame Mc-Donald.","architecture":"BREUIL, le logis orienté nord-sud le corps de logis termine par deux pignons latéraux est élevé sur un rez-de-chaussée et un étage, comporte au centre une tourelle polygonale    percées de petites fenêtres rectangulaires qui renferme un escalier logé dans une cage circulaire. Le corps central est prolongé du côté nord par une aile basse, la façade d'arrivée montre des fenêtres à meneaux  de pierre,                                                                                                un pavillon rectangulaire et une grossse tour ronde couronnée de faux mâchicoulis et couvert d'un toit en poivirère sont alors ajoutés.\r\nHUBAUDIERE, le domaine de la Hubaudière appartient aux moines de la Chartreuse du Liget. Au XVIe les bâtiments sont composés d'une maison servant au logement des religieux. Vendue comme bien national pendant la Révolution, la propriété abrite de 1852 à 1880 la première école d'agriculture d'Indre et Loire. Elle accueille 33 élèves et les cours  par des professeurs venus de la célèbre école nationale de Grignon. Outre les champs, servant à l'étude des différentes cultrues, l'école possède un troupeau de 800 moutons et de 50 bovins.","habitants":"Famille de René de Razines\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Deux châteaux  à Chérigny le Breuil et l'Hubaudière.                                       Breuil 47° 36' 10\" Nord, 0° 28' 59\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Breuil_37_1.jpg","../../jctruffet.com/image/image_37/37_Breuil_37_2.jpg","../../jctruffet.com/image/image_37/37_Breuil_37_3.jpg","../../jctruffet.com/image/image_37/37_Breuil_37_4.jpg","../../jctruffet.com/image/image_37/37_Breuil_37_5.jpg"]},"Consult_chateau_formulairee9b2":{"id":"Consult_chateau_formulairee9b2","dept":"37","canton":"Loches","commune":"Bridoré","nom":"Bridoré","type":"Château","periode":"XIV","histoire":"BRIDORE, édifié sous Charles V par le maréchal de France Jean Ier Le Meingre dit Boucicaut maréchal de France, et par alliance à son fils, Jean II Le Meingre, dit Boucicaut également maréchal de France sous Charles VI et compagnon de Du Guesclin. Imbert de Bastarnay (1438-1523), conseiller du roi Louis XI, Chambellan à la cour Royale, achète Bridoré en 1475.  En 1641, Charles de Boursault, genthihomme de Louis XIII le marquis de Viantais achète Bridoré. Une de ses filles fonde, à Beaulieu-lès-Loches, le couvent des \"Viantaises\". La propriété de Bridoré leur appartient jusquà la Révolution. Vendu comme bien national à la Révolution au frères  Bodart pour en faire une exploitation agricole, il demeurera dans la même famille jusquà  aujourdhui. Classé M.H. En 1911, restauré par les peintres Simone Lefèvre-Mouveau et Pierre Mouveau, cest leur fille, Véronique Mouveau, qui assure la conservation et la restauration du site aujourd'hui.","architecture":"BRIDORE, la forteresse de Bridoré est édifiée au XIVe siècle, quadrilatère de 80 m sur 40 m haute de 90m,  en deux parties une haute cour réservée au seigneur et une basse cour affectées à la garnison et pour les services.  En 1475, Il met au point le prototype de défense enterrée, dont sinspirera Vauban, la caponnière. Il rehausse le donjon-porte qui atteint ainsi 30 mètres placé à cheval sur un fossé, haut de trois étages, l'édifice est flanqué aux angles de sa façade nord-Est par deux échauguettes et sur sa façade opposée, par une tour d'escalier. Ceinturé de fossés secs la haute cour jadis entourée de mur que couronnait un chemin de ronde, dresse vers l'extérieur des murs presque aveugles, auxquels s'adossent deux corps de logis disposés en équerre, l'accès à la basse cour, dont les angles extérieurs sont cantonnés de minces tourelles, s'effectue par une porterie défendue par un pont-levis  avec une entrée charetière  et une entrée pietonne et par une grosse tour couronnée de mâchicoulis et percée de meurtrières.","habitants":"Famille le Meingre\r\n        \"","divers":"Château de Bridoré à Bridoré47° 01' 29? nord, 1° 04' 54? est","gps":"","images":["../../jctruffet.com/image/image_37/37_Bridor%c3%a9_1.jpg","../../jctruffet.com/image/image_37/37_Bridor%c3%a9_2.jpg","../../jctruffet.com/image/image_37/37_Bridor%c3%a9_3.jpg","../../jctruffet.com/image/image_37/37_Bridor%c3%a9_4.jpg","../../jctruffet.com/image/image_37/37_Bridor%c3%a9_5.jpg","../../jctruffet.com/image/image_37/37_Bridor%c3%a9_6.jpg","../../jctruffet.com/image/image_37/37_Bridor%c3%a9_7.jpg"]},"Consult_chateau_formulaireb1e9":{"id":"Consult_chateau_formulaireb1e9","dept":"37","canton":"Ste-Maure de Touraine","commune":"Brizay","nom":"Brizay","type":"Château","periode":"XIV-XIX","histoire":"deux châteaux à Brizay la Commanderie et Haut Brizay. COMMANDERIE, édifice à rapprocher du château de Boizé sur la commune de Trogues, construit après 1832, et probablement vers 1840. Construite selon une division tripartite inspirée des villas palladiennes, la demeure possède un corps central de trois travées élevé de deux étages carrés. Deux ailes symétriques encadrent le corps central, placées dans le même alignement, elle ne possèdent qu'un seul étage carré. Un fronton triangulaire percé d'un oculus quadrilobé surmonte le deuxième étage du corps central. La construction est en pierre de taille, les toits sont couverts en ardoise, le linteau de la porte d'entrée possède un décor sculpté en moyen relief représentant des feuilles de vigne et des grappes de raisin.","architecture":"HAUT-BRIZAY, Arnauld de Brizay est le premier seigneur connu en 1050. La seigneurie de Brizay était un fief relevant de la châtellenie de L'Ile Bouchard. En 1440, Jean de Brizay est autorisé par le roi à fortifier son fief. On ignore à quoi pouvait ressembler le château médiéval. La façade sud remonterait au XVIIe siècle ; elle a été remaniée, ainsi que la façade nord à la fin du XIXe siècle. Un premier projet pour la façade nord est proposé par l'architecte Paul le Pladec en 1894, il n'est pas suivi d'effet. Un second projet proposé par l'architecte Thibaudin en 1895 prévoit la réalisation d'un pavillon de deux travées surmonté d'un clocheton. Ce projet fut réalisé. Le parc est réaménagé et un système d'adduction d'eau courante est installé. En 1825, le général comte de Sparre achète la propriété qui compte 200 ha et le cultive. Goussard de Mayolles, ingénieur agriculteur en fait une ferme expérimentale en 1865. Le château forme un L orienté est-ouest. Côté sud, une tour ronde, vestige de l'ancien château, est située à l'angle des deux ailes, cette tour est couverte d'un toit conique. L'aile orientée est-ouest est divisée en sept travées côté sud. Au nord un pavillon avec échauguette est surmonté d'un clocheton. Toit en ardoise à longs pans et croupes sur l'aile principale.","habitants":"le général comte de Sparre\r\n        \r\n        \r\n        \r\n        \"","divers":"deux châteaux à Brizay la commanderie et Haut Brizay.","gps":"","images":["../../jctruffet.com/image/image_37/37_Brizay_1.jpg","../../jctruffet.com/image/image_37/37_Brizay_2.jpg","../../jctruffet.com/image/image_37/37_Brizay_3.jpg"]},"Consult_chateau_formulairecb46":{"id":"Consult_chateau_formulairecb46","dept":"37","canton":"Ste Maure en Touraine","commune":"Noyant de Touraine","nom":"Brou_37","type":"Château","periode":"XV","histoire":"BROU, au XIIIe siècle fief de la famille de Chergé, en 1456 passe aux Gébert édifié en 1475 par les seigneurs de Sainte-Maure, en 1746 l'héritière  des Gébert Louise Madeleine  épouse à tours Antoine-Armand-Félix d'Abzac  marquis de Mayac, capitaine  du régiment de Penthièvre qui sera seigneur de Noyant et de Brou.  Brou passera après la Révolution à Antoinette d'Abzac, comtesse de Foucauld qui en 1813, cède le domaine à son beau-frère le vicomte de Foucauld colonel de gendarmerie, transmis ensuite à la marquise de Carbonière née de Foucauld, puis à monsieur Troncin et en 1866 acquis par Paul-Charles Victor comtes de Moges et son épouse née Alix de Menou ménage très fortuné, mette en oeuvre d'important travaux de rénovations. Au décès du comte de  Moges en 1903,  en 1906 le domaine revient à une de ses petites cousines mademoiselle Ida des Acres de l'Aigle avec l'aide de l'abbé Brault curé de Noyant et l'une de ses amies madame de Chezelles créer un orphelinat.  Au décès d'ida en 1966 le château est acquis en 1997 par la famille Girault-Fort. Brou abrite aujourd'hui à la famille Thiébaut, c'est devenu un hotel-restaurant de standing.","architecture":"BROU, la construction du château de Brou date de 1475, à proximité d'une ancienne forteresse dont subsiste une tour.  L'édifice se compose initialement d'un corps de bâtiment flanqué de tours et comportant sur la façade nord un avant-corps élevé sur trois étages  dans lequel s'encadre une porte surmontée d'une  accolade a crochets donnant accès à un escalier à vis , une aile orientale rajoutée en retour d'équerre terminée par une chapelle. Les façades traitée dans un style néogothique offrent une profusion de hauts pignons à crochets, de lucarnes très ornées et de tourelles en encorbellement. La volonté des nouveaux maitres de maison et des artisans de talent se liguent pour redonner au château son lustre dans le respect de l'art et de l'histoire, en le dotant du confort que l'hôtel du XXIe siècle appréciera lors d'une halte de charme.  Le château de Brou est classé aux M.H. depuis 1984.","habitants":"Antoinette d'Abzac, comtesse de Foucauld\r\n        \r\n        \"","divers":"A  Noyant de Touraine le château de Brou                                     Brou 48° 53' 16\" Nord et 2° 37' 58\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Brou_37_1.jpg","../../jctruffet.com/image/image_37/37_Brou_37_2.jpg","../../jctruffet.com/image/image_37/37_Brou_37_3.jpg","../../jctruffet.com/image/image_37/37_Brou_37_4.jpg","../../jctruffet.com/image/image_37/37_Brou_37_5.jpg"]},"Consult_chateau_formulaire6db5":{"id":"Consult_chateau_formulaire6db5","dept":"37","canton":"Ste Maure en Touraine","commune":"Parçay-sur-Vienne","nom":"Bréche","type":"Château","periode":"XSV","histoire":"BRECHE, était un fief relevant de l'Ile-Bouchard mentionné pour la première fois en 1475. En 1510-1511 Jean Prunier obtient l'autorisation de fortifier sa maison seigneuriale de La Brèche. Ce manoir a été très remaniée au XVIIe siècle. La tourelle d'angle a été reconstruite en 1913 mais le cul de lampe est d'origine. Au sud-ouest de ce bâtiment se dresse une grange datant également du XVIIe siècle . Le cadastre de 1832 montre, au nord de la demeure seigneuriale, un long corps de logis orienté nord-ouest sud-est. Il n'en subsiste rien. Entre 1844 et 1848 Jacques Louis de Fadate de Saint-Georges et son épouse font édifier à cet emplacement une nouvelle demeure. Il s'agissait au départ d'un relais de chasse qui a été agrandi par adjonction d'ailes latérales en 1913 sur les plans de l'architecte Hardion. C'est désormais cet édifice que l'on nomme couramment \"le château\". Les balustrades et les grilles en fer forgé proviennent du château de Vitry (Ile-de-France). Le chenil a été construit en même temps que le relais de chasse. Les écuries datent du XIXe siècle, la maison de gardien de la fin du XIXe siècle. Le château neuf a abrité le mobilier du premier préfet de police de Napoléon 1er, le comte Dubois, et provenait du château de Vitry. Ce mobilier était encore en place en 1978 mais a ensuite été vendu à des Belges.","architecture":"BRECHE, le relais de chasse  de plan rectangulaire à trois travée de percement sur chaque face, haut d'un seul étage carré et couvert d'un toit en pavillon à terrasse faîtière. Deux ailes en faible saillie ont été rajoutées latéralement. Les proportions des baies et leur décor se confondent parfaitement avec la construction initiale. L'unification de l'ensemble est achevée par l'adjonction d'un attique, alternant des parties pleines et des balustres, qui couronne tout l'édifice. Les ailes latérales sont couvertes d'un toit en terrasse. Les grilles des baies sont en fer et cuivre martelé soudé à chaud, sans rivetage. La demeure seigneuriale ou manoir, entourée de douves, est construite en pierre de taille (tufeau) de moyen appareil et possède un toit à deux pans et croupes couvert en ardoise interrompu par trois lucarnes à fronton triangulaire. Au rez-de-chaussée, une baie à meneau est surmontée d'un larmier à culots. Dans les douves, une ancienne tour circulaire en pierre de taille a été transformée en pigeonnier ; elle possède un épi de faîtage en céramique vernissée. Les écuries, la maison du gardien et le chais sont en moellons enduits avec les encadrements des baies et des portes en pierre de taille. Le toit est à longs pans et pignon découvert, la couverture en tuile plate.","habitants":"Bréche; Jean Prunier\r\n        \r\n        \r\n        \"","divers":"A Parcay sur Vienne le château de Bréche  grav -1-2-3 et","gps":"","images":["../../jctruffet.com/image/image_37/37_Br%c3%a9che_1.jpg","../../jctruffet.com/image/image_37/37_Br%c3%a9che_2.jpg","../../jctruffet.com/image/image_37/37_Br%c3%a9che_3.jpg"]},"Consult_chateau_formulaire7cf8":{"id":"Consult_chateau_formulaire7cf8","dept":"37","canton":"Ste Maure en Touraine","commune":"Anché","nom":"Brétignolles","type":"Château","periode":"XV","histoire":"BRETIGNOLLES, était la propriété de l'abbaye de Marmoutier et dépend du prieuré de Tavant. Au XIIIe siècle, c'est un fief important relevant de Sazilly, puis à partir de 1451 de Jaulnay. De 1447 à 1640, le fief appartient à la famille Bernard. En 1640, le château est acheté par Guillaume de Bordeaux, conseiller du roi. En 1706, le fief appartient à René Guillaume Martineau, sa fille Madeleine Françoise apporte Brétignolles et le bois de Veude, vers 1730, à son mari Michel Etienne Turgot. En 1811, le propriétaire est Pierre-Jean-René de Pierres de Fougeray. En 1932, les héritiers de la famille De Pierres vendent le château à Bernard de la Fosse, descendant d'une des nombreuses branches de la famille Bernard. Dans le parc, une tour transformée en pigeonnier, constitue le dernier élément visible qui reste des fortifications du XIVe siècle.","architecture":"BRETIGNOLLES,  a été construit entre 1498 et 1501, avec le pavillon de plan carré au sud-est. Ce dernier est accosté d'une tourelle trapézoïdale postérieure au reste du bâtiment, mais dont l'existence est déjà attestée au XVIIIe siècle.  La maison du gardien, à l' entrée du parc, a été élevée en 1848. Une éolienne a été installée dans le parc dans le dernier quart du XIXe siècle. La propriété est close au nord par un long mur en pierre sur lequel se dresse une élégante tourelle du XVIe siècle à l'angle nord-est. Le logis, de plan rectangulaire, est cantonné de quatre tours dissemblables : au nord-est, une tour polygonale hors oeuvre qui abrite un escalier ç vis ; au nord-ouest une tour en fer à cheval à toit conique ; au sud-est un pavillon rectangulaire coiffé d'un toit à quatre pans ; au sud-ouest une tour circulaire à toit conique. La façade nord du logis comprend deux travées constituées chacune de trois fenêtres à meneaux surmontées d'une lucarne. Les baies sont surmontées de larmiers à retour ornés de culots. Ce décor est incomplet, plusieurs baies étant simplement pourvues de pierres d'attente. La façade nord et les trois tours sont en pierre de taille. La façade à l'est ainsi que le pavillon au sud-est sont en moellons avec chaîne d'angle. La façade sud est en moellons enduits. Une construction trapézoïdale s'insère dans l'angle formé par le pavillon et le mur sud du corps de logis. Dans le parc, à l'est, une tour cylindrique en moellons soutenue par trois contreforts est percée de quatre archères dans sa partie inférieure tandis que la partie supérieure à été aménagée en pigeonnier.","habitants":"Famille de Michel Etienne Turgot\r\n        \"","divers":"Château de Brétignolles à Anché  47° 07' 55\" nord, 0° 19' 12\" est","gps":"","images":["../../jctruffet.com/image/image_37/37_Br%c3%a9tignolles_1.jpg","../../jctruffet.com/image/image_37/37_Br%c3%a9tignolles_2.jpg","../../jctruffet.com/image/image_37/37_Br%c3%a9tignolles_3.jpg"]},"Consult_chateau_formulaireb620":{"id":"Consult_chateau_formulaireb620","dept":"37","canton":"Chinon","commune":"Candes Saint-Martin","nom":"Candès_Chat_Neuf","type":"Château","periode":"XVIII","histoire":"CHÂTEAU-NEUF,  château construit vers 1682 pour l'archevêque de Tours, Monseigneur Amelot de Gournay, figure sur le dessin de Gaignières en 1699. Démoli un siècle plus tard par Cailleau, maire d'Angers et architecte, reconstruit par Cailleau à la fin du XVIIIe siècle ; lambris du XVIIIe siècle provenant de la Trochoire à Couziers remontés dans le salon du rez de chaussée ; villa gallo-romaine dans le parc ; tour de l'enceinte de ville néo-gothique. Au XIXe siècle, le châtelain décide de transformer le château. Seuls les communs du XVIIe siècle vont être conservés en létat. A l'intérieur du nouveau logis certaines pièces présentent un grand intérêt, en effet au rez de chaussée, dans l'angle nord et le salon possède des boiseries et une cheminée en marbre du XVIIIe siècle et dans la salle à manger qui occupe la partie centrale se trouve un poële en faïence blanche, inhabituel dans cette région.","architecture":"Le château Vieux des archevêques de Tours (2) est construit du XVe au XVIIe siècle en remplacement d'un château fort disparu. Inscrit au titre des monuments historiques en 1971, il est jusqu'à la fin du XVIIe siècle une résidence estivale des archevêques de Tours ; sans être démoli, il est alors remplacé par un nouveau château.                                                                                           CHATEAUNEUF ou nouveau logis, inscrit au titre des M.H. en 1977, remplace après la Révolution française un second château construit à partir de 1682 et qui remplit la même fonction de résidence épiscopale. Un portail en plein cintre surmonté de mâchicoulis donne accès à sa cour et un avant-corps en arc de cercle de sa façade nord s'avance sur la terrasse.                                                                                                 PREVOTE, hôtel, des XVe et XVIe siècles, inscrit au titre des M.H. en 1951 pour ses façades et toitures, était le siège du tribunal local jusqu'au XVIIIe siècle sous la présidence de l'un des chanoines, élevé au rang de prévôt. Une tourelle d'escalier accompagne sa façade nord.","habitants":"Famille Cailleau \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Châteaux vieux 47° 12' 42\" nord, 0° 04' 27\" est","gps":"","images":["../../jctruffet.com/image/image_37/37_Cand%c3%a8s_Chat_Neuf_1.html","../../jctruffet.com/image/image_37/37_Cand%c3%a8s_Chat_Neuf_2.html"]},"Consult_chateau_formulairee42e":{"id":"Consult_chateau_formulairee42e","dept":"37","canton":"Chinon","commune":"Candes Saint-Martin","nom":"Candès_St_Martin","type":"Château","periode":"XVIII","histoire":"CHÂTEAU-NEUF,  château construit vers 1682 pour l'archevêque de Tours, Monseigneur Amelot de Gournay, figure sur le dessin de Gaignières en 1699. Démoli un siècle plus tard par Cailleau, maire d'Angers et architecte, reconstruit par Cailleau à la fin du XVIIIe siècle ; lambris du XVIIIe siècle provenant de la Trochoire à Couziers remontés dans le salon du rez de chaussée ; villa gallo-romaine dans le parc ; tour de l'enceinte de ville néo-gothique. Au XIXe siècle, le châtelain décide de transformer le château. Seuls les communs du XVIIe siècle vont être conservés en létat. A l'intérieur du nouveau logis certaines pièces présentent un grand intérêt, en effet au rez de chaussée, dans l'angle nord et le salon possède des boiseries et une cheminée en marbre du XVIIIe siècle et dans la salle à manger qui occupe la partie centrale se trouve un poële en faïence blanche, inhabituel dans cette région.","architecture":"Le château Vieux des archevêques de Tours (2) est construit du XVe au XVIIe siècle en remplacement d'un château fort disparu. Inscrit au titre des monuments historiques en 1971, il est jusqu'à la fin du XVIIe siècle une résidence estivale des archevêques de Tours ; sans être démoli, il est alors remplacé par un nouveau château.                                                                                           CHATEAUNEUF ou nouveau logis, inscrit au titre des M.H. en 1977, remplace après la Révolution française un second château construit à partir de 1682 et qui remplit la même fonction de résidence épiscopale. Un portail en plein cintre surmonté de mâchicoulis donne accès à sa cour et un avant-corps en arc de cercle de sa façade nord s'avance sur la terrasse.                                                                                                 PREVOTE, hôtel, des XVe et XVIe siècles, inscrit au titre des M.H. en 1951 pour ses façades et toitures, était le siège du tribunal local jusqu'au XVIIIe siècle sous la présidence de l'un des chanoines, élevé au rang de prévôt. Une tourelle d'escalier accompagne sa façade nord.","habitants":"Famille Cailleau \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Châteaux vieux grav 3-4 47° 12' 42\" nord, 0° 04' 27\" est, Château Neuf 47° 12' 40\" nord, 0° 04' 19\" est grav-1-2","gps":"","images":["../../jctruffet.com/image/image_37/37_Cand%c3%a8s_St_Martin_1.jpg","../../jctruffet.com/image/image_37/37_Cand%c3%a8s_St_Martin_2.jpg","../../jctruffet.com/image/image_37/37_Cand%c3%a8s_St_Martin_3.jpg","../../jctruffet.com/image/image_37/37_Cand%c3%a8s_St_Martin_4.jpg","../../jctruffet.com/image/image_37/37_Cand%c3%a8s_St_Martin_5.jpg"]},"Consult_chateau_formulaire55a3":{"id":"Consult_chateau_formulaire55a3","dept":"37","canton":"Monts","commune":"Monts","nom":"Candé_Monts","type":"Château","periode":"XVI","histoire":"Trois châteaux à Monts, Candé,  Breuil et Beaulieu (voir article).                                                                                                                      CANDE, au tout début du XVIe siècle, le cardinal François Briçonnet, maître de la chambre aux deniers du roi, fait construire un luxueux pavillon de plaisance de style Renaissance. Appartient ensuite pendant cent cinquante ans à la famille Brodeau, jusqu'en 1715 passa ensuite à la famille de Fleury et en 1853  à Santiago Drake del Castillo, aristocrate anglo-espagnol, dorigine cubaine, entreprend une nouvelle métamorphose de la demeure selon les plans de Jacques-Aimé Meffre, architecte tourangeau réputé. La superficie du château se trouve dès lors triplée, dans le style néo-gothique très en vogue. Au XXe siècle, Charles Bedaux, milliardaire franco-américain, dote le château déquipements ultra-modernes et y introduit une touche de style années trente en faisant décorer toutes les salles de bain de mosaïques de pâte de verre. L'agencement de certaines pièces est conçu par l'architecte Henri Lafargue. A la mort de Charles Bedeaux , en 1951, la veuve en fait don à la présidence de la République qui le cède au conseil général d'Indre et Loire en 1974. Le 3 juin 1937, le duc de Windsor y épouse Wallis Simpson pour laquelle il vient de renoncer au trône.                                                                     BREUIL, est un château bâti à Monts, est privé.","architecture":"CANDE, au tout début du XVIe siècle, à la place de la forteresse médiévale primitive, Le pavillon construit par François Briçonnet est une bâtisse sur plan carré comportant une douzaine de pièces, pourvue au milieu de sa façade orientale d'une tourelle pentagonale permettant l'accès aux étages. Dans sa partie supérieure, le plan de cette tourelle change pour devenir carré. Les murs sont très épais et les fenêtres sont pourvues de meneaux qui les divisent en quatre. La pierre de taille domine dans l'appareil, la brique n'étant présente que dans la maçonnerie des cheminées et la décoration des lucarnes qui éclairent les combles sur les deux façades principales. Le rez-de-chaussée, qui abrite les pièces de réception et d'apparat, est surélevé.  La première phase d'agrandissement du château, réalisée sous la conduite de Santiago Drake del Castillo en 1854-1855, consiste en la construction de deux tours rondes pourvues à leur sommet de créneaux fantaisie. Ces tours semblables, dans le style troubadour et dans la forme, à celles édifiées à la même époque au château de Beauvais, à Azay-sur-Cher, sont reliées à leur base par une terrasse de plain-pied avec le rez-de-chaussée, et fermée par une balustrade. Côté Est, un vestibule pentagonal est accolé à la façade au sud de la tour d'escalier et donne directement dans le salon.","habitants":"Famille de François Briçonnet,\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"châteaux à Monts, Candé  et Breuil.                                            Breuil: 47° 16' 41\" Nord 0° 37' 31\" Est                                                     Cande : 47° 17' 49\" Nord et 0° 39' 56\" Est                                   Saulé grav-5","gps":"","images":["../../jctruffet.com/image/image_37/37_Cand%c3%a9_Monts_1.jpg","../../jctruffet.com/image/image_37/37_Cand%c3%a9_Monts_2.jpg","../../jctruffet.com/image/image_37/37_Cand%c3%a9_Monts_3.jpg","../../jctruffet.com/image/image_37/37_Cand%c3%a9_Monts_4.jpg","../../jctruffet.com/image/image_37/37_Cand%c3%a9_Monts_5.jpg"]},"Consult_chateau_formulaire00e7":{"id":"Consult_chateau_formulaire00e7","dept":"37","canton":"St-Pierre des Corps","commune":"St-Avertin","nom":"Cangé","type":"Château","periode":"XIII-XVI","histoire":"CANGE, la construction du château de Cangé date du XIIIe siècle, pour la famille d'Andigné. Il se situe au sein d'un parc de 15 hectares sur le coteau à l'est de la ville, et domine ainsi la vallée du Cher. Plusieurs dynasties de renom ont occupé le château. Durant  la seconde guerre mondiale, le château de Cangé fut réquisitionné pendant 5 jours, par le président Albert Lebrun, ainsi que par les services de la présidence de la République. Deux conseils des ministres s'y déroulèrent les 12 et 13 juin 1940. Après la guerre, son propriétaire le laissa à l'abandon. Un incendie le ravage dans la nuit du 20 au 21 juin 1978. La propriété fut finalement rachetée par la commune de Saint-Avertin en 1980. Plusieurs dynasties de renom occupèrent successivement le château : les d'Andigné (1200-1400) ; les Montmorin (1400-1489) ;les Coningham (1489-1679) ;  Antoine Girollet (1746-1766) ; les Plessis de Grenédan (1804-1810) ; les Viot (1818-1832) ;  les Panon Desbassayns de Richemont (1832-1856) ;   Maurice Cottier (1856-1904) ;  les Pourtalès (1904-1944). Gilbert Imbert de Chastres, maire de Tours, occupa le château, ainsi que cinq maires de Saint-Avertin : Louis-Joseph du Plessis-Mauron de Grenédan, Edmond Viot-Prudhomme, le baron Paul de Richemont, Maurice Cottier  et le comte Paul de Pourtalès. aujourd'hui propriété de M. jean Guillay.","architecture":"CANGE, après deux ans de rénovation, le château a été réhabilité en une médiathèque moderne tout en respectant l'architecture de plan en équerre à deux  niveaux. flanqué de tours rondes et polygonale hors oeuvre et échauguettes en encorbellement toit en poivrière, avec lucarnes sur combles. Les dépendances ainsi que le vaste parc du château accueillent régulièrement le centre de loisirs de la ville, l'école municipale de musique ainsi que de nombreuses associations.","habitants":"Famille d'Andigné\r\n        \"","divers":"Château de Cangé à St- Avertin                                                       Cange  47° 22' 03\" Nord 0° 43' 40\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Cang%c3%a9_1.jpg","../../jctruffet.com/image/image_37/37_Cang%c3%a9_2.jpg","../../jctruffet.com/image/image_37/37_Cang%c3%a9_3.jpg","../../jctruffet.com/image/image_37/37_Cang%c3%a9_4.jpg","../../jctruffet.com/image/image_37/37_Cang%c3%a9_5.jpg","../../jctruffet.com/image/image_37/37_Cang%c3%a9_6.jpg"]},"Consult_chateau_formulaire92d6":{"id":"Consult_chateau_formulaire92d6","dept":"37","canton":"Descartes","commune":"La Celle-Guenard","nom":"Celle_Guenard","type":"Forteresse","periode":"XVI","histoire":"CELLE-GUENAND,  le château peut-être l'oeuvre d'Antoine de Guenand, premier seigneur connu par un acte de 1422 ; il est bâti sur plan en U, cantonné de quatre tours rondes, fortifié d'une tour carrée à pont-levis et entouré de douves ; sous la plate forme du château est creusé un souterrain refuge ; dans une seconde campagne qui pourrait dater du troisième quart du XVe siècle, on construit le châtelet d'entrée, les communs le jouxtant, le pigeonnier ; une tour d'escalier polygonale et une galerie joignant le châtelet à l'ancien logis ; en 1792 (date portée), on aménage un escalier à  vis dans la tour carrée après avoir supprimé le pont-levis ; la destruction de l'aile Nord-Est peut dater du XVIIe siècle, ainsi que la construction des caves de la contrescarpe ; une chapelle mentionnée en 1781 est désaffectée au XVIIIe siècle et le châtelet est aménagé en écurie en 1787 ; au XIXe siècle, après 1812  deux communs sont détruits ; on e bâtit d'autres, un portail, une fontaine ; dans le parc sont construites deux serres à la fin du XIXe ou au début du XXe siècle ; l'une est en ruine, l'autre est couverte d'une charpente métallique portant le nom du fabricant \"Charpentier Frères Orléans\".","architecture":"CELLE-GUENAND; la galerie est couverte en bardeaux en 1476, les salles du rez-de-chaussée semi-enterré du logis précédant le souterrain refuge sont voûtées en berceau brisé et en berceau plein-cintre, le porche du châtelet d'entrée est en berceau plein-cintre, les toits du logis sont à longs pans et croupe, le toit du châtelet d'entrée est en pavillon,  les toits de la galerie et des communs sont à longs pans et pignon couvert,  le pigeonnier et la tour d'escalier du châtelet d'entrée sont couverts d'un toit polygonal,  la tour d'escalier polygonale est couverte en terrasse,  l'escalier primitif du logis est dans-oeuvre, droit et en maçonnerie,  l'escalier de la tour carrée est dans-oeuvre, en vis sans jour et en maçonnerie,  l'escalier de la tour polygonale du châtelet d'entrée est hors-oeuvre, celui du commun du XVe siècle est demi hors-oeuvre, tournant et en maçonnerie, les tourelles ajoutées au XIXe siècle au châtelet d'entrée, à la galerie et aux nouveaux communs abritent des escaliers hors-oeuvre, en vis avec jour et en charpente.","habitants":"Antoine de Guenand\r\n        \r\n        \r\n        \r\n        \"","divers":"Forteresse à la Celle-Guénand : 46° 56' 41\" Nord et 0° 53' 36\" Est   Vestiges Celles-D 46° 56' 41\" Nord, 0° 53' 41\" Est Raon grav 6","gps":"","images":["../../jctruffet.com/image/image_37/37_Celle_Guenand_1.jpg","../../jctruffet.com/image/image_37/37_Celle_Guenand_2.jpg","../../jctruffet.com/image/image_37/37_Celle_Guenand_3.jpg","../../jctruffet.com/image/image_37/37_Celle_Guenand_4.jpg","../../jctruffet.com/image/image_37/37_Celle_Guenand_5.jpg"]},"Consult_chateau_formulaire31f9":{"id":"Consult_chateau_formulaire31f9","dept":"37","canton":"Château Renault","commune":"Cerelles","nom":"Cerelles","type":"Château","periode":"XVI-XX","histoire":"A Cerelles  trois  châteaux : Baudry, la Bédouère et la Chesnaye(voir article suivant)                                                                                                          BAUDRY, a été construit au XVIe siècle (logis brique et pierre et deux pavillons) sur les substructions d'un château féodal. Il a été remanié en 1640 avec ajout de deux tours carrées, puis construction d'une aile en 1900. En 1529, le fief de Baudry appartenait à Guillaume Bohier, maire de Tours. Un beau parc s'organise autour du château. Après ce court intermède se succèdent à Baudry cinq générations de Reille. Le comte Honoré Charles Reille de 1775 à 1860  général de division, l'achète à son beau-frère François Victor Masséna en 1828. l'aile orientale du château est complètement reconstruite, une tour cylindrique ajoutée dans l'angle rentrant de la cour, les terrasses sud et nord refaites et beaucoup de baies transformées en porte-fenêtres. Le château, qui fait l'objet d'une mesure de classement indépendante, domine un parc arboré  bordé au nord et à l'ouest par un réseau de pièces d'eau et canaux, élargi au XIXe siècle, le canal des deux cascades, bordé de sycomores, qui longe la vallée de la Choisille, un étang aménagé plus récemment vers 1956/57 À proximité du château, les communs comprennent: une ancienne ferme.","architecture":"BEDOIRE; BEDOUERE, est une châtellenie dont le propriétaire est patron fondateur de l'église de Cerelles, y jouissant de droits honorifiques et exerçant le droit de haute justice dans le bourg. Ces privilèges lui sont contestés par l'abbaye de Saint-Julien, un long procès les oppose, il se termine en 1688 par une sentence arbitrale qui reconnait que l'église, le presbytère et la justice du bourg sont bien dans le fief de la Bédouère. Vers 1849, le propriétaire  est Eugène Flandrin, grand bourgeois, artiste peintre, archéologue et maire de Cerelles. Au début du XXe siècle, le domaine passa à Edmont de Poncins. Le château actuel a été reconstruit au XXe siècle. Il ne reste de l'ancienne demeure que peu de vestiges; une porte fortifiée à mâchicoulis, des douves et deux tourelles d'enceinte rondes. La Bédoire fut à un réformé, Marin Piballeau. En 1562, avec une troupe de protestants il gagna le couvent des Minimes du Plessis à Tours. Il tua un religieux, en blessa d'autres, saccagea le jardin, l'église, le cloître, et sur l'ordre de ce seigneur de la Bédouère, le corps de Saint François de Paule fut brûlé. Peu après, Marin Piballeau fut jugé puis condamné par le duc de Montpensier.","habitants":"Baudry; famille de Guillaume Bohier        Bedoire; Eugène Flandrin\r\n        \r\n        \"","divers":"A Cerelles trois châteaux, Baudry grav-1-2, la Bédouère grav-3-4-5","gps":"","images":["../../jctruffet.com/image/image_37/37_C%c3%a9relles_1.jpg","../../jctruffet.com/image/image_37/37_C%c3%a9relles_2.jpg","../../jctruffet.com/image/image_37/37_C%c3%a9relles_3.jpg","../../jctruffet.com/image/image_37/37_C%c3%a9relles_4.jpg","../../jctruffet.com/image/image_37/37_C%c3%a9relles_5.jpg"]},"Consult_chateau_formulaire9ba7-2":{"id":"Consult_chateau_formulaire9ba7-2","dept":"37","canton":"Langeais","commune":"Cléré-les-Pins","nom":"Champchevrier","type":"Château","periode":"XVI-XVIII","histoire":"CHAMPCHEVRIER  a été construit au Moyen-Age et  connue dès 1109 comme lieu fortifié,  en 1253 comme maison forte habité par la même famille de Maillé, par héritage à la famille Laval en 1528 à la famille Daillon par alliance, en 1552 à la famille de Bastarnay,  puis à la famille de Roquelaure  Gaston duc de Roquelaure maréchal de France époux de Charlotte-Marie de Daillon qui fait édifié  l'aile classique , depuis 1728, héritière de Jean-Baptiste Pierre Henry de la Ruë du Can, qui fut Baron de Champchevrier, en 1741, avec un passé royal.  Le roi Louis XIII y résida quelques jours en 1619. Plus tard, sur la façade nord-est, fut rajouté un bâtiment du XVIIIe siècle, ainsi la construction de la terrasse. Le domaine a été classé aux M.H en 1945 puis le château de Champchevrier a été classé, aux M.H. avec ses communs et son parc, en 1975. Les propriétaires actuels du château de Champchevrier sont Mr et Mme Pierre Bizard.","architecture":"CHAMPCHEVRIER, l'édifice date du XVIe au XVIIIe siècle, de style Renaissance. Au XVIe siècle, elle est remplacée par un château construit dans le style fin Renaissance, dont on distingue encore aujourd'hui les fenêtres à meneaux et dominé par une haute tour hexagonale renfermant l'escalier. Au XVIIIe siècle, la tour qui s'élevait dans l'axe de la façade principale a été abattue et les lucarnes furent remplacées par des oeil-de-boeufs. Aux fenêtres, des croisées à petits carreaux succédèrent aux croisillons de pierre. A l'ouest furent ajoutés deux bâtiments de deux étages, couverts en terrasse, et l'ancien petit pavillon nord-ouest devint un escalier où furent mises des boiseries provenant du château de Richelieu. Au début du XXe siècle, la façade sur jardins est restaurée, les lucarnes et la corniche furent restituées. A l'intérieur, le château a conservé un mobilier des XVIIe et XVIIIe siècles. Dans le pavillon en saillie à l'ouest, au deuxième étage, une pièce comprend des lambris à compartiments peints de bouquets de fleurs, de petits personnages et de vues du château s'harmonisant avec un plafond décoré dans le même esprit.  Des douves, creusées au XVIIe siècle par le régiment du Duc de Roquelaure, encadrent le domaine. Au XVIIIe siècle, fut aménagée, le long de la façade principale, une grande terrasse bordée de balustrades. Les communs comprennent une fuye et des bâtiments du XVIIIe siècle.","habitants":"famille de Bastarnay\r\n        \"","divers":"château de Champchevrier à Cléré les Pins.  Champchevrier : 47° 26' 39\" Nord et 0° 23' 24\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Champchevrier_1.jpg","../../jctruffet.com/image/image_37/37_Champchevrier_2.jpg","../../jctruffet.com/image/image_37/37_Champchevrier_3.jpg","../../jctruffet.com/image/image_37/37_Champchevrier_4.jpg"]},"Consult_chateau_formulaireab20":{"id":"Consult_chateau_formulaireab20","dept":"37","canton":"Ste Maure en Touraine","commune":"Champigny-sur-Veude","nom":"Champigny_veude","type":"Forteresse","periode":"XV-XVI","histoire":"deux châteaux à Champigny, celui de Champigny et de Pataudière.                                                                                                               CHAMPIGNY sur VEUDE ;  en 1470- 1508 Il fut commencé par Louis Ier de Bourbon et achevé par Louis II, premier duc de Montpensier. En 1625, Marie de Bourbon l'apporte en dot à Gaston d'Orléans. En 1635 le duc d'Orléans est invité par le cardinal à échanger Champigny pour la seigneurie de Bois-le-Vicomte, le contrat stipule qu'il sera détruit à la réserve des servitudes. Seule la chapelle échappe à la destruction, le pape Urbain VIII qui y a officié, refusant son autorisation. En 1656, sa restitution est obtenue par la fille Anne-Marie d'Orléans dit la grande mademoiselle fille  de Gaston d'Orléans. Des réparations sont réalisées sur les communs utilisés comme habitation principale. Ceux-ci, avec quelques murs d'enceinte, sont les seuls restes du château bâti par Louis de Bourbon. Ce sont trois corps de logis en équerre entourant l'ancienne basse-cour. Celui du centre présente deux étages avec, en son milieu, un pavillon surélevé et en saillie et à chaque extrémité, deux tours d'angle circulaires couvertes d'un toit en coupole, surmonté d'un lanternon. La chapelle fut achevée en 1540. J. Guillaume date le porche de 1549 date inscrite à l'intérieur du porche et non de 1570, il serait donc contemporain des bâtiments subsistants de l'avant-cour (datés de 1545 par une clef de voûte des écuries). Les vitraux de la chapelle sont un témoignage exceptionnel de l'art du vitrail du XVIe siècle. En 1980 le château appartenait à Bryan Wallace en 1980 à une société japonaise.","architecture":"PATAUDIERE, le premier seigneur connu est Étienne Fergon, mort en 1574, secrétaire de Louis III de Bourbon, duc de Montpensier, Il avait épousé Perrine Martine Ferrand, fille dAlexandre Ferrand, intendant de Louis de Bourbon. Leur fils Martin Fergon épousa Esther du Bec, fille de Marc du Bec, seigneur de Courcoué, et, à la mort de leur mère, en 1587, donna la Pataudière à sa sur Suzanne, qui, en 1601, vendit la seigneurie à René de Lomeron, conseiller et secrétaire du roi, décéda le 5 janvier 1629 et fut inhumé dans léglise. Du château, les éléments protégés  sont : les façades et toitures , à l'exception de la partie rajoutée au XIXe siècle, la cour d'honneur, la clôture et ses deux tourelles d'angle, inscrits aux M.H. le 13 novembre 1997. Le parc a été transformé en jardin zoologique au début du 20e siècle. Le château  a été racheté par des américains, qui l'entretiennent. A une époque, le château a appartenu à une société japonaise qui avait voulu les démonter pour les emmener au Japon! il appartenait à André Bazin et que Marc Honoré d'Estienne d'Orves était son conservateur, le couple de régisseurs Christiane et Thierry Millet qui vivent au château. propriétaires: Bernard et Joan Carl passent actuellement quelques jours à Champigny. Le couple américain, qui a acquis le château en 2000,","habitants":"La Grande Mademoiselle\r\n        \"","divers":"deux châteaux à Champigny, celui de Champigny   47° 04' 05? nord, 0° 19' 05? est                           et de Pataudière grav-7.    47° 4' 4,44\" Nord, 0° 19' 5,16\" Est grav 1 à 5","gps":"","images":["../../jctruffet.com/image/image_37/37_Champigny_veude_1.jpg","../../jctruffet.com/image/image_37/37_Champigny_veude_2.jpg","../../jctruffet.com/image/image_37/37_Champigny_veude_3.jpg","../../jctruffet.com/image/image_37/37_Champigny_veude_4.jpg","../../jctruffet.com/image/image_37/37_Champigny_veude_5.jpg","../../jctruffet.com/image/image_37/37_Champigny_veude_6.jpg","../../jctruffet.com/image/image_37/37_Champigny_veude_7.jpg"]},"Consult_chateau_formulaire3fe9":{"id":"Consult_chateau_formulaire3fe9","dept":"37","canton":"Amboise","commune":"Amboise","nom":"Chanteloup_37","type":"Pagode","periode":"XVIII","histoire":"CHANTELOUP, en 1760 le château, habité pendant près de 25 ans par le duc de Choiseul, a joui à cette époque d'une grande réputation. La beauté des jardins et des eaux firent de l'endroit un autre Versailles. En 1785 à la mort du duc de Choiseul le domaine vendu au enchères en 1798 à un officier Barbier-Buffey qui saccagea le domaine. Puis acquis par le duc de Penthiève. Le comte de Chaptal reprit la possession de Chanteloup après la Révolution, et il fut le dernier propriétaire. Victime d'une crise financière, il ne put le garder, Chanteloup fut vendu à un marchand de biens en 1823, et fut dépecé et démoli à tel point qu'à l'endroit où il fut, il ne reste aucune trace de cette résidence qui, pendant plus d'un siècle éblouit tous ses contemporains. Seuls la Pagode, la pièce d'eau et l'ensemble forestier acquis par le duc d'Orléans échappèrent au désastre. la Pagode édifiée en 1775 par Camus de Mézière  pour le duc de Choiseul, ministre du roi Louis XV, la Pagode de Chanteloup est un rare exemplaire, à peu près intact, des Folies à la mode à la fin du XVIIIe siècle. Monument insolite, de pur style Louis XVI, la Pagode est entourée d'une pièce d'eau en demi lune dans un parc de 14 hectares, restaurée en 1910, à son sommet, on jouît d'une vue lointaine, elle servait au temps de Choiseul de belvédère pour les chasses.","architecture":"CHANTELOUP Éléments protégés MH : les anciens jardins de Chanteloup : parties comprenant des parties architecturées parties non classées du pavillon d'entrée est de la grille dorée ; partie centrale de l'ancienne maison du jardinier-chef : inscription par arrêté du 11 juillet 1994.  Le site en terrasse de la pagode (à l'exception des parties classées), comprenant : les allées de Saint-Gatien et de la Ménaudière ; une partie du parc boisé entourant l'ancien grand canal, limitée au sud par les allées convergentes de Chandon et de Coulaine, à l'ouest et à l'est par l'allée de Dierre et la départementale : inscription par arrêté du 30 mai 1994. La pagode, sa chaussée avec les grilles, les balustrades, le mur de soutènement et le pavillon dit du Concierge ; le bassin en demi-lune, le grand canal, l'allée qui les borde et les alignements d'arbres le long du canal ; les façades et les toitures du pavillon d'entrée et dit de la Grille dorée ; les douves et leur mur de soutènement : classement par arrêté du 26 février 1996.","habitants":"Famille du duc de Choiseul\r\n        \"","divers":"La pagode de Chanteloup     47° 23' 28\" Nord et 0° 58' 13\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Chanteloup_37_1.jpg"]},"Consult_chateau_formulairebec1":{"id":"Consult_chateau_formulairebec1","dept":"37","canton":"Ste Maure en Touraine","commune":"Razines","nom":"Chargé","type":"Château","periode":"XIV-XVI","histoire":"deux châteaux à Razines, dont Razines et Chargé .                  CHARGE, ancien fief de l'abbaye de Noyers, le château fut construit par un certain Isembard de Chargé, qui l'a offert, avec l'abbaye du Noyers, à sa femme Oda. Passé ensuite en différentes mains, profondément remanié aux XVIe siècle, XVIIe siècle et XVIIIe siècle, par les De Blet, ses propriétaires, saisi à la Révolution en qualité de bien national, il existe toujours et ses bâtiments abritent une exposition agricole. Le château possédait des dépendances, notamment la bâtisse de Haute-Claire, désormais propriété de la famille Beausse depuis le XVIIIe siècle.                                                                     RAZINES, Le château du Pont,  était au XIe siècle un pont fortifié dépendant de l'abbaye du Noyers et entouré de douves. C'était à cette époque le seul pont sur la Veude. Il était en 1500 propriété de René de Razines. L'édifice a été entièrement rebâti au XVIIe siècle ; n'en subsiste aujourd'hui qu'un pavillon à deux étages.","architecture":"CHARGE, ancien fief de l'abbaye de Noyers, , profondément remanié aux XVIe siècle, XVIIe siècle et XVIIIe siècle, par les De Blet,  Un souterrain de plus de 800 mètres, assez large pour accueillir un attelage de chevaux, courait depuis le château vers la ferme de haute-claire  Il existait également une chapelle accolée au château construite au XIVe siècle, celle-ci sera détruite en 1890. Beaucoup d'autres monuments sont encore à découvrir sur la commune de Razines, comme le château du Fougeray, construit au XIXe siècle par les Pradeau, et d'autres vestiges : four, lavoir, souterrains, moulin (comme celui de Girrault, pont, joubert).                                                                                                        Sur la commune de RAZINES, le manoir de Réveillon et le château de Milly sont quant à eux deux excellents exemples de bâtisses tourangelles de style directoire telles que l'on pouvait en voir au XVIIIe siècle.\r\nLe domaine de la Garelière, où sur 22 hectares s'étend l'un des meilleurs vignobles de la région, est une ancienne propriété du cardinal de Richelieu, d'où il tirait autrefois son propre vin de table, le faisant venir à Paris.  Pas d'information historique pour ces châteaux","habitants":"Chargé; Famille Beausse                                                                         Razines, famille de René de Razines\r\n        \"","divers":"deux châteaux à Razines, dont Razines grav-4 et Chargé grav 1-2-3 .","gps":"","images":["../../jctruffet.com/image/image_37/37_Charg%c3%a9_1.jpg","../../jctruffet.com/image/image_37/37_Charg%c3%a9_2.jpg","../../jctruffet.com/image/image_37/37_Charg%c3%a9_3.jpg","../../jctruffet.com/image/image_37/37_Charg%c3%a9_4.jpg"]},"Consult_chateau_formulairedd2a":{"id":"Consult_chateau_formulairedd2a","dept":"37","canton":"Château-Renault","commune":"Château-Renault","nom":"Chateau_Renault","type":"Vestiges-Château","periode":"XI-XVII","histoire":"CHATEAU-RENAULT, l'origine de la forteresse remonte au début du XIe siècle. Le donjon a été construit par Thibaut de Champagne, comte de Blois, après l'incendie de 1140. C'est une tour circulaire percée de fenêtres étroites en plein cintre. Le château et ses dépendances remontent aux XIVe et XVIIe siècles. La reconstruction peut être attribuée au premier marquis de Château-Renault ou à son fils au XVIIe siècle, le logis seigneurial fut remanié au XVIIIe siècle. Le château est édifié sur une terrasse au nord de laquelle se dresse le donjon, tour rectangulaire dont la façade Est est renforcée par deux tourelles rondes, l'accès à la terrasse se fait par une porte à l'est. Au nord de la cour se développe un bâtiment de communs, dont la porte est accostée de pilastres supportant un fronton courbe. Au delà, se trouve un pavillon de la même époque. Le logis seigneurial est élevé au sud-ouest, au bord de la terrasse. Il se composait primitivement de deux ailes faisant angle. L'aile ouest a été incendiée en 1407. L'aile sud-ouest a subsisté et  accompagnée de tourelles cylindriques d'angle. Après l'incendie, elle a été prolongée par un petit avant-corps triangulaire, dans la façade duquel fut remontée la porte de l'aile détruite.","architecture":"COMTES, le château des comtes de Blois est un château bâti à Chateau-Renault. Le donjon  date du XIIe siècle. Le Comte Thibaut IV de Blois fit ériger, vers 1140, un donjon cylindrique sur motte. Une enceinte maçonnée longue de 170 m sur 9 m l'enserre. Dominant la ville qui s'est installée à son pied, la place était protégée, sur trois de ses faces, par un fossé, le côté Sud bordant la falaise. L'accès au château des comtes de Blois se faisait à l'Est.","habitants":"Marquis de Château-Renault\r\n        \"","divers":"Château renault 47° 35' 32,51\" Nord, 0° 54' 35,69\" Comtes  47° 35' 32\" Nord, 0° 54' 37\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Chateau_Renault_1.jpg","../../jctruffet.com/image/image_37/37_Chateau_Renault_2.jpg","../../jctruffet.com/image/image_37/37_Chateau_Renault_3.jpg","../../jctruffet.com/image/image_37/37_Chateau_Renault_4.jpg","../../jctruffet.com/image/image_37/37_Chateau_Renault_5.jpg","../../jctruffet.com/image/image_37/37_Chateau_Renault_6.jpg","../../jctruffet.com/image/image_37/37_Chateau_Renault_7.jpg","../../jctruffet.com/image/image_37/37_Chateau_Renault_8.jpg"]},"Consult_chateau_formulaire3b0b":{"id":"Consult_chateau_formulaire3b0b","dept":"37","canton":"Descartes","commune":"Paulmy","nom":"Chatelier","type":"Forteresse","periode":"XV","histoire":"CHATELIER, c'est peut être Jacques Vernon, seigneur du châtelier à partir de 1457, qui fait construire le nouveau logis, soit l'aile Nord et le pavillon Nord de l'actuel logis. Ce logis englobe une tour ronde de l'enceinte, dans la deuxième moitié du XVIe siècle, François de la Noue, dit bras de fer est le maître d'ouvrage d'une plate forme d'artillerie en terrasse, élevée sur des casemates et agrémentée par une échauguette sur trois trompes, l'accès s'y faisait par un pont-levis à bascule et une tour porte carrée défendue par des archères.  La cour était limitée au sud par un bâtiment disparu, qui peut dater de cette époque, ces travaux ont pu être commandés par Benjamin de Pierre Buffière. Des jardins et un parc à la Française sont plantés au XVIIIe siècle, disparus aujourd'hui. Une importante restauration du logis à récemment été entreprise.","architecture":"CHATELIER , fut élevé le donjon résidentiel dans la deuxième moitié du XIIe siècle, éventré il conserve toute sa hauteur, l'étage noble possède une latrine et les vestiges d'une cheminée, l'escalier à vis est disposé dans un éperon. Le site est entouré par une enceinte à tours rondes pleines, percé par une tour porte carrée accessible par un pont dormant. Cette enceinte est contemporaine du donjon. Au XVe siècle, la tour Sud adopte la forme d'un fer à cheval d'habitation et de défense. L'enceinte est doublée entre le pont dormant et la tour porte carrée, par une enceinte aménagée d'archères canonnières avec pont levis charretier et piéton disparu. Dans la seconde moitié du XVe et la première moitié du XVIe siècle,  L'enceinte et les portes carrées en pierre de taille. Le logis deuxième moitié  du XVe siècle à toit à longs pans et pignon découvert ; logis deuxième moitié du XVIIe siècle, grange dite des protestants (temple) et dépendance couvert d'un toit à longs pans et croupe ; tour d'escalier du logis polygonal avec escalier hors-oeuvre à vis sans jour ; tours d'enceinte couvertes d'un toit conique ; logis et pavillon du XVe siècle à un étage carré et un étage en surcroît ; logis et pavillon du XVIIe siècle à un étage carré ; donjon à trois étages carrés ; casemates voûtées en berceau plein-cintre ; escalier du donjon dans l'oeuvre (éperon), à vis sans jour ; la dépendance et la tour en fer à cheval sont couverts de tuiles plates.","habitants":"Famille de François de la Noue,\r\n        \"","divers":"Chatelier 46° 58' 59\" Nord, 0° 50' 24\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Chatelier_1.jpg","../../jctruffet.com/image/image_37/37_Chatelier_2.jpg","../../jctruffet.com/image/image_37/37_Chatelier_3.jpg","../../jctruffet.com/image/image_37/37_Chatelier_4.jpg","../../jctruffet.com/image/image_37/37_Chatelier_5.jpg","../../jctruffet.com/image/image_37/37_Chatelier_6.jpg","../../jctruffet.com/image/image_37/37_Chatelier_7.jpg"]},"Consult_chateau_formulaire7546":{"id":"Consult_chateau_formulaire7546","dept":"37","canton":"Bléré","commune":"Chenonceaux","nom":"Chenonceaux","type":"Forteresse","periode":"XV","histoire":"CHENONCEAUX, c'est l'un des plus beaux châteaux de la Loire. L'architecte était Philibert Delorme. Le début de la construction du château de Chenonceau date du XVe siècle, est construit, aménagé et transformé par des femmes, de tempéraments très différents. En 1513, il fut édifié par Katherine Briçonnet, enrichi par Diane de Poitiers, puis sera agrandi sous le règne de Catherine de Médicis.   La reine lègue le château à sa belle-fille, Louise de Lorraine, qui y vécut dans le deuil. Il deviendra un lieu de recueillement avec la reine blanche Louise de Lorraine. Il sera sauvegardé par Louise Dupin, au cours de la Révolution française et, métamorphosé, sous madame Pelouze. Le château de Chenonceau sera surnommé le château des Dames, car « cette empreinte féminine est partout présente, le préservant des conflits et des guerres pour en faire depuis toujours un lieu de paix. Le château est meublé, décoré de rares tapisseries et peintures anciennes, c'est le monument historique privé le plus visité de France, décoré de plusieurs jardins d'agrément, un parc et un domaine viticole. L'ensemble du domaine de Chenonceau accueille 850 000 visiteurs par an. Il appartient aujourd'hui à la famille Menier. Le château de Chenonceau est classé aux M.H. depuis 1840 et 1962.","architecture":"CHENONCEAUX, en 1512, Thomas Bohier, receveur des finances, devient définitivement propriétaire du château qui appartenait à la famille de Marques. Il le fait raser et ne garde que la tour ronde du donjon. Sur l'emplacement d'un moulin, il fait édifier le nouveau bâtiment, qui s'achève en 1521. En 1555, Diane de Poitiers, favorite de Henri II et propriétaire du domaine, confie à Philibert Delorme la construction d'un pont sur le Cher, termine le pont en y faisant élever une galerie. L'édifice est l'une des premières créations de la Renaissance, demeure de plaisance remplaçant le château-fort. Les éléments autrefois défensifs servent ici d'ornement. Le corps de logis forme un quadrilatère édifié sur deux piles sur le fleuve. Une tourelle en cul de lampe orne chaque angle. La façade Est comprend en saillie la chapelle rectangulaire avec abside à trois pans. La grande galerie repose sur cinq piles. A l'intérieur, l'escalier qui conduit au premier étage est l'un des premiers escaliers droits construits en France. Le domaine est agrémenté de jardins à la française et d'un parc comprenant divers bâtiments dont les dômes, l'orangerie, la cour de ferme entourée de bâtiments en pierre et pans de bois.","habitants":"La reine  Catherine de Médicis          Famille Menier         \r\n        \"","divers":"Chenonceaux: 47° 19' 27,64\" Nord et 1° 04' 13,8\" Est","gps":"","images":["../../jctruffet.com/image/image_37/37_Chenonceaux_1.jpg","../../jctruffet.com/image/image_37/37_Chenonceaux_2.jpg","../../jctruffet.com/image/image_37/37_Chenonceaux_3.jpg","../../jctruffet.com/image/image_37/37_Chenonceaux_4.jpg","../../jctruffet.com/image/image_37/37_Chenonceaux_5.jpg"]},"Consult_chateau_formulaire0422":{"id":"Consult_chateau_formulaire0422","dept":"37","canton":"Ste-Maure de Touraine","commune":"Chezelles","nom":"Chezelles","type":"Château","periode":"XIX","histoire":"CHEZELLES, constituait un fief relevant du château de Chinon. Une forteresse établie à l'emplacement du château actuel est mentionnée dans un acte de 1397, grand veneur de France et gouverneur de Chinon vers 1415 et son épouse Annette de Maillé. En 1487, Charles de Maillé rend aveu au comte de Chinon pour \"son châtelet ou forteresse de Chézelles fortifié à double fossé, fausse braye, murailles anciennes et pont-levis, l'ensemble de la basse-cour ayant muraille crénelée, une fuie dans le clos de vigne, le bourg de Chézelles,\" Après les Maillé, le fief passe aux Raynier en 1540. Un aveu de Dimanche Raynier, écuyer, seigneur de Chézelles, rendu au roi en 1611, nous apprend que le château est \"garni d'arbalètes, cannonières, douves tout alentour. \" Marguerite du Raynier, fille de Dimanche, épouse Louis de Tusseau en 1642. Alexis-Joseph de Tusseau est seigneur de Chézelles en 1725. L'édifice passe par alliance à Charles Jacques Darrot en 1749. La famille d'Effiat en devient propriétaire par alliance en 1779. C'est entre 1725 et 1749 que le château fut  transformé. Puis il fut remanié au XIXe siècle : le cadastre indique la reconstruction d'une demeure de 1ère classe entre 1838 et 1841. Par héritage le château devint propriété vers 1840 de la troisième fille du comte de Neuilly, fils présumé de Charles X, Louise Thérèse de Brunet de Neuilly, mariée à Désiré De Pont de Rivière, puis à leur fille Marie-Thérèse Dujon,  est resté aux Montfortains jusqu'en décembre 2002, date à laquelle il est devenu propriété de la communauté de l'Emmanuel.","architecture":"CHEZELLES,  édifice formé d'un corps central avec avant corps encadré de part et d'autre par deux travées et deux ailes en retour d'équerre. Le gros oeuvre est en pierre de taille sur la façade sud et en moellons enduit sur la façade nord. La chapelle a été construite perpendiculairement au corps de logis, en son milieu et se trouve de fait encadrée par les deux ailes latérales. En façade et sur les ailes les portes bâtardes sont surmontées d'un fronton cintré brisé. Le comble est éclairé par des lucarnes en oeil de boeuf sur le corps central et par des lucarnes-fenêtres à fronton cintré sur l'avant-corps et les ailes latérales. Le toit à longs pans porte une terrasse faîtière. L'avant-coprs est couvert d'un toit brisé en pavillon. Ce dernier est orné d'une pendule au troisième niveau. Dans le parc, au même niveau se trouvent les communs dont une écurie transformée en atelier et une fabrique polygonale à usage de commodités. Sur la route de Chézelles à Theneuil subsiste un imposant portail formé de deux piliers cylindriques.","habitants":"Famille de Maillé\r\n        \"","divers":"Château de Montfortain à  Chezelles","gps":"","images":["../../jctruffet.com/image/image_37/37_Chezelles_1.jpg","../../jctruffet.com/image/image_37/37_Chezelles_2.jpg"]},"Consult_chateau_formulaire1228":{"id":"Consult_chateau_formulaire1228","dept":"37","canton":"Chinon","commune":"Jaulnay","nom":"Chillou","type":"Château","periode":"XV","histoire":"CHILLOU, château construit à la place d'un édifice plus ancien. En 1506, il passe aux mains de François du Plessis, arrière grand-père du cardinal de Richelieu. Le Chillou fit partie du domaine érigé en duché en 1631, en faveur du ministre de Louis XIII. Les ducs de Richelieu le possédèrent jusqu'en 1805.","architecture":"CHILLOU, entouré de douves, le château comprenait quatre corps de bâtiments limitant chacun un côté d'une cour intérieure rectangulaire. Au sud, la porte fortifiée, élevée sur plan carré, flanquée sur deux angles d'une tourelle circulaire couronnée de mâchicoulis.
