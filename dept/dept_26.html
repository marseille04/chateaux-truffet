pe en 1374,  et devenue domaniale en 1419, fut cédée en 1447 aux Adhémar, ceux-ci  rétrocédèrent le domaine en 1582 aux Brunier,  par alliance de Catherine Adhémar dame d'Aps et Marsanne à Jacques de Brunier seigneur de Larnage, les de Brunier vendirent en 1784 aux Martin de la Porte ses derniers seigneurs.\r\nLe château et le village fortifié fut détruit une première fois au XIVe siècle l'ensemble fut reconstruit à la renaissance et de nouveau détruit pendant les guerres de religion. \r\nAu XIXe siècle une des maisons Au centre ville de Marsanne le château de \"Montluisant\" qui au départ n'était qu'un domaine avec une tour et un grand parc, était la résidence du  peintre Julien Victor Veyrenc, ce dernier la vendit  à Charles-Laurent de Montluisant Polytechnicien ingénieur  des ponts et Chaussées vers 1820  transforma sa demeure  de style néogothique. \r\nil fut maire de Marsanne et son fils  Charles-Bernardin général de brigade finit de la transformer en château et son fils Charles-Marie de Montluisant général comme son père le lègue à son neveu Pierre de Laselve comte de Montluisant; en  1965   la propriété   appartenait  au comte  de   Laselve  de Montluisant. Monsieur fleuriot dont sa femme Huguette descendante de la famille des Montluisant hérite.","architecture":"Au sommet du village fortifié, vestiges du donjon du XIIe siècle, maisons anciennes avec fenêtres à meneaux  et portes à linteaux de style romain, gothique et renaissance. Sur la place le château de Montluisant construit entre le XVIII-XIXe siècle  de style néogothique, corps de logis rectangulaire, flanqué  en façade de deux pavillons en angle, bâtiment prolongé d'un étage sur l'arrière suivit d'une tour ronde à escalier et d'une chapelle.","habitants":"Famille de Montluisant\r\nFamille Fleuriot\r\n        \"","divers":"Porte Beffroi\r\nChâteau de Montluisant\r\nVestiges de la tour des Ours et la basilique de Fresneau","gps":"","images":["../image/image_26/26_Marsanne_1.jpg","../image/image_26/26_Marsanne_2.jpg","../image/image_26/26_Marsanne_3.jpg","../image/image_26/26_Marsanne_4.jpg","../image/image_26/26_Marsanne_5.jpg","../image/image_26/26_Marsanne_6.jpg"]},"Consult_chateau_formulaire7d49":{"id":"Consult_chateau_formulaire7d49","dept":"26","canton":"Châtillon-en-Diois","commune":"Menglon","nom":"Menglon","type":"Manoir","periode":"XV","histoire":"Perdeyer: Fief des évêques de  Die et dans lequel il y avait au XVIe siècle une chapelle dédié à Saint-Jean, il appartenait dés 1478 à une famille de ce nom ; Charles de Perdeyer en 1592 gentilhomme protestant, gouverneur de la vallée  du Queyras y acquiert de Charles de Monteynard seigneur de Chalencon allié aux Artaud d'Aix le château de Largentière,  c'est sa fille Jeanne qui épouse Henri de Philibert, capitaine de la garde de Lesdiguiéres et c'est de là que s'éteignit le nom de Perdeyer. Henri et son frère Alexandre, époux d'Isabeau de Montauban sont tous deux fils de François de Philibert dit \"cadet de Charence\"  seigneur de Venterol.\r\nil est intéressant de noter que la famille Martin, héritière de Sieur de Champoléon; Aubert Martin Seigneur et lieutenant, compagnon d'armes du Cadet de Chorance et beau frère de Lesdiguiéres rachète le château de Perdeyer à la Révolution. Aujourd'hui privé.                                     St-FERREOL: Domaine  possédé  par les Jacob de Boache fut vendu  en 1472  par les Borel aux Chapitre de Die, qui le revendirent en 1573 à Alexandre de   Sibeud ; ceux-ci le conservèrent jusqu'à la Révolution. Acquit par les Guimard qui le revendirent à Mademoiselle Charier en 1930 et ensuite a la famille Chagnard. Aujourd'hui  Monsieur Linossier  en a fait un gites.","architecture":"Manoir construit au XVe siècle par les seigneurs de Perdeyer, corps de logis quadrangulaire flanqué de tours carrées saillantes en façade, porche d'entrée flanqué de deux petites tours rondes.    St-Ferréol; construit au XIIIe siècle, reste le corps de logis dont un élément de façade de style Henri IV et deux tours rondes du XIIIe siècle qui étaient insérées dans les remparts.","habitants":"Famille de Perdeyer\"","divers":"Château de Perdeyer et de Saint-Férréol","gps":"","images":["../image/image_26/26_Perdeyer_1.jpg","../image/image_26/26_Perdeyer_2.jpg"]},"Consult_chateau_formulaire0a31":{"id":"Consult_chateau_formulaire0a31","dept":"26","canton":"Tain-l`Hermitage","commune":"Mercurol","nom":"Mercurol","type":"Vestiges","periode":"X","histoire":"MERCUROL: Castrum cité en 1064. au féodal passa à la baronnie des Clérieux, appartenait au XIe siècle à une famille de son nom, le domaine passa au XIIIe siècle aux Claveyson,  cette famille s'éteint en 1440 chez les Hostun, ceux- ci portèrent en 1615 Mercurol par alliance aux Lyonne  qui vendirent en 1753 aux d'Urre, Henri  d'Urre ce dernier seigneur, paire de France laissa Blanchelaine à son neveu comte de Revel.  La maison forte de Blachelaine dans la commune de Mercurol  (le moulins de Pinchinas en 1480 appelé Blanchelaine vendu en 1673 aux Lyonne).","architecture":"Mercurol; vestiges sur un mamelon au dessus du village  de tours et de courtine.","habitants":"famille d'Eurre\"","divers":"Vestiges du château féodal","gps":"","images":["../image/image_26/26_Mercurol_1.jpg","../image/image_26/26_Mercurol_2.jpg","../image/image_26/26_Mercurol_3.jpg"]},"Consult_chateau_formulaire350a":{"id":"Consult_chateau_formulaire350a","dept":"26","canton":"Crest","commune":"Mirabel-et-Blacons","nom":"Mirabel_et_Blacons","type":"Vestiges","periode":"X","histoire":"Mirabel et Blacons: Castrum  de Mirabel cité vers 1165. Le nom de \"Mirabel et Blacons\" est survenu en 1642 par la vente d'un terrain de Blacons par Hector du Forez aux évêques de Die, terrain qui se trouvait dans la paroisse de Mirabel. Fief des Evêques de Die, confirmé en 1178 par les empereurs germaniques.  En 1539 passa aux Montmeyran, vers 1660 faisait partie des biens des Arbalastier puis par les Prélats qui conservèrent les biens jusqu'à la Révolution.","architecture":"Vestiges du village fortifié, tours et donjon.","habitants":"famille d'Arbalastier\"","divers":"Vestiges du village fortifié de Mirabel","gps":"","images":["../image/image_26/26_Mirabel_et_Blacons_1.jpg","../image/image_26/26_Mirabel_et_Blacons_2.jpg","../image/image_26/26_Mirabel_et_Blacons_3.jpg"]},"Consult_chateau_formulaire36fb":{"id":"Consult_chateau_formulaire36fb","dept":"26","canton":"Romans","commune":"Miribel","nom":"Miribel Tour","type":"Vestiges","periode":"XI","histoire":"Fief de l'église épiscopale de Vienne et arrière fief de la baronnie des Clérieu, qui,  premièrement possédé par une famille de son nom,  appartenait ensuite aux Moirenc, vers le XIIIe siècle et repassa aux Clérieu qui le donnèrent en 1323 aux Comtes de valentinois, les Poitiers Saint-Vallier, dont le dernier seigneur vendit aux Gaudoin qui revendirent le domaine aux Monteux vers 1540, passé par alliance aux Rostaing, en 1581 et en 1685 aux Beaumont jusqu'à la Révolution.                       BOUCHET: S'appelait le Boschet, ancienne maison forte appartenant en 1605 aux Thivoley, ensuite aux Alleman , et en 1779 aux Sablières.                    DAVAU: Maison forte largement remaniée.","architecture":"Du château il ne reste plus rien, seul une tour ronde à 450 mètres d'altitude","habitants":"Famille de Clérieu\"","divers":"Tour de Miribel Maison forte de Bouchet et de Davau","gps":"","images":["../image/image_26/26_Miribel_1.jpg","../image/image_26/26_Miribel_2.jpg","../image/image_26/26_Miribel_3.jpg"]},"Consult_chateau_formulairec87a":{"id":"Consult_chateau_formulairec87a","dept":"26","canton":"Buis-les-Baronnies","commune":"Mollans-sur-Ouvéze","nom":"Mollans","type":"Château","periode":"XI","histoire":"Mollans sur Ouvéze: Forteresse médiévale du XIe siècle construite par les Seigneurs de Mévouillon. \r\nChâteau et village fortifiés, appartenaient à la famille des Mévouillon, l'une des grandes baronnies qui possédaient le pays. Cette seigneurie fût engagée en 1293 aux Médici, qui cédèrent en 1333 aux Adhémar, le fort inférieur passa vers 1488 aux Thollon de Sainte-Jalle, qui le revendirent en 1515 aux Parpaille, et ceux-ci le revendirent en 1601 aux la Tour que remplacèrent les d'Eurre, lesquels eurent pour héritiers  les Simiane.\r\nTandis que le fort supérieur, possédé par les Raymond fut acquis  en 1323 par les Morane et en 1334 par les Méroce, qui le revendirent en 1407 aux Serre. \r\nL'héritière des Serre s'allia chez les d'Eurre  en 1653 par les Simiane lesquels était devenus maîtres des deux châteaux et de l'ensemble des biens et en furent les derniers seigneurs jusqu'à la Révolution.","architecture":"Vestiges de deux châteaux, le supérieur  mieux conservé que l'inférieur. ce dernier,de masse cubique édifié à l'aplomb de la falaise, émerge nettement du bourg fortifié, grand corps  de bâtiment rectangulaire appelé  le \"haut donjon\" carré de 15 m de côté à été profondément restauré dans les années de 1970.","habitants":"Famille des seigneurs de Mevouillon\"","divers":"Château de Mollans","gps":"","images":["../image/image_26/26_Mollans_1.jpg","../image/image_26/26_Mollans_2.jpg","../image/image_26/26_Mollans_3.jpg","../image/image_26/26_Mollans_4.jpg","../image/image_26/26_Mollans_5.jpg"]},"Consult_chateau_formulaireb219":{"id":"Consult_chateau_formulaireb219","dept":"26","canton":"Montélimar","commune":"Montboucher-sur-Jabron","nom":"Monard_Valdaine","type":"Maison forte","periode":"XV","histoire":"Monard-Valdaine: Construit par le marquis Louis d'Arlande, puis acquit par Charles Laurens des frères Muton en 1499, le manoir échoue à Lucrèce Laurens , l'épouse de Jean D'Arlande. Ses descendants s'allièrent, en 1723, à la famille de Vesc qui le conservèrent jusqu'à la révolution. \r\nEn 1819, Caroline de Vesc épouse le Marquis Raymond de Puy- Montbrun apportant le Monard en dot. C'était la deuxième femme du dernier descendant direct des \"de Podio\",sans enfant laisse le manoir à son neveu le comte d'Isoard de Chenerilles.\r\nCe domaine appelé \"Valdaine \" transformé en golf géant de 18 trous.","architecture":"Manoir du XVe siècle construit pour le marquis d'Arlende , posséde une grande tour à échauguettes et bretéches, prolongé au XVIe siècle par un corps de logis au Nord","habitants":"Famille d'Arlende\"","divers":"Maison forte du Monard","gps":"","images":["../image/image_26/26_Monard_Valdaine_1.jpg","../image/image_26/26_Monard_Valdaine_2.jpg"]},"Consult_chateau_formulaire538a":{"id":"Consult_chateau_formulaire538a","dept":"26","canton":"Montélimar","commune":"Montboucher-sur-Jabron","nom":"Montboucher","type":"Maison forte","periode":"XVI","histoire":"Montboucher: Ce fief dépendait des Adhémars entre 1285 et 1511, Ils rendaient hommage tantôt aux Evêques de Valence , tantôt à Louis de Poitiers. Le château-village avec ses terres devient ensuite successivement fief des Odoard, de Guillaume de Mévouillon , des Ventadour, de Giraud de Béranger,  1595 d'Alexandre de Vesc  jusqu'en  1754 date à laquelle  il est vendu ainsi que le château de Combeaumont à Monsieur de Tulle  puis à la famille de la Baume. \r\nEn 1800 la propriétaire était  Clotilde, comtesse de la Baume.","architecture":"Le château construit au XVe siècle  de style renaissance, corps de logis quadrangulaire remanié et tours arasées. Aujourd'hui hôtel.","habitants":"Comtesse de la Baume\"","divers":"Maison forte de Montboucher","gps":"","images":["../image/image_26/26_Montboucher_1.jpg"]},"Consult_chateau_formulairec142":{"id":"Consult_chateau_formulairec142","dept":"26","canton":"Grignan","commune":"Montbrison-sur-Lez","nom":"Montbrison_sur_lez","type":"Vestiges","periode":"XI","histoire":"Montbrison sur lez: Au féodal fief des Montauban  et de Caderousse.  Appartenait en 1316 aux Ancezune, qui le cédèrent  aux Dauphins en échange de celle de Chauvac, et que les Dauphins donnèrent en 1334 aux Beaumont et en 1339 aux princes d'Orange.\r\nLes princes d'Orange en hommagèrent en 1484 un bâtard, dont l'héritage échut au Poitiers d'Allan (1501) puis l'ayant recouvré, l'incorporèrent à leur principauté et celle-ci étant advenue aux Bourbon Conti en 1702,  Montbrison fut engagé vingt deux ans après, aux Raymond-Modéne qui était encore seigneurs à la Révolution.                           PONTAUJARD: Manoir du XIVe siècle par le comté des Valentinois, style renaissance. Lolin des Armands épouse le 20 Avril 1517, Jeanne de Borel , fille d'Elzéar, seigneur de Pontaujard. \r\nAu XVII e siècle au Durand de Pontaujard, qui fut président au parlement d'Orange et édifia l'hôtel du Puy Montbrun à Montélimar ou il y résida très peu , en 1747 Dame Olympe Mabile de Durand de Pontaujard marquise de Rousset , veuve de François de Cornillan, vent le Domaine aux Agoult ensuite aux Armand de Blacons ses derniers seigneurs. Aujourd'hui au général Descour.","architecture":"Montbrison sur Lez; le château et le village fortifié se trouvaient sur la vialle,  aujourd'hui il ne reste quelques vestiges pans de murs de l'ensemble. Pontaujard; construit en 1346,  corps de logis quadrangulaire, flanqué d'une tour ronde en angle plein sud et trace d'une tour à l'opposée côté nord, dépendance,  deux étages, fenêtres à meneaux et toits plats à la provençale.","habitants":"Famille de Raymond Modéne\"","divers":"Vestiges du château de Montbrison","gps":"","images":["../image/image_26/26_Montbrison_sur_lez_1.jpg","../image/image_26/26_Montbrison_sur_lez_2.jpg","../image/image_26/26_Montbrison_sur_lez_3.jpg"]},"Consult_chateau_formulaire5620":{"id":"Consult_chateau_formulaire5620","dept":"26","canton":"Montbrun-les-Bains","commune":"Séderon","nom":"Montbrun_les_Bains","type":"Château","periode":"XII","histoire":"Montbrun-les-Bains: Du château primitif dit \" Reybaud \" Fief des Algoult en 1263, puis aux Mévouillon, Montbrun appartenait en 1284  à Bertrand  de  Baux seigneur de Brantes qui le donna  aux Dauphins. Ceux-ci  s'en dessaisirent peu de temps après au profit des Du Puy Montbrun, entre temps, suite à des conflits le château, fut remplacé  à la renaissance en 1564  Les Du Puy Montbrun   obtinrent en 1620  l'appellation de Montbrun en Marquisat, et l'on conservé jusqu'en 1748 date à laquelle le domaine passa par alliance aux Brinard, dont une héritière s'allia chez les Sade 1770 qui était encore seigneur à la Révolution.","architecture":"Du château dit \"Reybaud\", il ne reste sur l'éperon rocheux à 690 mètres d'altitude qu'une tour carrée ruinée de 10 m x 6 m et 10 m de hauteur.  La citadelle dans lequel fût construit le château actuel de style renaissance,  construit sur un ancien château fut démolie à la révolution dont il reste d'importants vestiges de ce dernier, des tours d'enceintes, aujourd'hui utilisé par des particuliers et possédait quatre portes  dont   une tour porte quadrangulaire du XIVe siècle \"tour de L'horloge\" crénelée surmontée d'un campanile.","habitants":"Famille Du Puy Montbrun\"","divers":"Vestiges du château de Montbrun et la Gipierres (Thermale)","gps":"","images":["../image/image_26/26_Montbrun_les_Bains_1.jpg","../image/image_26/26_Montbrun_les_Bains_2.jpg","../image/image_26/26_Montbrun_les_Bains_3.jpg","../image/image_26/26_Montbrun_les_Bains_4.jpg","../image/image_26/26_Montbrun_les_Bains_5.jpg"]},"Consult_chateau_formulaire8e13":{"id":"Consult_chateau_formulaire8e13","dept":"26","canton":"St-Donnat-sur-l`Herbasse","commune":"Montchenu","nom":"Montchenu","type":"Château","periode":"XII","histoire":"Montchenu: Ancien fief de la Baronnie des Clérieu et depuis le XIVe siècle par les seigneurs de Montchenu   ( Scipion de Montchenu ) est resté plusieurs siècle dans la famille, aujourd'hui exploité par Monsieur Lambert, gendre de Madame Charles de Borde  descendante des Montchenu.","architecture":"Forteresse féodal, cité au XIIe siècle  était entourée de trois enceintes crénelées d'où émergent encore deux tours  des IX  et XI e siècle. De grands remaniements au XVIIIe siècle lui ont enlevés son caractère. Une tour démolie au siècle dernier, remontait à l'époque romaine.","habitants":"seigneur de Montchenu\r\nFamille Charles de Bordes\"","divers":"Château de Montchenu","gps":"","images":["../image/image_26/26_Montchenu_1.jpg","../image/image_26/26_Montchenu_2.jpg","../image/image_26/26_Montchenu_3.jpg"]},"Consult_chateau_formulaire8536":{"id":"Consult_chateau_formulaire8536","dept":"26","canton":"Crest","commune":"Montclar-sur-Gervanne","nom":"Montclar_sur_Gervanne","type":"Vestiges","periode":"XII","histoire":"Montclar sur Gervanne: Au féodal,  fief des Dauphins, que ses princes cédèrent aux Artaud d'Aix en 1263 et qui fut acquis des Artaud par les Mévouillon en 1288, puis revendu aux comtes de Valentinois en 1298, puis entra dans le domaine Dalphinal en 1419.\r\nRetransmit aux Pape, en 1450, mais les Pape qui se trouvèrent être les seigneurs de Montclar conjointement avec les Arbalastier, les Grammont \"Robert le Gros\" seigneur de Montclar capitaine à la tour de Crest; et les d'Eurre ; ayant acquis toutes les parts, vers 1715 les Arbalastier furent les derniers seigneurs jusqu'à la Révolution.                    VACHERES: La famille Gramont, originaire de Navarre, arrive en France sous charles VII, Robert se met au service du Dauphin qui le nomme Grand Bailly du Gévaudan avec les Châtellenies de Gigors et de Crest. Son descendant Guillaume fera construire en 1537 le château actuel; Philippe Gramont gouverneur de la tour de Crest en faveur de qui la terre de vachères fut érigée en marquisat en 1688 Jean de Gramont, son fils connu sous le nom de \" Capitaine Vachères \" également gouverneur de la tour de Crest.\r\nLe quatrième Marquis de Vachères , héritier D'André-Joseph d'Anselme, duc de Caderousse, vend ce beau domaine en 1788 à monsieur de la Bretonnière, puis racheté en 1955 par monsieur Tonnelle.","architecture":"Montclar sur Gervanne; le château qui se trouvait au sommet du village  n'existe plus, ruiné au XVe siècle, de l'enceinte médiévale, quelques vestiges et une porte fortifiée dite\" porte Bayard\" donne accès au bourg Castral.                         Vachères; construit au XVIe siècle par Guillaume de Gramont; de style renaissance, corps de logis quadrangulaire flanqué de quatre tours rondes en angles.","habitants":"Famille d'Arbalastier\"","divers":"Vestiges du château à Montclar sur Gervanne et château de la Vachères.","gps":"","images":["../image/image_26/26_Montclar_sur_Gervanne_1.jpg","../image/image_26/26_Montclar_sur_Gervanne_2.jpg","../image/image_26/26_Montclar_sur_Gervanne_3.jpg","../image/image_26/26_Montclar_sur_Gervanne_4.jpg"]},"Consult_chateau_formulaire2732":{"id":"Consult_chateau_formulaire2732","dept":"26","canton":"Portes-les-Valence","commune":"Monteleger","nom":"Monteleger","type":"Château","periode":"XVI","histoire":"Monteleger: Fief des comtes d'Eurre en 1470, aux Villard en 1506 et en 1530 passa aux Mayaud,  Pierre de Mayaud  en 1545 construisit le château, puis passa  aux Jacques de Tournon (Evêque de Valence), aux Vantadour, aux Lucs, aux Bernon, derniers seigneurs jusqu'à la révolution. Acquit par   Pavin de Lafarge, puis aux Port-Roux, à leur neveux Framont,   aux Coursac et en 1957 acheté par Peter Tozlian qui en fit une maison de retraite.","architecture":"Construit au XVIe siècle par Mayaud, de style gothique remanié. Du château à l'origine il reste la partie Ouest, corps de logis a deux étages flanqué au Sud d'une tour ronde en angle, également d'une tour ronde à la partie extrême du nouveau bâtiment et d'une échauguette crénelée en encorbellement. \r\nL'ensemble surplombe le village sur une terrasse soutenue par des murs d'origine ( bases de tours et tourelles).","habitants":"Famille de Mayaud\r\nFamille de Tozlian\"","divers":"Château de Monteleger","gps":"","images":["../image/image_26/26_Monteleger_1.jpg","../image/image_26/26_Monteleger_2.jpg","../image/image_26/26_Monteleger_3.jpg","../image/image_26/26_Monteleger_4.jpg"]},"Consult_chateau_formulairea948":{"id":"Consult_chateau_formulairea948","dept":"26","canton":"Montélimar","commune":"Montélimar","nom":"Montelimar","type":"Château","periode":"XV","histoire":"NOVEZAN: Au XVe siècle fut la propriété des Seytres, puis des Adhémars de Monteil et des Castellane. Au XVIIIe siècle le domaine fait partie de celui de la famille de Pracomtal, qui s'étendait jusqu'au Rhône, puis passa ensuite aux Lacoste Maucunne, puis aux Vicomte Le Rebours. \r\nVers 1830, Euphrasine Le Rebours épouse le marquis de Baroncelli-Javan apportant en dot Novézan. toujours dans la descendance à Mademoiselle de Baroncelli et à Madame Paul Ghali.                  A proximité le château du Perchoir; de style renaissance, construit au XVIe Siècle.","architecture":"Novezan; du Moyen Age il en reste les fondations, il fut remanié au XVIII et aux XIXe siècle et a gardé de belles tours rondes et carrées et créneaux qui lui donnent un caractère médiéval.","habitants":"Famille du Vicomte Rebours \r\nFamille de Baroncelli-Javan\"","divers":"Château féodal de Novezan, du Perchoir, de Chalas, château Gery, villa chabaud, Ruas  et l'hôtel des Dupuy-Montbrun","gps":"","images":["../image/image_26/26_Novezan_1.jpg","../image/image_26/26_Novezan_2.jpg","../image/image_26/26_Novezan_3.jpg","../image/image_26/26_Novezan_4.jpg","../image/image_26/26_Novezan_5.jpg","../image/image_26/26_Novezan_6.jpg","../image/image_26/26_Novezan_7.jpg","../image/image_26/26_Novezan_8.jpg","../image/image_26/26_Novezan_9.jpg"]},"Consult_chateau_formulairec834":{"id":"Consult_chateau_formulairec834","dept":"26","canton":"Chabeuil","commune":"Montelier","nom":"Monteynard (26)","type":"Château","periode":"XIV","histoire":"Montelier-Monteynard: A l'origine il y avait à la place du château une maison forte acquise en 1392  par les Sassenage aux Virieu, il la revendirent en 1454 aux Bolonier, puis  l'ayant recouvrée construisirent à la place de la maison forte qui avait été détruite par le feu  vers la fin du XVe siècle le château actuel, de forme circulaire, on le désigne \" rotonde de Montmusard \". Erigé en comté, en 1673, par lettres royales en faveur de Charles-Louis de Sassenage. Vendu en 1767 par la comtesse de Berenger-Sassenage, Montélier passe successivement aux Grand-Boulogne  (1812), au comte de Chaponay-Dizimieu, dont la fille épouse en 1843 le comte de Monteynard. Cette famille héritera de ce beau domaine.","architecture":"Château gothique de forme circulaire à trois étages à toits en poivrières, flanqué côté Est de deux grosses tours rondes dont une est accolée une tourelle. A l'intérieur une cour est soutenue par des voûtes d'une grande élévation, à l'extérieur l' enceinte de larges fossés et un poste de garde avec un petit ponts qui a remplacé un pont levis.","habitants":"Famille de Sassenage\r\nFamille de Monteynard\"","divers":"Château des Monteynard","gps":"","images":["../image/image_26/26_Monteynard_1.jpg","../image/image_26/26_Monteynard_2.jpg","../image/image_26/26_Monteynard_3.jpg"]},"Consult_chateau_formulaire8479":{"id":"Consult_chateau_formulaire8479","dept":"26","canton":"Séderon","commune":"Montfroc","nom":"Montfroc","type":"Château","periode":"XVI","histoire":"Montfroc: Fief des barons de Mévouillon, qui en dotèrent en 1247 une de leurs filles, marié chez les Adhémar, lesquels soumirent leur biens aux fief Dalphinal Lambert II en 1337, et, cent cinquante ans plus tard, en dotèrent une de leur filles mariée chez les Clermonts  Montoison. Ceux-ci vendirent en 1540 Montfroc a Baltazar  Du-Puy que remplaçaient dés 1577 les Béranger, qui construisirent le château et  furent eux même remplacés par les Pontéves en 1667, cinq ans aprés remplacé par les La Tour Gouvernet qui en ont été seigneur jusqu'à la Révolution.","architecture":"Construit au XVII e siècle , appelé aussi château de\" la Tourette\" à l'origine tour de guet   le château existe sous la forme d'un  corps de logis quadrangulaire flanquée de tours carrées.","habitants":"Famille de la Tour-Gouvernet\"","divers":"Château de Montfroc","gps":"","images":["../image/image_26/26_Montfroc_1.jpg","../image/image_26/26_Montfroc_2.jpg"]},"Consult_chateau_formulaire3855":{"id":"Consult_chateau_formulaire3855","dept":"26","canton":"Dieulefit","commune":"Montjoux","nom":"Montjoux","type":"Château","periode":"XII","histoire":"Montjoux: Au XIIe siècle Fief de Raymond Berenger II, sous la suzeraineté de Montferrand, seigneur de Pierrelatte et de Montjoux; puis au XIIIe siècle, au Hugonin  de Vesc seigneur de Montjoux sous la suzeraineté des Montauban et des comtes de Valentinois; passa aux Thollon et aux Alleman. C'est à un des descendant d'Hugonin de Vesc et de Doucine Alleman, dame de la Bâtie Rolland, que l'on attribue la construction du \"Château neuf\" au XVe Siècle, au XVIe siècle passa aux Forez, puis retour en 1619 à Nicolas de Vesc, seigneur de Saint-Thomé; Vers 1625, Esprit de Rigot achète la seigneurie. et la gardèrent jusqu'à la Révolution. En 1971 propriété de monsieur Noël Perez","architecture":"Cité au XIIe siècle d'une bastide,  Château confirmé au XVe siècle par Claude de Vesc,   remanié au court des siècles pour se terminer au XVIIe siècle en style renaissance,  Corps de logis rectangulaire avec deux ailes en retour d'équerre, à deux étages à toits plats","habitants":"Famille de Beranger\r\nFamille de Rigot\"","divers":"Château de Montjoux","gps":"","images":["../image/image_26/26_Montjoux_1.jpg"]},"Consult_chateau_formulaired486":{"id":"Consult_chateau_formulaired486","dept":"26","canton":"Luc-en-Diois","commune":"Montlaur","nom":"Montlaur_en_Diois","type":"Vestiges","periode":"XII","histoire":"Montlaur était la propriété au XIIe siècle des comtes du Valentinois, puis passa aux Artaud en 1332, le château fut construit à l'origine il servait de grenier, et  tout autour par les habitations des vasseaux, passa en 1361 à Aymar VI comte de Valentinois. \r\nLa catastrophe du Clap en 1442 modifia quelque peu les seigneuries  du Diois, cette petite seigneurie passe de  familles en familles par les femmes, en 1412 Guy Baron de Montlaur  et de Sabran, vers 1430 Louis de Montlaur, épouse Marguerite de Polignac de Chalencon dont la fille épouse Charles III de Poitiers. En 1504 Montlaur appartient à Fleurie de Montlaur, racheté par la famille de Monteynard en 1560, et en 1562 Claude de Lhére épouse Diane de Clermont-Tallard dite \"Mademoiselle de Monlor\", à la mort de Claude en 1608 le château passa à sa fille Marie de Lhére qui depuis 1580 vit au château. Marie aura trois filles Marie, Margueritte et Jacqueline. Par Marguerite qui épouse en 1628 Louis Gaucher Adhémar de Grignan devient seigneur de Montlaur, eurent onze enfants, un de leur fils  hérite,  Louis Gaucher épouse Thérése des Adhémar dame de Rochebonne   le 22 octobre 1668, elle eut trois fils, Charles François Evêque décède en 1719,  le deuxième, chevalier de Malte disparait en mer en 1707,  le troisième commandant de régiment de Villeroy tué à une bataille en 1709, donc plus d'héritier. En 1708 le domaine fut vendu à Etienne André de Gilbert de Sallières, le domaine resta dans cette famille et habitèrent le château qui sera saisit en 1792. \r\nLes Sauvan acquirent le château en partie détruit pour vendre les matériaux, les terres furent vendues à part","architecture":"Du château citée au XIIe siècle en grenier aménagé en habitation en 1580, il fut brûlé en  1793 dont il ne reste aujourd'hui qu'un pan du donjon.","habitants":"Famille Gilbert de Sallieres\"","divers":"Vestiges à Montlaur en Diois","gps":"","images":["../image/image_26/26_Montlaur_en_Diois_1.jpg","../image/image_26/26_Montlaur_en_Diois_2.jpg"]},"Consult_chateau_formulairecacd":{"id":"Consult_chateau_formulairecacd","dept":"26","canton":"Grignan","commune":"Montjoyer","nom":"Montlucet-Montjoyer","type":"Vestiges","periode":"X","histoire":"Montlucet:Au XIIe et XIIIe siècle domaine de Gontard Loup,  seigneur de Rochefort, qui le donna aux abbés d'Aiguebelle que  ces derniers le donna aux Comtes de  Provence qui y établirent un Vassaux.   En 1473 il y eu un hommage en faveur de Jean Robert de Montlucet.            CALMETTE:  cette maison forte fut  possédée par les De Lauzére, les de Leuze  et par Jean de Reppelin, et une partie fut acquise par les de Châteauvieux verriers de métiers, le domaine passa à son gendre Josué, ce dernier en fit don de moitié à Louis de Châteauvieux puis passa à Charles d'Esclauzels en 1673,  qui installa une verrerie dans la tour, à la mort de Charles de Châteauvieux, sieur de Cabannes devint propriétaire en 1678 puis passa par alliance à Hector de Ferre, aux Bonne Lesdiguiéres, aux la Bruyére, aux Largillier et aux Descours- Bonnal.","architecture":"Château ruiné en 1600, seul reste aujourd'hui une tour de la forme d'un parallélépipède régulier, dont la base carrée mesure 4 mètres à l'intérieur et 7 mètres 25 à l'extérieur. Autour du château vestiges  d'enceinte polygonale d'environ 1500 mètres.                   Calmette, maison forte citée en 1193 (?) transformée en gentilhommière  Maison forte à tour carrée  fenêtres à meneaux ( propriété  privée).","habitants":"Jean Robert de Montlucet\"","divers":"Vestige de la tour de Montlucet, porte de Montjoyer et la maison forte de Calmette","gps":"","images":["../image/image_26/26_Montlucet_1.jpg","../image/image_26/26_Montlucet_2.jpg","../image/image_26/26_Montlucet_3.jpg"]},"Consult_chateau_formulairec2f6":{"id":"Consult_chateau_formulairec2f6","dept":"26","canton":"Chabeuil","commune":"Montmeyran","nom":"Montmeyran","type":"Vestiges","periode":"XI","histoire":"Montmeyran: Au Xe siècle castrum de Montemarrano, et Montmeyran signifie  \"jour de Vénus \" en occitan.  Au XIIe siècle, fief des comtes de Valentinois, un premier château fut détruit en 1217 par Simon de Montfort qui combattait l'hérésie et dut le reconstruire. Le fief fut inféodé par Louis II  le dernier des Poitiers, qui à son décès en 1419 fit un testament que les seigneuries d'Etoile, Upie et Montmeyran étaient cédées par le comte à Antoine de Clermont seigneur de Montoison (Branche des Poitiers), fut vendu sans faculté de rachat aux Conches, en 1543  (Controleur de Valence). \r\nLes Clermont récupérèrent en 1574 puis passe par héritage à Balthazar de Décimieux par son alliance avec Claudine de Clermont. En 1593 Antoine de Grolée, vend à Charles-Henri des Alrics de Cornihlan descendants de Catherine de Cornihlan (seigneur de Rousset).        En 1606 Anne des Alrics l'apporte par alliance à François Berton Baron de Crillon.                                  En 1780 Louis-Pierre Nolasque de Balbo de Crillon vend le fief à la Baronnie de Joseph de Starot de Saint-Germain (inspecteur général des postes).        La Révolution mettra fin à cette affiliation en même temps qu'a la vie de Saint-Germain.                       MONTALIVET: Construit au XIXe siècle de style  Néogothique par un bourgeois de la commune dénommé Neri ou Nery  originaire de Florence, réfugié dans le midi de la France, chassé par la dictature des Médicis,  un  de  ses  descendants  s'est  fixé  à Montmeyran pour être greffier de la communauté, puis notaire Royal. Le château passa au XVIIe siècle à la famille De la Lombardiére, aux Ban et aux Montalivet  et aux Bachasson ( Jean Pierre Bachasson, seigneur de Montalivet  ami et accompagnateur de Napoléon Bonaparte et maire de Valence), son fils Camille Baschasson Comte de Montalivet. Il décédera en 1823 la même année que son illustre compagnon. Le château toujours dans la famille.","architecture":"Du château qui était sur la colline construit au XII  e siècle, tombe aux mains de Simon de Montfort en 1217 qui le démoli. Il fut reconstruit en 1244 à la demande de Aymard III,  et à finalement été détruit en 1562 par les conflits du protestantisme; Du mur d'enceinte qui possédait cinq tours rondes, il ne reste que des vestiges des tours rondes.                      Montalivet; construit au XIXe Siècle en remplacement d'un pavillon de chasse du XVIIe siècle style louis XIII, corps de logis en équerre deux étages.","habitants":"Starot de St Germain\"","divers":"Vestiges de l'enceinte reste des bases de tours rondes,  château de Montalivet et Maison forte de Vaugelas","gps":"","images":["../image/image_26/26_Montmeyran_1.jpg","../image/image_26/26_Montmeyran_2.jpg","../image/image_26/26_Montmeyran_3.jpg","../image/image_26/26_Montmeyran_4.jpg"]},"Consult_chateau_formulaire4fcf-2":{"id":"Consult_chateau_formulaire4fcf-2","dept":"26","canton":"Romans","commune":"Montmiral","nom":"Montmiral","type":"Vestiges","periode":"X","histoire":"Montmiral: Fief des Bressieux,  Aymar de Bressieux, épouse Jeanne de Clermont, le domaine arrive aux Clermont. en 1465, Montmiral est confisqué aux Clermont, puis leur est rendu en 1467 après une courte inféodation aux Dusie, et fut acheté en 1577 par Antoine Coste de Gabrielle de Montchenu-Beaussemblant, passe aux Fléard, le dernier mâle Alexandre Fléard est tué à Paris vers 1650 sans alliance ni postérité, les biens échouent chez les Clermont-Tonnerre, que ces derniers revendent chez les Mistral qui obtinrent en 1710 la nomination de Montmiral en marquisat, peu de temps après chez les Emé de Marcieu par alliance avec Françoise-Gabrielle en 1715 et  qui en seront les derniers seigneurs jusqu'à la Révolution. Acquis ensuite par monsieur Fabien Vincent.","architecture":"A 488 m d'altitude  tour carrée de  douze  mètres de haut, côté de huit  mètres et  mur épais de deux mètres  entouré d'un fossé en partie comblé, c'est tout ce qu'il reste du château construit au  Xe siècle.","habitants":"famille Emé de marcieu\r\nFamille Fabien Vincent\"","divers":"Tour de Montmiral","gps":"","images":["../image/image_26/26_Montmiral_1.jpg"]},"Consult_chateau_formulaire0863":{"id":"Consult_chateau_formulaire0863","dept":"26","canton":"Crest","commune":"Montoison","nom":"Montoison","type":"Vestiges","periode":"XII","histoire":"Montoison: Au XIIe siècle propriété des Comtes de Valentinois et du Diois, les du Pouzin acquirent en 1201 dont il prirent le nom de Montoison et cette famille s'éteignit en 1350 chez les Clermont de Montoison et que les descendants conservèrent   cette seigneurie jusqu'à la Révolution.","architecture":"Il reste du château et du village fortifié quelques vestiges (pans de murs et porte) remparts sur lequel s'appuie  à l'intérieur un bâtiment de dépendance, reconstruit au XVIIIe siècle.","habitants":"Famille de Clermont de Montoison\"","divers":"Vestiges du village fortifié","gps":"","images":["../image/image_26/26_Montoison_1.jpg","../image/image_26/26_Montoison_2.jpg"]},"Consult_chateau_formulairea2da":{"id":"Consult_chateau_formulairea2da","dept":"26","canton":"Crest","commune":"Plan-de-Baix","nom":"Montrond","type":"Maison forte","periode":"XV","histoire":"Montrond: Pierre Paul Alexandre de Montrond seigneur de Plan de Baix, major des villes et tour de Crest, chevalier de l'ordre royal et militaire de Saint-Louis. Lieutenant de régiment  en  1734, blessé à la jambe( amputé ) dut quitté l'armée en 1745 fut arrêté par erreur lui et sa femme condamné à un an de prison à la tour de Crest pour avoir simplement toléré la présence d'un temple protestant sur son domaine , c'était en 1745, le château fut livré au pillage, ne pouvant survivre à ce grand malheur ils en moururent. leur fils Paul de Montrond recevra une pension de compensation lui même officier passa au service de l'impératrice de Russie où il servi avec distinction pendant 18 ans.\r\nLe château durant la révolution fut pillé par les habitants, reconstruit au XIXe siècle.","architecture":"Construit au XVe siècle par les seigneurs de Baix, deux corps de logis en équerre, flanqué de deux tours rondes à toits réduits dont une à mâchicoulis.","habitants":"Famille d'Alexandre de Montrond\"","divers":"Château de Montrond","gps":"","images":["../image/image_26/26_Montrond_1.jpg","../image/image_26/26_Montrond_2.jpg"]},"Consult_chateau_formulaire4f01":{"id":"Consult_chateau_formulaire4f01","dept":"26","canton":"St-Paul-les-Trois-Châteaux","commune":"Montségur-sur-Lauzon","nom":"Montsegur_sur_Lauzon","type":"Vestiges","periode":"X","histoire":"Montségur construit au XIe siècle par les Templiers,  était le fief des princes d'Orange de la maison des Baux, et par eux hommage aux comtes de Provence (1257), puis aux Pape (1292), fit ensuite partie de la baronnie des comtes de Grignan, Giraud  Adhémar, puis en 1316 Guillaume, en 1352 son fils Giraud, en 1419 aux Gaucher baron de Grignan attribuait Montségur pour douaire à Diane de Montfort son épouse, en 1506 à Louis Adhémar qui donna tous ses biens aux duc de Guise. Retour dans la famille des Adhémar en 1609 Louis Adhémar de Monteil seigneur de Montségur gendre de madame de Sévigné un de ses petit-fils, laissa une succession si embarrassée qu'il fallut vendre les différents biens de la baronnie et en 1729 Jean-Raymond  de Villardi Comte de Quinson chevalier  achète Montségur et Colonzelle, en 1732 et en 1739 les Felix du Muy acquiert des seigneurs de Grignan, est reconstituèrent à leur profit l'ancien comté du même nom, mais le château n'était pas habité en 1706 il fut en ruine.","architecture":"Du château du Xe siècle, dominant le village, il ne reste que les vestiges des remparts qui font par endroits corps avec la roche.","habitants":"Famille des Adhémar de Monteil\r\nfamille de Villardi de Quison\"","divers":"Vestiges du château de Montségur sur Lauzon","gps":"","images":["../image/image_26/26_Montsegur_sur_Lauzon_1.jpg","../image/image_26/26_Montsegur_sur_Lauzon_2.jpg","../image/image_26/26_Montsegur_sur_Lauzon_3.jpg","../image/image_26/26_Montsegur_sur_Lauzon_4.jpg"]},"Consult_chateau_formulaire3294":{"id":"Consult_chateau_formulaire3294","dept":"26","canton":"Chabeuil","commune":"Montvendre","nom":"Montvendre","type":"Château","periode":"XIII","histoire":"Montvendre; Le village était bâti au pied d'une colline où  se dresser un château fort avec des remparts, (castrum Montis Vénéris qui signifiait Mont de Vénus ). \r\nC'est en 1183 avec Humbert de Montvendre que commence l'histoire de ce village.  Puis devient propriété de l'évêque de Valence. En 1311 Montvendre est envahi par les mercenaires D'Arnaud du Peloux.                          VILLEPLAT: En 1690, appartenait aux Ventevon et en 1730 aux Savary de Bièvres et fut acquit vers 1750 par les Starot de Saint-Germain qui s'en qualifièrent de seigneur; la fille de Joseph Starot ; Adélaïde amie de Bonaparte. Aujourd'hui ; exploitation privée.","architecture":"Le château féodal fut détruit suite aux guerres du XIIIe siècle, ainsi que les remparts dont il reste la porte de Florence du XIIIe siècle et un nouveau château a été reconstruit au XVe siècle  par les évêques de Valence.\r\nCorps de logis flanqué d'une tour ronde et d'une tour carrée.","habitants":"Humbert de Montvendre.                Evêques de Valence\"","divers":"Château  et maison forte de Villeplat, de Riousset","gps":"","images":["../image/image_26/26_Montvendre_1.jpg","../image/image_26/26_Montvendre_2.jpg","../image/image_26/26_Montvendre_3.jpg","../image/image_26/26_Montvendre_4.jpg","../image/image_26/26_Montvendre_5.jpg"]},"Consult_chateau_formulairec5ef-2":{"id":"Consult_chateau_formulairec5ef-2","dept":"26","canton":"Grand-Serre","commune":"Moras-en-Valloire","nom":"Moras_en_Valloire","type":"Vestiges","periode":"XII","histoire":"Moras en Valloire: Fief des comtes d'Albon, en 1364 passa aux Roussillon et en 1466 appartenait à Louis Bâtard de Bourbon, en 1522 aux Beaumont des Adrets, en 1571 aux Boyvin de Villars, enfin en 1574 les Murat acquirent au domaine dalphinal avec les terres de Lentiol et de Vinay qui furent érigées en marquisat et resta dans cette famille jusqu'à la Révolution. Dans la commune le château de Perouze: Construit au XVIIIe  siècle par la famille de Beaumont.","architecture":"Du château médiéval détruit en 1634 sur ordre de Richelieu, il ne reste presque plus rien mis à part quelques vestiges de murs et de tours sur une motte, ainsi que des vestiges de remparts. \r\nNous pouvons admirer  dans le village la maison du gouverneur de style renaissance (1592) du colonel d'Ornano, la maison Quarrée (hôtel de ville), ancienne gendarmerie à cheval à l'origine demeure des Murat de Lestang et deux portes fortifiées du XV: la porte médiane et la porte inférieure. Perouse style Napoléon III du XVIIIe siècle.","habitants":"Famille Murat de Lestang\"","divers":"Vestiges dans village de Moras et château de Pérouse. Dans la commune voisine St-Sorlin le château de la Broconnerie.","gps":"","images":["../image/image_26/26_Moras_en_Valloire_1.jpg","../image/image_26/26_Moras_en_Valloire_2.jpg","../image/image_26/26_Moras_en_Valloire_3.jpg","../image/image_26/26_Moras_en_Valloire_4.jpg","../image/image_26/26_Moras_en_Valloire_5.jpg","../image/image_26/26_Moras_en_Valloire_6.jpg"]},"Consult_chateau_formulaire4636":{"id":"Consult_chateau_formulaire4636","dept":"26","canton":"Bourdeaux","commune":"Mornans","nom":"Mornans","type":"Vestiges","periode":"XI","histoire":"Mornans: Fief des comtes du Diois, qui fut la propriété des Galons qui s'éteignit aux XIVe siècle et reprit par les Mornans, Raymond de Mornans paraît avoir quitté la région en 1418 passa  aux Clermont, noble Antoine de Clermont, seigneur de Montoison en fit hommage  dés 1473 aux Blayn et  les  Marcel  Blayn furent les derniers seigneurs jusqu'à la Révolution.","architecture":"De ce château qui fut détruit aux XVIIe siècle servit de tour de guet et en 1904 le tremblement de terre en fit tomber une grande partie, aujourd'hui il ne reste que des pans de murs d'un donjon, d'une tour et quelques pans de murs d'enceintes.","habitants":"Famille Marcel Blayn\"","divers":"Vestiges du château de Mornans","gps":"","images":["../image/image_26/26_Mornans_1.jpg","../image/image_26/26_Mornans_2.jpg","../image/image_26/26_Mornans_3.jpg"]},"Consult_chateau_formulaireeb52":{"id":"Consult_chateau_formulaireeb52","dept":"26","canton":"La Motte-Chalencon","commune":"La Motte-Chalencon","nom":"Motte_Chalencon","type":"Vestiges","periode":"XII","histoire":"La Motte-Chalencon: Fief des seigneurs de Bourdeaux en 1286, était partagé en 1315 entre les Artaud et les d'Eurres, puis l'ensemble repassa en 1590 aux Moreton de Chabrillan , puis passa en 1627 aux la Motte Laval, dont l'héritière se maria chez les Chastellard, en 1760 leur appartenait et conservèrent le domaine jusqu'à la Révolution.","architecture":"Il ne reste que quelques vestiges de remparts dans le village.","habitants":"Famille de Chastellard\"","divers":"Vestiges du château à la Motte-Chalencon","gps":"","images":["../image/image_26/26_Motte_Chalencon_1.jpg"]},"Consult_chateau_formulaire287b":{"id":"Consult_chateau_formulaire287b","dept":"26","canton":"St-Donnat-sur-l`Herbasse","commune":"Chavannes","nom":"Mouchet_Chavannes","type":"Château","periode":"XI","histoire":"MOUCHET:  Ancien fief de la baronnie de Clérieu, appartenait en 1327 à une famille de ce nom, et en 1344 aux Crochis, qui le tenait d'un mariage avec les Berlion et que remplacèrent dés 1408 les Poitiers Saint-Vallier. \r\nInféodé à François  de Lemps  en 1422, qui s'éteignirent en 1554 chez les D'Izerand, héritiers de ces derniers, vers 1686, les Rostaing, Louis-Charles  de la Beaume qui le tenait de sa mère Marie Alix de Rostaing,  vend en 1755, le Mouchet aux Rey, François Rey  qui en était seigneur à la Révolution. \r\nFrançois Ier y séjourna ainsi que Diane de Poitiers. Il fut la propriété de Monsieur Galland en 1840 et s'ajouta une longue liste de propriétaires. Racheté en 2005 par un promoteur qui entrepris des travaux de rénovations, puis repris par une Lyonnaise ambassadrice à l'étranger qui le fait occupés par des locataires.","architecture":"Mouchet; Château bâtie sur des vestiges anciens, façade renaissance, en forme de U  mais semble remonter du XIe siècle; tour carrée en angle,  corps  de logis  rectangulaire  à l'intérieur flanqué de tours rondes escaliers médiéval avec ouvertures gothique, une aile ouest prolongée de communs, une aile à l'est. Remanié au XVII -XVIIIe siècle.","habitants":"Famille des Poitiers\r\nFamille des Claveyson\r\nFamille Rostaing\"","divers":"Château Mouchet","gps":"","images":["../image/image_26/26_Mouchet_Chavannes_1.jpg","../image/image_26/26_Mouchet_Chavannes_2.jpg"]},"Consult_chateau_formulaire0c03":{"id":"Consult_chateau_formulaire0c03","dept":"26","canton":"Romans","commune":"Mours-St-Eusébe","nom":"Mours Saint-Eusébe","type":"Maison forte","periode":"XV","histoire":"La tour de Chaleyre où \"Chalaire\" qui entre 1450 et 1455  fut le haut lieu du Dauphiné puisque le Dauphin Louis II futur Roi Louis XI y rédigea plusieurs actes de Gouvernement et y résida à plusieurs reprises. Cette bâtisse fut occupée pendant près d'un siècle par les Ursulines, puis propriété de la communauté de Sainte Marthe de Romans,( Aujourd'hui privée).","architecture":"Chaleyre; maison forte munit  d'un donjon  carré bien conservé  de 14 mètres de haut sur 6 à 7 mètres  de large couvert d'un toit à quatre pans. Bouchardière;","habitants":"Louis XI\"","divers":"Tour de Chaleyre\r\nChâteau de la Bouchardière \r\nManoir des Balmes","gps":"","images":["../image/image_26/26_Chaleyre_1.jpg","../image/image_26/26_Chaleyre_2.jpg","../image/image_26/26_Chaleyre_3.jpg"]},"Consult_chateau_formulaire7eef":{"id":"Consult_chateau_formulaire7eef","dept":"26","canton":"St-Vallier","commune":"Mureils","nom":"Mureils","type":"Vestiges","periode":"X","histoire":"MUREILS: Fief des évêques de Vienne et de l'ancien fief des barons de Clérieu, appartenait en 1293 aux Moirans, qui le revendirent aux Alleman, Ceux-ci furent remplacés vers 1336 par les Beaumont, qui cédèrent en 1341 Muriels aux Dauphins, et les Dauphins rétrocédèrent ce domaine aux Comtes de Valentinois  ( Poitiers Saint-Vallier)  qui le vendirent aux Châteauneuf, l'héritage de ses derniers étant échu aux Alleman dans le commencement du XVe siècle, et peu de temps après les Claveyson ayant acquis ce domaine, il passe par alliance aux d'Hostun en 1440, et en 1615 aux Lionne qui revendirent aux Tournon , derniers seigneurs de Mureils.                   BRETONNIERE: Ce château, ancienne maison forte, qui fut possédée par les Alleman, passa ensuite en 1490 par alliance aux Clermont-Chaste, Bertrand de Clermont Chaste reçut en 1621 de son oncle  (Charles d'Hostun de Claveyson seigneur de Muriels il en fit hommage au roi l'année suivante), le petit-fils de Bertrand joseph Louis de Clermont-Chaste vendit en 1679 à Jean Baptiste Bovet-d'Arier, son beau-frère, juge mage, fils d'un professeur à Valence, marié en 1730 à Claude Rostaing, officier de cavalerie qui la laissèrent en 1730 aux Rostaing-Champ-Ferrier qui peu de temps avant la Révolution le vendirent à la famille de Monsieur Nublat. Le président du gouvernement Léon Blum y vécut.","architecture":"Du château de Mureils, il reste sur une motte castrale qu'un donjon quadrangulaire de pierre détruit aujourd'hui en mauvais état.       Bretonnière; château en équerre de style renaissance, flanquée de tours rondes sur les angles extérieurs et une tour heptagonal plein centre sur cour d'honneur, ces dernières sont à toits pointues.","habitants":"Seigneurs de Tournon\r\n        \r\n        \"","divers":"Vestiges de la tour de Muriels et château de Bretonnière","gps":"","images":["../image/image_26/26_Mureils_1.jpg","../image/image_26/26_Mureils_2.jpg","../image/image_26/26_Mureils_3.jpg"]},"Consult_chateau_formulaireae5c":{"id":"Consult_chateau_formulaireae5c","dept":"26","canton":"Nyons","commune":"Nyons","nom":"Nyons","type":"Patrimoine","periode":"X","histoire":"Nyons: Lorsque mourut Béranger  en 1032, à cette époque trois puissantes familles dans la région, les Barons de Mévouillon pour la vallée de l'Ouvèze et la région du Buis, les Barons de Montauban de la Haute Vallée de l'Aygues et en trois l'Abbaye de Saint-Cesaire:\r\nEn 1206 Dragonnet de Montauban intervient pour la défense de Nyons (décède en 1278).  Au traité de 1262 Nyons devient la capitale  des Baronnies. Il y avait un château féodal  à l'extrémité méridionale, un massif donjon qui prit plus tard le nom de \"Tour Randonne\". Dragonnet II seigneur de Montauban épousa la fille  du Baron de Mévouillon, leur fils Roselin de Lunel prit le pouvoir à la mort du père mais en 1294 il décéda. Son héritier Hugues de Adhémar de Lombers qui en 1302 vendit la Baronnie au dauphins Humbert Ier  qui fit construire le château-Dalphinal et le village fortifié existé déjà, et donna en apanage à son fils Guy qui prit le titre de baron de Montauban en 1314 et à sa mort à son frère Jean II .\r\nLa châtellenie fut confié à divers Vassaux, Jean Louvel, Tanneguy Duchâtel, Jean Baptiste de Macedoine, César de Canteline, puis Louis XI qui supprima la cour Delphinale et rattacha Nyons au vice Bailly de Bais. Les guerres de religion se déclenchèrent en 1572 jusqu'en 1578 où  Richelieu fit démanteler le château . En 1595 René de la Tour Gouvernet racheta Nyons où il fit construire la citadelle sur les hauteurs en 1604 mais les conflits continuèrent jusqu'en 1633, Louis XIII fit démolir l'ensemble Château citadelle et remparts, l'épidémie de la peste en 1630 n'arrangeat pas les choses, un gouverneur fut nommé Pierre III de la Tour du Pin Gouvernet lieutenant des armées royales qui mourut en 1692, puis  à cette époque se créa une municipalité qui bénéficie de tous les droits seigneuriaux  qui durera jusqu'à la révolution. à cette date le château était habité par les seigneurs Duclaux.\r\nCHANTEYRIE; château du XIIIe siècle remanié au cours des ans jusqu'au XVIIIe siècle,il a appartenu à la famille de Bruyère, famille de militaire dont plusieurs membres ont de haut faits d'armes à leur actif. Des de Bruyère, passa aux Corréard Dupuy la Marne est à la famille de Vernejoul. aujourd'hui orienté vers la viticulture.","architecture":"Du premier château Féodal dit  \"châteauvieux\" construit sur le sommet au XIe siècle il ne reste plus que la tour Randonne, tour de 8 mètres de côté 10 mètres de haut et des murs de 2 mètres d'épaisseur, une citadelle fut construite sur le plateau du Guard au XIVe siècle ainsi qu'un château Dalphinale construit au XIIIe siècle, de l'ensemble il reste deux tours circulaires et la tour centrale de cette Maison forte, deux tours dans les remparts, portes et passages voûtés. Le tout fut vendu à la ville, mais en 1852 Monsieur Francou curé de Nyons racheta pour éviter le pillage des pierres fut revendu au Consorts Roussa  Barnouin qui géra tous les biens. Madame Chardon-Dratz commença à partir de 1962 une restauration partielle, la partie restaurée a pris le nom de Château-vieux qui comprend l'ancienne tour sarrasine et quatre tours asymétriques.","habitants":"Famille Beranger\r\nFamille Duclaux\"","divers":"Château féodal de Nyons avec remparts\r\nChâteau de la Chanteyrie","gps":"","images":["../image/image_26/26_Nyons_1.jpg","../image/image_26/26_Nyons_2.jpg","../image/image_26/26_Nyons_3.jpg","../image/image_26/26_Nyons_4.jpg","../image/image_26/26_Nyons_5.jpg","../image/image_26/26_Nyons_6.jpg"]},"Consult_chateau_formulaire1076":{"id":"Consult_chateau_formulaire1076","dept":"26","canton":"Grignan","commune":"Le Pégue","nom":"Pegue_le","type":"Village fortifié","periode":"XI","histoire":"Le Pégue: Fief des  comtes de Valentinois et de l'arrière fief des évêques de Die,  appartenant en 1237 aux Mévouillon qui le tenait des Clérieu et que remplacèrent peu après par les Montauban,  passa en 1453 aux Montrond puis les Trobas qui le transmirent, vers 1420 aux Diez qui le revendirent en 1560 aux Alrics et en 1755 passa aux Armand de Blacons, ces derniers seigneurs.","architecture":"De ce village fortifié, il reste des tours d'angles d'habitation et de remparts, le château médiéval restauré dominant le village  et des bâtiments renaissances qui donne un charme féodal.","habitants":"famille des Armand de Blacons\"","divers":"","gps":"","images":["../image/image_26/26_pegue_le_1.jpg"]},"Consult_chateau_formulaire9b64":{"id":"Consult_chateau_formulaire9b64","dept":"26","canton":"Bourg-de-Péage","commune":"Barbieres","nom":"Pellafol","type":"Château","periode":"XII","histoire":"Pellafol: Fief des évêques de Valence et de Barbières, des Comtes de Valentinois ; mais à partir du XIIIe siècle,  ils eurent toujours les mêmes seigneurs, qui étaient en 1295 les Barnard, les Sassenages héritèrent et ceux-ci le donnèrent en 1338 aux Rochefort, qui eurent en 1349 pour héritier les Beaumont  et ensuite aux du Sauzey de la Croix. Le château fut détruit dés les premières guerres de religion.","architecture":"Vestiges du château de Pellafol dont il ne reste que des pans de murs du donjon pentagonal.","habitants":"famille des Barnard\"","divers":"","gps":"","images":["../image/image_26/26_Pellafol_1.jpg","../image/image_26/26_Pellafol_2.jpg","../image/image_26/26_Pellafol_3.jpg"]},"Consult_chateau_formulaire75bf":{"id":"Consult_chateau_formulaire75bf","dept":"26","canton":"Romans","commune":"Peyrins","nom":"Peyrins_Roux","type":"Vestiges","periode":"XII","histoire":"Roux: Après l'expulsion des Sarrasins, vers 960 Ismidon Prince de Royans, seigneur Lambert, de la famille des François descendant des comtes de Forez et des rois Burgondes,  s'empara du territoire de Peyrins, ce qui donna lieu plus tard à des contestations avec les moines de St-Barnard, ses voisins.  \r\nSuivant l'usage de l'époque il fit construire le château fort dit du  \"Roux\". qui fut hommagé  en 1262  aux Dauphins. Le futur Roi de France Charles V y a passé sa lune de miel en compagnie de la jeune Jeanne de Bourbon,  plus tard Humbert II  y fit étape pour chasser également et Louis XI y séjourna longuement à partir de 1447. Devenue domaniale à l'abandon du château, devient la propriété  du  seigneur de la Colombiére en 1521.\r\nUn nouveau château se construisit avec les pierres de l'ancien château qu' Henri IV fit don qui se terminera fin du  XVIIe siècle , les Colombiére qui s'éteignirent en 1573 céda aux de Morges en 1593, aux du Vaches qui s'éteignirent chez les Soffrey de Colignon, aux Coste et aux Lionne et eurent en 1715  pour héritiers les Chabriéres,  derniers seigneurs de Peyrins. Charles II de Chabriéres Officier, ses biens ne furent pas vendu et c'est par sa soeur marié a un comte de Sallmart que le château prit le nom. Et les filles de la comtesse de Mouxy de Loche qui hérita des pierres et les attraits du vieux châteaux de Roux.\r\nAu XXe siècle dernière propriétaire des vestiges du château Jacqueline Deville, fille de Monsieur Jehan de Sallimard.    SALLMART: Soffrey de Colignon, chancelier de Navarre, l'un des rédacteurs de l'édit de Nantes, devenu seigneur  de Peyrins , après son mariage avec Claudine du Vaché,  fit construire à l'est du village un château au XVIe siècle.\r\nles Chabriéres de la Roche le transmirent aux Sallmard de Ressis fut transformé en maison de Vacances, aujourd'hui habitations populaires.","architecture":"Roux; Du château  dominant le village, tombait à l'abandon au XVIe siècle il ne reste que des pans de murs.           Salmart; Corps de logis rectangulaire flanqué  en façade d'un fronton triangulaire, et d'un escalier en fer à cheval,d'une façade de cinq fenêtres  sur cette dernières et de deux ailes en saillie  avec corniches arrondies.","habitants":"Famille du seigneur de la Colombiére\r\nFamille de Soffrey de Colignon\r\nFamille de Salmart\"","divers":"Vestiges du château \"Roux\" \r\nChâteau de  Salmart\r\nManoir du Gatelet\r\nChâteau des Hirondelles ex Condillac aujourd'hui maison de retraite.","gps":"","images":["../image/image_26/26_Peyrins_Roux_1.jpg","../image/image_26/26_Peyrins_Roux_2.jpg","../image/image_26/26_Peyrins_Roux_3.jpg","../image/image_26/26_Peyrins_Roux_4.jpg","../image/image_26/26_Peyrins_Roux_5.jpg"]},"Consult_chateau_formulaire4b02":{"id":"Consult_chateau_formulaire4b02","dept":"26","canton":"Crest","commune":"Piegros-la-Clastre","nom":"Piegros","type":"Château","periode":"XIII","histoire":"Piegros: De style médiéval et renaissance construit par les comtes du Valentinois au XIIIe siècle. L'inféodèrent en 1338 aux Poitiers,  lesquels le revendirent en 1528 aux Sauvain du Cheylard, aux Lers puis aux Clerc de Devéze ces derniers seigneurs.  Fort éprouvé par les guerres de religion, presque détruit  à le rénover.","architecture":"Fort éprouvé pendant les guerres de religion, presque détruit, aujourd'hui  bien restauré. A reprit son allure médiéval avec son donjon avec une toiture 4 pans sur piliers flanqué de dépendances et d'une tour ronde et chapelle.","habitants":"famille Sauvain,\r\nFamille Huot\"","divers":"Château médiéval de Piegros","gps":"","images":["../image/image_26/26_Piegros_1.jpg","../image/image_26/26_Piegros_2.jpg","../image/image_26/26_Piegros_3.jpg"]},"Consult_chateau_formulaire1319":{"id":"Consult_chateau_formulaire1319","dept":"26","canton":"Pierrelatte","commune":"Pierrelatte","nom":"Pierrelatte","type":"Vestiges","periode":"XII","histoire":"PIERRELATTE: Fief des comtes de Provence qui acquirent en 1156 et fut partagé entre plusieurs co-seignueurs  en 1211, les Pierrelatte, les Saint-Just, les saint-Pasteur, les Sérignan, Les Boucoirans, les Vétulus et l'évêque de Saint-Paul-Les-Trois-Châteaux.           En 1296, les Beaumonts et les Cornillan avaient remplacé les Boucoiran et les Vétulus. Enfin, en 1450, le Dauphin Louis XI, qui tenait des Barons de Montauban certains droits, acquit du Pape, des Audigier, des Moreton et des d'Eurre abandonna aux Crussol et à Gabriel de Bernes. En 1489, Pierrelatte fut encore viagèrement donné a Villeneuve puis vendu sans faculté de rachat, aux Galéas de Saint-Séverin  en 1523, deux ans après aux Raymond et  en 1543, aux Escolin des Aimars, ceux-ci se substituèrent, en 1602, la communauté de Pierrelatte elle-même, de cette communauté se rétrocéda, en 1653 ses droits seigneuriaux au prince de Conty, qui le vendit en 1783 aux comtes de Provence, le futur Louis XVIII, qui fut le dernier seigneur de Pierrelatte. En Juin 1832 le roi Louis-Philippe fit halte à Pierrelatte et fit un discours. Dans la commune la gentilhommière de  BEL; fut la propriété des Nicolay qui furent seigneurs de Bel, le fief vendu en 1426 par Jean de Brissac à Jean de Maroan, Jean Digoine achète le domaine, passa ensuite à leurs descendants les De-Vernaet les Plessis de Pouzillac, aujourd'hui à monsieur Morin descendant des Digoine.  \r\nDALGONNE; construction de l'Empire dirigée par Monsieur Rambaud  dans un style Pompei, la propriété fut successivement celle du marquis de Boisset, du général Couston, toujours dans la famille.                      MEAS: La famille tient son nom d'une importante propriété qu'elle possédait sur la colline de Montjau, elle a tenu un rôle politique dans ce pays à chaque génération. Noël-Joseph Madier de Montjau fils de Charles Seigneurs des Méas ( 1754-1830 ) Né à Bourg St-Andéol avocat et conseillé du roi, premier consul de Bourg-St-Andéol, en 1789, député aux états généraux de 1789 et à l'assemblée  constituante, déporté comme royaliste au 18 Fructidor, membre des cinq cents, anoblie en 1814. Noël-Joseph-Paulin Madier de Montjau (1785-1865) fils du précédent né à Bourg-St-Andéol auditeur au conseil d'état conseiller à la cour de Nimes. En 1813 procureur général de Lyon après 1830 député de Largentiére; son fils fut Noël François-Alfred  Madier de Montjau (1814-1892) L'homme de la statue né à Nimes, avocat représentant le peuple en 1848 pour la Saône. Exilé en Belgique après le coup d'état de 1851 conseillé général et député de la Drôme en 1874 questeur à la chambre. Il passait au Méas le temps que lui laissaient les vacances parlementaires.  FAVEROLLES: Au XIe siècle fief de Guillaume Armard, la propriété  au XIIIe siècle  appartenait aux seigneurs de Pierrelatte descendant des Rois de France en  autre  Louis le Dauphin , le futur Roi Louis XI. \r\nDe 1654 à 1758 à Stanislas Xavier Capet frère du Roi, futur Louis XVIII, en 1758 une partie vendu à Eymard  Baron de  Faveyrolles( préfet de corse sous l'empire) fait construire le château en 1827-8  pour sa femme dont le visage en médaillon orne la cheminée de la salle de réception.  Le domaine de Faveyrolles est partagé en deux parties; Eymard Caron vend la deuxième partie appelait les \"blachettes\" en 1796  au sieur Chalbet  médecin  à Paris. \r\nEn 1833  Henriette Caron  qui n'était autre que la femme du  Baron Eymard racheta  les Blachettes  et l'appela  le petit Faveyrolles, le domaine reconstitué, Eymard Caron revendit le tout en 1844 au Rouveure Zacharie qui  le revendit au Broet demeurant à Paris. En 1953 les deux Châteaux et leur Parc furent acquis par un certain docteur André Doutard de paris qui en fit une maison de repos , mais qui ne dura pas. En 1961 le commissariat à l'énergie atomique devint propriétaire , et aujourd'hui le T.G.V. les a de nouveau séparés.  (information  par syndicat d'initiative).","architecture":"Du château de Pierrelatte il ne reste que le rocher qui servait d'appui à cette forteresse au centre de la ville construite sur accord de Louis XI  Propriété  du Dauphins, elle  fut détruite en partie de  1562 à 1577 par le barons des Adrets et  puis terminé en 1633 , car il était utilisé comme logement de la garnison d'un châtelain miséreux  et en 1648 une grande inondation détruit une partie des murailles de l'enceinte puis servit de carrière de pierres.                  Meas; gentilhommière, quadrangulaire à deux étages et attiques, sur corps de logis la partie centrale encadrée de pilastres à refend, est surmontée d'un fronton triangulaire de style classique  sur corps de logis, dépendances formant la cour d'honneur, bâtiment construit au XVIIe siècle","habitants":"Louis XVIII\"","divers":"De la forteresse il ne reste qu'une partie de la tour ronde. la gentilhommière de  Bel, de Méas, de la Dalgone et château de Faverolles","gps":"","images":["../image/image_26/26_Pierrelatte_1.jpg","../image/image_26/26_Pierrelatte_2.jpg","../image/image_26/26_Pierrelatte_3.jpg","../image/image_26/26_Pierrelatte_4.jpg","../image/image_26/26_Pierrelatte_5.jpg","../image/image_26/26_Pierrelatte_6.jpg","../image/image_26/26_Pierrelatte_7.jpg"]},"Consult_chateau_formulaire1d53":{"id":"Consult_chateau_formulaire1d53","dept":"26","canton":"Chatuzange-le-Goubet","commune":"Pizancon","nom":"Pizancon","type":"Château","periode":"XVI","histoire":"Pizancon: \"Pizanticus\" propriétaire du grand domaine à l'époque gallo-romaine sur actuel de Bourg de Péage et la commune de Chatuzange le Goubet qui appartenait ensuite aux chanoines de Saint-Barnard, puis au Dauphin Louis II, et à Louis XI qui l'a transmis à la couronne. Scindée en deux fiefs, le premier \"parerie delphinale\" revint à Lambert François de Royans, aux seigneurs de Chabeuil et aux barons de la Tour qui obtiennent du roi que le fils du souverain porte le titre de Dauphin de France. Le second fief appelé \"parerie poitevine revint à Guillaume de Clérieux et fut vendu en 1374 aux seigneurs de Poitiers Saint-Vallier qui firent bâtir leur château fort. \r\nRéunification en 1467  grâce à Louis XI qui accorde aux Poitiers la parerie Delphinal mais divisé ensuite en 1542, la parerie delphinale passa à la famille de Vauljerges, aux des Beauvieu  puis aux Créqui.                                 La parerie poitevine fut acquise en 1595 par Jean de la Croix-Chevrières, ses descendants réunifièrent les pareries en 1655 et prendront le titre de marquis  de Pizançon.\r\nLes La Croix-Chevrières  firent détruirent les deux châteaux primitifs et remplaça celui de Pizançon par une vaste demeure qui fut pillée et incendiée à la Révolution de 1793, de nouveau démoli et remplacé en 1804 par le château actuel, considéré à la fin du second empire comme la résidence la plus agréable de Romans. A la mort du dernier des de la Croix-Chevrières le château fut vendu à la Congrégation de Sainte Marthe qui y installa une école de Notre-Dames-des-champs, vendu ensuite en 1925 aux forces motrices du Vercors et en 1946 passa à l'EDF pour loger leurs agents pour la construction du barrage jusqu'en 1971, laissé à l'abandon , et acheté par Jacky Tuech en 1976 qui a entreprit sa remise en état.","architecture":"Construit au XIXe siècle Château quadrangulaire en forme de U , corps de logis deux pavillons saillants, il fut incendié en 1793 et reconstruit en 1804.","habitants":"Famille de La croix de Chevriéres, \r\nFamille de Tuech\r\n        \"","divers":"Château de Pizançon","gps":"","images":["../image/image_26/26_Pizancon_1.jpg","../image/image_26/26_Pizancon_2.jpg"]},"Consult_chateau_formulairea1c9":{"id":"Consult_chateau_formulairea1c9","dept":"26","canton":"Valence","commune":"Valence","nom":"Plovier","type":"Château","periode":"XV","histoire":"Plovier: Fief des évêques de Valence,  construit au XVe siècle,  par les seigneurs de Plovier, qui s'éteignirent vers la fin du XVIe siècle chez les Frères,  puis passa aux Debeaux; Jean de Beaux de Plovier seigneur du lieu, professeur en droit à l'université de Valence qui cette famille le possédait encore à la révolution, en rendit hommage des terres de Plovier en 1798 à l'évêque de Valence . Le château fut construit en 1895 à l'emplacement de l'ancien.   Aujourd'hui centre médico-social pour enfants.","architecture":"Corps de logis rectangulaire flanqué de deux pavillons saillants, remanié de style Louis XIII.","habitants":"Famille des Beaux de Plovier\"","divers":"Château de Plovier","gps":"","images":["../image/image_26/26_Plovier_1.jpg"]},"Consult_chateau_formulaire7ca6":{"id":"Consult_chateau_formulaire7ca6","dept":"26","canton":"Bourdeaux","commune":"Poët-Célard","nom":"Poet_Celard","type":"Vestiges","periode":"XII","histoire":"cité en 1278 par l'écrit d'un curé  vendu à Aymar de Poitiers comtes de Valentinois au XIIIe siècle par Guiffrey de Châteauneuf époux de Catherine de Bourdeaux qui en hérite de son père Béranger de Bourdeaux. En 1376 le châteaux change de mains et est divisé en deux jusqu'en 1415 et en 1417 réuni de nouveau en un seul.\r\nEn 1415 et 1417  recouvrés par les comtes de Valentinois qui revendirent aux Clermont Montoison, puis passa aux Lancelot, Bâtard des Poitiers, qui remplacèrent dés 1464 racheté par Charles Blaïn pour en faire leur résidence principale que ses descendants le conservèrent jusqu'en 1830 date à laquelle la dernière comtesse le lègue au curé du village. Mais au XVIe siècle construisit le château  de Saint-André sur l'emplacement  de l'ancien, détruit en 1598  par les guerres de religion,  à la mort de Louis Blaïn en 1598 (Capitaine protestants très actif  lors d'un combat avec Gouvernet), sans enfant, l'héritier sera son neveu Louis de Marcel seigneur de les Blaïn qui abandonna  le château pour  le Saint-André et en 1830  la Comtesse de Blaïn lègue les ruines  de l'ancien château au curé du village.","architecture":"Site fortifié avec des dimensions importantes de 90 mètres dans la plus grandes longueur et 60 mètres au plus large. A partir de 1830 le château tombé en ruines et a servi de carrières de pierres.Racheté par divers organisme SLEA- ADCAVL  pour la rénovation. Aujourd'hui propriété de la commune, Géré par SCIC qui en assure la mise en valeur","habitants":"Famille de Blaïn\"","divers":"Vestiges du château. Dans la commune le château de Saint-André (Voir article)","gps":"","images":["../image/image_26/26_Poet_Celard_1.jpg","../image/image_26/26_Poet_Celard_2.jpg","../image/image_26/26_Poet_Celard_3.jpg"]},"Consult_chateau_formulaire78ff":{"id":"Consult_chateau_formulaire78ff","dept":"26","canton":"Dieulefit","commune":"Poët-Laval","nom":"Poet_Laval","type":"Vestiges","periode":"XII","histoire":"Poët Laval: \"Pogetum Vallis\"  Village perché et fortifié dominant la vallée du Jabron. Commanderie de l'ordre des Hospitaliers, qui créèrent l'installation du village autour des murailles du Château,  qui dépendait de seigneurs locaux et dont la vie fut étroitement liée à celle de ses seigneurs, à la fois des moines et soldats.\r\nLa fondation de Poët Laval est l'oeuvre de deux Grands-Maîtres de la région, Arnaud de Comps élu en 1163 et Bertrand de Comps en 1244, relevait  du Grand Prieuré de Saint-Gilles du Gard en 1187; Au XIVe siècle les Hospitaliers devenus les chevaliers  de Rhodes, puis les chevaliers de Malte au XVIe siècle qui sont responsable de la construction du donjon  et de l'église,  les guerres de religion affaiblirent et endommagèrent la commanderie.\r\nUn château dit du \"commandeurs\" fut construit au XVIe siècle de style renaissance flanqué de tours rondes en angle.\r\nChrysostome D'Agoult, dernier commandeur sera élu en 1736, mais la révolution ne lui permettra pas de maintenir le village en état et finiront par partir pour s'installer à Montélimar. Du château principal sera rattaché à la commune en 1987.                                    BROTIN: Fief des seigneurs de Falcon en premier lieu puis aux seigneurs de Poët Laval, formant aux XIIIe siècle un fief des Adhémar de Brotin chevalier  de  l'ordre de Saint-Jean-de-Jérusalem, commandeur de Poët-Laval dit Talabar en 1397, Dalmas de Brotin commandeur en 1486 et en 1570 Philibert de Brotin Chevalier de l'ordre du roi. En 1672 dépendait de Jean-Baptiste d'Urre, marquis de Montanègue, maître de camp du régiment de cavalerie du frère du roi et lieutenant général au gouvernement du Languedoc.","architecture":"Donjon de style Roman au sommet du village construit au XIIe siècle, qui fut agrandi au XVIe siècle d' un corps de logis important de style gothique et renaissance et d'un colombier. La chapelle  Saint-Jean-des-Commandeurs est surmontée d'une tour. Enceinte fortifiée  du village  avec  portes et tours.  Brotin; maison forte en forme de U reste  deux tours rondes arasées en façade.","habitants":"famille d'Arnaud de Comps\"","divers":"Poët Laval et sa commanderie et maison forte de Brotin","gps":"","images":["../image/image_26/26_Poet_Laval_1.jpg","../image/image_26/26_Poet_Laval_2.jpg","../image/image_26/26_Poet_Laval_3.jpg","../image/image_26/26_Poet_Laval_4.jpg","../image/image_26/26_Poet_Laval_5.jpg","../image/image_26/26_Poet_Laval_6.jpg","../image/image_26/26_Poet_Laval_7.jpg","../image/image_26/26_Poet_Laval_8.jpg"]},"Consult_chateau_formulaired40b":{"id":"Consult_chateau_formulaired40b","dept":"26","canton":"Rémuzat","commune":"Pommerol","nom":"Pommerol","type":"Vestiges","periode":"XII","histoire":"Pommerol: Fief des barons de Mévouillon, et de l'arrière fief des  abbés de l'ile Barbe, et fut inféodé aux Isoard en 1261, ceux-ci possédaient le domaine en 1305,  furent remplacés, 15 ans après par les Flotte, qui vendirent Pommerol aux Rivière et neuf ans plus tard,  ce domaine appartenait aux comtes de Provence, passait ensuite aux Beauvoir dans le début  du XVe siècle il fut ensuite possédé par les Baratier qui en dotèrent en 1586 une de leur fille mariée chez les Raymond-Modène, Pommerol échut ensuite chez les Grandis.","architecture":"De ce château il ne reste plus rien sinon un bâtiment moderne flanqué d'une échauguette.","habitants":"Famille de Grandis\"","divers":"Village de Pommerol avec motte féodale","gps":"","images":["../image/image_26/26_Pommerol_1.jpg","../image/image_26/26_Pommerol_2.jpg","../image/image_26/26_Pommerol_3.jpg"]},"Consult_chateau_formulairee1e9":{"id":"Consult_chateau_formulairee1e9","dept":"26","canton":"Die","commune":"Pontaix","nom":"Pontaix","type":"Vestiges","periode":"XI","histoire":"Pontaix: Fief  du domaine des Poitiers en 1221, qui l'ont rattaché à leur mandement de Quint en 1277. Ce château , qui constituait un obstacle difficilement contournable entre Die et Crest , connait plusieurs sièges et batailles au cours des guerres féodales . il reprend du service au cours des guerres de religion . Aussi démantelé par le duc de Mayenne au début des années 1580. il sert ensuite de carrière aux habitants du village.","architecture":"Du donjon du XIIIe siècle et du château de Perrachon , détruit à la fin du XVIe siècle, il ne reste que des vestiges, pans de murs.","habitants":"Seigneur de Quint\"","divers":"","gps":"","images":["../image/image_26/26_Pontaix_1.jpg","../image/image_26/26_Pontaix_2.jpg"]},"Consult_chateau_formulaire0047":{"id":"Consult_chateau_formulaire0047","dept":"26","canton":"Montélimar","commune":"Portes-en-Valdaine","nom":"Portes_en_Valdaine","type":"Maison forte","periode":"X","histoire":"Portes en Valdaine: Fief de la baronnie de la Garde Adhémar relevant en fief des comtes de Valentinois et inféodé en 1215 par les Adhémar aux Mirabel qui le possédé encore en 1320,  puis les Rac en 1380, retour aux Adhémar en 1427. Passé plus tard aux d'Eurre qui furent remplacés en 1573 par les Descluseau. Les Lattier en 1731 acquirent le domaine et le transmirent aux de la Garde, dernier seigneur.","architecture":"Du château  féodal,  il ne reste plus rien, mais une maison forte du XVIIIe siècle qui a dut jouer un rôle aux abords du village à appartenu à la famille des Estival au XIXe siècle, corps de logis rectangulaire flanqué de tours rondes.","habitants":"famille de la Garde\"","divers":"Maison forte de Portes en Valdaine","gps":"","images":["../image/image_26/26_Portes_en_Valdaine_1.jpg"]},"Consult_chateau_formulaire328c":{"id":"Consult_chateau_formulaire328c","dept":"26","canton":"Montélimar","commune":"Puygiron","nom":"Puygiron","type":"Château","periode":"XIII","histoire":"Puygiron: Fief de Giraud d'Adhémar dont le château dominait le village. Il passa entre les mains de grandes familles drômoises,  tel que les Saint-bonnet, les Rochefort, les Bésignan, aux Venterol, aux d'Enrote, aux Chéro, en 1445   à Michel de Valperge, puis aux Alleman en 1540 à Pierre Béranger, à Adrien de Béranger, à Alexandre de Vesc, seigneur d'Espeluche, par alliance le château passa vers 1685  à Charles II de Banne, celui-ci gardera le patrimoine jusqu'à la révolution. En 1786, par alliance passa par Paule-Lucrèce de Bannes à Jean-Charles-Frédéric du Port de Pontcharra, arrière-grand-père du comte Fernand de Pontcharra. Aujourd'hui d la famille de Degors.","architecture":"Construit XII-XIIIe siècle  de style renaissance, construction quadrangulaire, flanquée de  quatre tours rondes, fenêtres à meneaux, cour intérieure avec donjon restauré.","habitants":"Famille des de banne\r\nFamille des du Port de Pontcharra \r\nFamille de Degors\"","divers":"Château de Puygiron","gps":"","images":["../image/image_26/26_Puygiron_1.jpg","../image/image_26/26_Puygiron_2.jpg","../image/image_26/26_Puygiron_3.jpg"]},"Consult_chateau_formulaire64d9":{"id":"Consult_chateau_formulaire64d9","dept":"26","canton":"Die","commune":"Ste-Croix","nom":"Quint-Ste-Croix","type":"Vestiges","periode":"XII","histoire":"Quint Sainte-Croix: Au IXe siècle le village primitif se développa au bas du piton rocheux des tours du château appelé \"Château de Quint\" en 1166 Isoard  Suzerain, comte de Die,  en 1178  famille des Poitiers, comtes de Valentinois et en 1247 et 1285 famille des Quint. Le village se construisit  au XIe siècle au bas autour d'un prieuré, qui à l' époque était le fief des comtes de Valentinois et restèrent dans le fief du prieuré.","architecture":"Le château comprenait  trois tours sur le piton rocheux, aujourd'hui en ruines, construites au XIIe siècle elles furent détruites pendant les guerres de religion; la tour Sud était un donjon pentagonal, éperon plein, grand appareil à bossage rustique;  de 2 mètres d'épaisseur était de plan carré 10 x 9 mètres. La tour Nord Donjon quadrangulaire, joint à un corps de logis rectangulaire s'élevant sur deux niveaux : donjon couverture sur volatine à conduit simple, le corps de logis était rectangulaire 10x20 mètres.  La tour Est; tour quadrangulaire; grand appareil Archères, portes moulurées escalier en pierres de taille englobé dans un avant corps.","habitants":"famille de Quint\"","divers":"Vestiges du château sur motte féodale, monastère à Ste-Croix et fortifications à St-Julien en Quint","gps":"","images":["../image/image_26/26_Quint_1.jpg","../image/image_26/26_Quint_2.jpg","../image/image_26/26_Quint_3.jpg","../image/image_26/26_Quint_4.jpg","../image/image_26/26_Quint_5.jpg","../image/image_26/26_Quint_6.jpg"]},"Consult_chateau_formulaired536":{"id":"Consult_chateau_formulaired536","dept":"26","canton":"St-Vallier","commune":"Ratières","nom":"Ratieres_Tour","type":"Vestiges","periode":"XIII","histoire":"Tour-Ratières: Fief de l'église archi-épiscopale de Vienne par le seigneur Georges de  Moirans, qui vendirent en 1284 aux Alleman et Passa ensuite aux Bressieu, une héritière , s'alliant chez les Porte vers 1660 qui gardèrent le domaine jusqu'à la révolution. Le château fut détruit auparavant par les guerres de religion. reste une tour octogonale,  l'ensemble fut acheté par une communauté de Charmes sur l'Herbasse pour être rénové.","architecture":"De ce château il ne reste qu'une tour octogonale d'une hauteur de 15 mètres, qui était le donjon,  les fenêtres sont apparentes ainsi que des Bretèches. Traces de dépendances aménagées et citernes","habitants":"Famille de Bressieu\r\n        \"","divers":"Vestiges du château de Ratières","gps":"","images":["../image/image_26/26_Ratieres_tour_1.jpg","../image/image_26/26_Ratieres_tour_2.jpg"]},"Consult_chateau_formulaire5b6f":{"id":"Consult_chateau_formulaire5b6f","dept":"26","canton":"Dieulefit","commune":"Dieulefit","nom":"Rebaugere_Dieulefit","type":"Maison forte","periode":"XX","histoire":"Rebaugere-Dieulefit: Du château Rébaugère est aujourd'hui lieu de vacances du club méditerrané, mais Dieulefit possédait son Castrum en 1269 qui relevait du fief des Comtes de Valentinois et ensuite en 1332 de celui des Evêques de Die et aux Vesc de Comps qui acquirent en 1717 par l'ordre de saint-Jean de Jérusalem et dont l'héritage échut aux Moreton de Chabrillan derniers seigneurs de Dieulefit.","architecture":"Il reste quelques vestiges de l'enceinte médiévale. appelé la\" Vialle \" et une tour de l'horloge liée à l'enceinte du XVe siècle  surélevée au XVIe siècle.","habitants":"Famille de Morton de Châbrillan\"","divers":"Maison forte de la Ribaugère","gps":"","images":["../image/image_26/26_Rebaugere_Dieulefit_1.jpg"]},"Consult_chateau_formulaired45b":{"id":"Consult_chateau_formulaired45b","dept":"26","canton":"Luc-en-Diois","commune":"Recoubeau","nom":"Recoubeau","type":"Château","periode":"XVI","histoire":"Recoubeau: Cité en 1030, certainement construit au XIIIe siècle par les Evêques de Die,( suzerains) qui se le disputent avec le comte de Valentinois, passa  en 1220- 1241 à la famille D'Agoult, et en  1241 aux Artaud  d'Aix,  puis en 1276 aux Evêques de Valence.                       A partir de 1580 les propriétaires successifs seront; de Reynaud de Montauban, Jacques Férréol, De Sieyès, Geymard de Recoubeau, en 1775 de Montrond . Le dernier Allec , couvert de dettes, vend le château en 1929 aux Pères du Saint-Esprit, qui le revendirent en 1960 à la croix rouge pour en faire une maison de rééducation, ce Château a été fortement remanié en 1929.","architecture":"Corps de logis  de plan quadrangulaire, flanqué de quatre tours carrées d'angle, ce château fut remanié en 1929.","habitants":"Famille Reynaud,\r\nFamille d' Allec\"","divers":"Château de Recoubeau","gps":"","images":["../image/image_26/26_Recoubeau_1.jpg"]},"Consult_chateau_formulaireebe1-2":{"id":"Consult_chateau_formulaireebe1-2","dept":"26","canton":"Séderon","commune":"Reihanette","nom":"Reihanette","type":"Vestiges","periode":"XII","histoire":"Reihanette: Fief des Mévouillon et vendu au Dauphin  le 2 septembre 1317  , il fut une dernière fois hommagé aux Mévouillon le 24 septembre 1317 par Hugues de Bastet du Puy  et fut acquis en 1418 par les Adhémar,  en 1424 par les D'Agoult, il passa par alliance aux Justa en 1473, et l'héritage passa aux Glandevés  qui passa ensuite par alliance en 1570 aux le Peyre qui en dotèrent en 1605 à une de leur  fille mariée chez les Rolland qui conservèrent la seigneurie jusqu'à la Révolution.                             Le château fut détruit pendant les guerres de religion.","architecture":"Du château fort médiéval, il  ne reste que les bases du donjon et quelques éléments de remparts, e
