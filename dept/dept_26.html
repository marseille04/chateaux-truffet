nvahi par la végétation.","habitants":"Famille Rolland\"","divers":"Vestiges de Reilhanette","gps":"","images":["../image/image_26/26_Reilhanette_1.jpg","../image/image_26/26_Reilhanette_2.jpg","../image/image_26/26_Reilhanette_3.jpg"]},"Consult_chateau_formulaire994b":{"id":"Consult_chateau_formulaire994b","dept":"26","canton":"Nyons","commune":"Rémuzat","nom":"Remuzat","type":"Vestiges","periode":"XII","histoire":"Rémuzat: Fief des comtes de Provence, qui fut inféodé en 1260 par les Rosans et ensuite passa aux Cornillon, puis aux Artaud d'Aix en 1304, que remplacèrent dés 1380  les Grolée-Mévouillon, et ces derniers vendirent en 1615,  leurs droits aux la Tour Gouvernet,  par héritage passa aux Laval qui était les derniers seigneurs.","architecture":"Du château il ne reste qu'un pan de mur d'enceinte.","habitants":"famille de la Tour Gouvernet\"","divers":"Vestiges des fortifications de l'ancien village","gps":"","images":["../image/image_26/26_Remuzat_1.jpg"]},"Consult_chateau_formulairebbc0":{"id":"Consult_chateau_formulairebbc0","dept":"26","canton":"Tain-l`Hermitage","commune":"Roche-de-Glun","nom":"Roche_de_Glun","type":"Vestiges","periode":"XIII","histoire":"Roche de Glun: Fief des Clérieu, en 1333 légué aux comtes de Valentinois, puis acquit par les Dauphins,  passa en 1467  aux Poitiers Saint-Vallier, en 1547 aux Féronne, puis passa aux d'Arlod en 1596 et furent remplacé en 1615 par les Jomaron, dont l'héritière s'allia en 1658 chez les Barge qui passa aux  Grandis de Pommerol, ceux-ci dotèrent une de leur fille mariée chez les Isnard qui vendirent en 1774 aux La Grange derniers seigneurs de la Roche de Glun.          St-Georges: Manoir bâti sur l'emplacement d'un château qui  dépendait du prieuré de Bourg-les-Valence qui fut ruiné au XVIe siècle ce château renfermait une chapelle de 1771.","architecture":"De ce village féodal, il ne reste que des vestiges de remparts avec une belle porte fortifiée \" la porte de Roussillon\", qui remonte au XIVe siècle, et la tour dite de \"Diane de Poitiers\",  elle présente une façade renaissance ornée de fenêtres à meneaux , d'un linteau blasonné et d'habiles cordons  moulurés, du château il ne reste plus rien, un donjon fut bâti sur le rocher, ils permettait aux seigneurs d'exercer leur droit de péage sur les bateaux sur le Rhône, le  7 juillet 1248 Saint-Louis eut à subir les effets, fit arrêter le seigneur de la roche. Louis XI, puis Louis XIII et Richelieu le firent démanteler.\r\nEn 1832 les vestiges furent rasés pour faciliter la navigation.                St-Georges; construit au XIVe siècle,   remanié au XVIe Siècle  de style plaisance Louis XIII.","habitants":"Diane de Poitiers\"","divers":"Porte et tour à la Roche de Glun","gps":"","images":["../image/image_26/26_Roche_de_Glun_1.jpg","../image/image_26/26_Roche_de_Glun_2.jpg","../image/image_26/26_Roche_de_Glun_3.jpg","../image/image_26/26_Roche_de_Glun_4.jpg"]},"Consult_chateau_formulairebfa6-2":{"id":"Consult_chateau_formulairebfa6-2","dept":"26","canton":"Crest","commune":"La Roche-de-Grâne","nom":"Roche_de_Grane","type":"Vestiges","periode":"XI","histoire":"La Roche de Grâne: Fief des comtes de Valentinois au XIIe siècle, ces derniers donnèrent la seigneurie en 1289 aux Baix, puis  passa en 1381, aux du Puy de Rochefort , et fut acquise en 1628 par les Beaumont, les derniers seigneurs.","architecture":"de ce château reconstruit au XVIIIe siècle il ne reste que des vestiges d'enceinte et des bases de tours rondes.","habitants":"famille des Beaumont\"","divers":"Vestiges des remparts","gps":"","images":["../image/image_26/26_Roche_de_Grane_1.jpg","../image/image_26/26_Roche_de_Grane_2.jpg"]},"Consult_chateau_formulaire476d":{"id":"Consult_chateau_formulaire476d","dept":"26","canton":"Dieulefit","commune":"Roches-St-Secret","nom":"Roche_Saint_Secret","type":"Maison forte","periode":"XV","histoire":"Roches St-Secret: Construit au XVe siècle de style renaissance. La seigneurie dépend successivement : en 1277 des Montauban; en 1354 des Poitiers ; en 1377 des Guigues de Moreton ; en 1381 de Jacques , le bâtard des Poitiers; en 1428 des Faure de Bologne; en 1650 au marquis de Crochant et vers 1770 à Barthelemy Boisset d'Arpavon qui en sera le propriétaire même après la Révolution.                      BECONNE: Inféodé par le Dauphin en 1322 aux Comtes de Valentinois passait ensuite pour la moitié du château et l'autre partie à la baronnie des Montauban en 1478, passa ensuite aux Alleman qui seront les derniers seigneurs.                              BLACONS: C'est vers la fin du XVe siècle, que cette seigneurie appartenait en partie aux Forez et aux Vesc, ceux-ci vendirent leur part aux Faure , puis l'ayant rachetée en 1547 la revendirent aux Seguins, qui le léguèrent en 1563 aux Taulignan et aux Meilleuret dans le cour du XVIIe siècle. \r\nLa bâtie de Blacons passa aux Vesc de Beconne ses derniers seigneurs.","architecture":"Château à quatre tours rondes d'angles du du XVIe siècle                   Béconne: Edifice actuel du XIIe siècle, à 481 mètres d'altitude, aurait succédé à la Bastida, cette vaste enceinte abritait les maisons du village. \r\nL'enceinte de la forteresse, au plan quadrangulaire relativement  régulier de 45 m. x 46 m.x 48 m. x 56 m.  dans l'angle nord le donjon quadrangulaire qui domine, une tour d'enceinte quadrangulaire, l'ensemble est en ruine, détruit par les guerres de religions    Blacons; Construit à 540 mètres d'altitude, mentionné dés 1163 il ne reste que les vestiges d'un donjon de 7m30 de côté.","habitants":"Famille des faure de Bologne\r\nFamille de Boisset d'Arpavon\"","divers":"Maison forte de la Roche                Vestiges de Béconne                     Vestiges de Blacons","gps":"","images":["../image/image_26/26_Roche_Saint_Secret_1.jpg","../image/image_26/26_Roche_Saint_Secret_2.jpg","../image/image_26/26_Roche_Saint_Secret_3.jpg","../image/image_26/26_Roche_Saint_Secret_4.jpg","../image/image_26/26_Roche_Saint_Secret_5.jpg","../image/image_26/26_Roche_Saint_Secret_6.jpg","../image/image_26/26_Roche_Saint_Secret_7.jpg","../image/image_26/26_Roche_Saint_Secret_8.jpg"]},"Consult_chateau_formulaire5fe7":{"id":"Consult_chateau_formulaire5fe7","dept":"26","canton":"Buis-les-Baronnies","commune":"La Roche-sur-le-Buis","nom":"Roche_sur_le_Buis","type":"Vestiges","periode":"XII","histoire":"La Roche sur le Buis: Fief des barons de Mévouillon, qui passa par donation douze ans aprés, aux Artaud, qui en dotèrent en 1320 à une de leur fille mariée chez les Agout de Baux, puis rétrocédèrent aux Artaud, qui conservèrent ces biens jusqu'en 1676, date à laquelle un mariage fit passer la Roche-du-Buis aux mains des Pelletiers de Gigondas qui  revendirent le domaine douze ans aprés aux Artaud, lesquels vendirent en 1734 aux Caritat et qui fut revendu  en 1771 aux Ailhaud, les derniers seigneurs.\r\nEn 1580 le château fut détruit, par la guerre \"des paysans\" par les bandes armées du Sénéchal de Montélimar.","architecture":"De ce château fort médiéval sur un éperon rocheux dont il tire son nom, il ne reste que des vestiges d'un donjon ( importante tour carrée)  prolongée au sud par un corps de bâtiment rectangulaire, et des courtines.                              Une démolition complémentaire en 1974 a eu lieu pour des raisons de sécurité, il subsiste une enceinte de 7 à 8 mètres de Haut, une tour ronde de 3,70 mètres de diamètre au Nord et une base de tour au nord-est de 4,50 mètres et des murs de 0,70 mètres d'épaisseur.","habitants":"Famille d'Agout de Baux\"","divers":"Vestiges du château","gps":"","images":["../image/image_26/26_Roche_sur_le_Buis_1.jpg","../image/image_26/26_Roche_sur_le_Buis_2.jpg","../image/image_26/26_Roche_sur_le_Buis_3.jpg"]},"Consult_chateau_formulairedbd5":{"id":"Consult_chateau_formulairedbd5","dept":"26","canton":"Buis-les-Baronnies","commune":"Rochebrune","nom":"Rochebrune","type":"Vestiges","periode":"XII","histoire":"Rochebrune: Fief des Montauban, qui, possédé en 1313 par les Algoult de Mison, et fut donné en 1336 aux Dauphins, qui la cédèrent en 1341 aux princes d'Orange, Les Thollon récupérèrent l'ensemble des biens et en 1626, puis passa aux   Reynard de Saint-Julien , puis passa aux Agoult seigneur de Rochebrune et les Cordegio de Gioberti en 1789.","architecture":"Du château construit au sommet du village, il ne reste qu'une tour ronde et quelques traces de vestiges.","habitants":"famille de Cordegio de Gioberti\"","divers":"Vestiges du château de Rochebrune","gps":"","images":["../image/image_26/26_Rochebrune_1.jpg","../image/image_26/26_Rochebrune_2.jpg","../image/image_26/26_Rochebrune_3.jpg"]},"Consult_chateau_formulairee5ee":{"id":"Consult_chateau_formulairee5ee","dept":"26","canton":"St-Jean-en-Royans","commune":"Rochechinard","nom":"Rochechinard","type":"Vestiges","periode":"XII","histoire":"Rochechinard: La donation du château  féodal par l'abbaye de Léoncel à Guillaume de Rochechinard en 1174 laisse supposer son existence dès le XIIe siècle. En 1250 Arnaud de Guélin vend ce castrum  au Dauphins Guigues VI et Guigues VIII,  donne la seigneurie de Rochechinard à son écuyer Girin Curtet qui se dernier la revend  à Noble Aymard Alleman, fils du seigneur de Beauvoir en 1340. Les Alleman de Rochechinard, branche de l'illustre famille féodale dauphinoise, vont rester seigneurs jusqu'au milieu du XVIe siècle.Au XVe siècle, c'est un des leurs, Barrachi Alleman, qui reçut des mains de son oncle Charles, Chevalier de Rhodes, la charge de garder prisonnier dans son château le prince Djem, que les français appelèrent Zimzim. En 1547, le château changea de propriétaire, Claude Mosnier, son fils Roman Mosnier avait douze enfants , c'est le quatrième, Alphonse qui reçut le titre de seigneur de Rochechinard, mais n'habita pas le château, ainsi que son fils Alphonse II,  mort à Huningue en 1690 sans postérité. Le château commença à souffrir des occupations intensives pendant les guerres de religion, c'est donc depuis le XVIIe siècle que le château tomba en ruines. Un dénommé Barral récupéra le domaine sans le château.","architecture":"Fort ancré sur un éperon, au revers des monts du matin dans le Royans. Un donjon cylindrique du XIIe siècle se dressé au centre de l'ensemble castral. La tour des gardes défensive, irrégulièrement polygonale, construite à l'ouest au XVIe siècle, est posée sur le rocher.\r\nL'ensemble castral aujourd'hui en ruines  commence a être envahie par la végétation.","habitants":"famille d'Alleman \r\nfamille des Mosnier\"","divers":"Vestiges du château de Rochechinard","gps":"","images":["../image/image_26/26_Rochechinard_1.jpg","../image/image_26/26_Rochechinard_2.jpg","../image/image_26/26_Rochechinard_3.jpg"]},"Consult_chateau_formulaired8f8":{"id":"Consult_chateau_formulaired8f8","dept":"26","canton":"Montélimar","commune":"Rochefort-en-Valdaine","nom":"Rochefort_en_Valdaine","type":"Vestiges","periode":"XII","histoire":"Rochefort en Valdaine: Château cité au XIIe siècle, qui relevait du fief des Adhémar  et ensuite aux comtes du Valentinois que ces derniers transmettaient aux Taulignan en 1295, Bertrand de Taulignan devint seigneur de Rochefort en 1799, ses descendants   gardèrent le château  jusqu'au XVe siècle avant qu'il ne passe à la famille Dupuy originaire de Peyrins. Depuis  cette époque lointaine les descendants de ce podestat romain ont détenu de grands fiefs jusqu'au règne de Louis XI qui réunit tous les états du Dauphiné à la couronne de France.\r\nCes Dupuy-Rochefort joueront un rôle important pendant les guerres de religion avec François adversaire de son cousin, le Célébre Dupuy Montbrun, et resteront les seigneurs de Rochefort jusqu'à la révolution par la comtesse de Puy-Rochefort jusqu'en 1792, car son mari se trouvait à Saint-Dominique défendre ses plantations de canne à sucre. Les ruines actuelles appartiennent encore à la famille de la Baume du Puy Montbrun.","architecture":"De ce château construit au XIIe siècle, qui fut détruit en 1217 par Simon de Montfort, puis reconstruit, puis détruit à nouveau au XVe siècle ainsi que le village (Guerre des épiscopaux), seul le château est reconstruit  et tombe en ruines à partir de la révolution, bien que protégé il ne reste aujourd'hui qu'une enceinte ruinée et d'un donjon quadrangulaire qui a été consolidé en 1988.","habitants":"famille de la Baume du Puy Montbrun.\"","divers":"Vestiges du château de Rochefort en Valdaine","gps":"","images":["../image/image_26/26_Rochefort_en_Valdaine_1.jpg","../image/image_26/26_Rochefort_en_Valdaine_2.jpg","../image/image_26/26_Rochefort_en_Valdaine_3.jpg","../image/image_26/26_Rochefort_en_Valdaine_4.jpg","../image/image_26/26_Rochefort_en_Valdaine_5.jpg"]},"Consult_chateau_formulaire0b79":{"id":"Consult_chateau_formulaire0b79","dept":"26","canton":"Bourg-de-Péage","commune":"Rochefort-Samson","nom":"Rochefort_Samson_St_Genie","type":"Vestiges","periode":"XI","histoire":"Rochefort-Samson-St-Genie: Fief des comtes de Valentinois, puis au XIIIe siècle aux Pelloux qui s'éteignirent en 1325 chez les Beaumonts, ceux- ci furent seigneurs de Rochefort Samson jusqu'en 1443. Réunie au domaine Dalphinal , cette seigneurie fut engagée en 1467 aux Poitiers-Saint-Vallier, en 1473 aux Saint-Priest  et enfin vendue aux Sauvain du Cheylard. Rochefort Samson passa en 1573 aux Bocsozel puis  aux Manteau qui le cédèrent vers 1598 aux Lattier, et ces derniers furent remplacés vers 1623 par le président Frère, qui acquit des Beaumont certains droits prétendus par eux sur cette seigneurie laquelle, dès 1739 aux mains des Michel du Sozey de la Croix, derniers seigneurs.","architecture":"Du château féodal appelé aussi château de \"Saint  Génis\",  il ne reste  que des vestiges de murs assez important sur un rocher dominant la Vallée.","habitants":"famille de Michel de Sorey de la Croix\"","divers":"Vestige du château de St-Génie","gps":"","images":["../image/image_26/26_Rochefort_Samson_St_Genie_1.jpg"]},"Consult_chateau_formulairee16d":{"id":"Consult_chateau_formulairee16d","dept":"26","canton":"St-Paul-les-Trois-Châteaux","commune":"Rochegude","nom":"Rochegude","type":"Château","periode":"XII","histoire":"Rochegude: En 1235 on connait un Draconet de Rochegude, puis un Guillaume de Mondragon, puis Hugues de Caderousse et en 1260 un Himbert de Rochegude, en 1348 Guillaume des Baux, sa femme  veuve  vend à Jean de Montagu en 1402, en 1446 Alzias de Cavaillon en devient propriétaire et c'est Béatrix de Saussac veuve de Bernardin de Cavaillon qui en hérite  et passa à ses enfants Erasme  plus tard à Almaric mariè à Marguerite de Nicolaï, Marie Faure de Boulogne , héritière de Marguerite porta la seigneurie à Etienne de Mantin, d'une famille de Normandie qu'elle avait épousé; celui-ci vendit en 1656 à Barthélémy de Mantin son parent puis vendu à M.de Raffelis de Soissan et à M. Arnoul qui revendirent en 1667 à Jacques Broccard seigneur de la Garde-Férréol deux tiers des terres de Rochegude. Pierre Charles d'Arnoul qui avait gardé le château, capitaine aux gardes françaises et brigadier des armées du roi seigneur de Rochegude en 1727  le vendit au  marquis Pierre-Jacques-Joseph d'Aquéria d'Avignon (premier consul d'Avignon) et en 1743, les d'Aqueria de Rochegude le revendirent au  comte Hector de Béarn, en 1790 suite à la mort de ses deux fils la comtesse de Guilhermier hérita du château. Monsieur Galibert en fit l'acquisition en 1965 pour en faire une hôtellerie de luxe.","architecture":"Du château primitif, qui remontait au XIIe siècle il fut grandement endommagé, remanié au XVIe siècle et en partie reconstruit au XVIIe siècle, corps de logis rectangulaire flanqué d'un donjon carré  du XIIe siècle  à mâchicoulis et tourelles à créneaux, vestiges autour du château et portes dans le village.","habitants":"Famille de Galibert\"","divers":"Château de Rochegude","gps":"","images":["../image/image_26/26_Rochegude_1.jpg","../image/image_26/26_Rochegude_2.jpg","../image/image_26/26_Rochegude_3.jpg","../image/image_26/26_Rochegude_4.jpg"]},"Consult_chateau_formulaire0b61":{"id":"Consult_chateau_formulaire0b61","dept":"26","canton":"Loriol-sur-Drôme","commune":"Livron-sur-Drôme","nom":"Rolliere","type":"Maison forte","periode":"XVII","histoire":"Rolière(la):Sur les hauteurs de Livron maison forte du XVe siècle construite par les Evêques de Valence érigèrent en fief pour les Lancelin de la Rolière.  Nicolas Lancelin anobli en 1591 vint se retirer dans sa maison forte qui deviendra le château de la Rolière. Jean Antoine  Lombard seigneur de la Rollière en 1671 et cette famille en était encore propriétaire à la Révolution, en 1824 Armand-Pierre-Alfred Blanc-Montbrun (agronome) qui planta le vignoble, puis revendit le domaine à Monsieur Albert Argod en 1900, est revendu de nouveau  en 1937 à Monsieur Louis photographe valentinois. Le château fut transformé en collège et orphelinat pendant la Seconde Guerre mondiale et en 1955 à la famille Croze, et racheté par Monsieur Maurice Marchal en 1975 directeur du port autonome de Strasbourg qui se reconverti à sa retraite  en exploitant agricole principalement viticole (Brézéme) d'où la construction d'une cave en 1995.  Aujourd'hui par alliance à  Monsieur Duvert.","architecture":"La Rollière, maison forte du XVe siècle, sur les collines de Livron, composé d'un corps de logis à trois étages flanquée de trois  tours rondes, plus dépendances (caves). Remanié en château.","habitants":"Famille Lancelin\r\nFamille de Maurice Marchal\"","divers":"Château de la Rollière","gps":"","images":["../image/image_26/26_Rolliere_1.jpg","../image/image_26/26_Rolliere_2.jpg","../image/image_26/26_Rolliere_3.jpg","../image/image_26/26_Rolliere_4.jpg","../image/image_26/26_Rolliere_5.jpg"]},"Consult_chateau_formulaire3597":{"id":"Consult_chateau_formulaire3597","dept":"26","canton":"Romans","commune":"Romans","nom":"Romans Chaze","type":"Manoir","periode":"XIX","histoire":"CHAZE: Appartient à la ville de Romans, était la propriété de Charlotte Chazé Premier, Romans: Style empire bourgeois,  construit  par Edouard  PREMIER,  fils de Monsieur François Premier Industriel. Style empire; Construit en 1900\r\nAujourd'hui établissements scolaire.   BON-VALOIN-MEILLEUX","architecture":"Corps de logis rectangulaire, toit mansardé,  flanquée d'une tour carrée à toit pointu.","habitants":"famille Chazé\"","divers":"Manoir de Chazé, château premier, Saint-Barnard, la tour Jacquemart le manoir de Bon-Valoin-Meilleux","gps":"","images":["../image/image_26/26_Chaze_1.jpg","../image/image_26/26_Chaze_2.jpg","../image/image_26/26_Chaze_3.jpg","../image/image_26/26_Chaze_4.jpg","../image/image_26/26_Chaze_5.jpg","../image/image_26/26_Chaze_6.jpg","../image/image_26/26_Chaze_7.jpg","../image/image_26/26_Chaze_8.jpg","../image/image_26/26_Chaze_9.jpg"]},"Consult_chateau_formulaire4ad8":{"id":"Consult_chateau_formulaire4ad8","dept":"26","canton":"Grignan","commune":"Roussas","nom":"Roussas","type":"Vestiges","periode":"XII","histoire":"Roussas: Fief de comtes du Valentinois et de l'arrière fief des de Pape, appartenant dans la seconde moitié du XIIIe siècle, partie aux Décan d'Uzes et partie aux Adhémar, et sur laquelle les abbés d'Aiguebelette avaient des droits, qu'ils partagèrent avec les comtes de Provence en 1281.\r\nLa portion des Adhémar, qui forma plus tard, avec une partie de la Garde Adhémar, celle des Granges Gontardes , appartenait en 1334  aux Gontard et en 1476 aux Moreton. Tandis que celle des Décan d'Uzes passa par alliance vers 1540 aux Beaumont et fut ensuite hérité par les Duplan qui vendirent aux Escalin, mais il est a remarquer que les Franchessin acquièrent une partie de ce Domaine en 1565. En tout cas les Escalins furent presque aussitôt remplacés par les Martinel qui étaient seigneur de Rousas conjointement avec les Chapuis en 1645 et qui eurent pour successeurs les Perissol, dont l'héritière s'était allié en 1690 chez les Philibert et qui vendirent en 1755 aux Berthet ces derniers seigneurs. Actuellement propriété d'André Morel.","architecture":"Du village fortifié,  il reste quelques traces des remparts et du château une tour quadrangulaire agrandi au XVIIe siècle.","habitants":"famille d'Escalins\"","divers":"Vestiges du château féodal de Roussas","gps":"","images":["../image/image_26/26_Roussas_1.jpg","../image/image_26/26_Roussas_2.jpg","../image/image_26/26_Roussas_3.jpg","../image/image_26/26_Roussas_4.jpg","../image/image_26/26_Roussas_5.jpg"]},"Consult_chateau_formulairef01c":{"id":"Consult_chateau_formulairef01c","dept":"26","canton":"Grignan","commune":"Rousset-les-Vignes","nom":"Rousset","type":"Château","periode":"XII","histoire":"Rousset: Fief de la seigneurie des Rousset au XII-XIIIe siècle, aux XVe passa aux Diez qui s'éteignirent en 1494 chez les Alric affilié aux Simiane.   Une partie du domaine appartenait aux Bastard de la maison des Poitiers que les Alric acquirent avant de passer au XVIe siècle aux Vincens, puis aux Marcel et aux Vescs, ils obtinrent du Pape Alexandre VIII   l'attribution de Rousset en marquisat, qu'il laissèrent en 1723 aux Durand de Pontaujard, et ceux-ci eurent en 1755 pour héritiers les Armand de Forest, les derniers seigneurs.","architecture":"Construit au XII-XIII e siècle par Alric marquis de Rousset; de style gothique, peu remanié, à une partie prise dans les soubassements d'une tour de guet datant du Moyen-Age.","habitants":"famille Alric\"","divers":"Château de Rousset les Vignes","gps":"","images":["../image/image_26/26_Rousset_1.jpg","../image/image_26/26_Rousset_2.jpg","../image/image_26/26_Rousset_3.jpg","../image/image_26/26_Rousset_4.jpg","../image/image_26/26_Rousset_5.jpg"]},"Consult_chateau_formulaire908a":{"id":"Consult_chateau_formulaire908a","dept":"26","canton":"Rémuzat","commune":"Sahune","nom":"Sahune","type":"Vestiges","periode":"XII","histoire":"Sahune: Fief qui appartenait en 1231 aux Ancezune et en 1249 aux Adhémars , qui en firent hommage aux Dauphins, puis le restituèrent aux Ancezune. Ceux-ci unirent alors cette seigneurie à celle d'Arpavon, Curnier, Montréale et  Marsoin,  formèrent le tout en baronnie qu'ils léguèrent en 1336 aux Dauphins, lesquels vendirent en 1341 Sahune aux princes d'Orange de la maison des Baux, ceux-ci  dotèrent en 1389 de cette baronnie la femme de Juel Rolland puis l'ayant recouvrée la laissèrent en 1501, aux Poitiers d'Allan dont une fille, marièe chez les Pape-Saint-Auban en 1545, eut Sahune pour dot, enfin en 1739 cette seigneurie passa par alliance encore, aux Bivard  qui la vendirent en 1763 aux Pourcet, ces derniers seigneurs.","architecture":"Du château de Sahune il ne reste que des vestiges .","habitants":"famille Pourcet\"","divers":"Vestiges du château","gps":"","images":["../image/image_26/26_Sahune_1.jpg","../image/image_26/26_Sahune_2.jpg","../image/image_26/26_Sahune_3.jpg"]},"Consult_chateau_formulaire116d-2":{"id":"Consult_chateau_formulaire116d-2","dept":"26","canton":"Crest","commune":"Saou","nom":"Saou","type":"Vestiges","periode":"XI","histoire":"Saou que l'on prononce Sou, vient du mot celtique Sao qui veut dire traversé par un cours d'eau. Saou possédait le château du Roc puisqu'il était situé sur le roc.\r\nAu XIe siècle fief des comtes de Poitiers-Valentinois, puis firent partie du fief des Dauphins jusqu'en 1543, puis passa aux d'Eurre que remplaçèrent en 1569 les Blaïn de Marcel de Poët, et en 1638 par les Perrachon, dont les droits passèrent aux la Baume Pluvinel qui le vendirent en 1658 aux la Tour Gouvernet dernier seigneur de Saoû.\r\nLa forêt de Saou appartenait jadis à l'abbaye de Saints-Tiers, puis domaine delphinal en 1442. En 1772, le roi Louis XV  l'inféoda au chevalier Bonnefaud de Fresque qui le céda en 1781 à Falquet-Travail, et après plusieurs successions, elle fut la propriété, de 1850 à 1875 de monsieur Crémieux, avocat et ministre de la justice ce dernier fit construire un château aux façades de couleur rose appelé \"Villa Tibur\" château qui fut délabré incendié, il fut rasé en 1971,  (ne pas confondre avec château des Dauphins , voir article).                La forêt fut vendu à monsieur Forisier en 1905 à Monsieur Emorine en 1917 puis à Monsieur Burrus en 1924 qui lui fit également le château des Dauphins. A ce jour la forêt de Saou appartient au conseil général de la Drome.","architecture":"Le château coiffé le roc, imposant et surplombe le village, cité  au XIe siècle, était une garnison d'une quinzaine de personnes, on y accédait par 120 marches d'escalier,  il ne reste plus rien de ce dernier démoli au XVIe et miné au XXe siècle par sécurité. Le village actuel était fortifié,  il en reste un lourd portail et une tour carrée transformée en beffroi, il reste des vestiges du donjon roman  du prieuré de Saint-Etienne.\r\nDans la commune Manoir de Haulty, de style renaissance et le château dit du \"Dauphins\" en forêt (voir article)","habitants":"Seigneur de la Tour-Gouvernet\r\nSeigneurs Poitiers Valentinois\"","divers":"Village de Saou\r\nRocher du château \r\nManoir de Haulty","gps":"","images":["../image/image_26/26_Saou_1.jpg","../image/image_26/26_Saou_2.jpg","../image/image_26/26_Saou_3.jpg","../image/image_26/26_Saou_4.jpg"]},"Consult_chateau_formulaireaf66-2":{"id":"Consult_chateau_formulaireaf66-2","dept":"26","canton":"Loriol-sur-Drôme","commune":"Saulce-sur-Rhône","nom":"Saulce sur Rhône","type":"Maison forte","periode":"XIV","histoire":"Dans cette commune le château de Gazavel construit au XIVe siècle                 FREYCINET;La famille de Freycinet citée dés 1450, eu plusieurs branches, c'est Jean de  Saulce,  notaire à Valence qui acheta en 1623 le domaine de Freycinet, le château passa à son fils  Jacques  qui épousa Valenton Isabeau en 1714 et Pierre leur fils qui épousa Hortal Louise en 1747 ils eurent cinq enfants, Louis-Charles, Jacques-Henri, Louis, Eléonore, Elisabeth, et Anne-Madeleine, Louis né en 1751 hérita, il épousa Elisabeth Armand qui habitait au château de Clavel en 1776; Ils eurent six enfants Louis- Henri 1777-1840, Louis-Claude 1779-1842 Antoine 1781 Charles 1783-1821 Casimir 1787 et Charles Louis 1828-1923.\r\nDe ses six enfants deux furent marins Louis-Henri, comte amiral et gouverneur de l'Ile Bourbon (la Réunion), puis la Guyanne et la Martinique, nommé baron en 1827 épousa Clémentine Bérard, deux enfants Louis et Charles qui termineront leur carrière comme major général du port de Toulon et préfet maritime à Rochefort, tout deux épouseront deux soeurs Marie et Stéphanie Garnier de la Boissière.\r\nLouis-Claude fut capitaine de vaisseaux, membre de l'académie des sciences chevalier de Saint-Louis et commandeur de la légion d'honneur  devient administrateur de l'hôpital de Montélimar, puis président de l'administration départementale et maire de Montélimar, il avait épousé à Paris Rose-Marie Pinon. \r\nTOUR de VERE; fief des Adhémar: puis les Donzére de 1296 à 1489;  les Baïle de 1489 à 1546  et de  1540 à la révolution, de Bannes. Depuis six générations la famille ardéchoise de Soubeyran de Saint-Prix, venant de Saint-Barthélémy le Pin est propriétaire de la tour.","architecture":"Gazavel château construit au XIVe siècle, remaniée au XVIe siècle et au XIXe siècle en une forteresse de style féodal avec deux tours rondes crénelées à mâchicoulis et deux tourelles également crénelées, belle porte renaissance.                   Freycinet; Corps de logis rectangulaire moderne (privé).                       Tour-de-Vère \"Tour de Voir\" poste de Guet, qui devient une maison forte au cours des siècles. Au donjon ont été raccordés les bâtiments qui délimitent la cour intérieure, une tour heptagonale, ornée d'une porte et trois fenêtres renaissance renferme un escalier à vis de 89 marches donnant accès au donjon primitif. sur le corps de logis principal, la façade de 1832 a un style Louis Philippe.","habitants":"famille de Freycinet\"","divers":"Château de Gazavel, de Freycinet, et la tour de Vère.","gps":"","images":["../image/image_26/26_Saulce_sur_Rhone_1.jpg","../image/image_26/26_Saulce_sur_Rhone_2.jpg","../image/image_26/26_Saulce_sur_Rhone_3.jpg","../image/image_26/26_Saulce_sur_Rhone_4.jpg","../image/image_26/26_Saulce_sur_Rhone_5.jpg","../image/image_26/26_Saulce_sur_Rhone_6.jpg"]},"Consult_chateau_formulairea673":{"id":"Consult_chateau_formulairea673","dept":"26","canton":"Marsanne","commune":"Sauzet","nom":"Sauzet","type":"Château","periode":"XII","histoire":"Sauzet: Seigneurie, qui comprenait deux communautés de Sauzet et de Saint- Marcel-les-Sauzet, fut le fief des Adhémar, qui cédèrent en 1365  leurs droits  aux Pape,  et fut tout d'abord possédée par les Artaud  d'Aix, qui le revendirent en 1296 aux comtes de Valentinois ( les Poitiers  qui firent construire le château) ceux-ci  le léguèrent à l'état de la France  en 1419,   la seigneurie fut vendue aux Hostun en 1447,  puis vendue à nouveau aux Galeas de Saint-Servin en 1521 et aux Moreton de Chabrillan en 1537; aux D'Albert en 1573  et aux Armand du Forez en 1591, et il  fut compris  dans le duché du Valentinois, créé en 1641 pour les Grimaldi de Monaco et en ont joui jusqu'à la Révolution.","architecture":"Du château du XIIe siècle, il ne reste que des ruines et quelques maisons  renaissances  remaniées  dans ce village.","habitants":"Famille des Grimaldi de Monaco\r\n        \"","divers":"Vestiges du château de Sauzet","gps":"","images":["../image/image_26/26_Sauzet_1.jpg","../image/image_26/26_Sauzet_2.jpg","../image/image_26/26_Sauzet_3.jpg","../image/image_26/26_Sauzet_4.jpg"]},"Consult_chateau_formulaire1066":{"id":"Consult_chateau_formulaire1066","dept":"26","canton":"Marsanne","commune":"Savasse","nom":"Savasse","type":"Vestiges","periode":"XII","histoire":"Savasse: Gonzague de Monts de Savasse, il faut remonter à l'origine de la maison dans le comté d'Asti ou les Monts étaient les seigneurs de Vigliano parcourt de la famille à Toulouse et à Carcassonne jusqu'à la fin du XIVe siècle avant qu'elle se fixe à Montélimar suite au mariage de Sébastien de Monts avec Marguerite de Castellane.\r\nEn 1252 Raymond des Baux, prince d'Orange possédait cette seigneurie et celle de Châteauneuf de Mazenc la passa à Aymar de Poitiers,  comtes de Valentinois, et Lambert Adhémar de Monteil seigneur de la Garde.  Elle fut la trente huitième paroisse de la Valdaine où les comtes de Valentinois installèrent une cour de Justice qui fut transféré à Montélimar en 1449, cette seigneurie passa cette même année par héritage aux  rois  Dauphins, la seigneurie fut gérée par la famille Marcel puis les Monts vers 1550 et passa en 1642 dans le duché des Valentinois, qui la transférèrent en 1645 au Prince de Grimaldi.                             SERRE-de-PARC:  Au XIVe siècle maison forte qui appartenait aux Peyrolles dans le XVe siècle passa par alliance aux Monts,  et fut acquis vers 1709 par la famille de Geoffres de Chabrignac, en 1849, le baron de Souville  l'acheta et le laissa à son neveu de Creuzenack en 1915, puis passa à la famille Béranger encore propriétaire en 1970.","architecture":"Le château de Savasse construit au XIIe siècle par les comtes de Valentinois, fut détruit en Juin 1394. Il reste de ce village fortifié la porte et  la tour du Rhône , remparts et la porte Chastin du XIVe siècle.                         Serre-de-Parc; de style Louis XVI, construit  vers 1780 corps de logis quadrangulaire à toit plat, fronton sur façade.","habitants":"Famille des Lambert \r\nFamille des Adhémar\"","divers":"Vestiges des fortifications et château de Serre de Parc","gps":"","images":["../image/image_26/26_Savasse_1.jpg","../image/image_26/26_Savasse_2.jpg","../image/image_26/26_Savasse_3.jpg","../image/image_26/26_Savasse_4.jpg"]},"Consult_chateau_formulaireeddb-2":{"id":"Consult_chateau_formulaireeddb-2","dept":"26","canton":"St-Vallier","commune":"Albon","nom":"Senaud","type":"Château","periode":"XV","histoire":"Senaud: Au XVe siècle était le fief des Poitiers, passa vers la moitié du XVIe siècle aux de Buisson et passe ensuite aux D'Izerand, Antoine qui épousa Gasparde de la porte de Bocsozel eut deux enfants le premier Agathange d'Tserand fut seigneur de Senaud;  cette famille forma trois branches, celle des seigneurs du Mollard, celle du seigneur du Mouchet et celle de Senaud, Blanche d'Izerand dernière représentante de cette famille.\r\nLe château fut légué vers la fin du XVIIIe siècle aux hospices de Vienne. Racheté par le  comte d'Armagnac de Castenet dont la descendance est toujours propriétaire. Aujourd'hui camping et golf de renommé international.","architecture":"De style Louis XIII, construit au XVe Siècle;  remanié  au  XVIIe siècle, corps de logis rectangulaire flanqué de deux gros pavillons  aux extrémités, toiture ornée de lucarnes à fronton.","habitants":"Famille du Comte d'Armagnac\"","divers":"Château de Senaud","gps":"","images":["../image/image_26/26_Senaud_1.jpg","../image/image_26/26_Senaud_2.jpg"]},"Consult_chateau_formulairea07d":{"id":"Consult_chateau_formulairea07d","dept":"26","canton":"Tain-l`Hermitage","commune":"Serves-sur-Rhône","nom":"Serves_sur_Rhone","type":"Vestiges","periode":"XI","histoire":"Serves sur Rhône: Fief des Dauphins, qui y avaient leurs  ateliers monétaires en 1237, inféodé  en 1248 aux Turey de Limons , cette seigneurie était en partie aux mains des Claveyson dès 1360, les droits des Claveyson, léguèrent en 1429 le tout aux Mitte de Miollans , ceux-ci vendirent en 1604 Serves aux la Croix Chevrières, seigneurs de saint Vallier qui s'en qualifièrent de barons.          Dans la commune le château de FONTAGER;  maison forte citée en 1654, fief du comte de Vals, qui le passa aux Gruel qui l'on conservé jusqu'en 1715 et passa en héritage aux Chastellard qui le conservèrent jusqu'à la Révolution, ensuite ce château a été acheté en 1997 par un groupe de loisirs \"Danois Land\" et Leisure S.A. et dernièrement  par le groupe automobile\" M. L.\" qui après restauration (travaux qui s'achèveront en 2001) une partie est réservée à l'hôtel restaurant gastronomique géré par Alexandre Lecomte.","architecture":"Serves sur Rhône; de la forteresse il ne reste que quelques tours rondes,  des vestiges de remparts et courtines, des remaniements continuent pour la création d'une habitation.                 Fontager; architecture du XIXe siècle Style plaisance, construction du XIXe siècle, corps de logis quadrangulaire flanqué de tours rondes et carrées.","habitants":"Famille des seigneurs de la croix de Chevriéres, \"","divers":"Château de Serves sur Rhône et de Fontager","gps":"","images":["../image/image_26/26_Serves_sur_Rhone_1.jpg","../image/image_26/26_Serves_sur_Rhone_2.jpg","../image/image_26/26_Serves_sur_Rhone_3.jpg","../image/image_26/26_Serves_sur_Rhone_4.jpg","../image/image_26/26_Serves_sur_Rhone_5.jpg","../image/image_26/26_Serves_sur_Rhone_6.jpg"]},"Consult_chateau_formulaire876e-2":{"id":"Consult_chateau_formulaire876e-2","dept":"26","canton":"Grand-Serre","commune":"St-Bonnet-de-Valclrérieux","nom":"Solage","type":"Château","periode":"XIII","histoire":"Solage: Les seigneurs de Saint Bonnet de Valclérieux, était au XVIe siècle les Montrigaud , en 1540 les Bressieu, Au XVIII e siècle les Chaponay en étaient les propriétaires par alliance avec la comtesse Ysabelle de Monteynard, fille de Amédée Arthénulfe, vicomte de Monteynard  1813-1886 et de Amici Marie Julie de Chaponay,  passa donc  au  Monteynard, et au Solages qui eurent deux enfants, l'aîné héritier décède à la guerre en 1915, le deuxième Evêque de Toulouse, à sa mort  en fait don à l'Evêché de Valence qui devient un couvent des frères Espagnols, un couvent des soeurs de Jésus, un sanatorium pour déficients mentaux et une maison de retraite, puis fut utilisé pour colonie de vacances.\r\nAujourd'hui acquit par une SCI pour échanges interculturels (Stages séminaires colloques). Famille Berthot.","architecture":"La construction de ce château remonte au XIIIe siècle par une maison forte, confirmé par les fondations; remaniée à la fin du XIXe siècle dans un style renaissance.","habitants":"famille de Chaponnay \r\nFamille de Solage\r\n        \"","divers":"Château de Solage","gps":"","images":["../image/image_26/26_Solage_1.jpg","../image/image_26/26_Solage_2.jpg"]},"Consult_chateau_formulaire39e8":{"id":"Consult_chateau_formulaire39e8","dept":"26","canton":"Crest","commune":"Soyans","nom":"Soyans","type":"Vestiges","periode":"XII","histoire":"Soyans: Fief des comtes du Valentinois, qui donnèrent la seigneurie à Guillaume, Bâtard des Poitiers,  puis elle fut confisquée en 1464 pour être donnée aux d'Eurre,  mais l'héritage fut recueilli à nouveau par les Poitiers-Saint-Vallier qui la revendirent, en 1540 aux Clermont, et ceux-ci la revendirent à Diane de Poitiers en  1548  dont les héritiers la cédèrent en 1592 aux du Mas qui furent remplacés par les La-Tour Gouvernet qui obtinrent en 1717 l'attribution de Soyans en Marquisat dont il furent les derniers seigneurs jusqu'à la Révolution.","architecture":"Du château au sommet d'un rocher, qui fut remanié en 1530  par les Poitiers-Saint-Vallier, il  a  subit d'énormes  dégâts pendant les guerres de religion  et en 1796 il fut pillé et incendié.   Il ne reste que des ruines importantes.","habitants":"Diane de Poitiers\"","divers":"Vestiges du château","gps":"","images":["../image/image_26/26_Soyans_1.jpg","../image/image_26/26_Soyans_2.jpg","../image/image_26/26_Soyans_3.jpg"]},"Consult_chateau_formulaire9102":{"id":"Consult_chateau_formulaire9102","dept":"26","canton":"St-Vallier","commune":"St-Barthélémy-de-Vals","nom":"St-Barthélémy de Vals","type":"Château","periode":"XVII","histoire":"Marnas: Ancien prieuré de l'ordre de Saint  Benoit et de la dépendance de Saint  Chaffre, fondé en 1058 par les comtes de Valentinois. (Privé)","architecture":"Corps de logis rectangulaire flanquait de double tourelle aux extrémités, la construction de ce château remonte au XVIIIe siècle.","habitants":"\"","divers":"Château de Marnas","gps":"","images":["../image/image_26/26_Marnas_1.jpg"]},"Consult_chateau_formulairee068":{"id":"Consult_chateau_formulairee068","dept":"26","canton":"Saillans","commune":"St-Benoit-en-Diois","nom":"St-Benoit_en_Diois","type":"Vestiges","periode":"XI","histoire":"Saint-Benoit en Diois: Fief des comtes de Valentinois, qui premièrement possédé par les Arnaud de Crest, fut hommagé par eux aux évêques de Die, en 1145,  acquit ensuite par les Prélats ,  passe en 1500 aux Poissieu, qui cèdent la seigneurie trente ans plus tard aux Grammont lesquels ont été seigneurs de Saint Benoit jusqu'à la Révolution.","architecture":"Du château féodal il ne reste que des vestiges, pans de murs d'enceintes, ce château a été détruit lors des guerres de religion.","habitants":"Famille de Grammont\"","divers":"Vestiges du château sur motte féodale","gps":"","images":["../image/image_26/26_St_Benoit_en_Diois_1.jpg"]},"Consult_chateau_formulairebf0d":{"id":"Consult_chateau_formulairebf0d","dept":"26","canton":"Bourdeaux","commune":"Poët-Célard","nom":"St_Andre (26)","type":"Château","periode":"XII","histoire":"St-André: Au XIIe siècle la seigneurie appartenait aux Saint- Martin principale famille noble de la région de Bourdeaux, en 1326 à Guillaume de Mornans et Aymond de Saint-Martin la récupère en guise de récompense de services rendus aux comtes Aymar de Poitiers en 1327. \r\nRattachée au mandement du Poët-Célard, passa aux Blaïn, qui utilisa le manoir d'époque comme pavillon de chasse avant de le faire reconstruire. La famille Blaïn le gardèrent jusqu'à la Révolution , et en 1806 il fut racheté par Joseph Antoine Blaïn du Poët.  Depuis le XIXe siècle , c'est la famille Blanc qui possède le château (privé). \r\nCe château reçut la visite de Calvin en 1561.","architecture":"Construit au XIIe siècle, reconstruit  remanié au  XVIe siècle par les de Blaïn. Corps de logis quadrangulaire flanqué de trois tours rondes en angles et d'un donjon carré orné d'une façade de style renaissance.","habitants":"famille Blaïn\"","divers":"Château de Saint-André","gps":"","images":["../image/image_26/26_St_Andre_1.jpg","../image/image_26/26_St_Andre_2.jpg","../image/image_26/26_St_Andre_3.jpg","../image/image_26/26_St_Andre_4.jpg","../image/image_26/26_St_Andre_5.jpg"]},"Consult_chateau_formulairef4cb":{"id":"Consult_chateau_formulairef4cb","dept":"26","canton":"St-Donnat-sur-l`Herbasse","commune":"St-Donnat-sur-l`Herbasse","nom":"St_Donnat","type":"Château","periode":"XIII","histoire":"Saint-Donat sur l'Herbasse: En 879, Boson , roi de Bourgogne, concéda le bourg de Saint-Donat et ses dépendances à l'Evêque , pour le récompenser de lui avoir accordé son suffrage au concile de Mantaille, où Boson fut élu roi , les  évêques de Grenoble le gardèrent jusqu'au passage de ces biens aux  Dauphins; la seigneurie passa ensuite aux Montuel en 1349, puis la comtesse Béatrix de Genève  faisait sa résidence à Saint-Donat et elle y termina ses jours en 1395 les  Saluces (descendant de la comtesse) puis les Barthenay en prirent possession, qui la revendirent aux Hostun ,  puis revendu aux Costes, puis rentra dans le comté de Charmes, érigé pour eux au mois de Novembre en 1652.","architecture":"Belle ensemble médiéval du château Delphinal  et monastique remanié sur une butte qui domine le village, il reste quelques remparts du XVe siècle.","habitants":"famille de la Comtesse Béatrix\r\n        \"","divers":"Château Dalphinal et manoir","gps":"","images":["../image/image_26/26_St_Donnat_1.jpg","../image/image_26/26_St_Donnat_2.jpg","../image/image_26/26_St_Donnat_3.jpg","../image/image_26/26_St_Donnat_4.jpg","../image/image_26/26_St_Donnat_5.jpg"]},"Consult_chateau_formulaire5a0e":{"id":"Consult_chateau_formulaire5a0e","dept":"26","canton":"Marsanne","commune":"St-Gervais-sur-Roubion","nom":"St_Gervais","type":"Château","periode":"XIV","histoire":"St-Gervais: Fief des comtes de Valentinois, qui appartenait en 1247 aux Cornilhon, puis passa par moitié  aux  commandeurs de Poët-Laval. L'autre moitié était en 1336 aux mains des Adhémar et passa vers 1430 aux Mévouillon  puis en 1540  passa aux d'Eurre , dont l'héritière s'allia en 1595 chez les Moreton de Chabrillan, conservèrent jusqu'à la Révolution.","architecture":"Le château fort médiéval fut  remanié au XVIIIe siècle au cur du village.","habitants":"Famille de Moreton de Chabrillan\"","divers":"Château de Saint-Gervais","gps":"","images":["../image/image_26/26_St_Gervais_1.jpg","../image/image_26/26_St_Gervais_2.jpg","../image/image_26/26_St_Gervais_3.jpg"]},"Consult_chateau_formulaire0581":{"id":"Consult_chateau_formulaire0581","dept":"26","canton":"Rémuzat","commune":"St-May","nom":"St_May","type":"Vestiges","periode":"XI","histoire":"Saint-May:  Suspendu au flanc de la montagne du Coucou appelé autrefois sainte-Marie il tirait son nom de Saint-Marius premier abbé de Bodon.          Fief des abbés de l'Ile Barbe.","architecture":"Du château il ne reste que des remparts et une plate forme à l'emplacement du château qui sert de cimetière.","habitants":"Abbés de l'Ile Barbe\"","divers":"Vestige du château à St-May","gps":"","images":["../image/image_26/26_St_May_1.jpg","../image/image_26/26_St_May_2.jpg","../image/image_26/26_St_May_3.jpg","../image/image_26/26_St_May_4.jpg","../image/image_26/26_St_May_5.jpg","../image/image_26/26_St_May_6.jpg","../image/image_26/26_St_May_7.jpg"]},"Consult_chateau_formulaire5edf":{"id":"Consult_chateau_formulaire5edf","dept":"26","canton":"St-Paul-les-Trois-Châteaux","commune":"St-Paul-les-Trois-Châteaux","nom":"St_Paul_les_Trois_Chateaux","type":"Village fortifié","periode":"XII  XIII","histoire":"Saint-Paul les Trois Châteaux: Une peuplade Gauloise, les Tricastini sont à l'origine du premier nom connu.  Augusta Tricastinorum. En 852 l'empereur Lothaire confirma à Pons Ier évêque de Saint-Paul-les-Trois châteaux le don de la ville fait par Charlemagne et Louis le Débonnaire.  En 1449 la seigneurie de saint-Paul-les-Trois-Châteaux se composait de trois familles nobles ; la Garde-Adhémars , Suze et Clansayes.\r\nEn 1504 son Evéque était prince de Chabriéres, seigneur de Saint-Paul-les-Trois-châteaux, de la Baume  de Transit, de Saint-Restitut et de la moitié de Chamaret, mais ce seigneur faisait fonctionner sa seigneurie par des bailly qui se renouvelle alternativement tout les deux ans. Le gouvernement militaire de Saint-Paul se composait  d'un gouverneur et d'un lieutenant du Roi.\r\nCertains Evêques étaient assez tyraniques et usurpateurs, possédaient un château épiscopal, le dernier était Monseigneur de Reboul de Lambert décédé en 1791. Dans la commune le château de Bellevue.","architecture":"La ville était encore ceinturée par des remparts médiévaux au XXe siècle, et avait jusqu'en 1799 quatre portes qui fermaient la ville , la porte Nôtre Dame, la porte Fanjoux, la porte de la Fontaine et la porte des Plans, elle a conservé de nombreux vestiges et quelques demeures du XVe et XVIe siècle ainsi que l'hôtel de ville, ancien hôtel de Castellane( mairie actuelle),et bien d'autres hôtels et parmi les vestiges la tour du vieux moulin .","habitants":"\"","divers":"Vestiges de remparts et château de Bellevue","gps":"","images":["../image/image_26/26_St_Paul_les_Trois_Chateaux_1.jpg","../image/image_26/26_St_Paul_les_Trois_Chateaux_2.jpg","../image/image_26/26_St_Paul_les_Trois_Chateaux_3.jpg"]},"Consult_chateau_formulaire722e":{"id":"Consult_chateau_formulaire722e","dept":"26","canton":"St-Paul-les-Trois-Châteaux","commune":"St-Restitut","nom":"St_Restitut","type":"Château","periode":"XIV","histoire":"Saint-Restitut: Fief de l'Evêché du Tricastin, en 1202 le comte de Toulouse reconnait l'évêque Bertrand seigneur de Saint-Paul, la Baume de Transit et de Saint-Restitut. En 1381 Rostaing de Saint-Restitut vassals de Raymond de Baux seigneur de Suze, puis en 1525 Michel d'Aranda en 1549 Armand Odoard en rend hommage à Jean de Joly pour Chamier acquis de Romanet du Viennois et de Marguerite marquis de Bernes. \r\nA partir des années 1590 administré par les évêques jusqu'en 1615.\r\nDe la maison de la tour, terminé par Giraud de Claramante, elle devait servir de résidence à l'Evêque\" Messire Paul Audiffret\",  commissaire  général du Roi, lieutenant de police de l'Evêché  de Saint-Paul-les-Trois-Châteaux, il fut acheté et restauré par Pierre Morel.","architecture":"De cet ancien château du XIIIe siècle, démoli en 1578, en 1581 perdit ses murs d'enceinte il ne reste que la construction d'une maison appelée  \"maison de la tour\" dont la façade  est flanquée d'une tour, construite sur les soubassements de l'ancien château d'aspect renaissance.","habitants":"famille de Paul Audiffret\"","divers":"Vestiges du château et de remparts","gps":"","images":["../image/image_26/26_St_Restitut_1.jpg","../image/image_26/26_St_Restitut_2.jpg"]},"Consult_chateau_formulaire372e":{"id":"Consult_chateau_formulaire372e","dept":"26","canton":"St-Vallier","commune":"St-Vallier","nom":"St_Vallier","type":"Château","periode":"XI","histoire":"St-VALLIER: Fief des comtes d'Albon, Dauphins du Viennois au XIe  siècle, par alliance,  passa dans la maison de Bourgogne,  puis,  en 1276,  dans celle des Poitiers,  au comté de Valentinois, par le mariage  de Polie de Bourgogne avec Aymar de Poitiers, Un fils naquit, Guillaume qui le succède en 1332,  puis excommunié par les actes de son frère et décède sans postérité, laissa à son frère co-sanguin , Ane de Poitiers la seigneurie qui, ce dernier décéda peu de temps après avoir épousé Jeanne de Savoie, ils eurent un fils Aymar.        En cette période Humbert II vend le Dauphinè à la France , et les Poitiers succèdent au Poitiers en 1355,  et cela  jusqu'en 1524 ou il y eu des complots et conflits, Jean ou \"Johan\" de Poitiers, qui avait épousé Jeanne de Bartenay fut arrêter et emprisonné, et, c'est a cette période que fut raser les tours et le donjon au niveau actuel. \r\nLa fille de Jean \"Diane de Poitiers\" intervient auprès du roi  pour libérer son père. Le fils de jean, Guillaume, ne vécut peu de temps après le décès de son père en 1546 au château de Pizançon.     La seigneurie passa à Claude de Lorraine par le mariage de la fille cadette de Diane de Poitiers où il vécurent à Saint-Vallier, leur fils aîné vendra la seigneurie en 1586, à Messire Jean de la Croix  de Chevrières  d'une grande famille grenobloise (Parlementaire etc...) qui fit beaucoup de bien autour d'eux et surtout à Saint-Vallier par Jean-Baptiste. Cette seigneurie   restera dans cette famille jusqu'en 1823 où cette dernière passa par alliance  à la famille Moreton,  Marquis de  Chabrillan.       Puis racheté par le comte Louis de Nadaillac toujours dans la famille.\r\nRIOUX: Ce château qui appartenait premièrement aux Valernod fut acquis en 1635 par les Cothenay transformé en couvent des Picpus,  le  bâtiment  fut vendu comme bien national en 1791 au nommé Nicolas Goudard, sieur Goudard revendit le tout à monsieur Bonjour, médecin,qui y installa une maison de Santé, et finalement  ce furent messieurs Chatron frères qui en devinrent les propriétaires en 1816. En 1811, Raymond , locataire des lieux, avait installé un laboratoire de recherche, et c'est  là que n'acquit le \" Bleu Raymond \". (teinture)\r\n En 1876, lorsque, après avoir acquis ce magnifique domaine , les Dames Religieuses de la Nativité y transportèrent leur pensionnat.\r\nAujourd'hui appartient à la ville pour des habitations individuels.          LAVEYRON;  commune voisine attenante à Saint-Vallier, au féodal faisait partie du  mandement de Vals, érigé en 1891 appelé la \"Ronceraie\" par Charles Roux Meulien pour la famille Baboin (industriel), fut occupé par les allemands en 1940, acheté par la commune qui l'utilise à diverses activités communales.","architecture":"St-Vallier De ce château construit  au XIe siècle,  avec   son aspect de forteresse, tours et donjon crénelées ont étaient  réduit au niveau des bâtiments en 1524 suite à l'arrestation de  Jean de Poitiers. Corps de logis quadrangulaire flanqué de quatre tours rondes en angles. De la ville qui était fortifiée avec trois portes , cela a étaient détruit à la révolution,  il ne reste que quelques vestiges peu apparents car les habitations ont prit appui dessus.                            Rioux; bâtiment rectangulaire avec fronton et une tour carrée en angle sud. Laveyron; château moderne du XXe siècle Transformé aujourd'hui en hôtel de ville.","habitants":"famille de Diane de Poitiers.\r\nFamille  Jean de la croix de chevriéres  famille Moreton \r\nFamille du comte Louis de Nardaillac\"","divers":"Château de Saint-Vallier.\r\nChâteau des Rioux.Château de Laveyron","gps":"","images":["../image/image_26/26_St_Vallier_1.jpg","../image/image_26/26_St_Vallier_2.jpg","../image/image_26/26_St_Vallier_3.jpg","../image/image_26/26_St_Vallier_4.jpg","../image/image_26/26_St_Vallier_5.jpg"]},"Consult_chateau_formulaire4523":{"id":"Consult_chateau_formulaire4523","dept":"26","canton":"Rémuzat","commune":"Ste-Jalle","nom":"Ste_Jalle","type":"Vestiges","periode":"XII","histoire":"Sainte-Jalle: Bertrand de Mison, seigneur de Sainte-Jalles et Fief des barons de Mévouillon et des Montauban,  puis vendu en 1202 aux Arthaud d'Aix,   en  1310 revendu aux  Alleman , en 1334 les Ancezune acquirent les biens qu'ils passèrent deux ans après aux Dauphins, que  ces derniers revendirent en 1343 aux princes d'Oranges et  revient en 1350 aux Alleman.  Revendu ensuite aux Sassenage, puis passa aux Thollon qui s'éteignirent en 1667 chez les Fortia en 1723 chez les Coriolis de Limaye, derniers seigneurs.","architecture":"Du château construit au XIIe siècle, était défendu par des fortifications accompagnés  de  tours en angle,  il ne reste plus rien des courtines et des tours, seul le donjon de 8 mètres  de côté et une tour circulaire restent.  L'ensemble ayant souffert des guerres de religion.","habitants":"famille de Coriolis de Limaye\"","divers":"Vestiges du château de Sainte-Jalle","gps":"","images":["../image/image_26/26_Ste_Jalle_1.jpg","../image/image_26/26_Ste_Jalle_2.jpg","../image/image_26/26_Ste_Jalle_3.jpg","../image/image_26/26_Ste_Jalle_4.jpg","../image/image_26/26_Ste_Jalle_5.jpg","../image/image_26/26_Ste_Jalle_6.jpg"]},"Consult_chateau_formulaire4adb":{"id":"Consult_chateau_formulaire4adb","dept":"26","canton":"St-Paul-les-Trois-Châteaux","commune":"Suze-la-Rousse","nom":"Suze la Rousse","type":"Château","periode":"XII  XIII","histoire":"Suze la Rousse: Construit par les princes d'Orange et des Baux, au  XII-XIIIe siècle. Forteresse médiévale,  passa en 1424 à Louis de la Baume et à Rostaing de Suze  cette famille le gardera jusqu'au XIXe siècle,  puis au Baron des Isnards qui le conserva jusqu'à la première guerre mondiale, pour le passer à sa   nièce  de  Wite épouse du marquis de Brias, et, en  1979  le département en devient propriétaire. Il reçut la visite de Catherine de Médicis aux XVIe siècle pour y tenir sur les fonts baptismaux un fils du Comte de Suze.                                             Dans la commune un château des BORIE du XVIIIe siècle viticole  appelé aussi \"château\" par son style féodal avec tour ronde crénelée propriété de Monsieur Magnat.                                   Château d'ESTAGNOL, pas d'informations historiques.","architecture":"Suze: Masse quadrangulaire splendide et majestueuse, bâti au XIIe siècle, forteresse médiévale avec aspect du moyen Age, les tours furent élevées au XIII remanié au XIVe siècle, ensuite au XVIe siècle de style renaissance.   Borie style féodal et Estagnol de forme carré à deux niveaux.","habitants":"Famille des seigneurs des Baux\"","divers":"Château de Suze, des Borie et d'Estagnol.","gps":"","images":["../image/image_26/26_Suze_1.jpg","../image/image_26/26_Suze_2.jpg","../image/image_26/26_Suze_3.jpg","../image/image_26/26_Suze_4.jpg","../image/image_26/26_Suze_5.jpg","../image/image_26/26_Suze_6.jpg","../image/image_26/26_Suze_7.jpg"]},"Consult_chateau_formulaire61e6":{"id":"Consult_chateau_formulaire61e6","dept":"26","canton":"Crest","commune":"Suze-de-Crest","nom":"Suze_de_Crest","type":"Vestiges","periode":"XIII","histoire":"Suze de Crest: Saint-Pancrace ; il sagit du premier village de Suze, cité en 1163 au nom de Castrum de Sauzie, propriété de la famille seigneuriale de Suze, fief des Evêques de Die, il prit le nom de Suze la Vieille au début du XIVe siècle, après la construction par les Poitiers du Castrum de Suze la neuve ( aujourdhui le vieux Suze). \r\nLe premier seigneur fut Ozon de Suze (1178),  mais dépende de lEvêque de Die. En 1288 le comte Aymar IV achète la seigneurie à Guigues de Suze . \r\n La famille de Suze avait acquis en 1278 le château de Plan de Baix par le mariage de Catherine avec Lambert de Brion , mais en  1317 on ne relève plus que le nom dHugonet Saramandi fils de Hugues Seigneur de Suze dernier rejeton de la ligné, il cède tous ses biens à Elénor , la fille du bailli de Montoison et se fait enterrer au cimetière de St-Romain.\r\n En 1307 , échange des seigneurie des deux  Suze et celle de Chasséon, avec Guillaume Seigneur de Montoison, en 1363, par le mariage DIsabelle avec Geoffroy , les Montoison sallient aux Clermont-Montoison , ces derniers demeureront seigneur de Suze jusquà la révolution. Cette puissante famille ne résidera jamais à Suze, confie la gestion à un châtelain , on connaît seulement le nom de deux dentre eux Antoine Alexis en 1446 et noble Jean Chabert.\r\n Les Montoison : Seigneur de Suze ; Baron de Clermont-Montoison ne paraît guère à Suze . En 1677 il épouse  Marguerite de la Croix Chevriéres fille de Jean (qui avait épousé Jeanne de Barthenay et parents de Diane de Poitiers).","architecture":"Le château dans le village du vieux Suze (actuel ), fut construit à la fin du XIIIe siècle par les Poitiers, donjon carré de 6 métres  de côté avec de belles meurtrières fut un point de veille, le logis inférieur mal  rénové étant lhabitation habituelle des seigneurs et de sa famille. Il nen reste que la base ruiné.  Les fortifications qui ont été arrêtées en 1660 , il  ne reste que des pans de murs de 5 à 6 métres de haut, épaisseur de 1 métre 10 sur la partie nord.","habitants":"Famille des Poitiers  \r\nFamilledes Clermont-Montoison\"","divers":"Vestiges du château","gps":"","images":["../image/image_26/26_Suze_de_Crest_1.jpg"]},"Consult_chateau_formulaired225":{"id":"Consult_chateau_formulaired225","dept":"26","canton":"Tain-l`Hermitage","commune":"Tain-l`Hermitage","nom":"Tain_l`Hermitage","type":"Manoir","periode":"XVII","histoire":"Tain l'Hermitage:Fief des Dauphins, appartenait au XIIe siècle  aux Tournon en 1300, passa par héritage aux   Levis Ventadour ,  puis par alliance aux Rohan Soubise et en 1785 par les Mure de Larnage, ces derniers seigneurs.\r\nL'église de Tain sert de cadre le 8 avril 1350 au mariage du dauphin Charles(futur Charles V roi de France) avec Jeanne de Bourbon partiellement détruite pendant les guerres de religion.\r\nLe Taurobole Pierre de sacrifice où les Romains immolaient des tauraux, cet autel porte le nom de L'empereur.\r\n Le château sert aujourtd'hui d'hôtel de ville.","architecture":"château du XVIIe siècle. remanié au XXe siècle devenu hôtel de ville.","habitants":"famille des Levis \"","divers":"Patrimoine à Tain","gps":"","images":["../image/image_26/26_Tain_Hermitage_1.jpg","../image/image_26/26_Tain_Hermitage_2.jpg","../image/image_26/26_Tain_Hermitage_3.jpg"]},"Consult_chateau_formulaire5ef7":{"id":"Consult_chateau_formulaire5ef7","dept":"26","canton":"Grignan","commune":"Taulignan","nom":"Taulignan","type":"Patrimoine","periode":"XI","histoire":"Taulignan: Au VIIIe siècle, Pépin le Bref aurait conquis Taulignan.  En 805, Charlemagne  céda Taulignan à l'abbaye Italienne de Novalaise ( Savoie) qui rétrocéda la ville au XIe siècle au duc de Mévouillon.\r\nPuis à une famille appelée \"Taulignan\". Au XIIe siècle, passa au fief des barons de Montauban pour moitié et des Valentinois pour l'autre et en firent hommage aux Dauphins,  dés le commencement du XIIIe siècle ces derniers acquirent l'autre moitié, dont ils en dotèrent en 1373 une de leur  fille mariée chez les Bressieux, dont une partie de l'héritage fut donné en 1401 par les Alleman,  puis par les Monteynard qui le donnèrent en dot en 1613 à une de leur fille mariée chez les Grolée de Viriville et ceux-ci s'éteignirent en 1711 chez les Olivier de Senozan, Joseph-Louis-Bernard de Blégier de Taulignan baron de Barre, seigneur de Puymérac, de Saint-Marcellin en 1696 et passa à M. de Blégier prenait le titre de marquis de Taulignan, en 1770 qui eurent eux mêmes pour héritiers en 1779  les Talleyrand Périgord, derniers seigneurs de Taiulignan.  Dont Archambaud, Marie, Louis Talleyrand de Périgord décédé le 18.06.1808.","architecture":"De cette cité médiévale, bourg fortifié, entouré d'une enceinte circulaire qui date du XIVe siècle, il reste encore tous  les remparts et les onze tours, leurs mâchicoulis, courtines, chemin de rondes et  la porte d'Anguille flanquée de deux tours . \r\nDu château qui a été détruit pendant la révolution, il en reste la salle de garde transformé en lavoir et des pans de murs du château ou ont pris appui des habitations.","habitants":"Famille des Talleyrand-Perigord\"","divers":"Remparts et tours de Taulignan","gps":"","images":["../image/image_26/26_Taulignan_1.jpg","../image/image_26/26_Taulignan_2.jpg","../image/image_26/26_Taulignan_3.jpg","../image/image_26/26_Taulignan_4.jpg","../image/image_26/26_Taulignan_5.jpg","../image/image_26/26_Taulignan_6.jpg"]},"Consult_chateau_formulairecdf4":{"id":"Consult_chateau_formulairecdf4","dept":"26","canton":"Montélimar","commune":"La Touche","nom":"Touche","type":"Château","periode":"XIV","histoire":"Touche: Cette métairie qui passa au Poitiers qui l'inféodèrent à Guillaume de Rochefort, passa par alliance à Hugues de Vesc, aux Montjoux, aux Lalo, aux D'Urre de Cornillan; Jacques d'Urre, cousin de Louis d'Urre de Cornillan d'Oncieux, qui épousa en 1544 Gabrielle de Caritat de Condorcet, son petit fils laissa trois garçons, une fille nommée Marguerite, qui après la mort de ses frères, hérita de la seigneurie  qu'elle porta en 1619  à Jean de Lattier seigneur de Souspierre, puis passa à Jean de Lastic et en 1965 c'est une artiste, Manon Thomas qui s'installe dans le château effectuant des travaux.   Aujoiurd'hui propriété de monsieur Naudeix.","architecture":"Style renaissance construit au XVe siècle par les seigneur Lattier. remanié.  Corps de logis quadrangulaire à deux étages flanqué de tours rondes en angles à toit plat.","habitants":"Famille d'Eurre \r\nFamille de Lattier\r\n        \"","divers":"Château de la Touche","gps":"","images":["../image/image_26/26_Touche_1.jpg"]},"Consult_chateau_formulairef809":{"id":"Consult_chateau_formulairef809","dept":"26","canton":"Marsanne","commune":"Les Tourettes","nom":"Tourette (26)","type":"Château","periode":"XII","histoire":"Les Tourettes: En 1360 les Abbés de Cruas acquièrent la terre des Adhémar, ils y construisirent leur résidence fortifiée sur une hauteur. Fief des Adhémar, qui l'hommagèrent aux Pape, et qui fut acquise d'eux en 1360 par les Abbés de  Cruas, ceux- ci en été seigneurs jusqu'à la Révolution.","architecture":"Forteresse médiévale du XIIIe Siècle. aujourd'hui en mauvais état, vestige d'un donjon, l'autre  partie maintenue, enceinte quadrangulaire et logis du XVIe siècle, restaurée (habitée).","habitants":"Abbé de Cruas\"","divers":"Château des Tourettes","gps":"","images":["../image/image_26/26_Tourette_1.jpg","../image/image_26/26_Tourette_2.jpg","../image/image_26/26_Tourette_3.jpg","../image/image_26/26_Tourette_4.jpg","../image/image_26/26_Tourette_5.jpg"]},"Consult_chateau_formulaire355f":{"id":"Consult_chateau_formulaire355f","dept":"26","canton":"Romans","commune":"Triors","nom":"Triors","type":"Château","periode":"XVIII","histoire":"Triors: Fief des Clermont-Chatte, qui l'hommagèrent en 1450 aux Chapitre de Romans, le domaine  fut acquit en 1483 par les Vinay qui revendirent en 1509 aux Vallin, retour aux Clermont Chatte,  puis vendu par eux aux Odde et passa en 1611 en héritage aux Lionne, Monsieur de Leyssens de Lionne qui firent construire la partie central du château.            Ceux-ci furent remplacés en 1701 par les Cabots de la Serre, puis passa  en 1757 aux Bourchenu, en 1764 le bailly de Bourchenu fit rajouter au château actuelles ailes en retour et cette famille s'éteignit chez les Bailly qui étaient seigneurs de Triors à la Révolution.                              Devenu un prieuré  en 1984, après une donation par la dernière descendante du comte du Bouchage, pair de France sous Louis XVIII.                                                    Transformé aujourd'hui en abbaye.","architecture":"Corps de logis orné d'un fronton et encadré par deux ailes en retour  fut construit en 1764 important rectangulaire, d'une longueur de 105 mètres flanqué de deux ailes, fronton saillant en façade.","habitants":"Famille Leyssens de Lionne\r\nFamille de Bourchenu \r\nFamille du Bouchage\r\n\r\n        \"","divers":"Château de Triors","gps":"","images":["../image/image_26/26_Triors_1.jpg","../image/image_26/26_Triors_2.jpg"]},"Consult_chateau_formulaire6937":{"id":"Consult_chateau_formulaire6937","dept":"26","canton":"Luc-en-Diois","commune":"Valdrôme","nom":"Valdrome","type":"Maison forte","periode":"XV","histoire":"Valdrôme: Dans cette maison forte de Lagier de Vaugelas; André lagier de la Cardonnière nés à Valdrome en 1692 fut tué au siège de Panpelune en 1710; Louis-Joseph Lagier de Vaugelas petit-fils, savant archéologue, chanoine de Die mourut en 1800 son frère Etienne-André  également chanoine mourut à Trappe en 1826; Fortuné-Honoré neveu de ces deux chanoines, grands corps de Louis XVIII en 1814, Charles-Louis-André son frère mourut à Rome en 1844, son descendant, Joseph Bernard Lagier de la Condamine né en 1758. Lamartine y séjourna auprès de son ami (privée).","architecture":"Maison forte de Vaugelas rectangulaire des XV  et XVIe siècle avec deux tours rondes. Vestiges d'enceinte du château médiéval.","habitants":"Famille Vaugelas\"","divers":"Maison forte de Valdrôme","gps":"","images":["../image/image_26/26_Valdrome_1.jpg"]},"Consult_chateau_formulairee1c3":{"id":"Consult_chateau_formulairee1c3","dept":"26","canton":"Valence","commune":"Valence","nom":"Valence","type":"Patrimoine","periode":"X","histoire":"Au féodal Valence était une citadelle qui  appartenait à son évêque; mais les habitants de cette ville  jouissaient dès le XIVe siècle de franchises municipales les plus étendues, car ils s'administraient eux- mêmes par l'intermédiaire de quatre syndics où consuls élus chaque année, le 25 Avril,  dont l'un était gentilhomme, le second bourgeois, le troisième marchand  où artisan et le dernier laboureur.\r\nLe Valentinois s'étendait sur les deux rives du Rhône sur le département de l'Ardéche entre le Doux et l'Eyrieux, jusqu'aux montagne du Velay, sur la Drôme, au nord l'Isère au sud le Jabron au levant les montagnes de la Raye.\r\nEn 855 compris dans le royaume de Provence et en 933 dans le royaume d'Arles, ce pays forma dés les premières années du XIe Siècle un comté gouverné par des comtes amovibles, et fut ensuite partagé en divers princes où seigneurs qui s'y déclarèrent indépendants sous la suzeraineté des Empereurs germaniques, les plus importants furent les Geilin que remplacèrent en 1125 les Poitiers, qui prirent le titre de Comtes de Valentinois, et qui ayant acquis ensuite une partie du Diois,  léguèrent en 1419 le tout à la France,  la rive droite du Rhône fut incorporée au Languedoc en 1498 et la rive gauche  incorporée au Dauphiné en 1423. A cette date, le Valentinois du Dauphiné, érigé en duché et donné à César Borgia, mais celui-ci, révoquait en 1504,  le duché passe au domaine Royal Dalphinal jusqu'en 1548, date à laquelle le Roi Henri II donna à Diane de Poitiers, en 1642 le Roi Louis XIII érigea le Valentinois en duché Pairie pour le Prince de Monaco; il se composait des droits seigneuriaux disséminés sur différents points du département qu'ils gardèrent jusqu' à la Révolution.                        MURAT: En 1661 appartenait aux Espinchat de Fagenas et fut acquis dans la première moitié du XVIIIe siècle  par les Orlandin colonel de la milice qui eurent vers 1770 comme héritier les Meyras de la Roquette.                                                                         La maison Mauresque  du XIXe siècle d'André Manissadjian construisit ce bâtiment à son retour d'Afrique du Nord\r\nSerge Yazedjian propriétaire du château appelé Villa Gayet","architecture":"Cette citadelle fortifiée en 1582 , détruite au XVIIIe et XIXe siècle,  il ne reste que quelques bastions du XVIe siècle et quelques vestiges de l'enceinte médiévale en agglomération. Heureusement il nous reste de belle trace de l'histoire tel que la maison des Têtes d'Antoine de Dorne de 1530, hôtel particulier.\r\nle Pendentif, monument de 1548 pour Nicolas Mistral (tombeau). La maison Dupré Latour 1525.\r\n il existe sur Valence également des châteaux: le palais de l'Evêché aujourd'hui Musée, le château Mouchet et le château de Valensolle de style médiéval italien tous deux du XIXe siècle et la cathédrale Saint-Appolinaire.                                                                    Murat: Le château fut construit au  XVe siècle dans un style renaissance.","habitants":"Borgia   \r\nComtes de Poitiers    \r\nDiane de Poitiers  \r\nNapoléon-Bonaparte  \r\nGénéral Championnet\r\n        \"","divers":"Hôtel de Ville\r\nChâteau Murat\r\nMaison Dupré-Latour\r\nMaison des têtes\r\nChâteau Mouchet\r\nPalais de L'évêché Musée                                           La maison Mauresque, etc.","gps":"","images":["../image/image_26/26_Valence_1.jpg","../image/image_26/26_Valence_2.jpg","../image/image_26/26_Valence_3.jpg","../image/image_26/26_Valence_4.jpg","../image/image_26/26_Valence_5.jpg","../image/image_26/26_Valence_6.jpg","../image/image_26/26_Valence_7.jpg","../image/image_26/26_Valence_8.jpg","../image/image_26/26_Valence_9.jpg"]},"Consult_chateau_formulaire4ed1":{"id":"Consult_chateau_formulaire4ed1","dept":"26","canton":"Grignan","commune":"Valaurie","nom":"Vallaurie","type":"Vestiges","periode":"XI","histoire":"Valaurie: Fief des Adhémar en 1251 dont une moitié de la seigneurie appartenait aux Décan d'Uzés, qui en firent hommage aux comtes du Valentinois et la léguèrent vers 1590 aux Beaumont.  Ceux-ci eurent pour héritier les Du-Plan qui vendirent en 1603 leur moitié aux Escalin des Aimars, lesquels ayant acquis l'autre moitié aux Chambaud léguèrent en 1706, le tout aux Castellane Adhémar, puis cette seigneurie passa vers 1723 par alliance aux Villeneuve de Vence qui la vendirent en 1784 aux D'Hugues ces derniers seigneurs.","architecture":"Du château médiéval il ne reste que des vestiges par contre ils reste des remparts avec les tours.","habitants":"famille du seigneur Hugues\"","divers":"Fortifications de Valaurie","gps":"","images":["../image/image_26/26_Vallaurie_1.jpg","../image/image_26/26_Vallaurie_2.jpg","../image/image_26/26_Vallaurie_3.jpg"]},"Consult_chateau_formulaire6280":{"id":"Consult_chateau_formulaire6280","dept":"26","canton":"St-Vallier","commune":"St-Uze","nom":"Vals -Saint-Uze","type":"Vestiges","periode":"X","histoire":"Vals: En 925-1297, les  seigneurs de Siboud possédaient le fief de Vals, passera par alliance aux Bressieu puis   de 1297 à 1349 aux  Dauphins d'Albon et du Dauphiné,  de 1349 à 1425 aux Dauphins du Roi de France, de  1425 à 1586 aux Poitiers-Saint-Vallier et aux Loraine d'Aumale, de 1586 à 1789 aux Lacroix de Chevrières. En 1300 peu de choses connues sur ce château dont l'accés se faisait par le contournement de la chapelle Saint-Joseph de Saint-Vallier et de l'hospice en style baroque, ce dernier construit en 1888 par le docteur Louis Armodru, la chapelle, elle fut construite par les seigneurs de Saint-Vallier deviendra pendant des siècles un lieu de pèlerinage. Le château  devient un rendez-vous de chasse, en 1361 le Dauphin Charles de France  futur Charles VI suzerain direct de Vals, va le céder à Laveyron . En 1500 c'est avec Louis XI qui se termine la vie autour de ce château fort, malgré la tutelle des Poitiers-Saint-Vallier,  vers 1568 les de la Croix-Chevrières en deviennent propriétaires, et c'est en 1566 que  le château tombe en ruines le reste fut brûlé à la Révolution, et après cette dernière ses ruines resteront la propriété de la famille Badoin qui le gardera jusqu'au XIXe siècle et la chapelle fut vendue.                REVOL; château à St-Uze fabrique de porcelaine commencé  à St-Uze en 1811 par Marie Revol.","architecture":"De ce château il ne reste que des vestiges sur une motte féodale dans la vallée de Saint Vallier à Saint-Uze. L'hospice et la chapelle St-Joseph sont encore bien en état malgré le lieu bien ombragé.","habitants":"Famille des Siboud\"","divers":"Vestige château et Hospice et Château Revol à St-Uze","gps":"","images":["../image/image_26/26_Vals_1.jpg","../image/image_26/26_Vals_2.jpg","../image/image_26/26_Vals_3.jpg","../image/image_26/26_Vals_4.jpg"]},"Consult_chateau_formulaire24dd":{"id":"Consult_chateau_formulaire24dd","dept":"26","canton":"Crest","commune":"Vaunaveys","nom":"Vaunaveys","type":"Village fortifié","periode":"XII","histoire":"Vaunaveys la Rochette: Fief des comtes du Valentinois, qui cédèrent en 1300 la jouissance aux Montmeyran, ceux-ci vendirent la seigneurie en 1450 aux d'Eurre et fut acquise ensuite par les Clermont-Montoison,  en 1600 passa aux de la Baume qui la firent érigée en marquisat, ils furent les derniers seigneurs jusqu'à la Révolution.","architecture":"il ne reste aucune trace du château trop remanié  mais les remparts  du bourg féodal subsistent.","habitants":"Famille des Clermont Montoison et de la Baume.\"","divers":"Forteresse de Vaunaveys et vestiges d'une tour du hameau appelé \"Vieille Rochette\" et maison forte de Vallons","gps":"","images":["../image/image_26/26_Vaunaveys_1.jpg","../image/image_26/26_Vaunaveys_2.jpg","../image/image_26/26_Vaunaveys_3.jpg","../image/image_26/26_Vaunaveys_4.jpg","../image/image_26/26_Vaunaveys_5.jpg"]},"Consult_chateau_formulaire3efa":{"id":"Consult_chateau_formulaire3efa","dept":"26","canton":"Nyons","commune":"Venterol","nom":"Venterol","type":"Vestiges","periode":"X","histoire":"Venterol: Fief des Barons de Montauban, appartenait en 1276 à une famille de son nom que remplaça  vers 1283 l'ordre de Saint  Jean de Jérusalem, celui-ci aliéna, vers la fin du XVe siècle au profit des d'Eurre, qui en furent encore seigneurs en 1700 et fut remplacés par les Philibert et au moment de la révolution appartenait aux Armand de Blacons.                              RATIER: Au XIe siècle, fief des Barons  de Montauban, passa au XIIe siècle aux Montroux,  puis vendu avant 1283 à l'ordre de Saint-Jean-de-Jérusalem. Transmis en 1284 par Randonne de Montauban à son fils, le château ne figure pas parmi les forteresses cédées au Dauphin par Hugues Adhémar de Monteil,  dernier héritier des Montauban; nous le retrouvons en terre dalphinale au XVe siècle aux portes de la Principauté d'Orange, dont la localité voisine de Novézan en fait partie.","architecture":"Un faux château avec une tour à tuiles vernissées, à la place de son vrai château disparu depuis longtemps.        Du château-Ratier dit aussi \"Novézan\" il ne reste qu'un donjon féodal implanté sur un rocher à 495 m d'altitude. \r\nCe donjon quadrangulaire de 6,80 mètres x 7,80 mètres aux murs de 2,95 mètres de large et de 8 mètres d'élévation, seul vestige du château.","habitants":"Famille D'Eurre \r\nFamille d'Armand de Blacons\"","divers":"Chateau de Venterol, d'Auches et château Ratier","gps":"","images":["../image/image_26/26_Venterol_1.jpg","../image/image_26/26_Venterol_2.jpg","../image/image_26/26_Venterol_3.jpg"]},"Consult_chateau_formulaire56e0":{"id":"Consult_chateau_formulaire56e0","dept":"26","canton":"Rémuzat","commune":"Verclause","nom":"Verclause","type":"Vestiges","periode":"XI","histoire":"Verclause: Propriété de l'abbé de l'Ile Barbe au XIIe siècle, le fief est acheté en 1262 par le comte de Provence Charles d'Anjou et Montalin de Pommerol détenaient  également des biens qu'ils en hommagèrent  en 1279 au Dauphin Jean, rattaché au Val d'Oule, petite enclave  provençale en Dauphiné. Puis possédé par les Morgues, ensuite aux Dauphins en 1317  qui donnèrent la seigneurie en 1397 au Mévouillon de Baret, ceux-ci étant éteints , vers 1450 chez les Grolée, Verclause fut acquis de ces derniers en 1553 par les Delhomme , qui la cédèrent aux Lagonna , lesquels vendirent en 1592 cette seigneurie aux la Tour Gouvernet,  Monsieur de Bargetton été seigneur de Verclause en 1789.","architecture":"Du château situé à l'extrémité  d'un plateau qui domine le confluent de l'Eygues et du ruisseau de Sermane, il ne reste que des vestiges et pans de murs, le donjon d'une hauteur de 13,40 mètres, 8 mètres de largeur et 8,50 mètres de côté.","habitants":"Famille de Bargetton\"","divers":"Vestiges du château","gps":"","images":["../image/image_26/26_Verclause_1.jpg","../image/image_26/26_Verclause_2.jpg","../image/image_26/26_Verclause_3.jpg","../image/image_26/26_Verclause_4.jpg"]},"Consult_chateau_formulaire6721":{"id":"Consult_chateau_formulaire6721","dept":"26","canton":"Dieulefit","commune":"Vesc","nom":"Vesc","type":"Vestiges","periode":"X","histoire":"Vesc: Au féodal fief des  comtes du Valentinois et  des Evêques de Die,  ceux-ci le vendirent en 1609 aux seigneurs de Pennes \"les Vesc\" dont cet  héritage fut récupéré par les Moreton de Chabrillan qui était encore seigneurs à la Révolution.","architecture":"Du château  dit le \" Chastelar\" des comtes de Valentinois  il ne reste que des pans de murs du donjon et de tours.","habitants":"Moreton de Chabrillan\"","divers":"Vestiges du château de Vesc","gps":"","images":["../image/image_26/26_Vesc_1.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','26 — Drôme'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
