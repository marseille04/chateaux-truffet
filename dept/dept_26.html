mune":"Valaurie","type":"Vestiges","img":"../image/image_26/26_Vallaurie_1.jpg"},{"id":"Consult_chateau_formulaire6280","nom":"Vals -Saint-Uze","commune":"St-Uze","type":"Vestiges","img":"../image/image_26/26_Vals_1.jpg"},{"id":"Consult_chateau_formulaire24dd","nom":"Vaunaveys","commune":"Vaunaveys","type":"Village fortifié","img":"../image/image_26/26_Vaunaveys_1.jpg"},{"id":"Consult_chateau_formulaire3efa","nom":"Venterol","commune":"Venterol","type":"Vestiges","img":"../image/image_26/26_Venterol_1.jpg"},{"id":"Consult_chateau_formulaire56e0","nom":"Verclause","commune":"Verclause","type":"Vestiges","img":"../image/image_26/26_Verclause_1.jpg"},{"id":"Consult_chateau_formulaire6721","nom":"Vesc","commune":"Vesc","type":"Vestiges","img":"../image/image_26/26_Vesc_1.jpg"}];const FULL={"Consult_chateau_formulaire8955":{"id":"Consult_chateau_formulaire8955","dept":"26","canton":"Montélimar","commune":"Montélimar","nom":"Adhemar_Montelimar","type":"Forteresse","periode":"XII","histoire":"Adhemar-Montelimar: Ancienne station romaine dont le nom se trouve dans celui de l'aigu, un de ses faubourgs, appartenait  anciennement aux Adhémar, Giraud d'Adhémar de Monteil possédait sur la colline qui domine la ville  deux  châteaux, construit  au XIe siècle. \r\nEn 1285,  hommagèrent  une partie aux  Evêques de valence. Les Adhémar, s'étant ensuite partagés cette ville, en vendirent en 1339 une partie aux comtes de valentinois, et en 1340 une autre aux Papes D'Avignon.                  Héritiers des comtes de Valentinois en 1419,  les Dauphins de France transférèrent à Montélimar , sept ans après leur atelier monétaire qui fonctionna jusqu'en 1477, puis acquirent en 1447 la part pontificale. \r\nMontélimar fut transformé en duché en 1498 pour les Borgia, en 1548 pour Diane de Poitiers, et en 1642 pour les princes de Monaco qui furent les seigneurs jusqu'à la Révolution.\r\nLa citadelle de 1383 possédait la tour dite de \"Narbonne\", de la famille Narbonne de Montauban; le nom de Narbonne est donné à la tour carrée, qui faisait partie d'un château détruit au XVe siècle, parce que les Adhémar étaient comtes de Toulouse et ducs de Narbonne.   Un autre château fort médiéval dans l'ensemble de l'enceinte fortifié du XIIIe siècle. L'ensemble  est aujourd'hui la propriété du département qui l'a loue à la ville pour abriter son musée, après avoir servi de prison de 1871 à 1926.","architecture":"En 1190 le château médiéval \"des Papes\" dit des \"Adhémar\" comprenant un vaste domaine aux allures de palais, qui domine la ville existait et était entouré de remparts, ces derniers furent détruit partiellement lors du passage de \"Richard coeur de Lion\". Les remparts furent reconstruits par Lesdiguières en 1383, et complétés par  le château fort, devenu citadelle, le château  fut démoli en partie qu'en 1590, il existe encore dans l'angle Nord-Est  une grosse tour de plaisance qui possède à son niveau supérieur des arcatures sculptes du XIIe siècle, cette tour est flanque d'une tourelle circulaire, un chemin de ronde au château de Narbonne dont il reste une tour dite de \"Narbonne\" de 24 m de haut et 12 m de côté et des murs de 2'75 m d'épaisseur.\r\nDes monuments existent dans la partie basse de la ville tel qu' une porte dite la \"porte Saint-Martin\" construite en 1762, qui confirme qu'à cette époque les remparts existes encore.","habitants":"Famille de Borgia,  Diane de Poitiers  Famille des Adhemars de Monteil et aux Prince de Monaco\"","divers":"Château des Adhémars et des Narbonne porte Nord de la ville de Montélimar","gps":"","images":["../image/image_26/26_Adhemar_Montelimar_1.jpg","../image/image_26/26_Adhemar_Montelimar_2.jpg","../image/image_26/26_Adhemar_Montelimar_3.jpg","../image/image_26/26_Adhemar_Montelimar_4.jpg","../image/image_26/26_Adhemar_Montelimar_5.jpg","../image/image_26/26_Adhemar_Montelimar_6.jpg","../image/image_26/26_Adhemar_Montelimar_7.jpg"]},"Consult_chateau_formulaire2a39":{"id":"Consult_chateau_formulaire2a39","dept":"26","canton":"Die","commune":"Aix-en-Diois","nom":"Aix_en_Diois","type":"Vestiges","periode":"XII","histoire":"Aix-en-Diois: Fief des évêques de Die (suzerains) et comtes de Valentinois, puis fut le siège d'une des grandes familles  seigneuriales, les Artaud d'Aix, Isoard II, puis les Artaud Montauban, transformé en baronnie, et à la famille Cazeneuve jusqu'en 1579, racheté à cette date par René de la Tour-Gouvernet, gouverneur du Dauphiné. Celui-ci fut le dernier propriétaire.","architecture":"Forteresse construite au début du XIIe siècle, a fait l'objet d'un remaniement en 1338, le château fut  détruit par les guerres de religion et reconstruit par René de la Tour-Gouvernet en 1577.\r\nCe château possédait alors quatre tours, mais un incendie ravagea la partie Ouest du château en 1702, et en 1820 ce dernier n'était plus habitable. \r\nAujourd'hui  vestiges, enceinte et tours sur bastions.","habitants":"Isoard II  René de la Tour-Gouvernet\"","divers":"Vestiges de la forteresse d'Aix-en-Diois et dans la commune le château des évêques à la Salle.","gps":"","images":["../image/image_26/26_Aix_en_Diois_1.jpg","../image/image_26/26_Aix_en_Diois_2.jpg","../image/image_26/26_Aix_en_Diois_3.jpg","../image/image_26/26_Aix_en_Diois_4.jpg"]},"Consult_chateau_formulaire732f":{"id":"Consult_chateau_formulaire732f","dept":"26","canton":"St-Vallier","commune":"Albon","nom":"Albon","type":"Tour","periode":"XI","histoire":"Albon: Château construit par le comte de Guigues, sire de Vion prés de Tournon en l'an 1000 où naquit le Dauphiné, cinq comtes d'Albon se succédèrent en deux cent ans.  Le Dauphiné restera en possession des Guigues jusqu'au dernier Dauphin, Humbert II, et  jusqu'au transfert du Dauphiné à la France en Mars 1349.","architecture":"Vestige d'une tour de 8 mètres de côté  construite au XIIe siècle à la place d'un château féodal, vue panoramique.","habitants":"Tour; Comte d'Albon\r\n\"","divers":"Vestiges du château d'Albon, dans la commune le château de Senaud (voir article)","gps":"","images":["../image/image_26/26_Albon_1.jpg","../image/image_26/26_Albon_2.jpg"]},"Consult_chateau_formulaireb0de":{"id":"Consult_chateau_formulaireb0de","dept":"26","canton":"Dieulefit","commune":"Roches-St-Secret","nom":"Alencon","type":"Vestiges","periode":"XI","histoire":"Alençon: En 1294 Pierre de la Motte reçu en hommage le château; lieutenant et prieur de Saint Gilles par Guiraud Adhémars de Monteil, comte de Valentinois, passa en 1446 aux Boulogne, puis aux Berger et aux Arnaud derniers seigneurs D'Alençon.\r\nDans cette commune existe un château- ferme  des descendants de la famille de Bologne d'Alençon  construite au XVe siècle, transformée en plusieurs habitations au XXe siècle.","architecture":"De ce château il ne reste qu'un donjon médiéval quadrangulaire du XIIIe siècle de 9 m par 8 m de côté et de 13 m de haut dominant l'enceinte du château, ce dernier possède encore une baie géminée.\r\nIl reste quelques vestiges des remparts et du village ancien.                     La ferme d'Alençon fut fortifiée  en style renaissance, en forme de U avec tours rondes en angle intérieur.","habitants":"Arnaud d'Alençon\r\nFerme d'Alençon famille de Boulogne.\"","divers":"Vestiges du château d'Alencon (donjon) \r\nchâteau-ferme d'Alencon","gps":"","images":["../image/image_26/26_Alencon_1.jpg","../image/image_26/26_Alencon_2.jpg","../image/image_26/26_Alencon_3.jpg","../image/image_26/26_Alencon_4.jpg","../image/image_26/26_Alencon_5.jpg","../image/image_26/26_Alencon_6.jpg"]},"Consult_chateau_formulairea01b":{"id":"Consult_chateau_formulairea01b","dept":"26","canton":"Bourg-de-Péage","commune":"Alixan","nom":"Alixan","type":"Vestiges","periode":"XIV","histoire":"Alixan: Au  XIe siècle propriété des évêques de Valence, résidence occasionnelle du Dauphin Louis II, refuge du Chapitre de Valence au cours de l'épidémie de peste  de 1503. \r\nle village et le château changent quatre fois de mains au cours des guerre de religion.\r\nUne association \"des amis du vieil Alixan\" fondée en 1988 oeuvre pour maintenir en état le patrimoine d'Alixan","architecture":"Villa Alexanio au Xe Siècle, puis le village s'organise et se fortifie autour du château, de forme circulaire. \r\nLes guerres de religion entraînent la destruction des remparts, du château il en reste une tour accolée au bâtiment de construction plus récente qui sert aujourd'hui de Mairie. \r\nIl reste des vestiges de remparts dans le village.","habitants":"Dauphin Louis II\"","divers":"Château d'Alixan et de Vaugelas","gps":"","images":["../image/image_26/26_Alixan_1.jpg","../image/image_26/26_Alixan_2.jpg","../image/image_26/26_Alixan_3.jpg","../image/image_26/26_Alixan_4.jpg","../image/image_26/26_Alixan_5.jpg"]},"Consult_chateau_formulaire544a":{"id":"Consult_chateau_formulaire544a","dept":"26","canton":"Montélimar","commune":"Allan","nom":"Allan","type":"Vestiges","periode":"XII","histoire":"Allan était un village fortifié, le nom d'Allan serait d'origine Celte, il signifié \"butte\" lieu élevé. Origine médiévale du XIIe au XIXe siècle s'étage à l'intérieur d'une vaste enceinte fortifiée, définitivement abandonnée à la fin du XVe siècle.\r\nDans cette enceinte, le château des Adhémar élevé au XI-XIIe siècle, le donjon fut édifié en 1335 par le comte de Provence, date à laquelle la famille des Adhémar vend ses parts au comte de Provence, et en 1421 par alliance le château passe à la famille Lancelot, bâtard de Poitiers dont la fille, se maria en 1515 à la famille Pape Saint- Auban, ce dernier agrandira le château.  Cette famille s'éteignit vers 1730 chez les Leriguet de la Fage . \r\nLe dernier quart du XVIIe siècle ne connaîtra pas de grands travaux, les seigneurs du XVIIIe siècle, l'habiteront que par intermittence. \r\nEn 1778 le comte de la Tour du Pin époux de F. Leriguet de la Fage \" Dame d'Allan\" fait  aménager des appartements pour  la venue de Jean Jacques Rousseau qui décédera avant son arrivée. Dans la commune le château  de BIZARD, château du XVIIIe siècle était une magnanerie en 1862 qu'Eugéne Missol développa en vigne, en 1980 mourut Anne-Marie Lepine descendante directe.","architecture":"Village fortifié, origine médiévale  du XIIe siècle, enceinte fortifiée, abandonné à la fin du XVe siècle. \r\nDu côté du château dont il reste l'enceinte romane, remanié pour les armes à feu,  la chapelle Barbara castrale devant la porte, construite au XIIe siècle. Il y a aussi la porte Neuve, la porte de la Fontaine, la porte du Pourtalet et la porte de Montjoux, la maison des chevaliers du XVIIIe siècle, il s'agit de la maison Daudel.","habitants":"Lancelot de Poitiers  Leriguet de la Fage\"","divers":"vestiges du Village et du Château","gps":"","images":["../image/image_26/26_Allan_1.jpg","../image/image_26/26_Allan_2.jpg","../image/image_26/26_Allan_3.jpg","../image/image_26/26_Allan_4.jpg","../image/image_26/26_Allan_5.jpg","../image/image_26/26_Allan_6.jpg","../image/image_26/26_Allan_7.jpg"]},"Consult_chateau_formulaire68e3":{"id":"Consult_chateau_formulaire68e3","dept":"26","canton":"Crest","commune":"Allex","nom":"Allex","type":"Vestiges","periode":"XI","histoire":"ALLEX; les vestiges de la tour appelé aussi \"la Tour Ronde\". Les seigneurs connut étaient en 1291 les Vileris, en 1366 les Dalmas d'Eurre, en 1574  les Ban, en 1633 le Sieur de Prayet, en 1658 noble François de Vernet, sieur de la Vermenelle, en 1702 les Molaris et en 1771 les Bancel. Château \"dit des missions\"  reconstruit  au XVIIIe siècle  de style renaissance par le marquis de la Chaux  qui l'avait acheté en 1673 à Pierre Perranchon. Puis racheté en 1873 par Eugéne Bontoux  (polytechnicien).  Puis à Pierre  Girardon, collaborateur de Hyacinthe de Gaillard-Bancel         ISLE: Le domaine dans la plaine, déjà cité en 954, appartint à la famille de la Baume avant de passer aux  Rigaud de l'Isle, au début du XVIIe siècle  David Rigaud, riche marchand de Crest, (dont un neveu  siégea  avec la noblesse à Vizille  en 1786), C'est par Louise Marie, fille de Louis que le domaine passera aux Blancard de Loriol  (officier de la cavalerie Napoléonienne  et lieutenant Général sous Louis Philippe), passera à son fils Louis Guy qui aura aussi une carrière militaire, mais sans enfants, l'héritage ira au fils de sa soeur , Félicie Sophie, épouse de Pierre Girardon de Divajeu, les Girardon garderont le domaine jusqu'a l'achat de Monsieur Morize en 1970,  aujourd'hui domaine agricole.                        PERGAUD: Du XIXe siècle, ferme école de Pergaud, domaine qui appartenait alors au maire d'Allex Charles Bernard Thomé-Angélique de la Bretonniére, fut créé en Mars 1849, fut vendu au docteur Perrier, puis à la famille Salvignon et dernièrement acquit  par l'association   REGAIN.                            RAMIERES: Construit en 1840 dans un style Louis XIII par Hiacynthe de Gaillard de Bancel  ( 1849 1936) y habitèrent dés 1855, député de Tournon en 1899, il écrivit des ouvrages sur l'agriculture . Ses enfants créèrent les coopératives .   Le château aujourd'hui transformé en lycée agricole.","architecture":"Du château de la tour ronde sont du XIe siècle unique témoin du château vestige de la tour \"pans de murs\" au sommet du village.                                Du nouveau château reconstruit au XVIIIe siècle dit des \"missions\" de style renaissance, avec façade à corniche et une grande terrasse à balustres.      Isle; Construit au XVIIIe siècle , avec façade à fronton et deux tours  dont l'une servant de pigeonnier.             Pergaud:  de forme  quadrangulaire, deux étages, trois corps de logis en équerre flanqués de pavillons en angles, toit en tuiles restaurés et fenêtres renaissances.                        Ramières;  de style Louis XIII malgré son architecture du XIXe siècle, corps de logis rectangulaire flanqué de pavillons aux extrémités et pavillon saillant en façade plein cintre.","habitants":"Marquis de la Chaud Vileris\"","divers":"Vestiges du château\r\nNouveau château st-Joseph               Domaine de l'Isle                      Château Pergaud\r\nChâteau des Ramières","gps":"","images":["../image/image_26/26_Allex_1.jpg","../image/image_26/26_Allex_2.jpg","../image/image_26/26_Allex_3.jpg","../image/image_26/26_Allex_4.jpg","../image/image_26/26_Allex_5.jpg","../image/image_26/26_Allex_6.jpg","../image/image_26/26_Allex_7.jpg"]},"Consult_chateau_formulaire79e9":{"id":"Consult_chateau_formulaire79e9","dept":"26","canton":"St-Vallier","commune":"Anneyron","nom":"Anneyron","type":"Château","periode":"XIV","histoire":"Larnage-Anneyron: Anneyron était un ancien comté d'Albon le château fut bâtie en 1340, modifié au XVe siècle, il fut utilisé comme couvent et  cure.  Il subit d'importants travaux au XVIIIe siècle puis vendu comme bien national.   MANTAILLES: C'est dans ce château que se tint en 879 une assemblée d'ecclésiastiques et de nobles qui, devant l'incapacité des successeurs de Charlemagne à défendre le territoire, proclamation du comte de Vienne Boson \"roi de Provence\" Propriété de l'archevêque de Vienne. \r\nle château fut incendié et sa garnison massacrée en 1404 par les troupes de Jean et Guy de Torchefélon, seigneurs de Montcarra.\r\nEn 1885, un cultivateur ramassa dans les ruines deux tombereau d'ossements calcinés.\r\nCe château appelé aussi château de \"Barbe Bleue\" qui fournit des légendes sur ce domaine.                             CROS; le château comprenait un ensemble fortifié de treize tours  trois d'entre elle sont encore entières, ce fief à appartenu  à la famille du Cros ils furent également propriétaire du château de Mantaille en 1600 puis passa par alliance aux Groslée en 1660, Joachim de Cros avec Marie de Groslée. Charles VII et Louis XI y séjournèrent, le château fut vendu comme bien national en 1789 entre deux propriétaires dont Magdeleine Chevalier.                         Saleton: En 1598 c'était une ancienne amoison forte qui appartenait aux Arlendes qui passa en 1617 aux Bozas et ensuite aux Derechef, puis retourna aux d'Arlendes qui la conservèrent jusqu' à la Révolution.","architecture":"Larnage; La façade et la tour octogonale à fenêtres à meneaux et échauguettes en coin sont inscrites à l'inventaire des monuments historiques.              Mantailles;  De cette forteresse ne subsiste  aujourd'hui que quelques pans de murs dans les broussailles.          Cros; Corps de logis quadrangulaire flanqué de tours rondes.            Château de Saleton: Maison forte du XIVe siècle, remaniée  en demeure de Plaisance.","habitants":"Marquis d'Arlande\"","divers":"Château de Larnage, vestiges de Mantailles et le manoir de Cros et le château de Saleton.","gps":"","images":["../image/image_26/26_Larnage_Anneyron_1.jpg","../image/image_26/26_Larnage_Anneyron_2.jpg","../image/image_26/26_Larnage_Anneyron_3.jpg","../image/image_26/26_Larnage_Anneyron_4.jpg","../image/image_26/26_Larnage_Anneyron_5.jpg","../image/image_26/26_Larnage_Anneyron_6.jpg","../image/image_26/26_Larnage_Anneyron_7.jpg","../image/image_26/26_Larnage_Anneyron_8.jpg"]},"Consult_chateau_formulaire10b1":{"id":"Consult_chateau_formulaire10b1","dept":"26","canton":"Nyons","commune":"Aubres","nom":"Aubres","type":"Vestiges","periode":"XI","histoire":"Fief des barons de Montauban, appartenait en 1304 aux Caderousse dont il fut confisqué et donné en 1328 par les Dauphins aux Constant d'Alba; il passa par alliance en 1341 aux Rémuzat, qui cédèrent en 1370 aux Morges, remplacé vers 1483 par les Thollon de Sainte-Jalle; ceux-ci vendirent Aubres en 1570 aux Girard, dont l'héritage après avoir appartenu par alliance  aux Barncas en 1613, passa aux Grillet de Brissac qui eurent en 1730 pour héritier les Tonduti de Blouvac, dernier seigneur. \r\nLe château fut vendu à la Révolution, a été détruit en 1845.","architecture":"Le village médiéval fortifié, très restauré, possède des vestiges d'enceintes, dont une tour ronde à bouches à feu,  une haute tour carrée qui constitue une silhouette du château fort.","habitants":"Tonduti de Brissac\"","divers":"Motte féodal d'Aubres avec vestiges","gps":"","images":["../image/image_26/26_Aubres_1.jpg","../image/image_26/26_Aubres_2.jpg","../image/image_26/26_Aubres_3.jpg"]},"Consult_chateau_formulaire46b2":{"id":"Consult_chateau_formulaire46b2","dept":"26","canton":"Séderon","commune":"Aulan","nom":"Aulan","type":"Château","periode":"XIII","histoire":"Aulan fut construit par les seigneurs de Montbrun, puis vendu à Humbert Ier , Dauphin du Viennois, son  dernier fils Humbert II (1312-1355) s'en défait au profit de Bernard de Baux seigneur de Brante, les Aulan entre dans la famille de l'Espine et en 1635  mariage de L'Espine Isabeau avec François Marie de Suarez  originaire d'Espagne.\r\nLes Diego de Suarez, une branche s'établit en Avignon en 1550, mit son épée au service de François Ier. \r\nDenis-François Suarez d'Aulan, officier de marine, viguier, consul de la ville d'Avignon, périt sur l'échafaud le 11 Juin 1790, sur la place des Papes à Avignon et, ceci, pour prendre la place d'un ouvrier père de famille.\r\nLe château fermé et abandonné pendant un quart de siècle, après la mort du marquis de Suarez d'Aulan, il fut reprit par le comte Charles de Suarez d'Aulan.\r\nDepuis toujours  la descendance de cette famille des  Suarez  ont fait  des carrières militaires et Politiques.\r\nEn 1944, Aulan fut un haut lieu de la résistance en Dauphiné et le château fut occupé par les Allemands.              Malgré tout toujours dans la même famille. Au décès du comte Charles de Suarez d'Aulan en 2004, le château passa à Jérôme Feuillas par héritage.","architecture":"Château du XIIe, surplombant la vallée du Toulourenc imposante construction de style médiéval-renaissance, remanié au XIXe siècle et début d'une nouvelle restauration en 1933: Ce château possède un donjon massif, carré surmonté de mâchicoulis et de créneaux et flanqué d'une tourelle ronde,  ce château est entouré de plusieurs bâtiments situés dans l'enceinte et cette dernière, flanquée à ses angles de pavillons carrés.","habitants":"Famille de Suarez Comte D'Aulan\"","divers":"Château d'Aulan","gps":"","images":["../image/image_26/26_Aulan_1.jpg","../image/image_26/26_Aulan_2.jpg","../image/image_26/26_Aulan_3.jpg","../image/image_26/26_Aulan_4.jpg","../image/image_26/26_Aulan_5.jpg","../image/image_26/26_Aulan_6.jpg","../image/image_26/26_Aulan_7.jpg","../image/image_26/26_Aulan_8.jpg"]},"Consult_chateau_formulaire2d8c":{"id":"Consult_chateau_formulaire2d8c","dept":"26","canton":"Crest","commune":"Autichamps","nom":"Autichamps","type":"Vestiges","periode":"XIII","histoire":"Autichamps: Construit par les seigneurs de Beaumont, et les seigneurs de Chabrillan dès le XIIe siècle. Devenus marquisat, allèrent même, cinq siècles plus tard jusqu'à embellir la vallée avec  des  jardins d'agrément, accessibles depuis le château par la porte de France et la calade, cette ruelle pavée aujourd'hui est restaurée.","architecture":"Forteresse  médiévale, reconstruite  à  la renaissance, ne subsiste qu'une porte d'enceinte, la \" porte de France \", et quelques fenêtres à meneaux, et la tour arrière du XVe siècle.","habitants":"Chabrillan\"","divers":"Château féodal d'Autichamps","gps":"","images":["../image/image_26/26_Autichamp_1.jpg","../image/image_26/26_Autichamp_2.jpg","../image/image_26/26_Autichamp_3.jpg","../image/image_26/26_Autichamp_4.jpg","../image/image_26/26_Autichamp_5.jpg"]},"Consult_chateau_formulaireec96":{"id":"Consult_chateau_formulaireec96","dept":"26","canton":"Chabeuil","commune":"Barcelonne","nom":"Barcelonne","type":"Tour","periode":"XII","histoire":"BARCELONNE: Le village de Barcelonne est connu pour la première fois en 1171 par un parchemin indiquant Barcinona qui signifierait citadelle, en 1328 on trouve Barsillona, en 1442 Castrum Barcilhone, en 1465 Barcellone, en 1788 Barcelone; et récemment avec deux  \"n\".  \r\nLes terres de Barcelonne , fief des comtes de Valentinois au Moyen âge, appartenait aux seigneurs de Barcelonne.\r\nEn 1243 on trouve la trace d'un Hugues de Barcelonne, en 1427 la seigneurie passa pour moitié aux Hautvillards de Chabeuil, puis en 1480 aux  Odoard, en 1583 aux Thomé et aux Latour en 1584.\r\nL'autre moitié alla en 1447 à Antoine de Cornillan  seigneur de Barcelonne.  Période ou fut ordonné sa destruction par le duc de Mayenne gouverneur du Dauphiné. Quand ces derniers seigneurs s'éteignirent vers 1530, la terre passa aux d'Eurre  puis aux Glane de Cugy qui achetèrent  la première moitié aux Latour et ainsi possédèrent l'intégralité de Barcelonne jusqu'en 1630, à cette date ils vendirent aux Gelas du Luberon qui furent les derniers seigneurs. Elle fut rachetée en 1970 par Monsieur Tarisse, bâtisseur qui redonna vie à la tour.","architecture":"Barcelonne; Tour médiéval,construction militaire, donjon rectangulaire, seul élément restant d'un château qui doit remonter au XII-XIIIe siècle, occupait une position défensive, construit sur une terrasse.\r\nIl  semblerait qu'il été détruit en 1581 sur ordre du duc de Mayenne afin de ne pas servir de refuge aux huguenots.","habitants":"Antoine de  Cornillan  Gelas  du Luberon\"","divers":"Donjon toujours habité","gps":"","images":["../image/image_26/26_Barcelonne_1.jpg","../image/image_26/26_Barcelonne_2.jpg"]},"Consult_chateau_formulaire8bff":{"id":"Consult_chateau_formulaire8bff","dept":"26","canton":"Saillans","commune":"Vercheny","nom":"Barry_Vercheny","type":"Vestiges","periode":"XII","histoire":"Barry-Vercheny: Ancien fief des  comtes de Valentinois, inféodée en 1258 aux Ferlines, cédée en 1306 aux Logier, passée en 1452 à Guillaume, bâtard  des  Poitiers, sur qui elle fut confisquée en 1464, Barry fut alors donné à François d'Eurre, puis revint aux Poitiers Saint-Vallier, qui le revendirent en 1528 aux Sauvaing, lesquels le revendirent en 1596 aux de la Tour-Gouvernet, qui l'on conservé jusqu'à la Révolution.","architecture":"De ce château il ne reste que les bases de construction de la tour donnant sur la vallée de la Drôme.","habitants":"Seigneurs de Poitiers\"","divers":"Vestiges du site de Barry et habitations troglodites","gps":"","images":["../image/image_26/26_Barry_Vercheny_1.jpg","../image/image_26/26_Barry_Vercheny_2.jpg"]},"Consult_chateau_formulairec599":{"id":"Consult_chateau_formulairec599","dept":"26","canton":"St-Donnat-sur-l`Herbasse","commune":"Barthenay","nom":"Barthenay","type":"Château","periode":"XII  XIII","histoire":"Barthenay: Fief de la Baronnie de Clérieu, appartenait à une famille du nom de Basterna qui se transforma en Bathernay, ces seigneurs sont des chevaliers  au service du Dauphiné. \r\nEn 1277 Girard de Barthenay, avait quatre enfants, il partagea son domaine antre ses deux fils Guillaume et Roland; Guillaume qui succéda à son père  en 1278 il eut quatre enfants; Jordan, épouse en 1281 Isabelle de Surieu, trois enfants, Jordan II fils de  Bernard ( troisième  fils de Guillaume) épouse en 1340 Aymare de Nerpol de Charmes dont  il eurent deux enfants Joachim Ier et Anette, Jordan II  acheta en 1380 la seigneurie de Marges qu'Imbert racheta plus tard. \r\nJoachim Ier épousa en 1387 Agnés de Chavannes il hérita de son grand père Arthaud de Nerpol la seigneurie de charmes, il eu quatre enfants, Bernard mort en 1439 sans postérité, son frère Arthaud hérita en 1440 à la mort de Joachim. \r\nArthaud épousa Catherine de Caste de Peyrins, est eurent dix enfants, Arthaud décéda en 1473; Antoine le cadet, conseiller et chambellan de Louis XI, hérita de Barthenay.  \r\nImbert, hérita de  la seigneurie de Charmes ils eurent quatre enfants, dont un décéda en bas âge, Jean, François et Jeanne;  cette dernière épousa jean de Poitiers-Saint-Vallier, ils furent les parents de Diane. \r\nRené (fils d'Imbert et georgette) hérita de son grand père la plus grandes parties des biens et c'est avec lui que s'éteignit le nom des Barthenay qui épousa en 1530 la princesse bâtarde Isabeau de Savoie, leur fils Claude mourut à 23 ans, leur fille Françoise  hérita, elle épousa François d'Ailly sans enfant,  vendit la seigneurie en 1602 à Antoine d'Hostun.","architecture":"Reste de l'ancien donjon des seigneurs de Barthenay, la petite église qui n'était autre que la chapelle  était  enclose dans l'enceinte du château. \r\nSur le donjon on y voit une grande fenêtre gothique et un cadran solaire.","habitants":"Seigneur de Barthenay\"","divers":"Château de Barthenay","gps":"","images":["../image/image_26/26_Barthenay_1.jpg","../image/image_26/26_Barthenay_2.jpg"]},"Consult_chateau_formulairee7be":{"id":"Consult_chateau_formulairee7be","dept":"26","canton":"Marsanne","commune":"Bâtie-Rolland","nom":"Batie_Rolland","type":"Vestiges","periode":"XVI","histoire":"Bâtie-Roland: Ce fief appartenait en 1272 à la baronnie de la Garde Adhémar, appartenait dés le milieu du XIIIe siècle aux de la Bâtie, qui s'éteignirent en 1420. Alors acquis par les Beaumont, qui le revendirent en 1590 aux Marcel Blaïn du Poët. Ces derniers vendirent le château à Antoine Dejean de Caderousse, derniers seigneurs. Aujourd'hui propriété de la famille  Dejean de la Bâtie.","architecture":"Au sommet du village reste des vestiges du Castellas. Le château fut reconstruit au XVIe siècle au pied du village adossé aux vieux remparts, il se compose d'un long corps de logis et une tour carrée à l'Ouest formant une arche qui donnait accès au vieux village.","habitants":"Famille de Marcel Blaïn \r\nFamille de jean de Caderousse\r\n        \"","divers":"vestiges du château \r\nPortes du village\r\nconstruction renaissance","gps":"","images":["../image/image_26/26_Batie_Roland_1.jpg","../image/image_26/26_Batie_Roland_2.jpg","../image/image_26/26_Batie_Roland_3.jpg"]},"Consult_chateau_formulaire653e":{"id":"Consult_chateau_formulaire653e","dept":"26","canton":"Chabeuil","commune":"Baume-Cornillane","nom":"Baume_Cornillane","type":"Vestiges","periode":"XII","histoire":"Baume-Cornillane: Balma Cornillana, Balme qui signifie \"Grotte\" en référence à la grotte de la Dame située à 300 mètres du Village. C'est en 1100, que fut construit le second village dans l'enceinte du château fort élevé par les Balmois qui en échange de leurs  libertés, acceptèrent la protection des seigneurs des lieux. \r\nLes Cornillan trés ancienne maison du Valentinois connue depuis Ponce de Cornillan et Adélaïs sa femme, vivant en 1128, formèrent trois branches, celle de la Baumme-Cornillane, celle de Rousset, de Piegu et celle de Vinsobres.  Vassaux  des évêques de Valence,  des Poitiers comte de Valentinois  au XIIIe siècle.\r\nAntoine de Cornillan  épousa Guyote de Poitiers, fille naturelle du comte de valentinois au XIVe siècle.\r\nLa première branche tomba en quenouille vers 1520, par Catherine de Cornillan, fille d'Albert de Cornillan seigneur de la Baume-Cornillane mariée à Thiérry d'Urre seigneur de Portes dont la postérité joignit le nom d'Urre; la seconde branche prit fin avec Charles-Henri de Cornillan, seigneur de la Baume Cornillane en 1590, La troisième s'éteignit avec Antoine de Cornillan seigneur de Vinsobres en 1476.","architecture":"Baume-Cornillane Vestige d'un vaste château avec un fort donjon qui fut habité par des soldats, de larges fosses entouraient les murailles crénelées, flanquées de deux grosses tours et de deux portes . \r\nEn 1626 un édit du parlement de Grenoble ordonne la  démolition des murailles et du château.","habitants":"Les familles de Cornillan  \r\nFamolle des Poitiers\"","divers":"Vestiges du château","gps":"","images":["../image/image_26/26_Baume_Cornilliane_1.jpg","../image/image_26/26_Baume_Cornilliane_2.jpg","../image/image_26/26_Baume_Cornilliane_3.jpg","../image/image_26/26_Baume_Cornilliane_4.jpg"]},"Consult_chateau_formulaire4ad3-2":{"id":"Consult_chateau_formulaire4ad3-2","dept":"26","canton":"St-Paul-les-Trois-Châteaux","commune":"Baume-de-Transit","nom":"Baume_de_Transit","type":"Vestiges","periode":"XII","histoire":"Baume de Transit: En 1211 Evêque de Saint-Paul, en 1219 Pons de Valaurie, les Bermont, les Montfort, les Montelier, les bénéfices ces derniers sous la seigneurie des évêques de Saint-Paul, puis les Baumes, les Laurent en 1244 et en 1248 à Hugues de Baumes, en 1284 à Guillaume de Grignan, en 1408, l'évêque de Saint Paul Déodat d'Estaing inféode le fief à Hector de Caylar ou Cheylard, qui le cède en 1453 aux Bernes sur qui il fut confisqué en 1464 par Louis XI, qui le donna aux des Astards, puis aux Poitiers Saint-Vallier en 1467. Ceux-ci le conservèrent jusqu'à la mort de Diane, qui l'avait fait incorporer au duché du Valentinois et il fut acquis en 1580 par les Beaume Suze à  Marie De Guiffrey de l'Hére en 1623 avant d'épouser Antoine de la Baume, comte de Suze. Puis racheté par les Simiane, en 1684, derniers seigneurs .","architecture":"Le village a été construit autour de ce château dont il ne reste que des vestiges. Bâti au sommet d'une butte, il était un poste d'observation idéal pour surveiller la plaine de Valréas. \r\nSes ruines, récemment consolidées, laissent apparaître plusieurs parties : les murs d'enceinte datant du XIIe siècle.","habitants":"Diane de Poitiers\r\nFamille des Beaume de Suze\"","divers":"Vestiges du château, reste d'une tour ronde bien conservée","gps":"","images":["../image/image_26/26_Baume_de_Transit_1.jpg","../image/image_26/26_Baume_de_Transit_2.jpg","../image/image_26/26_Baume_de_Transit_3.jpg"]},"Consult_chateau_formulaire8b27":{"id":"Consult_chateau_formulaire8b27","dept":"26","canton":"Crest","commune":"Beaufort-sur-Gervanne","nom":"Beaufort_sur_Gervanne","type":"Vestiges","periode":"XIV","histoire":"Beaufort-sur-Gervanne: Cité au XIVe siècle, fief revendiquait par Aymar V de Poitiers, fit construire une nouvelle forteresse, puis restauré par le Dauphin Louis II, le château s'illustre pendant les guerres de religion. Entre 1569 et 1574 il change quatre fois de mains, et fut démantelé en 1582  par le capitaine D'Ansage.","architecture":"De l'enceinte primitive il ne reste rien, incorporée dans des constructions postérieures, la deuxième enceinte du côté Nord a été démolie au XVIIIe siècle. Au sud subsistent trois tours.\r\nDu donjon qui se présenté comme un quadrilatère irrégulier, massif,  d'environ 30 m de côté, il subsiste des murs d'une hauteur de 15 m  sur la face sud subsiste l'un des pied-droits haut de 20 m large de 3 m. et des remparts.","habitants":"Aymar V de Poitiers  Louis II Dauphin\"","divers":"Vestiges du château et murs d'enceinte du village","gps":"","images":["../image/image_26/26_Beaufort_sur_Gervanne_1.jpg","../image/image_26/26_Beaufort_sur_Gervanne_2.jpg","../image/image_26/26_Beaufort_sur_Gervanne_3.jpg","../image/image_26/26_Beaufort_sur_Gervanne_4.jpg"]},"Consult_chateau_formulaire7ae7":{"id":"Consult_chateau_formulaire7ae7","dept":"26","canton":"Luc-en-Diois","commune":"Beaumont-en-Diois","nom":"Beaumont_en_Diois","type":"Vestiges","periode":"XII","histoire":"Beaumont en Diois: Castrum Bellemontis en 1165  château fort et tour de guet dans un but défensif était habité par des capitaines châtelains. Sa construction date du XIIe siècle  par Alexandre III et en 1165 fief de l'église épiscopale de Die, Hugues II, il  appartient ensuite à Isoard  comte de Die. Passa par alliance aux Artaud de Montauban, qui s'éteignirent vers 1683, passa ensuite chez les Liotaud seigneurs de Beaumont jusqu'à la Révolution. Le château n'était pas habité par les châtelains  seulement par les gardes.  Au XVe siècle après l'éboulement du Claps le village fut isolé et le château abandonné en 1419.","architecture":"Ruines du château sur le sommet dominant le village  et ruines d'enceinte dans le village.","habitants":"Famille Artaud\"","divers":"vestiges du donjon du château","gps":"","images":["../image/image_26/26_Beaumont_en_Diois_1.jpg"]},"Consult_chateau_formulaire80fd":{"id":"Consult_chateau_formulaire80fd","dept":"26","canton":"Portes-les-Valence","commune":"Beaumont-les-Valence","nom":"Beaumont_les_Valences","type":"Village fortifié","periode":"XIV","histoire":"Beaumont les Valences: Fief des évêques de Valence, acquis en 1183 par les Montvendre,  passa aux Sylvion de Crest et vendu aux Chastellier en 1607.","architecture":"Aucune trace du château appelé \"castrum Bellemontis\" Du village fortifié il ne reste que quelques vestiges de fortifications et une tour-porte quadrangulaire du XIVe siècle crénelée \"appelée tour de l'horloge\" de 12 m de haut.","habitants":"Famille Chastellier\"","divers":"Porte de l'enceinte du village.","gps":"","images":["../image/image_26/26_Beaumont_les_Valence_1.jpg","../image/image_26/26_Beaumont_les_Valence_2.jpg","../image/image_26/26_Beaumont_les_Valence_3.jpg"]},"Consult_chateau_formulaire056b":{"id":"Consult_chateau_formulaire056b","dept":"26","canton":"Luc-en-Diois","commune":"Beaurières-en-Diois","nom":"Beaurieres_en_Diois","type":"Vestiges","periode":"XII","histoire":"Beaurières faisait partie de la seigneurie de la vallée de Thoranne, appelée par la suite Baronnie de Beaurières, et qui relevant des fiefs des évêques de Die, passa par alliance, vers le milieu du XIIe siècle des anciens Comtes de Diois aux Algoult, qui la revendi en 1603 aux Aurnaud de Lus, ceux-ci léguèrent Beaurières aux la Tour qui le vendirent en 1675 aux Ponna, ses derniers seigneurs.","architecture":"Il ne reste que des ruines du château appelé Rochebrianne, et un logis rectangulaire du XVIe siècle, flanqué de deux tours rondes d'angle.","habitants":"Famille d'Algoult\"","divers":"Vestiges du château","gps":"","images":["../image/image_26/26_Beaurieres_en_Diois_1.jpg"]},"Consult_chateau_formulairee205":{"id":"Consult_chateau_formulairee205","dept":"26","canton":"St-Vallier","commune":"Beausemblant","nom":"Beausemblant","type":"Château","periode":"XVII","histoire":"Beaussemblant: Appelé aussi château de la Sizeranne. Cité en 1334 de Bello-Simili du fief des Dauphins.  Trois  familles l'ont possédé depuis l'origine  jusqu' en 1811: Sibeud qui fut le dernier seigneur, puis les   Montchenu, Siboud, ensuite par M.H. Monier de la Sizeranne. En 1965 Madame Jacques  de Blesson, née de la Sizeranne, en est propriétaire. MOLLARD; Au féodal, le Mollard-Brochard était un fief des comtes de Saint-Vallier, appartenait au XVe siècle aux Brochard, qui s'éteignirent vers 1520 Marguerite Brochard épouse Ennemond D'Izerand qui en fut seigneurs pendant un siècle.","architecture":"Beausemblant: Construit vers 1640 en incorporant  quelques éléments  renaissance; corps de logis en forme de U deux étages avec attique.               Mollard; Le château fut construit au XVe siècle de style renaissance, corps de logis quadrangulaire flanqué de tours rondes.","habitants":"Famille Sibeud  \r\nFamille Monier\r\nFamille Blesson\"","divers":"Château de Beausemblant et du Mollard","gps":"","images":["../image/image_26/26_Beausemblant_1.jpg","../image/image_26/26_Beausemblant_2.jpg","../image/image_26/26_Beausemblant_3.jpg","../image/image_26/26_Beausemblant_4.jpg","../image/image_26/26_Beausemblant_5.jpg"]},"Consult_chateau_formulaire309c":{"id":"Consult_chateau_formulaire309c","dept":"26","canton":"Portes-les-Valence","commune":"Beauvallon","nom":"Beauvallon","type":"Château","periode":"XVII","histoire":"Beauvallon fut construit par Charles-Jacques  de Bressac Seigneur de Lavache en 1654, fils de Henri de Bressac, anoblie par Henri IV en 1604 était alors bailli de l'évêque de Valence.\r\nCette famille était les seigneurs de la Vache jusqu'à  la révolution, après, en 1809  Emilie de Bressac épousa  un  Irlandais Robert-Joseph comte  de Mac-Carthy, elle meurt à 22 ans, un enfant  Justin né en 1811 qui hérite du château et du parc de 24 hectares , et va dèlapider sa fortune cela l'oblige à  vendre en 1849 le château de la Vache à un industriel de la Loire, et le château de Faventines à Monsieur Jacques Romagon (ce château aujourd'hui disparu, reconstruit et transformé en lycée). \r\nLe château de la Vache a été vendu ensuite à Jean Michel Robichon rentier à Rives de Giers. Puis en 1879 à De Vogelgesang \"chant de l'oiseau\"Alphonse Pommarel, le village de Lavache prendra le nom de Beauvallon.  Aujourd'hui habitation populaire, et maison de retraite construite  dans le parc.","architecture":"Construit en 1654 de style néo renaissance, corps de logis quadrangulaire à trois étages flanqué de tours arasées, Remparts le long du parc .","habitants":"Famille  de Bressac\"","divers":"Château de Beauvallon","gps":"","images":["../image/image_26/26_Beauvallon_1.jpg","../image/image_26/26_Beauvallon_2.jpg"]},"Consult_chateau_formulaire8bc0":{"id":"Consult_chateau_formulaire8bc0","dept":"26","canton":"Buis-les-Baronnies","commune":"Bellecombe-Tarendol","nom":"Bellecombe Tarendol","type":"Vestiges","periode":"X","histoire":"Bellecombe Tarendol: En 1100, l'abbé de l'lIe Barbe était seigneur, hommagé par Raymond de Mévouillon; d'autres seigneurs possédaient quelques droits ou portions du fief de Tarendol: les Bellecombe, les Pannafort, les Montauban. La  famille des Montauban soumirent la douzième part aux Hospitalliers de Saint-Jean de Jérusalem en 1262. Puis transmis entre le comté de Provence et le Dauphiné à partir de 1262, fera parti définitivement de l'enclave du Dauphiné en Novembre 1305. En 1355 appartenait aux Rémuzat et passa en 1474 par alliance aux Theys, remplacé dès 1540 par les Maubes, qui vendirent en 1590 la seigneurie de Bellecombe aux  de la Tour. \r\nEn 1789 maître Albert et maître de Soissan étaient seigneurs de Bellecombe.","architecture":"Du château il ne reste plus rien sinon une motte féodale, les ruines de Pannafort sont encore visible à l'écart du village.","habitants":"Famille de la Tour Gouvernet\"","divers":"Eglise","gps":"","images":["../image/image_26/26_Bellecombe_Tarendol_1.jpg"]},"Consult_chateau_formulaire62dc":{"id":"Consult_chateau_formulaire62dc","dept":"26","canton":"Buis-les-Baronnies","commune":"Bésignan","nom":"Besignan","type":"Vestiges","periode":"XIV","histoire":"Bésignan: Fief de la baronnie de Mévouillon , appartenait dès le XIVe siècle à une famille de son nom, et passée par alliance, moitié au Pape de Sain-Auban, en 1520, moitié aux D'Autanne,  en 1584, enfin acquis en 1766 par les Duclaux qui en étaient seigneurs à la révolution. Pierre-Charles-Marie Du Claux, Marquis de Bésignan, personnage imposant,  qui fut à l'origine de la destruction des châteaux de Bésignan , Sainte-Jalle, Saint-Sauveur, Gouvernet et Aulan. Face à la tourmente révolutionnaire avec un lourd passif, maître de ses biens par son bon plaisir, sans respect pour ses vassaux et voisins, mais il dut mettre de l'eau dans son vin à la révolution. Malheureusement pour lui il reprit du poil de la bête avec des conspirations, et suite à cela en 1792 le château fut assiégé une première fois, mais il persistât et le château fut détruit par deux canons qui tirèrent durant trente six heures. Le marquis dut prendre la fuite et abandonna sa femme le lendemain, il émigra tout seul sans retour.","architecture":"Du château féodal, fortifié, fut pris en 1577 et détruit.  \r\nLa famille seigneuriale  construisit une demeure-château au gout du jour et qui fut détruit à nouveau en 1789 le 17 Août dont il ne reste aucune trace.","habitants":"famille des Du Claux\"","divers":"motte féodal","gps":"","images":["../image/image_26/26_Besignan_1.jpg"]},"Consult_chateau_formulaire121b":{"id":"Consult_chateau_formulaire121b","dept":"26","canton":"Bourdeaux","commune":"Bourdeaux","nom":"Bourdeaux","type":"Vestiges","periode":"XII","histoire":"Bourdeaux: Deux forteresses ont dominés  bourdeaux au Moyen âge. Du château des évêques de Die construit au 11e et 12e siècle reste l'énorme pan de muraille qu'on appelle  \"le grand manteau\".  \r\nPlus haut sur la colline le château des comtes de Valentinois, bâti au XIIIe siècle, dit \"le châtelas\" a gardé les plus belles ruines. Ces deux châteaux furent détruits au XIVe siècle. \r\nEn 1396 le célèbre Raymond de Turenne et ses troupes détruisent les châteaux de Pont de Baret et Soyans et les deux châteaux de Bourdeaux.               Bezaudun: Ce château fut l'un des premier de la région de Bourdeaux, conséquences des guerres féodales et des exactions des seigneurs pillards. Appartenait au XIIe siècle au comté du Diois puis aux évêques de Die.","architecture":"Bourdeaux; De ces châteaux, il ne reste que les carcasses de base  du château supérieur et le pan de mur dit \"le grand manteau\" du château inférieur.           Bézaudun De ce Castrum Bezaudum  du XIIe siècle, il ne reste que le vestige de la tour qui servit  de guet pour les châteaux de Bourdeaux.","habitants":"Evêques de Die Comte de Valentinois\"","divers":"vestiges des deux châteaux à Bourdeaux et vestiges de la tour de Bézaudin (commune voisine).","gps":"","images":["../image/image_26/26_Bourdeaux_1.jpg","../image/image_26/26_Bourdeaux_2.jpg","../image/image_26/26_Bourdeaux_3.jpg","../image/image_26/26_Bourdeaux_4.jpg","../image/image_26/26_Bourdeaux_5.jpg","../image/image_26/26_Bourdeaux_6.jpg"]},"Consult_chateau_formulairec0bd":{"id":"Consult_chateau_formulairec0bd","dept":"26","canton":"Bourg-de-Péage","commune":"Bourg-de-Péage","nom":"Bourg de Peage","type":"Château","periode":"XVIII","histoire":"Le château de Favor; fut construit par Claude-Pierre-Louis Antelme 1791-1858 grognard de Napoléon à la campagne de Russie ou il fut resté quatre ans prisonnier, chevalier de la légion d'honneur, neveu et héritier  du comte   Dedelay d'Agier (maréchal du palais ) sous l'Empire, maire de Romans 1788 et député suppléant chevalier de Saint-Louis, député sénateur sous la restauration où il eut l'occasion de se faire remarquer, jusqu'en  1791 puis se retira jusqu'en 1797 ou il reprit en politique pour terminer Pair de France en 1814. Claude-Pierre Antelme; officier de Saint-Cyr  et maire de Bourg de Péage en 1830, après sa mort en sept 1858, trois enfants dont deux fils Claudius et Théodore, ce dernier hérita, bourgeois typique du second Empire, conseiller municipal, meurt à quarante ans en 1872, il avait épousé Clotilde Suffet fille du maire et notaire de Beaurepaire, sa veuve héritière a épousé en 1875 le commandant  de gendarmerie Henri-Marie Cullet de Montarfiet, leur fille Eugénie épousa Jules Sénéquier-Crozet bâtonnier à Grenoble. Leur fille Marie-Marcelle épouse Ray-Bob Walter en 1923 et disparaîtra tragiquement quelques mois plus tard dans un accident d'avion, leur fille Jaqueline héritière décède en 2004. C'est grâce à Dedelay d'Agier que Bourg de Péage bénéficia gratuitement du parc de 22 hectares \"Bois des Naix\" créé en 1824 traversé par le ruisseau de Charlieu.                                Dans la commune la  PARISIERE; château construit par Charles Mossant en 1895 (Industriel et politique)maire de Bourg de Péage en 1880 conseiller général, juge et président du tribunal de commerce également de la Drôme, à sa mort en 1908 passa à ses héritiers, dont Antonin Vallon avait épousé Julie Mossant, fit entré ses deux neveux  Henry et André Argod qui ce dernier a épousé la nièce de Charles Mossant, décédera en 1936 et madame André Argod cède en 1949 son château la Parisière. Il fut racheté par le docteur André Morel qui le transforma en clinique sera  assisté pendant quarante ans du chirurgien Georges Lafaury.                            MONDY; construit à la fin du XVIIe siècle par la famille Duvivier sur le domaine dont l'un des plus illustres membres Philippe Duvivier, président de la Cour des Comptes du Dauphiné, avait fait l'acquisition en 1681 de Barthélémy du Boucher. Ces descendants firent construire le château après sa mort.   Le 6 Mai 1806, Gabrielle-Olympe Duvivier épousa  Jean François Calixte de Pina, Marquis de Saint-Didier, puis le château fut vendu en 1861 à Mr  Belmont qui remanie le château et à sa mort  en 1870 le château fut vendu à Mr  Flachaire de Roustan, puis à Mr Joseph Pain-Finet maire de Veaunes qui le céda à Mr Villard, puis à Mr Arnaud qui le transforme en restaurant et centre équestre et en 1967  l'institut rural d'éducation et d'orientation.","architecture":"Château de Favor; fut construit en 1798 et 1810 classé dans les maisons bourgeoises à deux étages avec attique, il présente la forme carrée, agrandie par deux ailes arrondies qui en font son charme.                                   La Parisière  est plus une grande maison bourgeoise qu'un château, de forme rectangulaire, aujourd'hui clinique.                           Mondy; Corps de logis rectangulaire accolé à des dépendances   récentes et vestiges d'un pigeonnier.","habitants":"Claude-Pierre-Louis Antelme             Famille de Delay d'Agier\"","divers":"Favor et la Maladière, la Parisière et Mondy.                                    extrait de revue de Binjamin Missud.","gps":"","images":["../image/image_26/26_Favor_1.jpg","../image/image_26/26_Favor_2.jpg","../image/image_26/26_Favor_3.jpg","../image/image_26/26_Favor_4.jpg","../image/image_26/26_Favor_5.jpg","../image/image_26/26_Favor_6.jpg","../image/image_26/26_Favor_7.jpg","../image/image_26/26_Favor_8.jpg"]},"Consult_chateau_formulairebbaa":{"id":"Consult_chateau_formulairebbaa","dept":"26","canton":"Bourg-les-Valence","commune":"Bourg-les-Valence","nom":"Bourg les Valence","type":"Château","periode":"XVII","histoire":"CHANALETS;  le château de Chanalets fut construit au XIXe siècle par la famille Urtin, ancienne magnanerie transformée en château de style plaisance.\r\nVALENTIN:  Construit en 1660 pour l'Evêque Daniel de Cosnac (résidence de campagne). Racheté par les Veynes en 1695, puis passa aux Sieyés, à la mort du marquis de Sieyés le 17 Février 1899, les héritiers le mirent en vente. Le docteur (Abbé Kniepp) si installa dans l'espoir de l'acheter. Le père Foresta (Jésuite ) acheta le domaine. Vendu au département de la Drôme en 1906, a servit d'hôpital pendant la dernière guerre, aujourd'hui Lycée. Dans la commune de Bourg-les-Valence, l'usine de l'industriel Noël Sanial qui fut  construite  en 1855 suite à une faillite elle est rachetée par l'état pour une cartoucherie nationale elle connut un essor lors des guerres de 39-45 de l'indochine en 1950 mais déclinera ensuite pour être rachetée en 1993 par la ville, promut au monuments historiques en 2001 à était bien remanier sert d'exposition culturelles de pôles images.                \r\nGENAS-Bourg: C'est en 1478 que la famille François de Genas est citée, possède un manoir et des terres qu'il légueront en 1614 à l'hôpital saint-Jean de Valence pour aller s'installer à Cléon d'Andran où  ils construisirent un  château qui porte leur nom. Puis vendu à la famille de Joybert En 1780 L'hôpital de Valence vend cette propriété à la famille Bérard. Aujourd'hui le manoir est acquit par Par la famille Fourel.","architecture":"Chanalets;  Corps de logis rectangulaire avec partie centrale saillante, fronton arrondie , tour carrée sur la partie gauche de la façade et tourelle à l'opposée , l'ensemble à toit pointu flanqué de Lucarnes rondes.             Valentin; du château initial seul la partie centrale de la façade avec les deux pavillons saillants sont d'origine. les bâtiments sur les flans ont été rajoutés ainsi que la partie arrière formant en ensemble quadrilatère. Cartoucherie,en forme de L, flanquée de deux pavillons carrées de trois niveaux,l'un au centre en angle l'autre à l'extrémité nord, cour aménagée de verdure.                               Genas; Manoir construit au XVe siècle on peut l'apercevoir de la route, la  tour carrée à escalier à vis qui distribue les étages du bâtiment   avec une tourelle accolée.(privé)","habitants":"Daniel de Cosnac (Evéque)\"","divers":"Château  de Chanalets, du Valentin,  Cartoucherie et ferme de Genas","gps":"","images":["../image/image_26/26_Valentin_1.jpg","../image/image_26/26_Valentin_2.jpg","../image/image_26/26_Valentin_3.jpg","../image/image_26/26_Valentin_4.jpg","../image/image_26/26_Valentin_5.jpg","../image/image_26/26_Valentin_6.jpg"]},"Consult_chateau_formulaire6e0d":{"id":"Consult_chateau_formulaire6e0d","dept":"26","canton":"Bourdeaux","commune":"Bouviéres","nom":"Bouvieres","type":"Vestiges","periode":"XIII","histoire":"Du château de Bouviéres dont il ne reste qu'une tour, au féodal appartenait  aux Evêques de Die, puis passa en 1540 aux  D'Hére de Glandage, puis aux Pilhon, puis par alliance en 1700 aux Morges-Ventavon, qui eurent pour héritier les Emé de Marcieu, acquis en 1772 par les D'Ailhaud, et il fut revendu aux Fourville derniers seigneurs de Bouviéres.\r\nChateauvieux; Fief des anciens Comte du Diois, relevant du fief des Evêques de Die, et qui passé par alliance, dés 1314 des Isoard D'Aix, aux princes d'Orange de la maison de Bouy. Ce fief lui appartenait encore en 1372, vers le commencement du XVIe siècle cette seigneurie fut acquise par les Brotin qui s'éteignirent en 1558 chez les d'Eurre, lesquels firent entrer Guisans dans leur Marquisat de Montanégre, que les Verdeilhan des Fourneils, ces derniers seigneurs acquirent en 1750.","architecture":"il ne reste q'une tour de ce château qui en possédait sept sur ses remparts qui ont disparus.\r\nChâteauvieux; Vestige de la maison forte médiévale","habitants":"famille d'Emé de Marcieu\"","divers":"tour des remparts du château\r\nFerme Chauvet bâtie de Guissan","gps":"","images":["../image/image_26/26_Bouvieres_1.jpg","../image/image_26/26_Bouvieres_2.jpg","../image/image_26/26_Bouvieres_3.jpg"]},"Consult_chateau_formulaire0484":{"id":"Consult_chateau_formulaire0484","dept":"26","canton":"Buis-les-Baronnies","commune":"Buis-les-Baronnies","nom":"Buis_les_Baronnies","type":"Vestiges","periode":"XII","histoire":"La baronnie de Buis commença au XII-XIIIe siècle par les Mévouillon et Montauban, dont la ville était la capitale, advint en 1317 aux Dauphins du Viennois, puis à la couronne de France, et  par donation  fut aliénée en 1422 aux D'Avangour, en 1553 aux Vodel, enfin en 1641 aux princes de Monaco Honoré II de Grimaldi qui la conservera jusqu'à la révolution.\r\nAu nord de Buis les Baronnies, à l'époque féodale le château Ubrieux assurait leur protection et faisait patrie de la châtellerie du Buis. \r\nLe château fut détruit en 1590.         BEAUVOISIN: sur le contrefort du Moure-Frey, le château contrôlait le col de la Viare et le passage de Bénivay il fit partie, en 1260 des castrums dont les revenus furent engagés par Raymond de Mévouillon, novice de l'ordre des Frères Prêcheurs, afin de réparer les fautes commises par son père et sa mère Saure avant son élection au siège de Vaison. \r\nLe château fut transmis à son fils en Avril 1274, puis vendu au Dauphin  en 1293.","architecture":"BUIS les BARONNIES; De cette ville fortifiée il ne reste qu'une tour ronde \"Tour de Safre\" et quelques vestiges de remparts.\r\nUbrieux: démentelé en 1590, il ne reste que quelques traces de murs sur la motte surplombant les gorges d'Ubrieux.        Beauvoisin; de ce château il ne reste que les vestiges de  l'ancrage de tour circulaire.","habitants":"seigneurs  de Mevouillon\"","divers":"tour des remparts de la ville et vestiges du château de Beauvoisin","gps":"","images":["../image/image_26/26_Buis_les_Baronnies_1.jpg","../image/image_26/26_Buis_les_Baronnies_2.jpg","../image/image_26/26_Buis_les_Baronnies_3.jpg"]},"Consult_chateau_formulairebbfc":{"id":"Consult_chateau_formulairebbfc","dept":"26","canton":"Dieulefit","commune":"Bégude-de-Mazenc","nom":"Bégude de mazenc","type":"Manoir","periode":"XV","histoire":"Loubet: Maison forte médiévale du XIV-XVe siècle, reconstruite au XVIIe siècle, était une ancienne place forte des templiers.  Les derniers seigneurs de Mazenc édifièrent après les guerres de religion, ce château en 1903 qui  fut la propriété de Emile Loubet, président de la IIIe République jusqu'en 1950, puis passa aux De Saint-Prix, aux Biondi en 1960 à la  ville, transformé en colonnie de vacances. et dernièrement racheté en 1991 par Raymond Bauzon, qui avec à sa fille Magali Da Costa habite le château est l'a été transformé en location d'habitations individelles; mais le parc reste à la ville","architecture":"Bégude de Mézenc; Maison forte reconstruite  au XVe siècle, de forme quadrangulaire à trois étages flanquées de tours rondes en angles dont une à créneaux, une en tourelle et les deux autres sur l'arrière arasées.","habitants":"Famille du Président Emile Loubet.\"","divers":"Château de la Bégude de Mazenc dit \"de Loubet\"","gps":"","images":["../image/image_26/26_Loubet_1.jpg","../image/image_26/26_Loubet_2.jpg"]},"Consult_chateau_formulairecc8c-2":{"id":"Consult_chateau_formulairecc8c-2","dept":"26","canton":"Chabeuil","commune":"Chabeuil","nom":"Chabeuil","type":"Vestiges","periode":"XII","histoire":"Chabeuil: Le nom de Chabeuil provient du latin \"Cabeolum\" lieu de cavernes. Il existe un château qui sera démentelé vers 1580, sur ordre du Duc de Mayenne. Le premier seigneur est Lambert François  de Peyrins, également seigneur du Royans. \r\nGontard de Chabeuil 1186-1225 seigneur de Peyrins remet la seigneurie  à Aymar de Poitiers en 1287. En 1349 transfert du Dauphiné à la couronne de France. \r\nEn 1479  André de Claveyson châtelain.\r\nChabeuil fit partie des terres données en 1647 à la principauté Monégasque, en reconnaissance des services rendus à la couronne par Honoré II de Grimaldi. L'hôtel de ville construite en 1880 par l'architecte Tracol, le campanile fut ajouté quinze ans plus tard inspiré du Palazzo-Vecchio de Florence.           Dans la commune le château de Neyrieu et de St-Pierre, ce dernier Au XVIe siècle, ce manoir appartenait aux Saint-Pierre de Verd, reconstruit ou remanié passa aux Seyes, toujours dans la descendance. NEYRIEU: Ce château construit en 1710 au sommet des Gontardes, abrita la descendance des Patin, en 1789, Marianne Angélique épouse à Chabeuil Hugues de Laurencin de Chauzé, brigadier des armées du roi Louis XV de cette union naîtront  cinq enfants, dont l'aîné, Jean Baptiste Espercu Blandine , né à Chabeuil participera au troisième vol humain exécuté à Lyon avec De Montgolfier le 14 Janvier 1784. Son fils Antoine Edouard sera maire de Chabeuil pendant 17 ans de 1812 à 1830.               ROSIER: Au XVe siècle  domaine de Saint  Just , les L. de Lambert le remanièrent en 1705 puis passa à la famille Béranger qui  transforma le château pour une période en filature de cocons.","architecture":"Chabeuil: la porte monumentale construite  sur une assise romaine était autrefois défendue par une herse, seul restante des trois portes de Chabeuil elles portaient les armes des princes de Monaco. Du château qui se trouvait sur la colline fut démantelé en 1580 et des remparts de la ville fortifié, il ne reste que la base  d'une tour attenante à la Mairie qui elle fut construite en 1880 par l'architecte Tracol dans un style  néogothique, et la porte fortifié dont la partie haute fut rajoutée également au siècle dernier.                         St-Pierre, corps de logis rectangulaire à deux  étages flanqué d'une tour carrée et belle chapelle dans le parc.  Neyrieu;  Construit  en 1710, de forme rectangulaire, remanié en 1896.         Rosier; corps de logis rectangulaire à deux étages avec attique accolé à un donjon à l'opposé deux tours carrées accolées, l'ensemble à toits poivrières.","habitants":"famille de Gontard de Chabeuil \r\nFamille de Aymar de Poitiers\"","divers":"château \"hôtel de ville\" et porte fortifié, Château de Neyrieu, de Saint-Pierre et de Rosier.","gps":"","images":["../image/image_26/26_Chabeuil_1.jpg","../image/image_26/26_Chabeuil_2.jpg","../image/image_26/26_Chabeuil_3.jpg","../image/image_26/26_Chabeuil_4.jpg","../image/image_26/26_Chabeuil_5.jpg","../image/image_26/26_Chabeuil_6.jpg"]},"Consult_chateau_formulairebf43":{"id":"Consult_chateau_formulairebf43","dept":"26","canton":"Crest","commune":"Chabrillan","nom":"Chabrillan","type":"Vestiges","periode":"XII","histoire":"Chabrillan: Fief des Poitiers, après avoir appartenu au domaine du roi.\r\nChabrillan en 1241; Polie de Chabrillan d'Autichamp héritière épousa en 1350 François de Beaumont du Touvet. \r\nCédé ou vendu en 1450 à la famille Moreton qui prirent le nom de Chabrillan(famille connu depuis 1077 qui le gardèrent deux cents ans) par le Dauphin Louis ( futur Louis XI ) en échange de la co-seigneurie de Pierrelatte, il fut érigé en marquisat en 1679. \r\nThéâtre de nombreuses rivalités, le château a subi au fil du temps les dommages des guerres et des révolutions, plusieurs fois brûlé et en partie détruit, il fut habité par ses propriétaires jusqu'en 1650 .","architecture":"Ce château, aujourd'hui énorme bâtiment ruiné depuis les années 1650, appelé fort de la Motte, donjon originel du XIIe siècle, carré, magnifiquement appareillé, avec quelques bossages, au sud  haute tour cylindrique,  entre ses tours le bâtiment superposé servait de corps de logis avec des murs de 2 mètres d'épaisseur. Il reste encore des murs et tours de remparts dans le village.","habitants":"Famille de Moretton\"","divers":"Vestiges du château","gps":"","images":["../image/image_26/26_Chabrillan_1.jpg","../image/image_26/26_Chabrillan_2.jpg"]},"Consult_chateau_formulairec7e2":{"id":"Consult_chateau_formulairec7e2","dept":"26","canton":"Grignan","commune":"Chamaret","nom":"Chamaret","type":"Vestiges","periode":"XII","histoire":"Forteresse de Chamaret fut construite entre le XIIe et le XIIIe siècle par Dodon de Chamaret, la plus puissante famille de la région, ne pourra pas résister au désir d'expansion des deux seigneurs voisins, dès 1180 la branche cadette devient vassale  de l'évêque de Saint-Paul-Trois-châteaux, puis en 1255  à la branche aînée des Adhémar de Grignan.  Suite à des luttes incessantes  entre les deux seigneurs Chamaret en subit les conséquences et en 1359 ils seront éliminés de leur fief ancestral, la fin des conflits au début du XVIe siècle lorsque Giraud Adhémar  s'empara de la totalité de la seigneurie et nomma son frère Guillaume à la tête de l'évêché. \r\nUne restauration partielle a été effectuée grâce à un legs  en 1894 par Xavier Sylvestre.","architecture":"Chamaret; de cette forteresse féodal bien que démantelé en en 1586 par les Adhémar de Grignan ( guerre de religion) il reste des deux châteaux  deux tours du XIIe-XIIIe siècle dont une haute de 30 mètres,l'autre faisant partie du château fort et trois portes, dont l'une nommée porte de la grande Fontaine.","habitants":"famille de Dodon de Chamaret\"","divers":"vestiges du château","gps":"","images":["../image/image_26/26_Chamaret_1.jpg","../image/image_26/26_Chamaret_2.jpg","../image/image_26/26_Chamaret_3.jpg"]},"Consult_chateau_formulairedd62":{"id":"Consult_chateau_formulairedd62","dept":"26","canton":"Portes-les-Valence","commune":"Portes-les-Valence","nom":"Champfort","type":"Manoir","periode":"XVIII","histoire":"Champfort: Dans cette demeure du XVIIIe siècle qui fut habité  par la belle Amélie de Laurencin, amie de Adélaïde de Saint-Germain donc ami de Napoléon, Amélie épousa le capitaine du Pont d'Etoile, ils eurent un fils Ernest, à la révolution le capitaine émmigra et passa pour décédé pendant son veuvage, sa femme fréquenta  trois ans J P de Montalivet de 1793 à 1796 mais son mari n'étant pas mort, Ernest le fils, s'engagea en Italie comme page puis officier dans la grande Armée d'Italie.","architecture":"Ce manoir de forme rectangulaire flanqué de deux pavillons carrés saillants. (Privé)","habitants":"Capitaine du Pont d'Etoile\"","divers":"","gps":"","images":["../image/image_26/26_Champfort_1.jpg"]},"Consult_chateau_formulaire599e":{"id":"Consult_chateau_formulaire599e","dept":"26","canton":"Tain-l`Hermitage","commune":"Chanos-Curson","nom":"Chanos_Curson","type":"Manoir","periode":"XV","histoire":"DAMES: Constuit au XVe siècle pour Diane de Poitiers en résidence secondaire, autre version  ou Dianne de Poitiers y aurait été enfermée, passa à la famille Châbert en 1580, domaine des Bouviers en 1704 et aux Coston, et vers 1736 aux Rostaing jusqu'à la révolution. \r\nDepuis deux siècles la famille Pochon exploite ce domaine vinicole.","architecture":"Maison  de style renaissance du XVe siècle avec un escalier à vis au centre et des bâtiments en équerre, flanqué d'une tour ronde crénelée.  \r\nLa façade sud expose quatre belles fenêtres à meneaux. Remanié en 1984.","habitants":"Diane de Poitiers\"","divers":"Manoir de Diane à Chanos et le manoir de Conflans.","gps":"","images":["../image/image_26/26_Dames_1.jpg","../image/image_26/26_Dames_2.jpg"]},"Consult_chateau_formulaire97c4":{"id":"Consult_chateau_formulaire97c4","dept":"26","canton":"Motte-Chalencon","commune":"Charce","nom":"Charce","type":"Maison forte","periode":"XII","histoire":"Charce: Cité au XII-XIIIe siècle, il était aux Abbés de l'Isle-Barbe, avant de passer aux Mévouillon, aux Montauban  puis  par alliance, aux la Tour-Gouvernet L'édifice actuel aurait été construit  en 1570-1480 par René de la Tour-Gouvernet, chambellan et conseiller d'Henri IV à la fin du XVIe siècle, de style renaissance.   \r\nIl abrita une héroïne en 1692  Philis de la Charce, \"L'amazone du Dauphiné\".  Cette jeune femme, l'épée  à  la  main  prit  la  tête  des troupes locales pour défendre les Baronnies attaquées par le duc de Savoie.\r\nAu XVIIIe siècle, le château est converti en simple exploitation agricole,  puis abandonné, il tombe en ruines, les tours Nord s'écroulent dans les années 1920, en 1980 Madame de Rosermorduc cède le bâtiment à la commune.","architecture":"Du XVIe siècle succède à un édifice plus ancien, se présentait sous la forme d'un grand parallélépipède de 25 mètres de long et de 20 mètres de large, flanqué aux quatre coins de tours rondes imposantes, après sa destruction il ne restait que deux tours rondes et à beaucoup souffert d'abandon qui entraîneront au XXe siècle la chute de deux tours ainsi que la toiture. Actuellement reprit depuis 1962 par les monuments historiques.","habitants":"Philis de la Charce\"","divers":"Avant et aprés","gps":"","images":["../image/image_26/26_Charce_1.jpg","../image/image_26/26_Charce_2.jpg"]},"Consult_chateau_formulaireeed6":{"id":"Consult_chateau_formulaireeed6","dept":"26","canton":"St-Donnat-sur-l`Herbasse","commune":"Charmes-sur-l`Herbasse","nom":"Charmes sur l`Herbasse","type":"Vestiges","periode":"XV","histoire":"Charmes: Le premier seigneur connu,  Amédée de Clermont où d'Hauterives, décédé en 1150. A la mort de son fils Amédée en 1159 ses biens passèrent aux Clermont, puis échue aux Nerpol et de 1150 à 1300 au Bâtard de Clermont, ses derniers  firent construire le château.\r\nEn 1340 Aymare de Nerpol fille d'Arthaud épouse Jordan II de Barthenay, leur fils Joachim épousa en 1387 Agnés de Chavannes, Joachim hérita du château en 1406 de son grand-père \"Arthaud de Nerpol\".  A cette époque les Barthenay quittèrent leur château pour habiter à Charmes, le fils de Joachim (Arthaud) succède, il épouse Catherine de Gaste de Peyrins et à Arthaud de Barthenay succèda son fils Imbert le 28 Avril 1462. Ce dernier favori de Louis XI reçu de nombreux fiefs en récompense, il épousa en 1463 Georgette fille de Falques de Montchenu dont ils eurent quatre enfants, dont une fille Jeanne qui se maria à Jean de Poitiers, seigneur de Saint-Vallier, fut la mère de \"Diane\". Imbert était un des conseillers des  rois Louis XI, Charles VIII et Louis XII qui le chargèrent d'importantes missions et à sa mort en 1523 son petit fils René lui succéda, épousa Isabeau de Savoie, il maria sa fille Françoise à François D'Ailly, Vidame d'Amiens, elle hérita du château, sans enfant, veuve à 43 ans  elle vend en 1602 aux Hostun qui le revendirent au président Coste, lequel obtint en 1652 la nomination de Charmes en Comté, pour le passer ensuite aux La Coste-Maucune, qui possédait déjà le domaine de Champos, puis à Jacques de Béranger de Gua (gendre des Coste),  puis en 1776 aux Chabrières de la Roche qui furent les derniers seigneurs.\r\nLes Chabriéres le gardèrent  jusqu'en 1860, puis acquit par le Commandant D'Hagerue,  puis Reverdy,  Gayet,   de Saint-Etienne. \r\nle château fut remanié au XXe siècle par monsieur Poncelet,  Mr Allut, Mr De Blesson, et fut acheté par le Baron De Marcay en 1941, récemment décédé. aujourd'hui à la famille Simon.          ST-MURY: Fief des seigneurs de Montchenu, qui passa vers 1362 aux Limone, ayant fait retour aux Montchenu fut donné aux Raymond, puis aux  seigneurs de Barthenay; Imbert de Barthenay épousa le 25 Avril 1463 Georgette de Montchenu , ils  eurent une fille Jeanne, qui épousa  Jean de Poitiers le 4 Mars 1489,   ils eurent \"Diane de Poitiers\". Cent vingt ans plus tard, le château passa  par alliance  aux Clermont-Chatte, puis  aux Peicat, et ceux-ci le vendirent en 1655 aux Coste, qui le firent entrer dans le comté de Charmes. Passa au baron de Marcay qui décéda en 1941.\r\nRacheté en 1980 par Odile Gérard et Pierre Baillargea.","architecture":"Charmes; construit au XIVe siècle, certainement  sur l'emplacement d'une autre forteresse du XIe siècle, il est constitué d'un donjon quadrangulaire médiéval dominant l'ensemble, d'un corps de logis rectangulaire à tours rondes et carrées en angles, de style renaissance.                            ST-Mury; dominant la vallée de l'Herbasse, ce château qui date du XIe siècle, remanié au XVe siècle, aujourd'hui la partie féodal extérieure est détruite, mais il reste un corps de logis à trois étages rectangulaire avec donjon carré central.","habitants":"Famille de La Coste. \r\nFamille de Beranger. \r\nFamille de Chabrieres. \r\nFamille de Poncelet. \r\nFamille du Baron de Marcay.\"","divers":"Château féodal de Charmes.             Château de St-Mury \r\nVestiges du château de Champos\r\nChâteau de Collonges","gps":"","images":["../image/image_26/26_Charmes_1.jpg","../image/image_26/26_Charmes_2.jpg","../image/image_26/26_Charmes_3.jpg","../image/image_26/26_Charmes_4.jpg","../image/image_26/26_Charmes_5.jpg","../image/image_26/26_Charmes_6.jpg","../image/image_26/26_Charmes_7.jpg"]},"Consult_chateau_formulaire4840":{"id":"Consult_chateau_formulaire4840","dept":"26","canton":"Bourg-de-Péage","commune":"Charpey","nom":"Charpey","type":"Vestiges","periode":"XII","histoire":"La seigneurie de Charpey fut démembrée au XIIe siècle de Saint-Didier et de Saint-Vincent. Elle fut le fief des comtes de Valentinois et engagée en 1396 à 1437 aux Roussillon, en 1444 aux Gaubert des Massues,  puis à Robert de Grammont et ensuite vendu aux Lattier, qui s'éteignirent chez les Clermont Chatte. Ceux-ci eurent comme héritiers vers le milieu du XVIIIe siècle,  les Caillebot de la Salle ses derniers seigneurs.","architecture":"Du château de l'Epervier il ne  reste plus rien, sur la plate-forme a été déposée une croix de fer. \r\nLe deuxième  a été reconstruit au bas du village (maison renaissance ) et même partageait par le passage de la route.\r\nDans ce village existe une maison bourgeoise  appelé \"château\" (privée).","habitants":"Famille de Gervais de Tilbury \r\nFamille de Caillebot de la salle\"","divers":"partie du château et maison bourgeoise","gps":"","images":["../image/image_26/26_Charpey_1.jpg","../image/image_26/26_Charpey_2.jpg"]},"Consult_chateau_formulaire77bf":{"id":"Consult_chateau_formulaire77bf","dept":"26","canton":"Chabeuil","commune":"Châteaudouble","nom":"Chateaudouble","type":"Château","periode":"XII  XVI","histoire":"Chateaudouble: En premier \"Château-Rompu\" qui est l'origine du lieu et cette place forte était considéré comme la troisième du Dauphiné, implantait au sommet d'un petit-mont qui surplombe le village reconstruit en contrebas. Avant l'an mille le fief dépendait des princes du Royans Ismidon de Sassenage en prit possession en 1003 et le transmit  à son neveu Saint-Ismidon évêque de Die, en 1100 passa aux Arnauds de Die et vendu en 1221 par Raymond de Sassenage à Aymar , comte du Valentinois, les descendants le conservèrent  jusqu'en 1419, date à laquelle Louis II de Poitiers en fit don au Dauphin. Le  Roi  Louis  XI  l'utilise pour  rendez-vous de chasse et le concède a François des  Massues son écuyer. \r\nles premiers seigneurs furent les d'Arbalestier, puis à la famille des  Poitiers, Diane de Poitiers posséda Châteaudouble de 1555 à 1566 date de sa mort. Pendant les guerres de religion, il était tenu par un bandit, Laprade, qui pillait et massacrait dans tout les environs. Maugiron gouverneur du Dauphiné arrête Laprade et rasa le château, La veuve de Puy-Montbrun obtint en 1594 la seigneurie de Châteaudouble , son fils en hérita et en 1604 Pierre de la Baume l'acquit et le reconstruisit.\r\nLe Château actuel appelé aussi  \"Appolinaire\" construit en 1630. Aux la Baume succédèrent par alliance au XVIIIe siècle aux Valbonne, aux Gensac. \r\nA la Révolution , il fut acheté par Monsieur Boutaud qui épousa l'héritière Marie Françoise Anne de la Villéon, puis vendu en 1854 à la famille Gontrand du Bourg, toujours dans la descendance.","architecture":"Châteaudouble;Le premier château était construit sur la grosse butte dont les trois côtés forment une terrasse, appelé \"château Rompu\"  aujourd'hui en ruines, détruit en 1590 faisait parti des trente sept places du Dauphiné à détruire sur ordre d'Henri IV. Le château actuel \" Châteaudouble\"  se compose de quatre corps de logis, flanqués de pavillons et de grosses tours rondes et carrées donnant sur une cour intérieure, une importante porte en pierre de  tuf marque l'entrée, et  possède un garde corps important à l'entrée du château qui le fit appelé \"double\".","habitants":"famille de Pierre de la Beaume d'Hostun\"","divers":"Gravure des ruines de \"Château rompu\", Château et Garde corps-porte d'entrée du Château.","gps":"","images":["../image/image_26/26_Chateaudouble_1.jpg","../image/image_26/26_Chateaudouble_2.jpg","../image/image_26/26_Chateaudouble_3.jpg","../image/image_26/26_Chateaudouble_4.jpg"]},"Consult_chateau_formulairea945":{"id":"Consult_chateau_formulairea945","dept":"26","canton":"Nyons","commune":"Châteauneuf-de-Bordette","nom":"Chateauneuf_de_Bordette","type":"Vestiges","periode":"XII","histoire":"Châteauneuf de Bordette: Propriété des seigneurs de Valréas en 1207. \r\nLe domaine fut acquis ensuite par les Dauphins et transmis aux Constant d'Alba en 1307 qui le revendirent en 1365 aux Morges, puis revendu aux Gillin qui eurent pour héritiers les Barnier. Lesquels fut remplacés en 1419 par les Thollon de Sainte Jalle, qui le revendirent en 1549 aux Soyans, en 1620 les Thollon le dotèrent par alliance  en 1667 chez les Fortia des Pilles qui s'éteignirent en 1685 chez les Bléziers de Taulignan, lesquels cédèrent leur biens suite à une condamnation aux Labeau de Bérard dernier seigneur qui conservèrent le bien jusqu'à la Révolution.","architecture":"Traçes de construction du château de Peytieux  sur la motte féodal datant du XIe siècle.","habitants":"Famille de Thollon Labeau de Bérard\"","divers":"Motte féodal et village","gps":"","images":["../image/image_26/26_Chateauneuf_de_Bordette_1.jpg","../image/image_26/26_Chateauneuf_de_Bordette_2.jpg"]},"Consult_chateau_formulaire0570":{"id":"Consult_chateau_formulaire0570","dept":"26","canton":"Dieulefit","commune":"Bégude-de-Mazenc","nom":"Chateauneuf_de_Mazenc","type":"Vestiges","periode":"XIII","histoire":"Bégude de Mazenc: Cette seigneurie était le fief des comtes de Valentinois au XIII-XIVe siècle, au XVe siècle de Lancelot  \"bâtard de Poitiers\" et les héritiers de celui-ci le vendirent en 1498 aux Vesc de Grimaud qui s'éteignirent en 1554 chez les Algout, ces derniers revendirent en 1602 aux Renard qui le cédèrent en 1616 aux Marcel Blaïn, mais pour le recouvrer trois ans après. \r\nEnfin en 1630, une alliance fit passer cette seigneurie aux d'Yse qui la revendirent en 1769 aux Ravel des Crottes ses derniers seigneurs.","architecture":"Du château vieux, détruit pendant les guerres de religion, il ne reste qu'un donjon et des pans de murs, porte et beffroi.","habitants":"Famille de Ravel des Crottes\"","divers":"vestiges du château donjon transformé en beffroi","gps":"","images":["../image/image_26/26_Chateauneuf_de_Mazenc_1.jpg","../image/image_26/26_Chateauneuf_de_Mazenc_2.jpg","../image/image_26/26_Chateauneuf_de_Mazenc_3.jpg"]},"Consult_chateau_formulairef1dc":{"id":"Consult_chateau_formulairef1dc","dept":"26","canton":"Montélimar","commune":"Châteauneuf-du-Rhône","nom":"Chateauneuf_du_Rhone","type":"Vestiges","periode":"XII","histoire":"Châteauneuf du Rhône: Fief des Evêques de Viviers, qui, hautes seigneuries  dés 1206, étaient possesseurs du château de Châteauneuf et l'autre château dit \"de Montpensier\".\r\nAu  XIIe siècle appartenait aux Burgondion et fut acquis vers 1264 par les Evêques de Viviers qui le réunirent a leur château.                          Dans la commune château de Combeaumont de Frédéric Rivière de la Mure, garde des sceaux en la chancellerie du Dauphiné  de 1779 à 1789, il eu trois fils avec Julie Azélie de Mirabel  \"comtesse de la Mure\". les trois fils tous officier ou préfet. Le château toujours dans la descendance.","architecture":"Chateauneuf; enceinte médiévale, raccordant deux châteaux Montpensier et Sainte-Catherine avec portes et tours Dans cette zone fortifiée, en ruine depuis 1560, de cet ensemble il reste une porte (porte Notre-Dame de Donzére) et des vestiges de remparts, château Porcher oppidum.","habitants":"Evêques du Viviers.                     La famille Rivière de la Mure\"","divers":"De l'enceinte médiévale vestiges du château remparts et porte fortifiée. Combeaumont maison forte remanié au XIX","gps":"","images":["../image/image_26/26_Chateauneuf_du_Rhone_1.jpg","../image/image_26/26_Chateauneuf_du_Rhone_2.jpg","../image/image_26/26_Chateauneuf_du_Rhone_3.jpg","../image/image_26/26_Chateauneuf_du_Rhone_4.jpg"]},"Consult_chateau_formulairec0bc":{"id":"Consult_chateau_formulairec0bc","dept":"26","canton":"Bourg-de-Péage","commune":"Châteauneuf-sur-Isère","nom":"Chateauneuf_sur_Isere","type":"Vestiges","periode":"XII","histoire":"Châteauneuf sur Isère: Fief de la famille de Châteauneuf, dont Saint-Hugues naquit en 1053 et fut seigneur de Châteauneuf, qui l'on croit avoir une origine commune avec les seigneurs de Chabeuil, fut acquise vers le milieu du XIIIe siècle par les Evêques de Valence, qui ont été seigneurs jusqu'à la révolution.","architecture":"Du château il ne reste plus rien sinon la motte féodal et quelques vestiges de Murs.","habitants":"Seigneurs de Châteauneuf\"","divers":"motte féodal et remparts","gps":"","images":["../image/image_26/26_Chateauneuf_sur_Isere_1.jpg","../image/image_26/26_Chateauneuf_sur_Isere_2.jpg","../image/image_26/26_Chateauneuf_sur_Isere_3.jpg"]},"Consult_chateau_formulaire4c47":{"id":"Consult_chateau_formulaire4c47","dept":"26","canton":"Grand-Serre","commune":"Hauterives","nom":"Chatelard (26)","type":"Château","periode":"XVI","histoire":"Chatelard:La seigneurie relevait du fief des Evêques de Vienne,  anciennement possédée  par une famille de son nom, qui s'éteignit vers le milieu du XIIe siècle chez les Clermont, elle fut vendue en 1467 par ces derniers aux Poisieu, dont l'héritière s'allia en  1514 chez les Saint-Chamond, elle fut acquise en 1597 par les Borel qui le vendirent en 1793 aux Chastellard derniers seigneurs d'Hauterives.\r\nCette seigneurie du même fief que les Hauterives,  la fille épousa un De Miribel; Général des armées impériales. En 1831, va naître Marie-François joseph de Miribel, enfant surdoué, s'illustra dans les guerres de Crimée, Piémont Mexique et la guerre franco prussienne  de 1867 à 1870, comme attaché militaire à Saint-Petersbourg et devint chef d'état-major de l'armée. Les descendants sont toujours propriétaires.","architecture":"Le château actuel fut construit au XVIIe siècle  remanié en 1881  de Style Empire, construction rectangulaire flanquée de deux tourelles rondes dont une avec un toit à coupole, l'autre d'origine , avec meurtrières. Dans le parc pigeonnier du XVe","habitants":"Famille de Chatellard \r\nFamille De Miribel\"","divers":"Château du Chatelard","gps":"","images":["../image/image_26/26_Chatelard_1.jpg"]},"Consult_chateau_formulaire1fb3":{"id":"Consult_chateau_formulaire1fb3","dept":"26","canton":"Châtillon-en-Diois","commune":"Châtillon-en-Diois","nom":"Chatillon_en_Diois","type":"Vestiges","periode":"XI","histoire":"Châtillon en Diois: Cité au XIIe siècle, la seigneurie  était le fief de l'église de Die, dont les droits sur le château furent confirmés en 1178 par l'Empereur Frédéric 1er.                        Cette seigneurie appartenait  du temps immémorial aux Isoard d'Aix, hétitiers du comtes de Diois, et passa en 1246, par mariage, aux princes d'Oranges de la maison des Baux, qui vendirent en 1321 cette seigneurie aux Evêques de Die. \r\nA part une aliénation de prés d'un demie siècle (1556 à 1635) au profit de la Tour Gouvernet, ces évêques ont été seigneurs de Châtillon jusqu'en 1789.","architecture":"Du château il ne reste que quelques vestiges sur l'éperon rocheux au centre du village, les remparts construit par les évêques ont disparu, dans le village il reste des façades renaissances, une tour-porte carrée du XVIIIe siècle et un beffroi.","habitants":"La Tour Gouvernet\"","divers":"porte et maison renaissance","gps":"","images":["../image/image_26/26_Chatillon_en_Diois_1.jpg","../image/image_26/26_Chatillon_en_Diois_2.jpg","../image/image_26/26_Chatillon_en_Diois_3.jpg"]},"Consult_chateau_formulairedf15":{"id":"Consult_chateau_formulairedf15","dept":"26","canton":"Romans","commune":"Châtillon-St-Jean","nom":"Chatillon_St_Jean","type":"Maison forte","periode":"XV","histoire":"Châtillon Saint-Jean: Fief des Chapitres de Romans, puis possédé par les Bressieu, puis par les Clermont-Chatte; la seigneurie fut vendue en 1478 par ces derniers aux Vinay, qui s'éteignirent en 1590 chez les Montchenu, ceux-ci furent remplacés en 1686 par les Béatrix Robert, remplacés eux mêmes par les Moret de Bourchenu en 1720  dont l'héritage fut recueilli en 1730 par les Bally, derniers seigneurs. \r\nDans la famille Bady depuis 1810.","architecture":"Construit au XVe siècle de style  Renaissance, corps de logis  carré flanqué de tours d'angle rondes","habitants":"famille Bad
