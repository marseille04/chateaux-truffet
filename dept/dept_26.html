y\"","divers":"Maison forte de Chatillon St-Jean","gps":"","images":["../image/image_26/26_Chatillon_St_Jean_1.jpg"]},"Consult_chateau_formulaire6951":{"id":"Consult_chateau_formulaire6951","dept":"26","canton":"Pierrelatte","commune":"Les Granges-Gontardes","nom":"Chatroussas","type":"Maison forte","periode":"XIII","histoire":"Chatroussas: Les Gontard, vassaux des Adhémar, les Narbonne-Pellet, les les d'Escalin baron de la Garde en furent les premiers occupants, puis , successivement les Redon, les Narbonne- Fritzlar. \r\nLe comte de Narbonne-Fritzlar abandonne ses droits féodaux le 19 Août 1789; repris par le colonel de la Baume en 1816, toujours dans la descendance.\r\nAncien péage au passage de la Berre.","architecture":"La bâtisse  construite sur l'emplacement d'une villa romaine, d'architecture  féodale  remonte au XIIIe siècle appelé à l'époque\" La Berre\", remanié  au  XVIII- XIXe siècle, avec une tour de consolidation du XIXe siècle et prit le nom de Châtroussas.","habitants":"Famille de Frilzlar  \r\nFamille de Narbonne \r\nFamille des de Baume.\"","divers":"Maison forte de Chatousas","gps":"","images":["../image/image_26/26_Chatroussas_1.jpg"]},"Consult_chateau_formulairebe93":{"id":"Consult_chateau_formulairebe93","dept":"26","canton":"Saillans","commune":"Eygluy-Escoulin","nom":"Cheylard","type":"Vestiges","periode":"XII","histoire":"Cheylard: Au XIIe siècle,  Eygluy est le centre d'un vaste mandement qui regroupe quatre paroisses et s'étend au nord jusqu'au col de la Bataille. En 1329, Aymar V de Poitiers, seigneur d'Eygluy, en 1391, une bande de routiers à la solde de Raymond de Turenne s'installe dans le château d'Egluy et terrorise toute la région. Il faut acheter leur départ et, pour éviter que pareille mésaventure ne se renouvelle, le château fut démoli.\r\nAu XVe siècle, Egluy passe aux d'Eurre, puis aux Hostun, avant d'être acheté en 1652 par Antoine de la Baume-Pluvinel, célèbre écuyer du roi Louis XIV qui le fait marquis en 1623.\r\nQuant au Cheylard, (le château), il constitue un fief distinct, propriété des Sauvains et ne prend le nom de l'Escoulin qu'en 1920.","architecture":"Du château il ne reste que la base du donjon avec quelques fenêtres à meneaux apparentes et un pan de tour à moitié détruite sur une motte.","habitants":"Famille de Aymar V  de Poitiers\"","divers":"vestiges du château","gps":"","images":["../image/image_26/26_Cheylard_1.jpg","../image/image_26/26_Cheylard_2.jpg","../image/image_26/26_Cheylard_3.jpg"]},"Consult_chateau_formulaire4db3":{"id":"Consult_chateau_formulaire4db3","dept":"26","canton":"St-Jean-en-Royans","commune":"St-Laurent-en-Royans","nom":"Chollet","type":"Manoir","periode":"XX","histoire":"Chollet fut construit au XVIIIe siècle transformé,  aujourd'hui en logis de France.","architecture":"Style moderne, corps de logis rectangulaire à deux étages et attique flanqué d'un pavillon carré et arrondie sur la face Nord et tourelle carrée à l'opposée.","habitants":"\"","divers":"","gps":"","images":["../image/image_26/26_Cholet_1.jpg","../image/image_26/26_Cholet_2.jpg"]},"Consult_chateau_formulaire75b2":{"id":"Consult_chateau_formulaire75b2","dept":"26","canton":"St-Paul-les-Trois-Châteaux","commune":"Clansayes","nom":"Clansayes","type":"Vestiges","periode":"XII","histoire":"Clansayes: En 832 Charles Adhémar de Monteil reçu de Lambert Giraud Adhémar la seigneurie.\r\nAu XIe siècle Giraud-Hugues Adhémar dont un des fils forma les branches des seigneurs de Grignan, les Giraudet celle des seigneurs de la Garde et les Hugues celle des seigneurs de Lombers dans le Tarn.\r\nDe 1252 à 1286 Clansayes est sous la coupole du siège épiscopale de Saint-Paul-les-Trois-Châteaux, ses descendants sont les premiers possesseurs de Clansayes, il s'appelait Bertrand ce dernier  sortait de l'ancienne famille des Adhémar et son successeur fut son fils Laurens.\r\nEn 1413 Guy Adhémar seigneur de Clansayes et de Grignan, puis Giraud, Louis, un Giraud à nouveau et Bertrand cinquième fils de Giraud baron de Grignan, d'Aps et seigneur de Clansayes, il épousa en 1486 Béatrix Alleman de Taulignan, sa fille Catherine, femme de jacques Brunier seigneur de Larnage. Louis Gaucher Adhémar en 1645 et François Adhémar qui en préte hommage au roi dauphin en 1636. \r\nPuis Pauline Adhémar fille de madame de Sévigné veuve, vendit en 1718   à Louis-Nicolas-Felix du Muy ministre de la guerre et maréchal de France, qui en 1774 laissa ses biens à Jean-Baptiste Louis-Philippe de Félix du Muy général de division en 1792.","architecture":"Le village a conservé d'importants remparts malgré le tremblement de terre du 8 juin 1772 avec secousses régulières jusqu'au 25 novembre 1773, reste une poterne, une belle tour carrée à bossages et à mâchicoulis, un grand pan de mur et une tour cylindrique. \r\nMais le joyau reste l'étonnant donjon octogonale 15 mètres de haut et de 32 mètres de circonférence, des arcs plein cintre reposent sur les angles du donjon. \r\nAidés par des contreforts, ils permettent le passage vers un plan octogonal.\r\ncette forteresse mentionnée au XIIIe siècle  a servi de prison.\r\nFiché sur la pointe du village","habitants":"Adhémar de Monteil de la Garde\"","divers":"vestiges du château et donjon et le manoir de Romanin ou château Giraud","gps":"","images":["../image/image_26/26_Clansayes_1.jpg","../image/image_26/26_Clansayes_2.jpg","../image/image_26/26_Clansayes_3.jpg","../image/image_26/26_Clansayes_4.jpg","../image/image_26/26_Clansayes_5.jpg","../image/image_26/26_Clansayes_6.jpg"]},"Consult_chateau_formulaire1da0":{"id":"Consult_chateau_formulaire1da0","dept":"26","canton":"St-Vallier","commune":"Claveyson","nom":"Claveyson","type":"Château","periode":"XII","histoire":"Claveyson: En 1366 Geoffroy V de Claveyson, seigneur de Claveyson, Mercurol et Mureils, puis à son fils Aimé de Claveyson, décédé aux combat, remplacé par son frère François de Claveyson et en 1429 Claveyson passe au Dauphin. \r\nBéatrice, héritière de sa maison et de la seigneurie Mercurol et Muriels, mariée avec Jacques d'Hostun qui reprend les armes de Claveyson; cinq enfants: Gilles, Goffroy VII , Jacques , Antoine et Louis VIII, tous succédèrent jusqu'en 1529.\r\nCes Louis VIII qui fit rebâtir le château de Claveyson en 1508 .\r\nQuelques temps après, il finissent dans une troisième maison par Laurence d'Hostun de Claveyson épouse  en 1615 Hugues de Lionne, seigneur de Leyssins  d'Aouste, de Triors et  de Flandénes, conseiller au parlement. \r\nUn autre château fut construit ce dernier passa en 1638 à Jhoannes de Popon  de Macunne, capitaine, marquis de Claveyson de 1635-1676, et le château resta dans cette famille jusqu'en 1850.","architecture":"Du château médiéval sur la motte il fut arasé. De l'autre château ( propriété privée), corps de logis rectangulaire à pavillons saillants.","habitants":"Famille de Jacques d'Hostun\"","divers":"Château de Claveyson","gps":"","images":["../image/image_26/26_Claveyson_1.jpg"]},"Consult_chateau_formulairef395":{"id":"Consult_chateau_formulairef395","dept":"26","canton":"Romans","commune":"Clérieux","nom":"Clerieux","type":"Vestiges","periode":"XII","histoire":"Clérieux était le chef lieu d'une baronnie, vers 930 vivait le fils de Hungrinius Silvion Ier le vieux, qui fut le père de Guillaume de Manceps le Cupide, d'Adenou Adonet de Fréda, mariée à Guillaume de Romans, et d'une autre fille, mariée à Guigues, Prince d'Albon.\r\nLe domaine passa à Guillaume de Manceps, en 994, frère de Odon, père de guillaume II : En 1123 Silvion II : En 1170 Guillaume III (oncle sacristain de l'abbaye de St -Barnard ) qui fut le frère en 1186 de Guillaume Gratte Paille, frère de Roger II et  père  en 1256 Sylvion . \r\nEn 1280 Roger III : En 1304 Guillaume Gaston, meurt sans enfants, son frère  Guichard, dernier des Clérieux, meurt sans enfants en 1336 (fin de la famille des Clérieux) .\r\nLa baronnie des Clérieux passe aux Comtes du Valentinois de la Famille des Poitiers.\r\nDès le 9 Janvier 1336, le Dauphin Humbert II avait investi Guillaumme de Poitiers de Saint-Vallier, des terres de Clérieu. Ceux-ci apanagèrent en 1404 les Poitiers Saint-Vallier, dont les héritiers en 1594 la baronnie de Clérieux passa aux la Croix Chevrières, en 1751-1756 Nicolas de la Croix seigneur Marquis de Clérieux, ses descendants en étaient encore seigneurs à la Révolution. \r\nEn 1900 le marquis de Châbrillan possédait l'immense propriété du château de Merlet ou fût construit le château des Clérieux après la chute du château dans le village et fût incendié en 1790.","architecture":"De ce village fortifié il ne reste que quelques pans de murs des remparts et des éléments de tours. \r\nDu château construit  à Merlet il ne reste que les murs d'enceintes côté Est .\r\nManoir sur le bord de l'Isère appartenant à cette famille.","habitants":"La Croix de Chevrières marquis de Clérieu\"","divers":"Vestiges de Clérieux\r\nChâteau Rey (usines)\r\nDomaine de Clairmonts","gps":"","images":["../image/image_26/26_Clerieux_1.jpg","../image/image_26/26_Clerieux_2.jpg","../image/image_26/26_Clerieux_3.jpg","../image/image_26/26_Clerieux_4.jpg"]},"Consult_chateau_formulairea76d":{"id":"Consult_chateau_formulairea76d","dept":"26","canton":"Loriol-sur-Drôme","commune":"Cliousclat","nom":"Cliousclat","type":"Village fortifié","periode":"XII","histoire":"Cliousclat: Au XIIe siècle faisait partie du Comté du Valentinois ainsi que la mouvance des Adhémar, seigneurs de Monteil devenu par eux  Montélimar. \r\nAu XIVe siècle, dépendait de l'abbaye de St-Chaffre, qui fût uni à la mense épiscopale de Valence, dont la seigneurie dépendait des Evêques.","architecture":"De ce village fortifié et du château il ne reste plus rien, car depuis l'incendie du village au XVe siècle suite aux guerres de religion tout à été détruit.","habitants":"Evêques de Valence\"","divers":"Village  ancien de Cliousclat","gps":"","images":["../image/image_26/26_Cliousclat_1.jpg"]},"Consult_chateau_formulaireb115":{"id":"Consult_chateau_formulaireb115","dept":"26","canton":"Crest","commune":"Cobonne","nom":"Cobonne","type":"Village fortifié","periode":"XI","histoire":"Cobonne: Fief des Poitiers, comtes de Valentinois, appartenait en 1290 aux Quint, puis aux Reynaud, ceux-ci revendirent en 1331 aux Clermonts Montoison qui furent les derniers seigneurs jusqu'à la Révolution.","architecture":"Du XIIe siècle des remparts et huit tours cylindriques entouraient le village de Cobonne sous le contrôle d' un donjon circulaire, l'ensemble fut détruit par les guerres de religion entre les seigneurs de Poitiers et les Evêques de Die, puis le passage des routiers. \r\nIl reste aujourd'hui que les bases de trois tours et celle du donjon, portes et pans de remparts.","habitants":"\"","divers":"Vestiges du village fortifié","gps":"","images":["../image/image_26/26_Cobonne_1.jpg","../image/image_26/26_Cobonne_2.jpg","../image/image_26/26_Cobonne_3.jpg","../image/image_26/26_Cobonne_4.jpg"]},"Consult_chateau_formulairee526":{"id":"Consult_chateau_formulairee526","dept":"26","canton":"Dieulefit","commune":"Comps","nom":"Comps","type":"Château","periode":"XIII","histoire":"Comps: Fief des comtes de Valentinois au XIIIe siècle, puis possédé par une famille de ce nom qui s'éteignit dans le cours du XIIIe siècle chez les Vesc, alliance de Gédéon de Vesc qui épousa Lucréce de Chabeuil en 1600, le château  passa chez les Moretton de Chabrillan, dont les descendants en étaient propriétaires  jusqu'à la révolution.  \r\nArnaud de Comps au XIIe siècle fut grand maître de l'ordre de Saint-Jean de Jérusalem et membre illustre de la famille, un des meilleurs chef de l'armée de ce Prince, dira Chorier, au point que la \"Syrie et l'Egypte\" n'avait point de héros à lui opposer et que sa mort qui arriva en 1167, fut la plus grande perte que put faire le royaume de Jérusalem.\r\nLe château  transformé en ferme fut longtemps la propriété de la famille Morin de Dieulefit qui le vendit à Mr Riaille, ce dernier le revendit à Mr Terrot qui continuant la ferme en fait un logis de France.","architecture":"Corps de logis rectangulaire à deux étages  et attiques  dans un cadre quadrangulaire flanqué de quatre tours cylindriques, deux sont encore intacts à toits  presque plats.","habitants":"Famille de Vesc\r\nFamille Moretton  \r\nFamille Terrot\"","divers":"Château de Comps","gps":"","images":["../image/image_26/26_Comps_1.jpg","../image/image_26/26_Comps_2.jpg"]},"Consult_chateau_formulairedc9a":{"id":"Consult_chateau_formulairedc9a","dept":"26","canton":"Marsanne","commune":"Condillac","nom":"Condillac","type":"Château","periode":"XI","histoire":"Condillac: Fief des abbés de Cruas Aimar de la Voulte (Ardéche) ensuite par Giraud des Adhémar, et fût acquis  par ses derniers et en 1360 par les Evêques de Valence qui l'inféodèrent en 1451 aux Plovier puis aux Espenel, ceux-ci vendirent la seigneurie en 1451 qui s'éteignirent en 1592 chez les Hector de Forez de Blacons, lesquels s'éteignirent aux début du XVIIe siècle.\r\nPuis chez les Arnaud derniers seigneurs de Condillac, ensuite Benoît de Priam par alliance avec Jacques de Priam dont une de ses filles Louise par son deuxième mariage avec Hector de Forest seigneurs de Blacons porta Condillac, Oneïda de Priam dernière du nom  qui épousa en 1818 le comte d'Andigné, sa fille, Mademoiselle d'Andigné, laissa à son filleul Charles,  cette belle résidence qu'il occupa  après son mariage avec la princesse Françoise de Faucigny-Lucinge.","architecture":"Remonte au XIe siècle,   donjon quadrangulaire, arasé aujourd'hui s'appuie au Sud , à l'Est et à l'Ouest un corps de logis carré , au Nord un autre corps de logis rectangulaire, tous deux étayés de trois tours. \r\nLa partie sud  façade renaissance du XVe siècle remanié au XVI  et  XIXe siècle.","habitants":"Famille d'Espenel.\r\nFamille de Priam Comte d'Aubigné\"","divers":"Château de Condillac","gps":"","images":["../image/image_26/26_Condillac_1.jpg","../image/image_26/26_Condillac_2.jpg","../image/image_26/26_Condillac_3.jpg"]},"Consult_chateau_formulaire7b96":{"id":"Consult_chateau_formulaire7b96","dept":"26","canton":"Nyons","commune":"Condorcet","nom":"Condorcet","type":"Vestiges","periode":"X","histoire":"Fief des Condorcet revient à différentes familles qui elles mêmes vont être vassales du Dauphiné où de la Provence  est revendiqué par Dragonet de Montauban, en tant que légitime héritier de sa sur Dragonette qui épousa d'Izoard d'Aix, seigneur de Condorcet. En 1242 à Raymond de Baux, en 1266 à Raymond D'Agout, seigneur du Luc en Diois, en 1414 aux Rolland,  en 1478 aux Barthenay, ces derniers ne gardèrent pas longtemps ce château qui fait retour aux princes d'Orange, lesquels en firent don en 1501 aux Poitiers d'Allan. \r\nL'héritière  s'allia chez les Caritat qui deviennent seigneurs de Condorcet en 1564 et resta dans la famille des Caritat jusqu'à la révolution.\r\nAu XIXe siècle c'est le gendre de François-Héléne de Caritat, Jean-Pierre-Gaspard Ailhaud est qualifié le dernier seigneur de Condorcet.","architecture":"Le château qui fut construit au XI et XIIe siècle  a perdu sa vocation de forteresse dans le courant du XVe siècle. \r\nLes fortifications ont été construites au XIIIe siècle, et détruite en 1540, il est en ruine par les guerres de religion, il  subsiste les bases de remparts et pan de mur de la tour ronde.","habitants":"Raymond de Baux  Caritat\"","divers":"Vestiges à Condorcet","gps":"","images":["../image/image_26/26_Condorcet_1.jpg","../image/image_26/26_Condorcet_2.jpg","../image/image_26/26_Condorcet_3.jpg"]},"Consult_chateau_formulaire9605":{"id":"Consult_chateau_formulaire9605","dept":"26","canton":"Rémuzat","commune":"Cornillon","nom":"Cornillon","type":"Vestiges","periode":"XII","histoire":"Cornillon: Fief des barons de Mévouillon ( Raymond de Mévouillon, vassal de l'abbé de l'Isle-Barbe),  achète en 1288 à Guigue Alleman  et passa en 1300 par les Plaisans et en 1302 aux Dauphins.\r\nLa vente annulée et ce fut le comte de Provence Charles II d'Anjou, qui acquit tout le val. \r\nVers 1320 Raybaud de Rémuzat devient seigneur de Cornillon par son mariage avec Bonette de Rosans. Ces derniers furent remplacés vers 1390  par  Raymond d'Algout à qui la reine Jeanne inféoda Cornillon. Eurent comme successeurs les Mévouillon de Barret et en 1542 Eymar-Antoine de Bressieux en est propriétaire sous contrôle de René  de la  Tour Gouvernet, qui en sera propriétaire en 1613 bien que le château fut détruit en 1631, l'héritier Pierre de la Tour de Gouvernet  marquis de la Charce et Baron de Cornillon vend à Sieur Perrin Châtelain de Cornillac tous les biens, ses derniers seigneurs.","architecture":"De cette forteresse il ne reste que des ruines d'un château fort médiéval re-fortifié au  XVIe siècle avec un donjon du XVIe siècle. Dans ce château il n'y avait que des soldats qui a échappé au démantèlement de Richelieu , mais les guerres de religion entraîna sa perte en 1631.","habitants":"Raymond  de Mevouillon\"","divers":"","gps":"","images":["../image/image_26/26_Cornillon_1.jpg","../image/image_26/26_Cornillon_2.jpg"]},"Consult_chateau_formulairecafe":{"id":"Consult_chateau_formulairecafe","dept":"26","canton":"Luc-en-Diois","commune":"Miscon","nom":"Cour","type":"Maison forte","periode":"XIII","histoire":"Cour: Dans cette maison forte aurait été enfermé au XIIIe siècle le seigneur du Gua, fait prisonnier par le seigneur de la Roche des Arnauds.  \r\nAujourd'hui ferme agricole.","architecture":"Existé au XIIIe siècle fortement remanié, cette maison forte a conservée  deux tours rondes et une échauguette.","habitants":"Roches des Arnauds\"","divers":"","gps":"","images":["../image/image_26/26_Cour_1.jpg"]},"Consult_chateau_formulairee178":{"id":"Consult_chateau_formulairee178","dept":"26","canton":"Romans","commune":"Crépol","nom":"Crepol","type":"Château","periode":"XVII","histoire":"Crépol: Le château de Marcieu était un ancien pavillon de chasse, construit en 1619 à 1622 par la famille de Clermont-Chaste, puis vendu à jean Baptiste Mistral vers 1680, celui-ci  passe par alliance aux Emé de Marcieu en 1715, Laurent Joseph de Guiffrey de Monteynard, second marquis de Marcieu, veuf de Charlotte d'Allois d'Herculais, remarié en 1715 à Françoise Gabrielle de Mistral de Montmirail de Mondragon ( 1698-1770).\r\nLa marquise de Montmirail, Baronne de Crépol, dame de Saint-Egrève, de Saint-Martin en 1753, était la fille et l'héritière de Joackim  de Mistal, qui avait été fait marquis de Montmirail en 1710, Baron de Crépol, seigneur de Bagnols la Savasse, le châtelard et de sa première épouse Anne de Bargemont.\r\nAlliance  d'Alberie-Gaston-Marie-Gabriel-Emé (1829-1888) qui épousa en 1856 Marie-Isabelle de Chanaleilles (1833-1925)  fille unique du marquis de Crepol, Sosthéme et de Marie Victorieuse Stéphanie de Bulbes de Berton de Grillon.\r\nDe nombreux membres de ces familles s'illustrèrent au cours du XVIIIe siècle.Propriété aujourd'hui de Rudy Chaix","architecture":"Construit au XVIIe siècle par la famille de Clermont-Chatte, dans un style Louis XIII, à trois étages de forme carrée. Le château primitif  était  un rendez-vous de chasse dépendant de l'abbaye de Saint-Barnard. \r\nRemaniement  des façades  en 1715 et 1856 . Le pavillon d'entrée a conservé son dôme et son clocheton.","habitants":"Marquis de Marcieu\r\n        \r\n        \"","divers":"","gps":"","images":["../image/image_26/26_Crepol_1.jpg","../image/image_26/26_Crepol_2.jpg"]},"Consult_chateau_formulaire7eae":{"id":"Consult_chateau_formulaire7eae","dept":"26","canton":"Crest","commune":"Crest","nom":"Crest","type":"Fort","periode":"X","histoire":"Crest; La citadelle, cité en 1119 dans un texte du pape Calixte II, sa   construction du  XIIe siècle par les seigneurs  \"les Arnaud\" qui le soumirent au fief des Evêques de Die en 1145, puis devient propriété des comtes de Valentinois (Adémar de Poitiers).\r\nQui transformèrent la citadelle en forteresse, mais durent la partager avec les évêques de Die, qui firent garder la partie supérieure par le Capitaine Arnaud, et la partie inférieure par les Poitiers. En 1347 après la bataille  d'Eurre Aymar VI de Poitiers récupère l'ensemble. En 1382 Louis II de Poitiers installe une fabrique de monnaie et en 1419 devient propriété des rois de France, puis concédée à plusieurs familles, au traité de Péronne en 1641 Louis XIII en fit hommage  à Honoré de Grimaldi, Prince de Monaco jusqu'à la Révolution.\r\nAu XVIe siècle, Richelieu fit abattre le château et les remparts, seul la tour est épargnée, transformée en geôle d'état, elle  a également servit de prison. Propriété de l'état à la Révolution, vendue ensuite à la famille Chabriéres le 29 Juillet 1878 et cette dernière l'offrit à la ville le 10 Août 1988.                               Beauregard; Ancienne ferme bâtie sans doute au XVIIe siècle, acquis en 1860 par Gustave Latune l'un des descendants de la branche \"Crestoise\"  de la famille Latune.","architecture":"De cette forteresse; il ne reste que la tour haute de 52 mètres de haut, une des plus haute tour de France,  de forme rectangulaire à la base, il s'agit de deux tours:  la tour vieille édifiée entre les IVe et XIe siècle,  la tour neuve du XIVe siècle qui est le reste du château démoli en 1632.             Beauregard; de style Vénitien du XVIIe siècle, abrité peut-être une magnanerie, corps de logis en fer à cheval, orangeraie sous les escaliers.","habitants":"Arnauds, Grimaldi \"","divers":"Tour de Crest et manoir dans la commune Manoir de Beauregard","gps":"","images":["../image/image_26/26_Crest_1.jpg","../image/image_26/26_Crest_2.jpg","../image/image_26/26_Crest_3.jpg","../image/image_26/26_Crest_4.jpg","../image/image_26/26_Crest_5.jpg","../image/image_26/26_Crest_6.jpg","../image/image_26/26_Crest_7.jpg"]},"Consult_chateau_formulairec9f1":{"id":"Consult_chateau_formulairec9f1","dept":"26","canton":"Nyons","commune":"Curnier","nom":"Curnier","type":"Vestiges","periode":"XII","histoire":"Curnier: Fief des barons de Mévouillon, appartenait en 1205 aux Artellari et aux Geranz et en 1230, ce sont les Sahune qui détiennent cette forteresse. \r\nPassa à Gerante de Sahune fils de Bertrand de Caderousse, qui vendit en 1293 au Dauphin.\r\nEn 1317 Jean Aynard, fils de Raymond de Curnier en sera le successeur à sa majorité et en 1334 Guillaume de Mévouillon devient seigneur de Curnier. Cette même année, le dauphin inféodait cette forteresse au Prince d'Orange , Raymond  de Baux qui en fut le propriétaire jusqu'en 1687. \r\nReprit par Monsieur De Raymond Modéne qui en fut le dernier  seigneur jusqu'a la révolution.","architecture":"Vestiges de l'ancien château, base de tour carrée et du corps de bâtiment. \r\nSa démolition remonterait au XVe Siècle.","habitants":"Raymond de Curnier\"","divers":"","gps":"","images":["../image/image_26/26_Curnier_1.jpg"]},"Consult_chateau_formulaire3ed8":{"id":"Consult_chateau_formulaire3ed8","dept":"26","canton":"Crest","commune":"Saou","nom":"Dauphins_Saou","type":"Manoir","periode":"XX","histoire":"Dauphins-Saou: Construit en 1930-1931 inauguré en 1934  réplique du petit Trianon par Maurice Burrus, originaire de Sainte-Croix-aux- Mines (68) député du Haut-Rhin, milliardaire, possédait plusieurs manufactures de tabac en Suisse, il fit construire prés de la villa Tibur le petit Trianon transformé en auberge des Dauphins qui connut des heures de gloire et la forêt fut protégée et améliorée, mais la guerre viendra mettre un terme a cette activité débordante, ils durent \r\nfermer en 1939 et pillé à la libération tomba à l'abandon.\r\nMonsieur Burrus décéda en 1959 et en 1964 ses héritiers vendirent la forêt à monsieur Jean Fleury, juriste un proche de la famille du prince Napoléon, racheté par  un groupement d'assurances qui la revendirent en 2000 au conseil régional de la Drôme.","architecture":"Château des Dauphins; corps de logis rectangulaire de style empire à deux étages flanqué de pied-droit en façade plein cintre et côté Ouest la partie Est possède une orangeraie, à nos jours en cours de rénovation par le conseil régional qui à reprit la forêt.","habitants":"Maurice Burrus\"","divers":"Château des Dauphin en forêt de Saou","gps":"","images":["../image/image_26/26_Dauphins_1.jpg","../image/image_26/26_Dauphins_2.jpg","../image/image_26/26_Dauphins_3.jpg"]},"Consult_chateau_formulaire9260":{"id":"Consult_chateau_formulaire9260","dept":"26","canton":"Die","commune":"Die","nom":"Die","type":"Village fortifié","periode":"III","histoire":"DIE; Ville episcopale fortifiée, fief des Evêques de Die, son premier seigneur Evêque fut Saint-Mars, qui eut d'illustres successeurs dont un certain nombre, tel que Higer, Maxime, Exupére, Marcel, Etienne et Ismidon. \r\nSaint Niçaise (troisième) fut le seul prélats des Gaules.\r\nLes Lombards se rendent maîtres de la ville en 574, puis passa au pouvoir des Bourguignons, des empereurs allemands, des comtes et des évêques qui la possédèrent en souverains concédèrent, en 1178 et 1214 tous les droits régoliens dans son diocèse et qui prenait encore en dernier lieu le titre de comté de Die qui fut réunit aux comté du Valentinois à Aymard II de Poitiers, jusqu'en 1419 ou le comté passa au Dauphin de France (Charles VII). \r\nL'union des comtes et des Evêques dura jusqu'en 1688 sur demande de Louis XIV  qui voulait donner aux Evêques de Die plus de force pour résister aux protestants.\r\nJUSTIN: Fief des Chapitre de Die, il fut supprimé vers 1448, de ce château il ne reste que quelques traces de pans de murs.                                      St-LAURENT: Autrefois fief des Engilbauld, des Chansierge et des Camaret , propriété de Monsieur Bizoard","architecture":"Die; enceinte gallo-romaine flanquée de tours rondes et carrées, c'est au IVe siècle que furent élevées les murailles de 4 mètres d'épaisseur, ouvrage défensif et de nombreux éléments architecturaux y furent incorporés dans la maçonnerie, renforcé par des tours, circulaires,  semi-circulaires, polygonales à trois ou sept pans. Des poutres fortifiées tel que la porte de Beaumes et la porte Sainte-Agathe, porte Saint-Marcel pendant les guerres de religion du XIII et du XVIe siècle la muraille subit de gros dégâts ainsi que la citadelle.                                  St-Laurent; L'ensemble du  XVIIe siècle, deux  corps de logis en équerre à deux étages  surmonté d'un fronton.","habitants":"Aymard II de Poitiers\"","divers":"Vestiges des remparts, de portes de la citadelle et de la tour de Purgon du XIXe siècle transformée en chapelle, batisse de Mathouret, vestiges de Justin, et gentilhommière de St-Laurent","gps":"","images":["../image/image_26/26_Die_1.jpg","../image/image_26/26_Die_2.jpg","../image/image_26/26_Die_3.jpg","../image/image_26/26_Die_4.jpg","../image/image_26/26_Die_5.jpg","../image/image_26/26_Die_6.jpg","../image/image_26/26_Die_7.jpg"]},"Consult_chateau_formulaire177f":{"id":"Consult_chateau_formulaire177f","dept":"26","canton":"Crest","commune":"Divajeu","nom":"Divajeu","type":"Château","periode":"XIV","histoire":"Divajeu: fief de la seigneurie des Arnaud de Crest qui la soumirent aux  Evêques de Die en 1145, et passa ensuite aux d'Eurre  dans les premières années du XVe siècle, les d'Eure eurent pour héritiers les Ponton et les Chily qui revendirent au Giraud, lesquels s'éteignirent chez les Cibeult de Saint-Férréol en 1589, passa aux Lattier de Bayanne qui ont été les derniers seigneurs. \r\nLe château du XIVe siècle, remanié au XXe siècle par monsieur Dufour, industriel  de Lyon. \r\nDivajeu était un  bastion couvrant vers le Sud la forteresse de Crest au Moyen âge. A changé plusieurs fois de propriétaire depuis.","architecture":"Le château fut construit au XIVe siècle par le seigneur Sylvain de Crest, de style renaissance, en équerre à étages irréguliers  de trois à quatre et flanqué plein sud d'une tour ronde.","habitants":"Les Sylvain de Crest. \r\nLes Lattier de Bayanne\r\nFamille Duffour\"","divers":"Château féodal de Divajeu","gps":"","images":["../image/image_26/26_Divajeu_1.jpg"]},"Consult_chateau_formulairedac3-2":{"id":"Consult_chateau_formulairedac3-2","dept":"26","canton":"Pierrelatte","commune":"Donzère","nom":"Donzere","type":"Château","periode":"XIII","histoire":"Au XIIe siècle les seigneurs de Donzére tenaient le Sud du défilé, alors que leurs alliés par mariage, les Châteauneuf en défendait le Nord, ces bouillants guerriers eurent maille à parti avec l'église, jusqu'en 1210 les deux familles furent excommuniées pour avoir maltraité un envoyé du Pape. \r\nAu XIIIe siècle l'Evêque de  Viviers,   achète le château et s'empare de l'abbaye.  \r\nA la fin du XIVe siècle, son successeur Claude de Tournon  (Evêque ) fait construire les remparts et le  château de plaisance au pied de la forteresse pour être sa résidence d'été et le château médiéval sera abandonné; la façade du château est renaissance et une aile fut construite sur la terrasse au XVIIe siècle.                              BELLE-EAU: Ce château fut acquit en 1856 par François Bravay dit le \" Nabab\" (Pont Saint-Esprit 1817-1874). \r\nFils de commerçant, s'installe à Paris en 1842,  période difficile, s'embarque pour Alexandrie  le 13 Février 1847, malgré des débuts difficiles, s'implante dans la bourgeoisie et s'oriente dans l'import-export, devint très riche. \r\nPour venger  des difficultés  du  passé  qu'on eu ses parents sur  Pont  Saint-Esprit\"  faillite  de   leur   magasin   de \"Quincaillerie\",  décida d'acheter les Belle-Eau et d'entrer en politique  Conseillé général du canton de Pont-Saint-Esprit,  puis tentative à la députation  du Gard en 1863 abandonna en Mai 1965 .  Le château servit à ses réceptions  il y reçut le vice-roi  Saïd Pacha.  \r\nIl y vit très peu, prit par ses déplacements et son habitation sur Paris, devint aveugle, et vendit les Belle-Eau  le 15 Mai 1874 à Monsieur Salomon Beleys, il mourut le 6 décembre 1874 et enterré  à Pont Saint-Esprit. (.Info. par études drômoises).","architecture":"Donzère Château construit en 1475 , façade d'époque renaissance aile du XVIIe siècle.                                   Belle-Eau; construit au XVIIIe siècle; De construction quadrangulaire massive à trois étages. Sebastien Sibour, en fut propriétaire, nommé Archevêque à Paris. C'était lui qui avait célébré le mariage d'Eugenie de Montijo avec Napoléon III.","habitants":"L'évêque Claude de Tournon\"","divers":"Château de Donzère et de Belle-Eau","gps":"","images":["../image/image_26/26_Donzere_1.jpg","../image/image_26/26_Donzere_2.jpg","../image/image_26/26_Donzere_3.jpg","../image/image_26/26_Donzere_4.jpg","../image/image_26/26_Donzere_5.jpg","../image/image_26/26_Donzere_6.jpg","../image/image_26/26_Donzere_7.jpg"]},"Consult_chateau_formulaire074d":{"id":"Consult_chateau_formulaire074d","dept":"26","canton":"Portes-les-Valence","commune":"Etoile-sur-Rhône","nom":"Etoile","type":"Château","periode":"XI","histoire":"Etoile sur Rhône: dit château de Saint-Ange.Le haut domaine, concédé aux évêques de Valence par les empereurs germaniques (1157) passa ensuite aux Dauphins, était le fief des comtes de Valentinois; Léguée à la couronne de France par le dernier comte de Valentinois (1419), Ce domaine passa aux Crussol, qui le donnèrent  en 1485 aux Poitiers de St-Vallier qui firent reconstruire le château et conservèrent ce domaine transformait en vicomté jusqu'à la mort de Diane en 1566 . \r\nLeurs  successeurs n'habitèrent pas Etoile: Les Félice  de Budo vivaient à Pariset en Italie, à cette époque, les guerres de religion entraînèrent des dégâts au château et ce dernier fut abandonné.\r\nMoneri de la Robinière y construit à ses frais un corps de garde et remettre en état l'ensemble , dont une partie subsiste aujourd'hui.\r\n Alors Etoile fit retour à la couronne de France mais pour être engagé 98 ans plus tard  (1643 ) aux De Ville, qui était encore seigneur en 1788.\r\nJean de Poitiers y séjourna autant qu'à  Saint-Vallier.                          On prétend que c'est à  Etoile que naquit Diane de Poitiers. Les ruines du Château seront rachetées en totalité par Honoré Laurent de Parisot de Durant de la Boisse                             CLAVEL: Le domaine de Clavel appartenait  au XVIIIe siècle à la famille Armand, qui y fit construire une habitation en forme de U, la construction s'étala sur dix ans avec l'objectif de l'élevage des verres à soie. \r\nLa famille Arnaud été très lié au Rigaud de L'Isle en 1767, ils marièrent une de leurs filles à Monsieur de Freycinet de la Saulce.\r\nPARPAILLON:  A  cet emplacement,  il y avait une  maison forte, qui  dépendait de la châtellenie d'Etoile, elle a remplacé  un vaste château des Poitiers-Saint-Vallier au début du XVe siècle. était un rendez-vous de chasse fort prisé par la noblesse locale à l'époque.","architecture":"Citadelle du XIe Siècle.La tour dite tour ancienne construite en 1227 et une autre tour fut construite au XIIIe siècle, l'ensemble porte le nom de la Bistoure. Remanié en 1490, puis au début du XVIIe siècle en un vaste ensemble médiéval avec tour, la tour des \"balistes\", de style renaissance. Le donjon, il ne reste rien.\r\n Aujourd'hui  ne  subsiste qu'une partie des constructions ultérieures adossées à l'ancien rempart, et exécutées  par Honoré Laurent de Parisot de la Boisse . suite à l'édit de 1626 que le roi Louis XIII qui ordonna la destruction de la forteresse. Le donjon et deux tours furent détruites,                      Clavel; De l'ancien bâtiment il ne reste que la partie centrale, en pierre jaune, les pavillons saillants ont été rapportées postérieurement  pour en faire un château de style Napoléon III tel qu'il est  aujourd'hui transformé en habitations individuelles.                                                   Parpaillon;Le bâtiment actuel du XVIIIe siècle, a remplacé la maison forte construite au XVe siècle; corps de logis rectangulaire flanqué en angle de deux pavillons.","habitants":"famille de Parisot, \r\nfamille de Poitiers\r\n        \r\n        \"","divers":"Château d'Etoile et de Clavel","gps":"","images":["../image/image_26/26_Etoile_1.jpg","../image/image_26/26_Etoile_2.jpg","../image/image_26/26_Etoile_3.jpg","../image/image_26/26_Etoile_4.jpg","../image/image_26/26_Etoile_5.jpg","../image/image_26/26_Etoile_6.jpg"]},"Consult_chateau_formulaire82ef":{"id":"Consult_chateau_formulaire82ef","dept":"26","canton":"Crest","commune":"Eurre","nom":"Eurre","type":"Château","periode":"XV","histoire":"Eurre: Castrum Urri 1449, fief des comtes de Valentinois, premièrement possédé par les Arnaud de Crest, dont une des tours du château d'Urre ou Eurre porta longtemps  le nom. \r\nGuigues d'Urre fit partie de la croisade en 1191, Guyon d'Urre vivant vers l'an 1200, père de François d'Urre en 1266. Cette famille se divisa en plusieurs branches dont celle d'Urre se termina par les trois filles qui vivaient en 1498; Radegonde  épousa Claude de Beaumont; Michelette épousa jean Rabot et Marguerite mourut sans alliance. \r\nLes autres branches seigneur de Puy-Saint-Martin, Claude D'Urre descendant des Cornillan ne prit pas la seigneurie en compte sa descendance se distinguèrent dans la branche militaire et gouverneur de la Provence un autre descendant Antoine-Rostaig d'Urre seigneur d'Aiguebonne, Pont-d'Ain, marquis de Treffort en Bresse qu'il avait acquis en 1648 à François de Bonne, duc de Lesdiguières. Antoine-Rostaing fut nommé Lieutenant général du roi et de la Provence conseiller d'état en 1654. La branche des seigneurs de  Grane: Jean d'Eurre, capitaine châtelain d'Eurre en 1545 sa descendance fut assumées jusqu'en 1848 par la femme de Antoine Henri comte d'Urre né à Tain en 1768 capitaine lors de la révolution, membre du conseil de la Drôme pair de France en 1827, mort au château de Bouconvillers, en Picardie.","architecture":"Château fort médiéval remanié à la renaissance et au XVIIe siècle. Bâtiment quadrangulaire à cour intérieure encadré de deux tours rectangulaires, surplombant le village.","habitants":"Famille d'Eurre    \r\nFamille de Vesc\"","divers":"Château d'Eurre","gps":"","images":["../image/image_26/26_Eurre_1.jpg","../image/image_26/26_Eurre_2.jpg","../image/image_26/26_Eurre_3.jpg"]},"Consult_chateau_formulairef935":{"id":"Consult_chateau_formulairef935","dept":"26","canton":"Crest","commune":"Saou","nom":"Eurre_Saou","type":"Maison forte","periode":"XIV","histoire":"Eurre-Saou: Maison forte possédée  par  la famille de la Roche est vendu en 1376 aux Laye,  puis aux Flachéres en 1447 et passa ensuite à Géraud d'Eurre en 1543. \r\nLes Lastic en  hérita et  sera  vendu  aux  Bruyére Saint-Michel  vers 1770.  Dont  l'héritière  se  maria  chez  les Bonfils. Le château garda le nom d'Eurre même après sa reconstruction  suite  aux  guerres de religion.","architecture":"Maison forte construite au XIVe Siècle.  corps de logis quadrangulaire flanqué de deux tours rondes en façade, en possédait quatre, de style renaissance remaniée  et réaménagée au XVIIIe siècle.","habitants":"Famille de Géraud d'Eurre\r\nFamille de la Roche     \r\nFamille de Bonfils\"","divers":"Maison forte d'Eurre à Saou","gps":"","images":["../image/image_26/26_Eurre_Saou_1.jpg","../image/image_26/26_Eurre_Saou_2.jpg","../image/image_26/26_Eurre_Saou_3.jpg"]},"Consult_chateau_formulairef3c8":{"id":"Consult_chateau_formulairef3c8","dept":"26","canton":"Buis-les-Baronnies","commune":"Eygaliers","nom":"Eygaliers","type":"Vestiges","periode":"XII","histoire":"Eygaliers: Fief des barons de Mévouillon, appartenait en 1259 aux Rosans, en 1334 aux Rican de l'Isle et dés 1347 aux Bésignan, dont les droits passèrent aux Morges,  et en 1379 passa aux Du Sauze qui vendirent en 1450 aux Alleman du Champs, lesquels revendirent aux Chomart vers 1640 et  aux de Baux Ventailla, qui étaient encore seigneurs en 1789.","architecture":"Du château sur la colline il ne reste plus rien, mais ce fief médiéval conserve de nos jours, une partie encore robuste d'une maison forte, basse et trapue, qui domine le vieux village.","habitants":"famille des Baux-Ventailla\"","divers":"vestiges des fortifications du château médiéval","gps":"","images":["../image/image_26/26_Eygaliers_1.jpg"]},"Consult_chateau_formulairef4f6":{"id":"Consult_chateau_formulairef4f6","dept":"26","canton":"Séderon","commune":"Ferrassières","nom":"Ferrassieres","type":"Village fortifié","periode":"XVI","histoire":"Ferrassières: Fief des Agoult de Sault en 1248 par les Mévouillon, qui cédèrent le domaine en 1287 aux Baux de Brantes , puis Ferrassières fut abandonné en 1354 par ces derniers Dauphins et passa en 1362  aux Du Puy Montbrun qui cédèrent le domaine en 1707 aux Vaulserre des Adrets ces derniers seigneurs.                  Dans la commune le château de la Gabelle maison forte transformée aujourd'hui en hôtel restaurant.","architecture":"Maison forte appelée \"la Gabelle\" du XVIIe siècle avec tour ronde à toit incliné à un seul pan.","habitants":"Familles des Vaulserre des Adrets\"","divers":"Château de la Gabelle","gps":"","images":["../image/image_26/26_Ferrassieres_1.jpg","../image/image_26/26_Ferrassieres_2.jpg","../image/image_26/26_Ferrassieres_3.jpg","../image/image_26/26_Ferrassieres_4.jpg","../image/image_26/26_Ferrassieres_5.jpg","../image/image_26/26_Ferrassieres_6.jpg"]},"Consult_chateau_formulairef82d":{"id":"Consult_chateau_formulairef82d","dept":"26","canton":"St-Jean-en-Royans","commune":"St-Martin-le-Colonel","nom":"Flandenne","type":"Vestiges","periode":"XII","histoire":"Flandenne: Au XIIe siècle, la seigneurie appartenait à une famille de son nom, échut par alliance aux comtes de valentinois vers 1210. \r\nLorsque Flotte de Royans, fille de Rambaud Ossasica, se marie avec Guillaume de Poitiers en 1267, Flandenne semble participer à sa dot. \r\nEn 1324, St-Nazaire et Flandenne échues à Aymard de Poitiers et, en 1402 le vendirent à Barachin Alleman seigneur de Rochechinard, puis en 1474 par le mariage  avec Jean de Lionne, Catherine Brun, fille de Claude Brun Sieur de Flandenne apportent la seigneurie  à ses derniers, qui  la revendront à  Carra de Lade et la garderont jusqu'en 1666; mais entre temps en 1589 pour mettre fin aux guerres de religion le château fut démoli. \r\nLe fief fut acquis par les Hostun Tollard qui l'englobèrent dans le duché d'Hostun.","architecture":"Du château du XIIe siècle, et après sa destruction en 1589 il ne reste que quelques traces de pans de murs.","habitants":"seigneurs des Alleman \"","divers":"Vestiges sur motte féodale","gps":"","images":["../image/image_26/26_Flandenne_1.jpg","../image/image_26/26_Flandenne_2.jpg","../image/image_26/26_Flandenne_3.jpg","../image/image_26/26_Flandenne_4.jpg"]},"Consult_chateau_formulaire95f9-2":{"id":"Consult_chateau_formulaire95f9-2","dept":"26","canton":"Pierrelatte","commune":"La Garde-Adhémar","nom":"Garde_Adhemar","type":"Village fortifié","periode":"XV","histoire":"La Garde Adhémar: Au XII-XIIIe siècle  la Garde-Adhémar était une Baronnie des seigneurs  de la Bâtie-Rolland sous contrôle des comtes du Valentinois, fut acquise en 1543 par les Escalin des Aimars( Amiral) Escalin, baron de la Garde surnommé le capitaine Paulin né en 1498 appartenait à une obscure famille du nom d'Escalin, mais passait pour être le fils naturel du comte d'Adhémar de Grignan de la maison de Castelanne qui donna la terre de la Garde Adhémar; nommé lieutenant général de sa majesté en Provence, il avait comme maîtresse Maguerite Langlois et eu un fils et une fille en 1570 époque ou il fit construire le château, Louis Escalin qui épousa Polixéne d'Eurre marquis de la Garde seigneur de Vallaurie de Rac et autre lieu, il  obtint en 1646 la Garde Adhémar en marquisat, Antoine Escolin (petit-fils)  fit un mariage avec Jeanne Adhémar de Monteil de Grignan en 1713 puis les descendants, les Castellane-Adhémar qui vendirent en 1771 aux Villeneuve-Vence, lesquels le revendirent en 1784 aux d'Hugues , ces derniers seigneurs, qui devaient quelques années plus tard en être dépossédés par la révolution.\r\nLe château échut en 1803 à trois personnes Mrs Delaye, Téoule et Vaton pour la somme dérisoire, même à l'époque de 5000 livres. Les acquéreurs, toutefois  ne finirent pas les réparations nécessaires, et fautes d'entretien le château fut inabitable.","architecture":"Du château dont les fondations remontent au début de la féodalité, il a été rebâti vers le milieu du  XVIe siècle. C'était un chef d'uvre de style renaissance. il représentait entre la moitié et le tiers  du château de Grignan, mais cela a tout disparu, seul quelques bâtiments remaniés, un portail d'entrée de la cour d'honneur et un reste de tour avec un fragment de façade sculptée et la maison de Pierre Olivier.\r\nVestiges de remparts autour de la ville.","habitants":"Amiral Escalin des Aimars \"","divers":"Rempart du village et du château","gps":"","images":["../image/image_26/26_Garde_Adhemar_1.jpg","../image/image_26/26_Garde_Adhemar_2.jpg","../image/image_26/26_Garde_Adhemar_3.jpg"]},"Consult_chateau_formulaire652b":{"id":"Consult_chateau_formulaire652b","dept":"26","canton":"Loriol-sur-Drôme","commune":"Loriol-sur-Drôme","nom":"Gardette","type":"Maison forte","periode":"XIII","histoire":"Gardette: Construite au XIIIe siècle  par Charles du Puy-Montbrun, sa fille épousa Philibert de Royesse, à sa mort en 1574  le domaine passa à Jean de Rouques, ensuite aux  de la  Rivière, et en 1624 les de  l'Arbalestrier  l'acquirent à l'héritiere Louise  du Puy-Montbrun, veuve de la Rivière et passa ensuite à Gaspard seigneur de Mirabel qui fit vers 1745, de grands embellissements, continués par Louis François Régis, et en 1920 passa par héritage à la famille de Bretteville, aujourd'hui à son fils le comte André de Bretteville.","architecture":"Maison forte du XIIIe siècle, remaniée, corps de logis quadrangulaire, flanquée de quatre tours rondes et de deux tourelles arasées en façade, toitures plates de style provençale.  \r\nRemaniée au XVIe siècle.\r\nChapelle à tour carrée sur la partie arrière.","habitants":"Famille des Puy Martin\r\nFamille du comte de Bretteville\"","divers":"Maison forte de la Gardette","gps":"","images":["../image/image_26/26_Gardette_1.jpg","../image/image_26/26_Gardette_2.jpg"]},"Consult_chateau_formulaire7ec6":{"id":"Consult_chateau_formulaire7ec6","dept":"26","canton":"Marsanne","commune":"Cléon-d`Adran","nom":"Genas_Cleon d`Adran","type":"Château","periode":"XVII","histoire":"Genas-Cleon: Construit au XVIe siècle  par le marquis de Genas:  Ce château resta dans la famille des Genas Jusqu'en 1742, fut la propriétée de l'hôpital Saint-Jean de Valence suite au testament de  François de Genas, pendant une période de deux ans, passa ensuite à la famille Béraud, à la famille Valois, à la famille Lombard Quincieu, à la famille du comte de Chimilin, à la famille Richard enfin à sa nièce Madame Fiére.","architecture":"Construit au XVIe siècle par le marquis de Genas : Corps de logis rectangulaire deux  pavillons  en  saillies aux extrémités,  surmontée de fronton curviligne  garnis de génoises. Un monumental escalier à double révolution et à balustres qui donne accès a une porte flanquée de deux pilastres de pierre surmontés d'un fronton.","habitants":"Famille Giraud \r\nFamille de Genas\"","divers":"Château de Genas","gps":"","images":["../image/image_26/26_Genas_Cleon_1.jpg","../image/image_26/26_Genas_Cleon_2.jpg","../image/image_26/26_Genas_Cleon_3.jpg"]},"Consult_chateau_formulaire9aed":{"id":"Consult_chateau_formulaire9aed","dept":"26","canton":"Crest","commune":"Gigors","nom":"Gigors","type":"Vestiges","periode":"XII","histoire":"Gigors: Au féodal  le château appartenait à une famille de son nom, Lantelme de Gigors;  puis en 1288,  passa aux comtes de Valentinois, un seigneur Robert-le-Gros dit de Gramont possédait la seigneurie de Gigors et de Montclar en 1447 capitaine à la tour de crest successivement châtelain de Sauveterre de Montmeyran, de Gigors et de Charpey il épousa en 1453 Claude de châtelard puis  la seigneurie fut acheté par les Clermont-Montoison et fut ensuite vendu aux d'Eurre en 1521, et  à partir de cette période comme tous les châteaux forts de la région, Gigors fut détruit, la seigneurie fut rachetée en 1645  par les D'Arbalestier dont l'héritage fut acquis par les Du-Truchet, ceux-ci en dotèrent une de leurs filles mariée en 1732 chez les Vogué,  que ces derniers vendirent en 1739 les biens de Gigors aux de Ladevéze ses derniers seigneurs.","architecture":"Du château sur le Mont Savel il ne reste que quelques pans de murs notifiant les  bases du donjon et de deux tours sur enceintes.","habitants":"Famille de Lentelme de Gigors        Famille de Arbaslestier\"","divers":"Vestiges du château dit de Savel","gps":"","images":["../image/image_26/26_Gigors_1.jpg","../image/image_26/26_Gigors_2.jpg"]},"Consult_chateau_formulaire8a48":{"id":"Consult_chateau_formulaire8a48","dept":"26","canton":"Nyons","commune":"St-Sauveur","nom":"Gouvernet","type":"Vestiges","periode":"XII","histoire":"Gouvernet: Fief des barons de Montauban, appartenait dés 1334 aux Olivier, qui le conservèrent tout entier jusqu'à la fin du XVe siècle, époque à laquelle un mariage le fit passer au trois quart  chez les Silve, qui en dotèrent en 1510 une de leurs filles, mariée chez les La Tour; ( René de la tour, seigneur  de Gouvernet 1543-1619 Capitaine protestant )  ces derniers qui l'acquirent, vers la fin du XVIe siècle, le quart est resté aux Olivier qui ont été seigneurs de Gouvernet jusqu' à la Révolution.\r\nAujourd'hui toujours dans la descendance","architecture":"Bâtiment en hauteur, donjon élargi, d'allure puissante mais peu défensif, deux portes d'accès faciles, possible d'enceinte extérieure, fenêtre renaissance sur le mur Ouest.\r\nle château fut brûlé en 1792.","habitants":"Famille René de la Tour\"","divers":"Vestiges du château féodal de Gouvernet","gps":"","images":["../image/image_26/26_Gouvernet_1.jpg","../image/image_26/26_Gouvernet_2.jpg","../image/image_26/26_Gouvernet_3.jpg","../image/image_26/26_Gouvernet_4.jpg","../image/image_26/26_Gouvernet_5.jpg"]},"Consult_chateau_formulairedc3a":{"id":"Consult_chateau_formulairedc3a","dept":"26","canton":"Marsanne","commune":"Grâne","nom":"Grane","type":"Château","periode":"XII","histoire":"Grâne: Fief des comtes de Valentinois qui y avaient leur résidences; Grâne entrait dans le domaine Delphinal en 1419, fut compris dans sa dotation de Diane de Poitiers, il fut donné pour dix ans à Benoit Théocréne, percepteur des enfants du roi, en 1560, et viagèrement possédé par les Gordes de 1570 à 1578. Aliéné en 1593 moyennant finance au profit de David Reynier, il a finalement fait partie du duché de valentinois, érigée en 1642  pour le prince de Monaco.                            PLAISANCE: Le château se trouvant dans le bourg inféodé en 1441, à François de Vendoures et vendu en 1516 à Jean de Rabot seigneur d'Upie  qui en était encore seigneur en 1644, Bertrand Rabot en rendit  hommage à François Ier pour le château en 1516 et en 1521,  rachète tous les biens. Grâne inclus dans le duché de Valentinois possession du prince de Monaco, acquit par la famille Chabrières de la Roche, en 1676 Charles  de Chabrières  épouse Isabeau Reynier de la Roche, héritière du château et rachète tous les biens de Grâne  aux  d'Eurre en 1685. C'est Paul-César de Chabrières de la Roche  vendra le 31 Mai 1792 les propriétés Grânoises  à un grenoblois Pierre- François Duchesne,  Président de la République le 10 Nivose an II. Son gendre Joseph-Constant de Mauduit du Plessis maire de Grâne et héritier du domaine qui par alliance passera aux Bergasse, puis aux Monroë, dont Marc Estrangin, petit fils du colonel Monroë, en est le detenteur actuel.                                            PETITE-PLAISANCE: Maison forte, construite au  XVe siècle  citée en 1447 acquise par Pierre Melion. En 1472,  ce domaine faisant partie des biens de François de Vendoures  arrive  à noble Jean de Rabot  seigneur d'Upie et installe au début du XVIe siècle  Louis Charpeys, bourgeois originaire de Crest. en 1581 suite aux guerres de religion  le seigneur de Rabot abandonne le domaine qui fut en partie incendié, la \"Petite Plaisance\" relève du seigneur \"Pierre Imbert de Silo\", prince des Isnards et de Manas, qui l'acquiert pour sa femme, Louise de Tardivon. En 1644 le seigneur de Rabot reprend Petite Plaisance mais au XVIIe siècle Anne Rabot hérite de la maison forte, par alliance l'apporte à Antoine de Laffont, cette maison passe ensuite  à Louis Honoré d'Eurre, Charles de Chabriéres de la Roche propriétaire du château de Grâne achète la maison forte en 1680  affermé à André  Roussillon  dont l'aîné de ses fils Paul César Eléonor épouse Lucrèce  d'Arbalastier qui hérite par cette occasion des biens des d'Arbalastier et le 31 Mai 1792 vendra les propriétées Grânoises à un Grenoblois Pierre François Duchesne, son gendre époux d'Amélie, le noble breton Joseph-Constant de Mauduit du Plessis, maire de Grâne de 1813 à 1830, le domaine se transmettra par les femmes aux Bergasse, puis aux Monroë  qui met en bailliage la petite Plaisance à Marc Estrangin petit fils du colonel et détenteur actuel.","architecture":"Grane; Vestiges du château, \"appelé aussi château des Poitiers\" détruit pendant les guerres de religion.    plaisance; Belle demeure, appelée  \" plaisance\", entourée d'un grand parc, deux corps de logis en fer à cheval, surmontée d'une belle toiture de tuiles creuses avec un pavillon à quatre pans couvert de tuiles écaillées vernissées.  Maison forte \" Petite Plaisance\", construite au  XVe siècle de plan quadrangulaire de style renaissance, quatre tours carrées dont une arasée. Aujourd'hui domaine agricole.","habitants":"Famille de David Reynier\"","divers":"Vestiges du château de Grane.\r\nChâteau de plaisance.\r\nMaison forte de la Petite Plaisance.","gps":"","images":["../image/image_26/26_Grane_1.jpg","../image/image_26/26_Grane_2.jpg","../image/image_26/26_Grane_3.jpg","../image/image_26/26_Grane_4.jpg","../image/image_26/26_Grane_5.jpg","../image/image_26/26_Grane_6.jpg","../image/image_26/26_Grane_7.jpg"]},"Consult_chateau_formulaireec70":{"id":"Consult_chateau_formulaireec70","dept":"26","canton":"Grignan","commune":"Grignan","nom":"Grignan","type":"Château","periode":"XI","histoire":"Grignan; Au féodal était le chef lieu d'un comté de huit communes. Erigé en comté  en 1558,  possédé de temps immémorial  par les Adhémar qu'il rendit hommage en 1257 aux Comte de Provence et qui donnèrent aux habitants de Grignan des libertés municipales, bien, que légué aux Lorraine-Guise,  l'héritage  des Adhémar de Monteil, C'est Gaucher Adhémar de Monteil  (1450-1516) qui fit passer l'importante citadelle à celui de château de Plaisance qui échut en 1561 aux Castellane.                               François Adhémar de Monteil comte de Grignan lieutenant général du roi en Languedoc qui modernisa le château et épousa le 29 Janvier 1669 la fille de la  marquise de Sévigné Françoise-Marguerite, ils eurent deux enfants Marie Blanche de Grignan et Pauline future marquise de Simiane, cette dernière vendit en 1732 le comté de Grignan aux Felix du Muy, ces derniers seigneurs. \r\nChâteau rendu   célèbre  Madame  de Sévigné (qui y mourut en 1696 après un dernier séjour). Ce château resta après la Révolution plus d'un siècle à l'abandon \r\nUn notable Grignanais de la famille du Muy Léopol Faure, en fait acquisition en 1838 et entreprend de le restaurer, mais ne peut faire face aux dépenses vend   en 1909  le château au célèbre  Dandy Boni de Castellane qui le conserve peu de temps. Madame Marie Fontaine qui acquiert le château en 1909 entreprend les travaux de restauration.  Le château est placé sous l'administration du conseil général de la Drôme.","architecture":"De style renaissance, construit  au XIe siècle, seul vestige féodal, son entrée avec les deux tours, remanié au XVIe siècle par Gaucher Adhémar  en  transformant la citadelle en résidence. Dévasté par les ravages révolutionnaires et laissé à l'abandon, la rénovation fut entreprise en 1902 par madame Fontaine","habitants":"Famille du comte d'Adhémar,  Fille de Madame de Sévigné (la comtesse de Grignan)\"","divers":"Château de Grignan et la Roseraie","gps":"","images":["../image/image_26/26_Grignan_1.jpg","../image/image_26/26_Grignan_2.jpg","../image/image_26/26_Grignan_3.jpg","../image/image_26/26_Grignan_4.jpg","../image/image_26/26_Grignan_5.jpg","../image/image_26/26_Grignan_6.jpg"]},"Consult_chateau_formulaire8dd0-2":{"id":"Consult_chateau_formulaire8dd0-2","dept":"26","canton":"Romans","commune":"Génissieux","nom":"Génissieux","type":"Château","periode":"XIX","histoire":"Charles-Messance: Château construit par Monsieur Jomeron de Montchorel avant la révolution,  puis acheté par Jean Baptiste Maisonneuve et son fils François Benoit, gros propriétaire à Saint-Donnat, puis fut racheté par Louis Hippolyte Charles en 1811, fils d'un drapiers  romanais, Capitaine résident au château de Cassan en région Parisienne et fut un ami intime de l'impératrice Josephine. \r\nUn de ses neveu Marie François Gabriel Charles  habita Génissieux où naîtra l'arrière Grand père de l'actuel propriétaire.\r\nL'enfant adopté\" M. Jubié\", qui laissa quatre enfants dont Bénédicte fille de Benoîte de Messance qui épousa le neveu de Louis Hippolyte. \r\nLe nom de Messance fut rajouté au nom de Charles en 1888: Pierre Charles Messance joua un rôle important dans la commune par sa générosité.             COLOMBIER: Cette maison forte appelée aussi \"le Marais\" emplacement d'un marais, était un relais de chasse. \r\nA appartenu en 1630 à la famille de Berlhe.\r\nVendue en 1864 par Madame Dorséne  veuve Théodore  Antelme à Monsieur Jean Toussaint-Rousset, puis après un incendie le bâtiment fut vendue à monsieur Peyson qui la restauré, a changé de propriétaire depuis.                                 GILLIER: Cité au XIe siècle dans le quartier Lupe, également Lippe de Gillier. C'est en 1580 que Jean de Gillier, consul achète la maison de Luppé.\r\nLe dernier membre de la famille fut Charles Ferdinand, Baron de Gillier, né le 2 Juin 1752. Il fut capitaine de cavalerie et chevalier de Saint-Louis. Maire de Romans en 1787, élu colonel général de la garde nationale le 8 Août 1789, il démissionna le 18 Avril 1790, mais sa démission  fut refusée,  sa popularité fut de courte durée, devint suspect; il dut s'expatrier. Il avait épousé Thérése Sabatier, sans postérité. Monsieur d'Orgeval beau-frére et voisin du château a toujours eut un oeil sur celui-ci. et aujourd'hui par de nouveau propriétaire ( Privé).","architecture":"Corps de logis rectangulaire à fronton central,  flanqué de deux pavillons aux extrémités , construction moderne   Colombier;Cette maison forte possède un corps de logis rectangulaire flanqué au centre d'une tour carrée imposante, malgré l'incendie en 1956, elle fut bien restaurée.                               Le château de Gillier, bâtiment du XVIe siècle cantonné de quatre tours rondes et d'une tour carrée, une partie fut détruite par incendie.","habitants":"famille Charles Messance\"","divers":"Château de Charles Méssance, maison forte du Colombier et du château de  Gillier","gps":"","images":["../image/image_26/26_Charles_Messance_1.jpg","../image/image_26/26_Charles_Messance_2.jpg","../image/image_26/26_Charles_Messance_3.jpg"]},"Consult_chateau_formulaire2ba5":{"id":"Consult_chateau_formulaire2ba5","dept":"26","canton":"Grand-Serre","commune":"Hauterives","nom":"Hauterives (26)","type":"Château","periode":"XVII","histoire":"Les seigneurs d'Hauterives jouaient un rôle important en Galaure avec de nombreux vassaux. En 1250 Berlion de Clermont construisit le château du Chastellard, premier rejeton d'une famille qui fut une pépinière de militaires. En 1596 les derniers des Clermont vendirent Hauterives au marquis Amieu de Borel qui, après l'incendie du château situé au sommet de la colline, en 1650, son fils Charles de Borel reconstruisit le château sur la rive gauche de la Galaure, qu'il gardèrent jusqu'à la Révolution racheté ensuite par la commune fut utilisé pour des manifestations culturelles tel qu'une exposition du sculpteur Belmondo.","architecture":"Du premier château il ne reste presque plus rien sinon des remparts et un pan de mur.Le château appelé de \"Hautrives\" construit au XVIIe siècle, Il est probable que ce château aux façades sobres englobe en fait une construction plus ancienne que l'on peut retrouver dans l'aile Est. Le toit à forte pente en tuiles en écailles est coupé par des \"chiens assis\" à petits frontons.","habitants":"André de Borel seigneur d'Hauterives\"","divers":"Château d'Hauterives \r\nVestiges de l'ancien château\r\nChâteau Barral","gps":"","images":["../image/image_26/26_Hauterives_1.jpg","../image/image_26/26_Hauterives_2.jpg","../image/image_26/26_Hauterives_3.jpg","../image/image_26/26_Hauterives_4.jpg","../image/image_26/26_Hauterives_5.jpg"]},"Consult_chateau_formulaire9da4":{"id":"Consult_chateau_formulaire9da4","dept":"26","canton":"Tain-l`Hermitage","commune":"Veaunes","nom":"Hauteville_veaunes","type":"Maison forte","periode":"XIV","histoire":"Fief des Clérieux, en 1220 maison forte possédée  par la famille de ce nom, fut acquise en 1379,  par les Fay  Solignac puis passa par alliance au Du Puy qui le vendirent en 1546 aux Arloud lesquels la cédèrent en 1611 aux Guigou puis acquise par les Iserand, les Rostaing  en 1688 et revendu en 1763 par les Rey de Mouchet aux d'Honneur qui s'éteignirent en 1750 chez les Du-Vivier derniers seigneurs. \r\nPropriété de Mme de Luzy, dernièrement revendu à monsieur Favier.","architecture":"Construit au XIVe siècle, remanié en 1612 .style Louis XVI. les tourelles ont été supprimées ainsi que les fenêtres à meneaux.","habitants":"Famille de Luzy \r\nFamille de Favier\"","divers":"Maison forte d'Hauteville","gps":"","images":["../image/image_26/26_Hauteville_veaunes_1.jpg"]},"Consult_chateau_formulaire936a-2":{"id":"Consult_chateau_formulaire936a-2","dept":"26","canton":"Bourg-de-Péage","commune":"Hostun","nom":"Hostun","type":"Château","periode":"XV","histoire":"Hostun: Appelé aussi château de la\" Croix\"; Fief des Dauphins en 1238, au XIIIe siècle, appartenait à une famille de son  nom, qui connut depuis 1260 dix seigneurs dont cinq à la famille du  nom d'Hostun qui le conservèrent jusqu'en 1615; Antoine d'Hostun seigneur de la Baume de Saint-Nazaire et du Royans en 1500, Balthazard d'Hostun de Gadagne  marquis de la Baume , passa ensuite aux Lionne par alliance, ces derniers le revendirent en 1713 aux Maréchal de Tallard qui obtint en 1715 l'appellation  en Duché sous le nom d'Hostun. \r\nEn 1755 le maréchal sans postérité passa le domaine aux Sassenage qui s'éteignirent eux-mêmes chez les Bruck, les Talaru et les Béranger peu de temps avant la Révolution. \r\nRacheté à la Révolution par les Brésson et vendu ensuite pour une colonie de vacances.","architecture":"Bâtiment quadrangulaire, construit au XVe siècle a conservé une tour à mâchicoulis:  style renaissance.","habitants":"Famille Bresson\"","divers":"Château d'Hostun","gps":"","images":["../image/image_26/26_Hostun_1.jpg"]},"Consult_chateau_formulaire526e":{"id":"Consult_chateau_formulaire526e","dept":"26","canton":"Bourg-de-Péage","commune":"Meymans","nom":"Joncheres","type":"Maison forte","periode":"XIV","histoire":"Jonchère: (Castrum Junchariae) ancien mandement de Beauregard cité en 1334, jouait un rôle de tour de gué sur l'Isére.\r\nPendant le XIIIe siècle fief partagé entre les Dauphins du Viennois et les Poitiers. Jean du Puy , fils de Aymard , seigneur de Peyrins vend en 1327, à Guigue VII, dauphin du Viennois, qui le revend à Girard de Ternieu, puis passe aux Montchenu et à Antoine Forest, maître de la monnaie de Romans  restera dans cette famille pendant deux siècles, en 1639 Isabeau de Forest épouse René du Puy-Montbrun seigneur de Villefranche et maréchal de camp, brillante carrière militaire à sa mort le domaine passe à son fils ainé Charles qui fit une brillantte carrière militaire, il meurt en 1693, Jean son fils, hérite du titre de seigneur de Villefranche et de Jonchères lieutenant-colonel de la République de Venise en 1684, il épouse Marguerite baronne de Frise. Jean décédera en en 1725 son fils François chambellan du duc d'Orléans le succédera. Le domaine ne sera plus habité à partir de 1725 la ferme sera vendu en 1733 à Jacques Chabert et le château Charlotte-Marguerite  marquise de la Faye en hérite en 1757, il est en mauvais état, c'est sa fille Françoise-Hippolyte, qui a épousé en 1758 Lucrétius, comte de la Tour-du-Pin-Montauban qui nommera Jean-Etienne Gastoud châtelain des seigneurie de la famille qui seront mis en séquestre à la Révolution. A la mort de la comtesse de la Tour-du-Pin en 1814, l'héritage des biens de la Drôme passe à Rolland Legras marquis de Luart, qui furent vendu aussitôt à Jean-Pierre Fière qui à sa mort, sa fille madame Girend en hérite en 1847 et à sa mort en indivis par les enfants criblés de dettes vendent le château en 1899 à Casimir Mossant chapelier à Bourg de Péage.","architecture":"Maison forte quadrangulaire avec corps de logis retangulaire allongé dans le fond de l'enceinte qui est flanquée de tours carrées. Ce château fut mis à sac à plusieurs reprises pendant la période trouble des Huguenots et restauré par la famille Mossanr","habitants":"Famille d'Aymar \r\nFamille Mossant\"","divers":"Maison forte de Jonchères","gps":"","images":["../image/image_26/26_Joncheres_1.jpg","../image/image_26/26_Joncheres_2.jpg","../image/image_26/26_Joncheres_3.jpg"]},"Consult_chateau_formulaire3791":{"id":"Consult_chateau_formulaire3791","dept":"26","canton":"Séderon","commune":"Lachau","nom":"Lachau","type":"Maison forte","periode":"XV","histoire":"Lachau: Fief des Barons de Mévouillon, appartenant dés 1209 à une branche cadette de cette famille connut sous le nom de de Raybaud ou de Rimbaud de Lachau, trente huit ans après, le domaine passa par alliance aux Adhémar, et ceux-ci menant vers le siècle suivant à une de leur fille chez les Mévouillon de Barret, puis les Grolée héritèrent, ces derniers vendirent en 1582 aux la Tour-Gouvernet, qui récupèrent tous les biens qu'ils gardèrent jusqu'à la Révolution.","architecture":"A Lachau du château féodal d'origine appelé \"La tour du Riable\", il ne reste que des vestiges du donjon à 1197 mètres  d'altitude, de forme carré de 5 mètres de coté, sa robustesse, à destination évidemment militaire doit remonter au XIIe siècle .\r\nChâteau du XVe siècle, corps de logis quadrangulaire flanqué de quatre tours rondes.","habitants":"Famille Rimbaud de Lachau\"","divers":"Maison forte de Lachau et la tour du Riable","gps":"","images":["../image/image_26/26_Lachau_1.jpg","../image/image_26/26_Lachau_2.jpg","../image/image_26/26_Lachau_3.jpg","../image/image_26/26_Lachau_4.jpg"]},"Consult_chateau_formulairee983":{"id":"Consult_chateau_formulairee983","dept":"26","canton":"Grand-Serre","commune":"Montrigaud","nom":"Langon","type":"Manoir","periode":"XVII","histoire":"Langon: Fief des seigneurs de Montrigaud, Perrot de Langon en 1280, François de Langon en 1340, Arthus de Langon gouverneur du Dauphiné, Antoine de Langon en 1605 son fils Jacques de Langon, puis Hugues de Langon, baron en 1742, cornette au régiment de Marcieu, maréchal de camp en 1788, puis député, émigra pendant la Révolution et mourut à Grenoble en 1816, il avait épousé en première noce Anne Marie-Josephine Prunier de Saint-André, marquise de Virieu (qui avec sa soeur, la marquise de Marcieu fut la dernière de ce nom). Héritier des Langon, le comte Sibeud de Saint-Férreol.  le château fut incendié en 1789.","architecture":"Ce château qui possède toujours ses deux tourelles carrées et plus où moins abandonné à ce jour.","habitants":"Famille des Montrigaud\"","divers":"Manoir de Langon","gps":"","images":["../image/image_26/26_Langon_1.jpg","../image/image_26/26_Langon_2.jpg","../image/image_26/26_Langon_3.jpg"]},"Consult_chateau_formulaireaa28":{"id":"Consult_chateau_formulaireaa28","dept":"26","canton":"Tain-l`Hermitage","commune":"Larnage","nom":"Larnage","type":"Château","periode":"XII","histoire":"Larnage, fief de la baronnie des Clérieu, puis par alliance passa aux Claveyson et sept ans après passa aux Dauphin, ensuite aux Poitiers de Saint Vallier qui furent remplacés vers 1400 par les Brunier ( Etienne de Brunier), qui par alliance de Jacques de Brunier seigneur de Larnage et Catherine Adhémar dame d'Aps et de Marsanne. Jacques I de Brunier seigneur de Larnage qui épousa Anne de Grolée rend hommage le 21 Janvier 1431 à Geoffroy de Claveyson, Reynaud de Brunier 1670 seigneur de Larnage, puis passa au d'Urre , de la Forest de Divonneet fut acquis en 1758 par noble Claude François Mure, cette famille à toujours des descendants dans la région de Tours.\r\nLe château fut détruit en 1569 lors des guerres de religion, brûlé sur ordre du Vicomte de Bruquinel.  \r\nSeul héritier en 1590 après la mort de Jean de Larnage Antoinette d'Arzac, cette famille continua dans la famille des Adhémar de Monteil et en 1650 habitèrent Marsanne. Depuis une vingtaine d'années une association s'emploie a sauver le patrimoine.","architecture":"Ruines du château fort médiéval, enceinte quadrangulaire à tours circulaires aux angles du XVe siècle.","habitants":"Famille de Brunier\r\nFamille des Adhémar de Monteil\"","divers":"Vestiges du château de Larnage","gps":"","images":["../image/image_26/26_Larnage_Tain_1.jpg"]},"Consult_chateau_formulaire9104":{"id":"Consult_chateau_formulaire9104","dept":"26","canton":"Crest","commune":"Saou","nom":"Lastic","type":"Maison forte","periode":"XV","histoire":"Lastic: Elle appartenait à la famille de Lameyrie, puis passa aux Lastic, une famille originaire d'Auvergne qui tirait son nom d'un village prés de Saint-Flour. Jean Bompar de Lastic né en 1371 fut le trente sixième grand-maître de 1437 à 1454, il est le fils d'Etienne II de Lastic que l'on trouve à la bataille de Poitiers en 1356 et dans toutes les guerres contre les Anglais et dont le fils Jean fut aussi prisonnier en 1385, Jean le quatrième du nom, ce fut lui qui commença la résistance à Mohamed II à Rhodes.\r\nLe domaine fut vendu aux Borel de Pontaujard en 1610, il fut cédé aux La-Tour-Gouvernet et vendu, en huit lots , comme bien national en 1793. Aujourd'hui privé.","architecture":"Maison forte construite au XVe,  de style renaissance, tour polygonale formant le corps de logis, mur d'enceinte  et son portail défendu par une bretèche flanquée de deux meurtrières, et fenêtres à meneaux.  Malheureusement traversé  par la route de la forêt.","habitants":"Famille de Lastic\r\nFamille de Lameyrie\r\nFamille Borel de Pontaujard\"","divers":"Maison forte de Lastic","gps":"","images":["../image/image_26/26_Lastic_1.jpg","../image/image_26/26_Lastic_2.jpg","../image/image_26/26_Lastic_3.jpg"]},"Consult_chateau_formulaire32d4":{"id":"Consult_chateau_formulaire32d4","dept":"26","canton":"Marsanne","commune":"La Laupie","nom":"Laupie","type":"Château","periode":"XIII","histoire":"La Laupie: Au Xe siècle, Geilin, Comte de Valentinois  cède la Laupie à la domination des Poitiers à la fin du XIIe siècle. C'est sans doute Guillaume de Châteauneuf qui entreprit la construction du château fort à la fin du XIIIe siècle. \r\nAvant 1415 Antoine de la Baume, fils de Jean et Mérande de Mévouillon, possédait le château et les terres. En 1442, Saint-Rémy possède ce fief sous la suzeraineté des comtes de Valentinois, en 1565 le château féodal est acheté  par Benoit-de-Priam, il été également propriétaire du château de Condillac, remanié au XVIIIe siècle  par Pierre Armand.                                St-GENIS:  Seigneurie que possédait en 1327 une famille de son nom , puis par les Bochon d'Etoile, puis acquit par les Tarres de Montagnes en 1353, puis par les comtes de Valentinois qui la donnèrent en 1355 aux Aytard et en 1364 aux Chastel Arnaud. Acquise ensuite par Guillaume de Poitiers ,seigneurs du Barry, cette terre fut confisquée pour être donné aux d'Eurre  en 1464, puis ayant été recouvrée par les Poitiers , elle fut vendue en 1505 aux Marsanne, qui ont été seigneurs jusqu'à la Révolution, mais il est à noter que les Thollon s'en qualifièrent seigneurs en 1735.","architecture":"La Laupie; Château féodal du XIIIe siècle, modifié au XVIIIe siècle, à l'intérieur du village fortifié avec jardin suspendu, ligne des  remparts du XIIIe siècle. Château village en partie détruit en 1944, l'ensemble bien remanié .                                     ST-Genis; château féodal remanié et bien protégé par des courtines crénelées. est agréable d'y vivre.","habitants":"Famille Antoine de la Baume \r\nFamille Benoit de Priam\"","divers":"Château de la Laupie et de Saint-Genis.","gps":"","images":["../image/image_26/26_Laupie_1.jpg","../image/image_26/26_Laupie_2.jpg","../image/image_26/26_Laupie_3.jpg","../image/image_26/26_Laupie_4.jpg","../image/image_26/26_Laupie_5.jpg","../image/image_26/26_Laupie_6.jpg","../image/image_26/26_Laupie_7.jpg"]},"Consult_chateau_formulairee751":{"id":"Consult_chateau_formulairee751","dept":"26","canton":"Grand-Serre","commune":"Lens-Lestang","nom":"Lens_Lestang","type":"Château","periode":"XVI","histoire":"Lestang, château de \"la Saône\" fiefs des Moras, Amblérieu, Moras, Lens et Lentiol, Jacques de Lestang seigneur des Murat de Lestang et de Lentiol, son fils Antoine de Lestang, chevalier seigneur de Moras, Lens et Lentiol, fief que les Murat acquirent en 1574, passa au domaine Dalphinal et aux Lentiol de Marcolin, et de Vinay,  puis fut érigé en marquisat en 1643, dont le premier marquis fut Antoine de Murat de Lestang était alors baron du Lyonnais en 1650 et en 1690 le capitaine Chuin était châtelain de Lens Lestang. Puis transformé en ferme et fut partagé par plusieurs propriétaires et aujourd'hui propriété de Monsieur Bruno Gagne qui en a fait avec sa femme Sandrine des  chambres d'hôtes.                         DOUBLE: Ancienne maison forte qui appartenait dés le XVIIe siècle aux Chion.","architecture":"Du premier château qui dominait le village il ne reste plus rien; il s'appelait la Saune XIIIe siècle, ancien château des Murat de lestang incendié en 1789. Le château actuel construit au XVe siècle  (Privé).                          Double; Corps de logis rectangulaire, flanqué sur façade  deux tourelles à toit en poivrières et à l'arrière deux pavillons carrés à toits en poivrières également, Chapelle dans le parc.       Château de la Saône du XVe siècle avec tour rondes.","habitants":"famille de Lestang\r\nFamille de Murat\"","divers":"Châteaux de Levaux.                 Château Double.                       Villa Peyrouse.                      Château de la Saône.","gps":"","images":["../image/image_26/26_Lens_Lestang_Levaux_1.jpg","../image/image_26/26_Lens_Lestang_Levaux_2.jpg","../image/image_26/26_Lens_Lestang_Levaux_3.jpg","../image/image_26/26_Lens_Lestang_Levaux_4.jpg","../image/image_26/26_Lens_Lestang_Levaux_5.jpg","../image/image_26/26_Lens_Lestang_Levaux_6.jpg","../image/image_26/26_Lens_Lestang_Levaux_7.jpg","../image/image_26/26_Lens_Lestang_Levaux_8.jpg","../image/image_26/26_Lens_Lestang_Levaux_9.jpg"]},"Consult_chateau_formulaire3059":{"id":"Consult_chateau_formulaire3059","dept":"26","canton":"Marsanne","commune":"La Coucourde","nom":"Leyne-Coucourde","type":"Maison forte","periode":"XIV","histoire":"Leyne: construit par les comtes de valentinois, en ce lieu est attaché à la légende d' Hélène la lépreuse qui y fut enfermée. Il fut ruiné dans les dernières années du XIVe siècle, le château de Leyne fut transmit en  l'an 1446 à Jean Pillard qui y établit un moulin et la perception du péage fut transféré à Montélimar en 1445.","architecture":"Château de style féodal-renaissance construit en 1309 par le comte de valentinois, qui avait pour fonction de péage. Remanié au XIXe Siècle.","habitants":"Comte de Valentinois\r\nFamille Pillard \"","divers":"Maison forte de Leyne","gps":"","images":["../image/image_26/26_leyne_1.jpg"]},"Consult_chateau_formulaire5faf":{"id":"Consult_chateau_formulaire5faf","dept":"26","canton":"Loriol-sur-Drôme","commune":"Livron-sur-Drôme","nom":"Livron","type":"Château","periode":"XVI","histoire":"Livron sur Drôme: Village fortifié,  cité en 1113, le haut Livron doit son origine à un château du XIe siècle, \"castrum Liberonis\"  devenu en 1137 possession des évêques de Valence, fut  donné par l'Empereur germanique Frédéric Ier de Barberousse le fief de Livron restera en possession des évêques  jusqu'à la Révolution. \r\nLe village s'agrandit autour du château.\r\nAu moyen âge le château était entouré d'une ceinture de remparts; le donjon se trouvait au point culminant entouré d'une première enceinte avec des tours, reste une tour dite \"tour du Diable\", seul vestige de l'enceinte, était redouté par des phénomènes étranges qui l'entouraient, elle inspire la crainte et de plus les livronnais  sont attachés à cette dernière; de l'enceinte, il y avait, trois portes munies de Barbacanes, de pont levis,qui  permettaient d'y pénétrer, l'enceinte fut en partie démolie en 1427 par le duc de Mayenne, puis transformé en citadelle avant de tenir lieu de place forte aux protestants pendant les guerres de religion et finalement rasée  en 1603 sur ordre de Louis XIII et Richelieu.    Le château actuel construit au XVIe siècle de style renaissance, par la famille Ize de  Rozans  Jacques Vivant, le dernier châtelain André Chollet succédera à Jacques de Corbières en 1599 ; châtelain de Livron de la Sablière Jacques Cartier 1781-1789; la fille de celui-ci, Adèle Cartier a épousée en  1804 le comte de Sinard, marié à Adéle  Cartier, fille de jacques Cartier de la Sablière, maire de Livron en 1808 à 1815. il entra ensuite dans la famille du comte de Bretteville pour être actuellement en possession de la famille Dupré La Tour.  Dans la commune autres châteaux le châteaux de Bompart fut construit par monsieur Combier industriel de la soie dans un  style maison bourgeoise de plaisance.                              FONTGRAND; En 1850 Monsieur Eugéne de Monicault en était propriétaire et en 1943 la maison forte appartenait à Bruno Trutat qui en hérita, puis passa à la famille de Jean Marie Lombard (privée).\r\nBOSQUET; château de monsieur Combier industriel des usines à soie sur Livron.","architecture":"De l'ancien château féodal et de la ville fortifiée il ne reste que la tour \"du Diable\" et des  remparts, suite a la demande de Richelieu en 1623  le château  fut détruit dix ans après; il reste de belles  façades renaissance en ville.\r\n Dans Livron le château du XVIe siècle possède un corps de logis de forme rectangulaire flanqué de deux tours rondes aux  extrémités.                 Fontgrand; Maison forte construite au XVIe siècle, corps de logis rectangulaire flanquée de trois tours rondes à différents niveau à toits plats.\r\nBosquet; Corps de logis rectangulaire à trois niveaux avec attiques.","habitants":"Famille de Izes de Rozans \r\nFamille de Cartier de la Sablière\"","divers":"Château renaissance \r\nTour du Diable                          Manoir de Fontgrand\r\nChâteau du Bosquet","gps":"","images":["../image/image_26/26_Livron_1.jpg","../image/image_26/26_Livron_2.jpg","../image/image_26/26_Livron_3.jpg","../image/image_26/26_Livron_4.jpg","../image/image_26/26_Livron_5.jpg","../image/image_26/26_Livron_6.jpg","../image/image_26/26_Livron_7.jpg","../image/image_26/26_Livron_8.jpg","../image/image_26/26_Livron_9.jpg"]},"Consult_chateau_formulaire7ddd-2":{"id":"Consult_chateau_formulaire7ddd-2","dept":"26","canton":"Montélimar","commune":"Malataverne","nom":"Malataverne","type":"Village fortifié","periode":"XII","histoire":"BOUVIER; Château-ferme\r\nRAC; Village fortifié, fief des Adhémars qui fut hommagé aux Pape en 1292 et que les Romieux acquirent avant 1496, passé aux Forbin en 1643, il fut vendu trois ans après aux Escalin des Aymars qui le revendirent en 1681 aux Tautière, et ceux-ci furent remplacés en 1700 par les Ripert D'Alauzier derniers seigneurs.","architecture":"Bouvier;\r\nRac; De ce village fortifié il ne reste que la base du donjon et des remparts.","habitants":"Seigneurs Ripert-d'Alauzier\"","divers":"Vestiges de fortifications de Rac et château de Bouvier","gps":"","images":["../image/image_26/26_Rac_1.jpg","../image/image_26/26_Rac_2.jpg","../image/image_26/26_Rac_3.jpg","../image/image_26/26_Rac_4.jpg"]},"Consult_chateau_formulairebee3":{"id":"Consult_chateau_formulairebee3","dept":"26","canton":"Grand-Serre","commune":"Manthes","nom":"Manthes","type":"Château","periode":"XI","histoire":"Au féodal Manthes faisait partie du  mandement de Moras, dépendait de Cluny mais le prieur  y jouissait quand même de quelques droits seigneuriaux: En 1029, Guigues 1er a reçu de l'archevêque de Vienne, le Sud du comté Viennois ce qui donna naissance au Dauphiné.\r\nAu XIVe siècle le prieuré resta longtemps  habité par des valets et des chambrières, également habité par un moine jusqu'en 1636 et sera ensuite lié à des familles nobles de la région et fut ensuite légué en 1967 à l'Evêché. depuis  1983 \" les amis du prieuré \" travaillent à la sauvegarde et à l'animation du site.","architecture":"Le prieuré et ses dépendances( Château) du XIe siècle, mais une grande partie reflète une période plus tardive, renaissance, il fut presque entièrement construit en galets. escalier à vis du XVe siècle avec porte d'entrée surmontée d'un arc en accolade renfermant un bas relief érodé en forme de médaillon. \r\nCorps de logis en équerre, belle fenêtre à meneaux et tour ronde.","habitants":"Evêché de Vienne\r\n        \"","divers":"Château de Manthes","gps":"","images":["../image/image_26/26_Manthes_1.jpg","../image/image_26/26_Manthes_2.jpg"]},"Consult_chateau_formulairefede":{"id":"Consult_chateau_formulairefede","dept":"26","canton":"Marsanne","commune":"Marsanne","nom":"Marsanne","type":"Village fortifié","periode":"XI","histoire":"Marsanne: Au féodal, en 1341, aux comtes de Valentinois qui en rendirent  hommage au Pa
