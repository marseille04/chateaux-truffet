carré, d'un sous-sol et étage de comble, élévation ordonnancée le tout recouvert d'ardoise.                                                                                                                    LIVET-AUTHOU,   date du XIXe siècle, a été construit, pour la Famille Join-Lambert, par Juste Lisch, est privé.                                                                                                                                Au sud à peu de distance à  St-Victor de Criquet château du MONT-CRIQUET,  date de 1635, pour le corps central et de 1880, pour ses deux ailes.","architecture":"LAUNAY, fut démoli pour construire la château actuel. Le corps de logis fut édifié avec les deux pavillons latéraux en pierre de taille durant la Régence (années 1710-1720).  Vers la fin du règne de Louis XV (1750-1770), le logis central fut relié aux pavillons par deux galeries basses en brique et en pierre, de plan incurvé. La chapelle est installée dans le pavillon sud. Les communs encadrent l'avant-cour et datent de l'ancien manoir. Ce sont les bâtiments les plus anciens du domaine. Construits sur un socle en damier mêlant brique et pierre, les communs possèdent des façades en colombage avec un remplissage de brique ou de torchis. Le colombier octogonal se distingue par ses poteaux sculptés en partie haute. Le jardin à la française fut réalisé après la Seconde Guerre mondiale. Vers l'Est, le domaine de Launay cadre une vue lointaine sur un paysage de coteaux boisés. Cette vue est renforcée par la grille d'honneur et les communs situés de part et d'autre. La vue vers l'Ouest porte à travers champs, jusqu'aux premières constructions du village. Ces perspectives, ainsi que le site arboré du domaine sont magnifiques. Le village voisin de Saint-Georges du Vièvre se distingue par un bâti de qualité, mêlant briques, pans de bois et silex. Cette diversité des matériaux apporte une belle polychromie à l'ensemble. Éléments protégés MH : le bâtiment du château y compris les ailes. Les sols de la cour et de la mare, les façades et les toitures de la maison du fermier, y compris le tour à piler : inscription par arrêté du 22 avril 1991.","habitants":"Le Sens de Launay et de Folleville\r\n        \r\n        \"","divers":"Launay  grav-1-2-3  GPS : 49° 14' 16,42 Nord, 0° 35' 10,02\" Est                                                                                           St-Georges                                                                                Vieuville    grav-6-7 GPS : 49° 06' 26\" Nord, 1° 23' 09\" Est                                   Livet sur Authou     Grav_5  GPS : 49° 13' 45\" Nord, 0° 40' 07\" Est                                                                                       Mont-Criquet    grav-4   GPS : 49° 12' 56,92\" Nord, 0° 36' 14,52\" Est","gps":"49° 14' 16,42 Nord, 0° 35' 10,02\" Est","images":["../image/image_27/27_Launay_St_Georges_1.jpg","../image/image_27/27_Launay_St_Georges_2.jpg","../image/image_27/27_Launay_St_Georges_3.jpg","../image/image_27/27_Launay_St_Georges_4.jpg","../image/image_27/27_Launay_St_Georges_5.jpg","../image/image_27/27_Launay_St_Georges_6.jpg","../image/image_27/27_Launay_St_Georges_7.jpg","../image/image_27/27_Launay_St_Georges_8.jpg"]},"Consult_chateau_formulaire4f69-2":{"id":"Consult_chateau_formulaire4f69-2","dept":"27","canton":"Saint-André-de-l","commune":"Louye","nom":"Louye_Héruppé","type":"Chateaux","periode":"XV-XIX","histoire":"Deux châteaux dans cet article, Louye et Héruppé.                         LOUYE, de la forteresse mentionnée en 1194 et comprise dans la ligne de défense du duché de Normandie, il ne reste que son implantation et des vestiges de maçonneries. Le château a été reconstruit à la fin du XVe siècle par les Gauvin de Dreux. En 1687, il est vendu à la famille de Guenet. En 1780, il est à nouveau vendu à Jean-Marie d'Arjuzon, selon un plan en équerre avec des décors de briques vernissées. Le logis a partiellement été reconstruit et doté d'une façade classique au XVIIIe siècle. En 1810 la façade sur cour a été dotée, par l'architecte Berthault, d'un décor d'inspiration égyptienne pour une aile, gothique pour l'autre, l'intérieur a en grande partie été remanié à la fin du XIXe siècle. Son fils Gabriel et son épouse, Marie-Agnès Hosten, reçoivent au château  la reine Hortense dont elle est dame d'honneur. il conserve des éléments antérieurs, voûte d'ogives, culs-de-lampe sculptés, salle haute couverte d'une charpente en carène du XVIe, salle du chartier, vestiges de peinture murale du XVIe siècle dans la salle aux cerfs. Le domaine comprend aussi un ensemble de communs organisés autour d'une cour, un parc ordonnancé orné de plusieurs fabriques dont la plus remarquable est une tour dite de Malborough, un potager et des dépendances de la fin du XIXe siècle, En 1840, un banquier, Sigisbert Moitessier, achète le domaine, dont une ferme modèle,  et s'en sépare en 1882.  Au XXe siècle, le comte Lepic,  petit fils du comte de Viel-Castel, est  propriétaire du domaine, en 2000 inscrit au M.H.","architecture":"HERUPPE à Louye, le château de la Héruppé a été construit de 1913 à 1916 par l'architecte anglais Walter Cave pour le comte Pierre de Vieil-Castel. Le logis, de plan massé, inspiré par le style anglais, est constitué de briques avec des baies à petits carreaux aux boiseries blanches. La silhouette massive du bâtiment est renforcée par la sobriété de ses ornements : corniche moulurée blanche, bossages d'angle et arcs des ouvertures formés par le calepinage des briques. Des pilastres blancs surmontés d'un fronton signalent l'entrée, située dans un léger retrait de façade. Le château est situé dans un parc boisé et planté. L'ancienne ferme voisine fait office de communs. Le château est cerné par les bois et n'est pas visible depuis le village de Louye. Des prairies contiguës aux dépendances et à l'allée arborée augmentent le champ visuel. La façade sud-ouest, la terrasse et la roseraie du château cadrent une vue lointaine vers le Sud-Ouest, jusqu'à la lisière du village de Saint-Georges-Motel.   Éléments protégés MH : le logis en totalité, l'avenue et les jardins, les sols, les murs et l'ensemble des aménagements : inscription par arrêté du 23 octobre 2002.","habitants":"Louye  famille de Guenet.                                                        Heruppé, Famille du comte Pierre de Vieil-Caste\r\n        \"","divers":"Louye   GPS : 48° 47' 52\" Nord, 1° 18' 59\" Est                              Héruppé. grav-8-9 GPS : 48° 47' 33\" Nord, 1° 20' 40\" Est","gps":"48° 47' 52\" Nord, 1° 18' 59\" Est","images":["../image/image_27/27_Louye_H%c3%a9rupp%c3%a9_1.jpg","../image/image_27/27_Louye_H%c3%a9rupp%c3%a9_2.jpg","../image/image_27/27_Louye_H%c3%a9rupp%c3%a9_3.jpg","../image/image_27/27_Louye_H%c3%a9rupp%c3%a9_4.jpg","../image/image_27/27_Louye_H%c3%a9rupp%c3%a9_5.jpg","../image/image_27/27_Louye_H%c3%a9rupp%c3%a9_6.jpg","../image/image_27/27_Louye_H%c3%a9rupp%c3%a9_7.jpg","../image/image_27/27_Louye_H%c3%a9rupp%c3%a9_8.jpg","../image/image_27/27_Louye_H%c3%a9rupp%c3%a9_9.jpg"]},"Consult_chateau_formulaire17b1":{"id":"Consult_chateau_formulaire17b1","dept":"27","canton":"Breteuil","commune":"Montreuil-L","nom":"Luzigneuil","type":"Château","periode":"XVI","histoire":"LUZIGNEUIL, la terre du Luzigneul avait été acquise au début du XIIIe siècle par le seigneur Payen de Montreuil.  Les origines du château actuel remontent à la fin du XVIe siècle et au début du XVIIe, En 1666, Charles de Chaulieu, écuyer sieur de Miramonde Lusigneul, y reçoit le héros rouennais Cavelier de La Salle.  La famille de Chaulieu resta propriétaire du château jusqu'en 1788.\r\nPuis les Filleuls devinrent propriétaires du château.  En 1789, Louis de la Frotte y séjourna .  Il fut fusillé peu de temps après pour avoir organiser des Chouanneries normandes et des tentatives d'insurrections girondines. Au XIXe siècle, le château passa aux mains de la famille Lemichel. En 1811, Jacques Charles Dupont  avocat parlementaire Zénaïde Lemichel épousa Paul Louis Victor Fouquet.  A partir de ce moment, le nom de Fouquet fut attaché à celui du Lusigneul. Les deux enfants des Fouquet habitèrent également le château.  Albert un juriste et Camille, élève de Polytechnique, officier d'artillerie. La famille Montmarin devint propriétaire du château au début du XXe siècle.  Au sortir de la guerre, la famille Cloue  l'acheta . En 1965, le Docteur Williams Abbou acheta le château, avec son fils le Docteur Sidney Abbou et la femme de celui-ci Marie Gabrielle Abbou.   La famille Coultard, ayant acquis la propriété il y a quelques années, a restauré cette demeure et l'a décorée avec goût et discrétion, tout en conservant son caractère original.","architecture":"LUZIGNEUIL, dès le XIe siècle, la seigneurie de Montreuil est fortifiée par une motte castrale dont il reste encore des vestiges. Le château de Luzigneul est construit à l'écart de cette ancienne place forte et du bourg de Montreuil entre la fin du XVIe et le début du XVIIe siècle. Il subsiste de cette première construction l'aile nord et les pavillons d'angles dans le parc. Le colombier circulaire est daté du XVIIIe siècle. Le château a pris sa forme actuelle après d'importants travaux de reconstruction et de restauration entrepris dans les années 1880. Son architecture s'inspire du style Louis XIII (façades avec chaînes et tableaux en briques, haute toiture en ardoises), tout en ayant recours à un éclectisme caractéristique du XIXe siècle (composition variée des travées et des volumes, tourelle d'entrée coiffée d'une toiture à l'impériale.  Le château accueille aujourdhui des chambres d'hôtes et sert de cadre pour des réceptions. L'environnement est faiblement bâti. Les éléments protégés se trouvent au milieu du parc du château et ne sont guère visibles de la route.   Éléments protégés MH : le pigeonnier et les deux pavillons d'angle : inscription par arrêté du 23 mai 1984.","habitants":"Seigneur local\r\n        \r\n        \"","divers":"Luzineul     GPS : 48° 57' 27\" Nord, 0° 28' 14\" Est","gps":"48° 57' 27\" Nord, 0° 28' 14\" Est","images":["../image/image_27/27_Luzigneul_1.jpg","../image/image_27/27_Luzigneul_2.jpg","../image/image_27/27_Luzigneul_3.jpg"]},"Consult_chateau_formulaire4e5f":{"id":"Consult_chateau_formulaire4e5f","dept":"27","canton":"Romilly-sur-Andelle","commune":"Lyons-la-Forêt","nom":"Lyons_la_Foret","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article, Croix-Mesnil et Lyons la forêt.                                                                                      CROIX-MESNIL,  François Le Blanc fit construire en 1604, à lorée de la forêt, le château avec grange, étable et volière.Le roi Henri IV lautorisa à faire bâtir en 1607 une chapelle qui sera bénite en 1634. La propriété passa à son fils Jean-Baptiste, puis de son petit-fils Alexis qui la vendra en 1718.  De nombreux propriétaires se succédèrent. A partir de 1827, la Croix-Mesnil participa à la vie sociale et culturelle de la région. On y verra Flaubert et Mérimée. En 1854, Louis Hazard achète le domaine et réalise de nombreux travaux de restauration, édifia de nouveaux communs et démolit la chapelle. Sa fille qui en hérite, épouse Jules Le Vert, banquier et maire de Dieppe de 1879 à 1882, aïeul du propriétaire actuel.\r\nLe château possède deux niveaux. Sa façade, maçonnée en briques avec des tables crépies, présente cinq travées dont trois sont réunies en un avant-corps surmonté dun fronton triangulaire encadré de deux lucarnes qui sortent du toit.","architecture":"LYONS la FORET, le 30 décembre 1559, François-Georges de Bricqueville vend le fief, terre et seigneurie de Fleury la Forêt à Pierre de Courcol qui en fait hommage en 1595 et y construit le château à son emplacement actuel. Sa petite fille Roberte de Courcel apporta Fleury en mariage au chevalier Charles de Caumont, sieur du Bout du Bois et exempt des gardes du roi Louis XIV. Ses armes étaient dargent à trois fasces de gueules, la première surmontée de trois tourteaux. Après lincendie qui détruisit une bonne partie du château et la plupart des meubles en 1645, Charles de Caumont le fit reconstruire.  En 1667, Louis de Caumont, chevalier, vendit cette terre, de concert avec Madeleine de Caumont, sa mère, à Jean Blin, conseiller du roi.  Le 21 mars 1698, Jacques Dauger, seigneur de Villiers, achète le château à Marie-Madeleine de Caumont, veuve de Charles décédé en son château le 20 avril 1676. Une campagne de rénovation sera entreprise et le comte Dauger demandera à larchitecte Fontaine dajouter deux ailes au bastion initial. Bien que construit à deux époques différentes, lutilisation des mêmes matériaux, le respect du parti dorigine, à lexception des canonnières, conserve une grande unité à la demeure. La grille dhonneur a été installée en 1789. La famille Dauger conservera le château jusque 1791, date à laquelle il sera cédé à M. de Combault dAuteuil, puis à son fils le vicomte dAuteuil. En 1859, le château est acheté par monsieur Sanguier, négociant à Paris, puis en 1890 par monsieur Peynaud. Le château de Lyons-la-Forêt est occupé par l'armée allemande pendant la Seconde Guerre mondiale. À la fin de la guerre, le château n'a plus de résidents. Il est acheté en 1978 par la famille Caffin qui entreprend des travaux de restauration. devenue musée.","habitants":"croix ;François Le Blanc                                                              Lyons  Pierre de Courcol \r\n        \"","divers":"Croix-Mesnil                                                                                Lyons la Forêt.   GPS : 49° 24' 50\" Nord, 1° 32' 46\" Est","gps":"49° 24' 50\" Nord, 1° 32' 46\" Est","images":["../image/image_27/27_Lyons_la_Foret_1.jpg","../image/image_27/27_Lyons_la_Foret_2.jpg"]},"Consult_chateau_formulaire3d6c":{"id":"Consult_chateau_formulaire3d6c","dept":"27","canton":"Les Andelys","commune":"Présagny_Lorgeuilleux","nom":"Madeleine_27","type":"Château","periode":"XVIII","histoire":"La MADELEINE, En 1824, le domaine est acquis par Casimir Delavigne, auteur de théâtre renommé, qui y aménage un parc et une terrasse. A partir de 1865, d'importantes transformations sont entreprises par la baronne Thénard, propriétaire du domaine et veuve du chimiste Louis Jacques Thénard, baron d'Empire sous Napoléon III.","architecture":"La MADELEINE, un prieuré occupait le site dès le XIe siècle,  fondé par Saint-Adjutor. Lors de sa démolition à la Révolution, seule une maison en pierre de Vernon du début du XVIIIe siècle est épargnée.  A partir de 1865, d'importantes transformations sont entreprises par la baronne Thénard. Les ajouts (pignons,  lucarnes) sont inspirés par l'éclectisme architectural du XIXe siècle avec la combinaison de plusieurs styles (néoclassicisme, Renaissance, etc.)  Durant les années 1930, l'architecte Gianotti, qui uvre sur la ligne Maginot, réalise une aile bâtie en retour et dotée d'une structure en béton armé non apparente. Abandonné et vandalisé dans les années 1960-70, le château nécessitait des restaurations importantes , il est formé de quatre ailes organisées autour d'une cour, qui expose quatre façades différentes, façade monumentale précédée d'un portique à l'ouest, néo-gothique au nord, façade au sud néo-Renaissance, celles de 1865, et façade irrégulière de 1932 à l'Est. En 1946, restauration de la chapelle, avant que les actuels propriétaires n'entreprennent une restauration générale à partir de 1982, l'édifice accueille actuellement des chambres d'hôtes et des séminaires. Situé sur la rive nord de la Seine, le domaine possède un magnifique parc arboré qui forme un écran autour du château. Un superbe cône de vue vers le Sud-Ouest, permet d'apprécier le fleuve et son paysage jusqu'aux coteaux boisés de Saint-Pierre d'Autil et de Saint-Just.","habitants":"Famille de la  baronne Thénard\r\n        \"","divers":"La Madeleine préssagny    GPS : 49° 07' 23,16\" Nord, 1° 27' 18,72\" Est","gps":"49° 07' 23,16\" Nord, 1° 27' 18,72\" Est","images":["../image/image_27/27_Madeleine_27_1.jpg","../image/image_27/27_Madeleine_27_2.jpg","../image/image_27/27_Madeleine_27_3.jpg","../image/image_27/27_Madeleine_27_4.jpg"]},"Consult_chateau_formulairee204":{"id":"Consult_chateau_formulairee204","dept":"27","canton":"Romilly-sur-Andelle","commune":"Mainneville","nom":"Mainneville","type":"Château","periode":"XV","histoire":"MAINNEVILLE, est la capitale des villes de Bleu. Son premier seigneur, le sieur Geoffroy, compagnon de Guillaume le Bâtard, embarque pour l'Angleterre. Après la conquête, il reçoit pour prix de sa bravoure, la charge de connétable (chef des forces armées) et le fief de Mainneville.  La seigneurie, au milieu des bois, traversée par la Levrière, est attribuée plus tard au ministre de Philippe le Bel, Enguerran de Marigny qui remplace le manoir par un château. Il commande des statues aux meilleurs sculpteurs de son temps. Deux, très belles, sont encore dans l'église Saint-Pierre-Saint-Paul. Ce fut du château de Mainneville, que partit le roi Jean, lorsqu'en 1356, il alla à Rouen surprendre et saisir Charles le Mauvais. Ce château fut rendu au roi d'Angleterre, en 1419, après la prise de Gisors. Celui qui existe est un bel édifice à tourelles, de la fin du XVe ou du commencement du XVIe siècle.  Ce domaine était au nombre de ceux que possédait Enguerrand de Marigny dans le Vexin, puis il passa dans la maison des Roncherolles, ensuite dans celle des Dauvet : Pierre de Roncherolles, au XVe siècle, donna aux pauvres des communes de Mainneville, Longchamps et Mesnil-sous-Vienne, les rentes qui forment encore la dotation de leurs bureaux de bienfaisance.  Le 16 février 1711, le marquis Louis-Benoît Dauvet signa l'acte d'achat du château. Il avait épousé, le 1er octobre 1710, Marie Magon de La Gervesais, fille de Nicolas Magon, connétable de Saint-Malo.","architecture":"MAINNEVILLE, château d'Enguerrand de Marigny ; château du XIVe siècle remanié au XVIe??XVIIe siècle et au XVIIIe siècle. Il a conservé son parc à gibier. Vers 1525, Louis de Roncherolles, héritier d'Ide de Marigny par les Fécamp, les Gamaches et les Châtillon, avait fait bâtir un grand corps de logis en pierre de taille, de dix-sept toises de long sur cinq de profondeur (31 m 70 sur 9 m 75), aux angles duquel s'élançaient quatre tourelles, et dans ce nouvel édifice, qui en remplaçait un autre, le constructeur avait établi, peu d'années après, le 19 mai 1535, cette partie du château fut détruite par un incendie qui dévora en même temps les archives renfermées dans l'une des tourelles et, notamment, un cartulaire d'Enguerrand de Marigny. Cette circonstance donna lieu, le 12 janvier 1535 et les jours suivants, à une enquête dont le procès-verbal, outre les renseignements qui précèdent, contient quelques détails intéressants pour la topographie du château. Le seul ancien logis qui restât était situé au nord, parallèlement à celui brûlé. Contre ce logis du nord s'appuyait la chapelle, qui bordait la cour à l'ouest et dont le chevet était relié au logis neuf par un pressoir. Une galerie de bois, remplacée sous Henri III par une autre en pierre et brique, régnait à l'est, le long d'un mur encore existant et qui remonte certainement à la construction primitive. On pénétrait dans la cour par un portail ouvert à l'extrémité orientale du logis du nord et dont les deux tours constituent aujourd'hui le vestige extérieur le plus apparent du château bâti par Enguerrand de Marigny.","habitants":"Famille de Louis de Roncherolles\r\n        \"","divers":"Mainneville\r\ngps 49° 22' 26\" nord, 1° 41' 01\" est","gps":"","images":["../image/image_27/27_Mainneville_1.jpg","../image/image_27/27_Mainneville_2.jpg"]},"Consult_chateau_formulaire2666":{"id":"Consult_chateau_formulaire2666","dept":"27","canton":"Beuzeville","commune":"St Pierre de Corneilles","nom":"Malou_27","type":"Château","periode":"XVI-","histoire":"Deux châteaux dans cet article , Malou  et Val-Hebert.                   MALOU, fief des haubert mentionné au XIe siècle. Château fort détruit en 1374. Reconstruction autorisée par le roi Charles VI en 1385 pour Jean le Bigot. Un acte de vente de 1570 mentionne      un manoir, une maison fortifiée et une motte en forme de vieux château. Le logis est reconstruit pour Jean Ferey dans le quatrième quart du XVIe siècle, puis restauré par l'architecte Henri Jacquelin au début du XXe siècle, des élégantes tourelles témoignent des derniers temps de la féodalité, il appartient aujourd'hui aux Nonant de Pierrecourt.","architecture":"VAL-HEBERT, le fief du Val-Hébert est mentionné dès 1470. Le logis, à deux étages carrés avec sous-sol, est construit dans la deuxième moitié du XVIe siècle. Une partie est très remaniée après 1900 ; la chapelle est construite dans le premier quart du XXe siècle.  Elévation: élévation ordonnancée gros-oeuvre: brique ; calcaire ; appareil mixte ; bois ; torchis ; enduit partiel ; pan de bois,: toit à longs pans ; pignon couvert ; toit conique ; toit polygonal  couverture en ardoise typologie: appareil en damier ; logis en calcaire et brique.","habitants":"fief de haubert\r\n        \"","divers":"Malou                                                                                          Val-Hebert","gps":"","images":["../image/image_27/27_Malou_27_1.jpg","../image/image_27/27_Malou_27_2.jpg"]},"Consult_chateau_formulaire5905":{"id":"Consult_chateau_formulaire5905","dept":"27","canton":"Grand Bourgtheroulde","commune":"Marcouville","nom":"Marcouville","type":"Château","periode":"XVII-XVIII","histoire":"MARCOUVILLE, en 1152, le duc Henri II fit détruire le manoir de Marcouville, en représailles, contre le rebelle Hugues de Chateauneuf. En 1420, le roi d'Angleterre Henri V saisit à Marguerite de Calleville les manoirs de : Marcouville, de Touffreville et de Mussegros et en fit don à William Burton. Jean Le Danois possèda le manoir en 1486. Robert I de Gaillarbois, écuyer, marié à Jeanne de Rune, rendit aveu en 1505 pour le fief de Marcouville. Il resta dans la famille jusqu'à la fin du XVIIIe siècle. L'architecte Joseph-Abel Couture réalisa, vers 1760, les écuries et les remises du château. En 1788, la seigneurie de Marcouville devint la propriété du marquis de Radepont, Jean-Léonor du Bosc. Sa petite-fille, épouse  d'Henri-Évrard de Dreux-Brézé, grand maître des cérémonies de France, qui en hérita, au début du XIXe siècle. Le château de Marcouville revint, à sa mort, à son frère. Pierre-Augustin Lefèvre de Marcouville a accolé le terme Marcouville à son patronyme pour honorer ses ancêtres qui y avaient leurs racines.","architecture":"MARCOUVILLE, le château se trouvait au nord de la ferme avec un accès à l'est. Il s'organisait entre cour avec un plan d'eau ovale et un très grand parc composé d'une grande étendue d'eau et de bois. Le château de Marcouville était un édifice classique en brique et pierre, long de 7 travées. Deux travées aux extrémités se trouvaient en saillies. La travée centrale en saillie présentait un avant-corps avec un balcon sur consoles et surmonté d'un fronton triangulaire. Il s'élevait sur 2 niveaux plus le comble. Il a été détruit et le parc a été boisé. Il ne reste aujourd'hui que la ferme. Les éléments les plus notables sont le porche d'entrée en brique et pierre calcaire, avec une porte cochère et une porte piétonne encadrées de 2 tourelles et un colombier au centre de la cour. Le château de Marcouville est devenu, depuis, une ferme.","habitants":"Robert I de Gaillarbois                                                                  d'Henri-Évrard de Dreux-Brézé,\r\n        \"","divers":"Marcouville    GPS : 49° 18' 09\" Nord, 1° 22' 32\" Est","gps":"49° 18' 09\" Nord, 1° 22' 32\" Est","images":["../image/image_27/27_Marcouville_1.jpg","../image/image_27/27_Marcouville_2.jpg"]},"Consult_chateau_formulaire3c87":{"id":"Consult_chateau_formulaire3c87","dept":"27","canton":"Pont-de-l","commune":"Martot","nom":"Martot","type":"Château","periode":"XVIII","histoire":"MARTOT, c'est en 1734 que fut construit l'actuel château par Nicolas Alexandre Lucas, seigneur de Boucourt; il appartint ensuite au marquis de Poutrincourt. En 1835, il devint la propriété de M. Grandin de l'Eprevier, conseiller municipal de 1843 à 1892 (maire de 1843 à 1870) est niché dans un parc de dix hectares. château du XVIIIe siècle. Petit théâtre du milieu du XIXe siècle. Restauré après un incendie en 1913. Restes de l'ancienne église paroissiale Saint-Aignan du XVIIe siècle, devenue chapelle du château au milieu du XIXe siècle. Il est composé d'un étage carré et un étage de comble, élévation ordonnancée, toit à longs pans brisés couvert d'ardoise.","architecture":"MARTOT, ce lieu unique permet d'accueillir des séminaires, d'organiser des conférences, des réunions, le château de Martot offre des espaces de travail et de convivialité qui assurent la réussite d'une communication efficace. Ses deux salles dotées d'installations technologique performantes peuvent être utilisées séparément ou jouer la complémentarité. Modulables, elles permettent d'organiser l'espace en fonction de vos besoins. Avec sa cuisine équipée, son parking privé et son accès direct au parc paysager, le château de Martot est le lieu idéal pour vos cérémonies, mariages et réceptions. La nuit, le parc de 10ha et le château restent éclairés. Il y a un petit théâtre qui date du milieu du XIXe siècle. De plan rectangulaire à deux niveaux et  attique sur combles toit brisés.","habitants":"Famille de Martot\r\n        \"","divers":"Martot      GPS : 49° 17' 45\" Nord, 1° 03' 58\" Est","gps":"49° 17' 45\" Nord, 1° 03' 58\" Est","images":["../image/image_27/27_Martot_1.jpg","../image/image_27/27_Martot_2.jpg","../image/image_27/27_Martot_3.jpg"]},"Consult_chateau_formulaire670e":{"id":"Consult_chateau_formulaire670e","dept":"27","canton":"Pont-Audemer","commune":"Monfort sur risle","nom":"Monfort_sur_Risle","type":"Château","periode":"XVI-XVII","histoire":"Quatre châteaux dans cet article la Motte, la Court, la Baronnie et Thilay.                                                                                                                                       La MOTTE  Rogerin Rabasse, fondateur en 1472, des pénitents de Sainte Barbe sur Croisset, était  seigneur de la Motte. Jacques Rabasse, conseiller secrétaire du Roi, en la chancellerie du palais à Rouen, était seigneur du Boulanger à Corneville et de la Motte à Montfort-sur-Risle. Marguerite épousa Jacques de la Houssaye, sieur de Rougemontier, vers 1670, auquel elle porta la Motte. Jean-Baptiste de la Houssaye était en 1724, seigneur de la Motte, son fils Pierre Jean Baptiste demeurait en sa terre de la Motte. Il avait épousé en 1744, Suzanne du Fay, fille du seigneur du Maulévrier. C'est lui qui vendit, le 22 août 1746 à messire Jean Baptiste du Fay, chevalier seigneur de la Houssaye à Saint Thurien, la ferme de la Motte, consistant en un manoir, cour colombier, jardin, bois, plus un étang avec la ferme Clérot. M. du Fay, mort sans alliance et sans postérité a laissé sa terre de la Motte à M. de Saint Wulfranc qui a été depuis maire de Montfort sur Risle, acquis par la commune en septembre 1965 et fait office salle de réception et gîte.","architecture":"LA COURT,  à Saint-Philbert-sur-Risle à 1KM à l'ouest ,  fief mentionné en 1376. Le logis a été construit dans la deuxième moitié du XVIe siècle. Portail du logis sculpté ou remployé après 1903. Le château de la Cour est une belle construction parfaitement bien conservée et entretenue, présentant des chaînages en pierre du XVIe siècle et une partie plus ancienne datant du XIVe siècle ; le domaine possède une chapelle du XVIe siècle. Edifié à flanc de colline, de sa terrasse on découvre le panorama remarquable de la Risle jusqu'au Bec Hellouin.                                                                                    BARONNIE, le château se situe au lieu-dit La Baronnie. Il a été construit du XIIIe au XIVe siècle. La chapelle Saint Jean a été reconstruite au XVIIIe siècle. Le logis fut détruit. Il appartenait aux Evêques d'Avranches. Le château fort de la Baronnie est privé, fermé au Public. Le château fort au lieu-dit de la Baronnie de Saint-Philbert (13e , 14e  et 18e siècles) se situait au pied de la côte, du côté de Freneuse et dominait la vallée de la Risle. Lenclos qui sétend sur environ 1,5 hectares était défendue par une enceinte de murailles qui subsistent encore en partie, flanquées de tours cylindriques aux quatre angles dont trois sont relativement bien conservées. Au milieu était le château des évêques d'Avranches, et la chapelle de la Baronnie était dédiée à Saint-Jean. Il ne reste aujourdhui que trois tours rondes du XIIIe siècle en pierre et silex, dressées aux angles du mur d'enceinte en partie conservée. L'une d'entre elles a été restaurée avec sa toiture et transformée en habitation au XXe siècle. \r\nToujours au sud-ouest à St-Christophe sur Condé le château de la THILLAY pas d'information.","habitants":"Motte Jacques de la Houssaye,\r\n        \r\n        \r\n        \r\n        \"","divers":"la Motte  grav-7  GPS : 49° 17' 46\" Nord et 0° 39' 56\" Est                            la Court-grav 5-6                                                                         Baronnie grav-2  GPS : 49° 16' 37,82\" Nord, 0° 39' 29,24\" Est                                    Thilay grav 3","gps":"49° 17' 46\" Nord et 0° 39' 56\" Est","images":["../image/image_27/27_Monfort_sur_Risle_1.jpg","../image/image_27/27_Monfort_sur_Risle_2.jpg","../image/image_27/27_Monfort_sur_Risle_3.jpg","../image/image_27/27_Monfort_sur_Risle_4.jpg","../image/image_27/27_Monfort_sur_Risle_5.jpg","../image/image_27/27_Monfort_sur_Risle_6.jpg"]},"Consult_chateau_formulaire9830":{"id":"Consult_chateau_formulaire9830","dept":"27","canton":"Pont-de-l","commune":"Montaure","nom":"Montaure","type":"Château","periode":"XVIII","histoire":"Deux châteaux dans cet article, Escroville et Montaure ESCROVILLE,  le château d'Ecrosville, construit au XIXe siècle et également dénommé La Garde Chastel couvrait 203 hectares dont 135 de parc. Il a remplacé l'ancien monastère de 1663 dont il ne subsiste plus que les murs d'enceinte. Passant route de la Haye Malherbe, qui ne s'est interrogé sur l'origine de cet immense mur qui part d'Ecrosville, hameau de Montaure, puis après la Porte aux Pères, s'enfonce dans la forêt sur plusieurs kilomètres pour revenir, par le nord, à Ecrosville. S'il entoure aujourd'hui le parc du château d'Ecrosville, ce mur fut bâti au XVIIe siècle pour délimiter un lieu isolé du monde extérieur, le Désert de la Garde Châtel. Le monastère a été donné par Louis XIV aux Carmes Déchaussés de Rouen, son parc abrite une magnifique petite chapelle.","architecture":"MONTAURE,  demeure du début du XVIIIe siècle construite en lieu et place dun château seigneurial du XIe siècle par Odon Stigaud, sénéchal du duc de Normandie Richard II (grand-père de Guillaume le Conquérant). En 1480 le domaine passe  à Louis de Fontaine, sa fille épouse en 1490 Thibault Poërier d'Amfreville,  le domaine passe par voie de justice en 1612 à Pierre Vigor, puis à François Belot de Ferreux trésorier, ensuite aux Camus famille de Louviers qui firent la construction du château au XVIIIe siècle par François le Camus, en 1781 est cédé à Jean-Baptiste Le Cordier de Bigars marquis de la Londe président au parlement, et en 1784 son neveu Louis-Paul émigre, en 1794 vendu à Louis  Chanel maire de Montaure et revendu à Pierre-François  Lemercier qui le cède à Mathieu Quesné qui fait agrandir  le corps de logis et deux ailes au  château, et en 1895 à la famille de Sènevas et en 1924 au vicomte Raoul d'Angremont aujourd'hui à la famille Philippot.                              Le château actuel reflète la grâce et lharmonie des bâtiments de style Louis XV. Le corps de logis  élevé sur un rez-de-chaussée  et un étage de comble aménagé comporte deux séries de deux travées, la travée centrale dont l'étage formant attique et sommé d'un fronton triangulaire. Cour d'honneur  bordées d'arbres, parc de huit hectares cour dhonneur à la française encadrée de sculptures, sphynges et fleuves, jardins en terrasses ornés de statues de style classique. Éléments protégés MH : le bâtiment du pressoir, y compris le tour à piler, à l'exclusion de la presse (objet rapporté) : inscription par arrêté du 14 décembre 1990.","habitants":"Famille de Sènevas\r\n        \r\n        \"","divers":"Escroville                                                                               Montaure      GPS : 49° 14' 10\" Nord, 1° 05' 16\" Est","gps":"49° 14' 10\" Nord, 1° 05' 16\" Est","images":["../image/image_27/27_Montaure_1.jpg","../image/image_27/27_Montaure_2.jpg"]},"Consult_chateau_formulaire91d4":{"id":"Consult_chateau_formulaire91d4","dept":"27","canton":"Pacy-sur-Eure","commune":"Ménilles","nom":"Ménilles","type":"Château","periode":"XVII","histoire":"MENILLES, la présence d'une famille de Menilles est connue dès 1210. En 1228 apparaît le nom de Jean de Brécourt, seigneur de Menilles. Cette lignée conserve le fief jusqu'à la mort d'un de ses descendants au début du XVe siècle. L'héritière, nommée Jeanne épouse un certain Guillaume Le Sesne qui en devient propriétaire. Bien que l'on ne connaisse pas très exactement à quelle date elle fut édifiée, la première construction d'une maison seigneuriale pourrait être antérieure au XVe siècle. Un aveu de 1450 prouve la présence d'un fief consistant en manoir, colombier à pied, pressoir à ban, jardins de la contenance de deux âcres, trois arpents de vignes, un arpent de pré, trois cents âcres de terre. Les descendants des Le Sesne de Menilles se succèdent jusqu'en 1778, date de la mort de Nicolas Charles ayant pour seule héritière Louise. Elle épouse Joseph de Puisaye. C'est à lui qu'est attribuée la construction de l'actuelle demeure, et il est vrais que le mur de façade ait été élevé précédemment à la construction du château vu qu'il porte des signes cabalistiques évoquant Henri II et Catherine de Médicis. En 1838, il est acheté par le baron Antoine Marie Roederer.  En 1845, il est élevé au rang de pair de France avant de quitter toute fonction. Il s'éteint au Menilles le 15 mars 1865. il repose près de son épouse Adélaïde sous une stèle portant ses armes dans le cimetière de Menilles.","architecture":"MENILLES, ses filles durent vendre le domaine pour réaliser le partage des biens. C'est ainsi qu'en 1874, le château est acquis par Marie Marthe de Choiseul Praslin, marquise de Montalembert d'Essé. Séparée de son époux elle y vit seule avec ses enfants. Le château de Menilles est bouleversé. Toute la décoration est remaniée et des emblèmes des Choiseul et également ceux des familles alliées apparaissent en grand nombre. La marquise mène grand train avec domestiques, cochers et un très nombreux personnel. Elle succombe dans l'une de ses nombreuses propriétés, à Alassis en Italie. Son fils Artus Orace de Montalembert d'Essé, hérite de Menilles, la seconde guerre mondiale arrive presque à son terme avec peu de dégâts causés à la demeure, lorsque le comte de Montalembert disparaît en 1944. Après une nouvelle mise en vente, le domaine est morcelé. Le mobilier, y compris les tapisseries du grand salon et l'énorme bibliothèque sont vendus à l'occasion d'une grande vente qui dura plusieurs semaines. En 1950, une société immobilière, devenue propriétaire, poursuit le morcellement et la vente sur pied des arbres plus que centenaires du parc. C'est dans un triste état que la ville de Gennevilliers achète ce qui reste du domaine en 1960. Après cinq années de travaux dirigés par trois architectes et au prix d'un investissement important, le domaine est de nouveau en état.","habitants":"Famille de Joseph de Puisaye\r\n        \"","divers":"Ménilles    GPS : 49° 02' 03\" Nord, 1° 21' 58\" Est","gps":"49° 02' 03\" Nord, 1° 21' 58\" Est","images":["../image/image_27/27_M%c3%a9nilles_1.jpg","../image/image_27/27_M%c3%a9nilles_2.jpg","../image/image_27/27_M%c3%a9nilles_3.jpg","../image/image_27/27_M%c3%a9nilles_4.jpg"]},"Consult_chateau_formulaire405d":{"id":"Consult_chateau_formulaire405d","dept":"27","canton":"Bernay","commune":"Bosguérard-de-Marcouville,","nom":"Mésangère","type":"Château","periode":"XVII","histoire":"MESANGERE,  Le domaine de La Mésangère appartenait à la fin du XVIe siècle à la famille du Fay,  La reconstruction de l'actuel château au début du XVIIe siècle est attribuée à Georges du Fay, par laquelle il est vendu en 1654 à la famille Scot, qui conserve La Mésangère jusqu'en 1769, elle est alors achetée par Victor Flavigny, drapier à Elbeuf, qui la revend en 1783 à Laurent de La Bunodière. Ce dernier revend à son tour La Mésangère en 1791 à Jacques-Pierre-Amable-Chrestien de Fumechon, magistrat et député, inspecteur général des manufactures de Normandie. La Mésangère fut habitée  par madame de la Sablière qui y attira La Fontaine et Fontenelle. Plan signé René-Edouard André en mai 1933. dont la descendance, dans les familles Asselin de Villequier, Cardon de Montigny, du Fresne de Beaucourt et d'Hugonneau, la conserve jusqu'en 2013. Aujourd'hui propriété du vicomte de Noue.","architecture":"MESANGERE,  entouré de douves occupait le site dès le XIIIe siècle. La place est éprouvée par les guerres de religion et essuie un siège des ligueurs en 1592.  Inspirées par le classicisme français, les façades associent la pierre (chaînes, soubassements) à la brique en remplissage Entre 1663 et 1675, l'aménagement d'un parc est entrepris selon des plans attribués à le Nôtre,  avec une composition mêlant perspectives, parterres et sauts-de-loups. Le colombier circulaire est réalisé à cette période. En 1740, le château est agrandi vers l'Ouest par une aile construite en retour sur la cour. Durant le XVIIIe siècle, le parc est agrémenté de statues à thèmes mythologiques. Des travaux intérieurs sont réalisés; la grille est transportée depuis le château de Fumechon, il a bénéficié de vastes campagnes de restauration au début du XXe siècle.  Le domaine dispose de superbes perspectives vers les plaines cultivées au Nord et à l'Est, vers le parc arboré et les bois au Sud, et vers le hameau voisin de la Saugère à l'Ouest.   Éléments protégés MH : le château, le petit château, la charretterie, l'orangerie, le colombier; le parc avec les statues, les murs, grilles et sauts de loup, avec les perspectives et la demie lune au nord : inscription par arrêté du 21 novembre 2008.","habitants":"famille du Fay  et de  Scot\r\n        \"","divers":"Mésangère  GPS : 49° 16' 29,64\" Nord, 0° 52' 05,16\" Est","gps":"49° 16' 29,64\" Nord, 0° 52' 05,16\" Est","images":["../image/image_27/27_M%c3%a9sang%c3%a8re_1.jpg"]},"Consult_chateau_formulairee9c5":{"id":"Consult_chateau_formulairee9c5","dept":"27","canton":"Evreux","commune":"Normanville","nom":"Normanville","type":"Château","periode":"XVIII","histoire":"NORMANVILLE; Il est rasé au milieu du XVe siècle pour être reconstruit par  Charles de Melun, un des propriétaires, demeure le plus célèbre habitant de Normanville. Jusquen 1820, les Melun, les Champagne, les Leblanc du Roulet, les Boschart de Champigny dont descend Éric De Pertat, actuel résidant, se succèdent. Lors de son abandon à la fin du XVIIIe siècle, Alexandre Boschart, maire de Normanville de 1800 à 1815 montre son attachement au château.  Pendant la seconde guerre mondiale, létat-major allemand occupe le château assez proche de la base aérienne avec un accès facile. En 1944, le parc est délabré, le château vide devient, par sa nouvelle propriétaire Laure Josson, un lieu daccueil pour mères célibataires appelé lAbri. Cette activité cesse au bout de dix ans. Marie De Pertat, grand-mère dÉric De Pertat, le cède avec le parc pour une maison de retraite destinée aux personnes de condition modeste. Elle sera fermée à la suite de lassassinat de Jean de Broglie en 1976. Le parc a servi également de cynodrome pendant quelques années pour distraire les résidents.  C'est l'oeuvre de Jean-Paul Bochard  de champigny.                                                                            BOULAY-MORIN à cinq K.M à l'est  beau manoir, chambre d'hôtes  de Philippe Hersent, à développer une offre de loisirs dans son château est devenu un Hôtel.  Le château du Parc de Diane du XVIIIe siècle.","architecture":"NORMANVILLE, le parc est remodelé style jardin anglais, les arbres actuels âgés de 160 ans au minimum ont été soigneusement conservés. Le château est de nouveau rasé et les matériaux serviront à reconstruire le château suivant de 1815 à 1840 embelli avec deux rotondes.  Ne restent aujourdhui que les communs anciennement laiterie et écuries rénovés qui servent de logements où réside actuellement Monsieur Eric de Pertat et sa famille. transformé en maison de retraite.                                                                                   BOULAY MORIN de plan en  H à deux  niveaux attiques au troisième, toit en terrasse.","habitants":"Charles de Melun\r\n        \"","divers":"Boulay-Morin  grav -2-3   GPS : 49° 05' 09\" Nord, 1° 10' 46\" Est                                                                                    Normanville grav-1","gps":"49° 05' 09\" Nord, 1° 10' 46\" Est","images":["../image/image_27/27_Normanville_1.jpg","../image/image_27/27_Normanville_2.jpg","../image/image_27/27_Normanville_3.jpg"]},"Consult_chateau_formulairef9f2":{"id":"Consult_chateau_formulairef9f2","dept":"27","canton":"Le Neubourg","commune":"Le Tremblay","nom":"Omonville","type":"Château","periode":"XVIII","histoire":"OMONVILLE, fut édifié en 1750 par un architecte de Conches, à la demande du baron du Tremblay,  le Carpentier des Longuaux, seigneur de glatigny. le château presque abandonné afin d'être à l'abri des démolisseurs M. Manceaux en fit l'acquisition.  Le château d'Omonville a été entièrement restauré par l'Ordre de la Rose Croix.  Le château d'Omonville, est le siège de la juridiction francophone de l'AMORC ainsi que de l'URCI. Il abrite la Grande Loge de la Juridiction des Pays de Langue Française.","architecture":"OMONVILLE, l'édifice comprend un corps central en pierre de taille couronné par une toiture en ardoises avec lucarnes. La composition symétrique est soulignée par l'avant-corps central à pans coupés surmonté d'un fronton. L'ornementation rappelle le style rocaille tout en conservant la sobriété du classicisme (mascarons avec volutes végétales, jambages, corniches et bossages épurés). De part et d'autre du corps central, des ailes basses couronnées d'une balustrade forment deux cours fermées abritant les communs et la chapelle. Le château a conservé ses dépendances (en briques, moellons, et tuiles), son parc à la française avec le tracé de ses parterres, et les grilles ouvragées de son enceinte. Le château cadre au Nord et au Sud des vues lointaines sur les plaines et la campagne du Neubourg,  appartient à des propriétaires privés, des visites sont   accordées sur rendez-vous. Éléments protégés MH : les façades et les toitures du château, le pavillon du jardinier, les écuries et le parc avec ses éléments décoratifs et les grilles de clôture: classement par arrêté du 5 janvier 1948.","habitants":"Famille de M. Manceaux \r\n        \"","divers":"Omonville   GPS : 49° 7' 19,1\" Nord, 0° 55' 6,35\" Est","gps":"49° 7' 19,1\" Nord, 0° 55' 6,35\" Est","images":["../image/image_27/27_Omonville_1.jpg"]},"Consult_chateau_formulaired28a":{"id":"Consult_chateau_formulaired28a","dept":"27","canton":"Pont-de-l","commune":"Pinterville","nom":"Pinterville","type":"Château","periode":"XVII-XVIII","histoire":"PINTERVILLE,  Le manoir devint la résidence des archevêques de Rouen, et, en 1304, s'y réunit le concile provincial de la Normandie, à la demande de Guillaume de Flavacourt, qui était composé de l'évêque d'Avranches Geoffroi Boucher, l'évêque d'Évreux Mathieu des Essarts et l'évêque de Séez Philippe le Boulenger. Son corps principal est bâti par Pierre Le Pesant de Boisguilbert, en 1680. Au XVIIIe siècle, ses descendants ajoutent galeries, pavillons d'angle et ailes. En 1695, Suzanne Le Page apporte Pinterville dans la famille Le Pesant de Boisguilbert.  Au XVIIIe siècle, ses descendants ajoutent galeries, pavillons d'angle et ailes. Et en 1840, le pavillon central est rehaussé,\r\nfut habité par Jacques-Henri Bernardin de Saint-Pierre. Le château passe à Albert Rostand en 1878, dont la famille le conserve durant plus d'un siècle. Edmond Rostand vint y séjourner en compagnie de ses cousines durant cette période. Jusqu'à la fin des années 1990, le château subit des pillages répétitifs de la part d'un propriétaire peu scrupuleux. Il est sauvé de la ruine par ses actuels propriétaires qui le font classer M.H. en 2015 et Jardin remarquable en 2017 et qui entreprennent une importante rénovation des façades, des toitures et des charpentes. Propriétaire actuel est  M. Charles Lefort","architecture":"PINTERVILLE  Le château de Pinterville des XVIIe, XVIIIe et XIXe siècles. Situé dans un parc arboré, il est construit en briques et pierres, à l'emplacement d'un ancien manoir du XIIIe siècle. Logis reconstruit dans le quatrième quart du XVIIe siècle: corps principal et pavillon central. Galeries, pavillons d'angle et ailes en retour construits dans la deuxième moitié du XVIIIe siècle. Au XVIIIe siècle, ses descendants ajoutent des galeries, des pavillons d'angle et des ailes, alors que le pavillon central a été rehaussé, en 1840. Il devait se trouver plus près de la rivière que la demeure actuelle.  Logis reconstruit dans le quatrième quart du XVIIe siècle: corps principal et pavillon central. Galeries, pavillons d'angle et ailes en retour construits dans la deuxième moitié du XVIIIe siècle.   Grange et communs de la deuxième moitié du XVIIIe siècle, avec remontage du fronton), modification des galeries et des pavillons d'angle, pose des lucarnes. Colombier et pressoir à cidre mentionnés en 1792 détruits. L'aile nord du logis figurée sur le cadastre de 1823 a disparu. Le Château de Pinterville est recensé à l'Inventaire Général du Patrimoine Culturel, des monuments historiques depuis le 24 juillet 2015.","habitants":"Pierre Le Pesant de Boisguilbert\r\n        \"","divers":"Pinterville    GPS : 49° 11' 15,67\" Nord, 1° 10' 38,3\" Est","gps":"49° 11' 15,67\" Nord, 1° 10' 38,3\" Est","images":["../image/image_27/27_Pinterville_1.jpg","../image/image_27/27_Pinterville_2.jpg"]},"Consult_chateau_formulaire6f71":{"id":"Consult_chateau_formulaire6f71","dept":"27","canton":"Bernay","commune":"Plasnes","nom":"Plasnes","type":"Château","periode":"XVIII","histoire":"PLASNES, construit au début du XVIIIe siècle, le château serait dû à Louis de Prie, marquis de Courbépine et de Plasnes, brigadier puis lieutenant-général des Armées du Roi. L'édifice était utilisé comme relais de chasse.  L'histoire du château de Plasnes paraît intimement liée à celle de la seigneurie de Courbépine. Les deux seigneuries avaient été acquises à la fin du XVIIe siècle par le marquis de Prie qui aurait fait bâtir au début du XVIIIe siècle ce pavillon de chasse, en réutilisant les bases d'une construction plus ancienne. En 1939, il est revenu à la famille de Sincay, qui a entrepris la reconstitution du parc et fait ajouter deux extensions latérales.","architecture":"PLASNES, le château se compose d'un corps de logis unique, de petites dimensions, avec un rez-de-chaussée à sept travées surmonté par une toiture en tuiles avec combles et lucarnes. Les façades en moellons présentent un enduit de teinte claire rehaussé par des ornements de briques (chaînes, cadres de baies, fronton d'entrée et corniches). Les intérieurs ont subi des dégradations durant l'occupation des prussiens en 1870 avant d'être restaurés. Au XXe siècle deux pavillons latéraux ont été ajoutés en retrait du corps de logis. Le château, positionné sur une butte en terrasse, domine le petit parc avec sa pièce d'eau et ses douves jusqu'à la lisière des bois au Sud. Les bosquets d'arbres, les prairies et les champs alentours forment un beau cadre champêtre. L'environnement est valorisé par le village voisin de Plasnes, qui a conservé son architecture rurale (bâti en briques, à pans de bois).  Éléments protégés MH : le château, ainsi que l'emprise foncière: inscription par arrêté du 22 janvier 1996.","habitants":"Louis de Prie marquis de Courbépine\r\n        \r\n        \"","divers":"Pasnes         grav-1               petit château grav 2","gps":"","images":["../image/image_27/27_Plasnes_1.jpg","../image/image_27/27_Plasnes_2.jpg"]},"Consult_chateau_formulairef407-2":{"id":"Consult_chateau_formulairef407-2","dept":"27","canton":"Bourg-Achard","commune":"Bouquelon","nom":"Plessis_27","type":"Château","periode":"XV-XVII","histoire":"PLESSIS   le fief du Plessis est mentionné dès XIIIe siècle comme le possession de la famille de Roys. Le domaine comprenait un château, un colombier, diverses dépendances, des bois et une chapelle dédiée à Saint-Eustache. En 1608, Claude de la Barre, secrétaire des finances de Henri IV, acquiert le domaine et fait réaliser les magnifiques peintures murales de la chapelle, avec notamment des figures de lAncien Testament, des Apôtres et du Jugement dernier. En 1692, la chapelle, en mauvais état, est réparée et dédiée à Saint-Claude. Vers 1750, Guillaume Scot de la Mésangère fait ajouter une aile en retour au pavillon dentrée des XIVe-XVe siècles.","architecture":"PLESSIS, le domaine est constitué d'un manoir, d'un colombier, d'édifices, d'un bois et de la chapelle Saint-Eustache mentionnée dès 1464. En 1750, le château est agrandi d'une aile en retour sur le pavillon d'entrée du XIVe-XVe siècle, qui conserve une charpente cintrée. En 1844, une chapelle funéraire néo-gothique est édifiée par l'architecte Barthélémy. Cette propriété témoigne de l'évolution d'un grand domaine seigneurial apparentée au style classique, cette extension dispose d'une remarquable charpente cintrée.   Au XIXe siècle, de nouvelles constructions viennent prolonger cette aile. En 1864, le comte dOsmoy fait édifier par larchitecte Barthélémy une chapelle funéraire néo-gothique. Des travaux de restauration sont entrepris par les propriétaire actuels depuis les années 1990. Les jardins ont été réaménagés par le paysagiste Georges Hayat. Le parc arboré du domaine forme un écrin végétal autour du château. Éléments protégés MH : le château, les dépendances, la chapelle funéraire et la perspective est-ouest au lieu-dit Le Bois du Plessis: inscription par arrêté du 28 juillet 2005. Le corps de bâtiment contenant la chapelle et l'ancien pavillon d'entrée : classement par arrêté du 31 janvier 2011.","habitants":"Famille de Claude de la Barre,\r\n        \"","divers":"Plessis   GPS : 49° 23' 07\" Nord, 0° 29' 32\" Est","gps":"49° 23' 07\" Nord, 0° 29' 32\" Est","images":["../image/image_27/27_Plessis_27_1.jpg","../image/image_27/27_Plessis_27_2.jpg","../image/image_27/27_Plessis_27_3.jpg","../image/image_27/27_Plessis_27_4.jpg"]},"Consult_chateau_formulaire5fa6":{"id":"Consult_chateau_formulaire5fa6","dept":"27","canton":"Romilly-sur-Andelle","commune":"Pont-Saint-Pierre","nom":"Pont_St_Pierre","type":"Château","periode":"XV-XVI","histoire":"PONT-ST-PIERRE, faisait partie du domaine des ducs de Normandie, ils y firent bâtir un château-fort afin de protéger la vallée. Point de traces aujourd'hui de l'édifice, ils vendirent le domaine aux Montesquiou.  Les Roncherolles firent édifier cette demeure après la guerre de cent ans; en 1760. Au milieu du XXe siècle, la propriété appartenait à M. et Mme Descamps Béghin.  Parc du château de Logempré dit château de Pont-Saint-Pierre, créé en 1810, par l'Architecte Le Poigneux, a été recensé à l'inventaire général du Patrimoine Culturel.  Le château sera vendu en 1760 à Anne-Pierre de Montesquiou-Fésenzac, aristocrate éclairé qui se ralliera à la Révolution, et deviendra général en chef de l'armée des Alpes.  En 1778 le château et le fief de la baronnie de Pont-Saint-Pierre sont rachetés par Louis Caillot de Coquereaumont, conseiller de Louis XVI, qui émigre dès le début de la Révolution.  Ses possessions deviennent alors biens nationaux, dont la gestion est confiée dans un premier temps à la commune de Pont-Saint-Pierre qui sera destituée de cette fonction en 1793.  Une partie des biens est mise en vente et rachetée par la famille d'Houdemare de Vandrimare, descendant des Coquereaumont. Le château devient ensuite propriété d'Adrien Josse, maire de Pont-Saint-Pierre comme lavait été le baron d'Houdemare, puis passera aux mains de la famille Descamps-Béghin (alliance du textile et du sucre).","architecture":"PONT-ST-PIERRE, le château actuel date de la fin du XVe siècle. Protégé par ses douves, l'édifice présente deux tours réunies par un corps de logis et deux ailes agrémentées d'une échauguette en encorbellement. Ses deux grosses tours, à l'entrée principale, les tourelles en encorbellement, sont les éléments d'une construction de la fin de l'ère ogivale. Le château subit de nombreuses modifications au cours du XVIIe siècle. Le parc est traversé par l'Andelle qui alimente les larges douves. La chapelle du château date du XVIe siècle.  Château  construit à Pont saint-Pierre dont-il ne reste que des vestiges mis à part Logempré. Le Catelier, château fortifié du XI et XIIe siècles, qui dominait la paroisse de Saint-Pierre,  la Malmaison, qui se trouvait sur le site de l'actuel château de Pont Saint-Pierre, le château de Douville, construit presque en même temps que la Malmaison. Bernière, alias la Garenne ou les maisons, dont il reste peu de traces, dans un bouquet d'arbres, entre l'église de Pont-Saint-Pierre et le château de Douville. Logempré, l'actuel château de Pont Saint-Pierre.","habitants":"Famille de Roncherolles\r\n        \"","divers":"Pont st-Pierre  GPS : 49° 20' 10\" Nord, 1° 16' 33\" Est","gps":"49° 20' 10\" Nord, 1° 16' 33\" Est","images":["../image/image_27/27_Pont_St_Pierre_1.jpg","../image/image_27/27_Pont_St_Pierre_2.jpg","../image/image_27/27_Pont_St_Pierre_3.jpg","../image/image_27/27_Pont_St_Pierre_4.jpg","../image/image_27/27_Pont_St_Pierre_5.jpg","../image/image_27/27_Pont_St_Pierre_6.jpg","../image/image_27/27_Pont_St_Pierre_7.jpg"]},"Consult_chateau_formulaire66c3":{"id":"Consult_chateau_formulaire66c3","dept":"27","canton":"Romilly-sur-Andelle","commune":"Radepont","nom":"Radepont","type":"Radepont","periode":"XVIII","histoire":"RADEPONT,  le premier château, la construction est commencée en 1194 et s'achève en 1203. Juste à temps pour que Philippe Auguste s'en empare et le détruise dans sa reconquête de la Normandie de Richard Coeur de Lyon. En 1190, l'Abbaye Notre-Dame de Fontaine-Guérard est fondée. Les bâtiments encore visibles aujourd'hui remontent à 1253. La seigneurie de Radepont passe, au cours des siècles, aux familles de Poissy, de Teufles, et du Bosc. Louis XIV érige le fief en marquisat. En 1788, Jean Léonor du Bosc, maréchal de camp. Auguste Dubosc parvient à conserver son château pendant la Révolution, l'Empire et la Restauration. Son fils se sépare de la propriété et revient à Charles Levasseur, propriétaire de l'Abbaye de Fontaine Guérard. Au lendemain de la première guerre Mondiale, il est acquis par Fernand Colombel. Sans héritier et sensible au travail de l'Armée du Salut auprès des bagnards sous l'impulsion de Charles Péan, il lui lègue le domaine en 1939. A la fermeture du bagne en 1946, l'Armée du Salut est chargée de rapatrier 4000 survivants environ. Le château est emménagé pour les accueillir dès 1952. Le domaine se spécialise un temps dans l'accueil des multirécidivistes dont la libération n'est envisageable qu'avec la garantie d'un logement et d'un travail.","architecture":"RADEPONT  fait construire une résidence sur les berges de lAndelle, au pied de lancienne forteresse, agrémentée d'un grand parc qui sera considéré comme l'un des plus beaux de Normandie.  L'édifice de 1788 au tout début du premier quart du XXe siècle, en style Louis XIII, par Duchesne, architecte à Paris puis par Lacire architecte à Rouen pour une majestueuse demeure, mais des revers de fortune l'obligent à se séparer du domaine.","habitants":"Famille de Poissy\r\n        \"","divers":"Radepont    GPS : 49° 21' 07\" Nord, 1° 19' 45\" Est","gps":"49° 21' 07\" Nord, 1° 19' 45\" Est","images":["../image/image_27/27_Radepont_1.jpg","../image/image_27/27_Radepont_2.jpg","../image/image_27/27_Radepont_3.jpg","../image/image_27/27_Radepont_4.jpg","../image/image_27/27_Radepont_5.jpg"]},"Consult_chateau_formulaire8b3d":{"id":"Consult_chateau_formulaire8b3d","dept":"27","canton":"Val-de-Reuil","commune":"Herqueville","nom":"Renault","type":"Château","periode":"XVIII","histoire":"RENAULT, fut construit pour Louis Renault et domine la Seine. L'inventeur et constructeur automobile de l'Usine Renault, Louis Renault s'est passionné pour le travail dans les fermes. Il a acquis près de 2000 hectares près du Vaudreuil. En 1906, à l'âge de 29 ans, il rachète le domaine de la Batellerie à Herqueville près du Vaudreuil puis fit construire l'élégant château Renault. Ce sera plus qu'un pied-à-terre à la campagne. Il adore la chasse. Entrepreneur dans l'âme, il s'intéresse à l'organisation du travail, au machinisme agricole naissant. Le domaine Louis Renault est un ancien domaine agricole créé, puis développé, de 1906 à 1944, par l'Industriel Louis Renault, au sein des communes de Andé, Connelles, Daubeuf-près-Vatteville, Herqueville, Muids et Porte-Joie, dans le département de l'Eure.  Durant les décennies au cours desquelles il est propriétaire du domaine, Louis Renault s'évertue à créer une \"ville idéale\", lieu à la fois de modernité agricole et d'organisation sociétale modèle. Pour cela, il développe les aspects organisationnel , structurel (en créant un modèle de ferme spécifique avec ses entrées monumentales, ses tours-silos, ses paddocks à taureaux, etc.) et architectural (par le développement, au travers des constructions nouvelles, d'un \"style Renault\", caractérisé notamment par le mélange de l'architecture traditionnelle et des techniques modernes et par l'utilisation de la bichromie).","architecture":"RENAULT , mais le Domaine agricole, s'avère être un « colosse aux pieds d'argile », et ne peut fonctionner, économiquement, en totale autonomie et ne doit sa subsistance qu'aux apports financiers réguliers de Louis Renault. Au décès de celui-ci, en 1944, le domaine est repris par son fils Jean-Louis qui en réoriente la production. Mais cela s'avère être un échec et, en 1960, les terres et les fermes sont vendues. Louis Renault décède le 24/10/1944 à l'âge de 67 ans. A la suite des accusations de collaboration dont il fait l'objet, ses usines sont confisquées puis nationalisées. Toutefois, le domaine reste la propriété de sa famille. Et cest son fils, Jean-Louis, qui le reprend et loriente vers des productions agroalimentaires, comme la luzerne déshydratée et la fécule de pomme de terre, puis vers la production industrielle de matériel de bureau. Sans grand succès. En effet, coupé des apports financiers des usines Renault, le domaine périclite et Jean-Louis Renault finit par vendre terres et fermes au début des années 1960. Si aujourd'hui une partie du domaine appartient encore à la famille Renault, la grande majorité des terres et des fermes a été acquise par des agriculteurs et certains bâtiments, dont le château, appartiennent à des personnes extérieures à la famille. Le site est inscrit aux M.H. en 1981. C'est devenu un domaine agricole.","habitants":"Famille de Louis Renault\r\n        \"","divers":"Renault      GPS : 49° 14' 32\" Nord, 1° 15 26\" Est","gps":"49° 14' 32\" Nord, 1° 15 26\" Est","images":["../image/image_27/27_Renault_1.jpg","../image/image_27/27_Renault_2.jpg","../image/image_27/27_Renault_3.jpg"]},"Consult_chateau_formulaire02fe":{"id":"Consult_chateau_formulaire02fe","dept":"27","canton":"Brionne","commune":"Romilly-la-Puthenaye","nom":"Romilly","type":"Château","periode":"XVII","histoire":"ROMILLY, le château fort du XIIe, XVIIe et XVIIIe siècles. Le château a été reconstruit dans la deuxième moitié du XVIIe siècle par Jules Hardouin-Mansart pour Thomas Legendre, négociant à Rouen. L'aile sud a été ajoutée par Joseph-Abel Couture dans la deuxième moitié du XVIIIe siècle. Au cours de la seconde guerre mondiale, le logis est ruiné et il est finalement détruit après 1959. Ne subsistent donc aujourd'hui du château que des vestiges.  Chapelle de la Trinité mentionnée dans le château fort du XIIe siècle: motte féodale. Aveu de 1419 mentionnant l'hôtel tout clos de murs et de fossés. L'aile sud rajoutée par Joseph-Abel Couture dans la deuxième moitié du XVIIIe siècle. Logis ruiné en 1939-1945 et détruit après 1959.","architecture":"La PUTHENAIE, ancienne commune réunie à celles de Bougy et de Romilly-près-Bougy sous le nom de Romilly-la-Puthenaye (1846).      Vers 1065, Gilbert de Clères donne à l'abbaye de Conches, l'église de Saint-Aubin de la Puthenaye, avec la dîme et la terre de Roger le chapelain, du consentement de Raoul de Tosny, son suzerain.   En 1105, Henri de la Puthenaye  jure sur les rôles, comme débiteur de 10 s. pour fausse clameur.   De 1210 à 1290, une partie du territoire de le Puthenaye fut donné ou vendu aux Templiers de Saint-Etienne de Renneville.  Les familles de Chambon, Chambellan, et de Bougy, possédèrent jusqu'en 1789, la seigneurie de la Puthenaye.                                                                                                              Sur la commune de Romilly-la Puthenaye se trouve le manoir de la Puthenaye du 16e siècle entouré de douves, matériaux du gros-uvre : calcaire, pierre de taille, grès  matériaux de la couverture : tuile plate : 1 étage carré  : élévation à travées  toit à longs pans, . coupe, forme et structure de lescalier : escalier hors uvre, escalier en vis sans jour.","habitants":"Famille de  Thomas Legendre                                               famille de Chambon,\r\n        \"","divers":"Romilly  grav_1                                                                                 la Puthenaye  grav-2-3  gps 49° 00' 11\" nord, 0° 50' 54\" est","gps":"","images":["../image/image_27/27_Romilly_1.jpg","../image/image_27/27_Romilly_2.jpg","../image/image_27/27_Romilly_3.jpg"]},"Consult_chateau_formulaire9dd7":{"id":"Consult_chateau_formulaire9dd7","dept":"27","canton":"Les Andelys","commune":"Cuverville","nom":"Ronderolles","type":"Château","periode":"XVII","histoire":"RONCHEROLLES, la construction du Grand Roncherolles, est une ferme-manoir bâtie du XVIIe siècle. Rocherolles est un fief, berceau familial des Roncherolles, érigé en marquisat en 1652. Il est prétendu que le titre de Grand Bouteiller de Normandie était attaché à la terre de Roncherolles. Roger III, au début du XIIIe siècle, fonde une chapelle qu'il dédie à Saint-Laurent dans le château. Louis II de Roncherolles ( 1538) y fonde une chapelle Saint-Hubert.                                                                                       CUVERVILLE, dépendait de Breteuil. Au XIIIe siècle, le patronage de Saint-Pierre de Cuverville relevait de l'archevêque. Il est alors recensé 60 chefs de famille. Jusqu'en 1744, la seigneurie de Roncherolles-Cuverville appartenait à la famille de Roncherolles. Le 21 janvier 1744, Anne-Marguerite-Thérèse de Roncherolles, fille unique et orpheline de père, épouse René Nicolas de Maupeou, qui deviendra dernier chancelier de l'Ancien Régime et dernier marquis du lieu.","architecture":"RONCHEROLLES, la chapelle Saint-Hubert, fondée par Louis II de Roncherolles, est, aujourd'hui, détruite. Le plan des bâtiments existants s'organise autour d'une cour dont les bâtiments forment un U ouvert vers le sud-ouest avec le colombier sur l'extrémité ouverte. L'inventaire réalisé en 1986 fait état d'un manoir avec une cour, une remise, une grange, l'étable et le colombier. La chapelle Saint-Hubert a été détruite. Le manoir de Roncherolles daterait du XVIIe siècle.","habitants":"Seigneur locaux\r\n        \"","divers":"Roncherolle   GPS : 49° 17' 13\" Nord, 1° 22' 22\" Est      Curverville grav-2-3","gps":"49° 17' 13\" Nord, 1° 22' 22\" Est      Curverville grav-2-3","images":["../image/image_27/27_Roncherolles_1.jpg","../image/image_27/27_Roncherolles_2.jpg","../image/image_27/27_Roncherolles_3.jpg"]},"Consult_chateau_formulaire8bbd":{"id":"Consult_chateau_formulaire8bbd","dept":"27","canton":"Romilly-sur-Andelle","commune":"Rosay-sur-Lieure","nom":"Rosay_Lieure","type":"Château","periode":"XVII-XVIII","histoire":"ROSAY, jusqu'au XVIIe siècle, le fief de Rosay représentait un vaste territoire, hérité de la conquête de la Normandie par Rollon, qui revint à la famille de Marigny. Au cours du XVIIe siècle, il fut acquis par Nicolas de Frémont, conseiller au Parlement de Rouen, en faveur duquel Louis XIV érigea en marquisat la terre de Rosay.  La Révolution épargna le château en raison de la qualité de louvetier de son propriétaire. Au XIXe siècle, sous le rayonnement d'Apollonie de Valon, femme du député Louis Alexis de Valon, le château devint un salon littéraire et accueillit la plupart des écrivains et artistes romantiques tels que Gustave Flaubert, Prosper Mérimée, Guy de Maupassant et Théophile Gautier. En 1938, l'ultime membre sans descendance de la famille de Valon, le vicomte René, ne pouvant l'entretenir, vendit la propriété à la famille Quevillon. Les dépendances et le parc furent progressivement morcelés, malgré un arrêté d'inscription à l'inventaire des monuments historiques cette même année.  Me Castellane, avocat parisien, reprend le château délabré en 1969 et,  pour lui redonner vie, l'ouvre au public pour la première fois.","architecture":"ROSAY, le château de Rosay fut bâti au début du XVIIe siècle par la famille du Mesnil-Jourdain, c'est un édifice composé d'un corps principal construit en 1611 et en 1619 avec deux ailes en retour, l'architecture est caractéristique du style Louis XIII, ardoises bleues, briques roses et crépis laiteux. Le château est bordé de chaque coté par des bras de rivière qui se rejoignent à l'entrée du domaine pour former un plan d'eau. En 1662, une chapelle sera élevée et bénite le 4 Septembre 1692, et détruite vers 1850 par le Comte de Valon. La Révolution épargnera Rosay. Léon de Valon réalisera des travaux d'aménagement intérieur vers 1870. En plus des cheminées, un calorifère assurait le chauffage par le sol. Le parc est réaménagé dans le style anglais, en vogue à cette époque. . Les dépendances et le parc qui formaient un ensemble remarquable seront morcelés, déboisés, pillés pendant trente ans. En 1976, la toiture prend leau, le château est alors à labandon. Maitre Castellane, après quinze années d'efforts obstinés, sauvera cet édifice condamné et redonnera au château sa fonction sociale d'antan en l'ouvrant au public. Le domaine possède une perspective Nord-Sud dans l'axe de la vallée de la Lieure. Le cadre paysager de cette vallée reste préservé (champs, prairies et coteaux boisés). De même, l'architecture rurale (bâti à colombage, en briques) participe à cet environnement valorisant. Le château fait l'objet d'une inscription au titre des M.H. depuis le 31 janvier 1938.    Depuis 2005, le château de Rosay est destiné à l'accueil de séminaires dentreprises.","habitants":"Louis Alexis de Valon\r\n        \"","divers":"Rosay gps 49° 22' 39\" nord, 1° 26' 24\" est","gps":"","images":["../image/image_27/27_Rosay_Lieure_1.jpg","../image/image_27/27_Rosay_Lieure_2.jpg","../image/image_27/27_Rosay_Lieure_3.jpg"]},"Consult_chateau_formulaire34ec":{"id":"Consult_chateau_formulaire34ec","dept":"27","canton":"Gallion","commune":"Gaillon","nom":"Rotoirs","type":"Château","periode":"XVII","histoire":"ROTOIRS, le château et le fief, qui furent vendus en 1637 par Philippe de Coetlogon, gentilhomme de la Vénerie du roi Louis XIII, à Pierre de Croismare  gentilhomme de la vénerie de Louis XIII, du début XIXe siècle à la fin XVIIe siècle, et du début XIXe siècle. Cette maison de maître se situe sur le hameau des Rotoirs. Les « rotoirs », mot dorigine germanique, étaient le nom des lieux où le chanvre était mis à décomposer pour en extraire les fibres ligneuses. À lorigine pavillon de chasse, il fut par la suite agrandi par la construction dailes et détages. Le domaine a appartenu pendant le XIXe siècle au président du tribunal dÉvreux Nicolas-François Huet, puis à monsieur Théodore Armand Desbrière ( 01/10/1898), administrateur de la compagnie des chemins de fer de l'Ouest, suivi de Jules Janin, beau-fils des Huet  président du Tribunal dEvreux et M. Desbrière,  et  les Bisson, puis , le dernier propriétaire a été le comte Alexandre de Marenche, patron du contre-espionnage français y demeura avant de vendre le domaine et les terres environnantes (262 hectares) en 1970, à la Caisse de prévoyance des ouvriers des travaux publics. Plus près de nous, Philips et le Club Méditerranée.","architecture":"ROTOIRS, le château actuel a été construit à la fin du XVIIIe siècle.  Sa vocation fut agricole pendant des siècles, mais les fermes ont toutes disparues. Loué au Club Méditerranée et ensuite à la firme Philips, le château a un nouveau propriétaire qui désire en faire un complexe dhôtellerie; il l'a rebaptisé le château de Saint-Aubin. La petite chapelle, dédiée à Saint-Gilles, est en rénovation. La forêt du château, le bois de Brillehaut est devenue propriété de la commune depuis 2005.   Hôtel restaurant de charme.                                                                                                            (Le Château des Rotoirs figura un temps parmi les offres du catalogue du Club Méd' comme lieu de vacances) rajoutent un hôtel, aujourdhui détruit, pour en faire un lieu propice à leurs séminaires internes. Mr Drigues ensuite voulait en faire sa maison de famille mais il se sentait trop éloigné de ses enfants éparpillés aux quatre coins du monde. Au beau milieu dun bois entouré de centres équestres et de fermes.","habitants":"comte Alexandre de Marenches, \r\n        \"","divers":"Rotoirs   GPS : 49° 07' 39\" Nord, 1° 20' 45\" Est","gps":"49° 07' 39\" Nord, 1° 20' 45\" Est","images":["../image/image_27/27_Rotoirs_1.jpg","../image/image_27/27_Rotoirs_2.jpg","../image/image_27/27_Rotoirs_3.jpg"]},"Consult_chateau_formulaire93ea":{"id":"Consult_chateau_formulaire93ea","dept":"27","canton":"Bourg-Achard","commune":"Routot","nom":"Roumois","type":"Château","periode":"XVII","histoire":"ROUMOIS,  date de 1768 et fut construit par Guy Boissel qui fut le dernier seigneur de Routot. Le château a conservé, à lintérieur, ses magnifiques lambris. Dans la cour attenante se trouve une pierre tombale qui semble avoir été une des dernières victimes de la peste, Guy Boissel et  morte à Routot le 17 Novembre 1652. Le château fut très remanié au XIXe siècle, il reste un four à pain, un pressoir du XVIIe siècle ainsi que des parties agricoles du XVIIIe siècle; enclos, grange, étable.","architecture":"ROUMOIS Au nord  de Routot à Hauville château de saint-PAUL, le Château de Saint Paul est une grande bâtisse en brique, construite vers le milieu du XVIIIe siècle. Des appartements résidentiels y ont été créés.","habitants":"seigneur de Routot\r\n        \"","divers":"Roumois grav-1                                                                         St-Paul grav-2   GPS : 49° 23' 50\" Nord, 0° 46' 15\" Est","gps":"49° 23' 50\" Nord, 0° 46' 15\" Est","images":["../image/image_27/27_Roumois_1.jpg"]},"Consult_chateau_formulaire30c8":{"id":"Consult_chateau_formulaire30c8","dept":"27","canton":"Pont-de-l","commune":"Alizay","nom":"Rouville_Alizay","type":"Château","periode":"XVII","histoire":"ROUVILLE, en 1324, Jean Gougeul possédait le fief, il le laissa en 1350 à son fils Jean. Il eut pour successeur à Rouville, Pierre Gougeul, chevalier, maître dhôtel du Roi, qui rendit aveu de Rouville le 7 novembre 1374. La seigneurie de Rouville fut pendant quelques temps érigée en comté en faveur de François de Rouville, le 21 février 1664, les créanciers du comte firent vendre ses biens à Gilles Hallé, président à Mortier au parlement de Rouen, le 11 septembre 1684.     En 1790, il appartient actuellement à lentreprise M-Real.  vendit à madame Marie Madeleine Frault veuve de messire de Berroyer, le fief de Rouville et les dépendances. Les héritiers de la dame de Berroyer vendirent le château et les terres  à M. Philippe Bizet, le 1er messidor, an VIII; puis le domaine passa par succession à Mme de la Poterie et le château connu une perte dimportance notable, il appartient actuellement à lentreprise M-Real.","architecture":"ROUVILLE,  les propriétaires donnèrent au château les apparences dun édifice de style Renaissance, laissant tomber en désuétude les remparts et les fortifications. Dès lors, ce sont le parc et les écuries qui furent mis en avant et aménagés, murs tombant plus ou moins en ruine. Le château et les communs furent relevés en 1882 par Loisel, architecte à Rouen.","habitants":"il appartient actuellement à lentreprise M-Real..\r\n        \"","divers":"Rouville","gps":"","images":["../image/image_27/27_Rouville_Alizay_1.jpg","../image/image_27/27_Rouville_Alizay_2.jpg","../image/image_27/27_Rouville_Alizay_3.jpg"]},"Consult_chateau_formulairebddd":{"id":"Consult_chateau_formulairebddd","dept":"27","canton":"Breteuil","commune":"Rugles","nom":"Rugles","type":"Manoir","periode":"XV","histoire":"Au Nord de Rugles à 5 K.                                                                                                                    BOTTEREAUX-REBAIS Le château des Bottereaux ou Manoir de Rebais et le château de l'ECUREUIL à Rugles  été édifié au XVe siècle  et aujourdhui une propriété privée, Renaud de  Coustes tenait en 1210 un quart du fief de l'Écureuil, le roi en tenait un autre quart.  Jean de Coustes, sieur de l'Écureuil marié en 1323 avec Annette des Essarts, réclama, après la mort de sa femme à Jean III des Essarts, le paiement du mariage de cette dame. L'Écureuil était 1/4 de fief à court et usage de basse justice, tenu par une paire de gants. Antoinette de Coustes en rendit aveu le 10 janvier 1534.  Ce fief passa ensuite à la famille du Plessis-Châtillon ; Michel du Plessis-Châtillon, fils de René vendit les fiefs de Bailly, du Luçay et de l'Écureuil à monsieur Taurin Fucher, lieutenant au grenier au sel de Verneuil. Celui-ci obtint en 1634 du roi Louis XIII des lettres de patente, l'autorisant à faire clore les fossés et fermer d'un pont-levis son manoir de l'Écureuil. Il mourut, vers fin 1643 laissant sa femme, Anne Chouquet, enceinte.  Catherine Fucher, fille posthume de Taurin épousa Claude d'Ouézy (d'Olendon) et vendit le fief de l'Écureuil à Jean de Bardouil sieur de Saint-Laurent. Charles et Antoine Charles de Bardouil furent seigneurs de l'Écureuil, acheté en 1785 par Nicolas, François, Victor Chevrier, négociant qui prit le titre de seigneur de l'Écureuil . En 1793 le citoyen Chevrier était obligé de déposer, au corps municipal de Rugles, ses papiers et titres féodaux, où ils furent brûlés. Propriété de la famille Crépy qui succédèrent au baron Louis de Cabrol.","architecture":"ECUREUIL, au XIXe et début du XXe siècle le manoir passa dans les familles Miguet et Fouquet. André Fouquet y entrepris d'importantes réparations. Le baron Cabrol en fut propriétaire jusqu'en 1948. De nouveaux propriétaires l'entretiennent avec beaucoup de soins. Château de plan rectangulaire à deux niveaux  sur soubassement,  flanqué sur trois angles d'échauguettes sur encorbellement toit en poivrières et lucarnes sur combles toit en croupe couvert de tuiles.","habitants":"Famille d'Antoinette de Coustes\r\n        \"","divers":"Bottereaux  Ecureuil grav-1-2-3   GPS : 48° 52' 23\" Nord, 0° 40' 09\" Est                                                                               Rebais grav-4-5-6","gps":"48° 52' 23\" Nord, 0° 40' 09\" Est","images":["../image/image_27/27_Rugles_1.jpg","../image/image_27/27_Rugles_2.jpg","../image/image_27/27_Rugles_3.jpg","../image/image_27/27_Rugles_4.jpg","../image/image_27/27_Rugles_5.jpg","../image/image_27/27_Rugles_6.jpg"]},"Consult_chateau_formulaire2d48":{"id":"Consult_chateau_formulaire2d48","dept":"27","canton":"Bernay","commune":"Serquigny","nom":"Serquigny","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article Gd-Sérigny et  Maubuisson.                                                                                                                             Grand SERQUIGNY, Sous Louis-Philippe, lui succéda le marquis de Groix, propriétaire des forges voisines et de plus de 2000 hectares de bois et terres, à qui l'on doit l'embranchement stupide de Serquigny avec un arrêt qui ne mène à rien: mais le marquis avait offert à la compagnie des chemins de fer, le terrain de la gare et des aiguillages pour s'y ménager une halte personnelle. A sa fille Blanche, comtesse Amédée dAndigné, succéda sa petite-fille, Marie Joséphe, qui, sans enfant de son mariage avec le comte Adalbert de Vogûé, laissa Serquigny à sa soeur Louise, marquise de Keroüartz.   On attribue la construction du corps de logis actuel à Pierre Pecqueult, Président Trésorier de France à Alençon, adjudicataire de la terre en 1681. Quant aux tours rcirculaires, ce serait les vestiges de la résidence de Charles dAchey et de Jean, son fils, capitaine de Tancarville, de même que les pavillons isolés, placés au centre de la cour dhonneur. A lintérieur du château, ont été conservés des boiseries, trumeaux et cheminées Louis XV, remontant aux modernisations opérées au milieu du XVIIe siècle. Dans lancienne basse-cour, au sud des douves, trône un beau colombier cylindrique en briques et silex. Léguée à Pierre Louiset Léonard de Malhortie, le domaine de Serquigny échut vers 1770 à Pierre René de la Roque, qui parvint à préserver le domaine des menées révolutionnaires.","architecture":"Gd-SERQUIGNY, le château actuel sappuie sur les fondations d'un ouvrage féodal antérieur détruit, construit par la famille Mauvoisin, qui possédait la seigneurie depuis la fin du XIe siècle. A lorigine accessible par deux ponts-levis, le château doit son caractère monumental au parti original adopté pour sa façade. De part et dautre, des chaînes de pierre encadrent les travées, séparées par détroits panneaux de briques, la façade arrière présente une ordonnance analogue, mais elle est encadrée de tours rondes en forte saillie, légèrement dissymétriques, relevées sur des fondations du Moyen Age ou du XVIe siècle                                                                                               MAUBUISSON,  le lieutenant Romain Sarcunius fit construire une magnifique villa à grand frais sur lancien Malum buxetum (Maubuisson). Un aqueduc de deux kilomètres y amenait les eaux pour lalimenter tandis que sur le haut de la colline deux feux allumés nuit et jour surveillaient les alentours. Du nom de ce chef Romain est venu celui de Sarquigny, puis Serquigny. Vers le début du XIe siècle, Maubuisson devient propriété de la Famille dErneville, un château féodal y est bâti en lieu et place de la villa romaine ravagée par les diverses hordes barbares et pour se protéger des invasions normandes. Le décès d'Adrien Joseph dErneville, le 3 août 1810, met fin à la présence de cette famille à Maubuisson après plus de Huit siècles. Le domaine féodal est vendu et M. Gattier, nouveau propriétaire, préfet de la Manche et y fit construire à la place le château actuel. Source : château de Maubuisson par A. Gardin. Chambres d'hôtes.","habitants":"Serquigny; marquis de Groix                                                 Maubuisson ; Famille dErneville\r\n        \"","divers":"Grand-Sérquigny grav 1-2-                                                                                                                                                              Maubuisson.  grav-5  GPS : 49° 06' 43,2\" Nord, 0° 42'
