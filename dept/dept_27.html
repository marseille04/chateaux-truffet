parc et de ses plantations. Outre son parc arboré, le château possède un cadre rural préservé. Une perspective axée sur le logis ouvre sur la plaine cultivée au Nord et sur les bois au Sud. Ces vues ainsi que les abords immédiats du parc et le terrain de l'ancienne motte féodale doivent être conservés.  Inscription par arrêté du 20 février 1996.","habitants":"Famille de  François Duvert\r\n        \"","divers":"Emalleville  Grav-1     GPS : 49° 05' 44\" Nord, 1° 09' 36\" Est","gps":"49° 05' 44\" Nord, 1° 09' 36\" Est","images":["../image/image_27/27_Emalleville_1.jpg"]},"Consult_chateau_formulaire29e7":{"id":"Consult_chateau_formulaire29e7","dept":"27","canton":"Gisors","commune":"Etrépagny","nom":"Etrépagny","type":"Château","periode":"XVI","histoire":"ETREPAGNY, on y construisit un château fort qui était tombé en ruine au commencement du XIIe siècle. La mort de Henri Beauclerc (1135) ouvrit pour la Normandie une période d'incertitude successorale. Sa fille et unique héritière légitime, Mathilde l'Emperesse, rebâtit  en 1149. Mais à peine fut-il terminé que le roi de France s'en empara. Deux ans après il fut brûlé par Henri lui-même. » en 1151 et réédifié dans la deuxième moitié du XIIe siècle « Pendant les guerres de Cent ans, ce château qui avait été relevé une seconde fois, fut pris et repris par les Français et les Anglais. Etrépagny fut au XVIe siècle la propriété de Marie de Bourbon, duchesse de Longueville et de la famille Turgot au XVIIIe siècle. »  Au XVIIe siècle, Catherine d'Orléans importa dans le canton d'Etrépagny, la fabrication de la dentelle.  En 1878  les Dominicaines de la Congrégation de Sainte-Catherine de Sienne bénéficient alors des libéralités de Marie Étiennette Isabelle de Vatimesnil et de son mari, qui habitent le château dEtrépagny. Après diverses tractations le projet prend sa consistance et les religieuses commencent à sinstaller.","architecture":"ETREPAGNY,  château-fort construit  au XIe siècle, détruit en 1151 et réédifié dans la deuxième moitié du XIIe siècle. Importants travaux dans le quatrième quart du XVIe siècle. Le logis du château actuel date du XVIIe siècle. Adjonction d'une aile à l'ouest et construction d'une chapelle lors de la transformation en couvent de dominicains dans le quatrième quart du XIXe siècle, par l'architecte E.Trilhe.\r\n Avec élévation à travées, à un étage carré ; étage de comble et escalier dans-oeuvre ; escalier tournant à retours avec jour   gros-oeuvre: calcaire ; brique ; pierre de taille ; moellon ; brique avec pierre en remplissage: toit à longs pans ; croupe  couvert en  ardoise.","habitants":"Marie de Bourbon\r\n        \"","divers":"Etrépagny    GPS : 49° 18' 19,66\" Nord, 1° 36' 41,85\" Est","gps":"49° 18' 19,66\" Nord, 1° 36' 41,85\" Est","images":["../image/image_27/27_Etr%c3%a9pagny_1.jpg","../image/image_27/27_Etr%c3%a9pagny_2.jpg"]},"Consult_chateau_formulaire457e":{"id":"Consult_chateau_formulaire457e","dept":"27","canton":"Evreux","commune":"Evreux","nom":"Evreux","type":"Château","periode":"XV-XVIII","histoire":"EVREUX, Hôtel de Ville, la construction  date de la fin du XIXe siècle, à l'emplacement de l'ancien château des comtes d'Évreux. C'est grâce au legs d'Olivier Delhomme (1794-1874), conseiller municipal, de 1830 à 1870, que l'édifice a été érigé entre 1889 et 1895 par les architectes Thierry Ladrange et Georges Gossart. Le plafond de la salle des mariages a été décoré par Charles Denet.  Notre mairie correspond bien aux goûts artistiques de la période économique florissante de la fin du XIXe siècle, avec lintroduction du vitrail civil dans les bâtiments publics, de style néo-classique, la volonté des architectes était de faire de l'Hôtel de Ville d'Evreux, un véritable palais dédié à la République.\r\nNAVARE, le bâtiment date du XVIIIe siècle. C'est plus une gentilhommière entourée d'un beau parc, qui fut agrandie, au cours du XIXe siècle, qualifiée de château. Le petit château de Navarre a été inscrit aux M.H. depuis le 3/10/2018, il est durant l'été 2019, en cours de démolition pour réaliser un parking, à l'initiative de son propriétaire.                                                        TRANGIS, il fut construit, avant 1750, sur les restes d'une construction du XVIIe siècle, par Le Cousturier de Pithienville, lieutenant criminel du Présidial. Il passa le 13/06/1750 dans les mains du duc de Bouillon, Godefroy de la Tour d'Auvergne, comte d'Evreux et propriétaire du château de Navarre. Il devint ensuite la propriété, avant la Révolution, de Michel Le Cousturier de Courcy. Il est acquis en 1861 par Ferdinand Goldschmidt, banquier, membre d'une des principales familles de la haute finance européenne au XIXe siècle.","architecture":"EVREUX, le palais Episcopal d'Evreux ou château des Evêques. Sa construction date du XVe au XVIIIe siècle. Cet ancien évêché et ses dépendances ont été transformés en Musée. La Mairie en est devenue propriétaire. Le Palais épiscopal d'Evreux est classé aux M.H. depuis 1907.  Installé au pied de la cathédrale  dans un ancien palais médiéval classé M.H, le musée dArt, histoire et archéologie vous offre une expérience de visite unique. Ce bâtiment à la silhouette singulière abrite le musée depuis les années 1960. Ses différentes façades témoignent de lart de bâtir à travers les âges. Construit à proximité immédiate de la cathédrale pour accueillir les évêques dÉvreux à la fin du Moyen Age, lédifice na cessé dêtre modifié jusquau 20e siècle. À lintérieur de cet ancien palais, au fil de ses quatre niveaux, vous découvrirez les salles historiques décorées de cheminées monumentales, lescalier à vis qui vous mènera au chemin de ronde vous plongeant dans un cadre totalement immersif.                                                                                                                          TRANGIS, le château de Trangis resta, plus d'un siècle, parmi ses descendants. En 1981, son arrière petit fils Guillaume Guindey, haut fonctionnaire, membre de l'Institut, le revendit à la ville d'Évreux. Le parc du château de Trangis constitue aujourd'hui un espace vert ouvert aux visiteurs, avec un parcours d'accrobranches. Le Parc du Château de Trangis est accessible au Public depuis 1981.","habitants":"Evreux; Olivier Delhomme                                                                Trangis Guillaume Guindey,\r\n        \"","divers":"Evreux  Hotel de ville  grav 1-     GPS : 49° 01' 37\" Nord, 1° 09' 05\" Est                                                                                     Palais  grav-2-3   GPS : 49° 01' 26\" Nord, 1° 09' 03\" Est                                Navare Grav-5    GPS : 49° 01' 06\" Nord, 1° 07' 29\" Est                                     Trangis   grav-4   GPS : 49° 03' 31\" Nord, 1° 08' 56\" Est","gps":"49° 01' 37\" Nord, 1° 09' 05\" Est","images":["../image/image_27/27_Evreux_1.jpg","../image/image_27/27_Evreux_2.jpg","../image/image_27/27_Evreux_3.jpg","../image/image_27/27_Evreux_4.jpg","../image/image_27/27_Evreux_5.jpg"]},"Consult_chateau_formulaire4093":{"id":"Consult_chateau_formulaire4093","dept":"27","canton":"Romilly-sur-Andelle","commune":"Fleury la forêt","nom":"Fleury_Foret","type":"Château","periode":"XVI","histoire":"FLEURY la FORET, l'imposant château de Fleury-la-Forêt date du XVIIe au XVIIIe siècle. Son premier propriétaire, François-Georges de Bricqueville vendit le fief, en 1559 à Pierre de Courcol qui en fit hommage en 1595 et y construisit le château à son emplacement actuel. Sa petite-fille Roberte de Courcel apporta le château de Fleury-la-Forêt, en mariage, au chevalier Charles de Caumont, sieur du Bout-du-Bois et exempt des gardes du roi. Après l'incendie qui détruisit une partie du château de Fleury-la-Forêt, en 1643, Charles de Caumont fit effectuer les travaux de restauration, il fit ajouter dans le château, la chapelle de Notre-Dame, approuvée le 22/05/1658. En 1667, Louis de Caumont, chevalier, vendit cette terre de concert avec Madeleine de Caumont, sa mère, à Jean Blin, conseiller du roi. Le 21/03/1698, le chevalier Jacques Dauger, seigneur de Villiers, racheta le château à Marie-Madeleine de Caumont, veuve de Charles, décédé au château le 20/04/1676.  une grande campagne de rénovation fut entreprise dès 1700 et le comte Dauger demanda à larchitecte Fontaine dajouter 2 ailes au bastion initial. La famille Dauger conservera le château jusquen 1791, puis il fut cédé à monsieur de Combault dAuteuil, puis, à son fils le vicomte dAuteuil. En 1859, le château de Fleury-la-Forêt est racheté par Mr Sanguier, Négociant à Paris, puis en 1890, par Mr Peynaud. Le château de Fleury-la-Forêt sera occupé par l'Armée Allemande, durant la seconde guerre mondiale.","architecture":"FLEURY la FORET,  A  la fin de la guerre, le château de Fleury-la-Forêt n'a plus de résidents. Il a été racheté, en 1978, par la famille Caffin qui fit entreprendre des travaux de restauration. Les façades et toitures ont été classées aux M.H. en 1993. Les communs sont inscrits en 1991 et l'intérieur  en 1993,  est classé aux M.H. depuis le 15/03/1993, est entouré d'un Parc à la Française.  Le corps de logis central, de conception de plan carré sur soubassement à trois niveaux, flanqué sur les angles de pavillons carrés toits à l'impérial sur l'ensemble recouvert d'ardoises, l'édifice est prolongé à droite comme à gauche de pavillon à deux niveaux.","habitants":"Famille de  Pierre de Courcol\r\n        \"","divers":"Fleury     GPS : 49° 24' 50\" Nord, 1° 32' 46\" Est","gps":"49° 24' 50\" Nord, 1° 32' 46\" Est","images":["../image/image_27/27_Fleury_foret_1.jpg","../image/image_27/27_Fleury_foret_2.jpg","../image/image_27/27_Fleury_foret_3.jpg"]},"Consult_chateau_formulaire39f8":{"id":"Consult_chateau_formulaire39f8","dept":"27","canton":"Pacy-sur-Eure","commune":"Neuilly","nom":"Folletière_27","type":"Château","periode":"XVI-XVII","histoire":"La FOLLETIERE, le fief de la Folletière est mentionné dès 1454 comme propriété de Robert de Dreux avant d'être acquis par la famille de Loubert dans le courant du XVIe siècle. Un ancien manoir existait déjà sur le site, dont quelques traces demeurent visibles à proximité des dépendances en moellons et en pans de bois. La construction du château actuel, vers le début du XVIIe siècle, est attribuée à François de Loubert ou à son fils.  Propriété de Mme Louis-René des Forêts.","architecture":"La FOLLETIERE, construit sur les berges de l'Eure, le monument présente un corps de logis rectangulaire bordé à l'Est et au Sud par de larges douves reliées à la rivière. Il se compose d'un corps de Logis centrale d'une travée symétriquement de deux pavillons de deux travées, leurs façades sont communes, mais les hauts toits qui les coiffent en pavillon sont séparés. Le toit du corps central est surmonté d'un cône. L'élévation comprend, au dessus du rez-de-chaussée, deux étages dont le deuxième déborde à la naissance des combles et un étage de petites lucarnes au milieu des toits latéraux. L'encadrement en brique des baies alterne avec des tableaux qui se découpent au milieu de larges trumeaux de pierre et affirment verticalement chaque travée. Une double bordure horizontale souligne chaque étage aux allèges des fenêtres, l'effet obtenu est celui d'une sorte de quadrillage, où prédominent les verticales qui, par le jeu de couleurs de la brique et de la pierre, rythme la surface tout entière. Le château bénéficie d'un superbe domaine boisé et enherbé sur les berges de l'Eure. Les perspectives vers le Nord depuis la terrasse ou vers le parc à l'Est tirent parti de ce cadre valorisant.","habitants":"Famille de  François de Loubert\r\n        \r\n        \"","divers":"Folletière      GPS : 48° 56' 37\" Nord, 1° 25' 05\" Est","gps":"48° 56' 37\" Nord, 1° 25' 05\" Est","images":["../image/image_27/27_Folleti%c3%a8re_27_1.jpg","../image/image_27/27_Folleti%c3%a8re_27_2.jpg"]},"Consult_chateau_formulaire1111":{"id":"Consult_chateau_formulaire1111","dept":"27","canton":"Romilly-sur-Andelle","commune":"Bézu la Forêt","nom":"Fontaine_Houx","type":"Château","periode":"XIV-XVIII","histoire":"FONTAINE du Houx, la construction  date du XIVe, XVe et XVIIIe siècle. C'est l'ancien manoir des rois de France. Le roi de France, Charles le Chauve, (823-877) venait dans son domaine de \"Basiu\" identifié par Julien Hayet comme étant celui de Bézu-la-Forêt. En 847, il y reçut les envoyés qui lui annoncèrent la mort du Breton Maugilius. La même année, au lieu d'user de son pouvoir royal, il aurait écrit dans son château royal de Bézu, une longue requête contre Wenilon, Archevêque de Sens, qui l'avait excommunié et déposé, malgré ses serments de fidélité. Le prêtre parjure et rebelle s'était lié à Louis le Germanique contre le roi de France. C'est de Basiu, que le roi expédia, en 856, les capitulaires adressés aux Francs et aux Aquitains, par l'intermédiaire d'Hadabran et de Betton. Un diplôme pour la Cathédrale et l'Abbaye de Saint-Lucien de Beauvais est daté des 30ans de son règne : apud salas, id est palatium Basiu. Un autre diplôme destiné à l'Abbaye Saint-Ouen de Rouen fut donné par Charles, à la 30 ème année de son règne et  aussi daté de Basiu : Actum Basiu palatio.  Agnés Sorel y séjourna. Le château actuel de la Fontaine-du-Houx est devenu une habitation privée de monsieur Constantin.","architecture":"FONTAINE du HOUX est devenu un château royal et un lieu de séjour apprécié du roi Philippe le Bel. Le château actuel date du XVIe siècle, avec la partie occidentale, qui daterait du XVe siècle. Le corps central du château de la Fontaine-du-Houx a été remanié au XVIIIe siècle. Au début du XIVe siècle, la première verrerie à vitre et les feuilles planes « plats de verre » s'implanta à Bézu-la-Forêt. La plus ancienne fabrique de \"gros verre\" était la verrerie royale sous Philippe le Bel. Elle dépendait du manoir royal de la Fontaine-du-Houx, dirigée par maître Gobert ou Gaubert, maître-Verrier, en 1302.  Château manoir entouré de douves et flanqué de tourelles,  est inscrit aux M.H. depuis le 25/10/1971. Cette inscription comprend les façades et toitures de la chapelle et des communs.","habitants":"Famille de  monsieur Constantin\r\n        \"","divers":"Fontaine du Houx   GPS : 49° 24' 43\" Nord, 1° 37' 22\" Est","gps":"49° 24' 43\" Nord, 1° 37' 22\" Est","images":["../image/image_27/27_Fontaine_Houx_1.jpg","../image/image_27/27_Fontaine_Houx_2.jpg","../image/image_27/27_Fontaine_Houx_3.jpg","../image/image_27/27_Fontaine_Houx_4.jpg","../image/image_27/27_Fontaine_Houx_5.jpg"]},"Consult_chateau_formulaire6afa-2":{"id":"Consult_chateau_formulaire6afa-2","dept":"27","canton":"Brionne","commune":"Nassandres sur Risle","nom":"Fontaine_Soret","type":"Château","periode":"XVIII-XIX","histoire":"FONTAINE la SORET, le château de Fontaine-la-Soret, ou château de la Carogère, est un château des XVIIIe et XIXe siècles situé à Nassandres sur Risle, Le château fut bâti sous l'ordre de M. d'Augny de 1764 à 1769.","architecture":"FONTAINE la SORET, l'édifice est précédé d'une cour d'honneur bordée d'allées de tilleuls. Le château est constitué d'un corps de logis carré, cantonné de deux ailes en retour. Inspirées par le mouvement néoclassique, les façades présentent un ornement sobre, avec bossages et encadrements de baies. Des pilastres surmontés de frontons mettent en valeur le corps central. De fins panneaux de briques contrastent avec le décor en pierre de taille. Les toitures mansardées possèdent des terrassons à forte pente, qui rendent la couverture en ardoises très présente dans la composition architecturale. Le parc fut planté entre 1764 et 1772. Modifié au XIXe siècle, il a fait l'objet de nouvelles transformations entre 1963 et 1970 par le paysagiste anglais Russell Page. Ce dernier a réalisé le dessin des jardins clos, jardin de fleurs et jardin d'eau. Le domaine est située au creux du vallon formé par la Risle. Depuis le parc, des vues vers l'Ouest permettent d'apprécier le village et son église. Mais la principale perspective est orientée plein Est, vers un paysage de champs clôt par des coteaux boisés.","habitants":"Famille de monsieur Augny\r\n        \"","divers":"Fontaine la Soret     GPS : 49° 08' 56,18\" Nord, 0° 43' 11,75\" Est","gps":"49° 08' 56,18\" Nord, 0° 43' 11,75\" Est","images":["../image/image_27/27_Fontaine_Soret_1.jpg","../image/image_27/27_Fontaine_Soret_2.jpg"]},"Consult_chateau_formulaireea34":{"id":"Consult_chateau_formulaireea34","dept":"27","canton":"Beuzeville","commune":"Epreville-en-Lieuvin","nom":"Fortière","type":"Château","periode":"XVI","histoire":"La FORTIERE, le fief de la Fortière est attesté en 1463 comme la propriété de Jehan de Barville. A la fin du XVe siècle, le domaine était occupé par un manoir, probablement fortifié et entouré de douves. Construit à proximité du logis en tant que dépendance, la grange seigneuriale de la Fortière pourrait dater de la fin du XVIe siècle.","architecture":"La FORTIERE,  de plan rectangulaire, l'édifice repose sur un soubassement en moellons et silex. Les façades sont constituées d'une structure à pans de bois avec des poteaux ouvragés et des consoles moulurées, remarquables pour un édifice agricole. Des traces sur le colombage indiquent que le remplissage des murs était composé de torchis, avant d'avoir été remplacé par un hourdis de tuileaux, probablement au XVIIIe siècle. La charpente repose sur un système de portiques et de poteaux délimitant deux bas-côtés, de part et d'autre du volume central. Si le manoir a été très abîmé par un incendie au début du XXe siècle, la grange seigneuriale nous est parvenue intacte et constitue un rare exemple de dépendance agricole à pans de bois des XVe-XVIe siècles. Le domaine est cerné par un enclos arboré formant un écrin autour du monument. Des vues se dégagent néanmoins sur les plaines cultivés alentours. Le manoir dispose d'une perspective vers le Sud, dans l'axe de son allée d'accès. inscription par arrêté du 22 novembre 2006.","habitants":"seigneur local\r\n        \r\n        \"","divers":"La fortière gps 49° 12' 11\" nord, 0° 32' 14\" est","gps":"","images":["../image/image_27/27_Forti%c3%a8re_1.jpg"]},"Consult_chateau_formulaire629e":{"id":"Consult_chateau_formulaire629e","dept":"27","canton":"","commune":"St Mards de Fresne","nom":"Fromentière","type":"Manoir","periode":"XVIII","histoire":"FROMENTIERE, le manoir de la Fromentière a été inscrit en tant que monument historique le 12 mai 1976. Le manoir a été construit vers 1760 pour François-Adrien Symon de Longueville, chanoine  à la cathédrale de Lisieux et docteur à la Sorbonne.  A la Révolution, les Symon de Franval fuient à l'étranger et le manoir devient bien national puis  propriété agricole. Abandonné en 1890, l'édifice est dans un état de dégradation avancé lors de  son rachat en 1978 par Monsieur Seydoux, qui entrepris sa restauration complète Le manoir de la Fromentière a été inscrit en tant que monument historique le 12 mai 1976.","architecture":"FROMENTIERE, entièrement construit en briques, l'édifice\r\npossède un unique corps de logis rectangulaire à trois travées couvert d'une toiture en ardoises.  La toiture forme une accolade atypique au niveau de lavant-corps central. La mise en uvre  raffinée de la brique permet de former des bossages d'angles, la grande arcade de la travée centrale et des moulures. Malgré ses faibles dimensions, le manoir possède une certaine\r\nmonumentalité, renforcée par la sobriété de ses ornements, par sa position surélevée sur une   terrasse talutée, par ses menuiseries filantes sur plusieurs niveaux, et par l'utilisation d'un  matériau dominant (seuls les angles des corniches sont en pierre de taille et non en briques)","habitants":"François-Adrien Symon de Longueville\r\n        \r\n        \"","divers":"A St Mards de Fresne château de la Fromentière","gps":"","images":["../image/image_27/27_Fromenti%c3%a8re_1.jpg","../image/image_27/27_Fromenti%c3%a8re_2.jpg"]},"Consult_chateau_formulaire4fcf":{"id":"Consult_chateau_formulaire4fcf","dept":"27","canton":"Brionne","commune":"Thibouville","nom":"Fumechon","type":"Château","periode":"XVI-XVII","histoire":"FUMECHON,  construit au XVIe siècle fut détruit, subsiste de cette époque la chapelle sainte Marie Madeleine, élevée par Jacques Langlois, ancien échevin de l'hôtel de ville de Rouen, remaniée au XIXe siècle. Le château actuel de plan symétrique, qui possède un étage carré et étage de comble, a été bâti au XVIIIe siècle, les communs et des remaniements importants réalisés au XIXe siècle. A cette époque, le château de Fumechon appartenait à M. Parissot, père du sénateur Albert Parissot, qui hérita de Fumechon en 1874 et sera élu maire de Thibouville en 1884, conseiller général du canton de Beaumont-le-Roger en 1892 et sénateur de lEure à partir de 1895. En 1976, Georges Hollande, médecin ORL à Rouen, achète le château et en fait sa résidence secondaire. C'est au château que François Hollande passait ses vacances avec sa compagne de lépoque, Ségolène Royal. En 1984, la famille Hollande a vendu la demeure à ses propriétaires actuels.","architecture":"Chateau de RUFFLETS à Tibouville, la construction date du XVIIe siècle. Le maître d'oeuvre est inconnu. Le manoir possède 1 étage carré, un toit à longs pans recouvert d'ardoise, une croupe et un pignon couvert. Le manoir de Thibouville est une propriété privée, fermée au Public.  Le château des Rufflets serait laissé, aujourd'hui, à l'abandon,  date du XVIIe siècle.","habitants":"Fumechon ; M. Parissot\r\n        \"","divers":"Fumechon   GPS : 49° 08' 54\" Nord, 0° 47' 36\" Est                Rufflets    grav-3-4-5 GPS : 49° 08' 54\" Nord, 0° 47' 36\" Est","gps":"49° 08' 54\" Nord, 0° 47' 36\" Est                Rufflets","images":["../image/image_27/27_Fumechon_1.jpg","../image/image_27/27_Fumechon_2.jpg","../image/image_27/27_Fumechon_3.jpg","../image/image_27/27_Fumechon_4.jpg","../image/image_27/27_Fumechon_5.jpg"]},"Consult_chateau_formulaire791a":{"id":"Consult_chateau_formulaire791a","dept":"27","canton":"Les Andelys","commune":"Les Andelys","nom":"Gaillard_Tosny","type":"Forteresse","periode":"XII","histoire":"FORT-GAILLARD,  nombreux sont les vestiges des châteaux forts qui défendirent les Normands contre les Français, puis ceux-ci contre les Anglais, si de Brionne, Verneuil, Vernon, il ne reste qu'une tour majestueuse, en revanche, Conches, Gisors et surtout la forteresse de château-Gaillard témoignent de la perfection à laquelle était parvenue l'architecture militaire. Du Moyen-Age restent des châteaux à l'allure moins guerrière, tels le château d'Harcourt, la Tour de Thevray ou le manoir de Chauvincour. Après le rattachement à la France que les seigneurs purent, au lieu de maisons fortes, construire de belles demeures dans le goût de la Renaissance ou du classicisme, Beaumesnil qui passe pour l'un des plus beaux châteaux Louis XIII de France, Broglie dont la sévère ordonnance est toute imprégnée de la forte personnalité de ses occupants, Gaillon dont le style italianisant en fit au XVIe siècle une oeuvre d'avant garde, le château de \"Champ de Bataille\", une des demeures les plus fastueuses dans l'Eure, et entre les Jardins de Claude Monet à Giverny et le château Gaillard aux Andelys, Pressagny dans un parc boisé de 10 ha situé en bord de Seine, il se dresse avec son clocher, ses tourelles, ses mosaïques et sa cour intérieure. A visiter également les bourgs de Lyons-la-Forêt et Le Bec-Hellouin classés parmi les plus beaux villages de France.","architecture":"Fort GAILLARD est un ancien château fort construit à la fin du XIIe siècle, aujourd'hui en ruine, dont les vestiges se dressent sur la commune française des Andelys. Aujourd'hui, ses ruines surplombent la vallée de la Seine. Le château est largement visible dans la vallée ou s'est formé à cet endroit un important méandre de la Seine. Il est classé aux M.H. depuis 1862, est ouvert au Public et se visite. Aujourdhui,  partiellement détruit. Le haut donjon est ouvert tous les jours. Des jeux médiévaux sont organisés tout au long de la saison.  Longueur : 200 m. Largeur : 80 m. Altitude : environ 100 m (celle de la Seine se trouvant à 10 m), l'ensemble du programme de fortification (château avec les avant-postes),Poids : 4 700 tonnes de pierre.  Donjon : 8 m de diamètre intérieur, 18 m de hauteur.  Murailles : 34 mètres d'épaisseur, le château fait lobjet dun classement au titre des M.H. par la liste de 1862.                                                                                                                           TOSNY A deux K.M.au sud ouest le château, l'édifice est composé d'un corps central que surmonte un fronton, flanqué de deux ailes latérales. Entre rénovation et réhabilitation, le château du XVIIIe siècle s'élève sur trois niveaux hors combles isolés et aménageables. Ses façades blanches tranchant avec le toit dardoises gris bleu sont percées de hautes fenêtres à petits carreaux à double vitrage. Tout comme le toit alternant lucarne-pignon, lucarne-fronton, à toit bombé, elles ont été rénovées en respectant au mieux larchitecture dorigine. Le perron s'illumine de deux lanternes de part et dautre de lentrée,  propriété de M. G.Verdier.","habitants":"roi Richard Cur-de-Lion \r\n        \"","divers":"Tosny grav 1-2                                                                                Gaillard  grav 3-4-5-6   GPS : 49° 14' 17\" Nord, 1° 24' 10\" Est","gps":"49° 14' 17\" Nord, 1° 24' 10\" Est","images":["../image/image_27/27_Gaillard_Tosny_1.jpg","../image/image_27/27_Gaillard_Tosny_2.jpg","../image/image_27/27_Gaillard_Tosny_3.jpg","../image/image_27/27_Gaillard_Tosny_4.jpg","../image/image_27/27_Gaillard_Tosny_5.jpg","../image/image_27/27_Gaillard_Tosny_6.jpg","../image/image_27/27_Gaillard_Tosny_7.jpg","../image/image_27/27_Gaillard_Tosny_8.jpg"]},"Consult_chateau_formulaire0bd2":{"id":"Consult_chateau_formulaire0bd2","dept":"27","canton":"Gallion","commune":"Gaillon le Chatelet","nom":"Gallion","type":"Château","periode":"XVI-XVII","histoire":"GALLION, en 1202, lamitié entre deux hommes allait déclencher le processus qui fit la célébrité de Gaillon. Saint-Louis (Louis IX), Roi de France, possédait le manoir féodal, vestige de lancien château-fort, attribué à Cadoc (ce même Cadoc à qui nous devons les armes de Gaillon). Le bon Roi ne sintéressait guère à cette propriété et cest grand plaisir quil fit à son ami Eudes Rigaud, évêque de Rouen, en lui cédant tours et murailles médiévales contre une rondelette somme dargent et menues avantages. Les évêques se succédèrent sur le trône de Rouen, mais en 1453, lun deux Guillaume dEstouteville, entreprit la construction d'un château. En 1498, Georges dAmboise, légat du pape, ministre de Louis XII, visitait lhéritage. Cet homme, grand mécène des arts, féru dItalie, allait être la chance de Gaillon. Il entreprit, vers 1502, la réalisation dun palais, lune des premières merveilles de la Renaissance en France. Le château de Gaillon sera vendu comme bien national et connaîtra la pioche des démolisseurs. Alexandre Lenoir, conservateur du Musée des Petits Augustins, fera remonter différentes pièces de lédifice dans la cour des Beaux Arts. La merveille allait devenir par les soins de Napoléon 1er, un pénitencier signant ainsi sa déchéance. En 1901, fermeture du centre pénitencier, place à l'armée. En 1925, le château est vendu aux enchères par les soins de l'État. C'est à ce moment qu'il est acquis par un propriétaire privé. Puis la seconde guerre mondiale venue, le château de Gaillon servira à nouveau de prison sous l'occupation allemande. En 1949, le château est vendu aux enchères à différents propriétaires privés, le 13 mai 1970 acquisition du château par l'État, expropriation de la propriétaire du moment, et en 1977 le château de Gaillon renaît de ses ruines.","architecture":"GALLION, du XVIe siècle embellie et agrandie au XVIIe siècle, il ne reste guère  que des fragments, pavillons d'entrée, chapelle et quelques bâtiments d'époques diverses.   Le 17 mars 1975, l'acquisition est officialisée. Georges Duval, architecte en chef des monuments historiques, commence une étude pour la restauration de l'édifice. Les travaux commencent en 1977. Les éléments conservés à l'École des Beaux-Arts de Paris reviennent au château. En septembre 2009, naît l'Association pour la Renaissance du château de Gaillon (ARC). Dès sa fondation, avec à son côté, la municipalité de Gaillon, elle se donne pour objectif le rayonnement du château, en poussant à sa réouverture  au Public, objectif atteint en été 2011. Depuis, des thématiques annuelles soutiennent le flux des visites, renforcé d'expositions. Au titre des réalisations pérennes, une maquette du château reproduit l'édifice tel qu'on aurait pu le voir au XVIe siècle, le château de Gaillon-le-Chatelet est inscrit aux M.H. depuis 1996 et classé aux M.H. en 1862 et 1965.","habitants":"Georges Duval, \r\n        \"","divers":"Gaillon    GPS : 49° 09' 40\" Nord, 1° 19' 48\" Est","gps":"49° 09' 40\" Nord, 1° 19' 48\" Est","images":["../image/image_27/27_Gallion_1.jpg","../image/image_27/27_Gallion_2.jpg","../image/image_27/27_Gallion_3.jpg","../image/image_27/27_Gallion_4.jpg","../image/image_27/27_Gallion_5.jpg","../image/image_27/27_Gallion_6.jpg"]},"Consult_chateau_formulairec7bf":{"id":"Consult_chateau_formulairec7bf","dept":"27","canton":"Gisors","commune":"Gisors","nom":"Gisors","type":"Forteresse","periode":"X-XI-XII","histoire":"GISORS,  le site est fortifié au XIe siècle pour protéger les possessions normandes du roi dAngleterre face aux velléités du Roi de France. La forteresse sinscrit dans une campagne de fortifications de la vallée de lEpte, limite naturelle entre les deux royaumes. Dès 1097, sous le règne du deuxième fils de Guillaume le Conquérant, débute la construction dune importante motte de terre ceinte de fossés, sur laquelle reposait probablement une tour de bois entourée dune palissade. Au cours de la première moitié du XIIe siècle, les principaux éléments de fortifications en pierre remplacent ceux en bois, la tour de guet devient un donjon octogonal massif, la palissade, une enceinte en pierre nommée chemise qui contient chapelle et cuisine. Le roi dAngleterre, Henri Ier Beauclerc disparaît sans héritier mâle. Sa fille Mathilde écartée du trône, épouse le comte Geoffroy Plantagenêt, qui se retrouve ainsi Duc de Normandie. Ce dernier cède Gisors au Roi de France, Louis VII, en échange de son aide contre Etienne de Blois, Roi dAngleterre et oncle de Mathilde. Suite à la mort dEtienne de Blois en 1154, Henri II Plantagenêt, fils de Geoffroy, est propulsé à la tête du royaume dAngleterre, et Henri décide de reprendre Gisors, davantage par la ruse que par la force. En 1158, une entrevue a lieu à Gisors entre les deux souverains : en gage de réconciliation, le Roi de France donne en mariage au fils dHenri II, sa fille Marguerite (âgée de six mois), et lui cède en dot Gisors. En attendant le mariage, la garde du château est confiée à trois templiers: Robert de Piron, Tostes de Saint Omer et Richard de Hastings. Mais Henri II fait célébrer le mariage plus tôt quil été convenu, (les époux ayant neuf ans à eux deux, et se fait remettre le château de Gisors en 1161.","architecture":"GISORS  Sous Henri II Plantagenêt, une deuxième campagne de travaux est entamée. Une grande enceinte, longue de plus de 800 mètres et protégée par huit tours, enveloppe le donjon central. Ces dernières présentent une grande diversité et des innovations architecturales majeures : tour quadrangulaire à bec, tour en U, tour circulaire à plusieurs niveaux darchères. Conquise par Philippe Auguste en 1193, la forteresse redevient française. Au début du XIIIe siècle, le roi de France y fait de nombreuses et profondes transformations. Le château de Gisors devient à partir de cette date une importante résidence royale avec un grand nombre de communs et un logis dont il subsiste encore les caves. Lors de la guerre de Cent Ans, après un siège de trois semaines, le château et la ville sont pris par les Anglais, tout comme lensemble de la Normandie de 1419 à 1449. Repris par le Roi de France, le château fait lobjet de nombreux remaniements, les bâtiments royaux et les communs sont restaurés. Les travaux les plus importants concernent l'adaptation de la forteresse, face aux progrès de l'artillerie, avec la construction dune fausse braie : construction de remparts de terre, intégration d'un bastion en forme d'as de pique avec casemates et souterrain qui le relient aux restes des fortifications, arasement des anciens remparts et aménagement d'une galerie couverte aux pieds des remparts du XIIe, qui seconde les remparts de terre. Avec la fin des guerres de religion, en 1599, le château est déclassé des sites militaires français : il n'a plus alors d'intérêt stratégique. La majorité des communs est détruite. Au début du XIXe siècle, le château de Gisors devient un lieu de visites des premiers touristes et en 1862 il est classé M.H..\r\n\r\n.","habitants":"Famille d'Henri Ier Beauclerc \r\n        \"","divers":"Gisors       GPS : 49° 16' 51\" Nord, 1° 46' 28\" Est","gps":"49° 16' 51\" Nord, 1° 46' 28\" Est","images":["../image/image_27/27_Gisors_1.jpg","../image/image_27/27_Gisors_2.jpg","../image/image_27/27_Gisors_3.jpg","../image/image_27/27_Gisors_4.jpg","../image/image_27/27_Gisors_5.jpg","../image/image_27/27_Gisors_6.jpg","../image/image_27/27_Gisors_7.jpg","../image/image_27/27_Gisors_8.jpg"]},"Consult_chateau_formulaire607a":{"id":"Consult_chateau_formulaire607a","dept":"27","canton":"Verneuil d","commune":"Gournay le Guerrin","nom":"Gournay_Guerrin","type":"Château","periode":"XIX","histoire":"GOURNAY,  château dorigine médiévale réaménagé au XIXe siècle. Le village dépendait du château féodal de Gournay, habité au XIIIe siècle par les chevaliers de Guérin. Puis par les familles de Tournebeuf, Trousseauville, Mezières et de 1547 à 1752 par les Montmorency-Laval, dont les armes figurent sur les poutres de léglise.","architecture":"PETITEVILLE , reconstruit au XIXe siècle (1867) .\r\nGOURNAY , du XIXe siècle, a cinq K.M au nord -est,   de plan rectangulaire sur soubassement à deux corps de logis accolés dont un central sur une face à trois niveaux avec lucarnes sur combles accolés de deux pavillons carrés de même niveaux sur angles droit et gauche  toit à l'imperiale en ardoise. La partie opposée à quatre niveaux avec lucarnes sur combles, toit en croupe, accolés de deux tours rondes de même niveaux à droite et à gauche toit en poivrière couvert d'ardoise.                                                                                          le château des BOIS-FRANCS est un château bâti à les Barils. La construction du château des Bois-Francs date du XIXe siècle.","habitants":"Famille de Tournebeuf                                                                   Familles de  Montmorency-Laval\r\n        \"","divers":"Bois-Francs grav-4 Gournay  grav-1-2                                         GPS : 48° 42' 29\" Nord, 0° 46' 33\" Est                                   Petiteville grav 3 GPS : 48° 43' 11\" Nord, 0° 49' 55\" Est","gps":"48° 42' 29\" Nord, 0° 46' 33\" Est","images":["../image/image_27/27_Gournay_Guerrin_1.jpg","../image/image_27/27_Gournay_Guerrin_2.jpg","../image/image_27/27_Gournay_Guerrin_3.jpg","../image/image_27/27_Gournay_Guerrin_4.jpg"]},"Consult_chateau_formulaire6410":{"id":"Consult_chateau_formulaire6410","dept":"27","canton":"Romilly-sur-Andelle","commune":"Grainville","nom":"Grainville_27","type":"Château","periode":"XVII","histoire":"GRAINVILLE,  en 1252, il passe dans la riche famille d'Argouges par le mariage de Jeanne de Granville avec Raoul d'Argouges. De l'époque médiévale, il subsiste, sur ce site, l'ancienne église de Saint-Nicolas-près-Granville, datant du XIVe siècle, remaniée et désaffectée au XIXe siècle lors de la construction de la nouvelle église. Des peintures murales du XVe siècle représentant la Vierge et l'Enfant et un donateur menacé par l'aiguillon de la mort, qui se trouvent sur le mur nord de la nef, près de l'arc triomphal, sont classées monument historique depuis 1957 . Le château actuel est reconstruit à partir d'un logis plus ancien aux XVIIIe et XIXe siècles par les Picquelin. En novembre 1793, après le siège de Granville, dix-sept Vendéens sont massacrés et leurs corps jetés dans une sorte de caverne d'un petit bois dans l'enceinte du château avant d'être inhumés, pour certains, dans le cimetière de Saint-Nicolas. Le colombier, les façades, toitures, escalier intérieur avec sa rampe en bois du manoir de la Clémentière ainsi que celles de l'ancienne église sont inscrits monument historique depuis 1980.Le domaine est propriété de la famille de Paul de Gibon.","architecture":"GRAINVILLE est un château du XVe siècle situé sur la commune de Granville  Le manoir, l'ancienne église paroissiale Saint-Nicolas de Granville et le colombier font l'objet d'une inscription au titre des M.H. depuis le 28 avril 1980.Des peintures murales du XVe siècle représentant la Vierge et l'Enfant et un donateur menacé par l'aiguillon de la mort, qui se trouvent sur le mur nord de la nef, près de l'arc triomphal de la chapelle du château de Grainville font l'objet d'un classement au titre des Monuments historiques depuis le 30 septembre 1957. Le château, de plan symétrique, se compose d'un  étage carré et d'un étage de comble, élévation ordonnancée couverte d'ardoise.","habitants":"famille Gonnelieu\r\n        \"","divers":"Grainville  gps 49° 20' 52? nord, 1° 22' 04? est grav 1 Muttes grav-2","gps":"","images":["../image/image_27/27_Grainville_27_1.jpg","../image/image_27/27_Grainville_27_2.jpg"]},"Consult_chateau_formulaire6dbc":{"id":"Consult_chateau_formulaire6dbc","dept":"27","canton":"Breteuil","commune":"Grandchain","nom":"Grandchain","type":"Château","periode":"XVIII","histoire":"GRAINCHAIN, édifice mentionné depuis 1119. Le château est reconstruit peut être entre 1760 et 1785 pour Guillaume Liberge de Granchain sur l'emplacement de l'ancienne demeure familiale. C'est l'architecte bernayen Jacques Fresnel, qui est chargé des travaux. Celui-ci épouse en 1785 Augustine Mérimée, l'une des filles de François Mérimée, avocat, il est le père de Augustin Fresnel né à Broglie en 1788. Augustine Mérimée a eu un neveu célèbre, l'écrivain Prosper Mérimée. Les descendants de Liberge de Granchain, les Deshayes de Forval et les La Barre de Nanteuil demeurent propriétaires du château jusqu'en 1920. L'uvre de l'hospitalité du travail achète le domaine en 1966 pour y rester jusqu'en 2007. Le château est ensuite revendu et devient propriété privée.","architecture":"GRANCHAIN, fut construit, de 1783 à 1785, dans le style Louis XVI, d'après les plans de l'Amiral de Granchain, traça lors de ses voyages en mer, sur l'emplacement d'un ancien manoir, mentionné depuis 1119.. Quant à l'Amiral de Granchain, il rapporta d'Amérique du Nord, des graines et des semences de plusieurs essences d'arbres qu'il planta dans le parc et aux alentours du château de Liberge de Granchain., puis il passa dans la famille d'un industriel, Victor du Lac de Fugères (1870-1928), qui fit venir des exploitants hollandais pour cultiver ses propriétés.  L'uvre de l'hospitalité du travail achète le domaine en 1966 pour y rester jusqu'en 2007   reconnue d'utilité publique, ayant pour but daider moralement et matériellement les femmes qui, par suite de circonstances accidentelles ou habituelles, ne sont plus en mesure de gagner normalement leur vie. Sous la houlette des Surs de Notre-Dame du Calvaire de Gramat, dans les Causses, qui le baptisèrent du nom de leur fondateur, le bienheureux Pierre Bonhomme (1803-1861)66, l'Oht demeura jusqu'en 2007 au Château de Granchain, avant que ce dernier ne fût revendu à un particulier.","habitants":"Famille;Augustin Fresnel\r\n        \"","divers":"Graindchain    GPS : 49° 02' 28\" Nord, 0° 39' 34\" Est","gps":"49° 02' 28\" Nord, 0° 39' 34\" Est","images":["../image/image_27/27_Grandchain_1.jpg"]},"Consult_chateau_formulaire4484":{"id":"Consult_chateau_formulaire4484","dept":"27","canton":"Le Neubourg","commune":"Graveron-Sémerville","nom":"Graveron_27","type":"Château","periode":"XVII","histoire":"GRAVERON, le fief de Graveron est mentionné vers 1400 comme possession du chevalier Raoul de  Graveron. En 1599, le domaine est acquis par Etienne Bigot, un parlementaire rouennais dont la famille en conserva la propriété jusqu'à la fin du XVIIIe siècle.","architecture":"GRAVERON, le château est construit au XVIIe siècle. Le projet initial prévoyait un corps central flanqué de deux ailes mais les travaux sont interrompus en 1689:  seule l'aile nord du logis central est érigée, avec un pavillon d'angle en saillie sur la cour. Les façades présentent une maçonnerie en moellons avec un ornement recherché de briques et pierre calcaire (bandeaux, chaînes, tableaux). De superbes lucarnes et une haute toiture en ardoises couronnent l'édifice. Les fossés et le portail d'honneur sont contemporains des édifices du XVIIe siècle. Au XVIIIe siècle, un corps dhabitation secondaire et indépendant est accolé à l'angle sud-est du château. Au début du XIXe siècle, il est agrandi au nord et le colombier reste aménagé en habitation, le second ayant été détruit à la Révolution. En 1949, lextension nord, en partie ruinée, est reconstruite avec un parement de briques et de pierres, plus austère que le château d'origine. Le domaine actuel a conservé ses dépendances, son parc boisé et ses jardins ornés darbres décoratifs (cèdres, séquoia, etc.). Le château dispose d'un axe de vue Est-Ouest bordé d'alignements darbres qui lui assure des vues lointaines vers de vastes plaines cultivées. Le parc arboré forme un écran autour du château et de ses dépendances. Éléments protégés MH : le portail, le colombier et le château, à l'exclusion de l'extension au nord: inscription par arrêté du 22 janvier 1996.","habitants":"Famille d' Etienne Bigot\r\n        \r\n        \"","divers":"Graveron         GPS : 49° 05' 43\" Nord, 0° 58' 26\" Est","gps":"49° 05' 43\" Nord, 0° 58' 26\" Est","images":["../image/image_27/27_Graveron_27_1.jpg","../image/image_27/27_Graveron_27_2.jpg"]},"Consult_chateau_formulaire47ea":{"id":"Consult_chateau_formulaire47ea","dept":"27","canton":"Brionne","commune":"Harcourt","nom":"Harcourt","type":"château","periode":"XII-XIV","histoire":"HARCOURT, le domaine fut concédé en 912 à Rollon, lequel l'offrit à Bernard le Danois, fondateur de la famille d'Harcourt. Pendant près de neuf siècles les d'Harcourt seront présents, sauf durant l'occupation anglaise de 1418 à 1449, et  en 1449 Dunois, le bâtard d'Orléans s'en empare pour le comte du roi de France Jean VII d'Harcourt décède, ces deux filles se disputent la possession du domaine qui reviendra par alliance en 1554 à la famille de Lorraine-Elbeuf. Du fait de problèmes de succession ils s'en éloigneront à partir du milieu du XVIIIe siècle. Mme de Brancas, épouse d'Alphonse Henry de Lorraine, résida à Harcourt de 1694 à 1715 et fit exécuter des travaux qui rendent difficiles certaines interprétations architecturales. En piètre état, à l'époque de la vente des biens nationaux, le château n'intéressera personne. Louis Gervais Delamarre l'acquit en 1802. Pendant un quart de siècle, cet homme de loi, féru de sylviculture, se consacra au boisement des terres d'Harcourt dont il entendait faire un lieu d'expérimentation forestière, ainsi grâce aux introductions de Delamarre et de ses continuateurs, la propriété est riche de très nombreuses essences ligneuses.  En 1827, le château et le domaine sont légués à l'académie d'agriculture de France.","architecture":"HARCOURT, partie essentielle de ce qui demeure encore, a été construit en fin de XIVe siècle. Un pont de bois, jeté sur le fossé intérieur et prolongé par un escalier de pierre, permet l'accès au château à partir de la cour d'armes. Une passerelle l'a remplacé. On peut encore voir de nos jours l'enceinte avec neuf tours de cinq mètres de diamètre aux archères élargies à mi-hauteur pour le passage d'une arme à feu. La cour d'armes ou basse-cour qui s'ouvrait sur la campagne environnante par deux portes au sud et au nord, la chambre des comptes, il est raisonnable de penser qu'existaient une grange et une chapelle, la partie nord, carrée, de douze mètres sur dix est la plus ancienne. A l'intérieur, on remarquera, l'escalier du XVIIe siècle qui mène au premier étage et se poursuit par un escalier à rampe droite, massive avec des limons d'une seule pièce. Au rez-de-chaussée, le vestibule, les anciennes cuisines et les deux pièces occupées par Delamarre pendant ses séjours à Harcourt. Au premier étage, de style Louis XIV, les parquets à compartiment, les petites cheminées de la fin du XVIIe siècle et des lambris artisanaux. Au second étage, les pièces affectées aux officiers et aux dames d'atour. La cour d'honneur, côté Sud a été réalisée par madame de Brancas en fin de XVIIe siècle, le parterre actuel, vers l'Est devant le château fut construit en partie sur l'emplacement des anciens fossés comblés, il a dû être réalisé en jardin à la française aux XVIIe et XVIIIe siècles. Dans le puits, par 70 mètres de profondeur, se trouve une importante nappe d'eau.","habitants":"famille d'Harcourt.                                                                                      Famille de Louis Gervais Delamarre\r\n        \"","divers":"Harcourt   Grav-1-2-3-4   GPS : 49° 10' 26,4\" Nord, 0° 47' 11,04\" Est","gps":"49° 10' 26,4\" Nord, 0° 47' 11,04\" Est","images":["../image/image_27/27_Harcourt_1.jpg","../image/image_27/27_Harcourt_2.jpg","../image/image_27/27_Harcourt_3.jpg","../image/image_27/27_Harcourt_4.jpg"]},"Consult_chateau_formulaireddad":{"id":"Consult_chateau_formulaireddad","dept":"27","canton":"Pont-de-l","commune":"La Haye-Malherbe","nom":"Haye_Malherbe","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article; Angéronne et Hoquettes. ANGERONNE, était un  fief de Haubert, qui appartenait en 1645 à messire Dom Berryer, comte de La Ferrière, secrétaire au conseil, conseiller dÉtat. Messire Louis Berryer fit élever le château de 1650 à 1655, et il mourut en 1686, laissant Jean Baptiste et Nicolas René Berryer. Nicolas René Berryer eut le fief dArgeronne, il devint procureur général du grand Conseil. Son héritier, Nicolas-René II, garde des sceaux, mourut le 15 août 1762, laissant trois filles, dont laîné épousa le président Lamoignon. Jean Louis Berryer, comte de la Ferrière hérita de la seigneurie dArgeronne, mais il mangea toute sa fortune et le 13 septembre 1774, les fief-terre et seigneurie dArgeronne furent adjugés par la règle des créanciers devant les notaires du Châtelet de Paris, à messire Jean-Jacques-Pierre de Guenet, baron de Saint-Just, chevalier, conseiller en la grande chambre du parlement de Normandie, seigneur des Jonquerets, dAubricot et de la Pille, décédé en 1795. Louis Alexandre Clovis, marquis de Guenet, capitaine au régiment de la Reine Dragons, chevalier de saint Louis, servit dans larmée des princes et rentra en France en 1800. Il fut remis en possession de la terre dArgeronne quil conserva jusquà sa mort en 1848. Aujourdhui, cette terre appartient à M. le marquis Arthur de Guenet, fils du précédent, qui habite le château,  chambres d'hôtes.","architecture":"HOGUETTES, vers 1570, Jean Le Tellier, sieur des Hoguettes, vendit la sergenterie dHuedebouville à Guillaume Le Chartier ; il était remplacé en 1608 par Louis Le Tellier, sieur des Hoguettes. Jean Le Tellier, deuxième du nom, sieur des Hoguettes, conseiller du roi était maître des eaux et forêts de Pont-de-lArche en 1613. Le sieur Le Tellier, mort en 1659, devait être son fils. Jean Baudry demeurant à la Haye-Malherbe en prenait le titre. Le 1er décembre 1669, un jugement le déclara usurpateur de noblesse ; il y eut un appel par Catherine Le Tellier sa femme, séparée quant aux biens. Messire Louis Berryer, comte de la Ferrière, seigneur dArgeronne, acheta les Hoguettes en 1672. Nicolas-René et Jean-Louis Berryer furent ensuite seigneurs des Hoguettes. Le domaine  appartient aujourdhui à M. Fortier, de Louviers. Le manoir et les parties agricoles sont du XVIIe siècle, début de reconstruction du bâtiment comme château au XVIIe siècle.","habitants":"Angeronne;  famille de  Nicolas René Berryer                                  Hoguettes; Jean Le Tellier\r\n        \r\n        \"","divers":"Hoguerttes. Grav 4-5                                                              Angeronne, grav 1_2_3  GPS : 49° 13' 33\" Nord, 1° 04' 07\" Est","gps":"49° 13' 33\" Nord, 1° 04' 07\" Est","images":["../image/image_27/27_Haye_Malherbe_1.jpg","../image/image_27/27_Haye_Malherbe_2.jpg","../image/image_27/27_Haye_Malherbe_3.jpg","../image/image_27/27_Haye_Malherbe_4.jpg","../image/image_27/27_Haye_Malherbe_5.jpg"]},"Consult_chateau_formulairee0ea":{"id":"Consult_chateau_formulairee0ea","dept":"27","canton":"Grandvilliers","commune":"Hellenvilliers","nom":"Hellenvilliers","type":"Château","periode":"XV-XVI","histoire":"HELLENVILLIERS,  a été construit aux XVe, XVIe, XVIIIe et XIXe siècles, au XVIIIe  siècle aux comtes d'Erard   qui avaient succédé aux  Mainnemares et aux Clinchamp.                                               Pendant la seconde guerre mondiale, le château d'Hellenvilliers a été occupé par les Allemands. Aujourd'hui, il appartient à Mme de la Porte du Theil, la maire actuelle. Le château d'Hellenvilliers est inscrit aux M.H. du 22/12/1952. Il appartient aujourd'hui au descendant des Erard comte d'Erard d'Assay.","architecture":"HELLENVILLIERS,  dont l'origine remonte au IXe siècle. Un guerrier du nom de Herland y créa un site pour se protéger des invasions Viking. L'aile la plus ancienne de l'actuel château est d'époque Renaissance. Elle est appuyée à une chapelle, à l'arrière de laquelle se trouve une tour de garde et des communs de la même époque. Le corps central du début XVIIe, était une galerie qui reliait l'aile Renaissance à une ancienne poterne. Elle a été aménagée au XVIIIe en pièces de réception. L'aile droite, qui referme la cour en U, est début XVIIIe. d'époque  Henri IV en brique rose avec deux ailes encadrant la façade centrale  ces bâtiments furent complété et réaménagés au XVIIIe  siècle par les comtes d'Erard.","habitants":"comte d'Erard\r\n        \"","divers":"Hellenvilliers    GPS : 48° 48' 18,79\" Nord, 1° 6' 21,67\" Est","gps":"48° 48' 18,79\" Nord, 1° 6' 21,67\" Est","images":["../image/image_27/27_Hellenvilliers_1.jpg","../image/image_27/27_Hellenvilliers_2.jpg","../image/image_27/27_Hellenvilliers_3.jpg"]},"Consult_chateau_formulairea57b":{"id":"Consult_chateau_formulairea57b","dept":"27","canton":"Gisors","commune":"Heudicourt","nom":"Heudicourt","type":"Palais","periode":"XVI-XVIII","histoire":"HEUDICOURT, un manoir occupe le site dès le début du XVIe siècle. Le château actuel est bâti au XVIIe siècle par Michel II Sublet, maître des Batailles et Armées du Roi. Le plan originel prévoyait quatre corps de bâtiments cantonnés de pavillons d'angle et articulés autour d'une cour d'honneur rectangulaire. Au XVIIIe siècle, les parties sud, et nord étaient réalisées, formant un plan en U ouvert vers l'Ouest . En 1737 passa par alliance aux Belzunce de Castelmoron. A la Révolution, le château est converti en fabrique de salpêtre puis en prison, et en 1798, madame de Belzunce céda le château à quatre notables parisiens. Elle mourut à Gournay-en-Bray en 1803. Un an plus tard, les quatre propriétaires vendirent la propriété au comte Martin-Roch-Xavier Estève, qui était Trésorier du gouvernement membre de l'entourage de Napoléon, rachète le château en 1804 et entreprend des travaux de restauration et d'aménagement à partir de 1807.  La famille Estève est actuellement toujours propriétaire du domaine.","architecture":"HEUDICOURT, les bâtiments de service sont rasés pour agrandir la cour d'honneur, tandis que le corps de logis principal (partie nord) est conservé. Deux pavillons saillants (côté cour), une toiture longue et un avant-corps néo-classique en pierre sont ajoutés à l'édifice d'origine. Le domaine présente une magnifique perspective vers la plaine au sud, soulignée par une quadruple rangée de tilleuls et de platanes centenaires. Le château est bordé à l'ouest par son parc arboré, et à l'Est par le village d'Heudicourt qui forme un cadre rural et patrimonial valorisant: église du XVe, ferme-manoir du XVIIe, maisons en briques ou à colombage. L'ensemble est ordonné autour d'un axe distribuant des parterres, des bosquets, des allées en étoile, un théâtre de verdure, un rond de carrosse ou manège et des perspectives ouvrant sur la campagne grâce à la présence invisible de sauts-de-loup. Des terrasses aménagées aux angles des anciennes limites du parc existent encore, et l'une, dite terrasse de madame de Maintenon le long de la grande rue du village, couvre des salles voûtées encore existantes de nos jours.  Elle était reliée à son homologue situé symétriquement à l'axe nord-sud du château par une allée suspendue aujourd'hui disparue. Influencés par la nouvelle mode de parcs dits à l'anglaise. Éléments protégés MH : le château, y compris la cour d'honneur, les douves, les jardins et l'allée bordée de tilleuls et de platanes: classement par arrêté du 17 octobre 1966.","habitants":"Madame de Belzunce et de Maintenon\r\n        \r\n        \"","divers":"Heudicourt      GPS : 49° 20' 10\" Nord, 1° 39' 37\" Est","gps":"49° 20' 10\" Nord, 1° 39' 37\" Est","images":["../image/image_27/27_Heudicourt_1.jpg","../image/image_27/27_Heudicourt_2.jpg","../image/image_27/27_Heudicourt_3.jpg","../image/image_27/27_Heudicourt_4.jpg"]},"Consult_chateau_formulaireb080":{"id":"Consult_chateau_formulaireb080","dept":"27","canton":"Les Andelys","commune":"Heuqueville","nom":"Heuqueville","type":"Château","periode":"XVII","histoire":"HEUQUEVILLE, est un ancien établissement romain, qui à partir de la conquête normande a fait partie du grand domaine des seigneurs de Conches (Vexin). La terre d'Heuqueville, une des plus anciennes baronnies de Normandie, avait droit de haute, moyenne et basse justice. La seigneurie d'Heuqueville appartenait au XIVe siècle, à la famille de Hangest, puis passa par mariage en 1407, à la famille de Roncherolles jusqu'en 1610, date à partir de laquelle le fief passa dans plusieurs familles.","architecture":"HEUQUEVILLE,  c'est l'une d'elles qui fit élever le château actuel et les pavillons vers le milieu du XVIIe siècle. Les pavillons, reliés au château par un mur ou grille, fermaient la cour d'honneur du côté parc, composée au XVIIIe siècle de parterres à la française. Le château a été acquis en 1952 par monsieur et madame Auguste Budry, parents de l'actuel propriétaire, ils ont restauré sur 180 m² une des ailes du château pour y aménager avec goût un gîte chaleureux et confortable pour un séjour en toute quiétude,  gîte de charme 3 Épis.","habitants":"famille de Roncherolles\r\n        \"","divers":"Heuqueville gps 49° 17' 05? nord, 1° 20' 19? est","gps":"","images":["../image/image_27/27_Heuqueville_1.jpg"]},"Consult_chateau_formulaire7081":{"id":"Consult_chateau_formulaire7081","dept":"27","canton":"Brionne","commune":"Beaumont-le-Roger","nom":"Hom","type":"Manoir","periode":"XVI-XVII","histoire":"HOM; le seigneur local Roger de Beaumont a donné son nom au château au XIe siècle. Le manoir du Hom date du XVIe au XVIIe siècle. C'est l'ancienne demeure de Jacques Charles Dupont de l'Eure. En 1420, le Hom appartenait à Isabelle de Pommereuil. La résistance dont elle fit preuve face à linvasion anglaise lui valut d'en être dépossédée après la victoire de ces derniers. La construction du manoir actuel est datée de la fin du XVIe - début du XVIIe siècle et serait attribuée à la famille d'Avoise. L'édifice a remplacé une très ancienne demeure construite au XIe siècle, à la même époque que le château féodal. Le manoir du Hom fut par la suite le bien de nombreux propriétaires successifs parmi lesquels figure Dupont de lEure. Au XIXe siècle, la duchesse de Magenta en fit l'acquisition. Le manoir du Hom demeure toujours en possession de ses descendants.","architecture":"HOM, la cour du manoir du Hom et douves qui l'entourent, ses façades et toitures du pavillon nord à l'exception de l'appentis en façade Sud, les façades et toitures du pavillon Ouest et du bâtiment contigü ainsi que de l'ancienne chapelle, les façades et toitures du bâtiment des communs sont protégés. Le manoir du Hom est inscrit aux M.H. 1989. Il existe aussi sur la commune à découvrir, le manoir du Hom, le premier du XVIe siècle au lieu-dit les Vieilles, le manoir du XVIIe siècle au lieu-dit Val-Boncur et le manoir du Bourg-Dessus du XVIIIe siècle au lieu-dit le Bourg-Dessus.","habitants":"Famille de la  duchesse de Magenta\r\n        \"","divers":"Hom      GPS : 49° 04' 03\" Nord, 0° 46' 58\" Est","gps":"49° 04' 03\" Nord, 0° 46' 58\" Est","images":["../image/image_27/27_Hom_1.jpg","../image/image_27/27_Hom_2.jpg"]},"Consult_chateau_formulairea4e5":{"id":"Consult_chateau_formulairea4e5","dept":"27","canton":"Le Neubourg","commune":"Houetteville","nom":"Houetteville","type":"Château","periode":"XIV-XVIII","histoire":"trois châteaux dans cet article; Houetteville , Coeur des Bois et la Vacherie.                                                                                                                      HOUETTEVILLE  Dominant fièrement les méandres de l'Iton, le château de Houetteville, construit au XIVe siècle, de style renaissance, a été restauré et entièrement transformé en 1935 dans un style néo-médiéval. Le château de Houetteville,  privé visible depuis la route, est un ancien château renaissance transformé en château néo-médiéval par Henri Jacquelin vers les années 1930,  il transforma encore à Houetteville une simple maison néo-classique en château médiéval, avec une fantaisie étonnante. Dans un pays économiquement paralysé, Houetteville fut peut-être le dernier château néo-gothique français. Extravagant édifice, qui préfère ignorer son époque pour continuer artificiellement un mode de vie disparu depuis longtemps.                                                                                                     COEUR des BOIS  pas d'information  historique.","architecture":"La VACHERIE, voisin  à Houetteville le château occupait déjà le site dès le XVIIIe siècle mais fut incendié à la Révolution. Le château a été reconstruit vers 1815 par l'architecte Fillette, selon le style néo-classique. L'édifice présente un corps de logis compact, orné d'un portique monumental à colonnes ioniques sur sa façade Est, et d'un avant-corps semi-circulaire décoré de pilastres sur sa façade ouest. Évoquant les villas palladiennes, le château en pierre de taille se caractérise par sa monumentalité (soubassement, étage noble, attique), renforcée par l'austérité des quelques éléments de décor (frontons et corniches). La toiture en ardoises, à basse-pente et sans ouvertures, reste discrète afin de focaliser le regard sur les façades. Les communs sont les seuls bâtiments ayant survécu à la Révolution. Le portail du domaine se distingue par ses colonnes ornées de faisceaux et surmontées de francisques. Le château possède une grande perspective ouvrant à l'Est sur un paysage de plaines, et à l'Ouest sur le parc arboré de la propriété. Vers l'Est, un bois a été percé pour prolonger la vue., Éléments protégés MH  en totalité : inscription par arrêté du 7 octobre 1931.","habitants":"Seigneurs locaux\r\n        \"","divers":"Houetteville grav 1 -2-3     GPS : 49° 07' 35,54\" Nord, 1° 06' 26,64\" Est                                                                                     Cur des bois grav-4 Vacherie. Grav-5                              Vacherie.GPS : 49° 2' 17,88\" Nord, 0° 49' 47,64\" Est","gps":"49° 07' 35,54\" Nord, 1° 06' 26,64\" Est","images":["../image/image_27/27_Houetteville_1.jpg","../image/image_27/27_Houetteville_2.jpg","../image/image_27/27_Houetteville_3.jpg","../image/image_27/27_Houetteville_4.jpg","../image/image_27/27_Houetteville_5.jpg"]},"Consult_chateau_formulairec88b":{"id":"Consult_chateau_formulairec88b","dept":"27","canton":"Pacy-sur-Eure","commune":"Houlbec-Cocherel","nom":"Houlbec_Cocherel","type":"Château","periode":"XVIII","histoire":"HOULBEC-COCHEREL,  au début du XXe siècle, la propriétaire Mme de Rodaz, qui recevait dans son château des artistes et intellectuels en vue, fait agrandir le logis par l'architecte parisien Boileau.","architecture":"HOULBEC-COCHEREL, construit dans la seconde moitié du XVIIIe siècle, probablement à l'emplacement d'une ferme, visible sur les plans du milieu du XVIIIe siècle, sans toutefois en réutiliser les bâtiments. à l'édifice d'origine, formé d'un corps homogène à 5 travées, il adjoint un pavillon flanqué d'une tourelle carrée. Le château d'Houlbec est intéressant pour sa situation, dominant le vallon du Bas-Houlbec, comme le manoir du Prey (devenu château au XVIIIe siècle) qu'il jouxte. Le logis est situé sur une terrasse, elle-même en surplomb par rapport à la partie Sud du parc qui descend jusqu'au ru. Le domaine est également intéressant d'un point de vue typologique : bien que de taille modeste, il reproduit le schéma des grands châteaux voisins, tels celui de Bizy à Vernon : importance du parc par rapport au logis, nombre de dépendances, présence d'un petit bassin pédiluve dans la cour d'honneur. Logis en calcaire et enduit couvert en ardoise ; communs en calcaire et pan de bois couverts en tuile plate ; jardin en pente avec terrasses et arbres taillés en topiaires.","habitants":"Mme de Rodaz\r\n        \"","divers":"Houlbec-Cocherel gros-Theil                                                            gps  49° 15' 22\" nord, 0° 49' 55\" est","gps":"","images":["../image/image_27/27_Houlbec_Cocherel_1.jpg","../image/image_27/27_Houlbec_Cocherel_2.jpg","../image/image_27/27_Houlbec_Cocherel_3.jpg","../image/image_27/27_Houlbec_Cocherel_4.jpg","../image/image_27/27_Houlbec_Cocherel_5.jpg"]},"Consult_chateau_formulairef497":{"id":"Consult_chateau_formulairef497","dept":"27","canton":"Brionne","commune":"Houlbec près-le-Gros-Theil","nom":"Houlbec_Hermos","type":"Château","periode":"Xv-XVI","histoire":"HOULBEC, Il a appartenu depuis la fin du XVIe siècle à la famille de Postis qui le fait moderniser en 1786 et lui donne son aspect définitif. Le château est demeuré aux mains de cette famille jusqu'au début du XXe siècle.                                                                                 Plus à l'ouest à cinq K.M. à Saint Eloi-de-Fourques le château d'HERMOS, c'est un manoir qui date du XVe siècle. Son édification a été commandée, par Robert de Thumery, en 1535, sous François 1er et a été achevée, en 1550, sous Henri II, par Claude de Lorraine 1er Duc de Guise. Le manoir servira, à maintes reprises, de pavillon de chasse à Henri IV. En 1679 une chapelle dédiée à St Pierre et St Paul est construite à létage. En 1893, les Windsor, industriels anglais, font dHermos leur domaine familial, dans ce manoir blotti au milieu dun parc de 12 Ha planté de nombreuses essences, vous apprécierez la vue sur lesplanade et le plan deau. Dans ce lieu rempli de sérénité, vous pourrez profiter pleinement du calme de la Normandie. Il existe un autre château à découvrir sur la commune : le château de Rose-Yves de  Béatrice et Patrice Noel-Windsor.","architecture":"HOULBEC, à  l'origine quadrilatère cantonné de tours rondes, sa construction remonte au moyen-âge. Il a connu plusieurs attaques, il fut notamment occupé par les anglais en 1418 et par les ligueurs en 1588 Il a subit un incendie vers 1910 qui l'a partiellement ravagé, puis a été laissé à l'abandon jusqu'en 2007-2008, tant est si bien qu'il ne reste plus aujourd'hui que deux caves voûtées du moyen âge qui soutient le corps de logis, et deux tours du XVe siècle, dont une à mâchicoulis, la façade arrière s'est totalement effondrée à cause de la végétation qui s'est développée à l'intérieure du bâtiment (façade en appareillage de calcaire et silex en bandeaux). La façade avant (briques et pierre) laisse transparaître deux époques de construction : Renaissance sur la partie gauche, et Louis XVI sur la partie droite et le centre en1786. Le soubassement d'une troisième tour, au centre de la façade (accessible depuis la cave), supporte les escaliers d'accès à l'entrée principale. L'édifice a échappé de peu aux pelleteuses des promoteurs et a été racheté in extremis par un couple qui tente aujourd'hui de le restaurer de leurs propres mains.","habitants":"Famille Houlbec                                                                          hermos Famille de Claude de Lorraine\r\n        \"","divers":"Houlbec-Hermos                                                                                                 GPS : 49° 13' 57\" Nord, 0° 47' 49\" Est","gps":"49° 13' 57\" Nord, 0° 47' 49\" Est","images":["../image/image_27/27_Houlbec_Hermos_1.jpg","../image/image_27/27_Houlbec_Hermos_2.jpg","../image/image_27/27_Houlbec_Hermos_3.jpg"]},"Consult_chateau_formulaire806d":{"id":"Consult_chateau_formulaire806d","dept":"27","canton":"Pont-de-l","commune":"Igoville","nom":"Igoville","type":"Château","periode":"XVIII","histoire":"Deux châteaux dans cet article; Igoville dit de Sahottes pas d'information  Historique, et Limaie.                                                                                                                              IGOVILLE, cest du XVIIIe siècle que proviennent les plus lointains documents concernant ce que lon appelle le château dIgoville, édifice qui nenglobait quune petite partie de lensemble des possessions dudit fief.  Ensuite on retrouve un propriétaire nommé Louis-Jacques des Marets, seigneur de Corneville, Tennemare, Saint-Aubin, La Barre. Marié à Marie-Madeleine Duval de Morgny, il eut pour héritière, Marie-Louise des Marets, sa fille. Elle eut pour dot le château lors de son mariage en 1777, avec Alexandre de Moncel, marquis de Torcy, qui mourut en 1781. En 1790, Marie-Louise épousa en secondes noces Jean-Pierre Fermin, comte de Vieux.  Igoville hôtel de ville.","architecture":"IGOVILLE, château de plan symétrique, avec un escalier dhonneur, orné dune rampe en fer forgé de style Louis XV. Le manoir était accompagné dune chapelle carrée, dun colombier, de bâtiments annexes et un jardin. Cest du XVIIIe siècle que proviennent les plus lointains documents concernant ce que lon appelle le château dIgoville, édifice qui nenglobait quune petite partie de lensemble des possessions dudit fief.                                                                                                                           LIMAIE, le fort de Limaie était un château qui fut bâti sous le commandement du roi de France Philippe II, dit Philippe Auguste. Situé sur la paroisse d'Igoville, il défendait l'accès rive droite du pont de Pont de l'Arche. Ce fort remplaça, au XIIIe siècle donc, les restes de premières fortifications qui ont été érigées du temps de Charles le Chauve afin de contrecarrer les remontées des Normands depuis l'embouchure de la Seine jusqu'à Paris. Limaie fut, le plus souvent, du nombre des ligueurs, autres nobles en lutte contre le pouvoir Royal, mais aussi la ville de Pont-de-l'Arche, fidèle au monarque. Le château fut désaffecté et servit de carrière de pierres dans les années 1780. Les fondations de Limaie ont servi d'assise partielle à la culée de la rive droite de l'actuel pont de Pont-de-l'Arche, inauguré par Pierre Mendès France en 1955.","habitants":"Louis-Jacques des Marets\r\n        \r\n        \"","divers":"Igoville  grav 4                                                                               Limaie   grav-3                                                                                         Sahottes grav 1-2                                                                                GPS : 49° 18' 31\" Nord, 1° 09' 29\" Est","gps":"49° 18' 31\" Nord, 1° 09' 29\" Est","images":["../image/image_27/27_Igoville_1.jpg","../image/image_27/27_Igoville_2.jpg","../image/image_27/27_Igoville_3.jpg","../image/image_27/27_Igoville_4.jpg"]},"Consult_chateau_formulairee76d":{"id":"Consult_chateau_formulairee76d","dept":"27","canton":"Verneuil d","commune":"Courteilles","nom":"Jarrier","type":"Château","periode":"XVIII-XIX","histoire":"JARRIER; le château a été construit entre 1880 et 1884 par l'architecte Alfred Mennié pour Georges Salet, maître d'ouvrage et ponctuellement maître duvre, avec le concours d'Alfred Mennié. La demeure s'apparente au mouvement néo-gothique en vogue à la fin du XIXe siècle et serait inspirée par le petit château de Saint-Servan.","architecture":"JARRIER, la décoration intérieure est marquée par l'éclectisme en mêlant plusieurs périodes de l'architecture (gothique, classique, art nouveau, etc.). Les aménagements de certaines pièces (cheminées, lambris, parquets) sont constitués d'éléments originaux des époques antérieures, remis en uvre avec des compléments du XIXe siècle. Le château se distingue aussi par les importants travaux de terrassement entrepris afin de valoriser sa vue sur la vallée de l'Avre. Les terres remblayées du parc sont soutenues par un mur incliné et des contreforts qui n'obstruent pas la perspective. Ce souci du paysage et de la mise en scène a conduit Georges Salet à obtenir par arrêté municipal le détournement de la route descendant vers la vallée, à proximité du domaine. Le château est accompagné de dépendances construites en pans de bois selon une architecture normande vernaculaire. Le parc arboré forme un écrin de verdure autour du château. Le monument dispose d'un superbe cône de vue vers la vallée de l'Avre et le château de Montuel au Sud. Éléments protégés MH : le château avec sa terrasse, les façades et les toitures des bâtiments de communs, les façades et les toitures de la maison du gardien, le colombier, les éléments suivants de la clôture: les piliers, les portes et les grilles, le mur de clôture en terrasse et le saut-de-loup : inscription par arrêté du 25 novembre 1996.","habitants":"d'Alfred Mennié\r\n        \"","divers":"Jarrier                                                                                                        GPS : 48° 44' 06\" Nord, 1° 00' 49\" Est","gps":"48° 44' 06\" Nord, 1° 00' 49\" Est","images":["../image/image_27/27_Jarrier_1.jpg","../image/image_27/27_Jarrier_2.jpg","../image/image_27/27_Jarrier_3.jpg"]},"Consult_chateau_formulaire527a":{"id":"Consult_chateau_formulaire527a","dept":"27","canton":"Beuzeville","commune":"Morainville-Jouveaux,","nom":"Jouveaux","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article Mortiers  et Jouveaux        MORTIERS, en 1405, Jean de Morainville vendit les Mortiers à son voisin Richard Gosset, seigneur de Lieurey. Marie-Anne Gosset, petite fille du propriétaire, épousa Charles aux Epaules, seigneur de Sainte-Marie du Mont qui se distingua sous Louis XII en Italie. Convertis au protestantisme, leurs successeurs comptèrent parmi les chefs huguenots du Cotentin, et le demeurèrent jusqu'à l'abjuration spectaculaire de Robert aux Epaules, en 1600. Judith la troisième fille de ce Robert, hérita des seigneuries des Mortiers, de Lieurey et de la Tillaye en 1607. Par mariage, elle apporta le château à Jacques du Fay, seigneur de Bourg-Achard. En 1660, Robert du Fay vendit le domaine des Mortiers à Jacques Pecqueult, seigneur de Blangy. Jacques fut le père de Pierre Pecqueult, qui rendit aveu en 1663 pour le quart de fief du Petit-Blangy et dut faire entreprendre la construction du château actuel.  Par acte de 1690, il fit don de son château  à son petit-neveu, Pierre Le Roy, sieur de la Mancellerie. Né du mariage de Pierre Le Roy avec Marie Madeleine Gruel, Jacques Le Roy, sieur des Mortiers et mousquetaire du roi, meurt eu 1769 sans postérité. Le domaine échoit à son frère Louis mousquetaire lui aussi, puis en 1774 à son neveu Pierre-Alexandre, officier de dragons, qui le vend trois ans plus tard à son voisin, Jean-François Alexandre de Varin, sieur des Hautes Terres. Vendu en 1847 à George Shupman, le château des Mortiers, dit de la Mancellerie, est cédé en 1871 à Pierre Hébert, et à nouveau en 1888 à Emile Lepelletier,  maire de Morainville, ce dernier lègue le domaine à l'hospice de Pont-Audemer, en 1929.","architecture":"MORTIERS, utilisé un moment par l'occupant, négligé, sinon pratiquement abandonné, le château est en partie ruiné lors de sa mise en vente, en 1985. Les derniers propriétaires, Carole et Pierre Chassagnard, entreprennent d'importants travaux qui leur permettent, dès 1992, de se fixer définitivement en Normandie. L'incendie du 17 Janvier 1999, gravissime, n'a pas entamé leur détermination à redonner au château des Mortiers toute sa splendeur passée.                                                                                                                 JOUVEAUX, fief de Jouveaux est mentionné à partir de 1184. Le logis est reconstruit dans la première moitié du XVIIe siècle. La façade antérieure est remaniée au XVIIIe siècle. La grange date du XVIIe siècle et le poulailler du XIXe siècle. Le colombier est détruit après 1826, figuré sur le cadastre napoléonien.\r\nTypologie: pan de bois à grille ; entretoise en moise ; décor de brique émaillée ; logis en calcaire, en brique ; parties agricoles en pan de bois, en pisé.","habitants":"Pierre Le Roy \r\n        \"","divers":"Mortiers  grav-1-2                                                         JouveauxMoranville grav-3        \r\ngps 49° 13' 21\" nord, 0° 26' 47\" est","gps":"","images":["../image/image_27/27_Jouveaux_1.jpg","../image/image_27/27_Jouveaux_2.jpg","../image/image_27/27_Jouveaux_3.jpg"]},"Consult_chateau_formulaire819e":{"id":"Consult_chateau_formulaire819e","dept":"27","canton":"Bourg-Achard","commune":"Le Landin","nom":"Landin","type":"Château","periode":"XVIII","histoire":"LANDIN; a été construit vers 1760 pour Nicolas Thirel de Boschamel, abbé de Boismont et membre de l'Académie Française. Entre 1850 et 1860, le marquis de Chaumont-Guitry, chambellan de Napoléon III. Propriétaire du domaine aux XVIIe et XVIIIe siècles. Construit au sommet d'un coteau boisé, le château domine la boucle de Jumièges à l'Est, lui assurant un superbe panorama sur le fleuve et la plaine de Travers-Seine. Éléments protégés MH : le château, les communs et les dépendances, le parc avec la grille d'honneur, la clôture, la motte et les vestiges archéologiques connus ou à découvrir, en totalité.  Chambres d'hôtes par Patrice Faivreau. Le château du Landin est Logo monument historique Inscrit MH 2002. L'abbé de Boismont a fait planter un parc et bâtir un château qui constitue l'origine du château actuel. Son apparence contemporaine remonte au XVIIIe siècle. En dernier lieu, c'est au conseiller général de Routot Odon de Chaumont-Quitry que sont dus l'avant-corps arrondi couvert d'un dôme et l'ensemble des décors intérieurs. Il a fait remanier le parc et construire la plupart des dépendances.","architecture":"LANDIN, une forteresse, dont il subsiste les vestiges d'une puissante motte féodale, située à proximité du château actuel, rappellent l'importance de la forteresse d'origine où Jean sans Terre aurait séjourné, Celle-ci occupait le site stratégique du Landin dès le XIIe siècle et permettait le contrôle de la Seine en aval de Rouen.  Inspiré par le style néo-classique, l'édifice présente un corps principal sobre avec des façades en briques. Entre 1850 et 1860, le marquis de Chaumont-Guitry fait ajouter deux ailes latérales et un avant-corps circulaire surmonté d'une coupole. Les intérieurs sont également remaniés. Le domaine possède un parc magnifiquement arboré, planté au XVIIIe siècle et remanié au XIXe siècle avec la construction de dépendances. Dans l'ancienne ferme du domaine subsistent les vestiges archéologiques d'une motte féodale, d'un manoir et d'une chapelle des abbés de Jumièges, propriétaires du domaine aux XVIIe et XVIIIe siècles.","habitants":"marquis de Chaumont-Guitry,\r\n        \"","divers":"Landin                                                                                                 GPS : 49° 24' 25,2 Nord, 0° 48' 12,28\" Est","gps":"49° 24' 25,2 Nord, 0° 48' 12,28\" Est","images":["../image/image_27/27_Landin_1.jpg","../image/image_27/27_Landin_2.jpg","../image/image_27/27_Landin_3.jpg"]},"Consult_chateau_formulaire3313":{"id":"Consult_chateau_formulaire3313","dept":"27","canton":"Pacy-sur-Eure","commune":"La Chapelle-Réanville","nom":"Launay_27","type":"Château","periode":"XVI","histoire":"Le LAUNAY, au début du XVIe siècle, le fief de Launay appartient à la famille d'Estimauville ; à la fin du XVIe siècle, il passe à la famille de Grimouville. Au XVIIe siècle, le domaine échoit par alliance à la famille Langlois; en 1790, leur descendant, Langlois du Roule prend la charge de maire de La Chapelle-Genevray. Au logis du XVIIIe siècle, de style néo-classique, sont ajoutées, au début du XIXe siècle, deux ailes en saillie par rapport au corps central. Le colombier, visible sur le plan de 1758, a disparu sur le cadastre de 1825. Vers 1920, la propriété est restaurée ; des travaux sont effectués par l'architecte Charles-Henri Besnard (de Quelen). Le parc comprenait au XVIIIe siècle un parterre devant le logis, remplacé aujourd'hui par une pelouse. Le domaine est surtout intéressant pour son implantation en terrasse, dominant le ruisseau Saint-Ouen.","architecture":"Le LAUNAY, logis en calcaire enduit ; élévation ordonnancée ; travée centrale délimitée par des pilastres, marquée par une baie cintrée au rez-de-chaussée, une fenêtre surmontée d'une corniche saillante, et couronnée d'un fronton avec oculus ; étage du corps central décoré d'une frise en bas-relief ; deux pavillons de plan carré au Nord du logis couverts d'un toit en pavillon ; communs en calcaire et silex avec chaînes de brique ; logis et pavillons couverts en ardoise ; communs couverts en tuile plate ; fleurs et topiaires; lucarne à croupe","habitants":"famille d'Estimauville\r\n        \"","divers":"Launay la Chapelle   Grav-1-2-3   GPS : 49° 06' 29\" Nord, 1° 26' 31\" Est","gps":"49° 06' 29\" Nord, 1° 26' 31\" Est","images":["../image/image_27/27_Launay_27_1.jpg","../image/image_27/27_Launay_27_2.jpg","../image/image_27/27_Launay_27_3.jpg"]},"Consult_chateau_formulaire921a":{"id":"Consult_chateau_formulaire921a","dept":"27","canton":"Beuzeville","commune":"St-Georges du Vievre","nom":"Launay_St_Georges","type":"Château","periode":"XVI-XVIII-XIX","histoire":"Deux châteaux dans cet article; Launay et Vieuville à Freneuse.                                                                                      LAUNAY, au XVIIIe siècle, l'ancien manoir de Launay du XVIe siècle, qui appartenait aux Le Sens de Launay et de Folleville,  construits aux alentours de 1740  et habité par plusieurs grandes familles comme les Bourguignons jusquen 1808, à la fin du XVIIIe siècle Launay passe aux Naguet de St-Vulfran les Royannais qui ont perdu un fils à la guerre au XXe siècle ou encore par les Laurilleux. Mais les six filles du propriétaire ont à sa mort, décidé de le revendre à un marchand de biens, qui à son tour, la cédé à Philippe Bacot.                                                                    VIEUVILLE, le château de Sainte-Honorine ou de Vieuville, construit au milieu du XVIIIe siècle,  est actuellement le siège dune société après avoir été la propriété des Naguet de Saint-Vulfran, des Arnois de Captot et plus lointainement, des Le Cerf de la Vieuville qui le firent édifier actuellement très endommagé il y a 50 ou 60 ans il a subi dimportantes restaurations qui lont sauvé dune disparition complète et lors des travaux dans le parc on a découvert des substructions gallo-romaines,  de plan symétrique, est composé d'un étage
