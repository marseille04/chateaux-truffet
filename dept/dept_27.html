 40,4\" Est","gps":"49° 06' 43,2\" Nord, 0° 42' 40,4\" Est","images":["../image/image_27/27_Serquigny_1.jpg","../image/image_27/27_Serquigny_2.jpg","../image/image_27/27_Serquigny_3.jpg"]},"Consult_chateau_formulaire8444":{"id":"Consult_chateau_formulaire8444","dept":"27","canton":"Le Neubourg","commune":"Saint-Aubin d","nom":"St_Aubin_Ecrosville","type":"Château","periode":"XVII","histoire":"St-AUBIN d'ESCROVILLE, a été bâti vers 1640 par une des plus grandes familles normandes, les Le Roux d'Infreville.  Vendu en 1688 à la famille Pavyot de Villette, chevalier,seigneur  conseiller  au parlement de Rouen, son épouse Geneviève Hallé d'Orgeville,  le domaine appartient toujours aux descendants de cette famille, alliée aux Noailles. Vers 1860 la famille Tirebarbe d'Aubermesnil, le 4 octobre 1876, y décède l'auteur Henri de La Haye-Jousselin qui en avait hérité.   Echu au XXe siècle  Mme  d'Aubermesnil dernière des Pavyot de St-Aubin, le château est transmit à son petit-fils Bertrand de la Haye -Jousselin  avec son épouse Laure de Noailles. En juin 1940, le général Gaston Duffour y installe son quartier général. Propriété de M. Edmond de la Haye-Jousselin.","architecture":"St-AUBIN d'ESCROVILLE  date de 1640 . Le château se compose d'un grand corps de logis, de brique et pierre, et d'ailes plus basses le prolongeant et prolongées par deux pavillons à deux travées et deux étages du côté cour d'honneur ces pavillons s'articulent avec deux ailes basses en retour, et le parc transformé. Une partie des grilles provient de la fonderie d'art du Val d'Osne.  Depuis 1950, les propriétaires reconstituent le parc tel qu'il était au début du XVIIIe siècle, tout en créant des jardins pour y présenter des sculptures provenant de Hyères. Le château cadre des vues lointaines sur le paysage de plaines qui l'environne. Ces cônes de vue sont mis en valeur par les alignements d'arbres du domaine,  le monument est classé au titre des monuments historiques par arrêté des 20 octobre 2004 et 7 septembre 2005 (domaine et bâtiments), ainsi que d'une inscription par arrêté du 14 décembre 2001  intérieurs. Éléments protégés MH : les intérieurs du château : inscription par arrêté du 14 décembre 2001. Le domaine avec le château, le parc et les jardins, les avenues avec l'ensemble des éléments bâtis, à l'exclusion des intérieurs du château et des statues : classement par arrêté du 20 octobre 2004, modifié par arrêté du 7 septembre 2005.","habitants":"Famille Pavyot\r\n        \r\n        \r\n        \"","divers":"Saint Aubin d'Ecrosville gps 49° 08' 27\" N, 1° 00' 29\" Est","gps":"","images":["../image/image_27/27_St_Aubin_Ecrosville_1.jpg","../image/image_27/27_St_Aubin_Ecrosville_2.jpg"]},"Consult_chateau_formulairec970":{"id":"Consult_chateau_formulairec970","dept":"27","canton":"Le Neubourg","commune":"St-Aubin sur Risle","nom":"St_Aubin_sur_Risle","type":"Château","periode":"XVI-XVII","histoire":"ST AUBIN sur RISLES  le nom du domaine de Saint Aubin apparaît au XIIe siècle pour la première fois dans une charte de Robert II de Beaumont, Comte de Leicester, listant ses propriétés anglo-normandes. En 1261, le château et les terres sont attribués par Saint Louis à labbaye de Saint Taurin. Mathieu de Saint Aubin, seigneur du lieu le transmit à Raoul Essarts et par successions à la famille Loys le Comte jusquen 1469. En 1514, Christophe le Loutrel, écuyer du roi, devient seigneur de Saint Aubin, titre accordé par Louis XII. Le domaine fut acquis au XVIIIe siècle par la famille La Boullaye de Thevrey qui agrandit le château, au XIXe siècle lensemble sera modifié dans le gout de lépoque par monsieur de Courcival, châtelain de Saint-Aubin. En  1951, le château fut acheté par le général Pujo, ancien Ministre de lAir, cofondateur et PDG dAir France de qui lui donna sa configuration actuelle.","architecture":"ST AUBIN sur RISLES, le château actuel fut construit au XVIIe siècle, à lemplacement de lancien en partie détruit. Larchitecture est typique de cette époque: soubassement en grès et silex, élévation en briques à trois niveaux, fenêtres encastrées de chaines de pierres taillées en bossage chanfreiné, pavillons accolés aux extrémités et avant-corps d'entrée central et saillant, toit en croupes recouvert d'Ardoise.","habitants":"famille La Boullaye de Thevrey\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"St-Aubin sur Risles     GPS : 48° 58' 49\" Nord, 0° 47' 00\" Est","gps":"48° 58' 49\" Nord, 0° 47' 00\" Est","images":["../image/image_27/27_St_Aubin_sur_Risles_1.jpg","../image/image_27/27_St_Aubin_sur_Risles_2.jpg","../image/image_27/27_St_Aubin_sur_Risles_3.jpg","../image/image_27/27_St_Aubin_sur_Risles_4.jpg"]},"Consult_chateau_formulaire4822":{"id":"Consult_chateau_formulaire4822","dept":"27","canton":"Gisors","commune":"Saint-Denis-le-Ferment","nom":"ST_Denis_le_Ferment","type":"Château","periode":"XVII","histoire":"ST-DENIS le FERMENT, le roi dAngleterre Henri Ier dit Beauclair, troisième fils de Guillaume le Conquérant, est venu mourir dans le château féodal de Saint-Denis le Ferment le 1er décembre 1135. En 1198, Philippe Auguste enlève la forteresse de Saint-Paër à Richard Coeur de Lion et Saint-Denis devient fief royal. Pendant la guerre de Cent Ans, les sept villes de Bleu sont sous occupation anglaise. En 1483, le domaine de Saint-Denis-le-Ferment devient propriété de la famille de Gaillardbois. Au XVIIe siècle, Robert de Gaillardbois, propriétaire du domaine,   fait démolir le château féodal et entreprend la construction de l'édifice actuel.","architecture":"ST-DENIS le FERMENT, par la suite, le pavillon central reçoit l'adjonction de deux ailes symétriques, mais la partie sud de l'édifice est détruite par un incendie en 1883. Inspiré par le classicisme de l'époque, le château présente des façades en briques couronnées par une toiture à la mansarde en ardoises. Le domaine comprend également les ruines d'un colombier circulaire en briques, ainsi qu'une remarquable glacière voûtée en pierres, située en sous-sol. La porterie du château est composée d'une entrée carrossable, signalée par une élégante arcade en briques, et surmontée d'un pavillon central. Deux tourelles, coiffées chacune par un dôme d'ardoises, encadrent le pavillon et mettent en valeur l'accès au domaine. Situé à flanc de coteau, le domaine jouxte le centre du village, la croix Renaissance, les maisons alentours, aile domaine comprend également les ruines d'un colombier circulaire en briques, ainsi qu'une remarquable glacière voûtée en pierres, située en sous-sol. La porterie du château est composée d'une entrée carrossable, signalée par une élégante arcade en briques, et surmontée d'un pavillon central. Deux tourelles,coiffées chacune par un dôme d'ardoises, encadrent le pavillon et mettent en valeur l'accès au domaine  ainsi que sur le coteau boisé derrière le château.","habitants":"Robert de Gaillardbois\r\n        \r\n        \"","divers":"St Denis le Ferment gps 49° 19' 47\"nord, 1° 43' 10\" est","gps":"","images":["../image/image_27/27_ST_Denis_le_Ferment_1.jpg","../image/image_27/27_ST_Denis_le_Ferment_2.jpg","../image/image_27/27_ST_Denis_le_Ferment_3.jpg","../image/image_27/27_ST_Denis_le_Ferment_4.jpg"]},"Consult_chateau_formulaire70c9":{"id":"Consult_chateau_formulaire70c9","dept":"27","canton":"Louviers","commune":"Saint Etienne du Vauvray","nom":"St_Etienne_ Vauvray","type":"Château","periode":"XVII","histoire":"château du Nouveau-Monde seconde moitié du XIXe siècle. château de Saint-Étienne-du-Vauvray.                                                          ST ETIENNE DE VOUVRAY,  le château de Saint-Etienne du Vauvray a été construit vers 1850 sur l'emplacement d'une demeure attestée au XVIIe siècle et partiellement remployée, visible sur le cadastre napoléonien de 1823 et sur un plan de 1672 ; les ailes auraient été ajoutées vers 1884, les bâtiments agricoles ont été détruits, subsistent les écuries, le pigeonnier et le jardin. Édifice de plan symétrique, composé d'un étage carré, un étage de comble et sous-sol, élévation ordonnancée, toit à longs pans couvert d'ardoise.","architecture":"DES-ETATS à  Le Vaudreuil , vestiges. Travaux par Antoine Lepautre, pour Claude Girardin dans le troisième quart du XVIIe siècle ; travaux de restauration par Desgodets à la fin du premier quart du XVIIIe siècle ; détruit dans le premier quart du XIXe siècle et début de reconstruction par maillet du Boullay; deux pavillons d'entrée sont les seuls vestiges du château du XVIIe siècle; deux autres pavillons semblent correspondre à un début de reconstruction dans le quatrième quart du XVIIIe siècle.","habitants":"Claude Girardin\r\n        \r\n        \"","divers":"St-Etienne de Vouvray gps 49° 14' 37\" nord, 1° 13' 16\" est                                      grav_1                                                                                                     les Etats grav_4                                                                Vaudreuil_Grav_3","gps":"","images":["../image/image_27/27_St_Etienne_Vauvray_1.jpg","../image/image_27/27_St_Etienne_Vauvray_2.jpg","../image/image_27/27_St_Etienne_Vauvray_3.jpg","../image/image_27/27_St_Etienne_Vauvray_4.jpg"]},"Consult_chateau_formulaire499e":{"id":"Consult_chateau_formulaire499e","dept":"27","canton":"Evreux","commune":"ST-Georges du Mesnil","nom":"ST_Georges_Mesnil","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article  la Lequeraye et Giverville.                 La LEQUERAYE, quart de fief mentionné de 1198 à la Révolution, les divers bâtiments ont été reconstruits dans la deuxième moitié du XIXe siècle. Le corps de logis, construit en brique et calcaire, pierre avec brique en remplissage, possède un étage carré et un étage de comble. Le colombier polygonal en brique et silex, brique avec pierre en remplissage et la chapelle en pan de bois. élévation ordonnancée; oeuvre: brique ; calcaire ; silex ; bois ; torchis ; pan de bois ; moellon ; brique avec pierre en remplissage , bossage, toit à longs pans ; croupe ; pignon couvert ; toit polygonal ; flèche polygonale.","architecture":"GIVERVILLE, à deux K.M. au nord  Le château de Giverville, de même que son parc, est inscrit à l'inventaire des sites de l'Eure. Il fut construit, et habité aux XVIIe et XVIIIe siècles, par la famille Pillon, un des membres de cette famille, maître Pillon Pierre, était grainetier du grenier à sel de Pont-Audemer. Anobli en 1585, Pierre Pillon changea de nom en celui de Giverville et devient seigneur de Giverville. Le château est occupé par une maison d'enfants.","habitants":"famille Pillon\r\n        \"","divers":"la Lequeraye-1                                                                        Giverville  grav-2-3.","gps":"","images":["../image/image_27/27_ST_Georges_Mesnil_1.jpg","../image/image_27/27_ST_Georges_Mesnil_2.jpg","../image/image_27/27_ST_Georges_Mesnil_3.jpg","../image/image_27/27_ST_Georges_Mesnil_4.jpg","../image/image_27/27_ST_Georges_Mesnil_5.jpg"]},"Consult_chateau_formulairecebe":{"id":"Consult_chateau_formulairecebe","dept":"27","canton":"Evreux","commune":"Saint-Georges-Motel","nom":"St_Georges_Motel","type":"Château","periode":"XVII","histoire":"SAINT-GEORGES MOTEL,  un ancien château appartenant à Aimery de Muzy est mentionné à Motel dès le milieu du XIIIe siècle et servait de résidence pour Eudes Rigaud, archevêque de Rouen. Propriété du chevalier Jehan de Pilliers à partir de 1427, les terres de Motel restèrent dans la famille jusqu'à la Révolution. Henri IV y séjourna brièvement avant la bataille dIvry qui eut lieu le 14 mars 1590.. Durant l'entre-deux-guerres, le domaine devient la propriété du couple Balsan, dont l'épouse est l'héritière du célèbre milliardaire américain Vanderbilt. Celle-ci accueille au château Winston Churchill durant plusieurs étés.","architecture":"SAINT-GEORGES MOTEL le château actuel, entouré de douves en eau, est construit au début du XVIIe siècle et s'apparente au style classique. Surmonté de hautes toitures d'ardoises, l'édifice est constitué d'un corps de logis flanqué de deux pavillons latéraux, deux ailes en saillies. Les façades en moellons enduits sont tramées par des encadrements de baies et des jambes harpées en briques, tandis que la pierre de taille est utilisée pour les chaînes d'angle. Le parc est remanié sous le second Empire par le paysagiste Louis-Sulpice Varé, créateur du bois de Boulogne, puis par le paysagiste Achille Duchêne au XXe siècle. D'importants travaux sont entrepris puisque les anciennes dépendances de la cour d'honneur sont démolies et remplacées par un pavillon avec salon de musique. Les intérieurs du château furent réaménagés par la prestigieuse maison de décoration Jansen. Situé à la confluence de lEure et de lAvre, le château possède un parc arboré remarquable, avec une perspective traversante sur un axe Ouest-Est. inscription par arrêté du 9 juin 1977.","habitants":"Famille Balsan\r\n        \"","divers":"St-Georges-Motel    GPS : 48° 47' 18\" Nord, 1° 22' 02\" Est","gps":"48° 47' 18\" Nord, 1° 22' 02\" Est","images":["../image/image_27/27_St_Georges_Motel_1.jpg","../image/image_27/27_St_Georges_Motel_2.jpg","../image/image_27/27_St_Georges_Motel_3.jpg"]},"Consult_chateau_formulaire18d8":{"id":"Consult_chateau_formulaire18d8","dept":"27","canton":"Bourg-Achard","commune":"Bouquetot","nom":"St_Hilaire_27","type":"Château","periode":"XVIII","histoire":"St-HILAIRE, le château et sa chapelle ont été construits dans les années 1640  par Pierre Le Vicomte,seigneur de Villy et de Saint-Hilaire, et par sa femme Marie de Roger.  En 1741, Armand Le vicomte obtient la réunion des fiefs de Fréville et Ruffaut qui prennent le nom de Saint-Hilaire. Par alliances successives depuis le XVIIIe siècle, le domaine est resté une propriété familiale jusqu'à nos jours.","architecture":"St-HILAIRE, réalisée à la fin du règne de Louis XIII, la demeure s'apparente au classicisme architectural. Les façades sont rythmées par des chaînes et des encadrements de baies en pierre de taille avec un remplissage de briques polychromes formant des motifs en croisillons. De superbes lucarnes monumentales à fronton triangulaire se distinguent au niveau des combles. A la fin du XIXe siècle, le parc est remanié et les intérieurs sont modernisés. Il subsiste des traces des intérieurs originels dont une magnifique cheminée en pierre, ornée du portrait de Louis XIII et des armoiries des Le Vicomte. Détachée du château, la chapelle a conservé une verrière en grisaille du XVIIe siècle. Parmi les dépendances, un pressoir à pans de bois avec couverture en chaume a été préservé. Par alliances successives depuis le XVIIIe siècle, le domaine est resté une propriété familiale jusqu'à nos jours. Le parc arboré forme un écrin de verdure autour du château. Une perspective lointaine se dégage vers l'Ouest, donnant des vues sur les champs, le hameau voisin de Bois Inger et le parc du château de Bosc-Roger.","habitants":"Famille de Ravallac\r\n        \"","divers":"ST Hilaire Bouquetot","gps":"","images":["../image/image_27/27_St_Hilaire_27_1.jpg","../image/image_27/27_St_Hilaire_27_2.jpg"]},"Consult_chateau_formulairefe90":{"id":"Consult_chateau_formulairefe90","dept":"27","canton":"Louviers","commune":"Louviers","nom":"ST_Hilaire_Louviers","type":"Château","periode":"XVII","histoire":"Deux châteaux dans cet article-St-Hilaire et la Haye le Comte.                                                                                       ST-HILAIRE, au début du XVe siècle, le domaine fait partie du fief de lÉpervier, possédé par Roger de Maldéré. Après quoi le domaine est acquis par Jean Le Roux, un bourgeois rouennais, qui le transmet à Robert Le Roux  sieur de lÉpervier. Sa petite-nièce Catherine du Jardin en héritera en 1582, avant d'épouser Charles Romé. Pierre Romé  seigneur du Thuit et trésorier de France au bureau de Rouen sous Louis XIII  en héritera à son tour. En 1681, Nicolas Romé réunit ses fiefs de lÉpervier, Maupertuis, Bouteiller et Folleville sous le nom de Folleville jusqu'en 1692, où Marie Romé épouse Pierre-Jacques Le Vicomte de Saint-Hilaire. Au XVIIIe siècle, Marie-Angélique hérite de Joseph Le vicomte de Saint-Hilaire et se marie au marquis Antoine de Marguerit. Au milieu du XIXe siècle, leur descendant et comte Odoard du Hazey vend le domaine à M. Eugène Léon Sée  (18 octobre 1850), sous-préfet de Louviers entre 1879 et 1882, qui fait construire une grande bâtisse néo-classique en 1880. Il est devenu au XVIIe siècle la propriété de Pierre Le Vicomte, sire de Saint Hilaire. En 1901, Jules Rodolphe Audresset (nom du propriétaire de la dernière filature à Louviers) achète le bâtiment, puis le transmet à sa fille Cécile. Elle épouse Pierre Réveilhac  Entre 1907 et 1909, la famille Réveilhac la fait modifier par larchitecte Henri Jacquelin.  Vers 1925, le major américain Walter Cotchett y ajoute un logement séparé dans le même style et une piscine. Le château est abandonné après les années 1960, puis racheté en 1989 pour être restauré, inscription par arrêté du 13 septembre 2002.","architecture":"ST-HILAIRE, le corps de logis est en pierre de trois niveaux avec des combles à la Mansart, doté d'un avant-corps à pans coupés en brique, bordé par une terrasse et mâchicoulis, à l'origine se trouvait un manoir seigneurial dit de l'Epervier, attesté au XVe siècle. Vers 1880, Eugène-Léon Sée, fait construire une grosse bâtisse de neuf travées, deux étages et comble brisé dans le style du milieu du XIXe siècle. Entre 1907 et 1909, la famille Réveilhac la fait modifier par larchitecte Henri Jacquelin qui la rhabille dans le style néo-normand avec des colombages issus de vieilles maisons dEvreux et ajoute tourelles, échauguettes et galeries en accentuant la pente des toits.  Outre le bâtiment principal, il existe un bâtiment adjacent dit chapelle et des dépendances,  pavillon, communs, colombier. Le parc est partiellement boisé. Ce château est représentatif de larchitecture régionaliste néo-normande du début du XXe siècle. Son côté grandiose est mis en valeur par la vaste pelouse qui le sépare de la route. Éléments protégés MH : le logis en totalité, y compris le bâtiment adjacent dit \"chapelle\" : inscription par arrêté du 13 septembre 2002.                                                                                                             La HAYE le COMTE  à un K.M au sud  petit château construit au XIIe siècle pour Calevau comte de Meulan, il fut détruit, il subsiste aucun vestige. Vers 1647, Anne le Métayer avait fait construire un pavillon au bout de son logis. Colombier polygonal en pan de bois datant du XVIe ou du XVIIe siècle. Logis actuel à deux étages carrés du XIXe siècle postérieur à 1823.","habitants":"Famille Réveilhac \r\n        \"","divers":"St-Hilaire   grav-1-2-3-4  GPS : 49° 12' 9,39\" Nord, 1° 10' 12,51\" Est                                                                                        La Haye le Comte grav-5-6  gps  49° 11' 54? nord, 1° 08' 56? est","gps":"49° 12' 9,39\" Nord, 1° 10' 12,51\" Est","images":["../image/image_27/27_ST_Hilaire_Louviers_1.jpg","../image/image_27/27_ST_Hilaire_Louviers_2.jpg","../image/image_27/27_ST_Hilaire_Louviers_3.jpg","../image/image_27/27_ST_Hilaire_Louviers_4.jpg","../image/image_27/27_ST_Hilaire_Louviers_5.jpg","../image/image_27/27_ST_Hilaire_Louviers_6.jpg"]},"Consult_chateau_formulaire9a01":{"id":"Consult_chateau_formulaire9a01","dept":"27","canton":"Gallion","commune":"St_Julien sur Gallion","nom":"St_Julien_Gallion","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article ; Beauchêne et Jeufosse   JEUFOSSE, construit au XVIIe siècle. Il a été cependant le lieu dun épisode dramatique au début du Second Empire. Trois jeunes femmes vivaient alors dans limposante bâtisse : Mme de Jeufosse, veuve de 45 ans, sa fille Blanche âgée de 18 ans et Laurence, linstitutrice de Blanche âgée de 24 ans. Madame de Jeufosse avait aussi deux fils oisifs, vivant en noceurs, écornant la fortune paternelle loin de Saint Aubin. Ils rencontrèrent une famille dAubevoye, les Guillot, leurs visites et celles dautres personnes animèrent un moment le château. M. Guillot était aisé, et bon vivant mais aussi coureur daventures. Laurence, puis Blanche furent lobjet de ses avances. Madame de Jeufosse donna lordre à son garde Crépel, de tirer sur quiconque sintroduirait dans le parc la nuit. Le 12 Juin 1857, il tira sur Guillot qui fut mortellement blessé. Crépel dabord, puis Mme de Jeufosse et ses fils se retrouvèrent à la prison de Louviers. Le procès fit grand bruit. Les Jeufosse et le garde furent défendus avec talent par Maître Berryer, il obtint lacquittement. La famille de Jeufosse se trouva bientôt ruinée et le château vendu. Blanche termina sa vie à Gaillon et y mourut en 1918, emportant avec elle le secret du drame de Jeufosse Saint-Aubin-sur-Gaillon,  et chambres d'hôtes de charme.","architecture":"BEAUCHENE,   date du XVIe et XVIIe siècle. Le logis date du XVIIe siècle et XVIIe siècle. Il comporte 1 étage carré et 1 étage de combles. Son colombier date du XVIe siècle, la chapelle saint-Côme et Saint-Damien date du XVIIe siècle. Sa couverture est en tuile plate et en ardoise. Le château de Beauchêne vous accueille pour fêter vos évènements privés. Le château entièrement rénové, comporte deux salles séparées, par une grande cheminée ancienne. L'Ambiance est chaleureuse avec des poutres apparentes et un beau sol en marbre clair.","habitants":"famille dAubevoye                                                                      Rotoirs famille de Coetlogon \r\n        \r\n        \"","divers":"Beauchêne,  grav-3                                                                            Jeufosse grav -1-2      GPS : 49° 08' 53\" Nord, 1° 19' 49\" Est                                                     jeufosse  GPS : 49° 08' 53\" Nord, 1° 19' 49\" Est.            Beauchêne GPS : 49° 08' 53\" Nord, 1° 19' 49\" Est","gps":"49° 08' 53\" Nord, 1° 19' 49\" Est","images":["../image/image_27/27_St_Julien_Gallion_1.jpg","../image/image_27/27_St_Julien_Gallion_2.jpg","../image/image_27/27_St_Julien_Gallion_3.jpg","../image/image_27/27_St_Julien_Gallion_4.jpg"]},"Consult_chateau_formulaireaf90":{"id":"Consult_chateau_formulaireaf90","dept":"27","canton":"Vernon","commune":"St-Just","nom":"St_Just","type":"Château","periode":"XVII","histoire":"ST-JUST, un premier château est construit au XIIIe siècle. Vers la fin du XVIe siècle, Jacques de Croixmare fait édifier une nouvelle demeure. Un état des biens du fief de Saint-Just, dressé en 1608. En 1654, les derniers descendants de la famille de Croix-Mare vendent le domaine à Jean de Savary, écuyer, secrétaire du Roi et grand maître des Eaux et Forêts de Normandie. Jean de Savary et ses descendants transforment le parc en jardin à la française.  Le plan de 1744 donne une idée du château et de son parc au milieu du XVIIIe siècle. En 1775, vendu au duc de Penthièvre, également propriétaire du château de Bizy, à Vernon. Il acquiert  aussi le domaine voisin (dit château du Rocher), jusqu'à la propriété distincte.  L'hospice fonctionne jusqu'à la mort du duc de Penthièvre, en 1793. Le domaine est ensuite vendu comme bien national. Propriétaire de 1795 à 1798, Sébastien-Gilles Huet de Guerville fait inhumer son épouse dans le parc, en réutilisant les éléments du mausolée de Lancelot de la Garenne, provenant de l'église de Mercey. En 1805, Victor Fanneau de la Horie, propriétaire depuis 1798, revend le château au chevalier Suchet, qui le revend à son frère, maréchal et duc d'Albuféra. Gabriel Suchet, receveur des droits généraux de Normandie, puis conseiller d'état, commence par replanter l'avenue qui mène au château en 1810 ; aux ormes du XVIIe siècle, il substitue des peupliers.","architecture":"ST-JUST, le duc transforme le logis en hôpital et maison de repos pour les vieux serviteurs, à cette fin, le bâtiment subit d'importants aménagements. Dans le parc, il fait édifier la laiterie, une fabrique et la glacière,  il fait encore construire le grand commun et une infirmerie (bâtiment aujourd'hui intégré dans la propriété voisine du Rocher) à partir de 1816, le maréchal entreprend de grands travaux à Saint-Just,  distribution et décor du rez-de-chaussée du logis par l'architecte Lacornée, réameublement, nouveau dessin du parc.  L'ensemble des bâtiments est remis en état. Suite au décès du maréchal en 1826, sa veuve divise la propriété et vend le domaine voisin du château du Rocher, composé de la chapelle, le \"pavillon d'Osmont\", l'infirmerie et une partie du parc à l'anglaise ; il redevient alors distinct du château de Saint-Just. Depuis 1885, le château est aux mains de la même famille, qui s'est attaché à remettre le parc en état : en 1893, l'avenue est replantée, en platanes ; en 1905, la pièce d'eau est curée ; les goulettes, disparues sous le calcaire et la terre, sont dégagées et remises en eau (1935). En 1904, l'aile gauche du château est abattue. Les bois attenants, ou grand parc, autrefois partie intégrante du domaine, appartiennent aujourd'hui à un autre propriétaire. Logis en pierre calcaire de plan rectangulaire régulier ; communs en pan de bois et calcaire ; glacière avec puits de sept mètres et coupole en brique ; couvert en tilleuls ; terrasse maçonnée ; cressonnière ; miroir d'eau ; jardin régulier au XVIIe siècle ; jardin irrégulier à partir du XIXe siècle ; lucarne à croupe.","habitants":"famille de Croix-mare\r\n        \"","divers":"St-Just gps 49° 06' 39\" nord, 1° 25' 53\" est","gps":"","images":["../image/image_27/27_St_Just_1.jpg","../image/image_27/27_St_Just_2.jpg"]},"Consult_chateau_formulaire7693":{"id":"Consult_chateau_formulaire7693","dept":"27","canton":"Brionne","commune":"Barquet.                    Le Plessis-Sainte-Opportune","nom":"St_Leger_Barquet","type":"Château","periode":"XVI-XVII","histoire":"ST-LEGER, le château du Plessis Saint-Opportune a été édifié au XVIIe siècle, inspiré par le classicisme français de l'époque, puis a connu des transformations au XVIIIe et XIXe siècles. L'édifice se compose d'un pavillon central avec étage et fronton, surmonté de combles à la mansarde en ardoises. Les façades sont rythmées par des chaînes de pierres et un remplissage de briques formant des motifs losangés. Deux ailes symétriques ont été ajoutées de part et d'autre, au rez-de-chaussée, tout en conservant l'unité de style. Parmi les dépendances, le colombier du château, de plan octogonal, reprend le même langage (matériaux, mise en oeuvre) que le pavillon central. La chapelle St-Léger, voisine du château, est plus ancienne et date du XIIe siècle. De style roman, elle a conservé en façade les traces de ses premières ouvertures, murées et remplacées par des baies plus grandes. Le sous-sol semi-enterré du château forme un socle surélevé idéal pour apprécier les vues sur le parc, délimitées par les lisières boisées qui ceinturent le domaine. Éléments protégés MH : les façades et les toitures du château et la chapelle : inscription par arrêté du 2 novembre 1976, chambres d'hôtes.","architecture":"VACHERIE , à   BARQUET a deux K.M.,  au sud qui rappelle les villas palladiennes, est construit en 1815 en pierre de taille blanche dans le style néoclassique. Il se présente sous la forme d'un corps de logis compact, mis en valeur, côté est, par un portique monumental à colonnes ioniques, et côté ouest par un avant-corps semi-circulaire orné de pilastres. L'édifice  c'est l'oeuvre de Martel de la Vacherie dont la famille possédait la terre depuis le XVIIe siècle, se caractérise « par sa monumentalité (soubassement, étage noble, attique), renforcée par l'austérité des quelques éléments de décor (frontons, corniches) » et la discrétion de la toiture en ardoises, l'actuel propriétaire est le comte de Prémonville de Mésonthon.    Ancien logis construit  au XVIe siècle. Transformé en bâtiment agricole. Le nouveau logis date du XVIIe siècle et remanié au XVIIIe siècle, avec élévation ordonnancée, à un étage carré, en brique ; pierre avec brique en remplissage ; pierre de taille ; silex ; appareil mixte,  toit à longs pans en  croupe.\r\ncouvert de tuile plate., parties non étudiées ,douves.","habitants":"comte de Prémonville de Mésonthon.\r\n        \"","divers":"St-Lege GPS : 49° 06' 31\" Nord, 0° 38' 41\" Est                                          Barquet  GPS : 49° 02' 54\" Nord, 0° 51' 01\" Est","gps":"49° 06' 31\" Nord, 0° 38' 41\" Est","images":["../image/image_27/27_St_Leger_Barquet_1.jpg"]},"Consult_chateau_formulaire319d-2":{"id":"Consult_chateau_formulaire319d-2","dept":"27","canton":"Beuzeville","commune":"St-Maclou","nom":"St_Maclou","type":"Château","periode":"XVII","histoire":"ST-MACLOU, le fief de Saint-Maclou est cité dès le début du XIIIe siècle. La construction du château durant le deuxième quart du XVIIe siècle est attribuée à Marc-Aurèle de Giverville, seigneur de Saint-Maclou et secrétaire du roi à partir de 1636. Inspiré par le classicisme,  Au XVIIIe siècle, Toussaint-François de Giverville entreprend des dépenses sur le domaine qui le conduisent à la ruine. Ses terres de Saint-Maclou sont saisies en 1788, peu avant son arrestation et son exécution le 7 juillet 1794, sous la Terreur. Actuellement, le domaine accueille un élevage de chevaux. Le château bénéficie d'une magnifique perspective traversante orientée nord-sud bordée d'alignements d'arbres. La vue porte jusqu'à la lisière du village, au Nord. Le château reste dans la famille jusqu'en 1973.                                                                                                                         MONT, fief noble cité à partir du XVIe siècle. Le logis principal en brique et calcaire fut construit dans la première moitié du XVIIe siècle puis agrandi au XVIIIe siècle. Il existerait un décor intérieur: dessus de portes. Parc avec bâtiments agricoles en pan de bois ; grange ; étable à vaches. Chapelle et fontaine monumentale du XVIIIe ou XIXe siècle. L'édifice, de plan symétrique, se compose d'un étage carré et étage de comble, élévation à travées, toit à longs pans et croupe, couverts d'ardoise.","architecture":"ST-MACLOU,  le château se compose d'un logis rectangulaire doté d'un avant-corps central saillant. Les façades associent la pierre de taille en bossage pour les chaînages et les encadrements de baies avec un remplissage de briques polychromes à motifs de croisillons. L'avant-corps se distingue par son ornement soigné (frontons, niche). L'ensemble est couronné par une toiture à combles brisées flanquée de petits pavillons latéraux. Le château dispose d'une belle composition avec son perron donnant sur une cour d'honneur bordée de douves. Au début du XIXe siècle, deux ailes bâties en retour sont ajoutées par Dominique Vauquelin, conseiller général de l'Eure et propriétaire du domaine. A la fin du du premier quart du XIXe siècle, construction des écuries et de communs. De 1879 à 1881, construction de la chapelle et des ailes nord et sud. Abandonné, il fut restauré dans les années 1990 et ses ailes en retour démolies.                                                                                                               Au sud ouest à  Saint-Sulpice-de-Graimbouville le château de la   MARE , première mention des seigneurs de Graimbouville à la fin XIIe ou XIIIe siècle; vestiges de bâtiments formant enceinte datant du XVIe siècle, Colombier XVIe siècle ; château de plan symétrique, logis fin XVIIIe siècle avec décor intérieur: escalier en bois à rampe de ferronnerie, cheminées et plaques sculptées de la fin XVIIIe siècle. Cest un charmant deux ponts de quarante quatre fenêtres, de plain pied et aux combles surbaissés. Le parc contient un colombier et un pressoir à cidre. Site classé en 1940. Le château, de plan symétrique, se compose d'un sous sol, d'un étage carré et d'un étage de comble, élévation ordonnancée, toit à longs pans couvert d'ardoise.","habitants":"Famille de Marc-Aurèle de Giverville\r\n        \"","divers":"Deux châteaux dans cet article; Mont grav 5-6-                      Baternay grav 7,                                                                                      la Mare                                                                                            st Maclou  grav -1-2-3-4-8.GPS : 49° 21' 38,79\" Nord, 0° 24' 42,34\" Est","gps":"49° 21' 38,79\" Nord, 0° 24' 42,34\" Est","images":["../image/image_27/27_St_Maclou_1.jpg","../image/image_27/27_St_Maclou_2.jpg","../image/image_27/27_St_Maclou_3.jpg","../image/image_27/27_St_Maclou_4.jpg","../image/image_27/27_St_Maclou_5.jpg","../image/image_27/27_St_Maclou_6.jpg","../image/image_27/27_St_Maclou_7.jpg","../image/image_27/27_St_Maclou_8.jpg"]},"Consult_chateau_formulaire0cf6-2":{"id":"Consult_chateau_formulaire0cf6-2","dept":"27","canton":"Louviers","commune":"St Pierre du Vauvray","nom":"St_Pierre_Vauvray","type":"Chateaux","periode":"XVII","histoire":"Le château Saint-Pierre et autres.\r\nChâteau fort, situé dans le bois du Val au Queu (vestiges) ST-PIERRE Du VAUVRAY, la date 1751 , une vente aux enchères de 1796 indique : logis, bâtiment consistant en grange, pressoir et cellier, four à chaux, une cave sous roc et autres bâtiments à usages divers.                                                                                                HOULETTE   est un manoir bâti à Saint Pierre-sur-Vauvray, Vous y trouverez des chambres d'hôtes, dans un cadre accueillant et chaleureux et une vue superbe sur la Vallée. Le Manoir de la Houlette est idéal pour accueillir jusqu'à 200 personnes. Vous pourrez y organiser vos banquets, mariages, séminaires, repas daffaires, ou réunions. Les salles sont lumineuses. 150 m2 de terrasse en marbre. Le manoir de la Houlette est de style Ile-de-France, entouré d'un grand parc et d'un Jardin à la Française. Vous aurez une vue magnifique sur la Vallée de la Seine.","architecture":"ST PIERRE Du VAUVRAY   La date 1751 qui se trouvait sur le vase qui couronnait la lucarne de la façade postérieure du logis indiquait l'achèvement de la construction. Une vente aux enchères de 1796. La plupart des bâtiments annexes ont aujourd'hui disparu. Une chapelle est mentionnée en 1792. La date \"1828\", portée dans le fronton, est celle d'une restauration.                                                                    A quelques K.M. au nord CONNELLES beau manoir transformer en hôtel restaurant  ce beau manoir à colombages anglo-normand du XIXe siècle lové dans un paysage impressionniste entre deux bras de Seine. Dans la douceur feutrée de la salle de restaurant et de sa véranda qui enjambe la Seine en vous offrant une vue magique. Au Moulin de Connelles, tout n'est que délicatesse sans aucune fausse note.","habitants":"Seigneurs  locaux\r\n        \"","divers":"St-Pierre-Vauvray  gps 49° 13' 58\" nord, 1° 13' 19\" est\r\nHoulette Grav 3  GPS : 49° 13' 58\" Nord, 1° 13' 19\" Est                                 Connelles grav-7_8","gps":"49° 13' 58\" Nord, 1° 13' 19\" Est","images":["../image/image_27/27_St_Pierre_Vauvray_1.jpg","../image/image_27/27_St_Pierre_Vauvray_2.jpg","../image/image_27/27_St_Pierre_Vauvray_3.jpg","../image/image_27/27_St_Pierre_Vauvray_4.jpg","../image/image_27/27_St_Pierre_Vauvray_5.jpg","../image/image_27/27_St_Pierre_Vauvray_6.jpg","../image/image_27/27_St_Pierre_Vauvray_7.jpg","../image/image_27/27_St_Pierre_Vauvray_8.jpg"]},"Consult_chateau_formulaire89bd":{"id":"Consult_chateau_formulaire89bd","dept":"27","canton":"Bernay","commune":"Thevray","nom":"Thevray","type":"Château","periode":"XV-XVII","histoire":"THEVRAY, la première mention écrite fait remonter lorigine d'une importante seigneurie depuis le XIIe siècle. Après la construction d'un premier site de défense, la guerre de Cent Ans marque un important tournant pour le site car les Anglais mettent le feu au premier château. En 1440, ce n'est plus qu'un amas de ruine qui est relevé par Jean III de Chambray. Mais c'est l'un de ses enfants, Jacques de Chambray, seigneur de Thevray, qui en 1489 fit bâtir un château fortifié , seigneur de Thevray, chevalier de l'Ordre du roi, chambellan du roi de France, grand bailli et gouverneur d'Évreux (1498) - Meurt un 4 mars 1504. Propriété de la marquise de la Boulaye de Thévray. Tour de Thevray Logo M.H. Classée MH (1886): site à motte et basse-cour entourées de fossés en eau. Jacques de Chambray, grand bailli et gouverneur d'Évreux, remplaça à la fin du XVe siècle la motte originelle par une tour-résidence octogonale, flanquée vers la basse-cour d'un avant-corps rectangulaire abritant à sa base le pont-levis à flèches. La construction en grès, brique, d'utilisation rare dans la région à l'époque, et silex a donc la forme d'une tour octogonale dominée par un toit polygonal en forme d'éteignoir, prolongée par une aile rectangulaire surmontée d'un toit en fer de hache. Les mâchicoulis et l'existence du pont-levis montrent qu'il s'agit là d'un lieu de défense.","architecture":"THEVRAY La légende veut que, se souvenant des attaques passées, il édifia une tour destinée à le protéger. Ses murs élevés forment un polygone régulier avec avant-corps carré tourné vers l'intérieur de l'enceinte. Certains documents et gravures mettent en avant la présence d'un ancien château, d'époque XVIIe siècle, au nord de l'enceinte et potentiellement situé à l'extérieur de l'enceinte. Seules des sondages ou études archéologiques pourraient confirmer ces éléments. Depuis le haut de la Tour, il est possible de voir l'ensemble de la campagne alentour en utilisant un couloir de garde. La tour de Thevray est un site remarquable, situé au sein d'une enceinte faite de douves en haut, avec des communs d'une très belle qualité architecturale. D'un ancien colombier en bauge, situé à l'Est des douves, il ne reste hélas que les bases mais à l'Ouest, on trouve encore un bâtiment de grange à galandage en briques.  Éléments protégés MH : la tour de Thevray : classement par arrêté du 12 juillet 1886.                                                                                                                                       A trois K.M. à L'Est à AJOU le COUDRAY est un manoir au lieu-dit le Mesnil-Lucas à Ajou,  C'est un manoir construit au XVIIe et XVIIIe siècle. Il possède des douves, un colombier, une cour, une écurie, une grange, un pressoir à cidre et un four à pain. Quart de fief de Haubert depuis 1208. Le logis date en partie du XVIIe siècle. Les bâtiments agricoles remontent aux XVIIe et XVIIIe siècle. Le colombier détruit figure sur le cadastre de 1834. Les douves sont largement comblées. Le manoir du Coudray est privé et fermé au public.","habitants":"Jacques de Chambray,\r\n        \"","divers":"Thevray  grav-1-2-3                                                                   Coudray    grav-4 GPS : 48° 58' 49\" Nord, 0° 47' 00\" Est","gps":"48° 58' 49\" Nord, 0° 47' 00\" Est","images":["../image/image_27/27_Thevray_1.jpg","../image/image_27/27_Thevray_2.jpg","../image/image_27/27_Thevray_3.jpg","../image/image_27/27_Thevray_4.jpg"]},"Consult_chateau_formulaire8ed1":{"id":"Consult_chateau_formulaire8ed1","dept":"27","canton":"Les Andelys","commune":"Le Thuit","nom":"Thuit","type":"Château","periode":"XVII","histoire":"THUIT, été construit en 1850, pour le grand père de Guynemer, célèbre aviateur y ayant vécu quelques années, fut racheté en 1934 par les grands-parents dEric Lanquest. un aviateur,  ce dernier en a hérité en 1975. Le château du Thuit, très attaché à cette demeure du XIXe siècle il naura de cesse de la préserver et de lui redonner sa beauté dantan au rythme des années et de ses possibilités financières. Il y a une dizaine dannées, Eric Lanquest a fait appel à M. Lerond, artisan peintre aux Andelys, pour rénover les peintures côté Sud. Il a poursuivi son entreprise de restauration avec la face Nord du bâtiment à laquelle sest attelé Pascal Delalandre. Installé à Bacqueville, ce professionnel spécialisé en peinture, isolation, ravalement, vitrerie, faïence et papiers peints, a travaillé durant deux semaines à la reprise des mastics des fenêtres, réfection et peinture. Petit à petit, le château du Thuit retrouve de sa noblesse déjà en façade, côté public, avec lagrément et le soutien de la Fondation du patrimoine représentée par Petit-Delcroix.","architecture":"THUIT, dautres améliorations ont été réalisées comme la remise à neuf de la chaudière ainsi que des marquises, mais celles-ci à la charge du propriétaire. Si le château du Thuit a vu passer les affres et les vicissitudes du temps, avec entre autre la tempête de 1999 qui éclata une grande fenêtre avec la chute dun arbre, la détermination et lamour que porte le couple Lanquest à sa propriété reste la garantie dun passé à jamais préservé.","habitants":"Famille d'Eric Lanquest\r\n        \"","divers":"Thuit   GPS : 49° 15' 31\" Nord, 1° 21' 35\" Est","gps":"49° 15' 31\" Nord, 1° 21' 35\" Est","images":["../image/image_27/27_Thuit_1.jpg","../image/image_27/27_Thuit_2.jpg"]},"Consult_chateau_formulaire0dac":{"id":"Consult_chateau_formulaire0dac","dept":"27","canton":"Grand Bourgtheroulde","commune":"Boissey-le-Châtel","nom":"Tilly","type":"Château","periode":"XV-XVII","histoire":"TILLY, le domaine de Tilly à Boissey-le-Châtel qui dépendait de la famille de Tilly dont il a conservé le nom, a été acheté en même temps que Bourgtheroulde, à la fin du XVe siècle, par Guillaume le Roux. Sur l'emplacement du château fort du XIe siècle dont il subsiste le mur d'enceinte garni de nombreuses tourelles, il édifia au début du règne de François Ier le château actuel. À partir de 1678, le nouveau château édifié par Guillaume le Roux,  possède sa chapelle. Une motte féodale est encore existante dans la forêt juste à côté.","architecture":"TILLY, le château présente une belle orientation Est-Ouest qui lui permet d'avoir encore aujourd'hui des espaces dégagés visibles à partir de ses pièces de réception. C'est un édifice rectangulaire en briques, encadré de tours circulaires et pourvu, à l'arrière, d'une haute tour terminée en belvédère abritant un escalier à la \"Rihour\". Le logis est situé au centre d'une enceinte ovoïde à mur crénelé, et petites tours rondes dotées de bouches à feu. Les communs en colombage ont été agrandis vers 1900. De 1897 à 1905, la restauration menée par l'architecte Emile Janet a modifié les façades et la distribution intérieure. Éléments protégés MH : le château, le colombier, les tourelles et les courtines de l'ancienne enceinte : inscription par arrêté du 9 juillet 1932. Le terrain d'assiette du château avec le sol des fossés disparus, les façades et toitures des communs : inscription par arrêté du 17 juillet 2007.","habitants":"Famille de Tilly\r\n        \"","divers":"Till   GPS : 49° 16' 28\" Nord, 0° 47' 11\" Est","gps":"49° 16' 28\" Nord, 0° 47' 11\" Est","images":["../image/image_27/27_Tilly_1.jpg","../image/image_27/27_Tilly_2.jpg","../image/image_27/27_Tilly_3.jpg"]},"Consult_chateau_formulaire7c9d":{"id":"Consult_chateau_formulaire7c9d","dept":"27","canton":"Bernay","commune":"Aubevoye","nom":"Tournebut_27","type":"Château","periode":"XVII","histoire":"TOURNEBUT, le site fut un fief attribué à de multiples seigneurs. Les travaux de Charpillon  font état des noms et dates suivants : Guillaume de Tournebu (1180), époux d'Agnès d'Aubevoie, veuve en 1232 - Richard de Tournebut (vers 1211/1232) auquel succédèrent Guillaume II (vers 1265) puis Guillaume III (vers 1290) - Le suivant Pierre de Tournebut se vit privé de ce bien au profit de l'archevêché de Rouen (Guillaume de Lestrange). Puis, en 1400, on voit apparaître un Jean d'Orléans puis son fils Jacques (vers 1413) - Retour à l'archevêque de Rouen Louis d'Harcourt (vers 1418-1422) puis cession à Jean de Ménilles par sa femme Catherine de Trousseauville. Le roi d'Angleterre Henri V, le temps de sa reconquête de la Normandie, récompense successivement Perceval de Lindelay et Brian Cornewallis en leur attribuant le bien. Roger Mustel (1446) , Louis Le Pillois (1501). En 1545, Olivier des Hayes tint le fief. Puis François Thésard, sieur des Essart en fut proriétaire pour lequel le fief fut érigé en baronnie. En 1856, le domaine revient à Marcellin Robert de Saint-Victor, marié à la petite-fille de la marquise, Eudoxie Clara Fiska Hélie de Combray. Monsieur Antoine Joseph Hébert  (1815-1899), chevalier de la Légion d'honneur, maire du 3e arrondissement de Paris, acquiert la propriété en dernier lieu puis, par alliance, le château échoit à la famille Levillain, il est devenu, depuis, le siège de l'organe délibérant de la CCEMS, est inscrit à l'Inventaire général du Patrimoine culturel, est le siège de la CCEMS.","architecture":"TOURNEBUT,  est un château français situé dans la commune d'Aubevoye. Le château fait lobjet dune inscription à l'Inventaire général du patrimoine culturel. Le bâtiment d'habitation et sa chapelle indépendante sont reconstruits lors de la seconde moitié du XIXe siècle.  Il fit achever deux ans plus tard le château dans son apparence actuelle.  Une carte postale établirait la propriété du site à la mutuelle des douanes dans les années 1950.  Le rachat par la commune était comme une évidence.  Le manoir de Tournebut et la chapelle Notre-Dame sont mentionnés au XIIIe siècle; aveu du XVIIe siècle le manoir, ses parties agricoles et son colombier ; le manoir et la chapelle ont été reconstruits dans la deuxième moitié du XIXe siècle. En élévation ordonnancée   à  deux étages carrés ; un étage de comble, escalier dans oeuvre Gros-oeuvre : calcaire ; brique ; pierre avec brique en remplissage, toit à longs pans brisés ; croupe, couvert d'ardoise.","habitants":"Marcellin Robert de Saint-Victor\r\n        \"","divers":"Tournebut  GPS : 49° 11' 00\" Nord, 1° 19' 48\" Est","gps":"49° 11' 00\" Nord, 1° 19' 48\" Est","images":["../image/image_27/27_Tournebut_27_1.jpg","../image/image_27/27_Tournebut_27_2.jpg"]},"Consult_chateau_formulaire309f":{"id":"Consult_chateau_formulaire309f","dept":"27","canton":"Le Neubourg","commune":"Troncq","nom":"Troncq","type":"Château","periode":"XV-XVII","histoire":"TRONCQ, le fief du Troncq a été acquis vers 1514 par Gilles Le Cordier, peu après son anoblissement. Resté entre les mains de la même famille jusqu'en 1742, le domaine est passé aux Savary puis a été acheté en 1787 par les De La Haye.","architecture":"TRONCQ,   de 1890 à 1925 environ, le domaine a appartenu à un industriel d'Elbeuf qui a procédé à d'importantes campagnes de restauration du  château, sans toutefois intervenir de manière importante sur le parc. L'aile est-ouest du château a été construite vers la fin du XVIIe siècle, inspirée par le classicisme français en vogue à cette époque. Les façades, rythmées par de grandes baies et surmontées par une toiture en ardoises avec lucarnes, mêlent habilement briques et chaînes en pierre de taille. Une aile en retour (nord-sud) est venue compléter le château au XVIIIe siècle, tout en conservant l'unité architecturale. L'édifice a connu des transformations  jusqu'au début du XXe siècle. Le magnifique colombier, construit à la fin du XVIe siècle, présente un plan octogonal et une composition de matériaux préfigurant celle du château (pierre de taille et brique). De légères saillies en couronnement des façades annoncent la toiture circulaire en tuiles, avec lucarnes et clocheton. Le domaine est soigneusement entretenu : le parc a fait l'objet d'une mise en valeur paysagère récente suite aux dommages engendrés par la tempête de 1999 et les murs en bauge de son enceinte ont été rénovés. Le château et le parc disposent de perspectives donnant des vues lointaines sur les plaines au Nord, à l'Est et au Sud du domaine. Les abords protégés comprennent d'autres édifices remarquables.","habitants":"Famille de Gilles Le Cordier\r\n        \"","divers":"Troncq château de Troncq","gps":"","images":["../image/image_27/27_Troncq_1.jpg","../image/image_27/27_Troncq_2.jpg"]},"Consult_chateau_formulaire339f":{"id":"Consult_chateau_formulaire339f","dept":"27","canton":"Bourg-Achard","commune":"Cauverville-en-Roumois","nom":"Tuilleries_27","type":"Château","periode":"XVIII","histoire":"La TUILLERIE, le château a été construit entre 1773 et 1789 par l'architecte Jean-Baptiste Le Brument pour Louis Chef-d'Hostel, négociant rouennais.   Le hameau des Tuileries et les champs autour du domaine forment un cadre champêtre qui valorise le monument. Inscription par arrêté du 19 juillet 2011.","architecture":"La TUILLERIE, inspiré par le style néoclassique, l'édifice présente un corps de logis rectangulaire à un étage d'une grande sobriété. Les façades mêlent la pierre (soubassement, chaînes, cadre des baies) avec la brique en remplissage. L'ornement comprend un fronton d'entrée, le bossage en soubassement, une corniche et des panneaux de pierre, les ailes des communs sont construites en briques afin de s'accorder avec le château. Les autres dépendances ont recours au colombage, leur construction est datée précisément grâce aux documents originaux du chantier, la grange-pressoir est réalisée en 1773-74, les écuries et remises en 1775-77 et la serre du potager en 1776. Le domaine est d'autant plus intéressant que le château a conservé ses intérieurs d'origine (à l'exception de la cuisine et du lavoir). Les planchers subsistent en partie, les décors sont intacts, mais les dallages ont disparu. La salle à manger comprend des panneaux en trompe l'oeil à décor de paysage signés par Bouël. La ferronnerie est due à Frérot, et la décoration à Le Sueur Le Jeune. Les bâtiments annexes et les aménagements de son parc (fossés, plantations, murs, etc.) sont également d'origine. Le château possède une grande perspective qui ouvre au Nord et au Sud sur des paysages de plaines cultivées. Ces vues sont soulignées par les alignements d'arbres du parc. Le regard porte au Nord jusqu'au village d'Etréville.","habitants":"Louis Chef-d'Hostel\r\n        \r\n        \r\n        \"","divers":"Tuillerie   GPS : 49° 21' 53\" Nord, 0° 38' 36\" Est","gps":"49° 21' 53\" Nord, 0° 38' 36\" Est","images":["../image/image_27/27_Tuileries_27_1.jpg"]},"Consult_chateau_formulaire2e25":{"id":"Consult_chateau_formulaire2e25","dept":"27","canton":"Bernay","commune":"Valailles","nom":"Valailles_Theil","type":"Château","periode":"XVII-XVIII","histoire":"THEIL, la construction du château du Theil date du 1er quart du XVIIe siècle, et du XVIIIe siècle. Le Logis a été construit vers 1620 pour la famille de Croisy. Le château fut remanié et agrandi au XVIIIe siècle. Son colombier date aussi du XVIIIe siècle. La chapelle est depuis désaffectée.\r\nLe château du Theil comporte un étage carré et un étage en surcroît. Il comporte aussi un colombier circulaire.                                         THEIL à Valailles à cinq K.M au nord de Menneval.","architecture":"THEIL, est une construction datant du XVIIe siècle, en effet le corps de logis, plan symétrique, remanié et ensuite agrandi au XVIIIe siècle. Le château est composé dun bâtiment central à un étage carré et un étage en surcroît, auquel sajoutent deux pavillons carrés. Celui de droite abritait autrefois la chapelle, aujourd'hui désaffectée. Deux autres pavillons isolés le complètent. Colombier circulaire du XVIIIe siècle.                                                                                             ST LEGER de ROTES  est un château bâti à Saint-Léger-de-Rôtes, de conception classique, rectangulaire à deux niveaux et lucarnes sur combles.","habitants":"\"","divers":"St-Reger de Rotes GPS : 49° 7' 17,42\" Nord, 0° 40' 14,48\" Est                                                                                                       Theil    GPS : 49° 07' 22,9\" Nord, 0° 37' 06,8\" Est","gps":"49° 7' 17,42\" Nord, 0° 40' 14,48\" Est","images":["../image/image_27/27_Valailles_Theil_1.jpg","../image/image_27/27_Valailles_Theil_2.jpg"]},"Consult_chateau_formulaire8c2c":{"id":"Consult_chateau_formulaire8c2c","dept":"27","canton":"Le Neubourg","commune":"Hondouville","nom":"Valtier","type":"Château","periode":"XVIII","histoire":"VALTIER, le fief du Valtier est mentionné depuis 1195. En 1708, il ne paraît pas construit. Le château, de plan symétrique à un étage carré et un étage de comble, est édifié au XVIIIe siècle, les communs datent de cette époque. D'importantes reprises ont lieu en 1890, notamment l'agrandissement du corps de logis et la transformation de la tour sud en chapelle.","architecture":"VALTIER  à Hondouville, le fief du Valtier est mentionné depuis 1195. En 1708, il ne parait pas construit. Le château, de plan symétrique à un étage carré et un étage de comble, est édifié au XVIIIe siècle, les communs datent de cette époque. D'importantes reprises ont lieu en 1890, notamment l'agrandissement du corps de logis et la transformation de la tour sud en chapelle. Gros-oeuvre: calcaire,  brique avec pierre en remplissage,  toit à longs pans brisés ; croupe, ardoise ; tuile plate.","habitants":"Seigneur local\r\n        \"","divers":"Hondouville château de   Valtier","gps":"","images":["../image/image_27/27_Valtier_1.jpg"]},"Consult_chateau_formulairea109":{"id":"Consult_chateau_formulairea109","dept":"27","canton":"Romilly-sur-Andelle","commune":"Vascoeuil","nom":"Vascoeuil","type":"Château","periode":"XV-XVI","histoire":"VASCOEUIL, appartenait au duché de Longueville jusqu'en 1694 par la famille de Lorraine. À cette date, le dernier duc étant mort sans descendance, le roi de France s'appropria ses terres. Le fief de Vascuil appartint jusqu'en 1505 à la puissante famille de La Haye puis fut vendu au marchand rouennais, Guillaume Le Gras. Charles-Jean-François Hénault  En 1685-1770 seigneur de Vascoeuil et président au parlement de Paris, le château passe en 1774 à Charles de la Vigne dernier seigneur, à la Révolution échoit à Mme Poullain Dumesnil  veuve, son fils Alfred se lie en 1841 à Jules Michelet devenu son beau-père leur fille épouse un ancien élève  Elisée Reclus  géographe. Après la seconde guerre mondiale est racheté par un avocat parisien François Papillard avec son épouse soutien de l'association \"les amis de Vasoceuil et de Michelet\".\r\nLe musée Jules Michelet, historien français (1798-1874), où est reconstitué son cabinet de travail au sommet de la tour du château, où il écrivit \"Histoire de France\" et \"Histoire de la Révolution Française\".","architecture":"VASCOEUIL, dans son état actuel, le château de Vascoeuil conserve une structure typique de la fin du XVe siècle: les portes en anse de panier, la haute tourelle avec son escalier qui dessert les différents niveaux avec à lintérieur de belles cheminées. Son homogénéité et sa beauté lui sont données par lappareillage du rez-de-chaussée fait de grès local. Les ouvertures des façades ont été réalisées au XVIIe siècle pour que la lumière pénètre plus largement.  est un bon exemple de maisons nobles, édifiées en Normandie après la guerre de cent ans et il est ouvert au public. La restauration du château conduite avec beaucoup dintégrité est significative et le courant du passé vibre dans chaque pierre sans jamais laisser paraître le témoignage froid dune gloire effacée. Le château abrite un centre régional d'art et de culture, qui organise des expositions depuis 1970. Une galerie ouverte de sculptures dans le parc attenant, qui réunit une cinquantaine duvres originales (bronzes, marbres, céramiques, mosaïques) de Braque, Cocteau, Dali, Chemiakin, Vasarely, Volti.","habitants":"famille de La Haye\r\n        \"","divers":"Vascoeuil   GPS : 49° 26' 48,12\" Nord, 1° 22' 44,04\" Est","gps":"49° 26' 48,12\" Nord, 1° 22' 44,04\" Est","images":["../image/image_27/27_Vascoeuil_1.jpg","../image/image_27/27_Vascoeuil_2.jpg","../image/image_27/27_Vascoeuil_3.jpg"]},"Consult_chateau_formulaired79b":{"id":"Consult_chateau_formulaired79b","dept":"27","canton":"Gisors","commune":"Sainte-Marie-de-Vatimesnil","nom":"Vatimesnil","type":"Château","periode":"XIV-XIX","histoire":"VATIMESNIL,  Vatimesnil est un fief très ancien, dépendant de Provemont. Le premier seigneur connu est Geoffroy en 1195, puis Richard en 1250. De 1250 à 1420, Vatimesnil appartient à la famille Lebrun, comme Sainte-Marie-des-Champs. En 1420, la seigneurie de Vatimesnil fut confisquée par le roi d'Angleterre. En 1449, Vatimesnil appartenait à Guillaume de Cléraunay, en 1462 à Pierre de Cugnac, en 1522 à Barthélémy de l'Isle. Le 5 décembre 1601, Vatimesnil appartient à Claude Sublet et en 1626 à Claude Maillet, chevalier, et sa famille jusqu'en 1715. Vatimesnil fut vendu en 1715 à Pierre Georges Lefébure, conseiller du roi Louis XV, conseiller au parlement de Rouen, dernier seigneur féodal de Vatimesnil. Le fief de Vatimesnil était à l'époque divisé en deux : le Grand Saint-Martin et le Petit Saint-Martin. Entre 1715 et 1844, Vatimesnil a appartenu à la famille Lefébure puis à Pierre Henri de Vatimesnil. Le château, construit au milieu du XIXe siècle, possède un beau parc, des communs (dont des écuries) et un colombier.","architecture":"VATIMESNIL, le château, construit au milieu du XIXe siècle, possède un beau parc, des communs (dont des écuries) et un colombier. Il est visible de la route départementale 3 qui est venue séparer le château de sa chapelle. La chapelle du château fut inaugurée le 8 août 1878. Ses vitraux sont de facture de l'atelier Duhamel-Marette. Sa crypte contient les sépultures de dix-huit personnes dont sept portent le nom de Vatimesnil. Face au château à côté de la chapelle, l'orangerie est un lieu rêvé pour venir organiser vos réceptions.","habitants":"Famille de  Claude Maillet\r\n        \"","divers":"Vatimesnil","gps":"","images":["../image/image_27/27_Vatimesnil_1.jpg"]},"Consult_chateau_formulaire7fd5":{"id":"Consult_chateau_formulaire7fd5","dept":"27","canton":"Les Andelys","commune":"Mesnil-Verclives","nom":"Verclises_Mussegros","type":"Château","periode":"XVIII","histoire":"VERCLIVES,  les Vieilsmaisons sont cités à Verclives dès 1663. Le château est reconstruit par larchitecte Joseph-Abel Couture dit lAîné vers le milieu du XVIIIe siècle. De brique, orné déléments décoratifs en pierre, il se compose dun corps central encadré de deux ailes en retour. En 1768, Jean-Jacques-Philippe de Vieilsmaisons, ruiné, doit se séparer du domaine hérité de son père en 1761. Lacquéreur est Antoine Le Couteulx, président de la chambre des comptes de normandie. Lequel fait aménager le parc et construire un petit pavillon carré attenant à la façade du château pour y loger une chapelle dédiée à Saint-Antoine, dédicacée en octobre 1786 par le cardinal de La Rochefoucauld. En 1813, le baron dEmpire Bignon achète le château et fait construire en 1833 des communs à louest du domaine. En 1840, la voûte de loratoire est décorée dune Apothéose de Saint-Antoine peinte sur toile marouflée par Jules-Alexandre Duval Le Camus. En 1938, la ferme est séparée du château. Le parc paysager est en grande partie rendu à la culture,  le château commence à se dégrader avant dêtre restauré. Situé près dun point culminant, cet élégant château offre des deux côtés des vues lointaines vers le plateau du Vexin.  Éléments protégés MH : le décor intérieur de l'Oratoire : inscription par arrêté du 26 juin 1986.","architecture":"MUSSEGROS à deux K.M. au sud ouest à  Ecouis, le château, de plan symétrique, a été construit au XVIIIe siècle et appartenait à cette époque à Charles Paviot, procureur général à la chambre des comptes de Rouen, seigneur de Mussegros. Son fils, Charles Hyacinthe Paviot, chevalier de Bouillon et de Mussegros, était conseiller au parlement.  On retrouve son nom dans un rapport daté du 17 Juin 1723. La façade du château fut remaniée au début du premier quart du XIXe siècle, le portail porte la date 1804. Dans la demeure on peut voir une peinture murale assez curieuse qui représente une \"vue à vol d'oiseau\" du château et des environs. Dans le parc, aux belles allées de tilleuls, on peut voir quatre socles de statues, celles-ci évoquaient les quatre éléments: l'eau, la terre, l'air et le feu. Elles furent vendues par un marchand de biens au Métropolitain Muséum de New-York où elles sont encore visibles.","habitants":"Antoine Le Couteulx  Charles Paviot\r\n        \r\n        \"","divers":"Verclives   GPS : 49° 19' 08,76\" Nord, 1° 28' 07,32\" Est","gps":"49° 19' 08,76\" Nord, 1° 28' 07,32\" Est","images":["../image/image_27/27_Verclises_Mussegros_1.jpg","../image/image_27/27_Verclises_Mussegros_2.jpg"]},"Consult_chateau_formulairec790-2":{"id":"Consult_chateau_formulairec790-2","dept":"27","canton":"Breteuil   Verneuil d","commune":"Verneuil sur avre","nom":"Verneuil_sur_Avre","type":"Fort","periode":"XIII","histoire":"TOUR GRISE, en 1204, Philippe Auguste fait construire un second donjon, la « tour Grise » afin de surveiller la ville et accorde néanmoins des libertés municipales. En 1336, Philippe VI de Valois donne Verneuil à son frère Charles II, comte d'Alençon. En 1356, Henri de Grosmont, duc de Lancastre avec Philippe de Navarre s'emparent de la ville qu'ils pillent après s'en être emparés et de faire retraite vers le Cotentin. En 1417, la place se rend à Henri V d'Angleterre, qui par le traité de Troyes signé en 1420 devient l'héritier du royaume de France, dont Jean de Lancastre, duc de Bedford, entame la conquête. En 1424, les capitaines français parviennent à enlever par ruse la ville. Bedfort accourt d'Évreux et le 17 août 1424 il livre bataille au nord-est de la ville, dans la plaine de Saint-Denis et remporte la victoire. En 1429, Charles de Bourbon, réussit à réoccuper la ville quelques jours. En 1449, le gouverneur anglais de la ville, François de Surienne dit l'Aragonais, s'empare de Fougères donnant l'occasion à Charles VII de reprendre la reconquête de la Normandie. Par ruse, le 20 juillet 1449, Pierre de Brézé avec deux archers et l'aide du meunier Bertin investissent la ville. Les Anglais se réfugient dans le château et les français, après avoir vidé l'eau des douves, le prennent d'assaut. Le 23 août 1449 les derniers défenseurs anglais, enfermés dans la tour Grise se rendent et le 27 août 1449 Charles VII fait son entrée dans la ville. En 1584, la ville est du côté des ligueurs et Henri IV la reprend l'année suivante avant de la perdre aussitôt, reprise encore une fois par ruse, par le baron Pierre Rouxel de Médavy. En 1594, ce dernier fait sa soumission au roi et reste capitaine de la ville.","architecture":"Manoir du CLOS. restaurant relais-Châteaux. Le Clos est un magnifique manoir du XIXe siècle à Verneuil­  sur-Avre, aux portes de la Normandie,  la superbe façade à damiers et sa tourelle conçue par Violet Le Duc                                                                                             PUISAYE,  château XIXe siècle, de style Napoléon III    Diana et Bruno Costes ont acquis cet élégant château Napoléon III, qui date du XVIIIe siècle, en octobre 2002. Ils l'ont rénové entièrement, gardant l'esprit d'époque.  Le château de la Puisaye fut construit au XIXe siècle. Il vous est proposé ses chambres d'hôtes dans un cadre des plus agréables, au coeur d'un parc boisé, entre la Normandie et le Perche. Labellisé Gite de France.                                                                                                                     TOUR GRISE,  la célèbre tour Grise de Verneuil, donjon cylindrique de vingt-cinq mètres de hauteur, était indépendante du château de Verneuil qui formait avec Tillières-sur-Avre et Nonancourt un rideau défensif contre les éventuelles incursions en Normandie des comtes de Chartres. Philippe Auguste l'avait fait élever pour marquer sa domination sur la Normandie et le Thimerais. Propriété de la Commune.  Éléments protégés MH : la tour Grise en totalité, ainsi que les sols correspondant à lemprise de ses anciens fossés, compris dans un espace déterminé par une distance de 7,70 m à partir des murs de lédifice : classement par arrêté du 15 février 2016.","habitants":"Pierre de Brézé\r\n        \"","divers":"TOUR grise      Grav-1                                                                   Puisaye  grav-2-3-4   GPS : 48° 44' 22\" Nord, 0° 55' 43\" Est  \r\nClos grav 5-6","gps":"48° 44' 22\" Nord, 0° 55' 43\" Est","images":["../image/image_27/27_Verneuil_sur_Avre_1.jpg","../image/image_27/27_Verneuil_sur_Avre_2.jpg","../image/image_27/27_Verneuil_sur_Avre_3.jpg","../image/image_27/27_Verneuil_sur_Avre_4.jpg","../image/image_27/27_Verneuil_sur_Avre_5.jpg","../image/image_27/27_Verneuil_sur_Avre_6.jpg"]},"Consult_chateau_formulairee6b8":{"id":"Consult_chateau_formulairee6b8","dept":"27","canton":"Vernon","commune":"Vernon","nom":"Vernon_27","type":"Vestiges","periode":"XII_XV","histoire":"VERNON, . Des premières fortifications sont sans doute élevées à cette époque. Vers 1123, une tour carrée en pierre est élevée par Henri 1er Beauclerc, roi d'Angleterre et duc de Normandie, ayant une fonction à la fois résidentielle et militaire. En 1153, le Roi de France, Louis VII assiège la ville. Dans la deuxième moitié du XIIe siècle, le duc Henri II renforce ses défenses contre les assauts du roi de France, les courtines et les petites demi-tours pleines pourraient dater de cette époque. A la suite du traité de paix de 1196, Vernon entre dans le Royaume de France. Sous Philippe-Auguste, un donjon circulaire, à la fonction défensive, est bâti au Nord, dans l'alignement du pont, remplaçant le donjon roman. Isolé de la forteresse, il ne sera rattaché aux courtines qu'au XVe siècle.                                                                                                         TOUR des ARCHIVES , la construction primitive du donjon quadrangulaire remonterait à 1123. Il fut édifié par Henri Beauclerc, dernier fils de Guillaume le Conquérant. Plus tard, il sera remplacé par une tour ronde, haute de 22 mètres, sous Philippe Auguste. Elle est caractéristique aux édifices militaires construits par ce roi de France. C'est un des rares donjons circulaires existants en Normandie et qui est proche, au point de vue architecture, à la Tour Jeanne d'Arc à Rouen, édifiée peu après. La Tour des Archives a été classée aux M.H. depuis 1840. Donjon à toit conique en calcaire et moyen appareil d'une hauteur de 22, 20 mètres, d'un diamètre de 11, 60 mètres au sommet, d'une épaisseur de 3, 45 mètres à la base, propriété de la commune ; tour des farines en moyen appareil d'un diamètre de 6 mètres; portions de l'enceinte, tour des farines propriété privée.                                                          La MADELEINE château de style médiéval.","architecture":"VERNON  est construit à cheval sur l'enceinte de la ville, l'accès se fait par la porte sud, protégée par deux tours. L'enceinte, de forme oblongue et à pans coupés, entourée d'un fossé, sera plus tard renforcée de tours cylindriques. A la fin du XVe siècle, les progrès de l'artillerie entraînent d'importantes modifications : un bastion protège la partie Nord-Ouest de l'enceinte, vers la campagne. Dès la seconde moitié du XVIIe siècle, l'ensemble commence à tomber en ruines. En 1761, le maréchal de Belle Isle fief, le site du château aux habitants. En 1752, la création d'écuries pour les gardes françaises nécessite la destruction des bâtiments construits dans la cour du château (logis, communs) et d'une partie des courtines et du flanquement. Les écuries sont élevées dans la partie Ouest de la cour, le long de l'enceinte, la rue Neuve sépare la cour en deux parties. Le bâtiment en forme de fer à cheval comprenait un étage, et un fronton décorait la porte principale.  En 1791, la compagnie des gardes du corps du roi est dissolue et les écuries sont cédées à la ville qui les cèdera en 1819 au ministère de la guerre. Elles sont incendiées en 1940 et démolies en 1950. Les seuls vestiges du château subsistant aujourd'hui sont le donjon, quelques portions de l'enceinte.","habitants":"Henri Beauclerc,\r\n        \"","divers":"Vernon                                                                                                 Tour Archives  GPS : 49° 05' 40\" Nord, 1° 29\" 03\" Est                                         la Madeleine   GPS : 49° 05' 33\" Nord, 1° 29' 09\" Est","gps":"49° 05' 40\" Nord, 1° 29\" 03\" Est","images":["../image/image_27/27_Vernon_27_1.jpg","../image/image_27/27_Vernon_27_2.jpg"]},"Consult_chateau_formulaire57e1-2":{"id":"Consult_chateau_formulaire57e1-2","dept":"27","canton":"Vernon","commune":"Vernon","nom":"Vernon_Tourelle","type":"Château","periode":"XV-XVIII","histoire":"Deux châteaux dans cet article, Tourelles et Montigny. \r\nTOURELLES, le château des Tourelles date du Moyen-Age et constituait une tête de pont. Son rôle était de défendre Vernon située à la frontière du duché de Normandie avec le Royaume de France. L'édifice est constitué de quatre tours fortes. En 1984, un programme de restauration consiste à mettre en place une partie des pierres originelles conservées par nos aînés. Ainsi un moignon de tour d'une dizaine de mètres voit le jour. Pendant plus d'un an, les hommes de TERH ont remonté la tour manquante, dans l'esprit du XIIe siècle et avec le matériau d'origine, la pierre de Vernon, extraite des flancs de la vallée. Au total, ce sont environ trente mètres cubes de pierre qui ont été taillés à la main par des tailleurs de pierre. Les blocs sont scellés à la chaux grasse, matériau qui offre l'avantage d'une certaine élasticité. La seule différence par rapport à autrefois, la pierre est découpée en tranches par une machine avant d'être taillée à la main, comme au XIIe siècle, la partie intérieure de la tour a été lissée avec du ciment.  Éléments protégés MH : le donjon : classement par arrêté du 12 janvier 1945.","architecture":"En banlieus de Vernon au nord ouest,   MONTIGNY, château construit à côté de la chapelle Saint-Eustache et des terres de l'Hôtel Dieu de Vernon. La demeure actuelle est probablement édifiée au cours du XVIIIe siècle, puis remaniée au XIXe siècle (toiture). Le parc à la française est transformé en parc paysager après 1825. Sur le plan de 1827, le propriétaire est désigné comme étant M. Achille Le Boullenger; à la fin du XIXe siècle, le château est habité par le peintre Deroche, qui est le maire de Saint-Marcel. Château composé d'un corps de logis en brique et pierre ; toiture à longs pans brisés couverte d'ardoise; lucarne à croupe.","habitants":"M. Achille Le Boullenger\r\n        \"","divers":"Tourelles     Montigny.","gps":"","images":["../image/image_27/27_Vernon_Tourelles_1.jpg","../image/image_27/27_Vernon_Tourelles_2.jpg","../image/image_27/27_Vernon_Tourelles_3.jpg"]},"Consult_chateau_formulairee514":{"id":"Consult_chateau_formulairee514","dept":"27","canton":"Les Andelys","commune":"Vexin-sur-Epte","nom":"Vexin_sur_Epte","type":"Château","periode":"XVIII-XIX","histoire":"Trois  châteaux dans cet article Cahaignes, Berthenouville  en Vexin et Bois de Menez à Authevernes.                                                                                                                                                                                                                                     FOUR en VEXIN, au sud de Cahaignes  situé dans un beau parc de onze hectares, a  été construit au XIXe siècle. Il propose la location de salles pour réceptions. Une élévation ordonnancée à deux étages carrés, en calcaire, pierre de taille, couverture en  croupe, couvert d' ardoise.","architecture":"BERTHENOUVILLE,  la construction du château de Berthenonville date du XVIIIe au XIXe siècle. C'était un manoir au XVIIIe siècle. Il devint un château au XIXe siècle. Il a appartenu à Mr Blondel de Berthenonville, puis à la Famille Méry de Bellegarde qui en hérita. Le Château de Berthenonville est devenu, depuis, une propriété privée, fermée au Public. Sa protection est IGPC. Le château de Berthenonville se situe en direction de Vexin-sur-Epte.                                                                                                                             BOIS de NEMETZ,    à Authevernes  fut construit au XVIIIe siècle, puis remanié au XIXe siècle; le colombier est détruit. Elévation à travées  à un  un étage carré,  en  calcaire,  toit à longs pans, croupe. ardoise, parties non étudiées : parc, enclos, communs et parties agricoles.","habitants":"Mr Blondel de Berthenonville\r\n        \r\n        \"","divers":"Four en Vexin  grav 1-2                                                                     Bois en Menez grav-4                                                          Berthenouville   grav_5 GPS : 49° 11' 03\" Nord, 1° 39' 40\" Est                                Boislenement  grav-3   gps  49° 13' 09\" nord, 1° 38' 25\" est                               Cahaignes  GPS : 49° 12' 33\" Nord, 1° 36' 03\" Est","gps":"49° 11' 03\" Nord, 1° 39' 40\" Est","images":["../image/image_27/27_Vexin_sur_Epte_1.jpg","../image/image_27/27_Vexin_sur_Epte_2.jpg","../image/image_27/27_Vexin_sur_Epte_3.jpg","../image/image_27/27_Vexin_sur_Epte_4.jpg","../image/image_27/27_Vexin_sur_Epte_5.jpg"]},"Consult_chateau_formulaire461f":{"id":"Consult_chateau_formulaire461f","dept":"27","canton":"Pont-Audemer","commune":"Freuneuse sur risle","nom":"Vieuville_27","type":"Château","periode":"XVIII","histoire":"VIEUVILLE,  le château de Sainte-Honorine ou de Vieuville, construit au milieu du XVIIIe siècle, Vieuville est actuellement le siège dune société après avoir été la propriété des Naguet de Saint-Vulfran, des Arnois de Captot et plus lointainement, des Le Cerf de la Vieuville qui le firent édifier. Le château fut très endommagé il y a 50 ou 60 ans et a subi dimportantes restaurations qui lont sauvé dune disparition complète et lors des travaux dans le parc du château on a découvert des substructions gallo-romaines. Ce château de plan symétrique, est composé d'un étage carré, d'un sous-sol et étage de comble, élévation ordonnancée le tout recouvert d'ardoise.","architecture":"VIEUVILLE à Freneuse se situait sur le passage de la voie Gauloise qui allait de Rouen à Lisieux. Placé sous le patronage de Saint- Ouen, ce village faisait partie de la forêt du Vièvre donnée à Raoult d'Ivry pour avoir tué un ours. Son fils Jean, eut Freneuse dans son lot et il en fit don aux évêques d'Avranches. L'alliance de Mathilde de Freneuse avec Guillaume de la Mare fit passer aux seigneurs de la Mare-Gouvis à Sainte-Opportune, la seigneurie et le patronage de la paroisse de Freneuse qu'ils possédaient sous la suzeraineté des évêques d'Avranches. En 1541, le fief de Freneuse appartenait à Loyse de Bourbon, duchesse de Montpensier, princesse de la Roche-sur-Yon.","habitants":"Raoult d'Ivry                                                                                      Loyse de Bourbon\r\n        \r\n        \"","divers":"Vieuville grav-1                                                                           Freneuse grav 2-3","gps":"","images":["../image/image_27/27_Vieuville_27_1.jpg","../image/image_27/27_Vieuville_27_2.jpg","../image/image_27/27_Vieuville_27_3.jpg"]},"Consult_chateau_formulaire704b":{"id":"Consult_chateau_formulaire704b","dept":"27","canton":"Le Neubourg","commune":"Neubourg","nom":"Vieux_Neubourg","type":"Manoir","periode":"XV-XVIII","histoire":"VIEUX-NEUBOURG ;  Louis VII, dans lespoir de repousser un conflit avec les Anglais, y marie sa fille Marguerite de France avec Henri 1er Le Jeune en 1160. , le marquis de Sourdéac et du Neubourg, seigneur du lieu, fait représenter dans la grande salle la Toison d'Or de Corneille.  La partie du château Vieux appartient à la commune depuis 2014. Situé en centre-ville, à l'angle nord-est de la place Aristide Briand, l'ancien château bénéficie d'un cadre urbain valorisant avec ses constructions traditionnelles (briques, pans de bois) d'une grande homogénéité d'alignement et de gabarit. La place dispose d'une perspective vers l'église Saint-Paul Saint-Pierre, plus à l'Est.","architecture":"VIEUX-NEUBOURG, construit au XIe siècle, le château du Neubourg a joué un rôle militaire et historique de premier plan. En 1135, les seigneurs normands sy réunissent après la mort dHenri Ier Beauclerc pour lui désigner un successeur.  Cest pour cette cérémonie quest construite la grande salle du château, appelée ensuite Salle des Préaux. La place forte essuie plusieurs sièges au XIIe siècle jusqu'au rattachement de la Normandie à la France en 1204. Le château connaît de nouveaux assauts durant la guerre de cent ans puis lors de la Ligue. La maison Neuve, superbe corps de bâtiment à pans de bois, est construite en 1509. Les dernières actions contre la place ont lieu lors de la Fronde en 1649. Son rôle militaire est terminé lorsqu'en 1660, Cest pour cette cérémonie quest construite la grande salle du château, appelée ensuite Salle des Préaux.  A l'issue d'un long déclin, la partie est du château Vieux (donjon, chapelle) est détruite en 1782-83 pour agrandir la place du marché. Les vestiges du château Vieux et la maison Neuve attenante sont scindés en deux propriétés en 1843.","habitants":"marquis de Sourdéac\r\n        \"","divers":"Vieux Neubourg  GPS : 49° 08' 54,24\" Nord, 0° 53' 58,56\" Est","gps":"49° 08' 54,24\" Nord, 0° 53' 58,56\" Est","images":["../image/image_27/27_Vieux_Neubourg_1.jpg","../image/image_27/27_Vieux_Neubourg_2.jpg","../image/image_27/27_Vieux_Neubourg_3.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','27 — Eure'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
