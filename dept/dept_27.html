lic.  De la seconde moitié du XIe siècle, subsiste le clocher qui domine lédifice de sa noble simplicité reteuil Jardin public devint définitivement française en 1450 et, à dater de cette époque, connut un calme uniquement troublé par les grands remous qui secouèrent la France. Des travaux considérables entrepris au XIe siècle, Breteuil a conservé le bras forcé de lIton qui chemine lentement à travers la ville et létang, devenu réserve ornithologique. Il est situé au fond du très beau parc public dans un site ombragé et attrayant.","habitants":"seigneur locaux\r\n        \r\n        \"","divers":"Bretigny grav 1                                                                                  Breteuil grav 2","gps":"","images":["../image/image_27/27_Breteuil_Iton_1.jpg","../image/image_27/27_Breteuil_Iton_2.jpg"]},"Consult_chateau_formulaire7200":{"id":"Consult_chateau_formulaire7200","dept":"27","canton":"Saint-André-de-l","commune":"Marcilly sur eure","nom":"Breuil_Benoit","type":"Château","periode":"XII-XVI","histoire":"BREUIL-BENOIT, le château du Breuil-Benoit n'est pas inventorié. Est une construction de style Louis XIII en pierre et briques, baignée par de larges douves, dans le parc subsistent les ruines d'une abbaye cistercienne du XIIe siècle. En 1224. Après la famille de Marcilly, viennent les familles d'Estouteville, d'Alègre, du Fay et de Dyel. Antoine du Bosc fut le dernier seigneur de Marcilly. Des moines en 1140, détachés de l'abbaye du Breuil, allèrent fonder l'abbaye de Trappes. Propriété  du comte et de mademoiselle de Reisset.","architecture":"BREUIL-BENOIT, ancienne abbaye, est un remarquable ensemble conservant l'église du XIIe siècle. Parti en croisade, Guillaume de Marcilly, vaillant chrétien tombé aux mains des Sarrasins, craignit ne jamais revenir. La foi et la ruse lui permirent de recouvrer la liberté. Alors il offrit sa grande abbatiale au monastère, dont son père avait aidé à la fondation. Le Croisé mourut avant que cette église ne fût achevée et solennellement dédicacée,","habitants":"Famille de Guillaume de Marcilly\r\n        \"","divers":"Breuil-Benoit     GPS : 48° 48' 33,51\" Nord, 1° 21' 15,37\" Est","gps":"48° 48' 33,51\" Nord, 1° 21' 15,37\" Est","images":["../image/image_27/27_Breuil_Benoit_1.jpg","../image/image_27/27_Breuil_Benoit_2.jpg","../image/image_27/27_Breuil_Benoit_3.jpg","../image/image_27/27_Breuil_Benoit_4.jpg"]},"Consult_chateau_formulaire5c71":{"id":"Consult_chateau_formulaire5c71","dept":"27","canton":"Pacy-sur-Eure","commune":"Breuilpont","nom":"Breuilpont","type":"Château","periode":"XVI","histoire":"BREUILPONT, du premier château, il reste que la motte et doit dater d'Ascelin Goël. A la fin du XIVe siècle, Charles d'Ivry chercha a renforcer et ou construit le nouveau château, détruits par les hommes de Charles le Mauvais. Un second château fut construit par la suite sur la hauteur de gauche. Breuilpont, siège d'une importante seigneurie, appartenait aux seigneurs d'Ivry, puis à Diane de Poitiers. Elle changea fréquemment de mains au cours des siècles. En 1700, Louis Doublet, fermier général, racheta la châtellenie. On lui attribue la construction du château actuel qui domine le village, imposant édifice à un étage carré et comble à la Mansart en moellons enduits, constitué d'un corps central encadré d'ailes en saillie. L'édifice a été modifié ultérieurement avec mise en place d'un escalier d'honneur dans un pavillon hors oeuvre. C'est un vaste ensemble mis en place au XVIIIe siècle. Le Domaine de Breuilpont témoigne de l'organisation d'un domaine seigneurial aux XVIIIe-XIXe siècles, dont l'emprise foncière n'a pas été morcelée. Le château de Breuilpont est inscrit aux M.H. depuis le 13/02/2017.","architecture":"LOREY, imposant édifice à un étage carré et comble à la Mansart en moellons enduits, constitué d'un corps central encadré d'ailes en saillie. L'édifice a été modifié ultérieurement avec mise en place d'un escalier d'honneur dans un pavillon hors oeuvre. Après 1824 et l'acquisition par le comte de Talleyrand-Périgord, les salons sont remodelés. Redessiné à cette époque en jardin paysager, le parc conserve son mur d'enceinte, une glacière, un réseau hydraulique avec pièce d'eau et quelques essences intéressantes. Les communs en L, est un vaste ensemble mis en place au XVIIIe siècle. Le Domaine de Breuilpont témoigne de l'organisation seigneuriale aux XVIIIe-XIXe siècles, dont l'emprise foncière n'a pas été morcelée.                   Le château de LOREY , a appartenu à la Comtesse de Montgrillon. Il a fait l'objet d'une restauration en 1916 à 1920 par l'architecte Charles Adda. L'orangerie du château est devenue la mairie de la commune voisine de Villiers-en-Désuvre. Avant encore, Alfred de Musset avait noté que le Château de Lorey avait appartenu à Marie Taglioni.","habitants":"la Comtesse de Montgrillon\r\n        \"","divers":"Breuilpont grav-1-2  GPS : 48° 57' 47\" Nord, 1° 25' 41\" Est                            Lorey   grav--3-4     GPS : 48° 57' 50\" Nord, 1° 25' 38\" Est","gps":"48° 57' 47\" Nord, 1° 25' 41\" Est","images":["../image/image_27/27_Breuilpont_1.jpg","../image/image_27/27_Breuilpont_2.jpg","../image/image_27/27_Breuilpont_3.jpg","../image/image_27/27_Breuilpont_4.jpg"]},"Consult_chateau_formulaireca08":{"id":"Consult_chateau_formulaireca08","dept":"27","canton":"Breteuil","commune":"Broglie","nom":"Broglie","type":"Château","periode":"XVIII","histoire":"BROGLIE,  Il avait été attribué par Guillaume le Conquérant à l'un de ses compagnons d'armes, Henri II de Ferrières, qui avait pris une part active à la conquête de l'Angleterre. En 1071, délaissant le berceau ancestral de Ferrières-Saint-Hilaire, les premiers barons fossiers de Normandie, ainsi dénommés car ils avaient le droit d'ouvrir sur leurs terres des fosses à charbon et à minerai, s'installèrent à Chambrais. Le roi d'Angleterre, Jean sans Terre y résida en 1199 et à plusieurs reprises en 1203. Pendant la guerre de Cent ans, le château, qui était entre les mains des Anglais, fut repris à la fin du XIVe siècle, par les armées de Bertrand du Guesclin. Forcé de capituler une deuxième fois, en 1418, il fut libéré, 30 ans plus tard, par Jean d'Orléans, comte de Dunois, compagnon de Jeanne d'Arc. En 1589 les protestants et les ligueurs dévastèrent Chambrais ; le duc de Montpensier s'en empara en 1590. Par succession, la baronnie de Chambrais-Ferrières échut aux familles d'Arces, des Ursins et de Conflans. Elle fut acquise en 1653 par Charles Le comte de Nonant, frère du bâtisseur de Beaumesnil, et en 1682 par Simon Arnauld, marquis de Pomponne, ministre d'État sous Louis XIV, ami de la marquise de Sévigné. Simon Arnauld réaménagea le château féodal. Son fils, Nicolas Arnauld, vendit le domaine en 1716 à François Marie, comte de Broglie. Des perspectives de hêtres furent aménagées..","architecture":"BROGLIE, dominant la vallée, le château fut bâti sur les fondements d'une ancienne forteresse romaine, toujours propriété des Broglie, l'actuel château ne représente que la moitié de celui du XVIIIe siècle. Son pavillon d'entrée porte le nom de François Mérimée, intendant du maréchal de Broglie, grand père de l'écrivain et d'Augustin Fresnel. L'empereur Joseph II, en 1777, puis le futur tsar Paul 1er en 1782, vinrent à Broglie. Pillé et incendié sous la Révolution, il fut restauré vers 1820, par Victor de Broglie, qui aménagea les bibliothèques pour abriter les livres de Mme de Staël venus de Coppet. De nombreux ouvrages politiques et scientifiques furent ajoutés, l'ensemble constitue aujourd'hui une collection privée, unique en France, de soixante mille volumes. Éléments protégés MH : les façades et les toitures du château et des communs, le hall d'entrée, l'escalier avec sa cage et sa rampe, la chapelle, la bibliothèque des ministres, la bibliothèque de madame de Stael, le grand salon dit salon bleu, avec leur décor : inscription par arrêté du 25 février 1974.","habitants":"Famille de  Victor de Broglie\r\n        \"","divers":"Boglie     GPS : 49° 00' 31\" Nord, 0° 31' 35\" Est","gps":"49° 00' 31\" Nord, 0° 31' 35\" Est","images":["../image/image_27/27_Broglie_1.jpg"]},"Consult_chateau_formulairef334":{"id":"Consult_chateau_formulairef334","dept":"27","canton":"Pont-Audemer","commune":"Bestrot","nom":"Brumare","type":"Château","periode":"XVII","histoire":"BRUMARE, La construction du château de Brumare date du XVIIe et XIXe siècle. Le gros-oeuvre  date du XVIIe siècle, augmenté de la façade Sud, vers 1830, d'une galerie portique. Deux pavillons ont été rajoutés aux XIXe siècle. L'intérieur avec son salon chinois date du XVIIIe au XIXe siècle. Le château de Brumare est inscrit partiellement aux M.H. avec ses façades, toitures, chapelle salon chinois au rez-de-chaussée, ainsi que les Chambres situées au Nord-Ouest, au Nord-Est et au Sud-Est et le boudoir attenant à cette dernière, ainsi que la chambre du 1er étage, depuis le 13/03/1978,  est un château privé, fermé au Public.","architecture":"BRUMARE, fief cité en 1367, château construit dans la première moitié du XVIIe siècle  a eu de nombreux remaniements au XIXe siècle au niveau de la façade antérieure du rez-de-chaussée, de la toiture et des pavillons latéraux. Brumare est lun des plus beaux domaines du canton de Montfort sur Risle. Ce château, entouré de très belles hêtraies est un grand édifice blanc à deux étages surmontés de combles mansardés sordonnant de part et dautre dun haut pavillon central de trois étages et se terminant par deux pavillons de même hauteur. Une galerie vitrée a été ajoutée sur la façade sud au XIXe siècle. Dans le parc, une chapelle de XVIe siècle où lon conservait le cur dun Montmorency décapité sur ordre de Richelieu. Le château comporte un hall d'entrée, une galerie, deux salons, une bibliothèque, une salle à manger, un bureau, treize chambres, six salles de bain, une salle de jeux et quinze chambres secondaires, également de nombreuses dépendances dont une maison de régisseur, une sellerie et une maison de gardien. Le domaine possède un parc boisé qui met en valeur le château avec ses rhododendrons et ses grands alignements d'arbres. Des vues se dégagent sur les plaines cultivées alentours, en particulier vers le hameau des Chèvres, les champs ainsi que les lisières des hameaux voisins participent à ce cadre rural.  Éléments protégés MH : les façades et les toitures du château et de la chapelle, les pièces et leur décor,  inscription par arrêté du 13 mars 1978.","habitants":"Famille des Montmorency\r\n        \"","divers":"Brumare     GPS : 49° 20' 27\" Nord, 0° 40' 32\" Est","gps":"49° 20' 27\" Nord, 0° 40' 32\" Est","images":["../image/image_27/27_Brumare_1.jpg","../image/image_27/27_Brumare_2.jpg"]},"Consult_chateau_formulairea8e7":{"id":"Consult_chateau_formulairea8e7","dept":"27","canton":"Vernon","commune":"Douains","nom":"Brécourt","type":"Château","periode":"XVII-XVIII","histoire":"BRECOURT, la famille Jubert est propriétaire de la seigneurie de Brécourt de 1531 à 1706. Dès la fin du XVIe siècle, importants travaux menés par Henri Jubert, fils de Henri 1er et héritier de celui-ci : fossés épaulés en pierre de taille et peut-être construction d'une demeure plus importante venant remplacer l'ancien manoir. Château construit ou terminé vers 1625 par Jean Jubert, fils de Henri, sire de Brécourt et de Douains, conseiller au Grand Conseil, membre de la cour des Aides de Normandie. Propriétaires successifs : François de Monceaux, marquis d'Auxy ; famille Guésdier de Saint-Aubin ; Philippe Pottier, conseiller à la cour des Aides de Normandie. En 1688, Alphonse Jubert passe contrat pour la fondation de la chapelle ; la bénédiction a lieu le 9 novembre par le curé de Brécourt. En 1764, Nicolas Louis Jubert, marquis de Bouville devient propriétaire des fiefs de Douains et de Brécourt, faisant rentrer à nouveau celui-ci dans la famille Jubert. Château pillé le 13 juillet 1793, lors de la bataille de Brécourt, dite \"bataille sans larmes\" ; vendu comme bien national le 16 fructidor an VII. Au XIXe siècle, le château est en la possession du marquis de Pérignon, maréchal d'Empire, puis de sa famille, jusqu'en 1903. Plusieurs propriétaires se succèdent au XXe siècle. Pendant la seconde guerre mondiale, le château est occupé et bombardé ; en 1952, le parc est dépecé. En 1979, il est transformé en hôtel-restaurant de luxe.","architecture":"BRECOURT, au XVIIIe siècle, des pavillons sont construits sur la cour d'honneur, dans l'alignement des deux pavillons d'angle du corps de logis ; côté Est, ils se terminent chacun par une tour ronde couronnée d'un toit en poivrière dont la base plonge dans les douves. Au XIXe siècle, ces bâtiments sont reliés au bâtiment principal par deux ailes à loggias qui rappellent le style du château. La cour d'honneur est précédée d'une avant-cour plantée d'une double rangée de tilleuls. Côté Ouest, les douves sont couronnées par une balustrade en pierre taillée seule la façade est épargnée.  Les briques qui servirent à la construction du château proviennent peut-être du lieu-dit \"La Briqueterie\", visible sur le cadastre ancien. Au XIXe siècle, le parc est transformé en parc paysager. Corps de logis central de plan rectangulaire flanqué de deux pavillons symétriques d'une toiture plus élevée ; l'ensemble, construit à la limite du premier et du deuxième quart du XVIIe siècle, est orné, aux angles de l'élévation Ouest, de tourelles en encorbellement avec des dessins en brique rose et en brique vernissée (trois sur quatre subsistent, dont deux intactes) ; communs de la cour d'honneur du XVIIIe siècle.","habitants":"famille Jubert \r\n        \r\n        \"","divers":"Brecourt     GPS : 49° 03' 06,48\" Nord, 1° 25' 26,04\" Est","gps":"49° 03' 06,48\" Nord, 1° 25' 26,04\" Est","images":["../image/image_27/27_Br%c3%a9court_1.jpg","../image/image_27/27_Br%c3%a9court_2.jpg","../image/image_27/27_Br%c3%a9court_3.jpg","../image/image_27/27_Br%c3%a9court_4.jpg","../image/image_27/27_Br%c3%a9court_5.jpg","../image/image_27/27_Br%c3%a9court_6.jpg"]},"Consult_chateau_formulaire08aa":{"id":"Consult_chateau_formulaire08aa","dept":"27","canton":"Pacy-sur-Eure","commune":"Saint-Aquilin-de-Pacy","nom":"Buisson_de_Mai","type":"Château","periode":"XVIII","histoire":"BUISSON de MAI, la seigneurie du Buisson de May est attestée depuis le XVe siècle. Elle appartint pendant environ 300 ans à la famille de Bordeaux, notable de Vernon. Situé à proximité d'un ancien logis seigneurial, le château et le parc ont été réalisés par Jacques-Denis Antoine, architecte de l'Académie Royale, en 1781. en 1792   au sieur le Caron de Fleurey, en 1802, cédé à un gentilhomme Henry de Chastenay de Lanty, en 1807  au baron de Saint-Albin, en 1830 passe au comte François Gaspard d'Onsembray auquel succèdent en 1872 Georges Degrand et vingt ans plus tard au banquier Fernand Berson.  En 1926 le domaine est cédé à M. labey  L'édifice a connu quelques transformations au XIXe siècle et différents usages durant le XXe siècle (colonie de vacances, hôpital militaire, etc.). Apparenté au mouvement néo-classique. Et en 1999 acquit par les propriétaire actuels  M.Mme Servant.","architecture":"BUISSON de MAI, le château présente un corps de logis  central presque carrée, cantonné aux angles par quatre pavillons en saillie au toits symétriques surmontés de clochetons. L'austérité des façades en brique ou enduites met en valeur les frontons des ouvertures, les bossages en pierre aux arêtes des murs. L'aménagement du parc (hémicycles, perspectives en patte d'oie) renforce la monumentalité du site., le château a conservé ses vues lointaines, qui, au travers des bois environnant, ouvrent sur des paysages de plaines, l'accès d'origine a été tracé en diagonale par l'architecte afin de découvrir le château vu de trois-quart.Éléments protégés MH : le château, les esplanades en hémicycle avec leurs murs de soutènement, les douves et le pont d'accès, les alignements en patte d'oie au nord et les perspectives : classement par arrêté du 10 février 1994.","habitants":"Famille de Bordeaux\r\n        \r\n        \"","divers":"Buisson de Mai      GPS : 49° 00'31,01\" Nord, 1° 19' 46,5\" Est","gps":"49° 00'31,01\" Nord, 1° 19' 46,5\" Est","images":["../image/image_27/27_Buisson_de_Mai_1.jpg","../image/image_27/27_Buisson_de_Mai_2.jpg","../image/image_27/27_Buisson_de_Mai_3.jpg","../image/image_27/27_Buisson_de_Mai_4.jpg"]},"Consult_chateau_formulaire5575":{"id":"Consult_chateau_formulaire5575","dept":"27","canton":"Les Andelys","commune":"Daubeuf-près-Vatteville","nom":"Buspins","type":"Château","periode":"XVII","histoire":"BUSPINS, le château est une ancienne seigneurie qui appartint au chevalier Esmes Chauvin marié à Louise de la Motte, descendante de la gent d'Annebaut qui tenait, au XIIIe siècle, un fief à Daubeuf, relevant de l'archevêque de Rouen. Il est probable qu'elle fut bâtie par Enguerrand d'Annebaut en 1206. En 1548  propriété du chevalier Esmes Chauvin seigneur de Longchamp et de Boisguilbert. On trouve son cousin  en 1556, à la tête de la propriété Jacques Tiercelin, qui le légua à son fils  Anne Tiercelin, elle passa ensuite aux mains de la famille de Roncherolles, capitaine des carabiniers dans le régiment du roi et seigneur de Daubeuf  qui fut à l'origine de la construction de la demeure actuelle. En 1789 le château est vendu à Joachim Jean-Pierre  de la Barre de Nanteuil  qui émmigra,  récupère ses biens  après la Révolution mais le cède à  Marie-Sophie-Ursule de Rouville qui le vendit à Jean-François Cousturier de Courcy. Possédé par la famille Lefèvre-Pontalis, Jean-Pierre Gredy en fit l'acquisition.  Après être passé de mains en mains, Maurice-Ernest Michon le vend en 1919 par Louis Renault qui en fit une ferme importante de son domaine de la Boucle. En 1988 l'édifice fut acquis par la SCI Les Buspins, superbement remis en état et désormais ouvert à une activité de séminaires et réceptions.","architecture":"BUSPINS,  la construction du château des Buspins date de XVIIe siècle. Il est édifié tout en longueur avec la chapelle attenante et le colombier, le parc et les bâtiments agricoles contigus. Il est construit en vieilles briques avec des encadrements, alternant la pierre de taille et la brique. Le toit, recouvert d'ardoises, est à deux-eaux ouvert de lucarnes en chiens-assis et de frontons triangulaires alternés.  Un château-fort s'y élevait. Une chapelle est édifiée au XVe siècle dans la seconde moitié du XVIIe siècle. Le 9/07/1817,  pendant la guerre, il le mit à la disposition du comité Social des Usines Renault pour y recueillir les enfants des sinistrés. La SCI les Buspins racheta le château et le remit en état.","habitants":"Famille de Roncherolles\r\n        \"","divers":"Buspins      GPS : 49° 14' 57\" Nord, 1° 17' 51\" Est","gps":"49° 14' 57\" Nord, 1° 17' 51\" Est","images":["../image/image_27/27_Buspins_1.jpg","../image/image_27/27_Buspins_2.jpg"]},"Consult_chateau_formulaireb58f":{"id":"Consult_chateau_formulaireb58f","dept":"27","canton":"Romilly-sur-Andelle","commune":"le Tronquay","nom":"Bâtiment_Brulins","type":"Manoir","periode":"XVI","histoire":"BATIMENT, le manoir du Bâtiment date de la 2ème moitié du XVIe siècle. C'est un édifice figurant sur un plan du XVIIIe siècle et appartenant, à cette époque, à la famille de Limoges, dont 2 membres furent abbés de l'Isle-Dieu. Il existe plusieurs fermes-manoirs sur la commune à découvrir dont  Célestins, du Bâtiment, de la Garenne ou encore  des Brûlins.                                                                                                                BRULINS, il date du XVIe siècle. Il est situé aux Brûlins, hameau au sud-ouest du territoire communal, près des hameaux de la Grand-Fray et du Bâtiment. Ce nom indiquerait qu'un incendie aurait détruit une partie de la forêt sur laquelle le nouveau fief allait être installé. L'existence du fief est attesté en 1588. Le propriétaire, Martin Anquetil, procureur du roi au Parlement, demande la construction d'un colombier à pied. A la fin du XVIe siècle, début XVIIe siècle, il passe à la famille Hallé. Milieu XVIIe siècle, il devient la propriété de Robert Dieupart, pour appartenir à M. de Limoges au XVIIIe siècle.","architecture":"BATIMENT,  le logis a conservé quelques éléments du XVIe siècle et possède une élévation à travées. L'entrée se fait par l'Ouest. Au Nord, se trouve la charretterie. Le logis de plan rectangulaire se trouve en partie centrale, sur le côté Est. Il comporte un rez-de-chaussée, un étage carré et un comble à surcroit. Au sud du logis se trouve la grange. L'angle Sud-Est est marqué par la présence d'une mare. Le bâtiment au Sud pourrait être un ancien pressoir. Situé dans la plaine, le Bâtiment se compose d'un ensemble de bâtiments autour d'une grande cour rectangulaire, entourée d'un alignement d'arbres et de fossés clôturant le site.                                   BRULINS, le logis est remanié au XVIIIe siècle (corbeau portant la date 1754). La grange porte la date 1827. Le manoir présente la particularité aujourd'hui de voir un mur en brique diviser l'ancienne cour d'honneur à l'aplomb de sa travée d'axe. Les bâtiments en brique sont disposés autour d'une grande cour carrée, sur un terrain plat. Le manoir, au Sud, se compose d'un corps principal rectangulaire à un rez-de-chaussée avec étage carré et comble, encadré par deux pavillons placés aux angles côté cour d'honneur. Couvert de tuiles, le manoir des Brûlins a été entièrement construit en brique. Seuls les angles des corniches et les meurtrières ébrasées à redans sur les pavillons sont en pierre calcaire.","habitants":"Famille de Limoges                                                                                Famille de  Martin Anquetil\r\n        \r\n        \"","divers":"Batiment       GPS : 49° 25' 50\" Nord, 1° 27' 00\" Est                                 Brulins     GPS : 49° 25' 37\" Nord, 1° 28' 46\" Est","gps":"49° 25' 50\" Nord, 1° 27' 00\" Est","images":["../image/image_27/27_Batiment_Brulins_1.jpg","../image/image_27/27_Batiment_Brulins_2.jpg","../image/image_27/27_Batiment_Brulins_3.jpg"]},"Consult_chateau_formulairecc8c":{"id":"Consult_chateau_formulairecc8c","dept":"27","canton":"Ecos","commune":"Cahaignes","nom":"Cahaignes","type":"Château","periode":"XII","histoire":"Deux châteaux dans cet article, Cahaignes et Roquencourt. CAHAIGNES,  dit aussi des singes, a été construit au XVIIe siècle. Le château des Singes porte ce nom suite aux «singeries » formant les décors sur les boiseries, mais il fut aussi appelé le « château la Folie » en allusion aux décorations, de style rococo, en vogue au XVIIIe siècle, est une ancienne maison de repos en ruine, abandonnée par son ancien propriétaire. Longtemps laissé à l'abandon, fin 2014,  a trouvé un nouvel acquéreur qui a décidé de le remettre en état.  cest pourtant seulement à partir de la fin du XIXe siècle que les premiers propriétaires furent répertoriés, ce jusquà la moitié du XXe siècle. En 1897, il a appartenu à la comtesse de Bois de Nemetz, puis au comte et la comtesse de Cornulier. En 1875, le comte de Bois de Nemetz, unique représentant du nom, résidait au château de Cahaignes, près les Andelys  et au château de Montmiry-le-Château, par Moissey, dans le département du Jura. Henri-Marie-Edmond-Toussaint, né le 18/12/1849 à Caen, comte De Cornulier, fait la campagne de 1870-1871 dans la garde nationale mobile du Calvados. Il fut nommé sous-lieutenant dans la cavalerie de réserve le 25/05/1875. Il épouse à Paris, le 27/10/1877, Jeanne Daniel de Boisdenemets, fille d'Armand-Léopold Daniel, comte de Boisdenemets, et de Sophie-Caroline de Metz. appartiendra en 1899 au comte Henri de Cornulier, propriétaire-éleveur à la Ville-l'Evèque. Puis il ira à la famille Les Thilliers-en-Vexin. En 1931, il ira dans les mains du comte de Cornulier. Et en 1935, il appartiendra à la comtesse de Cussy.","architecture":"CAHAIGNES-SINGES, son avant dernier propriétaire abandonnera en état son château, ruiné et en raison de son age avancé. C'est à la fin de décembre 2014 que le château des Singes fut racheté, a été classé aux M.H. en 1953. Son dernier propriétaire Ernest Hubert Jean Picot s'est trouvé dans l'impossibilité définitive de l'entretenir à la suite de son départ en maison de repos. Il aurait trouvé un acquéreur fin 2014 , est classé aux M.H. depuis 1953.                                                                                                                                ROQUENCOURT,  le domaine devient ensuite la propriété de grandes familles comme les Thumery en 1475, les Blondel en 1570, les Sanguin en 1584, les Chantemelle en 1734 et enfin les La Faye en 1771. Pierre Julien de La Faye, conseiller du roi, et dernier seigneur de Rocquencourt, vend le domaine à Monsieur, frère du roi, comte de Provence, tandis que Louis XVI acquiert la seigneurie.Cette grande demeure classique est achetée en 1824 par la duchesse de Corrigliano, nièce du roi Murat. Elle la vend en 1829 au banquier Fould.  Sa petite-fille, Mme Furtado-Heine, fait aménager un parc où elle reçoit le tout-Paris.  À son décès, la propriété échoit aux Murat, et Cécile Ney, princesse Murat, en est la dernière propriétaire. Le château fort des origines, édifié sur le promontoire dominant la vallée, est remplacé par un édifice occupé par madame de Provence   la construction  date du XIXe siècle. Le château a été transformé, par le propriétaire, en chambres d'hôtes agréables. Vous serez logé dans un cadre magnifique et apprécierez le petit déjeuner raffiné et copieux.","habitants":"Comte et la Comtesse de Cornulier\r\n        \"","divers":"Cahaignes grac_1_2_3   GPS : 49° 12' 33\" Nord, 1° 36' 03\" Est                                                                                        Roquencourt  grav-5     GPS : 49° 12' 33\" Nord, 1° 36' 03\" Est","gps":"49° 12' 33\" Nord, 1° 36' 03\" Est","images":["../image/image_27/27_Cahaignes_1.jpg","../image/image_27/27_Cahaignes_2.jpg","../image/image_27/27_Cahaignes_3.jpg","../image/image_27/27_Cahaignes_4.jpg","../image/image_27/27_Cahaignes_5.jpg","../image/image_27/27_Cahaignes_6.jpg"]},"Consult_chateau_formulairea509":{"id":"Consult_chateau_formulairea509","dept":"27","canton":"Val de Reuil","commune":"Amfreville-sous-les-Monts,","nom":"Canteloup","type":"Château","periode":"XVII","histoire":"CANTELOUP, une chapelle occupait le site dès la fin du XIIe siècle. La construction du château actuel entre 1610 et 1632 est attribuée à Jacques Hallé, premier échevin de Rouen.","architecture":"CANTELOUP, l'édifice présente un corps de logis rectangulaire à deux étages, cantonné aux angles par quatre poivrières. Un soubassement et des chaînes en pierres de taille structurent les façades en briques. La silhouette gracieuse du château est accentuée par la toiture haute en ardoises et par la couverture effilée des tourelles. Un clocheton et des lucarnes complètent les toitures. La chapelle et les communs datent également du XVIIe siècle. Au début du XXe siècle, un incendie détruit les combles du château. A ce sinistre succède la dégradation des intérieurs par les troupes d'occupation en  1940-1944. Après la guerre, l'édifice est divisé en logement pour le personnel de la verrerie de Romilly. Depuis 1960, le domaine a bénéficié de restaurations qui l'ont mis en valeur. Situé au bord d'un ancien bras asséché de la Seine, le château possède un cadre boisé avec son parc arboré et le coteau voisin. Le domaine donne des vues sur les champs en bord de Seine, ainsi que sur les hameaux de Canteloup et du Val Pitant. Malgré la proximité de l'écluse de Pose-Amfreville, l'environnement a conservé un cadre rural préservé.                       Éléments protégés MH : les façades et les toitures et les parties suivantes à l'intérieur: le rez-de-chaussée et l'escalier, le cellier (en sous-sol du chemin de Romilly sur Andelle, la chapelle et le commun sud-est: inscription par arrêté du 2 décembre 1997.","habitants":"Personnels de la verrerie\r\n        \"","divers":"Canteloup     GPS : 49° 18' 48,6\" Nord, 1° 14' 37,32\" Est","gps":"49° 18' 48,6\" Nord, 1° 14' 37,32\" Est","images":["../image/image_27/27_Canteloup_1.jpg","../image/image_27/27_Canteloup_2.jpg"]},"Consult_chateau_formulaire76cd-2":{"id":"Consult_chateau_formulaire76cd-2","dept":"27","canton":"Brionne","commune":"Carsix","nom":"Carsix_Bigard","type":"Château","periode":"XVIII","histoire":"Deux châteaux dans cet article Carsix et Bigard.                                           CARSIX, le château de Carsix fut construit à la fin du règne de Louis XV par Philippe du Faÿ. Il allie le charme dun emplacement champêtre à la noblesse dune construction en briques et pierres du XVIIIe siècle.                                                                 A six K.M à l'Est à Nassandres château de BIGARD  du XVIIIe siècle, sa construction date de la 2e moitié du XVIIIe siècle. Il est composé d'un étage carré et d'un étage de comble, il est privé. Il y a un autre château fort, appelé le château de Nassandres au lieu-dit La Rivière-Thibouville. Il est mentionné la prise du château, en 1417, au Duc de Clarence, puis à nouveau, en 1590, par les Ligueurs. Il était composé, en 1726, avec ses murailles, ses grands fossés, son pont levis et sa basse-cour. La chapelle Saint-Nicolas est la seule partie subsistante, transformée en salle des fêtes. Seule, la chapelle Saint-Nicolas subsiste.","architecture":"CARSIX, avec sa chapelle et les pavillons latéraux, le château est précédé dune large perspective encadrée de tilleuls. Les armoiries de la famille du Faÿ ornent le fronton de la grille dentrée qui mène au château et pendant plusieurs générations, il resta en leur possession. Avec plus de 1000 m² de surface dans le bâtiment principal, le château comprend 20 chambres et de magnifiques salons de réceptions au rez-de-chaussée. Entièrement restauré en 2009 dans le plus pur respect de la tradition du XVIIIe siècle, la demeure offre calme et sérénité où chaque meuble, tapisserie, cheminée a été choisi avec soin.","habitants":"Carsix; Famille de Philippe du Faÿ                                               Bigard; famille du Duc de Clarence\r\n        \r\n        \"","divers":"Carsix    GPS : 49° 08' 30,84\" Nord, 0° 40' 01,47\" Est                 Bigard,    GPS : 49° 07' 39\" Nord, 0° 44' 08\" Est","gps":"49° 08' 30,84\" Nord, 0° 40' 01,47\" Est                 Bigar","images":["../image/image_27/27_Carsix_Bigard_1.jpg","../image/image_27/27_Carsix_Bigard_2.jpg"]},"Consult_chateau_formulaire45bb":{"id":"Consult_chateau_formulaire45bb","dept":"27","canton":"Pacy-sur-Eure","commune":"St_Pierre de Cernières","nom":"Cernières","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article; Cernières et Gauville.                    CERNIERES,  situé sur un ancien site médiéval, le château a été construit au XVIIe siècle (aile est-ouest), puis agrandi au XVIIIe siècle par l'adjonction d'une aile en retour, orientée nord-sud. L'édifice, inspiré par le classicisme français, présente des façades rythmées par des chaînes en pierre avec un remplissage de briques polychromes formant un motif losangé. Le domaine est largement modifié entre 1870 et 1900, selon un style normand vernaculaire. Les transformations, dirigés par l'architecte Delarue, ont surtout concerné la recomposition des façades (galeries à pans de bois, moellons), la surélévation des toitures, et la construction de tours d'escalier. Des communs (écuries et colombier octogonal) ont été bâtis avec un appareillage en damier de briques polychromes et de moellons en silex. Le parc a été réalisé par Georges Aumont. Édifié à flanc de colline, le domaine ouvre à l'Ouest sur un paysage vallonné par un cours d'eau, mêlant prairies et bois, tandis qu'à l'Est, l'avenue plantée d'arbres cadre sur la plaine. Le village, au Nord, a également une grande valeur patrimoniale (église, lavoir). Éléments protégés MH : les façades et les toitures du château, les fossés qui l'entourent, le colombier et les communs, le portail d'honneur et l'avenue d'accès : inscription par arrêté du 15 décembre 2005. La propriétaire des lieux, Isabelle de Colombe.","architecture":"GAUVILLE, la construction du château est datée des XVIIe-XVIIIe siècles. L'allée centrale et la grille ouvrent une perspective lointaine sur la plaine à l'Ouest, tandis que le reste de la propriété est bordée par des alignements d'arbres. Les façades sont largement composées de briques qui soulignent les quelques éléments architecturaux en pierre de taille (soubassement, corniches, frontons, etc.). Le calepinage de la brique forme des ornements (tables, arcs des ouvertures, etc.), et imite des formes plutôt mises en oeuvre pour la pierre (bossages). Les façades d'une grande sobriété, sont surmontées par une toiture en ardoises avec lucarnes. La brique est également utilisée pour le colombier circulaire, ainsi que pour les communs du château, où elle est associée à des moellons de pierre ou un enduit. Cette utilisation répétée d'un même matériau selon des formes variées, donne au domaine une grande cohérence architecturale. Le parc est aménagé avec des douves formant une cour d'honneur, et des ponts, bordés par une balustrade en briques.Éléments protégés MH : le château en totalité avec sa cour d'honneur et ses douves, les bâtiments des communs situés de part et d'autre de l'allée centrale et le pigeonnier : inscription par arrêté du 14 septembre 1964.","habitants":"Cernieres Famille d'Isabelle de Colombe                         \r\n        \"","divers":"Cernières  Gauville    grav-5    Cernières GPS : 48° 56' 47\" Nord, 0° 30' 59\" Est","gps":"48° 56' 47\" Nord, 0° 30' 59\" Est","images":["../image/image_27/27_Cerni%c3%a8res_1.jpg","../image/image_27/27_Cerni%c3%a8res_2.jpg","../image/image_27/27_Cerni%c3%a8res_3.jpg","../image/image_27/27_Cerni%c3%a8res_4.jpg","../image/image_27/27_Cerni%c3%a8res_5.jpg"]},"Consult_chateau_formulaire0e45":{"id":"Consult_chateau_formulaire0e45","dept":"27","canton":"Pacy-sur-Eure","commune":"Chambray-sur -eure","nom":"Chambray_27","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article Chambray et  3 Km nord à Anthieu château de la Boulaie.                                                                 CHAMBRAY, château bâti au XVIIe siècle par le comte de Louviers, au XVIIe siècle, Mme Deshoulières, la poétesse y séjourne. Parmi les propriétaires successifs figurent la famille de Grimouville, la famille de Hanivel, passa par alliance aux Clermont Tonnerre, par héritage aux Croy, propriété de la marquise de Tourzel née Croy d'Havré, gouvernante des enfants du roi Louis XVI, puis la duchesse de Lorges et enfin la famille de Croy. Fut pillé à la Révolution.","architecture":"CHAMBRAY,  peut être à partir d'éléments plus anciens. Les dépendances (communs) datent du XVIIIe siècle. Le logis est très remanié au XIXe siècle, puis au début du XXe siècle, l'architecte Lisch le restaure et l'agrandit par l'ajout d'un pavillon de plan carré au Nord-Est. Le jardin régulier visible sur le plan du XVIIIe siècle est devenu jardin irrégulier par la suite.  Château en brique et meollons enduits couvert de toits en pavillons en ardoise. La cour des communs est formée de deux bâtiments perpendiculaires; bâtiment avec pavillon central et ailes latérales à arcades. Aile en retour à arcade avec écuries et remises ; communs en moellons enduits avec entourage des baies, angles, frontons et cordons en brique apparente ; toit à longs pans brisés en tuile plate (partie classée) ; pavillon dit conciergerie, peut-être à usage d'orangerie et église dite chapelle, en moellons enduits et chaînes de brique couvertes en tuile plate ; élévation intérieure de la chapelle avec tribune fermée par une balustrade convexe ; grille en fer forgé ouvrant sur la cour des communs ; pont dit pont de Tourzel dans le parc en brique et pierre. Parc boisé (garenne) et petit parc créé au XVIIIe siècle avec parterres de jardin, bosquets et rond-points.                                                                                                                               LA BOULAIE ,de 1599 mentionnant le château entouré d'eau, tel qu'il figure sur le cadastre de 1829. Seuls subsistent le manoir et le colombier construits  dans la première moitié du XVIIIe siècle, à élévation ordonnancée, un étage carré et étage de comble avec  escalier dans-oeuvre. Gros-oeuvre : calcaire ; brique ; brique avec pierre en remplissage ; moellon ; enduit partiel : toit à longs pans ; croupe. Tuile plate.","habitants":"Famille de Hanivel\r\n        \r\n        \"","divers":"Chambray 1 à 3                                                                            La Boulaie.   Grav 4-5","gps":"","images":["../image/image_27/27_Chambray_27_1.jpg","../image/image_27/27_Chambray_27_2.jpg","../image/image_27/27_Chambray_27_3.jpg","../image/image_27/27_Chambray_27_4.jpg","../image/image_27/27_Chambray_27_5.jpg"]},"Consult_chateau_formulaireb22d":{"id":"Consult_chateau_formulaireb22d","dept":"27","canton":"Pacy-sur-Eure","commune":"Gouville","nom":"Chambray_Gouville","type":"Château","periode":"XV-XVI","histoire":"CHAMBRAY, de l'oeuvre de Jean III et de son fils Jean IV,  La conception par le Baron Gabriel de Chambray, seigneur de Chambray en 1560, date de 1578, année de son mariage avec Jeanne dAngennes, les travaux ont commencé vers 1590 à lépoque dHenri IV. La demeure du XVe siècle existait encore et servait dhabitation. Sous Louis XIV, cest Nicolas-François de Chambray qui termine le château au début du XVIIIe siècle, pour la partie Est et achève la démolition de la demeure du XVe siècle,  enfin les deux Jacques de Chambray, grand-père et petit-fils au XIXe siècle : le marquis Jacques Ier dit le Chouan (1754-1836), petit-fils de Nicolas-François, dernier fils du marquis agronome Louis (1713-1783) et frère puîné du général-marquis Louis-François (1737-1807), fut le père du général-marquis Georges (1783-1848) et le grand-père du marquis Jacques II François alias le Grand Veneur (1828-1910 ; sans postérité)  Il reconstitue le domaine et restaure le château dont lintérieur a été dévasté. Entre 1810 et 1825, il fait bâtir la ferme du château, le pressoir et les fermes dAigremont en 1821, du Cormier en 1825 et le moulin de Varenne en 1825. Entre 1870 et 1885, Jacques de Chambray dit le Grand Veneur fait édifier la tour circulaire Nord-Est. En 1944, le dernier marquis de Chambray, Simon III (1874-1948 ; petit-cousin du Grand Veneur), fit don du domaine à l'État pour accueillir un lycée agricole en mémoire de son fils, Édouard de Chambray, né en 1912 et tué au combat le 13 mai 1940 en Belgique Nicolas François fait raser les courtines des côtés sud et ouest pour dégager les vues du château.","architecture":"CHAMBRAY,  de 1450 à 1500, ne reste visible que la poterne dentrée ouest et des tours rondes, elles formaient une enceinte fermée par des courtines. Au bout dune des allées, il éleva la chartreuse en 1740,  Elle fut détruite au XVIIIe siècle. La façade est représentative des constructions de la fin du XVIe siècle, maçonnerie de briques rouges avec baies. Lescalier central à lintérieur est également très caractéristique de toute la renaissance française avec des fenêtres secondaires à meneaux cruciformes.  où il se retira pour les dix dernières années de sa vie, après la mort tragique dun de ses fils. Jacques de Chambray ayant participé aux guerres de la chouannerie et servi sous Bonaparte rentre à Chambray en 1803. Il reconstitue le domaine et restaure le château dont lintérieur a été dévasté.  le pavillon dangle Nord-Ouest et les pavillons dangle encadrant la façade sud quil fait orner de hautes lucarnes à meneaux en 1835. La mort du dernier héritier mâle de cette lignée des de Chambray va bouleverser la destinée du château, les parents en hommage à leur fils Edouard  céderont le domaine à l'état français en 1944.","habitants":"Famille de Nicolas-François de Chambray\r\n        \"","divers":"Chambray à Gouville      GPS : 48° 50' 26,2\" Nord, 1° 0' 22,56\" Est","gps":"48° 50' 26,2\" Nord, 1° 0' 22,56\" Est","images":["../image/image_27/27_Chambray_Gouville_1.jpg","../image/image_27/27_Chambray_Gouville_2.jpg","../image/image_27/27_Chambray_Gouville_3.jpg","../image/image_27/27_Chambray_Gouville_4.jpg"]},"Consult_chateau_formulaire5b44":{"id":"Consult_chateau_formulaire5b44","dept":"27","canton":"Le Neubourg","commune":"Le Neubourg","nom":"Champ_de_Bataille","type":"Palais","periode":"XVI","histoire":"CHAMP de BATAILLE, en 935, une grande bataille sest déroulée sur ces lieux même entre deux familles, celle qui régnait sur le Cotentin, menée par Guillaume Longue Épée, et celle de Robert le Danois. La première famille a gagné, et grâce à cette victoire, la Normandie a conquis son indépendance. En 1651, Alexandre de Créqui, frondeur et ami du prince de Condé, est exilé par Mazarin, qui gouverne la France pendant la minorité du roi Louis XIV. On le condamne à résidence. Créqui décide alors de se faire construire un palais magnifique qui lui rappellerait ces fastes de la Cour, que jamais plus il nallait connaître. On suppose quil sest adressé au meilleur architecte et au meilleur jardinier,  André Le Nôtre. Malheureusement, faute de charge à la Cour et devenu un paria, Créqui est mort ruiné en 1702. Cest son neveu, le marquis de Mailloc, qui hérita de ses dettes et de son patrimoine. Champ de Bataille ne lintéressait sans doute pas. À sa mort, en 1754 il légua le château à son neveu Anne François dHarcourt, duc de Beuvron et gouverneur de Normandie, qui fit de Champ de Bataille sa résidence principale, décidé à montrer sa puissance et son pouvoir. Mais à cette époque, le château était très délabré et les décors du XVIIe siècle malheureusement irrécupérables. DHarcourt entreprit alors dénormes travaux pour rétablir les fastes dantan.   La révolution a interrompu cette tâche gigantesque qui est restée inachevée. Comme beaucoup de maisons nobles à cette époque, Champ de Bataille fut pillé et durant de longues années abandonné. Au retour de la monarchie.","architecture":"CHAMP de BATAILLE,  le domaine fut vendu en 1810  par les héritiers du duc de Beuvron, et passa de main en main pendant tout le XIXe siècle Personne ne sest soucié dy faire des travaux importants,  et le château de Champ de Bataille a été simplement maintenu dans ce que lon appelle un état \"hors deau\". Il restait donc beaucoup à faire pour lui redonner sa magnificence dautrefois. en 1903  le comte d'Harcourt se porte acquéreur, le revend  en 1936 à la ville de Neubourg  en 1947 rachat par le duc d'Harcourt pour célébré le millénaire de la famille d'Harcourt.  Cest Jacques Garcia, décorateur, le propriétaire actuel, qui a repris cette charge difficile en 1992. Elle est maintenant accomplie, et il souhaite aujourdhui vous faire partager cette expérience exceptionnelle. Les jardins, seul un bout de croquis avait échappé à loubli, né de la main d'André Le Nôtre, ce document désignait à grands traits lemplacement de la Grande Terrasse, des vieilles broderies de buis, des anciens bosquets de part et dautre, ainsi que les proportions des Carrés de Diane et dApollon. Ces rares éléments dépoque ont été restitués scrupuleusement, et pour le reste, ce sont eux qui ont donné la mesure et la tonalité des nouveaux jardins. Passé lAvant-cour avec son échiquier, le visiteur franchit lArc du Créquois pour entrer dans le Carrousel. Le grand axe des nouveaux jardins peut être considéré, comme une évocation des différents degrés reliant lunivers matériel (corps de logis) vers lunivers immatériel.","habitants":"Famille le Robert le Danois et Anne François dHarcourt\r\n        \r\n        \"","divers":"Champ de Bataille        GPS : 49° 10' 06\" Nord, 0° 51' 34\" Est","gps":"49° 10' 06\" Nord, 0° 51' 34\" Est","images":["../image/image_27/27_Champ_de_Bataille_1.jpg","../image/image_27/27_Champ_de_Bataille_2.jpg","../image/image_27/27_Champ_de_Bataille_3.jpg","../image/image_27/27_Champ_de_Bataille_4.jpg"]},"Consult_chateau_formulaire2adb-2":{"id":"Consult_chateau_formulaire2adb-2","dept":"27","canton":"Breteuil","commune":"La Neuve-Lyre","nom":"Chapelle_27","type":"Château","periode":"XVI-XVII","histoire":"La CHAPELLE, une demeure seigneuriale occupait le site dès le XVIIe siècle dont il subsiste quelques vestiges intégrés au château actuel. Le domaine a été acquis au début du XIXe siècle par un marchand quincaillier en gros d'Ambenay, Le Domaine de la Chapelle a été acquis, au début du XIXe siècle par un marchand quincaillier en gros d'Ambenay, dont le fils Emile-Claudius Baraguay-Fouquet a hérité, en 1852. Dès 1855, Bartaguay a fait établir des projets de transformation du château de la Vallée, qui furent peut-être réalisés. Il fit planter, en 1865, un parc selon le système de Le Nôtre et de Kent, par François Duvillers. dont le fils Emile Claudius Bartaguay Fouquet a hérité en 1852. Dès 1855, Bartaguay a fait établir des projets de transformation du château de la Vallée, qui furent peut-être réalisés. Il a aussi fait planter en 1865 un parc selon le système de Le Nôtre et de Kent par François Duvillers. L'actuel château a été érigé entre 1876 et 1879, avec réemploi partiel de l'édifice antérieur, par l'architecte Baumier de Caen, aussi connu pour ses réalisations à Trouville et à Houlgate. Baumier a également conçu l'organisation nouvelle du domaine avec l'actuelle avenue d'accès, la clôture, la chapelle et le pavillon de chasse, les communs et la ferme.","architecture":"La CHAPELLE  La demeure est composée d'un corps principal flanqué de deux pavillons latéraux. Un avant-corps à tourelles signale l'entrée du château. Les façades mêlent le silex taillé en parement, la brique (chaînes) et la pierre de taille (corniches). La chapelle reprend les mêmes matériaux que le château, donnant une unité à l'ensemble. Le parc du château comprend des parterres et des jardins agrémentés d'étangs et de ruisseaux. L'ensemble, qui témoigne de la réussite sociale d'un grand capitaine d'industrie, est exceptionnel par l'ampleur de la composition, la qualité de cette architecture, son style éclectique, la conservation des dispositions intérieures et du décor d'origine. Le château possède une perspective orientée à l'Est vers la vallée de la Risle et soulignée par des alignements d'arbres. Un massif arboré clôt cette perspective et permet de masquer les usines de Chagny. Le parc fournit un écrin arboré au reste du domaine. Au Sud quelques vues portent vers les champs. Inscription par arrêté du 30 mai 2002.","habitants":"Emile-Claudius Baraguay-Fouquet\r\n        \"","divers":"La Chapelle   GPS : 48° 53' 48\" Nord, 0° 43' 37\" Est","gps":"48° 53' 48\" Nord, 0° 43' 37\" Est","images":["../image/image_27/27_Chapelle_27_1.jpg","../image/image_27/27_Chapelle_27_2.jpg","../image/image_27/27_Chapelle_27_3.jpg"]},"Consult_chateau_formulaireab13":{"id":"Consult_chateau_formulaireab13","dept":"27","canton":"Romilly-sur-Andelle","commune":"Charleval","nom":"Charleval_Rosay","type":"Château","periode":"XVI-XVIII","histoire":"Trois châteaux dans cet article; Charleval, Rosay à l'est et Coquetot  à l'ouest à Bourg-Beaudoin                                                     ROSAY, fut bâti au début du XVIIe siècle par la famille du Mesnil-Jourdain, c'est un édifice composé d'un corps principal construit en 1611 et en 1619 avec deux ailes en retour, l'architecture est caractéristique du style Louis XIII, ardoises bleues, briques roses et crépis laiteux. Le château est bordé de chaque coté par des bras de rivière qui se rejoignent à l'entrée du domaine pour former un plan d'eau. En 1662, une chapelle sera élevée et bénite le 4 Septembre 1692, et détruite vers 1850 par le comte de Valon. La Révolution épargnera Rosay. Léon de Valon réalisera des travaux d'aménagement intérieur vers 1870. En plus des cheminées, un calorifère assurait le chauffage par le sol. Le parc est réaménagé dans le style anglais, en vogue à cette époque. En 1938, le dernier des Valon, ruiné, vendait le domaine qui était resté trois siècles dans la même famille. Les dépendances et le parc qui formaient un ensemble remarquable seront morcelés, déboisés, pillés pendant trente ans. En 1976, la toiture prend leau, le château est alors à labandon. Maitre Castellane, après quinze années d'efforts obstinés, sauvera cet édifice condamné et redonnera au château sa fonction sociale d'antan en l'ouvrant au public. Le domaine possède une perspective Nord-Sud dans l'axe de la vallée de la Lieure. Le cadre paysager de cette vallée reste préservé (champs, prairies et coteaux boisés). De même, l'architecture rurale (bâti à colombage, en briques) participe à cet environnement valorisant.","architecture":"CHARLEVAL, travaux entrepris vers 1570 pour Charles IX et interrompus à sa mort en 1574. Le château de Charleval est attribué aux Androuet du Cerceau (Jacques Ier et son fils Jean-Baptiste). Quelques collaborateurs sont connus : Jean Gallia, Hieronymus Corda et André Cuarda, Guillaume Marchant. Château racheté au XVIIe siècle par Faucon de Ris 1er président au Parlement de Normandie, seuls subsistent des vestiges des fossés et un bâtiment de communs avec une cheminée.                                                                                                             COQUETOT,  à Bourg Beaudoin  un peu plus loin sur l'ouest, le château et sa ferme furent construits dans la deuxième moitié du XVIIIe siècle; remaniés ensuite dans le premier quart du XXe siècle. C'est dans l'allée qui mène au château de Coquetot que Jean-Marie Roland de La Platrière, ministre éphémère de Louis XVI, se suicida en 1793, en apprenant que sa femme venait d'être condamnée à la guillotine, de  plan régulier, élévation ordonnancée,  à un étage carré et un étage de comble, un escalier dans oeuvre, oeuvre: brique ; calcaire ; silex ; enduit, couverture : toit à longs pans; croupe; toit conique, en ardoise.","habitants":"Rosay  Comte de Valon                                                        Charleval;  Androuet du Cerceau                        Coquetot;Jean-Marie Roland de La Platrière\r\n        \"","divers":"Charleval,   grav 1-2   gps 49° 22' 13\" nord, 1° 22' 54\" est                                                                         Rosay        grav 3- GPS : 49° 22' 39\" Nord, 1° 26' 24\" Est                                              Coquetot    grav-4","gps":"49° 22' 39\" Nord, 1° 26' 24\" Est","images":["../image/image_27/27_Charleval_Rosay_1.jpg","../image/image_27/27_Charleval_Rosay_2.jpg","../image/image_27/27_Charleval_Rosay_3.jpg","../image/image_27/27_Charleval_Rosay_4.jpg"]},"Consult_chateau_formulaire8eeb":{"id":"Consult_chateau_formulaire8eeb","dept":"27","canton":"Gisors","commune":"Chauvincourt-Provemont","nom":"Chauvincourt","type":"Château","periode":"XVIII","histoire":"CHAUVINCOURT, cette seigneurie, située à la frontière entre le Duché de Normandie et le Royaume de France, est XVIIIe siècle. Il s'agit de l'une des maisons fortes les plus anciennes et les mieux préservées du département. Au décès de Jean de Chauvincourt, la résidence passe, par succession, aux Gamaches, aux Douxmesnil et aux du Tertre. En 1577, elle appartient à Philippe de Fumechon et à sa femme Françoise de Malterre. Elle revient ensuite à leur fille aînée Renée et à son mari Jacques de Biencourt. En 1611, elle passe aux mains de leur fils Philippe puis, entre 1621 et 1629, à celles de son plus jeune frère Charles. Les descendants des Biencourt conservent le manoir jusqu'en 1778, il revient à la sur de Michel de Biencourt, puis à la famille de son mari, les Belloy. En 1958, le manoir, qui est alors en ruine, est acheté par ses propriétaires actuels, descendants de Philippe de Fumechon par une autre branche Biencourt-Belloy. Ceux-ci engagent une importante restauration de l'édifice.","architecture":"CHAUVINCOURT, est composé d'un logis de plan rectangulaire datant du XIIIe siècle, en pierre calcaire et silex, modifié au XVIe siècle (avec le percement de baies, l'installation d'un escalier en vis), comportant un étage de soubassement, un rez-de-chaussée et un étage, surmonté d'un comble à charpente datant du XVIIIe siècle. Il se compose aussi d'un enclos pavé en partie sud face au manoir, dont la terrasse est épaulée par des murs de soutènement en pierre de taille. La partie souterraine hors-oeuvre est constituée d'un cellier, à niches latérales, du XIVe siècle. La construction du manoir remonterait aux années 1200-1220 et serait l'uvre soit d'Amice de Chauvincourt, soit de son fils Eustache. Au XVIIIe siècle, le Manoir de Chauvincourt devint une exploitation. Il resta occupé, par des logements, pour les ouvriers agricoles jusqu'à la fin des années 1950. Le manoir a été inscrit aux M.H. depuis 1961 et 1998.","habitants":"Famille de Philippe de Fumechon \r\n        \"","divers":"Chauvincourt   GPS : 49° 16' 48\" Nord, 1° 38' 21\" Est","gps":"49° 16' 48\" Nord, 1° 38' 21\" Est","images":["../image/image_27/27_Chauvincourt_1.jpg"]},"Consult_chateau_formulaire8efb-2":{"id":"Consult_chateau_formulaire8efb-2","dept":"27","canton":"Verneuil d","commune":"Chennebrun","nom":"Chennebrun","type":"Château","periode":"XVIII","histoire":"CHENNEBRUN, situé sur la frontière de l'Avre entre le duché de Normandie et le royaume de France, le site était occupé par une forteresse dès le XIIe siècle. A la fin du XIIIe siècle, le rattachement de la Normandie à la France fit perdre à la place forte son intérêt stratégique. Une partie de l'enceinte médiévale subsiste encore (tours et courtines).  Vers 1750, le château actuel fut construit pour la famille de Laval-Montmorency, en intégrant d'anciennes caves voûtées de la forteresse.","architecture":"CHENNEBRUN,   il s'agit d'un corps de logis d'une grande sobriété avec ses façades de briques (arêtes, encadrements des baies) mêlées à un remplissage de moellons enduits ou laissés à nu. Quelques ornements (frontons, corniches) mettent en valeur l'édifice. Le colombier circulaire et la maison du régisseur placée face au château datent de la fin du XVIIIe siècle, tandis qu'une serre maçonnée a été ajoutée au XIXe siècle. Le château possède un vaste cône de vue vers le Sud, dans l'axe de la Grande Rue de Chennebrun. Cette rue présente un cadre bâti soigné (constructions en briques, silex et pans de bois). Le parc forme un environnement boisé autour du château. Son mur d'enceinte est visible depuis les champs voisins.  Éléments protégés MH : les façades et les toitures, le gros oeuvre et les caves. Le vieux château avec l'ensemble lambrissé de l'étage et les vestiges archéologiques. Les façades et les toitures et l'escalier de la maison du régisseur, la serre et le colombier, le parc, y compris son enceinte et le mur du clos à l'est de l'église, le potager, y compris son mur d'enceinte et l'appentis : inscription par arrêté du 29 septembre 1994.","habitants":"Famille de Laval-Montmorency\r\n        \"","divers":"Chennebrun  GPS : 48° 40' 51\" Nord, 0° 46' 58\" Est","gps":"48° 40' 51\" Nord, 0° 46' 58\" Est","images":["../image/image_27/27_Chennebrun_1.jpg"]},"Consult_chateau_formulaire98bb":{"id":"Consult_chateau_formulaire98bb","dept":"27","canton":"Pacy-sur-Eure","commune":"Houlbec-Cocherel","nom":"Cocherel","type":"Château","periode":"XVII","histoire":"COCHEREL, resté pendant 125 ans dans la famille Crucius de la Croix. Logis détruit en 1944 par les bombardements ; subsiste une partie des communs. Corps de logis simple en profondeur ; tourelle carrée au Nord-Ouest ; aile en retour à droite ; saut de loup à l'entrée ; grille monumentale ; alignement d'ormes et de tilleuls dans le parc ; lucarnes passantes","architecture":"COCHEREL, château construit au XVIIe siècle en briques et pierres, formé d'un corps de logis de plan rectangulaire, simple en profondeur, avec tourelle carrée au Nord-Ouest. Transformé au XIXe siècle, notamment par l'ajout d'un corps de bâtiment (orangerie) formant terrasse avec baies en arcade donnant sur le jardin. D'après l'acte de vente de 1856, le logis comprenait au rez-de-chaussée : vestibule, grand salon, salle à manger, cabinet, office, cuisine, laverie ; aux étages : 8 chambres. Les communs étaient constitués de remises, le parc était composé de deux parties : le long de la rivière, un parc à l'anglaise ; à gauche de la rivière, une prairie et un potager.","habitants":"Seigneur local\r\n        \"","divers":"Cocherel","gps":"","images":["../image/image_27/27_Cocherel_1.jpg","../image/image_27/27_Cocherel_2.jpg","../image/image_27/27_Cocherel_3.jpg"]},"Consult_chateau_formulaire21c7":{"id":"Consult_chateau_formulaire21c7","dept":"27","canton":"Louviers","commune":"Heudebouville","nom":"Colombier_27","type":"manoir","periode":"XVII-XVIII","histoire":"COLOMBIER, un manoir seigneurial existait sur le site dès le XIIIe siècle. La construction de l'actuel château, à partir de 1745, est entreprise par André-Adrien Hélot, conseiller au parlement de Rouen et nouvel acquéreur des terres du Colombier. Celui-ci sollicite l'architecte Joseph Abel Couture, auteur de nombreux châteaux dans l'Eure (Mouflaines, Mesnil-Verclives, etc.).","architecture":"COLOMBIER  présente un logis rectangulaire d'un étage surmonté d'une toiture en ardoises à combles brisées et lucarnes. L'édifice intègre d'anciens murs du manoir médiéval. Partiellement enduites, les façades affichent une composition subtile, associant pierre de taille  chaînes harpées, soubassement, angles de la corniche) et brique (encadrement de baies,bandeaux, pilastres et fronton de la travée centrale). Parmi les dépendances se distingue un superbe colombier circulaire, composé de moellons de silex et de pierres calcaires. Les travaux sur le château se sont poursuivis jusqu'au début du XIXe siècle avec l'adjonction de pavillons latéraux de plain-pied pour accueillir de nouvelles dépendances. Le château a conservé une partie de ses décors intérieurs du XVIIIe siècle. Situé à l'entrée sud du village d'Heudebouville, le long de l'ancienne route allant de Paris à Rouen, le domaine du Colombier dispose d'un parc arboré formant un écrin de verdure autour du château. La lisière du village forme un beau cadre rural. classement par arrêté du 4 mai 1984.","habitants":"Famille d' André-Adrien Hélot\r\n        \"","divers":"Colombier à heudebouville","gps":"","images":["../image/image_27/27_Colombier_27_1.jpg","../image/image_27/27_Colombier_27_2.jpg"]},"Consult_chateau_formulaire774c":{"id":"Consult_chateau_formulaire774c","dept":"27","canton":"Conches-en-Ouche","commune":"Conches-en-Ouche","nom":"Conches","type":"Vestiges","periode":"XI","histoire":"CONCHES, il a été fondé en 1035 par Roger 1er de Tosny. Le château de Conches-en-Ouches a été démantelé en 1591, par les Ligueurs, au cours des guerres de religion. Le château est pris par Philippe-Auguste en 1199, il fut l'objet d'âpres combats durant la Guerre de Cent Ans. Pris par les Anglais en 1364, le château de Conches en-Ouche est repris par Bertrand Du Guesclin en 1371, il  est à nouveau perdu, en 1420,  repris en 1440, puis, définitivement, en 1449.  Propriété de la ville. Le château de Conches-en-Ouche date du XIe siècle. Il est inscrit aux M.H. depuis 1886.                                                                                                   le château de QUENET appartient à la communauté de communes du Pays de Conches.","architecture":"CONCHES en OUCHE, en 1591, le château servait de refuge aux membres de la Ligue. Construit au départ sur une motte, restant un point d'appui potentiel pour les ennemis de la monarchie, fut démantelé par la suite,  possédait des murailles d'une épaisseur de 2,60 mètres, et 3 étages au minimum. A été classé aux M.H. en 1886.","habitants":"Famille de Roger Ier de Tosny.\r\n        \"","divers":"Conches     GPS : 48° 57' 41\" Nord, 0° 56' 36\" Est                                           Quenet grav 4","gps":"48° 57' 41\" Nord, 0° 56' 36\" Est","images":["../image/image_27/27_Conches_1.jpg","../image/image_27/27_Conches_2.jpg","../image/image_27/27_Conches_3.jpg","../image/image_27/27_Conches_4.jpg"]},"Consult_chateau_formulaire0002":{"id":"Consult_chateau_formulaire0002","dept":"27","canton":"Pont-Audemer","commune":"Condé-sur Iton","nom":"Condé_sur_Iton","type":"Château","periode":"XVI-XVII","histoire":"CONDE, fut aux XVIe et XVIIe siècles propriété et résidence dété des évêques dEvreux. De magnifiques pièces deau donnent à ce domaine un aspect princier. Sur la rive gauche de lIton sélevait le château restauré par Ambroise le Veneur, dans lequel coucha le roi Henri IV, la veille de la victoire dIvry. Sous la Révolution (1789), et le château déclaré « bien national » fut mis en vente.   La propriété fut acquise comme « bien national » le 8 juillet 1791 par le sieur de Witt, ancien échevin d'Amsterdam dont la famille s'est alliée par la suite à celle du ministre François Guizot et dont descendent les frères Schlumberger (il est mort le 12 septembre 1809 à Condé-sur-Iton). Il transmit ensuite la propriété  au sieur Gazzani père.   De 1812 à 1965, la propriété sera acquise tour à tour par trois riches familles, en 1835 par alliance passe à Alfred Mosselmann, de 1812 à 1965, en 1857 à la comtesse de Hon, puis en 1873 à Carlo Gonzalès Candamo, et en 1888 à Auguste Rohan-Chabot. Cest aujourdhui la propriété de la famille Borel.  Il a été transformé dans le goût néo-classique en 1845 par l'homme daffaires Alfred Mossselman, fils de banquier bruxellois. C'est l'architecte parisien Pierre-Charles Dusillion (1804-1878), propagateur du style néo-renaissance en France, qui rénova le château.","architecture":"CONDE-ITON, est celui que lon voit aujourdhui encore, avec tours, échauguettes, créneaux, mâchicoulis, fenêtres à meneaux, à lorigine, il était entièrement entouré par les eaux de lIton. Il date du Moyen-âge, peut-être du XVe siècle, mais a été profondément restauré au milieu au XIXe siècle.  Le château actuel est le résultat de restaurations drastiques, a la mode médiévale, entreprises vers 1845 sur les bâtiments déjà bien dégradés en 1722, et les modalités de cette restauration ont été précisées par R. Herval.  Le château Renaissance : il ne reste rien de ce pavillon élevé par lévêque dAmbroise. Le Veneur dans les années 1520-1530. Construit en brique, il sélevait sur le versant droit de lIton. À partir de 1722, les évêques obtiennent du roi l'autorisation de détruire le vieux château en partie ruiné pour reconstruire un nouveau château avec séjour sur le versant du coteau, dans des conditions topographiques plus agréables que le fond marécageux où s'élevait le château primitif.                                                                                                  Le  CHATEAU-NEUF , de style Louis XIII, fut édifié en 1889 par le comte Jarnac. Il ne reste de celui-ci que le premier niveau, suite à des modifications importantes opérées en 1962 par son propriétaire Charles de Rohan-Chabot Il ne reste plus du château Neuf que son premier niveau. Ses deux étages supérieurs ont été supprimés en 1962 car leur entretien coûtait trop cher à leur propriétaire.","habitants":"famille d'Ambroise le Veneur\r\n        \r\n        \r\n        \"","divers":"Condé  gps 48° 50' 02\" nord, 0° 57' 48\" est","gps":"","images":["../image/image_27/27_Cond%c3%a9_sur_Iton_1.jpg","../image/image_27/27_Cond%c3%a9_sur_Iton_2.jpg","../image/image_27/27_Cond%c3%a9_sur_Iton_3.jpg","../image/image_27/27_Cond%c3%a9_sur_Iton_4.jpg","../image/image_27/27_Cond%c3%a9_sur_Iton_5.jpg"]},"Consult_chateau_formulaire5d8e":{"id":"Consult_chateau_formulaire5d8e","dept":"27","canton":"Gallion","commune":"Sainte-Barbe-sur-Gaillon","nom":"Courtmoulin","type":"Château","periode":"XVII-XVIII","histoire":"COURTMOULIN   La seigneurie de Sainte-Barbe est attestée dès le XIIIe siècle. En 1253, Guillaume de Colmoulin, dont le nom est à l'origine de celui du domaine, est mentionné comme seigneur du fief tout en siégeant aux assises de Normandie.                                                                                                                              COUVICOURT,  est construit par Joseph Abel Couture, dit Couture l'aîné sur les conseils de son maître l'architecte Le Carpentier. Le commanditaire serait Louis-Edouard de Lantage de Tressigny qui fut caissier général de la ferme des poudres et salpêtres puis commissaire général des poudres à Rouen, sieur de Couvicourt, où il meurt en 1772.  Le philosophe et archéologue Félix Ravaisson (1813-1900) en a été propriétaire, tandis que Gilbert Cesbron (Ecrivain),  ayant passé son enfance, en fit le cadre de son roman \"La Tradition Fontquernie\" (1947). Le château de Couvicourt est inscrit aux M.H. depuis le 20.10.2015.","architecture":"COURTMOULIN, le château, construit au XVIIe siècle, est agrandi et modifié aux XIXe et XXe siècles, avec l'ajout de bâtiments aux extrémités. A l'intérieur, le rez-de-chaussée conserve plusieurs pièces lambrissées. Les origines de la chapelle seigneuriale dédiée à Saint-Vulfranc, remonteraient au XVIe siècle. Sa construction est également attribuée à la famille Langlois, au XVIIe siècle, en même temps que l'édification du château. La chapelle possède un plan rectangulaire composé d'un vaisseau unique à deux travées, et dispose d'un chur désorienté, tourné vers l'Ouest. L'édifice présente des façades enduites au mortier, d'où se distinguent l'encadrement en pierre de taille du portail d'entrée. Les baies à tiers point ont conservé trois verrières, datées du XVIe siècle, illustrant la vie de la Vierge. Une charpente à chevrons formant fermes soutient la couverture à double versants en tuiles plates, complétée par un clocheton en ardoises. Le château a été très transformé avec le prolongement du logis d'origine par des pavillons et des ailes latérales au XIXe et au début du XXe siècle. Des aménagements intérieurs du XVIIIe siècle ont été conservés (lambris et cheminée du salon). La chapelle bénéficie de l'environnement arboré et paysager du parc. Les champs et les bois forment un cadre rural valorisant,  inscription par arrêté du 11 mai 2006.","habitants":"Couvicourt, Louis-Edouard de Lantage de Tressigny                     Courtmoulin;  famille Langlois\r\n        \"","divers":"Couvicourt  grav 4-5   GPS : 49° 08' 54\" Nord, 1° 21' 29\" Est                             Courtmoulin grav-1-2-3   GPS : 49° 09' 40\" Nord, 1° 19' 05\" est","gps":"49° 08' 54\" Nord, 1° 21' 29\" Est","images":["../image/image_27/27_Courtmoulin_1.jpg","../image/image_27/27_Courtmoulin_2.jpg","../image/image_27/27_Courtmoulin_3.jpg","../image/image_27/27_Courtmoulin_4.jpg","../image/image_27/27_Courtmoulin_5.jpg"]},"Consult_chateau_formulairedb1c":{"id":"Consult_chateau_formulairedb1c","dept":"27","canton":"Romilly-sur-Andelle","commune":"Gaillardbois-Cressenville","nom":"Cressenville","type":"Château","periode":"XVI-XVII","histoire":"Deux châteaux dans cet article Cressenville et Bois-Préaux. CRESSENVILLE     Le corps de logis principal, plan symétrique, a été construit à la fin du deuxième quart du XVIIe siècle. Le remarquable portail porte la date 1641. Au XVIIIe siècle, deux ailes ont été ajoutées au corps de logis principal. Le colombier et les parties agricoles ont été détruits à une date inconnue, élévation ordonnancée à un étage carré ; étage de comble, escalier intérieur, Gros-oeuvre: calcaire ; brique ; pierre avec brique en remplissage, toit à longs pans ; croupe ; toit à longs pans brisés, en  ardoise","architecture":"BOIS-PREAUX,  à Lisors, une famille de Lisours (de Lisoures, de Lisures, de Lusoriis, de Lizours), attestée depuis 1066, se retrouve en Angleterre peut-être tire-t-elle son nom de Lisors, à moins qu'il ne s'agisse plutôt de Lisores dans le pays d'Auge, près de Vimoutiers. Elle s'allie à la famille de Lacy. Le défenseur de château-Gaillard, Roger de Lacy descendait de Robert de Lisours par sa grand-mère Aubrée. Du XIIe siècle jusqu'en 1367, Lisors appartenait à la famille Crespin, qui étaient barons d'Etrépagny. Bienfaiteurs de l'abbaye de Mortemer, ils étaient enterrés dans l'église abbatiale, un château des XVIe, XVIIe et XVIIIe siècles au lieu-dit le Bois Préaux, remaniée au XVIIIe siècle, deux ailes reconstruites par l'architecte René Martin. Tableau de Sainte Marie Madeleine intégré dans un trumeau de cheminée du XIXe siècle. Support composé de deux éléments. Le château, de plan symétrique, est composé d'un étage carré et un étage en surcroît, élévation ordonnancée.  Corps de logis central de plan rectangulaire entre deux pavillons rectangulaires, l'ensemble à deux niveaux toiture couverte d'ardoise avec lucarnes sur combles.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Cressenville grav 1-2-3                                                                            Bois-Préaux grav 4. \r\ngps  49° 20' 36\" nord, 1° 24' 21\" est","gps":"","images":["../image/image_27/27_Cressenville_1.jpg","../image/image_27/27_Cressenville_2.jpg","../image/image_27/27_Cressenville_3.jpg","../image/image_27/27_Cressenville_4.jpg"]},"Consult_chateau_formulaire9908":{"id":"Consult_chateau_formulaire9908","dept":"27","canton":"Gallion","commune":"La Croix-Saint-Leufroy","nom":"Croix_St_Leufroy","type":"Château","periode":"XV-XVII","histoire":"La CROIX St-LEUFROY, une abbaye bénédictine fut fondée sur le site vers 680 par Leufroy dÉvreux, dit Saint-Leufroy. Éprouvée par les incursions normande et par la guerre de Cent Ans, l'abbaye a été restaurée entre 1473 et 1501.  Le château actuel est l'ancienne demeure abbatiale d'un monastère détruit à la Révolution. La construction d'un grand logis abbatial fut entreprise par l'abbé Claude de Baudry de Piencourt vers 1630. appartient aujourd'hui à M. Thureau-Dangin. Des jardins à la française ont été créées à cette occasion.                                                                                                           MAILLOC, village voisin Cailly sur Eure. La construction du manoir date du XVIIe et XVIIIe siècle. Le manoir de Mailloc est constitué d'un ensemble de bâtiments autour d'une cour. Il est flanqué aux 4 angles d'une tour carrée. Les bâtiments datent de la fin du XVIe ou du début du XVIIe siècle, ainsi que du XVIIIe siècle. Le logis a été transformé au XIXe siècle. Le manoir de Mailloc est inscrit aux M.H. depuis 1996.","architecture":"La CROIX St-LEUFROY, Inspiré par le classicisme, le logis abbatial présente des façades enduites, rythmées par des chaînes de briques et de pierres. Des panneaux de briques aux formes variées complètent l'ornement. La toiture en ardoises comprend de superbes lucarnes sculptées. Le déclin de l'abbaye conduisit à sa suppression en 1751, entraînant la destruction de nombreux bâtiments. Le logis abbatial, le cellier, la grange et quelques vestiges ont survécu aux démolitions. Déclaré bien national en 1791 puis vendu, le domaine fut transformé en demeure de plaisance. Le logis et les jardins ont récemment fait l'objet d'importantes restaurations. Situé dans la vallée de l'Eure, le domaine est entouré de prairies ponctuées d'arbres en bosquet ou en alignements. La présence d'étangs, la proximité de la rivière d'Eure et de coteaux boisés enrichissent ce paysage champêtre et préservé. Le village de la Croix Saint-Leufroy fourni un cadre patrimonial valorisant (église, maisons en pierres, en briques ou à colombage).  Inscription par arrêté du 3 mai 2005.","habitants":"abbé Claude de Baudry de Piencourt. M. Thureau-Dangin\r\n        \"","divers":"La Croix-Leufroy  grav-1     GPS : 49° 06' 32,04\" Nord, 1° 14' 18,96\" Est                                                                                           Mailloc  Cailly Grav-2    GPS : 49° 7' 0,12\" Nord, 1° 13' 0,84\" Est","gps":"49° 06' 32,04\" Nord, 1° 14' 18,96\" Est","images":["../image/image_27/27_Croix_St_Leufroy_1.jpg","../image/image_27/27_Croix_St_Leufroy_2.jpg"]},"Consult_chateau_formulaire4def":{"id":"Consult_chateau_formulaire4def","dept":"27","canton":"Gisors","commune":"Dangu","nom":"Dangu","type":"Château","periode":"XVIII-XIX","histoire":"DANGU, une forteresse occupait le site dès le XIe siècle afin de verrouiller le passage de l'Epte. Laplace fut éprouvée par des sièges aux XIe-XIIe siècles, dont celui de Louis VI, entre 1196 et 1199, la forteresse fut très disputée par Philippe-Auguste et Richard Coeur de Lion avant d'être rattachée au royaume de France en 1200. Les affrontements se sont succéder lors de la guerre de Cent Ans puis lors de la Ligue. Les fortifications sont démantelées dans le courant du XVIe siècle, laissant un logis arrondi appelé château Vieux. A la fin du XVIIIe siècle le baron de Breteuil y fait ajouter un corps de logis néoclassique. Déclaré Bien National, le château est pillé en 1792. Le domaine est racheté en 1884 par le duc Pozzo di Borgo qui fait reconstruire le \"château de Montretout\" à partir des vestiges de la demeure éponyme, incendiée à Saint-Cloud en  1871 lors du siège de Paris.","architecture":"DANGU, l'édifice possède une architecture néo-classique avec d'élégantes façades en pierre de taille surmontées par une toiture en ardoises du XIXe siècle. Le paysagiste Achille Duchêne modifie le parc en créant des alignements en rapport avec la nouvelle construction, est le seul encore intact sur le site, le château Vieux ayant été détruit en 1911 par un incendie, il domine la vallée de l'Epte et donnent des vues lointaines sur un large cône vers l'Est. Les perspectives ouest et sud sont stoppées par le parc arboré. Éléments protégés MH : l'ancien château, les perspectives nord-sud et ouest qui l'accompagnent, ainsi que les sols des parcelles sur lesquelles ils se situent : inscription par arrêté du 22 février 2005.","habitants":"Famille de la Ferrière\r\n        \"","divers":"Dangu   GPS : 49° 15' 12\" Nord, 1° 41' 51\" Est","gps":"49° 15' 12\" Nord, 1° 41' 51\" Est","images":["../image/image_27/27_Dangu_1.jpg","../image/image_27/27_Dangu_2.jpg","../image/image_27/27_Dangu_3.jpg"]},"Consult_chateau_formulairee356":{"id":"Consult_chateau_formulairee356","dept":"27","canton":"Ecos","commune":"Ecos","nom":"Ecos","type":"Château","periode":"XV-XVI","histoire":"Quatre  châteaux dans cet article; Bus, Chesney Salverte, Grumesnil et  Aveny à Dampmesnil voir article.                                                                                                CHESNEY-HAGUEST, en 1831, Félix Le Clerc-de-Pulligny hérite de son père la terre du Chesnay-Haguest, un ancien fief et les ruines dun château du XIVe siècle, un beau château gothique moderne. Les travaux dure de 1855 à 1870 sur ses anciennes fondations. Félix le meuble et le décore dans le style de sa construction primitive, de la fin du XVe siècle, en utilisant les pierres des anciennes  tours d'angle. Sculptant lui même de ses mains, il est lauteur dun grand nombre de toiles comme son ancêtre Jean le Clerc et peint même certains plafonds. Toutes les sculptures, peintures, ferronneries et plombs repoussés et ciselés sont sortis des mains de Félix de Pulligny. Il y reçoit Alexandre Dumas. Félix Le Clerc de Pulligny décède le 24 juin 1893 au Chesnay Haguest. Il laisse un domaine de 143 hectares, suite à une série dacquisitions.                                     Manoir de SALVERTE ancien, des XVe et XVIe siècles, inscrit au titre des monuments historiques en 1927. Une seigneurie existait à Heubecourt dès le XIIe siècle avec la présence probable d'un  château fort. Le manoir a été édifié vers le début du XVIe siècle, à l'emplacement présumé de la basse-cour médiévale. Sa construction est attribuée à Claude d'Annebault, capitaine-général  de cavalerie puis amiral de France sous François Ier. Nommé capitaine des chasses, Claude d'Annebault reçut plusieurs fois le roi au manoir de Salverte.","architecture":"BUS St-REMY, au sud  d'Ecos, manoir du XVIe siècle présente une façade décorés de bandes avec losanges et médaillons, une tourelle d'angle, s'accroche au corps de logis qui à conservé, à l'intérieur, une porte de cave surmontée d'une sculpture représentant un homme tenant un broc.                                                                                                                          GRUMESNIL, au sud-ouest à  Heubecourt  Haricourt, il fut construit au XVe siècle, puis remanié au XVIIe siècle et largement reconstruit au XIXe siècle. La propriété possède un beau parc, des dépendances, une grange aux dîmes construite au XVe siècle, des bâtiments agricoles et une fuie. Entre 1875 et 1877, le propriétaire du château, M. Alphonse Payen, fit restaurer l'église de Notre-Dame d'Heubécourt. Actuellement le château héberge une maison de retraite privée. Château de Grumesnil, des XVIIe et XIXe siècles, et sa grange aux dîmes du XVe siècle, recensé à l'inventaire général du patrimoine culturel.                                                                                  SALVERTE ancien, manoir  de plan rectangulaire, le logis seigneurial est flanqué d'une tour d'escalier polygonale, sur sa face sud et d'une chapelle à l'angle nord-est. Ses façades sont constituées de pierres  (soubassement, rez-de-chaussée) et de pans de bois. Face au logis, le bâtiment d'entrée se   distingue par son passage cocher et sa galerie d'étage en encorbellement, donnant sur la cour.  Le manoir comprend d'autres dépendances  vers l'Ouest, avec notamment une grange à pans de  bois et toiture haute. L'édifice a conservé sa superbe charpente à fermes reposant une double  rangée de poteaux. Au XVIe siècle, le domaine devint la propriété de la famille d'Arcona dont  un descendant, Jérôme II d'Arcona, fut nommé gouverneur de Vernon sous Louis XIII.","habitants":"Famille de  Félix de Pulligny\r\n        \"","divers":"Bus  Grav-1-2                                                                             Chesney grav-3-4                                                                  Grumesnil  grav-5-6-7                                                                     Salverte  grav-8","gps":"","images":["../image/image_27/27_Ecos_1.jpg","../image/image_27/27_Ecos_2.jpg","../image/image_27/27_Ecos_3.jpg","../image/image_27/27_Ecos_4.jpg","../image/image_27/27_Ecos_5.jpg","../image/image_27/27_Ecos_6.jpg","../image/image_27/27_Ecos_7.jpg","../image/image_27/27_Ecos_8.jpg"]},"Consult_chateau_formulaireb485":{"id":"Consult_chateau_formulaireb485","dept":"27","canton":"Evreux","commune":"Emalleville","nom":"Emalleville","type":"Château","periode":"XVIII","histoire":"EMALLEVILLE, après une occupation gallo-romaine, et médiévale avec une motte féodale (toujours existante en sous-sol), la terre d'Emalleville d'Asselin de Villequier  est acquise en 1725 par François Duvert, alors Trésorier de France à Rouen et futur avocat au Parlement de Paris récemment anobli, il décide d'y faire construire son château entre 1720 et 1725, selon le style Louis XV. Passa ensuite à Ladislas le marchand allié à Pauline de Niepce et à Pierre Mallet industriel et en 1880 par Georges Duméril ancien élève de l'école polytecnique.  L'édifice a été restauré à partir de 1991 par Jean-Pierre Jouve. Aujourd'hui propriété de monsieur et madame Arnaud Tourtoulou, location chambres d'hôtes.","architecture":"EMALLEVILLE,  le château présente un corps de logis rectangulaire avec des façades en brique et un soubassement en pierre. Seuls les angles des corniches et des frontons sont également traités en pierre afin de démarquer ces ornements du reste de la façade. Deux ailes latérales sont ajoutées au corps de logis vers 1855. Les jardins, réalisés dans les années qui suivent la construction du château, sont conçus selon un tracé régulier de parterres et d'allées de tilleuls en rotonde. Les demi-lunes et certaines avenues plantées de châtaigniers sont conservées. A la fin du XIXe siècle, une ferme-modèle est construite sur le domaine, en parallèle de la remise en valeur du
