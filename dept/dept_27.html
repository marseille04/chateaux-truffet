IIIe et XIXe siècles. se situe sur l'Eure, au Hameau des Planches, sur l'ancienne route royale de Rouen à Orléans,  est inscrit au titre des M.H.                                                                                                                     PRISON, ancienne  construction date du XIVe au XVIe siècle. L'ancien manoir de la famille de Poissy, au XIIIe siècle. A partir du XVe siècle, les seigneurs d'Acquigny y tenaient une Haute Justice. Le gros-oeuvre date du XIVe siècle, le réaménagement date du XVIe siècle et la charpente porte la date de 1739 (réfection).","architecture":"ACQUIGNY,  le château d'Acquigny a été bâti vers 1550 par Anne de Montmorency-Laval, qui en hérite, cousine du Roi de France, Henri II et proche de la reine Catherine de Médicis. Elle voulut que l'architecte Philibert de l'Orme, s'inspire de son amour pour son défunt époux, Louis de Silly, seigneur de La Roche-Guyon et construise sa demeure sur le plan de leurs quatre initiales entrelacées A.L.L.S.  origine d'un plan complexe et d'une construction originale d´une rare élégance centrée sur une gracieuse tourelle à double loggias reposant sur une trompe en forme de coquille Saint-Jacques. En 1656 acquisition par les Le Roux  d'Esneval.  Le château et le parc ont été progressivement agrandis, puis transformés au XVIIIe siècle. Vers 1745, le président d'Acquigny, président à mortier du parlement de Normandie, fit agrandir par l'architecte C. Thibault, le château en prolongeant les deux corps de bâtiments de la façade dhonneur de constructions légères surmontées de balustres s'associant harmonieusement à lédifice originel comme pour en agrandir ou épanouir ses ailes accueillantes. A la fin de sa vie, le président d'Acquigny fit construire un ermitage accolé à l'église, dénommé \"le Petit château\", afin de sy retirer et de vivre la règle de la \"Grande Trappe de Soligny\". L'ensemble des constructions de la deuxième moitié du XVIIIe siècle, constitue un ensemble homogène en briques cuites et pierres de taille, les communs, léglise, lorangerie et un grand parc romantique avec dimportants éléments de lancien à la française, au dessin régulier.","habitants":"Acquigny                                                                                       Prison  Famille de Poissy                                 \r\n        \r\n        \r\n        \"","divers":"Acquigny  grav 1-2-3                                                                   Ailly   pas d'image    GPS : 49° 10' 20\" Nord, 1° 11' 15\" Est                                            Manoir-prison  Garv-4      GPS : 49° 10' 26\" Nord, 1° 11' 18\" Est                                                                                           PLanches  GPS : 49° 9' 15,54\" Nord, 1° 10' 36,61\" Est","gps":"49° 10' 20\" Nord, 1° 11' 15\" Est","images":["../image/image_27/27_Acquigny_1.jpg","../image/image_27/27_Acquigny_2.jpg","../image/image_27/27_Acquigny_3.jpg","../image/image_27/27_Acquigny_4.jpg"]},"Consult_chateau_formulaire256f":{"id":"Consult_chateau_formulaire256f","dept":"27","canton":"Pont-de-l","commune":"Amfreville sur Iton","nom":"Amfreville_Iton","type":"Château","periode":"XVIII","histoire":"AMFREVILLE, situé sur les rives de l'Iton, le château a été construit par François Poret de Boissemont  conseiller au parlement de Rouen en 1775, dans le style néo-classique caractéristique de cette période, un avant-corps et deux pavillons légèrement marqués par les refends de pierres qui se détachent sur les murs de briques, les façades en pierre de taille ont conservé leur monumentalité (soubassement, étages nobles et attique), renforcée par l'austérité des quelques éléments de décor (fronton, corniches). L'édifice et son domaine ont fait l'objet de transformations importantes vers la fin du XIXe siècle, effectuées par un architecte de Louviers. Les travaux ont porté sur la toiture (couverture en zinc), les cheminées, et la décoration intérieure. Le parc a été aménagé à l'anglaise, selon le goût de l'époque. La maison dite chalet a aussi été construite à cette période, dans le courant néo-gothique. Elle combine habilement différents matériaux (pierres de taille, briques, colombages sculptés). Situé au creux du vallon formé par l'Iton, le château possède une vue directe sur son parc arboré. Des vues lointaines dans le château et le parc cadrent vers les coteaux boisés et peu urbanisés. Éléments protégés MH : les façades et les toitures des quatre bâtiments de la ferme : inscription par arrêté du 9 juin 1977. Le château et la maison dite chalet, les écuries-remises, la cave située sur la commune d'Acquigny : inscription par arrêté du 28 mars 1994.  Il appartient aujourd'hui  au marquis de Boury.","architecture":"ETURQUERAYE, domaine SICERA,  Le château des XVIIe, XVIIIe et XIXe siècles est situé au lieu-dit Amfreville. Le corps central du logis fut construit au XVIIe siècle, les parties agricoles datent du XVIIIe siècle et les corps latéraux du logis du XIXe siècle. Élévation à travées, à un étage carré, étage de comble, en brique, calcaire, bois, pan de bois, pierre avec brique en remplissage : Toit à longs pans, croupe, pignon couvert  en Ardoise.                                                                                               SENNEVILLE,  la construction  date du XVIe et XVIIe siècle. Le manoir de Senneville se situe à environ 17.à 28 kms de Saint-Jacques-sur-Darnétal. C'est un manoir en brique et pierre du début du XVIe siècle avec son colombier. La Charretterie en brique date de la fin du XVIe siècle.  Toute la visite extérieure, la charretterie, le pigeonnier colombier et le jardin. Le château actuel fut construit durant la 2ème moitié du XVIe siècle, pour Martin Alorge, puis passa aux Godefroy, Pomereu d'Alige et  Lecomte de Romilly. Son décor intérieur et les deux cheminées construites, furent créés, pour Charles Alorge,  Le manoir de Seneville est classé aux M.H. le 3/07/1975 et inscrit le 3/03/1975  aujourd'hui est la propriété de M. de Cournon.","habitants":"Amfreville famille de  François Poret de Boissemont                         Senneville famille de   Martin Alorge  \r\n        \"","divers":"Amfreville-Iton-grav-1     GPS : 49° 08' 44\" Nord, 1° 09' 13\" Est                                                                                      Eturqueraye grav-4 Senneville  grav 2-3                              GPS : 49° 17' 38\" Nord, 1° 16' 49\" Est","gps":"49° 08' 44\" Nord, 1° 09' 13\" Est","images":["../image/image_27/27_Amfreville_Iton_1.jpg","../image/image_27/27_Amfreville_Iton_2.jpg","../image/image_27/27_Amfreville_Iton_3.jpg","../image/image_27/27_Amfreville_Iton_4.jpg"]},"Consult_chateau_formulaire8d35":{"id":"Consult_chateau_formulaire8d35","dept":"27","canton":"Gisors","commune":"Amécourt","nom":"Amécourt","type":"Château","periode":"XVIII","histoire":"AMECOURT, la présence, dans les jardins du château, de médailles romaines, de candélabres et de tombeaux de pierre sur le versant du coteau en face du hameau de Guerquesales, prouve l'installation des Romains dans le village. La seigneurie d'Amécourt fut vendue à plusieurs reprises passant de la famille de l'Isle, à de Fours, de Beauvais, de Harle, Sublet, Dufour de Longuerue et enfin Lefèvre d'Amécourt. En 1863, elle fut achetée par Mr Batard, maire du pays, la construction  date du 2e moitié du XVIIIe siècle, à proximité de l'église Saint-Hélier.  La famille Flicoteaux en a été propriétaire depuis 1896 et elle s'associa avec la famille Wargny autour des années 1930. La famille Flicoteaux fût longtemps propriétaire, puisque c'est en 1896 qu'elle s'y installe jusque récemment.","architecture":"AMECOURT, cette résidence de vacances fût laissée à l'abandon depuis les années 1960. Le château possède un étage carré. La tour de droite fût construite, vers 1930. La couverture du château d'Amécourt est en ardoise. La famille Béal racheta le château d'Amécourt en 2007 et fit restaurer cette demeure de charme. Le château dAmécourt, aujourdhui, a été réhabilité. Il aprtient à Mr et Mme Béal Alain et Claire. Le château a été construit dans la seconde moitié du XVIIIe siècle, mais différentes transformations ont modifié son aspect d'origine. Il est situé au dessus de l'église et jouit d'une superbe vue sur la vallée.  Le château d'Amécourt a été inscrit aux M.H.","habitants":"Famille de Lefèvre d'Amécourt\r\n        \"","divers":"Amécourt                                              GPS : 49° 22' 49,76\" Nord, 1° 44' 04,08\" Est","gps":"49° 22' 49,76\" Nord, 1° 44' 04,08\" Est","images":["../image/image_27/27_Am%c3%a9court_1.jpg","../image/image_27/27_Am%c3%a9court_2.jpg"]},"Consult_chateau_formulairea527":{"id":"Consult_chateau_formulairea527","dept":"27","canton":"Louviers","commune":"Andé","nom":"Andé","type":"Manoir","periode":"XVII","histoire":"ANDE, le manoir existait au XVIe siècle, il a été remplacé par le château actuel, dans la deuxième moitié du XVIIe siècle, les bâtiments de la ferme peuvent avoir été reconstruits à cette époque.","architecture":"ANDE  de style classique, construit sur une terrasse face au plateau de Vironvay. Le corps de logis central, de plan rectangulaire, possède un étage carré et un étage de comble, couvert d'une toiture en ardoise, agrémentée de cinq lucarnes de pierre. La demeure est entourée dun beau parc, on peut encore voir un colombier circulaire en calcaire. Site inscrit en 1974. Il a été remplacé par le château actuel, dans la 2ème moitié du XVIIe siècle, les bâtiments de la ferme peuvent avoir été reconstruits à cette époque. Le maître d'oeuvre est inconnu. Le gros-oeuvre est composé de calcaire, de bossage et d'enduit partiel. Le château est entouré d'un colombier circulaire et d'un colombier en calcaire, est inscrit aux M.H. depuis 1974. Il existe aussi un manoir à Andé : des XVIIe et XVIIIe siècles au lieu-dit le Mesnil. Le logis a été largement repris au XVIIIe siècle. Seule une partie du XVIIe siècle a été conservée. La grange et son colombier ont depuis disparu, un parc à la française entretenu et arboré se terminant en terrasse vers la seine.","habitants":"Seigneur local\r\n        \r\n        \"","divers":"Andé  Grav-1  GPS : 49° 13' 59\" Nord, 1° 14' 36\" Est","gps":"49° 13' 59\" Nord, 1° 14' 36\" Est","images":["../image/image_27/27_And%c3%a9_1.jpg"]},"Consult_chateau_formulaireaa62":{"id":"Consult_chateau_formulaireaa62","dept":"27","canton":"Pont-Audemer","commune":"Bonneville-Aptot","nom":"Aptot","type":"Château","periode":"XVII-XVIII","histoire":"APTOT, château construit dans la première moitié du XVIIe siècle pour Guillaume Thouroude et probablement reconstruit au XVIIIe siècle, il subsiste une aile de cette époque. Le château est conservés par la descendance de la famille Thouroude. Charles d'Osmoy profita du château jusqu'à sa mort.","architecture":"APTOT,  la construction  date des XVIIe et du , XVIIIe et du 4ème quart du XIXe siècles.  La façade fut reconstruite au XVIIIe et du 4ème quart du XIXe siècle. Ce château, de plan symétrique, est composé d'un étage carré et d'un étage en surcroît, élévation ordonnancée. Le château construit au cours de la 1ère moitié du XVIIe siècle : il subsiste une aile de cette époque. La façade fut reconstruite au 4ème quart du XIXe siècle. Le Colombier date du XVIIe siècle.","habitants":"Famille de   Guillaume Thouroude\r\n        \"","divers":"Aptot                                              GPS : 49° 16' 06\" Nord, 0° 44' 14\" Est","gps":"49° 16' 06\" Nord, 0° 44' 14\" Est","images":["../image/image_27/27_Aptot_1.jpg"]},"Consult_chateau_formulaire00a4":{"id":"Consult_chateau_formulaire00a4","dept":"27","canton":"Beuzeville","commune":"St Gervais Asnières","nom":"Asnières_27","type":"Château","periode":"XVII-XVIII","histoire":"Deux châteaux dans cet article; St-Gervais et Asnières.              SAINT-GERVAIS, en 1198, première citation dun Hugues, seigneur dAsnières, et Jean, son fils aîné, qui se déclarent pour le Roi Philippe Auguste dans la guerre des Anglo-Normands. Guillaume dAsnières siège comme chanoine à léchiquier de Rouen en 1258. Jean de Carrey, conseiller du Roi, fait lacquisition des seigneuries de Saint-Gervais et de Saint-Jean dAsnières en 1651, et prend le titre de sieur de Saint-Gervais et de Goville. Il meurt à Saint Gervais en 1670. Son petit-fils, Jacques-François-Augustin de Carrey de Saint-Gervais, évêque coadjuteur de Rouen, seigneur de Saint-Gervais aura son histoire étroitement liée à la destruction de lancien château de Saint-Gervais au moment de la Révolution. En 1837, acquisition du domaine par Michel Pierre Alexis Hébert, avocat de la Cour de Cassation, puis Garde des Sceaux, ministre de la Justice en 1847. Cet ancêtre de la famille actuelle fera construire le château que nous contemplons aujourdhui.","architecture":"ASNIERES,  motte féodale remontant au XIe siècle. Dans le parc; logis en calcaire et brique construit dans la première moitié du XVIIe siècle; les parties agricoles remontent aux XVIIe et XVIIIe siècles, en élévation ordonnancée, à un étage carré ; étage de comble ; sous-sol, oeuvre : brique ; calcaire ; pierre avec brique en remplissage ; bois ; torchis ; silex ; bossage,  couverture : toit à longs pans ; croupe ; pignon couvert, couvert en  ardoise\r\nTypologie : pan de bois à grille ; décor de brique émaillée.","habitants":"St-Gervais Famille de Michel Pierre Alexis Hébert                                     Asnières\r\n        \r\n        \"","divers":"St-Gervais grav 3   GPS : 49° 12' 21\" Nord, 0° 24' 14\" Est                        Asnières. Grav-1-2     GPS : 49° 11' 47\" Nord, 0° 23' 57\" Est","gps":"49° 12' 21\" Nord, 0° 24' 14\" Est                        Asni","images":["../image/image_27/27_Asni%c3%a8res_27_1.jpg","../image/image_27/27_Asni%c3%a8res_27_2.jpg","../image/image_27/27_Asni%c3%a8res_27_3.jpg"]},"Consult_chateau_formulaire3618":{"id":"Consult_chateau_formulaire3618","dept":"27","canton":"Les Andelys","commune":"Dampsmesnil","nom":"Aveny","type":"Château","periode":"XVIII","histoire":"AVENY, le marquis de Broglie vend, le 12 février 1778, à la dame de Fayet, les terres, fiefs et seigneurie dAveny. Cest près dun siècle plus tard, après la guerre de 1870, que le marquis Léon de Fayet reconstruisit les deux pavillons du château, suréleva les toits et donna ainsi à lensemble sa silhouette actuelle. Ce château a été la résidence des marquis de Fayet puis de la famille de Robien.","architecture":"A deuxs K.M.à l'Est d'Ecos, à  Dampmesnil le château d' AVENY, à cette date le château élevé sur les bases dune maison forte du XIe siècle est dans un état pitoyable, le rez-de-chaussée du château était aussi peu habitable quune cave, note Alain de Fayet. Alors de 1779 à 1794 des travaux de restauration sont effectués. En 1779, surélévation du grand corps de logis, des ailes à lest et ouest, la clôture du parc et du grand potager et les allées du parc aménagées. En 1781, construction des écuries et du colombier. En 1783, pavage de la cour. En 1787, aménagement de lisle du moulin. En 1793, construction de la grande grange de la ferme. Cest près dun siècle plus tard, après la guerre de 1870, que le marquis Léon de Fayet reconstruisit les deux pavillons du château, suréleva les toits et donna ainsi à lensemble sa silhouette actuelle.","habitants":"Marquis de Broglie \r\n        \"","divers":"Aveny  GPS : 49° 10' 05\" Nord, 1° 38' 24\" Est","gps":"49° 10' 05\" Nord, 1° 38' 24\" Est","images":["../image/image_27/27_Aveny_1.jpg","../image/image_27/27_Aveny_2.jpg"]},"Consult_chateau_formulaire88b4":{"id":"Consult_chateau_formulaire88b4","dept":"27","canton":"Gisors","commune":"Bazincourt-sur-Epte","nom":"Bazincourt_Epte","type":"Château","periode":"XIX","histoire":"Deux châteaux dans cet article, Thierceville et la Rapée.         deux châteaux forts : l'un dont la localisation est inconnue, l'autre situé au lieu-dit Saussart ;\r\ndeux manoirs : l'un des XVIe et XVIIIe siècles au lieu-dit Thierceville, l'autre probablement du XVIIe siècle au lieu-dit les Ursulines.                                                                                                                       THIERCEVILLE Le château de Thierceville, à Bazincourt-sur-Epte, à deux étages carrés, est construit dans la première moitié du XIXe siècle. L'église de Thierceville ayant été détruite pendant la Révolution, en 1841, M. de Montreuil, propriétaire du château, a fait construire dans son parc une chapelle dédiée à sainte-Jovine.","architecture":"RAPEE,  château normand du XIXe siècle aux allures de manoir anglais, dans un coin de nature magnifique qui inspira de nombreux peintres. Perché sur une colline arborée, le château de la Râpée abrite des chambres aux tonalités douces donnant toutes sur le parc de 3 hectares. Chaque chambre possède une décoration et un mobilier personnalisés et tout le confort moderne.  Le château de la Râpée est construit en 1825 dans un immense domaine de 1300 hectares. Larchitecture est caractéristique du style anglo-normand et le nom du château rappelle que ses propriétaires étaient alors dimportants négociants en charbon Quai de la Râpée à Paris où ils possédaient également un hôtel particulier. Le domaine a été morcelé au fil des successions, la forêt dune part, puis le haras et pour finir le château. Février 1973 : Josette et Robert Bergeron acquièrent le château de la Râpée.  En juillet 1973 : le restaurant du château de la Râpée ouvre ses portes. Le couple Bergeron était précédemment restaurateur à La Boule Rouge, dans le 9ème arrondissement de Paris, un établissement réputé encore de nos jours. Après maintes recherches et visites ils étaient tombés sous le charme du cadre magnifique, de la\r\nbâtisse et de son parc au coeur du Vexin normand.","habitants":"Thierceville M. de Montreuil,                                                     Rapée  : Josette et Robert Bergeron                    \r\n        \r\n        \r\n        \"","divers":"Rapée  Grav-4 -5                                                                Thierceville grav 1-2-3","gps":"","images":["../image/image_27/27_Bazincourt_Epte_1.jpg","../image/image_27/27_Bazincourt_Epte_2.jpg","../image/image_27/27_Bazincourt_Epte_3.jpg","../image/image_27/27_Bazincourt_Epte_4.jpg","../image/image_27/27_Bazincourt_Epte_5.jpg"]},"Consult_chateau_formulairef47d":{"id":"Consult_chateau_formulairef47d","dept":"27","canton":"Bernay","commune":"Mesnil en Ouche","nom":"Beaumesnil","type":"Château","periode":"XVII","histoire":"BEAUMESNIL, au XIII e siècle Robert d'Harcourt fait construire le premier château qui passa au d'Harcourt de Lorraine à la fin du XVe siècle, puis acquis par Félix Lecomte marquis de Nonant, dont construit en 1633 Jacques de Nonant pour sa femme Marie Dauvet Desmaret font  construirent  en 1633 sur les ruines de lancien château. Propriété successive de diverses familles au XVIIe siècle aux Malet de Graville et aux Bethune-Charost, Maistre et le grand duc Dimitri de Russie, et par alliance Montmorency-Laval, veuf  de Jeanne de Béthune épouse  Constance de Maistre, en 1833 l'architecte  Joseph-Antoine Froelischer restaure le château, l'héritière  de la famille de Maistre le  conserve jusqu'à la première guerre mondiale  puis le cède  au grand duc Dimitri de Russie, il fut acquis en 1939 par Jean Fürstenberg, qui sest attelé à redonner au domaine sa splendeur d'antan. Depuis la mort de Jean Fürstenberg en 1982, la Fondation Fürstenberg-Beaumesnil, reconnue d'utilité publique dès 1966, s'efforce de maintenir en état le château, son parc et ses collections. Il ne reste que peu de choses des jardins qui auraient été dessinés par la Quintinie, assistant de André Le Nôtre, le créateur des jardins de Versailles.","architecture":"BEAUMESNIL, construit en 1633  sur les ruines de lancien château féodal dont le donjon, couvert de buis subsiste toujours au milieu des douves, sa construction durer de 1633 jusquen 1640. Ce qui fait de Beaumesnil un château unique en France, cest le style de son architecture. Dinspiration Louis XIII baroque, il demeure avec la fontaine Médicis et lhôtel de Sully situés à Paris, un rare exemple de ce style en france. Masques de la comedia dellarte sur sa façade, cheminées monumentales effets doptique dans larchitecture ponctuent loriginalité de ses ornements typiques d'une architecture \"libre\"Éléments protégés MH : le château, sauf parties classées : inscription par arrêté du 8 mai 1926. Les façades et les toitures ainsi que le grand escalier intérieur du château, la cour d'honneur, classement par arrêté du 20 décembre 1966. Le parc, les perspectives, l'avant-cour, la demi-lune, les basses-cours, les murs, les grilles et les portails ; les façades et les toitures des pavillons d'entrée et des communs : inscription par arrêté du 5 février 1997. C'est dans son état du XVIIIe siècle qu'a été principalement restauré l'environnement, qui présente entre autre: les jardins à la françaises de la \"demi-lune\" et des \"quatre saisons\", deux grandes perspectives dans l'axe des façades ponctuées d'un miroir d'eau, un étonnant labyrinthe de buis surmontant les ruines de l'ancien donjon médiéval, qui forme un îlot dans les douves, et d'agréables allées et sous-bois agrémentés d'éléments d'architectures tels une grotte de la vierge.","habitants":"Famille de Jacques de Nonant\r\n        \"","divers":"Beaumesnil    GPS : 49° 0' 50,32\" Nord, 0° 42' 40,57\" Est","gps":"49° 0' 50,32\" Nord, 0° 42' 40,57\" Est","images":["../image/image_27/27_Beaumesnil_1.jpg","../image/image_27/27_Beaumesnil_2.jpg","../image/image_27/27_Beaumesnil_3.jpg"]},"Consult_chateau_formulairefcfb":{"id":"Consult_chateau_formulairefcfb","dept":"27","canton":"Brionne","commune":"Beaumontel","nom":"Beaumontel","type":"Château","periode":"XVIII","histoire":"BEAUMONTEL ou Hervieu sont les dénominations figurant sur les cartes postales des années 1905-1910 à l'époque où le domaine a été remanié par Albert Parissot, sénateur de l'Eure. On lui doit en effet la création du parc avec boulingrin, diverses fabriques, l'agrandissement et la mise en scène du château avec perspective de tilleuls et grille d'honneur (aujourd'hui disparue), la construction des communs et serres notamment. Après les dégâts causés par les bombardements de 1944, le domaine est acquis en 1948 par Robert Hervieu, agriculteur à qui l'on doit la reconstruction de l'exploitation et l'introduction de méthodes modernes.","architecture":"BEAUMONTEL, faisant appel à l'architecte Robert Feuillade, il fait réparer la demeure endommagée par les bombardements, à l'identique pour les façades et les toitures dans le respect de l'architecture antérieure, en aménageant les intérieurs pourvus du confort de l'époque, ce qui est achevé en 1951. En 1950, Robert Hervieu fait construire par Feuillade, un vaste bâtiment d'élevage en béton brut surmonté de greniers à foin et à grain.  En 1950, Robert Hervieu fait construire par Feuillade, un vaste bâtiment d'élevage en béton brut surmonté de greniers à foin et à grain.","habitants":"Famille d'Albert Parissot\r\n        \"","divers":"Beaumontel       GPS : 49° 05' 42\" Nord, 0° 46' 36\" Est","gps":"49° 05' 42\" Nord, 0° 46' 36\" Est","images":["../image/image_27/27_Beaumontel_1.jpg"]},"Consult_chateau_formulaire3f1f":{"id":"Consult_chateau_formulaire3f1f","dept":"27","canton":"Les Andelys","commune":"Fontenay en Vexin","nom":"Beauregard_27","type":"Château","periode":"XVI","histoire":"BEAUREGARD,  dans le château de Beauregard est né au XVIIe siècle l'abbé de Chaulieu, poète de l'Académie Française. Au XIXe siècle, il appartenait au marquis Joseph de Laborde, archiviste-paléographe aux archives de l'Empire. Au milieu du XXe siècle, Beauregard appartenait à la société La Desnay-Le Beauregard.  Au XVIIe siècle, il fut le lieu de naissance et de villégiature de Guillaume Amfrye de Chaulieu, poète libertin et courtisan français; puis la résidence du comte Léon de Laborde, homme politique et archéologue du Second Empire, qui y mourut en 1869. Le château fut occupé et saccagé par les Prussiens en 1870, puis par les Allemands pendant la seconde guerre mondiale. Cette propriété privée appartient  à la famille Icard.","architecture":"BEAUREGARD, au XVIIIe siècle,  le château devint la résidence du comte Léon de Laborde, homme politique et archéologue du Second Empire, qui y mourut en 1869.  C'est un château privé, fermé au Public. Le château de Beauregard a été classé aux M.H. depuis le 16/04/1943. Éléments protégés MH : les façades et les toitures du château, le parc, les cinq allées plantées darbres partant du rond-point de la grille du château jusquau chemin de Tourny à Fontenay, y compris le rond point et les taillis et allées dans un rayon de 75 mètres autour du centre du rond point, et une sixième allée en direction sud à partir du chemin de Tourny à Fontenay.","habitants":"Famille de Joseph de Laborde\r\n        \"","divers":"Beauregard     49° 12' 35\" nord, 1° 34' 14\" est                   GPS : 49° 12' 08\" Nord, 1° 33' 30\" Est","gps":"49° 12' 08\" Nord, 1° 33' 30\" Est","images":["../image/image_27/27_Beauregard_27_1.jpg","../image/image_27/27_Beauregard_27_2.jpg"]},"Consult_chateau_formulaire7b70":{"id":"Consult_chateau_formulaire7b70","dept":"27","canton":"Bernay","commune":"Bernay","nom":"Bernay","type":"Château","periode":"XVI-XVIII","histoire":"Quatre châteaux dans cet article la Gabelle, Caorches, Grand-Champ, et Menneval .                                                                                                          GABELLE à Bernay,  l'Hôtel de la Gabelle date du XVIIIe siècle, a été édifié 1750 par M. de Bréant, attribué à Ange-Jacques Gabriel (architecte).  Cet hôtel abrita jusqu'en juin 2010, le  conservatoire de musique à rayonnement Intercommunal de la communauté de communes de Bernay et ses environs. Il a été transféré en août 2010, aux anciens abattoirs restaurés, est inscrit au M.H.  en 1928 et en 1964.                                                                                                                 MENNEVAL, le logis fut  construit vers 1660. Réaménagement et agrandissement, construction des communs aux XVIIIe et XIXe siècles, chapelle Saint Léonard datant du XVIe siècle détruite en 1820. Façade sud remaniée vers 1850. Construction d'une chapelle néo-gothique en 1850. Pièces de réception réaménagées au XXe siècle par l'architecte Jacquelin. Parc avec communs et colombier circulaire ruiné. Le château est composé d'un étage carré et un étage en surcroît, élévation ordonnancée surmontée d'un toit à longs pans couvert d'ardoise.                                GRAND-CAMP, au environ de Bernay chambres d'hôtes.                 HOULLEY, au sud de Bernay à St-Aubin le Vertueux a été bâti au XVIe siècle, le corps de logis a subit un incendie au XIXe siècle et fut reconstruit sur les fondations antérieures, vers 1865 par Jean du Houlley, personnage dont les ancêtres furent les serviteurs dévoués des rois Louis XIII et Henri IV.","architecture":"CAORCHES à  Saint-Nicolas à l'opposée de Bernay  est un château bâti à Caorches-Saint-Nicolas, date du XVIe et XVIIe, de la 1ère moitié XVIIIe siècle. Il possède un étage carré et un étage en surcroît. Sa toiture est en tuiles plates.                                                                                    GRAND-FEUGERAY,  à l'ouest de Bernay à  St-Germain la Campagne. La construction  date du XVIIe siècle, inscrite  partiellement aux M.H. depuis le 21/11/1973, pour ses façades et toitures. Le Manoir est privé, fermé au Public.                                                                                         HOULLEY, Il subsiste, dans la cour de ferme du château, plusieurs bâtiments dont la construction doit remonter au XVIe siècle, d'après les restes d'une cheminée avec hotte en pierre et moulures décorant encore une pièce du premier étage, et deux vieux bâtiments construits en pierres de silex dont l'origine paraît également fort ancienne; l'un d'eux, appelé le Bove, offre encore des restes de sculptures, et il est fort probable que la cave, complètement voûtée en pierre, a servi de geôle à une époque assez reculée. Communs, orangerie et chapelle (Notre-Dame) datent du XVIIIe siècle (chapelle 1769).","habitants":"Seigneur locaux\r\n        \r\n        \"","divers":"Caorches                                                                             Ménneval   grav 8                                                                      Theil  Caorches     Grav-2    GPS : 49° 5' 6,98\" Nord, 0° 30' 0,16\" Est                                                                                Gabelle Grav-1      GPS : 49° 05' 16\" Nord, 0° 35' 36\" Est                                    grand-Camp Grav-3-4  gps    49° 02' 46\" nord, 0° 31' 40\"est\r\n Grand Feugeray Grav-7        GPS : 49° 04' 3,45\" Nord, 0° 24' 20,13\" Est                  Houlley  Grav-5-6","gps":"49° 5' 6,98\" Nord, 0° 30' 0,16\" Est","images":["../image/image_27/27_Bernay_1.jpg","../image/image_27/27_Bernay_2.jpg","../image/image_27/27_Bernay_3.jpg","../image/image_27/27_Bernay_4.jpg","../image/image_27/27_Bernay_5.jpg","../image/image_27/27_Bernay_6.jpg","../image/image_27/27_Bernay_7.jpg","../image/image_27/27_Bernay_8.jpg"]},"Consult_chateau_formulaire855b":{"id":"Consult_chateau_formulaire855b","dept":"27","canton":"Beuzeville","commune":"Berville_sur mer","nom":"Berville_Mer","type":"Manoir","periode":"XVII","histoire":"Deux châteaux dans cet article Marolet et Pommeraye .            MAROLLET ou Berville il date du XVIIe au XIXe siècle. L'édifice est aussi désigné sous le château de Berville-sur-Mer, qui a appartenu à la Famille de Saint-Albon, est inscrit aux M.H. depuis 1971. Sont protégés aux M.H. : les façades et les toitures du manoir ainsi que du pigeonnier, le salon, la salle à manger et le bureau du rez-de-chaussée avec leurs boiseries. Il possède aussi un colombier polygonal en brique et un portail en pan de bois.                                                                                                                           A cinq K.M. au sud à Saint-Pierre du val le château SAINT-PIERRE du Val  (XIe, XVIIIe et XIXe).  est un château fort probablement construit au XIe siècle et détruit certainement à la fin de la guerre de Cent Ans. Au XVIIIe siècle, construction pour la famille Grosourdis d'un château et de ses dépendances. Ils sont démolis vers 1840 pour construire un château au style troubadour. Acquis par le marquis de Saint-Pierre en 1921, le château est de nouveau démoli. Michel de Grosourdy, marquis de Saint-Pierre (1916-1987), écrivain français, est décédé et enterré à Saint-Pierre-du-Val le 19 juin 1987. Sa fille, Isaure de Saint Pierre, est écrivain et journaliste.","architecture":"ST-PIERRE DU VAL, au XVIIIe siècle, construction pour la famille Grosourdis d'un château et de ses dépendances. Ils sont démolis vers 1840 pour construire un château au style troubadour. Acquis par le marquis de Saint-Pierre en 1921, le château est de nouveau démoli. Ne subsistent aujourd'hui que les ruines du donjon médiéval, un des deux bâtiments d'écuries (actuellement logis d'habitation), le colombier, une forge, le chenil, une maison dite de garde.                                                                                                            POMMERAYE, la construction du Manoir de la Pommeraye date du XVIIIe et XXe siècle. Il fut l'ancienne propriété de la famille Houel de la Pommeraye. Il est situé à proximité du hameau de Carbec construit dans le style néo-normand par l'architecte Henri Jacquelin. Le manoir est inscrit à l'inventaire général du patrimoine culturel. Il subsiste un des deux pavillons carrés de brique du XVIIe siècle. Il sera racheté au XIVe siècle, pour devenir le siège de la Seigneurie de Berville-sur-Mer,   par la Famille Houel de la Pommeraye qui le conservera jusqu'à la Révolution Française. Le dernier des Houel disparaitra, lors de l'émigration, en exil. Puis, au début du XIXe siècle, Claude Massol de Saint-Amand, Premier Préfet de l'Eure, posséda le château de la Pommeraye qui sera reconstruit, dans un style néo-Normand, au début du XXe siècle, pour Georges Desurmont et sa femme Madeleine Descamps, construit au XVIIIe siècle, fut détruit en 1912. Il fut remplacé, vers 1916, par le château de la Pommeray, actuel, à pans de bois. Seuls, le lavoir et le moulin ont été détruits.","habitants":"Famille de Saint-Albon                                                                 Famille Houel de la Pommeraye. \r\n        \"","divers":"Barville grav-1                                                                               Marollet  Grav-2   GPS : 49° 25' 15,54\" Nord, 0° 21' 30,9\" Est                   Pommeraye grav-3  GPS : 49° 25' 27\" Nord, 0° 20' 18\" Est  St-Pierre du Val grav 4-5  gps 9° 23' 55\" nord, 0° 21' 42\" est","gps":"49° 25' 15,54\" Nord, 0° 21' 30,9\" Est                   Pomm","images":["../image/image_27/27_Berville_Mer_1.jpg","../image/image_27/27_Berville_Mer_2.jpg","../image/image_27/27_Berville_Mer_3.jpg","../image/image_27/27_Berville_Mer_4.jpg","../image/image_27/27_Berville_Mer_5.jpg"]},"Consult_chateau_formulaireeb9d":{"id":"Consult_chateau_formulaireeb9d","dept":"27","canton":"Vernon","commune":"Vernon","nom":"Bizy","type":"Château","periode":"XVII","histoire":"BIZY;  au Moyen-Age, le fief de Bizy appartient aux sires de Blaru et à partir du XIVe siècle, à la famille Jubert. En 1675, la seigneurie est érigée en marquisat par Michel-André Jubert de Bouville, conseiller d'état. Au XVIIe siècle, un château est édifié , bâtiment de plan allongé flanqué de deux pavillons plus élevés, précédé de deux perrons en fer à cheval et couvert en ardoise. En 1721, Charles-Louis-Auguste Fouquet, duc de Belle-Isle, petit-fils de Nicolas Fouquet, qui a reçu en échange des terres de Belle-Isle les comtés de Gisors, Andelys et Vernon, entre en possession du domaine. Le duc (nommé maréchal de France en 1741) réalise d'importants travaux : avant-cour en terrasse et demi-lune, aménagement de l'ensemble du petit parc et du parc de chasse, agrandissement du domaine. Il projette la reconstruction du château : de 1741 à 1743, l'architecte Contant d'Ivry édifie la basse-cour avec les écuries inspirées de Versailles et le bassin pédiluve. Le 21 septembre 1749, Louis XV et Madame de Pompadour y viennent en visite. En 1761, le maréchal meurt à Versailles, conseiller d'état et ministre de la guerre ; le domaine de Bizy, baptisé \"Petit Versailles\", revient au roi. En 1767, le roi échange Bizy au comte d'Eu contre la principauté souveraine de Dombes. A sa mort, en 1775, le comte d'Eu lègue le domaine à son cousin Louis-Jean-Marie de Bourbon, duc de Penthièvre, fils du comte de Toulouse. A partir de 1783, le duc fait de fréquents séjours à Bizy ; en 1792, il y réside avec sa fille la duchesse d'Orléans, jusqu'à sa mort l'année suivante. Le château, confisqué et déclaré bien national en  1797, est vendu. En 1805, le général Le Suire rachète le domaine et fait construire un nouveau corps de logis, plus modeste, en avant de la basse-cour (côté Nord-Est).","architecture":"BIZY,  en 1817, la duchesse d'Orléans, qui rachète ses biens vendus à la Révolution, le  rachète au général Le Suire. Son fils Louis-Philippe en hérite en 1830 : il rajoute deux ailes à l'édifice, restaure les anciens bâtiments, crée un parc à l'anglaise. Le roi y séjourne souvent. En 1858, les biens de la famille d'Orléans sont mis aux enchères; le baron Fernand Schickler, beau-frère du duc d'Albuféra, alors maire de Vernon, acquiert le domaine. En 1860, il reconstruit la partie centrale du logis, la remplaçant par un édifice d'inspiration italienne. Un salon est spécialement aménagé pour recevoir des boiseries peintes, provenant, selon la tradition, du château du Bercy à Paris. En 1909, le baron Schickler lègue Bizy à son neveu Louis Suchet, quatrième duc d'Albuféra, qui achève le château en fermant la cour d'honneur par deux ailes. Les communs en pierre calcaire couverts d'un toit à longs pans en ardoise ; écuries à lucarnes à fronton ; corps de logis construit en 1860 par William White en pierre de taille couvert d'un toit en terrasse avec balustrade ; pavillons d'angle au nord construits au XIXe siècle et couverts d'un toit à pavillon brisé en ardoise ; logis avec rez-de-chaussée à bossages en refends et baies en plein cintre ; étage à colonnes couronné par un étage attique ; élévation nord du logis avec porche à colonnes sur la partie centrale ; élévation Sud avec galerie ouverte en rez-de-chaussée et pilastres à l'étage. Les salons sont renommés pour leurs boiseries et leurs tapisseries. Dans ce décor sont présentés de nombreux souvenirs du premier Empire qu'ont réunis les descendants du maréchal Suchet qui font de Bizy un remarquable musée Napoléonien.","habitants":"Michel-André Jubert de Bouville\r\n        \"","divers":"Bizy     GPS : 49° 05' 01\" Nord, 1° 27' 57\" Est","gps":"49° 05' 01\" Nord, 1° 27' 57\" Est","images":["../image/image_27/27_Bizy_1.jpg","../image/image_27/27_Bizy_2.jpg","../image/image_27/27_Bizy_3.jpg","../image/image_27/27_Bizy_4.jpg","../image/image_27/27_Bizy_5.jpg"]},"Consult_chateau_formulaireeb3b":{"id":"Consult_chateau_formulaireeb3b","dept":"27","canton":"Beaumesnil","commune":"St-Pierre du Mesnil","nom":"Blanc_Buisson","type":"Château","periode":"XVIII","histoire":"BLANC-BUISSON, le château a été fondé à la fin du XIIIe siècle par Collinet Le Conte, connétable du comte dÉvreux et de Navarre. Le roi Charles V fit le siège de la place forte en 1355, la laissant à l'état de ruine. Ce n'est qu'au XVIe siècle que le château fut reconstruit par Jacques du Merle, capitaine de l'arrière-ban des nobles de Bernay, tout en conservant son caractère défensif. Les travaux furent achevés à la fin du XVIe siècle, après réparations des dégâts subis pendant les guerres de Religion.  Lors de linstallation de la famille de La Fresnaye, cet édifice se trouvait dans un redoutable état de délabrement nécessitant une réhabilitation immédiate. Tout a été fait pour assurer le \"sauvetage\" du château qui a duré une vingtaine dannées et  aujourdhui pratiquement achevé.  Ce château appartient à la famille de Merle et de Pillan M. et Mme de Baudicour, propriétaires actuels.","architecture":"BlLANC-BUISSON, au XVIIIe siècle, la partie sud du logis a été restaurée et partiellement réaménagée suite à un incendie. Le château est encore entouré de douves et a conservé un aspect militaire: pavillon d'entrée avec trace de pont-levis, mâchicoulis,canonnières, logis cantonné de pavillons fortifiés. Quelques éléments architecturaux signalent son évolution résidentielle tels que les baies avec frontons. Les façades marient la pierre locale avec la brique polychrome ornée de croisillons. Le château est entouré de champs et d'espaces boisés en bosquets. Les routes autour du château possèdent un caractère paysagé (alignements d'arbres, haies). Il s'adapte à vos besoins dans le cadre de l'organisation clé en main de réceptions, dîners, soirées, séminaires, mariages, concerts ou expositions. Le lieu dispose de plusieurs espaces de réception, voir le site.","habitants":"Famille de La Fresnaye\r\n        \"","divers":"Blanc-Buisson grav 1à 6   GPS : 48° 56' 20\" Nord, 0° 33\" 52' Est","gps":"48° 56' 20\" Nord, 0° 33\" 52' Est","images":["../image/image_27/27_Blanc_Buisson_1.jpg","../image/image_27/27_Blanc_Buisson_2.jpg","../image/image_27/27_Blanc_Buisson_3.jpg","../image/image_27/27_Blanc_Buisson_4.jpg","../image/image_27/27_Blanc_Buisson_5.jpg","../image/image_27/27_Blanc_Buisson_6.jpg"]},"Consult_chateau_formulaire76d8":{"id":"Consult_chateau_formulaire76d8","dept":"27","canton":"Beaumesnil","commune":"La Barre en Ouches","nom":"Bois_Baril","type":"Château","periode":"XVI-XIX","histoire":"BOIS-BARIL, la construction  du manoir  date du XVIe et XVIIe siècle, est entouré de douves en eau, ses fondations remonteraient à la fin du Moyen-Age. Luc de la Barre, seigneur de la Barre, fut victime de la cruauté de Henri Ier d'Angleterre. En 1122, plusieurs seigneurs normands se liguèrent contre Henri Ier. Le roi battit les ligueurs à Bourgtheroulde et fit prisonniers nombre de rebelles, dont Geoffroy de Tourville, Odoard du Pin et Luc de la Barre  qui, outre le délit de rébellion, était accusé d'avoir tourné en ridicule le monarque dans plusieurs polémiques. Henri résolut de faire comparaître devant lui, à Rouen, ces trois prisonniers quelques jours après la Pâque de l'an 1124 et il les condamna à perdre les yeux.","architecture":"BOIS-BARIL, de plan rectangulaire  les pieds dans l'eau à deux niveaux dont un en combles sur toit à deux pans couvert de tuiles, tour rondes à un angles en encorbellement et carrée à l'opposée sans toit avec son pigeonnier classé, propriété privée située à la sortie de La Barre en Ouche en direction de LAigle. Le manoir du Bois-Baril est inscrit aux M.H. en 1939, et le Colombier a été classé aux M.H. en 1942.                                                                                                               BOIS-FRANC Le Château des Bois Francs a été construit au XIXe siècle, ses dépendances au XVe siècle","habitants":"Famille de la Barre\r\n        \"","divers":"Bois Baril    GPS : 48° 55' 50\" Nord, 0° 38' 37\" Est","gps":"48° 55' 50\" Nord, 0° 38' 37\" Est","images":["../image/image_27/27_Bois_Baril_1.jpg","../image/image_27/27_Bois_Baril_2.jpg","../image/image_27/27_Bois_Baril_3.jpg","../image/image_27/27_Bois_Baril_4.jpg"]},"Consult_chateau_formulaire64c0":{"id":"Consult_chateau_formulaire64c0","dept":"27","canton":"Evreux","commune":"Angerville -la-Campagne","nom":"Bois_de_la_Lune","type":"Château","periode":"XIX","histoire":"BOIS de  la LUNE, c'est en 1791, après la Révolution Française, que les biens du clergé furent déclarés biens nationaux. Monsieur Hyppolite  Le Mercier de Pierremont saisit cette occasion pour acquérir 300 hectares à Angerville La Campagne. Le domaine échut à son gendre Pierre-Nicolas l'Hopital, qui était maire d'Evreux en 1848.  Son fils, Georges l'Hopital, officier de la Légion d'Honneur, fut conseiller d'état et Président de la société libre d'Evreux. Joseph l'Hopital, son fils, s'est illustré grâce à sa belle plume et son verbe brillant. Deux de ses ouvrages furent couronnés à L'Académie Française. Il fut également maire d'Angerville la campagne de 1911 à 1930. La même famille est restée vivre dans ce château jusqu'à sa vente en mai 2008 à la Famille Bonleu, les propriétaires actuels. Eric Bonleu, architecte, et son épouse Roselyne ont rénové le château avec passion et élégance, en conservant son charme authentique. Appelé autrefois château dAngerville-la-Campagne, ils lont rebaptisé « château du Bois de la Lune ». Ils y vécurent 7 ans avec leurs enfants, organisant de nombreuses fêtes de famille, avant de rejoindre Paris en 2015, pour loffrir maintenant en location à la semaine ou au week-end à dautres familles. La propriété est toujours louée dans son intégralité à une seule famille.","architecture":"BOIS de  la LUNE,  en 1829, au milieu de ce merveilleux parc aux mille essences, il fit construire le château actuel, de plan rectangulaire à trois niveaux sur soubassement toit en croupe, avant corps d'entrée légèrement saillant avec fronton triangulaire au niveau du toit avec oculus  et l'édifice  accolé de deux  pavillons carrés sur les flancs droit et gauche,  d'un rez-de -chaussée avec de grande ouverture. Le bâtiment  entouré dune petite chapelle sous le patronage de Notre-Dame, dun pavillon de chasse, dune écurie, et dune orangerie et décida de transformer une partie de ses exploitations agricoles, en une ferme modèle.","habitants":"Famille de  Georges l'Hopital\r\n        \"","divers":"Bois de  la Lune    GPS : 48° 59' 16\" Nord, 1° 09' 48\" Est","gps":"48° 59' 16\" Nord, 1° 09' 48\" Est","images":["../image/image_27/27_Bois_de_la_Lune_1.jpg","../image/image_27/27_Bois_de_la_Lune_2.jpg","../image/image_27/27_Bois_de_la_Lune_3.jpg"]},"Consult_chateau_formulaireb272":{"id":"Consult_chateau_formulaireb272","dept":"27","canton":"Pont-Audemer","commune":"Ecaquelon","nom":"Bois_Héroult","type":"Château","periode":"XVII","histoire":"BOIS-HEROULT,  tient son nom d'un seigneur nommé Hérold ou Harold, d'origine Viking. Résidence privée de la famille de Pradel de Lamaze, le bâtiment fait l'objet d'une inscription au titre des M.H.  depuis 1966 et dune inscription au titre des sites depuis 1967.  Le château du Bois-Héroult, parmi les plus beaux de la région, est une bâtisse Louis XIV. Cet édifice fut construit vers la fin du XVIIe siècle, début XVIIIe siècle,  par Maître Guillaume le Chevalier, avocat général au parlement de Rouen. Aujourdhui, le domaine du Bois-Héroult est la propriété du comte Hervé de Chérisey (de très vieille noblesse Lorraine), petit-fils du cinquième marquis de Bartillat.  L'actuel château a été édifié par Jacques Alphonse de Civille Saint-Mards sur des terres apportées en dot par mademoiselle Bonissent de Buchy, son épouse, après avoir rasé le château ancien.","architecture":"BOIS-HEROULT,  les anciens textes mentionnent l'existence «ancienne et de grande antiquité» d'une fortification féodale normande, dans une situation stratégique remarquable. Dans les bois surplombant le carrefour du « Chef de l'eau » où se trouve la source de l'Héronchelle, on voit encore des vestiges. Édifié au XVIIIe siècle en brique et pierre, il est caractérisé par ses hauts toits d'ardoise, son colombier et par son orangerie. Le parc de 7 hectares est composé d'arbres centenaires. Son bassin octogonal et ses statues à l'antique datent du XVIIIe siècle. Il a été construit d'un seul jet de 1715 à 1721, en brique et pierre, avec un haut toit comme on en faisait sous Louis XIII. On ne connaît pas l'architecte, mais un artisan a signé « Delalande en 1721 » sur une brique à droite de l'escalier à double révolution. Autrefois, le château était tourné vers la vallée et le perron était l'ornement principal de la façade. C'est un perron Louis XV, vers 1750, qui a été donné en cadeau de mariage en 1804. Cet escalier n'a pas été construit pour Bois-Héroult, mais vient d'une autre propriété,  pas très éloignée et démolie à la Révolution. Les armes sont celles des familles de Civille-Blosseville.","habitants":"Maître Guillaume le Chevalier\r\n        \"","divers":"Bois-Héroult","gps":"","images":["../image/image_27/27_Bois_H%c3%a9roult_1.jpg","../image/image_27/27_Bois_H%c3%a9roult_2.jpg"]},"Consult_chateau_formulairecf1e":{"id":"Consult_chateau_formulairecf1e","dept":"27","canton":"Pacy-sur-Eure","commune":"Boisset-les-Prévanches","nom":"Boisset_Prévanches","type":"Château","periode":"XVII","histoire":"Deux châteaux dans cet article Boisset et les-Prévanches.                          BOISSET  du latin de l'époque gallo-romaine \"Boextum in pervanchiam\" signifie des bois dans les prés. Ce somptueux domaine à lesprit très romantique, se compose dun château de briques et de pierres construit au début du XVIIe siècle, dun manoir anglo-normand du milieu du XIXe siècle, dune orangerie, d'un théâtre, et de nombreux cottages installés sur un parc arboré et fleuri de 2,5 hectares. Laccès au domaine se fait accueillant et discret en passant sous une allée de tilleuls plantés il y a 150 ans par le Marquis de Lespinasse.. M. de Bonardi du Ménil, propriété privée,","architecture":"PREVANCHES,  une grande allée de tilleuls mène à ce domaine élégant et champêtre. Le château de Prévanches construit au XVIIe siècle, possède une façade chatoyante, orné de fenêtres de briques et pierres alternées, et de tourelles d'angle en encorbellement, la brique, la pierre, le grès et les enduits colorés utilisés expliquent sa grande richesse décorative. Sur ce domaine, on se promène parmi les cottages, les avenues séculaires, la belle orangerie-théâtre, les jardins fleuris, qui confèrent à ce manoir une ambiance très romantique. Jardins ouverts et jardins clos mènent à la suite des salons et des granges du manoir. Grâce à son investissement passionné et constant, le charme opère plus que jamais autour du petit château de brique à tourelles, du manoir du XIXe siècle, et des constructions et aménagements aujourd'hui dévolus à l'accueil de nombreux mariés.                                                   Visible depuis la départementale 141 qui mène au centre-bourg de Boisset-les-Prévanches, le château, auquel on accède par une double allée de tilleuls, ne possède pas le faste ostentatoire de certaines demeures seigneuriales. Cette maison-ci semble avant tout conçue pour le bonheur et l'intimité familiale. Si le site ne présente aucun vestige antique ou médiéval, l'archéologie aérienne a révélé en 1999, dans l'enceinte même du domaine de Boisset-les-Prévanches, les contours d'un petit sanctuaire gallo-romain ou fanum. On ne soulignera jamais assez l'apport de l'asso..","habitants":"seigneur local\r\n        \r\n        \"","divers":"Boisset                                                                            Prévanches.      GPS : 48° 58' 17,81\" Nord, 1° 19' 57,87\" Est","gps":"48° 58' 17,81\" Nord, 1° 19' 57,87\" Est","images":["../image/image_27/27_Boisset_Pr%c3%a9vanches_1.jpg","../image/image_27/27_Boisset_Pr%c3%a9vanches_2.jpg"]},"Consult_chateau_formulaire2f66":{"id":"Consult_chateau_formulaire2f66","dept":"27","canton":"Gallion","commune":"La croix st-Leufroy","nom":"Boissière_27","type":"Château","periode":"XVI","histoire":"BOISSIERE, le manoir correspondrait à une ancienne dépendance de l'abbaye de la Croix Saint-Leufroy. Sa construction aux XVe et XVIe siècles pourrait être en partie attribuée à Richard Le Mercier, abbé de la Croix Saint-Leufroy de 1506 à 1522. L'édifice se présente sous la forme d'un logis à un étage doté d'une tour d'escalier polygonale saillante sur sa façade nord. Deux  arcades, charretière et piétonne, assurent un accès vers la cour du manoir en passant sous le   bâtiment. La façade nord est constituée de moellons de pierre ou de silex, accompagnés de  chaînes d'angle en pierre de taille. La façade sud, côté cour, présente un traitement plus soigné  avec ses assises alternées de silex taillé et de pierre calcaire. Le pan de bois est ponctuellement  utilisé sur la tour d'escalier  et la façade sud. Le manoir a conservé ses remarquables baies  d'origine, ornées de fines baguettes sculptées sur leurs piédroits et leurs linteaux. Il est probable que les baies les plus grandes, sur cour, aient possédé un remplage en croisillon avec meneaux  et traverses. Des écus sans blasons sont encore visibles au-dessus du passage charretier et de certaines ouvertures. Le manoir est entretenu et accueille actuellement un gîte.","architecture":"BOISSIERE,  a été inscrit en tant que monument historique le 17 avril 1926. Situé à proximité du hameau de la Boissaye, le manoir dispose d'un environnement rural  préservé avec ses plaines cultivées ponctuées de vergers et de bois. Le faible relief permet au  monument de bénéficier de perspectives lointaines vers le Nord-Ouest et le Sud-Est. Ce cadre  valorisant mérite d'être conservé en veillant à la qualité des constructions voisines.","habitants":"Richard Le Mercier, \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Boissière 49° 06' 36\" nord, 1° 14' 39\" est","gps":"","images":["../image/image_27/27_Boissi%c3%a8re_27_1.jpg","../image/image_27/27_Boissi%c3%a8re_27_2.jpg","../image/image_27/27_Boissi%c3%a8re_27_3.jpg"]},"Consult_chateau_formulairec6ba":{"id":"Consult_chateau_formulairec6ba","dept":"27","canton":"Romilly-sur-Andelle","commune":"Radepont","nom":"Bonnemare","type":"Château","periode":"XVI","histoire":"BONNEMARE, en 1555, Nicolas Leconte, marquis de Draqueville, achète un manoir médiéval avec sa chapelle et son domaine. Il est nommé président au parlement de Normandie  en 570, un manoir médiéval précédait le château actuel. Il aurait été habité par Raoul de Bonnemare, héros issu du lai de Marie de France \"les deux amant\" dont le site est à 12 kilomètres, en surplomb des vallées de Seine et d'Andelle. Une tradition locale raconte que le château de Bonnemare aurait hébergé les Rois Charles VII avec Agnès Sorel, et Charles IX qui aimait chasser dans cette région. Celui-ci avait même prévu un château monumental dans la commune actuelle de Charleval. Vers 1637, le domaine fut acheté par Etienne de Fieux.  C'est à cette famille que l'on doit la réfection partielle de la chambre de parade et la modification des bâtiments de ferme, en 1668, avec un agrandissement du pressoir. Au XVIIIe siècle, deux familles propriétaires se succèdent: les Cromelin de Villette, puis Charles Le Blond et son fils. Ceux-ci aménagent l'aile nord en appartements, et un salon dans le château en 1779, puis arrive la Révolution avec le désir pour les occupants de ne pas avoir \"de problèmes\", d'où le burinage des pierres armoriées et le maquillage d'un tableau représentant le Roi. Au XIXe siècle, d'autres propriétaires se succèdent au château de Bonnemare, Louis Alexandre, banquier, ensuite Louis Cavelan et enfin en 1888 Gustave Gatine, notaire à Paris, aïeul des propriétaires actuels. Il réaménage le parc et le décore avec des statues du XVIIIe siècle provenant du château de Bagatelle. Appartient aujourd'hui à M. Pierre  Salmon-Legagneur.","architecture":"BONNEMARE, éléments protégés MH : l'ensemble des communs bordant la cour de ferme : au nord du châtelet les façades et les toitures des grange, les étables, le bûcher (sans les adjonctions modernes)  les façades et les toitures de l'aile de logements, y compris les structures anciennes en pans de bois subsistants. Au sud du châtelet le pressoir bâtiments et éléments de fonctionnement, immeubles par destination avec la cave à cidre et le cellier), les façades et les toitures des écuries, de l'ancienne boulangerie (transformée en logement) et des étables en retour, il construit alors un château flanqué de deux tourelles et de deux ailes, agrémenté d'un châtelet d'entrée. les éléments subsistants entre la basse-cour et la cour d'honneur, les deux arcades et le fragment de mur, l'ensemble de la clôture ancienne du domaine : inscription par arrêté du 14 janvier 1991. Le château, à l'exclusion de l'aile nord, le châtelet et la chapelle : classement par arrêté du 16 octobre 1992.","habitants":"Famille de  Etienne de Fieux\r\n        \"","divers":"Bonnemare      GPS : 49° 19' 54,12\" Nord, 1° 19' 58,8\" Est","gps":"49° 19' 54,12\" Nord, 1° 19' 58,8\" Est","images":["../image/image_27/27_Bonnemare_1.jpg","../image/image_27/27_Bonnemare_2.jpg","../image/image_27/27_Bonnemare_3.jpg","../image/image_27/27_Bonnemare_4.jpg"]},"Consult_chateau_formulaire61cb":{"id":"Consult_chateau_formulaire61cb","dept":"27","canton":"Bourg-Achard","commune":"La Haye-Aubrée,","nom":"Bonneval_27","type":"Manoir","periode":"XVII","histoire":"BONNEVAL, a été construit vers 1668 par Robert de Harden, grand verdier (officier) de la forêt de Brotonne et lieutenant des chasses. Le château possède un corps de logis rectangulaire dont l'architecture s'apparente au classicisme français. Des chaînes en pierre de taille rythment les façades de briques polychromes calepinées en croisillons. Les ornements (panneaux en pierre, bossages, fronton de l'entrée) renforcent l'élégance de l'édifice. Au XVIIIe siècle, les intérieurs sont remaniés selon le goût Louis XV. Le domaine développe une activité agricole entraînant la construction de nombreux bâtiments au XVIIe et XVIIIe siècles. Propriété de monsieur Hefiher.","architecture":"BONNEVAL, après la Révolution, l'exploitation du domaine est poursuivie, raison pour laquelle les dépendances ont été conservées. Ces bâtiments (pressoir, cellier, étables, etc.) constituent un rare exemple d'ensemble rural, avec leurs murs à colombage et une toiture en chaume pour la plupart. Le domaine a récemment fait l'objet de restaurations et d'une mise en valeur par ses propriétaires. Le château est situé à la lisière sud de la forêt de Brotonne et bénéficie d'un cadre rural préservé (champs, vergers, prairies). Éléments protégés MH : le château : classement par arrêté du 5 septembre 1963. Les bâtiments de l'enclos constituant le domaine agricole : le pressoir avec son mécanisme et ses éléments de fonctionnement et le cellier, la bergerie et l'étable, la petite étable, la charretterie, les granges Ouest et Est, le colombier, la maison du fermier, le four à pain, les vestiges de la clôture de l'ancien potager et des portes des champs, le bâtiment aux chiens et l'ancien logement, au Nord de l'enclos : inscription par arrêté du 30 août 1990.","habitants":"Famille de  Robert de Harden\r\n        \r\n        \"","divers":"Bonneval     GPS : 49° 24' 05\" Nord et 0° 42' 30\" Est","gps":"49° 24' 05\" Nord et 0° 42' 30\" Est","images":["../image/image_27/27_Bonneval_1.jpg"]},"Consult_chateau_formulaireb378":{"id":"Consult_chateau_formulaireb378","dept":"27","canton":"Breteuil","commune":"Chamblac","nom":"Bonneville_27","type":"Château","periode":"XVI","histoire":"BONNEVILLE,  au XVe siècle, le domaine appartenait à Jean de Bonneville, chambellan du roi, est cité en 1400 comme seigneur.  En 1464, , il  appartient à Laurent de Bonneville. L'édifice se transmet dans cette famille jusqu'au XVIIIe siècle. En  1745  Jacques de Bonneville épouse  Louise de Montmorency-Laval, leur fils Nicolas resté sans héritier lègue la demeure en 1806  à son cousin germain Louis-Gabriel Mallard  de la Varende, par le dernier Bonneville, devenu député de l'Eure le comte de la Varende épouse la soeur de celui qui deviendra dans le plus célèbre roman de son petit-fils le modèle  de Nez de Cuir héritière de Bonneville, sa fille, la comtesse de Bréda, transmet à son tour Bonneville à son frère, Léon Mallard de la Varende officier de la marine et époux de la fille de l'amiral Fleuriot de Langle. leur fils Jean écrivain sera élevé dans sa famille maternelle, après la premiere guerre  mondiale il s'installe à Bonneville jusqu'à sa mort. La famille de la Varende  toujours propriétaire des lieux.","architecture":"BONNEVILLE, l'édifice est composé de trois ailes conjointes cantonnées de tourelles et formant une cour orientée vers l'Est. Les façades associent un parement en briques polychromes avec des motifs en croisillons, à de la pierre de taille pour le soubassement et les chaînes d'angle. Suite à un incendie vers la fin du XVIIIe siècle, le château a été relevé pour Nicolas de Bonneville en employant une brique monochrome qui rend lisible les parties reconstruites. En parallèle, une toiture mansardée en ardoises a été ajoutée et les intérieurs ont été réaménagés selon le style Louis XVI. Courant XIXe siècle, les jardins ont été modifiés par l'architecte-paysagiste Lalos. Durant la première moitié du XXe siècle, l'écrivain Jean de la Varende, grand prix de l'Académie Goncourt, fait restaurer le château (propriété familiale) et ajoute une galerie couverte côté cour. Il donne également aux jardins leur aspect actuel avec ses buis taillés en échiquier. Le château possède une perspective Est-Ouest axée sur le corps central. Les vues portent de part et d'autre sur un paysage de plaines cultivées ponctuées de bois. Une autre perspective se développe vers le sud, à travers champs et vergers. En parallèle, le parc arboré et classé forme un écrin autour du château. L'environnement rural, très préservé, met en valeur le monument.","habitants":"Famille des  de la Varende\r\n        \"","divers":"Bonneville gps 48° 59' 14\" nord, 0° 32' 59\" est","gps":"","images":["../image/image_27/27_Bonneville_27_1.jpg","../image/image_27/27_Bonneville_27_2.jpg","../image/image_27/27_Bonneville_27_3.jpg"]},"Consult_chateau_formulaire9b42":{"id":"Consult_chateau_formulaire9b42","dept":"27","canton":"Beuzeville","commune":"Drucourt","nom":"Bosc_Henry","type":"Château","periode":"XVII","histoire":"BOSC-HENRY, vers 1620, la baronnie de Drucourt a été rachetée à l'abbaye du Bec par Jean, seigneur du Bosc Henry. La construction du château est située au XVIIe siècle, suite à l'acquisition des terres. La décoration de la chapelle et des intérieurs est remaniée au XVIIIe siècle selon un style Louis XV.","architecture":"BOSC-HENRY;  après l'émigration de son propriétaire lors de la Révolution, le domaine est déclaré bien national en 1791 puis mis en vente. Partiellement abattu, le château du Bosc-Henry a perdu son corps central en 1835 qui  a été abattu,, laissant 2 pavillons esseulés. Il subsiste les deux ailes latérales et leurs pavillons d'about qui correspondaient à la chapelle et aux anciennes dépendances. Leurs façades présentent un soubassement de pierre puis une élévation de brique d'où ressortent des panneaux enduits. Danciens combles à la Mansart ont été préservés au niveau des pavillons. Ces vestiges ont été intégrés à une exploitation agricole et ont servi d'habitation et d'étables jusqu'à l'après-guerre. Le château est toujours situé dans l'enceinte d'une exploitation agricole, au sud du village de Drucourt. Éléments protégés MH : l'ancienne chapelle, les façades et les toitures du pavillon attenant à cette chapelle : inscription par arrêté du 15 septembre 1954.","habitants":"Seigneur local\r\n        \"","divers":"Bosc-Henry      GPS : 49° 06' 40\" Nord, 0° 27' 27\" Est","gps":"49° 06' 40\" Nord, 0° 27' 27\" Est","images":["../image/image_27/27_Bosc_Henry_1.jpg","../image/image_27/27_Bosc_Henry_2.jpg","../image/image_27/27_Bosc_Henry_3.jpg","../image/image_27/27_Bosc_Henry_4.jpg"]},"Consult_chateau_formulairee190":{"id":"Consult_chateau_formulairee190","dept":"27","canton":"Romilly-sur-Andelle","commune":"Letteguives","nom":"Bosc_Oursel","type":"Château","periode":"XVIII","histoire":"BOSC-OURSEL,  construit au XVIIIe siècle par un ancêtre de la famille actuelle de Lestanville, l'édifice a une histoire liée à celle de la Neuville Chant d'Oisel, lors du mariage d'Anne Asselin Desparts (propriétaire du Chant d'Oisel) avec Louis de Lestanville, la grille d'entrée du château du Chant d'Oisel fut emportée et installée dans le parc du château de Bosc Oursel, avec cette inscription : Demulcet vitae taedia Cantus Avis (Le chant de loiseau adoucit lamertume de la vie) qui devint la devise la commune.","architecture":"BOSC-OURSEL  livrée aux Allemands lors de la deuxième guerre mondiale, il passe ensuite entre les mains des libérateurs canadiens, tandis que le jardin se transforme quelque temps en camp de prisonniers pour soldats de la Wehrmacht. Il en reste encore des traces et cela malgré toutes les restaurations faites depuis. Des marbres de cheminées cassés, traces de bidons sur le parquet et le parc ne ressemblait plus à rien. Après plusieurs années d'abandon, le château a été repris vers 1956 par les actuels propriétaires.","habitants":"Famille de Lestanville\r\n        \"","divers":"Bosc-Oursel   gps 49° 25' 30\" nord, 1° 19' 47\" est","gps":"","images":["../image/image_27/27_Bosc_Oursel_1.jpg"]},"Consult_chateau_formulaire4058":{"id":"Consult_chateau_formulaire4058","dept":"27","canton":"Pacy-sur-Eure","commune":"Le Plessis-Hébert","nom":"Bosc_Roger","type":"Château","periode":"XV-XVI","histoire":"BOSC-ROGER, est un fief et une paroisse attestés depuis environ 1180. Le domaine, qui appartient aux Monthiers à partir du milieu du XVe siècle, est constitué dune basse cour qui englobe divers bâtiments dont léglise paroissiale, un colombier, un pressoir et le manoir à tourelle construit à la fin XVe ou au début XVIe siècle. Les façades du manoir sont en maçonnerie au rez-de-chaussée et pans de bois à létage. Entre 1786 et 1789, le marquis de Monthiers fait construire plus au sud, à lextérieur de lancienne basse-cour.","architecture":"BOSC-ROGER,  néo-classique de brique et pierre, avec parc, alignements darbres et parterres en pelouse. En 1791, léglise paroissiale est désaffectée et convertie en grange, tout comme le vieux château. Vers 1900, de nouveaux bâtiments agricoles sont construits à louest, hors du périmètre du site castral. Le vieux château, encore en bon état vers 1990, est aujourdhui en ruines; les autres bâtiments de lancienne basse-cour, également en état préoccupant, font lobjet de travaux de restauration. Situé près de la ligne de crête entre plateau et coteau de la vallée dEure, cet ensemble est représentatif de lévolution dun domaine seigneurial entre XIIe et XVIIIe siècle. Le château du XVIIIe siècle dispose de vues lointaines vers la plaine cultivée à l'Ouest et vers les coteaux boisés à l'Est.","habitants":"Famille des  Monthiers\r\n        \"","divers":"Bosc-Roger     GPS :49° 02' 49\" Nord, 0° 51' 34\" Est","gps":"49° 02' 49\" Nord, 0° 51' 34\" Est","images":["../image/image_27/27_Bosc_Roger_1.jpg"]},"Consult_chateau_formulaire1ad2":{"id":"Consult_chateau_formulaire1ad2","dept":"27","canton":"Romilly-sur-Andelle","commune":"Bourgtheroulde-Infreville","nom":"Boscherville","type":"Château","periode":"XVII","histoire":"La Mairie de Bourgheroulde-Infreville est installée dans les murs de l'ancien château  bâti à Bourgheroulde-Infreville,   Deux châteaux dans cet article , Boscherville  et Bosc-Benard. BOSCHERVILLE, vers 1601, Jean Godard fait l'acquisition de la seigneurie de Boscherville qu'il revend à Georges du Fay, seigneur de La Mésangère. En 1663, la terre appartient aux Scot, seigneurs de La Mésangère. Entouré d'un magnifique parc boisé de sept hectares, également appelé château de la Mésangère, fut construit au milieu du XVIIe siècle. Tout de briques et de pierres, il s'enorgueillit d'avoir accueilli Jean de La Fontaine. Le parc fut dessiné par un élève de Le Nôtre en 1663, il abrite une statuaire remarquable. C'est dans ce parc que Jean de La Fontaine aurait écrit Les Deux Pigeons et Les Grenouilles. Les belles grilles en fer forgé proviennent du château de Fumechon.","architecture":"BOSC-BENARD Le château comprend un logement du XVIe siècle et un logis construit à la fin du premier quart du XVIIIe siècle par Thomas Lemarchand pour Thirel. Le four à pain, l'étable, la remise et la buanderie remontent au XVIIIe siècle. Le pressoir et le colombier mentionnés en 1712, actuellement détruit. La chapelle sert aujourd'hui d'étable. Le château se compose d'un étage carré et un étage en surcroît, élévation à travées surmontée d'un toit en ardoise et chaume. Éléments protégés  MH : la margelle du puits situé dans la cour de la ferme : classement par arrêté du 10 septembre 1935.","habitants":"Famille de Scot\r\n        \"","divers":"Boscherville  grav-1-2                                                                          Bosc-Benard. Grav-3   Gps 49° 19' 07\" nord, 0° 50' 58\" est.  Boscherville, GPS : 49° 17' 57\" Nord, 0° 52' 28\" Est","gps":"49° 17' 57\" Nord, 0° 52' 28\" Est","images":["../image/image_27/27_Boscherville_1.jpg","../image/image_27/27_Boscherville_2.jpg","../image/image_27/27_Boscherville_3.jpg"]},"Consult_chateau_formulaire73d9":{"id":"Consult_chateau_formulaire73d9","dept":"27","canton":"Bourgtheroulde_Infreville","commune":"Bosnormand","nom":"Bosnormand","type":"Château","periode":"XVII","histoire":"BOSNORMAND, un château des XVIIe et XIXe siècles remanié par l'architecte rouennais Lucien Lefort; au sud de Bois-Roger,  de Richard de Bosnormand avait reçu d'Henri II, roi d'Angleterre, la terre de le Londe; il la donna en 1190 à l'Hôtel Dieu de Rouen, qui l'aliéna plus tard. Avant la Révolution, la seigneurie appartenait aux sieurs de Thuit-Angers. Le colombier polygonal, en maçonnerie, date de la première moitié du XVIIe siècle; les communs et la chapelle Notre-Dame de la deuxième moitié du XVIIe siècle. Le château fut reconstruit par Lucien Lefort entre 1908 et 1916.","architecture":"BOSNORMAND, on sait par différentes sources qu'un camp gallo-romain était implanté sur la commune. En témoignent certains objets trouvés dans des champs de cultures ; notamment des sesterces du IIe siècle trouvés dans une amphore intacte par M. Louis Ernest Frémont sur ses terres au début du XXe siècle et visibles au musée d'histoire archéologique de Rouen.\r\nUne annexe de la commanderie de Sainte-Vaubourg (située à Val-de-la-Haye en Seine-Maritime) était implantée sur le territoire de la commune. Deux familles ont laissé leur nom et leur empreinte sur la commune :  La famille Pollet, du Quesney, dont le château-manoir se situe au hameau de la Capelle.  La famille des comtes de Luchapt (originaire de la Creuse) dont le château, situé sur le haut de la commune, près du hameau de l'église, a été reconstruit aux environs des XVIIIe et XIXe siècles, à la suite d'un incendie et qui a été rénové en 2015.","habitants":"famille de Richard de Bosnormand \r\n        \"","divers":"Bosnormand","gps":"","images":["../image/image_27/27_Bosnormand_1.jpg","../image/image_27/27_Bosnormand_2.jpg","../image/image_27/27_Bosnormand_3.jpg"]},"Consult_chateau_formulaire16fe":{"id":"Consult_chateau_formulaire16fe","dept":"27","canton":"Beuzeville","commune":"Le Torpt","nom":"Bostenney","type":"Manoir","periode":"XVI-XVII","histoire":"BOSTENNEY, en 1540, les seigneurs de Bostenney ou Bosc-Tennei possédaient manoir, chapelle, droits de colombier. Le colombier actuel remontant dans ses structures au XVIe ou XVIIe siècle.                                                                                                                  A deux K.M. au nord  Beuzeville","architecture":"BOSTENNEY,  élévation ordonnancée, sous-sol ; un étage carré et étage de comble , oeuvre: brique ; calcaire ; silex ; moellon ; bois ; pan de bois, toit à longs pans ; croupe ; toit polygonal\r\nen ardoise. Typologie: colombier polygonal en pan de bois ; pan de bois à grille.  Le corps de logis est reconstruit vers 1900. Subsistent les décors de lambris du XVIIIe siècle de l'ancien château. Sculpture des armoiries de la famille d'Epaignes, la chapelle est détruite.","habitants":"famille d'Epaignes\r\n        \"","divers":"Bostenney","gps":"","images":["../image/image_27/27_Bostenney_1.jpg"]},"Consult_chateau_formulaire2e0b":{"id":"Consult_chateau_formulaire2e0b","dept":"27","canton":"Romilly-sur-Andelle","commune":"Bouchevilliers","nom":"Bouchevilliers","type":"Château","periode":"XIII-XV","histoire":"BOUCHEVILLIERS dit manoir de Ste-Geneviève  des Brumes.  Parmi les personnages dignes de mémoire qui ont contribué à lhistoire de cette famille nous trouvons : Reynaud, seigneurs du dit lieu, damoiseau, bailli royal du Vivarais et Valentinois (1311), puis du Velay. En consultant des anciens documents on peut dire, sans risque de trop s'avancer, que cette famille représente une des plus anciennes et honorables de plusieurs régions françaises. On la retrouve à différentes époques, en diverses localités, présente une situation doublement originale. Car il ne faut pas oublier que cette vallée de la rivière de lEpte fut pendant loccupation anglaise une zone frontière. On notait sur la rive droite ceux qui dépendaient à Rouen et Lihons (Lyons la Forêt) de la Normandie gardée par le roi dAngleterre et sur la rive gauche ceux groupés autour du manoir de Sainte-Geneviève qui faisaient parties du comté de Chaumont-en-Vexin et dépendaient du parlement de Paris. On a du mal à imaginer quun si petit village était tiraillé entre deux provinces. Le domaine de Bouchevilliers est mentionné en 1308 lors de sa donation par Philippe-Auguste à Enguerrand de Marigny.  Le plus ancien document. Il faisait état de la donation du manoir à Enguerrand de Marigny, natif de Lyons-la-Forêt Du XIIIe au XVIIIe siècle, le manoir est le fief de trois grandes familles normandes : Bouchevilliers, Guisancourt et Roncherolles qui pendant cinq siècles ont veillé sur la vallée, le coteau et la plaine. Au XVIIIe siècle, la demeure passe entre les mains de différents personnages, dont un certain Armand Jean François de Lescalopiet, conseiller du roi, seigneur de Neuf-Moulins.","architecture":"BOUCHEVILLIERS , par la suite, comme tant d'autres nobles, le manoir se retrouve rabaissé, à plusieurs reprises, au simple rang de ferme, avec les bouleversements révolutionnaires.  De grandes campagnes de restauration sont entreprises à partir des années 1950. Actuellement, le manoir accueille un gîte pour les séminaires d'entreprises.  Guisancourt et Roncherolles qui pendant cinq siècles ont veillé sur la vallée, le coteau et la plaine   Très restauré au 16e siècle, le manoir comprend un corps de logis principal flanqué de tours rectangulaires au Sud et à l'angle nord-est. Les façades du logis associent des parements de briques, de silex et de moellons enduits. La tour à l'angle nord-est se distingue par la pierre de taille, utilisée pour les chaînes d'angle, les encadrements de baies et certaines assises. Plusieurs portes en plein-cintres et de nombreuses fenêtres à meneaux sculptés ont subsisté. Parmi les dépendances figurent un ancien moulin à eau et un colombier octogonal en briques polychromes. Au XVIIIe siècle, le logis, devenu le siège d'une exploitation agricole, sert de grenier à blé et présente un état dégradé à la Révolution.\r\nle manoir des Margottes du XVIIIe siècle.","habitants":"Armand Jean François de Lescalopiet. \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Bouchevilliers","gps":"","images":["../image/image_27/27_Bouchevilliers_1.jpg","../image/image_27/27_Bouchevilliers_2.jpg","../image/image_27/27_Bouchevilliers_3.jpg","../image/image_27/27_Bouchevilliers_4.jpg","../image/image_27/27_Bouchevilliers_5.jpg","../image/image_27/27_Bouchevilliers_6.jpg","../image/image_27/27_Bouchevilliers_7.jpg"]},"Consult_chateau_formulaire6f1e":{"id":"Consult_chateau_formulaire6f1e","dept":"27","canton":"Bourg Achard","commune":"Bourg Achard","nom":"Bourg_Achard","type":"Château","periode":"XVI-XVIII","histoire":"Quatre châteaux dans cet article Fay,  Bosgouet, Roques, Yville et Tremblay à Rougmontiers                                                                               FAY, a été construit en 1624,  pour Jacques du Fay, seigneur de Bourg-Achard, bailli de Rouen, chevalier de Saint-Michel en 1621. L'édifice côtoie un bel étang dans un site vallonné.  La porte de l'aile nord du château porte la date  de 1722. La demeure est très remaniée.                                                                                ROQUES,  Saint-Ouen-de-Thouberville, sur une propriété de cinq hectares, accès privé et direct sur la forêt de la Londe, château mentionné en 1349, aveu du 22 avril 1693 : manoir seigneurial avec place de colombier tombé en ruine, grange, pressoir, chapelle, écurie ; enclos ferme de murs : le logis, le colombier, le parc, deux  pavillons ; subsistent un logement et un pressoir du XVIIe siècle. Logis deuxième moitié du XVIIIe siècle ; un logement première moitié du XIXe siècle, chambres d'hôtes de charme et pension pour chevaux. Loic Coutelle et Melchora Coutelle sont co-gérants.                                                                      BOSGOUET, a deux K.M à l'est, le château et ses dépendances figurés sur le cadastre de 1826 ; l'actuel château de Bosgouet fut construit dans la deuxième moitié XIXe siècle. Dans le parc on peut admirer un beau séquoas ainsi qu'un colombier circulaire. Elévation à travées à un étage carré ; entresol ; un étage en surcroît. oeuvre : brique ; calcaire ; pierre avec brique en remplissage ; bossage, couverture : toit à longs pans en croupe; flèche polygonale; toit en pavillon. Matériau de couverture en  ardoise.","architecture":"YVILLE, au nord à Barneville sur seine, il s'agit d'une imposante demeure, bâtie en 1708, d'après les plans de Jules Hardouin-Mansart. Son Propriétaire initial était Nick Nicolas Stephen Walker. C'est l'architecte Jean-Jacques Martinet, qui reprit les travaux, de 1723 à 1735. Une des filles de Martinet épousa en 1765 un membre de la famille Goujon de Gasville, seigneurs dYville-sur-Seine. Cest au XIIIe siècle  à Pouillé, fief de Guillaume d'Yville. En 1407, Jacques de Trie rendit aveu au roi pour le Manoir seigneurial d'Yville, avec un colombier, des granges, étables et jardins. Ce manoir fut détruit en 1708. De 1720 à 1723, le château d'Yville appartenait au financier John Law de Lauriston. En 1708, François Le Menu de La Noë entreprit la reconstruction de la demeure, mais la laisse inachevée.   . L'expertise menée par Gilles Hue, Architecte à Pont-Audemer, signale que le château mesurait 66 pieds de long sur la face du jardin. Au XXe siècle, le château d'Yville appartenait à la Famille Maurès de Malartic. En 1943, il servit de poste de commandement.                                                                                                                      TREMBLAY, à l'ouest de Bourg commandé en 1754 mais achevé uniquement à la fin du XVIIIe siècle. Après avoir été  vendu puis laissé à l'abandon, le château du Tremblay est depuis 1969   la propriété de l'ancien et mystique ordre de la rose croix, qui l'a entièrement remis en état. Edifiée en pierres, la demeure présente deux façades identiques et possède un étage carré et un étage en surcroît, toit à longs pans brisés couvert d'ardoise.","habitants":"Jacques du Fay et à Yville  Nick Nicolas Stephen Walker\r\n        \"","divers":"Fay   grav-1                                                                               Roques    grav-2-3                                                                             Bosgouet  grav-4-5                                                                 Tremblay grav_6      GPS : 49° 21' 33\" Nord, 0° 51' 03\" Est                                  Yville grav-7 GPS : 49° 23' 50,41\" Nord, 0° 52' 41,92\" Est","gps":"49° 21' 33\" Nord, 0° 51' 03\" Est","images":["../image/image_27/27_Bourg_Achard_1.jpg","../image/image_27/27_Bourg_Achard_2.jpg","../image/image_27/27_Bourg_Achard_3.jpg","../image/image_27/27_Bourg_Achard_4.jpg","../image/image_27/27_Bourg_Achard_5.jpg","../image/image_27/27_Bourg_Achard_6.jpg"]},"Consult_chateau_formulaireb837":{"id":"Consult_chateau_formulaireb837","dept":"27","canton":"Château","commune":"Breteuil_sur_iton","nom":"Breteuil_Iton","type":"Château","periode":"XIII","histoire":"BRETEUIL, lhistoire de Blason Logotype Breteuil sur Iton est dominée par sa situation aux frontières de la Normandie.\r\nAu début du XIe siècle, Breteuil appartenait au puissant Raoul dIvry, demi-frère du duc Richard 1er. Au milieu du XIe siècle, le fief  était tenu par son petit fils Guillaume Fitz-Osbern, fondateur de labbaye de Lyre.  En 1054, le duc Guillaume , futur Guillaume le Conquérant, dut compenser la perte de son château de Frontière à Tillières. Il fit édifier à Breteuil, pour son fidèle ami Guillaume Fitz-Osbern, une forteresse destinée à contrer les Français.  Limportance de la cité était à ce point prépondérante que la nécessité de lui procurer artificiellement un cours deau simposa aux chefs normands.  Cest ainsi que fut créé, en 1054, le bras forcé de lIton (depuis le Becquet à Bourth jusquà Condé sur Iton) destiné à renforcer les défenses du château de Breteuil , « rempart inexpugnable longtemps opposé aux rois de France ».","architecture":"BRETEUIL, par la fondation dun  bourg  (zone franche fiscalement avantageuse pour ses habitants castral (attaché au château), Guillaume dynamisa cette région quelque peu en retard sur ses voisines. Jusquà la fondation de Verneuil dans les années 1120-1130,  Breteuil devint une importante forme locale politique, militaire et économique. De la forteresse en bois de Guillaume le Conquérant, il ne reste plus aucune trace. Elle a été remplacée par un château dont sempara plus tard Philippe Auguste. Tantôt français, tantôt anglais, il fut finalement pris par Du Guesclin et démantelé en 1378. De ce château, il ne subsiste que quelques vestiges, surélévations ou buttes, restes de murailles, appartenant à la grande enceinte située dans le parc de lancien château de la famille Pillon de Buhorel et dans le grand jardin pub
