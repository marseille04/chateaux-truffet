Chateauneuf_Foret_1.jpg","../../jctruffet.com/image/image_87/87_Chateauneuf_Foret_2.jpg","../../jctruffet.com/image/image_87/87_Chateauneuf_Foret_3.jpg","../../jctruffet.com/image/image_87/87_Chateauneuf_Foret_4.jpg","../../jctruffet.com/image/image_87/87_Chateauneuf_Foret_5.jpg"]},"Consult_chateau_formulaire3551":{"id":"Consult_chateau_formulaire3551","dept":"87","canton":"Saint-Léonard de Noblat","commune":"le Chatenet en Dognon","nom":"Chatenet_Dognon","type":"Château","periode":"XIX","histoire":"quatre châteaux à Châtenet en Dognon; châtenet reste des traces. Brutines, Orgnac et Rosier               CHATENET, le territoire communal actuel était le siège d'une seigneurie dite « du Dognon » (vers l'an 1000). Sa propriété revint vers 1137 aux chanoines de Saint-Léonard. Le \"Dognon\" formait à l'époque féodale l'une des trois vicomtés de la Haute-Marche dont les deux autres étaient Aubusson et Châteauclos, il était donc une des seigneuries les plus hautement titrées de la Marche.                                                                           BRUTINES, construit en 1830 sur l'emplacement d'un domaine plus ancien  de 1821.   ORGNAC, le domaine d'Orgnac, pourrait avoir été le centre d'un ancien grand domaine agricole.     \r\nROZIER,en 1883, encore jeune, Alexandre Gentil de Rosier démissionna de la magistrature et vint s'installer sur ses terres du Châtenet en Dognon ou il fit reconstruire le château de Rosier. A partir de 1886, il y est toujours recensé, vivant d'abord au milieu des  siens. Mais, peu à peu, le château se vide, en 1911, décède son épouse puis deux de ses fils en 1914. Pendant tout l'entre deux guerres, Alexandre vit seul, accompagné durant les dernières années de sa vie par une gouvernante, il décède à l'age de 94 ans en 1937.","architecture":"BRUTINES, construit en 1830  ; deux tours ont été ajoutées en1872. Demeure de plan rectangulaire flanquée de deux tours carrées hors-oeuvre couvertes en pavillon.                                                              ORGNAC,  de plan carré à deux niveaux d'habitation flanqué sur unefaçade d'une tour circulaire demi hors-oeuvre couverte d'une flèche polygonale, et sur l'autre façade, d'une tour carrée couverte en pavillon; le corps principal est relié aux deux tours par un corps de bâtiment couvertd'une terrasse.                            ROSIER, château construit avec ses dépendances agricoles près de l'ancien logis de maître du XVIIe siècle qui comportait une tour ronde d'angle à moitié détruite, aujourd'hui restaurée. La propriété possède une ferme, un four à pain et un pigeonnier.","habitants":"Famille  d'Alexandre Gentil de Rosier \r\n        \r\n        \r\n        \"","divers":"A Chatenet Dognon, Orgnac grav 1-2, Brutines-grav-3 Rosier grav-4-5","gps":"","images":["../../jctruffet.com/image/image_87/87_Chatenet_Dognon_1.jpg","../../jctruffet.com/image/image_87/87_Chatenet_Dognon_2.jpg","../../jctruffet.com/image/image_87/87_Chatenet_Dognon_3.jpg","../../jctruffet.com/image/image_87/87_Chatenet_Dognon_4.jpg","../../jctruffet.com/image/image_87/87_Chatenet_Dognon_5.jpg"]},"Consult_chateau_formulairee13f":{"id":"Consult_chateau_formulairee13f","dept":"87","canton":"Eymoutiers","commune":"Coussac-Bonneval","nom":"Chauffaille_Coussac","type":"Château","periode":"XIX","histoire":"CHAUFFAILLE,  construit dans la seconde moitié du  XIXe siècle, est situé sur l'ancien domaine de la famille Burguet de Chauffaille dont les premières constructions datent du XVIIe siècle. Le château actuel a été construit en 1870 par le comte et la comtesse Auguste de Chérade de Montbron. Cette famille avait hérité du domaine de Chauffaille à la suite du mariage de Auguste de Chérade, comte de Montbron avec Lucie du Burguet de Chauffaille le 22 septembre 1830. Le domaine était dans la famille Burguet de Chauffaille depuis le XVIIe siècle, il  reste dans la famille de Chérade de Montbron jusqu'en 1974 date à laquelle il est acquis par l'Etat. Le ministère de la défense en fait un terrain de manuvres militaires et de nombreux bâtiments (dont ce qui restait de l'ancien manoir) sont démolis. Il est par la suite remis en vente et acquis par la communauté de communes du pays de Saint-Yrieix en 2010.","architecture":"CHAUFFAILLE, Il y avait  un chêne impressionnant que l'on surnommait le \"roi de Chauffaille\", son tronc mesurait 1,7 mètre diamètre. À la suite du décès de son père, le comte de Montbron, propriétaire de Chauffaille en a fait cadeau en 1889 afin qu'il serve de joug au bourdon de léglise du Sacré-Cur à Paris. Il s'agit de la plus grosse cloche qui puisse se balancer au monde : la Savoyarde pèse près de 19 tonnes. Le château de plan rectangulaire à deux niveaux sur soubassement et lucarnes au niveau du toit, édifice flanque de pavillons carrés sur angle de façade et avant corps central avec toit impérial avec lucarne réhausée. tous les angles de cet édifice son en chainage de refend et double cordon.","habitants":"Famille Burguet de Chauffaille\r\nFamille de Chérade de Montbron\r\n        \r\n        \"","divers":"Château de Chauffaille","gps":"","images":["../../jctruffet.com/image/image_87/87_Chauffaille_Coussac_1.jpg","../../jctruffet.com/image/image_87/87_Chauffaille_Coussac_2.jpg","../../jctruffet.com/image/image_87/87_Chauffaille_Coussac_3.jpg","../../jctruffet.com/image/image_87/87_Chauffaille_Coussac_4.jpg"]},"Consult_chateau_formulaire2c66":{"id":"Consult_chateau_formulaire2c66","dept":"87","canton":"Rochecouart","commune":"Chéronnac","nom":"Chéronnac","type":"Château","periode":"XIX","histoire":"CHERONNAC, à quelques kilomètres plus au Sud, se dresse un autre témoin du passé : le château de Mirabeau. En fait, ce château na jamais pu être habité par le marquis de Mirabeau, mais il appartenait à son épouse, Marie-Geneviève de Vassan, descendante des seigneurs de la Mothe de Chéronnac. Il fut édifié au XVe siècle par la famille de Rousiers.","architecture":"CHERONNAC,  le château de Mirabeau.  il  reste plus quune tour en ruines qui conserve cependant une remarquable série de canonnières, visibles du sentier de randonnée qui passe à une dizaine de mètres de la tour. Le château, le corps de logis central rectangulaire à deux niveaux sur soubassement accolé de part et d'autre de pavillon rectangulaires à deux niveaux lucarnes sur comble impérials,  portique sur porte d'entrée sur pilastres supportant un balcon.","habitants":"Famille de Rousiers\r\n        \r\n        \"","divers":"Château de Chéronnac","gps":"","images":["../../jctruffet.com/image/image_87/87_Ch%c3%a9ronnac_1.jpg","../../jctruffet.com/image/image_87/87_Ch%c3%a9ronnac_2.jpg","../../jctruffet.com/image/image_87/87_Ch%c3%a9ronnac_3.jpg"]},"Consult_chateau_formulairefb87":{"id":"Consult_chateau_formulairefb87","dept":"87","canton":"Bellac","commune":"Chamborêt","nom":"Corrigé","type":"Château","periode":"XVI","histoire":"CORRIGE,  bâti à Chamboret,  La construction date de 1534. Il est devenu un gite et chambres d'hôtes.  En 1587, Piere De Ponnes, écuyer, était seigneur de Corrigé.  Gabriel Papon Du Breuil le fut seigneur en 1611. Jeanne De Brettes apporta en dot la terre de Corrigé à Jean De Villelume, écuyer et seigneur de Chamborêt et de Morcheval, lorsquelle lépousa vers 1700.","architecture":"CORRIGE, édifice rectangulaire à deux niveaux sur soubassement et pavillon carré saillant toit à quatres pans avec lucarnes, l'ensemble recouvert de tuiles. On a trouvé en ce lieu : un souterrain-refuge de lépoque gallo-romaine, plusieurs urnes funéraires, des briques et des vases de la même époque ainsi quune monnaie en bronze de Tetricus.","habitants":"Gabriel Papon Du Breuil \r\n        \r\n        \"","divers":"Corrigé   GPS : 46° 00' 22\" Nord, 1° 08' 11\" Est","gps":"46° 00' 22\" Nord, 1° 08' 11\" Est","images":["../../jctruffet.com/image/image_87/87_Corrig%c3%a9_1.jpg","../../jctruffet.com/image/image_87/87_Corrig%c3%a9_2.jpg","../../jctruffet.com/image/image_87/87_Corrig%c3%a9_3.jpg"]},"Consult_chateau_formulaire0cd5":{"id":"Consult_chateau_formulaire0cd5","dept":"87","canton":"Châteauponsac","commune":"Darnac","nom":"Cote_Chapt","type":"Vestiges","periode":"XII-XIII","histoire":"COTE AU CHAPT,  bâti au lieu-dit la Côte-au-Chapt, à Darnac, sa construction date du XIIe et XIIIe siècle, il ne reste que des vestiges du château de la Cote-au-Chapt qui sont devenus la propriété de la commune.  Le château appartenait aux Lusignan et fut démoli au cours des XVIIIe et XIXe siècles. Les vestiges du château sont classés M.H. depuis 1988, le donjon et le sol de la parcelle depuis 1989.   \r\nLe château appartenait aux Lusignan et fut démoli au cours des XVIIIe et XIXe siècles.","architecture":"COTE AU CHAPT; le château ne présente plus que des vestiges de murs et un donjon du XIIIe siècle de plan quasi circulaire. L'entrée s'effectuait par un accès à plus de cinq mètres du sol, qui n'est plus aujourd'hui qu'une importante brèche. La partie haute est couronnée par des fenêtres de guet quadrangulaires. La muraille du donjon est percée de meurtrières, bretèches et latrines. Le plan intérieur présente un hexagone irrégulier. Les étages ont disparu. Un escalier intérieur en vis très étroit était aménagé dans l'épaisseur de la muraille. L'enceinte extérieure formait un quadrilatère renfermant le donjon au sud-ouest. L'ensemble repose sur une levée de terre en plate-forme. Cet ensemble présente un intérêt archéologique, témoin important de l'architecture militaire féodale, rare.","habitants":"Famille de Lusignan \r\n        \r\n        \"","divers":"Cote au chapt  GPS : 46° 16' 05\" Nord et 0° 57' 10\" Est","gps":"46° 16' 05\" Nord et 0° 57' 10\" Est","images":["../../jctruffet.com/image/image_87/87_Cote_Chapt_1.jpg","../../jctruffet.com/image/image_87/87_Cote_Chapt_2.jpg"]},"Consult_chateau_formulairebf1a":{"id":"Consult_chateau_formulairebf1a","dept":"87","canton":"Eymoutiers","commune":"Coussac-Bonneval","nom":"Coussac_Bonneval","type":"Château","periode":"XIV-XIX","histoire":"Deux châteaux à Coussac Bonneval dont celui de Bonneval et de Bré  Chauffaille (voir article).  COUSSAC-BONNEVAL ce château est resté  dans la famille du fondateur  la famille de Bonneval.  En 1147 Guillaume de Bonneval, en 1470  Antoine de Bonneval épousa Margueritte de Foix,  Il a aussi appartenu à Claude-Alexandre de Bonneval (1675-1747), surnommé Ashmet le Pacha, car il passa une bonne partie de sa vie en Turquie. Il est l'auteur d'Anecdotes vénitiennes et turques, ou Nouveaux Mémoires.  Propriété des comtes et marquis de Bonneval depuis plus de six siècles, cette demeure, où chaque pièce a son histoire, dégage un sentiment de noblesse et de pérennité. Il abrite un riche mobilier de style Louis XIII et Louis XVI ainsi que des tapisseries dAubusson et de Fontainebleau. Ce dernier, marin à 10 ans, sert tour à tour Louis XIV, lEmpereur dAutriche et le Grand Turc comme « Pacha à trois queues »   Transformé en chambres d'hôtes Géraud de Bonneval de retour en France à l'âge de treize ans découvre le château de son père installé depuis 1980    Géraud de Bonneval et son épouse Marta.                                                          BRE,  bâti à Coussac-Bonneval, château de Bré rassemble les architectures de style médiévale, Renaissance et classique.","architecture":"Le COUSSAC-BONNEVAL, forteresse bâti au XIVe siécle,   occupait, autrefois, une position stratégique importante défendant la frontière de l'Aquitaine rassemble 3 types d'architectures : Médiévale, Renaissance et Classique, la construction a débuté du XIVe et s'est achevée au XVIIe siècle. Cette ancienne forteresse existait déjà en 930 mais son apparence actuelle date du XIVe siècle. Le château a depuis subi des remaniements intérieurs aux XIIIe et XIXe siècles, est connu pour son appartenance à la même famille, depuis sa construction. Le château a subi une nouvelle restauration, en 1771-1772, grace à l'architecte Broussaud, puis une dernière restauration, en 1900, dans la cour de style Renaissance. Reconstruit en 1350 sur la base du château primitif, il est entouré de fossés, seuls témoins de lenceinte fortifiée du XIVe siècle. Un quadrilatère flanqué, de grosses tours, aux quatre coins à toits coniques,  et d'une tour de forme trilobée aux façades totalement aveugle, le donjon domine l'ensemble porte deux chemins de rondes superposées, la façade d'entrée donnant sur la cour comporte à son centre une tour carrée. Lélégante façade ouest donne de plein pied sur la terrasse des lions, elle abrite les appartements principaux richement meublés. Une autre restauration est réalisée en 1900, dans la cour renaissance. Depuis mille ans lhistoire continue, inscrit aux M.H. depuis 1960.","habitants":"Famille de Bonneval\r\n        \r\n        \"","divers":"Coussac  GPS : 45° 30' 42,84\" Nord et 1° 19' 32,16\"                                                                            Bonneval  GPS : 45° 30' 42,84\" Nord et 1° 19' 32,16\" Est","gps":"45° 30' 42,84\" Nord et 1° 19' 32,16\"","images":["../../jctruffet.com/image/image_87/87_Coussac_Bonneval_1.jpg","../../jctruffet.com/image/image_87/87_Coussac_Bonneval_2.jpg","../../jctruffet.com/image/image_87/87_Coussac_Bonneval_3.jpg","../../jctruffet.com/image/image_87/87_Coussac_Bonneval_4.jpg","../../jctruffet.com/image/image_87/87_Coussac_Bonneval_5.jpg","../../jctruffet.com/image/image_87/87_Coussac_Bonneval_6.jpg","../../jctruffet.com/image/image_87/87_Coussac_Bonneval_7.jpg","../../jctruffet.com/image/image_87/87_Coussac_Bonneval_8.jpg"]},"Consult_chateau_formulaire92ef":{"id":"Consult_chateau_formulaire92ef","dept":"87","canton":"Couzeix","commune":"Couzeix","nom":"Couzeix","type":"Château","periode":"XV-XVIII","histoire":"Deux châteaux à Couzeix celui de Coyol et le Mas de l'Age.                                                                       COYOL, cette terre a appartenu aux Benoist, aux Thomas ; dont Balthazar Thomas, procureur à Limoges, en fut seigneur à la fin du XVIIe siècle. Son gendre, Joseph Segond, également seigneur de Villedart, paroisse de Saint-Jouvent, en devient propriétaire en 1735. Apartir de cette date, la famille sallia aux Barbou des Courrières, aux Verthamond et aux Colin de Taillefert. Au XIXe siècle, le domaine passe aux mains de la famille Jabet, bourgeois de Limoges, qui possède déjà le moulin de Coyol. La propriété se compose du château de Coyol et dune chapelle domestique est à vendre. Cette bâtisse du XVIIIe siècle résonne encore des cris des milliers d'enfants qui, depuis 1944, en ont fait leur royaume le temps d'un séjour.  Le domaine appartient toujours à l'association « La colonie de vacances », mais elle a aujourd'hui décidé de s'en séparer. Michèle Bouchain a longtemps uvré au sein de l'association, où elle fut  monitrice, directrice et présidente. Elle n'a cependant aucun souvenir des séjours organisés à Couzeix et qui se sont arrêtés en 1958. Le château a continué d'être utilisé, mais d'autres chantiers avaient la priorité.   MAS de l'AGE  bâti, au lieu dit le Mas de l'Age, à Couzeix.  Les Benoist en sont les propriétaires depuis le XVe siècle, succédant aux Morineau. Par alliance, ils se fondirent avec les Blondeau et les Martin de Nantiat. Blondeau du Mas de lÂge, chevalier de Saint-Louis et brigadier des gardes du corps de Louis XV, y décéda en 1767. Les Martin revendent le domaine, au XIXe siècle, à la famille Guérinlézé, de Limoges.","architecture":"COYOL,  corps de logis central à deux niveaux  avec série de lucarnes sur toits brisés, batisse accolé de part et d'autre de pavillon à un niveau lucarnes sur toit brisés et sur parc pavillon carré toit poitu à quatre pans.                                                                             MAS de L'AGE, date du XVe siècle,  féodal avec douves et étangs, l'édifice se compose d'un corps de logis principal des XVe et XVIe siècles, avec une tour d'escalier hors oeuvre sur cour; une aile en équerre, plus récente, avec un retour parallèle au corps de logis et une chapelle isolée du XVIe siècle. A l'intérieur, la salle à croisées d'ogives s'orne d'un décor peint, datant de la Révolution,  L'édifice de plan rectangulaire à toits presque plats avec au centre toiture à quatre pans  retour en équerre formant une cour d'honneur inscrit au titre des M.H.le 18 février 1975.                     .","habitants":"Famille de Verthamond                                            Famille de Blondeau du Mas de lÂge\r\n        \r\n        \"","divers":"A Couzeix le Mas de l'Age grav 1-à-5. Coyol grav de 6 à 9","gps":"","images":["../../jctruffet.com/image/image_87/87_Couzeix_1.jpg","../../jctruffet.com/image/image_87/87_Couzeix_2.jpg","../../jctruffet.com/image/image_87/87_Couzeix_3.jpg","../../jctruffet.com/image/image_87/87_Couzeix_4.jpg","../../jctruffet.com/image/image_87/87_Couzeix_5.jpg","../../jctruffet.com/image/image_87/87_Couzeix_6.jpg","../../jctruffet.com/image/image_87/87_Couzeix_7.jpg","../../jctruffet.com/image/image_87/87_Couzeix_8.jpg","../../jctruffet.com/image/image_87/87_Couzeix_9.jpg"]},"Consult_chateau_formulaired4c4":{"id":"Consult_chateau_formulaired4c4","dept":"87","canton":"Châteauponsac","commune":"Cromac","nom":"Cromac","type":"Vestiges_Chäteau","periode":"XIX","histoire":"A Cromac le  château de Lascroux, du Peux à Jouac à trois kilomètres au nord ouest.                               LASCROUX, appartenait au XVe siècle à Nérigné ou Nigon de la Barde, sieur de la Garde (Journet), puis à la famille de Sauzet en 1530, à Paul Thomas, sénéchal de Montmorillon en 1610, à monsieur de Fontbuffeau en 1664, enfin à la famille Appay à la Révolution. bâti au lieu-dit Lascroux, à Cromac, sa construction date de 1877  à  1907. Les deux architectes sont Martin Jules, et Nivet.  Camille-Etienne Appay remodèle le site et fait reconstruire une maison de maître, des communs et des dépendances agricoles. De 1877 à 1880, construction puis agrandissement d'un nouveau logis. En 1893, Albert Paintendre donne au site son aspect actuel.     L'avocat parisien Albert Paintendre acquit le domaine en 1893 et fit construire le château actuel de style Louis XIII. Son parc est ouvert au public.","architecture":"LASCROUX, du premier château de Lascroux, il ne reste que les ruines du donjon du château féodal (XVe siècle) qui fut détruit pendant les guerres civiles de 1578-1593. Le nouveau le château  de style Renaissanceest bâti en 1860 dans les ruines du château-fort, Dans les années 1860, un château remplace une ancienne maison forte seigneuriale du milieu du XVe siècle dont il reste un pan de mur et les vestiges de deux tourelles, sur un impressionnant éperon rocheux, surplombant à pic la vallée de la Benaize. Côté nord, un parc paysagé a été dessiné, dès 1893, par le paysagiste limougeaud Nivet. Le château et le parc sont inscrits au titre des M.H. le 30 novembre 2000.","habitants":"Famille de Camille-Etienne Appay \r\n        \r\n        \"","divers":"A cromac vestiges et porte grav 1-2 Lascroux  GPS : 46° 20' 20\" Nord et 1° 18' 05\" Est     grav 3 à 6.              Château de Peux à jouac grav 7-8-9","gps":"46° 20' 20\" Nord et 1° 18' 05\" Est     grav 3 à 6.","images":["../../jctruffet.com/image/image_87/87_Cromac_1.jpg","../../jctruffet.com/image/image_87/87_Cromac_2.jpg","../../jctruffet.com/image/image_87/87_Cromac_3.jpg","../../jctruffet.com/image/image_87/87_Cromac_4.jpg","../../jctruffet.com/image/image_87/87_Cromac_5.jpg","../../jctruffet.com/image/image_87/87_Cromac_6.jpg","../../jctruffet.com/image/image_87/87_Cromac_7.jpg","../../jctruffet.com/image/image_87/87_Cromac_8.jpg","../../jctruffet.com/image/image_87/87_Cromac_9.jpg"]},"Consult_chateau_formulairef7a2":{"id":"Consult_chateau_formulairef7a2","dept":"87","canton":"Rochechouart","commune":"Cussac","nom":"Cromières","type":"Forteresse","periode":"XIV","histoire":"CROMIERES,  bâti à Cussac, était en effet une seigneurie, qualifiée de châtellenie au XVe siècle, dépendant de la vicomté de Rochechouart, et qui appartint à la famille de Pompadour entre le milieu du XIVe et de la fin du XVe siècle. Vers 1520, le président Jean de Selves, nouvel acquéreur du domaine, entreprit des travaux de modernisation, amplifiés aux XVIIe et  XVIIIe siècles par la famille de Bermondet, propriétaire jusqu'à nos jours. Ayant servi de lieu de réunion aux nombreux protestants de la région de Rochechouart, elle a gardé son surnom de Temple.   Il est inscrit aux M.H. depuis le 7.01.1992,","architecture":"CROMIERES, l'édifice actuel comprend des éléments construits entre le XIIIe siècle et le XVIIe siècle. A l'extrémité d'une pelouse ovale, que bordent deux longues ailes de dépendances flanquées de colombiers à poivrière,  forme une silhouette inhabituelle en Limousin. Le corps de logis à deux avant-corps symétriques, et dont les trois niveaux sont éclairés de hautes fenêtres en travées régulières, est couronné d'une frise de merlons à oreille, alternativement hauts et bas, qui cache une toiture basse en simulant des terrasses au crénelage de fantaisie. Cette couverture fut installée après un début d'incendie, vers 1852. Deux ailes basses contiguës abritent, sous un toit brisé, des pièces de service et la chapelle. Le motif des merlons couronne aussi deux tours élevées contre l'avant-corps de gauche : une tour d'escalier octogonale dans l'angle, et une tour semi-circulaire, en avant du logis, reste d'un édifice fortifié antérieur, du XIIIe siècle. Un bâtiment agricole, proche du château, présente un pignon percé d'une porte cochère à arc brisé, surmontée d'une fenêtre à arc en plein-cintre, ainsi qu'une coursière basse dans un mur gouttereau, interrompue par des renfoncements.","habitants":"Famille de Pompadour\r\n        \r\n        \r\n        \"","divers":"Château de Cromières","gps":"","images":["../../jctruffet.com/image/image_87/87_Cromi%c3%a8res_1.jpg","../../jctruffet.com/image/image_87/87_Cromi%c3%a8res_2.jpg","../../jctruffet.com/image/image_87/87_Cromi%c3%a8res_3.jpg","../../jctruffet.com/image/image_87/87_Cromi%c3%a8res_4.jpg","../../jctruffet.com/image/image_87/87_Cromi%c3%a8res_5.jpg","../../jctruffet.com/image/image_87/87_Cromi%c3%a8res_6.jpg","../../jctruffet.com/image/image_87/87_Cromi%c3%a8res_7.jpg","../../jctruffet.com/image/image_87/87_Cromi%c3%a8res_8.jpg"]},"Consult_chateau_formulaire7728":{"id":"Consult_chateau_formulaire7728","dept":"87","canton":"Eymoutiers","commune":"Saint-Vitte sur Briance","nom":"Cursac","type":"Château","periode":"XVI-XIX","histoire":"A cinq Km à l'est  à Croisille sur Briance,  le  château de la Vialle qui fut détruit par un incendie en 1899, il a été reconstruit sous la forme actuelle, début 1er quart XXe siècle, dans  la famille de Grégoire de Roulhac de 1700 à 1796.                                                          CURSAC,  bâti à Saint Vitte-sur-Briance,  la construction du château date du 1er quart du XVIe siècle. Importance politique de ses principaux propriétaires. Propriété des Maulmont puis des Loubardemont et resté dans sa descendance. Le Château de Curzac est inscrit aux M.H. depuis 16.05.1994.Il appartient au comte et à la comtesse G. de Traversay.                                                      VIALLE, au lieu-dit La Vialle, en lisière de la forêt, on peut admirer ce château. L'ancien château de la Vialle fut détruit par un incendie en 1899 selon l'abbé Lecler,","architecture":"CURZAC  dominant la briance , le corps de logis rectangulaire du XVe siècle était flanqué jadis de quatre  tours d'angles dont deux subsistent intactes, une troisième fut reconstruite.    Importance politique de ses principaux propriétaires. Château construit au début du XVIe siècle, remanié au cours du XXe siècle. Cheminées en granit sculpté du XVIe siècle, grange élevée au début du XVIIIe siècle. Une parcelle du parc contient les vestiges de la chapelle.                        VIALLE  l'ancien château de la Vialle détruit par un incendie en 1899 selon l'abbé Lecler,  l'édifice a dû être remplacé par la construction actuelle au début du premier quart du XXe siècle. Le bâtiment, cantonné de deux tours carrées, et composé d'un étage de soubassement et un étage carré. Le gros-oeuvre en granite et enduit,  l'élévation à travées est surmontée d'un toit en pavillon et croupe recouverts d'ardoise. Martial Baillot d'Estiveaux, début 1er quart 20e siècle édifice avec cordon de plan rectangulaire à deux niveaux sur soubassement avec série de lucarnes sur comble avant corps d'entrée saillants avec fronton rotondant et escalier à double révolution, à l'opposé deux tours carrées de même hauteur  à toits pointues.","habitants":"VIALLE; Famille de Grégoire de Roulhac                       CURZAC Famille des Maulmont\r\n        \r\n        \"","divers":"A Croisille GPS : 45° 42' 45\" Nord et 0° 50' 00\" Est.    a St-Vitte Cursac grav-1-à-5.    Croisille grav 6-7.   Vialle grav 8","gps":"45° 42' 45\" Nord et 0° 50' 00\" Est.    a St-Vitte Cursac gra","images":["../../jctruffet.com/image/image_87/87_Cursac_1.jpg","../../jctruffet.com/image/image_87/87_Cursac_2.jpg","../../jctruffet.com/image/image_87/87_Cursac_3.jpg","../../jctruffet.com/image/image_87/87_Cursac_4.jpg","../../jctruffet.com/image/image_87/87_Cursac_5.jpg","../../jctruffet.com/image/image_87/87_Cursac_6.jpg","../../jctruffet.com/image/image_87/87_Cursac_7.jpg","../../jctruffet.com/image/image_87/87_Cursac_8.jpg"]},"Consult_chateau_formulaire4083":{"id":"Consult_chateau_formulaire4083","dept":"87","canton":"Rochechouart","commune":"Cussac","nom":"Cussac_87","type":"Château","periode":"XVIII-XX","histoire":"Plusieurs châteaux à Cussac, celui de Cromières (voir article) et à deux KM au nord  à Ordour sur Vayres le  Cloud, Callandreau,  château du Puychevalier, appelé aussi Château Desbrosses du XVIIe siècle. BERTUSSIE est une belle demeure construite à la fin du XVIIIe ou au début du début XIXe siècle, agrémentée d'un beau et  grand parc avec des dépendances. Le château de la Bertussie a été restauré en fin de décenni.                                     DESBROSSES, en 1574, il est fait mention d'un François Hugonneau, qui prit plus tard le titre décuyer et de seigneur des Brosses-dOradour, qui épousa Jeanne de Rousiers, fille de Gabriel, archer de la garde du roi sous François Ier, et de Françoise de Rousiers de Chéronnac.   Pierre Longeaud-Desbrégères, l'acquis en 1786.","architecture":"BERTUSSIE de plan rectangulaire à deux niveaux et attiques.                                                                          COLLANDEAU, de plan rectangulaires à deux niveaux avec lucarnes sur toits  en croupe; deux tours carrées aux angles de quatre niveaux à toits  en poivrières quatre pans.                                                             DESBROSSES, du XVIIe siècle avec tourelles.","habitants":"Desbrosses  François Hugonneau\r\n        \r\n        \"","divers":"Cussac GPS : 45° 42' 45\" Nord et 0° 50' 00\" Est. Collandeau grav 1-2. Bertusie-3.  Breuil-4 Puy-5","gps":"45° 42' 45\" Nord et 0° 50' 00\" Est. Collandeau grav 1-2. Ber","images":["../../jctruffet.com/image/image_87/87_Cussac_87_1.jpg","../../jctruffet.com/image/image_87/87_Cussac_87_2.jpg","../../jctruffet.com/image/image_87/87_Cussac_87_3.jpg","../../jctruffet.com/image/image_87/87_Cussac_87_4.jpg","../../jctruffet.com/image/image_87/87_Cussac_87_5.jpg"]},"Consult_chateau_formulairef277":{"id":"Consult_chateau_formulairef277","dept":"87","canton":"Chaâteauponsac","commune":"Dompierre les Eglises","nom":"Dompierre_Eglises","type":"Château","periode":"XV-XVII","histoire":"DOMPIERRE, bâti à Dompierre-les-Eglises,  il date du XVe siècle, était une seigneurie avant la construction du château actuel. En 1441, Percheron Poute, écuyer, devenu seigneur du château de Dompierre, obtint du seigneur de Magnac, la permission de fortifier le château.  Il est classé aux M.H. depuis 1986.","architecture":"DOMPIERRE, l'ensemble est composé de murailles fortifiées. Celui-ci, du XVIIe siècle, fut construit sur une ancienne maison forte dont il reste les murailles fortifiées du XVe siècle. Puis il subit divers agrandissements aux XVIIIe et XIXe siècles. Trois corps de bâtiment en équerre sont fermés par un mur. La muraille conserve la souche d'une tourelle, disparue. L'aile sud est de style classique. Les deux pavillons du XVIIIe se détachent du corps de logis qui remonte au XIXe. Le pavillon nord-ouest, avec sa toiture à quatre versants et ses fenêtres en arc bombé, est caractéristique du XVIIIe siècle. Le corps de logis du XIXe siècle réunit les deux pavillons. Sa galerie à colonnes communique avec la cour intérieure.","habitants":"seigneur de Magnac,\r\n        \r\n        \"","divers":"Dompierre, GPS : 46° 13' 05\" Nord et 1° 16' 10\" E","gps":"46° 13' 05\" Nord et 1° 16' 10\" E","images":["../../jctruffet.com/image/image_87/87_Dompierre_Eglises_1.jpg"]},"Consult_chateau_formulaired5d1":{"id":"Consult_chateau_formulaired5d1","dept":"87","canton":"Ambazac","commune":"Billanges","nom":"Egaux","type":"Château","periode":"XVII","histoire":"EGAUX  (Les), cétait un fief noble qui avait une juridiction seigneuriale assez étendue. En 1540, Guy du Vignaud, archer de la garde du roi, en était seigneur, comme nous lapprend  linscription de la cloche. La branche de la famille du Vignaud dont il était le chef séteignit un siècle après lui, et sa dernière représentante, Marie-Aimée du Vignaud épousa, le 1er octobre 1645, Anne-Florent de Bony, marquis de Lavergne, auquel elle porta les Egaux, toujours  dans cette famille. Les Egaux auraient été un château-fort assez considérable que les Anglais prirent et saccagèrent pendant la guerre de cent ans. Il avait onze tours, presque toutes ruinées en 1830, une seule étant en bon état de conservation. Longtemps inhabité, il fut en partie  restauré en 1850. On y voit encore sur le linteau de la porte de la vieille chapelle les armes des du Vignaud,","architecture":"Les EGAUX, édifice de plan en U avec corps de logis  en font de cour avec deux retours en équerre, l'ensemble à deux niveaux avec série de lucarnes donnant sur cour, deux tours carrées hors uvres aux angles intérieures dont celle de droite avec clocheton, sur l'édifice de gauche pignon dentelé et sur angle arrière donjon  crénelées sur mâchicoulis à double chemin de rondes toit à quatre pans.","habitants":"Fief de Guy du Vignaud\r\n        \r\n        \"","divers":"Château des Egaux à Billanges","gps":"","images":["../../jctruffet.com/image/image_87/87_Egaux_1.jpg","../../jctruffet.com/image/image_87/87_Egaux_2.jpg","../../jctruffet.com/image/image_87/87_Egaux_3.jpg","../../jctruffet.com/image/image_87/87_Egaux_4.jpg"]},"Consult_chateau_formulaire950a":{"id":"Consult_chateau_formulaire950a","dept":"87","canton":"Limoges","commune":"Beaune-les-Mines","nom":"Essarts","type":"Chateaux","periode":"XVII-XIX","histoire":"ESSARTS, appelé aussi le château de Beaune-les-Mines, bâti au lieu-dit Les Essarts, à Beaune-les-Mines, dans la Vallée de la Mazelle, son origine remonte au milieu du XVIIe siècle (vers 1660). Il sera ensuite agrandi, au XIXe siècle vers 1833. Le parc du château des Essarts a été profondément remanié durant la seconde moitié du XIXe siècle (1870-1876). Cest une construction du XVIe siècle, à côté de laquelle on trouve les restes dune ancienne tour qui serait du XIIe siècle.   Propriété dans les années 1970 des Martin de la Bastide, barons d'Empire, il est à lorigine du nom dun quartier  nord de Limoges, La Bastide.","architecture":"ESSARTS, est le site incontournable à découvrir, conçu au cours du XVIIe siècle et agrandi au XIXe siècle, ce château possède des éléments protégés, tels que les façades et toitures du corps de logis et de la tour du XVIIe siècle, ainsi que celles des pavillons latéraux du XIXe siècle et l'escalier intérieur du XVIIe siècle, au titre des M.H.","habitants":"Famille des Martin de la Bastide\r\n        \r\n        \"","divers":"A Beaume les Mines le château des Essarts GPS : 45° 53' 55\" Nord et 1° 18' 19\" Est","gps":"45° 53' 55\" Nord et 1° 18' 19\" Est","images":["../../jctruffet.com/image/image_87/87_Essarts_1.jpg","../../jctruffet.com/image/image_87/87_Essarts_2.jpg","../../jctruffet.com/image/image_87/87_Essarts_3.jpg","../../jctruffet.com/image/image_87/87_Essarts_4.jpg"]},"Consult_chateau_formulaire76e2":{"id":"Consult_chateau_formulaire76e2","dept":"87","canton":"Saint-Léonard de Noblat","commune":"Eybouleuf","nom":"Eybouleuf","type":"Château","periode":"XIV","histoire":"EYBOULEUF, au XIVe siècle  était incluse dans la châtellenie de Noblat possession de lévêque de Limoges. Aux XVe et XVIe siècle les seigneurs dancienne noblesse disparaissent au profit de nouveaux seigneurs fonciers issus de la bourgeoisie de St-Léonard (Massiot, Chenaud, Chaussade, Nicard) mais aussi détablissements religieux comme labbaye de Notre Dame de la règle ou le collège des jésuites de Limoges. Bien que placées sur des sites plus anciens, les demeures du XVIIe siècle comme le château de Veyvialle, la maison du Haut-Bourg, la Basse-Garde témoignent de cette expansion de  la bourgeoisie sur la banlieue rurale de St-Léonard. Jusquau XIXe siècle plusieurs étangs (Le Bourg, Le Pouyol, La Roche, Les Monteil) pour certains, permis dactionner les moulins à grain.                                    La GARDE, en 1339, le mas de La Garde est cité comme possession dAymeric Marchès, vassal de lévêque de Limoges et coseigneur de St-Léonard. Il est également le père du routier Aymerigot Marchès connu pour ses exactions, plusieurs seigneurs ont possédé des rentes sur les dépendances de La Garde : Guillaume de Monceu, damoiseau (1427), Pierre de Royère, damoiseau de la ville de St-Léonard de Noblat, seigneur de Beaudéduit (1446), Léonard et Joseph Chenault, sieurs du fief noble de Beaufort (1562) ;François de Royère (1616).  Les Chenaud de Beaufort, propriétaires jusque vers 1850 passeront les domaines de La Garde à des neveux, les Lamy de la Chapelle qui les vendront en 1897.","architecture":"EYBOULEUF, logis et dépendances forment un quadrilatère autour dune cour fermée. Plusieurs éléments de défense (cour fermée, archères, fossé rempli deau, pavillons de gué) ont fait qualifier Veyvialle de « maison forte ». Ces éléments défensifs peuvent constituer lindice dun ensemble préexistant. Le souci de sécurité dont ils témoignent peut avoir motivé leur aménagement bien antérieurement en raison de la proximité ditinéraires et des troubles qui ont longtemps affecté la région (guerre de 100 ans, guerres de religion et de la Ligue, épidémies de peste, disettes). Le corps de logis est flanqué de 4 échauguettes. Deux ailes non symétriques se répartissent de part et dautre dun pavillon central. Ce dernier abrite un escalier en pierre qui mène au 3ème étage dans une pièce unique doù lon peut observer les 4 points de lhorizon grâce à une fenêtre sur chacun de ses côtés. Lencadrement de la porte dentrée principale, en pointes de diamant, constitue lunique élément de décoration de la façade intérieure.","habitants":"Famille de Chenaud de Beaufort              \r\n        \r\n        \"","divers":"Château d'Eybouleuf","gps":"","images":["../../jctruffet.com/image/image_87/87_Eybouleuf_1.jpg","../../jctruffet.com/image/image_87/87_Eybouleuf_2.jpg","../../jctruffet.com/image/image_87/87_Eybouleuf_3.jpg"]},"Consult_chateau_formulairecd2b":{"id":"Consult_chateau_formulairecd2b","dept":"87","canton":"Condat sur Vienne","commune":"Eyjeaux","nom":"Eyjeaux","type":"Château","periode":"XV","histoire":"A Eyjeaux ; château des Nouailles, remanié à la fin du XIXe siècle.\r\nChâteau de Montignac, possédant des éléments de style néo-gothique, où existait une ancienne chapelle rurale rebâtie puis bénie en 1624 par lévêque de Limoges.\r\nChâteau et chapelle de Fraisseix.\r\nChâteau de Vicq, anciennement propriété d'Anatole Barbou des Courières.\r\nChâteau de Leyraout.\r\nEYJEAUX,  bâti en 1441, Foulques de Junhac, écuyer, reçut l'autorisation de bâtir une demeure de plaisance, date du XVe siècle, il a été édifié en 1441 par Foulques de Jaunhac, rue du bourg neuf proche de léglise. Cest une propriété privée, il ne se visite pas, mais vaut le coup dil de lextérieur. Ce château fait lobjet dune inscription au titre des M.H. depuis le 12 août 1988.","architecture":"EYJEAUX,  demeure de plaisance avec quatre tourelles aux angles, une tour carrée sur la façade principale et une grosse tour ronde au Nord Ouest, une lucarne de défense en encorbellement au-dessus de la porte, une tour d'escalier en vis et une palissade autour du château. Tout autre dispositif de fortification était interdit. Cet édifice est de plan rectangulaire. Devant la façade principale d'entrée s'élève une tour carrée demi hors-oeuvre abritant l'escalier en vis. Une grosse tour circulaire est bâtie sur l'angle sud-ouest. Les trois autres angles sont dotés de tourelles en échauguette. Quatre tourelles étaient prévues en 1441. Une quatrième a sans doute été édifiée à l'angle sud-ouest du bâtiment puis démolie, faisant place à une grosse tour d'angle circulaire. A l'intérieur, se trouvent des cheminées sculptées.","habitants":"Famille de Foulques de Junhac,\r\n        \r\n        \"","divers":"Eyjeaux GPS : 45° 46' 38,89\" Nord et 1° 23' 34,55\" Est    grav 1 à 5.  Pomelie  à st paul d'Eyjeaux Grav 6","gps":"45° 46' 38,89\" Nord et 1° 23' 34,55\" Est    grav 1 à 5.  Pom","images":["../../jctruffet.com/image/image_87/87_Eyjeaux_1.jpg","../../jctruffet.com/image/image_87/87_Eyjeaux_2.jpg","../../jctruffet.com/image/image_87/87_Eyjeaux_3.jpg","../../jctruffet.com/image/image_87/87_Eyjeaux_4.jpg","../../jctruffet.com/image/image_87/87_Eyjeaux_5.jpg","../../jctruffet.com/image/image_87/87_Eyjeaux_6.jpg"]},"Consult_chateau_formulaire1476":{"id":"Consult_chateau_formulaire1476","dept":"87","canton":"Eymoutiers","commune":"Eymoutiers","nom":"Eymoutiers","type":"Château","periode":"XIV-XVII","histoire":"A Eymoutiers le château de Beaume du XVII-XIX, de la Condamine du XXe siècle, de Farsac du XVI-XIX, la Font-Macaire du XVII XIX, de Fougeolles XVII-XIX, de Légaud du XVII-XIX, de la Sauterie du XVII de Toulondit dit Closerie  du XIXe siècle.              EYMOUTIERS, fût fondé vers l'an 600 par un moine Irlandais du nom de \"Psalmet\" patron de la ville. Au XIVe siècle, la ville fût détruite par les anglais, reconstruite, puis ruinée à la fin du XVe siècle par la peste et les guerres de religions. En 1778, François Richard fonda le collège sous l'ancien couvent des Ursulines, puis la tourmente révolutionnaire mit fin au chapitre.  Elle connut enfin le calme jusqu'à la seconde guerre mondiale, qui fit de notre région un des hauts lieux de la résistance en Limousin.                           FARSAC, chef d'un ancien fief dont les seigneurs rendaient hommage à l'évêque de Limoges. Le château acquis en 1392 par Pierre Romanet, d'Eymoutiers, a dû faire l'objet de travaux du XVe siècle au XVIIe siècle. Aménagement d'une chapelle au début du XVIIe siècle, à la suite d'une alliance entre Joseph Romanet, gentilhomme ordinaire de la maison du Roi, et Louise de Villelerme. Des écuries sont aménagées en 1827 (avec armes d'Emmanuel Jean de Brugière, dit le chevalier de Farsac).\r\n FONT-MACAIRE le château du XVIe-XVIIe siècles dont les écuries ont été transformées en annexe de la célèbre librairie parisienne Vignes, spécialisée dans les livres anciens.                                                  SAUTERIE, exploitation forestière.","architecture":"BEAUME, le château est construit sur plan carré. A l'ouest, un porche surmonté d'un pavillon de pierre côté extérieur et pans de bois côté cour s'ouvre dans un mur s'appuyant sur la colline au nord et terminé par une tour au sud.  La maçonnerie des tours et d'autres endroits montrent des remaniements (enceinte abaissée, ouverture obstruées). Le porche est surmonté d'un blason. Le corps de logis situé à l'Est se prolonge par des terrasses dominant l'étang.\r\nDes dépendances à flanc de colline terminées par une tour au Nord et un mur-terrasse dominant une petite pièce d'eau au sud ferment la cour.  La construction semble dater de l'année 1659 et Philippe de Romanet, seigneur de la Vareille, archer des gardes du corps du Roi,  serait son instigateur.\r\nFONT-MACAIRE, ancienne construction avec tour fortifiée dont une pierre remployée datée 1578 avec initiales P.P.D ; remplacée par une construction du XVIIe siècle ; restauration à la fin XIXe siècle.    TOULONDIT, de plan rectangulaire à deux niveaux sur soubassement avec avant corps de trois travées et fronton triangulaire au niveau du toit en tuile avec des lucarnes, escaliers à double révolution en façade.","habitants":"Famille de Pierre Romanet\r\n        \r\n        \"","divers":"A Eymoutiers Farsac grav-1-2  La Beaume grav-3. Font-Macaire grav-4-5.  Fougerolles grav-6. Toulondie grav-7-8.   Rivière aux seigneurs grav-9.","gps":"","images":["../../jctruffet.com/image/image_87/87_Eymoutiers_1.jpg","../../jctruffet.com/image/image_87/87_Eymoutiers_2.jpg","../../jctruffet.com/image/image_87/87_Eymoutiers_3.jpg","../../jctruffet.com/image/image_87/87_Eymoutiers_4.jpg","../../jctruffet.com/image/image_87/87_Eymoutiers_5.jpg","../../jctruffet.com/image/image_87/87_Eymoutiers_6.jpg","../../jctruffet.com/image/image_87/87_Eymoutiers_7.jpg","../../jctruffet.com/image/image_87/87_Eymoutiers_8.jpg","../../jctruffet.com/image/image_87/87_Eymoutiers_9.jpg"]},"Consult_chateau_formulairecbed":{"id":"Consult_chateau_formulairecbed","dept":"87","canton":"Condat sur Vienne","commune":"Boisseuil","nom":"Faugeras","type":"Château","periode":"XVIII","histoire":"FAUGERAS,  bâti à Boisseuil, ses dépendances datent du XVIIIe siècle. Fut dabord la propriété de labbaye de Saint-Augustin. Puis le domaine passe entre différentes mains. Les Pouyat sont les plus célèbres. Cette famille, originaire du Limousin, a repris en 1797, la manufacture parisienne de Locré qui deviendra par la suite Porcelaine de Paris. Le château appartenait à Émile Pouyat qui outre ses activités de porcelainier, reste un acteur économique important dans la ville. La demeure est rachetée en 1950 par les de Catheux, originaires de Beauvais, ils  y installent une laiterie. Ils seraient les inventeurs du yaourt aux fruits. Laffaire périclite en 1970. En 2002, il est racheté par les frères Verger. Éric est issu du marketing pharmaceutique. Pierre a dirigé un hôtel prestigieux aux États-Unis. Ils auraient investi plus de 3 millions pour réaliser ce projet. Ils ouvrent en décembre 2006 ce complexe quatre étoiles doté de deux restaurants, dont un gastronomique dirigé par le chef étoilé Philippe Redon.  Acheté en 2011 par la holding Prosper Amouyal, le domaine de Faugeras n'entamera pas l'année 2017. Cette fermeture met fin à une belle histoire commencée en 2005.   le domaine de Faugeras abrite depuis peu un hôtel-restaurant de prestige, classé 4 étoiles de la famille E.Thomas.","architecture":"FAUGERAS, posé dans un parc paysager de sept hectares qui surplombe Limoges, construit en 1742  chef-duvre architectural, indissociable de lhistoire du Limousin le domaine de Faugeras revu par les repreneurs, mêlait le chic et le contemporain. Le domaine est racheté par lOffice HLM de Limoges, qui lutilise pour entreposer le matériel utilisé par les services techniques. Loffice détruit deux pavillons de style Louis XIII,  corps de logis central de plan rectangulaire à trois travées deux niveaux et lucarnes sur comble à toit brisé l'édifice est flanqué de pavillons d'une travée aux extrémitées saillants de même style que le corps de logis.","habitants":"Famille des Pouyat\r\n        \r\n        \"","divers":"Boisseuil GPS : 45° 46' 15\" Nord et 1° 19' 56\" Est     Faugeras grav 1 à 5.","gps":"45° 46' 15\" Nord et 1° 19' 56\" Est     Faugeras grav 1 à 5.","images":["../../jctruffet.com/image/image_87/87_Faugeras_1.jpg","../../jctruffet.com/image/image_87/87_Faugeras_2.jpg","../../jctruffet.com/image/image_87/87_Faugeras_3.jpg","../../jctruffet.com/image/image_87/87_Faugeras_4.jpg","../../jctruffet.com/image/image_87/87_Faugeras_5.jpg"]},"Consult_chateau_formulaire3694":{"id":"Consult_chateau_formulaire3694","dept":"87","canton":"Saint-Yrieix la Perche","commune":"Flavignac","nom":"Faye_Flavignac","type":"Château","periode":"XVIII","histoire":"FAYE, bâti à Flavignac, date du XVIIIe siècle. Les aLancien manoir datant des XVe-XVIIe siècles occupée par la famille Loménie fut détruit dans les années 1780, au moins en partie, et remplacé par le château de Faye actuel plus moderne, dont la construction commandée par la famille Villoutreix de Faye a été réalisée entre 1782 et 1786 par larchitecte Joseph Brousseau. Les  arrière grand-parents de François Mitterrand famille de Pétronille étaient instituteurs limousins. Lui était né à Limoges, elle, à Bussière-Poitevine. Elle est décédée à Flavignac, au château de Faye. Le château de Faye fait l'objet d'une patiente restauration par ses propriétaires actuels. Le château de Flavignac appartient depuis 1997, à Mr Philippe Rosier. Il est classé aux MH.","architecture":"FAYE, a été construit à côté de lancien prieuré Saint-André de Faye, dépendant de labbaye de Solignac. Il se compose dun corps de logis principal rectangulaire encadré de deux pavillons latéraux. Deux jardins en terrasse permettent laccès à la demeure. Dans les années 1780, l'ancien manoir datant des XVe-XVIIe siècles fut détruit, au moins en partie, et remplacé par un château moderne.  Il a été reconstruit de 1782 à 1786 et l'architecte en a été Joseph Brousseau : Le nouveau château, qui n'était peut-être pas totalement terminé au moment de la Révolution française, notamment dans ses décors intérieurs, se présente comme un corps de logis principal encadré de deux pavillons surbaissés. Ses décors intérieurs (rez-de-jardin surélevé), de style classique, sont  bien conservés, notamment les salons. Un jardin à la française, complété par un potager, accompagnait le monument.","habitants":"famille Villoutreix de Faye\r\n        \r\n        \r\n        \r\n        \"","divers":"Faye à Flavignac  GPS : 45° 42' 54\" Nord et 1° 04' 46\" Est. Faye la grav 4 vue arrière","gps":"45° 42' 54\" Nord et 1° 04' 46\" Est. Faye la grav 4 vue arriè","images":["../../jctruffet.com/image/image_87/87_Faye_Flavignac_1.jpg","../../jctruffet.com/image/image_87/87_Faye_Flavignac_2.jpg","../../jctruffet.com/image/image_87/87_Faye_Flavignac_3.jpg","../../jctruffet.com/image/image_87/87_Faye_Flavignac_4.jpg"]},"Consult_chateau_formulaire39c5":{"id":"Consult_chateau_formulaire39c5","dept":"87","canton":"Panazol","commune":"Feytiat","nom":"Feytiat","type":"Château","periode":"XVII","histoire":"A Feytiat, château de Laugerie  du XVIIe siècle,  château du Puytison, le château du Mas Cerise   hôtel de ville.                                                                     FEYTIAT, est citée dès le XIIe siècle comme possédant l'un des plus anciens établissements de l'ordre du Grandmont : le prieuré du Châtenet, fondé du vivant de saint Etienne de Muret (vers 1120). Le lieu du Châtenet (nom venant des châtaigniers) fut suggéré à Saint-Étienne par Saint-Gaucher. En 1139, il y avait 18 religieux au Châtenet. Le Mas du Puytison fut donné aux religieuses en 1224 par Adémar Vigier. En 1317, une bulle du pape érigea le Châtenet en prieuré conventuel régulier. On défricha à cette époque et quatre étangs furent construits. Parmi ceux-ci, l'étang du moulin du Châtenet qui est devenu l'étang du Puytison. Durant la guerre de cent ans, en 1370, le prieuré fut dévasté. En 1569, il fut saccagé et incendié par le duc des Deux Ponts Wolfgang de Bavière , durant les guerres de religion. En 1550, le prieuré avait été transformé en communauté de femmes. La supérieure portait le titre d'abbesse royale du Châtenet. En 1748, il y avait au prieuré 23 religieuses, une novice, trois converses et douze élèves. Cette communauté exista jusqu'à la Révolution. Le 4 vendémiaire an IV (26 septembre 1795), Guillaume Grégoire de Roulhac se rendit acquéreur des domaines nationaux provenant de l'abbaye du Châtenet : le prieuré, quatre de ses métairies, la forêt et les étangs.                           LAUGERIE, la terre de Laugerie appartenait en 1595 à l'abbesse de la Règle qui y résidait une partie de l'année. De1715 à 1791, le château servit de maison de campagne au grand séminaire.","architecture":"LAUGERIE Le château date de la fin XVIIe siècle et du début XVIIIe siècle. L'édifice est inscrit au titre des monuments historiques le 16 mai 1979.  Le corps de bâtiment rectangulaire est encadré par deux pavillons carrés en avancée sur cour. Un vaste mur d'enceinte entoure l'ensemble, il est ouvert,entre l'aile ouest du château et la chapelle, par une porte charretière et une porte piétonne. La façade sur cour présente deux niveaux et un étage de lucarnes, à fronton triangulaire mouluré. Le décor se limite à la mouluration des portes et aux grilles des fenêtres au- dessus de la porte. Les dépendances présentent le même équilibre dans l'alternance des travées que le château. Au rez-de-chaussée, la salle centrale présente un décor en stuc, à l'antique: pilastres à cannelures rondes à listel et chapiteaux ioniques avec corne d'angle à volutes et échine ornée d'oves. Le premier étage conserve trois cheminées Empire. Le couloir de la cave débouche dans une salle rectangulaire ouverte à l'est sur une petite pièce taillée dans le tuf et voûtée en plein cintre, et à l'ouest par un long souterrain, creusé de niches.\r\nMAS-CERISE, construit en 1908, devenu propriété de la municipalité en 1973 (actuellement la Mairie).\r\nL'intérieur a beaucoup évolué mais une pièce est restée intacte, le bureau d'Henri Betoule (ancien propriétaire), à présent bureau du Maire qui a notamment conservé ses belles boiseries en acajou.","habitants":"Guillaume Grégoire de Roulhac\r\n        \r\n        \"","divers":"A Feytiat le Mas Cerise grav 1 à 3.  Puytisson grav 4-5","gps":"","images":["../../jctruffet.com/image/image_87/87_Feytiat_1.jpg","../../jctruffet.com/image/image_87/87_Feytiat_2.jpg","../../jctruffet.com/image/image_87/87_Feytiat_3.jpg","../../jctruffet.com/image/image_87/87_Feytiat_4.jpg","../../jctruffet.com/image/image_87/87_Feytiat_5.jpg"]},"Consult_chateau_formulaire6d60":{"id":"Consult_chateau_formulaire6d60","dept":"87","canton":"Bellac","commune":"Nouic","nom":"Fraisse_Mézières","type":"Château","periode":"XV-XVIII","histoire":"A deux Km au nord à Mézières sur Issoire le château de la COTE chambres d'hôtes, ancienne seigneurie du XIIIe siècle, reconstruite au XVIe et remaniée au XVIIIe siècle, la Côte surplombe un grand étang.       Le FRAISSE, en 1220 entre par alliance dans la famille  des Monstiers un logis noble existait au XIVe siècle, brûlé et ruiné en 1356 par les Anglais lorsque le Prince Noire ravagea la région. Au XVe siècle, une demeure fut reconstruite, avec un souci de défense. Ce bâtiment existe encore au nord-ouest de l'ensemble. En 1554, Jean de Monstiers, évêque de Bayonne, ambassadeur de François Ier puis d'Henri II dans les pays scandinaves, en Allemagne et chez les Grisons, fit édifier une nouvelle demeure, plus vaste que la précédente. Quelques modifications y furent apportées au XVIIe siècle (comblement des douves au sud-ouest, suppression des ponts-levis, transformation des douves en canal au sud-est et du pont-levis en pont de pierre). En 1725, construction des écuries actuelles dans le prolongement de l'aile gauche en retour. Vers 1750, démolition de la tour nord-ouest. Au premier étage, la vaste galerie de l'aile en retour fut distribuée en chambres desservies par un corridor. La démolition du vieux château fut commencée mais interrompue. Au XIXe siècle, le salon du rez-de-chaussée fut entièrement refait et la chapelle restaurée. Au début du XXe siècle, les lucarnes et les corniches du corps de logis principal et de l'aile en retour furent refaites selon le modèle des fenêtres de l'hôpital de Lude. Appartient à la même famille depuis 800 ans. Sybil et Louis des Monstiers-Mérinville propriétaires actuels .","architecture":"FRAISSE En 1356, le \"Prince Noir\" et ses hommes y ont bien mis le feu, mais il est toujours là ! joyau \"Renaissance\" enchâssé dans la campagne de l'ouest limousin.   Le Fraisse du XIIIe siècle était un \"logis noble\" dont il ne reste presque rien aujourd'hui. Il fut reconstruit après la guerre de cent ans par sieur Jacques des Monstiers. C'est le \"vieux château\" du XVe siècle formant la partie droite de l'ensemble des bâtiments. La partie principale, du XVIe siècle, de type Renaissance possède un bel escalier Henri II, la grande salle avec sa cheminée.  Le château actuel comprend un corps de logis du XVe siècle, la résidence principale du XVIe siècle et des dépendances plus récentes. Le vieux château a conservé ses dispositions d'origine. Il s'ouvre par une porte en accolade. Côté parc, lui a été accolé un pavillon crénelé de style Troubadour. La partie principale du XVIe siècle présente des motifs de la deuxième Renaissance témoignant de l'influence de l'école de Fontainebleau et paraissant inspirés des livres d'architecture de Serlio.  Portail principal en granit et calcaire, incrusté de marbres de couleur et orné de médaillons; la façade sur jardin s'ouvre par une porte à bossages vermiculés que surmonte une niche entre deux baies à traverses ; grande porte rustique de l'aile gauche à bossages et refends.","habitants":"Famille de Sybil et Louis des Monstiers-Mérinville \r\n        \r\n        \"","divers":"Château de la Cote grav de 1 à 5 ; de la Fraisse-Nouic grav de 6-à 9 .   Nouic GPS : 46° 03' 39\" Nord, 0° 55' 14\" Est","gps":"46° 03' 39\" Nord, 0° 55' 14\" Est","images":["../../jctruffet.com/image/image_87/87_Fraisse_M%c3%a9zi%c3%a8res_1.jpg","../../jctruffet.com/image/image_87/87_Fraisse_M%c3%a9zi%c3%a8res_2.jpg","../../jctruffet.com/image/image_87/87_Fraisse_M%c3%a9zi%c3%a8res_3.jpg","../../jctruffet.com/image/image_87/87_Fraisse_M%c3%a9zi%c3%a8res_4.jpg","../../jctruffet.com/image/image_87/87_Fraisse_M%c3%a9zi%c3%a8res_5.jpg","../../jctruffet.com/image/image_87/87_Fraisse_M%c3%a9zi%c3%a8res_6.jpg","../../jctruffet.com/image/image_87/87_Fraisse_M%c3%a9zi%c3%a8res_7.jpg","../../jctruffet.com/image/image_87/87_Fraisse_M%c3%a9zi%c3%a8res_8.jpg","../../jctruffet.com/image/image_87/87_Fraisse_M%c3%a9zi%c3%a8res_9.jpg"]},"Consult_chateau_formulairef87e":{"id":"Consult_chateau_formulairef87e","dept":"87","canton":"Eymoutiers","commune":"Roziers Saint-Georges","nom":"Fraysseix","type":"Maison forte","periode":"XVI","histoire":"FRAYSSEIX, le premier acte qui parle des terres du Fraysseix date du 11 janvier 1566, ce dernier établit que la terre appartenait déjà à la famille Moulinier.  Un seul acte intermédiaire nous est revenu daté du 30 mars 1693, un règlement de comptes entre Jean-Charles de Moulinier et un de ses métayers  Estienne Chaustoux , dans la famille des Moulinier   Nous ne connaissons qu'une fille issue de l'union de Barbe de Verthamon et Martial  Madeleine Moulinier (1676-1749).\r\nElle fit union avec Gabriel Blondeau de Venteau (1672-1724), conseiller du Roi, trésorier au bureau des finances de Limoges, seigneur de Venteau  et  du Buisson  à Saint-Sulpice-Laurière.","architecture":"FRAYSSEIX, la construction du château actuel de Louis XIII, il devait donc déjà exister une autre construction avant cette date. La légende rapporte que le château actuel ne devait être que laile centrale dun ensemble architectural qui aurait dû comporter deux ailes latérales. Le corps de logis à deux niveaux sur soubassement lucarne central sur toit en croupe recouvert de tuiles.","habitants":"Famille Moulinier\r\n        \r\n        \"","divers":"Fraysseix à  Roziers Saint-Georges","gps":"","images":["../../jctruffet.com/image/image_87/87_Fraysseix_1.jpg"]},"Consult_chateau_formulaire401b":{"id":"Consult_chateau_formulaire401b","dept":"87","canton":"Saint-Léonard de Noblat","commune":"la Geneytouse","nom":"Geneytouse","type":"","periode":"XVI-XVII","histoire":"A Geneytouse trois châteaux, celui de Puy-Joubert, Puy-Faucher  et de Mas le Seuvre.\r\nPUY-FAUCHER, au XVIe siècle, la seigneurie de Puy-Faucher appartenait à la famille de Bostviger, Christophe Faure alias de Bostviger était seigneur de Puy-Faucher en 1598. Bostviger est une terre située à côté de Puy-Faucher en la paroisse de Saint-Paul. Cependant, le château actuel date du XVIIIe siècle. Il aurait été construit par un membre de la famille Grégoire de Roulhac ; peut-être Guillaume Grégoire de Roulhac (1671-1757) qui était seigneur de Thias, avocat, conseiller du Roi et substitut de son procureur en lélection du Haut-Limousin.  Grégoire de Roulhac : Cette famille, qui tire son nom du village de Roulhac commune de Saint-Hilaire-Bonneval, et en 2009 de nombreux descendants tant en France quaux Etats-Unis, est issue de François Roulhac, notaire à Limoges en 1531 et de Jean Roulhac, notaire royal à Limoges de 1539 à 1561. Ce dernier eut quatre filles et trois fils. De laîné Joseph Roulhac proviennent les nombreuses branches disparues des Roulhac à l'exception de celle des Roulhac de Rochebrune. Du troisième fils Guillaume provient la branche des Grégoire de Roulhac. \r\nPUY-JOUBERT du  XVIIe siècle, famille de Dalesme de Châtelus  Hélène Luce Augustine Anne Jeanne Adèle Lajoumard de Bellabre. Marie Joseph Antoine Albert Alexandre résidence de la famille Lajoumard de Bellabre jusqu'en 1923.","architecture":"PUY-FAUCHER du XIXe siècle, cette belle propriété se trouve à Puy-Faucher à environ une heure de route de Limoges. La décoration y est vraiment très féminine et recherchée, elle colle magnifiquement avec le cadre, cela ressemble beaucoup à l'univers de chez Designers Guild.                                                      PUY-JOUBERT, le corps de logis central à deux niveaux et sept travées dont une dans l'avant corps d'entrée avec fronton triangulaire au niveau du toit qui comportent des lucarnes et chaînage de refend sur les angles également sur les deux pavillons carrées de droite et de gauche toit à quatre pans.\r\nChâteau du MAS le SEUVRE du XVIIIe siècle. Pas d'information historique pour ce manoir dont le corps de logis rectangulaire à trois niveaux accolé d'un donjon carré à trois niveaux et d'une tourelle ronde hors-oeuvre en façade toit en poivrière.","habitants":"Famille Grégoire de Roulhac\r\n        \r\n        \"","divers":"A Geneytouse le château de Puy-Fauchet grav de 1 à 3.  Puy-Jobert grav 4-5-6.","gps":"","images":["../../jctruffet.com/image/image_87/87_Geneytouse_1.jpg","../../jctruffet.com/image/image_87/87_Geneytouse_2.jpg","../../jctruffet.com/image/image_87/87_Geneytouse_3.jpg","../../jctruffet.com/image/image_87/87_Geneytouse_4.jpg","../../jctruffet.com/image/image_87/87_Geneytouse_5.jpg","../../jctruffet.com/image/image_87/87_Geneytouse_6.jpg"]},"Consult_chateau_formulaire1937":{"id":"Consult_chateau_formulaire1937","dept":"87","canton":"Rochechouart","commune":"Gorre","nom":"Gorre","type":"Château","periode":"XVIII","histoire":"GORRE, était avant la Révolution une paroisse du Haut Limousin, dans l'archiprêtré de Nontron. Elle possédait une église du XIe siècle, surmontée d'un clocher carré de deux étages. Cette église jouxtait les bâtiments du château et a été démolie à la fin du XIXe siècle. Elle a été remplacée en 1892 par l'église actuelle, construite à un emplacement différent en contre-haut. \r\nGorre faisait partie de la vicomté de Rochechouart. Elle a eu pour seigneurs la famille de Saint-Laurent, puis la famille du Barry. Du XVIe siècle jusqu'à la Révolution, ses seigneurs furent des membres de la famille de Beaupoil de Saint-Aulaire, qui fit construire le château actuel au XVIIIe siècle, construit par , Martial-Louis de la famille de Beaupoil de Sainte-Aulaire, Évêque de Poitiers de 1759 à 1791. Né à Gorre le 1er janvier 1719, mort en émigration à Fribourg en 1798. Fils de Louis de Beaupoil de Sainte-Aulaire, seigneur de Gorre, et de Françoise Guingand de Saint-Mathieu. On lui attribue généralement la construction de l'actuel.\r\nBrie de Sousmagnac Martial de Beaupoil de Sainte-Aulaire . Vicaire général du diocèse d'Arles, réfugié à Gorre où il fut arrêté en 1793. Mort à Rochefort en 1794 et inhumé à l'île d'Aix, ses biens saisis comme biens nationaux furent vendus l'année suivante.\r\nSOUMAGNAS, maison forte du  XVIe siècle, construit par la famille de Brie.","architecture":"GORRE le château actuel du XVIII siècle. De plan rectangulaire, corps de logis de deux niveaux et lucarnes sur comble sur soubassements,  corps de logis  central de sept travées  avec avant corps de trois travées, deux pavillon de part et d'autre rectangulaire de trois niveaux toit en croupe, l'ensemble recouvert de tuiles.","habitants":"Vicomté de Rochechouart\r\n        \r\n        \"","divers":"Château de Gorre et la maison forte de Sommagnas grav 4","gps":"","images":["../../jctruffet.com/image/image_87/87_Gorre_1.jpg","../../jctruffet.com/image/image_87/87_Gorre_2.jpg","../../jctruffet.com/image/image_87/87_Gorre_3.jpg","../../jctruffet.com/image/image_87/87_Gorre_4.jpg","../../jctruffet.com/image/image_87/87_Gorre_5.jpg"]},"Consult_chateau_formulairefdc4":{"id":"Consult_chateau_formulairefdc4","dept":"87","canton":"Limoges","commune":"Isles","nom":"Isles_Bayles","type":"Château","periode":"XVI-XVIII","histoire":"A ISLES 12 châteaux  à découvrir : châteaux et manoirs de Reignefort, de Girondas, La Chabroulie, Le Gondeau, L'Etoile, Verthamont, Le Caillaud, Le Généty, Envaud, Le Val d'Enraud et  Les Courrières.    ISLES, était une seigneurie ecclésiastique. Le poète limousin Jean Rebier  (1879-1966) a vécu dans sa propriété du hameau du Mas de l'Aurence. L'écrivain Robert Margerit (1910-1988) a vécu dans la propriété de Thias. Au centre du lac se trouve une île de 70 hectares qui abrite un centre d'art contemporain, créé en 1990, à la suite du Symposium de sculptures de 1983, puis des différentes actions de l'association Limousin Art Contemporain  jusqu'en 1989. Dirigé entre 1989 et 2000 par Dominique Marchès, puis de 2001 à 2004 par Guy Tortosa, enfin linstitution devient, en 2005, à la suite de la nomination de Chiara Parisi à sa direction, « Centre international d'art et du paysage de Vassivière ». Marianne Lanavère est sa directrice depuis 2011. \r\nCHABROULIE, bâti à Isle, Benoît Lesterpt-Beauvais, fils de François Lesterpt, avocat, et de Dorothée Cur-Deroy, est né à Le Dorat, le 22 août 1750. Il a été guillotiné à Paris, le 31 octobre 1793, après avoir été député aux États généraux de 1789 et membre de la Convention nationale sa famille avait le château de la Chabroulie sur cette même commune.  Il a été transformé en gîte et chambres d'hôtes, tenue par la même famille, depuis plusieurs générations, que Philippe et Bénédicte de la Selle gérant. \r\nGIGONDAS, bâti à Isle, a appartenu à l'évêque de Limoges, au Xe siècle et le conserva jusqu'au XVIe siècle. Jean Tardieu le racheta en 1624 et depuis,  toujours dans les mains de ses descendants.","architecture":"BAYLES, bâti à Isle et son parc sont la propriété de la commune d'Isle. Aujourd'hui école maternelle et maison de retraite.                                              CHABROULIE, corps de logis central de plan carré à trois niveaux toit en croupes  avec lucarnes accolé d'une tour rectangulaire  et à l'opposée tourelle à mâchicoulis toit en poivrière.                                    GIGONDAS avec son donjon carré parait plus forteresse que château   avec ses fenêtres  à linteaux arrondies, mâchicoulis et chemin de ronde sous un toit à l'impérial, le corps de logis sur l'arrière à deux niveaux toit en croupes, flanqué d'une tour en angle intérieur, escalier.                                                       GONDEAU, bel ensemble de  d'ancien et de modene  par sa bâtisse principale de corps de logis rectangulaire à deux niveaux et lucarnes à pinacles et acrotères moulourés sur toit brisés à la mansart accolé sur flan droit d'une tour ronde à mâchicoulis toit en poivrière et en encorbellemt sur la gauche une échauguette en brique rouge coiffé d'une coupole, l'édifice est relié par un retour arrière à une autre bâtisse dont la façade est de style  moyenageuse  grandes fenêtres à linteau arrondi  se terminant par une tourelle crenelé  à toit en coupole.","habitants":"Famille de Benoît Lesterpt-Beauvais   \r\n        \r\n        \r\n        \r\n        \"","divers":"A Isles-Vassivières     Bayles GPS : 45° 48' 18\" Nord, 1° 13' 38\" Est  grav-9.  Chabroulie  GPS : 45° 48' 18\" Nord, 1° 13' 38\" Est  grav-1-2 .  Gidondas  GPS : 45° 48' 13\" Nord et 1° 11' 17\" Est grav 3- 4-5-6.    Gondeau grav -7-8","gps":"45° 48' 18\" Nord, 1° 13' 38\" Est  grav-9.  Chabroulie  GPS :","images":["../../jctruffet.com/image/image_87/87_Isles_Bayles_1.jpg","../../jctruffet.com/image/image_87/87_Isles_Bayles_2.jpg","../../jctruffet.com/image/image_87/87_Isles_Bayles_3.jpg","../../jctruffet.com/image/image_87/87_Isles_Bayles_4.jpg","../../jctruffet.com/image/image_87/87_Isles_Bayles_5.jpg","../../jctruffet.com/image/image_87/87_Isles_Bayles_6.jpg","../../jctruffet.com/image/image_87/87_Isles_Bayles_7.jpg","../../jctruffet.com/image/image_87/87_Isles_Bayles_8.jpg","../../jctruffet.com/image/image_87/87_Isles_Bayles_9.jpg"]},"Consult_chateau_formulaire6e28":{"id":"Consult_chateau_formulaire6e28","dept":"87","canton":"Aixe sur Vienne","commune":"Jourgnac","nom":"Jourgnac","type":"Château","periode":"XV-XVI","histoire":"GARRAUD et BECHARDIE\r\nGARRAUD, bâti fin XVe siècle ou début XVIe siècle, remaniements ultérieurs au XVIIe siècle et au XVIIIe siècle, par la transformation du système distributif; remplacement d'un escalier en vis en pierre, par un escalier central tournant, à retours, en bois ; vestiges de marches spécifiques d'un escalier en vis ; au XIXe siècle, adjonction contre l'élévation ouest, d'un pavillon et d'un bâtiment à trois niveaux à usage d'habitation ; bâtiment couvert d'un toit en appentis, démoli vers 1958 ; la grange-étable délimitant le côté nord de la cour, est construite avant 1823, mentionnée sur le cadastre levé au cours de cette même année; grange-étable délimitant le côté sud de la cour, construite après 1823. Bâtiment de plan rectangulaire comportant une tour circulaire à l'angle sud et un pavillon ouest; escalier tournant avec rampe à balustres plats en forme de double poire ; à l'étage, plafond à la française, avec poutres et solives moulurées; grange-étable couverte de tuiles creuses.\r\n\r\nBECHADIE, château construit  au quatrième quart du XVIe siècle, fortement remanié ultérieurement.","architecture":"jOURGNAC,  Le Vieux Château » est la demeure type du \"gentilhomme campagnard\" telle que décrite par Charles Estienne au XVIe. \r\nBECHADIE, en 1742, il consistait en trois corps de logis, une grange à cinq travées,  les trois corps de logis délimitant les trois côtés de la cour située au nord décrivant le château entouré de fossés assez profonds et possédant un pont-levis. Les toitures des tourelles sont refaites en bardeau, vers 1980. Le château est constitué de deux bâtiments perpendiculaires à croupe brisée, en tuile plate ; bâtiment principal ou bâtiment sud, accosté de deux tours d'angle circulaires couvertes d'un toit conique en bardeau ; bâtiment est, placé en retour d'angle,  délimitant avec deux granges-étables à toit à longs pans en tuile creuse, disposées dans le même alignement, le côté Est de la cour; four accolé au mur latéral ouest du bâtiment principal.","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"A Jourgnac ; Garraud grav -1, Jourgnac grav de 2 à 5 GPS : 45° 43' 05\" Nord, 1° 12' 55\" Est Bechadie grav 6-7.","gps":"45° 43' 05\" Nord, 1° 12' 55\" Est Bechadie grav 6-7.","images":["../../jctruffet.com/image/image_87/87_Jourgnac_1.jpg","../../jctruffet.com/image/image_87/87_Jourgnac_2.jpg","../../jctruffet.com/image/image_87/87_Jourgnac_3.jpg","../../jctruffet.com/image/image_87/87_Jourgnac_4.jpg","../../jctruffet.com/image/image_87/87_Jourgnac_5.jpg","../../jctruffet.com/image/image_87/87_Jourgnac_6.jpg","../../jctruffet.com/image/image_87/87_Jourgnac_7.jpg"]},"Consult_chateau_formulaire2890":{"id":"Consult_chateau_formulaire2890","dept":"87","canton":"Rochechouart","commune":"Dournazac","nom":"Lambertie","type":"Forteresse","periode":"XVI","histoire":"LAMBERTIE, berceau de la famille de ce nom du XIIe siècle, il fut pris et brulé par les anglais sous le régne de charles VI. Pierre de lambertie le reconstruit un peu plus au nord, de nouveau dévasté en 1569 par les troupes calvinistes  de Coligny, Léonard de Lambertie, écuyer seigneur de Puydemaud, fut curé de Marval et vivait encore à la fin de l'année 1663 : il restaura et agrandit la propriété de Puydemaud et construisit le château tel que nous le voyons aujourd'hui , il fut immédiatement reconstruit et agrandi. A l'extinction de la branche ainée de la maison de  Lambertie en 1712,  le château passa par succession dans les familles d'Aydie de Ribérac, de Chabans de Richemont, de Grand de Bellussière, il fut acquis, en 1828 par le marquis de Bermondet de Cromières. C'est aux héritiers  de ce dernier que le marquis de Lambertie de Cons la Grandville les à achetés par contrat le 9 novembre 1875.  Pendant le XVIIIe siècle le château ne fut plus habité que par des fermiers ou des régisseurs, faute de réparations, il ne tarda pas de tombé en ruine, le nouveau propriétaire l'a fait reconstruire.","architecture":"LAMBERTIE de forme quadrilatère  avec une grosse tour à chaque angle,  son ornementation architecturale est vraiment remarquable et ses nombreuses tours et tourelles contribuent à le rendre le plus intéressant de toute la région. On y pénètre  par un portail au nord dans le mur d'enceinte, il est précédé d'un pont-levis jeté sur le fossé qui l'entoure.  La porte et les mansardes sont ornées de quelques sculptures dans le goût de l'époque. Les bâtiments de servitude, terminés par une grille et un portail en fer, forment au devant une belle cour et portent à leurs angles des tourelles en cul-de-iampe, construites avec une grande hardiesse et du meilleur effet. A la mort de Léonard de Puydemaud ce château resta à son frère Gabriel l'auteur de la branche du Bouchot et de Saint-Marlin-Lars.","habitants":"Famille de Lambertie\r\n        \r\n        \"","divers":"Château de Lambertie à Dournazac","gps":"","images":["../../jctruffet.com/image/image_87/87_Lambertie_1.jpg","../../jctruffet.com/image/image_87/87_Lambertie_2.jpg","../../jctruffet.com/image/image_87/87_Lambertie_3.jpg","../../jctruffet.com/image/image_87/87_Lambertie_4.jpg","../../jctruffet.com/image/image_87/87_Lambertie_5.jpg"]},"Consult_chateau_formulaire5a65":{"id":"Consult_chateau_formulaire5a65","dept":"87","canton":"Saint-Junien","commune":"Oradour sur Glane","nom":"Laplaud","type":"Vestiges-Château","periode":"XVIII","histoire":"LAPLAUD, vestiges d'une  ancienne demeure noble rurale, un autre château à été reconstruit à Oradour\r\nOradour-sur-Glane est un village martyr, occupé le 10 juin 1944 par 120 soldats SS de la division du Reich qui massacrèrent les habitants (642 victimes) et mirent le feu à l'église et à toutes les maisons. La loi du 10mai 1946 transféra à l'Etat les terrains et ruines d'Oradour sur Glane. L'église où furent tués les femmes et enfants du village, et les maisons,sont entretenus dans leur état de ruines.","architecture":"LAPLAUD,  ancienne demeure noble rurale. Logis construit à la fin du XVIIIe siècle,  dans le style classique, par Mathurin Brousseaud (entrepreneur et maître-charpentier) qui englobe les parties subsistantes d'un bâtiment de la première moitié du XVIIe siècle. Décor réalisé sous la Restauration.","habitants":"Seigneur locaux\r\n        \r\n        \"","divers":"A Oradour sur Glane les vestiges du château Laplaud grav 1-2 et le nouveau  3-4","gps":"","images":["../../jctruffet.com/image/image_87/87_Laplaud_1.jpg","../../jctruffet.com/image/image_87/87_Laplaud_2.jpg","../../jctruffet.com/image/image_87/87_Laplaud_3.jpg","../../jctruffet.com/image/image_87/87_Laplaud_4.jpg"]},"Consult_chateau_formulaire2529":{"id":"Consult_chateau_formulaire2529","dept":"87","canton":"Saint-Yrieix la Perche","commune":"Rilhac-Lastours","nom":"Lastours_Rilhac","type":"Vestiges","periode":"XII-XV","histoire":"LASTOURS, bâti à Rilhac-Lastours, sa construction débuta au XIIe siècle et fut achevée au XVe siècle. C'était un des hauts lieux de l'histoire du Limousin.  témoin d'une histoire longue de près de 700 ans, est un site restauré et mis en valeur grâce aux bénévoles. La légende bien-connue du « Chevalier au lion » raconte quun seigneur aurait sauvé un lion dun serpent. Reconnaissant, lanimal laurait ensuite suivi comme un chien fidèle. Peu de gens savent que ce chevalier se nommait « Gouffier de Lastours » et quil fut un des premiers à résider au château du même nom.  « Les seigneurs de Lastours étaient aussi seigneurs de Pompadour et de Hautefort » sur la route « Richard-Cur-de-Lion », sur laquelle se trouve le monument. À partir du XVIe siècle, la seigneurie de Lastours se déchire. Les guerres de religion et les querelles dargent ont finalement eu raison de la demeure familiale. Au XVIIIe siècle, le marquis de Lastours, criblé de dettes, sa résidence déjà en ruine, décide de vendre. Le château ne sera plus jamais habité et servira de carrière de pierres pour construire la plupart des maisons du village.","architecture":"LASTOURS, de nos jours, le château de Lastours est en pierre, construit à partir du XIIe siècle, le château, aujourd'hui en ruines, est l'ancien siège des seigneurs, puis barons, de Lastours.  Restauré entre le XIIe et le XVe siècle, il devient un véritable château fort. À la fin du Moyen-Âge, il est habité par Jean de Lastours, 1er baron du Limousin et grand chambellan du Roi de France. La seigneurie du château a toujours été fidèle au roi, ce qui explique les fleurs de lys ornant le blason. Les ruines du château sont les restes de cette époque faste, à laquelle sont entrepris de grands travaux. Ses vestiges se visitent. C'était l'ancien siège des seigneurs, puis barons, de Lastours. Il a conservé plusieurs tours d'angle. La base de son donjon a été remaniée au XVI siècle.    Il conserve plusieurs tours d'angle et la base de son donjon, remaniée au XVIe siècle.  Depuis plusieurs décennies une association de bénévoles restaure ce château, qui est un des hauts lieux de l'histoire limousine. Des fêtes médiévales y sont organisées régulièrement à l'occasion des vacances d'été. \r\nLe château de Lastours est inscrit aux M.H. depuis le 6 août 1956.","habitants":"Marquis Jean de Lastours\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Lastour vestiges  GPS : 45° 38' 58\" Nord et 1° 07' 16\" Est","gps":"45° 38' 58\" Nord et 1° 07' 16\" Est","images":["../../jctruffet.com/image/image_87/87_Lastours_Rilhac_1.jpg","../../jctruffet.com/image/image_87/87_Lastours_Rilhac_2.jpg","../../jctruffet.com/image/image_87/87_Lastours_Rilhac_3.jpg","../../jctruffet.com/image/image_87/87_Lastours_Rilhac_4.jpg","../../jctruffet.com/image/image_87/87_Lastours_Rilhac_5.jpg","../../jctruffet.com/image/image_87/87_Lastours_Rilhac_6.jpg"]},"Consult_chateau_formulaire35b8":{"id":"Consult_chateau_formulaire35b8","dept":"87","canton":"Eymoutiers","commune":"Château-Chervix","nom":"Lavaud_Bousquet","type":"Maison forte","periode":"XVI","histoire":"LAVAUD-BOUSQUET, le château de Lavaud-Bousquet fut bâti à la fin du XVIe siècle et au début du XVIIe siècle. Il appartient à l'indivision Tilmant-Tatischeff et est habité par la famille. Le sol était riche en minerai d'or et a été exploité depuis les Romains. Récemment, en devenant propriétaire d'une partie en très mauvais état des communs, Bruno Tilmant d'Auxy-Tatischeff, restaurateur du patrimoine peint, (Grand prix des métiers d'art) a créé un atelier de restauration d'uvres d'art qui a vu renaitre depuis 1974 de très nombreux trésors du patrimoine peint (tableaux). Honoré depuis du \"LABEL\" protégé par la loi (du 02/07/2005) de Patrimoine vivant. Le château est inscrit à l'inventaire supplémentaire pour part et classé pour une autre part M.H.le 26 mai 1994.","architecture":"LAVAUD-BOUSQUET,  le site est occupé depuis l'âge du fer dont un tumulus de la phase finale s'élève au sud-est du château. L'édifice présente un plan rectangulaire ayant conservé aux angles nord-ouest et sud-ouest les tours rondes du XVIe siècle. L'angle nord-Est est occupé par une tour du XXe siècle. Une chapelle également du XXe siècle s'appuie sur la façade nord. Le corps du logis date de la fin du XVIe ou du début du XVIIe siècle. Al'intérieur plusieurs pièces conservent un plafond à la française. Dans le grand salon, les boiseries de style XVIIIe sont une copie de 1962. Les dépendances se composent d'une bergerie des XVIIe et XXe siècles, d'anciennes écuries des XIXe et XXe siècles, et d'un garage à calèches de la fin du XIXe-début du XXe siècle","habitants":"Famille de Tilmant- d'Auxy-Tatischeff\r\n        \r\n        \r\n        \"","divers":"A Château-Chervix ; Lavaux GPS : 45° 33' 48\" Nord et 1° 19' 58\" Est","gps":"45° 33' 48\" Nord et 1° 19' 58\" Est","images":["../../jctruffet.com/image/image_87/87_Lavaud_Bousquet_1.jpg"]},"Consult_chateau_formulaire18d3":{"id":"Consult_chateau_formulaire18d3","dept":"87","canton":"Rochechouart","commune":"Maisonnée-sur-Tradoire","nom":"Lavauguyon","type":"Château","periode":"XIII","histoire":"LAVAUGUYON, Vestiges bâti à Maisonnée-sur-Tradoire, c'est une ancienne forteresse, de style médiéval, construite du XIIIe siècle.Le château de Lavauguyon au XIIe siècle appartenait à la famille de Malessac originaire du Poitou. Mis à sac par les mercenaires de Richard Cur de Lion, il est reconstruit au XIVe siècle. Le château de Lavauguyon est en ruines, aujourd'hui. En 1188, le 7e descendant de l'illustre famille de Pérusse, Charles de Pérusse épousa Anne de Malessac, héritière et vicomtesse du lieu. Les Pérusses des cars, seigneurs de Lavauguyon, connurent une brillante destinée et contractèrent d'illustres alliances au fil des siècles. Au début du XVIe siècle, les seigneurs de Lavauguyon deviennent Prince de Carency.  En 1745, Antoine de Quélen de Stuer se distingue à la bataille de Fontenoy. Louis XV en reconnaissance lui donne le titre de Duc et Pair de France. \r\nROCHER, est un château bâti à Maisonnais-sur-Tradoire, est de style Renaissance,   deux châteaux sont construits sur le territoire, celui de Lavauguyon de style féodal de lafin du XIVe siècle et celui de château Rocher élevé au XVIe siècle. Nous ne possédons pas de renseignements sur ce château Rocher aujourd'hui devenue un gîte organisée par Jean-Claude Boucheron et son épouse Edith appartenant à Madame la comtesse de Château Rocher.","architecture":"Vestiges du château de LAVAUGUYON, c'était une forteresse imposante érigée au Moyen-Age, son emprise au sol donne une idée de sa grandeur passée : un château prêt à parer les attaques, bâti sur un site stratégique, le château évolue encore pendant la Renaissance, jusquà la Révolution. Puis cest labandon : ses pierres sont revendues pour dautres constructions. Il fut dévasté et pillé sous la Révolution. Peu à peu, lédifice perd sa majesté. Des passionnés décident de racheter ce quil en reste, en 2009. Créée en 2005, lassociation des Amis du château de Lavauguyon uvre pour la sauvegarde de lédifice. \r\nROCHER, l'intérieur du château se composait de deux vastes corps de bâtiments, à gauche se trouvaient des salles d'habitation, à droite, une chapelle de style gothique flamboyant. Le donjon carré à voûte gothique, à nervures prismatiques avait un pendentif central. Aux ailes les courtines portaient des galeries intérieures reliant les tours d'angles aux autres bâtiments. Des fossés larges et profonds, que l'on pouvait vider et remplir à volonté, entourent la forteresse.","habitants":"Famille de Malessac \r\n        \r\n        \r\n        \"","divers":"Lavauguyon Vestiges grav 1-2-3   GPS : 45° 44' 01\" Nord et 0°
