const FULL={"Consult_chateau_formulaire34ea":{"id":"Consult_chateau_formulaire34ea","dept":"87","canton":"Condat-sur-Vienne","commune":"Saint-Paul","nom":"Aigueperse_St_Paul","type":"Château","periode":"XVI-XVIII","histoire":"quatre châteaux à Aigueperse, celui d'Aigueperse, de la Grande Gardette, de Saint-Paul de Marzac  et de St-Paul d'Eyjeaux.                                                          AIGUEPERSE, édifice est situé  dans la ville de Saint-Paul d'Eyjeaux  La construction date du XVIe et XVIIe siècle. \r\nSAINT-PAUL, au Moyen-Âge, les seigneuries et châteaux de Saint-Paul dépendent de la baronnie de Pierre-Buffière. On peut y voir un petit reliquaire du XVIe siècle, en métal argenté. De nombreux châteaux sont disséminés dans la campagne alentour, dominant les vallons, prés et bois : châteaux d'Aigueperse, de la Pomélie, de Marzac, de la Fayolle, de la Briderie, de la Grande Gardelle, du Grand-Bosviger.         \r\n La GRANDE GARDELLE, comme Aigueperse pas d'information historique.","architecture":"AIGUEPERSE, sa construction date du XVIe siècle XVIIe siècle le lieu est cité en 1288.. En 1832, un avant-corps a été ajouté au milieu de la façade nord. Le corps de logis est rectangulaire avec un escalier droit central occupant la largeur du bâtiment. La façade sud présente deux pavillons carrés en retour d'équerre. La façade nord est agrémentée d'une tourelle à l'angle nord-est. La porte d'entrée, sur la façade Sud, est accostée de pilastres cannelés à bases et chapiteaux moulurés. Elle est surmontée d'un oeil de boeuf encadré de pilastres cannelés et d'une corniche moulurée. La tourelle d'escalier centrale, dont les façades nord et sud se confondaient aux premier et deuxième niveaux avec le mur du corps de logis, se dégage au niveau du toit et s'élève de 2 niveaux. Est inscrit aux M.H. depuis le 19/03/1979.                          La GRANDE GARDELLE, corps de logis de plan rectangulaire à deux niveaux et lucarnes sur comble, flanqué sur angles de façades de tour ronde toit en poivrière et à l'opposée plein cintre un pavillon saillant avec clocheton.","habitants":"Pierre Buffière\r\n        \r\n        \r\n        \"","divers":"Aigueperse  GPS : 45° 46' 42\" Nord et 1° 24' 37\" Est, grav-1.                                                                            La Grande Gardelle grav-2.                                            St-Paul de Marzac grav-3.                                              St Paul d'Ejeaux grav-4","gps":"45° 46' 42\" Nord et 1° 24' 37\" Est, grav-1.","images":["../../jctruffet.com/image/image_87/87_Aigueperse_St_Paul_1.jpg","../../jctruffet.com/image/image_87/87_Aigueperse_St_Paul_2.jpg","../../jctruffet.com/image/image_87/87_Aigueperse_St_Paul_3.jpg","../../jctruffet.com/image/image_87/87_Aigueperse_St_Paul_4.jpg"]},"Consult_chateau_formulaireab35":{"id":"Consult_chateau_formulaireab35","dept":"87","canton":"Aixe sur Vienne","commune":"Aixe sur Vienne","nom":"Aixe_Vienne","type":"Vestiges","periode":"XII-XIII","histoire":"Plusieurs châteaux à Aixe sur Vienne, celui d'Aixe, de Bouchie, de Losmonerie (voir article) et de Roche.                                                                            AIXE sur VIENNE,  des Vicomtes-de-Limoges est un ancien château fort bâti, rue Jeanne d'Albret,  date de 982.  appelé aussi la Tour Jeanne d'Albret les vestiges du château d'Aixe-sur-Vienne, s'élèvent, une imposante forteresse de la Vicomté de Limoges.  Dès leur avènement, les vicomtes  se transmettaient héréditairement la haine du Plantagenêts. A linstar de ses prédécesseurs, Gui VI ne fait pas exception à la règle : il naccepte pas le traité de Paris qui place ses fiefs sous la tutelle du duc dAquitaine. Le vicomte ouvre les hostilités en attaquant les milices communales de Limoges rassemblées au bourg Saint Martial. La bataille tourne à son désavantage et son beau-frère, le comte de Nevers, est tué au cours de lengagement. Abandonné, ayant perdu son caractère défensif, le château dAixe tombe en ruines au XVIIIe siècle, après avoir soutenu de nombreux sièges et constitué un des points de défense important du Limousin aux portes de Limoges.  Les ruines du château, ou tour Jeanne d'Albret, inscrit en 2000 au titre des M.H. : sur l'éperon rocheux surplombant la confluence de l'Aixette et de la Vienne, s'élèvent les vestiges du château d'Aixe.","architecture":"AIXE sur VIENNE ou Tour Jeanne d'Albret date du XIIIe siècle. Il fut démoli au début du XIXe siècle. Il n'en reste que des ruines dont la célèbre Tour Jeanne d'Albret, qui fut une grande forteresse de la Vicomté de Limoges.     Il était de style Moyen-Age,  c'est un édifice avec une enceinte octogonale, tour à contreforts plats, deux corps de bâtiments, basse-cour, chapelle dédiée à Saint-Georges. Dans les années 1180-1220, il entre dans la lutte que se livrent partisans et adversaires des Plantagenêts. En 1206, Guy V fit construire la tour et rénover l'aula (grande salle vicomtale ou le corps de bâtiment qui l'abritait). Trois maisons de chevaliers sont contenues dans l'enceinte. Dans les années 1180-1220, il entre dans la lutte que se livrent partisans et adversaires des Plantagenêts.  Le donjon, en ruines, fut démoli en 1809 et les murailles, ainsi quune partie du rocher sur lequel reposaient les constructions, servirent de carrière au XIXe siècle, et les pierres se retrouvèrent réemployées dans de nombreux immeubles des environs. Le site, interdit daccès, laisse encore entrevoir lorifice dun puits, taillé dans la roche et dont le fond serait situé plus bas que le niveau de lAixette.","habitants":"Jeanne d'Albret\r\n        \r\n        \"","divers":"Bouchie;   GPS : 45° 47' 50\" Nord et 1° 08' 12\" Est        Aixe GPs : 45° 47' 40\" Nord et 1° 08' 30\" Est","gps":"45° 47' 50\" Nord et 1° 08' 12\" Est        Aixe GPs : 45° 47'","images":["../../jctruffet.com/image/image_87/87_Aixe_Vienne_1.jpg"]},"Consult_chateau_formulaire183c":{"id":"Consult_chateau_formulaire183c","dept":"87","canton":"Ambazac","commune":"Ambazac","nom":"Ambazac","type":"Château","periode":"XVIII","histoire":"Quatre châteaux à Ambazac , Montméry,  Le Cloud, st-Roch, et Trasforet.\r\nMONTMERY,  bâti au lieu dit Montméry,  la construction  dâte du XIXe siècle, cette demeure fut construite par le porcelainier Théodore Haviland de 1885-1890. Appartenant à la Famille Haviland, célèbres porcelainiers new-yorkais installés à Limoges depuis 1840, Théodore Haviland fut le fondateur du Domaine de Montméry. Le château édifié par le célèbre architecte Richard Morris Hunt, en 1885, constitue un parfait exemple du style éclectique à l'époque sur la côte Est des Etats-unis. Le parc fut dessiné, 5 ans plus tard, par Edouard André paysagiste originaire de Bourges. Ce parc regroupe plus d'une centaine d'espèces d'arbres et d'arbustes du monde entier dont certaines uniques en France. Andromèdes du Japon, chênes, tilleuls argentés, ornent ce parc magnifique où, coule une rivière anglaise, au milieu, de toute beauté. Le château et le parc de Montméry  ont servi de décor pour des films français \"Les déstinées sentimentales\" avec Emmanuelle Beart et \"Lady Chaterley\" avec Hippolyte Girardot.   \r\n TRASFORET  bâti à Ambazac, pas d'information historique pour les autres chateaux.","architecture":"MONTMERY Cet ancien château fort fut construit, en 1885,  Il est attribué à l'architecte américain Richard Morris Hunt, qui a dessiné de nombreuses demeures pour des milliardaires ainsi que le piédestal de la Statue de la Liberté. Le château de Montméry est classé aux M.H. depuis le 19/04/1991, modifié par un arrêté du 31/03/1995. Les façades et toitures du pavillon d'entrée, ainsi que le sous-sol, et les 1er, 2e et 3e étages du château de Montméry sont inscrits à cette même date.","habitants":"Famille Haviland \r\n        \r\n        \"","divers":"A Ambazac le St-Cloud grav-1                               Montméry  : 45° 58' 14\" Nord et 1° 23' 31\" Est   grav-2-3-4-5.                                                                           St-Roch grav-6","gps":"","images":["../../jctruffet.com/image/image_87/87_Ambazac_1.jpg","../../jctruffet.com/image/image_87/87_Ambazac_2.jpg","../../jctruffet.com/image/image_87/87_Ambazac_3.jpg","../../jctruffet.com/image/image_87/87_Ambazac_4.jpg","../../jctruffet.com/image/image_87/87_Ambazac_5.jpg","../../jctruffet.com/image/image_87/87_Ambazac_6.jpg"]},"Consult_chateau_formulaire584e":{"id":"Consult_chateau_formulaire584e","dept":"87","canton":"Châteauponsac","commune":"Arnac la Poste","nom":"Arnac_Poste","type":"Château","periode":"XV-XVI","histoire":"Trois châteaux à Arnac-la-Ooste  dont celui d'Arnac , d'Oreix de Lubignac de Monteil et de Montmagner.    ARNAC, bâti à Arnac-la-Poste. La Salle d'Arnac était autrefois une seigneurie, comprenait un logis dans le bourg dArnac et un moulin, tous deux appelés de la Salle. Létang au-dessus du moulin subsiste et porte encore ce nom. seigneurs : Jean Coigne, témoin à un mariage le 9 janvier 1486, Jean de Blom 1555, le 29 juillet 1577 il fait défaut au banc de la noblesse de la Basse-Marche ; Mondot de Blom, 1592 ; Pierre de Blom, 1616-1625 ; Jean de Blom, 1644 ; Françoise de Blom, mariée à Antoine de Rouffignac, doù Mondot de Rouffignac, seigneur de la Salle, époux de Gabrielle de Leffe ; sans doute leur fille, Marie, épousa Pierre de la Faire qui est seigneur en 1705-1746 le 20 mai 1746 . Louis-Charles-Alexandre de Rouffignac, seigneur de la Salle, fils de Jean-Baptiste, seigneur de Sannat, et de Marie Coustin, habitait en 1778-1790 son logis noble de la Salle à Arnac. Il avait épousé Jeanne-Françoise de Puiguion ; il émigra à la Révolution.\r\nLUBIGNAC, la Tour est l'ultime vestige d'un château féodal bâti à Arnac-la-Poste. La construction de la Tour date du XIVe et XVe siècles, fut construite sous l'ordre de Jean Barthon de Montbas (origine de Guéret).                                                                                                                                                                MONTMAGNER,  bâti à Arnac-la-poste, relais  sur la route royale Paris - Toulouse,  précédemment l'ancienne maison de Tabellion appartenait à la communauté de prêtres de Saint-Maximin de Magnac-Laval.","architecture":"SALLES, le lieu et fief de la Salle, comprend logis, moulin, étang, terres, des rentes nobles, une métairie à lAgebraux et une autre à Saint-Martial.\r\nLUBIGNAC, est l'ultime vestige d'un château féodal bâti à Arnac-la-Poste,  la construction de la Tour date du XIVe et XVe siècles. De section ronde, l'intérieur n'a plus d'étages. Elle est intéressante par son architecture. Elle se situe dans la partie sud de la commune. Malgré sa privatisation, il est possible de visiter la Tour de Lubignac.  il n'en reste guère qu'une tour ruinée et enlierrée. En outre, il ne s'agit pas d'une seigneurie de premier plan. Il s'agit de l'un de ces innombrables fiefs disséminés dans les paroisses. Celle d'Arnac en comptait une vingtaine à la veille de la Révolution, ce qui est important. Loubignac est cependant l'un des plus anciens.\r\n MONTMAGNER, la construction du relais de poste de Montmagner date du XIIe au XVIe siècle. Il se situe à proximité du croisement de l'ancienne route templière Guéret. La Rochelle et la route royale de la poste Paris - Toulouse. Une tourelle d'escalier datant du XIVe siècle a été inscrite aux M.H.le 1er juin 1973.   MONTEIL gîtes de france de Colette et Gérard","habitants":"Seigneurs locaux\r\n        \r\n        \"","divers":"Arnac  GPS : 46° 16' 39\" Nord et 1° 22' 29\" Est  grav-1.   Lubignac GPS : 46° 16' 39\" Nord, 1° 22' 29\" Est Montmagner GPS : 46° 16' 39\" Nord, 1° 22' 29\" Est  grav-2. Monteil grav 3","gps":"46° 16' 39\" Nord et 1° 22' 29\" Est  grav-1.   Lubignac GPS :","images":["../../jctruffet.com/image/image_87/87_Arnac_Poste_1.jpg","../../jctruffet.com/image/image_87/87_Arnac_Poste_2.jpg","../../jctruffet.com/image/image_87/87_Arnac_Poste_3.jpg"]},"Consult_chateau_formulaireb5db":{"id":"Consult_chateau_formulaireb5db","dept":"87","canton":"Eymoutiers","commune":"Augne","nom":"Augne_Rivière","type":"Maison forte","periode":"XIV","histoire":"Deux châteaux à Augne  celui d'Augne et la Rivière.   AUGNE, Le nom tire son origine du latin \"onia\", dérivé en \"Augno\" (occitan).La plus ancienne mention d'une cure date de 1497, les chanoines d'Eymoutiers y pourvoyaient. La petite église actuelle est pourtant beaucoup plus récente, bien qu'un fragment de vitrail date aussi du XVe siècle. L'édifice le plus ancien pourrait être légèrement antérieur.                              La RIVIERE (avant 1300, très remanié). aujourd'hui chambres d'hôtes propriété familiale de Hugues de lHermite.","architecture":"Château de la Rivière aux seigneurs des Rivières maison de famille depuis 1448, le manoir propose trois chambres d'hôtes.\r\nDeux maisons spacieuses sont également disponibles sur le domaine.","habitants":"Famille de Hugues de lHermite\r\n        \r\n        \"","divers":"Augne et la Rivière grav 1-2-3","gps":"","images":["../../jctruffet.com/image/image_87/87_Augne_Rivi%c3%a8re_1.jpg","../../jctruffet.com/image/image_87/87_Augne_Rivi%c3%a8re_2.jpg","../../jctruffet.com/image/image_87/87_Augne_Rivi%c3%a8re_3.jpg"]},"Consult_chateau_formulairec618":{"id":"Consult_chateau_formulairec618","dept":"87","canton":"Eymoutiers","commune":"Eymoutiers","nom":"Ayen_Tour","type":"Tour","periode":"XVI","histoire":"La Tour d'AYEN est une tour fortifiée bâtie à Eymoutiers. La Tour d'Ayen est devenue un gite d'hôtes. Elvira et Jean Pierre vous accueillent pour le séjour qui vous convient : une nuit en chambre d'hôtes, ou un week-end, une semaine, pour le repos, la découverte, les activités sportives.                         ROMANET est une maison bâtie à Eymoutiers, sa construction date du XVe et XVIe siècle. La maison Romanet appartient aujourd'hui à la commune d'Eymoutiers. Elle est inscrite aux M.H. le 22/12/1986.  AYEN fut une des étapes de la route dite de Richard Cur de Lion qui guerroya en France deux siècles auparavant, depuis Ségur où il reste des vestiges du passage de sa troupe, en passant par Pompadour, Juillac, Ayen et Noailles, pour finir sa vie tué au siège de Châlus en Limousin en 1199.","architecture":"La Tour d'AYEN fut construite au XVIe siècle. Ce logis de notable du XVIIIe siècle est connu pour sa tour Renaissance. Cette tourelle cylindrique est encastrée dans deux bâtiments disposés en équerre, entre lesquels elle fait la liaison. Elle est haute de 3 étages et ornée, en sa partie supérieure, d'un cordon de pierre mouluré sur lequel porte la charpente d'un toit aigu de forme pyramidale. La porte d'entrée est surmontée d'un tympan orné d'un écusson, ce tympan étant limité par deux branches de courbes se rencontrant par leur côté convexe. Un encadrement de pierre moulurée porté par deux culs de lampe souligne le haut de la porte. Aux deux premiers étages, les baies soulignées de feuillures de pierre s'encadrent de pilastres très simples. Au 3ème étage, la baie la plus petite porte un tympan triangulaire avec écusson. La feuillure d'encadrement porte sur des bases en forme de bouteilles. La tour est inscrite aux M.H. depuis le 15.01.1929.                                                           ROMANET l'ensemble du bâtiment se compose d'une partie médiévale fortifiée, englobée dans une maison d'habitation du XVIe siècle. La partie médiévale fortifiée avec porte à herse et meurtrières doit remonter au premier tiers du XVe siècle. D'après le style des ouvertures, le bâtiment juxtaposé doit remonter au début du XVIe siècle. La niche surmontant la porte sur la rue de la collégiale, date de 1575. C'est le seul élément Renaissance. Les greniers étaient à pans de bois.","habitants":"Richard Cur de Lion \r\n        \r\n        \"","divers":"Ayen-Tour grav 1-2-3 Romanet grav-4                     GPS : 45° 44' 20\" Nord, 1° 44' 40\" Est","gps":"45° 44' 20\" Nord, 1° 44' 40\" Est","images":["../../jctruffet.com/image/image_87/87_Ayen_Tour_1.jpg","../../jctruffet.com/image/image_87/87_Ayen_Tour_2.jpg","../../jctruffet.com/image/image_87/87_Ayen_Tour_3.jpg","../../jctruffet.com/image/image_87/87_Ayen_Tour_4.jpg"]},"Consult_chateau_formulairee3fe":{"id":"Consult_chateau_formulairee3fe","dept":"87","canton":"Châteauponsac","commune":"Azat le Ris","nom":"Azat_Le_Ris","type":"Château","periode":"XIV-XIX","histoire":"Deux châteaux à Ris-Chauveron celui de Chauveron et celui de Puymesnil.                                               RIS-CHAUVERON, en 1396, Jean Chauveron fait fortifier le lieu du Ris, acheté en 1385. Sa petite-fille transmet la baronnie aux Hélie de Pompadour, qui échangent lensemble à Pierre de Connigham le 26 mars 1518. Pierre de Coningham, Baron du Ris, rend hommage, en 1567,  à Marie Mauclerc, dame du Ris, épouse en 1576, en secondes noces, Antoine Lignaud, son fils, né de sa première union, Georges de Saint-Savin est qualifié de Baron du Ris-Chauveron et y demeurant le 23 janvier 1600. Elle transmet son bien, à sa mort le 5/03/1604, à son autre fils René Lignaud. Le mariage dEsther Lignaud avec François Estourneau fait passer les droits de la baronnie à cette dernière famille. Cest en 1719, que Jeanne Estourneau, épouse séparée de Pierre de Lubersac, revend le Ris-Chauveron à Marie Chauvet, épouse de Jean Vidaud, chevalier, seigneur et comte du Dognon.  En 1782, Marie Geneviève Vidaud du Dognon et son mari le marquis de Montmaut, vendent le Ris à André-Victor Collin de La Brunerie, commissaire des guerres du Poitou. Au retour de lémigration, cest sa fille Sophie de La Brunerie épouse en 1re noces Bruno de Juglar et en 2e noce, de Denis de La Combe-Bellegarde qui en hérite et qui le revend à Jean-Léonard Bessoneau des Houllières en 1817. Ce dernier laisse le Ris en dot en 1831, à sa fille, qui épousera le chevalier Louis du Garreau de Grésignac et fit restaurer le château de Ris-Chauveron, en 1842. En 1876, Adolphe Baudon de Mony, notable parisien, se rendra acquéreur du château de Ris-Chauveron et le fit reconstruire en 1882.","architecture":"PUYMESNIL, bâti à Azat-le-Ris, du XIXe siècle, pour la Famille Ducoux. De style XVIIe siècle, le château est situé au centre d'un parc et de champs. En 2013, le Château de Puymesnil appartenait à la famille du Cheyron du Pavillon.\r\nRIS-CHAUVERON,  bâti à Azat-le-Ris,  Il possède un donjon carré du XIVe siècle. La construction date du XIXe siècle, a été construit au milieu de nombreux étangs. Azat, la commune abrite la baronnie du Ris-Chauvron. Jean Chauvron fit fortifier  par une grosse tour. La seigneurie fut érigée en baronnie en 1520 par le comte de la Marche. Le château ancien fut détruit, mais la grosse tour conservée. Un château moderne a été construit en 1882. Au XIXe siècle, Azat-le-Ris se caractérise comme un terroir de grande propriété ; elle représente plus de 75 % de la surface imposable. Le mode d'exploitation principal est le métayage. Les terres appartiennent en majorité à la bourgeoisie du Dorat. Les moyens et petits propriétaires sont peu nombreux. Dans la première moitié du XIXe siècle, une verrerie.","habitants":"Ris-Adolphe Baudon de Mony,                                       Puymesnil famille du Cheyron du Pavillon.\r\n        \r\n        \"","divers":"Ris-Chauveron GPS : 46° 18' 6\" Nord, 1° 01' 35,03\" Est    Grav-1 à 5. Puymesnil-grav 6-7","gps":"46° 18' 6\" Nord, 1° 01' 35,03\" Est    Grav-1 à 5. Puymesnil-","images":["../../jctruffet.com/image/image_87/87_Azat_le_Ris_1.jpg","../../jctruffet.com/image/image_87/87_Azat_le_Ris_2.jpg","../../jctruffet.com/image/image_87/87_Azat_le_Ris_3.jpg","../../jctruffet.com/image/image_87/87_Azat_le_Ris_4.jpg","../../jctruffet.com/image/image_87/87_Azat_le_Ris_5.jpg","../../jctruffet.com/image/image_87/87_Azat_le_Ris_6.jpg","../../jctruffet.com/image/image_87/87_Azat_le_Ris_7.jpg"]},"Consult_chateau_formulaire5cb2":{"id":"Consult_chateau_formulaire5cb2","dept":"87","canton":"Bellac","commune":"Saint-Bonnet de Bellac","nom":"Bagnac_Bellac","type":"Vestige-Forteresse","periode":"XVII-XIX","histoire":"Chateau de Bagnac et de  Barton de Montpas à 12 Km au nord ouest de Bellac. Montagrier(voir article)     BARTHON de MONTBAS, bâti à Bellac,  La construction du Château des Barthons de Montbas date du XVIIe siècle. L'Hôtel de ville de Bellac est un ancien castel des Barthon de Montbas, construit au XVIIe siècle.  BAGNAC, bâti  en 1858 à Saint Bonet-de-Bellac,  date du 3e quart du XIXe siècle, bâti pour le Marquis (Antony 1826-1892) et la marquise de Saint-Martin de Bagnac  sur l'emplacement de l'ancien château du XVe siècle, détruit pendant les guerres de religion. Pierre de Bagnac naquit dans ce chateau en 1330, et devint Grand Cardinal, célébré à Rome).  Au départ, le marquis et la marquise n'avaient que l'intention de le restaurer. Les époux sachant qu'ils n'auraient pas d'enfants, avaient décidé de léguer leur château au « Comte de Chambord », prétendant au trône de France. Celui-ci étant mort, le château de Bagnac échut au Baron Guy de Salvaing de Boissieu. En 1911, un commandant Laugaudin le mentionna comme résidence dans un almanach de l'époque. Il était en réalité le locataire du Baron de Boissieu, héritier du château après la mort de la marquise Elise de Préaulx de Bagnac, en 1902. Le paysagiste du jardin du château de Bagnac était le comte de Choulot qui réalisa, dans la région, les jardins de M. Leplay au château du Vigen. Son propriétaire actuel est Mr Salvaing de Boissieu.","architecture":"BAGNAC est de style néo-gothique, la seule partie du château qui date du XIVe siècle est la grosse tour d'angle, coiffée d'une toiture à très forte pente, lors de la reconstruction du château. Le château fut reconstruit entièrement pour réaffirmer une identité, la présence d'un passé glorieux mis à mal par le passage de la Révolution. Après 1875, ce qui devait n'être qu'une restauration se transforma en une véritable reconstruction. Le chantier dura plus de 25 ans et les Bagnac engloutirent toute leur fortune dans ce projet. Les travaux du château commencèrent en 1858. Ils furent interrompus durant la guerre de 1870, et  le reprirent en 1875. Tous les plans, dessins de boiseries, ferronneries, sculptures sur pierre furent réalisés, pour le marquis et la marquise en personne, sur des plans inspirés de Viollet-le-duc mais non dessinés personnellement par l'architecte. Le jardin de Bagnac a disparu depuis. La chapelle est une reproduction de la Sainte-Chapelle de Paris.         BARTHON de MONTBAS, deux corps de logis en équerre sur soubassement à deux niveaux avec lucarnes sur combles, échauguettes en angles extérieurs sur encorbellement toit recouvert de tuiles.","habitants":"Framille de Pierre de Bagnac                                          Baron Guy de Salvaing de Boissieu\r\n        \r\n        \"","divers":"Bagnac GPS : 46° 09' 07\" Nord, 0° 58' 13\" Est grav 1-à-6.  tour de Génébrias grav 7,    Bellac  GPS : 46° 07' 23' Nord et 1° 03' 01\" Est  Barthon grav-8.  Ledorat grav 9.","gps":"46° 09' 07\" Nord, 0° 58' 13\" Est grav 1-à-6.  tour de Génébr","images":["../../jctruffet.com/image/image_87/87_Bagnac_Bellac_1.jpg","../../jctruffet.com/image/image_87/87_Bagnac_Bellac_2.jpg","../../jctruffet.com/image/image_87/87_Bagnac_Bellac_3.jpg","../../jctruffet.com/image/image_87/87_Bagnac_Bellac_4.jpg","../../jctruffet.com/image/image_87/87_Bagnac_Bellac_5.jpg","../../jctruffet.com/image/image_87/87_Bagnac_Bellac_6.jpg","../../jctruffet.com/image/image_87/87_Bagnac_Bellac_7.jpg","../../jctruffet.com/image/image_87/87_Bagnac_Bellac_8.jpg","../../jctruffet.com/image/image_87/87_Bagnac_Bellac_9.jpg"]},"Consult_chateau_formulaire6790":{"id":"Consult_chateau_formulaire6790","dept":"87","canton":"Rochechouart","commune":"Marval","nom":"Ballerand","type":"Château","periode":"XVIII","histoire":"BALLERAND, la première inscription écrite date du 15 mars 1498 . A cette époque le domaine appartient à Alain d´Albert, comte de Périgord et Vicomte de Limoges ainsi qu'à son fils Jean, roi de Navarre. Le 23 mars 1498 le Parlement de Bordeaux a rendu un avis sur une querelle concernant la forêt de Ballerand entre le vicomte de Limoges et le vicomte de Rochechouart. Le 15 mai 1499 le vicomte de Rochechouart fait appel auprès du roi de France, Louis XII, afin de lui remettre le domaine de Ballerand. Le 16 février 1602, Mme Francoise de la Roussye, veuve de Guillaume Pécon, a acheté le domaine. Au XVIIIe siècle la forge atteint son apogée puisqu'il coule deux canons de style Essen pour Henry IV, roi de Navarre. En parallèle elle produit des armes, des plaques de cheminée ainsi que des clous.\r\n  En 1848 après un procès entre la propriétaire de l´époque Anne Marie Pilte-Javerzac et ses bailleurs, les frères Mercier, la décision est prise de vider le grand étang de Ballerand de plus de 20 hectares et de l'utilser comme champs. En 1953    l'étang de Ballerand est remis en eau par Guy Judet de la Combe dans un but touristique et économique. En 1989 Casteltour avec Mr et Mme Echsle rachète le Domaine de Ballerand et souhaite mettre en place un projet touristique.","architecture":"BALLERAND,  la première citation du château date du  XVIe siecle. Comme la chapelle  possède des fenêtres de style romane et  d´autres éléments plus anciens, il y a eu un concensus sur le  XVIe siècle. A cette époque ce bâtiment était utilisé comme logement de chasse.   MARVAL, du XVIe siècle, édifice de plan en U à deux niveaux, toit en croupe recouvert de tuile flanqué de pavillon saillant carré aux extrémités.","habitants":"Anne Marie Pilte-Javerzac\r\n        \r\n        \"","divers":"Ballerand grav 1 à 4                                                      Marval grav 5-6","gps":"","images":["../../jctruffet.com/image/image_87/87_Ballerand_1.jpg","../../jctruffet.com/image/image_87/87_Ballerand_2.jpg","../../jctruffet.com/image/image_87/87_Ballerand_3.jpg","../../jctruffet.com/image/image_87/87_Ballerand_4.jpg","../../jctruffet.com/image/image_87/87_Ballerand_5.jpg","../../jctruffet.com/image/image_87/87_Ballerand_6.jpg"]},"Consult_chateau_formulairecc3d":{"id":"Consult_chateau_formulairecc3d","dept":"87","canton":"Eymoutiers","commune":"Beaumont-du-Lac","nom":"Beaumont_Lac","type":"Forteresse","periode":"XVII","histoire":"BEAUMONT du LAC,  est un château bâti à Beaumont-du-Lac. La paroisse semble avoir été créée peu avant l'an 1100, sous le vocable de saint Pierre. Ses terres avaient pour seigneur l'évêque de Limoges, comme Eymoutiers, dont le chapitre nommait les curés. Toutefois, la paroisse était dispensée du logement de l'évêque lors de ses tournées pastorales. La seigneurie de Beaumont était divisée en une quinzaine de ténements,  les principaux villages et leurs environs, qui payaient la dîme au curé et les différentes redevances seigneuriales. Le suzerain de ces terres était le comte de Poitiers, et la province La Marche. Beaumont relevait pour la justice de la sénéchaussée de Montmorillon, pour l'administration de l'élection de Bourganeuf, et relevait également de la baronnie de Peyrat.   Les plus anciens cahiers tenus par le curé remontent à 1649. On y relève ainsi, au XVIIe siècle que dans la paroisse vivaient des notables remarquables : un maître apothicaire, un chirurgien, un notaire et un huissier; ces diverses charges furent pendant deux siècles monopolisées par deux familles : les Dorliat et les comte (des Ternes).","architecture":"BEAUMONT  bâti sur l'Ile de Vassivière, un château dans un superbe style gothique.  Grosse bâtisse de plan rectangulaire à deux niveaux avec sérire de lucarnes en comble flanqué en façade de deux tours carrées saillantes dont une encastré dans un pavillon transversal de trois niveaux, à l'opposé un donjon  de deux niveaux crénelés sur mâchicoulis ainsi qu'une tourelle ronde sur la face arrière plein cintre. Avec la Révolution furent créées les communes, le premier maire de Beaumont ayant été Léonard Varliette, en 1793 (nommé). Au XIXe siècle, on trouve trois maires appartenant à la famille Benassy (1832, 1854, 1890). Le premier magistrat ne fut élu qu'à partir de 1881.","habitants":"Famille de Dorliat\r\n        \r\n        \"","divers":"Beaumont du Lac  GPS : 45° 48' 2,06\" Nord, 1° 51' 53,19\" Est.  Grav 1-6, grav-7ruines de ternes","gps":"45° 48' 2,06\" Nord, 1° 51' 53,19\" Est.  Grav 1-6, grav-7ruin","images":["../../jctruffet.com/image/image_87/87_Beaumont_Lac_1.jpg","../../jctruffet.com/image/image_87/87_Beaumont_Lac_2.jpg","../../jctruffet.com/image/image_87/87_Beaumont_Lac_3.jpg","../../jctruffet.com/image/image_87/87_Beaumont_Lac_4.jpg","../../jctruffet.com/image/image_87/87_Beaumont_Lac_5.jpg","../../jctruffet.com/image/image_87/87_Beaumont_Lac_6.jpg","../../jctruffet.com/image/image_87/87_Beaumont_Lac_7.jpg"]},"Consult_chateau_formulaire5fe5":{"id":"Consult_chateau_formulaire5fe5","dept":"87","canton":"Limoges","commune":"Limoges","nom":"Beauvais_Limoges","type":"Château","periode":"XVIII-XIX","histoire":"BEAUVAIS, est un château bâti dans le quartier de Landouge, à Limoges. C'est une ancienne demeure, des abbés de labbaye Saint-Martial de Limoges, construite au XVIIIe siècle selon les plans de larchitecte limousin Joseph Brousseau. Accolée à une exploitation agricole, de même époque, elle est entourée d'un parc à l'anglaise de 3 ha. Le château de Beauvais date du XIXe siècle.Il appartient aujourd'hui à la famille Moineville. Le château de Beauvais est privé.","architecture":"BEAUVAIS est un château bâti à Limoges, construit entre 1765 et 1768, le bâtiment est le troisième château successif à cet emplacement, prenant la place d'une bâtisse du XVe siècle dont il ne reste qu'une cheminée et quelques tronçons de douve, elle-même bâtie à la place d'un premier château remontant au XIe siècle. D'inspiration classique, la sobre façade aurait servi de modèle et de brouillon à Joseph Brousseau pour la réalisation du palais de l'évêché de Limoges. Le château de Beauvais est classé au titre des M.H.depuis 1990. La propriété comprend également des dépendances dont une chapelle et des granges, des serres ainsi qu'un parc arboré.","habitants":"Famille Moineville\r\n        \r\n        \"","divers":"Beauvais grav 1-2     GPS : 45° 51' 24\" Nord et 1° 11' 23\" Est","gps":"45° 51' 24\" Nord et 1° 11' 23\" Est","images":["../../jctruffet.com/image/image_87/87_Beauvais_Limoges_1.jpg","../../jctruffet.com/image/image_87/87_Beauvais_Limoges_2.jpg"]},"Consult_chateau_formulaireccb4":{"id":"Consult_chateau_formulaireccb4","dept":"87","canton":"Ambazac","commune":"Bessines sur Gartempe","nom":"Bessines_Gartempe","type":"Vestiges-Château","periode":"XII-XV-XIX","histoire":"A Bessines sur Gartempe le château de Constant, de  Périchon, des Monismes   ruines du XIIIe siècle, Fromental et le   Manoir Henri IV.                     MANOIR HENRI IV, cet établissement cossu du XVIe siècle a reçu jadis un convive prestigieux: le bon roi Henri IV qui chassait dans la région en compagnie de son ami Sornin De La Plagne, alors propriétaire des lieux, établissement cossu du XVIe siècle a reçu jadis un convive prestigieux: le bon roi Henri IV. Outre un cadre historique planté dans un écrin de verdure, l'endroit recèle des trésors en matière de patrimoine. Fier de son passé le Manoir Henri IV est aujourd'hui un hôtel.                                                                                CONSTANT,  Mario Constant était un peintre amateur. Il fit construire la Villa de la Butte de 1917 à 1925 avec des pierres prises et taillées sur place.  Son architecture asymétrique peu banale à tout de suite séduit Ana Marie et Gérard Van Hooft qui, en 2005 et après de gros travaux, y ont ouvert de belles chambres d'hôtes.                                                          FROMENTAL, le château date du XVIIe siècle, classement par arrêté du 8 juin 1925. Pas d'information historique.                                                  PERICHON, Jean-André Périchon, ingénieur des Arts et Métiers et directeur dune sucrerie pendant 22 ans en Egypte, sera qualifié de \" Bey \" par le Khédive     MONISMES, la famille de Razés occupa le domaine dès le XIIIe siècle et bâtit le château au milieu du XVe siècle. Après avoir connu divers propriétaires, il fut restauré en 1736 et doté dune chapelle en 1739. La terre et le château furent vendus à la Révolution. En 1860, les terres furent revendues au détail et le château démoli. Les ruines du château sont inscrites au titre des M.H.  le 17 janvier 1992.","architecture":"PERICHON Jean-André Périchon, en 1905, il fit construire un manoir de style Renaissance, couverture en ardoises, tourelle au toit en poivrière sur la face sud-ouest surmontée dune girouette sommée dun croissant de lune oriental. Côté route, une véranda de style égypto-turc dénommée \" salon mauresque \" avec meubles et bibelots ramenés dEgypte. Sa collection dobjets de la civilisation égyptienne est au musée des Beaux-Arts à Limoges                                          CONSTANT, son architecture asymétrique peu banale en 2005 et après de gros travaux, y ont ouvert de belles chambres d'hôtes.                                       MONISMES, vestiges du  château date des XIIe et XVe siècles. Au début du XIVe siècle, il comportait un corps de bâtiment central flanqué de deux tours circulaires, entouré de fossés de plan rectangulaire. Dans le fond des douves ont été trouvées des sculptures gothiques représentant des faces humaines et des animaux. Actuellement, il reste les vestiges dune tour et les douves. Ce lieu nest pas ouvert aux visiteurs, mais les ruines se situent en bord de route.\r\nFROMENTAL, le château date du XVIIe siècle, château-classé y compris les communs, les douves et le jardin à la française  La source qui alimente le château ainsi que la conduite de cette source depuis son origine jusqu'à l'arrivée du château :classement par arrêté du 29 août 1938.","habitants":"Manoir   Sornin De La Plagne                              Famille de Mario Constant                                           Monismes Famille de Razés                                     Famille de Jean-André Périchon\r\n        \r\n        \"","divers":"A Bessines sur Gartempe, les vestiges de monismes grav-1, de Constant grav-2, de Fromental grav 3-4-5, manoir Henri IV grav-6-7, Perrichon grav 8-9","gps":"","images":["../../jctruffet.com/image/image_87/87_Bessines_Gartempe_1.jpg","../../jctruffet.com/image/image_87/87_Bessines_Gartempe_2.jpg","../../jctruffet.com/image/image_87/87_Bessines_Gartempe_3.jpg","../../jctruffet.com/image/image_87/87_Bessines_Gartempe_4.jpg","../../jctruffet.com/image/image_87/87_Bessines_Gartempe_5.jpg","../../jctruffet.com/image/image_87/87_Bessines_Gartempe_6.jpg","../../jctruffet.com/image/image_87/87_Bessines_Gartempe_7.jpg","../../jctruffet.com/image/image_87/87_Bessines_Gartempe_8.jpg","../../jctruffet.com/image/image_87/87_Bessines_Gartempe_9.jpg"]},"Consult_chateau_formulaire30fe":{"id":"Consult_chateau_formulaire30fe","dept":"87","canton":"Bellac","commune":"Blond","nom":"Blond","type":"Château","periode":"XVI-XVIII","histoire":"A Blond    Il existe 5 autres châteaux dans ce village : château de la Ronze, de Maillofray, de Beireix, de Drouilles, de la Barbe.                                            DROUILLES, un seigneur Gilles de Drouilles est cité au XIIe siècle à Blond. Ayant appartenu à la famille Lavaud au XVIe siècle, le château passa à la famille Jovion lors du mariage le 2 novembre 1591 de Madeleine de Lavaud de Drouilles avec Jean de Jovion, archer dans la compagnie de Mortemart. Il passa ensuite au Chérade de Montbron lors du mariage en 1769 de Jeanne de Jovion de La Chassagne avec Pierre-Adrien-Étienne Chérade de Montbron, chevalier de Montbron, écuyer. L'extinction de cette branche de la famille Chérade de Montbron explique, sans doute, son passage à la famille Babaud de Monvallier au début du XIXe siècle, qui le garda jusqu'en 1980.      Pierre-Adrien-Etienne Chérade de Montbron, chevalier de Montbron, écuyer, seigneur de la Drouille. Il fut appelé dans son enfance Mr de La Rochechandry. Il naquit en 1737, et fut lieutenant du régiment de Rouergue en 1755. Il mourut en 1804 en son château de Drouille, qu'il possédait par son mariage, contracté en 1769, avec Jeanne de Jovion de La Chassagne, fille de N., et de Charlotte de Roffignac. Le 16 mars 1789, Pierre Chérade de Montbron comparut pour lui et comme mandataire de Suzanne Joubert de La Bastide de Châteaumorand, à la réunion de la noblesse de la Basse-Marche, pour la nomination des députés aux Etats Généraux. Il n'eut qu'un fils.       \r\nMACROBER, bâti à Blond, ainsi que d'autres châteaux mentionnés dont je n'ai pas d'information historique.","architecture":"DROUILLES, château de Drouilles  de plan en longueur à deux niveaux sur soubassements et lucarnes en combles entre deux tours rondes toits en poivrière, de sept travées dont trois sur pavillons saillants central avec fronton triangulaire sur le toit, l'édifice est prolongé sur l'arrièe et sur flan gauche de bâtiments à deux niveaux, l'ensemble recouvert d' ardoises.\r\nBEIREX, de plan rectangulaire  à deux niveaux sur soubassement  pavillon centrale légèrement saillants en façade sur trois travées avec fronton triangulaire sur le toits avec une lucarne de chaque côté.  MAILLOFFRAY, édifice de plan rectangulaire à deux niveaux avec série de lucarnes en combles sur toit brisé et sur chaque travées, de plus cet édifice possède une tour carrée à toit impérial, pas d'informations historiques et gravures pour le château de Ronze et de la Barbe.","habitants":"Drouilles  famille Babaud de Monvallier\r\n        \r\n        \"","divers":"A Blond château de de Beireix grav-1, de Drouilles grav 2-3-4-5. de Malloffray grav 6-7 et hôtel à blond grav 8 GPS : 46° 2' 36,99\" Nord, 1° 1' 21,87\" Est","gps":"46° 2' 36,99\" Nord, 1° 1' 21,87\" Est","images":["../../jctruffet.com/image/image_87/87_Blond_1.jpg","../../jctruffet.com/image/image_87/87_Blond_2.jpg","../../jctruffet.com/image/image_87/87_Blond_3.jpg","../../jctruffet.com/image/image_87/87_Blond_4.jpg","../../jctruffet.com/image/image_87/87_Blond_5.jpg","../../jctruffet.com/image/image_87/87_Blond_6.jpg","../../jctruffet.com/image/image_87/87_Blond_7.jpg","../../jctruffet.com/image/image_87/87_Blond_8.jpg"]},"Consult_chateau_formulairec486":{"id":"Consult_chateau_formulairec486","dept":"87","canton":"Condat sur Vienne","commune":"Boisseuil","nom":"Boisseuil","type":"Château","periode":"XVII","histoire":"à Boisseuil,  Il existe 4 châteaux dans le bourg : le château de la Garenne, le château de Beauregard, Le château de Crouzy  où s'arrêta Louis XI avec Charles de France (1446-1472) en 1463, Faugeras (voir article).                                                                    BOISSEUIL  Jusqu'au XVIe siècle, les seigneurs de Chalusset exercent sur Boisseuil une autorité abusive et brutale, la paroisse était divisée en plusieurs fiefs nobles. Les familles de Verthamon, Dumont-Saint Priest, Martin du Puytison ont en commun d'avoir posséder le château du Crouzy, récemment démoli, où Louis XI déjeuna le 1er juillet 1463, avec Charles de France (1446-1472), lors de son retour de Catalogne. le Pape Pie VII qui s'arrêta en 1813 pour se reposer et bénir les habitants. Don Ferdinand d'Espagne Ferdinand le Catholique aurait également fait escale à Boisseuil.                                                                        GARENNE, bâti à Boisseuil, le château de Crouzy, où s'arrêta Louis XI avec Charles de France (1446-1472) en 1463. Les familles de Verthamon, Dumont-Saint Priest, Martin du Puytison ont en commun d'avoir posséder le château du Crouzy, récemment démoli, où Louis XI déjeuna le 1er juillet 1463, avec Charles de France (1446-1472), lors de son retour de Catalogne. le Pape Pie VII qui s'arrêta en 1813 pour se reposer et bénir les habitants. Don Ferdinand d'Espagne Ferdinand le Catholique aurait également fait escale à Boisseuil.                                                                          BEAUREGARD, en 1770, le château était habité par le marquis de Lentilhac.  En 1789, il appartenait à V.B. Grellet, député aux états Généraux puis au baron de Baillet. Aux XIXe siècle et XXe siècle, le château de Beauregard possédait un équipage de chasse à courre. \r\nEn 1917, le baron de Baillet, propriétaire du château, était le seul habitant de la commune à être abonné au téléphone.","architecture":"GARENNE, chambres d'hôtes,  corps de logis central  à deux niveaux et lucarnes, de trois travées  avec  avant corps sur colonnes doriques, flanqués de part et autre de pavillons saillants.                               BEAUREGARD, corps de logis à deux  niveaux avec série de lucarnes sur combles, en façade porche d'entrée  fronton triangulaire supporté par deux colonnes.                                                                         CROUZY, chambres d'hôtes.","habitants":"Familles de Verthamon\r\n        \r\n        \"","divers":"Boisseuil GPS : 45° 46' 15\" Nord et 1° 19' 56\" Est    Garenne grav-1  GPS : 45° 46' 15\" Nord, 1° 19' 56\" Est. Faugeras grav-2.  Beauregard grav- 3","gps":"45° 46' 15\" Nord et 1° 19' 56\" Est    Garenne grav-1  GPS :","images":["../../jctruffet.com/image/image_87/87_Boisseuil_1.jpg","../../jctruffet.com/image/image_87/87_Boisseuil_2.jpg","../../jctruffet.com/image/image_87/87_Boisseuil_3.jpg"]},"Consult_chateau_formulaire1dee":{"id":"Consult_chateau_formulaire1dee","dept":"87","canton":"Ambazac","commune":"Bonnac la Cote","nom":"Bonnac_Cote","type":"Château","periode":"XV-XIX","histoire":"A Bonnac la Côte, château  de Leychoisier. Le château de Saint-Antoine, Le château de Montagrier du XIXe siècle, pas d'information pour ce dernier.\r\nSAINT-ANTOINE, ils rendirent immédiatement son nom d'origine au château, il était connu auparavant sous le nom de château de Maison Rouge. Selon la légende, Saint-Antoine de Padoue, de passage à Bonnac la Côte, y aurait fondé un  monastère de Saint-Antoine, aujourd'hui disparu et sur lequel fut construit le château, il servait, entre autres, de lieu d'étape sur la route de Saint-Jacques de Compostelle. En 1929, un jeune couple reçut cette propriété en cadeau de mariage; ce sont leurs héritiers qui ont vendu la propriété à monsieur et madame Raimbault en 1996.  A côté du château, se trouve une maison appelée \"la maison du Pape\" (ancien relais de poste) le pape Pie VII  ayant dormi lors de son retour de captivité après sa libération par Napoléon.                             LEYCHOISIER, bâti à Bonnac la Côte, les sites des campings Castels s'inscrivent dans des paysages magnifiques. Ils sont aussi l'expression d'un patrimoine préservé ; des domaines historiques où s'épanouissent des arbres centenaires, où l'eau coule paisiblement, où le mot pittoresque prend tout son sens. Il retint Victor Hugo qui y trouva linspiration pour lune de ses odes.","architecture":"SAINT-ANTOINE, construit en 1720, est typique de ce type de construction du XVIIIe siècle garnies de gros parquets en chêne et dont la façade accueille, de part et d'autre d'une porte centrale, une ou deux fenêtres disposées de façon symétrique,  la portée des pièces est toujours sensiblement la même car elle correspond à la taille moyenne d'un chêne. La maison centrale de base est construite en granit avec de très belles pierres destinées à ne pas être crépies ; l'intérieur est recouvert de torchis. Il possède de belles caves voûtées. Par contre, la construction de 1900 étant destinée à être crépie, les murs sont faits avec de la pierre tout venant. La partie centrale du château date de 1720 c'était la maison d'un important métayer ; il était à l'époque entouré d'environ 500 hectares de terres sur lesquels se trouvaient 5 ou 6 fermes. On y cultivait du houblon pour faire de la bière. En 1900, le bâtiment central a été flanqué de la tour ronde et de la tour carrée. \r\nLEYCHOISIER, cette Forteresse millénaire se situe sur la route de Limoges, sa construction date du IXe siècle.  est aussi entouré d'étangs, d'une cascade et du Moulin de Leychoisier a depuis longtemps, oublié les combats moyenâgeux. Le corps de logis  de plan  rectangulaire à trois niveaux et lucarnes sur comble, englobé entre quatre tours rondes à quatre niveaux  aux angles  toits en poivrière.","habitants":"Famille de Raimbault\r\n        \r\n        \"","divers":"A Bonnac St-Antoine  GPS : 45° 56' 32\" Nord 1° 17' 08\" Est.    grav-1-2.  Leychoissier  grav-3-4-5","gps":"45° 56' 32\" Nord 1° 17' 08\" Est.    grav-1-2.  Leychoissier","images":["../../jctruffet.com/image/image_87/87_Bonnac_Cote_1.jpg","../../jctruffet.com/image/image_87/87_Bonnac_Cote_2.jpg","../../jctruffet.com/image/image_87/87_Bonnac_Cote_3.jpg","../../jctruffet.com/image/image_87/87_Bonnac_Cote_4.jpg","../../jctruffet.com/image/image_87/87_Bonnac_Cote_5.jpg"]},"Consult_chateau_formulaireb8f7":{"id":"Consult_chateau_formulaireb8f7","dept":"87","canton":"St-Léonard de noblat","commune":"St-Priest-Taurion-Rilhac Rancon","nom":"Bort","type":"Château","periode":"XV-XIX","histoire":"BORT : les descendants de Pierre-Edmond Teisserenc de Bort et de Raymond de Sèze qui le détiennent. Le domaine forestier s'étend sur 750 ha et comporte les premiers douglas introduits en France. La seigneurie de Bort est connue depuis le XVe siècle. Au milieu du XVIe siècle est mentionné un repaire noble. Pierre Edmond Teisserenc de Bort avait installé une école mixte dans sa propriété située en bordure nord de la grande allée qui mène au château. Le parc paysager est typique du XIXe siècle. Cinq petites maisons de garde s'élèvent aux différentes entrées du domaine.","architecture":"BORT : au XIXe siècle, le château subit un grand chantier de restauration dans le style néo-gothique et pour son activité agricole. Le vieux château est augmenté de nouvelles constructions: tours rondes et pavillon octogonal aux extrémités des ailes du logis ; tour polygonale, couronnement du pavillon carré situé à l'angle nord-est des deux ailes tours polygonales flanquant la façade nord encadrant un pavillon quadrangulaire et une haute tourelle d'escalier à l'extrémité ouest de cette façade, le tout relié par une sorte de galerie couverte en terrasse; deux tours polygonales sur la façade sud; une galerie d'arcades sur la façade ouest, surmontée d'un avant-corps flanqué de deux tourelles. La chapelle est modifiée, l'édifice actuel résulte de  l'amputation, en 1959, de ces ajouts du XIXe siècle. Il est composé de deux ailes en équerre construites en granit. Deux tours circulaires, couronnée sde mâchicoulis, flanquent les angles de chaque aile sur la cour. Une galerie animée d'arcades s'élève sur un niveau, en avant de la façade ouest. La façade Est est rythmée par un pavillon octogonal occupant l'angle sud-est. Les dépendances, conçues comme une ferme modèle, sont situées au nord-ouest du logis.","habitants":"Famille de Raymond de Sèze et de Pierre Edmond Teisserenc de Bort \r\n        \r\n        \r\n        \"","divers":"Château de Bort","gps":"","images":["../../jctruffet.com/image/image_87/87_Bort_1.jpg","../../jctruffet.com/image/image_87/87_Bort_2.jpg","../../jctruffet.com/image/image_87/87_Bort_3.jpg","../../jctruffet.com/image/image_87/87_Bort_4.jpg","../../jctruffet.com/image/image_87/87_Bort_5.jpg","../../jctruffet.com/image/image_87/87_Bort_6.jpg","../../jctruffet.com/image/image_87/87_Bort_7.jpg"]},"Consult_chateau_formulaire8240":{"id":"Consult_chateau_formulaire8240","dept":"87","canton":"Aixe sur Vienne","commune":"Bosmie l","nom":"Boucheron","type":"Château","periode":"XIX","histoire":"BOUCHERON, date du XIXe siècle. La mairie de Bosmie-l'Aiguille s'y est installée en 1980. construit au XIXe siècle par lingénieur Paul-Valentin Amilhau, maire de la commune de 1896 à 1908 dont on peut voir les initiales en marqueterie dans un des bureaux actuels. Le château est situé dans un parc paysager restauré. Récemment, la municipalité a entrepris d'importants travaux de réhabilitation de la façade extérieure et de la partie intérieure utilisée par les services municipaux. De l'intérieur, seules les parties ouvertes au public sont visibles durant les horaires d'ouverture de la Mairie, le château est agrandi en 1876, les lambris et les peintures sont exécutés par des artistes italiens, le projet d'exécution des lambris date de 1874 et porte des annotations italiennes. Remploi de fresques italiennes du XVIIIe siècle, remontées dans les plafonds des pièces de réception.","architecture":"BOUCHERON, château constitué d'un corps principal de cinq travées, d'un pavillon latéral, côté Est, et de deux tours demi hors oeuvre, l'une polygonale, côté nord, et l'autre carrée, flanquée contre le mur latéral ouest du corps principal. Accès à ce corps principal par un escalier droit en pierre abrité par une marquise, côté façade antérieure, et par deux escaliers symétriques, à degré convexes, côté façade postérieure. Au rez-de-chaussée, hall au plafond orné de peinture à l'huile à décor floral, dessert les anciennes pièces de réception (salle à manger, grand salon, petit salon ovale, bureau,salle de billard), est situé dans un parc paysager restauré. Les extérieurs  sont visibles depuis le parc. Récemment, la municipalité a entrepris d'importants travaux de réhabilitation de la façade extérieure et de la partie intérieure utilisée par les services municipaux. On peut y voir des plafonds peints, toilés, ou sculptés, ainsi que le parc du Boucheron.","habitants":"ingénieur Paul-Valentin Amilhau\r\n        \r\n        \"","divers":"Boucheron GPS : 45° 46' 8,7\" Nord et 1° 12' 57,78\" Est","gps":"45° 46' 8,7\" Nord et 1° 12' 57,78\" Est","images":["../../jctruffet.com/image/image_87/87_Boucheron_1.jpg","../../jctruffet.com/image/image_87/87_Boucheron_2.jpg","../../jctruffet.com/image/image_87/87_Boucheron_3.jpg","../../jctruffet.com/image/image_87/87_Boucheron_4.jpg"]},"Consult_chateau_formulaire22fc":{"id":"Consult_chateau_formulaire22fc","dept":"87","canton":"Eymoutiers","commune":"Bujaleuf","nom":"Bujaleuf","type":"Château","periode":"XIV","histoire":"deux châteaux à Bujaleuf celui de Bujaleuf et de Chalard.                                                                   BUJALEUF, pas d'informaton historique.                  CHALARD,  en 1195  dépendait du monastère de Saint-Léonard. Le château   date du XIVe siècle avec de nombreux remaniements au XIXe siècle.","architecture":"BUJALEUF, corps de logis central à deux niveaux et lucarnes sur comble inséré entre deux pavillons rectangulaires toit en croupe.                                  CHALARD, date du XIVe siècle avec de nombreux remaniements au XIXe siècle: est constitué d'un corps de logis, agrandi vers l'ouest d'une partie formant son avant-corps. Sa façade postérieure est encadrée de deux tours circulaires, prolongement du bâtiment du côté sud, construction d'une terrasse au nord-ouest, ainsi que d'un avant-corps au sud-est, formant terrasse au premier étage, reconstruction de la tour nord sur l'ancien emplacement ; ne  subsiste de l'enceinte du XVe siècle qu'une tour à l'est. édifice d'un étage carré avec escalier demi-hors-oeuvre à  vis, le gros-oeuvre en granite ; moellon ; enduit. Couverture : toit à longs pans ; toit conique  en tuile plate et tuile mécanique et  terrasse.","habitants":"seigneurs locaux\r\n        \r\n        \"","divers":"Bugaleuf grav 1-2                                                       Chalard grav-3-4","gps":"","images":["../../jctruffet.com/image/image_87/87_Bujaleuf_1.jpg","../../jctruffet.com/image/image_87/87_Bujaleuf_2.jpg","../../jctruffet.com/image/image_87/87_Bujaleuf_3.jpg","../../jctruffet.com/image/image_87/87_Bujaleuf_4.jpg"]},"Consult_chateau_formulairedda7":{"id":"Consult_chateau_formulairedda7","dept":"87","canton":"Saint-Yrieix la Perche","commune":"Bussière-Galant","nom":"Bussières_Boffy","type":"Château-fort","periode":"XII-XVII","histoire":"quatre châteaux à  Bussièrre Boffy; celui de Joncherolles, de Lachenaud, pas d'info pour Joncherolles.                                                         LACHENAUD, demeure du vicomte Hugues Duroy de Chaumareys (1763-1841), officier de la marine française, a qui fut confié en 1815 le commandement de la frégate \"La Méduse\". Il dut diriger l'expédition chargée de reprendre possession du Sénégal et sera jugé seul responsable du naufrage de l'un des fleurons de la flotte en sa qualité de commandant, Chaumareys. Au soir du 2 juillet 1816, le navire s'ensable au large de la Mauritanie et fait 142 victimes. En sa qualité de commandant, Chaumareys fit trois ans de prison mais nobtint jamais à l'issue de sa condamnation demploi ni même la moindre marque de sympathie de Louis XVIII quil avait pourtant servi avec dévotion. La célèbre uvre de Géricault reproduit le drame.","architecture":"BUSSIERES BOFFY, village de caractère avec maisons bourgeoises des XVe-XVIIIe siècle, en effet, \"l'étrange M. Yoo\" a eu des activités importantes en France ces dernières années, à été en 2012 l'acheteur du village fantôme de Courbefy, situé sur la commune de Bussière-Galant. M. Yoo avait alors acquis ce hameau abandonné dans des conditions avantageuses. Les médias du monde entier en avaient fait l'écho. \r\nLACHENAUD, sur la façade d'entrée un étroit corps central surmonté d'un fronton  triangulaire avec deux  larges rangs de bosages, marque le goût pour le retour de l'antique, l'escalier qui donne accés est en fer à cheval et bordé de belles ferronneries, de part et d'autre du bâtiment principal deux pavillons carrés coiffés de toits pyramidaux en ardoises. On retrouve la même symétrie dans la façade ouvrant sur le parc au ligne adoucie par la rotonde centrale.","habitants":"Seigneurs locaux\r\n        \r\n        \r\n        \"","divers":"A Bussièrre-Boffy GPS : 45° 37' 41\" Nord et 1° 02' 16\" Est  grav-1-2.        Joncherolles grav-4.           Lachenaud 46°2'49\"N   0°51'19\"E.  grav 5-6","gps":"45° 37' 41\" Nord et 1° 02' 16\" Est  grav-1-2.        Joncher","images":["../../jctruffet.com/image/image_87/87_Bussi%c3%a8res_Boffy_1.jpg","../../jctruffet.com/image/image_87/87_Bussi%c3%a8res_Boffy_2.jpg","../../jctruffet.com/image/image_87/87_Bussi%c3%a8res_Boffy_3.jpg","../../jctruffet.com/image/image_87/87_Bussi%c3%a8res_Boffy_4.jpg","../../jctruffet.com/image/image_87/87_Bussi%c3%a8res_Boffy_5.jpg","../../jctruffet.com/image/image_87/87_Bussi%c3%a8res_Boffy_6.jpg"]},"Consult_chateau_formulaire4236":{"id":"Consult_chateau_formulaire4236","dept":"87","canton":"Saint-Yrieix la Perche","commune":"Les Cars","nom":"Cars","type":"Vestiges","periode":"XIII-XVI","histoire":"CARS, château fort des Cars, bâti sur la commune, c'était le Fief et le château éponyme de la famille Pérusse des Cars et des Lastours, la seigneurie est tenue par la famille du Barry.  Au XIIIe siècle, passent par mariage sous la suzeraineté du vicomte de Rochechouart et de leur descendance. En 1354 les Pérusse s'installe au Cars. Occupé par les anglais pendant la guerre de cent ans, le bâtiment est repris en 1370  par Du Guesclin. Peu à peu, les Pérusse des Cars, augmentent leur influence et leur pouvoir. Au XVIe siècle, grands serviteurs du pouvoir Royal, ils se scindent en trois branches : Saint-Bonnet, Lavauguyon et des Cars. Ils sont élevés au rang de comte en 1562. François, premier gouverneur du Limousin en 1559 et conseiller du roi en 1562, reconstruit le château dans le goût Renaissance. En juin 1569, Coligny, après être passé par Montbrun et Châlus, arrive au château des Cars où il sinstalle en labsence de ses propriétaires qui avaient pris la fuite. Il y reçoit Henri de Navarre avec sa mère, Jeanne dAlbret, et le jeune prince de Condé qui venaient de Bonneval. Puis ce fut la bataille contre les catholiques du duc dAnjou à La Roche lAbeille. le château est démantelé à la Révolution et partiellement détruit. A appartenu à l'écrivain Guy Des Cars.","architecture":"Des CARS, il est à l'état de ruines, aujourd'hui. reconstruit à lemplacement du château du XIIIe siècle, modifié au XVe siècle, lédifice était constitué dune enceinte flanquée en ses angles de grosses tours circulaires qui ménageait une cour intérieure ornée dune galerie Renaissance.  Dans une salle lapidaire, sont regroupés les sculptures qui décoraient le château des Cars, la construction du XVIe-XVIIIe siècle,  de style Renaissance. Avant sa destruction, le château se présentait sous la forme dun carré de plus de 30 mètres de côté, composé dune grande tour maîtresse, de corps de logis et de tours dangles qui ont disparus. Ces structures sorganisaient autour dune cour intérieure richement ornée. La tour principale, encore en partie debout à langle Sud-Est, était composée de grandes pièces, éclairée par de grandes baies. Cest probablement là que se trouvait le cur du château. Le donjon est une puissante tour polygonale pourvue de canonnières, bien que conçue à lorigine pour lhabitat. Les guerres de religion ont conduit à renforcer la demeure, avec des équipements pour armes à feu, de fausses braies, et un large boulevard pour lartillerie, autour des profonds fossés maçonnés, flanqué de ravissants pavillons visibles en partie aujourdhui.  Les vestiges du château des Cars ont été inscrits aux M.H. depuis le 21/12/1982  a été racheté par la Commune.","habitants":"Famille du Barry et l'écrivain Guy Des Cars.\r\n        \r\n        \"","divers":"Au Cars, GPS : 45° 40' 47\" Nord 1° 04' 24\" Est","gps":"45° 40' 47\" Nord 1° 04' 24\" Est","images":["../../jctruffet.com/image/image_87/87_Cars_1.jpg","../../jctruffet.com/image/image_87/87_Cars_2.jpg","../../jctruffet.com/image/image_87/87_Cars_3.jpg","../../jctruffet.com/image/image_87/87_Cars_4.jpg","../../jctruffet.com/image/image_87/87_Cars_5.jpg","../../jctruffet.com/image/image_87/87_Cars_6.jpg"]},"Consult_chateau_formulairebea4":{"id":"Consult_chateau_formulairebea4","dept":"87","canton":"Condat sur Vienne","commune":"Saint-Jean de Ligoure","nom":"Chalucet","type":"Vestiges","periode":"XII","histoire":"CHALUCET, Arnaud Bernard et Bernard de Jaunhac qui ont en 1132 été les premiers bâtisseurs du château à la demande d'Eustorge évêque de Limoges sur les terres de l'abbaye de Solignac.  en 1306 cédé à la couronne, forteresse  médiévale, enjeu de pouvoir pour les seigneurs locaux, entre 1378 et 1394, l'aventurier Pérraud Foucaud y régna en maître, puis  au domaine de l'abbaye de Solignac. Au début du XIIIe siècle, l'abbé Géraud de Maulmont, conseiller de la vicomtesse de Limoges et du roi de France lui même, y a effectué de gros investissements en transformant la forteresse fondée par les Bernard de Jaunhac, pour le compte de l'abbé de Solignac, en un immense palais fortifié.  Entre 1378 et 1394, l'aventurier Pérraud Foucaud y régna en maître. Ironie de l'histoire, son rôle défensif, avant tout dissuasif jusqu'au XVe siècle, a été utilisé durant la guerre de cent ans par des bandes de pillards qui écumaient le pays. Au XVIe siècle un descendants de Géraud de Maulmont décide de rendre le château inutilisable  servant de base militaire des huguenots, Depuis 1990, le département en fait l'acquisition, le site a fait l'objet de plusieurs campagnes de restauration et la Tour Jannette a été renforcée. Une plate forme a été installée à son sommet et un escalier métallique a été construit pour pouvoir y accéder, du haut de cette tour on peut contempler la façade nord du haut castrum. Propriété du conseil général.","architecture":"CHALUCET; vestiges, est en fait une forteresse  médiévale, au but  défensif, constituée de deux édifice fortifiés, Châlucet haut et Châlucet bas édifier vers 1100, se composait d'une enceinte enserrant des maisons  de chevalier,  situé au sommet d'un éperon escarpé et boisé, et représentant le centre du\"haut Chalucet\" et de la Tour Jeannette, donjon carré du XIIe siècle,  ce poste de défence de 8 mètres de côté à l'origine de 15 à 20 mètres de haut constituant avec les ruines qui l'environnaient le \"bas Chalucet\". De plan trapézoïdal, la forteresse est composé de corps de logis (jadis voûtés), de cours et d'un donjon.  était le plus grand château fortifié du Limousin. Son rôle défensif, avant tout dissuasif jusqu'au XVe siècle. Il a été pleinement utilisé durant la guerre de cent ans, par des bandes de pillards qui écumèrent le pays. Le château de Chalucet est classé aux M.H. depuis 1875. Plusieurs campagnes de restauration ont eu lieu dans le château neuf. La façade nord vient d'être consolidée et débarrassée de son lierre. Des échafaudages ont été construits pour soutenir le mur de la chapelle qui menace de s'effondrer. Une campagne de fouille est prévue sur cette partie avant la consolidation du mur.","habitants":"Famille Pérraud Foucaud \r\n        \r\n        \"","divers":"Chalucet    GPS : 45° 43' 55,92\" Nord et 1° 18' 39,96\" Est   grav 1 à 7","gps":"45° 43' 55,92\" Nord et 1° 18' 39,96\" Est   grav 1 à 7","images":["../../jctruffet.com/image/image_87/87_Chalucet_1.jpg","../../jctruffet.com/image/image_87/87_Chalucet_2.jpg","../../jctruffet.com/image/image_87/87_Chalucet_3.jpg","../../jctruffet.com/image/image_87/87_Chalucet_4.jpg","../../jctruffet.com/image/image_87/87_Chalucet_5.jpg","../../jctruffet.com/image/image_87/87_Chalucet_6.jpg","../../jctruffet.com/image/image_87/87_Chalucet_7.jpg"]},"Consult_chateau_formulaire19ff":{"id":"Consult_chateau_formulaire19ff","dept":"87","canton":"Saint-Yrieix la Perche","commune":"Châlus-Chabrol","nom":"Chalus_Chabrol","type":"Vestiges","periode":"XI-XIII-XVII","histoire":"CHÂLUS-CHABROL-MAULMONT, bâti à Châlus  sa construction débuta au XIe siècle par les vicomtes de Limoges, et fut achevé au XVIIe siècle.  Richard Coeur de Lion, duc d'Aquitaine et roi d'Angleterre y trouva la mort en 1199, blessé mortellement par un carreau d'arbalète décoché par Pierre Basile. Géraud de Maulmont, conseiller de la vicomtesse de Limoges Marguerite de Bourgogne, sur des terres relevant alors de la seigneurie de Chalusset. Au XIVe siècle la seigneurie érigée en baronnie en faveur des Sully, en 1382 Marie de Sully Craon apporte la baronnie par mariage à Guy de la Trémoille  qui trouve la mort à Rhodes en 1382 elle convole en 1400 avec Charles Ier d'Albret, et la descendance  en 1530 par aliance passe aux Bourbon Busset.  Il fut restitué au comte de Bourbon Busset (dont la branche cadette est dite Bourbon-Châlus). En 1888, sur commande du comte de Châlus, l'architecte archéologue limousin Jules Tixier rédige un \" bulletin de santé \" très complet de la forteresse. Revenu au sein de la famille de Maulmont en 1989, le fort de Châlus Maulmont, propriété de la SCI de Maulmont gérée par Anne-Laure Réveilhac de Maulmont, figure désormais sur la route Richard Cur de Lion.  Déjà, un \"effondrement considérable\" était craint. En 1928, la toiture du corps de logis s'effondre, par défaut d'entretien.   Le château de Chalus en 1994 est vendu par la famille de Bourbon-Cbalus à une association qui le détenaient depuis 1530. Il est classé aux M.H. depuis 1981.","architecture":"CHALUS-CHABROL, château fort qui date du XIe siècle et qui surplombe la ville de Chalus. Le château fort de la ville basse de Châlus a été construit de 1275 à 1280, son enceinte comprend les vestiges de Notre-Dame du Haut-Châlus, où furent ensevelies les entrailles de Richard Ier d'Angleterre.    Il est établi sur une butte faisant face au promontoire rocheux sur lequel siège le château de Châlus-Chabrol, de l'autre côté de la petite vallée de la Tardoire. À l'origine du XIIIe siècle, il s'agissait d'une forteresse formant un rectangle, dont les angles nord-ouest et sud-est, diagonalement opposés, étaient fortifiés d'une tour.    Une belle fenêtre ogivale est à voir, sur un pan de mur de l'ancien corps de logis. Un projet de restitution de Châlus Maulmont et de construction d'une cité culinaire du Limousin est exposé au musée de l'association Histoire et Archéologie du Pays de Châlus, rue Richard Cur de Lion, voisin de Châlus Maulmont, avec une note de présentation. Le second château, situé au coeur du bourg fut érigé par Gérard de Maulmont en 1280, encore intacts en 1789, servit de prison jusqu'en 1820, la tour Nord-Ouest ainsi que le corps de logis attenant furent détruits entre les années 1794 et 1799. La reconstruction du château et à la réhabilitation des constructions voisines dépendent de l'affectation et de l'exploitation du site, déterminant pour leur financement. En 1994, la tour de Châlus Maulmont s'effondre partiellement.","habitants":"Famille de Maulmont  \r\n        \r\n        \"","divers":"Chalus grav de 1 à 6  GPS : 45° 39' 27\" Nord et 0° 58' 47\" Est                                                                        Maulmont grav-7.  GPS : 45° 39' 20,88\" Nord et 0° 58' 53,04\" Est","gps":"45° 39' 27\" Nord et 0° 58' 47\" Est","images":["../../jctruffet.com/image/image_87/87_Chalus_Chabrol_1.jpg","../../jctruffet.com/image/image_87/87_Chalus_Chabrol_2.jpg","../../jctruffet.com/image/image_87/87_Chalus_Chabrol_3.jpg","../../jctruffet.com/image/image_87/87_Chalus_Chabrol_4.jpg","../../jctruffet.com/image/image_87/87_Chalus_Chabrol_5.jpg","../../jctruffet.com/image/image_87/87_Chalus_Chabrol_6.jpg","../../jctruffet.com/image/image_87/87_Chalus_Chabrol_7.jpg"]},"Consult_chateau_formulaire45a5":{"id":"Consult_chateau_formulaire45a5","dept":"87","canton":"Ambazac","commune":"Bersac sur Rivalier","nom":"Chambon_Bersac","type":"Château","periode":"XVI","histoire":"CHAMBON, bâti, au lieu-dit Le Chambon, à Bersac-sur-Rivalier,  la construction date du XVIe au XVIIe siècle, au XVe siècle, les seigneurs de Lage-Ponnet fondèrent une vicairie dans léglise de Bersac. Les vestiges du château de Lage-Ponnet , la forteresse des Ponnet subsistent encore de nos jours dans les sylves environnant le hameau du Puy de Lage. Toutefois, des siècles dabandon, le pillage des matériaux  et des fouilles sauvages ont fortement dégradé le site.  Le nom de Bersac est mêlé à la préhistoire et à lépoque gallo-romaine, comme en témoignent les outils et les monnaies qui se trouvent au musée de lÉvêché à Limoges, ainsi que les vestiges demeurant dans la commune. \r\nAujourd'hui logis de France par la famille Perrin des Marais.","architecture":"CHAMBON, est constitué d'un corps de logis, agrandi vers l'ouest d'une partie formant son avant-corps. Sa façade postérieure est encadrée de deux tours circulaires. Une échauguette en encorbellement interrompt la façade principale et donne sur une cour. A l'est, un pont dormant est dominé par un portail classique daté de 1757. Un angle de la cour est occupé par un colombier. Sur la façade principale, la travée de la porte est amplifiée par un décor de style Renaissance et porte la date de 1549. Aucun indice de construction antérieure au XVIe siècle. Le château du Chambon connut quelques réaménagements, dans la seconde moitié du XVIIIe siècle, dont la mise au goût du jour d'un salon au rez-de-chaussée, constitue un exemple de résidence nouvelle édifiée dans des formes proches de la fin du Moyen-Age, mais où le décor et les aménagements intérieurs relèvent des innovations de la Renaissance, a été classé partiellement aux M.H. le 28.11.2001.","habitants":"Famille Perrin des Marais\r\n        \r\n        \"","divers":"Chambon  GPS : 46° 6' 6,12\" Nord, 1° 26' 60\" Est","gps":"46° 6' 6,12\" Nord, 1° 26' 60\" Est","images":["../../jctruffet.com/image/image_87/87_Chambon_Bersac_1.jpg","../../jctruffet.com/image/image_87/87_Chambon_Bersac_2.jpg","../../jctruffet.com/image/image_87/87_Chambon_Bersac_3.jpg","../../jctruffet.com/image/image_87/87_Chambon_Bersac_4.jpg"]},"Consult_chateau_formulaire4255":{"id":"Consult_chateau_formulaire4255","dept":"87","canton":"Rochechouart","commune":"Champagnac-la-Rivière,","nom":"Champagnac_Rivière","type":"Manoir","periode":"XV","histoire":"Deux châteaux à Champagnac celui de Brie et de la Rivière.                                                                         BRIE, bâti à Champagnac-la-Rivière, depuis 1275 fief des Boschaud, construction du XVe,  appartient au comte Pierre et Florence du Manoir, propriétaires aussi du Manoir de Juaye, À l'extinction de la famille Boschaud de Brie par le dernier mâle, le bien est vendu en 1545 à la famille « Chouly de Permangle » de Saint-Yrieix. Durant deux siècles, entre 1545 et 1740, plusieurs noms apparaissent,  des membres de la famille, car vers 1750, nous retrouvons les noms de « Chouly de Permangle » et de « Vassan » comme détenteurs de Brie. Mademoiselle de Vassan de Sauvebuf, très riche héritière, possédait un vaste territoire depuis Pierre-Buffière jusqu'à Saint-Junien, pratiquement la moitié de la Haute-Vienne, soit plusieurs milliers d'hectares, ainsi que les baronnies de Pierre-Buffière, de Chéronnac et de Saint-Mathieu et du château de Sauvebuf dont elle porte le titre de marquise. Elle épouse par la suite Victor Riqueti de Mirabeau. M. de Mirabeau père dépense sans compter une grosse partie de la fortune de son épouse dont il était devenu le tuteur. À la suite d'une plainte à la Cour, elle récupère l'usage de sa fortune. Après la Révolution, les propriétés ayant perdu de leur valeur, se sont trouvées plus ou moins à l'abandon. M. Bouland, homme d'affaires à Paris qui avait prêté de l'argent aux Permangle. Brie a été vendu par le tribunal de Rochechouart à M. Bouland qui l'a ensuite revendu à l'un de ses fils, Stéphane Bouland, consul du Roi de Sardaigne à New-York, qui avait fait fortune en Amérique. Au XIXe siècle passe  par héritage  aux Foureau de la Tour ancètres des propriétaires actuels, Ce dernier a remis Brie en état. Sa fille, Céline Bouland, créole issue de la Martinique, a épousé M. Adolphe de La Tour.","architecture":"BRIE du XVe, il est entièrement meublé, avec une remarquable voûte en palmier, qui coiffe son escalier de granit,  assortie de deux tourelles, fut un refuge fortifié. le corps de logis,  est élevé sur trois niveaux, la façade ouest s'encadre entre deux  fortes tours rondes toits en poivrières, la façade principale est flanqué d'une tour donjon coiffée d'un toit en pyramide est couronnée de mâchicoulis  qui abrite un escalier à vis. Entre la façade du château et la grille d'entrée du parc, se trouve une grange médiévale fortifiée antérieure à la «maison», bâtie sur une motte qui se trouvait à l'époque au milieu d'un étang de 1000 m2. C'est un bâtiment qui servait autrefois de lieu de garnison ou de refuge pour la population. Il est fortifié par deux échauguettes (ou poivrières) et 13 meurtrières.  Il existe également une deuxième interprétation, à savoir que cette grange aurait pu servir lors des guerres de religion afin de recueillir les redevances, les Brie pouvant être chargés de les collecter pour eux-mêmes ou pour les vicomtes de Rochechouart dont ils dépendaient. Cette grange de 28 x 12,50 mètres, est inscrite à l'inventaire supplémentaire des M.H.  est classé depuis 1984.","habitants":"Victor Riqueti de Mirabeau\r\n        \r\n        \"","divers":"Champagnac-Brie  GPS : 45° 30' 43\" Nord et 1° 19' 32\" Est. Brie grav 1 à 6 . Rivière grav-7","gps":"45° 30' 43\" Nord et 1° 19' 32\" Est. Brie grav 1 à 6 . Rivièr","images":["../../jctruffet.com/image/image_87/87_Champagnac_Rivi%c3%a8re_1.jpg","../../jctruffet.com/image/image_87/87_Champagnac_Rivi%c3%a8re_2.jpg","../../jctruffet.com/image/image_87/87_Champagnac_Rivi%c3%a8re_3.jpg","../../jctruffet.com/image/image_87/87_Champagnac_Rivi%c3%a8re_4.jpg","../../jctruffet.com/image/image_87/87_Champagnac_Rivi%c3%a8re_5.jpg","../../jctruffet.com/image/image_87/87_Champagnac_Rivi%c3%a8re_6.jpg","../../jctruffet.com/image/image_87/87_Champagnac_Rivi%c3%a8re_7.jpg"]},"Consult_chateau_formulairea330":{"id":"Consult_chateau_formulairea330","dept":"87","canton":"Couzeix","commune":"Chaptelat","nom":"Chaptelat","type":"Château","periode":"XVI-XVII","histoire":"A Chaptelat le château de la Sourue, de Puymerat, le Mas-neuf et le Blemont.   \r\n MAS-NEUF,  Martial de Lépine, écuyer, seigneur du Mas-Neuf, subdélégué de l'intendant de Limoges, numismate et archéologue, fut également un agriculteur remarquable qui, de 1759 à 1785, se livra à d'utiles expériences agricoles dans sa propriété du Mas Neuf. Le château actuel a été élevé après 1808, à la fin du XIXe siècle, le domaine verra un nouveau propriétaire, M. Pallier, mettre en pratique, avec succès, les idées nouvelles concernant lagriculture.\r\nÀ la fin du XIXe siècle, après Martial de Lépine, le domaine verra un nouveau propriétaire,  M. Pallier, mettre en pratique, avec succès, les idées nouvelles concernant lagriculture. Il en sera de même pour Bourdelas avec M. Barre.                                       PUYMERAT,   aux XVIIe et XVIIIe siècles, le domaine de Puymirat appartenait à la famille Marchandon. Gaston Fougeras de Lavergnolle 1856-1936  son épouse  Marie Fougeras de Lavergnalle 1863-1944  propriétaire du château de Puymirat-en-Chaptelat et d'un hôtel particulier, place du Champ-de-Foire à Limoges. Le 3 novembre 1922, il avait obtenu avec sa soeur un jugement du Tribunal Civil de Limoges rétablissant la particule entre ses deux noms.       SOURUE, du XVIIe siècle remanié au  XIXe siècle le domaine, situé près du bourg de Chaptelat,  maison de maître.","architecture":"BLEMONT,  corps de logis de plan carré à deux étages flanquée en angle de tours carrées.               MAS-NEUF, le bâtiment est composé d'un sous sol, en rez-de-chaussée, d'un étage carré et étage de comble. Elévation à travées surmontée d'un toit à longs pans brisés recouvert d'ardoise, accolé d'une tour ronde toit en poivrière.                                                    PUYMERAT; corps de logis rectangulaire à deux niveaux avec lucarnes en comble, accolé sur la gauche d'une tour carrée à trois niveaux.   La ferme est nommée Puy Mirale sur la carte de Cassini, puis Puy Mimirale sur le cadastre de 1809. La demeure actuelle fut édifiée au XIXe siècle, elle dispose d'un pigeonnier, de communs, de parties agricoles, d'un étang et d'un parc. Le bâtiment est composé d'un rez-de-chaussée, de deux étages carrés et étage de comble. Le gros-oeuvre en pierre, moellon et enduit,  élévation à travées surmontée d'un toit en croupe couvert d'ardoise.\r\nSOURUE,   longère à deux niveaux et attique toit à deux pans, flanqué d'une tourelle hors-oeuvre à mi-façade.","habitants":"Famille Martial de Lépine\r\n        \r\n        \"","divers":"A Chaptelat-Sourue grav 1-4. Puymirat-5. Mas neuf-6. Belmont grav-7.","gps":"","images":["../../jctruffet.com/image/image_87/87_Chaptelat_1.jpg","../../jctruffet.com/image/image_87/87_Chaptelat_2.jpg","../../jctruffet.com/image/image_87/87_Chaptelat_3.jpg","../../jctruffet.com/image/image_87/87_Chaptelat_4.jpg","../../jctruffet.com/image/image_87/87_Chaptelat_5.jpg","../../jctruffet.com/image/image_87/87_Chaptelat_6.jpg","../../jctruffet.com/image/image_87/87_Chaptelat_7.jpg"]},"Consult_chateau_formulaire39f0":{"id":"Consult_chateau_formulaire39f0","dept":"87","canton":"Eymoutiers","commune":"Château-Chervix","nom":"Chateau_Chervix","type":"Tour","periode":"XII-XIV","histoire":"TOUR du château-Chervix est lancien donjon d'un château-fort construit par les vicomtes de Limoges au XIIe siècle. Durant le XIVe siècle, les anglais sen emparent deux fois, en 1356 et en 1380. La seconde fois, ils y tiennent une  garnison jusqu'en 1381, puis le quittent moyennant une somme dargent. Au XVe siècle, Gouffier de lHermite, capitaine de Châlucet, achète la châtellenie de Château-Chervix à Jean V de Bretagne. Sa famille voulut la racheter peu après, grâce à un droit stipulé dans lacte de vente, mais Gouffier sy opposa et il fallut une ordonnance du roi Charles VII, en 1455, pour quil sen dessaisisse. Plus tard, le château est à nouveau vendu, puis cédé, en 1487, aux seigneurs de Saint-Jean-Ligoure, Jean et Antoine de Coignac. Le 6 octobre 1553, Château-Chervix est le théâtre d'un drame de la folie, François de Coignac, seigneur de Château-Chervix est hanté, comme tant d'autres, par l'idée de fabriquer de l'or ou du changement de tout métal en or grâce au mercure solidifié. À la fin du XVIe siècle, des huguenots sen emparent, mais peu de temps, car il leur est repris presque aussitôt. La terre de Château-Chervix est confisquée par le roi et donné au seigneur de Lanzat. Le château, qui ne fut jamais réparé, connaît alors une succession de propriétaires, jusquen 1660, date à laquelle ses ruines furent acquises par la famille de Joussineau de Tourdonnet, qui les conserva, semble-t-il, jusquà la Révolution. \r\nFAYAT pas d'information historique.","architecture":"Ce donjon, appelé « La Tour », culmine à 418 m d'altitude et mesure 32 m de haut. Le donjon roman a été surmonté au XIVe siècle d'un réhaussement avec mâchicoulis  de type alternés. Il fait partie des donjons quadrangulaire les mieux conservés. Il est de plan rectangulaire, 8,60 X 13,50 m, ce qui entraîne un système de contreforts différents en fonction des côtés. Les murs ont une épaisseur de 2 m et sont construits avec des pierres sèches irrégulières de schiste et de granite. Le donjon possédait trois étages, séparés par des planchers de bois et devaient communiquer par des échelles amovibles. Sur la face Sud se situe la porte d'accès principal située à 7,30 m du sol. Une autre porte est présente aux deux tiers de la hauteur du second étage et une archère au troisième. La face Est comporte deux portes situées l'une au-dessus de l'autre. La face Ouest présente une archère très étroite au milieu du même étage, une porte aux deux tiers de la hauteur et sur la face Nord, il y a deux fenêtres géminées, en plein cintre, séparées par une colonnette ronde. Il existe également, au pied de la tour, un boyau fermé avec des « loges » de chaque côté. Le tout sur une dizaine de mètres et ne dépassant pas 1 m de hauteur. Cette cache permettait de stocker de la nourriture et de se soustraire aux représailles des bandes armées qui sillonnaient parfois la région. Si vers 1860, il restait encore des murs d'enceinte de 12 à 15 m de haut à l'est et au sud de la tour, aujourd'hui il ne subsiste plus que quelques murs qui dépassent à peine le niveau du sol et le donjon.","habitants":"Gouffier de lHermite,\r\n        \r\n        \"","divers":"La Tour grav 1-2  GPS : 45° 36' 34\" Nord et 1° 21' 13\" Est.  Fayat grav-3-4","gps":"45° 36' 34\" Nord et 1° 21' 13\" Est.  Fayat grav-3-4","images":["../../jctruffet.com/image/image_87/87_Chateau_Chervix_1.jpg","../../jctruffet.com/image/image_87/87_Chateau_Chervix_2.jpg","../../jctruffet.com/image/image_87/87_Chateau_Chervix_3.jpg","../../jctruffet.com/image/image_87/87_Chateau_Chervix_4.jpg"]},"Consult_chateau_formulaire6ed3":{"id":"Consult_chateau_formulaire6ed3","dept":"87","canton":"Eymoutiers","commune":"Châteauneuf-La-Forêt","nom":"Chateauneuf_Foret","type":"Château","periode":"XV","histoire":"Trois châteaux à Châteauneuf la Forêt, celui de Châteauneuf la Forêt et celui de Bellegarde .    CHATEAUNEUF la FORET, au XVe siècle, il semblerait que le grand prieur d'Auvergne Jean Cottet ait été en même temps le seigneur de la seigneurie de Laron à Châteauneuf-la-Forêt. Elle se situait, à l'époque 1450-1476 et après, près d'un gué sur la Combade. Il y aurait eu une souveraine de Savignac qui aurait été châtelaine et mariée avec François de Cottet. \r\n  BELLEGARDE, à Chateauneuf la forêt,  construit avant 1898 par Paul Baron Larcanger .","architecture":"Le château de Châteauneuf qui a donné son nom à la commune n'existe plus. Il a été démantelé pendant la Révolution française de 1789 et complètement rasé au début du XIXe siècle. Il ne reste que les murs d'enceinte et les souterrains. De nombreux moulins existaient le long de la Combade, certains ont été transformés au début du XXe siècle en moulins à broyer la paille nécessaire à la fabrication du papier.","habitants":"Famille de François de Cottet\r\n        \r\n        \"","divers":"A chateauneuf le château de la Forêt 1-2.  Bellegarde grav 3-4-5.","gps":"","images":["../../jctruffet.com/image/image_87/87_
