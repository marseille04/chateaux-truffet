7_Roy%c3%a8res_8.jpg"]},"Consult_chateau_formulaire984c":{"id":"Consult_chateau_formulaire984c","dept":"87","canton":"Saint-Leonard de Noblat","commune":"Saint-Priest-Taurion","nom":"Salvanet","type":"Château","periode":"XVIII","histoire":"Tourniol (voir article)                                                  SALVANET, l'histoire commence véritablement en 1509. Cette année-là, la famille Dalesme de Châtelus acheta le château, ses dépendances et ses métairies pour y habiter en paix, pendant plus de trois siècles. Les Dalesme furent en effet propriétaires de ce domaine jusqu'en 1849 . Au XVIIIe siècle, ils habitaient encore le vieux château situé au cur du fief de Salvanet. Mais en 1772, ils décidèrent dinstaller une nouvelle demeure, qui bénéficierait du site et dune vue largement ouverte en direction du Taurion. Larchitecte Joseph Brousseau, aidé de son frère entrepreneur Mathurin Brousseau, originaire de Limoges fut chargé du projet.  Le seul Dalesme émigré en Angleterre, revint à Salvanet à la fin de la Révolution. Il essaya de récupérer ses biens et de redresser la situation désastreuse, dans laquelle sa famille était plongée. Son fils poursuivi son uvre, mais ruinée, la famille Dalesme fut obligée de vendre la propriété en 1849, après 340 ans et quinze générations.  La propriété de Salvanet est ensuite passée au Vicomte Jacques Fleury, puis au comte Renaud de Laguiche, les fils et petit-fils de cette résistante héroïque, et les frères et fils d'Hélène Fleury, marquise de Laguiche. Aujourd'hui, la fille de ce dernier, Ghislaine de Laguiche, épouse de Cédric Henriot, en assure la destinée avec leurs cinq enfants. La famille Talamon acquiert alors toute la propriété. Ces bourgeois fortunés entreprennent de grands travaux et transforment la maison.    C'est enfin, en 1869, que la dernière famille  arriva à Salvanet. Adrien-Charles Calley Saint-Paul, issu dune bourgeoisie industrielle et gendre du savant Louis-Joseph Gay-Lussac, acquiert la propriété de Salvanet.","architecture":"SALVANET,  de plan rectangulaire à deux niveaux  sur soubassements et lucarnes sur un toit à la mansard avant corps central d'entrée de trois travées saillants avec fronton triangulaire, son parc et la réserve, la propriété comportait un jardin potager clos avec deux serres, une dizaine de métairies, deux étangs et environ 180 hectares de bois situés principalement le long du Taurion ; lensemble formant près de 300 hectares dun seul tenant.   Les deux filles de Calley de Saint-Paul, devenu ensuite sénateur de la Haute-Vienne, épousèrent  lune le fils du Maréchal Bugeaud et demeura sans descendance, et lautre épousa le général Émile-Félix Fleury, aide de camp de lEmpereur Napoléon III. Des trois fils du général Fleury (Maurice, Adrien, Émile) lhéritage de Salvanet échut au second, qui avait épousé Renée Bianchi, fille de Marius Bianchi, agent de change. Veuve en 1924, elle a animé la vie de Salvanet jusquen 1947.","habitants":"Famille Dalesme de Châtelus \r\n        \"","divers":"Château de Salvanet","gps":"","images":["../../jctruffet.com/image/image_87/87_Salvanet_1.jpg","../../jctruffet.com/image/image_87/87_Salvanet_2.jpg","../../jctruffet.com/image/image_87/87_Salvanet_3.jpg","../../jctruffet.com/image/image_87/87_Salvanet_4.jpg"]},"Consult_chateau_formulaire6218":{"id":"Consult_chateau_formulaire6218","dept":"87","canton":"Condat-sur-Vienne","commune":"Solignac","nom":"Solignac_87","type":"Château","periode":"XVI-XVIII","histoire":"Deux châteaux à Solignac, la Borie et de Bréjoux.\r\nLA BORIE, bâti à Solignac, proche de Limoges, date du XVIIe siècle, conçu par Louis Dandrel, Emma Blanc et Patrick Rimoux, il associe conception paysagère et ingénierie du son et de la lumière. Inauguré en juin 2013, il est ouvert au grand public et est animé d'une programmation musicale saisonnière.   Le domaine est ensuite mis en vente sur le site du groupe immobilier de luxe Mercure, avant que la justice choisisse finalement d'auditionner six repreneurs. Le 14 novembre, le domaine est vendu à un couple de néerlandais, Harry Struijker-Boudier Ardi Poels, qui entendent y développer un projet d'art contemporain.  Le site annonce sa réouverture pour le 15 septembre 2017, date du vernissage de la toute première exposition organisée par les nouveaux propriétaires, intitulée Un coup de dés n'abolira jamais le hasard. \r\n BREJOUX;   la famille de Léon François Auguste Lemaigre Dubreuil (1801-1876), avoué à Paris, fut père de :  Léon Charles Lemaigre Dubreuil (1829-1895), industriel porcelainier, président de la société La Céramique. Il a fait reconstruire le château de Bréjoux à Solignac, près de Limoges. Il eut pour petit-fils : Jacques Lemaigre Dubreuil (Solignac 1894 - Casablanca 1955), industriel, militant politique, patron de presse. Durant la seconde guerre mondiale, il contribua au débarquement des Alliés au Maroc ; Alfred Henry Lemaigre Dubreuil (1833-1907), architecte. Il eut pour petit-fils : Maurice Edmond Marie Lemaigre Dubreuil (1902-1967), dont postérité patronymique.","architecture":"BORIE, du XVIe siècle : entre Limoges et Solignac, un château du XVIIe siècle construit par les Malledent pendant les guerres de religion et entièrement restauré, de style Renaissance tardif, de plan rectangulaire à deux niveaux sur soubassement et lucarnes sur toits en croupe recouvert de tuiles flanqué à chaque anges d'échaugettes en encorbellement avec toiture en dome est aujourd'hui la propriété de la Fondation La Borie-en-Limousin, Fondation dédiée à la Musique.                                                                         BREJOUX, l'édifice de style Renaissance se présente par un corps de logis rectangulaire sur trois niveaux et lucarnes sur un toit en ardoise, flanqué en façade de tours rondes toit en poivrières et sur l'angle arrière droit une tour carrée  ( donjon )  toit à quatre pans très pointus.","habitants":"La-Borie Harry Struijker-Boudier Ardi Poels,                                                                             Bréjoux Léon Charles Lemaigre Dubreuil \r\n        \"","divers":"Borie grav 1 à 4.   GPS : 45° 46' 54\" Nord et 1° 16' 98\" Est.  Bréjoux Grav 5 à 7   GPS : 45° 45' 22\" Nord, 1° 16' 34\" Est .","gps":"45° 46' 54\" Nord et 1° 16' 98\" Est.  Bréjoux Grav 5 à 7   GP","images":["../../jctruffet.com/image/image_87/87_Solignac_87_1.jpg","../../jctruffet.com/image/image_87/87_Solignac_87_2.jpg","../../jctruffet.com/image/image_87/87_Solignac_87_3.jpg","../../jctruffet.com/image/image_87/87_Solignac_87_4.jpg","../../jctruffet.com/image/image_87/87_Solignac_87_5.jpg","../../jctruffet.com/image/image_87/87_Solignac_87_6.jpg","../../jctruffet.com/image/image_87/87_Solignac_87_7.jpg"]},"Consult_chateau_formulaire6619":{"id":"Consult_chateau_formulaire6619","dept":"87","canton":"Rochechouart","commune":"Saint-Auvent","nom":"St_Auvent","type":"Château","periode":"XVII","histoire":"SAINT-AUVENT, faisait partie de la vicomté de Rochechouart, qui dépendait administrativement de la généralité de Poitiers. En 1603, le vicomte Louis de Rochechouart partagea ses biens entre ses trois fils, René devint comte de Saint-Auvent et baron de Montmoreau. Le nouveau comté ainsi créé regroupait Saint-Auvent, Marval, Milhaguet, Saint-Martin-de-Jussac, une petite partie de Saint-Junien, dont le Petit Saint-Auvent, l'étang de la Pouge et l'est de la forêt de Rochechouart. René fut comte jusqu'en 1632. Lui succéda son fils Jean, puis, en 1695, Jean II qui meurt sans enfant en 1709. Il laissa ses biens à sa sur Anne de Rochechouart, mariée à Isaac Perry, marquis de la Chauffie à Pressignac. Le château de la commune date du XIIe siècle. Il était à l'origine possédé par la famille de Rochechouart, issue des vicomtes de Limoges.","architecture":"St-AUVENT, le château : bâti sur un promontoire granitique au milieu dun parc de trois hectares, il surplombe les vallées de la Gorre et du Gorret. Aujourdhui propriété privée, il est un centre artistique ouvert à lart contemporain. Depuis 1996, ont lieu chaque année, durant tout le mois d'août, les Rencontres du château de Saint-Auvent, de plan en équerre à deux corps de logis à deux niveaux toit en croupe recouvert de tuile et flanqué aux angles de tour ronde.","habitants":"Vicomte Louis de Rochechouart\r\n        \"","divers":"Château de St-Auvent","gps":"","images":["../../jctruffet.com/image/image_87/87_St_Auvent_1.jpg","../../jctruffet.com/image/image_87/87_St_Auvent_2.jpg","../../jctruffet.com/image/image_87/87_St_Auvent_3.jpg","../../jctruffet.com/image/image_87/87_St_Auvent_4.jpg"]},"Consult_chateau_formulaire2457":{"id":"Consult_chateau_formulaire2457","dept":"87","canton":"Saint-Léonard de Noblat","commune":"Saint-Denis des Murs","nom":"St_Denis_Murs","type":"Château","periode":"XIV-XVII","histoire":"St-DENIS des MURS, \"le château du Muraud\",  Une légende  raconte que la fille du seigneur du Muraud serait tombée amoureuse d'un berger. Son père, pour empêcher cette idylle l'aurait enfermée au sommet d'une tour du château qui surplombe la Maulde. Elle préféra se donner la mort en se jetant dans cette rivière. Ce serait en souvenir de cette jeune femme, Maud, que la rivière a pris son nom.\r\nMONTJOFFRE, la propriété appartient, à la fin du XIIe siècle, à la maison des Mauriac descendants de Vulgrin, comte de Périgord et d'Angoulême sous Charles le Chauve, puis elle passe au XVIe siècle aux Daniel, seigneurs du Muraud: Jacques Daniel le Jeune est  possesseur en 1519 du château et des seigneuries du Montjoffre et de Las Roussarias. En 1556, Guillaume de Razac, époux de Gabrielle Trompedon, ayant droit des Daniel, possède le château qui sera habité par les Razac de 1556 à 1601. Il appartient ensuite aux Guytard, seigneurs de La Borye, puis aux Carbonnières, seigneurs de Saint-Brice. Peu avant la Révolution, cette famille s'éteint sans postérité. En 1804, Montjoffre est aux Germain de La Pomélie, propriétaires terriens en Haute-Vienne.","architecture":"MURAUD,  qui surplombe le point de confluence de la Vienne et de la Maulde, reconstruit au XVIIe siècle sur l'emplacement d'une forteresse du XIIe siècle. du XIIe ou XIIIe siècle, attesté avant le XIVe siècle, en ruine en 1572 et détruit par les habitants de Saint-Léonard en 1590. Edifice reconstruit autour des années 1600. Allongé et flanqué de deux tours : lune rectangulaire au nord et  lautre ronde côté est, lédifice sappuie sur  des structures anciennes bâties à même le roc. Prolongeant la façade ouest, la terrasse bien exposé. Les ouvertures de la façade antérieures ont été refaites au XVIIe siècle. Une tour circulaire, vestige du premier château  a été démolie à la fin du premier quart du XXe siècle. Le site fortifié du Mureau, aux  confluents de la Maulde et de la Vienne, permettait la surveillance des deux vallées. De la disposition d'origine du château, seule une tour ronde démolie, est connue ainsi que les bases d'une tour carrée. La tour carrée nord-ouest a été construite vers 1920 sur des bases anciennes. Les lucarnes de la façade antérieure ont été modifiées au milieu du XXe siècle.\r\n MONTJOFFRE, du XVIIIe siècle.  corps de logis rectangulaire à deux niveaux série de lucarnes sur comble retour en équerre sur cour  de deux niveaux dont une partie sur arcade flanqué de deux tours carrées aux extrémitées, l'ensemble recouvert d'ardoises.","habitants":"Famille de Guillaume de Razac\r\n        \r\n        \"","divers":"Châteaux de Montjoffre et de Muraud à St-Denis","gps":"","images":["../../jctruffet.com/image/image_87/87_St_Denis_Murs_1.jpg","../../jctruffet.com/image/image_87/87_St_Denis_Murs_2.jpg","../../jctruffet.com/image/image_87/87_St_Denis_Murs_3.jpg"]},"Consult_chateau_formulaire52e2-2":{"id":"Consult_chateau_formulaire52e2-2","dept":"87","canton":"Couzeix","commune":"Saint-Gence","nom":"St_Gence","type":"Château","periode":"XVI","histoire":"CHASSAGNE, à la fin du XVIIIe siècle, d'après Henri Hugon, la famille Volondat, famille de hauts bourgeois, sont seigneurs de La Chassagne.  Edifice Inscrit au M.H en1983.\r\n  MONTS,  date du XVIe siècle, 1534 inscrit sur porte de dépendances.","architecture":"CHASSAGNE, a été construit dans la deuxième moitié du XVIe siècle. L'édifice est composé d'un rez-de-chaussée, d'un étage carré et d'un étage en surcroît. Le gros-oeuvre en granite, moellon et enduit partiel, élévation à travées, croupe couverte de tuile creuse. : escalier tournant à retours. De plan rectangulaire à deux niveaux et lucarnes sur toit en croupe recouvert de tuiles, château datant de la 2e moitié XVIe siècle..  \r\nMONTS, du XVIe siècle,  grange aux dîmes datant du  XVIe siècle, à usage à la fois agricole et défensif présence d' une échauguette sur angle avec meurtrières ; remaniements au XVIIe siècle (1605 inscrit sur autre porte) ; 27 et 28 août 1756 : incendie et destruction du toit de la tour nord-ouest du logis ; réfection sommaire (en 1794 cette tour est restée sans planchers et n' a même pas de croisées) ; après 1765 : démolition de la chapelle ; 1787 : partage du logis entre deux héritiers qui font désaxer et rétrécir la porte principale ; vers 1900 : démolition de la tour nord-ouest ; après 1913 : démolition d' une tour de dépendances ; subsistent vestiges de trois portails ; cheminée avec corbeaux sculptés, réemployée au début du  XXe siècle dans la maison de Saint-Gence, subsistent encore des éléments de fortifications.","habitants":"Famille Volondat\r\n        \r\n        \r\n        \"","divers":"A Saint-Gence château des Monts et de la Chassagne grav 1-2-3. Monts 4-5-6","gps":"","images":["../../jctruffet.com/image/image_87/87_St_Gence_1.jpg","../../jctruffet.com/image/image_87/87_St_Gence_2.jpg","../../jctruffet.com/image/image_87/87_St_Gence_3.jpg","../../jctruffet.com/image/image_87/87_St_Gence_4.jpg","../../jctruffet.com/image/image_87/87_St_Gence_5.jpg","../../jctruffet.com/image/image_87/87_St_Gence_6.jpg"]},"Consult_chateau_formulaire0d1a":{"id":"Consult_chateau_formulaire0d1a","dept":"87","canton":"Condat sur Vienne","commune":"Saint-Jean-Ligoure","nom":"St_Jean_Ligoure","type":"Château","periode":"XVII-XIX","histoire":"Autre que Chalucet (voir article), plusieurs châteaux à Saint-Jean de Ligoure, Buffière à deux Km à l'ouest, l'Age de bois.                                                                  ST-JEAN-LIGOURE en 1856, Frédéric Le Play achète les différentes terres qui composeront le domaine de Ligoure. En 1867, Frédéric charge son fils Albert de reprendre la gestion du domaine. Dans la famille le Play jusqu'en 1939  Petite-fille de Pierre Le Play, elle est propriétaire de Ligoure.   Le docteur en médecine et pharmacie Michel Legros, l'un des inventeurs du vaccin contre les piqûres de serpent, venait passer ses vacances au début du XXe siècle dans l'ancienne maison Roche (famille de sa mère), face à l'entrée de l'hôstel de Lur, appelé le château de Saint-Jean-Ligoure. En 1997, elle fait don au département de la Haute-Vienne de la partie forestière du domaine.\r\nARTS de LIGOURE  de  style Renaissance privé appartenant à Mme Thomas-Mouzon, géré par une association qui organise toute lannée laccueil de groupes.","architecture":"ST-JEAN-LIGOURE, conscient du mauvais état de la propriété, il procède à de nombreux changements. Tout dabord il fait bâtir un nouveau château, sur les ruines dun ancien édifice. Il aménage la partie forestière et fait construire un mur denceinte dune longueur de 6 km en 1881. Le parc paysager, lui, a été enrichi jusqu'en 1930 d'une collection botanique remarquable. Il offre aujourdhui à la vue du promeneur plus de 200 variétés de conifères.             ARTS de LIGOURE  de style renaissance du XIXe siècle à deux niveaux sur soubassement  et lucarnes sur comble avec un corps central  de plan carré avec pavillon saillants aux angles prolongé à droite comme à gauche de construction à deux niveaux reliant à gauche un pavillon de plan rectangulaire saillant et à l'opposée un autre pavillon à structures diverses  de plan d'équerre avec pignon gothique  en façade côté parc avec   fronton retondant et balcon sur encorbellement et couvert d'un toit retondant.","habitants":"Frédéric Le Play \r\n        \"","divers":"châteaux à Saint-Jean de Ligoure grav 1-2-3, Buffière, Arts de ligoure grav 4-5-6  l'Age de bois grav -8. Pierre Buffière Grav-9.","gps":"","images":["../../jctruffet.com/image/image_87/87_St_Jean_Ligoure_1.jpg","../../jctruffet.com/image/image_87/87_St_Jean_Ligoure_2.jpg","../../jctruffet.com/image/image_87/87_St_Jean_Ligoure_3.jpg","../../jctruffet.com/image/image_87/87_St_Jean_Ligoure_4.jpg","../../jctruffet.com/image/image_87/87_St_Jean_Ligoure_5.jpg","../../jctruffet.com/image/image_87/87_St_Jean_Ligoure_6.jpg","../../jctruffet.com/image/image_87/87_St_Jean_Ligoure_7.html","../../jctruffet.com/image/image_87/87_St_Jean_Ligoure_8.jpg","../../jctruffet.com/image/image_87/87_St_Jean_Ligoure_9.jpg"]},"Consult_chateau_formulaire8814":{"id":"Consult_chateau_formulaire8814","dept":"87","canton":"Couzeix","commune":"Saint-Jouvent","nom":"St_Jouvent","type":"Château","periode":"XX","histoire":"Quatre châteaux  à Saint-Jouvent; Boisse, Bordes, Bacellerie et Villemazet  dont je n'ai pas d'information historique.                                                          BOISSE, bâti à Saint-Jouvent, sa construction date de 1880-1902. de l'architecte était Stephen Sauvestre. L'actuel château a été construit de 1898 à 1901 à l'initiative du bisaïeul des propriétaires actuels, en lieu et place d'une ancienne maison de maître.\r\n BORDES  de la famille seigneuriale : 1656, Guy des Bordes, seigneur, est consul de Limoges en 1656 et 1678. Geoffroy des Bordes, né à la propriété en 1769, fut garde du corps du roi dans la compagnie du duc de Luxembourg et eut lhonneur de défendre, dans les fatales journées des 8 et 9 octobre 1790. En 1806, il épousa une héritière de la famille Dupeyrat de Thouron. En 1815, il est lun des premiers à accourir au-devant de Louis XVIII, il servit quelque temps comme officier supérieur. Lorsquil revint dans son domaine limousin, il devint juge de paix. Il mourut à Compreignac à lâge de 73 ans.\r\nBACELLERIE,  appartenait à la famille de Ganh ou de Gain. Au XVIe siècle, en 1542, un certain Léonard Vignault rend hommage à lévêque de Limoges pour cette terre, en tant que seigneur des biens dotaux de son épouse. La terre passe par la suite dans la famille Vaucorbeil, à la fin du XVIIe siècle, début XVIIIe siècle. On lui doit le moulin de la Poitevine, que lon nommait l «Usine ». Il a également écrit des articles portant, sur lirrigation, au Bulletin de la Société Historique et Archéologique du Limousin.  En 1882, Bachellerie est vendue à Gaston-Henri Denis de Senneville. \r\n  PUYTISON, de Martin de Puytison de 1830 à 1861 et dans cette famille puis dans la famille Neuvic jusqu'en 1983.","architecture":"BOISSE, plus manoirs que château, bâtie en 1903-1904 sur une hauteur qui domine la vallée. Les abords du château sont aménagés en terrasses. La construction a fait appel à la fois au granit local et à la brique de Bourgogne.  Lédifice remplace une ancienne maison de maître. Le granit a été utilisé en moellons, les volumes ont été multipliés. La brique de Bourgogne a servi à réaliser les larges bandeaux au niveau des linteaux des baies à létage.\r\nBORDES, le château actuel a été construit, en 1890, sur les plans de larchitecte Trezeguet, avec la collaboration de larchitecte Limougeaud Geay. Un souci de classicisme et de sobriété le caractérise, de plan rectangulaire à deux niveaux, avant corps saillants d'une travée centrale avec fronton rotondants avec au centre une lucarne  à fronton retondant.          VILLEMAZET, manoir de plan carré à deux niveaux avec lucarnes sur toit brisé, avant corps d'entrée  polygonal de trois niveaux toit à cinq pans.","habitants":"Famille de Bordes                                                          Bacellerie famille Vaucorbeil\r\n        \"","divers":"à Saint-Jouvent; Boisse grav 1-2, Bordes grav-4, Bacellerie grav 3 et Villemazet grav 5-6                 GPS : 45° 57' 28\" Nord et 1° 12' 52\" Est","gps":"45° 57' 28\" Nord et 1° 12' 52\" Est","images":["../../jctruffet.com/image/image_87/87_St_Jouvent_1.jpg","../../jctruffet.com/image/image_87/87_St_Jouvent_2.jpg","../../jctruffet.com/image/image_87/87_St_Jouvent_3.jpg","../../jctruffet.com/image/image_87/87_St_Jouvent_4.jpg","../../jctruffet.com/image/image_87/87_St_Jouvent_5.jpg","../../jctruffet.com/image/image_87/87_St_Jouvent_6.jpg"]},"Consult_chateau_formulaire6583":{"id":"Consult_chateau_formulaire6583","dept":"87","canton":"Bellac","commune":"Saint-Junien les Combes","nom":"St_Junien","type":"Château","periode":"XVIII","histoire":"Le manoir du Châtelard, qui abrite aujourdhui un centre de loisirs, constitue  lultime témoignage de cet ensemble de forteresses, à ses pieds, deux anciens moulins à blé (du Bas-Châtelard)                          CHATELARD,  du XVIIIe siècle. Propriété avant 1348 de la famille de Saint-Amand, à laquelle appartenait Eudes de Saint-Amand, maréchal du royaume de Jérusalem, huitième grand-maître des templiers (de 1171 jusqu'au 19 octobre 1179), décédé en captivité à Damas, prisonnier de Saladin. Le château passa par la suite dans les familles de Montvallier puis de Magnac. Le cardinal, évêque de Paris, Aimeric de Magnac y est né vers 1335 (mort à Avignon le 20 mars 1385. Son neveu Hugues de Magnac, évêque de Saint-Flour (bâtisseur de l'actuelle cathédrale) puis évêque de Limoges, naquit également dans ce château. Il mourut à Limoges le 4 novembre 1412. Il fut enterré à l'abbaye Saint-Martial à Limoges. Le château est actuellement la propriété de la ville de Saint-Junien.                   SANNAT, demeure construite vers 1785, cette belle demeure est située sur un promontoire qui domine le vallon de la Bazine et offre une vue panoramique sur le bocage du Haut Limousin et des Monts de Blond.    Castel de Glane dit l'Eden  restaurant.","architecture":"CHATELARD  du XVIIIe siècle. Un ancien châteaui occupait ce site stratégique dominant la vallée de la Glane   de plan rectangulaire à deux niveaux avec série de lucarne sur comble et fronton triangulaire avec occulus sur l'entrée.                                                 SANNAT, vos hôtes mettent à votre disposition l'aile ouest du château, entièrement indépendante et unique location du château, elle ouvre sur un jardin clos et une piscine privative. Parc de 5 hectares géré dans le respect de l'environnement, de plan rectangulaire à deux niveaux sur soubassements avec série de lucarnes sur toit recouvert de tuiles, deux pavillons de deux travées saillants aux extrémitées, refend sur chaque angles.                                                      CASTEL de GLane dit l'Eden de plan rectangulaire oblong  à trois niveaux flanqué plein cintre d'une tour ronde à toit en poivrière.","habitants":"Famille de Saint-Amand\r\n        \"","divers":"St-Julien grav-1,  Sannat grav 2-3.     Chatelard- grav-4,  Vergne grav-5.     GPS : 46° 05' 17\" Nord et 1° 08' 13\" Est.","gps":"46° 05' 17\" Nord et 1° 08' 13\" Est.","images":["../../jctruffet.com/image/image_87/87_St_Junien_1.jpg","../../jctruffet.com/image/image_87/87_St_Junien_2.jpg","../../jctruffet.com/image/image_87/87_St_Junien_3.jpg","../../jctruffet.com/image/image_87/87_St_Junien_4.jpg","../../jctruffet.com/image/image_87/87_St_Junien_5.jpg"]},"Consult_chateau_formulaire6969":{"id":"Consult_chateau_formulaire6969","dept":"87","canton":"Saint-Léonard de Noblat","commune":"Saint-Léonard de Noblat","nom":"St_Léonard_Noblat","type":"Château","periode":"XVII-XIX","histoire":"Plusieurs châteaux à Saint-Léonard de Noblat, celui de la Chapelle, de Rigoulène, Lussac,  de Masrabeau et à quelques kilomètres  au nord-Est le château de Moissannes centre éducatif.\r\nLa CHAPELLE  date du milieu du XVIe siècle  comme l'atteste la date 1550 sur la porte mentionnée par le ministère,  c'est en 1905 que  Mr Henri Lamy de La Chapelle, a voulu agrandir son habitation et lui a rajouté un étage.\r\nRIGOULENE, une des grand-mère dErnest Lebloys était Thérèse Robert de Rigoulène (1769-1859), fille de Louis Robert de Rigoulène (seigneur de Rigoulène en St-Léonard de Noblat, propriétaire à la Rochelle marchand de Saint-Léonard de Noblat, conseiller municipal. Ce dernier va acheter le château et domaine de Rigoulène à Jean-Baptiste Dalesme de Rigoulène (1707-1780) en 1772. En même temps il fait construire lhôtel de Rigoulène à Saint-Léonard (architecte Brousseau).  Les Robert de Rigoulène sont les descendants de colons propriétaires à Saint-Domingue, 1749, (actuellement Haïti), à Jacmel, paroisse du Baynet, domaine de Gandon.     MASRABEAU, nourrie de l'âme de 7 générations, cette maison de Maître du XVIII et XIX siècle située au cur d'un parc Masrabeau est devenu une Maison d'hôtes de charme.","architecture":"St-LEONARD, échauguettes sur bâtiment de la ville.     Le CHAPELLE, le bâtiment ne date pas du XVIIe siècle,  en 1550, avait été construit sur un bâtiment antérieur, dont les ouvertures  encore visibles ne sont pas aux mêmes niveaux que celui de 1550 et d'aujourd'hui. Jusqu'à 1905 le château était  couvert de tuiles romaines, et la tour de tuiles plates, construit avec  un toit entièrement en ardoises, parce que plus pentu que celui d'origine. Une description des lieux qui date de la fin du XVII siècle.\r\nMOISSANNES, corps de logis de plan d'équerre à trois niveaux, toits en croupes flanqués de deux pavillons carrés dont une à l'angle extèrieur  à toits quatre pans. RIGOULENE, de plan rectangulaire  à deux niveaux, neuf travées  dont trois dans avant corps saillants avec fronton sur toit.                                                          LUSSAC, deux châteaux un de plan en équerre à quatre niveaux  et arcade au rez-de-chaussée, le deuxième de plan rectangulaire à deux niveau et attique.","habitants":"Chapelle Famille  Mr Henri Lamy de La Chapelle      Famille de  Louis Robert de Rigoulène \r\n        \r\n        \"","divers":"à Saint-Léonard de Noblat Grav-1, celui de la Chapelle grav-4, de Rigoulène grav-2-3, Lussac grav-5-6,  de Masrabeau grav-7, Moissannes grav-8  Daloz grav-9.","gps":"","images":["../../jctruffet.com/image/image_87/87_St_L%c3%a9onard_Noblat_1.jpg","../../jctruffet.com/image/image_87/87_St_L%c3%a9onard_Noblat_2.jpg","../../jctruffet.com/image/image_87/87_St_L%c3%a9onard_Noblat_3.jpg","../../jctruffet.com/image/image_87/87_St_L%c3%a9onard_Noblat_4.jpg","../../jctruffet.com/image/image_87/87_St_L%c3%a9onard_Noblat_5.jpg","../../jctruffet.com/image/image_87/87_St_L%c3%a9onard_Noblat_6.jpg","../../jctruffet.com/image/image_87/87_St_L%c3%a9onard_Noblat_7.jpg","../../jctruffet.com/image/image_87/87_St_L%c3%a9onard_Noblat_8.jpg","../../jctruffet.com/image/image_87/87_St_L%c3%a9onard_Noblat_9.jpg"]},"Consult_chateau_formulaire20b7":{"id":"Consult_chateau_formulaire20b7","dept":"87","canton":"Saint-Léonard de Noblat","commune":"Saint-Martin Terressus","nom":"St_Martin_Terressus","type":"Château","periode":"XVI-XVIII","histoire":"RIBAGNAC,  bâti à Saint Martin-Terressus, date du XVI siècle, il appartenait à une grande familles de porcelainiers. Bâti en 1656 par Jean  Igonin écuyer, seigneur de Ribagnac et aurait été en partie détruit par un incendie vers 1830 ; le cadastre napoléonien atteste des bâtiments disparus, en 1830, il a été acheté par le porcelainier Amédée Alluaud et a été restauré par ses soins:   Aujourd'hui la société est dirigée par Patrick-Jose Bergot gérant.                     PLANTADIS, a été construit entre 1860 et 1880 sur le site d'une seigneurie ancienne; il ne reste plus aucune trace de la construction qui aurait précédé le château actuel ainsi que de la chapelle mentionnée au XIIe siècle le château est une propriété unique, restaurée dans un esprit loft, exclusivement dédiée à la réussite de vos événements.","architecture":"RIBAGNAC, bâti à Saint-Martin-Terressus, date du XVIe siècle, remaniée au XIXe siècle. Six tours, il se situe dans un parc de 36 ha. Il appartenait à une grande familles de porcelainiers.   l'ensemble de cette reconstruction a été réalisé dans un style néo-médiéval, avec de faux mâchicoulis et bretèche et dans un style néo-Renaissance pour toutes les ouvertures décorées de meneaux et croisillons, demeure de plan rectangulaire comportant sur la façade antérieure un avant-corps central peu débordant couvert d'un toit en pavillon, une tour cylindrique hors-oeuvre sur l'angle sud, une tour carrée hors-oeuvre sur l'angle Est, la façade postérieure comprend au centre une tour circulaire hors-oeuvre et aux angles nord et ouest des tourelles en surplomb, le château possède de jolies chambres, dans un décor d'époque de début XIXe.                                         PLANTADIS,  le corps de logis de plan rectangulaire à deux niveaux avec chaînage à refend cinq travées , et avant central pour porte d'entrée avec fronton triangulaire au niveau du toit, côté parc deux tours rondes sur les angles qui englobe une façade avec léger avant corps de trois travées encadré de chaînage à refend  et terrasses mi-toits.","habitants":"Seigneur de Ribagnac\r\n        \"","divers":"Ribagnac grav-1-2-3    Plantadis    grav 4 à 7      GPS : 45° 55' 12\" Nord, 1° 26' 38\" Est","gps":"45° 55' 12\" Nord, 1° 26' 38\" Est","images":["../../jctruffet.com/image/image_87/87_St_Martin_Terressus_1.jpg","../../jctruffet.com/image/image_87/87_St_Martin_Terressus_2.jpg","../../jctruffet.com/image/image_87/87_St_Martin_Terressus_3.jpg","../../jctruffet.com/image/image_87/87_St_Martin_Terressus_4.jpg","../../jctruffet.com/image/image_87/87_St_Martin_Terressus_5.jpg","../../jctruffet.com/image/image_87/87_St_Martin_Terressus_6.jpg","../../jctruffet.com/image/image_87/87_St_Martin_Terressus_7.jpg"]},"Consult_chateau_formulairead5c":{"id":"Consult_chateau_formulairead5c","dept":"87","canton":"Eymoutiers","commune":"Saint-Méard","nom":"St_Méard","type":"Château","periode":"XI-XII","histoire":"ECHIZADOUR,  André Châtelain, Jean Mesqui et Charles-Laurent Salch saccordent à dater la construction de la tour au  XIIe siècle. A. Châtelain précise que la famille dEschizadour, éteinte vers 1623. En vue du bourg de Saint-Méard se trouve l'antique tour d'Echizadour, seul reste de l'ancien château qui fut le berceau de la famille de ce nom. La seigneurie d'Eschizadour, au cours du XIVe siècle, est transmise à la famille de La Roche, puis à Boson de Mesclajoc à l'occasion de son mariage avec Antoinette de la Roche (1370). Ses petits-enfants, Jean et Pierre de Mesclajoc, sont cités comme co-seigneurs d'Eschizadour dans un acte en date du 1er septembre 1442. Jean fera faire diverses réparations à la tour suivant un contrat qu'il passera avec un charpentier, le 13 octobre 1449. Cette famille abandonnera son patronyme au début du XVIe siècle pour ne plus conserver que celui d'Eschizadour.  Aux siècles suivants, le repaire est toujours occupé comme en témoignent, le 15 novembre 1582, le testament de Pierre d'Eschizadour rédigé au château. Son successeur Florent d'Eschizadour y décède le 16 juin 1753.","architecture":"Tour d'Echizadour, à Saint-Méard se trouve l'antique tour d'Echizadour, le style de cette tour rappelle les constructions du XIe siècle. Elle est carrée, à murailles épaisses, soutenue, sur chaque face, par deux contreforts plats.  Quelques ouvertures ont été retouchées : l'une d'elle était une fenêtre géminée; la colonnette qui la partageait a été brisée. L'intérieur de la tour était entièrement tombé, et le propriétaire, voulant y établir des greniers, y a fait remettre tous les planchers.  St-Meard, La maison d'Echizadour, dont on trouve les armes sur une fenêtre de l'église de Saint-Méard, porte écartelé d'argent et de gueules. Sa généalogie est au Nobiliaire du Limousin. Ce dernier fournit également les caractéristiques architecturales de la tour : donjon à contreforts (6,70 m x 7.60 m de côté) haut de 20- 25 m ; en appareil irrégulier de schiste et de granit ; deux portes au premier étage (à 4,50 m de hauteur) sur les faces nord et ouest ; deux fenêtres géminées, sur les faces nord et ouest également, au second étage . J. Mesqui reprend ce nombre de deux  latrine au sud. Le nombre de baies géminées est erroné car seule louverture face ouest était divisée par une colonnette.","habitants":"Famille dEschizadour\r\n        \"","divers":"Tour d'Echizadour à Saint-Méard","gps":"","images":["../../jctruffet.com/image/image_87/87_St_M%c3%a9ard_1.jpg","../../jctruffet.com/image/image_87/87_St_M%c3%a9ard_2.jpg","../../jctruffet.com/image/image_87/87_St_M%c3%a9ard_3.jpg"]},"Consult_chateau_formulaire68b7":{"id":"Consult_chateau_formulaire68b7","dept":"87","canton":"Eymoutiers","commune":"Saint-Priest-Ligoure","nom":"St_Priest_Ligoure","type":"Château","periode":"XVI","histoire":"Quatre châteaux à Saint-Priest de Ligoure celui d'Eylias, de Freyssinet, de Lavergne; de Tourdonnet, du XIVe siècle, fief de la famille Joussineau de Tourdonnet.\r\n FREYSSINET , du XVIe siècle, avec étang et moulin sur le Ligoure, ancien fief de la famille Joussineau de Tourdonnet puis de Lur. \r\nLAVERGNE, il existait un château en 1573, incendié pendant les guerres de Religion puis restauré. Le nouveau château est édifié vers 1785. Le bâtiment est  attribué à l'architecte Brousseau. La famille des Bony de Lavergne occupe ce magnifique château depuis plus de mille ans. Considérée comme un château dagrément, cette imposante bâtisse a été entièrement restaurée au XVIIIe siècle.\r\nELYAS, château-Elyas à Saint-Priest-Ligoure abritait une étonnante collection d''oeuvres d'art, fruits de l'amitié de la famille de la Celle, aujourd'hui  s-a-r-l de Simon Géraldine Claude Eugénie.","architecture":"ELYAS  manoir de plan carré à deux niveaux flanqué sur sa gauche d'une tour ronde crénelé toiture en poivrière et plein cintre en façade hors oeuvres tour héxagonale, escalier.                                                     FREYSSINET  l'édifice se présente par un corps de logis rectangulaire à trois niveaux  toit en croupes accolé d'une tour ronde toit en poivrière.              LAVERGNE, il présente  un plan en U avec un corps de logis principal rectangulaire et deux ailes en retour d'équerre. Demeure classique mais néanmoins majestueuse, elle a été construite sur un plan simple à double équerre. Avec son jardin à la française entouré de douves,  sur un étage en soubassement s'élèvent un rez-de-chaussée surélevé, un étage et le comble. Les façades sont rigoureusement ordonnancées, mais plusieurs éléments évitent la monotonie. La façade ouest sur cour présente un avant-corps central et un escalier à double révolution. La façade Est postérieure a, de part et d'autre, deux légers décrochements. A l'intérieur, trois pièces possèdent un décor de la fin du règne de Louis XVI. Au rez-de-chaussée, le grand salon d'apparat a ses murs ornés de boiseries moulurées et un parquet en marqueterie. Au premier étage, la chambre a tous ses murs ornés de boiseries de la fin XVIIIe siècle.","habitants":"Seigneur locaux  Famille Joussineau de Tourdonnet                                                               Famille des Bony de Lavergne \r\n        \r\n        \"","divers":"à Saint-Priest de Ligoure lavergne  grav 1 à 3,  de Freyssinet grav 4-5,  Eylias grav 6-7  de Tourdonnet grav-8, GPS : 45° 39' 08\" Nord, 1° 17' 33\" Est.","gps":"45° 39' 08\" Nord, 1° 17' 33\" Est.","images":["../../jctruffet.com/image/image_87/87_St_Priest_Ligoure_1.jpg","../../jctruffet.com/image/image_87/87_St_Priest_Ligoure_2.jpg","../../jctruffet.com/image/image_87/87_St_Priest_Ligoure_3.jpg","../../jctruffet.com/image/image_87/87_St_Priest_Ligoure_4.jpg","../../jctruffet.com/image/image_87/87_St_Priest_Ligoure_5.jpg","../../jctruffet.com/image/image_87/87_St_Priest_Ligoure_6.jpg","../../jctruffet.com/image/image_87/87_St_Priest_Ligoure_7.jpg","../../jctruffet.com/image/image_87/87_St_Priest_Ligoure_8.jpg"]},"Consult_chateau_formulaired0f9":{"id":"Consult_chateau_formulaired0f9","dept":"87","canton":"Saint-Yrieix-la-Perche","commune":"Saint-Yrieix-la-Perche","nom":"St_Yrieix_Perche","type":"Château-Tour","periode":"XII-XVI","histoire":"Deux châteaux à Saint-Yrieix dont Douillac et Tour du Plo et à quelques kilomètres  au sud à le château de Glandon.                                                          DOUILLAC,  bâti à Saint-Yrieix-la-Perche, a été partiellement inscrit aux M.H. depuis le 18/04/1997 (les toitures,les façades et l'escalier intérieur droit).     TOUR du PLO, cette tour fait partie d'une série de donjons limousins du XIIe siècle. C'est un donjon carré présentant quatre niveaux de quatre à cinq mètres chacun avec une corniche au dernier niveau. Les détails architecturaux permettent de le dater des années 1140-1160. En occitan, \"plô\" signifie petit plateau ou place sur un point élevé. La tour est effectivement bâtie en haut de la rue de la Pierre de l'Homme et avait à  son pied une cour ovale. Le deuxième étage de la tour était réservé au vicomte de Limoges lorsqu'il faisait escale; l'entrée était au premier étage, à cinq mètres au-dessus du sol. Le rez-de-chaussée servait de prison et le troisième étage permettait à la garnison des gens d'armes de faire le guet et portait la bannière du vicomte.\r\nGLANDON  Biards, a partir du Ve siècle av. J.-C., les Gaulois Lémovices exploitèrent plus d'une dizaine de mines d'or dans le nord de la commune actuelle. Deux nécropoles du Premier âge du fer et un village peuplé de mineurs ont aussi été retrouvés dans la commune. Ces établissements humains se situaient au sein du district minier de Saint-Yrieix-la-Perche. Lexploitation de ces mines a été arrêtée après la conquête romaine. Rattachée en 1795 à Saint-Yrieix-la-Perche, la commune a été rétablie en 1902.","architecture":"DOUILLAC, la construction date de la 1ère moitié du XVIe siècle. La maison forte a conservé des éléments défensifs (donjon) du début du XVIe siècle, remaniée au XIXe siècle (percement de quelques ouvertures, pose des volets). L'Intérieur a été fortement remanié durant le XIXe siècle.                                                 TOUR DU PLO, la tour vicomtale est un donjon carré (7,90 m de côté) construit en dalles de schiste brun empilées à plat. Lencadrement des baies est en granit blanc soigneusement taillé. Comme ses « cousins » limousins, il est muni sur chaque face de deux contreforts plats. Haut dune vingtaine de mètres, il se compose de quatre niveaux. Le rez-de-chaussée, aveugle, servit de prison (mentions en 1298 et 1317). On accédait à la tour par une porte, en arc légèrement brisé, située au 1er étage sur le mur sud-est (entrée non visible aujourdhui car masquée par la toiture dune maison). Bien que tour non habitable (le logis du prévôt devait servir de résidence) le 2ème étage possède quelques attributs résidentiels : un hourd, balcon, latrines sur la face sud-ouest dont il ne reste que la porte daccès et deux baies dont une géminée. Le 3ème étage possède trois baies géminées dont deux possèdent encore leur colonnette. La baie du sud-est ne conserve que sa pierre dappui.","habitants":"Vicomte. Glandon Biards  \r\n        \"","divers":"St-Yrieix la tour du plo grav 1-2, douillac grav 3, Glandon grav-4.          GPS : 45° 33' 22\" Nord et 1° 10' 36\" Est","gps":"45° 33' 22\" Nord et 1° 10' 36\" Est","images":["../../jctruffet.com/image/image_87/87_St_Yrieix_Perche_1.jpg","../../jctruffet.com/image/image_87/87_St_Yrieix_Perche_2.jpg","../../jctruffet.com/image/image_87/87_St_Yrieix_Perche_3.jpg","../../jctruffet.com/image/image_87/87_St_Yrieix_Perche_4.jpg"]},"Consult_chateau_formulaire061d":{"id":"Consult_chateau_formulaire061d","dept":"87","canton":"Châteauponsac","commune":"Tersannes","nom":"Tersannes","type":"Maison forte","periode":"XV","histoire":"Château de La Mothes, de la fin du XVe siècle, inscrit le 7 janvier 2009 au titre des M.H.depuis 2009.\r\nChâteau du Ricoux dit de la  MOTHE, bâti à Tersannes, la construction date de la fin du XVe siècle. La première mention d'un seigneur de la Mothe remonte à 1490, avec construction d'un édifice en 1491. A partir du XVIIe siècle, le logis ne servit que de résidence occasionnelle. Dans les années 1730, le domaine fut vendu aux soeurs hospitalières de Magnac, puis devint hôpital public à la Révolution.","architecture":"MOTHE, les bâtiments conservés sont disposés selon un plan masse en U autour d'une aire centrale. Ils comprennent un logis en équerre et des dépendances à simple rez-de-chaussée dont une aile forme aussi retour. Un étang bordait autrefois le domaine ; il n'en reste aujourd'hui qu'une mare. Le logis est un bâtiment à deux étages dont l'angle rentrant est occupé par une tour circulaire, à la base de laquelle se trouve la porte d'entrée. Celle-ci présente le principal ornement de la façade, à savoir un imposant linteau creusé en accolade dans lequel a été réservé un écu aux armoiries effacées. Le volume intérieur est desservi par un escalier en vis situé dans la tour placée à l'articulation des deux ailes. Le premier étage conserve des cheminées de la fin de l'époque gothique. Si le logis remonte à 1491, les dépendances sont plus tardives. Deux tours devaient flanquer l'aile sud, à usage de grange à foin. Le château comprenait également une borderie dans l'avant-cour, des jardins enclos de murs ou de haies et peut-être une chapelle.","habitants":"Seigneur de la Mothe\r\n        \"","divers":"Tersannes GPS : 46° 17' 31\" Nord et 1° 07' 40\" Est","gps":"46° 17' 31\" Nord et 1° 07' 40\" Est","images":["../../jctruffet.com/image/image_87/87_Tersannes_1.jpg","../../jctruffet.com/image/image_87/87_Tersannes_2.jpg","../../jctruffet.com/image/image_87/87_Tersannes_3.jpg"]},"Consult_chateau_formulaire78bc":{"id":"Consult_chateau_formulaire78bc","dept":"87","canton":"Bellac","commune":"Thouron","nom":"Thouron","type":"Château","periode":"XVII","histoire":"THOURON, en 1012 Humbert de Thouron effectue une donation en faveur de l'abbaye de Saint-Martial, en 1260  l'un de ses successeurs  Pierre de la Celle abandonne ses droits à l'abbaye de Grammont les biens passe ensuite au XVIe siècle  au Faulcon, Hélène de Faulcon porte le domaine en dot à Albert de Cousse et  en 1617  Thouron saisi en 1620 est adjugé à Pierre de Fontréaulx, à sa mort en 1634 le fief confisqué par le roi puis attribué en 1637 aux Dupeyrat , Jacques Dupeyrat trésorié  de France  ce dernier reconstitue à son profit la seigneurie et obtient la nomination de Baronnie, en 1750 Joseph Dupeyrat fait démolir la vieille maison forte et fait bâtir le château, En 1810, les Dupeyrat cèdent  Thouron à Pascal Eudel ancien directeur des douanes à Hambourg. Vingt ans plus tard Pascal Eudel se s\"épare du domaine au profit de Charles-Antoine du Breuil Hélion de la Guéronnière inspecteur général des hôpitaux sous le régne de Charles X, à sa mort en 1839 Thouron revient à son fils Alfred resté dans cette famille jusqu'au lendemain de la seconde guerre mondiale puis passe à monsieur Palot Coudert qui le restaure appartient aujourd'hui  à monsieur Jorg Demus.","architecture":"THOURON, splendide chateau du XVIIIe siècle de plan massé, réalisé par l'architecte Broussaud,   le corps de logis en granit élevé sur un terre plein formant une terrasse, sa façade principale couronnée par un fronton qui se caractérise par des ouvertures régulières et de très beaux volumes dont les façades sont réhaussées par des chaînages en pierres de taille. La façade principale est ornée d'un très bel escalier en fer à cheval à une volée. Le château offre plus de 1.000m² habitable sur 4 niveaux, dont 14 pièces principales : 1 hall d'entrée, 3 salons de réception en enfilade avec de très belles cheminées. Le sous-sol s'étend sous toute la surface et comprend de nombreuses pièces de service. Le grenier est aménageable sur toute la surface et fait apparaître une charpente magnifique.","habitants":"Famille de  Jacques Dupeyrat\r\n        \"","divers":"A thouron le châtreau de Thouron et de Roussac grav 3","gps":"","images":["../../jctruffet.com/image/image_87/87_Thouron_1.jpg","../../jctruffet.com/image/image_87/87_Thouron_2.jpg","../../jctruffet.com/image/image_87/87_Thouron_3.jpg"]},"Consult_chateau_formulairea6d3":{"id":"Consult_chateau_formulairea6d3","dept":"87","canton":"Saint-Léonard de Noblat","commune":"Saint-Priest-Taurion","nom":"Tourniol","type":"Château","periode":"XVIII","histoire":"TOURNIOL, édifié en 1789, fut une résidence secondaire de larchitecte Brousseau. On y accède par une allée rectiligne de 300 mètres de long, bordée dalignements de chênes. Elle aboutit à un grand portail en pierre de taille qui fut emprunté à lhôtel particulier que monsieur  Brousseau possédait place du Champ-de-Foire à Limoges.","architecture":"TOURNIOL, une partie du parc paysager qui lentoure, ainsi quun grand corps de ferme, Il nest pas accessible au public. Le château occupe une situation remarquable sur le rebord dun vaste plateau dominant la  vallée du Taurion, ici particulièrement  encaissée. Protégé pour son aspect pittoresque,  la configuration escarpée du relief confère au site une identité forte, dont le château tire parti pour sa mise en scène. Au pied du site, environ 120 mètres plus bas, la rivière se dissimule sous dépaisses masses boisées.  Lédifice cadre la vue sur le château et marque lentrée de la cour dhonneur. La façade nord-ouest du château est percée  sur deux niveaux douvertures de dimensions différentes contrairement à celle tournée vers la vallée, dun aspect plus régulier et flanqué dune tour ronde.","habitants":"Famille de  Brousseau\r\n        \r\n        \"","divers":"Saint-Priest-Taurion château de Tourniol","gps":"","images":["../../jctruffet.com/image/image_87/87_Tourniol_1.jpg"]},"Consult_chateau_formulaire02c4":{"id":"Consult_chateau_formulaire02c4","dept":"87","canton":"Eymoutiers","commune":"Vicq sur Breuilh","nom":"Traslage","type":"Château","periode":"XIII-XVII","histoire":"TRASLAGE,  bâti à Vicq-sur-Breuilh, le domaine de Traslage a évolué au fil du temps, avec ses propriétaires et ce depuis le XIIIe siècle. La construction du château actuel sachève au début du XVIIe siècle. Son commanditaire, Jean Nicolas de Traslage a été Consul de Limoges en 1595, conseiller du roi au siège présidial de la même ville et député des États-Généraux de 1614. Parmi les héritiers de Traslage, il y a Gabriel Nicolas de La Reynie, baron de Vicq, célèbre lieutenant général de police de Louis XIV et conseiller dEtat. Puis, au XIXe siècle, la famille du marquis de Calignon devient propriétaire des lieux et réaménage les bâtiments et le jardin. Ils dotent la maison de boiseries, ils construisent une chapelle de style gothique, un châtelet dentrée de style renaissance et un pavillon de brique de style Louis XIII. Le château est vendu à un descendant de Gilonne Nicolas de Traslage, Maurice Ruchaud qui réalise dimportants travaux. Aujourdhui, cest sa fille, la marquise Jeanine de Villelume, devenue propriétaire qui poursuit les nombreux travaux de restauration entrepris.","architecture":"TRASLAGE est constitué d'un corps de logis rectangulaire du XVII siècle, d'un pavillon barlong du XIXe siècle, avec une tour engagée sur sa façade occidentale, d'un avant-corps d'entrée rectangulaire, aux angles abattus, élevé au XIXe devant la façade nord, d'une tour ronde datant du XIXe siècle, à l'angle sud-est du corps de logis et d'une chapelle du XIXe siècle, à l'angle nord-est du corps de logis. Le pigeonnier date du XVIIe siècle. Les écuries du XIXe siècle. A l'intérieur du château de Traslage, les pièces sont ornées de belles boiseries. Au centre du corps de logis s'élève l'escalier tournant à droite, à volées droites et à jour central, inscrit dans une cage carrée. Il est en bois à balustres plats, réunis à leur base et à leur sommet par des arcs moulurés, dispositif caractéristique des escaliers limousins du XVIIe siècle. Les vitraux de la chapelle ont été réalisés en 1884, par le maitre-verrier Henri Fleur. Le château de Traslage est inscrit aux M.H. depuis 1992.","habitants":"Famille de Traslage\r\n        \"","divers":"Vicq sur Breuilh Traslage GPS : 45° 41' 15\" Nord et 1° 23' 44\" Est","gps":"45° 41' 15\" Nord et 1° 23' 44\" Est","images":["../../jctruffet.com/image/image_87/87_Traslage_1.jpg","../../jctruffet.com/image/image_87/87_Traslage_2.jpg","../../jctruffet.com/image/image_87/87_Traslage_3.jpg","../../jctruffet.com/image/image_87/87_Traslage_4.jpg"]},"Consult_chateau_formulaire14f5":{"id":"Consult_chateau_formulaire14f5","dept":"87","canton":"Ambazac","commune":"St-Laurent les Eglises","nom":"Valmate","type":"Château","periode":"XIX","histoire":"VALMATE, bâti à Saint-Laurent-les-Eglises,  la construction date de 1858 à 1907. L'architecte de ce magnifique château était Jean-Baptiste Mignon, qui en fut le propriétaire initial. Une chapelle de goût néo-Renaissance a été rajoutée par sa fille en 1905-1907. situé au pied des Monts d'Ambazac. En 1993, fut complètement pillé et a fait  depuis lors l'objet d'une restauration en profondeur.  Le château de Valmate a été transformé en chambres d'hôtes de qualité,  Jean Baptiste Mignon, ingénieur et célèbre dépositaire d'une centaine de brevets d'invention, collaborateur d'Eiffel, Aujourd'hui, propriétaire : Mme Duchambon Françoise.","architecture":"VALMATE, fut construit, à la fin du XIXe siècle, Il est de style Louis XIII, autour du château, un parc romantique fut créé avec ses étangs, ses fabriques et ses allées ombragées. Ce château bénéficie d'un magnifique parc paysager possédant des pièces architecturales originales, dont une copie impressionnante de l'escalier de la Légion d'honneur de Paris. On y admire aussi des serres superbes, ainsi qu'une orangeraie et un étang aux ponts de rocaille, où fleurissent des rhododendrons. Ce parc à l'anglaise, créé en collaboration avec le paysagiste André Laurent a conservé des arbres d'origine. D'autres essences furent importées d'Amérique, comme cela se faisait fréquemment en cette fin de XIXe siècle.  Ce château fait lobjet dune inscription partielle aux M.H. depuis le 19/12/1996.","habitants":"Famille de  Jean Baptiste Mignon\r\n        \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_87/87_Valmate_1.jpg","../../jctruffet.com/image/image_87/87_Valmate_2.jpg","../../jctruffet.com/image/image_87/87_Valmate_3.jpg","../../jctruffet.com/image/image_87/87_Valmate_4.jpg","../../jctruffet.com/image/image_87/87_Valmate_5.jpg"]},"Consult_chateau_formulaire5711-2":{"id":"Consult_chateau_formulaire5711-2","dept":"87","canton":"Ambazac","commune":"Saint-Pardoux","nom":"Vauguenige","type":"Château","periode":"XIX","histoire":"VAUGUENIGE, est une maison de maître du début XIXe siècle comprenant dix chambres d'hôtes et plusieurs réceptions confortables. C'était avant 1599, François Faulcon, seigneur de Saint-Pardoux, Thouron, etc.. , voulant vendre sa terre de St-Pardoux à monsieur de Douhet, seigneur de Compreignac, fournit un dénombrement de ses biens dont le château de Saint-Pardoux (l'actuelle mairie est située, en partie, sur l'emplacement des douves) . De la construction  XVIe-XVIIe d'origine, que l'aile est reste aujourd'hui, maintenant aménagé en appartement privé des propriétaires. Depuis leur acquisition de la maison, Marick et Alain Claude l'ont beaucoup rénové et aménagé.","architecture":"VAUGUENIGE, le château est composé d'un donjon flanqué de trois tours où il y a des gardes en armes. Le logis neuf, fait dans la ceinture du donjon, compte six chambres, une salle, une cuisine, boulangerie, cave, grenier et écurie pour dix chevaux. Le tout étant entouré de fossés. Au milieu de la basse-cour un puits. Depuis très longtemps les vestiges du château de Saint-Pardoux ont disparus.","habitants":"Famille de  François Faulcon\r\n        \r\n        \r\n        \"","divers":"St-Laurent les Eglises  Valmate  GPS : 45° 59' 11\" Nord, 1° 29' 53\" Est","gps":"45° 59' 11\" Nord, 1° 29' 53\" Est","images":["../../jctruffet.com/image/image_87/87_Vauguenige_1.jpg","../../jctruffet.com/image/image_87/87_Vauguenige_2.jpg","../../jctruffet.com/image/image_87/87_Vauguenige_3.jpg"]},"Consult_chateau_formulaired9c3":{"id":"Consult_chateau_formulaired9c3","dept":"87","canton":"Bellac","commune":"Vaulry","nom":"Vaulry","type":"Château","periode":"XV-XIX","histoire":"VAULRY,   bâti à Vaulry,   Il reste un édifice qui appartient à la même famille depuis le XIIIe siècle. Pas d'autre information historique.","architecture":"VAULRY,  bâti à Vaulry,  est formé de deux corps de logis à l'équerre. C'est un ensemble bâti remarquable dont la construction s'échelonne du XVe au XIXe siècle. Il reste un édifice qui appartient à la même famille depuis le XIIIe siècle, de plan en U, le corps de logis principal   de plan rectangulaire à deux niveaux, toit à la Mansard   avec lucarnes en façade.    \r\nJOUHE pas d'information, corps de logis rectangulaire à deux niveaux et lucarnes sur comble couvert d'ardoise.","habitants":"Famille de Vaulry\r\n        \r\n        \r\n        \"","divers":"Vaulry  grav 1 à 4 Jouhe grav-5       GPS : 46° 01' 24\" Nord, 1° 05' 12\" Est","gps":"46° 01' 24\" Nord, 1° 05' 12\" Est","images":["../../jctruffet.com/image/image_87/87_Vaulry_1.jpg","../../jctruffet.com/image/image_87/87_Vaulry_2.jpg","../../jctruffet.com/image/image_87/87_Vaulry_3.jpg","../../jctruffet.com/image/image_87/87_Vaulry_4.jpg","../../jctruffet.com/image/image_87/87_Vaulry_5.jpg"]},"Consult_chateau_formulaire7171":{"id":"Consult_chateau_formulaire7171","dept":"87","canton":"Châteauponsac","commune":"Verneuil-Moustiers","nom":"Verneuil_Moutiers","type":"Château","periode":"XV","histoire":"A Verneuil le château de Faon, de la Tour de Paulmes de Lussac et à deux kilomètres à l'est le  château de l'Ages Bernard à Lussac.                                                   FAON, domaine du Faon, construit en 1850, est entouré d'un parc de 15 ha avec des arbres centenaires et une nature préservée. Ce domaine avec ses dépendances est le lieu idéal pour vos fêtes.\r\nTOUR aux PAULMES, bâti à Verneuil-Moustiers,  est inscrit aux M.H. depuis 2010.  Les Paulmez qui laissèrent leur nom au château dont-il était seigneurs de la Tour en 1373 et 1379 et trés probablemenrt depuis plusieurs siècles, puisque à la fin du XIe siècle, un Humbert de Palmut est témoin à une donation du seigneurs de Ricous à l'église de Tersannes. La Tour aux Paulmes  qui se trouvait dans l'ancienne paroisse de Moutiers, passa ensuite à la famille Richard de Latour qui possède cette terre sans interruption depuis au  moins 1640.                                                         LUSSAC Jusquen 1880, Lussac-les-Eglises ne comptait quune demeure seigneuriale ou de grande bourgeoisie, cétait le « Château de Lussac » dit « La Borderie », ancien château de lAge-Bernard dépoque médiévale. En 1789, voyant venir la Révolution, ses habitants sétaient déclarés « bordiers » ; cest-à-dire paysans affranchis, jouissants dun statut leur assurant une sorte de protection. Effectivement ils ne furent pas inquiétés et le château demeura intact pendant la grande tourmente. En 1913, M. Émile de Cressac Bachelerie achète le château de Lussac aux héritiers Ernoul et sy installe. Le château est actuellement la propriété de monsieur et madame Lucien Chaustier.","architecture":"LUSSAC Une troisième maison, construite par M. Maublant en 1883-1884 est située hors du bourg de Lussac-les-Eglises, près du hameau La Vozelle. Son dessin toujours du style « fin du second Empire » est plus important et peut sapparenter à un château car il comporte un corps de bâtiment central flanqué de deux ailes en proéminence. Il est habité, surtout au titre de résidence dété par la famille de La Faverie du Ché, descendant de son constructeur M. Maublant. A partir de 1883, létablissement de ces trois familles à Lussac les Églises procurera un regain dactivité à ce bourg dont lisolement, tout au Nord de la Haute-Vienne, lui donnait une figure de « parent-pauvre », devant de petites cités comme Le Dorat, Magnac-Laval ou Saint Sulpice les Feuilles.","habitants":"Famille de Paulmez Famille Richard de Latour        M. Émile de Cressac Bachelerie \r\n        \r\n        \r\n        \r\n        \"","divers":"A Verneuil Moustiers; de Fan grav 5-6-7, de la Tour de Paulmes de Lussac, l'Ages, Bernard à Lussac.    GPS : 46° 19' 41\" Nord et 1° 06' 40\" Est","gps":"46° 19' 41\" Nord et 1° 06' 40\" Est","images":["../../jctruffet.com/image/image_87/87_Verneuil_Moutiers_1.jpg","../../jctruffet.com/image/image_87/87_Verneuil_Moutiers_2.jpg","../../jctruffet.com/image/image_87/87_Verneuil_Moutiers_3.jpg","../../jctruffet.com/image/image_87/87_Verneuil_Moutiers_4.jpg","../../jctruffet.com/image/image_87/87_Verneuil_Moutiers_5.jpg","../../jctruffet.com/image/image_87/87_Verneuil_Moutiers_6.jpg","../../jctruffet.com/image/image_87/87_Verneuil_Moutiers_7.jpg","../../jctruffet.com/image/image_87/87_Verneuil_Moutiers_8.jpg","../../jctruffet.com/image/image_87/87_Verneuil_Moutiers_9.jpg"]},"Consult_chateau_formulairead4f-2":{"id":"Consult_chateau_formulairead4f-2","dept":"87","canton":"Aixe-sur-Vienne","commune":"Verneuil sur Vienne","nom":"Verneuil_Vienne","type":"Château","periode":"XIII-XV-XIX","histoire":"quatre châteaux à Verneuil sur Vienne, Pennevayre, La Gabie, Lespinasse et Pagnac.                         Le château de PENNEVAYRE est une magnifique demeure féodale datant du XIIIe siècle. Il reste le château de Pennevayre qui hébergea Louis XI ainsi que de belles demeures seigneuriales dissimulées dans les parcs privés. Au XIXe siècle, la commune est surnommée \"le Jardin de Limoges\" à cause de ses nombreux maraîchers.\r\nLA GABIE La société Le moulin de l a Gabie, immatriculée il y a 23 ans, produit de l'électricité. La gérante actuelle de l'entité est Mme Genevieve Duvert. Les locaux de cette société se situent château de la Gabie dans la commune de Verneuil Sur Vienne.         LESPINASSE est un ancien pavillon de chasse de 1842.                                                                            PAGNAC,  château construit début du troisième quart XIXe siècle ainsi que les communs pour Jean-Baptiste Alluaud.","architecture":"PAGNAC,  la date de  1859 est portée sur une cheminée ; édifié près de l'emplacement d'une ancienne maison de maître bâtie au XVIIIe siècle et démolie entre 1848 et 1859. Le château est composé d'un bâtiment principal avec avant-corps central à trois côtés, côté sud, couvert d'un toit à croupe et d'un second bâtiment perpendiculaire au premier, couvert d'un toit à longs pans. La tour, de plan octogonal, est aménagée dans l'angle nord-ouest du bâtiment principal, couverte d'une flèche polygonale. Petit bâtiment couvert d'une terrasse, accolé au bâtiment principal ; étage de comble éclairé par des lucarnes ; chapelle à chevet plat et toit à longs pans, en ardoise, située sur une terrasse accessible par deux escaliers en pierre, délimitée à l'ouest par un mur orné d'une croix.\r\nPENNEVAYRE, le plan présente un corps de logis encadré de deux pavillons au nord et une aile en retour à l'ouest. Cette dernière se terminait autrefois par une tour ronde. Des arrachements se voient encore. La toiture du pavillon Est a été abaissée par économie lors d'une réfection vers 1955. Le château a conservé son unité d'édifice remanié au XVIe siècle. A l'intérieur, la chambre dite de Louis XI a conservé une cheminée du XVe siècle. Deux salles du XVIe siècle conservent des poutres moulurées, sculptées de motifs de cuirs, sans doute peints à l'origine.","habitants":"Pagnac Jean-Baptiste Alluaud\r\n        \r\n        \r\n        \"","divers":"à Verneuil sur Vienne, La Gabie, Pennevayre grav -1-2-3 Lespinasse grav-4-5_6    et  Pagnac-7.  Prévoté Grav-9                        GPS : 45° 50' 52\" Nord et 1° 07' 39\" Est","gps":"45° 50' 52\" Nord et 1° 07' 39\" Est","images":["../../jctruffet.com/image/image_87/87_Verneuil_Vienne_1.jpg","../../jctruffet.com/image/image_87/87_Verneuil_Vienne_2.jpg","../../jctruffet.com/image/image_87/87_Verneuil_Vienne_3.jpg","../../jctruffet.com/image/image_87/87_Verneuil_Vienne_4.jpg","../../jctruffet.com/image/image_87/87_Verneuil_Vienne_5.jpg","../../jctruffet.com/image/image_87/87_Verneuil_Vienne_6.jpg","../../jctruffet.com/image/image_87/87_Verneuil_Vienne_7.jpg","../../jctruffet.com/image/image_87/87_Verneuil_Vienne_8.jpg","../../jctruffet.com/image/image_87/87_Verneuil_Vienne_9.jpg"]},"Consult_chateau_formulaire6247":{"id":"Consult_chateau_formulaire6247","dept":"87","canton":"Couzeix","commune":"Veyrac","nom":"Veyrac","type":"Château","periode":"XI-","histoire":"La commune de Veyrac abrite d'autres châteaux ou manoirs Le Buisson, Estivaux, La Barre. Le noyau ancien du bourg s'est formé autour du vieux château .                                                                     VEYRAC  Les vestiges de l'ancien château féodal date du Xle siècle. C'est Jean de Veyrac, prévôt de Saint-Junien, devenu le 51e évêque de Limoges qui a fait construire ce château. Ce dernier servait de repaire aux compagnons de Jean de Veyrac durant la guerre sainte contre Jean Sans Terre. L'actuelle demeure a été reconstruite sur les vestiges de l'ancienne bâtisse féodale en grande partie détruite lors de la Révolution. De cette époque datent également la destruction du pont-levis et le comblement des fossés autour du château. Chateau-fort Veyrac  château construit pour Jean de Veyrac évêque de Limoges en 1198.","architecture":"Le pont Colombier de Veyrac, appartenant au château, a été construit au début du XVIIe siècle. Enjambant le ruisseau du Glanet, lédifice, de plan rectangulaire, construit en pierre de taille et moellons, recouvert dun toit à croupes en tuiles creuses, présente deux niveaux. Le premier, faisant office de pont couvert, servait daccès au verger seigneurial,  pigeonnier pont datant du XVIIe siècle, existait un deuxième pigeonnier détruit au cours d'une inondation subsistent de ce pigeonnier détruit deux pierres réemployés dans l'élévation ouest du logis actuel; le corps de logis actuel est aménagé au milieu du XVIIIe siècle dans une partie des écuries de 1789: inscrit sur linteau de la porte; pendant la Révolution, destruction de l'ancien logis seigneurial; actuellement douves comblées et le parc aménagé sur l'emplacement de l'ancienne cour et basse-cour, reste aujourd'hui le donjon de plan octogonal. Le château a été classé M.H. en 1973.                                                                                BARRE, Tour accolée au logis et anciens communs possédant une grande cheminée en pierre sculptée datant du XVIIe siècle ; le logis daté du XVIIIe siècle. élévation à travées  en rez-de-chaussée ; un étage carré ; étage en surcroît, escalier dans-oeuvre , toit en croupe à longs pans\r\n tuile plate .","habitants":"\"","divers":"A Veyrac pont Grav-1","gps":"","images":["../../jctruffet.com/image/image_87/87_Veyrac_1.jpg","../../jctruffet.com/image/image_87/87_Veyrac_2.jpg"]},"Consult_chateau_formulaire3779":{"id":"Consult_chateau_formulaire3779","dept":"87","canton":"Couzeix","commune":"Veyrac","nom":"Veyrac_Cosse","type":"Château","periode":"XVII-XVIII","histoire":"Veyrac   deux autres châteaux dans le bourg : Château d'Estivaux ou Eytivaud ou Etivaud du XVIIIe siècle et le château de la Cosse du XVIIIe siècle :    \r\nBUISSON, bâti à Veyrac,  la construction date du XVIIe siècle. Il existe deux autres châteaux dans le bourg : Château Estivaux du XVIIIe siècle et le château de la Cosse du XVIIIe siècle : fut construit par l'architecte Joseph Brousseau pour un riche drapier de Limoges. De style classique, il unit à la fois la monumentalité classique et la simplicité rurale.           La COSSE,  construit en 1763 par l'architecte Joseph Brousseau pour M. de Villoutreys de Brignac  appartenait à son neveu à la Révolution à M. du Chatenet dont le beau frère M.  de Maldan  eut l'honneur d'accompagner Louis XVI lors de la fuite à Varennes 1857 : création du parc paysager agricole par le comte de Choulot. 1977 : classé au titre des M.H., façades et toitures du château, son premier propriétaire fut Joseph Morel écuyer, seigneur de Montandeix, capitaine au régiment de Clermont et prince d'Infanterie. Il mourra au château  en 1781. Aujourd'hui, le château de la Cosse propose la location de ses salles,  toujours dans la famille de Chatenet. \r\nESTIVAUX,  bâti à Veyrac, la construction date du XVIIIe siècle. La première mention de la terre d'Etivaud date de 1125, il est inscrit aux M.H. depuis 1996.","architecture":"BUISSON  De style classique, il unit à la fois la monumentalité classique et la simplicité rurale.             La COSSE,  de style classique, le château réunit, la monumentalité classique et la simplicité rurale. Placé au cur d'un parc paysager agricole,  corps logis de plan rectangulaire à deux niveaux, avant corps saillants de trois travées avec fronton triangulaire sur comble, et cordon.   Toiture  Il reçut sa nouvelle couverture d'ardoise qu'en 1870.      ESTIVAUX , la Tour date de la fin du XIVe siècle, le corps de logis des XVe au XVIIe siècles. La chapelle existe en 1770. L'intérieur conserve un escalier en bois du  XVIIe siècle, aux balustres moulurés. La chambre de l'étage a conservé un décor Louis XVI. La charpente présente une suite de fermes serrées aux entraits retroussés. Sous l'extrémité Est du corps de logis, se trouve un souterrain, en berceau plein cintre.   La première  mention de la terre d'Etivaud apparaît en 1125. Le château a été construit entre 1769 et 1773 pour Martial Baillot d'Estivaux, date 1773, mentionnée sur la porte. D'après l'abbé Lecler, la chapelle et la tour furent démolies au siècle dernier, reconstruction d'une chapelle dans le quatrième quart du XIXe siècle ou le premier quart du XXe siècle ; travaux de restauration (couverture) en 1982.","habitants":"Cosse Famille de de Villoutreys de Brignac             Estivaux Martial Baillot d'Estivaux,\r\n        \r\n        \r\n        \"","divers":"Buisson  53' 47\" Nord et 1° 06' 24\" Est                                                                                Estivaux  grav 4-5-6 GPS : 45° 37' 51\" Nord et 1° 21' 07\" Est                                                                              Cosse Grav 1-2-3  GPS : 45° 52' 27\" Nord et 1° 07' 40\" Est","gps":"45° 37' 51\" Nord et 1° 21' 07\" Est","images":["../../jctruffet.com/image/image_87/87_Veyrac_Cosse_1.jpg","../../jctruffet.com/image/image_87/87_Veyrac_Cosse_2.jpg","../../jctruffet.com/image/image_87/87_Veyrac_Cosse_3.jpg","../../jctruffet.com/image/image_87/87_Veyrac_Cosse_4.jpg","../../jctruffet.com/image/image_87/87_Veyrac_Cosse_5.jpg","../../jctruffet.com/image/image_87/87_Veyrac_Cosse_6.jpg"]},"Consult_chateau_formulairebd50":{"id":"Consult_chateau_formulairebd50","dept":"87","canton":"Eymoutiers","commune":"Vicq-sur-Breuilh","nom":"Vicq_Breuilh","type":"Château","periode":"XVI","histoire":"VICQ, bâti, au lieu-dit Le Vieux-château, à Vicq-sur-Breuilh,  est inscrit aux M.H. depuis 1996, cette demeure appartint aux  La Roche Aymon, aux Bermondie, aux Reynie, aux Calignon, aux Montbron puis aux Blomac. En 1793, la Révolution, marque fortement le vieux château.\r\nLouise-Antoinette de Calignon qui habite le château, est saisie par les révolutionnaires, hissée malgré son grand âge sur une charrette à buf et, par une nuit de novembre, transportée en cet équipage à Limoges pour y être emprisonnée. Le froid, les fatigues de la route et la frayeur ont raison de cette malheureuse femme, qui meurt pendant le trajet. Son fils Louis est de son côté emprisonné ainsi que sa femme, Sophie de Bonneval, et ce nest que quelques mois plus tard, sur la demande de la municipalité de Vicq, quils sont remis en liberté. Pendant ces événements, le château reste à la garde dun fermier nommé Maraval.","architecture":"VICQ, cette demeure seigneuriale de la première Renaissance a conservé des éléments sculptés de cette époque. Le château fut édifié entre 1514 et 1542. La façade sur cour a conservé, au rez-de-chaussée, les culots et les départs des nervures de l'ancienne galerie. La façade arrière est percée d'un ensemble de fenêtres du XVIe siècle. A l'intérieur, cette construction a également conservé son authenticité avec sol en galets, plafonds à solivages apparents, cheminées en pierre de taille. Les tours rondes, à l'arrière du corps de logis, découronnées à la Révolution, ont conservé leurs jambages de baies et de cheminées aux moulurations du  XVIe siècle. La tour carrée d'escalier, sur cour, présente un décor de façade de la première Renaissance. Le bâtiment abrite un escalier en vis dont subsistent quatorze marches. Les dépendances formant une cour fermée ont des parties remontant au XVIe siècle et d'autres à la fin du XVIIe siècle. De légers remaniements ont été réalisés au XIXe siècle. Le plan cadastral de 1831 indique la présence de douves en eau sur trois côtés du quadrilatère formé par le château et ses dépendances. Il en reste les fossés de terre. A l'arrière du château, se trouve une longue terrasse étayée de trois murs, le mur central étant flanqué de deux tourelles. Aujourd'hui, cette ancienne demeure seigneuriale est devenu un lieu de résidences artistiques.","habitants":"Famille de  La Roche Aymon\r\n        \r\n        \r\n        \"","divers":"","gps":"","images":["../../jctruffet.com/image/image_87/87_Vicq_Breuilh_1.jpg","../../jctruffet.com/image/image_87/87_Vicq_Breuilh_2.jpg","../../jctruffet.com/image/image_87/87_Vicq_Breuilh_3.jpg","../../jctruffet.com/image/image_87/87_Vicq_Breuilh_4.jpg","../../jctruffet.com/image/image_87/87_Vicq_Breuilh_5.jpg"]},"Consult_chateau_formulaire20f6":{"id":"Consult_chateau_formulaire20f6","dept":"87","canton":"Eymoutiers","commune":"Vicq-sur-Breuilh","nom":"Vicq_Sur_Breuilh","type":"Château","periode":"XVII-XVII","histoire":"Deux châteaux à Vicq sur Breuilh(voir article)  Fargeas, maison forte, Nouaillas et Traslage (voir article).  Le Vieux Château qui domine le bourg, château féodal tardif remanié à la Renaissance (ISMH), de Puy-Mory pas d'information historique.\r\nCOMBAS, la création de l'entité  remonte à mai 2011. Marie-Catherine  et Louis-Marie-Pierre-François Dufour de Neuville sont les gérants actuels de l'entité ; son siège est installé à Vicq Sur Breuilh. Ayant un capital social  la société loue et exploite des terrains et des immeubles non résidentiels.\r\nFARGEAS,  est une maison bâti à Vicq-sur-Breuilh, sa contruction date de 1636 à 1738. Cette maison est appelée localement maison de Mirabeau, mais aucun document n'atteste cette assertion. Elle aurait appartenu au marquis Victor Honoré de Mirabeau, marié en 1743 à Geneviève de Vasson qui aurait reçu la maison en dot. En 1750, la marquise de Vasson, mère de Geneviève, exploita les mines de plomb argentifère de Glanges dont un puits était situé près de Fargeas.  Le Logis de Fargeas est inscrit aux M.H. depuis 1992.                                                                                                             NOUAILLAS  bâti à Vicq-sur-Breuilh, Jean de Salagnac, protonotaire du Saint-Siège, prieur du Cercle de Talmont en Saintonge, curé de Treignac et Neuvic, chanoine de Périgueux, hérita de la seigneurie de Vicq en 1515 et y fit construire le château, est devenu la propriété d'une personne privée. Le château de Nouailhas est inscrit aux M.H. depuis le 18/09/1992.","architecture":"FARGEAS, l'édifice remonte au début du XVIIe siècle. La façade principale est percée d'une porte en plein cintre, flanquée de deux pilastres à impostes qui s'élèvent au-dessus de l'arc jusqu'à un fronton ouvert d'où partent des jambages de pierre de taille jusqu'à l'appui mouluré de la fenêtre du premier étage. A l'intérieur, les salles de part et d'autre de l'escalier, ont une cheminée monumentale avec des jambages à pilastres de granit, à bases et chapiteaux moulurés, les mêmes dispositions de salles se retrouvent au premier étage, les dépendances comprennent des granges et des étables, elles forment un long bâtiment de la maison à la métairie. La partie la plus proche de la maison est antérieure à 1830, le four est semi-circulaire et présente une ouverture en arc bombé, soulignée de briques, le puits est également semi-circulaire, sans margelle, couvert d'un toit à un seul pan.\r\nNOUAILLAS, le corps de logis et les dépendances furent bâties au XVIIe siècle, le domaine se compose d'un corps de logis rectangulaire avec deux petites ailes d'habitation dans l'axe et deux grandes ailes de dépendances en retour. Au nord, la façade principale a gardé son homogénéité d'origine. A l'intérieur, au centre du bâtiment, se trouve l'escalier droit, à deux volées avec paliers de repos. Il a une balustrade en bois dont les balustres sont en candélabres. L'escalier desservait deux pièces de part et d'autre, à chaque niveau, avec plafonds à la française.","habitants":"Fargeas marquis Victor Honoré de Mirabeau\r\n        \r\n        \"","divers":"VICQ GPS : 45° 38' 50\" Nord et 1° 23' 07\" Est","gps":"45° 38' 50\" Nord et 1° 23' 07\" Est","images":["../../jctruffet.com/image/image_87/87_Vicq_sur_Breuilh_1.jpg","../../jctruffet.com/image/image_87/87_Vicq_sur_Breuilh_2.jpg","../../jctruffet.com/image/image_87/87_Vicq_sur_Breuilh_3.jpg","../../jctruffet.com/image/image_87/87_Vicq_sur_Breuilh_4.jpg","../../jctruffet.com/image/image_87/87_Vicq_sur_Breuilh_5.jpg","../../jctruffet.com/image/image_87/87_Vicq_sur_Breuilh_6.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-info').textContent=(x+1)+'/'+i.length;document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;document.getElementById('lb-img').src=lbI[lbX];document.getElementById('lb-info').textContent=(lbX+1)+'/'+lbI.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose();if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);}});
function showDet(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('ci-'+id);if(si){si.classList.add('active');si.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(!c)return;
  const imgs=c.images||[];
  window._heroImgs=imgs;window._heroNom=c.nom||'';const hero=imgs.length?`<div class="photo-hero"><div class="hero-wrap"><img class="hero-main" id="hero-main" src="${imgs[0]}" alt="${c.nom||''}" onerror="this.style.display='none'" onclick="lbOpen(window._heroImgs,0)"><div class="hero-count" id="hero-count">1 / ${imgs.length}</div></div><div class="photo-strip">${imgs.map((s,i)=>`<img src="${s}" loading="lazy" class="${i===0?'active':''}" onclick="setHeroIdx(this,${i})" onerror="this.style.display='none'">`).join('')}</div></div>`:'<div class="no-photo">🏰</div>';
  const rows=[['Département','87 — Haute-Vienne'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v).map(([t,v])=>`<div class="sb-blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('det').innerHTML=`<h2 class="ftitle">${c.nom}</h2>${hero}<table class="itbl" style="margin:16px 0;max-width:560px"><tbody>${rows}</tbody></table>${secs}`;
}
function renderSB(items){
  document.getElementById('sbb').innerHTML=items.map(c=>{const th=c.img?`<img class="ci-th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=ci-ph>🏰</div>'">`:'<div class="ci-ph">🏰</div>';const b=c.type?`<span class="ci-badge">${c.type}</span>`:'';return `<div class="ci" id="ci-${c.id}" onclick="showDet('${c.id}')">${th}<div class="ci-lb"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;}  ).join('');
  document.getElementById('sbc').textContent=items.length+' édifice(s)';
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();renderSB(q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB);}
renderSB(SB);
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
