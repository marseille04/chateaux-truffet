 42' 29\" Est . Rocher GPS : 45° 42' 47\" Nord et 0° 41' 26\" Est  Grav de4 à 9","gps":"45° 44' 01\" Nord et 0° 42' 29\" Est . Rocher GPS : 45° 42' 47","images":["../../jctruffet.com/image/image_87/87_Lavauguyon_1.jpg","../../jctruffet.com/image/image_87/87_Lavauguyon_2.jpg","../../jctruffet.com/image/image_87/87_Lavauguyon_3.jpg","../../jctruffet.com/image/image_87/87_Lavauguyon_4.jpg","../../jctruffet.com/image/image_87/87_Lavauguyon_5.jpg","../../jctruffet.com/image/image_87/87_Lavauguyon_6.jpg","../../jctruffet.com/image/image_87/87_Lavauguyon_7.jpg","../../jctruffet.com/image/image_87/87_Lavauguyon_8.jpg","../../jctruffet.com/image/image_87/87_Lavauguyon_9.jpg"]},"Consult_chateau_formulairef687-2":{"id":"Consult_chateau_formulairef687-2","dept":"87","canton":"Condat-sur-Vienne","commune":"Le Vigen","nom":"Le_Vigen","type":"Château","periode":"XV-XVII-XIX","histoire":"Six châteaux à le Vigen dont celui d'Age, de Renou, de  Ligoure, le Mas du Puy et le Mas le Font dont je n'ai pas d'information pour ces deux derniers.     REYNOU,  bâti à Vigen,  la construction date de 1841. La Résidence de campagne du porcelainier Charles Haviland, évoquant un art de vivre revu à l'américaine dans le dernier quart du XVe siècle, parc zoologique et paysager organisé autour d'un superbe chateau du XIXe siècle, chateau qui était propriété de la célèbre famille de porcelainiers \"les\" Haviland.\r\nAGE, ancienne ferme fortifiée du XIIIe siècle rattachée à l'abbaye toute proche de Solignac et habitée par des moines roturiers, défricheurs et agriculteurs, l'hostellerie du relais de l'Age était alors une halte pour les pélerins de Saint-Jacques de Compostelle. Elle doit son nom au latin Agia (une haie).                           LIGOURE, c'est un château qui fût bâti au XIXe siècle siècle par Mr. Le Play, ce Mr. Le Play a eu également une vie historiquement très intéressante,  dans et depuis les années 70, une ou la descendante de Mr. Le Play a donné à une association le soin de gérer le château. Frédéric Le Play, économiste et pionnier de la sociologie, a fait fortune auprès du prince russe Dimitri Demidoff. Un ami originaire de Limoges, léconomiste Michel Chevalier, lui conseille dacheter un domaine en Haute-Vienne. Ce sera Ligoure, en 1856. Pendant près de 30 ans, Le Play façonne les 400 hectares du domaine à limage de la doctrine quil établit, notamment lidée de « famille souche ». Mort à Paris en 1882, il est inhumé dans lintimité au Vigen, aujourd'hui propriétaire madame Thomas-Mouzon.","architecture":"AGE, les Ages étaient un enclos, un asile protégé et défendu, dont la violation était punie des peines les plus graves. Sous l'ancien régime la demeure fut un relais de poste sur la route Paris-Toulouse, puis passa ensuite sous l'empire au Prince Murat. Aujourd'hui restaurée, elle garde comme témoignage du passé ses murs de pierre de tailles, ses cheminées monumentales, son four à pain, ses puits et ses légendes.                                                                         LIGOURE, de style renaissance, le parc paysager entoure le château XIXe. A l'époque, l'accès principal se faisait face au château, et non pas perpendiculairement comme aujourd'hui,  devant l'autre façade du château, sur la terrasse en pente, la fontaine des Bénédictins.                                 REYNOU, le corps de logis fut reconstruit en 1841, puis agrandi en 1876-1877 et en 1894-1895. Le grand salon a été réalisé en 1908-1909. Le parc est sans doute l'oeuvre du paysagiste André Laurent, conçu à la fin du XIXe siècle : véritable projet architectural dans la composition des trois promenades et la volonté de marier les couleurs suivant les saisons. Le Domaine du Reynou est actuellement laissé à l'abandon, est classé aux M.H. depuis 1994 et 1995.","habitants":"Ligoure Mr. Le Play                                                   Reynou   Haviland           \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Six châteaux à le Vigen dont celui d'Age grav-4 , de Renou grav de 1 à 3, de  Ligoure grav 5-6, le Mas du Puy grav 7 et le Mas le Font grav-8.  Boiseul grv-9 GPS : 45° 45' 33\" Nord et 1° 17' 59\" Est                 Ribagnac GPS : 45° 55' 12\" Nord, 1° 26' 38\" Est","gps":"45° 45' 33\" Nord et 1° 17' 59\" Est                 Ribagnac","images":["../../jctruffet.com/image/image_87/87_Le_Vigen_1.jpg","../../jctruffet.com/image/image_87/87_Le_Vigen_2.jpg","../../jctruffet.com/image/image_87/87_Le_Vigen_3.jpg","../../jctruffet.com/image/image_87/87_Le_Vigen_4.jpg","../../jctruffet.com/image/image_87/87_Le_Vigen_5.jpg","../../jctruffet.com/image/image_87/87_Le_Vigen_6.jpg","../../jctruffet.com/image/image_87/87_Le_Vigen_7.jpg","../../jctruffet.com/image/image_87/87_Le_Vigen_8.jpg","../../jctruffet.com/image/image_87/87_Le_Vigen_9.jpg"]},"Consult_chateau_formulaire6a5c":{"id":"Consult_chateau_formulaire6a5c","dept":"87","canton":"Châteauponsac","commune":"Le Dorat","nom":"Ledorat","type":"Château","periode":"XIV-XIX","histoire":"trois châteaux à Le Dorat celui de Le Dorat, d'Escurat et du Poux.                                                                   LE-DORAT,  le Prince Noir vint en 1369 assiéger le château. Les occupants résistent et ne tombent pas aux mains des assaillants, mais la ville est en partie détruite. En 1589, Georges de Villequier, vicomte de la Guerche, du parti de la Ligue, s'empare de cette forteresse, espérant devenir le maitre de la ville. Assiégé, il est obligé de se rendre, mais la construction a souffert des différents assauts. Les habitants du Dorat en profitent pour demander sa destruction. \r\nEn 1618, les matériaux provenant de sa démolition ont servi à construire le couvent des Récollets, aujourd'hui disparu.  Dès 1699, les habitants cessent de payer les taxes levées par le chapitre et destinées aux réparations, un cinquième de chaque pinte de vin vendue au détail et quarante sols par charretée de sel. Les tours tombent une à une, le rôle militaire du Dorat s'achève. Trois des quatre portes ont été rasées: la Porte Saint-Louis, la Porte Bouvière ou de Dinsac, la porte Escornebuf ou du château; seule subsiste la porte Bergère du Dorat du XVe siècle sur les quatre du murs d'enceinte.                                                              ESCURAT, proche Le Dorat, ce magnifique château  de style Renaissance construit en 1880 et rénové fin des années 90.","architecture":"MAGNAC-LAVAL,  Il y aménage un zoo qui abrite des animaux exotiques, des loups, des lions, des serpents, des crocodiles, pendant 3 ans. En 1962, le château et le domaine de la Ménagerie sont vendus pour y installer une école d'agriculture.  La vocation agricole perdure encore de nos jours.  \r\nLe-DORAT, les remparts ont croulé du côté oriental, seules subsistent les courtines du côté occidental, flanquées de tours encore détectables, parmi lesquelles figure la tour du Guet. Cette tour qui est, en fait, l'association de deux tours accolées l'une à l'autre, est située à l'endroit où les remparts quittaient le rebord du plateau pour obliquer sur la porte du château dite Escornebuf. La plus grosse a 6 m de haut. La plus petite possède un réservoir alimenté par une citerne creusée dans le roc. Ces deux tours ne possèdent pas de système défensif. Toujours dotée de ses trois canonnières, cette tour, la seule subsistante des vingt tours rondes du XVe siècle, est aussi dite Tour Gévardat. La famille de Gévardat a donné plusieurs chanoines au chapitre du Dorat.","habitants":"Famille de Gévardat \r\n        \r\n        \"","divers":"A le Dorat remparts grav 1-2.   Poux grav-3 Escurat grav 4-5-6. Monteil grav-7.","gps":"","images":["../../jctruffet.com/image/image_87/87_Ledorat_1.jpg","../../jctruffet.com/image/image_87/87_Ledorat_2.jpg","../../jctruffet.com/image/image_87/87_Ledorat_3.jpg","../../jctruffet.com/image/image_87/87_Ledorat_4.jpg","../../jctruffet.com/image/image_87/87_Ledorat_5.jpg","../../jctruffet.com/image/image_87/87_Ledorat_6.jpg","../../jctruffet.com/image/image_87/87_Ledorat_7.jpg"]},"Consult_chateau_formulaire7bee":{"id":"Consult_chateau_formulaire7bee","dept":"87","canton":"Aixe sur Vienne","commune":"Beynac_St-Martin le Vieux","nom":"Leymarie","type":"Château","periode":"XIX","histoire":"deux châteaux à Beynac St-Martin le Vieux, la Côte et Leymarie.                                                                     LA COTE, le château de la Côte est bâti à la fin du XIXe siècle par l'architecte Jules Tixier pour le commandant Léon Dupont. Les travaux de construction furent réalisés par B. Savoyaud de Limoges, l'édifice a été terminé en 1893. Lapropriété possédait deux métairies, les Prés et les Jaulis. Construit sur une ancienne propriété, bouleversée par son ancien propriétaire, Eric de Chosko, qui s'imaginait trouver de l'or dans le sol. A l'intérieur, décor et sculpture: musiciens présentés en buste et tenant différents instruments situé sur les culots soutenant les solives du bureau et de la salle àmanger. En 1956 le domaine est racheté par Michel et Régine Guillaume, le château est transformé en hôtel restaurant en 1989.  LEYMARIE, château de Leymarie à Beynac  deux km au Nord, construit entre 1817 et 1823 par M. Dessales Beauregard, qui acquit en 1817 la terre de Leymarie. Le parc est créé également à la même époque, château mentionné sur le cadastre de 1827.","architecture":"La COTE, en 1847 le chateau est délabré, quasi laissé à labandon par ses héritiers parisiens. Un état des lieux dressé alors ne laisse aucun doute sur le sort qui lui est réservé : il sera vendu. En 1867  le marquis du Lau vend le domaine de 600 hectares  à lhonorable famille Déthan qui entreprend la restauration du château et des bâtiments agricoles à grand frais.  Le château Renaissance fait alors place à une vaste demeure remaniée et rajeunie  : suppression des remparts et de la cour fermée, larges ouvertures avec fenêtres à meneaux vers le sud et lest, grand escalier ouvrant sur une cour ensoleillée.\r\n LEYMARIE, la rampe d'escalier en fer forgé et trois cheminées en marbre avec trumeau, provenant de l'ancien hôtel Bourdeau de La Judie, situé rue du consulat à Limoges et construit par Brousseau, remployées au château en 1950. Communs situés sur la commune de Saint-Martin le Vieux. Ecuries situées au nord du château, bâtiment à trois niveaux, couvert de tuiles creuses; emploi de la brique pour les deux bandeaux délimitant les deux premiers niveaux et pour l'encadrement des baies en plein-cintre ; four à pain intégré dans les écuries.","habitants":"La Côte; commandant Léon Dupont                      Leymarie Famille de Dessales Beauregard\r\n        \r\n        \r\n        \r\n        \"","divers":"Leymarie grav 1-2 st martin grav 2-3        Beynac GPS : 45° 46' 08\" Nord et 1° 08' 43\" Est grav 4-5   L'Etoile à l'aiguille Grav 6.","gps":"45° 46' 08\" Nord et 1° 08' 43\" Est grav 4-5   L'Etoile à l'a","images":["../../jctruffet.com/image/image_87/87_Leymarie_1.jpg","../../jctruffet.com/image/image_87/87_Leymarie_2.jpg","../../jctruffet.com/image/image_87/87_Leymarie_3.jpg","../../jctruffet.com/image/image_87/87_Leymarie_4.jpg","../../jctruffet.com/image/image_87/87_Leymarie_5.jpg","../../jctruffet.com/image/image_87/87_Leymarie_6.jpg"]},"Consult_chateau_formulaire27a1":{"id":"Consult_chateau_formulaire27a1","dept":"87","canton":"Limoges","commune":"Limoges","nom":"Limoges_Chateaux","type":"Château","periode":"XIII-XVII-XVIII","histoire":"A Limoges les châteaux de  Beauvais, Bellevue, Crochat, Landouzes et Limoges.                            CROCHAT, bâti à Limoges, le domaine est devenu un Carmel depuis 1954, est situé en banlieue Sud-Est, dans un ancien château aménagé en monastère depuis 1954. Mais sa fondation proprement dite remonte à 1618 : Limoges a été la dernière étape de Mère Isabelle des Anges, une des « Mères espagnoles » amenées de Salamanque par le Cardinal de Bérulle, pour faire fleurir en France la Réforme du Carmel de Sainte-Thérèse dAvila. Il a été la propriété de monsieur de Leffe, ingénieur, qui dirigea les travaux de construction de la voie ferrée Paris - Toulouse.\r\nLANDOUZE dit de Beauvais  bâti dans le quartier de Landouge, à Limoges, la construction date de 1765 à 1768. Son propriétaire inital était l'Abbaye Saint-Martial de Limoges, Son propriétaire actuel est la Famille Moineville. C'est l'une des nombreuses réalisations de Joseph Brousseau conduites sur le territoire communal de Limoges à la fin du XVIIIe siècle, est classé aux M.H. depuis 1/03/ 1990.                                     JUILLAC, un petit joyau aux portes de Limoges qui a successivement appartenu à la famille Bourdeau de la Judie, puis à l'une des branches de la famille De Catheu .  Domaine municipal de la ville de Limoges.","architecture":"BEAUVAIS  à Limoges, époque : 3e quart XVIIIe siècle: classement par arrêté du 1er mars 1990, propriété d'une personne privée Autre : Brousseau Joseph, (architecte) rendez-vous était donné à Michel Toulet sur le perron du château de Juillac, un petit joyau aux portes de Limoges qui a successivement appartenu à la famille Bourdeau de la Judie, puis à l'une des branches de la famille De Catheu (l'autre côté de cette même lignée demeurant à quelques encablures de là au domaine de Faugeras).        LIMOGES, le château est privé. il date de la 1ère moitié du XIIIe siècle, des vicomtes de Limoges est un ancien château fort, de style Moyen-Age. La première mention du château date de 982. Dans les années 1180-1220, il entre dans la lutte que se livrent partisans et adversaires des Plantagenêt.  Cet édifice avec son enceinte octogonale, sa tour à contreforts plats, deux corps de bâtiments, sa basse-cour, sa chapelle dédiée à saint-Georges. Trois maisons de chevaliers sont contenues dans l'enceinte.\r\nLANDOUZE,  le bâtiment est le troisième château successif à cet emplacement, prenant la place d'une bâtisse du XVe siècle dont il ne subsiste qu'une cheminée et quelques tronçons de douve, elle-même bâtie à la place d'un premier château du XIe siècle, abritait, à sa construction, la résidence des abbés de l'abbaye Saint-Martial de Limoges, distante de quelques kilomètres.","habitants":"Beauvais Famille De Catheu .                                     Crochat; Monsieur de Leffe                                      Landouze; Famille Moineville\r\n        \r\n        \"","divers":"Château à Limoges GPS : 45° 51' 00\" Nord, 1° 15' 00\" Est  Bastide grav-1-2.  Limoges julliac grav-3       Beauvais grav 6 GPS : 45° 51' 26\" Nord et 1° 11' 25\" Est . Limoges     GPS : 45° 47\" 40' Nord et 1° 08' 30\" Est     Fontgaudrant   grav 4.  Bellevue grav-5. Villeneuve.","gps":"45° 51' 00\" Nord, 1° 15' 00\" Est  Bastide grav-1-2.  Limoges","images":["../../jctruffet.com/image/image_87/87_Limoges_Chateaux_1.jpg","../../jctruffet.com/image/image_87/87_Limoges_Chateaux_2.jpg","../../jctruffet.com/image/image_87/87_Limoges_Chateaux_3.jpg","../../jctruffet.com/image/image_87/87_Limoges_Chateaux_4.jpg","../../jctruffet.com/image/image_87/87_Limoges_Chateaux_5.jpg","../../jctruffet.com/image/image_87/87_Limoges_Chateaux_6.jpg"]},"Consult_chateau_formulaire2545":{"id":"Consult_chateau_formulaire2545","dept":"87","canton":"Limoges","commune":"Limoges","nom":"Limoges_Patrimoine","type":"Château","periode":"XV-XVII","histoire":"LIMOGES, château  bâti Rue Jeanne-d'Albret à Limoges,  En 1206, Guy V fit construire la tour et rénover la grande salle vicomtale où le corps de bâtiment qui l'abritait). Au château de Limoges, on retrouve trois Martin, Pierre, conseiller au Présidial, Martial, marchand et Jean, bourgeois de la ville de Limoges, dans les 24 fondateurs de la confrérie du Saint-Sacrement de la paroisse Saint-Michel-des-Lions. Il est inscrit aux M.H. depuis 2000. La commune en est propriétaire.    Maison-Forte Ce château du XIIe siècle a une histoire évocatrice et depuis son départ de la famille De Montcourt en 1987.\r\nBASTIDE, la famille Martin est une famille bourgeoise de Limoges qui sest divisée en 4 branches principales dont 3 seulement se rattachent entre elles à notre connaissance. La branche Martin de la Bastide, isolée mais qui possède les mêmes armes que les autres, est devenue baron dEmpire sous Napoléon.  La branche Martin de La Plagne (en Feytiat, Hte-Vienne), puis de Puymaud (en Nieul, Hte-Vienne), à lorigine commerçait à Limoges, rue des Taules, est parvenue à la noblesse à la fin du XVIIIe siècle par lacquisition dune charge de conseiller, secrétaire du Roi. Elle sest éteinte au milieu du XIXe siècle dans différentes familles. La branche Martin de Compreignac est devenue baron dEmpire sous Napoléon. Cette famille est toujours représentée.  La branche Martin  du Puytison (en Feytiat, Hte-Vienne), cette famille est toujours représentée.                                        FONTGAUDRANT  situé à proximité immédiate du centre-ville est aujourdhui un gîte de France, et offre des prestations dhébergement et de restauration.","architecture":"BASTIDE, associe le gothique flamboyant à des motifs Renaissance .                                                                  FONGAUDRANT, La maison qui  Jouste le château, également appelée château de Saint-Lazare du nom du coteau sur lequel elle est établie, est une construction du XVIIe siècle. Ses jardins en terrasse, dune superficie de 1,2 ha, qui descendent vers la Vienne juste en face de ceux de l'évêché, sont visibles depuis la ville. Site naturel inscrit depuis le 1978, ils constituent un îlot de verdure remarquable sur le coteau Saint-Lazare, occupé en grandes parties par des immeubles modernes inclus dans l'ancien domaine agricole rattaché à cette maison. Le 21 août 1944, la reddition des troupes allemandes occupant Limoges a lieu dans cette maison, qui est alors la propriété du consul de Suisse et qui est considérée comme un lieu neutre pour cette raison.","habitants":"Famille Martin\r\n        \"","divers":"Plais justice grav-1-2.  Limoges hôtel de ville gr x, reliant les deux bâtiments. L'un des deux bâtiments existait encore toutefois au XIXe siècle, ses parties les plus anciennes remontent au (XVe siècle). En 1664 : date portée sur le linteau de la porte. Remaniement intérieur au cours du XVIIIe siècle, dans le second corps de bâtiment formant le château. En 1721 : date portée sur le linteau d'une porte,  deux pavillons de plan carré couverts d'un toit en pavillon  en tuiles plates.","habitants":"Famille de Villehune \r\n        \r\n        \"","divers":"Losmonerie grav 1 à 4     GPS : 45° 49' 08\" Nord et 1° 07' 40\"","gps":"45° 49' 08\" Nord et 1° 07' 40\"","images":["../../jctruffet.com/image/image_87/87_Losmonerie_1.jpg","../../jctruffet.com/image/image_87/87_Losmonerie_2.jpg","../../jctruffet.com/image/image_87/87_Losmonerie_3.jpg","../../jctruffet.com/image/image_87/87_Losmonerie_4.jpg"]},"Consult_chateau_formulaire8f0b":{"id":"Consult_chateau_formulaire8f0b","dept":"87","canton":"Saint-Junien","commune":"Saint-Victurnien","nom":"Loubier","type":"Manoir","periode":"XVI","histoire":"LOUBIER, ce manoir situé en Limousin près de Saint Victurnien (Haute-Vienne) était la propriété dune branche de la famille de Verdilhac .Le grand-père maternel de Marie Reygondaud de Villebardet née en 1758 (née Reygondaud et épouse de Martial Reygondaud de Villebardet 1756-1824) Martial de Verdilhac (1698-1767) sera seigneur du Loubier comme son père. Martial et Marie etant les grand-parents paternels dAdeline de Heredia, née Reygondaud de Villebardet, mère dAlice Vercken de Vreuschmen. Logis de France.","architecture":"LOUBIER de plan rectangulaire à deux niveaux et série de lucarnes sur un toit  à la mansard.","habitants":"Famille de Verdilhac\r\n        \"","divers":"Château de Loubier","gps":"","images":["../../jctruffet.com/image/image_87/87_Loubier_1.jpg"]},"Consult_chateau_formulairee1f2":{"id":"Consult_chateau_formulairee1f2","dept":"87","canton":"Magnac-Laval","commune":"Magnac-Laval","nom":"Magnac_Laval","type":"Château","periode":"XIX","histoire":"Deux châteaux à Magnac-Laval celui de Laval et celui de Chercorat dont je n'ai pas d'information.          LAVAL, le château fut construit entre 1874 et 1887 par le comte de Couronnel avec laide de larchitecte Lambert.  En 1916, M. Henri Bancel, entrepreneur de travaux publics de la région parisienne le rachète ainsi que les domaines attenants. De 1942 à 1953, il est le premier magistrat de Magnac-Laval. A sa mort, en 1955, un de ses fils, Roger Bancel prend les rênes du château.","architecture":"LAVAL Roger Bancel . Il y aménage un zoo qui abrite des animaux exotiques, des loups, des lions, des serpents, des crocodiles, pendant 3 ans. En 1962, le château et le domaine de la Ménagerie sont vendus pour y installer une école d'agriculture.\r\nLa vocation agricole perdure encore de nos jours.        CHERCORAT, s'il existe toujours forteresse avec porche d'entrée et donjon.","habitants":"Comte de Couronnel \r\n        \"","divers":"A Magnac-Laval  le château du Bourg grav 1-2. Chercorat grav 3-4-5. Couronnel grav 6-7-8.","gps":"","images":["../../jctruffet.com/image/image_87/87_Magnac_Laval_1.jpg","../../jctruffet.com/image/image_87/87_Magnac_Laval_2.jpg","../../jctruffet.com/image/image_87/87_Magnac_Laval_3.jpg","../../jctruffet.com/image/image_87/87_Magnac_Laval_4.jpg","../../jctruffet.com/image/image_87/87_Magnac_Laval_5.jpg","../../jctruffet.com/image/image_87/87_Magnac_Laval_6.jpg","../../jctruffet.com/image/image_87/87_Magnac_Laval_7.jpg","../../jctruffet.com/image/image_87/87_Magnac_Laval_8.jpg"]},"Consult_chateau_formulaire1806":{"id":"Consult_chateau_formulaire1806","dept":"87","canton":"Eymoutiers","commune":"Magnac-Bourg","nom":"Magnac_Lostende","type":"Château","periode":"XVIII","histoire":"Au nord-Est de Chateau-Chervix trois châteaux à Magnac le Bourg  dont celui de Magnac,de Lostende et de Villedieu.                                                          MAGNAC  a été construit pendant la première moitié du XVIIIe siècle et achevé en 1742, comme en témoigne la date inscrite sur la grille au-dessus de la porte d'entrée. Le perron est dela même époque et la tour a été adjointe en 1898. Propriété de la famille de Rohan, elle passe dans la famille Vergniaud, qui donne deux curés à Magnac. Acquise en 1895 par Athanase Martin de la Bastide, maire de Limoges de 1816 à 1821, la demeure est toujours la propriété de la même famille. Chambre d'hôtes  de Bertrand et Catherine de La Bastide vous accueillent en leur demeure familiale construite en 1742 au coeur d'un village étape en Haute-Vienne.                               LOSTENDE du XVIIIe siècle,  le château a appartenu au vicomte de la Celle et aux familles de Lafont, Bugeaud de la Piconnerie et Lemercier de L'Ecluse. \r\n VILLEDIEU, Mr de Corgnol jusqu'en 1600.","architecture":"MAGNAC, bâti à Magnac-Bour, Il a été construit durant la première moitié du XVIIIe siècle et achevé en 1742, comme le confirme la date gravée sur la grille au-dessus de la porte d'entrée. Le perron est de 1742. La tour a été rajoutée en 1898. Le château de Magnac est toujours la propriété de la même famille.        LOSTENDE, sa construction a été arrêtée par la Révolution. On pense que l'aile existante a été bâtie en utilisant les restes soit d'un ancien château, soit d'un édifice religieux, ce qui expliquerait la présence de pièces voutées et de deux pièces carrées superposées simulant les vestiges d'un clocher. Après 1789, on construisit les écuries à la place de la façade du château. Les deux tours d'entrée plus anciennes, auraient été utilisées comme chenil à deux niveaux. Les chiens montaient au premier par un plan incliné. Un souterrain confirme la présence d'un bâtiment religieux ou autre, antérieur à la construction du château.   VILLEDIEU, de style renaissance de plan rectangulaire à deux niveaux, lucarnes sur toits, pavillons saillants polygonales lucarnes imposantes sur toit en croupe recouvert d'ardoise.","habitants":"Famille de Rohan\r\n        \"","divers":"A Magnac-Lostende grav 1-2-3 autres et Villedieu","gps":"","images":["../../jctruffet.com/image/image_87/87_Magnac_Lostende_1.jpg","../../jctruffet.com/image/image_87/87_Magnac_Lostende_2.jpg","../../jctruffet.com/image/image_87/87_Magnac_Lostende_3.jpg","../../jctruffet.com/image/image_87/87_Magnac_Lostende_4.jpg","../../jctruffet.com/image/image_87/87_Magnac_Lostende_5.jpg","../../jctruffet.com/image/image_87/87_Magnac_Lostende_6.jpg"]},"Consult_chateau_formulaire6744":{"id":"Consult_chateau_formulaire6744","dept":"87","canton":"Aixe sur Vienne","commune":"Saint-Yrieix-sous-Aixe","nom":"Mas_Marvent","type":"Château","periode":"XVI","histoire":"MAS-MARVENT,  domaine appartenant à la famille Igonin de Romaneix, acquis en 1782 par François Alluaud I, ingénieur géographe du Roi, fabricant de pâte à porcelaine et appelé, en 1788, à la direction de la manufacture Royale. Peinture à l'huile réalisée entre 1847 et 1850, montrant l'état ancien de l'édifice avant son agrandissement. En 1890 à l'initiative de Charles Field Haviland, époux de Louise Mallevergne, arrière-petite-fille d'Alluaud, adjonction du pavillon nord-est et du pavillon central nord avec bow window. En 1905, à la demande d'André Haviland, construction du pavillon nord ouest, du bâtiment situé à sa gauche et de la tour sud-est. Château à la tête d'un important domaine agricole comportant une ferme dite \"la Réserve\" et deux métairies plus éloignées.","architecture":"Mas-Marvent en 1746, il est décrit comme une bâtisse à deux étages, deux travées, une cour, des écuries, une grange et un jardin.  l'édifice est constitué d'un bâtiment principal avec façade sud à huit travées, précédée d'une terrasse couverte en bois s'étendant devant les quatre travées centrales; couvert d'une croupe brisée percée de six lucarnes; à l'arrière de ce bâtiment, sont accolés respectivement, de l'est à l'ouest, un pavillon à trois travées, avec toiture en croupe brisée, précédé d'une terrasse couverte en bois,  un bâtiment à deux travées et un pavillon d'angle nord-ouest auquel est accolé, au sud-ouest, une tour, de plan carré, couverte d'une flèche conique ; château bâti dans un grand  jardin avec roseraie ; à l'ouest du château s'étend la ferme de la réserve ; laiterie avec des baies ornées d'un décor en ciment simulant des branches de  bois, formant fronton et encadrement ; château couvert en ardoise, ferme en tuile creuse, laiterie et remise à automobiles en tuile mécanique.","habitants":"Famille Igonin de Romaneix\r\n        \"","divers":"Château de Mas-Marvent à Aixe sur Vienne","gps":"","images":["../../jctruffet.com/image/image_87/87_Mas_Marvent_1.jpg"]},"Consult_chateau_formulaire3105":{"id":"Consult_chateau_formulaire3105","dept":"87","canton":"Bellac","commune":"Saint-Bonnet-de-Bellac","nom":"Montagrier","type":"Château","periode":"XIX","histoire":"Deux châteaux à Saint-Bonnet de Bellac celui de Montagrier et de Gouyas.                                MONTAGRIER, déjà fortifiée à l'époque gallo-romaine, fut un bastion anglais lors de la guerre de cent ans,  bâti à Saint-Bonnet-de-Bellac, La construction  date du XIXe siècle. Le château de Montagrier fut reconstruit entièrement, au départ, le marquis et la marquise ayant l'intention de le restaurer. Les époux sachant qu'ils n'auraient pas d'enfants, avaient décidé de léguer ce château au comte de Chambord prétendant au trône de France. Celui-ci étant mort trop tôt, le château de Montagrier ira au Baron Guy de Salvaing de Boissieu,. Le château actuel a été bâti par le marquis (Antony 1826-1892) et la marquise de Saint-Martin de Bagnac sur l'emplacement de l'ancien château du XVe siècle, détruit pendant les guerres de religion dans ce château naquit Pierre de Bagnac, en 1330, qui devint un grand cardinal célébré à Rome. La seule partie du château qui date du XIVe siècle est la grosse tour d'angle, coiffée d'une toiture à très forte pente lors de la reconstruction du château.  En 1911 un commandant Laugaudin le mentionne comme résidence dans un almanach de l'époque. Il était le locataire du Baron de Boissieu propriétaire du château actuel, héritier du château après la mort de la Marquise Elise de Préaulx de Bagnac en 1902.","architecture":"MONTAGRIER,  au début du XIXe siècle, le vieux château était en ruine. Une nouvelle construction fut entreprise, qui se termina en 1819, château accompagné de deux pavillons, d'une bergerie à colonnades et de dépendances. La façade sud du château présente un avant-corps central qui se détache légèrement du reste du bâtiment et qui est surmonté d'un fronton triangulaire. L'avant-corps de la façade nord est en rotonde, ouvert de portes-fenêtres au fronton en arc bombé. L'intérieur conserve un décor Empire. La salle en rotonde au rez-de-chaussée, est ornée d'une haute colonnade dont les chapiteaux \"Retour d'Egypte\" sont en fleurs de lotus. Le plancher est en marquetterie. D'après la tradition familiale chacun des deux pavillons avait une fonction précise, l'un servait de laiterie et l'autre de  salle de bain. Face à la façade à fronton du château, la colonnade se composait à l'origine de douze colonnes d'inspiration dorique. La bergerie reprend le style des temples grecs, avec un portique de seize colonnes doriques. La fontaine est constituée d'une stèle en pierre de taille surmontée d'une corniche moulurée. L'eau s'échappe par la bouche d'un dauphin et tombe dans une vasque de granit.\r\n GOUYAS de plan d'équerre à deux niveaux , toit en brisés avec lucarnes sur comble.","habitants":"Seigneur locaux\r\n        \"","divers":"Montyagrier;  GPS : 46° 09' 07\" Nord et 0° 58' 13\" Est.  Monatagier  grav-1-2 Gouyas grav 3","gps":"46° 09' 07\" Nord et 0° 58' 13\" Est.  Monatagier  grav-1-2 Go","images":["../../jctruffet.com/image/image_87/87_Montagrier_1.jpg","../../jctruffet.com/image/image_87/87_Montagrier_2.jpg","../../jctruffet.com/image/image_87/87_Montagrier_3.jpg"]},"Consult_chateau_formulaireb04f":{"id":"Consult_chateau_formulaireb04f","dept":"87","canton":"Ambazac","commune":"Fromental","nom":"Montautre","type":"Château","periode":"XIV-XVI","histoire":"MONTAUTRE. Château de Montautre est un château du XVe siècle, qui a toujours été dans la même famille depuis cette époque. Il y a 8 ans les nouveaux propriétaires sont tombés amoureux de cette propriété et l'ont passionnément reconstituée avec bon goût en chambres dhôtes.Gîtes de France. Pas d'autre information historique.","architecture":"MONTAUTRE,  le château date du XVIIe siècle. Le corps de logis oblong à deux niveaux sur soubassement, toit en croupe  accolé sur le côté  gauche un  pavillon  carré et plein cintre à l'arrière un donjon a mâchicoulis couvert d'un toit à l'impérial, classé au titre des M.H. le 8 juin 1925 ; la source qui alimente les douves et la conduite d'eau le sont le 29 août 1938.les vitraux vous parleront de la vie du chateau qui se trouve à proximité. Des douves toujours alimentées en eau, entourent cette résidence seigneuriale du XIV-XVI siècle. Puis on remarquera un puits, fontaines et lavoirs ainsi que le chateau de Montautre, le menhir des fichades, les pierres Magnat et le dolmen de Bagnol.","habitants":"Seigneur locaux\r\n        \"","divers":"Château, vestiges porte de  Montautre à Fromental","gps":"","images":["../../jctruffet.com/image/image_87/87_Montautre_1.jpg","../../jctruffet.com/image/image_87/87_Montautre_2.jpg","../../jctruffet.com/image/image_87/87_Montautre_3.jpg","../../jctruffet.com/image/image_87/87_Montautre_4.jpg","../../jctruffet.com/image/image_87/87_Montautre_5.jpg"]},"Consult_chateau_formulairebd74":{"id":"Consult_chateau_formulairebd74","dept":"87","canton":"Rochechouart","commune":"Dournazac","nom":"Montbrun","type":"Forteresse","periode":"XII-XV","histoire":"MONTBRUN,  en 1179  à son retour de croisade, Aimery Bruni  construit un château au lieu-dit Trados, puis passa aux Brun devenus Montbrun en 1366, en resteront les propriétaires jusqu'en 1516. Différentes branches de ce lignage s'y succèderont à partir  d'Aimeric en 1217, de Gui en 1327, de Pierre en 1366, d'un second Pierre en 1427 et d'Isabelle en 1516.  Au début de la guerre de cent ans, la forteresse est occupée par les anglais. Arnould d'Audrehem, lieutenant du roi de France,s'empare de la place à la fin de l'année 1352 . Elle est cependant reprise et incendiée par les anglais au début du XVe siècle. Pierre de Montbrun, évêque de Limoges, bâtit en 1438 le château que nous connaissons aujourd'hui.  En 1516, Isabelle de Montbrun, ultime héritière de la famille, épouse Ponthus d'Estuer et lui apporte en dot le château et la baronnie.  En décembre 1598, François de Lambertie acquiert de Louis Stuerd de Caussade la baronnie, les terres et la seigneurie, par alliance revient en 1694 à Hubert de Choseul comte de Chevigny   Jean de Campniac par droit de succéssion devient propriétaire de Montbrun. Marie de Campniac leur fille épousa en 1746 Alexis de conan, leur petit fils fut le dernier seigneur de Montbrun. A la Révolution Française, le château est pillé et dévasté par le feu,  le lot contenant les restes du château furent acheté par M. Laumonerie.  En 1860 les frères Adhémar, Alfred et Martial de Labonne. En 1871, il fait l'objet d'une ambitieuse réhabilitation mais connaît  de nouveau les affres du feu en 1917 et sera intégralement restauré par le comte  Régis de Vandières de Vitrac. En 1964, le donjon roman est restauré. Le reste de la forteresse le sera en 1966.","architecture":"MONTBRUN, une enceinte quadrangulaire de 40 m de côté est cantonnée de quatre grosses tours cylindriques de diamètres différents, enserrant une tour maîtresse carrée. Les murailles sont équipées pour la défense par armes à feu : archères-canonnières et canonnières à la française en témoignent. Une courtine flanquée de tours carrées aux angles protégeait autrefois le château. Seule la tour sud-ouest a été conservée et sa base enfermée dans l'une des tours circulaires. Appelée \" le Grand Jacques\", elle passe donc pour être l'ancien donjon.  Toutefois, compte tenu de sa minceur, il se pourrait qu'elle ne soit que l'une\r\ndes tours aristocratiques du site, l'ancien donjon trônant sur le haut de la motte castrale. Elle est haute d'environ 40 m, mesure 6,20m de côté. Ses angles sont renforcés par des contreforts plats se terminant par une double arcature aveugle comme au château-Chervix voisin. Elle possède huit étages. L'un d'eux est éclairé au sud par une jolie baie géminée. Seuls les niveaux supérieurs sont voûtés en pierre. Près du sommet, de grandes consoles suggèrent la présence passée de mâchicoulis. Le crénelage autour de la terrasse sommitale a été refait dans l'esprit des restaurations du XIXe siècle. A proximité  immédiate de la forteresse se trouve une motte tronconique sur laquelle s'élevait, entre le Xe siècle et le XIIe siècle, le premier donjon. La forteresse actuelle se dresse dans ce qui fut sa basse-cour. Il demeure au nord et à l'est des morceaux de l'ancienne enceinte.","habitants":"Famille Brun Famille de Ponthus d'Estuer\r\n        \"","divers":"Montbrun GPS : 45° 38' 10\" Nord et 0° 53' 53,2\" Est","gps":"45° 38' 10\" Nord et 0° 53' 53,2\" Est","images":["../../jctruffet.com/image/image_87/87_Montbrun_1.jpg","../../jctruffet.com/image/image_87/87_Montbrun_2.jpg","../../jctruffet.com/image/image_87/87_Montbrun_3.jpg","../../jctruffet.com/image/image_87/87_Montbrun_4.jpg","../../jctruffet.com/image/image_87/87_Montbrun_5.jpg","../../jctruffet.com/image/image_87/87_Montbrun_6.jpg"]},"Consult_chateau_formulaire63f4":{"id":"Consult_chateau_formulaire63f4","dept":"87","canton":"Bellac","commune":"Mortemart","nom":"Mortemart","type":"Château","periode":"XII-XV","histoire":"DUCS,  bâti à Mortemart,  L'élévation à ce titre ne se fit que sous Louis XIV, soit 2 siècles après la construction du château des Ducs.  La seigneurie de Mortemart existe avant lan mil et le village sest développé autour de lancienne motte féodale puis du château de pierre.  Le domaine des Mortemart passe par mariage dans la famille des Rochechouart en 1205 à l'occasion des noces  d'Aymery VII avec Alix, fille et seule héritière de Guillaume qui prendra le nom de Mortemart. Quelques années plus tard, naît la maison de Mortemart qui donna de grands personnages à la France : Françoise Athénaïs de Rochechouart de Mortemart, la marquise de Montespan (favorite de Louis XIV) ; Louis-Victor, général des galères du Roi Soleil et Marie-Clémentine dite Manuela, sculpteur féministe. En 1650 les terres de Mortemart sont érigée en duché-prairie, en 1667.  Le château mis sous séquestre au début de la Révolution Française puis vendu en 1791 il se delabre rapidement. L'édifice a été racheté à la fin du XIXe siècle par la famille de Mortemart à laquelle il appartient toujours.","architecture":"MORTEMART, le château des Ducs du XVe siècle: ce petit corps de logis présentant deux tours rondes fut construit par les seigneurs de Mortemart, le château est détruit au XIVe siècle par les Anglais, il est reconstruit sur un site différent, puis démantelé sur ordre de Louis XIII. Il est resté en ruine jusqu'au début du XXe siècle.  Démantelé par ordre de Richelieu, le second étage des tours et du bâtiment principal ont disparu.  Étang à l'arrière du château, à l'emplacement des anciennes douves.","habitants":"Marquise de Montespan                                               Famille de Mortemart \r\n        \"","divers":"Mortemart  GPS : 46° 02' 33\" Nord et 0° 57' 26\" Est","gps":"46° 02' 33\" Nord et 0° 57' 26\" Est","images":["../../jctruffet.com/image/image_87/87_Mortemart_1.jpg","../../jctruffet.com/image/image_87/87_Mortemart_2.jpg","../../jctruffet.com/image/image_87/87_Mortemart_3.jpg","../../jctruffet.com/image/image_87/87_Mortemart_4.jpg"]},"Consult_chateau_formulaire89e1":{"id":"Consult_chateau_formulaire89e1","dept":"87","canton":"Nantiat","commune":"Nantiat","nom":"Nantiat","type":"Château","periode":"XIII-XV","histoire":"Trois châteaux à Nantiat celui de Montauran , de  Nantiat et celui des Leszes.                                           LES LESZES   La première mention remonte à la fin du XIIIe siècle, pas d'information historique.      MONTAURAN, bâti à Nantiat. Le propriétaire initial était les Ignonin. En 1578, la famille sunit aux Foucaud-Faulcon, seigneur des Lèzes et de Boysse, les Ignonin ont aussi un domaine à Romanet. Durant le XVIIIe siècle, la Famille des Ignonin s'éteint. Le 14 février 1768, Maurille Michaud, seigneur, chevalier de Montaurand fut le parrain de Maurille Viraud de Sombreuil. Pendant la Terreur, il fut obligé d'avaler un verre de sang humain, pour sauver son père, le marquis de Sombreuil, gouverneur de lhôtel des Invalides, menacé par des émeutiers le menaçant de le tuer en prison.                                                        NANTIAT, à 30 mn de Limoges, logis de caractère du XVe siècle bâti dans l'emplacement d'un ancien château du XIIIe siècle. Pas d'information historique.","architecture":"Les LESZES, grand corps de logis  à deux niveaux sur soubassements montée d'escalier en double révolution et série de lucarnes sur toits en croupe sur la gauche édifice en retour d'équerre pavillon  de deux niveaux lucarnes et toit à l'impérial, à l'opposée de la cour d'honneur sur angle un donjon crénelée avec terrasse.   La façade nord, remaniée, fait office dentrée principale. Deux fenêtres entourent une porte du XVIIe siècle au rez-de-chaussée. Au premier étage on compte cinq fenêtres hautes, le deuxième étage est, quant à lui, mansardé et possède trois fenêtres. On y aperçoit cinq gargouilles, évidées à lextrémité, qui ressemblent à des fûts de canons dautrefois.      MONTAURAN, a conservé son aspect médiéval, une des façades est percée de meurtrières. La façade Sud a subi des changements dont une tour carrée au Sud-Ouest. Au Sud-Est, un pavillon laisse apercevoir, au second étage, l'ancien colombier avec ses alvéoles internes. La façade Nord possède des tours que la Révolution a découronnées. Les façades du château ont toutes un escalier de pierre en spirale, qui donnent sur de vastes salles.  Le bâtiment a conservé son aspect médiéval :  Lune delles est percée par des meurtrières. Elles possèdent toutes un escalier de pierre en spirale donnant accès à de vastes salles.  NANTIAT, situé dans un charmant petit hameau, ce logis seigneurial réaménagé sur les vestiges de l' ancien château s'étend sur 300 m² environ en 2 niveaux, corps de logis rectangulaire flanqué de deux tours rondes dont une en façade l'aute sur les extrémités toit presque plats, l'ensemble est clos de murs avec tours de guet en angles.","habitants":"Seigneur locaux\r\n        \"","divers":"a Nantiat Grav 1 -2.  Château de Lészes grav 3 à 5. Mantauran grav 6-7-8","gps":"","images":["../../jctruffet.com/image/image_87/87_Nantiat_1.jpg","../../jctruffet.com/image/image_87/87_Nantiat_2.jpg","../../jctruffet.com/image/image_87/87_Nantiat_3.jpg","../../jctruffet.com/image/image_87/87_Nantiat_4.jpg","../../jctruffet.com/image/image_87/87_Nantiat_5.jpg","../../jctruffet.com/image/image_87/87_Nantiat_6.jpg","../../jctruffet.com/image/image_87/87_Nantiat_7.jpg","../../jctruffet.com/image/image_87/87_Nantiat_8.jpg"]},"Consult_chateau_formulaire4f17":{"id":"Consult_chateau_formulaire4f17","dept":"87","canton":"Eymoutiers","commune":"Nedde","nom":"Nedde","type":"Château","periode":"XVI-XVIII","histoire":"Deux château à Nedde, celui de Nedde  et de Mazeau-Nicaud.                                                                          NEDDE, bâti à Nedde, la construction date de la fin du XVIe et du début du XVIIe siècles sur l'emplacement d'une ancienne bâtisse médiévale, succéda à une ancienne forteresse médiévale dont les vestiges étaient visibles jusqu'au début du XXe siècle, était réputé pour son décor intérieur, doté de belles boiseries et des tapisseries dAubusson, et de Felletin, dont certaines étaient dues à de G. Dumonteil. A souffert d'une absence d'entretien durant la guerre, ses toitures en bardeau de châtaignier ne pouvant être réparées, durant cette période de restriction, sera vendu par la famille de Nedde en 1954. Laissé à l'abandon par ses nouveaux propriétaires, considéré comme dangereux à l'habitat dès juillet 1956 par l'architecte des bâtiments de France, il fut l'objet de pillages et se dégrada au point qu'il n'en restait que des ruines, en 1976, quand il fut l'objet d'un opuscule de Roland du Chatelard.  Le parc a été lotis de pavillons. Le château de Nedde est inscrit aux M.H. depuis 1950.                                                              MAZEAU-NICAUD, érigé pendant la seconde moitié du XVIIIe siècle, sur la route de Lauzat.    Gîtes de France.","architecture":"NEDDE, construit à la fin du XVIe et début du XVIIe siècles, le château succéda à une ancienne forteresse médiévale dont les vestiges se voyaient jusqu'au début du XXe siècle. La propriété a été transformée en centre de vacances au début des années 1980, les ruines furent réhabilitées avec l'ajout d'éléments contemporains en vitrages et de structures d'acier sur la façade sur cour du corps central, et l'ensemble fut doté d'une couverture métallique à pans plats. Le parc a été loti de pavillons. Orienté nord-sud, le château est constitué de trois corps de bâtiments disposés en U autour dune cour ouverte sur le nord. Le corps de logis central est rectangulaire avec en son centre un ancien donjon transformé en tour descalier sous Henri IV de France, il est encadré sur la façade Sud par deux pavillons, celui de lOuest possède encore la base dune tourelle sur culot mouluré démolie à la Révolution en même temps que la partie supérieure du donjon. Lensemble se développe sur deux niveaux. La façade Sud est dotée dune porte centrale en arcade en plein cintre, précédée dun perron de cinq marches, elle est encadrée dun riche décor sculpté avec colonnes jumelles reposant sur un socle, elles supportent un entablement surmonté par un cadre mouluré accosté de volutes.                                     MAZEAU-NICOT, corps de logis rectangulaire à un niveau  sur soubassement, toit en croupes avec lucarnes, l'édifice est accolée en retrait d'un donjon à trois niveaux toit quatre pans.","habitants":"Famille de Nedde \r\n        \"","divers":"Château de nedde grav 1 à 5 et Mazeau-Nicot grav 6-7","gps":"","images":["../../jctruffet.com/image/image_87/87_Nedde_1.jpg","../../jctruffet.com/image/image_87/87_Nedde_2.jpg","../../jctruffet.com/image/image_87/87_Nedde_3.jpg","../../jctruffet.com/image/image_87/87_Nedde_4.jpg","../../jctruffet.com/image/image_87/87_Nedde_5.jpg","../../jctruffet.com/image/image_87/87_Nedde_6.jpg","../../jctruffet.com/image/image_87/87_Nedde_7.jpg"]},"Consult_chateau_formulaired77f":{"id":"Consult_chateau_formulaired77f","dept":"87","canton":"Eymoutiers","commune":"Neuvic-Entier","nom":"Neuvic_Entier","type":"Château","periode":"XIX","histoire":"NEUVIC-Entier, l'étymologie est novis vicus, le nouveau village. Le terme apparaît dans un texte de 1147.  A l'origine, un château féodal détruit en 1591 lors de la bataille des ligueurs de Bernard de Ventadour a été reconstruit style renaissance puis vendu en 1793 comme bien national, le château doit son existence à trois familles : les O'Toole, d'origine princière irlandaise, les Limousin de Neuvic, gentilshommes émailleurs, anoblis par François 1er, et les Ruben de l'Ombre de Couderc, les O'Toole qui se sont rapprochées avant le XVIe siècle sur l'île de la Réunion. Une lignée de leur filiation se mariera avec les Limousin de Neuvic, aboutissant à la construction du château.  Il a été réédifié en 1835 par la famille Limousin de Neuvic et agrandi dans les années 1890 pour avoir la configuration actuelle. Dans les fermes attenantes et des alentours du château, la famille Limousin de Neuvic sélectionnaient la race bovine Limousine. \r\nLe château de Neuvic : la famille Limousin fit construire le château actuel en 1890 sur les restes d'un château du XVIe siècle. Au milieu du XXe siècle, il accueillait la maison maternelle départementale. Le conseil général se porte acquéreur et en fait officiellement la maison maternelle départementale. Il accueille aujourd'hui un foyer d'accueil pour adultes handicapés.","architecture":"NEUVIC, de style Renaissance,  associe le gothique flamboyant à des motifs Renaissance, édifice de quatre corps de logis disposé en S  de deux niveaux chacun sur soubassements intercalés de pavillons, de tours rondes  et de lucarnes à pinacles.   Utilisé en hébergement pour maison maternelle à partir de 1942, le château démarre sa vie sociale. Il accueille les femmes et les enfants seuls pendant la deuxième guerre mondiale et c'est en 1949 qu'il est vendu aux enchères.","habitants":"Famille de Bernard de Ventadour                                 Famille Limousin de Neuvic \r\n        \"","divers":"Château de Neuvic","gps":"","images":["../../jctruffet.com/image/image_87/87_Neuvic_Entier_1.jpg","../../jctruffet.com/image/image_87/87_Neuvic_Entier_2.jpg","../../jctruffet.com/image/image_87/87_Neuvic_Entier_3.jpg","../../jctruffet.com/image/image_87/87_Neuvic_Entier_4.jpg","../../jctruffet.com/image/image_87/87_Neuvic_Entier_5.jpg"]},"Consult_chateau_formulaire95af":{"id":"Consult_chateau_formulaire95af","dept":"87","canton":"Saint-Yrieix la Perche","commune":"Nexon","nom":"Nexon","type":"Château","periode":"XVI","histoire":"A Nexon deux châteaux celui de Nexon et de la Garde.                                                                NEXON,  liée jusquau début du XVIe siècle à la destinée des Lastours, seigneurs de Nexon, Hautefort et Pompadour  cette co-seigneurie est vendue, par Galliot de Lastours en 1532  à Léonard de Gay devient co-seigneur du fief,  lieutenant général du grand sénéchal de Guyenne,  en 1633,  fin de la construction le château de Nexon, qui restera pendant 350 ans le fief principal des barons de Gay de Nexon.  Détérioré durant la Révolution, lintérieur a été réaménagé au XIXe siècle. Il a été créé au milieu du XIXe siècle pour le baron Astolphe de Nexon (1817-1876). Le château du XVIIe siècle, restauré au XIXe siècle, abrite aujourdhui la mairie de Nexon, et des écuries. En 1983, la Mairie l'acquiert du baron Ferréol de Nexon, dernier propriétaire privé porteur du titre.  Celles-ci témoignent dun passé équestre prestigieux. Le château est entouré dun parc paysager de 40 ha. Il a été créé au milieu du XIXe siècle par le comte de Choulot, paysagiste  a intégré le parc au paysage environnant et à l'activité agricole et équestre du domaine, pour le baron Astolphe de Nexon. En 1983, vente du château à la commune \r\n  La GARDE logis de france par la famille Gimenez.","architecture":"NEXON, construit au XVIIe siècle puis remanié au XIXe siècle, le château est aujourd'hui l'hôtel de ville de la commune de Nexon. Le parc du château de Nexon, site classé à l'inventaire des M.H., est un parc paysager d'environ 40 hectares. Passé la poterne dentrée, on découvre le château avec sa cour intérieure ornée de la fontaine de Saint-Féréol. Côté jardin, la façade flanquée de deux tours circulaires est agrémentée dun cadran solaire surmonté par une lucarne aux baies géminées et au fronton décoré des armes de Nexon. Le château et le parc sont entièrement clos d'un mur de pierres.  Le château de Nexon est ouvert au public depuis que la commune a fait l'acquisition du site, l'ensemble est clos par un mur. La GARDE de plan rectangulaire  à tois étages sur soubassement  et série de lucarnes sur toit flanquait de pavillons rectangulaires saillants  aux extrémitées.","habitants":"Baron de Gay de Nexon\r\n        \"","divers":"Château Nexon grav 1-2-3   GPS : 45° 40' 35\" Nord et 1° 11' 19\" Est.    La Garde grav 4-5","gps":"45° 40' 35\" Nord et 1° 11' 19\" Est.    La Garde grav 4-5","images":["../../jctruffet.com/image/image_87/87_Nexon_1.jpg","../../jctruffet.com/image/image_87/87_Nexon_2.jpg","../../jctruffet.com/image/image_87/87_Nexon_3.jpg","../../jctruffet.com/image/image_87/87_Nexon_4.jpg","../../jctruffet.com/image/image_87/87_Nexon_5.jpg"]},"Consult_chateau_formulaireed78":{"id":"Consult_chateau_formulaireed78","dept":"87","canton":"Couzeix","commune":"Nieul","nom":"Nieul","type":"Château","periode":"","histoire":"Quatre châteaux à Nieul dont celui de Nieul, dans article suivant Puymaud, Valette et Chatenet.\r\nNIEUL,  il eut comme propriétaire Aymeric de Nieul figure dans un acte de 1027 du cartulaire de Saint-Etienne. Sa signature se trouve auprès de celle de Aimery Ier de Rochechouart. Ce cadet de la famille des vicomtes de Limoges , a épousé la fille de Guillaume Ier, comte d'Angoulême.  La carrière militaire de Léonard Cacatte : Engagé volontaires nationaux pendant la Révolution dans le 2e bataillon du département de la Haute-Vienne, lieutenant le 18 octobre 1791, capitaine de la compagnie de canonnier le 17 septembre 1792, aide de camp le 30 septembre 1793, attaché au général Jean-Baptiste Jourdan (commandant l'armée de Sambre-et-Meuse), adjudant-général /chef de brigade à titre provisoire le 28 juillet 1794, confirmé adjudant-général / chef de brigade le 13 juin 1795, chef de brigade du 6e régiment de cavalerie le 2 janvier 1799, premier aide de camp du général en chef Jourdan le 16 mars 1804, chef de létat-major du maréchal Jourdan (alors gouverneur de Naples) le 16 septembre 1807, commandant de la place de Naples en octobre 1807. Il passe au service du gouvernement espagnol, en vertu dun ordre du ministre de la guerre de France du 4 mars 1809. Il est commandant de la place de Madrid le 19 mars 1809 puis maréchal de camp le 21 avril 1809. Il démissionne du service de lEspagne pour rester Français le 19 mai 1812. Il rentre au service de la France le 8 janvier 1813 avec rang de colonel. Maréchal de camp par décision de Louis XVIII, datée du 31 octobre 1814, il est admis à la retraite le 31 mai 1815 après 40 ans, 5 mois et 12 jours de service.","architecture":"La terre de Nieul relevait en fief de l'évêque de Limoges. Le château datant du XIIe ou XIIIe siècle, a été vendu comme bien national au général Léonard Cacatte. En 1837, M. Durand de la Saigne, propriétaire, fit démolir une partie de l'ancien château qui tombait en ruine et fit restaurer le corps de bâtiment actuel. Vestiges du donjon encore visible. Intérieur du château décoré de trois cheminées sculptées et de 16 vitraux des XVIe et XVIIe siècles, réemployés, de provenance flamande et germanique. Patrimoine de notre commune depuis 1936 le château de Nieul situé au centre de la commune, dans un site classé depuis 1946 constitue lemblème de Nieul et la fierté de ses habitants. La première évocation de « la tour de Nieul » appartenant à Aymeric de Nieul apparaît dans le cartulaire de Saint-Etienne en 1045. Il ne subsiste rien de nos jours de l'ancienne forteresse médiévale ; seuls les vestiges du donjon sont encore visibles. En 1837, M. Durand de la Saigne, propriétaire, fit démolir une partie de l'ancien château qui tombait en ruine et fit restaurer le corps de bâtiment actuel. Au milieu du XIXe siècle furent effectués d'importants remaniements, décoration intérieure, modification des façades. Plusieurs municipalités ont contribué à la restauration de cet édifice.Le château est devenu propriété municipale suite a un arrêté d'expropriation en 1936.","habitants":"Général Léonard Cacatte\r\n        \"","divers":"Neuil  GPS : 45° 41' 24\" Nord et 1° 18' 47\" Est","gps":"45° 41' 24\" Nord et 1° 18' 47\" Est","images":["../../jctruffet.com/image/image_87/87_Nieul_1.jpg","../../jctruffet.com/image/image_87/87_Nieul_2.jpg","../../jctruffet.com/image/image_87/87_Nieul_3.jpg","../../jctruffet.com/image/image_87/87_Nieul_4.jpg"]},"Consult_chateau_formulaire471e":{"id":"Consult_chateau_formulaire471e","dept":"87","canton":"Couzeix","commune":"Nieul_Chateau","nom":"Nieul_Chateau","type":"Château","periode":"XV-XVIII","histoire":"CHATENET, au XVe siècle c'est le fief d'une branche cadette des Beaumont. Ils restaurent le château et l'entourent d'une enceinte à tours d'angle et grande porte. Au XVIIe siècle, le château passe par mariage aux Dexmier, qui prendront le nom d'Archiac en 1625 après le mariage d'un Dexmier avec Marie d'Archiac. Le château passe par plusieurs familles par vente ou par mariage puis est vendu en 1845 à Louis Fretard d'Écoyeux.                                                                        PUYMAUD, le château date peut-être du XIVe siècle, il fut donné en apanage à un cadet des seigneurs de Nieul, Adémar de Nieul. Sa fille, Delphine de Nieul, porta cette terre à Hélie de Nespoux en l'épousant. En 1482, le petit-fils de ce dernier, jean, était seigneur du lieu.                                                                                   VALETTE, est construit   au XIVe siècle, c'était un \"château-fort délabré et aux tours presque ruinées\". En 1518, Léonard de Félines, fils de noble Pierre de Félines, écuyer, seigneur de Valette, portait \"le blason d'azur au soleil d'or\". En 1635, noble Simon de Rubis, veuf de Gabrielle d'Andaleys de Puymaud et époux de demoiselle Françoise Daniel, de la ville de Saint -Léonard de Noblat, était seigneur du lieu. En 1742, M. de La Mothe possédait Valette; le château, en mauvais état, était affermé, corps  de logis de plan rectangulaire à deux niveaux et lucarnes sur un toit brisé recouvert d'ardoise.","architecture":"CHATENET,  c'est le marquis de Serigny, mari de sa fille qui fera de grands travaux sur l'aile principale avec construction d'une autre aile et destruction de tous les bâtiments de l'avant-cour entre le donjon et la route. Médecin et maire de la commune de Rétaud, Ernest Charles Albert-Favre né le 27 juillet 1868 fut également député et membre du gouvernement de Georges Clemenceau; il achète Chatenet et le rénove.   Éléments du XIVe siècle ; était à l'origine un bâtiment défensif dépendant du château de Nieul, ne comprenait que deux grandes salles (l'une au rez-de-chaussée et l'autre à l'étage) avec de grandes cheminées et la tourelle de l'escalier en vis existant toujours. Au XVe siècle, aménagement intérieur pour Berthe de Vertamont qui fit diviser chacune des deux salles en trois pièces ; puis remaniement de la façade sud en 1671 (date portée sur le linteau de porte).Fin du XIXe siècle, manoir transformé en ferme.       PUYMAUD, Le bâtiment subit des remaniements au cours des XVe, XVIe, XVIIe et XVIIIe siècles. Selon un arpentage de 1742, Puymaud comprenait le château avec ses tours, un pavillon, un corps de logis principal en équerre à deux niveaux avec  une antichambre, des salles, des chambres, un grenier, une grange, un jardin potager, des écuries, ainsi que le parterre et la métairie attenante ; actuellement les tours n'existent plus, mais il reste le porche donnant accès à la cour.","habitants":"Puymaud; Adémar de Nieul                            Valette;Léonard de Félines,                              Chatenet; Louis Fretard d'Écoyeux\r\n        \"","divers":"A Neuil château , de Chatenet grav-1. de Valette garv-2.","gps":"","images":["../../jctruffet.com/image/image_87/87_Nieul_Chateau_1.jpg","../../jctruffet.com/image/image_87/87_Nieul_Chateau_2.jpg"]},"Consult_chateau_formulaire1d9c":{"id":"Consult_chateau_formulaire1d9c","dept":"87","canton":"Châteauponsac","commune":"Oradour-Saint-Genest","nom":"Oradour_St_Genest","type":"Château","periode":"XIII-XVI","histoire":"Trois châteaux à Oradour  Saint-Genest, de Perrière ( vestiges) de Chiron et  celui   de la Rivaillerie : manoir fortifié des XVe et XVIe siècles, pas d'information historique.                                                                        PERRIERE, au donjon et tours ruinés des XIIIe et XIVe siècles, dominant la vallée de la Brame dont les origines remontent au XIVe siècle avec une tour carrée, fut construit après le XVIe siècle. En 1750, année où il tomba en ruine, il était le centre d'une baronnie. Jean de Seychaud, seigneur de la Perrière en 1450, fonda une vicairie en l'église d'Oradour Saint-Genest.  L'abbé Leclerc signala une voie gallo-romaine passant par la Grande Intrade et la Petite Intrade, franchissant la Brame au Moulin du Roi pour monter par un grand chemin tout droit au château du Dorat . il fut habité par la famille Estourneau. \r\nCHIRON, chambres d'hôtes.","architecture":"ORADOUR-Saint-GENEST, vestige du château de la Perrière. CHIRON, corps de logis rectangulaire à deux niveaux  sur soubassement avant corps saillants en façade avec fronton triangulaire au niveau du toit en croupe l'édifice est flanquée à droite comme à Gauche de deux pavillons carrés de même niveau toit à quatre pans.","habitants":"Perrière; Jean de Seychaud\r\n        \"","divers":"A Oradour vestiges grav 1 à 3. château de Chiron grav 4-5. Desbrosses grav 6.","gps":"","images":["../../jctruffet.com/image/image_87/87_Oradour_St_Genest_1.jpg","../../jctruffet.com/image/image_87/87_Oradour_St_Genest_2.jpg","../../jctruffet.com/image/image_87/87_Oradour_St_Genest_3.jpg","../../jctruffet.com/image/image_87/87_Oradour_St_Genest_4.jpg","../../jctruffet.com/image/image_87/87_Oradour_St_Genest_5.jpg","../../jctruffet.com/image/image_87/87_Oradour_St_Genest_6.jpg"]},"Consult_chateau_formulaireaa46":{"id":"Consult_chateau_formulaireaa46","dept":"87","canton":"Panazol","commune":"Panazol","nom":"Panazol","type":"Château","periode":"XV-XVII","histoire":"A PANAZOL, le château de la Rue, la Quintaine du XVe siècle classement au titre des M.H.  depuis le 22 décembre 1986. La villa Dieudonné, à Fargeas, de style art nouveau, réalisée par l'architecte Jean-Baptiste Blanc, de Morpiénas, dont le bâtiment principal a été détruit, et dont il ne reste que des dépendances, Proximart, Buisson, la maison Bontemps, réalisée par Jean Renaudie en 1957. Cordelas. Beausserie.\r\nBEAUSSERIE de la famille de Guillaume Guybert de la  Beausserie  installé dans le château de la Beausserie  jusqu'en 1980. Repris par la commune  qui l'utilise comme  hôtel de ville, médiathèque municipale, salle des expositions et des conférences. Parc de la Beausserie, parc paysager du XIXe siècle. Plan d'eau, arbres remarquables.","architecture":"BEAUSSERIE,  construit vers 1860  de plan rectangulaire corps de logis central à deux niveaux et lucarnes sur toit, jouxté de deux pavillons de part et autres de plan rectangulaire de même niveau avec avant corps central  fronton rotondant, l'ensemble recouvert d'ardoise, chaînage en refend sur tout les angles ainsi qu'au encadrement des portes et fenêtres.                                                                          MONPIENAS, parc de Morpienas, parc de l'ancien château de Morpienas, arbres remarquables, rivière anglaise, orangeraie.                                       QUINTAINE,  bâti à Panazol, la construction  date du XVe siècle, il se situe au Nord-Est de Panazol. Il est classé aux M.H.depuis le 22/12/1986. de plan rectangulaire à deux niveaux accolés d'une tour carrée  à mâchicoulis et chemin de ronde couvert d'un toit à quatre pans.\r\nRUE plus manoir que château privé, à Panazol, il se situe sur la RD 941. à trois niveaux flanqué d'une tourelle à quatre niveaux.","habitants":"Famille de Guillaume Guybert\r\n        \"","divers":"A Panazol château de Panazol grav 1-2.  de Cordelas grav-3. de Monpiénas grav-4. de  Quintaine grav  5-6.GPS : 45° 50' 23\" Nord, 1° 18' 39\" Est.     Rue grav-7 : 45° 50' 23\" Nord, 1° 18' 39\" Est","gps":"45° 50' 23\" Nord, 1° 18' 39\" Est.     Rue grav-7 : 45° 50' 2","images":["../../jctruffet.com/image/image_87/87_Panazol_1.jpg","../../jctruffet.com/image/image_87/87_Panazol_2.jpg","../../jctruffet.com/image/image_87/87_Panazol_3.jpg","../../jctruffet.com/image/image_87/87_Panazol_4.jpg","../../jctruffet.com/image/image_87/87_Panazol_5.jpg","../../jctruffet.com/image/image_87/87_Panazol_6.jpg","../../jctruffet.com/image/image_87/87_Panazol_7.jpg"]},"Consult_chateau_formulaire7b3c":{"id":"Consult_chateau_formulaire7b3c","dept":"87","canton":"Eymoutiers","commune":"Peyrat le Château","nom":"Peyrat_Chateau","type":"château","periode":"XVII","histoire":"Deux châteaux à Peyrat le Château dont la tour et le château de  Villechenine, et à cinq kilomètre à l'est le château de Transrieu.                                                 PEYRAT le CHATEAU, ancienne construction  à Peyrat-le-Château,  il ne reste du château qu'une tour encore debout, est inscrit aux M.H. depuis 1995.       VILLECHENINE, c'est au XVI e siècle qu'on trouve les premières traces écrites de cette magnifique demeure construite sur la commune  quand François 1er anoblit en 1525 la famille De Faye, les propriétaires de l'époque, au milieu du XVIIe siècle, elle appartient à la famille Des Maisons du Palland, baron de Peyrat. Le dernier baron de Peyrat est décédé en 1819. Sa fille a alors épouse le comte de Maumigny et est allée habiter dans le fief de son mari, à Nevers. Au XXe siècle la famille De Romanet de Beaune en devient propriétaire.  Depuis 1961, c'est la famille Authier qui est propriétaire des lieux. L'arrière-grand-mère d'André, l'actuel propriétaire, Marie Dutheil, était servante au château. La famille Authier quitte peu après la demeure mais reste dans le bourg de Peyrat, François devient instituteur dans cette même commune vers 1900. Son fils, Jean, naît à Peyrat et devient professeur de mathématiques. Il termine sa carrière à Paris. C'est lui qui a acheté le château de Villechenine. Le fils de Jean, André, devient lui aussi professeur de mathématiques physique à l'université et épouse Iréna, d'origine polonaise.","architecture":"PEYRAT, au Moyen-Age ce petit bourg de Haute Vienne traverse une période mouvementée. Jean sans terre, Richard Cur de Lion, la guerre de cent ans ont réduit à peu de chose le patrimoine local.  Cette tour carrée qui se mire vers lest dans un petit étang fut construite au XVe siècle. Cest lune des cinq portes de la ville dont lorigine remonte au XIIe siècle mais la base de lédifice est très certainement Gallo-Romaine.  VILLECHENINE, la bâtisse est reconstruite au XVII e ; la porte d'entrée est d'ailleurs classée aux inventaires du patrimoine culturel. Le château est ensuite réaménagé au XIXe et au XXe Siècle. Il est peu habité.","habitants":"Famille De Faye\r\n        \r\n        \"","divers":"Deux châteaux à Peyrat le Château dont la tour grav-1 et le château de  Villechenine.   De Transrieu grav 7-8. GPS : 45° 48' 58\" Nord et 1° 46' 20\" Est","gps":"45° 48' 58\" Nord et 1° 46' 20\" Est","images":["../../jctruffet.com/image/image_87/87_Peyrat_Chateau_1.jpg","../../jctruffet.com/image/image_87/87_Peyrat_Chateau_2.jpg","../../jctruffet.com/image/image_87/87_Peyrat_Chateau_3.jpg","../../jctruffet.com/image/image_87/87_Peyrat_Chateau_4.jpg","../../jctruffet.com/image/image_87/87_Peyrat_Chateau_5.jpg","../../jctruffet.com/image/image_87/87_Peyrat_Chateau_6.jpg"]},"Consult_chateau_formulaire2495":{"id":"Consult_chateau_formulaire2495","dept":"87","canton":"Couzeix","commune":"Peyrilhac","nom":"Peyrilhac","type":"Château","periode":"XIV-XVII","histoire":"A Peyrilhac Château de Trachaussade du XVIIe siècle. Château de Queyroix du XVIIe siècle. Château de la Mothe du XIVe siècle. Château du Breuil du XVIIe siècle.\r\n TRACHAUSSADE est construit au XVIIe ou au XVIIIe siècle. Des remaniements eurent lieu pendant la deuxième moitié du XIXe siècle. Après 1844, la demeure appartient au peintre graveur et aquarelliste français Paul Gavarni qui y fit aménager un atelier. \r\n BREUIL, château   construit probablement au XVIIe ou XVIIIe siècle. pas d'information historique.\r\nQUEYROIX, château construit au XVIIe ou XVIIIe siècle. Il tombait en ruine à la Révolution et fut vendu comme bien national en 1794.  Le château du Queyroix, bâti sur un ancien fief épiscopal attesté en 1542 et 1561, illustre, lui, le type de château construit de toutes pièces, à la fin du XIXe siècle, à proximité dun ancien château démoli. Construit en 1869 à linitiative du comte de la Guéronnière.","architecture":"BREUIL, château   construit probablement au XVIIe ou XVIIIe siècle. Remaniements importants  après 1808 avec adjonction de tourelles d'angles et deux pavillons sont construits et le bâtiment central, initial, est rénové avec remplacement dune toiture en croupe en tuile plate ou creuse par une toiture en ardoise, avec brisis et pourvue de lucarnes. Le château du Breuil est lexemple typique dune maison de maître. Cet édifice est constitué dun corps central et de deux petites ailes postérieures. Au cours de la deuxième moitié du XIXe siècle, deux pavillons sont construits et le bâtiment central, initial, est rénové avec remplacement dune toiture en croupe en tuile plate ou creuse par une toiture en ardoise, avec brisis, pourvue de lucarnes à devantures en pierres.     TRACHAUSSADE  Le bâtiment est composé d'un rez-de-chaussée, d'un étage carré et étage de comble. Le gros oeuvre en granit, moellon et enduit partiel. Tourelles demi hors-oeuvre ; escalier à balustres.  QUEYROIX, château construit au XVIIe ou XVIIIe siècle. subsiste la chapelle, les communs,  ce château possède un corps central plus développé que celui du Breuil et un étage de soubassement réservé aux offices. Lescalier à double volée qui donne accès au rez-de-chaussée surélevé donne un aspect solennel à la façade nord.","habitants":"Trachaussade; Famille de Paul Gavarni         Queyroix,  comte de la  Guéronnière \r\n        \"","divers":"A Peyrilhac château de Breuil grav 1 à 2 du Queyroix grav 3-4-5, de Trachaussade grav -6-7-8.","gps":"","images":["../../jctruffet.com/image/image_87/87_Peyrilhac_1.jpg","../../jctruffet.com/image/image_87/87_Peyrilhac_2.jpg","../../jctruffet.com/image/image_87/87_Peyrilhac_3.jpg","../../jctruffet.com/image/image_87/87_Peyrilhac_4.jpg","../../jctruffet.com/image/image_87/87_Peyrilhac_5.jpg","../../jctruffet.com/image/image_87/87_Peyrilhac_6.jpg","../../jctruffet.com/image/image_87/87_Peyrilhac_7.jpg","../../jctruffet.com/image/image_87/87_Peyrilhac_8.jpg"]},"Consult_chateau_formulaire5a7c":{"id":"Consult_chateau_formulaire5a7c","dept":"87","canton":"Eymoutiers","commune":"Rempnat","nom":"Rempnat","type":"Château","periode":"XVI-XIX","histoire":"Deux châteaux à Rempnat celui de Villeneuve et celui de Mazeau.                                                              VILLENEUVE, bâti à Rempnat, la construction date du XIXe siècle. Il est entouré d'un parc de 8 ha.  Le château de la Villeneuve est devenu un gîte d'hôtes. \r\nMAZEAU, ce château, ayant appartenu aux vicomtes de Comborn, aurait été détruit pendant la guerre de cent ans, et ses pierres ont probablement servi de matériau pour la construction du château.","architecture":"MAZEAU, se situe à peine à un kilomètre à l'est du bourg de Rempnat. Il fut bâti au XVIe siècle. Son architecture est typique des maisons fortes de la Renaissance. Il était autrefois entouré d'un fossé et de jardins aujourd'hui disparus. Il reste aux alentours quelques dépendances dont un grand four à pain qui devait également servir de pigeonnier. Le château en lui-même se présente sous la forme d'un grand manoir, doté de petites tourelles d'angle, de décors en forme de coquilles Saint-Jacques surmontant la porte et les fenêtres au-dessus. Le toit, unique en son genre, possède une grande charpente en forme de bateau renversé. Autrefois, un riche mobilier du XVIe siècle était présent, mais il fut brûlé par des troupes allemandes pendant la seconde guerre mondiale. \r\nLe château fait lobjet dun classement au titre des M.H.depuis le 21 février 1983 alors que le colombier et le réseau hydraulique sont inscrits depuis le 9 novembre 2010.","habitants":"Vicomtes de Comborn\r\n        \r\n        \"","divers":"Rampnat GPS : 45° 43' 05\" Nord et 1° 12' 55\" Est   chat de Mazeau de 1 à 4, Villeneuve  grav 5.","gps":"45° 43' 05\" Nord et 1° 12' 55\" Est   chat de Mazeau de 1 à 4","images":["../../jctruffet.com/image/image_87/87_Rempnat_1.jpg","../../jctruffet.com/image/image_87/87_Rempnat_2.jpg","../../jctruffet.com/image/image_87/87_Rempnat_3.jpg","../../jctruffet.com/image/image_87/87_Rempnat_4.jpg","../../jctruffet.com/image/image_87/87_Rempnat_5.jpg"]},"Consult_chateau_formulaire53e9":{"id":"Consult_chateau_formulaire53e9","dept":"87","canton":"Rochechouart","commune":"Rochechouart","nom":"Rochechouart","type":"Château","periode":"XIII-XV-XVI","histoire":"ROCHECHOUART, la vicomté  est créée au tout début du XIe siècle, au profit dun fils cadet du vicomte de Limoges : Aymeric Ostofranc. Le castrum de Roca Cavardi sinstalle donc à la pointe dun éperon rocheux (roca) en surplomb dun habitat  gallo-romain ayant appartenu à un certain Cavardus.   Pendant trois siècles, la place se transmet de père en fils, les Aymeric succédant aux Aymeric. Au milieu du XIIIe siècle le vicomte doit rappeler à lordre les chevaliers habitant dans lenceinte du castrum ; il interdit à Géraud de Maulmont, bâtisseur de Châlucet de construire « tourelles, tours ou château sur les parcelles de lenclos castral ».  Lors de la guerre  de cent ans, la place résiste longtemps aux anglais avant de tomber entre leurs mains. Du Guesclin, lors de la reconquête du Sud Ouest, entre 1369 et 1380, la rendra aux français. Au décès de son beau-père en 1473, Jean de Pontville, époux dAnne de Rochechouart, devient vicomte. Lui et son fils  François bâtissent entre 1490 et 1512, le château que nous connaissons aujourdhui.  la châtellenie est le fief dune branche cadette des vicomtes de Limoges.    Au XVIIIe siècle  François Honorine et son épouse financent des réparations et des travaux dembellissement, en 1985 : création du musée départemental  d'art contemporain.  Entre 1858 et 1859, le début des campagnes de restauration est mené par le service des M.H pour installer dans le château la sous-préfecture et la mairie, sous le règne de Napoléon III.  En 1836, le département de la Haute-Vienne achète le château.","architecture":"ROCHECHOUART, en 1490 construction du château actuel entre 1490 et 1512. de style Renaissance, Le châtelet d'entrée à pont-levis avec une de ses tours du XIIIe siècle et la seule partie restant de l'ancienne forteresse. Après la guerre de cent ans, le château fut rebâti suivant un plan pentagonal. Le corps de logis présente de grandes travées de baies couronnées de lucarnes passantes, et la galerie de la cour est sur colonnes au fût mouluré en torsades. La tour nord-ouest maintenant arasée, était la tour maîtresse. Il comporte également des parties du XVe siècle. Le château, dont le donjon date du XIIe siècle, et la majorité du bâtiment du XVe siècle, est situé au-dessus du confluent de la Graine et de la Vayres. Jusqu'en 1470,    Il conserve néanmoins la tour en amande du XIIIe siècle ainsi que la base de la tour dartillerie bâtie vers 1470-1480.  Il ne subsiste plus que le châtelet d'entrée à pont-levis de cette forteresse qui a conservé une des tours du XIIIe siècle. Pendant la Révolution, les révolutionnaires essaient de démolir le château mais ne réussirent qu'à démolir le sommet des deux tours qui encadrent la façade Sud-Est. Dans la cour d'honneur, on peut admirer la galerie soutenue par des colonnes torses. Il fait aussi office de Musée d'Art contemporain et de sous-préfecture.","habitants":"Famille de Pontville\r\n        \"","divers":"Rochechouard   GPS : 45° 49' 17\" Nord, 0° 49' 09\" Est","gps":"45° 49' 17\" Nord, 0° 49' 09\" Est","images":["../../jctruffet.com/image/image_87/87_Rochechouart_1.jpg","../../jctruffet.com/image/image_87/87_Rochechouart_2.jpg","../../jctruffet.com/image/image_87/87_Rochechouart_3.jpg","../../jctruffet.com/image/image_87/87_Rochechouart_4.jpg","../../jctruffet.com/image/image_87/87_Rochechouart_5.jpg","../../jctruffet.com/image/image_87/87_Rochechouart_6.jpg","../../jctruffet.com/image/image_87/87_Rochechouart_7.jpg"]},"Consult_chateau_formulaire15d2":{"id":"Consult_chateau_formulaire15d2","dept":"87","canton":"Aixe sur Vienne","commune":"Séreilhac","nom":"Rochefort_Séreilhac","type":"Château","periode":"XIV","histoire":"ROCHEFORT,  début deuxième quart du XVIIIe siècle, construction de l'orangerie, 1733 date portée sur le linteau de la porte sud. Aménagement d'un jardin haut et d'un jardin bas, probablement au cours du XVIIIe siècle. A cette même époque construction des dépendances  délimitant les deux côtés de la cour. Le château et ses dépendances sont vendus comme bien national en 1794. Peu après la destruction du château. Après la Révolution, l'orangerie est transformée en habitation. Début du premier quart du XIXe siècle, reconstruction ou remaniement du portail couvert donnant accès à la cour, 1808 date portée sur le linteau en bois. Après 1855, à l'initiative du Comte Antonin Victor Chabron de Lespinats propriétaire du domaine, désireux de créer un haras, construction de nouveaux bâtiments agricoles et d'un logement.","architecture":"ROCHEFORT bâti avant 1350. Décrit en 1742 comme un manoir de la terre et seigneurie de Séreilhac-Rochefort consistant en quatre logis, quatre tours, fossés, granges, écuries, orangerie, basse-cour, verger et jardin. Probablement à cette époque, décoration du fronton des écuries avec une sculpture en bas-relief représentant un cheval, similaire à celle qui décore le haras du château de Nexon. Bâtiments agricoles; passage couvert, logement, remise, écuries, sellerie occupant les deux côtés d'une grande cour, couverts d'un toit à longs pans en tuile creuse en rez-de-chaussée; au sud de la cour, ancienne orangerie avec un étage carré,avec toit à croupe en ardoise ; élévation, côté jardin, avec travée centrale ornée d'un cadran solaire ; à l'ouest de l'ancienne orangerie, bâtiment couvert en ardoise à un étage carré, probablement ancien logement, et deux bâtiments agricoles dont l'un comporte un logement à l'étage, couverts en tuile mécanique, pour ces deux bâtiments décor en brique et pierre calcaire pour les encadrements de baies ; au milieu de la cour, fontaine, abreuvoir, lavoir et bâtiment à usage indéterminé, peut-être bûcher, de forme presque carrée, et couvert d'un toit en pavillon en tuile plate.","habitants":"Comte Antonin Victor Chabron de Lespinats\r\n        \"","divers":"Rochefort à Séreilhac","gps":"","images":["../../jctruffet.com/image/image_87/87_Rochefort_S%c3%a9reilhac_1.jpg","../../jctruffet.com/image/image_87/87_Rochefort_S%c3%a9reilhac_2.jpg"]},"Consult_chateau_formulaireb4ba":{"id":"Consult_chateau_formulaireb4ba","dept":"87","canton":"St-Léonard-de-Noblat","commune":"Royères St-Martin le Vieux","nom":"Royères","type":"Château","periode":"XVI","histoire":"Deux châteaux à la Royères celui  de  Brignac et Lajudie.                                                                   BRIGNAC, est un château bâti à Royères,  qui domine la vallée de la Vienne, fut construit, si on se réfère aux fondations, aux alentours du XIIIe siècle. il est racheté par les Villoutreix de Brignac qui, en 1788, fut la propriété de la famille de Villoutreix de Brignac au XVIIIe siècle. Les Villoutreix de Brignac le cédèrent au célèbre financier Naurissard. Cet homme d'affaires était aussi propriétaire d'un hôtel particulier, conçu par l'architecte Brousseau et qui abrite aujourd'hui les bureaux de la Banque de France, boulevard Carnot à Limoges. Depuis 1824, le château de Brignac est la propriété de la famille Tandeau de Marsac.               LAJUDIE, à Thomas Becket, ce détail rappelle qu'autrefois, la commune se situait sur un territoire anglais.  Olivier de Royères a participé à la première croisade au XIe siècle.   La baronnie de Brignac est arrivée dans la famille suite au mariage de Marc-Antoine de Villoutreys avec Jeanne de Royère, dont son père était baron de Brignac.  Une famille Tandeau de Marsac habite à l'année près du château.. Au XIXe siècle un Villoutreys de Brignac a fait construire un autre château de Brignac en Anjou, château qui a été vendu au début du XXe siècle et racheté dernièrement par un cousin qui a une grand-mère Villoutreys.","architecture":"BRIGNAC, château construit au premier quart du XVe siècle, remanié au XVIe siècle, une baie de la tour escalier a été aménagée en 1575, date portée; l'aile sud édifiée en 1786, date portée, n'est pas terminée en 1788 lorsque les travaux d'achèvement sont confiés à Mathurin Brousseau qui avait été chargé du gros-oeuvre  ; la chapelle d'origine, détruite, a été reconstruite au 4e quart du XVIIIe siècle ; la chapelle actuelle est du 4e quart du XIXe siècle; deux fermes appelées respectivement réserve haute et basse, chacune à environ 50 mètres du château, figurent sur le cadastre de 1824 et datent du début du XIXe siècle ; à la fin du XIXe siècle, diverses dépendances et un logement de domestiques sont élevés à proximité du château et une terrasse est aménagée dans le style du XVIIIe siècle sur le côté nord de l'aile du XVIIIe siècle, et de la fin du XIXe siècle date encore une orangerie construite en pierre et brique avec cinq baies en plein-cintre.                                                                         LAJUDIE, une partie du château a été construite par le même architecte de celui de La Cosse que vous devez connaître (commune de Veyrac, construit aussi par un Villoutreys). Au XIXe siècle un Villoutreys de Brignac a fait construire un autre château de Brignac en Anjou.","habitants":"Famille des Villoutreix de Brignac                                   Lajudie  Marc-Antoine de Villoutreys\r\n        \"","divers":"à la Royères celui  de  Brignac grav 1 à 6 et Lajudie grav 7 -8.   GPS : 45° 50' 58\" Nord et 1° 25' 53\" Est","gps":"45° 50' 58\" Nord et 1° 25' 53\" Est","images":["../../jctruffet.com/image/image_87/87_Roy%c3%a8res_1.jpg","../../jctruffet.com/image/image_87/87_Roy%c3%a8res_2.jpg","../../jctruffet.com/image/image_87/87_Roy%c3%a8res_3.jpg","../../jctruffet.com/image/image_87/87_Roy%c3%a8res_4.jpg","../../jctruffet.com/image/image_87/87_Roy%c3%a8res_5.jpg","../../jctruffet.com/image/image_87/87_Roy%c3%a8res_6.jpg","../../jctruffet.com/image/image_87/87_Roy%c3%a8res_7.jpg","../../jctruffet.com/image/image_87/8
