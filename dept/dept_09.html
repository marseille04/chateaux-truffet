colonel des chasseurs de montagne qui s'illustra dans les guerres contre l'Espagne, commandant de la place forte de Mont-Louis, puis des places de Lérida et de Barcelone.                                                                                                                                                             le manoir de Roquemaurel du XVIe siècle avec sa tour à bretèches (fortifications en bois, sorte de beffrois ou bastide).                                                                                                         Le château de Vic est cité en 1396 lors du mariage, avec René de Balbi, de la fille du vicomte de Couserans, Arnaud de Lomagne qui le donne en dot. Une charte de coutumes est accordée le 12 octobre 1446 aux habitants par leur seigneur, Odet de Lomagne (après celle de 1405).Jean de Foix, est dit seigneur dOust en 1555 et François de Mauléon, vicomte de Couserans et Françoise de Foix, son épouse sont les nouveaux seigneurs dOust en 1589. A la vicomté de Couserans,   relevant de la châtellenie de St Girons, le château est incendié en 1602 et sera abandonné jusquau réparation à la veille de la Révolution par Joseph de Balbi : ce dernier assiste à lassemblée des trois États tenue à Toulouse le 26 mars 1789 ; incarcéré en 1793 à Saint-Lizier, il devait être guillotiné à Paris : il sera libéré en 1794 (il ny avait pas assez de charrettes pour aller à Paris). Quant au seigneur, de Chambors, il fut nommé député du tiers état aux États Généraux de 1789 par le Couserans.","architecture":"Château de La Tour, XVIe, restauré: berceau des sires de Roquemaurel (en habitation en 1909), avec parties du XVIe ou XVIIe siècle, ce petit manoir dit de la Tour, a été bâti en 1567 sur les vestiges dun donjon après un  incendie. Le manoir dorigine\r\ndaterait du XIIIe siècle. Ce fut le premier fief de la branche\r\nde Roquemaurel du Couserans. Il faisait partie dune série de\r\nchâteaux le long de la vallée du Salat et destinés au verrouillage\r\nde cette vallée et à la protection des habitants en cas dinvasion.\r\nMaisons à galeries et tours dangle  Il apparaît en 1448.                    Le château de Soueix, daprès les fouilles effectuées au château de la Tour qui lui a succédé, datait du XIIIe siècle il faisait partie dune suite de châteaux le long de la vallée du Salat, destinés au verrouillage de cette vallée ou au refuge des habitants en cas dinvasion, du sud vers le nord : Seix, Oust, Vic, Soueix. On pense que Soueix était averti de larrivée ennemie par des feux ou fumées du château de Mirabat sur un piton au sud, à 1272 mètres daltitude. « Les ruines de fortifications du bâtiment du XIIIe siècle ont été retrouvées assez loin du corps de logis actuel prouvant la fonction de défense du château de la Tour.","habitants":"Famille de Roquemaurel \r\n        \"","divers":"Manoir de Roquemaurel et de Latour à Vic","gps":"","images":["../image/image_09/09_Vic_Soueix_1.jpg","../image/image_09/09_Vic_Soueix_2.jpg","../image/image_09/09_Vic_Soueix_3.jpg","../image/image_09/09_Vic_Soueix_4.jpg","../image/image_09/09_Vic_Soueix_5.jpg"]},"Consult_chateau_formulaire6d0e":{"id":"Consult_chateau_formulaire6d0e","dept":"09","canton":"Tarascon sur Ariège","commune":"Auzat","nom":"Vicdessos","type":"Vestiges","periode":"XII","histoire":"VICDESSOS, cité en 1229  est un château fort situé au-dessus du hameau d'Olbier, à Auzat. Ce château comtal fut un des plus importants châteaux des comtes de Foix au Moyen-Age.  Il servait alors notamment à la domination comtale du marché du fer dominant Vicdessos et les activités autour de la grande mine de Rancié à Sem. Au début du XVe siècle, à la faveur d'une restructuration des châteaux du comté et de peur que les ennemis puissent s'en emparer, les comtes de Foix le désarmèrent,  est en ruines aujourd'hui. Montréal-de-Sos fait l'objet depuis 2000 d'un programme de fouilles archéologiques.                                                                                                                              le château de Vic fait partie des fortifications du comte de Foix donné en suzeraineté à Pierre II dAragon 1272 : la vallée de « Sos », avec les châteaux de Montréal et de Vic fait partie du comté de Foix en 1401 : Raimond Arnaud de Château Verdun, le châtelain de Varilhes (Saint Martin) et Brunet de Miglos ont des possessions à Vicdessos,   1414 : réglementation de la mine du Rancié  En 1568 : incendie de Vicdessos durant les guerres de religion par les protestants du sire dAudou qui est repoussé par la population avant daller se réfugier à Siguer doù il est délogé (Delescaze).  Le château féodal (butte de « Castéras ») fut rasé en 1666.","architecture":"Vicdessos, bâti à la fin du XIIe siècle, il a été conservé jusqu'au début du XIVe siècle, date à laquelle il fut volontairement arasé par les comtes de Foix.  Le château de Montréal-de-Sos fut construit  lorsque l'autorité comtale s'imposa clairement sur la haute vallée sur la butte le Castèras, restera debout jusqu'au XVIIe siècle, il est aujourd'hui à l'état de ruines. Il reste du château les vestiges d'une grande enceinte flanquée de deux tours et d'un ancien quartier aristocratique. Ce dernier est rassemblé autour d'un donjon,  dans la partie haute du site au pied duquel se trouvaient les bâtiments seigneuriaux. Il était entouré de fortifications comprenant deux tours: la tour du Campanal, au sud, dominant Olbier, la tour du Barry, au nord, au dessus d'Auzat. Il existait aussi dans son enceinte des habitations villageoises qui sont à l'origine de l'actuel village d'Olbier.                                                                                                                                 Tour du Campanal.  Tour du Barry - Montréal-de-Sos (981m).                                                                   Château  de Cabre corps de logis rectangulaire à deux niveaux  toit en croupe flanqué de deux tourelles aux angles de la façade toitures en poivrières.","habitants":"Comtes de Foix \r\n        \"","divers":"Vestiges du château de Vicdesos, de Montréal et château  de Cabre.","gps":"","images":["../image/image_09/09_Vicdessos_1.jpg","../image/image_09/09_Vicdessos_2.jpg","../image/image_09/09_Vicdessos_3.jpg","../image/image_09/09_Vicdessos_4.jpg","../image/image_09/09_Vicdessos_5.jpg","../image/image_09/09_Vicdessos_6.jpg","../image/image_09/09_Vicdessos_7.jpg"]}};
let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','09 — Ariège'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
