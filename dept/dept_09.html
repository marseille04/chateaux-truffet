                                                                     Sous préfecture, de son origine du début du XIXe siècle jusquen 1944, fut le château de lusine métallurgique, destiné aux premières heures à la résidence du maître des forges, puis à celle prestigieuse, des directeurs de lusine » Sous préfecture \r\n Roumengous , place Eugène-Soula.                                                                                             Hôtel particulier dit de Vasilières.  Au XIXe siècle, cet hôtel  appartient à Bernard Pierre Vasilières, avocat et fonctionnaire des finances à Pamiers.","architecture":"Au château dit Castella, en 1207 : rencontre des tenants de lhérésie cathare et ceux du catholicisme ; en 1212, Simon de Montfort y promulgue la charte imposant aux méridionaux le droit coutumier du nord de la France  1628 : prise de Pamiers par les catholiques.\r\nLenceinte de Pamiers fut démolie dès la fin 1629,  Tour des Cordeliers  : édifice fortifié, classé le 4 mars 1921 : destruction du Castella sur la butte de lancien château, découverte dun puits funéraire avec matériels.    Sous préfecture, cet immeuble n'était pas construit en 1898 mais il l'e fut  au cours du premier quart du XXe siècle, plus exactement pendant les dernières années de la première guerre mondiale. Cette période est favorable à l'usine qui se relève alors de difficultés économiques et sociales récurrentes de la fin du XIXe siècle et décide de la construction d'un immeuble pour la direction de l'usine, composé du corps de bâtiment principal, d'une aile de dépendances et d'un petit pavillon.","habitants":"Abbé Bernard Saisset\r\n        \"","divers":"Edifice de la Préfecture et sous préfecture, de Eugène Soulat et la tour de la monnaie à Pamiers","gps":"","images":["../image/image_09/09_Pamiers_1.jpg","../image/image_09/09_Pamiers_2.jpg","../image/image_09/09_Pamiers_3.jpg","../image/image_09/09_Pamiers_4.jpg","../image/image_09/09_Pamiers_5.jpg","../image/image_09/09_Pamiers_6.jpg"]},"Consult_chateau_formulaire6a57":{"id":"Consult_chateau_formulaire6a57","dept":"09","canton":"Oust","commune":"Soulan","nom":"Pontaud","type":"Château","periode":"XVI","histoire":"PONTAUD-Soulan, avant la Révolution, dépendant de la généralité dAuch, Soulan  appartenait à la châtellenie de St-Girons et relevait, donc,  de la vicomté de Couserans  Soulan et ses dépendances dErp, Araux et Régule, Lescure et Alos appartenaient au XVIe siècle aux seigneurs de Mauléon et de Béon. En 1788, le vicomte de Rochechouard vendit sa seigneurie et vicomté de Soulan à la branche cadette dIcart de Pontaud , dont le  château de Castet.\r\nEn 1790 : une demande pour que la commune de Soulan soit rattachée au canton dOust\r\nAu XIXe siècle, Soulan, avec les localités voisines, sillustra dans la « Guerre des Demoiselles ».","architecture":"Ruines du château de Mouchac\r\nChâteaux du Castet  et dIcart de Pontaud, la reconstruction du XVIIe siècle, cette période noire passée , plusieurs signes attestent d'une grande vague de reconstructions à Soulan : Marguerite de Serres, seigneuresse de Soulan, fait ériger la chapelle Notre-Dame, les anciennes chaumières sont remplacées par de plus grandes maisons. Un nouveau château résidentiel sort de terre à proximité du pont de Pontaud, en dessous de Villeneuve. Le réseau de chemins à l'intérieur de la seigneurie est refait, parfois tracé au cordeau malgré la pente, un pont est bâti en dessous de Villeneuve pour faciliter l'accès au nouveau château et raccourcir le trajet entre Soulan et les seigneuries de Soueix, Oust et Seix.                                                                          Le village du Castet d'Aleu, resserré autour du châtelet qui lui a donné son nom et dont la tour est la plus ancienne construction.","habitants":"Icart de Pontaud\r\n        \"","divers":"Château de Pontaud, du Castet et la Tour à Soulan","gps":"","images":["../image/image_09/09_Pontaud_1.jpg","../image/image_09/09_Pontaud_2.jpg","../image/image_09/09_Pontaud_3.jpg"]},"Consult_chateau_formulaireafe8":{"id":"Consult_chateau_formulaireafe8","dept":"09","canton":"Saint-Lizier","commune":"Fabas","nom":"Poudelay","type":"Château","periode":"XV-XIX","histoire":"POUDELAY, est-ce cela qui a fait craquer Hans-Georg Honne, citoyen germanique, toujours est-il, qu'avec son épouse, il achète le château en février 2000. Lui, ne parle que trois mots de français.  Le château devient un superbe lieu de villégiature, des chambres d'hôtes sont aménagées, il y a aussi des gîtes à proximité sur les terres environnantes. Mais voilà, le 5 septembre 2005, l'épouse de Hans-Georg Honne s'en va sans donner d'explications. Quant à la situation financière du château, elle est déplorable. D'après Hans-Georg Honne c'est sa femme qui est entièrement responsable de cette situation. En tout cas les créanciers n'y voient, semble-t-il, aucune différence. Par exemple, lorsque les chevaux de Merens de Mme Honne vont batifoler dans le voisinage, il se trouve mis en demeure de payer les dégâts, la mise à prix du château paraît ridicule et une fois la vente effectuée il ne lui restera plus rien de ce qu'il avait investi dedans. Pourtant l'intérieur de la vieille demeure est d'une rare qualité, justifiant des prestations de haut niveau; la clientèle doit apprécier. On dit du copropriétaire qu'il est irritable, nerveux.  Au château de Poudelay il n'y a pas de fantômes , encore que la gérante fasse pour l'instant figure d'ectoplasme, si l'on en croit les dires de son mari.   devrait être mis aux enchères le 31 janvier 2007.   Jacques Bonneau en est le dirigeant principal. Aujourd'hui hôtel restaurant.","architecture":"Poudelay, au fil des ans, jusqu'au XIXe siècle, des modifications et des ajouts en ont fait un splendide ensemble architectural, il s'agit d'une vénérable demeure dont les fondations et les premiers murs datent du XVIe siècle,  Il s'agissait  d'une maison-forte remontant au XVe siècle. Dans son état actuel, cette demeure est surtout marquée par des remaniements de la fin du XIXe siècle et du début du XXe siècle. A l'extrémité sud, un faux donjon donne un aspect féodal à l'ensemble. Au nord, le bâtiment est couvert par un toit débordant à croupe rappelant l'architecture de villégiature de l'époque. A l'intérieur, l'élément le plus remarquable demeure un papier peint de la manufacture Dufour, les \"Vues d'Italie\" en panoramique, datant des années 1820.","habitants":"Hans-Georg Honne\r\n        \r\n        \r\n        \"","divers":"Château de Poudelay à Fabas","gps":"","images":["../image/image_09/09_Poudelay_1.jpg","../image/image_09/09_Poudelay_2.jpg","../image/image_09/09_Poudelay_3.jpg"]},"Consult_chateau_formulairecda4":{"id":"Consult_chateau_formulairecda4","dept":"09","canton":"Saint-Lizier","commune":"Prat-Bonrepaux","nom":"Prat_Bonrepaux","type":"Village fortifié -Château","periode":"XII-XVIII","histoire":"PRAT, le château de Prat a une histoire, celle des Templiers de la commanderie de Comminges qui appartenait aux comtes de Comminges depuis 1139 sous le roi Capétien  Louis II le Jeune,  jusqu'en 1312 , règne du roi Capétien PHhilippe IV Le Bel. Ce sont les comtes de Comminges qui créèrent la Baronnie de Prat. A la Renaissance Française, sous François 1er, lÉvêque de Saint-Bertrand de Comminges Jean III de Mauléon, transformait  la forteresse en château renaissance de 1529 à 1543.  Le château reste la propriété de la maison de Mauléon de 1370 à 1611, puis est transmis sous Louis XIII, aux barons de Montpezat, en 1631 à François Le Fol de Garaud baron de Montesquieu. En 1788 la baronnie de Montesquieu-Avantés transmet à son tour à  Aimé de Roquemarel qui en est le propriétaire à la Révolution Française, sous Louis XVI.  Au Consulat en 1802, et jusqu'en 1907 , le château devient la maison du comte Etienne de Nouaillan qui apporte avec la vicomtesse de Saporla, le modernisme eau, électricité, chauffage, ce qui était beaucoup à cette époque. C'est la deuxième Renaissance de Prat avec un  de Nouaillan  qui nous laisse un très bel héritage, restauration de l'escalier à vis, grand salon et la chambre Louis XV, qu'il avait eu l'idée de ne pas restaurer. En 1907 , le château  devient la propriété des comtes d'Avancourt qui le laisseront plus ou moins se dégrader par manque de moyens. De nos jours, la restauration de la propriété est assumée sur fonds propres par monsieur et madame Joseph Bénitez.","architecture":"PRAT, ouvrage défensif du début du XVe sur lemplacement dun château mentionné en 1278 avec 2 enceintes circulaires (terrasse et murs de soutènement), remanié en style Renaissance.  Édifié au XVI et au XIXe siècles sur une ancienne forteresse datant de 1268, sélève au nord du village, sur un piton qui domine le confluent de Salat et de la Gouarège. C'est au XVIe siècle grâce à Jean de Mauléon qu'il prit sa forme actuelle. Le château de Prat est inscrit aux M.H. depuis 1997.   L'entrée, située au Sud-Ouest, s'ouvre dans une tour carrée crêtée de mâchicoulis, et donne accès à une cour.  De la cour part l'accès à une seconde enceinte, en gravissant un escalier de pierre qui dessert une seconde terrasse, réaménagée depuis en jardin. En surplomb de 5 à 6 mètres, on accède à la cour haute, qui était autrefois entourée d'un rempart crénelé. Le logis principal date du XVe siècle. Une nouvelle aile datant du XIX siècle y fut ajoutée. Dans le centre du château de Prat, la tour d'escalier mêle des éléments de style néo-renaissant. A l'intérieur, deux chambres à alcôves sont tapissées de gypseries qui datent du XVIIIe siècle. La chapelle est décoré d'un vitrail de Gesta.","habitants":"Famille  de Mauléon\r\n        \r\n        \r\n        \r\n        \r\n        \"","divers":"Forteresse de Prat-Bonrepaux","gps":"","images":["../image/image_09/09_Prat_Bonrepaux_1.jpg","../image/image_09/09_Prat_Bonrepaux_2.jpg","../image/image_09/09_Prat_Bonrepaux_3.jpg","../image/image_09/09_Prat_Bonrepaux_4.jpg","../image/image_09/09_Prat_Bonrepaux_5.jpg","../image/image_09/09_Prat_Bonrepaux_6.jpg","../image/image_09/09_Prat_Bonrepaux_7.jpg"]},"Consult_chateau_formulaire6f61":{"id":"Consult_chateau_formulaire6f61","dept":"09","canton":"Lalevanet","commune":"Péreilhe","nom":"Péreilhe","type":"Vestiges","periode":"XI","histoire":"PEREILHE, en 1065, la famille Péreilhe possède le domaine de Roquefixade. il semble que le site du village de Péreilhe en fasse parti, mais point nommé clairement. Est mentionné dans l'hommage au comte de Foix Roger III.  Donation au XIIe siècle du château de Péreilhe par le comte de Toulouse à Cécile, fille du vicomte de Trencavel de Bézier,  en 1170, naissance au château de Raymond de Péreilhe. Il va jouer un rôle important dans  la croisade des Albigeois  30 ans plus tard, à Montségur.\r\nRaymond de Péreilhe épouse  en 1205 à Roquefixade Corba de Lanta. Ils ont 5 enfants dont Esclamonde \"futur fantôme\" du château de Montségur, la deuxième fille de Raymond, Philippa, épouse  en 1228 Pierre-Roger de Mirepoix. Eux aussi seront présents à Montségur. L'histoire de l'effroyable massacre se construit petit à petit.\r\nEn 1229, après la chute de Montségur, le traité de Paris accorde le fief de Mirepoix à Guy de Lévis, \"seigneur du nord\" au profit de Pierre Roger de Bellicen. Péreilhe relève de cette seigneurie. Mariage de Catherine de Lévis Mirepoix avec Gabriel de Léran  en 1593, Péreilhe passe à la seigneurie de Léran.","architecture":"Le château de Pereilhe ne semble plus cité au XVIe siècle . Il est peut être revendu à la Révolution et comme souvent, dépareillé de ses pierres pour construire des maisons.  En 1947, des fouilles sont organisées. Les vestiges d'un puits en bas du château ainsi qu'une grotte sont découverts. Le château de Péreilhe, dont il ne reste que les vestiges est le troisième château cathare du pays d'Olmes dans lequel habitait Esclarmonde, fille de Raymond de Péreilhe, héroïne de Montségur qui périt brûlée sur le grand bûcher en 1244.  Ce qui surprend, c'est la petitesse du site de ce château. Il est sur un rocher, coupé de la crête par un fossé.  Aujourd'hui, il domine la rive méridionale de la D10.  Il ne reste rien du château, sur un semblant de plate-forme, une courte banquette  laisse présager d'un mur.","habitants":"Famille de Péreilhe\r\n        \r\n        \"","divers":"Vestiges du château de Pereilhe","gps":"","images":["../image/image_09/09_Pereilhe_1.jpg"]},"Consult_chateau_formulaire1c03":{"id":"Consult_chateau_formulaire1c03","dept":"09","canton":"Quérigut","commune":"Quérigut","nom":"Quérigut","type":"Vestiges","periode":"XI-XV","histoire":"QUERIGUT, Donnezan en 1206, les seigneurs d'Alion ont le titre de Vicomte, ainsi que les terres de Quérigut.  En 1208, ces terres leurs sont confisquées et données au comte Raymond-Roger de Foix qui est vassal du roi d'Aragon.   En 1209, durant la croisade des Albigeois, Bernard dAlion et son frère Arnaud dUsson se rallient aux croisés, en 1226, Bernard dAlion fait hommage au roi de France Louis VIII.  En 1235, il épouse la sur de Roger-Bernard II de Foix, Esclamonde. Vers 1240, elle devient \"parfaite\" devenue  la Dame Blanche  du château de Montségur. La famille Alion est considérée comme hérétique.   En 1244, Bernard dAlion et son frère tentent de secourir Montségur, hélas, geste vint.  En 1258, Bernard dAlion est brûlé pour hérésie à Perpignan devant Jacques dAragon. En 1303, Gaston Ier de Foix rend hommage à Jacques II de Majorque. Vers 1335, les terres appartiennent à Bernard de So, seigneur de Millas. Vers 1450, une tour est construite proche du château. En 1495, les Espagnols tentent de prendre par la force le château. ils sont repoussés. En 1525,  ils occupent la province du Donnezan. Entre 1559 et 1598, les guerres de religions dévastent la France. De part sa position reculée et difficilement accessible, et par le droit d'asile séculaire de la province du Donnezan, de nombreux protestants s'y réfugient. En 1589, les Catalans brûlent le château et en 1595, l'Espagne relâche sa \"pression\" sur la région.  En 1607, unification de la province au royaume de France. Louis XIII  y installe un châtelain et quelques soldats à Quérigut.","architecture":"Quérigut au XIe siècle, construction d'un premier château sur le roc granitique. Du XVe siècle jusqu'à la fin du XVIIe siècle, il fut plusieurs fois assiégé par les espagnols. Une tentative de prendre le château échoue en 1495. En 1589, les assiégeants parviennent à le brûler. En 1607, Louis XIII y établit une garnison. Elle sera supprimée par un arrêt du Conseil dÉtat du 25 avril 1638. Le château sera de nouveau brûlé en 1676. En 1709, Louis XIV ordonne la remise en état et y établit de nouveau une garnison. Au début du XVIIe siècle, le château est reconstruit.  Il ne reste aujourd'hui qu'une tour massive en ruine, qui était l'ancien donjon. En 1681, avec la construction à quelques kilomètres au sud, du fort de Montlouis par Vauban pour stopper les incursions espagnoles, le château de Quérigut devient inutile. Le roi ordonne sa destruction. A la fin du XXe siècle, le château est aménagé pour la visite avec des escaliers en fer.","habitants":"Famille Alion \r\n        \r\n        \"","divers":"Vestiges du château de Quérigut","gps":"","images":["../image/image_09/09_Querigut_1.jpg","../image/image_09/09_Querigut_2.jpg","../image/image_09/09_Querigut_3.jpg","../image/image_09/09_Querigut_4.jpg","../image/image_09/09_Querigut_5.jpg","../image/image_09/09_Querigut_6.jpg","../image/image_09/09_Querigut_7.jpg","../image/image_09/09_Querigut_8.jpg"]},"Consult_chateau_formulaire4c24":{"id":"Consult_chateau_formulaire4c24","dept":"09","canton":"Varilhès","commune":"Rieux de Pelleport","nom":"Rieux_Pelleport","type":"Château","periode":"XIV","histoire":"RIEUX de Pelleport « apparaît dans lhistoire lors de la donation faite en 1008 par Pierre, futur évêque de Gérone à son frère Raymond, comte de Carcassonne, mais reste ensuite dans une heureuse obscurité.  On sait seulement quen 1224, léglise appartient à labbaye Saint-Volusien de Foix qui sen fait confirmer la possession par une bulle dHonorius III. en 1284 hommage de Peyre Ymbault à Roger-Bernard, comte de Foix quil avait acheté à Ramon de Durfort. En 1301 : Bernard Jourdain de lIsle y possède des biens pour lesquels il rend hommage en faveur de Gaston, comte de Foix. Lors du dénombrement du comté de Foix, en 1390,  le château existait toujours, en 1540 et dépendait de la châtellenie de Varilhes. Il fut assiégé durant les guerres de religions par le sire dAudou en 1586 et a probablement été détruit à cette époque  restent des traces dune enceinte. Après le siège de Crampagna par le sieur Daudon ou dAudou, assiégea le chasteau de Rieux de Pelleport, quil salua de quatre-vingts canonades. Mais, sur lheure de donner lassaut, la place lui fut aussi rendue par capitulation, et, passant au travers de la ville de Varilhes, fit réparer le château. A la fin du XVIIe siècle, la seigneurie appartient au seigneur de Dalou, Gaspard dHébrail.","architecture":"Trois châteaux à Rieux- Varilhés, Lasmijane quadrangulaire à deux niveaux fronton rodondant plein cintre d'entrée et accolé d'un pavillon rectangulaire toit en dôme accolée d'une tourelle ronde.                                                                                                                      Château de Lasrives de plan rectangulaire à trois niveaux  avec escalier à double révolution, et château de Rieux  quadrangulaire flanqué d'un corps de logis rectangulaire à deux niveaux toits en croupes avec lucarnes  retour en équerre par un bâtiment étroit fermé par des courtines avec chemin de rondes et deux tours rondes crénelées avec terrasse dont une avec tourelle accolée.","habitants":"Seigneur de Dalou, Gaspard dHébrail\r\n        \"","divers":"Château de Rieux, de Lasmijane et de Lasrives","gps":"","images":["../image/image_09/09_Rieux_Pelleport_1.jpg","../image/image_09/09_Rieux_Pelleport_2.jpg","../image/image_09/09_Rieux_Pelleport_3.jpg"]},"Consult_chateau_formulaire2d43":{"id":"Consult_chateau_formulaire2d43","dept":"09","canton":"Saint-Girons","commune":"Rimont-Combelongue","nom":"Rimont_Combelongue","type":"Abbaye","periode":"XIII","histoire":"RIMONT, est une bastide fondée au XIIIe siècle par les chanoines de l'abbaye de Combelongue en paréage avec Philippe III le Hardi, roi de France (1270-1285). Jusqu'au XIXe siècle une vingtaine d'ateliers fabriquaient à Rimont des poteries en utilisant les marnes de l'Arize. Le village de Rimont reconstruit après sa destruction en 1944, fut inauguré le 19 juin 1950.                                                                       COMBELONGUE  abbaye fondée en 1138 par Arnauld d'Austria, comte de Pallars pour lun de ses fils Antoine, qui en devient le premier abbé. En 1154, l'abbaye reçoit le roi Louis VII, en route vers Saint-Jacques-de-Compostelle. Riche et prospère jusquau XIVe siècle, elle compte alors une centaine de religieux. En 1207, labbé de Combelongue, Navarrus d'Acqs qui était également évêque de Couserans est légat du pape Innocent III. C'est à ce titre qu'il prend part aux querelles religieuses entre Catholiques et cathares à Montréal (Aude) et au Colloque de Pamiers. À partir de 1446, l'abbaye commence à décliner. Affectée par l'épidémie de peste noire (1353-1355), elle est endommagée pendant la Guerre de cent-ans et les guerres de religion. En 1568, l'abbaye de Combelongue est dévastée par les protestants, venus de la région de Tarascon.  L'abbaye se maintient jusquà la Révolution sous le régime de la commende. En 1789, labbaye est pillée et incendiée. Arnaud de Jonquet, dernier abbé de labbaye de Combelongue (de 1741 à 1789) émigre en Espagne.  En 1791, l'abbaye est sécularisée et plus tard vendue comme bien national.                              Château de la Vignasse du XVIIe siècle, a appartenu au sénateur Paul Laffont, né le 25 avril 1885 au Mas d'Azil, avocat et homme politique ; sous secrétaire dÉtat au ministère des postes dans les cabinets Briand et Poincaré,  député de 1914 à 1930; sénateur  du 20 octobre 1929 à sa mort, les pleins pouvoirs sont au maréchal Pétain ; propose l'Andorre pour l'implantation de Radio-Andorre (pour faire face au monopole d'État); assassiné le 13 juillet 1944.","architecture":"Rimont village martyr, a été incendié et détruit le 21 août 1944, lors de la retraite des allemands, à l'exception de quelques bâtiments, dont l'église. Il a été reconstruit sur son éperon rocheux tout en longueur avec des matériaux locaux. A l'origine du village se trouve la création d'une abbaye de prémontrés, l'abbaye de Combelongue, vers 1175. Bastide en 1273 c'est aujourd'hui un village tranquille à la forme allongée, ponctuée par son église romane au clocher octogonal, refait vers 1770. Le château manoir de La Vignasse est du XVIIe siècle. Au moulin de Combelongue, datant du XIIIe siècle et situé près de l'abbaye, se trouve aujourd'hui l'écomusée de la meunerie.                                                                                                                      Combelongue, nichée au creux d'un vallon du piémont pyrénéen, entre Foix et St Girons, l'Abbaye de Combelongue offre le charme et le prestige d'un lieu chargé d'histoire. \r\nCet édifice roman de style mudéjar, classé monument historique, est l'un des fleurons du patrimoine du Couserans. Du jardin médiéval au jardin à la française, son parc labellisé \"jardin remarquable\" propose une promenade à travers les âges. C'est aujourd'hui une demeure privée ouverte à la visite et qui dispose d'un appartement d'hôtes.                                                             Château de monsieur de Saint-Blancat corps de logis rectangulaire à trois niveaux flanqué d'un donjon carré  crénelé","habitants":"Seigneur de Dalou, Gaspard dHébrail\r\n        \"","divers":"A Rimont l'Abbaye de Combelongue  et le château de la Vignasse.","gps":"","images":["../image/image_09/09_Rimont_Combelongue_1.jpg","../image/image_09/09_Rimont_Combelongue_2.jpg","../image/image_09/09_Rimont_Combelongue_3.jpg","../image/image_09/09_Rimont_Combelongue_4.jpg","../image/image_09/09_Rimont_Combelongue_5.jpg","../image/image_09/09_Rimont_Combelongue_6.jpg","../image/image_09/09_Rimont_Combelongue_7.jpg","../image/image_09/09_Rimont_Combelongue_8.jpg"]},"Consult_chateau_formulaireffbc":{"id":"Consult_chateau_formulaireffbc","dept":"09","canton":"Pamiers","commune":"Pamiers","nom":"Riveneuve_Bosc","type":"Château","periode":"XVII","histoire":"RIVENEUVE du BOSC,   aujourd'hui manoir du XVIIe siècle, le château de Riveneuve appartenait jadis au Baron dOrnolac. Il a été agrandi et décoré par Jules de Lahondès qui en hérita en 1850, artiste peintre, élève de Joseph Latour, historien et archéologue renommé, Président de lAcadémie des Jeux Fleuraux à Toulouse. Il peignit au retour d'un voyage en Italie les toiles murales de Rome et Venise, qui ornent le grand salon, notamment celle des jardins de la villa Doria Pamphili à Rome. Il fit sculpter la cheminée avec ses armoiries et celles de la famille d'Exéa pour le mariage de son fils Joseph avec la fille de la Marquise d'Exéa.  Catherine et Hervé Gasiglia ont acheté Riveneuve en 2000 et l'ont restauré avec passion pour en faire une grande maison de famille chaleureuse où ils aiment recevoir leurs enfants et leurs amis. En leur absence, ils sont heureux de faire partager le bonheur de se retrouver nombreux à d'autres familles.","architecture":"Manoir  de plan carré à trois niveaux toits en croupes deux tours carrée à toit pointu quatre pans et deux tourelles carrées en façades.","habitants":"Jules de Lahondès\r\n        \"","divers":"Manoir de Riveneuve du Bosc","gps":"","images":["../image/image_09/09_Riveneuve_Bosc_1.jpg","../image/image_09/09_Riveneuve_Bosc_2.jpg"]},"Consult_chateau_formulaire6523":{"id":"Consult_chateau_formulaire6523","dept":"09","canton":"Lavelanet","commune":"Roquefixade","nom":"Roquefixade","type":"Vestiges","periode":"XII","histoire":"ROQUEFIXADE, appartenait autrefois à la Famille de Villemur, qui étaient les vassaux des Comtes de Foix.  Il fut repris par Raymond VII, Comte de Toulouse en 1243 suite au conflit entre les deux maisons, les premiers seigneurs connus du château sont les seigneurs de Pailhès. En 1205, le mariage de Raimon de Péreilhe avec Corba de Lanta y est célébré. Ce seigneur possédait aussi le château de Péreilhe ainsi que celui de Montségur. Il sert de refuge et de lieu de résistance pour les Albigeois au XIIIe siècle. En 1212, Simon de Montfort prend le château qui dépend alors des comtes de Toulouse. Il est saisi en 1272 par le roi de France Philippe le Hardi, après que le comte de Foix Roger-Bernard III, avec lequel il avait des démêlés, se soit rendu.   En 1463, le château est restitué par le roi Louis XI au comte de Foix, Gaston IV.   En 1675, le baron de Celles, Vital Guilhon de Lestang, rachète le château et sa famille le conserve jusqu'à la Révolution Française, où il est alors vendu comme bien national.  Malgré sa position stratégique à proximité du château de Montségur et bien que servant de refuge, le château de Roquefixade n'a pas connu de combat important. Il est devenu une forteresse royale à la fin de la croisade contre les albigeois. Sur le chemin des ruines du château de Roquefixade dont l'existence est attestée depuis 1034, une stèle est visible.","architecture":"Le château de Roquefixade  est mentionné pour la première fois en 1034. Il s'assure de l'entretien et du réarrangement des fortifications, et il y place une garnison royale, composée d'un châtelain, d'un guetteur, d'un portier, de douze sergents et de chiens de garde, en 1278 dont le but est de surveiller la frontière avec le royaume voisin d'Aragon.  Le château subit divers remaniements du XVe au XVIe siècle pour finalement être détruit en 1632 sur ordre de Louis XIII. Cette forteresse de plus de 100 mètres de long s'étage sur deux paliers, une basse cour qui occupe les trois quarts de la superficie, est entourée de courtines  suivant les lignes de crête. Accessible par un châtelet carré ou se succèdent deux portes étroites en partie taillées dans le rocher et munies de herses. Le donjon rectangulaire qui servait de demeure au châtelain n'est pas intérieur au XIVe siècle.  Les vestiges du château sont classés au titre des monuments historiques depuis le 17 février 1995.","habitants":"Famille de Villemur\r\n        \"","divers":"Vestiges du château de Roquefixade","gps":"","images":["../image/image_09/09_Roquefixade_1.jpg","../image/image_09/09_Roquefixade_2.jpg","../image/image_09/09_Roquefixade_3.jpg","../image/image_09/09_Roquefixade_4.jpg"]},"Consult_chateau_formulaire8e85":{"id":"Consult_chateau_formulaire8e85","dept":"09","canton":"Lavelanet","commune":"Roquefort les Cascades","nom":"Roquefort_Teyrac","type":"Vestiges","periode":"XII","histoire":"TEYRAC,  sur la crête on y découvre les vestiges du château de Teyrac aussi appelé Castellas de Roquefort. Il appartenait aux seigneurs de Lévis-Mirepoix. Belle vue plongeante sur Roquefort-les Cascades et sa vallée.  Du pylône on découvre Castella-de Roquefort sur l'autre versant du Plantaurel et une belle vue panoramique sur le pays d'Olmes.   La première mention écrite semble datée du 27 novembre 1160 : Pierre de Dun  rend hommage au comte de Foix pour les châteaux de Larroque dOlmes et de Roquefort les Cascades. Cela na rien détonnant dans la mesure où les domaines de Mirepoix dépendaient directement du comte de Foix après le partage du comte de Carcassonne qui créera le futur comté de Foix.\r\n Après la chute de Montségur, la seigneurie de Mirepoix appartiendra à la Province du Languedoc. Roquefort les Cascades, comprise dans la seigneurie de Mirepoix, bénéficie du Paréage de Mirepoix conclu entre le roi de France Charles VI et Roger Bernard de Lévis 1er, lettre de patente qui fut remis en cause par Jean de Lévis en 1500 mais rétablit par le roi Louis XII.  Après 1593, date où les terres sont données à Catherine de Lévis Mirepoix lors de son mariage avec Gabriel de Léran, Roquefort les Cascades appartient à la châtellenie de Léran.\r\nQuant au château, il est toujours dit « défendable » en 1510.","architecture":"Mentionné depuis le XIIe siècle, le château appartient en partie aux seigneurs de Dun, vassaux du comte de Foix. Lensemble de la forteresse couvre environ 2000m2. Après la croisade contre les cathares du XIIIe siècle, le territoire de Roquefort-les-Cascades est donné à la famille de Lévis, venue dÎle-de-France. La fondation du village actuel, en fond de vallée, est peut-être due à ces nouveaux seigneurs.  Ruines du château au Carol : vestiges du mur denceinte de lantique château de Teyrac, ancienne propriété de Lévis-Mirepoix. Ce rempart protégeait le château, le village et léglise : ce site a gardé le nom dorigine \" La Ville\"","habitants":"Famille de Pierre de Dun\r\n        \"","divers":"Vestiges du château de Roquefort","gps":"","images":["../image/image_09/09_Roquefort_Teyrac_1.jpg","../image/image_09/09_Roquefort_Teyrac_2.jpg"]},"Consult_chateau_formulaire183e-2":{"id":"Consult_chateau_formulaire183e-2","dept":"09","canton":"Oust","commune":"Vic d","nom":"Roquemaurel","type":"Château","periode":"XV","histoire":"ROQUEMAUREL, Gaspard de Roquemaurel de Saint-Sernin : né à Oust en 1814 ; député de la République en 1871   Gaspard Marie Jacques Ernest de Roquemaurel Saint Sernin . Le 8 février 1871 il fut élu représentant de lAriège à lAssemblée nationale,  il mourut à Versailles à son domicile, le 18 mars 1875, quelques mois avant la fin de la législature. Il était officier de la légion dhonneur, chevalier de lordre pontifical de Saint-Grégoire le Grand, décoré de lordre de Medjidieh de Turquie.   Il est inhumé au cimetière Notre Dame de Versailles. Ernest de Roquemaurel fut lieutenant-colonel d'infanterie, commandant des mobiles de l'Ariège en 1870. Il mourut sans postérité. Son père était Jean-Baptiste de Roquemaurel de Saint-Sernin, né à Soueix en 1771, colonel des chasseurs de montagne qui s'illustra dans les guerres contre l'Espagne, commandant de la place forte de Mont-Louis, puis des places de Lérida et de Barcelone.","architecture":"Les informations manquent à propos de ce petit château, mais lon sait  que ce type de bâtiment fut construit entre la seconde moitié du XVe et le début du XVIe siècle. Ces châteaux sinstallent en fond de vallée, à proximité ou au sein des villages, en contact direct avec les consulats de plus en plus puissants, pour   mieux représenter le pouvoir vicomtal (justice, prison, prélèvement de taxes et droits sur les domaines,\r\nforges, moulins etc.) Ils constituent surtout des centres administratifs.  Ils connaissent des modifications importantes au XVIIe et XVIIIe siècles  tout en conservant leurs dimensions. Du château dOust, sans doute démantelé à la Révolution, subsiste\r\nune tour, vraisemblablement tardive et en tout cas bien remaniée au XVIIe siècle ou au début du XVIIIe siècle.","habitants":"Gaspard Marie Jacques Ernest de Roquemaurel Saint Sernin\r\n        \"","divers":"Tour de la maison forte de Roquemaurel","gps":"","images":["../image/image_09/09_Roquemaurel_1.jpg","../image/image_09/09_Roquemaurel_2.jpg","../image/image_09/09_Roquemaurel_3.jpg"]},"Consult_chateau_formulaire8fed":{"id":"Consult_chateau_formulaire8fed","dept":"09","canton":"Tarascon sur Ariège","commune":"Teilhet","nom":"Roques_Teilhet","type":"Château","periode":"XIX","histoire":"ROQUES, château de Roques  converti pour l'hôtellerie, appartenant à l'origine au marquisat de Portes. Situé au pied des Pyrénées, le château de Roques est niché dans un écrin de verdure, dans un domaine de 150 ha. Il vous est proposé la location de ses salles pour vos séminaires.  la famille des Comtes de Portes, une famille noble du XIXe siècle, originaire du Dauphiné. Ces derniers avaient racheté quelques temps auparavant le Domaine.","architecture":"Domaine qui ne comportait qu'une petite métairie. Après divers travaux de reconstructions et réaménagements des Jardins inspirés du célèbre Palais de Versailles, la simple métairie de Roques fait place au château de Roques appelé jadis château de Manses construit sur la commune de Manses, démonté et rebâti à Teilhet, de plan rectangulaire à trois niveaux toitures en croupes, prolongé sur la gauche d'une orangerie avec trois grandes portes à fronton redondant à toit plats et continué par un édifice rectangulaire  à un niveau avec au dessus un jardin à la française et retour en équerre  par un bâtiment à double fronton triangulaire.","habitants":"Comtes de Portes\r\n        \r\n        \"","divers":"Domaine de la Roques à Teilhet","gps":"","images":["../image/image_09/09_Roques_Teilhet_1.jpg","../image/image_09/09_Roques_Teilhet_2.jpg","../image/image_09/09_Roques_Teilhet_3.jpg","../image/image_09/09_Roques_Teilhet_4.jpg"]},"Consult_chateau_formulaireb414":{"id":"Consult_chateau_formulaireb414","dept":"09","canton":"Pamiers","commune":"St-Victor de Rouzaud","nom":"Rouzaud_Salvaire","type":"Château","periode":"XV","histoire":"ROUZAUD, St-Victor, Inclus dans le paréage des Allemans de 1308 entre le roi de France et l'évêque de Pamiers. Faisait depuis partie de la province du Languedoc et non du comté de Foix, il en est de même pour la commune de La Tour-du-Crieu. Au XVIe siècle, les localités de lancien paréage des Allemans avaient toujours la justice partagée entre le roi de France et lévêque de Pamiers. Le 17 novembre 1865 (date du décret), la commune de Rouzaud est réunie à celle de Saint-Victor.","architecture":"Rouzaud était le siège du domaine seigneurial de Rouzaud, qui fut aussi une commune avant d'être rattaché à celle de St Victor pour former en 1865, celle de St Victor Rouzaud.  Le château primitif datait des temps modernes. Ainsi, de la structure d'origine ne resteraient qu'une portion du logis principal et une autre de l'aile ouest, aujourd'hui devenu le logis secondaire, l'ensemble bâti a été transformé au cours de la deuxième moitié du XIXe siècle. Aucune date n'est portée sur les constructions nouvelles.  Au cours du troisième quart du XIXe siècle, le logis a été transformé et embelli. De nouveaux percements sont réalisés et deux tours ont été ajoutées, une des dépendances située à l'est formant un plan en U a été détruite et l'aile ouest est aussi modifiée dans ses proportions. A la suite de ces modifications, le château présente un plan en L. Les encadrements en brique en anse de panier sont caractéristiques de cette période. L'édifice se trouve sur un point haut de la commune, une colline au sommet aplani. Il est isolé de toute concentration bâtie.","habitants":"Seigneurs locaux\r\n        \"","divers":"Château de Rouzaud","gps":"","images":["../image/image_09/09_Rouzaud_1.jpg","../image/image_09/09_Rouzaud_2.jpg"]},"Consult_chateau_formulaireec80":{"id":"Consult_chateau_formulaireec80","dept":"09","canton":"Saverdun","commune":"Saverdun","nom":"Saverdun","type":"Château","periode":"XII_XVIII","histoire":"Deux châteaux à Saverdun celui des Avocats et de Larlenque et la motte féodale de la tour de Phoebus.                                                                                                                         SAVERDUN, Il fut bâti en 1120 par Roger II comte de Foix  était entouré  d'une enceinte fortifiée. Subit la guerre des Albigeois Simon de Montfort en était maître en 1200. Louis XIIIle fit démolir au XVIIe siècle ainsi que les fortifications, mais avait conservait ses quatre tours d'angles qui furent détruites à la Révolution.   Ces ruines furent défini sous le nom de Tour de Phoebus,  deviendra rapidement le siège dune importante châtellenie dont faisait partie St-Quirc, Lissac, Labatut, Canté, Brie, Esplas, Unzent, Le Vernet et Bonnac. Une charte de coutumes est accordée aux habitants par les comtes de Foix qui la renouvelleront jusquau rattachement au royaume de France. Jean-François de Roux de Pauliac, seigneur de Saverdun, assista à lassemblée de la noblesse à Pamiers en 1789   le vieux château de Saverdun situait au sud de la ville sur une colline dominant le ruisseau de Lansonne, ce château a appartenu au seigneur de Mauvesin puis au baron de Beillard.                                                                                                                                    AVOCATS un  groupement foncier agricole est en activité depuis 23 ans.\r\nLARLENQUES était l'établissement siège de l'entreprise , son activité était la location d'autres biens immobiliers.","architecture":"A Saverdun la démolition des fortifications du château fut décrétée après le traité de Montpellier en octobre 1622 ; elle fut commencée, interrompue par le duc de Rohan (général des églises réformées), puis définitivement réalisée en 1633 en application de la Paix dAlès en juillet 1629, au milieu du XVIIIe siècle, sous lappellation « Tour de Phoebus »)  Domaine et château de Pauliac (à 8 Km de Saverdun) : propriété de la famille des Roux de Pauliac, derniers seigneurs de Saverdun du château du XVIe siècle. Domaine acquis en 1988 par un promoteur néerlandais aujourd'hui centre de naturaliste.\r\nRuines de la tour du XIIe siècle.","habitants":"Jean-François de Roux de Pauliac\r\n        \"","divers":"Motte féodal de Saverdun avec château des Avocats, de Larlenque et l'hôtel de ville","gps":"","images":["../image/image_09/09_Saverdun_1.jpg","../image/image_09/09_Saverdun_2.jpg","../image/image_09/09_Saverdun_3.jpg","../image/image_09/09_Saverdun_4.jpg"]},"Consult_chateau_formulaireb5be":{"id":"Consult_chateau_formulaireb5be","dept":"09","canton":"Ax les Thermes","commune":"Savignac les Ormeaux","nom":"Savignac","type":"Château","periode":"XV","histoire":"SAVIGNAC, mentionné, en 1240. dans le testament de Bernard de Comminges ; mais ne figure pas dans le dénombrement du comté de Foix, à la date de 1272. \r\n En 1456, A. Esquerrier mentionne le village de Savignac comme faisant partie de la châtellenie dAx et était dans la juridiction du consulat dAx. Jusquà la Révolution, labbé de Foix est seul seigneur direct et foncier de Savignac et terres en dépendant avec château, forge, scierie, moulin.  En octobre 1811 et février 1812, Savignac est réquisitionné  par les espagnols qui avaient occupé Ax.  Construction ou re-construction du château au XVIe siècle par Jérôme Fornier de Savignac; la façade a été refaite au début du XIXe siècle.","architecture":"Le château actuel de Savignac, remanié sous la Restauration, conserve intactes les deux façades nord et ouest datables du XVe siècle. Donjon rectangulaire équipé de tourelles d'échauguettes et de corbeaux en pierre. La façade sud, remaniée sous la Restauration, présente un avant-corps plaqué sur le bâtiment du XVe siècle, exemple curieux d'une architecture rustique locale. Il s'agit d'une façade à trois étages flanquée de deux tourelles-pigeonniers avec toiture à quatre pans recouverte d'ardoises taillées en écaille. Le bâtiment du XVe siècle est constitué par le quadrilatère visible depuis l'angle nord ouest du château. Il est souligné par un rang de corbeaux qui soutiennent la toiture, et par deux échauguettes, l'une carrée sur corbeaux, l'autre circulaire en cul de lampe. A l'intérieur, l'escalier se développe sur trois étages, plafond à la française à la peinture gris clair à liseré rouge.","habitants":"Bernard de Comminges\r\n        \"","divers":"Château de Savignac","gps":"","images":["../image/image_09/09_Savignac_1.jpg","../image/image_09/09_Savignac_2.jpg"]},"Consult_chateau_formulaireca11":{"id":"Consult_chateau_formulaireca11","dept":"09","canton":"Oust","commune":"Seix","nom":"Seix","type":"Château","periode":"XII-XVI","histoire":"A Seix trois châteaux dont celui de Seix ou du roi du XIVe siècle musée, les vestiges du Roy, les ruines de Mirabat  et de la Garde du XIIe siècle vestiges (voir article).                                                                                    SEIX,  En 1391, René de Balby défend les droits sur le comté de Foix à la demande du Roi d'Aragon. Le roi Henri II confirme également cette charte en 1547 à Toulouse, puis Charles IX en 1565, et enfin par Louis XIII en 1625. Le château de Seix devient résidence de la famille Balby après le mariage de Gabrielle de Sers avec Bertrand de Balby qui verra la naissance, le 15 octobre 1598, dÉtienne de Balby :  Propriété de la famille Balby de la fin du XVIe jusqu'au milieu du XXe siècle, ce dernier (baron de Montfaucon, seigneur de Fabas et de Montardit) achète, le 20 mai 1626, le château de la Tour et le fait reconstruire.  En 1593, Mathe De Ga et sa fille Philippe Rieu, retirées dans une forêt à proximité de la bourgade de Seix, élaboraient moultes potions et onguents à visée médicinale.                                                                                                                             Château du Roi  château  ou Maison forte, a servi de maison dhabitation, remanié à plusieurs reprises, il était le siège des consuls de Seix, puis de Pierre de Siregand, et plus tard dEtienne de Cabaldy et de ses descendants ; il a été racheté en 1947 par Mr et Mme Legler. Vers 1960, une grille qui se trouvait à lhôtel Rulh de Nice a été achetée par ses propriétaires et emmenée à Seix où elle a été installée dans le château. Il appartient maintenant au district du canton dOust qui le restaure pour en faire un centre dinterprétation.  Les armes de la famille de Balby ornent le linteau de la porte dentrée du château.","architecture":"Le Château de Seix ou maison-forte de Seix, domine le village et date du milieu du XVIe siècle . Il est inscrit à l'inventaire des Monuments Historiques.  le château de Seix a été reconverti en musée et centre d'exposition par la mairie, depuis une dizaine d'année. Le château de Seix, inscrit depuis le 16 mars 1994, est une véritable maison-forte avec tours, meurtrières, poternes et échauguettes.","habitants":"Famille de René de Balby \r\n        \"","divers":"Maison forte de Seix  et vestiges de Mirabat","gps":"","images":["../image/image_09/09_Seix_1.jpg","../image/image_09/09_Seix_2.jpg","../image/image_09/09_Seix_3.jpg","../image/image_09/09_Seix_4.jpg","../image/image_09/09_Seix_5.jpg","../image/image_09/09_Seix_6.jpg","../image/image_09/09_Seix_7.jpg","../image/image_09/09_Seix_8.jpg"]},"Consult_chateau_formulairecafe-2":{"id":"Consult_chateau_formulairecafe-2","dept":"09","canton":"Mirepoix","commune":"Lagarde","nom":"Sibra","type":"château","periode":"XVIII","histoire":"SIBRA, lancien château fort est un édifice monumental qui date du XIe et XIIe siècle. Aujourdhui, le château, aussi appelé le Petit Versailles, est en ruine et des travaux dentretien et de conservation sont envisagés, édifié au XVIe siècle par le chevalier de Saint-Georges, il demeure la propriété de la famille Saint-Georges jusquà la Révolution. Il est ensuite racheté par les frères Espert, maréchaux dEmpire, natifs du hameau de Sibra,  puis par Alcide Villary de Fajac, promoteur de la ligne de chemin de fer Pamiers-Bram-Lavelanet. Alcide Villary de Fajac entreprend à la fin du XIXe siècle la restauration complète du château, dans le style composite dun Moyen-Age et dune Renaissance réinventés par la fantaisie romantique, bref, dans le style dit « troubadour ». Il crée également le vaste parc, entièrement ceint dune muraille de pierre, qui sétend sur 15 hectares au pied du château.                                     \r\nLa famille comtale y vécut jusquau XVIIe siècle, après quoi ils allèrent habiter le galant château de Léran. Jusquà nos jours, les descendants du comte ont su garder leur titre de noblesse. Lancien comte était membre de la fameuse Académie Française et un autre était amiral dans la marine française.","architecture":"Sibra, la grande façade ouvrant  sur la terrasse s'appuie sur une tour  et un pavillon orné d'une tourelle en encorbellement. L'ancien corps de ferme, de nos jours un hameau de classe regroupant plus de 17 propriétaires, est encerclé par le château de Sibra.  Les parties les plus anciennes datent du XVIe siècle, là où le château-même fut édifié seulement à la fin du XVIIIe siècle. Le corps de Logis   de plan rectangulaire à trois niveaux avec toit  en croupe avec pavillon d'entrée  sur flan droit de la façade accolée d'une échauguette, tourelle sur  encorbellement, prolongé par un édifice d'entrée avec grande terrasse. Sur la gauche tour carrée à cinq étages mâchicoulis, crénelée et terrasse, à l'opposée deux tours une carrée donjon à mâchicoulis  à toit brisé pointu avec lucarne, et l'autre ronde avec mâchicoulis toit en poivrière.","habitants":"famille Saint-Georges\r\n        \"","divers":"Château de Sibra à Lagarde","gps":"","images":["../image/image_09/09_Sibra_1.jpg","../image/image_09/09_Sibra_2.jpg","../image/image_09/09_Sibra_3.jpg","../image/image_09/09_Sibra_4.jpg","../image/image_09/09_Sibra_5.jpg","../image/image_09/09_Sibra_6.jpg","../image/image_09/09_Sibra_7.jpg"]},"Consult_chateau_formulaire4fc7":{"id":"Consult_chateau_formulaire4fc7","dept":"09","canton":"Montgaillard","commune":"Caraybat","nom":"Soula_Caraybat","type":"Foix","periode":"XVI-XIX","histoire":"SOULA  Le château actuel de la famille Lacointa : Ramonet de Lorde qui deviendra Lourde, en 1401 rend hommage « per lou castel et loustau al loc de Caraibat », laissant  deux bâtiments distincts château et maison. Certains pensent quil sagit de lorigine de lemplacement de lédifice qui nous concerne, « la métairie du château » de 1578, « le ci-devant château, manoir, maison bâtie à tour de 1618. Une description précise de 1635 montre clairement que la maison seigneuriale se trouvait bien à lemplacement actuel de la propriété Lacointa et « répond aux normes les plus classiques des manoirs champêtres du XVIe siècle ».  Au XVIII siècle, la seigneurie passera dans la famille de Luppé. Volusien de Luppé cède à Pierre Thomas Vidal (avocat qui a épousé la fille de Saturnin de Boyer) la métairie du château, « le bâtiment appelé château.  Celle-ci vivra à Foix et délaissera la demeure seigneuriale. A la Révolution, après maints jugements, la famille de Lourde-Luppé préserva son domaine, mais dans les années qui suivent les murs du château se lézardent, dautant plus que son propriétaire sétablit dans lAude et lhypothèque. La succession difficile (9 héritiers) verra en la personne de Saturnin Vidal retrouver une entité foncière et patrimoniale. Sa fille, Marie, épouse Félix Lacointa, docteur en droit et avocat. Un morcellement sensuit,  Vidal Saturnin, avocat,  affaire Tragine, le bandit de lAriège, en 1841 ; député de lAriège en 1870 ; maire de Tarascon et de Bouan, habitant au château de Caraybat.  Le sieur de Caraybat  est chargé par Laforest-Thoiras, gouverneur de la ville et du château de Foix,  en 1632, de la démolition du château de Roquefixade.","architecture":"Château de Caraybat reconstruit au XIXe siècle. Le nouveau propriétaire tentera alors de reconstituer le domaine initial par des achats successifs et remettra le château en état en doublant son volume, lescalier actuel date de cette époque ; mais la tour qui conduisait à létage est démolie.  \r\nDonc, si la construction est antérieure au XVIIe siècle, une partie de lédifice date du début du XIXe siècle. De plan quadrangulaire à deux niveaux et attiques  flanqués de tours carrées.","habitants":"Famille Lacointa\r\n        \"","divers":"Château de Caraybat à Soulas","gps":"","images":["../image/image_09/09_Soula_Caraybat_1.jpg"]},"Consult_chateau_formulaireb7a4":{"id":"Consult_chateau_formulaireb7a4","dept":"09","canton":"La Bastide de Serrou","commune":"Durban sur Arize","nom":"St_Barthélémy","type":"Vestiges","periode":"XI-XIV","histoire":"Saint-BARTHELEMY,  la seigneurie a longtemps appartenu à la famille de Mauléon. Le château de Durban-sur-Arize est inscrit aux M.H. depuis 3/09/1992.  fut construit par le fondateur de la famille des Durban, Guillaume Aton vers 1093. Il a été réaménagé au XIVe siècle au temps de Loup II de Foix où il semble avoir eu une fonction plutôt résidentielle. Ses dernières transformations datent du XVIe siècle, période des guerres de religions. Il a été inhabité à partir de 1657.   L'association Milles Pattes l'a racheté en 1990 et uvre à sa restauration.\r\n Dans l'enceinte du château la chapelle romane Sainte-Marie était à la fois chapelle castrale et église paroissiale du village placé à l'origine au pied du château.","architecture":"Le château Saint-Barthélemy,  situé sur un éperon rocheux dominant l'Arize le double donjon et la double enceinte encore lisibles témoignent d'une organisation de défense médiévale. Un bastion protégeait l'entrée en chicane du château, tandis que la deuxième enceinte, encore crénelé, garde des traces d'implantation d'un ancien chemin de ronde en bois et de meurtrières. Les 2 donjons et leur défense ont été conçus sur l'emplacement le mieux défendu par l'à pic.  Ses dernières transformations datent du XVIe siècle, période des guerres de Religions. Il a été inhabité à partir de 1657.","habitants":"Famille de Mauléon\r\n        \r\n        \"","divers":"Vestiges du château de Saint-Barthélémy","gps":"","images":["../image/image_09/09_St_Barthelemy_1.jpg","../image/image_09/09_St_Barthelemy_2.jpg","../image/image_09/09_St_Barthelemy_3.jpg","../image/image_09/09_St_Barthelemy_4.jpg","../image/image_09/09_St_Barthelemy_5.jpg","../image/image_09/09_St_Barthelemy_6.jpg","../image/image_09/09_St_Barthelemy_7.jpg","../image/image_09/09_St_Barthelemy_8.jpg"]},"Consult_chateau_formulairebd04":{"id":"Consult_chateau_formulairebd04","dept":"09","canton":"Saint-Girons","commune":"Saint-Girons","nom":"St_Girons","type":"Château","periode":"XVI-XVII","histoire":"Deux Châteaux à Saint-Girons  de St-Girons celui de Beauregard du XVI-XVIIe siècle  hôtel restaurant et le château de Carère.                                                                                                                  BEAUREGARD, lorsque le Couserans se détache du Comminges, au XIIe siècle, les vicomtes, après Lacourt, sinstallent à Saint-Girons en construisant leur château. Le comte de Bigorre, dEsquivat, confie à Roger IV, comte de Foix, la garde de la ville de Saint-Girons et du pays de Nébouzan, jusquà ce quArnaud dEspagne, fils de Roger de Comminges et de Raymond dAspet, son vassal, à qui ce pays appartenait, eût atteint lâge de vingt-cinq ans. Une charte de coutumes est alors accordée aux habitants en 1345 par Raymond Roger de Comminges, vicomte de Couserans. Saint-Girons, faisant partie du Couserans, relèvera du Comminges et avait titre de vicomté, date du XIXe siècle, devenu un bel hôtel.\r\nSt-GIRONS   le château des vicomtes du Couserans est la propriété du conseil général de l'Ariège depuis la Révolution Française, tribunal jusqu'en 1980 puis médiathéque et maison des associations. Durant tout le Moyen -Âge, les deux villes (St Girons, relevant des comtes de Comminges et St-Lizier, ville épiscopale) ne cessent de se combattre. Par alliance, le 24 mars 1499, la famille de Narbonne-Lara reçoit la vicomté de St Girons.","architecture":"Beauregard  attaquée en 1571 par dAudou, qui est repoussé par le sire de Lannemezan, selon Delescaze, la ville de Saint-Girons sera occupée par les Huguenots de janvier à mai 1576    Pour résister aux aragonais, les consuls entourent la ville de remparts (les fossés seront comblés en 1784)  La seule allusion à Saint-Girons dans lHistoire Générale du Languedoc porte sur lannée 1257.  En 1721, un incendie ravage la ville qui fut ruinée pendant plusieurs années : cest pourquoi beaucoup de maisons sont du XVIIIe siècle, comme dans la rue Saint-Valier.  A la Révolution, le château des vicomtes de St Girons du XVI-XVIIe siècle devient collège à la Révolution, puis tribunal. Le château  de plan carré à trois niveaux à toit en tuiles presque plat accolé aux angles de tours carrées dépassant l'édifice d'un étage toit pointu à quatre pans, prolongé sur l'arrière de dépendance de même niveau. En façade avancée d'un préau sur piliers supportant une double terrasse.                                                                                                                Le château des vicomtes de Couserans de plan rectangulaire à deux niveaux  à trois travées et deux pavillons carrées saillants aux angles de même niveaux fronton triangulaire en façade.","habitants":"Famille de Narbonne-Lara\r\n        \"","divers":"Trois châteaux à Saint-Girons; dont celui de Saint-Girons, Beauregard, Puech","gps":"","images":["../image/image_09/09_St_Girons_1.jpg","../image/image_09/09_St_Girons_2.jpg","../image/image_09/09_St_Girons_3.jpg","../image/image_09/09_St_Girons_4.jpg","../image/image_09/09_St_Girons_5.jpg","../image/image_09/09_St_Girons_6.jpg","../image/image_09/09_St_Girons_7.jpg","../image/image_09/09_St_Girons_8.jpg","../image/image_09/09_St_Girons_9.jpg"]},"Consult_chateau_formulaire1fd4":{"id":"Consult_chateau_formulaire1fd4","dept":"09","canton":"Saint-Lizier","commune":"Saint-Lizier","nom":"St_Lizier","type":"Palais","periode":"XI-XVIII","histoire":"Trois châteaux à Saint-Lizier le Palais des évêques, de Saint-Michel, de Baraille Bareille dont celui de Montgauch de Rozes de la comtesse de Tressac pas d'autre information historique.                                                                                                                            PALAIS des EVEQUES  de la fin du XIe jusqu'au XVIIIe siècle, date à laquelle l'évêché fut supprimé, les évêques du Couserans ont construit et embelli ce palais et sa cathédrale Notre-Dame de la Sède. A la cathédrale fut rajouté aux XIIe et XIIIe siècles la salle capitulaire et le cloître qui a disparu. Cet ensemble architectural s'appuie sur les remparts gallo romains du IIIe siècle longs de 740 mètres qui protégeaient la cité antique. Après la Révolution, le palais des Evêques fut tour à tour tribunal, dépôt de mendicité et hôpital psychiatrique avant d'être restructuré pour devenir depuis 2011, musée départemental de lAriège.","architecture":"Palais des évêques,Le palais des évêques a fait l'objet d'une rénovation importante réalisée par Jean-Michel Wilmotte, avec l'ajout d'un bâtiment neuf. Des investisseurs privés ont permis l'installation d'un restaurant gastronomique, \"Le Carré de l'Ange\" et d'une résidence de tourisme dans les bâtiments de l'ancien hôpital. Deux grands salons permettent également la tenue de réunions. Sur quatre étages sont présentées des collections évoquant l'histoire de Saint-Lizier et du Couserans de l'antiquité au XXe siècle. Salle 1: La présence romaine en Couserans. Salle 2: De la cité gallo-romaine à lévêché du Couserans. Salle 3: Le palais des Evêques, histoire et architecture. Salle 4: Vivre dans une vallée pyrénéenne au début du XXe siècle. Y est exposée la collection Begouën qui réunit des costumes et objets de la vie quotidienne provenant de la vallée de Bethmale. La visite du musée est prolongée par celle de la cathédrale  Notre-Dame de la Sède et ses fresques de la Renaissance.","habitants":"Palais des Evêques \r\n        \"","divers":"A St-Lizier, Palais des Evêques, le château de St-Blanquat, château de Rozes  et de Bareille.","gps":"","images":["../image/image_09/09_St_Lizier_1.jpg","../image/image_09/09_St_Lizier_2.jpg","../image/image_09/09_St_Lizier_3.jpg","../image/image_09/09_St_Lizier_4.jpg","../image/image_09/09_St_Lizier_5.jpg","../image/image_09/09_St_Lizier_6.jpg","../image/image_09/09_St_Lizier_7.jpg","../image/image_09/09_St_Lizier_8.jpg"]},"Consult_chateau_formulairef9d1-2":{"id":"Consult_chateau_formulairef9d1-2","dept":"09","canton":"Pamiers","commune":"Saint-Martin d","nom":"St_Martin_Oydes","type":"Maison-foerte","periode":"XV","histoire":"ST-MARTIN-D'OYDES   La seigneurie dépendait du diocèse civil de Toulouse, enclave isolée dans le Comté de Foix. Ce château dont l'origine se situerait au XIIe siècle a été maintes fois remanié. Après avoir servi de forteresse, il devient peu à peu une résidence agréable. Il existait déjà en l'an 1175 lorsqu'il fut donné par D. de Villemur à sa fille Ermengarde à l'occasion de son mariage avec B. de Durban. En 1327, il appartient à Guillaume Bernard d'Arnave puis plusieurs seigneurs se succèdent jusqu'à la comtesse de Tersac, au moment de la Révolution.  En 1632, Louis XIII et Richelieu donnent l'ordre de démanteler, en représailles, tous les châteaux des seigneurs rebelles. En 1851 un mécène, M. Laborde, rachète le château à Mme de Tersac et le reconstruit jusqu'à sa faillite en 1857, provoquant ainsi la vente aux enchères du domaine et des métairies Le nouveau propriétaire après 1857, Emile Loze, puis ses descendants avec la famille Dumas achève de restaurer l'intérieur de la demeure.","architecture":"Saint-Martin d'Oydes du château l'enceinte a  disparue, de plan rectangulaire à trois niveaux, possédait deux tours rondes crénelées sur sa façade principale, au nord, aujourd'hui façade postérieure. Le château était ceinturé d'un fossé entourant la tour ouest.  D'importants travaux ont été réalisés  au XVe siècle, transformant  la vieille bâtisse. Il est possible que les deux tours aient été bâties à cette époque, cela  est vérifié d'après l'étude architecturale des canonnières, mais la tour nord semble plus ancienne.  Il est assuré que les deux tours étaient crénelées et le démantèlement signifie la suppression des défenses, le château était devenu une simple résidence seigneuriale. De la fin du XVIIIe siècle à la première moitié du XIXe siècle, le château inhabité sert de carrière de pierres. Le mur d'enceinte, la tour carrée servant d'escalier, située sur la façade côté village et les toitures sont démontées. On arase les murs jusqu'au plancher du deuxième étage. Ce château qui était jusqu'à la Révolution une forteresse dont les ouvertures du rez-de-chaussée étaient en forme de meurtrières ou de lucarnes maillées de fer, est transformé au cours du XIXe siècle pour en faire une résidence avec des ouvertures pour éclairer les pièces du bas et permettre un accès direct au parc qui l'entoure.","habitants":"Guillaume Bernard d'Arnave \r\n        \"","divers":"Château médièval de Saint-Martin d'Oydes","gps":"","images":["../image/image_09/09_St_Martin_Oydes_1.jpg","../image/image_09/09_St_Martin_Oydes_2.jpg","../image/image_09/09_St_Martin_Oydes_3.jpg"]},"Consult_chateau_formulaire7fa3":{"id":"Consult_chateau_formulaire7fa3","dept":"09","canton":"Montgaillard","commune":"Saint-Paul de Jarrat","nom":"St_Paul_Jarrat","type":"Château","periode":"XVI","histoire":"Trois châteaux à Saint-Paul de Jarat celui de St-Paul , de Labat,  de Dedieu et de Celles à 5 kilomètres à l'est                                                                                                                   ST-PAUL-JARRAT, Le comte de Foix va donner des secteurs géographiques à des seigneurs pour les administrer : pour Saint-Paul de Jarrat ce seront les Marquefave et, ensuite, surtout les Villemur. Ces seigneuries auront des destinées propres à leurs possesseurs et à leurs ressources. Par le jeu des alliances, la seigneurie de Saint-Paul de Jarrat prendra de lessor et deviendra lune des plus puissantes du Comté. Ainsi, par exemple, en 1293, et, donc, après lépisode cathare où de nouvelles frontières vont voir le jour, la possession du baron de Saint-Paul de Jarrat, Pons II de Villemur nous dit le Cartulaire de Boulbonne est alors : château de Saint-Paul et lieux d'Anglada, Saint Germier, Castel Courneille dans la vallée de Saint-Paul, Labat, Entras, Fraissinet, Belmont, Boislo, Lierbeli, Marquefave, Villemur et ce qu'il possédait depuis le ruisseau d'Estrol qui séparait le domaine de Saint-Paul de celui de Montgailhard jusqu'à Montferrier, Lordat, Roquefixade, Arnave et ailleurs dans le Lordalais \". Ainsi, nous pouvons trouver le seigneur de Saint-Paul de Jarrat propriétaire selon les périodes dUrs, Saverdun, Montaut, Bonnac ou autres lieux, aujourdhui appartenant à la famille Dedieu avec des possessions bâties jusquà la croisée du canal pris sur le Labat, et, il ny a pas si longtemps encore, aussi, sur le Scios, jusquà la place dite du Cagnard et à lancienne boucherie Marrot.","architecture":"Château de Labat  fut ruiné durant les guerres de religion, reconstruit au début du   XVIIe siècle et remanié début XXe siècle, second château féodal du XVIe siècle et tour du XIIe siècle.     Château de Saint-Paul et lieux d'Anglada, Saint-Germier, Castel Courneille dans la vallée de Saint-Paul.                                                              Le château Dedieu : Édifié sûrement au tout début du XVIe siècle après le brûlement du château féodal en 1486, il sera demeure seigneuriale jusquà la Révolution et dans lequel se trouvait le lieu de justice. Un incendie, en 1942, la endommagé.                           Château de Celles  de plan rectangulaire à trois niveaux toit en croupes.","habitants":"\"","divers":"Château de Saint-Paul de Jarrat, de Dedieu et de Celles","gps":"","images":["../image/image_09/09_St_Paul_Jarrat_1.jpg","../image/image_09/09_St_Paul_Jarrat_2.jpg","../image/image_09/09_St_Paul_Jarrat_3.jpg"]},"Consult_chateau_formulaire795e":{"id":"Consult_chateau_formulaire795e","dept":"09","canton":"Mirepoix","commune":"Saint-Quentin la Tour","nom":"St_Quentin_Tour","type":"Tour-Château","periode":"XII-XV","histoire":"Deux châteaux à Saint-Quentin celui de Queille du XVe siècle et de Saint-Quentin la Tour.                                                                                                                                                                 ST-QUENTIN-la tour en 1095  Roger II donne à Ermengarde, sa cousine, les pays de Queille et de Chercorb Selon Castillon dAspet, le pays et le château, donné en suzeraineté à Roger 1er, second comte de Foix  donna plus tard le nom au Quillanais.  en 1125 : Roger III signe un traité de paix avec Bernard-Aton : il cède les pays de « Cueille »  Isarn de Fanjeaux prend possession de Queille qui devenait un repère attaché à Monségur à lépoque du catharisme. Pailhès  nétait pas allée aux Lévis en 1212, formant ainsi une enclave dans leur domaine » cependant, il semble dans le dénombrement de 1263 que le château de Queille était de nouveau rentré dans le domaine des comtes de Foix qui se le disputèrent avec les Armagnac avant quil ne rentre dans la possession des Lissac, au XVIe siècle, qui le vendent aux Lévis au XVIIIe siècle.  A la Révolution, la commune de Saint-Quentin adhère, le 14 août 1789, à la « Fédération des Pyrénées » créée par le maire du Peyrat le 9 août 1789.  Etienne Bastide de Lavelanet qui est maire de Saint Quentin entre les deux guerres achète les Tours , Mr Stuart Cranfield  l'achète en 1977.\r\nLe château actuel de Queille : du XVe siècle restauré. « après avoir appartenu au XVIIe siècle au comte de Clermont-Lodève, le château passa dans la famille de Lévis. Sous la Révolution, le district de Mirepoix y installa une fabrique darmes ». Après la Libération, des prisonniers allemands y travaillent.","architecture":"La Tour ce château comprend, en son enceinte, un donjon considéré, par ses dimensions exceptionnelles, comme un exemplaire unique de l'architecture médiévale : la Tour.  Elle est inscrite au titre des monuments historiques depuis 1944. Le donjon central, de plan rectangulaire, est entouré dune enceinte carrée dont les angles nord et sud sont occupés par des tours carrées. Si sa première mention connue remonte à 1331, plusieurs éléments architecturaux sont à rattacher à des époques antérieures. Des baies géminées en plein cintre peuvent évoquer la fin du XIIe siècle ou le début du siècle suivant, tandis que celles à arcature trilobée sont postérieures. Les fenêtres à croisée et demi-croisée appartiennent plutôt au XVe siècle. Les corbeaux de pierre, apparaissant aux Ier et 4ème étages, devaient supporter un chemin de ronde. Lentrée principale arbore le blason de la famille de Lissac, seigneur du lieu aux XVe et XVIe siècles.                                                                                Queille. de plan rectangulaire à trois niveaux toit en croupe avec une échauguette carrée sur un angle, l'édifice est prolongé d'un autre bâtiment à deux niveaux et attiques.","habitants":"Etienne Bastide de Lavelanet \r\n        \"","divers":"Château de la Tour à St-Quentin la Tour et celui de Queille","gps":"","images":["../image/image_09/09_St_Quentin_Tour_1.jpg","../image/image_09/09_St_Quentin_Tour_2.jpg","../image/image_09/09_St_Quentin_Tour_3.jpg","../image/image_09/09_St_Quentin_Tour_4.jpg","../image/image_09/09_St_Quentin_Tour_5.jpg","../image/image_09/09_St_Quentin_Tour_6.jpg","../image/image_09/09_St_Quentin_Tour_7.jpg","../image/image_09/09_St_Quentin_Tour_8.jpg"]},"Consult_chateau_formulaireaa25":{"id":"Consult_chateau_formulaireaa25","dept":"09","canton":"Tarascon sur Ariège","commune":"Tarascon sur Ariège","nom":"Tarascon_Ariège","type":"Château","periode":"XII-","histoire":"Trois châteaux à Tarascon sur Ariège celui de Lacombe du XVIIe siècle,  la tour  Saint-Michel et la tour du Castella.                                                                                                          TARASCON, au XIIe siècle, une seconde enceinte est construite, ainsi qu'un pont qui permet de traverser l'Ariège. Au XIVe siècle lextension de la ville est telle qu'elle sort des enceintes : on note par exemple l'apparition du faubourg Sainte-Quitterie « du bout du pont » et le quartier Saint-Jacques « hors la porte ». Le 10 novembre 1632, le capitaine Teulade de Foix avise les consuls que par ordonnance du roi Louis XIII et du cardinal Richelieu, le château comtal de Tarascon doit être démoli « rez-terre » aux frais de la ville. La tour de Mount-Négré et le château Lamotte subirent le même sort.  En 1775, la tour du Castella, qui surplombe Tarascon, est construite. Elle fait suite à la démolition, par ordre de l'ingénieur de province, de la porte de Foix. Les matériaux issus de la destruction sont en partie réutilisés lors de la construction de la tour ronde du Castella située sur l'ancien emplacement du château féodal, l'autre partie sera utilisée pour la restauration de la porte d'Espagne.                                                                                                                                                 LACOMBE, en Ariège, l'insécurité due aux guerres de religion, à l'instabilité des frontières, aux hordes de brigands, se prolonge au-delà du 1er quart du XVIIe siècle. Les seigneurs se voient contraints de maintenir la protection des villages, des denrées : ils construisent ou entretiennent des maisons fortes qui conservent, en plus modestes, les traits défensifs des anciennes forteresses. C'est le cas de Lacombe, qui gardait la vallée de Rabat, au pied des Trois-Seigneurs. Ses propriétaires, les Guilhem, sont les fondés de pouvoir des Comtes de Foix. Bernard Guilhem fait agrandir son ancienne demeure en renforçant son système défensif, sur le modèle répandu de la maison forte ariégeoise du XVIIe siècle. Il fait orner l'intérieur avec des cheminées fastueuses à décor de stuc en ronde-bosse, rappelant les oeuvres du Primatice à Fontainebleau. Les cheminées de Lacombe reprennent des modèles issus du recueil des oeuvre d'Abraham Bosse, publié en 1633.","architecture":"Tour du Castella Tout le long de notre ascension en pente douce vers le Castella, point culminant de la ville, les trois rues celle du Barri, Naugé et Lacaussade,  dévoilent sous les rénovations, des pavés et des colombages, typiques dune architecture des XVIe et XVIIe siècles.\r\nTour Saint-Michel.\r\nFortifications et Lacombe, maison forte du Comté de Foix. Château du XVIIe siècle, sans doute construit sur des éléments plus anciens. Il se compose d'un quadrilatère massif cantonné de trois tourelles de dimensions différentes. Sur celles du nord-ouest et du nord-est, des vestiges de corbeaux donnent à penser qu'ils pouvaient soutenir antérieurement un chemin de ronde. La façade principale, au sud, comporte une tourelle d'angle en légère saillie, avec fenêtres à meneaux et une porte d'entrée à linteaux de pierre surmontée d'un arc de décharge. Certaines des fenêtres à meneaux d'origine ont été transformées. A l'intérieur, deux imposantes cheminées en stuc sculpté. Une troisième cheminée plus modeste, également à décor stuqué, comporte un panneau peint sur son manteau.","habitants":"Famille de Bernard Guilhem\r\n        \r\n        \"","divers":"Le château de Lacombe et les tours de St-Michel et du Castella à Tarascon sur Ariège","gps":"","images":["../image/image_09/09_Tarascon_Ariege_1.jpg","../image/image_09/09_Tarascon_Ariege_2.jpg","../image/image_09/09_Tarascon_Ariege_3.jpg","../image/image_09/09_Tarascon_Ariege_4.jpg","../image/image_09/09_Tarascon_Ariege_5.jpg","../image/image_09/09_Tarascon_Ariege_6.jpg"]},"Consult_chateau_formulaire7a00":{"id":"Consult_chateau_formulaire7a00","dept":"09","canton":"Mirepoix","commune":"Mirepoix","nom":"Terride_Mirepoix","type":"Château","periode":"XI","histoire":"TERRIDE,  ce modeste château, patrimoine à la croisée des directions du Lauragais et du Languedoc, ce lieu de mémoire fut assiégé quatre fois par les croisés. Il devient propriété de Simon de Montfort, le château fut pris en même temps que la cité, le 22 septembre 1209, jour de la Saint-Maurice. Guy de Lévis en prit possession le 1er décembre 1212. Le château reviendra enfin en 1218 à Raymond Roger comte de Foix. Le château ne prit le nom de « Terride » qu'au XVIe siècle, en vertu d'une convention conclue entre Jean de Lévis et Catherine-Ursule de Lomagne, qui lui apporta en dot la baronnie de Terride en Gimois. Surplombant Mirepoix, le château de Terride, Le maître actuel des lieux Raymond Roger a entrepris depuis treize ans un programme impressionnant et colossal pour la sauvegarde, la restauration et la préservation de ce lieu de mémoire qui fut assiégé quatre fois par les croisés.  La destinée du château est étroitement liée à la volonté de l'actuel propriétaire qui, guidé par la passion, réalise un véritable sauvetage en conduisant un projet ambitieux de valorisation visant à redonner son lustre à l'édifice afin qu'il puisse continuer à veiller sur la bastide.  Ce prix récompense Raymond Roger pour la restauration de deux cheminées datant du XVe siècle situées dans la tour carrée dont la réhabilitation avance à grand pas. Le site privé du château de Terride s'associe à notre patrimoine. Notre économie passe par ce modèle d'initiative de grande envergure. Surprenante destinée de ce château qui aujourd'hui, ironie du sort, a trouvé un autre Raymond Roger pour le sauver, lequel laisse son empreinte sur un patrimoine qui s'insère dans l'histoire et assure la promotion de la destination touristique de la cité médiévale.","architecture":"La Terride, situé à peu de distance du pont de Mirepoix, sur le sommet d'une colline (altitude 354m) apparaissent les ruines de l'ancien château de Mirepoix, nommé aussi, et plus vulgairement, le château de Terride  qui a été jadis le château de Mirepoix. La première mention de ce château remonte à 960. Le château primitif était constitué d'une tour de défense qui a été restauré longtemps plus tard en lieu d'habitation. Château féodal des seigneurs de Mirepoix, il protégeait la ville depuis la hauteur.   Aujourd'hui des vestiges subsistants une tour carrée des tronçons d'enceinte perçée de meurtrières. Au XVIe siècle une nouvelle demeure constitué d'une bâtiment carré flanqué d'une tour d'angle, encore habitée aujourd'hui.   Un ensemble de bâtisses proches d'une imposante tour ronde et de quelques pans de murailles qui subsistent de l'ancienne forteresse. La terrasse actuelle est bien postérieure du début du XXe siècle.","habitants":"Famille de Raymond Roger\r\n        \"","divers":"Château de la Terride à Mirepoix","gps":"","images":["../image/image_09/09_Terride_Mirepoix_1.jpg","../image/image_09/09_Terride_Mirepoix_2.jpg"]},"Consult_chateau_formulairedc7e":{"id":"Consult_chateau_formulairedc7e","dept":"09","canton":"Pamiers","commune":"La Tour du Crieu","nom":"Tour_du_Crieu","type":"Tour-Château","periode":"XIV","histoire":"TOUR-du-CRIEU, pillage par les routiers en 1439 à la fin de la guerre de cent ans.    Les Allemans en 1533 sont toujours viguerie de la sénéchaussée de Carcassonne.  Lacvivier, juge des Allemans, huguenot, fait brûler léglise de ce village en 1621.  Castillon dAspet, DAudou (chef des protestants), auparavant assiégea léglise des Allemans et  y  fut repoussé et obligé de se retirer, après avoir été blessé par leffet de ses propres poudres  11 septembre 1623: le chapitre de Pamiers vote un emprunt pour la réédification de l'église \"démolie pendant les troubles, le 8 avril 1650:  Rachat par les habitants des Allemans pour douze cents livres de la seigneurie haute, moyenne et basse dudit lieu, alignée par le chapitre de Pamiers:  Durand la première guerre mondiale, le 14 octobre 1915, Poincarré décide que les  Allemans  prendra le nom de La tour du Crieu suite à la délibération du conseil municipal du 16 août 1914.  Durant la seconde guerre mondiale, le domaine du château de Bonrepaux (qui avait appartenu à l'abbaye de Boulbonne servit de caches et de boîtes à lettres pour la Résistance. Le dernier propriétaire du château avant l'achat de la municipalité en 1993 est M. Veyrolet. Le château a été habité jusque dans les années 1950-1960. Il est aujourd'hui occupé par les associations communales.","architecture":"Tour du Crieu, situé à l'entrée du village, le château aurait été l'ancienne résidence des viguiers, construite au cours du XVIIe siècle. L'ensemble du bâti a été fortement remanié dans la 2e moitié du XVIIIe siècle.     En effet ses dimensions ont été réduites, une tour ronde à l'ouest a disparu et le plan ne comporte plus ses multiples avancées. Les dépendances existantes en 1828 sont celles qui longent actuellement la voie du côté du château. Du logis d'origine, il ne nous est parvenu que peu d'éléments visibles. Dans la 2e moitié du XIXe siècle marquée par l'essor agricole, une série de nouvelles dépendances sont construites perpendiculairement à la voie, notamment 5 hauts bâtiments servant lors de la récolte du raisin et également de l'autre côté de la voie \"l'acacière\".  Le château et ses dépendances furent le siège d'une exploitation d'environ 200 hectares de vignes et de céréales.  aujourd'hui hôtel de ville.","habitants":"Castillon dAspet\r\n        \"","divers":"Château de la Tour du Crieu","gps":"","images":["../image/image_09/09_Tour_du_Crieu_1.jpg","../image/image_09/09_Tour_du_Crieu_2.jpg","../image/image_09/09_Tour_du_Crieu_3.jpg"]},"Consult_chateau_formulairef289":{"id":"Consult_chateau_formulairef289","dept":"09","canton":"Saint-Lizier","commune":"Tourtouse","nom":"Tourtouse","type":"Château","periode":"XV","histoire":"TOURTOUSE, sous l'ancien régime, Tourtouse était \"une terre seigneuriale des évêques du Couserans\" et le prince évèque Bruno de Ruade y fit réédifier une aile de lancien château fort et léglise sur lemplacement de lancienne chapelle du château de Tourtouse. Le château était sous la garde d'un châtelain laïc, vassal de l'évêque. Ce fut pendant un temps un membre de la grande famille des Tersac-Gensac.","architecture":"Du château médiéval de Tourtouse  subsistent aussi le tracé du mur d'enceinte, reconstruit plus tard, et les deux premiers niveaux du donjon quadrangulaire auquel on accédait, non par la porte actuelle, mais par une ouverture au premier étage, comme dans toutes les tours \"romanes\".   Il est entouré dune charmante campagne bucolique et vallonnée. On peut y découvrir les ruines dun donjon, des mâchicoulis, des courtines, des percées de meurtrières et la porte de la \"ville.\" De beaux vestiges qui nous amène à penser que Tourtouse a eu ses heures de gloire.","habitants":"évèque Bruno de Ruade\r\n        \"","divers":"Château de Tourtouse","gps":"","images":["../image/image_09/09_Tourtouse_1.jpg","../image/image_09/09_Tourtouse_2.jpg"]},"Consult_chateau_formulaired883":{"id":"Consult_chateau_formulaired883","dept":"09","canton":"Quérigut","commune":"Rouze_Donnezan","nom":"Usson_Castel","type":"Vestiges","periode":"XIII","histoire":"USSON est appelé Castèl de So, en 1035 il était la propriété des comtes de Cerdagne mais sa construction semble antérieure à cette date. Il appartient ensuite aux comtes de Barcelone puis au royaume d'Aragon. Il fut le château des anciens seigneurs de So et d'Alion. Vassaux des Comtes de Foix, En 1208 Pierre II d'Aragon céda le château et les terres du Donezan au comte de Foix Raymond Roger. Dernier comte de Foix, Henri IV l'annexa au royaume de France, pendant la croisade contre les Albigeois, Bernard d'Allion, seigneur d'Usson et vassal du comte de Foix, fait allégeance au roi de France Louis VIII en 1226 et se soumet à Simon de Montfort. Mais comme nombre de seigneurs du comté, il n'en continua pas moins de protéger les cathares. Il envoya en 1243 des soldats à Montségur pour en renforcer la garnison lors du siège de la citadelle par l'armée d'Hugues des Arcis. Après la chute de Montségur six parfaits vinrent se réfugier au château d'Usson. Accusé d'hérésie, Bernard d'Alion fut brûlé en 1258 sur un bûcher à Perpignan, Bernard d'Alion qui avait épousé en 1236 Esclarmonde soeur du comte de Foix le reconstruisit et en 1607   Louis XIII établit un châtelain, donnation de père en fils entre Argila et Bera II de Razès.  Louis XIV qui le vend avec le Donezan en 1711 à un notable du comté de Foix, Jean Louis d'Usson le marquis de Bonnac, seigneur de Bonrepaux. Le marquis de Bonnac fera réaménager le château par l'architecte Victor Canas. Les de Bonnac gardèrent leurs biens jusqu'à la Révolution où il furent vendus. Le château sera détruit en 1792 . Actuellement consolidé.","architecture":"Usson fait partie des rares sites cathares, son histoire est plus que millénaire, il  dresse ses ruines imposantes à 923 mètres d'altitude. Le château  reconstruit au XIIIe siècle.  Ne présentant plus guère d'intérêt stratégique le château d'Usson est démantelé en 1638 par Louis XIV , racheté en 1711 restauré jusqu'en 1722  transformé en une luxueuse résidence.                                                                  Durant le XIXe siècle il servira de carrière à ses nouveaux acquéreurs. il subsistent aujourd'hui quelques murs de l'enceinte haute, les vestiges  d'une tour carrée et un donjon pentagonal qui dominait la basse-cour.\r\n Depuis 1990, les ruines du château d'Usson ont été consolidées, des fouilles archéologiques entreprises et la maison du patrimoine du Donezan aménagée dans les écuries datant du XVIIIe siècle.","habitants":"Famille de Bernard d'Allion\r\n        \"","divers":"Vestiges du château d'usson","gps":"","images":["../image/image_09/09_Usson_Castel_1.jpg","../image/image_09/09_Usson_Castel_2.jpg","../image/image_09/09_Usson_Castel_3.jpg","../image/image_09/09_Usson_Castel_4.jpg","../image/image_09/09_Usson_Castel_5.jpg"]},"Consult_chateau_formulairebcaf":{"id":"Consult_chateau_formulairebcaf","dept":"09","canton":"Oust","commune":"Oust","nom":"Vic_Soueix","type":"Manoir","periode":"XVI","histoire":"Deux manoirs à Vic-Soueix Latour et Roquemaurel                                                             SOUEIX appartenait à la vicomté de Couserans, par les alliances de ses seigneurs, La famille de Saint-Jean  seigneurs de Soueix deviendra Saint-Jean de Pointis par le mariage de Gaspard de Saint-Jean avec Catherine de Comminges, fille dOdet de Comminges, vicomte de Couserans et de Pointis, en 1535. Des co-seigneurs sont de la famille de Roquemaurel, Arnaud, en 1503, Jean de Roquemaurel en 1540 et le resteront jusquà la Révolution.  Ernest de Roquemaurel fut lieutenant-colonel d'infanterie, commandant des mobiles de l'Ariège en 1870. Il mourut sans postérité. Son père était Jean-Baptiste de Roquemaurel de Saint Sernin, né à Soueix en 1771,
