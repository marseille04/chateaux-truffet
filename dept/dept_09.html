e fief jusquà la Révolution. Pourtant, en 1628, les protestants de Mazères pillent Gaudiès. Le 33 avril 1636 : Décès dHenri de Lévis, seigneur et baron de Gaudiès, inhumé dans léglise, au milieu de lautel. Le  12 janvier 1811 : Guy de Lévis Gaudiès rachète le château . Le 6 juin 1840 : Léo de Lévis Gaudiès vend ce quil possède à Gaudiès,  Paul Ladislas Caujolle, député (1928-1932) achète le château en 1930 ; il y hébergera des militaires et des réfufiés durant la seconde guerre mondiale. Il y meurt le 27/08/1961.","architecture":"Le château  de Gardiès  de la fin du XIIIe siècle de plan rectangulaire oblong, fut la résidence d'été des évêques de Toulouse jusqu'en 1569. Tour carrée XIIe siècle, dite \"prison des prêtres\"; tours rondes XVe siècle.; bâtiments XVIIe siècle. ; façade XVIIIe siècle. ; enceinte quadrilatère ; douves ; façade ornée en 1620 par Henri de Levis-Mirepoix qui en devint seigneur et restaura la vieille bâtisse très abîmée par les guerres de religion. Une nouvelle restauration eut lieu à la fin du XXe siècle.   Le château de Gaudiès est inscrit aux M.H. depuis 1977","habitants":"Famille Jean Claude de Lévis dAudou\r\n        \"","divers":"Château de Gaudiès","gps":"","images":["../image/image_09/09_Gaudies_1.jpg","../image/image_09/09_Gaudies_2.jpg","../image/image_09/09_Gaudies_3.jpg"]},"Consult_chateau_formulairea241":{"id":"Consult_chateau_formulairea241","dept":"09","canton":"Cabannes","commune":"Château-Verdun","nom":"Gudanes","type":"Château","periode":"XI-XVII","histoire":"CHATEAU-VERDUN, la première mention d'une seigneurie date de 1244 , la seigneurie de Château-Verdun est partagée en 1401 en 12 copropriétaires représentant l'ensemble lignage.  Dans les années 1270, le comte de Foix restitua la seigneurie confisquée pour fait dhérésie au seigneur Aton-Arnaud de Château-Verdun contre une forte somme dargent. Aton-Arnaud finit par senfuir en Italie et il est fort probable que la seigneurie et le château échut à lun de ses parents.   Dès 1293, les Batalha devinrent co-seigneurs avec ceux de Château-Verdun, les Miglos dès 1372, les Saquet et les Montfort au début du XVe siècle.  Au Moyen-Age la châtellenie de Château-Verdun regroupait également les communautés (villages) de Verdun, Albiès, les Cabannes, Aston, Larcat.   Le castrum traversera le temps jusqu'au XVIIe siècle ; ou mal entretenu, peut-être écrêté sous les ordres de Richelieu, il fera figure de ruines dans divers documents à partir de 1671. Il sera relayé par le château de Gudanes construit   sur une éminence proche.                                                                                                                                            GUDANES, la construction attenante au château-Verdun date du milieu du XVIIIe siècle. Il est de style classique. La première mention d'une seigneurie date de 1244.   Lors des Guerres de Religion, Fantillon de Sales, seigneur de Gudanes et catholique, est assiégé dans son château qui est pillé et démoli en 1580. Au Moyen Age la châtellenie de Château-Verdun regroupait également les communautés de Verdun, Albiès, les Cabannes, Aston, Larcat.  Il sera relayé par le château de Gudanes construit antérieurement , la baronne de Gudanes, Marie Antoinette de Miglos, épouse de Jérôme de Sales, se retrouve, étant veuve, en Espagne (en 1669) et devient espionne au profit de Louis XIV.  Son propriétaire actuel est une SCI.  Menacé de ruine par l'insuffisance de travaux d'entretien, le château a été racheté en 2013. Il est actuellement en restauration.","architecture":"Vestiges de Château-verdun, murs percés d'ouvertures de la partie habitée du château du côté du village de Château-Verdun\r\nDe cet ensemble, il reste aujourdhui le château médiéval dit « de Landres » en ruine qui surplombe le village de Château-Verdun et celui de «Gudanes» construit au XVIIIe siècle et situé en bordure de la route montant au plateau de Beille.    Les vestiges du château occupent aujourdhui un verrou qui sert de support à la fortification et qui sélève à une quarantaine de mètres au-dessus de la vallée de lAston. Le verrou est proche du lieu de confluence entre la rivière de lAston et celle de lAriège. Tout autour de la « Motte castrale », sorganise lactuel village de Château-Verdun.                                                                                    Gudanes reconstruit en 1750  Il reste aujourd'hui 2 bâtiments :  Il est de style classique, sur un replat dominant la zone de confluence de l'Aston et de l'Ariège.                                            Le château de Gudanes, son portail, sa grille, les sols de l'allée montante et les trois terrasses, sont classés aux L.H. depuis le 14 juin 1994. Menacé de ruine par l'insuffisance de travaux d'entretien, le château de Gudanes avec tours et échauguettes d'angles a été racheté en 2013. Il est actuellement en restauration. Il est classé aux M.H. depuis 1994.","habitants":"Famille de Fantillon de Sales\r\n        \"","divers":"Vestiges de Château-Verdun et château de Gudanes à Château-Verdun","gps":"","images":["../image/image_09/09_Gudanes_1.jpg","../image/image_09/09_Gudanes_2.jpg","../image/image_09/09_Gudanes_3.jpg","../image/image_09/09_Gudanes_4.jpg","../image/image_09/09_Gudanes_5.jpg","../image/image_09/09_Gudanes_6.jpg","../image/image_09/09_Gudanes_7.jpg"]},"Consult_chateau_formulaireb33d":{"id":"Consult_chateau_formulaireb33d","dept":"09","canton":"Oust","commune":"Seix","nom":"La_Garde_Mirabat","type":"Vestiges","periode":"XI-XVII","histoire":"LA-GARDE  ou de la Garde, date du Moyen-Age. C'était un château fort qui date de 1063, une forteresse défensive positionnée sur les hauteurs de Seix. Construit à partir du XIe siècle, le roi d'Aragon, Ramire Ier de Navarre en fait d'abord en une tour de garde au nord de son royaume puis la famille Lévis seigneurs de l'Ile-de-France, vainqueurs de la croisade des Albigeois, édifie un nouveau château au XIVe siècle sur une colline dominant la vallée de lHers-Vif. Il fut l'objet au cours des siècles de nombreux remaniements, dans un premier temps il est défensif jusqu'au milieu du XVIe siècle  puis il sera transformé au cours du XVIIe siècle, en un splendide palais d'agrément. Le château était déjà en ruine au XVIe siècle. Des travaux de restauration sont en cours depuis. La fiche du château sur le site du ministère de la culture indique que \"selon la tradition, Charlemagne de passage à Seix lors d'une campagne menée contre les Sarrasins, aurait organisé la défense contre l'ennemi, faisant édifier le château de la Garde et y plaçant une garnison. Lagarde tombe peu à peu à l'abandon  et en ruines depuis de la Révolution. Il est inscrit aux M.H. depuis le 08 février 1996.                                                                                                                                   MIRABAT dit château du Roi. serait le plus ancien château d'Ariège et un des plus vieux des Pyrénées. D'une ancienne tour de feu pour surveiller une éventuelle invasion des Maures, il devint un château de garnison du vicomte de Couserans, dès le XIIe siècle, pour renforcer les frontières avec le Pallars.","architecture":"La-Garde, à Seix,  formait avec celui de Mirabat un ensemble qui surveillait les incursions des Maures.  Il était ruiné au XVIe siècle. De plan rectangulaire avait un donjon central carré et deux tours d'angle.  Qualité du dispositif défensif , vaste enceinte rectangulaire au milieu de laquelle s' élève un donjon associé à celui du château de Mirabat. Château bâtis en moellons, déjà en ruines au XVIe siècle.  Forteresse défensive sur les hauteurs de Seix,   des échauguette : guérite en pierre à langle du château avec rôle de garde et de surveillance\r\navec des  meurtrières : ouverture, fente verticale pratiquée dans le mur de fortification qui permettait de jeter des projectiles et de tirer sur les assaillants, redan : ouvrage de fortification composé de deux faces qui forment un angle saillant\r\ndes poternes : porte dérobée dans la muraille denceinte du château. La courtine : mur rectiligne compris entre deux bastions Mirabat, placé à 1270 mètres sur un piton rocheux,  date du XIIe siècle, il était déjà abandonné au XIVe siècle. Il n'en reste aujourd'hui que quelques vestiges de son enceinte.   Les murs sont construits  de marbre blanc de un mètre d'épaisseur et s'élèvent à 3 mètres 50.","habitants":"Famille Lévis\r\n        \"","divers":"Vestiges de Mirabat et  de la Garde à Seix","gps":"","images":["../image/image_09/09_La_Garde_Mirabat_1.jpg","../image/image_09/09_La_Garde_Mirabat_2.jpg","../image/image_09/09_La_Garde_Mirabat_3.jpg","../image/image_09/09_La_Garde_Mirabat_4.jpg","../image/image_09/09_La_Garde_Mirabat_5.jpg","../image/image_09/09_La_Garde_Mirabat_6.jpg","../image/image_09/09_La_Garde_Mirabat_7.jpg","../image/image_09/09_La_Garde_Mirabat_8.jpg"]},"Consult_chateau_formulaire99e7":{"id":"Consult_chateau_formulaire99e7","dept":"09","canton":"Varilhès","commune":"Montégut Plantaurel","nom":"La_Hille","type":"Château","periode":"XV","histoire":"LA-HILLE ,  vieux de cinq siècles, offrit aux heures les plus noires du XXe, un havre de paix à une centaine d'enfants juifs, réfugiés provenant d'Allemagne et fuyant la terreur et la haine raciale qui, par vagues successives, recouvrirent la Hollande, la Belgique et une large partie de la France.  En 1454, le château appartenait à la famille dOrbessan, puis passa à une branche cadette des Rochechouart de Faudoas de Barbazan. Il fut démoli vers 1625 sur ordre de Richelieu.\r\n En 1517, la baronnie de Montégut appartient à la famille Rochechouart-Faudoas qui habite le château jusquau XVIIIe siècle avant daller sinstaller au château de La Hille      le texte de la plaque commémorative érigée à proximité du château, raconte le périple des orphelins juifs originaires dAllemagne et dAutriche. En 1942, la gendarmerie française, sur ordre du régime de Vichy, procédera à larrestation de 45 dentre eux, des adolescents âgés de plus de 15 ans. Traqués par le régime nazi et victimes de l'administration vichyssoise nombre d'entre eux ont survécus grâce au soutien de la Croix-Rouge et des habitants. Le château de La Hille devint durant la seconde guerre mondiale (de février 1941 à 1945) un refuge de la Croix Rouge, essentiellement pour des enfants juifs. Jacques Roth, ancien pensionnaire de la Hille, aujourd'hui écrivain, est l'auteur du texte de la plaque commémorative.","architecture":"Château de la Hille\", inauguré en 2007 retrace cette période.\r\nRuines du château de Montégut  « Il semble que lon puisse distinguer deux ensembles de constructions : lune de la seconde moitié du XIIe siècle se compose dun donjon au sud-ouest du promontoire et douvrages de défense vers louest et le sud ; lautre du XIVe siècle réunit un nouveau donjon au nord et une basse-cour à lest, le mur denceinte nest que du XIXe siècle. Restauré à la fin du XXe siècle. Le château comportait une chapelle : le maître-autel en marbre blanc, décoré de rinceaux dorés, se trouve dans léglise de Loubens.","habitants":"Famille dOrbessan\r\n        \"","divers":"Château de la Hille à Montégut Plantaurel","gps":"","images":["../image/image_09/09_La_Hille_1.jpg","../image/image_09/09_La_Hille_2.jpg","../image/image_09/09_La_Hille_3.jpg","../image/image_09/09_La_Hille_4.jpg","../image/image_09/09_La_Hille_5.jpg"]},"Consult_chateau_formulairecab4":{"id":"Consult_chateau_formulairecab4","dept":"09","canton":"Saint-Girons","commune":"Lacourt","nom":"Lacourt_Chunaut","type":"Vestiges tour","periode":"XII","histoire":"LACOURT, avec le temps et toujours à cause des héritages, le vicomte de Couserans perdit peu à peu certaines seigneuries de la vicomté initiale qui s'en trouva ainsi réduite jusqu'à son démembrement complet au milieu du XVe siècle.\r\nA noter que dès 1359, Boussenac, Riverenert et Baliard furent détachées de la vicomté pour être transmises à Arnaud, fils cadet de Raymond-Roger I° de Comminges. Avec le XVe siècle,  la vicomté de Couserans changea de mains, passa à sieur de Pira. De la maison de Comminges, elle passa à celle de Lomagne et fut finalement démembrée au milieu du siècle. Le Couserans ne sera plus une entité politique unifiée, mais une multitude de territoires divisés en seigneuries. Portera seul, le nom de vicomte de Couserans, celui qui habitera au château de Lacourt, non loin de Saint Girons.","architecture":"Tour de Chunaut, reste d'un château construit vers 1180.               Les ruines du château des vicomtes de Couserans sont situées au dessus du village de Lacourt, dans un hameau appelé Chunaut. Il fut construit en 1180. Il ne reste plus qu'une tour et quelques rares pans de murs. Louis de Froidour, lors de sa visite dans le Couserans, rapporta que le château était une demeure  mal entretenue en 1667.","habitants":"Vicomte de Couserans\r\n        \"","divers":"La tour, seul vestiges  des ruines du château de Lacourt à Chunaut","gps":"","images":["../image/image_09/09_Lacourt_Chunaut_1.jpg"]},"Consult_chateau_formulaire5bf6-2":{"id":"Consult_chateau_formulaire5bf6-2","dept":"09","canton":"Mirepoix","commune":"Lagarde","nom":"Lagarde","type":"Vestiges","periode":"XI","histoire":"LAGARDE  les biens furent confisqués au  XIe siècle par le roi d'Aragon Ramire Ier de Navarre. Au XIIIe siècle Simon de Montfort donne à Guy de Levis et en 1320 petit-fils de Guy François de Lévis-Lagarde reconstruit le château, après lextinction de la branche cadette des Lévis seigneur de Lagarde et de Montségur son épouse Elips de Lautrec , décide de la construction d'une forteresse, qui revient en possession des Lévis-Mirepoix, qui en font leur résidence principale.  Entre 1510 et 1530, Jean V de Lévis-Mirepoix  lieutenant général du roi en Languedoc entreprend des travaux de confort. Ceux-ci répondent au style nouveau de la Renaissance. Vers 1640, Louise de Roquelaure fait construire une troisième enceinte de 165 mètres de côté et réaménage le château pour en faire un véritable palais résidentiel.  Gaston de Lévis de Mirepoix abandonne Lagarde et émigre en Italie ou il mourra en 1800, au début du XXe siècle Charles Vigarozy propriétaire de Lagarde puis racheté plus tard par la famille de Levis. Le nouveau propriétaire du château, M. Tisseyre, autorise gentiment le pays dart et dhistoire à proposer une visite guidée autour de ce site emblématique des Pyrénées Cathares. Une association de bénévoles travaille à la consolidation de ses ruines Il est classé au titre des monuments historiques depuis 1914.","architecture":"Lagarde forteresse médiévale construite sur le site d'un premier château, seul reste  un fossé profond et rectangulaire précédant une muraille percée d'une porte fortifiée dotée, d'une herse et d'un assommoir, de plan rectangulaire cantonné de quatre tours rondes de même forme avec une cinquième au centre de la façade d'entrée pour la défendre. Au XVIe siècle  Jean V de Lévis entreprend la  transformation en Renaissance avec l'esprit d'une  demeure de plaisance. Les courtines existantes sont doublées sur les trois côtés intérieurs de la cour par des bâtiments. Dans cette cour  une tour d'escalier de 6 mètres de diamètre est construite. le toit de cette tour a échappé aux destructions et laisse admirer une voûte à clé centrale sculptée. En 1637  Louise de Roquelaure  veuve d'Alexandre  de Lévis de Mirepoix fait construire dans la cour deux bâtiments en retour d'équerre, dont l'un à demi enterré, forme une galerie de plus de 50 mètres de long, fait également construire une double enceinte, la première cantonnés de bastions circulaires, la deuxième à l'extérieur est flanquées de bastions rectangulaires. au sommet une terrasse en continue remplace le chemin de ronde, les fenêtres des corps de logis ornées de balustrades   de pierre sculptée.   le noyau initial est entouré dune nouvelle enceinte avec six tours.  Le château est pillé en 1792 la démolition est ordonné  mais effectué que partiellement malgré tout à servit de carrière pour les habitations du village     Lintérieur du château nest pas accessible pour des raisons de sécurité.","habitants":"Famille des Levis de Mirepoix\r\n        \"","divers":"Vestiges du château de Lagarde","gps":"","images":["../image/image_09/09_Lagarde_1.jpg","../image/image_09/09_Lagarde_2.jpg","../image/image_09/09_Lagarde_3.jpg","../image/image_09/09_Lagarde_4.jpg","../image/image_09/09_Lagarde_5.jpg","../image/image_09/09_Lagarde_6.jpg","../image/image_09/09_Lagarde_7.jpg","../image/image_09/09_Lagarde_8.jpg"]},"Consult_chateau_formulaire9062":{"id":"Consult_chateau_formulaire9062","dept":"09","canton":"Lavelanet","commune":"Lavelanet","nom":"Lavelanet","type":"Château","periode":"XIII-XIV","histoire":"Deux châteaux à Lavelanet, celui de Lavelanet et de Montségur.                                LAVELANET, site préhistorique, la ville de Lavelanet naîtra au pied dun château fort appelé « Castelsarrasin » ayant appartenu au comte de Foix (détruit en 1212 par les croisés de Simon de Montfort, reconstruit à la Renaissance, et enfin démoli en 1964 pour faire place à une maison de retraite).  En 1510, le château de Lavelanet est dit « défensable ». Le fief de Lavelanet qui était aux de Lévis passa à la famille de Fumel par le mariage de Margueritte de Lévis, fille du baron de Mirepoix et de dame Catherine de Caulet, le 28 juin 1653, avec Louis, comte de Fumel, au pays de Quercy le seigneur Jean de Lévis, baron de Mirepoix et seigneur de Lavelanet, n'ayant pas d'héritier mâle, à sa mort en mai 1656.                                                                                           Bastide, l'une d'elles appartenait à la famille Bastide, riche famille drapière originaire de Beaucaire, installée à Lavelanet depuis le début du XIXe siècle.  La troisième génération se reconvertit dans l'activité bancaire. Etienne Bastide, personnage influent de la société locale, étend alors sa propriété vers le nord en achetant des terrains à Achille Rolland, propriétaire du moulin et de la scierie. Dans les années 1880 , il y fait construire une demeure bourgeoise et, dès 1888, en fait aménager les abords.","architecture":"A côté de Lavelanet le château de Montségur subit deux tentatives de sièges pendant cette période : Guy de Montfort-Castres fait une première tentative infructueuse en 1212, son frère Simon IV de Montfort dirigera la deuxième en 1213 toujours sans succès.                                                                                           La bastide Etienne La demeure fut édifiée sur les plans de l'architecte Rocher et décorée par les productions toulousaines de l'ornemaniste Gaston Virebent et du maître-verrier Saint-Blancat. Construite peu après Léran (1875), elle reflète le goût éclectique style néo-médiéval et néo-renaissance, très prisé par la riche bourgeoisie d'affaires . Une véranda-serre a été accolée quelque temps plus tard sur le côté nord. A l'intérieur, le dessus de cheminée est orné d'une peinture de Jean Diffre (1864-1921).\r\nLa propriété fut acquise par la commune et transformée en hôtel de ville en 1969 par l'architecte Laberty. Les écuries et le moulin ont été modifiés.","habitants":"Famille de Fumel                                                                                     Famille Bastide\r\n        \"","divers":"Châteaux à Lavelanet","gps":"","images":["../image/image_09/09_Lavelanet_1.jpg","../image/image_09/09_Lavelanet_2.jpg","../image/image_09/09_Lavelanet_3.jpg","../image/image_09/09_Lavelanet_4.jpg"]},"Consult_chateau_formulairedffc":{"id":"Consult_chateau_formulairedffc","dept":"09","canton":"St-Girons","commune":"Encourtiech","nom":"Le_Coch","type":"Vestiges","periode":"XIV","histoire":"LE-COCH, pas  d' information historique sur ce château. Sinon construit au XIVe siècle.","architecture":"Le Coch,  sa forme tortueuse traduit une construction suivant les contours de l'éperon. La surveillance de la vallée et le contrôle du plateau devait être la mission du château.   Fortement reconstruit, le rempart montre encore des détails intéressants. Il y a les classiques trous de boulin  bien alignés. Puis par endroit , quelques fentes verticales. Elles sont trop petites pour des archères primitives faite pour des tirs à fusil.  Mauvaise qualité de taille des pierres et les joints trop grossiers. Cela tranche par rapport à la finition du parement d'angle.  Intérieur accessible sans porte, ni pont-levis. Les consolidations ont un peu enlevé le romantisme de cette ruine. Dans la cour goudronnée, il ne reste aucune trace des fondations millénaires. Quelques trous de boulins  trahissent ses origines. Seule trône une petite tour carrée du rempart.","habitants":"Seigneurs locaux\r\n        \"","divers":"Vestiges de remparts et porte à le Coch.","gps":"","images":["../image/image_09/09_Le_Coch_1.jpg","../image/image_09/09_Le_Coch_2.jpg","../image/image_09/09_Le_Coch_3.jpg","../image/image_09/09_Le_Coch_4.jpg"]},"Consult_chateau_formulaire91e0":{"id":"Consult_chateau_formulaire91e0","dept":"09","canton":"Cabanes","commune":"Lordat","nom":"Lordat","type":"Vestiges","periode":"IX-X","histoire":"LORDAT, du IXe au Xe siècle de style médiéval. Domaine de Roger Ier de Carcassonne en 1034 puis au comte de Foix  En 1034, Bernard, comte de Carcassonne, le donnera à son fils cadet Roger, premier Comte de Foix. Vers 1244, il fut occupé par les Cathares durant la croisade contre les Albigeois. Il servit de refuge aux cathares pendant la croisade des Albigeois et s'impliqua dans la défense de Montségur. À la fin du XIIIe siècle, le roi d'Aragon s'en empare et demande sa destruction.  Démantelé en 1582 par ordre d'Henri IV.  La famille de Lordat abandonnera le château à lépoque des guerres de religion.","architecture":"Sa construction remonte aux Xe siècles. C'est l'un des plus anciens et des plus vastes châteaux féodaux du comté de Foix, typique de l'architecture militaire médiévale des Pyrénées ariégeoises. Il occupe une position stratégique exceptionnelle : placé sur un piton calcaire situé à 965 mètres d'altitude, ses murailles surplombent la haute vallée de l'Ariège appelée la Sabarthès, de 400 mètres.  Un donjon carré élevé au point culminant, il n'en reste qu'un pan de mur, trois enceintes ovales flanquées de quelque tours carrées l'insèrent aménagées sur des paliers successifs, les portes étaient munies de herses.                                                                               L'entrée protégée par une tour carrée conserve encore son aspect d'origine. Il fait pourtant encore belle impression aujourd'hui avec les murs de ses trois enceintes, les tours de ses portes d'entrée et le donjon sur son point culminant. L'entrée protégée par une tour carrée conserve encore son aspect d'origine. Depuis 1999, le château de Lordat bénéficie de travaux de consolidation et de mise en valeur entrepris par la collectivité. Il est inscrit aux M.H. depuis 1923.","habitants":"Famille de Lordat \r\n        \"","divers":"Vestiges du château de Lordat","gps":"","images":["../image/image_09/09_Lordat_1.jpg","../image/image_09/09_Lordat_2.jpg","../image/image_09/09_Lordat_3.jpg","../image/image_09/09_Lordat_4.jpg","../image/image_09/09_Lordat_5.jpg","../image/image_09/09_Lordat_6.jpg","../image/image_09/09_Lordat_7.jpg","../image/image_09/09_Lordat_8.jpg"]},"Consult_chateau_formulairecc9b":{"id":"Consult_chateau_formulairecc9b","dept":"09","canton":"Varilhés","commune":"Loubens","nom":"Loubens","type":"Gentilhommières","periode":"XVI","histoire":"LOUBENS, un de ses seigneurs, du nom de Faur ou Dufaur prit part à la première croisade\r\nParéage entre le comte de Foix et Bernard dArnave pour la bastide de Loubens en 1258. Les habitants obtiennent en février 1259 une charte de coutumes de leurs co-seigneurs Bernard dArnave et Roger IV, comte de Foix. Léglise est alors un prieuré de labbaye du Mas dAzil qui sen fait confirmer la possession en 1268 par le pape Clément Ier.   12 mars 1264 : « Restitution faite par Roger Bernard, comte de Foix, à Guillaume de St-Sernin des seigneuries de St Bauzeil et de Loubens, avec toutes leurs appartenances, promettant ledit de St-Sernin de lui être fidèle vassal pour les dites seigneuries et pour Bénagues »   17 août 1391 : « noble Arnaut de Lobenxs, senhor de Lobenxs » rend hommage à Mathieu, comte de Foix, dans le château de Foix\r\nNB : le 21 janvier 1500 : « le noble Ponsy de Lobenexs, senor de Marcelhas    Le chevalier du Faur de Saubiac, seigneur du Fossat, Loubens et Cazaux, assista à lassemblée de la noblesse tenue à Pamiers en 1789.  Description du château de Loubens sous Louis XIII  lors de lestimation des biens de Georges de Foix-Rabat .","architecture":"Loubens bâti au début du XVIe siècle ; restauré dans les années 1980 . Celui-ci est bâti de tous côtés en cailloux et pierre avec chaux et sable, il se compose de 4 étages. Celui den bas a deux pièces. Au second, lon monte par une vis qui est dans une tour ronde, cette tour indiquerait,  une construction au moins du XVe siècle, on trouve trois services, une salle et deux chambres, dans la salle il y a une cheminée et deux croisées, dans chacune des chambres, un quart de croisée. Le troisième est semblable. Au quatrième, un galetas servant de grenier, et au bout, les lieux communs. Les planchers et couvert sont de chêne. « Au bout de laquelle tour,  sont les défenses faites en forme de gabion » ; celui-ci est couvert, ainsi que le château, de tuiles canal. Au bas de la tour et devant lentrée principale du château, il y a un ravelin de pierre à chaux et sable,  ruiné avec son couvert de tuiles.","habitants":"Famille Du Faur\r\n        \"","divers":"Château de Loubens à Loubens","gps":"","images":["../image/image_09/09_Loubens_1.jpg"]},"Consult_chateau_formulaireabd3":{"id":"Consult_chateau_formulaireabd3","dept":"09","canton":"Varilhés","commune":"Loubières","nom":"Loubières","type":"Château","periode":"XIII","histoire":"LOUBIERES, appartenant à labbaye Saint Volusien de Foix à qui elle est donné par le comte de Foix, lactuelle commune de Loubières relevait de lancien consulat de Foix et de la châtellenie de Foix en 1450  château médiéval ayant appartenu au Trésorier payeur des comtes de Foix, puis à la famille de Séré (depuis 1815) ; actuellement à des anglais.","architecture":"Château fortifié (château dit du Boulais)  du XIIIe siècle, façades et toitures inscrites aux M.H.  Corps de logis rectangulaire à trois niveaux toitures en croupes, deux tours carrées à toits plats aux angles ; Inscription dune devise, au dessus de la porte : « Fais du bien à tous ».","habitants":"Famille de Séré\r\n        \r\n        \"","divers":"Château de Loubières","gps":"","images":["../image/image_09/09_Loubieres_1.jpg","../image/image_09/09_Loubieres_2.jpg","../image/image_09/09_Loubieres_3.jpg"]},"Consult_chateau_formulaire63cb":{"id":"Consult_chateau_formulaire63cb","dept":"09","canton":"Mirepoix","commune":"Léran","nom":"Léran","type":"Forteresse","periode":"XI-XIX","histoire":"LERAN, lexistence de la forteresse de Léran est attestée en 1164, comprise dans la seigneurie de Mirepoix ; de Guy de Lévis . Après le partage de 1329, le domaine de Léran (château et terres) revient à Gaston de Lévis qui prend le titre de Lévis-Léran, alors que son frère prend celui de Lévis-Mirepoix. En 1517, la seigneurie de Léran fut amputée de Bélesta, Fougax et lAiguillon au profit de J.C. de Lévis dAudou Le château attaqué en 1622 par le comte de Carmaing . Après le mois de février de lan 1633, «les sieurs de Bellejambe et de Mangot, commissaires députés de la part du Roy, firent commencer de procéder aux démolitions des fortifications du château de Léran.  En 1704 érigé en marquisat, au profit   de Gaston VIII de Lévis  les héritiers Paul-Louis  puis Louis-François  de Lévis de Mirepoix qui demeurent au château de Lagarde. Quant au château, il est confisqué et vendu comme bien national en 1793  il fut acheté à 58 % par  des paysans et des artisans de la région, Après la mort de Charles-Philibert  de Lévis, passe à son fils Gustave et racheté en 1805 par la famille de Lévis-Léran, redevenue Lévis-Mirepoix. En 1851  acquiert le château avec l'appui de sa riche épouse  Hildegarde de Mérode-Westerloo. En 1859, le duc et la duchesses de Lévis Mirepoix y reçurent Léopold 1er, roi des belges. En 1962, un IMP sy installe. Le château de Léran est vendu en 1983 .  Le feu a détruit  la toiture de l'aile sud du château de Léran en juillet 2013.","architecture":"Le château de Léran remanié en 1875 dans le style néogothique est doté dun donjon XIIIe, XVe siècle ,  couronné de créneaux, les pignons de ses toitures, ses tourelles en poivrières, ses mâchicoulis et ses échauguettes, fenêtres à accolades gothiques évoquent certes larchitecture médiévale mais cest en réalité une reconstitution « à lancienne » réalisée entre 1875 et 1883 par Clément Parent, un disciple dEugène Viollet-Le-Duc.\r\nA lintérieur un grand escalier Louis XIII une cheminée provenant de Mirepoix (ancien évêché) et une bibliothèque au deuxième étage avec boiseries et vitrines avec cheminée sont remarquables. Ses charpentes assemblées de manière traditionnelle sont particulières pour la région ; on note par exemple des « poinçons » de plus de sept mètres de haut.","habitants":"Famille de Lévis-Léran\r\n        \r\n        \"","divers":"La forteresse de Léran","gps":"","images":["../image/image_09/09_Leran_1.jpg","../image/image_09/09_Leran_2.jpg","../image/image_09/09_Leran_3.jpg","../image/image_09/09_Leran_4.jpg","../image/image_09/09_Leran_5.jpg","../image/image_09/09_Leran_6.jpg","../image/image_09/09_Leran_7.jpg","../image/image_09/09_Leran_8.jpg"]},"Consult_chateau_formulaireb09e-2":{"id":"Consult_chateau_formulaireb09e-2","dept":"09","canton":"Saverdun","commune":"Gaudiès","nom":"Malportel_Gargas","type":"Château","periode":"XVI","histoire":"MALPORTEL, François de Baron, viguier à Pamiers, fait construire le château en 1565, sur des terres roturières de Malportel. En 1632, Catherine de Baron, héritière, fille d'un des commandants du château de Pamiers, viguier de cette ville, réside à Malportel. En 1645, elle épouse François de Johannis de Gargas de Maurand, issu d'une famille de Capitoul, qui devient seigneur du lieu.  Le château est régulièrement habité jusqu'à la fin des années 1760. Une chapelle aujourd'hui disparue, est mentionnée de 1645 jusqu'au quatrième quart du XVIIIe siècle. La métairie de Malportel est vendue à la Révolution. Le château est peu habité de la seconde moitié du XVIIe au début du XVIIIe siècle, jusqu'à ce que César fils de François de Gargas, entreprenne la restauration de la demeure où il est né.","architecture":"Malportel, du château primitif il reste le logis remanié, des baies en pierre calcaire chanfreinée et une archère canonnière, le logis primitif est agrandi et éclairci avec la construction de deux ailes encadrant celui-ci et une petite cour. Corps de logis rectangulaire à trois niveaux toitures à deux pans,  la façade Est, encadrée par deux tours est modifiée, la tour polygonale est noyée dans le nouveau bâtiment formant une aile tandis que la tour circulaire se trouve en saillie. Les dates portées 1753 et 1756, respectivement sur l'aile Est et sur le logis, correspondent à cette campagne de construction, les décors, les génoises et les encadrements de brique arqués segmentaires en sont les témoins. A la même époque sont construites des annexes, dont le logement du maître valet accolé à l'aile est. L'ensemble est complété par un grand jardin d'agrément.  En 1942, un incendie détruit la grange et le logement du maître valet dont subsistent encore les murs. La propriété est vendue en 1972, l'édifice est inoccupé et n'est plus entretenu. En 1983, le domaine est racheté et d'importants travaux sont réalisés: nouveaux enduits, modification de la façade ouest du corps principal, percement de nouvelles baies aux encadrements de ciment.","habitants":"Famille de   François de Baron\r\n        \"","divers":"Château de Malportel à Gargas","gps":"","images":["../image/image_09/09_Malportel_Gargas_1.jpg","../image/image_09/09_Malportel_Gargas_2.jpg","../image/image_09/09_Malportel_Gargas_3.jpg","../image/image_09/09_Malportel_Gargas_4.jpg"]},"Consult_chateau_formulaire72d8":{"id":"Consult_chateau_formulaire72d8","dept":"09","canton":"Massat","commune":"Massat","nom":"Massat","type":"Vestiges","periode":"XII-XVIII","histoire":"MASSAT,  dit château d'Amour, c'était ici que vivaient les seigneurs de Massat quand ils venaient dans la vallée. Il fut détruit par les Massadels en 1639 , alors que leur seigneur Henri-Gaston de Foix-Rabat commettait les pires exactions contre la population. Son cheptel fut pris et ses gens furent roués de coups. Tous les actes anciens qui était dans le château disparurent. Cette révolte fut qualifiée d'acte de félonie envers le seigneur. Quelques années plus tard, son successeur et fils, Jean-Pierre Gaston de Foix-Rabat passa une transaction avec les Massadels qui s'engageaient à reconstruire le château, moyennant la somme de trois mille livres. On imposa les populations afin de récolter cette somme. Mais le château ne fut jamais reconstruit.\r\nUne légende sur le château a traversé les siècles pour nous parvenir. Il est dit que le seigneur s'octroyait le droit de cuissage et qu'avant le mariage, il couchait avec la future mariée. C'est la raison pour laquelle, le château porte le nom de château d'Amour, mais aussi pourquoi les habitants le détruisirent.                                         Château du Pont Carré, demeure de l'illustre famille Galy Gasparrou, notables de Massat depuis la fin du XVIII° siècle. Aujourd'hui, leur descendant n'est autre que le maire de Massat.","architecture":"Du château d'amour  Il n'en reste malheureusement pas grand chose. La végétation dense en a pris possession. Néanmoins, vous pourrez apercevoir  un mur  grâce à une grange construite vers 1870, à présent en ruine et des restes plus modestes.                                         Le château du Pont carré édifice de plan rectangulaire à trois niveaux , toit en croupes, pavillons d'entrées légèrement saillant plein cintre en façades avec fronton triangulaires avec oculus au centre.","habitants":"seigneur Henri-Gaston de Foix-Rabat                                                                    famille Galy Gasparrou\r\n        \"","divers":"Vestiges du château de Massat et le château du Pont-Carré à Massat","gps":"","images":["../image/image_09/09_Massat_1.jpg","../image/image_09/09_Massat_2.jpg"]},"Consult_chateau_formulaire5951":{"id":"Consult_chateau_formulaire5951","dept":"09","canton":"Saverdun","commune":"Mazères","nom":"Mazères_Massaure","type":"Château","periode":"XIV-XVII","histoire":"Trois châteaux à Mazères celui d'Ardoin (voir article), celui de Nassaure gites de France de Cusset  Valérie .                                                                                                                                                      MAZERES fut créée en 1253 par l'acte de paréage entre les comtes de Foix et les abbés de l'abbaye de Boulbonne. En 1484 : Lors de la succession de la maison de Foix, Jean de Narbonne adversaire de Catherine de Béarn ou de Navarre, attaque Mazères en espérant sy faire reconnaître comme comte avant daller assiéger Montaut et son château. Dans cette lutte de succession entre Jean de Foix, vicomte de Narbonne et Catherine de Foix, le roi, après avoir mis sous sa main les villes et les châteaux dans le comté de Foix, en confia la garde au vicomte de Narbonne, jusquau jugement définitif de son différend avec la princesse de Viane, quil sétait réservé. Il assigna, en même temps, le château de Mazères à Marie dOrléans, femme du vicomte, pour sa demeure et celle de mademoiselle de Narbonne, sa fille. Marie dOrléans établit sa résidence dans ce château. Gaston de Foix  (duc de Nemours, neveu de Louis XII et vainqueur de Ravenne) y naît le 12 décembre 1489.   Fut la résidence préférée de plusieurs comtes, dont Gaston Phébus, et Gaston de Foix-Nemours, né à Mazères et tué à Ravenne en 1512. Le 21 mars 1579, Catherine de Médicis vient à Mazères  accueillie par le roi de Navarre, Henri, et Margueritte de Valois dite la Reine Margot, suivie de sa cour, avant daller loger à Saverdun dont les catholiques venaient de se rendre maîtres. Enfin, une période somptueuse pour Mazères sarrête avec la démolition du château et des remparts sur ordre de Richelieu en 1630. Lhôtel de Ville s'appelait \"La Castellane\" , puis devint château des abbés de Boulbonne (1629) ; cet hôtel a été démoli et reconstruit en 1798. On y retrouve le blason de labbé de Boulbonne, Jacques Philibert de Villemur qui y mourut en 1718.","architecture":"Mazères;    devenue une  des quatre villes maîtresses du comté de Foix, une résidence comtale y est installée : Gaston Phébus y fait construire un château à partir de 1380, entouré de fossés de trois côtés, munis de six tours et dun pont-levis. La ville était donc fortifiée et les boulevards actuels occupent lemplacement des anciens remparts. Gaston Phébus y écrit son livre sur la vénerie. Le même, après avoir été voir le roi Charles VI à Toulouse avec une suite magnifique linvite à Mazères le 7 janvier 1390.  Au XIVe siècle, « la ville était fortifiée par des murs dans lesquels existaient plusieurs portes, protégées par fossés et talus ; un pont avait été bâti sur lHers.   la bastide  située sur ce site, et complètement détruite par les huguenots en 1567.   Le château fut brûlé par accident en 1493. Mazères devint, de la fin du XVIe siècle au milieu du XVIIe siècle, une très forte citadelle protestante.                                                                                                         Nassaure; pas d'information historique.","habitants":"Margueritte de Valois dite la Reine Margot\r\n        \r\n        \"","divers":"Château de Massaures à Mazères","gps":"","images":["../image/image_09/09_Mazeres_Massaure_1.jpg","../image/image_09/09_Mazeres_Massaure_2.jpg","../image/image_09/09_Mazeres_Massaure_3.jpg","../image/image_09/09_Mazeres_Massaure_4.jpg"]},"Consult_chateau_formulaire9cfd":{"id":"Consult_chateau_formulaire9cfd","dept":"09","canton":"Tarascon-sur Ariège","commune":"Mercus_Gabarret","nom":"Mercus_Gabarret","type":"Vestiges","periode":"XIII-XIX","histoire":"LE PONT DU DIABLE, pendant très longtemps, les origines de ce pont sont tombées dans l'oubli, au point que la légende a pris le dessus. La signalisation routière mentionnait « Pont du Diable au  XIIIe siècle ». décidée par Roger-Bernard, comte de Foix, qui chargea le seigneur de Garrabet de rétablir des passages sur la rivière ; Garrabet sadressa pour cela à un certain Peyronnet,  qui possédait des notions darchitecture. Le pont aurait été fortifié ultérieurement par Gaston Phébus. Le pont était décrit comme un ouvrage fortifié médiéval,  Il ne se situe sur aucun chemin d'importance. Les ruines de la bâtisse sur l'un de ses côtés étaient généralement présentées comme restes douvrages défensifs, en corps de garde, etc. Le pont est soutenu par quatre arches, deux bien visibles sur le cours de l'Ariège, et deux autres comprises dans la bâtisse accolée.\r\nEn réalité, le pont a été construit en 1836 par un entrepreneur local, Adolphe Garrigou, pour son beau-frère, le polytechnicien Léo Lamarque (30 août 1808-Alger, 29 juillet 1849). Lamarque avait travaillé avec Jean-Victor Poncelet, le « pape de lhydraulique », et il expérimenta en ce lieu une roue hydraulique de son invention : une roue fixée à lextrémité dun long axe, qui plongeait directement dans le tourbillon de la rivière entre les deux arches principales du pont ; ce qui explique labsence de canal damenée et des installations traditionnelles dun moulin.","architecture":"Entre Foix et Tarascon sur Ariège,  pour enjamber les eaux tumultueuses de la rivière Ariège la légende prétend que l'architecte passa un pacte avec satan, lucifer recevrait en échange l'âme du premier vivant qui le traverserait. Le \"diable\" à construit le pont sans avoir l'âme du premier passant \"humain\" car les paysans firent traverser un animal  à la queue duquel ils avaient attaché une clochette pour le faire courir plus vite, le curé averti du stratagème béni aussitôt le pont.\r\nCe pont fortifié à deux arcades date du XIIIe siècle. Rive gauche, de chaque cotés du pont, il reste les ruines d'un habitat réservé au gardien ou au corps de garde.","habitants":"seigneur de Gabarret \r\n        \"","divers":"Le pont du diable à Mercus-Garrabet","gps":"","images":["../image/image_09/09_Mercus_Gabarret_1.jpg","../image/image_09/09_Mercus_Gabarret_2.jpg","../image/image_09/09_Mercus_Gabarret_3.jpg"]},"Consult_chateau_formulaire4446":{"id":"Consult_chateau_formulaire4446","dept":"09","canton":"Tarascon sur Ariège","commune":"Rabat les Trois seigneurs","nom":"Miramont","type":"Vestiges","periode":"XI","histoire":"MIRAMONT, le château de Miramont est un ancien château cathare situé au sud de Foix dans le département de l'Ariège sur les communes de Rabat-les-trois-seigneurs et de Saurat.   Le premier seigneur Sanche,  les seigneurs de Montjoui en étaient maîtres, lié à la guerre des Albigeais au XIIIe siècle , le château passa dans les mains  du comte de Rabat, dont deux frères se disputent le château  en accord avec Pierre Sanche consentent à la démolition de ce dernier qui eu lieu en 1247.","architecture":"Il date du XIe siècle. C'est un ancien château fort, de style médiéval. Le château de Miramont sera rasé en 1247. Il ne reste que des ruines aujourd'hui. Les ruines du château de Miramont domine la vallée de la Courbière. Le château de Miramont est implanté sur une crête rocheuse séparant les communes de Rabat-les-trois-seigneurs et de Saurat l'enceinte de 46 mètres de long sur 4 mètres de large. Le château a été entièrement rasé, mais ses terrasses de soutènement sont encore visibles sur la roche bombée qui le supportait. Cette roche est appelée \"la roche ronde\" ou encore \"le chapeau de gendarme\" par les habitants de Rabat.","habitants":"Comte de Raba\r\n        \"","divers":"Vestiges du château sur la montagne.","gps":"","images":["../image/image_09/09_Miramont_1.jpg"]},"Consult_chateau_formulaire08df":{"id":"Consult_chateau_formulaire08df","dept":"09","canton":"Mirepoix","commune":"Mirepoix","nom":"Mirepoix","type":"Ville fortifiè","periode":"XII-XV","histoire":"A Mirepoix le château de Lagarde ( voir article), et de Terride (voir article), la maison du Consul, l\"évêché (musée)et la porte de la ville                                                              MIREPOIX, dans la cité entrée par  la porte d'Aval, un vieux chêne de 800 ans d'âge protégeant une croix de 1797, le palais épiscopal  date du XVe siècle. Il fut bâti, également, par Philippe de Lévis. Il abrite de nos jours le Musée Patrimoine et traditions. La ville, qui dépendait du comte de Foix, fut vite gagnée par le catharisme et on y dénombrait de nombreuses maisons de parfaits.  Mirepoix fut pris en 1209 par Simon de Montfort qu'il donna à un de ses lieutenants Guy de Lévis. Le seigneur des lieux Pierre Roger de Mirepoix joua un grand rôle dans la défense lors du siège de Montségur qui appartenait à son beau-père Raymond de Péreille. En 1279 après l'effondrement du barrage de Puivert, la ville fut détruite. Jean de Lévis reconstruisit une nouvelle ville sur le plan d'une bastide. Afin de mieux asseoir la religion catholique, on construisit la cathédrale Saint-Maurice. Commencée en 1343 l'église ne reçut ses voûtes d'ogives qu'en 1865. L'élégante flèche gothique fut commencée, quant à elle, en 1506. La place principale, du général Leclerc, est entourée de maisons des XIIIe-XVe dont le premier étage s'avance sur des couverts en charpente.","architecture":"Mirepoix, Le palais épiscopal,  bâtiment perpendiculaire fut construit au XVIIIe siècle à la demande de l'évêque Jean Boyer. Maison des consuls, elle date du XVe siècle.  Le 5 janvier 1274, Guy III de Lévis donne aux habitants de la cité le droit d'élire des consuls. Après la crue dévastatrice de l'Hers en juin 1289, il leur fait concession,  de cent sétérées de terre sur la rive gauche de la rivière pour y bâtir la ville nouvelle. En l'année 1500, les consuls se voient octroyer le droit de bâtir leur maison sur le solier de la maison de Justice. Le 14 août 1655, ils achètent une maison pour en faire l'Hôtel de Ville. Elle faisait office de tribunal, de salle de conseil et de prison. La poutre de façade, ou poitrail, est un cur de chêne d'un seul tenant de près de 12 mètres de long et de plus de 60 cm d'épaisseur. 104 sculptures ornent les extrémités des sommiers (poutres perpendiculaires à la façade) et les piliers de soutènement.  La porte d'Aval  date de 1372. La tour se trouvant à proximité, Charles de Montfaucon, seigneur de Rogles du XVIe siècle. Elle servait de poste de guet.   En 1659, les moines Cordeliers (ou frères Mineurs), terminent la construction de cette fontaine monumentale qui drainera ses eaux jusquà leur couvent aujourdhui disparu. Son entrée majestueuse est flanquée dun magnifique portail gothique du XIVe siècle provenant certainement dune église locale détruite.","habitants":"Pierre Roger de Mirepoix \r\n        \"","divers":"A Mirepoix;  l'évêché, la maison des consuls, la porte d'Aval, le château et la fontaine des Cordeliers","gps":"","images":["../image/image_09/09_Mirepoix_1.jpg","../image/image_09/09_Mirepoix_2.jpg","../image/image_09/09_Mirepoix_3.jpg","../image/image_09/09_Mirepoix_4.jpg","../image/image_09/09_Mirepoix_5.jpg","../image/image_09/09_Mirepoix_6.jpg","../image/image_09/09_Mirepoix_7.jpg"]},"Consult_chateau_formulaire3737":{"id":"Consult_chateau_formulaire3737","dept":"09","canton":"Ax les Thermes","commune":"Montaillou","nom":"Montaillou","type":"Vestiges","periode":"XIII","histoire":"MONTAILLOU, le château de Montaillou, fut bâti pour les seigneurs d'Alion, vers la fin du XIIe siècle. Bernard d'Alion gendre du comte de Foix Roger IV, embrasse la cause cathare, condamné par l'Inquisition en 1258 pour sa participation à l'hérésie Cathare, le château  revient alors au père de son épouse Esclarmonde.    Les vestiges du donjon et de la basse-cour prennent place sur une butte et dominent la haute vallée de l'Hers.    Le château est démoli à cette époque. Il est reconstruit quelques décennies plus tard et est mentionné en 1272 dans la liste des forteresses du comte de Foix assurant la défense de la frontière du comté face à l'Aragon. Il perd peu à peu son rôle de poste frontière, et le roi Louis XIII ordonne son démantèlement en 1638. Il ne subsiste  que quelques pans de murs du donjon et des courtines de la basse-cour, ainsi que la trace des fossés. Il est inscrit aux M.H. depuis 1984.","architecture":"Montaillou est un petit village occitan proche de Montségur qui doit sa notoriété à Emmanuel Le Roy Ladurie qui dans son livre « Montaillou : un village occitan » dépeint la vie quotidienne de ce village face à linquisition suite à la croisade contre lhérésie Cathare. Le château en ruines surplombant le village veille sur le paysage qui n'a guère changé depuis des siècles.   vestiges  du grand donjon   habitable, reconstruit au XIIIe siècle.","habitants":"Famille d'Alion\r\n        \"","divers":"Vestiges du château de Montaillou","gps":"","images":["../image/image_09/09_Montaillou_1.jpg","../image/image_09/09_Montaillou_2.jpg"]},"Consult_chateau_formulaire1a85":{"id":"Consult_chateau_formulaire1a85","dept":"09","canton":"Mirepoix","commune":"Camon","nom":"Montaragou","type":"Vestiges","periode":"XII","histoire":"MONTARAGOU, après la croisade contre les Albigeois, les hautes vallées de l'Hers et de ses affluents furent enlevées aux comtes de Foix. Les châteaux qui s'y trouvaient devinrent la propriété de la famille de Levis   tout en relevant directement de la couronne. D'après un dénombrement suivant les charges militaires concernant les places fortes en 1510, Montaragou était sur la liste. C'est aussi un seigneur qui exerce son pouvoir féodal. En 1520 et 1525 il procède aux reconnaissances des communautés de Montaragou et Sibra.  Le 14 juin  1597  la seigneurie de Sibra Pastouret et Sermet est retirée du consulat de Montaragou. En effet, afin de procurer au Roi l'argent accordés par le Pape, le diocèse de Mirepoix, taxé met en vente sous enchère une partie des biens de Camon. Louis de Saint-Georges en est l'acquéreur. \r\nLes terres de Sibra reviendront sous le pouvoir du prieur de Camon qui les rachètera le 27 mai 1706, laissant au sieur de Saint-Georges le seul château de Sibra et les marques seigneuriales, sans la jouissance de la seigneurie. La seigneurie sera rachetée en 1712, mais les prieurs resteront les seigneurs dominants. Dans les reconnaissances Sibra, Pastouret et Sermet sont un bailliage dépendant de la baronnie de Montaragou.   Les bénédictins du prieuré de Notre-Dame de Camon qui dépendent de l'abbé de Lagrasse sont les seuls seigneurs en toute justice, haute, moyenne basse directe et foncière. Le territoire de la juridiction de Camon était très étendu. Nous l'avons vu, il comprend la seigneurie de Sibra, mais aussi le hameau de Ennaudé et Saint-Pierre de la Bouiche.","architecture":"Edifié sur une colline en face du château de Lagarde, sa construction primitive est inconnue. Sans doute que cette bâtisse servait de tour de guet. Du haut de son donjon, la vue sur les plaines et vallées, vaut celle de Montségur. Mais Montaragou est connu pour bien d'autres choses,  Certains disent que le renard se régale de corneilles, que des chèvres sauvages habitent les lieux.  Il a été souvent utilisé le terme de \"tour \" pour désigner cet ouvrage. Cela est peut-être dû à laspect actuel de la ruine. Il fallait franchir deux petits pont-levis, puis deux portes, pour pénétrer dans l'enceinte. Une muraille  faisait sas après le deuxième pont-levis. Il était surplombé par une tour dont la base était fermée par une porte ou une herse coulissante verticalement. Ensuite on accédait à l'intérieur du château, dans une cour. Une bonne partie de louvrage était certainement en bois. La muraille courait d'est en ouest. Au nord un précipice. Il semble qu'il y ait eut effondrement de l'assise qui aurait pu supporter un mur. L'apic n'est pas tel, qu'il ait pu être laissé sans aucune défense.","habitants":"Famille de Levis\r\n        \"","divers":"Vestiges du château de Montaragou","gps":"","images":["../image/image_09/09_Montaragou_1.jpg","../image/image_09/09_Montaragou_2.jpg","../image/image_09/09_Montaragou_3.jpg","../image/image_09/09_Montaragou_4.jpg","../image/image_09/09_Montaragou_5.jpg","../image/image_09/09_Montaragou_6.jpg"]},"Consult_chateau_formulairecd59":{"id":"Consult_chateau_formulairecd59","dept":"09","canton":"Saverdun","commune":"Saverdun","nom":"Montaut_Peyroutet","type":"Vestiges","periode":"X","histoire":"MONTAUT, au Xe siècle le château de Montaut est à Roger 1er le Vieux, comte de Carcassonne ; il passera donc dans les biens de ce qui devient le comté de Foix. Revient entre les mains de Roger Bernard 1er en 1151, lors de son mariage avec Cécile Trencavel 1243 : la seigneurie appartient à Loup de Foix-Rabat. Ce dernier verra son château de Montaut mis sous séquestre en 1272 pour une dette.  Pendant la guerre des Albigeois, Montaut, qui portait le titre de baronnie, fut prise par Simon de Montfort, chef des croisés,  encore assiégé, en 1399, par le comte de Sancerre. Entre temps, en 1390, Montaut fera partie du paréage de Mirepoix et du roi de France : cest donc une des 32 seigneuries de Mirepoix. Des biens temporels appartiennent aux Prémontrés de Combelongue et aux cisterciens de labbaye de Boulbonne toute proche. Lors de la succession du Comté de Foix, en 1483, le château est aux mains du vicomte de Narbonne ; en 1485 à Bernard de Vignaux ; en 1490 Jean de Lordat dit Casanove, qui a pris partie pour le vicomte  de Narbonne sétait emparé du château. Enfin, en août 1491, le roi Charles VIII attaque la forteresse, la prend et y brûle 52 assiégés. Un compromis est trouvé, le 7 septembre 1497, par le traité de Tarbes qui donne aux enfants du vicomte de Narbonne le lieu de Montau, une date importante pour Montaut : le 13 juin 1584, Henri IV dîne à Montaut avant dapprendre, à Varilhes la mort du duc dAnjou qui faisait de lui lhéritier de la couronne de France Le 28 novembre 1632 Louis XIII signe la démolition du château réalisée par Galinier, capitaine, en 1635. En 1765 siège de justice : les consuls exerçaient la justice criminelle au nom du roi jusquen 1708, époque où sa Majesté vendit, à faculté de rachat perpétuel, la justice haute, moyenne et basse à Mr le marquis de Bonnac, par démembrement du siège du sénéchal de Pamiers. l'actuel propriétaire Yannick Jousseaume,  domaine de Peyroutet-Vadier du XVII, XVIIIe siècle, privé : maison ayant appartenu à Marc Guillaume Vadier, député du tiers État à la convention qui vota la mort du roi, créateur du département de l'Ariège.","architecture":"Saverdun, il existait en effet un château qui dominait la ville et qui était situé dans le quartier justement appelé Le château. Il n'en reste que les ruines de la tour. Saverdun était au Moyen-Age une ville prospère parmi les plus importantes du comté de Foix mais comme dans toute la basse vallée de l'Ariège et les vallées voisines de l'Arize et de la Lèze, les Guerres de Religion y furent terriblement destructrices et de son patrimoine médiéval il ne reste aucun vestige. L'église fut construite au XVIIe siècle pour remplacer les édifices religieux disparus. Deux fresques y relatent la vie de Jacques Fournier évêque inquisiteur de Pamiers contre l'hérésie cathare et pape sous le nom de Benoît XII, né à Canté près de Saverdun. Situé sur l'esplanade dominant l'Ariège, le Temple a été construit entre 1792 et 1823.                                                                                                                         Le domaine de Peyrotet a appartenu à la fin du XVIIIe siècle à Marc-Guillaume-Alexis Vadier, député aux états généraux. Celui-ci siégea à la convention parmi les Montagnards et appartient au comité de salut public. Considéré comme le créateur du département de l'Ariège, il est exilé comme régicide en 1816 et meurt en 1828 à Bruxelles. Dans les années 1980, l'avocat Gilles Dussert acquiert le domaine et rédige une biographie de Vadier : il obtient en 1990 le retour de ses restes qui sont alors déposés dans la chapelle privée de la propriété.","habitants":"marquis de Bonnac\r\n        \"","divers":"Vestiges du château de montaut-Peyroutet, château de Pégulier à Saverdun","gps":"","images":["../image/image_09/09_Montaut_Peyroutet_1.jpg","../image/image_09/09_Montaut_Peyroutet_2.jpg","../image/image_09/09_Montaut_Peyroutet_3.jpg","../image/image_09/09_Montaut_Peyroutet_4.jpg","../image/image_09/09_Montaut_Peyroutet_5.jpg"]},"Consult_chateau_formulaire05df":{"id":"Consult_chateau_formulaire05df","dept":"09","canton":"Saint-Lizier","commune":"Montesquieu-Avantès","nom":"Montesquieu_Avantès","type":"Vestiges","periode":"XIII","histoire":"Deux châteaux à Montesquieu-Avantès celui de Montesquieu( vestiges) et celui de de Bardies et de  Pouzol pas d'informations historiques.                                                                                     MONTESQUIEU, au début du XIIIe siècle, le comte de Comminges exerce une domination sur tout le Couserans. La vicomté du Couserans récemment extraite ne concerne que la haute vallée du Salat et reste sous la coupe du comte. Les domaines de l'évêché sont disputés (Saint-Lizier, Bédeille, Tourtouse, Montardit, Cérizol) mais ne sont mis sous la domination française  quà partir de 1216 (Simon de Montfort). Le Castillonais et le Bas Salat  dépendent alors toujours de Comminges.\r\nA lEst, Montesquieu et Contrazy ne sont donc pas seuls sous domination Commingeoise, il faut leur rattacher Lescure aux mains du seigneur de Montégut, premier vassal du comte, ainsi que Camarade jusquen 1208, une bonne part de lactuelle commune de Montjoie (Belloc, Audinac, Arnac, Lara...) et aussi les terres de Combelongue jusquen 1272 pour devenir Rimont, c'est-à-dire toute la contrée appelée alors Avantès. Ces terroirs se trouvent effectivement en avant, aux marges du comté, supposant laspect stratégique de leur fortification.","architecture":"Montesquieu était lui aussi forcément construit en 1195  Comme il est dit « le château de Montesquieu est un ensemble difficile à dater ». Sa forme, ses techniques de constructions ne se réfèrent pas au premier abord à des types connus qui nous les situeraient dans le temps. On ny voit pas de donjon, une tour-maîtresse qui aurait servi de résidence, ou symbolisé la domination d'un seigneur. On y voit plutôt un ensemble de 3 enceintes concentriques qui auraient pu servir à protéger une population villageoise lors de périodes troublées. Et Gérard Pradalié a bien relevé lusage fait de ces fortifications au XVIe siècle lors des guerres de religion.  Ces tours rondes et pleines rajoutées aux angles, se retrouvent aussi, dans une même configuration et facture, à Sainte-Catherine comme à Caumont. Et labsence de tour maîtresse que lon observe aussi à Lescure serait peut-être  dans ces broussailles, quapparente, comme ce fut le cas à Sainte-Catherine et Mirabat (Seix), où seules les fouilles récentes ont révélé les bases de donjons.                                                Château de Carère de plan carré à trois niveaux toit en croupes flaqué en façade d'une tour carrée de même niveaux toit  pointu à quatre pans.","habitants":"Seigneur de Montégut\r\n        \r\n        \"","divers":"Vestiges du château de Montesquieu, la maison forte de Bardies et le château de Pouzols","gps":"","images":["../image/image_09/09_Montesquieu_Avantes_1.jpg","../image/image_09/09_Montesquieu_Avantes_2.jpg","../image/image_09/09_Montesquieu_Avantes_3.jpg","../image/image_09/09_Montesquieu_Avantes_4.jpg","../image/image_09/09_Montesquieu_Avantes_5.jpg","../image/image_09/09_Montesquieu_Avantes_6.jpg","../image/image_09/09_Montesquieu_Avantes_7.jpg"]},"Consult_chateau_formulaire5995":{"id":"Consult_chateau_formulaire5995","dept":"09","canton":"Mas d","commune":"Montfa","nom":"Montfa_Mas_Azil","type":"Vestiges","periode":"XIII","histoire":"MONTFA; cité au  XIIIe siècle, Baudoin de Toulouse, frère du comte Raymond de Toulouse épouse Alix de Lautrec. Cet acte fonde la famille Toulouse Lautrec. \r\nAu XIVe siècle, le château appartient aux Arpajon. Au XVe siècle, le château est possession de la famille de Foix. Durant ce siècle, la famille Toulouse-Lautrec récupère le château. Au milieu du XVIe siècle, après un long procès contre sa belle soeur Isabeau de Lescure, François II Baron de Montfa récupère le château.   Durant les guerres de religion, François II voit mourir son fil aîné de 10 ans et perd son château contre les protestants en 1569.  Vers 1570, une parti du château est démoli puis reconstruit. En 1580, le vicomte  de Turenne attaque le château et le détruit partiellement. Plusieurs combats et altercations opposent la duc de Montmorency et le baron de Montfa en 1591. En 1595, le duc de Ventadour , gendre du duc de Momtmorency, emmène le duc de Montfa et sa femme au château de Vénès pour y être emprisonnés. Le château est toujours en possession de la famille Montfa.  En 1762, Joseph Constantin de Montfa possède le château. Il se fait nommer : comte de Toulouse-Lautrec.  En 1791, les révolutionnaires chassent le comte de Toulouse-Lautrec.  Au XIXe siècle, une lettre d' Alphonse de Toulouse-Lautrec père du célèbre peintre affirme que le château est en ruine, les terres rapportent peu et qu'il doit être vendu.","architecture":"Du château ruiné il ne reste que des murs de pierres jointives avec une taille  et des murs d'angle bien appareillés. Mais aucune trace d'archère, mâchicoulis, échauguette  et autre système de défense médiévale. Ce château a été fortement remanié avant d'être détruit.  Avec la dense végétation, il est difficile de  comprendre l'architecture de ce château.  En cette fin du XIXe siècle, le château est pillé, pierres et ornement sont arrachés et vendus.","habitants":"Famille Toulouse Lautrec                                                            Famille Montfa\r\n        \"","divers":"Vestiges du château de Montfa sur motte féodal","gps":"","images":["../image/image_09/09_Montfa_Mas_Azil_1.jpg","../image/image_09/09_Montfa_Mas_Azil_2.jpg","../image/image_09/09_Montfa_Mas_Azil_3.jpg","../image/image_09/09_Montfa_Mas_Azil_4.jpg"]},"Consult_chateau_formulairef5dc":{"id":"Consult_chateau_formulairef5dc","dept":"09","canton":"Saint-Lizier","commune":"Montjoie en Couserans","nom":"Montjoie_Couserans","type":"Château","periode":"XIII","histoire":"Deux châteaux à Montjoie dont celui de Montjoie et celui de Saignan chambres d'hôtes de  Bardiés Thibaut.                                                                                                     MONTJOIE   Montjoie-en-Couserans est une petite bastide fondée en 1256 par un accord de paréage entre Alphonse de Poitiers, comte de Poitiers et de Toulouse, et l'évêque du Couserans.\r\n Le château de Seignan  :  à la famille De Bardies depuis le XVIe siècle.","architecture":"Monjoie, de forme carrée, ce village avait une enceinte fortifiée avec une tour à chaque angle. On y entrait par deux portes ogivales situées côtés ouest et est. Aujourd'hui subsistent encore les vestiges de deux tours à l'ouest et seule la porte Est a été conservée. Les maisons étaient disposées au pied des murailles. L'église était située au centre du village.                                                                                                       Située à quelques à deux pas de Saint-Lizier, la bastide épiscopale de Montjoie-en-Couserans est l'une des plus petites et charmantes Bastides de France, située sur le chemin de Saint-Jacques de Compostelle. Cette jolie Bastide vous incite à plonger au Moyen-Age;  Remparts, tours, meurtrières, trou à canon,  tout un système de défense pour protéger les habitants des maisons à colombages encore visibles à l'intérieur. Ce qui fait la beauté et l'originalité de cette église est sa façade fortifiée. Il s'agit d'un clocher-mur, constitué de très belles pierres bleutées, surmonté de deux tourelles et de chemin de garde.","habitants":"Famille De Bardies\r\n        \"","divers":"Montjoie en Couserans, église de château de Seignan","gps":"","images":["../image/image_09/09_Montjoie_Couserans_1.jpg","../image/image_09/09_Montjoie_Couserans_2.jpg","../image/image_09/09_Montjoie_Couserans_3.jpg","../image/image_09/09_Montjoie_Couserans_4.jpg","../image/image_09/09_Montjoie_Couserans_5.jpg","../image/image_09/09_Montjoie_Couserans_6.jpg"]},"Consult_chateau_formulaire95f7":{"id":"Consult_chateau_formulaire95f7","dept":"09","canton":"Lavelanet","commune":"Montségur","nom":"Montségur","type":"Vestiges","periode":"XIII","histoire":"MONTSEGUR, il date de 1204, haut lieu du Catharisme jusqu'en 1244, une  légende raconte que Montségur a été un lieu de refuge des derniers Templiers, après la suppression de l'Ordre par le Pape Clément V. Chaque année, au cours du solstice d'hiver, le premier rayon de soleil traverse le château, dans sa longueur et, au solstice d'été, il traverse les quatre archères du donjon, au nord-ouest avec une précision incroyable. Un phénomène comparable est visible à Quéribus. Certaines personnes y voient un lien, entre le culte solaire, d'origine manichéenne, et la religion des cathares. Montségur a été considéré comme étant le château du Graal. Le Graal aurait été une des pièces du trésor de l'église cathare : la coupe dans laquelle Joseph d'Arimathie aurait recueilli le sang du Christ sur le mont Golgotha ou bien l'émeraude tombée de la couronne de Lucifer lors de la chute des Anges.  En 1208 début des croisades menées par Simon de Montfort. Il fut assiégé par les troupes royales en 1243-44  durant 11 mois, par l'armée de 10 000 hommes du Sénéchal du Roi de France et, l'évêque de Narbonne. Fin tragique le 16 mars 1244, plus de 230 cathares ne voulant pas renier leur foi, monteront sur le bûcher.  Huit siècles plus tard, ces flammes d'un autre âge alimentent toujours les spéculations et les rumeurs les plus folles. Raymond de Péreille seigneur à construit un ouvrage fortifié. propriété de la commune.","architecture":"Le château de Montségur est de style cathare,   construit en 1204, très impressionnant du haut de son éperon rocheux également nommé \"Pog\".  Restauré, il est situé sur le point culminant de la montagne qui surplombe le village, à 1 207 mètres d'altitude. Les vestiges de l'actuelle place de Montségur ne doivent plus grand chose aux Cathares. La forteresse théâtre des terribles événements de l'année 1244 fit l'objet d'une totale restructuration dans la seconde moitié du XIIIe siècle. Tel que l'on le voit aujourd'hui, la garnison royale l'abandonne au XVIIe siècle au traité des Pyrénées  en novembre 1659.  Le château comporte deux parties, un donjon rectangulaire et une cour attenante bordées de courtines  non flanquées suivant la ligne de faîte, dessinant un quadrilatère irrégulier. Le donjon avait sans doute trois niveaux dont deux subsistent aujourd'hui. Un bel escalier en vis a été établi  dans un pan coupé de la jonction du donjon et de la cour, les archères existent mais non percées.","habitants":"Seigneur Raymond de Péreille \r\n        \r\n        \"","divers":"Vestiges du château de Montségur","gps":"","images":["../image/image_09/09_Montsegur_1.jpg","../image/image_09/09_Montsegur_2.jpg","../image/image_09/09_Montsegur_3.jpg","../image/image_09/09_Montsegur_4.jpg","../image/image_09/09_Montsegur_5.jpg","../image/image_09/09_Montsegur_6.jpg","../image/image_09/09_Montsegur_7.jpg"]},"Consult_chateau_formulaire44bb":{"id":"Consult_chateau_formulaire44bb","dept":"09","canton":"Saint-Girons","commune":"Montégut en Couserans","nom":"Montégut_Couserans","type":"Château","periode":"XI-XIII","histoire":"Deux châteaux à Montégut en Couserans celui de Montégut et le manoir du Pouech hôtel restaurant.                                                                                                                       MONTEGUT,  cité en 1110  le château féodal, dans la mouvance des comtes de Comminges, les seigneurs de Montégut apparaissent dans lépopée de la commanderie de Montsaunès. En 1216, le châtelain de Montégut brûle et démolit la ville épiscopale de St-Lizier. Les seigneurs de Montégut sont connus pour leur appui aux comtes de Comminges dans leur rivalité avec les évêques de Couserans autour de Saint-Lizier ». Au XIIIe siècle, durant la croisade des Albigeois, les seigneurs de Montégut durent sur ordre de Simon de Montfort abaisser les tours et le donjon de leur château. La terre de « Montégut » appartiendra au moins depuis lhommage fait le 1er juillet 1389 jusquà la Révolution à la famille de Méritens. Cependant, une co- seigneurie exista avec la famille de Roquemaurel de la branche de Montégut.\r\nLa seigneurie faisait partie de la châtellenie de Salies du Salat.","architecture":"Montégut en Couserans, ancien château féodal,  Il est mentionné dès 1110 ; l'enceinte extérieure à gardé le plan circulaire, donjon du XIIIe et logis XVIIe, décor intérieur (plafonds et frise) : privé (vestiges archéologiques à lintérieur du château,   le château de Montégut était entouré de plusieurs enceintes successives dont les traces sont encore  visibles, il possédait au nord une tour rectangulaire sans ouverture extérieure dans la partie restante, flanquée d'un corps de bâtiment formé d'une salle dont les voûtes reposaient par trois arches en plein cintre sur un pilier central. L'appareil de cette tour, ainsi que celui d'une partie du mur d'enceinte, permettent de situer sa construction antérieurement à celle d'une autre tour plus petite datant sans doute du XIIe siècle. Un puits creusé dans le roc occupe le centre de la cour dont l'accès se fait par la seule porte donnant à l'extérieur, au nord est de l'ensemble. Au XVIIe siècle, la transformation en résidence donne à l'ensemble son aspect actuel, l'intérieur se présente dans les parties non ruinées, comme une suite de pièces qui furent assez luxueuses avec des cheminées en bois de style Louis XIII.                                     Le manoir du Pouech, corps de logis de plan carré à deux niveaux toit en croupes avec lucarnes flanqué de quatre tourelles en angles toit en terrasses.","habitants":"Famille de Méritens\r\n        \r\n        \"","divers":"Château de Montégut et du Pouech à Montégut en Couserans","gps":"","images":["../image/image_09/09_Montegut_Couserans_1.jpg","../image/image_09/09_Montegut_Couserans_2.jpg","../image/image_09/09_Montegut_Couserans_3.jpg","../image/image_09/09_Montegut_Couserans_4.jpg"]},"Consult_chateau_formulaire442c-2":{"id":"Consult_chateau_formulaire442c-2","dept":"09","canton":"La bastide de Sérou","commune":"Nescus","nom":"Nescus_Sérou","type":"Château","periode":"XIX","histoire":"NESCUS  reconstruit au XIXe siècle, il était possédé par la famille de Mascaron, puis à celle des Narbonne-Lara.  En 1719 : mariage de Jean de Narbonne-Lara avec Marie de Mascaron, fille de Paul de Mascaron, seigneur de Nescus le comte de Narbonne Lara : commissaire à lassemblée de la noblesse tenue à St Girons en 1789 ; le comte Louis de Narbonne-Lara, ministre de Louis XVI : leur devise : « Si nous ne descendons pas des rois, les rois descendent de nous ». Les Narbonne-Lara appartiennent à une des familles les plus prestigieuses de France et d'Espagne. Ils reconnaissent pour ancêtre Guillaume le Grand, duc d'Aquitaine, qui vivait au IXe siècle. Château utilisé  pour les colonies de vacances ; Le marquis de Narbonne-Lara décède  en 1909 : mort à lâge de 50 ans ; dernier représentant de sa branche.","architecture":"En 1910, l'annuaire du département de l'Ariège décrivait dans ses pages « le splendide château de Nescus de monsieur le marquis de Narbonne-Lara et son superbe parc aux belles pièces d'eau ». Démoli au moment de la Révolution, le château a été reconstruit sous la Restauration puis incendié en 1918, reconstruit après l'incendie de 1918 constitué d'un corps de logis carré de trois niveaux toit brisé avec lucarnes flanqué  de tours carrées  sur angles de la façade avec toitures en dômes impérial, un pavillon sur angle de trois  niveaux à toit identiques au corps de logis une tour ronde à l'opposée toit en poivrière, l'ensemble est flanqué de chaque côté  d'un corps de logis et de deux étages avec terrasses.","habitants":"Famille de Mascaron\r\n        \r\n        \r\n        \r\n        \"","divers":"Château de Nescus à la Bastide de Sérou","gps":"","images":["../image/image_09/09_Nescus_Serou_1.jpg","../image/image_09/09_Nescus_Serou_2.jpg","../image/image_09/09_Nescus_Serou_3.jpg"]},"Consult_chateau_formulaire390e":{"id":"Consult_chateau_formulaire390e","dept":"09","canton":"Lézat sur Léze","commune":"Sieuras","nom":"Nogarède","type":"Forteresse","periode":"XV","histoire":"NOGAREDE, l'édifice a été construit au XVe siècle sur des fondations moyenâgeuses et  rénové au XVIIe siècle.  La légende veut que les briques aient servi à construire la mairie de Saint-Ybars. Le château a longtemps été occupé par la famille de Sers, seigneurs de Nogarède. Son propriétaire actuel est monsieur Dufrêne qui la hérité de son père ; ce dernier succédait à sa mère, madame Davisard et a doublé une des ailes du château formées par danciennes écuries devenues demeures familiales. Château de la Nogaréde  du XVIIe siècle : demeure de lécrivain de La Beaumelle (qui y est né en 1772), puis du philosophe végétarien Gleize.","architecture":"L'imposant château de Nogarède se dresse au sommet dune colline et offre une vue magnifique sur la vallée de la Lèze et, au loin, sur les Pyrénées.  Il est en briques rouges avec des fenêtres en pierre à meneaux. Il est flanqué de trois tours rondes et dune tour octogonale, renforcées par des voûtes cintrées de briques bien apparentes qui les cernent au ras du sol. Une autre protection est constituée par des murs, qui montent haut et qui relient dans les angles les tours aux murs du château proprement dit. Des obus envoyés contre le château ! Un contrefort imposant contre le mur ouest renforce encore la construction. Les deux tours au sud, de trois étages, ont 23 mètres de haut. Lune dentre elles est octogonale. Une petite tourelle la double dun second escalier au troisième étage. Elle était autrefois surmontée dune terrasse qui a été supprimée ; la tour a alors été rehaussée à la même hauteur que lautre et couverte dun toit à huit pans. Cest par elle que lon entre dans le château par une magnifique porte qui ouvre sur un escalier à vis. Une cinquième tour a été détruite à la Révolution.","habitants":"Famille de Sers\r\n        \r\n        \"","divers":"Château de Nogarède","gps":"","images":["../image/image_09/09_Nogarede_1.jpg","../image/image_09/09_Nogarede_2.jpg","../image/image_09/09_Nogarede_3.jpg","../image/image_09/09_Nogarede_4.jpg","../image/image_09/09_Nogarede_5.jpg","../image/image_09/09_Nogarede_6.jpg"]},"Consult_chateau_formulaire3b86":{"id":"Consult_chateau_formulaire3b86","dept":"09","canton":"Ax les Thermes","commune":"Ax les Thermes","nom":"Orgeix","type":"Château","periode":"XIV","histoire":"En 1272, lors de la délimitation du comté de Foix, Orgeix figure sous le nom dOrgeys.\r\nde1390 à 1450 de la châtellenie dAx. Lors du dénombrement, en 1446, réalisé par Michel de Bernis, Orgeix est un fief appartenant à la famille de Niort, dépendant du comte de Foix. En 1559, Jeanne dAlbret, comtesse de Foix et reine de Navarre cède les droits seigneuriaux à Raymond Munier, marchand dAx et surintendant des Eaux et Forêts dans les consulats dAx, Mérens, Prades et Montaillou.  Au début du XVIIe siècle, Orgeix est la possession de plusieurs coseigneurs (Olivier Serda, Olivier Munier, Jean de Perpère Munier) avec leurs forêts (qui serviront à lalimentation des forges à la catalane). En 1642, Olivier Serda donne la seigneurie dOrgeix au neveu de son beau-frère, Arnaud Thonel : cest ainsi quOrgeix devient le fief de cette famille qui détiendra aussi, à la veille de la Révolution, Vaychis, la moitié de la terre dOrlu, la moitié de la terre de Tignac.  Joseph Alexandre de Thonel assiste, en 1789, à lassemblée générale de la noblesse, tenue à Pamiers.  Le 30 août 1817, le roi Louis XVIII nomme Jean François Joseph de Thonel marquis dOrgeix  Jean dOrgeix : né au château dOrgeix le 15 avril 1921, Artiste, sportif, aventurier. Médaille de bronze à Londres en 1948 en équitation (sous le nom de Chevalier dOrgeix) ; Cent huit victoires internationales ; champion olympique dans cette discipline, à la tête de léquipe de France, en 1976 ; Pseudonyme comme artiste dramatique : Jean Paqui. Tourne dans plusieurs films « LAssommoir ». A écrit en 1969 « LAfrique de mes fauves »; décédé le 4  juillet 2006","architecture":"Orgeix du XVIe siècle de plan rectangulaire à trois niveaux toiture en croupe avec série de lucarnes côté lac flanqué de deux tours  carrées à quatre niveaux à toit à quatre pans prolongé du côté ouest d'une dépendance de deux niveaux toit à deux pans.","habitants":"Joseph Alexandre de Thonel\r\n        \"","divers":"Château thermale  d'Orgeix","gps":"","images":["../image/image_09/09_Orgeix_1.jpg","../image/image_09/09_Orgeix_2.jpg","../image/image_09/09_Orgeix_3.jpg","../image/image_09/09_Orgeix_4.jpg"]},"Consult_chateau_formulairec873":{"id":"Consult_chateau_formulairec873","dept":"09","canton":"La Fossat","commune":"Pailhès","nom":"Pailhès","type":"Forteresse","periode":"XII-XIV","histoire":"PAILHES, le château de Pailhès a un long passé. Du XIIe siècle à nos jours, il a toujours été habité. Son histoire est un des plus riche témoignage du passé ariégeois. il fut la propriété de puissantes familles,  en premier les Amiel, dès le XIe siècle, puis les Villemur qui le conservèrent jusquau XVIIIe siècle.\r\nLHistoire rapporte que Henri III de Navarre, roi de Navarre et comte de Foix en 1579, futur Henri IV a été lhôte du baron à Pailhès du 30 novembre au 1er décembre 1579, comme en témoigne la correspondance publiée aux archives historiques de la Gascogne en 1886. Jusquen 1987, les visiteurs pouvaient admirer le « lit dHenry IV», classé en 1965 et acquis par le conseil général de lAriège en juillet 1989. Il devait ensuite être exposé au château de Foix. Le château fut ensuite vendu à la famille Lafarge. Cette famille, très impliquée dans la vie locale eut à affronter les tourmentes de la Révolution. Elle construisit la chapelle castrale qui fut achevée et bénie en 1780. Au début du XXe siècle la baisse des revenus agricoles ébranla le système traditionnel et les derniers propriétaires, les familles Rouzeau et Bernardin, ne purent plus faire face aux dépenses nécessaires à lentretien de ce château.\r\nInhabité et livré au vandalisme le château a été racheté par des particuliers qui ont constitué lassociation de défense et de sauvegarde du château de Pailhès. Il a appartenu aux familles Amiel, de Villemur, puis à partir de 1762, à la famille de Lafage de Pailhès, jusqu'en 2006 .","architecture":"Le château  Il est difficile, sans travaux considérables, didentifier lâge des constructions que les sols des caves laissent apparaître. Cependant, la majeure partie du bâti, y compris la tour descalier, le portail dentrée et la façade Ouest, date du XIVe siècle se dresse parmi les arbres au sommet dun piton isolé qui surplombe en falaise abrupte le village situé sur les rives de la Lèze,  le château de Pailhès est lun des plus anciens encore en état. De plan quadrangulaire sur un promontoire  C'est un bel exemple de l'architecture militaire médiévale avec son accès par une porte surmontée d'un assommoir et sa citerne moyenâgeuse au centre de la cour. Sa base médiévale datant du XIIe siècle sest vue remaniée et complétée par des travaux aux XVe, XVIe et XVIIIe siècles. Ces diverses modifications ont donné au château de Pailhès une allure unique et fantaisiste quacheva de perturber une énorme construction du XVIIIe siècle, corps de logis  en équerre à cinq niveaux accolés d'un donjon carré à mâchicoulis, des courtines avec contreforts rejoignant une bâtisse carrée toit en croupes flanqué sur l'angle d'une tour ronde à toit presque plat.Le logis construit au XIVe siècle est flanqué d'une tourelle contenant un escalier en vis en bois. La salle des gardes conserve la trace de graffiti supposé du XVIe siècle et une chambre du château aurait hébergé le futur Henri IV.","habitants":"Famille de Villemur\r\n        \r\n        \"","divers":"Forteresse de Palhiès","gps":"","images":["../image/image_09/09_Pailhes_1.jpg","../image/image_09/09_Pailhes_2.jpg","../image/image_09/09_Pailhes_3.jpg","../image/image_09/09_Pailhes_4.jpg","../image/image_09/09_Pailhes_5.jpg","../image/image_09/09_Pailhes_6.jpg"]},"Consult_chateau_formulaire9478":{"id":"Consult_chateau_formulaire9478","dept":"09","canton":"Pamiers","commune":"Pamiers","nom":"Pamiers","type":"Château","periode":"XVI","histoire":"PAMIERS,  le premier bâtiment sur le mamelon du Castella fut une forteresse construite par les comtes de Foix sur une zone appartenant à l'abbaye, au pied de laquelle se forma un centre de population:  C'est, d'ailleurs, à cette occasion (en 1111) que le vocable de \"Appamiae\" est cité.  Pamiers, gros bourg relativement riche, situé en plaine, sera longtemps en conflit avec le comte de Foix, co-seigneur de la cité avec l'abbé du monastère. Ces querelles, surtout avec l'épisode cathare et la personnalité de l'abbé, Bernard Saisset, feront de Pamiers le siège d'un diocèse en 1295  autant pour amoindrir l'évêché de Toulouse que pour contrarier le comte de Foix.
