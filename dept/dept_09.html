},{"id":"Consult_chateau_formulaireaa25","nom":"Tarascon_Ariège","commune":"Tarascon sur Ariège","type":"Château","img":"../image/image_09/09_Tarascon_Ariege_1.jpg"},{"id":"Consult_chateau_formulaire7a00","nom":"Terride_Mirepoix","commune":"Mirepoix","type":"Château","img":"../image/image_09/09_Terride_Mirepoix_1.jpg"},{"id":"Consult_chateau_formulairedc7e","nom":"Tour_du_Crieu","commune":"La Tour du Crieu","type":"Tour-Château","img":"../image/image_09/09_Tour_du_Crieu_1.jpg"},{"id":"Consult_chateau_formulairef289","nom":"Tourtouse","commune":"Tourtouse","type":"Château","img":"../image/image_09/09_Tourtouse_1.jpg"},{"id":"Consult_chateau_formulaired883","nom":"Usson_Castel","commune":"Rouze_Donnezan","type":"Vestiges","img":"../image/image_09/09_Usson_Castel_1.jpg"},{"id":"Consult_chateau_formulairebcaf","nom":"Vic_Soueix","commune":"Oust","type":"Manoir","img":"../image/image_09/09_Vic_Soueix_1.jpg"},{"id":"Consult_chateau_formulaire6d0e","nom":"Vicdessos","commune":"Auzat","type":"Vestiges","img":"../image/image_09/09_Vicdessos_1.jpg"}];const FULL={"Consult_chateau_formulaire1655":{"id":"Consult_chateau_formulaire1655","dept":"09","canton":"Lézat-sur-Léze","commune":"Allières","nom":"Allières","type":"Château","periode":"XVIII","histoire":"Deux châteaux à Allières celui de la Barbe et celui de Montcru tous deux du XVIIIe siècle, manoir à Clermont à 5 kilomètres et autres gîtes de France.                                                                                                                                                    BARBE, dit de Labarbe est cité en 1268 ; démoli en 1623 lors des guerres de religion, il a été reconstruit au XVIIIe siècle.  Au XVIe siècle à la famille dHonoux  avec Sabarat\r\nAu XVIIe et au XVIIIe siècle la famille de Falentin de Saintenac est citée dabord comme co-seigneur, puis seigneur dAllières.  Le dernier seigneur dAllières  qui assista à lassemblée de la noblesse tenue à Pamiers en 1789, Jean-Baptiste de Falentin de Saintenac (1757-1831), fut maire de Pamiers, puis président du conseil général de lAriège et 3 fois député.  Aujourd'hui, la société de monsieur Christophe Martin fait l'élevage  d'animaux. \r\nMONTCRU  du XVIIIe siècle, construit par la famille de Morteau, pas d'autre information historique,  aujourd'hui chambres d'hôtes.","architecture":"Château de Labarbe (ou La Barbe) du XVIIIe siècle : ancienne fortification, mais cité dès 1268 (appartenait à labbaye du Mas dAzil), détruite durant les guerres de religion.  de plan carré  à trois niveaux sur soubassement.                \r\n Château de Montcru du XVIIIe siècle,  corps de logis de plan rectangulaire  à deux niveaux et attiques flanqué de tours carrées une en angle droit et l'autre à l'opposé en façade plein cintre.     \r\nRuines de Mourissé, de Pavavre, de Lagrausse.","habitants":"Famille de Falentin de Saintenac                                                         Famille de Morteau\r\n        \r\n        \r\n        \"","divers":"Château de la Barbe, de Montcruet deux manoirs gites de France.","gps":"","images":["../image/image_09/09_Allieres_1.jpg","../image/image_09/09_Allieres_2.jpg","../image/image_09/09_Allieres_3.jpg","../image/image_09/09_Allieres_4.jpg","../image/image_09/09_Allieres_5.jpg"]},"Consult_chateau_formulaire7a3f":{"id":"Consult_chateau_formulaire7a3f","dept":"09","canton":"Saverdun","commune":"Mazères","nom":"Ardouin","type":"Château","periode":"XVI","histoire":"ARDOUIN,  la bâtisse  fut construite en 1575, elle s'appelait alors la Castellane. Elle abrita Marguerite de Navarre et le futur Henri IV lors de leur séjour à Mazères puis devint château des abbés de Boulbonne en 1629. Le château des comtes de Foix,  détruit, fut la résidence préférée de plusieurs comtes, dont Gaston Phbus, et Gaston de Foix-Nemours, né à Mazères et tué à Ravenne en 1512. Mazères devient, de la fin du XVIe siècle au milieu du XVIIe siècle, une très forte citadelle protestante. Devenu un centre commercial très actif, Mazères subit une grave fracture de 1914 à 1918. Cet hôtel a été démoli puis reconstruit en 1978. Seule l'aile gauche date de l'époque de construction fenêtres à meneaux,  emplacement de lancien château des comtes de Foix   situé dans un bel hôtel Pastelier du XVIe siècle, le musée de l'hôtel d'Ardouin propose de revisiter l'histoire de Mazères du Néolithique à nos jours, cet hôtel est bordé par un jardin fait dans l'esprit de la Renaissance (plantes médicinales, potagères). Une salle d'exposition présente la culture du pastel et son histoire,des reproductions d'armes médiévales sont exposées dans le jardin. C'est dans l'hôtel d'Ardouin construit par un riche commerçant en pastel au XVIe siècle qui abritait déjà le musée consacré à l'histoire de Mazères, qu'a été installée l'exposition \"Barbares en Gaule du Sud\". Elle occupe deux niveaux. Elle commence par une présentation du site de Bénazet et l'explication des techniques archéologiques à l'aide de moyens interactifs.","architecture":"A Ardouin,  site néolithique, romain, mérovingien, la bastide de Mazères fut créée en 1253 par l'acte de paréage entre les comtes de Foix et les abbés de l'abbaye de Boulbonne, alors située sur ce site détruite par les huguenots en 1567. Mazères, les remparts de la Bastide, cet itinéraire suit l'emplacement des anciens remparts démolis au XVIIe siècle. Place des Tourelles, l'église de l'ancien couvent des dominicains de style néogothique (1876-1878), ancien séminaire puis propriété de la ville, s'élève dans un vaste jardin public. Dans les flancs nord de cette place, on peut encore apercevoir des vestiges des remparts en briques.","habitants":"Marguerite de Navarre \r\n        \"","divers":"Le château d'Ardouin","gps":"","images":["../image/image_09/09_Ardouin_1.jpg","../image/image_09/09_Ardouin_2.jpg","../image/image_09/09_Ardouin_3.jpg","../image/image_09/09_Ardouin_4.jpg","../image/image_09/09_Ardouin_5.jpg"]},"Consult_chateau_formulaireaa2b":{"id":"Consult_chateau_formulaireaa2b","dept":"09","canton":"Tarascon sur Ariége","commune":"Miglos","nom":"Arquizat_Miglos","type":"Vestiges","periode":"XII-XIV","histoire":"ARQUIZAT, était la dépendance des comtes de Foix.   Le château  est mentionné en 1213, lors de l'inventaire des places fortes remises au roi de France. Miglos fut un lieu de passage et de résidence pour de nombreux parfaits et croyants.  La forteresse s'inscrivait dans un système défensif qui protégeait le comté de Foix et qui comprenait, en plus des châteaux de Montréal-de-Sos, de Quié, de Génat, de Castel Merle, plusieurs grottes fortifiées. Si le lieu-dit et l'église de Miglos sont attestés dès 1097, et un seigneur de Miglos cité en 1160. Le château fait alors partie des garanties offertes par le comte de Foix au roi d'Aragon pour preuve de sa bonne foi et de son allégeance à l'Église, lors de la croisade des Albigeois. En 1244, le seigneur Arnaud de Miglos, interrogé par l'Inquisition, admit avoir reçu des parfaits dans sa demeure et envoyé des armes aux assiégés de Montségur, ce qui lui valut d'être emprisonné pendant quatre ans. En 1311, Gaston Ier de Foix offre la seigneurie de Miglos à Bernard d'Usson. Les vestiges visibles actuellement reflètent l'état du château au XIVe siècle, après la restauration que Bernard d'Usson effectua en 1320. Puis le château changera plusieurs fois de mains et revint à la famille de Montaut-Miglos en 1610. Après bien des péripéties, en 1976, la Safer acquiert le château, propriété des surs Mathilde et Pierrette Gouzy, puis le rétrocède au département de lAriège, le 28 septembre 1984. Il appartient au conseil général de l'Ariège.  Il est classé aux M.H. depuis 1987.","architecture":"Château d'Arquisat  est implanté sur la cime d'un éperon calcaire, à 779 mètres d'altitude, juste au-dessus du village de Capoulet, il commande à la fois les vallées de Miglos et de Vicdessos. de style médiéval et date de 1320,  la conservation des ruines du château dArquizat à Miglos  du XIIe siècle reconstruit  au XIVe siècle. En ruines à la Révolution, il sera incendié en août 1792. il était composé de deux tours rectangulaires disposées sur deux angles opposées en diagonales, flanquent l'enceinte quadrangulaire, celle du point culminant constitue un donjon habitable de quatre niveaux séparés  par des planchers. Le logis seigneurial était situé sur la partie nord. À l'ouest s'élevait une tour carrée de 15 mètres de haut. À l'est se trouvait une salle percée de meurtrières qui surveillaient le chemin d'accès. Au sud se tenait un donjon carré, d'une hauteur de plus de 20 mètres.\r\nLe château de Miglos couvrait une surface carrée de 600 m².  De même, depuis 1987, l'association des amis du château de Miglos uvre pour la sauvegarde et la mise en valeur du site. En 1999 et en 2003, des travaux de cristallisation (injection de chaux dans les murs) ont permis de consolider le donjon et la tour nord-ouest.","habitants":"Arnaud de Miglos\r\n        \"","divers":"Les vestiges d'Arquizat à Miglos","gps":"","images":["../image/image_09/09_Arquizat_Miglos_1.jpg","../image/image_09/09_Arquizat_Miglos_2.jpg","../image/image_09/09_Arquizat_Miglos_3.jpg","../image/image_09/09_Arquizat_Miglos_4.jpg","../image/image_09/09_Arquizat_Miglos_5.jpg","../image/image_09/09_Arquizat_Miglos_6.jpg","../image/image_09/09_Arquizat_Miglos_7.jpg","../image/image_09/09_Arquizat_Miglos_8.jpg","../image/image_09/09_Arquizat_Miglos_9.jpg"]},"Consult_chateau_formulaire61de":{"id":"Consult_chateau_formulaire61de","dept":"09","canton":"Ax les Thermes","commune":"Ax-les-Thermes","nom":"Ax_les_Thermes","type":"Château","periode":"XIV-XIX","histoire":"A Ax-les-Thermes le château de Cascatelles et le château des Maures.                                                                                                                CASCATELLES, construit au XXe siècle par le ministre des affaires étrangères monsieur Delcassé. aujourd'hui hôtel restaurant.   H. Teisseire a relevé l'existence d'un moulin à trois meules construit en 1397 sur les remparts. Le rôle des feux du comté de Foix (sous Gaston Fébus) dont A. de Dufau de Maluquer en a fait l'étude distingue bien deux zones: \"la nouvelle ville d'Ax\"  fondée dans la première moitié du XIIIe siècle: dans Doat: Villanova de Ax  et la vieille ville d'Ax. En 1445  Ax, chef lieu de châtellenie  et de consulat jusquen 1766  qui comprenait : Ax, Ascou, Ignaux, Orgeix, Orlu, Perles, Savignac, Sorgeat, Tignac, Vaychis est pourvu de privilèges     1586 : épidémie de peste qui fit une centaine de morts, suivie de lincendie du 14 mai 1587 qui entraîna un exode. Un nouvel incendie restera dans les mémoires : celui du 15 juin 1615.   En 1651 : soulèvement dAx pour arrêter le commandant Marchin qui trahissait le roi pour rejoindre Condé.                                                                                                                     MAURES  Dès le XIIIe siècle, le 13 octobre 1260, le comte Roger IV, sur la demande de Saint-Louis, fonde près du bassin des ladres une léproserie pour soigner les soldats lépreux de retour de Terre Sainte. A la fin du XIIIe siècle, après un incendie, la ville qui se trouvait rive droite de la Lauze, sédifie entre la Lauze, lOriège et lAriège. Une enceinte défendue par 8 tours lentoure.  Au début du XIVe siècle, le catharisme se réveille dans le Sabarthès, avec Pierre Authier, notaire dAx, devenu « parfait » ; La répression sorganise : les arrestations sont nombreuses, en particuliers celle de tous les habitants de Montaillou (1318) ; P. Authié sera brûlé en 1311.","architecture":"Cascatelles  plus maison bourgeoise que château du XXe siècle, de plan rectangulaire à deux niveaux sur soubassement avec séries de lucarnes sur toits par tranchet  toit à deux pans en croupes.                                                                                                          Ruines du Castel Maou (ou dit \"château des Maures\") : XIIe et XIVe siècles. H. Teisseire nous apporte la précision suivante: \"Castel Mau n'est pas un château maure. Le terme de \"mau\" vient probablement du latin \"Magnus\" dérivé par l'occitan \"majou\" ce qui signifie le grand château\". \r\nVestiges de fortification (porte dEncaralpou), tour de guet dans un immeuble.","habitants":"Monsieur Delcassé.                                                                         comte Roger IV\r\n        \"","divers":"Le château de Cascatelles et le château des Maures.","gps":"","images":["../image/image_09/09_Ax_les_Thermes_1.jpg","../image/image_09/09_Ax_les_Thermes_2.jpg","../image/image_09/09_Ax_les_Thermes_3.jpg"]},"Consult_chateau_formulairec248":{"id":"Consult_chateau_formulairec248","dept":"09","canton":"Lézat-sur-Léze","commune":"Bastide_Belplas","nom":"Bastide_Besplas","type":"Château","periode":"XIX","histoire":"Deux châteaux à la Bastide de Besplas celui de Baillard du XIXe siècle et celui de Pradé pas d'information historique.                                                                                                                                      BAILLARD  à la Bastide de Besplas, Baillard  du XIXe siècle transformé en chambre d'hôtes.  Dans la plaine de Sogobère, saffrontèrent le jour de Pâques de 1573 les Huguenots qui venaient semparer de Mérigon et les Catholiques qui en furent défaits. Le seigneur du 1er château de Baillard, le chevalier de la Salle, fait construire à la suite dun vu de crainte dêtre emporté par une inondation en 1662, la chapelle du Bout du Pont de lArize.  A la veille de la Révolution, la communauté de La Bastide de Besplas a le droit denvoyer un député aux états du pays de Foix.\r\nLe 15 octobre 1801 : La Bastide de Besplas passe du canton de Daumazan à celui du Mas dAzil. En 1864, La Bastide de Besplas se signale par un fait divers : laffaire Jacques Latour, le 2 juillet 1875 : Mac Mahon, président de la République, visite Verdun et La Bastide de Besplas .   Dans le vieux château de Baillard fut le théâtre d'un célèbre assassinat en 1864. A 300m du village, un vieil homme de 74 ans, M. Bugad de Lassalle, habite le château de Baillard, une cossue demeure familiale. Il n'est de secret pour personne que c'est un homme fort riche, ayant la manie de l'or, et les valeurs qu'il possède font l'objet de paris et de surenchères dans le voisinage. Des métayers s'occupent de ses terres et trois domestiques sont à son service : Jean, 65 ans, Pélagie, 55 ans et Raymonde, 53 ans. Jacques Latour a été décapité à Foix et son complice, François Audouy, envoyé au bagne de Cayenne.","architecture":"chäteau de Baillard  du XIXe siècle  de plan rectangulaire à deux niveaux sur soubassement flanqué d'échauguettes en encorbellement avec toitures polygonales très effilées aux angles lucarnes avec pilastres et galbe sur les lucarnes centrales sur toits presque plats. Fronton redondant sur porte d'entrée en calotte.                                                                                                                       Château Pradé quadrangulaire à deux niveaux  flanqués de tour rondes en angles à toits plats en terrasses, fronton triangulaires en façade englobant  de grandes ouvertures.","habitants":"Chevalier de la Salle\r\n        \"","divers":"Château de Baillard et de Pradé à la Bastide de Besplas","gps":"","images":["../image/image_09/09_Bastide_Besplas_1.jpg","../image/image_09/09_Bastide_Besplas_2.jpg","../image/image_09/09_Bastide_Besplas_3.jpg","../image/image_09/09_Bastide_Besplas_4.jpg"]},"Consult_chateau_formulairebdb4":{"id":"Consult_chateau_formulairebdb4","dept":"09","canton":"La Bastide de Sérou","commune":"La Bastide de Sérou","nom":"Bastide_Sérou","type":"Château","periode":"XIV-XIX","histoire":"Cinq châteaux à la Bastide de Sérou vestiges de Bugnas,  château de Bourdette, de Castelmir ,  de Rhodes,  de Nescus hôtel (voir-article), de la tour du Loup  et d'Alzen.                                                                                                     BASTIDE-de-SEROU, en 1655 et 1658, les états de Foix se réunissent,  à La Bastide de Sérou. En 1689, les campagnards se réfugient à La Bastide de Sérou pour fuir les camisards, quant à la paroisse, elle dépendait de labbaye du Mas dAzil jusquen 1774. Avant 1789, siège de justice royale pour La Bastide de Sérou, Unjat, Broussenac, Vic et Aron ; Le corps de ville a 14 conseillers politiques.                                                                                        BOURDETTE (privé) : ayant appartenu à la famille de Morteau depuis le XVIIe siècle, il est reconstruit au XIXe siècle.                                                                                                            BUGNAS, vestiges  construit au XVIIe siècle sur des fondements datant du XIIe siècle  construction du château,    aménagement d'un château \"moderne\" au XVIIe siècle,sur les bases du vieux châteaux fort.                                                                                                                                                                                                                  RHODES, cet élégant château des XVIIe et XIXe siècles, propriété de David et Iroko Sindell, le château a retrouvé son prestige d'antan. David, célèbre avocat newyorkais, spécialisé en assistance aux étrangers pour l'obtention de la carte de séjour sur le sol américain, est aussi le seul avocat de New-York à parler japonais.hôtel restaurant.                                                                                                                                                TOUR du LOUP château du XIIIe siècle de la famille des comtes de Foix,en cours de « restauration »construction à l'époque d'un Louis XIII ou XIV.   Tour du Loup appartenait en propre à la famille de Foix-Rabat. Louis XIII, étant à Toulouse pour le procès de Montmorency, ordonna, le 28 octobre 1632, que le château de la Bastide de Sérou fût démoli ; la Forest-Toiras, gouverneur de Foix, chargea le capitaine Bérard de le raser, ce qui fut fait.                                                                                                        CASTELMIR château du comte de Montigny.","architecture":"Alzen, deux châteaux dont un avec édifice rectangulaire à deux niveaux et attiques,   flanqué de tours et tourelles sur angles, toit en croupes. L'autre représenté par une tour carrée avec toit en poivrière.                                                                                                      Bourdette où Val-Larbont bâtiment avec deux corps de logis en équerre à deux niveaux, toit brisée avec série de lucarnes à chaque travées,  deux pavillons rectangulaires aux angles de la façade saillants et toitures profilées à l'impérial avec lucarnes et sur la partie arrière sur angle extérieur une tourelle ronde toiture galbée avec clocheton.\r\nBugnas : vestiges reconstruit au XVIIe siècle sur des fondements datant du XIIe siècle le château semble en ruine,  sa hauteur reste impressionnante,  pas de mâchicoulis  ni crénelage, aucune fente de tir, les murs sont peu épais, cette construction est  une tour d'habitation et non pas le donjon.                                                            Castelmir,   corps de logis rectangulaire à trois niveaux toit en croupe avec lucarnes  accolé d'une tour carrée.                                                                                                                                                                                                         Rhodes,   édifice rectangulaire à deux niveaux sur soubassement avec toitures en croupe,  pavillon saillant plein cintre d'entrée avec escalier à double révolution, sur l'arrière accolé de dépendances à niveaux inférieurs.                                                                                                                Tour du Loup, édifice  du XIIIe  siècle mentionné en 1243 : en cours de  restauration.","habitants":"David et Iroko Sindell                                                                       Famille de Morteau\r\n        \r\n        \r\n        \r\n        \"","divers":"à la Bastide de Sérou vestiges de Bugnas,  château de Bourdette, de Castelmir,  de Rhodes, de la tour du loup  et d'Alzen.","gps":"","images":["../image/image_09/09_Bastide_Serou_1.jpg","../image/image_09/09_Bastide_Serou_2.jpg","../image/image_09/09_Bastide_Serou_3.jpg","../image/image_09/09_Bastide_Serou_4.jpg","../image/image_09/09_Bastide_Serou_5.jpg","../image/image_09/09_Bastide_Serou_6.jpg","../image/image_09/09_Bastide_Serou_7.jpg","../image/image_09/09_Bastide_Serou_8.jpg","../image/image_09/09_Bastide_Serou_9.jpg"]},"Consult_chateau_formulaire914e":{"id":"Consult_chateau_formulaire914e","dept":"09","canton":"Mirepoix","commune":"Belloc","nom":"Belloc_Laval","type":"Château","periode":"XIII","histoire":"Deux châteaux à Belloc celui de Belloc et celui de Laval.                                                          BELLOC,  en 1310, les seigneuries Queille, Belloc, et Saint-Quentin tombent dans la maison dArmagnac et y resteront jusquen 1371. A cette date, Jeanne dArmagnac, fille de Jean dArmagnac, vicomte de Fézensaguet et de Marguerite de Carmaing, épouse de Jean de Lévis III, qui deviendra seigneur de Mirepoix. A la mort de son époux, Jeanne déshéritera son fils au profit de Hugues de Carmaing, son cousin.  les seigneuries de Queille, Belloc et Saint-Quentin connaîtront de nombreux propriétaires au fil de leur histoire, ponctuée de procès retentissants.  Au final la famille de Lévis a réuni de fait, en 1738, les seigneuries devenues baronnies de Queille, Belloc et Saint-Quentin dans létat où la maison dArmagnac les possédait en 1310.                                                                                                                                                                 LAVAL,  mentionné dès le milieu du XIIIe siècle, le château de Laval appartenait alors au comte de Foix. Son seigneur direct, vassal de ce dernier, est également cité dans le témoignage dArnaud-Roger de Mirepoix,  quand le comte de Toulouse faisait le siège du château de Montségur, Arnaud du Villar de Queille, qui habite la Force de Laval près de Queille, entrer dans Montségur et préparer les arbalètes du château.  Au XVIIe siècle, le château de Laval appartient à la famille de Péguilhan. Leur blason, que lon retrouve dailleurs sur un des vitraux de léglise de Belloc,  se lit ainsi : trois épées dargent, pointe en bas, sur fond de gueule. Cette famille possède un tiers des terres de Belloc, St-Quentin et Queille dès 1598, lorsque Jeanne de Lissac épouse François de Péguilhan. Leur fils Jacques reçut le tiers de la baronnie de Queille et Belloc, distrayant de cette dernière, le château de Laval (1686), en faveur de Grégoire, leur autre fils.","architecture":"Belloc de plan rectangulaire  à trois niveaux toit en croupes                                                                                        Laval largement restauré au fil des siècles cet édifice a aujourdhui, pour la partie principale, la forme dun quadrilatère évoquant le style Renaissance avec fenêtres à meneaux, demi-croisées, porte en anse de panier et bretèche. Cette dernière est surmontée dun blason martelé, sans doute pendant la Révolution. Elle est également flanquée de canonnières de part et dautre. Tous les encadrements (portes et fenêtres) anciens sont en grès, ainsi que les chaînages dangle, tandis que ceux qui ont été réalisés au XIXe siècle portent les marques de la boucharde (outil principalement utilisé à cette période). Le porche du château, qui porte la date de 1638,  a été placé là après 1840. Au XIXe siècle, la propriété du château compte un four à tuiles, dont il reste aujourdhui des vestiges de la voûte bâtie en briques réfractaires.","habitants":"Famille de Lévis                                                                             Famille de Péguilhan\r\n        \"","divers":"Château de Belloc et de Laval à Belloc","gps":"","images":["../image/image_09/09_Belloc_Laval_1.jpg","../image/image_09/09_Belloc_Laval_2.jpg"]},"Consult_chateau_formulaire7c68":{"id":"Consult_chateau_formulaire7c68","dept":"09","canton":"Pamiers","commune":"Bonnac","nom":"Bonnac_Castellas","type":"Vestiges -Château","periode":"","histoire":"A Bonnac le château fort du Castellas  et de Bonnac.                                                                                               Le  CASTELLAS occupait une position stratégique en surplomb au-dessus de la vallée de l'Ariège. En raison de la découverte en cet endroit de monnaies datant des empereurs Tibère et Claude, les historiens ont émis l'hypothèse d'un castellum romain, bien qu'aucune trace de construction romaine n'ait été retrouvée. La tradition locale place le premier village de Bonnac sur la hauteur située au-dessus du château et sous sa protection. Au XIIIe siècle, il est mentionné propriété de la maison Durfort, une des quatre baronnies du comté de Foix,  au XVIe siècle passa à la maison d'Usson, érigée en 1683 en marquisat.                                                                                                                                    BONNAC fut construit en 1494 par Gaspard de Villemur, sénéchal du comté de Foix et seigneur de Bonnac. En 1649, la famille dUsson en devient propriétaire, le restaura et y établit sa résidence jusquen 1778. Cette demeure connut une succession de périodes de décrépitude et de reconstruction ou d'extension par de nouveaux maîtres, notamment par la famille Dusson qui reconstruisit le 1er étage.\r\nLe troisième marquis de Bonnac de la famille Dusson qui fut colonel, perdit une jambe au combat, il dut porter un pilon et cela lui valut le surnom de \"jambe de bois\" , Louis XV le fit commissaire du roi auprès des états de Foix.  Lettrés et cultivés, les dUsson de Bonnac entretiennent des correspondances avec les principaux philosophes et écrivains de leur temps : Pierre Bayle, Racine, La Fontaine, Leibnitz, Voltaire, Rousseau. A la mort du dernier marquis dUsson de Bonnac, le château fut acquis par labbé de Monteils, vicaire général de lEvêque de Pamiers qui décora le grand salon et la chapelle de stucs. Cest en 1816, que la famille des propriétaires actuels, M. et Mme René de Laportalière, acquirent le château, aujourd'hui chambres d'hôtes.","architecture":"Bonnac,  le castellas,  château fort, plus précisément donjon fortifié, peut être daté du XIe ou du XIIe siècle. Il comportait à l'origine une tour et une poterne qui protégeaient le passage vers la rivière. Abandonné sans doute bien antérieurement, il est mentionné en ruines dès le XVe siècle, des murs de deux mètres d'épaisseur et les voûtes étaient en plein cintre tombée en ruines en 1300,   les deux bras de murs protégeant la poterne à l'est et un pan de muraille prolongeant le côté ouest du donjon vers le sud.                                                                                                      Bonnac, ancienne demeure seigneuriale du début du XVIe siècle, de plan rectangulaire oblong a deux niveaux toit à deux pans et deux pavillons côtés parc un carré l'autre rectangulaire à trois niveaux. il a été construit dans des matériaux typiquement régionaux, briques, galets et colombages en bois de chêne.                                                                                                                                 Château, demeure de caractère,salle de réunion, salle de réception, la famille Charly fait surélever les tours et construire la maison du jardinier. Cette ancienne demeure seigneuriale très bien entretenue et entourée d'un beau parc, est appelée actuellement le château de Bonnac.","habitants":"Famille de Durfort                                                                                        Famille dUsson de Bonnac\r\n        \"","divers":"A Bonnac vestiges du Castellas et château de Bonnac.","gps":"","images":["../image/image_09/09_Bonnac_Castellas_1.jpg","../image/image_09/09_Bonnac_Castellas_2.jpg","../image/image_09/09_Bonnac_Castellas_3.jpg","../image/image_09/09_Bonnac_Castellas_4.jpg","../image/image_09/09_Bonnac_Castellas_5.jpg","../image/image_09/09_Bonnac_Castellas_6.jpg","../image/image_09/09_Bonnac_Castellas_7.jpg","../image/image_09/09_Bonnac_Castellas_8.jpg"]},"Consult_chateau_formulairea0b7":{"id":"Consult_chateau_formulairea0b7","dept":"09","canton":"Tarascon sur Ariége","commune":"Bédailhac et Aynat","nom":"Bédailhac","type":"Vestiges","periode":"XII","histoire":"La tour Montorgueil  construite entre 1163 et 1213, ce château fut abandonné dés le milieu du XIIIe siècle au profit du château de Calamès.\r\n CALAMES, vers le 1er siècle, certains archéologues supposent qu'une tour de guet Romaine existe en ce lieu. Au XIIIe siècle, un château de surveillance est aménagé. Il est possession du comte de Foix.  En 1272 : « Castris de Calamerio de Enato » : font partie du comté de Foix ; mais le « castra de Calames » doit être rendu au roi de France, en 1302 : le château de « Calamerio » fait partie du comté de Foix.  Lors du dénombrement du pays de Foix, en 1390, Bédeilhac   le curé est vassal direct du comte de Foix (à Bédeilhac) 1401 : dépend de la seigneurie de Rabat (alliance avec Arnave), sortant de la châtellenie de Quiè et relevait du consulat de Tarascon   le but est de protéger la vallée de Saurat. En 1829, un bas relief Grec est découvert à coté du village de Génat. Sachant que des Grecs ont occupés la région il y a plus de 2000 ans, certains archéologues imaginent que le mont Calamès viendrait de mots Grecs tel que : Calamas, Calamata ou Calamita. Le site de Calamès aurait il porté un temple Grec  Bédéilhac et Aynat en 1671 : le seigneur de Rabat possède les ruines du château de Calamès.   Le 15 octobre 1801 : Passe du canton de Saurat à celui de Tarascon.","architecture":"Bedailhac,  site préhistorique connu mondialement, Bédeilhac possède, aussi, des vestiges gallo-romains Lhistoire mieux connue par des textes nous dit :  Que des cathares sont cachés dans une grotte près de Bédeilhac,  Duvernoy,  Bernard de Caux.\r\n Château de Calamès, seul subsiste du château le donjon en ruine composé de 2 murs de pierre à 1002 m daltitude): mentionné au XIIIe siècle  (1272) ; mis en gage par le comte de Foix dans le conflit entre les comtes de Foix et les rois de France et dAragon entre 1272 et 1298. Il ne reste du château qu'un donjon en ruine, composé de deux murs de pierre, à 1002 m d'altitude.  N'ayant plus d'intérêt stratégique, au XIVe siècle, le château de Calamès sera laissé à l'abandon.                                                            \"Castra de Enato\" ou Castel d'Aynat en occitan ou château d'Aynat, mentionnée en 1213, faisait partie des fortifications du comte de Foix. Reste que deux pans de murs du donjon.","habitants":"seigneurie de Rabat \r\n        \r\n        \"","divers":"A Bédailhac La tour Montorgueil","gps":"","images":["../image/image_09/09_Bedailhac_1.jpg","../image/image_09/09_Bedailhac_2.jpg","../image/image_09/09_Bedailhac_3.jpg","../image/image_09/09_Bedailhac_4.jpg"]},"Consult_chateau_formulaireb05d":{"id":"Consult_chateau_formulaireb05d","dept":"09","canton":"Lavelanet","commune":"Bélesta","nom":"Bélesta","type":"Château","periode":"XIII","histoire":"BELESTA,  dorigine très ancienne, antérieur en tout cas au XIIIe siècle, le château de Bélesta a connu heurs et malheurs au cours des âges. Initialement connu pour être la propriété de la maison Bellissen, il appartient au XIIIe siècle à la maison de Lévis Mirepoix, puis,  à partir de 1320  à celle de Lévis Léran. Chef du parti des Réformés, Jean-Claude de Lévis Léran, dit « le sire dAudou », convertit léglise attenante au château en temple protestant et réaménage le château dans le style de la Renaissance. Au début du XVIIe siècle, le château devient la propriété de Gaspard de Cailhou. Au sortir des guerres de religion, léglise attenante a été rendue au culte catholique. Mais le château se trouve alors presque complètement ruiné.\r\nA partir de la fin du XVIIe siècle, le château appartient à lévêché de Mirepoix. Il fait lobjet dune restauration dans le style classique. Ainsi restauré, il sert alors de résidence dété de monseigneur de La Brouë. Après la Révolution, le château se trouve racheté  par la maison de La Rochefoucauld, puis par celle de Rotschild, puis par la famille Delaballe.  Celle-ci abandonne le château à la commune en 1924. Le château accueille  les réfugiés de la guerre dEspagne, ceux de lOccupation, puis les nécessiteux de la commune. Très dégradé, rempli dimmondices, il est alors revendu à divers propriétaires privés, dont finalement  Jean-Charles Mignot et Patrick Haure dans le cadre de la SCI.  Le bonnet rouge  du nom que lon prêtait jadis au baron dAudou.","architecture":"Bélesta,  conserve néanmoins, sous ses airs de féodalité croulante, nombre de beautés, jusquici oubliées, témoins de sa superbe ancienneté, de plan carrée à trois niveaux flanqué de tours carrées en façades  de tourelles en encorbellement. portes grandes et fortes ; plafonds à la Française, dont la plupart dorment encore  sous les lattis de la décadence ; sol de pierres énormes, polies par les ans ; fenêtres à meneaux de la Renaissance, croisées du XVIIe siècle.  Le château réapparaît lentement, pièce par pièce : cuisine médiévale, chapelle, grand escalier, salons. La restauration est en cours. Elle est loeuvre de passionnés darchitecture féodale, renaissante et classique, qui nont pas craint de jeter toutes leurs forces dans cette aventure solitaire.","habitants":"Jean Claude de Lévis Léran                                                            Famille de Rotschild\r\n        \r\n        \"","divers":"Château de Belesta","gps":"","images":["../image/image_09/09_Belesta_1.jpg","../image/image_09/09_Belesta_2.jpg","../image/image_09/09_Belesta_3.jpg","../image/image_09/09_Belesta_4.jpg"]},"Consult_chateau_formulairead42":{"id":"Consult_chateau_formulairead42","dept":"09","canton":"Foix","commune":"Foix","nom":"Bénac_Bellissen","type":"Château","periode":"XVII","histoire":"BELLISsEN, en 1876, au cap de la Ville, il fit élever pour son épouse un magnifique château de style néogothique. Ce décor, semblant surgir d' un vieux conte de fées,  fastueux et romantique. Il deviendra la résidence de la baronne et du baron de Bellissen-Bénac. Celui-ci décède en 1925 et sa femme y accueille des locataires  et dans la nuit du 8 au 9 juin 1943, un violent incendie ravage sévèrement la toiture. La ville l' a ainsi acquis et le laisse de nombreuses années en état de ruines. Dans les années 1980, les restes sont détruits et il fut érigé à la place l'hôtel du département.\r\nMonsieur le baron de Bellissen-Bénac avait évité la disparition tragique du château des comtes de Foix mais la raison d' état avait ordonné la destruction du château de Bellissen-Bénac.                                                                                                                                  Château de Bénac. cette demeure du XVII siècle, dans le pays du comte de Foix, fût la propriété de la famille de Bellissen-Bénac avant de devenir quelques décennies plus tard la maison d'hôtes de Serge et de Sylvie.","architecture":"Monsieur le baron de Bellissen-Bénac avait évité la disparition tragique du château des comtes de Foix mais la raison d' état avait ordonné la destruction du château de Bellissen-Bénac. De style renaissance de plan rectangulaire à trois niveaux sur soubassement à toit brisés à l'impérial flanqué de tours rondes à mâchicoulis et carrées  toutes à toit pointus ainsi que les échauguettes.                                                                                                            Benac de plan rectangulaire à trois niveaux  de trois travées flanqué de deux pavillons légèrement saillants de deux travées sur les extrémités de la façade, toit en croupe avec lucarnes.","habitants":"Monsieur le Baron de Bellissen-Bénac \r\n        \r\n        \"","divers":"Château de l'ancien Bellissen, de Bénac et la maison de retraite à Foix","gps":"","images":["../image/image_09/09_Benac_Bellisen_1.jpg","../image/image_09/09_Benac_Bellisen_2.jpg","../image/image_09/09_Benac_Bellisen_3.jpg","../image/image_09/09_Benac_Bellisen_4.jpg","../image/image_09/09_Benac_Bellisen_5.jpg"]},"Consult_chateau_formulairee79f":{"id":"Consult_chateau_formulairee79f","dept":"09","canton":"Mirepoix","commune":"Camon","nom":"Camon","type":"Abbaye château bourg-fortifié","periode":"XIV-XIX","histoire":"CAMON, la citadelle fut fortifiée, au XIVe siècle, par Gaston Phébus. Cest le village natal du philosophe protestant Pierre Bayle et son passé est marqué par les guerres de religion.  La légende veut que cette abbaye bénédictine ait été construite sur ordre de Charlemagne en 778. Quoi qu'il en soit, le premier acte mentionnant ce palais fortifié date de 943 comme simple couvent dépendant de la puissante abbaye de Lagrasse, dont au XIIe siècle elle est devenue un prieuré simple. A la fin du XVe siècle, incendie de l'abbaye  et reconstruction de 1505 à 1537  sous la direction de Philippe de Lévis abbé.  Les tours sont bâties à la fin du XVe siècle par Philippe de Lévis, évêque de Mirepoix et prieur  qui fera aménager ses appartements dans la grande tour rectangulaire que lon appelle désormais le château. Il fera également édifier le mur denceinte du village (1526-1535). Entre 1560 et 1570, le cardinal Georges dArmagnac, alors prieur de Camon, fit restaurer ces fortifications, combler les créneaux et percer des meurtrières. Il flanquera dune petite tour ronde langle ouest de lenceinte du village. À la fin du XVIe siècle, au moment des guerres de Religion, on surélève les murs. Il subsiste de l'enceinte principalement le mur nord. Vendu comme bien national à la Révolution, achat en 1848  par la famille  Lemoisy d'Aurel  officier  de marine et en 1980 Dominique du pont en hérite et le loue pour des séminaires.","architecture":"Abbaye de   Camon du VIIIe siècle, transformé en château, les riches aménagements intérieurs du XVIIIe siècle témoignent de la puissance de ce lieu religieux. La forteresse du méandre, en référence au cours de l'Hers-Vif, fut fortifiée à trois reprises. Les vestiges des remparts sont inscrits monuments historiques Actuellement la bâtisse est un hôtel. Ancienne tour des remparts, intégrée au système défensif du bourg fortifié, la maison haute fut transformée au XVIIe siècle en demeure seigneuriale. Remparts du XIV et XVIe siècle.  Les bâtiments du prieuré, protégés par une enceinte et par la rivière, sont ruinés lors de la guerre de Cent-Ans. A la fin du XVe siècle, après le saccage, l'évêque Philippe de Lévis Mirepoix demande la fortification du village. De nombreux aménagements sont réalisés dont la construction, dans un angle du rempart, d'une puissante tour carrée nommée de nos jours : Maison Haute.  Au début du XVIIe siècle, l'imposante tour carrée est transformée en luxueuse habitation seigneuriale nommée en notre siècle : Maison haute, et quelques temps avant son arrestation, le Duc de Montmorency loge dans l'habitation seigneuriale durant quelques jours. Au début du XVIIIe siècle, avec la période de paix et l'accroissement de la démographie, certains remparts sont détruits pour libérer le bourg et d'autres sont aménagés en habitation.","habitants":"Famille  Lemoisy d'Aurel \r\n        \"","divers":"La citadelle abbatial de Camon","gps":"","images":["../image/image_09/09_Camon_1.jpg","../image/image_09/09_Camon_2.jpg","../image/image_09/09_Camon_3.jpg","../image/image_09/09_Camon_4.jpg","../image/image_09/09_Camon_5.jpg","../image/image_09/09_Camon_6.jpg","../image/image_09/09_Camon_7.jpg"]},"Consult_chateau_formulaire7481":{"id":"Consult_chateau_formulaire7481","dept":"09","canton":"Arize-Levèze","commune":"Campagne sur Arize","nom":"Campagne_Arize","type":"Château","periode":"XVII-XIX","histoire":"Plusieurs châteaux à Campagne sur Arize, village fortifié, château de Salenques de Ligny du Touronc et du petit château Robert.                                                                 CAMPAGNE sur ARIZE, au comté de Foix sous Louis XIV, famille du Pac seigneurs de Marsoulies à Campagne depuis le XVIe siècle. Cette famille a fourni un grand nombre d'officiers de terre et de mer, des gouverneurs de places fortes, des chanoines et chanoinesses, des maîtres d'hôtel ordinaires, des gentilshommes de la chambre et des pages des rois de France, etc. En ses différentes branches dont celle du Pac de Bellegarde et du Pac de Marsoulies. Ainsi, Fortanier du Pac, fut tué à la bataille de Pavie en combattant avec François Ier. Gabriel du Pac, chevalier de Malte en 1780, officier de marine, périt dans l'expédition de la Pérouse. \r\nLa terre de Marsoulies, située à Campagne, fut apportée en dot à Mathieu du Pac le 11 septembre 1554 par son épouse Jeanne de Solan. Le contrat de mariage passé devant notaire à Saint-Girons, qualifie Jeanne de Solan dhéritière des seigneuries « de Marbé et de Marsoliés ». En 1641, les du Pac de Marsoulies firent bâtir la maison forte de Marsoulies qui subsiste encore aujourdhui. La date de construction figure sur le linteau de la tour. La famille de Courbaut revient également fréquemment dans les registres de Campagne. Dans une lettre écrite de Rotterdam, et datée du 10 février 1696, le philosophe Pierre Bayle, natif du village voisin du Carla.                                                                                          LIGNY  En 1828, une descendante des Lafont, Claire-Marie de Marin épouse un de Berghes Saint-Winock, dune vieille famille flamande. Cest lui qui, vers 1840, fait construire le château de Ligny.","architecture":"Petit château néo-gothique, dit château Robert, à l'entrée du village, à tourelle  du XIXe siècle.\r\nChâteau du Touronc ancienne propriété des Bardies-Montfa\r\nMaison forte de Marsoulies (1641).                                                Château de Ligny : de style italien, a été construit en  1840 par le prince de Bergues Saint Vincent   Lédifice est un grand bâtiment rectangulaire construit sur quatre niveaux, dune architecture très sobre. Seule sa façade à lest sorne dune entrée précédée dun porche à colonnes surmonté dun balcon.\r\nDomaine des Salenques (sur lemplacement de l'ancienne abbaye) : ruiné par un incendie; Le château des Salenques sera vendu aux enchères le 10 septembre 2008.\r\nCampagne village fortifié, porte monumentale à ogive de type \"gothique\" dans la ville haute, considérée comme datant du XIVe siècle, et reste d'une maison forte, dit l'ancien \"château\" de Campagne.\r\nChâteau de Marveille, du XVIIIe siècle,  quadrangulaire à deux niveaux avec série de lucarnes.","habitants":"Famille du Pac \r\n        \"","divers":"Plusieurs châteaux à Campagne sur Arize village fortifié, château de Salenques, de Ligny, du Touronc et du petit  Robert.","gps":"","images":["../image/image_09/09_Campagne_Arize_1.jpg","../image/image_09/09_Campagne_Arize_2.jpg","../image/image_09/09_Campagne_Arize_3.jpg","../image/image_09/09_Campagne_Arize_4.jpg"]},"Consult_chateau_formulaireba13":{"id":"Consult_chateau_formulaireba13","dept":"09","canton":"Saint-Lizier","commune":"Betchat","nom":"Castelbon","type":"Château","periode":"XII-XIV","histoire":"CASTELBON, seigneur de Castelbon remontent au XIVe siècle. Roger de Comminges prend le titre de baron de Roquefort en 1394, et devient seigneur de Castelbon. Il a pu recevoir le château en dote ou le faire construire. Pierre Raymond de Comminges, fils aîné de Roger de Comminges, épouse Marguerite de Peyrepertuse en 1421. Ils ont deux enfants, Roger II et Roger III. Ce dernier épouse Alix de Rivière en 1468 et ils eurent trois enfants dont une fille Isabelle de Comminges. Le vicomte de Joyeuse épouse en 1490 Isabelle de Comminges qui apporte en dote la demeure. Vers 1556, le château quitte la famille de Comminges Roquefort et de Joyeuse pour être cédé à Pierre de Bertier qui  est le seigneur de Castelbon au milieu du XVIe siècle. Du XVIIe au XXIe siècle, Castelbon a de nombreux propriétaires : Jean Roger de Martres est seigneur de Castelbon au début du XVIIe siècle, François de  Qué, fils de Géraud, devient seigneur de Montcaup, de Saleich et de Castelbon en 1653. Philippe de Qué, frère de François de Qué, hérite de tous ses biens et devient seigneur de Montcaup, de Saleich de Castelbon et de Francazal. Jean-Jacques de Saint Jean rend hommage pour son château le 2 Juillet 1723. Jean Pierre Charles de Hys s'installe au château de Castelbon en 1824. Luillier en 1902, Gilbert Tocanier en 1953, qui fait de la propriété une ferme modèle et élève de nombreux bâtiments. Le comte de Fumel, le 9 novembre 1959, marié avec Lucienne Fernande Granger. Sanger le 30 Septembre 1993, antiquaire anglais qui utilise le château pour vendre ses objets. Johannes Van Diepen, le 24 Mai 1996, avocat hollandais qui tente de faire un hôtel restaurant dans le château, et enfin Martine et Michel Vrinat le 20 Juillet 2006, propriétaires actuels, habités et utilisés en chambres d'hôtes et salle de réception.","architecture":"Château de Castelbon, sur des bases du XIIe siècle et agrandit aux cours des  siècles. celui dont les défenses étaient édifiés sur un mamelon isolé, Le gros bâtiment qui remonte donc au moins au XIVe siècle. Les deux tours carrées, côté sud, témoignent dune puissance dorigine ; unies par des murs de plusieurs mètres dépaisseur, de part et dautre dune entrée cintrée ou \"courroir\", jadis protégée par barbacane, muraille, avec fosse et pont-levis, menant à la cour intérieure.\r\nDeux ailes, de date postérieure, à lEst et à lOuest agrandirent la forteresse  ; deux tours rondes, qui ont conservés archères et trous de couleuvrine, à chaque extrémité daile. En 1668, noble de Moncaup dénombrait \"château à 4 tours, basse-cour, jardin\", le tout \"prétendu noble\". On peut encore voir la cour et le beau jardin en rotonde, sans trace denceinte, mais avec de forts murs de soutènement. Le quadrilatère du bâtiment, y compris jardins, \r\nCastelbon a perdu toutes ses ouvertures dorigine, ou presque. On en perça du XVIe au XVIIIe siècle. De cette époque, le fronton de façade, le portail dentrée nest plus létroite porte forte du XIVe siècle.","habitants":"Famille de Roger de Comminges \r\n        \"","divers":"Château de Castelbon à Betchat","gps":"","images":["../image/image_09/09_Castelbon_1.jpg","../image/image_09/09_Castelbon_2.jpg","../image/image_09/09_Castelbon_3.jpg","../image/image_09/09_Castelbon_4.jpg"]},"Consult_chateau_formulaireefe0":{"id":"Consult_chateau_formulaireefe0","dept":"09","canton":"Fossat","commune":"Casteras","nom":"Casteras","type":"Vestiges","periode":"XIV","histoire":"CASTERAS, Catherine de Navarre en 1492 donne des terres de la seigneurie de Clermont à Arnaud de Castéras pour  récompenser ses services et sa fidélité : cest lui qui construira le château de Castéras.  Arnaud fit construire le château. Le nom semble venir de la famille de Castéras, originaire dEspagne qui sy établit vers le XIIe siècle. Le château (aujourdhui disparu) du seigneur de Castéras, la paroisse est réunie à celle de Lanoux en 1630.\r\nLe château de Castéras appartient au seigneur Charles-Hercule de Sers qui épousa le 19 octobre 1603 Jeanne La Bornerie, seigneuresse de La Borderie et de la Nogarède, créant ainsi la branche de Sers  de la Nogaréde. Le seigneur de Castéras, Lartigue de Goueytes, assiste, en 1789, à lassemblée de la noblesse tenue à Pamiers. Le 15 octobre 1801 :la commune de Castéras passe du canton du Carla le Peuple (Carla-Bayle) à celui du Fossat.","architecture":"La seigneurie ne sen détacha quen 1491, quand elle fut donnée à Arnaud de Castéras, en récompense de services rendus à la comtesse de Foix, Catherine de Navarre.     Ruines du donjon du château des sires de Castéras  du  XIIe siècle selon certains, du XVIe siècle reste d'une tour.","habitants":"Lartigue de Goueytes\r\n        \"","divers":"Le village de Castéras","gps":"","images":["../image/image_09/09_Casteras_1.jpg","../image/image_09/09_Casteras_2.jpg"]},"Consult_chateau_formulaire8ae2":{"id":"Consult_chateau_formulaire8ae2","dept":"09","canton":"Saint-Lizier","commune":"Caumont","nom":"Caumont","type":"Vestiges","periode":"XII","histoire":"CAUMONT,  à signaler que lhistoire du Languedoc signale « Caumont » pour lannée 1484 : « Dans la lutte de succession entre Jean de Foix, vicomte de Narbonne et Catherine de Foix, le roi, après avoir mis sous sa main les villes et les châteaux de Saverdun, Mazères, Montaut, Son, Montbrun, Caumont et Traquesne, dans le comté de Foix, en confia la garde au vicomte de Narbonne, jusquau jugement définitif de son différend avec la princesse de Viane, quil sétait réservé ». Il semble quil y ait une confusion avec Calmont (proche de Mazères) et qui dépendait du Comté de Foix. Au XIIe siècle, les castellologues supposent qu'un château de repli est aménagé. Au XIIIe siècle, construction probable des barbacanes.  A la fin du XIVe siècle,  le château fut détruit durant la lutte entre les maisons de Foix et dArmagnac. Gaston Fébus a participé à cette bataille.","architecture":"Caumont, appartenant au Comminges, ancien village fortifié autour de son château du XII-XIIIe siècles, fera partie de la châtellenie de Saliès du Salat et relevait du diocèse de Saint Lizier.  La tour ne possède pas de crénelage, ni d'archère, ni de mâchicoulis. mais il est délicat d'en conclure qu'elle était borgne car son arasement est évident. Au lieu dit « Le Plech », se trouvent les ruines dune forteresse originale, à la disposition curieuse fort rare.  Ce fort était composé de 47 salles et dun donjon (dont les murs, à la base, ont 2 mètres dépaisseur) avec une enceinte circulaire et barbacane. Ce château paraît avoir été bâti pour servir de refuge à la population alentour.","habitants":"Seigneurs locaux\r\n        \"","divers":"Vestiges du château de Caumont","gps":"","images":["../image/image_09/09_Caumont_1.jpg","../image/image_09/09_Caumont_2.jpg"]},"Consult_chateau_formulaired450":{"id":"Consult_chateau_formulaired450","dept":"09","canton":"Saint-Girons","commune":"Audressein-Castillon","nom":"Coumes","type":"Château","periode":"XX","histoire":"COUMES : démoli à la fin du XIXe siècle, reconstruit au XXe siècle à lemplacement de lancien château des Solan-Sabouliès par la famille Begouên, célèbre pour ses recherches préhistoriques. Il abritait la collection des objets, meubles et habits de la vallée de Bethmale, récoltés par le comte  qui fut un temps transférée à Augirein, et que lon peut voir maintenant au palais des évêques à St-Lizier. Une autre partie se trouve à Paris, au musée des Arts et Traditions Populaires.","architecture":"En décembre 2015 incendie au château de Coumes parties central du toit  est détruite, remanié, corps de logis  de plan rectangulaire à deux niveaux sur soubassement toit en croupe avec lucarnes pavillon d'entrée sur les deux façade saillant avec fronton triangulaire et balcon au niveau du deuxième sur la façade une tour ronde à trois niveaux toit en poivrières et mâchicoulis sur l'ensemble des toits à l'opposée tour carrée à trois niveaux donjon avec terrasses  sur laquelle se trouve une tour de guet.","habitants":"Famille Begouên\r\n        \"","divers":"Château de Coumes à Andressein-Castillon","gps":"","images":["../image/image_09/09_Coumes_1.jpg","../image/image_09/09_Coumes_2.jpg","../image/image_09/09_Coumes_3.jpg"]},"Consult_chateau_formulairec772":{"id":"Consult_chateau_formulairec772","dept":"09","canton":"Varilhés","commune":"Varilhés","nom":"Crampagna","type":"Forteresse","periode":"XIV-XVI","histoire":"CRAMPAGNA, date des XIVe, XVIIe et XVIIIe siècles.  Au Moyen-Age, un château fut édifié et plusieurs seigneurs s'y succédèrent au cours des siècles. Les soubresauts des guerres de religion s'y firent également sentir.  Crampagna connut d'importants combats durant les guerres de Religion et fut pris en 1586 par le sire d'Anelon, protestant.  L'histoire de ce site a été mouvementée depuis la première construction, une tour d'observation au service des comtes de Foix, jusqu'à la dernière guerre avec l'aide de la Résistance.                                                                                                                   MIQUEL, dit aussi château du Barry ou maison Viguier : Date gravée sur une porte: 1613  partie médiévale avec restes de donjon et partie Renaissance\r\nPossession durant environ 3 siècles de la famille de Pontejac, puis du sculpteur Prokinsky, trois siècles plus tard, en 1712, Catherine de Roquépine fait construire la troisième partie du château ; jusquà la Révolution, la demeure appartient à la famille Gallard De Terraube. Le dernier occupant noble fut Antonin Galard De Terraube qui sexila aux USA et vendit le château à lEtat.  Sur le plan artistique, le château a été habité au XIXe siècle par un sculpteur de renom: Henri Prosinsky; une salle lui est consacrée. il a été vendu en 1996 à de M. et Mme Chanchevrier.","architecture":"Crampagna, sa position stratégique du piton explique son occupation dès l'époque romaine.                                                               MIQUEL  La partie la plus ancienne du château semble remonter au XIIIe siècle : cest la tour-poste (ou tour carrée) construite sur un piton rocheux.  Différentes campagnes de constructions au cours des XIVe, XVIIe et XVIIIe siècles.  L'enceinte n'est plus très visible. La partie du  XIVe siècle comprend une masse rectangulaire ornée d'une fenêtre en plein cintre au sud, et une fenêtre trilobée au nord. Elle contient la chapelle pièce ogivale avec des sculptures à la retombée des nervures et une porte gothique. A l'angle, une tour qui devait être le premier donjon. C'est là que se trouvent l'escalier à vis et le cachot. La construction du XVIe siècle est contiguë à la précédente au nord. Mâchicoulis et de rainures destinées au jeu des madriers. La troisième partie date de 1712, est en gros moellons et montre, au sud, quelques ouvertures Renaissance. Elle renferme de grandes salles aux voûtes cintrées.  Le donjon, en cours de restauration, a gardé son austère architecture médiévale.","habitants":"Famille de Pontejac\r\n        \"","divers":"Château de Crampagna à Varilhés","gps":"","images":["../image/image_09/09_Crampagna_1.jpg","../image/image_09/09_Crampagna_2.jpg","../image/image_09/09_Crampagna_3.jpg"]},"Consult_chateau_formulaire49db":{"id":"Consult_chateau_formulaire49db","dept":"09","canton":"Ste-Croix-Volvestre","commune":"Cérizols","nom":"Cérizols","type":"Château","periode":"XIII","histoire":"CERIZOLS, le comte de Comminges avait des droits assez solides sur Saint-Lizier pour que la cité reste dans leur comté. Il nen alla pas de même des terroirs de Bédeille, Tourtouse, Cérizols et Montardit qui passèrent  dans le comté de Toulouse puis dans le domaine royal languedocien ». Le château appartenant au prélat se trouvera à lintersection des diocèses du Couserans, du Comminges et de Rieux. En 1609, les habitants font une reconnaissance à Arnaud de Bareige, seigneur de Cérizols.  Après la présence de la famille dIcart de Pontaud, la seigneurie passe aux mains de lillustre famille Montaut-Miglos  (du comté de Foix) par le mariage le 28 juillet 1760 de J.L. Icart de Pontaud avec Marie de Montaut-Miglos. Ils vivront dans le château décrit, auparavant, ainsi : « hautes murailles, porte avec herse, haute tour carrée dominant et protégeant le pays ».  Avant la Révolution, Cérizols fait parti de la généralité de Toulouse et appartient au diocèse de Rieux.","architecture":"Ruines du donjon et du château de Cérizols du XIIIe siècle.   Les ruines d'une construction médiévale fortifiée dans le petit village de Cérizols. En empruntant la route principale, s'arrête devant un long mur en pierres sèches.  Ce bâtiment parallélépipédique, comportant des fenêtres dont la création semble récente, possède un contrefort. Ce n'est certes pas une preuve que la construction date du Moyen-Age, mais elle démontre que le bâtiment n'est point nouveau.  Une courtine (certes arasée), Une tour d'angle à droite (celle possédant un contrefort), Une tour plus importante à gauche devant être le donjon du vieux château fort.","habitants":"Famille Montaut-Miglos  \r\n        \r\n        \"","divers":"Vestiges du château de Cérizols","gps":"","images":["../image/image_09/09_Cerizols_1.jpg","../image/image_09/09_Cerizols_2.jpg","../image/image_09/09_Cerizols_3.jpg"]},"Consult_chateau_formulaire487b":{"id":"Consult_chateau_formulaire487b","dept":"09","canton":"Mirepoix","commune":"Dun","nom":"Dun_Rocles","type":"Vestiges","periode":"XII","histoire":"DUN, en 1212, la seigneurie de Mirepoix, dont fait parti Dun, est \"donnée\" à Guy de Lévis, principal lieutenant de Simon de Montfort, En 1229, le traité de Paris ratifie la confiscation des biens des seigneurs de Mirepoix au profit de Guy de Lévis. En 1230, à la mort de Guy, son fils prend la succession de la seigneurie. Cette famille gardera ces domaines durant 500 ans.  En 1299, Guy III de Lévis meurt, sa femme disparaît peu de temps après. Un problème de succession se pose car il y a 12 enfants.  En 1300,  un accord est conclu. Jean de Lévis, l'aîné des 7 garçons, obtient le domaine et le château de Dun. Il en fait sa résidence principale.  En 1319, Jean Ier de Lévis décède. C'est sa femme, Constance de Foix, qui gère les domaines depuis sa résidence de Léran.  En 1332, Constance meurt, c'est l'aîné Jean II qui administre les domaines.  En 1329, partage entre les 2 frères des possessions familiales. Jean II, l'aîné, récupère les 3/4 des terres et châteaux. Gaston, le cadet, reçoit le domaine de Léran et de Dun. Il se nomme maintenant: Levis-Léran.   Vers 1400, la branche des Lévis s'éteint, et ces derniers sont les Lévis-Léran qui administrent tous les domaines. Il semble qu'à cette date, le château de Dun ne soit plus la résidence principale des Levis-Léran. C'est le début de son déclin.  En 1442, Philippe II meurt, Jean IV son frère constate le mauvais état de la seigneurie de Dun. En 1510, le château est qualifié de \"défendable\". Vers 1792, la Révolution Française sonne le glas de ce château qui est pillé et brûlé.                                                                                                                                               ROCLES,   il a appartenu à la famille Montfaucon. Le site change de main à la Révolution (famille Astrée) puis en 1871 (famille Orliac).","architecture":"Dun : le nom de la commune nous vient des Celtes, le toponyme désignait le sommet d'une colline ou d'une montagne. Dès 1040, le village de Dun est cité comme l'une des premières places fortes du comté avec Foix, Varilhes et Castelpendent. Au XIIIe siècle, Dun accueille au pied du château une communauté de \"parfaites\" cathares, créée par Philippa de Foix, épouse du comte Raymond Roger.                                                                                                                                                            Dun  Les ruines du vieux château sont noyées dans une épaisse végétation entourée d'arbres. Pour l'explorer, il faut absolument s'y rendre en hiver. Un premier rempart est visible mais les éboulis de terre et de grands arbres bien ancrés ne permettent pas d'en distinguer les véritables contours, ni de prouver l'existence de tour d'angle.  Les murs des bâtiments sont imposants et hauts.  Il devait y avoir 2 étages. Des archères très rustiques sont percées sur les 4 murs extérieurs. Aucune bouche à feu ou arquebuse est visible. Cela prouve le rôle non guerrier de ce château  au début du XVIe siècle.  Il est vrai qu'il n'était pas frontalier et n'abritait plus un seigneur au XVe siècle    L'architecture est un rectangle très classique.                                                                                                                        Rocles;  site ruiné, est  démoli pour récupérer des pierres pour une construction nouvelle, au domaine de la Barre. Jacques Canal a évoqué le choix d'une architecture très contemporaine (métal laissé apparent) plutôt qu'une reconstruction pastiche pour l'habitation actuelle.","habitants":"Famille de Levis-Léran.\r\n        \"","divers":"Vestiges du château de Dun le domaine de la Barre et les vestiges de Rocles à Dun","gps":"","images":["../image/image_09/09_Dun_1.jpg","../image/image_09/09_Dun_2.jpg","../image/image_09/09_Dun_3.jpg","../image/image_09/09_Dun_4.jpg","../image/image_09/09_Dun_5.jpg","../image/image_09/09_Dun_6.jpg"]},"Consult_chateau_formulaire13ab-2":{"id":"Consult_chateau_formulaire13ab-2","dept":"09","canton":"Fossat","commune":"Durfort","nom":"Durfort_Ariège","type":"Vestiges","periode":"XIII","histoire":"DURFORT,  la famille Durfort ancienne chevalerie, originaire du Quercy, et de Deyne au XIIIe siècle. Les  seigneurs de Verniolle et co-seigneur de Bonnac  et de Deyne passa dans différentes mains.  Au XVIe siècle, les guerres de religion opposent les Français. Le sire d'Andou, habitant à Bélesta et capitaine d'une armée de Huguenots, assiège Saint-Ybars.   En 1748, la Baronnie est achetée par la famille Cazals. Vers 1792, les révolutionnaires s'emparent du château. Pierre Raymond Marie de Cazals quitte définitivement son château à la Révolution. En 1824, L'ancien propriétaire Pierre de Durfort décède à Toulouse, sa fille Zoé possède la métairie, le château n'est pas cité.","architecture":"Durfort  au XVe siècle, le château fut  construit, avec une courtine encadrée par deux imposantes tours rondes. C'est presque l'image caricaturale du château fort, les murailles étaient entourées de fossés, la partie basse, des pierres à bossage,  au centre, des pierres lisses,  au sommet, un mélange de lits de pierre et de brique. En 1587, un inventaire  fait état de 2 pièces d'artillerie, 7 arquebuses, 3 mousquets, 4 arbalètes, 4 hallebardes et un coffre contenant de la poudre et des balles.\r\nEntre les deux tours, la courtine comporte une avancée. Au Nord du château sur la droite de la façade du donjon, la tour ronde ne me donne que peu de détails sur ses attributs défensifs. Étant partiellement arasée, elle n'indique pas si crénelage et mâchicoulis  existaient. Sur le coté proche de la tour , une ouverture obstruée pour consolider la ruine ressemble à une porte. Peut être s'agit il du fantôme de latrines du niveau supérieur.","habitants":"Seigneur de Verniolle\r\n        \"","divers":"Vestiges du château de Durfort","gps":"","images":["../image/image_09/09_Durfort_1.jpg","../image/image_09/09_Durfort_2.jpg","../image/image_09/09_Durfort_3.jpg","../image/image_09/09_Durfort_4.jpg","../image/image_09/09_Durfort_5.jpg"]},"Consult_chateau_formulaire70a8":{"id":"Consult_chateau_formulaire70a8","dept":"09","canton":"La Bastide de Sérou","commune":"Esplas","nom":"Esplas","type":"Vestiges","periode":"XIV","histoire":"ESPLAS, il appartenait en 1640 à la famille de Beillard d'Esplas alliée à la noblesse de Mazères. De Beillard, seigneur d'Esplas, chevalier de Saint-Louis, messire de Lamp, de cavalerie, le 28 janvier 1792. Au cours du XVIIIe siècle cependant, la famille de Beillard transmit ses droits à la famille de Morteaux et d'Escoffres. Au cours du XIXe siècle, le château a appartenu à la famille Passerieux, puis par héritage à la famille Baboulet. Au début du XXe siècle, la famille Baboulet détenait avec le château, onze fermes des environs. L'étendue du foncier était très importante, et l'ensemble constituait l'un des plus grands domaines agricoles du territoire appaméen. Le château était encore habité en 1920 lorsqu'il a été détruit par un incendie.  L'édifice vient d'être acquis par la famille Bordenave qui s'était rendue précédemment propriétaire des dépendances.","architecture":"Le château d'Esplas occupe une surface importante au sommet d'un tertre. Très ruiné, il n'en reste que des pans de murs extérieurs évoquant un ancien quadrilatère à quatre tours d'angle. Les quatre tours carrées débordent en demi-oeuvre. Elles présentent des volumes inégaux, la tour nord ouest étant la plus importante. Le toit s'est effondrée sur l'intérieur, on observe plus depuis celui-ci que les murs percés de fenêtres rectangulaires qui relient les tours d'angle nord-est, et sud-est. Les murailles ouest et nord sont très ruinées.   D'après le témoignage des propriétaires actuels, anciens fermiers, les pièces d'habitation, chambres, salon étaient à l'étage le comble était réservé aux domestiques. Le château est précédé au sud par une esplanade cantonnée à l'est et à l'ouest par deux pavillons en briques conservés. Derrière les écuries à l'est, se trouve une autre dépendance en brique, pierre et pan de bois, appelée \"maison du jardinier\".  Le château a été en grande partie reconstruit au cours du XVIIIe siècle  Il s'agissait à l'origine d'un ancien castrum entouré d'un fossé à sec sans rupture de pente à hauteur de la mare, dont il ne reste rien aujourd'hui à l'exception d'un ancien souterrain. Le château a été rebâti à son emplacement à la période moderne, ainsi que l'indique la typologie des bouches à feu visibles au pied des tours d'angle.","habitants":"Famille de Beillard d'Esplas\r\n        \"","divers":"Vestiges du château d'Esplas","gps":"","images":["../image/image_09/09_Esplas_1.jpg","../image/image_09/09_Esplas_2.jpg","../image/image_09/09_Esplas_3.jpg","../image/image_09/09_Esplas_4.jpg","../image/image_09/09_Esplas_5.jpg","../image/image_09/09_Esplas_6.jpg"]},"Consult_chateau_formulairef68f":{"id":"Consult_chateau_formulairef68f","dept":"09","canton":"Varilhès","commune":"Verniolle-Varilhés","nom":"Fiches","type":"Château","periode":"XV","histoire":"Deux châteaux à Verniolles celui de Fiches et celui de Verniolles.                              FICHES, cité  en 1631  la métairie de Fiches,  propriété de catholique, est prise par les troupes huguenotes du baron de Léran.   Elle hébergeait au XVIIe une famille catholique et qu'elle a fait l'objet d'une prise de guerre par les protestants. Acquis au XVIe siècle par Jean de Roubert, conseiller au parlement de Toulouse, le domaine est racheté au XVIIIe siècle par Joseph Fauré, propriétaire appaméen dont Nicole Ginabat et sa soeur sont aujourd'hui les lointaines descendantes. Honos Domus Mea, \"l'honneur est ma maison\", la devise de Joseph Fauré demeure inscrite à l'entrée du domaine.    Le château est racheté au XVIIIe siècle par une famille de Pamiers, les A. de La Vilotte.                                                                                                                                               VERNIOLLES,  trés ancien et incendié vers 1586 par d'Audou, aujourd'hui  maison de retraite.","architecture":"Fiches la bâtisse, de plan en U rectangulaire avec des retours en équerre sur la façade, le corps de logis principal oblong à trois niveaux  double retour en équerre  sur la façade des bâtiments à deux niveaux toits en tuiles en croupe. La bibliothèque, représentative de l'honnête homme, est en cours d'inventaire. Son plus ancien volume remonte au XVIe siècle. On y trouve un herbier daté de 1801 et en cours d'étude, regroupant plus de 1500 planches de végétaux régionaux. Il est l'uvre d'un élève de Jean-Baptiste de Lamarck, Joseph Adrien Fauré.  Au cur dun domaine de 50 ha de bois et de pâturages, cette grande bâtisse du XVIe siècle, située à 1,5 km de Verniolle en Ariège abrite une merveille. En effet, un magnifique bestiaire daté du XVIe siècle se déroule sur les plafonds peints : lion, éléphant, chameau, singe et même une sirène se succèdent sur les panneaux. la façade et les toitures sont inscrits aux monuments historiques.                                         Verniolles, reconstruction du VIIIe siècle  de  style renaissance à deux niveaux pour le corps de logis principal   prolongé  de chaque côté   de bâtiment en retour d'équerre avec trois niveaux.","habitants":"Famille de  Joseph Fauré\r\n        \"","divers":"à Verniolles le château de Fiches et celui de Verniolles.","gps":"","images":["../image/image_09/09_Fiches_1.jpg","../image/image_09/09_Fiches_2.jpg","../image/image_09/09_Fiches_3.jpg","../image/image_09/09_Fiches_4.jpg","../image/image_09/09_Fiches_5.jpg","../image/image_09/09_Fiches_6.jpg"]},"Consult_chateau_formulairefb77":{"id":"Consult_chateau_formulairefb77","dept":"09","canton":"Lavelanet","commune":"Foix","nom":"Foix_Fébus","type":"Forteresse","periode":"XI","histoire":"A  Foix le château féodal de Foix et  Bénac chambres d'hôtes (voir article).                                                                                             FOIX, le château cité au début du XIe siècle. En 1002, Roger Ier Trencavel, comte de Carcassonne qui lègue la forteresse à son fils cadet Bernard. Le maître du château est Raymond Roger de Foix, grand défenseur des cathares.  Son épouse Philippa compte parmi les premières religieuses cathares, sa sur Esclarmonde a participé au débat qui opposa avant la croisade les « hérétiques » aux légats du Pape:  en 1269, lInquisition fera exhumer et brûler ses restes. En 1370, le plus célèbre des comtes de Foix fut Gaston Fébus cette lignée demeurait au château d'Orthez, défia l'autorité du roi de France en refusant de lui rendre hommage et  ses biens échouront à la famille de Grailly et en 1484 à la maison d'Albret. À partir de 1479, le comte de Foix devient roi de Navarre et le dernier dentre eux, devenu Henri IV, roi de France en 1607, annexe ses terres pyrénéennes à la France. Siège du gouverneur du Pays de Foix depuis le XVe siècle, le château continue à assurer la défense du pays, notamment pendant les guerres de religion. En 1635 commença, dans le cadre de la guerre de trente ans, une guerre contre lEspagne qui aboutit en 1659 au traité des Pyrénées et on retrouva une utilité au château de Foix proche de la frontière tout en oubliant l'ordre de démolition. Louvrage fortifié demeura ainsi une garnison jusquà ce quau milieu du XVIIe siècle on commence à y installer plus ou moins régulièrement des prisonniers. Siège du gouverneur aux XVIIe et XVIIIe siècles,  Depuis 1930, le château de Fébus ou château de Foix abrite les collections du musée départemental de lAriège. Préhistoire, archéologie gallo-romaine et médiévale témoignent de lhistoire de lAriège depuis les temps les plus anciens. Actuellement, le musée de Foix redéploie les collections autour de lhistoire du site du château, sattachant à restituer la vie à Foix au temps des comtes.","architecture":"Le château de Foix de style  médiéval  est un imposant château-fort  fièrement campé sur son rocher, trois tours d'époque différentes, la plus ancienne et plus petite au nord du XIIe siècle à toit en ardoises quatre pans. La tour Sud  cylindrique  la plus élevée et soignée du XVe siècle, éclairés par des fenêtres carrées, les trois tours sont crénelées sur mâchicoulis à consoles  du couronnement et hautes de 25 à 30 m  Il date du XIIe siècle. le corps de logis relie les deux tours carrées. C'était une résidence comtale. Au milieu du XVe siècle, la tour ronde ou une partie de celle-ci servait de dépôt pour les archives comtales. Le château fut très vite transformé en caserne et livré à lui-même, ce qui accéléra sa dégradation.  Le château avait alors piètre allure. Après l'ordre de démolition de Richelieu (1632 - 1638), le château faillit être démoli mais la décision ne fut jamais appliquée.  En réalité, le château avait déjà servi de prison au Moyen-Age car les comtes de Foix étaient justiciers. Mais un espace réduit était à cette époque dévolu à cette fonction. À partir du XVIIIe siècle et surtout au début du XIXe siècle, le château et ses tours furent entièrement transformés en prison  jusquen 1862, des locaux furent aménagé entre les deux tours carrées de 1824 à 1829 et détruit  et restauration en 1887. Fin XIXe siècle, Paul Boeswildwald, gendre de Viollet Le Duc, restaure le château, classé aux M.H. depuis 1840.","habitants":"Raymond Roger de Foix                                                                    Famille d'Albret\r\n        \r\n        \"","divers":"Forteresse de Foix","gps":"","images":["../image/image_09/09_Foix_1.jpg","../image/image_09/09_Foix_2.jpg","../image/image_09/09_Foix_3.jpg","../image/image_09/09_Foix_4.jpg","../image/image_09/09_Foix_5.jpg","../image/image_09/09_Foix_6.jpg","../image/image_09/09_Foix_7.jpg","../image/image_09/09_Foix_8.jpg","../image/image_09/09_Foix_9.jpg"]},"Consult_chateau_formulaire1c62":{"id":"Consult_chateau_formulaire1c62","dept":"09","canton":"Mas d","commune":"Fornex","nom":"Fornex","type":"Château","periode":"XIV-XIX","histoire":"FORNEX,  la seigneurie est attribuée au  début du XIVe siècle au fameux Loup de Foix, fils de Gaston 1er, en même temps que celle de Rabat. Ses descendants la conservent jusquà la mort, sans enfants, de Roger Gaston de Rabat en 1699 pour passer dans la famille de Sabran par le mariage, le 15 juillet 1714, de Marie Louise Charlotte de Foix-Rabat avec Jean-Honoré de Sabran, avec tous les privilèges et dignités attachés à cette maison.  A la veille de la Révolution,  le juge de Fornex est juge de Loubaut et Thouars dépendant de Fornex et les consuls ont le privilège dassister aux États de la province de Foix. Le marquis Louis-Auguste , comte de Sabran, seigneur de Fornex, comte de Rabat, assista à lassemblée de la noblesse tenue à Pamiers en 1789 et fut convoqué à celle de Muret. Le 20 juin 1796, le château et les terres sont vendus, puis rendus, en 1804, au comte de Sabran, rentré dexil qui le démolit, le 15 octobre 1801 : Fornex passe du canton de Daumazan à celui du Mas dAzil.","architecture":"Château : était le plus important de ceux que les barons de Foix-Rabat possédaient. De lédifice primitif, il ne reste pas de vestiges. La construction actuelle date du milieu du XVe siècle : Il est détruit en 1804 par son propriétaire, de Sabran, puis restauré au XIXe siècle.                                                                                                      Principale demeure des Foix-Rabat, le château s'inscrit dans un quadrilatère cantonné de quatre tours rondes, dont deux ruinées, et entouré d'un fossé. Remontant pour l'essentiel au XVe siècle, il présente des traces de remaniements des deux siècles suivants, dont un décor sculpté gothique tardif et Renaissance. Les ailes nord et ouest ont été détruites et remaniées entre la Révolution et le XIXe siècle. Cet édifice est un exemple intéressant de château résidentiel des XVe et XVIIe siècles, ayant succédé à la fortification mentionnée en 1263, dont il peut rester quelques vestiges en sous-sol. Le caractère défensif a été maintenu lors des modifications, avec la construction de tours d'angle massives et le percement de bouches à feu à une époque tardive.","habitants":"Famille de Sabran\r\n        \"","divers":"Château de Fornex","gps":"","images":["../image/image_09/09_Fornex_1.jpg","../image/image_09/09_Fornex_2.jpg","../image/image_09/09_Fornex_3.jpg"]},"Consult_chateau_formulaire4c3d":{"id":"Consult_chateau_formulaire4c3d","dept":"09","canton":"Saverdun","commune":"Gaudiès","nom":"Gargas_Gaudiès","type":"Château","periode":"XV","histoire":"Deux châteaux à Gargas celui de Gargas et de Malportel  (voir article)                                                                                                                               GARGAS,   Jean de Roquefort fut anobli par lettres patentes de Charles VII en décembres 1458. A sa mort, par testament du 25 mars 1473 il léguait à son fils aîné Jean (1457- ) la maison et tour de Viviés. Jean II de Roquefort, seigneur de Viviés, juge mage du comté de Foix épousa Anne de Durfort-Deyme. En 1588 lors des guerres de la ligue, leur petit-fils, François-Etienne,  est nommé « commandant généralement en la comté de Foix et ses villes des environs en labsence de monseigneur le maréchal de Joyeuse. En 1591, comme royaliste, celui-ci commit à la tête dune bande armée, des dégâts, autour de son château de Viviés. Le 29 février 1592 le seigneur de Viviés est obligé de se soumettre au Duc de Joyeuse. François-Etienne et sa femme Marguerite neurent pas denfant.  Un procès séleva au sujet de sa succession. Par accord du 2 février 1599 le château fut attribué à Jean Mathieu de Rochefort. Les biens des Rochefort passeront ensuite  à Pierre Durtaud qui était un membre influent de la noblesse de robe toulousaine. Il sera plusieurs fois capitouls et même chef en 1644.  Le dernier Rochefort, François de Rochefort, seigneur de Daumazan, de Viviés, de Queribus et dUsson disparaît en 1710. En 1710 une famille Salva en devient propriétaire. Elle le gardera jusquen 1760 année ou François Joseph de Johannis de Gargas de Morand lachète ou en hérite. De son mariage avec Paule de Nogues fille de noble Bernard de Nogues, baron de This il aura un garçon Jean Baptiste de Johannis de Gargas et quatre filles. Jean Baptiste de Johannis de Gargas mourut en 1854 sans postérité et ruiné.","architecture":"Gargas, lédifice sorganise en U autour dune cour, le corps central du bâtiment présente des caractéristiques de larchitecture de la Renaissance : galerie darcades  au    rez-de-chaussée, organisation en travées régulières, fenêtres à meneaux. Il est flanqué sur le côté nord dune tour ronde abritant un escalier à vis (conçu en spirale, tournant autour d'un point pivot central). Sur le côté sud, un bâtiment surélevé abrite un escalier rampe sur rampe (droit avec retours et paliers intermédiaires à chaque étage) desservant trois niveaux. Laccès à ce dernier se fait par une porte en anse de panier portant la date de 1632. \r\nClassé au titre des monuments historiques en 1998, le décor intérieur du premier étage, notamment trois cheminées et quelques encadrements, est fait de stuc. Ce mélange de chaux éteinte et de sable ou de poudre de marbre, plus léger que la pierre, sert depuis lantiquité à revêti plafonds et murs. Lornementation évoque largement la période antique : anges, profils, personnages faisant des libations devant un autel, corbeilles de fruits Il existe des motifs très semblables dans un recueil de gravures de Jean Lepautre qui circulait parmi les artistes au XVIIe siècle.","habitants":"Jean Baptiste de Johannis de Gargas\r\n        \r\n        \"","divers":"Château de Gargas à Gaudiès","gps":"","images":["../image/image_09/09_Gargas_Gaudies_1.jpg","../image/image_09/09_Gargas_Gaudies_2.jpg","../image/image_09/09_Gargas_Gaudies_3.jpg","../image/image_09/09_Gargas_Gaudies_4.jpg"]},"Consult_chateau_formulairecdd3":{"id":"Consult_chateau_formulairecdd3","dept":"09","canton":"Saverdun","commune":"Gaudiès","nom":"Gaudiès","type":"Château","periode":"XIII-XVIII","histoire":"Trois châteaux à Gaudiès celui de Gaudiès du XIII-XVIIIe siècle de Malportel du XVIe siècle ( voir article) et de Gargas hôtel restaurant ( voir article).                                                         GAUDIES,  construit vers 1280 par lévêque de Toulouse, Bertrand de LIsle Jourdain. Un des faits marquant de Gaudiès est la visite que fit le pape Clément V, en 1309, à son neveu, lévêque de Toulouse, Gailhard de Preyssac. Depuis Gaudiès, le pape écrit une lettre au roi de France, Philippe le Bel, pour défendre les Templiers qui se voyaient, à cette époque, dépossédé de leurs biens.\r\nCe même évêque octroie une charte de coutumes aux habitants vers 1350.  La seigneurie de Gaudiès restera dans les mains de lévêché de Toulouse jusquà sa vente en 1569 pour payer la taxe érigée par le roi en vue de subvenir à la défense de léglise. Le célèbre chef des protestants durant les guerres de religion, J.Claude de Lévis dAudou dit le Sire dAudou, de Bélesta,  acquit cette baronnie. Sa fille la revendit, en 1620, à Henri de Lévis : cest ainsi que se  format  la branche des Lévis-Gaudiès qui gardera c
