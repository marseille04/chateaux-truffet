mmune":"Villelaure","type":"Vestiges","img":"../image/image_84/84_Villelaure_1.jpg"},{"id":"Consult_chateau_formulairefff0","nom":"Visan","commune":"Visan","type":"Vestiges","img":"../image/image_84/84_Visan_1.jpg"},{"id":"Consult_chateau_formulairefd80-2","nom":"Vitrolles_en_ Luberon","commune":"Vitrolles-les-Luberon","type":"Château","img":"../image/image_84/84_Vitrolles_en_Luberon_1.jpg"}];const FULL={"Consult_chateau_formulaireb09f":{"id":"Consult_chateau_formulaireb09f","dept":"84","canton":"Pertuis","commune":"Ansouis","nom":"Ansouis","type":"Château","periode":"XIII  XVII","histoire":"Ansouis: Vers 961 première mention du château des comtes de Forcalquier. \r\nC'est en 1178 que Garsende de Forcalquier épousa Raimond 1er de Sabran qui reçurent en hommage le lieu; De cette union naîtra une fille Garsende surnommé \" la grand-mère de l'Europe\" quatre de ses petites-filles monteront sur un trône; Marguerite épouse Saint-Louis, Eléonore Henri III de Platagenêt, Sancie à Richard de Cornouailles et Béatrix reine de Sicile, par  Charles d'Anjou.  \r\nElzéar: était le fils d'Armangaud de Sabran, grand justicier du royaume de Naples, né en 1285, il fut élevé à Ansouis et fit ses éudes à Marseille chez son oncle Guillaume, abbé;  A 14 ans sur ordre du roi il épouse la descendance du vicomte de Marseille: Dauphine du Puy Michel; ils vouèrent leur vie à dieu, vivèrent une trentaine d'années à Ansouis, suite à un miracle  chaque année se tient la tradition d'une fête annuelle.  Par alliance la famille d'Escalis, président au parlement d'Aix et en 1698 Henri d'Escalis de Sabran vend le château à Jean-Baptiste de Villeneuve.               \r\nA la Révolution cette famille émmigre, vendu comme bien national, il passe par divers propriètaires et par alliance aux de Villeneuve  avant d'être racheté en 1836 par Elzéar-Louis Zozime de Sabran, deviendra par hérédité premier  duc de Sabran et en adoptant un neveu Marc-Edouard de Pontevès Bargème formeront la branche des Sabran-Pontevès. Et en 1936 Ansouis revient en héritage à la branche cadette de cette famille, Foulques septième duc de Sabran-Pontevès qui avait épousé Roselyne de Villambrosa se sont leurs enfants qui héritent du château dont une fille Gersende épousa Jacques duc d'Orléans troisième fils du comte de Paris. Racheté en 2010 par  Frédérique et Gérard Rousset-Rivière.","architecture":"Ce château qui existait déjà en 960. Le château fort édifié autour d'un donjon central carré flanqué de quatre tours au Xe et au XIII-XIVe siècle subit que peu de modifications . Le bâtiment sud partiellement remanié a la fin du XVIe siècle, aujourd'hui subsiste encore le donjon  et les soubassements de deux tours de flanquements;  Au XVIIe siècle remanié suite aux dommages subit au XVIe siècle par des  ajouts, d'une petite maison de l'Hermitage à  trois étages la façade chef-d'oeuvre  où les volutes des fenêtres renforcent l'aspect italianisant de la porte plein cintre avec jardin suspendu","habitants":"Famille des ducs de Sabran Pontevès\"","divers":"","gps":"","images":["../image/image_84/84_Ansouis_1.jpg","../image/image_84/84_Ansouis_2.jpg","../image/image_84/84_Ansouis_3.jpg","../image/image_84/84_Ansouis_4.jpg","../image/image_84/84_Ansouis_5.jpg"]},"Consult_chateau_formulaire3f6f":{"id":"Consult_chateau_formulaire3f6f","dept":"84","canton":"Apt","commune":"Apt","nom":"Apt","type":"Vestiges","periode":"XI","histoire":"Apt: au Xe siècle s'organise en comté sous la suzeraineté des empereurs germaniques administrée conjointement par le comte, l'évêque, les Agoult et les Simianes. \r\n Au XIe siècle renouveau qui se traduit pour la reconstruction des églises ( dont la cathédrale d'Apt , des villages et châteaux environnant ), de la discorde qui se terminera en faveur des comtes de Provence. \r\nAu XIVe siècle renaissance intellectuelle due à la cour papale d'Avignon et diminution de la population due à la peste et à la tuerie des bandes armées . \r\nAu XVIe siècle la ville sera assiégé trois fois ( 1560-1562-1586 ) Huguenots et Catholiques. \r\n Au XVIII (1720)les remparts sont démolis. Dans la commune Château des MILLES:  mentionné dès 1238, ce château était la résidence estivale  du pape  Clément V. Passa  a Bertrand Bot en 1322;  Elie de Laudun  abbesse de Sainte Croix.\r\nEn 1420 Les seigneurs d'Oraison ,vicomte de Cadenet,  les évêques d'Apt en furent les propriétaires et en 1765 Rigollet de Saint-Pons achète Mille , il avait épousé en 1764 Marie Bardier de Roquefure, puis passa aux Raybaud vieille famille de faïencier aptésien, Jules Raybaud maire d'Apt en 1802 restaura le petit pont pour l'accès direct au château, André Pinatel  épouse Blanche Reybaud son mari racheta le domaine planta des vignes en 1880. Conrad Pinatel reprit le domaine à la mort de son père, possède le nom d'un cru réputé Château du  PUY: ancien fief de la famille Laurens passa en 1580 à la maison de Laugier qui le posséda jusqu'à la fin du XVIIIe siècle. \r\nPropriété aujourd'hui à la famille de M.Guy Van Den Broeck d'Obrenan","architecture":"Au XVIII (1720) démolition des remparts et construction des hôtels particuliers. MILLES;  ce château qui fut construit au XIIIe siècle, agrandi et restauré aux XVI et XVIIe siècle, a conservé son systéme défensif de mâchicoulis et porche d'entré.            \r\nPUY; l'extèrieur du château du XVIe siècle fut remanié à la fin du XVIIIe siècle","habitants":"Apt:Saint Siège:\r\nPeyrolles: famille Tom Van Herwarden.\r\nMilles: Famille Reybaud.    \r\nPuy:Famille Laurens\"","divers":"","gps":"","images":["../image/image_84/84_Apt_1.jpg","../image/image_84/84_Apt_2.jpg","../image/image_84/84_Apt_3.jpg","../image/image_84/84_Apt_4.jpg","../image/image_84/84_Apt_5.jpg"]},"Consult_chateau_formulaire0f18":{"id":"Consult_chateau_formulaire0f18","dept":"84","canton":"Carpentras","commune":"Aubignan","nom":"Aubignan","type":"Château","periode":"XII","histoire":"Aubignan: Possession des comtes de Toulouse au XIIe siècle, puis attribué au Saint-Siège en 1229 et ensuite partagé par plusieurs coseigneurs. Durant les guerres de religion, en 1588, ce village faillit être détruit après avoir été attaqué et rançonné par Lesdiguières, chef des Huguenots en Dauphiné.","architecture":"Remparts édifiés au XIVe siècle dont-il reste deux portes à arcades dont la porte de France et une surmontée de la tour de l'horloge. A l'ouest du portail neuf se dresse une tour de défense avec créneaux et meurtrières.","habitants":"Comtes de Toulouse\"","divers":"","gps":"","images":["../image/image_84/84_Aubignan_1.jpg","../image/image_84/84_Aubignan_2.jpg","../image/image_84/84_Aubignan_3.jpg","../image/image_84/84_Aubignan_4.jpg"]},"Consult_chateau_formulaire4ad3":{"id":"Consult_chateau_formulaire4ad3","dept":"84","canton":"Sault","commune":"Aurel","nom":"Aurel","type":"Château","periode":"XII","histoire":"Aurel: Village fondé par les hospitaliers de Saint-Jean de Jérusalem qui y établirent un hospice au XIIe siècle et un château au XIIIe siècle par le seigneur d'Aurel également des remparts, sur la commune dans le défilé dit le\" Gour des Oules\" une tour du XIIe siècle, est le seul vestige du château Raybaud qui surveillait le passage du Val de Goult et le Dauphiné.","architecture":"Site classé apprécié des peintres, du château seul subsiste une tour carré avec ses murailles percées de meurtrières.","habitants":"Seigneurs d'Aurel\"","divers":"","gps":"","images":["../image/image_84/84_Aurel_1.jpg","../image/image_84/84_Aurel_2.jpg"]},"Consult_chateau_formulairefd14":{"id":"Consult_chateau_formulairefd14","dept":"84","canton":"Avignon","commune":"Avignon","nom":"Avignon","type":"Palais","periode":"XIV","histoire":"Avignon: L'insécurité régnant à Rome au XIVe siècle poussa le pape Clément V (Bertrand de Cot) d'origine française, à chercher refuge sur les terres du comté de Provence, et s'installa à Avignon en 1309, en 1316, Jacques Duèse (Jean XXII), ancien évêque , prend pour résidence son ancien palais épiscopal qu'il fait embellir et agrandir de 1335 à 1342,  Benoit XII est le constructeur du vieux palais, les papes sont installés en titre de seigneurs de la cité d'Avignon,  le séjour papal durera plus de cent ans, neuf papes se succédèrent, construisant et fortifiant la cité  de remparts entre 1359 et 1371. Clément VI fait construire le \"Palais neuf\" en 1342.  Ces  réalisations prirent fin aprés que Grégoire XI rétablisse en 1376 la papauté à Rome. \r\nA la fin du grand schisme en 1418 et jusqu'à la révolution le palais reste la propriété  du Saint-Siège. \r\nPillé à la Révolution, Avignon et le Comtat Venaissin sont rattachés au territoire français,  le palais fut ensuite utilisé comme caserne et prison jusqu'en 1810 puis passa en 1910  propriété de la ville et acceuille chaque année un festival.   \r\nAu XIVe siècle des châteaux furent construit par les cardinaux d'Avignon \"petit palais\" livré à Annibal Ceccano.","architecture":"Avignon possédait des remparts construit en 1355 d'architecture militaire avec chemin de ronde qui aujourd'hui font 4,3 km et de douze portes, dix grosses tours carrées, hautes de plus de cinquante mètres et ses courtines où d'immenses arcs en tiers-point servent à supporter les mâchicoulis, deux tourelles en flèche qui surmontent la porte des champeaux.                             Le  palais, immense forteresse de quinze milles mètres carrés haut lieu historique, classé patrimoine mondial par l'Unesco. C'est l'architecte Jean de Louvres qui va construire le\" palais vieux\" en style moderne et le\" petit palais\" (palais neuf  avec créneaux et échauguettes) mais cela ne lui donne pas une allure de forteresse, de style renaissance, résidence des évêques  et archevêques durant l'exil de la papauté en Avignon, ce bâtiment fut remanié au XVe siècle, abrite aujourd'hui un musée.   \r\nPont Saint-Bénézet, construit au XIIe siècle sur l'initiative de Jean Bénézet et de ses frères il fut achevé en 1185,  rebâti au XIIIe siècle et abandonné au XVIIe siècle il ne reste que quatre arches sur vingt-deux.","habitants":"Benoit XII \r\nClément V\"","divers":"","gps":"","images":["../image/image_84/84_Avignon_1.jpg","../image/image_84/84_Avignon_2.jpg","../image/image_84/84_Avignon_3.jpg","../image/image_84/84_Avignon_4.jpg","../image/image_84/84_Avignon_5.jpg","../image/image_84/84_Avignon_6.jpg","../image/image_84/84_Avignon_7.jpg","../image/image_84/84_Avignon_8.jpg","../image/image_84/84_Avignon_9.jpg"]},"Consult_chateau_formulaire1411":{"id":"Consult_chateau_formulaire1411","dept":"84","canton":"Malaucène","commune":"Barroux","nom":"Barroux","type":"Château","periode":"XVI","histoire":"Barroux: Au XIIe siècle  fief  des comtes de Toulouse, puis passa à la famille des Baux, de Budos et de Ricavi qui fit construire le premier château puis passe  de Peyre, aux de Cardaillac et en 1520 Henri de Roviglasc, origine du Piemont dans la mouvance de la papauté et établit à Avignon au XIVe siècle, seigneur du Barroux qui reconstruisit le château en 1534, Pierre et Henri furent premier consuls en 1603 et 1633,  Jean Pierre de Roviglasc seigneur du Barroux et comte de la Celles fut un homme de lettres distingué (1650), ces derniers conservèrent le fief jusqu'en 1659, passa aux de Pelletier de Gigondas, aprés de multiples procès pour un litige en héritage, passa a  Antoine  Joannis\" taffetassier\" lyonnais puis en 1732  à son petit neveu Claude de  Moret, le château fut pillé à la Révolution puis abandonné pendant un siècle, les descendants des Moret le vendirent en 1929 à monsieur Vayson de Pradennes qui le restaure, réquisitionné par les allemands, endommagé à nouveau pendant la seconde guerre mondiale,  il est reprit depuis 1959 par le docteur Moulièrac-Lamoureux qui va commencer à le renover poursuivi par l'association des\" amis du château du Barroux\" et loué à un centre d'études et de recherches sur l'histoire et l'archéologies.","architecture":"Ce château  de plan carré dont le premier bâtiment ( donjon) remonte au XIIe siècle, fut reconstruit de 1534 à 1550, flanqué en angles de tours crénelées et entouré de remparts avec chemin de ronde ruiné à la Révolution,  réabilité en 1929, puis incendié en 1944 et restauré en 1960 par l'association  \"des amis du château du Barroux\" à finalement retrouvé son allure mi-féodale et défensive mi-renaissance par son architecture gracieuse, il a conservé ses tours d'angles  et ses bouches à feu lui donnant allure de forteresse","habitants":"Famille Roviglasc\"","divers":"","gps":"","images":["../image/image_84/84_Barroux_1.jpg","../image/image_84/84_Barroux_2.jpg","../image/image_84/84_Barroux_3.jpg","../image/image_84/84_Barroux_4.jpg","../image/image_84/84_Barroux_5.jpg","../image/image_84/84_Barroux_6.jpg","../image/image_84/84_Barroux_7.jpg","../image/image_84/84_Barroux_8.jpg","../image/image_84/84_Barroux_9.jpg"]},"Consult_chateau_formulaire585e":{"id":"Consult_chateau_formulaire585e","dept":"84","canton":"Pertuis","commune":"La Bastide-des-Jourdans","nom":"Bastide_des_Jourdans","type":"Vestiges","periode":"XIII","histoire":"la Bastide des Jourdans: Au Moyen-Age fief des comtes de Forcalquier puis devient une possession templière  (commanderie Notre-Dame de la Cavalerie), leur bien tomba dans le domaine des Hospitaliers  de Saint-Jean de Jérusalem. \r\nAu XIVe siècle le territoire tombe dans le domaine royal il est donné à l'écuyer Bertrand Alphant. \r\n Au XVe siècle la Bastide devient propriété de la famille de Riez Castellane, puis acheté en 1412 par les Riquetti, puis les Astouaud posséde le fief avec Blanche de Castellane de 1424 à 1536; puis a  Claude  de Coriolis seigneur de la Bastide des Jourdans et Jean Louis de Coriolis de Limaye, premier consul d'Aix en 1626 et cette famille possédère le fief jusqu'à la Révolution.","architecture":"Village fortifié posséde de sa seconde enceinte que quelques pans de murs de courtines et deux portes d'entrée du XIV et XVe siècle, une tour de l'horloge XVIIe siècle dominé par un campanile.\r\n Le village est  dominé par le château médièval remanié au XVIe siècle, ensemble de tours où s'est inséré entre elles des constructions au XIXe siècle et un simple corps de logis.","habitants":"Famille de Coriolis\"","divers":"","gps":"","images":["../image/image_84/84_Bastide_des_Jourdans_1.jpg","../image/image_84/84_Bastide_des_Jourdans_2.jpg","../image/image_84/84_Bastide_des_Jourdans_3.jpg","../image/image_84/84_Bastide_des_Jourdans_4.jpg"]},"Consult_chateau_formulaire07e1":{"id":"Consult_chateau_formulaire07e1","dept":"84","canton":"Vaison-la-Romaine","commune":"Villedieu","nom":"Baude","type":"Château","periode":"XIV","histoire":"Baude: A la dissolution de l'ordre de 1312, les biens furent confisqués et cédés aux hospitaliers de Saint-Jean-de-Jérusalem et passe ensuite en 1317 sous le contrôle du Saint-Siège; Ce domaine portait le nom  de château d'Entrevon fut édifier en marquisat et prit le nom de la Baude en 1782, il eu comme reconversion dans les vignobles d'hôtel restaurait par la famille Monin.","architecture":"Ensemble de bâtiment construit au XVIe siècle formant une cour fermée, flanqués de quatre tours rondes.","habitants":"Famille d'Entrevon\"","divers":"","gps":"","images":["../image/image_84/84_Baude_1.jpg","../image/image_84/84_Baude_2.jpg"]},"Consult_chateau_formulairef5c5":{"id":"Consult_chateau_formulairef5c5","dept":"84","canton":"Pernes-les-Fontaine","commune":"Le Beaucet","nom":"Beaucet","type":"Vestiges","periode":"XII","histoire":"Beaucet: Château construit par les évêques de Carpentras dans le courant du XI et XIIe siècle, il fut touché par la foudre en 1783,  incendié et presque complétement détruit.","architecture":"De l'enceinte seule deux portes et deux tours fortifiées subsistent du castrum du Bauceto au XIIIe siècle et les ruines du château dominant sur la falaise, il comprenait autrefois quatre tours.","habitants":"Evêques de Carpentras\"","divers":"","gps":"","images":["../image/image_84/84_Beaucet_1.jpg","../image/image_84/84_Beaucet_2.jpg","../image/image_84/84_Beaucet_3.jpg","../image/image_84/84_Beaucet_4.jpg"]},"Consult_chateau_formulairefb8d":{"id":"Consult_chateau_formulairefb8d","dept":"84","canton":"Orange","commune":"Piolenc","nom":"Beauchene","type":"Château","periode":"","histoire":"Beauchêne cité depuis le XVIIe siècle,  passa en ferme en 1789, puis fut acheté pour exploitation vinicole par la famille Michel Bernard.","architecture":"Bâtisse quadrangulaire, deux étages avec fronton.","habitants":"Famille Bernard\"","divers":"","gps":"","images":["../image/image_84/84_Beauchene_1.jpg"]},"Consult_chateau_formulaire29a2":{"id":"Consult_chateau_formulaire29a2","dept":"84","canton":"Orange","commune":"Jonquières","nom":"Beauregard_Jonquieres","type":"Château","periode":"XVII","histoire":"Beauregard-Jonquières: était déjà  au XVe siècle un relais, son propriétaire reçu de la part  du prince d'Orange le droit exclusif  d'avoir un bac sur l'Ouvèze. Le château   fut construit en 1630 par Sébastien de Laurens,  receveur principal de la principauté d'Orange, il fut acquit en 1763 par le marquis Joachim de Billiotti, qui le restaura  et sa descendance lui donna  l'aspect actuel. François Billioti suivit l'empereur Napoléon Ier jusqu'à Moscou et a son retour au château fit la plantation des arbres qui fait la beauté du parc. \r\nII appartient aujourd'hui à monsieur A. du Puy-Montbrun.","architecture":"Construit en 1630 et remanié au XVIIIe siècle, constitué d'un bâtiment central, précédé de deux bâtiments formant avant-corps, orné aux angles d'une tour  ronde au toit en poivrière.","habitants":"Famille du marquis de Billiotti\"","divers":"","gps":"","images":["../image/image_84/84_Beauregard_1.jpg","../image/image_84/84_Beauregard_2.jpg","../image/image_84/84_Beauregard_3.jpg","../image/image_84/84_Beauregard_4.jpg"]},"Consult_chateau_formulaireb418":{"id":"Consult_chateau_formulaireb418","dept":"84","canton":"Bolléne","commune":"Bolléne","nom":"Bollene","type":"Château","periode":"XII","histoire":"BOLLENE, dont les remparts furent construit par la communauté de l'Abbaye de\" L'Ile Barbe\", a acceuilli dans ses murs un savant célébre, Louis Pasteur. Une statue le représentant a été érigée. Au sud de la ville, l'ancienne chapelle des Trois-Croix a été transformée en musée renfermant notamment une riche collection de pièces de monnaie trouvée sur le site du château de BARRY, pris pendant les guerres contre les Albigeaois, lieu de la pré-histoire au celto-ligure, de l'oppidum  Gallo-Romain au village médièval  troglodytique au flan de la falaise  encore habité au début de ce siècle . \r\nA l'est du plateau les vestiges du château  de CHABRIERES qui servit à la défense et la surveillance de la vallée,  au XIIe siècle propriété d'une famille qui en porté le nom.  \r\nEn 1376, propriété de Raymond IV Seigneur de Suze et de Châbrières. \r\nEn contre bas dans le hameau de Saint-Férréol le château de la CROIX CHABRIERE vinicole largement remanié construit en 1850 style Napoléon III a remporté de nombreuses récompenses des vins d'appelation côtes du Rhône et côteaux du Tricxastin. \r\n Maison CARDINALE bâti au XIe siècle et remanié sous la renaissance, et à partir du XIVe siècle elle abrita un cardinal, représentant le Saint-Siège, c'est aujourd'hui la propriété de monsieur Trouillet.  \r\nChâteau de ROCHER   Construit par le comte Rocher en  1826 par des architectes florentins.  \r\nChâteau de BARENQUES et château de GOURDON.","architecture":"BOLLENE: dans la ville sur une hauteur dominante au sud, deux tours seigneuriales romanes, l'une dite maison du cardinale, du XIe siècle, remanié sous la renaissance construction à deux étages, présentant les caractères typiques de l'architectures domestique du Moyen-Age    \r\nBARRY: vestiges, pans de mur. CHABRIERES  vestiges d'un donjon, la destruction à eté ordonné par le lieutenant général d'Avignon pendant les guerres de religion.","habitants":"Les seigneurs de Châbrière\"","divers":"","gps":"","images":["../image/image_84/84_Bollene_1.jpg","../image/image_84/84_Bollene_2.jpg","../image/image_84/84_Bollene_3.jpg","../image/image_84/84_Bollene_4.jpg","../image/image_84/84_Bollene_5.jpg","../image/image_84/84_Bollene_6.jpg","../image/image_84/84_Bollene_7.jpg","../image/image_84/84_Bollene_8.jpg","../image/image_84/84_Bollene_9.jpg"]},"Consult_chateau_formulaire8d66":{"id":"Consult_chateau_formulaire8d66","dept":"84","canton":"Bonnieux","commune":"Bonnieux","nom":"Bonnieux","type":"Vestiges","periode":"XIII","histoire":"Bonnieux fût un oppidum ou village fortifié habité dès l'époque  néolithique  et à l'âge du bronze . \r\nA l'époque Gallo-Romaine, le village était situé au pied de son emplacement actuel, et les riches domaines étaient nombreux.\r\n Aux XIIe siècle les sires d'Agoult firent construire le château dit \"Castelles\", et  les \"Templiers \" édifièrent la chapelle Saint-Sauveur, qui forme la partie romane de l'église haute. \r\nAu XII et XIVe siècle, devant le danger des bandes armées qui viennent de la plaine, les habitants se réfugient à l'abri du château et de l'église. Jusqu'en 1312,  vers cette date, la commune devient terre pontificale et demeura église jusqu'en 1791; Cette appartenance au domaine pontifical  en fait une enclave dans les terres du comte de Provence, et lui donne de ce fait une place à part dans l'histoire de la région.\r\n Bonnieux devint Français par l'annexion du Comtat Venaissin par la Convention en 1793.\r\n La Tour du pendu dit aussi la tour Philippe nom de la personne qui la construite en 1888.                   Dans la commune le château de Canorgues, au dessus du Calavon, ancienne villa romaine érigée par le pape Benoit XIV, dans la même famille depuis cinq générations, aujourd'hui exploitation viticole par la famille Margan.","architecture":"En 972, Bonnieux avait déjà une forteresse. Au XIII siècle le bourg est entouré de remparts comprenant quatre portes et des tours, dont il reste d'importants vestiges. \r\nLa tour Philippe, du nom ou du prénom de celui qui la construisit vers 1888, in original dit-on misogyne, qui vécut là derrière meurtrières et volets de fer, appelé aussi la \"tour du pendu\". Le château de Canorgues villa romaine.","habitants":"Famille d'Agoult\"","divers":"Patrimoine dans Bonnieux, la tour des pendus et le château de Canorgues.","gps":"","images":["../image/image_84/84_Bonnieux_1.jpg","../image/image_84/84_Bonnieux_2.jpg","../image/image_84/84_Bonnieux_3.jpg","../image/image_84/84_Bonnieux_4.jpg","../image/image_84/84_Bonnieux_5.jpg","../image/image_84/84_Bonnieux_6.jpg","../image/image_84/84_Bonnieux_7.jpg","../image/image_84/84_Bonnieux_8.jpg"]},"Consult_chateau_formulaire03e4":{"id":"Consult_chateau_formulaire03e4","dept":"84","canton":"Cavaillon","commune":"Caumont-sur-Durance","nom":"Bonpas","type":"Chartreuse","periode":"XIV","histoire":"Bonpas: En 805 Charlemagne ordonne l'édification d'une chapelle pour honorer la mémoires des victimes contre les Sarrazins en 751, un lieu qui est défini comme un bon pas  sur le passage de la Durance,  puis les Hospitaliers de Saint-Jean vinrent s'installer,  pendant cinq siècles se succédèrent plusieurs maisons religieuses. \r\n En 1320 date à laquelle le pape Jean XXII  offrit le monastére aux Chartreux qui en firent une enclave fortifiée.  \r\nA l'issue des guerres de religion au XVIIe siècle la chartreuse s'agrandit de nouvelles cellules, pendant des siècles dépendaient de la largesses financières des bienfaiteurs, la Révolution sonna le glas de cette période de prospérité, pillé et démolie, le centre de la chartreuse vendue comme bien national, et  en 1830 l'ensemble est détruit,  exception de la chapelle des bâtiments du XVIIe siècle ( hôtellerie) et du logement du prieur reconnaissable par sa tour à mâchicoulis. \r\nLe comte de Montillet-Grenaud sauva l'ensemble et en 1940 Pierre Olphe-Galliard nouveau propriétaire l'embellie et que ses héritiers continuent de le  faire; Dans cette châtreuse furent inhumés des cardinaux Philippe de Cabassole, Simon de Langhan et aussi d'autres.","architecture":"Ce lieu qui fut important enceinte crénelée  XIVe siècle avec porte fortifiée domine la tourelle à mâchicoulis avec de nombreux bâtiments fut détruit au XVIIe siècle et à la Révolution il reste aujourd'hui la chapelle romane seul bâtiment sacré     (classé) et un bâtiment d'habitation du XIVe siècle de l'ancienne chartreuse  qui fut remis en état au XIXe siècle avec jardins à la française et deux terasses.","habitants":"Famille Olphe  Galliard\"","divers":"","gps":"","images":["../image/image_84/84_Bonpas_1.jpg","../image/image_84/84_Bonpas_2.jpg","../image/image_84/84_Bonpas_3.jpg","../image/image_84/84_Bonpas_4.jpg","../image/image_84/84_Bonpas_5.jpg"]},"Consult_chateau_formulairef58b":{"id":"Consult_chateau_formulairef58b","dept":"84","canton":"Bédarides","commune":"Sorgues","nom":"Brantes","type":"Château","periode":"XIV","histoire":"Brantes-Sorgues: Ce château pontifical, en 1321  appartenu au roi Robert de Naples, passa au comte de Provence  qui y reçut de grandes personnalités.  \r\nEn 1700 le château qui fut construit sur l'emplacement de l'ancien a été édifié par les Del Bianco, cette famille  originaire de Florence mais habitère Avignon depuis 1600; Il fut agrandi en 1815 par le général de Cessac ministre de Napoléon Ier.  \r\nPuis en 1955 racheté par Louis de Brantes  qui serait un descendant des Del Bianco.","architecture":"Au bord de la rivière se trouve une grosse bâtisse en ruines, c'était le château du pape Jean XXII.\r\n En 1317 s'élève un vaste quadrilatère flanqué de quatre tours et fut abandonné au XIVe siècle.","habitants":"Famille de Brantes\"","divers":"","gps":"","images":["../image/image_84/84_Brantes_1.jpg","../image/image_84/84_Brantes_2.jpg","../image/image_84/84_Brantes_3.jpg","../image/image_84/84_Brantes_4.jpg"]},"Consult_chateau_formulairec4f5":{"id":"Consult_chateau_formulairec4f5","dept":"84","canton":"Malaucène","commune":"Brantes","nom":"Brantes_Village","type":"Vestiges","periode":"XII","histoire":"Brantes-Village: Accroché à un rocher, fut le fief de la famille des Baux au XIIe siècle puis des Brantes.","architecture":"Du château fort  il ne reste que des vestiges.","habitants":"Famille des Baux\"","divers":"","gps":"","images":["../image/image_84/84_Brantes_Village_1.jpg","../image/image_84/84_Brantes_Village_2.jpg"]},"Consult_chateau_formulaire1dad":{"id":"Consult_chateau_formulaire1dad","dept":"84","canton":"Bonnieux","commune":"Buoux","nom":"Buoux","type":"Forteresse","periode":"XV","histoire":"Le site du Fort de Buoux âprement disputé par les comtes de Toulouse, des seigneurs  de Forcalquier et des Simiane qui firent édifier une forteresse sur un piton rocheux. \r\nPendant les guerres de religion le site a été assiégé par les protestants et le fort fut démantelé vers 1660. \r\n Le fief faisait partie au XVe siècle de la famille de Pontevès; Gaspard de Pontevès écuyer du comte de Provence, son petit fils Ange de Pontevès, écuyer du grand sénéchal de Provence entreprend avec son épouse Marguerite de Simiane Lacoste de faire construire le  nouveau château, Château de Buoux; l'oeuvre se continue par Gabriel de Pontevès et Pompée de Buoux époux de Marguerite de la Baume de Suze, homme de confiance d'Henri IV. \r\nAu XVIe siècle Ange II de Pontevès,  viguier de Marseille et époux de mademoiselle de Grignan leur fils Lois de Pontevès colonel obtient en 1650 la seigneurie en marquisat. \r\nAu siècle  suivant sans descendant  la famille des Pontevès séteignit, le château échout à la soeur du dernier marquis à la comtesse de la Vallière qui cède le château aux Gallifet, princes de Martigues qui conservèrent Buoux jusqu'à la Révolution. \r\nAcquis sous l'Empire par Joseph-Louis d'Anselme,  général d'armé, le château reste dans la descendance jusqu'à la seconde guerre mondiale, devient ensuite la propriété de la ville de Cavaillon qui le revendirent,  les nouveaux propriétaires \"parc naturel régionnal du Luberon\" se chargent de le remettre en état.","architecture":"Fort de Buoux; Une haute falaise de 100 mètres,  les origines du fort de Buoux  sont très anciennes et difficiles à dater, tout comme les bâtiments construits au Moyen Age. Cette \"oppidum\"  joua un grand rôle pour la défense d'Apt, il porte les ruines du fort qui se succèdent de puissantes défenses de murailles, tours et fossées au point culminants un donjon entouré de précipices; Une  chapelle en ruine, des silos dans le roc et des vestiges d'habitations du village de Saint-Germain au pied de la falaise .       Château de Buoux:  Du premier château-forteresse démantelé en 1660 il ne reste qu'une tour ronde à proximité du nouveau château qui fut remanié au cours des siècles est un quadrilatère flanqué aux angles de tours rondes, dont il reste la tour au Nord -Est,  double enceinte avec cour d'honneur et un corps de logis accolé d'une tour hexagonale abritant un escalier à vis.\r\n Au XVIe siècle se construit un massif donjon carré et de la tour d'escalier et en 1651 une aile  se rajouta, mais qui ne sera jamais terminée, sur la partie arrière escalier à quatres volées cerné de balustres s'agrémante d'une fontaine.","habitants":"Famille de Pontevès\"","divers":"","gps":"","images":["../image/image_84/84_Buoux_1.jpg","../image/image_84/84_Buoux_2.jpg","../image/image_84/84_Buoux_3.jpg","../image/image_84/84_Buoux_4.jpg","../image/image_84/84_Buoux_5.jpg","../image/image_84/84_Buoux_6.jpg","../image/image_84/84_Buoux_7.jpg","../image/image_84/84_Buoux_8.jpg","../image/image_84/84_Buoux_9.jpg"]},"Consult_chateau_formulaire95a0":{"id":"Consult_chateau_formulaire95a0","dept":"84","canton":"Isle-sur-la-Sorgue","commune":"Cabrières-d`Avignon","nom":"Cabrieres","type":"Château","periode":"XVI","histoire":"Cabrières d'Avignon: Cité en 1180, appartenait aux seigneurs des Ancezune, puis passa aux de Grammont-Caderousse, Inabité au Xe siècle repleuplé par une colonie de Vaudois, fut assiégé en 1545 sur ordre de François Ier,  le 21 Avril les soldats mirent la ville à feu et à sang. Aujourd'hui propriété privé d'un industriel hollandais.","architecture":"Château du XIIe siècle reconstruit au XVIe siècle, corps de logis en équerre, sa tourelle polygonale à meneaux à conservé du XIIe siècle la tour Ouest. L' enceinte féodale et  cinq  tours circulaires percées de fentes de tir horizontales, chemin de ronde et porte sarrazine   du XIV-XVe siècle.","habitants":"Famille des Ancezune\"","divers":"","gps":"","images":["../image/image_84/84_Cabrieres_1.jpg","../image/image_84/84_Cabrieres_2.jpg","../image/image_84/84_Cabrieres_3.jpg","../image/image_84/84_Cabrieres_4.jpg","../image/image_84/84_Cabrieres_5.jpg","../image/image_84/84_Cabrieres_6.jpg"]},"Consult_chateau_formulaireba9d":{"id":"Consult_chateau_formulaireba9d","dept":"84","canton":"Orange","commune":"Caderousse","nom":"Caderousse","type":"Vestiges","periode":"XI","histoire":"Caderousse: En 1085 \"Cadarossa\"; Village partagé par plusieurs seigneurs ( les Ancezune,  les Forti d'Urbanet et les de Grammont qui y édifièrent chacun un château et de ces trois châteaux, il ne reste pratiquement plus rien.\r\n Cette seigneurie fut érigée en duché en 1664 au bénéfice de Just-André-François d'Ancezune Cadar, Puis seigneurie des ducs de Grammont-Caderousse  au XVIIIe siècle qui en prit le nom, et les descendants en seraient encore propriétaire. \r\nCaderousse  fut le domaine des évêques d'Orange pendant les guerres de religion.","architecture":"Digues et remparts date de 1856, Le château vieux dont-il ne reste que quelques vestiges de mur, des restes du château ducal partièllement restauré vers 1980, mairie du XVIIIe siècle avec tour de l'horloge.","habitants":"Famille Grammont\"","divers":"","gps":"","images":["../image/image_84/84_Caderousse_1.jpg","../image/image_84/84_Caderousse_2.jpg","../image/image_84/84_Caderousse_3.jpg"]},"Consult_chateau_formulaireebe1":{"id":"Consult_chateau_formulaireebe1","dept":"84","canton":"Vaison-la-Romaine","commune":"Cairanne","nom":"Cairanne","type":"Vestiges","periode":"XIII","histoire":"CAIRANNE; Au XIIe siècle fief des comtes de Toulouse, attribué en co-seigneuries aux Fouras, aux Mormoiron, aux Mondragon et aux Mornas, se fut Raymond de Mornas  qui céda ses parts à l'ordre des Hospitaliers de Saint-Jean de Jérusalem, au siècle suivant Raymond de Gaufridi de Castellane reçut en dot une partie de Cairanne lors de son mariage avec Randonne de Mondragon et cette même année de 1283 les deux époux cèdent leurs droits au général prieur de Saint-Gilles.                                   Les Hospitalliers durent rétrocéder Cairanne au pape Jean XXII en 1320. Cairanne en 1563 subit les guerres de religion et en 1588 les attaques de Lesdiguières. En 1593 Antoine de Simiane acheta la seigneurie et en 1623 son fils Louis vendit le fief à Paul de Cambis qui en 1773 par alliance de Marie-Josephe-Sophie de Cambis, Cairanne passa à Jacques de Vichaud de la Tour qui ce dernier fut condamné à mort à la Révolution le 25 juin 1794.","architecture":"De cette ancienne seigneurie des Templiers il ne reste que l'enceinte médièvale avec ses deux portes d'entrées  et le donjon dit des \"Templiers\", surmonté d'un campanile qui abrite le musée des vins.","habitants":"Famille d'Antoine de Simiane. \"","divers":"Vestiges de rempats dans Cairanne.","gps":"","images":["../image/image_84/84_Cairanne_1.jpg","../image/image_84/84_Cairanne_2.jpg","../image/image_84/84_Cairanne_3.jpg","../image/image_84/84_Cairanne_4.jpg","../image/image_84/84_Cairanne_5.jpg","../image/image_84/84_Cairanne_6.jpg"]},"Consult_chateau_formulaire1dc0":{"id":"Consult_chateau_formulaire1dc0","dept":"84","canton":"Orange","commune":"Camaret-sur-Aigues","nom":"Camaret","type":"Vestiges","periode":"XIII","histoire":"CAMARET-sur-Aigues. Au XIe siècle appartenait à la principauté d'Orange, Raymond VII de Toulouse comte de Provence, le donna en fief en 1237 à Raymond des Baux, par alliance passa ensuite aux Adhémar de Poitiers comte de Valentinois par le mariage de Tiburge d'Orange en 1324, suite à ce passage deux syndics furent élus et des remparts furent construits en 1416, en 1418 le fief fut rattaché à la baronnie de Sérignan jusqu'à la Révolution. Camaret subit en 1563 les assauts des troupes calvaniste de Montbrun.","architecture":"De son enceinte médièvale, Camaret était entouré de remparts et d'un fossé large de trois mètres, mais  a conservé la grande et belle porte de l'horloge ( le Ravelin), coiffée d'un campanile et encadrée de deux tours rondes longues et étroites, la porte Jobert, la porte Béranger, ainsi que deux autres tours dont une crénelée  de 18 mètres de haut qui était une demeure seigneuriale à trois étages.","habitants":"Famille des Adhémar de Poitiers.\"","divers":"Porte de L'Horloge dite de carbonel et tour sarrasine.","gps":"","images":["../image/image_84/84_Camaret_1.jpg","../image/image_84/84_Camaret_2.jpg","../image/image_84/84_Camaret_3.jpg","../image/image_84/84_Camaret_4.jpg","../image/image_84/84_Camaret_5.jpg"]},"Consult_chateau_formulaired795":{"id":"Consult_chateau_formulaired795","dept":"84","canton":"Bonnieux","commune":"Bonnieux","nom":"Canorgues","type":"Château","periode":"XVIII","histoire":"Voir Bonnieux","architecture":"","habitants":"\"","divers":"","gps":"","images":["../image/image_69/69_attente_1.html"]},"Consult_chateau_formulairec78c":{"id":"Consult_chateau_formulairec78c","dept":"84","canton":"Carpentras","commune":"Carpentras","nom":"Carpentras","type":"Vestiges","periode":"XV","histoire":"Carpentras: Au XIIe siècle fief des comtes de Toulouse, qui en 1206 Raymond VI chasse l'évêque et construisit le château. \r\nEn 1229 Saint-Louis céda Carpentras au Saint-Siège dont un recteur s'installa à Pernes de 1274 à 1320, puis à Carpentras, ville qui sera la capitale du Comtat pendant cinq siècles, jusqu'au rattachement à la France en 1791.\r\n En 1536 Caprentras et les comtadins reçoivent François Ier considéré comme étranger proche des Français. \r\nAu XVIIe siècle le Saint-Siège construisit un palais épiscopal fait par F. de la Valfenière, aujourd'hui palais de justice depuis 1801.","architecture":"Cette ville  se réduisait en un petit noyau enserré dans ses remparts, aujourd'hui détruits, La guerre de cents ans conduisit Innocent VI à faire construire une nouvelle enceinte de remparts défensif qui comprenait 32 tours rondes et semi-rondes de 1357 à 1395 à l'intérieur desquels on pénétrait par la porte de Monteux, la porte d'Orange seul vestige des fortifications,  important arc de triomphe, style tour barlon haute de 27 m de haut, avec crénelage à mâchicoulis en encorbellement, remanié au XVIe siècle,  les autres portes furent détruites au XIXe siècle, de Mazan et de Notre -Dame, de Pernes. \r\nDes hôtels du XVIIe et XVIIIe siècle existent dans cette ville. \r\n Le Palais épiscopal de style Romain construit au XVIIe siècle et la copie en réduction du palais Farnèse à Rome.","habitants":"Le Saint-Siège\"","divers":"Porte d'Orange\r\nPalais épiscopal","gps":"","images":["../image/image_84/84_Carpentras_1.jpg","../image/image_84/84_Carpentras_2.jpg","../image/image_84/84_Carpentras_3.jpg","../image/image_84/84_Carpentras_4.jpg"]},"Consult_chateau_formulaire6a61":{"id":"Consult_chateau_formulaire6a61","dept":"84","canton":"Apt","commune":"Caseneuve","nom":"Caseneuve","type":"Château","periode":"XII","histoire":"Caseneuve: Humbert de Pontevés  vivait vers 950, fils d'Eric frère de Saint Mayeul et fut seigneur de Cazeneuve en 992; De la prit naissance de la famille des seigneurs d'Agoult, de la aussi est issue la famille de Simiane et portera pendant des siècles les titres de princes, seigneur d'Apt et Baron de Caseneuve. \r\nAu XIIe siècle les barons de Caseneuve étaient possesseurs de quarante cinq châteaux et seigneuries de la région. \r\nA partir de leur forteresse qui passa sous le nom des Simiane dont le dernier Curan de Simiane qui épousa en 1482 Marguerite de Forbin qui lui donna dix huit enfants dont sept filles. \r\nLe château  appartient aujourd'hui à Monsieur Rippert","architecture":"Château du XIIe siècle est une superbe construction romane . la chapelle, dont les murs épousent la forme du roc qui la supporte, offre une très curieuse voûte d'arêtes à nervures aux pans irréguliers. \r\nAu XVIe siècle, un pavillon avant-corps compléta le bâtiment roman. \r\nVestiges de remparts.","habitants":"Famille d'Agoult de Simiane\"","divers":"Vestiges et Château","gps":"","images":["../image/image_84/84_Caseneuve_1.jpg","../image/image_84/84_Caseneuve_2.jpg","../image/image_84/84_Caseneuve_3.jpg","../image/image_84/84_Caseneuve_4.jpg"]},"Consult_chateau_formulairea456":{"id":"Consult_chateau_formulairea456","dept":"84","canton":"Orange","commune":"Uchaux-Galles","nom":"Castellas_Uchaux","type":"Vestiges","periode":"XII-XV","histoire":"Le Castellas-Uchaux: château de Raimond VI, comte de Toulouse, marquis de Provence inféoda la seigneurie et échangea  ce château avec Guillaume des Baux, prince d'Orange, en 1210, contre celui de Vacqueyras. \r\nA la fin du XIVe siècle la seigneurie échut dans la maison de Laudun, reconstruit au XV par le baron de Sérignan,  puis fut vendue à Nicolas Ruffo de Calabre; sa fille l'apporta en dot à Louis de Poitiers dont les successeurs conservèrent le château jusqu'au XVIe siècle. \r\nCette forteresse pouvait tenir une garnison de trois cents hommes, fut prise et incendié durant les guerres de religion.","architecture":"Ce castellas appelait par le nom du dit lieu \"la Galle\" dont les vestiges remontent de la fin XVe siècle et début XVIe siècle à l'abri du Mistral enceinte de quarante cinq mètres sur cinquante. \r\nA l'intérieur jouxtant l'enceinte, se trouvaient trois bâtiments accolés aux murailles, il ne reste que celui du Nord-Est avec son immense cellier en voûte brisé.","habitants":"Famille de Poitiers\"","divers":"Vestiges, souterrrains et chapelle","gps":"","images":["../image/image_84/84_Castellas_Uchaux_1.jpg","../image/image_84/84_Castellas_Uchaux_2.jpg","../image/image_84/84_Castellas_Uchaux_3.jpg","../image/image_84/84_Castellas_Uchaux_4.jpg"]},"Consult_chateau_formulaire1fc1":{"id":"Consult_chateau_formulaire1fc1","dept":"84","canton":"Orange","commune":"Jonquières","nom":"Causans","type":"Château","periode":"XVII","histoire":"Causans: En 1140, Tiburgette, fille de Tiburge et princesse d'Orange, apporta à Causans en dot à Adhémar de Vincens, qui en prit le nom, depuis le château est toujours resré dans la famille de Causans. \r\nLe  château fut endommagé  durant les guerres de religion. \r\nPropriété du comte de Causans.","architecture":"Le château fut endommagé  durant les guerres de religion, il fut reconstruit au XVIe siècle et remanié au XVIIe siècle est frappé par la pureté de ses lignes, sa cour d'honneur et ses tours rondes coiffées de poivrières. Sur la façade, on peut voir encore des vestiges de style  renaissance.","habitants":"Famille de Causans\"","divers":"","gps":"","images":["../image/image_84/84_Causans_1.jpg","../image/image_84/84_Causans_2.jpg","../image/image_84/84_Causans_3.jpg"]},"Consult_chateau_formulaire6d86":{"id":"Consult_chateau_formulaire6d86","dept":"84","canton":"Cavaillon","commune":"Cavaillon","nom":"Cavaillon","type":"Vestiges","periode":"","histoire":"Cavaillon: La tribu gauloise des cavares qui succède au IVe siècle à une population ligure à laissé sur cet oppidum des vestiges de murs en  pierres sèches, puis la ville  fut sous la domination romaine et s'étend au pied du mont Caveau  et devient cité épiscopale vers 396 avec Saint-Génialis. \r\nEn 1274 fait parti du Saint-Siège administré par un gouverneur évêque, subit les guerres de religion , la peste en 1629 et en 1791  annexé à la France.","architecture":"Vestiges de l'arc romain , la porte d'Avignon.","habitants":"Les évêques de cavaillon\"","divers":"","gps":"","images":["../image/image_84/84_Cavaillon_1.jpg","../image/image_84/84_Cavaillon_2.jpg"]},"Consult_chateau_formulairec8ca":{"id":"Consult_chateau_formulairec8ca","dept":"84","canton":"Gordes","commune":"Lioux","nom":"Ceris","type":"Château","periode":"XVIII","histoire":"Ceris-Lioux: Possession au XVIIIe siècle de la famille d'Estienne de Chaussegros, les propriétaire actuels, Loeck et Ted  Lafeber artistes.","architecture":"Corps de logis rectangulaure flanqué de tours rondes.","habitants":"Famille de Chaussegros\"","divers":"Château de Ceris","gps":"","images":["../image/image_84/84_Ceris_1.jpg","../image/image_84/84_Ceris_2.jpg","../image/image_84/84_Ceris_3.jpg"]},"Consult_chateau_formulaire073a-2":{"id":"Consult_chateau_formulaire073a-2","dept":"84","canton":"Orange","commune":"Châteauneuf-du-Pape","nom":"Chateauneuf_du _Pape","type":"Vestiges","periode":"XIII","histoire":"Châteauneuf du Pape; Fief des comtes de Toulouse possédait un château sur l'emplacement du château actuel. \r\nAu début du XIVe siècle, le pape, las des conflits qui déchirent l'Italie, quitte Rome pour s'installer dans le comtat Venaissin que Philippe III le Hardi avait cédé au Saint-Siège en 1274, ils se fixèrent en Avignon en véritable prince ayant de grands besoins vinicoles décidèrent de construire Châteauneuf.   La construction du château des papes fut entreprise, sur les ordres de Jean XXII, deuxième pape du Comtat entre 1316 et 1333,et plusieurs papes y séjournèrent,  il fut pillé et incendié par le baron des Adrets pendant les guerres de religion, remonté par la suite , et pratiquement détruit à nouveau en 1944 alors qu'il servait de dépôt de munitions des armées allemandes.","architecture":"De ce château, il comportait à l'origine quatre tours d'angles et un important corps de logis; de hauts remparts l'entouraient, il reste que des ruines , une façade qui a resisté a été consolidée; A sa base une salle restaurée abrite un caveau de dégustation des célèbres vins de la région.\r\n Propriété communale.","habitants":"Saint-Siège\"","divers":"Vestiges du Château","gps":"","images":["../image/image_84/84_Chateauneuf_du_Pape_1.jpg","../image/image_84/84_Chateauneuf_du_Pape_2.jpg","../image/image_84/84_Chateauneuf_du_Pape_3.jpg","../image/image_84/84_Chateauneuf_du_Pape_4.jpg","../image/image_84/84_Chateauneuf_du_Pape_5.jpg","../image/image_84/84_Chateauneuf_du_Pape_6.jpg"]},"Consult_chateau_formulairebbf1":{"id":"Consult_chateau_formulairebbf1","dept":"84","canton":"Carpentras","commune":"Monteux","nom":"Confines","type":"Manoir","periode":"XIX","histoire":"Confines-Monteux: Château de la famille de Barbentane, dans ce dernier est né le dernier marquis au XIXe siècle.","architecture":"Corps de logis rectangulaire classique.","habitants":"Famille de Barbentane\"","divers":"","gps":"","images":["../image/image_84/84_Confines_1.jpg","../image/image_84/84_Confines_2.jpg"]},"Consult_chateau_formulairefb72":{"id":"Consult_chateau_formulairefb72","dept":"84","canton":"Bédarides","commune":"Courthézon","nom":"Courthezon","type":"Vestiges","periode":"XII","histoire":"Courthézon: A partir de 793, Courthézon faisait parti de la principauté d'Orange jusqu'au rattachement à la France en 1731, cinq familles ont régnés sur Orange et Courthézon Les familles des comtes de Toulouse de 793 à 1173, la famille des Baux  qui agrandirent le château existant de 1173 à 1393, la famille de Chalon de 1393 à 1530, la famille de Nassau, prince d'Orange qui remania le château de 1530 à 1703 et la famille de Conti de 1703 à 1731. \r\nEn 1731 un échange est fait entre Louis XV, roi de France et le Prince de conti, Courthézon et la principauté d'Orange sont définitivement incorporées au domaine Royal.","architecture":"Remparts du XIIe siècle et possédait quatre portes dont trois sont encore debouts; la porte d'Aurouze au nord, la porte du Prince et la porte Belle Croix la plus conservé. \r\nLe château et ses dépendances furent démolis en 1768 seul le donjon \"Verclos\" près d'un logis du XVIe siècle, remanié  et les pierres furent employées à la construction de la digue de l'Ouvèze, sur ses ruines, s'éléve maintenant une demeure privée ceinturée des restes de murs crénelés.","habitants":"Les princes d'Orange\"","divers":"Porte d'Aurouze\r\nPorte belle-croix\r\nPorte du prince\r\nDonjon Verclos\r\nRemparts","gps":"","images":["../image/image_84/84_Courthezon_1.jpg","../image/image_84/84_Courthezon_2.jpg","../image/image_84/84_Courthezon_3.jpg","../image/image_84/84_Courthezon_4.jpg","../image/image_84/84_Courthezon_5.jpg","../image/image_84/84_Courthezon_6.jpg","../image/image_84/84_Courthezon_7.jpg"]},"Consult_chateau_formulaired14e":{"id":"Consult_chateau_formulaired14e","dept":"84","canton":"Vaison-la-Romaine","commune":"Crestet","nom":"Crestet","type":"Château","periode":"XII","histoire":"Crestet: Ce château féodal construit sur une place fortifiée sur une ancien fortin de pierre de 850 qui appartenait à la seigneuries des évêques  de Vaison qui leur servit de refuge  lors de leurs dissenssions avec les comtes de Toulouse; Raymond VI, comte de Toulouse  fit  édifier le château au XIIe siècle et le village entoura ce dernier autour de l'enceinte percé de trois portes. \r\nAu XIVe siècle, il fut assiégé sans succés par les calvinistes, démantelé pillé ne connut pas de répit jusqu'à la renaissance on  dut apporter des remaniements et transformations, le seigneur évêque y iinstalla une petite garnison, malgré tout assiégé par les huguenots de 1563 à 1574, une partie détruite et le seigneur évêque va habiter Vaison, revenant que périodiquement au Crestet, il y célébra dans ce château en 1635 le mariage de son frère François de Suarès avec mademoiselle de l'Epine d'Aulan.","architecture":"Encore contenu par les vestiges d'une enceinte flanquée de tours semi-circulaires, l'imposant château sur la crête a été construit au XIIe siècle. restauré au XIVe siècle; Il résista aux maintes assauts pendant les guerres de religion et le coup de grâce fut donné en 1791 par les troupes révolutionnaires d'Avignon et la reconstruction fut abandonné.","habitants":"Les évêques de Vaison\"","divers":"Vestiges du château","gps":"","images":["../image/image_84/84_Crestet_1.jpg","../image/image_84/84_Crestet_2.jpg","../image/image_84/84_Crestet_3.jpg","../image/image_84/84_Crestet_4.jpg","../image/image_84/84_Crestet_5.jpg"]},"Consult_chateau_formulaireb774":{"id":"Consult_chateau_formulaireb774","dept":"84","canton":"Mormoiron","commune":"Crillon-le-Brave","nom":"Crillon_le_Brave","type":"Vestiges","periode":"XVI","histoire":"Crillon le Brave: Son nom vient de celui du compagnon d'Henri IV; Louis de Balles de Crillon 1541 homme de guerre qui servit successivement les rois Henri III et HenriIV participa aux guerrres de religion.  \r\nUn autre personnage dans la descendance des Crillon\" Louis Antoine François-de-Paule des Balles de Berton de Quiers de Crillon\" duc de Mahon qui  en 1832 rallia Joseph Bonaparte.","architecture":"Vestiges de remparts du XVIe, plusieurs portes du XVe siècle et Château du XVe siècle.","habitants":"Famille de Crillon de Balles\"","divers":"Vestiges et portes","gps":"","images":["../image/image_84/84_Crillon_le_Brave_1.jpg","../image/image_84/84_Crillon_le_Brave_2.jpg","../image/image_84/84_Crillon_le_Brave_3.jpg"]},"Consult_chateau_formulairee449":{"id":"Consult_chateau_formulairee449","dept":"84","canton":"Cadenet","commune":"Cucuron","nom":"Cucuron","type":"Vestiges","periode":"XIII","histoire":"Cucuron: Au XIIe siècle, fief de Guillaume de Sabran (Guillaume de Cucuron); Dans la descendance jusqu'au XVe siècle, puis vendu en partie à un créancier Avignonais André Aquirolis et revend à la famille de Castillon, dont Nicolas secrétaire du comte de Provence, Louis III, Roi de Naples, cette famille d'origine Italienne (Castigliani) conserve leur coseigneurie jusqu'en 1644 et passa ensuite par alliance à la famille Castellane d'Oraison,  qui la conserve jusqu'à la mort  de Joseph André d'Oraison en 1751sans postérité, l'héritière la famille de Valbelle possèdera  la seigneurie jusqu'en 1781, date à laquelle elle est acquise par J.B.Jérome de Bruni, Bron de la Tour d'Aigues jusqu'en 1791. \r\nA cette date le château n'étant plus habitable passa sous la responsabilité de la commune.","architecture":"Village construit autour d'un castrum  dont le donjon rectangulaire qui dominait l'a région, donjon appelé la \"tour Saint-Michel\"; conserve également des restes d'enceinte du XVIe siècle, la tour de l'horloge ancienne porte du XIIIe siècle.","habitants":"Famille de Sabran\r\n \r\nFamille de Castillon\"","divers":"Vestiges et tour du château","gps":"","images":["../image/image_84/84_Cucuron_1.jpg","../image/image_84/84_Cucuron_2.jpg","../image/image_84/84_Cucuron_3.jpg","../image/image_84/84_Cucuron_4.jpg"]},"Consult_chateau_formulaire763c":{"id":"Consult_chateau_formulaire763c","dept":"84","canton":"Malaucène","commune":"Entrechaux","nom":"Entrechaux","type":"Vestiges","periode":"X","histoire":"Entrechaux: En 1189, l'évêque de Vaison qui possédait la moitié de la seigneurie avec les sires du Puy qui firent construire le château; les évêques  étaient venus s'y réfugier au moment des démêlés avec le comte de Toulouse.  \r\nEn 1235, l'empereur Frédéric II le cède en fief à ce dernier puis Entrechaux, revenu à la papauté, est inféodé à divers seigneurs, dont les Guiramand , les Fogasses et les Ailhaud, qui le conservèrent jusqu'à la Révolution.","architecture":"Les ruines laissent voir un systéme défensif, mais elles ont encore grande allure, un donjon de 20 mètres de haut. L'enceinte réservée à l'évêque enferme de beaux restes de sa chapelle, dédiée à Saint  Quenin (XIe siècle). \r\nL'ensemble des remparts et de trois portes d'entrée sont encore bien conservés. \r\nLe château dont la première construction du Xe reconstruit au XIIe  siècle fait l'objet d'une campagne de restauration. Propriété de la commune.","habitants":"Famille de Guarimand\"","divers":"","gps":"","images":["../image/image_84/84_Entrechaux_1.jpg","../image/image_84/84_Entrechaux_2.jpg","../image/image_84/84_Entrechaux_3.jpg","../image/image_84/84_Entrechaux_4.jpg","../image/image_84/84_Entrechaux_5.jpg","../image/image_84/84_Entrechaux_6.jpg","../image/image_84/84_Entrechaux_7.jpg"]},"Consult_chateau_formulaire2ca4":{"id":"Consult_chateau_formulaire2ca4","dept":"84","canton":"Carpentras","commune":"Loriol-du-Comtat","nom":"Eydoux","type":"Château","periode":"XIX","histoire":"Eydoux: Construit en 1850 sur les fondations d'un château du Moyen Age, il fut offert par Napoléon III à l'un de ses généraux (Général Eydoux) en remerciements de ses bons services. Aujourd'hui trasformé en chambres d'hôtes.","architecture":"Château du XVIIIe siècle, corps de Logis rectangulaire à trois niveaux, flanqué d'ailes.","habitants":"Famille Eydoux\"","divers":"","gps":"","images":["../image/image_84/84_Eydoux_1.jpg","../image/image_84/84_Eydoux_2.jpg"]},"Consult_chateau_formulaire7a4c":{"id":"Consult_chateau_formulaire7a4c","dept":"84","canton":"Avignon","commune":"Pontet","nom":"Fargues","type":"Château","periode":"XIV","histoire":"Fargues: Construit par le cardinal Raimind-Guilhem (ou Guillaume) de Fargis, neveu du pape Clément. aujourd'hui de Fargues mort en 1346, neveu de Clément V et agrandi vers 1400 par Georges de Ricci, consul d'Avignon, ruiné par François Ier en 1536 et reconstruit au XVIIIe siècle.","architecture":"De style renaissance a eu une reconstruction et modification au XVIIIe siècle de qualité, couvert de créneaux.","habitants":"Guillaume de Fargis\"","divers":"","gps":"","images":["../image/image_84/84_Fargues_1.jpg","../image/image_84/84_Fargues_2.jpg","../image/image_84/84_Fargues_3.jpg"]},"Consult_chateau_formulaire2ffa":{"id":"Consult_chateau_formulaire2ffa","dept":"84","canton":"Orange","commune":"Châteauneuf-du-Pape","nom":"Fines_Roches","type":"Château","periode":"XIX","histoire":"Fines-Roches: Construit au XIXe siècle par le marquis Folco de Baroncelli-Javon, en 1895 ce dernier célébra ses noces avec Henriette Constintin, héritière du domaine. \r\nDirigé par la famille Estevenin, le château est aujourd'hui une hostellerie de charme au cur d'un vignoble.","architecture":"Bâtisse étonnante de style écossais aux multiples tours hérissées de créneaux et cernées de mâchicoulis.","habitants":"Famille de Baroncelli-Javon\"","divers":"","gps":"","images":["../image/image_84/84_Fines_Roches_1.jpg","../image/image_84/84_Fines_Roches_2.jpg","../image/image_84/84_Fines_Roches_3.jpg"]},"Consult_chateau_formulaire99d0":{"id":"Consult_chateau_formulaire99d0","dept":"84","canton":"Cavaillon","commune":"Cavaillon","nom":"Fogasses","type":"Manoir","periode":"XVI","histoire":"Fogasses: Ce château qui se trouve sur l'île de la Barthelasse qui était habitait depuis le XIIe siècle par une famille piémontaise fut élevé au XVIe siècle selon les prescriptions contenues dans les lettres patentées donné par Charles IX à François de Fogasses, seigneur de la Barthelasse. \r\nLes propriétaire actuels M.M Louis Aiglon et Jules Fages s'efforcent à le restaurer comme à l'origine. \r\nLe château du XVIe siècle fut reconstruit sur l'emplacement d'un ancien château.","architecture":"De construction rectangulaire à trois niveaux, flanqué en angles de deux tours carrées, le corps de la structure principale est resté pratiquement intact, les toitures qui avaient été remaniés, ont repris leur aspect primitif.","habitants":"Famille de Fogasses\"","divers":"","gps":"","images":["../image/image_84/84_Fogasses_1.jpg"]},"Consult_chateau_formulaire2e84":{"id":"Consult_chateau_formulaire2e84","dept":"84","canton":"Isle-sur-la-Sorgue","commune":"Fontaine-de-Vaucluse","nom":"Fontaine_de_Vaucluse","type":"Vestiges","periode":"XIII","histoire":"Fontaine de Vaucluse: Depuis le XIIIe siècle que ce château appartenait aux Evêques de Cavaillon et au XIVe siècle, c'est dans ce village  que vécut pendant seize ans  François  Pétrarque,  il écrivit ses uvres poétique \"Canzonière\" et allait au château avec son ami Philippe de Cabassole evêque puis cardinal y venait y résider.","architecture":"Aujourd'hui pans de murs et de tours ruinés.","habitants":"Evêque de cavaillon\"","divers":"","gps":"","images":["../image/image_84/84_Fontaine_de_Vaucluse_1.jpg","../image/image_84/84_Fontaine_de_Vaucluse_2.jpg","../image/image_84/84_Fontaine_de_Vaucluse_3.jpg","../image/image_84/84_Fontaine_de_Vaucluse_4.jpg","../image/image_84/84_Fontaine_de_Vaucluse_5.jpg"]},"Consult_chateau_formulaireafbc":{"id":"Consult_chateau_formulaireafbc","dept":"84","canton":"Isle-sur-la-Sorgue","commune":"Châteauneuf-de-Gadagne","nom":"Fontsegugne","type":"Château","periode":"XIX","histoire":"Du château de Châteauneuf de Gadagne du XIIe siècle qui etait l'un des plus beau de la province fut démentelé en premier par le baron des Adrets puis à la Révolution.                               Le château  de Fontségugne de style néo  renaissance, fut construit au XIXe siècle sur l'emplacement d'une maison de plaisance par la famille Giéra,  en 1854 Alphonse Tavan reçut Mistral et les six poètes fondateur du  Félibrige, un monuments a été élevé en 1974; Font di Félibre, mouvement littéraire pour garder la langue provençale et les dialectes occitants.\r\n Le château appartient toujours  à cette famille.","architecture":"Du château de Châteauneuf de Gadagne, il subsiste des éléments de remparts à mâchicoulis du XIVe siècle, le portail vieux du XIIIe siècle la porte de la Bourgades, le portail du Thor.           Château  de Fontségugne de style néo-renaissance, quadrilataire à trois niveaux, fronton circulaire en angles et balustres en terrasse.","habitants":"Famille Giéra\"","divers":"","gps":"","images":["../image/image_84/84_Fontsegugne_1.jpg"]},"Consult_chateau_formulaire946d":{"id":"Consult_chateau_formulaire946d","dept":"84","canton":"Beaumes-de-Venise","commune":"Beaumes-de-Venise","nom":"Fortia_Beaumes_de_Venise","type":"Vestiges","periode":"XII","histoire":"Fortia; Beaumes de Venise: Château appelé Fortia des comtes de Toulouse remis au pape en 1209 et fief des Durban.","architecture":"Le château féodal du XIIe siècle dit\" des Barons\" en ruines  était un puissant bastion fortifié du Comtat au Moyen-Age.","habitants":"Famille Durban\"","divers":"","gps":"","images":["../image/image_84/84_Fortia_Beaume_de_Venise_1.jpg","../image/image_84/84_Fortia_Beaume_de_Venise_2.jpg"]},"Consult_chateau_formulaire6f09":{"id":"Consult_chateau_formulaire6f09","dept":"84","canton":"Bolléne","commune":"La Palud","nom":"Fromigieres","type":"Château","periode":"XVI","histoire":"Frémigières était au centre d'un fief très important au Moyen Age. \r\nIl aurait appartenu aux Templiers, succédant aux Guigues de Moreton, puis aux de Montaigu, dont le plus illustre, fut l'évêque d'Apt et gouverneur du Comtat dès 1494.  \r\nFrançois de Chamourous propriétaire en 1550, un de  ses fils épouse Isabeau de Susville sans enfant, l'héritier fut un oncle Jean de Susville sieur de Malaval.  \r\nA partir de 1718, Jean-François Doize, docteur es-droit et avocat à Pierrelatte, après avoir fait fortune avec le système Law, acheta le château et les terres de Frémigières. Aujourd'hui toujours dans la famille Reboul.","architecture":"Deux bâtiments en angles à trois niveaux  encore très défensif, avec grandes ouvertures à meneaux.","habitants":"Famille Guigues de Moreton\"","divers":"","gps":"","images":["../image/image_84/84_Fromigieres_1.jpg"]},"Consult_chateau_formulairefa20":{"id":"Consult_chateau_formulairefa20","dept":"84","canton":"Apt","commune":"Gargas","nom":"Gargas","type":"Château","periode":"XVII","histoire":"Gargas: Dès le Moyen Age, un fort existe au sommet de la colline, le castrum qui devient la résidence du seigneur.\r\nAu XIe siècle la famille d'Agoult partage la coseigneurie avec les Simiane qui prirent la totalité du fief et le gardèrent jusqu'au XVIIe siècle, devient ensuite la propriété des de la Tour d'Anvergne, puis au prince de Condé qui  fit construire le château actuel, cette famille  conserve  le domaine  jusqu'en 1789. \r\nLe château appartient à la commune depuis 1863 remanié et occupé aujourd'hui par l'hôtel de Ville.","architecture":"Du château fort sur le sommet de la colline fut détruit par les protestants en 1575, puis abandonné ainsi que la demeure qui fut construite au pied de la colline pour les seigneurs.\r\n Au XVIIe siècle le prince de Condé fit construire le château   qui fut remanié en 1863 actuellement hôtel de ville.","habitants":"Les prince de Condé\"","divers":"","gps":"","images":["../image/image_84/84_Gargas_1.jpg"]},"Consult_chateau_formulaire75cb":{"id":"Consult_chateau_formulaire75cb","dept":"84","canton":"Apt","commune":"Gignac","nom":"Gignac","type":"Vestiges","periode":"XIII","histoire":"Gignac: Au XIIIe siècle était la possession de la famille d'Agoult qui fut vendu au comte de Forcalquier qui construisit le château passa ensuite à la famille de Valpurge en 1438, aux Villemus, à Jeanne de Ménerbes en 1572, puis par alliance aux de Thomas qui détiendront la seigneurie jusqu'à la Révolution; ces derniers construisirent une élégante demeure au XVIIIe siècle.","architecture":"Du Moyen-Age, du château médièval  construit au XIIIe siècle par Guillaume de Forcalqier a été détruit en 1575 pendant la guerre de religion pour délogé les protestants qui s'étaient rendus maîtres des lieux, de la demeure construite au XVIIIe siècle il ne reste que peu  d'éléments et des remparts il ne reste plus rien,(à vérifier) Tour Malakof.","habitants":"Famille de Thomas\"","divers":"","gps":"","images":["../image/image_84/84_Gignac_1.jpg","../image/image_84/84_Gignac_2.jpg"]},"Consult_chateau_formulaire2677":{"id":"Consult_chateau_formulaire2677","dept":"84","canton":"Beaumes-de-Venise","commune":"Gigondas","nom":"Gigondas","type":"Vestiges","periode":"XII","histoire":"Gigondas; ce sont les Romains qui ont donnés son nom au village Jocunditas (joie et allégresse en latin)  ce village dépendait ensuite de la principauté  d'Orange fut entouré de remparts fortifiés et d'un château fort entièrement restauré et qui fonctionne en tant que centre culturel.               Le château de Raspail fut acheté par la famille Meffre en 1970, Christian Meffre propriétaire du château de Ruth commune de sainte Cécile les vignes et du château de St-Jean sur la commune de Travaillan.  Saint-Jean appartenait aux Seignans de Sérignan jusqu'à la Révolution racheté en 1946, Ruth  fut la propriété d'illustres familles comme les Trintignant, les Beauharnais, étant le descendant direct de la famille de l'impératrice Josephine.","architecture":"Vestiges  du château  et de l'enceinte médièvale fortifié et  la tour Sarrasine en ruines, cette tour à signaux aurait été construite au XIIe siècle lieu où se serait produit la bataille confrontant les Sarrasins contre les troupes d'Hildebrand frères de Charles Martel.   Château de Raspail; Bâtisse rectangulaire à trois étages château de Montmirail vinicole depuis le XXe siècle par Gabriel Archimbaud, aujourd'hui à Joseph Boutelier.","habitants":"seigneurs de Seignans de Sérignan Prince d'Orange\"","divers":"Remparts de Gigondas \r\nChâteau Raspail","gps":"","images":["../image/image_84/84_Gigondas_1.jpg","../image/image_84/84_Gigondas_2.jpg","../image/image_84/84_Gigondas_3.jpg","../image/image_84/84_Gigondas_4.jpg","../image/image_84/84_Gigondas_5.jpg","../image/image_84/84_Gigondas_6.jpg"]},"Consult_chateau_formulaired642":{"id":"Consult_chateau_formulaired642","dept":"84","canton":"Gordes","commune":"Gordes","nom":"Gordes","type":"Château","periode":"XV","histoire":"Gordes: Le \"château vieux\" dont la construction date d'avant 1030 à 1095 par les d'Agoult. \r\nLe château neuf qui n'est que l'embellissement de l'ancien, construit en 1525-1541 par Bertrand-Rambaud de Simiane Baron de Gordes qui avait épousé Guigonne d'Allemand d'une famille Dauphinoise, Bertrand Rambaud en guerre en Italie, fut nommé gouverneur de Mondovi et il revient comme gouverneur général du Dauphiné en 1541. \r\nLe château passa en 1615 en marquisat en l'honneur de Guillaumes de Gordes-Simiane, au XVIIe siècle par alliance propriété d'Emmanuel-Théodore de la Tour d'Auvergne, duc de Bouillon, puis en 1734 celles des  ducs d'Albret,  Charles de Rohan  prince de Soubise et,  jusqu'à la Révolution, aux princes Condé, le dernier Louis- Henri-Joseph de Bourbon.  Ce château a eu de la chance de passer à travers les pillages, est acheté par la ville  devenu hôtel de Ville et musée permanent de Pol-Mara.","architecture":"Construit  durant la première moitié  du XVIe siècle, sur l'emplacement d'un ancien château du XIIe siècle, cet édifice renaissance ressemble plus à une forteresse médiévale avec ses  deux énormes tours rondes à mâchicoulis et ses deux échauguettes à chaque angles, un chemin de ronde le couronne.","habitants":"Famille Bertrand  Rambaud\"","divers":"","gps":"","images":["../image/image_84/84_Gordes_1.jpg","../image/image_84/84_Gordes_2.jpg","../image/image_84/84_Gordes_3.jpg","../image/image_84/84_Gordes_4.jpg","../image/image_84/84_Gordes_5.jpg","../image/image_84/84_Gordes_6.jpg","../image/image_84/84_Gordes_7.jpg"]},"Consult_chateau_formulaire9151":{"id":"Consult_chateau_formulaire9151","dept":"84","canton":"Gordes","commune":"Goult","nom":"Goult","type":"Château","periode":"XVI","histoire":"Goult: Au XIe siècle fief de la famille d'Agoult qui donna son nom à la ville Goult (Guillaume, fils d'Humbert) puis la seigneurie passa par alliance aux de Simiane. \r\nAu XVe siècle , le fief appartient a un menbre de la lignée des Sades, la fille Eléonor épouse Antoine de Donis, famille d'origine de Florence qui conservera Goult jusqu'en 1805.","architecture":"Château très restauré","habitants":"Famille de Donis \"","divers":"","gps":"","images":["../image/image_84/84_Goult_1.jpg","../image/image_84/84_Goult_2.jpg","../image/image_84/84_Goult_3.jpg","../image/image_84/84_Goult_4.jpg","../image/image_84/84_Goult_5.jpg","../image/image_84/84_Goult_6.jpg","../image/image_84/84_Goult_7.jpg","../image/image_84/84_Goult_8.jpg"]},"Consult_chateau_formulaire5792":{"id":"Consult_chateau_formulaire5792","dept":"84","canton":"Pertuis","commune":"Grambois","nom":"Grambois","type":"Vestiges","periode":"XII","histoire":"Grambois : Fief du comte de Forcalquier, puis au comte de Toulouse, puis transmis à la famille de Grambois. \r\nEn 1360 la reine Jeanne donne le fief à Albert Guido, neveu du pape Innocent VI qui y prend le titre de seigneur et  le conserva jusqu'en 1399,  Grambois revient au Forcalquier puis passe par plusieurs seigneurs,  les de Lacroix, les de Gautier qui se dernier Jean de Gautier resista fortement aux attaques des protestants en 1590 avec l'appui du duc de Savoie qui s'empara de Grambois, et les de Roquesante jusqu'à la Révolution.","architecture":"Village fortifié enserré dans ses anciens remparts du XIIIe siècle dont il ne reste que quelques vestiges et de deux portes encore visibles. \r\nLe vieux château qui n'est pas la construction seigneuriale d'origine mais un édifice construit en dur l'ancienne maison claustrale jouxtant l'église que le seigneur fit fortifié et y rajouta une tour en 1589. \r\nBâtisse complètement remanié en une maison de plaisance.","habitants":"Famille de Grambois   \r\nFamille de Roquesante\"","divers":"","gps":"","images":["../image/image_84/84_Grambois_1.jpg","../image/image_84/84_Grambois_2.jpg","../image/image_84/84_Grambois_3.jpg","../image/image_84/84_Grambois_4.jpg","../image/image_84/84_Grambois_5.jpg"]},"Consult_chateau_formulaire246d":{"id":"Consult_chateau_formulaire246d","dept":"84","canton":"Valréas","commune":"Grillon","nom":"Grillon","type":"Vestiges","periode":"XII","histoire":"Grillon: Le château des comtes de  Grillon, cité vers 1150; Pons de Grillon évêque de Saint-Paul Trois Châteaux au temps de la commanderie des Templiers de Richerenches. \r\nEn 1175 trois coseigneurs Raymond de Montauban, Rixende sa soeur et Bertrand de Taulignan gèrent Grillon. \r\nEn 1214, Raymond de Montauban demeura seul possesseur de la seigneurie qui passa aux Adhémar de Grignan et, en 1295 aux Dauphins puis en 1317 à l'église Romaine; cette même année, étant intégré au comtat, Grillon doit contribuer avec les autres communes du Venaissin à l'achat de Valréas par le pape Jean XXII,  puis échangé en 1383 par le pape Clément VII contre la moitié de Montélimar, repris en 1451 par le pape Nicolas V en échangeant de nouveau  cette même moitié. \r\nAu XIVe siècle Grillon fut attaqué par Raymond de Turenne  et résistèrent aux \"routiers\". \r\nLe village resta sous la domination papale jusqu'à la Révolution. \r\nEn 1778 Grillon réhausse la tour de guet pour obtenir un béffroi. \r\nA la Révolution le château semi-troglodite fut détruit.","architecture":"Cerné par une ceinture de remparts du XIIe siècle au centre du village, une partie des remparts existe encore; du château il ne subsiste que les traces d'un donjon abattu en 1792 qui menaçait de s'écrouler. A l'est, l'ancienne porte est surmontée de la tour de l'horloge, coiffée d'un joli campanile du XVIIIe siècle.","habitants":"Famille de Montauban\"","divers":"","gps":"","images":["../image/image_84/84_Grillon_1.jpg","../image/image_84/84_Grillon_2.jpg","../image/image_84/84_Grillon_3.jpg","../image/image_84/84_Grillon_4.jpg","../image/image_84/84_Grillon_5.jpg","../image/image_84/84_Grillon_6.jpg"]},"Consult_chateau_formulairec6f7":{"id":"Consult_chateau_formulairec6f7","dept":"84","canton":"Isle-sur-la-Sorgue","commune":"Isle-sur-la-Sorgue","nom":"Isle_sur_la_Sorgue","type":"Vestiges","periode":"XV","histoire":"Isle sur la Sorgue: Copropriété de trois familles  issue de Guillaume, marquis de Provence, à la fin du XIe siècle en indivi jusqu'en 1239 Frédéric II confirme à Raymond VII la suzeraineté du Venaissin et le comte de Toulouse rachète les droits aux autres seigneurs. En 1266, une organisation communale consacre la disparition du régime seigneuriale, échappe au baron des Adrets pendant les guerres de religion et rattaché à la France en 1792 après avoir subit les heures difficiles de la Révolution. \r\nVilla Gauthier dans un beau parc et un   manoir qu'utlise la caisse d'épargne et à l'extérieur villa de\" Mousquety\".","architecture":"Vestiges du château fort sur la place de l'église. Hôtel de Donadei et  Hôtel-Dieu.","habitants":"Cardinales de Saluces\"","divers":"Villa Gauthier \r\nMaison féodal \r\nManoir de la caisse d'épargne\r\nVilla Mousquety","gps":"","images":["../image/image_84/84_Isle_sur_la_Sorgue_1.jpg","../image/image_84/84_Isle_sur_la_Sorgue_2.jpg","../image/image_84/84_Isle_sur_la_Sorgue_3.jpg","../image/image_84/84_Isle_sur_la_Sorgue_4.jpg"]},"Consult_chateau_formulaire00b2":{"id":"Consult_chateau_formulaire00b2","dept":"84","canton":"Gordes","commune":"Lioux","nom":"Javon","type":"Château","periode":"XVI","histoire":"Lioux: Château construit en 1551 par Pierre II, grande famille florentine habituée à Avignon, le fils de François de Baroncelli qui obtint du pape Léon X  l'inféodation de la terre de Javon au Saint  Siège. \r\nLe château restera dans cette famille jusqu'en juillet 1849 date à laquelle le marquis de Javon vendit à Joseph  Maximilien Vayson de Pradennes.","architecture":"Vaste enceinte à trois niveaux, entourant une cour rectangulaire, tours rondes à chaque angle et ouverture en plein cintre surmontée d'une barbacane qu'encadrent deux échauguettes percées de cannonières.","habitants":"Famille de Baroncelli\"","divers":"","gps":"","images":["../image/image_84/84_Javon_1.jpg","../image/image_84/84_Javon_2.jpg","../image/image_84/84_Javon_3.jpg","../image/image_84/84_Javon_4.jpg","../image/image_84/84_Javon_5.jpg"]},"Consult_chateau_formulaireaa54":{"id":"Consult_chateau_formulaireaa54","dept":"84","canton":"Carpentras","commune":"St-Hippolyte-le-Graveyron","nom":"Juvenal","type":"Château","periode":"XIX","histoire":"Juvenal: Propriétaire la famille forestier.","architecture":"Bastide rectangulaire du XIXe siècle de style villa néo  classique.","habitants":"Famille Forestier\"","divers":"","gps":"","images":["../image/image_84/84_Juvenal_1.jpg","../image/image_84/84_Juvenal_2.jpg"]},"Consult_chateau_formulairefd5c":{"id":"Consult_chateau_formulairefd5c","dept":"84","canton":"Bonnieux","commune":"Lacoste","nom":"Lacoste","type":"Vestiges","periode":"XIV","histoire":"A l'origine de Lacoste, il y a les grandes familles du pays, les Agoult et les Simiane, et  ces derniers qui firent construire le château qui fut pillé à la fin du XVIe siècle, remanié en style renaissance que légue au XVIIIe siècle Béatrice de Simiane à son cousin Gaspard-François de Sade seigneur de Saumane et de Mazan, l'ainé de ses dix enfants épousa Diane de Simiane, dame de Lacoste avec Jean-Baptiste de Sade ambasadeur à la cour de France et maréchal de camps, son fils, Donatien-Alphonse  François, le divin ou le diabolique marquis, est né à Paris en 1740; Il passe ses premières années à l'hôtel de Condé, puis à Avignon dans sa famille paternelle, enfin à l'abbaye d'Ebreuil et à Saumane sous la férude de l'abbé de Sade, a quatorze ans le marquis monte en grade dans la guerre de sept ans comme capitaine de cavalerie, épouse Renée Cordier de Launay de Montreuil en 1763 habita Lacoste ou commença sa vie de débauche, puis succéde à son père comme gouverneur de la Bresse, du Buget et de Valromey, continuant ses extravagances, il fut incarcéré à Lacoste en 1777 et à la Bastille ; il en sortira en 1790 mais arrêté de nouveau en 1801 ou il finira ses jours en prison il écrivit plusieurs romans dont ses livres seront exposés. Le château pillé à la Révolution, échoit à l'ancien marquis de Rovère qui à la suite d'un complot, fut déporté en Guyanne. Le château  vendu au anchère est acquis en 1816 par Pierre Grégoire ancien concierge du domaine, partagé par ses héritiers,  commence la lente dégradation. \r\nEn 1952 André Boër achète le château et entreprend sa restauration puis il est acquis par le couturier Pierre Cardin.","architecture":"Ce château qui remplaca le vieux château du Xe siècle fut construit au XIVe siècle et remanié au XVIe siècle, il était l'un des plus vastes de la région. Il  a subit des dégats lors des guerres de religion, fut en partie détruit; puis remanié à nouveau,  bâtisse à trois niveaux de style renaissance, mais  ruiné en partie, délaissé aprés la Révolution entraina sa déchéance.(à controler).","habitants":"Famille de Sade\r\nFamille de Rovère\"","divers":"","gps":"","images":["../image/image_84/84_Lacoste_1.jpg","../image/image_84/84_Lacoste_2.jpg","../image/image_84/84_Lacoste_3.jpg","../image/image_84/84_Lacoste_4.jpg","../image/image_84/84_Lacoste_5.jpg","../image/image_84/84_Lacoste_6.jpg"]},"Consult_chateau_formulaire16e8":{"id":"Consult_chateau_formulaire16e8","dept":"84","canton":"Isle-sur-la-Sorgue","commune":"Lagnes","nom":"Lagnes","type":"Château","periode":"XII","histoire":"LAGNES: Cité en 1154 Lagnas, co-seigneurie du XIII au XVIe siècle, passa sous indépendances administratives en 1648, les habitants désirèrent rester sous l'autorité du Saint-Siège Innocent X érigeat le fief en marquisat au profit de Louis de Cambis. En 1720 la peste arrive ,ils participèrent à la construction du mur long de 27 Kilomètres . Au XVIIIe siècle  la seigneurie est partagée entre les Cambis et les Fortia  qui occupaient deux résidences distantes séparées d'une cour.","architecture":"Village fortifié par des remparts au XIV et XVe siècle ont été démolis  en 1825, subsistent deux tours rondes à meurtrières et des portes qui entourent quelques maisons du XVI et XVIIe siècle. Le château est formé de deux demeures seigneuriales du XIIe remanié aux XVIe-XVIIe siècle séparées par une cour où se trouvait la chapelle Saint-Antoine du XIIe siècle.","habitants":"Famille de Louis de Cambis\"","divers":"Vestiges du château de Lagnes","gps":"","images":["../image/image_84/84_Lagnes_1.jpg","../image/image_84/84_Lagnes_2.jpg","../image/image_84/84_Lagnes_3.jpg","../image/image_84/84_Lagnes_4.jpg","../image/image_84/84_Lagnes_5.jpg","../image/image_84/84_Lagnes_6.jpg","../image/image_84/84_Lagnes_7.jpg"]},"Consult_chateau_formulaire2783":{"id":"Consult_chateau_formulaire2783","dept":"84","canton":"Cadenet","commune":"Lauris","nom":"Lauris","type":"Château","periode":"XVIII","histoire":"Lauris: Au XIe siècle Lauris était le fief de plusieurs co-seigneurs jusqu'à la fin du XIIe siècle, en 1511, Julien de Perussis, issue de noblesse florentine fixé  à Avignon acquiert la seigneurie, en 1545 s'allie avec les Maynier d'Oppède, exécuteur de l'arrêt de Mérindol contre les Vaudois, met en profit son influence auprès de la population catholique. \r\n Mais le comte de Tende réussit à s'emparer du château des Pérussis et le pilla. \r\nEn 1606 passa aux de Bressieux ancien co-seigneurs, puis les Forbin, les Saint-Michel, passa ensuite au duc de     Lesdiguières il n'y vécut même pas, seul un arrêt lors d'un passage au grand dépit de ses habitants; Lauris fut vendu en 1718 à la famille  Montaud d'Arlatan qui le reconstruisire et l'habitat  jusqu'à la Révolution, et après devenu propriété communale.","architecture":"Château reconstruit au XVIIIe siècle sur les ruines de l'ancienne forteresse médiévale s'entoure encore de quelques vestiges de remparts du XVIe siècle, le château   largement remanié au XIXe puis dans les années 1960, car il fut endommagé par les allemands en 1944 qui tirèrent au canon sur le château et l'église.","habitants":"Duc de Lesdiguières \r\nfamille Montaud d'Arlatan\"","divers":"","gps":"","images":["../image/image_84/84_Lauris_1.jpg","../image/image_84/84_Lauris_2.jpg","../image/image_84/84_Lauris_3.jpg"]},"Consult_chateau_formulairecf41":{"id":"Consult_chateau_formulairecf41","dept":"84","canton":"Orange","commune":"Châteauneuf-du-Pape","nom":"Lhers","type":"Vestiges","periode":"XII","histoire":"Lhers: Le château de Lhers en face de Roquemaure avait pour objectif de garder le fleuve et les péages. Ancien \"castellum\" de Leris, du XI au XIVe siècle, il fut compris dans une donation de Louis l'Aveugle à l'évêque d'Avignon en 912. \r\nAssiégé en 1362 par Raymond des Baux, prince d'Orange et occupé par les troupes du Dauphiné.  \r\nIl appartenait aux sires d'Abaron qui le possédaient en fief des papes.","architecture":"Il reste une belle tour tour ronde du XIVe siècle de vingt métres de haut, l'autre tour ruinée garde une voûte en plein cintre.","habitants":"Seigneurs d'Abaron\"","divers":"Vestiges du château de Lhers","gps":"","images":["../image/image_84/84_Lhers_1.jpg","../image/image_84/84_Lhers_2.jpg"]},"Consult_chateau_formulaire849c":{"id":"Consult_chateau_formulaire849c","dept":"84","canton":"Cadenet","commune":"Lourmarin","nom":"Lourmarin","type":"Château","periode":"XV","histoire":"Lourmarin: Le premier château date de 1075 et au XIIIe siècle appartenait aux comtes de Forcalquier, puis aux Sabran et au XVe siècle aux Agoult, Foulque d'Agoult entre 1477 et 1525, son neveu,  Louis d'Agoult de Montauban baron de Sault et de Forcalquier  qui avait épousé Blanche de Lévis-Ventadour poursuit la construction du logis neuf qui verra passer en 1537 François Ier  de retour d'Italie reçu par Blanche de Levis Ventadour, dame de Lourmarin; Veuve de Louis, cette dernière  fut appelé  à comparaître devant le parlement de Paris pour le procés, car elle a été  la seule à prendre la défense des paysans pourchassé par le baron d'Oppéde Jean de Maynier, premier président au parlement d'Aix et nommé en 1544 lieutenant général de Provence. Pris par les Huguenots en 1575, il revient à François d'Agoult et dut le reprendre à coup de canon; François épousa Chrétienne d'Aguerre; A la mort de ce dernier, sa veuve  épousa Antoine de Créqui, duc de Lesdiguières il eut un fils Charles qui sera l'héritier du château des Agoult et épousera Françoise de Bonne, fille du connétable de Lesdiguières et de sa maîtresse Marie Vignon.  Françoise  avait épousée à dix huit ans le seigneur de Montbrun mais séparé par une dispense du pape; Son mari Charles qui la maltraité sera nommé maréchal de France et sera tué d'un coup de canon en 1638 en Italie. \r\nLe château inhabité sera vendu en 1719 au
