x Bruny baron de la Tour d'Aigues. Abandonné à la Révolution, il sera cédé en 1801 à François de  Girard père de Philippe de Girard  ( inventeur de la machine à filer le lin) qui  installe une usine à soie, mais fait faillite, changea souvent de mains, puis sera abandonné  deviendra un camp de Gitans. En 1921 en état de ruines,  l'industriel Robert Laurent-Vibert l'achera pour le restaurer, malheureusement il décéda quatre ans plus tard dans un accident d'automobile, mais le château est sauvé et légué à l'Académie des Sciences et des Belles-Lettres d'Aix-en-Provence, et acceuille diverses manifestations culturelles. \r\nAbrite également la fondations Vibert.","architecture":"De ce château appelé aussi château de la \"Colette\"  ou \"la petite villa Médicis de Provence\" fut construit entre 1495 et 1525 sur un édifice ancien, remanié en style renaissance et construction du corps de logis en 1526, à trois niveaux épaulé par une grosse tour ronde et d'une tour carrée sur la droite qui donne l'accés à  un escalier.","habitants":"Comtes de Forcalquier \r\nFamille d'Agoult   \r\nFamille de Sabran\"","divers":"","gps":"","images":["../image/image_84/84_Lourmarin_1.jpg","../image/image_84/84_Lourmarin_2.jpg","../image/image_84/84_Lourmarin_3.jpg","../image/image_84/84_Lourmarin_4.jpg","../image/image_84/84_Lourmarin_5.jpg","../image/image_84/84_Lourmarin_6.jpg"]},"Consult_chateau_formulaire2bf3":{"id":"Consult_chateau_formulaire2bf3","dept":"84","canton":"Cadenet","commune":"Cadenet","nom":"Malconseil","type":"Maison forte","periode":"XIII","histoire":"Malconseil: En 1185, Pierre de Cadenet fait don de son fief aux chevaliers de l'Ordre du Temple qui édifie une grosse ferme doublée d'un donjon défensif, puis trasmis aux Hospitaliers de Saint-Jean de Jérusalem puis vendue à Hiérosme Liotard en 1513 et connaît divers occupants avant d'appartenir, en 1720, à Gabriel-Pierre Davon, seigneurs de Collonges, puis, en 1803, à sieur Ducros, greffier de la justice de Cadenet. \r\nDans la deuxième moitié du XIXe siècle la propriété fut acheté par Paul Bresson de Pertuis pour un rendez-vous de chasse qui modifie la bâtisse en la réhaussant  d'un étage.","architecture":"Tour de Malconseil; postes avancés assurant la protection de la vallée, transformée en ferme puis réhaussée  au XIXe siècle habillage nèo-gothique avec tourelle d'angle en poivrière et terrasse bordée d'une corniche et de faux créneaux.","habitants":"Famille Davon\r\nFamille Ducros\"","divers":"","gps":"","images":["../image/image_84/84_Malconseil_1.jpg"]},"Consult_chateau_formulaire7eb5":{"id":"Consult_chateau_formulaire7eb5","dept":"84","canton":"Orange","commune":"Jonquières","nom":"Malijay","type":"Château","periode":"XVIIII","histoire":"Malijay: Semble remonter au XIe siècle par les sires des Baux, il appartenait au début du XIVe siècle à Bertrand de Baux, prince d'Orange,  il s'en sépare  en 1375  et jusqu'en 1779 passa dans différentes mains, il fut acquit après par M. Légier de Montfort, conseiller du roi et trésorier  général  de France en Provence, ce dernier fait démolir le château et le remplaça par une autre  demeure plus agréable avec lignes harmonieuses et  fort belle grille d'entrée et d' une tour découronnée qui abrite une chapelle. \r\nLe château fut ensuite la propriété de la Compagnie des Salins du Midi puis du domaine de Listel.","architecture":"De l'ancien château une tour subsiste renfermant une chapelle du XIe siècle. Reste des remparts et d'une tour cylindrique percée d'archères à étrier.","habitants":"Famille Légier de Montfort\"","divers":"","gps":"","images":["../image/image_84/84_Malijay_1.jpg","../image/image_84/84_Malijay_2.jpg"]},"Consult_chateau_formulairec6b9":{"id":"Consult_chateau_formulairec6b9","dept":"84","canton":"Carpentras","commune":"Carpentras","nom":"Martinet","type":"Château","periode":"XVIII","histoire":"Martinet: En 1628 Horace des Isnards, issu d'une famille du Comtat citée dès le XIIIe siècle et établie à Carpentras au début du XVIe siècle, acquiert la seigneurie du Martinet, érigée en marquisat par ses descendants, en 1712 Louis II d' Isnard construit le château  qui fut brûlé à la Révolution et reconstruit en 1846  A été la propriété que de deux familles des Isnard et une autre avant l'arrivée de Françoise et Ronald de Vries qui le transforma en hôtel restaurant.","architecture":"Au XVIIIe siècle existait un premier château brûlé par les révolutionnaires, en 1793 le château fut reconstruit  en 1846 dans un style néo-classique avec les pierres des remparts de la ville.","habitants":"Famille d'Isnard\"","divers":"","gps":"","images":["../image/image_84/84_Martinet_1.jpg","../image/image_84/84_Martinet_2.jpg","../image/image_84/84_Martinet_3.jpg"]},"Consult_chateau_formulaire40e7":{"id":"Consult_chateau_formulaire40e7","dept":"84","canton":"Orange","commune":"Violés","nom":"Martinet_Violes","type":"Château","periode":"XIX","histoire":"Martinet-Violes: Cette demeure au départ était un moulin à huile puis devint un petit château , cette demeure inspira la romancière Elisabeth Barbier \"les gens de Mogador\" en 1988 la famille Boursier le transforma en hôtel restaurant.","architecture":"Corps de logis carré toit à la Mansart flanqué de deux tours carrées à toit pointus.","habitants":"Famille Boursier\"","divers":"","gps":"","images":["../image/image_84/84_Martinet_Violes_1.jpg"]},"Consult_chateau_formulaire0865":{"id":"Consult_chateau_formulaire0865","dept":"84","canton":"Orange","commune":"Uchaux","nom":"Massillan","type":"Château","periode":"XV","histoire":"Massillan: Ancien relais de chasse pour Henri II et Diane de Poitiers, c'est en 1555 que Diane acquit le château qui fut transformé aux 17e et 18e siècle et ensuite transformé en domaine vincole, les propriétaires actuels  Peter Vylly et Brigit Israel.   En 1551 cest Diane de Poitiers qui est propriétaire du château qui fait partie de la baronnie de Sérignan, et celui ci est sans doute à cette époque, un rendez-vous de chasse. Pendant deux siècles, de 1623 à 1826, ce sont les familles Massillan et les Méjanes Massillan qui resteront propriétaires du château. Ils réalisent de nombreux aménagements et embellissements, lui donnant peu à peu son aspect actuel.  En 1846, la propriété passa aux mains de la famille de Gaudemaris et à ses descendants les dAulan qui contribuèrent à lembellir et à mettre en valeur les terres. Il connut ensuite plusieurs autres propriétaires.","architecture":"Corps de logis quadrangulaire flanqué de tours rondes en angles crénelées.       Construit sur un mamelon, le château a du être bâti sur lemplacement dun édifice datant du XIIIe siècle. La partie basse de la façade serait le seul vestige de cette première construction. En 1551 cest Diane de Poitiers qui est propriétaire du château qui fait partie de la baronnie de Sérignan, et celui ci est sans doute à cette époque, un rendez-vous de chasse. Pendant deux siècles, de 1623 à 1826, ce sont les familles Massillan et les Méjanes Massillan qui resteront propriétaires du château. Ils réalisent de nombreux aménagements et embellissements, lui donnant peu à peu son aspect actuel. Le vieux château est abandonné de même que la chapelle. Le site est relativement épargné par la Révolution même si ses nobles occupants et leurs descendants eurent parfois des relations un peu difficiles avec leurs voisins concernant les droits sur les terres du château. En 1846, la propriété passa aux mains de la famille de Gaudemaris et à ses descendants les dAulan qui contribuèrent à lembellir et à mettre en valeur les terres. Il connut ensuite plusieurs autres propriétaires.","habitants":"Diane de Poitiers\r\n        \"","divers":"","gps":"","images":["../image/image_84/84_Massillan_1.jpg"]},"Consult_chateau_formulaireb8bf":{"id":"Consult_chateau_formulaireb8bf","dept":"84","canton":"Carpentras","commune":"Mazan","nom":"Mazan","type":"Château","periode":"XVIII","histoire":"Mazan: Ce village avait en 1250 un castrum  des comtes de Toulouse et en 1380  la seigneurie appartenait à la famille d'Astoard qui la partagea avec la famille Retronchin et à la fin du XVIe siècle à la famille de Sade, qui  racheta la seigneurie et en 1580 firent la démolition de l'ancien château pour reconstuire un nouveau qui sera échangé pour une autre demeure à Mazan et au XVIIIe siècle la famille de Sade fit construire le château actuel, c'est dans cette demeure que naquit le 12 mars 1702, Jean Baptiste François de Sade, ambassadeur à la cour de France et maréchal des camp des armées du roi et père du \"célébre Marquis\".\r\n Dans ce château  il fit un festival de thêatre en 1772. A la Révolution le château fut épargné mais pillé et les archives  brûlés, vendu aux anchères en 1803 et racheté par les enfants du Marquis Armand et Magdeleine-Laure de Sade, revendu en 1880, transformé en école puis en 1924 maison de retraite, racheté depuis peu abrite aujourd'hui une hostellerie de luxe.","architecture":"Il reste quelques vestiges des remparts  du XIIIe siècle mais seul les portes ont été vraiment conservées mais  du château médiéval il ne reste qu'une tour prés de l'église Le château en 1580 détruit par le marquis de Sade pour construire le château actuel; quadrilatère imposant à trois niveaux tour engagée en façade, seul vestige du château, cette belle demeure de plan classique conserve une décoration  de style Louis XVI.","habitants":"Famille de Sade\r\nfamille d'Astoard\"","divers":"","gps":"","images":["../image/image_84/84_Mazan_1.jpg","../image/image_84/84_Mazan_2.jpg","../image/image_84/84_Mazan_3.jpg"]},"Consult_chateau_formulaire88c4":{"id":"Consult_chateau_formulaire88c4","dept":"84","canton":"Bonnieux","commune":"Menerbes","nom":"Menerbes","type":"Château","periode":"XIII","histoire":"Menerbes: Château de la citadelle construit  au XIIIe siècle sur une plate-forme  de 500 m de long et 50 de large, a subit pendant cinq ans les assauts  de l'armée catholique pour sortir les calvinistes qui s'y étaient retranchés et en 1579 après un siège de quinze mois les protestants capitulèrent. \r\nDe nobles familles habitèrent ces lieux et au XVIe siècle en  hôtel de la princesse de Tingry; Monsieur Yves Rosset Rouard en serait propriétaire.            Dans la commune ancienne abbaye des carmes-ermittes des débuts du Christianisme, du XIIIe siècle et la chapelle du XII et une du XIVe siècle, devenue exploitation agricole. \r\nFrancisco Bernal s'employa à sa remise en état, classée monument historique  en 1975, actuellement se visite et des pélerinages ont lieu chaque années tel que la mort de Thérése d'Avila en 1582.","architecture":"Malgré ses persécutions le château n'a pas perdu ses tours cylindriques transformé en résidence à gardé  son chemin de rondes et la plate forme transformée en jardin suspendu. La citadelle fut remanié au XIXe siècle afin de maintenir ce qui est resté debout.","habitants":"Famille Rosset Rouart\r\nFamille Francisco Bernal\r\n\"","divers":"Vestiges du château au sommet du village de Menerbes.","gps":"","images":["../image/image_84/84_Menerbes_1.jpg","../image/image_84/84_Menerbes_2.jpg","../image/image_84/84_Menerbes_3.jpg","../image/image_84/84_Menerbes_4.jpg","../image/image_84/84_Menerbes_5.jpg","../image/image_84/84_Menerbes_6.jpg","../image/image_84/84_Menerbes_7.jpg","../image/image_84/84_Menerbes_8.jpg","../image/image_84/84_Menerbes_9.jpg"]},"Consult_chateau_formulaire0d1b":{"id":"Consult_chateau_formulaire0d1b","dept":"84","canton":"Cadenet","commune":"Mérindol","nom":"Merindol","type":"Vestiges","periode":"XII","histoire":"Mérindol: Au XIIIe siècle fief de Guy, vicomte de Cavaillon qui le reçoit des comtes de Toulouse dont la suzeraineté (depuis 1206) s'étend à l'ouest du comté de Forcalquier; Hugues Albert occupant du château suite aux conflits entre Raymond Béranger, comte de Provence et Raymond VII, comte de Toulouse céde le château au comte de Provence. \r\nEn 1257, passe à Benoit D'Alignan, évêque de Marseille. \r\nL'épidémie de la peste noire en 1348  touche durement Mérindol;  le château et le village  sont inhabités de 1390 à 1504, à cette de date le château fut cédé a douze familles pour redonner vie au village, mais voila que se developpe l'hérésie Vaudois qui se rallient aux protestants et en 1545  Jean Maynier  baron d'Oppède nommé premier président en décembre 1543 pris la décision d'intervenir avec une armée . \r\nLe 18 Avril le village est mis à sac, les maisons brûlées; Il y eut quelques victimes. \r\nLe château fut détruit, cependant quelques habitants restent dans le vieux Mirendol jusqu'au milieu du XIXe siècle.","architecture":"Le château qui se trouvait au sommet de la colline fut complètement détruit en 1545 par Jean Meynier d'Opède et ses troupes il ne reste que quelques vestiges de murailles, une plaque commémorative  des martyrs Vaudois y est installé.","habitants":"Evêques de Marseille\r\n        \"","divers":"","gps":"","images":["../image/image_84/84_Merindol_1.jpg"]},"Consult_chateau_formulaire56f0":{"id":"Consult_chateau_formulaire56f0","dept":"84","canton":"Pertuis","commune":"Mirabeau","nom":"Mirabeau","type":"Château","periode":"XVII","histoire":"Mirabeau: Originaire de Florence, un membre de la famille Arrigheti s'établit en Provence en 1268, changeant de nom en Riqueti; Jean de Riqueti acheta la terre de Mirabeau et fut élu premier consul de Marseille en 1568, et premier membre de cette famille à rentrer dans l'histoire, Jean Riqueti fit construire le château, nommé marquis épousa Marguerite de Glandevés. Les Riqueti, marquis de Mirabeau, ont fourni des chevaliers de Malte et des chefs énergiques dans les armées françaises; à la quatrième génération; Honoré-Gabriel de Riqueti qui a épousé Emilie de Marignane père du célèbre comte Victor de Riqueti 1773-1778, révolutionnaire bien que noble  libéral symbolise la résistance des Etats Généraux à la monarchie; député aux Tiers-Etats et aux Etats Généraux  et l'un des plus brillant orateur de la Tribune,  dépassé par les rythmes de la Révolution, éloquant, joueur et corrompu, il se vend à la cour en 1790 alors que son influence est déjà nulle. \r\nLe château fut incendié et pillé à la Révolution, il fut acquis par un paysan fidèle qui le céda à Madame de Cabris soeur de Victor, Marquise Louise de Mirabeau et de Cabris, cette dernière a épousé Jean-Paul seigneur de Clapier-Cabris vers Grasse,  puis fut racheté et restauré au début du XIXe siècle par Lucas de Montigny, fils adoptif de Victor (le Tribun), dont le fils le céda en 1893 à la comtesse  de Martel de Janville, arrière petite fille de Mirabeau, connue sous le nom de \"Gyp\" vendit le château à la famille Barrés. Aujourd'hui toujours dans cette famille.","architecture":"Ce château qui domine le village et les vallées est une grosse bâtisse quadrangulaire flanquée de six tours rondes du XVIIe siècle, pillé et incendié à la Révolution et retauré au XIXe siècle.","habitants":"Famille Riqueti\r\nFamille de Martel de Janville\"","divers":"","gps":"","images":["../image/image_84/84_Mirabeau_1.jpg","../image/image_84/84_Mirabeau_2.jpg","../image/image_84/84_Mirabeau_3.jpg","../image/image_84/84_Mirabeau_4.jpg"]},"Consult_chateau_formulairea0de":{"id":"Consult_chateau_formulairea0de","dept":"84","canton":"Bolléne","commune":"Mondragon","nom":"Mondragon","type":"Vestiges","periode":"XII-XIII","histoire":"Mondragon: Le château féodal date du XII-XIIIe siècle, appelait aussi château des dragonnets, il appartenait  en 1502 à l'archevêché d'Arles, il fut brûlé en 1562 au cours des guerres de religion.","architecture":"De ce château féodal qui possédait une grande enceinte flanquée de tours rondes, Aujourd'hui  il ne reste que des vestiges de pans de murs, les pierres ont servit à une construction moderne.","habitants":"Les archevêques d'Arles\"","divers":"","gps":"","images":["../image/image_84/84_Mondragon_1.jpg","../image/image_84/84_Mondragon_2.jpg","../image/image_84/84_Mondragon_3.jpg","../image/image_84/84_Mondragon_4.jpg"]},"Consult_chateau_formulaire6272":{"id":"Consult_chateau_formulaire6272","dept":"84","canton":"Bédarides","commune":"Courthezon","nom":"Montellier","type":"Château","periode":"XVIII","histoire":"Montellier: Bâtit par l'amiral  comte d'Auger","architecture":"Corps de logis rectangulaire classique accompagné de grandes dépendances","habitants":"famille du Comte d'Auger\"","divers":"","gps":"","images":["../image/image_84/84_Montellier_1.jpg"]},"Consult_chateau_formulaire454e":{"id":"Consult_chateau_formulaire454e","dept":"84","canton":"Carpentras","commune":"Monteux","nom":"Monteux","type":"Vestiges","periode":"XII","histoire":"Monteux: Le château-fort épiscopal (XII-XIIIe siècle) relevant des sires d'Agoult, fut la résidence  favorite de Clément V.","architecture":"Des fortifications du XIVe siècle ne subsiste que la porte Neuve carrée, couronnée de mâchicoulis avec un avant  corps à poivrière (XV-XVIe siècle) et passage voûté en berceau que fermait un pont-levis; la porte d'Avignon et des fragments de courtines. \r\nDu château fort était entouré d'une enceinte flanquée de six tours, il ne reste que le donjon carré dit\" tour Clémentine\" (devenue transformteur EDF).","habitants":"Pape Clément V\"","divers":"Porte Neuve\r\nPorte d'Avignon\r\nDonjon du château dit tour\"Clémentine\"","gps":"","images":["../image/image_84/84_Monteux_1.jpg","../image/image_84/84_Monteux_2.jpg","../image/image_84/84_Monteux_3.jpg","../image/image_84/84_Monteux_4.jpg","../image/image_84/84_Monteux_5.jpg","../image/image_84/84_Monteux_6.jpg"]},"Consult_chateau_formulaire6513":{"id":"Consult_chateau_formulaire6513","dept":"84","canton":"Avignon","commune":"Montfavet","nom":"Montfavet","type":"Château","periode":"XIII","histoire":"Montfavet: Château des évêques accolait à la cathédrale.","architecture":"Gros donjon carré à quatre niveaux flanqué de creneaux.","habitants":"Les Evêques de Montfavet\"","divers":"","gps":"","images":["../image/image_84/84_Montfavet_1.jpg","../image/image_84/84_Montfavet_2.jpg"]},"Consult_chateau_formulairef806":{"id":"Consult_chateau_formulairef806","dept":"84","canton":"Orange","commune":"Mornas","nom":"Mornas","type":"Forteresse","periode":"XII","histoire":"Mornas: Cette forteresse-citadelle date de Charlemagne, au dessus d'un village fortifié, elle fut donnée en 818 par Louis le Débonnaire à l'abbaye d'Aniane, propriétée des évêques d'Arles et  le comte de Toulouse, Raimond V, se l'appropria construisit le château pour contrôler la vallée du Rhône. \r\nLa forteresse fut si forte que le pape se la fit livrer dès 1209 par Raimond VI comte de Toulouse, et elle resta acquise  au Comtat Venaissin pontifical à partir de 1274. \r\nElle a été la propriété de la famille de Luynes qui l'agrandit et le renforça jusqu'au XVIe siècle. \r\nLe grand souvenir de Mornas  reste le terrible massacre exercé par le chef protestant de Montbrun et du Baron des Adrets sur la population du Village en 1562.","architecture":"C'est un des châteaux le plus ancien de la vallée du Rhône, démentelé au XVIIe siècle présente des vestiges architecturaux intéréssants; l'enceinte longue de deux kilomètres est flanquée de tours d'angles carrées et semi-circulaires, le donjon remonté ces dernières années  par les amis de Mornas, d'une largeur d'une dizaine de mètres  le rendait infranchissable. le tout est dominé par ce donjon en pyramide tronquée.","habitants":"Les comtes de Toulouse.             \r\nLes papes d'Avignon\"","divers":"Vestiges du la citadelle\r\nPorte côté Nord","gps":"","images":["../image/image_84/84_Mornas_1.jpg","../image/image_84/84_Mornas_2.jpg","../image/image_84/84_Mornas_3.jpg","../image/image_84/84_Mornas_4.jpg","../image/image_84/84_Mornas_5.jpg"]},"Consult_chateau_formulairee0c9":{"id":"Consult_chateau_formulairee0c9","dept":"84","canton":"Gordes","commune":"Murs","nom":"Murs","type":"Château","periode":"XIII","histoire":"Murs: Construit au XIIIe siècle par la famille d'Agoult, seigneur de Forcalquier, était leur fief depuis 1004, reconnait tenir le château de la seigneurie de l'évêque de Carpentras. \r\nCe château abritait les soldats et les vassaux; A  l'intérieur de l'enceinte la vieille maison Crillon fût bâtie au XIII siècle, un logis seigneurial également dans l'enceinte fut cédé aux Astouaud, la  maison  Berton-Crillon  a été reconstruite et restaurée en remplacement de la maison seigneuriale qui fut détruite. \r\nCrillon nacquit en 1543 alors que sa mère était belle soeurs des seigneurs de Murs était de passage aux château. \r\nAu XVIIe siècle les Astouaud Jean Baptiste François marquis de Murs remanient le château et ces derniers s'associent avec les Castagnères en 1713 et délaissèrent le château à la Révolution pour allait vivre dans leur hôtel particulier à Carpentras. \r\nLe château fut laissé à l'abandon.       Au XIXe siècle Maximilien et Bruno Vayson restaure le château  dans l'état actuel  et fut transmis à André Vayson de Pradenne, comme celui de Javon.","architecture":"Château du Moyen Age  constitué d'un donjon défensif carré qui domine l'ensemble des bâtiments, accolé  de deux tours rondes à mâchicoulis et  deux autres  tours rondes massives à créneaux encadrent l'entrée.","habitants":"Famille Astouaud\r\nFamille de Maximilien et Bruno Vayson\"","divers":"Château de Murs \r\nFortifications de Murs \r\nVestiges d'un château proche de Murs","gps":"","images":["../image/image_84/84_Murs_1.jpg","../image/image_84/84_Murs_2.jpg","../image/image_84/84_Murs_3.jpg","../image/image_84/84_Murs_4.jpg","../image/image_84/84_Murs_5.jpg","../image/image_84/84_Murs_6.jpg","../image/image_84/84_Murs_7.jpg"]},"Consult_chateau_formulaire4c8c":{"id":"Consult_chateau_formulaire4c8c","dept":"84","canton":"Orange","commune":"Châteauneuf-du-Pape","nom":"Nerthe","type":"Château","periode":"XVII","histoire":"Nerthe: Au XVIe siècle le domaine appartenait aux frères de Tulle de Villefranche, famille originaire du Pièmont, et s'appelait \"Grange de Beauvenir\" érigé en fief,  et en 1695 commença la construction du château par Gaspard de Tulle de Villefranche et fut continué par Jean Baptiste Franque en 1736 et aux  Malessy, en 1870 fut acquis par Joseph Ducos maire de Châteauneuf et député Vauclusien. \r\nAu décés de Monsieur Ducos en 1910 le château passa à son gendre Théodore Nicolay et connut d'autres propriétaires,  puis occupé par les allemands en 1944 il subit des bombardements. \r\nEn 1985 acheté par monsieur Richard  qui la confié  depuis 1991  à Alain Dugas pour la remise en valeur du vin. \r\nCe château est renommé par ses vins.","architecture":"Château de construction classique de la Provence au XVIIe siècle, corps de logis central avec fronton, accolé aux extrémités par un pavillon plus élevé différent l'un de l'autre, celui de gauche posséde une porte en avancé avec occulus sur la partie haute, et terrasse bordée d'une balustrade de pierre donnant sur le parc.","habitants":"Famille de Tulle de Villefranche\"","divers":"","gps":"","images":["../image/image_84/84_Nerthe_1.jpg","../image/image_84/84_Nerthe_2.jpg"]},"Consult_chateau_formulaire98f5":{"id":"Consult_chateau_formulaire98f5","dept":"84","canton":"Bonnieux","commune":"Oppéde-le-Vieux","nom":"Oppede","type":"Vestiges","periode":"XII","histoire":"Oppéde le Vieux: Au XIIe siècle le comte de Toulouse, Raimond VI cèda le domaine en 1209  à la cour pontificale, lorsque Rodrigue de Luna, neveu du pape  Benoit XIII garda la frontrière du Comtat de 1409 à 1411; Guillaume de Baux,  puis Jean Cadard reconstruisirent le domaine confié par le pape Alexandre VII à Accurse de Meynier, primicier de l'université d'Avignon; C'est son fils Jean, premier président du parlement d'Aix et Baron d'Oppède qui provoquera le terrible massacre des Vaudois de la région en 1545. \r\nLe château toujours dans les mains du baron Maynier c'est sa petite fille Claire de Pérussis qui apportera  par alliance le château a Jean de Forbin , jusqu'à la Révolution.","architecture":"Ce château est un amalgame de vestiges du XIIe siècle ainsi que les murs d'enceinte qui encercle ce dernier, des tours carrées fortifiaient l'ensemble percé d'archères transformées en meurtrières. \r\nPillé et démantelé aprés la Révolution il  présente aujourd'hui, des vestiges du XVe siècle à part une belle tour carrée.","habitants":"Famille Maynier\r\nFamille de Jean Cadard \"","divers":"Vestiges du village et du château","gps":"","images":["../image/image_84/84_Oppede_1.jpg","../image/image_84/84_Oppede_2.jpg","../image/image_84/84_Oppede_3.jpg","../image/image_84/84_Oppede_4.jpg","../image/image_84/84_Oppede_5.jpg","../image/image_84/84_Oppede_6.jpg","../image/image_84/84_Oppede_7.jpg","../image/image_84/84_Oppede_8.jpg"]},"Consult_chateau_formulaire2b5e":{"id":"Consult_chateau_formulaire2b5e","dept":"84","canton":"Orange","commune":"Orange","nom":"Orange","type":"Vestiges","periode":"IX","histoire":"Orange était une principauté  au XIe siècle; les seigneurs était les d'Orange-Nice. \r\nEn 1096, Rambaud de Nice part à la croisade, sa fille, Tiburge fonde la principauté.    \r\nDe 1130 à 1173, Orange passe dans les mains des seigneurs d'Orange-Montpellier. \r\nDe 1173 à 1215. Les seigneurs de Montpellier et des Baux deviennent co-seigneurs d'Orange, puis se rajouta les chevaliers de St-Jean de Jérusalem jusqu'en 1340.\r\n En 1307 Charles d'Anjou, comte de Provence donna sa part à Bertrand de Baux.   \r\nEn 1325 Raimond V devient prince d'Orange,  lui succède de 1340 à 1393, Raimond VI des Baux dernier prince.   \r\nEn 1386, Raimond VI marie sa fille Marie des Baux à Jean de Chalon-Arlay deviendra prince d'Orange au décés de son beau-père et restera dans ses mains jusqu'en 1530.  \r\nA la mort du prince Philibert de Chalon passa dans les mains de René de Nassau son neveu qui mourut au combat en 1544,  l'héritier son cousin Guillaume de Nassau âgé de onze ans, la principauté est  géré par Françoise de Longwy sous la protection du roi de France.\r\nEn 1548 Orange se rebelle contre le prince et Henri II donne la principauté en 1551 à Marie de Lorraine, reine douairière d'Ecosse jusqu'en 1553 et en 1559 Guillaume de Nassau reprend la principauté et en 1561 conflits contre les troupes du pape, en 1562 les troupes catholiques s'emparent d'Orange  massacrant \"papistes et Huguenots\". \r\nEn 1568, le baron de la Garde s'établit dans la principauté pour rétablir la paix et  en 1584 Guillaume succombe, Philippe le remplace et meurt en 1618 remplacé par son frère Maurice Stadhouder de Hollande, passa ensuite aux mains de Frédéric Henri de Nassau en 1625, Guillaume II de Nassau en 1647  et Guillaume III de Nassau en 1650 qui deviendra roi d'Angleterre. \r\nEn 1672  guerre entre Guillaume III et Louis XIV qui ordonna de détruire les bastions et en 1713 par le traité d'Utrecht Orange fait parie du royaume de France. \r\nChâteau COINTE du XVIIIe siècle. \r\nChâteau Crochant d'Alexis Gruss à Piolenc du XVIIIe siècle, musée familial du \"cirque à l'ancienne\".","architecture":"Il reste quelques vestiges sur la colline de Saint-Eutrope où il fut édifié au IXe siècle un château par Tiburge d'Orange, Jean Ier de Chalon l'agrandit,  Maurice de Nassau le fortifia et en 1618 Maurice Stadhouder fit édifier une formidable forteresse dominée par le château  et fut à l'époque une place forte de l'Europe,  démantelé par Louis XIV en 1663 par le comte de Grignan.                    Orange posséde un patrimoine monumental ; le théatre antique, et l'un des plus beau du monde romain et le mieux conservé; il fut élevé après la victoire de César sur les Gaulois, en 49 avant J. C.  l'arc de triomphe: érigé entre les années 10 et 25 avant J.C. à l'entrée de la ville est une\" porte monumentale\" remarquable par ses bas reliefs sculptés des scènes de guerres et de trophées, unique arc à trois baies de la région.","habitants":"Seigneurs de Montpellier et des baux Charles d'Anjou\"","divers":"Théatre antique\r\nArc de Triumph\r\nChâteau Crochant (Gruss)\r\nChâteau Cointe","gps":"","images":["../image/image_84/84_Orange_1.jpg","../image/image_84/84_Orange_2.jpg","../image/image_84/84_Orange_3.jpg","../image/image_84/84_Orange_4.jpg","../image/image_84/84_Orange_5.jpg","../image/image_84/84_Orange_6.jpg"]},"Consult_chateau_formulaire2fe1":{"id":"Consult_chateau_formulaire2fe1","dept":"84","canton":"Carpentras","commune":"Pernes-les-Fontaines","nom":"Pernes_les_ Fontaines","type":"Vestiges","periode":"XII","histoire":"Pernes les Fontaines, capitale du Comtat venaissin depuis 968.\r\n Au XI e siècle, fief de la famille des Baux puis passa au XIIe siècle aux comtes de Toulouse Raymond VII est tenu de fiancer sa fille Jeanne à Alphonse de Poitiers (Charles d'Anjou), frère de Saint-Louis et de lui donner le comtat en dot, le mariage aura lieu en 1237 et à la mort d'Alphonse  (1271) le roi Philippe III le Hardi, son neveu s'en empare il le gardera tois ans avant de le céder au pape Grégoire X qui  y installe ses sénéchaux et vasseaux  et  Pernes  perdrat son titre de capitale en 1320 Jean XXII transfère le siège du rectorat à Carpentras, les états pontificaux sont  réunit à la France. Sombre période du XV au XVIIIe siècle ou se succédèrent les guerres  et les épidémies.","architecture":"Pernes posséde de  nombreux vestiges de fortifications qui justifient le titre de perle du Comtat; la porte Villeneuve du XVIe siècle flanquée de deux tours avec mâchicoulis et chemin de ronde, la tour Ferrande du XIIe siècle, tour carrée  contient des fresques de 1275 sur l'histoire de la conquête de la Sicile par Charles d'Anjou, la  porte Saint-Gilles du XIVe siècle et la porte Notre Dame du XVIe siècle dont le pont levis fut remplacé par une autre arche. D'autres vestiges dans la ville: maison des Hospitaliers de Saint-Jean de Jérusalem,  la tour de l'horloge du XIIe siècle dernier vestige du château des comtes de Toulouse (donjon, tour carrée XII )  surmonté d'un joli campanile de fer forgé.  \r\nChâteau d'Anselme du XVe siècle trés remanié XIXe siècle avec sa superbe porte renaissance. \r\nDans cette ville  des hôtels, des fontaines et des églises du XIVe siècle. Dans le voisinage à la Roques sur Pernes, village perché possède  les restes d'un château dit de la Roque du XII e siècle restauré, qui domine le village.","habitants":"Citée Papale\"","divers":"Porte et Château d'Enselme\r\nChâteau de la Roque","gps":"","images":["../image/image_84/84_Pernes_les_Fontaines_1.jpg","../image/image_84/84_Pernes_les_Fontaines_2.jpg","../image/image_84/84_Pernes_les_Fontaines_3.jpg","../image/image_84/84_Pernes_les_Fontaines_4.jpg","../image/image_84/84_Pernes_les_Fontaines_5.jpg","../image/image_84/84_Pernes_les_Fontaines_6.jpg","../image/image_84/84_Pernes_les_Fontaines_7.jpg"]},"Consult_chateau_formulairedaa1":{"id":"Consult_chateau_formulairedaa1","dept":"84","canton":"Pertuis","commune":"Pertuis","nom":"Pertuis","type":"Château","periode":"XIV","histoire":"Pertuis; Avant le Moyen-Age s'appelait \"Pertus\" était le fief des évêques de Cavaillon, donation contestée par l'héritier direct le fils du vicomte de Nivolon mais bénéficie avec le comte de provence d'une importante part de droits. \r\nEn 1105 s'effectue la séparation des comtés de Provence et de Forcalquier, et Pertuis fut rattaché a ce dernier. \r\nAu XIIIe siecle, un conflit oppose la famille de Sabran à l'héritière  de Guillaume II, Garsende de Forcalquier, un accord  intervient en 1242. \r\nLe château détruit en 1596 par le duc de Guise. Dans la commune il y a le château du GRAND-CALLAMAND viticole.","architecture":"Vestiges des remparts  du XIVe siècle dont la tour saint  Jacques et la tour de l'horloge ancien donjon du château.","habitants":"Famille du comte de Forcalquier\"","divers":"Remparts et tour st-Jacques \r\nTour de L'horloge(Donjon)","gps":"","images":["../image/image_84/84_Pertuis_1.jpg","../image/image_84/84_Pertuis_2.jpg","../image/image_84/84_Pertuis_3.jpg","../image/image_84/84_Pertuis_4.jpg","../image/image_84/84_Pertuis_5.jpg","../image/image_84/84_Pertuis_6.jpg","../image/image_84/84_Pertuis_7.jpg"]},"Consult_chateau_formulaire2b21":{"id":"Consult_chateau_formulaire2b21","dept":"84","canton":"Carpentras","commune":"Mormoiron","nom":"Pesquier","type":"Château","periode":"XVIII","histoire":"Pesquier: Les propriétaires du domaine, la famille Bastide qui l'acquiert  en 1970 au descendant du célèbre écrivain Alphonse Daudet pour continuer la vigne, région vinicole depuis des siècles. \r\nCe domaine qui passa entre les mains de divers seigneurs, les comtes de Mormoiron, aux marquis de Reilhanette et les seigneurs  de Maubec.  \r\nAujourd'hui  Monsieur Chaudière et fils continue l'exploitation.","architecture":"Demeure du XVIIIe sièclede style provençal allongée avec porte d'entrée centrale et tour carrée.","habitants":"Famille Bastide\"","divers":"","gps":"","images":["../image/image_84/84_Pesquier_1.jpg","../image/image_84/84_Pesquier_2.jpg"]},"Consult_chateau_formulaire7c0b":{"id":"Consult_chateau_formulaire7c0b","dept":"84","canton":"Vaison-la-Romaine","commune":"Puyméras","nom":"Puymeras","type":"Château","periode":"XII","histoire":"Puyméras: Du château du XIIe siècle perçé de meurtrières des sires du Puy, Vassaux des comtes de Toulouse, puis  des Blégier de Taulignan servit de carrières et en 1965 une restauration a sauvé ce qui reste et une construction neuve est venue s'élever sur les lieux.","architecture":"Le village se créa au Haut Moyen Age autour des deux buttes, le château d'un côté et le village de l'autre entouré d'une enceinte; Subit les guerres de religion en 1589 par les troupes de Lesdiguières dont cinquante pour cent de la population fut massacrée. \r\nDes vestiges il reste des éléments de remparts , la tour carrée, une tour ronde prise dans une maison, la porte de Sabrun et les vestiges du château. \r\nA 2 km du village vestiges du château de Faucon et de ses remparts.","habitants":"Famille Blégier de Taulignan\"","divers":"Vestiges du château et rempart","gps":"","images":["../image/image_84/84_Puymeras_1.jpg","../image/image_84/84_Puymeras_2.jpg"]},"Consult_chateau_formulaire56a8":{"id":"Consult_chateau_formulaire56a8","dept":"84","canton":"Vaison-la-Romaine","commune":"Rasteau","nom":"Rasteau","type":"Vestiges","periode":"XII","histoire":"Rasteau: Château fondé au XIIe siècle par les évêques de Vaison.Ancienne résidence épiscopal, Pierre de Mirabel évêque de Vaison le mentionne et ces derniers en étaient les seigneurs.  En 1188 Raymond de Toulouse comte de Provence, déclanche un conflit avec l'évêque Béranger de Reillane et s'empara deu Village.","architecture":"Vestiges d'un château du XII siècle, des remparts subsistent encore comme  le portalet qui était l'entrée du village  ou une tour  fut surmontée en 1753 pour l'installation de l'horloge.","habitants":"Evêques de Vaison\"","divers":"","gps":"","images":["../image/image_84/84_Rasteau_1.jpg","../image/image_84/84_Rasteau_2.jpg","../image/image_84/84_Rasteau_3.jpg"]},"Consult_chateau_formulaire6e91":{"id":"Consult_chateau_formulaire6e91","dept":"84","canton":"Valréas","commune":"Richerenches","nom":"Richerenches","type":"Temple","periode":"XII","histoire":"Richerenches: Ce Temple naquit en 1118 à Jérusalem, ses membres se distinguèrent en Palestine. \r\nIls acquirent d'importantes richesses et devinrent les banquiers des papes  et de nombreux princes. Ce n'est qu'en 1128 qu'ils apparaissent en France. \r\nLe seigneur Hugues de Bourbouton offre en 1136 au chevalier Arnaud de Bedos les terres de Richerenches à partir de cette date va naître la \"Commanderie des templiers de Provence\"; Arnaud de Bedos devint le premier commandeur en 1140, en 1145 Hugues de Bourbouton lui succéda et lui fit don de tous ses biens .\r\n En 1312 tous furent donnés aux Hospitalliers de Saint-Jean-de-Jérusalem commanderie des Templiers; Prit d'assaut en 1335 par Guichard de Poitiers et Hugues d'Adhémar, le village fut pillé et déserté. \r\nLe pape Jean XXII au XIVe siècle résidant en Avignon racheta où hérita  le territoire de Richerenches ainsi que Valréas, Visan et Grillon afin de posséder une place forte à l'intérieur des Etats du Dauphiné et de pouvoir consommer du bon vin.","architecture":"Entouré  de remparts flanqués de quatre tours d'angle du XIVe siècle aujourd'hui arrasés à l'allure de forteresse  et vestiges de la première commanderie des Templiers de Provence, dont la porte Ouest à mâchicoulis est surmontée, aujourd'hui de la tour de l'horloge. \r\nDe l'enceinte de la commanderie ne subsiste qu'un seul monument \"le temple où grange templière\" édifié en pierres dorées de 32 mètres sur 11.","habitants":"Commandeur Arnaud de Bedos\"","divers":"Commanderies remparts, portes et tours","gps":"","images":["../image/image_84/84_Richerenches_1.jpg","../image/image_84/84_Richerenches_2.jpg","../image/image_84/84_Richerenches_3.jpg"]},"Consult_chateau_formulairec62a":{"id":"Consult_chateau_formulairec62a","dept":"84","canton":"Vaison-la-Romaine","commune":"Roaix","nom":"Roaix","type":"Château","periode":"XIII","histoire":"Roaix doit son origine à une commanderie des Templiers  fondée en 1137.","architecture":"Manoir construit au XIIIe siècle remanié au XVIIe siècle.","habitants":"Les Templiers\"","divers":"","gps":"","images":["../image/image_84/84_Roaix_1.jpg"]},"Consult_chateau_formulaired4ab":{"id":"Consult_chateau_formulaired4ab","dept":"84","canton":"Avignon","commune":"Pontet","nom":"Roberty","type":"Château","periode":"XVIII","histoire":"Roberty: Cité en 1578 par un vaste domaine, sur cet emplacement Antoine Auguste de Monnery fait édifier au XVIIIe siècle le château actuel.       Quartier Général de l'armée du général Carteaux, la somptueuse demeure  accueilli  Bonaparte en 1793 en mission  en Avignon est venu se mettre à la disposition du général Fox  qui avait établi son quartier de l'armée du général Carteaux; Charles Thomas, ayant fait fortune dans la filature racheta le château, ce dernier  posséde des tableaux de la famille Carle et Horace Vernet, propriétaire actuel  Monsieur Radolpho del Drago et de madame Dany Teider.","architecture":"Demeure du XVIIe siècle  entourée  d'un beau parc et d'un champ de course hippique.","habitants":"Famille Antoine Auguste de Monnery\"","divers":"","gps":"","images":["../image/image_84/84_Roberty_1.jpg","../image/image_84/84_Roberty_2.jpg"]},"Consult_chateau_formulaire3538":{"id":"Consult_chateau_formulaire3538","dept":"84","canton":"Apt","commune":"Apt","nom":"Roquefure","type":"Château","periode":"XIV","histoire":"Roquefure:Ce château installé sur un socle rocheux, remonte au XIVe siècle appartient en copropriété à la ville et à l'évêque d'Apt, mais le site fut surtout un repaire de brigands en raison de son isolement. \r\nA était largement restauré par monsieur de Châtenet.","architecture":"Bâtisse rectangulaire classique.","habitants":"Les Evêques d'Apt\"","divers":"","gps":"","images":["../image/image_84/84_Roquefure_1.jpg"]},"Consult_chateau_formulaire2b9f":{"id":"Consult_chateau_formulaire2b9f","dept":"84","canton":"Gordes","commune":"Roussillon","nom":"Roussillon","type":"Vestiges","periode":"XV","histoire":"Roussillon: Village renommé par ses couleurs d'ocre, qui plonge ses raçines bien au-delà de la présence romaine,  premier exploitant de l'ocre et occupant du Castrum, la tour de l'horloge vestige du château.","architecture":"Beffroi: La tour de l'horloge  et ancienne porte du castrum de l'enceinte fortifiée, il a été remanié au XIXe siècle en clocher annexe de l'église seul vestige du château  qui fut construit en 987.","habitants":"\"","divers":"","gps":"","images":["../image/image_84/84_Roussillon_1.jpg","../image/image_84/84_Roussillon_2.jpg","../image/image_84/84_Roussillon_3.jpg","../image/image_84/84_Roussillon_4.jpg"]},"Consult_chateau_formulaire4d00":{"id":"Consult_chateau_formulaire4d00","dept":"84","canton":"Orange","commune":"Châteauneuf-du-Pape","nom":"Royas  _Fontsalette","type":"Château","periode":"XVII","histoire":"Royas_Fontsalette: Louis Reynaud qui possédait le château de la Tour à Sarrians depuis 1838 et son fils Albert Reynaud notaire en 1880 se reconvertit dans le vignoble et acheta Royas, Fontsalette  commune de Lagarde Paréol fut acheté par sa descendance en 1945, tous ces châteaux sont toujours dans la famille.","architecture":"Divers châteaux  pour cette famille de viticulteur Royas et Fontsalette.","habitants":"Famille Reynaud\"","divers":"Château de Royas\r\nChâteau de Fontsalette","gps":"","images":["../image/image_84/84_Royas_Fontsalette_1.jpg","../image/image_84/84_Royas_Fontsalette_2.jpg","../image/image_84/84_Royas_Fontsalette_3.jpg"]},"Consult_chateau_formulairea946":{"id":"Consult_chateau_formulairea946","dept":"84","canton":"Apt","commune":"Rustrel","nom":"Rustrel","type":"Château","periode":"XVII","histoire":"Le fief de Rustrel appartenait au XIIe siècle et au XIIIe siècle à la famille de Simiane, puis passa en 1312 aux d'Anduze. \r\nEn 1391 Raymond de Turenne met à sac le village et le château qui passa quelques années plus tard dans la famille de Lévis ( 1380-1440), vicomte de Lautrec, avec Antoinette d'Anduze, héritière de la baronnie de la Voulte et du château de Rochemaure, dont leurs enfants Louis et son fils Gilbert I  participent aux guerres d'Italie et en 1578 Gilbert III gendre du connétable de Montmorency, est fait duc de Ventadour. \r\nLe château fut construit par Anne-louis de Levis de Ventadour au début du XVIIe siècle qui succède à un édifice plus ancien et cinq ans après la mort d'Anne-Louis de Lévis-Ventadour, la communauté d'Apt acquiert des héritiers le fief de Rustrel qu'elle conservera jusqu'en 1643, date de sa revente par lots; Rustrel aura plusieurs co-seigneurs,  dont Jean-Baptiste Gauthier de Monguers et les d'Archias qui réunifieront le domaine et le garderont jusqu'à la Révolution, vendu comme bien national, le château fut acquis par François Blanc restera dans sa descendance jusqu'en 1847 et sera acquis par la commune qui abrite aujourd'hui la mairie.","architecture":"De ce château qui succéda à un édifice plus ancien fut construit en 1620, demeure massive, de style renaissance quadrangulaire cantonné de tours rondes dans ses angles.","habitants":"Famille des Lévis de Ventadour\"","divers":"","gps":"","images":["../image/image_84/84_Rustrel_1.jpg","../image/image_84/84_Rustrel_2.jpg"]},"Consult_chateau_formulaire6173":{"id":"Consult_chateau_formulaire6173","dept":"84","canton":"Apt","commune":"Saigon","nom":"Saigon","type":"Vestiges","periode":"XII","histoire":"Château de St-Quintin du XVIIe siècle, résidence de Joseph François de Remerville  (1650  1730) poêt et historien.\r\nVieux  village au XIIe siècle qui fut en quelques sortes la citadelle d'Apt,  possédait trois châteaux  depuis ils sont ruinés, reste d'enceinte fortifiée du premier château  construit par les sires de Simiane  de 1276  à 1388.  \r\nLa ville d'Apt qui posséde des droits sur ce dernier le fait agrandir. Puis passa  aux évêques d'Apt. Dans cette commune un autre château \"Château de Valcroissant;  André Marmet de Valcroissant, grand capitaine, conseiller de Louis XIV et hommes de lettres.","architecture":"Vestiges de l'enceinte  fortifiée rue du portail rouge et rue de la courtine, belle porte de la ville,  rue de l'horloge où se dresse le beffroi, tour carrée  surmontée d'une ébauche de campanile  Valcroissant;  Ce château qui date avant le XVIIIe siècle est flanqué d'une tour maladroitement restaurée après la seconde guerre mondiale.","habitants":"André Marmet de Valcroissant\"","divers":"Vestige à Saignon\r\nChâteau de Saint-Quintin\r\nChâteau de Valcroissant","gps":"","images":["../image/image_84/84_Saignon_1.jpg","../image/image_84/84_Saignon_2.jpg","../image/image_84/84_Saignon_3.jpg","../image/image_84/84_Saignon_4.jpg","../image/image_84/84_Saignon_5.jpg","../image/image_84/84_Saignon_6.jpg"]},"Consult_chateau_formulaire5fdb":{"id":"Consult_chateau_formulaire5fdb","dept":"84","canton":"Gordes","commune":"Lioux","nom":"Saint_Lambert","type":"Château","periode":"XV","histoire":"Accroché aux contreforts du Mont-Ventoux,  était le fief des évêques de Marseille et de Carpentras, en 1799 les paysans révoltés incendièrent le château, qui fut par la suite restauré et acheté par divers propriètaires avant de devenir en 1932  la propriété d'une administration publique et a été transformé en préventorium départemental, et en 1995 racheté par le centre hospitalier de Montfavet.","architecture":"Accroché aux contreforts du mont Ventoux, Sain-Lambert, avec ses tours puissantes, à conservé l'allure imposante des châteaux provençaux des XVIe et XVIIe siècle de Style Louis XV, malgré son incendie en 1799 fut très remanièé. Il conserve un pavillon de chasse du XVIIe siècle est d'une chapelle de cette époque.","habitants":"Evêques de Marseille\"","divers":"","gps":"","images":["../image/image_84/84_St_Lambert_1.jpg"]},"Consult_chateau_formulaire5d49":{"id":"Consult_chateau_formulaire5d49","dept":"84","canton":"Apt","commune":"St-Saturnin-les-Apt","nom":"Saint_Saturnin","type":"Vestiges","periode":"XI","histoire":"Saint-Saturnin les-Apt: Au XIe siècle fief des évêques d'Arles, de Senez et d'Apt,  puis passa aux comtes de Toulouse et de Forcalquier et se trouva par la suite sous la double juridiction du pape et du roi de France.","architecture":"Au début de notre ère, un \"castrum\" fut édifié , cerné par la suite de trois enceintes fortifiées, le village dominé par les ruines  de l'ancien château du XIe siècle et conserve ses trois enceintes fortifiées XIII, XIV et XVIe siècle, d'autres vestiges; portail Ayguier, tour de l'horloge, porte de la Roque et de Rome.","habitants":"Aux évêques d'Arles\"","divers":"Vestiges de la forteresse de saint-Saturnin","gps":"","images":["../image/image_84/84_St_Saturnin_1.jpg","../image/image_84/84_St_Saturnin_2.jpg","../image/image_84/84_St_Saturnin_3.jpg","../image/image_84/84_St_Saturnin_4.jpg","../image/image_84/84_St_Saturnin_5.jpg","../image/image_84/84_St_Saturnin_6.jpg","../image/image_84/84_St_Saturnin_7.jpg"]},"Consult_chateau_formulaire9185":{"id":"Consult_chateau_formulaire9185","dept":"84","canton":"Pertuis","commune":"Sannes","nom":"Sannes","type":"Château","periode":"XVII","histoire":"Sannes; Au Moyen Age un \"castrum\" de Sannes; à cette époque Pierre de Sannes possède le fief. \r\nAu XIIe siècle Sannes est acquis par le comte de Forcalquier, puis tombe par alliance  dans la famille de Sabran, à la  fin du XIVe siècle le castrum est détruit. \r\nLe fief est annexé par Ansouis et Cucuron; Mais en 1600 Sannes s'érige en communauté indépendante, le seigneur Jean de Tisaty construit le château, son fils Melchior le vend à la famille de Thibaud, qui remaniera le château (bastide seigneuriale) et  en 1709 une petite fille épouse Antoine de Saqui et cette famille Saqui-Sannes garderont le domaine jusqu'à la fin du XIXe siècle.","architecture":"Bastide seigneuriale comportant de belles structures architecturales       (porte à refends fronton coupé d'armoiries),  belle construction du XVIIe siècle, aujourd'hui domaine vinicole.","habitants":"Famille Saqui-Sannes\r\nfamille de Thibaud\"","divers":"","gps":"","images":["../image/image_84/84_Sannes_1.jpg"]},"Consult_chateau_formulaire9c92":{"id":"Consult_chateau_formulaire9c92","dept":"84","canton":"Sault","commune":"Sault","nom":"Sault","type":"Vestiges","periode":"XIII","histoire":"Sault: En 1034 l'empereur Henri II donna pour service rendu la baronnie de la terre de Sault à Agoult de Loup. \r\nDurant tout le Moyen-Age la maison d'Agoult va régner sur tout le pays de Sault (et d'Apt), jouissant d'une quasi-souveraineté entre le marquisat de Provence et le comté de Forcalquier.  \r\nLe 21 Janvier 1255, Raymond d'Agoult et Alphonse, comte de Toulouse signent un traité, confirmé en 1271 par Philippe III le Hardi, selon lequel le seigneur de Sault ne relève d'aucun souverain et choisit de son plein gré pour suzerain le comte de Toulouse.  \r\nPar la suite, les Agoult s'inclinèrent devant les comtes de Provence.\r\n En 1291, Isnard de Pontevès d'Agoult, seigneur baron suzerain de Sault et sa vallée, en céda la haute souveraineté à Charles II de Provence. \r\nEn Avril 1561, Charles IX réunit à la baronnie de Sault tous les fiefs que  possédait  le sieur d'Agoult.            Tout cet ensemble fut érigé  en comté,  qui passa en 1613 entre les mains de la famille Créquy-Lesdiguières. \r\nEn 1789, Sault fut dans un premier temps rattaché au département des Alpes de Hautes Provence puis sera annexé au Vaucluse en 1793.","architecture":"Le château féodal et les remparts qui entouraient la ville, il ne reste que quelques tours transformées en habitations.","habitants":"Famille d'Agoult  \"","divers":"","gps":"","images":["../image/image_84/84_Sault_1.jpg"]},"Consult_chateau_formulaire2c6a-2":{"id":"Consult_chateau_formulaire2c6a-2","dept":"84","canton":"Isle-sur-la-Sorgue","commune":"Saumane-de-Vaucluse","nom":"Saumanes","type":"Château","periode":"XII-XV","histoire":"Saumanes: Dès 880 il existait à Saumanes un château où séjourna Boson, roi d'Arles et de Provence. \r\nLa seigneurie passa par la suite à la maison des Baux d'Orange; au XIIIe siècle, Saignet d'Astoaud l'alièna à l'antipape Benoit XIII. \r\nLes Sades apparaissent  à Saumanes en 1431, année où le pape Nicolas Vl donna pour être tenu en fief à son écuyer Baudet de Sade; La maison de Sade était une des plus célèbres de Provence, Comptant de nombreux évêques, diplomates et magisrtrats; Elzéar de Sade avait été en 1416 autorisé par l'Empereur d'Allemagne Sigimond à porter l'aigle impériale dans ses armes. \r\nEn 1745 arrivait au château Donatien-Alphonse-François de Sade qui sera le démoniaque\" Marquis de Sade\"  fils du comte de Sade  diplomate qui avait en 1741 négocié le traité de Nymphenbourg entre l'electeur de Cologne, la France et l'Espagne. \r\nLe personnage le plus important fut Jacques-François-Paul-Aldonce qui fit une belle carrière ecclésiastique, abbé d'Ebreuil qui se retira à Saumane en 1752  pour s'occuper de l'éducation de son neveu François Donatien; Les Sade sont restés propriètaires de Saumanes durant quatre siècles. \r\nEn 1814 les descendants  vendirent à   monsieur Rey et en 1868 monsieur Paul Croset le racheta et le sauva de la ruine , aujourd'hui toujours dans la descendance.","architecture":"Le château forteresse construit au XIIe siècle puis transformé en véritable bastion au XVe siècle, il fut abandonné à la révolution pour être ensuite restauré au XIXe siècle.               C'est sans doute Jean de Sade qui fit aménager la cour intérieure et son système de défense fait pour recevoir canons et couleuvrines, et construire l'escalier renaissance dans la forteresse du XVe siècle, massive et  inachevée,  remanié du XVIe au XVIIIe siècle, la porte d'entrée  est surmontée d'une échauguette à mâchicoulis. Aujourd'hui découronnée avec meutrières obstruées.","habitants":"Famille de Sade\r\nJacques-François-Paul-Aldonce de Sade\"","divers":"","gps":"","images":["../image/image_84/84_Saumanes_1.jpg","../image/image_84/84_Saumanes_2.jpg","../image/image_84/84_Saumanes_3.jpg","../image/image_84/84_Saumanes_4.jpg"]},"Consult_chateau_formulairec305":{"id":"Consult_chateau_formulairec305","dept":"84","canton":"Vaison-la-Romaine","commune":"Séguret","nom":"Seguret","type":"Vestiges","periode":"XII","histoire":"Seguret (signifie lieu sur) vu sa situation. \r\nAu XIIe siècle c'était le fief des comtes de Toulouse. \r\nLe village était une commune libre du XIIIe siècle jusqu'à la Révolution.\r\n En 1685 une confrérie vineuse vit le jour.","architecture":"Ruines du château féodal, une partie de l'enceinte encore visible côté Est, le long de la butte qui porte les ruines du château médiéval mais le village a gardé son caractère médiéval, Porte Reynier du XIIe siècle.","habitants":"Comte de Toulouse\"","divers":"","gps":"","images":["../image/image_84/84_Seguret_1.jpg","../image/image_84/84_Seguret_2.jpg","../image/image_84/84_Seguret_3.jpg"]},"Consult_chateau_formulaire9089":{"id":"Consult_chateau_formulaire9089","dept":"84","canton":"Bédarides","commune":"Sorgues","nom":"Sorgues","type":"Château","periode":"XII","histoire":"Sorgues: Cité en 1063 Pons Sorgie, consulat au XIIe siècle, fief des comtes de Toulouse qui y construisirent un château qui fut rasé et Jean XXII en construit un autre en 1317, il abritait un atelier monétaire jusqu'en 1354 où Boniface VIII fit frapper les premières pièces des pontifes d'Avignon. L'ancienne communauté de Gigognan, incluse dans le domaine était un fief des évêques d'Avignon. \r\nEn 1562 le village fut saccagé par les troupes du Baron des Adrets, il fut déserté au XVIIe siècle.","architecture":"Sorgues; Vestiges du château féodal \"le Castellas\" reconstruit par Jean XXII, donjon carré et reste de courtines. Château de Saint  Hubert d'origine trés ancienne refait au XVIIe et XVIIIe siècle, belle façade avec pavillon central arondi , couronné d'une ballustrade.il abrite maintenant une maison de retraite et un hospice.  Château de Brantes ou de Silvan bâtiment et deux corps de logis vaste. Château de la Serre médièval renaissance , lourdement restauré au XIX en nèo renaissance. \r\nChâteau de l'Oiselet sur une ile sur le Rhône du XIII et XVII e siècle portes en tiers points accolées à une tour ronde . Château  Panard (centre aéré) Château Ronquet-Guerre et château Rassis de Monsieur des Jeures. \r\nChâteau de Fontgaillarde flanqué de tour ronde crénelée.","habitants":"Saint-Siège\"","divers":"Château St-Hubert\r\nChâteau de Fontgaillarde","gps":"","images":["../image/image_84/84_Sorgues_1.jpg","../image/image_84/84_Sorgues_2.jpg","../image/image_84/84_Sorgues_3.jpg","../image/image_84/84_Sorgues_4.jpg","../image/image_84/84_Sorgues_5.jpg","../image/image_84/84_Sorgues_6.jpg"]},"Consult_chateau_formulairebd0a-2":{"id":"Consult_chateau_formulairebd0a-2","dept":"84","canton":"Loriol-du-Comtat","commune":"Aubignan","nom":"Talaud","type":"Manoir","periode":"XVIII","histoire":"Talaud: Chambres d'hôtes de Mr Conny et Hein Dietres","architecture":"Corps de logis rectangulaire classique","habitants":"Famille Conny\"","divers":"","gps":"","images":["../image/image_84/84_Talaud_1.jpg","../image/image_84/84_Talaud_2.jpg"]},"Consult_chateau_formulaireaa5d":{"id":"Consult_chateau_formulaireaa5d","dept":"84","canton":"Vaison-la-Romaine","commune":"St-Marcellin-les-Vaison","nom":"Taulignan_les_Vaisons","type":"Château","periode":"XVI","histoire":"Taulignan les Vaisons: Les seigneurs de Saint-Marcellin les Vaisons, les Mévouillon qui possédaient au XIIIe siècle que les Montauban leur avait cédé en 1214, cette seigneurie habitait dans un château qui se trouvait sur la partie supérieure. \r\nLes Montauban récupérèrent la seigneurie en 1255 grâce à l'alliance d'Almuse de Mévouillon qui devient l'épouse de Dragonnet II de Montauban une chapelle isolée dernier témoin de cette médiévalité; La descendance  le marquis de Taulignan fit construire le château de Taulignan au XVIe siècle et aujourd'hui  est la proprièté de Monsieur Daillet qui en a fait des chambres d'hôtes.","architecture":"Du château  du XIIe siècle ne subsiste qu'une portion de l'enceinte, percée de deux longues meutrières à bêche et une porte en arc plein cintre;  Taulignan: Corps de logis quadrangulaire à trois niveaux flanqué d'une tour ronde crénelée.","habitants":"Famille des de Montauban\r\nFamille de Remy Daillet\"","divers":"","gps":"","images":["../image/image_84/84_Taulignan_les_Vaisons_1.jpg"]},"Consult_chateau_formulaire4e41":{"id":"Consult_chateau_formulaire4e41","dept":"84","canton":"Pernes-les-Fontaine","commune":"St-Didier","nom":"Thezan","type":"Château","periode":"XV","histoire":"Thezan: Fief des évêques de Venasque  puis des comtes de Toulouse  et au XIIIe siècle il fut cédé au comtat Venaissin au pape tout en restant dans la propriété des seigneurs de Venasque. \r\nEn 1483, Siffreine de Venasque dernière du nom, famille qui construisit le château, apporta en dot à Elzéar de Thézan, cette famille Thézan-Venasque restèrent propriétaire jusqu'en 1779. \r\nA la mort  du dernier marquis de Thézan, sa fille hérita  mariée  à son cousin Pons de Thézan-Poujols, qui conservèrent le château jusqu'en 1810 et le vendirent à Madame la comtesse de Baume-Suze, puis passa au marquis de Gigondas de la Garde, puis en 1863 au docteur Adolphe Masson qui y fit un centre hydrothérapie et aujourd'hui au docteur Jean-Marie Masquin.","architecture":"Château du XVe siècle, flanqué de deux tours rondes décoratives, une porte d'entrée en tiers-point donne accés à la cour d'honneur. \r\nAu XIXe siècle aménagé en maison climatique et Hydrothérapie. Saint-Didier posséde un vestige de l'ancienne enceinte du XVe siècle \"la porte tour\".","habitants":"Famille Thézan Venasque\"","divers":"Porte et château de Thézan","gps":"","images":["../image/image_84/84_Thezan_1.jpg","../image/image_84/84_Thezan_2.jpg","../image/image_84/84_Thezan_3.jpg","../image/image_84/84_Thezan_4.jpg"]},"Consult_chateau_formulaire3fac":{"id":"Consult_chateau_formulaire3fac","dept":"84","canton":"Isle-sur-la-Sorgue","commune":"Thor","nom":"Thor_Thouzon","type":"Vestiges","periode":"XII","histoire":"Le fief du THOR faisait partie de la viguerie d'Apt, puissantes maisons des de Sabran, d'Agoult et de Simiane. Antique demeure des ducs de Caderousse restauré par la famille Courtet.         THOUZON :En 1014 était un monastére,  l'évêque de Cavaillon attribue aux bénédictins de Saint-André de Villeneuve la possession du mont-Touzon, en 1088 le comte de Toulouse s'y reservé l'albergue (droit qui oblige le vassal à offrir le gîte et le couvert) et le droit militaire.                              En 1171 le comte de Toulouse Raymond V prend la souveraineté du fief.  \r\nDès 1202 on parle de \"Castrum-monastère\" construit par les comtes de Toulouse.   En 1369 le château occupé par des brigands de grand chemin  et de nouveau occupé par les soldats du vicomte de Turenne et c'est le recteur Gaston de Montécatino qui chasse les envahisseurs en 1396. \r\nEn 1563 les huguenots avec à leur tête le baron des Adrets à l'assaut du  château qui en subit d'importants dégats, César de Branca  seigneur de Thouzon  et abbé de Saint-André  apporte des réparations et c'est en 1696 qu'ils vendent le château-monastère à Joseph Martin archiviste et secrétaire du roi, depuis cette époque le château est resté propriété privée.  \r\nReprit en 1987 par une association qui le maintienne en état pour des manifestations culturelles.","architecture":"Des remparts du village du Thor subsiste la porte Notre Dame XIVe siècle restaurée en 1847, transformée en beffroi avec un campanile bulbé en fer forgé.  Le château du Thouzon du XIIe siècle, remanié en 1723, restauré au XIXe siècle dans un style médièval enceinte quadrangulaire dominé à l'angle nord-ouest par un donjon carré à mâchicoulis était relié aux remparts.","habitants":"Les ducs de Caderousse\"","divers":"Portes et vestiges de rempart au Thor\r\nChâteau de Thouzon","gps":"","images":["../image/image_84/84_Thor_Thouzon_1.jpg","../image/image_84/84_Thor_Thouzon_2.jpg","../image/image_84/84_Thor_Thouzon_3.jpg","../image/image_84/84_Thor_Thouzon_4.jpg","../image/image_84/84_Thor_Thouzon_5.jpg","../image/image_84/84_Thor_Thouzon_6.jpg","../image/image_84/84_Thor_Thouzon_7.jpg","../image/image_84/84_Thor_Thouzon_8.jpg","../image/image_84/84_Thor_Thouzon_9.jpg"]},"Consult_chateau_formulaire5e3c":{"id":"Consult_chateau_formulaire5e3c","dept":"84","canton":"Pertuis","commune":"La Tour-d`Aigues","nom":"Tour_d`Aigues","type":"Vestiges","periode":"XIIe","histoire":"La tour d'Aigues: Les plus grands noms de Provence sont à l'origine du château; qui tire son nom des eaux \" aigues \" en provençal; les comtes de Forcalquier du XIIe siècle, et par alliance aux  Sabran au XIVe siècle qui firent construire le premier château avec un donjon carré couronné de mâchicoulis, puis aux Agoult au XVe siècle, et aux  de Bouliers par alliance de Catherine d'Agoult à Antoine de Bolliers, leur fils Jean-Louis-Nicolas (1532-1584) baron de Central,  héritera du domaine et d'une immense fortune ainsi que le comté Cental-en-Piémont, il entreprit la reconstruction du château féodal  par l'architecte Pierre Lescot et Jean Goujon.  \r\nLe château passa en héritage aux Créqui-Lesdiguières.  \r\nIls eurent la visite de Catherine de Médicis en 1579.  \r\nEn 1608, Chrétienne d'Aguerre, héritière des lieux, poursuit l'oeuvre et en  1720 Jean-Baptiste-Jérome de Bruny, premier président du parlement d'Aix, acquiert le domaine, il sera malheureusement détruit par un incendie en 1782, et dix ans plus tard la Révolution emportera ce qui restait d 'un des plus somptueux châteaux de Provence, le Conseil général  du Vaucluse le rachète en 1897 et entreprend de le restaurer en 1974 deux musées installés dans les caves du château.","architecture":"D'un manoir féodal fut transformé en forteresse; Une tour médièvale (donjon carré) du XIIe siècle toujours en place au centre de la cour remanié au XVIe siècle en château.\r\n En 1545 Jean Louis Nicolas de Bolliers fera creusé un énorme fossé alimenté en eau par l'étang de de la Bonde, à l'intérieur du rectangle de quatre vingts mètres de long et de soixante mètres de large , de 1550 à 1556 transforme le château en renaissance, précédé d'une porte monumentale  initiée de l'antique, deux immenses pilastres cannelés supportent l'architrave et un fronton rectangulaire, il encadre un arc de triumphe à deux niveaux séparés par une frise de trophées sculptées, construction de deux pavillons carrés et il fait habiller le donjon et les anciennes tours rondes, la ressemblance au Louvre est frappante, l'architecte  Ercole Nigra terminera les travaux en 1571 et de 1608 à 1612 seconde campagne de travaux  en 1719 aménagements des jardins 1780 premier incendie qui ravage l'aile nord 1792  pillage et de nouveau incendié brûle pendant cinq  jours et cinq nuits.","habitants":"Comte de Forcalquier\r\naux Créqui-Lesdiguières.\"","divers":"","gps":"","images":["../image/image_84/84_Tour_Aigues_1.jpg","../image/image_84/84_Tour_Aigues_2.jpg","../image/image_84/84_Tour_Aigues_3.jpg","../image/image_84/84_Tour_Aigues_4.jpg","../image/image_84/84_Tour_Aigues_5.jpg","../image/image_84/84_Tour_Aigues_6.jpg","../image/image_84/84_Tour_Aigues_7.jpg","../image/image_84/84_Tour_Aigues_8.jpg","../image/image_84/84_Tour_Aigues_9.jpg"]},"Consult_chateau_formulairecccd":{"id":"Consult_chateau_formulairecccd","dept":"84","canton":"Carpentras","commune":"Sarrians","nom":"Tourreau","type":"Manoir","periode":"XVIII","histoire":"Tourreau: Edifié entre 1750 et 1770 par une famille de ce nom  qui possédait le domaine depuis 1600 à 1850, et passa à la famille Fraysse. \r\nMonsieur Claude de Boisanger, ambassadeur de France, en est le propriétaire depuis 1957.","architecture":"Edifié sur des plans de l'architecte avignonnais Esprit Brun , de style classique, pavillon central à fronton prolongé de deux ailes en quart de cercle bordant la cour d'honneur le château remplaçait un édifice modeste  du XVIIe siècle  dont il reste de cette époque que la chapelle.","habitants":"Famille de Tourreau\"","divers":"","gps":"","images":["../image/image_84/84_Tourreau_1.jpg","../image/image_84/84_Tourreau_2.jpg","../image/image_84/84_Tourreau_3.jpg","../image/image_84/84_Tourreau_4.jpg","../image/image_84/84_Tourreau_5.jpg","../image/image_84/84_Tourreau_6.jpg"]},"Consult_chateau_formulaire504d":{"id":"Consult_chateau_formulaire504d","dept":"84","canton":"Mormoiron","commune":"Mallemort-du-Comtat","nom":"Unang","type":"Manoir","periode":"XVIII","histoire":"UNANG: La villa Unang était déja cité au VIe siècle, elle fut donné à Jean, évêque de Carpentras.                   En 1160 Raymond V comte de Toulouse marquis de Provence  achète à Raymond de Carpentras  le château de Venasque et ses dépendances, la villa Saint-Félice (Château St-Félix).                     En 1348 la cité fut fortifiée par des remparts  flanqués de onze tours  et trois portes.                            Château Saint-Félix ancienne demeure d'été des évêques seigneurs et barons de Mallemort qui en jouiront jusqu'à la Révolution.                         Aujourd'hui chambres d'hôtes de Marie-Hélène Lefer.","architecture":"Corps de logis rectangulaire classique avec pavillon saillant aux extrémités.","habitants":"Famille Lefer\"","divers":"","gps":"","images":["../image/image_84/84_Unang_1.jpg","../image/image_84/84_Unang_2.jpg"]},"Consult_chateau_formulaire360e":{"id":"Consult_chateau_formulaire360e","dept":"84","canton":"Beaumes-de-Venise","commune":"Vacqueyras","nom":"Vacqueyras","type":"Vestiges","periode":"XIV","histoire":"VACQUERAS; en 1210 un traité de paix met un terme aux guerres des frontières qui opposaient Raymond de Toulouse marquis de Provence à Guillaume des Baux prince d'Orange pour recevoir le fief d'Uchaux; le comtat de vacquéras resta aux comtat Venaissin.                              En 1350 le châtelain prit possession du château, un Vassadel, cette famille gardera la seigneurie jusqu'au XVII siècle. En 1688 André Vassadel marie sa fille unique Charlotte  à Joseph Mathias fils de Louis de Castellane  marquis d'Ampuis ces derniers garderont la seigneurie jusqu'à la Révolution.       En 1760 le marquis de Sade s'étant amouraché de la délurée Laure de Lauris Castellane, mais son père syndic de la noblesse du comtat, seigneur de Vacqueras s'oppose à ce mariage. Dans ce château naquit le célèbre troubadour Raimbaut de Vaqueiras.","architecture":"Du château du XIVe siècle, au sommet du bourg, vestige d'une enceinte quadrangulaire du XIVe siècle, flanqué de tours aux angles; démantelé à la Révolution, il n'en reste que le côté Sud, deux portes subsistent encore donnant accès au vieux village, dans ce dernier il y a le château de Vassadel et une tour de garde du XIIe siècle.","habitants":"Famille de Vacquéras\"","divers":"","gps":"","images":["../image/image_84/84_Vacqueras_1.jpg"]},"Consult_chateau_formulaire988b-2":{"id":"Consult_chateau_formulaire988b-2","dept":"84","canton":"Vaison-la-Romaine","commune":"Vaison-la-Romaine","nom":"Vaison_la_Romaine","type":"Vestiges","periode":"XII","histoire":"Vaison la Romaine: Avant de devenir la cité romaine, Vaison fut la capitale celto-ligure administrative et politique de la tribu des Voconces. \r\nAu XIIe siècle, la ville appartenait pour moitié  à Raymond V  comte de Toulouse, Marquis de Provence  et à l'évêque Béranger de Reillane, en 1160 Raimond V récupera le fief contre les assaillans, et en 1178 Raimond VI comte de Toulouse fit construire le château Comtal qui remplace le château construit en bois qui avait été incendié. \r\nEn 1271 les papes succédèrent au comte de Toulouse sur décision du roi Philippe II le Hardi au profit du pape Grégoire X qui le récupére en 1274 et y installe une garnison.  \r\nAu XIVe siècle, le capitaine de Vaison sera un Sade  et au début du  XVIe siècle les huguenots essayèrent de s'en emparer,  puis  Joachim de Sade  améliora le confort du château; Vaison restera sous l'autorité du Saint-Siège jusqu'en 1791 date à l'annexion du Comtat Venaissin à la France. \r\nLe château  appartient aujourd'hui à la ville de Vaison.","architecture":"De plan carré donjon de treize mètres de haut du XIIe siècle est un grand témoin des tours défensives juchées sur les collines du Vaucluse, le rez de chaussée n'avait pas d'entrée il fallait passer par une ouverture au premier étage. Dans cette ville sont mis à jour des vestiges antiques dans les quartiers de Puymin et de la Villasse.","habitants":"Le Saint-Siège\r\ncomte de Toulouse\"","divers":"Vestiges du Château\r\nVillages féodal \r\nDécouvertes antiques","gps":"","images":["../image/image_84/84_Vaison_la_Romaine_1.jpg","../image/image_84/84_Vaison_la_Romaine_2.jpg","../image/image_84/84_Vaison_la_Romaine_3.jpg","../image/image_84/84_Vaison_la_Romaine_4.jpg","../image/image_84/84_Vaison_la_Romaine_5.jpg","../image/image_84/84_Vaison_la_Romaine_6.jpg","../image/image_84/84_Vaison_la_Romaine_7.jpg","../image/image_84/84_Vaison_la_Romaine_8.jpg","../image/image_84/84_Vaison_la_Romaine_9.jpg"]},"Consult_chateau_formulaire2af8":{"id":"Consult_chateau_formulaire2af8","dept":"84","canton":"Pertuis","commune":"Pertuis","nom":"Val_Joanis","type":"Château","periode":"XVIII","histoire":"Jean de Joanis , secrétaire de Louis III de Naples. \r\nAujourd'hui propriété de la famille Chancel depuis 1978 qui exploite la propriété vinicole et lavande.","architecture":"Demeure de trois niveaux, façades en equerre entourent une cour.","habitants":"Famille de Joanis\"","divers":"","gps":"","images":["../image/image_84/84_Val_Joanis_1.jpg"]},"Consult_chateau_formulaire42fd":{"id":"Consult_chateau_formulaire42fd","dept":"84","canton":"Bédarides","commune":"Courthezon","nom":"Val_Seille","type":"Château","periode":"XIX","histoire":"Val-Seille-Courthezon: Elie Dussaud entrepreneur en maçonnerie, bâtit une fortune liés à de nombreuses personnalités politiques et intellectuelles de son temps dont Georges Clémenceau, fut élevé à la dignité de grand officier de la légion d'honneur, fit édifier entre 1866 et 1868 le château de style pompéien, renaissance; mais  Dussaud décéde en 1899 sans postérité, il lègue sa fortune à ses deux soeurs survivantes ainsi qu'à son ami Jules Elie Guiffray et le château fut vendu en 1907 passa dans les mains de divers propriétaires dont le comte de Piolenc et acquis en 1942 par Hyppolite Jourdan, qui loue le château à la commune avec clause de promesse de vente et en 1952 la commune en  devient propriétaire.","architecture":"Corps de logis de forme carré à trois niveaux flanqué de tourelles en encorbellement sur la façade et tour crenelée côté jardin une synthèse de tous les styles décoratif de  l'époque avec des  lucarnes proches-orientales et jardin d'hiver avec galerie vitrée.","habitants":"Famille Elie Dussaud\"","divers":"","gps":"","images":["../image/image_84/84_Val_Seille_1.jpg","../image/image_84/84_Val_Seille_2.jpg","../image/image_84/84_Val_Seille_3.jpg","../image/image_84/84_Val_Seille_4.jpg"]},"Consult_chateau_formulairef237-2":{"id":"Consult_chateau_formulairef237-2","dept":"84","canton":"Valréas","commune":"Valréas","nom":"Valreas_Simiane","type":"Château","periode":"XIII","histoire":"Valreas-Simiane: Au début de l'empire de Charlemagne, au IXe siècle, un certain Valére (Valérius en latin) dut s'installer sur les bords de la Coronne et ainsi que le domaine qui prit le nom du propiétaire Valéracium,  puis Valérias, Valrias ,Vaulréas et au XVIIIe siècle Valréas. \r\nCe domaine qui passa de main en main à des coseigneurs dont les plus puissants était les Mévouillon qui le transmetent en 1190 aux Montauban qui construisirent le château appelé \"château d'en bas\" situé  au centre de la ville de Valréas. Au XIIIe siècle, un dragonnet de Mondragon, marié à Gasca de Montauban, posséde la majeure partie de Valréas.\r\nEn 1236, à sa mort la baronnie de Montauban laissée à son petit fils Dragonnet de Montauban s'étend sur toute la région, à la mort de ce dernier en 1277 sa fille Randonne hérite d'un domaine endetté. \r\nA la mort de Randonne en 1288 les Dauphins, le comte de Poitiers et le pape se disputent les restes de la baronnie, voulant se rendre maîtres de Valréas. \r\nEn 1294, Roncelin, fils de Randonne liquida les biens pour  payer les dettes, le Dauphins Humbert réussit habillement à prendre possession de Valréas  d'où le nom de \"château-Dauphins\" mais étant lui même à cour d'argent le Saint-Siège engage des négociations avec les seigneurs du Viennois.\r\nValréas livré au pape pour seize mille livres en 1317, tout comme  Grillon, Richerenches et Visan devient territoire pontifical jusqu'à la Révolution, puis rattaché au Vaucluse.          Aujourd'hui l'hôtel de Simiane est la mairie, cette bâtisse fut construite sur l'emplacement d'un ancien château du XIVe siècle qui appartenait en 1352 aux Aymerich, puis aux Mermet. \r\nEn 1430 aux Claret de Treschenu,  ancêtre de la branche Valréasienne des Silmiane, puis à Louis de Simiane II, seigneur de Trechenu, de Séderon et de Chalancon, fait bâtir, à partir de 1640. qui fit construire le château actuel.  En 1650 obtient le titre de marquis pour sa terre d'Esparron  et épouse Louise de Monteynard, leur petit-fils Louis de Simiane marquis d'Esparron né en 1671 à Valréas, est lieutenant de la garde écossaise. \r\nEn 1695 il épouse Pauline de Grignan-Castellane-Adhémar, petite fille de l'illustre marquise de Sévigné, Il est nommé en 1715 lieutenant général de Provence, succédant à son beau-père, mais il meurt trois ans plus tard à Paris. \r\nLe château de Simiane abandonné après la Révolution,  reprendra vie en 1844, il abrite aujourd'hui l'hôtel de ville.","architecture":"Ce château de Simiane fut d'abord un simple hôtel urbain  édifier en 1352.  Remanié en 1460  en demeure à deux bâtiments , l'ensemble repris, en 1640 et  elle fut terminé en 1726 par l'aile droite, qui fait un ensemble en ailes ouvertes par l'architecte Royer de la Valfrenière de Cavaillon. \r\nEdifice élégant d'une parfaite symétrie. Donjon roman des Ripert  de Valréas, seul vestige du château féodal qui domine la ville, haut de 17 mètres, cité au XIIe siècle à reçu l'horloge en 1548.","habitants":"les Montauban\r\nles Mévouillon\r\nFamille de Simiane\"","divers":"Château de Simiane\r\nTour Tivoly\r\nPorte de Simiane\r\nTour  Ripert dit de L'Horloge","gps":"","images":["../image/image_84/84_Valreas_Simiane_1.jpg","../image/image_84/84_Valreas_Simiane_2.jpg","../image/image_84/84_Valreas_Simiane_3.jpg","../image/image_84/84_Valreas_Simiane_4.jpg"]},"Consult_chateau_formulaire437b":{"id":"Consult_chateau_formulaire437b","dept":"84","canton":"Carpentras","commune":"Velleron","nom":"Velleron","type":"Château","periode":"XIII","histoire":"Velleron: La mairie occupe le château des Crillons XIIIe siècle réaménagé au XVIe siècle, reste peu de vestiges de remparts.","architecture":"Corps de logis rectangulaire flanqué d'un chemin de ronde crénelé à machicoulis.","habitants":"Famille des Crillon\"","divers":"","gps":"","images":["../image/image_84/84_Velleron_1.jpg"]},"Consult_chateau_formulaire63ab-3":{"id":"Consult_chateau_formulaire63ab-3","dept":"84","canton":"Pernes-les-Fontaine","commune":"Venasque","nom":"Venasque","type":"Vestiges","periode":"XII","histoire":"Venasque: Village perché du VIe siècle au XIe siècle fuyant les invasions barbares, les évêques s'y installèrent il a été le siège de l'évêché du Comtat avant Carpentras. En 1160  le château de Venasque et toute ses dépendances  furent achetés par Raymond de Toulouse  marquis de Provence.  \r\nAu Moyen-Age la cité devint résidense épiscopale, vivant dans une maison de seigneur (château St-Félix), les seigneurs de Venasque dont descend sa fille Siffreine qui épousa Jean de Thézan.","architecture":"Puissante forteresse dont les remparts sont en plusieurs parties et différentes époques, les plus récentes datant du XIIe siècle  dominé par trois grosses tours, appelées \"tour Sarrasines\" Tour de Guets à l'écart du village.","habitants":"Seigneurs de Venasque\"","divers":"Vestiges des tours et rempats de Venasque\r\nTour de guet au dessus de Venasque","gps":"","images":["../image/image_84/84_Venasque_1.jpg","../image/image_84/84_Venasque_2.jpg","../image/image_84/84_Venasque_3.jpg","../image/image_84/84_Venasque_4.jpg","../image/image_84/84_Venasque_5.jpg"]},"Consult_chateau_formulaire7da2":{"id":"Consult_chateau_formulaire7da2","dept":"84","canton":"Apt","commune":"Viens","nom":"Viens","type":"Vestiges","periode":"XIII","histoire":"Viens: Au Xe siècle , le fief de Viens appartenait à la famille d'Agoult  Simianne, le castrum succéde à une villa et en 1280 la seigneurie passe aux Sabran-Pontevès, puis par alliance au XIVe siècle dans la famille d'Ogier de Forcalquier. \r\nEn 1461 à la famille de Villemus et dans le domaine comtal de Provence jusqu'en 1573. \r\nAu XVIe siècle Viens connut des troubles religieux sans gravité pour le château, puis fut vendu aux Lévis-Ventadour qui le conserva jusqu'en 1628 et devient la propriété de la famille de Cabannes, en 1742 par alliance la baronnie passe à Jean-François de Renand, marquis d'Alleins qui la revend en 1789  à Pélissier de Grange afin de pouvoir se consacrer aux luttes contre-révolutionnaires dont-il sera l'un des plus farouches animateurs.","architecture":"Ce village qui était fortifié  dont il reste quelques vestiges tel que la porte Sarrasine et la porte neuve à tours carrées du XIII et XIVe siècle (horloge); le château renaissance qui a subit de  grandes transformations au XIXe siècle.","habitants":"Jean-François de Renand\"","divers":"Vestiges des remparts, tour, portes et château","gps":"","images":["../image/image_84/84_Viens_1.jpg","../image/image_84/84_Viens_2.jpg","../image/image_84/84_Viens_3.jpg","../image/image_84/84_Viens_4.jpg","../image/image_84/84_Viens_5.jpg","../image/image_84/84_Viens_6.jpg","../image/image_84/84_Viens_7.jpg"]},"Consult_chateau_formulaire0a56":{"id":"Consult_chateau_formulaire0a56","dept":"84","canton":"Cadenet","commune":"Villelaure","nom":"Villelaure","type":"Vestiges","periode":"XIV","histoire":"Villelaure: En 1504 Jean III de Forbin par son mariage avec Antoinette de la Terre devient seigneur de Villelaure, fut attaqué et incendié par les Vaudois et les protestants en 1545 et en 1579 à 1589 à Melchior de Forbin qui entreprend la reconstruction du château mais décéda  sans pouvoir terminer cette grande maison carrée, amplifiée de quatre  tours rondes. \r\nLe château fut mis à sac en 1591 par la guerre en Provence, à partir de cette date le château est à l'abandon, mais reste dans la famille des  Forbin, baron de Villelaure,  Forbin, marquis de Janson, jusqu'à la fin du XXe siècle. \r\nLe château qui a été appelé le château de la reine Laure fut abandonné au fermier.  \r\nL'un des plus connus des Forbin est Toussaint de Forbin, chevalier de Malte, commandeur de Saint-Jean d'Avignon, évêque de Digne, de Marseille et de Beauvais, pair et grand aumônier de France, nommé cardinal en 1690, il meurt en 1713 âgé de 83 ans.\r\n En 1960 reprit par Monsieur le Baron Gérard  de Puy qui font une remise en état pour y faire leur habitation.","architecture":"Le château fut en partie saccagé en 1590 pendant les guerres de religion, vestiges du château à la sortie du village à la Belle Pierre Blonde,  fut à l'origine une simple bastide dont la construction est de 1512 remanié en 1563,  mais il ne fut jamais achevé, quadrilatère garni de tour en angles dont  il reste des traces, l'aile Sud et le portail d'entrée formant une avancée sur le mur d'enceinte, est inspirée de celle de la Tour d'Aigues sont classés M H et l'autre partie est remise en état.","habitants":"Famille de Forbin\"","divers":"","gps":"","images":["../image/image_84/84_Villelaure_1.jpg","../image/image_84/84_Villelaure_2.jpg"]},"Consult_chateau_formulairefff0":{"id":"Consult_chateau_formulairefff0","dept":"84","canton":"Valréas","commune":"Visan","nom":"Visan","type":"Vestiges","periode":"XII","histoire":"Avant 1136 Visan était une terre appartenant à personne  et a partir de 1234 les barons  de Montauban se l'approprièrent,  c'est en 1334  qu'il fut acheté par les papes.          Château Verts: Ferme des Templiers au XIIIe siècle, se trouvant dans l'enclave des papes et sur la commune de Visan dépendait de ces derniers, aujourd'hui chambres d'hôtes par la famille Tortel.","architecture":"Vestiges du château du XIIe construit par les Dauphins et vestiges de l'enceinte que construisirent les papes au XIVe siècle.                       Château verts: corps de logis quadrangulaire flanqué de deux tours rondes crénelées en façade.","habitants":"Saint-Siège\"","divers":"Vestige, village et château Verts","gps":"","images":["../image/image_84/84_Visan_1.jpg","../image/image_84/84_Visan_2.jpg","../image/image_84/84_Visan_3.jpg","../image/image_84/84_Visan_4.jpg"]},"Consult_chateau_formulairefd80-2":{"id":"Consult_chateau_formulairefd80-2","dept":"84","canton":"Pertuis","commune":"Vitrolles-les-Luberon","nom":"Vitrolle let lbI=[],lbX=0;
function lbOpen(i,x,t){lbI=i;lbX=x;document.getElementById('lb-img').src=i[x];document.getElementById('lb-cap').textContent=t+' ('+(x+1)+'/'+i.length+')';document.getElementById('lb').classList.add('open');}
function lbClose(){document.getElementById('lb').classList.remove('open');}
function lbNav(d){lbX=(lbX+d+lbI.length)%lbI.length;const img=document.getElementById('lb-img');img.style.opacity='.3';img.src=lbI[lbX];img.onload=()=>img.style.opacity='1';document.getElementById('lb-cap').textContent=document.getElementById('lb-cap').textContent.replace(/\d+\//,(lbX+1)+'/');}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
function showFiche(c){
  const imgs=c.images||[];
  const gal=imgs.length?imgs.map((s,i)=>`<img src="${s}" loading="lazy" alt="${c.nom}" onerror="this.style.display='none'" onclick="lbOpen(${JSON.stringify(imgs)},${i},${JSON.stringify(c.nom)})">`).join(''):'<p class="no-photo">Aucune photo</p>';
  const rows=[['Département','84 — Vaucluse'],['Canton',c.canton||'—'],['Commune',c.commune||'—'],["Type d\'édifice",c.type||'—'],['Période',c.periode||'—'],...(c.gps?[['GPS',c.gps]]:[])].map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const secs=[['Histoire',c.histoire],['Architecture',c.architecture],['Habitants / Familles',c.habitants],['Divers',c.divers]].filter(([,v])=>v&&v.trim()).map(([t,v])=>`<div class="blk"><h4>${t}</h4><p>${v}</p></div>`).join('');
  document.getElementById('fiche').innerHTML=`<h2 class="ftitle">${c.nom}</h2><div class="ftop"><table class="itbl"><tbody>${rows}</tbody></table><div class="gallery">${gal}</div></div>${secs}`;
}
function pickCh(id){
  document.querySelectorAll('.ci').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ci-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const c=FULL[id];if(c)showFiche(c);
}
function ciHTML(c){
  const th=c.img?`<img class="th" src="${c.img}" loading="lazy" alt="" onerror="this.outerHTML='<div class=th-ph>🏰</div>'">`:'<div class="th-ph">🏰</div>';
  const b=c.type?`<span class="bdg">${c.type}</span>`:'';
  return `<div class="ci" id="ci-${c.id}" onclick="pickCh('${c.id}')">${th}<div class="ci-txt"><div class="ci-nom">${c.nom}</div><div class="ci-sub">${c.commune}</div>${b}</div></div>`;
}
function filt(){const q=document.getElementById('sbq').value.toLowerCase();const r=q?SB.filter(c=>(c.nom+' '+c.commune).toLowerCase().includes(q)):SB;document.getElementById('sbl').innerHTML=r.map(ciHTML).join('');document.getElementById('sbc').textContent=r.length+' édifice(s)';}
document.getElementById('sbl').innerHTML=SB.map(ciHTML).join('');
const hash=location.hash.replace('#','');
const start=hash&&FULL[hash]?hash:(SB.length?SB[0].id:null);
if(start)pickCh(start);
</script></body></html>
